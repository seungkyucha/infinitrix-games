name: CI / Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  validate-registry:
    name: Validate Game Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate game-registry.json
        run: |
          node -e "
            const fs   = require('fs');
            const data = JSON.parse(fs.readFileSync('public/games/game-registry.json', 'utf-8'));

            if (typeof data.totalGames !== 'number') throw new Error('totalGames must be a number');
            if (!Array.isArray(data.games))           throw new Error('games must be an array');

            data.games.forEach((g, i) => {
              if (!g.id)          throw new Error(\`games[\${i}].id is missing\`);
              if (!g.title)       throw new Error(\`games[\${i}].title is missing\`);
              if (!g.path)        throw new Error(\`games[\${i}].path is missing\`);
              if (!g.thumbnail)   throw new Error(\`games[\${i}].thumbnail is missing\`);
            });

            if (data.games.length !== data.totalGames) {
              throw new Error(\`totalGames(\${data.totalGames}) !== games.length(\${data.games.length})\`);
            }

            console.log('✅ game-registry.json 유효성 검사 통과 (' + data.totalGames + '개 게임)');
          "

      - name: Check game files exist
        run: |
          node -e "
            const fs   = require('fs');
            const data = JSON.parse(fs.readFileSync('public/games/game-registry.json', 'utf-8'));

            let missing = [];
            data.games.forEach(g => {
              const htmlPath = 'public' + g.path;
              if (!fs.existsSync(htmlPath)) missing.push(htmlPath);
            });

            if (missing.length > 0) {
              console.error('❌ 누락된 게임 파일:', missing);
              process.exit(1);
            }
            console.log('✅ 모든 게임 파일 존재 확인');
          "
