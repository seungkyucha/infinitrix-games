<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d0d24"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="100%" stop-color="#1a1212"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#6c3cf7" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="650" x2="1200" y2="650"/>
    <line x1="0" y1="700" x2="1200" y2="700"/><line x1="0" y1="750" x2="1200" y2="750"/>
    <line x1="0" y1="800" x2="1200" y2="800"/><line x1="0" y1="850" x2="1200" y2="850"/>
  </g>

  <!-- Title -->
  <text x="600" y="45" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#e0e0f0" text-anchor="middle" filter="url(#glow)">InfiniTriX Development Cycle Workflow</text>
  <text x="600" y="68" font-family="system-ui,sans-serif" font-size="12" fill="#6c3cf7" text-anchor="middle" letter-spacing="3">AUTOMATED AI AGENT PIPELINE</text>

  <!-- ═══ MAIN FLOW (Steps 1-4) ═══ -->

  <!-- Step 1: Analyst -->
  <rect x="60" y="100" width="240" height="90" rx="12" fill="url(#stepGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="80" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#00d4ff" font-weight="bold">STEP 1</text>
  <text x="80" y="148" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">📊 분석가 Analyst</text>
  <text x="80" y="170" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">트렌드 분석 · 장르 추천 · 성장 지시문</text>
  <text x="80" y="182" font-family="system-ui,sans-serif" font-size="9" fill="#555577">WebSearch · WebFetch · 누적 지혜 참조</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="145" x2="360" y2="145" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <polygon points="358,140 370,145 358,150" fill="#00d4ff" opacity="0.6"/>

  <!-- Step 2: Planner -->
  <rect x="370" y="100" width="240" height="90" rx="12" fill="url(#stepGrad)" stroke="#6c3cf7" stroke-width="1.5" opacity="0.9"/>
  <text x="390" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#6c3cf7" font-weight="bold">STEP 2</text>
  <text x="390" y="148" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">📋 플래너 Planner</text>
  <text x="390" y="170" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">게임 기획서(GDD) 작성 · ko+en</text>
  <text x="390" y="182" font-family="system-ui,sans-serif" font-size="9" fill="#555577">포스트모템 피드백 반영 · 성장 목표 적용</text>

  <!-- Arrow 2→3 -->
  <line x1="610" y1="145" x2="670" y2="145" stroke="#6c3cf7" stroke-width="2" opacity="0.6"/>
  <polygon points="668,140 680,145 668,150" fill="#6c3cf7" opacity="0.6"/>

  <!-- Step 3: Designer -->
  <rect x="680" y="100" width="240" height="90" rx="12" fill="url(#stepGrad)" stroke="#ff6b9d" stroke-width="1.5" opacity="0.9"/>
  <text x="700" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b9d" font-weight="bold">STEP 3</text>
  <text x="700" y="148" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">🎨 디자이너 Art Director</text>
  <text x="700" y="170" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">레퍼런스 리서치 → 아트 방향 → SVG 에셋</text>
  <text x="700" y="182" font-family="system-ui,sans-serif" font-size="9" fill="#555577">캐릭터 128×128 · 배경 1200×800 · 썸네일</text>

  <!-- Arrow 3→4 -->
  <path d="M920 190 L920 220 L180 220 L180 260" stroke="#ff6b9d" stroke-width="2" fill="none" opacity="0.4"/>
  <polygon points="175,258 180,270 185,258" fill="#ff6b9d" opacity="0.4"/>

  <!-- Step 4: Coder -->
  <rect x="60" y="270" width="540" height="90" rx="12" fill="url(#stepGrad)" stroke="#00ff87" stroke-width="1.5" opacity="0.9"/>
  <text x="80" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#00ff87" font-weight="bold">STEP 4</text>
  <text x="80" y="318" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">💻 코더 Coder — HTML5 게임 구현</text>
  <text x="80" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">Canvas 게임 · preventDefault 필수 · 터치 조작 · 시스템 폰트 · devicePixelRatio</text>
  <text x="80" y="352" font-family="system-ui,sans-serif" font-size="9" fill="#555577">기획서 + 에셋 매니페스트 기반 · 시작→플레이→게임오버→재시작 전체 구현</text>

  <!-- ═══ REVIEW LOOP 1 ═══ -->

  <!-- Review loop box -->
  <rect x="60" y="390" width="540" height="200" rx="14" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="80" y="410" font-family="system-ui,sans-serif" font-size="10" fill="#ffd700" opacity="0.7" font-weight="bold">1차 리뷰 루프 (최대 3회)</text>

  <!-- Arrow 4→5 -->
  <line x1="330" y1="360" x2="330" y2="420" stroke="#00ff87" stroke-width="2" opacity="0.4"/>
  <polygon points="325,418 330,430 335,418" fill="#00ff87" opacity="0.4"/>

  <!-- Step 5: Reviewer -->
  <rect x="80" y="430" width="360" height="80" rx="10" fill="url(#stepGrad)" stroke="#ffd700" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="455" font-family="system-ui,sans-serif" font-size="11" fill="#ffd700" font-weight="bold">STEP 5</text>
  <text x="100" y="475" font-family="system-ui,sans-serif" font-size="14" fill="#e0e0f0" font-weight="bold">🔍 리뷰어 QA Reviewer</text>
  <text x="100" y="495" font-family="system-ui,sans-serif" font-size="9" fill="#8888aa">코드 분석 + Puppeteer 브라우저 테스트 (5단계)</text>
  <text x="100" y="505" font-family="system-ui,sans-serif" font-size="9" fill="#555577">로드→시작→이동→게임오버→터치 실제 검증</text>

  <!-- APPROVED arrow -->
  <line x1="440" y1="470" x2="560" y2="470" stroke="#00ff87" stroke-width="2" opacity="0.6"/>
  <text x="465" y="463" font-family="system-ui,sans-serif" font-size="10" fill="#00ff87" font-weight="bold">PASS ✅</text>
  <polygon points="558,465 570,470 558,475" fill="#00ff87" opacity="0.6"/>

  <!-- FAIL loop back to coder -->
  <path d="M260 510 L260 560 Q260 575 275 575 L500 575 Q515 575 515 560 L515 430 Q515 420 505 420 L460 420" stroke="#ff4444" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="370" y="570" font-family="system-ui,sans-serif" font-size="9" fill="#ff4444" font-weight="bold">FAIL → 코더 재작업</text>
  <polygon points="462,415 450,420 462,425" fill="#ff4444" opacity="0.5"/>

  <!-- ═══ STEP 5.5: PLANNER + DESIGNER RE-REVIEW ═══ -->

  <rect x="620" y="390" width="520" height="200" rx="14" fill="none" stroke="#ff6b9d" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="640" y="410" font-family="system-ui,sans-serif" font-size="10" fill="#ff6b9d" opacity="0.7" font-weight="bold">STEP 5.5 — 플래너·디자이너 재검토 + 2차 리뷰 (최대 3회)</text>

  <!-- Planner re-review -->
  <rect x="640" y="425" width="220" height="55" rx="8" fill="url(#stepGrad)" stroke="#6c3cf7" stroke-width="1" opacity="0.8"/>
  <text x="660" y="448" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" font-weight="bold">📋 플래너 재검토</text>
  <text x="660" y="465" font-family="system-ui,sans-serif" font-size="9" fill="#8888aa">기획 적합성 · 규칙/조작/난이도 일치</text>

  <!-- Designer re-review -->
  <rect x="640" y="490" width="220" height="55" rx="8" fill="url(#stepGrad)" stroke="#ff6b9d" stroke-width="1" opacity="0.8"/>
  <text x="660" y="513" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" font-weight="bold">🎨 디자이너 재검토</text>
  <text x="660" y="530" font-family="system-ui,sans-serif" font-size="9" fill="#8888aa">비주얼 품질 · 에셋 활용 · UI 완성도</text>

  <!-- Arrow to coder improvement -->
  <line x1="860" y1="480" x2="890" y2="480" stroke="#ff6b9d" stroke-width="1.5" opacity="0.5"/>
  <polygon points="888,475 900,480 888,485" fill="#ff6b9d" opacity="0.5"/>

  <!-- Coder improvement + 2nd review -->
  <rect x="900" y="425" width="220" height="55" rx="8" fill="url(#stepGrad)" stroke="#00ff87" stroke-width="1" opacity="0.8"/>
  <text x="920" y="448" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" font-weight="bold">💻 코더 개선</text>
  <text x="920" y="465" font-family="system-ui,sans-serif" font-size="9" fill="#8888aa">플래너+디자이너 피드백 반영</text>

  <rect x="900" y="490" width="220" height="55" rx="8" fill="url(#stepGrad)" stroke="#ffd700" stroke-width="1" opacity="0.8"/>
  <text x="920" y="513" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" font-weight="bold">🔍 2차 리뷰</text>
  <text x="920" y="530" font-family="system-ui,sans-serif" font-size="9" fill="#8888aa">동일 기준 + 회귀 테스트</text>

  <!-- 2nd review FAIL loop -->
  <path d="M1010 545 L1010 570 Q1010 580 1000 580 L920 580 Q910 580 910 570 L910 545" stroke="#ff4444" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="3,2"/>
  <text x="935" y="577" font-family="system-ui,sans-serif" font-size="8" fill="#ff4444" opacity="0.6">FAIL→재수정</text>

  <!-- ═══ STEPS 6-7 ═══ -->

  <!-- Arrow to Step 6 -->
  <path d="M1010 555 L1010 630 L330 630 L330 660" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.4"/>
  <polygon points="325,658 330,670 335,658" fill="#ffd700" opacity="0.4"/>

  <!-- Step 6: Postmortem -->
  <rect x="60" y="670" width="540" height="80" rx="12" fill="url(#stepGrad)" stroke="#ff9500" stroke-width="1.5" opacity="0.9"/>
  <text x="80" y="695" font-family="system-ui,sans-serif" font-size="11" fill="#ff9500" font-weight="bold">STEP 6</text>
  <text x="80" y="715" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">📝 포스트모템 Postmortem</text>
  <text x="80" y="735" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">사이클 회고 · 플랫폼 지혜 갱신 · 에이전트별 개별 지혜 갱신 · ko+en 문서</text>

  <!-- Arrow 6→7 -->
  <line x1="600" y1="710" x2="660" y2="710" stroke="#ff9500" stroke-width="2" opacity="0.4"/>
  <polygon points="658,705 670,710 658,715" fill="#ff9500" opacity="0.4"/>

  <!-- Step 7: Deployer -->
  <rect x="670" y="670" width="470" height="80" rx="12" fill="url(#stepGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="690" y="695" font-family="system-ui,sans-serif" font-size="11" fill="#00d4ff" font-weight="bold">STEP 7</text>
  <text x="690" y="715" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" font-weight="bold">🚢 배포 Deployer</text>
  <text x="690" y="735" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">레지스트리 등록 (i18n 8언어) · git push · 자동 검증 (7항목)</text>

  <!-- Verification box -->
  <rect x="670" y="760" width="470" height="50" rx="8" fill="url(#loopGrad)" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  <text x="690" y="782" font-family="system-ui,sans-serif" font-size="11" fill="#ff4444" font-weight="bold">🔍 배포 검증</text>
  <text x="690" y="798" font-family="system-ui,sans-serif" font-size="9" fill="#aa6666">registry · i18n · thumbnail · totalGames · docs · git status → 문제 시 자동 수정</text>

  <!-- Arrow verification -->
  <line x1="905" y1="750" x2="905" y2="760" stroke="#ff4444" stroke-width="1" opacity="0.4"/>

  <!-- ═══ CYCLE REPEAT ═══ -->
  <path d="M1140 810 L1160 810 Q1180 810 1180 790 L1180 60 Q1180 40 1160 40 L80 40 Q60 40 60 60 L60 98" stroke="#6c3cf7" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="8,4"/>
  <text x="1170" y="440" font-family="system-ui,sans-serif" font-size="11" fill="#6c3cf7" opacity="0.4" transform="rotate(90, 1170, 440)">1시간 후 다음 싸이클</text>
  <polygon points="55,96 60,108 65,96" fill="#6c3cf7" opacity="0.3"/>

  <!-- ═══ LEGEND ═══ -->
  <rect x="60" y="830" width="580" height="55" rx="8" fill="rgba(20,20,40,0.6)" stroke="#333355" stroke-width="0.5"/>
  <circle cx="85" cy="852" r="5" fill="#00ff87"/><text x="95" y="856" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">PASS</text>
  <circle cx="145" cy="852" r="5" fill="#ff4444"/><text x="155" y="856" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">FAIL→재작업</text>
  <rect x="235" y="847" width="30" height="10" rx="2" stroke="#ffd700" stroke-width="1" fill="none" stroke-dasharray="4,2"/>
  <text x="270" y="856" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">리뷰 루프</text>
  <line x1="350" y1="852" x2="380" y2="852" stroke="#6c3cf7" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="385" y="856" font-family="system-ui,sans-serif" font-size="10" fill="#8888aa">싸이클 반복</text>
  <text x="480" y="856" font-family="system-ui,sans-serif" font-size="10" fill="#555577">각 에이전트는 개별 누적 지혜(wisdom) 참조/갱신</text>
  <text x="85" y="875" font-family="system-ui,sans-serif" font-size="9" fill="#444466">성장 단계: 기본(1-5) → 중급(6-10) → 고급(11-20) → 프리미엄(21+) | 모든 문서 한국어+영어 | 게임 메타 9개 언어</text>
</svg>
