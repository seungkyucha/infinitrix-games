<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1E"/>
      <stop offset="50%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="tGridGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tRuneFire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FF6644"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tRuneWater" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#4488FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tRuneEarth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#88AA44"/>
      <stop offset="100%" stop-color="#88AA44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tRuneWind" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#AADDFF"/>
      <stop offset="100%" stop-color="#AADDFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tRuneThunder" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FFDD00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tMagicBeam" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.8"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <linearGradient id="tSubGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#AADDFF"/>
    </linearGradient>
    <radialGradient id="tEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00CCAA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#tBg)"/>
  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="20" cy="15" r="0.8" opacity="0.7"/>
    <circle cx="55" cy="30" r="0.5" opacity="0.5"/>
    <circle cx="90" cy="10" r="0.7" opacity="0.6"/>
    <circle cx="140" cy="25" r="0.9" opacity="0.8"/>
    <circle cx="195" cy="12" r="0.5" opacity="0.5"/>
    <circle cx="250" cy="28" r="0.7" opacity="0.6"/>
    <circle cx="310" cy="15" r="0.8" opacity="0.7"/>
    <circle cx="350" cy="8" r="0.6" opacity="0.5"/>
    <circle cx="380" cy="22" r="0.9" opacity="0.8"/>
    <circle cx="30" cy="50" r="0.6" opacity="0.5"/>
    <circle cx="370" cy="45" r="0.7" opacity="0.6"/>
    <circle cx="165" cy="40" r="0.5" opacity="0.4"/>
  </g>
  <!-- Background mountains -->
  <path d="M0,160 Q50,130 100,150 Q150,120 200,140 Q250,110 300,135 Q350,115 400,140 L400,200 L0,200Z" fill="#0E0E22" opacity="0.6"/>
  <!-- 3-lane defense area (right side) -->
  <g opacity="0.4">
    <rect x="260" y="80" width="130" height="25" rx="3" fill="#1A1A3E" stroke="#3A3A6A" stroke-width="0.5"/>
    <rect x="260" y="110" width="130" height="25" rx="3" fill="#1A1A3E" stroke="#3A3A6A" stroke-width="0.5"/>
    <rect x="260" y="140" width="130" height="25" rx="3" fill="#1A1A3E" stroke="#3A3A6A" stroke-width="0.5"/>
    <text x="270" y="96" font-size="6" fill="#FF4444" opacity="0.6" font-family="monospace">LANE 1</text>
    <text x="270" y="126" font-size="6" fill="#4488FF" opacity="0.6" font-family="monospace">LANE 2</text>
    <text x="270" y="156" font-size="6" fill="#88AA44" opacity="0.6" font-family="monospace">LANE 3</text>
  </g>
  <!-- Enemy silhouettes approaching from right -->
  <g opacity="0.6">
    <!-- Slime enemy lane 1 -->
    <ellipse cx="370" cy="92" rx="8" ry="6" fill="#4A6E2A"/>
    <circle cx="367" cy="89" r="1.5" fill="#FF4444"/>
    <circle cx="373" cy="89" r="1.5" fill="#FF4444"/>
    <!-- Goblin enemy lane 2 -->
    <ellipse cx="360" cy="120" rx="6" ry="8" fill="#4A6E2A"/>
    <circle cx="358" cy="117" r="1.2" fill="#FF4444"/>
    <circle cx="363" cy="117" r="1.2" fill="#FF4444"/>
    <path d="M354,113 L352,108" stroke="#4A6E2A" stroke-width="1.5"/>
    <path d="M367,113 L369,108" stroke="#4A6E2A" stroke-width="1.5"/>
    <!-- Orc enemy lane 3 -->
    <ellipse cx="375" cy="150" rx="9" ry="10" fill="#3A5E1A"/>
    <circle cx="372" cy="147" r="1.5" fill="#FF4444"/>
    <circle cx="378" cy="147" r="1.5" fill="#FF4444"/>
  </g>
  <!-- Magic beam from grid to enemies -->
  <path d="M220,120 Q280,90 365,92" stroke="#FF4444" stroke-width="2" fill="none" opacity="0.4" filter="url(#tGlow)"/>
  <path d="M220,120 Q280,120 355,122" stroke="#4488FF" stroke-width="1.5" fill="none" opacity="0.3" filter="url(#tGlow)"/>
  <!-- 5x5 Grid (center-left) -->
  <g transform="translate(90, 70)">
    <!-- Grid glow -->
    <circle cx="65" cy="65" r="80" fill="url(#tGridGlow)"/>
    <!-- Grid cells -->
    <g stroke="#3A3A6A" stroke-width="0.8" fill="#2A2A4A">
      <rect x="0" y="0" width="25" height="25" rx="2"/>
      <rect x="27" y="0" width="25" height="25" rx="2"/>
      <rect x="54" y="0" width="25" height="25" rx="2"/>
      <rect x="81" y="0" width="25" height="25" rx="2"/>
      <rect x="108" y="0" width="25" height="25" rx="2"/>
      <rect x="0" y="27" width="25" height="25" rx="2"/>
      <rect x="27" y="27" width="25" height="25" rx="2"/>
      <rect x="54" y="27" width="25" height="25" rx="2"/>
      <rect x="81" y="27" width="25" height="25" rx="2"/>
      <rect x="108" y="27" width="25" height="25" rx="2"/>
      <rect x="0" y="54" width="25" height="25" rx="2"/>
      <rect x="27" y="54" width="25" height="25" rx="2"/>
      <rect x="54" y="54" width="25" height="25" rx="2"/>
      <rect x="81" y="54" width="25" height="25" rx="2"/>
      <rect x="108" y="54" width="25" height="25" rx="2"/>
      <rect x="0" y="81" width="25" height="25" rx="2"/>
      <rect x="27" y="81" width="25" height="25" rx="2"/>
      <rect x="54" y="81" width="25" height="25" rx="2"/>
      <rect x="81" y="81" width="25" height="25" rx="2"/>
      <rect x="108" y="81" width="25" height="25" rx="2"/>
      <rect x="0" y="108" width="25" height="25" rx="2"/>
      <rect x="27" y="108" width="25" height="25" rx="2"/>
      <rect x="54" y="108" width="25" height="25" rx="2"/>
      <rect x="81" y="108" width="25" height="25" rx="2"/>
      <rect x="108" y="108" width="25" height="25" rx="2"/>
    </g>
    <!-- Placed runes on grid -->
    <!-- Fire rune line-3 (row 2: col 1-3) - forming a magic circle -->
    <circle cx="12" cy="39" r="9" fill="url(#tRuneFire)" filter="url(#tGlow)"/>
    <text x="12" y="43" text-anchor="middle" font-size="10" fill="#FF4444" font-family="serif" font-weight="bold">火</text>
    <circle cx="39" cy="39" r="9" fill="url(#tRuneFire)" filter="url(#tGlow)"/>
    <text x="39" y="43" text-anchor="middle" font-size="10" fill="#FF4444" font-family="serif" font-weight="bold">火</text>
    <circle cx="66" cy="39" r="9" fill="url(#tRuneFire)" filter="url(#tGlow)"/>
    <text x="66" y="43" text-anchor="middle" font-size="10" fill="#FF4444" font-family="serif" font-weight="bold">火</text>
    <!-- Magic circle connecting line (Line-3 pattern matched!) -->
    <line x1="12" y1="39" x2="66" y2="39" stroke="#FFD700" stroke-width="1.5" opacity="0.6" filter="url(#tGlow)"/>
    <!-- Water rune -->
    <circle cx="93" cy="66" r="9" fill="url(#tRuneWater)" filter="url(#tGlow)"/>
    <text x="93" y="70" text-anchor="middle" font-size="10" fill="#4488FF" font-family="serif" font-weight="bold">水</text>
    <!-- Earth rune -->
    <circle cx="66" cy="93" r="9" fill="url(#tRuneEarth)" filter="url(#tGlow)"/>
    <text x="66" y="97" text-anchor="middle" font-size="10" fill="#88AA44" font-family="serif" font-weight="bold">地</text>
    <!-- Wind rune -->
    <circle cx="12" cy="120" r="9" fill="url(#tRuneWind)" filter="url(#tGlow)"/>
    <text x="12" y="124" text-anchor="middle" font-size="10" fill="#AADDFF" font-family="serif" font-weight="bold">風</text>
    <!-- Thunder rune -->
    <circle cx="120" cy="12" r="9" fill="url(#tRuneThunder)" filter="url(#tGlow)"/>
    <text x="120" y="16" text-anchor="middle" font-size="10" fill="#FFDD00" font-family="serif" font-weight="bold">雷</text>
  </g>
  <!-- Wizard character (small, left side) -->
  <g transform="translate(30, 90) scale(0.4)">
    <!-- Robe -->
    <path d="M30,40 Q28,50 25,70 Q23,80 26,85 L40,88 L54,85 Q57,80 55,70 Q52,50 50,40Z" fill="#3A2A6E"/>
    <!-- Head -->
    <ellipse cx="40" cy="32" rx="10" ry="11" fill="#E8D0B0"/>
    <!-- Hat -->
    <path d="M28,28 Q34,10 40,5 Q46,10 52,28 Q46,30 40,31 Q34,30 28,28Z" fill="#4A3A8E"/>
    <ellipse cx="40" cy="28" rx="15" ry="4" fill="#3A2A6E"/>
    <rect x="36" y="24" width="8" height="6" rx="1" fill="none" stroke="#FFD700" stroke-width="1"/>
    <!-- Glowing eyes -->
    <circle cx="36" cy="31" r="2" fill="#00FFCC" filter="url(#tGlow)"/>
    <circle cx="44" cy="31" r="2" fill="#00FFCC" filter="url(#tGlow)"/>
    <!-- Staff -->
    <rect x="55" y="15" width="3" height="55" rx="1.5" fill="#8B6914"/>
    <circle cx="56.5" cy="13" r="5" fill="#FFD700" filter="url(#tGlow)" opacity="0.8"/>
  </g>
  <!-- "Pattern Matched!" popup effect -->
  <g transform="translate(120, 100)">
    <rect x="-5" y="-3" width="80" height="16" rx="4" fill="#1A1A2E" stroke="#FFD700" stroke-width="1" opacity="0.8"/>
    <text x="35" y="9" text-anchor="middle" font-size="8" fill="#FFD700" font-family="monospace" font-weight="bold">🔥 Line-3!</text>
  </g>
  <!-- UI Elements -->
  <!-- HP bar top-left -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="60" height="8" rx="3" fill="#1A1A2E" stroke="#3A3A6A" stroke-width="0.5"/>
    <rect x="1" y="1" width="44" height="6" rx="2" fill="#FF4444"/>
    <text x="65" y="8" font-size="6" fill="#E0E0FF" font-family="monospace">HP</text>
  </g>
  <!-- Crystal counter -->
  <g transform="translate(10, 22)">
    <path d="M3,4 L6,0 L9,4 L6,10Z" fill="#00FFCC" filter="url(#tGlow)"/>
    <text x="14" y="8" font-size="6" fill="#00FFCC" font-family="monospace">×128</text>
  </g>
  <!-- Stage indicator -->
  <text x="390" y="15" text-anchor="end" font-size="7" fill="#E0E0FF" font-family="monospace" opacity="0.7">Stage 1-2 ▸ Forest</text>
  <!-- Bottom title area -->
  <rect x="0" y="240" width="400" height="60" fill="#0A0A1E" opacity="0.85"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <!-- Decorative runes along the line -->
  <g opacity="0.3" fill="#FFD700" font-family="serif" font-size="8">
    <text x="30" y="238">ᚱ</text>
    <text x="80" y="238">ᛟ</text>
    <text x="130" y="238">ᚦ</text>
    <text x="180" y="238">ᛊ</text>
    <text x="230" y="238">ᚠ</text>
    <text x="280" y="238">ᚱ</text>
    <text x="330" y="238">ᛟ</text>
    <text x="380" y="238">ᚦ</text>
  </g>
  <!-- Title text -->
  <text x="200" y="268" text-anchor="middle" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" font-family="serif" filter="url(#tTextShadow)">RUNEFORGE TACTICS</text>
  <!-- Subtitle -->
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="url(#tSubGrad)" font-family="monospace" opacity="0.8">룬포지 택틱스 — Puzzle × Strategy</text>
  <!-- Ambient magic particles -->
  <g opacity="0.5">
    <circle cx="50" cy="80" r="1.5" fill="#FFD700" filter="url(#tGlow)"/>
    <circle cx="250" cy="60" r="1" fill="#00FFCC" filter="url(#tGlow)"/>
    <circle cx="340" cy="100" r="1.2" fill="#FFD700" filter="url(#tGlow)"/>
    <circle cx="80" cy="180" r="1" fill="#AADDFF" filter="url(#tGlow)"/>
    <circle cx="300" cy="200" r="1.5" fill="#FF4444" filter="url(#tGlow)" opacity="0.4"/>
    <circle cx="150" cy="50" r="0.8" fill="#8844AA" filter="url(#tGlow)"/>
  </g>
  <!-- Vignette corners -->
  <rect x="0" y="0" width="400" height="300" fill="none" stroke="#0A0A1E" stroke-width="20" opacity="0.3" rx="10"/>
  <!-- Additional scene details: inventory bar at bottom of grid -->
  <g transform="translate(90, 210)">
    <rect x="0" y="0" width="133" height="22" rx="4" fill="#1A1A2E" stroke="#3A3A6A" stroke-width="0.8" opacity="0.8"/>
    <text x="5" y="14" font-size="6" fill="#E0E0FF" opacity="0.5" font-family="monospace">Inventory:</text>
    <!-- Rune slots in inventory -->
    <rect x="55" y="3" width="16" height="16" rx="2" fill="#2A2A4A" stroke="#3A3A6A" stroke-width="0.5"/>
    <circle cx="63" cy="11" r="5" fill="url(#tRuneFire)" opacity="0.6"/>
    <text x="63" y="14" text-anchor="middle" font-size="6" fill="#FF4444" font-family="serif">火</text>
    <rect x="74" y="3" width="16" height="16" rx="2" fill="#2A2A4A" stroke="#3A3A6A" stroke-width="0.5"/>
    <circle cx="82" cy="11" r="5" fill="url(#tRuneWater)" opacity="0.6"/>
    <text x="82" y="14" text-anchor="middle" font-size="6" fill="#4488FF" font-family="serif">水</text>
    <rect x="93" y="3" width="16" height="16" rx="2" fill="#2A2A4A" stroke="#3A3A6A" stroke-width="0.5"/>
    <circle cx="101" cy="11" r="5" fill="url(#tRuneEarth)" opacity="0.6"/>
    <text x="101" y="14" text-anchor="middle" font-size="6" fill="#88AA44" font-family="serif">地</text>
    <rect x="112" y="3" width="16" height="16" rx="2" fill="#2A2A4A" stroke="#5050AA" stroke-width="0.8"/>
    <!-- Empty slot -->
  </g>
  <!-- Activate button -->
  <g transform="translate(240, 180)">
    <rect x="0" y="0" width="50" height="18" rx="5" fill="#3A2A6E" stroke="#FFD700" stroke-width="1"/>
    <text x="25" y="13" text-anchor="middle" font-size="7" fill="#FFD700" font-family="monospace" font-weight="bold">ACTIVATE</text>
  </g>
  <!-- Score display top right -->
  <g transform="translate(320, 28)">
    <text x="0" y="0" font-size="6" fill="#FFD700" font-family="monospace">Score: 1,280</text>
    <text x="0" y="10" font-size="6" fill="#E0E0FF" font-family="monospace" opacity="0.6">Wave: 3/5</text>
  </g>
  <!-- Magic pattern glow effect over matched runes -->
  <g transform="translate(90, 70)" opacity="0.3">
    <rect x="-2" y="25" width="83" height="29" rx="5" fill="none" stroke="#FFD700" stroke-width="1.5" filter="url(#tSoftGlow)"/>
  </g>
  <!-- Additional enemies in motion -->
  <g opacity="0.4">
    <!-- Slime behind -->
    <ellipse cx="390" cy="94" rx="5" ry="4" fill="#3A5E1A"/>
    <!-- Goblin behind -->
    <ellipse cx="385" cy="122" rx="4" ry="6" fill="#3A5E1A"/>
  </g>
  <!-- Magic projectile in flight -->
  <g filter="url(#tGlow)">
    <circle cx="300" cy="92" r="3" fill="#FF4444" opacity="0.7"/>
    <path d="M290,92 L300,90 L300,94Z" fill="#FF6644" opacity="0.5"/>
  </g>
  <!-- Recipe book hint icon -->
  <g transform="translate(10, 35)" opacity="0.6">
    <rect x="0" y="0" width="14" height="12" rx="2" fill="#3A2A6E" stroke="#FFD700" stroke-width="0.5"/>
    <text x="7" y="9" text-anchor="middle" font-size="5" fill="#FFD700" font-family="serif">ᚱ</text>
    <text x="18" y="9" font-size="5" fill="#E0E0FF" font-family="monospace" opacity="0.6">Tab</text>
  </g>
  <!-- More atmospheric particles -->
  <g opacity="0.3">
    <circle cx="180" cy="180" r="0.8" fill="#FFD700" filter="url(#tGlow)"/>
    <circle cx="320" cy="170" r="1" fill="#00FFCC" filter="url(#tGlow)"/>
    <circle cx="60" cy="140" r="0.7" fill="#AADDFF" filter="url(#tGlow)"/>
    <circle cx="270" cy="50" r="0.9" fill="#8844AA" filter="url(#tGlow)"/>
    <circle cx="120" cy="220" r="0.6" fill="#FF4444" filter="url(#tGlow)"/>
    <circle cx="360" cy="180" r="0.8" fill="#FFD700" filter="url(#tGlow)"/>
  </g>
  <!-- Ground detail -->
  <path d="M0,200 Q100,195 200,198 Q300,192 400,196" stroke="#1A3A1A" stroke-width="1" fill="none" opacity="0.3"/>
  <g fill="#0E0E22" opacity="0.3">
    <path d="M0,198 Q10,190 20,198 Q30,188 40,198 Q50,192 60,198 L60,200 L0,200Z"/>
    <path d="M340,195 Q350,188 360,195 Q370,186 380,195 Q390,190 400,195 L400,200 L340,200Z"/>
  </g>
</svg>