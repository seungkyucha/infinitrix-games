// --- TweenManager (F6b: clearImmediate) ---
class TweenManager {
  constructor() { this._tweens = []; }
  add(obj, props, duration, easing, onComplete) {
    const tw = { obj, props:{}, duration, elapsed:0, easing: easing||'easeInOut', onComplete: onComplete||null };
    for (const k in props) { tw.props[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(tw);
    return tw;
  }
  clearImmediate() { this._tweens.length = 0; }
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt;
      let p = Math.min(tw.elapsed / tw.duration, 1);
      const ep = this._ease(p, tw.easing);
      for (const k in tw.props) {
        const pr = tw.props[k];
        tw.obj[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  _ease(t, type) {
    if (type === 'linear') return t;
    if (type === 'easeIn') return t * t;
    if (type === 'easeOut') return t * (2 - t);
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }
  get count() { return this._tweens.length; }
}

// --- ObjectPool ---
class ObjectPool {
  constructor(size, factory) {
    this.pool = [];
    this.active = [];
    for (let i = 0; i < size; i++) this.pool.push(factory());
  }
  get() {
    const item = this.pool.length > 0 ? this.pool.pop() : this.active.length > 0 ? this.active.shift() : null;
    if (item) this.active.push(item);
    return item;
  }
  release(item) {
    const idx = this.active.indexOf(item);
    if (idx >= 0) { this.active.splice(idx, 1); this.pool.push(item); }
  }
  updateAll(dt, fn) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      if (!fn(this.active[i], dt)) {
        this.pool.push(this.active[i]);
        this.active.splice(i, 1);
      }
    }
  }
}

    this.bgmGain = null;
    this.sfxGain = null;
    this.initialized = false;
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = CONFIG.BGM_VOL;
      this.bgmGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = CONFIG.SFX_VOL;
      this.sfxGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch(e) { console.warn('Audio init failed', e); }
  }
  toggleMute() {
    this.muted = !this.muted;
    if (this.bgmGain) this.bgmGain.gain.value = this.muted ? 0 : CONFIG.BGM_VOL;
    if (this.sfxGain) this.sfxGain.gain.value = this.muted ? 0 : CONFIG.SFX_VOL;
  }
  playTone(freq, duration, type, vol, freqEnd) {
    if (!this.ctx || this.muted) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, this.ctx.currentTime + duration);
    gain.gain.setValueAtTime((vol || 0.3) * CONFIG.SFX_VOL, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(this.ctx.currentTime);
    osc.stop(this.ctx.currentTime + duration);
  }
  playNoise(duration, vol) {
    if (!this.ctx || this.muted) return;
    const bufSize = this.ctx.sampleRate * duration;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime((vol || 0.3) * CONFIG.SFX_VOL, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
    src.connect(gain);
    gain.connect(this.ctx.destination);
    src.start(this.ctx.currentTime);
  }
  sfxRunePlace()    { this.playTone(500, 0.02, 'sine', 0.4); }
  sfxRuneRemove()   { this.playTone(300, 0.015, 'sine', 0.3, 200); }
  sfxMagicActivate(){ this.playTone(200, 0.3, 'sine', 0.5, 800); }
  sfxMagicHit()     { this.playNoise(0.05, 0.4); }
  sfxEnemyDie()     { this.playTone(600, 0.2, 'sine', 0.3, 100); }
  sfxBossAppear()   { this.playTone(60, 0.5, 'sine', 0.6); }
  sfxStageClear()   {
    if (!this.ctx || this.muted) return;
    const notes = [261.6, 329.6, 392.0, 523.3];
    notes.forEach((f, i) => {
      const t2 = this.ctx.currentTime + i * 0.15;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, t2);
      g.gain.setValueAtTime(0.3 * CONFIG.SFX_VOL, t2);
      g.gain.linearRampToValueAtTime(0, t2 + 0.3);
      osc.connect(g); g.connect(this.ctx.destination);
      osc.start(t2); osc.stop(t2 + 0.3);
    });
  }
  sfxLifeLoss()     { this.playTone(100, 0.3, 'square', 0.4); }
  sfxRecipeFound()  { this.playTone(1200, 0.2, 'sine', 0.3); }
  sfxUpgradeBuy()   { this.playTone(800, 0.1, 'sine', 0.3); }
  sfxUIClick()      { this.playTone(600, 0.05, 'sine', 0.2); }
  sfxEnvDestroy()   { this.playNoise(0.08, 0.3); this.playTone(400, 0.1, 'triangle', 0.3, 200); }
  sfxComposite()    { this.playTone(300, 0.4, 'sine', 0.5, 1200); }
}

// --- ScrollManager ---
class ScrollManager {
  constructor() { this.reset(); }
  reset() {
    this.offset = 0; this.startY = 0; this.dragging = false;
    this.momentum = 0; this.contentH = 0; this.viewH = 0;
  }
  get minScroll() { return Math.min(0, this.viewH - this.contentH); }
  onTouchStart(y) { this.startY = y; this.dragging = true; this.momentum = 0; }
  onTouchMove(y) {
    if (!this.dragging) return false;
    const delta = y - this.startY;
    if (Math.abs(delta) < CONFIG.SCROLL_THRESHOLD) return false;
    this.offset += delta;
    this.momentum = delta;
    this.startY = y;
    return true;
  }
  onTouchEnd() { this.dragging = false; }
  onWheel(deltaY) { this.offset -= deltaY * 0.5; this.momentum = 0; }
  update() {
    if (!this.dragging && Math.abs(this.momentum) > 0.5) {
      this.offset += this.momentum;
      this.momentum *= CONFIG.MOMENTUM_DECAY;
    }
    if (this.offset > 0) this.offset *= CONFIG.BOUNCE_FACTOR;
    const ms = this.minScroll;
    if (this.offset < ms) this.offset = ms + (this.offset - ms) * CONFIG.BOUNCE_FACTOR;
  }
}

// Initialize empty grid
function initGrid() {
  grid = [];
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    grid[r] = [];
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) grid[r][c] = null;
  }
}

// Place a rune on the grid
function placeRune(row, col, runeType) {
  if (row < 0 || row >= CONFIG.GRID_SIZE || col < 0 || col >= CONFIG.GRID_SIZE) return false;
  if (grid[row][col] !== null) return false;
  if (isPlacingRune) return false;
  grid[row][col] = runeType;
  gridCacheDirty = true;
  sound.sfxRunePlace();
  return true;
}

// Remove rune from grid
function removeRune(row, col) {
  if (row < 0 || row >= CONFIG.GRID_SIZE || col < 0 || col >= CONFIG.GRID_SIZE) return null;
  const rune = grid[row][col];
  if (!rune) return null;
  grid[row][col] = null;
  gridCacheDirty = true;
  sound.sfxRuneRemove();
  return rune;
}

// Scan for magic circles (pure function F3)
function scanMagicCircles(g) {
  const found = [];
  for (const pattern of PATTERN_DATA) {
    // Secret pattern requires mastery upgrade
    if (pattern.id === 'secret' && upgrades.mastery < 1) continue;
    const matches = pattern.check(g);
    if (matches && matches.length > 0) {
      for (const m of matches) {
        found.push({ patternId: pattern.id, name: pattern.name, mult: pattern.mult, cells: m.cells, runeType: m.runeType });
      }
    }
  }
  return found;
}

// Pattern matching helpers (pure functions)
function findLine(g, len, horiz) {
  const results = [];
  const rows = horiz ? CONFIG.GRID_SIZE : CONFIG.GRID_SIZE - len + 1;
  const cols = horiz ? CONFIG.GRID_SIZE - len + 1 : CONFIG.GRID_SIZE;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const first = g[r][c];
      if (!first) continue;
      let match = true;
      const cells = [];
      for (let i = 0; i < len; i++) {
        const cr = horiz ? r : r + i;
        const cc = horiz ? c + i : c;
        if (g[cr][cc] !== first) { match = false; break; }
        cells.push([cr, cc]);
      }
      if (match) results.push({ cells, runeType: first });
    }
  }
  return results;
}

function findDiag(g, len, dir) {
  const results = [];
  for (let r = 0; r <= CONFIG.GRID_SIZE - len; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      const endC = c + (len - 1) * dir;
      if (endC < 0 || endC >= CONFIG.GRID_SIZE) continue;
      const first = g[r][c];
      if (!first) continue;
      let match = true;
      const cells = [];
      for (let i = 0; i < len; i++) {
        const cr = r + i, cc = c + i * dir;
        if (g[cr][cc] !== first) { match = false; break; }
        cells.push([cr, cc]);
      }
      if (match) results.push({ cells, runeType: first });
    }
  }
  return results;
}

function findLShape(g) {
  const results = [];
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      if (!g[r][c]) continue;
      const base = g[r][c];
      for (const [dr1,dc1] of dirs) {
        const r2 = r+dr1, c2 = c+dc1;
        if (r2<0||r2>=5||c2<0||c2>=5||g[r2][c2]!==base) continue;
        for (const [dr2,dc2] of dirs) {
          if (dr2===dr1&&dc2===dc1) continue;
          if (dr2===-dr1&&dc2===-dc1) continue;
          const r3 = r2+dr2, c3 = c2+dc2;
          if (r3<0||r3>=5||c3<0||c3>=5) continue;
          if (g[r3][c3] && g[r3][c3] !== base) {
            results.push({ cells:[[r,c],[r2,c2],[r3,c3]], runeType: base });
          }
        }
      }
    }
  }
  return results.length > 0 ? results.slice(0,2) : [];
}

function findTShape(g) {
  const results = [];
  for (let r = 1; r < 4; r++) {
    for (let c = 1; c < 4; c++) {
      if (!g[r][c]) continue;
      const base = g[r][c];
      if (g[r-1]&&g[r-1][c]===base && g[r][c-1]===base && g[r][c+1]===base) {
        results.push({ cells:[[r,c],[r-1,c],[r,c-1],[r,c+1]], runeType:base });
      }
    }
  }
  return results;
}

function findCross(g) {
  const results = [];
  for (let r = 1; r < 4; r++) {
    for (let c = 1; c < 4; c++) {
      const center = g[r][c];
      if (!center) continue;
      if (g[r-1][c]&&g[r+1][c]&&g[r][c-1]&&g[r][c+1]) {
        results.push({ cells:[[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]], runeType:center });
      }
    }
  }
  return results;
}

function findSquare(g) {
  const results = [];
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const base = g[r][c];
      if (!base) continue;
      if (g[r][c+1]===base && g[r+1][c]===base && g[r+1][c+1]===base) {
        results.push({ cells:[[r,c],[r,c+1],[r+1,c],[r+1,c+1]], runeType:base });
      }
    }
  }
  return results;
}

function findXShape(g) {
  const results = [];
  for (let r = 1; r < 4; r++) {
    for (let c = 1; c < 4; c++) {
      const center = g[r][c];
      if (!center) continue;
      if (g[r-1][c-1]===center&&g[r-1][c+1]===center&&g[r+1][c-1]===center&&g[r+1][c+1]===center) {
        results.push({ cells:[[r,c],[r-1,c-1],[r-1,c+1],[r+1,c-1],[r+1,c+1]], runeType:center });
      }
    }
  }
  return results;
}

function findDoubleLine(g) {
  const results = [];
  // Two parallel line-3 (same rune)
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c <= 2; c++) {
      const base = g[r][c];
      if (!base) continue;
      if (g[r][c+1]===base&&g[r][c+2]===base&&g[r+1][c]===base&&g[r+1][c+1]===base&&g[r+1][c+2]===base) {
        results.push({ cells:[[r,c],[r,c+1],[r,c+2],[r+1,c],[r+1,c+1],[r+1,c+2]], runeType:base });
      }
    }
  }
  return results;
}

// Mixed Cross: cross shape with 5 different rune types (§2.7)
function findMixedCross(g) {
  const results = [];
  for (let r = 1; r < 4; r++) {
    for (let c = 1; c < 4; c++) {
      const center = g[r][c];
      if (!center) continue;
      const up = g[r-1][c], down = g[r+1][c], left = g[r][c-1], right = g[r][c+1];
      if (!up || !down || !left || !right) continue;
      const types = new Set([center, up, down, left, right]);
      if (types.size === 5) {
        results.push({ cells:[[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]], runeType: center });
      }
    }
  }
  return results;
}

// Secret pattern: full diagonal (corner to corner, all same rune) — requires mastery upgrade
function findSecret(g) {
  const results = [];
  // Main diagonal (top-left to bottom-right)
  const tl = g[0][0];
  if (tl && g[1][1]===tl && g[2][2]===tl && g[3][3]===tl && g[4][4]===tl) {
    results.push({ cells:[[0,0],[1,1],[2,2],[3,3],[4,4]], runeType: tl });
  }
  // Anti-diagonal
  const tr = g[0][4];
  if (tr && g[1][3]===tr && g[2][2]===tr && g[3][1]===tr && g[4][0]===tr) {
    results.push({ cells:[[0,4],[1,3],[2,2],[3,1],[4,0]], runeType: tr });
  }
  return results;
}

// Activate matched magic circles with composite bonus (§2.7)
function activateCircles() {
  if (isTransitioning || gameState !== 'PUZZLE') return;
  matchedCircles = scanMagicCircles(grid);
  activatedMagics = [];
  compositeBonus = { type: null, mult: 1 };

  if (matchedCircles.length > 0) {
    // Compute composite bonuses (§2.7)
    const runeTypes = matchedCircles.map(mc => mc.runeType);
    const typeCounts = {};
    runeTypes.forEach(rt => { typeCounts[rt] = (typeCounts[rt]||0) + 1; });

    // Same attribute x2 = Elemental Burst (1.5x)
    const hasBurst = Object.values(typeCounts).some(c => c >= 2);
    // Opposing pair = Elemental Clash (radius 2x)
    const hasClash = runeTypes.some((a,i) => runeTypes.some((b,j) => i!==j && areOpposing(a,b)));
    // 3+ circles = Magic Storm (screen-wide AOE)
    const hasStorm = matchedCircles.length >= 3;

    if (hasStorm) {
      compositeBonus = { type: 'storm', mult: 1.5 };
      addNotification(t('magicStorm'));
      sound.sfxComposite();
    } else if (hasClash) {
      compositeBonus = { type: 'clash', mult: 1 };
      addNotification(t('elementalClash'));
      sound.sfxComposite();
    } else if (hasBurst) {
      compositeBonus = { type: 'burst', mult: 1.5 };
      addNotification(t('elementalBurst'));
      sound.sfxComposite();
    }

    for (const mc of matchedCircles) {
      const rd = RUNE_DATA[mc.runeType];
      let dmg = rd.damage * mc.mult * (1 + upgrades.runeBoost * 0.15);
      // Apply burst bonus
      if (hasBurst && typeCounts[mc.runeType] >= 2) dmg *= 1.5;
      const magic = { runeType: mc.runeType, damage: dmg, effect: rd.effect, effectVal: rd.effectVal, magicType: rd.magicType, isClash: hasClash, isStorm: hasStorm };
      activatedMagics.push(magic);
      // Score for activation
      if (mc.patternId === 'secret') addScore(500, 'magic');
      else if (mc.mult >= 3.0) addScore(150, 'magic');
      else addScore(50, 'magic');
      // Check recipe discovery
      if (!discoveredRecipes.includes(mc.patternId)) {
        discoveredRecipes.push(mc.patternId);
        addScore(200, 'recipe');
        modifyCrystals(15);
        addNotification(t('newRecipe'));
        sound.sfxRecipeFound();
        // Check recipe collector achievement
        if (discoveredRecipes.length >= Math.floor(PATTERN_DATA.length * 0.3)) {
          checkAchievement('recipe_collector');
        }
      }
      // Check mixed cross achievement
      if (mc.patternId === 'mixedcross') {
        checkAchievement('five_elements');
      }
    }
    sound.sfxMagicActivate();

    // Speed mage achievement: 3+ circles within 10 sec
    if (matchedCircles.length >= 3 && (gameTime - stageStartTime) <= 10) {
      checkAchievement('speed_mage');
    }
  } else {
    // Weak basic attacks from unmatched runes (0.5x)
    for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) {
      if (grid[r][c]) {
        const rd = RUNE_DATA[grid[r][c]];
        activatedMagics.push({ runeType: grid[r][c], damage: rd.damage * 0.5, effect: null, effectVal: 0, magicType: 'basic', isClash: false, isStorm: false });
      }
    }
  }

  // Add upgrade-based extra shots
  const extraShots = upgrades.mana;
  for (let i = 0; i < extraShots && activatedMagics.length > 0; i++) {
    activatedMagics.push({...activatedMagics[i % activatedMagics.length]});
  }

  // If storm, add a screen-wide AOE magic
  if (compositeBonus.type === 'storm') {
    activatedMagics.push({ runeType: 'fire', damage: 30, effect: null, effectVal: 0, magicType: 'storm_aoe', isClash: false, isStorm: true });
  }

  beginTransition('DEFENSE');
}

// Spawn a single enemy (with optional elite flag)
function spawnEnemy(type, lane, regionIdx, isElite) {
  const ed = ENEMY_DATA[type];
  const diff = DIFFICULTY_DATA[difficulty];
  const reg = REGION_DATA[regionIdx];
  const laneY = getLaneY(lane);
  const eliteMult = isElite ? 2.0 : 1.0;
  return {
    type, lane, x: W + 40, y: laneY,
    hp: ed.hp * reg.hpMult * diff.enemyMult * eliteMult,
    maxHp: ed.hp * reg.hpMult * diff.enemyMult * eliteMult,
    speed: ed.speed * reg.spdMult * (isElite ? 0.8 : 1.0),
    reward: ed.reward,
    color: ed.color,
    shape: ed.shape,
    hitAnim: 0,
    freezeTimer: 0,
    slowTimer: 0,
    curseTimer: 0,
    curseDmg: 0,
    alive: true,
    size: isElite ? 26 : 20,
    isElite: !!isElite
  };
}

// Get Y position for a lane
function getLaneY(lane) {
  const laneH = H * 0.6 / CONFIG.LANE_COUNT;
  return H * 0.2 + laneH * lane + laneH * 0.5;
}

// Update enemies
function updateEnemies(enms, dt) {
  for (let i = enms.length - 1; i >= 0; i--) {
    const e = enms[i];
    if (!e.alive) continue;
    if (e.freezeTimer > 0) { e.freezeTimer -= dt; continue; }
    const speedMod = e.slowTimer > 0 ? 0.7 : 1.0;
    if (e.slowTimer > 0) e.slowTimer -= dt;
    if (e.curseTimer > 0) {
      e.curseTimer -= dt;
      e.hp -= e.curseDmg * dt;
    }
    e.x -= e.speed * speedMod * dt;
    if (e.hitAnim > 0) e.hitAnim -= dt;
    // Reached left edge
    if (e.x < 40) {
      e.alive = false;
      modifyLives(-1);
      stageLivesLost++;
      enms.splice(i, 1);
    }
    // Dead from DOT
    if (e.hp <= 0 && e.alive) {
      e.alive = false;
      onEnemyKill(e);
      enms.splice(i, 1);
    }
  }
}

// Handle enemy kill (with elite scoring §8.1)
function onEnemyKill(e) {
  const regionMult = currentRegion + 1;
  const scoreBase = e.isElite ? 300 : e.reward;
  addScore(scoreBase * regionMult, 'kill');
  const crystalGain = Math.floor((1 + Math.random() * 3) * (1 + upgrades.magnet * 0.2));
  modifyCrystals(crystalGain);
  sound.sfxEnemyDie();
  spawnParticles(e.x, e.y, e.isElite ? 14 : 8, e.color);
  hitEffects.push({ x: e.x, y: e.y, life: 0.4, maxLife: 0.4 });
}

// Collision check (pure function)
function checkCollision(px, py, pr, ex, ey, er) {
  const dx = px - ex, dy = py - ey;
  return dx * dx + dy * dy < (pr + er) * (pr + er);
}

// Apply damage (pure function)
function applyDamage(hp, amount, defense) {
  return Math.max(0, hp - Math.max(0, amount - (defense || 0)));
}

// Update projectiles
function updateProjectiles(dt) {
  projPool.updateAll(dt, (p, dt2) => {
    p.x += p.vx * dt2;
    p.y += p.vy * dt2;
    p.life -= dt2;
    // Add trail
    if (p.life > 0) {
      projTrails.push({ x: p.x, y: p.y, color: RUNE_DATA[p.runeType]?.color || '#fff', life: 0.2, maxLife: 0.2, size: p.radius * 0.6 });
    }
    if (p.life <= 0 || p.x > W + 20 || p.x < -20) return false;

    // Storm AOE hits all enemies
    if (p.runeType === 'storm_aoe') {
      for (const e of enemies) {
        if (e.alive) {
          e.hp = applyDamage(e.hp, p.damage, 0);
          e.hitAnim = 0.15;
          spawnParticles(e.x, e.y, 3, '#FFAA00');
          if (e.hp <= 0 && e.alive) {
            e.alive = false;
            onEnemyKill(e);
            const idx = enemies.indexOf(e);
            if (idx >= 0) enemies.splice(idx, 1);
          }
        }
      }
      return false;
    }

    // Check collision with enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (checkCollision(p.x, p.y, p.radius, e.x, e.y, e.size)) {
        e.hp = applyDamage(e.hp, p.damage, 0);
        e.hitAnim = 0.15;
        const rd = RUNE_DATA[p.runeType];
        if (rd && rd.effect === 'slow') e.slowTimer = 2;
        if (rd && rd.effect === 'freeze') e.freezeTimer = rd.effectVal;
        if (rd && rd.effect === 'knockback') e.x += rd.effectVal * 30;
        if (rd && rd.effect === 'curse') { e.curseTimer = 3; e.curseDmg = rd.effectVal; }
        sound.sfxMagicHit();
        spawnParticles(p.x, p.y, 4, rd ? rd.color : '#fff');
        hitEffects.push({ x: p.x, y: p.y, life: 0.3, maxLife: 0.3 });
        if (e.hp <= 0 && e.alive) {
          e.alive = false;
          onEnemyKill(e);
          const idx = enemies.indexOf(e);
          if (idx >= 0) enemies.splice(idx, 1);
        }
        return false;
      }
    }
    // Check collision with env objects
    for (let i = envObjects.length - 1; i >= 0; i--) {
      const eo = envObjects[i];
      if (eo.type === 'magmaPool') continue; // Magma pools aren't destroyed by projectiles
      if (checkCollision(p.x, p.y, p.radius, eo.x, eo.y, 15)) {
        eo.hp -= p.damage;
        if (eo.hp <= 0) {
          onEnvObjectDestroy(eo, i);
        }
        return false;
      }
    }
    return true;
  });
}

// Handle env object destruction (§4.6)
function onEnvObjectDestroy(eo, idx) {
  const def = ENV_OBJECT_DATA[eo.type];
  sound.sfxEnvDestroy();
  spawnParticles(eo.x, eo.y, 10, def.color);
  if (Math.random() < def.rewardChance) {
    switch(def.reward) {
      case 'rune':
        // 20% chance to drop a rune — just add crystals instead in this context
        modifyCrystals(Math.floor(1 + Math.random() * 3));
        break;
      case 'crystal':
        const amt = Math.floor(1 + Math.random() * 5);
        modifyCrystals(amt);
        addNotification('+' + amt + ' 💎');
        break;
      case 'freeze':
        // Freeze all nearby enemies
        for (const e of enemies) {
          if (Math.abs(e.y - eo.y) < 60) e.freezeTimer = 3;
        }
        addNotification('❄ Freeze!');
        break;
      case 'buff':
        // Random buff — boost next magic damage
        addScore(100, 'env');
        addNotification('✨ Buff!');
        break;
    }
  }
  envObjects.splice(idx, 1);
}

// Fire magic at enemies
function fireMagic(dt) {
  if (activatedMagics.length === 0) return;
  magicFireTimer -= dt;
  if (magicFireTimer <= 0 && enemies.length > 0) {
    magicFireTimer = magicFireInterval;
    const magic = activatedMagics.shift();
    if (!magic) return;
    // Find nearest enemy
    let target = enemies[0];
    for (const e of enemies) { if (e.alive && e.x < target.x) target = e; }
    const p = projPool.get();
    if (p) {
      const startX = 60;
      const startY = H * 0.5;
      const dx = target.x - startX, dy = target.y - startY;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      p.x = startX; p.y = startY;
      p.vx = (dx/dist) * 300; p.vy = (dy/dist) * 300;
      p.damage = magic.damage; p.runeType = magic.runeType;
      p.life = 3; p.radius = magic.isClash ? 14 : 8;
    }
  }
}

// §F. BOSS SYSTEM
// ═══════════════════════════════════════════════════════════════

function initBoss(bossId) {
  const bd = BOSS_DATA[bossId];
  const diff = DIFFICULTY_DATA[difficulty];
  boss = {
    id: bossId, ...bd,
    currentHp: bd.hp * diff.enemyMult,
    maxHp: bd.hp * diff.enemyMult,
    x: W * 0.75, y: H * 0.4,
    phase: 1, hitAnim: 0,
    attackTimer: 3.0,
    size: 60
  };
  bossLivesLostDuringFight = 0;
}

function updateBoss(dt) {
  if (!boss) return;
  boss.hitAnim = Math.max(0, boss.hitAnim - dt);
  boss.attackTimer -= dt;
  if (boss.attackTimer <= 0) {
    boss.attackTimer = 2.5;
    const shieldChance = [0, 0.3, 0.5, 0.7][upgrades.shield] || 0;
    if (Math.random() > shieldChance) {
      modifyLives(-1);
      stageLivesLost++;
      bossLivesLostDuringFight++;
      camShakeIntensity = 8;
      sound.sfxLifeLoss();
    }
  }
  // Check projectile hits on boss
  projPool.updateAll(dt, (p, dt2) => {
    if (checkCollision(p.x, p.y, p.radius, boss.x, boss.y, boss.size)) {
      boss.currentHp = applyDamage(boss.currentHp, p.damage, 0);
      boss.hitAnim = 0.15;
      sound.sfxMagicHit();
      spawnParticles(p.x, p.y, 6, RUNE_DATA[p.runeType]?.color || '#fff');
      hitEffects.push({ x: p.x, y: p.y, life: 0.3, maxLife: 0.3 });
      if (boss.phase < boss.phases && boss.currentHp <= boss.maxHp * (1 - boss.phase / boss.phases)) {
        boss.phase++;
        camShakeIntensity = 12;
        spawnParticles(boss.x, boss.y, 20, boss.color);
      }
      if (boss.currentHp <= 0) {
        onBossKill();
      }
      return false;
    }
    p.x += p.vx * dt2; p.y += p.vy * dt2; p.life -= dt2;
    return p.life > 0;
  });
}

function onBossKill() {
  const bd = BOSS_DATA[boss.id];
  addScore(2000 * (currentRegion + 1), 'boss');
  modifyCrystals(bd.crystalReward);
  spawnParticles(boss.x, boss.y, 30, C.gold);
  sound.sfxStageClear();
  camShakeIntensity = 15;
  // Perfect defense achievement
  if (bossLivesLostDuringFight === 0) {
    checkAchievement('perfect_defense');
  }
  // Dark ender achievement (final boss)
  if (boss.id === 'dark_mage') {
    checkAchievement('dark_ender');
  }
  // Golem slayer achievement (hidden boss)
  if (boss.id === 'rune_golem') {
    checkAchievement('golem_slayer');
  }
  boss = null;
  beginTransition('RESULT');
}

function updateCamera(dt) {
  camZoom += (camTargetZoom - camZoom) * 3 * dt;
  if (camShakeIntensity > 0) {
    camShakeX = (Math.random() - 0.5) * camShakeIntensity;
    camShakeY = (Math.random() - 0.5) * camShakeIntensity;
    camShakeIntensity *= 0.9;
    if (camShakeIntensity < 0.5) camShakeIntensity = 0;
  } else {
    camShakeX = 0; camShakeY = 0;
  }
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const p = particlePool.get();
    if (!p) return;
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 150;
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.life = 0.5 + Math.random() * 0.5;
    p.maxLife = p.life;
    p.color = color;
    p.size = 2 + Math.random() * 4;
  }
}

// ═══════════════════════════════════════════════════════════════
// §H. UPGRADE & PROGRESSION
// ═══════════════════════════════════════════════════════════════

function buyUpgrade(id) {
  const ud = UPGRADE_DATA[id];
  const lv = upgrades[id];
  if (lv >= ud.maxLv) return false;
  const cost = ud.costs[lv];
  if (crystals < cost) return false;
  modifyCrystals(-cost);
  upgrades[id]++;
  sound.sfxUpgradeBuy();
  saveProgress();
  return true;
}

function saveProgress() {
  try {
    const data = {
      version: 1, currentRegion, currentStage, clearedStages,
      crystals, highScore, upgrades, discoveredRecipes, achievements, hiddenFound, difficulty
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.version !== 1) return;
    currentRegion = data.currentRegion || 0;
    currentStage = data.currentStage || 0;
    clearedStages = data.clearedStages || [];
    crystals = data.crystals || 0;
    highScore = data.highScore || 0;
    upgrades = { ...upgrades, ...(data.upgrades || {}) };
    discoveredRecipes = data.discoveredRecipes || [];
    achievements = data.achievements || [];
    hiddenFound = data.hiddenFound || [false, false];
    difficulty = data.difficulty || 'mage';
  } catch(e) {}
}

// Check and grant achievement with crystal reward
function checkAchievement(id) {
  if (achievements.includes(id)) return;
  achievements.push(id);
  const def = ACHIEVEMENT_DEFS[id];
  if (def && def.reward > 0) {
    modifyCrystals(def.reward);
  }
  achievementPopup = { id, name: def ? (lang === 'ko' ? def.name : def.nameEn) : id, timer: 3.0 };
  sound.sfxRecipeFound();
  saveProgress();
}

// Check hidden stage discovery conditions (§9.3)
function checkHiddenStages() {
  // Hidden 1: Desert 2-3 cleared + sphinx boss cleared with specific pattern
  if (!hiddenFound[0]) {
    const desert3Cleared = clearedStages.includes('2-3');
    const sphinxCleared = clearedStages.includes('boss_sphinx');
    if (desert3Cleared && sphinxCleared && discoveredRecipes.includes('cross')) {
      hiddenFound[0] = true;
      addNotification(t('hiddenFound'));
      checkAchievement('secret_door');
      saveProgress();
    }
  }
  // Hidden 2: All 5 regions cleared + recipe book 80%+
  if (!hiddenFound[1]) {
    const allRegionsCleared = [1,2,3,4,5].every(r => [1,2,3].every(s => clearedStages.includes(r+'-'+s)));
    const recipePercent = discoveredRecipes.length / PATTERN_DATA.length;
    if (allRegionsCleared && recipePercent >= 0.8) {
      hiddenFound[1] = true;
      addNotification(t('hiddenFound'));
      checkAchievement('secret_door');
      saveProgress();
    }
  }
}

// Single update path functions (F16)
function modifyLives(delta) {
  lives = Math.max(0, Math.min(maxLives, lives + delta));
  if (delta < 0) {
    camShakeIntensity = 10;
    sound.sfxLifeLoss();
  }
  if (lives <= 0 && gameState !== 'GAMEOVER' && gameState !== 'TITLE') {
    beginTransition('GAMEOVER');
  }
}

function modifyCrystals(delta) {
  crystals = Math.max(0, crystals + delta);
}

function addScore(amount, reason) {
  score += amount;
  stageScore += amount;
  if (reason !== 'time') {
    notifications.push({ text: '+' + amount, x: W * 0.5, y: H * 0.3, life: 1.0, color: C.gold });
  }
}

function addNotification(text) {
  notifications.push({ text, x: W * 0.5, y: H * 0.2, life: 2.0, color: C.cyan });
}

// §I. RENDERING

// Draw a rune symbol with radial gradient at given position
function drawRune(cx, cy, runeType, size) {
  const rd = RUNE_DATA[runeType];
  if (!rd) return;
  const s = size * 0.4;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = rd.color;
  ctx.shadowBlur = 8;

  // Create radial gradient for richer look
  let grad;
  try {
    grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
    grad.addColorStop(0, rd.color);
    grad.addColorStop(1, rd.colorDark || rd.color);
  } catch(e) { grad = rd.color; }

  switch(runeType) {
    case 'fire': // Triple-layer flame
      ctx.fillStyle = rd.colorDark;
      ctx.beginPath();
      ctx.moveTo(0, -s*1.1); ctx.lineTo(-s*0.8, s*0.7); ctx.lineTo(s*0.8, s*0.7);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = rd.color;
      ctx.beginPath();
      ctx.moveTo(0, -s*0.8); ctx.lineTo(-s*0.6, s*0.5); ctx.lineTo(s*0.6, s*0.5);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFAA44';
      ctx.beginPath();
      ctx.moveTo(0, -s*0.4); ctx.lineTo(-s*0.3, s*0.3); ctx.lineTo(s*0.3, s*0.3);
      ctx.closePath(); ctx.fill();
      break;
    case 'water': // Droplet with inner highlight
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.bezierCurveTo(s*0.8, -s*0.2, s*0.6, s*0.8, 0, s);
      ctx.bezierCurveTo(-s*0.6, s*0.8, -s*0.8, -s*0.2, 0, -s);
      ctx.fill();
      // Inner highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(-s*0.15, -s*0.2, s*0.15, s*0.25, -0.3, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'earth': // Diamond with internal cross + gradient
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#BBCC66'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s*0.3, -s*0.3); ctx.lineTo(s*0.3, s*0.3);
      ctx.moveTo(s*0.3, -s*0.3); ctx.lineTo(-s*0.3, s*0.3);
      ctx.stroke();
      // Center gem
      ctx.fillStyle = '#CCEE88';
      ctx.beginPath(); ctx.arc(0, 0, s*0.15, 0, Math.PI*2); ctx.fill();
      break;
    case 'wind': // Spiral with gradient
      ctx.strokeStyle = grad; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 3; a += 0.1) {
        const r2 = s * 0.15 + a * s * 0.1;
        const px = Math.cos(a) * r2, py = Math.sin(a) * r2;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      // Center dot
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, s*0.08, 0, Math.PI*2); ctx.fill();
      break;
    case 'thunder': // Bold lightning bolt
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-s*0.25, -s); ctx.lineTo(s*0.35, -s*0.2);
      ctx.lineTo(-s*0.05, 0); ctx.lineTo(s*0.45, s);
      ctx.lineTo(-s*0.05, s*0.2); ctx.lineTo(s*0.15, 0);
      ctx.lineTo(-s*0.45, -s*0.2);
      ctx.closePath(); ctx.fill();
      // Inner glow line
      ctx.strokeStyle = '#FFFFAA'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s*0.1, -s*0.6); ctx.lineTo(s*0.1, -s*0.1);
      ctx.lineTo(-s*0.02, s*0.1); ctx.lineTo(s*0.2, s*0.6);
      ctx.stroke();
      break;
    case 'ice': // Detailed snowflake
      ctx.strokeStyle = grad; ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const angle = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(angle) * s, Math.sin(angle) * s);
        ctx.stroke();
        // Branches
        const bx = Math.cos(angle) * s * 0.6, by = Math.sin(angle) * s * 0.6;
        ctx.beginPath(); ctx.moveTo(bx, by);
        ctx.lineTo(bx + Math.cos(angle + 0.5) * s * 0.3, by + Math.sin(angle + 0.5) * s * 0.3);
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx, by);
        ctx.lineTo(bx + Math.cos(angle - 0.5) * s * 0.3, by + Math.sin(angle - 0.5) * s * 0.3);
        ctx.stroke();
      }
      // Center crystal
      ctx.fillStyle = '#CCFFFF';
      ctx.beginPath(); ctx.arc(0, 0, s*0.12, 0, Math.PI*2); ctx.fill();
      break;
    case 'light': // Sun with radial gradient
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = rd.color; ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const angle = i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * s * 0.55, Math.sin(angle) * s * 0.55);
        ctx.lineTo(Math.cos(angle) * s, Math.sin(angle) * s);
        ctx.stroke();
      }
      // Center bright spot
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2); ctx.fill();
      break;
    case 'dark': // Crescent with stars
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1A1A2E';
      ctx.beginPath(); ctx.arc(s * 0.25, -s * 0.15, s * 0.55, 0, Math.PI * 2); ctx.fill();
      // Tiny stars
      ctx.fillStyle = '#CCAAEE';
      ctx.beginPath(); ctx.arc(-s*0.3, s*0.2, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.1, -s*0.3, 1, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Draw enemy with detailed shapes per type
function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.hitAnim > 0) { ctx.globalAlpha = 0.6 + Math.sin(e.hitAnim * 40) * 0.4; }
  if (e.freezeTimer > 0) { ctx.globalAlpha *= 0.6; }

  const s = e.size;
  ctx.shadowColor = e.color;
  ctx.shadowBlur = e.isElite ? 12 : 6;

  switch(e.shape) {
    case 'circle': // Slime: rounded blob with eyes + mouth
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.ellipse(0, s*0.1, s, s*0.8, 0, 0, Math.PI*2);
      ctx.fill();
      // Shiny highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(-s*0.3, -s*0.2, s*0.25, s*0.15, -0.3, 0, Math.PI*2); ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-s*0.2, -s*0.08, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.3, -s*0.08, s*0.08, 0, Math.PI*2); ctx.fill();
      // Mouth
      ctx.strokeStyle = '#226622'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, s*0.15, s*0.2, 0.1, Math.PI-0.1); ctx.stroke();
      break;

    case 'triangle': // Goblin: triangular body + pointy ears + eyes + dagger
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(-s*0.8,s); ctx.lineTo(s*0.8,s); ctx.closePath(); ctx.fill();
      // Ears
      ctx.beginPath(); ctx.moveTo(-s*0.5,-s*0.3); ctx.lineTo(-s*0.9,-s*0.8); ctx.lineTo(-s*0.3,-s*0.5); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.3); ctx.lineTo(s*0.9,-s*0.8); ctx.lineTo(s*0.3,-s*0.5); ctx.fill();
      // Eyes (red/yellow)
      ctx.fillStyle = '#FF4444';
      ctx.beginPath(); ctx.arc(-s*0.2, -s*0.1, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.2, -s*0.1, s*0.1, 0, Math.PI*2); ctx.fill();
      // Dagger
      ctx.strokeStyle = '#CCCCCC'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s*0.7, s*0.3); ctx.lineTo(s*1.1, s*0.1); ctx.stroke();
      break;

    case 'rect': // Orc: bulky body + tusks + armor lines
      ctx.fillStyle = e.color;
      ctx.fillRect(-s, -s*0.8, s*2, s*1.6);
      // Armor plates
      ctx.strokeStyle = '#445544'; ctx.lineWidth = 2;
      ctx.strokeRect(-s*0.9, -s*0.7, s*1.8, s*1.4);
      ctx.beginPath(); ctx.moveTo(-s*0.9, 0); ctx.lineTo(s*0.9, 0); ctx.stroke();
      // Face
      ctx.fillStyle = '#557755';
      ctx.fillRect(-s*0.5, -s*0.6, s, s*0.5);
      // Eyes
      ctx.fillStyle = '#FF2222';
      ctx.beginPath(); ctx.arc(-s*0.25, -s*0.4, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.25, -s*0.4, s*0.1, 0, Math.PI*2); ctx.fill();
      // Tusks
      ctx.fillStyle = '#EEEECC';
      ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.15); ctx.lineTo(-s*0.4, s*0.15); ctx.lineTo(-s*0.2, -s*0.1); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.3, -s*0.15); ctx.lineTo(s*0.4, s*0.15); ctx.lineTo(s*0.2, -s*0.1); ctx.fill();
      break;

    case 'scorpion': // Multi-segment body + stinger tail + pincers
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2); ctx.fill();
      // Segments
      ctx.beginPath(); ctx.ellipse(-s*0.4,0,s*0.3,s*0.35,0,0,Math.PI*2); ctx.fill();
      // Tail (stinger)
      ctx.strokeStyle = e.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.3);
      ctx.quadraticCurveTo(s*1.2,-s*1.3,s*0.6,-s*1.1); ctx.stroke();
      ctx.fillStyle = '#FF4444';
      ctx.beginPath(); ctx.arc(s*0.6,-s*1.1,3,0,Math.PI*2); ctx.fill();
      // Pincers
      ctx.strokeStyle = e.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-s*0.6,-s*0.2); ctx.lineTo(-s*1.0,-s*0.5); ctx.lineTo(-s*0.8,-s*0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.6,s*0.2); ctx.lineTo(-s*1.0,s*0.5); ctx.lineTo(-s*0.8,s*0.6); ctx.stroke();
      // Eyes
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-s*0.2,-s*0.1,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.2,s*0.1,2,0,Math.PI*2); ctx.fill();
      break;

    case 'crystal': // Ice spirit: multifaceted crystal with inner glow
      ctx.fillStyle = e.color;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/2;ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}
      ctx.closePath(); ctx.fill();
      // Inner facets
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.7,0); ctx.lineTo(s*0.7,0); ctx.stroke();
      // Center glow
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(0, 0, s*0.25, 0, Math.PI*2); ctx.fill();
      break;

    case 'mage': // Fire mage: pointed hat + robe + staff + flame
      ctx.fillStyle = e.color;
      // Robe body
      ctx.beginPath(); ctx.moveTo(-s*0.5, -s*0.2); ctx.lineTo(-s*0.6, s);
      ctx.lineTo(s*0.6, s); ctx.lineTo(s*0.5, -s*0.2); ctx.closePath(); ctx.fill();
      // Hat
      ctx.fillStyle = '#CC3311';
      ctx.beginPath(); ctx.moveTo(0, -s*1.4); ctx.lineTo(-s*0.5, -s*0.2); ctx.lineTo(s*0.5, -s*0.2); ctx.closePath(); ctx.fill();
      // Hat brim
      ctx.fillStyle = '#AA2200';
      ctx.fillRect(-s*0.6, -s*0.25, s*1.2, s*0.12);
      // Face
      ctx.fillStyle = '#FFCCAA';
      ctx.beginPath(); ctx.arc(0, -s*0.1, s*0.25, 0, Math.PI*2); ctx.fill();
      // Eyes
      ctx.fillStyle = '#FF0000';
      ctx.beginPath(); ctx.arc(-s*0.1, -s*0.15, s*0.06, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.1, -s*0.15, s*0.06, 0, Math.PI*2); ctx.fill();
      // Staff
      ctx.strokeStyle = '#884422'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s*0.5, -s*0.3); ctx.lineTo(s*0.5, s); ctx.stroke();
      // Flame on staff
      ctx.fillStyle = '#FF6600';
      ctx.beginPath(); ctx.moveTo(s*0.5, -s*0.5); ctx.lineTo(s*0.35, -s*0.3); ctx.lineTo(s*0.65, -s*0.3); ctx.closePath(); ctx.fill();
      break;

    case 'knight': // Shadow knight: armored body + shield + sword
      // Body armor
      ctx.fillStyle = e.color;
      ctx.fillRect(-s*0.6,-s*0.8,s*1.2,s*1.6);
      // Helmet
      ctx.fillStyle = '#553388';
      ctx.beginPath();
      ctx.arc(0, -s*0.8, s*0.5, Math.PI, 0);
      ctx.fill();
      // Visor slit
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(-s*0.3, -s*0.7, s*0.6, s*0.1);
      // Shield (left)
      ctx.fillStyle = '#444466';
      ctx.beginPath();
      ctx.moveTo(-s*1.1, -s*0.4); ctx.lineTo(-s*0.7, -s*0.6);
      ctx.lineTo(-s*0.7, s*0.4); ctx.lineTo(-s*1.1, s*0.2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#666688'; ctx.lineWidth = 1; ctx.stroke();
      // Sword (right)
      ctx.strokeStyle = '#CCCCDD'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*0.7, -s*0.2); ctx.lineTo(s*1.2, -s*0.8); ctx.stroke();
      // Crossguard
      ctx.strokeStyle = '#AAAACC'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s*0.55, -s*0.15); ctx.lineTo(s*0.85, -s*0.25); ctx.stroke();
      break;

    case 'orb': // Chaos orb: pulsating multi-colored sphere with orbiting particles
      const t2 = gameTime * 3;
      const r2 = s * (0.8 + Math.sin(t2)*0.2);
      // Multi-color gradient
      const orbGrad = ctx.createRadialGradient(0,0,0,0,0,r2);
      orbGrad.addColorStop(0, '#FFFFFF');
      orbGrad.addColorStop(0.3, e.color);
      orbGrad.addColorStop(1, '#440044');
      ctx.fillStyle = orbGrad;
      ctx.beginPath(); ctx.arc(0,0,r2,0,Math.PI*2); ctx.fill();
      // Orbiting particles
      for (let i = 0; i < 4; i++) {
        const angle = t2 + i * Math.PI / 2;
        const ox = Math.cos(angle) * (r2 + 5);
        const oy = Math.sin(angle) * (r2 + 5);
        ctx.fillStyle = ['#FF44FF','#44FF44','#FFFF44','#44FFFF'][i];
        ctx.beginPath(); ctx.arc(ox, oy, 2, 0, Math.PI*2); ctx.fill();
      }
      // Inner eye
      ctx.fillStyle = '#FF0000';
      ctx.beginPath(); ctx.arc(0, 0, r2*0.15, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.shadowBlur = 0;

  // Elite crown indicator
  if (e.isElite) {
    ctx.fillStyle = C.gold;
    ctx.beginPath();
    ctx.moveTo(-s*0.4, -s-4); ctx.lineTo(-s*0.3, -s-10);
    ctx.lineTo(-s*0.1, -s-6); ctx.lineTo(0, -s-12);
    ctx.lineTo(s*0.1, -s-6); ctx.lineTo(s*0.3, -s-10);
    ctx.lineTo(s*0.4, -s-4); ctx.closePath(); ctx.fill();
  }

  // HP bar
  const hpPct = e.hp / e.maxHp;
  const barW = e.size * 2;
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#333'; ctx.fillRect(-barW/2, -e.size - (e.isElite ? 16 : 10), barW, 4);
  ctx.fillStyle = hpPct > 0.5 ? '#44FF44' : hpPct > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillRect(-barW/2, -e.size - (e.isElite ? 16 : 10), barW * hpPct, 4);

  ctx.restore();
}

// Draw boss with unique appearance per type
function drawBoss(b) {
  if (!b) return;
  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.hitAnim > 0) ctx.globalAlpha = 0.6 + Math.sin(b.hitAnim * 40) * 0.4;

  const s = b.size;
  const wobble = Math.sin(gameTime * 2) * 3;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 15;

  switch(b.id) {
    case 'treant': // Tree form: trunk + branches swaying
      ctx.fillStyle = '#553311';
      ctx.fillRect(-s*0.3, -s*0.2 + wobble, s*0.6, s*0.8);
      // Canopy
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(0, -s*0.4 + wobble, s*0.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.3, -s*0.2 + wobble, s*0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.3, -s*0.2 + wobble, s*0.4, 0, Math.PI*2); ctx.fill();
      // Branches
      ctx.strokeStyle = '#664422'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.1 + wobble);
      ctx.lineTo(-s*0.7, -s*0.5 + Math.sin(gameTime*3)*5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.3, -s*0.1 + wobble);
      ctx.lineTo(s*0.7, -s*0.5 + Math.sin(gameTime*3+1)*5); ctx.stroke();
      // Face
      ctx.fillStyle = '#FF8800';
      ctx.beginPath(); ctx.arc(-s*0.15, -s*0.35 + wobble, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.15, -s*0.35 + wobble, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#553311'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, -s*0.2 + wobble, s*0.15, 0.2, Math.PI-0.2); ctx.stroke();
      // Roots
      ctx.strokeStyle = '#553311'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-s*0.2, s*0.6 + wobble); ctx.lineTo(-s*0.5, s*0.8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.2, s*0.6 + wobble); ctx.lineTo(s*0.5, s*0.8); ctx.stroke();
      break;

    case 'sphinx': // Lion body + human face + wings
      ctx.fillStyle = b.color;
      // Body (lion)
      ctx.beginPath(); ctx.ellipse(0, s*0.1 + wobble, s*0.7, s*0.4, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.fillStyle = '#DDAA55';
      ctx.beginPath(); ctx.arc(-s*0.4, -s*0.3 + wobble, s*0.35, 0, Math.PI*2); ctx.fill();
      // Headdress
      ctx.fillStyle = '#2244AA';
      ctx.beginPath();
      ctx.moveTo(-s*0.7, -s*0.3 + wobble); ctx.lineTo(-s*0.4, -s*0.7 + wobble); ctx.lineTo(-s*0.1, -s*0.3 + wobble);
      ctx.closePath(); ctx.fill();
      // Wings
      const wingAngle = Math.sin(gameTime * 1.5) * 0.3;
      ctx.fillStyle = '#BBAA44';
      ctx.save(); ctx.rotate(wingAngle);
      ctx.beginPath(); ctx.moveTo(s*0.2, -s*0.2 + wobble);
      ctx.quadraticCurveTo(s*0.6, -s*0.8 + wobble, s*0.9, -s*0.1 + wobble);
      ctx.lineTo(s*0.2, s*0.1 + wobble); ctx.closePath(); ctx.fill();
      ctx.restore();
      // Eyes
      ctx.fillStyle = C.gold; ctx.shadowColor = C.gold;
      ctx.beginPath(); ctx.arc(-s*0.5, -s*0.35 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.3, -s*0.35 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
      // Paws
      ctx.fillStyle = b.color;
      ctx.fillRect(-s*0.7, s*0.3 + wobble, s*0.25, s*0.2);
      ctx.fillRect(s*0.4, s*0.3 + wobble, s*0.25, s*0.2);
      break;

    case 'frost_dragon': // S-curve body + crystal wings + ice breath
      // Body (S-curve)
      ctx.strokeStyle = b.color; ctx.lineWidth = s*0.3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-s*0.6, s*0.3 + wobble);
      ctx.bezierCurveTo(-s*0.3, -s*0.2 + wobble, s*0.3, s*0.2 + wobble, s*0.6, -s*0.3 + wobble);
      ctx.stroke();
      // Head
      ctx.fillStyle = '#88CCFF';
      ctx.beginPath(); ctx.arc(-s*0.6, s*0.1 + wobble, s*0.25, 0, Math.PI*2); ctx.fill();
      // Snout
      ctx.fillStyle = '#77BBEE';
      ctx.beginPath(); ctx.moveTo(-s*0.8, s*0.05 + wobble); ctx.lineTo(-s*1.0, s*0.1 + wobble); ctx.lineTo(-s*0.8, s*0.2 + wobble); ctx.closePath(); ctx.fill();
      // Crystal wings
      ctx.fillStyle = 'rgba(136,238,255,0.6)';
      ctx.beginPath();
      ctx.moveTo(-s*0.1, -s*0.1 + wobble);
      ctx.lineTo(s*0.2, -s*0.8 + wobble);
      ctx.lineTo(s*0.5, -s*0.6 + wobble);
      ctx.lineTo(s*0.3, -s*0.1 + wobble); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s*0.1, s*0.1 + wobble);
      ctx.lineTo(s*0.4, -s*0.5 + wobble);
      ctx.lineTo(s*0.7, -s*0.3 + wobble);
      ctx.lineTo(s*0.5, s*0.1 + wobble); ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(-s*0.65, s*0.02 + wobble, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0044FF';
      ctx.beginPath(); ctx.arc(-s*0.65, s*0.02 + wobble, s*0.04, 0, Math.PI*2); ctx.fill();
      // Ice particles around
      ctx.fillStyle = '#CCFFFF';
      for (let i = 0; i < 5; i++) {
        const ix = Math.cos(gameTime*2+i)*s*0.8, iy = Math.sin(gameTime*2+i*1.3)*s*0.5 + wobble;
        ctx.beginPath(); ctx.arc(ix, iy, 2, 0, Math.PI*2); ctx.fill();
      }
      break;

    case 'dark_mage': // Robed wizard with phase-based transformation
      const phaseColor = b.phase === 1 ? '#6633AA' : b.phase === 2 ? '#444466' : '#AA4444';
      // Robe
      ctx.fillStyle = phaseColor;
      ctx.beginPath();
      ctx.moveTo(-s*0.5, -s*0.3 + wobble);
      ctx.lineTo(-s*0.7, s*0.8 + wobble);
      ctx.lineTo(s*0.7, s*0.8 + wobble);
      ctx.lineTo(s*0.5, -s*0.3 + wobble);
      ctx.closePath(); ctx.fill();
      // Hood
      ctx.beginPath();
      ctx.arc(0, -s*0.3 + wobble, s*0.4, Math.PI, 0);
      ctx.fill();
      // Face changes by phase
      if (b.phase <= 2) {
        ctx.fillStyle = '#DDCCFF';
        ctx.beginPath(); ctx.arc(0, -s*0.2 + wobble, s*0.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = b.phase === 1 ? '#FF0000' : '#FF4444';
        ctx.beginPath(); ctx.arc(-s*0.08, -s*0.25 + wobble, s*0.05, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.08, -s*0.25 + wobble, s*0.05, 0, Math.PI*2); ctx.fill();
      } else {
        // Phase 3: skull face
        ctx.fillStyle = '#EEEECC';
        ctx.beginPath(); ctx.arc(0, -s*0.2 + wobble, s*0.22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-s*0.08, -s*0.25 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.08, -s*0.25 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FF0000';
        ctx.beginPath(); ctx.arc(-s*0.08, -s*0.25 + wobble, s*0.03, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.08, -s*0.25 + wobble, s*0.03, 0, Math.PI*2); ctx.fill();
      }
      // Staff
      ctx.strokeStyle = '#664422'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*0.5, -s*0.6 + wobble); ctx.lineTo(s*0.5, s*0.8 + wobble); ctx.stroke();
      // Dark orb on staff
      ctx.fillStyle = '#8844FF'; ctx.shadowColor = '#8844FF'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(s*0.5, -s*0.7 + wobble, s*0.12, 0, Math.PI*2); ctx.fill();
      // Floating runes around
      ctx.fillStyle = '#AA66FF';
      for (let i = 0; i < 3; i++) {
        const rx = Math.cos(gameTime + i * 2.1) * s * 0.9;
        const ry = Math.sin(gameTime + i * 2.1) * s * 0.5 + wobble;
        ctx.font = '10px monospace'; ctx.textAlign = 'center';
        ctx.fillText('◇', rx, ry);
      }
      break;

    case 'rune_golem': // Massive stone with rune symbols glowing
      ctx.fillStyle = '#887766';
      // Blocky body
      ctx.fillRect(-s*0.5, -s*0.6 + wobble, s, s*1.2);
      // Head
      ctx.fillRect(-s*0.35, -s*0.9 + wobble, s*0.7, s*0.35);
      // Arms
      ctx.fillRect(-s*0.8, -s*0.4 + wobble, s*0.35, s*0.8);
      ctx.fillRect(s*0.45, -s*0.4 + wobble, s*0.35, s*0.8);
      // Legs
      ctx.fillRect(-s*0.4, s*0.5 + wobble, s*0.3, s*0.4);
      ctx.fillRect(s*0.1, s*0.5 + wobble, s*0.3, s*0.4);
      // Glowing rune symbols on body
      ctx.fillStyle = C.gold; ctx.shadowColor = C.gold; ctx.shadowBlur = 8;
      const runeGlow = 0.5 + Math.sin(gameTime * 3) * 0.5;
      ctx.globalAlpha *= (0.5 + runeGlow * 0.5);
      ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
      ctx.fillText('◆', 0, -s*0.1 + wobble);
      ctx.fillText('◇', -s*0.2, s*0.2 + wobble);
      ctx.fillText('◆', s*0.2, s*0.2 + wobble);
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#FF4400'; ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(-s*0.15, -s*0.78 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.15, -s*0.78 + wobble, s*0.06, 0, Math.PI*2); ctx.fill();
      break;

    default: // Fallback generic boss
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(0, wobble, s, 0, Math.PI * 2); ctx.fill();
      break;
  }

  ctx.shadowBlur = 0;

  // Phase indicator dots
  ctx.globalAlpha = 1;
  for (let i = 0; i < b.phases; i++) {
    ctx.fillStyle = i < b.phase ? C.gold : '#333';
    ctx.beginPath();
    ctx.arc(-((b.phases-1)*8) + i*16, s + 15, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // HP bar
  const hpPct = b.currentHp / b.maxHp;
  const barW = s * 3;
  ctx.fillStyle = '#333'; ctx.fillRect(-barW/2, -s - 20, barW, 8);
  ctx.fillStyle = hpPct > 0.5 ? '#44FF44' : hpPct > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillRect(-barW/2, -s - 20, barW * Math.max(0, hpPct), 8);
  // Boss name
  ctx.fillStyle = C.textPrimary;
  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, 0, -s - 25);

  ctx.restore();
}

// Draw 5x5 grid
function drawGrid() {
  const gs = CONFIG.GRID_SIZE;
  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const x = gridOffsetX + c * cellSize;
      const y = gridOffsetY + r * cellSize;

      let isMagicCell = false;
      for (const mc of matchedCircles) {
        for (const [mr, mc2] of mc.cells) {
          if (mr === r && mc2 === c) { isMagicCell = true; break; }
        }
        if (isMagicCell) break;
      }

      ctx.fillStyle = isMagicCell ? C.gridMagic : (r === cursorY && c === cursorX && inputMode === 'keyboard') ? C.gridActive : '#2A2A4A';
      ctx.fillRect(x, y, cellSize - 2, cellSize - 2);

      ctx.strokeStyle = isMagicCell ? C.gold : C.gridBorder;
      ctx.lineWidth = isMagicCell ? 2 : 1;
      ctx.strokeRect(x, y, cellSize - 2, cellSize - 2);

      if (isMagicCell) {
        ctx.shadowColor = C.gold;
        ctx.shadowBlur = 10;
        ctx.strokeRect(x, y, cellSize - 2, cellSize - 2);
        ctx.shadowBlur = 0;
      }

      if (grid[r][c]) {
        drawRune(x + cellSize/2 - 1, y + cellSize/2 - 1, grid[r][c], cellSize * 0.8);
      }
    }
  }

  // Cursor highlight (keyboard mode)
  if (inputMode === 'keyboard' && gameState === 'PUZZLE') {
    const cx2 = gridOffsetX + cursorX * cellSize;
    const cy2 = gridOffsetY + cursorY * cellSize;
    ctx.strokeStyle = C.cyan;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(cx2 - 1, cy2 - 1, cellSize, cellSize);
    ctx.setLineDash([]);
  }
}

// Draw inventory bar
function drawInventory() {
  const maxInv = CONFIG.INV_MAX_BASE + upgrades.invExpand;
  const slotSize = Math.max(CONFIG.MIN_TOUCH, cellSize * 0.9);
  const totalW = maxInv * (slotSize + 8);
  const startX = (W - totalW) / 2;

  ctx.fillStyle = 'rgba(10,10,15,0.8)';
  ctx.fillRect(0, invBarY - 5, W, invBarH + 10);

  for (let i = 0; i < maxInv; i++) {
    const x = startX + i * (slotSize + 8);
    const y = invBarY;

    ctx.fillStyle = i === selectedRuneIdx ? '#3A3A6A' : '#1A1A2E';
    ctx.fillRect(x, y, slotSize, slotSize);
    ctx.strokeStyle = i === selectedRuneIdx ? C.cyan : C.gridBorder;
    ctx.lineWidth = i === selectedRuneIdx ? 2 : 1;
    ctx.strokeRect(x, y, slotSize, slotSize);

    if (i < inventory.length && inventory[i]) {
      drawRune(x + slotSize/2, y + slotSize/2, inventory[i], slotSize * 0.7);
    }

    if (inputMode === 'keyboard') {
      ctx.fillStyle = C.textMuted;
      ctx.font = '10px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(String(i + 1), x + slotSize/2, y + slotSize - 3);
    }

    buttons.push({ id: 'inv_' + i, x, y, w: slotSize, h: slotSize });
  }
}

// Draw HUD
function drawHUD() {
  const pad = 10;
  const iconS = 20;

  // Lives (top-left) - hearts
  for (let i = 0; i < maxLives; i++) {
    const x = pad + i * (iconS + 6);
    const y = pad;
    ctx.fillStyle = i < lives ? C.red : '#333';
    ctx.beginPath();
    const cx2 = x + iconS/2, cy2 = y + iconS/2;
    ctx.moveTo(cx2, cy2 + iconS*0.3);
    ctx.bezierCurveTo(cx2-iconS*0.5,cy2-iconS*0.1, cx2-iconS*0.5,cy2-iconS*0.4, cx2,cy2-iconS*0.15);
    ctx.bezierCurveTo(cx2+iconS*0.5,cy2-iconS*0.4, cx2+iconS*0.5,cy2-iconS*0.1, cx2,cy2+iconS*0.3);
    ctx.fill();
  }

  // Score (top-center)
  ctx.fillStyle = C.textPrimary;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('score') + ': ' + score, W / 2, pad + 16);

  // Crystals (top-right)
  const crystalX = W - pad - 80;
  ctx.fillStyle = C.crystal;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3 - Math.PI / 2;
    const px = crystalX + iconS/2 + Math.cos(a) * iconS * 0.4;
    const py = pad + iconS/2 + Math.sin(a) * iconS * 0.4;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = C.crystal;
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(crystals, crystalX + iconS + 5, pad + 15);

  // High score
  ctx.fillStyle = C.textMuted;
  ctx.font = '11px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('highScore') + ': ' + highScore, W / 2, pad + 32);

  // Region/Stage indicator
  if (gameState === 'PUZZLE' || gameState === 'DEFENSE' || gameState === 'BOSS_FIGHT') {
    const region = REGION_DATA[currentRegion];
    ctx.fillStyle = region.accent;
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(region.name + ' ' + (currentRegion+1) + '-' + (currentStage+1), pad, pad + 48);
  }

  // Puzzle timer
  if (gameState === 'PUZZLE' && puzzleTimer > 0) {
    const timerW = 200;
    const timerX = (W - timerW) / 2;
    const timerY = pad + 42;
    const pct = puzzleTimer / puzzleTimeMax;
    ctx.fillStyle = '#333';
    ctx.fillRect(timerX, timerY, timerW, 8);
    ctx.fillStyle = pct > 0.3 ? C.cyan : C.red;
    ctx.fillRect(timerX, timerY, timerW * pct, 8);
    ctx.fillStyle = C.textSecondary;
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(t('timer') + ': ' + Math.ceil(puzzleTimer) + 's', W/2, timerY + 20);
  }

  // Wave indicator (defense)
  if (gameState === 'DEFENSE' || gameState === 'BOSS_FIGHT') {
    ctx.fillStyle = C.textSecondary;
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(t('wave') + ' ' + (waveIndex + 1) + '/' + REGION_DATA[currentRegion].waves, W - pad, pad + 48);
  }

  // Mute indicator
  ctx.fillStyle = C.textMuted;
  ctx.font = '11px "Courier New", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(sound.muted ? '🔇' : '🔊', W - pad, H - pad);
  buttons.push({ id: 'mute', x: W - pad - 30, y: H - pad - 15, w: 30, h: 20 });
}

// Draw parallax background
function drawBackground() {
  const reg = REGION_DATA[currentRegion] || REGION_DATA[0];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, reg.bgColor);
  grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars (slow parallax)
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97 + bgScroll1 * 0.1) % W;
    const sy = (i * 73) % (H * 0.5);
    const ss = 1 + (i % 3);
    ctx.globalAlpha = 0.3 + Math.sin(gameTime + i) * 0.3;
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1;

  // Ground elements (fast parallax)
  ctx.fillStyle = reg.bgColor;
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 8; i++) {
    const tx = (i * 150 - bgScroll2 * 0.5) % (W + 100) - 50;
    const ty = H * 0.75 + Math.sin(i) * 20;
    ctx.beginPath();
    ctx.moveTo(tx, ty); ctx.lineTo(tx + 15, ty - 30 - i * 5);
    ctx.lineTo(tx + 30, ty); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Draw region-specific weather particles
function drawWeatherParticles() {
  ctx.globalAlpha = 0.4;
  if (currentRegion === 0) {
    ctx.fillStyle = '#88CC44';
    for (let i = 0; i < 15; i++) {
      const lx = (i * 87 + gameTime * 20) % W;
      const ly = (i * 113 + gameTime * 30 + Math.sin(gameTime + i) * 20) % H;
      ctx.save(); ctx.translate(lx, ly); ctx.rotate(gameTime + i);
      ctx.fillRect(-3, -1, 6, 2); ctx.restore();
    }
  } else if (currentRegion === 1) {
    // Desert: sand particles
    ctx.fillStyle = '#CCAA66';
    for (let i = 0; i < 20; i++) {
      const sx = (i * 57 + gameTime * 40) % W;
      const sy = H * 0.3 + (i * 33 + Math.sin(gameTime * 0.7 + i) * 40) % (H * 0.5);
      ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI*2); ctx.fill();
    }
  } else if (currentRegion === 2) {
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 67 + gameTime * 10 + Math.sin(gameTime * 0.5 + i) * 30) % W;
      const sy = (i * 43 + gameTime * 40) % H;
      ctx.beginPath(); ctx.arc(sx, sy, 1 + i%2, 0, Math.PI*2); ctx.fill();
    }
  } else if (currentRegion === 3) {
    ctx.fillStyle = '#FF6600';
    for (let i = 0; i < 20; i++) {
      const ex = (i * 77 + Math.sin(gameTime + i) * 20) % W;
      const ey = H - (i * 43 + gameTime * 60) % H;
      ctx.globalAlpha = 0.3 + (ey / H) * 0.3;
      ctx.beginPath(); ctx.arc(ex, ey, 1 + i%2, 0, Math.PI*2); ctx.fill();
    }
  } else if (currentRegion === 4) {
    ctx.fillStyle = '#AA66FF';
    for (let i = 0; i < 20; i++) {
      const mx = W/2 + Math.cos(gameTime * 0.3 + i * 0.5) * (100 + i * 10);
      const my = H/2 + Math.sin(gameTime * 0.4 + i * 0.7) * (80 + i * 8);
      const ms = 2 + Math.sin(gameTime + i) * 1;
      ctx.beginPath(); ctx.arc(mx, my, ms, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// Draw active particles
function drawParticles() {
  for (const p of particlePool.active) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Draw hit effects
function drawHitEffects() {
  for (const h of hitEffects) {
    const pct = h.life / h.maxLife;
    const size = 40 * (1 - pct) + 10;
    ctx.globalAlpha = pct;
    ctx.strokeStyle = C.gold;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(h.x, h.y, size, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(h.x, h.y, size * 0.5, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// Draw projectiles with rune-type specific shapes and trails
function drawProjectiles() {
  // Draw trails first (behind projectiles)
  for (const tr of projTrails) {
    ctx.globalAlpha = (tr.life / tr.maxLife) * 0.4;
    ctx.fillStyle = tr.color;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, tr.size * (tr.life / tr.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (const p of projPool.active) {
    const rd = RUNE_DATA[p.runeType];
    const color = rd ? rd.color : '#fff';
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;

    switch(p.runeType) {
      case 'fire': // Fireball
        ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFAA44';
        ctx.beginPath(); ctx.arc(-2, -1, p.radius*0.5, 0, Math.PI*2); ctx.fill();
        break;
      case 'water': // Water droplet shape
        ctx.beginPath();
        ctx.moveTo(p.radius, 0);
        ctx.bezierCurveTo(p.radius, -p.radius*0.8, -p.radius*0.5, -p.radius, -p.radius, 0);
        ctx.bezierCurveTo(-p.radius*0.5, p.radius, p.radius, p.radius*0.8, p.radius, 0);
        ctx.fill();
        break;
      case 'earth': // Diamond projectile
        ctx.beginPath();
        ctx.moveTo(p.radius, 0); ctx.lineTo(0, -p.radius*0.7);
        ctx.lineTo(-p.radius, 0); ctx.lineTo(0, p.radius*0.7);
        ctx.closePath(); ctx.fill();
        break;
      case 'wind': // Crescent/arc shape
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, p.radius, -0.8, 0.8); ctx.stroke();
        break;
      case 'thunder': // Lightning bolt mini
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-p.radius, -p.radius*0.5); ctx.lineTo(0, 0);
        ctx.lineTo(-p.radius*0.3, 0); ctx.lineTo(p.radius, p.radius*0.5);
        ctx.stroke();
        break;
      case 'ice': // Crystal shard
        ctx.beginPath();
        ctx.moveTo(p.radius, 0); ctx.lineTo(p.radius*0.3, -p.radius*0.5);
        ctx.lineTo(-p.radius, 0); ctx.lineTo(p.radius*0.3, p.radius*0.5);
        ctx.closePath(); ctx.fill();
        break;
      case 'light': // Star shape
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = i * Math.PI * 2 / 5 - Math.PI/2;
          const r1 = p.radius, r22 = p.radius * 0.4;
          ctx.lineTo(Math.cos(a)*r1, Math.sin(a)*r1);
          const a2 = a + Math.PI/5;
          ctx.lineTo(Math.cos(a2)*r22, Math.sin(a2)*r22);
        }
        ctx.closePath(); ctx.fill();
        break;
      case 'dark': // Dark sphere with void
        ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(1, -1, p.radius*0.4, 0, Math.PI*2); ctx.fill();
        break;
      default:
        ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// Draw notifications
function drawNotifications() {
  for (const n of notifications) {
    ctx.globalAlpha = Math.min(1, n.life);
    ctx.fillStyle = n.color;
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(n.text, n.x, n.y);
  }
  ctx.globalAlpha = 1;
}

// Draw achievement popup
function drawAchievementPopup() {
  if (!achievementPopup) return;
  const ap = achievementPopup;
  ctx.globalAlpha = Math.min(1, ap.timer);

  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('achievement'), W/2, popY + 20);
  ctx.fillStyle = C.textPrimary;
  ctx.font = '12px "Courier New", monospace';

}

// Draw "activate" button
function drawActivateButton() {
  const btnW = Math.max(CONFIG.MIN_TOUCH * 2, 120);
  const btnH = CONFIG.MIN_TOUCH;
  const btnX = W - btnW - 15;
  const btnY = invBarY + (invBarH - btnH) / 2;

  const hasMatch = matchedCircles.length > 0;
  if (hasMatch) {
    ctx.shadowColor = C.gold;
    ctx.shadowBlur = 10 + Math.sin(gameTime * 4) * 5;
  }

  ctx.fillStyle = hasMatch ? '#4A3A2A' : '#2A2A3A';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = hasMatch ? C.gold : C.gridBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.shadowBlur = 0;

  ctx.fillStyle = hasMatch ? C.gold : C.textSecondary;
  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('activate') + (inputMode === 'keyboard' ? ' [Q]' : ''), btnX + btnW/2, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ id: 'activate', x: btnX, y: btnY, w: btnW, h: btnH });

// Draw undo button
function drawUndoButton() {
  const btnS = CONFIG.MIN_TOUCH;
  const btnX = gridOffsetX - btnS - 10;
  const btnY = gridOffsetY;
  ctx.fillStyle = '#2A2A3A';
  ctx.fillRect(btnX, btnY, btnS, btnS);

  ctx.fillStyle = C.textSecondary;
  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'center';

}

// Draw player wizard with casting animation
function drawPlayer() {
  if (gameState !== 'DEFENSE' && gameState !== 'BOSS_FIGHT') return;
  const px = 50, py = H * 0.5;
  const castAnim = Math.sin(gameTime * 4) * 3; // Subtle bob

  ctx.save();
  ctx.translate(px, py + castAnim);

  // Robe body
  ctx.fillStyle = C.purple;
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.lineTo(-14, 18);
  ctx.lineTo(14, 18);
  ctx.closePath();
  ctx.fill();

  // Robe detail
  ctx.strokeStyle = '#5030CC'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 16); ctx.stroke();

  // Hat
  ctx.fillStyle = '#5530AA';
  ctx.beginPath();
  ctx.moveTo(0, -40);
  ctx.lineTo(-12, -18);
  ctx.lineTo(12, -18);
  ctx.closePath();
  ctx.fill();
  // Hat band
  ctx.fillStyle = C.gold;
  ctx.fillRect(-12, -20, 24, 3);

  // Face
  ctx.fillStyle = '#DDCCEE';
  ctx.beginPath(); ctx.arc(0, -14, 7, 0, Math.PI*2); ctx.fill();

  // Eyes (glowing cyan)
  ctx.fillStyle = C.crystal;
  ctx.shadowColor = C.crystal;
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-3, -15, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -15, 2, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Staff
  ctx.strokeStyle = '#AA8844';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(15, -22);
  ctx.lineTo(15, 20);
  ctx.stroke();

  // Crystal orb on staff (pulsing)
  const orbPulse = 4 + Math.sin(gameTime * 5) * 1.5;
  ctx.fillStyle = C.gold;
  ctx.shadowColor = C.gold;
  ctx.shadowBlur = orbPulse * 2;
  ctx.beginPath();
  ctx.arc(15, -25, orbPulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Casting hand gesture (when firing)
  if (activatedMagics.length > 0) {
    ctx.fillStyle = '#DDCCEE';
    ctx.beginPath(); ctx.arc(-8, -5, 3, 0, Math.PI*2); ctx.fill();
    // Magic spark
    ctx.fillStyle = C.cyan;
    ctx.shadowColor = C.cyan; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(-12, -8, 2 + Math.sin(gameTime*8), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// Draw defense lanes
function drawLanes() {
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
    const ly = getLaneY(i);
    const laneH = H * 0.6 / CONFIG.LANE_COUNT;
    ctx.fillStyle = i % 2 === 0 ? '#1A1A3A' : '#1A2A3A';
    ctx.fillRect(40, ly - laneH/2, W - 80, laneH);
    ctx.strokeStyle = C.gridBorder;
    ctx.lineWidth = 1;
    ctx.strokeRect(40, ly - laneH/2, W - 80, laneH);
  }
  ctx.globalAlpha = 1;
}

// Draw environment objects (§4.6)
function drawEnvObjects() {
  for (const eo of envObjects) {
    const def = ENV_OBJECT_DATA[eo.type];
    ctx.save();
    ctx.translate(eo.x, eo.y);
    ctx.fillStyle = def.color;
    ctx.globalAlpha = 0.7;

    switch(eo.type) {
      case 'bush':
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(-6, -4, 8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -4, 8, 0, Math.PI*2); ctx.fill();
        break;
      case 'jar':
        ctx.beginPath();
        ctx.moveTo(-8, -10); ctx.lineTo(-10, 8); ctx.lineTo(10, 8); ctx.lineTo(8, -10);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#AA7733';
        ctx.fillRect(-5, -14, 10, 5);
        break;
      case 'icePillar':
        ctx.fillRect(-6, -18, 12, 36);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(-3, -15, 3, 30);
        break;
      case 'magmaPool':
        ctx.fillStyle = '#FF2200';
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFAA00';
        ctx.beginPath(); ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI*2); ctx.fill();
        break;
      case 'barrier':
        ctx.strokeStyle = def.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = i * Math.PI / 3 + gameTime;
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a)*14, Math.sin(a)*14);
        }
        ctx.stroke();
        break;
    }
    ctx.globalAlpha = 1;

    // HP bar for destructible objects
    if (eo.type !== 'magmaPool') {
      const hpPct = eo.hp / ENV_OBJECT_DATA[eo.type].hp;
      ctx.fillStyle = '#333'; ctx.fillRect(-10, -22, 20, 3);
      ctx.fillStyle = '#88FF88'; ctx.fillRect(-10, -22, 20 * hpPct, 3);
    }
    ctx.restore();
  }
}

// Draw upgrade icon by type
function drawUpgradeIcon(x, y, iconType, size) {
  ctx.save();
  ctx.translate(x, y);
  const s = size * 0.4;
  ctx.fillStyle = C.cyan;
  ctx.strokeStyle = C.cyan;
  ctx.lineWidth = 1.5;
  switch(iconType) {
    case 'mana':
      ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#4488FF';
      ctx.beginPath(); ctx.arc(0, 0, s*0.5, 0, Math.PI*2); ctx.fill();
      break;
    case 'sword':
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*0.3,s*0.5); ctx.lineTo(-s*0.3,s*0.5); ctx.closePath(); ctx.fill();
      break;
    case 'bag':
      ctx.fillRect(-s*0.5, -s*0.3, s, s*0.8);
      ctx.beginPath(); ctx.arc(0, -s*0.3, s*0.5, Math.PI, 0); ctx.stroke();
      break;
    case 'eye':
      ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.5, 0, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = C.cyan;
      ctx.beginPath(); ctx.arc(0, 0, s*0.25, 0, Math.PI*2); ctx.fill();
      break;
    case 'magnet':
      ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.5, Math.PI, 0); ctx.stroke();
      ctx.strokeStyle = '#4444FF';
      ctx.beginPath(); ctx.moveTo(-s*0.5, -s*0.2); ctx.lineTo(-s*0.5, s*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.5, -s*0.2); ctx.lineTo(s*0.5, s*0.4); ctx.stroke();
      break;
    case 'clock':
      ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s*0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(s*0.4, 0); ctx.stroke();
      break;
    case 'shield':
      ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, -s*0.3); ctx.lineTo(s*0.7, s);
      ctx.lineTo(0, s*0.7); ctx.lineTo(-s*0.7, s); ctx.lineTo(-s, -s*0.3); ctx.closePath(); ctx.fill();
      break;
    case 'star':
      ctx.fillStyle = C.gold;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = i * Math.PI * 2 / 5 - Math.PI/2;
        ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
        const a2 = a + Math.PI/5;
        ctx.lineTo(Math.cos(a2)*s*0.4, Math.sin(a2)*s*0.4);
      }
      ctx.closePath(); ctx.fill();
      break;
  }
  ctx.restore();
}

// Draw mini pattern preview for recipe book
function drawPatternPreview(x, y, patternId, size) {
  const cellS = size / 5;
  ctx.save();
  ctx.translate(x, y);

  // Draw mini grid
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      ctx.fillStyle = '#1A1A2E';
      ctx.fillRect(c * cellS, r * cellS, cellS - 1, cellS - 1);
    }
  }

  // Highlight pattern cells
  ctx.fillStyle = C.cyan;
  ctx.globalAlpha = 0.6;
  const cells = getPatternPreviewCells(patternId);
  for (const [r, c] of cells) {
    ctx.fillRect(c * cellS, r * cellS, cellS - 1, cellS - 1);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Get sample cells for pattern preview
function getPatternPreviewCells(id) {
  switch(id) {
    case 'line3h': return [[2,1],[2,2],[2,3]];
    case 'line3v': return [[1,2],[2,2],[3,2]];
    case 'diag3a': return [[1,1],[2,2],[3,3]];
    case 'diag3b': return [[3,1],[2,2],[1,3]];
    case 'lshape': return [[1,1],[2,1],[2,2]];
    case 'tshape': return [[1,2],[2,1],[2,2],[2,3]];
    case 'cross': return [[1,2],[2,1],[2,2],[2,3],[3,2]];
    case 'square': return [[1,1],[1,2],[2,1],[2,2]];
    case 'xshape': return [[1,1],[1,3],[2,2],[3,1],[3,3]];
    case 'dblline': return [[1,1],[1,2],[1,3],[2,1],[2,2],[2,3]];
    case 'mixedcross': return [[1,2],[2,1],[2,2],[2,3],[3,2]];
    case 'secret': return [[0,0],[1,1],[2,2],[3,3],[4,4]];
    default: return [[2,2]];
  }
}
