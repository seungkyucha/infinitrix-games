// TITLE screen
function renderTitle() {
  drawBackground();
  ctx.fillStyle = 'rgba(10,10,20,0.7)';
  ctx.fillRect(0, 0, W, H);

  const titleY = H * 0.3;
  ctx.save();
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 20 + Math.sin(gameTime * 2) * 10;
  ctx.fillStyle = C.textPrimary;
  ctx.font = 'bold ' + Math.min(36, W * 0.07) + 'px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('title'), W / 2, titleY);
  ctx.shadowBlur = 0;

  // Scanline effect
  ctx.globalAlpha = 0.03;
  for (let sy = 0; sy < H; sy += 3) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, sy, W, 1);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.fillStyle = C.textSecondary;
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Puzzle × Strategy × Defense', W / 2, titleY + 30);

  // Animated rune circle
  const circleY = H * 0.52;
  ctx.save();
  ctx.translate(W / 2, circleY);
  for (let i = 0; i < 8; i++) {
    const angle = gameTime * 0.5 + i * Math.PI / 4;
    const rx = Math.cos(angle) * 60;
    const ry = Math.sin(angle) * 60;
    drawRune(rx, ry, RUNE_KEYS[i], 30);
  }
  ctx.restore();

  // Start prompt
  const alpha = 0.5 + Math.sin(gameTime * 3) * 0.5;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = C.gold;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(inputMode === 'touch' ? t('tapToStart') : t('pressSpace'), W / 2, H * 0.78);
  ctx.globalAlpha = 1;

  // Difficulty selector
  const diffs = ['apprentice', 'mage', 'archmage'];
  const diffBtnW = Math.max(CONFIG.MIN_TOUCH * 2, 100);
  const diffBtnH = CONFIG.MIN_TOUCH;
  const diffStartX = (W - diffs.length * (diffBtnW + 10)) / 2;
  const diffY = H * 0.85;

  ctx.fillStyle = C.textMuted;
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText(t('difficulty'), W / 2, diffY - 10);

  for (let i = 0; i < diffs.length; i++) {
    const dx = diffStartX + i * (diffBtnW + 10);
    const isSelected = difficulty === diffs[i];
    ctx.fillStyle = isSelected ? '#2A2A4A' : '#1A1A2E';
    ctx.fillRect(dx, diffY, diffBtnW, diffBtnH);
    ctx.strokeStyle = isSelected ? C.cyan : C.gridBorder;
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.strokeRect(dx, diffY, diffBtnW, diffBtnH);
    ctx.fillStyle = isSelected ? C.cyan : C.textSecondary;
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(DIFFICULTY_DATA[diffs[i]].name, dx + diffBtnW/2, diffY + diffBtnH/2);
    ctx.textBaseline = 'alphabetic';
    buttons.push({ id: 'diff_' + diffs[i], x: dx, y: diffY, w: diffBtnW, h: diffBtnH });
  }

  if (highScore > 0) {
    ctx.fillStyle = C.textMuted;
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(t('highScore') + ': ' + highScore, W / 2, H * 0.93);
  }

  drawParticles();
}

// STAGE_SELECT screen
function renderStageSelect() {
  drawBackground();
  ctx.fillStyle = 'rgba(10,10,20,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = C.textPrimary;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('stageSelect'), W / 2, 40);

  // Region tabs
  const tabW = Math.max(CONFIG.MIN_TOUCH, W / 6);
  const tabH = 36;
  for (let i = 0; i < REGION_DATA.length; i++) {
    const tx = 10 + i * (tabW + 5);
    const unlocked = i === 0 || clearedStages.some(s => s.startsWith((i) + '-'));
    ctx.fillStyle = i === currentRegion ? '#2A2A4A' : unlocked ? '#1A1A2E' : '#0A0A15';
    ctx.fillRect(tx, 55, tabW, tabH);
    ctx.strokeStyle = i === currentRegion ? REGION_DATA[i].accent : C.gridBorder;
    ctx.strokeRect(tx, 55, tabW, tabH);
    ctx.fillStyle = unlocked ? (i === currentRegion ? REGION_DATA[i].accent : C.textSecondary) : C.textMuted;
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(REGION_DATA[i].name, tx + tabW/2, 55 + tabH/2);
    ctx.textBaseline = 'alphabetic';
    if (unlocked) buttons.push({ id: 'region_' + i, x: tx, y: 55, w: tabW, h: tabH });
  }

  // Stage buttons
  const stgBtnW = Math.max(CONFIG.MIN_TOUCH * 2, 140);
  const stgBtnH = Math.max(CONFIG.MIN_TOUCH, 60);
  const stgStartX = (W - 3 * (stgBtnW + 15)) / 2;
  const stgY = 120;

  for (let s = 0; s < 3; s++) {
    const stageId = (currentRegion + 1) + '-' + (s + 1);
    const cleared = clearedStages.includes(stageId);
    const prevCleared = s === 0 || clearedStages.includes((currentRegion + 1) + '-' + s);
    const unlocked = s === 0 ? true : prevCleared;

    const sx = stgStartX + s * (stgBtnW + 15);
    ctx.fillStyle = cleared ? '#1A3A1A' : unlocked ? '#1A1A2E' : '#0A0A15';
    ctx.fillRect(sx, stgY, stgBtnW, stgBtnH);
    ctx.strokeStyle = cleared ? C.green : unlocked ? REGION_DATA[currentRegion].accent : C.textMuted;
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, stgY, stgBtnW, stgBtnH);

    ctx.fillStyle = unlocked ? C.textPrimary : C.textMuted;
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stageId, sx + stgBtnW/2, stgY + stgBtnH/2 - 8);
    ctx.font = '11px "Courier New", monospace';
    ctx.fillStyle = cleared ? C.green : C.textSecondary;
    ctx.fillText(cleared ? '✓ ' + t('clear') : unlocked ? t('selectStage') : '🔒', sx + stgBtnW/2, stgY + stgBtnH/2 + 12);
    ctx.textBaseline = 'alphabetic';

    if (unlocked) buttons.push({ id: 'stage_' + s, x: sx, y: stgY, w: stgBtnW, h: stgBtnH });
  }

  // Boss button
  const allCleared = [0,1,2].every(s2 => clearedStages.includes((currentRegion+1)+'-'+(s2+1)));
  if (allCleared && REGION_BOSS[currentRegion]) {
    const bossBtn = { x: (W - stgBtnW) / 2, y: stgY + stgBtnH + 20, w: stgBtnW, h: stgBtnH };
    ctx.fillStyle = '#3A1A1A';
    ctx.fillRect(bossBtn.x, bossBtn.y, bossBtn.w, bossBtn.h);
    ctx.strokeStyle = C.red;
    ctx.shadowColor = C.red;
    ctx.shadowBlur = 8;
    ctx.strokeRect(bossBtn.x, bossBtn.y, bossBtn.w, bossBtn.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.red;
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚔ BOSS', bossBtn.x + bossBtn.w/2, bossBtn.y + bossBtn.h/2);
    ctx.textBaseline = 'alphabetic';
    buttons.push({ id: 'boss', ...bossBtn });
  }

  // Hidden stage buttons
  for (let h = 0; h < 2; h++) {
    if (hiddenFound[h]) {
      const hBtn = { x: (W - stgBtnW) / 2, y: stgY + stgBtnH + 80 + h * (stgBtnH + 10), w: stgBtnW, h: stgBtnH };
      ctx.fillStyle = '#2A1A3A';
      ctx.fillRect(hBtn.x, hBtn.y, hBtn.w, hBtn.h);
      ctx.strokeStyle = '#AA66FF';
      ctx.strokeRect(hBtn.x, hBtn.y, hBtn.w, hBtn.h);
      ctx.fillStyle = '#AA66FF';
      ctx.font = '12px "Courier New", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(h === 0 ? '시간의 틈' : '룬 골렘의 시험장', hBtn.x + hBtn.w/2, hBtn.y + hBtn.h/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ id: 'hidden_' + h, ...hBtn });
    }
  }

  // Upgrade & Recipe buttons
  const bottomBtnW = Math.max(CONFIG.MIN_TOUCH * 2, 120);
  const bottomBtnH = CONFIG.MIN_TOUCH;
  const bottomY = H - bottomBtnH - 15;

  ctx.fillStyle = '#1A2A1A';
  ctx.fillRect(15, bottomY, bottomBtnW, bottomBtnH);
  ctx.strokeStyle = C.green; ctx.strokeRect(15, bottomY, bottomBtnW, bottomBtnH);
  ctx.fillStyle = C.green;
  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('upgrade'), 15 + bottomBtnW/2, bottomY + bottomBtnH/2);
  buttons.push({ id: 'upgrade', x: 15, y: bottomY, w: bottomBtnW, h: bottomBtnH });

  ctx.fillStyle = '#1A1A2A';
  ctx.fillRect(W - bottomBtnW - 15, bottomY, bottomBtnW, bottomBtnH);
  ctx.strokeStyle = C.cyan; ctx.strokeRect(W - bottomBtnW - 15, bottomY, bottomBtnW, bottomBtnH);
  ctx.fillStyle = C.cyan;
  ctx.fillText(t('recipeBook'), W - 15 - bottomBtnW/2, bottomY + bottomBtnH/2);
  buttons.push({ id: 'recipe', x: W - bottomBtnW - 15, y: bottomY, w: bottomBtnW, h: bottomBtnH });
  ctx.textBaseline = 'alphabetic';

  // Back button
  ctx.fillStyle = '#2A1A1A';
  const backW = Math.max(CONFIG.MIN_TOUCH, 80);
  ctx.fillRect(W/2 - backW/2, bottomY, backW, bottomBtnH);
  ctx.strokeStyle = C.textMuted; ctx.strokeRect(W/2 - backW/2, bottomY, backW, bottomBtnH);
  ctx.fillStyle = C.textSecondary;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t('back'), W/2, bottomY + bottomBtnH/2);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ id: 'back_title', x: W/2 - backW/2, y: bottomY, w: backW, h: bottomBtnH });

  drawParticles();
}

// RESULT screen with victory celebration + story (§9.2)
function renderResult() {
  drawBackground();
  ctx.fillStyle = 'rgba(10,10,20,0.75)';
  ctx.fillRect(0, 0, W, H);

  const rd = resultData || {};
  ctx.fillStyle = rd.victory ? C.gold : C.red;
  ctx.shadowColor = rd.victory ? C.gold : C.red;
  ctx.shadowBlur = 15;
  ctx.font = 'bold ' + Math.min(32, W * 0.07) + 'px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(rd.victory ? t('victory') : t('defeated'), W / 2, H * 0.15);
  ctx.shadowBlur = 0;

  // Stats
  const statsY = H * 0.28;
  ctx.fillStyle = C.textPrimary;
  ctx.font = '16px "Courier New", monospace';
  ctx.fillText(t('totalScore') + ': ' + (rd.score || 0), W / 2, statsY);
  ctx.fillText(t('earnedCrystals') + ': ' + (rd.crystals || 0), W / 2, statsY + 25);

  // No-damage bonus display
  if (rd.victory && rd.noDamage) {
    ctx.fillStyle = C.gold;
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText('★ ' + t('noDamageBonus') + ' ★', W / 2, statsY + 50);
  }

  if (isNewBest) {
    ctx.fillStyle = C.gold;
    ctx.font = 'bold 18px "Courier New", monospace';
    const flash = 0.5 + Math.sin(gameTime * 4) * 0.5;
    ctx.globalAlpha = flash;
    ctx.fillText('★ ' + t('newBest') + ' ★', W / 2, statsY + 75);
    ctx.globalAlpha = 1;
  }

  // Story fragment display (§9.2)
  if (rd.victory && rd.storyText) {
    ctx.fillStyle = '#AACCFF';
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    // Word wrap story text
    const maxW = W * 0.8;
    const words = rd.storyText.split(' ');
    let line = '';
    let lineY = statsY + 100;
    for (const word of words) {
      const testLine = line + (line ? ' ' : '') + word;
      if (ctx.measureText(testLine).width > maxW && line) {
        ctx.fillText(line, W/2, lineY);
        line = word;
        lineY += 18;
      } else {
        line = testLine;
      }
    }
    if (line) ctx.fillText(line, W/2, lineY);
  }

  // Victory celebration particles
  if (rd.victory && victoryCelebTimer > 0) {
    if (Math.random() < 0.3) {
      const cx3 = Math.random() * W;
      const cy3 = H * 0.1 + Math.random() * H * 0.3;
      spawnParticles(cx3, cy3, 3, [C.gold, C.cyan, C.green, C.purple][Math.floor(Math.random()*4)]);
    }
  }

  // Continue button
  const btnW = Math.max(CONFIG.MIN_TOUCH * 3, 180);
  const btnH = CONFIG.MIN_TOUCH;
  const btnX = (W - btnW) / 2;
  const btnY = H * 0.8;
  ctx.fillStyle = '#1A2A1A';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = C.green;
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = C.green;
  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.textBaseline = 'middle';
  ctx.fillText(rd.victory ? t('stageSelect') : t('restart'), btnX + btnW/2, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ id: 'result_continue', x: btnX, y: btnY, w: btnW, h: btnH });

  drawParticles();
}

// UPGRADE screen with icons
function renderUpgrade() {
  ctx.fillStyle = C.bgSecondary;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = C.textPrimary;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('upgrade'), W / 2, 35);

  ctx.fillStyle = C.crystal;
  ctx.font = '14px "Courier New", monospace';
  ctx.fillText(t('crystals') + ': ' + crystals, W / 2, 58);

  const itemH = Math.max(CONFIG.MIN_TOUCH + 10, 65);
  const listY = 75;
  const listH = H - listY - CONFIG.MIN_TOUCH - 20;
  scrollMgr.viewH = listH;
  scrollMgr.contentH = Object.keys(UPGRADE_DATA).length * itemH;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, listY, W, listH);
  ctx.clip();

  const ugKeys = Object.keys(UPGRADE_DATA);
  for (let i = 0; i < ugKeys.length; i++) {
    const id = ugKeys[i];
    const ud = UPGRADE_DATA[id];
    const lv = upgrades[id];
    const maxed = lv >= ud.maxLv;
    const cost = maxed ? 0 : ud.costs[lv];
    const canBuy = !maxed && crystals >= cost;

    const iy = listY + i * itemH + scrollMgr.offset;
    if (iy + itemH < listY || iy > listY + listH) continue;

    ctx.fillStyle = '#12121e';
    ctx.fillRect(10, iy, W - 20, itemH - 5);
    ctx.strokeStyle = canBuy ? C.green : C.borderDim;
    ctx.strokeRect(10, iy, W - 20, itemH - 5);

    // Icon
    drawUpgradeIcon(32, iy + (itemH - 5) / 2, ud.icon, 24);

    ctx.fillStyle = C.textPrimary;
    ctx.font = '13px "Courier New", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(ud.name + ' Lv.' + lv + '/' + ud.maxLv, 50, iy + 20);
    ctx.fillStyle = C.textSecondary;
    ctx.font = '11px "Courier New", monospace';
    ctx.fillText(ud.desc, 50, iy + 36);

    // Buy button
    const buyW = Math.max(CONFIG.MIN_TOUCH, 70);
    const buyH = Math.max(CONFIG.MIN_TOUCH - 15, 30);
    const buyX = W - buyW - 20;
    const buyY2 = iy + (itemH - buyH) / 2 - 2;
    ctx.fillStyle = maxed ? '#1A1A2E' : canBuy ? '#1A3A1A' : '#2A1A1A';
    ctx.fillRect(buyX, buyY2, buyW, buyH);
    ctx.strokeStyle = maxed ? C.textMuted : canBuy ? C.green : C.red;
    ctx.strokeRect(buyX, buyY2, buyW, buyH);
    ctx.fillStyle = maxed ? C.textMuted : canBuy ? C.green : C.red;
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(maxed ? t('maxLevel') : cost + '💎', buyX + buyW/2, buyY2 + buyH/2);
    ctx.textBaseline = 'alphabetic';

    if (!maxed) buttons.push({ id: 'buy_' + id, x: buyX, y: buyY2, w: buyW, h: buyH });
  }
  ctx.restore();

  // Back button
  const backW = Math.max(CONFIG.MIN_TOUCH * 2, 120);
  const backH = CONFIG.MIN_TOUCH;
  const backX = (W - backW) / 2;
  const backY = H - backH - 10;
  ctx.fillStyle = '#2A1A1A';
  ctx.fillRect(backX, backY, backW, backH);
  ctx.strokeStyle = C.textMuted;
  ctx.strokeRect(backX, backY, backW, backH);
  ctx.fillStyle = C.textSecondary;
  ctx.font = '13px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('back'), backX + backW/2, backY + backH/2);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ id: 'back_stage', x: backX, y: backY, w: backW, h: backH });
}

// ═══════════════════════════════════════════════════════════════
// §J. STATE MACHINE
// ═══════════════════════════════════════════════════════════════

function beginTransition(target, callback) {
  if (isTransitioning) return;
  const ESCAPE_ALLOWED = ['GAMEOVER', 'ENDING', 'RESULT', 'UPGRADE', 'RECIPE_BOOK', 'STAGE_SELECT'];
  if (STATE_PRIORITY[target] < STATE_PRIORITY[gameState]
      && target !== 'PAUSED'
      && !ESCAPE_ALLOWED.includes(gameState)) return;
  isTransitioning = true;
  transTarget = target;
  transCallback = callback || null;
  transObj.v = 0;
  tw.add(transObj, { v: 1 }, 0.3, 'easeIn', () => {
    enterState(transTarget);
    tw.add(transObj, { v: 0 }, 0.3, 'easeOut', () => {
      isTransitioning = false;
      if (transCallback) transCallback();
    });
  });
}

function enterState(state) {
  prevState = gameState;
  gameState = state;

  switch(state) {
    case 'TITLE':
      score = 0;
      stageScore = 0;
      stageCrystals = 0;
      break;
    case 'STAGE_SELECT':
      scrollMgr.reset();
      checkHiddenStages(); // Check hidden stage conditions
      break;
    case 'PUZZLE':
      enterPuzzle();
      break;
    case 'DEFENSE':
      enterDefense();
      break;
    case 'BOSS_INTRO': {
      const bossId = REGION_BOSS[currentRegion];
      if (bossId) {
        initBoss(bossId);
        bossIntroTimer = 3.0;
        sound.sfxBossAppear();
        camShakeIntensity = 10;
      }
      break;
    }
    case 'BOSS_FIGHT':
      enterBossFight();
      break;
    case 'RESULT':
      enterResult();
      break;
    case 'UPGRADE':
      scrollMgr.reset();
      break;
    case 'RECIPE_BOOK':
      scrollMgr.reset();
      break;
    case 'GAMEOVER':
      enterGameover();
      break;
    case 'ENDING':
      break;
  }
}

function enterPuzzle() {
  initGrid();
  inventory = [];
  selectedRuneIdx = -1;
  cursorX = 2; cursorY = 2;
  matchedCircles = [];
  gridCacheDirty = true;
  stageLivesLost = 0;
  stageStartTime = gameTime;

  // Random rune drop pool (§10.1): 4~6 out of 8
  const poolSize = 4 + Math.min(2, currentRegion);
  const shuffled = [...RUNE_KEYS].sort(() => Math.random() - 0.5);
  activeRunePool = shuffled.slice(0, poolSize);

  // Give runes from the active pool
  const maxInv = CONFIG.INV_MAX_BASE + upgrades.invExpand;
  for (let i = 0; i < Math.min(CONFIG.RUNES_PER_TURN + 1, maxInv); i++) {
    inventory.push(activeRunePool[Math.floor(Math.random() * activeRunePool.length)]);
  }

  // Timer
  const diff = DIFFICULTY_DATA[difficulty];
  const region = REGION_DATA[currentRegion];
  puzzleTimeMax = region.puzzleTime + diff.timeBonus + upgrades.timeWarp * 5;
  puzzleTimer = puzzleTimeMax;

  stageScore = 0;
  stageCrystals = 0;

  // Tutorial check
  if (!localStorage.getItem('rft_tutorial')) {
    showTutorial = true;
    tutorialStep = 0;
  }
}

function enterDefense() {
  enemies = [];
  projectiles = [];
  waveIndex = 0;
  waveEnemyCount = 0;
  waveSpawnTimer = 0;
  waveSpawned = 0;
  defenseComplete = false;
  isWaveActive = true;
  magicFireTimer = 0;
  magicFireInterval = 1.0;
  projTrails = [];

  // Spawn environment objects (§4.6)
  envObjects = [];
  const reg = REGION_DATA[currentRegion];
  const numEnvObj = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < numEnvObj; i++) {
    const lane = Math.floor(Math.random() * CONFIG.LANE_COUNT);
    envObjects.push({
      type: reg.envType,
      x: 100 + Math.random() * (W * 0.5),
      y: getLaneY(lane) + (Math.random() - 0.5) * 20,
      hp: ENV_OBJECT_DATA[reg.envType].hp,
      lane
    });
  }

  startWave();
}

function startWave() {
  const region = REGION_DATA[currentRegion];
  waveEnemyCount = 3 + waveIndex * 2 + currentRegion;
  waveSpawned = 0;
  waveSpawnTimer = 0;
}

function enterBossFight() {
  enemies = [];
  magicFireTimer = 0;
  isWaveActive = true;
  defenseComplete = false;
  projTrails = [];
}

function enterResult() {
  const victory = lives > 0;
  const noDamage = stageLivesLost === 0;

  // No-damage bonus (§8.1)
  if (victory && noDamage) {
    const bonusScore = stageScore; // Double the stage score
    addScore(bonusScore, 'bonus');
    const bonusCrystals = Math.floor(stageCrystals * 0.5);
    modifyCrystals(bonusCrystals);
    stageCrystals += bonusCrystals;
    addNotification(t('noDamageBonus'));
  }

  resultData = {
    victory,
    score: stageScore,
    crystals: stageCrystals,
    noDamage: noDamage && victory,
    storyText: null
  };

  // Story fragment (§9.2)
  if (victory && currentStage === 2 && STORY_DATA[currentRegion]) {
    const story = STORY_DATA[currentRegion];
    resultData.storyText = lang === 'ko' ? story.ko : story.en;
  }

  // Victory celebration timer
  victoryCelebTimer = victory ? 3.0 : 0;

  isNewBest = score > highScore;
  if (isNewBest) highScore = score;

  if (victory) {
    const stageId = (currentRegion + 1) + '-' + (currentStage + 1);
    if (!clearedStages.includes(stageId)) {
      clearedStages.push(stageId);
      const regionCrystals = 10 * (currentRegion + 1);
      modifyCrystals(regionCrystals);
      stageCrystals += regionCrystals;
    }
    sound.sfxStageClear();
    checkAchievement('first_clear');

    // Check archmage path achievement
    if (difficulty === 'archmage') {
      const allCleared = [1,2,3,4,5].every(r => [1,2,3].every(s => clearedStages.includes(r+'-'+s)));
      if (allCleared) checkAchievement('archmage_path');
    }

    // Check ending condition
    const allRegionsCleared = [1,2,3,4,5].every(r => [1,2,3].every(s => clearedStages.includes(r+'-'+s)));
    if (allRegionsCleared && currentRegion === 4 && currentStage === 2) {
      // Trigger ending after result
    }
  }

  saveProgress();
}

function enterGameover() {
  isNewBest = score > highScore;
  if (isNewBest) highScore = score;
  camShakeIntensity = 20;
  saveProgress();
}

// ═══════════════════════════════════════════════════════════════
// §J2. UPDATE LOGIC
// ═══════════════════════════════════════════════════════════════

function update(dt) {
  gameTime += dt;

  if (gameState !== 'PAUSED') {
    tw.update(dt);
  }

  // Particle update
  if (['TITLE','PUZZLE','DEFENSE','BOSS_INTRO','BOSS_FIGHT','RESULT','GAMEOVER','ENDING'].includes(gameState)) {
    particlePool.updateAll(dt, (p) => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 80 * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  // Camera
  if (['PUZZLE','DEFENSE','BOSS_INTRO','BOSS_FIGHT','RESULT','GAMEOVER','ENDING'].includes(gameState)) {
    updateCamera(dt);
  }

  // Parallax scroll
  if (gameState === 'DEFENSE' || gameState === 'BOSS_FIGHT') {
    bgScroll1 += 10 * dt;
    bgScroll2 += 25 * dt;
  } else {
    bgScroll1 += 3 * dt;
    bgScroll2 += 6 * dt;
  }

  // Notifications decay
  for (let i = notifications.length - 1; i >= 0; i--) {
    notifications[i].life -= dt;
    notifications[i].y -= 30 * dt;
    if (notifications[i].life <= 0) notifications.splice(i, 1);
  }

  // Hit effects decay
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life -= dt;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }

  // Projectile trails decay
  for (let i = projTrails.length - 1; i >= 0; i--) {
    projTrails[i].life -= dt;
    if (projTrails[i].life <= 0) projTrails.splice(i, 1);
  }
  // Cap trail count for performance
  if (projTrails.length > 100) projTrails.splice(0, projTrails.length - 100);

  // Achievement popup
  if (achievementPopup) {
    achievementPopup.timer -= dt;
    if (achievementPopup.timer <= 0) achievementPopup = null;
  }

  // Victory celebration timer
  if (victoryCelebTimer > 0) victoryCelebTimer -= dt;

  // Scroll
  if (gameState === 'UPGRADE' || gameState === 'RECIPE_BOOK') {
    scrollMgr.update();
  }

  // Magma pool DOT on enemies
  if (gameState === 'DEFENSE') {
    for (const eo of envObjects) {
      if (eo.type === 'magmaPool') {
        for (const e of enemies) {
          if (e.alive && Math.abs(e.x - eo.x) < 20 && Math.abs(e.y - eo.y) < 15) {
            e.hp -= 5 * dt;
            if (e.hp <= 0 && e.alive) {
              e.alive = false;
              onEnemyKill(e);
              const idx = enemies.indexOf(e);
              if (idx >= 0) enemies.splice(idx, 1);
            }
          }
        }
      }
    }
  }

  // State-specific update
  switch(gameState) {
    case 'TITLE':
      updateTitle(dt);
      break;
    case 'PUZZLE':
      updatePuzzle(dt);
      break;
    case 'DEFENSE':
      updateDefense(dt);
      break;
    case 'BOSS_INTRO':
      updateBossIntro(dt);
      break;
    case 'BOSS_FIGHT':
      updateBossFightState(dt);
      break;
  }
}

function updateTitle(dt) {
  titlePulse += dt;
  if (Math.random() < 0.1) {
    spawnParticles(Math.random() * W, Math.random() * H, 1, RUNE_DATA[RUNE_KEYS[Math.floor(Math.random()*8)]].color);
  }
}

function updatePuzzle(dt) {
  updatePuzzleTimer(dt);
  matchedCircles = scanMagicCircles(grid);
  if (matchedCircles.length > 0 && !achievements.includes('first_magic')) {
    checkAchievement('first_magic');
  }
}

function updatePuzzleTimer(dt) {
  if (puzzleTimer <= 0) return;
  puzzleTimer -= dt;
  if (puzzleTimer <= 0) {
    puzzleTimer = 0;
    if (!isTransitioning) {
      activateCircles();
    }
  }
}

function updateDefense(dt) {
  if (defenseComplete) return;
  const region = REGION_DATA[currentRegion];

  // Spawn enemies (with elite chance)
  if (waveSpawned < waveEnemyCount) {
    waveSpawnTimer -= dt;
    if (waveSpawnTimer <= 0) {
      waveSpawnTimer = region.spawnInt;
      const enemyTypes = region.enemies;
      const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
      const lane = Math.floor(Math.random() * CONFIG.LANE_COUNT);
      // 15% elite chance, increasing with region
      const eliteChance = 0.05 + currentRegion * 0.03;
      const isElite = Math.random() < eliteChance;
      enemies.push(spawnEnemy(type, lane, currentRegion, isElite));
      waveSpawned++;
    }
  }

  updateEnemies(enemies, dt);
  fireMagic(dt);
  updateProjectiles(dt);

  // Check wave complete
  if (isWaveActive && enemies.length === 0 && waveSpawned >= waveEnemyCount) {
    waveIndex++;
    if (waveIndex >= region.waves) {
      isWaveActive = false;
      defenseComplete = true;
      addScore(Math.floor(puzzleTimer * 10), 'time');
      beginTransition('RESULT');
    } else {
      startWave();
    }
  }
}

function updateBossIntro(dt) {
  bossIntroTimer -= dt;
  if (bossIntroTimer <= 0) {
    beginTransition('BOSS_FIGHT');
  }
}

function updateBossFightState(dt) {
  if (!boss) return;
  fireMagic(dt);
  updateBoss(dt);
}

// ═══════════════════════════════════════════════════════════════
// §J3. RENDER DISPATCH
// ═══════════════════════════════════════════════════════════════

function render() {
  ctx.save();
  ctx.translate(W/2 + camShakeX, H/2 + camShakeY);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-W/2, -H/2);

  ctx.fillStyle = C.bgPrimary;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  buttons = [];

  switch(gameState) {
    case 'TITLE':       renderTitle(); break;
    case 'STAGE_SELECT':renderStageSelect(); break;
    case 'PUZZLE':      renderPuzzle(); break;
    case 'DEFENSE':     renderDefense(); break;
    case 'BOSS_INTRO':  renderBossIntro(); break;
    case 'BOSS_FIGHT':  renderBossFight(); break;
    case 'RESULT':      renderResult(); break;
    case 'UPGRADE':     renderUpgrade(); break;
    case 'RECIPE_BOOK': renderRecipeBook(); break;
    case 'PAUSED':      renderPaused(); break;
    case 'GAMEOVER':    renderGameover(); break;
    case 'ENDING':      renderEnding(); break;
  }

  if (showTutorial && gameState === 'PUZZLE') renderTutorial();

  if (isTransitioning) {
    ctx.fillStyle = 'rgba(0,0,0,' + transObj.v + ')';
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

function renderTutorial() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  const msgs = [
    { ko: '1. 인벤토리에서 룬을 탭하여 선택', en: '1. Tap a rune in inventory to select' },
    { ko: '2. 그리드 칸을 탭하여 배치', en: '2. Tap a grid cell to place' },
    { ko: '3. 발동 버튼으로 마법진 발동!', en: '3. Press Activate to cast magic!' }
  ];

  ctx.fillStyle = C.gold;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgs[tutorialStep][lang] || msgs[tutorialStep].en, W / 2, H * 0.45);

  if (tutorialStep === 0) {
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, H * 0.5);
    ctx.lineTo(W / 2, invBarY - 10);
    ctx.stroke();
    drawArrowHead(W / 2, invBarY - 10, Math.PI / 2);
  } else if (tutorialStep === 1) {
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, H * 0.5);
    ctx.lineTo(gridOffsetX + cellSize * 2.5, gridOffsetY - 10);
    ctx.stroke();
  }

  ctx.fillStyle = C.textSecondary;
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText('Tap to continue', W / 2, H * 0.7);
  buttons.push({ id: 'tutorial_next', x: 0, y: 0, w: W, h: H });
}

function drawArrowHead(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = C.gold;
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(-8, -12); ctx.lineTo(8, -12); ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// §K. INPUT HANDLING
// ═══════════════════════════════════════════════════════════════

const keys = {};

window.addEventListener('keydown', (e) => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  inputMode = 'keyboard';
  sound.init();
  handleKeyAction(e.code);
  e.preventDefault();
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

function handleKeyAction(code) {
  if (code === 'KeyM') { sound.toggleMute(); return; }
  if (code === 'Escape' || code === 'KeyP') {
    if (gameState === 'PAUSED') { gameState = prevState; return; }
    if (['PUZZLE','DEFENSE','BOSS_FIGHT'].includes(gameState)) {
      prevState = gameState; gameState = 'PAUSED'; return;
    }
  }

  switch(gameState) {
    case 'TITLE':
      if (code === 'Space' || code === 'Enter') {
        beginTransition('STAGE_SELECT');
      }
      break;

    case 'STAGE_SELECT':
      if (code === 'Escape') beginTransition('TITLE');
      break;

    case 'PUZZLE':
      if (code === 'ArrowUp' || code === 'KeyW') cursorY = Math.max(0, cursorY - 1);
      if (code === 'ArrowDown' || code === 'KeyS') cursorY = Math.min(4, cursorY + 1);
      if (code === 'ArrowLeft' || code === 'KeyA') cursorX = Math.max(0, cursorX - 1);
      if (code === 'ArrowRight' || code === 'KeyD') cursorX = Math.min(4, cursorX + 1);
      if (code === 'Space' || code === 'Enter') {
        if (selectedRuneIdx >= 0 && selectedRuneIdx < inventory.length) {
          if (placeRune(cursorY, cursorX, inventory[selectedRuneIdx])) {
            inventory.splice(selectedRuneIdx, 1);
            selectedRuneIdx = Math.min(selectedRuneIdx, inventory.length - 1);
          }
        }
      }
      for (let i = 1; i <= 9; i++) {
        if (code === 'Digit' + i && i - 1 < inventory.length) {
          selectedRuneIdx = i - 1;
          sound.sfxUIClick();
        }
      }
      if (code === 'KeyR') {
        for (let r = 4; r >= 0; r--) {
          for (let c2 = 4; c2 >= 0; c2--) {
            if (grid[r][c2]) {
              const rune = removeRune(r, c2);
              if (rune && inventory.length < CONFIG.INV_MAX_BASE + upgrades.invExpand) {
                inventory.push(rune);
              }
              return;
            }
          }
        }
      }
      if (code === 'KeyQ') activateCircles();
      if (code === 'Tab') { beginTransition('RECIPE_BOOK'); }
      break;

    case 'DEFENSE':
    case 'BOSS_FIGHT':
      break;

    case 'RESULT':
      if (code === 'Space' || code === 'Enter') {
        beginTransition('STAGE_SELECT');
      }
      break;

    case 'UPGRADE':
    case 'RECIPE_BOOK':
      if (code === 'Escape' || code === 'Tab') beginTransition('STAGE_SELECT');
      break;

    case 'PAUSED':
      if (code === 'Space' || code === 'Enter') {
        gameState = prevState;
      }
      break;

    case 'GAMEOVER':
      if (code === 'KeyR' || code === 'Space') {
        resetGame();
        beginTransition('TITLE');
      }
      break;

    case 'ENDING':
      if (code === 'Space' || code === 'Enter') {
        resetGame();
        beginTransition('TITLE');
      }
      break;
  }
}

// Mouse events
canvas.addEventListener('mousedown', (e) => {
  inputMode = 'mouse';
  sound.init();
  handleClick(e.clientX, e.clientY);
});

canvas.addEventListener('wheel', (e) => {
  if (gameState === 'UPGRADE' || gameState === 'RECIPE_BOOK') {
    scrollMgr.onWheel(e.deltaY);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (gameState !== 'PUZZLE') return;
  const { row, col } = getGridCell(e.clientX, e.clientY);
  if (row >= 0) {
    const rune = removeRune(row, col);
    if (rune && inventory.length < CONFIG.INV_MAX_BASE + upgrades.invExpand) {
      inventory.push(rune);
    }
  }
});

// Touch events
let touchStartTime = 0;
let longPressTimer = null;
let touchId = null;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  inputMode = 'touch';
  sound.init();
  const touch = e.touches[0];
  touchId = touch.identifier;
  touchStartTime = Date.now();

  if (gameState === 'UPGRADE' || gameState === 'RECIPE_BOOK') {
    scrollMgr.onTouchStart(touch.clientY);
  }

  if (gameState === 'PUZZLE') {
    if (longPressTimer) clearLongPress();
    const tx = touch.clientX, ty = touch.clientY;
    longPressTimer = { startX: tx, startY: ty, triggered: false };
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = [...e.touches].find(t2 => t2.identifier === touchId) || e.touches[0];
  if (!touch) return;

  if (gameState === 'UPGRADE' || gameState === 'RECIPE_BOOK') {
    scrollMgr.onTouchMove(touch.clientY);
  }

  if (longPressTimer) {
    const dx = touch.clientX - longPressTimer.startX;
    const dy = touch.clientY - longPressTimer.startY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearLongPress();
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const duration = Date.now() - touchStartTime;

  if (gameState === 'UPGRADE' || gameState === 'RECIPE_BOOK') {
    scrollMgr.onTouchEnd();
    if (Math.abs(scrollMgr.momentum) > CONFIG.SCROLL_THRESHOLD) { clearLongPress(); return; }
  }

  if (gameState === 'PUZZLE' && longPressTimer && duration >= 300 && !longPressTimer.triggered) {
    const { row, col } = getGridCell(longPressTimer.startX, longPressTimer.startY);
    if (row >= 0 && grid[row][col]) {
      const rune = removeRune(row, col);
      if (rune && inventory.length < CONFIG.INV_MAX_BASE + upgrades.invExpand) {
        inventory.push(rune);
      }
      clearLongPress();
      return;
    }
  }

  clearLongPress();

  if (duration < 300) {
    const ct = e.changedTouches[0];
    if (ct) handleClick(ct.clientX, ct.clientY);
  }
}, { passive: false });

function clearLongPress() {
  longPressTimer = null;
}

function getGridCell(sx, sy) {
  const col = Math.floor((sx - gridOffsetX) / cellSize);
  const row = Math.floor((sy - gridOffsetY) / cellSize);
  if (row >= 0 && row < 5 && col >= 0 && col < 5) return { row, col };
  return { row: -1, col: -1 };
}

function handleClick(x, y) {
  for (const btn of buttons) {
    if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
      processButton(btn.id);
      return;
    }
  }

  switch(gameState) {
    case 'TITLE':
      beginTransition('STAGE_SELECT');
      break;

    case 'PUZZLE': {
      const { row, col } = getGridCell(x, y);
      if (row >= 0) {
        if (selectedRuneIdx >= 0 && selectedRuneIdx < inventory.length) {
          if (placeRune(row, col, inventory[selectedRuneIdx])) {
            inventory.splice(selectedRuneIdx, 1);
            selectedRuneIdx = Math.min(selectedRuneIdx, inventory.length - 1);
            if (showTutorial && tutorialStep === 1) {
              tutorialStep = 2;
            }
          }
        }
      }
      break;
    }

    case 'GAMEOVER':
      resetGame();
      beginTransition('TITLE');
      break;

    case 'ENDING':
      resetGame();
      beginTransition('TITLE');
      break;
  }
}

function processButton(id) {
  sound.sfxUIClick();

  if (id.startsWith('diff_')) {
    difficulty = id.replace('diff_', '');
    return;
  }

  if (id.startsWith('inv_')) {
    const idx = parseInt(id.replace('inv_', ''));
    if (idx < inventory.length) {
      selectedRuneIdx = idx;
      if (showTutorial && tutorialStep === 0) tutorialStep = 1;
    }
    return;
  }

  if (id.startsWith('region_')) {
    const idx = parseInt(id.replace('region_', ''));
    currentRegion = idx;
    return;
  }

  if (id.startsWith('stage_')) {
    const idx = parseInt(id.replace('stage_', ''));
    currentStage = idx;
    beginTransition('PUZZLE');
    return;
  }

  if (id.startsWith('buy_')) {
    const upgId = id.replace('buy_', '');
    buyUpgrade(upgId);
    return;
  }

  if (id.startsWith('hidden_')) {
    const hIdx = parseInt(id.replace('hidden_', ''));
    if (hIdx === 1) {
      // Hidden boss: rune golem
      initBoss('rune_golem');
      bossIntroTimer = 3.0;
      sound.sfxBossAppear();
      camShakeIntensity = 10;
      beginTransition('BOSS_INTRO');
    } else {
      // Hidden stage 1: extra puzzle stage
      currentStage = 0;
      beginTransition('PUZZLE');
    }
    return;
  }

  switch(id) {
    case 'activate':
      activateCircles();
      break;
    case 'undo':
      for (let r = 4; r >= 0; r--) for (let c2 = 4; c2 >= 0; c2--) {
        if (grid[r][c2]) {
          const rune = removeRune(r, c2);
          if (rune && inventory.length < CONFIG.INV_MAX_BASE + upgrades.invExpand) inventory.push(rune);
          return;
        }
      }
      break;
    case 'boss': {
      const bossId = REGION_BOSS[currentRegion];
      if (bossId) {
        // Need to go through puzzle first for boss
        beginTransition('PUZZLE');
      }
      break;
    }
    case 'upgrade':
      beginTransition('UPGRADE');
      break;
    case 'recipe':
      beginTransition('RECIPE_BOOK');
      break;
    case 'back_title':
      beginTransition('TITLE');
      break;
    case 'back_stage':
      beginTransition('STAGE_SELECT');
      break;
    case 'result_continue':
      beginTransition('STAGE_SELECT');
      break;
    case 'resume':
      gameState = prevState;
      break;
    case 'restart_title':
      resetGame();
      beginTransition('TITLE');
      break;
    case 'mute':
      sound.toggleMute();
      break;
    case 'tutorial_next':
      tutorialStep++;
      if (tutorialStep >= 3) {
        showTutorial = false;
        try { localStorage.setItem('rft_tutorial', '1'); } catch(e) {}
      }
      break;
  }
}

// Full game reset
function resetGame() {
  score = 0;
  stageScore = 0;
  stageCrystals = 0;
  stageLivesLost = 0;
  lives = DIFFICULTY_DATA[difficulty].lives;
  maxLives = lives;
  enemies = [];
  projectiles = [];
  activatedMagics = [];
  matchedCircles = [];
  envObjects = [];
  projTrails = [];
  boss = null;
  isTransitioning = false;
  isWaveActive = false;
  defenseComplete = false;
  camShakeIntensity = 0;
  camZoom = 1; camTargetZoom = 1;
  compositeBonus = { type: null, mult: 1 };
  tw.clearImmediate();
  notifications = [];
  hitEffects = [];
  achievementPopup = null;
  victoryCelebTimer = 0;
}

// ═══════════════════════════════════════════════════════════════
// §L. INIT & GAME LOOP
// ═══════════════════════════════════════════════════════════════

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const gridArea = Math.min(W * 0.55, H * 0.55);
  cellSize = Math.floor(gridArea / CONFIG.GRID_SIZE);
  gridOffsetX = (W - cellSize * CONFIG.GRID_SIZE) / 2;
  gridOffsetY = Math.max(60, (H * 0.5 - cellSize * CONFIG.GRID_SIZE) / 2 + 30);

  invBarH = Math.max(CONFIG.MIN_TOUCH + 10, cellSize);
  invBarY = gridOffsetY + cellSize * CONFIG.GRID_SIZE + 15;

  gridCacheDirty = true;
}

function init() {
  ctx.fillStyle = C.bgPrimary;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = C.textPrimary;
  ctx.font = '16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Loading...', canvas.width / 2, canvas.height / 2);

  loadProgress();
  lives = DIFFICULTY_DATA[difficulty].lives;
  maxLives = lives;
  resizeCanvas();
  gameState = 'TITLE';

  for (let i = 0; i < 20; i++) {
    spawnParticles(Math.random() * W, Math.random() * H, 1, RUNE_KEYS[i % 8] ? RUNE_DATA[RUNE_KEYS[i % 8]].color : C.cyan);
  }

  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, CONFIG.MAX_DT);
    lastTime = timestamp;
    update(dt);
    render();
  } catch (e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

init();
</script>
