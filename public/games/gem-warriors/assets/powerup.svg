<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="shieldGradPU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="40%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2471A3"/>
    </linearGradient>
    <radialGradient id="shieldCenter" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="puGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3498DB" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#3498DB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gemInlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <filter id="puGlowFilter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow aura -->
  <ellipse cx="24" cy="26" rx="22" ry="20" fill="url(#puGlow)" filter="url(#puGlowFilter)"/>
  <!-- Shield body -->
  <path d="M24 6 L40 14 L40 28 Q40 40 24 44 Q8 40 8 28 L8 14 Z" fill="url(#shieldGradPU)" stroke="#2471A3" stroke-width="1" filter="url(#puGlowFilter)"/>
  <!-- Shield border decoration -->
  <path d="M24 9 L37 15.5 L37 27 Q37 37.5 24 41 Q11 37.5 11 27 L11 15.5 Z" fill="none" stroke="#5DADE2" stroke-width="0.8" opacity="0.6"/>
  <!-- Shield inner highlight -->
  <path d="M24 6 L8 14 L8 20 Q14 14 24 10 Z" fill="url(#shieldCenter)"/>
  <!-- Central gem -->
  <path d="M24 18 L28 24 L24 30 L20 24 Z" fill="url(#gemInlay)" stroke="#D4AC0D" stroke-width="0.6" filter="url(#innerGlow)"/>
  <!-- Gem facet lines -->
  <line x1="24" y1="18" x2="24" y2="30" stroke="#FFE066" stroke-width="0.3" opacity="0.4"/>
  <line x1="20" y1="24" x2="28" y2="24" stroke="#FFE066" stroke-width="0.3" opacity="0.4"/>
  <!-- Gem sparkle -->
  <circle cx="22" cy="21" r="1" fill="#FFFFFF" opacity="0.8"/>
  <!-- Shield cross pattern -->
  <line x1="24" y1="12" x2="24" y2="17" stroke="#85C1E9" stroke-width="1.5" opacity="0.5"/>
  <line x1="24" y1="31" x2="24" y2="38" stroke="#85C1E9" stroke-width="1.5" opacity="0.5"/>
  <line x1="12" y1="22" x2="19" y2="24" stroke="#85C1E9" stroke-width="1.5" opacity="0.5"/>
  <line x1="29" y1="24" x2="36" y2="22" stroke="#85C1E9" stroke-width="1.5" opacity="0.5"/>
  <!-- Orbiting sparkles -->
  <circle cx="6" cy="20" r="1.5" fill="#F1C40F" opacity="0.6" filter="url(#innerGlow)"/>
  <circle cx="42" cy="20" r="1.5" fill="#F1C40F" opacity="0.6" filter="url(#innerGlow)"/>
  <circle cx="24" cy="3" r="1.2" fill="#FFFFFF" opacity="0.5" filter="url(#innerGlow)"/>
</svg>