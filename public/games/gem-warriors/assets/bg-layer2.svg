<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="towerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#0F1624"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2D3D"/>
      <stop offset="100%" stop-color="#0F1624"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F39C12" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#E67E22" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F39C12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8E44AD" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6B2D5B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A2A"/>
      <stop offset="100%" stop-color="#0D1B14"/>
    </linearGradient>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fogFilter">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Castle ruins - left side -->
  <g id="castleLeft" opacity="0.7">
    <!-- Tower 1 -->
    <rect x="30" y="280" width="40" height="200" fill="url(#towerGrad)"/>
    <path d="M25 280 L50 250 L75 280 Z" fill="#1E2D3D"/>
    <!-- Tower windows -->
    <rect x="44" y="310" width="8" height="12" rx="4" fill="url(#windowGlow)" filter="url(#glowSoft)"/>
    <rect x="44" y="360" width="8" height="12" rx="4" fill="url(#windowGlow)" filter="url(#glowSoft)"/>
    <rect x="44" y="410" width="8" height="12" rx="4" fill="url(#windowGlow)" filter="url(#glowSoft)"/>
    <!-- Connecting wall -->
    <rect x="70" y="360" width="60" height="120" fill="url(#wallGrad)"/>
    <!-- Wall crenellations -->
    <rect x="70" y="350" width="12" height="20" fill="#1E2D3D"/>
    <rect x="90" y="350" width="12" height="20" fill="#1E2D3D"/>
    <rect x="110" y="350" width="12" height="20" fill="#1E2D3D"/>
    <!-- Tower 2 (broken) -->
    <rect x="130" y="320" width="35" height="160" fill="url(#towerGrad)"/>
    <path d="M128 320 L148 290 L168 320 L158 310 L148 320 L138 308 Z" fill="#1E2D3D"/>
  </g>
  <!-- Ancient trees - middle -->
  <g id="trees" opacity="0.6">
    <path d="M260 380 L270 310 Q280 280 290 310 L300 380 Z" fill="url(#treeGrad)"/>
    <path d="M268 340 Q280 260 292 340" fill="#1A3A2A" opacity="0.7"/>
    <path d="M272 310 Q280 240 288 310" fill="#0D2618" opacity="0.6"/>
    <path d="M340 400 L348 340 Q355 315 362 340 L370 400 Z" fill="url(#treeGrad)"/>
    <path d="M345 370 Q355 300 365 370" fill="#1A3A2A" opacity="0.7"/>
  </g>
  <!-- Magical portal archway - center -->
  <g id="portal" opacity="0.5">
    <path d="M380 480 L380 360 Q400 300 420 310 Q440 300 460 360 L460 480 Z" fill="#16213E" stroke="#34495E" stroke-width="1"/>
    <ellipse cx="420" cy="390" rx="30" ry="50" fill="url(#portalGlow)" filter="url(#glowSoft)"/>
    <!-- Portal runes -->
    <circle cx="385" cy="370" r="3" fill="#9B59B6" opacity="0.4" filter="url(#glowSoft)"/>
    <circle cx="385" cy="400" r="3" fill="#9B59B6" opacity="0.3" filter="url(#glowSoft)"/>
    <circle cx="385" cy="430" r="3" fill="#9B59B6" opacity="0.35" filter="url(#glowSoft)"/>
    <circle cx="455" cy="370" r="3" fill="#9B59B6" opacity="0.4" filter="url(#glowSoft)"/>
    <circle cx="455" cy="400" r="3" fill="#9B59B6" opacity="0.3" filter="url(#glowSoft)"/>
    <circle cx="455" cy="430" r="3" fill="#9B59B6" opacity="0.35" filter="url(#glowSoft)"/>
  </g>
  <!-- Ruins - right side -->
  <g id="ruinsRight" opacity="0.65">
    <!-- Broken columns -->
    <rect x="560" y="360" width="18" height="120" rx="3" fill="#1E2D3D"/>
    <ellipse cx="569" cy="355" rx="14" ry="6" fill="#24344A"/>
    <rect x="610" y="390" width="18" height="90" rx="3" fill="#1E2D3D"/>
    <ellipse cx="619" cy="385" rx="14" ry="6" fill="#24344A"/>
    <!-- Broken arch between columns -->
    <path d="M578 370 Q594 340 610 370" fill="none" stroke="#1E2D3D" stroke-width="6" opacity="0.5"/>
    <!-- Large tower right -->
    <rect x="680" y="300" width="50" height="180" fill="url(#towerGrad)"/>
    <path d="M675 300 L705 260 L735 300 Z" fill="#1E2D3D"/>
    <rect x="698" y="330" width="10" height="14" rx="5" fill="url(#windowGlow)" filter="url(#glowSoft)"/>
    <rect x="698" y="380" width="10" height="14" rx="5" fill="url(#windowGlow)" filter="url(#glowSoft)"/>
    <!-- Flag on tower -->
    <line x1="705" y1="260" x2="705" y2="235" stroke="#34495E" stroke-width="1.5"/>
    <path d="M705 235 L725 242 L705 250 Z" fill="#9B59B6" opacity="0.5"/>
  </g>
  <!-- Ground fog -->
  <g id="fog" opacity="0.25">
    <ellipse cx="200" cy="500" rx="200" ry="40" fill="#1A1A2E" filter="url(#fogFilter)"/>
    <ellipse cx="500" cy="510" rx="180" ry="35" fill="#16213E" filter="url(#fogFilter)"/>
    <ellipse cx="700" cy="495" rx="150" ry="45" fill="#1A1A2E" filter="url(#fogFilter)"/>
  </g>
  <!-- Floating gem particles -->
  <g id="floatingGems" opacity="0.5">
    <path d="M150 300 L155 290 L160 300 L155 305 Z" fill="#E74C3C" filter="url(#glowSoft)" opacity="0.4"/>
    <path d="M500 280 L504 272 L508 280 L504 284 Z" fill="#3498DB" filter="url(#glowSoft)" opacity="0.35"/>
    <path d="M650 350 L654 342 L658 350 L654 354 Z" fill="#2ECC71" filter="url(#glowSoft)" opacity="0.3"/>
    <path d="M320 260 L323 254 L326 260 L323 264 Z" fill="#F1C40F" filter="url(#glowSoft)" opacity="0.4"/>
  </g>
</svg>