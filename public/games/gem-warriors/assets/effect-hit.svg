<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFEB3B" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E74C3C" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#C0392B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#E74C3C" stop-opacity="0"/>
      <stop offset="75%" stop-color="#E74C3C" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#F39C12" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F39C12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F39C12" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer shockwave ring -->
  <circle cx="48" cy="48" r="44" fill="url(#shockwave)"/>
  <!-- Inner shockwave -->
  <circle cx="48" cy="48" r="30" fill="url(#shockwave)" opacity="0.5"/>
  <!-- Explosion core -->
  <circle cx="48" cy="48" r="18" fill="url(#hitCore)" filter="url(#coreGlow)"/>
  <!-- Energy rays -->
  <g id="rays" filter="url(#hitGlow)">
    <path d="M48 48 L48 8 L50 12 L48 48" fill="#F39C12" opacity="0.5"/>
    <path d="M48 48 L82 20 L78 24 L48 48" fill="#E74C3C" opacity="0.4"/>
    <path d="M48 48 L88 48 L84 50 L48 48" fill="#F39C12" opacity="0.5"/>
    <path d="M48 48 L82 76 L78 72 L48 48" fill="#E74C3C" opacity="0.4"/>
    <path d="M48 48 L48 88 L46 84 L48 48" fill="#F39C12" opacity="0.5"/>
    <path d="M48 48 L14 76 L18 72 L48 48" fill="#E74C3C" opacity="0.4"/>
    <path d="M48 48 L8 48 L12 46 L48 48" fill="#F39C12" opacity="0.5"/>
    <path d="M48 48 L14 20 L18 24 L48 48" fill="#E74C3C" opacity="0.4"/>
  </g>
  <!-- Debris particles -->
  <g id="debris" filter="url(#sparkGlow)">
    <circle cx="28" cy="20" r="2.5" fill="url(#sparkGrad)"/>
    <circle cx="70" cy="22" r="2" fill="url(#sparkGrad)"/>
    <circle cx="78" cy="55" r="3" fill="url(#sparkGrad)"/>
    <circle cx="18" cy="60" r="2.5" fill="url(#sparkGrad)"/>
    <circle cx="60" cy="78" r="2" fill="url(#sparkGrad)"/>
    <circle cx="35" cy="75" r="2.5" fill="url(#sparkGrad)"/>
    <circle cx="72" cy="38" r="1.8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="25" cy="40" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  </g>
  <!-- Gem shard fragments -->
  <g id="shards" opacity="0.6" filter="url(#sparkGlow)">
    <path d="M22 28 L25 24 L28 28 L25 30 Z" fill="#E74C3C" opacity="0.7"/>
    <path d="M68 32 L71 28 L74 32 L71 34 Z" fill="#3498DB" opacity="0.6"/>
    <path d="M64 68 L67 64 L70 68 L67 70 Z" fill="#2ECC71" opacity="0.6"/>
    <path d="M26 65 L29 61 L32 65 L29 67 Z" fill="#F1C40F" opacity="0.7"/>
    <path d="M40 14 L42 11 L44 14 L42 16 Z" fill="#9B59B6" opacity="0.5"/>
  </g>
</svg>