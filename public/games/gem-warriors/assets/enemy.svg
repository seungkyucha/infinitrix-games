<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2D5B"/>
      <stop offset="50%" stop-color="#4A1942"/>
      <stop offset="100%" stop-color="#2D1130"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C0392B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8E44AD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6B2D5B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hornGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A1942"/>
      <stop offset="100%" stop-color="#1A0A14"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECF0F1"/>
      <stop offset="100%" stop-color="#95A5A6"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="auraFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark aura -->
  <ellipse cx="32" cy="34" rx="28" ry="26" fill="url(#auraGlow)" filter="url(#auraFilter)"/>
  <!-- Wings -->
  <g id="wings">
    <path d="M14 24 Q2 14 4 8 Q8 12 12 16 Q6 10 8 4 Q12 10 16 18 L18 26 Z" fill="#3D1440" opacity="0.85" stroke="#4A1942" stroke-width="0.5"/>
    <path d="M50 24 Q62 14 60 8 Q56 12 52 16 Q58 10 56 4 Q52 10 48 18 L46 26 Z" fill="#3D1440" opacity="0.85" stroke="#4A1942" stroke-width="0.5"/>
  </g>
  <!-- Body -->
  <g id="body">
    <path d="M22 22 Q20 30 20 40 Q22 50 32 52 Q42 50 44 40 Q44 30 42 22 Q38 18 32 16 Q26 18 22 22 Z" fill="url(#bodyGrad)" stroke="#6B2D5B" stroke-width="0.6"/>
    <!-- Chest runes -->
    <path d="M28 30 L30 34 L34 34 L36 30 L34 26 L30 26 Z" fill="none" stroke="#E74C3C" stroke-width="0.6" opacity="0.5" filter="url(#redGlow)"/>
    <path d="M32 28 L32 32" stroke="#E74C3C" stroke-width="0.5" opacity="0.5"/>
    <path d="M30 30 L34 30" stroke="#E74C3C" stroke-width="0.5" opacity="0.5"/>
    <!-- Belly scales -->
    <path d="M28 36 Q32 38 36 36 Q32 40 28 36 Z" fill="#5C2050" opacity="0.5"/>
    <path d="M29 40 Q32 42 35 40 Q32 44 29 40 Z" fill="#5C2050" opacity="0.4"/>
  </g>
  <!-- Head -->
  <g id="head">
    <path d="M26 10 Q26 4 32 4 Q38 4 38 10 L40 18 Q40 22 32 24 Q24 22 24 18 Z" fill="url(#bodyGrad)" stroke="#6B2D5B" stroke-width="0.5"/>
    <!-- Horns -->
    <path d="M26 10 Q22 4 18 0 Q20 4 22 8" fill="url(#hornGrad)" stroke="#2D1130" stroke-width="0.5"/>
    <path d="M38 10 Q42 4 46 0 Q44 4 42 8" fill="url(#hornGrad)" stroke="#2D1130" stroke-width="0.5"/>
    <!-- Eyes -->
    <ellipse cx="28" cy="14" rx="3" ry="2" fill="url(#eyeGlow)" filter="url(#redGlow)"/>
    <ellipse cx="36" cy="14" rx="3" ry="2" fill="url(#eyeGlow)" filter="url(#redGlow)"/>
    <ellipse cx="28" cy="14" rx="1.2" ry="1.5" fill="#FFEB3B"/>
    <ellipse cx="36" cy="14" rx="1.2" ry="1.5" fill="#FFEB3B"/>
    <!-- Mouth -->
    <path d="M28 19 Q30 21 32 19 Q34 21 36 19" fill="none" stroke="#C0392B" stroke-width="0.8"/>
    <!-- Fangs -->
    <path d="M29 19 L28.5 22 L30 19" fill="url(#clawGrad)"/>
    <path d="M35 19 L35.5 22 L34 19" fill="url(#clawGrad)"/>
  </g>
  <!-- Arms & Claws -->
  <g id="arms">
    <path d="M20 26 Q14 30 10 36 Q12 34 14 32 L10 40 Q14 36 18 34 L20 38" fill="#4A1942" stroke="#6B2D5B" stroke-width="0.4"/>
    <path d="M44 26 Q50 30 54 36 Q52 34 50 32 L54 40 Q50 36 46 34 L44 38" fill="#4A1942" stroke="#6B2D5B" stroke-width="0.4"/>
    <!-- Claws -->
    <path d="M8 39 L6 42 L10 40" fill="url(#clawGrad)"/>
    <path d="M10 40 L8 44 L12 41" fill="url(#clawGrad)"/>
    <path d="M56 39 L58 42 L54 40" fill="url(#clawGrad)"/>
    <path d="M54 40 L56 44 L52 41" fill="url(#clawGrad)"/>
  </g>
  <!-- Tail -->
  <path d="M32 50 Q28 54 22 56 Q18 58 14 56 Q16 60 20 60 Q24 60 28 58 Q32 56 32 52" fill="#4A1942" stroke="#6B2D5B" stroke-width="0.4"/>
  <!-- Feet -->
  <g id="feet">
    <path d="M24 48 L20 56 L24 54 L22 60 L28 54 L26 52 Z" fill="#3D1440"/>
    <path d="M40 48 L44 56 L40 54 L42 60 L36 54 L38 52 Z" fill="#3D1440"/>
  </g>
</svg>