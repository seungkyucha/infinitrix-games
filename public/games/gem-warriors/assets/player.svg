<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E9AAF"/>
      <stop offset="50%" stop-color="#5C6378"/>
      <stop offset="100%" stop-color="#3D4255"/>
    </linearGradient>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C7A8D"/>
      <stop offset="40%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="50%" stop-color="#CBD5E0"/>
      <stop offset="100%" stop-color="#A0AEC0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="50%" stop-color="#2471A3"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <radialGradient id="visorGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#3498DB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="1"/>
      <stop offset="60%" stop-color="#F39C12" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E67E22" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Cape -->
  <g id="cape">
    <path d="M22 28 Q18 38 16 52 Q20 50 24 48 L28 32 Z" fill="#2471A3" opacity="0.8"/>
    <path d="M42 28 Q46 38 48 52 Q44 50 40 48 L36 32 Z" fill="#1A5276" opacity="0.8"/>
  </g>
  <!-- Body / Armor -->
  <g id="armor">
    <path d="M24 26 L22 44 Q26 48 32 48 Q38 48 42 44 L40 26 Q36 24 32 23 Q28 24 24 26 Z" fill="url(#armorGrad)" stroke="#4A5568" stroke-width="0.5"/>
    <!-- Armor detail lines -->
    <path d="M28 28 L28 40" stroke="#5C6378" stroke-width="0.8" opacity="0.6"/>
    <path d="M36 28 L36 40" stroke="#5C6378" stroke-width="0.8" opacity="0.6"/>
    <path d="M24 34 Q32 36 40 34" stroke="#5C6378" stroke-width="0.5" fill="none" opacity="0.5"/>
    <!-- Chest gem -->
    <circle cx="32" cy="30" r="2.5" fill="url(#gemGlow)" filter="url(#glow)"/>
  </g>
  <!-- Legs -->
  <g id="legs">
    <path d="M26 46 L24 58 L28 58 L30 48 Z" fill="#3D4255"/>
    <path d="M38 46 L40 58 L36 58 L34 48 Z" fill="#3D4255"/>
    <!-- Boots -->
    <path d="M23 56 L22 60 Q24 62 28 62 L29 58 Z" fill="#2D3748" stroke="#4A5568" stroke-width="0.4"/>
    <path d="M41 56 L42 60 Q40 62 36 62 L35 58 Z" fill="#2D3748" stroke="#4A5568" stroke-width="0.4"/>
  </g>
  <!-- Shield (left) -->
  <g id="shield">
    <path d="M12 28 L8 30 L8 42 Q8 48 16 50 Q20 48 20 42 L20 30 Z" fill="url(#shieldGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <path d="M14 32 L14 44 Q14 47 16 48 Q18 47 18 44 L18 32 Z" fill="#2980B9" opacity="0.6"/>
    <!-- Shield cross emblem -->
    <line x1="14" y1="38" x2="18" y2="38" stroke="#F1C40F" stroke-width="1" opacity="0.8"/>
    <line x1="16" y1="34" x2="16" y2="42" stroke="#F1C40F" stroke-width="1" opacity="0.8"/>
  </g>
  <!-- Sword (right) -->
  <g id="sword">
    <path d="M48 14 L50 16 L46 40 L44 40 Z" fill="url(#swordGrad)" filter="url(#glow)"/>
    <!-- Sword guard -->
    <rect x="42" y="38" width="10" height="3" rx="1" fill="#F39C12"/>
    <!-- Sword handle -->
    <rect x="45" y="41" width="4" height="8" rx="1" fill="#5D4037"/>
    <!-- Sword pommel -->
    <circle cx="47" cy="50" r="2" fill="#F1C40F" filter="url(#glow)"/>
  </g>
  <!-- Helmet -->
  <g id="helmet">
    <path d="M24 8 Q24 2 32 2 Q40 2 40 8 L42 18 Q42 24 32 26 Q22 24 22 18 Z" fill="url(#helmetGrad)" stroke="#4A5568" stroke-width="0.5"/>
    <!-- Visor -->
    <path d="M26 14 Q32 12 38 14 L38 18 Q32 20 26 18 Z" fill="url(#visorGlow)" filter="url(#glow)"/>
    <!-- Helmet crest -->
    <path d="M32 2 Q34 0 36 2 Q34 1 32 2" fill="#F1C40F" opacity="0.8"/>
    <path d="M30 4 L32 0 L34 4" fill="#8E9AAF" stroke="#6C7A8D" stroke-width="0.3"/>
    <!-- Helmet nose guard -->
    <line x1="32" y1="12" x2="32" y2="20" stroke="#5C6378" stroke-width="1.2"/>
  </g>
  <!-- Shoulder pads -->
  <g id="shoulders">
    <ellipse cx="22" cy="26" rx="5" ry="3" fill="#5C6378" stroke="#4A5568" stroke-width="0.5"/>
    <ellipse cx="42" cy="26" rx="5" ry="3" fill="#5C6378" stroke="#4A5568" stroke-width="0.5"/>
    <circle cx="22" cy="26" r="1.5" fill="#F1C40F" opacity="0.6" filter="url(#glow)"/>
    <circle cx="42" cy="26" r="1.5" fill="#F1C40F" opacity="0.6" filter="url(#glow)"/>
  </g>
</svg>