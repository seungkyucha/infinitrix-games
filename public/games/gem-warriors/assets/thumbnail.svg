<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tBgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="50%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="tCenterGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tGemRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <linearGradient id="tGemBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#3498DB"/>
    </linearGradient>
    <linearGradient id="tGemGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58D68D"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <linearGradient id="tGemYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E154"/>
      <stop offset="100%" stop-color="#F1C40F"/>
    </linearGradient>
    <linearGradient id="tGemPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BB8FCE"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="tSwordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#A0AEC0"/>
    </linearGradient>
    <linearGradient id="tArmorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E9AAF"/>
      <stop offset="100%" stop-color="#3D4255"/>
    </linearGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tDropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#tBgGrad)"/>
  <rect width="400" height="300" fill="url(#tCenterGlow)"/>
  <!-- Distant stars -->
  <g opacity="0.6">
    <circle cx="30" cy="25" r="1" fill="#FFF"/>
    <circle cx="80" cy="50" r="1.5" fill="#F1C40F"/>
    <circle cx="140" cy="15" r="1" fill="#FFF"/>
    <circle cx="260" cy="30" r="1.2" fill="#FFF"/>
    <circle cx="330" cy="20" r="1" fill="#3498DB"/>
    <circle cx="370" cy="55" r="1.5" fill="#FFF"/>
    <circle cx="50" cy="80" r="0.8" fill="#FFF"/>
    <circle cx="350" cy="75" r="1" fill="#9B59B6"/>
  </g>
  <!-- 8x8 Gem grid (partial, dramatic angle) -->
  <g id="gemGrid" transform="translate(140, 100) rotate(-5)" opacity="0.85">
    <!-- Grid background -->
    <rect x="0" y="0" width="160" height="160" rx="6" fill="rgba(0,0,0,0.4)" stroke="#34495E" stroke-width="1"/>
    <!-- Grid lines -->
    <g stroke="#34495E" stroke-width="0.5" opacity="0.4">
      <line x1="20" y1="0" x2="20" y2="160"/>
      <line x1="40" y1="0" x2="40" y2="160"/>
      <line x1="60" y1="0" x2="60" y2="160"/>
      <line x1="80" y1="0" x2="80" y2="160"/>
      <line x1="100" y1="0" x2="100" y2="160"/>
      <line x1="120" y1="0" x2="120" y2="160"/>
      <line x1="140" y1="0" x2="140" y2="160"/>
      <line x1="0" y1="20" x2="160" y2="20"/>
      <line x1="0" y1="40" x2="160" y2="40"/>
      <line x1="0" y1="60" x2="160" y2="60"/>
      <line x1="0" y1="80" x2="160" y2="80"/>
      <line x1="0" y1="100" x2="160" y2="100"/>
      <line x1="0" y1="120" x2="160" y2="120"/>
      <line x1="0" y1="140" x2="160" y2="140"/>
    </g>
    <!-- Gems row 1 -->
    <path d="M10 10 L14 4 L18 10 L14 14 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M30 10 L34 4 L38 10 L34 14 Z" fill="url(#tGemBlue)" filter="url(#tGlow)"/>
    <path d="M50 10 L54 4 L58 10 L54 14 Z" fill="url(#tGemGreen)" filter="url(#tGlow)"/>
    <path d="M70 10 L74 4 L78 10 L74 14 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M90 10 L94 4 L98 10 L94 14 Z" fill="url(#tGemYellow)" filter="url(#tGlow)"/>
    <path d="M110 10 L114 4 L118 10 L114 14 Z" fill="url(#tGemPurple)" filter="url(#tGlow)"/>
    <path d="M130 10 L134 4 L138 10 L134 14 Z" fill="url(#tGemBlue)" filter="url(#tGlow)"/>
    <path d="M150 10 L154 4 L158 10 L154 14 Z" fill="url(#tGemGreen)" filter="url(#tGlow)"/>
    <!-- Gems row 2 -->
    <path d="M10 30 L14 24 L18 30 L14 34 Z" fill="url(#tGemYellow)" filter="url(#tGlow)"/>
    <path d="M30 30 L34 24 L38 30 L34 34 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M50 30 L54 24 L58 30 L54 34 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M70 30 L74 24 L78 30 L74 34 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M90 30 L94 24 L98 30 L94 34 Z" fill="url(#tGemGreen)" filter="url(#tGlow)"/>
    <path d="M110 30 L114 24 L118 30 L114 34 Z" fill="url(#tGemBlue)" filter="url(#tGlow)"/>
    <path d="M130 30 L134 24 L138 30 L134 34 Z" fill="url(#tGemPurple)" filter="url(#tGlow)"/>
    <path d="M150 30 L154 24 L158 30 L154 34 Z" fill="url(#tGemYellow)" filter="url(#tGlow)"/>
    <!-- Match highlight (3 red gems in row 2) -->
    <rect x="28" y="22" width="54" height="16" rx="3" fill="none" stroke="#FFEB3B" stroke-width="1.5" opacity="0.7" filter="url(#tGlow)"/>
    <!-- Gems row 3 -->
    <path d="M10 50 L14 44 L18 50 L14 54 Z" fill="url(#tGemBlue)" filter="url(#tGlow)"/>
    <path d="M30 50 L34 44 L38 50 L34 54 Z" fill="url(#tGemGreen)" filter="url(#tGlow)"/>
    <path d="M50 50 L54 44 L58 50 L54 54 Z" fill="url(#tGemPurple)" filter="url(#tGlow)"/>
    <path d="M70 50 L74 44 L78 50 L74 54 Z" fill="url(#tGemYellow)" filter="url(#tGlow)"/>
    <path d="M90 50 L94 44 L98 50 L94 54 Z" fill="url(#tGemBlue)" filter="url(#tGlow)"/>
    <path d="M110 50 L114 44 L118 50 L114 54 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <path d="M130 50 L134 44 L138 50 L134 54 Z" fill="url(#tGemGreen)" filter="url(#tGlow)"/>
    <path d="M150 50 L154 44 L158 50 L154 54 Z" fill="url(#tGemRed)" filter="url(#tGlow)"/>
    <!-- Remaining rows fade -->
    <rect x="0" y="60" width="160" height="100" fill="url(#tBgGrad)" opacity="0.6"/>
  </g>
  <!-- Knight hero (left side) -->
  <g id="hero" transform="translate(30, 90) scale(1.8)">
    <!-- Cape flowing -->
    <path d="M18 20 Q12 30 8 42 Q14 38 18 36 Z" fill="#2471A3" opacity="0.7"/>
    <!-- Armor body -->
    <path d="M16 18 L14 32 Q18 36 24 36 Q30 36 32 32 L30 18 Q26 16 22 15 Q18 16 16 18 Z" fill="url(#tArmorGrad)" stroke="#4A5568" stroke-width="0.4"/>
    <!-- Chest gem -->
    <circle cx="23" cy="22" r="2" fill="#F1C40F" filter="url(#tGlow)"/>
    <!-- Helmet -->
    <path d="M17 6 Q17 1 23 1 Q29 1 29 6 L31 12 Q31 16 23 18 Q15 16 15 12 Z" fill="url(#tArmorGrad)" stroke="#4A5568" stroke-width="0.4"/>
    <path d="M19 9 Q23 7.5 27 9 L27 12 Q23 13 19 12 Z" fill="#00D4FF" opacity="0.6" filter="url(#tGlow)"/>
    <!-- Raised sword -->
    <path d="M34 2 L36 4 L33 24 L31 24 Z" fill="url(#tSwordGrad)" filter="url(#tGlow)"/>
    <rect x="30" y="22" width="6" height="2" rx="0.5" fill="#F39C12"/>
    <!-- Shield -->
    <path d="M8 18 L5 20 L5 28 Q5 33 11 34 Q14 32 14 28 L14 20 Z" fill="#3498DB" stroke="#1A5276" stroke-width="0.5"/>
  </g>
  <!-- Enemy demon (right side) -->
  <g id="enemy" transform="translate(310, 100) scale(1.5)">
    <!-- Aura -->
    <ellipse cx="24" cy="28" rx="24" ry="22" fill="#9B59B6" opacity="0.1" filter="url(#tSoftGlow)"/>
    <!-- Wings -->
    <path d="M10 18 Q0 10 2 4 Q6 8 10 14 Z" fill="#3D1440" opacity="0.7"/>
    <path d="M38 18 Q48 10 46 4 Q42 8 38 14 Z" fill="#3D1440" opacity="0.7"/>
    <!-- Body -->
    <path d="M16 16 Q14 22 14 30 Q16 38 24 40 Q32 38 34 30 Q34 22 32 16 Q28 12 24 11 Q20 12 16 16 Z" fill="#4A1942" stroke="#6B2D5B" stroke-width="0.4"/>
    <!-- Head + horns -->
    <path d="M18 8 Q18 3 24 3 Q30 3 30 8 L32 14 Q32 17 24 18 Q16 17 16 14 Z" fill="#4A1942"/>
    <path d="M18 8 Q14 4 12 0" stroke="#2D1130" stroke-width="1.5" fill="none"/>
    <path d="M30 8 Q34 4 36 0" stroke="#2D1130" stroke-width="1.5" fill="none"/>
    <!-- Eyes -->
    <ellipse cx="21" cy="11" rx="2.5" ry="1.5" fill="#E74C3C" filter="url(#tGlow)"/>
    <ellipse cx="27" cy="11" rx="2.5" ry="1.5" fill="#E74C3C" filter="url(#tGlow)"/>
  </g>
  <!-- Explosion effects between hero and enemy -->
  <g id="battleFx" transform="translate(200, 150)" filter="url(#tSoftGlow)">
    <circle cx="0" cy="0" r="15" fill="#E74C3C" opacity="0.2"/>
    <circle cx="0" cy="0" r="8" fill="#FFEB3B" opacity="0.3"/>
    <path d="M0 0 L-15 -20 L-8 -12 L0 0" fill="#F39C12" opacity="0.4"/>
    <path d="M0 0 L18 -15 L10 -10 L0 0" fill="#E74C3C" opacity="0.3"/>
    <path d="M0 0 L-20 10 L-12 5 L0 0" fill="#F39C12" opacity="0.35"/>
    <path d="M0 0 L12 18 L8 10 L0 0" fill="#E74C3C" opacity="0.3"/>
  </g>
  <!-- Mana bars (UI element) -->
  <g id="manaBars" transform="translate(10, 250)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="rgba(0,0,0,0.5)"/>
    <rect x="1" y="1" width="55" height="6" rx="3" fill="#E74C3C" opacity="0.8"/>
    <rect x="0" y="12" width="80" height="8" rx="4" fill="rgba(0,0,0,0.5)"/>
    <rect x="1" y="13" width="40" height="6" rx="3" fill="#3498DB" opacity="0.8"/>
    <rect x="0" y="24" width="80" height="8" rx="4" fill="rgba(0,0,0,0.5)"/>
    <rect x="1" y="25" width="65" height="6" rx="3" fill="#2ECC71" opacity="0.8"/>
  </g>
  <!-- Score display -->
  <g id="scoreUI" transform="translate(340, 265)">
    <path d="M10 10 L14 4 L18 10 L14 14 Z" fill="#F1C40F" filter="url(#tGlow)"/>
    <text x="24" y="14" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700">12,450</text>
  </g>
  <!-- Title text -->
  <g id="title" filter="url(#tTextGlow)">
    <text x="200" y="52" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" filter="url(#tDropShadow)">GEM WARRIORS</text>
    <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ECF0F1" opacity="0.8">젬 워리어즈</text>
  </g>
  <!-- Decorative frame -->
  <rect x="3" y="3" width="394" height="294" rx="8" fill="none" stroke="#F39C12" stroke-width="1.5" opacity="0.3"/>
  <rect x="7" y="7" width="386" height="286" rx="6" fill="none" stroke="#F39C12" stroke-width="0.5" opacity="0.15"/>
</svg>