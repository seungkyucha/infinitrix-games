<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <path d="M16 28 Q6 20 4 14 Q2 8 8 6 Q12 4 16 10 Q20 4 24 6 Q30 8 28 14 Q26 20 16 28 Z" fill="url(#heartGlow)" filter="url(#hGlow)"/>
  <!-- Heart shape -->
  <path d="M16 26 Q8 20 5.5 14 Q3.5 9 8 7 Q11 5.5 16 11 Q21 5.5 24 7 Q28.5 9 26.5 14 Q24 20 16 26 Z" fill="url(#heartGrad)" filter="url(#hGlow)"/>
  <!-- Inner highlight -->
  <path d="M16 11 Q11 5.5 8 7 Q5 9 6.5 13 Q8 9 12 8 Q14 8 16 11 Z" fill="url(#heartShine)"/>
  <!-- Sparkle -->
  <circle cx="10" cy="10" r="1" fill="#FFFFFF" opacity="0.8"/>
  <line x1="10" y1="8" x2="10" y2="12" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="10" x2="12" y2="10" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
</svg>