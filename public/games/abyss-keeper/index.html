// -- Canvas & Resize (§5.1 step 3) --
function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
}

// Resize canvas to fill viewport with devicePixelRatio support
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// -- Keyboard events --
function initInput() {
  window.addEventListener('keydown', e => {
    input.keys[e.code] = true;
    input.justKeys[e.code] = true;
    handleKeyAction(e.code);
  });
  window.addEventListener('keyup', e => { input.keys[e.code] = false; });

  // Mouse
  canvas.addEventListener('mousemove', e => { input.mx = e.clientX; input.my = e.clientY; });
  canvas.addEventListener('mousedown', e => {
    if (e.button === 0) input.ml = true;
    if (e.button === 2) input.mr = true;
    handlePointerDown(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseup', e => { if (e.button === 0) input.ml = false; if (e.button === 2) input.mr = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Touch
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    input.touch = true;
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    input.mx = t.clientX; input.my = t.clientY;

    // Check joystick area
    if (touchBtns.joy && Math.hypot(t.clientX - touchBtns.joy.x, t.clientY - touchBtns.joy.y) < touchBtns.joy.r + 20) {
      input.joyActive = true;
    }
    // Check action buttons
    if (touchBtns.atk && Math.hypot(t.clientX - touchBtns.atk.x, t.clientY - touchBtns.atk.y) < touchBtns.atk.r + 10) {
      input.touchAction = true;
    }
    if (touchBtns.sonar && Math.hypot(t.clientX - touchBtns.sonar.x, t.clientY - touchBtns.sonar.y) < touchBtns.sonar.r + 10) {
      input.touchAction2 = true;
    }
    if (touchBtns.wpn && Math.hypot(t.clientX - touchBtns.wpn.x, t.clientY - touchBtns.wpn.y) < touchBtns.wpn.r + 10) {
      currentWeapon = (currentWeapon + 1) % 3;
      soundMgr.playSfx('click');
    }

    handlePointerDown(t.clientX, t.clientY);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    input.mx = t.clientX; input.my = t.clientY;
    if (input.joyActive && touchBtns.joy) {
      const dx = t.clientX - touchBtns.joy.x;
      const dy = t.clientY - touchBtns.joy.y;
      input.joyAngle = Math.atan2(dy, dx);
      input.joyDist = Math.hypot(dx, dy);
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    input.joyActive = false; input.joyDist = 0;
    input.touchAction = false; input.touchAction2 = false;
  }, { passive: false });

  // Resize
  window.addEventListener('resize', resizeCanvas);
}

// Handle key actions based on current state
function handleKeyAction(code) {
  soundMgr.init(); // Init audio on first user interaction

  // QTE input handling (3g)
  if (qteState && qteState.active) {
    if ((qteState.direction === 'left' && code === 'ArrowLeft') ||
        (qteState.direction === 'right' && code === 'ArrowRight')) {
      qteState.dodgesDone++;
      soundMgr.playSfx('click');
      if (qteState.dodgesDone < qteState.dodgesNeeded) {
        // Next direction
        qteState.direction = Math.random() < 0.5 ? 'left' : 'right';
        qteState.timer = 2;
      }
    }
    return; // block other input during QTE
  }

  if (state === 'TITLE') {
    if (code === 'Space' || code === 'Enter') {
      beginTransition('DIFF_SELECT', 0.4);
    }
    if (code === 'KeyL') toggleLang();
  }
  else if (state === 'DIFF_SELECT') {
    if (code === 'ArrowUp' || code === 'KeyW') {
      const diffs = ['easy','normal','hard'];
      const idx = diffs.indexOf(difficultyKey);
      difficultyKey = diffs[(idx - 1 + 3) % 3];
      soundMgr.playSfx('click');
    }
    if (code === 'ArrowDown' || code === 'KeyS') {
      const diffs = ['easy','normal','hard'];
      const idx = diffs.indexOf(difficultyKey);
      difficultyKey = diffs[(idx + 1) % 3];
      soundMgr.playSfx('click');
    }
    if (code === 'Space' || code === 'Enter') startNewGame();
  }
  else if (state === 'CASUAL_PHASE') {
    if (code === 'Space') startFishing();
    if (code === 'KeyE') collectDriftItems(player.x, player.y);
    if (code === 'KeyQ') beginTransition('UPGRADE_MENU', 0.3);
    if (code === 'Escape') { pausedFromState = state; beginTransition('PAUSE', 0.2); }
    if (code === 'Digit1') currentWeapon = 0;
    if (code === 'Digit2') currentWeapon = 1;
    if (code === 'Digit3') currentWeapon = 2;
  }
  else if (state === 'FISHING_MINI') {
    if (code === 'Space') tryReelCatch();
  }
  else if (state === 'ACTION_PHASE' || state === 'BOSS_FIGHT') {
    if (code === 'Space') fireWeapon();
    if (code === 'KeyE') fireWeapon(); // alt fire
    if (code === 'KeyQ') fireSonar();
    if (code === 'Digit1') currentWeapon = 0;
    if (code === 'Digit2') currentWeapon = 1;
    if (code === 'Digit3') currentWeapon = 2;
    if (code === 'Escape') { pausedFromState = state; beginTransition('PAUSE', 0.2); }
  }
  else if (state === 'GAMEOVER' || state === 'VICTORY') {
    if (code === 'KeyR' || code === 'Space') beginTransition('TITLE', 0.5);
  }
  else if (state === 'PAUSE') {
    if (code === 'Escape') { state = pausedFromState; transGuard = false; onStateEnter(state); }
  }
  else if (state === 'UPGRADE_MENU') {
    if (code === 'Escape' || code === 'KeyQ') { state = 'CASUAL_PHASE'; transGuard = false; }
    if (code === 'ArrowUp' || code === 'KeyW') { selectedUpgrade = Math.max(0, selectedUpgrade - 1); }
    if (code === 'ArrowDown' || code === 'KeyS') { selectedUpgrade = Math.min(Object.keys(CFG.UPGRADE_COSTS).length - 1, selectedUpgrade + 1); }
    if (code === 'Space' || code === 'Enter') tryBuyUpgrade(Object.keys(CFG.UPGRADE_COSTS)[selectedUpgrade]);
  }
  else if (state === 'TIDE_RESULT') {
    if (code === 'Space' || code === 'Enter') advanceTide();
  }
  else if (state === 'BOSS_VICTORY') {
    if (code === 'Space' || code === 'Enter') advanceTide();
  }
  else if (state === 'CONFIRM_MODAL') {
    if (code === 'Enter' || code === 'Space') {
      if (modalConfig && modalConfig.onConfirm) modalConfig.onConfirm();
      modalConfig = null;
      state = pausedFromState;
      transGuard = false;
    }
    if (code === 'Escape') {
      if (modalConfig && modalConfig.onCancel) modalConfig.onCancel();
      modalConfig = null;
      state = pausedFromState;
      transGuard = false;
    }
  }
}

// Handle pointer (mouse/touch) down
function handlePointerDown(px, py) {
  soundMgr.init();

  if (state === 'TITLE') {
    beginTransition('DIFF_SELECT', 0.4);
  }
  else if (state === 'DIFF_SELECT') {
    diffBtns.forEach(b => {
      if (b && px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
        if (b.key === 'start') startNewGame();
        else { difficultyKey = b.key; soundMgr.playSfx('click'); }
      }
    });
  }
  else if (state === 'CASUAL_PHASE') {
    if (fishingState && fishingState.phase === 'reel') tryReelCatch();
    else if (!fishingState || fishingState.phase === 'idle') startFishing();
    collectDriftItems(player.x, player.y);
  }
  else if (state === 'ACTION_PHASE' || state === 'BOSS_FIGHT') {
    if (input.touchAction) fireWeapon();
    else if (input.touchAction2) fireSonar();
    else if (!input.joyActive) fireWeapon();
  }
  else if (state === 'GAMEOVER' || state === 'VICTORY') {
    beginTransition('TITLE', 0.5);
  }
  else if (state === 'TIDE_RESULT' || state === 'BOSS_VICTORY') {
    advanceTide();
  }
  else if (state === 'UPGRADE_MENU') {
    // Check upgrade buttons
    let clickedUpgrade = false;
    upgradeBtns.forEach((b, i) => {
      if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
        selectedUpgrade = i;
        tryBuyUpgrade(b.key);
        clickedUpgrade = true;
      }
    });
    if (!clickedUpgrade && py > H - 50) { state = 'CASUAL_PHASE'; transGuard = false; }
  }
  else if (state === 'PAUSE') {
    state = pausedFromState; transGuard = false; onStateEnter(state);
  }
  else if (state === 'CONFIRM_MODAL') {
    // Check modal buttons
    if (modalBtns.confirm && px >= modalBtns.confirm.x && px <= modalBtns.confirm.x + modalBtns.confirm.w &&
        py >= modalBtns.confirm.y && py <= modalBtns.confirm.y + modalBtns.confirm.h) {
      if (modalConfig && modalConfig.onConfirm) modalConfig.onConfirm();
      modalConfig = null;
      state = pausedFromState;
      transGuard = false;
    }
    if (modalBtns.cancel && px >= modalBtns.cancel.x && px <= modalBtns.cancel.x + modalBtns.cancel.w &&
        py >= modalBtns.cancel.y && py <= modalBtns.cancel.y + modalBtns.cancel.h) {
      if (modalConfig && modalConfig.onCancel) modalConfig.onCancel();
      modalConfig = null;
      state = pausedFromState;
      transGuard = false;
    }
  }
}

// Toggle language
function toggleLang() { lang = lang === 'ko' ? 'en' : 'ko'; if (save) { save.settings.lang = lang; saveToDisk(); } }

// ═══════════════════════════════════════════════════════════════
// REGION 10: INIT & LOOP
// ═══════════════════════════════════════════════════════════════

// -- Save/Load (§11, F8: check before save) --
const SAVE_KEY = 'abysskeeper_save';
const SAVE_SCHEMA = {
  version:1, coral:0,
  upgrades:{ lightRange:0, lightIntensity:0, lighthouseHp:0, autoRepair:0, harpoon:0, net:0, sonicCannon:0, fishingGear:0, baitEfficiency:0, sonarRange:0, sonarCooldown:0 },
  bestScore:0, bestTide:0, totalRuns:0, totalFishCaught:0,
  bossesDefeated:[false,false,false], hiddenUnlocked:false, hiddenCleared:false,
  leaderboard:[],
  settings:{ difficulty:'normal', lang:'ko', sfxVolume:0.7, bgmVolume:0.5 }
};

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { save = migrateSave(JSON.parse(raw)); }
    else { save = JSON.parse(JSON.stringify(SAVE_SCHEMA)); }
  } catch(e) { save = JSON.parse(JSON.stringify(SAVE_SCHEMA)); }
  lang = save.settings.lang || 'ko';
  difficultyKey = save.settings.difficulty || 'normal';
}

function migrateSave(data) {
  if (!data.version) data = { ...JSON.parse(JSON.stringify(SAVE_SCHEMA)), ...data, version:1 };
  // Ensure all upgrade keys exist
  Object.keys(SAVE_SCHEMA.upgrades).forEach(k => { if (data.upgrades[k] === undefined) data.upgrades[k] = 0; });
  if (!data.leaderboard) data.leaderboard = [];
  if (!data.settings) data.settings = { ...SAVE_SCHEMA.settings };
  if (data.totalFishCaught === undefined) data.totalFishCaught = 0;
  return data;
}

function saveToDisk() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e){} }

// F8: judge first, save after
function saveRun() {
  if (!save) return;
  const isNewBest = totalScore > save.bestScore; // judge FIRST
  if (isNewBest) save.bestScore = totalScore; // save AFTER
  if (currentTide > save.bestTide) save.bestTide = currentTide;
  save.totalRuns++;
  save.settings.difficulty = difficultyKey;
  save.settings.lang = lang;
  // Leaderboard
  save.leaderboard.push({ score: totalScore, tide: currentTide, difficulty: difficultyKey, date: new Date().toISOString().slice(0,10) });
  save.leaderboard.sort((a,b) => b.score - a.score);
  if (save.leaderboard.length > 10) save.leaderboard.length = 10;
  saveToDisk();
}

// Save coral at end of run (partial or full)
function saveCoral(rate) {
  if (!save) return;
  const earned = Math.floor(runCoral * rate);
  save.coral += earned;
  saveToDisk();
}

// Buy upgrade
function tryBuyUpgrade(key) {
  if (!save) return;
  const costs = CFG.UPGRADE_COSTS[key];
  const lv = save.upgrades[key] || 0;
  if (lv >= costs.length) return;
  const cost = costs[lv];
  if (save.coral >= cost) {
    save.coral -= cost;
    save.upgrades[key] = lv + 1;
    soundMgr.playSfx('upgrade');
    saveToDisk();
    // Rebuild lighthouse if HP upgrade
    if (key === 'lighthouseHp' && lighthouse) {
      const newMax = (CFG.BASE_LIGHTHOUSE_HP + save.upgrades.lighthouseHp * CFG.UPGRADE_HP_PER_LV) * CFG.DIFF_HP_MULT[difficultyKey];
      lighthouse.hp += (newMax - lighthouse.maxHp);
      lighthouse.maxHp = newMax;
    }
    if (key === 'lightRange' && lighthouse) lighthouse.lightRange = 200 + save.upgrades.lightRange * 20;
  }
}

// Start a new game run
function startNewGame() {
  totalScore = 0; runCoral = 0;
  currentTide = 1; currentWeapon = 0; sonarCooldown = 0;
  dynamicDiffAdj = 0; perfectTideStreak = 0; lowHpTideStreak = 0;
  waveSeed = Date.now() & 0xFFFF;
  player = createPlayer();
  lighthouse = createLighthouse();
  monsters.length = 0; projectiles.length = 0; driftItems = [];
  boss = null; fishingState = null;
  weatherParticles.length = 0;
  particles.clear(); hitFx.clear();
  tw.clearImmediate();
  transGuard = false;
  tideClearing = false; bossDefeatedGuard = false;
  lightningTimer = 0; lightningFlash = 0; lightningStrikePos = null;
  bossDeathCount = [0, 0, 0];
  lighthouseBlessing = false;
  qteState = null;
  loreCollected = [];
  bioLumParticles = [];
  modalConfig = null;

  const rng = new SeededRNG(waveSeed);
  spawnDriftItems(rng);

  save.settings.difficulty = difficultyKey;
  saveToDisk();
  beginTransition('CASUAL_PHASE', 0.5);
}

// Advance to next tide
function advanceTide() {
  if (tideClearing) return; // guard (F5)
  tideClearing = true;

  // Dynamic difficulty adjustment (§8.3)
  if (lighthouse && lighthouse.hp >= lighthouse.maxHp) {
    perfectTideStreak++; lowHpTideStreak = 0;
    if (perfectTideStreak >= 3) { dynamicDiffAdj = Math.min(dynamicDiffAdj + 1, 3); perfectTideStreak = 0; }
  } else if (lighthouse && lighthouse.hp < lighthouse.maxHp * 0.3) {
    lowHpTideStreak++; perfectTideStreak = 0;
    if (lowHpTideStreak >= 3) { dynamicDiffAdj = Math.max(dynamicDiffAdj - 1, -3); lowHpTideStreak = 0; }
  }

  // Tide completion bonus
  const tideScore = 200 * currentTide;
  if (lighthouse && lighthouse.hp >= lighthouse.maxHp) totalScore += tideScore; // perfect bonus
  runCoral += 10 * currentTide;

  currentTide++;
  if (currentTide > CFG.TOTAL_TIDES) {
    // Check hidden stage unlock
    if (!hiddenUnlockCheck) { /* simplified */ }
    return; // Victory state already entered from boss defeat
  }

  // Reset for next tide
  const rng = new SeededRNG(waveSeed + currentTide * 31);
  spawnDriftItems(rng);
  fishingState = null;
  boss = null;
  monsters.length = 0; projectiles.length = 0;
  weatherParticles.length = 0;
  qteState = null;

  beginTransition('CASUAL_PHASE', 0.5);
}

// -- Main game loop --
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 50ms cap
  lastTime = timestamp;

  const sys = ACTIVE_SYSTEMS[state] || {};
  const t = TEXT[lang] || TEXT.ko;

  // === UPDATE ===
  // Process movement input
  if (['CASUAL_PHASE','ACTION_PHASE','BOSS_FIGHT','HIDDEN_STAGE'].includes(state) && player) {
    let dx = 0, dy = 0;
    if (input.keys['KeyW'] || input.keys['ArrowUp']) dy = -1;
    if (input.keys['KeyS'] || input.keys['ArrowDown']) dy = 1;
    if (input.keys['KeyA'] || input.keys['ArrowLeft']) dx = -1;
    if (input.keys['KeyD'] || input.keys['ArrowRight']) dx = 1;
    // Touch joystick
    if (input.joyActive && input.joyDist > 10) {
      dx = Math.cos(input.joyAngle);
      dy = Math.sin(input.joyAngle);
    }
    if (dx || dy) {
      const len = Math.hypot(dx, dy) || 1;
      player.x += (dx / len) * player.speed * dt;
      player.y += (dy / len) * player.speed * dt;
      player.x = Math.max(30, Math.min(W - 30, player.x));
      player.y = Math.max(30, Math.min(H - 30, player.y));
      player.dir = Math.atan2(dy, dx);
      player.frameTimer += dt;
      if (player.frameTimer > 0.12) { player.frameTimer = 0; player.frame = (player.frame + 1) % 8; }
    }
  }

  // Touch action (continuous fire)
  if (input.touchAction && ['ACTION_PHASE','BOSS_FIGHT'].includes(state)) {
    if (!player.attacking) fireWeapon();
  }
  if (input.touchAction2 && ['ACTION_PHASE','BOSS_FIGHT'].includes(state)) {
    fireSonar();
  }

  // Tween system
  if (sys.tween) tw.update(dt);

  // Physics/timers
  if (sys.timer) {
    phaseTimer -= dt;
    if (sonarCooldown > 0) sonarCooldown -= dt;

    // Phase transitions
    if (state === 'CASUAL_PHASE' && phaseTimer <= 0 && !tideClearing) {
      tideClearing = true;
      if (fishingState) fishingState.phase = 'idle';
      if (CFG.BOSS_TIDES.includes(currentTide)) {
        beginTransition('BOSS_INTRO', 0.5);
      } else {
        beginTransition('ACTION_PHASE', 0.5);
      }
    }
    if (state === 'ACTION_PHASE' && phaseTimer <= 0 && !tideClearing) {
      tideClearing = true;
      beginTransition('TIDE_RESULT', 0.5);
    }
    if (state === 'BOSS_FIGHT' && phaseTimer <= 0 && boss && boss.hp > 0 && !tideClearing) {
      // Time's up during boss — lighthouse takes big hit
      lighthouse.hp -= 100;
      phaseTimer = 30; // extend
    }
  }

  // AI
  if (sys.ai) {
    if (state === 'ACTION_PHASE') {
      updateAI(dt);
      // Spawn monsters
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval && monsters.length < waveMonsterCount) {
        spawnTimer = 0;
        const rng = new SeededRNG(waveSeed + currentTide * 7919 + monsters.length * 137);
        monsters.push(spawnMonster(rng));
      }
      // Check wave clear
      if (monsters.length === 0 && monstersKilled >= waveMonsterCount && !tideClearing) {
        tideClearing = true;
        beginTransition('TIDE_RESULT', 0.5);
      }
    }
    if (state === 'BOSS_FIGHT') {
      updateBossAI(dt);
      // Also update any mini monsters during boss fight
      if (monsters.length > 0) updateAI(dt);
    }
  }

  // Boss intro timer
  if (state === 'BOSS_INTRO') {
    bossIntroTimer -= dt;
    if (bossIntroTimer <= 0) {
      phaseTimer = CFG.ACTION_DURATION + 30; // extra time for boss
      setState('BOSS_FIGHT');
    }
  }

  // Boss victory timer (3l)
  if (state === 'BOSS_VICTORY') {
    bossVictoryTimer += dt;
    bossVictorySealAnim += dt;
  }

  // Combat
  if (sys.combat) updateCombat(dt);

  // Fishing
  if (sys.fishing) {
    updateFishing(dt);
    if (fishingState && fishingState.phase === 'reel' && state === 'CASUAL_PHASE') {
      // Auto-transition visual state
    }
  }

  // Weather
  if (sys.weather) updateWeather(dt);

  // Waves
  if (sys.wave) updateWaves(dt);

  // Particles
  if (sys.particles) { particles.update(dt); hitFx.update(dt); }

  // Bioluminescence (visual signature — always active in game states)
  if (sys.wave || sys.particles) updateBioluminescence(dt);

  // Camera
  if (sys.camera && player && lighthouse) {
    camera.tx = (player.x + lighthouse.x) * 0.5 - W * 0.5;
    camera.ty = (player.y + lighthouse.y) * 0.5 - H * 0.5;
    camera.x = lerp(camera.x, camera.tx, dt * 3);
    camera.y = lerp(camera.y, camera.ty, dt * 3);
    camera.zoom = lerp(camera.zoom, camera.targetZoom, dt * 2);
  }

  // Lighthouse light rotation
  if (lighthouse) {
    lighthouse.lightAngle += dt * 0.5;
    lighthouse.lightRange = 200 + getUpgrade('lightRange') * 20 + (currentWeather === 'moonlit' ? 60 : 0);
  }

  // Screen shake
  if (shakeDur > 0) { shakeDur -= dt; shakeX = (Math.random()-0.5) * 8; shakeY = (Math.random()-0.5) * 8; }
  else { shakeX = 0; shakeY = 0; }

  // Title anim
  if (state === 'TITLE' || state === 'DIFF_SELECT') titleAnim += dt;
  if (state === 'GAMEOVER') gameoverTimer += dt;
  if (state === 'VICTORY') victoryTimer += dt;

  // Boot → Title
  if (state === 'BOOT') { bootTimer += dt; if (bootTimer > 0.5) setState('TITLE'); }

  // Clear just-pressed keys
  input.justKeys = {};

  // === RENDER ===
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === 'TITLE') {
    drawTitle(ctx, W, H, titleAnim, t, save ? save.bestScore : 0, save && save.totalRuns > 0);
  }
  else if (state === 'DIFF_SELECT') {
    drawTitle(ctx, W, H, titleAnim, t, save ? save.bestScore : 0, false);
    drawDiffSelect(ctx, W, H, difficultyKey, t);
  }
  else if (state === 'BOOT') {
    ctx.fillStyle = COL.bgDeep; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COL.textSec; ctx.font = `16px ${FONT}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Loading...', W*0.5, H*0.5);
  }
  else {
    // Game states — draw world
    ctx.save();
    // Camera transform
    const cx = -camera.x * 0.3; // subtle parallax
    const cy = -camera.y * 0.3;

    drawBackground(ctx, W, H, waveOffset, isNight, currentWeather, camera.x, camera.y);
    drawWeather(ctx, currentWeather, weatherParticles);

    // Bioluminescence ambient layer (visual signature)
    drawBioluminescence(ctx, bioLumParticles);

    // Drift items
    if (state === 'CASUAL_PHASE' || state === 'HIDDEN_STAGE') drawDriftItems(ctx, driftItems);

    // Lighthouse
    if (lighthouse) {
      drawLighthouse(ctx, lighthouse.x, lighthouse.y, 1, lighthouse.hp, lighthouse.maxHp, lighthouse.lightAngle, lighthouse.lightRange, isNight);
    }

    // Monsters
    monsters.forEach(m => drawMonster(ctx, m.x, m.y, m.type, m.hp, m.maxHp, m.frame, m.hurtTimer > 0));

    // Boss
    if (boss && (state === 'BOSS_FIGHT' || state === 'BOSS_INTRO' || state === 'BOSS_VICTORY')) {
      drawBoss(ctx, boss.x, boss.y, boss);
    }

    // Projectiles
    drawProjectiles(ctx, projectiles);

    // Player
    if (player) {
      drawKeeper(ctx, player.x, player.y, player.dir, player.frame, currentWeapon, player.attacking);
    }

    // Hit effects
    drawHitEffects(ctx, hitFx);

    // Particles
    drawParticles(ctx, particles);

    // Kraken ink overlay (3f)
    if (boss && boss.type === 'kraken' && boss.inkAlpha > 0 && (state === 'BOSS_FIGHT')) {
      ctx.fillStyle = `rgba(10,0,30,${boss.inkAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.restore();

    // Fishing UI
    if ((state === 'CASUAL_PHASE' || state === 'FISHING_MINI') && fishingState) {
      drawFishingUI(ctx, W, H, fishingState, t.fishing);
    }

    // HUD
    if (['CASUAL_PHASE','ACTION_PHASE','BOSS_FIGHT','BOSS_INTRO','FISHING_MINI','HIDDEN_STAGE'].includes(state)) {
      drawHUD(ctx, W, H, totalScore, save ? save.bestScore : 0, runCoral + (save ? save.coral : 0), currentTide,
        isNight ? 'action' : 'casual', lighthouse ? lighthouse.hp : 0, lighthouse ? lighthouse.maxHp : 1,
        currentWeather, currentWeapon, sonarCooldown, t, lang);
    }

    // Touch controls
    drawTouchControls(ctx, W, H, input.joyActive, 0, 0, input.joyAngle, input.joyDist);

    // QTE overlay (3g)
    if (qteState && qteState.active && state === 'BOSS_FIGHT') {
      drawQTE(ctx, W, H, qteState, t);
    }

    // Overlay states
    if (state === 'GAMEOVER') drawGameover(ctx, W, H, totalScore, save ? save.bestScore : 0, currentTide, gameoverTimer, t);
    if (state === 'VICTORY') drawVictory(ctx, W, H, totalScore, victoryTimer, t);
    if (state === 'PAUSE') drawPause(ctx, W, H, t);
    if (state === 'UPGRADE_MENU') drawUpgradeMenu(ctx, W, H, save ? save.upgrades : {}, save ? save.coral : 0, selectedUpgrade, upgradeScrollY, t, t.upgradeNames);
    if (state === 'BOSS_INTRO' && boss) drawBossIntro(ctx, W, H, boss, bossIntroTimer, t);
    if (state === 'BOSS_VICTORY') {
      drawBossVictory(ctx, W, H, bossVictoryTimer, t, boss);
    }
    if (state === 'TIDE_RESULT') drawTideResult(ctx, W, H, currentTide, totalScore, runCoral, t);
    if (state === 'CONFIRM_MODAL') drawConfirmModal(ctx, W, H, modalConfig, t);
  }

  // Transition overlay
  if (transGuard) {
    ctx.fillStyle = `rgba(10,10,15,${transObj.v})`;
    ctx.fillRect(-10, -10, W+20, H+20);
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// -- Initialization (§5.1 order: variables → DOM → instances → events → loop) --
async function init() {
  // Step 1-2: Variables already declared above

  // Step 3: Canvas DOM
  initCanvas();

  // Step 4: Engine instances
  tw = new TweenManager();
  particles = new ObjectPool(
    () => ({ x:0, y:0, vx:0, vy:0, life:0, maxLife:1, alpha:1, color:'#fff', text:null, _alive:false }),
    (o, x, y, vx, vy, life, color, text) => { o.x=x; o.y=y; o.vx=vx; o.vy=vy; o.life=life; o.maxLife=life; o.alpha=1; o.color=color; o.text=text; },
    300
  );
  hitFx = new ObjectPool(
    () => ({ x:0, y:0, vx:0, vy:0, life:0, maxLife:1, alpha:1, color:'#fff', text:null, _alive:false }),
    (o, x, y, vx, vy, life, color, text) => { o.x=x; o.y=y; o.vx=vx; o.vy=vy; o.life=life; o.maxLife=life; o.alpha=1; o.color=color; o.text=text; },
    100
  );
  soundMgr = new SoundManager();

  // Step 4.6: Load save data
  loadSave();

  // Step 5: Events
  initInput();

  // Step 6: Start loop
  state = 'BOOT'; bootTimer = 0;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Run
init();
</script>
