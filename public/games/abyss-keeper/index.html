// -- TweenManager with clearImmediate (F13) --
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; this._updating = false; }
  add(obj, props, dur, ease, onComplete) {
    const tw = { obj, targets:{}, elapsed:0, dur, ease:ease||'easeOut', onComplete, done:false };
    for (const k in props) { tw.targets[k] = { from: obj[k], to: props[k] }; }
    if (this._updating) this._toAdd.push(tw);
    else this._tweens.push(tw);
    return tw;
  }
  // Immediate cancel — no deferred race condition (F13)
  clearImmediate() { this._tweens.length = 0; this._toAdd.length = 0; }
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.done) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      let t = Math.min(tw.elapsed / tw.dur, 1);
      t = tw.ease === 'linear' ? t : tw.ease === 'easeIn' ? t*t : 1-(1-t)*(1-t);
      for (const k in tw.targets) {
        const { from, to } = tw.targets[k];
        tw.obj[k] = from + (to - from) * t;
      }
      if (tw.elapsed >= tw.dur) {
        tw.done = true;
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
    this._updating = false;
    if (this._toAdd.length) { this._tweens.push(...this._toAdd); this._toAdd.length = 0; }
  }
}

// -- ObjectPool for particles/projectiles --
class ObjectPool {
  constructor(factory, reset, max) { this.pool = []; this.active = []; this.factory = factory; this.reset = reset; this.max = max || 500; }
  spawn(...args) {
    let obj = this.pool.pop() || this.factory();
    this.reset(obj, ...args);
    obj._alive = true;
    this.active.push(obj);
    return obj;
  }
  update(dt) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      const o = this.active[i];
      o.life -= dt;
      o.x += (o.vx || 0) * dt; o.y += (o.vy || 0) * dt;
      o.alpha = Math.max(0, o.life / o.maxLife);
      if (o.life <= 0) { o._alive = false; this.active.splice(i, 1); this.pool.push(o); }
    }
  }
  clear() { this.pool.push(...this.active); this.active.length = 0; }
}

// -- SeededRNG (§10.1) --
class SeededRNG {
  constructor(seed) { this.state = seed | 0; }
  next() { this.state = (this.state * 1664525 + 1013904223) & 0xFFFFFFFF; return (this.state >>> 0) / 0xFFFFFFFF; }
  range(min, max) { return min + this.next() * (max - min); }
  intRange(min, max) { return Math.floor(this.range(min, max + 1)); }
  pick(arr) { return arr[this.intRange(0, arr.length - 1)]; }
}

// -- SoundManager (Web Audio API, §12) --
class SoundManager {
  constructor() { this.ctx = null; this.vol = { sfx:0.7, bgm:0.5 }; this.bgmGain = null; this.sfxGain = null; this.muted = false; }
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = this.vol.bgm; this.bgmGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.vol.sfx; this.sfxGain.connect(this.ctx.destination);
    } catch(e) { /* no audio */ }
  }
  // Generate procedural sound effect
  playSfx(type) {
    if (!this.ctx || this.muted) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain); gain.connect(this.sfxGain);
    const t = this.ctx.currentTime;
    switch(type) {
      case 'cast': osc.frequency.setValueAtTime(400,t); osc.frequency.exponentialRampToValueAtTime(800,t+0.15); gain.gain.setValueAtTime(0.3,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.2); osc.type='sine'; osc.start(t); osc.stop(t+0.2); break;
      case 'catch': osc.frequency.setValueAtTime(523,t); osc.frequency.setValueAtTime(659,t+0.1); osc.frequency.setValueAtTime(784,t+0.2); gain.gain.setValueAtTime(0.3,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.4); osc.type='sine'; osc.start(t); osc.stop(t+0.4); break;
      case 'harpoon': osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(100,t+0.1); gain.gain.setValueAtTime(0.4,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.15); osc.type='sawtooth'; osc.start(t); osc.stop(t+0.15); break;
      case 'net': osc.frequency.setValueAtTime(300,t); osc.frequency.exponentialRampToValueAtTime(150,t+0.2); gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.25); osc.type='triangle'; osc.start(t); osc.stop(t+0.25); break;
      case 'sonic': osc.frequency.setValueAtTime(80,t); osc.frequency.exponentialRampToValueAtTime(40,t+0.3); gain.gain.setValueAtTime(0.5,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.35); osc.type='sine'; osc.start(t); osc.stop(t+0.35); break;
      case 'hit': osc.frequency.setValueAtTime(150,t); osc.frequency.exponentialRampToValueAtTime(50,t+0.08); gain.gain.setValueAtTime(0.4,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.1); osc.type='square'; osc.start(t); osc.stop(t+0.1); break;
      case 'death': osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(30,t+0.5); gain.gain.setValueAtTime(0.4,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.5); osc.type='sawtooth'; osc.start(t); osc.stop(t+0.5); break;
      case 'boss': osc.frequency.setValueAtTime(60,t); osc.frequency.setValueAtTime(80,t+0.3); osc.frequency.setValueAtTime(60,t+0.6); gain.gain.setValueAtTime(0.5,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.9); osc.type='sawtooth'; osc.start(t); osc.stop(t+0.9); break;
      case 'lhHit': osc.frequency.setValueAtTime(100,t); osc.frequency.exponentialRampToValueAtTime(40,t+0.3); gain.gain.setValueAtTime(0.5,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.3); osc.type='square'; osc.start(t); osc.stop(t+0.3); break;
      case 'upgrade': osc.frequency.setValueAtTime(440,t); osc.frequency.setValueAtTime(554,t+0.1); osc.frequency.setValueAtTime(659,t+0.2); gain.gain.setValueAtTime(0.25,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.4); osc.type='sine'; osc.start(t); osc.stop(t+0.4); break;
      case 'click': osc.frequency.setValueAtTime(600,t); gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.05); osc.type='sine'; osc.start(t); osc.stop(t+0.06); break;
      case 'wave': osc.frequency.setValueAtTime(60,t); osc.frequency.exponentialRampToValueAtTime(40,t+1); gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.01,t+1); osc.type='sine'; osc.start(t); osc.stop(t+1); break;
      case 'lightning': osc.frequency.setValueAtTime(1200,t); osc.frequency.exponentialRampToValueAtTime(60,t+0.15); gain.gain.setValueAtTime(0.6,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.2); osc.type='sawtooth'; osc.start(t); osc.stop(t+0.2); break;
      case 'lore': osc.frequency.setValueAtTime(660,t); osc.frequency.setValueAtTime(880,t+0.15); osc.frequency.setValueAtTime(1100,t+0.3); gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.5); osc.type='sine'; osc.start(t); osc.stop(t+0.5); break;
      case 'blessing': osc.frequency.setValueAtTime(440,t); osc.frequency.setValueAtTime(660,t+0.2); osc.frequency.setValueAtTime(880,t+0.4); osc.frequency.setValueAtTime(1100,t+0.6); gain.gain.setValueAtTime(0.3,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.8); osc.type='sine'; osc.start(t); osc.stop(t+0.8); break;
      default: osc.frequency.setValueAtTime(440,t); gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.1); osc.type='sine'; osc.start(t); osc.stop(t+0.1);
    }
  }
  // Simple procedural BGM loop
  startBGM(mood) {
    this.stopBGM();
    if (!this.ctx || this.muted) return;
    this._bgmOsc = [];
    const t = this.ctx.currentTime;
    const makeOsc = (freq, type, vol) => {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = type; o.frequency.value = freq; g.gain.value = vol * this.vol.bgm;
      o.connect(g); g.connect(this.bgmGain); o.start(t);
      this._bgmOsc.push({ osc: o, gain: g });
    };
    if (mood === 'title' || mood === 'casual') {
      makeOsc(110, 'sine', 0.08); makeOsc(165, 'sine', 0.04); makeOsc(220, 'triangle', 0.03);
    } else if (mood === 'action' || mood === 'boss') {
      makeOsc(55, 'sawtooth', 0.06); makeOsc(82.5, 'square', 0.03); makeOsc(110, 'sawtooth', 0.04);
    }
  }
  stopBGM() { if (this._bgmOsc) { this._bgmOsc.forEach(o => { try { o.osc.stop(); } catch(e){} }); this._bgmOsc = null; } }
}

// -- Transition system (F6, F44) --
function beginTransition(target, dur) {
  // Guard: already transitioning
  if (transGuard) return;
  // Priority check
  const curPri = STATE_PRIORITY[state] || 0;
  const tgtPri = STATE_PRIORITY[target] || 0;
  if (tgtPri < curPri && !RESTART_ALLOWED.includes(state)) {
    return; // block reverse transition unless in RESTART_ALLOWED state
  }
  transGuard = true;
  transTarget = target;
  transObj.v = 0;
  tw.add(transObj, { v: 1 }, dur || 0.4, 'easeOut', () => {
    prevState = state;
    state = transTarget;
    onStateEnter(state);
    tw.add(transObj, { v: 0 }, 0.3, 'easeOut', () => { transGuard = false; });
  });
}

// Direct state set (only for BOOT→TITLE, internal)
function setState(s) { prevState = state; state = s; onStateEnter(s); }

// -- State entry handler --
function onStateEnter(s) {
  tideClearing = false;
  bossDefeatedGuard = false;
  if (s === 'TITLE') { titleAnim = 0; soundMgr.startBGM('title'); }
  if (s === 'CASUAL_PHASE') { phaseTimer = CFG.CASUAL_DURATION; isNight = false; fishingState = null; soundMgr.startBGM('casual'); }
  if (s === 'ACTION_PHASE') {
    phaseTimer = CFG.ACTION_DURATION; isNight = true;
    monsters.length = 0; projectiles.length = 0;
    monstersKilled = 0;
    const rng = new SeededRNG(waveSeed + currentTide * 7919);
    const tierIdx = currentTide <= 5 ? 0 : currentTide <= 10 ? 1 : 2;
    waveMonsterCount = Math.round(lerp(CFG.MONSTER_SPAWN_BASE[tierIdx], CFG.MONSTER_SPAWN_MAX[tierIdx], (currentTide - (tierIdx*5+1)) / 4) * CFG.DIFF_ENEMY_MULT[difficultyKey]);
    waveMonsterCount = Math.max(3, Math.round(waveMonsterCount * (1 + dynamicDiffAdj * 0.1)));
    spawnTimer = 0; spawnInterval = CFG.ACTION_DURATION / (waveMonsterCount + 1);
    lightningTimer = 3 + Math.random() * 5;
    chooseWeather(rng);
    soundMgr.startBGM('action');
  }
  if (s === 'BOSS_INTRO') {
    bossIntroTimer = 2.5;
    const bi = CFG.BOSS_TIDES.indexOf(currentTide);
    boss = createBoss(bi);
    camera.targetZoom = 1.3;
    soundMgr.playSfx('boss');
  }
  if (s === 'BOSS_FIGHT') { camera.targetZoom = 1.0; soundMgr.startBGM('boss'); qteState = null; }
  if (s === 'BOSS_VICTORY') {
    bossDefeatedGuard = true;
    bossVictoryTimer = 0;
    bossVictorySealAnim = 0;
    victoryTimer = 3;
    camera.targetZoom = 1.0;
  }
  if (s === 'TIDE_RESULT') { tideClearing = true; }
  if (s === 'GAMEOVER') {
    gameoverTimer = 0; shakeDur = 0.5;
    // Track boss death count (3h)
    if (boss) {
      bossDeathCount[boss.index] = (bossDeathCount[boss.index] || 0) + 1;
      if (bossDeathCount[boss.index] >= 3 && !lighthouseBlessing) {
        lighthouseBlessing = true;
        soundMgr.playSfx('blessing');
      }
    }
    saveCoral(0.3); saveRun(); soundMgr.stopBGM(); soundMgr.playSfx('death');
  }
  if (s === 'VICTORY') { victoryTimer = 0; saveCoral(1.0); saveRun(); soundMgr.stopBGM(); }
  if (s === 'UPGRADE_MENU') { upgradeScrollY = 0; selectedUpgrade = 0; }
  if (s === 'PAUSE') { soundMgr.stopBGM(); }
  if (s === 'CONFIRM_MODAL') { /* modal already configured via showModal() */ }
  if (s === 'HIDDEN_STAGE') { /* exploration mode — no combat */ }
}

// -- Player factory --
function createPlayer() {
  return { x: W*0.5, y: H*0.5, dir: 0, frame: 0, frameTimer: 0, speed: 150, weapon: 0, attacking: false, atkTimer: 0 };
}

// -- Lighthouse factory --
function createLighthouse() {
  const maxHp = (CFG.BASE_LIGHTHOUSE_HP + getUpgrade('lighthouseHp') * CFG.UPGRADE_HP_PER_LV) * CFG.DIFF_HP_MULT[difficultyKey];
  return { x: W*0.5, y: H*0.55, hp: maxHp, maxHp, lightAngle: 0, lightRange: 200 + getUpgrade('lightRange') * 20, autoRepairTimer: 0 };
}

// Utility: get upgrade level from save
function getUpgrade(key) { return save && save.upgrades ? (save.upgrades[key] || 0) : 0; }

// Utility: linear interpolation
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

// -- Fishing system (§7.1) --
function startFishing() {
  if (fishingState && fishingState.phase !== 'idle') return;
  fishingState = { phase:'cast', castTimer:0.5, waitTime: 2 + Math.random()*6, barPos:0, barDir:1, barSpeed:1 + (currentTide > 5 ? 0.2 : 0) + (currentTide > 10 ? 0.3 : 0), hitZone:0.15 + getUpgrade('fishingGear')*0.02, hitCenter: 0.3 + Math.random()*0.4, result:null };
  soundMgr.playSfx('cast');
}

// Update fishing minigame logic
function updateFishing(dt) {
  if (!fishingState) return;
  const fs = fishingState;
  if (fs.phase === 'cast') { fs.castTimer -= dt; if (fs.castTimer <= 0) fs.phase = 'wait'; }
  else if (fs.phase === 'wait') { fs.waitTime -= dt; if (fs.waitTime <= 0) fs.phase = 'reel'; }
  else if (fs.phase === 'reel') {
    fs.barPos += fs.barDir * fs.barSpeed * dt;
    if (fs.barPos > 1) { fs.barPos = 1; fs.barDir = -1; }
    if (fs.barPos < 0) { fs.barPos = 0; fs.barDir = 1; }
  }
  else if (fs.phase === 'success' || fs.phase === 'fail') {
    fs.castTimer -= dt;
    if (fs.castTimer <= 0) fs.phase = 'idle';
  }
}

// Attempt reel catch
function tryReelCatch() {
  if (!fishingState || fishingState.phase !== 'reel') return;
  const fs = fishingState;
  const diff = Math.abs(fs.barPos - fs.hitCenter);
  if (diff < fs.hitZone / 2) {
    // Success — determine fish grade
    const rng = new SeededRNG(Date.now());
    const r = rng.next();
    const gearBonus = getUpgrade('fishingGear') * 0.03;
    const weatherBonus = currentWeather === 'rain' ? 0.1 : currentWeather === 'moonlit' ? 0.05 : 0;
    let grade, value, scoreVal;
    if (r < CFG.FISH_PROB.abyssal + gearBonus + weatherBonus * 0.5) { grade = 'abyssal'; value = rng.intRange(200, 500); scoreVal = 200; }
    else if (r < CFG.FISH_PROB.abyssal + CFG.FISH_PROB.legendary + gearBonus) { grade = 'legendary'; value = rng.intRange(80, 150); scoreVal = 50; }
    else if (r < CFG.FISH_PROB.abyssal + CFG.FISH_PROB.legendary + CFG.FISH_PROB.rare + gearBonus + weatherBonus) { grade = 'rare'; value = rng.intRange(20, 50); scoreVal = 15; }
    else { grade = 'common'; value = rng.intRange(5, 15); scoreVal = 5; }
    value = Math.round(value * CFG.DIFF_FISH_MULT[difficultyKey]);
    runCoral += Math.floor(value * 0.1);
    totalScore += scoreVal * currentTide;
    if (grade === 'rare' && lighthouse) lighthouse.hp = Math.min(lighthouse.hp + 20, lighthouse.maxHp);
    fs.phase = 'success'; fs.castTimer = 1.5; fs.result = { grade, value };
    // Track totalFishCaught (3m)
    if (save) save.totalFishCaught = (save.totalFishCaught || 0) + 1;
    soundMgr.playSfx('catch');
    spawnScorePopup(player.x, player.y - 40, '+' + scoreVal, gradeColor(grade));
  } else {
    // Fail — baitEfficiency reduces wait penalty (3b)
    const baitSaveChance = getUpgrade('baitEfficiency') * 0.2;
    const waitPenalty = Math.random() > baitSaveChance ? 1.0 : 0.3;
    fs.phase = 'fail'; fs.castTimer = waitPenalty; fs.result = null;
  }
}

// Grade color helper
function gradeColor(g) { return g==='abyssal'?COL.monsterPurple:g==='legendary'?COL.lightGold:g==='rare'?'#4dabf7':COL.textPri; }

// Score popup particle
function spawnScorePopup(x, y, text, color) {
  particles.spawn(x, y, 0, -60, 1.5, color, text);
}

// -- Drift items (simplified collectibles) --
let driftItems = [];
function spawnDriftItems(rng) {
  driftItems = [];
  const count = 2 + rng.intRange(0, 2) + (currentWeather === 'fog' ? 1 : 0);
  for (let i = 0; i < count; i++) {
    driftItems.push({ x: rng.range(100, W-100), y: rng.range(H*0.3, H*0.7), collected: false, value: rng.intRange(8, 25), isLore: false });
  }
  // Lore item spawn (3i) — one per tide if not already collected
  if (!loreCollected.includes(currentTide) && currentTide <= TOTAL_LORE) {
    driftItems.push({ x: rng.range(100, W-100), y: rng.range(H*0.3, H*0.6), collected: false, value: 0, isLore: true, tideNum: currentTide });
  }
}

// Collect nearby drift items
function collectDriftItems(px, py) {
  driftItems.forEach(d => {
    if (!d.collected && Math.hypot(d.x - px, d.y - py) < 40) {
      d.collected = true;
      if (d.isLore) {
        // Lore item collected (3i)
        if (!loreCollected.includes(d.tideNum)) {
          loreCollected.push(d.tideNum);
        }
        totalScore += 50;
        spawnScorePopup(d.x, d.y - 20, (TEXT[lang] || TEXT.ko).loreFound, COL.monsterPurple);
        soundMgr.playSfx('lore');
      } else {
        runCoral += d.value;
        totalScore += 10;
        spawnScorePopup(d.x, d.y - 20, '+10', COL.uiAqua);
        soundMgr.playSfx('click');
      }
    }
  });
}

// -- Monster types --
const MONSTER_TYPES = ['jellyfish', 'shark', 'crab'];

// Create a monster at random edge position
function spawnMonster(rng) {
  const type = rng.pick(MONSTER_TYPES);
  const tierIdx = currentTide <= 5 ? 0 : currentTide <= 10 ? 1 : 2;
  const tideProgress = ((currentTide - 1) % 5) / 4;
  const hpBase = lerp(CFG.MONSTER_HP_BASE[tierIdx], CFG.MONSTER_HP_MAX[tierIdx], tideProgress);
  const atkBase = lerp(CFG.MONSTER_ATK_BASE[tierIdx], CFG.MONSTER_ATK_MAX[tierIdx], tideProgress);
  const spdBase = lerp(CFG.MONSTER_SPD_BASE[tierIdx], CFG.MONSTER_SPD_MAX[tierIdx], tideProgress);
  let hp = Math.round(hpBase * CFG.DIFF_ENEMY_MULT[difficultyKey]);
  const atk = Math.round(atkBase * CFG.DIFF_ENEMY_MULT[difficultyKey]);
  const spd = spdBase * (currentWeather === 'storm' ? 1.2 : 1);

  // 달밤 괴수 HP -10% (3c)
  if (currentWeather === 'moonlit') hp = Math.round(hp * 0.9);

  // Spawn from edges
  const side = rng.intRange(0, 3);
  let sx, sy;
  if (side === 0) { sx = rng.range(-30, W+30); sy = -30; }
  else if (side === 1) { sx = W+30; sy = rng.range(-30, H+30); }
  else if (side === 2) { sx = rng.range(-30, W+30); sy = H+30; }
  else { sx = -30; sy = rng.range(-30, H+30); }

  return { x: sx, y: sy, hp, maxHp: hp, atk, speed: spd * 50, type, frame: 0, frameTimer: 0, hurtTimer: 0, slowTimer: 0, atkCooldown: 2 };
}

// Create boss
function createBoss(index) {
  const names = ['angler', 'kraken', 'lord'];
  const hp = CFG.BOSS_HP[index] * CFG.DIFF_ENEMY_MULT[difficultyKey];
  return {
    type: names[index], index, x: W*0.5, y: -80, hp, maxHp: hp,
    phase: 1, frame: 0, frameTimer: 0, atkTimer: 0, hurtTimer: 0,
    // Angler split (3e)
    splitSpawned: false, hidden: false,
    // Kraken tentacles (3f)
    tentacles: index === 1 ? [{hp:100,maxHp:100},{hp:100,maxHp:100},{hp:100,maxHp:100},{hp:100,maxHp:100}] : [],
    inkTimer: 0, inkAlpha: 0,
    // Lord QTE (3g)
    qteTriggered: false
  };
}

// Update AI — monsters move toward lighthouse
function updateAI(dt) {
  const lx = lighthouse.x, ly = lighthouse.y;
  const intensitySlowdown = 1 - getUpgrade('lightIntensity') * 0.05; // 3a — light intensity slowdown
  monsters.forEach(m => {
    const dx = lx - m.x, dy = ly - m.y;
    const dist = Math.hypot(dx, dy) || 1;
    let spdMul = m.slowTimer > 0 ? 0.4 : 1;
    // Apply light intensity slowdown if monster within light range (3a)
    if (lighthouse && dist < lighthouse.lightRange) {
      spdMul *= intensitySlowdown;
    }
    m.x += (dx / dist) * m.speed * spdMul * dt;
    m.y += (dy / dist) * m.speed * spdMul * dt;
    m.frameTimer += dt; if (m.frameTimer > 0.25) { m.frameTimer = 0; m.frame = (m.frame + 1) % 4; }
    if (m.hurtTimer > 0) m.hurtTimer -= dt;
    if (m.slowTimer > 0) m.slowTimer -= dt;
    m.atkCooldown -= dt;
    // Attack lighthouse if close
    if (dist < 50 && m.atkCooldown <= 0) {
      lighthouse.hp -= m.atk;
      m.atkCooldown = 2;
      soundMgr.playSfx('lhHit');
      shakeDur = 0.15;
      hitFx.spawn(lx, ly, 0, 0, 0.4, COL.uiCoral, null);
      if (lighthouse.hp <= 0) { lighthouse.hp = 0; if (!tideClearing) { tideClearing = true; beginTransition('GAMEOVER', 0.6); } }
    }
  });
}

// Update boss AI
function updateBossAI(dt) {
  if (!boss) return;
  const b = boss;

  // If boss is hidden (angler split phase), check if all minis dead (3e)
  if (b.hidden) {
    const anglerMinis = monsters.filter(m => m.type === 'angler_mini');
    if (anglerMinis.length === 0) {
      // Boss defeated after split
      b.hp = 0;
      b.hidden = false;
    } else {
      return; // boss hidden, skip normal AI
    }
  }

  b.frameTimer += dt; if (b.frameTimer > 0.2) { b.frameTimer = 0; b.frame = (b.frame + 1) % 8; }
  if (b.hurtTimer > 0) b.hurtTimer -= dt;
  b.atkTimer -= dt;

  // Move boss toward lighthouse slowly
  const dx = lighthouse.x - b.x, dy = lighthouse.y - b.y;
  const dist = Math.hypot(dx, dy) || 1;
  const bossSpd = 30 * (b.phase >= 3 ? 1.5 : 1);
  if (dist > 80) { b.x += (dx/dist) * bossSpd * dt; b.y += (dy/dist) * bossSpd * dt; }

  // Phase transitions
  const hpPct = b.hp / b.maxHp;
  if (b.type === 'angler') { b.phase = hpPct > 0.6 ? 1 : hpPct > 0.3 ? 2 : 3; }
  else if (b.type === 'kraken') { b.phase = hpPct > 0.5 ? 1 : hpPct > 0.2 ? 2 : 3; }
  else if (b.type === 'lord') { b.phase = hpPct > 0.7 ? 1 : hpPct > 0.4 ? 2 : hpPct > 0.15 ? 3 : 4; }

  // Angler Phase 3 split (3e)
  if (b.type === 'angler' && b.phase === 3 && !b.splitSpawned) {
    b.splitSpawned = true;
    for (let i = 0; i < 3; i++) {
      const miniHp = Math.round(b.maxHp * 0.15);
      monsters.push({ x: b.x + (i-1)*60, y: b.y, hp: miniHp, maxHp: miniHp, atk: 8, speed: 70, type: 'angler_mini', frame: 0, frameTimer: 0, hurtTimer: 0, slowTimer: 0, atkCooldown: 2 });
    }
    b.hidden = true;
    return;
  }

  // Kraken tentacle system (3f)
  if (b.type === 'kraken' && b.tentacles.length > 0) {
    const aliveTentacles = b.tentacles.filter(t => t.hp > 0).length;
    // Phase 2: ink effect
    if (b.phase >= 2) {
      b.inkTimer += dt;
      if (b.inkTimer > 8 && b.inkAlpha < 0.4) {
        b.inkAlpha = Math.min(0.4, b.inkAlpha + dt * 0.3);
      }
      if (b.inkTimer > 12) { b.inkTimer = 0; b.inkAlpha = 0; }
      // Tentacle regeneration in phase 2
      if (b.phase === 2 && aliveTentacles < 4) {
        b.tentacles.forEach(t => {
          if (t.hp <= 0 && Math.random() < 0.002) { t.hp = t.maxHp * 0.5; }
        });
      }
    }
    // Phase 3: body exposed only when all tentacles destroyed
    if (b.phase >= 3 && aliveTentacles > 0) {
      // Tentacles still protect — redirect damage is handled in damageBoss
    }
  }

  // Lord Phase 4 QTE (3g)
  if (b.type === 'lord' && b.phase === 4 && !b.qteTriggered) {
    b.qteTriggered = true;
    qteState = { active: true, dodgesNeeded: 2, dodgesDone: 0, direction: Math.random() < 0.5 ? 'left' : 'right', timer: 3 };
  }

  // QTE update
  if (qteState && qteState.active) {
    qteState.timer -= dt;
    if (qteState.timer <= 0) {
      // Failed QTE — lighthouse takes massive damage
      lighthouse.hp -= 200;
      qteState = null;
      if (lighthouse.hp <= 0) { lighthouse.hp = 0; if (!tideClearing) { tideClearing = true; beginTransition('GAMEOVER', 0.6); } }
    }
    if (qteState && qteState.dodgesDone >= qteState.dodgesNeeded) {
      // QTE success — boss defeated
      qteState = null;
      b.hp = 0;
    }
    return; // skip normal boss attacks during QTE
  }

  // Boss attacks
  if (b.atkTimer <= 0) {
    b.atkTimer = b.phase >= 3 ? 1.5 : 2.5;
    // Attack lighthouse
    if (dist < 200) {
      const dmg = (10 + b.index * 8) * (b.phase >= 3 ? 1.5 : 1);
      lighthouse.hp -= dmg;
      soundMgr.playSfx('lhHit');
      shakeDur = 0.2;
      if (lighthouse.hp <= 0) { lighthouse.hp = 0; if (!tideClearing) { tideClearing = true; beginTransition('GAMEOVER', 0.6); } }
    }
  }

  // Check defeat
  if (b.hp <= 0 && !bossDefeatedGuard) {
    bossDefeatedGuard = true;
    const bi = b.index;
    totalScore += [500, 1500, 5000][bi];
    runCoral += [50, 150, 500][bi];
    if (save) save.bossesDefeated[bi] = true;
    if (bi === 2) {
      // Check hidden stage unlock (3j)
      const allLore = loreCollected.length >= TOTAL_LORE;
      if (allLore && perfectTideStreak >= 15) {
        if (save) save.hiddenUnlocked = true;
        beginTransition('HIDDEN_STAGE', 1.0);
      } else {
        beginTransition('VICTORY', 0.8);
      }
    } else {
      beginTransition('BOSS_VICTORY', 0.6);
    }
  }
}

// Fire weapon
function fireWeapon() {
  if (!player || player.attacking) return;
  player.attacking = true;
  player.atkTimer = 0.3;
  const wpn = currentWeapon;
  const atkBonus = 1 + getUpgrade(['harpoon','net','sonicCannon'][wpn]) * 0.1;
  const atk = CFG.WEAPON_BASE_ATK[wpn] * atkBonus * CFG.DIFF_COMBAT_MULT[difficultyKey];
  const range = CFG.WEAPON_RANGE[wpn] + getUpgrade(['harpoon','net','sonicCannon'][wpn]) * 10;

  if (wpn === 0) { // Harpoon — line projectile
    const angle = Math.atan2(input.my - player.y + camera.y, input.mx - player.x + camera.x);
    projectiles.push({ x:player.x, y:player.y, vx:Math.cos(angle)*400, vy:Math.sin(angle)*400, atk, range, dist:0, type:'harpoon', pierce:2 });
    soundMgr.playSfx('harpoon');
  } else if (wpn === 1) { // Net — area
    projectiles.push({ x:player.x, y:player.y, vx:0, vy:0, atk, range, dist:0, type:'net', timer:0.5 });
    soundMgr.playSfx('net');
  } else { // Sonic — circular wave
    projectiles.push({ x:player.x, y:player.y, vx:0, vy:0, atk, range:0, maxRange:range, type:'sonic', timer:0.6 });
    soundMgr.playSfx('sonic');
  }
}

// Update projectiles and check monster collisions
function updateCombat(dt) {
  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.type === 'harpoon') {
      p.x += p.vx * dt; p.y += p.vy * dt; p.dist += Math.hypot(p.vx, p.vy) * dt;
      if (p.dist > p.range || p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) { projectiles.splice(i, 1); continue; }
      // Check hit
      for (let j = monsters.length - 1; j >= 0; j--) {
        if (Math.hypot(monsters[j].x - p.x, monsters[j].y - p.y) < 30) {
          damageMonster(j, p.atk);
          p.pierce--;
          if (p.pierce <= 0) { projectiles.splice(i, 1); break; }
        }
      }
      // Boss hit
      if (boss && !boss.hidden && Math.hypot(boss.x - p.x, boss.y - p.y) < 50) { damageBoss(p.atk); p.pierce--; if (p.pierce <= 0) projectiles.splice(i, 1); }
    } else if (p.type === 'net') {
      p.timer -= dt;
      if (p.timer <= 0) { projectiles.splice(i, 1); continue; }
      // Area damage + slow
      monsters.forEach((m, j) => {
        if (Math.hypot(m.x - p.x, m.y - p.y) < p.range && m.type !== 'crab') {
          if (p.timer > 0.4) { damageMonster(j, p.atk * dt * 2); m.slowTimer = 2; }
        }
      });
      if (boss && !boss.hidden && Math.hypot(boss.x - p.x, boss.y - p.y) < p.range) damageBoss(p.atk * dt);
    } else if (p.type === 'sonic') {
      p.range += 300 * dt; p.timer -= dt;
      if (p.timer <= 0 || p.range > p.maxRange) { projectiles.splice(i, 1); continue; }
      // Ring damage + knockback
      monsters.forEach((m, j) => {
        const d = Math.hypot(m.x - p.x, m.y - p.y);
        if (d < p.range && d > p.range - 30) {
          damageMonster(j, p.atk * dt * 3);
          const ang = Math.atan2(m.y - p.y, m.x - p.x);
          m.x += Math.cos(ang) * 100 * dt; m.y += Math.sin(ang) * 100 * dt;
        }
      });
      if (boss && !boss.hidden) { const d = Math.hypot(boss.x - p.x, boss.y - p.y); if (d < p.range && d > p.range - 30) damageBoss(p.atk * dt * 2); }
    }
  }

  // Player attack cooldown
  if (player.attacking) { player.atkTimer -= dt; if (player.atkTimer <= 0) player.attacking = false; }

  // Auto repair
  if (getUpgrade('autoRepair') > 0) {
    lighthouse.autoRepairTimer = (lighthouse.autoRepairTimer || 0) + dt;
    if (lighthouse.autoRepairTimer >= 5) {
      lighthouse.autoRepairTimer = 0;
      lighthouse.hp = Math.min(lighthouse.hp + getUpgrade('autoRepair') * 2, lighthouse.maxHp);
    }
  }

  // Lighthouse blessing — +5 HP/sec auto recovery (3h)
  if (lighthouseBlessing && lighthouse) {
    lighthouse.hp = Math.min(lighthouse.hp + 5 * dt, lighthouse.maxHp);
  }
}

// Damage a monster
function damageMonster(idx, dmg) {
  const m = monsters[idx];
  if (!m) return;
  m.hp -= dmg;
  m.hurtTimer = 0.15;
  hitFx.spawn(m.x, m.y, (Math.random()-0.5)*80, -40-Math.random()*60, 0.4, COL.lightGold, null);
  soundMgr.playSfx('hit');
  if (m.hp <= 0) {
    totalScore += 10 * currentTide;
    runCoral += Math.floor(currentTide * 0.5);
    monstersKilled++;
    spawnScorePopup(m.x, m.y - 30, '+' + (10 * currentTide), COL.uiAqua);
    monsters.splice(idx, 1);
    soundMgr.playSfx('death');
  }
}

// Damage boss
function damageBoss(dmg) {
  if (!boss || boss.hp <= 0 || boss.hidden) return;
  // Kraken tentacle redirect (3f)
  if (boss.type === 'kraken' && boss.tentacles.length > 0) {
    const aliveTentacles = boss.tentacles.filter(t => t.hp > 0);
    if (aliveTentacles.length > 0 && boss.phase < 3) {
      // Damage goes to a random tentacle instead
      const target = aliveTentacles[Math.floor(Math.random() * aliveTentacles.length)];
      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      boss.hurtTimer = 0.1;
      hitFx.spawn(boss.x + (Math.random()-0.5)*60, boss.y + (Math.random()-0.5)*40, 0, -30, 0.3, COL.monsterPurple, null);
      soundMgr.playSfx('hit');
      return;
    }
  }
  boss.hp -= dmg;
  boss.hurtTimer = 0.1;
  hitFx.spawn(boss.x + (Math.random()-0.5)*40, boss.y + (Math.random()-0.5)*40, 0, -30, 0.3, COL.lightGold, null);
  soundMgr.playSfx('hit');
}

// Sonar pulse — area reveal + damage
function fireSonar() {
  if (sonarCooldown > 0) return;
  const cd = 12 - getUpgrade('sonarCooldown') * 2;
  sonarCooldown = cd;
  const range = 200 + getUpgrade('sonarRange') * 30;
  monsters.forEach((m, j) => {
    if (Math.hypot(m.x - player.x, m.y - player.y) < range) {
      damageMonster(j, 15);
    }
  });
  particles.spawn(player.x, player.y, 0, 0, 0.8, COL.uiAqua, 'sonar');
  soundMgr.playSfx('sonic');
}

// Choose weather for current tide based on allowed ranges
function chooseWeather(rng) {
  const possible = Object.entries(CFG.WEATHER_TIDES).filter(([w, [lo, hi]]) => currentTide >= lo && currentTide <= hi).map(([w]) => w);
  currentWeather = rng.pick(possible);
}

// Weather particle state
let weatherParticles = [];
function updateWeather(dt) {
  if (currentWeather === 'rain') {
    if (weatherParticles.length < 100) {
      for (let i = 0; i < 3; i++) weatherParticles.push({ x: Math.random()*W, y: -10, vy: 300+Math.random()*200, life:2 });
    }
  } else if (currentWeather === 'storm') {
    if (weatherParticles.length < 150) {
      for (let i = 0; i < 5; i++) weatherParticles.push({ x: Math.random()*W, y: -10, vy: 400+Math.random()*300, vx: (Math.random()-0.5)*100, life:1.5 });
    }
    // Lightning strike system (3d)
    if (isNight) {
      lightningTimer -= dt;
      if (lightningTimer <= 0) {
        lightningTimer = 3 + Math.random() * 5;
        const lx = Math.random() * W, ly = Math.random() * H;
        lightningStrikePos = { x: lx, y: ly };
        // Damage monsters in radius
        for (let j = monsters.length - 1; j >= 0; j--) {
          if (Math.hypot(monsters[j].x - lx, monsters[j].y - ly) < 80) {
            damageMonster(j, 25);
          }
        }
        shakeDur = Math.max(shakeDur, 0.1);
        lightningFlash = 0.3;
        soundMgr.playSfx('lightning');
      }
    }
  }
  for (let i = weatherParticles.length - 1; i >= 0; i--) {
    const p = weatherParticles[i];
    p.y += p.vy * dt;
    p.x += (p.vx || 0) * dt;
    p.life -= dt;
    if (p.life <= 0 || p.y > H + 20) { weatherParticles.splice(i, 1); }
  }
  // Storm shake
  if (currentWeather === 'storm' && isNight) { shakeDur = Math.max(shakeDur, 0.05); }
  // Lightning flash decay
  if (lightningFlash > 0) lightningFlash -= dt;
}

// Wave offsets for background animation
let waveOffset = 0;
function updateWaves(dt) {
  waveOffset += dt * 30;
}

// Bioluminescence ambient particle update (visual signature)
function updateBioluminescence(dt) {
  // Spawn new particles
  if (bioLumParticles.length < 50) {
    if (Math.random() < 0.15) {
      const colors = [COL.uiAqua, COL.monsterPurple, '#5c7cfa', '#845ef7'];
      bioLumParticles.push({
        x: Math.random() * W,
        y: H * 0.4 + Math.random() * H * 0.6,
        vx: (Math.random() - 0.5) * 15,
        vy: (Math.random() - 0.5) * 10,
        life: 3 + Math.random() * 4,
        maxLife: 3 + Math.random() * 4,
        r: 1.5 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpeed: 1.5 + Math.random() * 2
      });
    }
  }
  // React to game events — spawn bursts near hits
  // Update existing
  for (let i = bioLumParticles.length - 1; i >= 0; i--) {
    const p = bioLumParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.pulsePhase += p.pulseSpeed * dt;
    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
      bioLumParticles.splice(i, 1);
    }
  }
}

// Spawn bioluminescence burst at position (reaction to events)
function spawnBioLumBurst(x, y, count) {
  const colors = [COL.uiAqua, COL.monsterPurple, '#5c7cfa'];
  for (let i = 0; i < count; i++) {
    bioLumParticles.push({
      x: x + (Math.random() - 0.5) * 40,
      y: y + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 60,
      vy: (Math.random() - 0.5) * 60,
      life: 1 + Math.random() * 2,
      maxLife: 1 + Math.random() * 2,
      r: 2 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 2 + Math.random() * 3
    });
  }
}

// -- Pure drawing functions (F9: no global access, all via params) --

// Draw deep sea background with parallax layers
function drawBackground(ctx, W, H, waveOff, isNight, weather, camX, camY) {
  // Canvas sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.4);
  if (isNight) {
    skyGrad.addColorStop(0, '#05050f'); skyGrad.addColorStop(1, '#0A1628');
  } else {
    skyGrad.addColorStop(0, '#0D2847'); skyGrad.addColorStop(1, '#1A4B7A');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.4);

  // Stars (night)
  if (isNight) {
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137.5 + waveOff * 0.02) % W);
      const sy = ((i * 73.3) % (H * 0.35));
      const bright = 0.3 + 0.7 * Math.abs(Math.sin(waveOff * 0.01 + i));
      ctx.globalAlpha = bright;
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;
    // Moon on moonlit nights
    if (weather === 'moonlit') {
      ctx.fillStyle = '#ffffee';
      ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.arc(W * 0.8, H * 0.1, 30, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.15;
      ctx.beginPath(); ctx.arc(W * 0.8, H * 0.1, 60, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // BG Layer 1 (distant sea) — Canvas gradient ocean
  const seaGrad = ctx.createLinearGradient(0, H*0.35, 0, H);
  seaGrad.addColorStop(0, COL.bgMid); seaGrad.addColorStop(1, COL.bgDeep);
  ctx.fillStyle = seaGrad; ctx.fillRect(0, H*0.35, W, H*0.65);

  // Water waves (3-layer sin curves)
  const waterY = H * 0.4;
  for (let layer = 0; layer < 3; layer++) {
    ctx.beginPath();
    const amp = 8 + layer * 4;
    const freq = 0.015 - layer * 0.003;
    const speed = (layer + 1) * 0.7;
    const alpha = 0.15 - layer * 0.03;
    ctx.moveTo(0, waterY);
    for (let x = 0; x <= W; x += 4) {
      ctx.lineTo(x, waterY + Math.sin(x * freq + waveOff * 0.02 * speed) * amp);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = isNight ? `rgba(10,22,40,${alpha + 0.3})` : `rgba(26,75,122,${alpha})`;
    ctx.fill();
  }

  // Fog overlay
  if (weather === 'fog') {
    ctx.fillStyle = 'rgba(180,200,220,0.25)';
    ctx.fillRect(0, 0, W, H);
  }

  // Lightning flash overlay (3d)
  if (lightningFlash > 0) {
    ctx.fillStyle = `rgba(220,230,255,${lightningFlash * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// Draw weather particles
function drawWeather(ctx, weather, particles) {
  if (weather === 'rain' || weather === 'storm') {
    ctx.strokeStyle = 'rgba(150,200,255,0.4)';
    ctx.lineWidth = 1;
    particles.forEach(p => {
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + (p.vx||0)*0.01, p.y + 8); ctx.stroke();
    });
  }
  // Draw lightning strike position briefly
  if (lightningStrikePos && lightningFlash > 0) {
    ctx.strokeStyle = `rgba(255,255,200,${lightningFlash * 2})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(lightningStrikePos.x, 0);
    // Jagged lightning bolt
    let lx = lightningStrikePos.x, ly = 0;
    const targetY = lightningStrikePos.y;
    const steps = 8;
    for (let i = 1; i <= steps; i++) {
      lx += (Math.random() - 0.5) * 40;
      ly = (targetY / steps) * i;
      ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    // Impact glow
    ctx.fillStyle = `rgba(255,255,200,${lightningFlash})`;
    ctx.beginPath(); ctx.arc(lightningStrikePos.x, lightningStrikePos.y, 40, 0, Math.PI * 2); ctx.fill();
    if (lightningFlash <= 0.05) lightningStrikePos = null;
  }
}

// Draw bioluminescence ambient particles (visual signature)
function drawBioluminescence(ctx, particles) {
  particles.forEach(p => {
    const pulse = 0.3 + 0.7 * Math.abs(Math.sin(p.pulsePhase));
    const lifeAlpha = Math.min(1, p.life / p.maxLife * 2);
    ctx.globalAlpha = pulse * lifeAlpha * 0.6;
    // Glow
    const glowGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    glowGrad.addColorStop(0, p.color);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2); ctx.fill();
    // Core dot
    ctx.globalAlpha = pulse * lifeAlpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Draw lighthouse structure
function drawLighthouse(ctx, x, y, scale, hp, maxHp, lightAngle, lightRange, isNight) {
  ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);

  // Rock base
  ctx.fillStyle = '#3d3d3d';
  ctx.beginPath();
  ctx.moveTo(-50, 10); ctx.quadraticCurveTo(-55, 25, -40, 30);
  ctx.lineTo(40, 30); ctx.quadraticCurveTo(55, 25, 50, 10);
  ctx.lineTo(30, 5); ctx.lineTo(-30, 5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#4a4a4a';
  ctx.beginPath();
  ctx.ellipse(0, 15, 45, 12, 0, 0, Math.PI); ctx.fill();

  // Base structure
  const bw = 40, bh = 100;
  // Tower body with gradient
  const towerGrad = ctx.createLinearGradient(-bw/2, -bh, bw/2, 0);
  towerGrad.addColorStop(0, '#e0e0e0'); towerGrad.addColorStop(0.3, '#b0b0b0');
  towerGrad.addColorStop(0.7, '#888'); towerGrad.addColorStop(1, '#666');
  ctx.fillStyle = towerGrad;
  ctx.beginPath();
  ctx.moveTo(-bw/2, 0); ctx.lineTo(-bw/3, -bh); ctx.lineTo(bw/3, -bh); ctx.lineTo(bw/2, 0); ctx.closePath(); ctx.fill();

  // Red stripes
  ctx.fillStyle = '#c0392b';
  for (let i = 0; i < 3; i++) {
    const sy = -bh + i * 30 + 10;
    const wAtY = bw * (1 - (Math.abs(sy) / bh) * 0.35);
    ctx.fillRect(-wAtY/2, sy, wAtY, 8);
  }

  // Windows
  ctx.fillStyle = isNight ? 'rgba(255,217,61,0.6)' : 'rgba(135,206,250,0.4)';
  const windowPositions = [-65, -35];
  windowPositions.forEach(wy => {
    const wAtY = bw * (1 - (Math.abs(wy) / bh) * 0.35) * 0.25;
    ctx.beginPath(); ctx.arc(0, wy, wAtY, 0, Math.PI * 2); ctx.fill();
  });

  // Lantern room
  const lanternGrad = ctx.createRadialGradient(0, -bh - 10, 2, 0, -bh - 10, 14);
  lanternGrad.addColorStop(0, '#fff8dc');
  lanternGrad.addColorStop(0.5, COL.lightGold);
  lanternGrad.addColorStop(1, '#cc8800');
  ctx.fillStyle = lanternGrad;
  ctx.fillRect(-12, -bh - 20, 24, 20);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.strokeRect(-12, -bh - 20, 24, 20);

  // Rim light effect
  ctx.strokeStyle = 'rgba(255,217,61,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-bw/2 - 2, 0); ctx.lineTo(-bw/3 - 2, -bh); ctx.stroke();

  // Light beam (only when night or always subtle)
  if (isNight || true) {
    ctx.save();
    ctx.translate(0, -bh - 10);
    ctx.rotate(lightAngle);
    const beamGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, lightRange);
    beamGrad.addColorStop(0, `rgba(255,217,61,${isNight ? 0.5 : 0.15})`);
    beamGrad.addColorStop(1, 'rgba(255,217,61,0)');
    ctx.fillStyle = beamGrad;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, lightRange, -0.3, 0.3); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Blessing indicator (3h)
  if (lighthouseBlessing) {
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(waveOffset * 0.1);
    const blessGrad = ctx.createRadialGradient(0, -bh/2, 10, 0, -bh/2, 80);
    blessGrad.addColorStop(0, 'rgba(56,217,169,0.4)');
    blessGrad.addColorStop(1, 'rgba(56,217,169,0)');
    ctx.fillStyle = blessGrad;
    ctx.beginPath(); ctx.arc(0, -bh/2, 80, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // HP bar below
  const barW = 60, barH = 6, barY = 35;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-barW/2, barY, barW, barH);
  const hpPct = Math.max(0, hp / maxHp);
  ctx.fillStyle = hpPct > 0.5 ? COL.hpGreen : hpPct > 0.25 ? COL.lightAmber : COL.uiCoral;
  ctx.fillRect(-barW/2, barY, barW * hpPct, barH);

  ctx.restore();
}

// Draw the keeper (player character) with SVG fallback
function drawKeeper(ctx, x, y, dir, frame, weapon, isAttacking) {
  ctx.save(); ctx.translate(x, y);
  if (dir > Math.PI/2 || dir < -Math.PI/2) ctx.scale(-1, 1);

  // Coat/body with gradient
  const bodyGrad = ctx.createLinearGradient(-12, -8, 12, 20);
  bodyGrad.addColorStop(0, '#34495e');
  bodyGrad.addColorStop(1, '#1a252f');
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(-12, -8, 24, 28);
  // Coat detail lines
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(-6, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -8); ctx.lineTo(6, 20); ctx.stroke();
  // Belt
  ctx.fillStyle = '#8B4513'; ctx.fillRect(-12, 8, 24, 3);

  // Head
  ctx.fillStyle = '#f5d6b8';
  ctx.beginPath(); ctx.arc(0, -16, 10, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(-4, -17, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -17, 2, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.5, -17.5, 0.8, 0, Math.PI*2); ctx.fill();

  // Hat
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-12, -26, 24, 8);
  ctx.fillRect(-8, -30, 16, 6);

  // Lantern glow (hanging from hand)
  const lanternX = isAttacking ? -14 : -12;
  ctx.fillStyle = 'rgba(255,217,61,0.15)';
  ctx.beginPath(); ctx.arc(lanternX, 6, 20, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = COL.lightGold;
  ctx.beginPath(); ctx.arc(lanternX, 6, 4, 0, Math.PI * 2); ctx.fill();

  // Weapon indicator
  const wColors = [COL.uiCoral, COL.uiAqua, COL.monsterPurple];
  ctx.fillStyle = wColors[weapon];
  ctx.fillRect(isAttacking ? 14 : 12, -4, isAttacking ? 20 : 16, 4);
  // Weapon glow
  if (isAttacking) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = wColors[weapon];
    ctx.beginPath(); ctx.arc(24, -2, 10, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// Draw monster based on type with enhanced visuals
function drawMonster(ctx, x, y, type, hp, maxHp, frame, isHurt) {
  ctx.save(); ctx.translate(x, y);
  if (isHurt) { ctx.globalAlpha = 0.6; }

  if (type === 'jellyfish') {
    // Enhanced jellyfish with gradient
    const jellGrad = ctx.createRadialGradient(0, -8, 2, 0, -8, 16);
    jellGrad.addColorStop(0, '#d946ef');
    jellGrad.addColorStop(1, COL.monsterPurple);
    ctx.fillStyle = jellGrad;
    ctx.beginPath();
    ctx.ellipse(0, -8, 16, 12, 0, Math.PI, 0); ctx.fill();
    // Bioluminescence points
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = -8; i <= 8; i += 4) {
      const pulse = 0.3 + 0.7 * Math.abs(Math.sin(frame * 1.5 + i * 0.8));
      ctx.globalAlpha = isHurt ? 0.3 : pulse * 0.6;
      ctx.beginPath(); ctx.arc(i, -6 + Math.sin(i) * 2, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = isHurt ? 0.6 : 1;
    // Tentacles with gradient
    ctx.lineWidth = 2;
    for (let t = -10; t <= 10; t += 5) {
      const tentGrad = ctx.createLinearGradient(t, 4, t, 28);
      tentGrad.addColorStop(0, 'rgba(190,75,219,0.8)');
      tentGrad.addColorStop(1, 'rgba(190,75,219,0.1)');
      ctx.strokeStyle = tentGrad;
      ctx.beginPath(); ctx.moveTo(t, 4);
      ctx.quadraticCurveTo(t + Math.sin(frame * 2 + t) * 6, 16, t, 28); ctx.stroke();
    }
    // Glow eye
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e040fb'; ctx.beginPath(); ctx.arc(0, -6, 1.5, 0, Math.PI*2); ctx.fill();
  } else if (type === 'shark') {
    // Enhanced shark with gradient
    const sharkGrad = ctx.createLinearGradient(-20, -14, 20, 8);
    sharkGrad.addColorStop(0, '#5a6a7a');
    sharkGrad.addColorStop(1, '#2d3748');
    ctx.fillStyle = sharkGrad;
    ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.lineTo(10, -14);
    ctx.lineTo(-5, -10); ctx.lineTo(-20, 0); ctx.fill();
    // Belly
    ctx.fillStyle = '#8899aa';
    ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.lineTo(10, 6); ctx.lineTo(-10, 6); ctx.closePath(); ctx.fill();
    // Fin
    ctx.fillStyle = '#2d3748';
    ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(20, -8); ctx.lineTo(20, 8); ctx.closePath(); ctx.fill();
    // Eye with glow
    ctx.fillStyle = COL.uiCoral; ctx.beginPath(); ctx.arc(-5, -4, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-4.5, -4.5, 1, 0, Math.PI*2); ctx.fill();
  } else if (type === 'crab') {
    // Enhanced crab
    const crabGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 20);
    crabGrad.addColorStop(0, '#e74c3c');
    crabGrad.addColorStop(1, '#c0392b');
    ctx.fillStyle = crabGrad;
    ctx.fillRect(-14, -8, 28, 16);
    // Shell detail
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI); ctx.stroke();
    // Claws with gradient
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(-20, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(20, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.arc(-20, 0, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(20, 0, 5, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -10, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -10, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-6, -10, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -10, 1.5, 0, Math.PI*2); ctx.fill();
  } else if (type === 'angler_mini') {
    // Mini angler (3e split spawn)
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.ellipse(0, 0, 18, 12, 0, 0, Math.PI*2); ctx.fill();
    // Lure
    ctx.fillStyle = COL.lightGold;
    ctx.beginPath(); ctx.arc(-4, -14, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,217,61,0.2)';
    ctx.beginPath(); ctx.arc(-4, -14, 10, 0, Math.PI*2); ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    for (let i = -8; i < 8; i += 5) { ctx.fillRect(i, 6, 3, 4); }
    // Eye
    ctx.fillStyle = COL.monsterPurple;
    ctx.beginPath(); ctx.arc(-5, -3, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
  }

  // HP bar
  if (hp < maxHp) {
    const bw = 30;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-bw/2, -25, bw, 4);
    ctx.fillStyle = COL.hpGreen; ctx.fillRect(-bw/2, -25, bw * (hp/maxHp), 4);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// Draw boss with phases and effects — enhanced visuals
function drawBoss(ctx, x, y, bossData) {
  const b = bossData; if (!b || b.hidden) return;
  ctx.save(); ctx.translate(x, y);
  if (b.hurtTimer > 0) ctx.globalAlpha = 0.6;

  const sz = [48, 60, 80][b.index];

  // Boss aura with gradient
  const auraGrad = ctx.createRadialGradient(0, 0, sz * 0.5, 0, 0, sz + 15 + Math.sin(b.frame * 0.5) * 5);
  auraGrad.addColorStop(0, 'rgba(201,42,42,0)');
  auraGrad.addColorStop(1, `rgba(201,42,42,${0.1 + b.phase * 0.06})`);
  ctx.beginPath();
  ctx.arc(0, 0, sz + 15 + Math.sin(b.frame * 0.5) * 5, 0, Math.PI * 2);
  ctx.fillStyle = auraGrad;
  ctx.fill();

  if (b.type === 'angler') {
    // Angler fish body with gradient
    const anglerGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, sz);
    anglerGrad.addColorStop(0, '#2a2a4e');
    anglerGrad.addColorStop(1, '#0a0a1e');
    ctx.fillStyle = anglerGrad;
    ctx.beginPath(); ctx.ellipse(0, 0, sz, sz*0.7, 0, 0, Math.PI*2); ctx.fill();
    // Bioluminescent accents
    ctx.fillStyle = 'rgba(56,217,169,0.15)';
    for (let i = 0; i < 6; i++) {
      const ax = Math.cos(i * 1.05 + b.frame * 0.2) * sz * 0.6;
      const ay = Math.sin(i * 1.05 + b.frame * 0.2) * sz * 0.4;
      ctx.beginPath(); ctx.arc(ax, ay, 3, 0, Math.PI * 2); ctx.fill();
    }
    // Lure light with larger glow
    ctx.fillStyle = COL.lightGold;
    ctx.beginPath(); ctx.arc(-10, -sz + 5, 8, 0, Math.PI*2); ctx.fill();
    // Lure glow
    const lureGlow = ctx.createRadialGradient(-10, -sz + 5, 2, -10, -sz + 5, 25);
    lureGlow.addColorStop(0, 'rgba(255,217,61,0.4)');
    lureGlow.addColorStop(1, 'rgba(255,217,61,0)');
    ctx.fillStyle = lureGlow;
    ctx.beginPath(); ctx.arc(-10, -sz + 5, 25, 0, Math.PI * 2); ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    for (let i = -20; i < 20; i += 8) { ctx.fillRect(i, sz*0.4, 4, 8); }
    // Eyes with glow
    ctx.fillStyle = COL.monsterPurple;
    ctx.beginPath(); ctx.arc(-15, -10, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, -10, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-14, -11, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(16, -11, 2, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'kraken') {
    // Main body with gradient
    const krakenGrad = ctx.createRadialGradient(0, -10, 5, 0, -10, sz * 0.8);
    krakenGrad.addColorStop(0, '#4d2b7e');
    krakenGrad.addColorStop(1, '#1d0b3e');
    ctx.fillStyle = krakenGrad;
    ctx.beginPath(); ctx.ellipse(0, -10, sz*0.6, sz*0.8, 0, 0, Math.PI*2); ctx.fill();
    // Tentacles with individual HP indicator (3f)
    for (let i = 0; i < 4; i++) {
      const ang = (i / 4) * Math.PI * 2 + b.frame * 0.3;
      const tentHp = b.tentacles[i] ? b.tentacles[i].hp : 0;
      const tentAlive = tentHp > 0;
      ctx.strokeStyle = tentAlive ? '#5d3b8e' : 'rgba(60,30,80,0.3)';
      ctx.lineWidth = tentAlive ? 6 : 2;
      ctx.beginPath(); ctx.moveTo(0, 10);
      ctx.quadraticCurveTo(Math.cos(ang)*50, 40 + Math.sin(ang)*20, Math.cos(ang)*70, 60); ctx.stroke();
      // Tentacle HP dot
      if (tentAlive) {
        const tx = Math.cos(ang) * 70, ty = 60;
        ctx.fillStyle = COL.hpGreen;
        ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI * 2); ctx.fill();
      }
    }
    // Bioluminescent spots
    ctx.fillStyle = 'rgba(190,75,219,0.3)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(Math.cos(i * 1.3) * sz * 0.3, -10 + Math.sin(i * 1.3) * sz * 0.4, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Eye
    ctx.fillStyle = COL.monsterPurple; ctx.beginPath(); ctx.arc(0, -15, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -15, 4, 0, Math.PI*2); ctx.fill();
    // Ink overlay (3f)
    if (b.inkAlpha > 0) {
      ctx.fillStyle = `rgba(20,0,40,${b.inkAlpha})`;
      ctx.beginPath(); ctx.arc(0, 0, sz * 2, 0, Math.PI * 2); ctx.fill();
    }
  } else if (b.type === 'lord') {
    // Abyssal lord — large dark entity with gradient
    const lordGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, sz * 1.1);
    lordGrad.addColorStop(0, '#1a0a2e');
    lordGrad.addColorStop(1, '#050510');
    ctx.fillStyle = lordGrad;
    ctx.beginPath(); ctx.ellipse(0, 0, sz, sz*1.1, 0, 0, Math.PI*2); ctx.fill();
    // Crown-like protrusions with gradient
    for (let i = 0; i < 5; i++) {
      const ang = -Math.PI/2 + (i-2)*0.4;
      const crownGrad = ctx.createLinearGradient(0, -sz*0.5, Math.cos(ang)*sz*0.6, Math.sin(ang)*sz*0.6 - sz);
      crownGrad.addColorStop(0, COL.bossCrimson);
      crownGrad.addColorStop(1, '#ff4444');
      ctx.fillStyle = crownGrad;
      ctx.beginPath(); ctx.moveTo(0, -sz*0.5);
      ctx.lineTo(Math.cos(ang)*sz*0.6, Math.sin(ang)*sz*0.6 - sz);
      ctx.lineTo(Math.cos(ang+0.15)*sz*0.4, Math.sin(ang+0.15)*sz*0.5 - sz*0.5);
      ctx.fill();
    }
    // Bioluminescent vein lines
    ctx.strokeStyle = 'rgba(190,75,219,0.2)'; ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * sz * 0.9, Math.sin(a) * sz * 0.9);
      ctx.stroke();
    }
    // Multiple eyes with glow
    ctx.fillStyle = COL.monsterPurple;
    [-20,-8,8,20].forEach(ex => {
      ctx.beginPath(); ctx.arc(ex, -10, 5, 0, Math.PI*2); ctx.fill();
      // Eye glow
      ctx.fillStyle = 'rgba(190,75,219,0.2)';
      ctx.beginPath(); ctx.arc(ex, -10, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = COL.monsterPurple;
    });
    // Phase indicator
    if (b.phase >= 3) {
      ctx.strokeStyle = COL.bossCrimson; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, sz + 20, 0, Math.PI*2); ctx.stroke();
    }
    if (b.phase >= 4) {
      // Phase 4: intense energy ring
      ctx.strokeStyle = 'rgba(255,100,100,0.4)'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(0, 0, sz + 30 + Math.sin(b.frame) * 5, 0, Math.PI*2); ctx.stroke();
    }
  }

  // Boss HP bar
  const bhW = 100, bhH = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(-bhW/2, sz + 15, bhW, bhH);
  ctx.fillStyle = b.hp/b.maxHp > 0.3 ? COL.bossCrimson : COL.uiCoral;
  ctx.fillRect(-bhW/2, sz + 15, bhW * Math.max(0, b.hp/b.maxHp), bhH);

  // Phase text
  ctx.fillStyle = COL.textSec; ctx.font = `10px ${FONT}`; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Phase ' + b.phase, 0, sz + 26);

  ctx.globalAlpha = 1; ctx.restore();
}

// Draw fishing UI overlay
function drawFishingUI(ctx, W, H, fs, txt) {
  if (!fs || fs.phase === 'idle') return;
  const cx = W * 0.5, cy = H * 0.3;

  if (fs.phase === 'cast') {
    ctx.fillStyle = COL.textPri; ctx.font = `18px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText(txt.wait, cx, cy);
  } else if (fs.phase === 'wait') {
    ctx.fillStyle = COL.textSec; ctx.font = `16px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText(txt.wait, cx, cy);
    // Bobber animation
    const bobY = cy + 30 + Math.sin(waveOffset * 0.05) * 5;
    ctx.fillStyle = COL.uiCoral; ctx.beginPath(); ctx.arc(cx, bobY, 6, 0, Math.PI*2); ctx.fill();
  } else if (fs.phase === 'reel') {
    // Timing bar
    const barW = 200, barH = 20;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(cx - barW/2, cy, barW, barH);
    // Hit zone
    const zoneX = cx - barW/2 + fs.hitCenter * barW;
    const zoneW = fs.hitZone * barW;
    ctx.fillStyle = 'rgba(56,217,169,0.4)'; ctx.fillRect(zoneX - zoneW/2, cy, zoneW, barH);
    // Cursor
    const curX = cx - barW/2 + fs.barPos * barW;
    ctx.fillStyle = COL.lightGold; ctx.fillRect(curX - 3, cy - 3, 6, barH + 6);
    // Label
    ctx.fillStyle = COL.uiCoral; ctx.font = `bold 20px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText(txt.hit, cx, cy - 15);
  } else if (fs.phase === 'success') {
    ctx.fillStyle = gradeColor(fs.result.grade); ctx.font = `bold 22px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText(txt.success + ' (' + fs.result.grade + ')', cx, cy);
  } else if (fs.phase === 'fail') {
    ctx.fillStyle = COL.uiCoral; ctx.font = `18px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText(txt.fail, cx, cy);
  }
}

// Draw HUD (score, hp, tide, weapon, etc.)
function drawHUD(ctx, W, H, score, bestScore, coral, tideNum, phase, hp, maxHp, weather, weapon, sonarCD, txt, langKey) {
  const margin = 12;
  ctx.textBaseline = 'top';

  // Top-left: Score + Tide
  ctx.font = `bold 16px ${FONT}`; ctx.textAlign = 'left';
  // Score icon
  ctx.fillStyle = COL.lightGold; ctx.fillRect(margin, margin, 16, 16);
  ctx.fillStyle = COL.textPri;
  ctx.fillText(`${txt.score}: ${score}`, margin + 24, margin + 2);

  // Best
  ctx.fillStyle = COL.textSec; ctx.font = `12px ${FONT}`;
  ctx.fillText(`${txt.best}: ${bestScore}`, margin + 24, margin + 22);

  // Tide
  ctx.fillStyle = COL.lightGold; ctx.font = `bold 14px ${FONT}`;
  ctx.fillText(`${txt.tide} ${tideNum}/15`, margin, margin + 42);

  // Coral
  ctx.fillStyle = COL.uiAqua; ctx.font = `14px ${FONT}`;
  ctx.fillText(`${txt.coral}: ${coral}`, margin, margin + 60);

  // Weather
  ctx.fillStyle = COL.textSec; ctx.font = `12px ${FONT}`;
  const wName = txt.weather ? txt.weather[weather] || weather : weather;
  ctx.fillText(wName, margin, margin + 78);

  // Lore counter (3i)
  ctx.fillStyle = COL.monsterPurple; ctx.font = `11px ${FONT}`;
  ctx.fillText(`Lore: ${loreCollected.length}/${TOTAL_LORE}`, margin, margin + 94);

  // Blessing indicator (3h)
  if (lighthouseBlessing) {
    ctx.fillStyle = COL.uiAqua; ctx.font = `11px ${FONT}`;
    ctx.fillText(txt.blessing || 'Blessing Active', margin, margin + 108);
  }

  // Top-right: Lighthouse HP icon
  ctx.fillStyle = COL.uiCoral; ctx.beginPath(); ctx.arc(W - margin - 10, margin + 10, 8, 0, Math.PI*2); ctx.fill();
  const hpBarW = 120, hpBarH = 14;
  const hpX = W - margin - 24 - hpBarW;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(hpX, margin + 3, hpBarW, hpBarH);
  const hpPct = Math.max(0, hp / maxHp);
  ctx.fillStyle = hpPct > 0.5 ? COL.hpGreen : hpPct > 0.25 ? COL.lightAmber : COL.uiCoral;
  ctx.fillRect(hpX, margin + 3, hpBarW * hpPct, hpBarH);
  ctx.fillStyle = COL.textPri; ctx.font = `bold 11px ${FONT}`; ctx.textAlign = 'right';
  ctx.fillText(`${Math.ceil(hp)}/${Math.ceil(maxHp)}`, W - margin - 26, margin + 5);

  // Phase indicator
  ctx.textAlign = 'center'; ctx.font = `bold 14px ${FONT}`;
  ctx.fillStyle = phase === 'casual' ? COL.uiAqua : COL.uiCoral;
  ctx.fillText(phase === 'casual' ? txt.phase.casual : txt.phase.action, W*0.5, margin + 2);

  // Phase timer
  ctx.fillStyle = COL.textPri; ctx.font = `24px ${FONT_MONO}`;
  ctx.fillText(Math.ceil(phaseTimer) + 's', W*0.5, margin + 20);

  // Weapon indicator (bottom-right)
  ctx.textAlign = 'right'; ctx.font = `bold 13px ${FONT}`;
  const weaponNames = txt.weapon || ['Harpoon','Net','Sonic'];
  for (let i = 0; i < 3; i++) {
    const wy = H - margin - 60 + i * 22;
    ctx.fillStyle = i === weapon ? COL.lightGold : COL.textMuted;
    ctx.fillText(`[${i+1}] ${weaponNames[i]}`, W - margin, wy);
  }

  // Sonar cooldown
  if (sonarCD > 0) {
    ctx.fillStyle = COL.textSec; ctx.font = `12px ${FONT}`;
    ctx.fillText(`Q: ${Math.ceil(sonarCD)}s`, W - margin, H - margin - 70);
  } else {
    ctx.fillStyle = COL.uiAqua; ctx.font = `12px ${FONT}`;
    ctx.fillText('Q: Ready', W - margin, H - margin - 70);
  }
}

// Draw title screen with dramatic intro
function drawTitle(ctx, W, H, anim, txt, bestScore, hasSave) {
  // Dark backdrop
  ctx.fillStyle = COL.bgDeep; ctx.fillRect(0, 0, W, H);

  // Animated waves background
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    const baseY = H * 0.5 + i * 30;
    for (let x = 0; x <= W; x += 3) {
      ctx.lineTo(x, baseY + Math.sin(x * 0.01 + anim * (0.5 + i * 0.2)) * (10 + i * 5));
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = `rgba(13,40,71,${0.15 + i * 0.08})`;
    ctx.fill();
  }

  // Bioluminescent dots
  for (let i = 0; i < 30; i++) {
    const bx = (i * 97.3 + anim * 10) % W;
    const by = H * 0.45 + (i * 43.7) % (H * 0.5);
    const pulse = 0.3 + 0.7 * Math.abs(Math.sin(anim * 0.8 + i * 1.3));
    ctx.fillStyle = i % 3 === 0 ? COL.uiAqua : i % 3 === 1 ? COL.monsterPurple : COL.lightGold;
    ctx.globalAlpha = pulse * 0.5;
    ctx.beginPath(); ctx.arc(bx, by, 2 + pulse * 2, 0, Math.PI * 2); ctx.fill();
    // Glow ring
    ctx.globalAlpha = pulse * 0.15;
    ctx.beginPath(); ctx.arc(bx, by, 6 + pulse * 4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Lighthouse silhouette at center
  const lhX = W * 0.5, lhY = H * 0.48;
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.moveTo(lhX - 25, lhY + 50); ctx.lineTo(lhX - 15, lhY - 60); ctx.lineTo(lhX + 15, lhY - 60); ctx.lineTo(lhX + 25, lhY + 50); ctx.fill();
  // Light beam
  ctx.save(); ctx.translate(lhX, lhY - 60);
  const sweepAngle = Math.sin(anim * 0.5) * 0.8;
  ctx.rotate(sweepAngle);
  const bGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 200);
  bGrad.addColorStop(0, 'rgba(255,217,61,0.4)');
  bGrad.addColorStop(1, 'rgba(255,217,61,0)');
  ctx.fillStyle = bGrad;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, 200, -0.25, 0.25); ctx.closePath(); ctx.fill();
  ctx.restore();

  // Title text with glow — using FONT_TITLE
  const titleFadeIn = Math.min(1, anim * 0.5);
  ctx.globalAlpha = titleFadeIn;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `42px ${FONT_TITLE}`;
  // Glow
  ctx.shadowColor = COL.lightGold; ctx.shadowBlur = 20;
  ctx.fillStyle = COL.lightGold;
  ctx.fillText(txt.title, W * 0.5, H * 0.18);
  ctx.shadowBlur = 0;
  // Subtitle
  ctx.font = `16px ${FONT}`; ctx.fillStyle = COL.textSec;
  ctx.fillText(txt.subtitle, W * 0.5, H * 0.26);
  ctx.globalAlpha = 1;

  // Scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);

  // Start prompt (pulsing)
  const pulse = 0.5 + 0.5 * Math.sin(anim * 3);
  ctx.globalAlpha = pulse;
  ctx.font = `bold 18px ${FONT}`; ctx.fillStyle = COL.uiAqua;
  ctx.fillText(txt.tapStart, W * 0.5, H * 0.82);
  ctx.globalAlpha = 1;

  // Best score
  if (bestScore > 0) {
    ctx.font = `14px ${FONT}`; ctx.fillStyle = COL.textSec;
    ctx.fillText(`${txt.best}: ${bestScore}`, W * 0.5, H * 0.88);
  }

  // Language toggle hint
  ctx.font = `12px ${FONT}`; ctx.fillStyle = COL.textMuted;
  ctx.fillText(txt.lang, W - 40, H - 20);
}

// Draw difficulty selection
function drawDiffSelect(ctx, W, H, diffKey, txt) {
  ctx.fillStyle = 'rgba(10,10,15,0.85)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `28px ${FONT_TITLE}`; ctx.fillStyle = COL.textPri;
  ctx.fillText(txt.title, W*0.5, H*0.15);

  const diffs = ['easy','normal','hard'];
  const colors = [COL.uiAqua, COL.lightGold, COL.uiCoral];
  const btnW = 180, btnH = 50;
  diffs.forEach((d, i) => {
    const bx = W*0.5 - btnW/2, by = H*0.3 + i * 70;
    const isSelected = d === diffKey;
    ctx.fillStyle = isSelected ? colors[i] : 'rgba(30,30,48,0.8)';
    ctx.strokeStyle = colors[i]; ctx.lineWidth = 2;
    roundRect(ctx, bx, by, btnW, btnH, 8, true, true);
    ctx.fillStyle = isSelected ? '#000' : colors[i];
    ctx.font = `bold 20px ${FONT}`;
    ctx.fillText(txt.diff[d], W*0.5, by + btnH/2);
    // Store button bounds for click detection
    diffBtns[i] = { x:bx, y:by, w:btnW, h:btnH, key:d };
  });

  // Start button
  const sbY = H * 0.3 + 3 * 70 + 10;
  ctx.fillStyle = COL.hpGreen;
  roundRect(ctx, W*0.5 - btnW/2, sbY, btnW, btnH, 8, true, false);
  ctx.fillStyle = '#000'; ctx.font = `bold 20px ${FONT}`;
  ctx.fillText(txt.start, W*0.5, sbY + btnH/2);
  diffBtns[3] = { x:W*0.5-btnW/2, y:sbY, w:btnW, h:btnH, key:'start' };
}
let diffBtns = [{},{},{},{}];

// Draw gameover screen
function drawGameover(ctx, W, H, score, bestScore, tide, timer, txt) {
  const fadeIn = Math.min(1, timer * 2);
  ctx.fillStyle = `rgba(10,10,15,${fadeIn * 0.85})`; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = fadeIn;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `36px ${FONT_TITLE}`; ctx.fillStyle = COL.uiCoral;
  ctx.fillText(txt.gameover, W*0.5, H*0.3);
  ctx.font = `20px ${FONT}`; ctx.fillStyle = COL.textPri;
  ctx.fillText(`${txt.score}: ${score}`, W*0.5, H*0.45);
  ctx.fillText(`${txt.tide}: ${tide}`, W*0.5, H*0.52);
  ctx.fillStyle = COL.lightGold; ctx.font = `16px ${FONT}`;
  ctx.fillText(`${txt.best}: ${bestScore}`, W*0.5, H*0.60);
  // Blessing message (3h)
  if (lighthouseBlessing) {
    ctx.fillStyle = COL.uiAqua; ctx.font = `bold 14px ${FONT}`;
    ctx.fillText(txt.blessing || 'Lighthouse Blessing Active!', W*0.5, H*0.67);
  }
  // Restart prompt
  const pulse = 0.5 + 0.5 * Math.sin(timer * 4);
  ctx.globalAlpha = fadeIn * pulse;
  ctx.fillStyle = COL.uiAqua; ctx.font = `bold 16px ${FONT}`;
  ctx.fillText(txt.restart, W*0.5, H*0.78);
  ctx.globalAlpha = 1;
}

// Draw victory screen
function drawVictory(ctx, W, H, score, timer, txt) {
  const fadeIn = Math.min(1, timer);
  ctx.fillStyle = `rgba(10,10,15,${fadeIn * 0.8})`; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = fadeIn;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `36px ${FONT_TITLE}`; ctx.fillStyle = COL.lightGold;
  ctx.shadowColor = COL.lightGold; ctx.shadowBlur = 20;
  ctx.fillText(txt.victory, W*0.5, H*0.35);
  ctx.shadowBlur = 0;
  ctx.font = `20px ${FONT}`; ctx.fillStyle = COL.textPri;
  ctx.fillText(`${txt.score}: ${score}`, W*0.5, H*0.50);
  const pulse = 0.5 + 0.5 * Math.sin(timer * 3);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = COL.uiAqua; ctx.font = `bold 16px ${FONT}`;
  ctx.fillText(txt.restart, W*0.5, H*0.75);
  ctx.globalAlpha = 1;
}

// Draw upgrade menu
function drawUpgradeMenu(ctx, W, H, upgrades, coral, selected, scrollY, txt, upgradeNames) {
  ctx.fillStyle = 'rgba(10,10,15,0.9)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `24px ${FONT_TITLE}`; ctx.fillStyle = COL.lightGold;
  ctx.fillText(txt.upgrade, W*0.5, 35);
  ctx.font = `14px ${FONT}`; ctx.fillStyle = COL.uiAqua;
  ctx.fillText(`${txt.coral}: ${coral}`, W*0.5, 60);

  const keys = Object.keys(CFG.UPGRADE_COSTS);
  const itemH = 52, startY = 80, visH = H - 120;
  ctx.save(); ctx.beginPath(); ctx.rect(0, startY, W, visH); ctx.clip();

  keys.forEach((k, i) => {
    const costs = CFG.UPGRADE_COSTS[k];
    const lv = upgrades[k] || 0;
    const maxLv = costs.length;
    const iy = startY + i * itemH - scrollY;
    if (iy < startY - itemH || iy > startY + visH) return;

    const isSel = i === selected;
    ctx.fillStyle = isSel ? 'rgba(108,60,247,0.2)' : 'rgba(30,30,48,0.5)';
    ctx.fillRect(20, iy, W - 40, itemH - 4);
    if (isSel) { ctx.strokeStyle = COL.monsterPurple; ctx.lineWidth = 1; ctx.strokeRect(20, iy, W - 40, itemH - 4); }

    ctx.textAlign = 'left'; ctx.font = `bold 14px ${FONT}`;
    ctx.fillStyle = COL.textPri;
    ctx.fillText(upgradeNames[k] || k, 32, iy + 16);
    // Level dots
    for (let l = 0; l < maxLv; l++) {
      ctx.fillStyle = l < lv ? COL.lightGold : COL.textMuted;
      ctx.beginPath(); ctx.arc(32 + l * 14, iy + 36, 4, 0, Math.PI*2); ctx.fill();
    }
    // Cost
    ctx.textAlign = 'right'; ctx.font = `13px ${FONT}`;
    if (lv >= maxLv) { ctx.fillStyle = COL.hpGreen; ctx.fillText('MAX', W - 32, iy + 26); }
    else {
      const cost = costs[lv];
      ctx.fillStyle = coral >= cost ? COL.uiAqua : COL.uiCoral;
      ctx.fillText(`${cost} ${txt.coral}`, W - 32, iy + 26);
    }
  });
  ctx.restore();

  // Close hint
  ctx.textAlign = 'center'; ctx.font = `13px ${FONT}`; ctx.fillStyle = COL.textSec;
  ctx.fillText('ESC / Tap to close', W*0.5, H - 20);
  // Purchase button bounds stored per frame
  upgradeBtns = keys.map((k, i) => ({ x:20, y: startY + i * itemH - scrollY, w: W-40, h: itemH-4, key: k }));
}

// Draw boss victory cutscene with seal fragment animation (3l)
function drawBossVictory(ctx, W, H, timer, txt, bossData) {
  ctx.fillStyle = 'rgba(10,10,15,0.7)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Boss defeated text
  ctx.font = `28px ${FONT_TITLE}`; ctx.fillStyle = COL.lightGold;
  ctx.shadowColor = COL.lightGold; ctx.shadowBlur = 15;
  ctx.fillText('Boss Defeated!', W*0.5, H*0.3);
  ctx.shadowBlur = 0;

  // Seal fragment animation
  const sealProgress = Math.min(1, timer * 0.8);
  const sealY = H * 0.5 - sealProgress * 20;
  const sealScale = 0.5 + sealProgress * 0.5;
  const sealAlpha = sealProgress;

  ctx.globalAlpha = sealAlpha;
  ctx.save(); ctx.translate(W * 0.5, sealY); ctx.scale(sealScale, sealScale);
  // Draw seal fragment — glowing crystal shape
  const sealGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
  sealGrad.addColorStop(0, COL.lightGold);
  sealGrad.addColorStop(0.5, COL.uiAqua);
  sealGrad.addColorStop(1, 'rgba(56,217,169,0)');
  ctx.fillStyle = sealGrad;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? 25 : 15;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  // Inner crystal
  ctx.fillStyle = COL.lightGold;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? 12 : 8;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;

  // Seal fragment text
  if (sealProgress > 0.5) {
    ctx.globalAlpha = (sealProgress - 0.5) * 2;
    ctx.font = `16px ${FONT}`; ctx.fillStyle = COL.uiAqua;
    ctx.fillText(txt.bossVictoryMsg || 'Seal Fragment Acquired!', W*0.5, H*0.65);
    ctx.globalAlpha = 1;
  }

  // Continue prompt
  if (timer > 1.5) {
    const pulse = 0.5 + 0.5 * Math.sin(timer * 4);
    ctx.globalAlpha = pulse;
    ctx.font = `14px ${FONT}`; ctx.fillStyle = COL.textSec;
    ctx.fillText('SPACE / Tap → Next', W*0.5, H*0.8);
    ctx.globalAlpha = 1;
  }
}

// Draw projectiles
function drawProjectiles(ctx, projectiles) {
  projectiles.forEach(p => {
    if (p.type === 'harpoon') {
      ctx.strokeStyle = COL.uiCoral; ctx.lineWidth = 3;
      const angle = Math.atan2(p.vy, p.vx);
      ctx.beginPath(); ctx.moveTo(p.x - Math.cos(angle)*10, p.y - Math.sin(angle)*10);
      ctx.lineTo(p.x + Math.cos(angle)*10, p.y + Math.sin(angle)*10); ctx.stroke();
      ctx.fillStyle = COL.lightAmber; ctx.beginPath(); ctx.arc(p.x + Math.cos(angle)*10, p.y + Math.sin(angle)*10, 3, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'net') {
      ctx.strokeStyle = COL.uiAqua; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.range, 0, Math.PI*2); ctx.stroke();
      // Net pattern
      for (let a = 0; a < Math.PI*2; a += 0.5) {
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + Math.cos(a)*p.range, p.y + Math.sin(a)*p.range); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } else if (p.type === 'sonic') {
      ctx.strokeStyle = COL.monsterPurple; ctx.lineWidth = 3; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.range, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });
}

// Draw drift items
function drawDriftItems(ctx, items) {
  items.forEach(d => {
    if (d.collected) return;

      ctx.beginPath(); ctx.arc(d.x, d.y, 20 + pulse * 5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#d4a5ff';
      ctx.beginPath();
      ctx.moveTo(d.x - 8, d.y - 10); ctx.lineTo(d.x + 8, d.y - 10);
      ctx.lineTo(d.x + 8, d.y + 10); ctx.lineTo(d.x - 8, d.y + 10);

      ctx.fillRect(d.x - 10, d.y + 7, 20, 3);

// Draw virtual joystick and buttons (mobile touch)
function drawTouchControls(ctx, W, H, joyActive, joyX, joyY, joyAngle, joyDist) {
  if (!input.touch) return;

    const knobX = jbX + Math.cos(joyAngle) * Math.min(joyDist, CFG.JOYSTICK_R);
    const knobY = jbY + Math.sin(joyAngle) * Math.min(joyDist, CFG.JOYSTICK_R);
    ctx.beginPath(); ctx.arc(knobX, knobY, 20, 0, Math.PI*2); ctx.fill();
  }

  // Action buttons (right side)

  ctx.fillText('WPN', btnX - 65, H - 100);

  // Store touch button areas
  touchBtns.atk = { x: btnX, y: H - 100, r: btnR };
  touchBtns.sonar = { x: btnX, y: H - 170, r: btnR };
  touchBtns.wpn = { x: btnX - 65, y: H - 100, r: wpnR };

// Draw particles (general + hit effects)
function drawParticles(ctx, pool) {
  pool.active.forEach(p => {
    ctx.globalAlpha = p.alpha || 0.5;
    if (p.text && p.text !== 'sonar') {
      ctx.fillStyle = p.color; ctx.font = `bold 14px ${FONT}`; ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    } else if (p.text === 'sonar' || (p.color === COL.uiAqua && p.text === null)) {
      // Sonar ring
      ctx.strokeStyle = COL.uiAqua; ctx.lineWidth = 2;
      const r = (1 - p.alpha) * 200;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

// Draw hit effects with Canvas glow
function drawHitEffects(ctx, pool) {
  pool.active.forEach(p => {
    ctx.globalAlpha = p.alpha || 0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 8 * (1 - p.alpha * 0.5), 0, Math.PI * 2); ctx.fill();
    // Glow
    ctx.globalAlpha = (p.alpha || 0.5) * 0.3;
    ctx.beginPath(); ctx.arc(p.x, p.y, 16 * (1 - p.alpha * 0.5), 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Rounded rectangle helper
function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  if (fill) ctx.fill(); if (stroke) ctx.stroke();
}
