<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="dustGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0B0E17" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dustGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1A2E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0B0E17" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="closeStarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="starBloom">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="debrisBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>
  <!-- Cosmic dust streaks -->
  <path d="M0 200 Q200 180 400 220 Q600 260 800 200" fill="none" stroke="url(#dustGrad1)" stroke-width="40" opacity="0.3"/>
  <path d="M0 400 Q250 370 500 420 Q700 450 800 380" fill="none" stroke="url(#dustGrad2)" stroke-width="50" opacity="0.25"/>
  <path d="M100 0 Q150 150 120 300 Q90 450 150 600" fill="none" stroke="url(#dustGrad1)" stroke-width="30" opacity="0.2"/>
  <path d="M650 0 Q680 200 660 350 Q640 500 700 600" fill="none" stroke="url(#dustGrad2)" stroke-width="35" opacity="0.2"/>
  <!-- Closer brighter stars -->
  <g filter="url(#starBloom)">
    <circle cx="120" cy="90" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="350" cy="60" r="3.0" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="580" cy="150" r="2.2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="750" cy="100" r="2.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="50" cy="250" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="250" cy="300" r="2.0" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="480" cy="270" r="3.0" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="680" cy="320" r="2.3" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="150" cy="450" r="2.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="400" cy="500" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="600" cy="470" r="2.0" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="770" cy="520" r="3.0" fill="#FFFFFF" opacity="0.7"/>
  </g>
  <!-- Space debris silhouettes -->
  <g opacity="0.12" filter="url(#debrisBlur)">
    <path d="M680 160 C685 155 695 158 698 165 C700 172 694 178 688 176 C682 174 676 166 680 160 Z" fill="#2C3E50"/>
    <path d="M120 380 C125 374 138 376 140 384 C142 392 134 398 126 395 C118 392 115 386 120 380 Z" fill="#2C3E50"/>
    <path d="M450 520 C456 516 464 518 466 526 C468 534 460 538 454 535 C448 532 444 524 450 520 Z" fill="#2C3E50"/>
  </g>
  <!-- Colored accent stars -->
  <g filter="url(#starBloom)">
    <circle cx="200" cy="180" r="2" fill="#00E5FF" opacity="0.3"/>
    <circle cx="500" cy="350" r="1.8" fill="#9B59B6" opacity="0.25"/>
    <circle cx="700" cy="450" r="1.5" fill="#FFD93D" opacity="0.2"/>
    <circle cx="80" cy="520" r="2" fill="#5DADE2" opacity="0.25"/>
  </g>
  <!-- Speed lines suggesting movement -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.08">
    <line x1="100" y1="50" x2="100" y2="70"/>
    <line x1="300" y1="120" x2="300" y2="145"/>
    <line x1="550" y1="80" x2="550" y2="100"/>
    <line x1="720" y1="200" x2="720" y2="225"/>
    <line x1="200" y1="350" x2="200" y2="375"/>
    <line x1="450" y1="420" x2="450" y2="445"/>
    <line x1="650" y1="500" x2="650" y2="520"/>
  </g>
</svg>
