<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="heartGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#922B21"/>
    </radialGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heartOuterGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <g filter="url(#heartOuterGlow)">
    <path d="M16 28 C16 28 4 20 4 12 C4 7.5 7.5 4 11.5 4 C13.8 4 15.5 5.5 16 6.5 C16.5 5.5 18.2 4 20.5 4 C24.5 4 28 7.5 28 12 C28 20 16 28 16 28 Z" fill="#E74C3C" opacity="0.4"/>
  </g>
  <!-- 하트 본체 -->
  <path d="M16 26 C16 26 5 19 5 12.5 C5 8.5 8 5.5 11.5 5.5 C13.5 5.5 15.2 6.8 16 8 C16.8 6.8 18.5 5.5 20.5 5.5 C24 5.5 27 8.5 27 12.5 C27 19 16 26 16 26 Z" fill="url(#heartGrad)" filter="url(#heartGlow)"/>
  <!-- 하이라이트 -->
  <path d="M12 10 C10.5 10 9 11 9 13 C9 13.5 9.2 14 9.5 14.5" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="12" cy="11" rx="3" ry="2.5" fill="url(#heartShine)"/>
  <!-- 맥박 링 -->
  <path d="M16 26 C16 26 5 19 5 12.5 C5 8.5 8 5.5 11.5 5.5 C13.5 5.5 15.2 6.8 16 8 C16.8 6.8 18.5 5.5 20.5 5.5 C24 5.5 27 8.5 27 12.5 C27 19 16 26 16 26 Z" fill="none" stroke="#FF6B6B" stroke-width="0.6" opacity="0.5"/>
</svg>