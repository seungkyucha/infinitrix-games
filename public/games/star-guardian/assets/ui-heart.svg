<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#A93226"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4757" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF4757" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartNeon">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="16" cy="17" rx="14" ry="13" fill="url(#heartGlow)" opacity="0.4"/>
  <!-- Heart shape -->
  <g filter="url(#heartNeon)">
    <path d="M16 28 C14 26 4 20 4 13 C4 8 8 5 12 5 C14 5 15.5 6.5 16 7.5 C16.5 6.5 18 5 20 5 C24 5 28 8 28 13 C28 20 18 26 16 28 Z" fill="url(#heartGrad)" stroke="#FF6B6B" stroke-width="0.5"/>
  </g>
  <!-- Highlight shine -->
  <path d="M12 10 C10 10 8 12 8 14 C8 13 9 11 12 10 Z" fill="#FFFFFF" opacity="0.4"/>
  <ellipse cx="12" cy="12" rx="3" ry="2.5" fill="url(#heartShine)"/>
  <!-- Inner pulse core -->
  <path d="M16 24 C15 23 9 18 9 14 C9 11 11 9 13 9 C14.5 9 15.5 10 16 11 C16.5 10 17.5 9 19 9 C21 9 23 11 23 14 C23 18 17 23 16 24 Z" fill="#FF4757" opacity="0.3"/>
</svg>
