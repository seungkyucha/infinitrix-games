<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="puCoreGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#FFD93D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F39C12" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="puOuterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFD93D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="puRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFD93D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F39C12" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <filter id="puGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puInnerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow aura -->
  <circle cx="24" cy="24" r="22" fill="url(#puOuterGlow)" opacity="0.5"/>
  <!-- Rotating ring outer -->
  <g filter="url(#puGlow)">
    <circle cx="24" cy="24" r="18" fill="none" stroke="url(#puRingGrad)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
  </g>
  <!-- Rotating ring inner -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="#FFD93D" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.4"/>
  <!-- Core sphere -->
  <g filter="url(#puInnerGlow)">
    <circle cx="24" cy="24" r="10" fill="url(#puCoreGrad)" stroke="#FFE066" stroke-width="0.8"/>
  </g>
  <!-- Lightning bolt icon -->
  <g filter="url(#puInnerGlow)">
    <path d="M26 16 L21 23 L25 23 L22 32 L28 24 L24 24 Z" fill="url(#boltGrad)" stroke="#FFFFFF" stroke-width="0.3" opacity="0.9"/>
  </g>
  <!-- Sparkle accents -->
  <g fill="#FFFFFF" opacity="0.7">
    <path d="M10 10 L10.5 8 L11 10 L13 10.5 L11 11 L10.5 13 L10 11 L8 10.5 Z"/>
    <path d="M36 8 L36.5 6 L37 8 L39 8.5 L37 9 L36.5 11 L36 9 L34 8.5 Z"/>
    <path d="M38 36 L38.5 34 L39 36 L41 36.5 L39 37 L38.5 39 L38 37 L36 36.5 Z"/>
    <path d="M8 34 L8.5 32 L9 34 L11 34.5 L9 35 L8.5 37 L8 35 L6 34.5 Z"/>
  </g>
  <!-- Highlight -->
  <ellipse cx="20" cy="20" rx="4" ry="3" fill="#FFFFFF" opacity="0.2"/>
</svg>
