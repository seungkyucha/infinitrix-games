<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="enemyBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="50%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7B241C"/>
    </linearGradient>
    <linearGradient id="enemyWingGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#922B21"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <radialGradient id="enemyCoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4757" stop-opacity="1"/>
      <stop offset="50%" stop-color="#E74C3C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="enemyEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FF6B6B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreBlur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Threat aura -->
  <ellipse cx="32" cy="32" rx="28" ry="26" fill="url(#enemyCoreGlow)" opacity="0.15" filter="url(#coreBlur)"/>
  <!-- Left wing -->
  <g>
    <path d="M18 24 L4 16 L6 28 L14 32 L6 36 L4 48 L18 40 Z" fill="url(#enemyWingGrad)" stroke="#E74C3C" stroke-width="0.5"/>
    <path d="M6 20 L10 26 L8 24 Z" fill="#FF4757" opacity="0.5"/>
    <line x1="10" y1="22" x2="8" y2="36" stroke="#FF4757" stroke-width="0.4" opacity="0.4"/>
  </g>
  <!-- Right wing -->
  <g>
    <path d="M46 24 L60 16 L58 28 L50 32 L58 36 L60 48 L46 40 Z" fill="url(#enemyWingGrad)" stroke="#E74C3C" stroke-width="0.5"/>
    <path d="M58 20 L54 26 L56 24 Z" fill="#FF4757" opacity="0.5"/>
    <line x1="54" y1="22" x2="56" y2="36" stroke="#FF4757" stroke-width="0.4" opacity="0.4"/>
  </g>
  <!-- Main body -->
  <g filter="url(#redGlow)">
    <path d="M32 56 C28 56 16 38 16 28 C16 18 24 10 32 10 C40 10 48 18 48 28 C48 38 36 56 32 56 Z" fill="url(#enemyBodyGrad)" stroke="#FF4757" stroke-width="0.8"/>
  </g>
  <!-- Body armor lines -->
  <path d="M24 20 L24 40" stroke="#FF6B6B" stroke-width="0.5" opacity="0.3"/>
  <path d="M40 20 L40 40" stroke="#FF6B6B" stroke-width="0.5" opacity="0.3"/>
  <path d="M20 30 L44 30" stroke="#FF6B6B" stroke-width="0.4" opacity="0.2"/>
  <!-- Central eye/core -->
  <g filter="url(#redGlow)">
    <ellipse cx="32" cy="28" rx="7" ry="6" fill="#2C3E50"/>
    <ellipse cx="32" cy="28" rx="5" ry="4" fill="url(#enemyEyeGlow)"/>
    <ellipse cx="32" cy="27" rx="2.5" ry="2" fill="#FFFFFF" opacity="0.7"/>
  </g>
  <!-- Lower cannon port -->
  <g>
    <rect x="29" y="44" width="6" height="8" rx="1" fill="#7B241C" stroke="#E74C3C" stroke-width="0.5"/>
    <circle cx="32" cy="50" r="2" fill="#FF4757" filter="url(#redGlow)" opacity="0.8"/>
  </g>
  <!-- Side weapon pods -->
  <circle cx="16" cy="32" r="3" fill="#922B21" stroke="#E74C3C" stroke-width="0.5"/>
  <circle cx="16" cy="32" r="1.5" fill="#FF4757" opacity="0.6"/>
  <circle cx="48" cy="32" r="3" fill="#922B21" stroke="#E74C3C" stroke-width="0.5"/>
  <circle cx="48" cy="32" r="1.5" fill="#FF4757" opacity="0.6"/>
  <!-- Wing tip danger lights -->
  <circle cx="4" cy="16" r="1.5" fill="#FF4757" filter="url(#redGlow)" opacity="0.9"/>
  <circle cx="60" cy="16" r="1.5" fill="#FF4757" filter="url(#redGlow)" opacity="0.9"/>
  <circle cx="4" cy="48" r="1.5" fill="#FF4757" filter="url(#redGlow)" opacity="0.9"/>
  <circle cx="60" cy="48" r="1.5" fill="#FF4757" filter="url(#redGlow)" opacity="0.9"/>
</svg>
