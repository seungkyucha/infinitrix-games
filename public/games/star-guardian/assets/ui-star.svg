<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <radialGradient id="starShine" cx="40%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starOuterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <filter id="starNeon">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="url(#starOuterGlow)" opacity="0.4"/>
  <!-- Star shape -->
  <g filter="url(#starNeon)">
    <path d="M16 3 L19.5 11.5 L28.5 12.5 L21.8 18.5 L23.8 27.5 L16 23 L8.2 27.5 L10.2 18.5 L3.5 12.5 L12.5 11.5 Z" fill="url(#starGrad)" stroke="#FFE066" stroke-width="0.5"/>
  </g>
  <!-- Inner highlight -->
  <path d="M16 7 L18 12.5 L16 11.5 L14 12.5 Z" fill="#FFFFFF" opacity="0.3"/>
  <!-- Shine spot -->
  <ellipse cx="13" cy="13" rx="3" ry="2.5" fill="url(#starShine)"/>
  <!-- Inner star detail -->
  <path d="M16 10 L17.5 14 L21.5 14.5 L18.5 17 L19.2 21 L16 19 L12.8 21 L13.5 17 L10.5 14.5 L14.5 14 Z" fill="#F39C12" opacity="0.3"/>
</svg>
