<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <radialGradient id="starCenter" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <filter id="starNeonGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starOuterGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <g filter="url(#starOuterGlow)">
    <polygon points="16,2 19.5,11.5 29.5,11.5 21.5,18 24.5,28 16,22 7.5,28 10.5,18 2.5,11.5 12.5,11.5" fill="#FFD93D" opacity="0.35"/>
  </g>
  <!-- 별 본체 -->
  <polygon points="16,3 19,11.5 28,11.5 21,17.5 23.5,27 16,21.5 8.5,27 11,17.5 4,11.5 13,11.5" fill="url(#starGrad)" filter="url(#starNeonGlow)"/>
  <!-- 내부 빛 -->
  <polygon points="16,7 18,13 23,13 19,16.5 20.5,23 16,19.5 11.5,23 13,16.5 9,13 14,13" fill="url(#starCenter)"/>
  <!-- 하이라이트 스파크 -->
  <line x1="16" y1="1" x2="16" y2="5" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="28" y1="11" x2="25" y2="12" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="4" y1="11" x2="7" y2="12" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <!-- 중앙 광점 -->
  <circle cx="16" cy="14" r="1.5" fill="#FFFFFF" opacity="0.5"/>
</svg>