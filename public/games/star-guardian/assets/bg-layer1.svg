<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bgCenter" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0F1528"/>
      <stop offset="50%" stop-color="#0B0E17"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0A2E" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#0D0620" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0B0E17" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1A2E" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#061420" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0B0E17" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebulaBlur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <!-- Deep space background -->
  <rect width="800" height="600" fill="url(#bgCenter)"/>
  <!-- Nebula clouds -->
  <ellipse cx="200" cy="150" rx="180" ry="120" fill="url(#nebula1)" filter="url(#nebulaBlur)"/>
  <ellipse cx="650" cy="400" rx="200" ry="140" fill="url(#nebula2)" filter="url(#nebulaBlur)"/>
  <ellipse cx="400" cy="500" rx="250" ry="100" fill="url(#nebula1)" filter="url(#nebulaBlur)" opacity="0.5"/>
  <!-- Distant stars - tiny dim -->
  <g fill="#FFFFFF" opacity="0.2">
    <circle cx="45" cy="23" r="0.5"/><circle cx="120" cy="67" r="0.6"/><circle cx="198" cy="12" r="0.4"/>
    <circle cx="267" cy="89" r="0.5"/><circle cx="345" cy="34" r="0.7"/><circle cx="412" cy="78" r="0.4"/>
    <circle cx="489" cy="45" r="0.6"/><circle cx="556" cy="112" r="0.5"/><circle cx="623" cy="23" r="0.4"/>
    <circle cx="701" cy="56" r="0.5"/><circle cx="78" cy="145" r="0.6"/><circle cx="167" cy="189" r="0.4"/>
    <circle cx="234" cy="223" r="0.5"/><circle cx="312" cy="167" r="0.7"/><circle cx="389" cy="201" r="0.4"/>
    <circle cx="467" cy="178" r="0.6"/><circle cx="534" cy="234" r="0.5"/><circle cx="612" cy="156" r="0.4"/>
    <circle cx="689" cy="212" r="0.5"/><circle cx="756" cy="189" r="0.6"/><circle cx="34" cy="278" r="0.4"/>
    <circle cx="112" cy="312" r="0.5"/><circle cx="189" cy="345" r="0.6"/><circle cx="267" cy="289" r="0.4"/>
    <circle cx="345" cy="367" r="0.5"/><circle cx="423" cy="312" r="0.7"/><circle cx="501" cy="345" r="0.4"/>
    <circle cx="578" cy="378" r="0.6"/><circle cx="656" cy="312" r="0.5"/><circle cx="734" cy="356" r="0.4"/>
    <circle cx="56" cy="423" r="0.5"/><circle cx="134" cy="467" r="0.6"/><circle cx="212" cy="412" r="0.4"/>
    <circle cx="289" cy="489" r="0.5"/><circle cx="367" cy="445" r="0.7"/><circle cx="445" cy="478" r="0.4"/>
    <circle cx="523" cy="423" r="0.6"/><circle cx="601" cy="501" r="0.5"/><circle cx="678" cy="445" r="0.4"/>
    <circle cx="756" cy="512" r="0.5"/><circle cx="89" cy="534" r="0.6"/><circle cx="167" cy="578" r="0.4"/>
    <circle cx="245" cy="556" r="0.5"/><circle cx="334" cy="589" r="0.7"/>
  </g>
  <!-- Medium brightness stars -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="78" cy="45" r="0.8"/><circle cx="234" cy="112" r="1.0"/><circle cx="423" cy="56" r="0.8"/>
    <circle cx="567" cy="134" r="0.9"/><circle cx="712" cy="89" r="0.8"/><circle cx="156" cy="234" r="1.0"/>
    <circle cx="345" cy="278" r="0.8"/><circle cx="512" cy="201" r="0.9"/><circle cx="678" cy="267" r="0.8"/>
    <circle cx="89" cy="389" r="1.0"/><circle cx="267" cy="423" r="0.8"/><circle cx="478" cy="367" r="0.9"/>
    <circle cx="623" cy="445" r="0.8"/><circle cx="745" cy="389" r="1.0"/><circle cx="178" cy="512" r="0.8"/>
    <circle cx="389" cy="534" r="0.9"/><circle cx="567" cy="489" r="0.8"/><circle cx="712" cy="556" r="1.0"/>
    <circle cx="56" cy="567" r="0.8"/><circle cx="312" cy="578" r="0.9"/>
  </g>
  <!-- Bright stars with glow -->
  <g filter="url(#softGlow)">
    <circle cx="150" cy="80" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="400" cy="120" r="1.8" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="650" cy="200" r="1.3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="100" cy="350" r="1.6" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="500" cy="400" r="1.4" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="300" cy="500" r="1.7" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="700" cy="480" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="200" cy="550" r="1.3" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <!-- Colored accent stars -->
  <circle cx="300" cy="100" r="1.2" fill="#00E5FF" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="1.5" fill="#9B59B6" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="100" cy="500" r="1.0" fill="#FFD93D" opacity="0.1" filter="url(#softGlow)"/>
</svg>
