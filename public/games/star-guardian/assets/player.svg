<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#0097A7"/>
      <stop offset="100%" stop-color="#004D5A"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <radialGradient id="engineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFD93D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cockpitGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00E5FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="engineBlur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Engine glow outer -->
  <g filter="url(#engineBlur)">
    <ellipse cx="32" cy="54" rx="10" ry="8" fill="url(#engineGlow)" opacity="0.7"/>
    <ellipse cx="26" cy="52" rx="5" ry="6" fill="url(#engineGlow)" opacity="0.5"/>
    <ellipse cx="38" cy="52" rx="5" ry="6" fill="url(#engineGlow)" opacity="0.5"/>
  </g>
  <!-- Engine flame trails -->
  <g opacity="0.8">
    <path d="M29 48 L32 62 L35 48 Z" fill="#FFD93D" opacity="0.6"/>
    <path d="M30 48 L32 58 L34 48 Z" fill="#FFFFFF" opacity="0.4"/>
    <path d="M23 46 L25 56 L27 46 Z" fill="#FF6B35" opacity="0.5"/>
    <path d="M37 46 L39 56 L41 46 Z" fill="#FF6B35" opacity="0.5"/>
  </g>
  <!-- Left wing -->
  <g>
    <path d="M20 38 L6 50 L10 48 L18 42 Z" fill="url(#wingGrad)" stroke="#00BCD4" stroke-width="0.5"/>
    <path d="M8 49 L12 47 L10 48 Z" fill="#00E5FF" opacity="0.4"/>
    <line x1="14" y1="44" x2="10" y2="48" stroke="#00E5FF" stroke-width="0.4" opacity="0.5"/>
  </g>
  <!-- Right wing -->
  <g>
    <path d="M44 38 L58 50 L54 48 L46 42 Z" fill="url(#wingGrad)" stroke="#00BCD4" stroke-width="0.5"/>
    <path d="M56 49 L52 47 L54 48 Z" fill="#00E5FF" opacity="0.4"/>
    <line x1="50" y1="44" x2="54" y2="48" stroke="#00E5FF" stroke-width="0.4" opacity="0.5"/>
  </g>
  <!-- Main body -->
  <g filter="url(#neonGlow)">
    <path d="M32 6 C30 6 22 30 20 40 L32 36 L44 40 C42 30 34 6 32 6 Z" fill="url(#bodyGrad)" stroke="#00E5FF" stroke-width="0.8"/>
  </g>
  <!-- Body center detail line -->
  <line x1="32" y1="10" x2="32" y2="36" stroke="#00E5FF" stroke-width="0.6" opacity="0.3"/>
  <!-- Side accents -->
  <path d="M26 28 L24 36 L28 34 Z" fill="#00838F" opacity="0.6"/>
  <path d="M38 28 L40 36 L36 34 Z" fill="#00838F" opacity="0.6"/>
  <!-- Cockpit -->
  <g filter="url(#neonGlow)">
    <ellipse cx="32" cy="20" rx="5" ry="8" fill="url(#cockpitGlow)"/>
    <ellipse cx="32" cy="18" rx="3" ry="4" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- Nose tip glow -->
  <circle cx="32" cy="8" r="2" fill="url(#coreGlow)" filter="url(#neonGlow)"/>
  <!-- Engine cores -->
  <g filter="url(#neonGlow)">
    <ellipse cx="26" cy="42" rx="3" ry="2" fill="#FF6B35"/>
    <ellipse cx="32" cy="44" rx="4" ry="2.5" fill="#FFD93D"/>
    <ellipse cx="38" cy="42" rx="3" ry="2" fill="#FF6B35"/>
  </g>
  <!-- Wing tip lights -->
  <circle cx="7" cy="50" r="1.5" fill="#00E5FF" filter="url(#neonGlow)" opacity="0.8"/>
  <circle cx="57" cy="50" r="1.5" fill="#00E5FF" filter="url(#neonGlow)" opacity="0.8"/>
</svg>
