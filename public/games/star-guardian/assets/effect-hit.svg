<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="15%" stop-color="#FFD93D" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FF6B35" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#E74C3C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#FFD93D" stop-opacity="0"/>
      <stop offset="85%" stop-color="#FFD93D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hitOuterGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <!-- 최외곽 충격파 -->
  <circle cx="48" cy="48" r="44" fill="url(#shockwave)" filter="url(#hitOuterGlow)"/>
  <!-- 외부 글로우 -->
  <circle cx="48" cy="48" r="35" fill="url(#hitOuter)" filter="url(#hitOuterGlow)"/>
  <!-- 방사형 광선 -->
  <g opacity="0.5" stroke-linecap="round" filter="url(#sparkBlur)">
    <line x1="48" y1="48" x2="48" y2="8" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="20" y2="20" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="20" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="20" y2="76" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="76" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="15" y2="35" stroke="#FF6B35" stroke-width="1" opacity="0.35"/>
    <line x1="48" y1="48" x2="81" y2="35" stroke="#FF6B35" stroke-width="1" opacity="0.35"/>
    <line x1="48" y1="48" x2="15" y2="61" stroke="#FF6B35" stroke-width="1" opacity="0.35"/>
    <line x1="48" y1="48" x2="81" y2="61" stroke="#FF6B35" stroke-width="1" opacity="0.35"/>
  </g>
  <!-- 내부 폭발 코어 -->
  <circle cx="48" cy="48" r="18" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 초밝은 중심 -->
  <circle cx="48" cy="48" r="6" fill="#FFFFFF" opacity="0.9" filter="url(#hitGlow)"/>
  <!-- 파티클 파편 -->
  <g filter="url(#sparkBlur)">
    <circle cx="30" cy="25" r="2.5" fill="#FF6B35" opacity="0.7"/>
    <circle cx="68" cy="22" r="2" fill="#FFD93D" opacity="0.6"/>
    <circle cx="72" cy="65" r="2.5" fill="#FF6B35" opacity="0.7"/>
    <circle cx="25" cy="70" r="2" fill="#FFD93D" opacity="0.6"/>
    <circle cx="55" cy="15" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="80" cy="45" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="18" cy="50" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="60" cy="80" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="35" cy="82" r="1.8" fill="#E74C3C" opacity="0.5"/>
    <circle cx="42" cy="18" r="1.8" fill="#E74C3C" opacity="0.5"/>
  </g>
</svg>