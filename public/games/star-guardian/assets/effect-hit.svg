<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFD93D" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#E74C3C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitShockwave" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="80%" stop-color="#FF6B35" stop-opacity="0.4"/>
      <stop offset="90%" stop-color="#FFD93D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSoftGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shockwave ring outer -->
  <circle cx="48" cy="48" r="44" fill="url(#hitShockwave)" opacity="0.5"/>
  <!-- Shockwave ring inner -->
  <circle cx="48" cy="48" r="32" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.3" filter="url(#hitSoftGlow)"/>
  <!-- Main explosion glow -->
  <g filter="url(#hitGlow)">
    <circle cx="48" cy="48" r="20" fill="url(#hitCenter)"/>
  </g>
  <!-- Radial spark rays -->
  <g filter="url(#hitSoftGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="8" stroke="url(#sparkGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="20" stroke="url(#sparkGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="url(#sparkGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="76" stroke="url(#sparkGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="url(#sparkGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="76" stroke="url(#sparkGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="url(#sparkGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="20" stroke="url(#sparkGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Secondary rays -->
  <g opacity="0.4" stroke="#FFD93D" stroke-width="1" stroke-linecap="round">
    <line x1="48" y1="48" x2="62" y2="14"/>
    <line x1="48" y1="48" x2="84" y2="34"/>
    <line x1="48" y1="48" x2="82" y2="62"/>
    <line x1="48" y1="48" x2="62" y2="82"/>
    <line x1="48" y1="48" x2="34" y2="84"/>
    <line x1="48" y1="48" x2="14" y2="62"/>
    <line x1="48" y1="48" x2="14" y2="34"/>
    <line x1="48" y1="48" x2="34" y2="14"/>
  </g>
  <!-- Debris particles -->
  <g fill="#FF6B35" filter="url(#hitSoftGlow)">
    <circle cx="30" cy="18" r="2.5" opacity="0.8"/>
    <circle cx="70" cy="22" r="2" opacity="0.7"/>
    <circle cx="80" cy="55" r="2.5" opacity="0.8"/>
    <circle cx="68" cy="78" r="2" opacity="0.7"/>
    <circle cx="35" cy="80" r="2.5" opacity="0.8"/>
    <circle cx="15" cy="60" r="2" opacity="0.7"/>
    <circle cx="18" cy="35" r="2.5" opacity="0.8"/>
    <circle cx="55" cy="12" r="2" opacity="0.7"/>
  </g>
  <g fill="#FFD93D">
    <circle cx="38" cy="14" r="1.5" opacity="0.6"/>
    <circle cx="78" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="58" cy="82" r="1.5" opacity="0.6"/>
    <circle cx="16" cy="50" r="1.5" opacity="0.6"/>
  </g>
  <!-- Core white flash -->
  <circle cx="48" cy="48" r="6" fill="#FFFFFF" opacity="0.8" filter="url(#hitGlow)"/>
</svg>
