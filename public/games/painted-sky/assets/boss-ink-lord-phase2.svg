<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="333" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="inkChaos" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="5" seed="666" result="chaos"/>
      <feDisplacementMap in="SourceGraphic" in2="chaos" scale="28" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="magentaGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#e040fb" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ff0044" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="megaBrushGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#e040fb" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ink-stained background -->
    <radialGradient id="stainedBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0025"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <radialGradient id="eyeMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#e040fb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#ff0044"/>
      <stop offset="100%" stop-color="#ff0044" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="megaBrush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#1a0025"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
  </defs>

  <!-- Ink-stained background -->
  <rect width="512" height="512" fill="url(#stainedBg)"/>

  <!-- Background ink stains -->
  <g filter="url(#inkChaos)" opacity="0.4">
    <circle cx="80" cy="80" r="60" fill="#0a0014"/>
    <circle cx="440" cy="50" r="50" fill="#1a0025"/>
    <circle cx="50" cy="400" r="70" fill="#0a0014"/>
    <circle cx="470" cy="420" r="55" fill="#1a0025"/>
    <circle cx="256" cy="490" r="80" fill="#0a0014"/>
    <ellipse cx="400" cy="250" rx="60" ry="40" fill="#1a0025"/>
    <ellipse cx="100" cy="230" rx="50" ry="35" fill="#0a0014"/>
    <!-- Splatter streaks -->
    <path d="M0 200 Q100 180 200 200 Q300 220 400 190 Q450 180 512 200" stroke="#1a0025" stroke-width="15" fill="none"/>
    <path d="M0 350 Q80 330 180 360 Q280 390 380 350 Q440 330 512 360" stroke="#0a0014" stroke-width="12" fill="none"/>
  </g>

  <!-- Massive body with armor stripped - raw form -->
  <g filter="url(#painterly)">
    <!-- Larger exposed torso -->
    <path d="M140 140 Q170 120 256 115 Q340 120 370 140 Q400 180 395 300 Q380 400 330 440 Q280 465 230 460 Q180 445 150 410 Q130 370 135 300 Q138 180 140 140"
          fill="url(#bodyGrad)"/>
    <!-- Head -->
    <ellipse cx="256" cy="85" rx="55" ry="50" fill="#0a0014"/>
    <!-- Exposed raw texture lines -->
    <path d="M180 200 Q220 190 256 192 Q290 190 330 200" stroke="#1a0025" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M170 250 Q220 238 256 240 Q290 238 340 250" stroke="#1a0025" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M165 300 Q220 288 256 290 Q290 288 345 300" stroke="#1a0025" stroke-width="2" fill="none" opacity="0.3"/>
  </g>

  <!-- Mega-brush (merged from two) - held with both hands overhead -->
  <g filter="url(#megaBrushGlow)">
    <!-- Both arms raised holding mega-brush -->
    <path d="M170 160 Q150 130 145 100 Q142 80 150 60" stroke="#0a0014" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M340 160 Q360 130 365 100 Q368 80 360 60" stroke="#0a0014" stroke-width="20" fill="none" stroke-linecap="round"/>
    <!-- Mega brush handle -->
    <line x1="150" y1="60" x2="360" y2="60" stroke="url(#megaBrush)" stroke-width="18" stroke-linecap="round"/>
    <line x1="256" y1="60" x2="256" y2="10" stroke="url(#megaBrush)" stroke-width="22" stroke-linecap="round"/>
    <!-- Massive brush tip -->
    <ellipse cx="256" cy="5" rx="40" ry="20" fill="#e040fb" opacity="0.4"/>
    <ellipse cx="256" cy="2" rx="35" ry="15" fill="#ff0044" opacity="0.3"/>
    <!-- Energy radiating from brush -->
    <path d="M220 5 Q200 -20 180 -10" stroke="#e040fb" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M290 5 Q310 -20 330 -10" stroke="#ff0044" stroke-width="3" fill="none" opacity="0.5"/>
  </g>

  <!-- MANY eyes revealed on body -->
  <g filter="url(#magentaGlow)">
    <!-- Main eyes on head -->
    <ellipse cx="236" cy="82" rx="11" ry="7" fill="url(#eyeMagenta)"/>
    <ellipse cx="276" cy="82" rx="11" ry="7" fill="url(#eyeMagenta)"/>
    <ellipse cx="236" cy="82" rx="5" ry="3" fill="#ffffff"/>
    <ellipse cx="276" cy="82" rx="5" ry="3" fill="#ffffff"/>
    <!-- Forehead eye -->
    <ellipse cx="256" cy="65" rx="8" ry="6" fill="url(#eyeRed)"/>
    <ellipse cx="256" cy="65" rx="3" ry="2.5" fill="#ffffff"/>
  </g>
  <g filter="url(#redGlow)">
    <!-- Body eyes -->
    <ellipse cx="220" cy="190" rx="8" ry="5" fill="url(#eyeRed)"/>
    <ellipse cx="290" cy="195" rx="7" ry="5" fill="url(#eyeRed)"/>
    <ellipse cx="256" cy="230" rx="9" ry="6" fill="url(#eyeMagenta)"/>
    <ellipse cx="205" cy="260" rx="6" ry="4" fill="url(#eyeRed)"/>
    <ellipse cx="310" cy="265" rx="7" ry="4.5" fill="url(#eyeRed)"/>
    <ellipse cx="240" cy="310" rx="6" ry="4" fill="url(#eyeMagenta)"/>
    <ellipse cx="275" cy="305" rx="5" ry="3.5" fill="url(#eyeRed)"/>
    <ellipse cx="230" cy="360" rx="5" ry="3" fill="url(#eyeRed)"/>
    <ellipse cx="285" cy="355" rx="5.5" ry="3.5" fill="url(#eyeMagenta)"/>
    <!-- Pupils for body eyes -->
    <ellipse cx="220" cy="190" rx="3" ry="2" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="290" cy="195" rx="3" ry="2" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="256" cy="230" rx="4" ry="2.5" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="205" cy="260" rx="2.5" ry="1.5" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="310" cy="265" rx="2.5" ry="1.5" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Ink tentacles everywhere -->
  <g filter="url(#painterly)">
    <!-- Left tentacles -->
    <path d="M140 250 Q80 230 40 180 Q20 150 0 120" stroke="#0a0014" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M145 320 Q70 330 20 380 Q0 410 -10 450" stroke="#0a0014" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M155 400 Q100 430 60 480 Q40 500 20 512" stroke="#0a0014" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right tentacles -->
    <path d="M370 250 Q430 230 470 180 Q490 150 512 120" stroke="#0a0014" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M365 320 Q440 330 490 380 Q510 410 520 450" stroke="#0a0014" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M355 400 Q410 430 450 480 Q470 500 490 512" stroke="#0a0014" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Bottom tentacles -->
    <path d="M220 455 Q200 490 180 512" stroke="#0a0014" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M290 455 Q310 490 330 512" stroke="#0a0014" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M256 465 Q256 490 256 512" stroke="#0a0014" stroke-width="18" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tentacle energy lines -->
  <g filter="url(#magentaGlow)" opacity="0.5">
    <path d="M80 200 L70 190 L80 178 L68 168" stroke="#e040fb" stroke-width="2" fill="none"/>
    <path d="M430 200 L440 190 L430 178 L442 168" stroke="#e040fb" stroke-width="2" fill="none"/>
    <path d="M40 400 L30 390 L42 378" stroke="#ff0044" stroke-width="2" fill="none"/>
    <path d="M480 400 L490 390 L478 378" stroke="#ff0044" stroke-width="2" fill="none"/>
  </g>

  <!-- Ink storm particles -->
  <g filter="url(#inkChaos)" opacity="0.35">
    <circle cx="130" cy="60" r="20" fill="#1a0025"/>
    <circle cx="390" cy="40" r="18" fill="#0a0014"/>
    <circle cx="60" cy="300" r="15" fill="#1a0025"/>
    <circle cx="460" cy="280" r="16" fill="#0a0014"/>
  </g>

  <!-- Chaotic energy particles -->
  <g filter="url(#magentaGlow)" opacity="0.7">
    <circle cx="100" cy="100" r="3" fill="#e040fb"/>
    <circle cx="420" cy="80" r="2.5" fill="#ff0044"/>
    <circle cx="80" cy="250" r="2" fill="#e040fb"/>
    <circle cx="440" cy="240" r="3" fill="#ff0044"/>
    <circle cx="50" cy="450" r="2.5" fill="#e040fb"/>
    <circle cx="470" cy="460" r="2" fill="#ff0044"/>
    <circle cx="150" cy="490" r="2" fill="#e040fb"/>
    <circle cx="370" cy="495" r="2.5" fill="#ff0044"/>
    <circle cx="256" cy="500" r="3" fill="#e040fb"/>
  </g>
</svg>