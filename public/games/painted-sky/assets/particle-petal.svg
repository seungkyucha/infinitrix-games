<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="petalBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="15" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" result="warped"/>
      <feGaussianBlur in="warped" stdDeviation="0.8"/>
    </filter>
    <filter id="outerBleed">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="highlightSoft">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <linearGradient id="petalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3c6" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff6b8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffb3c6" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Outer watercolor bleed -->
  <g filter="url(#outerBleed)" opacity="0.25">
    <ellipse cx="32" cy="30" rx="20" ry="12" fill="#ffb3c6" transform="rotate(-18,32,30)"/>
  </g>
  <!-- Main petal body -->
  <g filter="url(#petalBlur)" transform="translate(32,32) rotate(-15)">
    <path d="M-18,0 Q-12,-10 -2,-8 Q8,-6 14,-2 Q18,2 14,4 Q8,8 -2,8 Q-12,10 -18,0Z" fill="url(#petalGrad)" opacity="0.65"/>
  </g>
  <!-- Slightly darker inner vein -->
  <g transform="translate(32,32) rotate(-15)" opacity="0.3">
    <path d="M-12,0 Q-4,3 8,1" fill="none" stroke="#ff6b8a" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <!-- Highlight brushstroke -->
  <g filter="url(#highlightSoft)" transform="translate(32,32) rotate(-15)" opacity="0.4">
    <path d="M-14,-1 Q-6,-5 4,-4 Q10,-2 12,-1" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Faint edge texture -->
  <g transform="translate(32,32) rotate(-15)" opacity="0.15">
    <path d="M-16,2 Q-10,6 0,6 Q10,5 14,2" fill="none" stroke="#ff6b8a" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>