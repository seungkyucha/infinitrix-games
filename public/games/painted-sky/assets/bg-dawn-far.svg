<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="45%" stop-color="#c4e0f0"/>
      <stop offset="70%" stop-color="#ffcdd9"/>
      <stop offset="100%" stop-color="#ffb3c6"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="brushTex" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.008" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="cloudSoft">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="sunbeamBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="skyTex">
      <feTurbulence type="fractalNoise" baseFrequency="0.003 0.002" numOctaves="3" seed="7" result="t"/>
      <feColorMatrix in="t" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="soft-light"/>
    </filter>
  </defs>
  <!-- Base sky gradient -->
  <rect width="960" height="540" fill="url(#sky)" filter="url(#skyTex)"/>
  <!-- Sun glow -->
  <rect width="960" height="540" fill="url(#sun)"/>
  <!-- Distant watercolor clouds -->
  <g filter="url(#brushTex)" opacity="0.35">
    <ellipse cx="150" cy="120" rx="180" ry="45" fill="#ffffff" filter="url(#cloudSoft)"/>
    <ellipse cx="200" cy="110" rx="120" ry="35" fill="#ffcdd9" filter="url(#cloudSoft)"/>
    <ellipse cx="600" cy="90" rx="200" ry="50" fill="#ffffff" filter="url(#cloudSoft)"/>
    <ellipse cx="650" cy="80" rx="140" ry="40" fill="#e8d5f0" filter="url(#cloudSoft)"/>
    <ellipse cx="850" cy="150" rx="160" ry="40" fill="#ffffff" filter="url(#cloudSoft)"/>
    <ellipse cx="400" cy="180" rx="130" ry="30" fill="#ffcdd9" filter="url(#cloudSoft)"/>
  </g>
  <!-- Wispy high clouds -->
  <g opacity="0.2" filter="url(#cloudSoft)">
    <path d="M0 70 Q120 40 240 65 Q360 45 480 70 Q600 50 720 68 Q840 42 960 60" stroke="#ffffff" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M0 130 Q200 100 400 125 Q600 95 800 120 Q900 105 960 115" stroke="#ffcdd9" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Golden sunbeams -->
  <g opacity="0.12" filter="url(#sunbeamBlur)">
    <polygon points="480,540 420,0 440,0" fill="#ffd700"/>
    <polygon points="480,540 520,0 550,0" fill="#ffd700"/>
    <polygon points="480,540 300,0 340,0" fill="#ffd700"/>
    <polygon points="480,540 620,0 670,0" fill="#ffd700"/>
    <polygon points="480,540 160,0 210,0" fill="#ffd700"/>
    <polygon points="480,540 740,0 800,0" fill="#ffd700"/>
  </g>
  <!-- Brushstroke texture overlay -->
  <g opacity="0.08">
    <path d="M0 200 Q80 185 160 195 Q320 175 480 200 Q640 180 800 198 Q880 188 960 195" stroke="#ffb3c6" stroke-width="25" fill="none" stroke-linecap="round" filter="url(#brushTex)"/>
    <path d="M0 300 Q160 280 320 295 Q480 270 640 290 Q800 275 960 285" stroke="#87ceeb" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#brushTex)"/>
  </g>
</svg>