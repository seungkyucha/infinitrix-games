<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128">
  <defs>
    <filter id="painterly">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="hitGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 1: Initial light burst -->
  <g transform="translate(0,0)">
    <circle cx="64" cy="64" r="20" fill="url(#hitGrad)" filter="url(#glow)"/>
    <g stroke="#ffd700" stroke-width="2" stroke-linecap="round" opacity="0.9">
      <line x1="64" y1="38" x2="64" y2="28"/>
      <line x1="64" y1="90" x2="64" y2="100"/>
      <line x1="38" y1="64" x2="28" y2="64"/>
      <line x1="90" y1="64" x2="100" y2="64"/>
      <line x1="46" y1="46" x2="38" y2="38"/>
      <line x1="82" y1="82" x2="90" y2="90"/>
      <line x1="82" y1="46" x2="90" y2="38"/>
      <line x1="46" y1="82" x2="38" y2="90"/>
    </g>
  </g>

  <!-- Frame 2: Shattering outward -->
  <g transform="translate(128,0)">
    <circle cx="64" cy="64" r="16" fill="url(#hitGrad)" filter="url(#glow)" opacity="0.7"/>
    <g fill="#ffd700" filter="url(#painterly)">
      <polygon points="64,30 60,40 68,42" opacity="0.9"/>
      <polygon points="90,50 82,56 86,62" opacity="0.85"/>
      <polygon points="96,74 86,70 88,78" opacity="0.8"/>
      <polygon points="70,94 66,84 74,86" opacity="0.85"/>
      <polygon points="38,88 44,80 40,74" opacity="0.8"/>
      <polygon points="30,58 40,54 38,48" opacity="0.85"/>
    </g>
    <g fill="#f0e6d3" opacity="0.6">
      <circle cx="52" cy="34" r="2.5"/>
      <circle cx="88" cy="44" r="2"/>
      <circle cx="84" cy="84" r="2.2"/>
      <circle cx="44" cy="90" r="1.8"/>
    </g>
  </g>

  <!-- Frame 3: Fragments scattering wide -->
  <g transform="translate(256,0)">
    <circle cx="64" cy="64" r="10" fill="url(#hitGrad)" filter="url(#glow)" opacity="0.4"/>
    <g fill="#ffd700" filter="url(#painterly)" opacity="0.7">
      <polygon points="64,18 60,26 68,28" />
      <polygon points="100,42 92,48 96,54" />
      <polygon points="104,80 94,76 96,84" />
      <polygon points="74,104 68,94 76,96" />
      <polygon points="30,96 38,88 34,82" />
      <polygon points="22,52 32,48 30,42" />
      <polygon points="48,16 46,24 52,22" />
      <polygon points="106,62 96,60 98,66" />
    </g>
    <g fill="#f0e6d3" opacity="0.4">
      <circle cx="44" cy="22" r="2"/>
      <circle cx="98" cy="36" r="1.8"/>
      <circle cx="96" cy="92" r="1.5"/>
      <circle cx="36" cy="98" r="1.7"/>
      <circle cx="20" cy="44" r="1.5"/>
    </g>
  </g>

  <!-- Frame 4: Fading remnants -->
  <g transform="translate(384,0)">
    <circle cx="64" cy="64" r="6" fill="url(#hitGrad)" filter="url(#glow)" opacity="0.15"/>
    <g fill="#ffd700" opacity="0.35" filter="url(#painterly)">
      <polygon points="64,10 62,16 66,18"/>
      <polygon points="110,36 104,42 108,46"/>
      <polygon points="112,90 104,86 106,92"/>
      <polygon points="78,114 72,106 78,108"/>
      <polygon points="22,104 28,96 26,90"/>
      <polygon points="14,46 22,42 20,36"/>
    </g>
    <g fill="#f0e6d3" opacity="0.2">
      <circle cx="38" cy="14" r="1.5"/>
      <circle cx="106" cy="30" r="1.2"/>
      <circle cx="108" cy="98" r="1"/>
      <circle cx="28" cy="108" r="1.3"/>
    </g>
  </g>
</svg>