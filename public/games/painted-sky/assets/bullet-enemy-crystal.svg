<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="paint" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.07" numOctaves="2" seed="50" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="crystG" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#b0e8ff"/>
      <stop offset="50%" stop-color="#80d8ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Blue glow -->
    <circle cx="64" cy="64" r="52" fill="url(#glowG)"/>
    <!-- Hexagonal crystal -->
    <polygon points="64,16 100,38 100,88 64,110 28,88 28,38" fill="url(#crystG)" opacity="0.85"/>
    <!-- Facet lines -->
    <line x1="64" y1="16" x2="64" y2="110" stroke="#b0e8ff" stroke-width="1" opacity="0.4"/>
    <line x1="28" y1="38" x2="100" y2="88" stroke="#b0e8ff" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="38" x2="28" y2="88" stroke="#b0e8ff" stroke-width="1" opacity="0.3"/>
    <!-- Sharp edge highlights -->
    <polygon points="64,16 100,38 100,88 64,110 28,88 28,38" fill="none" stroke="#b0e8ff" stroke-width="2" opacity="0.7"/>
    <!-- Inner facet -->
    <polygon points="64,32 86,46 86,80 64,94 42,80 42,46" fill="#00e5ff" opacity="0.15"/>
    <!-- Bright center -->
    <circle cx="64" cy="63" r="8" fill="#fff" opacity="0.25"/>
    <!-- Top highlight -->
    <polygon points="64,16 82,28 64,38 46,28" fill="#fff" opacity="0.15"/>
  </g>
</svg>