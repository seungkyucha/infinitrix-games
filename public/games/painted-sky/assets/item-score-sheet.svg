<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="fragGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 1: Small sparkle start -->
  <g transform="translate(0,0)">
    <circle cx="32" cy="32" r="10" fill="url(#fragGrad)" filter="url(#glow)"/>
    <g fill="#ffffff" opacity="0.6">
      <circle cx="32" cy="26" r="1"/>
      <circle cx="36" cy="32" r="0.8"/>
      <circle cx="28" cy="34" r="0.9"/>
    </g>
  </g>

  <!-- Frame 2: Growing light -->
  <g transform="translate(64,0)">
    <circle cx="32" cy="32" r="14" fill="url(#fragGrad)" filter="url(#glow)"/>
    <g fill="#ffffff" opacity="0.7">
      <circle cx="32" cy="22" r="1.2"/>
      <circle cx="40" cy="30" r="1"/>
      <circle cx="26" cy="36" r="1.1"/>
      <circle cx="36" cy="38" r="0.9"/>
    </g>
    <line x1="32" y1="28" x2="32" y2="36" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="32" x2="36" y2="32" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Frame 3: Peak brightness with cross flare -->
  <g transform="translate(128,0)">
    <circle cx="32" cy="32" r="18" fill="url(#fragGrad)" filter="url(#glow)"/>
    <g fill="#ffffff" opacity="0.9">
      <circle cx="32" cy="18" r="1.5"/>
      <circle cx="44" cy="28" r="1.2"/>
      <circle cx="40" cy="40" r="1.3"/>
      <circle cx="24" cy="42" r="1.1"/>
      <circle cx="20" cy="28" r="1.4"/>
    </g>
    <line x1="32" y1="20" x2="32" y2="44" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="20" y1="32" x2="44" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="22" x2="42" y2="42" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
    <line x1="42" y1="22" x2="22" y2="42" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Frame 4: Reflection scatter -->
  <g transform="translate(192,0)">
    <circle cx="32" cy="32" r="16" fill="url(#fragGrad)" filter="url(#glow)" opacity="0.8"/>
    <g fill="#ffeb3b" opacity="0.8" filter="url(#glow)">
      <circle cx="22" cy="20" r="2"/>
      <circle cx="44" cy="22" r="1.8"/>
      <circle cx="42" cy="42" r="1.5"/>
      <circle cx="20" cy="40" r="1.7"/>
    </g>
    <g fill="#ffffff" opacity="0.7">
      <circle cx="32" cy="24" r="1"/>
      <circle cx="38" cy="36" r="0.8"/>
      <circle cx="26" cy="38" r="0.9"/>
    </g>
  </g>

  <!-- Frame 5: Fading scatter -->
  <g transform="translate(256,0)">
    <circle cx="32" cy="32" r="12" fill="url(#fragGrad)" filter="url(#glow)" opacity="0.5"/>
    <g fill="#ffeb3b" opacity="0.5" filter="url(#glow)">
      <circle cx="18" cy="16" r="1.8"/>
      <circle cx="48" cy="18" r="1.5"/>
      <circle cx="46" cy="46" r="1.3"/>
      <circle cx="16" cy="44" r="1.6"/>
      <circle cx="32" cy="12" r="1.2"/>
      <circle cx="32" cy="52" r="1.1"/>
    </g>
    <g fill="#ffffff" opacity="0.4">
      <circle cx="32" cy="28" r="0.8"/>
      <circle cx="36" cy="34" r="0.6"/>
    </g>
  </g>

  <!-- Frame 6: Nearly gone, faint traces -->
  <g transform="translate(320,0)">
    <circle cx="32" cy="32" r="8" fill="url(#fragGrad)" filter="url(#glow)" opacity="0.25"/>
    <g fill="#ffd700" opacity="0.3">
      <circle cx="14" cy="12" r="1.2"/>
      <circle cx="52" cy="14" r="1"/>
      <circle cx="50" cy="50" r="0.9"/>
      <circle cx="12" cy="48" r="1.1"/>
      <circle cx="32" cy="8" r="0.8"/>
      <circle cx="32" cy="56" r="0.7"/>
      <circle cx="8" cy="32" r="0.8"/>
      <circle cx="56" cy="32" r="0.7"/>
    </g>
  </g>
</svg>