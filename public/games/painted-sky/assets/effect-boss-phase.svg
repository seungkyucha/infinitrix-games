<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128">
  <defs>
    <filter id="inkVortex">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="3" seed="42" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="8"/>
    </filter>
    <filter id="explosionGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.7  0 0 0 0 0.53  0 0 0 0 1  0 0 0 1.5 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlowBoss">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vortexCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1a0033" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burstCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0c0ff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#b388ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Frame 1: Ink vortex forming (0-128) -->
  <g transform="translate(64,64)">
    <g filter="url(#inkVortex)">
      <circle r="40" fill="url(#vortexCenter)" opacity="0.6"/>
      <path d="M0,-35 Q25,-20 30,0 Q25,20 0,35 Q-25,20 -30,0 Q-25,-20 0,-35" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.5"/>
      <path d="M0,-25 Q18,-12 20,0 Q18,12 0,25 Q-18,12 -20,0 Q-18,-12 0,-25" fill="none" stroke="#0d1b2a" stroke-width="3" opacity="0.7"/>
    </g>
    <g filter="url(#softGlowBoss)" opacity="0.4">
      <circle r="8" fill="#b388ff"/>
    </g>
  </g>
  <!-- Frame 2: Vortex spinning intensely (128-256) -->
  <g transform="translate(192,64)">
    <g filter="url(#inkVortex)">
      <circle r="45" fill="url(#vortexCenter)" opacity="0.75"/>
      <path d="M0,-40 Q30,-15 35,5 Q28,25 5,40 Q-20,30 -35,5 Q-28,-20 0,-40" fill="none" stroke="#b388ff" stroke-width="2.5" opacity="0.6" transform="rotate(30)"/>
      <path d="M0,-30 Q22,-10 25,5 Q20,18 3,30 Q-15,22 -25,5 Q-20,-15 0,-30" fill="none" stroke="#0d1b2a" stroke-width="3.5" opacity="0.8" transform="rotate(60)"/>
      <path d="M0,-18 Q12,-5 14,2 Q10,10 0,18 Q-10,10 -14,2 Q-10,-8 0,-18" fill="#b388ff" opacity="0.3"/>
    </g>
    <g filter="url(#softGlowBoss)" opacity="0.6">
      <circle r="12" fill="#b388ff"/>
    </g>
  </g>
  <!-- Frame 3: Explosion burst (256-384) -->
  <g transform="translate(320,64)">
    <g filter="url(#explosionGlow)">
      <circle r="35" fill="url(#burstCenter)" opacity="0.8"/>
      <line x1="0" y1="-50" x2="0" y2="-20" stroke="#b388ff" stroke-width="3" opacity="0.7"/>
      <line x1="35" y1="-35" x2="14" y2="-14" stroke="#b388ff" stroke-width="2.5" opacity="0.6"/>
      <line x1="50" y1="0" x2="20" y2="0" stroke="#b388ff" stroke-width="3" opacity="0.7"/>
      <line x1="35" y1="35" x2="14" y2="14" stroke="#b388ff" stroke-width="2.5" opacity="0.6"/>
      <line x1="0" y1="50" x2="0" y2="20" stroke="#b388ff" stroke-width="3" opacity="0.7"/>
      <line x1="-35" y1="35" x2="-14" y2="14" stroke="#b388ff" stroke-width="2.5" opacity="0.6"/>
      <line x1="-50" y1="0" x2="-20" y2="0" stroke="#b388ff" stroke-width="3" opacity="0.7"/>
      <line x1="-35" y1="-35" x2="-14" y2="-14" stroke="#b388ff" stroke-width="2.5" opacity="0.6"/>
    </g>
    <g filter="url(#inkVortex)" opacity="0.5">
      <circle cx="-30" cy="-25" r="6" fill="#0d1b2a"/>
      <circle cx="28" cy="-20" r="5" fill="#0d1b2a"/>
      <circle cx="25" cy="30" r="7" fill="#0d1b2a"/>
      <circle cx="-28" cy="22" r="4" fill="#1b2838"/>
    </g>
  </g>
  <!-- Frame 4: New form emerges (384-512) -->
  <g transform="translate(448,64)">
    <g filter="url(#softGlowBoss)">
      <circle r="25" fill="url(#burstCenter)" opacity="0.5"/>
      <polygon points="0,-45 12,-15 42,-10 18,12 24,42 0,25 -24,42 -18,12 -42,-10 -12,-15" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.7"/>
      <polygon points="0,-30 8,-10 28,-7 12,8 16,28 0,17 -16,28 -12,8 -28,-7 -8,-10" fill="#b388ff" opacity="0.2"/>
    </g>
    <g opacity="0.4">
      <circle cx="-35" cy="-30" r="3" fill="#0d1b2a"/>
      <circle cx="38" cy="-15" r="2.5" fill="#0d1b2a"/>
      <circle cx="30" cy="35" r="3.5" fill="#1b2838"/>
      <circle cx="-32" cy="28" r="2" fill="#0d1b2a"/>
    </g>
    <g filter="url(#softGlowBoss)" opacity="0.5">
      <circle r="6" fill="#e0c0ff"/>
    </g>
  </g>
</svg>