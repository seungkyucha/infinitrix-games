<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128">
  <defs>
    <filter id="painterly" x="-5%" y="-10%" width="110%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#6c3cf7" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#0d1b2a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="btnBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c3cf7"/>
      <stop offset="40%" stop-color="#f0e6d3"/>
      <stop offset="60%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </linearGradient>
    <radialGradient id="btnGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#6c3cf7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <ellipse cx="128" cy="64" rx="120" ry="55" fill="url(#btnGlow)" filter="url(#bgGlow)"/>
  <g filter="url(#painterly)">
    <!-- Button body -->
    <rect x="12" y="12" width="232" height="104" rx="16" ry="16" fill="url(#btnBg)"/>
    <!-- Watercolor brushstroke border - top -->
    <path d="M28 14 C70 8, 128 10, 186 8 C220 10, 238 12, 244 16" fill="none" stroke="url(#btnBorder)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Brushstroke border - bottom -->
    <path d="M28 114 C70 120, 128 118, 186 120 C220 118, 238 116, 244 112" fill="none" stroke="url(#btnBorder)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Brushstroke border - left -->
    <path d="M14 28 C8 48, 10 80, 14 100" fill="none" stroke="url(#btnBorder)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Brushstroke border - right -->
    <path d="M242 28 C248 48, 246 80, 242 100" fill="none" stroke="url(#btnBorder)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Corner accents (9-slice safe: keep details in corners) -->
  <g filter="url(#bgGlow)">
    <!-- Top-left -->
    <path d="M16 30 C14 20, 20 14, 30 14" fill="none" stroke="#f0e6d3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="18" cy="18" r="2" fill="#f0e6d3" opacity="0.5"/>
    <!-- Top-right -->
    <path d="M240 30 C242 20, 236 14, 226 14" fill="none" stroke="#f0e6d3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="238" cy="18" r="2" fill="#f0e6d3" opacity="0.5"/>
    <!-- Bottom-left -->
    <path d="M16 98 C14 108, 20 114, 30 114" fill="none" stroke="#f0e6d3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="18" cy="110" r="2" fill="#f0e6d3" opacity="0.5"/>
    <!-- Bottom-right -->
    <path d="M240 98 C242 108, 236 114, 226 114" fill="none" stroke="#f0e6d3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="238" cy="110" r="2" fill="#f0e6d3" opacity="0.5"/>
  </g>
  <!-- Subtle inner highlight -->
  <rect x="20" y="20" width="216" height="88" rx="12" ry="12" fill="none" stroke="#6c3cf7" stroke-width="0.5" opacity="0.2"/>
</svg>