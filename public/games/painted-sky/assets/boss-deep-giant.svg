<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="88" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="deepWater" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="44" result="water"/>
      <feDisplacementMap in="SourceGraphic" in2="water" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="bioGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlowFilter">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Deep sea gradients -->
    <linearGradient id="deepBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#061018"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#004d5c"/>
      <stop offset="60%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="giantEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#004d5c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <linearGradient id="tentacleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d5c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Deep ocean background -->
  <rect width="512" height="512" fill="url(#deepBg)"/>

  <!-- Water caustics effect -->
  <g filter="url(#deepWater)" opacity="0.15">
    <ellipse cx="256" cy="100" rx="300" ry="80" fill="#004d5c"/>
    <ellipse cx="200" cy="150" rx="200" ry="60" fill="#00e5ff" opacity="0.3"/>
  </g>

  <!-- Massive entity rising from below -->
  <g filter="url(#painterly)">
    <!-- Main body mass - upper portion visible -->
    <ellipse cx="256" cy="350" rx="180" ry="200" fill="url(#bodyGrad)"/>
    <!-- Head/dome shape -->
    <ellipse cx="256" cy="240" rx="120" ry="90" fill="#004d5c" opacity="0.8"/>
    <!-- Body ridge lines -->
    <path d="M160 280 Q200 260 256 255 Q310 260 350 280" stroke="#004d5c" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M140 320 Q200 295 256 290 Q310 295 370 320" stroke="#004d5c" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Multiple tentacles -->
  <g filter="url(#painterly)">
    <!-- Tentacle 1 - far left, reaching up -->
    <path d="M100 500 Q60 420 40 350 Q25 290 50 240 Q70 200 90 180"
          stroke="url(#tentacleGrad)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tentacle 2 - left -->
    <path d="M170 510 Q130 440 110 380 Q95 330 120 280"
          stroke="url(#tentacleGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
    <!-- Tentacle 3 - center left -->
    <path d="M220 512 Q200 460 195 410 Q192 370 210 330"
          stroke="url(#tentacleGrad)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Tentacle 4 - center right -->
    <path d="M300 512 Q310 460 315 410 Q318 370 305 330"
          stroke="url(#tentacleGrad)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Tentacle 5 - right -->
    <path d="M350 510 Q380 440 400 380 Q415 330 390 280"
          stroke="url(#tentacleGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
    <!-- Tentacle 6 - far right, reaching up -->
    <path d="M410 500 Q450 420 465 350 Q478 290 455 240 Q440 205 420 185"
          stroke="url(#tentacleGrad)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tentacle tips with suckers -->
    <circle cx="90" cy="178" r="6" fill="#004d5c" opacity="0.7"/>
    <circle cx="120" cy="278" r="7" fill="#004d5c" opacity="0.7"/>
    <circle cx="420" cy="183" r="6" fill="#004d5c" opacity="0.7"/>
    <circle cx="390" cy="278" r="7" fill="#004d5c" opacity="0.7"/>
  </g>

  <!-- ONE giant glowing eye -->
  <g filter="url(#eyeGlowFilter)">
    <ellipse cx="256" cy="230" rx="40" ry="35" fill="url(#giantEye)"/>
    <!-- Pupil -->
    <ellipse cx="256" cy="230" rx="15" ry="20" fill="#0a1628"/>
    <!-- Pupil highlight -->
    <ellipse cx="248" cy="222" rx="5" ry="6" fill="#00e5ff" opacity="0.5"/>
    <ellipse cx="260" cy="236" rx="3" ry="4" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Bioluminescent patterns on body -->
  <g filter="url(#bioGlow)" opacity="0.7">
    <!-- Spots and lines -->
    <circle cx="200" cy="270" r="3" fill="#00e5ff"/>
    <circle cx="310" cy="275" r="3.5" fill="#00e5ff"/>
    <circle cx="180" cy="310" r="2.5" fill="#00e5ff"/>
    <circle cx="330" cy="315" r="2.5" fill="#00e5ff"/>
    <circle cx="220" cy="350" r="2" fill="#00e5ff"/>
    <circle cx="290" cy="345" r="2" fill="#00e5ff"/>
    <!-- Lines along body -->
    <path d="M190 280 Q210 275 230 280" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
    <path d="M280 280 Q300 275 320 282" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
    <!-- On tentacles -->
    <circle cx="55" cy="280" r="2" fill="#00e5ff"/>
    <circle cx="70" cy="330" r="2.5" fill="#00e5ff"/>
    <circle cx="450" cy="285" r="2" fill="#00e5ff"/>
    <circle cx="435" cy="335" r="2.5" fill="#00e5ff"/>
    <!-- Larger bio spots -->
    <circle cx="140" cy="370" r="3" fill="#00e5ff" opacity="0.5"/>
    <circle cx="370" cy="375" r="3" fill="#00e5ff" opacity="0.5"/>
  </g>

  <!-- Deep sea particles / plankton -->
  <g opacity="0.4">
    <circle cx="80" cy="100" r="1.5" fill="#00e5ff"/>
    <circle cx="430" cy="80" r="1" fill="#004d5c"/>
    <circle cx="150" cy="60" r="1.5" fill="#00e5ff"/>
    <circle cx="350" cy="50" r="1" fill="#004d5c"/>
    <circle cx="60" cy="160" r="1" fill="#00e5ff"/>
    <circle cx="460" cy="140" r="1.5" fill="#004d5c"/>
    <circle cx="300" cy="120" r="1" fill="#00e5ff"/>
    <circle cx="200" cy="140" r="1" fill="#004d5c"/>
  </g>

  <!-- Rising from below effect -->
  <g filter="url(#deepWater)" opacity="0.3">
    <ellipse cx="256" cy="490" rx="200" ry="40" fill="#004d5c"/>
  </g>
</svg>