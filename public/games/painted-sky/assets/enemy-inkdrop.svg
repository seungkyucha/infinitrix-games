<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="paint" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" seed="1" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="bodyG" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a1a5e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4aaff"/>
      <stop offset="60%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#7b2d8b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Glow -->
    <ellipse cx="128" cy="120" rx="80" ry="80" fill="url(#glow)"/>
    <!-- Main droplet body -->
    <path d="M128 30 C128 30 60 100 60 148 C60 190 90 220 128 220 C166 220 196 190 196 148 C196 100 128 30 128 30Z" fill="url(#bodyG)"/>
    <!-- Ink drips -->
    <ellipse cx="100" cy="218" rx="8" ry="14" fill="#1a0a3e" opacity="0.8"/>
    <ellipse cx="145" cy="224" rx="6" ry="18" fill="#1a0a3e" opacity="0.7"/>
    <ellipse cx="160" cy="216" rx="5" ry="10" fill="#1a0a3e" opacity="0.6"/>
    <!-- Drip drops -->
    <circle cx="100" cy="240" r="5" fill="#1a0a3e" opacity="0.5"/>
    <circle cx="145" cy="248" r="4" fill="#1a0a3e" opacity="0.4"/>
    <!-- Eye -->
    <ellipse cx="128" cy="135" rx="22" ry="24" fill="url(#eyeG)"/>
    <ellipse cx="128" cy="135" rx="10" ry="12" fill="#1a0a3e"/>
    <circle cx="132" cy="130" r="4" fill="#fff" opacity="0.7"/>
    <!-- Surface highlight -->
    <ellipse cx="110" cy="100" rx="20" ry="8" fill="#b388ff" opacity="0.15" transform="rotate(-20 110 100)"/>
  </g>
</svg>