<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="paint" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="turbulence" baseFrequency="0.06" numOctaves="2" seed="70" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="arrowG" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#008fa8"/>
    </linearGradient>
    <radialGradient id="glowG" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trailG" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0e6d3" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Glow -->
    <ellipse cx="64" cy="44" rx="32" ry="40" fill="url(#glowG)"/>
    <!-- Light trail (brushstroke style) -->
    <path d="M58 60 Q54 85 56 105 Q58 120 64 125 Q70 120 72 105 Q74 85 70 60Z" fill="url(#trailG)"/>
    <path d="M60 70 Q58 90 60 110" stroke="#f0e6d3" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>
    <path d="M68 70 Q70 90 68 110" stroke="#f0e6d3" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>
    <!-- Arrow body -->
    <path d="M64 10 L80 50 L70 45 L70 70 L58 70 L58 45 L48 50Z" fill="url(#arrowG)"/>
    <!-- Arrow highlight -->
    <path d="M64 14 L56 42 L62 38 L62 65" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Bright tip -->
    <circle cx="64" cy="14" r="4" fill="#fff" opacity="0.5"/>
    <circle cx="64" cy="14" r="2" fill="#fff" opacity="0.8"/>
  </g>
</svg>