<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 384">
  <defs>
    <filter id="painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#0d1b2a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="borderGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffd700" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#f0e6d3"/>
      <stop offset="70%" stop-color="#ffd700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g filter="url(#painterly)">
    <!-- Card background -->
    <rect x="16" y="16" width="224" height="352" rx="12" ry="12" fill="url(#cardBg)"/>
    <!-- Brushstroke border -->
    <path d="M28 20 C80 14, 176 14, 228 20 C234 80, 236 160, 234 240 C232 300, 234 340, 228 364 C176 370, 80 370, 28 364 C22 300, 20 160, 22 80 Z" fill="none" stroke="url(#borderGold)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Inner subtle border -->
    <rect x="24" y="24" width="208" height="336" rx="8" ry="8" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.25"/>
  </g>
  <!-- Icon area background -->
  <rect x="40" y="40" width="176" height="176" rx="8" ry="8" fill="#0d1b2a" opacity="0.4" filter="url(#painterly)"/>
  <rect x="40" y="40" width="176" height="176" rx="8" ry="8" fill="none" stroke="#ffd700" stroke-width="0.8" opacity="0.3"/>
  <!-- Divider brushstroke -->
  <line x1="40" y1="232" x2="216" y2="232" stroke="url(#divider)" stroke-width="2" filter="url(#painterly)"/>
  <!-- Text area background -->
  <rect x="40" y="248" width="176" height="96" rx="6" ry="6" fill="#0d1b2a" opacity="0.3"/>
  <!-- Corner decorations -->
  <g filter="url(#glow)">
    <!-- Top-left corner -->
    <path d="M20 36 C20 24, 24 20, 36 20" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M22 50 C22 30, 26 22, 50 22" fill="none" stroke="#f0e6d3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="24" cy="24" r="2.5" fill="#ffd700" opacity="0.7"/>
    <!-- Top-right corner -->
    <path d="M236 36 C236 24, 232 20, 220 20" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M234 50 C234 30, 230 22, 206 22" fill="none" stroke="#f0e6d3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="232" cy="24" r="2.5" fill="#ffd700" opacity="0.7"/>
    <!-- Bottom-left corner -->
    <path d="M20 348 C20 360, 24 364, 36 364" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M22 334 C22 354, 26 362, 50 362" fill="none" stroke="#f0e6d3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="24" cy="360" r="2.5" fill="#ffd700" opacity="0.7"/>
    <!-- Bottom-right corner -->
    <path d="M236 348 C236 360, 232 364, 220 364" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M234 334 C234 354, 230 362, 206 362" fill="none" stroke="#f0e6d3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="232" cy="360" r="2.5" fill="#ffd700" opacity="0.7"/>
  </g>
</svg>