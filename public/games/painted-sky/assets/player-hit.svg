<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Painterly texture filter (more distorted for hit) -->
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="painterly-fine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Disrupted glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-disrupted">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Red damage flash -->
    <filter id="damageFlash" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="displaced"/>
      </feMerge>
    </filter>
    <!-- Body glow (dimmer, disrupted) -->
    <radialGradient id="bodyGlow" cx="55%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#f0e6d3" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ff6b8a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b8a" stop-opacity="0"/>
    </radialGradient>
    <!-- Damaged wing gradients -->
    <linearGradient id="wingDmgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff6b8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wingDmgR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff6b8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Robe with red tint -->
    <linearGradient id="robeHit" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#ff6b8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6b8a" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6b8a" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Red damage aura -->
    <radialGradient id="damageAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b8a" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ff6b8a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Damage aura -->
  <ellipse cx="270" cy="250" rx="260" ry="250" fill="url(#damageAura)"/>

  <!-- Disrupted body glow (shifted right — pushed back) -->
  <ellipse cx="270" cy="260" rx="110" ry="130" fill="url(#bodyGlow)" filter="url(#glow-disrupted)"/>

  <!-- === WINGS (dimmed, asymmetric — disrupted) === -->
  <g filter="url(#damageFlash)">
    <!-- Top pair (drooping) -->
    <path d="M268 210 C225 135, 115 120, 100 175 C88 210, 140 240, 195 228 C215 223, 250 216, 268 210Z" fill="url(#wingDmgL)" opacity="0.55"/>
    <path d="M268 205 C310 130, 420 115, 438 172 C450 208, 400 235, 340 224 C320 219, 282 212, 268 205Z" fill="url(#wingDmgR)" opacity="0.5"/>
    <!-- Middle pair -->
    <path d="M268 248 C235 192, 130 198, 118 238 C110 265, 160 280, 210 265 C232 258, 258 250, 268 248Z" fill="url(#wingDmgL)" opacity="0.45"/>
    <path d="M268 245 C300 190, 405 195, 415 235 C422 262, 375 278, 322 263 C300 256, 275 248, 268 245Z" fill="url(#wingDmgR)" opacity="0.4"/>
    <!-- Bottom pair (crumpled) -->
    <path d="M268 285 C248 250, 168 258, 165 290 C163 308, 200 315, 235 300 C252 293, 264 288, 268 285Z" fill="url(#wingDmgL)" opacity="0.35"/>
    <path d="M268 282 C288 248, 370 255, 374 288 C376 306, 340 313, 302 298 C285 292, 272 286, 268 282Z" fill="url(#wingDmgR)" opacity="0.3"/>
  </g>

  <!-- === HAIR blown sideways from impact === -->
  <g filter="url(#painterly)">
    <path d="M250 182 C238 130, 215 82, 190 48 C186 40, 178 45, 185 60 C198 88, 220 132, 245 172Z" fill="url(#hairGrad)" opacity="0.6"/>
    <path d="M258 176 C248 118, 235 68, 225 30 C222 20, 216 25, 222 48 C232 82, 248 128, 255 168Z" fill="url(#hairGrad)" opacity="0.65"/>
    <path d="M272 178 C275 120, 282 68, 295 35 C298 25, 305 28, 300 48 C290 80, 278 128, 273 168Z" fill="url(#hairGrad)" opacity="0.55"/>
    <path d="M285 185 C298 138, 318 92, 340 60 C344 52, 350 56, 344 70 C328 100, 300 142, 282 178Z" fill="url(#hairGrad)" opacity="0.45"/>
    <ellipse cx="265" cy="188" rx="32" ry="22" fill="url(#hairGrad)" opacity="0.7"/>
  </g>

  <!-- === BODY (pushed back pose, leaning right) === -->
  <g filter="url(#painterly)">
    <!-- Head (tilted) -->
    <ellipse cx="268" cy="208" rx="21" ry="25" fill="url(#robeHit)" transform="rotate(8,268,208)"/>
    <!-- Neck -->
    <rect x="261" y="230" width="13" height="11" rx="4" fill="url(#robeHit)" opacity="0.7" transform="rotate(5,267,235)"/>
    <!-- Torso (leaning back) -->
    <path d="M248 240 C244 252, 242 282, 246 312 L298 308 C300 278, 298 250, 294 240 Z" fill="url(#robeHit)" transform="rotate(5,270,275)"/>
    <!-- Arms flung out -->
    <path d="M248 255 C228 248, 200 240, 182 245 C175 247, 178 255, 186 254 C200 250, 225 256, 248 260Z" fill="url(#robeHit)" opacity="0.6"/>
    <path d="M294 252 C314 244, 342 235, 360 238 C368 240, 365 248, 358 246 C344 242, 318 250, 294 258Z" fill="url(#robeHit)" opacity="0.6"/>
    <!-- Robe edges tinted red, disrupted -->
    <path d="M246 312 C238 352, 226 402, 216 452 C214 462, 228 465, 242 456 C252 450, 264 460, 270 462 C276 460, 286 448, 296 456 C310 466, 325 460, 322 452 C314 402, 304 352, 298 308 Z" fill="url(#robeHit)" opacity="0.6"/>
    <!-- Red edge wisps -->
    <path d="M216 452 C208 462, 198 470, 192 468 C186 465, 192 458, 200 455 C208 452, 213 454, 216 452Z" fill="#ff6b8a" opacity="0.4" filter="url(#painterly-fine)"/>
    <path d="M322 452 C330 462, 340 468, 345 466 C350 463, 344 456, 336 454 C328 452, 324 454, 322 452Z" fill="#ff6b8a" opacity="0.4" filter="url(#painterly-fine)"/>
  </g>

  <!-- Face (pained expression) -->
  <g filter="url(#glow)">
    <!-- Squeezed eyes -->
    <path d="M257 203 L262 200 L267 203" stroke="#ff6b8a" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M273 202 L278 199 L283 202" stroke="#ff6b8a" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Open mouth (pained) -->
    <ellipse cx="270" cy="218" rx="4" ry="3" fill="#1b2838" opacity="0.5"/>
    <path d="M265 216 Q270 222, 275 216" stroke="#f0e6d3" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Damage impact lines -->
  <g stroke="#ff6b8a" stroke-width="2" opacity="0.5" filter="url(#glow)">
    <line x1="180" y1="200" x2="210" y2="220"/>
    <line x1="185" y1="240" x2="215" y2="252"/>
    <line x1="190" y1="280" x2="218" y2="285"/>
    <line x1="175" y1="170" x2="208" y2="192"/>
  </g>

  <!-- Red damage particles -->
  <g fill="#ff6b8a" filter="url(#glow)">
    <circle cx="195" cy="190" r="3" opacity="0.7"/>
    <circle cx="180" cy="230" r="2.5" opacity="0.6"/>
    <circle cx="200" cy="270" r="2" opacity="0.55"/>
    <circle cx="170" cy="260" r="1.8" opacity="0.5"/>
    <circle cx="210" cy="310" r="2.2" opacity="0.5"/>
    <circle cx="185" cy="165" r="1.5" opacity="0.45"/>
    <circle cx="160" cy="215" r="2" opacity="0.4"/>
  </g>
  <!-- Scattered light fragments -->
  <g fill="#ffd700" filter="url(#glow)">
    <circle cx="340" cy="160" r="1.5" opacity="0.4"/>
    <circle cx="370" cy="200" r="1" opacity="0.35"/>
    <circle cx="350" cy="300" r="1.2" opacity="0.3"/>
    <circle cx="150" cy="150" r="1.8" opacity="0.45"/>
    <circle cx="390" cy="260" r="1.3" opacity="0.3"/>
  </g>
  <g fill="#b388ff" filter="url(#glow)">
    <circle cx="310" cy="380" r="1.5" opacity="0.35"/>
    <circle cx="220" cy="400" r="1.2" opacity="0.3"/>
    <circle cx="340" cy="350" r="1" opacity="0.25"/>
  </g>

  <!-- Light disruption cracks -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.25" filter="url(#painterly-fine)">
    <path d="M230 220 L220 200 L210 210 L195 195"/>
    <path d="M235 260 L218 250 L205 262 L190 250"/>
  </g>
</svg>