<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="graySphr" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#333" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <g filter="url(#painterly)" opacity="0.55">
    <!-- Main sphere -->
    <circle cx="64" cy="68" r="34" fill="url(#graySphr)"/>
    <!-- Faint highlight arc -->
    <path d="M48 52 C52 44, 62 40, 72 44" fill="none" stroke="#555" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M50 56 C54 50, 60 48, 66 50" fill="none" stroke="#555" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
    <!-- Ghost swirl -->
    <path d="M52 68 C56 58, 68 60, 72 68 C76 76, 64 80, 56 74" fill="none" stroke="#444" stroke-width="1" opacity="0.2"/>
    <!-- Bottom shadow -->
    <ellipse cx="64" cy="90" rx="20" ry="4" fill="#333" opacity="0.15"/>
  </g>
</svg>