<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <filter id="rubbleWarp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.025" numOctaves="4" seed="67" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="12"/>
    </filter>
    <filter id="inkFog">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="debrisEdge">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="38" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    </filter>
    <filter id="softGlow3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="debrisGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0033" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="fogUp" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a0014" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Crumbling wall fragment left -->
  <g filter="url(#rubbleWarp)">
    <path d="M-20,540 L-20,280 L30,260 L60,285 L80,250 L110,275 L130,300 L150,290 L170,320 L180,540 Z" fill="url(#debrisGrad)"/>
  </g>
  <!-- Crumbling wall fragment right -->
  <g filter="url(#rubbleWarp)">
    <path d="M780,540 L790,310 L820,290 L850,320 L870,280 L900,300 L920,270 L940,295 L960,260 L980,540 Z" fill="url(#debrisGrad)"/>
  </g>
  <!-- Falling debris fragments -->
  <g filter="url(#debrisEdge)" opacity="0.75">
    <polygon points="200,180 220,170 230,190 215,200" fill="#0a0014" transform="rotate(15,215,185)"/>
    <polygon points="350,250 370,240 380,265 355,270" fill="#120020" transform="rotate(-20,365,255)"/>
    <polygon points="550,200 575,190 585,215 560,220" fill="#0a0014" transform="rotate(30,567,205)"/>
    <polygon points="680,280 700,270 705,295 685,300" fill="#1a0033" transform="rotate(-10,692,285)"/>
    <polygon points="450,150 465,140 475,160 455,165" fill="#0a0014" transform="rotate(45,462,152)"/>
    <polygon points="300,320 318,308 325,330 308,335" fill="#120020" transform="rotate(-25,312,321)"/>
    <polygon points="620,340 640,328 648,352 628,358" fill="#0a0014" transform="rotate(12,634,343)"/>
  </g>
  <!-- Ink particle debris -->
  <g filter="url(#debrisEdge)" opacity="0.5">
    <circle cx="250" cy="220" r="6" fill="#0a0014"/>
    <circle cx="420" cy="190" r="4" fill="#1a0033"/>
    <circle cx="580" cy="260" r="5" fill="#0a0014"/>
    <circle cx="150" cy="350" r="7" fill="#120020"/>
    <circle cx="730" cy="320" r="5.5" fill="#0a0014"/>
    <circle cx="500" cy="300" r="3.5" fill="#1a0033"/>
    <circle cx="330" cy="380" r="4.5" fill="#0a0014"/>
  </g>
  <!-- Ink fog rising from below -->
  <g filter="url(#inkFog)">
    <rect x="0" y="380" width="960" height="160" fill="url(#fogUp)"/>
    <ellipse cx="200" cy="460" rx="180" ry="60" fill="#0a0014" opacity="0.3"/>
    <ellipse cx="500" cy="440" rx="220" ry="70" fill="#1a0033" opacity="0.25"/>
    <ellipse cx="780" cy="470" rx="160" ry="50" fill="#0a0014" opacity="0.28"/>
  </g>
  <!-- Ink fog wisps mid-screen -->
  <g filter="url(#inkFog)" opacity="0.2">
    <ellipse cx="300" cy="300" rx="150" ry="30" fill="#1a0033"/>
    <ellipse cx="650" cy="280" rx="120" ry="25" fill="#0a0014"/>
  </g>
  <!-- Faint purple ambient glow from lightning above -->
  <g filter="url(#inkFog)" opacity="0.15">
    <ellipse cx="480" cy="100" rx="300" ry="100" fill="#b388ff"/>
  </g>
</svg>