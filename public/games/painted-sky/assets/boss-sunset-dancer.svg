<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="55" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scarfFlow" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="33" result="flow"/>
      <feDisplacementMap in="SourceGraphic" in2="flow" scale="15" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Sunset gradient background -->
    <linearGradient id="sunsetBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b2d8b" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#ff9100" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="sunsetLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff9100" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7b2d8b" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9100"/>
      <stop offset="50%" stop-color="#e07800"/>
      <stop offset="100%" stop-color="#7b2d8b"/>
    </linearGradient>
    <linearGradient id="scarfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="30%" stop-color="#ff9100"/>
      <stop offset="70%" stop-color="#ff9100" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b2d8b" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sunset atmosphere -->
  <rect width="512" height="512" fill="url(#sunsetBg)"/>
  <ellipse cx="256" cy="200" rx="300" ry="200" fill="url(#sunsetLight)"/>

  <!-- Elegant dancer figure -->
  <g filter="url(#painterly)">
    <!-- Head -->
    <ellipse cx="256" cy="115" rx="28" ry="32" fill="url(#bodyGrad)"/>
    <!-- Hair flowing -->
    <path d="M235 100 Q220 80 210 105 Q205 125 220 130" fill="#7b2d8b" opacity="0.8"/>
    <path d="M275 100 Q295 85 300 110 Q298 130 285 125" fill="#7b2d8b" opacity="0.7"/>
    <!-- Neck -->
    <rect x="248" y="145" width="16" height="15" rx="4" fill="url(#bodyGrad)" opacity="0.9"/>
    <!-- Torso - dance pose, slightly tilted -->
    <path d="M230 160 Q240 155 270 158 Q285 165 280 220 Q270 240 240 240 Q225 235 230 160" fill="url(#bodyGrad)" opacity="0.85"/>
    <!-- Left arm raised gracefully -->
    <path d="M232 170 Q200 150 175 120 Q165 105 170 95" stroke="url(#bodyGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Right arm extended -->
    <path d="M278 175 Q310 190 345 175 Q365 165 375 155" stroke="url(#bodyGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Left leg in dance pose -->
    <path d="M245 238 Q235 300 220 360 Q215 380 225 395" stroke="url(#bodyGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right leg extended back -->
    <path d="M265 238 Q290 300 320 350 Q340 375 350 380" stroke="url(#bodyGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Skirt/dress flowing -->
    <path d="M225 220 Q200 280 190 340 Q195 350 220 345 Q245 300 256 240" fill="#ff9100" opacity="0.4"/>
    <path d="M285 220 Q310 280 320 340 Q315 350 290 345 Q265 300 256 240" fill="#7b2d8b" opacity="0.3"/>
  </g>

  <!-- Long scarf spiraling around body -->
  <g filter="url(#scarfFlow)">
    <path d="M170 95 Q140 120 130 170 Q125 220 160 250 Q200 270 240 250 Q280 230 310 260 Q340 290 330 340 Q315 380 280 390 Q240 395 220 370"
          stroke="url(#scarfGrad)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M170 95 Q150 80 180 70 Q200 75 190 95" fill="#ffd700" opacity="0.6"/>
    <!-- Second scarf loop -->
    <path d="M220 370 Q190 400 200 430 Q220 450 260 440 Q300 425 320 400"
          stroke="url(#scarfGrad)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sunset particles at feet -->
  <g filter="url(#softGlow)">
    <circle cx="220" cy="400" r="5" fill="url(#particleGlow)"/>
    <circle cx="250" cy="415" r="4" fill="url(#particleGlow)"/>
    <circle cx="280" cy="405" r="6" fill="url(#particleGlow)"/>
    <circle cx="310" cy="395" r="3.5" fill="url(#particleGlow)"/>
    <circle cx="340" cy="390" r="4" fill="url(#particleGlow)"/>
    <circle cx="195" cy="410" r="3" fill="url(#particleGlow)"/>
    <circle cx="265" cy="425" r="4.5" fill="#ff9100" opacity="0.5"/>
    <circle cx="235" cy="430" r="3" fill="#ffd700" opacity="0.6"/>
    <circle cx="300" cy="420" r="3.5" fill="#ff9100" opacity="0.4"/>
    <!-- Rising particles -->
    <circle cx="230" cy="380" r="2" fill="#ffd700" opacity="0.7"/>
    <circle cx="270" cy="370" r="2.5" fill="#ff9100" opacity="0.6"/>
    <circle cx="200" cy="385" r="1.5" fill="#ffd700" opacity="0.5"/>
    <circle cx="330" cy="375" r="2" fill="#ff9100" opacity="0.5"/>
    <circle cx="250" cy="350" r="1.5" fill="#ffd700" opacity="0.4"/>
    <circle cx="290" cy="355" r="2" fill="#7b2d8b" opacity="0.4"/>
  </g>

  <!-- Ambient light rays -->
  <g opacity="0.15" filter="url(#painterly)">
    <polygon points="256,0 200,512 220,512" fill="#ffd700"/>
    <polygon points="256,0 290,512 310,512" fill="#ff9100"/>
    <polygon points="256,0 150,512 170,512" fill="#7b2d8b"/>
    <polygon points="256,0 340,512 360,512" fill="#ffd700"/>
  </g>

  <!-- Face details -->
  <g filter="url(#softGlow)">
    <ellipse cx="247" cy="112" rx="4" ry="3" fill="#ffd700" opacity="0.8"/>
    <ellipse cx="265" cy="112" rx="4" ry="3" fill="#ffd700" opacity="0.8"/>
  </g>
</svg>