<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 512">
<defs>
  <radialGradient id="bodyGlow" cx="50%" cy="45%" r="45%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="40%" stop-color="#f0e6d3" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#f0e6d3" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wingGold" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd700"/>
    <stop offset="100%" stop-color="#ffd700" stop-opacity="0.3"/>
  </radialGradient>
  <radialGradient id="aura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="brushTex">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
  </filter>
</defs>
