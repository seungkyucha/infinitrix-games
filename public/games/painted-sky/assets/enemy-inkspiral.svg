<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="paint" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="4" seed="20" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="coreG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e6d3"/>
      <stop offset="40%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#1a0a3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a3e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Outer glow -->
    <circle cx="256" cy="256" r="220" fill="url(#outerG)"/>
    <!-- Spiral arms -->
    <path d="M256 256 Q320 180 380 200 Q440 220 400 290 Q360 360 280 340 Q200 320 220 250 Q240 180 310 170 Q380 160 410 230 Q440 300 370 360 Q300 420 230 370 Q160 320 190 240" stroke="#1a0a3e" stroke-width="28" fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M256 256 Q190 330 130 310 Q70 290 110 220 Q150 150 230 170 Q310 190 290 260 Q270 330 200 340 Q130 350 100 280 Q70 210 140 150 Q210 90 280 140 Q350 190 320 270" stroke="#7b2d8b" stroke-width="20" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M256 256 Q290 210 330 220 Q370 230 350 270 Q330 310 290 300 Q250 290 260 250" stroke="#b388ff" stroke-width="14" fill="none" opacity="0.7" stroke-linecap="round"/>
    <!-- Ink blobs along spiral -->
    <circle cx="380" cy="200" r="18" fill="#1a0a3e" opacity="0.6"/>
    <circle cx="130" cy="310" r="15" fill="#1a0a3e" opacity="0.5"/>
    <circle cx="410" cy="230" r="12" fill="#7b2d8b" opacity="0.4"/>
    <circle cx="100" cy="280" r="14" fill="#7b2d8b" opacity="0.35"/>
    <!-- Bright core -->
    <circle cx="256" cy="256" r="35" fill="url(#coreG)"/>
    <circle cx="256" cy="256" r="15" fill="#f0e6d3" opacity="0.9"/>
    <circle cx="256" cy="256" r="6" fill="#fff"/>
  </g>
</svg>