<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="painterly">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="dropGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="60%" stop-color="#ff4466"/>
      <stop offset="100%" stop-color="#cc2244" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4466" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="64" cy="68" rx="38" ry="42" fill="#ff4466" opacity="0.2" filter="url(#glow)"/>
  <!-- Main droplet -->
  <path d="M64 18 C64 18 30 58 30 78 C30 97 45 112 64 112 C83 112 98 97 98 78 C98 58 64 18 64 18Z" fill="url(#dropGrad)" filter="url(#painterly)"/>
  <!-- Inner highlight -->
  <path d="M64 18 C64 18 30 58 30 78 C30 97 45 112 64 112 C83 112 98 97 98 78 C98 58 64 18 64 18Z" fill="url(#innerGlow)"/>
  <!-- Sword symbol -->
  <g transform="translate(64,72)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="0" y1="-20" x2="0" y2="16"/>
    <line x1="-10" y1="-4" x2="10" y2="-4"/>
    <line x1="-4" y1="16" x2="4" y2="16"/>
    <polygon points="0,-20 -5,-12 5,-12" fill="#ffffff" stroke="none" opacity="0.9"/>
  </g>
  <!-- Red particles -->
  <circle cx="26" cy="50" r="3" fill="#ff6b8a" opacity="0.7" filter="url(#glow)"/>
  <circle cx="100" cy="55" r="2.5" fill="#ff4466" opacity="0.6" filter="url(#glow)"/>
  <circle cx="38" cy="30" r="2" fill="#ff6b8a" opacity="0.5"/>
  <circle cx="90" cy="38" r="2.5" fill="#ff4466" opacity="0.6"/>
  <circle cx="20" cy="72" r="1.8" fill="#ff6b8a" opacity="0.5"/>
  <circle cx="108" cy="75" r="2" fill="#ff4466" opacity="0.4"/>
  <circle cx="48" cy="16" r="1.5" fill="#ff6b8a" opacity="0.4"/>
  <circle cx="80" cy="20" r="1.8" fill="#ff4466" opacity="0.5"/>
</svg>