<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="5" seed="200" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="inkStorm" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="4" seed="150" result="storm"/>
      <feDisplacementMap in="SourceGraphic" in2="storm" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="purpleGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#b388ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crownGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#b388ff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Backgrounds -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#000005"/>
    </linearGradient>
    <radialGradient id="auraGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a0033" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0a0014" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="50%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#000008"/>
    </linearGradient>
    <linearGradient id="brushGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <radialGradient id="eyePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ink-dark background -->
  <rect width="512" height="512" fill="url(#darkBg)"/>

  <!-- Ink storm aura -->
  <g filter="url(#inkStorm)">
    <ellipse cx="256" cy="256" rx="250" ry="250" fill="url(#auraGrad)"/>
    <!-- Storm swirls -->
    <path d="M100 100 Q150 50 220 80 Q280 110 300 60 Q340 20 400 50" stroke="#1a0033" stroke-width="8" fill="none" opacity="0.4"/>
    <path d="M50 300 Q80 250 140 270 Q200 290 230 240" stroke="#1a0033" stroke-width="6" fill="none" opacity="0.3"/>
    <path d="M350 450 Q400 420 420 380 Q440 340 480 330" stroke="#1a0033" stroke-width="7" fill="none" opacity="0.35"/>
    <path d="M60 400 Q100 380 130 410 Q160 440 200 420" stroke="#0a0014" stroke-width="8" fill="none" opacity="0.3"/>
  </g>

  <!-- Massive ink humanoid - fills 1/3 of screen -->
  <g filter="url(#painterly)">
    <!-- Massive torso -->
    <path d="M160 180 Q180 160 256 155 Q330 160 350 180 Q370 220 365 320 Q350 400 310 430 Q270 445 240 445 Q200 440 160 420 Q140 390 145 320 Q148 220 160 180"
          fill="url(#bodyGrad)"/>
    <!-- Head -->
    <ellipse cx="256" cy="120" rx="55" ry="55" fill="#0a0014"/>
    <ellipse cx="256" cy="120" rx="50" ry="50" fill="#1a0033" opacity="0.4"/>
    <!-- Wide shoulders -->
    <ellipse cx="256" cy="185" rx="110" ry="35" fill="#0a0014" opacity="0.9"/>
    <!-- Left arm holding brush -->
    <path d="M155 195 Q110 220 80 270 Q60 310 50 360 Q45 390 40 420"
          stroke="#0a0014" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Right arm holding brush -->
    <path d="M355 195 Q400 220 430 270 Q450 310 460 360 Q465 390 470 420"
          stroke="#0a0014" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Lower body -->
    <path d="M195 430 Q210 480 230 510" stroke="#0a0014" stroke-width="20" fill="none"/>
    <path d="M315 430 Q300 480 280 510" stroke="#0a0014" stroke-width="20" fill="none"/>
  </g>

  <!-- Ink crown -->
  <g filter="url(#crownGlow)">
    <path d="M205 80 L215 45 L230 70 L245 30 L256 65 L267 30 L280 70 L295 45 L305 80"
          stroke="#b388ff" stroke-width="4" fill="none"/>
    <!-- Crown base -->
    <path d="M205 80 Q230 88 256 90 Q280 88 305 80" stroke="#b388ff" stroke-width="3" fill="none"/>
    <!-- Crown inner glow -->
    <path d="M215 75 L225 50 L240 68 L256 38 L272 68 L285 50 L295 75"
          fill="#b388ff" opacity="0.15"/>
  </g>

  <!-- TWO giant brushes in hands -->
  <g filter="url(#painterly)">
    <!-- Left brush - handle -->
    <line x1="40" y1="420" x2="10" y2="500" stroke="url(#brushGrad1)" stroke-width="14" stroke-linecap="round"/>
    <!-- Left brush tip -->
    <ellipse cx="5" cy="508" rx="22" ry="14" fill="#1a0033"/>
    <ellipse cx="5" cy="510" rx="18" ry="10" fill="#b388ff" opacity="0.3"/>
    <!-- Ink drip -->
    <path d="M-8 512 Q-12 520 -8 530" stroke="#1a0033" stroke-width="3" fill="none" opacity="0.6"/>

    <!-- Right brush - handle -->
    <line x1="470" y1="420" x2="500" y2="500" stroke="url(#brushGrad1)" stroke-width="14" stroke-linecap="round"/>
    <!-- Right brush tip -->
    <ellipse cx="505" cy="508" rx="22" ry="14" fill="#1a0033"/>
    <ellipse cx="505" cy="510" rx="18" ry="10" fill="#b388ff" opacity="0.3"/>
    <path d="M518 512 Q522 520 518 530" stroke="#1a0033" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- Glowing purple eyes -->
  <g filter="url(#purpleGlow)">
    <ellipse cx="236" cy="118" rx="12" ry="7" fill="url(#eyePurple)"/>
    <ellipse cx="276" cy="118" rx="12" ry="7" fill="url(#eyePurple)"/>
    <ellipse cx="236" cy="118" rx="5" ry="4" fill="#ffffff"/>
    <ellipse cx="276" cy="118" rx="5" ry="4" fill="#ffffff"/>
  </g>

  <!-- Ink storm particles / splatters -->
  <g filter="url(#inkStorm)" opacity="0.5">
    <circle cx="80" cy="80" r="15" fill="#1a0033"/>
    <circle cx="430" cy="60" r="12" fill="#0a0014"/>
    <circle cx="60" cy="200" r="10" fill="#1a0033"/>
    <circle cx="460" cy="180" r="13" fill="#0a0014"/>
    <circle cx="100" cy="450" r="18" fill="#1a0033"/>
    <circle cx="420" cy="470" r="15" fill="#0a0014"/>
  </g>

  <!-- Purple energy particles -->
  <g filter="url(#purpleGlow)" opacity="0.6">
    <circle cx="120" cy="120" r="3" fill="#b388ff"/>
    <circle cx="400" cy="100" r="2.5" fill="#b388ff"/>
    <circle cx="90" cy="300" r="2" fill="#b388ff"/>
    <circle cx="430" cy="280" r="3" fill="#b388ff"/>
    <circle cx="180" cy="60" r="2" fill="#b388ff"/>
    <circle cx="340" cy="50" r="2.5" fill="#b388ff"/>
    <circle cx="150" cy="460" r="2" fill="#b388ff"/>
    <circle cx="370" cy="480" r="2.5" fill="#b388ff"/>
    <circle cx="256" cy="20" r="3" fill="#b388ff"/>
    <circle cx="50" cy="350" r="2" fill="#b388ff"/>
    <circle cx="470" cy="340" r="2" fill="#b388ff"/>
  </g>
</svg>