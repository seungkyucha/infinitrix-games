<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <filter id="wc" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.04" numOctaves="4" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="paintEdge" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    </filter>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0"/>
      <stop offset="25%" stop-color="#004d5c" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#003845" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#002030" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="bioGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jellyGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#004d5c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Water body -->
  <rect y="180" width="960" height="360" fill="url(#waterGrad)" filter="url(#wc)"/>
  <!-- Wave lines with watercolor distortion -->
  <g filter="url(#paintEdge)" opacity="0.6">
    <path d="M0,260 Q80,240 160,258 T320,250 T480,262 T640,248 T800,260 T960,252" fill="none" stroke="#00e5ff" stroke-width="2" stroke-opacity="0.2"/>
    <path d="M0,300 Q100,282 200,298 T400,290 T600,302 T800,288 T960,296" fill="none" stroke="#004d5c" stroke-width="3" stroke-opacity="0.25"/>
    <path d="M0,340 Q120,318 240,338 T480,328 T720,342 T960,330" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.15"/>
    <path d="M0,380 Q150,362 300,378 T600,370 T960,375" fill="none" stroke="#004d5c" stroke-width="2.5" stroke-opacity="0.2"/>
    <path d="M0,420 Q130,405 260,418 T520,410 T780,422 T960,414" fill="none" stroke="#0a1628" stroke-width="2" stroke-opacity="0.18"/>
  </g>
  <!-- Star reflections on water -->
  <g filter="url(#softBlur)" opacity="0.25">
    <ellipse cx="150" cy="280" rx="50" ry="3" fill="#ffd700"/>
    <ellipse cx="480" cy="270" rx="70" ry="4" fill="#00e5ff"/>
    <ellipse cx="780" cy="290" rx="40" ry="2.5" fill="#ffd700"/>
    <ellipse cx="350" cy="310" rx="30" ry="2" fill="#b388ff"/>
  </g>
  <!-- Bioluminescent spots -->
  <g filter="url(#glow)">
    <circle cx="120" cy="380" r="5" fill="url(#bioGlow)"/>
    <circle cx="340" cy="420" r="3" fill="url(#bioGlow)"/>
    <circle cx="560" cy="360" r="4" fill="url(#bioGlow)"/>
    <circle cx="750" cy="400" r="6" fill="url(#bioGlow)"/>
    <circle cx="880" cy="350" r="3.5" fill="url(#bioGlow)"/>
    <circle cx="200" cy="450" r="2.5" fill="url(#bioGlow)"/>
    <circle cx="650" cy="470" r="4" fill="url(#bioGlow)"/>
  </g>
  <!-- Jellyfish 1 -->
  <g transform="translate(220,340)" filter="url(#glow)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="url(#jellyGlow)"/>
    <path d="M-12,10 Q-14,30 -10,42" fill="none" stroke="#b388ff" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M-4,12 Q-6,35 -2,48" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M4,12 Q6,38 2,50" fill="none" stroke="#b388ff" stroke-width="1.1" stroke-opacity="0.3"/>
    <path d="M12,10 Q14,28 10,40" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.35"/>
  </g>
  <!-- Jellyfish 2 -->
  <g transform="translate(680,310)" filter="url(#glow)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#jellyGlow)"/>
    <path d="M-9,8 Q-11,24 -7,34" fill="none" stroke="#b388ff" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M0,9 Q1,28 -1,38" fill="none" stroke="#00e5ff" stroke-width="0.9" stroke-opacity="0.3"/>
    <path d="M9,8 Q11,22 7,32" fill="none" stroke="#b388ff" stroke-width="0.8" stroke-opacity="0.3"/>
  </g>
  <!-- Jellyfish 3 small -->
  <g transform="translate(450,400)" filter="url(#glow)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="url(#jellyGlow)"/>
    <path d="M-5,4 Q-6,16 -3,22" fill="none" stroke="#00e5ff" stroke-width="0.7" stroke-opacity="0.3"/>
    <path d="M2,5 Q3,18 1,24" fill="none" stroke="#b388ff" stroke-width="0.6" stroke-opacity="0.25"/>
  </g>
</svg>