<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 64">
  <defs>
    <filter id="painterly" x="-5%" y="-15%" width="110%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#b388ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="barBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a3e" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1a0a3e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a0a3e" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b388ff"/>
      <stop offset="20%" stop-color="#f0e6d3"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="80%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <linearGradient id="endDecor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <g filter="url(#painterly)">
    <!-- Background bar -->
    <rect x="40" y="12" width="432" height="40" rx="6" ry="6" fill="url(#barBg)"/>
    <!-- Brushstroke border top -->
    <path d="M42 12 C100 8, 200 14, 256 10 C312 6, 420 14, 470 12" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Brushstroke border bottom -->
    <path d="M42 52 C100 56, 200 50, 256 54 C312 58, 420 50, 470 52" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- HP gauge area (transparent center) -->
    <rect x="60" y="20" width="392" height="24" rx="4" ry="4" fill="#1a0a3e" opacity="0.5"/>
    <!-- Inner border for gauge -->
    <rect x="60" y="20" width="392" height="24" rx="4" ry="4" fill="none" stroke="#b388ff" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Left end decoration -->
  <g filter="url(#glow)">
    <path d="M30 20 C20 24, 16 32, 20 40 C24 48, 34 48, 40 44 L42 32 L40 20 Z" fill="url(#endDecor)" opacity="0.8" filter="url(#painterly)"/>
    <circle cx="30" cy="32" r="4" fill="#f0e6d3" opacity="0.6"/>
    <!-- Left light rays -->
    <line x1="22" y1="28" x2="16" y2="24" stroke="#b388ff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="22" y1="36" x2="16" y2="40" stroke="#b388ff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- Right end decoration -->
  <g filter="url(#glow)">
    <path d="M482 20 C492 24, 496 32, 492 40 C488 48, 478 48, 472 44 L470 32 L472 20 Z" fill="url(#endDecor)" opacity="0.8" filter="url(#painterly)"/>
    <circle cx="482" cy="32" r="4" fill="#f0e6d3" opacity="0.6"/>
    <!-- Right light rays -->
    <line x1="490" y1="28" x2="496" y2="24" stroke="#b388ff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="490" y1="36" x2="496" y2="40" stroke="#b388ff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>