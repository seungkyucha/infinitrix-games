<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <filter id="brushWarp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025 0.015" numOctaves="3" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="petalGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="particleGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb3c6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Close cloud fragments - top left -->
  <g filter="url(#brushWarp)" opacity="0.4">
    <ellipse cx="-30" cy="60" rx="150" ry="55" fill="#ffb3c6" fill-opacity="0.45" filter="url(#softBlur)"/>
    <ellipse cx="40" cy="45" rx="100" ry="35" fill="#ffffff" fill-opacity="0.3" filter="url(#softBlur)"/>
  </g>
  <!-- Close cloud fragment - top right -->
  <g filter="url(#brushWarp)" opacity="0.35">
    <ellipse cx="920" cy="80" rx="130" ry="50" fill="#ffb3c6" fill-opacity="0.4" filter="url(#softBlur)"/>
    <ellipse cx="880" cy="65" rx="90" ry="30" fill="#ffffff" fill-opacity="0.25" filter="url(#softBlur)"/>
  </g>
  <!-- Floating glowing petals -->
  <g filter="url(#glowFilter)">
    <ellipse cx="120" cy="180" rx="8" ry="5" fill="#ffb3c6" fill-opacity="0.7" transform="rotate(-20 120 180)"/>
    <ellipse cx="340" cy="120" rx="6" ry="4" fill="#ffd700" fill-opacity="0.6" transform="rotate(15 340 120)"/>
    <ellipse cx="560" cy="200" rx="7" ry="4" fill="#ffb3c6" fill-opacity="0.65" transform="rotate(-35 560 200)"/>
    <ellipse cx="780" cy="150" rx="9" ry="5" fill="#ffd700" fill-opacity="0.55" transform="rotate(25 780 150)"/>
    <ellipse cx="200" cy="350" rx="6" ry="3" fill="#ffb3c6" fill-opacity="0.5" transform="rotate(-10 200 350)"/>
    <ellipse cx="700" cy="380" rx="7" ry="4" fill="#ffd700" fill-opacity="0.45" transform="rotate(40 700 380)"/>
    <ellipse cx="450" cy="310" rx="5" ry="3" fill="#ffb3c6" fill-opacity="0.55" transform="rotate(-25 450 310)"/>
    <ellipse cx="880" cy="290" rx="8" ry="4" fill="#ffd700" fill-opacity="0.5" transform="rotate(10 880 290)"/>
  </g>
  <!-- Light particles / dust motes -->
  <g>
    <circle cx="80" cy="250" r="3" fill="url(#particleGlow)"/>
    <circle cx="220" cy="150" r="2.5" fill="url(#particleGlow)"/>
    <circle cx="380" cy="280" r="2" fill="url(#petalGlow)"/>
    <circle cx="500" cy="100" r="3" fill="url(#particleGlow)"/>
    <circle cx="620" cy="320" r="2.5" fill="url(#petalGlow)"/>
    <circle cx="750" cy="220" r="2" fill="url(#particleGlow)"/>
    <circle cx="850" cy="400" r="3" fill="url(#petalGlow)"/>
    <circle cx="150" cy="430" r="2" fill="url(#particleGlow)"/>
    <circle cx="480" cy="450" r="2.5" fill="url(#petalGlow)"/>
    <circle cx="300" cy="80" r="1.5" fill="url(#particleGlow)"/>
    <circle cx="680" cy="60" r="2" fill="url(#petalGlow)"/>
    <circle cx="920" cy="180" r="1.5" fill="url(#particleGlow)"/>
    <circle cx="40" cy="380" r="2" fill="url(#petalGlow)"/>
    <circle cx="570" cy="420" r="1.5" fill="url(#particleGlow)"/>
  </g>
  <!-- A few larger sparkle crosses -->
  <g opacity="0.5" stroke="#ffd700" stroke-width="1" stroke-linecap="round">
    <line x1="260" y1="195" x2="260" y2="205"/><line x1="255" y1="200" x2="265" y2="200"/>
    <line x1="640" y1="135" x2="640" y2="145"/><line x1="635" y1="140" x2="645" y2="140"/>
    <line x1="430" y1="375" x2="430" y2="385"/><line x1="425" y1="380" x2="435" y2="380"/>
    <line x1="820" y1="340" x2="820" y2="348"/><line x1="816" y1="344" x2="824" y2="344"/>
  </g>
</svg>