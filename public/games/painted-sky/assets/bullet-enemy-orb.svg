<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="paint" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" seed="40" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="orbG" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4aaff"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#7b2d8b"/>
    </radialGradient>
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7b2d8b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Glow -->
    <circle cx="64" cy="60" r="50" fill="url(#glowG)"/>
    <!-- Ink trail -->
    <ellipse cx="64" cy="102" rx="12" ry="20" fill="#7b2d8b" opacity="0.25"/>
    <ellipse cx="64" cy="112" rx="7" ry="12" fill="#7b2d8b" opacity="0.12"/>
    <!-- Main orb -->
    <circle cx="64" cy="60" r="32" fill="url(#orbG)"/>
    <!-- Internal swirl -->
    <path d="M50 50 Q64 42 74 55 Q84 68 70 75 Q56 82 52 68" stroke="#7b2d8b" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M72 48 Q58 55 55 65 Q52 75 64 72" stroke="#d4aaff" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Highlight -->
    <circle cx="54" cy="50" r="6" fill="#fff" opacity="0.2"/>
  </g>
</svg>