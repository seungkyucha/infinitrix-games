<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb6c1"/>
      <stop offset="30%" stop-color="#ff9100"/>
      <stop offset="60%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glo"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="50" cy="200" r="1"/><circle cx="120" cy="180" r="1.5"/>
    <circle cx="300" cy="190" r="1"/><circle cx="350" cy="210" r="1.2"/>
    <circle cx="80" cy="230" r="0.8"/><circle cx="250" cy="220" r="1.3"/>
  </g>
  <!-- Glow behind player -->
  <ellipse cx="200" cy="165" rx="60" ry="50" fill="url(#glow)"/>
  <!-- Player (Aria) silhouette -->
  <g transform="translate(200,155)">
    <!-- Wings -->
    <path d="M-8,-15 Q-35,-35 -30,-10 Q-28,0 -8,-5Z" fill="#ffd700" opacity="0.7" filter="url(#glo)"/>
    <path d="M8,-15 Q35,-35 30,-10 Q28,0 8,-5Z" fill="#ffd700" opacity="0.7" filter="url(#glo)"/>
    <path d="M-6,-5 Q-28,-15 -25,5 Q-22,10 -6,5Z" fill="#ffd700" opacity="0.5"/>
    <path d="M6,-5 Q28,-15 25,5 Q22,10 6,5Z" fill="#ffd700" opacity="0.5"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="8" ry="14" fill="#f0e6d3"/>
    <!-- Hair -->
    <path d="M-5,-14 Q0,-20 5,-14 Q8,-8 6,-14 Q3,-22 0,-16 Q-3,-22 -6,-14 Q-8,-8 -5,-14Z" fill="#e8e0d0"/>
    <!-- Core glow -->
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.9"/>
  </g>
  <!-- Enemy bullets (petal pattern) -->
  <g opacity="0.8">
    <circle cx="100" cy="100" r="5" fill="#ff6b8a"/><circle cx="130" cy="80" r="4" fill="#ff6b8a"/>
    <circle cx="85" cy="130" r="4.5" fill="#ff6b8a"/><circle cx="155" cy="110" r="3.5" fill="#ff6b8a"/>
    <circle cx="280" cy="90" r="5" fill="#b388ff"/><circle cx="310" cy="120" r="4" fill="#b388ff"/>
    <circle cx="260" cy="130" r="4.5" fill="#b388ff"/><circle cx="330" cy="80" r="3.5" fill="#b388ff"/>
    <circle cx="170" cy="70" r="3" fill="#ff6b8a"/><circle cx="230" cy="75" r="3" fill="#b388ff"/>
  </g>
  <!-- Player bullets -->
  <g opacity="0.9">
    <rect x="197" y="110" width="3" height="12" rx="1" fill="#00e5ff"/>
    <rect x="203" y="115" width="3" height="12" rx="1" fill="#00e5ff"/>
    <rect x="191" y="120" width="3" height="10" rx="1" fill="#00e5ff" opacity="0.7"/>
    <rect x="209" y="120" width="3" height="10" rx="1" fill="#00e5ff" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#f0e6d3" filter="url(#glo)">물들인 하늘</text>
  <text x="200" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b388ff" opacity="0.8">Painted Sky — Bullet Hell</text>
</svg>