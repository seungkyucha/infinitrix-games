<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="grayBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="grayWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#555" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <g filter="url(#painterly)" opacity="0.6">
    <!-- Left upper wing -->
    <path d="M64 58 C50 30, 15 25, 18 50 C20 65, 40 68, 58 62 Z" fill="url(#grayWing)"/>
    <!-- Right upper wing -->
    <path d="M64 58 C78 30, 113 25, 110 50 C108 65, 88 68, 70 62 Z" fill="url(#grayWing)"/>
    <!-- Left lower wing -->
    <path d="M60 66 C45 72, 25 90, 38 95 C48 98, 56 82, 62 70 Z" fill="url(#grayWing)" opacity="0.7"/>
    <!-- Right lower wing -->
    <path d="M68 66 C83 72, 103 90, 90 95 C80 98, 72 82, 66 70 Z" fill="url(#grayWing)" opacity="0.7"/>
    <!-- Wing vein outlines -->
    <path d="M64 58 C55 40, 30 35, 30 48" fill="none" stroke="#555" stroke-width="1" opacity="0.3"/>
    <path d="M64 58 C73 40, 98 35, 98 48" fill="none" stroke="#555" stroke-width="1" opacity="0.3"/>
    <!-- Body -->
    <ellipse cx="64" cy="68" rx="4" ry="14" fill="url(#grayBody)"/>
    <!-- Head -->
    <circle cx="64" cy="52" r="5" fill="#555"/>
    <circle cx="64" cy="52" r="3" fill="#666" opacity="0.5"/>
    <!-- Antennae -->
    <path d="M62 48 C58 38, 50 34, 48 36" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M66 48 C70 38, 78 34, 80 36" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="48" cy="36" r="2.5" fill="#666" opacity="0.4"/>
    <circle cx="80" cy="36" r="2.5" fill="#666" opacity="0.4"/>
  </g>
</svg>