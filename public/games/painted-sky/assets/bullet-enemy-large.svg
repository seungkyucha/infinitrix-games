<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="paint" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" seed="60" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vortexG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4aaff"/>
      <stop offset="40%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </radialGradient>
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a3e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Outer glow -->
    <circle cx="128" cy="128" r="120" fill="url(#glowG)"/>
    <!-- Main vortex sphere -->
    <circle cx="128" cy="128" r="80" fill="url(#vortexG)"/>
    <!-- Swirl patterns -->
    <path d="M128 128 Q160 80 180 100 Q200 120 170 140 Q140 160 128 128" stroke="#1a0a3e" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M128 128 Q96 176 76 156 Q56 136 86 116 Q116 96 128 128" stroke="#1a0a3e" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M128 128 Q150 100 168 118 Q186 136 158 152 Q130 168 128 128" stroke="#b388ff" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Orbiting fragments -->
    <circle cx="48" cy="90" r="10" fill="#1a0a3e" opacity="0.7"/>
    <circle cx="48" cy="90" r="6" fill="#b388ff" opacity="0.4"/>
    <circle cx="200" cy="170" r="12" fill="#1a0a3e" opacity="0.7"/>
    <circle cx="200" cy="170" r="7" fill="#b388ff" opacity="0.4"/>
    <circle cx="180" cy="60" r="8" fill="#1a0a3e" opacity="0.6"/>
    <circle cx="180" cy="60" r="4" fill="#b388ff" opacity="0.35"/>
    <circle cx="70" cy="190" r="9" fill="#1a0a3e" opacity="0.65"/>
    <circle cx="70" cy="190" r="5" fill="#b388ff" opacity="0.35"/>
    <!-- Core -->
    <circle cx="128" cy="128" r="18" fill="#b388ff" opacity="0.6"/>
    <circle cx="128" cy="128" r="8" fill="#d4aaff" opacity="0.8"/>
  </g>
</svg>