<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="painterly">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="dropGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="60%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0097a7" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="64" cy="68" rx="38" ry="42" fill="#00e5ff" opacity="0.2" filter="url(#glow)"/>
  <!-- Main droplet -->
  <path d="M64 18 C64 18 30 58 30 78 C30 97 45 112 64 112 C83 112 98 97 98 78 C98 58 64 18 64 18Z" fill="url(#dropGrad)" filter="url(#painterly)"/>
  <!-- Inner highlight -->
  <path d="M64 18 C64 18 30 58 30 78 C30 97 45 112 64 112 C83 112 98 97 98 78 C98 58 64 18 64 18Z" fill="url(#innerGlow)"/>
  <!-- Shield symbol -->
  <g transform="translate(64,72)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M0,-20 L-14,-10 L-14,4 C-14,14 0,22 0,22 C0,22 14,14 14,4 L14,-10 Z" fill="#ffffff" fill-opacity="0.2"/>
    <path d="M0,-20 L-14,-10 L-14,4 C-14,14 0,22 0,22 C0,22 14,14 14,4 L14,-10 Z"/>
  </g>
  <!-- Blue particles -->
  <circle cx="24" cy="48" r="3" fill="#4fc3f7" opacity="0.7" filter="url(#glow)"/>
  <circle cx="102" cy="52" r="2.5" fill="#00e5ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="36" cy="28" r="2" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="92" cy="36" r="2.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="18" cy="70" r="1.8" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="110" cy="73" r="2" fill="#00e5ff" opacity="0.4"/>
  <circle cx="46" cy="14" r="1.5" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="82" cy="18" r="1.8" fill="#00e5ff" opacity="0.5"/>
</svg>