<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="4" seed="73" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="5" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.5" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="displaced"/>
      </feMerge>
    </filter>
    <filter id="edgeBleed">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <radialGradient id="inkCenter" cx="45%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1b2838" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#1b2838" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Blurred edge bleed -->
  <g filter="url(#edgeBleed)" opacity="0.4">
    <ellipse cx="33" cy="34" rx="20" ry="18" fill="#0d1b2a"/>
  </g>
  <!-- Main ink droplet body -->
  <g filter="url(#inkBlur)">
    <path d="M32,12 Q44,14 48,24 Q52,34 46,42 Q42,50 34,52 Q24,54 18,46 Q12,38 14,28 Q16,18 24,13 Q28,11 32,12Z" fill="url(#inkCenter)"/>
  </g>
  <!-- Secondary smaller blob -->
  <g filter="url(#inkBlur)" opacity="0.6">
    <path d="M42,38 Q48,36 50,42 Q52,48 46,50 Q40,50 40,44 Q39,40 42,38Z" fill="#0d1b2a"/>
  </g>
  <!-- Tiny satellite drops -->
  <g filter="url(#edgeBleed)" opacity="0.5">
    <circle cx="50" cy="20" r="2.5" fill="#1b2838"/>
    <circle cx="16" cy="48" r="2" fill="#0d1b2a"/>
    <circle cx="46" cy="52" r="1.8" fill="#1b2838"/>
  </g>
</svg>