<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 128">
  <defs>
    <filter id="bb"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="bs"><feGaussianBlur stdDeviation="1.5"/></filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffd700" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Frame 1: small golden core -->
  <g transform="translate(64,64)">
    <circle r="8" fill="#ffd700" opacity=".9" filter="url(#bb)"/>
    <circle r="4" fill="#fff" opacity=".8"/>
  </g>
  <!-- Frame 2: ring emerging -->
  <g transform="translate(192,64)">
    <circle r="18" fill="none" stroke="#ffd700" stroke-width="6" opacity=".8" filter="url(#bs)"/>
    <circle r="6" fill="#ffd700" opacity=".7" filter="url(#bb)"/>
    <circle r="3" fill="#fff" opacity=".6"/>
  </g>
  <!-- Frame 3: ring expanding, sparks -->
  <g transform="translate(320,64)">
    <circle r="30" fill="none" stroke="#ffd700" stroke-width="5" opacity=".7" filter="url(#bs)"/>
    <circle r="10" fill="url(#bg)" opacity=".5"/>
    <circle cx="25" cy="-15" r="2" fill="#fff" opacity=".8"/>
    <circle cx="-20" cy="20" r="2" fill="#fff" opacity=".7"/>
    <circle cx="10" cy="28" r="1.5" fill="#ffd700" opacity=".9"/>
  </g>
  <!-- Frame 4: large ring, fading core -->
  <g transform="translate(448,64)">
    <circle r="40" fill="none" stroke="#ffd700" stroke-width="4" opacity=".55" filter="url(#bs)"/>
    <circle r="20" fill="none" stroke="#ffd700" stroke-width="2" opacity=".3" filter="url(#bb)"/>
    <circle cx="-30" cy="-10" r="2" fill="#fff" opacity=".6"/>
    <circle cx="28" cy="18" r="1.5" fill="#fff" opacity=".5"/>
    <circle cx="-5" cy="-35" r="1.5" fill="#ffd700" opacity=".7"/>
    <circle cx="15" cy="32" r="1" fill="#ffd700" opacity=".6"/>
  </g>
  <!-- Frame 5: dissipating -->
  <g transform="translate(576,64)">
    <circle r="50" fill="none" stroke="#ffd700" stroke-width="2.5" opacity=".35" filter="url(#bb)"/>
    <circle r="30" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".2" filter="url(#bb)"/>
    <circle cx="35" cy="-25" r="1.5" fill="#fff" opacity=".4"/>
    <circle cx="-38" cy="15" r="1" fill="#ffd700" opacity=".4"/>
    <circle cx="10" cy="40" r="1" fill="#fff" opacity=".3"/>
  </g>
  <!-- Frame 6: nearly gone -->
  <g transform="translate(704,64)">
    <circle r="55" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".15" filter="url(#bb)"/>
    <circle cx="20" cy="-30" r="1" fill="#fff" opacity=".2"/>
    <circle cx="-25" cy="25" r="1" fill="#ffd700" opacity=".15"/>
  </g>
</svg>