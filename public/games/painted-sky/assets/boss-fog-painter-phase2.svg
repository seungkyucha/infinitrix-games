<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="23" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="vortex" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="4" seed="42" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="25" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="crimsonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#dc143c" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inkDistort">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="99" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8"/>
    </filter>
    <!-- Ink vortex gradient -->
    <radialGradient id="vortexCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8b008b"/>
      <stop offset="40%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="darkAura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a0a3e" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="brushDark1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0a4e"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="brushDark2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1a5e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <radialGradient id="eyeRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#dc143c"/>
      <stop offset="100%" stop-color="#dc143c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="url(#darkAura)"/>

  <!-- Spinning ink vortex behind figure -->
  <g filter="url(#vortex)">
    <ellipse cx="256" cy="256" rx="230" ry="230" fill="url(#vortexCenter)" opacity="0.7"/>
    <!-- Vortex spiral arms -->
    <path d="M256 256 Q180 180 120 200 Q60 230 80 300 Q100 370 180 380 Q250 385 256 256" fill="#8b008b" opacity="0.3"/>
    <path d="M256 256 Q330 180 390 210 Q440 250 420 330 Q390 400 310 390 Q260 380 256 256" fill="#1a0a3e" opacity="0.4"/>
    <path d="M256 256 Q200 300 160 370 Q140 420 200 450 Q270 460 300 400 Q320 340 256 256" fill="#8b008b" opacity="0.25"/>
    <path d="M256 256 Q310 200 370 150 Q410 120 430 170 Q440 230 380 260 Q320 280 256 256" fill="#1a0a3e" opacity="0.35"/>
  </g>

  <!-- Revealed dark figure - clearer than phase 1 -->
  <g filter="url(#painterly)">
    <!-- Dark body -->
    <ellipse cx="256" cy="240" rx="65" ry="80" fill="#1a0a3e" opacity="0.9"/>
    <!-- Head -->
    <ellipse cx="256" cy="150" rx="42" ry="48" fill="#1a0a3e"/>
    <!-- Shoulders wide and aggressive -->
    <ellipse cx="256" cy="200" rx="90" ry="32" fill="#1a0a3e" opacity="0.85"/>
    <!-- Left arm with brush -->
    <path d="M175 205 Q140 250 120 300 Q110 330 100 360" stroke="#1a0a3e" stroke-width="14" fill="none"/>
    <!-- Right arm with brush -->
    <path d="M340 205 Q375 245 395 295 Q405 325 415 355" stroke="#1a0a3e" stroke-width="14" fill="none"/>
    <!-- Lower body -->
    <path d="M200 300 Q220 400 256 430 Q290 400 310 300" fill="#1a0a3e" opacity="0.7"/>
  </g>

  <!-- TWO brushes -->
  <g filter="url(#inkDistort)">
    <!-- Left brush -->
    <line x1="100" y1="360" x2="50" y2="470" stroke="url(#brushDark1)" stroke-width="12" stroke-linecap="round"/>
    <ellipse cx="45" cy="478" rx="20" ry="14" fill="#8b008b"/>
    <ellipse cx="45" cy="482" rx="16" ry="10" fill="#dc143c" opacity="0.7"/>
    <!-- Ink dripping -->
    <path d="M35 488 Q30 500 35 512" stroke="#8b008b" stroke-width="3" fill="none"/>
    <path d="M50 490 Q55 505 50 512" stroke="#dc143c" stroke-width="2" fill="none"/>

    <!-- Right brush -->
    <line x1="415" y1="355" x2="460" y2="465" stroke="url(#brushDark2)" stroke-width="12" stroke-linecap="round"/>
    <ellipse cx="465" cy="473" rx="20" ry="14" fill="#8b008b"/>
    <ellipse cx="465" cy="477" rx="16" ry="10" fill="#dc143c" opacity="0.7"/>
    <path d="M455 483 Q450 500 455 512" stroke="#8b008b" stroke-width="3" fill="none"/>
    <path d="M470 485 Q475 502 472 512" stroke="#dc143c" stroke-width="2" fill="none"/>
  </g>

  <!-- Violent ink splashes -->
  <g filter="url(#vortex)" opacity="0.5">
    <circle cx="100" cy="150" r="30" fill="#8b008b"/>
    <circle cx="420" cy="120" r="25" fill="#1a0a3e"/>
    <circle cx="80" cy="400" r="35" fill="#dc143c" opacity="0.3"/>
    <circle cx="440" cy="380" r="28" fill="#8b008b" opacity="0.4"/>
    <path d="M200 80 Q230 60 260 80 Q240 100 200 80" fill="#dc143c" opacity="0.4"/>
    <path d="M350 90 Q380 70 400 95 Q375 110 350 90" fill="#8b008b" opacity="0.4"/>
  </g>

  <!-- Crimson eyes - aggressive -->
  <g filter="url(#crimsonGlow)">
    <ellipse cx="238" cy="145" rx="10" ry="6" fill="url(#eyeRed)"/>
    <ellipse cx="274" cy="145" rx="10" ry="6" fill="url(#eyeRed)"/>
    <ellipse cx="238" cy="145" rx="5" ry="3" fill="#ffffff"/>
    <ellipse cx="274" cy="145" rx="5" ry="3" fill="#ffffff"/>
    <!-- Angry eye shape - narrow slits -->
    <path d="M225 142 L238 138 L251 142" stroke="#dc143c" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M261 142 L274 138 L287 142" stroke="#dc143c" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Dark energy particles -->
  <g filter="url(#crimsonGlow)" opacity="0.6">
    <circle cx="150" cy="170" r="3" fill="#dc143c"/>
    <circle cx="370" cy="180" r="2.5" fill="#8b008b"/>
    <circle cx="200" cy="100" r="2" fill="#dc143c"/>
    <circle cx="320" cy="90" r="3" fill="#8b008b"/>
    <circle cx="130" cy="300" r="2" fill="#dc143c"/>
    <circle cx="390" cy="280" r="2.5" fill="#8b008b"/>
    <circle cx="180" cy="420" r="2" fill="#dc143c"/>
    <circle cx="340" cy="440" r="3" fill="#8b008b"/>
  </g>
</svg>