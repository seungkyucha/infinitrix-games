<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128">
  <defs>
    <filter id="eb"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="es"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Frame 1: ink splatter burst -->
  <g transform="translate(64,64)">
    <ellipse rx="14" ry="12" fill="#1b2838" opacity=".85" filter="url(#es)"/>
    <ellipse cx="-8" cy="5" rx="8" ry="6" fill="#b388ff" opacity=".7" filter="url(#es)"/>
    <ellipse cx="10" cy="-6" rx="6" ry="9" fill="#0d1b2a" opacity=".8" filter="url(#es)"/>
    <circle cx="5" cy="10" r="3" fill="#b388ff" opacity=".6"/>
  </g>
  <!-- Frame 2: fragments separating -->
  <g transform="translate(192,64)">
    <ellipse cx="-15" cy="-10" rx="10" ry="7" fill="#1b2838" opacity=".7" filter="url(#eb)"/>
    <ellipse cx="18" cy="8" rx="8" ry="10" fill="#0d1b2a" opacity=".65" filter="url(#eb)"/>
    <ellipse cx="-5" cy="18" rx="7" ry="5" fill="#b388ff" opacity=".55" filter="url(#es)"/>
    <circle cx="12" cy="-18" r="4" fill="#b388ff" opacity=".5" filter="url(#es)"/>
    <circle cx="-20" cy="5" r="3" fill="#0d1b2a" opacity=".5"/>
  </g>
  <!-- Frame 3: dissolving -->
  <g transform="translate(320,64)">
    <ellipse cx="-25" cy="-18" rx="8" ry="5" fill="#1b2838" opacity=".4" filter="url(#eb)"/>
    <ellipse cx="25" cy="15" rx="6" ry="8" fill="#0d1b2a" opacity=".35" filter="url(#eb)"/>
    <circle cx="-10" cy="28" r="4" fill="#b388ff" opacity=".3" filter="url(#eb)"/>
    <circle cx="18" cy="-25" r="3" fill="#b388ff" opacity=".3" filter="url(#eb)"/>
    <circle cx="-30" cy="10" r="2" fill="#1b2838" opacity=".25" filter="url(#eb)"/>
    <circle cx="8" cy="30" r="2" fill="#0d1b2a" opacity=".2"/>
  </g>
  <!-- Frame 4: evaporated -->
  <g transform="translate(448,64)">
    <circle cx="-30" cy="-22" r="3" fill="#1b2838" opacity=".15" filter="url(#eb)"/>
    <circle cx="32" cy="20" r="2.5" fill="#0d1b2a" opacity=".12" filter="url(#eb)"/>
    <circle cx="-15" cy="35" r="2" fill="#b388ff" opacity=".1" filter="url(#eb)"/>
    <circle cx="22" cy="-30" r="1.5" fill="#b388ff" opacity=".08" filter="url(#eb)"/>
  </g>
</svg>