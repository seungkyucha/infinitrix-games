<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <filter id="waterWarp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.06" numOctaves="3" seed="22" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="brushEdge">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5"/>
    </filter>
    <linearGradient id="nearWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d5c" stop-opacity="0"/>
      <stop offset="20%" stop-color="#006070" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#004050" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#002838" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="creatureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seaweed1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d3a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#001a12" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Near water surface -->
  <rect y="120" width="960" height="420" fill="url(#nearWater)" filter="url(#waterWarp)"/>
  <!-- Large wave forms -->
  <g filter="url(#brushEdge)" opacity="0.7">
    <path d="M-20,200 Q60,170 160,195 T360,180 T540,200 T720,178 T900,198 T980,185" fill="none" stroke="#00e5ff" stroke-width="3" stroke-opacity="0.2" stroke-linecap="round"/>
    <path d="M-20,240 Q80,215 180,238 T380,225 T580,242 T780,220 T980,235" fill="none" stroke="silver" stroke-width="2" stroke-opacity="0.15" stroke-linecap="round"/>
    <path d="M-20,280 Q100,258 200,276 T420,265 T620,282 T820,260 T980,275" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-opacity="0.18" stroke-linecap="round"/>
    <path d="M-20,320 Q90,300 200,318 T440,305 T660,322 T860,302 T980,315" fill="none" stroke="silver" stroke-width="1.8" stroke-opacity="0.12" stroke-linecap="round"/>
    <path d="M-20,360 Q110,342 220,358 T460,346 T700,362 T980,350" fill="none" stroke="#006080" stroke-width="3" stroke-opacity="0.2" stroke-linecap="round"/>
  </g>
  <!-- Silver light reflections -->
  <g filter="url(#softBlur2)" opacity="0.3">
    <ellipse cx="100" cy="210" rx="80" ry="5" fill="silver"/>
    <ellipse cx="400" cy="250" rx="100" ry="6" fill="#c0e8f0"/>
    <ellipse cx="700" cy="230" rx="60" ry="4" fill="silver"/>
    <ellipse cx="250" cy="300" rx="50" ry="3" fill="#00e5ff"/>
    <ellipse cx="820" cy="280" rx="70" ry="4.5" fill="#c0e8f0"/>
  </g>
  <!-- Seaweed silhouettes -->
  <g filter="url(#brushEdge)">
    <path d="M80,540 Q75,480 85,440 Q78,400 90,370 Q82,350 88,330" fill="none" stroke="url(#seaweed1)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <path d="M95,540 Q100,490 92,460 Q98,430 90,405" fill="none" stroke="url(#seaweed1)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M300,540 Q295,500 305,470 Q298,440 308,415 Q300,395 306,380" fill="none" stroke="url(#seaweed1)" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
    <path d="M315,540 Q320,505 312,475 Q318,450 310,430" fill="none" stroke="url(#seaweed1)" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M700,540 Q695,490 705,455 Q698,425 708,395" fill="none" stroke="url(#seaweed1)" stroke-width="5.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M720,540 Q725,500 718,470 Q722,445 715,420 Q720,400 716,385" fill="none" stroke="url(#seaweed1)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M900,540 Q895,495 905,460 Q898,435 906,410" fill="none" stroke="url(#seaweed1)" stroke-width="4.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Glowing sea creatures -->
  <g filter="url(#glow2)">
    <circle cx="180" cy="380" r="4" fill="url(#creatureGlow)"/>
    <circle cx="185" cy="382" r="1.5" fill="#00e5ff" opacity="0.8"/>
    <circle cx="450" cy="350" r="5" fill="url(#creatureGlow)"/>
    <circle cx="456" cy="352" r="2" fill="#00e5ff" opacity="0.9"/>
    <circle cx="600" cy="420" r="3.5" fill="url(#creatureGlow)"/>
    <circle cx="604" cy="421" r="1.2" fill="#00e5ff" opacity="0.8"/>
    <circle cx="840" cy="370" r="4.5" fill="url(#creatureGlow)"/>
    <circle cx="845" cy="372" r="1.8" fill="#00e5ff" opacity="0.85"/>
  </g>
  <!-- Small light motes floating -->
  <g filter="url(#softBlur2)" opacity="0.5">
    <circle cx="140" cy="260" r="2" fill="#ffd700"/>
    <circle cx="380" cy="300" r="1.5" fill="#00e5ff"/>
    <circle cx="520" cy="240" r="1.8" fill="#ffd700"/>
    <circle cx="660" cy="310" r="2.2" fill="#00e5ff"/>
    <circle cx="800" cy="250" r="1.5" fill="#ffd700"/>
    <circle cx="250" cy="350" r="1.2" fill="#b388ff"/>
    <circle cx="550" cy="380" r="1.8" fill="#b388ff"/>
  </g>
</svg>