<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerSwirl">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="7" result="swirl"/>
      <feDisplacementMap in="SourceGraphic" in2="swirl" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#f0e6d3"/>
      <stop offset="70%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#808080" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f0e6d3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c0c0c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0c0c0" stop-opacity="0"/>
      <stop offset="70%" stop-color="#c0c0c0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <!-- Outer aura glow -->
  <circle cx="64" cy="68" r="48" fill="url(#outerAura)" filter="url(#glow)"/>
  <g filter="url(#painterly)">
    <!-- Main sphere -->
    <circle cx="64" cy="68" r="34" fill="url(#sphereGrad)"/>
    <!-- Inner swirling radiance -->
    <g filter="url(#innerSwirl)" opacity="0.6">
      <circle cx="64" cy="68" r="26" fill="url(#innerGlow)"/>
    </g>
    <!-- Surface highlight arcs -->
    <path d="M48 52 C52 44, 62 40, 72 44" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <path d="M50 56 C54 50, 60 48, 66 50" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <!-- Inner swirl lines -->
    <path d="M52 68 C56 58, 68 60, 72 68 C76 76, 64 80, 56 74" fill="none" stroke="#f0e6d3" stroke-width="1" opacity="0.35"/>
    <path d="M58 62 C62 56, 72 58, 74 66" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <!-- Bottom reflection -->
    <ellipse cx="64" cy="90" rx="20" ry="4" fill="#c0c0c0" opacity="0.12"/>
  </g>
  <!-- Sparkle points -->
  <circle cx="52" cy="50" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="78" cy="60" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="60" cy="44" r="1" fill="#ffffff" opacity="0.5"/>
</svg>