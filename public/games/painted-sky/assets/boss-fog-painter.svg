<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Painterly texture filter -->
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="fogFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="7" result="fog"/>
      <feDisplacementMap in="SourceGraphic" in2="fog" scale="20" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Fog gradients -->
    <radialGradient id="fogPink" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffb3c6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffb3c6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffb3c6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fogBlue" cx="70%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#87ceeb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#d4c5b0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a89880" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="brushGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d3"/>
      <stop offset="40%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#5c4033"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background atmosphere -->
  <rect width="512" height="512" fill="#2a1f2d" opacity="0.3"/>

  <!-- Swirling fog layers -->
  <g filter="url(#fogFilter)">
    <ellipse cx="180" cy="260" rx="200" ry="180" fill="url(#fogPink)"/>
    <ellipse cx="340" cy="280" rx="190" ry="170" fill="url(#fogBlue)"/>
    <ellipse cx="256" cy="320" rx="220" ry="140" fill="url(#fogPink)" opacity="0.5"/>
    <ellipse cx="150" cy="350" rx="160" ry="100" fill="url(#fogBlue)" opacity="0.6"/>
    <ellipse cx="370" cy="200" rx="140" ry="120" fill="url(#fogPink)" opacity="0.4"/>
  </g>

  <!-- Misty humanoid silhouette -->
  <g filter="url(#painterly)">
    <!-- Body mass - vague humanoid shape -->
    <ellipse cx="256" cy="220" rx="60" ry="70" fill="url(#bodyGrad)"/>
    <!-- Head -->
    <ellipse cx="256" cy="145" rx="40" ry="45" fill="#f0e6d3" opacity="0.15"/>
    <!-- Shoulders -->
    <ellipse cx="256" cy="200" rx="80" ry="30" fill="#f0e6d3" opacity="0.12"/>
    <!-- Left arm holding brush -->
    <path d="M200 200 Q170 250 160 310 Q155 330 165 340" stroke="#f0e6d3" stroke-width="8" fill="none" opacity="0.2"/>
    <!-- Right arm extended -->
    <path d="M310 200 Q340 240 350 280" stroke="#f0e6d3" stroke-width="7" fill="none" opacity="0.15"/>
    <!-- Lower body fading into fog -->
    <ellipse cx="256" cy="310" rx="70" ry="90" fill="#f0e6d3" opacity="0.08"/>
  </g>

  <!-- Giant brush in left hand -->
  <g filter="url(#painterly)">
    <!-- Brush handle -->
    <line x1="165" y1="335" x2="100" y2="460" stroke="url(#brushGrad)" stroke-width="10" stroke-linecap="round"/>
    <!-- Brush tip -->
    <ellipse cx="95" cy="468" rx="18" ry="12" fill="#ffb3c6" opacity="0.9"/>
    <ellipse cx="95" cy="472" rx="14" ry="8" fill="#87ceeb" opacity="0.7"/>
    <!-- Paint dripping from brush -->
    <path d="M85 475 Q83 490 88 500" stroke="#ffb3c6" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M100 478 Q103 495 98 505" stroke="#87ceeb" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Watercolor swirls around the figure -->
  <g filter="url(#fogFilter)" opacity="0.6">
    <path d="M150 180 Q120 150 140 120 Q180 90 220 110 Q240 130 220 160" stroke="#ffb3c6" stroke-width="6" fill="none"/>
    <path d="M300 170 Q340 130 370 150 Q390 180 360 210 Q330 220 310 200" stroke="#87ceeb" stroke-width="5" fill="none"/>
    <path d="M180 300 Q140 280 130 310 Q125 350 160 360 Q190 355 185 320" stroke="#ffb3c6" stroke-width="4" fill="none" opacity="0.5"/>
    <path d="M330 260 Q370 240 380 270 Q385 310 350 320" stroke="#87ceeb" stroke-width="5" fill="none" opacity="0.5"/>
  </g>

  <!-- Additional fog wisps -->
  <g filter="url(#fogFilter)" opacity="0.4">
    <ellipse cx="200" cy="400" rx="120" ry="50" fill="#ffb3c6"/>
    <ellipse cx="320" cy="420" rx="100" ry="40" fill="#87ceeb"/>
    <ellipse cx="256" cy="100" rx="80" ry="40" fill="#f0e6d3" opacity="0.3"/>
  </g>

  <!-- Glowing eyes - the only clearly visible feature -->
  <g filter="url(#glow)">
    <ellipse cx="240" cy="140" rx="8" ry="5" fill="url(#eyeGlow)"/>
    <ellipse cx="272" cy="140" rx="8" ry="5" fill="url(#eyeGlow)"/>
    <!-- Eye core -->
    <ellipse cx="240" cy="140" rx="4" ry="3" fill="#ffffff"/>
    <ellipse cx="272" cy="140" rx="4" ry="3" fill="#ffffff"/>
  </g>

  <!-- Mystical particles -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="130" cy="180" r="2" fill="#ffb3c6"/>
    <circle cx="380" cy="200" r="2.5" fill="#87ceeb"/>
    <circle cx="200" cy="120" r="1.5" fill="#f0e6d3"/>
    <circle cx="310" cy="100" r="2" fill="#ffb3c6"/>
    <circle cx="170" cy="260" r="1.5" fill="#87ceeb"/>
    <circle cx="350" cy="310" r="2" fill="#ffb3c6"/>
    <circle cx="120" cy="350" r="1.5" fill="#f0e6d3"/>
    <circle cx="400" cy="160" r="2" fill="#87ceeb"/>
  </g>
</svg>