<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="fragGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Central glow -->
  <circle cx="32" cy="32" r="16" fill="url(#fragGrad)" filter="url(#glow)"/>
  <!-- Light fragments cluster -->
  <g filter="url(#glow)">
    <polygon points="32,18 34,28 32,26 30,28" fill="#ffeb3b" opacity="0.9"/>
    <polygon points="42,26 36,30 38,28 34,28" fill="#ffd700" opacity="0.85"/>
    <polygon points="44,36 36,34 38,32 36,30" fill="#ffeb3b" opacity="0.8"/>
    <polygon points="38,44 34,36 36,36 36,34" fill="#ffd700" opacity="0.85"/>
    <polygon points="28,44 30,36 32,38 34,36" fill="#ffeb3b" opacity="0.8"/>
    <polygon points="20,36 28,34 26,32 28,30" fill="#ffd700" opacity="0.85"/>
    <polygon points="22,26 28,30 26,28 28,28" fill="#ffeb3b" opacity="0.8"/>
  </g>
  <!-- Sparkle points -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="32" cy="22" r="1.5"/>
    <circle cx="40" cy="28" r="1.2"/>
    <circle cx="38" cy="38" r="1"/>
    <circle cx="28" cy="40" r="1.3"/>
    <circle cx="24" cy="30" r="1.1"/>
  </g>
  <!-- Pastel sparkle accents -->
  <circle cx="36" cy="24" r="0.8" fill="#ffe0ec" opacity="0.7"/>
  <circle cx="26" cy="36" r="0.8" fill="#e0f0ff" opacity="0.7"/>
  <circle cx="36" cy="36" r="0.7" fill="#e8ffe0" opacity="0.6"/>
</svg>