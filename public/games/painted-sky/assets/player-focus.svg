<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Painterly texture filter -->
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="painterly-fine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Intense glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-intense">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-orb">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Focus mode body glow (brighter) -->
    <radialGradient id="bodyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#f0e6d3" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <!-- Brighter wing gradients for focus -->
    <linearGradient id="wingGoldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffe566" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="wingGoldR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffe566" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="robeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0e6d3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Focus orb gradient -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Concentration rings -->
    <radialGradient id="focusRing" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="85%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="90%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atmosphere" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Atmospheric glow (brighter in focus) -->
  <ellipse cx="256" cy="250" rx="280" ry="270" fill="url(#atmosphere)"/>

  <!-- Concentration rings around character -->
  <ellipse cx="256" cy="280" rx="160" ry="165" fill="url(#focusRing)" opacity="0.6"/>
  <ellipse cx="256" cy="280" rx="120" ry="125" fill="url(#focusRing)" opacity="0.4"/>

  <!-- Body glow (intensified) -->
  <ellipse cx="256" cy="265" rx="130" ry="150" fill="url(#bodyGlow)" filter="url(#glow-intense)"/>

  <!-- === WINGS (brighter, more expanded) === -->
  <g filter="url(#painterly)">
    <!-- Top pair -->
    <path d="M256 200 C205 115, 90 90, 68 155 C50 200, 115 235, 180 222 C202 217, 240 210, 256 200Z" fill="url(#wingGoldL)" opacity="0.9"/>
    <path d="M256 200 C307 115, 422 90, 444 155 C462 200, 397 235, 332 222 C310 217, 272 210, 256 200Z" fill="url(#wingGoldR)" opacity="0.9"/>
    <!-- Middle pair -->
    <path d="M256 240 C218 175, 110 178, 95 225 C83 260, 145 280, 198 262 C224 253, 248 245, 256 240Z" fill="url(#wingGoldL)" opacity="0.8"/>
    <path d="M256 240 C294 175, 402 178, 417 225 C429 260, 367 280, 314 262 C288 253, 264 245, 256 240Z" fill="url(#wingGoldR)" opacity="0.8"/>
    <!-- Bottom pair -->
    <path d="M256 280 C233 238, 148 245, 142 282 C138 305, 185 315, 223 298 C242 290, 252 284, 256 280Z" fill="url(#wingGoldL)" opacity="0.7"/>
    <path d="M256 280 C279 238, 364 245, 370 282 C374 305, 327 315, 289 298 C270 290, 260 284, 256 280Z" fill="url(#wingGoldR)" opacity="0.7"/>
  </g>

  <!-- Wing veins -->
  <g stroke="#ffe566" stroke-width="1" fill="none" opacity="0.55" filter="url(#painterly-fine)">
    <path d="M256 200 C215 150, 130 130, 90 158"/>
    <path d="M256 200 C195 155, 125 165, 100 188"/>
    <path d="M256 200 C297 150, 382 130, 422 158"/>
    <path d="M256 200 C317 155, 387 165, 412 188"/>
  </g>

  <!-- === HAIR flowing upward === -->
  <g filter="url(#painterly)">
    <path d="M228 180 C222 125, 205 72, 188 32 C185 22, 195 20, 205 48 C215 78, 224 125, 230 168Z" fill="url(#hairGrad)" opacity="0.7"/>
    <path d="M244 174 C241 115, 237 62, 248 18 C250 8, 257 12, 254 35 C248 75, 245 125, 246 168Z" fill="url(#hairGrad)" opacity="0.8"/>
    <path d="M262 174 C264 110, 270 58, 262 15 C260 5, 254 9, 258 35 C264 75, 264 125, 263 168Z" fill="url(#hairGrad)" opacity="0.75"/>
    <path d="M278 178 C284 120, 296 68, 312 28 C315 18, 306 16, 300 42 C290 72, 280 122, 276 168Z" fill="url(#hairGrad)" opacity="0.65"/>
    <ellipse cx="256" cy="185" rx="34" ry="24" fill="url(#hairGrad)" opacity="0.85"/>
  </g>

  <!-- === BODY (hands clasped at chest) === -->
  <g filter="url(#painterly)">
    <!-- Head -->
    <ellipse cx="256" cy="205" rx="22" ry="26" fill="url(#robeGrad)"/>
    <!-- Neck -->
    <rect x="249" y="228" width="14" height="12" rx="5" fill="url(#robeGrad)" opacity="0.8"/>
    <!-- Torso -->
    <path d="M234 238 C230 250, 227 280, 230 310 L282 310 C285 280, 282 250, 278 238 Z" fill="url(#robeGrad)"/>
    <!-- Arms clasped at chest -->
    <path d="M234 250 C222 256, 215 264, 220 272 C225 278, 238 275, 245 270 L248 268Z" fill="url(#robeGrad)" opacity="0.75"/>
    <path d="M278 250 C290 256, 297 264, 292 272 C287 278, 274 275, 267 270 L264 268Z" fill="url(#robeGrad)" opacity="0.75"/>
    <!-- Clasped hands -->
    <ellipse cx="256" cy="272" rx="14" ry="8" fill="url(#robeGrad)" opacity="0.85"/>
    <!-- Robe skirt -->
    <path d="M230 310 C222 350, 212 400, 204 450 C202 460, 218 464, 232 454 C242 447, 252 458, 256 460 C260 458, 270 447, 280 454 C294 464, 310 460, 308 450 C300 400, 290 350, 282 310 Z" fill="url(#robeGrad)" opacity="0.7"/>
  </g>

  <!-- Face (eyes closed in concentration) -->
  <g filter="url(#glow)">
    <path d="M242 199 Q246 202, 250 199" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M262 199 Q266 202, 270 199" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M250 213 Q256 216, 262 213" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- === FOCUS ORB (hitbox visualization) === -->
  <ellipse cx="256" cy="272" rx="22" ry="22" fill="url(#orbGlow)" filter="url(#glow-orb)"/>
  <ellipse cx="256" cy="272" rx="10" ry="10" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <!-- Orb inner ring -->
  <circle cx="256" cy="272" r="16" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="256" cy="272" r="5" fill="#ffffff" opacity="1"/>

  <!-- Light rays from orb -->
  <g stroke="#ffd700" stroke-width="0.8" opacity="0.3" filter="url(#glow)">
    <line x1="256" y1="248" x2="256" y2="230"/>
    <line x1="272" y1="256" x2="288" y2="248"/>
    <line x1="240" y1="256" x2="224" y2="248"/>
    <line x1="268" y1="284" x2="280" y2="296"/>
    <line x1="244" y1="284" x2="232" y2="296"/>
  </g>

  <!-- Sparkles (more numerous in focus) -->
  <g fill="#ffd700" filter="url(#glow)">
    <circle cx="175" cy="155" r="2.2" opacity="0.8"/>
    <circle cx="345" cy="145" r="1.8" opacity="0.7"/>
    <circle cx="145" cy="245" r="2" opacity="0.6"/>
    <circle cx="375" cy="235" r="2.2" opacity="0.7"/>
    <circle cx="195" cy="315" r="1.5" opacity="0.55"/>
    <circle cx="325" cy="325" r="1.4" opacity="0.6"/>
    <circle cx="125" cy="185" r="1.2" opacity="0.5"/>
    <circle cx="390" cy="190" r="1.5" opacity="0.55"/>
    <circle cx="160" cy="120" r="1" opacity="0.45"/>
    <circle cx="355" cy="110" r="1.3" opacity="0.5"/>
  </g>
  <g fill="#00e5ff" filter="url(#glow)">
    <circle cx="205" cy="95" r="1.8" opacity="0.6"/>
    <circle cx="315" cy="85" r="1.3" opacity="0.5"/>
    <circle cx="165" cy="295" r="1.5" opacity="0.5"/>
    <circle cx="355" cy="285" r="1.8" opacity="0.55"/>
    <circle cx="230" cy="340" r="1" opacity="0.4"/>
    <circle cx="285" cy="345" r="1.2" opacity="0.45"/>
  </g>
  <g fill="#b388ff" filter="url(#glow)">
    <circle cx="185" cy="375" r="1.5" opacity="0.45"/>
    <circle cx="335" cy="365" r="2" opacity="0.5"/>
    <circle cx="225" cy="425" r="1.2" opacity="0.4"/>
    <circle cx="295" cy="435" r="1.5" opacity="0.45"/>
  </g>
</svg>