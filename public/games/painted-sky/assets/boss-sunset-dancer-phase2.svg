<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="painterly" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="66" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#dc143c" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="thornFlow" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" seed="77" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Dark red background -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b0000" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4a0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc143c"/>
      <stop offset="60%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#4a0000"/>
    </linearGradient>
    <linearGradient id="thornGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc143c"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
    <radialGradient id="flameParticle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="50%" stop-color="#dc143c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Faded sunset - only red remains -->
  <rect width="512" height="512" fill="url(#darkBg)"/>
  <radialGradient id="redGlow" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#dc143c" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="256" cy="220" rx="280" ry="200" fill="url(#redGlow)"/>

  <!-- Fierce dancer - aggressive pose -->
  <g filter="url(#painterly)">
    <!-- Head tilted aggressively -->
    <ellipse cx="260" cy="120" rx="30" ry="34" fill="url(#bodyGrad)"/>
    <!-- Wild hair -->
    <path d="M235 100 Q210 70 195 90 Q190 115 210 130" fill="#8b0000" opacity="0.9"/>
    <path d="M280 100 Q310 65 320 95 Q315 125 295 120" fill="#8b0000" opacity="0.85"/>
    <path d="M250 88 Q245 60 260 55 Q275 60 270 88" fill="#4a0000" opacity="0.7"/>
    <!-- Neck -->
    <rect x="250" y="152" width="18" height="14" rx="4" fill="url(#bodyGrad)"/>
    <!-- Torso - fierce stance -->
    <path d="M228 166 Q245 160 275 163 Q295 172 288 230 Q275 250 240 248 Q220 242 228 166" fill="url(#bodyGrad)" opacity="0.9"/>
    <!-- Left arm swinging whip -->
    <path d="M230 175 Q190 160 155 180 Q130 200 120 230" stroke="url(#bodyGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Right arm raised -->
    <path d="M288 178 Q330 155 355 130 Q370 115 380 100" stroke="url(#bodyGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Legs in fierce dance -->
    <path d="M242 246 Q225 310 200 370 Q190 395 200 410" stroke="url(#bodyGrad)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M268 246 Q300 295 340 340 Q365 365 380 370" stroke="url(#bodyGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Thorn whip (former scarf) -->
  <g filter="url(#thornFlow)">
    <path d="M120 230 Q90 270 80 320 Q75 370 100 400 Q130 430 170 420 Q210 405 240 430 Q270 455 310 440 Q350 420 370 450 Q390 475 420 460"
          stroke="url(#thornGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Thorns -->
    <path d="M90 300 L80 285 L95 295" fill="#ff4500" opacity="0.8"/>
    <path d="M110 390 L100 375 L115 383" fill="#ff4500" opacity="0.8"/>
    <path d="M180 418 L175 403 L188 412" fill="#dc143c" opacity="0.8"/>
    <path d="M250 438 L245 423 L258 432" fill="#ff4500" opacity="0.8"/>
    <path d="M320 435 L318 420 L330 428" fill="#dc143c" opacity="0.8"/>
    <path d="M380 455 L378 440 L390 448" fill="#ff4500" opacity="0.8"/>
    <!-- Second whip section upward -->
    <path d="M120 230 Q100 190 115 150 Q140 110 180 100 Q210 95 230 120"
          stroke="url(#thornGrad)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M130 160 L118 148 L135 153" fill="#ff4500" opacity="0.7"/>
    <path d="M170 105 L162 92 L178 100" fill="#dc143c" opacity="0.7"/>
  </g>

  <!-- Flame particles -->
  <g filter="url(#fireGlow)">
    <!-- At feet -->
    <circle cx="200" cy="415" r="8" fill="url(#flameParticle)"/>
    <circle cx="240" cy="430" r="6" fill="url(#flameParticle)"/>
    <circle cx="280" cy="420" r="7" fill="url(#flameParticle)"/>
    <circle cx="340" cy="380" r="9" fill="url(#flameParticle)"/>
    <circle cx="170" cy="400" r="5" fill="url(#flameParticle)"/>
    <circle cx="370" cy="375" r="6" fill="url(#flameParticle)"/>
    <!-- Rising flames -->
    <path d="M210 400 Q205 380 215 370 Q220 360 210 345" stroke="#ff4500" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M260 420 Q255 395 265 385 Q270 370 260 355" stroke="#dc143c" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M320 370 Q315 350 325 340 Q330 325 320 310" stroke="#ff4500" stroke-width="2.5" fill="none" opacity="0.5"/>
    <!-- Scattered fire particles -->
    <circle cx="150" cy="350" r="3" fill="#ff4500" opacity="0.7"/>
    <circle cx="390" cy="330" r="3.5" fill="#dc143c" opacity="0.6"/>
    <circle cx="180" cy="300" r="2.5" fill="#ff4500" opacity="0.5"/>
    <circle cx="350" cy="280" r="3" fill="#dc143c" opacity="0.5"/>
    <circle cx="130" cy="250" r="2" fill="#ff4500" opacity="0.4"/>
    <circle cx="400" cy="240" r="2.5" fill="#dc143c" opacity="0.4"/>
  </g>

  <!-- Fierce eyes -->
  <g filter="url(#fireGlow)">
    <ellipse cx="248" cy="116" rx="6" ry="4" fill="#ff4500"/>
    <ellipse cx="272" cy="116" rx="6" ry="4" fill="#ff4500"/>
    <ellipse cx="248" cy="116" rx="3" ry="2" fill="#ffffff"/>
    <ellipse cx="272" cy="116" rx="3" ry="2" fill="#ffffff"/>
    <!-- Angry brow lines -->
    <path d="M238 108 L250 111" stroke="#8b0000" stroke-width="2.5"/>
    <path d="M264 111 L278 108" stroke="#8b0000" stroke-width="2.5"/>
  </g>
</svg>