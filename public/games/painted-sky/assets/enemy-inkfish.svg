<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="paint" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" seed="12" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004d5c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="eyeG" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </radialGradient>
    <linearGradient id="tailG" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#004d5c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g filter="url(#paint)">
    <!-- Ink trail from tail -->
    <ellipse cx="35" cy="128" rx="35" ry="12" fill="url(#tailG)"/>
    <ellipse cx="20" cy="128" rx="18" ry="6" fill="#0a1628" opacity="0.3"/>
    <!-- Tail fin -->
    <path d="M70 128 L40 95 L55 128 L40 161Z" fill="#004d5c" opacity="0.85"/>
    <!-- Body - streamlined fish -->
    <ellipse cx="140" cy="128" rx="75" ry="40" fill="url(#bodyG)"/>
    <!-- Top fin -->
    <path d="M120 88 L140 65 L160 88Z" fill="#004d5c" opacity="0.7"/>
    <!-- Bottom fin -->
    <path d="M130 168 L140 188 L155 168Z" fill="#004d5c" opacity="0.7"/>
    <!-- Side fin -->
    <path d="M115 140 L95 165 L120 155Z" fill="#0a1628" opacity="0.6"/>
    <!-- Gill lines -->
    <path d="M165 108 Q160 128 165 148" stroke="#004d5c" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Eye -->
    <circle cx="190" cy="122" r="12" fill="url(#eyeG)"/>
    <circle cx="193" cy="119" r="5" fill="#0a1628"/>
    <circle cx="195" cy="117" r="2" fill="#fff" opacity="0.7"/>
    <!-- Eye glow -->
    <circle cx="190" cy="122" r="18" fill="#ff4444" opacity="0.15"/>
    <!-- Mouth -->
    <path d="M212 130 Q220 128 212 126" stroke="#004d5c" stroke-width="1.5" fill="none"/>
    <!-- Scale highlights -->
    <ellipse cx="150" cy="118" rx="8" ry="3" fill="#004d5c" opacity="0.3" transform="rotate(-5 150 118)"/>
    <ellipse cx="130" cy="125" rx="6" ry="2.5" fill="#004d5c" opacity="0.25"/>
  </g>
</svg>