/* ═══════ 유틸 ═══════ */
function hasPup(id){return pups.some(p=>p.id===id);}
function catCnt(c){return pups.filter(p=>p.cat===c).length;}

/* ═══════ 시너지 체크 & 적용 ═══════ */
function checkSynergies(){
  const ac=catCnt('atk'),dc2=catCnt('def'),sc=catCnt('spc');
  /* 공격 3+: 빛의 분노 — 전체 데미지 +30% (atkB 계산에서 반영) */
  if(ac>=3&&!synergyApplied.atk){synergyApplied.atk=true;popups.add(px,py-40,'🗡️ 빛의 분노!','#ff4466');}
  /* 방어 3+: 빛의 축복 — 실드 2개 */
  if(dc2>=3&&!synergyApplied.def){synergyApplied.def=true;shieldStacks=2;shieldOn=true;shieldT=0;popups.add(px,py-60,'🛡️ 빛의 축복!','#00e5ff');}
  /* 특수 3+: 빛의 기적 — 특수 효과 +50% (그레이즈 범위, 자석 범위 등 1.5배) */
  if(sc>=3&&!synergyApplied.spc){synergyApplied.spc=true;popups.add(px,py-80,'✨ 빛의 기적!','#ffd700');}
  /* 공+방+특 각 1+: 조화의 빛 — 보스전 시작 5초 무적+데미지×1.5 */
  if(ac>=1&&dc2>=1&&sc>=1&&!synergyApplied.harmony){synergyApplied.harmony=true;popups.add(px,py-100,'🌈 조화의 빛!','#e040fb');}
}
/** 특수 시너지 배율 (spc 3+이면 1.5, 아니면 1.0) */
function spcMul(){return synergyApplied.spc?1.5:1.0;}

/* ═══════ 이펙트 스프라이트 재생 ═══════ */
function spawnEffect(spriteKey,x,y,size,frames,onDone){
  if(!assets.has(spriteKey))return;
  const img=assets.sprites[spriteKey];
  const dims=SPRITE_DIMS[spriteKey];
  const fW=dims?(dims.w/frames):((img.naturalWidth||512)/frames);
  const fH=dims?dims.h:(img.naturalHeight||128);
  const spr=new Sprite(img,fW,fH,frames,12);spr.loop=false;spr.reset();
  effectQueue.push({sprite:spr,x,y,size,done:false,key:spriteKey});
}

/* ═══════ 적탄 스폰 ═══════ */
function spawnEB(x,y,vx,vy,large){const b=ebPool.acquire();if(!b)return;b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.r=large?10:4;b._grazed=false;b.large=!!large;b._burst=false;b._splitN=0;b._splitSpd=0;}

/* ═══════ 보스 예고선 추가 ═══════ */
function addWarningLine(ox,oy,angle,len){
  const warnTime=diff==='easy'?1.5:diff==='hard'?0.5:1.0;
  warningLines.push({x1:ox,y1:oy,x2:ox+Math.cos(angle)*len,y2:oy+Math.sin(angle)*len,timer:warnTime,maxTimer:warnTime});
}
function addWarningBurst(ox,oy,n,len){
  for(let i=0;i<n;i++)addWarningLine(ox,oy,(Math.PI*2/n)*i,len);
}

/* ═══════ 'pattern' 타입 좌표 배열 (문자/도형 형태 탄막) ═══════ */
const PATTERN_SHAPES={
  'kanji-darkness':[ // 闇(어둠) 단순화 — 십자 + 대각 격자
    [0,0],[1,0],[-1,0],[0,1],[0,-1],[0.7,0.7],[-0.7,0.7],[0.7,-0.7],[-0.7,-0.7],
    [0.5,0],[-0.5,0],[0,0.5],[0,-0.5],
  ].map(([x,y])=>[x*60,y*60]),
  'kanji-void':[ // 虛(허) 단순화 — 원형+방사
    ...Array.from({length:8},(_,i)=>{const a=Math.PI*2/8*i;return [Math.cos(a)*50,Math.sin(a)*50];}),
    ...Array.from({length:8},(_,i)=>{const a=Math.PI*2/8*i+Math.PI/8;return [Math.cos(a)*30,Math.sin(a)*30];}),
    [0,0],[0,40],[0,-40],[40,0],[-40,0],
  ],
};

/* ═══════ 예고선 생성 (발사 전 힌트) ═══════ */
function generateWarnings(pat,ox,oy,w,h){
  const pa=MathUtil.angle(ox,oy,px,py),dm=dc.bDen*(STAGES[sIdx].denMul||1),n=Math.round((pat.n||12)*dm);
  switch(pat.t){
    case'radial':addWarningBurst(ox,oy,Math.min(n,8),120);break;
    case'fan':case'doubleFan':addWarningLine(ox,oy,pa,150);break;
    case'spiral':addWarningBurst(ox,oy,pat.arms||3,100);break;
    case'aimed':addWarningLine(ox,oy,pa,200);break;
    case'pattern':addWarningBurst(ox,oy,6,80);break;
    case'burst':addWarningBurst(ox,oy,4,100);break;
    case'combined':{const subs=pat.sub||['spiral','aimed'];const allPats=bPhase===1?BOSS[sIdx].p1:BOSS[sIdx].p2;
      for(const subT of subs){const ref=allPats.find(p=>p.t===subT);if(ref)generateWarnings(ref,ox,oy,w,h);}break;}
  }
}

/* ═══════ 탄막 패턴 발사 (코어 패턴은 IX.Genre.Shooter.BulletPatterns 사용) ═══════ */
/** bp 결과 배열을 풀에 일괄 스폰하는 헬퍼 */
function spawnFromBP(bullets,large){for(const b of bullets)spawnEB(b.x,b.y,b.vx,b.vy,large);}
function firePat(pat,ox,oy,w,h){
  const sm=dc.bSpd,dm=dc.bDen*(STAGES[sIdx].denMul||1),pa=MathUtil.angle(ox,oy,px,py),n=Math.round((pat.n||12)*dm);
  bp.speedScale=dc.bSpd*100; // 난이도별 속도 배율 동기화
  switch(pat.t){
    case'radial':spawnFromBP(bp.radial(ox,oy,n,pat.s));break;
    case'fan':spawnFromBP(bp.fan(ox,oy,pa,n,pat.sp||60,pat.s));break;
    case'doubleFan':spawnFromBP(bp.doubleFan(ox,oy,pa,n,pat.sp||60,pat.s));break;
    case'spiral':{bp.spiralAngle=spiralA;const bullets=bp.spiral(ox,oy,pat.arms||3,n,pat.s,pat.rot||0.02);spawnFromBP(bullets);spiralA=bp.spiralAngle;break;}
    case'aimed':spawnFromBP(bp.aimed(ox,oy,pa,n,pat.sp||20,pat.s));break;
    case'rain':spawnFromBP(bp.rain(w,n,pat.s));break;
    case'wave':spawnFromBP(bp.wave(ox,oy,n,pat.s));break;
    case'burst':{const b=ebPool.acquire();if(b){b.x=ox;b.y=oy;b.vx=0;b.vy=pat.s*dc.bSpd*100*0.6;b.r=10;b._grazed=false;b.large=true;b._burst=true;b._splitN=pat.splitN||12;b._splitSpd=pat.s*dc.bSpd*100;}break;}
    case'gravity':{gravityActive=true;gravityTimer=pat.dur||3;gravityStrength=pat.pull||0.3;break;}
    case'blackout':{blackoutActive=true;blackoutTimer=pat.dur||3;blackoutCoverage=pat.cov||0.3;break;}
    case'pattern':{const coords=PATTERN_SHAPES[pat.shape]||PATTERN_SHAPES['kanji-darkness'],sm2=dc.bSpd*100;
      for(const[dx,dy] of coords){const a=MathUtil.angle(ox+dx,oy+dy,px,py);spawnEB(ox+dx,oy+dy,Math.cos(a)*pat.s*sm2*0.8,Math.sin(a)*pat.s*sm2*0.8);}break;}
    case'combined':{const subs=pat.sub||['spiral','aimed'];const allPats=bPhase===1?BOSS[sIdx].p1:BOSS[sIdx].p2;
      for(const subT of subs){const ref=allPats.find(p=>p.t===subT);if(ref)firePat(ref,ox,oy,w,h);
        else{if(subT==='spiral')firePat({t:'spiral',arms:4,n:10,s:2,rot:0.03,i:2},ox,oy,w,h);
          else if(subT==='aimed')firePat({t:'aimed',n:5,s:3.5,sp:25,i:1.5},ox,oy,w,h);}}break;}
  }
}

/* ═══════ 적 웨이브 스폰 ═══════ */
function spawnWave(w,h){
  const types=sIdx>=2?[0,1,2,3]:[0,1,3],cnt=MathUtil.randInt(3,5+sIdx);
  for(let i=0;i<cnt;i++){const e=enPool.acquire();if(!e)break;e.type=types[MathUtil.randInt(0,types.length-1)];
    e.x=MathUtil.randRange(w*0.1,w*0.9);e.y=MathUtil.randRange(-60,-20);e.hp=e.type===3?8:3;e.mhp=e.hp;
    e.w=e.type===3?40:28;e.h=e.w;e.vx=MathUtil.randRange(-40,40);e.vy=MathUtil.randRange(30,80);
    e.ft=MathUtil.randRange(0.5,2);e.fi=e.type===3?1.5:2.5;}
}

/* ═══════ 보스 초기화 ═══════ */
function initBoss(w,h){
  const bd=BOSS[sIdx];bMaxHP=bd.hp[diff];bHP=bMaxHP;bPhase=1;bx=w/2;by=h*0.15;bPIdx=0;bPTimer=2;bAlive=true;bTrans=false;spiralA=0;bStartTime=sTime;
  /* 조화의 빛 시너지: 보스전 시작 5초 무적 + 데미지×1.5 */
  if(synergyApplied.harmony){harmonyInvT=5;harmonyDmgMul=1.5;invT=Math.max(invT,5);popups.add(px,py-30,'조화의 빛 발동!','#e040fb');}
}

/* ═══════ 피격 처리 ═══════ */
function playerHit(){
  if(invT>0)return;
  /* 방어 시너지 실드 스택 */
  if(shieldOn){
    shieldStacks--;if(shieldStacks<=0){shieldOn=false;shieldT=30;}
    invT=0.5;spawnEffect('effectHit',px,py,40,4);return;
  }
  hp--;noDmg=false;grzCombo=0;sfxHit();shakeT=0.2;shakeI=6;flashA=0.4;
  spawnEffect('effectHit',px,py,48,4);
  invT=dc.inv+(hasPup('invExt')?1:0);
  if(hp<=0){if(hasPup('revive')&&!revived){revived=true;hp=1;invT=3;popups.add(px,py-30,'부활!','#e040fb');return;}
    const bonus=calcBonus(false);frags=Math.floor(score/100);const sv=Save.get(GID+'_frags',0);Save.set(GID+'_frags',sv+frags);Save.setHighScore(GID,score);
    Scene.transition('RESULT',{score,stage:sIdx,cleared:false,frags,noDmg,bombsUsed,totalGrz,bonus});}
}

/* ═══════ 폭탄 사용 ═══════ */
function useBomb(w,h){
  if(bombs<=0)return;bombs--;bombsUsed++;sfxBomb();ebPool.releaseAll();flashA=0.6;invT=Math.max(invT,2);
  gravityActive=false;blackoutActive=false;blackoutTimer=0;gravityTimer=0;
  spawnEffect('effectBomb',w/2,h/2,Math.max(w,h)*0.6,6);
  particles.emit(px,py,40,{color:'#ffd700',speed:250,life:0.8,size:5});
  if(hasPup('bombSlow'))slowT=3*spcMul();
  if(bAlive){bHP-=50;if(bHP<0)bHP=0;}
}

/* ═══════ 보너스 계산 ═══════ */
function calcBonus(isCleared){
  const b={stage:0,noDmg:0,bombSave:0,speed:0,perfect:0,total:0};
  if(isCleared){b.stage=1000*(sIdx+1);const ub=bombs;b.bombSave=ub*5000;
    if(noDmg)b.noDmg=20000;if(bStartTime>0&&(sTime-bStartTime)<60)b.speed=10000;
    if(noDmg&&bombsUsed===0)b.perfect=50000;}
  b.total=b.stage+b.noDmg+b.bombSave+b.speed+b.perfect;score+=b.total;return b;
}

/* ═══════ 배경 렌더링 (3레이어 패럴렉스) ═══════ */
function drawBG(ctx,w,h,dt){
  const st=STAGES[sIdx]||STAGES[0],g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,st.bgT);g.addColorStop(1,st.bgB);ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const bk=[['bgDawnFar','bgDawnMid','bgDawnNear'],['bgSunsetFar','bgSunsetMid','bgSunsetNear'],
    ['bgOceanFar','bgOceanMid','bgOceanNear'],['bgStormFar','bgStormMid','bgStormNear']];
  const ks=bk[sIdx]||bk[0],spds=[0.3,0.6,1.0];
  for(let i=0;i<3;i++){if(assets.has(ks[i])){const sy=(bgScY*spds[i])%h;ctx.globalAlpha=0.5+i*0.15;
    ctx.drawImage(assets.sprites[ks[i]],0,sy,w,h);ctx.drawImage(assets.sprites[ks[i]],0,sy-h,w,h);ctx.globalAlpha=1;}}
  /* 빛 파티클 장식 (particleLight/particlePetal/particleInk SVG 활용) */
  const ptcKeys=['particleLight','particlePetal','particleInk'];
  for(let i=0;i<8;i++){const sx=Math.sin(bgScY*0.01+i*1.2)*w*0.3+w/2,sy=(bgScY*0.5+i*80)%h;
    const pk=ptcKeys[i%3],psz=6+Math.sin(bgScY*0.02+i)*3;ctx.globalAlpha=0.2+Math.sin(bgScY*0.015+i)*0.1;
    if(assets.has(pk))assets.draw(ctx,pk,sx-psz,sy-psz,psz*2,psz*2,'#ffd700');
    else{ctx.fillStyle='rgba(255,215,0,0.12)';ctx.beginPath();ctx.arc(sx,sy,psz,0,Math.PI*2);ctx.fill();}
  }ctx.globalAlpha=1;bgScY+=dt*0.03;
}

/* ═══════ 이펙트 큐 업데이트/렌더 ═══════ */
function updateEffects(dt){
  for(let i=effectQueue.length-1;i>=0;i--){
    const e=effectQueue[i];e.sprite.update(dt);
    if(!e.sprite.playing){effectQueue.splice(i,1);}
  }
}
function renderEffects(ctx){
  for(const e of effectQueue){
    const sz=e.size;e.sprite.draw(ctx,e.x-sz/2,e.y-sz/2,sz,sz);
  }
}

/* ═══════ 초기화 & 씬 등록 ═══════ */

  /* ═══════ DIFFICULTY ═══════ */

    update(dt){iDelay=Math.max(0,iDelay-dt/1000);tween.update(dt);},
    render(ctx,w,h){drawBG(ctx,w,h,0);ctx.fillStyle='rgba(13,27,42,0.75)';ctx.fillRect(0,0,w,h);
      const port=Layout.isPortrait(w,h),by0=port?h*0.30:h*0.35,gap=port?10:14;
      UI.text(ctx,'난이도 선택',w/2,h*0.18,{size:fontSize(32,w,h),bold:true,color:'#f0e6d3',glow:'#ffd700'});
      ['HP 5 | 폭탄 5 | 여유로운 탄막','HP 3 | 폭탄 3 | 표준 탄막','HP 1 | 폭탄 1 | 극한 탄막'].forEach((d,i)=>{const bh2=Math.max(56*lScale(w,h),48);UI.text(ctx,d,w/2,by0+i*(bh2+gap)+bh2+8,{size:fontSize(10,w,h),color:'#888'});});},
  });

  /* ═══════ GAME (메인 플레이) ═══════ */
  Scene.register('GAME',{
    enter(data){iDelay=0.2;const w=window.innerWidth,h=window.innerHeight;
      if(data&&data.stage!==undefined){sIdx=data.stage;score=data.score||score;hp=data.hp||hp;bombs=data.bombs||bombs;pups=data.pups||pups;}
      px=w/2;py=h*0.8;sTime=0;bossMode=false;bAlive=false;wTimer=1;wCnt=0;noDmg=true;bombsUsed=0;
      harmonyInvT=0;harmonyDmgMul=1;effectQueue=[];warningLines=[];
      gravityActive=false;gravityTimer=0;blackoutActive=false;blackoutTimer=0;
      ebPool.releaseAll();enPool.releaseAll();itPool.releaseAll();
      /* 모바일/태블릿 터치 버튼 */
      if(isMobileDevice||Layout.isTablet(w)){const s=lScale(w,h),bs=Math.max(48,56*s);
        tBombBtn=new Button({x:w-bs-12,y:h-bs*2-24,w:bs,h:bs,text:'BOMB',key:['KeyX'],fontSize:Math.max(12,14*s),color:'#ff9100',onClick:()=>useBomb(w,h)});
        tFocusBtn=new Button({x:w-bs*2-24,y:h-bs-12,w:bs,h:bs,text:'SLOW',fontSize:Math.max(12,14*s),color:'#00e5ff',onClick:()=>{focusToggle=!focusToggle;}});}
      const ps=Math.max(48,40*lScale(w,h));
      new Button({x:w-ps-8,y:8,w:ps,h:ps,text:'⏸',key:['Escape','KeyP'],fontSize:Math.max(16,20*lScale(w,h)),color:'rgba(80,80,80,0.5)',onClick:()=>{Scene.transition('PAUSE',{stage:sIdx,score,hp,bombs,pups});}});},
    update(dt,inp){
      iDelay=Math.max(0,iDelay-dt/1000);if(iDelay>0)return;
      const w=engine.W,h=engine.H,dtS=dt/1000*(slowT>0?0.5:1);
      tween.update(dt);particles.update(dt);popups.update(dt);updateEffects(dt);
      if(sprPlayerIdle)sprPlayerIdle.update(dt);
      /* 조화의 빛 데미지 배율 타이머 */
      if(harmonyInvT>0){harmonyInvT-=dtS;if(harmonyInvT<=0)harmonyDmgMul=1;}
      /* 이동 입력 */
      let mx=0,my=0;
      if(inp.held('ArrowLeft')||inp.held('KeyA'))mx-=1;if(inp.held('ArrowRight')||inp.held('KeyD'))mx+=1;
      if(inp.held('ArrowUp')||inp.held('KeyW'))my-=1;if(inp.held('ArrowDown')||inp.held('KeyS'))my+=1;
      if((isMobileDevice||Layout.isTablet(w))&&inp.mouseDown&&inp.touches.length>0){
        for(const tc of inp.touches){if(tc.x<w*0.5){if(!touchJoy)touchJoy={sx:tc.x,sy:tc.y};const dx2=tc.x-touchJoy.sx,dy2=tc.y-touchJoy.sy,d=Math.hypot(dx2,dy2);const clampD=Math.min(d,60);if(d>10){mx=(dx2/d)*(clampD/60);my=(dy2/d)*(clampD/60);}}}}
      if(!inp.mouseDown)touchJoy=null;
      focused=inp.held('ShiftLeft')||inp.held('ShiftRight')||focusToggle;
      const spd=pSpd*(focused?0.4:1)*(1+(hasPup('speed')?0.2*spcMul():0)),len=Math.hypot(mx,my)||1;
      px+=(mx/len)*spd*dtS;py+=(my/len)*spd*dtS;px=MathUtil.clamp(px,16,w-16);py=MathUtil.clamp(py,16,h-16);
      /* 폭탄 입력 */
      if(inp.jp('KeyX'))useBomb(w,h);
      /* ▼ 발사: PC는 Z/Space 홀드, 모바일은 자동 ▼ */
      const firing=isMobileDevice||(inp.held('KeyZ')||inp.held('Space'));
      const rate=fRate*(1+(hasPup('rapid')?0.5:0));fTimer+=dtS;
      if(firing&&fTimer>=1/rate){fTimer=0;sfxShot();const b=pbPool.acquire();if(b){b.x=px;b.y=py-12;b.vy=-500;b.pierce=hasPup('pierce');b.dmg=1;}
        if(hasPup('spread')){const bl=pbPool.acquire();if(bl){bl.x=px-10;bl.y=py-8;bl.vy=-480;bl.pierce=hasPup('pierce');bl.dmg=1;}const br=pbPool.acquire();if(br){br.x=px+10;br.y=py-8;br.vy=-480;br.pierce=hasPup('pierce');br.dmg=1;}}}
      /* 추적 나비 (유도탄) */
      if(hasPup('homing')){homingT+=dtS;if(homingT>=5/spcMul()){homingT=0;const b=pbPool.acquire();if(b){b.x=px;b.y=py-12;b.vy=-400;b.pierce=false;b.dmg=2;}}}
      /* 실드 쿨타임 */
      if(hasPup('shield')&&!shieldOn){shieldT-=dtS;if(shieldT<=0){shieldOn=true;shieldStacks=synergyApplied.def?2:1;shieldT=30/spcMul();}}
      if(slowT>0)slowT-=dtS;if(invT>0)invT-=dtS;
      if(shakeT>0){shakeT-=dtS;if(shakeT<=0)shakeI=0;}if(flashA>0)flashA-=dtS*2;
      sTime+=dtS;const st=STAGES[sIdx];

      if(!bossMode){wTimer-=dtS;if(wTimer<=0){spawnWave(w,h);wCnt++;wTimer=st.wInt;}
        if(sTime>=st.dur){bossMode=true;enPool.releaseAll();bIntro=1.5;initBoss(w,h);sfxBPhase();}}
      if(bIntro>0){bIntro-=dtS;return;}

      if(bTrans){bTransT-=dtS;
        spawnEffect('effectBossPhase',bx,by,80,4);
        if(bTransT<=0){bTrans=false;bPhase=2;bPIdx=0;bPTimer=1;ebPool.releaseAll();}return;}
      /* 일반 적 업데이트 */
      enPool.forEach(e=>{e.x+=e.vx*dtS;e.y+=e.vy*dtS;if(e.y>h+50||e.x<-50||e.x>w+50){e.active=false;return;}
        e.ft-=dtS;if(e.ft<=0){e.ft=e.fi;const a=MathUtil.angle(e.x,e.y,px,py),sp2=120*dc.bSpd;spawnEB(e.x,e.y,Math.cos(a)*sp2,Math.sin(a)*sp2);}});
      /* 보스 업데이트 */
      if(bAlive&&!bTrans){bx=w/2+Math.sin(sTime*0.5)*w*0.25;by=h*0.12+Math.sin(sTime*0.3)*h*0.05;
        const pats=bPhase===1?BOSS[sIdx].p1:BOSS[sIdx].p2;
        if(bHinting){bHintT-=dtS;if(bHintT<=0){bHinting=false;firePat(pats[bPIdx%pats.length],bx,by,w,h);bPIdx++;bPTimer=pats[(bPIdx-1)%pats.length].i||2;}}
        else{bPTimer-=dtS;if(bPTimer<=0){bHinting=true;bHintT=dc.hintDur;generateWarnings(pats[bPIdx%pats.length],bx,by,w,h);sound.tone(300,0.08,'sine',0.15);}}

          score+=5000;popups.add(bx,by,'+5000 Phase Clear','#ffd700');
          particles.emit(bx,by,30,{color:'#b388ff',speed:200,life:1});
        }
      }
      /* 아군 탄 이동 */
      pbPool.forEach(b=>{b.y+=b.vy*dtS;if(b.y<-20)b.active=false;});
      /* 적탄 이동 + burst 분산 판정 */
      ebPool.forEach(b=>{b.x+=b.vx*dtS;b.y+=b.vy*dtS;
        /* burst 탄: 화면 60% 이하 도달 시 분산 */
        if(b._burst&&b.y>=h*0.6){b.active=false;const sN=b._splitN||12,spd=b._splitSpd||200;
          for(let i=0;i<sN;i++){const a=(Math.PI*2/sN)*i;spawnEB(b.x,b.y,Math.cos(a)*spd,Math.sin(a)*spd);}
          particles.emit(b.x,b.y,12,{color:'#e040fb',speed:100,life:0.4,size:3});}
        if(b.x<-30||b.x>w+30||b.y<-30||b.y>h+30)b.active=false;});
      /* gravity 패턴: 플레이어를 보스 방향으로 끌어당김 */
      if(gravityActive){gravityTimer-=dtS;if(gravityTimer<=0)gravityActive=false;
        else if(bAlive){const ga=MathUtil.angle(px,py,bx,by);px+=Math.cos(ga)*gravityStrength*200*dtS;py+=Math.sin(ga)*gravityStrength*200*dtS;px=MathUtil.clamp(px,16,w-16);py=MathUtil.clamp(py,16,h-16);}}
      /* blackout 패턴: 타이머만 감소 (렌더에서 처리) */
      if(blackoutActive){blackoutTimer-=dtS;if(blackoutTimer<=0)blackoutActive=false;}
      /* 파워업 임시 공격 버프 타이머 */
      if(tempAtkT>0)tempAtkT-=dtS;
      /* 예고선 업데이트 */
      for(let i=warningLines.length-1;i>=0;i--){warningLines[i].timer-=dtS;if(warningLines[i].timer<=0)warningLines.splice(i,1);}
      /* 아이템 이동 & 자석 흡수 */
      const magR=(hasPup('magnet')?120:60)*spcMul();
      itPool.forEach(it=>{const d=MathUtil.dist(it.x,it.y,px,py);if(d<magR){const a=MathUtil.angle(it.x,it.y,px,py);it.x+=Math.cos(a)*300*dtS;it.y+=Math.sin(a)*300*dtS;}else it.y+=60*dtS;if(it.y>h+30)it.active=false;});
      /* 충돌 판정: 적탄 vs 플레이어 (공간 해싱) */
      sHash.clear();ebPool.forEach(b=>sHash.insert(b));
      const gR=(dc.gR+(hasPup('grzPro')?10*spcMul():0))*spcMul(),gM=dc.gMul*(hasPup('grzPro')?2:1),near=sHash.query(px,py,gR+10);
      for(const b of near){if(!b.active)continue;const d=MathUtil.dist(px,py,b.x,b.y);
        if(d<4+b.r){b.active=false;playerHit();if(hp<=0)return;}
        else if(d<gR+b.r&&!b._grazed){b._grazed=true;grzCombo++;grzCnt++;totalGrz++;
          const pts=Math.round(50*Math.min(10,1+grzCombo*0.5)*gM);score+=pts;sfxGraze();
          spawnEffect('effectGraze',px,py,30,1); // single-frame graze effect
          particles.emit(px,py,3,{color:'#00e5ff',speed:80,life:0.3,size:2});
          if(hasPup('grzHeal')){grzHealCnt++;if(grzHealCnt>=80){grzHealCnt=0;hp=Math.min(hp+1,maxHp);popups.add(px,py-20,'+1HP','#00e5ff');}}
          if((savedUp.lifeGraze||0)>0){lifeGrzCnt++;if(lifeGrzCnt>=100){lifeGrzCnt=0;hp=Math.min(hp+1,maxHp);popups.add(px,py-20,'+1HP','#ce93d8');}}}}

        const cx2=x+cW/2;
        UI.text(ctx,p.cat==='atk'?'🗡️':p.cat==='def'?'🛡️':'✨',cx2,y-12,{size:fontSize(16,w,h)});
        UI.text(ctx,p.desc,cx2,y+cH+16,{size:fontSize(11,w,h),color:'#aab'});
        /* 파워업 아이콘 에셋 */
        const iconKey=p.cat==='atk'?'itemPowerAttack':p.cat==='def'?'itemPowerDefense':'itemPowerSpecial';
        const icSz=Math.max(24,32*s);
        assets.draw(ctx,iconKey,cx2-icSz/2,y+cH*0.15,icSz,icSz,p.ic);
      });
      /* 시너지 안내 */
      const ac=catCnt('atk'),dc2=catCnt('def'),sc=catCnt('spc');
      let synTxt='';
      if(ac>=2)synTxt+='공격'+ac+'/3 ';if(dc2>=2)synTxt+='방어'+dc2+'/3 ';if(sc>=2)synTxt+='특수'+sc+'/3 ';
      if(synTxt)UI.text(ctx,'시너지 진행: '+synTxt,w/2,h*0.88,{size:fontSize(11,w,h),color:'#ce93d8'});
      popups.render(ctx,{fontSize:fontSize(14,w,h),glow:true});},
  });

  /* ═══════ RESULT ═══════ */
  Scene.register('RESULT',{
    enter(data){iDelay=0.2;this._d=data||{};const sc=data?.score||0;
      this._g=sc>=400000?'S':sc>=250000?'A':sc>=120000?'B':'C';
      this._gc=this._g==='S'?'#ffd700':this._g==='A'?'#ff9100':this._g==='B'?'#00e5ff':'#888';
      const w=window.innerWidth,h=window.innerHeight,s=lScale(w,h);
      const bw=Math.max(200*s,160),bh=Math.max(52*s,48),cx=w/2-bw/2;
      new Button({x:cx,y:h*0.72,w:bw,h:bh,text:'성소',key:['KeyS','Enter'],fontSize:Math.max(14,16*s),color:'#ffd700',onClick:()=>{sfxSel();Scene.transition('SANCTUARY');}});
      new Button({x:cx,y:h*0.72+bh+10,w:bw,h:bh,text:'타이틀',key:['Space','Escape'],fontSize:Math.max(14,16*s),color:'#6c3cf7',onClick:()=>{sfxSel();Scene.transition('TITLE');}});},
    update(dt){iDelay=Math.max(0,iDelay-dt/1000);tween.update(dt);},
    render(ctx,w,h){ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,w,h);const d=this._d,bn=d?.bonus||{};
      UI.text(ctx,d?.cleared?'게임 클리어!':'GAME OVER',w/2,h*0.06,{size:fontSize(36,w,h),bold:true,color:d?.cleared?'#ffd700':'#ff4466',glow:d?.cleared?'#ff9100':'#ff0044'});
      UI.text(ctx,'Stage '+((d?.stage||0)+1)+' / 4',w/2,h*0.13,{size:fontSize(14,w,h),color:'#aab'});
      UI.text(ctx,(d?.score||0).toLocaleString(),w/2,h*0.21,{size:fontSize(32,w,h),bold:true,color:'#ffd700'});
      UI.text(ctx,this._g,w/2,h*0.30,{size:fontSize(48,w,h),bold:true,color:this._gc,glow:this._gc});
      let by2=h*0.40;const lh=fontSize(13,w,h)+4,fs13=fontSize(13,w,h),fs11=fontSize(11,w,h);
      if(bn.stage>0){UI.text(ctx,'스테이지 클리어: +'+bn.stage.toLocaleString(),w/2,by2,{size:fs13,color:'#ffd700'});by2+=lh;}
      if(bn.noDmg>0){UI.text(ctx,'🌟 노데미지: +'+bn.noDmg.toLocaleString(),w/2,by2,{size:fs13,color:'#ffd700'});by2+=lh;}
      if(bn.bombSave>0){UI.text(ctx,'💣 폭탄 절약: +'+bn.bombSave.toLocaleString(),w/2,by2,{size:fs13,color:'#ff9100'});by2+=lh;}
      if(bn.speed>0){UI.text(ctx,'⚡ 속도 보너스: +'+bn.speed.toLocaleString(),w/2,by2,{size:fs13,color:'#00e5ff'});by2+=lh;}
      if(bn.perfect>0){UI.text(ctx,'✨ 퍼펙트: +'+bn.perfect.toLocaleString(),w/2,by2,{size:fs13,color:'#e040fb'});by2+=lh;}
      by2+=4;
      UI.text(ctx,'GRAZE: '+(d?.totalGrz||0),w/2,by2,{size:fs11,color:'#00e5ff'});by2+=lh;
      UI.text(ctx,'빛의 조각: +'+(d?.frags||0),w/2,by2,{size:fontSize(14,w,h),color:'#ce93d8'});by2+=lh+2;
      UI.text(ctx,'HIGH SCORE: '+Save.getHighScore(GID).toLocaleString(),w/2,by2,{size:fs11,color:'#888'});},
  });

  /* ═══════ SANCTUARY (uiButtonFrame 에셋 활용) ═══════ */
  function buildSanctuaryUI(){
    Button.clearAll();const w=window.innerWidth,h=window.innerHeight,s=lScale(w,h);
    const port=Layout.isPortrait(w,h);
    const fr=Save.get(GID+'_frags',0),bw=port?Math.min(w*0.85,260):Math.max(240*s,200),bh=Math.max(52*s,48),cx=w/2-bw/2;
    UPGS.forEach((up,i)=>{const lv=savedUp[up.id]||0,mx=lv>=up.max,cost=mx?'—':up.costs[lv],can=!mx&&fr>=up.costs[lv];
      new Button({x:cx,y:h*0.15+i*(bh+8),w:bw,h:bh,text:up.name+' Lv'+lv+(mx?' MAX':' ['+cost+']'),key:['Digit'+(i+1)],
        fontSize:Math.max(12,14*s),color:mx?'#444':can?'#ffd700':'#555',enabled:can,
        onClick:()=>{if(!can)return;savedUp[up.id]=lv+1;Save.set(GID+'_upg',savedUp);Save.set(GID+'_frags',fr-up.costs[lv]);sfxPow();buildSanctuaryUI();}});});
    new Button({x:cx,y:h*0.15+UPGS.length*(bh+8)+16,w:bw,h:bh,text:'돌아가기',key:['Escape','Space'],fontSize:Math.max(14,16*s),color:'#555',onClick:()=>{sfxSel();Scene.transition('TITLE');}});}
  Scene.register('SANCTUARY',{
    enter(){iDelay=0.2;savedUp=Save.get(GID+'_upg',{armor:0,bombUp:0,wings:0,rapidUp:0,lifeGraze:0});buildSanctuaryUI();},
    update(dt){iDelay=Math.max(0,iDelay-dt/1000);tween.update(dt);},
    render(ctx,w,h){ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,w,h);
      UI.text(ctx,'빛의 성소',w/2,h*0.06,{size:fontSize(28,w,h),bold:true,color:'#ffd700',glow:'#ff9100'});
      UI.text(ctx,'빛의 조각: '+Save.get(GID+'_frags',0),w/2,h*0.11,{size:fontSize(14,w,h),color:'#ce93d8'});
      /* uiButtonFrame 배경을 각 업그레이드 버튼 뒤에 렌더 */
      if(assets.has('uiButtonFrame')){const s2=lScale(w,h),port=Layout.isPortrait(w,h);
        const bw2=port?Math.min(w*0.85,260):Math.max(240*s2,200),bh2=Math.max(52*s2,48),cx2=w/2-bw2/2;
        for(let i=0;i<UPGS.length+1;i++){const yy=h*0.15+i*(bh2+8)+(i===UPGS.length?16:0);
          ctx.globalAlpha=0.2;assets.draw(ctx,'uiButtonFrame',cx2-4,yy-2,bw2+8,bh2+4,'#333');ctx.globalAlpha=1;}}},
  });

  /* ═══════ CONTROLS (조작법 텍스트 수정) ═══════ */
  Scene.register('CONTROLS',{
    enter(){iDelay=0.2;const w=window.innerWidth,h=window.innerHeight,s=lScale(w,h);
      new Button({x:w/2-Math.max(100*s,80),y:h*0.85,w:Math.max(200*s,160),h:Math.max(48*s,48),text:'돌아가기',key:['Escape','Space','Enter'],fontSize:Math.max(14,16*s),color:'#555',onClick:()=>{sfxSel();Scene.transition('TITLE');}});},
    update(dt){iDelay=Math.max(0,iDelay-dt/1000);tween.update(dt);},
    render(ctx,w,h){ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,w,h);
      UI.text(ctx,'조작법',w/2,h*0.08,{size:fontSize(28,w,h),bold:true,color:'#f0e6d3',glow:'#6c3cf7'});
      ['← → ↑ ↓ / WASD : 이동','Shift : 저속 이동 (정밀 회피)','Z / Space 홀드 : 발사 (연사)','X : 폭탄 (적탄 소거+무적)','ESC / P : 일시정지','','[ 모바일 ]','왼쪽 드래그 = 이동 (자동 연사)','BOMB / SLOW 버튼'].forEach((l,i)=>{
        UI.text(ctx,l,w/2,h*0.2+i*fontSize(22,w,h),{size:fontSize(14,w,h),color:l?'#aab':'transparent'});});},
  });

  /* ═══════ GameFlow 설정 ═══════ */
  GameFlow.init({titleText:'물들인 하늘',title:Scene._states.TITLE,play:Scene._states.GAME,gameover:Scene._states.RESULT,onReset:resetAll,stuckMs:45000});
  engine._update=(dt)=>{Scene.update(dt,input);input.flush();};
  engine._render=(ctx,w,h)=>{Scene.render(ctx,w,h);};
  GameFlow.start();engine.start();sound.init();
}
init();
</script>
</body>
</html>
