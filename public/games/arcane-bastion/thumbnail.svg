<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="bastionGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <radialGradient id="magicCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Magic circle glow -->
  <circle cx="200" cy="130" r="80" fill="url(#magicCircle)"/>

  <!-- Bastion (center fortress) -->
  <circle cx="200" cy="130" r="35" fill="none" stroke="url(#bastionGlow)" stroke-width="3"/>
  <circle cx="200" cy="130" r="28" fill="#1a1a2e" fill-opacity="0.8"/>

  <!-- Hexagram inside bastion -->
  <g stroke="#6c3cf7" stroke-width="1" fill="none" opacity="0.6">
    <polygon points="200,105 221,117 221,142 200,155 179,142 179,117"/>
    <polygon points="200,108 218,120 218,140 200,152 182,140 182,120"/>
  </g>

  <!-- Wizard (top of bastion) -->
  <g transform="translate(200, 85)">
    <!-- Robe -->
    <polygon points="0,-14 -9,10 -6,12 6,12 9,10" fill="#9944ff"/>
    <!-- Hood -->
    <path d="M-7,-8 Q0,-18 7,-8" fill="#7722cc"/>
    <!-- Head -->
    <circle cx="0" cy="-7" r="5" fill="#ddb893"/>
    <!-- Staff -->
    <line x1="8" y1="-5" x2="12" y2="-18" stroke="#aa8855" stroke-width="2"/>
    <circle cx="12" cy="-20" r="3" fill="#00ffff"/>
  </g>

  <!-- Enemy silhouettes approaching -->
  <!-- Slime (left) -->
  <ellipse cx="70" cy="140" rx="12" ry="10" fill="#44ff44" opacity="0.7"/>
  <!-- Skeleton (top) -->
  <g transform="translate(180, 50)" opacity="0.6">
    <rect x="-5" y="-10" width="10" height="18" fill="#dddddd"/>
    <circle cx="0" cy="-10" r="6" fill="#dddddd"/>
  </g>
  <!-- Spider (right) -->
  <g transform="translate(330, 120)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#884488"/>
  </g>
  <!-- Golem (bottom) -->
  <rect x="135" y="200" width="18" height="24" rx="2" fill="#aa7744" opacity="0.5"/>
  <!-- Dragon (far right) -->
  <g transform="translate(340, 60)" opacity="0.5">
    <polygon points="0,-12 10,6 0,12 -10,6" fill="#ff4444"/>
  </g>

  <!-- Towers -->
  <g opacity="0.7">
    <!-- Arcane tower -->
    <rect x="120" y="155" width="12" height="20" fill="#1a1a2e"/>
    <circle cx="126" cy="155" r="7" fill="#00ffff"/>
    <!-- Fire tower -->
    <rect x="268" y="100" width="12" height="20" fill="#1a1a2e"/>
    <circle cx="274" cy="100" r="7" fill="#ff6600"/>
  </g>

  <!-- Arcane bolt projectiles -->
  <circle cx="145" cy="125" r="4" fill="#00ffff" opacity="0.8"/>
  <circle cx="260" cy="115" r="4" fill="#00ffff" opacity="0.6"/>
  <circle cx="190" cy="85" r="3" fill="#00ffff" opacity="0.5"/>

  <!-- Particle effects -->
  <circle cx="100" cy="160" r="2" fill="#44ff44" opacity="0.4"/>
  <circle cx="300" cy="80" r="2" fill="#ff6600" opacity="0.4"/>
  <circle cx="240" cy="180" r="1.5" fill="#6c3cf7" opacity="0.5"/>
  <circle cx="160" cy="90" r="1.5" fill="#ffd700" opacity="0.3"/>
  <circle cx="280" cy="160" r="2" fill="#88ddff" opacity="0.3"/>

  <!-- Title text -->
  <text x="200" y="245" text-anchor="middle" font-family="serif" font-weight="900" font-size="26" fill="#e0e0f0" letter-spacing="4">ARCANE</text>
  <text x="200" y="272" text-anchor="middle" font-family="serif" font-weight="900" font-size="22" fill="#e0e0f0" letter-spacing="3">BASTION</text>

  <!-- Subtle glow line under title -->
  <line x1="130" y1="280" x2="270" y2="280" stroke="#6c3cf7" stroke-width="1.5" opacity="0.5"/>
</svg>