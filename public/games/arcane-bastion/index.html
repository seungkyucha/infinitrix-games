// TWEEN MANAGER (F6: clearImmediate separated)
// ============================================================
class TweenManager {
  constructor() { this._tweens = []; this._pending = []; this._clearing = false; }
  // Add a tween
  add(opts) {
    const t = { target:opts.target, prop:opts.prop, from:opts.from, to:opts.to, duration:opts.duration/1000, elapsed:0, ease:opts.ease||'linear', onComplete:opts.onComplete||null };
    if (opts.target && opts.prop) opts.target[opts.prop] = opts.from;
    if (this._clearing) this._pending.push(t);
    else this._tweens.push(t);
    return t;
  }
  // Update all tweens by dt seconds
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      let p = Math.min(t.elapsed / t.duration, 1);
      if (t.ease === 'easeOut') p = 1 - (1 - p) * (1 - p);
      else if (t.ease === 'easeIn') p = p * p;
      else if (t.ease === 'easeInOut') p = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      if (t.target && t.prop) t.target[t.prop] = t.from + (t.to - t.from) * p;
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // Deferred cancel
  cancelAll() { this._clearing = true; this._tweens.length = 0; }
  // Immediate flush after cancelAll (F6)
  clearImmediate() { this._clearing = false; this._tweens.length = 0; if (this._pending.length) { this._tweens.push(...this._pending); this._pending.length = 0; } }
}

// ============================================================
// OBJECT POOL (particles, projectiles)
// ============================================================
class ObjectPool {
  constructor(createFn, resetFn, size) {
    this._pool = []; this._createFn = createFn; this._resetFn = resetFn;
    for (let i = 0; i < size; i++) this._pool.push(createFn());
  }
  acquire() { return this._pool.length > 0 ? this._pool.pop() : this._createFn(); }
  release(obj) { this._resetFn(obj); this._pool.push(obj); }
}

// ============================================================
// SOUND MANAGER (Web Audio API, no setTimeout)
// ============================================================
class SoundManager {
  constructor() { this._ctx = null; this._gainBGM = null; this._gainSFX = null; this._bgmOsc = null; this._vol = 0.3; }
  // Initialize audio context on user gesture
  _init() {
    if (this._ctx) return;
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._gainBGM = this._ctx.createGain(); this._gainBGM.gain.value = this._vol * 0.4; this._gainBGM.connect(this._ctx.destination);
    this._gainSFX = this._ctx.createGain(); this._gainSFX.gain.value = this._vol; this._gainSFX.connect(this._ctx.destination);
  }
  // Play a short SFX
  playSFX(type) {
    if (!this._ctx) return;
    const now = this._ctx.currentTime;
    const osc = this._ctx.createOscillator();
    const g = this._ctx.createGain();
    osc.connect(g); g.connect(this._gainSFX);
    switch(type) {
      case 'shoot': osc.type='sine'; osc.frequency.setValueAtTime(880,now); osc.frequency.exponentialRampToValueAtTime(440,now+0.1); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(now); osc.stop(now+0.1); break;
      case 'fireball': osc.type='sawtooth'; osc.frequency.setValueAtTime(200,now); osc.frequency.exponentialRampToValueAtTime(80,now+0.3); g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
      case 'frost': osc.type='triangle'; osc.frequency.setValueAtTime(600,now); osc.frequency.exponentialRampToValueAtTime(200,now+0.4); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
      case 'hit': osc.type='square'; osc.frequency.setValueAtTime(150,now); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.15); osc.start(now); osc.stop(now+0.15); break;
      case 'kill': osc.type='square'; osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(100,now+0.15); g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.15); osc.start(now); osc.stop(now+0.15); break;
      case 'boss_spawn': osc.type='sine'; osc.frequency.setValueAtTime(60,now); osc.frequency.exponentialRampToValueAtTime(200,now+1.0); g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.01,now+1.0); osc.start(now); osc.stop(now+1.0); break;
      case 'tower_place': osc.type='sine'; osc.frequency.setValueAtTime(523,now); osc.frequency.setValueAtTime(659,now+0.05); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.2); osc.start(now); osc.stop(now+0.2); break;
      case 'game_over': osc.type='sawtooth'; osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(60,now+0.8); g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.8); osc.start(now); osc.stop(now+0.8); break;
      case 'upgrade': osc.type='sine'; osc.frequency.setValueAtTime(523,now); osc.frequency.setValueAtTime(659,now+0.1); osc.frequency.setValueAtTime(784,now+0.2); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
      default: osc.type='sine'; osc.frequency.setValueAtTime(440,now); g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(now); osc.stop(now+0.1);
    }
  }
  // Simple BGM loop
  playBGM(type) { this.stopBGM(); if(!this._ctx) return; /* BGM stub - could add oscillator patterns */ }
  stopBGM() { if(this._bgmOsc){ try{this._bgmOsc.stop();}catch(e){} this._bgmOsc=null; } }
  stopAll() { this.stopBGM(); }
  setVolume(v) { this._vol = v; if(this._gainBGM) this._gainBGM.gain.value = v*0.4; if(this._gainSFX) this._gainSFX.gain.value = v; }
}

// UTILITY FUNCTIONS (pure, no global refs)
// ============================================================
// Distance between two points
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
// Circle collision check
function checkCollision(a, b) { return dist(a.x, a.y, b.x, b.y) < (a.radius||12) + (b.radius||12); }
// Find enemies within radius of position
function findEnemiesInRadius(px, py, radius, enemies) { return enemies.filter(e => e.alive && dist(px, py, e.x, e.y) < radius); }
// Clamp value
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
// Ensure touch target minimum size
function touchSafe(w, h) { return { w: Math.max(CONFIG.MIN_TOUCH_TARGET, w), h: Math.max(CONFIG.MIN_TOUCH_TARGET, h) }; }
// Random int [min, max]
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
// Normalize angle
function normalizeAngle(a) { while (a > Math.PI) a -= Math.PI*2; while (a < -Math.PI) a += Math.PI*2; return a; }

function saveBest(data) {
  try { localStorage.setItem('arcaneBastion_hi', JSON.stringify(data)); } catch(e) {}
}
function loadAchievements() {
  try { return JSON.parse(localStorage.getItem('arcaneBastion_achievements')) || {}; } catch(e) { return {}; }
}
function saveAchievements(a) {
  try { localStorage.setItem('arcaneBastion_achievements', JSON.stringify(a)); } catch(e) {}
}

// ============================================================
// STATE TRANSITION (F23: all through beginTransition)
// ============================================================
function beginTransition(target, opts) {
  opts = opts || {};
  if (_isTransitioning) return;
  if (STATE_PRIORITY[target] < STATE_PRIORITY[state] && !opts.force) return;
  if (bastion && bastion.hp <= 0 && target !== STATE.GAMEOVER) return;
  _isTransitioning = true;

  if (opts.immediate) {
    state = target;
    _isTransitioning = false;
    if (opts.onComplete) opts.onComplete();
    return;
  }

  tweenManager.add({
    target: screenFade, prop: 'alpha',
    from: 0, to: 1, duration: 250, ease: 'easeIn',
    onComplete: () => {
      state = target;
      tweenManager.add({
        target: screenFade, prop: 'alpha',
        from: 1, to: 0, duration: 250, ease: 'easeOut',
        onComplete: () => { _isTransitioning = false; if (opts.onComplete) opts.onComplete(); }
      });
    }
  });
}

// ============================================================
// RESOURCE MANAGEMENT (F16: single update path)
// ============================================================
function addScore(amount, source) {
  score += amount;
}
function modifyMana(amount, source) {
  mana = clamp(mana + amount, 0, maxMana);
}
function modifyHP(amount, source) {
  // Check dodge chance from upgrade
  if (amount < 0 && upgrades[7]) {
    const dodgeChance = (upgrades[7] || 0) * 0.3;
    if (Math.random() < dodgeChance) return; // dodged
  }
  bastion.hp = clamp(bastion.hp + amount, 0, bastion.maxHp);
  if (amount < 0) {
    bastion.hitFlash = 0.1;
    screenShake.intensity = 3;
    screenShake.time = 0.15;
    // Thorn damage (upgrade 6)
    if (upgrades[6] && source && source.type === 'enemy') {
      const thornDmg = (upgrades[6] || 0) * 5;
      if (source.ref) damageEnemy(source.ref, thornDmg, false);
    }
  }
}

// ============================================================
// WAVE SYSTEM
// ============================================================
function getWaveData(wNum) {
  if (wNum < 1 || wNum > CONFIG.MAX_WAVE) return null;
  return WAVE_DATA[wNum - 1];
}

function startNextWave() {
  waveNum++;
  if (waveNum > CONFIG.MAX_WAVE) { triggerVictory(); return; }

  const wd = getWaveData(waveNum);
  currentBiome = wd.biome;
  bgCacheDirty = true;

  // Regeneration upgrade (18)
  if (upgrades[18]) modifyHP((upgrades[18] || 0) * 10, 'regen');

  const diff = DIFF_SCALE[waveNum - 1];
  const isEliteWave = waveNum >= 10;
  spawnQueue = [];
  const count = wd.count;
  for (let i = 0; i < count; i++) {
    const typeKey = wd.types[i % wd.types.length];
    const isElite = isEliteWave && Math.random() < 0.3;
    spawnQueue.push({ type: typeKey, elite: isElite });
  }
  spawnTimer = 0;
  waveEnemiesAlive = count + (wd.boss ? 1 : 0);
  _waveClearing = false;

  // Boss spawn
  if (wd.boss) {
    const boss = createBoss(wd.boss);
    enemies.push(boss);
    _isBossActive = true;
    currentBoss = boss;
    soundManager.playSFX('boss_spawn');
    screenShake.intensity = 8;
    screenShake.time = 0.5;
  }

  wavePrepTime = wavePrepDuration;
}

// ============================================================
// ENEMY CREATION
// ============================================================
function spawnEnemy(typeKey, isElite, bounds) {
  const base = ENEMY_TYPES[typeKey];
  const diff = DIFF_SCALE[waveNum - 1];
  const side = randInt(0, 3);
  let x, y;
  switch(side) {
    case 0: x = Math.random()*bounds.w; y = -20; break;
    case 1: x = bounds.w+20; y = Math.random()*bounds.h; break;
    case 2: x = Math.random()*bounds.w; y = bounds.h+20; break;
    default: x = -20; y = Math.random()*bounds.h;
  }
  const hpMul = isElite ? 2 : 1;
  const spdMul = isElite ? 1.3 : 1;
  return {
    type: typeKey, x, y, radius: base.radius * (isElite?1.2:1),
    hp: base.hp * diff.hpMul * hpMul, maxHp: base.hp * diff.hpMul * hpMul,
    speed: base.speed * diff.spdMul * spdMul * 50,
    atk: base.atk, color: base.color, score: base.score * (isElite?2:1),
    manaReward: base.mana * (isElite?2:1),
    alive: true, elite: isElite, hitFlash: 0, slowTimer: 0, slowFactor: 1,
    atkCooldown: 0, specialTimer: 0, isBoss: false,
    animPhase: Math.random() * Math.PI * 2, // animation phase offset
    invisible: false, invisTimer: 0,
    fireTimer: 0, // for dragonkin ranged
  };
}

function createBoss(bossKey) {
  const base = BOSS_TYPES[bossKey];
  const side = randInt(0, 3);
  const bw = canvas.width, bh = canvas.height;
  let x, y;
  switch(side) {
    case 0: x = bw/2; y = -60; break;
    case 1: x = bw+60; y = bh/2; break;
    case 2: x = bw/2; y = bh+60; break;
    default: x = -60; y = bh/2;
  }
  return {
    type: bossKey, x, y, radius: base.radius,
    hp: base.hp, maxHp: base.hp, speed: base.speed * 50,
    atk: base.atk, color: base.color, score: base.score,
    manaReward: base.mana, alive: true, elite: false,
    hitFlash: 0, slowTimer: 0, slowFactor: 1,
    atkCooldown: 0, specialTimer: 0, isBoss: true,
    bossName: base.name, patternTimer: 0, currentPattern: 0,
    animPhase: 0, invisible: false, invisTimer: 0, fireTimer: 0,
  };
}

// ============================================================
// DAMAGE & KILL
// ============================================================
function damageEnemy(enemy, damage, isCrit) {
  if (!enemy.alive) return { killed: false };
  // Wraith invisibility dodge
  if (enemy.invisible) return { killed: false };
  if (isCrit) damage *= 2;
  enemy.hp -= damage;
  enemy.hitFlash = 0.1;
  // Spawn hit particles
  spawnParticles(enemy.x, enemy.y, 3, enemy.color, 80, 0.3);
  if (enemy.hp <= 0) {
    enemy.alive = false;
    waveEnemiesAlive--;
    totalKills++;
    addScore(enemy.score, 'kill');
    const manaGain = Math.floor(enemy.manaReward * (1 + (upgrades[9]||0)*0.5));
    modifyMana(manaGain, 'kill');
    soundManager.playSFX('kill');
    spawnParticles(enemy.x, enemy.y, 8, enemy.color, 120, 0.5);
    // Boss kill
    if (enemy.isBoss) {
      _isBossActive = false;
      currentBoss = null;
      screenShake.intensity = 12;
      screenShake.time = 0.6;
      slowMotion.factor = 0.3;
      slowMotion.time = 0.8;
      spawnParticles(enemy.x, enemy.y, 30, '#ffd700', 200, 1.0);
      // Boss achievements
      if (enemy.type === 'golemKing') unlockAchievement(4);
      if (enemy.type === 'wraithKing') unlockAchievement(5);
      if (enemy.type === 'dragon') unlockAchievement(6);
    }
    checkAchievements();
    return { killed: true, score: enemy.score, mana: manaGain };
  }
  return { killed: false };
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const p = particlePool.acquire();
    const angle = Math.random() * Math.PI * 2;
    const spd = (Math.random() * 0.7 + 0.3) * speed;
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * spd;
    p.vy = Math.sin(angle) * spd;
    p.life = life;
    p.maxLife = life;
    p.color = color;
    p.size = Math.random() * 3 + 1;
    p.alive = true;
    particles.push(p);
  }
}

function updateParticles(parts, dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    if (!p.alive) { parts.splice(i, 1); particlePool.release(p); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { p.alive = false; parts.splice(i, 1); particlePool.release(p); }
  }
}

// ============================================================
// WIZARD UPDATE
// ============================================================
function updateWizard(wiz, input, dt, bounds) {
  let dx = 0, dy = 0;
  // Keyboard input
  if (input.keys['KeyW'] || input.keys['ArrowUp']) dy = -1;
  if (input.keys['KeyS'] || input.keys['ArrowDown']) dy = 1;
  if (input.keys['KeyA'] || input.keys['ArrowLeft']) dx = -1;
  if (input.keys['KeyD'] || input.keys['ArrowRight']) dx = 1;
  // Touch joystick
  if (input.touch.joystick && input.touch.joystickDist > 10) {
    dx = Math.cos(input.touch.joystickAngle);
    dy = Math.sin(input.touch.joystickAngle);
  }
  // Mouse drag
  if (isDraggingWizard && !isTouchDevice) {
    const mdx = input.mouse.x - wiz.x;
    const mdy = input.mouse.y - wiz.y;
    const md = Math.sqrt(mdx*mdx + mdy*mdy);
    if (md > 5) { dx = mdx/md; dy = mdy/md; }
  }

  // Normalize diagonal
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len > 0) { dx /= len; dy /= len; }

  const speedMul = 1 + (upgrades[14] || 0) * 0.2;
  const speed = CONFIG.WIZARD_SPEED * speedMul;
  wiz.x += dx * speed * dt;
  wiz.y += dy * speed * dt;

  // Bound to canvas
  wiz.x = clamp(wiz.x, wiz.radius, bounds.w - wiz.radius);
  wiz.y = clamp(wiz.y, wiz.radius, bounds.h - wiz.radius);

  // Animation state
  if (len > 0) { wiz.state = 'walk'; wiz.facing = Math.atan2(dy, dx); wiz.animTime += dt; }
  else { wiz.state = 'idle'; wiz.animTime += dt * 0.5; }

  // Cooldowns
  wiz.boltCd = Math.max(0, wiz.boltCd - dt);
  wiz.fireballCd = Math.max(0, wiz.fireballCd - dt);
  wiz.frostCd = Math.max(0, wiz.frostCd - dt);
  wiz.teleportCd = Math.max(0, wiz.teleportCd - dt);
  wiz.hitFlash = Math.max(0, wiz.hitFlash - dt);
  wiz.castAnim = Math.max(0, wiz.castAnim - dt);
}

// ============================================================
// SPELL CASTING
// ============================================================
function fireArcaneBolt(wiz, targetX, targetY, projs, upg) {
  if (wiz.boltCd > 0) return;
  const angle = Math.atan2(targetY - wiz.y, targetX - wiz.x);
  const atkMul = 1 + (upg[1] || 0) * 0.25;
  const isCrit = (upg[17] || 0) > 0 && Math.random() < (upg[17] * 0.2);

  const createBolt = (a) => {
    projs.push({
      x: wiz.x, y: wiz.y, vx: Math.cos(a)*CONFIG.PROJECTILE_SPEED, vy: Math.sin(a)*CONFIG.PROJECTILE_SPEED,
      damage: SPELLS.bolt.atk * atkMul * (isCrit?2:1), type: 'bolt', radius: 5, alive: true,
      color: isCrit ? '#ffff00' : '#00ffff', life: 0.8, chain: (upg[4]||0),
    });
  };

  createBolt(angle);
  // Multishot upgrade
  if (upg[2]) {
    createBolt(angle - 0.15);
    createBolt(angle + 0.15);
  }
  wiz.boltCd = SPELLS.bolt.cooldown;
  wiz.castAnim = 0.15;
  soundManager.playSFX('shoot');
}

function castFireball(wiz, targetX, targetY, projs, upg) {
  if (wiz.fireballCd > 0) return;
  const cost = SPELLS.fireball.manaCost;
  if (mana < cost) return;
  modifyMana(-cost, 'fireball');
  const angle = Math.atan2(targetY - wiz.y, targetX - wiz.x);
  const rangeMul = 1 + (upg[3] || 0) * 0.3;
  const isCrit = (upg[17] || 0) > 0 && Math.random() < (upg[17] * 0.2);
  projs.push({
    x: wiz.x, y: wiz.y, vx: Math.cos(angle)*CONFIG.FIREBALL_SPEED, vy: Math.sin(angle)*CONFIG.FIREBALL_SPEED,
    damage: SPELLS.fireball.atk * (isCrit?2:1), type: 'fireball', radius: 8, alive: true,
    color: '#ff6600', life: 1.2, aoeRadius: SPELLS.fireball.aoeRadius * rangeMul, chain: 0,
  });
  const cdMul = 1 - (upg[3] || 0) * 0.2;
  wiz.fireballCd = SPELLS.fireball.cooldown * cdMul;
  wiz.castAnim = 0.3;
  soundManager.playSFX('fireball');
}

function castFrostNova(wiz, enms, upg) {
  if (wiz.frostCd > 0) return;
  const cost = SPELLS.frost.manaCost;
  if (mana < cost) return;
  modifyMana(-cost, 'frost');
  const rangeMul = 1 + (upg[16] || 0) * 0.4;
  const durAdd = (upg[16] || 0) * 1;
  const radius = SPELLS.frost.aoeRadius * rangeMul;
  const affected = findEnemiesInRadius(wiz.x, wiz.y, radius, enms);
  const isCrit = (upg[17] || 0) > 0 && Math.random() < (upg[17] * 0.2);
  affected.forEach(e => {
    damageEnemy(e, SPELLS.frost.atk * (isCrit?2:1), false);
    e.slowTimer = SPELLS.frost.slowDur + durAdd;
    e.slowFactor = 1 - SPELLS.frost.slowAmt;
  });
  // Frost nova visual
  spawnParticles(wiz.x, wiz.y, 20, '#88ddff', 150, 0.6);
  wiz.frostCd = SPELLS.frost.cooldown;
  wiz.castAnim = 0.3;
  soundManager.playSFX('frost');
}

function teleportWizard(wiz, targetX, targetY, bounds) {
  if (!upgrades[15] || wiz.teleportCd > 0) return;
  const angle = Math.atan2(targetY - wiz.y, targetX - wiz.x);
  const teleportDist = 100;
  wiz.x = clamp(wiz.x + Math.cos(angle)*teleportDist, wiz.radius, bounds.w-wiz.radius);
  wiz.y = clamp(wiz.y + Math.sin(angle)*teleportDist, wiz.radius, bounds.h-wiz.radius);
  wiz.teleportCd = 3;
  spawnParticles(wiz.x, wiz.y, 12, '#aa66ff', 100, 0.4);
}

// ============================================================
// PROJECTILE UPDATE
// ============================================================
function updateProjectiles(projs, enms, dt) {
  for (let i = projs.length - 1; i >= 0; i--) {
    const p = projs[i];
    if (!p.alive) { projs.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0 || p.x < -50 || p.x > canvas.width+50 || p.y < -50 || p.y > canvas.height+50) {
      p.alive = false; projs.splice(i, 1); continue;
    }
    // Collision with enemies
    for (let j = 0; j < enms.length; j++) {
      const e = enms[j];
      if (!e.alive || e.invisible) continue;
      if (dist(p.x, p.y, e.x, e.y) < p.radius + e.radius) {
        // Fireball AOE
        if (p.type === 'fireball') {
          const aoeTargets = findEnemiesInRadius(p.x, p.y, p.aoeRadius, enms);
          aoeTargets.forEach(ae => damageEnemy(ae, p.damage, false));
          spawnParticles(p.x, p.y, 15, '#ff4400', 150, 0.4);
        } else {
          const result = damageEnemy(e, p.damage, false);
          // Chain bolt
          if (p.chain > 0 && result.killed === false) {
            const nearby = findEnemiesInRadius(e.x, e.y, 80, enms).filter(ne => ne !== e);
            if (nearby.length > 0) {
              const next = nearby[0];
              projs.push({
                x: e.x, y: e.y,
                vx: (next.x-e.x)/dist(e.x,e.y,next.x,next.y)*CONFIG.PROJECTILE_SPEED,
                vy: (next.y-e.y)/dist(e.x,e.y,next.x,next.y)*CONFIG.PROJECTILE_SPEED,
                damage: p.damage*0.7, type:'bolt', radius:4, alive:true,
                color:'#aaffff', life:0.5, chain: p.chain-1,
              });
            }
          }
        }
        p.alive = false;
        projs.splice(i, 1);
        break;
      }
    }
  }
}

// ============================================================
// TOWER SYSTEM
// ============================================================
function placeTower(typeKey, px, py, twrs, currentMana, maxTwrs) {
  const tData = TOWER_TYPES[typeKey];
  if (!tData) return { success: false };
  if (twrs.length >= maxTwrs) return { success: false };
  if (currentMana < tData.cost) return { success: false };
  // Must not overlap bastion
  if (dist(px, py, bastion.x, bastion.y) < CONFIG.BASTION_RADIUS + 30) return { success: false };
  // Must not overlap other towers
  for (const t of twrs) { if (dist(px, py, t.x, t.y) < CONFIG.TOWER_PLACE_MIN_DIST) return { success: false }; }

  const tower = {
    type: typeKey, x: px, y: py, radius: 18,
    range: tData.range, atk: tData.atk, cooldown: tData.cooldown,
    color: tData.color, special: tData.special, timer: 0,
    aoeRadius: tData.aoeRadius || 0, slowAmt: tData.slowAmt || 0,
    slowDur: tData.slowDur || 0, chainCount: tData.chainCount || 0,
    healAmt: tData.healAmt || 0,
  };
  twrs.push(tower);
  modifyMana(-tData.cost, 'tower');
  soundManager.playSFX('tower_place');
  spawnParticles(px, py, 8, tData.color, 60, 0.3);
  checkAchievements();
  return { success: true, tower };
}

function updateTowers(twrs, enms, projs, dt, upg) {
  const atkMul = 1 + (upg[11] || 0) * 0.2;
  const spdMul = 1 - (upg[12] || 0) * 0.15;
  for (const t of twrs) {
    t.timer -= dt;
    if (t.timer > 0) continue;
    if (t.special === 'heal') {
      // Heal bastion
      if (bastion.hp < bastion.maxHp) {
        modifyHP(TOWER_TYPES.heal.healAmt, 'healTower');
        spawnParticles(bastion.x, bastion.y, 3, '#44ff44', 40, 0.3);
        t.timer = t.cooldown * spdMul;
      }
      continue;
    }
    // Find closest enemy in range
    let target = null, minD = Infinity;
    for (const e of enms) {
      if (!e.alive || e.invisible) continue;
      const d = dist(t.x, t.y, e.x, e.y);
      if (d < t.range && d < minD) { minD = d; target = e; }
    }
    if (!target) continue;
    t.timer = t.cooldown * spdMul;
    const dmg = t.atk * atkMul;

    if (t.special === 'aoe') {
      const hit = findEnemiesInRadius(target.x, target.y, t.aoeRadius, enms);
      hit.forEach(e => damageEnemy(e, dmg, false));
      spawnParticles(target.x, target.y, 6, t.color, 80, 0.3);
    } else if (t.special === 'slow') {
      damageEnemy(target, dmg, false);
      target.slowTimer = t.slowDur; target.slowFactor = 1 - t.slowAmt;
    } else if (t.special === 'chain') {
      damageEnemy(target, dmg, false);
      let prev = target;
      for (let c = 0; c < 2; c++) {
        const nearby = findEnemiesInRadius(prev.x, prev.y, 80, enms).filter(e => e !== prev && e.alive);
        if (nearby.length === 0) break;
        prev = nearby[0];
        damageEnemy(prev, dmg * 0.6, false);
      }
      spawnParticles(target.x, target.y, 4, '#ffff44', 60, 0.2);
    } else {
      // Single target
      damageEnemy(target, dmg, false);
    }
    // Tower attack visual line
    projs.push({ x:t.x, y:t.y, tx:target.x, ty:target.y, type:'towerBeam', color:t.color, life:0.1, alive:true, vx:0, vy:0, damage:0, radius:0, chain:0 });
  }
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(enms, bast, wiz, dt) {
  for (const e of enms) {
    if (!e.alive) continue;
    e.hitFlash = Math.max(0, e.hitFlash - dt);
    e.animPhase += dt * 3;

    // Slow effect decay
    if (e.slowTimer > 0) { e.slowTimer -= dt; if (e.slowTimer <= 0) e.slowFactor = 1; }

    // Type-specific behaviors
    if (e.type === 'wraith' && !e.isBoss) {
      e.invisTimer -= dt;
      if (e.invisTimer <= 0) { e.invisible = !e.invisible; e.invisTimer = e.invisible ? 1.5 : 3; }
    }

    // Move toward bastion
    const dx = bast.x - e.x;
    const dy = bast.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > bast.radius + e.radius) {
      const spd = e.speed * e.slowFactor;
      e.x += (dx/d) * spd * dt;
      e.y += (dy/d) * spd * dt;
    } else {
      // Attack bastion
      e.atkCooldown -= dt;
      if (e.atkCooldown <= 0) {
        modifyHP(-e.atk, { type: 'enemy', ref: e });
        e.atkCooldown = 1.0;
      }
    }

    // Dragonkin ranged attack
    if (e.type === 'dragonkin' && !e.isBoss) {
      e.fireTimer -= dt;
      if (e.fireTimer <= 0 && d < 200 && d > 60) {
        projectiles.push({
          x:e.x, y:e.y, vx:(dx/d)*150, vy:(dy/d)*150,
          damage:5, type:'enemyFire', radius:4, alive:true, color:'#ff4400', life:1.0, chain:0,
        });
        e.fireTimer = 2.5;
      }
    }

    // Boss patterns
    if (e.isBoss) updateBossPatterns(e, wiz, bast, enms, dt);
  }

  // Handle enemy projectiles hitting bastion
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.type === 'enemyFire' && p.alive) {
      if (dist(p.x, p.y, bast.x, bast.y) < bast.radius + p.radius) {
        modifyHP(-p.damage, { type: 'enemyFire' });
        p.alive = false;
        spawnParticles(p.x, p.y, 4, '#ff4400', 60, 0.2);
      }
    }
  }
}

// ============================================================
// BOSS PATTERNS
// ============================================================
function updateBossPatterns(boss, wiz, bast, enms, dt) {
  boss.patternTimer -= dt;
  if (boss.patternTimer > 0) return;

  if (boss.type === 'golemKing') {
    // Shockwave attack
    boss.patternTimer = 3;
    const affected = findEnemiesInRadius(boss.x, boss.y, 120, [{ x: bast.x, y: bast.y, alive: true, radius: bast.radius }]);
    if (dist(boss.x, boss.y, bast.x, bast.y) < 160) {
      modifyHP(-10, { type: 'bossShockwave' });
    }
    spawnParticles(boss.x, boss.y, 20, '#cc8833', 150, 0.5);
    screenShake.intensity = 6; screenShake.time = 0.3;
  } else if (boss.type === 'wraithKing') {
    boss.currentPattern = (boss.currentPattern + 1) % 3;
    if (boss.currentPattern === 0) {
      // Teleport
      boss.x = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
      boss.y = Math.random() * canvas.height * 0.6 + canvas.height * 0.2;
      spawnParticles(boss.x, boss.y, 15, '#4444ff', 100, 0.4);
      boss.patternTimer = 4;
    } else if (boss.currentPattern === 1) {
      // Summon 2 wraiths
      for (let i = 0; i < 2; i++) {
        const e = spawnEnemy('wraith', false, {w:canvas.width,h:canvas.height});
        e.x = boss.x + (Math.random()-0.5)*60;
        e.y = boss.y + (Math.random()-0.5)*60;
        enms.push(e);
        waveEnemiesAlive++;
      }
      boss.patternTimer = 8;
    } else {
      // Soul drain (heal)
      boss.hp = Math.min(boss.maxHp, boss.hp + 20);
      spawnParticles(boss.x, boss.y, 10, '#8844ff', 60, 0.3);
      boss.patternTimer = 6;
    }
  } else if (boss.type === 'dragon') {
    boss.currentPattern = (boss.currentPattern + 1) % 3;
    if (boss.currentPattern === 0) {
      // Fire breath (fan)
      const angle = Math.atan2(bast.y - boss.y, bast.x - boss.x);
      for (let a = -0.5; a <= 0.5; a += 0.2) {
        projectiles.push({
          x:boss.x, y:boss.y,
          vx: Math.cos(angle+a)*120, vy: Math.sin(angle+a)*120,
          damage:8, type:'enemyFire', radius:6, alive:true, color:'#ff2200', life:1.5, chain:0,
        });
      }
      boss.patternTimer = 4;
    } else if (boss.currentPattern === 1) {
      // Flight (fast movement toward random side)
      boss.speed = BOSS_TYPES.dragon.speed * 50 * 4;
      boss.patternTimer = 2;
      // Reset speed after
      const origSpeed = BOSS_TYPES.dragon.speed * 50;
      tweenManager.add({ target: boss, prop: 'speed', from: boss.speed, to: origSpeed, duration: 2000 });
    } else {
      // Carpet bombing (3 lines)
      for (let l = -1; l <= 1; l++) {
        const angle = Math.atan2(bast.y - boss.y, bast.x - boss.x) + l * 0.3;
        for (let d = 0; d < 3; d++) {
          projectiles.push({
            x: boss.x + Math.cos(angle)*(d*40), y: boss.y + Math.sin(angle)*(d*40),
            vx: Math.cos(angle)*100, vy: Math.sin(angle)*100,
            damage:6, type:'enemyFire', radius:5, alive:true, color:'#ff4400', life:2, chain:0,
          });
        }
      }
      boss.patternTimer = 5;
    }
  }
}

// ============================================================
// WAVE COMPLETION CHECK
// ============================================================
function checkWaveComplete() {
  if (_waveClearing || _isTransitioning) return;
  if (spawnQueue.length > 0) return;
  const aliveCount = enemies.filter(e => e.alive).length;
  if (aliveCount > 0) return;

  _waveClearing = true;

  // Wave clear bonus
  addScore(waveNum * 50, 'waveBonus');

  // Check wave-based achievements
  if (waveNum === 1) unlockAchievement(1);
  if (waveNum >= 5 && towers.length === 0) unlockAchievement(7);

  // Check no-damage wave achievement
  // (simplified: check if bastion at max)
  if (bastion.hp >= bastion.maxHp) unlockAchievement(8);

  if (waveNum >= CONFIG.MAX_WAVE) {
    triggerVictory();
    return;
  }

  // Go to upgrade selection
  generateUpgradeChoices();
  beginTransition(STATE.UPGRADE, { onComplete: () => { _waveClearing = false; } });
}

// ============================================================
// GAME OVER / VICTORY
// ============================================================
function checkGameOver() {
  if (bastion.hp <= 0 && state === STATE.PLAYING) {
    isVictory = false;
    soundManager.playSFX('game_over');
    screenShake.intensity = 15;
    screenShake.time = 1.0;
    saveResult();
    beginTransition(STATE.GAMEOVER, { force: true });
  }
}

function triggerVictory() {
  isVictory = true;
  // Bastion remaining HP bonus
  addScore(bastion.hp * 10, 'bastionHP');
  if (bastion.hp >= bastion.maxHp) unlockAchievement(10);
  saveResult();
  beginTransition(STATE.GAMEOVER, { force: true });
}

function saveResult() {
  const best = getBest();
  const isNew = score > best.score;
  saveBest({
    score: Math.max(score, best.score),
    wave: Math.max(waveNum, best.wave),
    time: Math.max(Math.floor(gameTime), best.time)
  });
}

// ============================================================
// UPGRADE SYSTEM
// ============================================================
function generateUpgradeChoices() {
  const available = UPGRADE_POOL.filter(u => (upgrades[u.id] || 0) < u.max);
  // Shuffle and pick 3
  for (let i = available.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [available[i], available[j]] = [available[j], available[i]];
  }
  upgradeChoices = available.slice(0, Math.min(3, available.length));
  upgradeHover = -1;
}

function applyUpgrade(upgradeId) {
  upgrades[upgradeId] = (upgrades[upgradeId] || 0) + 1;
  const up = UPGRADE_POOL.find(u => u.id === upgradeId);
  // Apply immediate effects
  if (upgradeId === 5) { bastion.maxHp += 20; bastion.hp = Math.min(bastion.hp + 20, bastion.maxHp); }
  if (upgradeId === 8) manaRegen += 2;
  if (upgradeId === 10) { maxMana += 30; mana = Math.min(mana + 30, maxMana); }
  if (upgradeId === 13) { /* maxTowers handled in placeTower check */ }

  soundManager.playSFX('upgrade');
  spawnParticles(canvas.width/2, canvas.height/2, 20, up.color, 150, 0.6);

  // Start next wave after brief delay via tween
  beginTransition(STATE.PLAYING, { force: true, onComplete: () => {
    startNextWave();
  }});
}

// ============================================================
// ACHIEVEMENT SYSTEM
// ============================================================
function unlockAchievement(id) {
  if (achievements[id]) return;
  achievements[id] = true;
  saveAchievements(achievements);
  const ach = ACHIEVEMENT_DATA.find(a => a.id === id);
  if (ach) {
    newAchievements.push(ach);
    toasts.push({ text: ach.name, desc: ach.desc, time: 3 });
  }
}

function checkAchievements() {
  if (totalKills >= 100) unlockAchievement(3);
  if (mana >= 300) unlockAchievement(9);
  // Tower master: check all 5 types placed
  const towerTypes = new Set(towers.map(t => t.type));
  if (towerTypes.size >= 5) unlockAchievement(2);
}

// ============================================================
// BACKGROUND CACHE (offscreen canvas, F10)
// ============================================================
function buildBgCache(biome, w, h) {
  if (!bgCacheCanvas) bgCacheCanvas = document.createElement('canvas');
  bgCacheCanvas.width = w;
  bgCacheCanvas.height = h;
  const bctx = bgCacheCanvas.getContext('2d');

  // Base gradient
  let grad;
  if (biome === 'forest') {
    grad = bctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a1a0a');
    grad.addColorStop(1, '#1a3a1a');
  } else if (biome === 'cave') {
    grad = bctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a0a1a');
    grad.addColorStop(1, '#1a1a3a');
  } else {
    grad = bctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#1a0a0a');
    grad.addColorStop(1, '#3a1a0a');
  }
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, w, h);

  // Far layer: silhouettes
  bctx.globalAlpha = 0.15;
  if (biome === 'forest') {
    // Mountain silhouettes
    bctx.fillStyle = '#1a4a1a';
    for (let i = 0; i < 8; i++) {
      const mx = w * (i/8) + 20;
      const mw = w/6;
      const mh = h * 0.3 + Math.sin(i*1.7)*40;
      bctx.beginPath();
      bctx.moveTo(mx, h*0.4);
      bctx.lineTo(mx + mw/2, h*0.4 - mh);
      bctx.lineTo(mx + mw, h*0.4);
      bctx.fill();
    }
  } else if (biome === 'cave') {
    // Stalactites
    bctx.fillStyle = '#2a2a4a';
    for (let i = 0; i < 12; i++) {
      const sx = Math.random() * w;
      const sw = 10 + Math.random()*20;
      const sh = 30 + Math.random()*60;
      bctx.beginPath();
      bctx.moveTo(sx, 0);
      bctx.lineTo(sx+sw/2, sh);
      bctx.lineTo(sx+sw, 0);
      bctx.fill();
    }
  } else {
    // Lava flow background
    bctx.fillStyle = '#4a1a0a';
    for (let i = 0; i < 6; i++) {
      bctx.beginPath();
      const y = h * 0.3 + i * 40;
      bctx.moveTo(0, y);
      for (let x = 0; x < w; x += 30) {
        bctx.lineTo(x, y + Math.sin(x*0.02+i)*15);
      }
      bctx.lineTo(w, h);
      bctx.lineTo(0, h);
      bctx.fill();
    }
  }

  // Mid layer: objects
  bctx.globalAlpha = 0.2;
  if (biome === 'forest') {
    // Trees
    bctx.fillStyle = '#0d3d0d';
    for (let i = 0; i < 10; i++) {
      const tx = Math.random()*w;
      const ty = h*0.3 + Math.random()*h*0.3;
      drawTreeSilhouette(bctx, tx, ty, 20+Math.random()*30);
    }
  } else if (biome === 'cave') {
    // Rock pillars
    bctx.fillStyle = '#3a3a5a';
    for (let i = 0; i < 6; i++) {
      const rx = Math.random()*w;
      const rw = 15+Math.random()*25;
      bctx.fillRect(rx, h*0.2+Math.random()*h*0.3, rw, h*0.5);
    }
  } else {
    // Volcanic cracks
    bctx.strokeStyle = '#ff3300';
    bctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      bctx.beginPath();
      let cx = Math.random()*w, cy = Math.random()*h;
      bctx.moveTo(cx, cy);
      for (let s = 0; s < 5; s++) {
        cx += (Math.random()-0.5)*40;
        cy += Math.random()*30;
        bctx.lineTo(cx, cy);
      }
      bctx.stroke();
    }
  }

  // Grid overlay for tactical feel
  bctx.globalAlpha = 0.03;
  bctx.strokeStyle = '#ffffff';
  bctx.lineWidth = 0.5;
  const gridSize = 40;
  for (let x = 0; x < w; x += gridSize) { bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, h); bctx.stroke(); }
  for (let y = 0; y < h; y += gridSize) { bctx.beginPath(); bctx.moveTo(0, y); bctx.lineTo(w, y); bctx.stroke(); }

  bctx.globalAlpha = 1;
  bgCacheDirty = false;
}

function drawTreeSilhouette(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - size*0.4, y + size);
  ctx.lineTo(x + size*0.4, y + size);
  ctx.closePath();
  ctx.fill();
  ctx.fillRect(x - size*0.06, y + size, size*0.12, size*0.4);
}

// ============================================================
// INPUT HANDLING
// ============================================================
// Keyboard
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  // Prevent scrolling
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();

  if (state === STATE.TITLE && (e.code === 'Space' || e.code === 'Enter')) {
    soundManager._init();
    startGame();
  }
  if (state === STATE.PLAYING) {
    if (e.code === 'KeyQ') castFireball(wizard, mousePos.x, mousePos.y, projectiles, upgrades);
    if (e.code === 'KeyE') castFrostNova(wizard, enemies, upgrades);
    if (e.code === 'Space') {
      if (upgrades[15]) teleportWizard(wizard, mousePos.x, mousePos.y, {w:canvas.width,h:canvas.height});
      else if (wavePrepTime > 0) wavePrepTime = 0;
    }
    if (e.code === 'Escape') beginTransition(STATE.PAUSED, { immediate: true });
    // Tower selection 1-5
    if (e.code >= 'Digit1' && e.code <= 'Digit5') {
      const tKeys = ['arcane','fire','ice','lightning','heal'];
      const idx = parseInt(e.code.slice(5)) - 1;
      if (idx >= 0 && idx < 5) { _isPlacingTower = true; _selectedTowerType = tKeys[idx]; }
    }
  }
  if (state === STATE.PAUSED && e.code === 'Escape') {
    beginTransition(STATE.PLAYING, { immediate: true, force: true });
  }
  if (state === STATE.GAMEOVER && (e.code === 'KeyR' || e.code === 'Space')) {
    initGame();
    beginTransition(STATE.TITLE, { force: true });
  }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// Mouse
canvas.addEventListener('mousemove', (e) => {
  mousePos.x = e.clientX; mousePos.y = e.clientY;
  // Upgrade hover
  if (state === STATE.UPGRADE) {
    upgradeHover = getUpgradeCardIndex(mousePos.x, mousePos.y);
  }
  // Tower placement preview (already tracked via mousePos)
});

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  soundManager._init();
  if (e.button === 0) mouseDown.left = true;
  if (e.button === 2) mouseDown.right = true;
  if (e.button === 1) mouseDown.middle = true;

  if (state === STATE.TITLE) { startGame(); return; }

  if (state === STATE.PLAYING) {
    if (e.button === 0) {
      // Check UI clicks first
      const uiAction = checkUIClick(mousePos.x, mousePos.y);
      if (uiAction) return;

      if (_isPlacingTower) {
        const maxT = CONFIG.MAX_TOWERS + (upgrades[13]||0)*2;
        placeTower(_selectedTowerType, mousePos.x, mousePos.y, towers, mana, maxT);
        _isPlacingTower = false; _selectedTowerType = null;
        return;
      }
      // Check if clicking near wizard for drag
      if (dist(mousePos.x, mousePos.y, wizard.x, wizard.y) < 40) {
        isDraggingWizard = true;
      } else {
        // Fire arcane bolt
        fireArcaneBolt(wizard, mousePos.x, mousePos.y, projectiles, upgrades);
      }
    }
    if (e.button === 2) {
      if (_isPlacingTower) { _isPlacingTower = false; _selectedTowerType = null; return; }
      castFireball(wizard, mousePos.x, mousePos.y, projectiles, upgrades);
    }
    if (e.button === 1) {
      castFrostNova(wizard, enemies, upgrades);
    }
  }

  if (state === STATE.UPGRADE) {
    const idx = getUpgradeCardIndex(mousePos.x, mousePos.y);
    if (idx >= 0 && idx < upgradeChoices.length) {
      applyUpgrade(upgradeChoices[idx].id);
    }
  }

  if (state === STATE.PAUSED) {
    beginTransition(STATE.PLAYING, { immediate: true, force: true });
  }

  if (state === STATE.GAMEOVER) {
    initGame();
    beginTransition(STATE.TITLE, { force: true });
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (e.button === 0) { mouseDown.left = false; isDraggingWizard = false; }
  if (e.button === 2) mouseDown.right = false;
  if (e.button === 1) mouseDown.middle = false;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  isTouchDevice = true;
  soundManager._init();

  if (state === STATE.TITLE) { startGame(); return; }
  if (state === STATE.GAMEOVER) { initGame(); beginTransition(STATE.TITLE, {force:true}); return; }
  if (state === STATE.PAUSED) { beginTransition(STATE.PLAYING, {immediate:true, force:true}); return; }

  for (const touch of e.changedTouches) {
    const tx = touch.clientX, ty = touch.clientY;

    if (state === STATE.UPGRADE) {
      const idx = getUpgradeCardIndex(tx, ty);
      if (idx >= 0 && idx < upgradeChoices.length) applyUpgrade(upgradeChoices[idx].id);
      return;
    }

    if (state === STATE.PLAYING) {
      // Check UI buttons first
      const uiAction = checkUIClick(tx, ty);
      if (uiAction) return;

      // Tower placement
      if (_isPlacingTower) {
        const maxT = CONFIG.MAX_TOWERS + (upgrades[13]||0)*2;
        placeTower(_selectedTowerType, tx, ty, towers, mana, maxT);
        _isPlacingTower = false; _selectedTowerType = null;
        return;
      }

      // Left side: joystick
      if (tx < canvas.width * 0.4 && ty > canvas.height * 0.5) {
        touchState.joystick = { id: touch.identifier, startX: tx, startY: ty };
        touchState.active = true;
      } else {
        // Right side: attack
        touchState.attackTouch = { id: touch.identifier, x: tx, y: ty };
        fireArcaneBolt(wizard, tx, ty, projectiles, upgrades);
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchState.joystick && touch.identifier === touchState.joystick.id) {
      const dx = touch.clientX - touchState.joystick.startX;
      const dy = touch.clientY - touchState.joystick.startY;
      touchState.joystickAngle = Math.atan2(dy, dx);
      touchState.joystickDist = Math.min(Math.sqrt(dx*dx+dy*dy), CONFIG.JOYSTICK_BASE);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchState.joystick && touch.identifier === touchState.joystick.id) {
      touchState.joystick = null;
      touchState.joystickDist = 0;
      touchState.active = false;
    }
    if (touchState.attackTouch && touch.identifier === touchState.attackTouch.id) {
      touchState.attackTouch = null;
    }
  }
}, { passive: false });

// Auto-fire bolt while mouse held
function handleAutoFire(dt) {
  if (state !== STATE.PLAYING) return;
  if (mouseDown.left && !_isPlacingTower && !isDraggingWizard) {
    fireArcaneBolt(wizard, mousePos.x, mousePos.y, projectiles, upgrades);
  }
}

// ============================================================
// UI CLICK DETECTION
// ============================================================
function checkUIClick(x, y) {
  // Pause button (top-right)
  if (x > canvas.width - 56 && y < 56) {
    if (state === STATE.PLAYING) beginTransition(STATE.PAUSED, { immediate: true });
    return true;
  }

  // Tower bar (bottom center)
  const towerBarY = canvas.height - 70;
  const towerBarX = canvas.width/2 - 5*30;
  if (y > towerBarY && y < canvas.height - 10) {
    const tKeys = ['arcane','fire','ice','lightning','heal'];
    for (let i = 0; i < 5; i++) {
      const bx = towerBarX + i*60;
      if (x > bx && x < bx + 56) {
        _isPlacingTower = true;
        _selectedTowerType = tKeys[i];
        return true;
      }
    }
  }

  // Mobile skill buttons (right side)
  if (isTouchDevice) {
    const skillBtnSize = 56;
    // Fireball button
    const fbX = canvas.width - 70;
    const fbY = canvas.height - 190;
    if (x > fbX && x < fbX+skillBtnSize && y > fbY && y < fbY+skillBtnSize) {
      castFireball(wizard, bastion.x, bastion.y - 100, projectiles, upgrades);
      return true;
    }
    // Frost nova button
    const fnY = canvas.height - 125;
    if (x > fbX && x < fbX+skillBtnSize && y > fnY && y < fnY+skillBtnSize) {
      castFrostNova(wizard, enemies, upgrades);
      return true;
    }
  }

  return false;
}

function getUpgradeCardIndex(x, y) {
  const cw = 160, ch = 220, gap = 20;
  const totalW = upgradeChoices.length * cw + (upgradeChoices.length - 1) * gap;
  const startX = (canvas.width - totalW) / 2;
  const startY = canvas.height/2 - ch/2;
  for (let i = 0; i < upgradeChoices.length; i++) {
    const cx = startX + i*(cw+gap);
    if (x >= cx && x <= cx+cw && y >= startY && y <= startY+ch) return i;
  }
  return -1;
}

// ============================================================
// START GAME
// ============================================================
function startGame() {
  initGame();
  beginTransition(STATE.PLAYING, { force: true, onComplete: () => {
    startNextWave();
  }});
}

// ============================================================
// UPDATE FUNCTIONS
// ============================================================
function updateTitle(dt) {
  titleTime += dt;
  // Title particles
  if (Math.random() < 0.3) {
    titleParticles.push({
      x: Math.random()*canvas.width, y: canvas.height + 10,
      vx: (Math.random()-0.5)*30, vy: -50 - Math.random()*80,
      life: 2+Math.random()*2, maxLife: 4, size: 1+Math.random()*2,
      color: ['#6c3cf7','#00d4ff','#ffd700','#ff4444'][randInt(0,3)],
    });
  }
  for (let i = titleParticles.length-1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
    if (p.life <= 0) titleParticles.splice(i, 1);
  }
}

function updatePlaying(dt) {
  const effectiveDt = dt * slowMotion.factor;
  gameTime += effectiveDt;

  // Mana regen
  modifyMana(manaRegen * effectiveDt, 'regen');

  // Wave prep countdown
  if (wavePrepTime > 0) {
    wavePrepTime -= effectiveDt;
    // Don't spawn enemies during prep
  } else {
    // Spawn enemies from queue
    if (spawnQueue.length > 0) {
      const diff = DIFF_SCALE[waveNum - 1];
      spawnTimer -= effectiveDt * 1000;
      if (spawnTimer <= 0) {
        const sp = spawnQueue.shift();
        const e = spawnEnemy(sp.type, sp.elite, {w:canvas.width,h:canvas.height});
        enemies.push(e);
        spawnTimer = diff.interval;
      }
    }
  }

  // Update wizard
  updateWizard(wizard, { keys, mouse: mousePos, touch: touchState }, effectiveDt, {w:canvas.width,h:canvas.height});

  // Auto-fire
  handleAutoFire(effectiveDt);

  // Update projectiles
  updateProjectiles(projectiles, enemies, effectiveDt);

  // Update towers
  updateTowers(towers, enemies, projectiles, effectiveDt, upgrades);

  // Update enemies
  updateEnemies(enemies, bastion, wizard, effectiveDt);

  // Clean dead enemies
  for (let i = enemies.length-1; i >= 0; i--) {
    if (!enemies[i].alive) enemies.splice(i, 1);
  }

  // Update particles
  updateParticles(particles, effectiveDt);

  // Screen effects
  if (screenShake.time > 0) {
    screenShake.time -= dt;
    screenShake.x = (Math.random()-0.5)*screenShake.intensity*2;
    screenShake.y = (Math.random()-0.5)*screenShake.intensity*2;
  } else { screenShake.x = 0; screenShake.y = 0; }

  if (slowMotion.time > 0) {
    slowMotion.time -= dt;
    if (slowMotion.time <= 0) slowMotion.factor = 1;
  }

  // Update toasts
  for (let i = toasts.length-1; i >= 0; i--) {
    toasts[i].time -= dt;
    if (toasts[i].time <= 0) toasts.splice(i, 1);
  }

  // Check wave complete
  checkWaveComplete();

  // Check game over
  checkGameOver();

  // Bastion hit flash
  bastion.hitFlash = Math.max(0, bastion.hitFlash - dt);
}

function updateUpgrade(dt) {
  tweenManager.update(dt);
  updateParticles(particles, dt);
}

function updateGameOver(dt) {
  updateParticles(particles, dt);
  if (screenShake.time > 0) {
    screenShake.time -= dt;
    screenShake.x = (Math.random()-0.5)*screenShake.intensity*2;
    screenShake.y = (Math.random()-0.5)*screenShake.intensity*2;
  } else { screenShake.x = 0; screenShake.y = 0; }
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function render(currentState, dt) {
  const w = canvas.width, h = canvas.height;

  // Build background cache if needed
  if (bgCacheDirty) buildBgCache(currentBiome, w, h);

  ctx.save();
  // Screen shake offset
  if (screenShake.x || screenShake.y) ctx.translate(screenShake.x, screenShake.y);

  // Background
  if (bgCacheCanvas) ctx.drawImage(bgCacheCanvas, 0, 0, w, h);

  switch(currentState) {
    case STATE.TITLE: renderTitle(dt); break;
    case STATE.PLAYING: renderPlaying(dt); break;
    case STATE.UPGRADE: renderPlaying(dt); renderUpgradeOverlay(dt); break;
    case STATE.PAUSED: renderPlaying(dt); renderPauseOverlay(); break;
    case STATE.GAMEOVER: renderPlaying(dt); renderGameOverOverlay(dt); break;
  }

  // Screen fade
  if (screenFade.alpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${screenFade.alpha})`;
    ctx.fillRect(-20, -20, w+40, h+40);
  }

  // Toasts
  renderToasts(dt);

  ctx.restore();
}

function renderTitle(dt) {
  const w = canvas.width, h = canvas.height;

  // Title particles
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Arcane rune circle behind title
  const cx = w/2, cy = h/2 - 40;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(titleTime * 0.3);
  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.3 + Math.sin(titleTime*2)*0.1;
  ctx.beginPath(); ctx.arc(0, 0, 120, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI*2); ctx.stroke();
  // Rune marks
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*95, Math.sin(a)*95);
    ctx.lineTo(Math.cos(a)*125, Math.sin(a)*125);
    ctx.stroke();
  }
  ctx.restore();

  // Title text with glow
  ctx.save();
  ctx.shadowColor = '#6c3cf7';
  ctx.shadowBlur = 30 + Math.sin(titleTime*3)*10;
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '900 42px Cinzel, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ARCANE', cx, cy - 25);
  ctx.fillText('BASTION', cx, cy + 25);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#8080a0';
  ctx.font = '400 14px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('로그라이크 포지 디펜스', cx, cy + 70);

  // Best score
  const best = getBest();
  if (best.score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '400 13px Orbitron, sans-serif';
    ctx.fillText(`BEST: ${best.score}  WAVE: ${best.wave}`, cx, cy + 95);
  }

  // Start prompt (blinking)
  ctx.globalAlpha = 0.5 + Math.sin(titleTime*4)*0.5;
  ctx.fillStyle = '#00d4ff';
  ctx.font = '700 16px Orbitron, sans-serif';
  ctx.fillText(isTouchDevice ? '탭하여 시작' : 'SPACE / 클릭하여 시작', cx, h - 60);
  ctx.globalAlpha = 1;

  // Scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < h; y += 3) ctx.fillRect(0, y, w, 1);
}

function renderPlaying(dt) {
  const w = canvas.width, h = canvas.height;

  // Foreground particles (biome specific ambient)
  if (state === STATE.PLAYING && Math.random() < 0.1) {
    let color = '#44aa44';
    if (currentBiome === 'cave') color = '#4466aa';
    if (currentBiome === 'volcano') color = '#ff6600';
    spawnParticles(Math.random()*w, Math.random()*h, 1, color, 20, 2);
  }

  // Draw towers
  for (const t of towers) drawTower(ctx, t, dt);

  // Tower placement preview
  if (_isPlacingTower && _selectedTowerType) {
    const tData = TOWER_TYPES[_selectedTowerType];
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = tData.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(mousePos.x, mousePos.y, tData.range, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = tData.color;
    ctx.beginPath();
    ctx.arc(mousePos.x, mousePos.y, 18, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw bastion
  drawBastion(ctx, bastion, dt);

  // Draw enemies
  for (const e of enemies) { if (e.alive) drawEnemy(ctx, e, dt); }

  // Draw projectiles
  for (const p of projectiles) { if (p.alive) drawProjectile(ctx, p); }

  // Draw wizard
  drawWizard(ctx, wizard, dt);

  // Draw particles
  for (const p of particles) {
    if (!p.alive) continue;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw HUD
  drawHUD(ctx, w, h);
}

function drawBastion(c, bast, dt) {
  const hpRatio = bast.hp / bast.maxHp;

  // Glow based on HP
  c.save();
  c.shadowColor = bast.hitFlash > 0 ? '#ff0000' : '#ffd700';
  c.shadowBlur = 15 + hpRatio * 15;

  // Outer ring
  c.strokeStyle = `rgb(${Math.floor(255*hpRatio)},${Math.floor(180*hpRatio)},0)`;
  c.lineWidth = 3;
  c.beginPath();
  c.arc(bast.x, bast.y, bast.radius, 0, Math.PI*2);
  c.stroke();

  // Inner fill
  c.fillStyle = bast.hitFlash > 0 ? '#ff4444' : `rgba(${Math.floor(100+80*hpRatio)},${Math.floor(50+50*hpRatio)},${Math.floor(150+50*hpRatio)},0.6)`;
  c.beginPath();
  c.arc(bast.x, bast.y, bast.radius - 3, 0, Math.PI*2);
  c.fill();
  c.restore();

  // Magic circle inside
  c.save();
  c.translate(bast.x, bast.y);
  c.rotate(gameTime * 0.5);
  c.strokeStyle = `rgba(108,60,247,${0.3+hpRatio*0.3})`;
  c.lineWidth = 1;
  // Hexagram
  for (let i = 0; i < 6; i++) {
    const a1 = (i/6)*Math.PI*2;
    const a2 = ((i+2)/6)*Math.PI*2;
    c.beginPath();
    c.moveTo(Math.cos(a1)*(bast.radius-8), Math.sin(a1)*(bast.radius-8));
    c.lineTo(Math.cos(a2)*(bast.radius-8), Math.sin(a2)*(bast.radius-8));
    c.stroke();
  }
  c.restore();

  // HP bar above bastion
  const barW = bast.radius*2;
  const barH = 6;
  const barX = bast.x - barW/2;
  const barY = bast.y - bast.radius - 14;
  c.fillStyle = 'rgba(0,0,0,0.5)';
  c.fillRect(barX, barY, barW, barH);
  const hpGrad = c.createLinearGradient(barX, barY, barX+barW*hpRatio, barY);
  hpGrad.addColorStop(0, '#ff4444');
  hpGrad.addColorStop(1, '#44ff44');
  c.fillStyle = hpGrad;
  c.fillRect(barX, barY, barW * hpRatio, barH);
}

function drawWizard(c, wiz, dt) {
  c.save();
  c.translate(wiz.x, wiz.y);

  // Hit flash
  if (wiz.hitFlash > 0) { c.shadowColor = '#ff0000'; c.shadowBlur = 20; }
  else if (wiz.castAnim > 0) { c.shadowColor = '#00ffff'; c.shadowBlur = 15; }

  // Body (robe)
  c.fillStyle = '#9944ff';
  c.beginPath();
  c.moveTo(0, -18);
  c.lineTo(-12, 14);
  // Walk animation
  const walkOffset = wiz.state === 'walk' ? Math.sin(wiz.animTime * 8) * 3 : 0;
  c.lineTo(-8, 16 + walkOffset);
  c.lineTo(8, 16 - walkOffset);
  c.lineTo(12, 14);
  c.closePath();
  c.fill();

  // Hood
  c.fillStyle = '#7722cc';
  c.beginPath();
  c.arc(0, -12, 10, Math.PI, 0);
  c.closePath();
  c.fill();

  // Head
  c.fillStyle = '#ddb893';
  c.beginPath();
  c.arc(0, -10, 7, 0, Math.PI*2);
  c.fill();

  // Eyes (face direction)
  const eyeDir = wiz.facing;
  c.fillStyle = '#44ddff';
  c.beginPath();
  c.arc(-3 + Math.cos(eyeDir)*2, -11 + Math.sin(eyeDir), 1.5, 0, Math.PI*2);
  c.arc(3 + Math.cos(eyeDir)*2, -11 + Math.sin(eyeDir), 1.5, 0, Math.PI*2);
  c.fill();

  // Staff
  c.strokeStyle = '#aa8855';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(10, -8);
  c.lineTo(14, -24);
  c.stroke();
  // Staff orb (pulsing)
  c.fillStyle = '#00ffff';
  c.shadowColor = '#00ffff';
  c.shadowBlur = 8 + Math.sin(gameTime*5)*4;
  c.beginPath();
  c.arc(14, -26, 3 + Math.sin(gameTime*3)*0.5, 0, Math.PI*2);
  c.fill();

  c.restore();
}

function drawEnemy(c, e, dt) {
  c.save();
  c.translate(e.x, e.y);

  // Invisibility
  if (e.invisible) c.globalAlpha = 0.2;

  // Elite glow
  if (e.elite) {
    c.shadowColor = '#ffd700';
    c.shadowBlur = 10;
  }

  // Hit flash override
  if (e.hitFlash > 0) c.fillStyle = '#ffffff';
  else c.fillStyle = e.color;

  // Type-specific shapes
  switch(e.type) {
    case 'slime':
      // Bouncy blob
      const squish = 1 + Math.sin(e.animPhase) * 0.15;
      c.beginPath();
      c.ellipse(0, 2, e.radius * squish, e.radius / squish, 0, 0, Math.PI*2);
      c.fill();
      // Eyes
      if (e.hitFlash <= 0) {
        c.fillStyle = '#ffffff';
        c.beginPath(); c.arc(-4, -2, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(4, -2, 2.5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#000';
        c.beginPath(); c.arc(-3, -2, 1, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(5, -2, 1, 0, Math.PI*2); c.fill();
      }
      break;
    case 'skeleton':
      // Skull body
      c.fillRect(-6, -e.radius, 12, e.radius*2);
      // Skull
      if (e.hitFlash <= 0) c.fillStyle = '#eeeeee';
      c.beginPath(); c.arc(0, -e.radius+4, 8, 0, Math.PI*2); c.fill();
      // Eyes
      c.fillStyle = '#ff0000';
      c.beginPath(); c.arc(-3, -e.radius+3, 2, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(3, -e.radius+3, 2, 0, Math.PI*2); c.fill();
      // Sword
      c.strokeStyle = '#cccccc';
      c.lineWidth = 2;
      c.beginPath();
      const sAngle = Math.sin(e.animPhase*2)*0.4;
      c.moveTo(8, 0);
      c.lineTo(8+Math.cos(sAngle)*16, Math.sin(sAngle)*16);
      c.stroke();
      break;
    case 'spider':
      // Body
      c.beginPath(); c.ellipse(0, 0, e.radius, e.radius*0.7, 0, 0, Math.PI*2); c.fill();
      // Legs
      c.strokeStyle = e.hitFlash > 0 ? '#fff' : e.color;
      c.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        const la = (i/4)*Math.PI - Math.PI/2 + Math.sin(e.animPhase + i)*0.3;
        c.beginPath();
        c.moveTo(Math.cos(la)*e.radius*0.7, Math.sin(la)*e.radius*0.7);
        c.lineTo(Math.cos(la)*e.radius*2, Math.sin(la)*e.radius*2);
        c.stroke();
        c.beginPath();
        c.moveTo(Math.cos(-la+Math.PI)*e.radius*0.7, Math.sin(-la+Math.PI)*e.radius*0.7);
        c.lineTo(Math.cos(-la+Math.PI)*e.radius*2, Math.sin(-la+Math.PI)*e.radius*2);
        c.stroke();
      }
      // Eyes
      c.fillStyle = '#ff0000';
      for (let i = -2; i <= 2; i++) c.fillRect(i*3-1, -4, 2, 2);
      break;
    case 'golem':
      // Rocky body
      c.fillRect(-e.radius*0.7, -e.radius, e.radius*1.4, e.radius*2);
      // Crack lines
      c.strokeStyle = 'rgba(0,0,0,0.3)';
      c.lineWidth = 1;
      c.beginPath(); c.moveTo(-3,-e.radius); c.lineTo(2,0); c.lineTo(-5,e.radius); c.stroke();
      // Eyes
      c.fillStyle = '#ff8800';
      c.beginPath(); c.arc(-5, -e.radius+8, 3, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(5, -e.radius+8, 3, 0, Math.PI*2); c.fill();
      break;
    case 'wraith':
      // Ghostly body
      c.globalAlpha *= (0.5 + Math.sin(e.animPhase)*0.2);
      c.beginPath();
      c.moveTo(0, -e.radius);
      c.quadraticCurveTo(e.radius, -e.radius*0.5, e.radius*0.8, e.radius*0.5);
      // Wavy bottom
      for (let i = 3; i >= -3; i--) {
        c.lineTo(i*e.radius*0.3, e.radius + Math.sin(e.animPhase+i)*4);
      }
      c.quadraticCurveTo(-e.radius, -e.radius*0.5, 0, -e.radius);
      c.fill();
      // Glowing eyes
      c.fillStyle = '#aaaaff';
      c.beginPath(); c.arc(-4, -4, 2, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(4, -4, 2, 0, Math.PI*2); c.fill();
      break;
    case 'darknight':
      // Armored body
      c.fillRect(-e.radius*0.5, -e.radius, e.radius, e.radius*2);
      // Helmet
      c.fillStyle = e.hitFlash > 0 ? '#fff' : '#444444';
      c.beginPath(); c.arc(0, -e.radius+5, 9, 0, Math.PI*2); c.fill();
      // Shield (glows when close to bastion)
      const distToBastion = dist(e.x, e.y, bastion.x, bastion.y);
      c.fillStyle = distToBastion < 100 ? '#aaaaff' : '#555555';
      c.fillRect(-e.radius*0.7, -5, 6, 14);
      // Eyes
      c.fillStyle = '#ff4444';
      c.fillRect(-3, -e.radius+3, 2, 3);
      c.fillRect(1, -e.radius+3, 2, 3);
      break;
    case 'dragonkin':
      // Dragon body
      c.beginPath();
      c.moveTo(0, -e.radius);
      c.lineTo(e.radius*0.8, e.radius*0.5);
      c.lineTo(0, e.radius);
      c.lineTo(-e.radius*0.8, e.radius*0.5);
      c.closePath();
      c.fill();
      // Wings
      c.fillStyle = e.hitFlash > 0 ? '#fff' : '#cc3333';
      const wingFlap = Math.sin(e.animPhase*2)*0.3;
      c.beginPath();
      c.moveTo(-5, -5);
      c.lineTo(-e.radius*1.5, -e.radius*0.8 + wingFlap*10);
      c.lineTo(-e.radius, 0);
      c.closePath();
      c.fill();
      c.beginPath();
      c.moveTo(5, -5);
      c.lineTo(e.radius*1.5, -e.radius*0.8 + wingFlap*10);
      c.lineTo(e.radius, 0);
      c.closePath();
      c.fill();
      // Eye
      c.fillStyle = '#ffff00';
      c.beginPath(); c.arc(0, -e.radius*0.4, 2, 0, Math.PI*2); c.fill();
      break;
    default:
      // Boss fallback / generic
      if (e.isBoss) {
        // Large glowing boss
        c.shadowColor = e.color;
        c.shadowBlur = 20;
        c.beginPath(); c.arc(0, 0, e.radius, 0, Math.PI*2); c.fill();
        // Crown
        c.fillStyle = '#ffd700';
        c.beginPath();
        c.moveTo(-e.radius*0.5, -e.radius+3);
        c.lineTo(-e.radius*0.3, -e.radius-8);
        c.lineTo(0, -e.radius+3);
        c.lineTo(e.radius*0.3, -e.radius-8);
        c.lineTo(e.radius*0.5, -e.radius+3);
        c.fill();
        // Boss name
        c.shadowBlur = 0;
        c.fillStyle = '#ffffff';
        c.font = '700 11px Orbitron, sans-serif';
        c.textAlign = 'center';
        c.fillText(e.bossName || '', 0, e.radius + 18);
      }
      break;
  }

  // Boss: draw specific boss visuals on top
  if (e.isBoss) {
    c.shadowColor = e.color;
    c.shadowBlur = 15;
    if (e.type === 'golemKing') {
      // Large golem
      c.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
      c.fillRect(-e.radius*0.7, -e.radius, e.radius*1.4, e.radius*2);
      c.fillStyle = '#ffd700';
      c.beginPath();
      c.moveTo(-15, -e.radius); c.lineTo(-10,-e.radius-12); c.lineTo(0,-e.radius);
      c.lineTo(10,-e.radius-12); c.lineTo(15,-e.radius); c.fill();
      c.fillStyle = '#ff8800';
      c.beginPath(); c.arc(-8,-e.radius+12,5,0,Math.PI*2); c.fill();
      c.beginPath(); c.arc(8,-e.radius+12,5,0,Math.PI*2); c.fill();
    } else if (e.type === 'wraithKing') {
      c.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
      c.globalAlpha *= 0.7;
      c.beginPath(); c.arc(0,0,e.radius,0,Math.PI*2); c.fill();
      c.fillStyle = '#ffd700';
      c.beginPath();
      c.moveTo(-12,-e.radius); c.lineTo(-8,-e.radius-10); c.lineTo(0,-e.radius);
      c.lineTo(8,-e.radius-10); c.lineTo(12,-e.radius); c.fill();
      c.fillStyle = '#aaaaff';
      c.beginPath(); c.arc(-6,-8,4,0,Math.PI*2); c.fill();
      c.beginPath(); c.arc(6,-8,4,0,Math.PI*2); c.fill();
    } else if (e.type === 'dragon') {
      c.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
      // Dragon body
      c.beginPath(); c.ellipse(0,0,e.radius,e.radius*0.7,0,0,Math.PI*2); c.fill();
      // Wings
      c.fillStyle = '#cc1111';
      const wf = Math.sin(e.animPhase*2)*8;
      c.beginPath(); c.moveTo(-10,-5); c.lineTo(-e.radius*1.8,-e.radius+wf); c.lineTo(-e.radius*0.8,5); c.fill();
      c.beginPath(); c.moveTo(10,-5); c.lineTo(e.radius*1.8,-e.radius+wf); c.lineTo(e.radius*0.8,5); c.fill();
      // Head
      c.fillStyle = e.color;
      c.beginPath(); c.arc(0,-e.radius*0.5,15,0,Math.PI*2); c.fill();
      c.fillStyle = '#ffff00';
      c.beginPath(); c.arc(-5,-e.radius*0.5-2,3,0,Math.PI*2); c.fill();
      c.beginPath(); c.arc(5,-e.radius*0.5-2,3,0,Math.PI*2); c.fill();
      // Crown
      c.fillStyle = '#ffd700';
      c.beginPath();
      c.moveTo(-10,-e.radius*0.5-12); c.lineTo(-6,-e.radius*0.5-22);
      c.lineTo(0,-e.radius*0.5-14); c.lineTo(6,-e.radius*0.5-22);
      c.lineTo(10,-e.radius*0.5-12); c.fill();
    }
    c.shadowBlur = 0;
    // Boss name under
    c.fillStyle = '#fff';
    c.font = '700 11px Orbitron, sans-serif';
    c.textAlign = 'center';
    c.fillText(e.bossName || '', 0, e.radius + 18);
  }

  // Slow indicator
  if (e.slowTimer > 0) {
    c.strokeStyle = '#88ddff';
    c.lineWidth = 1;
    c.beginPath(); c.arc(0, 0, e.radius + 4, 0, Math.PI*2); c.stroke();
  }

  c.restore();

  // HP bar (above enemy)
  if (e.hp < e.maxHp) {
    const barW = e.radius * 2;
    const barH = 3;
    const barX = e.x - barW/2;
    const barY = e.y - e.radius - 8;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = e.isBoss ? '#ff4444' : '#44ff44';
    ctx.fillRect(barX, barY, barW * (e.hp/e.maxHp), barH);
  }

  // Elite border
  if (e.elite) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 3, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawTower(c, t, dt) {
  c.save();
  c.translate(t.x, t.y);

  // Base
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.arc(0, 4, 20, 0, Math.PI*2); c.fill();

  // Tower body
  c.fillStyle = '#1a1a2e';
  c.fillRect(-10, -20, 20, 30);
  // Top
  c.fillStyle = t.color;
  c.shadowColor = t.color;
  c.shadowBlur = 8;
  c.beginPath(); c.arc(0, -20, 10, 0, Math.PI*2); c.fill();

  // Type indicator
  c.fillStyle = '#ffffff';
  c.font = '700 8px Orbitron, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  const symbols = {arcane:'A',fire:'F',ice:'I',lightning:'L',heal:'+'};
  c.fillText(symbols[t.type]||'?', 0, -20);

  c.restore();
}

function drawProjectile(c, p) {
  if (p.type === 'towerBeam') {
    c.strokeStyle = p.color;
    c.lineWidth = 2;
    c.globalAlpha = p.life / 0.1;
    c.beginPath(); c.moveTo(p.x, p.y); c.lineTo(p.tx, p.ty); c.stroke();
    c.globalAlpha = 1;
    return;
  }
  c.save();
  c.shadowColor = p.color;
  c.shadowBlur = p.type === 'fireball' ? 12 : 6;
  c.fillStyle = p.color;
  c.beginPath();
  c.arc(p.x, p.y, p.radius, 0, Math.PI*2);
  c.fill();
  c.restore();
}

function drawHUD(c, w, h) {
  // Top-left: HP bar
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(10, 10, 200, 20);
  const hpR = bastion.hp / bastion.maxHp;
  const hpGrad = c.createLinearGradient(10, 10, 210, 10);
  hpGrad.addColorStop(0, '#ff4444');
  hpGrad.addColorStop(1, '#44ff44');
  c.fillStyle = hpGrad;
  c.fillRect(12, 12, 196 * hpR, 16);
  c.fillStyle = '#ffffff';
  c.font = '700 11px Orbitron, sans-serif';
  c.textAlign = 'left';
  c.fillText(`HP ${Math.ceil(bastion.hp)}/${bastion.maxHp}`, 16, 24);

  // Mana bar below HP
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(10, 34, 200, 16);
  c.fillStyle = '#4488ff';
  c.fillRect(12, 36, 196 * (mana/maxMana), 12);
  c.fillStyle = '#ffffff';
  c.font = '400 10px Orbitron, sans-serif';
  c.fillText(`MP ${Math.floor(mana)}/${maxMana}`, 16, 46);

  // Score (top right area)
  c.textAlign = 'right';
  c.fillStyle = '#ffd700';
  c.font = '700 14px Orbitron, sans-serif';
  c.fillText(`${score}`, w - 64, 24);
  c.fillStyle = '#8080a0';
  c.font = '400 10px Orbitron, sans-serif';
  c.fillText(`SCORE`, w - 64, 12);

  // Wave number
  c.fillStyle = '#00d4ff';
  c.font = '700 13px Orbitron, sans-serif';
  c.textAlign = 'left';
  c.fillText(`WAVE ${waveNum}/${CONFIG.MAX_WAVE}`, 10, 68);

  // Wave prep countdown
  if (wavePrepTime > 0) {
    c.textAlign = 'center';
    c.fillStyle = '#ffd700';
    c.font = '900 28px Cinzel, serif';
    c.fillText(`${Math.ceil(wavePrepTime)}`, w/2, 80);
    c.font = '400 12px Orbitron, sans-serif';
    c.fillStyle = '#8080a0';
    c.fillText('다음 웨이브 준비', w/2, 100);
  }

  // Boss HP bar (top center)
  if (_isBossActive && currentBoss && currentBoss.alive) {
    const bw = Math.min(300, w-40);
    const bx = w/2 - bw/2;
    c.fillStyle = 'rgba(0,0,0,0.7)';
    c.fillRect(bx, h - 100, bw, 20);
    c.fillStyle = '#ff2222';
    c.fillRect(bx+2, h - 98, (bw-4)*(currentBoss.hp/currentBoss.maxHp), 16);
    c.fillStyle = '#ffffff';
    c.textAlign = 'center';
    c.font = '700 10px Orbitron, sans-serif';
    c.fillText(currentBoss.bossName || 'BOSS', w/2, h - 86);
  }

  // Pause button (top-right)
  const pbSize = touchSafe(48, 48);
  c.fillStyle = 'rgba(0,0,0,0.5)';
  c.fillRect(w - pbSize.w - 8, 8, pbSize.w, pbSize.h);
  c.fillStyle = '#e0e0f0';
  c.fillRect(w - pbSize.w + 4, 18, 8, 28);
  c.fillRect(w - pbSize.w + 18, 18, 8, 28);

  // Tower selection bar (bottom center)
  const tKeys = ['arcane','fire','ice','lightning','heal'];
  const tBarW = 5 * 60;
  const tBarX = w/2 - tBarW/2;
  const tBarY = h - 70;
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(tBarX - 5, tBarY - 5, tBarW + 10, 66);
  for (let i = 0; i < 5; i++) {
    const tk = tKeys[i];
    const td = TOWER_TYPES[tk];
    const bx = tBarX + i*60;
    const isSelected = _isPlacingTower && _selectedTowerType === tk;
    const canAfford = mana >= td.cost;
    c.fillStyle = isSelected ? td.color : (canAfford ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)');
    c.fillRect(bx, tBarY, 52, 52);
    c.strokeStyle = td.color;
    c.lineWidth = isSelected ? 2 : 1;
    c.strokeRect(bx, tBarY, 52, 52);
    // Tower icon
    c.fillStyle = canAfford ? td.color : '#555';
    c.font = '700 16px Orbitron, sans-serif';
    c.textAlign = 'center';
    const syms = {arcane:'A',fire:'F',ice:'I',lightning:'L',heal:'+'};
    c.fillText(syms[tk], bx+26, tBarY+25);
    // Cost
    c.fillStyle = canAfford ? '#4488ff' : '#664444';
    c.font = '400 9px Orbitron, sans-serif';
    c.fillText(`${td.cost}`, bx+26, tBarY+42);
    // Hotkey
    c.fillStyle = '#505070';
    c.font = '400 8px Orbitron, sans-serif';
    c.fillText(`${i+1}`, bx+26, tBarY+52);
  }

  // Spell cooldowns (left side)
  const spellY = h - 140;
  const spellData = [
    { name:'Q', cd: wizard.boltCd, max: SPELLS.bolt.cooldown, color:'#00ffff', label:'볼트' },
    { name:'Q', cd: wizard.fireballCd, max: SPELLS.fireball.cooldown, color:'#ff6600', label:'파이어볼' },
    { name:'E', cd: wizard.frostCd, max: SPELLS.frost.cooldown, color:'#88ddff', label:'노바' },
  ];
  c.textAlign = 'left';
  for (let i = 0; i < 3; i++) {
    const sp = spellData[i];
    const sy = spellY + i * 28;
    c.fillStyle = sp.cd > 0 ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.25)';
    c.fillRect(10, sy, 80, 24);
    c.fillStyle = sp.color;
    c.fillRect(10, sy, 80 * (1 - sp.cd/sp.max), 24);
    c.globalAlpha = sp.cd > 0 ? 0.5 : 1;
    c.fillStyle = '#fff';
    c.font = '400 9px Orbitron, sans-serif';
    c.fillText(sp.label, 15, sy + 16);
    c.globalAlpha = 1;
  }

  // Touch controls
  if (isTouchDevice) {
    // Joystick
    if (touchState.joystick) {
      c.globalAlpha = 0.4;
      c.fillStyle = '#ffffff';
      c.beginPath();
      c.arc(touchState.joystick.startX, touchState.joystick.startY, CONFIG.JOYSTICK_BASE, 0, Math.PI*2);
      c.fill();
      c.globalAlpha = 0.7;
      const kx = touchState.joystick.startX + Math.cos(touchState.joystickAngle)*touchState.joystickDist;
      const ky = touchState.joystick.startY + Math.sin(touchState.joystickAngle)*touchState.joystickDist;
      c.beginPath();
      c.arc(kx, ky, CONFIG.JOYSTICK_KNOB, 0, Math.PI*2);
      c.fill();
      c.globalAlpha = 1;
    }

    // Skill buttons (right side)
    const sbSize = 56;
    const sbX = w - 70;
    // Fireball
    c.fillStyle = wizard.fireballCd > 0 ? 'rgba(255,102,0,0.3)' : 'rgba(255,102,0,0.6)';
    c.fillRect(sbX, h - 190, sbSize, sbSize);
    c.strokeStyle = '#ff6600'; c.lineWidth = 2;
    c.strokeRect(sbX, h - 190, sbSize, sbSize);
    c.fillStyle = '#fff'; c.font = '700 20px Orbitron'; c.textAlign = 'center';
    c.fillText('F', sbX + sbSize/2, h - 190 + sbSize/2 + 7);

    // Frost nova
    c.fillStyle = wizard.frostCd > 0 ? 'rgba(136,221,255,0.3)' : 'rgba(136,221,255,0.6)';
    c.fillRect(sbX, h - 125, sbSize, sbSize);
    c.strokeStyle = '#88ddff'; c.lineWidth = 2;
    c.strokeRect(sbX, h - 125, sbSize, sbSize);
    c.fillStyle = '#fff'; c.font = '700 20px Orbitron'; c.textAlign = 'center';
    c.fillText('N', sbX + sbSize/2, h - 125 + sbSize/2 + 7);
  }

  // Kill counter
  c.textAlign = 'left';
  c.fillStyle = '#8080a0';
  c.font = '400 10px Orbitron, sans-serif';
  c.fillText(`KILLS: ${totalKills}`, 10, 84);
}

function renderUpgradeOverlay(dt) {
  const w = canvas.width, h = canvas.height;

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  // Title
  ctx.fillStyle = '#ffd700';
  ctx.font = '900 24px Cinzel, serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 15;
  ctx.fillText('업그레이드 선택', w/2, h/2 - 140);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#8080a0';
  ctx.font = '400 12px Orbitron, sans-serif';
  ctx.fillText(`웨이브 ${waveNum} 클리어!`, w/2, h/2 - 115);

  // Cards
  const cw = 150, ch = 210, gap = 16;
  const totalW = upgradeChoices.length * cw + (upgradeChoices.length - 1) * gap;
  const startX = (w - totalW) / 2;
  const startY = h/2 - ch/2 + 10;

  for (let i = 0; i < upgradeChoices.length; i++) {
    const uc = upgradeChoices[i];
    const cx = startX + i*(cw+gap);
    const isHov = (upgradeHover === i);
    const scale = isHov ? 1.05 : 1;

    ctx.save();
    ctx.translate(cx + cw/2, startY + ch/2);
    ctx.scale(scale, scale);
    ctx.translate(-cw/2, -ch/2);

    // Card background
    ctx.fillStyle = isHov ? '#1e1e30' : '#12121e';
    ctx.fillRect(0, 0, cw, ch);

    // Border with category color
    ctx.strokeStyle = uc.color;
    ctx.lineWidth = isHov ? 3 : 1.5;
    if (isHov) { ctx.shadowColor = uc.color; ctx.shadowBlur = 12; }
    ctx.strokeRect(0, 0, cw, ch);
    ctx.shadowBlur = 0;

    // Category badge
    ctx.fillStyle = uc.color;
    ctx.fillRect(10, 10, cw-20, 4);

    // Icon area (simple geometric)
    ctx.fillStyle = uc.color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(cw/2, 55, 25, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.font = '700 22px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = uc.color;
    const icons = {attack:'⚔',defense:'🛡',resource:'💎',tower:'🏰',move:'💨',special:'✨'};
    ctx.fillText(icons[uc.cat]||'★', cw/2, 62);

    // Name
    ctx.fillStyle = '#e0e0f0';
    ctx.font = '700 13px Orbitron, sans-serif';
    ctx.fillText(uc.name, cw/2, 100);

    // Description
    ctx.fillStyle = '#8080a0';
    ctx.font = '400 10px Orbitron, sans-serif';
    // Word wrap
    const words = uc.desc.split('');
    let line = '';
    let ly = 120;
    for (const ch2 of words) {
      const testLine = line + ch2;
      if (ctx.measureText(testLine).width > cw - 20) {
        ctx.fillText(line, cw/2, ly);
        line = ch2; ly += 14;
      } else line = testLine;
    }
    ctx.fillText(line, cw/2, ly);

    // Stack count
    const current = upgrades[uc.id] || 0;
    ctx.fillStyle = '#505070';
    ctx.font = '400 9px Orbitron, sans-serif';
    ctx.fillText(`${current}/${uc.max}`, cw/2, ch - 12);

    ctx.restore();
  }
}

function renderPauseOverlay() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = '#e0e0f0';
  ctx.font = '900 36px Cinzel, serif';
  ctx.textAlign = 'center';
  ctx.fillText('일시정지', w/2, h/2 - 20);

  ctx.fillStyle = '#8080a0';
  ctx.font = '400 14px Orbitron, sans-serif';
  ctx.fillText(isTouchDevice ? '탭하여 계속' : 'ESC / 클릭하여 계속', w/2, h/2 + 20);
}

function renderGameOverOverlay(dt) {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, w, h);

  // Title
  ctx.shadowColor = isVictory ? '#ffd700' : '#ff4444';
  ctx.shadowBlur = 20;
  ctx.fillStyle = isVictory ? '#ffd700' : '#ff4444';
  ctx.font = '900 40px Cinzel, serif';
  ctx.textAlign = 'center';
  ctx.fillText(isVictory ? '승리!' : 'GAME OVER', w/2, h/2 - 80);
  ctx.shadowBlur = 0;

  // Stats
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '700 18px Orbitron, sans-serif';
  ctx.fillText(`SCORE: ${score}`, w/2, h/2 - 30);

  const best = getBest();
  if (score >= best.score) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '700 14px Orbitron, sans-serif';
    ctx.fillText('NEW BEST!', w/2, h/2 - 5);
  }

  ctx.fillStyle = '#8080a0';
  ctx.font = '400 13px Orbitron, sans-serif';
  ctx.fillText(`WAVE: ${waveNum}  KILLS: ${totalKills}  TIME: ${Math.floor(gameTime)}s`, w/2, h/2 + 20);
  ctx.fillText(`BEST: ${best.score}`, w/2, h/2 + 42);

  // Achievements earned this run
  if (newAchievements.length > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '700 12px Orbitron, sans-serif';
    ctx.fillText('달성 업적:', w/2, h/2 + 68);
    ctx.fillStyle = '#e0e0f0';
    ctx.font = '400 11px Orbitron, sans-serif';
    for (let i = 0; i < newAchievements.length && i < 3; i++) {
      ctx.fillText(newAchievements[i].name, w/2, h/2 + 85 + i*16);
    }
  }

  // Restart prompt
  ctx.globalAlpha = 0.5 + Math.sin(gameTime*4)*0.5;
  ctx.fillStyle = '#00d4ff';
  ctx.font = '700 14px Orbitron, sans-serif';
  ctx.fillText(isTouchDevice ? '탭하여 재시작' : 'R키 / 클릭하여 재시작', w/2, h - 50);
  ctx.globalAlpha = 1;
}

function renderToasts(dt) {
  for (let i = 0; i < toasts.length; i++) {
    const t = toasts[i];
    const alpha = Math.min(1, t.time);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(255,215,0,0.9)';
    ctx.font = '700 13px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    const ty = 50 + i * 30;
    ctx.fillText(`🏆 ${t.text}`, canvas.width/2, ty);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// MAIN GAME LOOP (F12: try-catch)
// ============================================================
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 50ms cap
    lastTime = timestamp;

    tweenManager.update(dt);

    switch (state) {
      case STATE.TITLE:    updateTitle(dt);    break;
      case STATE.PLAYING:  updatePlaying(dt);  break;
      case STATE.UPGRADE:  updateUpgrade(dt);  break;
      case STATE.PAUSED:   /* nothing */       break;
      case STATE.GAMEOVER: updateGameOver(dt); break;
    }

    render(state, dt);
  } catch (e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT & START
// ============================================================
initGame();
// Initialize title particles
for (let i = 0; i < 30; i++) {
  titleParticles.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*20, vy: -30-Math.random()*50,
    life: Math.random()*3, maxLife: 3+Math.random()*2, size: 1+Math.random()*2,
    color: ['#6c3cf7','#00d4ff','#ffd700','#ff4444'][randInt(0,3)],
  });
}
buildBgCache('forest', canvas.width, canvas.height);
requestAnimationFrame(gameLoop);
</script>
