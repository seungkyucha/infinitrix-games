// ============================================================
// TweenManager with clearImmediate() (F6)
// ============================================================
class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }
  // Add a new tween animation
  add(opts) {
    const t = { target:opts.target, prop:opts.prop, from:opts.from, to:opts.to,
      duration:opts.duration/1000, elapsed:0, ease:opts.ease||'easeOutCubic',
      onComplete:opts.onComplete||null, done:false };
    if (t.target && t.prop != null) t.target[t.prop] = t.from;
    this._tweens.push(t); return t;
  }
  // Update all active tweens each frame
  update(dt) {
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; return; }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      let p = Math.min(t.elapsed / t.duration, 1);
      p = this._ease(p, t.ease);
      if (t.target && t.prop != null) t.target[t.prop] = t.from + (t.to - t.from) * p;
      if (t.elapsed >= t.duration) {
        t.done = true;
        if (t.target && t.prop != null) t.target[t.prop] = t.to;
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // Deferred cancel for safe mid-update calls
  cancelAll() { this._pendingCancel = true; }
  // Immediate clear - safe to add() right after
  clearImmediate() { this._tweens.length = 0; this._pendingCancel = false; }
  // Easing functions
  _ease(t, type) {
    if (type === 'linear') return t;
    if (type === 'easeOutCubic') return 1 - Math.pow(1 - t, 3);
    if (type === 'easeInOutQuad') return t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    if (type === 'easeOutBounce') {
      if(t<1/2.75)return 7.5625*t*t;if(t<2/2.75)return 7.5625*(t-=1.5/2.75)*t+0.75;
      if(t<2.5/2.75)return 7.5625*(t-=2.25/2.75)*t+0.9375;return 7.5625*(t-=2.625/2.75)*t+0.984375;
    }
    return 1 - Math.pow(1 - t, 3);
  }
}

// ============================================================
// ObjectPool — reuse particles and projectiles
// ============================================================
class ObjectPool {
  constructor(createFn, resetFn, size) {
    this._pool = []; this._createFn = createFn; this._resetFn = resetFn;
    for (let i = 0; i < size; i++) this._pool.push(createFn());
  }
  acquire() { return this._pool.length > 0 ? this._pool.pop() : this._createFn(); }
  release(obj) { this._resetFn(obj); this._pool.push(obj); }
}

// ============================================================
// SoundManager — Web Audio API synth (§12)
// ============================================================
class SoundManager {
  constructor() { this._ctx = null; this._vol = 0.3; this._bgmGain = null; this._bgmOsc = null; }
  _init() {
    if (this._ctx) return;
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._bgmGain = this._ctx.createGain();
    this._bgmGain.gain.value = this._vol * 0.15;
    this._bgmGain.connect(this._ctx.destination);
  }
  // Play looping BGM by biome type
  playBGM(type) {
    this._init(); this.stopBGM();
    const freqs = {forest:[262,330,392,330],cave:[220,262,330,262],volcano:[165,220,262,220],boss:[196,262,330,392]};
    const notes = freqs[type] || freqs.forest;
    const osc = this._ctx.createOscillator();
    osc.type = type==='boss'?'square':'triangle';
    osc.frequency.value = notes[0];
    const now = this._ctx.currentTime, dur = type==='boss'?0.25:0.5;
    for (let i = 0; i < 64; i++) osc.frequency.setValueAtTime(notes[i%notes.length], now+i*dur);
    osc.connect(this._bgmGain); osc.start(now); osc.stop(now+64*dur);
    this._bgmOsc = osc;
    osc.onended = () => { if (this._bgmOsc === osc) this.playBGM(type); };
  }
  stopBGM() { if(this._bgmOsc){try{this._bgmOsc.onended=null;this._bgmOsc.stop();}catch(e){}this._bgmOsc=null;} }
  // Play one-shot sound effect
  playSFX(type) {
    this._init();
    const c = this._ctx, now = c.currentTime, g = c.createGain(), o = c.createOscillator();
    g.gain.value = this._vol; g.connect(c.destination); o.connect(g);
    if(type==='shoot'){o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.1);o.start(now);o.stop(now+0.1);}
    else if(type==='hit'){o.type='square';o.frequency.value=220;o.frequency.exponentialRampToValueAtTime(80,now+0.15);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);o.start(now);o.stop(now+0.15);}
    else if(type==='kill'){o.type='square';o.frequency.value=440;o.frequency.exponentialRampToValueAtTime(110,now+0.2);g.gain.exponentialRampToValueAtTime(0.001,now+0.2);o.start(now);o.stop(now+0.2);}
    else if(type==='fireball'){o.type='sawtooth';o.frequency.value=150;o.frequency.exponentialRampToValueAtTime(60,now+0.3);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);o.start(now);o.stop(now+0.3);}
    else if(type==='frost'){o.type='triangle';o.frequency.value=1200;o.frequency.exponentialRampToValueAtTime(400,now+0.4);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);o.start(now);o.stop(now+0.4);}
    else if(type==='tower_place'){o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.1);g.gain.exponentialRampToValueAtTime(0.001,now+0.2);o.start(now);o.stop(now+0.2);}
    else if(type==='boss_spawn'){o.type='sine';o.frequency.value=80;o.frequency.exponentialRampToValueAtTime(200,now+1);g.gain.exponentialRampToValueAtTime(0.001,now+1);o.start(now);o.stop(now+1);}
    else if(type==='level_up'){o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.1);o.frequency.setValueAtTime(784,now+0.2);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);o.start(now);o.stop(now+0.35);}
    else if(type==='game_over'){o.type='sawtooth';o.frequency.value=300;o.frequency.exponentialRampToValueAtTime(50,now+0.8);g.gain.exponentialRampToValueAtTime(0.001,now+0.8);o.start(now);o.stop(now+0.8);}
    else{o.type='sine';o.frequency.value=440;g.gain.exponentialRampToValueAtTime(0.001,now+0.1);o.start(now);o.stop(now+0.1);}
  }
  stopAll() { this.stopBGM(); }
  setVolume(v) { this._vol = v; if(this._bgmGain) this._bgmGain.gain.value = v*0.15; }
}

function getWaveScale(wn) {
  if(wn<=3) return {hp:1.0,spd:1.0,interval:1500};
  if(wn<=5) return {hp:1.2,spd:1.1,interval:1200};
  if(wn<=8) return {hp:1.4,spd:1.2,interval:1000};

  if(wn<=13)return {hp:1.8,spd:1.4,interval:700};

}

// OFFSCREEN BACKGROUND CACHE (F10)

let bgCacheCanvas, bgCacheCtx, bgCachedBiome;

function buildBgCache(biome) {
  if (!biome) biome = 'forest';
  bgCachedBiome = biome;
  if (!bgCacheCanvas) { bgCacheCanvas = document.createElement('canvas'); bgCacheCtx = bgCacheCanvas.getContext('2d'); }
  bgCacheCanvas.width = W; bgCacheCanvas.height = H;
  const c = bgCacheCtx;
  const colors = {forest:['#0a1a0a','#1a3a1a'],cave:['#0a0a1a','#1a1a3a'],volcano:['#1a0a0a','#3a1a0a']};
  const [c1,c2] = colors[biome]||colors.forest;
  const gr = c.createLinearGradient(0,0,0,H); gr.addColorStop(0,c1); gr.addColorStop(1,c2);
  c.fillStyle = gr; c.fillRect(0,0,W,H);
  // SVG background layers with parallax offset
  if (SPRITES.bgLayer1) { c.globalAlpha=0.4; c.drawImage(SPRITES.bgLayer1,0,0,W,H); c.globalAlpha=1; }
  if (SPRITES.bgLayer2) { c.globalAlpha=0.3; c.drawImage(SPRITES.bgLayer2,0,H*0.3,W,H*0.7); c.globalAlpha=1; }
  // Canvas fallback terrain layers
  c.globalAlpha = 0.3;
  if (biome==='forest') {
    c.fillStyle='#0d2a0d'; c.beginPath(); c.moveTo(0,H*0.5);
    for(let x=0;x<W;x+=60) c.lineTo(x,H*0.5-Math.sin(x*0.008)*60-Math.sin(x*0.02)*20);
    c.lineTo(W,H*0.5);c.lineTo(W,H);c.lineTo(0,H);c.fill();
    c.fillStyle='#0f3f0f';
    for(let i=0;i<25;i++){const x=i*(W/25)+Math.sin(i*3)*20,y=H*0.42+Math.sin(i*0.7)*H*0.08;
      c.beginPath();c.moveTo(x,y);c.lineTo(x-14,y+35);c.lineTo(x+14,y+35);c.fill();c.fillRect(x-2,y+35,4,10);}
  } else if (biome==='cave') {
    c.fillStyle='#15153a';
    for(let i=0;i<30;i++){const x=i*(W/30)+Math.sin(i)*10;c.fillRect(x-3,0,6,20+Math.sin(i*2)*25);}
    c.fillStyle='#1a1a40';
    for(let i=0;i<20;i++){const x=i*(W/20)+Math.cos(i)*15;c.fillRect(x-4,H-15-Math.sin(i*1.5)*25,8,40);}
    c.fillStyle='#4488ff';
    for(let i=0;i<12;i++){const x=Math.sin(i*5)*W*0.4+W/2,y=Math.cos(i*3)*H*0.3+H/2;c.beginPath();c.arc(x,y,2,0,Math.PI*2);c.fill();}
  } else {
    c.fillStyle='#3a1500';c.beginPath();c.moveTo(0,H*0.6);
    for(let x=0;x<W;x+=40)c.lineTo(x,H*0.6+Math.sin(x*0.01)*30);
    c.lineTo(W,H);c.lineTo(0,H);c.fill();
    c.strokeStyle='#ff4400';c.lineWidth=1;
    for(let i=0;i<15;i++){const x=Math.random()*W,y=H*0.6+Math.random()*H*0.4;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.random()*40-20,y+Math.random()*20);c.stroke();}
    c.fillStyle='#ff2200';for(let i=0;i<8;i++){const x=Math.random()*W,y=H*0.85+Math.random()*H*0.15;c.beginPath();c.arc(x,y,3+Math.random()*4,0,Math.PI*2);c.fill();}
  }
  // Grid overlay
  c.globalAlpha=0.04;c.strokeStyle='#ffffff';c.lineWidth=0.5;
  for(let x=0;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<H;y+=40){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  c.globalAlpha=1;
}

// ============================================================
// PURE HELPERS
// ============================================================
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
function findEnemiesInRadius(px,py,r,list){return list.filter(e=>e.active&&dist(px,py,e.x,e.y)<r);}
function touchSafe(w,h){return{w:Math.max(CONFIG.MIN_TOUCH_TARGET,w),h:Math.max(CONFIG.MIN_TOUCH_TARGET,h)};}
function angleTo(ax,ay,bx,by){return Math.atan2(by-ay,bx-ax);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function randInt(lo,hi){return lo+Math.floor(Math.random()*(hi-lo+1));}
function randPick(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ============================================================
// SINGLE-PATH RESOURCE UPDATES (F16)
// ============================================================
function addScore(amt){score+=amt;}
function modifyMana(amt){mana=clamp(mana+amt,0,manaMax);}
function modifyHP(amt,source){
  const old=bastion.hp; bastion.hp=clamp(bastion.hp+amt,0,bastion.maxHP);
  if(amt<0){bastion.flashTimer=0.1;waveDmgTaken+=Math.abs(amt);triggerShake(4);}
  if(bastion.hp<=0&&old>0)beginTransition(STATE.GAMEOVER);
}

// ============================================================
// SCREEN EFFECTS (§14)
// ============================================================
function triggerShake(i){shakeIntensity=Math.max(shakeIntensity,i);}
function triggerSlowMo(dur){timeScaleObj.s=0.3;tw.add({target:timeScaleObj,prop:'s',from:0.3,to:1,duration:dur*1000,ease:'easeOutCubic'});}

// ============================================================
// STATE TRANSITIONS (§6.2, F17, F23)
// ============================================================
function beginTransition(target,opts){
  opts=opts||{};
  if(_isTransitioning&&!opts.force)return;
  if(STATE_PRIORITY[target]<STATE_PRIORITY[state]&&!opts.force)return;
  if(bastion&&bastion.hp<=0&&target!==STATE.GAMEOVER&&state===STATE.PLAYING)return;
  _isTransitioning=true;
  if(opts.immediate){state=target;_isTransitioning=false;onStateEnter(target);return;}
  tw.add({target:screenFade,prop:'alpha',from:0,to:1,duration:300,ease:'linear',
    onComplete:()=>{state=target;onStateEnter(target);
      tw.add({target:screenFade,prop:'alpha',from:1,to:0,duration:300,ease:'linear',
        onComplete:()=>{_isTransitioning=false;}});}});
}
function onStateEnter(s){
  if(s===STATE.PLAYING&&waveNum>0){const wd=WAVE_DATA[waveNum-1];if(wd){if(bgCachedBiome!==wd.biome)buildBgCache(wd.biome);sfx.playBGM(_isBossActive?'boss':wd.biome);}}
  if(s===STATE.GAMEOVER){sfx.stopBGM();sfx.playSFX('game_over');gameWon=waveNum>CONFIG.MAX_WAVES;const best=getBest();const isNew=score>best.score;if(isNew)saveBest({score,wave:waveNum,time:Date.now()});}
  if(s===STATE.UPGRADE){sfx.playSFX('level_up');upgradeChoices=generateUpgradeChoices(UPGRADES,currentUpgrades,3);}
}

// ============================================================
// ENEMY CREATION & AI
// ============================================================
function spawnEnemy(type,waveN,bounds){
  const base=ENEMY_TYPES[type];if(!base)return null;
  const sc=getWaveScale(waveN),elite=waveN>=10&&Math.random()<0.25;
  const side=randInt(0,3);let x,y;const m=30;
  if(side===0){x=Math.random()*bounds.w;y=-m;}else if(side===1){x=bounds.w+m;y=Math.random()*bounds.h;}
  else if(side===2){x=Math.random()*bounds.w;y=bounds.h+m;}else{x=-m;y=Math.random()*bounds.h;}
  return{x,y,type,hp:Math.round(base.hp*sc.hp*(elite?2:1)),maxHP:Math.round(base.hp*sc.hp*(elite?2:1)),
    speed:base.speed*sc.spd*60*(elite?1.3:1),atk:base.atk,score:base.score*(elite?2:1),
    color:base.color,radius:base.radius*(elite?1.2:1),special:base.special,isElite:elite,active:true,
    slowTimer:0,slowFactor:1,atkCooldown:0,phaseTimer:0,animTimer:Math.random()*6.28,rangedCooldown:0,isBoss:false};
}
function spawnBoss(bossId,bounds){
  const base=BOSS_TYPES[bossId];if(!base)return null;
  const side=randInt(0,3);let x,y;
  if(side===0){x=bounds.w/2;y=-60;}else if(side===1){x=bounds.w+60;y=bounds.h/2;}
  else if(side===2){x=bounds.w/2;y=bounds.h+60;}else{x=-60;y=bounds.h/2;}
  _isBossActive=true;sfx.playSFX('boss_spawn');sfx.playBGM('boss');triggerSlowMo(1.5);
  return{x,y,type:bossId,hp:base.hp,maxHP:base.hp,speed:base.speed*60,atk:base.atk,score:base.score,
    color:base.color,radius:base.radius,isBoss:true,patterns:base.patterns,patternTimer:0,currentPattern:0,
    active:true,slowTimer:0,slowFactor:1,atkCooldown:0,animTimer:0,phaseTimer:0,flyTimer:0,isElite:false,special:null,rangedCooldown:0};
}
function updateEnemy(e,bastPos,dt){
  if(!e.active)return 0;e.animTimer+=dt*3;e.atkCooldown=Math.max(0,e.atkCooldown-dt);
  if(e.slowTimer>0){e.slowTimer-=dt;e.slowFactor=e.slowTimer>0?CONFIG.FROST_SLOW:1;}
  if(e.special==='phase'){e.phaseTimer+=dt;if(Math.sin(e.phaseTimer*2)>0.8)return 0;}
  const ang=angleTo(e.x,e.y,bastPos.x,bastPos.y),spd=e.speed*e.slowFactor*dt,d=dist(e.x,e.y,bastPos.x,bastPos.y);
  if(d>CONFIG.BASTION_RADIUS+e.radius){e.x+=Math.cos(ang)*spd;e.y+=Math.sin(ang)*spd;}
  else if(e.atkCooldown<=0){e.atkCooldown=1.0;return e.atk;}
  if(e.special==='ranged'&&d<200&&d>60){e.rangedCooldown-=dt;if(e.rangedCooldown<=0){e.rangedCooldown=2.5;return-1;}}
  return 0;
}
function updateBossPatterns(boss,wizPos,bastPos,enemyList,bounds,dt){
  if(!boss||!boss.active)return;boss.patternTimer+=dt;if(boss.flyTimer>0){boss.flyTimer-=dt;return;}
  const pi=boss.type==='ancientDragon'?4:boss.type==='wraithKing'?5:3;
  if(boss.patternTimer<pi)return;boss.patternTimer=0;
  const pat=boss.patterns[boss.currentPattern%boss.patterns.length];boss.currentPattern++;
  if(pat==='shockwave'||pat==='charge'){triggerShake(8);spawnParticleBurst(boss.x,boss.y,10,'#cc8833',0.5);modifyHP(-10,'bossAoE');}
  if(pat==='teleport'){boss.x=60+Math.random()*(bounds.w-120);boss.y=60+Math.random()*(bounds.h-120);spawnParticleBurst(boss.x,boss.y,8,'#4444ff',0.4);}
  if(pat==='summon'){for(let i=0;i<2;i++){const e=spawnEnemy('wraith',waveNum,bounds);if(e){e.x=boss.x+randInt(-40,40);e.y=boss.y+randInt(-40,40);enemyList.push(e);}}}
  if(pat==='drain'){boss.hp=Math.min(boss.maxHP,boss.hp+30);spawnParticleBurst(boss.x,boss.y,6,'#ff44ff',0.4);}
  if(pat==='breath'){triggerShake(6);const a=angleTo(boss.x,boss.y,bastPos.x,bastPos.y);for(let i=-3;i<=3;i++)spawnEnemyProj(boss.x,boss.y,a+i*0.15,15,'#ff4400');}
  if(pat==='fly'){boss.flyTimer=3;boss.x=60+Math.random()*(bounds.w-120);boss.y=60+Math.random()*(bounds.h-120);spawnParticleBurst(boss.x,boss.y,12,'#ff8800',0.6);}
  if(pat==='carpet'){triggerShake(10);const a=angleTo(boss.x,boss.y,bastPos.x,bastPos.y);for(let i=0;i<3;i++)for(let j=0;j<3;j++)spawnEnemyProj(boss.x,boss.y,a+(i-1)*0.4,10,'#ff2200');}
  if(pat==='throw'){const a=angleTo(boss.x,boss.y,bastPos.x,bastPos.y);spawnEnemyProj(boss.x,boss.y,a,15,'#aa7744');}
}
function spawnEnemyProj(x,y,angle,dmg,color){enemyProjectiles.push({x,y,vx:Math.cos(angle)*180,vy:Math.sin(angle)*180,dmg,color,radius:5,life:2,active:true});}

// ============================================================
// DAMAGE SYSTEM
// ============================================================
function damageEnemy(e,damage,upgrades){
  if(!e.active)return{killed:false,score:0,mana:0};
  let dmg=damage,isCrit=false;const critLvl=upgrades[17]||0;
  if(critLvl>0&&Math.random()<0.2*critLvl){dmg*=2;isCrit=true;}
  if(e.special==='armor'&&bastion&&dist(e.x,e.y,bastion.x,bastion.y)<100)dmg=Math.floor(dmg*0.5);
  e.hp-=dmg;spawnParticleBurst(e.x,e.y,3,e.color,0.2);
  if(isCrit)spawnParticleBurst(e.x,e.y-10,4,'#ffff00',0.3);
  if(e.hp<=0){e.active=false;sfx.playSFX('kill');spawnParticleBurst(e.x,e.y,6,e.color,0.3);killCount++;
    if(e.isBoss){_isBossActive=false;spawnParticleBurst(e.x,e.y,20,'#ffd700',0.8);triggerShake(12);triggerSlowMo(1.5);
      if(e.type==='golemKing')unlockAch(3);if(e.type==='wraithKing')unlockAch(4);if(e.type==='ancientDragon')unlockAch(5);
      const wd=WAVE_DATA[waveNum-1];if(wd)sfx.playBGM(wd.biome);}
    return{killed:true,score:e.score||10,mana:Math.floor((e.score||10)*0.2)};
  }
  return{killed:false,score:0,mana:0};
}

// ============================================================
// TOWER LOGIC
// ============================================================
function placeTower(ti,px,py,list,curMana,maxT,up){
  const tt=TOWER_TYPES[ti];if(!tt)return{success:false};
  if(list.length>=maxT+(up[13]||0)*2)return{success:false};
  if(curMana<tt.cost)return{success:false};
  if(dist(px,py,bastion.x,bastion.y)<CONFIG.BASTION_RADIUS+20)return{success:false};
  for(const t of list)if(dist(px,py,t.x,t.y)<30)return{success:false};
  list.push({x:px,y:py,type:ti,range:tt.range,dmg:tt.dmg,rate:tt.rate,color:tt.color,special:tt.special,cooldown:0,animTimer:0,active:true});
  towerTypesPlaced.add(ti);sfx.playSFX('tower_place');spawnParticleBurst(px,py,5,'#ffd700',0.4);
  return{success:true,cost:tt.cost};
}
function updateTower(tower,el,dt,up){
  if(!tower.active)return;tower.animTimer+=dt;tower.cooldown=Math.max(0,tower.cooldown-dt);if(tower.cooldown>0)return;
  const dm=1+(up[11]||0)*0.2,sm=1+(up[12]||0)*0.15,rate=tower.rate/sm,mb=1+(up[9]||0)*0.5;
  if(tower.special==='heal'){if(bastion.hp<bastion.maxHP){tower.cooldown=rate;modifyHP(5,'healTower');spawnParticleBurst(bastion.x,bastion.y,3,'#44ff88',0.3);}return;}
  let cl=null,cd=tower.range;for(const e of el){if(!e.active)continue;const d=dist(tower.x,tower.y,e.x,e.y);if(d<cd){cd=d;cl=e;}}
  if(!cl)return;tower.cooldown=rate;const dmg=Math.round(tower.dmg*dm);
  if(tower.special==='aoe'){const h=findEnemiesInRadius(cl.x,cl.y,40,el);for(const e of h){const r=damageEnemy(e,dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}}spawnParticleBurst(cl.x,cl.y,8,'#ff6600',0.4);sfx.playSFX('fireball');}
  else if(tower.special==='slow'){const r=damageEnemy(cl,dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}cl.slowTimer=2;cl.slowFactor=0.7;}
  else if(tower.special==='chain'){let tgt=[cl],last=cl;for(let i=0;i<2;i++){let nx=null,nd=80;for(const e of el){if(!e.active||tgt.includes(e))continue;const d=dist(last.x,last.y,e.x,e.y);if(d<nd){nd=d;nx=e;}}if(nx){tgt.push(nx);last=nx;}}for(const t of tgt){const r=damageEnemy(t,dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}}}
  else{const r=damageEnemy(cl,dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}}
}

// ============================================================
// PLAYER SPELLS
// ============================================================
function fireArcaneBeam(wiz,tx,ty,projs,up){
  const ang=angleTo(wiz.x,wiz.y,tx,ty),bDmg=Math.round(CONFIG.BOLT_DMG*(1+(up[1]||0)*0.25)),multi=up[2]?2:1;
  for(let i=0;i<multi;i++){const spread=multi>1?(i-0.5)*0.15:0,a=ang+spread,p=projPool.acquire();
    p.x=wiz.x;p.y=wiz.y;p.vx=Math.cos(a)*CONFIG.BOLT_SPEED;p.vy=Math.sin(a)*CONFIG.BOLT_SPEED;
    p.dmg=bDmg;p.color='#00ffff';p.active=true;p.type='bolt';p.aoeRadius=0;p.life=0.6;p.chainCount=up[4]||0;p.radius=4;projs.push(p);}
  sfx.playSFX('shoot');spawnParticleBurst(wiz.x+Math.cos(ang)*18,wiz.y+Math.sin(ang)*18,3,'#00ffff',0.2);
}
function fireFireball(wiz,tx,ty,projs,up){
  const ang=angleTo(wiz.x,wiz.y,tx,ty),rm=1+(up[3]||0)*0.3,p=projPool.acquire();
  p.x=wiz.x;p.y=wiz.y;p.vx=Math.cos(ang)*CONFIG.FIREBALL_SPEED;p.vy=Math.sin(ang)*CONFIG.FIREBALL_SPEED;
  p.dmg=CONFIG.FIREBALL_DMG;p.color='#ff6600';p.active=true;p.type='fireball';p.aoeRadius=CONFIG.FIREBALL_RADIUS*rm;p.life=1.0;p.radius=6;p.chainCount=0;
  projs.push(p);sfx.playSFX('fireball');
}
function castFrostNova(wiz,el,up){
  const rm=1+(up[16]||0)*0.4,db=(up[16]||0),range=CONFIG.FROST_RADIUS*rm,mb=1+(up[9]||0)*0.5;
  const hit=findEnemiesInRadius(wiz.x,wiz.y,range,el);
  for(const e of hit){e.slowTimer=CONFIG.FROST_DUR+db;e.slowFactor=CONFIG.FROST_SLOW;
    const r=damageEnemy(e,CONFIG.FROST_DMG,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}}
  sfx.playSFX('frost');spawnParticleBurst(wiz.x,wiz.y,8,'#88ddff',0.4);
}
function updateProjectiles(projs,el,dt,up){
  const mb=1+(up[9]||0)*0.5;
  for(let i=projs.length-1;i>=0;i--){const p=projs[i];
    if(!p.active){projPool.release(p);projs.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0||p.x<-50||p.x>W+50||p.y<-50||p.y>H+50){p.active=false;projPool.release(p);projs.splice(i,1);continue;}
    for(const e of el){if(!e.active)continue;if(dist(p.x,p.y,e.x,e.y)<e.radius+(p.radius||4)){
      if(p.type==='fireball'){const h=findEnemiesInRadius(p.x,p.y,p.aoeRadius,el);for(const he of h){const r=damageEnemy(he,p.dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}}spawnParticleBurst(p.x,p.y,12,'#ff6600',0.5);triggerShake(3);}
      else{const r=damageEnemy(e,p.dmg,up);if(r.killed){addScore(r.score);modifyMana(r.mana*mb);}
        if(p.chainCount>0){let nx=null,nd=80;for(const ne of el){if(!ne.active||ne===e)continue;const d=dist(e.x,e.y,ne.x,ne.y);if(d<nd){nd=d;nx=ne;}}if(nx){const r2=damageEnemy(nx,Math.round(p.dmg*0.7),up);if(r2.killed){addScore(r2.score);modifyMana(r2.mana*mb);}spawnParticleBurst(nx.x,nx.y,3,'#ffff44',0.2);}}}
      p.active=false;projPool.release(p);projs.splice(i,1);break;}}
  }
}

// ============================================================
// UPGRADES
// ============================================================
function generateUpgradeChoices(pool,cur,n){return pool.filter(u=>(cur[u.id]||0)<u.max).sort(()=>Math.random()-0.5).slice(0,n);}
function applyUpgrade(uid,up){up[uid]=(up[uid]||0)+1;
  if(uid===5){bastion.maxHP+=20;bastion.hp=Math.min(bastion.hp+20,bastion.maxHP);}
  if(uid===8)manaRegen+=2;if(uid===10){manaMax+=30;mana=Math.min(mana+30,manaMax);}
  if(uid===14)wizard.speed=CONFIG.WIZARD_SPEED*(1+(up[14]||0)*0.2);return up;}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticleBurst(x,y,n,color,life){
  for(let i=0;i<n;i++){if(activeParticles.length>=CONFIG.MAX_PARTICLES)break;
    const p=particlePool.acquire(),a=Math.random()*Math.PI*2,s=40+Math.random()*80;
    p.x=x;p.y=y;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=life;p.maxLife=life;p.color=color;p.size=2+Math.random()*3;p.active=true;activeParticles.push(p);}
}
function updateParticles(parts,dt){
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt;
    if(p.life<=0){p.active=false;particlePool.release(p);parts.splice(i,1);}}
}

// ============================================================
// WAVE MANAGEMENT
// ============================================================
function startWave(wn){
  if(wn>CONFIG.MAX_WAVES){gameWon=true;beginTransition(STATE.GAMEOVER);return;}
  waveNum=wn;_waveClearing=false;waveDmgTaken=0;
  const wd=WAVE_DATA[wn-1];if(!wd)return;
  const rl=currentUpgrades[18]||0;if(rl>0)modifyHP(10*rl,'regen');
  waveSpawnQueue=[];for(let i=0;i<wd.count;i++)waveSpawnQueue.push(randPick(wd.types));
  waveEnemiesTotal=wd.count+(wd.boss?1:0);waveSpawnTimer=0;
  if(wd.boss){const b=spawnBoss(wd.boss,{w:W,h:H});if(b)enemies.push(b);}
  if(bgCachedBiome!==wd.biome)buildBgCache(wd.biome);
  sfx.playBGM(_isBossActive?'boss':wd.biome);
}
function spawnNextEnemy(){if(waveSpawnQueue.length===0)return;const t=waveSpawnQueue.shift(),e=spawnEnemy(t,waveNum,{w:W,h:H});if(e)enemies.push(e);}

// ============================================================
// INPUT HANDLING
// ============================================================
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state===STATE.TITLE&&(e.key===' '||e.key==='Enter'))startGame();
  if(state===STATE.GAMEOVER&&(e.key==='r'||e.key==='R'))resetToTitle();
  if(state===STATE.PLAYING&&e.key==='Escape')beginTransition(STATE.PAUSED,{immediate:true});
  else if(state===STATE.PAUSED&&e.key==='Escape')beginTransition(STATE.PLAYING,{immediate:true,force:true});
  if(state===STATE.PLAYING){if(e.key==='q'||e.key==='Q')tryFireball();if(e.key==='e'||e.key==='E')tryFrostNova();
    if(e.key>='1'&&e.key<='5'){selectedTowerIdx=parseInt(e.key)-1;_isPlacingTower=true;}
    if(e.key===' '&&currentUpgrades[15]&&wizard)tryTeleport();}
  if(state===STATE.UPGRADE&&e.key>='1'&&e.key<='3'){const i=parseInt(e.key)-1;if(upgradeChoices&&upgradeChoices[i])selectUpgrade(i);}
  e.preventDefault();
},{passive:false});

// Click/tap dispatcher
function handleClick(cx,cy,btn){
  if(state===STATE.TITLE){startGame();return;}
  if(state===STATE.GAMEOVER){resetToTitle();return;}
  if(state===STATE.PAUSED){beginTransition(STATE.PLAYING,{immediate:true,force:true});return;}
  if(state===STATE.UPGRADE){handleUpgradeClick(cx,cy);return;}
  if(state!==STATE.PLAYING)return;
  if(pauseBtnRect&&cx>=pauseBtnRect.x&&cx<=pauseBtnRect.x+pauseBtnRect.w&&cy>=pauseBtnRect.y&&cy<=pauseBtnRect.y+pauseBtnRect.h){beginTransition(STATE.PAUSED,{immediate:true});return;}
  const tBarY=H-70;if(cy>tBarY&&!_isPlacingTower){const bw=5*60,bx=(W-bw)/2;if(cx>=bx&&cx<=bx+bw){const i=Math.floor((cx-bx)/60);if(i>=0&&i<5){selectedTowerIdx=i;_isPlacingTower=true;}return;}}
  if(isTouchDevice){if(cx>W-120&&cy>H-140&&cy<H-80){tryFireball();return;}if(cx>W-120&&cy>H-80){tryFrostNova();return;}}
  if(_isPlacingTower){const r=placeTower(selectedTowerIdx,cx,cy,towers,mana,CONFIG.MAX_TOWERS,currentUpgrades);if(r.success){modifyMana(-r.cost);_isPlacingTower=false;selectedTowerIdx=-1;}return;}
  if(btn===2){tryFireball();return;}if(btn===1){tryFrostNova();return;}
  if(wizard&&wizard.boltCD<=0){wizard.boltCD=CONFIG.BOLT_CD;fireArcaneBeam(wizard,cx,cy,activeProjectiles,currentUpgrades);}
}
function tryFireball(){if(!wizard||wizard.fireballCD>0||mana<CONFIG.FIREBALL_COST)return;const cm=currentUpgrades[3]?(1-(currentUpgrades[3]||0)*0.2):1;wizard.fireballCD=CONFIG.FIREBALL_CD*cm;modifyMana(-CONFIG.FIREBALL_COST);fireFireball(wizard,mouseX,mouseY,activeProjectiles,currentUpgrades);}
function tryFrostNova(){if(!wizard||wizard.frostCD>0||mana<CONFIG.FROST_COST)return;wizard.frostCD=CONFIG.FROST_CD;modifyMana(-CONFIG.FROST_COST);castFrostNova(wizard,enemies,currentUpgrades);}
function tryTeleport(){if(!wizard||wizard.teleCD>0)return;wizard.teleCD=3;const a=angleTo(wizard.x,wizard.y,mouseX,mouseY);spawnParticleBurst(wizard.x,wizard.y,6,'#44ffff',0.3);wizard.x=clamp(wizard.x+Math.cos(a)*100,20,W-20);wizard.y=clamp(wizard.y+Math.sin(a)*100,20,H-80);spawnParticleBurst(wizard.x,wizard.y,6,'#44ffff',0.3);}
function handleUpgradeClick(cx,cy){if(!upgradeChoices)return;const cw=Math.min(150,W/4),ch=210,gap=16,tw2=upgradeChoices.length*(cw+gap)-gap,sx=(W-tw2)/2,sy=(H-ch)/2-10;for(let i=0;i<upgradeChoices.length;i++){const x=sx+i*(cw+gap);if(cx>=x&&cx<=x+cw&&cy>=sy&&cy<=sy+ch){selectUpgrade(i);return;}}}
function selectUpgrade(i){if(!upgradeChoices||!upgradeChoices[i])return;currentUpgrades=applyUpgrade(upgradeChoices[i].id,currentUpgrades);upgradeChoices=null;_waveClearing=false;startWave(waveNum+1);beginTransition(STATE.PLAYING,{force:true});}

function startGame(){
  if(_isTransitioning)return;sfx._init();
  wizard={x:W/2,y:H/2+40,speed:CONFIG.WIZARD_SPEED,radius:CONFIG.WIZARD_RADIUS,boltCD:0,fireballCD:0,frostCD:0,teleCD:0,animTimer:0,facing:1};
  bastion={x:W/2,y:H/2,hp:CONFIG.BASTION_HP,maxHP:CONFIG.BASTION_HP,radius:CONFIG.BASTION_RADIUS,flashTimer:0,glowPhase:0};
  enemies=[];activeProjectiles=[];towers=[];activeParticles=[];enemyProjectiles=[];
  mana=CONFIG.MANA_MAX;manaMax=CONFIG.MANA_MAX;manaRegen=CONFIG.MANA_REGEN;score=0;waveNum=0;killCount=0;
  currentUpgrades={};towerTypesPlaced=new Set();achievementsUnlocked=getAchievements();
  selectedTowerIdx=-1;_isPlacingTower=false;_isBossActive=false;_waveClearing=false;
  gameWon=false;waveDmgTaken=0;displayScore=0;displayHP=CONFIG.BASTION_HP;displayMana=CONFIG.MANA_MAX;
  toasts=[];timeScaleObj.s=1;shakeIntensity=0;tw.clearImmediate();
  waveSpawnQueue=[];waveSpawnTimer=0;buildBgCache('forest');

}
function resetToTitle(){if(_isTransitioning)return;tw.clearImmediate();sfx.stopAll();enemies=[];activeProjectiles=[];towers=[];activeParticles=[];enemyProjectiles=[];beginTransition(STATE.TITLE,{force:true});}

// ============================================================
// UPDATE FUNCTIONS
// ============================================================
function updatePlaying(dt){
  if(!wizard||!bastion)return;const ed=dt*timeScaleObj.s;
  modifyMana(manaRegen*ed);
  // Wizard movement from keyboard + joystick
  let dx=0,dy=0;
  if(keys['w']||keys['W']||keys['ArrowUp'])dy=-1;if(keys['s']||keys['S']||keys['ArrowDown'])dy=1;
  if(keys['a']||keys['A']||keys['ArrowLeft'])dx=-1;if(keys['d']||keys['D']||keys['ArrowRight'])dx=1;
  if(touchJoystick.active){const m=Math.sqrt(touchJoystick.dx**2+touchJoystick.dy**2);if(m>10){dx=touchJoystick.dx/m;dy=touchJoystick.dy/m;}}
  if(dx||dy){const m=Math.sqrt(dx*dx+dy*dy);dx/=m;dy/=m;wizard.x+=dx*wizard.speed*ed;wizard.y+=dy*wizard.speed*ed;wizard.x=clamp(wizard.x,20,W-20);wizard.y=clamp(wizard.y,20,H-80);wizard.facing=dx>0?1:dx<0?-1:wizard.facing;wizard.animTimer+=ed*8;}
  wizard.boltCD=Math.max(0,wizard.boltCD-ed);wizard.fireballCD=Math.max(0,wizard.fireballCD-ed);wizard.frostCD=Math.max(0,wizard.frostCD-ed);wizard.teleCD=Math.max(0,wizard.teleCD-ed);
  bastion.flashTimer=Math.max(0,bastion.flashTimer-ed);bastion.glowPhase+=ed*2;
  // Auto-fire while mouse held
  if(mouseDown&&wizard.boltCD<=0&&!_isPlacingTower){wizard.boltCD=CONFIG.BOLT_CD;fireArcaneBeam(wizard,mouseX,mouseY,activeProjectiles,currentUpgrades);}
  // Spawn wave enemies
  const wd=WAVE_DATA[waveNum-1];
  if(wd&&waveSpawnQueue.length>0){waveSpawnTimer+=ed*1000;const iv=getWaveScale(waveNum).interval;if(waveSpawnTimer>=iv){waveSpawnTimer-=iv;spawnNextEnemy();}}
  // Update all enemies
  for(const e of enemies){if(!e.active)continue;
    if(e.isBoss)updateBossPatterns(e,wizard,bastion,enemies,{w:W,h:H},ed);
    const dmg=updateEnemy(e,bastion,ed);
    if(dmg>0){const tl=currentUpgrades[6]||0;if(tl>0){const r=damageEnemy(e,tl*5,currentUpgrades);if(r.killed){addScore(r.score);modifyMana(r.mana);}}const pl=currentUpgrades[7]||0;if(pl>0&&Math.random()<pl*0.3){}else modifyHP(-dmg,e.type);}
    if(dmg===-1){spawnEnemyProj(e.x,e.y,angleTo(e.x,e.y,bastion.x,bastion.y),e.atk,'#ff4444');}
  }
  // Enemy projectiles hit bastion
  for(let i=enemyProjectiles.length-1;i>=0;i--){const p=enemyProjectiles[i];p.x+=p.vx*ed;p.y+=p.vy*ed;p.life-=ed;
    if(p.life<=0){enemyProjectiles.splice(i,1);continue;}
    if(dist(p.x,p.y,bastion.x,bastion.y)<CONFIG.BASTION_RADIUS){modifyHP(-p.dmg,'ep');spawnParticleBurst(p.x,p.y,4,p.color,0.2);enemyProjectiles.splice(i,1);}}
  enemies=enemies.filter(e=>e.active);
  for(const t of towers)updateTower(t,enemies,ed,currentUpgrades);
  updateProjectiles(activeProjectiles,enemies,ed,currentUpgrades);
  updateParticles(activeParticles,ed);
  // Screen shake decay
  if(shakeIntensity>0){shakeIntensity=Math.max(0,shakeIntensity-ed*20);shakeOffX=(Math.random()-0.5)*shakeIntensity*2;shakeOffY=(Math.random()-0.5)*shakeIntensity*2;}else{shakeOffX=0;shakeOffY=0;}
  // Wave complete guard (F5)
  if(!_waveClearing&&waveSpawnQueue.length===0&&enemies.filter(e=>e.active).length===0&&waveNum>0){
    _waveClearing=true;addScore(waveNum*50);
    if(waveDmgTaken===0)unlockAch(7);if(waveNum>=5&&towers.length===0)unlockAch(6);
    if(waveNum>=CONFIG.MAX_WAVES){gameWon=true;if(bastion.hp>=bastion.maxHP)unlockAch(9);addScore(bastion.hp*10);beginTransition(STATE.GAMEOVER);}
    else beginTransition(STATE.UPGRADE);
  }
  checkAchievements();
  displayScore+=(score-displayScore)*Math.min(1,ed*8);displayHP+=(bastion.hp-displayHP)*Math.min(1,ed*8);displayMana+=(mana-displayMana)*Math.min(1,ed*8);
  for(let i=toasts.length-1;i>=0;i--){toasts[i].timer-=ed;toasts[i].y+=(toasts[i].targetY-toasts[i].y)*Math.min(1,ed*6);if(toasts[i].timer<=0)toasts.splice(i,1);}
}
function updateGameOver(dt){updateParticles(activeParticles,dt);displayScore+=(score-displayScore)*Math.min(1,dt*8);}

  c.strokeStyle='#ffd700';c.lineWidth=2;c.beginPath();c.arc(0,0,b.radius,0,Math.PI*2);c.stroke();

function drawEnemy(c,e){

  else if(e.type==='skeleton'){c.fillStyle=e.color;c.fillRect(-r*0.4,-r+bob,r*0.8,r*2);c.beginPath();c.arc(0,-r+bob,r*0.5,0,Math.PI*2);c.fill();c.fillStyle='#333';c.fillRect(-r*0.2,-r*0.7+bob,3,3);c.fillRect(r*0.1,-r*0.7+bob,3,3);}
  else if(e.type==='spider'){c.fillStyle=e.color;c.beginPath();c.ellipse(0,bob,r,r*0.6,0,0,Math.PI*2);c.fill();c.strokeStyle=e.color;c.lineWidth=1;for(let i=0;i<4;i++){const a=(i-1.5)*0.6;c.beginPath();c.moveTo(Math.cos(a)*r*0.5,bob);c.lineTo(Math.cos(a)*r*1.5,r*0.8+Math.sin(e.animTimer+i)*3+bob);c.stroke();c.beginPath();c.moveTo(-Math.cos(a)*r*0.5,bob);c.lineTo(-Math.cos(a)*r*1.5,r*0.8+Math.sin(e.animTimer+i)*3+bob);c.stroke();}}
  else if(e.type==='golem'){c.fillStyle=e.color;c.fillRect(-r,-r+bob,r*2,r*2);c.fillStyle='#886633';c.fillRect(-r*0.6,-r*0.6+bob,r*0.3,r*0.3);c.fillRect(r*0.3,-r*0.6+bob,r*0.3,r*0.3);}
  else if(e.type==='wraith'||e.type==='wraithKing'){c.fillStyle=e.color;c.beginPath();c.moveTo(0,-r+bob);c.lineTo(-r,r*0.5+bob);c.quadraticCurveTo(-r*0.5,r+bob+3,0,r*0.8+bob);c.quadraticCurveTo(r*0.5,r+bob+3,r,r*0.5+bob);c.closePath();c.fill();c.fillStyle='#fff';c.beginPath();c.arc(-3,-r*0.3+bob,2,0,Math.PI*2);c.fill();c.beginPath();c.arc(3,-r*0.3+bob,2,0,Math.PI*2);c.fill();}
  else if(e.type==='darkknight'){c.fillStyle=e.color;c.fillRect(-r*0.5,-r+bob,r,r*2);c.fillStyle='#888';c.fillRect(-r*0.6,-r*0.8+bob,r*1.2,r*0.6);if(bastion&&dist(e.x,e.y,bastion.x,bastion.y)<100){c.strokeStyle='#ffaa00';c.lineWidth=2;c.beginPath();c.arc(0,0,r+3,0,Math.PI*2);c.stroke();}}
  else if(e.type==='dragonkin'||e.type==='ancientDragon'){c.fillStyle=e.color;c.beginPath();c.moveTo(0,-r+bob);c.lineTo(-r,r*0.5+bob);c.lineTo(r,r*0.5+bob);c.closePath();c.fill();const ws=Math.sin(e.animTimer*4)*8;c.fillStyle=e.type==='ancientDragon'?'#cc1111':'#cc3333';c.beginPath();c.moveTo(-r*0.3,-r*0.3+bob);c.lineTo(-r*1.5,-r*0.8+bob+ws);c.lineTo(-r*0.5,bob);c.fill();c.beginPath();c.moveTo(r*0.3,-r*0.3+bob);c.lineTo(r*1.5,-r*0.8+bob+ws);c.lineTo(r*0.5,bob);c.fill();}
  if(e.isBoss){c.fillStyle='#ffd700';c.beginPath();c.moveTo(-8,-r-8+bob);c.lineTo(-5,-r-2+bob);c.lineTo(0,-r-10+bob);c.lineTo(5,-r-2+bob);c.lineTo(8,-r-8+bob);c.lineTo(8,-r+bob);c.lineTo(-8,-r+bob);c.closePath();c.fill();}
  c.shadowBlur=0;c.globalAlpha=1;
  if(e.hp<e.maxHP){const bw=r*2;c.fillStyle='#333';c.fillRect(-bw/2,-r-12+bob,bw,3);c.fillStyle=e.isBoss?'#ff4444':'#44ff44';c.fillRect(-bw/2,-r-12+bob,bw*(e.hp/e.maxHP),3);}
  c.restore();
}
function drawTower(c,t){drawTowerShape(c,t.x,t.y,t.color,8);c.globalAlpha=0.05;c.fillStyle=t.color;c.beginPath();c.arc(t.x,t.y,t.range,0,Math.PI*2);c.fill();c.globalAlpha=1;}
function drawTowerShape(c,x,y,color,s){c.fillStyle='#1a1a2e';c.fillRect(x-s,y-s,s*2,s*2);c.strokeStyle=color;c.lineWidth=2;c.strokeRect(x-s,y-s,s*2,s*2);c.fillStyle=color;c.beginPath();c.arc(x,y,s*0.4,0,Math.PI*2);c.fill();}
function drawProjectile(c,p){c.fillStyle=p.color;c.shadowColor=p.color;c.shadowBlur=6;if(p.type==='fireball'){c.beginPath();c.arc(p.x,p.y,p.radius,0,Math.PI*2);c.fill();c.fillStyle='#ffaa00';c.beginPath();c.arc(p.x,p.y,p.radius*0.5,0,Math.PI*2);c.fill();}else{c.fillRect(p.x-2,p.y-2,4,4);}c.shadowBlur=0;}
function drawEnemyProjectile(c,p){c.fillStyle=p.color;c.shadowColor=p.color;c.shadowBlur=4;c.beginPath();c.arc(p.x,p.y,p.radius,0,Math.PI*2);c.fill();c.shadowBlur=0;}
function drawParticle(c,p){const a=p.life/p.maxLife;c.globalAlpha=a;c.fillStyle=p.color;c.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*a,p.size*a);c.globalAlpha=1;}

// ============================================================
// HUD
// ============================================================
function renderHUD(){
  const pd=12;ctx.textAlign='left';
  // HP panel with heart icon
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pd,pd,200,52);ctx.strokeStyle='#1e1e30';ctx.lineWidth=1;ctx.strokeRect(pd,pd,200,52);
  if(SPRITES.uiHeart)ctx.drawImage(SPRITES.uiHeart,pd+4,pd+4,20,20);else{ctx.fillStyle='#ff4444';ctx.font='16px sans-serif';ctx.fillText('♥',pd+8,pd+20);}
  ctx.fillStyle='#e0e0f0';ctx.font='12px Cinzel,sans-serif';ctx.fillText('바스티온 HP',pd+28,pd+18);
  ctx.fillStyle='#222';ctx.fillRect(pd+14,pd+28,165,8);
  const hr=clamp(displayHP/(bastion?bastion.maxHP:100),0,1);
  ctx.fillStyle=hr>0.5?'#44ff44':hr>0.25?'#ffaa00':'#ff4444';ctx.fillRect(pd+14,pd+28,165*hr,8);
  ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.fillText(Math.round(displayHP)+'/'+(bastion?bastion.maxHP:100),pd+182,pd+36);
  // Mana bar
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pd,pd+58,200,24);
  ctx.fillStyle='#4488ff';ctx.font='12px sans-serif';ctx.fillText('✦ 마나',pd+8,pd+74);
  ctx.fillStyle='#222';ctx.fillRect(pd+62,pd+64,128,8);ctx.fillStyle='#4488ff';ctx.fillRect(pd+62,pd+64,128*clamp(displayMana/manaMax,0,1),8);
  ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.fillText(Math.round(displayMana)+'/'+manaMax,pd+194,pd+74);
  // Score + wave
  ctx.textAlign='right';ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W-pd-170,pd,170,46);
  if(SPRITES.uiStar)ctx.drawImage(SPRITES.uiStar,W-pd-166,pd+2,18,18);else{ctx.fillStyle='#ffd700';ctx.font='14px sans-serif';ctx.textAlign='right';ctx.fillText('★',W-pd-148,pd+16);}
  ctx.fillStyle='#ffd700';ctx.font='bold 14px Cinzel,sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(displayScore),W-pd-8,pd+18);
  ctx.fillStyle='#e0e0f0';ctx.font='12px Cinzel,sans-serif';ctx.fillText('웨이브 '+waveNum+'/'+CONFIG.MAX_WAVES,W-pd-8,pd+38);
  // Boss HP
  if(_isBossActive){const boss=enemies.find(e=>e.isBoss&&e.active);if(boss){const bw=Math.min(300,W-40),bx=(W-bw)/2;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx-4,4,bw+8,26);ctx.textAlign='center';ctx.fillStyle='#ff4444';ctx.font='bold 11px Cinzel,sans-serif';ctx.fillText('⚠ BOSS: '+(boss.type==='golemKing'?'골렘 킹':boss.type==='wraithKing'?'레이스 킹':'고대 드래곤')+' ⚠',W/2,16);ctx.fillStyle='#333';ctx.fillRect(bx,20,bw,8);ctx.fillStyle='#ff2222';ctx.fillRect(bx,20,bw*(boss.hp/boss.maxHP),8);}}
  // Pause button (48x48 touch safe)
  const pb=touchSafe(36,36);pauseBtnRect={x:W-pd-pb.w,y:pd+52,w:pb.w,h:pb.h};
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(pauseBtnRect.x,pauseBtnRect.y,pb.w,pb.h);ctx.strokeStyle='#8080a0';ctx.lineWidth=1;ctx.strokeRect(pauseBtnRect.x,pauseBtnRect.y,pb.w,pb.h);
  ctx.fillStyle='#e0e0f0';ctx.textAlign='center';ctx.font='18px sans-serif';ctx.fillText('⏸',pauseBtnRect.x+pb.w/2,pauseBtnRect.y+pb.h/2+5);
  // Tower bar
  ctx.textAlign='center';const bW=5*60,bX=(W-bW)/2,bY=H-68;
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(bX-6,bY-4,bW+12,64);ctx.strokeStyle='#1e1e30';ctx.lineWidth=1;ctx.strokeRect(bX-6,bY-4,bW+12,64);
  for(let i=0;i<5;i++){const tt=TOWER_TYPES[i],tx=bX+i*60+2,ty=bY,sel=_isPlacingTower&&selectedTowerIdx===i;
    ctx.fillStyle=sel?'rgba(255,255,255,0.12)':'rgba(18,18,30,0.9)';ctx.fillRect(tx,ty,54,54);ctx.strokeStyle=mana>=tt.cost?tt.color:'#333';ctx.lineWidth=sel?2:1;ctx.strokeRect(tx,ty,54,54);
    drawTowerShape(ctx,tx+27,ty+20,mana>=tt.cost?tt.color:'#444',7);ctx.fillStyle=mana>=tt.cost?'#e0e0f0':'#555';ctx.font='9px sans-serif';ctx.fillText(tt.name,tx+27,ty+40);ctx.fillStyle='#4488ff';ctx.font='8px sans-serif';ctx.fillText(tt.cost+'♦',tx+27,ty+52);}
  // Skill buttons
  if(wizard){const spX=isTouchDevice?W-64:pd,spY=isTouchDevice?H-150:H-150;
    const fb=wizard.fireballCD<=0&&mana>=CONFIG.FIREBALL_COST,fn=wizard.frostCD<=0&&mana>=CONFIG.FROST_COST;
    const bs=touchSafe(52,52);
    ctx.fillStyle=fb?'rgba(255,102,0,0.25)':'rgba(40,40,40,0.5)';ctx.fillRect(spX,spY,bs.w,bs.h);ctx.strokeStyle=fb?'#ff6600':'#444';ctx.lineWidth=1;ctx.strokeRect(spX,spY,bs.w,bs.h);
    ctx.fillStyle=fb?'#ff6600':'#666';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('🔥Q',spX+bs.w/2,spY+20);ctx.font='9px sans-serif';ctx.fillText(CONFIG.FIREBALL_COST+'♦',spX+bs.w/2,spY+36);
    if(wizard.fireballCD>0){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(spX,spY,bs.w,bs.h*(wizard.fireballCD/CONFIG.FIREBALL_CD));}
    ctx.fillStyle=fn?'rgba(136,221,255,0.25)':'rgba(40,40,40,0.5)';ctx.fillRect(spX,spY+58,bs.w,bs.h);ctx.strokeStyle=fn?'#88ddff':'#444';ctx.lineWidth=1;ctx.strokeRect(spX,spY+58,bs.w,bs.h);
    ctx.fillStyle=fn?'#88ddff':'#666';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('❄E',spX+bs.w/2,spY+78);ctx.font='9px sans-serif';ctx.fillText(CONFIG.FROST_COST+'♦',spX+bs.w/2,spY+94);
    if(wizard.frostCD>0){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(spX,spY+58,bs.w,bs.h*(wizard.frostCD/CONFIG.FROST_CD));}}
  ctx.textAlign='left';ctx.fillStyle='#8080a0';ctx.font='11px sans-serif';ctx.fillText('처치: '+killCount,pd,H-75);
  // Touch joystick
  if(isTouchDevice&&touchJoystick.active){ctx.globalAlpha=0.3;ctx.strokeStyle='#8080a0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(touchJoystick.baseX,touchJoystick.baseY,50,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#e0e0f0';ctx.beginPath();ctx.arc(touchJoystick.baseX+touchJoystick.dx,touchJoystick.baseY+touchJoystick.dy,18,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  ctx.textAlign='left';
}

// ============================================================
// UPGRADE UI (§9.2)
// ============================================================
function renderUpgradeUI(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);if(!upgradeChoices||!upgradeChoices.length)return;
  ctx.textAlign='center';ctx.font='bold '+(W<500?20:26)+'px Cinzel,Georgia,serif';ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=10;ctx.fillText('업그레이드 선택',W/2,H/2-145);ctx.shadowBlur=0;
  ctx.font='12px sans-serif';ctx.fillStyle='#8080a0';ctx.fillText('카드 클릭 또는 1~3 키',W/2,H/2-120);
  const cw=Math.min(150,W/4),ch=210,gap=16,tw2=upgradeChoices.length*(cw+gap)-gap,sx=(W-tw2)/2,sy=(H-ch)/2-10;
  for(let i=0;i<upgradeChoices.length;i++){const u=upgradeChoices[i],x=sx+i*(cw+gap),y=sy;
    ctx.fillStyle='#12121e';ctx.fillRect(x,y,cw,ch);ctx.strokeStyle=u.color;ctx.lineWidth=2;ctx.strokeRect(x,y,cw,ch);
    ctx.fillStyle=u.color;ctx.globalAlpha=0.12;ctx.fillRect(x,y,cw,28);ctx.globalAlpha=1;
    ctx.fillStyle=u.color;ctx.font='bold 11px sans-serif';
    ctx.fillText(u.cat==='atk'?'공격':u.cat==='def'?'방어':u.cat==='res'?'자원':u.cat==='twr'?'타워':u.cat==='mov'?'이동':'특수',x+cw/2,y+19);
    if(SPRITES.powerup)ctx.drawImage(SPRITES.powerup,x+cw/2-20,y+38,40,40);
    else{ctx.font='30px sans-serif';ctx.fillText(u.cat==='atk'?'⚔️':u.cat==='def'?'🛡️':u.cat==='res'?'💎':u.cat==='twr'?'🏰':u.cat==='mov'?'⚡':'✨',x+cw/2,y+68);}
    ctx.fillStyle='#e0e0f0';ctx.font='bold 13px Cinzel,sans-serif';ctx.fillText(u.name,x+cw/2,y+100);
    ctx.fillStyle='#8080a0';ctx.font='11px sans-serif';wrapText(ctx,u.desc,x+cw/2,y+122,cw-12,14);
    ctx.fillStyle='#505070';ctx.font='10px sans-serif';ctx.fillText((currentUpgrades[u.id]||0)+'/'+u.max,x+cw/2,y+ch-22);
    ctx.fillStyle='#ffd700';ctx.font='bold 12px sans-serif';ctx.fillText('['+(i+1)+']',x+cw/2,y+ch-6);}
  ctx.textAlign='left';
}
function wrapText(c,t,x,y,mw,lh){let l='',cy=y;for(let i=0;i<t.length;i++){const ts=l+t[i];if(c.measureText(ts).width>mw&&l.length>0){c.fillText(l,x,cy);l=t[i];cy+=lh;}else l=ts;}if(l)c.fillText(l,x,cy);}

// ============================================================
// PAUSE / GAMEOVER
// ============================================================
function renderPause(){ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font='bold 36px Cinzel,Georgia,serif';ctx.fillStyle='#e0e0f0';ctx.shadowColor='#6c3cf7';ctx.shadowBlur=15;ctx.fillText('일시정지',W/2,H/2-20);ctx.shadowBlur=0;ctx.font='16px Cinzel,sans-serif';ctx.fillStyle='#8080a0';ctx.fillText(isTouchDevice?'탭하여 계속':'ESC로 계속',W/2,H/2+20);ctx.textAlign='left';}

function renderGameOver(){
  if(bgCacheCanvas){ctx.globalAlpha=0.3;ctx.drawImage(bgCacheCanvas,0,0);ctx.globalAlpha=1;}
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  if(gameWon){ctx.font='bold '+(W<500?28:42)+'px Cinzel,Georgia,serif';ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=20;ctx.fillText('승리!',W/2,H/2-80);}
  else{ctx.font='bold '+(W<500?28:42)+'px Cinzel,Georgia,serif';ctx.fillStyle='#ff4444';ctx.shadowColor='#ff4444';ctx.shadowBlur=20;ctx.fillText('게임 오버',W/2,H/2-80);}
  ctx.shadowBlur=0;ctx.font='18px Cinzel,sans-serif';ctx.fillStyle='#e0e0f0';
  ctx.fillText('점수: '+Math.round(displayScore),W/2,H/2-30);ctx.fillText('웨이브: '+waveNum+'/'+CONFIG.MAX_WAVES,W/2,H/2);ctx.fillText('처치: '+killCount,W/2,H/2+30);
  const best=getBest();if(score>=best.score&&score>0){ctx.fillStyle='#ffd700';ctx.font='bold 16px Cinzel,sans-serif';ctx.fillText('★ 최고 기록! ★',W/2,H/2+60);}else{ctx.fillStyle='#8080a0';ctx.font='14px sans-serif';ctx.fillText('최고 점수: '+best.score,W/2,H/2+60);}
  if(achievementsUnlocked&&achievementsUnlocked.length>0){ctx.fillStyle='#ffd700';ctx.font='12px sans-serif';ctx.fillText('업적: '+achievementsUnlocked.map(id=>ACH_DEFS[id]?ACH_DEFS[id].icon:'').join(' '),W/2,H/2+90);}
  const al=0.5+Math.sin(titleTime*3)*0.5;ctx.globalAlpha=al;ctx.font='16px Cinzel,sans-serif';ctx.fillStyle='#ffd700';ctx.fillText(isTouchDevice?'탭하여 재시작':'R키 / 클릭으로 재시작',W/2,H/2+130);ctx.globalAlpha=1;ctx.textAlign='left';
}

// ============================================================
// TOASTS
// ============================================================
function renderToasts(){if(!toasts)return;ctx.textAlign='center';for(const t of toasts){ctx.globalAlpha=Math.min(1,t.timer);const tw2=ctx.measureText(t.msg).width+28;ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fillRect(W/2-tw2/2,t.y,tw2,28);ctx.strokeStyle='#ffd700';ctx.lineWidth=1;ctx.strokeRect(W/2-tw2/2,t.y,tw2,28);ctx.fillStyle='#ffd700';ctx.font='bold 13px Cinzel,sans-serif';ctx.fillText(t.msg,W/2,t.y+18);ctx.globalAlpha=1;}ctx.textAlign='left';}

// ============================================================
// LOADING SCREEN
// ============================================================
function drawLoading(){ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='20px Cinzel,Georgia,serif';ctx.fillStyle='#6c3cf7';ctx.fillText('로딩 중...',W/2,H/2);const t=performance.now()/1000;ctx.strokeStyle='#6c3cf7';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H/2+40,15,t*4,t*4+Math.PI*1.5);ctx.stroke();}

// ============================================================
// GAME LOOP (F12: try-catch + dt 50ms cap)
// ============================================================
function gameLoop(ts){
  try{
    const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;titleTime+=dt;
    if(state!==STATE.PAUSED)tw.update(dt);
    if(state===STATE.PLAYING)updatePlaying(dt);
    else if(state===STATE.GAMEOVER)updateGameOver(dt);
    render(dt);
  }catch(e){console.error('[GameLoop]',e);}
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT — preload then start loop
// ============================================================
async function init(){
  resizeCanvas();drawLoading();
  await preloadAssets();
  toasts=[];achievementsUnlocked=getAchievements();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}
init();
</script>
