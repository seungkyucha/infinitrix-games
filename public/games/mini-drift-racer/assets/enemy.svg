<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="enemyBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="50%" stop-color="#cc2222"/>
      <stop offset="100%" stop-color="#881111"/>
    </linearGradient>
    <linearGradient id="enemyWindshield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcccc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#aa6666" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="enemyHeadlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffff88" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="enemyTaillight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="enemySpoiler" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="shadow"/>
      <feOffset dx="1" dy="2" result="offsetShadow"/>
      <feMerge><feMergeNode in="offsetShadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#eShadow)">
    <!-- 타이어 4개 -->
    <rect x="10" y="12" width="8" height="11" rx="2.5" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
    <rect x="46" y="12" width="8" height="11" rx="2.5" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
    <rect x="10" y="41" width="8" height="11" rx="2.5" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
    <rect x="46" y="41" width="8" height="11" rx="2.5" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
    <!-- 타이어 트레드 -->
    <line x1="11" y1="15" x2="17" y2="15" stroke="#444" stroke-width="0.6"/>
    <line x1="11" y1="17.5" x2="17" y2="17.5" stroke="#444" stroke-width="0.6"/>
    <line x1="11" y1="20" x2="17" y2="20" stroke="#444" stroke-width="0.6"/>
    <line x1="47" y1="15" x2="53" y2="15" stroke="#444" stroke-width="0.6"/>
    <line x1="47" y1="17.5" x2="53" y2="17.5" stroke="#444" stroke-width="0.6"/>
    <line x1="47" y1="20" x2="53" y2="20" stroke="#444" stroke-width="0.6"/>
    <!-- 차체 — 더 공격적인 형태 -->
    <path d="M16 6 Q32 2 48 6 L52 14 L52 54 Q32 58 12 54 L12 14 Z" fill="url(#enemyBodyGrad)" stroke="#881111" stroke-width="0.8"/>
    <!-- 루프 하이라이트 -->
    <path d="M20 16 Q32 13 44 16 L42 28 Q32 26 22 28 Z" fill="#ff8888" opacity="0.25"/>
    <!-- 앞유리 -->
    <path d="M21 12 Q32 9 43 12 L41 21 Q32 19 23 21 Z" fill="url(#enemyWindshield)"/>
    <!-- 뒷유리 -->
    <path d="M23 40 Q32 38 41 40 L41 46 Q32 44 23 46 Z" fill="#aa6666" opacity="0.4"/>
    <!-- 공격적 스트라이프 -->
    <path d="M30 6 L28 54" stroke="#ffcc00" stroke-width="1.5" opacity="0.7"/>
    <path d="M34 6 L36 54" stroke="#ffcc00" stroke-width="1.5" opacity="0.7"/>
    <!-- 프론트 범퍼 가드 -->
    <path d="M18 7 Q32 3 46 7 L44 9 Q32 6 20 9 Z" fill="#666" stroke="#444" stroke-width="0.3"/>
    <!-- 스포일러 (더 큼) -->
    <rect x="14" y="49" width="36" height="5" rx="1.5" fill="url(#enemySpoiler)"/>
    <rect x="18" y="47" width="2" height="4" rx="0.5" fill="#333"/>
    <rect x="44" y="47" width="2" height="4" rx="0.5" fill="#333"/>
    <!-- 헤드라이트 -->
    <ellipse cx="22" cy="8" rx="4" ry="2.5" fill="url(#enemyHeadlight)" filter="url(#eGlow)"/>
    <ellipse cx="42" cy="8" rx="4" ry="2.5" fill="url(#enemyHeadlight)" filter="url(#eGlow)"/>
    <!-- 테일라이트 -->
    <ellipse cx="19" cy="53" rx="3.5" ry="2" fill="url(#enemyTaillight)" filter="url(#eGlow)"/>
    <ellipse cx="45" cy="53" rx="3.5" ry="2" fill="url(#enemyTaillight)" filter="url(#eGlow)"/>
  </g>
</svg>