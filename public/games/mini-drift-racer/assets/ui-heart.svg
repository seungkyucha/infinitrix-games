<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6688"/>
      <stop offset="60%" stop-color="#ff2244"/>
      <stop offset="100%" stop-color="#aa0022"/>
    </radialGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feFlood flood-color="#880022" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#heartGlow)">
    <!-- 메인 하트 형태 -->
    <path d="M16 28 C12 24 2 18 2 10 C2 5 6 2 10 2 C12.5 2 14.5 3.5 16 6 C17.5 3.5 19.5 2 22 2 C26 2 30 5 30 10 C30 18 20 24 16 28 Z" fill="url(#heartGrad)" filter="url(#innerShadow)"/>
    <!-- 하이라이트 -->
    <path d="M10 7 C8 7 6 8.5 6 11 C6 12 6.5 13 7 13.5" stroke="#ffaacc" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- 광택 -->
    <ellipse cx="11" cy="9" rx="4" ry="3" fill="url(#heartShine)"/>
    <!-- 외곽선 하이라이트 -->
    <path d="M16 28 C12 24 2 18 2 10 C2 5 6 2 10 2 C12.5 2 14.5 3.5 16 6 C17.5 3.5 19.5 2 22 2 C26 2 30 5 30 10 C30 18 20 24 16 28 Z" fill="none" stroke="#ff4466" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>