<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="thumbSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="60%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d5a1e"/>
    </linearGradient>
    <linearGradient id="thumbRoad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="thumbCarBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#0a5eb8"/>
    </linearGradient>
    <linearGradient id="thumbEnemyBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#881111"/>
    </linearGradient>
    <radialGradient id="thumbDriftSmoke" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#888888" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thumbBoostFlare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0088cc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thumbMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffff8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffffcc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="thumbGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="shadow"/>
      <feOffset dx="1" dy="2" result="offsetShadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="offsetShadow" operator="in" result="shadowColored"/>
      <feMerge><feMergeNode in="shadowColored"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#thumbSky)"/>
  <!-- 별 -->
  <g>
    <circle cx="30" cy="25" r="1" fill="#fff" opacity="0.8"/>
    <circle cx="80" cy="50" r="0.8" fill="#aaccff" opacity="0.6"/>
    <circle cx="140" cy="20" r="1.2" fill="#fff" opacity="0.9"/>
    <circle cx="220" cy="40" r="0.7" fill="#ccddff" opacity="0.5"/>
    <circle cx="300" cy="15" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="360" cy="55" r="0.9" fill="#aabbee" opacity="0.6"/>
    <circle cx="170" cy="65" r="0.8" fill="#fff" opacity="0.7"/>
    <circle cx="50" cy="75" r="1.1" fill="#ccddff" opacity="0.6"/>
    <circle cx="330" cy="30" r="1.3" fill="#fff" opacity="0.85"/>
  </g>
  <!-- 달 -->
  <circle cx="340" cy="50" r="20" fill="url(#thumbMoon)" filter="url(#thumbGlow)"/>
  <circle cx="340" cy="50" r="13" fill="#fffff8" opacity="0.85"/>
  <circle cx="335" cy="45" r="2" fill="#e8e8d0" opacity="0.4"/>
  <circle cx="344" cy="53" r="1.5" fill="#e8e8d0" opacity="0.3"/>
  <!-- 언덕 실루엣 -->
  <path d="M0 200 Q50 175 120 190 Q200 170 280 185 Q350 168 400 180 L400 300 L0 300 Z" fill="#1a3a10" opacity="0.7"/>
  <!-- 도로 (원근감 있는 곡선) -->
  <path d="M-20 280 Q80 220 160 240 Q240 260 320 230 Q380 210 420 220" stroke="url(#thumbRoad)" stroke-width="60" fill="none" stroke-linecap="round"/>
  <!-- 커브석 -->
  <path d="M-20 280 Q80 220 160 240 Q240 260 320 230 Q380 210 420 220" stroke="#cc2222" stroke-width="66" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- 중앙선 -->
  <path d="M-20 280 Q80 220 160 240 Q240 260 320 230 Q380 210 420 220" stroke="#fff" stroke-width="1.5" fill="none" stroke-dasharray="12 10" opacity="0.6"/>
  <!-- 타이어 자국 (드리프트 흔적) -->
  <path d="M140 255 Q160 248 180 252 Q200 258 220 250" stroke="#222" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M145 258 Q165 252 185 256 Q205 262 225 254" stroke="#222" stroke-width="2.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- 플레이어 차량 (드리프트 중, 각도 틀어진 상태) -->
  <g transform="translate(190, 235) rotate(-25)">
    <!-- 드리프트 연기 -->
    <ellipse cx="0" cy="12" rx="20" ry="8" fill="url(#thumbDriftSmoke)"/>
    <!-- 차체 -->
    <path d="M0 -12 Q10 -14 15 -8 L15 8 Q10 12 0 10 Q-10 12 -15 8 L-15 -8 Q-10 -14 0 -12 Z" fill="url(#thumbCarBody)" stroke="#0a5eb8" stroke-width="0.5"/>
    <!-- 앞유리 -->
    <rect x="-6" y="-10" width="12" height="5" rx="1.5" fill="#a0e0ff" opacity="0.7"/>
    <!-- 레이싱 스트라이프 -->
    <line x1="-2" y1="-12" x2="-2" y2="10" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="2" y1="-12" x2="2" y2="10" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <!-- 부스트 플레임 -->
    <ellipse cx="0" cy="14" rx="5" ry="8" fill="url(#thumbBoostFlare)" filter="url(#thumbGlow)"/>
  </g>
  <!-- 적 차량 (뒤에서 추격 중) -->
  <g transform="translate(110, 260) rotate(-10)">
    <path d="M0 -8 Q7 -10 10 -6 L10 6 Q7 9 0 7 Q-7 9 -10 6 L-10 -6 Q-7 -10 0 -8 Z" fill="url(#thumbEnemyBody)" stroke="#881111" stroke-width="0.4"/>
    <rect x="-4" y="-7" width="8" height="3.5" rx="1" fill="#ffcccc" opacity="0.5"/>
    <line x1="-1" y1="-8" x2="-1" y2="7" stroke="#ffcc00" stroke-width="0.6" opacity="0.5"/>
    <line x1="1" y1="-8" x2="1" y2="7" stroke="#ffcc00" stroke-width="0.6" opacity="0.5"/>
  </g>
  <!-- 스피드 라인 (속도감) -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-linecap="round">
    <line x1="250" y1="220" x2="300" y2="218"/>
    <line x1="240" y1="235" x2="295" y2="233"/>
    <line x1="245" y1="250" x2="310" y2="248"/>
    <line x1="235" y1="260" x2="280" y2="258"/>
  </g>
  <!-- 나무 실루엣 -->
  <g fill="#0a1a06" opacity="0.5">
    <path d="M30 205 L36 180 L42 205 Z"/>
    <path d="M370 195 L376 170 L382 195 Z"/>
    <path d="M60 210 L65 190 L70 210 Z"/>
  </g>
  <!-- 제목 텍스트 -->
  <g filter="url(#textShadow)">
    <text x="200" y="45" font-size="28" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" font-family="Arial, sans-serif" filter="url(#titleGlow)">MINI DRIFT RACER</text>
  </g>
  <!-- 부제 -->
  <text x="200" y="70" font-size="12" font-weight="bold" fill="#00e5ff" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">DRIFT TO WIN</text>
  <!-- HUD 미리보기 (좌상) -->
  <g opacity="0.6">
    <rect x="10" y="90" width="80" height="20" rx="3" fill="#000" opacity="0.5"/>
    <text x="15" y="104" font-size="9" fill="#fff" font-family="Arial, sans-serif">LAP 2/3</text>
    <!-- 부스트 게이지 -->
    <rect x="10" y="114" width="60" height="6" rx="2" fill="#222" opacity="0.5"/>
    <rect x="10" y="114" width="40" height="6" rx="2" fill="#00e5ff" opacity="0.7"/>
  </g>
  <!-- 프레임 테두리 -->
  <rect x="1" y="1" width="398" height="298" rx="6" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
</svg>