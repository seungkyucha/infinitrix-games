<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="boostOrb" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </radialGradient>
    <radialGradient id="boostInnerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="boostOuterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
    <filter id="boostGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <circle cx="24" cy="24" r="22" fill="url(#boostOuterGlow)" filter="url(#boostGlow)"/>
  <!-- 메인 오브 -->
  <circle cx="24" cy="24" r="16" fill="url(#boostOrb)" stroke="#00aacc" stroke-width="0.8"/>
  <!-- 내부 광택 링 -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="#66ffff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="24" cy="24" r="8" fill="url(#boostInnerGlow)"/>
  <!-- 번개 볼트 아이콘 (부스트 상징) -->
  <g filter="url(#boltGlow)">
    <path d="M26 10 L19 23 L23 23 L21 38 L30 22 L25.5 22 Z" fill="url(#boltGrad)" stroke="#0099cc" stroke-width="0.4"/>
  </g>
  <!-- 빛 방사 라인 -->
  <g stroke="#66ffff" stroke-width="0.8" opacity="0.4">
    <line x1="24" y1="0" x2="24" y2="5"/>
    <line x1="24" y1="43" x2="24" y2="48"/>
    <line x1="0" y1="24" x2="5" y2="24"/>
    <line x1="43" y1="24" x2="48" y2="24"/>
    <line x1="6" y1="6" x2="10" y2="10"/>
    <line x1="38" y1="38" x2="42" y2="42"/>
    <line x1="42" y1="6" x2="38" y2="10"/>
    <line x1="6" y1="42" x2="10" y2="38"/>
  </g>
  <!-- 상단 하이라이트 -->
  <ellipse cx="20" cy="17" rx="6" ry="4" fill="#ffffff" opacity="0.25"/>
</svg>