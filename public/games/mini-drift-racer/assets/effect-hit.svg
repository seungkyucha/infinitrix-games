<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffee44" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ff8800" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ff6600" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#ff4400" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkBlur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 충격파 링 -->
  <circle cx="48" cy="48" r="44" fill="url(#shockwave)"/>
  <circle cx="48" cy="48" r="36" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.3"/>
  <!-- 폭발 코어 -->
  <circle cx="48" cy="48" r="24" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 폭발 스파이크 -->
  <g filter="url(#hitGlow)">
    <path d="M48 48 L48 8 L52 28 Z" fill="#ffaa00" opacity="0.7"/>
    <path d="M48 48 L48 88 L44 68 Z" fill="#ffaa00" opacity="0.7"/>
    <path d="M48 48 L8 48 L28 44 Z" fill="#ffaa00" opacity="0.7"/>
    <path d="M48 48 L88 48 L68 52 Z" fill="#ffaa00" opacity="0.7"/>
    <path d="M48 48 L20 20 L34 36 Z" fill="#ff8800" opacity="0.5"/>
    <path d="M48 48 L76 20 L62 36 Z" fill="#ff8800" opacity="0.5"/>
    <path d="M48 48 L20 76 L34 60 Z" fill="#ff8800" opacity="0.5"/>
    <path d="M48 48 L76 76 L62 60 Z" fill="#ff8800" opacity="0.5"/>
  </g>
  <!-- 파편/스파크 -->
  <g filter="url(#sparkBlur)">
    <circle cx="22" cy="18" r="3" fill="url(#sparkGlow)"/>
    <circle cx="74" cy="22" r="2.5" fill="url(#sparkGlow)"/>
    <circle cx="18" cy="70" r="2" fill="url(#sparkGlow)"/>
    <circle cx="78" cy="68" r="3" fill="url(#sparkGlow)"/>
    <circle cx="48" cy="10" r="2" fill="url(#sparkGlow)"/>
    <circle cx="12" cy="44" r="2.5" fill="url(#sparkGlow)"/>
    <circle cx="84" cy="48" r="2" fill="url(#sparkGlow)"/>
    <circle cx="35" cy="80" r="2.5" fill="url(#sparkGlow)"/>
    <circle cx="65" cy="82" r="2" fill="url(#sparkGlow)"/>
  </g>
  <!-- 중심 밝은 코어 -->
  <circle cx="48" cy="48" r="8" fill="#ffffff" opacity="0.8" filter="url(#hitGlow)"/>
  <!-- 금속 파편 라인 -->
  <g stroke="#cccccc" stroke-width="1" opacity="0.5" stroke-linecap="round">
    <line x1="38" y1="30" x2="28" y2="14"/>
    <line x1="58" y1="32" x2="72" y2="16"/>
    <line x1="34" y1="60" x2="18" y2="78"/>
    <line x1="62" y1="58" x2="80" y2="74"/>
  </g>
</svg>