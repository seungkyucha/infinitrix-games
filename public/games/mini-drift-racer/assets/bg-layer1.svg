<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0f1428"/>
      <stop offset="100%" stop-color="#1a2040"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffff0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffffcc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#aaccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3322aa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2211aa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#110066" stop-opacity="0"/>
    </radialGradient>
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="moonBlur">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="horizonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2040" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2d5a1e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hillGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a10"/>
      <stop offset="100%" stop-color="#0d2008"/>
    </linearGradient>
    <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4515"/>
      <stop offset="100%" stop-color="#122a0c"/>
    </linearGradient>
  </defs>
  <!-- 하늘 배경 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 성운 효과 -->
  <ellipse cx="200" cy="180" rx="200" ry="120" fill="url(#nebulaGlow)"/>
  <ellipse cx="650" cy="250" rx="180" ry="100" fill="url(#nebulaGlow)"/>
  <!-- 달 -->
  <g filter="url(#moonBlur)">
    <circle cx="650" cy="100" r="40" fill="url(#moonGlow)"/>
    <circle cx="650" cy="100" r="25" fill="#fffff8" opacity="0.9"/>
    <!-- 달 크레이터 -->
    <circle cx="640" cy="92" r="4" fill="#e8e8d0" opacity="0.5"/>
    <circle cx="655" cy="105" r="3" fill="#e8e8d0" opacity="0.4"/>
    <circle cx="647" cy="110" r="2.5" fill="#e8e8d0" opacity="0.3"/>
  </g>
  <!-- 별들 (다양한 크기와 밝기) -->
  <g filter="url(#starBlur)">
    <circle cx="50" cy="40" r="1.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="120" cy="80" r="1" fill="#aaccff" opacity="0.7"/>
    <circle cx="200" cy="30" r="1.2" fill="#ffffff" opacity="0.8"/>
    <circle cx="280" cy="110" r="0.8" fill="#ccddff" opacity="0.6"/>
    <circle cx="350" cy="50" r="1.4" fill="#ffffff" opacity="0.85"/>
    <circle cx="420" cy="90" r="0.9" fill="#aabbee" opacity="0.65"/>
    <circle cx="500" cy="35" r="1.3" fill="#ffffff" opacity="0.9"/>
    <circle cx="560" cy="130" r="1" fill="#bbccff" opacity="0.7"/>
    <circle cx="700" cy="55" r="1.1" fill="#ffffff" opacity="0.8"/>
    <circle cx="750" cy="150" r="0.7" fill="#ccddff" opacity="0.5"/>
    <circle cx="80" cy="160" r="0.9" fill="#ddeeff" opacity="0.6"/>
    <circle cx="160" cy="200" r="1.2" fill="#ffffff" opacity="0.75"/>
    <circle cx="310" cy="170" r="0.8" fill="#aabbee" opacity="0.55"/>
    <circle cx="480" cy="190" r="1.1" fill="#ffffff" opacity="0.7"/>
    <circle cx="590" cy="60" r="1.5" fill="#ffffff" opacity="0.85"/>
    <circle cx="730" cy="210" r="0.9" fill="#ccddff" opacity="0.6"/>
    <circle cx="40" cy="250" r="0.7" fill="#bbccff" opacity="0.5"/>
    <circle cx="380" cy="230" r="1" fill="#ffffff" opacity="0.65"/>
    <circle cx="670" cy="180" r="0.8" fill="#aabbee" opacity="0.55"/>
    <circle cx="770" cy="40" r="1.3" fill="#ffffff" opacity="0.9"/>
  </g>
  <!-- 큰 별 (십자형) -->
  <g filter="url(#starBlur)">
    <path d="M100 120 L101.5 118 L103 120 L101.5 122 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M100 120 L98 120 L100 120 L102 120" stroke="#ffffff" stroke-width="0.3" opacity="0.4"/>
    <path d="M450 70 L451.5 68 L453 70 L451.5 72 Z" fill="#ffffff" opacity="0.85"/>
  </g>
  <!-- 지평선 그라데이션 -->
  <rect x="0" y="400" width="800" height="200" fill="url(#horizonGrad)"/>
  <!-- 원경 언덕 실루엣 1 -->
  <path d="M0 480 Q50 430 120 450 Q200 420 280 440 Q350 410 420 430 Q500 400 580 420 Q650 405 720 425 Q770 410 800 430 L800 600 L0 600 Z" fill="url(#hillGrad1)" opacity="0.8"/>
  <!-- 원경 언덕 실루엣 2 -->
  <path d="M0 500 Q80 470 160 485 Q250 460 340 475 Q430 450 520 465 Q600 445 680 460 Q740 448 800 465 L800 600 L0 600 Z" fill="url(#hillGrad2)" opacity="0.7"/>
  <!-- 원경 나무 실루엣 -->
  <g fill="#0a1a06" opacity="0.6">
    <path d="M30 500 L35 475 L40 500 Z"/>
    <path d="M60 495 L67 465 L74 495 Z"/>
    <path d="M150 490 L157 460 L164 490 Z"/>
    <path d="M250 495 L256 470 L262 495 Z"/>
    <path d="M380 488 L386 458 L392 488 Z"/>
    <path d="M500 492 L506 465 L512 492 Z"/>
    <path d="M620 486 L627 455 L634 486 Z"/>
    <path d="M720 494 L725 472 L730 494 Z"/>
    <path d="M770 490 L776 462 L782 490 Z"/>
  </g>
</svg>