<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGoldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe44d"/>
      <stop offset="40%" stop-color="#ffc800"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <radialGradient id="starShine" cx="40%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="starEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </linearGradient>
  </defs>
  <g filter="url(#starGlow)">
    <!-- 외곽 글로우 -->
    <path d="M16 2 L19.5 11.5 L29.5 11.5 L21.5 18 L24.5 28 L16 22 L7.5 28 L10.5 18 L2.5 11.5 L12.5 11.5 Z" fill="#ffd700" opacity="0.3" transform="scale(1.05) translate(-0.8,-0.5)"/>
    <!-- 별 본체 -->
    <path d="M16 2 L19.5 11.5 L29.5 11.5 L21.5 18 L24.5 28 L16 22 L7.5 28 L10.5 18 L2.5 11.5 L12.5 11.5 Z" fill="url(#starGoldGrad)" stroke="url(#starEdge)" stroke-width="0.5"/>
    <!-- 내부 면 분할 (입체감) -->
    <path d="M16 2 L19.5 11.5 L16 14 L12.5 11.5 Z" fill="#ffe866" opacity="0.5"/>
    <path d="M16 2 L12.5 11.5 L2.5 11.5 L10.5 18 Z" fill="#eebb00" opacity="0.3"/>
    <!-- 광택 -->
    <ellipse cx="14" cy="11" rx="5" ry="4" fill="url(#starShine)"/>
    <!-- 중심 원 디테일 -->
    <circle cx="16" cy="15" r="2.5" fill="#ffdd55" stroke="#ddaa00" stroke-width="0.3" opacity="0.6"/>
  </g>
</svg>