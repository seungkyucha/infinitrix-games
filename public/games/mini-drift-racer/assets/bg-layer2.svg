<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a1e"/>
      <stop offset="100%" stop-color="#1a3a10"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="50%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="fencePostGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5335"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7a28"/>
      <stop offset="60%" stop-color="#2d5a1e"/>
      <stop offset="100%" stop-color="#1a3a10"/>
    </linearGradient>
    <radialGradient id="treeShadow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curbGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc2222"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <filter id="treeSoftShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="shadow"/>
      <feOffset dx="2" dy="4" result="offsetShadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offsetShadow" operator="in" result="shadowColored"/>
      <feMerge><feMergeNode in="shadowColored"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 잔디 배경 -->
  <rect width="800" height="600" fill="url(#grassGrad)"/>
  <!-- 잔디 텍스처 점들 -->
  <g fill="#4a7a2e" opacity="0.4">
    <circle cx="30" cy="50" r="2"/><circle cx="90" cy="80" r="1.5"/>
    <circle cx="160" cy="40" r="2.5"/><circle cx="250" cy="120" r="1.8"/>
    <circle cx="340" cy="60" r="2"/><circle cx="450" cy="100" r="2.2"/>
    <circle cx="550" cy="45" r="1.6"/><circle cx="640" cy="90" r="2.3"/>
    <circle cx="730" cy="55" r="1.9"/><circle cx="70" cy="180" r="2.1"/>
    <circle cx="200" cy="200" r="1.7"/><circle cx="380" cy="170" r="2.4"/>
    <circle cx="520" cy="210" r="1.5"/><circle cx="680" cy="160" r="2"/>
    <circle cx="100" cy="350" r="2.2"/><circle cx="300" cy="380" r="1.8"/>
    <circle cx="500" cy="340" r="2.5"/><circle cx="700" cy="370" r="2"/>
    <circle cx="150" cy="500" r="1.9"/><circle cx="400" cy="520" r="2.3"/>
    <circle cx="600" cy="480" r="1.6"/><circle cx="750" cy="530" r="2.1"/>
  </g>
  <!-- 도로 (곡선 트랙) -->
  <g opacity="0.85">
    <!-- 메인 도로 -->
    <path d="M-20 300 Q100 250 200 280 Q300 310 400 270 Q500 230 600 260 Q700 290 820 250" stroke="url(#roadGrad)" stroke-width="80" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 커브석 외곽 (빨강/흰색) -->
    <path d="M-20 300 Q100 250 200 280 Q300 310 400 270 Q500 230 600 260 Q700 290 820 250" stroke="url(#curbGradR)" stroke-width="86" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- 중앙선 (흰색 대시) -->
    <path d="M-20 300 Q100 250 200 280 Q300 310 400 270 Q500 230 600 260 Q700 290 820 250" stroke="#ffffff" stroke-width="2" fill="none" stroke-dasharray="20 15" opacity="0.7"/>
  </g>
  <!-- 나무 그룹 (트랙 옆 장식) -->
  <g filter="url(#treeSoftShadow)">
    <!-- 나무 1 -->
    <g>
      <rect x="68" y="130" width="6" height="25" rx="1" fill="url(#fencePostGrad)"/>
      <path d="M50 135 Q71 95 92 135 Q80 115 71 100 Q62 115 50 135 Z" fill="url(#treeGrad)"/>
      <path d="M55 130 Q71 100 87 130" fill="#4a8a32" opacity="0.4"/>
    </g>
    <!-- 나무 2 -->
    <g>
      <rect x="218" y="160" width="5" height="22" rx="1" fill="url(#fencePostGrad)"/>
      <path d="M202 165 Q220.5 128 239 165 Q228 148 220.5 136 Q213 148 202 165 Z" fill="url(#treeGrad)"/>
    </g>
    <!-- 나무 3 -->
    <g>
      <rect x="438" y="125" width="6" height="24" rx="1" fill="url(#fencePostGrad)"/>
      <path d="M420 130 Q441 90 462 130 Q450 112 441 98 Q432 112 420 130 Z" fill="url(#treeGrad)"/>
    </g>
    <!-- 나무 4 -->
    <g>
      <rect x="648" y="145" width="5" height="23" rx="1" fill="url(#fencePostGrad)"/>
      <path d="M633 150 Q650.5 112 668 150 Q657 134 650.5 120 Q644 134 633 150 Z" fill="url(#treeGrad)"/>
    </g>
  </g>
  <!-- 울타리 -->
  <g opacity="0.6">
    <line x1="0" y1="185" x2="800" y2="185" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="0" y1="190" x2="800" y2="190" stroke="#8B7355" stroke-width="1"/>
    <!-- 울타리 기둥 -->
    <rect x="40" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="120" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="200" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="280" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="360" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="440" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="520" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="600" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="680" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
    <rect x="760" y="178" width="4" height="16" fill="url(#fencePostGrad)"/>
  </g>
  <!-- 관중석 실루엣 -->
  <g fill="#1a3a10" opacity="0.5">
    <path d="M0 450 Q100 430 200 445 Q300 420 400 440 Q500 425 600 438 Q700 418 800 435 L800 470 L0 470 Z"/>
  </g>
  <!-- 결승선 체커보드 패턴 -->
  <g opacity="0.7" transform="translate(390, 248)">
    <rect x="0" y="0" width="6" height="6" fill="#fff"/>
    <rect x="6" y="0" width="6" height="6" fill="#000"/>
    <rect x="12" y="0" width="6" height="6" fill="#fff"/>
    <rect x="0" y="6" width="6" height="6" fill="#000"/>
    <rect x="6" y="6" width="6" height="6" fill="#fff"/>
    <rect x="12" y="6" width="6" height="6" fill="#000"/>
    <rect x="0" y="12" width="6" height="6" fill="#fff"/>
    <rect x="6" y="12" width="6" height="6" fill="#000"/>
    <rect x="12" y="12" width="6" height="6" fill="#fff"/>
  </g>
</svg>