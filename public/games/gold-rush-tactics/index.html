// SeededRNG — deterministic random (F18: Math.random 0건)
class SeededRNG {
  constructor(seed) { this.seed = seed | 0; if (this.seed === 0) this.seed = 1; }
  // xorshift32 algorithm
  next() {
    this.seed ^= this.seed << 13;
    this.seed ^= this.seed >> 17;
    this.seed ^= this.seed << 5;
    return (this.seed >>> 0) / 4294967296;
  }
  // Random int in [min, max]
  randInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); }
  // Random float in [min, max)
  randFloat(min, max) { return min + this.next() * (max - min); }
  // Pick random element from array
  pick(arr) { return arr[this.randInt(0, arr.length - 1)]; }
  // Shuffle array in place (Fisher-Yates)
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this.randInt(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
}

// Easing functions for TweenManager
const EASINGS = {
  linear: t => t,
  easeIn: t => t * t,
  easeOut: t => t * (2 - t),
  easeInOut: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
  easeInCubic: t => t * t * t,
  easeOutCubic: t => (--t) * t * t + 1,
  easeOutBack: t => { const s = 1.70158; return --t * t * ((s + 1) * t + s) + 1; },
  easeOutBounce: t => {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
    if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
    return 7.5625*(t-=2.625/2.75)*t+0.984375;
  }
};

// TweenManager — manages all animations (F4: no setTimeout, F13: clearImmediate, F14: single update path)
class TweenManager {
  constructor() { this._tweens = []; this._pendingAdd = []; this._updating = false; }

  // Add a new tween (target.prop from→to over duration ms)
  add(target, prop, from, to, duration, easing, onComplete) {
    const tw = { target, prop, from, to, duration, elapsed: 0, easing: EASINGS[easing] || EASINGS.easeOut, onComplete: onComplete || null, done: false };
    target[prop] = from;
    if (this._updating) { this._pendingAdd.push(tw); }
    else { this._tweens.push(tw); }
    return tw;
  }

  // Immediately clear all tweens (F13: no race condition with add)
  clearImmediate() {
    this._tweens.length = 0;
    this._pendingAdd.length = 0;
  }

  // Cancel a specific tween
  cancel(tw) { if (tw) tw.done = true; }

  // Update all tweens by dt milliseconds
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.done) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      const t = Math.min(tw.elapsed / tw.duration, 1);
      const e = tw.easing(t);
      tw.target[tw.prop] = tw.from + (tw.to - tw.from) * e;
      if (t >= 1) {
        tw.target[tw.prop] = tw.to;
        tw.done = true;
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
    this._updating = false;
    // Flush pending adds (F13: safe after update completes)
    if (this._pendingAdd.length > 0) {
      this._tweens.push(...this._pendingAdd);
      this._pendingAdd.length = 0;
    }
  }
}

// Particle class for visual effects
class Particle {
  constructor(x, y, vx, vy, life, color, size, gravity, fadeOut, shape) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.color = color; this.size = size;
    this.gravity = gravity || 0; this.fadeOut = fadeOut !== false;
    this.shape = shape || 'circle'; // circle, square, star, spark
    this.rotation = 0; this.rotSpeed = 0;
  }
}

// ParticleSystem — manages all particles
class ParticleSystem {
  constructor() { this.particles = []; }

  // Emit particles at a position
  emit(x, y, count, config, rng) {
    for (let i = 0; i < count; i++) {
      const angle = rng.randFloat(0, Math.PI * 2);
      const speed = rng.randFloat(config.speedMin || 20, config.speedMax || 80);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const life = rng.randFloat(config.lifeMin || 300, config.lifeMax || 800);
      const size = rng.randFloat(config.sizeMin || 2, config.sizeMax || 6);
      const color = config.colors ? rng.pick(config.colors) : config.color || PAL.gold;
      const p = new Particle(x, y, vx, vy, life, color, size, config.gravity || 50, config.fadeOut !== false, config.shape || 'circle');
      p.rotSpeed = rng.randFloat(-3, 3);
      this.particles.push(p);
    }
  }

  // Emit a directional burst
  emitBurst(x, y, count, dirAngle, spread, config, rng) {
    for (let i = 0; i < count; i++) {
      const angle = dirAngle + rng.randFloat(-spread, spread);
      const speed = rng.randFloat(config.speedMin || 40, config.speedMax || 120);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const life = rng.randFloat(config.lifeMin || 200, config.lifeMax || 600);
      const size = rng.randFloat(config.sizeMin || 2, config.sizeMax || 5);
      const color = config.colors ? rng.pick(config.colors) : PAL.gold;
      const p = new Particle(x, y, vx, vy, life, color, size, config.gravity || 30, true, config.shape || 'spark');
      this.particles.push(p);
    }
  }

  // Update all particles by dt seconds
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      p.rotation += p.rotSpeed * dt;
      p.life -= dt * 1000;
      if (p.life <= 0) { this.particles.splice(i, 1); }
    }
  }

  // Render all particles (pure function pattern: receives ctx)
  render(ctx) {
    for (const p of this.particles) {
      const alpha = p.fadeOut ? Math.max(0, p.life / p.maxLife) : 1;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'square') {
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      } else if (p.shape === 'star') {
        drawStar(ctx, 0, 0, p.size, 5);
      } else if (p.shape === 'spark') {
        ctx.beginPath();
        ctx.moveTo(-p.size, 0); ctx.lineTo(p.size, 0);
        ctx.moveTo(0, -p.size); ctx.lineTo(0, p.size);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // Clear all particles
  clear() { this.particles.length = 0; }
}

// SoundManager — Web Audio API procedural sounds (F19)
class SoundManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.bgmGain = null;
    this.sfxGain = null;
    this.enabled = true;
    this._bgmOsc = null;
    this._bgmTimer = null;
    this._currentBgm = '';
  }

  // Initialize audio context on first user interaction
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.4;
      this.masterGain.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = 0.25;
      this.bgmGain.connect(this.masterGain);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.5;
      this.sfxGain.connect(this.masterGain);
    } catch(e) { this.enabled = false; }
  }

  // Play a procedural SFX (§12.2)
  playSfx(name) {
    if (!this.ctx || !this.enabled) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const t = this.ctx.currentTime;
    switch(name) {
      case 'block_place': this._sweep(440, 220, 0.1, 'square', t); break;
      case 'row_clear': this._sweep(523, 1047, 0.3, 'sine', t); break;
      case 'combo': this._sweep(660, 1320, 0.4, 'triangle', t); this._sweep(880, 1540, 0.35, 'triangle', t + 0.05); break;
      case 'gold_nugget': this._sparkle(880, 1760, 0.5, t); break;
      case 'rock_break': this._sweep(100, 50, 0.2, 'sawtooth', t); break;
      case 'dynamite': this._explosion(t); break;
      case 'boss_appear': this._sweep(60, 30, 1.5, 'sawtooth', t); break;
      case 'boss_hit': this._sweep(350, 700, 0.15, 'square', t); break;
      case 'boss_defeat': this._arpeggio([261.6, 329.6, 392, 523.3], 0.25, t); break;
      case 'game_over': this._sweep(440, 110, 1.2, 'sine', t); break;
      case 'build_complete': this._arpeggio([329.6, 392, 523.3], 0.17, t); break;
      case 'upgrade': this._arpeggio([523.3, 784, 1047], 0.2, t); break;
      case 'ui_click': this._sweep(600, 800, 0.05, 'sine', t); break;
      case 'vein_bonus': this._sparkle(1047, 2093, 0.7, t); break;
    }
  }

  // Frequency sweep SFX
  _sweep(f1, f2, dur, type, t) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(f1, t); osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain); gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + dur + 0.01);
  }

  // Sparkle effect (sine with vibrato)
  _sparkle(f1, f2, dur, t) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const vibrato = this.ctx.createOscillator();
    const vibGain = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(f1, t); osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    vibrato.frequency.value = 15; vibGain.gain.value = 30;
    vibrato.connect(vibGain); vibGain.connect(osc.frequency);
    gain.gain.setValueAtTime(0.25, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain); gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + dur + 0.01);
    vibrato.start(t); vibrato.stop(t + dur + 0.01);
  }

  // Explosion noise burst
  _explosion(t) {
    const bufferSize = this.ctx.sampleRate * 0.6;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let s = 12345; // deterministic noise seed
    for (let i = 0; i < bufferSize; i++) {
      s ^= s << 13; s ^= s >> 17; s ^= s << 5;
      data[i] = ((s >>> 0) / 2147483648 - 1) * Math.exp(-i / (bufferSize * 0.15));
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.setValueAtTime(800, t); filter.frequency.exponentialRampToValueAtTime(80, t + 0.6);
    gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    src.connect(filter); filter.connect(gain); gain.connect(this.sfxGain);
    src.start(t); src.stop(t + 0.61);
  }

  // Arpeggio (ascending notes)
  _arpeggio(freqs, gap, t) {
    freqs.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t + i * gap);
      gain.gain.linearRampToValueAtTime(0.25, t + i * gap + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * gap + gap + 0.1);
      osc.connect(gain); gain.connect(this.sfxGain);
      osc.start(t + i * gap); osc.stop(t + i * gap + gap + 0.11);
    });
  }

  // Start BGM loop (procedural)
  startBgm(name) {
    if (!this.ctx || !this.enabled || this._currentBgm === name) return;
    this.stopBgm();
    this._currentBgm = name;
    this._bgmLoop(name);
  }

  // BGM loop using oscillators
  _bgmLoop(name) {
    if (!this.ctx || this._currentBgm !== name) return;
    const t = this.ctx.currentTime;
    const notes = this._getBgmNotes(name);
    if (!notes || notes.length === 0) return;
    let totalDur = 0;
    notes.forEach((note, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = note.type || 'sine';
      osc.frequency.value = note.freq;
      const start = t + note.time;
      const dur = note.dur || 0.3;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(note.vol || 0.15, start + 0.02);
      gain.gain.setValueAtTime(note.vol || 0.15, start + dur * 0.7);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
      osc.connect(gain); gain.connect(this.bgmGain);
      osc.start(start); osc.stop(start + dur + 0.01);
      if (note.time + dur > totalDur) totalDur = note.time + dur;
    });
    // Schedule next loop iteration via tween (no setTimeout! F4)
    this._bgmLoopDur = totalDur;
    this._bgmStartTime = t;
  }

  // Get BGM note sequences
  _getBgmNotes(name) {
    const Am = [220, 261.6, 329.6, 392, 440, 523.3, 659.3];
    const Dm = [293.7, 349.2, 440, 523.3, 587.3, 698.5, 880];
    const C  = [261.6, 329.6, 392, 523.3, 659.3, 784, 1047];
    switch(name) {
      case 'title_bgm': return this._genMelody(Am, 80, 4, 'sine');
      case 'mine_bgm':  return this._genMelody(Dm, 100, 4, 'triangle');
      case 'boss_bgm':  return this._genMelody(Am, 140, 4, 'sawtooth');
      case 'town_bgm':  return this._genMelody(C, 72, 4, 'sine');
      case 'shop_bgm':  return this._genMelody(C, 90, 3, 'triangle');
      case 'gameover_bgm': return this._genMelody(Am, 60, 2, 'sine');
      default: return [];
    }
  }

  // Generate a simple repeating melody
  _genMelody(scale, bpm, bars, type) {
    const beatDur = 60 / bpm;
    const notes = [];
    const pattern = [0, 2, 4, 3, 1, 4, 2, 0]; // simple arp pattern
    for (let bar = 0; bar < bars; bar++) {
      for (let beat = 0; beat < 4; beat++) {
        const idx = (bar * 4 + beat) % pattern.length;
        const noteIdx = pattern[idx] % scale.length;
        notes.push({
          freq: scale[noteIdx],
          time: (bar * 4 + beat) * beatDur,
          dur: beatDur * 0.8,
          type: type,
          vol: 0.12
        });
        // Bass note every 2 beats
        if (beat % 2 === 0) {
          notes.push({
            freq: scale[0] / 2,
            time: (bar * 4 + beat) * beatDur,
            dur: beatDur * 1.5,
            type: 'sine',
            vol: 0.08
          });
        }
      }
    }
    return notes;
  }

  // Stop BGM
  stopBgm() { this._currentBgm = ''; }

  // Check if BGM needs to loop (called from game loop — no setTimeout!)
  checkBgmLoop() {
    if (!this.ctx || !this._currentBgm || !this._bgmStartTime) return;
    if (this.ctx.currentTime >= this._bgmStartTime + this._bgmLoopDur - 0.1) {
      this._bgmLoop(this._currentBgm);
    }
  }
}

/* =======================================================================
   REGION 3: RENDERING UTILITIES (pure functions — F9)
   ======================================================================= */

// Draw a 5-pointed star at center (x,y) with given radius
function drawStar(ctx, x, y, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.4;
    const px = x + Math.cos(angle) * radius;
    const py = y + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

// Draw text with glow effect
function drawGlowText(ctx, text, x, y, font, color, glowColor, glowSize) {
  ctx.save();
  ctx.font = font;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = glowColor || color;
  ctx.shadowBlur = glowSize || 10;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Draw a rounded rectangle
function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

// Draw a progress bar
function drawProgressBar(ctx, x, y, w, h, ratio, fgColor, bgColor, borderColor) {
  drawRoundRect(ctx, x, y, w, h, 4, bgColor || '#333', borderColor || '#555');
  if (ratio > 0) {
    const fill = Math.min(ratio, 1) * (w - 4);
    drawRoundRect(ctx, x + 2, y + 2, fill, h - 4, 3, fgColor || PAL.success, null);
  }
}

// Draw a button (returns bounds for hitTest)
function drawButton(ctx, x, y, w, h, text, font, bgColor, textColor, hovered) {
  const hover = hovered ? 4 : 0;
  drawRoundRect(ctx, x - hover, y - hover, w + hover * 2, h + hover * 2, 8, bgColor, hovered ? PAL.gold : '#555');
  ctx.font = font;
  ctx.fillStyle = textColor || PAL.uiText;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w/2, y + h/2);
  return { x: x - hover, y: y - hover, w: w + hover * 2, h: h + hover * 2 };
}

// Draw wood plank texture for a cell
function drawWoodCell(ctx, x, y, size) {
  ctx.fillStyle = '#6B4226';
  ctx.fillRect(x, y, size, size);
  ctx.strokeStyle = '#5C3A1E';
  ctx.lineWidth = 0.5;
  // Wood grain lines
  for (let i = 0; i < 4; i++) {
    const ly = y + size * 0.2 + i * size * 0.2;
    ctx.beginPath();
    ctx.moveTo(x + 2, ly);
    ctx.lineTo(x + size - 2, ly + 1);
    ctx.stroke();
  }
  // Border
  ctx.strokeStyle = PAL.gridLine;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
}

// Draw ore crystal
function drawOre(ctx, x, y, size, oreType, time) {
  const cx = x + size/2;
  const cy = y + size/2;
  const r = size * 0.3;
  const sparkle = Math.sin(time * 3 + x + y) * 0.2 + 0.8;
  let color;
  switch(oreType) {
    case CELL_GOLD_ORE: color = PAL.gold; break;
    case CELL_SILVER_ORE: color = PAL.silver; break;
    case CELL_COPPER_ORE: color = PAL.copper; break;
    default: color = '#888';
  }
  ctx.save();
  ctx.globalAlpha = sparkle;
  // Crystal shape (hexagon)
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = i * Math.PI / 3 - Math.PI / 6;
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Inner highlight
  ctx.beginPath();
  ctx.arc(cx - r*0.2, cy - r*0.2, r*0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();
  ctx.restore();
}

// Draw gold vein cell with pulsing glow
function drawVein(ctx, x, y, size, time) {
  const cx = x + size/2;
  const cy = y + size/2;
  const pulse = Math.sin(time * 4) * 0.3 + 0.7;
  ctx.save();
  ctx.shadowColor = PAL.veinGlow;
  ctx.shadowBlur = 15 * pulse;
  ctx.fillStyle = PAL.veinGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
  // Star highlight
  ctx.fillStyle = '#fff';
  drawStar(ctx, cx, cy, size * 0.15, 4);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Draw obstacle (rock, water, gas)
function drawObstacle(ctx, x, y, size, type, time) {
  const cx = x + size/2;
  const cy = y + size/2;
  switch(type) {
    case CELL_ROCK: {
      // Jagged polygon
      ctx.fillStyle = PAL.rock;
      ctx.beginPath();
      ctx.moveTo(x + size*0.2, y + size*0.8);
      ctx.lineTo(x + size*0.1, y + size*0.5);
      ctx.lineTo(x + size*0.3, y + size*0.2);
      ctx.lineTo(x + size*0.6, y + size*0.15);
      ctx.lineTo(x + size*0.85, y + size*0.3);
      ctx.lineTo(x + size*0.9, y + size*0.65);
      ctx.lineTo(x + size*0.7, y + size*0.85);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    }
    case CELL_WATER: {
      // Animated water waves
      ctx.fillStyle = PAL.water;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#6CA6CD';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const waveY = cy - size*0.15 + i * size*0.2;
        ctx.beginPath();
        for (let wx = 0; wx <= size; wx += 2) {
          const wy = waveY + Math.sin(time * 3 + wx * 0.1 + i) * 3;
          if (wx === 0) ctx.moveTo(x + wx, wy); else ctx.lineTo(x + wx, wy);
        }
        ctx.stroke();
      }
      break;
    }
    case CELL_GAS: {
      // Green gas particles
      ctx.fillStyle = PAL.gas;
      ctx.globalAlpha = 0.4 + Math.sin(time * 2) * 0.2;
      ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
      ctx.globalAlpha = 0.6;
      for (let i = 0; i < 5; i++) {
        const gx = cx + Math.sin(time * 2 + i * 1.3) * size * 0.25;
        const gy = cy + Math.cos(time * 1.5 + i * 0.9) * size * 0.25;
        ctx.beginPath();
        ctx.arc(gx, gy, size * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    }
  }
}

// Draw placed block cell
function drawPlacedCell(ctx, x, y, size) {
  ctx.fillStyle = PAL.placed;
  ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
  ctx.strokeStyle = '#A07020';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 1.5, y + 1.5, size - 3, size - 3);
}

// Draw block preview (ghost) on grid
function drawBlockPreview(ctx, cells, gridX, gridY, cellSize, offsetX, offsetY, valid) {
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = valid ? 'rgba(50,205,50,0.5)' : 'rgba(220,50,50,0.5)';
  for (const [cx, cy] of cells) {
    const px = offsetX + (gridX + cx) * cellSize;
    const py = offsetY + (gridY + cy) * cellSize;
    ctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
  }
  ctx.globalAlpha = 1;
}

// Draw a block piece (in hand/selection panel)
function drawBlockPiece(ctx, cells, x, y, cellSize, color, selected, hovered) {
  ctx.save();
  if (selected) {
    ctx.shadowColor = PAL.gold;
    ctx.shadowBlur = 12;
  } else if (hovered) {
    ctx.shadowColor = PAL.uiAccent;
    ctx.shadowBlur = 6;
  }
  ctx.fillStyle = color || PAL.placed;
  for (const [cx, cy] of cells) {
    ctx.fillRect(x + cx * cellSize + 1, y + cy * cellSize + 1, cellSize - 2, cellSize - 2);
    ctx.strokeStyle = '#A07020';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + cx * cellSize + 1.5, y + cy * cellSize + 1.5, cellSize - 3, cellSize - 3);
  }
  ctx.restore();
}

// Draw parallax sky gradient based on region
function drawSkyGradient(ctx, w, h, region, time) {
  const r = REGION_DEFS[Math.min(region, REGION_DEFS.length) - 1] || REGION_DEFS[0];
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  // Subtle time-of-day shift
  const shift = Math.sin(time * 0.1) * 0.1;
  grad.addColorStop(0, r.skyTop);
  grad.addColorStop(0.5 + shift, r.skyBot);
  grad.addColorStop(1, PAL.bgDark);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// Draw mountain/desert silhouette (parallax layer 1)
function drawMountains(ctx, w, h, scrollX, region) {
  const baseY = h * 0.45;
  ctx.fillStyle = region <= 2 ? '#3B2F2F' : region <= 4 ? '#5C4033' : '#4A2040';
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = -50; x <= w + 50; x += 30) {
    const nx = x + scrollX * 0.3;
    const peak = Math.sin(nx * 0.005) * h * 0.15 + Math.sin(nx * 0.013) * h * 0.08;
    ctx.lineTo(x, baseY - peak);
  }
  ctx.lineTo(w + 50, h);
  ctx.closePath();
  ctx.fill();
}

// Draw closer terrain (parallax layer 2)
function drawTerrain(ctx, w, h, scrollX, region) {
  const baseY = h * 0.6;
  ctx.fillStyle = region <= 2 ? '#4A3728' : region <= 4 ? '#6B4226' : '#3A1A3A';
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = -30; x <= w + 30; x += 20) {
    const nx = x + scrollX * 0.6;
    const hill = Math.sin(nx * 0.008) * h * 0.08 + Math.sin(nx * 0.02) * h * 0.04;
    ctx.lineTo(x, baseY - hill);
  }
  ctx.lineTo(w + 30, h);
  ctx.closePath();
  ctx.fill();
  // Cacti / rocks
  for (let x = 50; x < w; x += 200) {
    const nx = (x + scrollX * 0.6) % (w + 100);
    if (region <= 3) {
      // Cactus
      ctx.fillStyle = PAL.cactusGreen;
      ctx.fillRect(nx - 3, baseY - 25, 6, 25);
      ctx.fillRect(nx - 12, baseY - 18, 9, 5);
      ctx.fillRect(nx + 3, baseY - 22, 9, 5);
    }
  }
}

// Draw the 8x8 grid
function drawGrid(ctx, grid, cellSize, offsetX, offsetY, time, clearingRows, clearingCols, clearAnim) {
  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      const x = offsetX + col * cellSize;
      const y = offsetY + row * cellSize;
      const cell = grid[row][col];
      // Check if this cell is in clearing animation
      const isClearing = (clearingRows && clearingRows.includes(row)) || (clearingCols && clearingCols.includes(col));
      if (isClearing && clearAnim < 1) {
        ctx.save();
        ctx.globalAlpha = 1 - clearAnim;
        const scale = 1 - clearAnim * 0.5;
        ctx.translate(x + cellSize/2, y + cellSize/2);
        ctx.scale(scale, scale);
        ctx.translate(-(x + cellSize/2), -(y + cellSize/2));
      }
      // Draw cell background
      drawWoodCell(ctx, x, y, cellSize);
      // Draw cell content
      switch(cell) {
        case CELL_GOLD_ORE:
        case CELL_SILVER_ORE:
        case CELL_COPPER_ORE:
          drawOre(ctx, x, y, cellSize, cell, time);
          break;
        case CELL_ROCK:
        case CELL_WATER:
        case CELL_GAS:
          drawObstacle(ctx, x, y, cellSize, cell, time);
          break;
        case CELL_VEIN:
          drawVein(ctx, x, y, cellSize, time);
          break;
        case CELL_PLACED:
          drawPlacedCell(ctx, x, y, cellSize);
          break;
      }
      if (isClearing && clearAnim < 1) ctx.restore();
    }
  }
}

// Draw resource icon + count in HUD
function drawResourceHUD(ctx, x, y, type, amount, iconSize) {
  const colors = { gold: PAL.gold, silver: PAL.silver, copper: PAL.copper };
  const color = colors[type] || '#fff';
  // Icon circle
  ctx.beginPath();
  ctx.arc(x + iconSize/2, y + iconSize/2, iconSize/2 - 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Inner symbol
  ctx.fillStyle = '#333';
  ctx.font = `bold ${iconSize * 0.5}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(type === 'gold' ? 'G' : type === 'silver' ? 'S' : 'C', x + iconSize/2, y + iconSize/2);
  // Amount
  ctx.fillStyle = PAL.uiText;
  ctx.font = `bold ${iconSize * 0.6}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(amount.toString(), x + iconSize + 4, y + iconSize/2);
}

// Draw score popup animation
function drawScorePopup(ctx, x, y, text, color, progress) {
  const alpha = 1 - progress;
  const yOffset = -30 * progress;
  const scale = 1 + progress * 0.3;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${18 * scale}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color || PAL.gold;
  ctx.shadowColor = color || PAL.gold;
  ctx.shadowBlur = 8;
  ctx.fillText(text, x, y + yOffset);
  ctx.restore();
}

// Draw screen shake offset
function getShakeOffset(intensity, time) {
  if (intensity <= 0) return { x: 0, y: 0 };
  return {
    x: Math.sin(time * 37) * intensity,
    y: Math.cos(time * 43) * intensity
  };
}

// Draw player character (miner figure with pickaxe)
function drawPlayer(ctx, x, y, size, pose, time) {
  ctx.save();
  // Body
  ctx.fillStyle = PAL.dustBrown;
  ctx.fillRect(x - size*0.15, y - size*0.35, size*0.3, size*0.45);
  // Head
  ctx.fillStyle = PAL.warmSand;
  ctx.beginPath();
  ctx.arc(x, y - size*0.4, size*0.15, 0, Math.PI * 2);
  ctx.fill();
  // Hat

  ctx.fillRect(x - size*0.2, y - size*0.55, size*0.4, size*0.08);
  ctx.fillRect(x - size*0.12, y - size*0.65, size*0.24, size*0.12);

  ctx.lineWidth = 2;
  const swing = Math.sin(time * 4) * 0.3;
  ctx.save();
  ctx.translate(x + size*0.2, y - size*0.15);
  ctx.rotate(-0.5 + swing);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size*0.3, -size*0.3);
  ctx.stroke();
  ctx.fillStyle = '#999';
  ctx.fillRect(size*0.22, -size*0.38, size*0.15, size*0.08);

// Draw heart icon for lives (Canvas procedural)
function drawHeartIcon(ctx, x, y, size, filled) {
  ctx.save();
  ctx.fillStyle = filled ? PAL.dangerRed : '#555';
  const cx = x + size/2;
  const cy = y + size * 0.4;
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(cx, cy + r * 1.8);
  ctx.bezierCurveTo(cx - r*2.5, cy, cx - r*2.5, cy - r*2, cx, cy - r*0.8);
  ctx.bezierCurveTo(cx + r*2.5, cy - r*2, cx + r*2.5, cy, cx, cy + r * 1.8);

// Draw star icon for score (gold 5-pointed star)

// Draw effect hit at position (radial burst)
function drawEffectHit(ctx, x, y, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, size/2);
  grad.addColorStop(0, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.3, 'rgba(255,215,0,0.5)');
  grad.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, size/2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Draw powerup icon (3 dynamite sticks with fuse spark)
function drawPowerup(ctx, x, y, size) {
  ctx.save();
  const stickW = size * 0.08;
  const stickH = size * 0.4;
  // Three red cylindrical sticks
  for (let i = -1; i <= 1; i++) {
    const sx = x + i * stickW * 1.6;
    const sy = y - stickH * 0.3;
    // Stick body
    ctx.fillStyle = '#CC2222';
    ctx.fillRect(sx - stickW/2, sy, stickW, stickH);
    // Stick highlight
    ctx.fillStyle = 'rgba(255,100,100,0.5)';
    ctx.fillRect(sx - stickW/2, sy, stickW * 0.35, stickH);
    // Stick cap
    ctx.fillStyle = '#AA1111';
    ctx.fillRect(sx - stickW*0.6, sy, stickW*1.2, stickH*0.1);
  }
  // Binding tape
  ctx.fillStyle = PAL.gold;
  ctx.fillRect(x - stickW * 2.2, y, stickW * 4.4, stickH * 0.08);
  // Fuse (curved line from center stick top)
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y - stickH * 0.3);
  ctx.quadraticCurveTo(x + size*0.12, y - stickH * 0.55, x + size*0.05, y - stickH * 0.7);
  ctx.stroke();
  // Fuse spark (animated glow)
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FFA500';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(x + size*0.05, y - stickH * 0.7, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Outer spark particles
  ctx.fillStyle = '#FFE';
  ctx.beginPath();
  ctx.arc(x + size*0.05 - 3, y - stickH * 0.74, 1.5, 0, Math.PI * 2);
  ctx.arc(x + size*0.05 + 4, y - stickH * 0.68, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Initialize transAlpha proxy (F28 — Cycle 36 proven pattern)
G._transProxy = new Proxy({ alpha: 0 }, {
  set(target, prop, value) {
    target[prop] = value;
    if (prop === 'alpha') G.transAlpha = value;
    return true;
  }
});

// Begin state transition using TRANSITION_TABLE + G._transProxy (F6/F21/F23/F28)
function beginTransition(from, to, onEnter) {
  const key = from + '→' + to;
  if (!TRANSITION_TABLE[key]) {
    console.error('[FSM] Invalid transition:', key);
    return false;
  }
  if (G._transitioning) return false; // Guard flag (F5)
  G._transitioning = true;
  const cfg = TRANSITION_TABLE[key];
  // Phase 1: fade out (alpha 0→1) via proxy — auto-syncs G.transAlpha
  tw.add(G._transProxy, 'alpha', 0, 1, cfg.duration / 2, cfg.easing, () => {
    if (onEnter) onEnter();
    G.state = to;
    // Phase 2: fade in (alpha 1→0) via same proxy
    tw.add(G._transProxy, 'alpha', 1, 0, cfg.duration / 2, cfg.easing, () => {
      G._transitioning = false; // Guard release
    });
  });
  return true;
}

// Initialize empty grid (F12 — INIT_EMPTY pattern)
function INIT_EMPTY_GRID() {
  const grid = [];
  for (let r = 0; r < GRID_ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_COLS; c++) {
      grid[r][c] = CELL_EMPTY;

  return grid;
}

/* =======================================================================
   REGION 6: PUZZLE ENGINE
   ======================================================================= */

// Generate mine grid for a stage (§10.1)
function generateMineGrid(seed, stage, ddaLevel) {
  const rng = new SeededRNG(seed + stage * 137);
  let grid = INIT_EMPTY_GRID();
  let obstRatio = OBSTACLE_RATIO(stage);
  // DDA adjustment
  if (ddaLevel === 0) obstRatio *= DDA_EASY_OBSTACLE_MULT;
  if (ddaLevel === 2) obstRatio *= DDA_HARD_OBSTACLE_MULT;
  const obstCount = Math.floor(TOTAL_CELLS * Math.min(obstRatio, 0.33));
  const veinCount = GOLD_VEIN_COUNT(stage);
  // Place obstacles
  const allCells = [];
  for (let r = 0; r < GRID_ROWS; r++)
    for (let c = 0; c < GRID_COLS; c++)
      allCells.push([r, c]);
  rng.shuffle(allCells);
  let placed = 0;
  for (const [r, c] of allCells) {
    if (placed >= obstCount) break;
    const types = [CELL_ROCK, CELL_ROCK, CELL_ROCK, CELL_WATER, CELL_GAS];
    grid[r][c] = rng.pick(types);
    placed++;
  }
  // Place gold veins on empty cells
  let veinsPlaced = 0;
  for (const [r, c] of allCells) {
    if (veinsPlaced >= veinCount) break;
    if (grid[r][c] === CELL_EMPTY) {
      grid[r][c] = CELL_VEIN;
      veinsPlaced++;
    }
  }
  // Place ores on remaining empty cells
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (grid[r][c] === CELL_EMPTY) {
        const roll = rng.next();
        if (roll < 0.15) grid[r][c] = CELL_GOLD_ORE;
        else if (roll < 0.50) grid[r][c] = CELL_SILVER_ORE;
        else if (roll < 1.0) grid[r][c] = CELL_COPPER_ORE;
      }
    }
  }
  // Validate: at least 1 row or col can be cleared
  if (!validateGrid(grid)) {
    // Retry with different seed (max 10 attempts)
    for (let attempt = 1; attempt <= 10; attempt++) {
      grid = generateMineGrid(seed + attempt * 1000, stage, ddaLevel);
      // Recursive call returns valid grid
      return grid;
    }
  }
  return grid;
}

// Validate grid has at least one clearable row/column (§10.2 — BFS reachability)
function validateGrid(grid) {
  for (let r = 0; r < GRID_ROWS; r++) {
    let nonObs = 0;
    for (let c = 0; c < GRID_COLS; c++) {
      if (grid[r][c] !== CELL_ROCK && grid[r][c] !== CELL_WATER && grid[r][c] !== CELL_GAS) nonObs++;
    }
    if (nonObs >= 6) return true; // Row is mostly clear
  }
  for (let c = 0; c < GRID_COLS; c++) {
    let nonObs = 0;
    for (let r = 0; r < GRID_ROWS; r++) {
      if (grid[r][c] !== CELL_ROCK && grid[r][c] !== CELL_WATER && grid[r][c] !== CELL_GAS) nonObs++;
    }
    if (nonObs >= 6) return true; // Col is mostly clear
  }
  return false;
}

// Generate 3 random blocks for current hand
function generateBlocks(rng, stage) {
  updateUnlockedBlocks();
  const blocks = [];
  const count = getBuildingEffect('saloon') ? 4 : 3;
  for (let i = 0; i < count; i++) {
    const def = rng.pick(G.unlockedBlocks);
    blocks.push({ id: def.id, cells: [...def.cells], placed: false });
  }
  return blocks;
}

// Check if a block can be placed at gridX, gridY
function canPlaceBlock(grid, cells, gridX, gridY) {
  for (const [cx, cy] of cells) {
    const r = gridY + cy;
    const c = gridX + cx;
    if (r < 0 || r >= GRID_ROWS || c < 0 || c >= GRID_COLS) return false;
    const cell = grid[r][c];
    // Can only place on ore cells or empty-like cells (not obstacles or already placed)
    if (cell === CELL_ROCK || cell === CELL_WATER || cell === CELL_GAS || cell === CELL_PLACED) return false;
  }
  return true;
}

// Place a block on the grid
function placeBlock(grid, cells, gridX, gridY) {
  const affectedCells = [];
  for (const [cx, cy] of cells) {
    const r = gridY + cy;
    const c = gridX + cx;
    affectedCells.push({ r, c, prevType: grid[r][c] });
    grid[r][c] = CELL_PLACED;
  }
  return affectedCells;
}

// Check completed rows and columns
function checkCompletedLines(grid) {
  const rows = [];
  const cols = [];
  // Check rows
  for (let r = 0; r < GRID_ROWS; r++) {
    let complete = true;
    for (let c = 0; c < GRID_COLS; c++) {
      const cell = grid[r][c];
      if (cell !== CELL_PLACED && cell !== CELL_ROCK && cell !== CELL_WATER && cell !== CELL_GAS) {
        complete = false;
        break;
      }
    }
    if (complete) rows.push(r);
  }
  // Check cols
  for (let c = 0; c < GRID_COLS; c++) {
    let complete = true;
    for (let r = 0; r < GRID_ROWS; r++) {
      const cell = grid[r][c];
      if (cell !== CELL_PLACED && cell !== CELL_ROCK && cell !== CELL_WATER && cell !== CELL_GAS) {
        complete = false;
        break;
      }
    }
    if (complete) cols.push(c);
  }
  return { rows, cols };
}

// Calculate resources from cleared lines
function calculateClearReward(grid, rows, cols, affectedCells) {
  let goldEarned = 0, silverEarned = 0, copperEarned = 0;
  let veinBonus = false;
  const clearedCells = new Set();
  // Gather all cells in cleared lines
  for (const r of rows) {
    for (let c = 0; c < GRID_COLS; c++) clearedCells.add(r * GRID_COLS + c);
  }
  for (const c of cols) {
    for (let r = 0; r < GRID_ROWS; r++) clearedCells.add(r * GRID_COLS + c);
  }
  // Count resources from affected cells (what was there before placement)
  for (const ac of affectedCells) {
    const key = ac.r * GRID_COLS + ac.c;
    if (clearedCells.has(key)) {
      switch(ac.prevType) {
        case CELL_GOLD_ORE: goldEarned += 3; break;
        case CELL_SILVER_ORE: silverEarned += 2; break;
        case CELL_COPPER_ORE: copperEarned += 1; break;
        case CELL_VEIN: goldEarned += 10; veinBonus = true; break;
      }
    }
  }
  // Also count existing ore/vein in cleared lines that weren't just placed
  for (const key of clearedCells) {
    const r = Math.floor(key / GRID_COLS);
    const c = key % GRID_COLS;
    const cell = grid[r][c];
    // Already placed cells were counted above via affectedCells
    // We need to count ores that were there from grid generation
    if (!affectedCells.some(ac => ac.r === r && ac.c === c)) {
      // These cells should already be PLACED or obstacle
      // Skip — they're already processed
    }
  }
  // Combo multiplier
  const totalLines = rows.length + cols.length;
  const comboMult = COMBO_MULT[Math.min(totalLines, 4)] || COMBO_MULT[4];
  // Tool bonus (pickaxe adds to clear)
  const pickLv = G.tools.pickaxe;
  const toolBonus = pickLv >= 5 ? 1 : pickLv >= 3 ? 0 : pickLv >= 2 ? 0 : 0;
  const toolSilver = pickLv >= 3 ? 1 : 0;
  const toolCopper = pickLv >= 2 ? 1 : 0;
  goldEarned = Math.floor(goldEarned * comboMult) + toolBonus * totalLines;
  silverEarned = Math.floor(silverEarned * comboMult) + toolSilver * totalLines;
  copperEarned = Math.floor(copperEarned * comboMult) + toolCopper * totalLines;
  // Apply DPS cap and synergy cap
  const baseGold = Math.floor((goldEarned - toolBonus * totalLines) / Math.max(comboMult, 1));
  if (goldEarned > baseGold * DPS_CAP) goldEarned = Math.floor(baseGold * DPS_CAP);
  // Score
  const scoreEarned = totalLines * 100 * comboMult + (veinBonus ? 500 : 0);
  return { goldEarned, silverEarned, copperEarned, scoreEarned, comboMult, totalLines, veinBonus };
}

// Clear completed rows and columns from grid
function clearLines(grid, rows, cols) {
  for (const r of rows) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (grid[r][c] === CELL_PLACED) grid[r][c] = CELL_EMPTY;
    }
  }
  for (const c of cols) {
    for (let r = 0; r < GRID_ROWS; r++) {
      if (grid[r][c] === CELL_PLACED) grid[r][c] = CELL_EMPTY;
    }
  }
}

// Check if any remaining blocks can be placed
function canAnyBlockBePlaced(grid, blocks) {
  for (let i = 0; i < blocks.length; i++) {
    if (blocks[i].placed) continue;
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        if (canPlaceBlock(grid, blocks[i].cells, c, r)) return true;
      }
    }
  }
  return false;
}

// Check if all blocks in hand are placed
function allBlocksPlaced(blocks) {
  return blocks.every(b => b.placed);
}

// Get building effect active state
function getBuildingEffect(name) {
  const lv = G.buildings[name] || 0;
  return lv > 0;
}

// Get building level
function getBuildingLevel(name) {
  return G.buildings[name] || 0;
}

// Check if stage target is met
function isStageTargetMet(stage) {
  return G.stageGold >= STAGE_TARGET(stage);
}

/* =======================================================================
   REGION 7: TOWN / BUILDING SYSTEM
   ======================================================================= */

// Check if player can afford building
function canAffordBuilding(name) {
  const lv = getBuildingLevel(name);
  const def = BUILDING_DEFS[name];
  if (!def || lv >= def.maxLv) return false;
  const cost = def.cost[lv];
  return G.gold >= (cost.g || 0) && G.silver >= (cost.s || 0) && G.copper >= (cost.c || 0);
}

// Build/upgrade a building
function buildBuilding(name) {
  const lv = getBuildingLevel(name);
  const def = BUILDING_DEFS[name];
  if (!def || lv >= def.maxLv) return false;
  if (!canAffordBuilding(name)) return false;
  const cost = def.cost[lv];
  G.gold -= (cost.g || 0);
  G.silver -= (cost.s || 0);
  G.copper -= (cost.c || 0);
  G.buildings[name] = lv + 1;
  // Special effects
  if (name === 'coach' && G.buildings[name] > G.unlockedRegions) {
    G.unlockedRegions = G.buildings[name];
  }
  saveProgress();
  return true;
}

// Check if player can afford tool upgrade
function canAffordTool(toolName) {
  const lv = G.tools[toolName];
  if (lv >= 5) return false;
  const costs = TOOL_COSTS[toolName];
  if (!costs || lv >= costs.length) return false;
  const cost = costs[lv];
  return G.gold >= (cost.g || 0) && G.silver >= (cost.s || 0) && G.copper >= (cost.c || 0);
}

// Upgrade a tool
function upgradeTool(toolName) {
  const lv = G.tools[toolName];
  if (lv >= 5 || !canAffordTool(toolName)) return false;
  const cost = TOOL_COSTS[toolName][lv];
  G.gold -= (cost.g || 0);
  G.silver -= (cost.s || 0);
  G.copper -= (cost.c || 0);
  G.tools[toolName] = lv + 1;
  saveProgress();
  return true;
}

// Use pickaxe on an obstacle cell
function usePickaxe(grid, row, col) {
  const cell = grid[row][col];
  if (cell !== CELL_ROCK && cell !== CELL_WATER && cell !== CELL_GAS) return false;
  const lv = G.tools.pickaxe;
  if (lv <= 0) return false;
  // Check if obstacle can be broken at current level
  if (cell === CELL_WATER && lv < 4) return false;
  if (cell === CELL_GAS && lv < 5) return false;
  grid[row][col] = CELL_EMPTY;
  return true;
}

// Use dynamite on a 3x3 or 5x5 area
function useDynamite(grid, row, col) {
  const lv = G.tools.dynamite;
  if (lv <= 0 || G.dynamiteUses <= 0) return false;
  const range = lv >= 3 ? 2 : 1; // 5x5 or 3x3
  let cleared = 0;
  for (let dr = -range; dr <= range; dr++) {
    for (let dc = -range; dc <= range; dc++) {
      const r = row + dr;
      const c = col + dc;
      if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
        const cell = grid[r][c];
        if (cell === CELL_ROCK || cell === CELL_WATER || cell === CELL_GAS) {
          grid[r][c] = CELL_EMPTY;
          cleared++;
        }
      }
    }
  }
  if (cleared > 0) G.dynamiteUses--;
  return cleared > 0;
}

// Apply bank interest on stage clear
function applyBankInterest() {
  const lv = getBuildingLevel('bank');
  if (lv > 0) {
    const interest = Math.floor(G.gold * 0.05 * lv);
    G.gold += interest;
    return interest;
  }
  return 0;
}

// Get starting boost item from store
function getStoreBoost(rng) {
  const lv = getBuildingLevel('store');
  if (lv <= 0) return null;
  const boosts = ['extraBlock', 'revealVein', 'removeObstacle'];
  return rng.pick(boosts);
}

/* =======================================================================
   REGION 8: BOSS SYSTEM
   ======================================================================= */

// Generate boss weakness pattern (§7.2)
function generateBossPattern(bossIdx, rng) {
  const cells = [];
  switch(bossIdx) {
    case 0: // Billy the Kid — 2x4 line
      for (let c = 2; c <= 5; c++) cells.push([3, c]);
      for (let c = 2; c <= 5; c++) cells.push([4, c]);
      break;
    case 1: // Black Bart — 2 L-shapes
      cells.push([1,2],[2,2],[3,2],[3,3]); // L1
      cells.push([4,4],[5,4],[6,4],[6,5]); // L2
      break;
    case 2: // Jesse James — Cross (+)
      for (let r = 2; r <= 5; r++) cells.push([r, 3]);
      for (let c = 1; c <= 5; c++) if (c !== 3) cells.push([3, c]);
      break;
    case 3: { // Wild Bunch — border 1 row
      for (let c = 0; c < 8; c++) cells.push([0, c]);
      for (let c = 0; c < 8; c++) cells.push([7, c]);
      for (let r = 1; r < 7; r++) { cells.push([r, 0]); cells.push([r, 7]); }
      break;
    }
    case 4: { // Golden Ghost — T + L + line
      cells.push([1,2],[1,3],[1,4],[2,3]); // T
      cells.push([4,1],[5,1],[6,1],[6,2]); // L
      cells.push([4,5],[4,6],[4,7]); // line
      break;
    }
  }
  return cells;
}

// Start boss fight
function startBossFight(bossIdx) {
  G.isBossFight = true;
  G.bossIdx = bossIdx;
  const region = BOSS_DEFS[bossIdx].region;
  G.bossMaxHP = BOSS_HP(region);
  G.bossHP = G.bossMaxHP;
  G.bossMaxTime = BOSS_TIME(region);
  // Sheriff office bonus
  const sheriffLv = getBuildingLevel('sheriff');
  G.bossMaxTime += sheriffLv * 5;
  G.bossTimer = G.bossMaxTime;
  G.grid = INIT_EMPTY_GRID();
  G.bossWeakCells = generateBossPattern(bossIdx, new SeededRNG(bossIdx * 777 + G.runCount));
  G.bossSpecialTimer = 0;
  // Mark weak cells on grid
  for (const [r, c] of G.bossWeakCells) {
    if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
      G.grid[r][c] = CELL_EMPTY; // weak cells are targetable
    }
  }
  // Generate blocks
  const rng = new SeededRNG(bossIdx * 999 + G.runCount);
  G.blocks = generateBlocks(rng, G.currentStage);
  G.selectedBlock = -1;
  sound.playSfx('boss_appear');
}

// Update boss timer and special attacks
function updateBoss(dt) {
  if (!G.isBossFight) return;
  G.bossTimer -= dt;
  G.bossSpecialTimer += dt;
  // Boss special ability every 5 seconds
  const boss = BOSS_DEFS[G.bossIdx];
  if (G.bossSpecialTimer >= 5) {
    G.bossSpecialTimer = 0;
    applyBossSpecial(boss.special);
  }
  // Time up — boss wins
  if (G.bossTimer <= 0) {
    G.bossTimer = 0;
    bossFailed();
  }
}

// Apply boss special ability
function applyBossSpecial(special) {
  const rng = new SeededRNG(Math.floor(G.bossTimer * 100));
  switch(special) {
    case 'destroy': {
      // Destroy random placed cell
      const placed = [];
      for (let r = 0; r < GRID_ROWS; r++)
        for (let c = 0; c < GRID_COLS; c++)
          if (G.grid[r][c] === CELL_PLACED) placed.push([r, c]);
      if (placed.length > 0) {
        const [r, c] = rng.pick(placed);
        G.grid[r][c] = CELL_EMPTY;
        G.shakeIntensity = 5;
      }
      break;
    }
    case 'fog': break; // Fog is visual only, handled in render
    case 'morph': {
      // Transform one block in hand
      if (G.blocks.length > 0) {
        const idx = rng.randInt(0, G.blocks.length - 1);
        if (!G.blocks[idx].placed) {
          const newDef = rng.pick(G.unlockedBlocks);
          G.blocks[idx] = { id: newDef.id, cells: [...newDef.cells], placed: false };
        }
      }
      break;
    }
    case 'multi': break; // Multiple targets — already handled in pattern
    case 'rotate': {
      // Rotate grid 90 degrees
      const newGrid = INIT_EMPTY_GRID();
      for (let r = 0; r < GRID_ROWS; r++)
        for (let c = 0; c < GRID_COLS; c++)
          newGrid[c][GRID_ROWS - 1 - r] = G.grid[r][c];
      G.grid = newGrid;
      // Rotate weak cells
      G.bossWeakCells = G.bossWeakCells.map(([r, c]) => [c, GRID_ROWS - 1 - r]);
      G.shakeIntensity = 8;
      break;
    }
  }
}

// Boss hit — check placed cells on weak spots
function checkBossHits() {
  let hits = 0;
  for (const [r, c] of G.bossWeakCells) {
    if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
      if (G.grid[r][c] === CELL_PLACED) hits++;
    }
  }
  const pickBonus = Math.min(G.tools.pickaxe * 0.5, DPS_CAP - 1);
  const totalDmg = Math.floor(hits * (1 + pickBonus));
  if (totalDmg > 0) {
    G.bossHP = Math.max(0, G.bossHP - totalDmg);
    sound.playSfx('boss_hit');
  }
  if (G.bossHP <= 0) {
    bossDefeated();
  }
}

// Boss defeated
function bossDefeated() {
  G.isBossFight = false;
  const boss = BOSS_DEFS[G.bossIdx];
  // Reward (F17: guard flag)
  if (!G.bossRewardGiven[G.bossIdx]) {
    G.bossRewardGiven[G.bossIdx] = true;
    G.gold += boss.rewardGold;
    G.score += 1000 * boss.region;
    addPopup(canvas.width / 2, canvas.height / 2, '+' + boss.rewardGold + ' Gold!', PAL.gold);
  }
  sound.playSfx('boss_defeat');
  G.shakeIntensity = 15;
  saveProgress();
  // Advance to next stage / region
  advanceStage();
}

// Boss failed — penalty
function bossFailed() {
  G.isBossFight = false;
  G.gold = Math.floor(G.gold * 0.5);
  G.silver = Math.floor(G.silver * 0.5);
  G.copper = Math.floor(G.copper * 0.5);
  G.lives--;
  G.consecutiveFails++;
  G.consecutiveClears = 0;
  sound.playSfx('game_over');
  G.shakeIntensity = 20;
  if (G.lives <= 0) {
    triggerGameOver();
  } else {
    // Return to map
    beginTransition(STATE.PUZZLE, STATE.MAP, () => {
      sound.startBgm('town_bgm');
    });
  }
}

/* =======================================================================
   REGION 9: DDA (Dynamic Difficulty Adjustment)
   ======================================================================= */

// Update DDA level based on performance (§8.2)
function updateDDA() {
  if (G.consecutiveFails >= 2) {
    G.ddaLevel = 0; // Easy
  } else if (G.consecutiveClears >= 3) {
    G.ddaLevel = 2; // Hard
  } else {
    G.ddaLevel = 1; // Normal
  }
}

// Get DDA adjusted obstacle count bonus
function getDDAObstacleAdj() {
  if (G.ddaLevel === 0) return DDA_EASY_OBSTACLE_MULT;
  if (G.ddaLevel === 2) return DDA_HARD_OBSTACLE_MULT;
  return 1.0;
}

// Get DDA adjusted boss time bonus
function getDDABossTimeAdj() {
  return G.ddaLevel === 0 ? 10 : 0;
}

// Get DDA block count bonus
function getDDABlockBonus() {
  return G.ddaLevel === 0 ? 1 : 0;
}

   REGION 10: SOUND DEFINITIONS (procedural)
