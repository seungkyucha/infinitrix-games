// Sound manager instance (initialized on first interaction)
const sound = new SoundManager();

/* =======================================================================
   REGION 11: INITIALIZATION & MAIN LOOP
   ======================================================================= */

// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, dpr = 1;

// Engine instances
const tw = new TweenManager();
const particles = new ParticleSystem();
const gameRng = new SeededRNG(Date.now() | 0); // Only for non-gameplay visuals

// Input state
const keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false, mouseClicked = false;
let touchX = 0, touchY = 0;

// Resize canvas (devicePixelRatio aware)
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  G.isMobile = W < 768;
  calculateLayout();
}

// Calculate layout positions based on screen size
function calculateLayout() {
  const gridMaxW = G.isMobile ? W - 20 : Math.min(W * 0.55, 520);
  const cellSize = Math.floor(gridMaxW / GRID_COLS);
  const gridW = cellSize * GRID_COLS;
  const gridH = cellSize * GRID_ROWS;
  const gridX = G.isMobile ? (W - gridW) / 2 : W * 0.05;
  const gridY = G.isMobile ? 60 : Math.max(60, (H - gridH - 100) / 2);
  const panelX = G.isMobile ? 10 : gridX + gridW + 20;
  const panelY = G.isMobile ? gridY + gridH + 10 : gridY;
  const panelW = G.isMobile ? W - 20 : W - panelX - 20;
  G.layout = { cellSize, gridW, gridH, gridX, gridY, panelX, panelY, panelW };
}

// hitTest — single function for all click/touch (F16)
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// Add a score popup
function addPopup(x, y, text, color) {
  G.popups.push({ x, y, text, color, time: 0, maxTime: 1.2 });
}

// Add a hit effect
function addHitEffect(x, y) {
  G.hitEffects.push({ x, y, time: 0, maxTime: 0.5 });
}

// Get localized text
function t(key) {
  return LANG[G.lang][key] || LANG.en[key] || key;
}

// ===== Stage management =====

// Start a new puzzle stage
function startStage(stage) {
  G.currentStage = stage;
  G.currentRegion = Math.ceil(stage / 3);
  updateDDA();
  const seed = G.runCount * 10000 + stage;
  G.grid = generateMineGrid(seed, stage, G.ddaLevel);
  const rng = new SeededRNG(seed + 42);
  G.blocks = generateBlocks(rng, stage);
  G.selectedBlock = -1;
  G.cursorX = 3;
  G.cursorY = 3;
  G.stageGold = 0;
  G.stageSilver = 0;
  G.stageCopper = 0;
  G.comboStreak = 0;
  G.clearingRows = null;
  G.clearingCols = null;
  G.clearAnim = 1;
  G.dynamiteUses = getDynamiteUses();
  G.isBossFight = false;
  G.scrollX = 0;
  particles.clear();
  updateUnlockedBlocks();
  sound.startBgm('mine_bgm');
}

// Advance to next stage after clear
function advanceStage() {
  const nextStage = G.currentStage + 1;
  if (nextStage > 15) {
    // Game complete!
    G.score += 5000;
    checkHighScore();
    beginTransition(STATE.PUZZLE, STATE.GAMEOVER, () => {
      sound.startBgm('gameover_bgm');
    });
    return;
  }
  // Check if boss fight needed (every 3rd stage = boss of that region)
  if (G.currentStage % 3 === 0 && !G.isBossFight) {
    const bossIdx = Math.floor((G.currentStage - 1) / 3);
    if (bossIdx < BOSS_DEFS.length) {
      startBossFight(bossIdx);
      return;
    }
  }
  // Go to map to choose next action
  beginTransition(STATE.PUZZLE, STATE.MAP, () => {
    sound.startBgm('town_bgm');
  });
}

// Trigger stage clear
function stageClear() {
  G.consecutiveClears++;
  G.consecutiveFails = 0;
  G.score += 200; // Perfect clear bonus
  const interest = applyBankInterest();
  if (interest > 0) addPopup(W/2, H/2 + 40, '+' + interest + ' Gold (Bank)', PAL.gold);
  sound.playSfx('row_clear');
  G.shakeIntensity = 3;
  G.totalGold += G.stageGold;
  checkHighScore();
  saveProgress();
  advanceStage();
}

// Trigger game over
function triggerGameOver() {
  // Check revival (church)
  if (!G.revivalUsed && getBuildingLevel('church') > 0) {
    G.revivalUsed = true;
    G.lives = 1;
    addPopup(W/2, H/2, t('revival'), PAL.success);
    sound.playSfx('build_complete');
    return;
  }
  checkHighScore();
  saveProgress();
  beginTransition(G.state, STATE.GAMEOVER, () => {
    sound.startBgm('gameover_bgm');
    G.shakeIntensity = 20;
  });
}

// Check and save high score (F8: check first, save after)
function checkHighScore() {
  const isNew = G.score > G.highScore;
  if (isNew) {
    G.highScore = G.score;
  }
  saveProgress();
  return isNew;
}

// ===== Puzzle input handling =====

// Handle block selection (keyboard: 1/2/3)
function selectBlock(idx) {
  if (idx >= 0 && idx < G.blocks.length && !G.blocks[idx].placed) {
    G.selectedBlock = idx;
    sound.playSfx('ui_click');
  }
}

// Handle block placement at current cursor position
function attemptPlacement() {
  if (G.selectedBlock < 0 || G.selectedBlock >= G.blocks.length) return;
  const block = G.blocks[G.selectedBlock];
  if (block.placed) return;
  if (!canPlaceBlock(G.grid, block.cells, G.cursorX, G.cursorY)) {
    G.shakeIntensity = 3;
    sound.playSfx('rock_break');
    return;
  }
  // Place the block
  const affected = placeBlock(G.grid, block.cells, G.cursorX, G.cursorY);
  block.placed = true;
  G.selectedBlock = -1;
  G.score += 10;
  sound.playSfx('block_place');
  // Emit dust particles at placement
  const layout = G.layout;
  for (const [cx, cy] of block.cells) {
    const px = layout.gridX + (G.cursorX + cx) * layout.cellSize + layout.cellSize/2;
    const py = layout.gridY + (G.cursorY + cy) * layout.cellSize + layout.cellSize/2;
    particles.emit(px, py, 5, {
      speedMin: 10, speedMax: 40, lifeMin: 200, lifeMax: 500,
      colors: [PAL.dustBrown, PAL.warmSand, '#A0703C'],
      sizeMin: 1, sizeMax: 3, gravity: 40, shape: 'circle'
    }, gameRng);
  }
  // Boss fight — check hits
  if (G.isBossFight) {
    checkBossHits();
    if (G.bossHP <= 0) return; // Boss defeated, skip further checks
  }
  // Check completed lines
  const { rows, cols } = checkCompletedLines(G.grid);
  if (rows.length > 0 || cols.length > 0) {
    // Start clearing animation
    G.clearingRows = rows;
    G.clearingCols = cols;
    G.clearAnim = 0;
    // Calculate rewards
    const reward = calculateClearReward(G.grid, rows, cols, affected);
    G.gold += reward.goldEarned;
    G.silver += reward.silverEarned;
    G.copper += reward.copperEarned;
    G.stageGold += reward.goldEarned;
    G.score += reward.scoreEarned;
    G.comboStreak++;
    // Popup
    const layout2 = G.layout;
    addPopup(layout2.gridX + layout2.gridW/2, layout2.gridY + layout2.gridH/2,
      '+' + reward.goldEarned + 'G +' + reward.silverEarned + 'S',
      reward.veinBonus ? PAL.veinGlow : PAL.gold);
    if (reward.totalLines >= 2) {
      addPopup(layout2.gridX + layout2.gridW/2, layout2.gridY + layout2.gridH/2 - 30,
        t('combo') + ' x' + reward.comboMult, PAL.warmSand);
      sound.playSfx('combo');
    } else {
      sound.playSfx('row_clear');
    }
    if (reward.veinBonus) {
      addPopup(layout2.gridX + layout2.gridW/2, layout2.gridY + layout2.gridH/2 + 30,
        t('veinBonus'), PAL.veinGlow);
      sound.playSfx('vein_bonus');
    }
    // Tween clear animation (F4: no setTimeout)
    const animObj = { v: 0 };
    tw.add(animObj, 'v', 0, 1, 400, 'easeOutCubic', () => {
      clearLines(G.grid, rows, cols);
      G.clearingRows = null;
      G.clearingCols = null;
      G.clearAnim = 1;
      // Particle burst for cleared lines
      for (const r of rows) {
        const cy = layout2.gridY + r * layout2.cellSize + layout2.cellSize/2;
        particles.emit(layout2.gridX + layout2.gridW/2, cy, 15, {
          speedMin: 30, speedMax: 100, lifeMin: 300, lifeMax: 700,
          colors: [PAL.gold, PAL.warmSand, '#FFF'],
          sizeMin: 2, sizeMax: 5, gravity: 30, shape: 'star'
        }, gameRng);
      }
      for (const c of cols) {
        const cx = layout2.gridX + c * layout2.cellSize + layout2.cellSize/2;
        particles.emit(cx, layout2.gridY + layout2.gridH/2, 15, {
          speedMin: 30, speedMax: 100, lifeMin: 300, lifeMax: 700,
          colors: [PAL.gold, PAL.warmSand, '#FFF'],
          sizeMin: 2, sizeMax: 5, gravity: 30, shape: 'star'
        }, gameRng);
      }
      // Check stage target
      if (!G.isBossFight && isStageTargetMet(G.currentStage)) {
        stageClear();
        return;
      }
      // Check if all blocks placed — generate new set
      if (allBlocksPlaced(G.blocks)) {
        const seed = G.runCount * 10000 + G.currentStage * 100 + G.comboStreak;
        const rng = new SeededRNG(seed);
        G.blocks = generateBlocks(rng, G.currentStage);
        G.selectedBlock = -1;
      }
      // Check game over condition
      if (!canAnyBlockBePlaced(G.grid, G.blocks)) {
        G.lives--;
        if (G.lives <= 0) {
          triggerGameOver();
        } else {
          addPopup(W/2, H/2, t('mineCollapsed'), PAL.dangerRed);
          G.consecutiveFails++;
          G.consecutiveClears = 0;
          beginTransition(STATE.PUZZLE, STATE.MAP, () => {
            sound.startBgm('town_bgm');
          });
        }
      }
    });
    // Sync clear anim (use a frame-update approach)
    G._clearAnimObj = animObj;
  } else {
    // No lines cleared
    G.comboStreak = 0;
    // Check if all blocks placed
    if (allBlocksPlaced(G.blocks)) {
      const seed = G.runCount * 10000 + G.currentStage * 100 + G.comboStreak + 1;
      const rng = new SeededRNG(seed);
      G.blocks = generateBlocks(rng, G.currentStage);
      G.selectedBlock = -1;
    }
    // Check game over
    if (!canAnyBlockBePlaced(G.grid, G.blocks)) {
      G.lives--;
      if (G.lives <= 0) {
        triggerGameOver();
      } else {
        addPopup(W/2, H/2, t('mineCollapsed'), PAL.dangerRed);
        G.consecutiveFails++;
        beginTransition(STATE.PUZZLE, STATE.MAP, () => {
          sound.startBgm('town_bgm');
        });
      }
    }
  }
}

// Convert mouse/touch position to grid cell
function screenToGrid(sx, sy) {
  const l = G.layout;
  if (!l) return { col: -1, row: -1 };
  const col = Math.floor((sx - l.gridX) / l.cellSize);
  const row = Math.floor((sy - l.gridY) / l.cellSize);
  return { col, row };
}

// ===== INPUT HANDLERS =====

// Keyboard (keydown with preventDefault for game keys)
window.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD',
       'KeyP','KeyR','Digit1','Digit2','Digit3','Digit4','KeyQ','KeyE','Escape','Tab','Enter'].includes(e.code)) {
    e.preventDefault();
  }
  keys[e.code] = true;

  // Initialize audio on first interaction
  sound.init();

  switch(G.state) {
    case STATE.TITLE:
      if (e.code === 'Space' || e.code === 'Enter') {
        startNewRun();
      }
      if (e.code === 'KeyL') { // Toggle language
        G.lang = G.lang === 'ko' ? 'en' : 'ko';
        saveProgress();
      }
      break;

    case STATE.PUZZLE:
      if (G.paused) {
        if (e.code === 'Escape' || e.code === 'KeyP') G.paused = false;
        break;
      }
      if (e.code === 'Escape' || e.code === 'KeyP') {
        G.paused = true;
        break;
      }
      if (e.code === 'Digit1') selectBlock(0);
      if (e.code === 'Digit2') selectBlock(1);
      if (e.code === 'Digit3') selectBlock(2);
      if (e.code === 'Digit4' && G.blocks.length > 3) selectBlock(3);
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') G.cursorX = Math.max(0, G.cursorX - 1);
      if (e.code === 'ArrowRight' || e.code === 'KeyD') G.cursorX = Math.min(GRID_COLS - 1, G.cursorX + 1);
      if (e.code === 'ArrowUp' || e.code === 'KeyW') G.cursorY = Math.max(0, G.cursorY - 1);
      if (e.code === 'ArrowDown' || e.code === 'KeyS') G.cursorY = Math.min(GRID_ROWS - 1, G.cursorY + 1);
      if (e.code === 'Space' || e.code === 'Enter') attemptPlacement();
      if (e.code === 'KeyR') { G.selectedBlock = -1; }
      if (e.code === 'KeyQ') {
        // Use pickaxe on cursor cell
        if (usePickaxe(G.grid, G.cursorY, G.cursorX)) {
          sound.playSfx('rock_break');
          addHitEffect(G.layout.gridX + G.cursorX * G.layout.cellSize + G.layout.cellSize/2,
                       G.layout.gridY + G.cursorY * G.layout.cellSize + G.layout.cellSize/2);
        }
      }
      if (e.code === 'KeyE') {
        // Use dynamite on cursor cell
        if (useDynamite(G.grid, G.cursorY, G.cursorX)) {
          sound.playSfx('dynamite');
          G.shakeIntensity = 10;
          addHitEffect(G.layout.gridX + G.cursorX * G.layout.cellSize + G.layout.cellSize/2,
                       G.layout.gridY + G.cursorY * G.layout.cellSize + G.layout.cellSize/2);
        }
      }
      break;

    case STATE.MAP:
      if (e.code === 'Space' || e.code === 'Enter') {
        // Enter next mine
        const nextStage = G.currentStage + 1 <= 15 ? G.currentStage + 1 : G.currentStage;
        beginTransition(STATE.MAP, STATE.PUZZLE, () => {
          startStage(nextStage);
        });
      }
      if (e.code === 'Tab') {
        e.preventDefault();
        beginTransition(STATE.MAP, STATE.SHOP, () => {
          sound.startBgm('shop_bgm');
        });
      }
      if (e.code === 'Escape') {
        beginTransition(STATE.MAP, STATE.SHOP, () => {
          sound.startBgm('shop_bgm');
        });
      }
      break;

    case STATE.SHOP:
      if (e.code === 'Escape' || e.code === 'Tab') {
        beginTransition(STATE.SHOP, STATE.MAP, () => {
          sound.startBgm('town_bgm');
        });
      }
      if (e.code === 'Digit1') { if (upgradeTool('pickaxe')) sound.playSfx('upgrade'); }
      if (e.code === 'Digit2') { if (upgradeTool('dynamite')) sound.playSfx('upgrade'); }
      if (e.code === 'Digit3') { if (upgradeTool('survey')) sound.playSfx('upgrade'); }
      break;

    case STATE.GAMEOVER:
      if (e.code === 'KeyR' || e.code === 'Space') {
        beginTransition(STATE.GAMEOVER, STATE.TITLE, () => {
          sound.startBgm('title_bgm');
        });
      }
      break;
  }
});

window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mouse handling
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  mouseClicked = true;
  sound.init();
  handlePointerDown(mouseX, mouseY);
});

canvas.addEventListener('mouseup', e => {
  mouseDown = false;
  handlePointerUp(mouseX, mouseY);
});

// Touch handling
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  sound.init();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = touch.clientX - rect.left;
  touchY = touch.clientY - rect.top;
  mouseX = touchX;
  mouseY = touchY;
  G.touchActive = true;
  mouseClicked = true;
  handlePointerDown(touchX, touchY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = touch.clientX - rect.left;
  touchY = touch.clientY - rect.top;
  mouseX = touchX;
  mouseY = touchY;
  handlePointerMove(touchX, touchY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  G.touchActive = false;
  handlePointerUp(touchX, touchY);
}, { passive: false });

// Unified pointer handlers
function handlePointerDown(px, py) {
  const l = G.layout;
  if (!l) return;

  switch(G.state) {
    case STATE.TITLE:
      startNewRun();
      break;

    case STATE.PUZZLE: {
      if (G.paused) {
        // Check resume/quit buttons
        const resumeRect = { x: W/2 - 80, y: H/2, w: 160, h: 48 };
        if (hitTest(px, py, resumeRect)) {
          G.paused = false;
          sound.playSfx('ui_click');
        }
        const quitRect = { x: W/2 - 80, y: H/2 + 60, w: 160, h: 48 };
        if (hitTest(px, py, quitRect)) {
          beginTransition(STATE.PUZZLE, STATE.MAP, () => {
            G.paused = false;
            sound.startBgm('town_bgm');
          });
        }
        break;
      }
      // Check if clicking on a block in the selection panel
      const blockPanelY = G.isMobile ? l.gridY + l.gridH + 15 : l.panelY + 60;
      const blockSize = Math.max(MIN_TOUCH_TARGET, l.cellSize * 0.8);
      for (let i = 0; i < G.blocks.length; i++) {
        if (G.blocks[i].placed) continue;
        const bx = G.isMobile ? l.panelX + i * (blockSize * 5 + 10) : l.panelX + 10;
        const by = G.isMobile ? blockPanelY : blockPanelY + i * (blockSize * 5 + 15);
        const blockRect = { x: bx, y: by, w: blockSize * 5, h: blockSize * 5 };
        if (hitTest(px, py, blockRect)) {
          selectBlock(i);
          G.dragging = true;
          G.dragBlockIdx = i;
          break;
        }
      }
      // Check if clicking on grid
      const gridRect = { x: l.gridX, y: l.gridY, w: l.gridW, h: l.gridH };
      if (hitTest(px, py, gridRect)) {
        const { col, row } = screenToGrid(px, py);
        if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
          G.cursorX = col;
          G.cursorY = row;
          if (G.selectedBlock >= 0) {
            attemptPlacement();
          }
        }
      }
      // Pause button
      const pauseRect = { x: W - 50, y: 5, w: 44, h: 44 };
      if (hitTest(px, py, pauseRect)) {
        G.paused = true;
        sound.playSfx('ui_click');
      }
      // Tool buttons (mobile)
      if (G.isMobile) {
        const toolY = blockPanelY + 70;
        const pickRect = { x: 10, y: toolY, w: 60, h: 48 };
        const dynRect = { x: 80, y: toolY, w: 60, h: 48 };
        if (hitTest(px, py, pickRect)) {
          const { col, row } = screenToGrid(l.gridX + G.cursorX * l.cellSize + l.cellSize/2,
                                              l.gridY + G.cursorY * l.cellSize + l.cellSize/2);
          if (usePickaxe(G.grid, G.cursorY, G.cursorX)) {
            sound.playSfx('rock_break');
          }
        }
        if (hitTest(px, py, dynRect)) {
          if (useDynamite(G.grid, G.cursorY, G.cursorX)) {
            sound.playSfx('dynamite');
            G.shakeIntensity = 10;
          }
        }
      }
      break;
    }

    case STATE.MAP: {
      // Check building buttons
      const buildingNames = Object.keys(BUILDING_DEFS);
      const bw = Math.min(180, (W - 40) / 2);
      const bh = Math.max(MIN_TOUCH_TARGET, 50);
      for (let i = 0; i < buildingNames.length; i++) {
        const col = i % 2;
        const row = Math.floor(i / 2);
        const bx = 20 + col * (bw + 10);
        const by = 120 + row * (bh + 10);
        if (hitTest(px, py, { x: bx, y: by, w: bw, h: bh })) {
          if (buildBuilding(buildingNames[i])) {
            sound.playSfx('build_complete');
            addPopup(bx + bw/2, by, t('build') + '!', PAL.success);
          } else {
            addPopup(bx + bw/2, by, t('insufficient'), PAL.dangerRed);
          }
          break;
        }
      }
      // Enter mine button
      const enterRect = { x: W/2 - 100, y: H - 80, w: 200, h: Math.max(MIN_TOUCH_TARGET, 50) };
      if (hitTest(px, py, enterRect)) {
        const nextStage = Math.min(G.currentStage + 1, 15);
        beginTransition(STATE.MAP, STATE.PUZZLE, () => {
          startStage(nextStage);
        });
      }
      // Shop button
      const shopRect = { x: W - 120, y: 10, w: 100, h: Math.max(MIN_TOUCH_TARGET, 40) };
      if (hitTest(px, py, shopRect)) {
        beginTransition(STATE.MAP, STATE.SHOP, () => {
          sound.startBgm('shop_bgm');
        });
      }
      break;
    }

    case STATE.SHOP: {
      // Tool upgrade buttons
      const toolNames = ['pickaxe', 'dynamite', 'survey'];
      const tw2 = Math.min(260, W - 40);
      const th2 = Math.max(MIN_TOUCH_TARGET, 60);
      for (let i = 0; i < toolNames.length; i++) {
        const ty = 130 + i * (th2 + 15);
        if (hitTest(px, py, { x: W/2 - tw2/2, y: ty, w: tw2, h: th2 })) {
          if (upgradeTool(toolNames[i])) {
            sound.playSfx('upgrade');
            addPopup(W/2, ty, t('upgrade') + '!', PAL.success);
          } else {
            addPopup(W/2, ty, t('insufficient'), PAL.dangerRed);
          }
          break;
        }
      }
      // Back button
      const backRect = { x: 20, y: 10, w: 100, h: Math.max(MIN_TOUCH_TARGET, 40) };
      if (hitTest(px, py, backRect)) {
        beginTransition(STATE.SHOP, STATE.MAP, () => {
          sound.startBgm('town_bgm');
        });
      }
      break;
    }

    case STATE.GAMEOVER:
      beginTransition(STATE.GAMEOVER, STATE.TITLE, () => {
        sound.startBgm('title_bgm');
      });
      break;
  }
}

function handlePointerMove(px, py) {
  if (G.state === STATE.PUZZLE && G.dragging && G.selectedBlock >= 0) {
    const { col, row } = screenToGrid(px, py);
    if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
      G.cursorX = col;
      G.cursorY = row;
    }
  }
}

function handlePointerUp(px, py) {
  if (G.state === STATE.PUZZLE && G.dragging && G.selectedBlock >= 0) {
    const { col, row } = screenToGrid(px, py);
    if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
      G.cursorX = col;
      G.cursorY = row;
      attemptPlacement();
    }
    G.dragging = false;
  }
}

// Start a new game run
function startNewRun() {
  resetRunState();
  beginTransition(STATE.TITLE, STATE.MAP, () => {
    sound.startBgm('town_bgm');
  });
}

// Window resize listener
window.addEventListener('resize', resizeCanvas);

// ===== RENDERING =====

// Render title screen
function renderTitle(time) {
  // Background — dark desert sky
  drawSkyGradient(ctx, W, H, 1, time);
  // Parallax mountains (procedural — no assets)
  drawMountains(ctx, W, H, time * 15, 1);
  drawTerrain(ctx, W, H, time * 30, 1);
  // Dust particles
  if (particles.particles.length < 30) {
    particles.emit(gameRng.randFloat(0, W), H, 1, {
      speedMin: 5, speedMax: 20, lifeMin: 2000, lifeMax: 5000,
      colors: ['rgba(210,168,67,0.3)', 'rgba(139,94,52,0.2)'],
      sizeMin: 1, sizeMax: 4, gravity: -10, shape: 'circle'
    }, gameRng);
  }
  // Title text with gold glow
  const titleY = H * 0.28;
  const pulse = Math.sin(time * 2) * 3;
  ctx.save();
  // Title shadow
  ctx.font = `bold ${G.isMobile ? 28 : 48}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = PAL.gold;
  ctx.shadowBlur = 20 + pulse;
  ctx.fillStyle = PAL.gold;
  ctx.fillText(t('title'), W/2, titleY);
  ctx.shadowBlur = 0;
  // Subtitle
  ctx.font = `${G.isMobile ? 14 : 20}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiAccent;
  ctx.fillText(t('subtitle'), W/2, titleY + (G.isMobile ? 30 : 45));
  // Decorative line
  ctx.strokeStyle = PAL.gold;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - 120, titleY + (G.isMobile ? 50 : 70));
  ctx.lineTo(W/2 + 120, titleY + (G.isMobile ? 50 : 70));
  ctx.stroke();
  ctx.globalAlpha = 1;
  // Character
  const playerY = H * 0.55;
  drawPlayer(ctx, W * 0.35, playerY, G.isMobile ? 80 : 120, 'idle', time);
  drawEnemy(ctx, W * 0.65, playerY, G.isMobile ? 80 : 120, 0, time);
  // Grid preview (small)
  const previewSize = G.isMobile ? 12 : 18;
  const previewX = W/2 - previewSize * 4;
  const previewY = playerY + (G.isMobile ? 60 : 80);
  ctx.globalAlpha = 0.6;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const isGold = (r + c) % 5 === 0;
      ctx.fillStyle = isGold ? PAL.gold : PAL.bgMedium;
      ctx.fillRect(previewX + c * previewSize, previewY + r * previewSize, previewSize - 1, previewSize - 1);
    }
  }
  ctx.globalAlpha = 1;
  // Start prompt (blinking)
  const blink = Math.sin(time * 3) > 0;
  if (blink) {
    ctx.font = `bold ${G.isMobile ? 16 : 22}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.fillText(t('start'), W/2, H * 0.88);
  }
  // High score
  if (G.highScore > 0) {
    ctx.font = `${G.isMobile ? 12 : 16}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiAccent;
    ctx.fillText(t('highScore') + ': ' + G.highScore, W/2, H * 0.93);
  }
  // Language toggle
  ctx.font = `12px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiAccent;
  ctx.textAlign = 'right';
  ctx.fillText('[L] ' + (G.lang === 'ko' ? 'EN' : 'KO'), W - 15, 20);
  ctx.restore();
}

// Render puzzle screen
function renderPuzzle(time, dt) {
  const l = G.layout;
  if (!l) return;
  const region = G.currentRegion;
  // Background
  drawSkyGradient(ctx, W, H, region, time);
  drawMountains(ctx, W, H, G.scrollX, region);
  drawTerrain(ctx, W, H, G.scrollX, region);
  G.scrollX += dt * 8;
  // Grid
  if (G._clearAnimObj) G.clearAnim = G._clearAnimObj.v;
  drawGrid(ctx, G.grid, l.cellSize, l.gridX, l.gridY, time, G.clearingRows, G.clearingCols, G.clearAnim);
  // Block preview on grid
  if (G.selectedBlock >= 0 && G.selectedBlock < G.blocks.length && !G.blocks[G.selectedBlock].placed) {
    const block = G.blocks[G.selectedBlock];
    const valid = canPlaceBlock(G.grid, block.cells, G.cursorX, G.cursorY);
    drawBlockPreview(ctx, block.cells, G.cursorX, G.cursorY, l.cellSize, l.gridX, l.gridY, valid);
  }
  // Cursor highlight
  ctx.strokeStyle = PAL.gold;
  ctx.lineWidth = 2;
  ctx.strokeRect(l.gridX + G.cursorX * l.cellSize, l.gridY + G.cursorY * l.cellSize, l.cellSize, l.cellSize);
  // Boss weak cells overlay
  if (G.isBossFight) {
    ctx.globalAlpha = 0.4 + Math.sin(time * 5) * 0.2;
    ctx.strokeStyle = PAL.bossWarn;
    ctx.lineWidth = 2;
    for (const [r, c] of G.bossWeakCells) {
      if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
        ctx.strokeRect(l.gridX + c * l.cellSize + 2, l.gridY + r * l.cellSize + 2, l.cellSize - 4, l.cellSize - 4);
      }
    }
    ctx.globalAlpha = 1;
    // Boss fog effect
    if (BOSS_DEFS[G.bossIdx] && BOSS_DEFS[G.bossIdx].special === 'fog') {
      ctx.fillStyle = 'rgba(50,50,80,0.35)';
      ctx.fillRect(l.gridX, l.gridY, l.gridW, l.gridH / 2);
    }
  }
  // HUD — top bar
  ctx.fillStyle = 'rgba(20,10,5,0.7)';
  ctx.fillRect(0, 0, W, 50);
  // Stage info
  ctx.font = `bold ${G.isMobile ? 12 : 16}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiText;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const regionDef = REGION_DEFS[region - 1] || REGION_DEFS[0];
  const regionName = G.lang === 'ko' ? regionDef.nameKo : regionDef.nameEn;
  ctx.fillText(t('stage') + ' ' + G.currentStage + ' — ' + regionName, 10, 18);
  // Resources
  const iconS = G.isMobile ? 18 : 22;
  drawResourceHUD(ctx, G.isMobile ? 10 : 10, 30, 'gold', G.gold, iconS);
  drawResourceHUD(ctx, G.isMobile ? 80 : 100, 30, 'silver', G.silver, iconS);
  drawResourceHUD(ctx, G.isMobile ? 150 : 190, 30, 'copper', G.copper, iconS);
  // Score
  drawStarIcon(ctx, W - (G.isMobile ? 100 : 150), 5, 20);
  ctx.font = `bold ${G.isMobile ? 14 : 18}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.gold;
  ctx.textAlign = 'right';
  ctx.fillText(G.score.toString(), W - 10, 18);
  // Lives
  for (let i = 0; i < G.maxLives; i++) {
    drawHeartIcon(ctx, W - (G.isMobile ? 100 : 150) + i * 25, 28, 20, i < G.lives);
  }
  // Target progress
  if (!G.isBossFight) {
    const target = STAGE_TARGET(G.currentStage);
    const ratio = Math.min(G.stageGold / target, 1);
    const barX = l.gridX;
    const barY = l.gridY - 25;
    drawProgressBar(ctx, barX, barY, l.gridW, 16, ratio, PAL.gold, '#333', PAL.gridLine);
    ctx.font = `bold 11px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.textAlign = 'center';
    ctx.fillText(t('target') + ': ' + G.stageGold + '/' + target, barX + l.gridW/2, barY + 8);
  }
  // Boss HUD
  if (G.isBossFight) {
    const boss = BOSS_DEFS[G.bossIdx];
    const bossName = G.lang === 'ko' ? boss.nameKo : boss.nameEn;
    // Boss HP bar
    const hpRatio = G.bossHP / G.bossMaxHP;
    drawProgressBar(ctx, l.gridX, l.gridY - 25, l.gridW, 16, hpRatio, PAL.bossWarn, '#333', '#555');
    ctx.font = `bold 11px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.textAlign = 'center';
    ctx.fillText(bossName + ' HP: ' + G.bossHP + '/' + G.bossMaxHP, l.gridX + l.gridW/2, l.gridY - 17);
    // Timer
    const timerColor = G.bossTimer <= 10 ? PAL.bossWarn : PAL.uiText;
    ctx.font = `bold ${G.isMobile ? 18 : 24}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = timerColor;
    ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(G.bossTimer) + 's', W/2, l.gridY - 40);
  }
  // Block selection panel
  const blockPanelY = G.isMobile ? l.gridY + l.gridH + 15 : l.panelY;
  const blockCellSize = Math.max(12, Math.min(l.cellSize * 0.6, 24));
  // Panel background
  if (!G.isMobile) {
    ctx.fillStyle = 'rgba(20,10,5,0.6)';
    drawRoundRect(ctx, l.panelX, l.panelY - 10, l.panelW, H - l.panelY, 8, 'rgba(20,10,5,0.6)', '#5C4033');
  }
  // Draw blocks in hand
  ctx.font = `bold 12px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiText;
  ctx.textAlign = 'left';
  if (!G.isMobile) ctx.fillText(t('selectBlock'), l.panelX + 10, l.panelY + 15);
  for (let i = 0; i < G.blocks.length; i++) {
    const block = G.blocks[i];
    if (block.placed) continue;
    let bx, by;
    if (G.isMobile) {
      bx = 10 + i * (blockCellSize * 5 + 15);
      by = blockPanelY;
    } else {
      bx = l.panelX + 15;
      by = blockPanelY + 30 + i * (blockCellSize * 5 + 20);
    }
    // Label
    ctx.font = `bold 11px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = i === G.selectedBlock ? PAL.gold : PAL.uiAccent;
    ctx.textAlign = 'left';
    ctx.fillText((i + 1) + '', bx - 2, by - 3);
    drawBlockPiece(ctx, block.cells, bx, by, blockCellSize, i === G.selectedBlock ? PAL.gold : PAL.placed, i === G.selectedBlock, false);
  }
  // Tool info (mobile bottom)
  if (G.isMobile) {
    const toolY = blockPanelY + 70;
    drawButton(ctx, 10, toolY, 60, 44, 'Q ' + t('pickaxe').substring(0,2), `10px 'Segoe UI', system-ui, sans-serif`, '#4A3728', PAL.uiText, false);
    if (G.tools.dynamite > 0) {
      drawButton(ctx, 80, toolY, 60, 44, 'E TNT(' + G.dynamiteUses + ')', `9px 'Segoe UI', system-ui, sans-serif`, '#4A3728', PAL.uiText, false);
    }
  } else {
    // Desktop tool info in panel
    const toolInfoY = blockPanelY + 30 + G.blocks.length * (blockCellSize * 5 + 20) + 20;
    ctx.font = `bold 12px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiAccent;
    ctx.textAlign = 'left';
    ctx.fillText(t('tools'), l.panelX + 15, toolInfoY);
    ctx.font = `11px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.fillText('[Q] ' + t('pickaxe') + ' Lv' + G.tools.pickaxe, l.panelX + 15, toolInfoY + 18);
    if (G.tools.dynamite > 0) {
      ctx.fillText('[E] ' + t('dynamite') + ' Lv' + G.tools.dynamite + ' (' + G.dynamiteUses + '/' + G.maxDynamiteUses + ')', l.panelX + 15, toolInfoY + 34);
    }
    if (G.tools.survey > 0) {
      ctx.fillText(t('survey') + ' Lv' + G.tools.survey, l.panelX + 15, toolInfoY + 50);
    }
  }
  // Pause button
  drawButton(ctx, W - 50, 5, 44, 44, '⏸', `18px 'Segoe UI', system-ui, sans-serif`, 'rgba(0,0,0,0.5)', PAL.uiText, false);
  // Pause overlay
  if (G.paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    drawGlowText(ctx, t('pause'), W/2, H/2 - 50, `bold 36px 'Segoe UI', system-ui, sans-serif`, PAL.uiText, PAL.gold, 15);
    drawButton(ctx, W/2 - 80, H/2, 160, 48, t('resume'), `bold 16px 'Segoe UI', system-ui, sans-serif`, '#4A3728', PAL.uiText, false);
    drawButton(ctx, W/2 - 80, H/2 + 60, 160, 48, t('quit'), `bold 16px 'Segoe UI', system-ui, sans-serif`, '#4A3728', PAL.uiText, false);
  }
}

// Render map/town screen

  ctx.fillRect(0, H * 0.65, W, H * 0.35);
  // Title

  ctx.fillStyle = PAL.gold;
  ctx.textAlign = 'center';
  ctx.fillText(t('mapTitle'), W/2, 35);
  // Resources bar
  const iconS = 18;
  drawResourceHUD(ctx, 10, 55, 'gold', G.gold, iconS);
  drawResourceHUD(ctx, 100, 55, 'silver', G.silver, iconS);
  drawResourceHUD(ctx, 190, 55, 'copper', G.copper, iconS);
  // Building grid
  const buildingNames = Object.keys(BUILDING_DEFS);
  const bw = Math.min(180, (W - 40) / 2);
  const bh = Math.max(MIN_TOUCH_TARGET, 50);
  for (let i = 0; i < buildingNames.length; i++) {

    const canBuild = canAffordBuilding(name);
    const bgCol = canBuild ? '#3A2820' : '#2A1A12';
    const borderCol = lv >= def.maxLv ? PAL.success : canBuild ? PAL.gold : '#555';

    ctx.fillStyle = lv > 0 ? PAL.warmSand : '#666';
    ctx.fillRect(bx + 8, by + bh/2 - 12, 24, 24);
    ctx.fillStyle = lv > 0 ? '#8B6914' : '#444';
    // Roof
    ctx.beginPath();
    ctx.moveTo(bx + 5, by + bh/2 - 12);
    ctx.lineTo(bx + 20, by + bh/2 - 22);
    ctx.lineTo(bx + 35, by + bh/2 - 12);
    ctx.closePath();
    ctx.fill();
    // Text
    const bName = G.lang === 'ko' ? def.nameKo : def.nameEn;
    ctx.font = `bold 12px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.textAlign = 'left';
    ctx.fillText(bName, bx + 40, by + 18);
    ctx.font = `10px 'Segoe UI', system-ui, sans-serif`;

      if (cost.s) costStr += 'S:' + cost.s + ' ';
      if (cost.c) costStr += 'C:' + cost.c;
      ctx.fillText(costStr, bx + 40, by + 44);

  // Region info

  drawButton(ctx, W/2 - 100, H - 75, 200, Math.max(MIN_TOUCH_TARGET, 50),

// Render game over screen
function renderGameOver(time) {
  // Dark background with red tint
  ctx.fillStyle = '#1a0808';
  ctx.fillRect(0, 0, W, H);
  // Vignette
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, 'rgba(50,10,10,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Collapsed mine visual
  for (let i = 0; i < 20; i++) {
    const rx = W * 0.2 + (i % 5) * W * 0.15;
    const ry = H * 0.35 + Math.floor(i / 5) * 30;
    ctx.fillStyle = '#4A3728';
    ctx.save();
    ctx.translate(rx, ry);
    ctx.rotate(Math.sin(i * 0.7) * 0.3);
    ctx.fillRect(-15, -5, 30, 10);
    ctx.restore();
  }
  // Game over text
  const isNew = G.score >= G.highScore && G.score > 0;
  ctx.save();
  drawGlowText(ctx, t('gameOver'), W/2, H * 0.25,
    `bold ${G.isMobile ? 28 : 42}px 'Segoe UI', system-ui, sans-serif`,
    PAL.dangerRed, PAL.bossWarn, 20);
  // Score display
  ctx.font = `bold ${G.isMobile ? 18 : 24}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiText;
  ctx.textAlign = 'center';
  ctx.fillText(t('score') + ': ' + G.score, W/2, H * 0.4);
  if (isNew) {
    drawGlowText(ctx, '★ NEW HIGH SCORE! ★', W/2, H * 0.48,
      `bold ${G.isMobile ? 16 : 20}px 'Segoe UI', system-ui, sans-serif`,
      PAL.gold, PAL.gold, 15);
  }
  ctx.font = `${G.isMobile ? 14 : 18}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiAccent;
  ctx.fillText(t('highScore') + ': ' + G.highScore, W/2, H * 0.55);
  // Stats
  ctx.font = `14px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiText;
  ctx.fillText(t('stage') + ': ' + G.currentStage + '/15', W/2, H * 0.63);
  ctx.fillText(t('totalGold') + ': ' + G.totalGold, W/2, H * 0.68);
  ctx.fillText(t('runCount') + ': ' + G.runCount, W/2, H * 0.73);
  // Restart prompt
  const blink = Math.sin(time * 3) > 0;
  if (blink) {
    ctx.font = `bold ${G.isMobile ? 16 : 20}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiText;
    ctx.fillText(t('restart'), W/2, H * 0.85);
  }
  ctx.restore();
}

// ===== MAIN GAME LOOP =====

let lastTime = 0;
let gameTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  // Delta time calculation (capped at 33ms = ~30fps minimum)
  const rawDt = timestamp - lastTime;
  lastTime = timestamp;
  const dtMs = Math.min(rawDt || 16.67, 33);
  const dt = dtMs / 1000;
  gameTime += dt;
  // Update tweens (always active per F7 matrix)
  tw.update(dtMs);
  // Update systems based on active state (F7 matrix)
  const active = ACTIVE_SYSTEMS[G.state];
  if (active) {
    if (active.particle) particles.update(dt);
    if (active.boss && G.isBossFight && !G.paused) updateBoss(dt);
  }
  // Decay shake
  if (G.shakeIntensity > 0) {
    G.shakeIntensity *= 0.92;
    if (G.shakeIntensity < 0.5) G.shakeIntensity = 0;
  }
  // Update popups
  for (let i = G.popups.length - 1; i >= 0; i--) {
    G.popups[i].time += dt;
    if (G.popups[i].time >= G.popups[i].maxTime) G.popups.splice(i, 1);
  }
  // Update hit effects
  for (let i = G.hitEffects.length - 1; i >= 0; i--) {
    G.hitEffects[i].time += dt;
    if (G.hitEffects[i].time >= G.hitEffects[i].maxTime) G.hitEffects.splice(i, 1);
  }
  // BGM loop check (no setTimeout!)
  sound.checkBgmLoop();
  // Clear canvas
  ctx.clearRect(0, 0, W, H);
  // Apply screen shake
  const shake = getShakeOffset(G.shakeIntensity, gameTime);
  ctx.save();
  ctx.translate(shake.x, shake.y);
  // Render based on state
  switch(G.state) {
    case STATE.TITLE:    renderTitle(gameTime); break;
    case STATE.PUZZLE:   renderPuzzle(gameTime, dt); break;
    case STATE.MAP:      renderMap(gameTime); break;
    case STATE.SHOP:     renderShop(gameTime); break;
    case STATE.GAMEOVER: renderGameOver(gameTime); break;
  }
  // Render particles (on top)
  if (active && active.particle) particles.render(ctx);
  // Render popups
  for (const p of G.popups) {
    drawScorePopup(ctx, p.x, p.y, p.text, p.color, p.time / p.maxTime);
  }
  // Render hit effects
  for (const e of G.hitEffects) {
    const progress = e.time / e.maxTime;
    drawEffectHit(ctx, e.x, e.y, 80 + progress * 40, 1 - progress);
  }
  // Render transition overlay
  if (G.transAlpha > 0.01) {
    ctx.fillStyle = `rgba(10,5,2,${G.transAlpha})`;
    ctx.fillRect(-20, -20, W + 40, H + 40);
  }
  ctx.restore();
  // Reset per-frame input flags
  mouseClicked = false;
}

function drawLoadingScreen(progress) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = PAL.bgDark;
  ctx.fillRect(0, 0, W, H);
  // Loading bar
  const barW = Math.min(300, W * 0.6);
  const barH = 12;
  const barX = (W - barW) / 2;
  const barY = H / 2;
  drawRoundRect(ctx, barX, barY, barW, barH, 4, '#333', '#555');
  drawRoundRect(ctx, barX + 2, barY + 2, (barW - 4) * progress, barH - 4, 3, PAL.gold, null);
  // Text
  ctx.font = `bold 20px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.gold;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Gold Rush Tactics', W/2, barY - 40);
  ctx.font = `14px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiAccent;
  ctx.fillText(t('preparing'), W/2, barY + 30);
}

// Initialize everything
async function init() {
  resizeCanvas();
  loadProgress();
  // Detect language from browser
  if (!localStorage.getItem(GAME_ID + '_progress')) {
    G.lang = (navigator.language || '').startsWith('ko') ? 'ko' : 'en';
  }
  // Show loading (no external assets to preload — F24: assets/ dir forbidden)
  drawLoadingScreen(0.5);
  drawLoadingScreen(1.0);
  // Start game loop
  lastTime = performance.now();
  sound.startBgm('title_bgm');
  requestAnimationFrame(gameLoop);
}

// Cutscene state
let cutsceneActive = false;
let cutsceneData = null;
let cutsceneIdx = 0;
let cutsceneCharReveal = 0;
let cutsceneSkippable = false;

// Show a cutscene (called from game flow)
function showCutscene(sceneKey, onComplete) {
  const scene = CUTSCENES[sceneKey];
  if (!scene) { if (onComplete) onComplete(); return; }
  cutsceneActive = true;
  cutsceneData = { lines: scene[G.lang] || scene.en, onComplete };
  cutsceneIdx = 0;
  cutsceneCharReveal = 0;
  cutsceneSkippable = G.runCount > 1; // Can skip after first run
}

// Advance cutscene on click/tap/space
function advanceCutscene() {
  if (!cutsceneActive || !cutsceneData) return;
  const line = cutsceneData.lines[cutsceneIdx];
  const fullLen = line.text.length;
  if (cutsceneCharReveal < fullLen) {
    cutsceneCharReveal = fullLen; // Reveal all text instantly
    return;
  }
  cutsceneIdx++;
  cutsceneCharReveal = 0;
  if (cutsceneIdx >= cutsceneData.lines.length) {
    cutsceneActive = false;
    if (cutsceneData.onComplete) cutsceneData.onComplete();
    cutsceneData = null;
  }
}

// Skip cutscene entirely
function skipCutscene() {
  if (!cutsceneActive || !cutsceneSkippable) return;
  cutsceneActive = false;
  if (cutsceneData && cutsceneData.onComplete) cutsceneData.onComplete();
  cutsceneData = null;
}

// Render cutscene overlay
function renderCutscene(ctx, w, h, time) {
  if (!cutsceneActive || !cutsceneData) return;
  const line = cutsceneData.lines[cutsceneIdx];
  if (!line) return;
  // Darken background
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, w, h);
  // Character portrait area
  const portraitSize = G.isMobile ? 60 : 90;
  const boxH = G.isMobile ? 100 : 140;
  const boxY = h - boxH - 20;
  // Dialogue box
  drawRoundRect(ctx, 20, boxY, w - 40, boxH, 10, 'rgba(44,24,16,0.95)', PAL.gold);
  // Speaker portrait
  if (line.speaker === 'jack') {
    drawPlayer(ctx, 60, boxY + boxH/2, portraitSize, 'idle', time);
  } else {
    // NPC (simple icon)
    ctx.fillStyle = PAL.uiAccent;
    ctx.beginPath();
    ctx.arc(60, boxY + boxH/2, portraitSize * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = `bold ${portraitSize * 0.25}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('NPC', 60, boxY + boxH/2);
  }
  // Speaker name
  const speakerName = line.speaker === 'jack' ? (G.lang === 'ko' ? '잭 모건' : 'Jack Morgan') : (G.lang === 'ko' ? '주민' : 'Townfolk');
  ctx.font = `bold 14px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.gold;
  ctx.textAlign = 'left';
  ctx.fillText(speakerName, 100, boxY + 22);
  // Text with typewriter effect
  cutsceneCharReveal += 0.8; // chars per frame
  const visibleText = line.text.substring(0, Math.floor(cutsceneCharReveal));
  ctx.font = `${G.isMobile ? 13 : 16}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = PAL.uiText;
  // Word wrap
  const maxWidth = w - 140;
  const words = visibleText.split(' ');
  let currentLine = '';
  let lineY = boxY + 45;
  const lineHeight = G.isMobile ? 18 : 22;
  for (const word of words) {
    const testLine = currentLine + (currentLine ? ' ' : '') + word;
    if (ctx.measureText(testLine).width > maxWidth && currentLine) {
      ctx.fillText(currentLine, 100, lineY);
      currentLine = word;
      lineY += lineHeight;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) ctx.fillText(currentLine, 100, lineY);
  // Prompt to continue
  if (cutsceneCharReveal >= line.text.length) {
    const blink = Math.sin(time * 4) > 0;
    if (blink) {
      ctx.font = `12px 'Segoe UI', system-ui, sans-serif`;
      ctx.fillStyle = PAL.uiAccent;
      ctx.textAlign = 'right';
      ctx.fillText('▼', w - 40, boxY + boxH - 15);
    }
  }
  // Skip button
  if (cutsceneSkippable) {
    ctx.font = `11px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = PAL.uiAccent;
    ctx.textAlign = 'right';
    ctx.fillText('[ESC] Skip', w - 25, boxY - 8);
  }
}

// Weather types for visual variety
const WEATHER = {
  CLEAR: 'clear',
  DUSTY: 'dusty',
  RAIN: 'rain',
  STORM: 'storm',
  GOLDEN_HOUR: 'golden_hour'
};

// Current weather state
let currentWeather = WEATHER.CLEAR;
let weatherTimer = 0;
let weatherTransition = 0;
let rainDrops = [];

// Determine weather based on stage and region
function getWeatherForStage(region, stage, rng) {
  const roll = rng.next();
  switch(region) {
    case 1: return roll < 0.7 ? WEATHER.CLEAR : WEATHER.GOLDEN_HOUR;
    case 2: return roll < 0.4 ? WEATHER.RAIN : roll < 0.7 ? WEATHER.CLEAR : WEATHER.DUSTY;
    case 3: return roll < 0.6 ? WEATHER.DUSTY : WEATHER.CLEAR;
    case 4: return roll < 0.3 ? WEATHER.STORM : roll < 0.6 ? WEATHER.RAIN : WEATHER.CLEAR;
    case 5: return roll < 0.5 ? WEATHER.GOLDEN_HOUR : WEATHER.CLEAR;
    default: return WEATHER.CLEAR;
  }
}

// Initialize rain drops
function initRain(count) {
  rainDrops = [];
  for (let i = 0; i < count; i++) {
    rainDrops.push({
      x: gameRng.randFloat(0, W),
      y: gameRng.randFloat(-H, 0),
      speed: gameRng.randFloat(300, 600),
      length: gameRng.randFloat(8, 20),
      opacity: gameRng.randFloat(0.2, 0.5)
    });
  }
}

// Update weather effects
function updateWeather(dt) {
  weatherTimer += dt;
  // Update rain
  if (currentWeather === WEATHER.RAIN || currentWeather === WEATHER.STORM) {
    if (rainDrops.length === 0) initRain(currentWeather === WEATHER.STORM ? 200 : 80);
    for (const drop of rainDrops) {
      drop.y += drop.speed * dt;
      drop.x -= 30 * dt; // Wind
      if (drop.y > H) {
        drop.y = gameRng.randFloat(-50, -10);
        drop.x = gameRng.randFloat(0, W + 50);
      }
    }
  }
}

// Render weather overlay
function renderWeather(ctx, w, h, time) {
  switch(currentWeather) {
    case WEATHER.DUSTY: {
      // Dust overlay with moving particles
      ctx.fillStyle = 'rgba(139,94,52,0.08)';
      ctx.fillRect(0, 0, w, h);
      // Drifting dust
      for (let i = 0; i < 15; i++) {
        const dx = ((time * 20 + i * 73) % (w + 100)) - 50;
        const dy = h * 0.3 + Math.sin(time * 0.5 + i * 1.7) * h * 0.2;
        ctx.fillStyle = `rgba(180,140,80,${0.15 + Math.sin(time + i) * 0.05})`;
        ctx.beginPath();
        ctx.arc(dx, dy, 15 + Math.sin(time + i * 2) * 5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case WEATHER.RAIN: {
      ctx.strokeStyle = 'rgba(150,180,220,0.3)';
      ctx.lineWidth = 1;
      for (const drop of rainDrops) {
        ctx.globalAlpha = drop.opacity;
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x - 2, drop.y + drop.length);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;
    }
    case WEATHER.STORM: {
      // Darker overlay
      ctx.fillStyle = 'rgba(20,20,40,0.15)';
      ctx.fillRect(0, 0, w, h);
      // Rain
      ctx.strokeStyle = 'rgba(150,180,220,0.4)';
      ctx.lineWidth = 1.5;
      for (const drop of rainDrops) {
        ctx.globalAlpha = drop.opacity;
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x - 4, drop.y + drop.length);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // Occasional lightning flash
      if (Math.sin(time * 7.3) > 0.98) {
        ctx.fillStyle = 'rgba(255,255,240,0.15)';
        ctx.fillRect(0, 0, w, h);
      }
      break;
    }
    case WEATHER.GOLDEN_HOUR: {
      // Warm golden overlay
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, 'rgba(255,200,50,0.06)');
      grad.addColorStop(0.5, 'rgba(255,170,30,0.04)');
      grad.addColorStop(1, 'rgba(255,100,20,0.08)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      // Sun rays
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#FFD700';
      const sunX = w * 0.8;
      const sunY = h * 0.15;
      for (let i = 0; i < 8; i++) {
        const angle = time * 0.1 + i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(sunX, sunY);
        ctx.lineTo(sunX + Math.cos(angle) * 400, sunY + Math.sin(angle) * 400);
        ctx.lineTo(sunX + Math.cos(angle + 0.15) * 400, sunY + Math.sin(angle + 0.15) * 400);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
      break;
    }
  }
}

/* =======================================================================
   REGION 14: HIDDEN STAGE DETECTION (§2.4)
   ======================================================================= */

// Track hidden stage conditions
const hiddenProgress = {
  veinsCleared: 0,     // Hidden 1: Clear 5 vein cells in one run
  tripleComboCount: 0, // Hidden 2: 3x combo 3 times
  bossNoDamage: true,  // Hidden 3: All bosses no damage
};

// Reset hidden progress on new run
function resetHiddenProgress() {
  hiddenProgress.veinsCleared = 0;
  hiddenProgress.tripleComboCount = 0;
  hiddenProgress.bossNoDamage = true;
}

// Check hidden stage unlock conditions
function checkHiddenUnlocks() {
  const unlocks = [];
  if (hiddenProgress.veinsCleared >= 5) {
    unlocks.push({ id: 'eldorado', nameKo: '엘도라도 광맥', nameEn: 'Eldorado Vein' });
  }
  if (hiddenProgress.tripleComboCount >= 3) {
    unlocks.push({ id: 'motherlode', nameKo: '마더 로드', nameEn: 'Mother Lode' });
  }
  if (hiddenProgress.bossNoDamage && G.bossRewardGiven.every(b => b)) {
    unlocks.push({ id: 'ghost_mine', nameKo: '유령의 금광', nameEn: "Ghost's Gold Mine" });
  }
  return unlocks;
}

// Track vein clear event
function onVeinCleared() {
  hiddenProgress.veinsCleared++;
  if (hiddenProgress.veinsCleared === 5) {
    addPopup(W/2, H/2 - 60, t('hidden') + ' — Eldorado!', PAL.veinGlow);
    sound.playSfx('gold_nugget');
  }
}

// Track combo event
function onComboAchieved(mult) {
  if (mult >= 3.0) {
    hiddenProgress.tripleComboCount++;
    if (hiddenProgress.tripleComboCount === 3) {
      addPopup(W/2, H/2 - 60, t('hidden') + ' — Mother Lode!', PAL.veinGlow);
      sound.playSfx('gold_nugget');
    }
  }
}

// Track boss damage taken
function onBossDamageTaken() {
  hiddenProgress.bossNoDamage = false;
}

/* =======================================================================
   REGION 15: CAMERA & ZOOM SYSTEM (§4.4)
   ======================================================================= */

// Camera state for zoom/pan effects
const camera = {
  x: 0,
  y: 0,
  zoom: 1,
  targetZoom: 1,
  shakeX: 0,
  shakeY: 0,
};

// Smooth camera follow (lerp toward target)
function updateCamera(dt) {
  camera.zoom += (camera.targetZoom - camera.zoom) * dt * 3;
  if (Math.abs(camera.zoom - camera.targetZoom) < 0.001) camera.zoom = camera.targetZoom;
}

// Apply camera transform to context
function applyCameraTransform(ctx, w, h) {
  if (camera.zoom !== 1) {
    const cx = w / 2 + camera.x;
    const cy = h / 2 + camera.y;
    ctx.translate(cx, cy);
    ctx.scale(camera.zoom, camera.zoom);
    ctx.translate(-cx, -cy);
  }
}

// Boss entrance zoom effect
function bossEntranceZoom() {
  camera.targetZoom = 1.15;
  const zoomObj = { v: 1 };
  tw.add(zoomObj, 'v', 1.15, 1, 2000, 'easeOutCubic', () => {
    camera.targetZoom = 1;
  });
}

/* =======================================================================
   REGION 16: ACHIEVEMENT / STATS TRACKING
   ======================================================================= */

// Stats tracker for end-game summary
const runStats = {
  blocksPlaced: 0,
  linesCleared: 0,
  bossesDefeated: 0,
  goldMined: 0,
  maxCombo: 0,
  toolsUsed: 0,
  buildingsBuilt: 0,
  stagesCleared: 0,
  timeStarted: 0,
  timePlayed: 0,
};

// Reset stats for new run
function resetRunStats() {
  runStats.blocksPlaced = 0;
  runStats.linesCleared = 0;
  runStats.bossesDefeated = 0;
  runStats.goldMined = 0;
  runStats.maxCombo = 0;
  runStats.toolsUsed = 0;
  runStats.buildingsBuilt = 0;
  runStats.stagesCleared = 0;
  runStats.timeStarted = performance.now();
  runStats.timePlayed = 0;
}

// Track stat events
function trackBlock() { runStats.blocksPlaced++; }
function trackLine(count) { runStats.linesCleared += count; }
function trackBossDefeat() { runStats.bossesDefeated++; }
function trackGoldMined(amount) { runStats.goldMined += amount; runStats.maxCombo = Math.max(runStats.maxCombo, amount); }
function trackToolUse() { runStats.toolsUsed++; }
function trackBuilding() { runStats.buildingsBuilt++; }
function trackStageClear() { runStats.stagesCleared++; }

// Render stats on game over screen
function renderRunStats(ctx, x, y, w) {
  const stats = [
    [G.lang === 'ko' ? '배치한 블록' : 'Blocks Placed', runStats.blocksPlaced],
    [G.lang === 'ko' ? '클리어한 줄' : 'Lines Cleared', runStats.linesCleared],
    [G.lang === 'ko' ? '격퇴한 보스' : 'Bosses Defeated', runStats.bossesDefeated],
    [G.lang === 'ko' ? '채굴한 금' : 'Gold Mined', runStats.goldMined],
    [G.lang === 'ko' ? '최대 콤보' : 'Max Combo', runStats.maxCombo + 'x'],
    [G.lang === 'ko' ? '클리어 스테이지' : 'Stages Cleared', runStats.stagesCleared + '/15'],
  ];
  ctx.font = `12px 'Segoe UI', system-ui, sans-serif`;
  for (let i = 0; i < stats.length; i++) {
    ctx.fillStyle = PAL.uiAccent;
    ctx.textAlign = 'left';
    ctx.fillText(stats[i][0], x, y + i * 18);
    ctx.fillStyle = PAL.uiText;
    ctx.textAlign = 'right';
    ctx.fillText(String(stats[i][1]), x + w, y + i * 18);
  }
}

// Boot
init();
