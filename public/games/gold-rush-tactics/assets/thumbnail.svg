<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="60%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#F4E8C1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="mine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4033"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Mountains -->
  <polygon points="0,200 80,100 160,200" fill="#A0522D" opacity="0.6"/>
  <polygon points="100,200 200,70 300,200" fill="#8B4513" opacity="0.7"/>
  <polygon points="240,200 340,110 400,200" fill="#A0522D" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="200" width="400" height="100" fill="#C19A6B"/>

  <!-- 8x8 Grid (mine) -->
  <rect x="100" y="105" width="200" height="160" rx="4" fill="url(#mine)" stroke="#3E2723" stroke-width="2"/>

  <!-- Grid lines -->
  <g stroke="#6D4C2A" stroke-width="0.5" opacity="0.6">
    <line x1="125" y1="105" x2="125" y2="265"/>
    <line x1="150" y1="105" x2="150" y2="265"/>
    <line x1="175" y1="105" x2="175" y2="265"/>
    <line x1="200" y1="105" x2="200" y2="265"/>
    <line x1="225" y1="105" x2="225" y2="265"/>
    <line x1="250" y1="105" x2="250" y2="265"/>
    <line x1="275" y1="105" x2="275" y2="265"/>
    <line x1="100" y1="125" x2="300" y2="125"/>
    <line x1="100" y1="145" x2="300" y2="145"/>
    <line x1="100" y1="165" x2="300" y2="165"/>
    <line x1="100" y1="185" x2="300" y2="185"/>
    <line x1="100" y1="205" x2="300" y2="205"/>
    <line x1="100" y1="225" x2="300" y2="225"/>
    <line x1="100" y1="245" x2="300" y2="245"/>
  </g>

  <!-- Gold veins in grid -->
  <g filter="url(#glow)">
    <rect x="150" y="145" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.9"/>
    <rect x="175" y="145" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.85"/>
    <rect x="175" y="165" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.9"/>
    <rect x="225" y="185" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.8"/>
    <rect x="225" y="205" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.9"/>
    <rect x="250" y="205" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.85"/>
    <rect x="125" y="225" width="25" height="20" rx="2" fill="url(#gold)" opacity="0.7"/>
  </g>

  <!-- Placed blocks (puzzle pieces) -->
  <rect x="150" y="125" width="50" height="40" rx="3" fill="#4CAF50" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <rect x="225" y="165" width="50" height="40" rx="3" fill="#2196F3" opacity="0.7" stroke="#1565C0" stroke-width="1"/>
  <rect x="125" y="205" width="25" height="40" rx="3" fill="#E91E63" opacity="0.7" stroke="#AD1457" stroke-width="1"/>

  <!-- Pickaxe icon -->
  <g transform="translate(330, 130) rotate(-30)">
    <rect x="-3" y="0" width="6" height="40" rx="2" fill="#8D6E63"/>
    <path d="M-15,-5 L15,-5 L12,8 L-12,8 Z" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  </g>

  <!-- Gold nuggets scattered -->
  <circle cx="50" cy="240" r="6" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="70" cy="255" r="4" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="350" cy="235" r="5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="370" cy="250" r="3.5" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Small town silhouette -->
  <g fill="#5D4037" opacity="0.5">
    <rect x="15" y="180" width="20" height="20"/>
    <polygon points="15,180 25,168 35,180"/>
    <rect x="45" y="175" width="15" height="25"/>
    <rect x="355" y="178" width="18" height="22"/>
    <polygon points="355,178 364,166 373,178"/>
  </g>

  <!-- Title text -->
  <text x="200" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#3E2723" stroke="#FFD700" stroke-width="0.5">GOLD RUSH</text>
  <text x="200" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#5D4037" letter-spacing="6">TACTICS</text>

  <!-- Sparkle effects -->
  <g fill="#FFD700" opacity="0.8">
    <polygon points="160,155 162,150 164,155 169,155 165,158 167,163 162,160 157,163 159,158 155,155" transform="scale(0.6)"/>
    <polygon points="420,340 422,335 424,340 429,340 425,343 427,348 422,345 417,348 419,343 415,340" transform="scale(0.6)"/>
  </g>
</svg>