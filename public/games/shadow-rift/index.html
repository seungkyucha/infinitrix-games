// Begin state transition (F6 — all transitions go through here)
function beginTransition(from, to, immediate) {
  // Priority check (F6)
  if (G.transitioning && ST_PRIORITY[to] < ST_PRIORITY[G.transTarget]) return;
  // GAMEOVER overrides everything (except PAUSE overlay)
  if (P && P.hp <= 0 && to !== ST.GAMEOVER && to !== ST.PAUSE && to !== ST.TITLE) return;
  if (immediate || to === ST.PAUSE) {
    enterState(to);
    return;
  }
  G.transitioning = true;
  G.transTarget = to;
  G.transAlpha = 0;
  tw.add(G, { transAlpha: 1 }, 0.3, {
    onComplete: () => {
      enterState(to);
      tw.add(G, { transAlpha: 0 }, 0.3, {
        onComplete: () => { G.transitioning = false; G.transGuard = false; }
      });
    }
  });
}

// Enter a state (only called via beginTransition)
function enterState(newState) {
  G.prevState = G.state;
  G.state = newState;
  switch (newState) {
    case ST.BOOT:
      G.bootTimer = 0;
      break;
    case ST.TITLE:
      G.titleTime = 0;
      sound.stopBGM();
      break;
    case ST.DIFFICULTY:
      G.diffIdx = 1;
      break;
    case ST.ZONE_MAP:
      break;
    case ST.EXPLORE:
    case ST.COMBAT:
    case ST.PUZZLE:
      break;
    case ST.BOSS_INTRO:
      G.bossIntroTimer = 0;
      sound.playSFX('bossAppear');
      break;
    case ST.BOSS:
      if (!G.currentBoss) {
        const room = ROOM_DEFS[G.currentRoom];
        G.currentBoss = createBoss(room.zone, G.diffIdx);
      }
      cam.targetZoom = CFG.CAM_BOSS_ZOOM;
      break;
    case ST.BOSS_CLEAR:
      cam.targetZoom = 1;
      break;
    case ST.ARTIFACT_SELECT:
      if (G.artifactChoices.length === 0) prepareArtifactChoices();
      G.artifactSelectedIdx = 0;
      break;
    case ST.UPGRADE:
      G.upgradeTree = 0; G.upgradeLevel = G.save.upgrades.shadow || 0;
      break;
    case ST.ROOM_TRANSITION:
      break;
    case ST.CUTSCENE:
      G.cutsceneProgress = 0;
      break;
    case ST.VICTORY: {
      sound.stopBGM();
      // Judge best score (F8)
      const isNewBest = P.score > G.save.bestScore;
      if (isNewBest) G.save.bestScore = P.score;
      G.isNewBest = isNewBest;
      const epBonus = 1 + getUpgradeBonus('echo', 3, 0.25);
      G.save.echoPoints += Math.floor(P.score * 0.1 * epBonus);
      G.save.totalRuns++;
      G.save.seed = null;
      saveGame();
      break;
    }
    case ST.GAMEOVER:
      G.gameOverShake = 1;
      break;
    case ST.PAUSE:
      G.pauseMenuIdx = 0;
      break;
    case ST.MODAL:
      break;
  }
}

// Start a new run
function startNewRun() {
  G.save.seed = Date.now();
  rng = new SeededRNG(G.save.seed);
  G.diffIdx = G.diffIdx || 1;
  P = createPlayer(G.diffIdx);
  // Apply permanent upgrades
  if (getUpgradeLevel('echo') >= 2) P.maxHp += 20;
  if (getUpgradeLevel('echo') >= 3) { /* jump bonus applied in physics */ }
  if (getUpgradeLevel('rift') >= 1) P.maxEnergy += 20;
  P.hp = P.maxHp; P.energy = P.maxEnergy;
  // Restore previously unlocked abilities from bosses
  for (const b of G.save.bossesDefeated) {
    if (b < 5) P.abilities[b] = true;
  }
  G.currentRoom = 0;
  G.currentBoss = null;
  G.projectiles = [];
  G.consecutiveDeaths = 0;
  G.ddaFactor = 1;
  G.dimShiftActive = false;
  G.timeStopActive = false;
  G.abilityJustUnlocked = -1;
  pool.clear();
  // Populate first room
  populateRoom(ROOM_DEFS[0], rng, G.diffIdx);
  ROOM_DEFS[0].visited = true;
  cam.x = P.x; cam.y = P.y; cam.zoom = 1; cam.targetZoom = 1;
  // Start BGM
  const room = ROOM_DEFS[G.currentRoom];
  sound.startBGM(room.zone);
  // Cutscene for first room
  const storyKeys = ['storyRuin','storyCrystal','storyAbyss','storyMagma','storyVoid'];
  G.cutsceneText = t(storyKeys[room.zone] || 'storyRuin');
  beginTransition(G.state, ST.CUTSCENE);
}

// Move to next room
function moveToNextRoom() {
  const nextId = getNextRoom(G.currentRoom);
  if (nextId < 0) {
    // Check if all 5 bosses defeated
    if (G.save.bossesDefeated.length >= 5) {
      // Check hidden boss
      if (G.save.bossesDefeated.includes(5)) {
        G.isTrueEnd = true;
      }
      beginTransition(G.state, ST.VICTORY);
    } else {
      beginTransition(G.state, ST.ZONE_MAP);
    }
    return;
  }
  G.currentRoom = nextId;
  const room = ROOM_DEFS[nextId];
  if (!room.visited) {
    populateRoom(room, rng, G.diffIdx);
    room.visited = true;
  }
  // Reset player position
  P.x = 120; P.y = CFG.ROOM_H - CFG.TILE * 2 - P.h;
  P.vx = 0; P.vy = 0;
  G.projectiles = [];
  G.currentBoss = null;
  // Zone change check
  const prevRoom = ROOM_DEFS[G.currentRoom - 1];
  if (!prevRoom || prevRoom.zone !== room.zone) {
    sound.startBGM(room.zone);
    const storyKeys = ['storyRuin','storyCrystal','storyAbyss','storyMagma','storyVoid'];
    if (room.zone < 5) {
      G.cutsceneText = t(storyKeys[room.zone]);
      beginTransition(G.state, ST.CUTSCENE);
      return;
    }
  }
  // Boss room
  if (room.isBoss) {
    G.currentBoss = createBoss(room.zone, G.diffIdx);
    beginTransition(G.state, ST.BOSS_INTRO);
  } else if (room.enemies.length > 0 && room.enemies.some(e => e.alive)) {
    beginTransition(G.state, ST.COMBAT);
  } else {
    beginTransition(G.state, ST.EXPLORE);
  }
}

// Enter zone from map
function enterZone(zoneIdx) {
  const firstRoom = ROOM_DEFS.find(r => r.zone === zoneIdx && r.roomIdx === 0);
  if (!firstRoom) return;
  const accessible = getAccessibleRooms(P.abilities.map((a, idx) => a ? idx : -1).filter(x => x >= 0));
  // Check ability requirement
  if (firstRoom.reqAbilities) { if (!firstRoom.reqAbilities.every(a => P.abilities[a])) return; }
  else if (firstRoom.reqAbility >= 0 && !P.abilities[firstRoom.reqAbility]) return;
  G.currentRoom = firstRoom.id;
  if (!firstRoom.visited) {
    populateRoom(firstRoom, rng, G.diffIdx);
    firstRoom.visited = true;
  }
  P.x = 120; P.y = CFG.ROOM_H - CFG.TILE * 2 - P.h;
  P.vx = 0; P.vy = 0;
  G.projectiles = [];
  G.currentBoss = null;
  sound.startBGM(zoneIdx);
  const storyKeys = ['storyRuin','storyCrystal','storyAbyss','storyMagma','storyVoid'];
  if (zoneIdx < 5) {
    G.cutsceneText = t(storyKeys[zoneIdx]);
    beginTransition(G.state, ST.CUTSCENE);
  } else {
    beginTransition(G.state, ST.EXPLORE);
  }
}

// DDA system (§8.2)
function updateDDA() {
  const deaths = G.consecutiveDeaths;
  if (deaths >= 7) { G.ddaFactor = 1 - CFG.DDA_3; G.ddaLevel = 3; }
  else if (deaths >= 5) { G.ddaFactor = 1 - CFG.DDA_2; G.ddaLevel = 2; }
  else if (deaths >= 3) { G.ddaFactor = 1 - CFG.DDA_1; G.ddaLevel = 1; }
  else { G.ddaFactor = 1; G.ddaLevel = 0; }
  if (G.ddaLevel > 0) {
    G.ddaNotifyAlpha = 1;
    tw.add(G, { ddaNotifyAlpha: 0 }, 3);
  }
}

// Save/load (§17)
function saveGame() {
  try { localStorage.setItem('shadowrift_save', JSON.stringify(G.save)); } catch(e) {}
}

function loadGame() {
  try {
    const d = localStorage.getItem('shadowrift_save');
    if (d) {
      const parsed = JSON.parse(d);
      if (parsed.version === 1) {
        G.save = { ...G.save, ...parsed };
        currentLang = G.save.lang || 'ko';
      }
    }
  } catch(e) {}
}

// Physics: resolve entity vs tiles
function resolveEntityTiles(entity, room) {
  const tiles = room.tiles || [];
  const platforms = room.platforms || [];
  entity.onGround = false;
  entity.onWall = false;
  entity.wallDir = 0;
  // Gravity direction
  const gDir = entity.gravDir || 1;
  // Check floor/ceiling/wall tiles
  for (const t of tiles) {
    if (!hitTest(entity.x, entity.y, entity.w, entity.h, t.x, t.y, t.w, t.h)) continue;
    // Resolve overlap
    const overlapLeft = (entity.x + entity.w) - t.x;
    const overlapRight = (t.x + t.w) - entity.x;
    const overlapTop = (entity.y + entity.h) - t.y;
    const overlapBottom = (t.y + t.h) - entity.y;
    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
    if (minOverlap === overlapTop && entity.vy >= 0) {
      entity.y = t.y - entity.h; entity.vy = 0; entity.onGround = true;
    } else if (minOverlap === overlapBottom && entity.vy <= 0) {
      entity.y = t.y + t.h; entity.vy = 0;
    } else if (minOverlap === overlapLeft) {
      entity.x = t.x - entity.w; entity.vx = 0;
      entity.onWall = true; entity.wallDir = 1;
    } else if (minOverlap === overlapRight) {
      entity.x = t.x + t.w; entity.vx = 0;
      entity.onWall = true; entity.wallDir = -1;
    }
  }
  // Platform collision (one-way, from top only)
  for (const p of platforms) {
    const px = p.type === 'moving' ? p.x : p.x;
    if (entity.vy >= 0 && entity.y + entity.h >= p.y && entity.y + entity.h <= p.y + p.h + 8 &&
        entity.x + entity.w > px && entity.x < px + p.w) {
      entity.y = p.y - entity.h; entity.vy = 0; entity.onGround = true;
    }
  }
}

// Update moving platforms
function updatePlatforms(dt, room) {
  for (const p of room.platforms) {
    if (p.type !== 'moving') continue;
    p.x += p.speed * p.dir * dt;
    if (p.x >= p.endX) { p.x = p.endX; p.dir = -1; }
    if (p.x <= p.startX) { p.x = p.startX; p.dir = 1; }
  }
}

// Initialize canvas (F12: variable decl -> DOM assign -> event register)
function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;
  resizeCanvas();
}

// Resize canvas to fit window (devicePixelRatio support)
function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// Register event listeners
function registerEvents() {
  // Keyboard
  window.addEventListener('keydown', e => {
    if (e.repeat) return;
    input.keys[e.code] = true;
    input.keysJustPressed[e.code] = true;
    // Init audio on first interaction
    sound.init(); sound.resume();
  });
  window.addEventListener('keyup', e => { input.keys[e.code] = false; });

  // Touch events
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

  // Mouse click (for menus + attacks)
  canvas.addEventListener('mousedown', e => {
    sound.init(); sound.resume();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);
    input.tapQueue.push({ x: mx, y: my });
  });
  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    // Right click = ranged attack
    if (G.state === ST.COMBAT || G.state === ST.BOSS || G.state === ST.EXPLORE) {
      rangedAttack(P);
    }
  });

  // Resize
  window.addEventListener('resize', resizeCanvas);
}

// Touch handlers
function handleTouchStart(e) {
  e.preventDefault();
  sound.init(); sound.resume();
  input.isMobile = true;
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const tx = touches[i].clientX;
    const ty = touches[i].clientY;
    const id = touches[i].identifier;
    // Check if touching joystick area (left half, lower area)
    if (tx < W * 0.4 && ty > H * 0.4) {
      input.joyActive = true;
      input.joyBase = { x: tx, y: ty };
      input.joyPos = { x: tx, y: ty };
      input.touch.joystick = id;
    } else {
      // Check action buttons
      const btnSize = Math.max(CFG.MIN_TOUCH, 52);
      const btns = [
        { name: 'btnA', x: W - 70, y: H - 130 },
        { name: 'btnR', x: W - 190, y: H - 110 },
        { name: 'btnB', x: W - 130, y: H - 80 },
        { name: 'btnC', x: W - 70, y: H - 70 },
        { name: 'btnS', x: W - 130, y: H - 140 },
      ];
      let hitBtn = false;
      for (const b of btns) {
        const dist = Math.hypot(tx - b.x, ty - b.y);
        if (dist < btnSize / 2 + 10) {
          input.touch.buttons[b.name] = true;
          input.touch.buttons[b.name + '_just'] = true;
          hitBtn = true;
          break;
        }
      }
      // Pause button
      if (tx > W - 54 && ty < 54) {
        input.touch.buttons['pause'] = true;
        input.touch.buttons['pause_just'] = true;
        hitBtn = true;
      }
      // If no button hit, register as tap (for menus)
      if (!hitBtn) {
        input.tapQueue.push({ x: tx, y: ty });
        // Double tap detection for ranged attack
        const now = performance.now();
        if (now - input.lastTapTime < 300) {
          if (G.state === ST.COMBAT || G.state === ST.BOSS || G.state === ST.EXPLORE) {
            rangedAttack(P);
          }
        }
        input.lastTapTime = now;
      }
    }
    // Swipe detection
    if (!input.swipeStart) {
      input.swipeStart = { x: tx, y: ty, time: performance.now(), id };
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const tx = touches[i].clientX;
    const ty = touches[i].clientY;
    const id = touches[i].identifier;
    if (id === input.touch.joystick) {
      input.joyPos = { x: tx, y: ty };
      const dx = tx - input.joyBase.x;
      const dy = ty - input.joyBase.y;
      const dist = Math.hypot(dx, dy);
      const maxDist = input.joyRadius;
      if (dist > 0) {
        const clamped = Math.min(dist, maxDist);
        input.joyDir.x = (dx / dist) * (clamped / maxDist);
        input.joyDir.y = (dy / dist) * (clamped / maxDist);
      }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const id = touches[i].identifier;
    if (id === input.touch.joystick) {
      input.joyActive = false;
      input.joyDir = { x: 0, y: 0 };
      input.touch.joystick = null;
    }
    // Swipe up detection
    if (input.swipeStart && input.swipeStart.id === id) {
      const dy = touches[i].clientY - input.swipeStart.y;
      const elapsed = performance.now() - input.swipeStart.time;
      if (dy < -30 && elapsed < 200) {
        // Swipe up = jump
        input.keysJustPressed['Space'] = true;
        input.keys['Space'] = true;
      }
      input.swipeStart = null;
    }
  }
  // Release all buttons (simplified)
  for (const k of ['btnA','btnR','btnB','btnC','btnS','pause']) {
    input.touch.buttons[k] = false;
  }
}

// Process input for current state
function processInput(dt) {
  if (!sys(SYS.INPUT)) return;
  const tap = input.getTap();
  switch (G.state) {
    case ST.TITLE: {
      if (input.justPressed('Space') || input.justPressed('Enter') || tap) {
        // Check language button click
        if (tap) {
          const lbx = W - 60, lby = 12, lbw = CFG.MIN_TOUCH, lbh = CFG.MIN_TOUCH;
          if (pointInRect(tap.x, tap.y, { x: lbx, y: lby, w: lbw, h: lbh })) {
            currentLang = currentLang === 'ko' ? 'en' : 'ko';
            G.save.lang = currentLang; saveGame();
            sound.playSFX('select');
            return;
          }
        }
        sound.playSFX('select');
        beginTransition(ST.TITLE, ST.DIFFICULTY);
      }
      break;
    }
    case ST.DIFFICULTY: {
      if (input.justPressed('ArrowUp') || input.justPressed('KeyW')) {
        G.diffIdx = (G.diffIdx + 2) % 3; sound.playSFX('select');
      }
      if (input.justPressed('ArrowDown') || input.justPressed('KeyS')) {
        G.diffIdx = (G.diffIdx + 1) % 3; sound.playSFX('select');
      }
      if (input.justPressed('Enter') || input.justPressed('Space') || tap) {
        if (tap) {
          // Detect which difficulty was tapped
          for (let i = 0; i < 3; i++) {
            const dy = 100 + i * 90;
            if (pointInRect(tap.x, tap.y, { x: W/2 - 130, y: dy, w: 260, h: 70 })) {
              G.diffIdx = i;
            }
          }
        }
        sound.playSFX('select');
        G.save.difficulty = DIFF[G.diffIdx].id;
        startNewRun();
      }
      if (input.justPressed('Escape')) beginTransition(G.state, ST.TITLE);
      break;
    }
    case ST.ZONE_MAP: {
      // Number keys 1-5 to select zone
      for (let i = 0; i < 5; i++) {
        if (input.justPressed('Digit' + (i + 1))) {
          const accessible = getAccessibleRooms(P.abilities.map((a, idx) => a ? idx : -1).filter(x => x >= 0));
          if (accessible.includes(i * 4)) {
            enterZone(i); sound.playSFX('select');
          }
        }
      }
      // Click on zone nodes
      if (tap) {
        for (let i = 0; i < 5; i++) {
          if (ZONES[i]._mapHit && pointInRect(tap.x, tap.y, ZONES[i]._mapHit)) {
            if (P.abilities[i - 1] || i === 0) {
              enterZone(i); sound.playSFX('select');
            }
          }
        }
      }
      if (input.justPressed('Escape')) beginTransition(G.state, ST.UPGRADE);
      break;
    }
    case ST.EXPLORE:
    case ST.COMBAT:
    case ST.PUZZLE: {
      handleGameInput(dt);
      break;
    }
    case ST.BOSS_INTRO: {
      if (input.justPressed('Space') || input.justPressed('Enter') || tap) {
        beginTransition(G.state, ST.BOSS);
      }
      break;
    }
    case ST.BOSS: {
      handleGameInput(dt);
      break;
    }
    case ST.BOSS_CLEAR: {
      if (input.justPressed('Space') || input.justPressed('Enter') || tap) {
        // Check if there's an ability unlock
        if (G.abilityJustUnlocked >= 0) {
          G.abilityJustUnlocked = -1;
        }
        // Offer artifact then move on
        prepareArtifactChoices();
        if (G.artifactChoices.length > 0) {
          beginTransition(G.state, ST.ARTIFACT_SELECT);
        } else {
          beginTransition(G.state, ST.ZONE_MAP);
        }
      }
      break;
    }
    case ST.ARTIFACT_SELECT: {
      if (input.justPressed('ArrowLeft') || input.justPressed('KeyA')) {
        G.artifactSelectedIdx = (G.artifactSelectedIdx + G.artifactChoices.length - 1) % G.artifactChoices.length;
        sound.playSFX('select');
      }
      if (input.justPressed('ArrowRight') || input.justPressed('KeyD')) {
        G.artifactSelectedIdx = (G.artifactSelectedIdx + 1) % G.artifactChoices.length;
        sound.playSFX('select');
      }
      if (input.justPressed('Enter') || input.justPressed('Space')) {
        selectArtifact(G.artifactSelectedIdx);
        // Move to next room or zone map
        moveToNextRoom();
      }
      if (tap) {
        const cardW = 140, gap = 20;
        const startX = W/2 - (cardW * 3 + gap * 2) / 2;
        const cardH = 200, cy = H/2 - cardH/2;
        for (let i = 0; i < G.artifactChoices.length; i++) {
          const cx = startX + i * (cardW + gap);
          if (pointInRect(tap.x, tap.y, { x: cx, y: cy, w: cardW, h: cardH })) {
            G.artifactSelectedIdx = i;
            selectArtifact(i);
            moveToNextRoom();
            break;
          }
        }
      }
      break;
    }
    case ST.UPGRADE: {
      const trees = ['shadow', 'rift', 'echo'];
      if (input.justPressed('ArrowLeft') || input.justPressed('KeyA')) {
        G.upgradeTree = (G.upgradeTree + 2) % 3;
        G.upgradeLevel = G.save.upgrades[trees[G.upgradeTree]] || 0;
        sound.playSFX('select');
      }
      if (input.justPressed('ArrowRight') || input.justPressed('KeyD')) {
        G.upgradeTree = (G.upgradeTree + 1) % 3;
        G.upgradeLevel = G.save.upgrades[trees[G.upgradeTree]] || 0;
        sound.playSFX('select');
      }
      if (input.justPressed('Enter') || input.justPressed('Space')) {
        purchaseUpgrade(trees[G.upgradeTree], G.upgradeLevel);
        G.upgradeLevel = G.save.upgrades[trees[G.upgradeTree]] || 0;
      }
      if (input.justPressed('Escape')) beginTransition(G.state, ST.ZONE_MAP);
      break;
    }
    case ST.CUTSCENE: {
      G.cutsceneProgress += dt * 0.5;
      if ((input.justPressed('Space') || input.justPressed('Enter') || tap) && G.cutsceneProgress >= 1) {
        const room = ROOM_DEFS[G.currentRoom];
        if (room.isBoss) {
          beginTransition(G.state, ST.BOSS_INTRO);
        } else if (room.enemies.length > 0 && room.enemies.some(e => e.alive)) {
          beginTransition(G.state, ST.COMBAT);
        } else {
          beginTransition(G.state, ST.EXPLORE);
        }
      }
      // Skip: fast-forward
      if (input.justPressed('Space') || tap) {
        if (G.cutsceneProgress < 1) G.cutsceneProgress = 1;
      }
      break;
    }
    case ST.GAMEOVER: {
      if (input.justPressed('KeyR') || input.justPressed('Space') || tap) {
        G.transGuard = false;
        beginTransition(G.state, ST.TITLE);
      }
      break;
    }
    case ST.VICTORY: {
      if (input.justPressed('KeyR') || input.justPressed('Space') || tap) {
        G.transGuard = false;
        beginTransition(G.state, ST.TITLE);
      }
      break;
    }
    case ST.PAUSE: {
      if (input.justPressed('Escape') || input.justPressed('KeyP') || input.btnJust('pause')) {
        enterState(G.prevState); // Immediate return (F28 coder wisdom)
        return;
      }
      if (input.justPressed('ArrowUp') || input.justPressed('KeyW')) {
        G.pauseMenuIdx = (G.pauseMenuIdx + 1) % 2; sound.playSFX('select');
      }
      if (input.justPressed('ArrowDown') || input.justPressed('KeyS')) {
        G.pauseMenuIdx = (G.pauseMenuIdx + 1) % 2; sound.playSFX('select');
      }
      if (input.justPressed('Enter') || input.justPressed('Space') || tap) {
        if (tap) {
          const bw = 180, bh = 40;
          for (let i = 0; i < 2; i++) {
            const oy = H * 0.4 + i * 50;
            if (pointInRect(tap.x, tap.y, { x: W/2 - bw/2, y: oy, w: bw, h: bh })) {
              G.pauseMenuIdx = i;
            }
          }
        }
        if (G.pauseMenuIdx === 0) {
          enterState(G.prevState); // Resume
        } else {
          G.transGuard = false;
          beginTransition(G.state, ST.TITLE);
        }
      }
      break;
    }
  }
}

// Handle gameplay input (explore/combat/boss)
function handleGameInput(dt) {
  // Pause
  if (input.justPressed('Escape') || input.justPressed('KeyP') || input.btnJust('pause')) {
    beginTransition(G.state, ST.PAUSE, true);
    return;
  }
  // Movement
  let moveX = 0;
  if (input.held('ArrowLeft') || input.held('KeyA')) moveX = -1;
  if (input.held('ArrowRight') || input.held('KeyD')) moveX = 1;
  // Touch joystick
  if (input.joyActive) {
    if (Math.abs(input.joyDir.x) > 0.2) moveX = input.joyDir.x > 0 ? 1 : -1;
  }
  const spdMul = 1 + getArtifactBonus(P, 'moveSpd');
  const timeSpd = (G.timeStopActive && hasArtifact(P, 'timeGap')) ? 2 : 1;
  P.vx = moveX * CFG.MOVE_SPD * spdMul * timeSpd;
  if (moveX !== 0) { P.dir = moveX; P.facing = moveX; }
  // Dash
  if (P.dashTimer > 0) {
    P.vx = P.dashDir * (CFG.DASH_DIST / CFG.DASH_DUR) * (1 + getUpgradeBonus('rift', 2, 0.3));
  }
  // Jump
  const jumpMul = 1 + getArtifactBonus(P, 'jumpHeight') + getUpgradeBonus('echo', 2, 0.2);
  if ((input.justPressed('ArrowUp') || input.justPressed('KeyW') || input.justPressed('Space') || input.btnJust('btnB')) && P.onGround) {
    P.vy = CFG.JUMP_VEL * P.gravDir * jumpMul;
    P.onGround = false;
  }
  // Wall jump
  if ((input.justPressed('ArrowUp') || input.justPressed('KeyW') || input.justPressed('Space') || input.btnJust('btnB')) && P.onWall && !P.onGround) {
    activateWallJump(P);
  }
  // Dash activation
  if (input.justPressed('ShiftLeft') || input.justPressed('ShiftRight') || input.btnJust('btnC')) {
    activateDash(P, P.dir);
  }
  // Melee attack
  if (input.justPressed('KeyZ') || input.justPressed('KeyJ') || input.btnJust('btnA')) {
    const room = ROOM_DEFS[G.currentRoom];
    meleeAttack(P, room ? room.enemies : [], G.currentBoss);
  }
  // Ranged attack (keyboard X/K or mobile btnR)
  if (input.justPressed('KeyX') || input.justPressed('KeyK') || input.btnJust('btnR')) {
    rangedAttack(P);
  }
  // Special ability
  if (input.justPressed('KeyC') || input.justPressed('KeyL') || input.btnJust('btnS')) {
    cycleAbility(P);
  }
  // Interact (E key)
  if (input.justPressed('KeyE')) {
    handleInteract();
  }
  // Move to exit zone (right edge)
  if (P.x + P.w > CFG.ROOM_W - CFG.TILE * 2) {
    const room = ROOM_DEFS[G.currentRoom];
    if (room && room.cleared) {
      moveToNextRoom();
    }
  }
}

// Handle E key interaction
function handleInteract() {
  const room = ROOM_DEFS[G.currentRoom];
  if (!room) return;
  // Check switches
  for (const sw of room.switches) {
    if (hitTest(P.x, P.y, P.w, P.h, sw.x - 10, sw.y - 10, sw.w + 20, sw.h + 20)) {
      sw.active = !sw.active;
      sound.playSFX('select');
      P.energy = Math.min(P.maxEnergy, P.energy + CFG.ENERGY_PUZZLE);
      P.score += 200;
    }
  }
}

// Update physics for player
function updatePhysics(dt) {
  if (!sys(SYS.PHYSICS)) return;
  // Gravity
  P.vy += CFG.GRAVITY * P.gravDir * dt;
  // Apply velocity
  P.x += P.vx * dt;
  P.y += P.vy * dt;
  // Resolve tile collisions
  const room = ROOM_DEFS[G.currentRoom];
  if (room) {
    resolveEntityTiles(P, room);
    updatePlatforms(dt, room);
  }
  // Clamp to room bounds
  P.x = Math.max(CFG.TILE, Math.min(CFG.ROOM_W - CFG.TILE - P.w, P.x));
  P.y = Math.max(CFG.TILE, Math.min(CFG.ROOM_H - CFG.TILE - P.h, P.y));
  // Animation state
  if (P.meleeAnim > 0) P.animState = 'melee';
  else if (Math.abs(P.vx) > 10) P.animState = 'walk';
  else P.animState = 'idle';
  P.animT += dt;
}

// Main game loop
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, CFG.DT_CAP);
  lastTime = timestamp;
  gameTime += dt;
  // 1. System updates based on active systems matrix
  if (sys(SYS.TWEEN)) tw.update(dt);
  if (sys(SYS.INPUT)) processInput(dt);
  if (sys(SYS.PHYSICS)) updatePhysics(dt);
  if (sys(SYS.ABILITY)) updateAbilities(dt, P);
  const room = ROOM_DEFS[G.currentRoom];
  if (sys(SYS.ENEMY) && room) updateEnemies(dt, room.enemies, P, room);
  if (sys(SYS.COMBAT)) {
    updateProjectiles(dt, G.projectiles, P, room ? room.enemies : [], G.currentBoss);
    if (G.currentBoss) updateBoss(dt, G.currentBoss, P);
  }
  if (sys(SYS.CAMERA)) {
    cam.follow(P.x + P.w/2, P.y + P.h/2, dt);
    cam.update(dt);
  }
  if (sys(SYS.PARTICLE)) pool.update(dt);
  // Boot auto-transition
  if (G.state === ST.BOOT) {
    G.bootTimer += dt;
    if (G.bootTimer > 0.5) beginTransition(ST.BOOT, ST.TITLE);
  }
  // Boss intro auto-advance
  if (G.state === ST.BOSS_INTRO) {
    G.bossIntroTimer += dt;
    if (G.bossIntroTimer > 2) beginTransition(G.state, ST.BOSS);
  }
  // Game over shake decay
  if (G.gameOverShake > 0) G.gameOverShake -= dt;
  // 2. Detect combat state switch
  if (G.state === ST.EXPLORE && room && room.enemies.some(e => e.alive)) {
    // Check if any enemy is close
    for (const e of room.enemies) {
      if (e.alive && Math.abs(e.x - P.x) < 300) {
        beginTransition(G.state, ST.COMBAT);
        break;
      }
    }
  }
  // 3. Render
  render(dt);
  // 4. Clear just-pressed states
  input.clearFrame();
  // 5. Loop
  requestAnimationFrame(gameLoop);
}

// Render function
function render(dt) {
  ctx.clearRect(0, 0, W, H);
  switch (G.state) {
    case ST.BOOT:
      drawLoadingScreen(ctx, W, H, Math.min(1, G.bootTimer * 2));
      break;
    case ST.TITLE:
      drawTitleScreen(ctx, W, H, 1, gameTime);
      break;
    case ST.DIFFICULTY:
      drawDifficultyScreen(ctx, W, H, G.diffIdx, gameTime);
      break;
    case ST.ZONE_MAP:
      drawZoneMap(ctx, W, H, getAccessibleRooms(P.abilities.map((a,i) => a ? i : -1).filter(x => x >= 0)),
        G.currentRoom, G.save.bossesDefeated, gameTime);
      break;
    case ST.EXPLORE:
    case ST.COMBAT:
    case ST.PUZZLE:
      renderGameplay(dt);
      break;
    case ST.BOSS_INTRO:
      renderGameplay(dt);
      drawBossIntro(ctx, W, H, ROOM_DEFS[G.currentRoom].zone, Math.min(1, G.bossIntroTimer / 1.5), gameTime);
      break;
    case ST.BOSS:
      renderGameplay(dt);
      break;
    case ST.BOSS_CLEAR: {
      renderGameplay(dt);
      // Boss clear overlay
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15;
      ctx.fillText(t('bossClear'), W/2, H * 0.3);
      ctx.shadowBlur = 0;
      if (G.abilityJustUnlocked >= 0) {
        ctx.font = '16px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = '#00E5FF';
        ctx.fillText(t('newAbility') + ' ' + t(ABILITY_NAMES[G.abilityJustUnlocked]), W/2, H * 0.42);
      }
      const pa = 0.5 + 0.5 * Math.sin(gameTime * 3);
      ctx.globalAlpha = pa;
      ctx.font = '13px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#8080a0';
      ctx.fillText('SPACE / Tap ▶', W/2, H * 0.6);
      ctx.globalAlpha = 1;
      break;
    }
    case ST.ARTIFACT_SELECT:
      renderGameplay(dt);
      drawArtifactSelect(ctx, W, H, G.artifactChoices, G.artifactSelectedIdx, gameTime);
      break;
    case ST.UPGRADE:
      drawUpgradeScreen(ctx, W, H, G.save, G.upgradeTree,
        G.save.upgrades[['shadow','rift','echo'][G.upgradeTree]] || 0, gameTime);
      break;
    case ST.ROOM_TRANSITION:
      renderGameplay(dt);
      break;
    case ST.CUTSCENE:
      renderGameplay(dt);
      drawCutscene(ctx, W, H, G.cutsceneText, G.cutsceneProgress, gameTime);
      break;
    case ST.VICTORY:
      drawVictoryScreen(ctx, W, H, P.score, !!G.isTrueEnd, gameTime);
      break;
    case ST.GAMEOVER:
      drawGameOverScreen(ctx, W, H, P.score, G.save.bestScore, G.isNewBest, G.gameOverShake, gameTime);
      break;
    case ST.PAUSE:
      renderGameplay(dt);
      drawPauseScreen(ctx, W, H, G.pauseMenuIdx, gameTime);
      break;
    case ST.MODAL:
      renderGameplay(dt);
      break;
  }
  // Transition overlay
  if (G.transitioning && G.transAlpha > 0) {
    ctx.fillStyle = `rgba(10,10,15,${G.transAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
  // DDA notification
  drawDDANotification(ctx, W, H, G.ddaLevel, G.ddaNotifyAlpha);
}

// Render gameplay (world + entities + HUD)
function renderGameplay(dt) {
  const room = ROOM_DEFS[G.currentRoom];
  const zoneIdx = room ? room.zone : 0;
  // Background
  drawBackground(ctx, W, H, cam.x, cam.y, zoneIdx, gameTime);
  // Camera transform
  cam.apply(ctx, W, H);
  // Room
  if (room) drawRoom(ctx, cam.x, cam.y, room, zoneIdx, gameTime);
  // Enemies
  if (room) {
    for (const e of room.enemies) {
      if (!e.alive) continue;
      drawEnemy(ctx, e.x, e.y, e.w, e.h, e.type, e.hp, e.maxHp, e.zone, e.animT, e.flashTimer, gameTime);
    }
  }
  // Boss
  if (G.currentBoss && G.currentBoss.alive) {
    drawBoss(ctx, G.currentBoss.x, G.currentBoss.y, G.currentBoss.w, G.currentBoss.h,
      G.currentBoss.phase, G.currentBoss.hp, G.currentBoss.maxHp,
      G.currentBoss.zone, G.currentBoss.animT, G.currentBoss.weakExposed, gameTime);
  }
  // Projectiles
  drawProjectiles(ctx, G.projectiles, gameTime);
  // Particles (in world space)
  drawParticles(ctx, pool, gameTime);
  // Player
  drawPlayer(ctx, P.x, P.y, P.w, P.h, P.dir, P.animState, P.invTimer, P.dashTimer,
    P.abilities, P.gravDir, gameTime);
  cam.restore(ctx);
  // HUD (screen space)
  drawHUD(ctx, W, H, P, room, P.score, P.comboCount, P.comboTimer, currentLang, gameTime);
  // Touch controls
  drawTouchControls(ctx, W, H, input, P.abilities);
}

// ══ INITIALIZATION ══
async function init() {
  // 1. CONFIG already declared (R1)
  // 2. Global variables already declared (G, P, cam, etc.)
  // 3. SeededRNG initialized
  // 4. Canvas / ctx assignment
  initCanvas();
  // 5. TweenManager created
  // 6. ObjectPool created
  // 7. SoundManager created (awaits user gesture)
  // 8. InputManager created
  // 9. Event listeners
  registerEvents();
  // 10. Resize
  resizeCanvas();
  // 11. Load save data
  loadGame();
  // 12. Enter boot state
  G.state = ST.BOOT;
  // 13. Start game loop
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Start the game
init();
</script>
