// SeededRNG (F18) — no Math.random allowed
class SeededRNG {
  constructor(seed) { this.seed = seed || 12345; }
  next() { this.seed = (this.seed * 16807 + 0) % 2147483647; return (this.seed - 1) / 2147483646; }
  nextInt(min, max) { return min + ((this.next() * (max - min + 1)) | 0); }
  pick(arr) { return arr[(this.next() * arr.length) | 0]; }
  shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = (this.next() * (i + 1)) | 0; [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
}

// TweenManager (F4, F5, F13, F14)
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; this._updating = false; }
  // Add a tween — returns tween object
  add(obj, props, dur, opts = {}) {
    const tw = { obj, props: {}, dur, elapsed: 0, ease: opts.ease || 'easeOut',
      onComplete: opts.onComplete || null, onUpdate: opts.onUpdate || null,
      guard: false, dead: false };
    for (const k in props) { tw.props[k] = { from: obj[k], to: props[k] }; }
    if (this._updating) this._toAdd.push(tw); else this._tweens.push(tw);
    return tw;
  }
  // Immediate clear (F13) — safe to call anytime
  clearImmediate() { this._tweens.length = 0; this._toAdd.length = 0; }
  // Update all tweens
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.dead) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      let p = Math.min(tw.elapsed / tw.dur, 1);
      p = this._ease(p, tw.ease);
      for (const k in tw.props) {
        const pr = tw.props[k];
        tw.obj[k] = pr.from + (pr.to - pr.from) * p;
      }
      if (tw.onUpdate) tw.onUpdate(tw.obj);
      if (tw.elapsed >= tw.dur) {
        tw.dead = true;
        this._tweens.splice(i, 1);
        if (tw.onComplete && !tw.guard) { tw.guard = true; tw.onComplete(); }
      }
    }
    this._updating = false;
    // Flush pending adds
    if (this._toAdd.length) { this._tweens.push(...this._toAdd); this._toAdd.length = 0; }
  }
  _ease(t, type) {
    switch (type) {
      case 'linear': return t;
      case 'easeIn': return t * t;
      case 'easeOut': return 1 - (1 - t) * (1 - t);
      case 'easeInOut': return t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) * (-2 * t + 2) / 2;
      case 'bounceOut': {
        if (t < 1/2.75) return 7.5625*t*t;
        if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
        if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
        return 7.5625*(t-=2.625/2.75)*t+0.984375;
      }
      default: return 1 - (1 - t) * (1 - t);
    }
  }
}

// Object Pool for particles
class ObjectPool {
  constructor(max) { this.pool = []; this.max = max; }
  // Spawn a particle
  spawn(x, y, vx, vy, life, color, size, type) {
    if (this.pool.length >= this.max) this.pool.shift();
    this.pool.push({ x, y, vx, vy, life, maxLife: life, color, size, type: type || 'circle', alpha: 1 });
  }
  // Update all particles
  update(dt) {
    for (let i = this.pool.length - 1; i >= 0; i--) {
      const p = this.pool[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / p.maxLife);
      if (p.life <= 0) this.pool.splice(i, 1);
    }
  }
  clear() { this.pool.length = 0; }
}

// SoundManager — Web Audio API procedural (§15)
class SoundManager {
  constructor() { this.ctx = null; this.masterGain = null; this.bgmGain = null;
    this.sfxVol = 0.7; this.bgmVol = 0.5; this.bgmOsc = []; this.initialized = false; }
  // Init on user gesture
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = this.bgmVol;
      this.bgmGain.connect(this.masterGain);
      this.initialized = true;
    } catch(e) { /* silent fail */ }
  }
  // Resume context if suspended
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  // Play procedural SFX
  playSFX(type) {
    if (!this.initialized) return;
    const c = this.ctx, t = c.currentTime;
    const g = c.createGain(); g.gain.value = this.sfxVol; g.connect(this.masterGain);
    switch(type) {
      case 'melee': { // High freq burst 800->200Hz
        const o = c.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(800, t); o.frequency.linearRampToValueAtTime(200, t + 0.1);
        g.gain.setValueAtTime(this.sfxVol, t); g.gain.linearRampToValueAtTime(0, t + 0.12);
        o.connect(g); o.start(t); o.stop(t + 0.12); break;
      }
      case 'ranged': { // Mid freq 400Hz + echo
        const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = 400;
        g.gain.setValueAtTime(this.sfxVol * 0.6, t); g.gain.linearRampToValueAtTime(0, t + 0.15);
        o.connect(g); o.start(t); o.stop(t + 0.15); break;
      }
      case 'dash': { // Wind noise
        const buf = c.createBuffer(1, c.sampleRate * 0.2, c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (rng.next() * 2 - 1) * 0.3;
        const src = c.createBufferSource(); src.buffer = buf;
        const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.5;
        src.connect(bp); bp.connect(g);
        g.gain.setValueAtTime(this.sfxVol * 0.5, t); g.gain.linearRampToValueAtTime(0, t + 0.2);
        src.start(t); src.stop(t + 0.2); break;
      }
      case 'wallJump': { // Short tap
        const o = c.createOscillator(); o.type = 'square'; o.frequency.value = 1200;
        g.gain.setValueAtTime(this.sfxVol * 0.4, t); g.gain.linearRampToValueAtTime(0, t + 0.05);
        o.connect(g); o.start(t); o.stop(t + 0.05); break;
      }
      case 'dimShift': { // Reverse reverb
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(800, t + 0.4);
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(this.sfxVol * 0.5, t + 0.3);
        g.gain.linearRampToValueAtTime(0, t + 0.4);
        o.connect(g); o.start(t); o.stop(t + 0.4); break;
      }
      case 'timeStop': { // Deep drone
        const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 80;
        g.gain.setValueAtTime(this.sfxVol * 0.6, t); g.gain.linearRampToValueAtTime(0, t + 0.5);
        o.connect(g); o.start(t); o.stop(t + 0.5); break;
      }
      case 'gravReverse': { // Glissando
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(200, t); o.frequency.linearRampToValueAtTime(800, t + 0.15);
        o.frequency.linearRampToValueAtTime(200, t + 0.3);
        g.gain.setValueAtTime(this.sfxVol * 0.5, t); g.gain.linearRampToValueAtTime(0, t + 0.3);
        o.connect(g); o.start(t); o.stop(t + 0.3); break;
      }
      case 'hit': { // Noise burst
        const buf = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (rng.next() * 2 - 1) * 0.5;
        const src = c.createBufferSource(); src.buffer = buf; src.connect(g);
        g.gain.setValueAtTime(this.sfxVol * 0.7, t); g.gain.linearRampToValueAtTime(0, t + 0.08);
        src.start(t); src.stop(t + 0.08); break;
      }
      case 'bossAppear': { // Low freq drum roll
        const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 50;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(this.sfxVol, t + 1.2);
        g.gain.linearRampToValueAtTime(0, t + 1.5);
        o.connect(g); o.start(t); o.stop(t + 1.5); break;
      }
      case 'bossDefeat': { // Chord C-E-G
        [261.6, 329.6, 392].forEach((f, i) => {
          const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = f;
          const g2 = c.createGain(); g2.gain.value = this.sfxVol * 0.3; g2.connect(this.masterGain);
          o.connect(g2); o.start(t + i * 0.1); o.stop(t + 0.8);
          g2.gain.setValueAtTime(this.sfxVol * 0.3, t + i * 0.1);
          g2.gain.linearRampToValueAtTime(0, t + 0.8);
        }); break;
      }
      case 'artifact': { // Arpeggio C5-E5-G5-C6
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
          const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
          const g2 = c.createGain(); g2.gain.value = this.sfxVol * 0.25; g2.connect(this.masterGain);
          o.connect(g2); o.start(t + i * 0.12); o.stop(t + 0.6);
          g2.gain.setValueAtTime(this.sfxVol * 0.25, t + i * 0.12);
          g2.gain.linearRampToValueAtTime(0, t + 0.6);
        }); break;
      }
      case 'abilityUnlock': { // Fanfare 3-note ascend
        [392, 523.25, 659.25].forEach((f, i) => {
          const o = c.createOscillator(); o.type = 'square'; o.frequency.value = f;
          const g2 = c.createGain(); g2.gain.value = this.sfxVol * 0.3; g2.connect(this.masterGain);
          o.connect(g2); o.start(t + i * 0.25); o.stop(t + 1.0);
          g2.gain.setValueAtTime(this.sfxVol * 0.3, t + i * 0.25);
          g2.gain.linearRampToValueAtTime(0, t + 1.0);
        }); break;
      }
      case 'select': { // UI click
        const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 600;
        g.gain.setValueAtTime(this.sfxVol * 0.3, t); g.gain.linearRampToValueAtTime(0, t + 0.06);
        o.connect(g); o.start(t); o.stop(t + 0.06); break;
      }
    }
  }
  // Start zone BGM
  startBGM(zoneIdx) {
    this.stopBGM();
    if (!this.initialized) return;
    const c = this.ctx, t = c.currentTime;
    const freqs = [[220, 165], [330, 247], [185, 139], [277, 207], [370, 277]];
    const types = ['sawtooth','sine','triangle','square','sine'];
    const zf = freqs[zoneIdx % 5] || freqs[0];
    const otype = types[zoneIdx % 5] || 'sine';
    for (let i = 0; i < 2; i++) {
      const o = c.createOscillator(); o.type = otype;
      o.frequency.value = zf[i];
      const g2 = c.createGain(); g2.gain.value = 0.12;
      o.connect(g2); g2.connect(this.bgmGain);
      o.start(t);
      this.bgmOsc.push({ osc: o, gain: g2 });
    }
    // Add LFO for movement
    const lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.5;
    const lfoG = c.createGain(); lfoG.gain.value = 10;
    lfo.connect(lfoG);
    if (this.bgmOsc[0]) lfoG.connect(this.bgmOsc[0].osc.frequency);
    lfo.start(t);
    this.bgmOsc.push({ osc: lfo, gain: lfoG });
  }
  // Stop BGM
  stopBGM() {
    for (const b of this.bgmOsc) { try { b.osc.stop(); } catch(e) {} }
    this.bgmOsc.length = 0;
  }
  setVolume(sfx, bgm) {
    this.sfxVol = sfx; this.bgmVol = bgm;
    if (this.bgmGain) this.bgmGain.gain.value = bgm;
  }
}

// InputManager — keyboard + touch (§3)
class InputManager {
  constructor() {
    this.keys = {}; this.keysJustPressed = {};
    this.touch = { active: false, joystick: null, buttons: {} };
    this.joyDir = { x: 0, y: 0 }; // -1 to 1
    this.joyBase = { x: 0, y: 0 }; this.joyPos = { x: 0, y: 0 };
    this.joyRadius = 60; this.joyActive = false;
    this.touchBtns = []; // runtime button rects
    this.tapQueue = []; // for menu taps
    this.doubleTapTimer = 0; this.lastTapTime = 0;
    this.swipeStart = null; this.isMobile = false;
  }
  // Check if system is active
  poll() { /* keys already captured via events */ }
  // Was key just pressed this frame?
  justPressed(code) {
    if (this.keysJustPressed[code]) { this.keysJustPressed[code] = false; return true; }
    return false;
  }
  // Is key currently held?
  held(code) { return !!this.keys[code]; }
  // Clear just-pressed state
  clearFrame() { for (const k in this.keysJustPressed) this.keysJustPressed[k] = false; }
  // Register touch button hit areas
  setButtons(btns) { this.touchBtns = btns; }
  // Check touch button
  btnPressed(name) { return !!this.touch.buttons[name]; }
  btnJust(name) {
    if (this.touch.buttons[name + '_just']) { this.touch.buttons[name + '_just'] = false; return true; }
    return false;
  }
  // Get tap position (for menus)
  getTap() { return this.tapQueue.shift() || null; }
  clearTaps() { this.tapQueue.length = 0; }
}

// Camera system (§4.5)
class Camera {
  constructor() { this.x = 0; this.y = 0; this.zoom = 1; this.shakeX = 0; this.shakeY = 0;
    this.shakeTimer = 0; this.shakeIntensity = 0; this.targetZoom = 1; }
  // Follow target with smooth lerp
  follow(tx, ty, dt) {
    this.x += (tx - this.x) * CFG.CAM_LERP * 60 * dt;
    this.y += (ty - this.y) * CFG.CAM_LERP * 60 * dt;
  }
  // Screen shake
  shake(intensity, duration) { this.shakeIntensity = intensity; this.shakeTimer = duration; }
  // Update shake
  update(dt) {
    if (this.shakeTimer > 0) {
      this.shakeTimer -= dt;
      this.shakeX = (rng.next() - 0.5) * 2 * this.shakeIntensity;
      this.shakeY = (rng.next() - 0.5) * 2 * this.shakeIntensity;
    } else { this.shakeX = 0; this.shakeY = 0; }
    this.zoom += (this.targetZoom - this.zoom) * 0.05;
  }
  // Apply transform
  apply(ctx, W, H) {
    ctx.save();
    ctx.translate(W / 2 + this.shakeX, H / 2 + this.shakeY);
    ctx.scale(this.zoom, this.zoom);
    ctx.translate(-this.x, -this.y);
  }
  restore(ctx) { ctx.restore(); }
  // Screen to world coordinates
  screenToWorld(sx, sy, W, H) {
    return { x: (sx - W/2) / this.zoom + this.x, y: (sy - H/2) / this.zoom + this.y };
  }
}

// Populate room with platforms and enemies based on seed
function populateRoom(room, seedRng, diffIdx) {
  const d = DIFF[diffIdx];
  room.enemies = [];
  room.platforms = [];
  room.switches = [];
  room.pickups = [];
  room.cleared = false;
  room.visited = false;
  const W = CFG.ROOM_W, H = CFG.ROOM_H;
  const T = CFG.TILE;
  // Ground tiles - create floor and walls
  room.tiles = [];
  // Floor
  for (let x = 0; x < W; x += T) room.tiles.push({ x, y: H - T, w: T, h: T });
  // Ceiling
  for (let x = 0; x < W; x += T) room.tiles.push({ x, y: 0, w: T, h: T });
  // Walls
  for (let y = T; y < H - T; y += T) { room.tiles.push({ x: 0, y, w: T, h: T }); room.tiles.push({ x: W - T, y, w: T, h: T }); }
  // Random platforms
  const platCount = seedRng.nextInt(2, 5);
  for (let i = 0; i < platCount; i++) {
    const px = seedRng.nextInt(T * 3, W - T * 6);
    const py = seedRng.nextInt(T * 3, H - T * 4);
    const pw = seedRng.nextInt(2, 5) * T;
    room.platforms.push({ x: px, y: py, w: pw, h: T * 0.5, type: 'static' });
  }
  // Moving platform
  if (seedRng.next() > 0.5) {
    const mx = seedRng.nextInt(T * 3, W - T * 6);
    const my = seedRng.nextInt(T * 4, H - T * 5);
    room.platforms.push({ x: mx, y: my, w: T * 3, h: T * 0.5, type: 'moving',
      startX: mx, endX: mx + 160, speed: 60, dir: 1 });
  }
  // Enemies (not in boss rooms)
  if (!room.isBoss) {
    const eCount = seedRng.nextInt(d.eCountBase, d.eCountBase + 2);
    for (let i = 0; i < eCount; i++) {
      const et = ENEMY_TYPES[seedRng.nextInt(0, Math.min(room.zone + 1, 4))];
      const ex = seedRng.nextInt(T * 3, W - T * 4);
      const ey = H - T * 2 - 48;
      room.enemies.push(createEnemy(et, ex, ey, d, room.zone));
    }
  }
  // Switches (in puzzle rooms mostly)
  if (room.roomIdx === 2 || seedRng.next() > 0.7) {
    room.switches.push({ x: seedRng.nextInt(T*4, W-T*5), y: H - T*2, w: T, h: T*0.5, active: false,
      linkedPlatIdx: room.platforms.length - 1 });
  }
  // Destructibles
  const dCount = seedRng.nextInt(0, 3);
  for (let i = 0; i < dCount; i++) {
    room.pickups.push({ x: seedRng.nextInt(T*3, W-T*4), y: H-T*2-24, w:24, h:24,
      type: 'crate', hp: 2, maxHp: 2, alive: true });
  }
}

// Create enemy from template
function createEnemy(template, x, y, diff, zoneIdx) {
  return {
    type: template.id, x, y, w: 32, h: 40,
    hp: template.hp * diff.eMul, maxHp: template.hp * diff.eMul,
    dmg: template.dmg * diff.eDmgMul, spd: template.spd,
    ai: template.ai, zone: zoneIdx,
    vx: 0, vy: 0, dir: 1, atkTimer: 0, atkCd: 2 + rng.next(),
    patrolX: x, patrolRange: 120, stunTimer: 0,
    summonTimer: 0, shieldUp: false, alive: true,
    animT: 0, flashTimer: 0
  };
}

// Create boss for zone
function createBoss(zoneIdx, diffIdx) {
  const z = ZONES[zoneIdx] || ZONES[0];
  const hpArr = zoneIdx < 5 ? z.bossHP : HIDDEN_BOSS.hp;
  return {
    zone: zoneIdx, x: CFG.ROOM_W * 0.7, y: CFG.ROOM_H - CFG.TILE * 2 - 80,
    w: 80, h: 80, hp: hpArr[diffIdx], maxHp: hpArr[diffIdx],
    phase: 0, phaseThresholds: zoneIdx < 5 ? [0.6, 0.3] : [0.75, 0.5, 0.25],
    dmg: 20 + zoneIdx * 5, dir: -1, alive: true,
    atkTimer: 0, atkCd: 3, atkType: null,
    phaseTransitioning: false, weakTimer: 0, weakExposed: false,
    rewardGiven: false, // F17 guard flag
    animT: 0, flashTimer: 0, introTimer: 0,
    projList: [], vx: 0, vy: 0
  };
}

// Check which rooms are accessible with current abilities
function getAccessibleRooms(unlockedAbilities) {
  const accessible = [];
  for (const r of ROOM_DEFS) {
    if (r.reqAbilities) {
      // All listed abilities must be unlocked
      if (r.reqAbilities.every(a => unlockedAbilities.includes(a))) accessible.push(r.id);
    } else if (r.reqAbility < 0 || unlockedAbilities.includes(r.reqAbility)) {
      accessible.push(r.id);
    }
  }
  return accessible;
}

// Get next room ID in zone progression
function getNextRoom(currentId) {
  const cur = ROOM_DEFS[currentId];
  if (!cur) return 0;
  // Same zone, next room
  const nextInZone = ROOM_DEFS.find(r => r.zone === cur.zone && r.roomIdx === cur.roomIdx + 1);
  if (nextInZone) return nextInZone.id;
  // Next zone first room
  const nextZone = ROOM_DEFS.find(r => r.zone === cur.zone + 1 && r.roomIdx === 0);
  if (nextZone) return nextZone.id;
  return -1; // victory
}

// ══ REGION 5: DRAW — All rendering functions (pure, F9)     ══
// ══════════════════════════════════════════════════════════════

// All rendering uses Canvas drawing — no external asset dependencies (F1)

// Draw background layers with parallax (pure function)
function drawBackground(ctx, W, H, camX, camY, zoneIdx, t) {
  const z = ZONES[zoneIdx] || ZONES[0];
  // Base gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, z.bg);
  grad.addColorStop(1, darken(z.bg, 0.5));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Layer 1 — far background starfield (slow parallax)
  drawStarfield(ctx, W, H, camX * 0.1, t, z.pri);
  // Layer 2 — mid-ground (faster parallax)
  drawMidground(ctx, W, H, camX * 0.3, z);
  // Zone-specific weather particles
  drawWeather(ctx, W, H, zoneIdx, t);
}

// Fallback starfield
function drawStarfield(ctx, W, H, offset, t, color) {
  const starSeed = new SeededRNG(42);
  ctx.fillStyle = color;
  for (let i = 0; i < 60; i++) {
    const sx = (starSeed.next() * W * 2 - offset) % W;
    const sy = starSeed.next() * H * 0.7;
    const sz = 1 + starSeed.next() * 2;
    const blink = 0.5 + 0.5 * Math.sin(t * 2 + i);
    ctx.globalAlpha = blink * 0.6;
    ctx.beginPath(); ctx.arc(sx < 0 ? sx + W : sx, sy, sz, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Fallback mid-ground silhouettes
function drawMidground(ctx, W, H, offset, zone) {
  ctx.fillStyle = zone.pri + '20';
  for (let i = 0; i < 5; i++) {
    const bx = (i * 200 - offset) % W;
    const bw = 40 + i * 15; const bh = 100 + i * 30;
    ctx.fillRect(bx < 0 ? bx + W : bx, H - bh - CFG.TILE, bw, bh);
  }
}

// Zone weather effects
function drawWeather(ctx, W, H, zoneIdx, t) {
  ctx.globalAlpha = 0.3;
  switch (zoneIdx) {
    case 0: // Ruin — sand particles
      ctx.fillStyle = '#D4A574';
      for (let i = 0; i < 20; i++) {
        const px = ((t * 80 + i * 50) % W);
        const py = 50 + Math.sin(t + i) * 30 + (i / 20) * H * 0.6;
        ctx.fillRect(px, py, 3, 1);
      }
      break;
    case 1: // Crystal — sparkle
      ctx.fillStyle = '#00E5FF';
      for (let i = 0; i < 15; i++) {
        const px = (Math.sin(t * 0.5 + i * 1.3) * 0.5 + 0.5) * W;
        const py = (Math.cos(t * 0.3 + i * 0.9) * 0.5 + 0.5) * H;
        const sz = 2 + Math.sin(t * 3 + i) * 1.5;
        ctx.beginPath(); ctx.arc(px, py, Math.max(0.5, sz), 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 2: // Abyss — bubbles rising
      ctx.fillStyle = '#7C4DFF';
      for (let i = 0; i < 12; i++) {
        const px = (i / 12) * W + Math.sin(t + i) * 20;
        const py = H - ((t * 30 + i * 60) % H);
        ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 3: // Magma — fire particles + lava wave
      ctx.fillStyle = '#FF6D00';
      for (let i = 0; i < 15; i++) {
        const px = (i / 15) * W + Math.sin(t * 2 + i) * 15;
        const py = H - 60 - ((t * 60 + i * 40) % (H * 0.5));
        const sz = 2 + Math.sin(t * 4 + i) * 1;
        ctx.beginPath(); ctx.arc(px, py, Math.max(0.5, sz), 0, Math.PI * 2); ctx.fill();
      }
      // Lava wave at bottom
      ctx.fillStyle = '#FF6D0060';
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 20) {
        ctx.lineTo(x, H - 15 + Math.sin(t * 2 + x * 0.02) * 8);
      }
      ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
      break;
    case 4: // Void — glitch scanlines
      ctx.fillStyle = '#E040FB';
      for (let i = 0; i < 8; i++) {
        const sy = ((t * 100 + i * 50) % H);
        ctx.globalAlpha = 0.1;
        ctx.fillRect(0, sy, W, 2);
      }
      break;
  }
  ctx.globalAlpha = 1;
}

// Draw room tiles and platforms (pure)
function drawRoom(ctx, camOffX, camOffY, room, zone, t) {
  const z = ZONES[zone] || ZONES[0];
  // Tiles (floor, ceiling, walls) — 2-tone border + top highlight
  for (const tile of room.tiles) {
    ctx.fillStyle = z.pri + '40';
    ctx.fillRect(tile.x, tile.y, tile.w, tile.h);
    // Top highlight
    ctx.fillStyle = z.sec + '30';
    ctx.fillRect(tile.x, tile.y, tile.w, 2);
    // Dark bottom edge
    ctx.fillStyle = '#00000040';
    ctx.fillRect(tile.x, tile.y + tile.h - 2, tile.w, 2);
    // Border
    ctx.strokeStyle = z.pri + '60';
    ctx.lineWidth = 1;
    ctx.strokeRect(tile.x, tile.y, tile.w, tile.h);
  }
  // Platforms
  for (const p of room.platforms) {
    const gp = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    gp.addColorStop(0, z.sec);
    gp.addColorStop(1, z.pri);
    ctx.fillStyle = gp;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // Glow on platform edge
    ctx.shadowColor = z.sec; ctx.shadowBlur = 4;
    ctx.strokeStyle = z.sec + '80'; ctx.lineWidth = 1;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;
  }
  // Switches — distinct shapes for colorblind accessibility
  for (const sw of room.switches) {
    const scx = sw.x + sw.w / 2, scy = sw.y + sw.h / 2;
    if (sw.active) {
      // Active: filled diamond + green glow
      ctx.fillStyle = '#00ff87';
      ctx.shadowColor = '#00ff87'; ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(scx, sw.y); ctx.lineTo(sw.x + sw.w, scy);
      ctx.lineTo(scx, sw.y + sw.h); ctx.lineTo(sw.x, scy);
      ctx.closePath(); ctx.fill();
      // Checkmark icon
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(scx - 6, scy); ctx.lineTo(scx - 2, scy + 5); ctx.lineTo(scx + 6, scy - 5);
      ctx.stroke();
    } else {
      // Inactive: square outline + dot pattern
      ctx.fillStyle = '#505070';
      ctx.fillRect(sw.x, sw.y, sw.w, sw.h);
      ctx.strokeStyle = '#8080a0'; ctx.lineWidth = 1.5;
      ctx.strokeRect(sw.x, sw.y, sw.w, sw.h);
      // Cross pattern to indicate "locked"
      ctx.strokeStyle = '#606080'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sw.x + 4, sw.y + 4); ctx.lineTo(sw.x + sw.w - 4, sw.y + sw.h - 4);
      ctx.moveTo(sw.x + sw.w - 4, sw.y + 4); ctx.lineTo(sw.x + 4, sw.y + sw.h - 4);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }
  // Destructibles / pickups
  for (const pk of room.pickups) {
    if (!pk.alive) continue;
    if (pk.type === 'crate') {
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(pk.x, pk.y, pk.w, pk.h);
      ctx.strokeStyle = '#D4A574'; ctx.lineWidth = 1;
      ctx.strokeRect(pk.x, pk.y, pk.w, pk.h);
    }
  }
  // Exit indicators
  ctx.fillStyle = z.sec + '60';
  ctx.fillRect(CFG.ROOM_W - CFG.TILE * 1.5, CFG.ROOM_H - CFG.TILE * 3, CFG.TILE, CFG.TILE * 2);
  // Pulsing arrow
  const arrowAlpha = 0.4 + 0.3 * Math.sin(t * 3);
  ctx.globalAlpha = arrowAlpha;
  ctx.fillStyle = z.sec;
  const ax = CFG.ROOM_W - CFG.TILE;
  const ay = CFG.ROOM_H - CFG.TILE * 2;
  ctx.beginPath(); ctx.moveTo(ax, ay - 8); ctx.lineTo(ax + 10, ay); ctx.lineTo(ax, ay + 8); ctx.fill();
  ctx.globalAlpha = 1;
}

// Draw player character (pure — F9)
function drawPlayer(ctx, x, y, w, h, dir, animState, invTimer, dashTimer, abilities, gravDir, t) {
  ctx.save();
  if (invTimer > 0 && Math.floor(t * 10) % 2 === 0) { ctx.globalAlpha = 0.4; }
  // Dash trail
  if (dashTimer > 0) {
    for (let i = 1; i <= 3; i++) {
      ctx.globalAlpha = 0.2 / i;
      const trailX = x - dir * i * 12;
      drawPlayerBody(ctx, trailX, y, w, h, dir, '#00E5FF', t);
    }
    ctx.globalAlpha = 1;
  }
  // Main body — Canvas rendering
  drawPlayerBody(ctx, x, y, w, h, dir, '#00E5FF', t);
  // Melee attack swing effect
  if (animState === 'melee') {
    ctx.strokeStyle = '#B388FF';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#B388FF'; ctx.shadowBlur = 8;
    const sa = dir > 0 ? -0.5 : 2.6;
    ctx.beginPath(); ctx.arc(x + w / 2 + dir * 20, y + h / 2, 30, sa, sa + 1.2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // Ability effects
  if (abilities[2] && G.dimShiftActive) { // Dimension shift aura
    ctx.strokeStyle = '#B388FF80';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(x - 4, y - 4, w + 8, h + 8);
    ctx.setLineDash([]);
  }
  if (abilities[3] && G.timeStopActive) { // Time stop aura
    ctx.beginPath();
    ctx.arc(x + w/2, y + h/2, 50, 0, Math.PI * 2);
    ctx.strokeStyle = '#7C4DFF40'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#7C4DFF10'; ctx.fill();
  }
  ctx.restore();
}

// Fallback player body drawing
function drawPlayerBody(ctx, x, y, w, h, dir, color, t) {
  // Cloak
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + w/2, y);
  ctx.bezierCurveTo(x + w + 4, y + h * 0.3, x + w + 2, y + h * 0.7, x + w/2 - dir * 5, y + h + 4);
  ctx.bezierCurveTo(x - 4, y + h * 0.7, x - 2, y + h * 0.3, x + w/2, y);
  ctx.fill();
  // Mask (white face)
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(x + w * 0.2, y + h * 0.1, w * 0.6, h * 0.3);
  // Eye slits (cyan glow)
  ctx.fillStyle = '#00E5FF';
  ctx.shadowColor = '#00E5FF'; ctx.shadowBlur = 6;
  ctx.fillRect(x + w * 0.28, y + h * 0.18, w * 0.15, h * 0.08);
  ctx.fillRect(x + w * 0.57, y + h * 0.18, w * 0.15, h * 0.08);
  ctx.shadowBlur = 0;
  // Energy blade (purple)
  if (dir > 0) {
    ctx.fillStyle = '#B388FF';
    ctx.fillRect(x + w + 2, y + h * 0.3, 3, h * 0.4);
  } else {
    ctx.fillStyle = '#B388FF';
    ctx.fillRect(x - 5, y + h * 0.3, 3, h * 0.4);
  }
}

// Draw enemy (pure — F9)
function drawEnemy(ctx, x, y, w, h, type, hp, maxHp, zone, animT, flashTimer, t) {
  ctx.save();
  if (flashTimer > 0) { ctx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 20); }
  {
    const z = ZONES[zone] || ZONES[0];
    // Zone-based Canvas rendering
    ctx.fillStyle = z.enemy;
    switch (zone) {
      case 0: // Ruin — stone golem (square)
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = z.pri + '80';
        ctx.fillRect(x + 4, y + 4, w - 8, h * 0.3);
        break;
      case 1: // Crystal — floating crystal (triangle)
        ctx.beginPath();
        ctx.moveTo(x + w/2, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h);
        ctx.closePath(); ctx.fill();
        break;
      case 2: // Abyss — tentacle shadow (improved solid silhouette)
        ctx.beginPath();
        ctx.moveTo(x, y + h);
        ctx.lineTo(x, y + h * 0.4);
        for (let i = 0; i <= w; i += 4) {
          ctx.lineTo(x + i, y + Math.sin(animT * 5 + i * 0.1) * 8 + h * 0.15);
        }
        ctx.lineTo(x + w, y + h * 0.4);
        ctx.lineTo(x + w, y + h);
        ctx.closePath(); ctx.fill();
        // Inner detail line
        ctx.strokeStyle = z.sec + '60'; ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= w; i += 4) {
          const py = y + Math.sin(animT * 5 + i * 0.1) * 6 + h * 0.35;
          i === 0 ? ctx.moveTo(x + i, py) : ctx.lineTo(x + i, py);
        }
        ctx.stroke();
        break;
      case 3: // Magma — slime (circle)
        ctx.beginPath();
        ctx.ellipse(x + w/2, y + h * 0.6, w/2, h * 0.5 + Math.sin(animT * 3) * 3, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 4: // Void — glitch phantom
        ctx.fillRect(x, y, w, h);
        if (Math.sin(t * 15) > 0.5) { ctx.fillStyle = z.sec; ctx.fillRect(x + 2, y + rng.next() * h * 0.5, w - 4, 3); }
        break;
      default: ctx.fillRect(x, y, w, h);
    }
    // Eyes
    ctx.fillStyle = '#FF1744';
    ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 4;
    ctx.fillRect(x + w * 0.25, y + h * 0.2, 4, 4);
    ctx.fillRect(x + w * 0.6, y + h * 0.2, 4, 4);
    ctx.shadowBlur = 0;
  }
  // HP bar
  if (hp < maxHp) {
    const barW = w * 1.2; const barH = 4;
    const bx = x + (w - barW) / 2; const by = y - 10;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = '#ef4444'; ctx.fillRect(bx, by, barW * (hp / maxHp), barH);
  }
  ctx.restore();
}

// Draw boss (pure — F9)
function drawBoss(ctx, x, y, w, h, phase, hp, maxHp, zone, animT, weakExposed, t) {
  ctx.save();
  const z = ZONES[zone] || ZONES[0];
  const pulseScale = 1 + Math.sin(animT * 2) * 0.03;
  ctx.translate(x + w/2, y + h/2);
  ctx.scale(pulseScale, pulseScale);
  ctx.translate(-w/2, -h/2);
  // Boss body
  const bossColor = z.pri;
  ctx.fillStyle = bossColor;
  ctx.shadowColor = bossColor; ctx.shadowBlur = 15;
  // Different shapes per zone boss
  switch (zone) {
    case 0: // Petrified King — large golem
      ctx.fillRect(-w*0.1, -h*0.1, w*1.2, h*1.2);
      // Cores
      const coreColors = ['#ef4444','#ffd700','#3b82f6'];
      const corePhase = Math.min(phase, 2);
      ctx.fillStyle = coreColors[corePhase];
      ctx.shadowColor = coreColors[corePhase]; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(w/2, h*0.4, 12, 0, Math.PI * 2); ctx.fill();
      break;
    case 1: // Prism Witch — crystal wings
      ctx.beginPath();
      ctx.moveTo(w/2, -h*0.2);
      ctx.lineTo(w*1.3, h*0.5); ctx.lineTo(w/2, h*1.1);
      ctx.lineTo(-w*0.3, h*0.5); ctx.closePath(); ctx.fill();
      // Wings
      ctx.fillStyle = z.sec + '80';
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + animT;
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(w/2 + Math.cos(angle) * w, h/2 + Math.sin(angle) * h * 0.6);
        ctx.lineTo(w/2 + Math.cos(angle + 0.3) * w * 0.8, h/2 + Math.sin(angle + 0.3) * h * 0.5);
        ctx.closePath(); ctx.fill();
      }
      break;
    case 2: // Abyss Lord — tentacles + eye
      // Tentacles
      ctx.strokeStyle = z.enemy; ctx.lineWidth = 6;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(w/2, h/2);
        const len = w * 0.8 + Math.sin(animT * 2 + i) * 10;
        ctx.bezierCurveTo(w/2 + Math.cos(a) * len * 0.5, h/2 + Math.sin(a) * len * 0.5,
          w/2 + Math.cos(a + 0.2) * len * 0.8, h/2 + Math.sin(a + 0.2) * len * 0.8,
          w/2 + Math.cos(a) * len, h/2 + Math.sin(a) * len);
        ctx.stroke();
      }
      // Central eye
      ctx.fillStyle = weakExposed ? '#FF1744' : z.pri;
      ctx.beginPath(); ctx.arc(w/2, h/2, 20, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(w/2, h/2, 8, 0, Math.PI * 2); ctx.fill();
      break;
    case 3: // Magma Titan — armored
      ctx.fillRect(-w*0.15, -h*0.05, w*1.3, h*1.1);
      // Lava cracks
      ctx.strokeStyle = '#FFAB00'; ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const lx = w * 0.2 + i * w * 0.15;
        ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx + 5, h * 0.4);
        ctx.lineTo(lx - 3, h * 0.8); ctx.stroke();
      }
      break;
    case 4: // Dimension Breaker — space distortion
      ctx.beginPath();
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 + animT * 0.5;
        const r = (i % 2 === 0 ? w * 0.6 : w * 0.3) + Math.sin(animT + i) * 5;
        const px = w/2 + Math.cos(a) * r;
        const py = h/2 + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      break;
    default: // Hidden boss — shifting form
      const hueShift = (animT * 30) % 360;
      ctx.fillStyle = `hsl(${hueShift}, 80%, 50%)`;
      ctx.beginPath(); ctx.arc(w/2, h/2, w * 0.5 + Math.sin(animT) * 5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  // Weak point indicator
  if (weakExposed) {
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(w/2, h * 0.4, 15, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
  // HP bar (above boss, in world space)
  const barW = w * 1.5; const barH = 8;
  const bx = x + (w - barW) / 2; const by = y - 20;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#333'; ctx.fillRect(bx, by, barW, barH);
  // Phase color
  const phaseColors = ['#ef4444', '#ff6d00', '#ffd700'];
  ctx.fillStyle = phaseColors[Math.min(phase, 2)] || '#ef4444';
  ctx.fillRect(bx, by, barW * Math.max(0, hp / maxHp), barH);
  // Phase dividers
  ctx.fillStyle = '#000';
  for (const th of [0.6, 0.3]) { ctx.fillRect(bx + barW * th - 1, by, 2, barH); }
}

// Draw HUD overlay (pure — F9)
function drawHUD(ctx, W, H, player, room, score, combo, comboTimer, lang, gt) {
  const pad = 12;
  // Heart icon (Canvas drawn before HP bar)
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  const hx = pad + 7, hy = pad + 4;
  ctx.moveTo(hx, hy + 3); ctx.bezierCurveTo(hx, hy, hx - 5, hy, hx - 5, hy + 3);
  ctx.bezierCurveTo(hx - 5, hy + 6, hx, hy + 9, hx, hy + 11);
  ctx.bezierCurveTo(hx, hy + 9, hx + 5, hy + 6, hx + 5, hy + 3);
  ctx.bezierCurveTo(hx + 5, hy, hx, hy, hx, hy + 3);
  ctx.fill();
  // HP bar (top left)
  const hpW = 160, hpH = 14;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(pad - 1, pad - 1, hpW + 2, hpH + 2);
  ctx.fillStyle = '#333'; ctx.fillRect(pad, pad, hpW, hpH);
  const hpRatio = Math.max(0, player.hp / player.maxHp);
  ctx.fillStyle = hpRatio > 0.5 ? '#00ff87' : hpRatio > 0.25 ? '#ffd700' : '#ef4444';
  ctx.fillRect(pad, pad, hpW * hpRatio, hpH);
  ctx.fillStyle = '#e0e0f0'; ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.ceil(player.hp)}/${Math.ceil(player.maxHp)}`, pad + 4, pad + hpH - 2);
  // Energy bar (below HP)
  const enY = pad + hpH + 6;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(pad - 1, enY - 1, hpW + 2, 10);
  ctx.fillStyle = '#333'; ctx.fillRect(pad, enY, hpW, 8);
  ctx.fillStyle = '#7C4DFF';
  ctx.fillRect(pad, enY, hpW * (player.energy / player.maxEnergy), 8);
  ctx.fillStyle = '#B388FF'; ctx.font = '9px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(`${Math.ceil(player.energy)}/${player.maxEnergy}`, pad + 4, enY + 7);
  // Score (top right)
  // Star icon for score (Canvas drawn)
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  const sx = W - pad - 91, sy = pad + 7, sr = 8;
  for (let i = 0; i < 5; i++) {
    const a = Math.PI / 2 + i * Math.PI * 2 / 5;
    const ai = a + Math.PI / 5;
    ctx[i === 0 ? 'moveTo' : 'lineTo'](sx + Math.cos(-a) * sr, sy + Math.sin(-a) * sr);
    ctx.lineTo(sx + Math.cos(-ai) * sr * 0.4, sy + Math.sin(-ai) * sr * 0.4);
  }
  ctx.closePath(); ctx.fill();
  ctx.textAlign = 'right'; ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText(`${t('score')}: ${score}`, W - pad, pad + 14);
  // Combo counter (right side)
  if (combo > 0 && comboTimer > 0) {
    const comboScale = 1 + Math.sin(comboTimer * 8) * 0.1;
    ctx.save();
    ctx.translate(W - pad, pad + 34);
    ctx.scale(comboScale, comboScale);
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`${combo} ${t('combo')}!`, 0, 0);
    ctx.restore();
  }
  // Ability icons (bottom left)
  const abilY = H - 50;
  const abilNames = ['dash','wallJump','dimShift','timeStop','gravReverse'];
  const abilColors = ['#00E5FF','#B388FF','#7C4DFF','#1A237E','#E040FB'];
  for (let i = 0; i < 5; i++) {
    const ax = pad + i * 36;
    ctx.fillStyle = player.abilities[i] ? abilColors[i] + '80' : '#333';
    ctx.fillRect(ax, abilY, 30, 30);
    ctx.strokeStyle = player.abilities[i] ? abilColors[i] : '#505070';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ax, abilY, 30, 30);
    if (player.abilities[i]) {
      ctx.fillStyle = '#e0e0f0'; ctx.font = '8px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(t(abilNames[i]).substring(0, 3), ax + 15, abilY + 18);
    }
  }
  ctx.textAlign = 'left';
  // Zone/Room indicator (top center)
  if (room) {
    ctx.textAlign = 'center'; ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#8080a0';
    const zn = ZONES[room.zone] || { name: { ko: '히든', en: 'Hidden' } };
    ctx.fillText(`${zn.name[currentLang] || zn.name.ko} ${room.roomIdx + 1}`, W / 2, pad + 14);
    ctx.textAlign = 'left';
  }
}

// Draw particles (pure)
function drawParticles(ctx, pool, t) {
  for (const p of pool.pool) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.alpha), 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'spark') {
      ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
    } else if (p.type === 'hit') {
      // Hit effect — Canvas drawn radial burst
      const sz = p.size * 2;
      ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      for (let a = 0; a < 6; a++) {
        const ang = a * Math.PI / 3 + p.x;
        ctx.beginPath();
        ctx.moveTo(p.x + Math.cos(ang) * sz * 0.3, p.y + Math.sin(ang) * sz * 0.3);
        ctx.lineTo(p.x + Math.cos(ang) * sz, p.y + Math.sin(ang) * sz);
        ctx.stroke();
      }
    } else if (p.type === 'text') {
      ctx.font = `bold ${Math.max(8, p.size)}px "Segoe UI", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text || '', p.x, p.y);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.alpha), 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// Draw projectiles
function drawProjectiles(ctx, projectiles, t) {
  for (const p of projectiles) {
    if (!p.alive) continue;
    ctx.fillStyle = p.owner === 'player' ? '#00E5FF' : '#FF1744';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// Draw touch controls (pure)
function drawTouchControls(ctx, W, H, input, abilities) {
  if (!input.isMobile) return;
  ctx.globalAlpha = 0.35;
  // Virtual joystick (left side)
  const jx = 80, jy = H - 100, jr = input.joyRadius;
  ctx.strokeStyle = '#e0e0f0'; ctx.lineWidth = 2;

// Dimensional rift effect (signature visual)
function drawDimensionalRift(ctx, cx, cy, size, t) {
  ctx.save();
  // Outer glow ring
  for (let i = 3; i >= 0; i--) {
    const r = size * 0.3 + i * size * 0.08;
    const grad = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r);
    grad.addColorStop(0, 'rgba(124,77,255,0)');
    grad.addColorStop(0.5, `rgba(0,229,255,${0.05 + i * 0.02})`);
    grad.addColorStop(1, 'rgba(224,64,251,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  }
  // Rift crack lines
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2; ctx.shadowColor = '#00E5FF'; ctx.shadowBlur = 8;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + t * 0.3;
    const len = size * 0.15 + Math.sin(t * 2 + i) * size * 0.05;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * size * 0.05, cy + Math.sin(angle) * size * 0.05);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.stroke();
  }
  // Swirling particles
  ctx.fillStyle = '#B388FF';
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + t * 0.8;
    const r = size * 0.1 + size * 0.1 * Math.sin(t * 1.5 + i * 0.7);
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    ctx.globalAlpha = 0.4 + 0.3 * Math.sin(t * 3 + i);
    ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  ctx.restore();
}

// Zone map screen
function drawZoneMap(ctx, W, H, accessibleRooms, currentRoomId, bossesDefeated, gt) {
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0'; ctx.fillText(t('zoneMap'), W/2, 30);
  // Draw zone nodes
  const centerX = W / 2, centerY = H / 2;
  for (let z = 0; z < 5; z++) {
    const angle = ((z - 2) / 5) * Math.PI * 0.8 - Math.PI / 2;
    const dist = 120;
    const nx = centerX + Math.cos(angle) * dist;
    const ny = centerY + Math.sin(angle) * dist * 0.5 + 20;
    const zone = ZONES[z];
    const accessible = accessibleRooms.includes(z * 4);
    const bossDown = bossesDefeated.includes(z);
    // Connection lines
    if (z > 0) {
      const pAngle = ((z - 3) / 5) * Math.PI * 0.8 - Math.PI / 2;
      const px = centerX + Math.cos(pAngle) * dist;
      const py = centerY + Math.sin(pAngle) * dist * 0.5 + 20;
      ctx.strokeStyle = accessible ? zone.pri + '60' : '#1e1e30';
      ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(nx, ny); ctx.stroke();
    }
    // Node circle
    const nr = 28;
    ctx.fillStyle = accessible ? zone.bg : '#12121e';
    ctx.strokeStyle = bossDown ? '#00ff87' : accessible ? zone.pri : '#1e1e30';
    ctx.lineWidth = bossDown ? 3 : 2;
    ctx.beginPath(); ctx.arc(nx, ny, nr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    if (accessible) { ctx.shadowColor = zone.pri; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(nx, ny, nr, 0, Math.PI * 2); ctx.stroke(); ctx.shadowBlur = 0; }
    // Zone name
    ctx.fillStyle = accessible ? '#e0e0f0' : '#505070';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(zone.name[currentLang], nx, ny + nr + 16);
    if (bossDown) {
      ctx.fillStyle = '#00ff87'; ctx.font = '14px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('✓', nx, ny + 5);
    }
    // Store hitbox for click detection
    zone._mapHit = { x: nx - nr, y: ny - nr, w: nr * 2, h: nr * 2 };
  }
  ctx.fillStyle = '#505070'; ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('1-5 / Click ' + t('choose'), W/2, H - 20);
}

// Artifact selection screen
function drawArtifactSelect(ctx, W, H, choices, selectedIdx, gt) {

  ctx.fillStyle = '#505070'; ctx.font = '12px "Segoe UI", system-ui, sans-serif';

}

// Upgrade screen
function drawUpgradeScreen(ctx, W, H, save, selectedTree, selectedLevel, gt) {
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0'; ctx.fillText(t('upgrade'), W/2, 30);
  // Echo points display
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ffd700'; ctx.fillText(`${t('echoPoints')}: ${save.echoPoints}`, W/2, 55);
  const trees = ['shadow', 'rift', 'echo'];
  const treeColors = ['#ef4444', '#7C4DFF', '#00E5FF'];
  const colW = 150, colH = 320;
  const startX = W/2 - (colW * 3 + 20) / 2;
  for (let ti = 0; ti < 3; ti++) {
    const tx = startX + ti * (colW + 10);
    const ty = 72;
    const treeData = UPGRADE_TREES[trees[ti]];
    const level = save.upgrades[trees[ti]] || 0;
    const sel = ti === selectedTree;
    // Tree header
    ctx.fillStyle = sel ? treeColors[ti] + '30' : '#12121e';
    ctx.fillRect(tx, ty, colW, colH);
    ctx.strokeStyle = sel ? treeColors[ti] : '#1e1e30';
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(tx, ty, colW, colH);
    ctx.fillStyle = treeColors[ti];
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(t(trees[ti]), tx + colW/2, ty + 22);
    // Levels
    for (let li = 0; li < 5; li++) {
      const ly = ty + 40 + li * 54;
      const unlocked = li < level;

      ctx.fillStyle = unlocked ? treeColors[ti] + '30' : current ? '#1a1a2e' : '#0f0f1a';
      ctx.fillRect(tx + 6, ly, colW - 12, 48);
      if (current) { ctx.strokeStyle = treeColors[ti]; ctx.lineWidth = 1.5; ctx.strokeRect(tx + 6, ly, colW - 12, 48); }

      ctx.fillStyle = unlocked ? '#e0e0f0' : '#8080a0';
      ctx.fillText(treeData[li].name[currentLang], tx + colW/2, ly + 18);
      ctx.font = '9px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = unlocked ? '#00ff87' : '#505070';
      ctx.fillText(unlocked ? '✓' : `${treeData[li].cost} EP`, tx + colW/2, ly + 34);
      ctx.fillStyle = '#505070';
      ctx.fillText(treeData[li].desc[currentLang], tx + colW/2, ly + 44);
    }
  }
  ctx.fillStyle = '#505070'; ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('←→↑↓ + ENTER / ESC ' + t('back'), W/2, H - 10);
}

// Game over screen
function drawGameOverScreen(ctx, W, H, score, bestScore, isNewBest, shakeT, gt) {
  ctx.fillStyle = 'rgba(10,10,15,0.85)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  // Shake effect
  const sx = shakeT > 0 ? (rng.next() - 0.5) * 10 * shakeT : 0;
  const sy = shakeT > 0 ? (rng.next() - 0.5) * 10 * shakeT : 0;
  ctx.save(); ctx.translate(sx, sy);
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ef4444';
  ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 15;
  ctx.fillText(t('gameover'), W/2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText(`${t('score')}: ${score}`, W/2, H * 0.42);
  if (isNewBest) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(`★ ${t('bestScore')}! ★`, W/2, H * 0.50);
  } else {
    ctx.fillStyle = '#8080a0';
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(`${t('bestScore')}: ${bestScore}`, W/2, H * 0.50);

  const pa = 0.5 + 0.5 * Math.sin(gt * 3);
  ctx.globalAlpha = pa;
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText(t('restart'), W/2, H * 0.65);
  ctx.globalAlpha = 1;

}

// Cutscene/story display
function drawCutscene(ctx, W, H, text, progress, gt) {
  ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, W, H);
  // Text box
  const bx = W * 0.1, by = H * 0.6, bw = W * 0.8, bh = H * 0.3;
  ctx.fillStyle = '#12121e'; ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#7C4DFF'; ctx.lineWidth = 1.5; ctx.strokeRect(bx, by, bw, bh);
  // Text with typewriter effect
  const visibleLen = Math.floor(text.length * Math.min(1, progress));
  ctx.fillStyle = '#e0e0f0'; ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  wrapText(ctx, text.substring(0, visibleLen), bx + 16, by + 30, bw - 32, 20);
  ctx.textAlign = 'center';
  if (progress >= 1) {
    const cpa = 0.5 + 0.5 * Math.sin(gt * 3);
    ctx.globalAlpha = cpa;
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#8080a0';
    ctx.fillText('SPACE / Tap ▶', W/2, H - 20);
    ctx.globalAlpha = 1;
  }
}

  // Progress bar
  const bw = 200, bh = 6;
  ctx.fillStyle = '#1e1e30'; ctx.fillRect(W/2 - bw/2, H/2 + 10, bw, bh);
  ctx.fillStyle = '#00E5FF'; ctx.fillRect(W/2 - bw/2, H/2 + 10, bw * progress, bh);
}

// DDA notification
function drawDDANotification(ctx, W, H, ddaLevel, alpha) {
  if (ddaLevel <= 0 || alpha <= 0) return;
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center'; ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ffd700';
  const key = ddaLevel === 1 ? 'dda1' : ddaLevel === 2 ? 'dda2' : 'dda3';
  ctx.fillText(t(key), W/2, H * 0.15);
  ctx.globalAlpha = 1;
}

// Utility: wrap text
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split('');
  let line = '';
  let ly = y;
  for (const ch of words) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, ly);
      line = ch; ly += lineH;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, ly);
}

// Utility: darken hex color
function darken(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.floor(r * factor)},${Math.floor(g * factor)},${Math.floor(b * factor)})`;
}

// Activate dash ability
function activateDash(player, dir) {
  if (!player.abilities[0] || player.dashCd > 0 || player.energy < 10) return false;
  player.dashTimer = CFG.DASH_DUR;
  player.dashCd = CFG.DASH_CD;
  player.dashDir = dir || player.dir;
  player.invTimer = Math.max(player.invTimer, CFG.DASH_IFRAMES);
  player.energy -= 10;
  sound.playSFX('dash');
  // Spawn dash particles
  for (let i = 0; i < 8; i++) {
    pool.spawn(player.x + player.w/2, player.y + player.h/2,
      (rng.next() - 0.5) * 100 - player.dashDir * 80,
      (rng.next() - 0.5) * 60,
      0.3, '#00E5FF', 3, 'circle');
  }
  return true;
}

// Wall jump
function activateWallJump(player) {
  if (!player.abilities[1] || !player.onWall) return false;
  player.vy = CFG.WALLJUMP_VEL * player.gravDir;
  player.vx = -player.wallDir * 200;
  player.onWall = false;
  sound.playSFX('wallJump');
  // Sparks
  for (let i = 0; i < 5; i++) {
    pool.spawn(player.x + (player.wallDir > 0 ? player.w : 0), player.y + player.h/2,
      -player.wallDir * (50 + rng.next() * 80), (rng.next() - 0.5) * 120,
      0.2, '#B388FF', 2, 'spark');
  }
  return true;
}

// Dimension shift toggle
function toggleDimShift(player) {
  if (!player.abilities[2] || player.dimShiftCd > 0 || player.energy < 20) return false;
  G.dimShiftActive = !G.dimShiftActive;
  player.dimShiftCd = 3;
  player.energy -= 20;
  sound.playSFX('dimShift');
  // Apply dimension storm artifact
  if (hasArtifact(player, 'dimStorm')) {
    applyAoEDamage(player.x + player.w/2, player.y + player.h/2, 120, 100);
  }
  // Visual burst
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    pool.spawn(player.x + player.w/2, player.y + player.h/2,
      Math.cos(a) * 120, Math.sin(a) * 120,
      0.4, G.dimShiftActive ? '#B388FF' : '#00E5FF', 4, 'circle');
  }
  return true;
}

// Time stop toggle
function toggleTimeStop(player) {
  if (!player.abilities[3]) return false;
  if (player.timeStopActive) {
    G.timeStopActive = false; player.timeStopActive = false;
    return true;
  }
  if (player.timeStopCd > 0 || player.energy < 30) return false;
  G.timeStopActive = true; player.timeStopActive = true;
  player.timeStopTimer = CFG.TIMESTOP_DUR + getArtifactBonus(player, 'timestop');
  player.energy -= 30;
  sound.playSFX('timeStop');
  return true;
}

// Gravity reverse toggle
function toggleGravReverse(player) {
  if (!player.abilities[4] || player.energy < 25) return false;
  player.gravDir *= -1;
  player.energy -= 25;
  sound.playSFX('gravReverse');
  return true;
}

// Special ability cycle (C key)
function cycleAbility(player) {
  // Find next available special ability (dimShift, timeStop, gravReverse)
  const specials = [2, 3, 4];
  const available = specials.filter(i => player.abilities[i]);
  if (available.length === 0) return;
  // Cycle through: use the current one or activate first available
  if (player.abilities[2] && !G.dimShiftActive && !G.timeStopActive) return toggleDimShift(player);
  if (player.abilities[3] && !G.timeStopActive) return toggleTimeStop(player);
  if (player.abilities[4]) return toggleGravReverse(player);
  // Fallback to first
  if (player.abilities[2]) return toggleDimShift(player);
}

// Update ability timers
function updateAbilities(dt, player) {
  if (player.dashCd > 0) player.dashCd -= dt;
  if (player.dashTimer > 0) player.dashTimer -= dt;
  if (player.dimShiftCd > 0) player.dimShiftCd -= dt;
  if (player.timeStopCd > 0) player.timeStopCd -= dt;
  // Time stop countdown
  if (player.timeStopActive) {
    player.timeStopTimer -= dt;
    if (player.timeStopTimer <= 0) {
      G.timeStopActive = false; player.timeStopActive = false;
      player.timeStopCd = 8;
    }
  }
  // Energy regen
  const regenMul = 1 + getArtifactBonus(player, 'energyRegen');
  player.energy = Math.min(player.maxEnergy, player.energy + CFG.ENERGY_REGEN * regenMul * dt);
  // Invincibility timer
  if (player.invTimer > 0) player.invTimer -= dt;
  // Melee cooldown
  if (player.meleeCd > 0) player.meleeCd -= dt;
  if (player.rangeCd > 0) player.rangeCd -= dt;
  if (player.meleeAnim > 0) player.meleeAnim -= dt;
  // Combo timer
  if (player.comboTimer > 0) {
    player.comboTimer -= dt;
    if (player.comboTimer <= 0) player.comboCount = 0;
  }
  // Knockback
  if (player.knockbackTimer > 0) player.knockbackTimer -= dt;
}

// AABB hit test — single function for all collision (F16)
function hitTest(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// Point in rect (for UI clicks)
function pointInRect(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// Melee attack
function meleeAttack(player, enemies, boss) {
  if (player.meleeCd > 0) return;
  player.meleeCd = CFG.MELEE_CD * (1 - getUpgradeBonus('shadow', 3, 0.15));
  player.meleeAnim = 0.25;
  player.animState = 'melee';
  sound.playSFX('melee');
  const dmg = calcMeleeDmg(player);
  const range = CFG.MELEE_RANGE * (1 + getArtifactBonus(player, 'riftBlade'));
  const cx = player.x + player.w/2 + player.dir * range * 0.5;
  const cy = player.y + player.h/2;
  // Check enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const dist = Math.hypot(e.x + e.w/2 - cx, e.y + e.h/2 - cy);
    if (dist < range) {
      dealDamageToEnemy(e, dmg, player);
    }
  }
  // Check boss
  if (boss && boss.alive) {
    const dist = Math.hypot(boss.x + boss.w/2 - cx, boss.y + boss.h/2 - cy);
    if (dist < range * 1.2) {
      dealDamageToBoss(boss, dmg, player);
    }
  }
  // Clone attack artifact
  if (hasArtifact(player, 'clone') && rng.next() < 0.5) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const dist = Math.hypot(e.x + e.w/2 - cx, e.y + e.h/2 - cy);
      if (dist < range) dealDamageToEnemy(e, dmg * 0.5, player);
    }
  }
}

// Ranged attack
function rangedAttack(player) {
  if (player.rangeCd > 0) return;
  player.rangeCd = CFG.RANGE_CD;
  sound.playSFX('ranged');
  const dmg = CFG.RANGE_DMG * (1 + getUpgradeBonus('shadow', 0, 0.1));
  // Check time stop combo
  const mul = (G.timeStopActive && hasArtifact(player, 'timeGap')) ? 2 : 1;
  G.projectiles.push(createProjectile(
    player.x + player.w/2 + player.dir * 10,
    player.y + player.h/2,
    player.dir * CFG.PROJ_SPD, 0,
    dmg * mul, 'player', G.timeStopActive ? 'pierce' : 'normal'
  ));
}

// Calculate melee damage with all modifiers
function calcMeleeDmg(player) {
  let dmg = CFG.MELEE_DMG;
  dmg *= (1 + getUpgradeBonus('shadow', 0, 0.1)); // Shadow blade
  dmg *= (1 + getArtifactBonus(player, 'meleeDmg'));
  // Crit check
  const critRate = CFG.CRIT_RATE + getUpgradeBonus('shadow', 2, 0.05);
  if (rng.next() < critRate) dmg *= CFG.CRIT_MUL;
  // Dash combo: if dashing, bonus damage
  if (player.dashTimer > 0) dmg *= 1.5;
  // DPS cap (F74)
  dmg = Math.min(dmg, CFG.MELEE_DMG * (1 + CFG.ART_DPS_CAP));
  return dmg;
}

// Deal damage to enemy
function dealDamageToEnemy(enemy, dmg, player) {
  enemy.hp -= dmg;
  enemy.flashTimer = 0.15;
  sound.playSFX('hit');
  // Hit particles
  spawnHitParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, ZONES[enemy.zone].enemy);
  if (enemy.hp <= 0) {
    enemy.alive = false;
    onEnemyKilled(enemy, player);
  }
}

// Deal damage to boss
function dealDamageToBoss(boss, dmg, player) {
  boss.hp -= dmg;
  boss.flashTimer = 0.15;
  sound.playSFX('hit');
  spawnHitParticles(boss.x + boss.w/2, boss.y + boss.h/2, ZONES[boss.zone].pri);
  // Phase transition check
  checkBossPhase(boss);
  if (boss.hp <= 0) {
    boss.alive = false;
    onBossKilled(boss, player);
  }
}

// On enemy killed
function onEnemyKilled(enemy, player) {
  player.score += 100 * getComboMultiplier(player);
  player.comboCount++;
  player.comboTimer = CFG.COMBO_TIME;
  player.energy = Math.min(player.maxEnergy, player.energy + CFG.ENERGY_KILL);
  // Void heart artifact: heal on kill
  if (hasArtifact(player, 'voidHeart')) {
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.05);
  }
  // Shadow burst upgrade: explosion on kill
  if (getUpgradeLevel('shadow') >= 5) {
    applyAoEDamage(enemy.x + enemy.w/2, enemy.y + enemy.h/2, 80, 50);
  }
  // Score popup particle
  pool.spawn(enemy.x + enemy.w/2, enemy.y - 10, 0, -40, 1, '#ffd700', 12, 'text');
  pool.pool[pool.pool.length - 1].text = '+' + Math.floor(100 * getComboMultiplier(player));
  // Check if all enemies dead -> room clear
  checkRoomClear();
}

// On boss killed (F17 guard)
function onBossKilled(boss, player) {
  if (boss.rewardGiven) return; // F17 guard
  boss.rewardGiven = true;
  player.score += 2000 * (player.hp / player.maxHp);
  sound.playSFX('bossDefeat');
  cam.shake(10, 0.5);
  // Unlock ability (zone boss grants ability matching zone index)
  if (boss.zone < 5 && !player.abilities[boss.zone]) {
    player.abilities[boss.zone] = true;
    G.abilityJustUnlocked = boss.zone;
    sound.playSFX('abilityUnlock');
  }
  // Grant echo points
  const epBonus = 1 + getUpgradeBonus('echo', 3, 0.25);
  const ep = Math.floor((boss.zone < 5 ? 200 : 1000) * epBonus);
  G.save.echoPoints += ep;
  G.save.bossesDefeated.push(boss.zone);
  // Victory particles
  for (let i = 0; i < 30; i++) {
    const a = (i / 30) * Math.PI * 2;
    pool.spawn(boss.x + boss.w/2, boss.y + boss.h/2,
      Math.cos(a) * (100 + rng.next() * 100), Math.sin(a) * (100 + rng.next() * 100),
      1, ZONES[boss.zone % 5].pri, 4 + rng.next() * 4, 'circle');
  }
  // Transition to boss clear state
  G.transGuard = true;
  beginTransition(G.state, ST.BOSS_CLEAR);
}

// Spawn hit effect particles
function spawnHitParticles(x, y, color) {
  for (let i = 0; i < 6; i++) {
    pool.spawn(x, y, (rng.next() - 0.5) * 150, (rng.next() - 0.5) * 150,
      0.3, color, 3, 'circle');
  }
}

// Apply area-of-effect damage
function applyAoEDamage(cx, cy, radius, dmg) {
  const room = ROOM_DEFS[G.currentRoom];
  if (!room) return;
  for (const e of room.enemies) {
    if (!e.alive) continue;
    const dist = Math.hypot(e.x + e.w/2 - cx, e.y + e.h/2 - cy);
    if (dist < radius) { e.hp -= dmg; if (e.hp <= 0) { e.alive = false; } }
  }
}

// Combo multiplier
function getComboMultiplier(player) {
  const c = player.comboCount;
  if (c >= 21) return 2.0;
  if (c >= 11) return 1.5;
  if (c >= 6) return 1.2;
  return 1.0;
}

// Check boss phase transition
function checkBossPhase(boss) {
  if (boss.phaseTransitioning) return;
  const ratio = boss.hp / boss.maxHp;
  const thresholds = boss.phaseThresholds;
  for (let i = 0; i < thresholds.length; i++) {
    if (ratio <= thresholds[i] && boss.phase <= i) {
      boss.phase = i + 1;
      boss.phaseTransitioning = true;
      boss.atkTimer = 0; // Reset atk timer on phase change
      boss.weakTimer = 0; // Reset weak timer on phase change
      cam.shake(6, 0.3);
      tw.add({ v: 0 }, { v: 1 }, 1.0, {
        onComplete: () => { boss.phaseTransitioning = false; boss.atkTimer = 0; }
      });
      break;
    }
  }
}

// Check if room is cleared
function checkRoomClear() {
  const room = ROOM_DEFS[G.currentRoom];
  if (!room || room.cleared) return;
  const allDead = room.enemies.every(e => !e.alive);
  if (allDead) {
    room.cleared = true;
    P.score += 500; // Room clear bonus
    // Transition to artifact select (F5 guard)
    if (!G.transGuard) {
      G.transGuard = true;
      tw.add({ v: 0 }, { v: 1 }, 0.5, {
        onComplete: () => {
          G.transGuard = false;
          if (G.state === ST.COMBAT || G.state === ST.EXPLORE) {
            prepareArtifactChoices();
            beginTransition(G.state, ST.ARTIFACT_SELECT);
          }
        }
      });
    }
  }
}

// Player takes damage
function playerTakeDamage(player, dmg, knockDir) {
  if (player.invTimer > 0) return;
  // Dim shield artifact check
  if (hasArtifact(player, 'dimShield') && rng.next() < 0.1) {
    player.invTimer = 0.5;
    return;
  }
  const defMul = 1 - getUpgradeBonus('shadow', 1, 0.1);
  const finalDmg = dmg * defMul * G.ddaFactor;
  player.hp -= finalDmg;
  player.invTimer = CFG.INV_TIME;
  player.knockbackTimer = 0.2;
  player.vx = knockDir * CFG.KNOCKBACK;
  cam.shake(5, 0.2);
  sound.playSFX('hit');
  // Check death
  if (player.hp <= 0) {
    // Revive check (Echo tree level 5)
    if (getUpgradeLevel('echo') >= 5 && !player.reviveUsed) {
      player.reviveUsed = true;
      player.hp = player.maxHp * 0.3;
      player.invTimer = 2;
      for (let i = 0; i < 20; i++) {
        pool.spawn(player.x + player.w/2, player.y + player.h/2,
          (rng.next()-0.5)*200, (rng.next()-0.5)*200, 0.8, '#00E5FF', 5, 'circle');
      }
      return;
    }
    player.hp = 0;
    onPlayerDeath();
  }
}

// Player death handling
function onPlayerDeath() {
  G.gameOverShake = 1;
  cam.shake(12, 0.8);
  // Judge best score before saving (F8)
  const isNewBest = P.score > G.save.bestScore;
  if (isNewBest) G.save.bestScore = P.score;
  G.isNewBest = isNewBest;
  // Calculate echo points
  const epBonus = 1 + getUpgradeBonus('echo', 3, 0.25);
  G.save.echoPoints += Math.floor(P.score * 0.1 * epBonus);
  G.save.totalRuns++;
  G.save.seed = null;
  G.save.currentRoom = null;
  G.save.artifacts = [];
  G.consecutiveDeaths++;
  updateDDA();
  saveGame();
  beginTransition(G.state, ST.GAMEOVER);
}

// Update enemies
function updateEnemies(dt, enemies, player, room) {
  if (G.timeStopActive) return; // Enemies frozen during time stop
  for (const e of enemies) {
    if (!e.alive) continue;
    e.animT += dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;
    if (e.stunTimer > 0) { e.stunTimer -= dt; continue; }
    // AI behavior
    switch (e.ai) {
      case 'patrol': {
        e.vx = e.spd * e.dir;
        if (Math.abs(e.x - e.patrolX) > e.patrolRange) e.dir *= -1;
        break;
      }
      case 'chase': {
        const dx = player.x - e.x;
        e.dir = dx > 0 ? 1 : -1;
        e.vx = e.spd * e.dir;
        e.atkTimer -= dt;
        if (e.atkTimer <= 0 && Math.abs(dx) < 100) {
          e.vx = e.dir * e.spd * 3; // Charge
          e.atkTimer = e.atkCd;
        }
        break;
      }
      case 'shoot': {
        e.vx = 0;
        e.dir = player.x > e.x ? 1 : -1;
        e.atkTimer -= dt;
        if (e.atkTimer <= 0) {
          const dx = player.x - e.x, dy = player.y - e.y;
          const len = Math.hypot(dx, dy) || 1;
          G.projectiles.push(createProjectile(e.x + e.w/2, e.y + e.h/2,
            (dx/len) * 200, (dy/len) * 200, e.dmg, 'enemy'));
          e.atkTimer = e.atkCd;
        }
        break;
      }
      case 'guard': {
        const dx = player.x - e.x;
        e.dir = dx > 0 ? 1 : -1;
        e.vx = e.spd * e.dir * 0.5;
        e.shieldUp = Math.abs(dx) < 150;
        break;
      }
      case 'summon': {
        const dx = player.x - e.x;
        e.dir = dx > 0 ? -1 : 1; // Run away
        e.vx = e.spd * e.dir;
        e.summonTimer -= dt;
        if (e.summonTimer <= 0 && enemies.filter(x => x.alive).length < 10) {
          // Summon patrol enemies
          for (let i = 0; i < 2; i++) {
            const se = createEnemy(ENEMY_TYPES[0], e.x + (rng.next() - 0.5) * 60,
              e.y, DIFF[G.diffIdx], e.zone);
            enemies.push(se);
          }
          e.summonTimer = 10;
        }
        break;
      }
    }
    // Apply movement
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    // Gravity
    e.vy += CFG.GRAVITY * dt;
    // Tile collision
    resolveEntityTiles(e, room);
    // Contact damage to player
    if (e.alive && hitTest(e.x, e.y, e.w, e.h, player.x, player.y, player.w, player.h)) {
      const knockDir = player.x > e.x ? 1 : -1;
      playerTakeDamage(player, e.dmg, knockDir);
    }
  }
}

// Update boss AI
function updateBoss(dt, boss, player) {
  if (!boss || !boss.alive) return;
  if (boss.phaseTransitioning) return;
  if (G.timeStopActive) {
    boss.weakExposed = true;
    return;
  }
  boss.weakExposed = false;
  boss.animT += dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;
  boss.atkTimer -= dt;
  // Boss AI per zone
  if (boss.atkTimer <= 0) {
    const dx = player.x - boss.x;
    boss.dir = dx > 0 ? 1 : -1;
    switch (boss.zone) {
      case 0: // Petrified King — charge + rocks
        if (boss.phase >= 2 && rng.next() > 0.5) {
          // Earthquake
          cam.shake(8, 0.5);
          for (let i = 0; i < 3; i++) {
            const rx = rng.next() * CFG.ROOM_W;
            G.projectiles.push(createProjectile(rx, 0, 0, 250, boss.dmg, 'boss'));
          }
        } else {
          boss.vx = boss.dir * 300;
          tw.add(boss, { vx: 0 }, 0.8);
        }
        break;
      case 1: // Prism Witch — laser + barrier
        if (boss.phase >= 1) {
          // Multi-directional laser
          for (let a = 0; a < 8; a++) {
            const ang = (a / 8) * Math.PI * 2;
            G.projectiles.push(createProjectile(boss.x + boss.w/2, boss.y + boss.h/2,
              Math.cos(ang) * 180, Math.sin(ang) * 180, boss.dmg * 0.5, 'boss'));
          }
        } else {
          G.projectiles.push(createProjectile(boss.x + boss.w/2, boss.y + boss.h/2,
            boss.dir * 300, 0, boss.dmg, 'boss'));
        }
        break;
      case 2: // Abyss Lord — tentacle sweep
        if (boss.phase >= 2) {
          // 8-tentacle attack (AoE zones)
          for (let i = 0; i < 4; i++) {
            const rx = rng.next() * CFG.ROOM_W;
            G.projectiles.push(createProjectile(rx, CFG.ROOM_H - CFG.TILE * 2, 0, -150, boss.dmg * 0.4, 'boss'));
          }
        } else {
          // Pull player
          const dx2 = boss.x - player.x;
          player.vx += dx2 * 0.5;
        }
        break;
      case 3: // Magma Titan — lava eruption
        if (boss.phase >= 1) {
          // Full room lava
          for (let i = 0; i < 6; i++) {
            G.projectiles.push(createProjectile(i * CFG.ROOM_W / 6 + rng.next() * 40,
              CFG.ROOM_H - CFG.TILE, 0, -200, boss.dmg * 0.6, 'boss'));
          }
        } else {
          boss.vx = boss.dir * 250;
          tw.add(boss, { vx: 0 }, 1.0);
        }
        break;
      case 4: // Dimension Breaker — warp + clones
        if (boss.phase >= 1) {
          // Warp attack
          boss.x = player.x + (rng.next() > 0.5 ? 100 : -100);
          boss.y = player.y;
          // Brief invuln then attack
          tw.add({ v: 0 }, { v: 1 }, 0.5, {
            onComplete: () => {
              G.projectiles.push(createProjectile(boss.x + boss.w/2, boss.y + boss.h/2,
                boss.dir * 250, 0, boss.dmg, 'boss'));
            }
          });
        } else {
          G.projectiles.push(createProjectile(boss.x + boss.w/2, boss.y + boss.h/2,
            boss.dir * 200, 0, boss.dmg, 'boss'));
        }
        break;
      default: // Hidden boss — all patterns
        const pattern = boss.phase % 4;
        switch (pattern) {
          case 0: boss.vx = boss.dir * 300; tw.add(boss, { vx: 0 }, 0.8); break;
          case 1: for (let a = 0; a < 8; a++) { const ang = (a/8)*Math.PI*2; G.projectiles.push(createProjectile(boss.x+boss.w/2, boss.y+boss.h/2, Math.cos(ang)*180, Math.sin(ang)*180, boss.dmg*0.5, 'boss')); } break;
          case 2: for (let i = 0; i < 4; i++) { G.projectiles.push(createProjectile(rng.next()*CFG.ROOM_W, 0, 0, 200, boss.dmg*0.4, 'boss')); } break;
          case 3: boss.x = player.x + (rng.next()>0.5?80:-80); cam.shake(6,0.3); break;
        }
    }
    boss.atkCd = Math.max(1.5, 3 - boss.phase * 0.5);
    boss.atkTimer = boss.atkCd;
  }
  // Boss movement
  boss.x += boss.vx * dt;
  boss.y += boss.vy * dt;
  boss.vy += CFG.GRAVITY * dt;
  // Clamp boss to room
  boss.x = Math.max(CFG.TILE, Math.min(CFG.ROOM_W - CFG.TILE - boss.w, boss.x));
  boss.y = Math.min(CFG.ROOM_H - CFG.TILE - boss.h, boss.y);
  if (boss.y >= CFG.ROOM_H - CFG.TILE - boss.h) { boss.vy = 0; boss.y = CFG.ROOM_H - CFG.TILE - boss.h; }
  // Contact damage
  if (hitTest(boss.x, boss.y, boss.w, boss.h, player.x, player.y, player.w, player.h)) {
    playerTakeDamage(player, boss.dmg, player.x > boss.x ? 1 : -1);
  }
}

// Update projectiles
function updateProjectiles(dt, projectiles, player, enemies, boss) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (!p.alive) { projectiles.splice(i, 1); continue; }
    if (!G.timeStopActive || p.owner === 'player') {
      p.x += p.vx * dt; p.y += p.vy * dt;
    }
    p.life -= dt;
    if (p.life <= 0) { p.alive = false; projectiles.splice(i, 1); continue; }
    // Out of bounds
    if (p.x < -20 || p.x > CFG.ROOM_W + 20 || p.y < -20 || p.y > CFG.ROOM_H + 20) {
      p.alive = false; projectiles.splice(i, 1); continue;
    }
    // Player projectile hits enemies
    if (p.owner === 'player') {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (hitTest(p.x - p.w/2, p.y - p.h/2, p.w, p.h, e.x, e.y, e.w, e.h)) {
          dealDamageToEnemy(e, p.dmg, player);
          if (p.type !== 'pierce') { p.alive = false; break; }
        }
      }
      if (boss && boss.alive && p.alive) {
        if (hitTest(p.x - p.w/2, p.y - p.h/2, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
          dealDamageToBoss(boss, p.dmg, player);
          if (p.type !== 'pierce') p.alive = false;
        }
      }
    }
    // Enemy/Boss projectile hits player
    if ((p.owner === 'enemy' || p.owner === 'boss') && player.invTimer <= 0) {
      if (hitTest(p.x - p.w/2, p.y - p.h/2, p.w, p.h, player.x, player.y, player.w, player.h)) {
        playerTakeDamage(player, p.dmg, player.x > p.x ? 1 : -1);
        p.alive = false;
      }
    }
    if (!p.alive) projectiles.splice(i, 1);
  }
}

// Prepare 3 artifact choices
function prepareArtifactChoices() {
  const available = ARTIFACTS.filter(a => !P.artifacts.includes(a.id));
  if (available.length === 0) { G.artifactChoices = []; return; }
  // Weighted selection
  const pool2 = [];
  for (const a of available) {
    const weight = a.rarity === 'common' ? 6 : a.rarity === 'rare' ? 3 : 1;
    for (let i = 0; i < weight; i++) pool2.push(a);
  }
  rng.shuffle(pool2);
  const chosen = [];
  const ids = new Set();
  for (const a of pool2) {
    if (!ids.has(a.id)) { chosen.push(a); ids.add(a.id); }
    if (chosen.length >= 3) break;
  }
  G.artifactChoices = chosen;
  G.artifactSelectedIdx = 0;
}

// Apply selected artifact
function selectArtifact(idx) {
  if (idx < 0 || idx >= G.artifactChoices.length) return;
  const a = G.artifactChoices[idx];
  P.artifacts.push(a.id);
  G.save.artifacts = [...P.artifacts];
  sound.playSFX('artifact');
  // Check DPS cap (F74)
  const totalDpsMul = P.artifacts.reduce((sum, id) => {
    const art = ARTIFACTS.find(x => x.id === id);
    if (art && (art.effect === 'meleeDmg' || art.effect === 'riftBlade')) return sum + art.val;
    return sum;
  }, 0);
  if (totalDpsMul > CFG.ART_DPS_CAP) {
    // Over cap — reduce effectiveness of this artifact
    // (In practice just cap the total)
  }
}

// Check if player has artifact by effect name
function hasArtifact(player, effectName) {
  return player.artifacts.some(id => {
    const a = ARTIFACTS.find(x => x.id === id);
    return a && a.effect === effectName;
  });
}

// Get artifact bonus value
function getArtifactBonus(player, effectName) {
  let total = 0;
  for (const id of player.artifacts) {
    const a = ARTIFACTS.find(x => x.id === id);
    if (a && a.effect === effectName) total += a.val;
  }
  // Synergy cap (F74)
  return Math.min(total, CFG.ART_SYN_CAP);
}

// Get upgrade level for tree
function getUpgradeLevel(tree) { return G.save.upgrades[tree] || 0; }

// Get upgrade bonus (conditional on level)
function getUpgradeBonus(tree, level, val) {
  return getUpgradeLevel(tree) > level ? val : 0;
}

// Purchase upgrade
function purchaseUpgrade(tree, level) {
  const treeData = UPGRADE_TREES[tree];
  if (!treeData || level >= 5) return false;
  const currentLevel = G.save.upgrades[tree] || 0;
  if (level !== currentLevel) return false;
  const cost = treeData[level].cost;
  if (G.save.echoPoints < cost) return false;
  G.save.echoPoints -= cost;
  G.save.upgrades[tree] = level + 1;
  sound.playSFX('select');
  saveGame();
  return true;
}

// Player reference
