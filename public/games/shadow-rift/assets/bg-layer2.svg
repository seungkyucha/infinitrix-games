<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0D0D2A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A0033" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ruinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A50"/>
      <stop offset="100%" stop-color="#0D0D20"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A40"/>
      <stop offset="50%" stop-color="#2A2A55"/>
      <stop offset="100%" stop-color="#15153A"/>
    </linearGradient>
    <radialGradient id="portalGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#B388FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crystalGlow" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="firefly" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#B388FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="b2Glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="b2Shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="b2Fog" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Atmospheric overlay -->
  <rect width="1200" height="800" fill="url(#bg2Grad)"/>

  <!-- Mid-ground terrain / cliffs -->
  <g id="terrain" filter="url(#b2Shadow)">
    <path d="M0 500 L40 460 L80 480 L140 420 L200 450 L260 400 L320 430 L400 380 L450 410 L500 370 L560 400 L620 360 L680 390 L740 350 L800 380 L860 340 L920 370 L980 360 L1040 390 L1100 370 L1160 400 L1200 380 L1200 800 L0 800 Z" fill="url(#ruinGrad)"/>
    <!-- Terrain rock detail -->
    <path d="M0 500 L40 460 L80 480 L140 420 L200 450 L260 400" fill="none" stroke="#3A3A60" stroke-width="1" opacity="0.4"/>
    <path d="M260 400 L320 430 L400 380 L450 410 L500 370 L560 400" fill="none" stroke="#3A3A60" stroke-width="1" opacity="0.4"/>
    <path d="M560 400 L620 360 L680 390 L740 350 L800 380 L860 340" fill="none" stroke="#3A3A60" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Ruined arch 1 (left) -->
  <g id="arch1" filter="url(#b2Shadow)">
    <rect x="80" y="340" width="20" height="140" fill="url(#pillarGrad)"/>
    <rect x="180" y="360" width="18" height="120" fill="url(#pillarGrad)"/>
    <path d="M80 340 Q130 300, 180 360" fill="none" stroke="#2A2A55" stroke-width="12"/>
    <path d="M85 340 Q130 310, 175 360" fill="none" stroke="#3A3A65" stroke-width="4"/>
    <!-- Crack details -->
    <path d="M90 380 L95 400 L88 420" fill="none" stroke="#1A1A3E" stroke-width="1.5" opacity="0.6"/>
    <path d="M185 390 L190 410 L183 430" fill="none" stroke="#1A1A3E" stroke-width="1.5" opacity="0.6"/>
    <!-- Rune engravings on pillar -->
    <text x="85" y="440" font-size="12" fill="#7C4DFF" opacity="0.3" font-family="serif">&#x16B1;</text>
    <text x="183" y="430" font-size="10" fill="#7C4DFF" opacity="0.25" font-family="serif">&#x16CA;</text>
  </g>

  <!-- Ruined arch 2 (right) -->
  <g id="arch2" filter="url(#b2Shadow)">
    <rect x="900" y="300" width="22" height="130" fill="url(#pillarGrad)"/>
    <rect x="1010" y="320" width="18" height="110" fill="url(#pillarGrad)"/>
    <path d="M900 300 Q955 260, 1010 320" fill="none" stroke="#2A2A55" stroke-width="14"/>
    <path d="M906 300 Q955 270, 1004 320" fill="none" stroke="#3A3A65" stroke-width="4"/>
    <!-- Broken top of right pillar -->
    <polygon points="1010,320 1016,310 1028,318 1024,324" fill="#2A2A55" opacity="0.6"/>
    <!-- Runes -->
    <text x="905" y="390" font-size="11" fill="#B388FF" opacity="0.25" font-family="serif">&#x16A6;</text>
    <text x="1013" y="380" font-size="10" fill="#B388FF" opacity="0.2" font-family="serif">&#x16DE;</text>
  </g>

  <!-- Fallen pillars / debris -->
  <g id="debris">
    <rect x="300" y="420" width="60" height="10" rx="2" fill="#1A1A40" transform="rotate(-15,300,420)" opacity="0.7"/>
    <rect x="310" y="430" width="40" height="8" rx="2" fill="#15153A" transform="rotate(-10,310,430)" opacity="0.5"/>
    <circle cx="370" cy="432" r="8" fill="#1A1A40" opacity="0.5"/>
    <circle cx="385" cy="436" r="5" fill="#15153A" opacity="0.4"/>

    <rect x="700" y="380" width="50" height="10" rx="2" fill="#1A1A40" transform="rotate(12,700,380)" opacity="0.7"/>
    <circle cx="690" cy="388" r="6" fill="#1A1A40" opacity="0.5"/>
    <circle cx="760" cy="392" r="7" fill="#15153A" opacity="0.4"/>
  </g>

  <!-- Crystal clusters -->
  <g id="crystals" filter="url(#b2Glow)">
    <!-- Cluster 1 -->
    <polygon points="470,380 476,340 482,380" fill="#00BCD4" opacity="0.6"/>
    <polygon points="478,385 482,350 486,385" fill="#00E5FF" opacity="0.5"/>
    <polygon points="464,388 468,360 472,388" fill="#0097A7" opacity="0.5"/>
    <ellipse cx="476" cy="380" rx="12" ry="4" fill="url(#crystalGlow)" opacity="0.4"/>
    <!-- Cluster 2 -->
    <polygon points="1100,370 1106,335 1112,370" fill="#00BCD4" opacity="0.55"/>
    <polygon points="1108,374 1112,345 1116,374" fill="#00E5FF" opacity="0.45"/>
    <polygon points="1094,376 1098,352 1102,376" fill="#0097A7" opacity="0.45"/>
    <ellipse cx="1106" cy="370" rx="14" ry="4" fill="url(#crystalGlow)" opacity="0.35"/>
    <!-- Cluster 3 -->
    <polygon points="580,375 584,348 588,375" fill="#B388FF" opacity="0.4"/>
    <polygon points="586,378 590,355 594,378" fill="#7C4DFF" opacity="0.35"/>
    <ellipse cx="586" cy="376" rx="8" ry="3" fill="#7C4DFF" opacity="0.2"/>
  </g>

  <!-- Dimensional portal (mid-ground) -->
  <g id="portal" filter="url(#b2Glow)">
    <ellipse cx="600" cy="380" rx="25" ry="40" fill="url(#portalGlow)"/>
    <ellipse cx="600" cy="380" rx="15" ry="28" fill="#E040FB" opacity="0.15"/>
    <ellipse cx="600" cy="380" rx="8" ry="18" fill="#FFFFFF" opacity="0.1"/>
    <!-- Portal rim -->
    <ellipse cx="600" cy="380" rx="25" ry="40" fill="none" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
    <!-- Rift energy arcs -->
    <path d="M580 355 Q575 340, 585 330" fill="none" stroke="#E040FB" stroke-width="1" opacity="0.4"/>
    <path d="M620 355 Q625 340, 615 330" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Dead tree silhouettes -->
  <g id="trees" opacity="0.6">
    <!-- Tree 1 -->
    <line x1="50" y1="500" x2="50" y2="420" stroke="#0D0D20" stroke-width="5"/>
    <path d="M50 440 C40 420, 30 410, 22 400" fill="none" stroke="#0D0D20" stroke-width="3"/>
    <path d="M50 450 C58 435, 65 425, 72 415" fill="none" stroke="#0D0D20" stroke-width="2.5"/>
    <path d="M50 430 C44 418, 38 412, 34 405" fill="none" stroke="#0D0D20" stroke-width="2"/>
    <!-- Tree 2 -->
    <line x1="1150" y1="400" x2="1150" y2="330" stroke="#0D0D20" stroke-width="4"/>
    <path d="M1150 350 C1140 335, 1132 328, 1126 320" fill="none" stroke="#0D0D20" stroke-width="2.5"/>
    <path d="M1150 340 C1158 328, 1164 322, 1170 316" fill="none" stroke="#0D0D20" stroke-width="2"/>
  </g>

  <!-- Rune stones scattered -->
  <g id="runestones" opacity="0.5">
    <path d="M240 440 L248 420 L256 440 Z" fill="#1A1A40"/>
    <text x="243" y="438" font-size="8" fill="#E040FB" opacity="0.4" font-family="serif">&#x16F1;</text>
    <path d="M820" y="370" d="M815 380 L822 362 L829 380 Z" fill="#1A1A40"/>
    <text x="818" y="378" font-size="7" fill="#00E5FF" opacity="0.4" font-family="serif">&#x16B1;</text>
  </g>

  <!-- Stone bridge remnant -->
  <g id="bridge" filter="url(#b2Shadow)">
    <path d="M500 410 Q520 400, 540 410 L540 420 L500 420 Z" fill="#1A1A40" opacity="0.7"/>
    <rect x="498" y="420" width="44" height="6" fill="#15153A" opacity="0.6"/>
    <path d="M540 410 L560 415 L560 425 L540 420 Z" fill="#15153A" opacity="0.5"/>
  </g>

  <!-- Fireflies / dimensional particles -->
  <g id="fireflies">
    <circle cx="120" cy="400" r="4" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.5"/>
    <circle cx="250" cy="380" r="3" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.4"/>
    <circle cx="380" cy="410" r="3.5" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.45"/>
    <circle cx="520" cy="360" r="4" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.5"/>
    <circle cx="660" cy="370" r="3" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.4"/>
    <circle cx="780" cy="390" r="3.5" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.45"/>
    <circle cx="880" cy="355" r="4" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.5"/>
    <circle cx="1000" cy="375" r="3" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.4"/>
    <circle cx="1070" cy="360" r="3.5" fill="url(#firefly)" filter="url(#b2Glow)" opacity="0.45"/>
    <!-- Cyan particles -->
    <circle cx="160" cy="420" r="2.5" fill="#00E5FF" filter="url(#b2Glow)" opacity="0.3"/>
    <circle cx="440" cy="395" r="2" fill="#00E5FF" filter="url(#b2Glow)" opacity="0.25"/>
    <circle cx="730" cy="365" r="2.5" fill="#00E5FF" filter="url(#b2Glow)" opacity="0.3"/>
    <circle cx="960" cy="350" r="2" fill="#00E5FF" filter="url(#b2Glow)" opacity="0.25"/>
    <!-- Magenta particles -->
    <circle cx="340" cy="390" r="2" fill="#E040FB" filter="url(#b2Glow)" opacity="0.25"/>
    <circle cx="620" cy="340" r="2.5" fill="#E040FB" filter="url(#b2Glow)" opacity="0.3"/>
    <circle cx="850" cy="370" r="2" fill="#E040FB" filter="url(#b2Glow)" opacity="0.25"/>
    <circle cx="1120" cy="380" r="2.5" fill="#E040FB" filter="url(#b2Glow)" opacity="0.3"/>
  </g>

  <!-- Ground fog layers -->
  <g filter="url(#b2Fog)">
    <rect x="-50" y="500" width="1300" height="80" fill="#0D0D2A" opacity="0.3"/>
    <rect x="-50" y="560" width="1300" height="60" fill="#1A0033" opacity="0.2"/>
    <rect x="-50" y="620" width="1300" height="80" fill="#0A1628" opacity="0.25"/>
    <ellipse cx="200" cy="530" rx="150" ry="30" fill="#1A1A3E" opacity="0.15"/>
    <ellipse cx="600" cy="550" rx="200" ry="25" fill="#1A1A3E" opacity="0.12"/>
    <ellipse cx="1000" cy="540" rx="160" ry="28" fill="#1A1A3E" opacity="0.13"/>
  </g>

  <!-- Hanging chains / vines from arches -->
  <g opacity="0.4">
    <path d="M100 340 Q95 370, 105 400" fill="none" stroke="#1A1A3E" stroke-width="1.5"/>
    <path d="M160" y1="320" d="M160 320 Q155 350, 165 380" fill="none" stroke="#1A1A3E" stroke-width="1"/>
    <path d="M940 300 Q935 330, 945 360" fill="none" stroke="#1A1A3E" stroke-width="1.5"/>
    <path d="M990 310 Q985 340, 995 370" fill="none" stroke="#1A1A3E" stroke-width="1"/>
  </g>
</svg>