<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="heartCore" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#FF6090"/>
      <stop offset="40%" stop-color="#E91E63"/>
      <stop offset="80%" stop-color="#AD1457"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E040FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heartHighlight" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heartRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF80AB"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <radialGradient id="crystalFacet" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#B388FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#4A148C" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="24" cy="26" rx="20" ry="18" fill="url(#heartGlow)" opacity="0.6"/>

  <!-- Heart shadow -->
  <path d="M24 42 C18 36, 4 26, 4 16 C4 8, 10 4, 16 4 C20 4, 23 7, 24 10 C25 7, 28 4, 32 4 C38 4, 44 8, 44 16 C44 26, 30 36, 24 42 Z" fill="#4A148C" opacity="0.4" transform="translate(1,1)"/>

  <!-- Main heart shape -->
  <g filter="url(#hShadow)">
    <path d="M24 40 C18 34, 5 25, 5 16 C5 9, 10 5, 16 5 C20 5, 23 8, 24 11 C25 8, 28 5, 32 5 C38 5, 43 9, 43 16 C43 25, 30 34, 24 40 Z" fill="url(#heartCore)"/>
  </g>

  <!-- Crystal facets inside heart -->
  <path d="M18 14 L24 11 L22 20 Z" fill="url(#crystalFacet)" opacity="0.4"/>
  <path d="M30 14 L24 11 L26 20 Z" fill="url(#crystalFacet)" opacity="0.3"/>
  <path d="M24 20 L18 28 L24 40 L30 28 Z" fill="#B8186E" opacity="0.3"/>

  <!-- Rift crack through heart -->
  <path d="M20 12 L22 18 L18 24 L22 30 L24 36" fill="none" stroke="#E040FB" stroke-width="0.8" filter="url(#hGlow)" opacity="0.6"/>
  <path d="M28 14 L26 20 L30 26 L26 32" fill="none" stroke="#B388FF" stroke-width="0.6" opacity="0.4"/>

  <!-- Highlight -->
  <path d="M14 14 C14 10, 17 7, 20 8 C22 9, 20 14, 16 16 Z" fill="url(#heartHighlight)"/>
  <ellipse cx="16" cy="12" rx="3" ry="2" fill="#FFFFFF" opacity="0.3"/>

  <!-- Rim light -->
  <path d="M24 40 C18 34, 5 25, 5 16 C5 9, 10 5, 16 5" fill="none" stroke="url(#heartRim)" stroke-width="0.8" opacity="0.5"/>

  <!-- Inner pulse dots -->
  <circle cx="20" cy="18" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="28" cy="16" r="0.8" fill="#FF80AB" opacity="0.5"/>
  <circle cx="24" cy="24" r="1.2" fill="#E040FB" opacity="0.3" filter="url(#hGlow)"/>

  <!-- Dimensional sparkle accents -->
  <path d="M10 20 L11 18 L12 20 L11 22 Z" fill="#00E5FF" opacity="0.5" filter="url(#hGlow)"/>
  <path d="M36 18 L37 16 L38 18 L37 20 Z" fill="#00E5FF" opacity="0.4" filter="url(#hGlow)"/>
  <path d="M24 6 L25 4 L26 6 L25 8 Z" fill="#B388FF" opacity="0.5"/>

  <!-- Hexagon frame accent at bottom -->
  <path d="M20 38 L22 36 L26 36 L28 38 L26 40 L22 40 Z" fill="none" stroke="#7C4DFF" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner energy dots -->
  <circle cx="8" cy="10" r="0.7" fill="#E040FB" opacity="0.3"/>
  <circle cx="40" cy="10" r="0.7" fill="#00E5FF" opacity="0.3"/>
  <circle cx="8" cy="34" r="0.5" fill="#B388FF" opacity="0.25"/>
  <circle cx="40" cy="34" r="0.5" fill="#B388FF" opacity="0.25"/>
</svg>