<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="hitCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="15%" stop-color="#E040FB"/>
      <stop offset="40%" stop-color="#AA00FF"/>
      <stop offset="70%" stop-color="#4A148C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A0033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="75%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#B388FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="70%" stop-color="#E040FB" stop-opacity="0"/>
      <stop offset="82%" stop-color="#E040FB" stop-opacity="0.4"/>
      <stop offset="90%" stop-color="#AA00FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="80%" stop-color="#B388FF" stop-opacity="0"/>
      <stop offset="88%" stop-color="#B388FF" stop-opacity="0.25"/>
      <stop offset="95%" stop-color="#7C4DFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Outermost shockwave ring -->
  <circle cx="64" cy="64" r="60" fill="url(#hitRing3)" opacity="0.4"/>

  <!-- Layer 2: Middle ring -->
  <circle cx="64" cy="64" r="48" fill="url(#hitRing2)" opacity="0.5"/>

  <!-- Layer 3: Inner ring -->
  <circle cx="64" cy="64" r="36" fill="url(#hitRing1)" opacity="0.6"/>

  <!-- Layer 4: Core burst -->
  <circle cx="64" cy="64" r="24" fill="url(#hitCore)" filter="url(#hitGlow)"/>

  <!-- Layer 5: Bright center -->
  <circle cx="64" cy="64" r="10" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="64" cy="64" r="5" fill="#FFFFFF"/>

  <!-- Radial burst lines -->
  <g filter="url(#hitSparkle)" opacity="0.7">
    <line x1="64" y1="64" x2="64" y2="8" stroke="#00E5FF" stroke-width="2" opacity="0.6"/>
    <line x1="64" y1="64" x2="64" y2="120" stroke="#00E5FF" stroke-width="2" opacity="0.6"/>
    <line x1="64" y1="64" x2="8" y2="64" stroke="#E040FB" stroke-width="2" opacity="0.6"/>
    <line x1="64" y1="64" x2="120" y2="64" stroke="#E040FB" stroke-width="2" opacity="0.6"/>
    <line x1="64" y1="64" x2="24" y2="24" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="64" y1="64" x2="104" y2="104" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="64" y1="64" x2="104" y2="24" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="64" y1="64" x2="24" y2="104" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Dimensional crack lines -->
  <g filter="url(#hitGlow)" opacity="0.5">
    <path d="M64 64 L56 30 L52 20" stroke="#E040FB" stroke-width="1" fill="none"/>
    <path d="M64 64 L80 36 L88 28" stroke="#00E5FF" stroke-width="1" fill="none"/>
    <path d="M64 64 L42 46 L30 40" stroke="#B388FF" stroke-width="0.8" fill="none"/>
    <path d="M64 64 L86 48 L98 42" stroke="#7C4DFF" stroke-width="0.8" fill="none"/>
    <path d="M64 64 L48 88 L40 100" stroke="#E040FB" stroke-width="1" fill="none"/>
    <path d="M64 64 L80 90 L90 102" stroke="#00E5FF" stroke-width="1" fill="none"/>
    <path d="M64 64 L44 80 L28 90" stroke="#B388FF" stroke-width="0.8" fill="none"/>
    <path d="M64 64 L84 82 L100 92" stroke="#7C4DFF" stroke-width="0.8" fill="none"/>
  </g>

  <!-- Flying debris/shards -->
  <g filter="url(#hitSparkle)">
    <polygon points="28,28 32,24 34,30" fill="#E040FB" opacity="0.6"/>
    <polygon points="96,32 100,28 98,34" fill="#00E5FF" opacity="0.6"/>
    <polygon points="24,80 28,76 30,82" fill="#B388FF" opacity="0.5"/>
    <polygon points="98,84 102,80 100,86" fill="#E040FB" opacity="0.5"/>
    <polygon points="44,16 48,12 46,18" fill="#00E5FF" opacity="0.4"/>
    <polygon points="84,18 88,14 86,20" fill="#B388FF" opacity="0.4"/>
    <polygon points="16,56 20,52 18,58" fill="#7C4DFF" opacity="0.4"/>
    <polygon points="110,58 114,54 112,60" fill="#7C4DFF" opacity="0.4"/>
    <polygon points="40,104 44,100 42,106" fill="#E040FB" opacity="0.35"/>
    <polygon points="88,108 92,104 90,110" fill="#00E5FF" opacity="0.35"/>
  </g>

  <!-- Sparkle points -->
  <g filter="url(#hitSparkle)">
    <path d="M20 44 L22 40 L24 44 L22 48 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M104 44 L106 40 L108 44 L106 48 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M44 110 L46 106 L48 110 L46 114 Z" fill="#FFFFFF" opacity="0.4"/>
    <path d="M80 112 L82 108 L84 112 L82 116 Z" fill="#FFFFFF" opacity="0.4"/>
    <path d="M12 68 L14 64 L16 68 L14 72 Z" fill="#00E5FF" opacity="0.4"/>
    <path d="M112 60 L114 56 L116 60 L114 64 Z" fill="#E040FB" opacity="0.4"/>
  </g>
</svg>