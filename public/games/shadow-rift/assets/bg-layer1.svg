  <!-- Constellation lines -->
  <g opacity="0.15" stroke="#B388FF" stroke-width="0.5">
    <line x1="340" y1="60" x2="390" y2="180"/>
    <line x1="390" y1="180" x2="460" y2="240"/>
    <line x1="620" y1="55" x2="680" y2="150"/>
    <line x1="680" y1="150" x2="750" y2="230"/>
    <line x1="900" y1="25" x2="960" y2="175"/>
    <line x1="960" y1="175" x2="1030" y2="210"/>
  </g>

  <!-- Dimensional rift in sky -->
  <g filter="url(#bgGlow)">
    <path d="M500 100 Q550 80, 600 120 Q650 90, 700 110 Q720 130, 680 150 Q640 160, 600 140 Q560 170, 520 140 Q490 130, 500 100 Z" fill="url(#riftGlow)" opacity="0.4"/>
    <path d="M540 105 Q580 95, 620 115 Q650 100, 670 115 Q680 130, 660 140 Q630 145, 600 130 Q570 150, 550 135 Q530 125, 540 105 Z" fill="#E040FB" opacity="0.1"/>
  </g>

  <!-- Far mountains / ruins silhouette -->
  <g id="far-mountains">
    <path d="M0 550 L50 480 L100 520 L180 440 L260 490 L320 430 L400 470 L460 410 L520 450 L580 400 L650 460 L720 390 L790 440 L860 420 L930 480 L1000 430 L1060 470 L1120 440 L1200 500 L1200 800 L0 800 Z" fill="url(#mtGrad)" opacity="0.5"/>
    <!-- Ruins on mountain peaks -->
    <rect x="175" y="425" width="10" height="20" fill="#1A1A3E" opacity="0.6"/>
    <rect x="165" y="430" width="5" height="12" fill="#1A1A3E" opacity="0.5"/>
    <rect x="316" y="415" width="8" height="18" fill="#1A1A3E" opacity="0.6"/>
    <polygon points="316,415 320,405 324,415" fill="#1A1A3E" opacity="0.5"/>
    <rect x="577" y="385" width="6" height="18" fill="#1A1A3E" opacity="0.6"/>
    <rect x="715" y="375" width="10" height="20" fill="#1A1A3E" opacity="0.6"/>
    <polygon points="715,375 720,362 725,375" fill="#1A1A3E" opacity="0.5"/>
    <rect x="997" y="416" width="6" height="16" fill="#1A1A3E" opacity="0.6"/>
    <rect x="1117" y="426" width="8" height="18" fill="#1A1A3E" opacity="0.6"/>
  </g>

  <!-- Distant floating islands -->
  <g opacity="0.3">
    <ellipse cx="200" cy="350" rx="40" ry="8" fill="#1A1A3E"/>
    <path d="M170 350 Q175 330, 200 325 Q225 330, 230 350" fill="#1A1A3E" opacity="0.8"/>
    <rect x="195" y="310" width="6" height="18" fill="#1A1A3E" opacity="0.5"/>
    <polygon points="195,310 198,298 201,310" fill="#1A1A3E" opacity="0.4"/>

    <ellipse cx="950" cy="320" rx="35" ry="7" fill="#1A1A3E"/>
    <path d="M925 320 Q930 305, 950 300 Q970 305, 975 320" fill="#1A1A3E" opacity="0.8"/>
    <rect x="946" y="288" width="5" height="14" fill="#1A1A3E" opacity="0.5"/>
  </g>

  <!-- Fog layers -->
  <g filter="url(#fogBlur)">
    <rect x="-50" y="440" width="1300" height="60" fill="url(#fogGrad)" opacity="0.4"/>
    <rect x="-50" y="520" width="1300" height="50" fill="url(#fogGrad)" opacity="0.3"/>
    <rect x="-50" y="600" width="1300" height="70" fill="url(#fogGrad)" opacity="0.25"/>
