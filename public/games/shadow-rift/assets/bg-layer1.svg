  <!-- Shooting star / meteor -->
  <g filter="url(#bgGlow)" opacity="0.6">
    <line x1="180" y1="80" x2="140" y2="120" stroke="#00E5FF" stroke-width="1.5"/>
    <circle cx="180" cy="80" r="2" fill="#FFFFFF"/>
    <line x1="850" y1="50" x2="820" y2="80" stroke="#E040FB" stroke-width="1"/>
    <circle cx="850" cy="50" r="1.5" fill="#FFFFFF"/>
  </g>

  <!-- Distant rift portals glowing -->
  <g filter="url(#bgGlow)" opacity="0.3">
    <ellipse cx="400" cy="460" rx="8" ry="15" fill="#E040FB"/>
    <ellipse cx="400" cy="460" rx="4" ry="10" fill="#B388FF"/>
    <ellipse cx="900" cy="440" rx="6" ry="12" fill="#00E5FF"/>
    <ellipse cx="900" cy="440" rx="3" ry="8" fill="#80DEEA"/>
  </g>

  <!-- Additional nebula wisps -->
  <g filter="url(#fogBlur)" opacity="0.08">
    <path d="M100 200 Q300 150, 500 200 Q700 250, 900 180 Q1000 160, 1100 200" fill="none" stroke="#7C4DFF" stroke-width="40"/>
    <path d="M0 350 Q200 320, 400 370 Q600 400, 800 350 Q1000 310, 1200 360" fill="none" stroke="#00838F" stroke-width="30"/>
  </g>
</svg>