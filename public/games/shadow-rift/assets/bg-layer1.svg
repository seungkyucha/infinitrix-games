<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Sky gradient - deep space -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="30%" stop-color="#0A1628"/>
      <stop offset="60%" stop-color="#0D0D2A"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <!-- Nebula glow 1 -->
    <radialGradient id="nebula1" cx="0.3" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#4A148C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula glow 2 -->
    <radialGradient id="nebula2" cx="0.7" cy="0.4" r="0.35">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#006064" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula glow 3 -->
    <radialGradient id="nebula3" cx="0.5" cy="0.7" r="0.3">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#4A148C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Distant mountain gradient -->
    <linearGradient id="mtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#0D0D20"/>
    </linearGradient>
    <!-- Rift glow -->
    <linearGradient id="riftGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#B388FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Fog gradient -->
    <linearGradient id="fogGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A3E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1A1A3E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A1A3E" stop-opacity="0"/>
    </linearGradient>
    <filter id="bgGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="fogBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <!-- Nebula clouds -->
  <rect width="1200" height="800" fill="url(#nebula1)"/>
  <rect width="1200" height="800" fill="url(#nebula2)"/>
  <rect width="1200" height="800" fill="url(#nebula3)"/>

