<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Cloak gradient - cyan to deep blue -->
    <linearGradient id="cloakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#003355"/>
    </linearGradient>
    <!-- Mask gradient - white porcelain -->
    <radialGradient id="maskGrad" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#E8E8F0"/>
      <stop offset="100%" stop-color="#C0C0D0"/>
    </radialGradient>
    <!-- Purple energy glow -->
    <radialGradient id="energyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#B388FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7C4DFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan eye glow -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Body shadow -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <!-- Rim light -->
    <linearGradient id="rimLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Rift energy crackling -->
    <linearGradient id="riftEnergy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="50%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Energy aura background -->
  <g id="aura">
    <ellipse cx="64" cy="68" rx="38" ry="44" fill="url(#energyGlow)" opacity="0.5"/>
    <ellipse cx="64" cy="68" rx="28" ry="34" fill="url(#energyGlow)" opacity="0.3"/>
  </g>

  <!-- Cloak / cape flowing behind -->
  <g id="cloak" filter="url(#shadowDrop)">
    <path d="M44 48 C40 52, 32 70, 30 95 Q32 110, 40 118 C48 122, 56 120, 58 116 L54 80 Z" fill="url(#cloakGrad)" opacity="0.85"/>
    <path d="M84 48 C88 52, 96 70, 98 95 Q96 110, 88 118 C80 122, 72 120, 70 116 L74 80 Z" fill="url(#cloakGrad)" opacity="0.85"/>
    <!-- Cloak inner folds -->
    <path d="M46 55 C44 65, 38 80, 36 100 L42 98 C44 82, 46 68, 48 58 Z" fill="#004466" opacity="0.6"/>
    <path d="M82 55 C84 65, 90 80, 92 100 L86 98 C84 82, 82 68, 80 58 Z" fill="#004466" opacity="0.6"/>
    <!-- Cape bottom flowing edge -->
    <path d="M30 95 Q35 100, 38 108 Q42 115, 48 118 Q54 120, 58 116 Q52 112, 48 104 Q44 98, 42 92 Z" fill="#005577" opacity="0.7"/>
    <path d="M98 95 Q93 100, 90 108 Q86 115, 80 118 Q74 120, 70 116 Q76 112, 80 104 Q84 98, 86 92 Z" fill="#005577" opacity="0.7"/>
  </g>

  <!-- Body -->
  <g id="body" filter="url(#shadowDrop)">
    <!-- Torso -->
    <path d="M50 50 L50 82 Q50 88, 56 90 L72 90 Q78 88, 78 82 L78 50 Q76 44, 64 42 Q52 44, 50 50 Z" fill="url(#bodyGrad)"/>
    <!-- Chest armor detail -->
    <path d="M54 54 L64 48 L74 54 L74 70 L64 76 L54 70 Z" fill="#1A1A3E" stroke="#00E5FF" stroke-width="0.5" opacity="0.8"/>
    <!-- Chest rift symbol -->
    <path d="M60 58 L64 52 L68 58 L66 62 L68 66 L64 72 L60 66 L62 62 Z" fill="none" stroke="#B388FF" stroke-width="1" opacity="0.7"/>
    <!-- Belt -->
    <rect x="50" y="80" width="28" height="5" rx="2" fill="#2A2A4E"/>
    <rect x="60" y="79" width="8" height="7" rx="1" fill="#3A3A5E" stroke="#00E5FF" stroke-width="0.5"/>
    <!-- Rim light on body -->
    <path d="M50 50 L50 82 Q50 88, 56 90" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Arms -->
  <g id="arms">
    <!-- Left arm -->
    <path d="M50 52 C44 56, 38 64, 36 76 C35 80, 38 84, 42 82 C44 78, 46 70, 48 62 Z" fill="#141428"/>
    <circle cx="37" cy="79" r="4" fill="#1A1A2E" stroke="#00E5FF" stroke-width="0.5" opacity="0.6"/>
    <!-- Right arm with rift blade -->
    <path d="M78 52 C84 56, 90 64, 92 76 C93 80, 90 84, 86 82 C84 78, 82 70, 80 62 Z" fill="#141428"/>
    <!-- Rift blade in right hand -->
    <path d="M90 76 L94 60 L96 56 L95 54 L92 58 L88 74 Z" fill="url(#riftEnergy)" filter="url(#glowFilter)" opacity="0.9"/>
    <path d="M91 72 L93 62 L94 58" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Legs -->
  <g id="legs">
    <path d="M54 88 L50 108 C49 114, 52 118, 56 116 L60 112 L58 90 Z" fill="#0D0D1A"/>
    <path d="M74 88 L78 108 C79 114, 76 118, 72 116 L68 112 L70 90 Z" fill="#0D0D1A"/>
    <!-- Boot details -->
    <path d="M48 110 C47 116, 50 120, 58 118 L60 112 L52 110 Z" fill="#1A1A30" stroke="#00E5FF" stroke-width="0.4" opacity="0.7"/>
    <path d="M80 110 C81 116, 78 120, 70 118 L68 112 L76 110 Z" fill="#1A1A30" stroke="#00E5FF" stroke-width="0.4" opacity="0.7"/>
  </g>

  <!-- Head / Mask -->
  <g id="head">
    <!-- Hood shadow -->
    <path d="M48 18 C48 10, 56 4, 64 4 C72 4, 80 10, 80 18 L82 36 Q78 42, 64 44 Q50 42, 46 36 Z" fill="#003344" opacity="0.8"/>
    <!-- Hood -->
    <path d="M46 20 C46 10, 54 2, 64 2 C74 2, 82 10, 82 20 L84 38 Q80 44, 64 46 Q48 44, 44 38 Z" fill="url(#cloakGrad)"/>
    <!-- Hood inner shadow -->
    <path d="M50 22 C50 14, 56 8, 64 8 C72 8, 78 14, 78 22 L79 36 Q76 40, 64 42 Q52 40, 49 36 Z" fill="#001A2A" opacity="0.7"/>
    <!-- Mask -->
    <ellipse cx="64" cy="28" rx="12" ry="14" fill="url(#maskGrad)"/>
    <!-- Mask crack details -->
    <path d="M58 22 L56 30 L58 34" fill="none" stroke="#A0A0B0" stroke-width="0.5" opacity="0.5"/>
    <path d="M70 24 L72 28 L70 32" fill="none" stroke="#A0A0B0" stroke-width="0.5" opacity="0.5"/>
    <!-- Left eye slit - glowing cyan -->
    <ellipse cx="58" cy="26" rx="4" ry="2" fill="url(#eyeGlow)" filter="url(#glowFilter)"/>
    <ellipse cx="58" cy="26" rx="2" ry="1" fill="#FFFFFF"/>
    <!-- Right eye slit - glowing cyan -->
    <ellipse cx="70" cy="26" rx="4" ry="2" fill="url(#eyeGlow)" filter="url(#glowFilter)"/>
    <ellipse cx="70" cy="26" rx="2" ry="1" fill="#FFFFFF"/>
    <!-- Mask forehead rift symbol -->
    <path d="M62 16 L64 12 L66 16 L64 20 Z" fill="none" stroke="#B388FF" stroke-width="0.8" filter="url(#softGlow)" opacity="0.8"/>
  </g>

  <!-- Decorative energy particles -->
  <g id="particles" filter="url(#softGlow)">
    <circle cx="34" cy="60" r="1.5" fill="#00E5FF" opacity="0.7"/>
    <circle cx="94" cy="55" r="1" fill="#B388FF" opacity="0.6"/>
    <circle cx="40" cy="100" r="1.2" fill="#E040FB" opacity="0.5"/>
    <circle cx="88" cy="95" r="1.8" fill="#00E5FF" opacity="0.6"/>
    <circle cx="30" cy="40" r="0.8" fill="#B388FF" opacity="0.4"/>
    <circle cx="98" cy="42" r="1" fill="#00E5FF" opacity="0.5"/>
    <circle cx="64" cy="122" r="1.5" fill="#E040FB" opacity="0.4"/>
    <circle cx="46" cy="115" r="1" fill="#B388FF" opacity="0.3"/>
  </g>
</svg>