<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="puCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E040FB"/>
      <stop offset="50%" stop-color="#AA00FF"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
    <radialGradient id="puGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#B388FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="puRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <linearGradient id="puArrow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <radialGradient id="puInner" cx="0.5" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="puGlowF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#4A148C" flood-opacity="0.5"/>
    </filter>
    <filter id="puSparkle" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer energy aura -->
  <ellipse cx="32" cy="32" rx="30" ry="30" fill="url(#puGlow)" opacity="0.6"/>
  <ellipse cx="32" cy="32" rx="24" ry="24" fill="url(#puGlow)" opacity="0.3"/>

  <!-- Hexagonal frame -->
  <g filter="url(#puShadow)">
    <polygon points="32,4 54,18 54,46 32,60 10,46 10,18" fill="none" stroke="url(#puRing)" stroke-width="1.5" opacity="0.7"/>
    <polygon points="32,8 50,20 50,44 32,56 14,44 14,20" fill="none" stroke="#B388FF" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Rotating orbit ring -->
  <ellipse cx="32" cy="32" rx="20" ry="20" fill="none" stroke="url(#puRing)" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.5" transform="rotate(15,32,32)"/>
  <ellipse cx="32" cy="32" rx="16" ry="16" fill="none" stroke="#00E5FF" stroke-width="0.6" stroke-dasharray="2 8" opacity="0.4" transform="rotate(-30,32,32)"/>

  <!-- Orbiting gems -->
  <circle cx="32" cy="12" r="3" fill="#00E5FF" filter="url(#puGlowF)" opacity="0.8"/>
  <circle cx="50" cy="38" r="2.5" fill="#E040FB" filter="url(#puGlowF)" opacity="0.7"/>
  <circle cx="14" cy="38" r="2.5" fill="#B388FF" filter="url(#puGlowF)" opacity="0.7"/>

  <!-- Central power crystal -->
  <g filter="url(#puGlowF)">
    <path d="M32 18 L40 28 L38 40 L32 46 L26 40 L24 28 Z" fill="url(#puCore)"/>
    <!-- Crystal facets -->
    <path d="M32 18 L40 28 L32 32 Z" fill="#CE93D8" opacity="0.3"/>
    <path d="M32 18 L24 28 L32 32 Z" fill="#AB47BC" opacity="0.25"/>
    <path d="M32 32 L40 28 L38 40 L32 46 Z" fill="#7B1FA2" opacity="0.2"/>
    <path d="M32 32 L24 28 L26 40 L32 46 Z" fill="#6A1B9A" opacity="0.2"/>
  </g>

  <!-- Inner white glow -->
  <ellipse cx="32" cy="30" rx="6" ry="8" fill="url(#puInner)"/>

  <!-- Up-arrow symbol (power up!) -->
  <g filter="url(#puSparkle)">
    <path d="M32 22 L36 28 L34 28 L34 34 L30 34 L30 28 L28 28 Z" fill="url(#puArrow)" opacity="0.8"/>
  </g>

  <!-- Energy wave arcs -->
  <path d="M18 22 Q14 16, 18 10" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
  <path d="M14 26 Q10 20, 14 14" fill="none" stroke="#00E5FF" stroke-width="0.7" opacity="0.3"/>
  <path d="M46 22 Q50 16, 46 10" fill="none" stroke="#E040FB" stroke-width="1" opacity="0.4"/>
  <path d="M50 26 Q54 20, 50 14" fill="none" stroke="#E040FB" stroke-width="0.7" opacity="0.3"/>

  <!-- Energy wisps -->
  <path d="M8 28 C6 24, 8 20, 12 18" fill="none" stroke="#B388FF" stroke-width="0.8" opacity="0.4"/>
  <path d="M56 28 C58 24, 56 20, 52 18" fill="none" stroke="#B388FF" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner accent dots -->
  <circle cx="6" cy="6" r="1" fill="#E040FB" opacity="0.4"/>
  <circle cx="58" cy="6" r="1" fill="#00E5FF" opacity="0.4"/>
  <circle cx="6" cy="58" r="1" fill="#00E5FF" opacity="0.4"/>
  <circle cx="58" cy="58" r="1" fill="#E040FB" opacity="0.4"/>

  <!-- Sparkle accents -->
  <path d="M10 50 L11 48 L12 50 L11 52 Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M52 50 L53 48 L54 50 L53 52 Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M32 2 L33 0 L34 2 L33 4 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M32 60 L33 58 L34 60 L33 62 Z" fill="#FFFFFF" opacity="0.4"/>

  <!-- Rune symbols -->
  <text x="20" y="56" font-size="5" fill="#7C4DFF" opacity="0.3" font-family="serif">&#x16B1;</text>
  <text x="40" y="56" font-size="5" fill="#7C4DFF" opacity="0.3" font-family="serif">&#x16CA;</text>
  <text x="6" y="40" font-size="4" fill="#B388FF" opacity="0.25" font-family="serif">&#x16A6;</text>
  <text x="52" y="40" font-size="4" fill="#B388FF" opacity="0.25" font-family="serif">&#x16DE;</text>
</svg>