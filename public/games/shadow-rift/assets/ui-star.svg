<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="starCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#00E5FF"/>
      <stop offset="60%" stop-color="#0097A7"/>
      <stop offset="100%" stop-color="#004D5A"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#B388FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starHighlight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="riftGem" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
    <linearGradient id="starRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B388FF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#004D5A" flood-opacity="0.5"/>
    </filter>
    <filter id="sparkle" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow aura -->
  <ellipse cx="24" cy="24" rx="22" ry="22" fill="url(#starGlow)" opacity="0.5"/>

  <!-- Shadow -->
  <polygon points="24,3 28,17 43,17 31,26 35,40 24,31 13,40 17,26 5,17 20,17" fill="#003040" opacity="0.3" transform="translate(1,1.5)"/>

  <!-- Main star shape -->
  <g filter="url(#sShadow)">
    <polygon points="24,4 28,17 42,17 31,26 35,39 24,30 13,39 17,26 6,17 20,17" fill="url(#starCore)"/>
  </g>

  <!-- Facet details -->
  <polygon points="24,4 28,17 24,20" fill="#80DEEA" opacity="0.3"/>
  <polygon points="24,4 20,17 24,20" fill="#4DD0E1" opacity="0.25"/>
  <polygon points="28,17 42,17 31,26" fill="#00ACC1" opacity="0.2"/>
  <polygon points="20,17 6,17 17,26" fill="#00838F" opacity="0.2"/>
  <polygon points="24,30 35,39 31,26" fill="#006064" opacity="0.25"/>
  <polygon points="24,30 13,39 17,26" fill="#004D40" opacity="0.25"/>

  <!-- Center rift gem -->
  <circle cx="24" cy="22" r="5" fill="url(#riftGem)" filter="url(#sGlow)"/>
  <circle cx="24" cy="22" r="2.5" fill="#E040FB" opacity="0.4"/>
  <circle cx="23" cy="21" r="1.2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Rift energy lines radiating from center -->
  <g filter="url(#sGlow)" opacity="0.5">
    <line x1="24" y1="22" x2="24" y2="6" stroke="#B388FF" stroke-width="0.6"/>
    <line x1="24" y1="22" x2="40" y2="17" stroke="#B388FF" stroke-width="0.5"/>
    <line x1="24" y1="22" x2="8" y2="17" stroke="#B388FF" stroke-width="0.5"/>
    <line x1="24" y1="22" x2="34" y2="38" stroke="#B388FF" stroke-width="0.4"/>
    <line x1="24" y1="22" x2="14" y2="38" stroke="#B388FF" stroke-width="0.4"/>
  </g>

  <!-- Star outline / rim -->
  <polygon points="24,4 28,17 42,17 31,26 35,39 24,30 13,39 17,26 6,17 20,17" fill="none" stroke="url(#starRim)" stroke-width="0.8"/>

  <!-- Highlight on top point -->
  <path d="M22 8 L24 4 L26 8 L24 12 Z" fill="url(#starHighlight)"/>

  <!-- Sparkle accents -->
  <g filter="url(#sparkle)">
    <path d="M6 8 L7 6 L8 8 L7 10 Z" fill="#00E5FF" opacity="0.6"/>
    <path d="M40 8 L41 6 L42 8 L41 10 Z" fill="#00E5FF" opacity="0.5"/>
    <path d="M24 44 L25 42 L26 44 L25 46 Z" fill="#B388FF" opacity="0.5"/>
    <path d="M4 30 L5 28 L6 30 L5 32 Z" fill="#E040FB" opacity="0.4"/>
    <path d="M42 30 L43 28 L44 30 L43 32 Z" fill="#E040FB" opacity="0.4"/>
  </g>

  <!-- Orbiting dimensional dots -->
  <circle cx="10" cy="10" r="1" fill="#00E5FF" opacity="0.4"/>
  <circle cx="38" cy="10" r="0.8" fill="#B388FF" opacity="0.4"/>
  <circle cx="44" cy="24" r="0.7" fill="#E040FB" opacity="0.35"/>
  <circle cx="4" cy="24" r="0.7" fill="#E040FB" opacity="0.35"/>
  <circle cx="10" cy="40" r="0.6" fill="#00E5FF" opacity="0.3"/>
  <circle cx="38" cy="40" r="0.6" fill="#B388FF" opacity="0.3"/>

  <!-- Unicode rune symbols for volume -->
  <text x="16" y="44" font-size="4" fill="#7C4DFF" opacity="0.3" font-family="serif">&#x16B1;</text>
  <text x="30" y="44" font-size="4" fill="#7C4DFF" opacity="0.3" font-family="serif">&#x16CA;</text>
</svg>