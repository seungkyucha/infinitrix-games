<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="thumbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <radialGradient id="thumbCenterGlow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#aa33ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#aa33ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="thumbHexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3388ff"/>
      <stop offset="100%" stop-color="#aa33ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3388ff"/>
      <stop offset="50%" stop-color="#e0e0ff"/>
      <stop offset="100%" stop-color="#aa33ff"/>
    </linearGradient>
    <linearGradient id="blockR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3366"/><stop offset="100%" stop-color="#aa0033"/>
    </linearGradient>
    <linearGradient id="blockG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ff88"/><stop offset="100%" stop-color="#00aa55"/>
    </linearGradient>
    <linearGradient id="blockB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3388ff"/><stop offset="100%" stop-color="#0044aa"/>
    </linearGradient>
    <linearGradient id="blockP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa33ff"/><stop offset="100%" stop-color="#5500aa"/>
    </linearGradient>
    <linearGradient id="blockY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdd33"/><stop offset="100%" stop-color="#aa8800"/>
    </linearGradient>
    <linearGradient id="blockO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8833"/><stop offset="100%" stop-color="#aa4400"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#thumbBg)"/>
  <rect width="400" height="300" fill="url(#thumbCenterGlow)"/>
  <!-- 배경 별 -->
  <g fill="#e0e0ff" opacity="0.3">
    <circle cx="30" cy="20" r="0.8"/><circle cx="80" cy="60" r="0.5"/>
    <circle cx="150" cy="30" r="0.7"/><circle cx="250" cy="50" r="0.6"/>
    <circle cx="340" cy="25" r="0.8"/><circle cx="370" cy="70" r="0.5"/>
    <circle cx="50" cy="250" r="0.6"/><circle cx="130" cy="270" r="0.5"/>
    <circle cx="300" cy="260" r="0.7"/><circle cx="380" cy="240" r="0.6"/>
  </g>
  <!-- 중앙 헥사곤 -->
  <g transform="translate(200,165)">
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="#15152a" stroke="url(#thumbHexGrad)" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <!-- 블록 스택 -->
  <g transform="translate(200,165)">
    <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockR)" stroke="#ff3366" stroke-width="0.5"/>
    <rect x="-10" y="-92" width="20" height="14" rx="2" fill="url(#blockG)" stroke="#33ff88" stroke-width="0.5"/>
    <g transform="rotate(60)">
      <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockB)" stroke="#3388ff" stroke-width="0.5"/>
      <rect x="-10" y="-92" width="20" height="14" rx="2" fill="url(#blockP)" stroke="#aa33ff" stroke-width="0.5"/>
      <rect x="-10" y="-109" width="20" height="14" rx="2" fill="url(#blockB)" stroke="#3388ff" stroke-width="0.5"/>
    </g>
    <g transform="rotate(120)">
      <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockY)" stroke="#ffdd33" stroke-width="0.5"/>
    </g>
    <g transform="rotate(180)">
      <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockO)" stroke="#ff8833" stroke-width="0.5"/>
      <rect x="-10" y="-92" width="20" height="14" rx="2" fill="url(#blockR)" stroke="#ff3366" stroke-width="0.5"/>
    </g>
    <g transform="rotate(240)">
      <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockG)" stroke="#33ff88" stroke-width="0.5"/>
      <rect x="-10" y="-92" width="20" height="14" rx="2" fill="url(#blockG)" stroke="#33ff88" stroke-width="0.5"/>
      <rect x="-10" y="-109" width="20" height="14" rx="2" fill="url(#blockR)" stroke="#ff3366" stroke-width="0.5"/>
    </g>
    <g transform="rotate(300)">
      <rect x="-10" y="-75" width="20" height="14" rx="2" fill="url(#blockP)" stroke="#aa33ff" stroke-width="0.5"/>
    </g>
  </g>
  <!-- 낙하 블록 -->
  <rect x="190" y="30" width="20" height="14" rx="2" fill="url(#blockY)" stroke="#ffdd33" stroke-width="1" opacity="0.8"/>
  <rect x="190" y="15" width="20" height="14" rx="2" fill="#ffdd33" opacity="0.2"/>
  <rect x="190" y="2" width="20" height="14" rx="2" fill="#ffdd33" opacity="0.08"/>
  <!-- 소멸 이펙트 -->
  <g transform="translate(260,140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#33ff88" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="#33ff88" opacity="0.3"/>
    <line x1="-12" y1="0" x2="-20" y2="-4" stroke="#33ff88" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="0" x2="20" y2="4" stroke="#33ff88" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-12" x2="4" y2="-20" stroke="#33ff88" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- 회전 화살표 -->
  <g transform="translate(130,180)" opacity="0.5">
    <path d="M-5,-20 A22,22 0 0,1 18,-8" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <polygon points="18,-8 22,-14 14,-12" fill="#ffd700"/>
  </g>
  <!-- 제목 -->
  <text x="200" y="42" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#titleGrad)">NEON HEX DROP</text>
  <!-- 서브텍스트 -->
  <text x="200" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e0e0ff" opacity="0.6">ROTATE · STACK · MATCH · SURVIVE</text>
  <!-- 테두리 -->
  <rect x="4" y="4" width="392" height="292" rx="6" fill="none" stroke="#aa33ff" stroke-width="1" opacity="0.2"/>
  <rect x="8" y="8" width="384" height="284" rx="4" fill="none" stroke="#3388ff" stroke-width="0.5" opacity="0.15"/>
</svg>
