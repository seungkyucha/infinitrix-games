<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>네온 헥스 드롭</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

/* ========== CONFIG — all game constants (§13.1) ========== */
const CONFIG = {
  CORE_RADIUS: 60,
  BLOCK_HEIGHT: 20,
  MAX_LAYERS: 4,
  GAMEOVER_RADIUS_MULT: 2.5,
  MIN_TOUCH_TARGET: 48,
  ROTATION_DURATION: 150,
  DROP_INTERVAL_BASE: 2.0,
  DROP_INTERVAL_MIN: 0.4,
  DROP_INTERVAL_STEP: 0.085,
  BLOCKS_PER_LEVEL: 10,
  MAX_LEVEL: 20,
  SCORE_PER_BLOCK: 10,
  COMBO_MULTIPLIER: 0.5,
  HARD_DROP_BONUS: 2,
  LEVEL_BONUS_MULT: 100,
  PARTICLE_POOL_SIZE: 50,
  POPUP_POOL_SIZE: 10,
  STAR_COUNT: 20,
  SCREEN_SHAKE_PX: 3,
  SCREEN_SHAKE_MS: 200,
  DT_CAP: 0.033,
  DUAL_SPAWN_LEVEL: 6,
  DUAL_SPAWN_PROB_LOW: 0.3,
  DUAL_SPAWN_PROB_HIGH: 0.5,
  DUAL_SPAWN_LEVEL_HIGH: 11,
  RESCUE_THRESHOLD_SEC: 5,
  CASCADE_SLOWDOWN_SEC: 0.5,
  CASCADE_SLOWDOWN_MIN: 4,
  ACTIVE_COLORS_LV4: 4,
  ACTIVE_COLORS_LV8: 5,
  ACTIVE_COLORS_LV13: 6
};

/* State enum (§6.1) */
const STATE = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };
/* State transition priority map (F17) */
const STATE_PRIORITY = { 0: 0, 1: 1, 2: 2, 3: 3 };

/* Block color definitions with 3-way accessibility (§4.2) */
const BLOCK_COLORS = [
  { fill: '#ff3366', glow: '#ff336680', letter: 'R', shape: 'circle' },
  { fill: '#3388ff', glow: '#3388ff80', letter: 'B', shape: 'diamond' },
  { fill: '#33ff88', glow: '#33ff8880', letter: 'G', shape: 'triangle' },
  { fill: '#ffdd33', glow: '#ffdd3380', letter: 'Y', shape: 'square' },
  { fill: '#bb44ff', glow: '#bb44ff80', letter: 'P', shape: 'star' },
  { fill: '#ff8833', glow: '#ff883380', letter: 'O', shape: 'dblcircle' }
];

/* ========== GLOBAL VARIABLE DECLARATIONS (§5.1 step 2) ========== */
let canvas, ctx, dpr;
let W, H, cx, cy;
let bgCache = null;
let state = STATE.TITLE;
let score = 0, highScore = 0, level = 1, blocksCleared = 0;
let cascadeCount = 0;
let dropTimer = 0, dropInterval = CONFIG.DROP_INTERVAL_BASE;
let isResolving = false, isRotating = false, _transitioning = false;
let currentAngle = 0;
let grid = [];
let fallingBlocks = [];
let lastTime = 0;
let titleTime = 0, gameoverTime = 0;
let comboText = '', comboAlpha = 0;
let levelUpText = '', levelUpAlpha = 0;
let shakeAmount = 0, shakeDuration = 0;
let rescueTimer = 0;
let slowdownTimer = 0;
let stars = [];
let isNewHigh = false;
let touchStartX = 0, touchStartY = 0;
let particlePool, popupPool;

/* ========== TWEEN MANAGER (§5.1 step 3) ========== */
const tweenManager = {
  _tweens: [],
  /* Add a new tween animation */
  add(t) {
    t.elapsed = 0;
    this._tweens.push(t);
    return t;
  },
  /* Update all active tweens */
  update(dt) {
    const ms = dt * 1000;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += ms;
      const p = Math.min(t.elapsed / t.duration, 1);
      const ep = t.easing ? t.easing(p) : p;
      if (t.obj && t.prop !== undefined) {
        t.obj[t.prop] = t.from + (t.to - t.from) * ep;
      }
      if (t.onUpdate) t.onUpdate(ep);
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  },
  /* Clear all tweens immediately */
  clear() { this._tweens.length = 0; }
};

/* ========== EASING FUNCTIONS ========== */
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

/* ========== OBJECT POOL (§5.1 step 3) ========== */
function createPool(size, factory) {
  const pool = [];
  for (let i = 0; i < size; i++) pool.push(factory());
  return {
    items: pool,
    /* Acquire an inactive item from the pool */
    get() {
      for (let i = 0; i < pool.length; i++) {
        if (!pool[i].active) { pool[i].active = true; return pool[i]; }
      }
      return null;
    },
    /* Update all active items */
    update(dt) {
      for (let i = 0; i < pool.length; i++) {
        if (pool[i].active) pool[i].update(dt);
      }
    },
    /* Draw all active items */
    draw(c) {
      for (let i = 0; i < pool.length; i++) {
        if (pool[i].active) pool[i].draw(c);
      }
    }
  };
}

/* Particle factory for explosion effects */
function makeParticle() {
  return {
    active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1,
    color: '#fff', size: 3,
    init(x, y, vx, vy, life, color, size) {
      this.x = x; this.y = y; this.vx = vx; this.vy = vy;
      this.life = life; this.maxLife = life; this.color = color;
      this.size = size || 3; this.active = true;
    },
    update(dt) {
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.vy += 30 * dt;
      this.life -= dt;
      if (this.life <= 0) this.active = false;
    },
    draw(c) {
      const a = Math.max(0, this.life / this.maxLife);
      c.save();
      c.globalAlpha = a;
      c.fillStyle = this.color;
      c.shadowColor = this.color;
      c.shadowBlur = 6;
      c.beginPath();
      c.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
  };
}

/* Popup text factory for score feedback */
function makePopup() {
  return {
    active: false, x: 0, y: 0, text: '', color: '#fff', life: 0, maxLife: 1,
    init(x, y, text, color, life) {
      this.x = x; this.y = y; this.text = text; this.color = color;
      this.life = life; this.maxLife = life; this.active = true;
    },
    update(dt) {
      this.y -= 30 * dt;
      this.life -= dt;
      if (this.life <= 0) this.active = false;
    },
    draw(c) {
      const a = Math.max(0, this.life / this.maxLife);
      c.save();
      c.globalAlpha = a;
      c.font = 'bold 14px monospace';
      c.fillStyle = this.color;
      c.shadowColor = this.color;
      c.shadowBlur = 8;
      c.textAlign = 'center';
      c.fillText(this.text, this.x, this.y);
      c.restore();
    }
  };
}

/* ========== SOUND MANAGER — Web Audio API procedural (§9, F2) ========== */
const sound = {
  ctx: null,
  muted: false,
  /* Lazy-init AudioContext on first user gesture */
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { /* no audio support */ }
  },
  /* Play a procedural sound effect by type */
  play(type) {
    if (this.muted || !this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      gain.gain.setValueAtTime(0.3, now);

      if (type === 'rotate') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(520, now + 0.08);
        gain.gain.linearRampToValueAtTime(0, now + 0.08);
        osc.start(now); osc.stop(now + 0.09);
      } else if (type === 'land') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(220, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.11);
      } else if (type === 'match') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.linearRampToValueAtTime(784, now + 0.15);
        gain.gain.linearRampToValueAtTime(0, now + 0.15);
        osc.start(now); osc.stop(now + 0.16);
      } else if (type === 'combo') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(659, now);
        osc.frequency.linearRampToValueAtTime(1047, now + 0.2);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.21);
        const o2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        o2.connect(g2); g2.connect(this.ctx.destination);
        o2.type = 'square';
        o2.frequency.setValueAtTime(659, now);
        o2.frequency.linearRampToValueAtTime(1047, now + 0.2);
        g2.gain.setValueAtTime(0.15, now);
        g2.gain.linearRampToValueAtTime(0, now + 0.2);
        o2.start(now); o2.stop(now + 0.21);
      } else if (type === 'gameover') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(110, now + 0.5);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.51);
      } else if (type === 'levelup') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.linearRampToValueAtTime(1047, now + 0.3);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.31);
      }
    } catch(e) { /* silence audio errors */ }
  }
};

/* ========== PURE FUNCTIONS (§10 — all receive data via parameters) ========== */

/* Compute hexagon vertex i for pointy-top orientation */
function hexVertex(cxp, cyp, r, i) {
  const angle = Math.PI / 3 * i - Math.PI / 6;
  return { x: cxp + r * Math.cos(angle), y: cyp + r * Math.sin(angle) };
}

/* Get the two endpoint vertices of hex side */
function sideVertices(cxp, cyp, r, side) {
  return [hexVertex(cxp, cyp, r, side), hexVertex(cxp, cyp, r, (side + 1) % 6)];
}

/* Compute 4 trapezoid vertices for a block at given side and layer */
function blockVertices(cxp, cyp, r, side, layer, bh) {
  const innerR = r + layer * bh;
  const outerR = innerR + bh;
  return [
    hexVertex(cxp, cyp, innerR, side),
    hexVertex(cxp, cyp, innerR, (side + 1) % 6),
    hexVertex(cxp, cyp, outerR, (side + 1) % 6),
    hexVertex(cxp, cyp, outerR, side)
  ];
}

/* Check if two grid cells are adjacent */
function isAdjacent(s1, l1, s2, l2) {
  if (s1 === s2 && Math.abs(l1 - l2) === 1) return true;
  if (l1 === l2 && ((s1 + 1) % 6 === s2 || (s2 + 1) % 6 === s1)) return true;
  return false;
}

/* BFS to find all groups of 3+ same-color adjacent blocks */
function findMatches(g) {
  const visited = [];
  for (let s = 0; s < 6; s++) {
    visited[s] = [];
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) visited[s][l] = false;
  }
  const allMatched = [];
  for (let s = 0; s < 6; s++) {
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
      if (visited[s][l] || !g[s][l]) continue;
      const color = g[s][l].colorIndex;
      const group = [];
      const queue = [{ s: s, l: l }];
      visited[s][l] = true;
      while (queue.length > 0) {
        const cur = queue.shift();
        group.push(cur);
        for (let ns = 0; ns < 6; ns++) {
          for (let nl = 0; nl < CONFIG.MAX_LAYERS; nl++) {
            if (visited[ns][nl] || !g[ns][nl]) continue;
            if (g[ns][nl].colorIndex !== color) continue;
            if (isAdjacent(cur.s, cur.l, ns, nl)) {
              visited[ns][nl] = true;
              queue.push({ s: ns, l: nl });
            }
          }
        }
      }
      if (group.length >= 3) {
        for (let gi = 0; gi < group.length; gi++) allMatched.push(group[gi]);
      }
    }
  }
  return allMatched;
}

/* Rotate grid data logically by direction (-1 or +1) */
function rotateGridData(g, dir) {
  const newG = [];
  for (let s = 0; s < 6; s++) {
    const src = ((s - dir) % 6 + 6) % 6;
    newG[s] = g[src].slice();
  }
  for (let s = 0; s < 6; s++) g[s] = newG[s];
}

/* Compact each side removing null gaps (gravity) */
function applyGravity(g) {
  for (let s = 0; s < 6; s++) {
    const compact = [];
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
      if (g[s][l]) compact.push(g[s][l]);
    }
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
      g[s][l] = l < compact.length ? compact[l] : null;
    }
  }
}

/* Check if any side has blocks at the max layer */
function checkGameOver(g, maxLayers) {
  for (let s = 0; s < 6; s++) {
    if (g[s][maxLayers - 1]) return true;
  }
  return false;
}

/* Calculate score for a match event (§7.2) */
function calcScore(matchCount, cascade) {
  let base;
  if (matchCount <= 3) base = 30;
  else if (matchCount === 4) base = 50;
  else if (matchCount === 5) base = 80;
  else base = matchCount * CONFIG.SCORE_PER_BLOCK + (matchCount - 3) * 20;
  return Math.floor(base * (1 + cascade * CONFIG.COMBO_MULTIPLIER));
}

/* Get drop interval for a given level (§11.1) */
function getDropInterval(lv) {
  return Math.max(CONFIG.DROP_INTERVAL_MIN, CONFIG.DROP_INTERVAL_BASE - (lv - 1) * CONFIG.DROP_INTERVAL_STEP);
}

/* Get number of active colors for a given level (§2.2) */
function getActiveColors(lv) {
  if (lv >= 13) return CONFIG.ACTIVE_COLORS_LV13;
  if (lv >= 8) return CONFIG.ACTIVE_COLORS_LV8;
  if (lv >= 4) return CONFIG.ACTIVE_COLORS_LV4;
  return 3;
}

/* Count how many layers are filled on a side */
function sideLayerCount(g, s) {
  let count = 0;
  for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
    if (g[s][l]) count++; else break;
  }
  return count;
}

/* ========== GAME STATE MANAGEMENT ========== */

/* Core state object for tween interpolation */
const coreState = { angle: 0 };

/* Add score through single pathway (F16) — judgment before save */
function addScore(amount) {
  score += amount;
  isNewHigh = score > highScore;
  if (isNewHigh) highScore = score;
}

/* Set level through single pathway (F16) */
function setLevel(lv) {
  level = Math.min(lv, CONFIG.MAX_LEVEL);
  dropInterval = getDropInterval(level);
}

/* Reset all game state for a new game */
function resetGame() {
  score = 0; level = 1; blocksCleared = 0; cascadeCount = 0;
  dropTimer = 0; dropInterval = CONFIG.DROP_INTERVAL_BASE;
  isResolving = false; isRotating = false;
  currentAngle = 0; coreState.angle = 0;
  comboText = ''; comboAlpha = 0;
  levelUpText = ''; levelUpAlpha = 0;
  shakeAmount = 0; shakeDuration = 0;
  rescueTimer = 0; slowdownTimer = 0;
  isNewHigh = false;
  fallingBlocks = [];
  grid = [];
  for (let s = 0; s < 6; s++) {
    grid[s] = [];
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) grid[s][l] = null;
  }
  tweenManager.clear();
}

/* Begin a guarded state transition with fade (F9/F17) */
function beginTransition(newState, duration, onBeforeEnter) {
  if (_transitioning) return;
  if (STATE_PRIORITY[newState] < STATE_PRIORITY[state] && newState !== STATE.TITLE) return;
  _transitioning = true;
  tweenManager.add({
    duration: duration || 300,
    easing: easeInOutQuad,
    onComplete() {
      _transitioning = false;
      if (onBeforeEnter) onBeforeEnter();
      enterState(newState);
    }
  });
}

/* Enter a state and run its initialization (§6.4) */
function enterState(newState) {
  state = newState;
  if (newState === STATE.TITLE) {
    resetGame();
    titleTime = 0;
  } else if (newState === STATE.PLAYING) {
    dropTimer = 0;
    spawnNewBlock();
  } else if (newState === STATE.GAMEOVER) {
    gameoverTime = 0;
    saveHighScore();
    sound.play('gameover');
    shakeAmount = CONFIG.SCREEN_SHAKE_PX * 2;
    shakeDuration = CONFIG.SCREEN_SHAKE_MS / 1000 * 2;
    for (let s = 0; s < 6; s++) {
      for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
        if (grid[s][l]) {
          const verts = blockVertices(cx, cy, CONFIG.CORE_RADIUS, s, l, CONFIG.BLOCK_HEIGHT);
          const mx = (verts[0].x + verts[2].x) / 2;
          const my = (verts[0].y + verts[2].y) / 2;
          const col = BLOCK_COLORS[grid[s][l].colorIndex].fill;
          for (let p = 0; p < 3; p++) {
            const pt = particlePool.get();
            if (pt) pt.init(mx, my, (Math.random()-0.5)*150, (Math.random()-0.5)*150, 1.2+Math.random()*0.6, col, 2+Math.random()*2);
          }
        }
      }
    }
  }
}

/* ========== BLOCK SPAWNING (§11.3) ========== */
function spawnNewBlock() {
  if (state !== STATE.PLAYING) return;
  const colorCount = getActiveColors(level);

  let allHigh = true;
  let minSide = 0, minCount = CONFIG.MAX_LAYERS;
  for (let s = 0; s < 6; s++) {
    const c = sideLayerCount(grid, s);
    if (c < 2) allHigh = false;
    if (c < minCount) { minCount = c; minSide = s; }
  }

  let side1;
  if (allHigh && rescueTimer >= CONFIG.RESCUE_THRESHOLD_SEC) {
    side1 = minSide;
    rescueTimer = 0;
  } else {
    side1 = Math.floor(Math.random() * 6);
  }

  const dualProb = level >= CONFIG.DUAL_SPAWN_LEVEL_HIGH ? CONFIG.DUAL_SPAWN_PROB_HIGH
                 : level >= CONFIG.DUAL_SPAWN_LEVEL ? CONFIG.DUAL_SPAWN_PROB_LOW : 0;
  let side2 = -1;
  if (Math.random() < dualProb) {
    do { side2 = Math.floor(Math.random() * 6); } while (side2 === side1);
  }

  fallingBlocks.push({
    colorIndex: Math.floor(Math.random() * colorCount),
    side: side1,
    progress: 0
  });
  if (side2 >= 0) {
    fallingBlocks.push({
      colorIndex: Math.floor(Math.random() * colorCount),
      side: side2,
      progress: 0
    });
  }
}

/* ========== CORE ROTATION (§8.4) ========== */
function rotateCore(dir) {
  if (isRotating || isResolving || state !== STATE.PLAYING) return;
  isRotating = true;
  sound.play('rotate');
  const from = coreState.angle;
  const to = from + dir * (Math.PI / 3);
  tweenManager.add({
    obj: coreState,
    prop: 'angle',
    from: from,
    to: to,
    duration: CONFIG.ROTATION_DURATION,
    easing: easeOutCubic,
    onComplete() {
      rotateGridData(grid, dir);
      for (let i = 0; i < fallingBlocks.length; i++) {
        fallingBlocks[i].side = ((fallingBlocks[i].side - dir) % 6 + 6) % 6;
      }
      coreState.angle = to;
      currentAngle = to;
      isRotating = false;
    }
  });
}

/* ========== MATCH RESOLUTION (§8.5, F7 guard) ========== */
function resolveMatches() {
  if (isResolving) return;
  const matched = findMatches(grid);
  if (matched.length === 0) {
    cascadeCount = 0;
    spawnNewBlock();
    return;
  }

  isResolving = true;
  const pts = calcScore(matched.length, cascadeCount);
  addScore(pts);
  blocksCleared += matched.length;

  const newLevel = Math.min(Math.floor(blocksCleared / CONFIG.BLOCKS_PER_LEVEL) + 1, CONFIG.MAX_LEVEL);
  if (newLevel > level) {
    addScore(newLevel * CONFIG.LEVEL_BONUS_MULT);
    setLevel(newLevel);
    levelUpText = 'LEVEL ' + level + '!';
    levelUpAlpha = 1;
    sound.play('levelup');
  }

  if (cascadeCount >= 1) {
    comboText = cascadeCount + 1 >= 5 ? 'AMAZING! x' + (cascadeCount + 1) : 'COMBO x' + (cascadeCount + 1);
    comboAlpha = 1;
    sound.play('combo');
    if (cascadeCount + 1 >= 3) {
      shakeAmount = CONFIG.SCREEN_SHAKE_PX;
      shakeDuration = CONFIG.SCREEN_SHAKE_MS / 1000;
    }
  } else {
    sound.play('match');
  }

  for (let mi = 0; mi < matched.length; mi++) {
    const cell = matched[mi];
    if (!grid[cell.s][cell.l]) continue;
    const verts = blockVertices(cx, cy, CONFIG.CORE_RADIUS, cell.s, cell.l, CONFIG.BLOCK_HEIGHT);
    const mx = (verts[0].x + verts[2].x) / 2;
    const my = (verts[0].y + verts[2].y) / 2;
    const col = BLOCK_COLORS[grid[cell.s][cell.l].colorIndex].fill;
    for (let p = 0; p < 4; p++) {
      const pt = particlePool.get();
      if (pt) pt.init(mx, my, (Math.random()-0.5)*120, (Math.random()-0.5)*120, 0.5+Math.random()*0.5, col, 2+Math.random()*2);
    }
    const pop = popupPool.get();
    if (pop) pop.init(mx, my - 10, '+' + pts, col, 0.8);
  }

  for (let mi = 0; mi < matched.length; mi++) {
    grid[matched[mi].s][matched[mi].l] = null;
  }
  applyGravity(grid);

  if (cascadeCount + 1 >= CONFIG.CASCADE_SLOWDOWN_MIN) {
    slowdownTimer = CONFIG.CASCADE_SLOWDOWN_SEC;
  }

  tweenManager.add({
    duration: 200,
    onComplete() {
      isResolving = false;
      cascadeCount++;
      const more = findMatches(grid);
      if (more.length > 0) {
        resolveMatches();
      } else {
        cascadeCount = 0;
        spawnNewBlock();
      }
    }
  });
}

/* ========== HARD DROP (§7.2) ========== */
function hardDrop() {
  if (state !== STATE.PLAYING || isResolving || fallingBlocks.length === 0) return;
  for (let i = 0; i < fallingBlocks.length; i++) {
    const fb = fallingBlocks[i];
    const layerCount = sideLayerCount(grid, fb.side);
    if (layerCount < CONFIG.MAX_LAYERS) {
      const remaining = Math.max(0, Math.ceil((1 - fb.progress) * 4));
      addScore(remaining * CONFIG.HARD_DROP_BONUS);
      grid[fb.side][layerCount] = { colorIndex: fb.colorIndex };
      sound.play('land');
    }
  }
  fallingBlocks = [];
  if (checkGameOver(grid, CONFIG.MAX_LAYERS)) {
    beginTransition(STATE.GAMEOVER, 400);
    return;
  }
  resolveMatches();
}

/* ========== UPDATE (§5.2, §6.3 matrix) ========== */
function update(dt) {
  tweenManager.update(dt);

  if (comboAlpha > 0) comboAlpha = Math.max(0, comboAlpha - dt * 1.5);
  if (levelUpAlpha > 0) levelUpAlpha = Math.max(0, levelUpAlpha - dt * 0.8);

  if (shakeDuration > 0) {
    shakeDuration -= dt;
    if (shakeDuration <= 0) { shakeAmount = 0; shakeDuration = 0; }
  }

  if (state !== STATE.PAUSED) {
    for (let i = 0; i < stars.length; i++) {
      stars[i].y += stars[i].speed * dt;
      if (stars[i].y > H) { stars[i].y = -2; stars[i].x = Math.random() * W; }
    }
  }

  if (state === STATE.TITLE) {
    titleTime += dt;
    return;
  }
  if (state === STATE.GAMEOVER) {
    gameoverTime += dt;
    particlePool.update(dt);
    popupPool.update(dt);
    return;
  }
  if (state === STATE.PAUSED) return;

  particlePool.update(dt);
  popupPool.update(dt);

  if (isResolving || isRotating) return;

  let effectiveDt = dt;
  if (slowdownTimer > 0) {
    slowdownTimer -= dt;
    effectiveDt *= 0.3;
  }

  let allHigh = true;
  for (let s = 0; s < 6; s++) {
    if (sideLayerCount(grid, s) < 2) { allHigh = false; break; }
  }
  if (allHigh) rescueTimer += dt; else rescueTimer = 0;

  if (fallingBlocks.length > 0) {
    dropTimer += effectiveDt;
    if (dropTimer >= dropInterval) {
      dropTimer = 0;
      let anyLanded = false;
      for (let i = 0; i < fallingBlocks.length; i++) {
        fallingBlocks[i].progress += 0.25;
        if (fallingBlocks[i].progress >= 1) anyLanded = true;
      }
      if (anyLanded) {
        for (let i = 0; i < fallingBlocks.length; i++) {
          if (fallingBlocks[i].progress >= 1) {
            const fb = fallingBlocks[i];
            const lc = sideLayerCount(grid, fb.side);
            if (lc < CONFIG.MAX_LAYERS) {
              grid[fb.side][lc] = { colorIndex: fb.colorIndex };
              sound.play('land');
            }
          }
        }
        fallingBlocks = [];
        if (checkGameOver(grid, CONFIG.MAX_LAYERS)) {
          beginTransition(STATE.GAMEOVER, 400);
          return;
        }
        resolveMatches();
      }
    }
  }
}

/* ========== RENDER HELPERS ========== */

/* Build offscreen background cache (F20) */
function buildBgCache() {
  bgCache = document.createElement('canvas');
  bgCache.width = canvas.width;
  bgCache.height = canvas.height;
  const bgCtx = bgCache.getContext('2d');
  bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const grad = bgCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#1a0a2e');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  bgCtx.strokeStyle = '#ffffff05';
  bgCtx.lineWidth = 0.5;
  const hexSize = 28;
  const cols = Math.ceil(W / (hexSize * Math.sqrt(3))) + 2;
  const rows = Math.ceil(H / (hexSize * 1.5)) + 2;
  for (let row = -1; row < rows; row++) {
    for (let col = -1; col < cols; col++) {
      const ox = col * hexSize * Math.sqrt(3) + (row % 2 ? hexSize * Math.sqrt(3) / 2 : 0);
      const oy = row * hexSize * 1.5;
      bgCtx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = ox + hexSize * Math.cos(a);
        const py = oy + hexSize * Math.sin(a);
        if (i === 0) bgCtx.moveTo(px, py); else bgCtx.lineTo(px, py);
      }
      bgCtx.closePath();
      bgCtx.stroke();
    }
  }
}

/* Draw the central hexagon core */
function drawCore(c, cxp, cyp, r, angle) {
  c.save();
  c.translate(cxp, cyp);
  c.rotate(angle);

  c.shadowColor = '#4a4a8a';
  c.shadowBlur = 15;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const v = hexVertex(0, 0, r, i);
    if (i === 0) c.moveTo(v.x, v.y); else c.lineTo(v.x, v.y);
  }
  c.closePath();
  c.fillStyle = '#1a1a3e';
  c.fill();
  c.strokeStyle = '#4a4a8a';
  c.lineWidth = 2;
  c.stroke();

  c.shadowBlur = 0;
  c.strokeStyle = '#3a3a6a';
  c.lineWidth = 0.5;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const v = hexVertex(0, 0, r * 0.5, i);
    if (i === 0) c.moveTo(v.x, v.y); else c.lineTo(v.x, v.y);
  }
  c.closePath();
  c.stroke();

  c.restore();
}

/* Draw the danger limit circle with dynamic opacity */
function drawLimitCircle(c, cxp, cyp, r, g) {
  const limitR = r * CONFIG.GAMEOVER_RADIUS_MULT;
  let maxLayers = 0;
  for (let s = 0; s < 6; s++) {
    const lc = sideLayerCount(g, s);
    if (lc > maxLayers) maxLayers = lc;
  }
  let alpha = 0.3;
  if (maxLayers >= CONFIG.MAX_LAYERS) alpha = 0.7;
  else if (maxLayers >= 3) alpha = 0.5;

  c.save();
  c.globalAlpha = alpha;
  c.strokeStyle = '#ff2255';
  c.lineWidth = 1.5;
  c.setLineDash([8, 6]);
  c.beginPath();
  c.arc(cxp, cyp, limitR, 0, Math.PI * 2);
  c.stroke();
  c.setLineDash([]);

  if (maxLayers >= 3) {
    const pulse = 0.3 + Math.sin(performance.now() / 200) * 0.15;
    c.globalAlpha = pulse;
    c.strokeStyle = '#ff2255';
    c.lineWidth = 3;
    c.beginPath();
    c.arc(cxp, cyp, limitR, 0, Math.PI * 2);
    c.stroke();
  }
  c.restore();
}

/* Draw accessibility icon inside block */
function drawBlockIcon(c, mx, my, colorDef, s) {
  c.save();
  c.fillStyle = '#00000088';
  c.strokeStyle = '#00000088';
  c.lineWidth = 1;
  const hs = s / 2;

  if (colorDef.shape === 'circle') {
    c.beginPath(); c.arc(mx, my, hs, 0, Math.PI*2); c.fill();
  } else if (colorDef.shape === 'diamond') {
    c.beginPath(); c.moveTo(mx, my-hs); c.lineTo(mx+hs, my); c.lineTo(mx, my+hs); c.lineTo(mx-hs, my); c.closePath(); c.fill();
  } else if (colorDef.shape === 'triangle') {
    c.beginPath(); c.moveTo(mx, my-hs); c.lineTo(mx+hs, my+hs*0.6); c.lineTo(mx-hs, my+hs*0.6); c.closePath(); c.fill();
  } else if (colorDef.shape === 'square') {
    const qs = s * 0.35;
    c.fillRect(mx-qs, my-qs, qs*2, qs*2);
  } else if (colorDef.shape === 'star') {
    c.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = Math.PI * 2 / 5 * i - Math.PI/2;
      const a2 = a1 + Math.PI/5;
      c.lineTo(mx + Math.cos(a1)*hs, my + Math.sin(a1)*hs);
      c.lineTo(mx + Math.cos(a2)*hs*0.5, my + Math.sin(a2)*hs*0.5);
    }
    c.closePath(); c.fill();
  } else if (colorDef.shape === 'dblcircle') {
    c.beginPath(); c.arc(mx, my, hs, 0, Math.PI*2); c.stroke();
    c.beginPath(); c.arc(mx, my, hs*0.55, 0, Math.PI*2); c.fill();
  }

  c.fillStyle = '#ffffffcc';
  c.font = 'bold ' + Math.max(7, s * 0.7) + 'px monospace';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(colorDef.letter, mx, my + 1);
  c.restore();
}

/* Draw a single block on the hex grid */
function drawBlock(c, cxp, cyp, r, side, layer, colorIndex, angle, alpha) {
  const colorDef = BLOCK_COLORS[colorIndex];
  const verts = blockVertices(cxp, cyp, r, side, layer, CONFIG.BLOCK_HEIGHT);

  c.save();
  c.translate(cxp, cyp);
  c.rotate(angle);
  c.translate(-cxp, -cyp);
  c.globalAlpha = alpha || 1;

  c.shadowColor = colorDef.glow;
  c.shadowBlur = 8;

  c.beginPath();
  c.moveTo(verts[0].x, verts[0].y);
  c.lineTo(verts[1].x, verts[1].y);
  c.lineTo(verts[2].x, verts[2].y);
  c.lineTo(verts[3].x, verts[3].y);
  c.closePath();
  c.fillStyle = colorDef.fill;
  c.fill();

  c.shadowBlur = 0;
  c.strokeStyle = '#ffffff20';
  c.lineWidth = 0.5;
  c.stroke();

  const mx = (verts[0].x + verts[1].x + verts[2].x + verts[3].x) / 4;
  const my = (verts[0].y + verts[1].y + verts[2].y + verts[3].y) / 4;
  drawBlockIcon(c, mx, my, colorDef, 9);

  c.restore();
}

/* Draw falling blocks with position interpolation */
function drawFallingBlock(c, cxp, cyp, r, fb, angle) {
  const colorDef = BLOCK_COLORS[fb.colorIndex];
  const side = fb.side;

  const sv = sideVertices(0, 0, 1, side);
  const midX = (sv[0].x + sv[1].x) / 2;
  const midY = (sv[0].y + sv[1].y) / 2;
  const dist = Math.sqrt(midX * midX + midY * midY);
  const dirX = midX / dist;
  const dirY = midY / dist;

  const maxDist = r * CONFIG.GAMEOVER_RADIUS_MULT + 20;
  const lc = sideLayerCount(grid, side);
  const targetDist = r + lc * CONFIG.BLOCK_HEIGHT + CONFIG.BLOCK_HEIGHT / 2;
  const currentDist = maxDist - fb.progress * (maxDist - targetDist);

  const bx = cxp + dirX * currentDist;
  const by = cyp + dirY * currentDist;

  c.save();
  c.translate(cxp, cyp);
  c.rotate(angle);
  c.translate(-cxp, -cyp);

  c.shadowColor = colorDef.glow;
  c.shadowBlur = 12;
  c.fillStyle = colorDef.fill;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i;
    const px = bx + 9 * Math.cos(a);
    const py = by + 9 * Math.sin(a);
    if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.closePath();
  c.fill();

  c.globalAlpha = 0.3;
  c.beginPath();
  const trailDist = currentDist + 14;
  c.arc(cxp + dirX * trailDist, cyp + dirY * trailDist, 4, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 1;

  c.shadowBlur = 0;
  drawBlockIcon(c, bx, by, colorDef, 8);
  c.restore();
}

/* Draw side guide lines extending from core vertices */
function drawSideGuides(c, cxp, cyp, r, angle) {
  c.save();
  c.translate(cxp, cyp);
  c.rotate(angle);
  c.translate(-cxp, -cyp);
  c.strokeStyle = '#ffffff08';
  c.lineWidth = 0.5;
  const outerR = r * CONFIG.GAMEOVER_RADIUS_MULT + 10;
  for (let i = 0; i < 6; i++) {
    const v1 = hexVertex(cxp, cyp, r, i);
    const v2 = hexVertex(cxp, cyp, outerR, i);
    c.beginPath();
    c.moveTo(v1.x, v1.y);
    c.lineTo(v2.x, v2.y);
    c.stroke();
  }
  c.restore();
}

/* Draw HUD overlay (§4.6) */
function drawHUD(c) {
  c.save();
  c.shadowBlur = 0;

  c.font = '11px monospace';
  c.fillStyle = '#888888';
  c.textAlign = 'left';
  c.fillText('SCORE', 10, 22);
  c.font = 'bold 22px monospace';
  c.fillStyle = '#ffffff';
  c.fillText(score.toString(), 10, 46);

  c.font = '11px monospace';
  c.fillStyle = '#888888';
  c.fillText('LEVEL', 10, 66);
  c.font = 'bold 18px monospace';
  c.fillStyle = '#33ff88';
  c.fillText(level.toString(), 10, 86);

  const progress = (blocksCleared % CONFIG.BLOCKS_PER_LEVEL) / CONFIG.BLOCKS_PER_LEVEL;
  c.fillStyle = '#222244';
  c.fillRect(10, 94, 55, 3);
  c.fillStyle = '#33ff88';
  c.fillRect(10, 94, 55 * progress, 3);

  c.font = '11px monospace';
  c.fillStyle = '#888888';
  c.textAlign = 'right';
  c.fillText('HIGH', W - 56, 22);
  c.font = 'bold 16px monospace';
  c.fillStyle = '#ffdd33';
  c.fillText(highScore.toString(), W - 56, 40);

  const pbx = W - 28;
  const pby = 28;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#ffffff80';
  c.font = '18px monospace';
  c.fillText(state === STATE.PAUSED ? '\u25B6' : '\u23F8', pbx, pby);
  c.textBaseline = 'alphabetic';

  c.restore();
}

/* ========== SCREEN RENDERERS ========== */

/* Title screen with animated neon hexagons */
function renderTitle(c) {
  const t = titleTime;
  const pulseR = CONFIG.CORE_RADIUS * 1.6 + Math.sin(t * 2) * 8;

  c.save();

  c.save();
  c.translate(cx, cy - 15);
  c.rotate(t * 0.4);
  c.strokeStyle = '#6c3cf7';
  c.lineWidth = 2;
  c.shadowColor = '#6c3cf7';
  c.shadowBlur = 20;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    c.lineTo(pulseR * Math.cos(a), pulseR * Math.sin(a));
  }
  c.closePath();
  c.stroke();

  c.rotate(-t * 0.7);
  c.strokeStyle = '#00d4ff';
  c.lineWidth = 1.5;
  c.shadowColor = '#00d4ff';
  c.shadowBlur = 15;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    c.lineTo(pulseR * 0.55 * Math.cos(a), pulseR * 0.55 * Math.sin(a));
  }
  c.closePath();
  c.stroke();
  c.restore();

  c.save();
  c.translate(cx, cy - 15);
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i + t * 0.7;
    const d = pulseR + 28 + Math.sin(t * 2.5 + i) * 6;
    const bx = Math.cos(a) * d;
    const by = Math.sin(a) * d;
    c.fillStyle = BLOCK_COLORS[i].fill;
    c.shadowColor = BLOCK_COLORS[i].glow;
    c.shadowBlur = 10;
    c.beginPath();
    for (let j = 0; j < 6; j++) {
      const ba = Math.PI / 3 * j;
      c.lineTo(bx + 7 * Math.cos(ba), by + 7 * Math.sin(ba));
    }
    c.closePath();
    c.fill();
  }
  c.restore();

  c.textAlign = 'center';
  c.shadowColor = '#00d4ff';
  c.shadowBlur = 25;
  c.fillStyle = '#00d4ff';
  c.font = 'bold 26px monospace';
  c.fillText('NEON HEX DROP', cx, cy - pulseR - 36);

  c.shadowBlur = 0;
  c.fillStyle = '#00d4ff10';
  const scanY = ((t * 60) % (H + 40)) - 20;
  c.fillRect(0, scanY, W, 2);

  c.fillStyle = '#8080a0';
  c.font = '12px monospace';
  c.fillText('\uD68C\uC804\uD558\uB77C. \uB9DE\uCDB0\uB77C. \uC0B4\uC544\uB0A8\uC544\uB77C.', cx, cy + pulseR + 42);

  if (Math.floor(t * 2.5) % 2 === 0) {
    c.fillStyle = '#e0e0f0';
    c.font = 'bold 15px monospace';
    c.fillText('PRESS ENTER OR TAP TO START', cx, cy + pulseR + 72);
  }

  c.fillStyle = '#505070';
  c.font = '10px monospace';
  c.fillText('\u2190 \u2192 : \uD68C\uC804  |  \u2193 : \uB4DC\uB86D  |  SPACE : \uC77C\uC2DC\uC815\uC9C0', cx, H - 16);

  c.restore();
}

/* Pause overlay */
function renderPaused(c) {
  c.save();
  c.fillStyle = '#0a0a1acc';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center';
  c.fillStyle = '#00d4ff';
  c.shadowColor = '#00d4ff';
  c.shadowBlur = 20;
  c.font = 'bold 30px monospace';
  c.fillText('PAUSED', cx, cy - 10);
  c.shadowBlur = 0;
  c.fillStyle = '#8080a0';
  c.font = '13px monospace';
  c.fillText('PRESS SPACE OR TAP TO RESUME', cx, cy + 25);
  c.restore();
}

/* Gameover overlay with score display */
function renderGameover(c) {
  const t = gameoverTime;
  const fadeIn = Math.min(1, t * 2);

  c.save();
  c.globalAlpha = fadeIn * 0.88;
  c.fillStyle = '#0a0a1a';
  c.fillRect(0, 0, W, H);
  c.globalAlpha = fadeIn;
  c.textAlign = 'center';

  c.fillStyle = '#ff2255';
  c.shadowColor = '#ff2255';
  c.shadowBlur = 25;
  c.font = 'bold 34px monospace';
  c.fillText('GAME OVER', cx, cy - 55);

  c.shadowBlur = 0;
  c.fillStyle = '#888888';
  c.font = '13px monospace';
  c.fillText('SCORE', cx, cy - 12);
  c.fillStyle = '#ffffff';
  c.font = 'bold 26px monospace';
  c.fillText(score.toString(), cx, cy + 16);

  c.fillStyle = '#888888';
  c.font = '13px monospace';
  c.fillText('LEVEL', cx, cy + 42);
  c.fillStyle = '#33ff88';
  c.font = 'bold 20px monospace';
  c.fillText(level.toString(), cx, cy + 64);

  if (isNewHigh) {
    c.fillStyle = '#ffdd33';
    c.shadowColor = '#ffdd33';
    c.shadowBlur = 15;
    c.font = 'bold 16px monospace';
    const pulse = 1 + Math.sin(t * 5) * 0.08;
    c.save();
    c.translate(cx, cy + 92);
    c.scale(pulse, pulse);
    c.fillText('\u2605 NEW HIGH SCORE! \u2605', 0, 0);
    c.restore();
  } else {
    c.fillStyle = '#666688';
    c.font = '12px monospace';
    c.fillText('BEST: ' + highScore, cx, cy + 92);
  }

  c.shadowBlur = 0;
  if (t > 1.0 && Math.floor(t * 2.5) % 2 === 0) {
    c.fillStyle = '#e0e0f0';
    c.font = 'bold 13px monospace';
    c.fillText('PRESS ENTER OR TAP TO RESTART', cx, cy + 128);
  }

  c.restore();
}

/* ========== MAIN RENDER ========== */
function render() {
  ctx.save();

  if (bgCache) ctx.drawImage(bgCache, 0, 0);

  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < stars.length; i++) {
    ctx.globalAlpha = stars[i].alpha;
    ctx.beginPath();
    ctx.arc(stars[i].x, stars[i].y, stars[i].size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (state === STATE.TITLE) {
    renderTitle(ctx);
    ctx.restore();
    return;
  }

  let sx = 0, sy = 0;
  if (shakeDuration > 0) {
    sx = (Math.random() - 0.5) * shakeAmount * 2;
    sy = (Math.random() - 0.5) * shakeAmount * 2;
  }

  ctx.save();
  ctx.translate(sx, sy);

  drawSideGuides(ctx, cx, cy, CONFIG.CORE_RADIUS, coreState.angle);
  drawLimitCircle(ctx, cx, cy, CONFIG.CORE_RADIUS, grid);

  for (let s = 0; s < 6; s++) {
    for (let l = 0; l < CONFIG.MAX_LAYERS; l++) {
      if (grid[s][l]) {
        drawBlock(ctx, cx, cy, CONFIG.CORE_RADIUS, s, l, grid[s][l].colorIndex, coreState.angle, 1);
      }
    }
  }

  for (let i = 0; i < fallingBlocks.length; i++) {
    drawFallingBlock(ctx, cx, cy, CONFIG.CORE_RADIUS, fallingBlocks[i], coreState.angle);
  }

  drawCore(ctx, cx, cy, CONFIG.CORE_RADIUS, coreState.angle);

  ctx.restore();

  particlePool.draw(ctx);
  popupPool.draw(ctx);

  if (comboAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = comboAlpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3366';
    ctx.shadowColor = '#ff3366';
    ctx.shadowBlur = 15;
    ctx.font = 'bold 26px monospace';
    ctx.fillText(comboText, cx, cy - CONFIG.CORE_RADIUS * 2.2);
    ctx.restore();
  }

  if (levelUpAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = levelUpAlpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#33ff88';
    ctx.shadowColor = '#33ff88';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 30px monospace';
    ctx.fillText(levelUpText, cx, cy - CONFIG.CORE_RADIUS * 2.8);
    ctx.restore();
  }

  drawHUD(ctx);

  if (state === STATE.PAUSED) renderPaused(ctx);
  if (state === STATE.GAMEOVER) renderGameover(ctx);

  ctx.restore();
}

/* ========== GAME LOOP (§5.2, F12 try-catch) ========== */
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, CONFIG.DT_CAP);
    lastTime = timestamp;
    update(dt);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    render();
  } catch(e) {
    console.error(e);
  }
  requestAnimationFrame(gameLoop);
}

/* ========== RESIZE (DPR-aware) ========== */
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  cx = W / 2;
  cy = H / 2;
  buildBgCache();

  stars = [];
  for (let i = 0; i < CONFIG.STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: 0.5 + Math.random() * 1.5,
      alpha: 0.12 + Math.random() * 0.18,
      speed: 8 + Math.random() * 16
    });
  }
}

/* ========== INPUT REGISTRATION (§5.1 step 5d) ========== */
function registerEventListeners() {
  /* Keyboard handler */
  window.addEventListener('keydown', function(e) {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
    sound.init();
    if (state === STATE.TITLE) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        beginTransition(STATE.PLAYING, 300, function() { resetGame(); });
      }
      return;
    }
    if (state === STATE.GAMEOVER) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        beginTransition(STATE.TITLE, 300);
      }
      return;
    }
    if (state === STATE.PAUSED) {
      if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        enterState(STATE.PLAYING);
      }
      return;
    }
    if (e.key === 'ArrowLeft') { e.preventDefault(); rotateCore(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); rotateCore(1); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); hardDrop(); }
    else if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
      e.preventDefault();
      enterState(STATE.PAUSED);
    }
  });

  /* Touch start — record position */
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    sound.init();
    if (e.touches.length > 0) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: false });

  /* Touch end — detect tap vs swipe */
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (e.changedTouches.length === 0) return;
    const tx = e.changedTouches[0].clientX;
    const ty = e.changedTouches[0].clientY;
    const dx = tx - touchStartX;
    const dy = ty - touchStartY;

    if (dy > 50 && Math.abs(dx) < Math.abs(dy)) {
      if (state === STATE.PLAYING) hardDrop();
      return;
    }

    if (Math.abs(dx) < 25 && Math.abs(dy) < 25) {
      if (state === STATE.TITLE) {
        beginTransition(STATE.PLAYING, 300, function() { resetGame(); });
        return;
      }
      if (state === STATE.GAMEOVER) {
        if (gameoverTime > 1.0) beginTransition(STATE.TITLE, 300);
        return;
      }
      if (Math.abs(tx - (W - 28)) < CONFIG.MIN_TOUCH_TARGET / 2 &&
          Math.abs(ty - 28) < CONFIG.MIN_TOUCH_TARGET / 2) {
        if (state === STATE.PLAYING) enterState(STATE.PAUSED);
        else if (state === STATE.PAUSED) enterState(STATE.PLAYING);
        return;
      }
      if (state === STATE.PAUSED) {
        enterState(STATE.PLAYING);
        return;
      }
      if (state === STATE.PLAYING) {
        if (tx < W / 2) rotateCore(-1);
        else rotateCore(1);
      }
    }
  }, { passive: false });

  /* Touch move — prevent scroll */
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  /* Mouse click handler */
  canvas.addEventListener('mousedown', function(e) {
    sound.init();
    const mx = e.clientX, my = e.clientY;

    if (state === STATE.TITLE) {
      beginTransition(STATE.PLAYING, 300, function() { resetGame(); });
      return;
    }
    if (state === STATE.GAMEOVER) {
      if (gameoverTime > 1.0) beginTransition(STATE.TITLE, 300);
      return;
    }
    if (Math.abs(mx - (W - 28)) < CONFIG.MIN_TOUCH_TARGET / 2 &&
        Math.abs(my - 28) < CONFIG.MIN_TOUCH_TARGET / 2) {
      if (state === STATE.PLAYING) enterState(STATE.PAUSED);
      else if (state === STATE.PAUSED) enterState(STATE.PLAYING);
      return;
    }
    if (state === STATE.PAUSED) {
      enterState(STATE.PLAYING);
      return;
    }
    if (state === STATE.PLAYING) {
      if (mx < W / 2) rotateCore(-1);
      else rotateCore(1);
    }
  });

  /* Resize handler */
  window.addEventListener('resize', resizeCanvas);
}

/* ========== HIGH SCORE PERSISTENCE ========== */
function loadHighScore() {
  try { highScore = parseInt(localStorage.getItem('neonHexDrop_highScore')) || 0; }
  catch(e) { highScore = 0; }
}

function saveHighScore() {
  try { localStorage.setItem('neonHexDrop_highScore', highScore.toString()); }
  catch(e) { /* silently fail */ }
}

/* ========== INIT (§5.1 step 5) ========== */
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  particlePool = createPool(CONFIG.PARTICLE_POOL_SIZE, makeParticle);
  popupPool = createPool(CONFIG.POPUP_POOL_SIZE, makePopup);
  resizeCanvas();
  registerEventListeners();
  loadHighScore();
  enterState(STATE.TITLE);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

/* Single top-level event (F5) */
window.addEventListener('load', init);
</script>
</body>
