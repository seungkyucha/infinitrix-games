<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128">
  <defs>
    <!-- Shared gradients -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5a8fc5"/>
      <stop offset="50%" stop-color="#4a7fb5"/>
      <stop offset="100%" stop-color="#3a6fa5"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f5f0e1"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#faecd8"/>
      <stop offset="100%" stop-color="#f5e6d0"/>
    </linearGradient>
    <linearGradient id="brushHandleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a7924"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="inkDripGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2a2a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Watercolor texture filter -->
    <filter id="wc" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ===== FRAME 1: Standing neutral, brush at side ===== -->
  <g transform="translate(0, 0)" filter="url(#wc)">
    <!-- Shadow on ground -->
    <ellipse cx="64" cy="122" rx="20" ry="4" fill="#1a1a2e" opacity="0.15"/>
    <!-- Left leg -->
    <path d="M58,88 L56,108 Q55,112 54,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56,108 Q55,112 54,114 L58,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Right leg -->
    <path d="M68,88 L70,108 Q71,112 72,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M70,108 Q71,112 72,114 L68,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Ink stains on feet -->
    <ellipse cx="56" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <ellipse cx="70" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <circle cx="53" cy="113" r="1.2" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="73" cy="113" r="1" fill="#1a1a2e" opacity="0.35"/>
    <!-- Dress body -->
    <path d="M52,58 Q50,60 48,72 Q46,82 50,92 Q56,96 64,96 Q72,96 78,92 Q82,82 80,72 Q78,60 76,58 Z" fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Dress fold details -->
    <path d="M56,72 Q58,80 56,90" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M72,72 Q70,80 72,90" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Torso / neckline -->
    <path d="M56,56 Q64,52 72,56" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- Left arm -->
    <path d="M52,60 Q48,68 46,76 Q45,78 44,80" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52,60 Q48,68 46,76" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right arm (holding brush down) -->
    <path d="M76,60 Q80,68 82,76 Q83,80 84,84" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M76,60 Q80,68 82,76 Q83,80 84,84" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Brush in right hand -->
    <line x1="84" y1="82" x2="88" y2="104" stroke="url(#brushHandleGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M86,102 Q88,108 90,112 Q88,113 86,112 Q85,108 86,102" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Neck -->
    <rect x="61" y="48" width="6" height="8" rx="2" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="64" cy="38" rx="14" ry="16" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Hair back layer -->
    <path d="M50,30 Q48,44 46,58 Q45,62 47,60 Q50,50 52,42" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M78,30 Q80,44 82,58 Q83,62 81,60 Q78,50 76,42" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Hair top -->
    <path d="M50,32 Q52,18 64,16 Q76,18 78,32 Q76,24 64,22 Q52,24 50,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Hair bangs -->
    <path d="M52,30 Q56,26 58,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M60,28 Q64,24 68,28" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M70,30 Q72,26 76,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Eyes -->
    <ellipse cx="58" cy="38" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <ellipse cx="70" cy="38" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="59" cy="38" r="2" fill="#1a1a2e"/>
    <circle cx="71" cy="38" r="2" fill="#1a1a2e"/>
    <circle cx="59.5" cy="37" r="0.7" fill="white"/>
    <circle cx="71.5" cy="37" r="0.7" fill="white"/>
    <!-- Mouth -->
    <path d="M61,44 Q64,46 67,44" stroke="#c94c4c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="55" cy="42" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
    <ellipse cx="73" cy="42" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
  </g>

  <!-- ===== FRAME 2: Slight inhale, chest rises, hair moves left ===== -->
  <g transform="translate(128, 0)" filter="url(#wc)">
    <ellipse cx="64" cy="122" rx="20" ry="4" fill="#1a1a2e" opacity="0.15"/>
    <!-- Left leg -->
    <path d="M58,87 L56,108 Q55,112 54,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56,108 Q55,112 54,114 L58,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Right leg -->
    <path d="M68,87 L70,108 Q71,112 72,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M70,108 Q71,112 72,114 L68,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Ink stains -->
    <ellipse cx="56" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <ellipse cx="70" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <circle cx="53" cy="113" r="1.2" fill="#1a1a2e" opacity="0.4"/>
    <!-- Dress body (slightly lifted - inhale) -->
    <path d="M52,57 Q50,59 48,71 Q46,81 50,91 Q56,95 64,95 Q72,95 78,91 Q82,81 80,71 Q78,59 76,57 Z" fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M56,71 Q58,79 56,89" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M72,71 Q70,79 72,89" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Neckline -->
    <path d="M56,55 Q64,51 72,55" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- Left arm -->
    <path d="M52,59 Q48,67 46,75 Q45,77 44,79" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52,59 Q48,67 46,75" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M76,59 Q80,67 82,75 Q83,79 84,83" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M76,59 Q80,67 82,75 Q83,79 84,83" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Brush -->
    <line x1="84" y1="81" x2="88" y2="103" stroke="url(#brushHandleGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M86,101 Q88,107 90,111 Q88,112 86,111 Q85,107 86,101" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Ink droplet forming -->
    <ellipse cx="89" cy="113" rx="1.5" ry="2" fill="url(#inkDripGrad)" opacity="0.5"/>
    <!-- Neck -->
    <rect x="61" y="47" width="6" height="8" rx="2" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Head (slightly raised) -->
    <ellipse cx="64" cy="37" rx="14" ry="16" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Hair - shifted left for sway -->
    <path d="M48,29 Q44,43 42,57 Q41,62 43,59 Q47,49 50,41" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M76,29 Q77,43 78,57 Q79,61 78,59 Q76,49 75,41" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Hair top -->
    <path d="M50,31 Q52,17 64,15 Q76,17 78,31 Q76,23 64,21 Q52,23 50,31" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Bangs -->
    <path d="M52,29 Q55,25 57,31" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M59,27 Q63,23 67,27" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M69,29 Q71,25 75,31" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Eyes -->
    <ellipse cx="58" cy="37" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <ellipse cx="70" cy="37" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="59" cy="37" r="2" fill="#1a1a2e"/>
    <circle cx="71" cy="37" r="2" fill="#1a1a2e"/>
    <circle cx="59.5" cy="36" r="0.7" fill="white"/>
    <circle cx="71.5" cy="36" r="0.7" fill="white"/>
    <!-- Mouth -->
    <path d="M61,43 Q64,45 67,43" stroke="#c94c4c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="55" cy="41" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
    <ellipse cx="73" cy="41" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
  </g>

  <!-- ===== FRAME 3: Standing neutral again, ink droplet forming ===== -->
  <g transform="translate(256, 0)" filter="url(#wc)">
    <ellipse cx="64" cy="122" rx="20" ry="4" fill="#1a1a2e" opacity="0.15"/>
    <!-- Left leg -->
    <path d="M58,88 L56,108 Q55,112 54,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56,108 Q55,112 54,114 L58,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Right leg -->
    <path d="M68,88 L70,108 Q71,112 72,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M70,108 Q71,112 72,114 L68,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Ink stains -->
    <ellipse cx="56" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <ellipse cx="70" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <circle cx="73" cy="113" r="1" fill="#1a1a2e" opacity="0.35"/>
    <!-- Dress -->
    <path d="M52,58 Q50,60 48,72 Q46,82 50,92 Q56,96 64,96 Q72,96 78,92 Q82,82 80,72 Q78,60 76,58 Z" fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M56,72 Q58,80 56,90" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M72,72 Q70,80 72,90" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M64,74 Q63,82 64,92" stroke="#d8d0c0" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Neckline -->
    <path d="M56,56 Q64,52 72,56" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- Left arm -->
    <path d="M52,60 Q48,68 46,76 Q45,78 44,80" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52,60 Q48,68 46,76" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M76,60 Q80,68 82,76 Q83,80 84,84" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M76,60 Q80,68 82,76 Q83,80 84,84" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
