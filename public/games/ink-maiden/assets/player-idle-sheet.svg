    <path d="M86,102 Q88,108 90,112 Q88,113 86,112 Q85,108 86,102" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Ink droplet fully formed -->
    <ellipse cx="89" cy="114" rx="2" ry="2.5" fill="url(#inkDripGrad)" opacity="0.8"/>
    <ellipse cx="89" cy="113" rx="1" ry="1" fill="#3a3a5e" opacity="0.4"/>
    <!-- Neck -->
    <rect x="61" y="48" width="6" height="8" rx="2" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="64" cy="38" rx="14" ry="16" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Hair back -->
    <path d="M50,30 Q48,44 46,58 Q45,62 47,60 Q50,50 52,42" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M78,30 Q80,44 82,58 Q83,62 81,60 Q78,50 76,42" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Hair top -->
    <path d="M50,32 Q52,18 64,16 Q76,18 78,32 Q76,24 64,22 Q52,24 50,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Bangs -->
    <path d="M52,30 Q56,26 58,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M60,28 Q64,24 68,28" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M70,30 Q72,26 76,32" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Eyes (half-blink) -->
    <ellipse cx="58" cy="38" rx="3" ry="2.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <ellipse cx="70" cy="38" rx="3" ry="2.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="59" cy="38" r="1.8" fill="#1a1a2e"/>
    <circle cx="71" cy="38" r="1.8" fill="#1a1a2e"/>
    <circle cx="59.5" cy="37.5" r="0.6" fill="white"/>
    <circle cx="71.5" cy="37.5" r="0.6" fill="white"/>
    <!-- Mouth -->
    <path d="M61,44 Q64,46 67,44" stroke="#c94c4c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="55" cy="42" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
    <ellipse cx="73" cy="42" rx="3" ry="1.5" fill="#c94c4c" opacity="0.2"/>
  </g>

  <!-- ===== FRAME 4: Slight exhale, hair moves right, ink droplet falls ===== -->
  <g transform="translate(384, 0)" filter="url(#wc)">
    <ellipse cx="64" cy="122" rx="20" ry="4" fill="#1a1a2e" opacity="0.15"/>
    <!-- Left leg -->
    <path d="M58,89 L56,108 Q55,112 54,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56,108 Q55,112 54,114 L58,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Right leg -->
    <path d="M68,89 L70,108 Q71,112 72,114" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M70,108 Q71,112 72,114 L68,115" stroke="#1a1a2e" stroke-width="1.5" fill="url(#skinGrad)"/>
    <!-- Ink stains -->
    <ellipse cx="56" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <ellipse cx="70" cy="114" rx="4" ry="2" fill="#1a1a2e" opacity="0.6"/>
    <!-- Dress (slightly lower - exhale) -->
    <path d="M52,59 Q50,61 48,73 Q46,83 50,93 Q56,97 64,97 Q72,97 78,93 Q82,83 80,73 Q78,61 76,59 Z" fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M56,73 Q58,81 56,91" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M72,73 Q70,81 72,91" stroke="#d8d0c0" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Neckline -->
    <path d="M56,57 Q64,53 72,57" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- Left arm -->
    <path d="M52,61 Q48,69 46,77 Q45,79 44,81" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52,61 Q48,69 46,77" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M76,61 Q80,69 82,77 Q83,81 84,85" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M76,61 Q80,69 82,77 Q83,81 84,85" stroke="url(#skinGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Brush -->
    <line x1="84" y1="83" x2="88" y2="105" stroke="url(#brushHandleGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M86,103 Q88,109 90,113 Q88,114 86,113 Q85,109 86,103" fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Falling ink droplet -->
    <ellipse cx="89" cy="119" rx="1.5" ry="3" fill="url(#inkDripGrad)" opacity="0.7"/>
    <!-- Ink splash on ground -->
    <ellipse cx="89" cy="122" rx="3" ry="1" fill="#1a1a2e" opacity="0.3"/>
    <circle cx="87" cy="121" r="0.8" fill="#1a1a2e" opacity="0.2"/>
    <circle cx="91" cy="121" r="0.6" fill="#1a1a2e" opacity="0.2"/>
    <!-- Neck -->
    <rect x="61" y="49" width="6" height="8" rx="2" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Head (slightly lower) -->
    <ellipse cx="64" cy="39" rx="14" ry="16" fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Hair - shifted right for sway -->
    <path d="M52,31 Q51,45 52,59 Q52,63 53,61 Q53,51 53,43" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M80,31 Q83,45 86,59 Q87,63 85,61 Q82,51 79,43" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Hair top -->
    <path d="M50,33 Q52,19 64,17 Q76,19 78,33 Q76,25 64,23 Q52,25 50,33" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Bangs -->
    <path d="M53,31 Q57,27 59,33" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M61,29 Q65,25 69,29" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M71,31 Q74,27 77,33" fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Eyes -->
    <ellipse cx="58" cy="39" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <ellipse cx="70" cy="39" rx="3" ry="3.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="59" cy="39" r="2" fill="#1a1a2e"/>
    <circle cx="71" cy="39" r="2" fill="#1a1a2e"/>
    <circle cx="59.5" cy="38" r="0.7" fill="white"/>
    <circle cx="71.5" cy="38" r="0.7" fill="white"/>
    <!-- Mouth (slight smile) -->
    <path d="M61,45 Q64,47.5 67,45" stroke="#c94c4c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="55" cy="43" rx="3" ry="1.5" fill="#c94c4c" opacity="0.25"/>
    <ellipse cx="73" cy="43" rx="3" ry="1.5" fill="#c94c4c" opacity="0.25"/>
  </g>
</svg>