<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Body gradient dark ink to dark red -->
    <linearGradient id="wolfBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a1a1e"/>
    </linearGradient>
    <!-- Red fire gradient -->
    <linearGradient id="redFire" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#c94c4c"/>
      <stop offset="50%" stop-color="#e06040"/>
      <stop offset="100%" stop-color="#c94c4c" stop-opacity="0"/>
    </linearGradient>
    <!-- Eye glow radial -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6633"/>
      <stop offset="60%" stop-color="#c94c4c"/>
      <stop offset="100%" stop-color="#c94c4c" stop-opacity="0"/>
    </radialGradient>
    <!-- Spine fire gradient -->
    <linearGradient id="spineFire" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#c94c4c" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#e06040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff8844" stop-opacity="0"/>
    </linearGradient>
    <!-- Red vein glow -->
    <radialGradient id="veinGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#c94c4c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c94c4c" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter for flames -->
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Particle glow -->
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Ink drip puddle -->
  <g id="inkPuddle">
    <ellipse cx="260" cy="460" rx="120" ry="18" fill="#1a1a2e" opacity="0.5"/>
    <ellipse cx="240" cy="465" rx="80" ry="10" fill="#1a1a2e" opacity="0.7"/>
  </g>

  <!-- Body - hunched aggressive wolf -->
  <g id="wolfBodyGroup">
    <!-- Rear body -->
    <path d="M340,300 C370,270 380,250 370,220 C360,200 340,190 320,195 C300,200 280,220 270,250 C260,280 270,310 290,320 Q320,330 340,300Z" fill="url(#wolfBody)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Main torso -->
    <path d="M270,250 C250,230 220,210 190,200 C160,190 140,200 130,220 C120,245 130,280 155,300 C180,320 220,330 260,320 C280,315 285,290 270,250Z" fill="url(#wolfBody)" stroke="#1a1a2e" stroke-width="2.5"/>
    <!-- Chest -->
    <path d="M155,300 C145,320 140,350 150,370 C160,385 180,390 200,380 C215,370 220,340 210,315 Q185,295 155,300Z" fill="#2a1a1e" stroke="#1a1a2e" stroke-width="2"/>
  </g>

  <!-- Red cracks/veins across body -->
  <g id="redVeins" opacity="0.85">
    <path d="M200,230 L220,250 L210,270 L230,290" stroke="#c94c4c" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M250,220 L260,245 L275,260 L265,280" stroke="#c94c4c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M310,210 L320,230 L330,250 L325,275" stroke="#c94c4c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M180,260 L195,275 L190,295" stroke="#c94c4c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M340,240 L350,260 L345,280" stroke="#c94c4c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M230,250 Q240,265 235,285" stroke="#c94c4c" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Spine fire -->
  <g id="spineFlames" filter="url(#flameGlow)">
    <path d="M210,210 C215,180 225,155 220,130 C230,150 240,165 235,190 C245,170 255,145 250,120 C260,145 265,170 258,200 C270,175 280,150 275,125 C285,155 288,180 278,210 C295,190 310,165 305,140 C315,165 318,195 305,220" fill="url(#spineFire)" opacity="0.8"/>
    <path d="M220,200 C225,175 232,155 228,135 C238,158 242,175 238,195 C248,178 258,158 254,138 C264,160 266,180 260,205" fill="url(#redFire)" opacity="0.6"/>
  </g>

  <!-- Tail with fire -->
  <g id="tail">
    <path d="M370,220 C395,200 420,185 440,170 C435,195 420,205 400,210 C420,200 445,185 460,165 C450,195 430,215 405,225 Q385,230 370,220Z" fill="url(#wolfBody)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Tail fire -->
    <path d="M440,170 C445,145 455,125 450,100 C460,120 465,140 458,160 C468,140 475,115 470,95 C480,120 478,150 465,170" fill="url(#redFire)" opacity="0.7" filter="url(#flameGlow)"/>
  </g>

  <!-- Front legs -->
  <g id="frontLegs">
    <path d="M160,365 C155,390 150,420 148,450 C152,452 160,452 162,448 C165,425 168,400 170,375Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M195,370 C192,395 188,425 185,450 C189,452 197,452 199,448 C200,425 202,400 203,375Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Red claws front -->
    <path d="M145,448 L138,465 L148,458 L142,472 L153,460 L150,475 L160,458" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M182,448 L175,465 L185,458 L179,472 L190,460 L187,475 L197,458" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1"/>
  </g>

  <!-- Rear legs -->
  <g id="rearLegs">
    <path d="M300,315 C295,345 290,385 288,430 C285,445 283,455 282,460 C286,462 294,462 296,458 C298,440 302,400 305,365 Q308,340 305,320Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M335,305 C338,340 340,380 338,430 C336,445 335,455 334,460 C338,462 346,462 348,458 C350,440 350,400 348,365 Q345,335 340,310Z" fill="#2a1a1e" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Red claws rear -->
    <path d="M278,458 L272,475 L282,468 L277,480 L288,470 L285,482 L295,465" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M330,458 L324,475 L334,468 L329,480 L340,470 L337,482 L347,465" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1"/>
  </g>

  <!-- Head - snarling open mouth -->
  <g id="wolfHead">
    <!-- Skull -->
    <path d="M130,220 C110,200 90,185 75,170 C65,165 55,170 52,180 C48,195 55,215 70,225 C80,232 95,235 110,235 Q125,235 130,220Z" fill="url(#wolfBody)" stroke="#1a1a2e" stroke-width="2.5"/>
    <!-- Upper jaw -->
    <path d="M75,225 C60,228 42,232 30,240 C28,245 35,248 45,248 C55,248 70,245 82,240 Q90,236 85,230Z" fill="#2a1a1e" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Lower jaw open -->
    <path d="M80,240 C65,250 48,260 35,268 C33,273 40,275 50,272 C62,268 78,258 88,248 Q92,244 85,240Z" fill="#2a1a1e" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Teeth upper -->
    <path d="M40,245 L36,255 L44,248 L40,258 L50,248 L48,260 L58,248 L55,258 L65,245 L62,255 L72,242" fill="#f5f0e1" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Teeth lower - red tipped -->
    <path d="M45,265 L42,255 L50,262 L48,252 L56,260 L55,250 L64,257 L62,248 L72,252" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Eyes glowing -->
    <ellipse cx="88" cy="195" rx="12" ry="9" fill="url(#eyeGlow)" filter="url(#flameGlow)"/>
    <ellipse cx="88" cy="195" rx="5" ry="4" fill="#ff6633"/>
    <!-- Ear -->
    <path d="M105,175 L95,145 L115,165Z" fill="#2a1a1e" stroke="#1a1a2e" stroke-width="1.5"/>
  </g>

  <!-- Red ink particles scattered around -->
  <g id="redParticles" filter="url(#particleGlow)">
    <circle cx="100" cy="160" r="4" fill="#c94c4c" opacity="0.7"/>
    <circle cx="150" cy="140" r="3" fill="#c94c4c" opacity="0.6"/>
    <circle cx="380" cy="170" r="5" fill="#c94c4c" opacity="0.5"/>
    <circle cx="420" cy="150" r="3" fill="#c94c4c" opacity="0.7"/>
    <circle cx="300" cy="140" r="4" fill="#c94c4c" opacity="0.6"/>
    <circle cx="60" cy="200" r="3" fill="#e06040" opacity="0.5"/>
    <circle cx="350" cy="160" r="3.5" fill="#e06040" opacity="0.55"/>
    <circle cx="240" cy="120" r="4" fill="#c94c4c" opacity="0.4"/>
    <circle cx="180" cy="145" r="2.5" fill="#c94c4c" opacity="0.65"/>
  </g>

  <!-- Ink drips from body -->
  <g id="inkDrips">
    <path d="M170,320 C168,340 167,360 168,380 C169,385 170,388 170,392 Q171,396 170,398" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M250,325 C248,345 247,358 248,370 Q249,376 248,380" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M320,300 C318,315 317,328 318,340 Q319,345 318,348" stroke="#2a1a1e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="170" cy="400" rx="4" ry="3" fill="#1a1a2e" opacity="0.6"/>
    <ellipse cx="248" cy="382" rx="3" ry="2.5" fill="#1a1a2e" opacity="0.5"/>
  </g>
</svg>