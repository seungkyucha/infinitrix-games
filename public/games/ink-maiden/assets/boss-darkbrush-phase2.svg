<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Shadow body gradient -->
    <linearGradient id="shadowBody" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- Red eye glow -->
    <radialGradient id="redEyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff5544"/>
      <stop offset="50%" stop-color="#c94c4c"/>
      <stop offset="100%" stop-color="#c94c4c" stop-opacity="0"/>
    </radialGradient>
    <!-- Aura gradient red-purple -->
    <radialGradient id="auraGlow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#c94c4c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c94c4c" stop-opacity="0.15"/>
      <stop offset="75%" stop-color="#7b5ea7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7b5ea7" stop-opacity="0"/>
    </radialGradient>
    <!-- Hair ink wisps gradient -->
    <linearGradient id="hairWisp" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="70%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Shadow brush gradient -->
    <linearGradient id="shadowBrush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- Tendril gradient -->
    <linearGradient id="tendrilGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft glow for aura -->
    <filter id="auraFilter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <!-- Fragment glow -->
    <filter id="fragmentGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Eye intense glow -->
    <filter id="eyeIntenseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Red + purple swirling aura -->
  <g id="aura" filter="url(#auraFilter)">
    <ellipse cx="256" cy="260" rx="180" ry="210" fill="url(#auraGlow)"/>
    <path d="M150,200 Q200,150 256,160 Q310,150 360,200 Q380,260 360,330 Q310,390 256,380 Q200,390 150,330 Q130,260 150,200Z" fill="#c94c4c" opacity="0.08"/>
    <path d="M170,220 Q220,180 256,185 Q290,180 330,220 Q350,270 330,320 Q290,360 256,350 Q220,360 170,320 Q150,270 170,220Z" fill="#7b5ea7" opacity="0.1"/>
  </g>

  <!-- Shadow tendrils from feet -->
  <g id="shadowTendrils">
    <path d="M240,440 C220,460 180,470 140,480 C120,484 100,482 90,478" fill="none" stroke="url(#tendrilGrad)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <path d="M270,440 C290,458 330,468 370,476 C390,480 410,478 420,474" fill="none" stroke="url(#tendrilGrad)" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <path d="M255,445 C255,465 250,480 245,490 C242,496 240,498 242,500" fill="none" stroke="url(#tendrilGrad)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <path d="M230,442 C210,465 185,478 160,488" fill="none" stroke="url(#tendrilGrad)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <path d="M280,442 C300,462 325,475 350,484" fill="none" stroke="url(#tendrilGrad)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Humanoid female silhouette - legs -->
  <g id="legs">
    <path d="M235,360 C232,380 230,410 228,435 C227,440 228,445 232,445 L245,445 C247,442 246,438 245,432 C244,410 244,388 246,365Z" fill="url(#shadowBody)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M268,360 C270,380 272,410 274,435 C275,440 274,445 270,445 L258,445 C256,442 257,438 258,432 C259,410 259,388 258,365Z" fill="url(#shadowBody)" stroke="#1a1a2e" stroke-width="1.5"/>
  </g>

  <!-- Body / torso -->
  <g id="torso">
    <path d="M222,200 C215,230 212,270 218,310 C222,340 230,358 240,368 L263,368 C273,358 281,340 285,310 C291,270 288,230 280,200 Q256,188 222,200Z" fill="url(#shadowBody)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Waist taper -->
    <path d="M232,340 Q251,332 272,340" fill="none" stroke="#0d0d1a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Arms -->
  <g id="arms">
    <!-- Left arm (holding shadow brush) -->
    <path d="M222,210 C208,225 192,248 180,270 C170,288 164,305 165,315" fill="none" stroke="url(#shadowBody)" stroke-width="10" stroke-linecap="round"/>
    <path d="M222,210 C208,225 192,248 180,270 C170,288 164,305 165,315" fill="none" stroke="#0d0d1a" stroke-width="7" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M280,210 C295,228 308,250 316,275 C322,295 324,310 322,320" fill="none" stroke="url(#shadowBody)" stroke-width="9" stroke-linecap="round"/>
    <path d="M280,210 C295,228 308,250 316,275 C322,295 324,310 322,320" fill="none" stroke="#0d0d1a" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Right hand gesturing -->
    <path d="M322,320 C326,328 332,332 335,328 C338,324 336,318 332,315" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M322,318 C328,324 334,326 336,322" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Shadow brush in left hand -->
  <g id="shadowBrush">
    <path d="M160,310 L145,195 L155,190 L168,195 L172,315Z" fill="url(#shadowBrush)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Brush tip -->
    <path d="M145,195 C140,178 142,160 148,148 C152,155 155,165 155,178 L155,190Z" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M155,190 C158,175 160,162 158,148 C155,155 152,168 152,180 L155,190Z" fill="#1a1a2e" stroke="#0d0d1a" stroke-width="0.8"/>
    <!-- Dark ink dripping from brush -->
    <path d="M148,148 C146,138 148,128 150,120" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M155,150 C156,140 154,130 156,122" stroke="#0d0d1a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Head -->
  <g id="head">
    <ellipse cx="252" cy="168" rx="32" ry="38" fill="url(#shadowBody)" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Neck -->
    <path d="M238,200 Q252,208 266,200 L266,195 Q252,202 238,195Z" fill="#0d0d1a"/>
  </g>

  <!-- Red glowing eyes -->
  <g id="eyes" filter="url(#eyeIntenseGlow)">
    <ellipse cx="242" cy="162" rx="7" ry="5" fill="url(#redEyeGlow)"/>
    <ellipse cx="242" cy="162" rx="3" ry="2.5" fill="#ff5544"/>
    <ellipse cx="264" cy="162" rx="7" ry="5" fill="url(#redEyeGlow)"/>
    <ellipse cx="264" cy="162" rx="3" ry="2.5" fill="#ff5544"/>
  </g>

  <!-- Hair-like ink wisps mimicking Mari's flowing hair -->
  <g id="inkHair">
    <path d="M225,140 C215,125 200,115 185,110 C175,108 168,112 172,120 C178,130 192,138 210,145" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
    <path d="M220,145 C208,130 190,120 170,118 C158,117 148,125 155,135 C165,148 185,155 205,155" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1.2" opacity="0.8"/>
    <path d="M280,140 C290,125 305,115 320,110 C330,108 338,112 334,120 C328,130 314,138 296,145" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
    <path d="M282,148 C295,135 312,125 330,122 C342,121 350,128 344,138 C335,150 318,156 300,156" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1.2" opacity="0.8"/>
    <!-- Top wisps -->
    <path d="M240,132 C235,115 238,95 245,80 C248,90 248,105 246,125" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1" opacity="0.7"/>
    <path d="M260,132 C265,112 262,92 258,78 C255,88 256,105 258,125" fill="url(#hairWisp)" stroke="#1a1a2e" stroke-width="1" opacity="0.7"/>
    <!-- Long back wisps -->
    <path d="M230,155 C215,170 195,195 180,225 C170,248 168,268 175,280" fill="none" stroke="url(#hairWisp)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M275,155 C290,170 310,195 325,225 C335,248 338,268 330,280" fill="none" stroke="url(#hairWisp)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Brush fragments floating around -->
  <g id="brushFragments" filter="url(#fragmentGlow)">
    <!-- Fragment 1 - top left -->
    <path d="M115,85 L120,70 L128,75 L125,90 L118,92Z" fill="#3a2a2e" stroke="#1a1a2e" stroke-width="1.2" transform="rotate(-15,120,80)"/>
    <!-- Fragment 2 - top right -->
    <path d="M375,95 L382,78 L390,84 L386,100 L378,100Z" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1.2" transform="rotate(12,382,90)"/>
    <!-- Fragment 3 - left -->
    <path d="M85,230 L90,218 L98,222 L96,236 L88,237Z" fill="#3a2a2e" stroke="#1a1a2e" stroke-width="1" transform="rotate(-25,90,228)"/>
    <!-- Fragment 4 - right -->
    <path d="M410,210 L416,196 L424,202 L420,216 L412,215Z" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1" transform="rotate(20,416,206)"/>
    <!-- Fragment 5 - bottom left -->
    <path d="M105,350 L110,340 L116,345 L113,355 L107,354Z" fill="#3a2a2e" stroke="#1a1a2e" stroke-width="1" transform="rotate(-8,110,347)"/>
    <!-- Fragment 6 - top center -->
    <path d="M305,55 L310,42 L318,48 L315,60 L308,60Z" fill="#2a2a3e" stroke="#1a1a2e" stroke-width="1.2" transform="rotate(5,310,50)"/>
    <!-- Bristle bits on fragments -->
    <line x1="120" y1="70" x2="118" y2="62" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" transform="rotate(-15,120,80)"/>
    <line x1="382" y1="78" x2="384" y2="70" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" transform="rotate(12,382,90)"/>
  </g>

  <!-- Swirling ink particles around figure -->
  <g id="inkParticles">
    <circle cx="180" cy="180" r="3" fill="#c94c4c" opacity="0.5"/>
    <circle cx="330" cy="170" r="3.5" fill="#7b5ea7" opacity="0.5"/>
    <circle cx="140" cy="290" r="2.5" fill="#c94c4c" opacity="0.4"/>
    <circle cx="370" cy="300" r="3" fill="#7b5ea7" opacity="0.45"/>
    <circle cx="200" cy="100" r="2" fill="#c94c4c" opacity="0.5"/>
    <circle cx="310" cy="380" r="2.5" fill="#7b5ea7" opacity="0.4"/>
    <circle cx="350" cy="130" r="2" fill="#c94c4c" opacity="0.35"/>
    <circle cx="155" cy="370" r="2.5" fill="#7b5ea7" opacity="0.4"/>
  </g>
</svg>