<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a8fc5" />
      <stop offset="40%" stop-color="#4a7fb5" />
      <stop offset="100%" stop-color="#3a5f8a" />
    </linearGradient>
    <linearGradient id="dressGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f5f0e1" />
      <stop offset="50%" stop-color="#ede5d3" />
      <stop offset="100%" stop-color="#e0d8c5" />
    </linearGradient>
    <linearGradient id="inkTrailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#4a7fb5" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#4a7fb5" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0.3" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f5e6d0" />
      <stop offset="100%" stop-color="#e8d4ba" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07b28" />
      <stop offset="50%" stop-color="#8B6914" />
      <stop offset="100%" stop-color="#6b5010" />
    </linearGradient>
    <radialGradient id="splatGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4a7fb5" stop-opacity="0.1" />
    </radialGradient>
    <filter id="inkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="shadow" />
      <feOffset dx="3" dy="4" result="offsetShadow" />
      <feFlood flood-color="#1a1a2e" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="offsetShadow" operator="in" result="colorShadow" />
      <feMerge>
        <feMergeNode in="colorShadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="watercolor" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
