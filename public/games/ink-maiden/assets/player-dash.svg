<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="hairGrad" x1="1" y1="0" x2="0" y2="0.3">
      <stop offset="0%" stop-color="#4a7fb5"/>
      <stop offset="55%" stop-color="#3a6a9e"/>
      <stop offset="100%" stop-color="#2d5480"/>
    </linearGradient>
    <linearGradient id="afterimageGrad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a7fb5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trailGlowGrad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#6a9fd5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4a7fb5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#f5f0e1"/>
      <stop offset="60%" stop-color="#ede5d3"/>
      <stop offset="100%" stop-color="#e0d8c6"/>
    </linearGradient>
    <linearGradient id="brushTipGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a6a9e"/>
      <stop offset="100%" stop-color="#4a7fb5"/>
    </linearGradient>
    <linearGradient id="skinHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf0e4"/>
      <stop offset="100%" stop-color="#f5e6d0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="speedBlur" x="-50%" y="-20%" width="200%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6 2"/>
    </filter>
    <filter id="trailGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Speed lines (background) -->
  <g id="speed-trail" opacity="0.3">
    <line x1="80" y1="180" x2="20" y2="195" stroke="#4a7fb5" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="95" y1="230" x2="15" y2="240" stroke="#4a7fb5" stroke-width="1" stroke-linecap="round"/>
    <line x1="100" y1="280" x2="25" y2="288" stroke="#4a7fb5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="320" x2="10" y2="326" stroke="#4a7fb5" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="105" y1="260" x2="30" y2="266" stroke="#4a7fb5" stroke-width="1" stroke-linecap="round"/>
    <line x1="110" y1="210" x2="40" y2="218" stroke="#4a7fb5" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="85" y1="350" x2="30" y2="354" stroke="#4a7fb5" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="115" y1="300" x2="50" y2="306" stroke="#4a7fb5" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Trail glow behind character -->
  <ellipse cx="160" cy="270" rx="90" ry="50" fill="url(#trailGlowGrad)" filter="url(#trailGlow)" opacity="0.5"/>

  <!-- Afterimage 1 (furthest, faintest) -->
  <g id="afterimage" filter="url(#speedBlur)">
    <!-- Ghost 1 -->
    <g opacity="0.15" transform="translate(-110, 5)">
      <ellipse cx="280" cy="228" rx="18" ry="20" fill="#4a7fb5"/>
      <path d="M260,245 Q275,240 310,260 Q305,310 295,340 Q280,345 265,330 Q255,300 260,245Z" fill="#4a7fb5"/>
      <path d="M280,225 Q260,210 230,215 Q200,225 185,230" stroke="#4a7fb5" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Ghost 2 -->
    <g opacity="0.28" transform="translate(-60, 2)">
      <ellipse cx="280" cy="228" rx="18" ry="20" fill="#4a7fb5"/>
      <path d="M260,245 Q275,240 310,260 Q305,310 295,340 Q280,345 265,330 Q255,300 260,245Z" fill="#4a7fb5"/>
      <path d="M280,225 Q260,210 230,215 Q200,225 185,230" stroke="#4a7fb5" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Ghost 3 -->
    <g opacity="0.38" transform="translate(-30, 1)">
      <ellipse cx="280" cy="228" rx="18" ry="20" fill="#4a7fb5"/>
      <path d="M260,245 Q275,240 310,260 Q305,310 295,340 Q280,345 265,330 Q255,300 260,245Z" fill="#4a7fb5"/>
      <path d="M280,225 Q260,210 230,215 Q200,225 185,230" stroke="#4a7fb5" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Main character (slight transparency for ethereal dash) -->
  <g opacity="0.85">

    <!-- Hair streaming behind -->
    <g id="hair">
      <!-- Main hair mass flowing back -->
      <path d="M278,218 Q265,205 248,208 C220,214 185,220 140,228
               Q110,234 85,240 Q95,250 120,248
               C155,243 195,236 235,228 Q260,222 270,232Z"
            fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>
      <!-- Upper hair strands -->
      <path d="M282,212 Q268,200 250,200 C225,202 190,210 150,218
               Q120,224 95,230"
            fill="none" stroke="#3a6a9e" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <!-- Lower hair wisps -->
      <path d="M270,235 C240,240 200,248 155,252 Q125,256 100,258"
            fill="none" stroke="#4a7fb5" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <!-- Hair highlight -->
      <path d="M275,215 Q258,208 240,212 C215,218 185,225 155,232"
            fill="none" stroke="#6aaad8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <!-- Top of head hair -->
      <path d="M288,215 Q285,200 275,198 Q265,196 258,202 Q272,200 282,210Z"
            fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    </g>

    <!-- Body -->
    <g id="body">
      <!-- Neck (angled forward) -->
      <path d="M285,237 Q290,240 295,248 Q292,250 286,248 Q283,242 285,237Z"
            fill="url(#skinHighlight)" stroke="#1a1a2e" stroke-width="1.5"/>

      <!-- Head (tilted forward, intense focus) -->
      <ellipse cx="290" cy="222" rx="20" ry="22" fill="url(#skinHighlight)" stroke="#1a1a2e" stroke-width="2.5" transform="rotate(15, 290, 222)"/>

      <!-- Determined eyes -->
      <path d="M296,218 Q300,215 305,217" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="301" cy="218" r="1.8" fill="#1a1a2e"/>
      <!-- Lower eye (partially hidden by angle) -->
      <path d="M290,224 Q293,221 297,223" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="294" cy="223" r="1.3" fill="#1a1a2e"/>

      <!-- Intense eyebrows -->
      <path d="M295,213 Q300,210 306,212" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M288,219 Q292,217 296,219" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- Mouth (determined thin line) -->
      <path d="M298,230 Q302,229 305,230" stroke="#c94c4c" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- Nose -->
      <path d="M302,222 Q304,225 302,227" stroke="#1a1a2e" stroke-width="1" fill="none" stroke-linecap="round"/>

      <!-- Small blush -->
      <ellipse cx="306" cy="226" rx="3" ry="2" fill="#c94c4c" opacity="0.2"/>

      <!-- Forward arm (holding brush, extended) -->
      <path d="M310,258 Q330,255 355,248 Q370,244 385,240"
            fill="none" stroke="url(#skinHighlight)" stroke-width="10" stroke-linecap="round"/>
      <path d="M310,258 Q330,255 355,248 Q370,244 385,240"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Hand gripping brush -->
      <ellipse cx="388" cy="239" rx="7" ry="6" fill="#f5e6d0" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(-10, 388, 239)"/>
      <!-- Fingers on brush -->
      <path d="M385,235 Q390,232 393,234" stroke="#1a1a2e" stroke-width="1" fill="none"/>
      <path d="M386,237 Q392,234 395,236" stroke="#1a1a2e" stroke-width="1" fill="none"/>

      <!-- Back arm (trailing behind) -->
      <path d="M275,262 Q255,275 238,290 Q230,298 225,308"
            fill="none" stroke="#f5e6d0" stroke-width="8" stroke-linecap="round"/>
      <path d="M275,262 Q255,275 238,290 Q230,298 225,308"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Back hand -->
      <ellipse cx="224" cy="310" rx="5" ry="5" fill="#f5e6d0" stroke="#1a1a2e" stroke-width="1.5"/>

      <!-- Torso (leaning extremely forward) -->
      <path d="M285,245 Q295,248 310,255 Q315,265 312,280
               Q308,300 300,310 Q290,312 280,308
               Q272,295 270,275 Q270,258 285,245Z"
            fill="url(#skinHighlight)" stroke="#1a1a2e" stroke-width="2"/>
    </g>

    <!-- Dress (pressed flat against body by wind) -->
    <g id="dress">
      <path d="M283,248 Q296,250 312,258 Q316,268 314,282
               Q310,305 302,318 Q298,328 305,345
               Q300,352 290,350 Q282,340 278,325
               Q270,310 268,290 Q266,268 275,252 Q278,248 283,248Z"
            fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Dress wind flutter at hem (small trailing edge) -->
      <path d="M278,325 Q272,335 260,342 Q255,340 258,334 Q264,328 275,322"
            fill="#f5f0e1" stroke="#1a1a2e" stroke-width="1.5" opacity="0.8"/>
      <!-- Fold lines from wind -->
      <path d="M290,270 Q295,285 293,300" stroke="#d5cfc0" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M282,265 Q286,280 284,295" stroke="#d5cfc0" stroke-width="1" fill="none" opacity="0.5"/>
      <!-- Light upper-left highlight on dress -->
      <path d="M284,252 Q290,255 296,262 Q294,270 288,265 Q284,258 284,252Z"
            fill="#ffffff" opacity="0.15"/>
    </g>

    <!-- Legs (sprint pose, extreme forward lean) -->
    <g>
      <!-- Front leg (extended far forward) -->
      <path d="M298,318 Q320,340 345,365 Q355,375 360,385"
            fill="none" stroke="#f5e6d0" stroke-width="10" stroke-linecap="round"/>
      <path d="M298,318 Q320,340 345,365 Q355,375 360,385"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Front foot -->
      <path d="M360,385 Q365,390 372,392 Q375,390 373,386 Q368,384 360,385Z"
            fill="#f5e6d0" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- Ink stain on front foot -->
      <ellipse cx="367" cy="389" rx="3" ry="1.5" fill="#4a7fb5" opacity="0.5"/>

      <!-- Back leg (pushing off, bent behind) -->
      <path d="M282,315 Q268,340 255,365 Q248,378 240,388"
            fill="none" stroke="#f5e6d0" stroke-width="9" stroke-linecap="round"/>
      <path d="M282,315 Q268,340 255,365 Q248,378 240,388"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Back foot (toe pushing off) -->
      <path d="M240,388 Q235,392 230,394 Q228,391 232,388 Q236,386 240,388Z"
            fill="#f5e6d0" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- Ink stain on back foot -->
      <ellipse cx="234" cy="392" rx="2.5" ry="1.2" fill="#4a7fb5" opacity="0.45"/>
    </g>

    <!-- Brush (thrust forward like a lance) -->
    <g id="brush">
      <!-- Handle -->
      <path d="M390,238 Q415,232 445,224 Q455,221 462,219"
            fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
      <!-- Handle outline -->
      <path d="M390,238 Q415,232 445,224 Q455,221 462,219"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Handle highlight -->
      <path d="M400,234 Q420,228 440,222"
            fill="none" stroke="#a8841c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <!-- Metal ferrule -->
      <rect x="460" y="215" width="8" height="8" rx="1" fill="#888" stroke="#1a1a2e" stroke-width="1" transform="rotate(-10, 464, 219)"/>
      <!-- Brush tip (blue ink, large) -->
      <path d="M468,217 Q480,213 495,210 Q500,210 502,214
               Q500,218 495,220 Q480,222 468,222Z"
            fill="url(#brushTipGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- Ink dripping from brush tip -->
      <path d="M495,220 Q496,226 494,232" stroke="#4a7fb5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
      <circle cx="494" cy="234" r="2" fill="#4a7fb5" opacity="0.6"/>
      <!-- Ink spray from brush tip (forward) -->
      <circle cx="505" cy="212" r="1.5" fill="#4a7fb5" opacity="0.4"/>
      <circle cx="508" cy="216" r="1" fill="#4a7fb5" opacity="0.3"/>
      <circle cx="503" cy="208" r="1.8" fill="#4a7fb5" opacity="0.35"/>
    </g>

  </g>

  <!-- Ink trail streaming from brush (in front glow layer) -->
  <g opacity="0.5" filter="url(#softGlow)">
    <path d="M468,219 Q440,225 400,235 Q350,248 290,260
             Q230,272 170,278 Q130,282 100,284"
          fill="none" stroke="#4a7fb5" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <path d="M460,222 Q420,232 370,245 Q310,258 250,268
             Q190,276 140,280"
          fill="none" stroke="#4a7fb5" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Small ink splatter particles in the wake -->
  <g opacity="0.4">
    <circle cx="180" cy="270" r="3" fill="#4a7fb5"/>
    <circle cx="155" cy="285" r="2" fill="#4a7fb5"/>
    <circle cx="130" cy="262" r="2.5" fill="#4a7fb5"/>
    <circle cx="200" cy="290" r="1.8" fill="#4a7fb5"/>
    <circle cx="210" cy="255" r="2.2" fill="#4a7fb5"/>
    <circle cx="165" cy="250" r="1.5" fill="#4a7fb5"/>
    <circle cx="145" cy="278" r="1.2" fill="#4a7fb5"/>
  </g>

  <!-- Ground ink splash at feet -->
  <g opacity="0.3">
    <ellipse cx="365" cy="395" rx="15" ry="3" fill="#4a7fb5" filter="url(#softGlow)"/>
    <ellipse cx="235" cy="396" rx="10" ry="2.5" fill="#4a7fb5" filter="url(#softGlow)"/>
  </g>

</svg>