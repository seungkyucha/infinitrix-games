<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="inkDrop" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a2a3e" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#1a1a2e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="inkHighlight" cx="35%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a7fb5" stop-opacity="0"/>
    </radialGradient>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>
  <!-- Main ink blob - irregular organic shape -->
  <g id="ink-particle">
    <!-- Outer bleed/feather -->
    <path d="M32 8 C42 6, 54 16, 52 28 C56 36, 50 48, 40 52 C34 58, 20 56, 16 46 C10 38, 8 24, 16 16 C22 8, 28 6, 32 8Z"
          fill="url(#inkDrop)" filter="url(#inkBlur)" opacity="0.6"/>
    <!-- Core ink body -->
    <path d="M32 12 C40 10, 50 18, 48 28 C52 34, 46 44, 38 48 C32 52, 22 50, 18 42 C14 34, 12 22, 20 16 C26 10, 30 10, 32 12Z"
          fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5" opacity="0.9"/>
    <!-- Inner highlight - wet ink shine -->
    <ellipse cx="28" cy="24" rx="8" ry="6" fill="url(#inkHighlight)" opacity="0.7"/>
    <!-- Small drip extending down -->
    <path d="M36 48 C37 52, 35 58, 34 60 C33 58, 33 54, 34 50Z"
          fill="#1a1a2e" opacity="0.7" filter="url(#softEdge)"/>
    <!-- Tiny satellite droplet -->
    <circle cx="48" cy="20" r="3" fill="#1a1a2e" opacity="0.5" filter="url(#softEdge)"/>
    <circle cx="14" cy="38" r="2" fill="#1a1a2e" opacity="0.4" filter="url(#softEdge)"/>
    <!-- Ink surface detail -->
    <path d="M24 28 Q28 26, 32 28 Q30 30, 26 29Z" fill="#2a2a4e" opacity="0.3"/>
  </g>
</svg>