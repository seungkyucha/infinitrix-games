<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Watercolor blur for ink splatters -->
    <filter id="watercolor-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <filter id="splatter-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
    <!-- Light wash filter for watercolor feel -->
    <filter id="wash">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Hair gradient - blue tones with light from upper-left -->
    <linearGradient id="grad-hair" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#6aa0d6"/>
      <stop offset="45%" stop-color="#4a7fb5"/>
      <stop offset="100%" stop-color="#365f8a"/>
    </linearGradient>

    <!-- Skin gradient - warm with shadow -->
    <radialGradient id="grad-skin" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#faf0e4"/>
      <stop offset="60%" stop-color="#f5e6d0"/>
      <stop offset="100%" stop-color="#e0c9a8"/>
    </radialGradient>

    <!-- Dress gradient - cream with subtle shadow -->
    <linearGradient id="grad-dress" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#fdfaf5"/>
      <stop offset="40%" stop-color="#f5f0e1"/>
      <stop offset="100%" stop-color="#e8dcc5"/>
    </linearGradient>

    <!-- Brush handle gradient -->
    <linearGradient id="grad-brush-handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a07c1e"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6b5010"/>
    </linearGradient>

    <!-- Red ink splatter gradient -->
    <radialGradient id="grad-splatter" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#d65a5a"/>
      <stop offset="100%" stop-color="#c94c4c"/>
    </radialGradient>
  </defs>

  <!-- === SHADOW ON GROUND === -->
  <ellipse cx="268" cy="478" rx="70" ry="14" fill="#1a1a2e" opacity="0.18" filter="url(#watercolor-blur)"/>

  <!-- === HAIR (thrown forward from recoil) === -->
  <g id="hair">
    <!-- Main hair mass flowing forward -->
    <path d="M220 120 C200 100, 175 95, 160 105
             C145 115, 140 140, 148 160
             C155 178, 170 185, 185 195
             C195 200, 210 210, 218 225
             C225 235, 215 250, 200 265
             C190 275, 178 290, 175 300
             L180 295 C185 275, 195 260, 208 248
             C220 235, 230 220, 228 205
             C235 190, 240 170, 242 155
             C244 140, 240 125, 230 118 Z"
          fill="url(#grad-hair)" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Hair strands whipping forward -->
    <path d="M200 130 C185 125, 165 130, 155 145
             C148 158, 150 175, 160 190"
          fill="none" stroke="#365f8a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M215 115 C195 108, 170 110, 155 125
             C142 138, 140 158, 148 178"
          fill="none" stroke="#365f8a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <!-- Top/back hair on head -->
    <path d="M228 100 C240 90, 260 88, 275 95
             C288 102, 295 115, 290 130
             C285 140, 275 145, 265 148
             C255 145, 242 140, 235 132
             C228 122, 225 110, 228 100 Z"
          fill="url(#grad-hair)" stroke="#1a1a2e" stroke-width="2.2"/>

    <!-- Loose strand at tip -->
    <path d="M175 300 C168 315, 162 325, 158 340
             Q155 348, 160 345"
          fill="none" stroke="#4a7fb5" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M185 295 C180 310, 172 328, 165 338"
          fill="none" stroke="#4a7fb5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- === BODY (arched backward from hurt) === -->
  <g id="body">
    <!-- Head - tilted back -->
    <ellipse cx="258" cy="130" rx="38" ry="42" fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="2.5"
             transform="rotate(-12, 258, 130)"/>

    <!-- Face - pained expression -->
    <!-- Left eye squeezed shut -->
    <path d="M240 122 C243 118, 248 118, 251 122" fill="none" stroke="#1a1a2e" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M240 122 C243 126, 248 126, 251 122" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Right eye squeezed shut -->
    <path d="M262 118 C265 114, 270 114, 273 118" fill="none" stroke="#1a1a2e" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M262 118 C265 122, 270 122, 273 118" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Eyebrows - distressed, furrowed -->
    <path d="M238 113 C242 108, 249 108, 253 112" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M260 109 C264 105, 271 105, 275 110" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Mouth open in pain -->
    <ellipse cx="256" cy="148" rx="8" ry="6" fill="#c94c4c" stroke="#1a1a2e" stroke-width="1.8" opacity="0.85"
             transform="rotate(-5, 256, 148)"/>

    <!-- Neck - stretched back -->
    <path d="M248 168 C250 180, 252 190, 255 200
             L268 200 C270 190, 272 180, 270 168"
          fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="2"/>

    <!-- Left arm - raised defensively -->
    <path d="M235 215 C220 200, 205 185, 195 170
             C188 162, 182 155, 178 148
             Q172 140, 170 138"
          fill="none" stroke="url(#grad-skin)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M235 215 C220 200, 205 185, 195 170
             C188 162, 182 155, 178 148
             Q172 140, 170 138"
          fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Left hand - open, defensive -->
    <path d="M170 138 C167 132, 162 128, 158 130
             M170 138 C168 133, 165 130, 163 133
             M170 138 C170 132, 172 127, 170 125
             M170 138 C173 134, 176 130, 175 127"
          fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="170" cy="138" r="6" fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="1.5"/>

    <!-- Right arm - trailing down, barely holding brush -->
    <path d="M285 218 C295 235, 310 258, 322 280
             C330 295, 335 310, 338 320"
          fill="none" stroke="url(#grad-skin)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M285 218 C295 235, 310 258, 322 280
             C330 295, 335 310, 338 320"
          fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Right hand - loosely curled around brush -->
    <circle cx="340" cy="322" r="7" fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="1.8"/>
    <path d="M335 318 C333 322, 334 326, 337 328" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M342 317 C344 321, 345 326, 343 329" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Torso - arching backward -->
    <path d="M240 205 C235 215, 232 230, 234 248
             C236 265, 242 278, 250 290
             L275 290 C282 278, 288 265, 290 248
             C292 230, 290 215, 285 205 Z"
          fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- === DRESS (flowing with motion) === -->
  <g id="dress">
    <!-- Main dress body -->
    <path d="M232 200 C225 210, 220 228, 222 250
             C224 270, 228 295, 225 320
             C222 340, 218 365, 212 390
             C208 405, 210 415, 220 420
             Q245 430, 270 425
             C295 420, 310 415, 315 405
             C308 385, 302 360, 298 340
             C294 318, 292 295, 294 270
             C296 248, 295 225, 290 210
             C288 202, 278 198, 262 198
             C248 198, 238 200, 232 200 Z"
          fill="url(#grad-dress)" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Dress folds - watercolor-style creases -->
    <path d="M240 250 C242 270, 238 300, 235 330
             C232 350, 228 370, 222 395"
          fill="none" stroke="#d5cab2" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M270 245 C268 268, 272 300, 275 330
             C278 355, 282 375, 288 400"
          fill="none" stroke="#d5cab2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M252 260 C254 290, 250 320, 248 360"
          fill="none" stroke="#d5cab2" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Dress hem - slightly flared from motion -->
    <path d="M212 390 C208 400, 206 412, 210 418
             C214 422, 225 426, 240 428"
          fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M315 405 C318 398, 320 388, 316 380"
          fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- Shoulder straps / neckline -->
    <path d="M238 200 C245 195, 255 193, 262 193 C272 193, 280 195, 288 200"
          fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- === LEGS & FEET === -->
  <g id="legs">
    <!-- Left leg - planted but bent -->
    <path d="M235 400 C232 415, 230 435, 232 455
             C233 465, 236 472, 242 475"
          fill="none" stroke="url(#grad-skin)" stroke-width="16" stroke-linecap="round"/>
    <path d="M235 400 C232 415, 230 435, 232 455
             C233 465, 236 472, 242 475"
          fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>

    <!-- Left foot - on ground -->
    <path d="M228 472 C225 476, 222 478, 225 480
             C232 482, 248 482, 255 479
             C258 477, 252 474, 245 473 Z"
          fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="2"/>

    <!-- Right leg - lifted from impact -->
    <path d="M280 395 C285 408, 292 425, 298 438
             C302 448, 308 455, 312 458"
          fill="none" stroke="url(#grad-skin)" stroke-width="15" stroke-linecap="round"/>
    <path d="M280 395 C285 408, 292 425, 298 438
             C302 448, 308 455, 312 458"
          fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>

    <!-- Right foot - lifted, toes pointed down -->
    <path d="M312 458 C316 462, 320 466, 318 470
             C315 472, 310 470, 308 466
             C306 462, 310 458, 312 458 Z"
          fill="url(#grad-skin)" stroke="#1a1a2e" stroke-width="1.8"/>

    <!-- Ink stains on feet -->
    <ellipse cx="238" cy="478" rx="8" ry="3" fill="#1a1a2e" opacity="0.55" filter="url(#watercolor-blur)"/>
    <ellipse cx="248" cy="476" rx="5" ry="2.5" fill="#1a1a2e" opacity="0.4" filter="url(#watercolor-blur)"/>
    <circle cx="312" cy="465" r="4" fill="#1a1a2e" opacity="0.45" filter="url(#watercolor-blur)"/>
  </g>

  <!-- === BRUSH (barely held, dangling from right hand) === -->
  <g id="brush">
    <!-- Handle -->
    <path d="M338 325 C345 340, 355 365, 362 388
             C367 402, 370 415, 372 425"
          fill="none" stroke="url(#grad-brush-handle)" stroke-width="7" stroke-linecap="round"/>
    <path d="M338 325 C345 340, 355 365, 362 388
             C367 402, 370 415, 372 425"
          fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Brush metal ferrule -->
    <path d="M371 422 C372 428, 373 432, 374 436"
          fill="none" stroke="#888" stroke-width="8" stroke-linecap="butt"/>
    <path d="M371 422 C372 428, 373 432, 374 436"
          fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Brush tip - blue ink loaded -->
    <path d="M370 436 C365 442, 362 450, 366 458
             C370 464, 378 466, 382 460
             C386 454, 384 444, 380 436
             C377 433, 373 433, 370 436 Z"
          fill="#4a7fb5" stroke="#1a1a2e" stroke-width="2" opacity="0.9"/>
    <!-- Wet ink drip from brush tip -->
    <path d="M374 464 C375 470, 374 478, 372 484"
          fill="none" stroke="#4a7fb5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <circle cx="372" cy="487" r="2.5" fill="#4a7fb5" opacity="0.5"/>
  </g>

  <!-- === RED INK SPLATTERS (damage markers) === -->
  <g id="ink-splatters">
    <!-- Splatter 1 - on upper dress/chest area -->
    <path d="M255 230 C260 225, 268 222, 275 226
             C280 230, 282 238, 278 244
             C274 250, 265 252, 258 248
             C252 244, 250 236, 255 230 Z
             M275 226 C280 220, 285 218, 288 222
             M278 244 C282 248, 286 252, 284 256"
          fill="url(#grad-splatter)" stroke="none" opacity="0.75" filter="url(#splatter-blur)"/>

    <!-- Splatter 2 - on left arm -->
    <path d="M198 172 C204 168, 212 170, 214 176
             C216 182, 212 188, 206 188
             C200 188, 195 184, 196 178
             Q196 175, 198 172 Z
             M214 176 C218 173, 222 174, 220 178"
          fill="#c94c4c" stroke="none" opacity="0.7" filter="url(#splatter-blur)"/>

    <!-- Splatter 3 - on dress lower area -->
    <path d="M250 340 C256 334, 265 333, 270 338
             C276 343, 278 352, 272 358
             C266 364, 255 362, 250 356
             C246 350, 245 344, 250 340 Z
             M270 338 C276 334, 280 336, 278 340
             M250 356 C244 360, 240 358, 242 354"
          fill="url(#grad-splatter)" stroke="none" opacity="0.65" filter="url(#splatter-blur)"/>

    <!-- Splatter 4 - small on right arm -->
    <path d="M318 275 C322 272, 328 273, 330 278
             C332 283, 328 287, 324 286
             C320 285, 316 280, 318 275 Z"
          fill="#c94c4c" stroke="none" opacity="0.7" filter="url(#splatter-blur)"/>

    <!-- Small scattered droplets -->
    <circle cx="242" cy="225" r="3" fill="#c94c4c" opacity="0.5" filter="url(#watercolor-blur)"/>
    <circle cx="280" cy="248" r="2.5" fill="#c94c4c" opacity="0.45" filter="url(#watercolor-blur)"/>
    <circle cx="262" cy="365" r="2" fill="#c94c4c" opacity="0.4" filter="url(#watercolor-blur)"/>
    <circle cx="205" cy="165" r="2" fill="#c94c4c" opacity="0.5" filter="url(#watercolor-blur)"/>
  </g>

  <!-- === IMPACT LINES (motion/pain indicators) === -->
  <g id="impact-lines" opacity="0.3">
    <path d="M155 150 L140 135" stroke="#c94c4c" stroke-width="2" stroke-linecap="round"/>
    <path d="M150 170 L132 162" stroke="#c94c4c" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M160 130 L148 118" stroke="#c94c4c" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M295 105 L310 92" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M300 115 L318 108" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>