<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Skin gradient - warm tone with light from upper-left -->
    <radialGradient id="skinGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#faecd8"/>
      <stop offset="60%" stop-color="#f5e6d0"/>
      <stop offset="100%" stop-color="#e8d3b8"/>
    </radialGradient>

    <!-- Hair gradient - blue with depth -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a9fd5"/>
      <stop offset="40%" stop-color="#4a7fb5"/>
      <stop offset="100%" stop-color="#2e5a8a"/>
    </linearGradient>

    <!-- Dress gradient - cream with shadow -->
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="50%" stop-color="#f5f0e1"/>
      <stop offset="100%" stop-color="#e0d8c6"/>
    </linearGradient>

    <!-- Wall stone gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8a0a0"/>
      <stop offset="100%" stop-color="#7a7272"/>
    </linearGradient>

    <!-- Brush handle gradient -->
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#a07818"/>
      <stop offset="100%" stop-color="#6d5210"/>
    </linearGradient>

    <!-- Ink stain filter for watercolor effect -->
    <filter id="watercolor" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Soft shadow for depth -->
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="3" dy="2" result="offset"/>
      <feFlood flood-color="#1a1a2e" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wall detail - left side stone texture -->
  <g id="wall-detail">
    <!-- Wall surface -->
    <rect x="0" y="0" width="95" height="512" fill="#8a8282" opacity="0.3"/>
    <rect x="0" y="0" width="85" height="512" fill="#9a9292" opacity="0.25"/>

    <!-- Stone block lines -->
    <line x1="0" y1="80" x2="90" y2="80" stroke="#7a7070" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="160" x2="90" y2="162" stroke="#7a7070" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="240" x2="88" y2="241" stroke="#7a7070" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="320" x2="90" y2="319" stroke="#7a7070" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="400" x2="87" y2="401" stroke="#7a7070" stroke-width="1" opacity="0.35"/>
    <line x1="45" y1="0" x2="44" y2="80" stroke="#7a7070" stroke-width="0.8" opacity="0.3"/>
    <line x1="40" y1="160" x2="42" y2="240" stroke="#7a7070" stroke-width="0.8" opacity="0.3"/>
    <line x1="50" y1="320" x2="48" y2="400" stroke="#7a7070" stroke-width="0.8" opacity="0.3"/>

    <!-- Grip marks where hands/feet press -->
    <ellipse cx="88" cy="175" rx="14" ry="8" fill="#6a6262" opacity="0.35"/>
    <ellipse cx="82" cy="280" rx="12" ry="7" fill="#6a6262" opacity="0.3"/>
    <ellipse cx="86" cy="370" rx="15" ry="9" fill="#6a6262" opacity="0.35"/>
    <ellipse cx="80" cy="420" rx="13" ry="8" fill="#6a6262" opacity="0.3"/>

    <!-- Ink smudges on wall from Mari's grip -->
    <ellipse cx="90" cy="172" rx="6" ry="4" fill="#2e5a8a" opacity="0.2"/>
    <ellipse cx="84" cy="368" rx="5" ry="3" fill="#1a1a2e" opacity="0.15"/>
    <ellipse cx="82" cy="418" rx="7" ry="4" fill="#1a1a2e" opacity="0.12"/>
  </g>

  <!-- Main character group with soft shadow -->
  <g filter="url(#softShadow)">

    <!-- Hair - hanging to the right due to gravity -->
    <g id="hair">
      <!-- Main hair mass flowing right -->
      <path d="M 165,135 C 160,120 148,108 155,100 C 162,92 178,90 185,95
               C 192,88 205,86 212,92 C 218,86 228,88 230,96
               C 236,102 232,112 228,120
               C 240,125 260,140 275,165
               C 290,190 305,225 310,260
               C 315,285 312,300 300,305
               C 288,310 270,300 258,280
               C 245,258 235,230 228,200
               C 222,175 215,158 205,148
               C 195,155 180,150 170,142 Z"
            fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linejoin="round"/>

      <!-- Hair strand details -->
      <path d="M 190,100 C 200,115 215,140 230,175 C 245,210 260,250 270,280"
            fill="none" stroke="#2e5a8a" stroke-width="1.2" opacity="0.4"/>
      <path d="M 175,108 C 185,130 200,160 218,195 C 235,228 250,260 258,280"
            fill="none" stroke="#2e5a8a" stroke-width="1" opacity="0.35"/>
      <path d="M 200,95 C 215,120 235,160 252,200 C 268,240 285,275 295,295"
            fill="none" stroke="#3a6fa5" stroke-width="1.3" opacity="0.3"/>

      <!-- Highlight strands -->
      <path d="M 180,98 C 190,115 202,140 215,170"
            fill="none" stroke="#7ab5e5" stroke-width="1.5" opacity="0.3"/>
      <path d="M 210,92 C 225,115 240,150 252,185"
            fill="none" stroke="#7ab5e5" stroke-width="1.2" opacity="0.25"/>

      <!-- Bangs/fringe near face -->
      <path d="M 155,115 C 160,108 170,105 178,110 C 172,118 164,122 158,120 Z"
            fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.8"/>
      <path d="M 178,108 C 185,100 195,98 200,105 C 195,115 185,118 178,115 Z"
            fill="url(#hairGrad)" stroke="#1a1a2e" stroke-width="1.8"/>
    </g>

    <!-- Body - profile view facing right, pressed against wall -->
    <g id="body">
      <!-- Head - slightly tilted, determined expression -->
      <ellipse cx="185" cy="140" rx="38" ry="42" fill="url(#skinGrad)"
               stroke="#1a1a2e" stroke-width="2.5" transform="rotate(-8, 185, 140)"/>

      <!-- Ear (left side visible in profile) -->
      <path d="M 148,135 C 142,130 140,140 143,148 C 146,152 150,148 150,142"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.8"/>

      <!-- Eye - determined look, slightly squinting -->
      <ellipse cx="200" cy="132" rx="8" ry="9" fill="white" stroke="#1a1a2e" stroke-width="1.5"/>
      <ellipse cx="203" cy="133" rx="4.5" ry="5" fill="#1a1a2e"/>
      <ellipse cx="204.5" cy="131.5" rx="1.8" ry="2" fill="white"/>
      <!-- Determined eyebrow - angled down -->
      <path d="M 190,120 C 195,117 205,116 212,119"
            fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Nose - profile hint -->
      <path d="M 210,138 C 214,140 215,144 212,147"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Mouth - clenching brush, determined set -->
      <path d="M 206,158 C 210,156 218,155 222,157"
            fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <!-- Teeth grip lines around brush -->
      <path d="M 210,155 L 210,160" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
      <path d="M 216,154 L 216,159" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>

      <!-- Cheek blush - effort from climbing -->
      <ellipse cx="207" cy="150" rx="8" ry="5" fill="#c94c4c" opacity="0.2"/>

      <!-- Neck -->
      <path d="M 175,175 C 178,168 188,165 195,168 C 192,178 182,182 175,180"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>

      <!-- Torso/upper body - profile, pressed against wall -->
      <path d="M 130,195 C 128,185 140,175 160,175
               C 175,175 188,178 195,185
               C 200,195 198,210 195,230
               C 192,245 188,255 182,265
               C 170,270 155,268 140,260
               C 130,250 128,235 128,220 Z"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2.2"/>

      <!-- Shoulder definition -->
      <path d="M 155,178 C 145,180 135,188 130,198"
            fill="none" stroke="#e0c8a8" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Dress - hanging with gravity, flowing right -->
    <g id="dress">
      <!-- Main dress body -->
      <path d="M 138,198 C 135,195 145,188 165,188
               C 180,188 190,192 195,200
               C 200,215 198,240 195,260
               C 192,280 190,300 195,320
               C 200,340 210,355 215,365
               C 210,372 198,375 185,370
               C 175,365 165,350 158,330
               C 148,305 140,280 136,260
               C 132,240 130,220 132,205 Z"
            fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linejoin="round"/>

      <!-- Dress fold lines - gravity pulls fabric -->
      <path d="M 155,210 C 160,230 165,260 172,290 C 178,315 185,340 195,358"
            fill="none" stroke="#d5cdb8" stroke-width="1.5" opacity="0.6"/>
      <path d="M 145,205 C 148,225 152,255 158,285 C 163,310 170,335 180,355"
            fill="none" stroke="#d5cdb8" stroke-width="1.2" opacity="0.5"/>
      <path d="M 170,195 C 175,215 180,245 185,275 C 190,305 195,330 200,350"
            fill="none" stroke="#d5cdb8" stroke-width="1" opacity="0.45"/>

      <!-- Dress hem - slightly fluttering -->
      <path d="M 185,370 C 190,373 200,375 210,372 C 216,370 218,367 215,365"
            fill="url(#dressGrad)" stroke="#1a1a2e" stroke-width="1.8"/>

      <!-- Sleeveless arm holes -->
      <path d="M 140,195 C 138,200 136,205 138,198"
            fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.5"/>
    </g>

    <!-- Right hand - gripping wall edge up high -->
    <g id="hands">
      <!-- Right arm reaching up to wall -->
      <path d="M 140,192 C 128,188 115,178 108,168
               C 100,155 95,145 92,138
               C 90,132 88,125 90,120"
            fill="none" stroke="url(#skinGrad)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arm outline -->
      <path d="M 140,192 C 128,188 115,178 108,168
               C 100,155 95,145 92,138
               C 90,132 88,125 90,120"
            fill="none" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arm inner fill -->
      <path d="M 140,186 C 128,182 116,173 109,163
               C 101,150 96,140 93,133 C 91,128 90,122 91,118
               L 97,117 C 96,123 97,130 99,136
               C 102,145 107,155 114,167
               C 121,178 132,186 142,190 Z"
            fill="url(#skinGrad)" stroke="none"/>

      <!-- Right hand fingers splayed on wall -->
      <path d="M 90,120 C 88,115 85,108 82,102 C 80,98 78,96 80,94"
            fill="none" stroke="url(#skinGrad)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 90,120 C 86,112 83,104 80,98"
            fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Index finger -->
      <path d="M 88,118 C 85,110 82,100 82,94"
            fill="none" stroke="url(#skinGrad)" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M 88,118 C 85,110 82,100 82,94"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Middle finger -->
      <path d="M 92,116 C 90,106 88,96 90,88"
            fill="none" stroke="url(#skinGrad)" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M 92,116 C 90,106 88,96 90,88"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Ring finger -->
      <path d="M 95,117 C 94,108 94,98 96,92"
            fill="none" stroke="url(#skinGrad)" stroke-width="5" stroke-linecap="round"/>
      <path d="M 95,117 C 94,108 94,98 96,92"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Pinky -->
      <path d="M 98,119 C 98,112 100,104 102,98"
            fill="none" stroke="url(#skinGrad)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M 98,119 C 98,112 100,104 102,98"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Ink stains on right fingertips -->
      <circle cx="80" cy="94" r="3" fill="#1a1a2e" opacity="0.6"/>
      <circle cx="82" cy="94" r="2.5" fill="#2e5a8a" opacity="0.4"/>
      <circle cx="90" cy="88" r="3" fill="#1a1a2e" opacity="0.55"/>
      <circle cx="96" cy="92" r="2.5" fill="#1a1a2e" opacity="0.5"/>
      <circle cx="102" cy="98" r="2" fill="#2e5a8a" opacity="0.45"/>

      <!-- Left arm - steadying against wall below -->
      <path d="M 145,230 C 132,235 118,242 108,252
               C 100,260 94,270 90,278"
            fill="none" stroke="url(#skinGrad)" stroke-width="12"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 145,230 C 132,235 118,242 108,252
               C 100,260 94,270 90,278"
            fill="none" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Left arm inner fill -->
      <path d="M 145,224 C 132,229 119,237 109,247
               C 101,255 95,265 91,273
               L 96,280 C 99,272 105,262 112,254
               C 120,245 133,238 145,234 Z"
            fill="url(#skinGrad)" stroke="none"/>

      <!-- Left hand flat against wall -->
      <path d="M 90,278 C 88,282 86,288 84,292
               C 82,296 80,298 82,300 C 86,300 90,296 92,290
               C 94,285 93,280 90,278 Z"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="1.8"/>
      <!-- Left fingers pressed flat -->
      <path d="M 84,292 C 82,296 80,300 78,304"
            fill="none" stroke="url(#skinGrad)" stroke-width="5" stroke-linecap="round"/>
      <path d="M 84,292 C 82,296 80,300 78,304"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 86,295 C 84,300 83,306 82,310"
            fill="none" stroke="url(#skinGrad)" stroke-width="5" stroke-linecap="round"/>
      <path d="M 86,295 C 84,300 83,306 82,310"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 89,296 C 88,302 88,308 88,314"
            fill="none" stroke="url(#skinGrad)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M 89,296 C 88,302 88,308 88,314"
            fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Ink on left fingertips -->
      <circle cx="78" cy="304" r="2.5" fill="#1a1a2e" opacity="0.5"/>
      <circle cx="82" cy="310" r="2" fill="#2e5a8a" opacity="0.4"/>
    </g>

    <!-- Legs - bent, feet pressed against wall -->
    <g id="legs">
      <!-- Right leg (closer to wall) bent up -->
      <path d="M 155,320 C 148,330 138,345 125,355
               C 115,362 105,365 98,370
               C 92,375 88,380 86,388"
            fill="none" stroke="url(#skinGrad)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 155,320 C 148,330 138,345 125,355
               C 115,362 105,365 98,370
               C 92,375 88,380 86,388"
            fill="none" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Right foot pressed flat against wall -->
      <path d="M 86,388 C 84,392 82,398 80,406
               C 78,412 80,416 84,418
               C 88,420 92,416 92,410
               C 92,404 90,396 88,390 Z"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
      <!-- Toes detail -->
      <path d="M 80,406 C 78,408 78,412 80,414"
            fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
      <path d="M 82,404 C 80,407 80,411 82,414"
            fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>

      <!-- Left leg bent, knee pointed outward -->
      <path d="M 170,330 C 165,345 160,360 150,380
               C 142,395 130,410 118,420
               C 108,428 98,432 90,435"
            fill="none" stroke="url(#skinGrad)" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 170,330 C 165,345 160,360 150,380
               C 142,395 130,410 118,420
               C 108,428 98,432 90,435"
            fill="none" stroke="#1a1a2e" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Left foot pressed against wall -->
      <path d="M 90,435 C 88,438 85,442 82,448
               C 80,454 82,458 86,460
               C 90,462 94,458 95,452
               C 96,446 94,440 92,436 Z"
            fill="url(#skinGrad)" stroke="#1a1a2e" stroke-width="2"/>
      <!-- Toes -->
      <path d="M 82,448 C 80,451 80,455 82,457"
            fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
      <path d="M 84,446 C 82,450 82,454 84,456"
            fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>

      <!-- Ink stains on feet -->
      <ellipse cx="84" cy="412" rx="4" ry="3" fill="#1a1a2e" opacity="0.3"/>
      <ellipse cx="86" cy="453" rx="5" ry="3" fill="#1a1a2e" opacity="0.25"/>
      <ellipse cx="82" cy="450" rx="3" ry="2" fill="#2e5a8a" opacity="0.2"/>
    </g>

    <!-- Brush - held horizontally in mouth -->
    <g id="brush">
      <!-- Brush handle extending from mouth to the right -->
      <path d="M 206,156 C 230,152 260,150 295,148
               C 320,147 340,147 355,148"
            fill="none" stroke="url(#brushGrad)" stroke-width="7"
            stroke-linecap="round"/>
      <path d="M 206,156 C 230,152 260,150 295,148
               C 320,147 340,147 355,148"
            fill="none" stroke="#1a1a2e" stroke-width="1.5"
            stroke-linecap="round" opacity="0.6"/>

      <!-- Brush handle wood grain -->
      <path d="M 240,151 C 260,149 280,149 300,148"
            fill="none" stroke="#a07818" stroke-width="1" opacity="0.4"/>
      <path d="M 250,154 C 270,152 290,151 310,150"
            fill="none" stroke="#6d5210" stroke-width="0.8" opacity="0.3"/>

      <!-- Brush ferrule (metal band) -->
      <rect x="350" y="143" width="12" height="10" rx="2" fill="#888" stroke="#666" stroke-width="1"/>

      <!-- Brush tip - blue ink loaded -->
      <path d="M 362,148 C 370,145 380,143 388,144
               C 395,146 398,150 395,154
               C 390,158 380,158 372,156
               C 365,154 360,152 362,148 Z"
            fill="#4a7fb5" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- Brush tip highlight -->
      <path d="M 370,146 C 378,144 385,145 388,148"
            fill="none" stroke="#6a9fd5" stroke-width="1.5" opacity="0.5"/>
      <!-- Dripping ink from brush tip -->
      <path d="M 385,156 C 386,162 385,170 383,178"
            fill="none" stroke="#4a7fb5" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <circle cx="383" cy="182" r="3" fill="#4a7fb5" opacity="0.4"/>
      <circle cx="382" cy="192" r="2" fill="#4a7fb5" opacity="0.25"/>
    </g>

  </g>

  <!-- Scattered ink drops - environmental storytelling -->
  <g id="ink-drops" opacity="0.3">
    <circle cx="95" cy="200" r="2" fill="#1a1a2e"/>
    <circle cx="75" cy="340" r="1.5" fill="#4a7fb5"/>
    <circle cx="100" cy="460" r="2.5" fill="#1a1a2e"/>
    <ellipse cx="70" cy="250" rx="3" ry="1.5" fill="#2e5a8a" transform="rotate(-15,70,250)"/>
    <circle cx="110" cy="150" r="1.5" fill="#4a7fb5"/>
  </g>
</svg>