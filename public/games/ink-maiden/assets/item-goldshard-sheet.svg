<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 128" width="768" height="128">
  <defs>
    <linearGradient id="goldBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a0"/>
      <stop offset="40%" stop-color="#d4a847"/>
      <stop offset="100%" stop-color="#b08a30"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5e6a0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4a847" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Frame 1: Neutral gold shard -->
  <g transform="translate(0,0)">
    <g transform="translate(64,64)">
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.5"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.3"/>
      <circle cx="-25" cy="-20" r="2" fill="#d4a847" opacity="0.4"/>
      <circle cx="22" cy="18" r="1.5" fill="#d4a847" opacity="0.3"/>
    </g>
  </g>

  <!-- Frame 2: Slight rotation + faint glow -->
  <g transform="translate(128,0)">
    <g transform="translate(64,64) rotate(8)">
      <circle cx="0" cy="0" r="30" fill="url(#sparkGlow)" opacity="0.2" filter="url(#softGlow)"/>
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.6"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.4"/>
      <circle cx="-28" cy="-15" r="2.5" fill="#f5e6a0" opacity="0.5"/>
      <circle cx="25" cy="15" r="2" fill="#f5e6a0" opacity="0.4"/>
    </g>
  </g>

  <!-- Frame 3: Peak glow + sparkles -->
  <g transform="translate(256,0)">
    <g transform="translate(64,64) rotate(15)">
      <circle cx="0" cy="0" r="40" fill="url(#sparkGlow)" opacity="0.4" filter="url(#softGlow)"/>
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2" filter="url(#goldGlow)"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.8"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.6"/>
      <!-- Sparkle cross flares -->
      <path d="M0 -50 L2 -20 L0 -15 L-2 -20Z" fill="#f5e6a0" opacity="0.6"/>
      <path d="M0 15 L2 45 L0 50 L-2 45Z" fill="#f5e6a0" opacity="0.5"/>
      <path d="M-50 0 L-20 -2 L-15 0 L-20 2Z" fill="#f5e6a0" opacity="0.5"/>
      <path d="M15 0 L45 -2 L50 0 L45 2Z" fill="#f5e6a0" opacity="0.6"/>
      <circle cx="-30" cy="-30" r="3" fill="#fff8e0" opacity="0.7"/>
      <circle cx="30" cy="25" r="2.5" fill="#fff8e0" opacity="0.6"/>
      <circle cx="-20" cy="30" r="2" fill="#f5e6a0" opacity="0.5"/>
    </g>
  </g>

  <!-- Frame 4: Glow fading, rotating more -->
  <g transform="translate(384,0)">
    <g transform="translate(64,64) rotate(22)">
      <circle cx="0" cy="0" r="35" fill="url(#sparkGlow)" opacity="0.3" filter="url(#softGlow)"/>
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.65"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.45"/>
      <circle cx="-25" cy="-25" r="2" fill="#f5e6a0" opacity="0.4"/>
      <circle cx="28" cy="20" r="1.5" fill="#f5e6a0" opacity="0.35"/>
      <path d="M0 -48 L1.5 -22 L0 -18 L-1.5 -22Z" fill="#f5e6a0" opacity="0.3"/>
    </g>
  </g>

  <!-- Frame 5: Almost back to neutral -->
  <g transform="translate(512,0)">
    <g transform="translate(64,64) rotate(30)">
      <circle cx="0" cy="0" r="28" fill="url(#sparkGlow)" opacity="0.15" filter="url(#softGlow)"/>
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.5"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.3"/>
      <circle cx="-22" cy="-18" r="1.5" fill="#d4a847" opacity="0.3"/>
      <circle cx="20" cy="22" r="1" fill="#d4a847" opacity="0.25"/>
    </g>
  </g>

  <!-- Frame 6: Back to start position -->
  <g transform="translate(640,0)">
    <g transform="translate(64,64) rotate(36)">
      <path d="M0 -35 L20 -10 L15 25 L-5 35 L-22 15 L-18 -15Z" fill="url(#goldBody)" stroke="#1a1a2e" stroke-width="2"/>
      <path d="M0 -35 L20 -10 L0 0 L-18 -15Z" fill="url(#goldHighlight)" opacity="0.45"/>
      <path d="M-5 -20 L5 -10 L0 5Z" fill="#fff8e0" opacity="0.25"/>
      <circle cx="-24" cy="-20" r="2" fill="#d4a847" opacity="0.35"/>
      <circle cx="23" cy="17" r="1.5" fill="#d4a847" opacity="0.3"/>
    </g>
  </g>
</svg>