<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sparkleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e6a0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#d4a847" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#d4a847" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a847" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkleCore" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="60%" stop-color="#f5e6a0"/>
      <stop offset="100%" stop-color="#d4a847"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <g id="sparkle-particle">
    <!-- Outer glow aura -->
    <circle cx="32" cy="32" r="24" fill="url(#sparkleGlow)" opacity="0.5" filter="url(#softGlow)"/>
    <!-- Cross flare - vertical -->
    <path d="M32 4 L34 26 L32 30 L30 26 Z" fill="#d4a847" opacity="0.7"/>
    <path d="M32 60 L34 38 L32 34 L30 38 Z" fill="#d4a847" opacity="0.7"/>
    <!-- Cross flare - horizontal -->
    <path d="M4 32 L26 30 L30 32 L26 34 Z" fill="#d4a847" opacity="0.7"/>
    <path d="M60 32 L38 30 L34 32 L38 34 Z" fill="#d4a847" opacity="0.7"/>
    <!-- Diagonal flares (smaller) -->
    <path d="M12 12 L28 28 L30 30 L26 28 Z" fill="#d4a847" opacity="0.4"/>
    <path d="M52 12 L36 28 L34 30 L38 28 Z" fill="#d4a847" opacity="0.4"/>
    <path d="M12 52 L28 36 L30 34 L26 36 Z" fill="#d4a847" opacity="0.4"/>
    <path d="M52 52 L36 36 L34 34 L38 36 Z" fill="#d4a847" opacity="0.4"/>
    <!-- Central bright core -->
    <circle cx="32" cy="32" r="5" fill="url(#sparkleCore)" filter="url(#goldGlow)"/>
    <!-- Tiny sparkle dots -->
    <circle cx="20" cy="18" r="1.5" fill="#f5e6a0" opacity="0.6"/>
    <circle cx="46" cy="22" r="1" fill="#f5e6a0" opacity="0.5"/>
    <circle cx="18" cy="44" r="1" fill="#f5e6a0" opacity="0.4"/>
    <circle cx="44" cy="46" r="1.5" fill="#f5e6a0" opacity="0.5"/>
  </g>
</svg>