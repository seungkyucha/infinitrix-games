<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#2D2D44"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#F50057"/>
    </linearGradient>
    <filter id="neonG">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGSm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="headlights">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#nightSky)"/>
  <!-- City skyline silhouette -->
  <g fill="#151530">
    <rect x="10" y="50" width="25" height="120"/>
    <rect x="40" y="30" width="20" height="140"/>
    <rect x="65" y="60" width="30" height="110"/>
    <rect x="100" y="20" width="18" height="150"/>
    <rect x="125" y="55" width="35" height="115"/>
    <rect x="165" y="35" width="22" height="135"/>
    <rect x="195" y="65" width="28" height="105"/>
    <rect x="228" y="25" width="20" height="145"/>
    <rect x="255" y="50" width="32" height="120"/>
    <rect x="292" y="40" width="18" height="130"/>
    <rect x="315" y="60" width="30" height="110"/>
    <rect x="350" y="30" width="25" height="140"/>
    <rect x="380" y="55" width="20" height="115"/>
  </g>
  <!-- Building windows (neon) -->
  <g fill="#00E5FF" opacity="0.3">
    <rect x="15" y="60" width="4" height="3"/><rect x="22" y="60" width="4" height="3"/>
    <rect x="15" y="70" width="4" height="3"/><rect x="22" y="80" width="4" height="3"/>
    <rect x="45" y="40" width="4" height="3"/><rect x="45" y="55" width="4" height="3"/>
    <rect x="105" y="35" width="4" height="3"/><rect x="105" y="50" width="4" height="3"/>
    <rect x="170" y="45" width="4" height="3"/><rect x="170" y="60" width="4" height="3"/>
    <rect x="233" y="35" width="4" height="3"/><rect x="233" y="50" width="4" height="3"/>
    <rect x="260" y="60" width="4" height="3"/><rect x="270" y="70" width="4" height="3"/>
    <rect x="355" y="40" width="4" height="3"/><rect x="365" y="55" width="4" height="3"/>
  </g>
  <g fill="#FF4081" opacity="0.2">
    <rect x="130" y="65" width="4" height="3"/><rect x="140" y="75" width="4" height="3"/>
    <rect x="200" y="75" width="4" height="3"/><rect x="210" y="85" width="4" height="3"/>
    <rect x="297" y="50" width="4" height="3"/><rect x="297" y="65" width="4" height="3"/>
    <rect x="320" y="70" width="4" height="3"/><rect x="335" y="80" width="4" height="3"/>
  </g>
  <!-- Road perspective -->
  <path d="M0,240 L150,155 L250,155 L400,240 Z" fill="url(#road)"/>
  <path d="M0,240 L150,155 L250,155 L400,240 Z" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.3"/>
  <!-- Road center line -->
  <line x1="180" y1="160" x2="160" y2="240" stroke="#FFD54F" stroke-width="2" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="220" y1="160" x2="240" y2="240" stroke="#FFD54F" stroke-width="2" stroke-dasharray="8,6" opacity="0.6"/>
  <!-- Neon road edges -->
  <line x1="150" y1="155" x2="0" y2="240" stroke="#00E5FF" stroke-width="2" filter="url(#neonGSm)" opacity="0.7"/>
  <line x1="250" y1="155" x2="400" y2="240" stroke="#FF4081" stroke-width="2" filter="url(#neonGSm)" opacity="0.7"/>
  <!-- Speed lines -->
  <g stroke="white" stroke-width="1" opacity="0.15">
    <line x1="100" y1="170" x2="60" y2="200"/>
    <line x1="120" y1="168" x2="85" y2="195"/>
    <line x1="300" y1="168" x2="335" y2="195"/>
    <line x1="280" y1="170" x2="320" y2="205"/>
  </g>
  <!-- Car (drifting angle) -->
  <g transform="translate(200,200) rotate(-15)">
    <!-- Drift smoke -->
    <g fill="white" opacity="0.15">
      <ellipse cx="25" cy="18" rx="15" ry="6"/>
      <ellipse cx="35" cy="20" rx="10" ry="4"/>
      <ellipse cx="-25" cy="18" rx="12" ry="5"/>
    </g>
    <!-- Car shadow -->
    <ellipse cx="0" cy="20" rx="35" ry="6" fill="#00000060"/>
    <!-- Car body -->
    <rect x="-30" y="-8" width="60" height="20" rx="6" fill="url(#carBody)"/>
    <!-- Windshield -->
    <rect x="-10" y="-12" width="25" height="10" rx="3" fill="#1A237E" opacity="0.8"/>
    <!-- Headlights -->
    <circle cx="-28" cy="0" r="3" fill="#FFEB3B" filter="url(#headlights)"/>
    <circle cx="-28" cy="8" r="3" fill="#FFEB3B" filter="url(#headlights)"/>
    <!-- Tail lights -->
    <circle cx="28" cy="0" r="2.5" fill="#FF1744" filter="url(#neonGSm)"/>
    <circle cx="28" cy="8" r="2.5" fill="#FF1744" filter="url(#neonGSm)"/>
    <!-- Neon underglow -->
    <rect x="-28" y="12" width="56" height="3" rx="1" fill="#00E5FF" filter="url(#neonG)" opacity="0.8"/>
    <!-- Wheels -->
    <ellipse cx="-20" cy="13" rx="6" ry="3" fill="#1A1A1A"/>
    <ellipse cx="18" cy="13" rx="6" ry="3" fill="#1A1A1A"/>
  </g>
  <!-- Neon signs -->
  <text x="50" y="145" font-family="Arial, sans-serif" font-size="10" fill="#FF4081" filter="url(#neonGSm)" opacity="0.6">DRIFT</text>
  <text x="330" y="140" font-family="Arial, sans-serif" font-size="9" fill="#00E5FF" filter="url(#neonGSm)" opacity="0.5">TURBO</text>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="url(#neonCyan)" opacity="0.7"/>
  <!-- Title text -->
  <text x="200" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="bold" fill="#00E5FF" filter="url(#neonG)">Neon Drift Racer</text>
</svg>