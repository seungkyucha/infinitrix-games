<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#004466"/>
    </linearGradient>
    <linearGradient id="windshieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="100%" stop-color="#003344"/>
    </linearGradient>
    <radialGradient id="engineGlow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0088aa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headlightGlow" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 엔진 글로우 (후방) -->
  <g filter="url(#softGlow)">
    <ellipse cx="32" cy="56" rx="10" ry="5" fill="url(#engineGlow)"/>
  </g>
  <!-- 헤드라이트 글로우 (전방) -->
  <g filter="url(#softGlow)">
    <ellipse cx="32" cy="8" rx="14" ry="8" fill="url(#headlightGlow)"/>
  </g>
  <!-- 차체 그림자 -->
  <path d="M20 52 L18 48 L18 20 L22 10 L42 10 L46 20 L46 48 L44 52 Z" fill="#001a22" opacity="0.5" transform="translate(1,1)"/>
  <!-- 차체 메인 바디 -->
  <g filter="url(#neonGlow)">
    <path d="M20 52 L18 48 L18 20 L22 10 L42 10 L46 20 L46 48 L44 52 Z" fill="url(#bodyGrad)"/>
  </g>
  <!-- 좌측 사이드 패널 -->
  <path d="M18 22 L14 28 L14 44 L18 48 Z" fill="#006680" opacity="0.8"/>
  <!-- 우측 사이드 패널 -->
  <path d="M46 22 L50 28 L50 44 L46 48 Z" fill="#006680" opacity="0.8"/>
  <!-- 윈드실드 -->
  <path d="M24 18 L26 14 L38 14 L40 18 L38 26 L26 26 Z" fill="url(#windshieldGrad)" opacity="0.85"/>
  <!-- 중앙 라인 (네온 스트라이프) -->
  <g filter="url(#neonGlow)">
    <line x1="32" y1="12" x2="32" y2="50" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- 좌측 네온 라인 -->
  <g filter="url(#neonGlow)">
    <path d="M20 48 L19 20 L22 12" stroke="#00ffff" stroke-width="0.8" fill="none" opacity="0.6"/>
  </g>
  <!-- 우측 네온 라인 -->
  <g filter="url(#neonGlow)">
    <path d="M44 48 L45 20 L42 12" stroke="#00ffff" stroke-width="0.8" fill="none" opacity="0.6"/>
  </g>
  <!-- 후미등 좌 -->
  <g filter="url(#neonGlow)">
    <rect x="21" y="49" width="6" height="2" rx="1" fill="#ff3333" opacity="0.9"/>
  </g>
  <!-- 후미등 우 -->
  <g filter="url(#neonGlow)">
    <rect x="37" y="49" width="6" height="2" rx="1" fill="#ff3333" opacity="0.9"/>
  </g>
  <!-- 엔진 노즐 좌 -->
  <ellipse cx="26" cy="53" rx="3" ry="1.5" fill="#00ddff" opacity="0.7" filter="url(#neonGlow)"/>
  <!-- 엔진 노즐 우 -->
  <ellipse cx="38" cy="53" rx="3" ry="1.5" fill="#00ddff" opacity="0.7" filter="url(#neonGlow)"/>
  <!-- 전방 라이트 좌 -->
  <rect x="22" y="10" width="4" height="2" rx="1" fill="#ffffff" opacity="0.9" filter="url(#neonGlow)"/>
  <!-- 전방 라이트 우 -->
  <rect x="38" y="10" width="4" height="2" rx="1" fill="#ffffff" opacity="0.9" filter="url(#neonGlow)"/>
</svg>
