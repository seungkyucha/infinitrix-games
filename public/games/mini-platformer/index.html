// 트윈 매니저 — clearImmediate로 경쟁조건 방지
class TweenManager {
  constructor() { this._tweens = []; }
  add(opts) {
    const t = { target:opts.target, props:{}, duration:opts.duration||300,
      elapsed:0, ease:opts.ease||TweenManager._easeOut, onComplete:opts.onComplete||null };
    for (const k in opts.props) {
      const p = opts.props[k];
      t.props[k] = { from: p.from !== undefined ? p.from : opts.target[k], to: p.to };
      opts.target[k] = t.props[k].from;
    }
    this._tweens.push(t);
    return t;
  }
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt * 1000;
      const prog = Math.min(t.elapsed / t.duration, 1);
      const e = t.ease(prog);
      for (const k in t.props) {
        const p = t.props[k];
        t.target[k] = p.from + (p.to - p.from) * e;
      }
      if (prog >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  clearImmediate() { this._tweens.length = 0; }
  static _easeOut(t) { return t * (2 - t); }
}

// 오브젝트 풀 — GC 방지
class ObjectPool {
  constructor(factory, maxSize) {
    this._factory = factory; this._pool = []; this._active = [];
    this._max = maxSize || 100;
  }
  get() {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._factory();
    if (this._active.length < this._max) this._active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  forEach(fn) { for (let i = this._active.length - 1; i >= 0; i--) fn(this._active[i], i); }
  releaseAll() { while (this._active.length > 0) this._pool.push(this._active.pop()); }
  get activeCount() { return this._active.length; }
}

// 사운드 매니저 — Web Audio API 코드 생성 효과음
class SoundManager {
  constructor() { this._ctx = null; this._vol = 0.3; this._muted = false; }
  _init() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._ctx.state === 'suspended') this._ctx.resume();
  }
  play(name) {
    if (this._muted || !this._ctx) return;
    const ac = this._ctx;
    const now = ac.currentTime;
    const g = ac.createGain();
    g.connect(ac.destination);
    g.gain.setValueAtTime(this._vol, now);
    const S = {
      jump:{w:'sine',f1:400,f2:600,d:.08}, djump:{w:'sine',f1:500,f2:800,d:.1},
      walljump:{w:'square',f1:300,f2:500,d:.06}, dash:{w:'sawtooth',f1:200,f2:100,d:.12},
      death:{w:'sawtooth',f1:200,f2:50,d:.2}, gem:{w:'sine',f1:800,f2:1200,d:.15},
      clear:{w:'sine',f1:523,f2:1047,d:.4}, checkpoint:{w:'triangle',f1:600,f2:900,d:.2},
      menu:{w:'sine',f1:440,f2:550,d:.05}
    };
    const s = S[name]; if (!s) return;
    const osc = ac.createOscillator();
    osc.type = s.w;
    osc.frequency.setValueAtTime(s.f1, now);
    osc.frequency.linearRampToValueAtTime(s.f2, now + s.d);
    g.gain.linearRampToValueAtTime(0, now + s.d);
    osc.connect(g); osc.start(now); osc.stop(now + s.d + 0.02);
  }
  toggleMute() { this._muted = !this._muted; return this._muted; }
}

// 입력 매니저 — 키보드 + 터치 통합
class InputManager {
  constructor() { this._keys = {}; this._prev = {}; this._justTouched = {}; }
  postUpdate() {
    this._prev = Object.assign({}, this._keys);
    this._justTouched = {};
  }
  isDown(key) { return !!this._keys[key]; }
  justPressed(key) {
    return (!!this._keys[key] && !this._prev[key]) || !!this._justTouched[key];
  }
  keyDown(code) { this._keys[code] = true; }
  keyUp(code) { this._keys[code] = false; }
  touchDown(key) { this._keys[key] = true; this._justTouched[key] = true; }
  touchUp(key) { this._keys[key] = false; }
  resetTouch() {
    const touchKeys = ['left','right','up','down','jump','dash','pause','restart','start'];
    for (const k of touchKeys) this._keys[k] = false;
  }
}

// Seeded RNG — LCG
class SeededRNG {
  constructor(seed) { this.seed = seed; }
  next() {
    this.seed = (this.seed * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (this.seed >>> 0) / 0xFFFFFFFF;
  }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
}

// 점수 계산 — 순수 함수 (파라미터 기반)
function calcStageScore(time, gemsCollected, deaths, cfg) {
  let score = cfg.STAGE_CLEAR_BASE;
  score += gemsCollected * cfg.GEM_BONUS;
  score += Math.max(0, Math.floor((cfg.TIME_BONUS_THRESHOLD - time) * cfg.TIME_BONUS_PER_SEC));
  if (deaths === 0) score += cfg.NO_DEATH_BONUS;
  return Math.floor(score);
}

// ─── §6. 레벨 생성 (Seeded RNG 기반 프로시저럴) ───
const TS = CONFIG.CANVAS.TILE_SIZE;
const TILE = { EMPTY:0, SOLID:1, SPIKE_UP:2, SPIKE_DOWN:3, SPIKE_LEFT:4, SPIKE_RIGHT:5 };

function generateLevel(worldIdx, stageIdx, rng) {
  const w = 42 + stageIdx * 6;
  const h = 22;
  const tiles = [];
  for (let r = 0; r < h; r++) {
    tiles[r] = new Array(w).fill(TILE.EMPTY);
  }
  // 테두리
  for (let c = 0; c < w; c++) { tiles[0][c] = TILE.SOLID; tiles[h-1][c] = TILE.SOLID; }
  for (let r = 0; r < h; r++) { tiles[r][0] = TILE.SOLID; tiles[r][w-1] = TILE.SOLID; }

  const gems = [];
  const movingPlatforms = [];
  const checkpoints = [];

  // 섹션별 플랫폼 생성
  const sections = 6 + stageIdx;
  const sectionW = Math.floor((w - 4) / sections);
  let prevPlatY = h - 3;

  for (let sec = 0; sec < sections; sec++) {
    const sx = 2 + sec * sectionW;
    const platCount = rng.nextInt(2, 3 + Math.floor(worldIdx * 0.5));

    for (let p = 0; p < platCount; p++) {
      // 플랫폼 높이 — 점진적 상승
      const minY = Math.max(3, prevPlatY - 6);
      const maxY = Math.min(h - 3, prevPlatY + 2);
      const platY = rng.nextInt(minY, maxY);
      const platLen = rng.nextInt(3, 6);
      const platX = rng.nextInt(sx, Math.min(sx + sectionW - platLen, w - 2));

      for (let c = platX; c < Math.min(platX + platLen, w - 1); c++) {
        tiles[platY][c] = TILE.SOLID;
      }
      prevPlatY = platY;

      // 벽점프용 벽 (월드2+)
      if (worldIdx >= 1 && rng.next() < 0.25 + stageIdx * 0.05) {
        const wallH = rng.nextInt(3, 6);
        const wallC = rng.next() < 0.5 ? platX : Math.min(platX + platLen - 1, w - 2);
        for (let r = platY - wallH; r < platY; r++) {
          if (r > 0 && wallC > 0 && wallC < w - 1) tiles[r][wallC] = TILE.SOLID;
        }
      }
    }

    // 가시 배치
    const spikeDensity = [0.12, 0.18, 0.25, 0.30, 0.35][worldIdx];
    if (rng.next() < spikeDensity + stageIdx * 0.04) {
      const spikeCount = rng.nextInt(1, 2 + stageIdx);
      for (let s = 0; s < spikeCount; s++) {
        const sc = rng.nextInt(sx + 1, Math.min(sx + sectionW - 1, w - 2));
        // 솔리드 위에 가시
        for (let r = h - 2; r > 1; r--) {
          if (tiles[r][sc] === TILE.SOLID && tiles[r-1][sc] === TILE.EMPTY) {
            tiles[r-1][sc] = TILE.SPIKE_UP; break;
          }
        }
      }
    }

    // 이동 발판 (스테이지 3+)
    if (stageIdx >= 2 && rng.next() < 0.35 + worldIdx * 0.08) {
      const mpx = rng.nextInt(sx + 1, Math.min(sx + sectionW - 3, w - 4));
      const mpy = rng.nextInt(5, h - 6);
      const isVert = rng.next() < 0.3;
      const range = rng.nextInt(3, 5);
      movingPlatforms.push({
        x: mpx * TS, y: mpy * TS, width: 3 * TS, height: TS * 0.6,
        startX: mpx * TS, endX: (mpx + (isVert ? 0 : range)) * TS,
        startY: mpy * TS, endY: (mpy + (isVert ? range : 0)) * TS,
        speed: 1 + worldIdx * 0.3, dir: 1, vertical: isVert
      });
    }
  }

  // 보석 3개 배치
  for (let g = 0; g < 3; g++) {
    let placed = false;
    for (let attempt = 0; attempt < 80; attempt++) {
      const col = rng.nextInt(3 + g * Math.floor(w / 4), Math.min(w - 3, 3 + (g + 1) * Math.floor(w / 4)));
      const row = rng.nextInt(3, h - 3);
      if (tiles[row][col] === TILE.EMPTY) {
        let hasFloor = false;
        for (let r = row + 1; r < Math.min(row + 6, h); r++) {
          if (tiles[r][col] === TILE.SOLID) { hasFloor = true; break; }
        }
        if (hasFloor) { gems.push({ x: col, y: row, collected: false }); placed = true; break; }
      }
    }
    if (!placed) gems.push({ x: 4 + g * 12, y: h - 3, collected: false });
  }

  // 골 — 우측 상단 근처
  let goalX = w - 4, goalY = h - 3;
  for (let r = 3; r < h - 2; r++) {
    if (tiles[r][goalX] === TILE.EMPTY) {
      for (let rr = r + 1; rr < h; rr++) {
        if (tiles[rr][goalX] === TILE.SOLID) { goalY = rr - 2; break; }
      }
      break;
    }
  }
  // 골 아래 발판 확보
  if (tiles[goalY + 1][goalX] !== TILE.SOLID) {
    tiles[goalY + 1][goalX] = TILE.SOLID;
    if (goalX + 1 < w) tiles[goalY + 1][goalX + 1] = TILE.SOLID;
    if (goalX - 1 >= 0) tiles[goalY + 1][goalX - 1] = TILE.SOLID;
  }

  // 체크포인트 (월드3+)
  if (worldIdx >= 2) {
    const cpX = Math.floor(w / 2);
    for (let r = h - 2; r > 2; r--) {
      if (tiles[r][cpX] === TILE.SOLID && tiles[r-1][cpX] === TILE.EMPTY) {
        checkpoints.push({ x: cpX, y: r - 1, active: false }); break;
      }
    }
  }

  // 스폰 지점 아래 바닥 확보
  const spawnX = 2, spawnY = h - 3;
  if (tiles[spawnY + 1][spawnX] !== TILE.SOLID) tiles[spawnY + 1][spawnX] = TILE.SOLID;

  return {
    width: w, height: h, tiles: tiles,
    spawn: { x: spawnX, y: spawnY },
    goal: { x: goalX, y: goalY },
    gems: gems, checkpoints: checkpoints,
    movingPlatforms: movingPlatforms,
    worldIdx: worldIdx, stageIdx: stageIdx
  };
}

function generateDailyLevel(seed) {
  const rng = new SeededRNG(seed);
  return generateLevel(rng.nextInt(2, 4), 4, rng);
}

// ─── §8. 물리 엔진 (순수 함수 — 전역 참조 없음) ───

function getTile(level, col, row) {
  if (row < 0 || row >= level.height || col < 0 || col >= level.width) return TILE.SOLID;
  return level.tiles[row][col];
}

// 단방향 AABB 충돌 해소 — 수평
function resolveHorizontal(pl, level) {
  const ox = CONFIG.HITBOX.OFFSET_X;
  const hx = pl.x + ox;
  const left = Math.floor(hx / TS);
  const right = Math.floor((hx + pl.width - 1) / TS);
  const top = Math.floor(pl.y / TS);
  const bottom = Math.floor((pl.y + pl.height - 1) / TS);
  pl.onWall = 0;

  for (let row = top; row <= bottom; row++) {
    for (let col = left; col <= right; col++) {
      if (getTile(level, col, row) === TILE.SOLID) {
        if (pl.vx > 0) { pl.x = col * TS - pl.width - ox; pl.vx = 0; pl.onWall = 1; }
        else if (pl.vx < 0) { pl.x = (col + 1) * TS - ox; pl.vx = 0; pl.onWall = -1; }
      }
    }
  }
}

// 단방향 AABB 충돌 해소 — 수직 + 코너 보정
function resolveVertical(pl, level) {
  const ox = CONFIG.HITBOX.OFFSET_X;
  const hx = pl.x + ox;
  const left = Math.floor(hx / TS);
  const right = Math.floor((hx + pl.width - 1) / TS);
  const top = Math.floor(pl.y / TS);
  const bottom = Math.floor((pl.y + pl.height - 1) / TS);

  for (let row = top; row <= bottom; row++) {
    for (let col = left; col <= right; col++) {
      if (getTile(level, col, row) === TILE.SOLID) {
        if (pl.vy > 0) {
          pl.y = row * TS - pl.height;
          pl.vy = 0;
          pl.onGround = true;
          pl.coyoteTimer = CONFIG.PHYSICS.COYOTE_TIME;
          pl.jumpsLeft = pl.canDoubleJump ? 2 : 1;
          pl.dashCooldown = false;
        } else if (pl.vy < 0) {
          // 코너 보정
          const cc = CONFIG.PHYSICS.CORNER_CORRECTION;
          let corrected = false;
          for (let shift = 1; shift <= cc; shift++) {
            const lx1 = Math.floor((hx + shift) / TS);
            const rx1 = Math.floor((hx + pl.width - 1 + shift) / TS);
            if (getTile(level, lx1, row) !== TILE.SOLID && getTile(level, rx1, row) !== TILE.SOLID) {
              pl.x += shift; corrected = true; break;
            }
            const lx2 = Math.floor((hx - shift) / TS);
            const rx2 = Math.floor((hx + pl.width - 1 - shift) / TS);
            if (getTile(level, lx2, row) !== TILE.SOLID && getTile(level, rx2, row) !== TILE.SOLID) {
              pl.x -= shift; corrected = true; break;
            }
          }
          if (!corrected) { pl.y = (row + 1) * TS; pl.vy = 0; }
        }
      }
    }
  }
}

// 함정 충돌 체크 — 순수 함수
function checkHazards(px, py, pw, ph, level) {
  const margin = 3;
  const left = Math.floor(px / TS);
  const right = Math.floor((px + pw - 1) / TS);
  const top = Math.floor(py / TS);
  const bottom = Math.floor((py + ph - 1) / TS);

  for (let row = top; row <= bottom; row++) {
    for (let col = left; col <= right; col++) {
      const tile = getTile(level, col, row);
      if (tile >= TILE.SPIKE_UP && tile <= TILE.SPIKE_RIGHT) {
        const tx = col * TS + margin;
        const ty = row * TS + margin;
        const tw2 = TS - margin * 2;
        const th = TS - margin * 2;
        if (px + pw > tx && px < tx + tw2 && py + ph > ty && py < ty + th) return true;
      }
    }
  }
  return false;
}

// 플레이어 물리 업데이트 — 모든 의존 데이터를 파라미터로 전달
function updatePlayer(pl, inputMgr, level, abilities, soundMgr, particleSpawner) {
  const phys = CONFIG.PHYSICS;

  // ── 대시 처리 ──
  if (pl.dashing) {
    pl.dashTimer--;
    pl.vx = phys.DASH_SPEED * pl.dashDir;
    pl.vy = 0;
    dashTrails.push({ x: pl.x, y: pl.y, alpha: 0.6, facing: pl.facing });
    if (pl.dashTimer <= 0) { pl.dashing = false; pl.vx *= 0.3; }
    pl.x += pl.vx;
    resolveHorizontal(pl, level);
    return null;
  }

  // ── 좌우 이동 ──
  const accel = pl.onGround ? phys.ACCELERATION : phys.AIR_ACCELERATION;
  if (inputMgr.isDown('left')) { pl.vx -= accel; pl.facing = -1; }
  if (inputMgr.isDown('right')) { pl.vx += accel; pl.facing = 1; }
  pl.vx = Math.max(-phys.MOVE_SPEED, Math.min(phys.MOVE_SPEED, pl.vx));

  // ── 중력 ──
  pl.vy += phys.GRAVITY;
  if (pl.vy > phys.MAX_FALL_SPEED) pl.vy = phys.MAX_FALL_SPEED;

  // ── 벽 슬라이드 ──
  if (abilities.wallJump && pl.onWall !== 0 && !pl.onGround && pl.vy > 0) {
    if ((pl.onWall === -1 && inputMgr.isDown('left')) || (pl.onWall === 1 && inputMgr.isDown('right'))) {
      pl.vy = Math.min(pl.vy, phys.WALL_SLIDE_SPEED);
    }
  }

  // ── 코요테 타임 ──
  if (!pl.onGround && pl.coyoteTimer > 0) pl.coyoteTimer--;

  // ── 점프 버퍼 ──
  if (inputMgr.justPressed('jump')) pl.jumpBuffer = phys.JUMP_BUFFER;
  else if (pl.jumpBuffer > 0) pl.jumpBuffer--;

  // ── 점프 실행 ──
  if (pl.jumpBuffer > 0) {
    if (pl.onGround || pl.coyoteTimer > 0) {
      pl.vy = phys.JUMP_FORCE; pl.onGround = false; pl.coyoteTimer = 0;
      pl.jumpBuffer = 0; pl.jumpsLeft--;
      soundMgr.play('jump');
      particleSpawner('jump', pl.x + 6, pl.y + pl.height);
    } else if (abilities.wallJump && pl.onWall !== 0) {
      pl.vx = -pl.onWall * phys.WALL_JUMP_FORCE_X;
      pl.vy = phys.WALL_JUMP_FORCE_Y;
      pl.facing = -pl.onWall; pl.onWall = 0; pl.jumpBuffer = 0;
      soundMgr.play('walljump');
      particleSpawner('jump', pl.x + 6, pl.y + 8);
    } else if (abilities.doubleJump && pl.jumpsLeft > 0) {
      pl.vy = phys.DOUBLE_JUMP_FORCE; pl.jumpsLeft--; pl.jumpBuffer = 0;
      soundMgr.play('djump');
      particleSpawner('jump', pl.x + 6, pl.y + pl.height);
    }
  }

  // ── 가변 점프 높이 ──
  if (!inputMgr.isDown('jump') && pl.vy < 0) pl.vy *= phys.JUMP_CUT_MULTIPLIER;

  // ── 대시 시작 ──
  if (abilities.dash && inputMgr.justPressed('dash') && !pl.dashCooldown) {
    pl.dashing = true; pl.dashTimer = phys.DASH_DURATION;
    pl.dashDir = pl.facing; pl.dashCooldown = true; pl.vy = 0;
    soundMgr.play('dash');
  }

  // ── 마찰 ──
  if (!inputMgr.isDown('left') && !inputMgr.isDown('right')) {
    pl.vx *= pl.onGround ? phys.FRICTION : phys.AIR_FRICTION;
    if (Math.abs(pl.vx) < 0.1) pl.vx = 0;
  }

  // ── 위치 업데이트 ──
  pl.onGround = false;
  pl.x += pl.vx;
  resolveHorizontal(pl, level);
  pl.y += pl.vy;
  resolveVertical(pl, level);

  // 눈 애니메이션
  pl.eyeOffsetX = pl.facing * 1.5;

  // 낙하 사망
  if (pl.y > level.height * TS + 50) return 'dead';
  return null;
}

// ─── §9. 카메라 업데이트 (순수 함수) ───
function updateCamera(cam, targetX, targetY, levelW, levelH, viewW, viewH, playerFacing) {
  const cfg = CONFIG.CAMERA;
  cam.targetX = targetX - viewW / 2 + cfg.LOOK_AHEAD_X * playerFacing;
  cam.targetY = targetY - viewH / 2;
  cam.x += (cam.targetX - cam.x) * cfg.LERP_SPEED;
  cam.y += (cam.targetY - cam.y) * cfg.LERP_SPEED;
  cam.x = Math.max(0, Math.min(cam.x, levelW * TS - viewW));
  cam.y = Math.max(0, Math.min(cam.y, levelH * TS - viewH));
  if (cam.shakeIntensity > 0.5) {
    cam.shakeX = (Math.random() - 0.5) * cam.shakeIntensity;
    cam.shakeY = (Math.random() - 0.5) * cam.shakeIntensity;
    cam.shakeIntensity *= cfg.SHAKE_DECAY;
  } else { cam.shakeX = 0; cam.shakeY = 0; cam.shakeIntensity = 0; }
}

// ─── §10. 파티클 헬퍼 ───
function spawnParticle(pool, type, px, py) {
  if (type === 'death') {
    for (let i = 0; i < 20; i++) {
      const p = pool.get();
      p.x = px; p.y = py;
      p.vx = (Math.random() - 0.5) * 8; p.vy = (Math.random() - 0.5) * 8 - 3;
      p.life = 1; p.maxLife = 0.5 + Math.random() * 0.3;
      p.size = 2 + Math.random() * 4; p.color = '#00ffcc'; p.type = 'sq';
    }
  } else if (type === 'jump') {
    for (let i = 0; i < 6; i++) {
      const p = pool.get();
      p.x = px + (Math.random() - 0.5) * 8; p.y = py;
      p.vx = (Math.random() - 0.5) * 3; p.vy = -Math.random() * 2;
      p.life = 1; p.maxLife = 0.2 + Math.random() * 0.1;
      p.size = 2 + Math.random() * 2; p.color = '#ffffff'; p.type = 'c';
    }
  } else if (type === 'gem') {
    for (let i = 0; i < 12; i++) {
      const p = pool.get();
      p.x = px; p.y = py;
      const angle = (Math.PI * 2 / 12) * i;
      p.vx = Math.cos(angle) * 4; p.vy = Math.sin(angle) * 4;
      p.life = 1; p.maxLife = 0.4; p.size = 3; p.color = '#ffd700'; p.type = 'c';
    }
  }
}

function updateParticles(pool, dt) {
  pool.forEach((p) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= dt / p.maxLife;
    if (p.life <= 0) pool.release(p);
  });
}

// ─── §11. 상태 전환 시스템 ───

function beginTransition(targetState, options) {
  if (isTransitioning) return;
  isTransitioning = true;
  const opts = options || {};
  if (opts.immediate) {
    enterState(targetState);
    isTransitioning = false;
  } else {
    const dur = opts.duration || 300;
    tw.clearImmediate();
    tw.add({
      target: transitionOverlay,
      props: { alpha: { from: 0, to: 1 } },
      duration: dur,
      onComplete: () => {
        enterState(targetState);
        tw.add({
          target: transitionOverlay,
          props: { alpha: { from: 1, to: 0 } },
          duration: dur,
          onComplete: () => { isTransitioning = false; }
        });
      }
    });
  }
}

function enterState(newState) {
  const prev = gameState;
  gameState = newState;

  if (newState === STATE.TITLE) {
    titleAnim.time = 0; menuSelection = 0;
    titleParticles = [];
    for (let i = 0; i < 40; i++) {
      titleParticles.push({
        x: Math.random() * canvasW, y: Math.random() * canvasH,
        vx: (Math.random() - 0.5) * 0.4, vy: -0.2 - Math.random() * 0.6,
        size: 1 + Math.random() * 2.5, alpha: 0.2 + Math.random() * 0.5
      });
    }
  }

  if (newState === STATE.PLAY) {
    if (prev === STATE.TITLE || prev === STATE.WSEL || prev === STATE.CLEAR) {
      loadStage(currentWorld, currentStage);
    }
    if (prev === STATE.DEAD) respawnPlayer();
  }

  if (newState === STATE.DEAD) {
    stageDeaths++;
    const dk = currentWorld + '-' + currentStage;
    if (!saveData.deaths[dk]) saveData.deaths[dk] = 0;
    saveData.deaths[dk]++;
    writeSave(saveData);
    camera.shakeIntensity = 8;
    sound.play('death');
    if (player) spawnParticle(particles, 'death', player.x + 6, player.y + 8);
    deadAnimTimer = 0.4;
  }

  if (newState === STATE.CLEAR) {
    sound.play('clear');
    const gc = stageGems.filter(g => g).length;
    const score = calcStageScore(stageTime, gc, stageDeaths, CONFIG.SCORE);
    const sk = currentWorld + '-' + currentStage;
    const isNewBest = !saveData.bestTimes[sk] || stageTime < saveData.bestTimes[sk];
    clearResult = { score, time: stageTime, gems: gc, deaths: stageDeaths, isNewBest };
    // 저장 (판정 먼저, 저장 나중에)
    if (isNewBest) saveData.bestTimes[sk] = stageTime;
    if (!saveData.gems[sk]) saveData.gems[sk] = [false, false, false];
    for (let i = 0; i < stageGems.length; i++) { if (stageGems[i]) saveData.gems[sk][i] = true; }
    saveData.totalScore += score;
    let tg = 0;
    for (const k in saveData.gems) tg += saveData.gems[k].filter(g => g).length;
    saveData.totalGems = tg;
    if (currentStage === 4 && currentWorld + 2 > saveData.unlockedWorld)
      saveData.unlockedWorld = Math.min(5, currentWorld + 2);
    writeSave(saveData);
  }

  if (newState === STATE.PAUSE) pauseSelection = 0;
}

function loadStage(worldIdx, stageIdx) {
  const seed = worldIdx * 10000 + stageIdx * 1000 + 42;
  const rng = new SeededRNG(seed);
  currentLevel = generateLevel(worldIdx, stageIdx, rng);
  player = createPlayer(currentLevel.spawn.x, currentLevel.spawn.y);
  player.canDoubleJump = CONFIG.ABILITIES[worldIdx].doubleJump;
  camera.x = player.x - canvasW / 2;
  camera.y = player.y - canvasH / 2;
  camera.shakeIntensity = 0;
  stageTime = 0; stageDeaths = 0;
  stageGems = currentLevel.gems.map(() => false);
  checkpointPos = null; tileCacheDirty = true;
  dashTrails = []; particles.releaseAll(); scorePopups = [];
  const dk = worldIdx + '-' + stageIdx;
  showHint = (saveData.deaths[dk] || 0) >= CONFIG.HINT_THRESHOLD_1;
}

function respawnPlayer() {
  if (!currentLevel) return;
  const sp = checkpointPos || currentLevel.spawn;
  player = createPlayer(sp.x, sp.y);
  player.canDoubleJump = CONFIG.ABILITIES[currentWorld].doubleJump;
  dashTrails = [];
}

// ─── §12. 게임 업데이트 ───

// 파티클 스포너 콜백 (순수 함수 원칙 — 전역 pool을 직접 참조하지 않음)
function particleSpawner(type, px, py) {
  spawnParticle(particles, type, px, py);
}

function update(dt) {
  switch (gameState) {
    case STATE.TITLE: updateTitle(dt); tw.update(dt); updateParticles(particles, dt); break;
    case STATE.PLAY: updatePlay(dt); tw.update(dt); updateParticles(particles, dt); break;
    case STATE.DEAD: updateDead(dt); tw.update(dt); updateParticles(particles, dt); break;
    case STATE.CLEAR: updateClear(dt); tw.update(dt); updateParticles(particles, dt); break;
    case STATE.PAUSE: updatePause(dt); break;
    case STATE.WSEL: updateWorldSelect(dt); tw.update(dt); break;
  }

  // 대시 잔상 감쇠
  for (let i = dashTrails.length - 1; i >= 0; i--) {
    dashTrails[i].alpha -= dt * 4;
    if (dashTrails[i].alpha <= 0) dashTrails.splice(i, 1);
  }
  // 점수 팝업 감쇠
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 30 * dt;
    scorePopups[i].life -= dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  input.postUpdate();
}

function updateTitle(dt) {
  titleAnim.time += dt;
  for (let i = 0; i < titleParticles.length; i++) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { p.y = canvasH + 10; p.x = Math.random() * canvasW; }
  }
  if (input.justPressed('jump') || input.justPressed('start')) {
    sound.play('menu');
    if (menuSelection === 0) beginTransition(STATE.WSEL);
    else if (menuSelection === 1) {
      dailyMode = true;
      const d = new Date(); dailyMode = true;
      const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
      currentLevel = generateDailyLevel(seed);
      currentWorld = currentLevel.worldIdx; currentStage = currentLevel.stageIdx;
      beginTransition(STATE.PLAY);
    }
  }
  if (input.justPressed('down')) { menuSelection = (menuSelection + 1) % 2; sound.play('menu'); }
  if (input.justPressed('up')) { menuSelection = (menuSelection - 1 + 2) % 2; sound.play('menu'); }
}

function updateWorldSelect(dt) {
  if (input.justPressed('right')) { worldSelectIdx = Math.min(saveData.unlockedWorld - 1, worldSelectIdx + 1); sound.play('menu'); }
  if (input.justPressed('left')) { worldSelectIdx = Math.max(0, worldSelectIdx - 1); sound.play('menu'); }
  if (input.justPressed('jump') || input.justPressed('start')) {
    currentWorld = worldSelectIdx; currentStage = 0; dailyMode = false;
    sound.play('menu'); beginTransition(STATE.PLAY);
  }
  if (input.justPressed('pause')) beginTransition(STATE.TITLE);
}

function updatePlay(dt) {
  if (!player || !currentLevel) return;
  if (input.justPressed('pause')) { beginTransition(STATE.PAUSE, { immediate: true }); return; }
  if (input.justPressed('restart')) { beginTransition(STATE.DEAD, { immediate: true }); return; }
  stageTime += dt;

  const abilities = CONFIG.ABILITIES[currentWorld];
  const result = updatePlayer(player, input, currentLevel, abilities, sound, particleSpawner);
  if (result === 'dead') { beginTransition(STATE.DEAD, { immediate: true }); return; }

  // 함정 충돌
  if (!player.dashing) {
    const hx = player.x + CONFIG.HITBOX.OFFSET_X;
    if (checkHazards(hx, player.y, player.width, player.height, currentLevel)) {
      beginTransition(STATE.DEAD, { immediate: true }); return;
    }
  }

  // 이동 발판
  for (let i = 0; i < currentLevel.movingPlatforms.length; i++) {
    const mp = currentLevel.movingPlatforms[i];
    if (mp.vertical) {
      mp.y += mp.speed * mp.dir;
      if (mp.y <= Math.min(mp.startY, mp.endY) || mp.y >= Math.max(mp.startY, mp.endY)) mp.dir *= -1;
    } else {
      mp.x += mp.speed * mp.dir;
      if (mp.x <= Math.min(mp.startX, mp.endX) || mp.x >= Math.max(mp.startX, mp.endX)) mp.dir *= -1;
    }
    const ox = CONFIG.HITBOX.OFFSET_X;
    if (player.y + player.height >= mp.y - 2 && player.y + player.height <= mp.y + 8 &&
        player.x + ox + player.width > mp.x && player.x + ox < mp.x + mp.width && player.vy >= 0) {
      player.y = mp.y - player.height; player.vy = 0; player.onGround = true;
      player.coyoteTimer = CONFIG.PHYSICS.COYOTE_TIME;
      player.jumpsLeft = player.canDoubleJump ? 2 : 1;
      player.dashCooldown = false;
      if (!mp.vertical) player.x += mp.speed * mp.dir;
    }
  }

  // 보석 수집
  for (let i = 0; i < currentLevel.gems.length; i++) {
    const gem = currentLevel.gems[i];
    if (gem.collected) continue;
    const gx = gem.x * TS + TS / 2, gy = gem.y * TS + TS / 2;
    const px = player.x + 6, py = player.y + 8;
    if (Math.abs(px - gx) < 14 && Math.abs(py - gy) < 14) {
      gem.collected = true; stageGems[i] = true;
      sound.play('gem'); spawnParticle(particles, 'gem', gx, gy);
      gemFlashAlpha = 0.3;
      scorePopups.push({ x: gx, y: gy, text: '+' + CONFIG.SCORE.GEM_BONUS, life: 1, color: '#ffd700' });
    }
  }

  // 체크포인트
  for (let i = 0; i < currentLevel.checkpoints.length; i++) {
    const cp = currentLevel.checkpoints[i];
    if (Math.abs(player.x - cp.x * TS) < TS && Math.abs(player.y - cp.y * TS) < TS * 2) {
      if (!checkpointPos || checkpointPos.x !== cp.x || checkpointPos.y !== cp.y) {
        checkpointPos = { x: cp.x, y: cp.y }; sound.play('checkpoint');
      }
    }
  }

  // 골
  const goal = currentLevel.goal;
  if (Math.abs(player.x - goal.x * TS) < TS * 1.5 && Math.abs(player.y - goal.y * TS) < TS * 2) {
    beginTransition(STATE.CLEAR, { immediate: true }); return;
  }

  // 카메라
  updateCamera(camera, player.x, player.y, currentLevel.width, currentLevel.height, canvasW, canvasH, player.facing);
  if (gemFlashAlpha > 0) gemFlashAlpha -= dt * 2;
}

function updateDead(dt) {
  deadAnimTimer -= dt;
  if (deadAnimTimer <= 0 && !isTransitioning) {
    beginTransition(STATE.PLAY, { immediate: true });
  }
}

function updateClear(dt) {
  if (input.justPressed('jump') || input.justPressed('start')) {
    currentStage++;
    if (currentStage >= 5) {
      currentStage = 0; currentWorld++;
      if (currentWorld >= 5) { beginTransition(STATE.TITLE); return; }
    }
    beginTransition(STATE.PLAY);
  }
}

function updatePause(dt) {
  if (input.justPressed('pause')) { beginTransition(STATE.PLAY, { immediate: true }); return; }
  if (input.justPressed('down')) { pauseSelection = (pauseSelection + 1) % 3; sound.play('menu'); }
  if (input.justPressed('up')) { pauseSelection = (pauseSelection - 1 + 3) % 3; sound.play('menu'); }
  if (input.justPressed('jump') || input.justPressed('start')) {
    sound.play('menu');
    if (pauseSelection === 0) beginTransition(STATE.PLAY, { immediate: true });
    else if (pauseSelection === 1) { loadStage(currentWorld, currentStage); beginTransition(STATE.PLAY, { immediate: true }); }
    else beginTransition(STATE.TITLE);
  }
}

// ─── §13. 렌더링 시스템 ───

function drawBackground(c, worldIdx, cx, cy) {
  const theme = CONFIG.WORLDS[worldIdx] || CONFIG.WORLDS[0];
  const grad = c.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, theme.bg1); grad.addColorStop(1, theme.bg2);
  c.fillStyle = grad; c.fillRect(0, 0, canvasW, canvasH);

  // 패럴랙스 레이어 1 — 별 (Canvas 드로잉)
  c.fillStyle = '#ffffff';
  for (let i = 0; i < 50; i++) {
    const sx = ((worldIdx * 100 + i * 73) * 13 + cx * 0.05) % canvasW;
    const sy = ((worldIdx * 100 + i * 137) * 7) % canvasH;
    c.globalAlpha = 0.15 + (i % 5) * 0.08;
    c.fillRect(sx, sy, 1 + (i % 3), 1 + (i % 3));
  }
  c.globalAlpha = 1;

  // 패럴랙스 레이어 2 — 산맥 실루엣 (Canvas 드로잉)
  c.fillStyle = theme.bg1; c.globalAlpha = 0.4;
  c.beginPath(); c.moveTo(0, canvasH);
  for (let x = 0; x <= canvasW; x += 30) {
    c.lineTo(x, canvasH * 0.45 + Math.sin((x + cx * 0.2) * 0.012) * 50 + Math.sin((x + cx * 0.15) * 0.03) * 25);
  }
  c.lineTo(canvasW, canvasH); c.fill(); c.globalAlpha = 1;
}

function drawTiles(c, level, cx, cy) {
  const theme = CONFIG.WORLDS[level.worldIdx] || CONFIG.WORLDS[0];
  const sc = Math.max(0, Math.floor(cx / TS) - 1);
  const ec = Math.min(level.width - 1, Math.ceil((cx + canvasW) / TS) + 1);
  const sr = Math.max(0, Math.floor(cy / TS) - 1);
  const er = Math.min(level.height - 1, Math.ceil((cy + canvasH) / TS) + 1);

  for (let row = sr; row <= er; row++) {
    for (let col = sc; col <= ec; col++) {
      const tile = level.tiles[row][col];
      const dx = col * TS - cx;
      const dy = row * TS - cy;

      if (tile === TILE.SOLID) {
        c.fillStyle = theme.tile;
        c.fillRect(dx, dy, TS, TS);
        // 윗면 하이라이트
        if (row > 0 && level.tiles[row-1][col] !== TILE.SOLID) {
          c.fillStyle = theme.accent; c.globalAlpha = 0.3;
          c.fillRect(dx, dy, TS, 2); c.globalAlpha = 1;
        }
        // 옆면 테두리
        c.strokeStyle = 'rgba(0,0,0,0.2)'; c.lineWidth = 0.5;
        c.strokeRect(dx, dy, TS, TS);
      } else if (tile >= TILE.SPIKE_UP && tile <= TILE.SPIKE_RIGHT) {
        // 가시 삼각형 — 4방향 완전 대응
        c.fillStyle = theme.spike;
        c.beginPath();
        if (tile === TILE.SPIKE_UP) {
          c.moveTo(dx + 1, dy + TS); c.lineTo(dx + TS / 2, dy + 3); c.lineTo(dx + TS - 1, dy + TS);
        } else if (tile === TILE.SPIKE_DOWN) {
          c.moveTo(dx + 1, dy); c.lineTo(dx + TS / 2, dy + TS - 3); c.lineTo(dx + TS - 1, dy);
        } else if (tile === TILE.SPIKE_LEFT) {
          c.moveTo(dx + TS, dy + 1); c.lineTo(dx + 3, dy + TS / 2); c.lineTo(dx + TS, dy + TS - 1);
        } else if (tile === TILE.SPIKE_RIGHT) {
          c.moveTo(dx, dy + 1); c.lineTo(dx + TS - 3, dy + TS / 2); c.lineTo(dx, dy + TS - 1);
        }
        c.fill();
      }
    }
  }
}

function drawMovingPlatforms(c, platforms, cx, cy) {
  for (let i = 0; i < platforms.length; i++) {
    const mp = platforms[i];
    const dx = mp.x - cx, dy = mp.y - cy;
    // 본체
    c.fillStyle = '#5a7a9a';
    c.beginPath();
    const r = 3;
    c.moveTo(dx+r,dy); c.lineTo(dx+mp.width-r,dy);
    c.quadraticCurveTo(dx+mp.width,dy,dx+mp.width,dy+r);
    c.lineTo(dx+mp.width,dy+mp.height-r);
    c.quadraticCurveTo(dx+mp.width,dy+mp.height,dx+mp.width-r,dy+mp.height);
    c.lineTo(dx+r,dy+mp.height);
    c.quadraticCurveTo(dx,dy+mp.height,dx,dy+mp.height-r);
    c.lineTo(dx,dy+r); c.quadraticCurveTo(dx,dy,dx+r,dy);
    c.fill();
    // 상단 하이라이트
    c.strokeStyle = '#8ab4d0'; c.lineWidth = 1;
    c.beginPath(); c.moveTo(dx+3,dy+1); c.lineTo(dx+mp.width-3,dy+1); c.stroke();
  }
}

function drawGems(c, gems, cx, cy, time) {
  for (let i = 0; i < gems.length; i++) {
    const gem = gems[i];
    if (gem.collected) continue;
    const dx = gem.x * TS - cx + TS / 2;
    const dy = gem.y * TS - cy + TS / 2 + Math.sin(time * 3 + i) * 3;

    // 보석 다이아몬드 (Canvas 드로잉)
    c.save(); c.translate(dx, dy); c.rotate(time * 2 + i);
    c.fillStyle = '#ffd700'; c.beginPath();
    c.moveTo(0, -7); c.lineTo(7, 0); c.lineTo(0, 7); c.lineTo(-7, 0); c.fill();
    c.restore();
  }
}

function drawCheckpoints(c, cps, active, cx, cy, time) {
  for (let i = 0; i < cps.length; i++) {
    const cp = cps[i];
    const dx = cp.x * TS - cx, dy = cp.y * TS - cy;
    const isActive = active && active.x === cp.x && active.y === cp.y;
    // 막대
    c.fillStyle = isActive ? '#00ff66' : '#666';
    c.fillRect(dx + 6, dy - 8, 3, 24);
    // 깃발
    c.fillStyle = isActive ? '#00ff66' : '#cc4444';
    c.beginPath(); c.moveTo(dx+9,dy-8); c.lineTo(dx+20,dy-3); c.lineTo(dx+9,dy+2); c.fill();
    if (isActive) { c.shadowColor='#00ff66'; c.shadowBlur=6; c.fill(); c.shadowBlur=0; }
  }
}

function drawGoal(c, goal, cx, cy, time) {
  const dx = goal.x * TS - cx, dy = goal.y * TS - cy;
  c.fillStyle = '#fff'; c.fillRect(dx+6, dy-16, 3, 32);
  const wave = Math.sin(time * 4) * 2;
  c.fillStyle = '#00ff66'; c.beginPath();
  c.moveTo(dx+9,dy-16); c.lineTo(dx+24+wave,dy-10); c.lineTo(dx+9,dy-4); c.fill();
  c.globalAlpha = 0.15 + Math.sin(time * 3) * 0.1;
  c.fillStyle = '#00ff66'; c.beginPath(); c.arc(dx+14,dy-10,14,0,Math.PI*2); c.fill();
  c.globalAlpha = 1;
}

function drawPlayer(c, pl, cx, cy) {
  if (!pl) return;
  const dx = pl.x - cx, dy = pl.y - cy;

  // 대시 잔상 (Canvas 드로잉)
  for (let i = 0; i < dashTrails.length; i++) {
    const t = dashTrails[i];
    c.globalAlpha = t.alpha * 0.5;
    c.fillStyle = '#00ffcc'; c.fillRect(t.x-cx, t.y-cy, 12, 16);
  }
  c.globalAlpha = 1;

  // 플레이어 — 민트 사각형 + 눈 (Canvas 드로잉)
  c.fillStyle = '#00ffcc';
  c.fillRect(dx, dy, 12, 16);
  // 눈
  c.fillStyle = '#0a0a0f';
  c.fillRect(dx + 3 + pl.eyeOffsetX, dy + 5, 2, 3);
  c.fillRect(dx + 7 + pl.eyeOffsetX, dy + 5, 2, 3);

  // 벽 슬라이드 먼지
  if (pl.onWall !== 0 && !pl.onGround && pl.vy > 0) {
    c.fillStyle = '#fff'; c.globalAlpha = 0.3;
    for (let i = 0; i < 3; i++) {
      c.fillRect(dx + (pl.onWall === 1 ? 13 : -3), dy + i * 5 + Math.random() * 2, 2, 2);
    }
    c.globalAlpha = 1;
  }
}

function drawParticles(c, pool, cx, cy) {
  pool.forEach((p) => {
    c.globalAlpha = Math.max(0, p.life);
    c.fillStyle = p.color;
    if (p.type === 'c') { c.beginPath(); c.arc(p.x-cx, p.y-cy, p.size, 0, Math.PI*2); c.fill(); }
    else { c.fillRect(p.x-cx-p.size/2, p.y-cy-p.size/2, p.size, p.size); }
  });
  c.globalAlpha = 1;
}

function drawHUD(c, worldIdx, stageIdx, time, gemsState, gems) {
  const theme = CONFIG.WORLDS[worldIdx] || CONFIG.WORLDS[0];
  c.fillStyle = 'rgba(10,10,15,0.65)'; c.fillRect(0, 0, canvasW, 28);
  c.font = '12px "Segoe UI",system-ui,sans-serif';
  c.textBaseline = 'middle';

  // 월드-스테이지
  c.fillStyle = theme.accent; c.textAlign = 'left';
  c.fillText('W' + (worldIdx+1) + '-S' + (stageIdx+1) + '  ' + CONFIG.WORLDS[worldIdx].name, 8, 14);

  // 보석
  const gx = 210;
  for (let i = 0; i < Math.min(gems.length, 3); i++) {
    // HUD 보석 다이아몬드 (Canvas 드로잉)
    c.fillStyle = gemsState[i] ? '#ffd700' : '#404060';
    c.beginPath();
    const cx2 = gx + i * 22 + 9;
    c.moveTo(cx2, 6); c.lineTo(cx2+6,13); c.lineTo(cx2,20); c.lineTo(cx2-6,13); c.fill();
  }

  // 타이머
  c.fillStyle = '#e0e0f0'; c.textAlign = 'right';
  const min = Math.floor(time / 60);
  const sec = (time % 60).toFixed(1);
  c.fillText((min > 0 ? min + ':' : '') + (sec < 10 && min > 0 ? '0' : '') + sec, canvasW - 50, 14);

  // 사망 수
  if (stageDeaths > 0) {
    c.fillStyle = '#ff3366'; c.textAlign = 'right';
    c.fillText('💀' + stageDeaths, canvasW - 120, 14);
  }

  // 일시정지 아이콘
  c.fillStyle = '#8080a0'; c.fillRect(canvasW-24,8,4,12); c.fillRect(canvasW-16,8,4,12);

  // 점수 팝업
  for (let i = 0; i < scorePopups.length; i++) {
    const pop = scorePopups[i];
    c.globalAlpha = Math.max(0, pop.life);
    c.fillStyle = pop.color; c.font = 'bold 14px "Segoe UI",system-ui,sans-serif';
    c.textAlign = 'center'; c.fillText(pop.text, pop.x - camera.x, pop.y - camera.y);
  }
  c.globalAlpha = 1;

  // 힌트
  if (showHint && stageTime > 2) {
    c.fillStyle = '#8080a0'; c.font = '10px "Segoe UI",system-ui,sans-serif';
    c.textAlign = 'center'; c.fillText('R키: 즉시 리스폰', canvasW / 2, canvasH - 14);
  }
}

// ─── §14. 화면별 렌더링 ───

function drawTitle(c, time) {
  const grad = c.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, '#050218'); grad.addColorStop(0.5, '#0a0520'); grad.addColorStop(1, '#1a0a2e');
  c.fillStyle = grad; c.fillRect(0, 0, canvasW, canvasH);

  // 파티클
  for (let i = 0; i < titleParticles.length; i++) {
    const p = titleParticles[i];
    c.globalAlpha = p.alpha; c.fillStyle = '#e0b0ff';
    c.fillRect(p.x, p.y, p.size, p.size);
  }
  c.globalAlpha = 1;

  // 스캔라인 (아케이드 느낌)
  c.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < canvasH; y += 3) c.fillRect(0, y, canvasW, 1);

  // 타이틀 텍스트 — 글리치 네온
  const ty = canvasH * 0.28;
  c.textAlign = 'center'; c.textBaseline = 'middle';

  // 글리치 오프셋 (가끔 발생)
  const gx = Math.random() < 0.04 ? (Math.random() - 0.5) * 8 : 0;
  const gy = Math.random() < 0.03 ? (Math.random() - 0.5) * 4 : 0;

  // 크로매틱 어버레이션
  if (Math.random() < 0.06) {
    c.font = 'bold 44px "Segoe UI",system-ui,sans-serif';
    c.globalAlpha = 0.3;
    c.fillStyle = '#ff0066'; c.fillText('MINI', canvasW/2 - 2, ty - 22);
    c.fillStyle = '#00ccff'; c.fillText('MINI', canvasW/2 + 2, ty - 18);
    c.globalAlpha = 1;
  }

  c.font = 'bold 44px "Segoe UI",system-ui,sans-serif';
  c.shadowColor = '#00ffcc'; c.shadowBlur = 25;
  c.fillStyle = '#00ffcc'; c.fillText('MINI', canvasW/2 + gx, ty - 20 + gy);
  c.shadowBlur = 0;

  c.font = 'bold 38px "Segoe UI",system-ui,sans-serif';
  c.shadowColor = '#e0b0ff'; c.shadowBlur = 20;
  c.fillStyle = '#e0b0ff'; c.fillText('PLATFORMER', canvasW/2 - gx, ty + 28 - gy);
  c.shadowBlur = 0;

  // 부제
  c.font = '13px "Segoe UI",system-ui,sans-serif';
  c.fillStyle = '#706090';
  c.fillText('벽점프 · 이중점프 · 대시로 고대 탑을 돌파하라', canvasW/2, ty + 68);

  // 메뉴
  const my = canvasH * 0.62;
  const items = ['▶  모험 시작', '◆  일일 챌린지'];
  for (let i = 0; i < items.length; i++) {
    const sel = i === menuSelection;
    c.font = (sel ? 'bold ' : '') + '18px "Segoe UI",system-ui,sans-serif';
    c.fillStyle = sel ? '#00ffcc' : '#706090';
    if (sel) { c.shadowColor = '#00ffcc'; c.shadowBlur = 12; }
    c.fillText(items[i], canvasW/2, my + i * 38);
    c.shadowBlur = 0;
  }

  // 안내
  c.font = '11px "Segoe UI",system-ui,sans-serif';
  c.fillStyle = '#505070';
  c.globalAlpha = 0.5 + Math.sin(time * 3) * 0.3;
  c.fillText('SPACE / TAP 선택  ·  ↑↓ 이동', canvasW/2, canvasH - 28);
  c.globalAlpha = 1;

  // 최고 기록 표시
  if (saveData && saveData.totalScore > 0) {
    c.font = '11px "Segoe UI",system-ui,sans-serif';
    c.fillStyle = '#ffd700'; c.textAlign = 'right';
    c.fillText('총점: ' + saveData.totalScore + '  보석: ' + saveData.totalGems, canvasW - 12, canvasH - 10);
    c.textAlign = 'center';
  }
}

function drawWorldSelect(c, time) {
  const grad = c.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, '#0a0a15'); grad.addColorStop(1, '#0f0f2a');
  c.fillStyle = grad; c.fillRect(0, 0, canvasW, canvasH);

  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold 22px "Segoe UI",system-ui,sans-serif';
  c.fillStyle = '#e0e0f0'; c.fillText('월드 선택', canvasW/2, 38);

  const cw = 120, ch = 150, sp = 18;
  const tw2 = 5 * cw + 4 * sp;
  const sx = (canvasW - tw2) / 2;

  for (let i = 0; i < 5; i++) {
    const theme = CONFIG.WORLDS[i];
    const unlocked = i < saveData.unlockedWorld;
    const sel = i === worldSelectIdx;
    const cx2 = sx + i * (cw + sp) + cw / 2;
    const cy = canvasH / 2;

    // 카드
    const cardAlpha = sel ? 1 : (unlocked ? 0.65 : 0.35);
    c.globalAlpha = cardAlpha;
    c.fillStyle = unlocked ? theme.bg2 : '#1a1a1a';
    c.fillRect(cx2-cw/2, cy-ch/2, cw, ch);

    // 선택 테두리
    if (sel && unlocked) {
      c.strokeStyle = theme.accent; c.lineWidth = 2;
      c.shadowColor = theme.accent; c.shadowBlur = 8;
      c.strokeRect(cx2-cw/2, cy-ch/2, cw, ch);
      c.shadowBlur = 0;
    }
    c.globalAlpha = 1;

    // 월드 번호
    c.font = 'bold 30px "Segoe UI",system-ui,sans-serif';
    c.fillStyle = unlocked ? theme.accent : '#404040';
    c.fillText(unlocked ? String(i + 1) : '🔒', cx2, cy - 20);

    // 이름
    c.font = '12px "Segoe UI",system-ui,sans-serif';
    c.fillStyle = unlocked ? '#e0e0f0' : '#505050';
    c.fillText(unlocked ? theme.name : '???', cx2, cy + 15);

    // 능력 표시
    if (unlocked) {
      const ab = CONFIG.ABILITIES[i];
      c.font = '9px "Segoe UI",system-ui,sans-serif';
      c.fillStyle = '#8080a0';
      const abilities = [];
      if (ab.wallJump) abilities.push('벽점프');
      if (ab.doubleJump) abilities.push('이중점프');
      if (ab.dash) abilities.push('대시');
      c.fillText(abilities.length > 0 ? '+' + abilities.join(',') : '기본', cx2, cy + 35);

      // 보석
      let collected = 0;
      for (let s = 0; s < 5; s++) {
        const k = i + '-' + s;
        if (saveData.gems[k]) collected += saveData.gems[k].filter(g => g).length;
      }
      c.fillStyle = '#ffd700'; c.font = '10px "Segoe UI",system-ui,sans-serif';
      c.fillText('◆ ' + collected + '/15', cx2, cy + 52);
    }
  }

  c.font = '11px "Segoe UI",system-ui,sans-serif'; c.fillStyle = '#505070'; c.textAlign = 'center';
  const wselHint = 'ontouchstart' in window ? '◀ ▶ 스와이프  ·  탭하여 시작' : '← → 선택  ·  SPACE 시작  ·  ESC 뒤로';
  c.fillText(wselHint, canvasW/2, canvasH - 22);
}

function drawClear(c, time) {
  c.fillStyle = 'rgba(10,10,15,0.75)'; c.fillRect(0, 0, canvasW, canvasH);
  if (!clearResult) return;
  const cx2 = canvasW / 2, cy = canvasH / 2;
  c.textAlign = 'center'; c.textBaseline = 'middle';

  c.font = 'bold 30px "Segoe UI",system-ui,sans-serif';
  c.shadowColor = '#00ff66'; c.shadowBlur = 18;
  c.fillStyle = '#00ff66'; c.fillText('STAGE CLEAR!', cx2, cy - 75);
  c.shadowBlur = 0;

  c.font = '15px "Segoe UI",system-ui,sans-serif';
  c.fillStyle = '#e0e0f0'; c.textAlign = 'left';
  const lx = cx2 - 90;
  c.fillText('⏱ 시간: ' + clearResult.time.toFixed(1) + '초', lx, cy - 30);
  c.fillText('◆ 보석: ' + clearResult.gems + '/3', lx, cy);
  c.fillText('💀 사망: ' + clearResult.deaths + '회', lx, cy + 30);

  c.textAlign = 'right'; c.fillStyle = '#ffd700'; c.font = 'bold 22px "Segoe UI",system-ui,sans-serif';
  c.fillText(clearResult.score + ' pts', cx2 + 110, cy - 30);

  if (clearResult.isNewBest) {
    c.fillStyle = '#ff6b35'; c.font = 'bold 14px "Segoe UI",system-ui,sans-serif';
    c.globalAlpha = 0.5 + Math.sin(time * 5) * 0.4; c.textAlign = 'center';
    c.fillText('★ NEW BEST TIME! ★', cx2, cy + 70); c.globalAlpha = 1;
  }

  c.font = '12px "Segoe UI",system-ui,sans-serif'; c.fillStyle = '#8080a0'; c.textAlign = 'center';
  c.globalAlpha = 0.5 + Math.sin(time * 3) * 0.3;
  c.fillText('SPACE / TAP → 다음 스테이지', cx2, cy + 100); c.globalAlpha = 1;
}

function drawPause(c) {
  c.fillStyle = 'rgba(10,10,15,0.82)'; c.fillRect(0, 0, canvasW, canvasH);
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold 28px "Segoe UI",system-ui,sans-serif';
  c.fillStyle = '#e0e0f0'; c.fillText('PAUSED', canvasW/2, canvasH/2 - 65);
  const items = ['▶ 계속하기', '↺ 재시작', '⌂ 타이틀로'];
  for (let i = 0; i < items.length; i++) {
    const sel = i === pauseSelection;
    c.font = (sel ? 'bold ' : '') + '16px "Segoe UI",system-ui,sans-serif';
    c.fillStyle = sel ? '#00ffcc' : '#706090';
    if (sel) { c.shadowColor='#00ffcc'; c.shadowBlur=10; }
    c.fillText(items[i], canvasW/2, canvasH/2 - 15 + i * 35);
    c.shadowBlur = 0;
  }
}

// 메인 렌더링
function render(context, dt, timestamp) {
  context.clearRect(0, 0, canvasW, canvasH);
  const time = timestamp / 1000;

  switch (gameState) {
    case STATE.TITLE: drawTitle(context, time); break;
    case STATE.WSEL: drawWorldSelect(context, time); break;
    case STATE.PLAY: case STATE.DEAD: case STATE.CLEAR: case STATE.PAUSE:
      // 게임 화면 렌더링
      context.save();
      context.translate(Math.round(camera.shakeX), Math.round(camera.shakeY));
      drawBackground(context, currentWorld, camera.x, camera.y);
      if (currentLevel) {
        drawTiles(context, currentLevel, camera.x, camera.y);
        drawMovingPlatforms(context, currentLevel.movingPlatforms, camera.x, camera.y);
        drawGems(context, currentLevel.gems, camera.x, camera.y, time);
        drawCheckpoints(context, currentLevel.checkpoints, checkpointPos, camera.x, camera.y, time);
        drawGoal(context, currentLevel.goal, camera.x, camera.y, time);
      }
      if (gameState !== STATE.DEAD) drawPlayer(context, player, camera.x, camera.y);
      drawParticles(context, particles, camera.x, camera.y);
      context.restore();

      // 보석 플래시
      if (gemFlashAlpha > 0) {
        context.fillStyle = 'rgba(255,215,0,' + gemFlashAlpha.toFixed(2) + ')';
        context.fillRect(0, 0, canvasW, canvasH);
      }

      // HUD
      if (currentLevel) drawHUD(context, currentWorld, currentStage, stageTime, stageGems, currentLevel.gems);

      // 사망 이펙트 (Canvas 드로잉 — 방사형 충격파)
      if (gameState === STATE.DEAD && player) {
        const efa = Math.max(0, deadAnimTimer / 0.4);
        const efx = player.x - camera.x, efy = player.y - camera.y;
        context.globalAlpha = efa * 0.6;
        context.strokeStyle = '#ff3366'; context.lineWidth = 2;
        const efr = (1 - efa) * 32;
        context.beginPath(); context.arc(efx, efy, efr, 0, Math.PI * 2); context.stroke();
        context.globalAlpha = efa * 0.3;
        context.beginPath(); context.arc(efx, efy, efr * 1.5, 0, Math.PI * 2); context.stroke();
        context.globalAlpha = 1;
        // 화면 레드 플래시
        context.fillStyle = 'rgba(255,51,102,' + (efa * 0.15).toFixed(2) + ')';
        context.fillRect(0, 0, canvasW, canvasH);
      }

      if (gameState === STATE.CLEAR) drawClear(context, time);
      if (gameState === STATE.PAUSE) drawPause(context);
      break;
  }

  // 전환 오버레이
  if (transitionOverlay.alpha > 0.01) {
    context.fillStyle = 'rgba(10,10,15,' + transitionOverlay.alpha.toFixed(2) + ')';
    context.fillRect(0, 0, canvasW, canvasH);
  }

  // 터치 컨트롤
  if ('ontouchstart' in window) {
    if (gameState === STATE.PLAY || gameState === STATE.DEAD) drawTouchControls(context);
    if (gameState === STATE.WSEL) drawTouchNavArrows(context);
  }
}

// ─── §15. 터치 컨트롤 렌더링 ───
function drawTouchControls(c) {
  c.globalAlpha = 0.2;
  const btnR = 24; // ≥44px 터치 영역 확보 (지름 48px)
  const pad = 20;
  const by = canvasH - pad - btnR * 2;

  // 좌측 D패드
  c.strokeStyle = '#fff'; c.lineWidth = 1.5;
  c.font = '16px "Segoe UI",system-ui';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  // ◀
  c.beginPath(); c.arc(pad + btnR, by + btnR, btnR, 0, Math.PI*2); c.stroke();
  c.fillStyle='#fff'; c.fillText('◀', pad + btnR, by + btnR);
  // ▶
  c.beginPath(); c.arc(pad + btnR*3 + 12, by + btnR, btnR, 0, Math.PI*2); c.stroke();
  c.fillText('▶', pad + btnR*3 + 12, by + btnR);

  // 우측 버튼
  const rx = canvasW - pad - btnR;
  // A (점프)
  c.strokeStyle = '#00ffcc'; c.beginPath();
  c.arc(rx, by + btnR - 10, btnR + 4, 0, Math.PI*2); c.stroke();
  c.fillStyle='#00ffcc'; c.fillText('A', rx, by + btnR - 10);
  // B (대시)
  c.strokeStyle = '#e0b0ff'; c.beginPath();
  c.arc(rx - btnR*2 - 14, by + btnR, btnR, 0, Math.PI*2); c.stroke();
  c.fillStyle='#e0b0ff'; c.fillText('B', rx - btnR*2 - 14, by + btnR);
  // R (리스타트) — T2 수정
  c.strokeStyle = '#ff6b35'; c.beginPath();
  c.arc(rx - btnR*4 - 28, by + btnR, btnR - 2, 0, Math.PI*2); c.stroke();
  c.fillStyle='#ff6b35'; c.font='12px "Segoe UI",system-ui'; c.fillText('R', rx - btnR*4 - 28, by + btnR);

  // 일시정지 버튼 확대 — T3 수정 (48×48px)
  c.strokeStyle = '#8080a0'; c.lineWidth = 1;
  c.strokeRect(canvasW - 48, 0, 48, 48);
  c.fillStyle = '#8080a0'; c.font = '18px "Segoe UI",system-ui';
  c.fillText('⏸', canvasW - 24, 24);

  c.globalAlpha = 1;
}

// 월드 선택 화면 터치 탐색 화살표 — T1 수정
function drawTouchNavArrows(c) {
  c.globalAlpha = 0.3;
  c.fillStyle = '#e0e0f0'; c.font = 'bold 32px "Segoe UI",system-ui';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  // 좌 화살표
  if (worldSelectIdx > 0) c.fillText('◀', canvasW * 0.07, canvasH / 2);
  // 우 화살표
  if (worldSelectIdx < saveData.unlockedWorld - 1) c.fillText('▶', canvasW * 0.93, canvasH / 2);
  c.globalAlpha = 1;
}

// ─── §16. Canvas 리사이즈 ───
function resizeCanvas() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasW = CONFIG.CANVAS.BASE_WIDTH;
  canvasH = CONFIG.CANVAS.BASE_HEIGHT;
  const aspect = canvasW / canvasH;
  let dispW = w, dispH = w / aspect;
  if (dispH > h) { dispH = h; dispW = h * aspect; }
  canvas.width = Math.round(canvasW * dpr);
  canvas.height = Math.round(canvasH * dpr);
  canvas.style.width = dispW + 'px';
  canvas.style.height = dispH + 'px';
  canvas.style.position = 'absolute';
  canvas.style.left = ((w - dispW) / 2) + 'px';
  canvas.style.top = ((h - dispH) / 2) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scaleX = canvasW / dispW;
  scaleY = canvasH / dispH;
  tileCacheDirty = true;
}

// ─── §17. 키보드 이벤트 ───
const KEY_MAP = {
  'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down',
  'KeyA':'left','KeyD':'right','KeyW':'up','KeyS':'down',
  'Space':'jump','ShiftLeft':'dash','ShiftRight':'dash','KeyX':'dash',
  'Escape':'pause','KeyP':'pause','KeyR':'restart'
};

window.addEventListener('keydown', (e) => {
  const a = KEY_MAP[e.code];
  if (a) { e.preventDefault(); input.keyDown(a); sound._init(); }
});
window.addEventListener('keyup', (e) => {
  const a = KEY_MAP[e.code];
  if (a) { e.preventDefault(); input.keyUp(a); }
});

// ─── §18. 터치 이벤트 ───
function touchToCanvas(touch) {
  const rect = canvas.getBoundingClientRect();
  return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
}

function handleTouch(e) {
  e.preventDefault(); sound._init();
  input.resetTouch();
  for (let i = 0; i < e.touches.length; i++) {
    const pos = touchToCanvas(e.touches[i]);

    // ── 게임플레이 중: D패드 + 점프/대시 ──
    if (gameState === STATE.PLAY || gameState === STATE.DEAD) {
      // 좌측 — D패드
      if (pos.x < canvasW * 0.35 && pos.y > canvasH * 0.5) {
        if (pos.x < canvasW * 0.15) input.touchDown('left');
        else input.touchDown('right');
      }
      // 우측 — 점프/대시
      if (pos.x > canvasW * 0.65 && pos.y > canvasH * 0.5) {
        const rx = canvasW - pos.x;
        if (rx < 70) input.touchDown('jump');
        else if (rx < 140) input.touchDown('dash');
      }
      // 우측 하단 — 리스타트 버튼 (T2 수정)
      if (pos.x > canvasW * 0.65 && pos.y > canvasH * 0.5) {
        const rx = canvasW - pos.x;
        if (rx >= 140 && rx < 210) input.touchDown('restart');
      }
    }

    // ── 월드 선택 중: 좌/우 탐색 + 확인 (T1 수정) ──
    if (gameState === STATE.WSEL) {
      const midY = canvasH / 2;
      if (pos.y > midY - 100 && pos.y < midY + 100) {
        if (pos.x < canvasW * 0.2) input.touchDown('left');
        else if (pos.x > canvasW * 0.8) input.touchDown('right');
        else input.touchDown('start');
      } else if (pos.y > midY + 100) {
        input.touchDown('start');
      } else if (pos.y < 60) {
        input.touchDown('pause'); // 뒤로가기
      }
    }

    // ── 일시정지 영역 확대: 48×48px (T3 수정) ──
    if (pos.y < 48 && pos.x > canvasW - 48) input.touchDown('pause');

    // ── 메뉴 화면 탭 ──
    if (gameState === STATE.TITLE || gameState === STATE.CLEAR) {
      input.touchDown('start');
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) input.resetTouch();
  else handleTouch(e);
}

canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('click', () => { sound._init(); if (gameState===STATE.TITLE||gameState===STATE.CLEAR) input.touchDown('start'); });

window.addEventListener('resize', resizeCanvas);

// ─── §19. 게임 루프 (try-catch 래핑) ───
function gameLoop(timestamp) {
  try {
    if (lastTime === 0) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.033);
    lastTime = timestamp;
    update(dt);
    render(ctx, dt, timestamp);
  } catch (e) {
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// ─── §20. 초기화 ───
function init() {
  resizeCanvas();
  saveData = loadSave();
  // 초기 상태 진입도 beginTransition 경유 (immediate)
  gameState = STATE.TITLE;
  beginTransition(STATE.TITLE, { immediate: true });
  requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
