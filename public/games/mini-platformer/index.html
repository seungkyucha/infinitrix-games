/* ===== SEEDED RNG (LCG) for Daily Challenge ===== */
class SeededRNG {
  constructor(seed) { this.seed = seed & 0xFFFFFFFF; }
  /* Return next pseudo-random float in [0,1) */
  next() {
    this.seed = (this.seed * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (this.seed >>> 0) / 0x100000000;
  }
  /* Return random int in [min, max] inclusive */
  nextInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); }
}

/* ===== TWEEN MANAGER ===== */
class TweenManager {
  constructor() { this._tweens = []; }
  /* Add a new tween animation */
  add(opts) {
    const tw = { target: opts.target, props: {}, duration: opts.duration || 300,
      elapsed: 0, ease: opts.ease || this._easeOut, onComplete: opts.onComplete || null, dead: false };
    for (const k in opts.props) {
      const p = opts.props[k];
      tw.props[k] = { from: p.from !== undefined ? p.from : opts.target[k], to: p.to };
      tw.target[k] = tw.props[k].from;
    }
    this._tweens.push(tw);
    return tw;
  }
  /* Update all active tweens */
  update(dt) {
    for (let idx = this._tweens.length - 1; idx >= 0; idx--) {
      const tw = this._tweens[idx];
      if (tw.dead) { this._tweens.splice(idx, 1); continue; }
      tw.elapsed += dt;
      const progress = Math.min(tw.elapsed / tw.duration, 1);
      const eased = tw.ease(progress);
      for (const k in tw.props) {
        const p = tw.props[k];
        tw.target[k] = p.from + (p.to - p.from) * eased;
      }
      if (progress >= 1) {
        tw.dead = true;
        this._tweens.splice(idx, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  /* Immediately clear all tweens (no deferred) */
  clearImmediate() { this._tweens.length = 0; }
  _easeOut(t) { return 1 - (1 - t) * (1 - t); }
  _easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
}

/* ===== OBJECT POOL ===== */
class ObjectPool {
  constructor(factory, maxSize) { this._pool = []; this._active = []; this._factory = factory; this._max = maxSize || 100; }
  /* Get an object from pool or create new */
  get() {
    let obj = this._pool.pop();
    if (!obj && this._active.length < this._max) obj = this._factory();
    if (obj) { obj.active = true; this._active.push(obj); }
    return obj;
  }
  /* Return object to pool */
  release(obj) {
    obj.active = false;
    const idx = this._active.indexOf(obj);
    if (idx !== -1) this._active.splice(idx, 1);
    this._pool.push(obj);
  }
  /* Iterate active objects */
  forEach(fn) { for (let idx = this._active.length - 1; idx >= 0; idx--) fn(this._active[idx], idx); }
  /* Release all active objects */
  clear() { while (this._active.length) this.release(this._active[this._active.length - 1]); }
  get count() { return this._active.length; }
}

/* ===== SOUND MANAGER ===== */
class SoundManager {
  constructor() { this._ctx = null; this._vol = 0.3; this._muted = false; }
  /* Lazy-init audio context on first user interaction */
  _init() { if (!this._ctx) try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  /* Play a synthesized sound effect */
  play(name) {
    this._init();
    if (!this._ctx || this._muted) return;
    const ctx = this._ctx;
    const now = ctx.currentTime;
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(this._vol * 0.4, now);
    const sounds = {
      jump: () => { const o = ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(400,now); o.frequency.linearRampToValueAtTime(600,now+0.08); o.connect(gain); gain.gain.linearRampToValueAtTime(0,now+0.08); o.start(now); o.stop(now+0.08); },
      doubleJump: () => { const o = ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(500,now); o.frequency.linearRampToValueAtTime(800,now+0.1); o.connect(gain); gain.gain.linearRampToValueAtTime(0,now+0.1); o.start(now); o.stop(now+0.1); },
      wallJump: () => { const o = ctx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(300,now); o.frequency.linearRampToValueAtTime(500,now+0.06); o.connect(gain); gain.gain.setValueAtTime(this._vol*0.25,now); gain.gain.linearRampToValueAtTime(0,now+0.06); o.start(now); o.stop(now+0.06); },
      dash: () => { const o = ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(200,now); o.frequency.linearRampToValueAtTime(100,now+0.12); o.connect(gain); gain.gain.setValueAtTime(this._vol*0.3,now); gain.gain.linearRampToValueAtTime(0,now+0.12); o.start(now); o.stop(now+0.12); },
      die: () => { const buf = ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate); const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); const s = ctx.createBufferSource(); s.buffer=buf; s.connect(gain); gain.gain.setValueAtTime(this._vol*0.5,now); s.start(now); },
      gem: () => { const o = ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(800,now); o.frequency.linearRampToValueAtTime(1200,now+0.15); o.connect(gain); gain.gain.linearRampToValueAtTime(0,now+0.15); o.start(now); o.stop(now+0.15); },
      clear: () => { const freqs=[523,659,784,1047]; freqs.forEach((f,i)=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(f,now+i*0.1); const g=ctx.createGain(); g.connect(ctx.destination); g.gain.setValueAtTime(this._vol*0.3,now+i*0.1); g.gain.linearRampToValueAtTime(0,now+i*0.1+0.15); o.connect(g); o.start(now+i*0.1); o.stop(now+i*0.1+0.15); }); },
      checkpoint: () => { const o = ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(600,now); o.frequency.linearRampToValueAtTime(900,now+0.2); o.connect(gain); gain.gain.linearRampToValueAtTime(0,now+0.2); o.start(now); o.stop(now+0.2); }
    };
    if (sounds[name]) sounds[name]();
  }
  /* Toggle mute state */
  toggleMute() { this._muted = !this._muted; return this._muted; }
}

/* ===== INPUT SYSTEM ===== */
const input = {
  _keys: {}, _prev: {}, _justDown: {},
  /* Register key as pressed */
  keyDown(code) { if (!this._keys[code]) this._justDown[code] = true; this._keys[code] = true; },
  /* Register key as released */
  keyUp(code) { this._keys[code] = false; },
  /* Check if key is currently held */
  isDown(code) { return !!this._keys[code]; },
  /* Check if key was just pressed this frame */
  justPressed(code) { return !!this._justDown[code]; },
  /* Reset per-frame flags */
  postUpdate() { this._justDown = {}; },
  /* Virtual touch buttons state */
  touch: { left: false, right: false, down: false, jump: false, jumpJust: false, dash: false, dashJust: false, pause: false, pauseJust: false }
};

/* ===== CANVAS SETUP ===== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let canvasW, canvasH, scaleX, scaleY, dpr;

/* Resize canvas to fill window with DPR scaling */
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  canvasW = CONFIG.CANVAS.BASE_WIDTH;
  canvasH = CONFIG.CANVAS.BASE_HEIGHT;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
  scaleX = canvasW / window.innerWidth;
  scaleY = canvasH / window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

/* ===== LEVEL DATA ===== */
/* Tile legend: .=air #=solid ^=spikeUp v=spikeDown <=spikeL >=spikeR S=spawn G=goal *=gem C=checkpoint P=movPlatH Q=movPlatV B=crumble ~=wind L=lava F=fire R=reverse Z=laser */
function parseLevelStr(str, worldIdx, stageIdx) {
  const rows = str.trim().split('\n').map(r => r.trimEnd());
  const height = rows.length;
  const width = Math.max(...rows.map(r => r.length));
  const tiles = [];
  const gems = [];
  const hazards = [];
  const movingPlatforms = [];
  let spawn = { x: 2, y: 2 };
  let goal = { x: width - 3, y: 2 };
  const checkpoints = [];
  for (let row = 0; row < height; row++) {
    tiles[row] = [];
    for (let col = 0; col < width; col++) {
      const ch = (rows[row] && rows[row][col]) || '.';
      switch (ch) {
        case '#': tiles[row][col] = 1; break;
        case '^': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'spike', dir: 'up' }); break;
        case 'v': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'spike', dir: 'down' }); break;
        case '<': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'spike', dir: 'left' }); break;
        case '>': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'spike', dir: 'right' }); break;
        case 'S': tiles[row][col] = 0; spawn = { x: col, y: row }; break;
        case 'G': tiles[row][col] = 0; goal = { x: col, y: row }; break;
        case '*': tiles[row][col] = 0; gems.push({ x: col, y: row, collected: false }); break;
        case 'C': tiles[row][col] = 0; checkpoints.push({ x: col, y: row, active: false }); break;
        case 'P': tiles[row][col] = 0; movingPlatforms.push({ x: col * TS, y: row * TS, w: TS * 3, h: TS * 0.5, dx: 1, dy: 0, speed: 1, range: TS * 4, startX: col * TS, startY: row * TS }); break;
        case 'Q': tiles[row][col] = 0; movingPlatforms.push({ x: col * TS, y: row * TS, w: TS * 2, h: TS * 0.5, dx: 0, dy: 1, speed: 0.8, range: TS * 3, startX: col * TS, startY: row * TS }); break;
        case 'B': tiles[row][col] = 2; break;
        case '~': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'wind', dir: 'right', force: 0.3 }); break;
        case 'L': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'lava' }); break;
        case 'F': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'fire', timer: 0, interval: 120 }); break;
        case 'R': tiles[row][col] = 3; break;
        case 'Z': tiles[row][col] = 0; hazards.push({ x: col, y: row, type: 'laser', timer: 0, interval: 90, active: true }); break;
        default: tiles[row][col] = 0; break;
      }
    }
  }
  return { width, height, tiles, spawn, goal, gems, checkpoints, hazards, movingPlatforms, worldIdx, stageIdx };
}

/* ===== DAILY CHALLENGE LEVEL GENERATOR ===== */
/* Generate a procedural platformer level from a seed */
function generateDailyLevel(seed) {
  const rng = new SeededRNG(seed);
  const width = 60;
  const height = 20;
  const tiles = [];
  const gems = [];
  const hazards = [];
  const movingPlatforms = [];
  const checkpoints = [];
  /* Initialize empty grid */
  for (let row = 0; row < height; row++) {
    tiles[row] = [];
    for (let col = 0; col < width; col++) {
      tiles[row][col] = 0;
    }
  }
  /* Floor and ceiling */
  for (let col = 0; col < width; col++) {
    tiles[0][col] = 1;
    tiles[height - 1][col] = 1;
  }
  /* Left wall */
  for (let row = 0; row < height; row++) { tiles[row][0] = 1; }
  /* Right wall */
  for (let row = 0; row < height; row++) { tiles[row][width - 1] = 1; }
  /* Generate platforms in sections */
  const sectionCount = 8;
  const sectionW = Math.floor((width - 4) / sectionCount);
  let lastPlatY = height - 4;
  for (let sec = 0; sec < sectionCount; sec++) {
    const sx = 2 + sec * sectionW;
    /* Platform height varies around last height */
    const minY = Math.max(3, lastPlatY - 6);
    const maxY = Math.min(height - 4, lastPlatY + 3);
    const platY = rng.nextInt(minY, maxY);
    const platLen = rng.nextInt(3, 6);
    for (let col = sx; col < Math.min(sx + platLen, width - 1); col++) {
      tiles[platY][col] = 1;
    }
    /* Add stepping stone platforms for vertical gaps */
    if (Math.abs(platY - lastPlatY) > 3 && sec > 0) {
      const midY = Math.floor((platY + lastPlatY) / 2);
      const midX = sx - rng.nextInt(1, 3);
      for (let col = Math.max(1, midX); col < Math.min(midX + 3, width - 1); col++) {
        tiles[midY][col] = 1;
      }
    }
    /* Wall jump sections (30% chance) */
    if (rng.next() < 0.3 && sec > 1) {
      const wallH = rng.nextInt(3, 6);
      const wallX = sx + rng.nextInt(0, 2);
      for (let row = platY - wallH; row < platY; row++) {
        if (row > 0 && wallX < width - 1) tiles[row][wallX] = 1;
      }
    }
    /* Add spikes (40% chance per section, after first 2 sections) */
    if (sec > 1 && rng.next() < 0.4) {
      const spikeX = sx + rng.nextInt(1, Math.max(1, platLen - 1));
      if (spikeX < width - 1 && platY - 1 > 0) {
        hazards.push({ x: spikeX, y: platY - 1, type: 'spike', dir: 'up' });
      }
    }
    /* Place gem (60% chance) */
    if (rng.next() < 0.6) {
      const gemX = sx + rng.nextInt(0, Math.max(0, platLen - 1));
      const gemY = platY - 2;
      if (gemY > 1 && gemX < width - 1) {
        gems.push({ x: gemX, y: gemY, collected: false });
      }
    }
    /* Checkpoint in middle sections */
    if (sec === 3 || sec === 6) {
      checkpoints.push({ x: sx + 1, y: platY - 1, active: false });
    }
    lastPlatY = platY;
  }
  /* Ensure max 3 gems */
  while (gems.length > 3) gems.pop();
  /* Spawn and goal */
  const spawn = { x: 2, y: height - 3 };
  const goal = { x: width - 3, y: lastPlatY - 1 };
  /* Ensure goal has ground */
  for (let col = width - 5; col < width - 1; col++) {
    tiles[lastPlatY][col] = 1;
  }
  return { width, height, tiles, spawn, goal, gems, checkpoints, hazards, movingPlatforms, worldIdx: 4, stageIdx: 0 };
}

/* Get today's daily seed as YYYYMMDD integer */
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

/* ===== GAME STATE ===== */
const STATES = { TITLE: 'TITLE', PLAY: 'PLAY', DEAD: 'DEAD', CLEAR: 'CLEAR', PAUSE: 'PAUSE' };
let gameState = STATES.TITLE;
let isTransitioning = false;
const transitionOverlay = { alpha: 0 };
const tw = new TweenManager();
const snd = new SoundManager();
const particles = new ObjectPool(() => ({ x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, size: 3, color: '#fff', active: false }), 150);

/* Player state */
let player = {};
let camera = { x: 0, y: 0, targetX: 0, targetY: 0, shakeX: 0, shakeY: 0, shakeMag: 0 };
let currentWorld = 0, currentStage = 0;
let currentLevel = null;
let stageTimer = 0;
let stageDeaths = 0;
let respawnPoint = { x: 0, y: 0 };
let isDailyChallenge = false;
let titleMenuIdx = 0; /* 0 = Story, 1 = Daily Challenge */
let totalScore = 0;
let titleAnim = { t: 0, scanY: 0 };
let clearData = { score: 0, timeBonus: 0, gemBonus: 0, deathBonus: 0, isNewBest: false };

/* Save data */
let saveData = { unlockedWorld: 1, bestTimes: {}, gems: {}, totalGems: 0, totalScore: 0, dailyBest: {}, deaths: {} };

/* ===== SAVE/LOAD ===== */
/* Load saved progress from localStorage */
function loadSave() {
  try {
    const raw = localStorage.getItem(CONFIG.SAVE_KEY);
    if (raw) { const parsed = JSON.parse(raw); Object.assign(saveData, parsed); }
  } catch (e) { /* ignore parse errors */ }
}

/* Save progress to localStorage */
function writeSave(data) {
  try { localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(data)); } catch (e) { /* ignore */ }
}

/* ===== PLAYER CREATION ===== */
/* Create a fresh player state for a level */
function createPlayer(spawnX, spawnY, worldIdx) {
  return {
    x: spawnX * TS + TS / 2, y: spawnY * TS + TS / 2,
    vx: 0, vy: 0,
    width: CONFIG.HITBOX.PLAYER_WIDTH, height: CONFIG.HITBOX.PLAYER_HEIGHT,
    onGround: false, onWall: 0, wallDir: 0,
    coyoteTimer: 0, jumpBufferTimer: 0,
    hasDoubleJump: worldIdx >= 2, usedDoubleJump: false,
    hasDash: worldIdx >= 3, dashTimer: 0, canDash: true, dashDirX: 0, dashDirY: 0,
    hasWallJump: worldIdx >= 1,
    facing: 1, wallStickTimer: 0,
    trail: [], dead: false, gravityFlipped: false
  };
}

/* ===== STATE TRANSITIONS ===== */
/* Single entry point for all state transitions — guards against double-fire */
function beginTransition(targetState, options) {
  if (isTransitioning) return;
  isTransitioning = true;
  const opts = options || {};
  if (opts.immediate) {
    enterState(targetState, opts);
    isTransitioning = false;
  } else {
    const dur = opts.duration || 250;
    tw.add({
      target: transitionOverlay,
      props: { alpha: { from: 0, to: 1 } },
      duration: dur,
      onComplete: () => {
        enterState(targetState, opts);
        tw.add({
          target: transitionOverlay,
          props: { alpha: { from: 1, to: 0 } },
          duration: dur,
          onComplete: () => { isTransitioning = false; }
        });
      }
    });
  }
}

/* Internal: actually switch to the target state */
function enterState(targetState, opts) {
  const prevState = gameState;
  gameState = targetState;
  const cfg = opts || {};
  switch (targetState) {
    case STATES.TITLE:
      titleAnim.t = 0; titleAnim.scanY = 0;
      break;
    case STATES.PLAY:
      if (prevState === STATES.TITLE || prevState === STATES.CLEAR) {
        if (isDailyChallenge) { loadDailyLevel(); } else { loadLevel(currentWorld, currentStage); }
      } else if (prevState === STATES.DEAD) {
        respawnPlayer();
      }
      break;
    case STATES.DEAD:
      stageDeaths++;
      const deathKey = currentWorld + '-' + currentStage;
      saveData.deaths[deathKey] = (saveData.deaths[deathKey] || 0) + 1;
      spawnDeathParticles(particles, player.x, player.y, CONFIG.COLORS.PLAYER);
      camera.shakeMag = 6;
      snd.play('die');
      tw.add({ target: {}, props: { v: { from: 0, to: 1 } }, duration: 300,
        onComplete: () => { beginTransition(STATES.PLAY, { immediate: true }); }
      });
      break;
    case STATES.CLEAR:
      snd.play('clear');
      calculateClearScore();
      break;
    case STATES.PAUSE:
      break;
  }
}

/* ===== LEVEL LOADING ===== */
/* Load a specific world/stage level */
function loadLevel(worldIdx, stageIdx) {
  currentLevel = deepCloneLevel(LEVELS[worldIdx][stageIdx]);
  player = createPlayer(currentLevel.spawn.x, currentLevel.spawn.y, worldIdx);
  respawnPoint = { x: currentLevel.spawn.x, y: currentLevel.spawn.y };
  camera.x = player.x - canvasW / 2;
  camera.y = player.y - canvasH / 2;
  camera.targetX = camera.x;
  camera.targetY = camera.y;
  camera.shakeMag = 0;
  stageTimer = 0;
  stageDeaths = 0;
  particles.clear();
}

/* Load daily challenge level from seeded generator */
function loadDailyLevel() {
  const seed = getDailySeed();
  const generated = generateDailyLevel(seed);
  currentLevel = deepCloneLevel(generated);
  player = createPlayer(currentLevel.spawn.x, currentLevel.spawn.y, 4); /* All moves unlocked */
  respawnPoint = { x: currentLevel.spawn.x, y: currentLevel.spawn.y };
  camera.x = player.x - canvasW / 2;
  camera.y = player.y - canvasH / 2;
  camera.targetX = camera.x;
  camera.targetY = camera.y;
  camera.shakeMag = 0;
  stageTimer = 0;
  stageDeaths = 0;
  particles.clear();
}

/* Deep clone level data to allow mutation (gem collection, etc) */
function deepCloneLevel(lvl) {
  return {
    width: lvl.width, height: lvl.height,
    tiles: lvl.tiles.map(row => row.slice()),
    spawn: { ...lvl.spawn }, goal: { ...lvl.goal },
    gems: lvl.gems.map(g => ({ ...g })),
    checkpoints: lvl.checkpoints.map(c => ({ ...c })),
    hazards: lvl.hazards.map(h => ({ ...h })),
    movingPlatforms: lvl.movingPlatforms.map(p => ({ ...p })),
    worldIdx: lvl.worldIdx, stageIdx: lvl.stageIdx
  };
}

/* Respawn player at current respawn point */
function respawnPlayer() {
  player.x = respawnPoint.x * TS + TS / 2;
  player.y = respawnPoint.y * TS + TS / 2;
  player.vx = 0; player.vy = 0;
  player.dead = false;
  player.dashTimer = 0; player.canDash = true;
  player.usedDoubleJump = false;
  player.gravityFlipped = false;
  player.trail = [];
}

/* ===== SCORE CALCULATION ===== */
/* Calculate stage clear score — judgment first, then save */
function calculateClearScore() {
  const cfg = CONFIG.SCORE;
  const collectedGems = currentLevel.gems.filter(g => g.collected).length;
  const timeBonus = Math.max(0, Math.floor((cfg.TIME_BONUS_THRESHOLD - stageTimer) * cfg.TIME_BONUS_PER_SEC));
  const gemBonus = collectedGems * cfg.GEM_BONUS;
  const deathBonus = stageDeaths === 0 ? cfg.NO_DEATH_BONUS : 0;
  const score = cfg.STAGE_CLEAR_BASE + gemBonus + timeBonus + deathBonus;
  const stageKey = (currentWorld + 1) + '-' + (currentStage + 1);
  const prevBest = saveData.bestTimes[stageKey] || Infinity;
  const isNewBest = stageTimer < prevBest;
  clearData = { score, timeBonus, gemBonus, deathBonus, isNewBest, time: stageTimer, gems: collectedGems };
  /* Save after judgment */
  if (isNewBest) saveData.bestTimes[stageKey] = Math.round(stageTimer * 100) / 100;
  const gemKey = stageKey;
  if (!saveData.gems[gemKey]) saveData.gems[gemKey] = [];
  currentLevel.gems.forEach((g, idx) => { if (g.collected) saveData.gems[gemKey][idx] = true; });
  saveData.totalGems = Object.values(saveData.gems).reduce((sum, arr) => sum + arr.filter(Boolean).length, 0);
  saveData.totalScore += score;
  /* Daily challenge: save time record */
  if (isDailyChallenge) {
    const dailyKey = '' + getDailySeed();
    const prevDaily = saveData.dailyBest[dailyKey] || Infinity;
    if (stageTimer < prevDaily) {
      saveData.dailyBest[dailyKey] = Math.round(stageTimer * 100) / 100;
    }
  }
  /* Unlock next world if last stage of world */
  if (!isDailyChallenge && currentStage === 4 && currentWorld + 2 > saveData.unlockedWorld) {
    saveData.unlockedWorld = Math.min(currentWorld + 2, 5);
  }
  writeSave(saveData);
}

/* ===== PHYSICS UPDATE ===== */
/* Update player physics — pure function-like, modifies player in-place */
function updatePlayer(pl, inp, lvl, dt) {
  if (pl.dead) return;
  const phy = CONFIG.PHYSICS;
  const dtScale = dt / 16.667;

  /* Dash state */
  if (pl.dashTimer > 0) {
    pl.dashTimer--;
    pl.vx = pl.dashDirX * phy.DASH_SPEED;
    pl.vy = pl.dashDirY * phy.DASH_SPEED * 0.3;
    pl.trail.push({ x: pl.x, y: pl.y, alpha: 0.6, timer: 10 });
    if (pl.trail.length > 8) pl.trail.shift();
    pl.x += pl.vx * dtScale;
    pl.y += pl.vy * dtScale;
    resolveCollisions(pl, lvl);
    return;
  }

  /* Horizontal input */
  const moveLeft = inp.isDown('ArrowLeft') || inp.isDown('KeyA') || inp.touch.left;
  const moveRight = inp.isDown('ArrowRight') || inp.isDown('KeyD') || inp.touch.right;
  const wantJump = inp.justPressed('Space') || inp.justPressed('KeyW') || inp.justPressed('ArrowUp') || inp.touch.jumpJust;
  const holdJump = inp.isDown('Space') || inp.isDown('KeyW') || inp.isDown('ArrowUp') || inp.touch.jump;
  const wantDash = (inp.justPressed('ShiftLeft') || inp.justPressed('ShiftRight') || inp.justPressed('KeyX') || inp.touch.dashJust) && pl.hasDash;

  const accel = pl.onGround ? phy.ACCELERATION : phy.AIR_ACCELERATION;
  if (moveLeft) { pl.vx -= accel; pl.facing = -1; }
  if (moveRight) { pl.vx += accel; pl.facing = 1; }
  pl.vx = Math.max(-phy.MOVE_SPEED, Math.min(phy.MOVE_SPEED, pl.vx));

  /* Friction */
  if (!moveLeft && !moveRight) {
    pl.vx *= pl.onGround ? phy.FRICTION : phy.AIR_FRICTION;
    if (Math.abs(pl.vx) < 0.1) pl.vx = 0;
  }

  /* Gravity (respect flip) */
  const gravDir = pl.gravityFlipped ? -1 : 1;
  pl.vy += phy.GRAVITY * gravDir * dtScale;
  if (pl.gravityFlipped) {
    pl.vy = Math.max(-phy.MAX_FALL_SPEED, pl.vy);
  } else {
    pl.vy = Math.min(phy.MAX_FALL_SPEED, pl.vy);
  }

  /* Wall slide */
  if (pl.hasWallJump && pl.onWall !== 0 && !pl.onGround) {
    if ((pl.gravityFlipped && pl.vy < -phy.WALL_SLIDE_SPEED) || (!pl.gravityFlipped && pl.vy > phy.WALL_SLIDE_SPEED)) {
      pl.vy = phy.WALL_SLIDE_SPEED * gravDir;
    }
  }

  /* Coyote time */
  if (pl.onGround) { pl.coyoteTimer = phy.COYOTE_TIME; pl.usedDoubleJump = false; pl.canDash = true; }
  else { pl.coyoteTimer--; }

  /* Jump buffer */
  if (wantJump) pl.jumpBufferTimer = phy.JUMP_BUFFER;
  else pl.jumpBufferTimer--;

  /* Jump */
  if (pl.jumpBufferTimer > 0 && pl.coyoteTimer > 0) {
    pl.vy = phy.JUMP_FORCE * gravDir;
    pl.jumpBufferTimer = 0; pl.coyoteTimer = 0;
    pl.onGround = false;
    snd.play('jump');
  } else if (wantJump && pl.hasWallJump && pl.onWall !== 0 && !pl.onGround) {
    /* Wall jump */
    pl.vx = -pl.onWall * phy.WALL_JUMP_FORCE_X;
    pl.vy = phy.WALL_JUMP_FORCE_Y * gravDir;
    pl.facing = -pl.onWall;
    pl.jumpBufferTimer = 0;
    pl.usedDoubleJump = false;
    snd.play('wallJump');
  } else if (wantJump && pl.hasDoubleJump && !pl.usedDoubleJump && !pl.onGround && pl.coyoteTimer <= 0) {
    /* Double jump */
    pl.vy = phy.DOUBLE_JUMP_FORCE * gravDir;
    pl.usedDoubleJump = true;
    pl.jumpBufferTimer = 0;
    spawnDeathParticles(particles, pl.x, pl.y + 8, 'rgba(0,255,204,0.5)');
    snd.play('doubleJump');
  }

  /* Variable jump height */
  if (!holdJump && ((pl.vy < 0 && !pl.gravityFlipped) || (pl.vy > 0 && pl.gravityFlipped))) {
    pl.vy *= phy.JUMP_CUT_MULTIPLIER;
  }

  /* Dash */
  if (wantDash && pl.canDash && pl.dashTimer <= 0) {
    pl.dashTimer = phy.DASH_DURATION;
    pl.dashDirX = pl.facing;
    pl.dashDirY = 0;
    pl.canDash = false;
    pl.vy = 0;
    snd.play('dash');
  }

  /* Move position */
  pl.x += pl.vx * dtScale;
  pl.y += pl.vy * dtScale;

  /* Trail for visual flair */
  if (Math.abs(pl.vx) > 2) {
    pl.trail.push({ x: pl.x, y: pl.y, alpha: 0.3, timer: 6 });
    if (pl.trail.length > 5) pl.trail.shift();
  }

  /* Resolve tile collisions */
  resolveCollisions(pl, lvl);

  /* Check gravity flip zones */
  const tileAtPlayer = getTileAt(lvl, Math.floor(pl.x / TS), Math.floor(pl.y / TS));
  if (tileAtPlayer === 3) { if (!pl.gravityFlipped) pl.gravityFlipped = true; }
  else { if (pl.gravityFlipped) pl.gravityFlipped = false; }
}

/* ===== COLLISION SYSTEM ===== */
/* Get tile value at grid position */
function getTileAt(lvl, col, row) {
  if (row < 0 || row >= lvl.height || col < 0 || col >= lvl.width) return 1;
  return lvl.tiles[row] ? (lvl.tiles[row][col] || 0) : 0;
}

/* Check if tile is solid */
function isSolid(lvl, col, row) {
  const t = getTileAt(lvl, col, row);
  return t === 1;
}

/* Resolve player-tile collisions with AABB */
function resolveCollisions(pl, lvl) {
  const hw = pl.width / 2;
  const hh = pl.height / 2;
  pl.onGround = false;
  pl.onWall = 0;

  /* Horizontal collision */
  const leftCol = Math.floor((pl.x - hw) / TS);
  const rightCol = Math.floor((pl.x + hw - 1) / TS);
  const topRow = Math.floor((pl.y - hh) / TS);
  const bottomRow = Math.floor((pl.y + hh - 1) / TS);

  /* Check X axis */
  for (let row = topRow; row <= bottomRow; row++) {
    if (pl.vx > 0) {
      const col = Math.floor((pl.x + hw) / TS);
      if (isSolid(lvl, col, row)) {
        pl.x = col * TS - hw;
        pl.vx = 0;
        pl.onWall = 1;
      }
    }
    if (pl.vx < 0) {
      const col = Math.floor((pl.x - hw) / TS);
      if (isSolid(lvl, col, row)) {
        pl.x = (col + 1) * TS + hw;
        pl.vx = 0;
        pl.onWall = -1;
      }
    }
  }

  /* Check Y axis */
  const leftCol2 = Math.floor((pl.x - hw) / TS);
  const rightCol2 = Math.floor((pl.x + hw - 1) / TS);
  for (let col = leftCol2; col <= rightCol2; col++) {
    if (pl.vy > 0) {
      const row = Math.floor((pl.y + hh) / TS);
      if (isSolid(lvl, col, row)) {
        pl.y = row * TS - hh;
        pl.vy = 0;
        pl.onGround = !pl.gravityFlipped;
      }
      /* Crumbling block */
      if (getTileAt(lvl, col, row) === 2) {
        pl.y = row * TS - hh;
        pl.vy = 0;
        pl.onGround = !pl.gravityFlipped;
        lvl.tiles[row][col] = 20; /* mark as crumbling */
        tw.add({ target: { v: 0 }, props: { v: { from: 0, to: 1 } }, duration: 500,
          onComplete: () => { if (lvl.tiles[row]) lvl.tiles[row][col] = 0; }
        });
      }
    }
    if (pl.vy < 0) {
      const row = Math.floor((pl.y - hh) / TS);
      if (isSolid(lvl, col, row)) {
        /* Corner correction */
        let corrected = false;
        const cc = CONFIG.PHYSICS.CORNER_CORRECTION;
        const px = pl.x;
        const tileLeft = col * TS;
        const tileRight = (col + 1) * TS;
        if (px - hw < tileRight && px - hw > tileRight - cc) {
          pl.x = tileRight + hw;
          corrected = true;
        } else if (px + hw > tileLeft && px + hw < tileLeft + cc) {
          pl.x = tileLeft - hw;
          corrected = true;
        }
        if (!corrected) {
          pl.y = (row + 1) * TS + hh;
          pl.vy = 0;
          if (pl.gravityFlipped) pl.onGround = true;
        }
      }
    }
  }

  /* Moving platforms */
  for (const mp of lvl.movingPlatforms) {
    if (pl.vy >= 0 && pl.x + hw > mp.x && pl.x - hw < mp.x + mp.w &&
        pl.y + hh >= mp.y && pl.y + hh <= mp.y + mp.h + 4) {
      pl.y = mp.y - hh;
      pl.vy = 0;
      pl.onGround = true;
      pl.x += mp.dx * mp.speed;
    }
  }

  /* Clamp to level bounds */
  const maxX = lvl.width * TS;
  const maxY = lvl.height * TS;
  if (pl.x - hw < 0) { pl.x = hw; pl.vx = 0; }
  if (pl.x + hw > maxX) { pl.x = maxX - hw; pl.vx = 0; }

  /* Fall below level = death */
  if (pl.y > maxY + 32) {
    if (gameState === STATES.PLAY && !isTransitioning) {
      beginTransition(STATES.DEAD, { immediate: true });
    }
  }
}

/* ===== HAZARD CHECKS ===== */
/* Check all hazard collisions with player */
function checkHazards(pl, lvl) {
  if (pl.dead || gameState !== STATES.PLAY || isTransitioning) return;
  const hw = pl.width / 2;
  const hh = pl.height / 2;
  const px1 = pl.x - hw, py1 = pl.y - hh;
  const px2 = pl.x + hw, py2 = pl.y + hh;

  for (const h of lvl.hazards) {
    const hx1 = h.x * TS + 2, hy1 = h.y * TS + 2;
    const hx2 = hx1 + TS - 4, hy2 = hy1 + TS - 4;
    if (h.type === 'spike' || h.type === 'lava') {
      if (px1 < hx2 && px2 > hx1 && py1 < hy2 && py2 > hy1) {
        pl.dead = true;
        beginTransition(STATES.DEAD, { immediate: true });
        return;
      }
    }
    if (h.type === 'fire' && h.active) {
      /* Fire column hitbox extends upward */
      const fy1 = h.y * TS - TS * 3;
      const fy2 = h.y * TS + TS;
      const fx1 = h.x * TS + 4;
      const fx2 = fx1 + TS - 8;
      if (px1 < fx2 && px2 > fx1 && py1 < fy2 && py2 > fy1) {
        pl.dead = true;
        beginTransition(STATES.DEAD, { immediate: true });
        return;
      }
    }
    if (h.type === 'laser' && h.active) {
      const lx = h.x * TS + TS / 2 - 2;
      if (px1 < lx + 4 && px2 > lx && py1 < lvl.height * TS && py2 > h.y * TS) {
        pl.dead = true;
        beginTransition(STATES.DEAD, { immediate: true });
        return;
      }
    }
    if (h.type === 'wind') {
      if (px1 < hx2 && px2 > hx1 && py1 < hy2 && py2 > hy1) {
        pl.vx += h.force * (h.dir === 'right' ? 1 : -1);
      }
    }
  }
}

/* Check gem collection */
function checkGems(pl, lvl) {
  const hw = pl.width / 2;
  const hh = pl.height / 2;
  for (const gem of lvl.gems) {
    if (gem.collected) continue;
    const gx = gem.x * TS + TS / 2;
    const gy = gem.y * TS + TS / 2;
    const dist = Math.hypot(pl.x - gx, pl.y - gy);
    if (dist < TS) {
      gem.collected = true;
      snd.play('gem');
      for (let idx = 0; idx < 8; idx++) {
        const angle = (idx / 8) * Math.PI * 2;
        const part = particles.get();
        if (part) {
          part.x = gx; part.y = gy;
          part.vx = Math.cos(angle) * 3; part.vy = Math.sin(angle) * 3;
          part.life = 30; part.maxLife = 30; part.size = 3; part.color = CONFIG.COLORS.GEM;
        }
      }
    }
  }
}

/* Check checkpoint activation */
function checkCheckpoints(pl, lvl) {
  for (const cp of lvl.checkpoints) {
    if (cp.active) continue;
    const cpx = cp.x * TS + TS / 2;
    const cpy = cp.y * TS + TS / 2;
    if (Math.hypot(pl.x - cpx, pl.y - cpy) < TS * 1.5) {
      cp.active = true;
      respawnPoint = { x: cp.x, y: cp.y };
      snd.play('checkpoint');
      for (let idx = 0; idx < 12; idx++) {
        const angle = (idx / 12) * Math.PI * 2;
        const part = particles.get();
        if (part) {
          part.x = cpx; part.y = cpy;
          part.vx = Math.cos(angle) * 2; part.vy = Math.sin(angle) * 2;
          part.life = 40; part.maxLife = 40; part.size = 2; part.color = '#00ff66';
        }
      }
    }
  }
}

/* Check goal collision */
function checkGoal(pl, lvl) {
  if (isTransitioning) return;
  const gx = lvl.goal.x * TS + TS / 2;
  const gy = lvl.goal.y * TS + TS / 2;
  if (Math.hypot(pl.x - gx, pl.y - gy) < TS * 1.2) {
    beginTransition(STATES.CLEAR, { immediate: true });
  }
}

/* ===== PARTICLE SYSTEM ===== */
/* Spawn death explosion particles */
function spawnDeathParticles(pool, x, y, color) {
  for (let idx = 0; idx < 20; idx++) {
    const part = pool.get();
    if (part) {
      part.x = x; part.y = y;
      part.vx = (Math.random() - 0.5) * 8;
      part.vy = (Math.random() - 0.5) * 8 - 2;
      part.life = 30 + Math.random() * 20;
      part.maxLife = part.life;
      part.size = 2 + Math.random() * 4;
      part.color = color;
    }
  }
}

/* Update all active particles */
function updateParticles(pool, dt) {
  const dtScale = dt / 16.667;
  pool.forEach((part) => {
    part.x += part.vx * dtScale;
    part.y += part.vy * dtScale;
    part.vy += 0.15 * dtScale;
    part.life -= dtScale;
    if (part.life <= 0) pool.release(part);
  });
}

/* ===== CAMERA SYSTEM ===== */
/* Update camera to follow target with lerp */
function updateCamera(cam, target, lvl, dt) {
  const dtScale = dt / 16.667;
  const lerp = CONFIG.CAMERA.LERP_SPEED;
  cam.targetX = target.x - canvasW / 2 + target.facing * CONFIG.CAMERA.LOOK_AHEAD_X;
  cam.targetY = target.y - canvasH / 2;
  cam.x += (cam.targetX - cam.x) * lerp * dtScale;
  cam.y += (cam.targetY - cam.y) * lerp * dtScale;
  /* Clamp to level bounds */
  const maxX = lvl.width * TS - canvasW;
  const maxY = lvl.height * TS - canvasH;
  cam.x = Math.max(0, Math.min(maxX, cam.x));
  cam.y = Math.max(0, Math.min(maxY, cam.y));
  /* Shake decay */
  if (cam.shakeMag > 0.1) {
    cam.shakeX = (Math.random() - 0.5) * cam.shakeMag;
    cam.shakeY = (Math.random() - 0.5) * cam.shakeMag;
    cam.shakeMag *= CONFIG.CAMERA.SHAKE_DECAY;
  } else {
    cam.shakeX = 0; cam.shakeY = 0; cam.shakeMag = 0;
  }
}

/* ===== UPDATE MOVING PLATFORMS ===== */
function updateMovingPlatforms(platforms, dt) {
  const dtScale = dt / 16.667;
  for (const mp of platforms) {
    mp.x += mp.dx * mp.speed * dtScale;
    mp.y += mp.dy * mp.speed * dtScale;
    const distX = mp.x - mp.startX;
    const distY = mp.y - mp.startY;
    if (Math.abs(distX) > mp.range) { mp.dx *= -1; mp.x = mp.startX + mp.range * Math.sign(distX); }
    if (Math.abs(distY) > mp.range) { mp.dy *= -1; mp.y = mp.startY + mp.range * Math.sign(distY); }
  }
}

/* ===== UPDATE HAZARDS (timers) ===== */
function updateHazards(hazards, dt) {
  const dtScale = dt / 16.667;
  for (const h of hazards) {
    if (h.type === 'fire') {
      h.timer += dtScale;
      h.active = (h.timer % h.interval) < h.interval * 0.6;
    }
    if (h.type === 'laser') {
      h.timer += dtScale;
      h.active = (h.timer % h.interval) < h.interval * 0.5;
    }
  }
}

/* ===== MAIN UPDATE ===== */
function update(dt) {
  tw.update(dt);
  switch (gameState) {
    case STATES.TITLE:
      titleAnim.t += dt;
      titleAnim.scanY = (titleAnim.scanY + dt * 0.1) % canvasH;
      updateParticles(particles, dt);
      /* Title screen ambient particles */
      if (Math.random() < 0.15) {
        const part = particles.get();
        if (part) {
          part.x = Math.random() * canvasW; part.y = canvasH + 5;
          part.vx = (Math.random() - 0.5) * 0.5; part.vy = -1 - Math.random();
          part.life = 80 + Math.random() * 60; part.maxLife = part.life;
          part.size = 1 + Math.random() * 2; part.color = CONFIG.COLORS.PLAYER;
        }
      }
      /* Menu navigation (up/down to toggle) */
      if (input.justPressed('ArrowUp') || input.justPressed('KeyW')) {
        titleMenuIdx = titleMenuIdx === 0 ? 1 : 0;
      }
      if (input.justPressed('ArrowDown') || input.justPressed('KeyS')) {
        titleMenuIdx = titleMenuIdx === 0 ? 1 : 0;
      }
      /* Start game — story or daily challenge */
      if (input.justPressed('Space') || input.justPressed('Enter') || input.touch.jumpJust) {
        snd._init();
        if (titleMenuIdx === 1) {
          isDailyChallenge = true;
          currentWorld = 4; currentStage = 0;
        } else {
          isDailyChallenge = false;
          currentWorld = 0; currentStage = 0;
        }
        beginTransition(STATES.PLAY);
      }
      break;

    case STATES.PLAY:
      stageTimer += dt / 1000;
      updatePlayer(player, input, currentLevel, dt);
      updateMovingPlatforms(currentLevel.movingPlatforms, dt);
      updateHazards(currentLevel.hazards, dt);
      checkHazards(player, currentLevel);
      checkGems(player, currentLevel);
      checkCheckpoints(player, currentLevel);
      checkGoal(player, currentLevel);
      updateCamera(camera, player, currentLevel, dt);
      updateParticles(particles, dt);
      /* Pause */
      if (input.justPressed('Escape') || input.justPressed('KeyP') || input.touch.pauseJust) {
        beginTransition(STATES.PAUSE, { immediate: true });
      }
      /* Voluntary restart */
      if (input.justPressed('KeyR')) {
        respawnPlayer();
        stageDeaths++;
      }
      break;

    case STATES.DEAD:
      updateParticles(particles, dt);
      break;

    case STATES.CLEAR:
      updateParticles(particles, dt);
      /* Advance to next stage */
      if (input.justPressed('Space') || input.justPressed('Enter') || input.touch.jumpJust) {
        if (isDailyChallenge) {
          /* Daily challenge: single stage, return to title */
          isDailyChallenge = false;
          beginTransition(STATES.TITLE);
          break;
        }
        if (currentStage < 4) {
          currentStage++;
        } else if (currentWorld < 4) {
          currentWorld++; currentStage = 0;
        } else {
          /* Game complete! Return to title */
          beginTransition(STATES.TITLE);
          break;
        }
        beginTransition(STATES.PLAY);
      }
      break;

    case STATES.PAUSE:
      if (input.justPressed('Escape') || input.justPressed('KeyP') || input.touch.pauseJust) {
        beginTransition(STATES.PLAY, { immediate: true });
      }
      break;
  }
  /* Decay trail alpha */
  if (player.trail) {
    for (let idx = player.trail.length - 1; idx >= 0; idx--) {
      player.trail[idx].timer--;
      player.trail[idx].alpha *= 0.85;
      if (player.trail[idx].timer <= 0) player.trail.splice(idx, 1);
    }
  }
  input.postUpdate();
  input.touch.jumpJust = false;
  input.touch.dashJust = false;
  input.touch.pauseJust = false;
}

/* ===== RENDERER ===== */
/* Draw parallax background layers */
function drawBackground(worldIdx, camX, camY) {
  const w = CONFIG.WORLDS[worldIdx] || CONFIG.WORLDS[0];
  /* Background gradient */
  const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, w.bg1);
  grad.addColorStop(1, w.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  /* Parallax layer 1 — far (stars/sky) */
  ctx.fillStyle = w.light;
  const starSeed = worldIdx * 1000;
  for (let idx = 0; idx < 40; idx++) {
    const sx = ((starSeed + idx * 137) % 800 - camX * 0.05) % canvasW;
    const sy = ((starSeed + idx * 251) % 450);
    const sz = 1 + (idx % 3);
    ctx.globalAlpha = 0.3 + (idx % 5) * 0.1;
    ctx.fillRect(sx < 0 ? sx + canvasW : sx, sy, sz, sz);
  }
  ctx.globalAlpha = 1;

  /* Parallax layer 2 — near (mountain silhouettes) */
  ctx.fillStyle = w.accent;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  const ox = -(camX * 0.2) % 200;
  for (let idx = -1; idx < 6; idx++) {
    const bx = ox + idx * 200;
    ctx.moveTo(bx, canvasH);
    ctx.lineTo(bx + 60, canvasH - 80 - (idx % 3) * 30);
    ctx.lineTo(bx + 120, canvasH - 50 - (idx % 2) * 20);
    ctx.lineTo(bx + 200, canvasH);
  }
  ctx.fill();
  ctx.globalAlpha = 1;
}

/* Draw a single tile */
function drawTile(col, row, tileType, worldIdx) {
  const x = col * TS;
  const y = row * TS;
  if (tileType === 1) {
    /* Solid block */
    ctx.fillStyle = CONFIG.COLORS.TERRAIN;
    ctx.fillRect(x, y, TS, TS);
    /* Subtle edge highlight */
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(x, y, TS, 1);
    ctx.fillRect(x, y, 1, TS);
  } else if (tileType === 2 || tileType === 20) {
    /* Crumbling block */
    ctx.fillStyle = tileType === 20 ? 'rgba(58,58,92,0.5)' : '#4a4a6c';
    ctx.fillRect(x, y, TS, TS);
    /* Crack pattern */
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 3); ctx.lineTo(x + TS - 3, y + TS - 3);
    ctx.moveTo(x + TS - 3, y + 3); ctx.lineTo(x + 3, y + TS - 3);
    ctx.stroke();
  } else if (tileType === 3) {
    /* Gravity reverse zone */
    ctx.fillStyle = 'rgba(224,176,255,0.15)';
    ctx.fillRect(x, y, TS, TS);
    /* Arrow indicator */
    ctx.strokeStyle = 'rgba(224,176,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(x + TS/2, y + 3); ctx.lineTo(x + TS/2 - 3, y + 8);
    ctx.moveTo(x + TS/2, y + 3); ctx.lineTo(x + TS/2 + 3, y + 8);
    ctx.stroke();
  }
}

/* Draw hazard objects */
function drawHazard(h, animTime) {
  const x = h.x * TS;
  const y = h.y * TS;
  if (h.type === 'spike') {
    ctx.fillStyle = CONFIG.COLORS.HAZARD;
    ctx.beginPath();
    if (h.dir === 'up') {
      ctx.moveTo(x, y + TS); ctx.lineTo(x + TS/2, y + 2); ctx.lineTo(x + TS, y + TS);
    } else if (h.dir === 'down') {
      ctx.moveTo(x, y); ctx.lineTo(x + TS/2, y + TS - 2); ctx.lineTo(x + TS, y);
    } else if (h.dir === 'left') {
      ctx.moveTo(x + TS, y); ctx.lineTo(x + 2, y + TS/2); ctx.lineTo(x + TS, y + TS);
    } else {
      ctx.moveTo(x, y); ctx.lineTo(x + TS - 2, y + TS/2); ctx.lineTo(x, y + TS);
    }
    ctx.fill();
  } else if (h.type === 'lava') {
    const wave = Math.sin(animTime * 0.003 + h.x * 0.5) * 2;
    ctx.fillStyle = '#ff4500';
    ctx.fillRect(x, y + wave, TS, TS);
    ctx.fillStyle = 'rgba(255,200,0,0.5)';
    ctx.fillRect(x, y + wave, TS, 4);
  } else if (h.type === 'fire' && h.active) {
    /* Fire column */
    const flicker = Math.sin(animTime * 0.01 + h.x) * 2;
    ctx.fillStyle = 'rgba(255,100,0,0.7)';
    ctx.fillRect(x + 4 + flicker, y - TS * 3, TS - 8, TS * 4);
    ctx.fillStyle = 'rgba(255,200,50,0.4)';
    ctx.fillRect(x + 6 + flicker, y - TS * 2.5, TS - 12, TS * 3);
  } else if (h.type === 'laser') {
    /* Laser emitter */
    ctx.fillStyle = h.active ? '#ff0066' : '#660033';
    ctx.fillRect(x + 4, y, TS - 8, TS);
    if (h.active) {
      ctx.fillStyle = 'rgba(255,0,102,0.4)';
      ctx.fillRect(x + TS/2 - 2, y + TS, 4, canvasH);
      ctx.fillStyle = 'rgba(255,100,150,0.8)';
      ctx.fillRect(x + TS/2 - 1, y + TS, 2, canvasH);
    }
  }
}

/* Draw the player character */
function drawPlayer(pl, animTime) {
  if (pl.dead) return;
  /* Trail / afterimages */
  for (const tr of pl.trail) {
    ctx.globalAlpha = tr.alpha;
    ctx.fillStyle = CONFIG.COLORS.PLAYER_TRAIL;
    ctx.fillRect(tr.x - 6, tr.y - 8, 12, 16);
  }
  ctx.globalAlpha = 1;

  /* Main body: neon rectangle with eyes */
  ctx.fillStyle = CONFIG.COLORS.PLAYER;
  ctx.shadowColor = CONFIG.COLORS.PLAYER;
  ctx.shadowBlur = 8;
  ctx.fillRect(pl.x - 6, pl.y - 8, 12, 16);
  ctx.shadowBlur = 0;
  /* Eyes */
  ctx.fillStyle = '#0a0a0f';
  const eyeOffX = pl.facing > 0 ? 1 : -3;
  const eyeY = pl.gravityFlipped ? pl.y + 2 : pl.y - 4;
  ctx.fillRect(pl.x + eyeOffX, eyeY, 2, 3);
  ctx.fillRect(pl.x + eyeOffX + 4, eyeY, 2, 3);

  /* Dash indicator */
  if (pl.hasDash && !pl.canDash) {
    ctx.fillStyle = 'rgba(255,107,53,0.4)';
    ctx.beginPath();
    ctx.arc(pl.x, pl.y - 12, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* Draw gems with rotation animation */
function drawGems(gems, animTime) {
  for (const gem of gems) {
    if (gem.collected) continue;
    const gx = gem.x * TS + TS / 2;
    const gy = gem.y * TS + TS / 2 + Math.sin(animTime * 0.004) * 3;
    ctx.save();
    ctx.translate(gx, gy);
    ctx.rotate(animTime * 0.003);
    ctx.fillStyle = CONFIG.COLORS.GEM;
    ctx.shadowColor = CONFIG.COLORS.GEM;
    ctx.shadowBlur = 6;
    ctx.fillRect(-4, -4, 8, 8);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

/* Draw goal flag */
function drawGoal(goal, animTime) {
  const gx = goal.x * TS;
  const gy = goal.y * TS;
  ctx.fillStyle = CONFIG.COLORS.GOAL;
  /* Pole */
  ctx.fillRect(gx + 2, gy, 3, TS * 2);
  /* Flag (waving) */
  const wave = Math.sin(animTime * 0.005) * 2;
  ctx.beginPath();
  ctx.moveTo(gx + 5, gy);
  ctx.lineTo(gx + 5 + 12 + wave, gy + 5);
  ctx.lineTo(gx + 5, gy + 10);
  ctx.fillStyle = CONFIG.COLORS.GOAL;
  ctx.fill();
  /* Glow */
  ctx.shadowColor = CONFIG.COLORS.GOAL;
  ctx.shadowBlur = 10;
  ctx.fillRect(gx + 5, gy, 1, 1);
  ctx.shadowBlur = 0;
}

/* Draw checkpoints */
function drawCheckpoints(checkpoints, animTime) {
  for (const cp of checkpoints) {
    const cx = cp.x * TS + TS / 2;
    const cy = cp.y * TS + TS / 2;
    ctx.fillStyle = cp.active ? '#00ff66' : '#555577';
    ctx.fillRect(cx - 2, cy - 8, 4, 16);
    if (cp.active) {
      ctx.shadowColor = '#00ff66';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(cx, cy - 10, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

/* Draw moving platforms */
function drawMovingPlatforms(platforms) {
  for (const mp of platforms) {
    ctx.fillStyle = '#5a5a8c';
    const r = 3;
    ctx.beginPath();
    ctx.roundRect(mp.x, mp.y, mp.w, mp.h, r);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(mp.x + 2, mp.y, mp.w - 4, 2);
  }
}

/* Draw HUD overlay */
function drawHUD(worldIdx, stageIdx, timer, lvl) {
  const padding = 10;
  ctx.fillStyle = 'rgba(10,10,15,0.6)';
  ctx.fillRect(0, 0, canvasW, 28);

  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  /* World-Stage label */
  ctx.fillText('W' + (worldIdx + 1) + '-S' + (stageIdx + 1) + '  ' + CONFIG.WORLDS[worldIdx].name, padding, 18);

  /* Gems */
  const collected = lvl.gems.filter(g => g.collected).length;
  const total = lvl.gems.length;
  ctx.textAlign = 'center';
  let gemStr = '';
  for (let idx = 0; idx < total; idx++) {
    gemStr += idx < collected ? '\u25C6' : '\u25C7'; /* ◆ ◇ */
  }
  ctx.fillStyle = CONFIG.COLORS.GEM;
  ctx.fillText(gemStr, canvasW / 2, 18);

  /* Timer */
  ctx.textAlign = 'right';
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  const min = Math.floor(timer / 60);
  const sec = (timer % 60).toFixed(1);
  ctx.fillText((min > 0 ? min + ':' : '') + (sec < 10 && min > 0 ? '0' : '') + sec, canvasW - padding - 40, 18);

  /* Pause icon */
  ctx.fillStyle = '#8080a0';
  ctx.fillText('\u23F8', canvasW - padding, 18); /* ⏸ */

  /* Deaths counter */
  if (stageDeaths > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = CONFIG.COLORS.HAZARD;
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('\u2620 ' + stageDeaths, canvasW - padding, 28); /* ☠ */
  }

  /* Hint */
  const deathKey = worldIdx + '-' + stageIdx;
  const totalDeathsHere = saveData.deaths[deathKey] || 0;
  if (totalDeathsHere >= CONFIG.HINT_THRESHOLD_1 && totalDeathsHere < CONFIG.HINT_THRESHOLD_2) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tip: R\ud0a4\ub85c \uccb4\ud06c\ud3ec\uc778\ud2b8\uc5d0\uc11c \uc7ac\uc2dc\uc791', canvasW / 2, canvasH - 10);
  }
}

/* Draw title screen */
function drawTitle(dt) {
  drawBackground(4, 0, 0);

  /* Ambient particles */
  particles.forEach((part) => {
    ctx.globalAlpha = part.life / part.maxLife;
    ctx.fillStyle = part.color;
    ctx.fillRect(part.x - part.size/2, part.y - part.size/2, part.size, part.size);
  });
  ctx.globalAlpha = 1;

  /* Title text with glow */
  const titleY = canvasH * 0.3 + Math.sin(titleAnim.t * 0.002) * 5;
  ctx.save();
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = CONFIG.COLORS.PLAYER;
  ctx.shadowBlur = 20;
  ctx.fillStyle = CONFIG.COLORS.PLAYER;
  ctx.fillText('MINI PLATFORMER', canvasW / 2, titleY);
  ctx.shadowBlur = 0;

  /* Subtitle */
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('\uBB34\uB108\uC838\uAC00\uB294 \uACE0\uB300 \uD0D1\uC744 \uB3CC\uD30C\uD558\uB77C', canvasW / 2, titleY + 30);

  /* Scanline CRT effect */
  ctx.fillStyle = 'rgba(0,255,204,0.03)';
  for (let idx = 0; idx < canvasH; idx += 3) {
    ctx.fillRect(0, idx, canvasW, 1);
  }
  /* Scanning line */
  ctx.fillStyle = 'rgba(0,255,204,0.08)';
  ctx.fillRect(0, titleAnim.scanY, canvasW, 2);

  /* Menu options */
  const menuY = canvasH * 0.55;
  const menuItems = ['\u25B6 STORY MODE', '\u25B6 DAILY CHALLENGE'];
  for (let mi = 0; mi < menuItems.length; mi++) {
    const isSelected = titleMenuIdx === mi;
    ctx.font = (isSelected ? 'bold ' : '') + '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = isSelected ? CONFIG.COLORS.PLAYER : '#505070';
    if (isSelected) { ctx.shadowColor = CONFIG.COLORS.PLAYER; ctx.shadowBlur = 8; }
    ctx.fillText(menuItems[mi], canvasW / 2, menuY + mi * 24);
    ctx.shadowBlur = 0;
  }

  /* Daily best display */
  const todayKey = '' + getDailySeed();
  const todayBest = saveData.dailyBest[todayKey];
  if (todayBest !== undefined) {
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('\uC624\uB298\uC758 \uAE30\uB85D: ' + todayBest.toFixed(2) + 's', canvasW / 2, menuY + 55);
  }

  /* Navigation hint (blinking) */
  if (Math.floor(titleAnim.t / 500) % 2 === 0) {
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#8080a0';
    ctx.fillText('\u2191\u2193 \uC120\uD0DD  |  SPACE / TAP \uC2DC\uC791', canvasW / 2, menuY + 75);
  }

  /* World select info */
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#505070';
  ctx.fillText('\uD574\uAE08\uB41C \uC6D4\uB4DC: ' + saveData.unlockedWorld + '/5  |  \uCD1D \uBCF4\uC11D: ' + saveData.totalGems, canvasW / 2, canvasH * 0.85);
  ctx.fillText('\uCD1D\uC810: ' + saveData.totalScore, canvasW / 2, canvasH * 0.90);

  ctx.restore();
}

/* Draw game over / clear screen */
function drawClearScreen(dt) {
  /* Semi-transparent overlay */
  ctx.fillStyle = 'rgba(10,10,15,0.85)';
  ctx.fillRect(0, 0, canvasW, canvasH);

  ctx.save();
  ctx.textAlign = 'center';

  /* Title */
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = CONFIG.COLORS.GOAL;
  ctx.shadowBlur = 15;
  ctx.fillStyle = CONFIG.COLORS.GOAL;
  ctx.fillText('STAGE CLEAR!', canvasW / 2, canvasH * 0.2);
  ctx.shadowBlur = 0;

  /* Score breakdown */
  const startY = canvasH * 0.35;
  const lineH = 24;
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.textAlign = 'left';
  const leftX = canvasW * 0.3;
  const rightX = canvasW * 0.7;

  ctx.fillText('\uAE30\uBCF8 \uC810\uC218', leftX, startY);
  ctx.textAlign = 'right'; ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.fillText(CONFIG.SCORE.STAGE_CLEAR_BASE + '', rightX, startY);

  ctx.textAlign = 'left'; ctx.fillStyle = '#8080a0';
  ctx.fillText('\uBCF4\uC11D (' + clearData.gems + '/' + currentLevel.gems.length + ')', leftX, startY + lineH);
  ctx.textAlign = 'right'; ctx.fillStyle = CONFIG.COLORS.GEM;
  ctx.fillText('+' + clearData.gemBonus, rightX, startY + lineH);

  ctx.textAlign = 'left'; ctx.fillStyle = '#8080a0';
  ctx.fillText('\uD0C0\uC784 \uBCF4\uB108\uC2A4', leftX, startY + lineH * 2);
  ctx.textAlign = 'right'; ctx.fillStyle = '#00d4ff';
  ctx.fillText('+' + clearData.timeBonus, rightX, startY + lineH * 2);

  ctx.textAlign = 'left'; ctx.fillStyle = '#8080a0';
  ctx.fillText('\uBB34\uC0AC\uB9DD \uBCF4\uB108\uC2A4', leftX, startY + lineH * 3);
  ctx.textAlign = 'right'; ctx.fillStyle = clearData.deathBonus > 0 ? '#00ff87' : '#505070';
  ctx.fillText('+' + clearData.deathBonus, rightX, startY + lineH * 3);

  /* Total */
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('\uCD1D\uC810: ' + clearData.score, canvasW / 2, startY + lineH * 5);

  /* Time */
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('\uD074\uB9AC\uC5B4 \uC2DC\uAC04: ' + clearData.time.toFixed(2) + 's', canvasW / 2, startY + lineH * 6);

  if (clearData.isNewBest) {
    ctx.fillStyle = CONFIG.COLORS.UI_ACCENT;
    ctx.shadowColor = CONFIG.COLORS.UI_ACCENT;
    ctx.shadowBlur = 10;
    ctx.fillText('\u2605 NEW BEST! \u2605', canvasW / 2, startY + lineH * 7);
    ctx.shadowBlur = 0;
  }

  /* Continue prompt */
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
    const isLast = currentWorld === 4 && currentStage === 4;
    ctx.fillText(isLast ? 'SPACE \uC744 \uB20C\uB7EC \uD0C0\uC774\uD2C0\uB85C' : 'SPACE \uC744 \uB20C\uB7EC \uB2E4\uC74C \uC2A4\uD14C\uC774\uC9C0', canvasW / 2, canvasH * 0.88);
  }

  ctx.restore();
}

/* Draw pause overlay */
function drawPause() {
  ctx.fillStyle = 'rgba(10,10,15,0.75)';
  ctx.fillRect(0, 0, canvasW, canvasH);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.fillText('PAUSED', canvasW / 2, canvasH * 0.4);
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('ESC / P \uB97C \uB20C\uB7EC \uACC4\uC18D', canvasW / 2, canvasH * 0.55);
  ctx.fillText('R \uD0A4\uB85C \uC2A4\uD14C\uC774\uC9C0 \uC7AC\uC2DC\uC791', canvasW / 2, canvasH * 0.62);
  ctx.restore();
}

/* ===== TOUCH CONTROLS ===== */
const touchBtns = {
  dpadL: { x: 10, y: 0, w: 52, h: 52 },
  dpadR: { x: 66, y: 0, w: 52, h: 52 },
  dpadD: { x: 38, y: 54, w: 52, h: 40 },
  btnA: { x: 0, y: 0, w: 56, h: 56 },
  btnB: { x: 0, y: 0, w: 48, h: 48 },
  btnPause: { x: 0, y: 0, w: 36, h: 36 }
};

/* Update touch button positions based on canvas size */
function updateTouchLayout() {
  const bh = canvasH - 70;
  touchBtns.dpadL.y = bh;
  touchBtns.dpadR.y = bh;
  touchBtns.dpadD.y = bh + 54;
  touchBtns.btnA.x = canvasW - 66;
  touchBtns.btnA.y = bh;
  touchBtns.btnB.x = canvasW - 120;
  touchBtns.btnB.y = bh - 5;
  touchBtns.btnPause.x = canvasW - 40;
  touchBtns.btnPause.y = 2;
}

/* Draw virtual touch controls */
function drawTouchControls() {
  if (!isTouchDevice) return;
  ctx.globalAlpha = 0.3;
  /* D-Pad */
  ctx.fillStyle = input.touch.left ? '#00ffcc' : '#3a3a5c';
  ctx.fillRect(touchBtns.dpadL.x, touchBtns.dpadL.y, touchBtns.dpadL.w, touchBtns.dpadL.h);
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\u25C0', touchBtns.dpadL.x + 26, touchBtns.dpadL.y + 32);

  ctx.fillStyle = input.touch.right ? '#00ffcc' : '#3a3a5c';
  ctx.fillRect(touchBtns.dpadR.x, touchBtns.dpadR.y, touchBtns.dpadR.w, touchBtns.dpadR.h);
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.fillText('\u25B6', touchBtns.dpadR.x + 26, touchBtns.dpadR.y + 32);

  ctx.fillStyle = input.touch.down ? '#00ffcc' : '#3a3a5c';
  ctx.fillRect(touchBtns.dpadD.x, touchBtns.dpadD.y, touchBtns.dpadD.w, touchBtns.dpadD.h);
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.fillText('\u25BC', touchBtns.dpadD.x + 26, touchBtns.dpadD.y + 24);

  /* Buttons */
  ctx.fillStyle = input.touch.jump ? '#00ffcc' : '#3a3a5c';
  ctx.beginPath();
  ctx.arc(touchBtns.btnA.x + 28, touchBtns.btnA.y + 28, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT; ctx.font = '14px sans-serif';
  ctx.fillText('A', touchBtns.btnA.x + 28, touchBtns.btnA.y + 33);

  if (player.hasDash) {
    ctx.fillStyle = input.touch.dash ? '#ff6b35' : '#3a3a5c';
    ctx.beginPath();
    ctx.arc(touchBtns.btnB.x + 24, touchBtns.btnB.y + 24, 24, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = CONFIG.COLORS.UI_TEXT; ctx.font = '12px sans-serif';
    ctx.fillText('B', touchBtns.btnB.x + 24, touchBtns.btnB.y + 28);
  }

  ctx.globalAlpha = 1;
}

/* Handle touch input events */
function handleTouch(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const prevJump = input.touch.jump;
  const prevDash = input.touch.dash;
  const prevPause = input.touch.pause;
  input.touch.left = false; input.touch.right = false; input.touch.down = false;
  input.touch.jump = false; input.touch.dash = false; input.touch.pause = false;

  if (e.type === 'touchend' && e.touches.length === 0) {
    input.touch.jumpJust = false; input.touch.dashJust = false;
    return;
  }

  for (let idx = 0; idx < e.touches.length; idx++) {
    const tx = (e.touches[idx].clientX - rect.left) * scaleX;
    const ty = (e.touches[idx].clientY - rect.top) * scaleY;
    /* Check D-pad */
    if (hitTest(tx, ty, touchBtns.dpadL)) input.touch.left = true;
    if (hitTest(tx, ty, touchBtns.dpadR)) input.touch.right = true;
    if (hitTest(tx, ty, touchBtns.dpadD)) input.touch.down = true;
    /* Check buttons */
    if (hitTestCircle(tx, ty, touchBtns.btnA.x + 28, touchBtns.btnA.y + 28, 32)) input.touch.jump = true;
    if (player.hasDash && hitTestCircle(tx, ty, touchBtns.btnB.x + 24, touchBtns.btnB.y + 24, 28)) input.touch.dash = true;
    if (hitTest(tx, ty, touchBtns.btnPause)) input.touch.pause = true;
    /* Title/clear: tap anywhere as jump */
    if (gameState === STATES.TITLE || gameState === STATES.CLEAR) input.touch.jump = true;
  }

  if (input.touch.jump && !prevJump) input.touch.jumpJust = true;
  if (input.touch.dash && !prevDash) input.touch.dashJust = true;
  if (input.touch.pause && !prevPause) input.touch.pauseJust = true;
}

/* Rectangle hit test */
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

/* Circle hit test */
function hitTestCircle(px, py, cx, cy, r) {
  return (px - cx) * (px - cx) + (py - cy) * (py - cy) <= r * r;
}

let isTouchDevice = false;

/* ===== MAIN RENDER ===== */
function render(dt) {
  ctx.clearRect(0, 0, canvasW, canvasH);

  if (gameState === STATES.TITLE) {
    drawTitle(dt);
  } else {
    /* Game world rendering */
    const ox = -camera.x + camera.shakeX;
    const oy = -camera.y + camera.shakeY;

    drawBackground(currentWorld, camera.x, camera.y);

    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));

    /* Viewport culling for tiles */
    const startCol = Math.max(0, Math.floor(camera.x / TS) - 1);
    const endCol = Math.min(currentLevel.width, Math.ceil((camera.x + canvasW) / TS) + 1);
    const startRow = Math.max(0, Math.floor(camera.y / TS) - 1);
    const endRow = Math.min(currentLevel.height, Math.ceil((camera.y + canvasH) / TS) + 1);

    /* Draw tiles */
    for (let row = startRow; row < endRow; row++) {
      for (let col = startCol; col < endCol; col++) {
        const t = currentLevel.tiles[row] ? currentLevel.tiles[row][col] : 0;
        if (t > 0) drawTile(col, row, t, currentWorld);
      }
    }

    /* Draw moving platforms */
    drawMovingPlatforms(currentLevel.movingPlatforms);

    /* Draw hazards */
    const animTime = Date.now();
    for (const h of currentLevel.hazards) drawHazard(h, animTime);

    /* Draw checkpoints */
    drawCheckpoints(currentLevel.checkpoints, animTime);

    /* Draw gems */
    drawGems(currentLevel.gems, animTime);

    /* Draw goal */
    drawGoal(currentLevel.goal, animTime);

    /* Draw player */
    drawPlayer(player, animTime);

    /* Draw particles */
    particles.forEach((part) => {
      ctx.globalAlpha = part.life / part.maxLife;
      ctx.fillStyle = part.color;
      ctx.fillRect(part.x - part.size/2, part.y - part.size/2, part.size, part.size);
    });
    ctx.globalAlpha = 1;

    ctx.restore();

    /* HUD */
    if (gameState === STATES.PLAY || gameState === STATES.DEAD) {
      drawHUD(currentWorld, currentStage, stageTimer, currentLevel);
    }

    /* Touch controls */
    drawTouchControls();

    /* State overlays */
    if (gameState === STATES.CLEAR) drawClearScreen(dt);
    if (gameState === STATES.PAUSE) drawPause();
  }

  /* Transition overlay */
  if (transitionOverlay.alpha > 0.01) {
    ctx.fillStyle = 'rgba(10,10,15,' + transitionOverlay.alpha.toFixed(3) + ')';
    ctx.fillRect(0, 0, canvasW, canvasH);
  }
}

/* ===== LOADING SCREEN ===== */
function drawLoading(progress) {
  ctx.fillStyle = CONFIG.COLORS.BG_PRIMARY;
  ctx.fillRect(0, 0, canvasW, canvasH);
  ctx.fillStyle = CONFIG.COLORS.UI_TEXT;
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('LOADING...', canvasW / 2, canvasH / 2 - 20);
  /* Progress bar */
  const barW = 200, barH = 6;
  const bx = canvasW / 2 - barW / 2;
  const by = canvasH / 2;
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = CONFIG.COLORS.PLAYER;
  ctx.fillRect(bx, by, barW * progress, barH);
}

/* ===== GAME LOOP ===== */
let lastTime = 0;
let running = false;

function gameLoop(timestamp) {
  if (!running) return;
  try {
    const dt = Math.min(timestamp - lastTime, 33.33);
    lastTime = timestamp;
    update(dt);
    render(dt);
  } catch (e) {
    console.error(e);
  }
  requestAnimationFrame(gameLoop);
}

/* ===== KEYBOARD EVENTS ===== */
window.addEventListener('keydown', (e) => {
  input.keyDown(e.code);
  /* Prevent scrolling */
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => { input.keyUp(e.code); });

/* ===== TOUCH EVENTS ===== */
canvas.addEventListener('touchstart', (e) => { isTouchDevice = true; handleTouch(e); }, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouch, { passive: false });

/* ===== INITIALIZATION ===== */
function init() {
  resizeCanvas();
  updateTouchLayout();
  loadSave();

  /* Start game loop */
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

/* Handle resize for touch layout */
window.addEventListener('resize', () => { resizeCanvas(); updateTouchLayout(); });

/* Start the game */
init();
</script>
</body>
