<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="40%" stop-color="#121230"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0d8ff"/>
      <stop offset="40%" stop-color="#b8a8e0"/>
      <stop offset="100%" stop-color="#1a1a3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.15"/>
