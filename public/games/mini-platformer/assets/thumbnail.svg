<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="towerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="50%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    <linearGradient id="platform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="playerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="pixelShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="0" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#towerBg)"/>
  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="30" cy="20" r="1"/><circle cx="80" cy="45" r="0.8"/>
    <circle cx="150" cy="15" r="1.2"/><circle cx="220" cy="35" r="0.7"/>
    <circle cx="300" cy="20" r="1"/><circle cx="360" cy="50" r="0.9"/>
    <circle cx="50" cy="70" r="0.6"/><circle cx="370" cy="30" r="1.1"/>
    <circle cx="190" cy="55" r="0.8"/><circle cx="110" cy="30" r="0.7"/>
  </g>
  <!-- Tower walls left -->
  <rect x="0" y="0" width="30" height="260" fill="url(#stone)" opacity="0.6"/>
  <g fill="#455A64" opacity="0.3">
    <rect x="0" y="0" width="30" height="20"/><rect x="0" y="22" width="30" height="20"/>
    <rect x="0" y="44" width="30" height="20"/><rect x="0" y="66" width="30" height="20"/>
    <rect x="0" y="88" width="30" height="20"/><rect x="0" y="110" width="30" height="20"/>
  </g>
  <!-- Tower walls right -->
  <rect x="370" y="0" width="30" height="260" fill="url(#stone)" opacity="0.6"/>
  <!-- Platform 1 (bottom) -->
  <rect x="50" y="210" width="120" height="12" rx="2" fill="url(#platform)" filter="url(#pixelShadow)"/>
  <rect x="50" y="210" width="120" height="3" fill="#795548" opacity="0.5"/>
  <!-- Platform 2 (middle-right) -->
  <rect x="230" y="165" width="110" height="12" rx="2" fill="url(#platform)" filter="url(#pixelShadow)"/>
  <rect x="230" y="165" width="110" height="3" fill="#795548" opacity="0.5"/>
  <!-- Platform 3 (middle-left) -->
  <rect x="70" y="120" width="100" height="12" rx="2" fill="url(#platform)" filter="url(#pixelShadow)"/>
  <rect x="70" y="120" width="100" height="3" fill="#795548" opacity="0.5"/>
  <!-- Platform 4 (top) -->
  <rect x="220" y="75" width="120" height="12" rx="2" fill="url(#platform)" filter="url(#pixelShadow)"/>
  <rect x="220" y="75" width="120" height="3" fill="#795548" opacity="0.5"/>
  <!-- Coins on platforms -->
  <g fill="#FFD54F" filter="url(#glow)">
    <circle cx="100" cy="200" r="6"/>
    <circle cx="120" cy="200" r="6"/>
    <circle cx="140" cy="200" r="6"/>
    <circle cx="270" cy="155" r="6"/>
    <circle cx="290" cy="155" r="6"/>
    <circle cx="260" cy="65" r="6"/>
    <circle cx="280" cy="65" r="6"/>
    <circle cx="300" cy="65" r="6"/>
  </g>
  <g fill="#FFF176" opacity="0.5">
    <circle cx="98" cy="198" r="2"/>
    <circle cx="118" cy="198" r="2"/>
    <circle cx="138" cy="198" r="2"/>
    <circle cx="268" cy="153" r="2"/>
    <circle cx="288" cy="153" r="2"/>
    <circle cx="258" cy="63" r="2"/>
    <circle cx="278" cy="63" r="2"/>
    <circle cx="298" cy="63" r="2"/>
  </g>
  <!-- Wall-jump trail particles (right wall) -->
  <g fill="#42A5F5" opacity="0.3">
    <rect x="360" y="130" width="4" height="4"/>
    <rect x="355" y="140" width="4" height="4" opacity="0.25"/>
    <rect x="358" y="150" width="4" height="4" opacity="0.2"/>
    <rect x="362" y="160" width="4" height="4" opacity="0.15"/>
  </g>
  <!-- Player character (pixel art style) -->
  <g transform="translate(220,140)" filter="url(#pixelShadow)">
    <!-- Jump motion lines -->
    <g stroke="#42A5F5" stroke-width="1.5" opacity="0.4">
      <line x1="0" y1="20" x2="-8" y2="30"/>
      <line x1="2" y1="22" x2="-2" y2="32"/>
      <line x1="4" y1="20" x2="8" y2="30"/>
    </g>
    <!-- Body -->
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="url(#playerGrad)"/>
    <!-- Eyes -->
    <rect x="-5" y="-5" width="4" height="4" fill="white"/>
    <rect x="1" y="-5" width="4" height="4" fill="white"/>
    <rect x="-4" y="-4" width="2" height="2" fill="#0D1B2A"/>
    <rect x="3" y="-4" width="2" height="2" fill="#0D1B2A"/>
    <!-- Cape -->
    <path d="M-8,0 L-16,10 L-10,8 L-8,8Z" fill="#F44336" opacity="0.8"/>
  </g>
  <!-- Spikes (hazard) -->
  <g fill="#F44336">
    <polygon points="55,222 60,215 65,222"/>
    <polygon points="65,222 70,215 75,222"/>
    <polygon points="75,222 80,215 85,222"/>
  </g>
  <!-- Arrow indicator pointing up -->
  <g transform="translate(350,45)" filter="url(#glow)">
    <polygon points="0,-15 10,0 5,0 5,10 -5,10 -5,0 -10,0" fill="#FFD54F" opacity="0.7"/>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="#42A5F5" opacity="0.5"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#42A5F5" filter="url(#glow)">Mini Platformer</text>
</svg>