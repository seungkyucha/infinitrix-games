<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="50%" stop-color="#121230"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="tPlayerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffdd"/>
      <stop offset="100%" stop-color="#00ccaa"/>
    </linearGradient>
    <linearGradient id="tGroundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a5c"/>
      <stop offset="100%" stop-color="#2a2a44"/>
    </linearGradient>
    <linearGradient id="tSpikeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#ff3366"/>
    </linearGradient>
    <radialGradient id="tNebula1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tNebula2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tGemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
