<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ff6688" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff3366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ff3366" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ff3366" stop-opacity="0.4"/>
      <stop offset="90%" stop-color="#ff3366" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff6688"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rayGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 외부 충격파 링 -->
  <circle cx="48" cy="48" r="44" fill="url(#hitRing)"/>
  <!-- 광선 방사 -->
  <g filter="url(#rayGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="4" stroke="#ff5577" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="80" y2="12" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="92" y2="32" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="92" y2="64" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="80" y2="84" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="48" y2="92" stroke="#ff5577" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="16" y2="84" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="4" y2="64" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="4" y2="32" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="16" y2="12" stroke="#ff5577" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- 코어 폭발 -->
  <g filter="url(#hitGlow)">
    <circle cx="48" cy="48" r="18" fill="url(#hitCore)"/>
    <!-- 파편 -->
    <path d="M48 30 L50 24 L46 24 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M60 36 L66 34 L64 38 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M66 48 L72 46 L72 50 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M60 60 L66 62 L64 58 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M48 66 L50 72 L46 72 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M36 60 L30 62 L32 58 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M30 48 L24 46 L24 50 Z" fill="url(#sparkCore)" opacity="0.8"/>
    <path d="M36 36 L30 34 L32 38 Z" fill="url(#sparkCore)" opacity="0.8"/>
  </g>
  <!-- 중심 플래시 -->
  <circle cx="48" cy="48" r="6" fill="#ffffff" opacity="0.9"/>
</svg>