<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ff6688" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff3366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ff1144" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff0033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#ff3366" stop-opacity="0"/>
      <stop offset="85%" stop-color="#ff6688" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6688" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </linearGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSoftGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#hitSoftGlow)">
    <circle cx="48" cy="48" r="44" fill="url(#shockwave)"/>
    <circle cx="48" cy="48" r="38" fill="none" stroke="#ff3366" stroke-width="1.5" opacity="0.3"/>
  </g>
  <g filter="url(#hitGlow)" opacity="0.7">
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(0, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(45, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(90, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(135, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(180, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(225, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(270, 48, 48)"/>
    <path d="M48 48 L48 4 L52 4 Z" fill="url(#rayGrad)" transform="rotate(315, 48, 48)"/>
  </g>
  <circle cx="48" cy="48" r="30" fill="url(#hitOuter)"/>
  <g filter="url(#hitGlow)">
    <circle cx="48" cy="48" r="18" fill="url(#hitCore)"/>
  </g>
  <g filter="url(#hitGlow)" opacity="0.8">
    <rect x="26" y="20" width="4" height="4" rx="1" fill="#ff6688" transform="rotate(30, 28, 22)"/>
    <rect x="66" y="24" width="3" height="3" rx="1" fill="#ff9999" transform="rotate(-20, 68, 26)"/>
    <rect x="18" y="52" width="3.5" height="3.5" rx="1" fill="#ff6688" transform="rotate(45, 20, 54)"/>
    <rect x="70" y="58" width="3" height="3" rx="1" fill="#ff9999" transform="rotate(-35, 72, 60)"/>
    <rect x="38" y="72" width="4" height="4" rx="1" fill="#ff6688" transform="rotate(15, 40, 74)"/>
    <rect x="58" y="14" width="3" height="3" rx="1" fill="#ffffff" transform="rotate(60, 60, 16)"/>
  </g>
</svg>
