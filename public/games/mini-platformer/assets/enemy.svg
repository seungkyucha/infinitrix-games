<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="spikeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="50%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#ff6688"/>
    </linearGradient>
    <linearGradient id="spikeEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc0044" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="dangerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="enemyEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ff9999"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#redSoftGlow)">
    <ellipse cx="32" cy="36" rx="24" ry="20" fill="url(#dangerGlow)"/>
  </g>
  <g filter="url(#redGlow)">
    <path d="M16 58 L10 38 L20 20 L32 8 L44 20 L54 38 L48 58 Z" fill="url(#spikeGrad)" stroke="#ff3366" stroke-width="1.2"/>
    <path d="M16 42 L2 36 L14 32 Z" fill="url(#spikeEdge)" stroke="#ff3366" stroke-width="0.8"/>
    <path d="M48 42 L62 36 L50 32 Z" fill="url(#spikeEdge)" stroke="#ff3366" stroke-width="0.8"/>
    <path d="M22 24 L8 14 L20 20 Z" fill="url(#spikeEdge)" stroke="#ff3366" stroke-width="0.8"/>
    <path d="M42 24 L56 14 L44 20 Z" fill="url(#spikeEdge)" stroke="#ff3366" stroke-width="0.8"/>
  </g>
  <path d="M22 52 L18 38 L26 24 L32 16 L38 24 L46 38 L42 52 Z" fill="#660022" opacity="0.4"/>
  <g filter="url(#redGlow)">
    <path d="M22 32 L26 28 L30 32 L26 35 Z" fill="#1a0011"/>
    <ellipse cx="26" cy="31.5" rx="2.5" ry="2" fill="url(#enemyEyeGlow)"/>
    <circle cx="26.5" cy="31" r="0.8" fill="#ffffff"/>
    <path d="M34 32 L38 28 L42 32 L38 35 Z" fill="#1a0011"/>
    <ellipse cx="38" cy="31.5" rx="2.5" ry="2" fill="url(#enemyEyeGlow)"/>
    <circle cx="38.5" cy="31" r="0.8" fill="#ffffff"/>
  </g>
  <path d="M20 28 L28 26" fill="none" stroke="#ff1144" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M44 28 L36 26" fill="none" stroke="#ff1144" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 42 L28 39 L32 43 L36 39 L40 42" fill="none" stroke="#ff1144" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
