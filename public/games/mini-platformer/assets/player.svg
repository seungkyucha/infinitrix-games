<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffdd"/>
      <stop offset="100%" stop-color="#00ccaa"/>
    </linearGradient>
    <linearGradient id="bodyEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#009977" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ccffee"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#88ffee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <rect x="12" y="8" width="40" height="50" rx="6" ry="6" fill="#00ffcc" opacity="0.15"/>
  </g>
  <g filter="url(#neonGlow)">
    <rect x="14" y="10" width="36" height="46" rx="5" ry="5" fill="url(#bodyGrad)" stroke="#00ffcc" stroke-width="1.5"/>
    <rect x="18" y="14" width="28" height="20" rx="3" ry="3" fill="url(#bodyEdge)" opacity="0.5"/>
    <ellipse cx="32" cy="38" rx="10" ry="8" fill="url(#coreGlow)"/>
  </g>
  <g filter="url(#neonGlow)">
    <ellipse cx="24" cy="26" rx="5" ry="5.5" fill="#1a1a2e"/>
    <ellipse cx="24" cy="26" rx="3.5" ry="4" fill="url(#eyeGlow)"/>
    <circle cx="25" cy="24.5" r="1.2" fill="#ffffff"/>
    <ellipse cx="40" cy="26" rx="5" ry="5.5" fill="#1a1a2e"/>
    <ellipse cx="40" cy="26" rx="3.5" ry="4" fill="url(#eyeGlow)"/>
    <circle cx="41" cy="24.5" r="1.2" fill="#ffffff"/>
  </g>
  <path d="M22 16 Q32 12 42 16" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.6"/>
  <g filter="url(#neonGlow)">
    <rect x="18" y="54" width="10" height="6" rx="2" ry="2" fill="#00ccaa" stroke="#00ffcc" stroke-width="0.8"/>
    <rect x="36" y="54" width="10" height="6" rx="2" ry="2" fill="#00ccaa" stroke="#00ffcc" stroke-width="0.8"/>
  </g>
  <path d="M27 34 Q32 38 37 34" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
