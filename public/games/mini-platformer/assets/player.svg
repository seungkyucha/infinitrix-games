<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffdd"/>
      <stop offset="100%" stop-color="#00cc99"/>
    </linearGradient>
    <radialGradient id="bodyGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eyeShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaffee"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 아우라 -->
  <rect x="8" y="6" width="48" height="52" rx="4" ry="4" fill="url(#bodyGlow)"/>
  <!-- 본체 사각형 (네온 민트) -->
  <g filter="url(#neonGlow)">
    <rect x="14" y="12" width="36" height="42" rx="3" ry="3" fill="url(#bodyGrad)" stroke="#00ffcc" stroke-width="1.5"/>
    <!-- 내부 장식 라인 -->
    <line x1="18" y1="18" x2="46" y2="18" stroke="#88ffd8" stroke-width="0.8" opacity="0.5"/>
    <line x1="18" y1="48" x2="46" y2="48" stroke="#88ffd8" stroke-width="0.8" opacity="0.5"/>
    <!-- 가슴 회로 패턴 -->
    <path d="M26 30 L32 26 L38 30 L38 36 L32 40 L26 36 Z" fill="none" stroke="#88ffee" stroke-width="0.7" opacity="0.6"/>
    <circle cx="32" cy="33" r="2" fill="#aaffee" opacity="0.8"/>
  </g>
  <!-- 왼쪽 눈 -->
  <g filter="url(#innerGlow)">
    <ellipse cx="24" cy="24" rx="4" ry="4.5" fill="#0a0a1a"/>
    <ellipse cx="25" cy="23" rx="2" ry="2.5" fill="url(#eyeShine)"/>
    <circle cx="23" cy="21.5" r="0.8" fill="#ffffff"/>
  </g>
  <!-- 오른쪽 눈 -->
  <g filter="url(#innerGlow)">
    <ellipse cx="40" cy="24" rx="4" ry="4.5" fill="#0a0a1a"/>
    <ellipse cx="41" cy="23" rx="2" ry="2.5" fill="url(#eyeShine)"/>
    <circle cx="39" cy="21.5" r="0.8" fill="#ffffff"/>
  </g>
  <!-- 발 (하단 좌우) -->
  <rect x="16" y="52" width="10" height="5" rx="2" ry="2" fill="#00cc99" opacity="0.8"/>
  <rect x="38" y="52" width="10" height="5" rx="2" ry="2" fill="#00cc99" opacity="0.8"/>
</svg>