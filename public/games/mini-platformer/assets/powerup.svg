<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ddff"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66eeff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0088dd" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="shieldAura" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shieldCore" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#33ddff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shieldSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#shieldSoftGlow)">
    <ellipse cx="24" cy="26" rx="22" ry="20" fill="url(#shieldAura)"/>
  </g>
  <g filter="url(#shieldGlow)">
    <path d="M24 4 C14 4 6 10 6 20 C6 32 16 42 24 46 C32 42 42 32 42 20 C42 10 34 4 24 4 Z" fill="url(#shieldGrad)" stroke="#00ccff" stroke-width="1.2"/>
    <path d="M24 10 C17 10 12 14 12 21 C12 30 19 37 24 40 C29 37 36 30 36 21 C36 14 31 10 24 10 Z" fill="url(#shieldInner)" stroke="#33ddff" stroke-width="0.6" opacity="0.8"/>
    <path d="M24 16 L26 22 L32 22 L27 26 L29 32 L24 28 L19 32 L21 26 L16 22 L22 22 Z" fill="#00ccff" opacity="0.6"/>
    <path d="M24 18 L25.5 22 L30 22 L26.5 25 L28 30 L24 27 L20 30 L21.5 25 L18 22 L22.5 22 Z" fill="#ffffff" opacity="0.4"/>
  </g>
  <ellipse cx="24" cy="24" rx="6" ry="6" fill="url(#shieldCore)"/>
  <g filter="url(#shieldGlow)" opacity="0.7">
    <circle cx="14" cy="14" r="1.2" fill="#ffffff"/>
    <circle cx="34" cy="12" r="1" fill="#66eeff"/>
    <circle cx="10" cy="28" r="0.8" fill="#ffffff"/>
    <circle cx="38" cy="30" r="1" fill="#66eeff"/>
  </g>
