<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee55"/>
      <stop offset="50%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00cc99"/>
    </linearGradient>
    <radialGradient id="powerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#00ffcc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffdd"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 글로우 아우라 -->
  <circle cx="24" cy="24" r="22" fill="url(#powerGlow)"/>
  <!-- 외곽 방패 형태 -->
  <g filter="url(#pGlow)">
    <path d="M24 4 C32 4 40 8 40 8 L40 22 C40 32 32 40 24 44 C16 40 8 32 8 22 L8 8 C8 8 16 4 24 4 Z"
          fill="url(#shieldGrad)" opacity="0.3" stroke="#00ffcc" stroke-width="1"/>
  </g>
  <!-- 번개 아이콘 (대시 파워업) -->
  <g filter="url(#pGlow)">
    <path d="M28 8 L18 24 L24 24 L20 40 L34 20 L26 20 Z"
          fill="url(#boltGrad)" stroke="#ffee88" stroke-width="0.5"/>
    <!-- 번개 하이라이트 -->
    <path d="M27 10 L22 20 L25 20 L24 26" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- 반짝이는 파티클 -->
  <g filter="url(#sparkle)" opacity="0.7">
    <path d="M10 10 L11 8 L12 10 L14 11 L12 12 L11 14 L10 12 L8 11 Z" fill="#ffffff"/>
    <path d="M36 12 L37 10 L38 12 L40 13 L38 14 L37 16 L36 14 L34 13 Z" fill="#ffffff"/>
    <path d="M38 34 L39 32 L40 34 L42 35 L40 36 L39 38 L38 36 L36 35 Z" fill="#ffffff"/>
    <path d="M8 32 L9 30 L10 32 L12 33 L10 34 L9 36 L8 34 L6 33 Z" fill="#ffffff"/>
  </g>
</svg>