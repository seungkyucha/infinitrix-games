<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#1a0e35"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00cc99" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="buildGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- 왼쪽 첫 번째 탑 실루엣 -->
  <g opacity="0.6">
    <path d="M40 600 L40 320 L55 300 L70 280 L85 300 L100 320 L100 600 Z" fill="url(#towerGrad)"/>
    <!-- 창문들 -->
    <rect x="55" y="350" width="8" height="12" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="75" y="380" width="8" height="12" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="55" y="420" width="8" height="12" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="75" y="460" width="8" height="12" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="55" y="500" width="8" height="12" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
  </g>
  <!-- 중앙 큰 탑 -->
  <g opacity="0.5">
    <path d="M300 600 L300 250 L320 220 L340 190 L360 220 L380 250 L380 600 Z" fill="url(#towerGrad)"/>
    <path d="M320 190 L340 160 L360 190" fill="#2a1a4e" stroke="#3a2a5e" stroke-width="0.5"/>
    <!-- 창문들 -->
    <rect x="320" y="270" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="350" y="300" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="320" y="340" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="350" y="380" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="320" y="420" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="350" y="460" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="320" y="510" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="350" y="550" width="10" height="15" rx="2" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <!-- 탑 꼭대기 랜턴 -->
    <circle cx="340" cy="165" r="15" fill="url(#lanternGlow)" filter="url(#softGlow)"/>
    <circle cx="340" cy="165" r="3" fill="#ffd700" opacity="0.8"/>
  </g>
  <!-- 오른쪽 폐허 탑 -->
  <g opacity="0.55">
    <path d="M600 600 L600 360 L615 340 L630 320 L640 310 L650 320 L665 340 L680 360 L680 600 Z" fill="url(#towerGrad)"/>
    <!-- 부서진 상단 -->
    <path d="M605 360 L610 345 L620 355 L630 330 L640 310 L650 325 L655 340 L665 350 L670 360" fill="none" stroke="#3a2a5e" stroke-width="1"/>
    <!-- 창문들 -->
    <rect x="620" y="390" width="9" height="13" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="650" y="420" width="9" height="13" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="620" y="460" width="9" height="13" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="650" y="500" width="9" height="13" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
    <rect x="620" y="540" width="9" height="13" rx="1" fill="url(#windowGlow)" filter="url(#buildGlow)"/>
  </g>
  <!-- 중간 작은 구조물들 -->
  <g opacity="0.4">
    <rect x="170" y="480" width="60" height="120" rx="2" fill="#1a0e35"/>
    <rect x="182" y="500" width="7" height="10" rx="1" fill="url(#windowGlow)" opacity="0.5"/>
    <rect x="200" y="520" width="7" height="10" rx="1" fill="url(#windowGlow)" opacity="0.5"/>
    <rect x="500" y="510" width="50" height="90" rx="2" fill="#1a0e35"/>
    <rect x="512" y="530" width="6" height="9" rx="1" fill="url(#windowGlow)" opacity="0.5"/>
    <rect x="530" y="550" width="6" height="9" rx="1" fill="url(#windowGlow)" opacity="0.5"/>
  </g>
  <!-- 떠다니는 파티클 -->
  <g opacity="0.3" filter="url(#softGlow)">
    <circle cx="150" cy="350" r="2" fill="#00ffcc"/>
    <circle cx="250" cy="400" r="1.5" fill="#e0b0ff"/>
    <circle cx="450" cy="300" r="2" fill="#00ffcc"/>
    <circle cx="550" cy="380" r="1.5" fill="#e0b0ff"/>
    <circle cx="720" cy="300" r="2" fill="#ffd700"/>
    <circle cx="400" cy="500" r="1.5" fill="#00ffcc"/>
  </g>
  <!-- 지면 -->
  <path d="M0 580 Q100 570 200 575 Q300 568 400 572 Q500 565 600 570 Q700 575 800 568 L800 600 L0 600 Z" fill="#1a0e35" opacity="0.6"/>
</svg>