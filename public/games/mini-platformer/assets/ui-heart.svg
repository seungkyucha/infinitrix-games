<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6699"/>
      <stop offset="100%" stop-color="#cc0044"/>
    </linearGradient>
    <radialGradient id="heartGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <path d="M16 28 C6 20 2 14 2 9 C2 5 5 2 9 2 C12 2 14 4 16 7 C18 4 20 2 23 2 C27 2 30 5 30 9 C30 14 26 20 16 28 Z"
        fill="url(#heartGlow)"/>
  <!-- 하트 본체 -->
  <g filter="url(#hGlow)">
    <path d="M16 26 C8 19 4 14 4 10 C4 6.5 6.5 4 9.5 4 C11.5 4 13.5 5.5 16 8 C18.5 5.5 20.5 4 22.5 4 C25.5 4 28 6.5 28 10 C28 14 24 19 16 26 Z"
          fill="url(#heartGrad)" stroke="#ff88aa" stroke-width="0.5"/>
    <!-- 하이라이트 -->
    <path d="M10 8 Q11 6 13 7 Q12 9 10 8 Z" fill="#ffaacc" opacity="0.7"/>
    <!-- 네온 테두리 내부선 -->
    <path d="M16 23 C10 18 7 14 7 11 C7 8.5 8.5 7 10 7 C11.5 7 13 8 16 11 C19 8 20.5 7 22 7 C23.5 7 25 8.5 25 11 C25 14 22 18 16 23 Z"
          fill="none" stroke="#ff99bb" stroke-width="0.3" opacity="0.5"/>
  </g>
</svg>