// State transition with tween (F21 — single definition of beginTransition)
function beginTransition(fromState, toState, duration) {
  if(transitioning && STATE_PRIORITY[toState] <= STATE_PRIORITY[pendingState]) return; // Priority guard (F6)
  transitioning = true;
  pendingState = toState;
  const proxy1 = { a: 0 };
  transitionProxy = proxy1;
  TW.add(proxy1, { a: 1 }, duration/2 || 200, 'easeIn', () => {
    // Guard: only execute if this is still the active transition (F5)
    if(pendingState !== toState) return;
    transitionAlpha = 1;
    enterState(toState);
    const proxy2 = { a: 1 };
    transitionProxy = proxy2;
    TW.add(proxy2, { a: 0 }, duration/2 || 200, 'easeOut', () => {
      if(pendingState !== toState) return;
      transitionAlpha = 0;
      transitioning = false;
    });
  });
}

// Enter state — setup for new state
function enterState(newState) {
  G.prevState = G.state;
  G.state = newState;

  switch(newState) {
    case 'TITLE':
      G.titleTimer = 0;
      G.menuSel = 0;
      SND.startBGM('title');
      break;
    case 'MAP':
      G.mapSel = [G.currentBiome, 0];
      break;
    case 'UPGRADE':
      G.upgradeSel = [0, 0];
      break;
    case 'STAGE_INTRO':
      G.introTimer = 0;
      break;
    case 'DIVING':
      initStage();
      const biome = G.currentBiome;
      SND.startBGM(biome >= 3 ? 'deep' : 'dive');
      break;
    case 'BOSS':
      initBossStage();
      SND.startBGM('boss');
      break;
    case 'CUTSCENE':
      G.cutsceneTimer = 0;
      break;
    case 'GAMEOVER':
      G.gameoverTimer = 0;
      G.camShake = 15;
      G.consecutiveDeaths++;
      G.ddaLevel = G.consecutiveDeaths >= 10 ? 3 : G.consecutiveDeaths >= 5 ? 2 : G.consecutiveDeaths >= CONFIG.DDA_TRIGGER ? 1 : 0;
      SND.sfxDeath();
      spawnParticles(G.particles, G.px, G.py, 'death', 20, RNG);
      break;
    case 'VICTORY':
      G.victoryTimer = 0;
      G.consecutiveDeaths = 0;
      G.ddaLevel = 0;
      G.stageClearing = false;
      awardStageScore();
      SND.sfxGate();
      break;
    case 'PAUSE':
      G.menuSel = 0;
      break;
    case 'MODAL':
      G.menuSel = 0;
      break;
  }
}

// Initialize a regular stage (or hidden stage when biome >= 5)
function initStage() {
  const biome = G.currentBiome;
  const stage = G.stageInBiome;
  const isHidden = biome >= 5;
  const seed = G.baseSeed ^ (biome * 1000 + stage * 100 + G.attemptCount);
  RNG = new SeededRNG(seed);

  // Hidden stages use mixed biome mechanics
  const genBiome = isHidden ? Math.min(4, stage + 2) : biome; // H-1→biome2, H-2→biome3, H-3→biome4
  const level = generateStage(genBiome, stage, RNG, G.ddaLevel, G.upgrades);
  G.level = level;
  G.level.biome = isHidden ? genBiome : biome;
  G.px = level.startX;
  G.py = level.startY;
  G.pvx = 0; G.pvy = 0;

  if(isHidden) {
    G.oxygen = CONFIG.HIDDEN_O2 * (1 + (G.ddaLevel>=1 ? CONFIG.DDA_O2_BONUS : 0));
  } else {
    G.oxygen = CONFIG.O2_TIME[biome] * (1 + (G.ddaLevel>=1 ? CONFIG.DDA_O2_BONUS : 0));
  }
  G.maxOxygen = G.oxygen;
  G.pressure = CONFIG.PRESS_HP * (1 + CONFIG.UPGRADE_PRESS[Math.min(G.upgrades.pressure, 4)] || 0);
  G.invincible = 1000; // Brief invincibility on start
  G.stageScore = 0;
  G.stageDied = false;
  G.stageClearing = false;
  G.controlsReversed = false;
  G.warpTimer = 0;
  G.toolCooldown = 0;
  G.toolActive = 0;
  G.particles = [];
  G.boss = null;
  // Camera to start position
  G.camX = G.px - screenW/2;
  G.camY = G.py - screenH/2;
  G.camTargetX = G.camX;
  G.camTargetY = G.camY;
  G.camZoom = 1.0;
}

// Initialize boss stage
function initBossStage() {
  const bossId = G.currentBiome;
  const seed = G.baseSeed ^ (bossId * 9999 + G.attemptCount);
  RNG = new SeededRNG(seed);
  const arena = generateBossArena(bossId, RNG);
  G.level = {
    tiles: arena.tiles, traps: [], currents: [], bubbles: [],
    boosts: [], clue: null,
    startX: arena.startX, startY: arena.startY,
    exitX: arena.startX, exitY: arena.startY,
    biome: G.currentBiome, stage: -1,
    bgColor: CONFIG.COL_BG[G.currentBiome],
  };
  G.px = arena.startX; G.py = arena.startY;
  G.pvx = 0; G.pvy = 0;
  G.oxygen = CONFIG.O2_TIME[G.currentBiome] * 1.5;
  G.maxOxygen = G.oxygen;
  G.pressure = CONFIG.PRESS_HP * (1 + (CONFIG.UPGRADE_PRESS[Math.min(G.upgrades.pressure,4)]||0));
  G.invincible = 2000;
  G.bossHitCount = 0;
  G.stageClearing = false;
  G.particles = [];
  G.boss = createBoss(bossId);
  G.boss.x = arena.bossX;
  G.boss.y = arena.bossY;
  G.camX = G.px - screenW/2;
  G.camY = G.py - screenH/2;
}

// Award score for stage clear
function awardStageScore() {
  const biome = G.currentBiome;
  const stage = G.stageInBiome;
  let score = CONFIG.SCORE_CLEAR * (biome + 1);
  score += (G.oxygen|0) * CONFIG.SCORE_O2_BONUS;
  if(!G.stageDied) score += CONFIG.SCORE_NO_DEATH;
  G.stageScore = score;
  G.score += score;
  G.totalScore += score;

  // Track O2 percentage at clear for H-1 unlock
  const o2Pct = G.oxygen / G.maxOxygen;
  G.stageO2Percent[biome+'-'+stage] = o2Pct;

  // Track biome 4 no-death for H-2 unlock
  if(biome === 3) {
    if(G.stageDied) G.biome4StageDied[stage] = true;
    else G.biome4NoDeath[stage] = true;
  }

  // Judge first, save after (F8)
  const isNewBest = G.score > G.bestScore;
  if(isNewBest) G.bestScore = G.score;
  G.upgradePoints += 1;

  // Check hidden unlocks after score award
  checkHiddenUnlocks(G);

  saveGame(G);
}

// Award boss defeat
function awardBossDefeat(bossId) {
  if(G.bossRewardGiven[bossId]) return; // F17 guard
  G.bossRewardGiven[bossId] = true;
  G.bossDefeated[bossId] = true;
  G.score += CONFIG.SCORE_BOSS * (bossId + 1);
  if(G.bossHitCount === 0) G.score += CONFIG.SCORE_BOSS_NOHIT;
  G.upgradePoints += 5;
  // Unlock tool
  if(bossId < 5) G.tools[bossId] = true;
  if(G.currentTool < 0) G.currentTool = bossId;
  // Judge first, save after (F8)
  const isNewBest = G.score > G.bestScore;
  if(isNewBest) G.bestScore = G.score;
  G.totalScore += CONFIG.SCORE_BOSS * (bossId + 1);
  saveGame(G);
}

// ── Update Logic per State ──

function updateBoot(dt) {
  G.bootTimer += dt;
  if(G.bootTimer > 1500) beginTransition('BOOT', 'TITLE', 600);
}

function updateTitle(dt, time) {
  G.titleTimer += dt;
  // Menu navigation
  if(INPUT.justPressed['ArrowDown'] || INPUT.justPressed['KeyS']) G.menuSel = (G.menuSel+1)%3;
  if(INPUT.justPressed['ArrowUp'] || INPUT.justPressed['KeyW']) G.menuSel = (G.menuSel+2)%3;
  // Language toggle
  if(INPUT.justPressed['KeyL']) G.lang = G.lang==='ko'?'en':'ko';
  if(INPUT.confirm() || INPUT.touches.length > 0) {
    INPUT.consumeClick();
    if(G.menuSel === 0) { // Start / Continue
      beginTransition('TITLE', 'MAP', 400);
    } else if(G.menuSel === 1) { // Language
      G.lang = G.lang==='ko'?'en':'ko';
      saveGame(G);
    } else if(G.menuSel === 2) { // Credits (no-op for now)
    }
  }
}

function updateMap(dt) {
  const L = LANG[G.lang];
  // Max accessible biome (0=always, 1-4 need previous boss defeated, 5=hidden)
  const maxBiome = G.bossDefeated.filter(b=>b).length;
  const hasHidden = G.hiddenUnlocked.some(h=>h);
  const maxBiomeIdx = hasHidden ? 5 : Math.min(4, maxBiome);

  // Navigate biomes (0-4 normal, 5=hidden)
  if(INPUT.justPressed['ArrowRight']||INPUT.justPressed['KeyD']) {
    G.mapSel[0] = Math.min(G.mapSel[0]+1, maxBiomeIdx);
    G.mapSel[1] = 0;
  }
  if(INPUT.justPressed['ArrowLeft']||INPUT.justPressed['KeyA']) { G.mapSel[0] = Math.max(0, G.mapSel[0]-1); G.mapSel[1]=0; }

  // Navigate stages within biome
  const maxStage = G.mapSel[0] === 5 ? (G.hiddenUnlocked.filter(h=>h).length - 1) : 3; // 0-2 stages + boss or hidden stages
  if(INPUT.justPressed['ArrowDown']||INPUT.justPressed['KeyS']) G.mapSel[1] = Math.min(G.mapSel[1]+1, Math.max(0, maxStage));
  if(INPUT.justPressed['ArrowUp']||INPUT.justPressed['KeyW']) G.mapSel[1] = Math.max(0, G.mapSel[1]-1);

  // Select stage
  if(INPUT.confirm()) {
    INPUT.consumeClick();
    if(G.mapSel[0] === 5) {
      // Hidden stage selection
      const hiddenIdx = getUnlockedHiddenIndex(G.mapSel[1]);
      if(hiddenIdx >= 0) {
        G.currentBiome = 5; // Use special biome 5 for hidden
        G.stageInBiome = hiddenIdx;
        G.currentStage = 15 + hiddenIdx; // Stages 15-17 = hidden
        G.attemptCount = 0;
        beginTransition('MAP', 'STAGE_INTRO', 400);
      }
    } else {
      G.currentBiome = G.mapSel[0];
      if(G.mapSel[1] < 3) {
        G.stageInBiome = G.mapSel[1];
        G.currentStage = G.currentBiome*3 + G.stageInBiome;
        G.attemptCount = 0;
        beginTransition('MAP', 'STAGE_INTRO', 400);
      } else {
        // Boss stage
        if(G.mapSel[0] <= maxBiome) {
          beginTransition('MAP', 'BOSS', 400);
        }
      }
    }
  }
  // Upgrade screen
  if(INPUT.justPressed['KeyU'] || INPUT.justPressed['KeyX']) {
    beginTransition('MAP', 'UPGRADE', 300);
  }
  // Back to title
  if(INPUT.pause()) {
    beginTransition('MAP', 'TITLE', 400);
  }
}

// Helper: get the actual hidden stage index for the Nth unlocked hidden
function getUnlockedHiddenIndex(selIdx) {
  let count = 0;
  for(let i=0;i<3;i++) {
    if(G.hiddenUnlocked[i]) {
      if(count === selIdx) return i;
      count++;
    }
  }
  return -1;
}

function updateUpgrade(dt) {
  // Navigate
  if(INPUT.justPressed['ArrowRight']||INPUT.justPressed['KeyD']) G.upgradeSel[0] = Math.min(2, G.upgradeSel[0]+1);
  if(INPUT.justPressed['ArrowLeft']||INPUT.justPressed['KeyA']) G.upgradeSel[0] = Math.max(0, G.upgradeSel[0]-1);
  if(INPUT.justPressed['ArrowDown']||INPUT.justPressed['KeyS']) G.upgradeSel[1] = Math.min(4, G.upgradeSel[1]+1);
  if(INPUT.justPressed['ArrowUp']||INPUT.justPressed['KeyW']) G.upgradeSel[1] = Math.max(0, G.upgradeSel[1]-1);

  // Purchase
  if(INPUT.confirm()) {
    INPUT.consumeClick();
    const tree = G.upgradeSel[0];
    const level = G.upgradeSel[1];
    const key = ['pressure','speed','detect'][tree];
    if(G.upgrades[key] === level) {
      const cost = CONFIG.UPGRADE_COST[level];
      if(G.upgradePoints >= cost) {
        G.upgradePoints -= cost;
        G.upgrades[key]++;
        saveGame(G);
        SND.sfxCollect();
      }
    }
  }
  if(INPUT.pause()) beginTransition('UPGRADE', 'MAP', 300);
}

function updateStageIntro(dt) {
  G.introTimer += dt;
  if(G.introTimer > 2000 || INPUT.confirm()) {
    INPUT.consumeClick();
    beginTransition('STAGE_INTRO', 'DIVING', 400);
  }
}

function updateDiving(dt, time) {
  if(G.stageClearing) return; // Guard flag (F5)
  const level = G.level;
  if(!level) return;

  const biome = G.currentBiome;
  const envMod = getEnvironmentMod(biome, time);
  const depthFactor = getDepthFactor(biome, G.upgrades.speed);

  // Input direction (with warp reversal)
  let inputDir = 0;
  if(INPUT.left()) inputDir -= 1;
  if(INPUT.right()) inputDir += 1;

  let upHold = INPUT.up();
  let downHold = INPUT.down();

  // §3.2 Mouse click → move toward click direction
  if(INPUT.mouseDown) {
    const mdx = INPUT.mouseX - (G.px - G.camX);
    const mdy = INPUT.mouseY - (G.py - G.camY);
    if(Math.abs(mdx) > 10) inputDir += mdx > 0 ? 1 : -1;
    if(mdy < -10) upHold = true;
    else if(mdy > 10) downHold = true;
  }

  if(G.controlsReversed) { inputDir *= -1; const tmp=upHold; upHold=downHold; downHold=tmp; }

  // Gravity reverse for biome 4
  let gravMod = 1;
  if(envMod.gravityReverse) gravMod = -1;

  // Physics
  const phys = applyPhysics(G.px, G.py, G.pvx, G.pvy, inputDir, upHold, downHold, depthFactor * (envMod.speedMult||1), dt);
  // Apply currents
  const currMod = applyCurrents(phys.vx, phys.vy, level.currents, phys.x, phys.y, biome, dt);
  phys.vx = currMod.vx; phys.vy = currMod.vy;

  // Tile collision
  const pw = G.playerSize*2, ph = G.playerSize*2;
  const resolved = resolveTileCollision(phys.x-pw/2, phys.y-ph/2, pw, ph,
    level.tiles, CONFIG.TILE, CONFIG.TILE, CONFIG.LEVEL_W, CONFIG.LEVEL_H);
  G.px = resolved.x + pw/2;
  G.py = resolved.y + ph/2;
  G.pvx = phys.vx;
  G.pvy = phys.vy;

  // Pose
  if(Math.abs(inputDir)>0) { G.pose = inputDir<0?'left':'right'; G.facing=inputDir; }
  else if(upHold) G.pose = 'up';
  else if(downHold) G.pose = 'down';
  else G.pose = 'idle';

  // Oxygen drain
  const o2Mult = envMod.o2Mult || 1;
  const ddaPressReduce = G.ddaLevel >= 2 ? CONFIG.DDA_PRESS_REDUCE : 1;
  G.oxygen -= (dt/1000) * o2Mult;
  if(G.oxygen <= 0) { G.oxygen = 0; handleDeath(); return; }

  // Pressure damage (hidden stages use HIDDEN_PRESS_DMG)
  const pressDmg = (biome >= 5 ? CONFIG.HIDDEN_PRESS_DMG : (CONFIG.PRESS_DMG[biome]||0)) * ddaPressReduce;
  if(pressDmg > 0) {
    G.pressure -= pressDmg * (dt/1000);
    if(G.pressure <= 0) { G.pressure = 0; handleDeath(); return; }
  }

  // Invincibility timer
  if(G.invincible > 0) G.invincible -= dt;

  // Tool cooldown
  if(G.toolCooldown > 0) G.toolCooldown -= dt;
  if(G.toolActive > 0) G.toolActive -= dt;

  // Tool use
  if(INPUT.toolUse() && G.currentTool >= 0 && G.tools[G.currentTool] && G.toolCooldown <= 0) {
    G.toolCooldown = CONFIG.TOOL_CD[G.currentTool] * 1000;
    G.toolActive = CONFIG.TOOL_DUR[G.currentTool] * 1000;
    G.toolActiveType = G.currentTool;
    SND.sfxTool();
  }
  // Tool switch
  if(INPUT.toolSwitch()) {
    let next = G.currentTool + 1;
    for(let i=0;i<6;i++) { const idx = (next+i)%6; if(G.tools[idx]) { G.currentTool=idx; break; } }
  }

  // Warp zone check
  if(isInWarpZone(level.traps, G.px-pw/2, G.py-ph/2, pw, ph)) {
    if(!G.controlsReversed) { G.controlsReversed=true; G.warpTimer=3000; }
  }
  if(G.warpTimer > 0) { G.warpTimer -= dt; if(G.warpTimer<=0) G.controlsReversed=false; }

  // Update traps
  for(let i=0;i<level.traps.length;i++) {
    level.traps[i] = updateTrap(level.traps[i], G.px, G.py, biome, dt, time);
  }

  // Trap collision
  if(G.invincible <= 0) {
    for(const trap of level.traps) {
      if(trap.type === TRAP.WARP) continue; // Warp doesn't kill
      if(checkTrapHit(trap, G.px-pw/2, G.py-ph/2, pw, ph)) {
        handleDeath();
        return;
      }
    }
  }

  // Collectibles
  for(const b of level.bubbles) {
    if(!b.collected && dist(G.px, G.py, b.x+CONFIG.TILE/2, b.y+CONFIG.TILE/2) < CONFIG.TILE) {
      b.collected = true;
      if(b.type === 'o2') { G.oxygen = Math.min(G.maxOxygen, G.oxygen + 10); }
      SND.sfxCollect();
      spawnParticles(G.particles, b.x, b.y, 'collect', 5, RNG);
      addScorePopup(b.x, b.y, 100);
      G.score += 100;
    }
  }
  // Clue
  if(level.clue && !level.clue.collected && dist(G.px, G.py, level.clue.x+CONFIG.TILE/2, level.clue.y+CONFIG.TILE/2) < CONFIG.TILE) {
    level.clue.collected = true;
    if(!G.clues[level.clue.id]) {
      G.clues[level.clue.id] = true;
      G.cluesCollected++;
      G.score += CONFIG.SCORE_CLUE;
      SND.sfxCollect();
      spawnParticles(G.particles, level.clue.x, level.clue.y, 'collect', 10, RNG);
      addScorePopup(level.clue.x, level.clue.y, CONFIG.SCORE_CLUE);
      // Show narrative text
      const narrativeSet = NARRATIVE_DATA[G.lang] || NARRATIVE_DATA.ko;
      showNarrative(narrativeSet[level.clue.id] || LANG[G.lang].clue_found);
      // Check hidden unlocks
      const hidden = checkHiddenUnlocks(G);
      if(hidden >= 0) showNarrative(LANG[G.lang].hidden_unlock);
    }
  }
  // Boost pads
  for(const b of level.boosts) {
    if(dist(G.px, G.py, b.x+CONFIG.TILE/2, b.y+CONFIG.TILE/2) < CONFIG.TILE) {
      G.pvy = -CONFIG.MAX_VY * 0.8;
      spawnParticles(G.particles, b.x, b.y, 'bubble', 5, RNG);
    }
  }

  // Exit gate check
  if(dist(G.px, G.py, level.exitX+CONFIG.TILE, level.exitY+CONFIG.TILE) < CONFIG.TILE*1.5) {
    G.stageClearing = true; // Guard flag (F5)
    if(G.currentBiome >= 5) {
      // Hidden stage — always go to victory then back to map
      G.score += CONFIG.SCORE_HIDDEN;
      beginTransition('DIVING', 'VICTORY', 500);
    } else if(G.stageInBiome >= 2) {
      // All 3 stages done, go to boss
      if(!G.bossDefeated[G.currentBiome]) {
        beginTransition('DIVING', 'BOSS', 500);
      } else {
        beginTransition('DIVING', 'VICTORY', 500);
      }
    } else {
      beginTransition('DIVING', 'VICTORY', 500);
    }
  }

  // Camera follow
  updateCamera(dt);

  // Swim sound
  if(Math.abs(inputDir) > 0 && ((time/300)|0)%2===0) {
    // Occasional swim sound (throttled)
  }

  // Pause
  if(INPUT.pause()) beginTransition('DIVING', 'PAUSE', 0);

  // Instant retry
  if(INPUT.retry()) {
    G.attemptCount++;
    G.stageClearing = false;
    beginTransition('DIVING', 'DIVING', 300);
  }

  // Ambient particles
  if(RNG.chance(0.05)) {
    spawnParticles(G.particles, G.px + RNG.range(-screenW/2,screenW/2), G.py + RNG.range(-screenH/2, screenH/2), 'biolum', 1, RNG);
  }
}

function updateBossState(dt, time) {
  if(!G.boss || G.boss.defeated) return;
  if(G.stageClearing) return; // Guard (F5)

  const biome = G.currentBiome;
  const depthFactor = getDepthFactor(biome, G.upgrades.speed);
  const envMod = getEnvironmentMod(biome, time);

  // Player movement (same as diving)
  let inputDir = 0;
  if(INPUT.left()) inputDir -= 1;
  if(INPUT.right()) inputDir += 1;
  let upHold = INPUT.up(), downHold = INPUT.down();

  const phys = applyPhysics(G.px, G.py, G.pvx, G.pvy, inputDir, upHold, downHold, depthFactor, dt);
  const pw = G.playerSize*2, ph = G.playerSize*2;
  const resolved = resolveTileCollision(phys.x-pw/2, phys.y-ph/2, pw, ph,
    G.level.tiles, CONFIG.TILE, CONFIG.TILE, G.level.tiles[0].length, G.level.tiles.length);
  G.px = resolved.x + pw/2;
  G.py = resolved.y + ph/2;
  G.pvx = phys.vx; G.pvy = phys.vy;

  // Pose
  if(inputDir!==0) { G.pose=inputDir<0?'left':'right'; G.facing=inputDir; }
  else if(upHold) G.pose='up';
  else G.pose='idle';

  // Invincibility
  if(G.invincible > 0) G.invincible -= dt;
  // Tool cooldown
  if(G.toolCooldown > 0) G.toolCooldown -= dt;
  if(G.toolActive > 0) G.toolActive -= dt;

  // Tool use
  if(INPUT.toolUse() && G.currentTool>=0 && G.tools[G.currentTool] && G.toolCooldown<=0) {
    G.toolCooldown = CONFIG.TOOL_CD[G.currentTool]*1000;
    G.toolActive = CONFIG.TOOL_DUR[G.currentTool]*1000;
    G.toolActiveType = G.currentTool;
    SND.sfxTool();
  }
  if(INPUT.toolSwitch()) {
    let next=G.currentTool+1;
    for(let i=0;i<6;i++){const idx=(next+i)%6;if(G.tools[idx]){G.currentTool=idx;break;}}
  }

  // Update boss
  G.boss = updateBoss(G.boss, G.px, G.py, dt, time, RNG, biome);

  // Boss collision with player
  if(G.invincible <= 0 && checkBossHit(G.boss, G.px-pw/2, G.py-ph/2, pw, ph)) {
    G.bossHitCount++;
    handleDeath();
    return;
  }

  // Player attacks boss (when vulnerable and close)
  if(G.boss.vulnerable) {
    const bDist = dist(G.px, G.py, G.boss.x, G.boss.y);
    if(bDist < 60) {
      // Auto-attack when close to vulnerable boss
      G.boss.hp -= 2 * (dt/16.67);
      G.boss.flashTimer = 100;
      if(((time/200)|0)%3===0) SND.sfxHit();
      spawnParticles(G.particles, G.boss.x, G.boss.y, 'hit', 1, RNG);
    }
    // Tool enhancement
    if(G.toolActive > 0) {
      if(G.toolActiveType === 1) G.boss.hp -= 1*(dt/16.67); // Shock bonus
    }
  }

  // Boss defeated
  if(G.boss.hp <= 0 && !G.boss.defeated) {
    G.boss.defeated = true;
    G.stageClearing = true; // Guard (F5)
    awardBossDefeat(G.boss.id);
    spawnParticles(G.particles, G.boss.x, G.boss.y, 'hit', 30, RNG);
    SND.sfxBossAppear(); // Victory sound
    beginTransition('BOSS', 'CUTSCENE', 600);
  }

  // Oxygen
  G.oxygen -= dt/1000;
  if(G.oxygen <= 0) { handleDeath(); return; }

  updateCamera(dt);
  if(INPUT.pause()) beginTransition('BOSS', 'PAUSE', 0);
  if(INPUT.retry()) { G.attemptCount++; G.stageClearing=false; beginTransition('BOSS', 'BOSS', 300); }
}

function handleDeath() {
  G.stageDied = true;
  spawnParticles(G.particles, G.px, G.py, 'death', 15, RNG);
  beginTransition(G.state, 'GAMEOVER', 400);
}

function updateGameOver(dt) {
  G.gameoverTimer += dt;
  // Screen shake decay
  if(G.camShake > 0) G.camShake *= 0.95;
  // Retry
  if(INPUT.retry() || (G.gameoverTimer > 500 && INPUT.confirm())) {
    INPUT.consumeClick();
    G.attemptCount++;
    G.stageClearing = false;
    const target = G.boss ? 'BOSS' : 'DIVING';
    beginTransition('GAMEOVER', target, 300);
  }
  // Back to title
  if(INPUT.pause()) {
    beginTransition('GAMEOVER', 'TITLE', 400);
  }
}

function updateVictory(dt) {
  G.victoryTimer += dt;
  if(G.victoryTimer > 2500 || (G.victoryTimer > 800 && INPUT.confirm())) {
    INPUT.consumeClick();
    if(G.currentBiome >= 5) {
      // Hidden stage — return to map
      beginTransition('VICTORY', 'MAP', 400);
    } else if(G.stageInBiome < 2) {
      // Advance to next stage
      G.stageInBiome++;
      G.currentStage++;
      beginTransition('VICTORY', 'MAP', 400);
    } else {
      // Biome complete
      beginTransition('VICTORY', 'MAP', 400);
    }
  }
}

function updateCutscene(dt) {
  G.cutsceneTimer += dt;
  if(G.cutsceneTimer > 3000 || INPUT.confirm()) {
    INPUT.consumeClick();
    beginTransition('CUTSCENE', 'VICTORY', 400);
  }
}

function updatePause(dt) {
  if(INPUT.justPressed['ArrowDown']||INPUT.justPressed['KeyS']) G.menuSel=(G.menuSel+1)%3;
  if(INPUT.justPressed['ArrowUp']||INPUT.justPressed['KeyW']) G.menuSel=(G.menuSel+2)%3;
  if(INPUT.pause()) { // Resume
    G.state = G.prevState; transitioning=false; transitionAlpha=0;
    return;
  }
  if(INPUT.confirm()) {
    INPUT.consumeClick();
    if(G.menuSel===0) { // Resume
      G.state = G.prevState; transitioning=false; transitionAlpha=0;
    } else if(G.menuSel===1) { // Quit
      beginTransition('PAUSE', 'TITLE', 400);
    } else if(G.menuSel===2) { // Language
      G.lang = G.lang==='ko'?'en':'ko'; saveGame(G);
    }
  }
}

function updateCamera(dt) {
  // Target follows player with deadzone
  G.camTargetX = G.px - screenW/2;
  G.camTargetY = G.py - screenH/2;
  // Smooth follow
  G.camX = lerp(G.camX, G.camTargetX, CONFIG.CAM_LERP * (dt/16.67));
  G.camY = lerp(G.camY, G.camTargetY, CONFIG.CAM_LERP * (dt/16.67));
  // Clamp to level bounds
  if(G.level) {
    const lw = (G.level.tiles[0]||[]).length * CONFIG.TILE;
    const lh = G.level.tiles.length * CONFIG.TILE;
    G.camX = clamp(G.camX, 0, Math.max(0, lw - screenW));
    G.camY = clamp(G.camY, 0, Math.max(0, lh - screenH));
  }
}

// ── Render per State ──

function renderBoot(ctx, w, h) {
  ctx.fillStyle = '#040D21';
  ctx.fillRect(0, 0, w, h);
  // Loading animation
  const pct = clamp(G.bootTimer / 1500, 0, 1);
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  ctx.fillRect(w*0.3, h/2-2, w*0.4*pct, 4);
  ctx.fillStyle = CONFIG.COL_TEXT2;
  ctx.font = '14px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading...', w/2, h/2+25);
}

function renderTitle(ctx, w, h, time) {
  const L = LANG[G.lang];
  // Animated background
  drawBackground(ctx, w, h, time*0.02, time*0.01, 0, time, {lightMod:1});

  // Darkened overlay
  ctx.fillStyle = 'rgba(4,13,33,0.6)';
  ctx.fillRect(0, 0, w, h);

  // Title with bioluminescent glow effect
  const titleY = h * 0.3;
  ctx.save();
  ctx.textAlign = 'center';
  // Glow layers
  ctx.shadowColor = CONFIG.COL_BIOLUM;
  ctx.shadowBlur = 30 + Math.sin(time*0.003)*10;
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  ctx.font = 'bold '+(Math.max(28, w*0.06)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.title, w/2, titleY);
  // Subtitle
  ctx.shadowBlur = 10;
  ctx.fillStyle = CONFIG.COL_TEXT2;
  ctx.font = (Math.max(14, w*0.025)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.subtitle, w/2, titleY + 40);
  ctx.restore();

  // Scan line effect
  ctx.fillStyle = 'rgba(0,255,229,0.02)';
  for(let y=0;y<h;y+=3) {
    if(((y+time*0.1)|0)%6 < 3) ctx.fillRect(0,y,w,1);
  }

  // Menu items
  const menuY = h * 0.55;
  const items = [L.start, 'Lang: '+(G.lang==='ko'?'한국어':'EN'), 'Credits'];
  ctx.textAlign = 'center';
  for(let i=0;i<items.length;i++) {
    const sel = G.menuSel === i;
    ctx.fillStyle = sel ? CONFIG.COL_BIOLUM : CONFIG.COL_TEXT2;
    ctx.font = (sel?'bold ':'') + (Math.max(16, w*0.03)|0) + 'px "Segoe UI",system-ui,sans-serif';
    if(sel) { ctx.shadowColor = CONFIG.COL_BIOLUM; ctx.shadowBlur = 15; }
    else { ctx.shadowBlur = 0; }
    ctx.fillText(items[i], w/2, menuY + i*45);
  }
  ctx.shadowBlur = 0;

  // Floating diver silhouette
  const diverY = h*0.75 + Math.sin(time*0.002)*15;
  drawDiver(ctx, w*0.2, diverY, 24, 'right', 0, 0, time);

  // Bottom hint
  ctx.fillStyle = CONFIG.COL_DIM;
  ctx.font = '12px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('[L] Language  |  \u2191\u2193 Select  |  SPACE/Enter Confirm', w/2, h-20);
}

function renderMap(ctx, w, h, time) {
  const L = LANG[G.lang];
  drawBackground(ctx, w, h, time*0.01, 0, G.mapSel[0], time, {lightMod:0.7});
  ctx.fillStyle = 'rgba(4,13,33,0.5)';
  ctx.fillRect(0, 0, w, h);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = 'bold '+(Math.max(20, w*0.035)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.map_title, w/2, 40);

  // Biome cards (5 normal + optional hidden tab)
  const hasHidden = G.hiddenUnlocked.some(h=>h);
  const numCards = hasHidden ? 6 : 5;
  const cardW = Math.min(120, (w-60)/numCards);
  const startX = (w - cardW*numCards - (numCards-1)*10)/2;
  for(let i=0;i<numCards;i++) {
    const cx = startX + i*(cardW+10);
    const cy = 70;
    const sel = G.mapSel[0]===i;
    const isHidden = i===5;
    const unlocked = isHidden ? hasHidden : (i===0 || G.bossDefeated[i-1]);
    ctx.fillStyle = sel ? (isHidden ? 'rgba(155,89,255,0.2)' : 'rgba(0,255,229,0.15)') : 'rgba(18,18,30,0.8)';
    ctx.fillRect(cx, cy, cardW, 100);
    ctx.strokeStyle = sel ? (isHidden ? CONFIG.COL_BOSS : CONFIG.COL_BIOLUM) : '#1e1e30';
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(cx, cy, cardW, 100);
    // Biome name
    const label = isHidden ? (G.lang==='ko'?'심연의 균열':'Abyss Rift') : (unlocked ? L.biome[i] : L.locked);
    ctx.fillStyle = unlocked ? (sel ? (isHidden ? CONFIG.COL_BOSS : CONFIG.COL_BIOLUM) : CONFIG.COL_TEXT) : CONFIG.COL_DIM;
    ctx.font = '11px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx+cardW/2, cy+55);
    // Color indicator
    ctx.fillStyle = isHidden ? '#1a0030' : CONFIG.COL_BG[i];
    ctx.fillRect(cx+5, cy+5, cardW-10, 30);
    if(isHidden) {
      // Decorative rune glow
      ctx.fillStyle = CONFIG.COL_BOSS; ctx.globalAlpha = 0.3+Math.sin(time*0.003)*0.2;
      ctx.font = '16px "Segoe UI",system-ui,sans-serif';
      ctx.fillText('?', cx+cardW/2, cy+25);
      ctx.globalAlpha = 1;
    }
  }

  // Stage selection for selected biome
  if(G.mapSel[0] === 5) {
    // Hidden stage selection
    const sy = 200;
    const unlockedHidden = G.hiddenUnlocked.map((h,i) => h ? i : -1).filter(i=>i>=0);
    const hiddenNames = {ko:['심연 H-1','심연 H-2','심연 H-3'],en:['Abyss H-1','Abyss H-2','Abyss H-3']};
    for(let i=0;i<unlockedHidden.length;i++) {
      const sx = w/2 - (unlockedHidden.length*90)/2 + i*100;
      const sel = G.mapSel[1]===i;
      ctx.fillStyle = sel ? 'rgba(155,89,255,0.2)' : 'rgba(18,18,30,0.6)';
      ctx.fillRect(sx, sy, 80, 50);
      ctx.strokeStyle = sel ? CONFIG.COL_BOSS : '#1e1e30';
      ctx.lineWidth = sel?2:1;
      ctx.strokeRect(sx, sy, 80, 50);
      ctx.fillStyle = sel ? CONFIG.COL_BOSS : CONFIG.COL_TEXT2;
      ctx.font = '13px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(hiddenNames[G.lang][unlockedHidden[i]], sx+40, sy+30);
    }
  } else if(G.mapSel[0] <= G.bossDefeated.filter(b=>b).length || G.mapSel[0]===0) {
    const sy = 200;
    for(let i=0;i<4;i++) {
      const sx = w/2 - 200 + i*100;
      const sel = G.mapSel[1]===i;
      const label = i<3 ? L.stage_select+' '+(i+1) : 'BOSS';
      ctx.fillStyle = sel ? 'rgba(0,255,229,0.2)' : 'rgba(18,18,30,0.6)';
      ctx.fillRect(sx, sy, 80, 50);
      ctx.strokeStyle = sel ? CONFIG.COL_BIOLUM : '#1e1e30';
      ctx.lineWidth = sel?2:1;
      ctx.strokeRect(sx, sy, 80, 50);
      ctx.fillStyle = sel ? CONFIG.COL_BIOLUM : CONFIG.COL_TEXT2;
      ctx.font = '13px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, sx+40, sy+30);
    }
  }

  // Stats
  ctx.textAlign = 'left';
  ctx.fillStyle = CONFIG.COL_TEXT2;
  ctx.font = '13px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.total+': '+G.totalScore, 20, h-60);
  ctx.fillText(L.clues+': '+G.cluesCollected+'/15', 20, h-40);
  ctx.fillText('Points: '+G.upgradePoints, 20, h-20);

  // Hints
  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_DIM;
  ctx.font = '12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText('[X/U] '+L.upgrade+'  |  [ESC] '+L.back, w/2, h-10);
}

function renderUpgrade(ctx, w, h, time) {
  const L = LANG[G.lang];
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, w, h);

  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = 'bold '+(Math.max(18,w*0.03)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.upgrade, w/2, 35);

  // Points display
  ctx.fillStyle = CONFIG.COL_GOLD;
  ctx.font = '14px "Segoe UI",system-ui,sans-serif';
  ctx.fillText('Points: '+G.upgradePoints, w/2, 58);

  // 3 columns
  const trees = ['pressure','speed','detect'];
  const treeNames = [L.press_tree, L.speed_tree, L.detect_tree];
  const treeDescs = [L.upg_press, L.upg_speed, L.upg_detect];
  const colW = Math.min(200, (w-40)/3);
  const startX = (w - colW*3 - 20)/2;

  for(let t=0;t<3;t++) {
    const cx = startX + t*(colW+10);
    const cy = 80;
    // Column header
    const selCol = G.upgradeSel[0]===t;
    ctx.fillStyle = selCol ? CONFIG.COL_BIOLUM : CONFIG.COL_TEXT2;
    ctx.font = 'bold 14px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(treeNames[t], cx+colW/2, cy);

    // Levels
    for(let lv=0;lv<5;lv++) {
      const ly = cy + 25 + lv*55;
      const sel = G.upgradeSel[0]===t && G.upgradeSel[1]===lv;
      const owned = G.upgrades[trees[t]] > lv;
      const available = G.upgrades[trees[t]] === lv;
      ctx.fillStyle = sel ? 'rgba(0,255,229,0.15)' : 'rgba(18,18,30,0.6)';
      ctx.fillRect(cx, ly, colW, 45);
      ctx.strokeStyle = sel ? CONFIG.COL_BIOLUM : owned ? '#00ff87' : '#1e1e30';
      ctx.lineWidth = sel ? 2 : 1;
      ctx.strokeRect(cx, ly, colW, 45);
      // Level text
      ctx.fillStyle = owned ? '#00ff87' : available ? CONFIG.COL_TEXT : CONFIG.COL_DIM;
      ctx.font = '11px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(L.level+(lv+1)+': '+treeDescs[t][lv], cx+5, ly+18);
      if(!owned) {
        ctx.fillStyle = available && G.upgradePoints >= CONFIG.UPGRADE_COST[lv] ? CONFIG.COL_GOLD : CONFIG.COL_DIM;
        ctx.fillText(L.cost+': '+CONFIG.UPGRADE_COST[lv]+'pt', cx+5, ly+35);
      } else {
        ctx.fillStyle = '#00ff87';
        ctx.fillText('\u2713', cx+colW-20, ly+25);
      }
    }
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_DIM;
  ctx.font = '12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText('[ESC] '+L.back+'  |  ENTER '+L.upgrade, w/2, h-10);
}

function renderStageIntro(ctx, w, h, time) {
  const L = LANG[G.lang];
  const biome = G.currentBiome;
  const drawBiome = Math.min(biome, 4); // Clamp for bg/env lookup
  drawBackground(ctx, w, h, 0, 0, drawBiome, time, getEnvironmentMod(drawBiome, time));
  ctx.fillStyle = 'rgba(4,13,33,0.7)';
  ctx.fillRect(0, 0, w, h);

  // Stage name with dramatic entrance
  const progress = clamp(G.introTimer / 1000, 0, 1);
  ctx.save();
  ctx.globalAlpha = progress;
  ctx.textAlign = 'center';
  const isHidden = biome >= 5;
  ctx.shadowColor = isHidden ? CONFIG.COL_BOSS : CONFIG.COL_BIOLUM;
  ctx.shadowBlur = 20;
  ctx.fillStyle = isHidden ? CONFIG.COL_BOSS : CONFIG.COL_BIOLUM;
  ctx.font = 'bold '+(Math.max(24, w*0.05)|0)+'px "Segoe UI",system-ui,sans-serif';
  const biomeName = isHidden ? (G.lang==='ko'?'심연의 균열':'Abyss Rift') : L.biome[biome];
  ctx.fillText(biomeName, w/2, h*0.4);
  ctx.shadowBlur = 0;
  ctx.fillStyle = CONFIG.COL_TEXT2;
  ctx.font = (Math.max(16, w*0.03)|0)+'px "Segoe UI",system-ui,sans-serif';
  const stageLabel = isHidden ? 'H-'+(G.stageInBiome+1) : L.stage_select+' '+(G.stageInBiome+1);
  ctx.fillText(stageLabel, w/2, h*0.4+40);
  ctx.restore();

  // Depth indicator animation
  const depthBar = progress * h * 0.3;
  ctx.fillStyle = 'rgba(0,255,229,0.1)';
  ctx.fillRect(w/2-1, h*0.55, 2, depthBar);
}

function renderDiving(ctx, w, h, time) {
  const level = G.level;
  if(!level) return;
  const biome = level.biome;
  const envMod = getEnvironmentMod(biome, time);

  ctx.save();
  // Camera shake
  if(G.camShake > 0.5) {
    const sx = (RNG.next()-0.5)*G.camShake;
    const sy = (RNG.next()-0.5)*G.camShake;
    ctx.translate(sx, sy);
    G.camShake *= 0.95;
  }

  // Background
  drawBackground(ctx, w, h, G.camX, G.camY, biome, time, envMod);

  // Tiles
  drawTiles(ctx, level.tiles, G.camX, G.camY, biome, CONFIG.TILE, w, h);

  // Exit gate
  drawExitGate(ctx, level.exitX, level.exitY, G.camX, G.camY, time);

  // Collectibles
  drawCollectibles(ctx, level.bubbles, level.clue, level.boosts, G.camX, G.camY, time);

  // Traps
  for(const trap of level.traps) drawTrap(ctx, trap, G.camX, G.camY, time);

  // Tool active effect
  if(G.toolActive > 0) {
    ctx.save();
    ctx.globalAlpha = 0.2;
    const toolColors = [CONFIG.COL_BIOLUM, '#FFD700', '#FFFFFF', CONFIG.COL_PRESS, '#00ff87', '#9B59FF'];
    ctx.fillStyle = toolColors[G.toolActiveType]||CONFIG.COL_BIOLUM;
    ctx.beginPath();
    ctx.arc(G.px - G.camX, G.py - G.camY, CONFIG.TILE * (3+G.toolActiveType), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Player
  drawDiver(ctx, G.px - G.camX, G.py - G.camY, G.playerSize, G.pose, biome, G.invincible, time);

  // Particles
  drawParticles(ctx, G.particles, G.camX, G.camY);

  ctx.restore();

  // Depth vision restriction (biomes 3+)
  if(envMod.lightMod < 1.0 && G.toolActiveType !== 2) { // Not using flare
    const vision = envMod.lightMod * (G.toolActive > 0 && G.toolActiveType===2 ? 2 : 1);
    const vr = Math.max(80, Math.min(screenW, screenH) * 0.4 * vision);
    const grad = ctx.createRadialGradient(G.px-G.camX, G.py-G.camY, vr*0.5, G.px-G.camX, G.py-G.camY, vr);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.85)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  // Biome-specific visual effects
  drawBiomeEffects(ctx, w, h, biome, time, G.camX, G.camY);

  // Weather effects
  drawWeatherEffects(ctx, w, h, biome, time);

  // Tool visual effects
  if(G.toolActive > 0) {
    if(G.toolActiveType === 0) drawSonarPulse(ctx, G.px, G.py, G.camX, G.camY, time, G.toolActive);
    if(G.toolActiveType === 2) drawFlareEffect(ctx, G.px, G.py, G.camX, G.camY, time, G.toolActive);
    if(G.toolActiveType === 3) drawShieldEffect(ctx, G.px, G.py, G.camX, G.camY, time);
  }

  // Trap warnings (detect upgrade)
  drawTrapWarnings(ctx, level.traps, G.camX, G.camY, G.px, G.py, CONFIG.UPGRADE_DETECT[Math.min(G.upgrades.detect,4)]||0);

  // Score popups
  drawScorePopups(ctx, scorePopups, G.camX, G.camY);

  // Narrative popup
  if(narrativeTimer > 0) {
    drawNarrativePopup(ctx, w, h, narrativeText, narrativeTimer/1000);
  }

  // Warp indicator
  if(G.controlsReversed) {
    ctx.fillStyle = 'rgba(106,13,173,0.15)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = CONFIG.COL_BOSS;
    ctx.font = '14px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CONTROLS REVERSED! '+(G.warpTimer/1000).toFixed(1)+'s', w/2, h-80);
  }

  // HUD
  drawHUD(ctx, w, h, G, G.lang);

  // Minimap
  if(G.level) drawMinimap(ctx, w, h, G.level.tiles, G.camX, G.camY, G.px, G.py, G.level.traps, G.level.exitX, G.level.exitY, biome, CONFIG.UPGRADE_DETECT[Math.min(G.upgrades.detect,4)]||0);

  // Depth meter
  drawDepthMeter(ctx, w, h, G.currentBiome, G.stageInBiome);

  // Touch controls
  drawTouchControls(ctx, w, h);
}

function renderBossState(ctx, w, h, time) {
  if(!G.level) return;
  const biome = G.currentBiome;
  const envMod = getEnvironmentMod(biome, time);

  ctx.save();
  if(G.camShake>0.5) {
    ctx.translate((RNG.next()-0.5)*G.camShake, (RNG.next()-0.5)*G.camShake);
    G.camShake *= 0.95;
  }

  drawBackground(ctx, w, h, G.camX, G.camY, biome, time, envMod);
  drawTiles(ctx, G.level.tiles, G.camX, G.camY, biome, CONFIG.TILE, w, h);

  // Boss
  if(G.boss) drawBoss(ctx, G.boss, G.camX, G.camY, time);

  // Player
  drawDiver(ctx, G.px-G.camX, G.py-G.camY, G.playerSize, G.pose, biome, G.invincible, time);

  // Particles
  drawParticles(ctx, G.particles, G.camX, G.camY);
  ctx.restore();

  // HUD
  drawHUD(ctx, w, h, G, G.lang);

  // Boss weakness indicator
  if(G.boss) drawBossWeakness(ctx, G.boss, G.camX, G.camY, time, CONFIG.UPGRADE_DETECT[Math.min(G.upgrades.detect,4)]||0);

  // Score popups
  drawScorePopups(ctx, scorePopups, G.camX, G.camY);

  // Boss name
  if(G.boss && !G.boss.defeated) {
    const L = LANG[G.lang];
    const bossNames = {
      ko:['앵글러피시 군주','거대 문어 현자','화산 가디언','해파리 여왕','아비소스 핵심'],
      en:['Anglerfish Lord','Giant Octopus Sage','Volcanic Guardian','Jellyfish Queen','Abyssos Core']
    };
    ctx.textAlign = 'center';
    ctx.fillStyle = CONFIG.COL_BOSS;
    ctx.shadowColor = CONFIG.COL_BOSS; ctx.shadowBlur = 10;
    ctx.font = 'bold 16px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(bossNames[G.lang][G.boss.id], w/2, h-30);
    ctx.shadowBlur = 0;
  }

  drawTouchControls(ctx, w, h);
}

function renderGameOver(ctx, w, h, time) {
  const L = LANG[G.lang];
  // Dim previous scene
  ctx.fillStyle = 'rgba(4,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  // Death text
  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF4444';
  ctx.shadowBlur = 20 + Math.sin(time*0.005)*5;
  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold '+(Math.max(24,w*0.05)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.game_over, w/2, h*0.35);
  ctx.restore();

  // Score
  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = (Math.max(16,w*0.03)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.score+': '+G.score, w/2, h*0.45);

  // Best
  ctx.fillStyle = CONFIG.COL_GOLD;
  ctx.font = (Math.max(14,w*0.025)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.best+': '+G.bestScore, w/2, h*0.52);

  // Retry hint
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  ctx.globalAlpha = 0.5+Math.sin(time*0.004)*0.3;
  ctx.font = (Math.max(14,w*0.025)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.retry, w/2, h*0.65);
  ctx.globalAlpha = 1;

  // DDA notice
  if(G.ddaLevel > 0) {
    ctx.fillStyle = 'rgba(0,255,135,0.5)';
    ctx.font = '12px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(L.dda_help + ' (Lv'+G.ddaLevel+')', w/2, h*0.72);
  }
}

function renderVictory(ctx, w, h, time) {
  const L = LANG[G.lang];
  ctx.fillStyle = 'rgba(0,20,40,0.7)';
  ctx.fillRect(0, 0, w, h);

  // Victory particles
  for(let i=0;i<10;i++) {
    const px = (w/2 + Math.sin(time*0.003+i*0.7)*w*0.3);
    const py = (h*0.3 + Math.cos(time*0.004+i)*50);
    ctx.fillStyle = CONFIG.COL_BIOLUM;
    ctx.globalAlpha = 0.3+Math.sin(time*0.005+i)*0.2;
    ctx.beginPath(); ctx.arc(px, py, 3+i%3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.shadowColor = CONFIG.COL_BIOLUM;
  ctx.shadowBlur = 20;
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  ctx.font = 'bold '+(Math.max(24,w*0.05)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(G.boss ? L.boss_defeat : L.stage_clear, w/2, h*0.35);
  ctx.shadowBlur = 0;

  // Score breakdown
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = (Math.max(14,w*0.025)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.score+': +'+(G.stageScore||0), w/2, h*0.45);
  ctx.fillText(L.total+': '+G.totalScore, w/2, h*0.52);

  // New record?
  if(G.score >= G.bestScore && G.score > 0) {
    ctx.fillStyle = CONFIG.COL_GOLD;
    ctx.shadowColor = CONFIG.COL_GOLD; ctx.shadowBlur = 15;
    ctx.font = 'bold '+(Math.max(16,w*0.03)|0)+'px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('\u2605 '+L.new_record+' \u2605', w/2, h*0.6);
    ctx.shadowBlur = 0;
  }
}

function renderCutscene(ctx, w, h, time) {
  const L = LANG[G.lang];
  const biome = G.currentBiome;
  drawBackground(ctx, w, h, 0, 0, biome, time, getEnvironmentMod(biome, time));
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, h);

  // Boss defeated cutscene
  const bossNames = {
    ko:['앵글러피시 군주','거대 문어 현자','화산 가디언','해파리 여왕','아비소스 핵심'],
    en:['Anglerfish Lord','Giant Octopus Sage','Volcanic Guardian','Jellyfish Queen','Abyssos Core']
  };
  const toolNames = G.lang==='ko' ? L.tool : L.tool;

  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_GOLD;
  ctx.shadowColor = CONFIG.COL_GOLD; ctx.shadowBlur = 15;
  ctx.font = 'bold '+(Math.max(20,w*0.04)|0)+'px "Segoe UI",system-ui,sans-serif';

function renderPause(ctx, w, h, time) {
  const L = LANG[G.lang];
  ctx.fillStyle = 'rgba(4,13,33,0.8)';
  ctx.fillRect(0, 0, w, h);

  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = 'bold '+(Math.max(22,w*0.04)|0)+'px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.pause, w/2, h*0.3);

  const items = [L.resume, L.quit, 'Lang: '+(G.lang==='ko'?'한국어':'EN')];
  for(let i=0;i<items.length;i++) {
    const sel = G.menuSel===i;
    ctx.fillStyle = sel ? CONFIG.COL_BIOLUM : CONFIG.COL_TEXT2;
    ctx.font = (sel?'bold ':'')+(Math.max(16,w*0.028)|0)+'px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(items[i], w/2, h*0.45+i*40);
  }
}

// ── MAIN GAME LOOP ──

function gameLoop(timestamp) {
  try {
    if(!lastTime) lastTime = timestamp;
    const rawDt = timestamp - lastTime;
    const dt = clamp(rawDt, 0, 33.33); // Max 2-frame correction
    lastTime = timestamp;

    // Input update
    INPUT.update();
    if('ontouchstart' in window) {
      INPUT.updateTouchButtons(getTouchLayout(screenW, screenH));
    }

    // Audio resume on interaction
    if(INPUT.anyKey()) SND.resume();

    // Tween update (always active in most states)
    if(ACTIVE_SYSTEMS[G.state]?.tween) TW.update(dt);

    // Sync transition alpha from proxy
    transitionAlpha = transitionProxy.a;

    // State-specific update
    switch(G.state) {
      case 'BOOT': updateBoot(dt); break;
      case 'TITLE': updateTitle(dt, timestamp); break;
      case 'MAP': updateMap(dt); break;
      case 'UPGRADE': updateUpgrade(dt); break;
      case 'STAGE_INTRO': updateStageIntro(dt); break;
      case 'DIVING': updateDiving(dt, timestamp); break;
      case 'BOSS': updateBossState(dt, timestamp); break;
      case 'GAMEOVER': updateGameOver(dt); break;
      case 'VICTORY': updateVictory(dt); break;
      case 'CUTSCENE': updateCutscene(dt); break;
      case 'PAUSE': updatePause(dt); break;
    }

    // Update particles
    if(ACTIVE_SYSTEMS[G.state]?.particles) updateParticles(G.particles, dt);

    // Update score popups
    updateScorePopups(dt);

    // Update narrative timer
    if(narrativeTimer > 0) narrativeTimer -= dt;

    // ── RENDER ──
    ctx.clearRect(0, 0, screenW, screenH);

    switch(G.state) {
      case 'BOOT': renderBoot(ctx, screenW, screenH); break;
      case 'TITLE': renderTitle(ctx, screenW, screenH, timestamp); break;
      case 'MAP': renderMap(ctx, screenW, screenH, timestamp); break;
      case 'UPGRADE': renderUpgrade(ctx, screenW, screenH, timestamp); break;
      case 'STAGE_INTRO': renderStageIntro(ctx, screenW, screenH, timestamp); break;
      case 'DIVING': renderDiving(ctx, screenW, screenH, timestamp); break;
      case 'BOSS': renderBossState(ctx, screenW, screenH, timestamp); break;
      case 'GAMEOVER': renderGameOver(ctx, screenW, screenH, timestamp); break;
      case 'VICTORY': renderVictory(ctx, screenW, screenH, timestamp); break;
      case 'CUTSCENE': renderCutscene(ctx, screenW, screenH, timestamp); break;
      case 'PAUSE': renderPause(ctx, screenW, screenH, timestamp); break;
    }

    // Transition overlay
    if(transitionAlpha > 0.01) {
      ctx.fillStyle = 'rgba(4,13,33,'+transitionAlpha+')';
      ctx.fillRect(0, 0, screenW, screenH);
    }

    // Consume click + reset per-frame mouse inputs at end of frame
    INPUT.consumeClick();
    INPUT.resetFrameInputs();

  } catch(e) {
    // Error recovery — log but don't crash the loop
    console.error('Game loop error:', e);
  }

  requestAnimationFrame(gameLoop);
}

// ── INITIALIZATION ──

function init() {
  initCanvas();
  TW = new TweenManager();
  SND = new SoundManager();
  SND.init();
  INPUT = new InputManager();
  RNG = new SeededRNG(Date.now());
  G = createGameState();
  loadSave(G);

  // Start game loop — no external assets to preload (F1)
  requestAnimationFrame(gameLoop);
}

// Draw minimap when detect upgrade is Lv5 (pure function F9)
function drawMinimap(ctx, w, h, tiles, camX, camY, px, py, traps, exitX, exitY, biome, detectLv) {
  if(detectLv < 5) return;
  const mapW = 120, mapH = 80;
  const mx = w - mapW - 10, my = h - mapH - 70;
  const tileW = tiles[0] ? mapW / tiles[0].length : 1;
  const tileH = mapH / tiles.length;

  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = 'rgba(4,13,33,0.8)';
  ctx.fillRect(mx, my, mapW, mapH);
  ctx.strokeStyle = CONFIG.COL_BIOLUM;
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, mapW, mapH);

  // Tiles
  for(let r=0;r<tiles.length;r++) {
    for(let c=0;c<(tiles[r]||[]).length;c++) {
      if(tiles[r][c]===1) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(mx+c*tileW, my+r*tileH, tileW, tileH);
      }
    }
  }

  // Traps (detect Lv3+)
  if(detectLv >= 3) {
    ctx.fillStyle = 'rgba(255,107,53,0.6)';
    for(const t of traps) {
      if(!t.active || t.disabled) continue;
      const tx = mx + (t.x / CONFIG.TILE) * tileW;
      const ty = my + (t.y / CONFIG.TILE) * tileH;
      ctx.fillRect(tx, ty, tileW, tileH);
    }
  }

  // Exit
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  const ex2 = mx + (exitX / CONFIG.TILE) * tileW;
  const ey2 = my + (exitY / CONFIG.TILE) * tileH;
  ctx.fillRect(ex2, ey2, tileW*2, tileH*2);

  // Player
  ctx.fillStyle = '#00ff87';
  const ppx = mx + (px / CONFIG.TILE) * tileW;
  const ppy = my + (py / CONFIG.TILE) * tileH;
  ctx.fillRect(ppx-1, ppy-1, 3, 3);

  ctx.restore();
}

// Draw trap warning indicators (detect upgrade Lv1+)
function drawTrapWarnings(ctx, traps, camX, camY, px, py, detectRange) {
  if(detectRange <= 0) return;
  const range = detectRange * CONFIG.TILE;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,107,53,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  for(const t of traps) {
    if(!t.active || t.disabled) continue;
    const d = dist(px, py, t.x + CONFIG.TILE/2, t.y + CONFIG.TILE/2);
    if(d < range && d > CONFIG.TILE) {
      const tx = t.x - camX + CONFIG.TILE/2;
      const ty = t.y - camY + CONFIG.TILE/2;
      ctx.globalAlpha = 1 - d/range;
      ctx.beginPath();
      ctx.arc(tx, ty, CONFIG.TILE*0.7, 0, Math.PI*2);
      ctx.stroke();
      // Warning icon
      ctx.fillStyle = CONFIG.COL_DANGER;
      ctx.font = '10px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('!', tx, ty-CONFIG.TILE*0.5);
    }
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// Draw boss weakness highlight (detect upgrade Lv4)
function drawBossWeakness(ctx, boss, camX, camY, time, detectLv) {
  if(detectLv < 4 || !boss || boss.defeated) return;
  if(!boss.vulnerable) return;
  ctx.save();
  ctx.strokeStyle = CONFIG.COL_GOLD;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5 + Math.sin(time*0.008)*0.3;
  ctx.setLineDash([6, 3]);
  ctx.beginPath();
  ctx.arc(boss.x - camX, boss.y - camY, boss.w*0.7, 0, Math.PI*2);
  ctx.stroke();
  // "VULNERABLE!" text
  ctx.fillStyle = CONFIG.COL_GOLD;
  ctx.font = 'bold 12px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('WEAK!', boss.x - camX, boss.y - camY - boss.h/2 - 30);
  ctx.setLineDash([]);
  ctx.restore();
}

// Canvas modal dialog (F3 — no confirm/alert/prompt)
function renderModal(ctx, w, h, title, options, selectedIdx) {
  ctx.save();
  ctx.fillStyle = 'rgba(4,13,33,0.85)';
  ctx.fillRect(0, 0, w, h);

  const modalW = Math.min(350, w*0.8);
  const modalH = 40 + options.length * 45 + 40;
  const mx = (w-modalW)/2, my = (h-modalH)/2;

  // Modal background
  ctx.fillStyle = '#12121e';
  ctx.fillRect(mx, my, modalW, modalH);
  ctx.strokeStyle = CONFIG.COL_BIOLUM;
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, modalW, modalH);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.COL_TEXT;
  ctx.font = 'bold 16px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(title, w/2, my+30);

  // Options
  for(let i=0;i<options.length;i++) {
    const oy = my + 50 + i*45;
    const sel = selectedIdx === i;
    ctx.fillStyle = sel ? 'rgba(0,255,229,0.15)' : 'transparent';
    ctx.fillRect(mx+10, oy, modalW-20, 35);
    ctx.strokeStyle = sel ? CONFIG.COL_BIOLUM : '#1e1e30';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx+10, oy, modalW-20, 35);
    ctx.fillStyle = sel ? CONFIG.COL_BIOLUM : CONFIG.COL_TEXT2;
    ctx.font = '14px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(options[i], w/2, oy+22);
  }
  ctx.restore();
}

// Score popup system
let scorePopups = [];
function addScorePopup(x, y, value) {
  scorePopups.push({ x, y, value, alpha:1, size:0, vy:-1.5 });
}
function updateScorePopups(dt) {
  for(let i=scorePopups.length-1;i>=0;i--) {
    const p = scorePopups[i];
    p.y += p.vy*(dt/16.67);
    p.alpha -= 0.015*(dt/16.67);
    p.size = Math.min(6, p.size+0.05*(dt/16.67));
    if(p.alpha<=0) scorePopups.splice(i,1);
  }
}

// Biome-specific environment rendering enhancements (pure function)
function drawBiomeEffects(ctx, w, h, biome, time, camX, camY) {

      for(let i=0;i<5;i++) {
        const rx = ((i*180+60-camX*0.02)%w+w)%w;
        ctx.beginPath();
        ctx.moveTo(rx, 0); ctx.lineTo(rx+20, 0);
        ctx.lineTo(rx+60+Math.sin(time*0.001+i)*20, h);
        ctx.lineTo(rx-20+Math.sin(time*0.001+i)*20, h);

      }
      // Floating pollen/plankton
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = CONFIG.COL_CORAL;
      for(let i=0;i<8;i++) {

        const py = ((i*131+time*0.01*((i%3)+1))%h+h)%h;
        ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI*2); ctx.fill();
      }
      break;

    case 1: // Deep Cave — stalactite shadows and flickering bioluminescence
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#000';
      for(let i=0;i<6;i++) {
        const sx = ((i*220-camX*0.05)%w+w)%w;
        ctx.beginPath();
        ctx.moveTo(sx-15, 0);
        ctx.lineTo(sx, 30+i*10);
        ctx.lineTo(sx+15, 0);
        ctx.fill();
      }
      // Bioluminescent dots
      ctx.fillStyle = CONFIG.COL_BIOLUM;
      for(let i=0;i<12;i++) {
        const bx = ((i*163-camX*0.1+time*0.005)%w+w)%w;
        const by = ((i*107)%h+h)%h;
        const pulse = Math.sin(time*0.004+i*1.3);
        ctx.globalAlpha = 0.1+pulse*0.15;
        ctx.beginPath(); ctx.arc(bx, by, 2+pulse, 0, Math.PI*2); ctx.fill();
      }
      break;

    case 2: // Hydrothermal Vents — heat shimmer and volcanic particles
      // Heat shimmer
      ctx.globalAlpha = 0.03;
      ctx.fillStyle = CONFIG.COL_DANGER;
      for(let y=0;y<h;y+=4) {
        const off = Math.sin(y*0.02+time*0.003)*3;
        ctx.fillRect(off, y, w, 1);
      }
      // Ash/ember particles
      ctx.globalAlpha = 0.3;
      for(let i=0;i<10;i++) {
        const ax = ((i*173+time*0.02)%w+w)%w;
        const ay = ((i*89-time*0.015*(1+i*0.1))%h+h)%h;
        ctx.fillStyle = i%3===0 ? CONFIG.COL_DANGER : '#888';
        ctx.beginPath(); ctx.arc(ax, ay, 1+i%2, 0, Math.PI*2); ctx.fill();
      }
      break;

    case 3: // Abyssal Trench — pressure distortion and sparse deep lights
      // Pressure vignette
      const pressGrad = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, h*0.7);
      pressGrad.addColorStop(0, 'rgba(0,0,0,0)');
      pressGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = pressGrad;
      ctx.fillRect(0, 0, w, h);
      // Rare deep-sea bioluminescence
      ctx.fillStyle = CONFIG.COL_BOSS;
      for(let i=0;i<3;i++) {
        const dx = ((i*307+time*0.008)%w+w)%w;
        const dy = ((i*209+time*0.005)%h+h)%h;
        ctx.globalAlpha = 0.05+Math.sin(time*0.002+i*2)*0.05;
        ctx.beginPath(); ctx.arc(dx, dy, 4, 0, Math.PI*2); ctx.fill();
      }
      break;

    case 4: // Abyssos Ruins — ancient rune glows and energy streams
      // Rune circuit lines
      ctx.strokeStyle = CONFIG.COL_BOSS;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.06+Math.sin(time*0.002)*0.03;
      for(let i=0;i<4;i++) {
        const ry = ((i*200-camY*0.1)%h+h)%h;
        ctx.beginPath();
        ctx.moveTo(0, ry);
        for(let x=0;x<w;x+=30) {
          ctx.lineTo(x, ry+Math.sin(x*0.03+time*0.002+i)*8);
        }
        ctx.stroke();
      }
      // Energy particles flowing upward
      ctx.fillStyle = CONFIG.COL_BIOLUM;
      ctx.globalAlpha = 0.15;
      for(let i=0;i<8;i++) {
        const ex = ((i*151-camX*0.08)%w+w)%w;
        const ey = ((i*113-time*0.02*(1+i%3*0.5))%h+h)%h;
        ctx.beginPath(); ctx.arc(ex, ey, 1.5+Math.sin(time*0.005+i)*0.5, 0, Math.PI*2); ctx.fill();
      }
      break;
  }
  ctx.restore();
}

// Draw sonar pulse effect (tool 0 active)
function drawSonarPulse(ctx, px, py, camX, camY, time, activeDur) {
  const progress = 1 - (activeDur / (CONFIG.TOOL_DUR[0]*1000));
  const radius = progress * CONFIG.TILE * 8;
  ctx.save();
  ctx.strokeStyle = CONFIG.COL_BIOLUM;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.4 * (1 - progress);
  ctx.beginPath();
  ctx.arc(px - camX, py - camY, radius, 0, Math.PI*2);
  ctx.stroke();
  // Inner pulse
  ctx.globalAlpha = 0.2 * (1 - progress);
  ctx.beginPath();
  ctx.arc(px - camX, py - camY, radius*0.7, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// Draw flare light effect (tool 2 active)
function drawFlareEffect(ctx, px, py, camX, camY, time, activeDur) {
  const intensity = activeDur / (CONFIG.TOOL_DUR[2]*1000);
  const x = px - camX, y = py - camY;
  const radius = CONFIG.TILE * 10 * intensity;
  ctx.save();
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, 'rgba(255,255,200,0.15)');
  grad.addColorStop(0.5, 'rgba(255,200,100,0.05)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);
  // Spark particles
  ctx.fillStyle = '#FFD700';
  ctx.globalAlpha = 0.3;
  for(let i=0;i<5;i++) {
    const a = time*0.005+i*1.25;
    const r = radius*0.3*Math.sin(time*0.008+i*2);
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*r, y+Math.sin(a)*r, 2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// Draw pressure shield effect (tool 3 active)
function drawShieldEffect(ctx, px, py, camX, camY, time) {
  const x = px - camX, y = py - camY;
  ctx.save();
  ctx.strokeStyle = CONFIG.COL_PRESS;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.4 + Math.sin(time*0.008)*0.2;
  ctx.beginPath();
  ctx.arc(x, y, 30, 0, Math.PI*2);
  ctx.stroke();
  // Hex pattern
  for(let i=0;i<6;i++) {
    const a = i*Math.PI/3 + time*0.002;
    const hx = x + Math.cos(a)*25;
    const hy = y + Math.sin(a)*25;
    ctx.beginPath();
    ctx.arc(hx, hy, 4, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

    let allCleared = true;
    for(let b=0;b<3;b++) {
      for(let s=0;s<3;s++) {
        const key = b+'-'+s;
        if(!g.stageO2Percent[key] || g.stageO2Percent[key] < 0.5) { allCleared = false; break; }
      }
      if(!allCleared) break;
    }
    if(allCleared) { g.hiddenUnlocked[0] = true; unlocked = 0; }
  }

  // H-2: Biome 4 all 3 stages cleared with 0 deaths
  if(!g.hiddenUnlocked[1]) {
    if(g.biome4NoDeath[0] && g.biome4NoDeath[1] && g.biome4NoDeath[2] &&
       !g.biome4StageDied[0] && !g.biome4StageDied[1] && !g.biome4StageDied[2]) {
      g.hiddenUnlocked[1] = true;
      unlocked = 1;
    }
  }

  // H-3: All 15 clues collected
  if(!g.hiddenUnlocked[2] && g.cluesCollected >= 15) {
    g.hiddenUnlocked[2] = true;
    unlocked = 2;
  }

  return unlocked;
}

// Weather/time-of-day system (visual only, per-biome)
function drawWeatherEffects(ctx, w, h, biome, time) {
  ctx.save();
  switch(biome) {
    case 0: // Sunlight caustics
      ctx.globalAlpha = 0.02;
      ctx.fillStyle = '#aaddff';
      for(let i=0;i<20;i++) {
        const cx = ((i*97+time*0.03)%w+w)%w;
        const cy = ((i*61+time*0.02)%h+h)%h;
        const s = 10+Math.sin(time*0.003+i)*5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, s, s*0.6, time*0.001+i, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    case 2: // Volcanic ash fall
      ctx.fillStyle = 'rgba(100,50,20,0.3)';
      for(let i=0;i<15;i++) {
        const ax = ((i*143+time*0.01)%w+w)%w;
        const ay = ((i*97+time*0.025*(1+i%3*0.3))%h+h)%h;
        ctx.globalAlpha = 0.15;
        ctx.fillRect(ax, ay, 2, 2);
      }
      break;
    case 3: // Pressure ripples
      ctx.strokeStyle = 'rgba(106,13,173,0.05)';
      ctx.lineWidth = 1;
      for(let i=0;i<3;i++) {
        const r = ((time*0.02+i*100)%200);
        ctx.globalAlpha = 0.1*(1-r/200);
        ctx.beginPath();
        ctx.arc(w/2, h/2, r, 0, Math.PI*2);
        ctx.stroke();
      }
      break;
  }
  ctx.restore();
}

// Depth meter visualization (pure function)
function drawDepthMeter(ctx, w, h, biome, stage) {
  const meterH = Math.min(200, h*0.4);
  const mx = w - 20, my = (h - meterH)/2;
  ctx.save();
  ctx.globalAlpha = 0.4;
  // Track
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(mx-4, my, 8, meterH);
  // Current depth indicator
  const depthPct = (biome*3+stage)/(5*3);
  ctx.fillStyle = CONFIG.COL_BIOLUM;
  ctx.fillRect(mx-4, my, 8, meterH*depthPct);
  // Biome markers
  for(let i=0;i<5;i++) {
    const by = my + (i/5)*meterH;
    ctx.fillStyle = CONFIG.COL_BG[i];
    ctx.fillRect(mx-8, by, 16, 2);
  }
  // Player marker
  const ply = my + meterH*depthPct;
  ctx.fillStyle = '#00ff87';
  ctx.beginPath();
  ctx.moveTo(mx-10, ply);
  ctx.lineTo(mx-4, ply-4);
  ctx.lineTo(mx-4, ply+4);
  ctx.fill();
  ctx.restore();
}

init();
