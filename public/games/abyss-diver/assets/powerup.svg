<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Core energy gradient -->
    <radialGradient id="coreEnergy" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="30%" stop-color="#00FFE5" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00B8A9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#005F56" stop-opacity="0.2"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#B7950B"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B7950B"/>
    </linearGradient>
    <!-- Energy wave gradient -->
    <radialGradient id="waveGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#9B59FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9B59FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFE5"/>
      <stop offset="100%" stop-color="#005F56"/>
    </linearGradient>
    <!-- Hexagon frame gradient -->
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00FFE5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="puGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Big glow -->
    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="puShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#040D21" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Energy wave rings (outermost) -->
  <g opacity="0.3">
    <circle cx="32" cy="32" r="30" fill="none" stroke="#9B59FF" stroke-width="0.5" stroke-dasharray="4,3"/>
    <circle cx="32" cy="32" r="28" fill="url(#waveGrad)"/>
  </g>

  <!-- Rotating orbit ring 1 -->
  <g opacity="0.5">
    <ellipse cx="32" cy="32" rx="24" ry="8" fill="none" stroke="#00FFE5" stroke-width="0.6" transform="rotate(-30,32,32)" stroke-dasharray="3,4"/>
    <circle cx="12" cy="24" r="2" fill="#00FFE5" opacity="0.7" filter="url(#puGlow)"/>
  </g>

  <!-- Rotating orbit ring 2 -->
  <g opacity="0.4">
    <ellipse cx="32" cy="32" rx="22" ry="7" fill="none" stroke="#9B59FF" stroke-width="0.5" transform="rotate(45,32,32)" stroke-dasharray="2,5"/>
    <circle cx="50" cy="22" r="1.5" fill="#9B59FF" opacity="0.6" filter="url(#puGlow)"/>
  </g>

  <!-- Rotating orbit ring 3 -->
  <g opacity="0.35">
    <ellipse cx="32" cy="32" rx="20" ry="6" fill="none" stroke="#FFD700" stroke-width="0.4" transform="rotate(80,32,32)" stroke-dasharray="2,3"/>
    <circle cx="18" cy="48" r="1.5" fill="#FFD700" opacity="0.5"/>
  </g>

  <!-- Hexagonal frame -->
  <g filter="url(#puShadow)">
    <path d="M32,8 L50,16 L54,32 L50,48 L32,56 L14,48 L10,32 L14,16 Z" fill="none" stroke="url(#hexGrad)" stroke-width="1.8"/>
    <!-- Corner accents -->
    <circle cx="32" cy="8" r="1.5" fill="#FFD700"/>
    <circle cx="50" cy="16" r="1.2" fill="#FFD700" opacity="0.8"/>
    <circle cx="54" cy="32" r="1.5" fill="#FFD700"/>
    <circle cx="50" cy="48" r="1.2" fill="#FFD700" opacity="0.8"/>
    <circle cx="32" cy="56" r="1.5" fill="#FFD700"/>
    <circle cx="14" cy="48" r="1.2" fill="#FFD700" opacity="0.8"/>
    <circle cx="10" cy="32" r="1.5" fill="#FFD700"/>
    <circle cx="14" cy="16" r="1.2" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Inner hexagonal frame -->
  <path d="M32,14 L44,20 L48,32 L44,44 L32,50 L20,44 L16,32 L20,20 Z" fill="none" stroke="#00FFE5" stroke-width="0.8" opacity="0.4"/>

  <!-- Central energy sphere -->
  <g filter="url(#bigGlow)">
    <circle cx="32" cy="32" r="10" fill="url(#coreEnergy)"/>
  </g>
  <circle cx="32" cy="32" r="7" fill="#00FFE5" opacity="0.5"/>
  <circle cx="32" cy="32" r="4" fill="#FFFFFF" opacity="0.8"/>

  <!-- Up arrow (power-up indicator) -->
  <g filter="url(#puGlow)">
    <path d="M32,22 L37,30 L34,30 L34,38 L30,38 L30,30 L27,30 Z" fill="url(#arrowGrad)" stroke="#00FFE5" stroke-width="0.5" opacity="0.85"/>
  </g>

  <!-- Energy wisps -->
  <g opacity="0.5">
    <path d="M22,18 C18,14 20,10 24,12" stroke="#00FFE5" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M42,18 C46,14 44,10 40,12" stroke="#9B59FF" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M20,44 C16,48 18,52 22,50" stroke="#00FFE5" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M44,44 C48,48 46,52 42,50" stroke="#9B59FF" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M8,30 C4,28 4,24 8,26" stroke="#FFD700" stroke-width="0.5" fill="none" stroke-linecap="round"/>
    <path d="M56,34 C60,36 60,40 56,38" stroke="#FFD700" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sound wave arcs -->
  <g opacity="0.3">
    <path d="M12,20 C8,24 8,28 12,32" stroke="#00FFE5" stroke-width="0.6" fill="none"/>
    <path d="M10,18 C5,23 5,29 10,34" stroke="#00FFE5" stroke-width="0.4" fill="none"/>
    <path d="M52,20 C56,24 56,28 52,32" stroke="#9B59FF" stroke-width="0.6" fill="none"/>
    <path d="M54,18 C59,23 59,29 54,34" stroke="#9B59FF" stroke-width="0.4" fill="none"/>
  </g>

  <!-- Sparkle dots -->
  <g>
    <circle cx="20" cy="10" r="0.8" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="44" cy="10" r="0.8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="8" cy="40" r="0.6" fill="#00FFE5" opacity="0.5"/>
    <circle cx="56" cy="24" r="0.6" fill="#FFD700" opacity="0.5"/>
    <circle cx="24" cy="58" r="0.7" fill="#9B59FF" opacity="0.4"/>
    <circle cx="40" cy="58" r="0.7" fill="#00FFE5" opacity="0.4"/>
  </g>

  <!-- Rune symbol (ancient civilization) -->
  <text x="32" y="35" text-anchor="middle" font-family="system-ui" font-size="6" fill="#FFFFFF" opacity="0.2">⚡</text>

  <!-- Additional energy particles for volume -->
  <g opacity="0.4">
    <circle cx="16" cy="28" r="0.5" fill="#00FFE5"/>
    <circle cx="48" cy="36" r="0.5" fill="#9B59FF"/>
    <circle cx="26" cy="52" r="0.5" fill="#FFD700"/>
    <circle cx="38" cy="12" r="0.5" fill="#00FFE5"/>
    <circle cx="6" cy="32" r="0.4" fill="#FFD700"/>
    <circle cx="58" cy="32" r="0.4" fill="#00FFE5"/>
  </g>
</svg>