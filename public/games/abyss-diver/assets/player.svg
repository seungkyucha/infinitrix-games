<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Suit gradient -->
    <linearGradient id="suitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="50%" stop-color="#0E3A5C"/>
      <stop offset="100%" stop-color="#072438"/>
    </linearGradient>
    <!-- Visor glow -->
    <radialGradient id="visorGlow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00B8A9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#005F56" stop-opacity="0.4"/>
    </radialGradient>
    <!-- Helmet gradient -->
    <radialGradient id="helmetGrad" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#2E86C1"/>
      <stop offset="50%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#0A2E4D"/>
    </radialGradient>
    <!-- Oxygen tank gradient -->
    <linearGradient id="tankGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <!-- Bioluminescent aura -->
    <radialGradient id="auraGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#00FFE5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0"/>
    </radialGradient>
    <!-- Rim light -->
    <linearGradient id="rimLight" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0"/>
    </linearGradient>
    <!-- Fin gradient -->
    <linearGradient id="finGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7EB3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9B59FF" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glowF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadowF" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#040D21" flood-opacity="0.6"/>
    </filter>
    <!-- Visor shine filter -->
    <filter id="visorShine" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Bubble gradient -->
    <radialGradient id="bubbleGrad" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Aura glow behind character -->
  <g id="aura">
    <ellipse cx="64" cy="64" rx="50" ry="55" fill="url(#auraGlow)"/>
  </g>

  <!-- Oxygen tanks (back) -->
  <g id="tanks" filter="url(#shadowF)">
    <rect x="72" y="42" width="10" height="30" rx="5" fill="url(#tankGrad)" stroke="#1B4F72" stroke-width="0.8"/>
    <rect x="78" y="45" width="8" height="26" rx="4" fill="url(#tankGrad)" stroke="#1B4F72" stroke-width="0.8"/>
    <!-- Tank bands -->
    <rect x="71" y="48" width="12" height="2" rx="1" fill="#2E86C1" opacity="0.8"/>
    <rect x="71" y="58" width="12" height="2" rx="1" fill="#2E86C1" opacity="0.8"/>
    <rect x="77" y="51" width="10" height="2" rx="1" fill="#2E86C1" opacity="0.8"/>
    <!-- Tank valve -->
    <circle cx="77" cy="40" r="2.5" fill="#5DADE2" stroke="#1A5276" stroke-width="0.5"/>
    <rect x="75.5" y="37" width="3" height="3" rx="0.5" fill="#87CEEB"/>
  </g>

  <!-- Body/suit -->
  <g id="body" filter="url(#shadowF)">
    <!-- Torso -->
    <path d="M45,50 C42,52 40,58 40,65 C40,78 44,88 50,92 L58,95 L70,95 L78,92 C82,88 84,78 84,70 C84,58 80,52 76,50 Z" fill="url(#suitGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <!-- Chest plate detail -->
    <path d="M50,55 C52,53 58,51 64,51 C70,51 76,53 78,55 L76,72 C73,74 70,75 64,75 C58,75 55,74 52,72 Z" fill="#0E3A5C" stroke="#1A5276" stroke-width="0.5" opacity="0.8"/>
    <!-- Chest light -->
    <ellipse cx="64" cy="60" rx="4" ry="3" fill="#00FFE5" opacity="0.9" filter="url(#glowF)"/>
    <ellipse cx="64" cy="60" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
    <!-- Suit seam lines -->
    <path d="M64,51 L64,75" stroke="#1A5276" stroke-width="0.5" opacity="0.5"/>
    <path d="M52,62 L76,62" stroke="#1A5276" stroke-width="0.3" opacity="0.4"/>
    <!-- Belt -->
    <rect x="46" y="82" width="32" height="5" rx="2" fill="#1B4F72" stroke="#2E86C1" stroke-width="0.5"/>
    <rect x="58" y="81" width="8" height="7" rx="1.5" fill="#FFD700" stroke="#B7950B" stroke-width="0.5"/>
    <!-- Belt rivets -->
    <circle cx="50" cy="84.5" r="1.2" fill="#5DADE2" opacity="0.7"/>
    <circle cx="74" cy="84.5" r="1.2" fill="#5DADE2" opacity="0.7"/>
  </g>

  <!-- Arms -->
  <g id="arms">
    <!-- Left arm -->
    <path d="M42,55 C36,58 30,64 28,72 C27,76 29,78 32,77 L38,72 C40,68 41,64 42,60" fill="url(#suitGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <!-- Left glove -->
    <ellipse cx="30" cy="74" rx="5" ry="4" fill="#1B4F72" stroke="#2E86C1" stroke-width="0.5"/>
    <path d="M26,72 C25,70 27,68 29,70" stroke="#00FFE5" stroke-width="0.5" fill="none" opacity="0.6"/>
    <!-- Right arm -->
    <path d="M82,55 C86,58 90,62 92,68 C93,72 91,75 88,74 L84,70 C83,66 82,62 82,58" fill="url(#suitGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <!-- Right glove -->
    <ellipse cx="90" cy="71" rx="5" ry="4" fill="#1B4F72" stroke="#2E86C1" stroke-width="0.5"/>
    <!-- Tool in hand (sonar device) -->
    <rect x="87" y="66" width="8" height="4" rx="1" fill="#FFD700" opacity="0.8"/>
    <circle cx="96" cy="68" r="2" fill="#00FFE5" opacity="0.7" filter="url(#glowF)"/>
  </g>

  <!-- Legs/Flippers -->
  <g id="legs">
    <!-- Left leg -->
    <path d="M50,92 C48,98 46,106 44,112 C43,115 44,118 48,118 L54,116 C56,112 56,104 54,95" fill="url(#suitGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <!-- Left flipper -->
    <path d="M44,112 C38,118 32,122 28,120 C26,119 28,116 32,114 L44,112" fill="url(#finGrad)" stroke="#9B59FF" stroke-width="0.5" opacity="0.8"/>
    <!-- Right leg -->
    <path d="M70,92 C72,98 74,106 76,112 C77,115 76,118 72,118 L66,116 C64,112 64,104 66,95" fill="url(#suitGrad)" stroke="#1A5276" stroke-width="0.8"/>
    <!-- Right flipper -->
    <path d="M76,112 C82,118 88,122 92,120 C94,119 92,116 88,114 L76,112" fill="url(#finGrad)" stroke="#9B59FF" stroke-width="0.5" opacity="0.8"/>
    <!-- Knee joints -->
    <circle cx="50" cy="100" r="2" fill="#2E86C1" opacity="0.5"/>
    <circle cx="70" cy="100" r="2" fill="#2E86C1" opacity="0.5"/>
  </g>

  <!-- Helmet -->
  <g id="helmet" filter="url(#shadowF)">
    <!-- Helmet dome -->
    <ellipse cx="62" cy="38" rx="20" ry="18" fill="url(#helmetGrad)" stroke="#1B4F72" stroke-width="1.2"/>
    <!-- Helmet rim -->
    <ellipse cx="62" cy="48" rx="18" ry="4" fill="#1B4F72" stroke="#2E86C1" stroke-width="0.5"/>
    <!-- Visor -->
    <ellipse cx="58" cy="36" rx="13" ry="10" fill="url(#visorGlow)" stroke="#00B8A9" stroke-width="1" filter="url(#visorShine)"/>
    <!-- Visor reflection -->
    <path d="M48,32 C50,28 56,26 62,28" stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <ellipse cx="52" cy="30" rx="3" ry="2" fill="#FFFFFF" opacity="0.25"/>
    <!-- Eyes behind visor -->
    <ellipse cx="54" cy="36" rx="3" ry="2.5" fill="#FFFFFF" opacity="0.9"/>
    <ellipse cx="63" cy="36" rx="3" ry="2.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="55" cy="36" r="1.8" fill="#040D21"/>
    <circle cx="64" cy="36" r="1.8" fill="#040D21"/>
    <circle cx="55.5" cy="35.5" r="0.6" fill="#00FFE5"/>
    <circle cx="64.5" cy="35.5" r="0.6" fill="#00FFE5"/>
    <!-- Helmet antenna -->
    <line x1="70" y1="24" x2="78" y2="16" stroke="#2E86C1" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="79" cy="15" r="3" fill="#00FFE5" opacity="0.9" filter="url(#glowF)"/>
    <circle cx="79" cy="15" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    <!-- Helmet bolts -->
    <circle cx="44" cy="38" r="1.5" fill="#5DADE2" stroke="#1A5276" stroke-width="0.3"/>
    <circle cx="44" cy="44" r="1.5" fill="#5DADE2" stroke="#1A5276" stroke-width="0.3"/>
    <circle cx="78" cy="38" r="1.5" fill="#5DADE2" stroke="#1A5276" stroke-width="0.3"/>
    <!-- Breathing tube -->
    <path d="M74,42 C80,44 84,48 82,54" stroke="#5DADE2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M74,42 C80,44 84,48 82,54" stroke="#87CEEB" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Bubbles -->
  <g id="bubbles">
    <circle cx="78" cy="22" r="3" fill="url(#bubbleGrad)" stroke="#87CEEB" stroke-width="0.3"/>
    <circle cx="84" cy="14" r="2" fill="url(#bubbleGrad)" stroke="#87CEEB" stroke-width="0.3"/>
    <circle cx="80" cy="8" r="1.5" fill="url(#bubbleGrad)" stroke="#87CEEB" stroke-width="0.3"/>
    <circle cx="88" cy="18" r="1.2" fill="url(#bubbleGrad)" stroke="#87CEEB" stroke-width="0.2"/>
    <circle cx="74" cy="10" r="1" fill="url(#bubbleGrad)" stroke="#87CEEB" stroke-width="0.2"/>
  </g>

  <!-- Rim lighting effect -->
  <g id="rimLighting" opacity="0.3">
    <path d="M42,50 C38,42 44,22 62,20 C72,20 80,24 82,30" stroke="#00FFE5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M38,70 C36,60 38,55 42,50" stroke="#00FFE5" stroke-width="1" fill="none"/>
  </g>
</svg>