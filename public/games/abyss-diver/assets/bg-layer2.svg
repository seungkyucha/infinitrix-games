<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Coral gradient -->
    <linearGradient id="coralGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7EB3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0A2E4D" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="coralGrad2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#9B59FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#040D21" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Rock gradient -->
    <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A4D"/>
      <stop offset="100%" stop-color="#0A1E2D"/>
    </linearGradient>
    <!-- Kelp gradient -->
    <linearGradient id="kelpGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0A2E4D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Anemone glow -->
    <radialGradient id="anemoneGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF7EB3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF7EB3" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan bioluminescence -->
    <radialGradient id="bioGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0"/>
    </radialGradient>
    <!-- Cave gradient -->
    <radialGradient id="caveGrad" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#051528"/>
      <stop offset="100%" stop-color="#040D21"/>
    </radialGradient>
    <!-- Vent glow -->
    <radialGradient id="ventGlow" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#FF6B35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <!-- Fog -->
    <linearGradient id="fogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2E4D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A2E4D" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Main seabed terrain -->
  <g>
    <path d="M0,650 C30,640 60,645 100,640 C160,630 200,620 260,625 C320,630 360,610 420,600 C480,590 520,600 580,595 C620,590 660,580 720,585 C780,590 820,570 880,575 C940,580 980,560 1040,565 C1100,570 1140,580 1200,575 L1200,800 L0,800 Z" fill="url(#rockGrad)"/>
    <!-- Second terrain layer -->
    <path d="M0,700 C60,690 120,695 180,688 C250,680 300,690 380,685 C440,680 500,695 580,688 C650,680 720,695 800,690 C870,685 940,700 1020,692 C1080,685 1140,695 1200,690 L1200,800 L0,800 Z" fill="#0A1E2D"/>
  </g>

  <!-- Large coral formation (left) -->
  <g opacity="0.85">
    <!-- Branch coral -->
    <path d="M80,640 C75,600 65,570 55,540 C50,525 45,510 50,500 C55,495 62,500 60,520 C65,510 70,495 78,490 C85,487 88,495 82,510" fill="url(#coralGrad1)" stroke="#FF7EB3" stroke-width="0.8" opacity="0.7"/>
    <path d="M80,640 C85,610 95,580 100,560 C105,545 115,530 120,525 C125,522 128,528 122,540 C130,530 140,520 148,518 C155,517 155,525 148,535" fill="url(#coralGrad1)" stroke="#FF7EB3" stroke-width="0.8" opacity="0.6"/>
    <!-- Coral base -->
    <ellipse cx="90" cy="645" rx="35" ry="10" fill="#1A3A4D"/>
    <!-- Bioluminescent tips -->
    <circle cx="50" cy="500" r="4" fill="url(#anemoneGlow)"/>
    <circle cx="78" cy="490" r="3" fill="url(#anemoneGlow)"/>
    <circle cx="120" cy="525" r="4" fill="url(#anemoneGlow)"/>
    <circle cx="148" cy="518" r="3" fill="url(#anemoneGlow)"/>
  </g>

  <!-- Large rock formation with cave (center-left) -->
  <g>
    <path d="M300,600 C280,560 270,520 275,480 C278,460 290,440 310,435 C330,430 350,440 360,460 C370,480 365,510 370,540 C375,570 380,590 385,600 Z" fill="url(#rockGrad)" stroke="#1A3A4D" stroke-width="0.5"/>
    <!-- Cave opening -->
    <ellipse cx="330" cy="560" rx="25" ry="18" fill="url(#caveGrad)"/>
    <ellipse cx="330" cy="560" rx="20" ry="14" fill="#020810"/>
    <!-- Cave bioluminescence -->
    <circle cx="325" cy="555" r="2" fill="#00FFE5" opacity="0.5"/>
    <circle cx="335" cy="560" r="1.5" fill="#00FFE5" opacity="0.4"/>
    <circle cx="328" cy="565" r="1" fill="#9B59FF" opacity="0.3"/>
    <!-- Stalactites -->
    <path d="M310,542 L312,552 L314,542" fill="#0A1E2D"/>
    <path d="M320,541 L322,555 L324,541" fill="#0A1E2D"/>
    <path d="M340,542 L342,554 L344,542" fill="#0A1E2D"/>
    <path d="M348,543 L349,550 L350,543" fill="#0A1E2D"/>
  </g>

  <!-- Kelp forest (center) -->
  <g opacity="0.7">
    <path d="M500,690 C498,650 502,610 496,580 C490,550 496,520 492,490 C488,460 494,440 490,420" stroke="url(#kelpGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M520,685 C522,650 518,620 522,590 C526,560 520,530 524,500 C528,470 522,450 526,430" stroke="url(#kelpGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M540,688 C538,660 542,630 536,600 C530,570 538,540 534,510" stroke="url(#kelpGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M555,692 C557,665 553,638 557,610 C561,582 555,560 559,540" stroke="url(#kelpGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Kelp leaves -->
    <ellipse cx="488" cy="430" rx="8" ry="3" fill="#00B8A9" opacity="0.3" transform="rotate(-20,488,430)"/>
    <ellipse cx="528" cy="445" rx="7" ry="2.5" fill="#00B8A9" opacity="0.25" transform="rotate(15,528,445)"/>
    <ellipse cx="494" cy="480" rx="9" ry="3" fill="#00B8A9" opacity="0.2" transform="rotate(-10,494,480)"/>
    <ellipse cx="536" cy="520" rx="8" ry="2.5" fill="#00B8A9" opacity="0.2" transform="rotate(20,536,520)"/>
  </g>

  <!-- Thermal vent (right side) -->
  <g>
    <path d="M850,600 C840,590 835,580 838,570 C842,555 855,550 865,555 C875,560 878,575 875,590 C873,598 870,605 868,610" fill="url(#rockGrad)"/>
    <!-- Vent opening -->
    <ellipse cx="855" cy="568" rx="8" ry="5" fill="#FF6B35" opacity="0.3"/>
    <ellipse cx="855" cy="568" rx="5" ry="3" fill="#FF6B35" opacity="0.5"/>
    <!-- Heat shimmer -->
    <ellipse cx="855" cy="530" rx="15" ry="30" fill="url(#ventGlow)"/>
    <!-- Smoke/bubbles from vent -->
    <circle cx="852" cy="540" r="3" fill="#FF6B35" opacity="0.15"/>
    <circle cx="858" cy="520" r="4" fill="#FF6B35" opacity="0.1"/>
    <circle cx="855" cy="500" r="5" fill="#FF6B35" opacity="0.05"/>
    <circle cx="850" cy="550" r="2" fill="#FFD700" opacity="0.1"/>
  </g>

  <!-- Large coral formation (right) -->
  <g opacity="0.8">
    <path d="M1000,575 C990,540 985,510 990,480 C995,460 1005,450 1015,455 C1020,458 1022,470 1018,485" fill="url(#coralGrad2)" stroke="#9B59FF" stroke-width="0.8"/>
    <path d="M1020,580 C1025,550 1035,520 1040,500 C1045,485 1055,475 1065,480 C1070,483 1068,495 1060,510" fill="url(#coralGrad2)" stroke="#9B59FF" stroke-width="0.8"/>
    <!-- Small branch corals -->
    <path d="M1050,585 C1048,565 1052,545 1058,530" stroke="#9B59FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M1070,590 C1072,570 1068,555 1074,540" stroke="#FF7EB3" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- Coral base -->
    <ellipse cx="1035" cy="585" rx="40" ry="10" fill="#1A3A4D" opacity="0.7"/>
    <!-- Glow tips -->
    <circle cx="990" cy="480" r="3" fill="url(#bioGlow)"/>
    <circle cx="1040" cy="500" r="3.5" fill="url(#bioGlow)"/>
    <circle cx="1058" cy="530" r="2.5" fill="url(#anemoneGlow)"/>
    <circle cx="1074" cy="540" r="2" fill="url(#anemoneGlow)"/>
  </g>

  <!-- Sea anemones -->
  <g opacity="0.6">
    <!-- Anemone 1 -->
    <ellipse cx="200" cy="640" rx="15" ry="8" fill="#FF7EB3" opacity="0.3"/>
    <path d="M188,640 C186,625 190,615 192,610" stroke="#FF7EB3" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M195,638 C193,620 196,612 198,608" stroke="#FF7EB3" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M202,638 C204,622 200,614 202,608" stroke="#FF7EB3" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M210,640 C212,626 208,616 210,610" stroke="#FF7EB3" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Anemone 2 -->
    <ellipse cx="680" cy="580" rx="12" ry="6" fill="#9B59FF" opacity="0.25"/>
    <path d="M672,578 C670,565 674,558 676,553" stroke="#9B59FF" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M680,576 C678,562 682,554 684,550" stroke="#9B59FF" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M688,578 C690,565 686,558 688,553" stroke="#9B59FF" stroke-width="1.2" fill="none" opacity="0.35"/>
  </g>

  <!-- Rocks and pebbles on seabed -->
  <g opacity="0.6">
    <ellipse cx="150" cy="695" rx="12" ry="6" fill="#1A3A4D"/>
    <ellipse cx="420" cy="688" rx="18" ry="8" fill="#1A3A4D"/>
    <ellipse cx="650" cy="692" rx="10" ry="5" fill="#1A3A4D"/>
    <ellipse cx="920" cy="685" rx="14" ry="7" fill="#1A3A4D"/>
    <ellipse cx="1150" cy="690" rx="16" ry="6" fill="#1A3A4D"/>
    <!-- Small scattered pebbles -->
    <circle cx="70" cy="700" r="3" fill="#0A1E2D"/><circle cx="230" cy="698" r="2" fill="#0A1E2D"/>
    <circle cx="460" cy="695" r="2.5" fill="#0A1E2D"/><circle cx="580" cy="700" r="2" fill="#0A1E2D"/>
    <circle cx="750" cy="698" r="3" fill="#0A1E2D"/><circle cx="1080" cy="695" r="2" fill="#0A1E2D"/>
  </g>

  <!-- Ancient rune stones (underwater ruins) -->
  <g opacity="0.5">
    <!-- Rune stone 1 -->
    <rect x="400" y="620" width="18" height="28" rx="3" fill="#0A2E4D" stroke="#1A5276" stroke-width="0.5"/>
    <text x="409" y="640" text-anchor="middle" font-family="system-ui" font-size="10" fill="#00FFE5" opacity="0.5">ᚱ</text>
    <!-- Rune stone 2 -->
    <rect x="780" y="610" width="15" height="25" rx="2" fill="#0A2E4D" stroke="#1A5276" stroke-width="0.5"/>
    <text x="787.5" y="628" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9B59FF" opacity="0.4">ᛊ</text>
    <!-- Broken column -->
    <rect x="1120" y="600" width="12" height="35" rx="2" fill="#0A2E4D" stroke="#1A5276" stroke-width="0.5"/>
    <path d="M1118,600 L1126,592 L1134,600" fill="#0A2E4D" stroke="#1A5276" stroke-width="0.3"/>
  </g>

  <!-- Floating bubbles (near viewer) -->
  <g opacity="0.3">
    <circle cx="100" cy="500" r="4" fill="none" stroke="#87CEEB" stroke-width="0.5"/>
    <circle cx="350" cy="450" r="3" fill="none" stroke="#87CEEB" stroke-width="0.4"/>
    <circle cx="600" cy="400" r="5" fill="none" stroke="#87CEEB" stroke-width="0.5"/>
    <circle cx="900" cy="480" r="3.5" fill="none" stroke="#87CEEB" stroke-width="0.4"/>
    <circle cx="1100" cy="420" r="4" fill="none" stroke="#87CEEB" stroke-width="0.5"/>
    <circle cx="250" cy="350" r="2.5" fill="none" stroke="#87CEEB" stroke-width="0.3"/>
    <circle cx="750" cy="380" r="3" fill="none" stroke="#87CEEB" stroke-width="0.4"/>
    <circle cx="450" cy="300" r="2" fill="none" stroke="#87CEEB" stroke-width="0.3"/>
  </g>

  <!-- Firefly-like bioluminescence (near) -->
  <g>
    <circle cx="130" cy="550" r="2" fill="#00FFE5" opacity="0.5"/>
    <circle cx="380" cy="500" r="1.5" fill="#9B59FF" opacity="0.4"/>
    <circle cx="620" cy="520" r="2" fill="#00FFE5" opacity="0.45"/>
    <circle cx="830" cy="490" r="1.5" fill="#FF7EB3" opacity="0.3"/>
    <circle cx="1050" cy="530" r="2" fill="#00FFE5" opacity="0.4"/>
    <circle cx="260" cy="580" r="1.2" fill="#9B59FF" opacity="0.3"/>
    <circle cx="700" cy="540" r="1.8" fill="#00FFE5" opacity="0.35"/>
    <circle cx="960" cy="510" r="1.5" fill="#FFD700" opacity="0.25"/>
  </g>

  <!-- Bottom fog layers -->
  <g>
    <ellipse cx="200" cy="750" rx="250" ry="40" fill="#0A2E4D" opacity="0.3"/>
    <ellipse cx="600" cy="760" rx="300" ry="35" fill="#071E35" opacity="0.25"/>
    <ellipse cx="1000" cy="740" rx="250" ry="45" fill="#0A2E4D" opacity="0.3"/>
  </g>

  <!-- Top fog (depth transition) -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#fogGrad)" opacity="0.3"/>
</svg>