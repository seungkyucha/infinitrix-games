<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Oxygen bubble gradient (HP = oxygen) -->
    <radialGradient id="bubbleMain" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#87CEEB" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#00B8A9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Inner liquid gradient -->
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#00FFE5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Rim gradient -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="50%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#0A2E4D"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="heartGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="heartShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#040D21" flood-opacity="0.5"/>
    </filter>
    <!-- Shine -->
    <radialGradient id="shineSpot" cx="0.3" cy="0.25" r="0.3">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- O2 text gradient -->
    <linearGradient id="o2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <!-- Outer glow aura -->
    <radialGradient id="heartAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#00FFE5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background aura -->
  <circle cx="24" cy="24" r="22" fill="url(#heartAura)"/>

  <!-- Outer ring (pressure gauge style) -->
  <g filter="url(#heartShadow)">
    <circle cx="24" cy="24" r="19" fill="none" stroke="url(#rimGrad)" stroke-width="2.5"/>
    <!-- Gauge tick marks -->
    <line x1="24" y1="3" x2="24" y2="7" stroke="#5DADE2" stroke-width="1" opacity="0.7"/>
    <line x1="24" y1="41" x2="24" y2="45" stroke="#5DADE2" stroke-width="1" opacity="0.7"/>
    <line x1="3" y1="24" x2="7" y2="24" stroke="#5DADE2" stroke-width="1" opacity="0.7"/>
    <line x1="41" y1="24" x2="45" y2="24" stroke="#5DADE2" stroke-width="1" opacity="0.7"/>
    <line x1="9" y1="9" x2="11.8" y2="11.8" stroke="#5DADE2" stroke-width="0.7" opacity="0.5"/>
    <line x1="36.2" y1="11.8" x2="39" y2="9" stroke="#5DADE2" stroke-width="0.7" opacity="0.5"/>
    <line x1="9" y1="39" x2="11.8" y2="36.2" stroke="#5DADE2" stroke-width="0.7" opacity="0.5"/>
    <line x1="36.2" y1="36.2" x2="39" y2="39" stroke="#5DADE2" stroke-width="0.7" opacity="0.5"/>
    <!-- Minor ticks -->
    <line x1="16" y1="4.5" x2="16.5" y2="6.5" stroke="#5DADE2" stroke-width="0.5" opacity="0.4"/>
    <line x1="32" y1="4.5" x2="31.5" y2="6.5" stroke="#5DADE2" stroke-width="0.5" opacity="0.4"/>
    <line x1="16" y1="43.5" x2="16.5" y2="41.5" stroke="#5DADE2" stroke-width="0.5" opacity="0.4"/>
    <line x1="32" y1="43.5" x2="31.5" y2="41.5" stroke="#5DADE2" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Main bubble (oxygen) -->
  <g filter="url(#heartGlow)">
    <circle cx="24" cy="24" r="15" fill="url(#bubbleMain)" stroke="#00B8A9" stroke-width="0.5"/>
  </g>

  <!-- Oxygen liquid inside -->
  <clipPath id="bubbleClip"><circle cx="24" cy="24" r="14"/></clipPath>
  <g clip-path="url(#bubbleClip)">
    <!-- Liquid fill (representing oxygen level) -->
    <path d="M8,26 Q12,24 16,26 Q20,28 24,26 Q28,24 32,26 Q36,28 40,26 L40,44 L8,44 Z" fill="url(#liquidGrad)"/>
    <!-- Liquid wave highlight -->
    <path d="M8,27 Q14,25 20,27 Q26,29 32,27 Q38,25 40,27" stroke="#FFFFFF" stroke-width="0.4" fill="none" opacity="0.5"/>
    <!-- Mini bubbles inside -->
    <circle cx="18" cy="32" r="1.5" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="28" cy="35" r="1" fill="#FFFFFF" opacity="0.25"/>
    <circle cx="22" cy="38" r="0.8" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="30" cy="30" r="1.2" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="15" cy="36" r="0.7" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- Shine/highlight -->
  <ellipse cx="18" cy="17" rx="5" ry="4" fill="url(#shineSpot)"/>
  <ellipse cx="15" cy="15" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- O₂ symbol -->
  <text x="24" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="bold" fill="url(#o2Grad)" opacity="0.85">O₂</text>

  <!-- Decorative rivets on rim -->
  <circle cx="24" cy="5" r="1.2" fill="#2E86C1" stroke="#1A5276" stroke-width="0.3"/>
  <circle cx="43" cy="24" r="1.2" fill="#2E86C1" stroke="#1A5276" stroke-width="0.3"/>
  <circle cx="24" cy="43" r="1.2" fill="#2E86C1" stroke="#1A5276" stroke-width="0.3"/>
  <circle cx="5" cy="24" r="1.2" fill="#2E86C1" stroke="#1A5276" stroke-width="0.3"/>

  <!-- Cross-hair lines (depth gauge aesthetic) -->
  <line x1="24" y1="8" x2="24" y2="11" stroke="#00FFE5" stroke-width="0.4" opacity="0.5"/>
  <line x1="24" y1="37" x2="24" y2="40" stroke="#00FFE5" stroke-width="0.4" opacity="0.5"/>
  <line x1="8" y1="24" x2="11" y2="24" stroke="#00FFE5" stroke-width="0.4" opacity="0.5"/>
  <line x1="37" y1="24" x2="40" y2="24" stroke="#00FFE5" stroke-width="0.4" opacity="0.5"/>
</svg>