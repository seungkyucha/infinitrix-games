// TweenManager with clearImmediate (F6)
class TweenManager {
  constructor() { this._tweens = []; this._pendingAdd = []; this._isUpdating = false; }
  // Add a new tween to the pool
  add(t) {
    t.elapsed = 0;
    if (this._isUpdating) this._pendingAdd.push(t);
    else this._tweens.push(t);
    return t;
  }
  // Immediately clear all tweens (no deferred race condition)
  clearImmediate() {
    this._tweens.length = 0;
    this._pendingAdd.length = 0;
    this._isUpdating = false;
  }
  // Update all active tweens
  update(dt) {
    this._isUpdating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.duration, 1);
      const ease = t.ease ? t.ease(p) : p;
      if (t.target && t.prop !== undefined) {
        t.target[t.prop] = t.from + (t.to - t.from) * ease;
      } else if (t.onUpdate) {
        t.onUpdate(t.from + (t.to - t.from) * ease);
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
    this._isUpdating = false;
    if (this._pendingAdd.length > 0) {
      this._tweens.push(...this._pendingAdd);
      this._pendingAdd.length = 0;
    }
  }
}

// Easing functions
function easeOutQuad(t) { return t * (2 - t); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutBack(t) { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); }

// SoundManager — Web Audio synthesis, no setTimeout (F2)
class SoundManager {
  constructor() { this.ctx = null; this.muted = false; }
  // Initialize audio context on user interaction
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Play a named sound effect
  play(name, vol) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    const g = this.ctx.createGain();
    g.connect(this.ctx.destination);
    switch(name) {
      case 'bumperHit': this._tone(g, 'sine', 440, 880, 0.05, vol||0.5, now); break;
      case 'powerBumperHit': this._tone(g, 'square', 660, 1320, 0.08, vol||0.6, now); break;
      case 'crystalBreak': this._crystal(g, vol||0.7, now); break;
      case 'flipper': this._tone(g, 'square', 220, 220, 0.03, vol||0.3, now); break;
      case 'plunger': this._tone(g, 'sine', 100, 400, 0.1, vol||0.5, now); break;
      case 'drain': this._tone(g, 'sine', 440, 110, 0.5, vol||0.8, now); break;
      case 'combo': this._chord(g, vol||0.6, now); break;
      case 'tableComplete': this._fanfare(g, vol||0.8, now); break;
    }
  }
  // Simple tone sweep
  _tone(g, type, f1, f2, dur, vol, t) {
    const o = this.ctx.createOscillator();
    o.type = type; o.frequency.setValueAtTime(f1, t);
    o.frequency.linearRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.linearRampToValueAtTime(0, t + dur + 0.02);
    o.connect(g); o.start(t); o.stop(t + dur + 0.03);
  }
  // Crystal break multi-tone
  _crystal(g, vol, t) {
    for (let i = 0; i < 3; i++) {
      const o = this.ctx.createOscillator();
      o.type = 'sine'; o.frequency.setValueAtTime(2000 - i * 600, t + i * 0.05);
      o.frequency.linearRampToValueAtTime(200, t + 0.3);
      const sub = this.ctx.createGain();
      sub.gain.setValueAtTime(vol * 0.5, t + i * 0.05);
      sub.gain.linearRampToValueAtTime(0, t + 0.35);
      o.connect(sub); sub.connect(g); o.start(t + i * 0.05); o.stop(t + 0.4);
    }
  }
  // Combo chord (3 notes)
  _chord(g, vol, t) {
    [523, 659, 784].forEach((f, i) => {
      const o = this.ctx.createOscillator();
      o.type = 'sine'; o.frequency.value = f;
      const sub = this.ctx.createGain();
      sub.gain.setValueAtTime(vol * 0.4, t + i * 0.04);
      sub.gain.linearRampToValueAtTime(0, t + 0.3);
      o.connect(sub); sub.connect(g); o.start(t + i * 0.04); o.stop(t + 0.35);
    });
  }
  // Victory fanfare arpeggio
  _fanfare(g, vol, t) {
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = this.ctx.createOscillator();
      o.type = 'triangle'; o.frequency.value = f;
      const sub = this.ctx.createGain();
      sub.gain.setValueAtTime(vol * 0.5, t + i * 0.15);
      sub.gain.linearRampToValueAtTime(0, t + i * 0.15 + 0.4);
      o.connect(sub); sub.connect(g); o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.45);
    });
  }
  // BGM drone loop
  startBGM(boss) {
    if (!this.ctx || this.bgmNode) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = boss ? 'sawtooth' : 'triangle';
    o.frequency.value = boss ? 55 : 65;
    g.gain.value = boss ? 0.08 : 0.05;
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); this.bgmNode = o; this.bgmGain = g;
  }
  stopBGM() {
    if (this.bgmNode) { this.bgmNode.stop(); this.bgmNode = null; this.bgmGain = null; }
  }
}

// ParticlePool — object pooling for GC reduction
class ParticlePool {
  constructor(size) {
    this.pool = [];
    for (let i = 0; i < size; i++) this.pool.push({ active: false, x:0, y:0, vx:0, vy:0, life:0, maxLife:0, color:'#fff', size:3 });
    this.active = [];
  }
  // Spawn particles at position
  spawn(x, y, count, color, speed, life, size) {
    for (let i = 0; i < count; i++) {
      let p = this.pool.find(p => !p.active);
      if (!p) { p = { active:false }; this.pool.push(p); }
      const a = Math.random() * Math.PI * 2;
      const s = speed * (0.5 + Math.random() * 0.5);
      p.x = x; p.y = y; p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
      p.life = life; p.maxLife = life;
      p.color = color === 'rainbow' ? CRYSTAL_COLORS[Math.floor(Math.random() * 5)] : color;
      p.size = size * (0.7 + Math.random() * 0.6);
      p.active = true;
    }
  }
  // Update all active particles
  update(dt) {
    for (const p of this.pool) {
      if (!p.active) continue;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.life -= dt;
      if (p.life <= 0) p.active = false;
    }
  }
  // Render all active particles
  render(ctx) {
    for (const p of this.pool) {
      if (!p.active) continue;
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// Resize canvas to fill window with devicePixelRatio
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Calculate table scale to fit screen
  tableScale = Math.min(W / CONFIG.TABLE_BASE_W, H / CONFIG.TABLE_BASE_H) * 0.92;
  tableOffX = (W - CONFIG.TABLE_BASE_W * tableScale) / 2;
  tableOffY = (H - CONFIG.TABLE_BASE_H * tableScale) / 2;
  // Rebuild offscreen cache
  if (offCanvas) {
    offCanvas.width = W * dpr;
    offCanvas.height = H * dpr;
    offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  if (gameState === 'PLAYING' || gameState === 'DRAIN') buildTableCache(currentTable);
}

// Apply gravity to ball (pure function, F3)
function applyGravity(b, dt, gravMult) {
  b.vy += CONFIG.GRAVITY * gravMult * dt;
}

// Update ball position (pure function)
function updateBallPosition(b, dt) {
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  // Clamp max speed
  const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
  const maxSpd = CONFIG.BALL_MAX_SPEED * (1 - getUpgradeLv('ballControl') * 0.05);
  if (spd > maxSpd) { b.vx *= maxSpd / spd; b.vy *= maxSpd / spd; }
}

// Check wall collision (table boundaries)
function checkWallCollision(b, s) {
  const r = CONFIG.BALL_RADIUS * s;
  const l = tableOffX + 10 * s, rr = tableOffX + (CONFIG.TABLE_BASE_W - 10) * s;
  const t = tableOffY + 10 * s;
  if (b.x - r < l) { b.x = l + r; b.vx = Math.abs(b.vx) * CONFIG.WALL_RESTITUTION; }
  if (b.x + r > rr) { b.x = rr - r; b.vx = -Math.abs(b.vx) * CONFIG.WALL_RESTITUTION; }
  if (b.y - r < t) { b.y = t + r; b.vy = Math.abs(b.vy) * CONFIG.WALL_RESTITUTION; }
}

// Resolve circle-circle collision (pure function, F3)
function resolveCircleCollision(b, ox, oy, or, restitution) {
  const dx = b.x - ox, dy = b.y - oy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const br = CONFIG.BALL_RADIUS * tableScale;
  if (dist >= br + or || dist < 0.001) return false;
  const nx = dx / dist, ny = dy / dist;
  const vDotN = b.vx * nx + b.vy * ny;
  if (vDotN > 0) return false;
  b.vx -= (1 + restitution) * vDotN * nx;
  b.vy -= (1 + restitution) * vDotN * ny;
  const overlap = (br + or) - dist;
  b.x += nx * (overlap + 1);
  b.y += ny * (overlap + 1);
  return true;
}

// Check flipper collision
function checkFlipperCollision(b, flips, s) {
  for (const f of flips) {
    const fx = tableOffX + f.pivotX * s;
    const fy = tableOffY + f.pivotY * s;
    const angle = f.currentAngle;
    const tipX = fx + Math.cos(angle) * CONFIG.FLIPPER_LENGTH * s * f.dir;
    const tipY = fy + Math.sin(angle) * CONFIG.FLIPPER_LENGTH * s;
    // Line segment collision
    const dx = tipX - fx, dy = tipY - fy;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) continue;
    let t = ((b.x - fx) * dx + (b.y - fy) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const closestX = fx + t * dx, closestY = fy + t * dy;
    const distX = b.x - closestX, distY = b.y - closestY;
    const dist = Math.sqrt(distX * distX + distY * distY);
    const colR = CONFIG.BALL_RADIUS * s + CONFIG.FLIPPER_WIDTH * s * 0.5;
    if (dist < colR && dist > 0.01) {
      const nx = distX / dist, ny = distY / dist;
      const vDotN = b.vx * nx + b.vy * ny;
      if (vDotN > 0) continue;
      let rest = CONFIG.FLIPPER_RESTITUTION + getUpgradeLv('flipperPower') * 0.1;
      // Extra velocity if flipping
      let flipBonus = 0;
      if (f.isActive) flipBonus = 300 * s;
      b.vx -= (1 + rest) * vDotN * nx + flipBonus * nx;
      b.vy -= (1 + rest) * vDotN * ny - Math.abs(flipBonus) * 0.5;
      const overlap = colR - dist;
      b.x += nx * (overlap + 1);
      b.y += ny * (overlap + 1);
      snd.play('flipper');
    }
  }
}

// Check bumper collision
function checkBumperCollisions(b, bumps, s) {
  for (const bmp of bumps) {
    if (bmp.destroyed) continue;
    const bx = tableOffX + bmp.x * s, by = tableOffY + bmp.y * s;
    const rest = bmp.isPower ? 2.0 : CONFIG.BUMPER_RESTITUTION;
    if (resolveCircleCollision(b, bx, by, bmp.r * s, rest)) {
      bmp.hitAnim = 1.0;
      const pts = bmp.isPower ? SCORE.POWER_BUMPER : SCORE.BUMPER;
      addScore(pts * comboMult(comboCount));
      comboCount++; comboTimer = CONFIG.COMBO_TIMEOUT + getUpgradeLv('comboDuration') * 0.3;
      particles.spawn(bx, by, bmp.isPower ? 12 : 8, bmp.isPower ? '#FFD600' : '#FF6D00', 200, 0.4, 3);
      hitEffects.push({ x: bx, y: by, life: 0.3, maxLife: 0.3 });
      snd.play(bmp.isPower ? 'powerBumperHit' : 'bumperHit');
      // Explosive ball destroys normal bumpers
      if (specialMode === 'explosive' && !bmp.isPower) {
        bmp.destroyed = true;
        addScore(300);
        particles.spawn(bx, by, 20, '#FF6D00', 300, 0.6, 5);
      }
      // Check combo achievement
      if (comboCount >= 20) checkAchievement(2);
    }
  }
}

// Check crystal target collision
function checkTargetCollisions(b, targets, s) {
  for (const tgt of targets) {
    if (tgt.destroyed) continue;
    const tx = tableOffX + tgt.x * s, ty = tableOffY + tgt.y * s;
    if (resolveCircleCollision(b, tx, ty, tgt.r * s, 0.8)) {
      tgt.hp--;
      tgt.hitAnim = 1.0;
      if (tgt.hp <= 0) {
        tgt.destroyed = true;
        addScore(SCORE.CRYSTAL * comboMult(comboCount));
        addCrystals(1);
        particles.spawn(tx, ty, 15, tgt.color, 150, 0.6, 4);
        snd.play('crystalBreak');
        // Boss damage from crystal destruction
        if (bossHP > 0) { bossHP -= 2; if (bossHP <= 0) bossHP = 0; }
      } else {
        particles.spawn(tx, ty, 5, tgt.color, 100, 0.3, 2);
        snd.play('bumperHit');
      }
      comboCount++; comboTimer = CONFIG.COMBO_TIMEOUT + getUpgradeLv('comboDuration') * 0.3;
    }
  }
}

// Check drain
function checkDrain(b, drainY) {
  if (b.y > drainY && !isDraining) {
    if (saveGateActive) {
      saveGateActive = false;
      b.vy = -Math.abs(b.vy) * 1.2;
      b.y = drainY - CONFIG.BALL_RADIUS * tableScale * 2;
      particles.spawn(b.x, drainY, 10, '#00E676', 200, 0.5, 3);
    } else {
      beginDrain();
    }
  }
}

// Create ball at plunger position
function createBall() {
  const px = tableOffX + (CONFIG.TABLE_BASE_W - 25) * tableScale;
  const py = tableOffY + (CONFIG.TABLE_BASE_H - 80) * tableScale;
  return { x: px, y: py, vx: 0, vy: 0, trail: [] };
}

// Generate table layout
function generateTable(idx) {
  const td = TABLE_DATA[idx];
  bumpers = []; crystalTargets = []; dropTargets = [];
  rolloverLanes = [false, false, false];
  kickoutCount = 0;
  saveGateActive = false;
  saveGateCharge = 0;
  specialMode = null; specialTimer = 0;

  // Place bumpers in upper area
  const bArea = { x: 60, y: 120, w: 240, h: 180 };
  for (let i = 0; i < td.bumpers; i++) {
    bumpers.push({
      x: bArea.x + 40 + (i % 3) * 80 + (Math.random() - 0.5) * 30,
      y: bArea.y + 30 + Math.floor(i / 3) * 70 + (Math.random() - 0.5) * 20,
      r: 20, isPower: false, destroyed: false, hitAnim: 0
    });
  }
  for (let i = 0; i < td.pBumpers; i++) {
    bumpers.push({
      x: bArea.x + 60 + i * 100 + (Math.random() - 0.5) * 20,
      y: bArea.y + 90 + (Math.random() - 0.5) * 30,
      r: 25, isPower: true, destroyed: false, hitAnim: 0
    });
  }

  // Place crystal targets
  for (let i = 0; i < td.crystals; i++) {
    const row = Math.floor(i / 4);
    const col = i % 4;
    const durability = idx >= 4 ? (idx >= 8 ? 3 : 2) : 1;
    crystalTargets.push({
      x: 60 + col * 75 + (row % 2) * 35 + (Math.random() - 0.5) * 15,
      y: 330 + row * 50 + (Math.random() - 0.5) * 10,
      r: 18, hp: durability, maxHp: durability,
      color: CRYSTAL_COLORS[i % 5], destroyed: false, hitAnim: 0
    });
  }

  // Boss setup
  if (td.boss) {
    bossHP = td.bossHP;
    bossMaxHP = td.bossHP;
    bossPhase = 0;
    bossTimer = 0;
    if (idx === 9) {
      // Final boss: 3 cores
      bossHP = 45;
      bossMaxHP = 45;
    }
  } else {
    bossHP = 0; bossMaxHP = 0;
  }
}

// Create flippers
function createFlippers() {
  return [
    { pivotX: 100, pivotY: 570, dir: 1, currentAngle: CONFIG.FLIPPER_REST_ANGLE, isActive: false },
    { pivotX: 260, pivotY: 570, dir: -1, currentAngle: -CONFIG.FLIPPER_REST_ANGLE, isActive: false }
  ];
}

// ═══════════════════════════════════════════
// §G. STATE MANAGEMENT
// ═══════════════════════════════════════════

// Transition between states (F23 — all transitions via this)
function beginTransition(nextState, duration) {
  if (isTransitioning) return;
  if (STATE_PRIORITY[nextState] < STATE_PRIORITY[gameState] && nextState !== 'TITLE') return;
  duration = duration || 0.4;
  isTransitioning = true;
  tw.add({
    from: 0, to: 1, duration: duration / 2,
    onUpdate: v => { transitionAlpha = v; },
    onComplete: () => {
      enterState(nextState);
      tw.add({
        from: 1, to: 0, duration: duration / 2,
        onUpdate: v => { transitionAlpha = v; },
        onComplete: () => { isTransitioning = false; }
      });
    }
  });
}

// Enter a specific state
function enterState(state) {
  prevState = gameState;
  gameState = state;
  switch (state) {
    case 'TITLE':
      titleAnim = 0;
      snd.stopBGM();
      break;
    case 'TABLE_SELECT':
      upgradeScroll = 0;
      break;
    case 'PLAYING':
      if (prevState === 'TABLE_SELECT' || prevState === 'UPGRADE' || prevState === 'BOSS_INTRO') {
        generateTable(currentTable);
        flippers = createFlippers();
        ball = createBall();
        balls = [ball];
        plungerPower = 0; plungerCharging = false;
        isLaunching = true;
        comboCount = 0; comboTimer = 0;
        perfectRun = true;
        buildTableCache(currentTable);
        snd.startBGM(TABLE_DATA[currentTable].boss);
      }
      isDraining = false;
      break;
    case 'DRAIN':
      break;
    case 'TABLE_CLEAR':
      snd.stopBGM();
      snd.play('tableComplete');
      const reward = TABLE_DATA[currentTable].reward;
      addCrystals(perfectRun ? reward * 2 : reward);
      addScore(10000 * (currentTable + 1));
      if (perfectRun) checkAchievement(6);
      if (currentTable === 4) checkAchievement(5);
      if (currentTable === 3 && unlockedTable >= 4) checkAchievement(4);
      if (currentTable === 9) checkAchievement(10);
      if (currentTable + 1 >= unlockedTable) unlockedTable = Math.min(currentTable + 2, 10);
      particles.spawn(W / 2, H / 2, 50, 'rainbow', 250, 1.5, 5);
      saveProgress();
      break;
    case 'UPGRADE':
      upgradeScroll = 0;
      break;
    case 'BOSS_INTRO':
      isBossIntro = true;
      bossTimer = 0;
      tw.add({
        from: 0, to: 1, duration: 1.5,
        onUpdate: () => {},
        onComplete: () => { isBossIntro = false; beginTransition('PLAYING'); }
      });
      break;
    case 'GAMEOVER':
      snd.stopBGM();
      snd.play('drain');
      shakeIntensity = 10; shakeDuration = 0.5;
      const isNew = score > highScore;
      if (isNew) highScore = score;
      totalScore += score;
      saveProgress();
      if (totalScore >= 1000000) checkAchievement(9);
      break;
    case 'RESULT':
      break;
  }
}

// Toggle pause (instant, no transition — F23 PAUSED exception)
function togglePause() {
  if (isTransitioning) return;
  if (gameState === 'PAUSED') {
    gameState = prevState;
  } else if (gameState === 'PLAYING') {
    prevState = gameState;
    gameState = 'PAUSED';
  }
}

function addScore(amt) { score += Math.floor(amt); }
function addCrystals(amt) { crystals += amt; totalCrystals += amt; if (totalCrystals >= 50) checkAchievement(3); }

// §I. SAVE/LOAD (localStorage)
// ═══════════════════════════════════════════

const SAVE_KEY = 'crystal-pinball-save';

// Load saved progress
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      unlockedTable = d.unlockedTable || 1;
      crystals = d.crystals || 0;
      totalCrystals = d.totalCrystals || 0;
      totalScore = d.totalScore || 0;
      highScore = d.highScore || 0;
      upgrades = d.upgrades || {};
      achievements = d.achievements || [];
      return;
    }
  } catch(e) {}
  // Defaults
  unlockedTable = 1; crystals = 0; totalCrystals = 0; totalScore = 0;
  highScore = 0; upgrades = {}; achievements = [];
}

// Save progress to localStorage
function saveProgress() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      version: 1, unlockedTable, crystals, totalCrystals, totalScore,
      highScore, upgrades, achievements
    }));
  } catch(e) {}
}

  if (ach) {
    addCrystals(ach.reward);
    showToast('🏆 ' + ach.name);

}

// Begin drain sequence
function beginDrain() {
  if (isDraining) return;
  isDraining = true;
  snd.play('drain');
  shakeIntensity = 5; shakeDuration = 0.3;
  drainBall();
  // Remove this ball
  balls = [];
  tw.add({
    from: 0, to: 1, duration: 1.0,
    onUpdate: () => {},
    onComplete: () => {
      isDraining = false;
      if (ballsLeft <= 0) {
        beginTransition('GAMEOVER');
      } else {
        // Respawn ball
        ball = createBall();
        balls = [ball];
        isLaunching = true;
        plungerPower = 0;
      }
    }
  });
}

// Check if table is cleared
function checkTableClear() {
  if (isTransitioning || isDraining) return;
  const allDestroyed = crystalTargets.every(t => t.destroyed);
  const bossDefeated = bossHP <= 0;
  if (allDestroyed && (bossMaxHP === 0 || bossDefeated)) {
    beginTransition('TABLE_CLEAR');
  }
}

// Update title screen
function updateTitle(dt) {
  titleAnim += dt;
}

// Update table selection
function updateTableSelect(dt) {}

// Update main playing state
function updatePlaying(dt) {
  if (isTransitioning || isDraining) return;
  const td = TABLE_DATA[currentTable];
  const s = tableScale;
  const drainY = tableOffY + (CONFIG.TABLE_BASE_H + 10) * s;

  // Update flippers
  for (const f of flippers) {
    const target = f.isActive ? CONFIG.FLIPPER_MAX_ANGLE : CONFIG.FLIPPER_REST_ANGLE;
    const targetAngle = target * (f.dir === -1 ? -1 : 1);
    const diff = targetAngle - f.currentAngle;
    const step = CONFIG.FLIPPER_SWING_SPEED * dt * (f.isActive ? 2 : 1);
    if (Math.abs(diff) < step) f.currentAngle = targetAngle;
    else f.currentAngle += Math.sign(diff) * step;
  }

  // Plunger charging
  if (plungerCharging && isLaunching) {
    plungerPower = Math.min(plungerPower + dt * 800, CONFIG.PLUNGER_MAX_POWER);
  }

  // Physics substeps
  if (!isLaunching) {
    const subDt = (dt * timeScale) / CONFIG.SUB_STEPS;
    for (let step = 0; step < CONFIG.SUB_STEPS; step++) {
      for (let bi = balls.length - 1; bi >= 0; bi--) {
        const b = balls[bi];
        applyGravity(b, subDt, td.grav);
        updateBallPosition(b, subDt);
        checkWallCollision(b, s);
        checkFlipperCollision(b, flippers, s);
        checkBumperCollisions(b, bumpers, s);
        checkTargetCollisions(b, crystalTargets, s);
        checkSpecialModes(b, s);
        // Drain check — multiball: remove extra balls silently
        if (b.y > drainY) {
          if (balls.length > 1) {
            balls.splice(bi, 1);
            particles.spawn(b.x, drainY, 5, '#FF1744', 100, 0.3, 2);
          } else {
            checkDrain(b, drainY);
          }
        }
      }
    }
    // Ball trail
    for (const b of balls) {
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > 12) b.trail.shift();
    }
    // Update main ball reference
    if (balls.length > 0) ball = balls[0];
  }

  // Combo timer
  if (comboCount > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboTimer = 0; }
  }

  // Boss logic
  if (bossHP > 0) {
    bossTimer += dt;
    updateBoss(dt, td, s);
  }

  // Special mode timer
  if (specialMode === 'piercing' || specialMode === 'explosive') {
    specialTimer -= dt;
    if (specialTimer <= 0) { specialMode = null; }
  }

  // Screen shake decay
  if (shakeDuration > 0) {
    shakeDuration -= dt;
    if (shakeDuration <= 0) { shakeIntensity = 0; }
  }

  // Decay hitAnim on bumpers and crystals (F26: moved from render to update)
  for (const bmp of bumpers) {
    if (bmp.hitAnim > 0) bmp.hitAnim = Math.max(0, bmp.hitAnim - dt * 3);
  }
  for (const tgt of crystalTargets) {
    if (tgt.hitAnim > 0) tgt.hitAnim = Math.max(0, tgt.hitAnim - dt * 2.5);
  }

  // Hit effects
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life -= dt;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }

  // Timescale recovery
  if (timeScale < 1) {
    timeScale = Math.min(1, timeScale + dt * 0.7);
  }

  // Combo mega effect
  if (comboCount >= 20) {
    shakeIntensity = Math.max(shakeIntensity, 4);
    shakeDuration = Math.max(shakeDuration, 0.1);
  }

  checkTableClear();
}

// Update boss patterns
function updateBoss(dt, td, s) {
  if (currentTable === 4) {
    // Mid-boss: Ruby Volcano — spawns fire bumpers periodically
    const interval = bossHP > 10 ? 2.0 : 1.5;
    if (bossTimer > interval) {
      bossTimer = 0;
      const count = bossHP > 10 ? 1 : 2;
      for (let i = 0; i < count; i++) {
        bumpers.push({
          x: 80 + Math.random() * 200, y: 100 + Math.random() * 150,
          r: 15, isPower: false, destroyed: false, hitAnim: 0.5
        });
      }
      particles.spawn(tableOffX + 180 * s, tableOffY + 70 * s, 8, '#FF1744', 150, 0.4, 3);
    }
    // Boss core collision — direct hit = 1 HP
    for (const b of balls) {
      const cx = tableOffX + 180 * s, cy = tableOffY + 70 * s;
      if (resolveCircleCollision(b, cx, cy, 22 * s, 1.8)) {
        bossHP = Math.max(0, bossHP - 1);
        addScore(500);
        particles.spawn(cx, cy, 12, '#FF8A80', 200, 0.5, 4);
        snd.play('powerBumperHit');
        shakeIntensity = 6; shakeDuration = 0.2;
        if (bossHP <= 0) { timeScale = 0.3; }
      }
    }
  } else if (currentTable === 9) {
    // Final boss: Prism Throne — 3 phases based on remaining HP
    const phase = bossHP > 30 ? 0 : (bossHP > 15 ? 1 : 2);
    bossPhase = phase;
    // Each core is a collision target
    const cores = [{ x: 100, y: 60 }, { x: 180, y: 50 }, { x: 260, y: 60 }];
    const hpPerCore = 15;
    for (let ci = 0; ci < 3; ci++) {
      const coreAlive = bossHP > (2 - ci) * hpPerCore;
      if (!coreAlive) continue;
      for (const b of balls) {
        const cx = tableOffX + cores[ci].x * s, cy = tableOffY + cores[ci].y * s;
        if (resolveCircleCollision(b, cx, cy, 18 * s, 1.5)) {
          bossHP = Math.max(0, bossHP - 1);
          addScore(500);
          particles.spawn(cx, cy, 10, '#EA80FC', 200, 0.5, 4);
          snd.play('powerBumperHit');
          shakeIntensity = 5; shakeDuration = 0.2;
          if (bossHP <= 0) { timeScale = 0.3; }
        }
      }
    }
    // Phase 2: gravity pull toward cores
    if (phase >= 1 && balls.length > 0) {
      for (const b of balls) {
        const cx = tableOffX + 180 * s, cy = tableOffY + 50 * s;
        const dx = cx - b.x, dy = cy - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 20 && dist < 200 * s) {
          const pull = 80 * dt / dist;
          b.vx += dx * pull;
          b.vy += dy * pull;
        }
      }
    }
  }
}

// Check and activate special modes (multiball, save gate)
function checkSpecialModes(b, s) {
  // Rollover lanes — check 3 vertical zones at top
  const laneZones = [
    { x: 100, y: 80, w: 20, h: 60 },
    { x: 170, y: 80, w: 20, h: 60 },
    { x: 240, y: 80, w: 20, h: 60 }
  ];
  for (let i = 0; i < 3; i++) {
    const lz = laneZones[i];
    const lx = tableOffX + lz.x * s, ly = tableOffY + lz.y * s;
    const lw = lz.w * s, lh = lz.h * s;
    if (!rolloverLanes[i] && b.x >= lx && b.x <= lx + lw && b.y >= ly && b.y <= ly + lh) {
      rolloverLanes[i] = true;
      addScore(SCORE.ROLLOVER * comboMult(comboCount));
      comboCount++; comboTimer = CONFIG.COMBO_TIMEOUT + getUpgradeLv('comboDuration') * 0.3;
      snd.play('bumperHit');
      particles.spawn(lx + lw / 2, ly + lh / 2, 6, '#00E5FF', 100, 0.3, 2);
    }
  }
  // All 3 lanes → multiball
  if (rolloverLanes[0] && rolloverLanes[1] && rolloverLanes[2]) {
    rolloverLanes = [false, false, false];
    activateMultiball();
  }
  // Kickout hole tracking for save gate
  const khx = tableOffX + 60 * s, khy = tableOffY + 200 * s;
  const khDist = Math.sqrt((b.x - khx) ** 2 + (b.y - khy) ** 2);
  if (khDist < 15 * s && !b._kickoutCooldown) {
    b._kickoutCooldown = true;
    kickoutCount++;
    addScore(SCORE.KICKOUT);
    snd.play('bumperHit');
    // Launch ball out after brief pause via tween
    b.vx = (Math.random() - 0.5) * 300;
    b.vy = -600;
    const needed = Math.max(1, 3 - getUpgradeLv('saveGate') * 2);
    if (kickoutCount >= needed && !saveGateActive) {
      saveGateActive = true;
      kickoutCount = 0;
      showToast('SAVE GATE ON');
      particles.spawn(W / 2, H - 30, 10, '#00E676', 150, 0.5, 3);
    }
    tw.add({ from: 0, to: 1, duration: 0.5, onComplete: () => { if (b) b._kickoutCooldown = false; } });
  }
}

// Activate multiball mode
function activateMultiball() {
  const extraCount = 2 + getUpgradeLv('multiball');
  for (let i = 0; i < extraCount; i++) {
    const nb = {
      x: tableOffX + (100 + Math.random() * 160) * tableScale,
      y: tableOffY + 200 * tableScale,
      vx: (Math.random() - 0.5) * 400,
      vy: -400 - Math.random() * 300,
      trail: [], _kickoutCooldown: false
    };
    balls.push(nb);
  }
  showToast('MULTIBALL!');
  snd.play('combo');
  particles.spawn(W / 2, H / 2, 30, '#00E5FF', 300, 0.5, 4);
  checkAchievement(7);
}

// Build offscreen cache for static table elements
function buildTableCache(idx) {
  if (!offCtx) return;
  const s = tableScale;
  offCtx.clearRect(0, 0, W, H);

  // Draw table background
  offCtx.fillStyle = '#141852';
  offCtx.strokeStyle = '#8892B0';
  offCtx.lineWidth = 3;
  const tx = tableOffX, ty = tableOffY;
  const tw2 = CONFIG.TABLE_BASE_W * s, th = CONFIG.TABLE_BASE_H * s;
  roundRect(offCtx, tx, ty, tw2, th, 15);
  offCtx.fill();
  offCtx.stroke();

  // Inner rails
  offCtx.strokeStyle = '#3A3F7A';
  offCtx.lineWidth = 2;
  // Left rail
  offCtx.beginPath();
  offCtx.moveTo(tx + 30 * s, ty + th - 60 * s);
  offCtx.lineTo(tx + 10 * s, ty + th * 0.5);
  offCtx.lineTo(tx + 30 * s, ty + 80 * s);
  offCtx.stroke();
  // Right rail
  offCtx.beginPath();
  offCtx.moveTo(tx + tw2 - 30 * s, ty + th - 60 * s);
  offCtx.lineTo(tx + tw2 - 10 * s, ty + th * 0.5);
  offCtx.lineTo(tx + tw2 - 30 * s, ty + 80 * s);
  offCtx.stroke();

  // Plunger lane
  offCtx.fillStyle = '#0D1040';
  offCtx.fillRect(tx + tw2 - 35 * s, ty + th * 0.4, 30 * s, th * 0.55);

  // Drain area indicator
  offCtx.fillStyle = 'rgba(255,23,68,0.15)';
  offCtx.fillRect(tx + 50 * s, ty + th - 15 * s, tw2 - 100 * s, 15 * s);

  tableCache = true;
}

// ═══════════════════════════════════════════

// Draw rounded rectangle utility
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// Draw star background with parallax
function drawBackground(c, ballRef) {
  // Layer 1: gradient background (100% Canvas, no external assets)
  const grad1 = c.createLinearGradient(0, 0, 0, H);
  grad1.addColorStop(0, '#050820');
  grad1.addColorStop(0.5, '#0A0E27');
  grad1.addColorStop(1, '#0D1040');
  c.fillStyle = grad1;
  c.fillRect(0, 0, W, H);

  // Parallax stars (far layer)
  const bx = ballRef ? (ballRef.x - W / 2) * 0.02 : 0;
  const by = ballRef ? (ballRef.y - H / 2) * 0.02 : 0;
  for (const st of bgStars) {
    const alpha = 0.3 + 0.7 * Math.sin(st.twinkle + titleAnim * st.speed);
    c.globalAlpha = Math.max(0, alpha);
    c.fillStyle = st.bright ? '#E0E8FF' : '#6070A0';
    c.beginPath();
    c.arc(st.x - bx * st.layer, st.y - by * st.layer, st.size, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Layer 2: nebula blobs with parallax
  for (const nb of bgNebulas) {
    c.globalAlpha = 0.12;
    const grad2 = c.createRadialGradient(
      nb.x - bx * 2, nb.y - by * 2, 0,
      nb.x - bx * 2, nb.y - by * 2, nb.r
    );
    grad2.addColorStop(0, nb.color);
    grad2.addColorStop(1, 'transparent');
    c.fillStyle = grad2;
    c.fillRect(nb.x - nb.r - bx * 2, nb.y - nb.r - by * 2, nb.r * 2, nb.r * 2);
  }
  c.globalAlpha = 1;
}

// Draw the pinball (ball + glow + trail)
function drawBall(c, b) {
  const r = CONFIG.BALL_RADIUS * tableScale;
  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const alpha = (i / b.trail.length) * 0.3;
    c.globalAlpha = alpha;
    c.fillStyle = '#00E5FF';
    c.beginPath();
    c.arc(t.x, t.y, r * (i / b.trail.length) * 0.8, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Glow
  c.shadowColor = '#00E5FF';
  c.shadowBlur = 15;

  // Ball — radial gradient glow
  const ballGrad = c.createRadialGradient(b.x - r * 0.3, b.y - r * 0.3, 0, b.x, b.y, r);
  ballGrad.addColorStop(0, '#FFFFFF');
  ballGrad.addColorStop(0.6, '#B0E0FF');
  ballGrad.addColorStop(1, '#00E5FF');
  c.fillStyle = ballGrad;
  c.beginPath();
  c.arc(b.x, b.y, r, 0, Math.PI * 2);
  c.fill();
  c.shadowBlur = 0;
}

// Draw flipper
function drawFlipper(c, f) {
  const s = tableScale;
  const px = tableOffX + f.pivotX * s;
  const py = tableOffY + f.pivotY * s;
  c.save();
  c.translate(px, py);
  c.rotate(f.currentAngle);
  // Flipper shape
  const len = CONFIG.FLIPPER_LENGTH * s;
  const w = CONFIG.FLIPPER_WIDTH * s;
  c.shadowColor = '#00E5FF';
  c.shadowBlur = f.isActive ? 12 : 6;
  c.fillStyle = f.isActive ? '#00FFFF' : '#00B8D4';
  c.beginPath();
  c.moveTo(0, -w / 2);
  c.lineTo(len * f.dir, -w / 4);
  c.lineTo(len * f.dir, w / 4);
  c.lineTo(0, w / 2);
  c.closePath();
  c.fill();
  // Pivot circle
  c.fillStyle = '#E0F7FA';
  c.beginPath();
  c.arc(0, 0, w * 0.4, 0, Math.PI * 2);
  c.fill();
  c.shadowBlur = 0;
  c.restore();
}

// Draw bumper
function drawBumper(c, bmp) {
  if (bmp.destroyed) return;
  const s = tableScale;
  const bx = tableOffX + bmp.x * s;
  const by = tableOffY + bmp.y * s;
  const r = bmp.r * s * (1 + bmp.hitAnim * 0.3);
  const color = bmp.isPower ? '#FFD600' : '#FF6D00';
  c.shadowColor = color;
  c.shadowBlur = bmp.hitAnim > 0 ? 20 : 8;

  // Bumper — radial gradient + star for power bumpers
  const bGrad = c.createRadialGradient(bx, by, 0, bx, by, r);
  bGrad.addColorStop(0, bmp.isPower ? '#FFF9C4' : '#FFE0B2');
  bGrad.addColorStop(0.7, color);
  bGrad.addColorStop(1, bmp.isPower ? '#FF8F00' : '#BF360C');
  c.fillStyle = bGrad;
  c.beginPath();
  c.arc(bx, by, r, 0, Math.PI * 2);
  c.fill();
  // Inner star for power bumpers
  if (bmp.isPower) {
    c.fillStyle = '#FFFFFF';
    c.globalAlpha = 0.8;
    drawStar(c, bx, by, r * 0.5, 5);
    c.globalAlpha = 1;
  }
  c.shadowBlur = 0;
}

// Draw a 5-pointed star shape
function drawStar(c, cx, cy, r, points) {
  c.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rad = r * (i % 2 === 0 ? 1 : 0.4);
    const angle = (i * Math.PI / points) - Math.PI / 2;
    if (i === 0) c.moveTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
    else c.lineTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
  }
  c.closePath();
  c.fill();
}

// Draw crystal target
function drawCrystalTarget(c, tgt) {
  if (tgt.destroyed) return;
  const s = tableScale;
  const tx = tableOffX + tgt.x * s;
  const ty = tableOffY + tgt.y * s;
  const r = tgt.r * s * (1 + tgt.hitAnim * 0.2);
  c.shadowColor = tgt.color;
  c.shadowBlur = tgt.hitAnim > 0 ? 18 : 10;
  // Hexagon
  c.fillStyle = tgt.color;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i * Math.PI / 3) - Math.PI / 6;
    const px = tx + Math.cos(a) * r;
    const py = ty + Math.sin(a) * r;
    if (i === 0) c.moveTo(px, py);
    else c.lineTo(px, py);
  }
  c.closePath();
  c.fill();
  // Inner glow
  c.globalAlpha = 0.5;
  const grad = c.createRadialGradient(tx, ty, 0, tx, ty, r * 0.8);
  grad.addColorStop(0, '#FFFFFF');
  grad.addColorStop(1, tgt.color);
  c.fillStyle = grad;
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i * Math.PI / 3) - Math.PI / 6;
    const px = tx + Math.cos(a) * r * 0.6;
    const py = ty + Math.sin(a) * r * 0.6;
    if (i === 0) c.moveTo(px, py);
    else c.lineTo(px, py);
  }
  c.closePath();
  c.fill();
  c.globalAlpha = 1;
  c.shadowBlur = 0;
  // HP indicator for multi-hit targets
  if (tgt.maxHp > 1) {
    c.fillStyle = '#FFFFFF';
    c.font = `${10 * s}px "Press Start 2P", monospace`;
    c.textAlign = 'center';
    c.fillText(tgt.hp.toString(), tx, ty + 4 * s);
  }
}

// Draw hit effects — Canvas starburst (no external assets)
function drawHitEffects(c) {
  for (const he of hitEffects) {
    const alpha = he.life / he.maxLife;
    const size = 24 * tableScale * (2 - alpha);
    c.globalAlpha = alpha;
    c.shadowColor = '#FFEA00';
    c.shadowBlur = size;
    c.fillStyle = '#FFFFFF';
    c.beginPath();
    c.arc(he.x, he.y, size * 0.3, 0, Math.PI * 2);
    c.fill();
    // Spokes
    c.strokeStyle = '#FFEA00';
    c.lineWidth = 2 * tableScale;
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI / 3) + (1 - alpha) * 0.5;
      c.beginPath();
      c.moveTo(he.x, he.y);
      c.lineTo(he.x + Math.cos(a) * size, he.y + Math.sin(a) * size);
      c.stroke();
    }
    c.shadowBlur = 0;
  }
  c.globalAlpha = 1;
}

// Draw plunger
function drawPlunger(c) {
  const s = tableScale;
  const px = tableOffX + (CONFIG.TABLE_BASE_W - 25) * s;
  const py = tableOffY + (CONFIG.TABLE_BASE_H - 40) * s;
  const h = 50 * s;
  const pullBack = (plungerPower / CONFIG.PLUNGER_MAX_POWER) * 30 * s;
  c.fillStyle = '#8892B0';
  c.fillRect(px - 8 * s, py - h + pullBack, 16 * s, h);
  // Spring
  c.strokeStyle = '#FFD600';
  c.lineWidth = 2;
  const segments = 6;
  c.beginPath();
  for (let i = 0; i <= segments; i++) {
    const yy = py + pullBack + (i / segments) * 30 * s;
    const xx = px + (i % 2 === 0 ? -6 : 6) * s;
    if (i === 0) c.moveTo(px, yy);
    else c.lineTo(xx, yy);
  }
  c.stroke();
  // Handle
  c.fillStyle = '#00E5FF';
  c.shadowColor = '#00E5FF';
  c.shadowBlur = plungerCharging ? 15 : 5;
  roundRect(c, px - 10 * s, py + pullBack, 20 * s, 15 * s, 3);
  c.fill();
  c.shadowBlur = 0;
}

// Draw rollover lanes (multiball activation)
function drawRolloverLanes(c) {
  if (!rolloverLanes) return;
  const s = tableScale;
  const laneZones = [
    { x: 100, y: 80, w: 20, h: 60 },
    { x: 170, y: 80, w: 20, h: 60 },
    { x: 240, y: 80, w: 20, h: 60 }
  ];
  for (let i = 0; i < 3; i++) {
    const lz = laneZones[i];
    const lx = tableOffX + lz.x * s, ly = tableOffY + lz.y * s;
    const lw = lz.w * s, lh = lz.h * s;
    const active = rolloverLanes[i];
    c.strokeStyle = active ? '#00E5FF' : '#1e1e30';
    c.shadowColor = active ? '#00E5FF' : 'transparent';
    c.shadowBlur = active ? 8 : 0;
    c.lineWidth = active ? 3 : 1;
    c.setLineDash(active ? [] : [4, 4]);
    c.beginPath();
    c.moveTo(lx + lw / 2, ly);
    c.lineTo(lx + lw / 2, ly + lh);
    c.stroke();
    c.setLineDash([]);
    // Label
    if (!active) {
      c.fillStyle = '#505070';
      c.font = `${6 * s}px "Press Start 2P", monospace`;
      c.textAlign = 'center';
      c.fillText('M', lx + lw / 2, ly - 3 * s);
    }
  }
  c.shadowBlur = 0;
}

// Draw save gate
function drawSaveGate(c) {
  if (!saveGateActive) return;
  const s = tableScale;
  const gx = tableOffX + 50 * s;
  const gy = tableOffY + (CONFIG.TABLE_BASE_H - 8) * s;
  const gw = (CONFIG.TABLE_BASE_W - 100) * s;
  c.strokeStyle = '#00E676';
  c.shadowColor = '#00E676';
  c.shadowBlur = 10 + Math.sin(Date.now() * 0.005) * 5;
  c.lineWidth = 3;
  c.beginPath();
  c.moveTo(gx, gy);
  c.lineTo(gx + gw, gy);
  c.stroke();
  c.shadowBlur = 0;
}

// Draw boss overlay
function drawBoss(c) {
  if (bossHP <= 0 || bossMaxHP <= 0) return;
  const s = tableScale;
  // Boss HP bar at top
  const barW = 200 * s, barH = 12 * s;
  const barX = tableOffX + (CONFIG.TABLE_BASE_W * s - barW) / 2;
  const barY = tableOffY + 25 * s;
  c.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(c, barX - 4, barY - 4, barW + 8, barH + 8, 4);
  c.fill();
  c.fillStyle = '#FF1744';
  const pct = bossHP / bossMaxHP;
  roundRect(c, barX, barY, barW * pct, barH, 3);
  c.fill();
  c.fillStyle = '#FFF';
  c.font = `${8 * s}px "Press Start 2P", monospace`;
  c.textAlign = 'center';
  c.fillText('BOSS', tableOffX + CONFIG.TABLE_BASE_W * s / 2, barY - 6 * s);
  // Boss core visual (pulsing orb)
  if (currentTable === 4) {
    const cx = tableOffX + 180 * s, cy = tableOffY + 70 * s;
    const pulse = 20 * s + Math.sin(Date.now() * 0.003) * 5 * s;
    c.shadowColor = '#FF1744';
    c.shadowBlur = 20;
    const grad = c.createRadialGradient(cx, cy, 0, cx, cy, pulse);
    grad.addColorStop(0, '#FF8A80');
    grad.addColorStop(0.5, '#FF1744');
    grad.addColorStop(1, '#B71C1C');
    c.fillStyle = grad;
    c.beginPath();
    c.arc(cx, cy, pulse, 0, Math.PI * 2);
    c.fill();
    c.shadowBlur = 0;
  } else if (currentTable === 9) {
    // 3 cores
    const cores = [
      { x: 100, y: 60 }, { x: 180, y: 50 }, { x: 260, y: 60 }
    ];
    const hpPerCore = bossMaxHP / 3;
    cores.forEach((core, i) => {
      const coreHP = Math.max(0, bossHP - (2 - i) * hpPerCore);
      if (coreHP <= 0) return;
      const cx = tableOffX + core.x * s, cy = tableOffY + core.y * s;
      const pulse = 15 * s + Math.sin(Date.now() * 0.004 + i) * 4 * s;
      c.shadowColor = '#D500F9';
      c.shadowBlur = 15;
      const grad = c.createRadialGradient(cx, cy, 0, cx, cy, pulse);
      grad.addColorStop(0, '#EA80FC');
      grad.addColorStop(0.5, '#D500F9');
      grad.addColorStop(1, '#6A1B9A');
      c.fillStyle = grad;
      c.beginPath();
      c.arc(cx, cy, pulse, 0, Math.PI * 2);
      c.fill();
    });
    c.shadowBlur = 0;
  }
}

// Draw HUD (score, balls, crystals, combo)
function drawHUD(c) {
  const pad = 12;
  c.font = '11px "Press Start 2P", monospace';

  // Score (top left)
  c.fillStyle = '#E8EAED';
  c.textAlign = 'left';
  c.fillText('SCORE', pad, pad + 12);
  c.fillStyle = '#00E5FF';
  c.font = '14px "Press Start 2P", monospace';
  c.fillText(score.toLocaleString(), pad, pad + 30);

  // Balls remaining (top right) — heart icon
  c.textAlign = 'right';
  for (let i = 0; i < ballsLeft; i++) {
    const hx = W - pad - i * 28;
    c.fillStyle = '#FF1744';
    c.beginPath();
    const cx = hx - 10, cy = pad + 10;
    c.arc(cx - 4, cy - 3, 6, 0, Math.PI * 2);
    c.arc(cx + 4, cy - 3, 6, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.moveTo(cx - 10, cy);
    c.lineTo(cx, cy + 10);
    c.lineTo(cx + 10, cy);
    c.fill();
  }

  // Crystals (below score) — star icon
  c.textAlign = 'left';
  c.fillStyle = '#D500F9';
  drawStar(c, pad + 8, pad + 48, 6, 5);
  c.fillStyle = '#D500F9';
  c.font = '10px "Press Start 2P", monospace';
  c.fillText(crystals + '💎', pad + 22, pad + 53);

  // Table name
  if (currentTable !== undefined && TABLE_DATA[currentTable]) {
    c.fillStyle = '#8892B0';
    c.font = '8px "Press Start 2P", monospace';
    c.textAlign = 'center';
    c.fillText('T' + (currentTable + 1) + ' ' + TABLE_DATA[currentTable].name, W / 2, pad + 12);
  }

  // Combo display
  if (comboCount >= 3) {
    c.textAlign = 'center';
    c.fillStyle = '#FF4081';
    c.shadowColor = '#FF4081';
    c.shadowBlur = 10;
    const size = comboCount >= 20 ? 18 : (comboCount >= 10 ? 15 : 12);
    c.font = `${size}px "Press Start 2P", monospace`;
    const txt = comboCount >= 20 ? 'MEGA x' + comboMult(comboCount) : 'COMBO x' + comboMult(comboCount);
    c.fillText(txt, W / 2, H * 0.35);
    c.shadowBlur = 0;
  }

  // Special mode indicator
  if (specialMode) {
    c.fillStyle = '#FFEA00';
    c.font = '10px "Press Start 2P", monospace';
    c.textAlign = 'center';
    // Powerup icon — Canvas diamond shape
    c.fillStyle = '#FFEA00';
    c.beginPath();
    const px = W / 2 - 32, py = H * 0.4 - 4;
    c.moveTo(px, py - 8); c.lineTo(px + 8, py); c.lineTo(px, py + 8); c.lineTo(px - 8, py);
    c.closePath(); c.fill();
    c.fillText(specialMode.toUpperCase() + ' ' + Math.ceil(specialTimer) + 's', W / 2, H * 0.4 + 10);
  }
}

// Draw toasts
function drawToasts(c, dt) {
  for (let i = toasts.length - 1; i >= 0; i--) {
    const t = toasts[i];
    t.life -= dt;
    t.y += (t.targetY - t.y) * 0.1;
    if (t.life <= 0) { toasts.splice(i, 1); continue; }
    const alpha = Math.min(1, t.life);
    c.globalAlpha = alpha;
    c.fillStyle = 'rgba(10,14,39,0.9)';
    c.strokeStyle = '#FFD600';
    c.lineWidth = 2;
    const tw2 = c.measureText(t.text).width + 30;
    roundRect(c, W / 2 - tw2 / 2, t.y - 15, tw2, 30, 8);
    c.fill(); c.stroke();
    c.fillStyle = '#FFD600';
    c.font = '10px "Press Start 2P", monospace';
    c.textAlign = 'center';
    c.fillText(t.text, W / 2, t.y + 4);
  }
  c.globalAlpha = 1;
}

// Render title screen with glitch/neon effect
function renderTitle(c) {
  drawBackground(c, null);
  const cx = W / 2, cy = H * 0.35;
  // Scanline effect
  c.fillStyle = 'rgba(0,229,255,0.03)';
  for (let y = 0; y < H; y += 4) {
    c.fillRect(0, y, W, 2);
  }
  // Title glow
  c.shadowColor = '#6c3cf7';
  c.shadowBlur = 30;
  c.fillStyle = '#FFFFFF';
  c.font = '22px "Press Start 2P", monospace';
  c.textAlign = 'center';
  // Glitch offset
  const glitchX = Math.sin(titleAnim * 8) > 0.95 ? (Math.random() - 0.5) * 6 : 0;
  const glitchY = Math.sin(titleAnim * 6) > 0.96 ? (Math.random() - 0.5) * 4 : 0;
  c.fillText('CRYSTAL', cx + glitchX, cy + glitchY);
  c.shadowColor = '#00E5FF';
  c.fillText('PINBALL', cx - glitchX, cy + 32 + glitchY);
  c.shadowBlur = 0;

  // Decorative crystals
  const crystalY = cy + 70;
  CRYSTAL_COLORS.forEach((col, i) => {
    const x = cx - 80 + i * 40;
    const float = Math.sin(titleAnim * 2 + i * 0.8) * 5;
    c.shadowColor = col;
    c.shadowBlur = 12;
    c.fillStyle = col;
    c.beginPath();
    for (let j = 0; j < 6; j++) {
      const a = (j * Math.PI / 3) - Math.PI / 6;
      const px = x + Math.cos(a) * 12;
      const py = crystalY + float + Math.sin(a) * 12;
      if (j === 0) c.moveTo(px, py);
      else c.lineTo(px, py);
    }
    c.closePath();
    c.fill();
  });
  c.shadowBlur = 0;

  // Start prompt (blink)
  if (Math.sin(titleAnim * 3) > 0) {
    c.fillStyle = '#E8EAED';
    c.font = '10px "Press Start 2P", monospace';
    c.fillText(inputMode === 'touch' ? 'TAP TO START' : 'PRESS SPACE', cx, cy + 130);
  }

  // High score
  if (highScore > 0) {
    c.fillStyle = '#8892B0';
    c.font = '8px "Press Start 2P", monospace';
    c.fillText('HI-SCORE: ' + highScore.toLocaleString(), cx, cy + 160);
  }

  // Version / credit
  c.fillStyle = '#505070';
  c.font = '7px "Press Start 2P", monospace';
  c.fillText('v1.0 — InfiniTriX', cx, H - 20);
}

// Render table select screen
function renderTableSelect(c) {
  drawBackground(c, null);
  c.fillStyle = '#E8EAED';
  c.font = '14px "Press Start 2P", monospace';
  c.textAlign = 'center';
  c.fillText('SELECT TABLE', W / 2, 40);

  // Crystal count
  c.fillStyle = '#D500F9';
  c.font = '10px "Press Start 2P", monospace';
  c.fillText(crystals + ' 💎', W / 2, 62);

  // Table grid
  const cols = Math.min(3, Math.max(2, Math.floor(W / 130)));
  const cellW = Math.min(120, (W - 40) / cols);
  const cellH = 60;
  const startX = (W - cols * cellW) / 2;

  for (let i = 0; i < 10; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * cellW + 5;
    const y = 80 + row * (cellH + 10);
    const unlocked = i < unlockedTable;
    const td = TABLE_DATA[i];

    // Card background
    c.fillStyle = unlocked ? '#1a1a2e' : '#0f0f1a';
    c.strokeStyle = unlocked ? (td.boss ? '#FF1744' : '#6c3cf7') : '#1e1e30';
    c.lineWidth = 2;
    roundRect(c, x, y, cellW - 10, cellH, 8);
    c.fill(); c.stroke();

    // Table number & name
    c.fillStyle = unlocked ? '#E8EAED' : '#505070';
    c.font = '8px "Press Start 2P", monospace';
    c.textAlign = 'left';
    c.fillText('T' + (i + 1), x + 8, y + 18);
    c.font = '7px "Press Start 2P", monospace';
    c.fillText(unlocked ? td.name : '???', x + 8, y + 34);

    // Boss indicator
    if (td.boss && unlocked) {
      c.fillStyle = '#FF1744';
      c.font = '6px "Press Start 2P", monospace';
      c.fillText('BOSS', x + 8, y + 48);
    }

    // Reward
    if (unlocked) {
      c.fillStyle = '#D500F9';
      c.font = '6px "Press Start 2P", monospace';
      c.textAlign = 'right';
      c.fillText(td.reward + '💎', x + cellW - 18, y + 48);
    }

    // Lock icon
    if (!unlocked) {
      c.fillStyle = '#505070';
      c.font = '16px "Press Start 2P", monospace';
      c.textAlign = 'center';
      c.fillText('🔒', x + (cellW - 10) / 2, y + cellH / 2 + 6);
    }
  }

  // Upgrade button
  const btnY = 80 + Math.ceil(10 / cols) * (cellH + 10) + 10;
  c.fillStyle = '#12121e';
  c.strokeStyle = '#00E676';
  c.lineWidth = 2;
  roundRect(c, W / 2 - 80, btnY, 160, 40, 8);
  c.fill(); c.stroke();
  c.fillStyle = '#00E676';
  c.font = '10px "Press Start 2P", monospace';
  c.textAlign = 'center';
  c.fillText('UPGRADES', W / 2, btnY + 25);
  // Store button bounds for click detection
  upgradeBtn = { x: W / 2 - 80, y: btnY, w: 160, h: 40 };

  // Back hint
  c.fillStyle = '#8892B0';
  c.font = '7px "Press Start 2P", monospace';
  c.fillText('ESC: Back', W / 2, btnY + 65);
}
let upgradeBtn = { x: 0, y: 0, w: 0, h: 0 };

// Render playing state
function renderPlaying(c, dt) {
  // Background
  drawBackground(c, balls[0] || null);

  // Screen shake
  if (shakeIntensity > 0) {
    c.save();
    c.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
  }

  // Offscreen table cache
  if (tableCache && offCanvas) {
    c.drawImage(offCanvas, 0, 0, W * dpr, H * dpr, 0, 0, W, H);
  }

  // Crystal targets
  for (const tgt of crystalTargets) drawCrystalTarget(c, tgt);

  // Bumpers
  for (const bmp of bumpers) drawBumper(c, bmp);

  // Rollover lanes
  drawRolloverLanes(c);

  // Save gate
  drawSaveGate(c);

  // Boss
  drawBoss(c);

  // Flippers
  for (const f of flippers) drawFlipper(c, f);

  // Plunger
  if (isLaunching) drawPlunger(c);

  // Balls
  for (const b of balls) drawBall(c, b);

  // Hit effects (sprite based)
  drawHitEffects(c);

  // Particles
  particles.update(dt);
  particles.render(c);

  // HUD
  drawHUD(c);

  // M3: Touch area visual guide for first-time mobile players
  if (showTouchGuide && inputMode === 'touch') {
    touchGuideAlpha -= 0.001; // slowly fade out
    if (touchGuideAlpha <= 0) { showTouchGuide = false; }
    else {
      c.globalAlpha = touchGuideAlpha * 0.4;
      // Left flipper zone
      c.fillStyle = '#00E5FF';
      c.fillRect(0, H * 0.6, W * 0.4, H * 0.4);
      // Right flipper zone
      c.fillStyle = '#6c3cf7';
      c.fillRect(W * 0.6, H * 0.6, W * 0.4, H * 0.4);
      // Plunger zone
      c.fillStyle = '#FFD600';
      c.fillRect(W * 0.7, H * 0.1, W * 0.3, H * 0.5);
      c.globalAlpha = Math.min(1, touchGuideAlpha + 0.4);
      c.fillStyle = '#E8EAED';
      c.font = '8px "Press Start 2P", monospace';
      c.textAlign = 'center';
      c.fillText('← FLIP', W * 0.2, H * 0.78);
      c.fillText('FLIP →', W * 0.8, H * 0.78);
      c.fillText('HOLD', W * 0.85, H * 0.35);
      c.fillText('LAUNCH', W * 0.85, H * 0.38 + 12);
      c.globalAlpha = 1;
    }

  if (shakeIntensity > 0) c.restore();
}

// Render upgrade shop
function renderUpgrade(c) {
  drawBackground(c, null);
  c.fillStyle = '#E8EAED';
  c.font = '14px "Press Start 2P", monospace';
  c.textAlign = 'center';
  c.fillText('UPGRADES', W / 2, 35);
  c.fillStyle = '#D500F9';
  c.font = '10px "Press Start 2P", monospace';
  c.fillText(crystals + ' 💎', W / 2, 55);

  const itemH = 55;
  const startY = 75 - upgradeScroll;
  const maxScroll = Math.max(0, UPGRADE_DATA.length * itemH - (H - 120));
  upgradeScroll = Math.max(0, Math.min(upgradeScroll, maxScroll));

  // Clip area
  c.save();
  c.beginPath();
  c.rect(10, 68, W - 20, H - 130);
  c.clip();

  for (let i = 0; i < UPGRADE_DATA.length; i++) {
    const upg = UPGRADE_DATA[i];
    const lv = getUpgradeLv(upg.id);
    const y = startY + i * itemH;
    if (y + itemH < 68 || y > H - 50) continue;

    const maxed = lv >= upg.max;
    const cost = maxed ? 0 : upg.costs[lv];
    const canBuy = !maxed && crystals >= cost;

    c.fillStyle = canBuy ? '#1a1a2e' : '#0f0f1a';
    c.strokeStyle = canBuy ? '#00E5FF' : '#1e1e30';
    c.lineWidth = 1;
    roundRect(c, 15, y, W - 30, itemH - 5, 6);
    c.fill(); c.stroke();

    c.textAlign = 'left';
    c.fillStyle = canBuy ? '#E8EAED' : '#505070';
    c.font = '8px "Press Start 2P", monospace';
    c.fillText(upg.name, 25, y + 18);
    c.fillStyle = '#8892B0';
    c.font = '7px "Press Start 2P", monospace';
    c.fillText(upg.desc, 25, y + 32);

    // Level dots
    for (let l = 0; l < upg.max; l++) {
      c.fillStyle = l < lv ? '#00E5FF' : '#1e1e30';
      c.beginPath();
      c.arc(25 + l * 14, y + 43, 4, 0, Math.PI * 2);
      c.fill();
    }

    // Cost
    c.textAlign = 'right';
    if (maxed) {
      c.fillStyle = '#00E676';
      c.font = '8px "Press Start 2P", monospace';
      c.fillText('MAX', W - 25, y + 30);
    } else {
      c.fillStyle = canBuy ? '#D500F9' : '#505070';
      c.font = '8px "Press Start 2P", monospace';
      c.fillText(cost + '💎', W - 25, y + 30);
    }
  }
  c.restore();

  // Back button
  c.fillStyle = '#12121e';
  c.strokeStyle = '#8892B0';
  c.lineWidth = 1;
  roundRect(c, W / 2 - 60, H - 50, 120, 35, 6);
  c.fill(); c.stroke();
  c.fillStyle = '#E8EAED';
  c.font = '8px "Press Start 2P", monospace';
  c.textAlign = 'center';
  c.fillText('BACK', W / 2, H - 28);
}

function renderPaused(c) {

// Master render function — pure output, no state changes (F26)
function render(state, dt) {
  ctx.clearRect(0, 0, W, H);
  switch (state) {
    case 'TITLE': renderTitle(ctx); break;
    case 'TABLE_SELECT': renderTableSelect(ctx); break;
    case 'PLAYING': renderPlaying(ctx, dt); break;
    case 'DRAIN': renderDrain(ctx); break;
    case 'TABLE_CLEAR': renderTableClear(ctx); break;
    case 'UPGRADE': renderUpgrade(ctx); break;
    case 'BOSS_INTRO': renderBossIntro(ctx); break;
    case 'GAMEOVER': renderGameOver(ctx); break;
    case 'RESULT': renderTableClear(ctx); break;
    case 'PAUSED': renderPaused(ctx); break;
  }
  // Transition overlay
  if (transitionAlpha > 0) {
    ctx.fillStyle = `rgba(10,14,39,${transitionAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Toast notifications
  drawToasts(ctx, dt);
}

// ═══════════════════════════════════════════
// §Q. INPUT HANDLING
// ═══════════════════════════════════════════

let keys = {};
let mouseDown = false, mouseX = 0, mouseY = 0;
let touches = {};

// Handle keyboard input
function handleKeyDown(e) {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
  inputMode = 'keyboard';
  keys[e.code] = true;
  snd.init();
  switch (e.code) {
    case 'Space':
    case 'ArrowDown':
      e.preventDefault();
      if (gameState === 'TITLE') startNewGame();
      else if (gameState === 'PLAYING' && isLaunching) plungerCharging = true;
      else if (gameState === 'TABLE_CLEAR') afterTableClear();
      else if (gameState === 'GAMEOVER') startNewGame();
      break;
    case 'ArrowLeft':
    case 'KeyZ':
      e.preventDefault();
      if (flippers && flippers[0]) flippers[0].isActive = true;
      break;
    case 'ArrowRight':
    case 'KeyX':
      e.preventDefault();
      if (flippers && flippers[1]) flippers[1].isActive = true;
      break;
    case 'KeyP':
    case 'Escape':
      e.preventDefault();
      if (gameState === 'PAUSED' || gameState === 'PLAYING') togglePause();
      else if (gameState === 'TABLE_SELECT') beginTransition('TITLE');
      else if (gameState === 'UPGRADE') beginTransition('TABLE_SELECT', 0.3);
      else if (gameState === 'GAMEOVER') beginTransition('TITLE');
      break;
    case 'KeyR':
      if (gameState === 'GAMEOVER') startNewGame();
      break;
    case 'Enter':
      if (gameState === 'TABLE_CLEAR') afterTableClear();
      break;
    case 'ArrowUp':
      if (gameState === 'UPGRADE') upgradeScroll = Math.max(0, upgradeScroll - 55);
      break;
  }
  // Arrow down for upgrade scroll
  if (e.code === 'ArrowDown' && gameState === 'UPGRADE') {
    upgradeScroll += 55;
  }
}

// Handle key release
function handleKeyUp(e) {
  keys[e.code] = false;
  switch (e.code) {
    case 'ArrowLeft': case 'KeyZ':
      if (flippers && flippers[0]) flippers[0].isActive = false;
      break;
    case 'ArrowRight': case 'KeyX':
      if (flippers && flippers[1]) flippers[1].isActive = false;
      break;
    case 'Space': case 'ArrowDown':
      if (gameState === 'PLAYING' && isLaunching && plungerCharging) {
        launchBall();
      }
      plungerCharging = false;
      break;
  }
}

// Launch ball from plunger
function launchBall() {
  if (!isLaunching || !ball) return;
  const power = Math.max(CONFIG.PLUNGER_MIN_POWER, plungerPower);
  ball.vy = -power;
  ball.vx = (Math.random() - 0.5) * 50;
  isLaunching = false;
  plungerPower = 0;
  snd.play('plunger');
  checkAchievement(1);
}

// Start a new game session
function startNewGame() {
  score = 0;
  ballsLeft = 3 + getUpgradeLv('extraBall');
  startBalls = ballsLeft;
  currentTable = 0;
  beginTransition('TABLE_SELECT');
}

// After table clear, go to upgrade or next table
function afterTableClear() {
  if (currentTable >= 9) {
    beginTransition('GAMEOVER');
  } else {
    beginTransition('UPGRADE');
  }
}

// Handle mouse events
function handleMouseDown(e) {
  inputMode = 'mouse';
  snd.init();
  mouseDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
  handlePointerDown(mouseX, mouseY);
}
function handleMouseUp(e) {
  mouseDown = false;
  handlePointerUp(e.clientX, e.clientY);
}
function handleMouseMove(e) {
  mouseX = e.clientX;
  mouseY = e.clientY;
}

// Handle touch events
function handleTouchStart(e) {
  e.preventDefault();
  inputMode = 'touch';
  snd.init();
  // M2: initialize touch scroll for upgrade shop
  if (gameState === 'UPGRADE' && e.touches.length > 0) {
    touchScrollStartY = e.touches[0].clientY;
    touchScrolling = false; // will become true on first move
  }
  // M3: dismiss touch guide on first interaction
  if (showTouchGuide) showTouchGuide = false;
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
    handlePointerDown(t.clientX, t.clientY);
  }
}
function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touches[t.identifier]) {
      touches[t.identifier].x = t.clientX;
      touches[t.identifier].y = t.clientY;
    }
  }
  // M2: Touch drag scroll for upgrade shop
  if (gameState === 'UPGRADE' && e.touches.length > 0) {
    const ty = e.touches[0].clientY;
    if (touchScrolling) {
      const delta = touchScrollStartY - ty;
      upgradeScroll = Math.max(0, upgradeScroll + delta);
    }
    touchScrollStartY = ty;
    touchScrolling = true;
  }
}
function handleTouchEnd(e) {
  e.preventDefault();
  touchScrolling = false; // M2: reset scroll tracking
  for (const t of e.changedTouches) {
    handlePointerUp(t.clientX, t.clientY);
    delete touches[t.identifier];
  }
  // Release flippers when no touches in flipper areas
  if (flippers) {
    const anyLeft = Object.values(touches).some(t => t.x < W * 0.4 && t.y > H * 0.6);
    const anyRight = Object.values(touches).some(t => t.x > W * 0.6 && t.y > H * 0.6);
    if (!anyLeft && flippers[0]) flippers[0].isActive = false;
    if (!anyRight && flippers[1]) flippers[1].isActive = false;
  }
}

// Unified pointer down handler
function handlePointerDown(x, y) {
  if (gameState === 'TITLE') {
    startNewGame();
    return;
  }
  if (gameState === 'PAUSED') {
    togglePause();
    return;
  }
  if (gameState === 'TABLE_CLEAR') {
    afterTableClear();
    return;
  }
  if (gameState === 'GAMEOVER') {
    startNewGame();
    return;
  }
  if (gameState === 'TABLE_SELECT') {
    handleTableSelectClick(x, y);
    return;
  }
  if (gameState === 'UPGRADE') {
    handleUpgradeClick(x, y);
    return;
  }
  if (gameState === 'PLAYING') {
    // Flipper activation via touch zones
    if (y > H * 0.6) {
      if (x < W * 0.4 && flippers && flippers[0]) flippers[0].isActive = true;
      if (x > W * 0.6 && flippers && flippers[1]) flippers[1].isActive = true;
    }
    // Plunger activation
    if (isLaunching && x > W * 0.7 && y > H * 0.5) {
      plungerCharging = true;
    }
  }
}

// Unified pointer up handler
function handlePointerUp(x, y) {
  if (gameState === 'PLAYING') {
    // Mouse flipper release
    if (inputMode === 'mouse') {
      if (flippers) {
        if (x < W / 2) flippers[0].isActive = false;
        else flippers[1].isActive = false;
      }
    }
    // Plunger release
    if (isLaunching && plungerCharging) {
      launchBall();
      plungerCharging = false;
    }
  }
}

// Handle table select click
function handleTableSelectClick(x, y) {
  const cols = Math.min(3, Math.max(2, Math.floor(W / 130)));
  const cellW = Math.min(120, (W - 40) / cols);
  const cellH = 60;
  const startX = (W - cols * cellW) / 2;

  for (let i = 0; i < 10; i++) {
    if (i >= unlockedTable) continue;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = startX + col * cellW + 5;
    const cy = 80 + row * (cellH + 10);
    if (x >= cx && x <= cx + cellW - 10 && y >= cy && y <= cy + cellH) {
      currentTable = i;
      if (TABLE_DATA[i].boss) {
        beginTransition('BOSS_INTRO');
      } else {
        beginTransition('PLAYING');
      }
      return;
    }
  }

  // Upgrade button
  if (x >= upgradeBtn.x && x <= upgradeBtn.x + upgradeBtn.w &&
      y >= upgradeBtn.y && y <= upgradeBtn.y + upgradeBtn.h) {
    beginTransition('UPGRADE', 0.3);
  }
}

// Handle upgrade shop click
function handleUpgradeClick(x, y) {
  // Back button
  if (y >= H - 50 && y <= H - 15 && x >= W / 2 - 60 && x <= W / 2 + 60) {
    beginTransition('TABLE_SELECT', 0.3);
    return;
  }
  // Upgrade items
  const startY = 75 - upgradeScroll;
  const itemH = 55;
  for (let i = 0; i < UPGRADE_DATA.length; i++) {
    const uy = startY + i * itemH;
    if (y >= uy && y <= uy + itemH - 5 && x >= 15 && x <= W - 15) {
      const upg = UPGRADE_DATA[i];
      const lv = getUpgradeLv(upg.id);
      if (lv < upg.max && crystals >= upg.costs[lv]) {
        crystals -= upg.costs[lv];
        upgrades[upg.id] = (upgrades[upg.id] || 0) + 1;
        snd.play('combo');
        saveProgress();
        showToast(upg.name + ' Lv' + (lv + 1));
      }
      return;
    }
  }
}

// Mouse wheel for upgrade scroll
function handleWheel(e) {
  if (gameState === 'UPGRADE') {
    upgradeScroll += e.deltaY > 0 ? 55 : -55;
    upgradeScroll = Math.max(0, upgradeScroll);
  }
}

// ═══════════════════════════════════════════
// §R. GAME LOOP (F12: try-catch)
// ═══════════════════════════════════════════

function gameLoop(timestamp) {
  try {
    const rawDt = (timestamp - lastTime) / 1000;
    const dt = Math.min(rawDt, CONFIG.DT_CAP);
    lastTime = timestamp;

    // TweenManager updates in ALL states (F4 matrix)
    tw.update(dt);

    // State-specific update
    switch (gameState) {
      case 'TITLE': updateTitle(dt); break;
      case 'TABLE_SELECT': updateTableSelect(dt); break;
      case 'PLAYING': updatePlaying(dt); break;
      case 'DRAIN': updateDrain(dt); break;
      case 'TABLE_CLEAR': updateTableClear(dt); break;
      case 'UPGRADE': updateUpgrade(dt); break;
      case 'BOSS_INTRO': updateBossIntro(dt); break;
      case 'GAMEOVER': updateGameOver(dt); break;
      case 'RESULT': updateResult(dt); break;
      case 'PAUSED': break;
    }

    // Particles update in applicable states (F4 matrix)
    if (['TITLE','PLAYING','DRAIN','TABLE_CLEAR','BOSS_INTRO','GAMEOVER','RESULT'].includes(gameState)) {
      particles.update(dt);
    }

    render(gameState, dt);

  } catch (e) {
    console.error('GameLoop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// Generate background stars
function initBackground() {
  bgStars = [];
  for (let i = 0; i < 150; i++) {
    bgStars.push({
      x: Math.random() * W * 1.2,
      y: Math.random() * H * 1.2,
      size: Math.random() < 0.1 ? 2 + Math.random() * 2 : 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 2,
      bright: Math.random() < 0.15,
      layer: Math.random() < 0.3 ? 3 : (Math.random() < 0.5 ? 2 : 1)
    });
  }
  bgNebulas = [];
  const nebulaColors = ['#6c3cf7','#00E5FF','#FF1744','#D500F9'];
  for (let i = 0; i < 4; i++) {
    bgNebulas.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 100 + Math.random() * 150,
      color: nebulaColors[i]
    });
  }
}

// Master init function
async function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  offCanvas = document.createElement('canvas');
  offCtx = offCanvas.getContext('2d');

  // Resize first (F11: before any use)
  resizeCanvas();
  initBackground();

  // Show loading screen
  ctx.fillStyle = '#0A0E27';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#E8EAED';
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LOADING...', W / 2, H / 2);

  // No external assets to preload (F1: 100% Canvas code drawing)

  // Create engine instances
  tw = new TweenManager();
  snd = new SoundManager();
  particles = new ParticlePool(CONFIG.PARTICLE_POOL_SIZE);

  // Load saved progress
  loadProgress();

  // Event listeners
  window.addEventListener('resize', () => { resizeCanvas(); initBackground(); });
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  canvas.addEventListener('mousedown', handleMouseDown);
  canvas.addEventListener('mouseup', handleMouseUp);
  canvas.addEventListener('mousemove', handleMouseMove);
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  canvas.addEventListener('wheel', handleWheel, { passive: true });

  // Prevent context menu
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Start game loop
  lastTime = performance.now();
  enterState('TITLE');
  requestAnimationFrame(gameLoop);
}

// Boot
init();
</script>
</body>
</html>
