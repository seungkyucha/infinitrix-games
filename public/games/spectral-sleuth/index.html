// 키 액션 처리
function handleKeyAction(code) {
  const lang = getLang();
  const sys = ACTIVE_SYSTEMS[G.state];
  if (!sys) return;

  // 글로벌 키
  if (code === 'Escape') {
    const allowed = ESCAPE_ALLOWED[G.state];
    if (allowed && allowed.length > 0) {
      const target = allowed[0] === '__PREVIOUS__' ? previousState : allowed[0];
      if (target) beginTransition(target, 'fade', 0.3);
    }
    return;
  }

  // 상태별 키 처리
  switch(G.state) {
    case STATES.TITLE:
      if (code === 'Space' || code === 'Enter') {
        snd.init();
        if (loadProgress() && Object.keys(G.solvedCases).length > 0) {
          beginTransition(STATES.ZONE_MAP, 'fade', 0.5);
        } else {
          G.runSeed = Date.now() & 0xFFFF;
          rng.seed(G.runSeed);
          beginTransition(STATES.INTRO_CUTSCENE, 'fade', 0.6);
        }
      }
      if (code === 'KeyL') {
        G.settings.lang = G.settings.lang === 'ko' ? 'en' : 'ko';
      }
      if (code === 'ArrowUp' || code === 'KeyW') {
        G.difficulty = Math.max(0, G.difficulty - 1);
      }
      if (code === 'ArrowDown' || code === 'KeyS') {
        G.difficulty = Math.min(2, G.difficulty + 1);
      }
      break;

    case STATES.INTRO_CUTSCENE:
      if (code === 'Space' || code === 'Enter') {
        beginTransition(STATES.ZONE_MAP, 'fade', 0.5);
      }
      break;

    case STATES.ZONE_MAP:
      if (code === 'ArrowLeft' || code === 'KeyA') G.zoneSelected = Math.max(0, G.zoneSelected - 1);
      if (code === 'ArrowRight' || code === 'KeyD') G.zoneSelected = Math.min(5, G.zoneSelected + 1);
      if (code === 'ArrowUp' || code === 'KeyW') G.caseSelected = Math.max(0, G.caseSelected - 1);
      if (code === 'ArrowDown' || code === 'KeyS') {
        const maxCase = G.zoneSelected === 5 ? 0 : 2;
        G.caseSelected = Math.min(maxCase, G.caseSelected + 1);
      }
      if (code === 'Space' || code === 'Enter') {
        if (canEnterCase(G.zoneSelected, G.caseSelected)) {
          G.currentZone = G.zoneSelected;
          G.currentCase = G.caseSelected;
          beginTransition(STATES.CASE_BRIEFING, 'wipe', 0.3);
        }
      }
      break;

    case STATES.CASE_BRIEFING:
      if (code === 'Space' || code === 'Enter') {
        beginTransition(STATES.EXPLORATION, 'wipe', 0.3);
      }
      break;

    case STATES.EXPLORATION:
      // 능력 선택
      if (code === 'Digit1') selectAbility(0);
      if (code === 'Digit2') selectAbility(1);
      if (code === 'Digit3') selectAbility(2);
      // 능력 사용 / 단서 수집
      if (code === 'Space') {
        if (G.lucian.mode !== 'normal') {
          const abilityIdx = ['clairvoyance', 'empathy', 'rewind'].indexOf(G.lucian.mode);
          useAbility(abilityIdx, G.lucian, G, G.currentMap);
        } else {
          tryCollectClue();
        }
      }
      // 상호작용
      if (code === 'KeyE') tryInteract();
      // 증거 인벤토리
      if (code === 'Tab') {
        if (G.evidence.length >= 3) {
          beginTransition(STATES.PUZZLE_BOARD, 'slide', 0.3);
        }
      }
      // 추리 보드
      if (code === 'KeyQ') {
        if (G.evidence.length >= 3) {
          beginTransition(STATES.PUZZLE_BOARD, 'slide', 0.3);
        }
      }
      // 힌트
      if (code === 'KeyH') useHint();
      break;

    case STATES.PUZZLE_BOARD:
      if (code === 'ArrowLeft' || code === 'KeyA') G.puzzleSelected = Math.max(0, G.puzzleSelected - 1);
      if (code === 'ArrowRight' || code === 'KeyD') G.puzzleSelected = Math.min(G.evidence.length - 1, G.puzzleSelected + 1);
      if (code === 'Space' || code === 'Enter') {
        placeEvidenceInSlot();
      }
      if (code === 'KeyV') verifyPuzzle();
      if (code === 'Backspace') clearPuzzleSlot();
      break;

    case STATES.CONFRONTATION:
      if (code === 'ArrowLeft' || code === 'KeyA') {
        G.confrontEvidenceSelected = Math.max(0, G.confrontEvidenceSelected - 1);
      }
      if (code === 'ArrowRight' || code === 'KeyD') {
        G.confrontEvidenceSelected = Math.min(G.evidence.length - 1, G.confrontEvidenceSelected + 1);
      }
      if (code === 'Space' || code === 'Enter') {
        if (G.confrontPhase === 'select') {
          presentEvidence(G, G.confrontEvidenceSelected);
        } else if (G.confrontPhase === 'result_correct' || G.confrontPhase === 'result_wrong') {
          advanceConfrontation();
        } else if (G.confrontPhase === 'testimony') {
          G.confrontPhase = 'select';
        }
      }
      break;

    case STATES.BOSS_REWARD:
      if (code === 'Space' || code === 'Enter') {
        beginTransition(STATES.UPGRADE_MENU, 'fade', 0.4);
      }
      break;

    case STATES.UPGRADE_MENU:
      if (code === 'ArrowUp' || code === 'KeyW') G.upgradeSelected = Math.max(0, G.upgradeSelected - 1);
      if (code === 'ArrowDown' || code === 'KeyS') G.upgradeSelected = Math.min(2, G.upgradeSelected + 1);
      if (code === 'Space' || code === 'Enter') tryUpgrade(G.upgradeSelected);
      if (code === 'KeyB' || code === 'Backspace') beginTransition(STATES.ZONE_MAP, 'fade', 0.3);
      break;

    case STATES.GAME_OVER:
      if (code === 'KeyR' || code === 'Space') {
        resetCurrentRun();
        beginTransition(STATES.ZONE_MAP, 'fade', 0.5);
      }
      break;

    case STATES.GAME_COMPLETE:
      if (code === 'Space' || code === 'Enter') {
        beginTransition(STATES.CREDITS, 'fade', 0.6);
      }
      break;

    case STATES.CREDITS:
      if (code === 'Space' || code === 'Enter') {
        beginTransition(STATES.TITLE, 'fade', 0.5);
      }
      break;

    case STATES.PAUSE:
      if (code === 'Space' || code === 'Enter') {
        // 즉시 복귀 [Cycle 28: PAUSE 복귀는 즉시 setState]
        G.state = previousState;
        snd.startBgm('zone');
      }
      if (code === 'KeyS') {
        G.state = STATES.SETTINGS;
        onStateEnter(STATES.SETTINGS);
      }
      break;

    case STATES.SETTINGS:
      if (code === 'ArrowUp' || code === 'KeyW') G.settingsSelected = Math.max(0, G.settingsSelected - 1);
      if (code === 'ArrowDown' || code === 'KeyS') G.settingsSelected = Math.min(3, G.settingsSelected + 1);
      if (code === 'ArrowLeft' || code === 'KeyA') adjustSetting(-1);
      if (code === 'ArrowRight' || code === 'KeyD') adjustSetting(1);
      if (code === 'Backspace') {
        G.state = STATES.PAUSE;
      }
      break;
  }
}

// 능력 선택
function selectAbility(idx) {
  const keys = ['clairvoyance', 'empathy', 'rewind'];
  G.lucian.mode = G.lucian.mode === keys[idx] ? 'normal' : keys[idx];
  snd.playSfx('ghost_mode');
}

// 단서 수집 시도
function tryCollectClue() {
  if (!G.currentMap) return;
  for (const clue of G.currentMap.clues) {
    if (clue.discovered) continue;
    const dist = Math.hypot(clue.x - G.lucian.x, clue.y - G.lucian.y);
    if (dist < 40) {
      // 직접 수집 가능 (능력 없이)
      clue.discovered = true;
      if (!G.discoveredClues[clue.id]) {
        G.discoveredClues[clue.id] = true;
        G.evidence.push(clue);
        G.archivePoints++;
        snd.playSfx('clue_found');
        spawnParticles(clue.x, clue.y, 10, C.CLUE_GOLD, 50, 0.7);
        addPopup(getLang().clueFound, clue.x, clue.y - 30, C.CLUE_GOLD);
      }
      return;
    }
  }
}

// 상호작용 시도
function tryInteract() {
  if (!G.currentMap) return;
  // NPC와 대화
  for (const npc of G.currentMap.npcs) {
    if (!npc.active) continue;
    const dist = Math.hypot(npc.x - G.lucian.x, npc.y - G.lucian.y);
    if (dist < 50) {
      addPopup('...', npc.x, npc.y - 40, C.TEXT_SECONDARY);
      return;
    }
  }
}

// 힌트 사용
function useHint() {
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  const maxHints = diffKey === 'easy' ? 99 : diffKey === 'medium' ? 3 : 1;
  if (G.hintsUsed >= maxHints) return;
  if (!G.currentMap) return;

  // 미발견 단서 중 가장 가까운 것 표시
  let nearest = null, nearDist = Infinity;
  for (const clue of G.currentMap.clues) {
    if (clue.discovered) continue;
    const d = Math.hypot(clue.x - G.lucian.x, clue.y - G.lucian.y);
    if (d < nearDist) { nearDist = d; nearest = clue; }
  }
  if (nearest) {
    spawnParticles(nearest.x, nearest.y, 15, C.CLUE_GOLD, 30, 2.0);
    G.hintsUsed++;
    G.credibility -= 10;
    addPopup('💡', nearest.x, nearest.y - 20, C.CLUE_GOLD);
  }
}

// 퍼즐 슬롯에 증거 배치
function placeEvidenceInSlot() {
  if (G.puzzleSelected < 0 || G.puzzleSelected >= G.evidence.length) return;
  const ev = G.evidence[G.puzzleSelected];
  // 빈 슬롯 찾기
  for (let i = 0; i < 3; i++) {
    if (!G.puzzleSlots[i]) {
      G.puzzleSlots[i] = { ...ev, slotIdx: G.puzzleSelected };
      snd.playSfx('clue_found');
      return;
    }
  }
}

// 퍼즐 슬롯 비우기
function clearPuzzleSlot() {
  for (let i = 2; i >= 0; i--) {
    if (G.puzzleSlots[i]) {
      G.puzzleSlots[i] = null;
      return;
    }
  }
}

// 퍼즐 검증
function verifyPuzzle() {
  const validChains = getValidChains(G.currentZone, G.currentCase);
  const result = checkChain(G.puzzleSlots, validChains);
  G.puzzleResult = result;

  if (result.valid) {
    snd.playSfx('chain_complete');
    spawnParticles(G._cw / 2, G._ch / 2, 20, C.SUCCESS_GREEN, 80, 1.0);
    tw.delay(1.5, () => {
      if (G.state === STATES.PUZZLE_BOARD) {
        beginTransition(STATES.CONFRONTATION_INTRO, 'fade', 0.6);
      }
    });
  } else {
    snd.playSfx('wrong');
    G.screenShake = 0.2;
  }
}

// 대질 진행
function advanceConfrontation() {
  if (G.confrontRound >= G.confrontMaxRounds) {
    // 대질 성공
    beginTransition(STATES.CASE_SOLVED, 'fade', 0.6);
    return;
  }
  if (G.credibility <= 0) {
    // 신뢰도 소진 — 게임 오버
    beginTransition(STATES.GAME_OVER, 'fade', 0.5);
    return;
  }
  // 다음 라운드
  G.confrontPhase = 'testimony';
  G.confrontCorrectEvIdx = checkContradiction(G, G.confrontRound);
  G.confrontSuspect.emotion = 'calm';
  G.confrontSuspect.speaking = true;
}

// 사건 진입 가능 여부 확인
function canEnterCase(zoneIdx, caseIdx) {
  if (zoneIdx === 5) {
    // 히든: 구역 1~5 모두 클리어 필요
    for (let z = 0; z < 5; z++) {
      if (!G.solvedCases[`z${z}c2`]) return false;
    }
    return true;
  }
  if (caseIdx === 0) {
    // 첫 사건은 이전 구역 보스 클리어 필요 (구역 0은 항상 가능)
    if (zoneIdx === 0) return true;
    return !!G.solvedCases[`z${zoneIdx - 1}c2`];
  }
  // 이전 사건 클리어 필요
  return !!G.solvedCases[`z${zoneIdx}c${caseIdx - 1}`];
}

// 업그레이드 시도
function tryUpgrade(abilityIdx) {
  const keys = ['clairvoyance', 'empathy', 'rewind'];
  const key = keys[abilityIdx];
  const currentLv = G.upgrades[key];
  if (currentLv >= 5) return; // 최대 레벨
  const cost = C.UPGRADE_COST[currentLv];
  if (G.soulFragments < cost) return;
  G.soulFragments -= cost;
  G.upgrades[key]++;
  G.abilities[key] = G.upgrades[key] + 1;
  snd.playSfx('correct');
  spawnParticles(G._cw / 2, G._ch / 2, 10, C.GHOST_CYAN, 60, 0.6);
  saveProgress();
}

// 설정 조절
function adjustSetting(dir) {
  switch(G.settingsSelected) {
    case 0: // 언어
      G.settings.lang = G.settings.lang === 'ko' ? 'en' : 'ko';
      break;
    case 1: // 효과음
      snd.setSfxVol(Math.max(0, Math.min(1, snd.sfxVol + dir * 0.1)));
      break;
    case 2: // 배경음
      snd.setBgmVol(Math.max(0, Math.min(1, snd.bgmVol + dir * 0.1)));
      break;
    case 3: // 난이도
      G.difficulty = Math.max(0, Math.min(2, G.difficulty + dir));
      break;
  }
}

// 현재 런 초기화
function resetCurrentRun() {
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  G.credibility = C.CREDIBILITY[diffKey];
  G.ether = C.ETHER_INIT;
  G.evidence = [];
  G.discoveredClues = {};
  G.confrontWrongs = 0;
  G.hintsUsed = 0;
  G.hintsAvail = diffKey === 'easy' ? 99 : diffKey === 'medium' ? 3 : 1;
  G.caseTimer = 0;
  G.screenShake = 0;
  G.envTimer = 0;
  G.envTraps = null;
  particles.length = 0;
}

// 텍스트 팝업 추가
function addPopup(text, x, y, color) {
  G.popups.push({ text, x, y, color, life: 1.5, maxLife: 1.5 });
}

// --- 터치 이벤트 ---
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  snd.init();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = t.clientX - rect.left;
  const ty = t.clientY - rect.top;
  mouseX = tx;
  mouseY = ty;
  touchActive = true;
  mouseDown = true;
  longPressTimer = 0.5; // 500ms
  longPressed = false;

  // 더블 탭 감지
  if (doubleTapTimer > 0) {
    handleDoubleTap(tx, ty);
    doubleTapTimer = 0;
  } else {
    doubleTapTimer = 0.3;
  }

  // 가상 조이스틱 시작 (탐색 모드에서 하단 좌측)
  if (G.state === STATES.EXPLORATION && ty > G._ch * 0.5) {
    G.joystick.active = true;
    G.joystick.sx = tx;
    G.joystick.sy = ty;
    G.joystick.cx = tx;
    G.joystick.cy = ty;
  }

  handleTouchAction(tx, ty);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseX = t.clientX - rect.left;
  mouseY = t.clientY - rect.top;

  if (G.joystick.active) {
    G.joystick.cx = mouseX;
    G.joystick.cy = mouseY;
    const dx = G.joystick.cx - G.joystick.sx;
    const dy = G.joystick.cy - G.joystick.sy;
    const dist = Math.hypot(dx, dy);
    const maxDist = 50;
    if (dist > 0) {
      G.joystick.dx = (dx / dist) * Math.min(dist, maxDist) / maxDist;
      G.joystick.dy = (dy / dist) * Math.min(dist, maxDist) / maxDist;
    }
  }
  longPressTimer = 0; // 이동 시 롱프레스 취소
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  mouseDown = false;
  G.joystick.active = false;
  G.joystick.dx = 0;
  G.joystick.dy = 0;
  longPressTimer = 0;
}, { passive: false });

// 마우스 이벤트
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  mouseDown = true;
  mouseClicked = true;
  handleTouchAction(mouseX, mouseY);
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });

// 터치/클릭 통합 액션 처리
function handleTouchAction(tx, ty) {
  snd.init();
  const cw = G._cw, ch = G._ch;
  const sys = ACTIVE_SYSTEMS[G.state];

  switch(G.state) {
    case STATES.TITLE:
      handleKeyAction('Space');
      break;

    case STATES.INTRO_CUTSCENE:
      handleKeyAction('Space');
      break;

    case STATES.ZONE_MAP:
      handleZoneMapTouch(tx, ty, cw, ch);
      break;

    case STATES.CASE_BRIEFING:
      handleKeyAction('Space');
      break;

    case STATES.EXPLORATION:
      handleExplorationTouch(tx, ty, cw, ch);
      break;

    case STATES.PUZZLE_BOARD:
      handlePuzzleTouch(tx, ty, cw, ch);
      break;

    case STATES.CONFRONTATION:
      handleConfrontationTouch(tx, ty, cw, ch);
      break;

    case STATES.BOSS_REWARD:
    case STATES.CASE_SOLVED:
    case STATES.GAME_COMPLETE:
    case STATES.CREDITS:
      handleKeyAction('Space');
      break;

    case STATES.UPGRADE_MENU:
      handleUpgradeTouch(tx, ty, cw, ch);
      break;

    case STATES.GAME_OVER:
      handleKeyAction('KeyR');
      break;

    case STATES.PAUSE:
      // 상단: 계속, 하단: 설정
      if (ty < ch / 2) handleKeyAction('Space');
      else handleKeyAction('KeyS');
      break;

    case STATES.SETTINGS:
      handleSettingsTouch(tx, ty, cw, ch);
      break;
  }
}

// 더블 탭 처리 (E키 대체)
function handleDoubleTap(tx, ty) {
  if (G.state === STATES.EXPLORATION) {
    tryInteract();
  }
}

// 존맵 터치 처리
function handleZoneMapTouch(tx, ty, cw, ch) {
  const zonePad = 20;
  const zoneW = Math.min(100, (cw - zonePad * 7) / 6);
  const startX = (cw - (zoneW * 6 + zonePad * 5)) / 2;
  const startY = ch * 0.3;

  for (let i = 0; i < 6; i++) {
    const zx = startX + i * (zoneW + zonePad);
    if (hitTest(tx, ty, zx, startY, zoneW, zoneW * 1.2)) {
      G.zoneSelected = i;
      G.caseSelected = 0;
      // 사건 선택 표시
      return;
    }
  }

  // 사건 선택 (선택된 구역 아래)
  const caseY = startY + zoneW * 1.5;
  const maxCases = G.zoneSelected === 5 ? 1 : 3;
  for (let c = 0; c < maxCases; c++) {
    const cx = startX + c * (zoneW + zonePad);
    if (hitTest(tx, ty, cx, caseY, zoneW, 40)) {
      G.caseSelected = c;
      if (canEnterCase(G.zoneSelected, G.caseSelected)) {
        G.currentZone = G.zoneSelected;
        G.currentCase = G.caseSelected;
        beginTransition(STATES.CASE_BRIEFING, 'wipe', 0.3);
      }
      return;
    }
  }
}

// 탐색 모드 터치 처리
function handleExplorationTouch(tx, ty, cw, ch) {
  // 능력 버튼 (하단 중앙)
  const abilityY = ch - 54;
  const abilityW = Math.max(C.TOUCH_MIN, cw * 0.12);
  const totalW = abilityW * 3 + 20;
  const startX = (cw - totalW) / 2;

  for (let i = 0; i < 3; i++) {
    const ax = startX + i * (abilityW + 10);
    if (hitTest(tx, ty, ax, abilityY, abilityW, abilityW * 0.7)) {
      selectAbility(i);
      return;
    }
  }

  // 퍼즐 보드 버튼 (우하단)
  if (tx > cw - 80 && ty > ch - 80 && G.evidence.length >= 3) {
    beginTransition(STATES.PUZZLE_BOARD, 'slide', 0.3);
    return;
  }

  // 상단 영역이 아닌 곳을 탭하면 이동 목표 설정
  if (ty < ch - 60) {
    // 클릭 위치를 월드 좌표로 변환
    const worldX = tx + G.camX;
    const worldY = ty + G.camY;
    // 단서 수집 시도
    if (G.currentMap) {
      for (const clue of G.currentMap.clues) {
        if (clue.discovered) continue;
        const dist = Math.hypot(clue.x - worldX, clue.y - worldY);
        if (dist < 30) {
          // 가까이 이동 후 수집
          G.lucian.x += (clue.x - G.lucian.x) * 0.3;
          G.lucian.y += (clue.y - G.lucian.y) * 0.3;
          tryCollectClue();
          if (G.lucian.mode !== 'normal') {
            const abilityIdx = ['clairvoyance', 'empathy', 'rewind'].indexOf(G.lucian.mode);
            useAbility(abilityIdx, G.lucian, G, G.currentMap);
          }
          return;
        }
      }
    }
  }
}

// 퍼즐 보드 터치 처리
function handlePuzzleTouch(tx, ty, cw, ch) {
  // 증거 카드 선택 (좌측)
  const cardW = Math.max(C.TOUCH_MIN, 80);
  const cardH = 50;
  const cardX = 20;
  for (let i = 0; i < G.evidence.length; i++) {
    const cy = 80 + i * (cardH + 10);
    if (hitTest(tx, ty, cardX, cy, cardW, cardH)) {
      G.puzzleSelected = i;
      placeEvidenceInSlot();
      return;
    }
  }

  // 슬롯 (우측)
  const slotX = cw * 0.5;
  const slotW = Math.max(C.TOUCH_MIN, 100);
  const slotH = 50;
  for (let i = 0; i < 3; i++) {
    const sy = 100 + i * (slotH + 20);
    if (hitTest(tx, ty, slotX, sy, slotW, slotH)) {
      if (G.puzzleSlots[i]) {
        G.puzzleSlots[i] = null;
      }
      return;
    }
  }

  // 검증 버튼 (하단)
  const verifyBtnX = cw / 2 - 60;
  const verifyBtnY = ch - 70;
  if (hitTest(tx, ty, verifyBtnX, verifyBtnY, 120, C.TOUCH_MIN)) {
    verifyPuzzle();
    return;
  }

  // 돌아가기 (좌상단)
  if (hitTest(tx, ty, 10, 10, 60, 40)) {
    beginTransition(STATES.EXPLORATION, 'fade', 0.3);
  }
}

// 대질 터치 처리
function handleConfrontationTouch(tx, ty, cw, ch) {
  if (G.confrontPhase === 'testimony') {
    // 탭하면 증거 선택으로
    G.confrontPhase = 'select';
    return;
  }
  if (G.confrontPhase === 'select') {
    // 증거 선택
    const cardW = Math.max(C.TOUCH_MIN, 80);
    const cardH = Math.max(C.TOUCH_MIN, 40);
    const startX = (cw - (G.evidence.length * (cardW + 10))) / 2;
    const cardY = ch - cardH - 20;
    for (let i = 0; i < G.evidence.length; i++) {
      const cx = startX + i * (cardW + 10);
      if (hitTest(tx, ty, cx, cardY, cardW, cardH)) {
        G.confrontEvidenceSelected = i;
        presentEvidence(G, i);
        return;
      }
    }
    return;
  }
  if (G.confrontPhase === 'result_correct' || G.confrontPhase === 'result_wrong') {
    advanceConfrontation();
  }
}

// 업그레이드 터치 처리
function handleUpgradeTouch(tx, ty, cw, ch) {
  const optW = Math.min(300, cw * 0.6);
  const optH = 60;
  const startX = (cw - optW) / 2;
  const startY = ch * 0.25;

  for (let i = 0; i < 3; i++) {
    const oy = startY + i * (optH + 15);
    if (hitTest(tx, ty, startX, oy, optW, optH)) {
      G.upgradeSelected = i;
      tryUpgrade(i);
      return;
    }
  }

  // 돌아가기 버튼 (하단)
  if (ty > ch - 80) {
    beginTransition(STATES.ZONE_MAP, 'fade', 0.3);
  }
}

// 설정 터치 처리
function handleSettingsTouch(tx, ty, cw, ch) {
  const optH = 50;
  const startY = ch * 0.25;
  for (let i = 0; i < 4; i++) {
    const oy = startY + i * (optH + 10);
    if (hitTest(tx, ty, 0, oy, cw, optH)) {
      G.settingsSelected = i;
      // 좌/우에 따라 조절
      adjustSetting(tx < cw / 2 ? -1 : 1);
      return;
    }
  }
  if (ty > ch - 60) {
    G.state = STATES.PAUSE;
  }
}

// 충돌 감지 통합 함수 [F16]
function hitTest(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════

let lastTime = 0;
let gt = 0; // 게임 시간 (초)

// 메인 루프
function loop(time) {
  requestAnimationFrame(loop);

  // dt 계산 (상한 1/30)
  let dt = (time - lastTime) / 1000;
  if (dt > 1/30) dt = 1/30;
  if (dt <= 0) dt = 1/60;
  lastTime = time;
  gt += dt;

  const cw = G._cw;
  const ch = G._ch;
  const sys = ACTIVE_SYSTEMS[G.state] || ACTIVE_SYSTEMS.TITLE;

  // 트윈 갱신
  if (sys.tween) tw.update(dt);

  // 더블탭 타이머
  if (doubleTapTimer > 0) doubleTapTimer -= dt;

  // 롱프레스 타이머
  if (longPressTimer > 0 && touchActive) {
    longPressTimer -= dt;
    if (longPressTimer <= 0 && !longPressed) {
      longPressed = true;
      if (G.state === STATES.EXPLORATION) {
        // 롱프레스 = 능력 사용
        if (G.lucian.mode !== 'normal') {
          const idx = ['clairvoyance', 'empathy', 'rewind'].indexOf(G.lucian.mode);
          useAbility(idx, G.lucian, G, G.currentMap);
        }
      }
    }
  }

  // 상태별 업데이트
  updateState(dt, cw, ch, sys);

  // 파티클 갱신
  updateParticles(dt);

  // 팝업 갱신
  for (let i = G.popups.length - 1; i >= 0; i--) {
    G.popups[i].life -= dt;
    G.popups[i].y -= dt * 30;
    if (G.popups[i].life <= 0) G.popups.splice(i, 1);
  }

  // 화면 셰이크 감쇠
  if (G.screenShake > 0) G.screenShake -= dt * 2;

  // 렌더링
  render(ctx, gt, cw, ch);

  // 전환 오버레이
  if (transitionActive) {
    // transitionAlpha는 tw가 관리하므로 여기서는 시각 효과만
  }

  mouseClicked = false;
}

// 상태별 업데이트
function updateState(dt, cw, ch, sys) {
  switch(G.state) {
    case STATES.TITLE:
      G.titlePhase += dt;
      break;

    case STATES.INTRO_CUTSCENE:
      G.introTimer += dt;
      if (G.introTimer > 5) {
        beginTransition(STATES.ZONE_MAP, 'fade', 0.5);
      }
      break;

    case STATES.EXPLORATION:
      updateExploration(dt, cw, ch);
      break;

    case STATES.PUZZLE_BOARD:
      // 퍼즐은 입력 기반, 자동 업데이트 없음
      break;

    case STATES.CONFRONTATION:
      updateConfrontation(dt);
      break;

    case STATES.CASE_SOLVED:
      G.caseSolvedTimer += dt;
      break;

    case STATES.GAME_COMPLETE:
      G.completeTimer += dt;
      break;

    case STATES.CREDITS:
      G.creditsScroll += dt * 30;
      break;
  }
}

// 탐색 모드 업데이트
function updateExploration(dt, cw, ch) {
  const L = G.lucian;
  let dx = 0, dy = 0;

  // 키보드 이동
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;

  // 조이스틱 이동
  if (G.joystick.active) {
    dx += G.joystick.dx;
    dy += G.joystick.dy;
  }

  // 정규화
  const mag = Math.hypot(dx, dy);
  if (mag > 0) {
    dx /= mag; dy /= mag;
    L.moving = true;
    // 8방향 계산
    L.dir = ((Math.atan2(dy, dx) / Math.PI * 4 + 4.5) | 0) % 8;
  } else {
    L.moving = false;
  }

  // 이동 적용
  L.vx = dx * C.PLAYER_SPEED;
  L.vy = dy * C.PLAYER_SPEED;
  L.x += L.vx * dt;
  L.y += L.vy * dt;

  // 맵 경계 제한
  if (G.currentMap) {
    L.x = Math.max(16, Math.min(G.currentMap.w - 16, L.x));
    L.y = Math.max(16, Math.min(G.currentMap.h - 16, L.y));
  }

  // 잔상 트레일 갱신
  if (L.moving) {
    L.trail.push({ x: L.x, y: L.y });
    if (L.trail.length > 5) L.trail.shift();
  }

  // 능력 타이머 감소
  if (L.abilityTimer > 0) {
    L.abilityTimer -= dt;
    if (L.abilityTimer <= 0) L.mode = 'normal';
  }

  // 쿨다운 감소
  for (let i = 0; i < 3; i++) {
    if (L.abilityCooldown[i] > 0) L.abilityCooldown[i] -= dt;
  }

  // 에테르 자연 회복
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  G.ether = Math.min(C.ETHER_MAX, G.ether + C.ETHER_REGEN[diffKey] * dt);

  // 환경 위험 처리
  updateEnvironmentHazards(dt);

  // 사건 타이머
  G.caseTimer += dt;

  // 카메라 추적
  const targetCamX = L.x - cw / 2;
  const targetCamY = L.y - ch / 2;
  G.camX += (targetCamX - G.camX) * 5 * dt;
  G.camY += (targetCamY - G.camY) * 5 * dt;

  // 카메라 맵 경계 클램프
  if (G.currentMap) {
    G.camX = Math.max(0, Math.min(G.currentMap.w - cw, G.camX));
    G.camY = Math.max(0, Math.min(G.currentMap.h - ch, G.camY));
  }

  // NPC 이동
  if (G.currentMap) {
    for (const npc of G.currentMap.npcs) {
      if (!npc.active) continue;
      npc.x += npc.vx * dt;
      if (npc.x < 30 || npc.x > G.currentMap.w - 30) npc.vx *= -1;
    }
  }

  // 모든 단서 발견 + 3개 이상이면 추리 보드 자동 알림
  if (G.evidence.length >= 3 && !G._puzzleNotified) {
    G._puzzleNotified = true;
    addPopup('Q: ' + getLang().deductionBoard, cw / 2, ch * 0.4, C.GHOST_CYAN);
  }
}

// 환경 위험 갱신
function updateEnvironmentHazards(dt) {
  G.envTimer += dt;
  const zone = G.currentZone;

  // 뒷골목: 에테르 자연 감소
  if (zone === 1 && G.abilities.empathy < 2) {
    G.ether = Math.max(0, G.ether - C.ENV_HAZARD.alley.etherDrain * dt);
  }
}

// 대질 업데이트
function updateConfrontation(dt) {
  if (G.confrontSuspect) {
    G.confrontSuspect.speaking = (G.confrontPhase === 'testimony');
  }
  // 신뢰도 체크
  if (G.credibility <= 0 && G.state === STATES.CONFRONTATION) {
    beginTransition(STATES.GAME_OVER, 'fade', 0.5);
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function render(ctx, gt, cw, ch) {
  ctx.save();

  // 화면 셰이크
  if (G.screenShake > 0) {
    const sx = (rng.next() - 0.5) * G.screenShake * 10;
    const sy = (rng.next() - 0.5) * G.screenShake * 10;
    ctx.translate(sx, sy);
  }

  // 배경 클리어
  ctx.fillStyle = C.BG_DEEP;
  ctx.fillRect(0, 0, cw, ch);

  switch(G.state) {
    case STATES.TITLE: renderTitle(ctx, gt, cw, ch); break;
    case STATES.INTRO_CUTSCENE: renderIntroCutscene(ctx, gt, cw, ch); break;
    case STATES.ZONE_MAP: renderZoneMap(ctx, gt, cw, ch); break;
    case STATES.CASE_BRIEFING: renderCaseBriefing(ctx, gt, cw, ch); break;
    case STATES.EXPLORATION: renderExploration(ctx, gt, cw, ch); break;
    case STATES.PUZZLE_BOARD: renderPuzzleBoard(ctx, gt, cw, ch); break;
    case STATES.CONFRONTATION_INTRO: renderConfrontIntro(ctx, gt, cw, ch); break;
    case STATES.CONFRONTATION: renderConfrontation(ctx, gt, cw, ch); break;
    case STATES.BOSS_REWARD: renderBossReward(ctx, gt, cw, ch); break;
    case STATES.CASE_SOLVED: renderCaseSolved(ctx, gt, cw, ch); break;
    case STATES.UPGRADE_MENU: renderUpgradeMenu(ctx, gt, cw, ch); break;
    case STATES.GAME_OVER: renderGameOver(ctx, gt, cw, ch); break;
    case STATES.GAME_COMPLETE: renderGameComplete(ctx, gt, cw, ch); break;
    case STATES.CREDITS: renderCredits(ctx, gt, cw, ch); break;
    case STATES.PAUSE: renderPause(ctx, gt, cw, ch); break;
    case STATES.SETTINGS: renderSettings(ctx, gt, cw, ch); break;
    case STATES.EVIDENCE_FOUND: renderExploration(ctx, gt, cw, ch); break;
    case STATES.DEDUCTION_RESULT: renderPuzzleBoard(ctx, gt, cw, ch); break;
  }

  // 파티클 (화면 좌표) // 화면 좌표
  drawParticles(ctx);

  // 팝업 텍스트
  for (const p of G.popups) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;

  // 전환 오버레이 — 타입별 렌더링 [§6.3]
  if (transitionActive) {
    const ta = transitionAlpha;
    if (transitionType === 'wipe') {
      // 좌→우 사각형 와이프
      ctx.fillStyle = `rgba(11,20,38,1)`;
      ctx.fillRect(0, 0, cw * ta, ch);
    } else if (transitionType === 'zoomIn') {
      // 중앙에서 확대되는 원형 클리핑 (역: 원 밖을 덮음)
      ctx.fillStyle = `rgba(11,20,38,1)`;
      ctx.fillRect(0, 0, cw, ch);
      if (ta < 1) {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        const r = Math.max(cw, ch) * (1 - ta);
        ctx.arc(cw / 2, ch / 2, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    } else if (transitionType === 'slide') {
      // 좌→우 슬라이드 (새 화면이 밀려 들어옴)
      ctx.fillStyle = `rgba(11,20,38,1)`;
      const slideX = cw * (1 - ta);
      ctx.fillRect(slideX, 0, cw, ch);
    } else if (transitionType === 'dramatic') {
      // 암전 + 스포트라이트 원형 reveal
      ctx.fillStyle = `rgba(2,2,5,${Math.min(1, ta * 1.5)})`;
      ctx.fillRect(0, 0, cw, ch);
      if (ta > 0.4) {
        const spotP = (ta - 0.4) / 0.6;
        const spotR = Math.max(cw, ch) * 0.5 * spotP;
        const spotGrad = ctx.createRadialGradient(cw / 2, ch * 0.4, 0, cw / 2, ch * 0.4, spotR);
        spotGrad.addColorStop(0, `rgba(255,184,0,${0.12 * spotP})`);
        spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = spotGrad;
        ctx.fillRect(0, 0, cw, ch);
      }
    } else {
      // fade (기본)
      ctx.fillStyle = `rgba(11,20,38,${ta})`;
      ctx.fillRect(0, 0, cw, ch);
    }
  }

  ctx.restore();
}

// --- 타이틀 화면 렌더 ---
function renderTitle(ctx, gt, cw, ch) {
  const lang = getLang();

  // 배경 도시 (bgLayer1+2)
  drawBackground(ctx, gt, 0, 'midnight', 'fog', gt * 20, 0, cw, ch);

  // 비네팅 효과
  const vGrad = ctx.createRadialGradient(cw/2, ch/2, cw*0.2, cw/2, ch/2, cw*0.7);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0, 0, cw, ch);

  // 유령 실루엣 (중앙)
  const ghostY = ch * 0.35 + Math.sin(gt * 1.5) * 8;
  drawLucian(ctx, gt, cw / 2, ghostY, 0, 'normal', 0.6, []);

  // 글로우 라인 (아르데코)
  ctx.strokeStyle = C.DECO_BRONZE;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5 + 0.2 * Math.sin(gt * 2);
  const lineY = ch * 0.52;
  ctx.beginPath();
  ctx.moveTo(cw * 0.15, lineY);
  ctx.lineTo(cw * 0.42, lineY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cw * 0.58, lineY);
  ctx.lineTo(cw * 0.85, lineY);
  ctx.stroke();
  // 다이아몬드 장식
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.save();
  ctx.translate(cw / 2, lineY);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
  ctx.globalAlpha = 1;

  // 타이틀 텍스트 — 스캔라인 + 글로우
  const titleSize = Math.min(48, cw * 0.08);
  ctx.font = `bold ${titleSize}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';

  // 글로우
  ctx.shadowColor = C.GHOST_CYAN;
  ctx.shadowBlur = 20;
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.fillText(lang.title, cw / 2, ch * 0.22);
  ctx.shadowBlur = 0;

  // 서브타이틀
  const subSize = Math.min(18, cw * 0.03);
  ctx.font = `${subSize}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.fillText(lang.subtitle, cw / 2, ch * 0.28);

  // 스캔라인 오버레이
  ctx.globalAlpha = 0.03;
  for (let y = 0; y < ch; y += 3) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, cw, 1);
  }
  ctx.globalAlpha = 1;

  // 난이도 선택
  const diffY = ch * 0.6;
  ctx.font = `bold ${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.fillText(`${lang.diffLabel}: ▲▼`, cw / 2, diffY - 15);
  for (let i = 0; i < 3; i++) {
    const active = G.difficulty === i;
    ctx.fillStyle = active ? C.GHOST_CYAN : C.TEXT_SECONDARY;
    ctx.font = `${active ? 'bold' : 'normal'} ${Math.min(16, cw * 0.028)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.difficulty[i], cw / 2, diffY + 5 + i * 22);
    if (active) {
      ctx.strokeStyle = C.GHOST_CYAN;
      ctx.lineWidth = 1;
      const tw = ctx.measureText(lang.difficulty[i]).width;
      ctx.strokeRect(cw / 2 - tw / 2 - 8, diffY - 8 + i * 22, tw + 16, 20);
    }
  }

  // 시작 프롬프트 (깜빡임)
  if (Math.sin(gt * 3) > 0) {
    ctx.font = `${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.fillText(lang.startPrompt, cw / 2, ch * 0.88);
  }

  // 언어 토글 (우하단)
  ctx.font = `${Math.min(12, cw * 0.02)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.fillText('L: ' + lang.lang, cw - 15, ch - 15);

  // 최고 점수
  const hs = getHighScore();
  if (hs > 0) {
    ctx.textAlign = 'left';
    ctx.fillText(`${lang.highScore}: ${hs}`, 15, ch - 15);
  }
}

// --- 인트로 컷신 렌더 ---
function renderIntroCutscene(ctx, gt, cw, ch) {
  const lang = getLang();
  const t = G.introTimer;

  // 어두운 배경
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, cw, ch);

  // 텍스트 페이드인
  const lines = [
    { text: lang.title, y: 0.3, delay: 0.5, size: 32 },
    { text: '미스트헤이븐, 1920년대...', y: 0.45, delay: 1.5, size: 16 },
    { text: '명탐정 루시안 그레이가 살해당했다.', y: 0.55, delay: 2.5, size: 14 },
    { text: '그의 영혼은 진실을 찾아 헤맨다...', y: 0.65, delay: 3.5, size: 14 }
  ];

  for (const line of lines) {
    if (t < line.delay) continue;
    const alpha = Math.min(1, (t - line.delay) / 0.8);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = line === lines[0] ? C.GHOST_CYAN : C.TEXT_PRIMARY;
    ctx.font = `${Math.min(line.size, cw * line.size / 600)}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(line.text, cw / 2, ch * line.y);
  }
  ctx.globalAlpha = 1;

  // 스킵 안내
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `12px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('SPACE to skip', cw - 15, ch - 15);
}

// --- 존맵 렌더 ---
function renderZoneMap(ctx, gt, cw, ch) {
  const lang = getLang();

  // 배경
  drawBackground(ctx, gt, 0, 'evening', 'fog', gt * 10, 0, cw, ch);

  // 타이틀
  ctx.font = `bold ${Math.min(20, cw * 0.035)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.fillText(lang.selectCase, cw / 2, 35);

  // 구역 카드
  const zonePad = 10;
  const maxZoneW = 90;
  const zoneW = Math.min(maxZoneW, (cw - zonePad * 7) / 6);
  const zoneH = zoneW * 1.2;
  const startX = (cw - (zoneW * 6 + zonePad * 5)) / 2;
  const startY = ch * 0.15;

  const zoneColors = ['#1a3a5c', '#2a1a3c', '#3c2a1a', '#2a2a2a', '#1a2a3c', '#0a0a1f'];
  const zoneWeathers = ['fog', 'rain', 'clear', 'dust', 'snow', 'ether'];

  for (let i = 0; i < 6; i++) {
    const zx = startX + i * (zoneW + zonePad);
    const selected = G.zoneSelected === i;
    const accessible = i === 5 ? canEnterCase(5, 0) : (i === 0 || !!G.solvedCases[`z${i-1}c2`]);

    // 카드 배경
    ctx.fillStyle = accessible ? zoneColors[i] : 'rgba(30,30,40,0.5)';
    ctx.fillRect(zx, startY, zoneW, zoneH);

    // 선택 테두리
    if (selected) {
      ctx.strokeStyle = C.GHOST_CYAN;
      ctx.lineWidth = 2;
      ctx.strokeRect(zx - 2, startY - 2, zoneW + 4, zoneH + 4);
    }

    // 구역 이름
    ctx.fillStyle = accessible ? C.TEXT_PRIMARY : C.TEXT_SECONDARY;
    ctx.font = `bold ${Math.min(11, zoneW * 0.14)}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lang.zoneNames[i], zx + zoneW / 2, startY + zoneH * 0.4);

    // 보스 이름
    ctx.font = `${Math.min(9, zoneW * 0.11)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = C.SUSPECT_PURPLE;
    ctx.fillText(lang.bossNames[i], zx + zoneW / 2, startY + zoneH * 0.6);

    // 잠금 표시
    if (!accessible) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(zx, startY, zoneW, zoneH);
      ctx.fillStyle = C.DANGER_RED;
      ctx.font = `bold ${Math.min(14, zoneW * 0.18)}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText('🔒', zx + zoneW / 2, startY + zoneH * 0.5);
    }

    // 클리어 마크
    if (G.solvedCases[`z${i}c2`] || (i === 5 && G.solvedCases[`z5c0`])) {
      ctx.fillStyle = C.SUCCESS_GREEN;
      ctx.font = `bold ${Math.min(14, zoneW * 0.18)}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText('✓', zx + zoneW / 2, startY + zoneH * 0.85);
    }
  }

  // 선택된 구역의 사건 목록
  if (G.zoneSelected >= 0 && G.zoneSelected <= 5) {
    const caseY = startY + zoneH + 30;
    const maxCases = G.zoneSelected === 5 ? 1 : 3;
    const caseW = Math.min(150, (cw - 60) / maxCases);

    ctx.font = `bold ${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.textAlign = 'center';
    ctx.fillText(`— ${lang.zoneNames[G.zoneSelected]} —`, cw / 2, caseY - 10);

    for (let c = 0; c < maxCases; c++) {
      const cx = (cw - maxCases * (caseW + 10)) / 2 + c * (caseW + 10);
      const can = canEnterCase(G.zoneSelected, c);
      const solved = !!G.solvedCases[`z${G.zoneSelected}c${c}`];
      const caseSelected = G.caseSelected === c;

      // 사건 카드
      ctx.fillStyle = solved ? 'rgba(0,255,136,0.1)' : can ? 'rgba(0,212,255,0.08)' : 'rgba(50,50,60,0.3)';
      ctx.fillRect(cx, caseY, caseW, 80);

      if (caseSelected) {
        ctx.strokeStyle = C.GHOST_CYAN;
        ctx.lineWidth = 2;
        ctx.strokeRect(cx - 1, caseY - 1, caseW + 2, 82);
      }

      // 사건 이름
      const caseName = lang.caseNames[G.zoneSelected] ? (lang.caseNames[G.zoneSelected][c] || '') : '';
      ctx.fillStyle = can ? C.TEXT_PRIMARY : C.TEXT_SECONDARY;
      ctx.font = `bold ${Math.min(12, caseW * 0.1)}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText(caseName, cx + caseW / 2, caseY + 25);

      // 상태
      ctx.font = `${Math.min(11, caseW * 0.09)}px "Segoe UI", system-ui, sans-serif`;
      if (solved) {
        const rank = G.solvedCases[`z${G.zoneSelected}c${c}`].rank;
        ctx.fillStyle = C.SUCCESS_GREEN;
        ctx.fillText(`${lang.cleared} [${lang.rankNames[rank]}]`, cx + caseW / 2, caseY + 50);
      } else if (!can) {
        ctx.fillStyle = C.DANGER_RED;
        ctx.fillText(lang.locked, cx + caseW / 2, caseY + 50);
      } else {
        ctx.fillStyle = C.GHOST_CYAN;
        ctx.fillText('▶', cx + caseW / 2, caseY + 50);
      }
    }
  }

  // 소울 프래그먼트 표시
  ctx.textAlign = 'right';
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.font = `bold 13px "Segoe UI", system-ui, sans-serif`;
  drawStarIcon(ctx, cw - 112, ch - 26, 8, C.CLUE_GOLD);
  ctx.fillText(`${lang.soulFragments}: ${G.soulFragments}`, cw - 15, ch - 20);

  // 총점
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.fillText(`${lang.totalScore}: ${G.totalScore}`, cw - 15, ch - 40);

  // 업그레이드 버튼 (좌하단)
  ctx.textAlign = 'left';
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.fillText(`[U] ${lang.upgrade}`, 15, ch - 20);

  // 업그레이드 키 체크
  if (keys['KeyU']) {
    keys['KeyU'] = false;
    beginTransition(STATES.UPGRADE_MENU, 'fade', 0.3);
  }

  // 게임 완료 체크
  const allSolved = [0,1,2,3,4].every(z => !!G.solvedCases[`z${z}c2`]) && !!G.solvedCases['z5c0'];
  if (allSolved && !G._gameCompleteTriggered) {
    G._gameCompleteTriggered = true;
    beginTransition(STATES.GAME_COMPLETE, 'fade', 1.0);
  }
}

// --- 사건 브리핑 렌더 ---
function renderCaseBriefing(ctx, gt, cw, ch) {
  const lang = getLang();
  G.briefTimer += 0; // 카운트는 updateState에서

  // 어두운 배경 + 구역 색조
  const zoneColors = ['#0a1520', '#1a0a20', '#201a0a', '#151515', '#0a1520', '#050510'];
  ctx.fillStyle = zoneColors[G.currentZone] || C.BG_DEEP;
  ctx.fillRect(0, 0, cw, ch);

  // 아르데코 프레임
  drawDecoFrame(ctx, cw * 0.1, ch * 0.15, cw * 0.8, ch * 0.6,
    `${lang.zoneNames[G.currentZone]} — ${lang.caseNames[G.currentZone][G.currentCase] || ''}`);

  // 브리핑 텍스트
  const briefs = lang.caseBriefs[G.currentZone];
  const text = briefs ? (briefs[G.currentCase] || '') : '';
  const lines = text.split('\n');
  ctx.font = `${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.textAlign = 'center';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], cw / 2, ch * 0.4 + i * 24);
  }

  // 난이도 표시
  ctx.font = `${Math.min(12, cw * 0.02)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.fillText(`${lang.diffLabel}: ${lang.difficulty[G.difficulty]}`, cw / 2, ch * 0.65);

  // 진행 안내
  if (Math.sin(gt * 3) > 0) {
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.fillText(lang.startPrompt, cw / 2, ch * 0.82);
  }
}

// --- 탐색 모드 렌더 ---
function renderExploration(ctx, gt, cw, ch) {
  const lang = getLang();
  const L = G.lucian;
  const map = G.currentMap;
  if (!map) return;

  const zoneWeathers = ['fog', 'rain', 'clear', 'dust', 'snow', 'ether'];
  const zoneTimes = ['dusk', 'midnight', 'evening', 'dawn', 'afternoon', 'midnight'];

  // 배경 (패러랙스) // 화면 좌표
  drawBackground(ctx, gt, G.currentZone, zoneTimes[G.currentZone], zoneWeathers[G.currentZone], G.camX, G.camY, cw, ch);

  // 월드 좌표로 전환
  ctx.save(); // 월드 좌표
  ctx.translate(-G.camX, -G.camY);

  // 환경 오브젝트
  for (const obj of map.objects) {
    if (obj.type === 'gaslamp') {
      drawGaslamp(ctx, gt, obj.x, obj.y);
    } else {
      // 일반 오브젝트 (상자, 통 등)
      ctx.fillStyle = 'rgba(60,50,40,0.6)';
      ctx.fillRect(obj.x - obj.w / 2, obj.y - obj.h / 2, obj.w, obj.h);
      ctx.strokeStyle = 'rgba(100,80,60,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(obj.x - obj.w / 2, obj.y - obj.h / 2, obj.w, obj.h);
    }
  }

  // 단서 오브젝트
  for (const clue of map.clues) {
    drawClue(ctx, gt, clue.x, clue.y, clue.type, clue.discovered, clue.glowPhase, clue.requiredAbility, L.mode);
  }

  // NPC
  for (const npc of map.npcs) {
    if (!npc.active) continue;
    ctx.fillStyle = '#6a6a7a';
    ctx.beginPath();
    ctx.arc(npc.x, npc.y - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(npc.x - 5, npc.y - 6, 10, 16);
  }

  // 루시안
  drawLucian(ctx, gt, L.x, L.y, L.dir, L.mode, L.alpha, L.trail);

  // 투시 모드 시 시야 범위 표시
  if (L.mode === 'clairvoyance') {
    const range = 100 + G.abilities.clairvoyance * 50;
    const visionMult = G.currentZone === 0 && G.abilities.clairvoyance < 2 ? C.ENV_HAZARD.port.vision : 1;
    ctx.strokeStyle = C.CLUE_GOLD;
    ctx.globalAlpha = 0.2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(L.x, L.y, range * visionMult, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  ctx.restore(); // 화면 좌표로 복귀

  // 환경 위험 오버레이 (화면 좌표) // 화면 좌표
  if (G.currentZone === 0 && G.abilities.clairvoyance < 2) {
    // 항구: 시야 제한 (가장자리 어둡게)
    const fogGrad = ctx.createRadialGradient(cw/2, ch/2, cw*0.15, cw/2, ch/2, cw*0.4);
    fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fogGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, 0, cw, ch);
  }

  // HUD (화면 좌표) // 화면 좌표
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  const maxCred = C.CREDIBILITY[diffKey];
  drawHUD(ctx, gt, cw, ch, G.ether, C.ETHER_MAX, G.credibility, maxCred,
    G.soulFragments, G.abilities, G.currentZone, G.currentCase, G.totalScore, L.mode);

  // 가상 조이스틱 (터치 모드)
  if (G.joystick.active) {
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = C.GHOST_CYAN;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(G.joystick.sx, G.joystick.sy, 40, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.beginPath();
    ctx.arc(G.joystick.cx, G.joystick.cy, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // 조작 안내 (첫 5초)
  if (G.caseTimer < 5) {
    ctx.globalAlpha = Math.max(0, 1 - G.caseTimer / 5);
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `${Math.min(12, cw * 0.02)}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lang.tutorialHint, cw / 2, ch * 0.15);
    ctx.globalAlpha = 1;
  }

  // 증거 수 표시 (우하단)
  if (G.evidence.length > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = C.CLUE_GOLD;
    ctx.font = `bold 13px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`${lang.evidence}: ${G.evidence.length}`, cw - 15, ch - 65);
    if (G.evidence.length >= 3) {
      ctx.fillStyle = C.GHOST_CYAN;
      ctx.font = `11px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText(`Q: ${lang.deductionBoard}`, cw - 15, ch - 80);
    }
  }
}

// --- 퍼즐 보드 렌더 ---
function renderPuzzleBoard(ctx, gt, cw, ch) {
  const lang = getLang();

  // 배경
  ctx.fillStyle = 'rgba(11,20,38,0.95)';
  ctx.fillRect(0, 0, cw, ch);

  // 아르데코 프레임
  drawDecoFrame(ctx, 10, 10, cw - 20, ch - 20, lang.deductionBoard);

  // 증거 카드 (좌측 열)
  const cardW = Math.max(C.TOUCH_MIN, Math.min(120, cw * 0.2));
  const cardH = 45;
  const cardX = 25;
  ctx.font = `${Math.min(11, cw * 0.02)}px "Segoe UI", system-ui, sans-serif`;

  for (let i = 0; i < G.evidence.length; i++) {
    const cy = 60 + i * (cardH + 8);
    if (cy + cardH > ch - 80) break; // 화면 초과 방지
    const ev = G.evidence[i];
    const selected = G.puzzleSelected === i;

    ctx.fillStyle = selected ? 'rgba(0,212,255,0.15)' : 'rgba(255,184,0,0.05)';
    ctx.fillRect(cardX, cy, cardW, cardH);
    ctx.strokeStyle = selected ? C.GHOST_CYAN : C.DECO_BRONZE;
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(cardX, cy, cardW, cardH);

    // 아이콘
    const icon = ev.type === 'physical' ? '🔍' : ev.type === 'emotional' ? '💭' : '⏪';
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.textAlign = 'left';
    ctx.fillText(`${icon} ${ev.name || ev.id}`, cardX + 8, cy + cardH / 2 + 4);
  }

  // 추리 체인 슬롯 (우측)
  const slotX = cw * 0.45;
  const slotW = Math.max(C.TOUCH_MIN, Math.min(180, cw * 0.35));
  const slotH = 50;

  ctx.font = `bold ${Math.min(13, cw * 0.023)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.fillText(`${lang.chain} — ${lang.slots}`, slotX + slotW / 2, 55);

  for (let i = 0; i < 3; i++) {
    const sy = 80 + i * (slotH + 25);
    const filled = G.puzzleSlots[i];

    ctx.fillStyle = filled ? 'rgba(0,255,136,0.08)' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(slotX, sy, slotW, slotH);
    ctx.strokeStyle = filled ? C.SUCCESS_GREEN : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(slotX, sy, slotW, slotH);

    // 슬롯 번호
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.textAlign = 'center';
    ctx.font = `bold 12px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`${i + 1}`, slotX - 12, sy + slotH / 2 + 4);

    if (filled) {
      ctx.fillStyle = C.TEXT_PRIMARY;
      ctx.font = `11px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText(filled.name || filled.id, slotX + slotW / 2, sy + slotH / 2 + 4);
    }

    // 슬롯 간 연결선
    if (i < 2) {
      ctx.strokeStyle = filled && G.puzzleSlots[i+1] ? C.SUCCESS_GREEN : 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(slotX + slotW / 2, sy + slotH);
      ctx.lineTo(slotX + slotW / 2, sy + slotH + 25);
      ctx.stroke();
    }
  }

  // 검증 버튼
  const verifyBtnW = 120;
  const verifyBtnH = Math.max(C.TOUCH_MIN, 40);
  const verifyBtnX = cw / 2 - verifyBtnW / 2;
  const verifyBtnY = ch - 65;
  const allFilled = G.puzzleSlots.every(s => s !== null);

  ctx.fillStyle = allFilled ? C.GHOST_CYAN : 'rgba(100,100,120,0.3)';
  ctx.fillRect(verifyBtnX, verifyBtnY, verifyBtnW, verifyBtnH);
  ctx.fillStyle = allFilled ? '#000' : C.TEXT_SECONDARY;
  ctx.font = `bold 14px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`[V] ${lang.verify}`, cw / 2, verifyBtnY + verifyBtnH / 2 + 5);

  // 돌아가기 (좌상단)
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `12px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`← ${lang.back}`, 20, 30);

  // 결과 표시
  if (G.puzzleResult) {
    ctx.textAlign = 'center';
    ctx.font = `bold 18px "Segoe UI", system-ui, sans-serif`;
    if (G.puzzleResult.valid) {
      ctx.fillStyle = C.SUCCESS_GREEN;
      ctx.fillText(lang.correct, cw / 2, ch - 90);
    } else {
      ctx.fillStyle = C.DANGER_RED;
      ctx.fillText(lang.wrong, cw / 2, ch - 90);
    }
  }

  // 안내
  ctx.font = `11px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.textAlign = 'center';
  ctx.fillText(lang.connect, cw / 2, ch - 10);
}

// --- 대질 인트로 렌더 ---
function renderConfrontIntro(ctx, gt, cw, ch) {
  const lang = getLang();

  // 암전
  ctx.fillStyle = '#020205';
  ctx.fillRect(0, 0, cw, ch);

  // 스포트라이트
  const t = G.introTimer || 0;
  const spotR = Math.min(cw * 0.3, t * 150);
  const grad = ctx.createRadialGradient(cw/2, ch*0.4, 0, cw/2, ch*0.4, spotR);
  grad.addColorStop(0, 'rgba(255,184,0,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // 용의자 실루엣
  drawSuspect(ctx, gt, cw / 2, ch * 0.45, 'calm', false, G.currentZone);

  // 보스 이름
  ctx.font = `bold ${Math.min(22, cw * 0.04)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DANGER_RED;
  const bossName = lang.bossNames[G.currentZone] || '';
  ctx.globalAlpha = Math.min(1, t * 0.8);
  ctx.fillText(bossName, cw / 2, ch * 0.7);
  ctx.globalAlpha = 1;

  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `14px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(lang.bossAppear, cw / 2, ch * 0.8);
}

// --- 대질 렌더 ---
function renderConfrontation(ctx, gt, cw, ch) {
  const lang = getLang();
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  const maxCred = C.CREDIBILITY[diffKey];

  // 배경 — 대질 장면 (아르데코 법정 느낌)
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, cw, ch);

  // 기하학 배경 패턴
  ctx.strokeStyle = 'rgba(196,149,58,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.moveTo(i * (cw / 20), 0);
    ctx.lineTo(i * (cw / 20), ch);
    ctx.stroke();
  }

  // 용의자 (상단)
  const suspectX = cw / 2;
  const suspectY = ch * 0.25;
  drawSuspect(ctx, gt, suspectX, suspectY, G.confrontSuspect ? G.confrontSuspect.emotion : 'calm',
    G.confrontPhase === 'testimony', G.currentZone);

  // 라운드 표시
  ctx.font = `bold 14px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.fillText(`Round ${G.confrontRound + 1} / ${G.confrontMaxRounds}`, cw / 2, 25);

  // 신뢰도 바 (상단)
  const credBarW = Math.min(200, cw * 0.35);
  const credBarX = (cw - credBarW) / 2;
  ctx.fillStyle = 'rgba(93,173,226,0.15)';
  ctx.fillRect(credBarX, 35, credBarW, 12);
  ctx.fillStyle = (G.credibility / maxCred) > 0.3 ? C.CRED_BLUE : C.DANGER_RED;
  ctx.fillRect(credBarX, 35, credBarW * (G.credibility / maxCred), 12);
  // 하트 아이콘
  ctx.fillStyle = (G.credibility / maxCred) > 0.3 ? C.CRED_BLUE : C.DANGER_RED;
  ctx.beginPath();
  const chx = credBarX - 13, chy = 37;
  ctx.moveTo(chx, chy + 4);
  ctx.bezierCurveTo(chx - 7, chy - 3, chx - 7, chy - 8, chx, chy - 5);
  ctx.bezierCurveTo(chx + 7, chy - 8, chx + 7, chy - 3, chx, chy + 4);
  ctx.fill();

  // 대화 상자
  const dlgY = ch * 0.4;
  const dlgW = Math.min(cw * 0.8, 500);
  const dlgH = 80;
  const dlgX = (cw - dlgW) / 2;
  drawDecoFrame(ctx, dlgX, dlgY, dlgW, dlgH);

  // 증언 텍스트
  const dialogue = getBossDialogue(G.currentZone, G.confrontRound, G.settings.lang);
  ctx.font = `${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.textAlign = 'center';
  ctx.fillText(dialogue, cw / 2, dlgY + dlgH / 2 + 5);

  // 상태별 표시
  if (G.confrontPhase === 'testimony') {
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `12px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText('SPACE / 탭 → ' + lang.selectEvidence, cw / 2, dlgY + dlgH + 20);
  } else if (G.confrontPhase === 'select') {
    // 증거 카드 목록 (하단)
    const cardW = Math.max(C.TOUCH_MIN, Math.min(80, (cw - 40) / Math.max(1, G.evidence.length)));
    const cardH = Math.max(C.TOUCH_MIN, 40);
    const totalW = G.evidence.length * (cardW + 8);
    const startEvX = (cw - totalW) / 2;
    const cardY = ch - cardH - 20;

    ctx.font = `bold 12px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = C.DECO_BRONZE;
    ctx.fillText(lang.selectEvidence, cw / 2, cardY - 15);

    for (let i = 0; i < G.evidence.length; i++) {
      const ex = startEvX + i * (cardW + 8);
      const selected = G.confrontEvidenceSelected === i;

      ctx.fillStyle = selected ? 'rgba(0,212,255,0.2)' : 'rgba(255,184,0,0.05)';
      ctx.fillRect(ex, cardY, cardW, cardH);
      ctx.strokeStyle = selected ? C.GHOST_CYAN : C.DECO_BRONZE;
      ctx.lineWidth = selected ? 2 : 1;
      ctx.strokeRect(ex, cardY, cardW, cardH);

      ctx.fillStyle = C.TEXT_PRIMARY;
      ctx.textAlign = 'center';
      ctx.font = `${Math.min(10, cardW * 0.12)}px "Segoe UI", system-ui, sans-serif`;
      const evName = G.evidence[i].name || G.evidence[i].id;
      ctx.fillText(evName.substring(0, 10), ex + cardW / 2, cardY + cardH / 2 + 4);
    }

    // 제시 버튼
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.font = `bold 14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`[SPACE] ${lang.presentEvidence}`, cw / 2, cardY - 35);
  } else if (G.confrontPhase === 'result_correct') {
    // 이펙트
    drawEffectHit(ctx, gt, cw / 2, ch * 0.4, 1.5, 0.6);
    ctx.fillStyle = C.SUCCESS_GREEN;
    ctx.font = `bold 20px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lang.correct, cw / 2, ch * 0.65);
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.nextRound, cw / 2, ch * 0.72);
  } else if (G.confrontPhase === 'result_wrong') {
    ctx.fillStyle = C.DANGER_RED;
    ctx.font = `bold 20px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lang.wrong, cw / 2, ch * 0.65);
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`${lang.credibility}: ${G.credibility | 0}`, cw / 2, ch * 0.72);
  }
}

// --- 보스 보상 렌더 ---
function renderBossReward(ctx, gt, cw, ch) {
  const lang = getLang();

  ctx.fillStyle = 'rgba(11,20,38,0.95)';
  ctx.fillRect(0, 0, cw, ch);

  drawDecoFrame(ctx, cw * 0.15, ch * 0.15, cw * 0.7, ch * 0.6);

  ctx.font = `bold ${Math.min(22, cw * 0.04)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.fillText(lang.caseComplete, cw / 2, ch * 0.28);

  // 보상 표시
  ctx.font = `${Math.min(16, cw * 0.03)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_PRIMARY;
  drawStarIcon(ctx, cw / 2 - 48, ch * 0.38 + 12, 10, C.CLUE_GOLD);
  ctx.fillText(`${lang.soulFragments} +3`, cw / 2 + 10, ch * 0.4);

  // 도구 획득
  const toolIdx = G.currentZone;
  if (toolIdx < 8) {
    ctx.fillStyle = C.SUCCESS_GREEN;
    ctx.fillText(`${lang.newTool}: ${lang.tools[toolIdx]}`, cw / 2, ch * 0.5);
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `${Math.min(12, cw * 0.02)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.toolDescs[toolIdx], cw / 2, ch * 0.56);
  }

  // 진행 안내
  if (Math.sin(gt * 3) > 0) {
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.font = `14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.startPrompt, cw / 2, ch * 0.72);
  }
}

// --- 사건 해결 렌더 ---
function renderCaseSolved(ctx, gt, cw, ch) {
  const lang = getLang();
  const r = G.lastResult;

  ctx.fillStyle = 'rgba(0,20,10,0.95)';
  ctx.fillRect(0, 0, cw, ch);

  drawDecoFrame(ctx, cw * 0.1, ch * 0.1, cw * 0.8, ch * 0.75,
    `${lang.caseComplete} — ${lang.zoneNames[G.currentZone]}`);

  if (!r) return;

  const fontSize = Math.min(14, cw * 0.025);
  ctx.font = `bold ${fontSize + 4}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';

  // 랭크 (대형 표시)
  const rankColors = [C.CLUE_GOLD, C.SUCCESS_GREEN, C.CRED_BLUE, C.TEXT_SECONDARY];
  ctx.fillStyle = rankColors[r.rank];
  ctx.font = `bold ${Math.min(48, cw * 0.08)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(lang.rankNames[r.rank], cw / 2, ch * 0.32);

  // 점수 상세
  ctx.font = `${fontSize}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_PRIMARY;
  const lines = [
    `${lang.score}: ${r.rawScore} × ${r.rankMult} = ${r.finalScore}`,
    `Time Bonus: +${r.timeBonus}`,
    `Accuracy: +${r.accuracyBonus}`,
    `Explore: +${r.exploreBonus}`
  ];
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], cw / 2, ch * 0.45 + i * 22);
  }

  // 총점
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.font = `bold ${fontSize + 2}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(`${lang.totalScore}: ${G.totalScore}`, cw / 2, ch * 0.7);
}

// --- 업그레이드 메뉴 렌더 ---
function renderUpgradeMenu(ctx, gt, cw, ch) {
  const lang = getLang();

  ctx.fillStyle = 'rgba(11,20,38,0.95)';
  ctx.fillRect(0, 0, cw, ch);

  drawDecoFrame(ctx, cw * 0.1, ch * 0.05, cw * 0.8, ch * 0.85, lang.upgradeTitle);

  // 영혼 파편 표시
  ctx.font = `bold 14px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.CLUE_GOLD;
  drawStarIcon(ctx, cw / 2 - 60, ch * 0.12 + 10, 9, C.CLUE_GOLD);
  ctx.fillText(`${lang.soulFragments}: ${G.soulFragments}`, cw / 2, ch * 0.15);

  // 능력 업그레이드 카드
  const keys = ['clairvoyance', 'empathy', 'rewind'];
  const abilityColors = [C.CLUE_GOLD, C.SUSPECT_PURPLE, '#FF8844'];
  const optW = Math.min(300, cw * 0.65);
  const optH = 70;
  const startX = (cw - optW) / 2;
  const startY = ch * 0.22;

  for (let i = 0; i < 3; i++) {
    const oy = startY + i * (optH + 15);
    const key = keys[i];
    const lvl = G.upgrades[key];
    const selected = G.upgradeSelected === i;
    const maxed = lvl >= 5;
    const cost = maxed ? 0 : C.UPGRADE_COST[lvl];
    const canAfford = G.soulFragments >= cost && !maxed;

    // 카드 배경
    ctx.fillStyle = selected ? `rgba(${i === 0 ? '255,184,0' : i === 1 ? '155,89,182' : '255,136,68'},0.1)` : 'rgba(30,30,50,0.5)';
    ctx.fillRect(startX, oy, optW, optH);
    ctx.strokeStyle = selected ? abilityColors[i] : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(startX, oy, optW, optH);

    // 능력 이름
    ctx.fillStyle = abilityColors[i];
    ctx.font = `bold ${Math.min(15, cw * 0.028)}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(lang.abilities[i], startX + 15, oy + 22);

    // 레벨 바
    const barX = startX + 15;
    const barY = oy + 35;
    const barW = optW - 30;
    const barH = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = abilityColors[i];
    ctx.fillRect(barX, barY, barW * (lvl / 5), barH);

    // 레벨 텍스트
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.font = `12px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(`${lang.level}${G.abilities[key]}`, barX, oy + 60);

    // 비용/상태
    ctx.textAlign = 'right';
    if (maxed) {
      ctx.fillStyle = C.SUCCESS_GREEN;
      ctx.fillText(lang.max, startX + optW - 15, oy + 60);
    } else {
      ctx.fillStyle = canAfford ? C.CLUE_GOLD : C.DANGER_RED;
      ctx.fillText(`${lang.cost}: ${cost} ✦`, startX + optW - 15, oy + 60);
    }
  }

  // 돌아가기
  ctx.textAlign = 'center';
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `13px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(`[B] ${lang.back}`, cw / 2, ch * 0.9);
}

// --- 게임 오버 렌더 ---
function renderGameOver(ctx, gt, cw, ch) {
  const lang = getLang();

  // 어두운 레드 배경
  ctx.fillStyle = 'rgba(20,0,5,0.95)';
  ctx.fillRect(0, 0, cw, ch);

  // 글리치 효과
  for (let i = 0; i < 5; i++) {
    const gy = rng.int(0, ch);
    ctx.fillStyle = `rgba(255,51,102,${0.03 + 0.02 * Math.sin(gt * 10 + i)})`;
    ctx.fillRect(0, gy, cw, 2);
  }

  // 게임 오버 텍스트
  ctx.font = `bold ${Math.min(36, cw * 0.06)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DANGER_RED;
  ctx.shadowColor = C.DANGER_RED;
  ctx.shadowBlur = 15;
  ctx.fillText(lang.gameOver, cw / 2, ch * 0.35);
  ctx.shadowBlur = 0;

  // 점수
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.font = `${Math.min(18, cw * 0.03)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(`${lang.totalScore}: ${G.totalScore}`, cw / 2, ch * 0.5);

  // 최고점수
  const hs = getHighScore();
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.fillText(`${lang.highScore}: ${hs}`, cw / 2, ch * 0.58);

  // 재시작 안내
  if (Math.sin(gt * 3) > 0) {
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.font = `${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.restart, cw / 2, ch * 0.78);
  }
}

// --- 게임 완료 렌더 ---
function renderGameComplete(ctx, gt, cw, ch) {
  const lang = getLang();

  // 골드 배경
  ctx.fillStyle = '#0a0a10';
  ctx.fillRect(0, 0, cw, ch);

  // 골드 입자
  for (let i = 0; i < 30; i++) {
    const px = (i * 43 + gt * 15 + Math.sin(gt + i) * 50) % cw;
    const py = (i * 31 + gt * 10) % ch;
    ctx.fillStyle = `rgba(255,215,0,${0.2 + 0.15 * Math.sin(gt * 2 + i)})`;
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 타이틀
  ctx.font = `bold ${Math.min(32, cw * 0.055)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.shadowColor = C.CLUE_GOLD;
  ctx.shadowBlur = 20;
  ctx.fillText(lang.complete, cw / 2, ch * 0.25);
  ctx.shadowBlur = 0;

  // 메시지
  ctx.font = `${Math.min(16, cw * 0.028)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.fillText(lang.completeMsg, cw / 2, ch * 0.4);

  // 총점
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.font = `bold ${Math.min(24, cw * 0.04)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(`${lang.totalScore}: ${G.totalScore}`, cw / 2, ch * 0.55);

  // 루시안 실루엣
  drawLucian(ctx, gt, cw / 2, ch * 0.72, 0, 'normal', 0.8, []);

  // 계속 안내
  if (Math.sin(gt * 2) > 0) {
    ctx.fillStyle = C.TEXT_SECONDARY;
    ctx.font = `14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(lang.startPrompt, cw / 2, ch * 0.9);
  }
}

// --- 크레딧 렌더 ---
function renderCredits(ctx, gt, cw, ch) {
  const lang = getLang();

  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, cw, ch);

  const text = lang.credits;
  const lines = text.split('\n');
  const baseY = ch - G.creditsScroll;

  ctx.font = `${Math.min(16, cw * 0.028)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.TEXT_PRIMARY;

  for (let i = 0; i < lines.length; i++) {
    const ly = baseY + i * 30;
    if (ly > -30 && ly < ch + 30) {
      ctx.fillText(lines[i], cw / 2, ly);
    }
  }

  // "Made with Canvas" 표시
  const footY = baseY + lines.length * 30 + 60;
  if (footY > -30 && footY < ch + 30) {
    ctx.fillStyle = C.DECO_BRONZE;
    ctx.font = `bold 14px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText('Made with HTML5 Canvas', cw / 2, footY);
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.fillText('유령 탐정 — Spectral Sleuth', cw / 2, footY + 25);
  }

  if (G.creditsScroll > lines.length * 30 + 200) {
    beginTransition(STATES.TITLE, 'fade', 0.5);
  }

  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `12px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('SPACE to skip', cw - 15, ch - 15);
}

// --- 일시정지 렌더 ---
function renderPause(ctx, gt, cw, ch) {
  const lang = getLang();

  // 반투명 오버레이
  ctx.fillStyle = 'rgba(5,5,15,0.85)';
  ctx.fillRect(0, 0, cw, ch);

  drawDecoFrame(ctx, cw * 0.2, ch * 0.25, cw * 0.6, ch * 0.4, lang.pause);

  ctx.font = `bold ${Math.min(18, cw * 0.03)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';

  // 계속
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.fillText(`[SPACE] ${lang.resume}`, cw / 2, ch * 0.42);

  // 설정
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.fillText(`[S] ${lang.settings}`, cw / 2, ch * 0.52);

  // 타이틀로
  ctx.fillStyle = C.DANGER_RED;
  ctx.font = `${Math.min(14, cw * 0.025)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('[ESC] → Title', cw / 2, ch * 0.6);
}

// --- 설정 렌더 ---
function renderSettings(ctx, gt, cw, ch) {
  const lang = getLang();

  ctx.fillStyle = 'rgba(5,5,15,0.92)';
  ctx.fillRect(0, 0, cw, ch);

  drawDecoFrame(ctx, cw * 0.15, ch * 0.1, cw * 0.7, ch * 0.7, lang.settings);

  const options = [
    { label: lang.lang, value: G.settings.lang === 'ko' ? '한국어' : 'English' },
    { label: lang.sfxVol, value: `${(snd.sfxVol * 100) | 0}%` },
    { label: lang.bgmVol, value: `${(snd.bgmVol * 100) | 0}%` },
    { label: lang.diffLabel, value: lang.difficulty[G.difficulty] }
  ];

  const optH = 50;
  const startY = ch * 0.25;
  const optW = Math.min(300, cw * 0.5);
  const optX = (cw - optW) / 2;

  for (let i = 0; i < options.length; i++) {
    const oy = startY + i * (optH + 10);
    const selected = G.settingsSelected === i;

    ctx.fillStyle = selected ? 'rgba(0,212,255,0.08)' : 'rgba(30,30,50,0.3)';
    ctx.fillRect(optX, oy, optW, optH);
    if (selected) {
      ctx.strokeStyle = C.GHOST_CYAN;
      ctx.lineWidth = 1;
      ctx.strokeRect(optX, oy, optW, optH);
    }

    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.font = `bold 13px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(options[i].label, optX + 15, oy + 22);

    ctx.textAlign = 'right';
    ctx.fillStyle = C.GHOST_CYAN;
    ctx.fillText(`◀ ${options[i].value} ▶`, optX + optW - 15, oy + 22);

    if (selected) {
      ctx.fillStyle = C.TEXT_SECONDARY;
      ctx.font = `11px "Segoe UI", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('← / → to adjust', optX + optW / 2, oy + 42);
    }
  }

  // 돌아가기
  ctx.textAlign = 'center';
  ctx.fillStyle = C.TEXT_SECONDARY;
  ctx.font = `13px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText(`[Backspace] ${lang.back}`, cw / 2, ch * 0.85);
}

// ═══════════════════════════════════════════════════════════════
// GAME INITIALIZATION
// ═══════════════════════════════════════════════════════════════

// 전환 알파 업데이트를 위한 프록시
const transProxy = { a: 0 };
const origTwAdd = tw.add.bind(tw);
tw.add = function(obj, props, dur, ease, onComplete) {
  // transitionAlpha를 트윈으로 제어
  if (obj === transProxy || (obj.a !== undefined && props.a !== undefined && obj !== G)) {
    const wrapped = origTwAdd(obj, props, dur, ease, () => {
      transitionAlpha = obj.a;
      if (onComplete) onComplete();
    });
    // 매 프레임 알파 업데이트
    const origUpdate = tw.update.bind(tw);
    return wrapped;
  }
  return origTwAdd(obj, props, dur, ease, onComplete);
};
// 전환 알파를 매 프레임 동기화
const origTwUpdate = tw.update;
tw.update = function(dt) {
  origTwUpdate.call(tw, dt);
  // transProxy.a를 transitionAlpha에 동기화
  transitionAlpha = transProxy ? transProxy.a || 0 : 0;
};

// beginTransition을 transProxy 사용으로 재정의
function beginTransition(targetState, type, duration) {
  if (transitionActive) return;
  transitionActive = true;
  transitionTarget = targetState;
  transitionType = type || 'fade';
  transProxy.a = 0;
  transitionAlpha = 0;

  const dur = duration || 0.4;
  origTwAdd(transProxy, { a: 1 }, dur / 2, 'easeIn', () => {
    transitionAlpha = 1;
    previousState = G.state;
    G.state = targetState;
    onStateEnter(targetState);
    origTwAdd(transProxy, { a: 0 }, dur / 2, 'easeOut', () => {
      transitionActive = false;
      transitionAlpha = 0;
      transProxy.a = 0;
    });
  });

  snd.playSfx('transition');
}

// 게임 시작
async function startGame() {
  // 로딩 화면 표시
  ctx.fillStyle = C.BG_DEEP;
  ctx.fillRect(0, 0, G._cw, G._ch);
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading...', G._cw / 2, G._ch / 2);

  // 최고 점수 로드
  G.highScore = getHighScore();

  // 이전 진행 불러오기 시도
  loadProgress();

  // 난이도 기반 초기화
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  G.credibility = C.CREDIBILITY[diffKey];
  G.hintsAvail = diffKey === 'easy' ? 99 : diffKey === 'medium' ? 3 : 1;

  // RNG 시드
  rng.seed(G.runSeed);
  G._rngState = G.runSeed;

  // 타이틀 상태로 시작
  G.state = STATES.TITLE;
  onStateEnter(STATES.TITLE);

  // 메인 루프 시작
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

// 게임 시작!
startGame();
</script>
