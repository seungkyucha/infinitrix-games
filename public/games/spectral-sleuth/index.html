// --- SeededRNG (Math.random 0건) ---
const rng = {
  _s: 12345,
  seed(s) { this._s = s | 0 || 1; },
  // xorshift32 알고리즘
  next() {
    let s = this._s;
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    this._s = s;
    return (s >>> 0) / 4294967296;
  },
  // 범위 내 정수 반환
  int(min, max) { return min + ((this.next() * (max - min + 1)) | 0); },
  // 배열 셔플
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this.int(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  },
  // 배열에서 랜덤 선택
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
};

// --- TweenManager (setTimeout 0건) ---
const tw = {
  _tweens: [],
  _pendingCancel: false,

  // 새 트윈 추가
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeOut', onComplete, done: false };
    for (const k in props) { t.props[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(t);
    return t;
  },

  // 지연 후 콜백 실행
  delay(dur, cb) {
    const dummy = { _v: 0 };
    return this.add(dummy, { _v: 1 }, dur, 'linear', cb);
  },

  // 즉시 전체 정리 [F13]
  clearImmediate() {
    this._tweens.length = 0;
    this._pendingCancel = false;
  },

  // 전체 취소 요청 (deferred)
  cancelAll() { this._pendingCancel = true; },

  // 매 프레임 갱신
  update(dt) {
    if (this._pendingCancel) {
      this._tweens.length = 0;
      this._pendingCancel = false;
      return;
    }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      if (t.done) continue;
      t.elapsed += dt;
      let p = t.elapsed / t.dur;
      if (p >= 1) p = 1;
      const ep = this._ease(p, t.ease);
      for (const k in t.props) {
        const pr = t.props[k];
        t.obj[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (p >= 1) {
        t.done = true;
        if (t.onComplete) t.onComplete();
      }
    }
    // 완료된 트윈 제거
    this._tweens = this._tweens.filter(t => !t.done);
  },

  // 이징 함수
  _ease(t, type) {
    switch (type) {
      case 'linear': return t;
      case 'easeIn': return t * t;
      case 'easeOut': return 1 - (1 - t) * (1 - t);
      case 'easeInOut': return t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t);
      case 'easeOutBounce': {
        if (t < 1/2.75) return 7.5625*t*t;
        if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t + 0.75; }
        if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t + 0.9375; }
        t -= 2.625/2.75; return 7.5625*t*t + 0.984375;
      }
      default: return 1 - (1 - t) * (1 - t);
    }
  }
};

// --- ObjectPool ---
const pool = {
  _pools: {},
  // 풀에서 객체 가져오기
  get(type, factory) {
    if (!this._pools[type]) this._pools[type] = [];
    const p = this._pools[type];
    for (let i = 0; i < p.length; i++) {
      if (!p[i].active) { p[i].active = true; return p[i]; }
    }
    const obj = factory();
    obj.active = true;
    p.push(obj);
    return obj;
  },
  // 풀에 반환
  release(type, obj) { obj.active = false; },
  // 타입별 활성 객체 순회
  each(type, fn) {
    const p = this._pools[type];
    if (!p) return;
    for (let i = 0; i < p.length; i++) {
      if (p[i].active) fn(p[i]);
    }
  },
  // 전체 초기화
  clear() { for (const k in this._pools) this._pools[k].length = 0; }
};

// --- SoundManager (Web Audio API) ---
const snd = {
  _ctx: null,
  _gains: {},
  _bgmNode: null,
  _muted: false,
  sfxVol: 0.7,
  bgmVol: 0.5,

  // 초기화 (사용자 제스처 후 호출)
  init() {
    if (this._ctx) return;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._gains.master = this._ctx.createGain();
      this._gains.master.connect(this._ctx.destination);
      this._gains.sfx = this._ctx.createGain();
      this._gains.sfx.gain.value = this.sfxVol;
      this._gains.sfx.connect(this._gains.master);
      this._gains.bgm = this._ctx.createGain();
      this._gains.bgm.gain.value = this.bgmVol;
      this._gains.bgm.connect(this._gains.master);
    } catch(e) { /* Web Audio 미지원 시 무시 */ }
  },

  // 효과음 재생 (프로시저럴)
  playSfx(type) {
    if (!this._ctx || this._muted) return;
    const ctx = this._ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(this._gains.sfx);

    switch(type) {
      case 'clue_found': // 차임벨 상승 3음
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'ability_use': // 에테리얼 웅
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'correct': // 화음 상승
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(554, now + 0.15);
        osc.frequency.setValueAtTime(659, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'wrong': // 불협 하강
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(350, now);
        osc.frequency.linearRampToValueAtTime(200, now + 0.3);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'transition': // 와이프 스위시
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'boss_appear': // 드라마틱 저음
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.setValueAtTime(60, now + 0.5);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
        osc.start(now); osc.stop(now + 1.0);
        break;
      case 'chain_complete': // 연쇄 차임
        osc.type = 'sine';
        for (let i = 0; i < 4; i++) {
          osc.frequency.setValueAtTime(440 + i * 110, now + i * 0.1);
        }
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      case 'ghost_mode': // 에코 리버브
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(330, now + 0.4);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      default: // 기본 클릭음
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
  },

  // BGM 시작 (프로시저럴 미니멀 루프)
  startBgm(type) {
    if (!this._ctx) return;
    this.stopBgm();
    const ctx = this._ctx;
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const g1 = ctx.createGain();
    const g2 = ctx.createGain();
    osc1.connect(g1); g1.connect(this._gains.bgm);
    osc2.connect(g2); g2.connect(this._gains.bgm);

    // 미스터리 분위기 — 저음 드론 + 고음 트레몰로
    osc1.type = 'sine';
    osc2.type = 'triangle';
    const baseFreq = type === 'boss' ? 55 : type === 'puzzle' ? 165 : type === 'upgrade' ? 220 : 110;
    osc1.frequency.value = baseFreq;
    osc2.frequency.value = baseFreq * 3;
    g1.gain.value = 0.06;
    g2.gain.value = 0.02;

    // 트레몰로 LFO
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = type === 'boss' ? 4 : 2;
    lfoGain.gain.value = 0.01;
    lfo.connect(lfoGain);
    lfoGain.connect(g2.gain);

    osc1.start(); osc2.start(); lfo.start();
    this._bgmNode = { osc1, osc2, lfo, g1, g2 };
  },

  // BGM 정지
  stopBgm() {
    if (this._bgmNode) {
      try {
        this._bgmNode.osc1.stop();
        this._bgmNode.osc2.stop();
        this._bgmNode.lfo.stop();
      } catch(e) {}
      this._bgmNode = null;
    }
  },

  // 음소거 토글
  toggleMute() {
    this._muted = !this._muted;
    if (this._gains.master) {
      this._gains.master.gain.value = this._muted ? 0 : 1;
    }
  },

  // 볼륨 조절
  setSfxVol(v) { this.sfxVol = v; if (this._gains.sfx) this._gains.sfx.gain.value = v; },
  setBgmVol(v) { this.bgmVol = v; if (this._gains.bgm) this._gains.bgm.gain.value = v; }
};

// 루시안 생성
function createLucian() {
  return {
    x: 400, y: 300, vx: 0, vy: 0,
    dir: 0, // 0~7 8방향
    mode: 'normal', // normal, clairvoyance, empathy, rewind
    alpha: 0.8,
    trail: [], // 잔상 트레일 (최대 5)
    abilityTimer: 0,
    abilityCooldown: [0, 0, 0],
    moving: false,
    interacting: false
  };
}

// 단서 오브젝트 생성
function createClue(id, x, y, type, requiredAbility, requiredLv) {
  return {
    id, x, y, type, // 'physical', 'emotional', 'temporal'
    requiredAbility, // 'clairvoyance', 'empathy', 'rewind'
    requiredLv,
    discovered: false,
    glowPhase: 0,
    active: true
  };
}

// 용의자 생성
function createSuspect(zoneIdx) {
  return {
    x: 0, y: 0,
    emotion: 'calm', // calm, nervous, angry, confessing
    speaking: false,
    health: 4, // 대질 라운드 남은 수
    currentDialogue: 0,
    defeated: false
  };
}

// NPC 시민 생성
function createNPC(x, y) {
  return {
    x, y, vx: (rng.next() - 0.5) * 30, vy: 0,
    frame: 0, active: true
  };
}

// 탐색 맵 생성 (사건별 랜덤화된 클루 배치)
function generateExplorationMap(zoneIdx, caseIdx, abilityLevels) {
  const mapW = 1200, mapH = 900;
  const clues = [];
  const lang = getLang();
  const clueNames = lang.clueNames[zoneIdx] ? (lang.clueNames[zoneIdx][caseIdx] || []) : [];

  // 필수 단서 3개 배치 (SeededRNG)
  const positions = [];
  for (let i = 0; i < 8; i++) {
    positions.push({ x: 100 + rng.int(0, mapW - 200), y: 100 + rng.int(0, mapH - 200) });
  }
  rng.shuffle(positions);

  const abilityTypes = ['clairvoyance', 'empathy', 'rewind'];
  for (let i = 0; i < 3; i++) {
    const pos = positions[i];
    const aType = abilityTypes[i % 3];
    const reqLv = zoneIdx < 2 ? 1 : zoneIdx < 4 ? 2 : 3;
    const name = clueNames[i] || `Clue ${i + 1}`;
    clues.push(createClue(
      `z${zoneIdx}c${caseIdx}_${i}`, pos.x, pos.y,
      i === 0 ? 'physical' : i === 1 ? 'emotional' : 'temporal',
      aType, reqLv
    ));
    clues[clues.length - 1].name = name;
    clues[clues.length - 1].essential = true;
  }

  // 선택 단서 1~2개
  const optCount = rng.int(1, 2);
  for (let i = 0; i < optCount; i++) {
    const pos = positions[3 + i];
    if (!pos) break;
    clues.push(createClue(
      `z${zoneIdx}c${caseIdx}_opt${i}`, pos.x, pos.y,
      rng.pick(['physical', 'emotional', 'temporal']),
      rng.pick(abilityTypes), 1
    ));
    clues[clues.length - 1].name = `Optional ${i + 1}`;
    clues[clues.length - 1].essential = false;
  }

  // 배경 오브젝트 (가스등, 건물 등)
  const objects = [];
  for (let i = 0; i < 12; i++) {
    objects.push({
      type: rng.pick(['gaslamp', 'crate', 'barrel', 'bench', 'pillar']),
      x: rng.int(50, mapW - 50),
      y: rng.int(50, mapH - 50),
      w: rng.int(30, 60),
      h: rng.int(30, 60)
    });
  }

  // NPC 배치
  const npcs = [];
  for (let i = 0; i < rng.int(3, 6); i++) {
    npcs.push(createNPC(rng.int(100, mapW - 100), rng.int(100, mapH - 100)));
  }

  return { w: mapW, h: mapH, clues, objects, npcs };
}

// ═══════════════════════════════════════════════════════════════
// REGION 4: DRAW — 모든 순수 드로잉 함수
// ═══════════════════════════════════════════════════════════════

// 현재 언어 텍스트 가져오기
function getLang() { return LANG[G.settings.lang] || LANG.ko; }

// 루시안(유령 탐정) 그리기
function drawLucian(ctx, gt, x, y, dir, mode, alpha, trail) {
  // 잔상 트레일 그리기
  if (trail && trail.length > 0) {
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const a = (i / trail.length) * 0.2;
      ctx.globalAlpha = a;
      ctx.fillStyle = C.GHOST_CYAN;
      ctx.fillRect(t.x - 10, t.y - 20, 20, 40);
    }
    ctx.globalAlpha = 1;
  }

  // 유령 글로우 오라
  const glowR = 40 + 5 * Math.sin(gt * 3);
  ctx.save();
  ctx.globalAlpha = 0.15 + 0.05 * Math.sin(gt * 2);
  ctx.beginPath();
  ctx.arc(x, y - 5, glowR, 0, Math.PI * 2);
  ctx.fillStyle = mode === 'clairvoyance' ? '#FFB800' :
                  mode === 'empathy' ? '#9B59B6' :
                  mode === 'rewind' ? '#FF8844' : C.GHOST_GLOW;
  ctx.fill();
  ctx.restore();

  // 캐릭터 본체
  ctx.save();
  ctx.globalAlpha = alpha;
  {
    // 트렌치코트 실루엣
    ctx.fillStyle = C.GHOST_CYAN;
    // 머리
    ctx.beginPath();
    ctx.arc(x, y - 22, 8, 0, Math.PI * 2);
    ctx.fill();
    // 모자 (페도라)
    ctx.fillRect(x - 12, y - 30, 24, 4);
    ctx.fillRect(x - 8, y - 34, 16, 4);
    // 몸통 (트렌치코트)
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 14);
    ctx.lineTo(x - 14, y + 16);
    ctx.lineTo(x + 14, y + 16);
    ctx.lineTo(x + 10, y - 14);
    ctx.fill();
    // 돋보기 (우측 손)
    if (dir <= 4) {
      ctx.strokeStyle = C.DECO_BRONZE;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + 16, y - 6, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 12, y - 2);
      ctx.lineTo(x + 8, y + 4);
      ctx.stroke();
    }
  }
  ctx.restore();

  // 능력 모드 시각 효과
  if (mode !== 'normal') {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.1 * Math.sin(gt * 5);
    ctx.strokeStyle = mode === 'clairvoyance' ? C.CLUE_GOLD :
                      mode === 'empathy' ? C.SUSPECT_PURPLE : '#FF8844';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(x, y, 30 + 5 * Math.sin(gt * 4), 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// 단서 오브젝트 그리기
function drawClue(ctx, gt, x, y, type, discovered, glow, requiredAbility, playerMode) {
  if (discovered) {
    // 발견된 단서: 골드 글로우
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(gt * 4);
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fillStyle = C.CLUE_GOLD;
    ctx.fill();
    ctx.restore();

    // 아이콘
    ctx.fillStyle = '#FFF';
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(type === 'physical' ? '🔍' : type === 'emotional' ? '💭' : '⏪', x, y + 5);
  } else if (playerMode === requiredAbility) {
    // 올바른 능력 모드에서만 보이는 단서
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(gt * 3);
    ctx.strokeStyle = C.CLUE_GOLD;
    ctx.lineWidth = 2;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 물음표
    ctx.fillStyle = C.CLUE_GOLD;
    ctx.globalAlpha = 0.5;
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('?', x, y + 5);
    ctx.globalAlpha = 1;
  }
  // 능력 미일치 시 보이지 않음
}

// 아르데코 건물 그리기
function drawBuilding(ctx, gt, x, y, w, h, style, timeOfDay) {
  const darkMult = timeOfDay === 'midnight' ? 0.5 : timeOfDay === 'dawn' ? 0.7 : timeOfDay === 'dusk' ? 0.8 : 1;
  ctx.save();

  // 건물 본체
  ctx.fillStyle = `rgba(45,55,72,${darkMult})`;
  ctx.fillRect(x, y, w, h);

  // 아르데코 장식 — 상단 삼각 장식
  ctx.fillStyle = C.DECO_BRONZE;
  ctx.beginPath();
  ctx.moveTo(x + w * 0.3, y);
  ctx.lineTo(x + w * 0.5, y - 15);
  ctx.lineTo(x + w * 0.7, y);
  ctx.fill();

  // 창문 (빛나는)
  const cols = Math.max(2, (w / 30) | 0);
  const rows = Math.max(2, (h / 40) | 0);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const wx = x + 10 + c * ((w - 20) / cols);
      const wy = y + 15 + r * ((h - 20) / rows);
      const lit = rng.next() > 0.4;
      ctx.fillStyle = lit ? `rgba(255,184,0,${0.3 + 0.1 * Math.sin(gt * 2 + c + r)})` : 'rgba(0,0,0,0.3)';
      ctx.fillRect(wx, wy, 10, 14);
      // 창 프레임
      ctx.strokeStyle = 'rgba(196,149,58,0.3)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(wx, wy, 10, 14);
    }
  }

  // 코니스 라인
  ctx.strokeStyle = C.DECO_BRONZE;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 3, y + 2);
  ctx.lineTo(x + w + 3, y + 2);
  ctx.stroke();

  ctx.restore();
}

// 가스등 그리기
function drawGaslamp(ctx, gt, x, y) {
  // 기둥
  ctx.fillStyle = '#555';
  ctx.fillRect(x - 2, y - 30, 4, 30);
  // 등불
  ctx.beginPath();
  ctx.arc(x, y - 35, 6, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,184,0,${0.5 + 0.2 * Math.sin(gt * 3)})`;
  ctx.fill();
  // 광원 글로우
  const grad = ctx.createRadialGradient(x, y - 35, 0, x, y - 35, 50);
  grad.addColorStop(0, 'rgba(255,184,0,0.15)');
  grad.addColorStop(1, 'rgba(255,184,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 50, y - 85, 100, 100);
}

// 용의자 그리기
function drawSuspect(ctx, gt, x, y, emotion, speaking, zoneIdx) {
  const colors = ['#E74C3C','#9B59B6','#F39C12','#7F8C8D','#2C3E50','#1A1A2E'];
  const color = colors[zoneIdx] || colors[0];

  ctx.save();
  if (zoneIdx === 5) {
    // 히든 보스 "그림자 조종자" — 강화된 위협적 실루엣
    ctx.fillStyle = '#1A1A2E';
    // 그림자 오라
    const oraR = 50 + 8 * Math.sin(gt * 2);
    const oraGrad = ctx.createRadialGradient(x, y - 10, 10, x, y - 10, oraR);
    oraGrad.addColorStop(0, 'rgba(155,89,182,0.3)');
    oraGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = oraGrad;
    ctx.fillRect(x - oraR, y - 10 - oraR, oraR * 2, oraR * 2);
    // 몸통 (크고 위협적)
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(x - 25, y - 20, 50, 50);
    // 머리
    ctx.beginPath();
    ctx.arc(x, y - 32, 16, 0, Math.PI * 2);
    ctx.fill();
    // 후드/망토
    ctx.beginPath();
    ctx.moveTo(x - 30, y - 40);
    ctx.lineTo(x, y - 50);
    ctx.lineTo(x + 30, y - 40);
    ctx.lineTo(x + 35, y + 30);
    ctx.lineTo(x - 35, y + 30);
    ctx.closePath();
    ctx.fillStyle = 'rgba(26,26,46,0.9)';
    ctx.fill();
    ctx.strokeStyle = C.SUSPECT_PURPLE;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 빛나는 눈
    ctx.fillStyle = C.DANGER_RED;
    ctx.beginPath();
    ctx.arc(x - 6, y - 34, 3, 0, Math.PI * 2);
    ctx.arc(x + 6, y - 34, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 일반 용의자 — 실루엣 캐릭터
    ctx.fillStyle = color;
    // 머리
    ctx.beginPath();
    ctx.arc(x, y - 28, 12, 0, Math.PI * 2);
    ctx.fill();
    // 몸통
    ctx.fillRect(x - 15, y - 16, 30, 36);
    // 감정 표현
    if (emotion === 'nervous') {
      // 떨림 효과
      const shake = Math.sin(gt * 20) * 2;
      ctx.translate(shake, 0);
    }
    // 눈
    ctx.fillStyle = '#FFF';
    ctx.fillRect(x - 6, y - 32, 4, 3);
    ctx.fillRect(x + 2, y - 32, 4, 3);
    if (emotion === 'angry') {
      // 눈썹 찌푸림
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 36);
      ctx.lineTo(x - 2, y - 34);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 8, y - 36);
      ctx.lineTo(x + 2, y - 34);
      ctx.stroke();
    }
  }

  // 대화 중 말풍선 표시
  if (speaking) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(x - 4, y - 48);
    ctx.lineTo(x + 4, y - 48);
    ctx.lineTo(x, y - 42);
    ctx.fill();
    ctx.fillRect(x - 5, y - 58, 10, 10);
    ctx.fillRect(x - 3, y - 66, 6, 6);
  }
  ctx.restore();
}

// 배경 레이어 (parallax) 그리기
function drawBackground(ctx, gt, zone, timeOfDay, weather, camX, camY, cw, ch) {
  // 하늘 색상 (시간대별)
  const skyColors = {
    dusk: '#1a0a2e', midnight: '#050510', dawn: '#0d1b2a', afternoon: '#0B1426', evening: '#0f0920'
  };
  ctx.fillStyle = skyColors[timeOfDay] || C.BG_DEEP;
  ctx.fillRect(0, 0, cw, ch);

  // 원거리 배경 (별 + 달, 느린 패러랙스)
  drawStarfield(ctx, gt, cw, ch);
  ctx.fillStyle = '#DDE';
  ctx.beginPath();
  ctx.arc(cw * 0.8 - camX * 0.02, ch * 0.15, 25, 0, Math.PI * 2);
  ctx.fill();

  // 중거리 배경 (건물 실루엣, 중간 패러랙스)
  drawCitySilhouette(ctx, gt, cw, ch, camX * 0.3);

  // 날씨 효과
  drawWeather(ctx, gt, weather, cw, ch);
}

// 별하늘 그리기 (폴백)
function drawStarfield(ctx, gt, cw, ch) {
  rng.seed(42); // 고정 시드로 일관된 별
  for (let i = 0; i < 80; i++) {
    const sx = rng.next() * cw;
    const sy = rng.next() * ch * 0.4;
    const brightness = 0.3 + 0.5 * rng.next() + 0.2 * Math.sin(gt * 2 + i);
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  rng.seed(G._rngState || 12345); // 원래 시드 복원
}

// 도시 실루엣 (폴백)
function drawCitySilhouette(ctx, gt, cw, ch, offset) {
  ctx.fillStyle = C.BG_SLATE;
  const baseY = ch * 0.5;
  rng.seed(99);
  for (let i = 0; i < 20; i++) {
    const bx = i * 70 - (offset % 70);
    const bw = 40 + rng.int(0, 30);
    const bh = 60 + rng.int(0, 120);
    ctx.fillRect(bx, baseY - bh, bw, bh + ch);
  }
  rng.seed(G._rngState || 12345);
}

// 날씨 효과 그리기
function drawWeather(ctx, gt, weather, cw, ch) {
  if (!weather || weather === 'clear') return;
  ctx.save();

  if (weather === 'fog') {
    // 안개 — 반투명 레이어
    for (let i = 0; i < 5; i++) {
      const fy = ch * 0.3 + i * 50 + Math.sin(gt * 0.5 + i) * 20;
      const grad = ctx.createLinearGradient(0, fy - 30, 0, fy + 30);
      grad.addColorStop(0, 'rgba(150,170,190,0)');
      grad.addColorStop(0.5, `rgba(150,170,190,${0.08 + 0.03 * Math.sin(gt + i)})`);
      grad.addColorStop(1, 'rgba(150,170,190,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, fy - 30, cw, 60);
    }
  } else if (weather === 'rain') {
    // 비
    ctx.strokeStyle = 'rgba(100,140,200,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 60; i++) {
      const rx = (i * 23 + gt * 200) % cw;
      const ry = (i * 37 + gt * 400) % ch;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - 2, ry + 12);
      ctx.stroke();
    }
  } else if (weather === 'snow') {
    // 눈
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 31 + gt * 20 + Math.sin(gt + i) * 30) % cw;
      const sy = (i * 19 + gt * 40) % ch;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5 + (i % 3), 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (weather === 'dust') {
    // 먼지바람
    ctx.fillStyle = 'rgba(180,150,100,0.05)';
    ctx.fillRect(0, 0, cw, ch);
    for (let i = 0; i < 30; i++) {
      const dx = (i * 41 + gt * 80) % cw;
      const dy = (i * 29 + Math.sin(gt * 2 + i) * 50) % ch;
      ctx.fillStyle = `rgba(180,150,100,${0.2 + 0.1 * Math.sin(gt + i)})`;
      ctx.fillRect(dx, dy, 2, 2);
    }
  } else if (weather === 'ether') {
    // 에테르 입자
    ctx.fillStyle = C.GHOST_CYAN;
    for (let i = 0; i < 25; i++) {
      const ex = (i * 47 + Math.sin(gt * 1.5 + i * 0.7) * 100) % cw;
      const ey = (i * 33 + Math.cos(gt + i) * 80) % ch;
      ctx.globalAlpha = 0.2 + 0.2 * Math.sin(gt * 3 + i);
      ctx.beginPath();
      ctx.arc(ex, ey, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// HUD 그리기 (에테르/신뢰도/영혼 파편)
function drawHUD(ctx, gt, cw, ch, ether, maxEther, credibility, maxCred, soulFrags, abilities, zone, caseNum, score, mode) {
  const lang = getLang();
  const pad = 10;
  const barW = Math.min(160, cw * 0.25);
  const barH = 14;
  const fontSize = Math.max(11, Math.min(14, cw * 0.018));
  ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;

  // 에테르 바 (좌상단)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(pad, pad, barW + 40, barH + 4);
  // 에테르 아이콘 (다이아몬드 + 글로우)
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.beginPath();
  ctx.moveTo(pad + 13, pad - 2);
  ctx.lineTo(pad + 22, pad + 7);
  ctx.lineTo(pad + 13, pad + 16);
  ctx.lineTo(pad + 4, pad + 7);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = C.GHOST_GLOW;
  ctx.lineWidth = 1;
  ctx.stroke();
  // 바 배경
  ctx.fillStyle = 'rgba(0,212,255,0.15)';
  ctx.fillRect(pad + 26, pad + 2, barW, barH);
  // 바 채움
  const etherRatio = ether / maxEther;
  ctx.fillStyle = C.GHOST_CYAN;
  ctx.fillRect(pad + 26, pad + 2, barW * etherRatio, barH);
  // 텍스트
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.textAlign = 'left';
  ctx.fillText(`${lang.ether}: ${ether | 0}/${maxEther}`, pad + 30 + barW, pad + barH);

  // 신뢰도 바 (좌상단 아래)
  const credY = pad + barH + 12;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(pad, credY, barW + 40, barH + 4);
  // 하트 아이콘 (신뢰도)
  ctx.fillStyle = C.CRED_BLUE;
  ctx.beginPath();
  const hx = pad + 13, hy = credY + 5;
  ctx.moveTo(hx, hy + 4);
  ctx.bezierCurveTo(hx - 8, hy - 4, hx - 8, hy - 10, hx, hy - 6);
  ctx.bezierCurveTo(hx + 8, hy - 10, hx + 8, hy - 4, hx, hy + 4);
  ctx.fill();
  ctx.fillStyle = 'rgba(93,173,226,0.15)';
  ctx.fillRect(pad + 26, credY + 2, barW, barH);
  const credRatio = credibility / maxCred;
  ctx.fillStyle = credRatio > 0.5 ? C.CRED_BLUE : credRatio > 0.25 ? C.CLUE_GOLD : C.DANGER_RED;
  ctx.fillRect(pad + 26, credY + 2, barW * credRatio, barH);
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.fillText(`${lang.credibility}: ${credibility | 0}`, pad + 30 + barW, credY + barH);

  // 영혼 파편 (우상단)
  ctx.textAlign = 'right';
  // 영혼 파편 별 아이콘
  drawStarIcon(ctx, cw - pad - 12 - 70, pad + 8, 9, C.CLUE_GOLD);
  ctx.fillStyle = C.CLUE_GOLD;
  ctx.fillText(`${lang.soulFragments}: ${soulFrags}`, cw - pad, pad + 14);

  // 점수 (우상단 아래)
  ctx.fillStyle = C.TEXT_PRIMARY;
  ctx.fillText(`${lang.score}: ${score}`, cw - pad, pad + 32);

  // 능력 모드 표시 (하단 중앙)
  const abilityY = ch - 54;
  const abilityW = Math.max(C.TOUCH_MIN, cw * 0.12);
  const totalW = abilityW * 3 + 20;
  const startX = (cw - totalW) / 2;

  for (let i = 0; i < 3; i++) {
    const ax = startX + i * (abilityW + 10);
    const active = mode === ['clairvoyance', 'empathy', 'rewind'][i];
    const colors = [C.CLUE_GOLD, C.SUSPECT_PURPLE, '#FF8844'];

    ctx.fillStyle = active ? colors[i] : 'rgba(255,255,255,0.1)';
    ctx.globalAlpha = active ? 0.8 : 0.4;
    ctx.fillRect(ax, abilityY, abilityW, abilityW * 0.7);
    ctx.globalAlpha = 1;

    // 테두리
    ctx.strokeStyle = active ? colors[i] : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(ax, abilityY, abilityW, abilityW * 0.7);

    // 번호 + 이름
    ctx.fillStyle = C.TEXT_PRIMARY;
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.max(10, fontSize - 1)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`${i + 1} ${lang.abilities[i]}`, ax + abilityW / 2, abilityY + abilityW * 0.45);

    // 레벨 표시
    const lvl = abilities[['clairvoyance', 'empathy', 'rewind'][i]];
    ctx.font = `${Math.max(9, fontSize - 2)}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(`Lv${lvl}`, ax + abilityW / 2, abilityY + abilityW * 0.65);
  }

  // 구역/사건 정보 (상단 중앙)
  if (zone >= 0 && caseNum >= 0) {
    ctx.textAlign = 'center';
    ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = C.DECO_BRONZE;
    const zName = lang.zoneNames[zone] || '';
    const cName = lang.caseNames[zone] ? (lang.caseNames[zone][caseNum] || '') : '';
    ctx.fillText(`${zName} — ${cName}`, cw / 2, pad + 14);
  }
}

// 이펙트 히트 그리기 (충돌/발견 시)
function drawEffectHit(ctx, gt, x, y, scale, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  {
    // 방사형 버스트
    const rays = 8;
    for (let i = 0; i < rays; i++) {
      const angle = (i / rays) * Math.PI * 2;
      const len = 20 * scale;
      ctx.strokeStyle = i % 2 === 0 ? C.GHOST_CYAN : C.DANGER_RED;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * 5, y + Math.sin(angle) * 5);
      ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// 별 아이콘 그리기 (영혼 파편/uiStar 대체)
function drawStarIcon(ctx, cx, cy, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerAngle = (i * 2 * Math.PI / 5) - Math.PI / 2;
    const innerAngle = outerAngle + Math.PI / 5;
    const ox = cx + Math.cos(outerAngle) * r;
    const oy = cy + Math.sin(outerAngle) * r;
    const ix = cx + Math.cos(innerAngle) * (r * 0.4);
    const iy = cy + Math.sin(innerAngle) * (r * 0.4);
    if (i === 0) ctx.moveTo(ox, oy);
    else ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
}

// 아르데코 프레임 그리기 (UI 패널용)
function drawDecoFrame(ctx, x, y, w, h, title) {
  ctx.save();
  // 배경
  ctx.fillStyle = 'rgba(11,20,38,0.92)';
  ctx.fillRect(x, y, w, h);

  // 테두리
  ctx.strokeStyle = C.DECO_BRONZE;
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 3, y + 3, w - 6, h - 6);
  ctx.strokeRect(x + 6, y + 6, w - 12, h - 12);

  // 코너 장식 (아르데코)
  const cs = 12;
  const corners = [[x + 8, y + 8], [x + w - 8, y + 8], [x + 8, y + h - 8], [x + w - 8, y + h - 8]];
  ctx.fillStyle = C.DECO_BRONZE;
  for (const [cx, cy] of corners) {
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // 타이틀
  if (title) {
    ctx.fillStyle = C.BG_DEEP;
    const tw = ctx.measureText(title).width + 20;
    ctx.fillRect(x + (w - tw) / 2, y - 2, tw, 18);
    ctx.fillStyle = C.DECO_BRONZE;
    ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, x + w / 2, y + 12);
  }
  ctx.restore();
}

// 파티클 시스템
const particles = [];

// 파티클 생성
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = rng.next() * Math.PI * 2;
    const spd = speed * (0.5 + rng.next());
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life * (0.5 + rng.next() * 0.5),
      maxLife: life,
      color,
      size: 2 + rng.next() * 3
    });
  }
}

// 파티클 갱신
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// 파티클 렌더링
function drawParticles(ctx) {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════
// REGION 5: ABILITY — 유령 능력 시스템
// ═══════════════════════════════════════════════════════════════

// 능력 사용 가능 여부 체크
function canUseAbility(abilityKey, ether, cooldowns, abilityIdx) {
  if (ether < C.ABILITY_COST[abilityKey]) return false;
  if (cooldowns[abilityIdx] > 0) return false;
  return true;
}

// 투시 능력 사용
function useClairvoyance(lucian, ether, abilityLv, map) {
  const cost = C.ABILITY_COST.clairvoyance;
  if (ether < cost) return { ether, revealed: [] };
  const range = 100 + abilityLv * 50;
  const revealed = [];
  for (const clue of map.clues) {
    if (clue.discovered) continue;
    if (clue.requiredAbility !== 'clairvoyance') continue;
    if (clue.requiredLv > abilityLv) continue;
    const dist = Math.hypot(clue.x - lucian.x, clue.y - lucian.y);
    if (dist < range) {
      revealed.push(clue);
    }
  }
  return { ether: ether - cost, revealed };
}

// 감응 능력 사용
function useEmpathy(lucian, ether, abilityLv, map) {
  const cost = C.ABILITY_COST.empathy;
  if (ether < cost) return { ether, revealed: [] };
  const range = 80 + abilityLv * 40;
  const revealed = [];
  for (const clue of map.clues) {
    if (clue.discovered) continue;
    if (clue.requiredAbility !== 'empathy') continue;
    if (clue.requiredLv > abilityLv) continue;
    const dist = Math.hypot(clue.x - lucian.x, clue.y - lucian.y);
    if (dist < range) {
      revealed.push(clue);
    }
  }
  return { ether: ether - cost, revealed };
}

// 시간역행 능력 사용
function useRewind(lucian, ether, abilityLv, map) {
  const cost = C.ABILITY_COST.rewind;
  if (ether < cost) return { ether, revealed: [] };
  const range = 60 + abilityLv * 35;
  const revealed = [];
  for (const clue of map.clues) {
    if (clue.discovered) continue;
    if (clue.requiredAbility !== 'rewind') continue;
    if (clue.requiredLv > abilityLv) continue;
    const dist = Math.hypot(clue.x - lucian.x, clue.y - lucian.y);
    if (dist < range) {
      revealed.push(clue);
    }
  }
  return { ether: ether - cost, revealed };
}

// 능력 사용 통합 함수
function useAbility(abilityIdx, lucian, G, map) {
  const keys = ['clairvoyance', 'empathy', 'rewind'];
  const key = keys[abilityIdx];
  if (!canUseAbility(key, G.ether, lucian.abilityCooldown, abilityIdx)) return false;

  const lv = G.abilities[key];
  let result;
  switch(abilityIdx) {
    case 0: result = useClairvoyance(lucian, G.ether, lv, map); break;
    case 1: result = useEmpathy(lucian, G.ether, lv, map); break;
    case 2: result = useRewind(lucian, G.ether, lv, map); break;
  }

  G.ether = result.ether;
  lucian.mode = key;
  lucian.abilityTimer = 3; // 3초간 능력 모드 유지

  // 쿨다운 설정
  const baseCooldown = 2 + abilityIdx;
  const cooldownMult = G.currentZone === 2 ? C.ENV_HAZARD.mansion.cooldownMult : 1;
  // 시간역행 Lv3+ 쿨다운 감소
  const rewindReduction = (key === 'rewind' && lv >= 3) ? 0.7 : 1;
  lucian.abilityCooldown[abilityIdx] = baseCooldown * cooldownMult * rewindReduction;

  // 발견된 단서 처리
  for (const clue of result.revealed) {
    clue.discovered = true;
    if (!G.discoveredClues[clue.id]) {
      G.discoveredClues[clue.id] = true;
      G.evidence.push(clue);
      G.archivePoints++;
      spawnParticles(clue.x, clue.y, 12, C.CLUE_GOLD, 60, 0.8);
      snd.playSfx('clue_found');
    }
  }

  snd.playSfx('ability_use');
  spawnParticles(lucian.x, lucian.y, 8,
    abilityIdx === 0 ? C.CLUE_GOLD : abilityIdx === 1 ? C.SUSPECT_PURPLE : '#FF8844',
    40, 0.6);

  return true;
}

// ═══════════════════════════════════════════════════════════════
// REGION 6: PUZZLE — 증거 조합 퍼즐 로직
// ═══════════════════════════════════════════════════════════════

// 유효 추리 체인 목록 가져오기 (사건별 정의)
function getValidChains(zoneIdx, caseIdx) {
  // 각 사건에 최소 2가지 유효 체인 정의
  // 체인은 단서 인덱스 배열 (필수 단서 0,1,2 + 선택 opt0, opt1)
  const chains = [];
  // 기본 체인: 필수 단서 3개 순서대로
  chains.push([0, 1, 2]);
  // 대체 체인: 필수 2개 + 선택 1개 (역순 또는 다른 조합)
  chains.push([2, 0, 1]);
  if (caseIdx === 2) {
    // 구역 보스 사건은 추가 체인
    chains.push([1, 2, 0]);
  }
  return chains;
}

// 추리 체인 검증
function checkChain(slots, validChains) {
  if (slots.length < 3) return { valid: false, reason: 'insufficient' };
  // 슬롯의 단서 인덱스 추출
  const slotIndices = slots.map(s => s ? s.slotIdx : -1);
  if (slotIndices.includes(-1)) return { valid: false, reason: 'empty_slot' };

  for (const chain of validChains) {
    let match = true;
    for (let i = 0; i < chain.length; i++) {
      if (slotIndices[i] !== chain[i]) { match = false; break; }
    }
    if (match) return { valid: true, chain };
  }

  return { valid: false, reason: 'wrong_order' };
}

// 추리 결과 평가
function evaluateDeduction(G, zoneIdx, caseIdx, usedHints) {
  const timeSpent = G.caseTimer;
  const totalClues = G.currentMap ? G.currentMap.clues.length : 3;
  const foundClues = G.evidence.filter(e => e.id && e.id.startsWith(`z${zoneIdx}c${caseIdx}`)).length;

  // 점수 계산 §11.1 [F8: 판정 먼저, 저장 나중에]
  const baseScore = C.BASE_SCORE_MULT * (zoneIdx + 1);
  const diffKey = ['easy', 'medium', 'hard'][G.difficulty];
  const timeLimit = C.CASE_TIME[diffKey];
  const timeBonus = Math.max(0, (timeLimit - timeSpent) * C.TIME_BONUS_MULT);
  const maxCred = C.CREDIBILITY[diffKey];
  const accuracyBonus = (G.credibility / maxCred) * C.ACCURACY_BONUS;
  const exploreBonus = (foundClues / totalClues) * C.EXPLORE_BONUS;
  const rawScore = (baseScore + timeBonus + accuracyBonus + exploreBonus) | 0;

  // 랭크 판정
  let rank = 3; // C
  if (G.confrontWrongs === 0 && foundClues >= totalClues && timeSpent < timeLimit * 0.5) rank = 0; // S
  else if (G.confrontWrongs <= 1 && foundClues >= 3) rank = 1; // A
  else if (G.credibility >= maxCred * 0.5) rank = 2; // B

  const rankMult = [2.0, 1.5, 1.0, 0.7][rank];
  const finalScore = (rawScore * rankMult) | 0;

  return { rawScore, finalScore, rank, rankMult, timeBonus: timeBonus | 0, accuracyBonus: accuracyBonus | 0, exploreBonus: exploreBonus | 0 };
}

// ═══════════════════════════════════════════════════════════════

// 대질 시작
function startConfrontation(G, zoneIdx) {
  G.confrontRound = 0;
  G.confrontMaxRounds = zoneIdx === 5 ? C.CONFRONT_ROUNDS.hidden :
                        (G.currentCase === 2) ? C.CONFRONT_ROUNDS.boss : C.CONFRONT_ROUNDS.normal;
  G.confrontWrongs = 0;
  G.confrontPhase = 'testimony'; // testimony → select → present → result
  G.confrontSuspect = createSuspect(zoneIdx);
  G.confrontCorrectEvIdx = G.confrontRound % G.evidence.length;
  G.bossRewardGiven = false;
}

// 증거 제시 판정
function presentEvidence(G, evidenceIdx) {
  const correctIdx = G.confrontCorrectEvIdx;
  if (evidenceIdx === correctIdx) {
    // 정답
    G.confrontRound++;
    G.confrontSuspect.emotion = G.confrontRound >= G.confrontMaxRounds ? 'confessing' : 'nervous';
    G.confrontPhase = 'result_correct';
    snd.playSfx('correct');
    spawnParticles(G._cw / 2, G._ch / 2, 15, C.SUCCESS_GREEN, 80, 0.8);
    return true;
  } else {
    // 오답
    G.confrontWrongs++;
    const penalty = (evidenceIdx === -1) ? C.WRONG_PENALTY.critical : C.WRONG_PENALTY.normal;
    const ddaPenalty = G.ddaLevel < 0 ? penalty * C.DDA_PENALTY_REDUCTION : penalty;
    G.credibility -= ddaPenalty;
    G.confrontSuspect.emotion = 'angry';
    G.confrontPhase = 'result_wrong';
    snd.playSfx('wrong');
    G.screenShake = 0.3;
    return false;
  }
}

// 대질 증언 텍스트 가져오기
function getBossDialogue(zoneIdx, round, langKey) {
  const lang = LANG[langKey] || LANG.ko;
  const dialogues = lang.confrontDialogue[zoneIdx];
  if (!dialogues) return '...';
  return dialogues[round % dialogues.length] || '...';
}

// 대질 모순 탐지 (올바른 증거 인덱스 계산)
function checkContradiction(G, round) {
  // 라운드별로 올바른 증거가 다름 — 필수 단서 중 해당 라운드에 맞는 것
  const essentialEvidence = G.evidence.filter(e => e.essential);
  if (essentialEvidence.length === 0) return 0;
  return G.evidence.indexOf(essentialEvidence[round % essentialEvidence.length]);
}

// 상태 진입 시 초기화
function onStateEnter(state) {
  switch(state) {
    case STATES.TITLE:
      G.titlePhase = 0;
      snd.startBgm('title');
      break;
    case STATES.ZONE_MAP:
      snd.startBgm('map');
      break;
    case STATES.CASE_BRIEFING:
      G.briefTimer = 0;
      break;
    case STATES.EXPLORATION:
      initExploration();
      snd.startBgm('zone');
      break;
    case STATES.PUZZLE_BOARD:
      initPuzzleBoard();
      snd.startBgm('puzzle');
      break;
    case STATES.CONFRONTATION_INTRO:
      G.introTimer = 0;
      snd.playSfx('boss_appear');
      snd.startBgm('boss');
      tw.delay(2.0, () => {
        if (G.state === STATES.CONFRONTATION_INTRO) {
          beginTransition(STATES.CONFRONTATION, 'dramatic', 1.0);
        }
      });
      break;
    case STATES.CONFRONTATION:
      startConfrontation(G, G.currentZone);
      break;
    case STATES.BOSS_REWARD:
      if (!G.bossRewardGiven) {
        G.bossRewardGiven = true; // [F17] 1회 보장
        G.soulFragments += 3;
        // 도구 해금
        const toolIdx = G.currentZone;
        if (toolIdx < G.toolsUnlocked.length) G.toolsUnlocked[toolIdx] = true;
      }
      snd.startBgm('upgrade');
      break;
    case STATES.CASE_SOLVED:
      G.caseSolvedTimer = 0;
      // 점수 계산 [F8: 판정 먼저, 저장 나중에]
      G.lastResult = evaluateDeduction(G, G.currentZone, G.currentCase, G.hintsUsed);
      G.totalScore += G.lastResult.finalScore;
      // 사건 완료 기록
      const caseKey = `z${G.currentZone}c${G.currentCase}`;
      G.solvedCases[caseKey] = { rank: G.lastResult.rank, score: G.lastResult.finalScore };
      // DDA 갱신
      if (G.lastResult.rank <= 1) G.ddaStreak++;
      else G.ddaStreak = 0;
      if (G.ddaStreak >= C.DDA_STREAK_THRESHOLD) G.ddaLevel++;
      // 저장 (판정 후) [F8]
      saveProgress();
      snd.playSfx('chain_complete');
      tw.delay(3.0, () => {
        if (G.state === STATES.CASE_SOLVED) {
          // 구역 보스 사건이었으면 업그레이드로, 아니면 존맵으로
          if (G.currentCase === 2 || (G.currentZone === 5 && G.currentCase === 0)) {
            beginTransition(STATES.BOSS_REWARD, 'fade');
          } else {
            beginTransition(STATES.ZONE_MAP, 'fade');
          }
        }
      });
      break;
    case STATES.UPGRADE_MENU:
      snd.startBgm('upgrade');
      break;
    case STATES.GAME_COMPLETE:
      G.completeTimer = 0;
      snd.startBgm('ending');
      break;
    case STATES.GAME_OVER:
      G.screenShake = 0.5;
      snd.stopBgm();
      break;
    case STATES.PAUSE:
      snd.stopBgm();
      break;
    case STATES.CREDITS:
      G.creditsScroll = 0;
      break;
  }
}

const SAVE_KEY = 'spectral_sleuth_save';
const HIGH_KEY = 'spectral_sleuth_high';

// 진행 상태 저장
function saveProgress() {
  try {
    const data = {
      zone: G.currentZone,
      caseNum: G.currentCase,
      abilities: G.abilities,
      upgrades: G.upgrades,
      soulFragments: G.soulFragments,
      solvedCases: G.solvedCases,
      toolsUnlocked: G.toolsUnlocked,
      totalScore: G.totalScore,
      difficulty: G.difficulty,
      ddaLevel: G.ddaLevel,
      lang: G.settings.lang
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));

    // 최고 점수 갱신 [F8: 판정 먼저, 저장 나중에]
    const prev = parseInt(localStorage.getItem(HIGH_KEY)) || 0;
    if (G.totalScore > prev) {
      localStorage.setItem(HIGH_KEY, G.totalScore.toString());
    }
  } catch(e) { /* localStorage 불가 시 무시 */ }
}

// 진행 상태 불러오기
function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    G.currentZone = data.zone || 0;
    G.currentCase = data.caseNum || 0;
    G.abilities = data.abilities || { clairvoyance: 1, empathy: 1, rewind: 1 };
    G.upgrades = data.upgrades || { clairvoyance: 0, empathy: 0, rewind: 0 };
    G.soulFragments = data.soulFragments || 0;
    G.solvedCases = data.solvedCases || {};
    G.toolsUnlocked = data.toolsUnlocked || [true, false, false, false, false, false, false, false];
    G.totalScore = data.totalScore || 0;
    G.difficulty = data.difficulty || 1;
    G.ddaLevel = data.ddaLevel || 0;
    G.settings.lang = data.lang || 'ko';
    return true;
  } catch(e) { return false; }
}

// 최고 점수 가져오기
function getHighScore() {
  try { return parseInt(localStorage.getItem(HIGH_KEY)) || 0; } catch(e) { return 0; }
}

// 진행 초기화
function resetProgress() {
  try {
    localStorage.removeItem(SAVE_KEY);
    localStorage.removeItem(HIGH_KEY);
  } catch(e) {}
}
