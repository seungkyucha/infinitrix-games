  }

  // Purchase button (if available)
  if (currentLv < tree.length) {
    const upg = tree[currentLv];
    const btnW2 = Math.max(48, 160);
    const btnH2 = Math.max(48, 44);
    const btnY = panelY + panelH - 70;
    const canBuy = G.relicShards >= upg.cost;

    ctx.fillStyle = canBuy ? 'rgba(241,196,15,0.3)' : 'rgba(80,80,80,0.3)';
    ctx.strokeStyle = canBuy ? '#f1c40f' : '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(panelX + panelW/2 - btnW2/2, btnY, btnW2, btnH2, 8);
    ctx.fill(); ctx.stroke();
    UI.text(ctx, canBuy ? `${t('upgrade')} (${upg.cost} ${t('relics')})` : t('not_enough'),
      panelX + panelW/2, btnY + btnH2/2, {
        size: 14, color: canBuy ? '#f1c40f' : '#555', bold: canBuy
      });
  } else {
    UI.text(ctx, t('max_level'), panelX + panelW/2, panelY + panelH - 50, {
      size: 16, color: '#f1c40f', bold: true
    });
  }
}

function renderPlay(ctx, w, h) {
  // Camera offset + shake
  const shakeOfs = G.camShake > 0 ? UI.shake(G.camShake) : { x: 0, y: 0 };
  const cx = G.camX + shakeOfs.x;
  const cy = G.camY + shakeOfs.y;

  // Background (not affected by camera much)
  drawBackground(ctx, w, h, cx, cy, G.currentBiome);

  // World-space rendering
  ctx.save();
  ctx.translate(-cx, -cy);

  // Anchors
  const nearestAnchor = G.pAttached ? G.pAnchorIdx : findNearestAnchor(G.px, G.py, G.anchors, MAX_SWING_REACH);
  for (let i = 0; i < G.anchors.length; i++) {
    const a = G.anchors[i];
    if (a.broken) continue;
    // Frustum culling
    if (a.x < cx - 50 || a.x > cx + w + 50 || a.y < cy - 50 || a.y > cy + h + 50) continue;
    drawAnchor(ctx, a.x, a.y, i === nearestAnchor);
  }

  // Vine rope
  if (G.pAttached && G.pAnchorIdx >= 0) {
    const a = G.anchors[G.pAnchorIdx];
    drawVine(ctx, a.x, a.y, G.px, G.py, 3, G.stageTimer);
  }

  // Hazards
  drawHazards(ctx);

  // Items
  for (const it of G.items) {
    if (it.collected) continue;
    if (it.x < cx - 30 || it.x > cx + w + 30 || it.y < cy - 30 || it.y > cy + h + 30) continue;
    drawItem(ctx, it.x, it.y, it);
  }

  // Enemies
  for (const e of G.enemies) {
    if (e.dead) continue;
    if (e.x < cx - 60 || e.x > cx + w + 60 || e.y < cy - 60 || e.y > cy + h + 60) continue;
    drawEnemy(ctx, e.x, e.y, e);
  }

  // Player
  drawPlayer(ctx, G.px, G.py, G.pSize, G.pFacing, G.pSwinging, G.pDashing, G.pInvTimer);

  // Dash trail effect
  if (G.pDashing) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#2ecc71';
    for (let i = 1; i <= 3; i++) {
      const tx = G.px - G.pDashDirX * DASH_SPEED * 0.02 * i;
      const ty = G.py - G.pDashDirY * DASH_SPEED * 0.02 * i;
      ctx.globalAlpha = 0.3 - i * 0.08;
      ctx.beginPath();
      ctx.arc(tx, ty, G.pSize * (0.4 - i * 0.08), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Exit portal
  drawExit(ctx, G.exitX, G.exitY);

  // Particles (world space)
  particles.render(ctx);

  ctx.restore();

  // HUD (screen space)
  drawHUD(ctx, w, h);

  // Tutorial overlay
  if (G.tutorialStep > 0) {
    renderTutorial(ctx, w, h);
  }

  // Sub-state overlays
  if (G.sub === SUB.PAUSED) {
    renderPauseOverlay(ctx, w, h);
  } else if (G.sub === SUB.GAMEOVER) {
    renderGameOverOverlay(ctx, w, h);
  } else if (G.sub === SUB.CLEAR) {
    renderClearOverlay(ctx, w, h);
  }
}

function renderBossStage(ctx, w, h) {
  const shakeOfs = G.camShake > 0 ? UI.shake(G.camShake) : { x: 0, y: 0 };
  const cx = G.camX + shakeOfs.x;
  const cy = G.camY + shakeOfs.y;

  // Boss arena background
  const biomeIdx = G.bossIdx >= 0 ? BOSS_DEFS[G.bossIdx].biome : 0;
  drawBackground(ctx, w, h, cx, cy, biomeIdx);

  // Darker overlay for boss arena
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(-cx, -cy);

  // Anchors
  const nearestAnchor = G.pAttached ? G.pAnchorIdx : findNearestAnchor(G.px, G.py, G.anchors, MAX_SWING_REACH);
  for (let i = 0; i < G.anchors.length; i++) {
    const a = G.anchors[i];
    if (a.broken) continue;
    drawAnchor(ctx, a.x, a.y, i === nearestAnchor);
  }

  // Vine rope
  if (G.pAttached && G.pAnchorIdx >= 0) {
    const a = G.anchors[G.pAnchorIdx];
    drawVine(ctx, a.x, a.y, G.px, G.py, 3, G.stageTimer);
  }

  // Boss
  if (G.bossIdx >= 0 && G.bossHp > 0) {
    drawBoss(ctx, G.bossX, G.bossY);
    drawBossAttacks(ctx);
  }

  // Player
  drawPlayer(ctx, G.px, G.py, G.pSize, G.pFacing, G.pSwinging, G.pDashing, G.pInvTimer);

  // Particles
  particles.render(ctx);

  ctx.restore();

  // HUD
  drawHUD(ctx, w, h);

  // Boss intro overlay
  if (G.sub === SUB.BOSS_INTRO) {
    renderBossIntro(ctx, w, h);
  } else if (G.sub === SUB.PAUSED) {
    renderPauseOverlay(ctx, w, h);
  } else if (G.sub === SUB.GAMEOVER) {
    renderGameOverOverlay(ctx, w, h);
  } else if (G.sub === SUB.CLEAR) {
    renderBossClearOverlay(ctx, w, h);
  }
}

function renderTutorial(ctx, w, h) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, h * 0.75, w, h * 0.25);

  const text = G.tutorialStep === 1 ? t('tutorial_grab') :
               G.tutorialStep === 2 ? t('tutorial_release') :
               t('tutorial_dash');

  UI.text(ctx, text, w / 2, h * 0.85, {
    size: 18, color: '#f1c40f', bold: true, shadow: true
  });
  ctx.restore();
}

function renderPauseOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('pause'), w / 2, h * 0.35, {
    size: 32, color: '#ecf0f1', bold: true, glow: '#6c3cf7'
  });

  // Resume button
  const btnW = Math.max(48, 160);
  const btnH = Math.max(48, 48);
  UI.button(ctx, t('resume'), w/2 - btnW/2, h/2 - 30, btnW, btnH, { color: '#2ecc71' });

  // Quit button
  UI.button(ctx, t('quit'), w/2 - btnW/2, h/2 + 30, btnW, btnH, { color: '#e74c3c' });
}

function renderGameOverOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(10,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('game_over'), w / 2, h * 0.3, {
    size: 36, color: '#e74c3c', bold: true, glow: '#e74c3c'
  });

  UI.text(ctx, `${t('score')}: ${Math.floor(G.stageScore)}`, w / 2, h * 0.45, {
    size: 22, color: '#f1c40f', bold: true
  });

  UI.text(ctx, `${t('relics')}: +${G.relicsCollected}  ${t('coins')}: +${G.coinsCollected}`, w / 2, h * 0.55, {
    size: 16, color: '#8080a0'
  });

  const blink = Math.sin(G.titleTimer * 3) > 0;
  if (blink) {
    UI.text(ctx, t('restart'), w / 2, h * 0.7, {
      size: 16, color: '#ecf0f1'
    });
  }
}

function renderClearOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,10,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('stage_clear'), w / 2, h * 0.25, {
    size: 36, color: '#2ecc71', bold: true, glow: '#2ecc71'
  });

  // Score breakdown
  const cy = h * 0.4;
  UI.text(ctx, `${t('score')}: ${Math.floor(G.stageScore)}`, w / 2, cy, {
    size: 24, color: '#f1c40f', bold: true
  });

  const timeBonus = SCORE_CFG.TIME_BONUS(G.stageTimer);
  UI.text(ctx, `${t('time_bonus')}: +${Math.floor(timeBonus)}`, w / 2, cy + 30, {
    size: 14, color: '#3498db'
  });

  if (G.hitsTaken === 0) {
    UI.text(ctx, `${t('no_hit')}: +${SCORE_CFG.NO_HIT_BONUS}`, w / 2, cy + 50, {
      size: 14, color: '#f1c40f', glow: '#f1c40f'
    });
  }

  UI.text(ctx, `${t('relics')}: +${G.relicsCollected}`, w / 2, cy + 75, {
    size: 14, color: '#2ecc71'
  });

  // High score check
  const stageKey = `${G.currentBiome}-${G.currentStage}`;
  const best = G.bestScores[stageKey] || 0;
  if (G.stageScore >= best && best > 0) {
    UI.text(ctx, t('new_best'), w / 2, cy + 100, {
      size: 20, color: '#f1c40f', bold: true, glow: '#f1c40f'
    });
  }

  const blink = Math.sin(G.titleTimer * 3) > 0;
  if (blink) {
    UI.text(ctx, t('back_map'), w / 2, h * 0.8, { size: 16, color: '#ecf0f1' });
  }
}

function renderBossIntro(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, h);

  const def = BOSS_DEFS[G.bossIdx];
  if (!def) return;

  const bossName = currentLang === 'ko' ? def.name_ko : def.name_en;

  // Boss name with dramatic styling
  UI.text(ctx, bossName, w / 2, h * 0.4, {
    size: 36, color: def.color, bold: true, glow: def.color
  });

  // Boss sprite preview
  if (assets.sprites[def.assetKey]) {
    const sz = 80;
    ctx.drawImage(assets.sprites[def.assetKey], w/2 - sz, h*0.5, sz*2, sz*2);
  }
}

function renderBossClearOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,10,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('boss_defeated'), w / 2, h * 0.3, {
    size: 36, color: '#f1c40f', bold: true, glow: '#f1c40f'
  });

  const def = BOSS_DEFS[G.bossIdx];
  if (def) {
    UI.text(ctx, `+${def.reward.relics} ${t('relics')}`, w / 2, h * 0.45, {
      size: 20, color: '#2ecc71', bold: true
    });
    UI.text(ctx, `+${def.reward.score} ${t('score')}`, w / 2, h * 0.52, {
      size: 16, color: '#f1c40f'
    });
  }

  const blink = Math.sin(G.titleTimer * 3) > 0;
  if (blink) {
    UI.text(ctx, t('back_map'), w / 2, h * 0.7, { size: 16, color: '#ecf0f1' });
  }
}

// ═══════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════

async function init() {
  // Load assets from manifest (F1/F22)
  await loadAssets();

  // Load saved progress
  loadProgress();

  // Apply max HP upgrade
  G.pMaxHp = 3 + (G.upgrades.survival >= 1 ? 1 : 0);
  G.pHp = G.pMaxHp;

  // Start engine
  engine.start();
}

init();

</script>
