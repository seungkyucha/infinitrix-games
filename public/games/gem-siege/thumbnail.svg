<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4466"/>
      <stop offset="100%" stop-color="#cc1133"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44aaff"/>
      <stop offset="100%" stop-color="#1155cc"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#11aa44"/>
    </linearGradient>
    <linearGradient id="topaz" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#cc8811"/>
    </linearGradient>
    <linearGradient id="amethyst" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc66ff"/>
      <stop offset="100%" stop-color="#8833bb"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec80"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="85" cy="50" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="18" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="250" cy="35" r="1.3" fill="#fff" opacity="0.7"/>
  <circle cx="320" cy="20" r="0.9" fill="#fff" opacity="0.4"/>
  <circle cx="370" cy="55" r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="55" cy="80" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="345" cy="85" r="1" fill="#fff" opacity="0.6"/>

  <!-- Dark castle silhouette background -->
  <path d="M0 280 L0 200 L20 200 L20 180 L30 180 L30 200 L60 200 L60 170 L70 155 L80 170 L80 200 L100 200 L100 190 L110 190 L110 200 L130 200 L130 280Z" fill="#0a0415" opacity="0.6"/>
  <path d="M270 280 L270 195 L285 195 L285 175 L295 175 L295 195 L320 195 L320 160 L330 145 L340 160 L340 195 L360 195 L360 185 L370 185 L370 195 L400 195 L400 280Z" fill="#0a0415" opacity="0.6"/>

  <!-- Grid background (subtle) -->
  <rect x="110" y="100" width="180" height="160" rx="8" fill="#150a28" stroke="#2a1545" stroke-width="1.5" opacity="0.8"/>

  <!-- Gem grid (3x3 visible portion) -->
  <!-- Row 1 -->
  <g transform="translate(130, 115)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#ruby)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(180, 115)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#sapphire)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(230, 115)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#emerald)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Row 2 -->
  <g transform="translate(130, 160)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#topaz)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(180, 160)">
    <!-- Rainbow/special gem -->
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#amethyst)" filter="url(#glow)"/>
    <circle cx="20" cy="19" r="8" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <path d="M14 19 L20 13 L26 19 L20 25Z" fill="#fff" opacity="0.4"/>
  </g>
  <g transform="translate(230, 160)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#ruby)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Row 3 -->
  <g transform="translate(130, 205)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#emerald)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(180, 205)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#topaz)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(230, 205)">
    <polygon points="20,0 40,15 35,38 5,38 0,15" fill="url(#sapphire)" filter="url(#glow)"/>
    <polygon points="20,5 35,16 31,34 9,34 5,16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Swap arrow indicator -->
  <g transform="translate(175, 140)" opacity="0.8">
    <path d="M0 5 L12 0 L12 3 L28 3 L28 0 L40 5 L28 10 L28 7 L12 7 L12 10Z" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Boss silhouette (dragon) at top -->
  <g transform="translate(155, 30)" filter="url(#shadow)">
    <path d="M45 60 C45 40 30 25 35 10 C37 5 42 2 45 8 C48 2 53 5 55 10 C60 25 45 40 45 60Z" fill="#8b0000" opacity="0.9"/>
    <path d="M30 55 C20 45 15 50 10 45 L25 40 C28 45 30 50 30 55Z" fill="#8b0000" opacity="0.7"/>
    <path d="M60 55 C70 45 75 50 80 45 L65 40 C62 45 60 50 60 55Z" fill="#8b0000" opacity="0.7"/>
    <circle cx="39" cy="35" r="3" fill="#ff4444" opacity="0.9"/>
    <circle cx="51" cy="35" r="3" fill="#ff4444" opacity="0.9"/>
    <circle cx="39" cy="34" r="1.2" fill="#fff"/>
    <circle cx="51" cy="34" r="1.2" fill="#fff"/>
  </g>

  <!-- Boss HP bar -->
  <rect x="120" y="85" width="160" height="10" rx="5" fill="#333" opacity="0.7"/>
  <rect x="120" y="85" width="100" height="10" rx="5" fill="#cc2222"/>
  <rect x="120" y="85" width="100" height="5" rx="3" fill="#ff4444" opacity="0.4"/>
  <text x="200" y="93" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">BOSS HP</text>

  <!-- Sparkle effects -->
  <g filter="url(#glow)">
    <circle cx="115" cy="120" r="2" fill="#ffd700" opacity="0.8"/>
    <circle cx="280" cy="150" r="2.5" fill="#44aaff" opacity="0.7"/>
    <circle cx="125" cy="245" r="1.8" fill="#44ff88" opacity="0.6"/>
    <circle cx="275" cy="210" r="2" fill="#cc66ff" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="200" y="278" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" filter="url(#shadow)">GEM SIEGE</text>
  <text x="200" y="295" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle" letter-spacing="2">젬 시즈</text>
</svg>