// ─── SeededRNG (Math.random() 0건 정책) ───

function seedRng(s) { rngSeed = s; }

function rngInt(min, max) { return Math.floor(min + rng() * (max - min + 1)); }

// ─── 별 평가 ───
function calcStars(lvIdx, remainTurns) {
  const isBoss = LEVEL_DEFS[lvIdx].boss !== undefined;
  if (isBoss) { return remainTurns >= 8 ? 3 : remainTurns >= 5 ? 2 : 1; }
  return remainTurns >= 6 ? 3 : remainTurns >= 3 ? 2 : 1;
}

// ─── 점수 테이블 ───
const SCORE_TABLE = { match3:50, match4:150, match5:500, matchTL:300, specialLine:200, specialBomb:300, specialRainbow:500, obstacleBreak:100 };

// ═══════════════════════════════════════════════════════════

const engine = new Engine('gameCanvas', {

  render(ctx, w, h, dt) { if (_ready) render(ctx, w, h, dt); },

});

const tween = new Tween();
const particles = new Particles(600);

let gScore = 0;
let gComboCount = 0;
let gGrid = []; // [row][col] = {type, special, obstacle, iceHp, crateHp, chain, poison, lockColor, teleporterId}

// ─── DDA ───
const gDDA = {
  failStreak:0, bossHpReduction:0, bossCounterDelay:0, extraTurns:0,

};

// ─── 레이아웃 (계산) ───
let gCellSize = 50, gGridX = 0, gGridY = 0, gW = 0, gH = 0;

// ─── 진행 저장 ───
let gLevelStars = []; // [0..19] = 0~3
let gBossDefeated = []; // [0..4] = bool

let gTeleporters = []; // [{r1,c1,r2,c2}]

// ═══════════════════════════════════════════════════════════
// SAVE/LOAD
// ═══════════════════════════════════════════════════════════
function loadProgress() {
  gLevelStars = Save.get(`${GAME_ID}_stars`, new Array(20).fill(0));
  gBossDefeated = Save.get(`${GAME_ID}_bossDef`, new Array(5).fill(false));
  gMaxUnlocked = Save.get(`${GAME_ID}_maxLv`, 0);
  gBoosters = Save.get(`${GAME_ID}_boosters`, { shuffle:1, colorBomb:1, lineClear:0, shield:0 });
}
function saveProgress() {
  Save.set(`${GAME_ID}_stars`, gLevelStars);
  Save.set(`${GAME_ID}_bossDef`, gBossDefeated);
  Save.set(`${GAME_ID}_maxLv`, gMaxUnlocked);
  Save.set(`${GAME_ID}_boosters`, gBoosters);
}

// ═══════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════
function onResize(w, h) {
  gW = w; gH = h;
  recalcLayout();
}

function recalcLayout() {
  const w = gW || engine.W, h = gH || engine.H;
  const topMargin = 90; // for HUD
  const botMargin = 70; // for boosters
  const availH = h - topMargin - botMargin;
  const availW = w - 20;
  gCellSize = Math.floor(Math.min(availW / GRID_COLS, availH / GRID_ROWS));
  gCellSize = MathUtil.clamp(gCellSize, 28, 80);
  const gridW = gCellSize * GRID_COLS;
  const gridH = gCellSize * GRID_ROWS;
  gGridX = Math.floor((w - gridW) / 2);
  gGridY = Math.floor(topMargin + (availH - gridH) / 2);
}

function touchSafe(size) { return Math.max(MIN_TOUCH, size); }

// ═══════════════════════════════════════════════════════════
// STATE TRANSITION (F2 해결 — state= 직접 할당 0건)
// ═══════════════════════════════════════════════════════════
function beginTransition(to) {
  const fromName = STATE_NAMES[gState];
  const toName = STATE_NAMES[to];
  if (!TRANSITION_TABLE[fromName]?.includes(toName)) {
    console.warn(`[Transition] Invalid: ${fromName} → ${toName}`);
    return false;
  }
  // 페이드 아웃 → 상태 변경 → 페이드 인
  gFadeObj = { a: 0 };
  tween.add(gFadeObj, { a: 1 }, 200, 'easeIn', () => {
    enterState(to);
    gFadeObj = { a: 1 };
    tween.add(gFadeObj, { a: 0 }, 200, 'easeOut');
  });
  return true;
}

function directTransition(to) {
  const fromName = STATE_NAMES[gState];
  const toName = STATE_NAMES[to];
  if (!TRANSITION_TABLE[fromName]?.includes(toName)) {
    console.warn(`[DirectTransition] Invalid: ${fromName} → ${toName}`);
    return false;
  }
  enterState(to);
  return true;
}

function enterState(to) {
  gState = to;
  gSubState = SUB.IDLE;
  // 가드 플래그 리셋
  gSwapLocked = false; gCascadeInProgress = false; gResolving = false;
  gGoalChecking = false; gPoisonSpreading = false; gBossCountering = false;
  gSlimeWeaknessTrigger = false;
  gSelected = null;
  gActiveBooster = null;

  switch(to) {
    case STATE.TITLE:
      gFadeObj = { a: 0 };
      break;
    case STATE.WORLD_MAP:
      recalcLayout();
      break;
    case STATE.LEVEL_INTRO:
      gCutsceneTimer = 0;
      gCutscenePhase = 0;
      initLevel(gCurrentLevel);
      break;
    case STATE.BOSS_INTRO:
      gCutsceneTimer = 0;
      gCutscenePhase = 0;
      SFX.bossEntrance();
      break;
    case STATE.PLAY:
      recalcLayout();
      break;
    case STATE.BOSS_DEFEAT:
      gCutsceneTimer = 0;
      gCutscenePhase = 0;
      if (gBossIdx >= 0) gBossDefeated[gBossIdx] = true;
      saveProgress();
      SFX.victory();
      addEffect('victoryBurst', gW/2, gH/2, 1200, {});
      break;
    case STATE.LEVEL_COMPLETE: {
      const stars = calcStars(gCurrentLevel, gTurnsLeft);
      if (stars > (gLevelStars[gCurrentLevel]||0)) gLevelStars[gCurrentLevel] = stars;
      if (gCurrentLevel >= gMaxUnlocked) gMaxUnlocked = Math.min(gCurrentLevel + 1, 19);
      // 보스 격파 보너스: 보스 최대 HP × 2 (기획서 §7.3)
      const bossBonus = (gBossIdx >= 0) ? gBossMaxHp * 2 : 0;
      const totalScore = gScore + gTurnsLeft * 100 + bossBonus;
      gLevelCompleteScore = totalScore;
      gLevelCompleteBossBonus = bossBonus;
      Save.setHighScore(`${GAME_ID}_lv${gCurrentLevel}`, totalScore);
      // 부스터 보상 (기획서 §2.8)
      // 3성 클리어 → 셔플 +1
      if (stars >= 3) gBoosters.shuffle++;
      // 보스 격파 → 줄파괴 +1
      if (gBossIdx >= 0) gBoosters.lineClear++;
      saveProgress();
      gDDA.onWin();
      sound.sfx('score');
      break;
    }
    case STATE.LEVEL_FAIL:
      gDDA.onFail();
      saveProgress();
      SFX.fail();
      break;
    case STATE.PAUSE:
      break;
  }
}

// ═══════════════════════════════════════════════════════════
// GRID / LEVEL INIT
// ═══════════════════════════════════════════════════════════
function makeCell(type) {
  return { type, special:null, obstacle:null, iceHp:0, crateHp:0, chain:false,
    poison:false, lockColor:null, teleporterId:-1, anim:{ x:0, y:0, scale:1, alpha:1 } };
}

function randomGemType(colorCount) {
  return GEM_TYPES[rngInt(0, colorCount - 1)];
}

function initLevel(lvIdx) {
  const def = LEVEL_DEFS[lvIdx];
  gTurnsLeft = def.turns + gDDA.extraTurns;
  gScore = 0;
  gComboCount = 0;
  gBossTurnCount = 0;
  gShieldActive = false;
  gSlimeWeaknessTrigger = false;
  gPopups.length = 0;
  gMatchedCells.length = 0;
  gTeleporters.length = 0;
  gShuffleMsg = 0;
  particles.clear();
  tween.clear();

  // 보스 설정
  if (def.boss !== undefined) {
    const boss = BOSS_DEFS[def.boss];
    gBossIdx = def.boss;
    gBossMaxHp = Math.round(boss.hp * (1 - gDDA.bossHpReduction));
    gBossHp = gBossMaxHp;
  } else {
    gBossIdx = -1; gBossHp = 0; gBossMaxHp = 0;
  }

  // 부스터: 보스 레벨 시작 시 실드 1개
  if (def.boss !== undefined) gBoosters.shield = Math.max(gBoosters.shield, 1);
  // 5레벨마다 색폭탄 1개
  if ((lvIdx+1) % 5 === 0) gBoosters.colorBomb = Math.max(gBoosters.colorBomb, 1);

  // 목표 진행 초기화
  gGoalProgress = def.goals.map(() => 0);

  generateBoard(def);
}

function generateBoard(def) {
  const colorCount = def.colors;
  let attempts = 0;
  let success = false;

  while (attempts < 100 && !success) {
    attempts++;
    seedRng(Date.now() + attempts);
    gGrid = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      gGrid[r] = [];
      for (let c = 0; c < GRID_COLS; c++) {
        gGrid[r][c] = makeCell(randomGemType(colorCount));
      }
    }

    // 장애물 배치
    placeObstacles(def.obstacles);

    // 3매치 없음 검증 + 제거 루프
    for (let pass = 0; pass < 50; pass++) {
      let found = false;
      for (let r = 0; r < GRID_ROWS; r++) {
        for (let c = 0; c < GRID_COLS - 2; c++) {
          if (gGrid[r][c].type && gGrid[r][c].type === gGrid[r][c+1].type && gGrid[r][c].type === gGrid[r][c+2].type) {
            gGrid[r][c+2].type = randomGemType(colorCount);
            found = true;
          }
        }
      }
      for (let c = 0; c < GRID_COLS; c++) {
        for (let r = 0; r < GRID_ROWS - 2; r++) {
          if (gGrid[r][c].type && gGrid[r][c].type === gGrid[r+1][c].type && gGrid[r][c].type === gGrid[r+2][c].type) {
            gGrid[r+2][c].type = randomGemType(colorCount);
            found = true;
          }
        }
      }
      if (!found) break;
    }

    // 유효 이동 검증
    if (hasValidMove()) success = true;
  }

  // 실패 시 안전 패턴
  if (!success) {
    for (let r = 0; r < GRID_ROWS; r++)
      for (let c = 0; c < GRID_COLS; c++)
        gGrid[r][c].type = GEM_TYPES[(r + c) % colorCount];
  }

  // 애니메이션 초기화
  for (let r = 0; r < GRID_ROWS; r++)
    for (let c = 0; c < GRID_COLS; c++) {
      const cell = gGrid[r][c];
      cell.anim = { x: 0, y: -gCellSize * (GRID_ROWS - r + 2), scale: 1, alpha: 1 };
      tween.add(cell.anim, { y: 0 }, 300 + rngInt(0,200), 'easeOut');
    }
}

function placeObstacles(obsDefs) {
  if (!obsDefs) return;
  let teleId = 0;
  for (const od of obsDefs) {
    for (let i = 0; i < od.count; i++) {
      const pos = getRandomEmptyCell();
      if (!pos) continue;
      const cell = gGrid[pos.r][pos.c];
      switch(od.type) {
        case 'ice': cell.obstacle = 'ice'; cell.iceHp = od.hp || 1; break;
        case 'crate': cell.obstacle = 'crate'; cell.crateHp = 2; cell.type = null; break;
        case 'chain': cell.chain = true; break;
        case 'poison': cell.poison = true; cell.type = null; cell.obstacle = 'poison'; break;
        case 'teleporter': {
          const pos2 = getRandomEmptyCell();
          if (!pos2) break;
          cell.teleporterId = teleId;
          gGrid[pos2.r][pos2.c].teleporterId = teleId;
          gTeleporters.push({ r1:pos.r, c1:pos.c, r2:pos2.r, c2:pos2.c });
          teleId++;
          break;
        }
        case 'lock':
          cell.obstacle = 'lock';
          cell.lockColor = GEM_TYPES[rngInt(0, 5)];
          break;
      }
    }
  }
}

function getRandomEmptyCell() {
  const candidates = [];
  for (let r = 1; r < GRID_ROWS-1; r++)
    for (let c = 1; c < GRID_COLS-1; c++)
      if (gGrid[r][c].type && !gGrid[r][c].obstacle && !gGrid[r][c].chain && !gGrid[r][c].poison && gGrid[r][c].teleporterId < 0)
        candidates.push({r, c});
  if (!candidates.length) return null;
  return candidates[rngInt(0, candidates.length-1)];
}

// ═══════════════════════════════════════════════════════════
// MATCH DETECTION (V1 — 우선순위 검출 + used[][])
// ═══════════════════════════════════════════════════════════
function findAllMatches() {
  const matches = [];

  // 가로 런
  for (let r = 0; r < GRID_ROWS; r++) {
    let c = 0;
    while (c < GRID_COLS) {
      const t = getGemType(r, c);
      if (!t) { c++; continue; }
      let end = c + 1;
      while (end < GRID_COLS && getGemType(r, end) === t) end++;
      const len = end - c;
      if (len >= 3) {
        const cells = [];
        for (let i = c; i < end; i++) cells.push({r, c:i});
        matches.push({ cells, type: t, dir:'h', len });
      }
      c = end;
    }
  }

  // 세로 런
  for (let c = 0; c < GRID_COLS; c++) {
    let r = 0;
    while (r < GRID_ROWS) {
      const t = getGemType(r, c);
      if (!t) { r++; continue; }
      let end = r + 1;
      while (end < GRID_ROWS && getGemType(end, c) === t) end++;
      const len = end - r;
      if (len >= 3) {
        const cells = [];
        for (let i = r; i < end; i++) cells.push({r:i, c});
        matches.push({ cells, type: t, dir:'v', len });
      }
      r = end;
    }
  }

  return matches;
}

function getGemType(r, c) {
  if (r<0||r>=GRID_ROWS||c<0||c>=GRID_COLS) return null;
  const cell = gGrid[r][c];
  if (!cell.type || cell.poison) return null;
  return cell.type;
}

function processMatches(swapR, swapC) {
  const rawMatches = findAllMatches();
  if (!rawMatches.length) return [];

  // T/L자 검출: 가로+세로 교차점 확인
  const combined = [];
  for (let i = 0; i < rawMatches.length; i++) {
    for (let j = i+1; j < rawMatches.length; j++) {
      if (rawMatches[i].type !== rawMatches[j].type) continue;
      if (rawMatches[i].dir === rawMatches[j].dir) continue;
      // 교차점 찾기
      const overlap = rawMatches[i].cells.filter(a => rawMatches[j].cells.some(b => a.r===b.r && a.c===b.c));
      if (overlap.length > 0) {
        const allCells = [...rawMatches[i].cells];
        for (const c of rawMatches[j].cells) {
          if (!allCells.some(a => a.r===c.r && a.c===c.c)) allCells.push(c);
        }
        if (allCells.length >= 5) {
          combined.push({ cells: allCells, type: rawMatches[i].type, pattern:'TL', len:allCells.length, usedI:i, usedJ:j });
        }
      }
    }
  }

  // 우선순위 정렬
  const sorted = [];
  // 5매치
  for (const m of rawMatches) if (m.len >= 5) sorted.push({ ...m, priority:1, pattern:'5' });
  // T/L 조합
  for (const m of combined) sorted.push({ ...m, priority:2 });
  // 4매치
  for (const m of rawMatches) if (m.len === 4) sorted.push({ ...m, priority:3, pattern:'4' });
  // 3매치
  for (const m of rawMatches) if (m.len === 3) sorted.push({ ...m, priority:4, pattern:'3' });

  sorted.sort((a,b) => a.priority - b.priority);

  // used[][] 소비 추적
  const used = Array.from({length:GRID_ROWS}, () => new Array(GRID_COLS).fill(false));
  const result = [];

  for (const m of sorted) {
    const validCells = m.cells.filter(c => !used[c.r][c.c]);
    if (m.pattern === '5' && validCells.length < 5) continue;
    if (m.pattern === 'TL' && validCells.length < 5) continue;
    if (m.pattern === '4' && validCells.length < 4) continue;
    if (m.pattern === '3' && validCells.length < 3) continue;

    for (const c of validCells) used[c.r][c.c] = true;
    result.push({ cells: validCells, type: m.type, pattern: m.pattern, dir: m.dir });
  }

  // 스페셜 보석 생성
  for (const m of result) {
    let specialPos = (swapR !== undefined) ? {r:swapR, c:swapC} : m.cells[Math.floor(m.cells.length/2)];
    // 보장: specialPos가 매치 셀 안에 있는지
    if (!m.cells.some(c => c.r===specialPos.r && c.c===specialPos.c)) {
      specialPos = m.cells[Math.floor(m.cells.length/2)];
    }

    if (m.pattern === '5') {
      m.specialCreate = { r:specialPos.r, c:specialPos.c, special:'rainbow' };
    } else if (m.pattern === 'TL') {
      m.specialCreate = { r:specialPos.r, c:specialPos.c, special:'bomb' };
    } else if (m.pattern === '4') {
      const dir = m.dir === 'h' ? 'v' : 'h'; // 직교 방향
      m.specialCreate = { r:specialPos.r, c:specialPos.c, special:'line', lineDir:dir };
    }
  }

  return result;
}

function hasValidMove() {
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (!canSwapCell(r,c)) continue;
      // 오른쪽
      if (c+1<GRID_COLS && canSwapCell(r,c+1)) {
        swapTypes(r,c,r,c+1);
        const has = findAllMatches().length > 0;
        swapTypes(r,c,r,c+1);
        if (has) return true;
      }
      // 아래
      if (r+1<GRID_ROWS && canSwapCell(r+1,c)) {
        swapTypes(r,c,r+1,c);
        const has = findAllMatches().length > 0;
        swapTypes(r,c,r+1,c);
        if (has) return true;
      }
    }
  }
  return false;
}

function canSwapCell(r, c) {
  const cell = gGrid[r][c];
  if (!cell.type && !cell.special) return false;
  if (cell.poison) return false;
  if (cell.obstacle === 'crate') return false;
  if (cell.obstacle === 'lock') return false;
  return true;
}

function swapTypes(r1,c1,r2,c2) {
  const a = gGrid[r1][c1], b = gGrid[r2][c2];
  [a.type,b.type] = [b.type,a.type];
  [a.special,b.special] = [b.special,a.special];
  [a.chain,b.chain] = [b.chain,a.chain];
}

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════
let gSwapFrom = null, gSwapTo = null;

function trySwap(r1,c1,r2,c2) {
  if (gSwapLocked || gSubState !== SUB.IDLE) return;
  if (!isAdjacent(r1,c1,r2,c2)) return;
  if (!canSwapCell(r1,c1) || !canSwapCell(r2,c2)) return;
  resetHint(); // 힌트 리셋
  gStuckTimer = 0; // 데드락 타이머 리셋

  // 스페셜+스페셜 조합 체크
  const a = gGrid[r1][c1], b = gGrid[r2][c2];
  if (a.special && b.special) {
    gSwapLocked = true;
    gSubState = SUB.SWAP;
    gSwapFrom = {r:r1,c:c1}; gSwapTo = {r:r2,c:c2};
    animateSwap(r1,c1,r2,c2, () => {
      executeSpecialCombo(r1,c1,r2,c2);
    });
    return;
  }

  // 무지개 보석 스왑
  if (a.special === 'rainbow' || b.special === 'rainbow') {
    gSwapLocked = true;
    gSubState = SUB.SWAP;
    gSwapFrom = {r:r1,c:c1}; gSwapTo = {r:r2,c:c2};
    animateSwap(r1,c1,r2,c2, () => {
      const rainbowCell = a.special === 'rainbow' ? a : b;
      const otherCell = a.special === 'rainbow' ? b : a;
      const targetColor = otherCell.type;
      activateRainbow(rainbowCell === a ? r1 : r2, rainbowCell === a ? c1 : c2, targetColor);
    });
    return;
  }

  gSwapLocked = true;
  gSubState = SUB.SWAP;
  gSwapFrom = {r:r1,c:c1}; gSwapTo = {r:r2,c:c2};
  swapTypes(r1,c1,r2,c2);

  animateSwap(r1,c1,r2,c2, () => {
    // 매치 체크
    const matches = processMatches(r1,c1);
    if (matches.length === 0) {
      // 원복
      swapTypes(r1,c1,r2,c2);
      animateSwap(r2,c2,r1,c1, () => {
        gSwapLocked = false;
        gSubState = SUB.IDLE;
      });
      sound.tone(200, 0.1, 'sine');
    } else {
      gTurnsLeft--;
      gComboCount = 0;
      resolveMatches(matches);
    }
  });
  SFX.swap();
}

function isAdjacent(r1,c1,r2,c2) {
  return Math.abs(r1-r2) + Math.abs(c1-c2) === 1;
}

function animateSwap(r1,c1,r2,c2, cb) {
  const dx = (c2-c1) * gCellSize, dy = (r2-r1) * gCellSize;
  const a1 = gGrid[r1][c1].anim, a2 = gGrid[r2][c2].anim;
  a1.x = dx; a1.y = dy;
  a2.x = -dx; a2.y = -dy;
  let done = 0;
  const finish = () => { if(++done >= 2 && cb) cb(); };
  tween.add(a1, {x:0, y:0}, 200, 'easeInOut', finish);
  tween.add(a2, {x:0, y:0}, 200, 'easeInOut', finish);
}

// ─── 매치 해결 ───
function resolveMatches(matches) {
  gSubState = SUB.MATCH_RESOLVE;
  gResolving = true;
  gComboCount++;
  gMatchedCells = [];
  let totalDmg = 0;
  let scoreGain = 0;
  // 점수 콤보 배율: ×0.5 스텝, 최대 ×5.0 (기획서 §7.2)
  const scoreComboMult = Math.min(5.0, 1.0 + (gComboCount - 1) * 0.5);
  // 보스 데미지 콤보 보너스: ×0.2 스텝, 최대 ×3.0 (기획서 §2.6)
  const bossComboBonus = Math.min(3.0, 1.0 + (gComboCount - 1) * 0.2);

  for (const m of matches) {
    // 점수 계산
    let base = 0;
    if (m.pattern === '5') base = SCORE_TABLE.match5;
    else if (m.pattern === 'TL') base = SCORE_TABLE.matchTL;
    else if (m.pattern === '4') base = SCORE_TABLE.match4;
    else base = SCORE_TABLE.match3;
    scoreGain += Math.round(base * scoreComboMult);

    // 보스 데미지 (별도 콤보 보너스 공식 적용)
    if (gBossIdx >= 0) {
      const baseDmg = m.cells.length * 10;
      let dmgMult = 1;
      if (m.pattern === '5') dmgMult = 3.0;
      else if (m.pattern === 'TL') dmgMult = 2.5;
      else if (m.pattern === '4') dmgMult = 2.0;
      // 보스 약점 보너스
      dmgMult *= getWeaknessBonus(m);
      totalDmg += Math.round(baseDmg * dmgMult * bossComboBonus);
    }

    // 스페셜 보석 생성
    if (m.specialCreate) {
      const sc = m.specialCreate;
      const cell = gGrid[sc.r][sc.c];
      cell.type = m.type;
      cell.special = sc.special;
      if (sc.lineDir) cell.lineDir = sc.lineDir;
      // 이 셀은 제거하지 않음
      m.cells = m.cells.filter(c => !(c.r===sc.r && c.c===sc.c));
    }

    // 매치된 셀 처리
    for (const pos of m.cells) {
      gMatchedCells.push(pos);
      // 장애물 인접 처리
      handleAdjacentObstacles(pos.r, pos.c);
      // 목표 진행
      trackGoalProgress(m.type, pos);
    }
  }

  // 점수 추가
  gScore += scoreGain;
  if (scoreGain > 0) {
    addPopup(`+${scoreGain}`, gGridX + gCellSize * 4, gGridY - 10, '#ffd700', 20);
  }

  // 독 슬라임 왕 약점: 독 제거 턴에 전체 보스 데미지 ×2
  if (gSlimeWeaknessTrigger && gBossIdx === 0) {
    totalDmg = Math.round(totalDmg * 2);
  }

  // 보스 데미지
  if (totalDmg > 0 && gBossIdx >= 0) {
    gBossHp = Math.max(0, gBossHp - totalDmg);
    addDmgNumber(totalDmg, gW / 2, 50, totalDmg > 100);
    addEffect('bossHitFlash', gW/2, 35, 400, {});
    gShakeIntensity = Math.min(10, totalDmg / 50);
    SFX.bossHit();
  }

  // 콤보 팝업
  if (gComboCount >= 2) {
    addPopup(`${t('combo')} ×${gComboCount}!`, gW/2, gH/2 - 50, '#ffd700', 28);
    addEffect('comboGlow', gW/2, gH/2 - 50, 600, { size: gComboCount * 3 });
    SFX.combo(gComboCount);
  }

  // 매칭 셀 제거 애니메이션
  for (const pos of gMatchedCells) {
    const cell = gGrid[pos.r][pos.c];
    if (!cell) continue;
    cell.anim.scale = 1;
    tween.add(cell.anim, { scale: 0, alpha: 0 }, 250, 'easeIn');
    // 파티클 + 이펙트
    const px = gGridX + pos.c * gCellSize + gCellSize/2;
    const py = gGridY + pos.r * gCellSize + gCellSize/2;
    particles.emit(px, py, 5, { color: GEM_COLORS[cell.type] || '#fff', speed:80, life:0.4, size:4 });
    addEffect('matchBurst', px, py, 350, { color: GEM_COLORS[cell.type] });
  }

  // 스페셜 보석 활성화 (매치에 포함된 스페셜)
  const specialsToActivate = [];
  for (const pos of gMatchedCells) {
    const cell = gGrid[pos.r][pos.c];
    if (cell.special) {
      specialsToActivate.push({r:pos.r, c:pos.c, special:cell.special, lineDir:cell.lineDir, type:cell.type});
    }
  }

  // 250ms 후 제거 + 낙하
  tween.add({t:0}, {t:1}, 300, 'linear', () => {
    // 실제 셀 제거
    for (const pos of gMatchedCells) {
      clearCell(pos.r, pos.c);
    }
    // 스페셜 활성화
    for (const sp of specialsToActivate) {
      activateSpecial(sp.r, sp.c, sp.special, sp.lineDir, sp.type);
    }
    gResolving = false;
    gMatchedCells = [];
    startCascade();
  });

  sound.sfx('score');
}

function getWeaknessBonus(match) {
  if (gBossIdx < 0) return 1;
  switch(gBossIdx) {
    case 0: return 1; // 독 제거 보너스는 별도 처리
    case 1: return (match.pattern === '4' || match.pattern === '5' || match.pattern === 'TL') ? 2 : 1;
    case 2: return 1; // 스페셜 활성화 보너스는 activateSpecial에서
    case 3: return 1; // 조합 보너스는 executeSpecialCombo에서
    case 4: return 1; // 무지개 보너스는 activateRainbow에서
    default: return 1;
  }
}

function handleAdjacentObstacles(r, c) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr,dc] of dirs) {
    const nr = r+dr, nc = c+dc;
    if (nr<0||nr>=GRID_ROWS||nc<0||nc>=GRID_COLS) continue;
    const adj = gGrid[nr][nc];
    if (adj.obstacle === 'ice') {
      adj.iceHp--;
      if (adj.iceHp <= 0) { adj.obstacle = null; trackGoalProgress('ice', {r:nr,c:nc}); }
      sound.tone(800, 0.05, 'sine');
    }
    if (adj.obstacle === 'crate') {
      adj.crateHp--;
      if (adj.crateHp <= 0) { adj.obstacle = null; adj.type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors); trackGoalProgress('crate', {r:nr,c:nc}); }
      sound.tone(300, 0.08, 'square');
    }
    if (adj.poison) {
      adj.poison = false; adj.obstacle = null; adj.type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
      trackGoalProgress('poison', {r:nr,c:nc});
      // 독 슬라임 왕 약점: 독 제거 시 이번 턴 전체 보스 데미지 ×2 (기획서 §2.6)
      if (gBossIdx === 0) {
        gSlimeWeaknessTrigger = true;
        addPopup('Weak! ×2', gW/2, 70, '#ff6600', 16);
      }
      sound.tone(500, 0.08, 'sawtooth');
    }
    if (adj.obstacle === 'lock' && adj.lockColor) {
      const matchType = gGrid[r][c].type;
      if (matchType === adj.lockColor) {
        adj.obstacle = null; adj.lockColor = null;
        adj.type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
        trackGoalProgress('lock', {r:nr,c:nc});
        sound.tone(600, 0.1, 'sine');
      }
    }
    if (adj.chain) {
      // 체인은 보석 자체가 매치될 때 해제 — 여기서는 인접만 체크
    }
  }
}

function clearCell(r, c) {
  const cell = gGrid[r][c];
  cell.type = null;
  cell.special = null;
  cell.lineDir = undefined;
  cell.chain = false;
  cell.anim = { x:0, y:0, scale:1, alpha:1 };
}

// ─── 스페셜 보석 활성화 ───
function activateSpecial(r, c, special, lineDir, gemType) {
  const scoreBonus = special === 'line' ? SCORE_TABLE.specialLine : special === 'bomb' ? SCORE_TABLE.specialBomb : SCORE_TABLE.specialRainbow;
  gScore += scoreBonus;
  let bossDmg = 0;

  if (special === 'line') {
    const dr2 = lineDir === 'v' ? 1 : 0, dc2 = lineDir === 'h' ? 1 : 0;
    for (let i = 0; i < GRID_COLS; i++) {
      const tr = lineDir === 'v' ? i : r, tc = lineDir === 'h' ? i : c;
      if (tr >= 0 && tr < GRID_ROWS && tc >= 0 && tc < GRID_COLS) {
        destroyCell(tr, tc);
        bossDmg += 10;
      }
    }
    // 레이저 이펙트
    const lx = gGridX + c * gCellSize + gCellSize/2;
    const ly = gGridY + r * gCellSize + gCellSize/2;
    addEffect('lineLaser', lx, ly, 500, { dir: lineDir });
    SFX.specialActivate();
    // 체인 골렘 약점
    if (gBossIdx === 2) bossDmg *= 2;
  } else if (special === 'bomb') {
    for (let dr3 = -1; dr3 <= 1; dr3++)
      for (let dc3 = -1; dc3 <= 1; dc3++) {
        const tr = r+dr3, tc = c+dc3;
        if (tr>=0 && tr<GRID_ROWS && tc>=0 && tc<GRID_COLS) {
          destroyCell(tr, tc);
          bossDmg += 10;
        }
      }
    // 충격파 이펙트
    const bx = gGridX + c * gCellSize + gCellSize/2;
    const by = gGridY + r * gCellSize + gCellSize/2;
    addEffect('bombShockwave', bx, by, 600, {});
    SFX.specialActivate();
    gShakeIntensity = 5;
    if (gBossIdx === 2) bossDmg *= 2;
  }

  if (bossDmg > 0 && gBossIdx >= 0) {
    gBossHp = Math.max(0, gBossHp - bossDmg);
    addPopup(`-${bossDmg}`, gW/2, 60, '#ff3333', 16);
  }
}

function activateRainbow(r, c, targetColor) {
  let count = 0;
  gGrid[r][c].special = null; gGrid[r][c].type = null;
  for (let gr = 0; gr < GRID_ROWS; gr++)
    for (let gc = 0; gc < GRID_COLS; gc++) {
      if (gGrid[gr][gc].type === targetColor) {
        destroyCell(gr, gc);
        count++;
        const px = gGridX + gc * gCellSize + gCellSize/2;
        const py = gGridY + gr * gCellSize + gCellSize/2;
        particles.emit(px, py, 3, { color: GEM_COLORS[targetColor], speed:60, life:0.3 });
      }
    }
  gScore += SCORE_TABLE.specialRainbow + count * 20;
  if (gBossIdx >= 0) {
    let dmg = count * 15;
    if (gBossIdx === 4) dmg *= 3; // 카오스 드래곤 약점
    gBossHp = Math.max(0, gBossHp - dmg);
    addPopup(`Rainbow! -${dmg}`, gW/2, 60, '#ffd700', 20);
  }
  sound.sfx('powerup');
  gTurnsLeft--;
  gComboCount = 0;
  tween.add({t:0},{t:1}, 300, 'linear', () => startCascade());
}

function destroyCell(r, c) {
  const cell = gGrid[r][c];
  if (!cell.type && !cell.special && cell.obstacle !== 'ice' && cell.obstacle !== 'crate') return;
  if (cell.obstacle === 'ice') { cell.iceHp--; if(cell.iceHp<=0) { cell.obstacle=null; trackGoalProgress('ice',{r,c}); } return; }
  if (cell.obstacle === 'crate') { cell.crateHp--; if(cell.crateHp<=0) { cell.obstacle=null; cell.type=randomGemType(LEVEL_DEFS[gCurrentLevel].colors); trackGoalProgress('crate',{r,c}); } return; }
  if (cell.poison) { cell.poison=false; cell.obstacle=null; trackGoalProgress('poison',{r,c}); }
  if (cell.chain) { cell.chain=false; trackGoalProgress('chain',{r,c}); }
  if (cell.type) trackGoalProgress(cell.type, {r,c});
  clearCell(r, c);
}

// ─── 스페셜+스페셜 조합 ───
function executeSpecialCombo(r1,c1,r2,c2) {
  const a = gGrid[r1][c1], b = gGrid[r2][c2];
  const sa = a.special, sb = b.special;
  const comboDmgMult = (gBossIdx === 3) ? 3 : 1; // 잠금 사신 약점
  let bossDmg = 0;

  // 클리어
  a.special = null; a.type = null;
  b.special = null; b.type = null;

  if ((sa === 'rainbow' && sb === 'rainbow')) {
    // 보드 전체 클리어
    for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) { destroyCell(r,c); bossDmg+=15; }
    gScore += 2000;
    gShakeIntensity = 12;
    addPopup('ULTIMATE!', gW/2, gH/2, '#ffd700', 36);
  } else if ((sa === 'rainbow' && sb === 'line') || (sa === 'line' && sb === 'rainbow')) {
    const color = GEM_TYPES[rngInt(0,5)];
    for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
      if (gGrid[r][c].type === color) {
        gGrid[r][c].special = 'line'; gGrid[r][c].lineDir = rng()>0.5?'h':'v';
      }
    }
    for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
      if (gGrid[r][c].special === 'line') { activateSpecial(r,c,'line',gGrid[r][c].lineDir,null); bossDmg+=15; }
    }
    gScore += 1000;
  } else if ((sa === 'rainbow' && sb === 'bomb') || (sa === 'bomb' && sb === 'rainbow')) {
    const color = GEM_TYPES[rngInt(0,5)];
    for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
      if (gGrid[r][c].type === color) { activateSpecial(r,c,'bomb',null,null); bossDmg+=15; }
    }
    gScore += 1000;
  } else if (sa === 'bomb' && sb === 'bomb') {
    for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++) {
      const tr=r1+dr, tc=c1+dc;
      if(tr>=0&&tr<GRID_ROWS&&tc>=0&&tc<GRID_COLS) { destroyCell(tr,tc); bossDmg+=10; }
    }
    gScore += 800; gShakeIntensity = 8;
  } else if ((sa === 'line' && sb === 'bomb') || (sa === 'bomb' && sb === 'line')) {
    // 십자 5줄
    for(let i=0;i<GRID_COLS;i++) { for(let d=-1;d<=1;d++) { const tr=r1+d; if(tr>=0&&tr<GRID_ROWS) { destroyCell(tr,i); bossDmg+=8; }}}
    for(let i=0;i<GRID_ROWS;i++) { for(let d=-1;d<=1;d++) { const tc=c1+d; if(tc>=0&&tc<GRID_COLS) { destroyCell(i,tc); bossDmg+=8; }}}
    gScore += 600; gShakeIntensity = 6;
  } else if (sa === 'line' && sb === 'line') {
    for(let i=0;i<GRID_COLS;i++) destroyCell(r1,i);
    for(let i=0;i<GRID_ROWS;i++) destroyCell(i,c1);
    bossDmg += GRID_COLS * 10 + GRID_ROWS * 10;
    gScore += 400;
  }

  bossDmg = Math.round(bossDmg * comboDmgMult);
  if (bossDmg > 0 && gBossIdx >= 0) {
    gBossHp = Math.max(0, gBossHp - bossDmg);
    addPopup(`COMBO! -${bossDmg}`, gW/2, 55, '#ff3333', 22);
  }

  gTurnsLeft--;
  gComboCount = 0;
  sound.sfx('explosion');
  tween.add({t:0},{t:1}, 400, 'linear', () => startCascade());
}

// ─── 캐스케이드 (낙하 + 리필 + 텔레포터) ───
function startCascade() {
  gSubState = SUB.CASCADE;
  gCascadeInProgress = true;

  let moved = false;

  // 1단계: 일반 중력 낙하 (위에서 아래로 빈 칸 채우기)
  for (let c = 0; c < GRID_COLS; c++) {
    let writeRow = GRID_ROWS - 1;
    for (let r = GRID_ROWS - 1; r >= 0; r--) {
      const cell = gGrid[r][c];
      if (cell.poison || cell.obstacle === 'crate' || cell.obstacle === 'lock') {
        writeRow = r - 1;
        continue;
      }
      if (cell.type || cell.special) {
        if (r !== writeRow) {
          // 이동
          gGrid[writeRow][c].type = cell.type;
          gGrid[writeRow][c].special = cell.special;
          gGrid[writeRow][c].lineDir = cell.lineDir;
          gGrid[writeRow][c].chain = cell.chain;
          gGrid[writeRow][c].anim = { x:0, y:(r - writeRow) * gCellSize, scale:1, alpha:1 };
          tween.add(gGrid[writeRow][c].anim, {y:0}, 150 + Math.abs(r-writeRow)*40, 'easeOut');
          clearCell(r, c);
          moved = true;
        }
        writeRow--;
      }
    }
    // 리필: 일반 빈 칸에 새 보석 생성
    let emptyCount = 0;
    for (let r = writeRow; r >= 0; r--) {
      const cell = gGrid[r][c];
      if (!cell.type && !cell.special && !cell.poison && cell.obstacle !== 'crate' && cell.obstacle !== 'lock') {
        emptyCount++;
        cell.type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
        cell.anim = { x:0, y: -emptyCount * gCellSize - gCellSize, scale:1, alpha:1 };
        tween.add(cell.anim, {y:0}, 200 + emptyCount * 50, 'easeOut');
        moved = true;
      }
    }
  }

  // 2단계: 텔레포터 낙하 처리 (기획서 §2.5)
  // 텔레포터 위의 빈 칸에 새 보석이 쌍의 반대편 텔레포터 위에서 출현
  if (gTeleporters.length > 0) {
    const teleResult = processTeleporterCascade();
    if (teleResult) moved = true;
  }

  if (!moved) {
    settleCheck();
    return;
  }

  // 낙하 애니메이션 완료 대기
  const maxDelay = 400;
  tween.add({t:0},{t:1}, maxDelay, 'linear', () => {
    settleCheck();
  });

  sound.tone(350, 0.05, 'sine');
}

/** 텔레포터 캐스케이드: 텔레포터 셀 위의 빈 칸에 반대편에서 보석 출현 */
function processTeleporterCascade() {
  let moved = false;
  for (const tp of gTeleporters) {
    // 텔레포터 쌍의 양쪽을 모두 체크
    const pairs = [
      { src: {r:tp.r1, c:tp.c1}, dst: {r:tp.r2, c:tp.c2} },
      { src: {r:tp.r2, c:tp.c2}, dst: {r:tp.r1, c:tp.c1} }
    ];
    for (const pair of pairs) {
      const { src, dst } = pair;
      // src 텔레포터 위의 칸이 비어있으면, dst 위에서 보석 출현
      const aboveR = src.r - 1;
      if (aboveR >= 0) {
        const aboveCell = gGrid[aboveR][src.c];
        if (!aboveCell.type && !aboveCell.special && !aboveCell.poison &&
            aboveCell.obstacle !== 'crate' && aboveCell.obstacle !== 'lock') {
          // dst 텔레포터 위에서 새 보석 생성하여 src 위에 배치
          aboveCell.type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
          // 텔레포터 이펙트: 반대편에서 나타나는 애니메이션
          const dstX = (dst.c - src.c) * gCellSize;
          const dstY = (dst.r - aboveR) * gCellSize;
          aboveCell.anim = { x: dstX, y: dstY, scale: 1, alpha: 0.5 };
          tween.add(aboveCell.anim, { x: 0, y: 0, alpha: 1 }, 300, 'easeOut');
          moved = true;
          // 텔레포터 파티클
          const px = gGridX + dst.c * gCellSize + gCellSize / 2;
          const py = gGridY + dst.r * gCellSize + gCellSize / 2;
          particles.emit(px, py, 3, { color: '#00d4ff', speed: 60, life: 0.4, size: 3 });
        }
      }
    }
  }
  return moved;
}

function settleCheck() {
  gSubState = SUB.SETTLE;
  gCascadeInProgress = false;

  const matches = processMatches();
  if (matches.length > 0) {
    resolveMatches(matches);
    return;
  }

  // 데드록 체크
  if (!hasValidMove()) {
    doShuffle();
    gShuffleMsg = 2000;
    return;
  }

  // 턴 종료 처리
  gComboCount = 0;
  gSlimeWeaknessTrigger = false; // 독 슬라임 왕 약점 플래그 리셋
  if (hasPoisonOnBoard()) {
    startPoisonSpread();
  } else if (gBossIdx >= 0 && gBossTurnCount >= gDDA.bossCounterDelay) {
    startBossCounter();
  } else {
    checkGoal();
  }
}

function hasPoisonOnBoard() {
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) if (gGrid[r][c].poison) return true;
  return gBossIdx === 0; // 독 슬라임 보스 = 독 있음 가정
}

// ─── 독 타일 확산 ───
function startPoisonSpread() {
  gSubState = SUB.POISON_SPREAD;
  gPoisonSpreading = true;

  const poisonCells = [];
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++)
    if (gGrid[r][c].poison) poisonCells.push({r,c});

  let spread = false;
  for (const p of poisonCells) {
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    const dir = dirs[rngInt(0,3)];
    const nr = p.r+dir[0], nc = p.c+dir[1];
    if (nr<0||nr>=GRID_ROWS||nc<0||nc>=GRID_COLS) continue;
    const target = gGrid[nr][nc];
    if (target.type && !target.poison && !target.obstacle) {
      target.poison = true; target.obstacle = 'poison';
      target.type = null;
      spread = true;
      const ppx = gGridX + nc*gCellSize + gCellSize/2;
      const ppy = gGridY + nr*gCellSize + gCellSize/2;
      particles.emit(ppx, ppy, 5, { color:'#8b008b', speed:40, life:0.5 });
      addEffect('poisonSpreadFx', ppx, ppy, 400, {});
    }
  }

  if (spread) SFX.poison();

  tween.add({t:0},{t:1}, 400, 'linear', () => {
    gPoisonSpreading = false;
    if (gBossIdx >= 0) startBossCounter();
    else checkGoal();
  });
}

// ─── 보스 반격 ───
function startBossCounter() {
  gSubState = SUB.BOSS_COUNTER;
  gBossCountering = true;
  gBossTurnCount++;

  if (gShieldActive) {
    gShieldActive = false;
    addPopup(t('shield') + '!', gW/2, gH/2, '#00d4ff', 24);
    tween.add({t:0},{t:1}, 500, 'linear', () => {
      gBossCountering = false;
      checkGoal();
    });
    return;
  }

  const boss = BOSS_DEFS[gBossIdx];
  switch(boss.counterFn) {
    case 'slimeCounter': bossSlimeCounter(); break;
    case 'iceCounter': bossIceCounter(); break;
    case 'chainCounter': bossChainCounter(); break;
    case 'lockCounter': bossLockCounter(); break;
    case 'dragonCounter': bossDragonCounter(); break;
  }

  SFX.bossCounter();
  addPopup(t('bossAppear') + '!', gW/2, gH/2 - 30, '#ff3333', 20);
  gShakeIntensity = 4;

  tween.add({t:0},{t:1}, 800, 'linear', () => {
    gBossCountering = false;
    checkGoal();
  });
}

function bossSlimeCounter() {
  for (let i=0; i<rngInt(1,2); i++) {
    const pos = getRandomEmptyCell();
    if (pos) { gGrid[pos.r][pos.c].poison = true; gGrid[pos.r][pos.c].obstacle = 'poison'; gGrid[pos.r][pos.c].type = null; }
  }
}
function bossIceCounter() {
  for (let i=0; i<2; i++) {
    const pos = getRandomGemCell();
    if (pos) { gGrid[pos.r][pos.c].obstacle = 'ice'; gGrid[pos.r][pos.c].iceHp = 2; }
  }
}
function bossChainCounter() {
  if (gBossTurnCount % 2 === 0) {
    for (let i=0; i<3; i++) {
      const pos = getRandomGemCell();
      if (pos) gGrid[pos.r][pos.c].chain = true;
    }
  }
}
function bossLockCounter() {
  for (let i=0; i<rngInt(1,2); i++) {
    const pos = getRandomEmptyCell();
    if (pos) {
      gGrid[pos.r][pos.c].obstacle = 'lock';
      gGrid[pos.r][pos.c].lockColor = GEM_TYPES[rngInt(0,5)];
    }
  }
  if (gBossTurnCount % 3 === 0) {
    const row = rngInt(0, GRID_ROWS-1);
    for (let c=0; c<GRID_COLS; c++) {
      if (gGrid[row][c].type) gGrid[row][c].type = randomGemType(6);
    }
  }
}
function bossDragonCounter() {
  const pos1 = getRandomEmptyCell();
  if (pos1) { gGrid[pos1.r][pos1.c].poison=true; gGrid[pos1.r][pos1.c].obstacle='poison'; gGrid[pos1.r][pos1.c].type=null; }
  const pos2 = getRandomGemCell();
  if (pos2) { gGrid[pos2.r][pos2.c].obstacle='ice'; gGrid[pos2.r][pos2.c].iceHp=1; }
  if (gBossTurnCount % 3 === 0) {
    for (let ri=0; ri<2; ri++) {
      const row = rngInt(0, GRID_ROWS-1);
      for (let c=0; c<GRID_COLS; c++) {
        if (gGrid[row][c].type) gGrid[row][c].type = randomGemType(6);
      }
    }
  }
}

function getRandomGemCell() {
  const cs = [];
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++)
    if (gGrid[r][c].type && !gGrid[r][c].obstacle && !gGrid[r][c].chain && !gGrid[r][c].poison)
      cs.push({r,c});
  return cs.length ? cs[rngInt(0,cs.length-1)] : null;
}

// ─── 목표 체크 ───
function checkGoal() {
  gSubState = SUB.CHECK_GOAL;
  gGoalChecking = true;

  const def = LEVEL_DEFS[gCurrentLevel];

  // 보스 격파 체크
  if (gBossIdx >= 0 && gBossHp <= 0) {
    gGoalChecking = false;
    beginTransition(STATE.BOSS_DEFEAT);
    return;
  }

  // 일반 목표 체크
  let allMet = true;
  for (let i=0; i<def.goals.length; i++) {
    const goal = def.goals[i];
    if (goal.type === 'boss') { allMet = false; continue; }
    if (goal.type === 'score' && gScore < goal.val) allMet = false;
    else if ((goal.type === 'collect' || goal.type === 'obstacle') && gGoalProgress[i] < goal.val) allMet = false;
  }

  if (allMet && gBossIdx < 0) {
    gGoalChecking = false;
    beginTransition(STATE.LEVEL_COMPLETE);
    return;
  }

  // 턴 소진 체크
  if (gTurnsLeft <= 0) {
    gGoalChecking = false;
    beginTransition(STATE.LEVEL_FAIL);
    return;
  }

  gGoalChecking = false;
  gSwapLocked = false;
  gSubState = SUB.IDLE;
}

function trackGoalProgress(type, pos) {
  const def = LEVEL_DEFS[gCurrentLevel];
  for (let i=0; i<def.goals.length; i++) {
    const g = def.goals[i];
    if (g.type === 'collect' && g.gem === type) gGoalProgress[i]++;
    if (g.type === 'obstacle') {
      if (g.kind === 'all') gGoalProgress[i]++;
      else if (g.kind === type) gGoalProgress[i]++;
    }
    if (g.type === 'score') gGoalProgress[i] = gScore;
  }
}

// ─── 셔플 ───
function doShuffle() {
  const gems = [];
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
    if (gGrid[r][c].type && !gGrid[r][c].poison && gGrid[r][c].obstacle !== 'crate' && gGrid[r][c].obstacle !== 'lock') {
      gems.push(gGrid[r][c].type);
    }
  }
  // Fisher-Yates
  for (let i=gems.length-1; i>0; i--) {
    const j = rngInt(0, i);
    [gems[i], gems[j]] = [gems[j], gems[i]];
  }
  let gi = 0;
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
    if (gGrid[r][c].type && !gGrid[r][c].poison && gGrid[r][c].obstacle !== 'crate' && gGrid[r][c].obstacle !== 'lock') {
      gGrid[r][c].type = gems[gi++];
    }
  }

  // 셔플 후 3매치 없음 보장
  for (let pass=0; pass<50; pass++) {
    let f = false;
    for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS-2;c++) {
      if (gGrid[r][c].type && gGrid[r][c].type===gGrid[r][c+1].type && gGrid[r][c].type===gGrid[r][c+2].type) {
        gGrid[r][c+2].type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
        f = true;
      }
    }
    for (let c=0;c<GRID_COLS;c++) for(let r=0;r<GRID_ROWS-2;r++) {
      if (gGrid[r][c].type && gGrid[r][c].type===gGrid[r+1][c].type && gGrid[r][c].type===gGrid[r+2][c].type) {
        gGrid[r+2][c].type = randomGemType(LEVEL_DEFS[gCurrentLevel].colors);
        f = true;
      }
    }
    if (!f) break;
  }

  // 애니메이션
  for (let r=0;r<GRID_ROWS;r++) for(let c=0;c<GRID_COLS;c++) {
    const cell = gGrid[r][c];
    if (cell.type) {
      cell.anim.scale = 0;
      tween.add(cell.anim, {scale:1}, 300, 'easeOut');
    }
  }

  tween.add({t:0},{t:1}, 500, 'linear', () => {
    if (!hasValidMove()) doShuffle(); // 재귀적 안전
    else { gSwapLocked = false; gSubState = SUB.IDLE; }
  });
}

// ─── 부스터 실행 ───
function useBooster(type) {
  if (gSubState !== SUB.IDLE || gSwapLocked) return;
  if (gBoosters[type] <= 0) return;

  if (type === 'shuffle') {
    gBoosters[type]--;
    doShuffle();
    gShuffleMsg = 1500;
    sound.sfx('select');
    saveProgress();
  } else if (type === 'shield') {
    if (gBossIdx < 0) return;
    gBoosters[type]--;
    gShieldActive = true;
    addPopup(t('shield') + ' ON', gW/2, gH/2, '#00d4ff', 22);
    sound.sfx('powerup');
    saveProgress();
  } else if (type === 'colorBomb') {
    gActiveBooster = 'colorBomb';
    gSubState = SUB.BOOSTER_SELECT;
  } else if (type === 'lineClear') {
    gActiveBooster = 'lineClear';
    gSubState = SUB.BOOSTER_SELECT;
  }
}

function executeBoosterOnCell(r, c) {
  if (!gActiveBooster) return;
  if (gActiveBooster === 'colorBomb') {
    const type = gGrid[r][c].type;
    if (!type) { gActiveBooster = null; gSubState = SUB.IDLE; return; }
    gBoosters.colorBomb--;
    gActiveBooster = null;
    let count = 0;
    for (let gr=0;gr<GRID_ROWS;gr++) for(let gc=0;gc<GRID_COLS;gc++) {
      if (gGrid[gr][gc].type === type) { destroyCell(gr,gc); count++; }
    }
    gScore += count * 30;
    let bossDmg = count * 15;
    if (gBossIdx >= 0) {
      gBossHp = Math.max(0, gBossHp - Math.round(bossDmg * 1.5));
    }
    gTurnsLeft--;
    gComboCount = 0;
    sound.sfx('explosion');
    saveProgress();
    tween.add({t:0},{t:1}, 300, 'linear', () => startCascade());
  } else if (gActiveBooster === 'lineClear') {
    gBoosters.lineClear--;
    gActiveBooster = null;
    for (let i=0;i<GRID_COLS;i++) destroyCell(r, i);
    for (let i=0;i<GRID_ROWS;i++) destroyCell(i, c);
    gScore += (GRID_COLS + GRID_ROWS) * 20;
    gTurnsLeft--;
    gComboCount = 0;
    sound.sfx('explosion');
    saveProgress();
    tween.add({t:0},{t:1}, 300, 'linear', () => startCascade());
  }
}

// ─── 팝업 텍스트 ───
function addPopup(text, x, y, color, size) {
  gPopups.push({ text, x, y, life:1.2, maxLife:1.2, color:color||'#ffd700', size:size||20, oy:0 });
}

// ═══════════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════════
let gDragStart = null; // {r,c,px,py}
let gDragging = false;

function handleInput(dt) {
  switch(gState) {
    case STATE.TITLE: handleTitleInput(); break;
    case STATE.WORLD_MAP: handleMapInput(); break;
    case STATE.LEVEL_INTRO: handleIntroInput(); break;
    case STATE.PLAY: handlePlayInput(); break;
    case STATE.BOSS_INTRO: break;
    case STATE.BOSS_DEFEAT: handleDefeatInput(); break;
    case STATE.LEVEL_COMPLETE: handleCompleteInput(); break;
    case STATE.LEVEL_FAIL: handleFailInput(); break;
    case STATE.PAUSE: handlePauseInput(); break;
  }
}

function handleTitleInput() {
  if (input.confirm()) {
    sound.init(); sound.resume();
    beginTransition(STATE.WORLD_MAP);
  }
}

function handleMapInput() {
  // 도감 모드
  if (gShowBestiary) {
    if (input.jp('Escape') || input.tapped) {
      // 닫기 버튼 체크
      const btnW = 100, btnH = 40;
      const bx = (gW - btnW) / 2, by = gH - 50;
      if (input.jp('Escape') || (input.tapped && UI.hitTest(input.tapX, input.tapY, bx, by, btnW, btnH))) {
        gShowBestiary = false;
      }
    }
    return;
  }

  // 키보드로 레벨 선택
  if (input.jp('ArrowUp')) gCurrentLevel = Math.max(0, gCurrentLevel - 1);
  if (input.jp('ArrowDown')) gCurrentLevel = Math.min(gMaxUnlocked, gCurrentLevel + 1);
  if (input.jp('Space') || input.jp('Enter')) {
    if (gCurrentLevel <= gMaxUnlocked) {
      beginTransition(STATE.LEVEL_INTRO);
    }
  }
  if (input.jp('Escape')) beginTransition(STATE.TITLE);
  // 도감 단축키
  if (input.jp('KeyE')) gShowBestiary = true;

  // 클릭/탭
  if (input.tapped) {
    const nodeClicked = getClickedLevelNode(input.tapX, input.tapY);
    if (nodeClicked >= 0 && nodeClicked <= gMaxUnlocked) {
      gCurrentLevel = nodeClicked;
      beginTransition(STATE.LEVEL_INTRO);
    }
    // 뒤로 가기 버튼
    const bx = 10, by = gH - 50, bw = 80, bh = 40;
    if (UI.hitTest(input.tapX, input.tapY, bx, by, bw, bh)) {
      beginTransition(STATE.TITLE);
    }
    // 도감 버튼
    const dbx = gW - 90, dby = gH - 50, dbw = 80, dbh = 40;
    if (UI.hitTest(input.tapX, input.tapY, dbx, dby, dbw, dbh)) {
      gShowBestiary = true;
    }
  }
}

function getClickedLevelNode(px, py) {
  const nodeW = Math.min(gW - 40, 360);
  const startX = (gW - nodeW) / 2;
  const nodeH = 44;
  const gap = 8;
  const scrollOffset = gMapScrollY;

  for (let i = 0; i < 20; i++) {
    const ny = 80 + i * (nodeH + gap) - scrollOffset;
    if (UI.hitTest(px, py, startX, ny, nodeW, nodeH)) return i;
  }
  return -1;
}

function handleIntroInput() {
  // 스킵 가능
  if (input.confirm()) {
    const def = LEVEL_DEFS[gCurrentLevel];
    if (def.boss !== undefined) directTransition(STATE.BOSS_INTRO);
    else directTransition(STATE.PLAY);
  }
}

function handlePlayInput() {
  // ESC → 일시정지
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(STATE.PAUSE);
    return;
  }

  if (gSubState === SUB.BOOSTER_SELECT) {
    // 부스터 대상 선택
    if (input.jp('Escape')) { gActiveBooster = null; gSubState = SUB.IDLE; return; }
    if (input.tapped) {
      const {r,c} = screenToGrid(input.tapX, input.tapY);
      if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
        executeBoosterOnCell(r, c);
      }
    }
    return;
  }

  if (gSubState !== SUB.IDLE || gSwapLocked) return;

  // 부스터 단축키
  if (input.jp('Digit1')) useBooster('shuffle');
  if (input.jp('Digit2')) useBooster('colorBomb');
  if (input.jp('Digit3')) useBooster('lineClear');
  if (input.jp('Digit4')) useBooster('shield');

  // 키보드 커서
  if (input.jp('ArrowUp')) gCursorR = Math.max(0, gCursorR - 1);
  if (input.jp('ArrowDown')) gCursorR = Math.min(GRID_ROWS-1, gCursorR + 1);
  if (input.jp('ArrowLeft')) gCursorC = Math.max(0, gCursorC - 1);
  if (input.jp('ArrowRight')) gCursorC = Math.min(GRID_COLS-1, gCursorC + 1);

  if (input.jp('Space') || input.jp('Enter')) {
    if (!gSelected) {
      if (canSwapCell(gCursorR, gCursorC)) gSelected = {r:gCursorR, c:gCursorC};
    } else {
      if (isAdjacent(gSelected.r, gSelected.c, gCursorR, gCursorC)) {
        trySwap(gSelected.r, gSelected.c, gCursorR, gCursorC);
        gSelected = null;
      } else {
        gSelected = canSwapCell(gCursorR, gCursorC) ? {r:gCursorR, c:gCursorC} : null;
      }
    }
  }

  // 마우스/터치 클릭 스왑
  if (input.tapped && !gDragging) {
    const pos = screenToGrid(input.tapX, input.tapY);
    if (pos.r >= 0 && pos.r < GRID_ROWS && pos.c >= 0 && pos.c < GRID_COLS) {
      // 부스터 버튼 체크
      if (checkBoosterTap(input.tapX, input.tapY)) return;

      if (!gSelected) {
        if (canSwapCell(pos.r, pos.c)) {
          gSelected = pos;
          gCursorR = pos.r; gCursorC = pos.c;
          gDragStart = { r:pos.r, c:pos.c, px:input.tapX, py:input.tapY };
          gDragging = true;
        }
      } else {
        if (isAdjacent(gSelected.r, gSelected.c, pos.r, pos.c)) {
          trySwap(gSelected.r, gSelected.c, pos.r, pos.c);
          gSelected = null;
        } else {
          gSelected = canSwapCell(pos.r, pos.c) ? pos : null;
          if (gSelected) {
            gDragStart = { r:pos.r, c:pos.c, px:input.tapX, py:input.tapY };
            gDragging = true;
          }
        }
      }
    } else {
      // 그리드 밖 탭 — 부스터 버튼 체크
      checkBoosterTap(input.tapX, input.tapY);
    }
  }

  // 드래그 스왑
  if (gDragging && gDragStart && input.mouseDown) {
    const dx = input.mouseX - gDragStart.px;
    const dy = input.mouseY - gDragStart.py;
    const threshold = gCellSize * 0.4;
    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;
      const tr = gDragStart.r + dr, tc = gDragStart.c + dc;
      if (tr >= 0 && tr < GRID_ROWS && tc >= 0 && tc < GRID_COLS) {
        trySwap(gDragStart.r, gDragStart.c, tr, tc);
        gSelected = null;
      }
      gDragging = false; gDragStart = null;
    }
  }
  if (!input.mouseDown) { gDragging = false; gDragStart = null; }
}

function checkBoosterTap(px, py) {
  const bw = touchSafe(50), bh = touchSafe(40);
  const gap = 8;
  const totalW = 4 * bw + 3 * gap;
  const sx = (gW - totalW) / 2;
  const sy = gGridY + GRID_ROWS * gCellSize + 10;
  const types = ['shuffle','colorBomb','lineClear','shield'];
  for (let i=0; i<4; i++) {
    const bx = sx + i * (bw + gap);
    if (UI.hitTest(px, py, bx, sy, bw, bh)) {
      useBooster(types[i]);
      return true;
    }
  }
  return false;
}

function screenToGrid(px, py) {
  const c = Math.floor((px - gGridX) / gCellSize);
  const r = Math.floor((py - gGridY) / gCellSize);
  return { r, c };
}

function handleCompleteInput() {
  if (input.confirm()) {
    beginTransition(STATE.WORLD_MAP);
  }
}
function handleFailInput() {
  if (input.jp('KeyR') || input.tapped) {
    beginTransition(STATE.LEVEL_INTRO); // 재시도
  }
  if (input.jp('Escape')) {
    beginTransition(STATE.WORLD_MAP);
  }
}
function handleDefeatInput() {
  // 컷신 재생 중 — 자동 전환, 하지만 스킵 가능
  if (gCutsceneTimer > 1500 && input.confirm()) {
    beginTransition(STATE.LEVEL_COMPLETE);
  }
}
function handlePauseInput() {
  if (input.jp('Escape') || input.jp('KeyP') || input.jp('Space')) {
    directTransition(STATE.PLAY);
  }
  if (input.tapped) {
    // 계속하기 버튼
    const bw = 160, bh = 48;
    const bx = (gW - bw) / 2, by = gH/2 - 10;
    if (UI.hitTest(input.tapX, input.tapY, bx, by, bw, bh)) directTransition(STATE.PLAY);
    // 나가기 버튼
    const qy = gH/2 + 50;
    if (UI.hitTest(input.tapX, input.tapY, bx, qy, bw, bh)) beginTransition(STATE.WORLD_MAP);
  }
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════
function update(dt, timestamp) {
  tween.update(dt);
  particles.update(dt);
  gFadeAlpha = gFadeObj.a;

  // BGM 업데이트 (dt 기반, setInterval 0건)
  BGM.update(dt);
  updateBGMTrack();

  // 스프라이트 시트 애니메이션
  updateSpriteSheets(dt);

  // 이펙트 시스템
  updateEffects(dt);

  // 배경 요소
  updateBgElements(dt);

  // 선택 펄스
  updateSelectionPulse(dt);

  // 턴 플래시
  updateTurnFlash(dt);

  // 반짝임 파티클
  updateSparkles(dt);

  // 데미지 넘버
  updateDmgNumbers(dt);

  // 힌트 시스템
  updateHint(dt);

  // 데드락 감지
  updateStuckDetection(dt);

  // 쉐이크 감쇠
  if (gShakeIntensity > 0) gShakeIntensity = Math.max(0, gShakeIntensity - dt * 0.02);

  // 팝업 업데이트
  for (let i=gPopups.length-1; i>=0; i--) {
    gPopups[i].life -= dt / 1000;
    gPopups[i].oy -= dt * 0.03;
    if (gPopups[i].life <= 0) gPopups.splice(i, 1);
  }

  // 셔플 메시지
  if (gShuffleMsg > 0) gShuffleMsg -= dt;

  // 컷신 타이머
  if (gState === STATE.BOSS_INTRO || gState === STATE.BOSS_DEFEAT || gState === STATE.LEVEL_INTRO) {
    gCutsceneTimer += dt;
    updateCutscene(dt);
  }

  handleInput(dt);
  input.flush();
}

/** BGM 트랙 자동 선택 */
function updateBGMTrack() {
  if (gState === STATE.TITLE || gState === STATE.WORLD_MAP) {
    BGM.play('title');
  } else if (gState === STATE.PLAY && gBossIdx >= 0) {
    BGM.play('boss');
  } else if (gState === STATE.PLAY) {
    BGM.play('puzzle');
  } else if (gState === STATE.BOSS_DEFEAT || gState === STATE.LEVEL_COMPLETE) {
    BGM.play('victory');
  } else if (gState === STATE.PAUSE) {
    // BGM 유지
  } else if (gState === STATE.BOSS_INTRO) {
    BGM.play('boss');
  } else if (gState === STATE.LEVEL_FAIL) {
    BGM.stop();
  }
}

function updateCutscene(dt) {
  if (gState === STATE.LEVEL_INTRO) {
    if (gCutsceneTimer > 1500) {
      const def = LEVEL_DEFS[gCurrentLevel];
      if (def.boss !== undefined) directTransition(STATE.BOSS_INTRO);
      else directTransition(STATE.PLAY);
    }
  }
  if (gState === STATE.BOSS_INTRO) {
    if (gCutsceneTimer > 2500) directTransition(STATE.PLAY);
  }
  if (gState === STATE.BOSS_DEFEAT) {
    if (gCutsceneTimer > 3000) beginTransition(STATE.LEVEL_COMPLETE);
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(ctx, w, h, dt) {
  const shake = UI.shake(gShakeIntensity);
  ctx.save();
  ctx.translate(shake.x, shake.y);

  switch(gState) {
    case STATE.TITLE: renderTitle(ctx, w, h); break;
    case STATE.WORLD_MAP:
      if (gShowBestiary) renderBestiary(ctx, w, h);
      else renderWorldMap(ctx, w, h);
      break;
    case STATE.LEVEL_INTRO: renderLevelIntro(ctx, w, h); break;
    case STATE.PLAY: renderPlay(ctx, w, h); break;
    case STATE.BOSS_INTRO: renderBossIntro(ctx, w, h); break;
    case STATE.BOSS_DEFEAT: renderBossDefeat(ctx, w, h); break;
    case STATE.LEVEL_COMPLETE: renderComplete(ctx, w, h); break;
    case STATE.LEVEL_FAIL: renderFail(ctx, w, h); break;
    case STATE.PAUSE: renderPlay(ctx, w, h); renderPauseOverlay(ctx, w, h); break;
  }

  // 배경 요소 (모든 상태)
  renderBgElements(ctx, w, h);

  // 이펙트
  renderEffects(ctx);

  // 파티클
  particles.render(ctx);

  // 반짝임 (PLAY 상태)
  if (gState === STATE.PLAY || gState === STATE.PAUSE) {
    renderSparkles(ctx);
  }

  // 데미지 넘버
  renderDmgNumbers(ctx);

  // 팝업 렌더 (향상된 버전)
  renderScorePopups(ctx);

  ctx.restore();

  // 스캔라인 효과 (미세)
  UI.scanlines(ctx, w, h, 0.02);

  // 페이드 오버레이
  UI.fade(ctx, w, h, gFadeAlpha);
}

// ─── 타이틀 ───
function renderTitle(ctx, w, h) {
  // 배경
  drawBackgroundCached(ctx, w, h, 'bgNormal');

  // 어두운 오버레이
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  ctx.fillRect(0, 0, w, h);

  // 타이틀
  const titleY = h * 0.3;
  UI.text(ctx, t('title'), w/2, titleY, { size:48, bold:true, color:'#ffd700', glow:'#ffd700' });
  UI.text(ctx, 'Boss Battle Match-3 Puzzle', w/2, titleY + 50, { size:16, color:'#8080a0' });

  // 시작 버튼
  const btnW = 200, btnH = 56;
  const btnX = (w - btnW) / 2, btnY = h * 0.55;
  const hover = UI.hitTest(input.mouseX, input.mouseY, btnX, btnY, btnW, btnH);
  UI.button(ctx, t('tapToStart'), btnX, btnY, btnW, btnH, { color:'#6c3cf7', hover });

  // 반짝 파티클
  if (rng() < 0.03) {
    particles.emit(rng()*w, rng()*h, 1, { color:'#ffd700', speed:20, life:1.5, size:2 });
  }
}

// ─── 월드맵 ───
function renderWorldMap(ctx, w, h) {
  drawBackgroundCached(ctx, w, h, 'bgNormal');
  ctx.fillStyle = 'rgba(10,10,30,0.6)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('worldMap'), w/2, 30, { size:24, bold:true, color:'#ffd700' });

  const nodeW = Math.min(w - 40, 360);
  const startX = (w - nodeW) / 2;
  const nodeH = 44;
  const gap = 8;

  // 스크롤
  const totalH = 20 * (nodeH + gap) + 100;
  const maxScroll = Math.max(0, totalH - h + 80);
  // 자동 스크롤 to currentLevel
  gMapTargetY = MathUtil.clamp(gCurrentLevel * (nodeH + gap) - h/2 + 80, 0, maxScroll);
  gMapScrollY += (gMapTargetY - gMapScrollY) * 0.1;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 60, w, h - 120);
  ctx.clip();

  // 경로 연결선 + 보스 글로우
  renderMapPath(ctx, w, h, gMapScrollY);

  for (let i = 0; i < 20; i++) {
    const ny = 80 + i * (nodeH + gap) - gMapScrollY;
    if (ny < 40 || ny > h - 40) continue;

    const def = LEVEL_DEFS[i];
    const isBoss = def.boss !== undefined;
    const unlocked = i <= gMaxUnlocked;
    const stars = gLevelStars[i] || 0;
    const selected = i === gCurrentLevel;

    // 노드 배경
    const bgColor = !unlocked ? '#1a1a2e' : isBoss ? '#4a0020' : selected ? '#2a1a4e' : '#1e1e3a';
    const borderColor = !unlocked ? '#333' : isBoss ? '#ff3333' : selected ? '#ffd700' : '#555';
    ctx.fillStyle = bgColor;
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = selected ? 2.5 : 1;
    ctx.beginPath();
    ctx.roundRect(startX, ny, nodeW, nodeH, 8);
    ctx.fill(); ctx.stroke();

    // 텍스트
    const label = `${t('level')} ${i+1}${isBoss ? ' ⚔️' : ''}`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `bold 14px ${FONT}`;
    ctx.fillStyle = unlocked ? '#e0e0f0' : '#505070';
    ctx.fillText(label, startX + 12, ny + nodeH/2);

    // 별
    if (stars > 0) {
      const starStr = '★'.repeat(stars) + '☆'.repeat(3-stars);
      ctx.fillStyle = '#ffd700';
      ctx.textAlign = 'right';
      ctx.fillText(starStr, startX + nodeW - 12, ny + nodeH/2);
    } else if (!unlocked) {
      ctx.fillStyle = '#505070';
      ctx.textAlign = 'right';
      ctx.fillText('🔒', startX + nodeW - 12, ny + nodeH/2);
    }
  }

  ctx.restore();

  // 뒤로 가기 버튼
  const bx = 10, by = h - 50, bw = 80, bh = 40;
  UI.button(ctx, t('back'), bx, by, bw, bh, { color:'#555' });

  // 도감 버튼
  const dbx = w - 90, dby = h - 50, dbw = 80, dbh = 40;
  UI.button(ctx, t('bestiary'), dbx, dby, dbw, dbh, { color:'#9b5de5' });
}

// ─── 레벨 인트로 ───
function renderLevelIntro(ctx, w, h) {
  drawBackground(ctx, w, h, LEVEL_DEFS[gCurrentLevel].boss !== undefined ? 'bgBoss' : 'bgNormal');
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  ctx.fillRect(0, 0, w, h);

  const lvNum = gCurrentLevel + 1;
  const progress = MathUtil.clamp(gCutsceneTimer / 1500, 0, 1);

  // 레벨 번호
  UI.text(ctx, `${t('level')} ${lvNum}`, w/2, h*0.3, { size:36, bold:true, color:'#ffd700', glow:'#ffd700' });

  // 스토리
  if (STORY_TEXT[lvNum]) {
    const storyText = STORY_TEXT[lvNum][gLang] || STORY_TEXT[lvNum].ko;
    ctx.globalAlpha = MathUtil.clamp(progress * 3, 0, 1);
    UI.text(ctx, storyText, w/2, h*0.45, { size:14, color:'#e0e0f0' });
    ctx.globalAlpha = 1;
  }

  // 목표 표시
  const def = LEVEL_DEFS[gCurrentLevel];
  let goalY = h * 0.55;
  UI.text(ctx, t('goal') + ':', w/2, goalY, { size:16, bold:true, color:'#00d4ff' });
  for (const g of def.goals) {
    goalY += 24;
    let txt = '';
    if (g.type === 'score') txt = `${t('score')} ${g.val}+`;
    else if (g.type === 'collect') txt = `${g.gem} ×${g.val}`;
    else if (g.type === 'obstacle') txt = `${g.kind} ×${g.val}`;
    else if (g.type === 'boss') txt = `⚔️ ${BOSS_DEFS[g.val].name}`;
    UI.text(ctx, txt, w/2, goalY, { size:14, color:'#e0e0f0' });
  }

  // 턴 수
  UI.text(ctx, `${t('moves')}: ${def.turns + gDDA.extraTurns}`, w/2, goalY + 40, { size:14, color:'#f4a261' });

  // Skip 힌트
  ctx.globalAlpha = 0.5;
  UI.text(ctx, t('tapToStart'), w/2, h*0.85, { size:12, color:'#8080a0' });
  ctx.globalAlpha = 1;
}

// ─── 보스 인트로 ───
function renderBossIntro(ctx, w, h) {
  drawBackgroundCached(ctx, w, h, 'bgBoss');

  // 어둠 오버레이
  const darkAlpha = MathUtil.clamp(gCutsceneTimer / 500 * 0.7, 0, 0.7);
  ctx.fillStyle = `rgba(0,0,0,${darkAlpha})`;
  ctx.fillRect(0, 0, w, h);

  const boss = BOSS_DEFS[gBossIdx];

  // 보스 실루엣
  if (gCutsceneTimer > 300) {
    const t2 = MathUtil.clamp((gCutsceneTimer - 300) / 800, 0, 1);
    const scale = t2 < 0.7 ? MathUtil.lerp(0, 1.2, t2/0.7) : MathUtil.lerp(1.2, 1.0, (t2-0.7)/0.3);
    const bossSize = Math.min(w * 0.5, 200);
    const bx = w/2 - bossSize*scale/2, by = h*0.2;
    assets.draw(ctx, boss.asset, bx, by, bossSize*scale, bossSize*scale, '#8b008b');
  }

  // 보스명
  if (gCutsceneTimer > 1000) {
    const slideT = MathUtil.clamp((gCutsceneTimer - 1000) / 400, 0, 1);
    const nx = MathUtil.lerp(-200, w/2, slideT);
    UI.text(ctx, boss.name, nx, h*0.6, { size:28, bold:true, color:'#ff3333', glow:'#ff3333' });
  }

  // HP바
  if (gCutsceneTimer > 1400) {
    const slideT = MathUtil.clamp((gCutsceneTimer - 1400) / 300, 0, 1);
    const barW = Math.min(w * 0.6, 300);
    const barY = MathUtil.lerp(-30, h*0.68, slideT);
    UI.hpBar(ctx, (w-barW)/2, barY, barW, 20, gBossMaxHp, gBossMaxHp, { fgColor:'#ff3333', bgColor:'#4a0000' });
  }

  // 번개 파티클
  if (gCutsceneTimer > 1700 && gCutsceneTimer < 2500) {
    if (rng() < 0.15) {
      particles.emit(rng()*w, rng()*h*0.5, 2, { color:'#9b5de5', speed:200, life:0.3, size:3 });
    }
  }
}

// ─── 플레이 화면 ───
function renderPlay(ctx, w, h) {
  drawBackground(ctx, w, h, gBossIdx >= 0 ? 'bgBoss' : 'bgNormal');

  // 그리드 배경
  ctx.fillStyle = '#2a1a3a';
  ctx.globalAlpha = 0.8;
  ctx.fillRect(gGridX - 4, gGridY - 4, GRID_COLS * gCellSize + 8, GRID_ROWS * gCellSize + 8);
  ctx.globalAlpha = 1;

  // 그리드 셀 라인
  ctx.strokeStyle = '#3d2a52';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= GRID_ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(gGridX, gGridY + r * gCellSize);
    ctx.lineTo(gGridX + GRID_COLS * gCellSize, gGridY + r * gCellSize);
    ctx.stroke();
  }
  for (let c = 0; c <= GRID_COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(gGridX + c * gCellSize, gGridY);
    ctx.lineTo(gGridX + c * gCellSize, gGridY + GRID_ROWS * gCellSize);
    ctx.stroke();
  }

  // 보석 렌더링
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      renderCell(ctx, r, c);
    }
  }

  // 선택 하이라이트
  if (gSelected) {
    const sx = gGridX + gSelected.c * gCellSize, sy = gGridY + gSelected.r * gCellSize;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.strokeRect(sx + 2, sy + 2, gCellSize - 4, gCellSize - 4);
  }

  // 키보드 커서
  if (!input.isMobile) {
    const cx = gGridX + gCursorC * gCellSize, cy = gGridY + gCursorR * gCellSize;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(cx + 1, cy + 1, gCellSize - 2, gCellSize - 2);
    ctx.setLineDash([]);
  }

  // 부스터 선택 모드 하이라이트
  if (gSubState === SUB.BOOSTER_SELECT) {
    ctx.fillStyle = 'rgba(0,212,255,0.1)';
    ctx.fillRect(gGridX, gGridY, GRID_COLS * gCellSize, GRID_ROWS * gCellSize);
    UI.text(ctx, gActiveBooster === 'colorBomb' ? 'Select a gem color' : 'Select target', gW/2, gGridY - 15, { size:12, color:'#00d4ff' });
  }

  // HUD
  renderHUD(ctx, w, h);

  // 글로우 이펙트 (선택, 독 경고)
  renderGridGlow(ctx);

  // 힌트 표시
  renderHint(ctx);

  // 셔플 메시지
  if (gShuffleMsg > 0) {
    UI.text(ctx, t('noMoves'), w/2, h/2, { size:18, bold:true, color:'#f4a261', glow:'#f4a261' });
  }
}

function renderCell(ctx, r, c) {
  const cell = gGrid[r][c];
  const x = gGridX + c * gCellSize + cell.anim.x;
  const y = gGridY + r * gCellSize + cell.anim.y;
  const s = cell.anim.scale;
  const a = cell.anim.alpha;

  if (a <= 0 || s <= 0) return;

  ctx.save();
  ctx.globalAlpha = a;

  const cx = x + gCellSize / 2, cy = y + gCellSize / 2;
  const drawSize = (gCellSize - 4) * s;

  // 텔레포터 (향상된 포탈 렌더링)
  if (cell.teleporterId >= 0) {
    renderTeleporter(ctx, cx - drawSize/2, cy - drawSize/2, drawSize);
  }

  // 독 타일
  if (cell.poison) {
    assets.draw(ctx, 'obstaclePoison', cx - drawSize/2, cy - drawSize/2, drawSize, drawSize, '#8b008b');
    // 독 기포 파티클 이펙트
    const bubbleImg = assets.sprites.particlePoisonBubble;
    if (bubbleImg) {
      const bobY = Math.sin(gBgTime * 3 + r * 2 + c) * 3;
      ctx.globalAlpha = a * 0.5;
      ctx.drawImage(bubbleImg, cx - 6, cy - 12 + bobY, 12, 12);
    }
    ctx.restore();
    return;
  }

  // 나무 상자
  if (cell.obstacle === 'crate') {
    assets.draw(ctx, 'obstacleCrate', cx - drawSize/2, cy - drawSize/2, drawSize, drawSize, '#8B4513');
    // HP 표시
    if (cell.crateHp > 0) {
      UI.text(ctx, String(cell.crateHp), cx, cy, { size:14, bold:true, color:'#fff' });
    }
    ctx.restore();
    return;
  }

  // 잠금석 (향상된 렌더링)
  if (cell.obstacle === 'lock') {
    renderLockStone(ctx, cx - drawSize/2, cy - drawSize/2, drawSize, cell.lockColor);
    ctx.restore();
    return;
  }

  // 보석 (향상된 스프라이트 시트 + 폴백)
  if (cell.type) {
    renderGemEnhanced(ctx, cell.type, cx - drawSize/2, cy - drawSize/2, drawSize, a);

    // 스페셜 보석 오버레이 (향상된 렌더링)
    if (cell.special) {
      renderSpecialOverlay(ctx, cell.special, cell.lineDir, cx - drawSize/2, cy - drawSize/2, drawSize);
    }
  }

  // 얼음 오버레이 (향상된)
  if (cell.obstacle === 'ice') {
    renderIceOverlay(ctx, cx - drawSize/2, cy - drawSize/2, drawSize, cell.iceHp);
  }

  // 체인 오버레이 (향상된 흔들림 애니메이션)
  if (cell.chain) {
    renderChainOverlay(ctx, cx - drawSize/2, cy - drawSize/2, drawSize, gBgTime);
  }

  ctx.restore();
}

function gemAssetKey(type) {
  const map = { red:'gemRed', blue:'gemBlue', green:'gemGreen', yellow:'gemYellow', purple:'gemPurple', white:'gemWhite' };
  return map[type] || 'gemRed';
}

function renderHUD(ctx, w, h) {
  const hudY = 8;

  // 보스 HP바 (향상된)
  if (gBossIdx >= 0) {
    renderBossInfo(ctx, w);
  }

  // 턴 수 (경고 플래시)
  const turnX = w - 55, turnY = hudY + (gBossIdx >= 0 ? 42 : 8);
  assets.draw(ctx, 'uiTurnCounter', turnX - 2, turnY - 2, 50, 50, '#333');
  const turnColor = gTurnsLeft <= 3 ? (Math.sin(gTurnFlash) > 0 ? '#ff3333' : '#ff6600') : '#fff';
  UI.text(ctx, String(gTurnsLeft), turnX + 23, turnY + 24, { size:20, bold:true, color: turnColor });
  UI.text(ctx, t('moves'), turnX + 23, turnY + 44, { size:8, color:'#8080a0' });

  // 점수
  const scoreY = gBossIdx >= 0 ? hudY + 42 : hudY + 12;
  UI.text(ctx, `${t('score')}: ${gScore.toLocaleString()}`, 8, scoreY, { size:14, bold:true, color:'#ffd700', align:'left' });

  // 콤보
  if (gComboCount >= 2) {
    UI.text(ctx, `${t('combo')} ×${gComboCount}`, 8, scoreY + 18, { size:12, color:'#ff6600', align:'left' });
  }

  // 목표 표시 (진행률 바 포함)
  const goalX = 5, goalYPos = scoreY + (gComboCount >= 2 ? 36 : 22);
  renderGoalBars(ctx, goalX, goalYPos);

  // 부스터 버튼
  const bw = touchSafe(50), bh = touchSafe(40);
  const gap = 8;
  const totalW = 4 * bw + 3 * gap;
  const sx = (w - totalW) / 2;
  const sy = gGridY + GRID_ROWS * gCellSize + 10;
  const boosterTypes = ['shuffle','colorBomb','lineClear','shield'];
  const boosterAssets = ['uiBoosterShuffle','uiBoosterColorbomb','uiBoosterLineclear','uiBoosterShield'];
  const boosterLabels = [t('shuffle'),t('colorBomb'),t('lineClear'),t('shield')];

  for (let i=0; i<4; i++) {
    const bx = sx + i * (bw + gap);
    const count = gBoosters[boosterTypes[i]];
    const active = gActiveBooster === boosterTypes[i];
    const canUse = count > 0 && (boosterTypes[i] !== 'shield' || gBossIdx >= 0);

    ctx.fillStyle = active ? 'rgba(0,212,255,0.3)' : canUse ? 'rgba(108,60,247,0.3)' : 'rgba(50,50,70,0.3)';
    ctx.strokeStyle = active ? '#00d4ff' : canUse ? '#6c3cf7' : '#333';
    ctx.lineWidth = active ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(bx, sy, bw, bh, 6); ctx.fill(); ctx.stroke();

    // 아이콘
    const iconSize = Math.min(bw * 0.5, 28);
    assets.draw(ctx, boosterAssets[i], bx + (bw-iconSize)/2, sy + 2, iconSize, iconSize, canUse ? '#6c3cf7' : '#333');
    // 수량
    UI.text(ctx, `${count}`, bx + bw/2, sy + bh - 8, { size:10, bold:true, color: canUse ? '#fff' : '#555' });
  }

  // 실드 활성 표시
  if (gShieldActive) {
    UI.text(ctx, '🛡️ ' + t('shield'), w/2, sy - 5, { size:11, color:'#00d4ff' });
  }
}

// ─── 보스 격파 ───
function renderBossDefeat(ctx, w, h) {
  drawBackgroundCached(ctx, w, h, 'bgBoss');
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, h);

  const boss = BOSS_DEFS[gBossIdx];

  // 보스 깜빡임
  if (gCutsceneTimer < 1000) {
    const blink = Math.floor(gCutsceneTimer / 200) % 2 === 0;
    if (blink) {
      const bs = Math.min(w*0.4, 180);
      assets.draw(ctx, boss.asset, w/2-bs/2, h*0.15, bs, bs, '#8b008b');
    }
  }

  // 폭발
  if (gCutsceneTimer > 1000 && gCutsceneTimer < 1400) {
    const flash = 1 - (gCutsceneTimer - 1000) / 400;
    ctx.fillStyle = `rgba(255,255,255,${flash})`;
    ctx.fillRect(0, 0, w, h);
    if (rng() < 0.3) particles.emit(rng()*w, rng()*h, 5, { color:'#ffd700', speed:150, life:0.8, size:5 });
  }

  // VICTORY
  if (gCutsceneTimer > 1400) {
    const t2 = MathUtil.clamp((gCutsceneTimer - 1400) / 600, 0, 1);
    const scale = t2 < 0.6 ? MathUtil.lerp(0, 1.5, t2/0.6) : MathUtil.lerp(1.5, 1.0, (t2-0.6)/0.4);
    ctx.save();
    ctx.translate(w/2, h*0.4);
    ctx.scale(scale, scale);
    UI.text(ctx, t('victory'), 0, 0, { size:40, bold:true, color:'#ffd700', glow:'#ffd700' });
    ctx.restore();
  }

  // 보석 비
  if (gCutsceneTimer > 2000 && gCutsceneTimer < 2500) {
    if (rng() < 0.2) {
      const gemC = GEM_COLORS[GEM_TYPES[rngInt(0,5)]];
      particles.emit(rng()*w, -10, 1, { color:gemC, speed:100, life:1.5, size:8, angle:Math.PI/2, spread:0.5 });
    }
  }

  // 도감 카드
  if (gCutsceneTimer > 2500) {
    const slideT = MathUtil.clamp((gCutsceneTimer - 2500) / 400, 0, 1);
    const cardW = 160, cardH = 220;
    const cardY = MathUtil.lerp(h + 50, h*0.35, slideT);
    const cardX = w/2 - cardW/2;
    assets.draw(ctx, 'uiBestiaryCard', cardX, cardY, cardW, cardH, '#2a1a4e');
    const bossIconSize = 100;
    assets.draw(ctx, boss.asset, cardX + (cardW-bossIconSize)/2, cardY + 15, bossIconSize, bossIconSize, '#8b008b');
    UI.text(ctx, boss.name, w/2, cardY + bossIconSize + 30, { size:14, bold:true, color:'#ffd700' });
    UI.text(ctx, t('bossDefeated'), w/2, cardY + bossIconSize + 50, { size:12, color:'#00ff87' });
  }
}

// ─── 레벨 완료 ───
function renderComplete(ctx, w, h) {
  drawBackgroundCached(ctx, w, h, 'bgNormal');
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  ctx.fillRect(0, 0, w, h);

  const stars = calcStars(gCurrentLevel, gTurnsLeft);

  UI.text(ctx, t('victory'), w/2, h*0.17, { size:36, bold:true, color:'#ffd700', glow:'#ffd700' });
  UI.text(ctx, `${t('level')} ${gCurrentLevel+1}`, w/2, h*0.26, { size:18, color:'#e0e0f0' });
  UI.text(ctx, `${t('score')}: ${gScore}`, w/2, h*0.35, { size:18, bold:true, color:'#ffd700' });
  UI.text(ctx, `${t('moves')} +${gTurnsLeft * 100}`, w/2, h*0.41, { size:14, color:'#f4a261' });
  // 보스 격파 보너스 표시
  if (gLevelCompleteBossBonus > 0) {
    UI.text(ctx, `Boss Bonus +${gLevelCompleteBossBonus}`, w/2, h*0.47, { size:14, color:'#ff6600' });
  }
  // 총점
  UI.text(ctx, `TOTAL: ${gLevelCompleteScore.toLocaleString()}`, w/2, h*0.53, { size:20, bold:true, color:'#fff' });

  // 별
  const starSize = 32;
  const starY = h * 0.59;
  for (let i=0; i<3; i++) {
    const sx = w/2 + (i-1) * (starSize + 10) - starSize/2;
    const filled = i < stars;
    assets.draw(ctx, filled ? 'uiStarFilled' : 'uiStarEmpty', sx, starY, starSize, starSize, filled ? '#ffd700' : '#555');
  }

  // 부스터 보상 표시
  let rewardY = h * 0.68;
  if (stars >= 3) {
    UI.text(ctx, `+1 ${t('shuffle')} ★★★`, w/2, rewardY, { size:12, color:'#00ff87' });
    rewardY += 18;
  }
  if (gBossIdx >= 0) {
    UI.text(ctx, `+1 ${t('lineClear')} (Boss)`, w/2, rewardY, { size:12, color:'#00ff87' });
    rewardY += 18;
  }

  // 다음 버튼
  const btnW = 160, btnH = 48;
  const btnY = Math.max(rewardY + 8, h * 0.76);
  UI.button(ctx, t('next'), (w-btnW)/2, btnY, btnW, btnH, { color:'#6c3cf7' });
  UI.text(ctx, 'Space / Tap', w/2, btnY + btnH + 12, { size:11, color:'#8080a0' });
}

// ─── 레벨 실패 ───
function renderFail(ctx, w, h) {

// ─── 일시정지 오버레이 ───
function renderPauseOverlay(ctx, w, h) {

        {f:294,d:0.1},{f:262,d:0.1},{f:220,d:0.15},{f:0,d:0.05},{f:196,d:0.1},{f:175,d:0.15},{f:165,d:0.2},{f:0,d:0.3}
      ]
    },
    victory: {
      bpm: 140, loop: false,
      notes: [
        {f:523,d:0.15},{f:587,d:0.15},{f:659,d:0.2},{f:0,d:0.1},{f:784,d:0.3},{f:0,d:0.1},
        {f:659,d:0.15},{f:784,d:0.15},{f:880,d:0.3},{f:0,d:0.1},{f:1047,d:0.5},{f:0,d:0.2},
        {f:880,d:0.15},{f:784,d:0.15},{f:659,d:0.2},{f:784,d:0.4},{f:0,d:0.5}
      ]
    }
  },

  play(trackName) {
    if (this._track === trackName && this._playing) return;
    this._track = trackName;
    this._playing = true;
    this._timer = 0;
    this._noteIndex = 0;
  },

  stop() {
    this._playing = false;
    this._track = null;
  },

  update(dt) {
    if (!this._playing || !this._track) return;
    const track = this.tracks[this._track];
    if (!track) return;

    this._timer += dt / 1000;
    const note = track.notes[this._noteIndex];
    if (!note) {
      if (track.loop) { this._noteIndex = 0; this._timer = 0; }
      else { this._playing = false; }
      return;
    }

    if (this._timer >= note.d) {
      this._timer -= note.d;
      if (note.f > 0) {
        sound.tone(note.f, Math.min(note.d * 0.9, 0.15), 'sine', 0.12);
      }
      this._noteIndex++;
      if (this._noteIndex >= track.notes.length) {
        if (track.loop) { this._noteIndex = 0; }
        else { this._playing = false; }
      }
    }
  }
};
