// ═══════════════════════════════════════════════════════════
// SPRITE SHEET ANIMATION SYSTEM
// ═══════════════════════════════════════════════════════════
const GEM_SPRITES = {}; // gemType → Sprite instance
const EFFECT_SPRITES = {}; // effectKey → {image, frameW, frameH, frameCount}

function initSpriteSheets() {
  // 보석 스프라이트 시트 (6프레임 반짝임 애니메이션)
  const gemSheetKeys = {
    red: 'gemRedSheet', blue: 'gemBlueSheet', green: 'gemGreenSheet',
    yellow: 'gemYellowSheet', purple: 'gemPurpleSheet', white: 'gemWhiteSheet'
  };
  for (const [gemType, sheetKey] of Object.entries(gemSheetKeys)) {
    const img = assets.sprites[sheetKey];
    if (img) {
      GEM_SPRITES[gemType] = new Sprite(img, 128, 128, 6, 8);
    }
  }

  // 이펙트 스프라이트 시트
  const effectSheets = {
    matchBurst: { key:'effectMatchBurst', fw:128, fh:128, fc:4 },
    bombShockwave: { key:'effectBombShockwave', fw:128, fh:128, fc:4 },
    bossEntrance: { key:'effectBossEntrance', fw:128, fh:128, fc:4 }
  };
  for (const [eName, eDef] of Object.entries(effectSheets)) {
    const img = assets.sprites[eDef.key];
    if (img) {
      EFFECT_SPRITES[eName] = { image:img, fw:eDef.fw, fh:eDef.fh, fc:eDef.fc };
    }
  }
}

function updateSpriteSheets(dt) {
  for (const sp of Object.values(GEM_SPRITES)) {
    sp.update(dt);
  }
}

// ═══════════════════════════════════════════════════════════
// ACTIVE EFFECTS (화면 이펙트 큐)
// ═══════════════════════════════════════════════════════════
const gActiveEffects = []; // {type, x, y, timer, maxTime, data}

function addEffect(type, x, y, duration, data) {
  gActiveEffects.push({ type, x, y, timer:0, maxTime:duration, data:data||{} });
}

function updateEffects(dt) {
  for (let i = gActiveEffects.length - 1; i >= 0; i--) {
    gActiveEffects[i].timer += dt;
    if (gActiveEffects[i].timer >= gActiveEffects[i].maxTime) {
      gActiveEffects.splice(i, 1);
    }
  }
}

function renderEffects(ctx) {
  for (const fx of gActiveEffects) {
    const progress = fx.timer / fx.maxTime;
    ctx.save();

    switch(fx.type) {
      case 'matchBurst': {
        const sprite = EFFECT_SPRITES.matchBurst;
        if (sprite) {
          const frame = Math.min(Math.floor(progress * sprite.fc), sprite.fc - 1);
          const size = gCellSize * (1 + progress);
          ctx.globalAlpha = 1 - progress;
          ctx.drawImage(sprite.image, frame * sprite.fw, 0, sprite.fw, sprite.fh,
            fx.x - size/2, fx.y - size/2, size, size);
        } else {
          // 폴백: 원형 폭발
          ctx.globalAlpha = 1 - progress;
          ctx.fillStyle = fx.data.color || '#ffd700';
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, gCellSize * progress * 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      }
      case 'lineLaser': {
        const laserImg = assets.sprites.effectLineLaser;
        const alpha = 1 - progress;
        ctx.globalAlpha = alpha;
        if (fx.data.dir === 'h') {
          if (laserImg) {
            ctx.drawImage(laserImg, gGridX, fx.y - 16, GRID_COLS * gCellSize, 32);
          } else {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(gGridX, fx.y - 4, GRID_COLS * gCellSize, 8);
            // 글로우
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
            ctx.fillRect(gGridX, fx.y - 2, GRID_COLS * gCellSize, 4);
          }
        } else {
          if (laserImg) {
            ctx.save();
            ctx.translate(fx.x, gGridY + GRID_ROWS * gCellSize / 2);
            ctx.rotate(Math.PI / 2);
            ctx.drawImage(laserImg, -GRID_ROWS * gCellSize / 2, -16, GRID_ROWS * gCellSize, 32);
            ctx.restore();
          } else {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(fx.x - 4, gGridY, 8, GRID_ROWS * gCellSize);
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
            ctx.fillRect(fx.x - 2, gGridY, 4, GRID_ROWS * gCellSize);
          }
        }
        break;
      }
      case 'bombShockwave': {
        const sprite = EFFECT_SPRITES.bombShockwave;
        const size = gCellSize * 3 * (0.5 + progress * 0.5);
        ctx.globalAlpha = 1 - progress;
        if (sprite) {
          const frame = Math.min(Math.floor(progress * sprite.fc), sprite.fc - 1);
          ctx.drawImage(sprite.image, frame * sprite.fw, 0, sprite.fw, sprite.fh,
            fx.x - size/2, fx.y - size/2, size, size);
        } else {
          ctx.strokeStyle = '#9b5de5';
          ctx.lineWidth = 3 * (1 - progress);
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, size/2, 0, Math.PI * 2);
          ctx.stroke();
        }
        break;
      }
      case 'bossHitFlash': {
        const hitImg = assets.sprites.effectBossHit;
        ctx.globalAlpha = 1 - progress;
        const size = 80 + progress * 40;
        if (hitImg) {
          ctx.drawImage(hitImg, fx.x - size/2, fx.y - size/2, size, size);
        } else {
          ctx.fillStyle = '#ff3333';
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, size/3, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      }
      case 'poisonSpreadFx': {
        const poisonImg = assets.sprites.effectPoisonSpread;
        ctx.globalAlpha = 0.7 * (1 - progress);
        const size = gCellSize;
        if (poisonImg) {
          ctx.drawImage(poisonImg, fx.x - size/2, fx.y - size/2, size, size);
        } else {
          ctx.fillStyle = '#8b008b';
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, size * 0.3 * (1 + progress), 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      }
      case 'victoryBurst': {
        const vImg = assets.sprites.effectVictoryBurst;
        const size = 200 * (0.3 + progress * 0.7);
        ctx.globalAlpha = 1 - progress * 0.8;
        if (vImg) {
          ctx.drawImage(vImg, fx.x - size/2, fx.y - size/2, size, size);
        } else {
          ctx.fillStyle = '#ffd700';
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2 + progress * Math.PI;
            const dist = size * 0.3 * progress;
            ctx.beginPath();
            ctx.arc(fx.x + Math.cos(a)*dist, fx.y + Math.sin(a)*dist, 5*(1-progress), 0, Math.PI*2);
            ctx.fill();
          }
        }
        break;
      }
      case 'comboGlow': {
        const comboImg = assets.sprites.effectComboText;
        const size = 60 + fx.data.size * 2;
        ctx.globalAlpha = (1 - progress) * 0.6;
        if (comboImg) {
          ctx.drawImage(comboImg, fx.x - size/2, fx.y - size/2, size, size);
        } else {
          ctx.fillStyle = '#ffd700';
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, size * 0.3 * (1-progress*0.5), 0, Math.PI*2);
          ctx.fill();
        }
        break;
      }
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// OFFSCREEN BACKGROUND CACHE
// ═══════════════════════════════════════════════════════════
let gBgCacheNormal = null, gBgCacheBoss = null;
let gBgCacheW = 0, gBgCacheH = 0;

function buildBackgroundCache(w, h) {
  if (gBgCacheW === w && gBgCacheH === h) return;
  gBgCacheW = w; gBgCacheH = h;

  // Normal 배경 캐시
  gBgCacheNormal = document.createElement('canvas');
  gBgCacheNormal.width = w; gBgCacheNormal.height = h;
  const nctx = gBgCacheNormal.getContext('2d');
  if (assets.sprites.bgNormal) {
    nctx.drawImage(assets.sprites.bgNormal, 0, 0, w, h);
  } else {
    const grad = nctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#1a0a2e');
    grad.addColorStop(1, '#0d1b2a');
    nctx.fillStyle = grad;
    nctx.fillRect(0, 0, w, h);
    // 별
    nctx.fillStyle = '#fff';
    for (let i = 0; i < 60; i++) {
      const sx = (i * 73 + 17) % w, sy = (i * 47 + 31) % h;
      const ss = (i % 3 === 0) ? 2 : 1;
      nctx.globalAlpha = 0.15 + (i % 5) * 0.08;
      nctx.fillRect(sx, sy, ss, ss);
    }
    nctx.globalAlpha = 1;
    // 성 실루엣
    nctx.fillStyle = '#0d0a1a';
    nctx.beginPath();
    nctx.moveTo(w * 0.1, h * 0.85);
    nctx.lineTo(w * 0.15, h * 0.6); nctx.lineTo(w * 0.18, h * 0.65);
    nctx.lineTo(w * 0.25, h * 0.5); nctx.lineTo(w * 0.3, h * 0.7);
    nctx.lineTo(w * 0.4, h * 0.75); nctx.lineTo(w * 0.5, h * 0.55);
    nctx.lineTo(w * 0.6, h * 0.7); nctx.lineTo(w * 0.7, h * 0.6);
    nctx.lineTo(w * 0.75, h * 0.65); nctx.lineTo(w * 0.85, h * 0.5);
    nctx.lineTo(w * 0.9, h * 0.75); nctx.lineTo(w, h * 0.85);
    nctx.lineTo(w, h); nctx.lineTo(0, h);
    nctx.closePath(); nctx.fill();
  }

  // Boss 배경 캐시
  gBgCacheBoss = document.createElement('canvas');
  gBgCacheBoss.width = w; gBgCacheBoss.height = h;
  const bctx = gBgCacheBoss.getContext('2d');
  if (assets.sprites.bgBoss) {
    bctx.drawImage(assets.sprites.bgBoss, 0, 0, w, h);
  } else {
    const grad = bctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#1a0010');
    grad.addColorStop(0.5, '#2a0020');
    grad.addColorStop(1, '#0d0a1a');
    bctx.fillStyle = grad;
    bctx.fillRect(0, 0, w, h);
    // 마법진
    bctx.strokeStyle = 'rgba(155,93,229,0.15)';
    bctx.lineWidth = 1;
    const cx = w/2, cy = h * 0.7;
    for (let i = 0; i < 3; i++) {
      bctx.beginPath();
      bctx.arc(cx, cy, 80 + i * 60, 0, Math.PI * 2);
      bctx.stroke();
    }
    // 룬 기호 (삼각형들)
    bctx.strokeStyle = 'rgba(155,93,229,0.1)';
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const dist = 120;
      const rx = cx + Math.cos(a) * dist, ry = cy + Math.sin(a) * dist;
      bctx.beginPath();
      bctx.moveTo(rx, ry - 15); bctx.lineTo(rx + 13, ry + 10); bctx.lineTo(rx - 13, ry + 10);
      bctx.closePath(); bctx.stroke();
    }
    // 파괴된 성벽 실루엣
    bctx.fillStyle = '#0a0008';
    bctx.beginPath();
    bctx.moveTo(0, h * 0.9);
    for (let x = 0; x <= w; x += 30) {
      const baseY = h * 0.9;
      const spike = (x % 90 === 0) ? -40 - (x % 180 === 0 ? 20 : 0) : -10;
      bctx.lineTo(x, baseY + spike);
    }
    bctx.lineTo(w, h); bctx.lineTo(0, h);
    bctx.closePath(); bctx.fill();
  }
}

// 배경 렌더를 캐시 버전으로 교체
function drawBackgroundCached(ctx, w, h, assetKey) {
  buildBackgroundCache(w, h);
  if (assetKey === 'bgBoss' && gBgCacheBoss) {
    ctx.drawImage(gBgCacheBoss, 0, 0);
  } else if (gBgCacheNormal) {
    ctx.drawImage(gBgCacheNormal, 0, 0);
  }
}

let gShowBestiary = false;

      UI.text(ctx, '???', cx + cardW/2, cy + cardW * 0.65 + 20, { size:14, bold:true, color:'#505070' });

  // 왕국 수호자 칭호
  if (gBossDefeated.every(b => b)) {
    UI.text(ctx, `🏆 ${t('guardianTitle')}`, w/2, h - 60, { size:18, bold:true, color:'#ffd700', glow:'#ffd700' });

// ═══════════════════════════════════════════════════════════
// ANIMATED BACKGROUND ELEMENTS (배경 인터랙티브/애니메이션)
// ═══════════════════════════════════════════════════════════
const gBgParticles = []; // 배경 파티클 (떠다니는 보석/불꽃)
let gBgTime = 0;

function updateBgElements(dt) {
  gBgTime += dt / 1000;

  // 타이틀/월드맵: 떠다니는 보석 파티클
  if (gState === STATE.TITLE || gState === STATE.WORLD_MAP) {
    if (gBgParticles.length < 15 && rng() < 0.02) {
      const gemIdx = rngInt(0, 5);
      gBgParticles.push({
        x: rng() * gW, y: gH + 20,
        vy: -(20 + rng() * 30),
        vx: (rng() - 0.5) * 10,
        size: 8 + rng() * 12,
        color: GEM_COLORS[GEM_TYPES[gemIdx]],
        alpha: 0.3 + rng() * 0.3,
        rotation: rng() * Math.PI * 2,
        rotSpeed: (rng() - 0.5) * 2,
        life: 5 + rng() * 5
      });
    }
  }

  // 보스전: 번개 + 화산 파티클
  if (gState === STATE.PLAY && gBossIdx >= 0) {
    if (rng() < 0.01) {
      addBgLightning();
    }
  }

  // 파티클 업데이트
  for (let i = gBgParticles.length - 1; i >= 0; i--) {
    const p = gBgParticles[i];
    p.x += p.vx * (dt / 1000);
    p.y += p.vy * (dt / 1000);
    p.rotation += p.rotSpeed * (dt / 1000);
    p.life -= dt / 1000;
    if (p.life <= 0 || p.y < -30) {
      gBgParticles.splice(i, 1);
    }
  }
}

function addBgLightning() {
  // 간단한 번개 효과
  const x = rng() * gW;
  gBgParticles.push({
    x, y: 0,
    vy: 300 + rng() * 200,
    vx: (rng() - 0.5) * 50,
    size: 2,
    color: '#9b5de5',
    alpha: 0.8,
    rotation: 0,
    rotSpeed: 0,
    life: 0.3 + rng() * 0.2,
    lightning: true
  });
}

function renderBgElements(ctx, w, h) {
  for (const p of gBgParticles) {
    ctx.save();
    ctx.globalAlpha = p.alpha * Math.min(1, p.life);

    if (p.lightning) {
      // 번개 렌더
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      let lx = p.x, ly = p.y;
      for (let seg = 0; seg < 5; seg++) {
        lx += (rng() - 0.5) * 30;
        ly += 30 + rng() * 20;
        ctx.lineTo(lx, ly);
      }
      ctx.stroke();
    } else {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      // 보석 형태
      ctx.fillStyle = p.color;
      ctx.beginPath();
      const s = p.size / 2;
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.7, -s * 0.3);
      ctx.lineTo(s, s * 0.3);
      ctx.lineTo(0, s);
      ctx.lineTo(-s, s * 0.3);
      ctx.lineTo(-s * 0.7, -s * 0.3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// GRID CELL GLOW / SELECTION ANIMATIONS
// ═══════════════════════════════════════════════════════════
let gSelectionPulse = 0; // 0~2π 사이클

function updateSelectionPulse(dt) {
  gSelectionPulse += dt * 0.005;
  if (gSelectionPulse > Math.PI * 2) gSelectionPulse -= Math.PI * 2;
}

function renderGridGlow(ctx) {
  // 선택된 보석 글로우 펄스
  if (gSelected && gState === STATE.PLAY && gSubState === SUB.IDLE) {
    const sx = gGridX + gSelected.c * gCellSize;
    const sy = gGridY + gSelected.r * gCellSize;
    const pulse = Math.sin(gSelectionPulse) * 0.3 + 0.5;

    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 15 * pulse;
    ctx.strokeRect(sx + 1, sy + 1, gCellSize - 2, gCellSize - 2);
    ctx.restore();
  }

  // 독 타일 경고 글로우
  if (gState === STATE.PLAY) {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        if (gGrid[r] && gGrid[r][c] && gGrid[r][c].poison) {
          const px = gGridX + c * gCellSize;
          const py = gGridY + r * gCellSize;
          const pulse = Math.sin(gBgTime * 3 + r + c) * 0.15 + 0.15;
          ctx.save();
          ctx.globalAlpha = pulse;
          ctx.fillStyle = '#8b008b';
          ctx.fillRect(px, py, gCellSize, gCellSize);
          ctx.restore();
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// TURN INDICATOR ANIMATION
// ═══════════════════════════════════════════════════════════
let gTurnFlash = 0;

function updateTurnFlash(dt) {
  if (gTurnsLeft <= 3 && gState === STATE.PLAY) {
    gTurnFlash += dt * 0.008;
    if (gTurnFlash > Math.PI * 2) gTurnFlash -= Math.PI * 2;
  } else {
    gTurnFlash = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// CHAIN RENDERING (체인 보석 체인 애니메이션)
// ═══════════════════════════════════════════════════════════
function renderChainOverlay(ctx, x, y, size, chainTime) {
  const chainImg = assets.sprites.obstacleChain;
  ctx.save();
  ctx.globalAlpha = 0.85;
  // 살짝 흔들림
  const shake = Math.sin(chainTime * 2) * 1.5;
  if (chainImg) {
    ctx.drawImage(chainImg, x + shake, y, size, size);
  } else {
    // 폴백: X 형태 체인
    ctx.strokeStyle = '#aaaaaa';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x + shake + size * 0.15, y + size * 0.15);
    ctx.lineTo(x + shake + size * 0.85, y + size * 0.85);
    ctx.moveTo(x + shake + size * 0.85, y + size * 0.15);
    ctx.lineTo(x + shake + size * 0.15, y + size * 0.85);
    ctx.stroke();
    // 자물쇠
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(x + shake + size/2, y + size/2, size * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// TELEPORTER RENDERING (텔레포터 포탈 애니메이션)
// ═══════════════════════════════════════════════════════════
function renderTeleporter(ctx, x, y, size) {
  const img = assets.sprites.obstacleTeleporter;
  ctx.save();
  // 회전 애니메이션
  const rot = gBgTime * 1.5;
  ctx.translate(x + size/2, y + size/2);
  ctx.rotate(rot);

  if (img) {
    ctx.drawImage(img, -size/2, -size/2, size, size);
  } else {
    // 폴백: 회전하는 동심원
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.globalAlpha = 0.3 + i * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, size * (0.15 + i * 0.1), 0, Math.PI * 2);
      ctx.stroke();
    }
    // 중앙 빛
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// LOCK STONE RENDERING (잠금석 색 표시)
// ═══════════════════════════════════════════════════════════
function renderLockStone(ctx, x, y, size, lockColor) {
  const img = assets.sprites.obstacleLock;
  ctx.save();

  if (img) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    // 폴백
    ctx.fillStyle = '#708090';
    ctx.beginPath();
    ctx.roundRect(x + size*0.1, y + size*0.1, size*0.8, size*0.8, size*0.1);
    ctx.fill();
    // 열쇠 구멍
    ctx.fillStyle = '#3a3a4a';
    ctx.beginPath();
    ctx.arc(x + size/2, y + size * 0.45, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(x + size/2 - size*0.03, y + size*0.5, size*0.06, size*0.15);
  }

  // 색 아이콘 (어떤 색으로 해제해야 하는지)
  if (lockColor) {
    const iconSize = size * 0.22;
    ctx.fillStyle = GEM_COLORS[lockColor] || '#fff';
    ctx.shadowColor = GEM_COLORS[lockColor] || '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x + size/2, y + size * 0.22, iconSize/2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// ICE OVERLAY (얼음 빙결 + 크랙 애니메이션)
// ═══════════════════════════════════════════════════════════
function renderIceOverlay(ctx, x, y, size, hp) {
  const iceKey = hp >= 2 ? 'obstacleIce-2' : 'obstacleIce-1';
  ctx.save();
  ctx.globalAlpha = hp >= 2 ? 0.75 : 0.5;

  if (assets.sprites[iceKey]) {
    ctx.drawImage(assets.sprites[iceKey], x, y, size, size);
  } else {
    // 폴백: 얼음
    ctx.fillStyle = hp >= 2 ? 'rgba(120,180,255,0.6)' : 'rgba(180,220,255,0.4)';
    ctx.fillRect(x, y, size, size);
    // 서리 패턴
    ctx.strokeStyle = 'rgba(200,230,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + size*0.2, y + size*0.3);
    ctx.lineTo(x + size*0.5, y + size*0.5);
    ctx.lineTo(x + size*0.8, y + size*0.2);
    ctx.stroke();
    if (hp >= 2) {
      ctx.beginPath();
      ctx.moveTo(x + size*0.3, y + size*0.7);
      ctx.lineTo(x + size*0.6, y + size*0.6);
      ctx.lineTo(x + size*0.7, y + size*0.8);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// WORLD MAP ENHANCED RENDERING (경로 연결선 + 보스 글로우)
// ═══════════════════════════════════════════════════════════
function renderMapPath(ctx, w, h, scrollY) {
  const nodeW = Math.min(w - 40, 360);
  const startX = (w - nodeW) / 2;
  const nodeH = 44;
  const gap = 8;

  // 노드 간 연결선
  ctx.strokeStyle = '#3d2a52';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);

  for (let i = 0; i < 19; i++) {
    const y1 = 80 + i * (nodeH + gap) + nodeH - scrollY;
    const y2 = 80 + (i+1) * (nodeH + gap) - scrollY;
    const cx = startX + nodeW / 2;

    if (y1 < 40 || y2 > h - 40) continue;

    const unlocked = i + 1 <= gMaxUnlocked;
    ctx.strokeStyle = unlocked ? '#6c3cf7' : '#2a1a3a';

    ctx.beginPath();
    ctx.moveTo(cx, y1);
    ctx.lineTo(cx, y2);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // 보스 노드 글로우
  for (let i = 0; i < 20; i++) {
    const def = LEVEL_DEFS[i];
    if (def.boss === undefined) continue;
    const ny = 80 + i * (nodeH + gap) - scrollY;
    if (ny < 40 || ny > h - 40) continue;

    const pulse = Math.sin(gBgTime * 2 + i) * 0.15 + 0.15;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.roundRect(startX - 3, ny - 3, nodeW + 6, nodeH + 6, 10);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// SCORE POPUP SYSTEM (점수 팝업 + 스케일 애니메이션)
// ═══════════════════════════════════════════════════════════
function renderScorePopups(ctx) {
  for (const p of gPopups) {
    const lifeRatio = p.life / p.maxLife;
    const scale = lifeRatio > 0.8 ? MathUtil.lerp(1.5, 1.0, (1 - lifeRatio) / 0.2) : 1.0;

    ctx.save();
    ctx.globalAlpha = lifeRatio;
    ctx.translate(p.x, p.y + p.oy);
    ctx.scale(scale, scale);

    // 그림자
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${p.size}px ${FONT}`;
    ctx.fillText(p.text, 1, 1);

    // 텍스트
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillText(p.text, 0, 0);

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// ENHANCED GEM RENDERING (스프라이트 시트 + 글로우 + 반짝임)
// ═══════════════════════════════════════════════════════════
function renderGemEnhanced(ctx, gemType, x, y, size, alpha) {
  if (!gemType) return;

  ctx.save();
  ctx.globalAlpha = alpha || 1;

  // 스프라이트 시트가 있으면 애니메이션 프레임 사용
  const sprite = GEM_SPRITES[gemType];
  if (sprite && sprite.image) {
    sprite.draw(ctx, x, y, size, size);
  } else {
    // PNG 에셋 시도
    const assetKey = gemAssetKey(gemType);
    if (assets.sprites[assetKey]) {
      ctx.drawImage(assets.sprites[assetKey], x, y, size, size);
    } else {
      // Canvas 폴백 드로잉
      drawGemFallback(ctx, gemType, x, y, size);
    }
  }

  ctx.restore();
}

function drawGemFallback(ctx, gemType, x, y, size) {
  const color = GEM_COLORS[gemType] || '#888';
  const cx = x + size/2, cy = y + size/2;
  const r = size * 0.4;

  ctx.save();

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.arc(cx + 2, cy + 2, r, 0, Math.PI * 2);
  ctx.fill();

  // 보석 형태별 드로잉
  ctx.fillStyle = color;
  switch(gemType) {
    case 'red': // 하트컷
      ctx.beginPath();
      ctx.moveTo(cx, cy + r * 0.8);
      ctx.bezierCurveTo(cx - r * 1.2, cy + r * 0.2, cx - r * 0.8, cy - r * 0.8, cx, cy - r * 0.3);
      ctx.bezierCurveTo(cx + r * 0.8, cy - r * 0.8, cx + r * 1.2, cy + r * 0.2, cx, cy + r * 0.8);
      ctx.fill();
      break;
    case 'blue': // 원형
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'green': // 육각형
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
        ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      break;
    case 'yellow': // 방패
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy - r * 0.3);
      ctx.lineTo(cx + r * 0.7, cy + r * 0.8);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r * 0.7, cy + r * 0.8);
      ctx.lineTo(cx - r, cy - r * 0.3);
      ctx.closePath();
      ctx.fill();
      break;
    case 'purple': // 물방울
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.bezierCurveTo(cx + r * 0.6, cy - r * 0.3, cx + r, cy + r * 0.3, cx, cy + r);
      ctx.bezierCurveTo(cx - r, cy + r * 0.3, cx - r * 0.6, cy - r * 0.3, cx, cy - r);
      ctx.fill();
      break;
    case 'white': // 다이아몬드
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      ctx.fill();
      break;
  }

  // 하이라이트 (좌상단)
  const hlGrad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, 0, cx - r*0.3, cy - r*0.3, r*0.6);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.arc(cx - r*0.2, cy - r*0.2, r*0.5, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// SPECIAL GEM OVERLAY RENDERING (스페셜 이펙트)
// ═══════════════════════════════════════════════════════════
function renderSpecialOverlay(ctx, special, lineDir, x, y, size) {
  if (!special) return;
  ctx.save();

  const cx = x + size/2, cy = y + size/2;

  switch(special) {
    case 'line': {
      const assetKey = lineDir === 'h' ? 'specialLineH' : 'specialLineV';
      ctx.globalAlpha = 0.85;
      if (assets.sprites[assetKey]) {
        ctx.drawImage(assets.sprites[assetKey], x, y, size, size);
      } else {
        // 폴백: 화살표
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 8;
        if (lineDir === 'h') {
          ctx.beginPath();
          ctx.moveTo(x + size*0.15, cy); ctx.lineTo(x + size*0.85, cy);
          // 화살표 머리
          ctx.moveTo(x + size*0.25, cy - size*0.12); ctx.lineTo(x + size*0.15, cy); ctx.lineTo(x + size*0.25, cy + size*0.12);
          ctx.moveTo(x + size*0.75, cy - size*0.12); ctx.lineTo(x + size*0.85, cy); ctx.lineTo(x + size*0.75, cy + size*0.12);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(cx, y + size*0.15); ctx.lineTo(cx, y + size*0.85);
          ctx.moveTo(cx - size*0.12, y + size*0.25); ctx.lineTo(cx, y + size*0.15); ctx.lineTo(cx + size*0.12, y + size*0.25);
          ctx.moveTo(cx - size*0.12, y + size*0.75); ctx.lineTo(cx, y + size*0.85); ctx.lineTo(cx + size*0.12, y + size*0.75);
          ctx.stroke();
        }
      }
      break;
    }
    case 'bomb': {
      ctx.globalAlpha = 0.85;
      if (assets.sprites.specialBomb) {
        ctx.drawImage(assets.sprites.specialBomb, x, y, size, size);
      } else {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // 중앙 핵
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'rainbow': {
      ctx.globalAlpha = 0.85;
      if (assets.sprites.specialRainbow) {
        ctx.drawImage(assets.sprites.specialRainbow, x, y, size, size);
      } else {
        // 무지개 프리즘 폴백
        const colors = ['#e63946','#f4a261','#ffd700','#2a9d8f','#457b9d','#9b5de5'];
        for (let i = 0; i < 6; i++) {
          ctx.fillStyle = colors[i];
          ctx.beginPath();
          const a1 = (i / 6) * Math.PI * 2 - Math.PI / 2;
          const a2 = ((i + 1) / 6) * Math.PI * 2 - Math.PI / 2;
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, size * 0.38, a1, a2);
          ctx.closePath();
          ctx.fill();
        }
        // 중앙 밝은 점
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.1, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// ENHANCED HUD — 보스 약점 표시 + 턴 경고
// ═══════════════════════════════════════════════════════════
function renderBossInfo(ctx, w) {
  if (gBossIdx < 0) return;
  const boss = BOSS_DEFS[gBossIdx];

  // 보스 소형 초상화
  const portraitSize = 36;
  const px = 8, py = 4;
  assets.draw(ctx, boss.asset, px, py, portraitSize, portraitSize, '#8b008b');

  // 약점 텍스트
  UI.text(ctx, boss.weakDesc, px + portraitSize + 8, py + portraitSize/2, { size:9, color:'#ff6600', align:'left' });

  // HP 비율 기반 색상
  const hpRatio = gBossHp / gBossMaxHp;
  const hpColor = hpRatio > 0.5 ? '#ff3333' : hpRatio > 0.25 ? '#ff6600' : '#ff0000';

  // HP바 (상단 중앙)
  const barW = Math.min(w * 0.45, 200);
  const barX = (w - barW) / 2;
  const barY = 10;

  // 프레임
  if (assets.sprites.uiHpBarFrame) {
    ctx.drawImage(assets.sprites.uiHpBarFrame, barX - 8, barY - 4, barW + 16, 28);
  }

  // HP바 배경
  ctx.fillStyle = '#4a0000';
  ctx.fillRect(barX, barY, barW, 16);

  // HP바 전경 (글로우 포함)
  ctx.fillStyle = hpColor;
  ctx.shadowColor = hpColor;
  ctx.shadowBlur = 6;
  ctx.fillRect(barX, barY, barW * hpRatio, 16);
  ctx.shadowBlur = 0;

  // HP 텍스트
  UI.text(ctx, `${gBossHp}/${gBossMaxHp}`, w/2, barY + 8, { size:10, bold:true, color:'#fff' });

  // 보스 이름
  UI.text(ctx, boss.name, w/2, barY + 25, { size:11, bold:true, color:'#ff3333' });
}

// ═══════════════════════════════════════════════════════════
// GOAL DISPLAY — 목표 진행률 바
// ═══════════════════════════════════════════════════════════
function renderGoalBars(ctx, x, y) {
  const def = LEVEL_DEFS[gCurrentLevel];
  let yPos = y;

  for (let i = 0; i < def.goals.length; i++) {
    const g = def.goals[i];
    const prog = gGoalProgress[i] || 0;
    let maxVal = g.val;
    let curVal = prog;
    let label = '';

    if (g.type === 'score') { label = t('score'); curVal = Math.min(gScore, maxVal); }
    else if (g.type === 'collect') { label = g.gem; }
    else if (g.type === 'obstacle') { label = g.kind; }
    else if (g.type === 'boss') { label = 'Boss'; maxVal = gBossMaxHp; curVal = gBossMaxHp - gBossHp; }

    const done = curVal >= maxVal;
    const ratio = MathUtil.clamp(curVal / maxVal, 0, 1);

    // 아이콘/라벨
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `10px ${FONT}`;
    ctx.fillStyle = done ? '#00ff87' : '#e0e0f0';
    ctx.fillText((done ? '✓ ' : '') + label, x, yPos + 6);

    // 진행 바
    const barX = x + 60, barW = 70, barH = 8;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(barX, yPos + 1, barW, barH);
    ctx.fillStyle = done ? '#00ff87' : '#6c3cf7';
    ctx.fillRect(barX, yPos + 1, barW * ratio, barH);
    ctx.strokeStyle = '#3d2a52';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(barX, yPos + 1, barW, barH);

    // 수치
    ctx.fillStyle = '#8080a0';
    ctx.textAlign = 'right';
    ctx.fillText(`${curVal}/${maxVal}`, barX + barW + 40, yPos + 6);

    yPos += 16;
  }
}

// ═══════════════════════════════════════════════════════════
// SPARKLE PARTICLE SYSTEM (보석 위 반짝임)
// ═══════════════════════════════════════════════════════════
const gSparkles = []; // {x, y, life, maxLife, size}

function updateSparkles(dt) {
  // 새 반짝임 생성 (PLAY IDLE 상태에서만)
  if (gState === STATE.PLAY && gSubState === SUB.IDLE && gSparkles.length < 20) {
    if (rng() < 0.03) {
      const r = rngInt(0, GRID_ROWS-1), c = rngInt(0, GRID_COLS-1);
      if (gGrid[r] && gGrid[r][c] && gGrid[r][c].type) {
        gSparkles.push({
          x: gGridX + c * gCellSize + rng() * gCellSize,
          y: gGridY + r * gCellSize + rng() * gCellSize,
          life: 0.5 + rng() * 0.5,
          maxLife: 0.5 + rng() * 0.5,
          size: 2 + rng() * 3,
          color: GEM_COLORS[gGrid[r][c].type]
        });
      }
    }
  }

  for (let i = gSparkles.length - 1; i >= 0; i--) {
    gSparkles[i].life -= dt / 1000;
    if (gSparkles[i].life <= 0) gSparkles.splice(i, 1);
  }
}

function renderSparkles(ctx) {
  const sparkleImg = assets.sprites.particleSparkle;
  for (const sp of gSparkles) {
    const alpha = sp.life / sp.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha * 0.7;

    if (sparkleImg) {
      ctx.drawImage(sparkleImg, sp.x - sp.size, sp.y - sp.size, sp.size*2, sp.size*2);
    } else {
      // 폴백: 작은 십자 형태
      ctx.fillStyle = sp.color || '#fff';
      ctx.fillRect(sp.x - sp.size/2, sp.y - 0.5, sp.size, 1);
      ctx.fillRect(sp.x - 0.5, sp.y - sp.size/2, 1, sp.size);
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// DAMAGE NUMBER SYSTEM (보스 데미지 숫자 팝업)
// ═══════════════════════════════════════════════════════════
const gDmgNumbers = []; // {value, x, y, life, maxLife, isCrit}

function addDmgNumber(value, x, y, isCrit) {
  gDmgNumbers.push({
    value, x, y,
    life: 1.5, maxLife: 1.5,
    isCrit: isCrit || false,
    vy: -40 - rng() * 20,
    vx: (rng() - 0.5) * 30
  });
}

function updateDmgNumbers(dt) {
  const dtSec = dt / 1000;
  for (let i = gDmgNumbers.length - 1; i >= 0; i--) {
    const d = gDmgNumbers[i];
    d.life -= dtSec;
    d.x += d.vx * dtSec;
    d.y += d.vy * dtSec;
    d.vy += 20 * dtSec; // 약간의 중력
    if (d.life <= 0) gDmgNumbers.splice(i, 1);
  }
}

function renderDmgNumbers(ctx) {
  for (const d of gDmgNumbers) {
    const alpha = MathUtil.clamp(d.life / 0.5, 0, 1);
    const scale = d.isCrit ? 1.3 : 1.0;
    const size = d.isCrit ? 20 : 14;
    const color = d.isCrit ? '#ff6600' : '#ff3333';

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(d.x, d.y);
    ctx.scale(scale, scale);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${size}px ${FONT}`;

    // 외곽선
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(`-${d.value}`, 0, 0);

    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = d.isCrit ? 12 : 6;
    ctx.fillText(`-${d.value}`, 0, 0);

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// HINT SYSTEM (5초간 입력 없으면 힌트 표시)
// ═══════════════════════════════════════════════════════════
let gHintTimer = 0;
let gHintCell = null; // {r,c}

function updateHint(dt) {
  if (gState !== STATE.PLAY || gSubState !== SUB.IDLE || gSwapLocked) {
    gHintTimer = 0;
    gHintCell = null;
    return;
  }

  gHintTimer += dt;
  if (gHintTimer > 5000 && !gHintCell) {
    // 유효한 이동 찾기
    gHintCell = findHintMove();
  }
}

function findHintMove() {
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (!canSwapCell(r,c)) continue;
      if (c+1<GRID_COLS && canSwapCell(r,c+1)) {
        swapTypes(r,c,r,c+1);
        const has = findAllMatches().length > 0;
        swapTypes(r,c,r,c+1);
        if (has) return {r,c};
      }
      if (r+1<GRID_ROWS && canSwapCell(r+1,c)) {
        swapTypes(r,c,r+1,c);
        const has = findAllMatches().length > 0;
        swapTypes(r,c,r+1,c);
        if (has) return {r,c};
      }
    }
  }
  return null;
}

function renderHint(ctx) {
  if (!gHintCell || gSubState !== SUB.IDLE) return;

  const hx = gGridX + gHintCell.c * gCellSize;
  const hy = gGridY + gHintCell.r * gCellSize;
  const pulse = Math.sin(gBgTime * 4) * 0.2 + 0.3;

  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.roundRect(hx + 2, hy + 2, gCellSize - 4, gCellSize - 4, 4);
  ctx.fill();
  ctx.restore();
}

function resetHint() {
  gHintTimer = 0;
  gHintCell = null;
}

// ═══════════════════════════════════════════════════════════
// STUCK DETECTION / DEADLOCK GUARD
// ═══════════════════════════════════════════════════════════
let gStuckTimer = 0;

function updateStuckDetection(dt) {
  if (gState === STATE.PLAY && gSubState === SUB.IDLE && !gSwapLocked) {
    gStuckTimer += dt;
    if (gStuckTimer > 15000) {
      // 15초 무입력: 강제 셔플
      doShuffle();
      gShuffleMsg = 2000;
      gStuckTimer = 0;
    }
  } else {
    gStuckTimer = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// INIT / ASSET LOADING (프로그레스 바 포함)
// ═══════════════════════════════════════════════════════════
let gLoadProgress = 0; // 0~1
let gLoadTotal = 0;
let gLoadDone = 0;
let gLoading = true;

/** 로딩 화면 렌더 (엔진 시작 전에도 동작) */
function renderLoadingScreen() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 배경
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(1, '#0d1b2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 타이틀
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold 28px ${FONT}`;
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
  ctx.fillText('Gem Siege', w/2, h * 0.35);
  ctx.shadowBlur = 0;

  // 로딩 텍스트
  ctx.font = `14px ${FONT}`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText(`Loading assets... ${Math.round(gLoadProgress * 100)}%`, w/2, h * 0.48);

  // 프로그레스 바
  const barW = Math.min(w * 0.6, 280), barH = 12;
  const barX = (w - barW) / 2, barY = h * 0.54;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#6c3cf7';
  ctx.shadowColor = '#6c3cf7'; ctx.shadowBlur = 8;
  ctx.fillRect(barX, barY, barW * gLoadProgress, barH);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#3d2a52';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // 보석 수량 텍스트
  if (gLoadTotal > 0) {
    ctx.font = `11px ${FONT}`;
    ctx.fillStyle = '#505070';
    ctx.fillText(`${gLoadDone} / ${gLoadTotal}`, w/2, barY + barH + 18);
  }

  ctx.restore();
}

/** 에셋 1개 로드 완료 콜백 */
function onAssetLoaded() {
  gLoadDone++;
  gLoadProgress = gLoadTotal > 0 ? gLoadDone / gLoadTotal : 1;
  if (gLoading) renderLoadingScreen();
}

async function init() {
  gW = engine.W; gH = engine.H;
  recalcLayout();
  loadProgress();

  // 초기 로딩 화면 표시
  renderLoadingScreen();

  // manifest.json에서 에셋 로드 (프로그레스 바 연동)
  try {
    const manifest = await fetch('assets/manifest.json').then(r => r.json());
    if (manifest && manifest.assets) {
      const assetMap = {};
      for (const [key, info] of Object.entries(manifest.assets)) {
        assetMap[key] = 'assets/' + info.file;
      }
      gLoadTotal = Object.keys(assetMap).length;
      gLoadDone = 0;
      gLoadProgress = 0;
      renderLoadingScreen();

      // 개별 로드 (프로그레스 업데이트)
      const loadPromises = [];
      for (const [key, src] of Object.entries(assetMap)) {
        const p = new Promise((resolve) => {
          const img = new Image();
          img.onload = () => { assets.sprites[key] = img; onAssetLoaded(); resolve(); };
          img.onerror = () => { onAssetLoaded(); resolve(); }; // 실패해도 계속 진행
          img.src = src;
        });
        loadPromises.push(p);
      }
      await Promise.all(loadPromises);
    }
  } catch (e) {
    console.warn('[GemSiege] Asset load failed, using fallbacks', e);
  }

  gLoading = false;

  // 스프라이트 시트 초기화
  initSpriteSheets();

  _ready = true;
  engine.start();
}

init();
</script>
