<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="slimeBody" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="60%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </radialGradient>
    <radialGradient id="slimeHighlight" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="60%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="skullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#a09080"/>
    </linearGradient>
    <filter id="enemyGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="threatAura">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 위협 오라 -->
  <ellipse cx="32" cy="40" rx="22" ry="8" fill="#ff4444" opacity="0.15" filter="url(#threatAura)"/>
  <!-- 슬라임 몸체 - 물결 하단 -->
  <g filter="url(#enemyGlow)">
    <path d="M10 38 Q10 16 32 14 Q54 16 54 38 Q50 44 46 42 Q42 46 38 42 Q34 46 30 42 Q26 46 22 42 Q18 46 14 42 Q10 44 10 38 Z" fill="url(#slimeBody)"/>
  </g>
  <!-- 하이라이트 -->
  <path d="M18 24 Q22 18 32 16 Q36 16 38 18 Q34 20 26 24 Z" fill="url(#slimeHighlight)"/>
  <!-- 눈 - 왼쪽 -->
  <g filter="url(#enemyGlow)">
    <ellipse cx="24" cy="28" rx="5" ry="5.5" fill="#1a0000" stroke="#ff6666" stroke-width="0.8"/>
    <ellipse cx="25" cy="27" rx="2.5" ry="3" fill="url(#eyeGlow)"/>
    <circle cx="25.5" cy="26.5" r="1" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- 눈 - 오른쪽 -->
  <g filter="url(#enemyGlow)">
    <ellipse cx="40" cy="28" rx="5" ry="5.5" fill="#1a0000" stroke="#ff6666" stroke-width="0.8"/>
    <ellipse cx="41" cy="27" rx="2.5" ry="3" fill="url(#eyeGlow)"/>
    <circle cx="41.5" cy="26.5" r="1" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- 입 -->
  <path d="M26 36 Q30 34 32 36 Q34 34 38 36 Q36 38 32 39 Q28 38 26 36 Z" fill="#880000" stroke="#660000" stroke-width="0.5"/>
  <!-- 이빨 -->
  <path d="M28 36 L29 38 L30 36" fill="#e0d0c0" stroke-width="0"/>
  <path d="M34 36 L35 38 L36 36" fill="#e0d0c0" stroke-width="0"/>
  <!-- 해골 장식 (슬라임 위 떠다니는 해골) -->
  <g transform="translate(44, 6) scale(0.5)" opacity="0.7">
    <circle cx="16" cy="16" r="10" fill="url(#skullGrad)" stroke="#706050" stroke-width="1"/>
    <circle cx="12" cy="14" r="3" fill="#1a0000"/>
    <circle cx="20" cy="14" r="3" fill="#1a0000"/>
    <path d="M12 20 L14 22 L16 20 L18 22 L20 20" fill="none" stroke="#1a0000" stroke-width="1.2"/>
    <ellipse cx="13" cy="14" rx="1" ry="1.2" fill="#ff4444" opacity="0.6"/>
    <ellipse cx="19" cy="14" rx="1" ry="1.2" fill="#ff4444" opacity="0.6"/>
  </g>
  <!-- 독 방울 이펙트 -->
  <circle cx="16" cy="46" r="2" fill="#44ff44" opacity="0.5" filter="url(#enemyGlow)"/>
  <circle cx="48" cy="48" r="1.5" fill="#44ff44" opacity="0.4" filter="url(#enemyGlow)"/>
</svg>