<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bodyGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#0088aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffff"/>
      <stop offset="50%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#006680"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="40%" stop-color="#b0b0c0"/>
      <stop offset="100%" stop-color="#707088"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 바닥 글로우 -->
  <g filter="url(#softGlow)">
    <ellipse cx="32" cy="56" rx="14" ry="4" fill="#00e5ff" opacity="0.3"/>
  </g>
  <!-- 몸통 -->
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="13" fill="url(#bodyGlow)" stroke="#00e5ff" stroke-width="1.5"/>
  </g>
  <!-- 갑옷 디테일 - 흉갑 -->
  <path d="M25 28 Q32 24 39 28 L38 38 Q32 40 26 38 Z" fill="url(#armorGrad)" opacity="0.6"/>
  <!-- 머리 (방향 표시 삼각형) -->
  <g filter="url(#glow)">
    <path d="M32 10 L38 20 L26 20 Z" fill="#00e5ff" stroke="#33ffff" stroke-width="0.8"/>
  </g>
  <!-- 눈 -->
  <ellipse cx="29" cy="17" rx="1.5" ry="1.2" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="35" cy="17" rx="1.5" ry="1.2" fill="#ffffff" opacity="0.9"/>
  <!-- 왼팔 -->
  <rect x="14" y="28" width="6" height="10" rx="2" fill="#0088aa" stroke="#00bcd4" stroke-width="0.8"/>
  <!-- 오른팔 + 검 -->
  <rect x="44" y="28" width="6" height="10" rx="2" fill="#0088aa" stroke="#00bcd4" stroke-width="0.8"/>
  <!-- 검 -->
  <g filter="url(#glow)">
    <rect x="51" y="18" width="3" height="22" rx="1" fill="url(#swordGrad)"/>
    <rect x="48" y="26" width="9" height="3" rx="1" fill="#b0b0c0"/>
    <circle cx="52.5" cy="27.5" r="1" fill="#ffd700" opacity="0.8"/>
  </g>
  <!-- 코어 에너지 -->
  <circle cx="32" cy="32" r="4" fill="url(#coreGlow)" filter="url(#softGlow)"/>
  <!-- 발 -->
  <ellipse cx="27" cy="46" rx="4" ry="2.5" fill="#006680" stroke="#00bcd4" stroke-width="0.5"/>
  <ellipse cx="37" cy="46" rx="4" ry="2.5" fill="#006680" stroke="#00bcd4" stroke-width="0.5"/>
</svg>