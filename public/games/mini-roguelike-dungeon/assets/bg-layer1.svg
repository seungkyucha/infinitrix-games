<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0d0d1e"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="torchGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ff6622" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="torchGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9944" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stoneWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a40"/>
      <stop offset="50%" stop-color="#222238"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="stalactiteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a55"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="stoneTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#2a2a40" surfaceScale="1.5" result="lit">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="lit" operator="multiply"/>
    </filter>
  </defs>
  <!-- 깊은 어둠 배경 -->
  <rect width="800" height="600" fill="url(#bgDeep)"/>
  <!-- 앰비언트 라이트 -->
  <rect width="800" height="600" fill="url(#ambientLight)"/>
  <!-- 먼 석조 벽 - 최상단 -->
  <g opacity="0.4">
    <rect x="0" y="0" width="800" height="120" fill="url(#stoneWall)"/>
    <!-- 벽돌 패턴 -->
    <line x1="0" y1="30" x2="800" y2="30" stroke="#1a1a28" stroke-width="1"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#1a1a28" stroke-width="1"/>
    <line x1="0" y1="90" x2="800" y2="90" stroke="#1a1a28" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="30" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="250" y1="0" x2="250" y2="30" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="420" y1="0" x2="420" y2="30" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="580" y1="0" x2="580" y2="30" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="720" y1="0" x2="720" y2="30" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="50" y1="30" x2="50" y2="60" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="180" y1="30" x2="180" y2="60" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="340" y1="30" x2="340" y2="60" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="500" y1="30" x2="500" y2="60" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="660" y1="30" x2="660" y2="60" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="150" y1="60" x2="150" y2="90" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="300" y1="60" x2="300" y2="90" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="460" y1="60" x2="460" y2="90" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="620" y1="60" x2="620" y2="90" stroke="#1a1a28" stroke-width="0.8"/>
    <line x1="760" y1="60" x2="760" y2="90" stroke="#1a1a28" stroke-width="0.8"/>
  </g>
  <!-- 종유석 -->
  <g fill="url(#stalactiteGrad)" opacity="0.5">
    <path d="M60 120 L65 180 L55 180 Z"/>
    <path d="M180 120 L186 200 L174 200 Z"/>
    <path d="M320 120 L327 165 L313 165 Z"/>
    <path d="M480 120 L488 190 L472 190 Z"/>
    <path d="M620 120 L625 170 L615 170 Z"/>
    <path d="M740 120 L748 195 L732 195 Z"/>
    <path d="M120 120 L124 155 L116 155 Z"/>
    <path d="M400 120 L406 175 L394 175 Z"/>
    <path d="M560 120 L563 148 L557 148 Z"/>
  </g>
  <!-- 횃불 글로우 - 왼쪽 -->
  <circle cx="100" cy="200" r="80" fill="url(#torchGlow1)" filter="url(#bgGlow)"/>
  <!-- 횃불 글로우 - 오른쪽 -->
  <circle cx="700" cy="250" r="90" fill="url(#torchGlow2)" filter="url(#bgGlow)"/>
  <!-- 횃불 글로우 - 중앙 아래 -->
  <circle cx="400" cy="450" r="70" fill="url(#torchGlow1)" filter="url(#bgGlow)"/>
  <!-- 먼 기둥들 -->
  <g opacity="0.25">
    <rect x="190" y="120" width="20" height="280" fill="#2a2a40" rx="3"/>
    <rect x="192" y="120" width="4" height="280" fill="#333350" opacity="0.5"/>
    <rect x="590" y="120" width="20" height="280" fill="#2a2a40" rx="3"/>
    <rect x="592" y="120" width="4" height="280" fill="#333350" opacity="0.5"/>
  </g>
  <!-- 바닥 돌 질감 -->
  <g opacity="0.2">
    <rect x="0" y="480" width="800" height="120" fill="#1a1a2e"/>
    <circle cx="50" cy="520" r="1.5" fill="#2d2d44"/>
    <circle cx="120" cy="500" r="1" fill="#2d2d44"/>
    <circle cx="200" cy="540" r="2" fill="#2d2d44"/>
    <circle cx="300" cy="510" r="1.5" fill="#2d2d44"/>
    <circle cx="380" cy="550" r="1" fill="#2d2d44"/>
    <circle cx="500" cy="505" r="2" fill="#2d2d44"/>
    <circle cx="580" cy="530" r="1.5" fill="#2d2d44"/>
    <circle cx="680" cy="515" r="1" fill="#2d2d44"/>
    <circle cx="750" cy="545" r="1.5" fill="#2d2d44"/>
  </g>
  <!-- 균열 라인들 -->
  <g stroke="#0d0d1e" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M150 500 Q160 510 155 530 Q165 540 160 560"/>
    <path d="M450 490 Q460 505 465 520 Q455 535 460 555"/>
    <path d="M680 495 Q675 510 680 525 Q690 535 685 550"/>
  </g>
  <!-- 미세 파티클 (던전 먼지) -->
  <g opacity="0.15">
    <circle cx="150" cy="300" r="1" fill="#4a4a6a"/>
    <circle cx="350" cy="250" r="0.8" fill="#4a4a6a"/>
    <circle cx="550" cy="350" r="1.2" fill="#4a4a6a"/>
    <circle cx="250" cy="420" r="0.6" fill="#4a4a6a"/>
    <circle cx="650" cy="380" r="0.9" fill="#4a4a6a"/>
    <circle cx="430" cy="180" r="0.7" fill="#4a4a6a"/>
  </g>
</svg>