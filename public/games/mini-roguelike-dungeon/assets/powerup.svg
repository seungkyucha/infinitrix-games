<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="relicAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc88ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#aa66ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8844dd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dd99ff"/>
      <stop offset="30%" stop-color="#aa66ff"/>
      <stop offset="70%" stop-color="#8844cc"/>
      <stop offset="100%" stop-color="#662299"/>
    </linearGradient>
    <linearGradient id="gemFacet1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#aa66ff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="gemCore" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aa66ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="settingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0b0a0"/>
      <stop offset="50%" stop-color="#8a7a6a"/>
      <stop offset="100%" stop-color="#5a4a3a"/>
    </linearGradient>
    <filter id="relicGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 바닥 오라 -->
  <circle cx="24" cy="24" r="20" fill="url(#relicAura)"/>
  <!-- 부유하는 보라 링 -->
  <ellipse cx="24" cy="36" rx="12" ry="3" fill="none" stroke="#aa66ff" stroke-width="0.8" opacity="0.3"/>
  <!-- 세팅 (보석 받침대) -->
  <path d="M18 30 L16 36 L32 36 L30 30 Z" fill="url(#settingGrad)" stroke="#6a5a4a" stroke-width="0.5"/>
  <path d="M17 33 L31 33" stroke="#a09080" stroke-width="0.5" opacity="0.4"/>
  <!-- 보석 메인 바디 -->
  <g filter="url(#relicGlow)">
    <!-- 보석 하단 삼각형 -->
    <path d="M24 34 L16 20 L32 20 Z" fill="url(#gemGrad)" stroke="#8844cc" stroke-width="0.8"/>
    <!-- 보석 상단 (크라운) -->
    <path d="M16 20 L14 14 L20 10 L24 8 L28 10 L34 14 L32 20 Z" fill="url(#gemGrad)" stroke="#8844cc" stroke-width="0.8"/>
  </g>
  <!-- 파셋 라인 -->
  <g stroke="#ffffff" stroke-width="0.4" opacity="0.3" fill="none">
    <path d="M24 34 L20 20"/>
    <path d="M24 34 L28 20"/>
    <path d="M16 20 L24 22 L32 20"/>
    <path d="M20 20 L20 10"/>
    <path d="M28 20 L28 10"/>
  </g>
  <!-- 파셋 하이라이트 -->
  <path d="M16 20 L20 20 L24 22 Z" fill="url(#gemFacet1)"/>
  <!-- 코어 빛 -->
  <circle cx="24" cy="18" r="6" fill="url(#gemCore)"/>
  <!-- 스파클 이펙트 -->
  <g filter="url(#sparkle)">
    <path d="M10 10 L11 8 L12 10 L14 11 L12 12 L11 14 L10 12 L8 11 Z" fill="#ffffff" opacity="0.5"/>
    <path d="M36 8 L36.5 6.5 L37 8 L38.5 8.5 L37 9 L36.5 10.5 L36 9 L34.5 8.5 Z" fill="#ffffff" opacity="0.4"/>
    <path d="M38 22 L38.5 21 L39 22 L40 22.5 L39 23 L38.5 24 L38 23 L37 22.5 Z" fill="#cc88ff" opacity="0.5"/>
    <path d="M8 24 L8.5 23 L9 24 L10 24.5 L9 25 L8.5 26 L8 25 L7 24.5 Z" fill="#cc88ff" opacity="0.4"/>
  </g>
</svg>