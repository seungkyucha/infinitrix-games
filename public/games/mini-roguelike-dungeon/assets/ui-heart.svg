<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ee66"/>
      <stop offset="40%" stop-color="#22cc44"/>
      <stop offset="100%" stop-color="#118833"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66ff88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22cc44" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <path d="M16 28 Q6 20 4 14 Q2 8 6 5 Q10 2 14 5 Q15.5 6.5 16 8 Q16.5 6.5 18 5 Q22 2 26 5 Q30 8 28 14 Q26 20 16 28 Z" fill="#22cc44" opacity="0.3" filter="url(#heartGlow)"/>
  <!-- 메인 하트 -->
  <g filter="url(#heartGlow)">
    <path d="M16 26 Q7 19 5 14 Q3 9 6.5 6 Q10 3 13.5 5.5 Q15 7 16 9 Q17 7 18.5 5.5 Q22 3 25.5 6 Q29 9 27 14 Q25 19 16 26 Z" fill="url(#heartGrad)" stroke="#33ff55" stroke-width="0.8"/>
  </g>
  <!-- 하이라이트 -->
  <path d="M12 8 Q10 6 12 5 Q14 4 14.5 6 Q13 8 12 8 Z" fill="url(#heartShine)"/>
  <!-- 십자가 마크 (HP 표시) -->
  <g opacity="0.7">
    <rect x="14" y="12" width="4" height="10" rx="1" fill="#ffffff" opacity="0.5"/>
    <rect x="11" y="15" width="10" height="4" rx="1" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- 코어 빛 -->
  <circle cx="16" cy="16" r="5" fill="url(#heartCore)"/>
</svg>