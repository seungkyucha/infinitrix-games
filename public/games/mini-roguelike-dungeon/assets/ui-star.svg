<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe44d"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#cc9900"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc9900"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <filter id="coinGlowFilter">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#coinGlow)" filter="url(#coinGlowFilter)"/>
  <!-- 코인 에지 (두께감) -->
  <ellipse cx="16" cy="17" rx="11" ry="11.5" fill="url(#coinEdge)" opacity="0.6"/>
  <!-- 메인 코인 -->
  <g filter="url(#coinGlowFilter)">
    <circle cx="16" cy="16" r="11" fill="url(#coinGrad)" stroke="#aa7700" stroke-width="1"/>
  </g>
  <!-- 내부 테두리 -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#cc9900" stroke-width="0.8" opacity="0.6"/>
  <!-- 소울 심볼 (S자) -->
  <path d="M13 12 Q13 10 16 10 Q19 10 19 12.5 Q19 14.5 16 15 Q13 15.5 13 17.5 Q13 20 16 20 Q19 20 19 18" fill="none" stroke="#aa7700" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 하이라이트 -->
  <circle cx="16" cy="16" r="10" fill="url(#coinShine)"/>
  <!-- 스파클 -->
  <g opacity="0.8">
    <path d="M6 6 L7 4 L8 6 L10 7 L8 8 L7 10 L6 8 L4 7 Z" fill="#ffffff" opacity="0.6"/>
    <path d="M24 4 L24.5 3 L25 4 L26 4.5 L25 5 L24.5 6 L24 5 L23 4.5 Z" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>