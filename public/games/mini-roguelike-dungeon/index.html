function renderTitle(ctx, time) {
  // Background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Grid pattern (strategy genre)
  ctx.strokeStyle = 'rgba(0,255,135,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < GAME_W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_H); ctx.stroke(); }
  for (let y = 0; y < GAME_H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_W, y); ctx.stroke(); }

  // Animated particles (dust/dungeon theme)
  const t = time / 1000;
  for (let i = 0; i < 20; i++) {
    const px = ((i * 137 + t * 20) % GAME_W);
    const py = ((i * 89 + t * 10) % GAME_H);
    ctx.fillStyle = `rgba(0,229,255,${0.2 + Math.sin(t + i) * 0.1})`;
    ctx.fillRect(px, py, 2, 2);
  }

  // Title text with glow
  ctx.save();
  ctx.font = `bold 36px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ff87';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#00ff87';
  ctx.fillText('미니 로그라이크', GAME_W/2, 160);
  ctx.font = `bold 28px ${FONT}`;
  ctx.shadowColor = '#00e5ff';
  ctx.fillStyle = '#00e5ff';
  ctx.fillText('던 전', GAME_W/2, 210);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#8080a0';
  ctx.font = `12px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('절차적 던전 · 턴 기반 전투 · 빌드 크래프팅', GAME_W/2, 245);

  // Menu items
  const menuItems = ['▶ 새 게임', '⚙ 업그레이드', '📊 통계'];
  for (let i = 0; i < 3; i++) {
    const y = 320 + i * 50;
    const selected = titleSelected === i;
    if (selected) {
      ctx.fillStyle = 'rgba(0,255,135,0.15)';
      ctx.fillRect(280, y - 18, 240, 36);
    }
    ctx.fillStyle = selected ? '#00ff87' : '#8080a0';
    ctx.font = `${selected ? 'bold ' : ''}16px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText(menuItems[i], GAME_W/2, y + 5);
  }

  // Stats display
  ctx.fillStyle = '#505070';
  ctx.font = `10px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText(`최고 점수: ${cachedBest}  |  소울: ${cachedSouls}  |  런: ${cachedStats.runs}`, GAME_W/2, 500);

  // Controls hint
  ctx.fillStyle = '#505070';
  ctx.font = `9px ${FONT}`;
  ctx.fillText('↑↓ 선택 · SPACE 확인 · 터치로 선택', GAME_W/2, 560);

  drawScanlines(ctx);
}

function renderMetaShop(ctx) {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Header
  drawGlowText(ctx, '영구 업그레이드 상점', GAME_W/2, 60, '#ffd700', 22);
  ctx.fillStyle='#e0e0e0'; ctx.font=`14px ${FONT}`; ctx.textAlign='center';
  ctx.fillText(`보유 소울: ${cachedSouls}`, GAME_W/2, 100);

  // Grid pattern
  ctx.strokeStyle='rgba(0,255,135,0.03)'; ctx.lineWidth=0.5;
  for(let x=0;x<GAME_W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GAME_H);ctx.stroke();}

  // Upgrades
  for (let i = 0; i < META_UPGRADES.length; i++) {
    const up = META_UPGRADES[i];
    const lvl = cachedMeta[i];
    const y = 180 + i * 55;

    ctx.fillStyle = selected ? '#00ff87' : '#e0e0e0';
    ctx.font = `13px ${FONT}`; ctx.textAlign = 'left';
    ctx.fillText(up.name, 170, y);

    // Level dots
    for (let l = 0; l < up.maxLv; l++) {
      ctx.fillStyle = l < lvl ? '#ffd700' : '#333';
      ctx.fillRect(400 + l * 16, y - 5, 10, 10);
    }

    // Cost
    if (lvl < up.maxLv) {

      ctx.fillStyle='#00ff87'; ctx.textAlign='right';

  ctx.fillStyle = '#8080a0'; ctx.font=`12px ${FONT}`; ctx.textAlign='center';
  ctx.fillText('ESC / 탭하여 돌아가기', GAME_W/2, 540);

  drawScanlines(ctx);
}

function renderDungeon(ctx, dt, time) {
  if (!dungeon || !player) return;

  // Update camera (lerp toward player)
  camera.targetX = player.x * TILE - GAME_W/2 + TILE/2;
  camera.targetY = player.y * TILE - GAME_H/2 + TILE/2;
  camera.x += (camera.targetX - camera.x) * 0.15;
  camera.y += (camera.targetY - camera.y) * 0.15;

  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (screenShake.intensity > 0.1) {
    shakeX = (Math.random() - 0.5) * screenShake.intensity * 2;
    shakeY = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else { screenShake.intensity = 0; }

  ctx.save();
  ctx.translate(-camera.x + shakeX, -camera.y + shakeY);

  // Dark background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(camera.x - 10, camera.y - 10, GAME_W + 20, GAME_H + 20);

  // Calculate visible tile range
  const startTX = Math.max(0, Math.floor(camera.x / TILE) - 1);
  const startTY = Math.max(0, Math.floor(camera.y / TILE) - 1);
  const endTX = Math.min(dungeon.w, Math.ceil((camera.x + GAME_W) / TILE) + 1);
  const endTY = Math.min(dungeon.h, Math.ceil((camera.y + GAME_H) / TILE) + 1);

  // Draw tiles
  for (let y = startTY; y < endTY; y++) {
    for (let x = startTX; x < endTX; x++) {
      const visible = fovMap && fovMap[y] && fovMap[y][x];
      const revealed = revealedMap && revealedMap[y] && revealedMap[y][x];
      drawTile(ctx, dungeon.tiles[y][x], x, y, dungeon.theme, visible, revealed);
    }
  }

  // Boss laser warning
  drawBossWarning(ctx);

  // Draw items
  drawItems(ctx, dungeon.items, fovMap || []);

  // Draw enemies
  for (const e of dungeon.enemies) {
    if (e.alive && fovMap && fovMap[e.y] && fovMap[e.y][e.x]) {
      drawEnemy(ctx, e, time);
    }
  }

  // Draw player
  drawPlayer(ctx, player);

  // Particles
  particles.render(ctx, 0, 0);

  // Floating texts (in world space)
  drawFloatingTexts(ctx, dt);

  ctx.restore();

  // Vignette for boss floors
  if (currentFloor === 5 || currentFloor === 10) {
    const grad = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_W*0.3, GAME_W/2, GAME_H/2, GAME_W*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Theme ambient particles
  drawAmbientParticles(ctx, time);

  // HUD (always on top)
  drawHUD(ctx, player);

  // Minimap
  drawMinimap(ctx, dungeon, player);
}

function drawAmbientParticles(ctx, time) {
  const theme = dungeon ? dungeon.theme : 'stone';
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 8; i++) {
    const t = time / 1000;
    let px = ((i * 97 + t * (5 + i)) % GAME_W);
    let py = ((i * 73 + t * (3 + i * 0.5)) % GAME_H);
    if (theme === 'stone') { ctx.fillStyle='#8080a0'; ctx.fillRect(px, py, 1, 1); }
    else if (theme === 'sewer') { ctx.fillStyle='#4488aa'; ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill(); }
    else if (theme === 'lava') { ctx.fillStyle=`rgb(255,${100+Math.sin(t+i)*50|0},0)`; ctx.fillRect(px,py,2,2); }
    else if (theme === 'crystal') { ctx.fillStyle='#66ccff'; ctx.fillRect(px,py,1.5,1.5); }
    else { ctx.fillStyle='#aa66ff'; ctx.fillRect(px,py,1,1); }
  }
  ctx.globalAlpha=1;
}

function renderLevelUp(ctx) {
  // Dim background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  drawGlowText(ctx, `레벨 업! Lv.${player.level}`, GAME_W/2, 120, '#ffd700', 24);
  ctx.fillStyle='#e0e0e0'; ctx.font=`12px ${FONT}`; ctx.textAlign='center';
  ctx.fillText('하나를 선택하세요', GAME_W/2, 160);

  for (let i = 0; i < levelUpChoices.length; i++) {
    const perk = levelUpChoices[i];
    const cx = 140 + i * 220;
    const cy = 300;
    const selected = levelUpSelected === i;

    ctx.fillStyle = selected ? 'rgba(0,255,135,0.15)' : 'rgba(30,30,48,0.9)';
    ctx.fillRect(cx - 80, cy - 80, 160, 160);
    ctx.strokeStyle = selected ? '#00ff87' : '#555';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(cx - 80, cy - 80, 160, 160);

    ctx.fillStyle = selected ? '#00ff87' : '#e0e0e0';
    ctx.font = `bold 13px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(perk.name, cx, cy - 30);
    ctx.fillStyle = '#8080a0'; ctx.font=`10px ${FONT}`;
    // Word-wrap description
    const words = perk.desc.split(' ');
    let line = '', ly = cy;
    for (const w of words) {
      if (ctx.measureText(line + w).width > 140) { ctx.fillText(line, cx, ly); ly += 14; line = w + ' '; }
      else line += w + ' ';
    }
    if (line) ctx.fillText(line, cx, ly);
  }

  ctx.fillStyle='#505070'; ctx.font=`9px ${FONT}`; ctx.textAlign='center';
  ctx.fillText('←→ 선택 · SPACE 확인 · 터치', GAME_W/2, 460);
}

function renderShop(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  drawGlowText(ctx, '상 점', GAME_W/2, 80, '#ffd700', 24);
  ctx.fillStyle='#ffd700'; ctx.font=`14px ${FONT}`; ctx.textAlign='center';
  ctx.fillText(`소지 골드: ${player.gold}`, GAME_W/2, 120);

  for (let i = 0; i < shopItems.length; i++) {
    const item = shopItems[i];
    const cx = 150 + i * 200, cy = 300;
    const selected = shopSelected === i;

    if (!item) {
      ctx.fillStyle='rgba(30,30,48,0.5)'; ctx.fillRect(cx-80,cy-60,160,120);
      ctx.fillStyle='#555'; ctx.font=`12px ${FONT}`; ctx.textAlign='center';
      ctx.fillText('판매 완료', cx, cy);
      continue;
    }

    ctx.fillStyle = selected ? 'rgba(255,215,0,0.1)' : 'rgba(30,30,48,0.9)';
    ctx.fillRect(cx-80, cy-60, 160, 120);
    ctx.strokeStyle = selected ? '#ffd700' : '#555';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(cx-80, cy-60, 160, 120);

    ctx.fillStyle='#e0e0e0'; ctx.font=`bold 12px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(item.name, cx, cy-30);
    ctx.fillStyle='#8080a0'; ctx.font=`10px ${FONT}`;
    ctx.fillText(item.desc, cx, cy);
    ctx.fillStyle = player.gold >= item.price ? '#ffd700' : '#ff4444';
    ctx.font=`bold 12px ${FONT}`;
    ctx.fillText(`${item.price}G`, cx, cy+30);
  }

  // Exit button
  ctx.fillStyle='rgba(30,30,48,0.9)';
  ctx.fillRect(320, 480, 160, 36);
  ctx.strokeStyle='#555'; ctx.strokeRect(320,480,160,36);
  ctx.fillStyle='#e0e0e0'; ctx.font=`12px ${FONT}`; ctx.textAlign='center';
  ctx.fillText('나가기 (ESC)', GAME_W/2, 502);
}

function renderPaused(ctx) {
  // Draw frozen dungeon behind
  if (dungeon) {
    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    const startTX = Math.max(0, Math.floor(camera.x/TILE)-1);
    const startTY = Math.max(0, Math.floor(camera.y/TILE)-1);
    const endTX = Math.min(dungeon.w, Math.ceil((camera.x+GAME_W)/TILE)+1);
    const endTY = Math.min(dungeon.h, Math.ceil((camera.y+GAME_H)/TILE)+1);
    for(let y=startTY;y<endTY;y++) for(let x=startTX;x<endTX;x++) {
      const vis=fovMap&&fovMap[y]&&fovMap[y][x]; const rev=revealedMap&&revealedMap[y]&&revealedMap[y][x];
      drawTile(ctx,dungeon.tiles[y][x],x,y,dungeon.theme,vis,rev);
    }
    drawPlayer(ctx, player);
    ctx.restore();
  }

  // Overlay
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,GAME_W,GAME_H);

  drawGlowText(ctx, '일시정지', GAME_W/2, 200, '#00ff87', 28);

  const opts = ['▶ 이어하기', '✕ 타이틀로'];
  for (let i = 0; i < 2; i++) {
    const y = 280 + i * 50;
    const selected = pauseSelected === i;
    if (selected) { ctx.fillStyle='rgba(0,255,135,0.1)'; ctx.fillRect(300,y-18,200,36); }
    ctx.fillStyle = selected ? '#00ff87' : '#8080a0';
    ctx.font=`${selected?'bold ':''}14px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(opts[i], GAME_W/2, y+4);
  }
}

function renderInventory(ctx) {
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,GAME_W,GAME_H);

  drawGlowText(ctx, '인벤토리', GAME_W/2, 50, '#00e5ff', 20);

  // Player stats
  ctx.fillStyle='#e0e0e0'; ctx.font=`12px ${FONT}`; ctx.textAlign='left';
  const sl = 60;
  ctx.fillText(`Lv.${player.level}  HP: ${player.hp}/${player.maxHp}  ATK: ${player.atk}  DEF: ${player.def}`, sl, 90);
  ctx.fillText(`골드: ${player.gold}  점수: ${player.score}  층: F${currentFloor}`, sl, 110);

  // Weapon
  ctx.fillStyle='#ffd700'; ctx.fillText('무기:', sl, 150);
  ctx.fillStyle='#e0e0e0';
  if (player.weapon !== undefined) {
    const w = WEAPONS[player.weapon];
    ctx.fillText(`${w.name} (ATK +${w.atk}) — ${w.desc}`, sl+60, 150);
  }

  // Relics
  ctx.fillStyle='#aa66ff'; ctx.fillText('유물:', sl, 190);
  for (let i = 0; i < 3; i++) {
    const ry = 210 + i * 22;
    if (i < player.relics.length) {
      const r = player.relics[i];
      ctx.fillStyle='#e0e0e0'; ctx.fillText(`${i+1}. ${r.name} — ${r.desc}`, sl+20, ry);
    } else {
      ctx.fillStyle='#505070'; ctx.fillText(`${i+1}. (빈 슬롯)`, sl+20, ry);
    }
  }

  // Consumables
  ctx.fillStyle='#22cc44'; ctx.fillText('소모품:', sl, 290);
  for (let i = 0; i < 4; i++) {
    const cy = 310 + i * 22;
    const cid = player.consumables[i];
    if (cid !== null) {
      ctx.fillStyle='#e0e0e0'; ctx.fillText(`[${i+1}] ${CONSUMABLES[cid].name} — ${CONSUMABLES[cid].desc}`, sl+20, cy);
    } else {
      ctx.fillStyle='#505070'; ctx.fillText(`[${i+1}] (비어있음)`, sl+20, cy);
    }
  }

  // Perks
  ctx.fillStyle='#00ff87'; ctx.fillText('능력:', sl, 410);
  if (player.perks.length === 0) {
    ctx.fillStyle='#505070'; ctx.fillText('(없음)', sl+20, 430);
  } else {
    for (let i = 0; i < player.perks.length; i++) {
      ctx.fillStyle='#e0e0e0'; ctx.fillText(`• ${player.perks[i].name}: ${player.perks[i].desc}`, sl+20, 430+i*18);
    }
  }

  // Synergies active
  const synergies = ['venom','lifeReap','phantom','goldKing','frostRetaliate','fireSmash'];
  const synergyNames = ['맹독사','생명 착취','환영','황금왕','냉기 보복','화염 분쇄'];
  const activeSyn = [];
  for (let i=0;i<synergies.length;i++) { if (hasSynergy(player, synergies[i])) activeSyn.push(synergyNames[i]); }
  if (activeSyn.length > 0) {
    ctx.fillStyle='#ffd700'; ctx.fillText('시너지:', sl, 530);
    ctx.fillStyle='#ffd700'; ctx.fillText(activeSyn.join(', '), sl+80, 530);
  }

  ctx.fillStyle='#505070'; ctx.font=`9px ${FONT}`; ctx.textAlign='center';
  ctx.fillText('ESC/I/탭하여 닫기', GAME_W/2, GAME_H-20);
}

function renderResult(ctx, time) {
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,GAME_W,GAME_H);

  if (!resultData) return;

  // Grid background
  ctx.strokeStyle='rgba(0,255,135,0.03)'; ctx.lineWidth=0.5;
  for(let x=0;x<GAME_W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GAME_H);ctx.stroke();}

  const titleColor = resultData.victory ? '#ffd700' : '#ff4444';
  const titleText = resultData.victory ? '던전 클리어!' : '사망...';
  drawGlowText(ctx, titleText, GAME_W/2, 100, titleColor, 32);

  const lines = [
    `도달 층: F${resultData.floor}`,
    `레벨: ${resultData.level}`,
    `점수: ${resultData.score}`,
    `획득 소울: +${resultData.soulsEarned}`,
  ];
  for (let i = 0; i < lines.length; i++) {
    ctx.fillStyle='#e0e0e0'; ctx.font=`14px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(lines[i], GAME_W/2, 200 + i * 35);
  }

  if (resultData.isNewBest) {
    drawGlowText(ctx, '★ 최고 점수 갱신! ★', GAME_W/2, 380, '#ffd700', 18);
  }

  ctx.fillStyle='#8080a0'; ctx.font=`12px ${FONT}`; ctx.textAlign='center';
  ctx.fillText(`최고 점수: ${cachedBest}`, GAME_W/2, 420);
  ctx.fillText(`총 소울: ${cachedSouls}`, GAME_W/2, 445);

  // Blink hint
  if (Math.floor(time/500) % 2 === 0) {
    ctx.fillStyle='#505070'; ctx.font=`11px ${FONT}`;
    ctx.fillText('SPACE / 탭하여 타이틀로', GAME_W/2, 520);
  }

  drawScanlines(ctx);
}

function renderLoading(ctx, time) {
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,GAME_W,GAME_H);
  ctx.fillStyle='#00ff87'; ctx.font=`14px ${FONT}`; ctx.textAlign='center';
  const dots = '.'.repeat(Math.floor(time/300) % 4);
  ctx.fillText(`초기화 중${dots}`, GAME_W/2, GAME_H/2);
}

// ═══════════════════════════════════════════════════════════════
// §16. GAME LOOP (§5.4, §12.9)
// ═══════════════════════════════════════════════════════════════

function gameLoop(timestamp) {
  try {
    const dt = Math.min(timestamp - lastTime, 100); // cap 100ms
    lastTime = timestamp;

    // Update message lifetimes
    for (let i = messageLog.length-1; i >= 0; i--) {
      messageLog[i].life -= dt/1000;
      if (messageLog[i].life <= 0) messageLog.splice(i, 1);
    }

    // State-based update and render (§5.3 matrix)
    switch(gameState) {
      case STATES.LOADING:
        tw.update(dt);
        renderLoading(ctx, timestamp);
        break;
      case STATES.TITLE:
        tw.update(dt);
        particles.update(dt);
        renderTitle(ctx, timestamp);
        break;
      case STATES.META_SHOP:
        tw.update(dt);
        renderMetaShop(ctx);
        break;
      case STATES.DUNGEON:
        tw.update(dt);
        particles.update(dt);
        renderDungeon(ctx, dt, timestamp);
        break;
      case STATES.LEVEL_UP:
        tw.update(dt);
        particles.update(dt);
        if (dungeon) renderDungeon(ctx, dt, timestamp);
        renderLevelUp(ctx);
        break;
      case STATES.SHOP:
        tw.update(dt);
        particles.update(dt);
        renderShop(ctx);
        break;
      case STATES.PAUSED:
        // No tween update in PAUSED (§5.3)
        renderPaused(ctx);
        break;
      case STATES.INVENTORY:
        renderInventory(ctx);
        break;
      case STATES.RESULT:
        tw.update(dt);
        particles.update(dt);
        renderResult(ctx, timestamp);
        break;
    }

    // Transition fade overlay
    if (transitionFade.alpha > 0.01) {
      ctx.fillStyle = `rgba(10,10,20,${transitionFade.alpha})`;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }

  } catch(e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════════
// §17. INITIALIZATION
// ═══════════════════════════════════════════════════════════════

function init() {
  loadFromStorage();
  player = null; // not created yet
  player = { _selectedSlot: 0 }; // temp for HUD reference safety

  // Transition to title after brief loading
  const loadObj = { t: 0 };
  tw.add(loadObj, { t: 1 }, 500, 'linear', () => {
    guard.beginTransition(STATES.TITLE);
  });

  requestAnimationFrame(gameLoop);
}

init();

</script>
