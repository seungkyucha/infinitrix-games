<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gemRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="gemBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="gemGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="gemYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <linearGradient id="gemPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="gemOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#d35400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="60" x2="400" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="400" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Sparkle particles -->
  <circle cx="50" cy="40" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="55" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="250" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="30" cy="260" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="190" cy="25" r="1" fill="#fff" opacity="0.7"/>

  <!-- Match-3 Board (left side) -->
  <g transform="translate(30, 75)">
    <!-- Row 1 -->
    <polygon points="20,5 35,15 35,30 20,40 5,30 5,15" fill="url(#gemRed)" filter="url(#glow)"/>
    <polygon points="60,5 75,15 75,30 60,40 45,30 45,15" fill="url(#gemBlue)" filter="url(#glow)"/>
    <polygon points="100,5 115,15 115,30 100,40 85,30 85,15" fill="url(#gemGreen)" filter="url(#glow)"/>
    <polygon points="140,5 155,15 155,30 140,40 125,30 125,15" fill="url(#gemYellow)" filter="url(#glow)"/>
    <!-- Row 2 -->
    <polygon points="20,50 35,60 35,75 20,85 5,75 5,60" fill="url(#gemPurple)" filter="url(#glow)"/>
    <polygon points="60,50 75,60 75,75 60,85 45,75 45,60" fill="url(#gemRed)" filter="url(#glow)"/>
    <polygon points="100,50 115,60 115,75 100,85 85,75 85,60" fill="url(#gemRed)" filter="url(#glow)"/>
    <polygon points="140,50 155,60 155,75 140,85 125,75 125,60" fill="url(#gemOrange)" filter="url(#glow)"/>
    <!-- Row 3 (matching 3 reds highlighted) -->
    <polygon points="20,95 35,105 35,120 20,130 5,120 5,105" fill="url(#gemGreen)" filter="url(#glow)"/>
    <polygon points="60,95 75,105 75,120 60,130 45,120 45,105" fill="url(#gemRed)" filter="url(#bigGlow)"/>
    <polygon points="100,95 115,105 115,120 100,130 85,120 85,105" fill="url(#gemBlue)" filter="url(#glow)"/>
    <polygon points="140,95 155,105 155,120 140,130 125,120 125,105" fill="url(#gemPurple)" filter="url(#glow)"/>
    <!-- Match highlight line -->
    <line x1="60" y1="55" x2="60" y2="100" stroke="#ff4757" stroke-width="2" opacity="0.8" stroke-dasharray="4,2"/>
    <line x1="100" y1="55" x2="100" y2="55" stroke="#ff4757" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- VS emblem -->
  <g transform="translate(200, 130)">
    <circle cx="0" cy="0" r="24" fill="#e74c3c" opacity="0.9" filter="url(#bigGlow)"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="6" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">VS</text>
  </g>

  <!-- Opponent board (right side, smaller) -->
  <g transform="translate(230, 85)" opacity="0.75">
    <!-- Row 1 -->
    <polygon points="18,4 31,13 31,26 18,35 5,26 5,13" fill="url(#gemBlue)" filter="url(#glow)"/>
    <polygon points="53,4 66,13 66,26 53,35 40,26 40,13" fill="url(#gemGreen)" filter="url(#glow)"/>
    <polygon points="88,4 101,13 101,26 88,35 75,26 75,13" fill="url(#gemYellow)" filter="url(#glow)"/>
    <polygon points="123,4 136,13 136,26 123,35 110,26 110,13" fill="url(#gemPurple)" filter="url(#glow)"/>
    <!-- Row 2 -->
    <polygon points="18,42 31,51 31,64 18,73 5,64 5,51" fill="url(#gemOrange)" filter="url(#glow)"/>
    <polygon points="53,42 66,51 66,64 53,73 40,64 40,51" fill="url(#gemYellow)" filter="url(#glow)"/>
    <polygon points="88,42 101,51 101,64 88,73 75,64 75,51" fill="url(#gemRed)" filter="url(#glow)"/>
    <polygon points="123,42 136,51 136,64 123,73 110,64 110,51" fill="url(#gemBlue)" filter="url(#glow)"/>
    <!-- Row 3 -->
    <polygon points="18,80 31,89 31,102 18,111 5,102 5,89" fill="url(#gemRed)" filter="url(#glow)"/>
    <polygon points="53,80 66,89 66,102 53,111 40,102 40,89" fill="url(#gemPurple)" filter="url(#glow)"/>
    <polygon points="88,80 101,89 101,102 88,111 75,102 75,89" fill="url(#gemGreen)" filter="url(#glow)"/>
    <polygon points="123,80 136,89 136,102 123,111 110,102 110,89" fill="url(#gemOrange)" filter="url(#glow)"/>
    <!-- Ice obstacle overlay -->
    <rect x="35" y="38" width="36" height="38" rx="4" fill="#a8d8ea" opacity="0.45" stroke="#74b9ff" stroke-width="1"/>
    <rect x="105" y="0" width="36" height="38" rx="4" fill="#a8d8ea" opacity="0.45" stroke="#74b9ff" stroke-width="1"/>
  </g>

  <!-- Combo arrow from left to right -->
  <g filter="url(#bigGlow)">
    <line x1="175" y1="110" x2="215" y2="130" stroke="#f1c40f" stroke-width="2.5" opacity="0.8"/>
    <polygon points="218,128 225,133 216,134" fill="#f1c40f" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="200" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#glow)">
    <tspan fill="#e74c3c">B</tspan><tspan fill="#3498db">O</tspan><tspan fill="#2ecc71">S</tspan><tspan fill="#f1c40f">E</tspan><tspan fill="#9b59b6">O</tspan><tspan fill="#e67e22">G</tspan>
    <tspan fill="#fff" dx="6">대전</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="62" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">PvP Match-3 Puzzle</text>

  <!-- Trophy / League badge -->
  <g transform="translate(195, 240)">
    <polygon points="0,-18 5,-7 17,-7 8,1 11,13 0,6 -11,13 -8,1 -17,-7 -5,-7" fill="#f1c40f" filter="url(#glow)"/>
  </g>
  <text x="200" y="272" font-family="Arial,sans-serif" font-size="10" fill="#f1c40f" text-anchor="middle" opacity="0.9">LEAGUE BATTLE</text>

  <!-- Bottom decorative line -->
  <rect x="50" y="288" width="300" height="2" rx="1" fill="#e74c3c" opacity="0.3"/>
</svg>
