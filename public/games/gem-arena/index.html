// ═══════════════════════════════════════════════════════════════════
// ── VS 인트로 애니메이션 시스템 ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gVsIntroActive = false;
let gVsIntroTimer = 0;
const VS_INTRO_DURATION = 2500;
let gVsIntroPhase = 0; // 0: slide-in, 1: VS flash, 2: fade-out

function startVsIntro() {
  gVsIntroActive = true;
  gVsIntroTimer = 0;
  gVsIntroPhase = 0;
}

function updateVsIntro(dt) {
  if (!gVsIntroActive) return;
  gVsIntroTimer += dt;

  if (gVsIntroTimer < 800) {
    gVsIntroPhase = 0; // 캐릭터 슬라이드 인
  } else if (gVsIntroTimer < 1600) {
    gVsIntroPhase = 1; // VS 엠블럼 플래시
  } else if (gVsIntroTimer < VS_INTRO_DURATION) {
    gVsIntroPhase = 2; // 페이드 아웃
  } else {
    gVsIntroActive = false;
  }
}

function renderVsIntro(ctx, w, h) {
  if (!gVsIntroActive) return;

  const t = gVsIntroTimer;
  ctx.save();

  // 반투명 배경
  const bgAlpha = gVsIntroPhase === 2
    ? 1 - (t - 1600) / (VS_INTRO_DURATION - 1600)
    : Math.min(1, t / 300);
  ctx.fillStyle = `rgba(10,10,26,${bgAlpha * 0.9})`;
  ctx.fillRect(0, 0, w, h);

  // 중앙 분할선 (대각선)
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.globalAlpha = bgAlpha;
  ctx.beginPath();
  ctx.moveTo(w * 0.5 + 50, 0);
  ctx.lineTo(w * 0.5 - 50, h);
  ctx.stroke();

  // 플레이어 측 (왼쪽) — 슬라이드 인
  const slideP = gVsIntroPhase === 0
    ? MathUtil.clamp(t / 800, 0, 1)
    : 1;
  const slideEase = slideP * (2 - slideP); // easeOut
  const charSize = Layout.px(150, w, h);
  const playerX = -charSize + slideEase * (w * 0.2);
  const playerY = h * 0.3;

  drawAssetOrFallback(ctx, 'charKing', playerX, playerY, charSize, charSize, (ctx2, x2, y2, w2, h2) => {
    drawCharFallback(ctx2, x2, y2, w2, h2, 'king');
  });

  // 상대 측 (오른쪽) — 슬라이드 인
  const opponentX = w + charSize - slideEase * (w * 0.2 + charSize);
  const opponentY = h * 0.3;

  drawAssetOrFallback(ctx, 'charOpponent-' + (gOpponentCharId + 1), opponentX, opponentY, charSize, charSize, (ctx2, x2, y2, w2, h2) => {
    drawCharFallback(ctx2, x2, y2, w2, h2, 'opponent', gOpponentCharId);
  });

  // 플레이어 이름
  const nameFS = Layout.fontSize(20, w, h);
  UI.text(ctx, gLang === 'en' ? 'You' : '플레이어', w * 0.2, h * 0.65, { size: nameFS, bold: true, color: '#4ade80' });

  // 상대 이름
  const oppNames = gLang === 'en'
    ? ['Wizard Zyx', 'Knight Orion', 'Draco Kai']
    : ['마법사 직스', '기사 오리온', '조련사 카이'];
  UI.text(ctx, oppNames[gOpponentCharId], w * 0.8, h * 0.65, { size: nameFS, bold: true, color: '#ff4444' });

  // 리그 배지
  const badgeSize = Layout.px(40, w, h);
  drawAssetOrFallback(ctx, LEAGUE_ASSET[gCurrentLeague], w * 0.2 - badgeSize/2, h * 0.7, badgeSize, badgeSize, (ctx2, x2, y2, w2, h2) => {
    ctx2.fillStyle = LEAGUE_COLORS[gCurrentLeague];
    ctx2.fillRect(x2, y2, w2, h2);
  });

  // VS 엠블럼
  if (gVsIntroPhase >= 1) {
    const vsScale = gVsIntroPhase === 1
      ? Math.min(1.5, 1 + (t - 800) / 200)
      : 1.5 - (t - 1600) / (VS_INTRO_DURATION - 1600) * 0.5;
    const vsAlpha = gVsIntroPhase === 2
      ? 1 - (t - 1600) / (VS_INTRO_DURATION - 1600)
      : Math.min(1, (t - 800) / 200);

    ctx.save();
    ctx.globalAlpha = vsAlpha;
    ctx.translate(w / 2, h * 0.45);
    ctx.scale(vsScale, vsScale);

    const vsSize = Layout.px(120, w, h);
    drawAssetOrFallback(ctx, 'uiVsEmblem', -vsSize/2, -vsSize/2, vsSize, vsSize, (ctx2, x2, y2, w2, h2) => {
      ctx2.fillStyle = '#ffd700';
      ctx2.font = `bold ${w2 * 0.6}px ${UI.FONT}`;
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'middle';
      ctx2.shadowColor = '#ff4444';
      ctx2.shadowBlur = 20;
      ctx2.fillText('VS', x2 + w2/2, y2 + h2/2);
    });

    ctx.restore();

    // 스파크 파티클 (particleSparkle 텍스처 활용)
    if (gVsIntroPhase === 1 && Math.random() > 0.3) {
      particles.emit(w/2, h*0.45, 3, {
        color: '#ffd700',
        speed: 200,
        life: 0.5,
        size: 6,
        spread: Math.PI * 2,
        texture: assets.sprites['particleSparkle'] || null
      });
    }
  }

  ctx.restore();
}

let gTutorialStep = -1;
let gTutorialShown = false;

const TUTORIAL_STEPS = [
  {
    ko: '보석을 드래그하여 인접한 보석과 교환하세요',
    en: 'Drag a gem to swap with an adjacent one',
    highlight: 'board'

    highlight: 'board'
  },

    en: 'Match 4+ gems to create special gems!',

  },

function shouldShowTutorial() {
  if (gTutorialShown) return false;
  const shown = Save.get('ix_gem_arena_tutorial', false);
  return !shown;
}

function startTutorial() {
  gTutorialStep = 0;
  gTutorialShown = true;
}

function advanceTutorial() {
  gTutorialStep++;
  if (gTutorialStep >= TUTORIAL_STEPS.length) {
    gTutorialStep = -1;
    Save.set('ix_gem_arena_tutorial', true);
  }
}

function updateTutorial(dt) {
  if (gTutorialStep < 0) return;
  if (input.tapped || input.confirm()) {
    advanceTutorial();
  }
}

function renderTutorial(ctx, w, h) {
  if (gTutorialStep < 0 || gTutorialStep >= TUTORIAL_STEPS.length) return;

  const step = TUTORIAL_STEPS[gTutorialStep];
  const text = gLang === 'en' ? step.en : step.ko;
  const fs = Layout.fontSize(18, w, h);

  // 반투명 오버레이
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  // 하이라이트 영역 (투명 컷아웃)
  if (step.highlight === 'board') {
    const bl = getBoardLayout(w, h);
    const bw = COLS * (bl.cellSize + bl.padding) + bl.padding;
    const bh = ROWS * (bl.cellSize + bl.padding) + bl.padding;
    ctx.clearRect(bl.boardX - 4, bl.boardY - 4, bw + 8, bh + 8);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.strokeRect(bl.boardX - 4, bl.boardY - 4, bw + 8, bh + 8);
  }

  // 텍스트 박스
  const boxW = w * 0.8;
  const boxH = Layout.px(80, w, h);
  const boxX = (w - boxW) / 2;
  const boxY = h * 0.78;

  ctx.fillStyle = '#1a1a3eee';
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 12);
  ctx.fill();
  ctx.stroke();

  UI.text(ctx, text, w / 2, boxY + boxH * 0.35, { size: fs, bold: true, color: '#e0e0f0' });
  UI.text(ctx, (gLang === 'en' ? 'Tap to continue' : '탭하여 계속') + ' (' + (gTutorialStep + 1) + '/' + TUTORIAL_STEPS.length + ')',
    w / 2, boxY + boxH * 0.7, { size: fs * 0.7, color: '#8080a0' });

  // 손가락 아이콘 애니메이션
  if (step.highlight === 'board') {
    const bl = getBoardLayout(w, h);
    const fingerX = bl.boardX + bl.cellSize * 2.5;
    const fingerY = bl.boardY + bl.cellSize * 3 + Math.sin(gTime * 0.004) * 15;
    ctx.font = `${Layout.fontSize(30, w, h)}px ${UI.FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText('👆', fingerX, fingerY);
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 배경 파티클 효과 (타이틀/왕국 맵) ────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
const bgParticles = [];
const MAX_BG_PARTICLES = 40;

function initBgParticles(w, h) {
  bgParticles.length = 0;
  for (let i = 0; i < MAX_BG_PARTICLES; i++) {
    bgParticles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 20,
      vy: -Math.random() * 30 - 10,
      size: 2 + Math.random() * 4,
      alpha: 0.2 + Math.random() * 0.4,
      color: GEM_HEX[Math.floor(Math.random() * GEM_COLORS)],
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function updateBgParticles(dt, w, h) {
  const dtSec = dt / 1000;
  for (const p of bgParticles) {
    p.x += p.vx * dtSec;
    p.y += p.vy * dtSec;
    p.twinkle += dt * 0.003;

    // 화면 밖으로 나가면 아래서 리스폰
    if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
  }
}

function renderBgParticles(ctx, w, h) {
  for (const p of bgParticles) {
    ctx.save();
    ctx.globalAlpha = p.alpha * (0.5 + Math.sin(p.twinkle) * 0.5);
    ctx.fillStyle = p.color;

    // 별 모양
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = Math.PI / 4 * i + p.twinkle * 0.5;
      const r = i % 2 === 0 ? p.size : p.size * 0.4;
      ctx.lineTo(p.x + r * Math.cos(a), p.y + r * Math.sin(a));
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ── 리그 승급 연출 시스템 ─────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gLeagueUpActive = false;
let gLeagueUpTimer = 0;
let gLeagueUpFrom = 0;
let gLeagueUpTo = 0;
const LEAGUE_UP_DURATION = 3000;

function startLeagueUpAnimation(fromLeague, toLeague) {
  gLeagueUpActive = true;
  gLeagueUpTimer = 0;
  gLeagueUpFrom = fromLeague;
  gLeagueUpTo = toLeague;
}

function updateLeagueUp(dt) {
  if (!gLeagueUpActive) return;
  gLeagueUpTimer += dt;

  // 파티클 발사 (particleStar 텍스처 활용)
  if (gLeagueUpTimer < 2000 && Math.random() > 0.5) {
    particles.emit(engine.W / 2, engine.H * 0.4, 5, {
      color: LEAGUE_COLORS[gLeagueUpTo],
      speed: 200,
      life: 0.8,
      size: 8,
      spread: Math.PI * 2,
      texture: assets.sprites['particleStar'] || null
    });
  }

  if (gLeagueUpTimer >= LEAGUE_UP_DURATION) {
    gLeagueUpActive = false;
  }
}

function renderLeagueUp(ctx, w, h) {
  if (!gLeagueUpActive) return;

  const t = gLeagueUpTimer;
  const progress = MathUtil.clamp(t / LEAGUE_UP_DURATION, 0, 1);

  ctx.save();

  // 배경 오버레이
  const fadeIn = Math.min(1, t / 500);
  const fadeOut = t > 2000 ? 1 - (t - 2000) / 1000 : 1;
  ctx.globalAlpha = fadeIn * fadeOut * 0.85;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  ctx.globalAlpha = fadeIn * fadeOut;

  // "리그 승급!" 텍스트
  const titleFS = Layout.fontSize(36, w, h);
  UI.text(ctx, gLang === 'en' ? 'LEAGUE UP!' : '리그 승급!', w / 2, h * 0.2, {
    size: titleFS, bold: true, color: '#ffd700', glow: '#ffd700'
  });

  // 이전 배지 → 새 배지 변환
  const badgeSize = Layout.px(120, w, h);
  const fromAlpha = t < 1000 ? 1 : Math.max(0, 1 - (t - 1000) / 500);
  const toAlpha = t < 1000 ? 0 : Math.min(1, (t - 1000) / 500);
  const scale = t < 1000 ? 1 : (1 + Math.sin((t - 1000) / 200) * 0.1);

  // 이전 배지
  if (fromAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = fromAlpha * fadeIn * fadeOut;
    drawAssetOrFallback(ctx, LEAGUE_ASSET[gLeagueUpFrom], w/2 - badgeSize/2, h*0.35, badgeSize, badgeSize, (ctx2, x2, y2, w2, h2) => {
      ctx2.fillStyle = LEAGUE_COLORS[gLeagueUpFrom];
      ctx2.beginPath();
      ctx2.moveTo(x2+w2/2, y2); ctx2.lineTo(x2+w2, y2+h2*0.3); ctx2.lineTo(x2+w2*0.8, y2+h2);
      ctx2.lineTo(x2+w2*0.2, y2+h2); ctx2.lineTo(x2, y2+h2*0.3); ctx2.closePath(); ctx2.fill();
    });
    ctx.restore();
  }

  // 새 배지
  if (toAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = toAlpha * fadeIn * fadeOut;
    ctx.translate(w/2, h*0.35 + badgeSize/2);
    ctx.scale(scale, scale);
    ctx.translate(-w/2, -(h*0.35 + badgeSize/2));
    drawAssetOrFallback(ctx, LEAGUE_ASSET[gLeagueUpTo], w/2 - badgeSize/2, h*0.35, badgeSize, badgeSize, (ctx2, x2, y2, w2, h2) => {
      ctx2.fillStyle = LEAGUE_COLORS[gLeagueUpTo];
      ctx2.beginPath();
      ctx2.moveTo(x2+w2/2, y2); ctx2.lineTo(x2+w2, y2+h2*0.3); ctx2.lineTo(x2+w2*0.8, y2+h2);
      ctx2.lineTo(x2+w2*0.2, y2+h2); ctx2.lineTo(x2, y2+h2*0.3); ctx2.closePath(); ctx2.fill();
      // 빛 줄기
      ctx2.strokeStyle = LEAGUE_COLORS[gLeagueUpTo];
      ctx2.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const a = Math.PI * 2 / 8 * i + gTime * 0.002;
        const r1 = w2 * 0.5;
        const r2 = w2 * 0.7 + Math.sin(gTime * 0.005 + i) * w2 * 0.1;
        ctx2.beginPath();
        ctx2.moveTo(x2+w2/2+r1*Math.cos(a), y2+h2/2+r1*Math.sin(a));
        ctx2.lineTo(x2+w2/2+r2*Math.cos(a), y2+h2/2+r2*Math.sin(a));
        ctx2.stroke();
      }
    });
    ctx.restore();
  }

  // effectLeagueUp 스프라이트 시트 오버레이
  const leagueEffSize = Layout.px(150, w, h);
  drawEffectSpriteSheet(ctx, 'effectLeagueUp', w / 2 - leagueEffSize / 2, h * 0.25, leagueEffSize, leagueEffSize, progress);

  // 리그 이름
  const leagueNames = gLang === 'en' ? LEAGUE_NAMES_EN : LEAGUE_NAMES_KO;
  const nameFS = Layout.fontSize(24, w, h);
  UI.text(ctx, leagueNames[gLeagueUpTo], w / 2, h * 0.7, {
    size: nameFS, bold: true, color: LEAGUE_COLORS[gLeagueUpTo], glow: LEAGUE_COLORS[gLeagueUpTo]
  });

  ctx.restore();
}

/** 보석 매치 이펙트 — 빛 줄기 */
function renderMatchEffect(ctx, x, y, size, color, progress) {
  if (progress <= 0 || progress >= 1) return;
  ctx.save();
  ctx.globalAlpha = 1 - progress;

  // 원형 충격파
  const radius = size * (0.5 + progress * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3 * (1 - progress);
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // 빛 줄기 (십자)
  const lineLen = size * (1 + progress * 3);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2 * (1 - progress);
  ctx.beginPath();
  ctx.moveTo(x - lineLen, y); ctx.lineTo(x + lineLen, y);
  ctx.moveTo(x, y - lineLen); ctx.lineTo(x, y + lineLen);
  ctx.stroke();

  ctx.restore();
}

/** 보석 선택 글로우 효과 */
function renderSelectionGlow(ctx, x, y, size, time) {
  const glowSize = 4 + Math.sin(time * 0.005) * 2;
  ctx.save();
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = glowSize;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.roundRect(x - 2, y - 2, size + 4, size + 4, 6);
  ctx.stroke();
  ctx.restore();
}

/** 캐스케이드 중 보석 낙하 이펙트 — 잔상 */
function renderGravityTrail(ctx, x, y, size, color) {
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = color;
  ctx.fillRect(x + size * 0.3, y - size * 0.5, size * 0.4, size * 0.5);
  ctx.restore();
}

/** 보드 아이들 애니메이션 — 보석 미세 흔들림 */
function getIdleOffset(r, c, time) {
  const phase = (r * COLS + c) * 0.7 + time * 0.002;
  return {
    x: Math.sin(phase) * 1.5,
    y: Math.cos(phase * 0.8) * 1
  };
}

// ═══════════════════════════════════════════════════════════════════
// ── 보드 렌더 강화 (셀별 상세 이펙트) ──────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderBoardEnhanced(ctx, w, h, board, layout, isActive) {
  const { cellSize, boardX, boardY, padding } = layout;
  const actualCS = cellSize;
  const bw = COLS * (actualCS + padding) + padding;
  const bh = ROWS * (actualCS + padding) + padding;

  // 보드 프레임 배경
  ctx.save();
  ctx.fillStyle = PALETTE.boardBg + (isActive ? 'cc' : '66');
  ctx.beginPath();
  ctx.roundRect(boardX - 4, boardY - 4, bw + 8, bh + 8, 10);
  ctx.fill();

  // 보드 테두리 글로우
  if (isActive) {
    ctx.strokeStyle = gIsPlayerTurn ? '#4ade8044' : '#ff444444';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  ctx.restore();

  // 셀 렌더
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell) continue;

      const cx = boardX + padding + c * (actualCS + padding);
      const cy = boardY + padding + r * (actualCS + padding);

      // 아이들 오프셋
      const idle = (gCascadePhase === 'idle' && isActive) ? getIdleOffset(r, c, gTime) : { x: 0, y: 0 };

      // 셀 배경 (체커보드 + 그라디언트) — uiBoardCell 에셋 활용
      const isLight = (r + c) % 2 === 0;
      if (assets.sprites['uiBoardCell']) {
        ctx.globalAlpha = isLight ? 0.8 : 1.0;
        ctx.drawImage(assets.sprites['uiBoardCell'], cx, cy, actualCS, actualCS);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = isLight ? '#1e1e48' : '#282860';
        ctx.beginPath();
        ctx.roundRect(cx, cy, actualCS, actualCS, 3);
        ctx.fill();
      }

      // 선택 하이라이트
      if (isActive && gSelectedCell && gSelectedCell.r === r && gSelectedCell.c === c) {
        renderSelectionGlow(ctx, cx, cy, actualCS, gTime);
      }

      // 힌트 하이라이트 (펄스)
      if (isActive && gHintCells) {
        for (const hc of gHintCells) {
          if (hc.r === r && hc.c === c) {
            const pulse = 0.3 + Math.sin(gTime * 0.005) * 0.2;
            ctx.fillStyle = `rgba(255,215,0,${pulse})`;
            ctx.fillRect(cx + 2, cy + 2, actualCS - 4, actualCS - 4);
          }
        }
      }

      // 돌블록
      if (cell.obstacle === OBS.STONE) {
        drawAssetOrFallback(ctx, OBS_ASSET[OBS.STONE], cx + 2, cy + 2, actualCS - 4, actualCS - 4,
          (ctx2, x2, y2, w2, h2) => drawObstacleFallback(ctx2, x2, y2, w2, h2, OBS.STONE));
        continue;
      }

      // 보석
      if (cell.color >= 0) {
        const gPad = actualCS * 0.1;
        const gx = cx + gPad + idle.x;
        const gy = cy + gPad + idle.y;
        const gs = actualCS - gPad * 2;

        ctx.save();
        ctx.globalAlpha = (cell.alpha !== undefined ? cell.alpha : 1);

        // 보석 에셋 또는 폴백 — 아이들 시 gemIdleSheet 활용
        if (gCascadePhase === 'idle' && isActive && cell.special === SP.NONE && assets.sprites['gemIdleSheet']) {
          drawGemFromSheet(ctx, cell.color, gx, gy, gs, gs, gTime);
        } else {
          drawAssetOrFallback(ctx, GEM_ASSET_KEYS[cell.color], gx, gy, gs, gs,
            (ctx2, x2, y2, w2, h2) => drawGemFallback(ctx2, x2, y2, w2, h2, cell.color));
        }

        // 스페셜 오버레이
        if (cell.special !== SP.NONE) {
          // 펄스 애니메이션
          const spPulse = 0.8 + Math.sin(gTime * 0.006) * 0.2;
          ctx.globalAlpha = spPulse;
          drawAssetOrFallback(ctx, SP_ASSET[cell.special], gx - 2, gy - 2, gs + 4, gs + 4,
            (ctx2, x2, y2, w2, h2) => drawSpecialFallback(ctx2, x2, y2, w2, h2, cell.special));
        }

        ctx.restore();
      }

      // 장애물 오버레이
      if (cell.obstacle !== OBS.NONE && cell.obstacle !== OBS.STONE) {
        ctx.save();
        // 독은 펄스 효과
        if (cell.obstacle === OBS.POISON) {
          ctx.globalAlpha = 0.6 + Math.sin(gTime * 0.004) * 0.2;
        }
        drawAssetOrFallback(ctx, OBS_ASSET[cell.obstacle], cx, cy, actualCS, actualCS,
          (ctx2, x2, y2, w2, h2) => drawObstacleFallback(ctx2, x2, y2, w2, h2, cell.obstacle));
        ctx.restore();
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 왕국 맵 상세 렌더링 ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderKingdomMapDetailed(ctx, w, h) {
  // 배경
  drawAssetOrFallback(ctx, 'bgKingdom', 0, 0, w, h, (ctx2, x2, y2, w2, h2) => {
    // 하늘 그라디언트
    const skyGrad = ctx2.createLinearGradient(0, 0, 0, h2 * 0.5);
    skyGrad.addColorStop(0, '#4488cc');
    skyGrad.addColorStop(1, '#88bbee');
    ctx2.fillStyle = skyGrad;
    ctx2.fillRect(0, 0, w2, h2 * 0.5);

    // 언덕 그라디언트
    const hillGrad = ctx2.createLinearGradient(0, h2 * 0.4, 0, h2);
    hillGrad.addColorStop(0, '#44aa66');
    hillGrad.addColorStop(1, '#226633');
    ctx2.fillStyle = hillGrad;
    ctx2.fillRect(0, h2 * 0.4, w2, h2 * 0.6);

    // 구름
    ctx2.fillStyle = '#ffffff55';
    for (let i = 0; i < 5; i++) {
      const cloudX = (w2 * 0.1 + i * w2 * 0.2 + gTime * 0.01) % (w2 + 100) - 50;
      const cloudY = h2 * 0.1 + i * h2 * 0.05;
      ctx2.beginPath();
      ctx2.arc(cloudX, cloudY, 25, 0, Math.PI * 2);
      ctx2.arc(cloudX + 20, cloudY - 10, 20, 0, Math.PI * 2);
      ctx2.arc(cloudX + 40, cloudY, 25, 0, Math.PI * 2);
      ctx2.fill();
    }

    // 길 (연결선)
    ctx2.strokeStyle = '#dda87744';
    ctx2.lineWidth = 6;
    ctx2.setLineDash([10, 5]);
    ctx2.beginPath();
    ctx2.moveTo(w2 * 0.1, h2 * 0.6);
    ctx2.lineTo(w2 * 0.3, h2 * 0.55);
    ctx2.lineTo(w2 * 0.5, h2 * 0.6);
    ctx2.lineTo(w2 * 0.7, h2 * 0.55);
    ctx2.lineTo(w2 * 0.9, h2 * 0.6);
    ctx2.stroke();
    ctx2.setLineDash([]);
  });

  // 배경 파티클
  renderBgParticles(ctx, w, h);
}

// ═══════════════════════════════════════════════════════════════════
// ── 승리/패배 연출 강화 ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gResultAnimTimer = 0;

function renderVictoryEffect(ctx, w, h) {
  gResultAnimTimer += 16; // 대략적 dt

  // 불꽃놀이 파티클
  if (gResultAnimTimer % 200 < 20) {
    const fx = MathUtil.randRange(w * 0.2, w * 0.8);
    const fy = MathUtil.randRange(h * 0.1, h * 0.4);
    particles.emit(fx, fy, 15, {
      color: ['#ffd700', '#ff4466', '#4ade80', '#00d4ff'][MathUtil.randInt(0, 3)],
      speed: 150,
      life: 0.8,
      size: 6,
      spread: Math.PI * 2,
      texture: assets.sprites['particleStar'] || null
    });
  }

  // 승리 이펙트 — 4프레임 스프라이트 시트 활용
  const victoryProgress = MathUtil.clamp(gResultAnimTimer / 1200, 0, 1);
  if (!drawEffectSpriteSheet(ctx, 'effectVictory', w * 0.3, h * 0.05, w * 0.4, h * 0.12, victoryProgress)) {
    drawAssetOrFallback(ctx, 'effectVictory', w * 0.3, h * 0.05, w * 0.4, h * 0.12, null);
  }
}

function renderDefeatEffect(ctx, w, h) {
  // 화면 어둡게
  ctx.fillStyle = 'rgba(255,0,0,0.03)';
  ctx.fillRect(0, 0, w, h);
}

// ── 상세 점수 계산 및 통계 ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gMatchStats = {
  totalMatches: 0,
  match3Count: 0,
  match4Count: 0,
  match5Count: 0,
  matchTLCount: 0,
  maxCombo: 0,
  specialsCreated: 0,
  obstaclesRemoved: 0,
  totalCascades: 0
};

function resetMatchStats() {
  gMatchStats = {
    totalMatches: 0, match3Count: 0, match4Count: 0, match5Count: 0,
    matchTLCount: 0, maxCombo: 0, specialsCreated: 0, obstaclesRemoved: 0, totalCascades: 0
  };
}

function recordMatchStat(matchType) {
  gMatchStats.totalMatches++;
  switch (matchType) {
    case 'match3': gMatchStats.match3Count++; break;
    case 'match4h': case 'match4v': gMatchStats.match4Count++; break;
    case 'match5': gMatchStats.match5Count++; break;
    case 'matchTL': gMatchStats.matchTLCount++; break;
  }
  if (gComboCount > gMatchStats.maxCombo) gMatchStats.maxCombo = gComboCount;
}

function renderMatchStatsPanel(ctx, w, h) {
  const fs = Layout.fontSize(12, w, h);
  const panelW = Layout.px(200, w, h);
  const panelH = Layout.px(160, w, h);
  const px = w - panelW - 10;
  const py = h * 0.25;

  ctx.fillStyle = '#0a0a1acc';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(px, py, panelW, panelH, 8);
  ctx.fill(); ctx.stroke();

  const lines = [
    ['매치 합계', gMatchStats.totalMatches],
    ['3매치', gMatchStats.match3Count],
    ['4매치', gMatchStats.match4Count],
    ['T/L형', gMatchStats.matchTLCount],
    ['5매치', gMatchStats.match5Count],
    ['최대 콤보', gMatchStats.maxCombo],
    ['스페셜 생성', gMatchStats.specialsCreated],
  ];

  for (let i = 0; i < lines.length; i++) {
    UI.text(ctx, lines[i][0], px + 10, py + 16 + i * fs * 1.6, { size: fs, color: '#8080a0', align: 'left' });
    UI.text(ctx, '' + lines[i][1], px + panelW - 10, py + 16 + i * fs * 1.6, { size: fs, bold: true, color: '#ffd700', align: 'right' });
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 모바일 터치 조작 UI (스와이프 가이드) ──────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderMobileTouchGuide(ctx, w, h) {
  if (!input.isMobile) return;
  if (gCascadePhase !== 'idle') return;
  if (gSelectedCell && gDragStart) {
    // 드래그 방향 가이드 표시
    const bl = getBoardLayout(w, h);
    const cx = bl.boardX + bl.padding + gSelectedCell.c * (bl.cellSize + bl.padding) + bl.cellSize / 2;
    const cy = bl.boardY + bl.padding + gSelectedCell.r * (bl.cellSize + bl.padding) + bl.cellSize / 2;

    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);

    // 4방향 화살표
    const arrowLen = bl.cellSize * 0.8;
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    for (const [dr, dc] of dirs) {
      const nr = gSelectedCell.r + dr;
      const nc = gSelectedCell.c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        const cell = safeGridAccess(gGrid, nr, nc);
        if (cell && cell.obstacle !== OBS.STONE) {
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + dc * arrowLen, cy + dr * arrowLen);
          ctx.stroke();
        }
      }
    }

    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 장애물 전송 시각 효과 ─────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gSendEffects = [];

function addSendEffect(fromX, fromY, toX, toY, type) {
  gSendEffects.push({
    fromX, fromY, toX, toY,
    progress: 0,
    type,
    life: 600
  });
}

function updateSendEffects(dt) {
  for (let i = gSendEffects.length - 1; i >= 0; i--) {
    gSendEffects[i].progress += dt / gSendEffects[i].life;
    if (gSendEffects[i].progress >= 1) {
      gSendEffects.splice(i, 1);
    }
  }
}

function renderSendEffects(ctx, w, h) {
  for (const eff of gSendEffects) {
    const t = eff.progress;
    const easeT = t * (2 - t); // easeOut
    const x = MathUtil.lerp(eff.fromX, eff.toX, easeT);
    const y = MathUtil.lerp(eff.fromY, eff.toY, easeT) - Math.sin(t * Math.PI) * 50;

    ctx.save();
    ctx.globalAlpha = 1 - t;

    // 에너지 트레일
    ctx.strokeStyle = '#aa44ff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(eff.fromX, eff.fromY);
    ctx.quadraticCurveTo(
      (eff.fromX + eff.toX) / 2,
      Math.min(eff.fromY, eff.toY) - 60,
      x, y
    );
    ctx.stroke();

    // 장애물 아이콘
    const size = 20 * (1 - t * 0.5);
    drawObstacleFallback(ctx, x - size/2, y - size/2, size, size, eff.type);

    ctx.restore();
  }
}

// ── 최고 기록 화면 표시 ──────────────────────────────────────────

function renderHighScoreIndicator(ctx, w, h) {
  const hi = Save.getHighScore(GAME_ID);
  if (hi <= 0) return;
  const fs = Layout.fontSize(12, w, h);
  UI.text(ctx, (gLang === 'en' ? 'Best: ' : '최고: ') + hi, w * 0.95, h * 0.02 + fs, {
    size: fs, color: '#ffd70088', align: 'right'
  });

// ═══════════════════════════════════════════════════════════════════
// ── 보석 스왑 애니메이션 (보간) ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gSwapAnim = null;

function startSwapAnimation(board, r1, c1, r2, c2, onComplete) {
  gSwapAnim = {
    board, r1, c1, r2, c2,
    progress: 0,
    duration: 150,
    onComplete
  };
}

function updateSwapAnimation(dt) {
  if (!gSwapAnim) return;
  gSwapAnim.progress += dt;
  if (gSwapAnim.progress >= gSwapAnim.duration) {
    if (gSwapAnim.onComplete) gSwapAnim.onComplete();
    gSwapAnim = null;
  }
}

function getSwapOffset(r, c) {
  if (!gSwapAnim) return { x: 0, y: 0 };
  const t = MathUtil.clamp(gSwapAnim.progress / gSwapAnim.duration, 0, 1);
  const ease = t * (2 - t); // easeOut

  const bl = getBoardLayout(engine.W, engine.H);
  const cellW = bl.cellSize + bl.padding;

  if (r === gSwapAnim.r1 && c === gSwapAnim.c1) {
    return {
      x: (gSwapAnim.c2 - gSwapAnim.c1) * cellW * ease,
      y: (gSwapAnim.r2 - gSwapAnim.r1) * cellW * ease
    };
  }
  if (r === gSwapAnim.r2 && c === gSwapAnim.c2) {
    return {
      x: (gSwapAnim.c1 - gSwapAnim.c2) * cellW * ease,
      y: (gSwapAnim.r1 - gSwapAnim.r2) * cellW * ease
    };
  }
  return { x: 0, y: 0 };
}

// ═══════════════════════════════════════════════════════════════════
// ── PvP 결과 상세 통계 화면 ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderPvpResultDetailed(ctx, w, h) {
  let win = gPlayerScore > gOpponentScore;
  let draw = gPlayerScore === gOpponentScore;
  if (draw) {
    if (gLastComboScorePlayer > gLastComboScoreOpponent) { win = true; draw = false; }
    else if (gLastComboScoreOpponent > gLastComboScorePlayer) { win = false; draw = false; }
  }
  const fs = Layout.fontSize(14, w, h);

  // 통계 패널
  const panelW = Layout.px(300, w, h);
  const panelH = Layout.px(150, w, h);
  const px = (w - panelW) / 2;
  const py = h * 0.48;

  ctx.fillStyle = '#0a0a2acc';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(px, py, panelW, panelH, 8);
  ctx.fill(); ctx.stroke();

  const stats = [
    [gLang==='en'?'Total Matches':'총 매치', gMatchStats.totalMatches],
    [gLang==='en'?'Max Combo':'최대 콤보', gMatchStats.maxCombo],
    [gLang==='en'?'Specials':'스페셜 생성', gMatchStats.specialsCreated],
    [gLang==='en'?'Obstacles':'장애물 제거', gMatchStats.obstaclesRemoved],
    [gLang==='en'?'Cascades':'캐스케이드', gMatchStats.totalCascades],
  ];

  for (let i = 0; i < stats.length; i++) {
    UI.text(ctx, stats[i][0], px + 15, py + 20 + i * fs * 1.8, { size: fs, color: '#8080a0', align: 'left' });
    UI.text(ctx, '' + stats[i][1], px + panelW - 15, py + 20 + i * fs * 1.8, { size: fs, bold: true, color: '#ffd700', align: 'right' });
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 솔로 레벨 목표 추적 강화 ─────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function updateSoloTargetsFromMatch(matchType, cells, board) {
  if (gState !== STATE.PLAY || gPvpMode) return;

  // 보석 수집 목표
  if (cells && cells.length > 0) {
    const color = safeGridAccess(board, cells[0].r, cells[0].c);
    if (color && gLevelTargets) {
      for (const tgt of gLevelTargets) {
        if (tgt.type === 'gemCollect' && color.color === tgt.color) {
          tgt.current += cells.length;
        }
      }
    }
  }

  // 장애물 제거 목표 — damageAdjacentObstacles에서 호출
  // 스페셜 생성 목표
  if (matchType === 'match4h' || matchType === 'match4v' || matchType === 'matchTL' || matchType === 'match5') {
    updateSoloTargets('specialCreate', 1);
    gMatchStats.specialsCreated++;
  }

  // 통계 기록
  recordMatchStat(matchType);
}

// ═══════════════════════════════════════════════════════════════════
// ── 레벨 데이터 정합성 검증 ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function validateLevelData() {
  for (let i = 0; i < LEVEL_DATA.length; i++) {
    const lv = LEVEL_DATA[i];
    if (lv.level !== i + 1) console.warn(`[LevelData] Level ${i+1} mismatch: ${lv.level}`);
    if (lv.turns < 5 || lv.turns > 30) console.warn(`[LevelData] Level ${lv.level} turns out of range: ${lv.turns}`);
    if (!lv.targets || lv.targets.length === 0) console.warn(`[LevelData] Level ${lv.level} has no targets`);
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 보석 아이들 시트 애니메이션 활용 ──────────────────────────────
// ═══════════════════════════════════════════════════════════════════

/** 4프레임 이펙트 스프라이트 시트 렌더링 (512×128, 각 프레임 128×128) */
function drawEffectSpriteSheet(ctx, assetKey, x, y, w, h, progress) {
  const sheet = assets.sprites[assetKey];
  if (!sheet) return false;
  const frameW = 128, frameH = 128, totalFrames = 4;
  const frame = Math.min(Math.floor(progress * totalFrames), totalFrames - 1);
  ctx.drawImage(sheet, frame * frameW, 0, frameW, frameH, x, y, w, h);
  return true;
}

function drawGemFromSheet(ctx, colorIdx, x, y, w, h, time) {
  const sheet = assets.sprites['gemIdleSheet'];
  if (!sheet) {
    drawGemFallback(ctx, x, y, w, h, colorIdx);
    return;
  }

  // 6색 × 4프레임 = 24프레임, 각 128×128
  const frameW = 128;
  const frameH = 128;
  const framesPerColor = 4;
  const frame = Math.floor((time / 200) % framesPerColor);
  const sx = (colorIdx * framesPerColor + frame) * frameW;

  ctx.drawImage(sheet, sx, 0, frameW, frameH, x, y, w, h);
}

// ═══════════════════════════════════════════════════════════════════
// ── 시작 화면 보석 드랍 애니메이션 ──────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
const titleGems = [];
const TITLE_GEM_COUNT = 30;

function initTitleGems(w, h) {
  titleGems.length = 0;
  for (let i = 0; i < TITLE_GEM_COUNT; i++) {
    titleGems.push({
      x: Math.random() * w,
      y: Math.random() * h * 0.6 + h * 0.2,
      vy: 20 + Math.random() * 40,
      size: 15 + Math.random() * 25,
      color: Math.floor(Math.random() * GEM_COLORS),
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 2,
      alpha: 0.3 + Math.random() * 0.4
    });
  }
}

function updateTitleGems(dt, w, h) {
  const dtSec = dt / 1000;
  for (const gem of titleGems) {
    gem.y += gem.vy * dtSec;
    gem.rotation += gem.rotSpeed * dtSec;
    if (gem.y > h + gem.size) {
      gem.y = -gem.size;
      gem.x = Math.random() * w;
    }
  }
}

function renderTitleGems(ctx, w, h) {
  for (const gem of titleGems) {
    ctx.save();
    ctx.globalAlpha = gem.alpha;
    ctx.translate(gem.x, gem.y);
    ctx.rotate(gem.rotation);
    drawGemFallback(ctx, -gem.size/2, -gem.size/2, gem.size, gem.size, gem.color);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 날씨/시간대 효과 ──────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function getTimeOfDay() {
  const hour = new Date().getHours();
  if (hour >= 6 && hour < 12) return 'morning';
  if (hour >= 12 && hour < 18) return 'afternoon';
  if (hour >= 18 && hour < 21) return 'evening';
  return 'night';
}

function getTimeOverlayColor() {
  switch (getTimeOfDay()) {
    case 'morning': return 'rgba(255,200,100,0.05)';
    case 'afternoon': return 'rgba(255,255,200,0.03)';
    case 'evening': return 'rgba(255,100,50,0.08)';
    case 'night': return 'rgba(50,50,150,0.1)';
    default: return 'rgba(0,0,0,0)';
  }
}

function renderTimeOverlay(ctx, w, h) {
  ctx.fillStyle = getTimeOverlayColor();
  ctx.fillRect(0, 0, w, h);
}

// ═══════════════════════════════════════════════════════════════════
// ── 카메라 줌/팬 시스템 (왕국 맵용) ──────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gCameraZoom = 1;
let gCameraX = 0;
let gCameraY = 0;
let gTargetZoom = 1;
let gTargetCameraX = 0;
let gTargetCameraY = 0;

function updateCamera(dt) {
  const lerpRate = dt * 0.003;
  gCameraZoom = MathUtil.lerp(gCameraZoom, gTargetZoom, lerpRate);
  gCameraX = MathUtil.lerp(gCameraX, gTargetCameraX, lerpRate);
  gCameraY = MathUtil.lerp(gCameraY, gTargetCameraY, lerpRate);
}

function applyCameraTransform(ctx, w, h) {
  ctx.translate(w/2 + gCameraX, h/2 + gCameraY);
  ctx.scale(gCameraZoom, gCameraZoom);
  ctx.translate(-w/2, -h/2);
}

function resetCamera() {
  gCameraZoom = 1; gCameraX = 0; gCameraY = 0;
  gTargetZoom = 1; gTargetCameraX = 0; gTargetCameraY = 0;
}

// ═══════════════════════════════════════════════════════════════════
// ── 구역 완성 축하 연출 ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gZoneCompleteAnim = false;
let gZoneCompleteTimer = 0;
let gZoneCompleteIdx = -1;

function startZoneCompleteAnim(zoneIdx) {
  gZoneCompleteAnim = true;
  gZoneCompleteTimer = 0;
  gZoneCompleteIdx = zoneIdx;
}

function updateZoneComplete(dt) {
  if (!gZoneCompleteAnim) return;
  gZoneCompleteTimer += dt;

  if (gZoneCompleteTimer < 2000 && Math.random() > 0.4) {
    particles.emit(engine.W / 2, engine.H * 0.3, 5, {
      color: ZONE_COLORS[gZoneCompleteIdx] || '#ffd700',
      speed: 180,
      life: 0.7,
      size: 6,
      spread: Math.PI * 2,
      texture: assets.sprites['particleSparkle'] || null
    });
  }

  if (gZoneCompleteTimer >= 3000) {
    gZoneCompleteAnim = false;
  }
}

function renderZoneComplete(ctx, w, h) {
  if (!gZoneCompleteAnim) return;

  const t = gZoneCompleteTimer;
  const fadeIn = Math.min(1, t / 500);
  const fadeOut = t > 2000 ? 1 - (t - 2000) / 1000 : 1;

  ctx.save();
  ctx.globalAlpha = fadeIn * fadeOut * 0.85;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  ctx.globalAlpha = fadeIn * fadeOut;

  const zNames = gLang === 'en' ? ZONE_NAMES_EN : ZONE_NAMES_KO;
  UI.text(ctx, (gLang === 'en' ? 'Zone Complete!' : '구역 완성!'), w / 2, h * 0.3, {
    size: Layout.fontSize(40, w, h), bold: true, color: '#ffd700', glow: '#ffd700'
  });

  UI.text(ctx, zNames[gZoneCompleteIdx] || '', w / 2, h * 0.45, {
    size: Layout.fontSize(28, w, h), bold: true, color: ZONE_COLORS[gZoneCompleteIdx] || '#fff'
  });

  // 건물 아이콘 큰 버전
  const iconSize = Layout.px(120, w, h);
  const scale = 1 + Math.sin(t * 0.003) * 0.05;
  ctx.save();
  ctx.translate(w/2, h*0.6);
  ctx.scale(scale, scale);
  drawAssetOrFallback(ctx, ZONE_ASSET[gZoneCompleteIdx], -iconSize/2, -iconSize/2, iconSize, iconSize, (ctx2, x2, y2, w2, h2) => {
    ctx2.fillStyle = ZONE_COLORS[gZoneCompleteIdx] + '88';
    ctx2.fillRect(x2 + w2*0.2, y2 + h2*0.3, w2*0.6, h2*0.6);
  });
  ctx.restore();

  // 보너스 텍스트
  UI.text(ctx, (gLang === 'en' ? 'Bonus unlocked!' : '보너스 해금!'), w / 2, h * 0.8, {
    size: Layout.fontSize(18, w, h), color: '#4ade80'
  });

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// ── 난이도 선택 표시 (DDA 상태) ──────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderDDAIndicator(ctx, w, h) {
  if (gFailStreak < 2) return;

  const fs = Layout.fontSize(11, w, h);
  let text, color;
  if (gFailStreak >= 4) {
    text = gLang === 'en' ? '★ Easy Mode' : '★ 쉬움 모드';
    color = '#4ade80';
  } else {
    text = gLang === 'en' ? '☆ Hint Active' : '☆ 보정 활성';
    color = '#ffd70088';
  }

  UI.text(ctx, text, w * 0.5, h * 0.97, { size: fs, color, align: 'center' });
}

// ═══════════════════════════════════════════════════════════════════
// ── 스캔라인 + CRT 효과 (PvP 전용) ──────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function renderCRTEffect(ctx, w, h) {
  // 스캔라인
  UI.scanlines(ctx, w, h, 0.015);

  // 비네팅 (코너 어두움)
  const vignette = ctx.createRadialGradient(w/2, h/2, h*0.4, w/2, h/2, h*0.9);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, w, h);
}

// ═══════════════════════════════════════════════════════════════════
// ── 게임 초기화 후 추가 호출 (배경 파티클, 타이틀 보석 등) ──────────
// ═══════════════════════════════════════════════════════════════════

function postInit() {
  initBgParticles(engine.W, engine.H);
  initTitleGems(engine.W, engine.H);
  validateLevelData();
  resetMatchStats();

  // 튜토리얼 체크
  if (shouldShowTutorial()) {
    // 첫 플레이 시 튜토리얼 표시 — PLAY 진입 시 시작
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 확장된 init 함수 ──────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

// 기존 init()에 postInit 추가
const _origInit = init;
// init 함수는 이미 정의됨 — postInit은 gReady 설정 후 호출

// 원래 init이 완료된 후 추가 초기화
// -> init() 내부의 gReady = true 이후 postInit() 호출이 필요
// 하지만 함수 오버라이드 0건 정책에 따라, 별도 타이머로 처리
let _postInitDone = false;
function checkPostInit() {
  if (gReady && !_postInitDone) {
    _postInitDone = true;
    postInit();
  }
}

// coreUpdate에 후처리 연결 — 기존 coreUpdate를 확장하지 않고
// 매 프레임 체크하는 방식으로 (오버라이드 0건)
const _origCoreUpdate = coreUpdate;

// 오버라이드 없이 postInit을 호출하기 위한 안전한 방법:
// engine의 _update 콜백에 래퍼 설정
engine._update = function(dt, timestamp) {
  checkPostInit();
  _origCoreUpdate(dt, timestamp);
  // 추가 시스템 업데이트
  if (gReady) {
    updateBgParticles(dt, engine.W, engine.H);
    updateTitleGems(dt, engine.W, engine.H);
    updateVsIntro(dt);
    updateLeagueUp(dt);
    updateZoneComplete(dt);
    updateSendEffects(dt);
    updateSwapAnimation(dt);
    updateMatchEffects(dt);
    updateCamera(dt);
    if (gTutorialStep >= 0) updateTutorial(dt);
  }
};

// render도 래퍼로 확장
const _origCoreRender = coreRender;
engine._render = function(ctx, w, h, dt) {
  _origCoreRender(ctx, w, h, dt);

  if (!gReady) return;

  // 추가 렌더링 (페이드 이전에 처리해야 할 것들은 coreRender 내부에서)
  // 페이드 이후에 오버레이로 추가할 것들:
  renderTimeOverlay(ctx, w, h);
  renderVsIntro(ctx, w, h);
  renderLeagueUp(ctx, w, h);
  renderZoneComplete(ctx, w, h);
  renderSendEffects(ctx, w, h);

  if (gState === STATE.PLAY || gState === STATE.PVP_MATCH) {
    renderMobileTouchGuide(ctx, w, h);
    renderDDAIndicator(ctx, w, h);
    renderHighScoreIndicator(ctx, w, h);
  }

  if (gTutorialStep >= 0) {
    renderTutorial(ctx, w, h);
  }

  // CRT 효과 (PvP)
  if (gState === STATE.PVP_MATCH) {
    renderCRTEffect(ctx, w, h);
  }
};

// 시작!
init();
</script>
