// ── SeededRNG (C50 계승) ──────────────────────────────────────────

class SeededRNG {
  constructor(seed) { this.s = seed % 2147483647; if (this.s <= 0) this.s += 2147483646; }
  next() { this.s = (this.s * 16807) % 2147483647; return (this.s - 1) / 2147483646; }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
}
let gRng = new SeededRNG(Date.now());

// ── ObjectPool ────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
class ObjectPool {
  constructor(factory, resetFn, initSize = 50) {
    this._factory = factory; this._reset = resetFn; this._pool = [];
    for (let i = 0; i < initSize; i++) this._pool.push(factory());
  }
  acquire() {
    if (this._pool.length > 0) { const obj = this._pool.pop(); this._reset(obj); return obj; }
    return this._factory();
  }
  release(obj) { this._pool.push(obj); }
  releaseAll(arr) { for (const o of arr) this._pool.push(o); arr.length = 0; }
}

let gTransitioning = false;
let gDeferredQueue = [];

/** 페이드 전환: gFadeAlpha를 1로 올렸다가 상태 변경 후 0으로 내린다 */
function beginTransition(toState) {
  // SETTINGS는 특수 처리
  if (toState === STATE.SETTINGS) {
    gSettingsReturnState = gState;
  }
  // 화이트리스트 검증
  const allowed = TRANSITION_TABLE[gState];
  if (toState !== STATE.SETTINGS && allowed && !allowed.includes(toState)) {
    console.warn(`[Transition] ${STATE_NAMES[gState]} → ${STATE_NAMES[toState]} NOT ALLOWED`);
    return;
  }
  if (gTransitioning) {
    gDeferredQueue.push(toState);
    return;
  }
  gTransitioning = true;
  const fadeObj = { a: 0 };
  tween.add(fadeObj, { a: 1 }, 250, 'easeIn', () => {
    gFadeAlpha = 1;
    enterState(toState);
    const fadeObj2 = { a: 1 };
    tween.add(fadeObj2, { a: 0 }, 250, 'easeOut', () => {
      gFadeAlpha = 0;
      gTransitioning = false;
      // 큐에 대기 중인 전환 처리
      if (gDeferredQueue.length > 0) {
        const next = gDeferredQueue.shift();
        beginTransition(next);
      }
    });
    // 매 프레임 fadeObj2.a를 gFadeAlpha에 동기화
    const syncFade2 = { _t: 0 };
    const syncInterval = setInterval(() => {
      gFadeAlpha = fadeObj2.a;
      if (fadeObj2.a <= 0.01) { gFadeAlpha = 0; clearInterval(syncInterval); }
    }, 16);
  });
  // 매 프레임 fadeObj.a를 gFadeAlpha에 동기화
  const syncInterval = setInterval(() => {
    gFadeAlpha = fadeObj.a;
    if (fadeObj.a >= 0.99) { clearInterval(syncInterval); }
  }, 16);
}

/** 즉시 전환 (페이드 없음) */
function directTransition(toState) {
  if (toState === STATE.SETTINGS) {
    gSettingsReturnState = gState;
  }
  const allowed = TRANSITION_TABLE[gState];
  if (toState !== STATE.SETTINGS && allowed && !allowed.includes(toState)) {
    console.warn(`[DirectTransition] ${STATE_NAMES[gState]} → ${STATE_NAMES[toState]} NOT ALLOWED`);
    return;
  }
  enterState(toState);
}

      gTitleAlpha = 0;
      tween.clear();
      particles.clear();
      const tObj = { a: 0 };

}

const BGM_INTERVAL = 2000; // 2초마다 코드 변경

function updateBgm(dt) {
  if (!gSettingsMusicOn) return;

  if (gBgmTimer >= BGM_INTERVAL) {
    gBgmTimer -= BGM_INTERVAL;
    const chord = BGM_CHORDS[gBgmBeatIdx % BGM_CHORDS.length];
    for (const freq of chord) {
      sound.tone(freq * (gPvpMode ? 1.1 : 1.0), 1.5, 'sine', 0.03);
    }
    gBgmBeatIdx++;
  }
}

// ── SaveManager ───────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
const SAVE_KEY = 'ix_gem_arena_save';
const SAVE_VERSION = 1;

function loadGameData() {
  const data = Save.get(SAVE_KEY, null);
  if (!data || data.version !== SAVE_VERSION) {
    resetGameData();
    return;
  }
  gKingdomData = data.kingdom || { zones:[0,0,0,0,0], totalStars:0, coins:100 };
  gTrophies = data.trophies || 0;
  gCurrentLeague = getLeagueFromTrophies(gTrophies);
  gCurrentLevel = data.currentLevel || 1;
  gFailStreak = data.failStreak || 0;
  gDailyCompleted = data.dailyCompleted === getTodaySeed();
  gSettingsSoundOn = data.soundOn !== undefined ? data.soundOn : true;
  gSettingsMusicOn = data.musicOn !== undefined ? data.musicOn : true;
  gLang = data.lang || 'ko';
}

function saveGameData() {
  Save.set(SAVE_KEY, {
    version: SAVE_VERSION,
    kingdom: gKingdomData,
    trophies: gTrophies,
    currentLevel: gCurrentLevel,
    failStreak: gFailStreak,
    dailyCompleted: gDailyCompleted ? getTodaySeed() : 0,
    soundOn: gSettingsSoundOn,
    musicOn: gSettingsMusicOn,
    lang: gLang
  });
}

function resetGameData() {
  gKingdomData = { zones:[0,0,0,0,0], totalStars:0, coins:100 };
  gTrophies = 0;
  gCurrentLeague = LEAGUE.BRONZE;
  gCurrentLevel = 1;
  gFailStreak = 0;
  gDailyCompleted = false;
  saveGameData();
}

function getLeagueFromTrophies(tr) {
  for (let i = LEAGUE_THRESHOLDS.length - 1; i >= 0; i--) {
    if (tr >= LEAGUE_THRESHOLDS[i]) return i;
  }
  return 0;
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ═══════════════════════════════════════════════════════════════════
// ── Match-3 엔진 ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

/** 안전한 그리드 접근 래퍼 */
function safeGridAccess(grid, r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  if (!grid || !grid[r]) return null;
  return grid[r][c];
}

/** 셀 생성 */
function createCell(color, special, obstacle) {
  return { color: color, special: special || SP.NONE, obstacle: obstacle || OBS.NONE, x:0, y:0, alpha:1, scale:1 };
}

/** 보드 초기화 (3매치 없는 상태까지 반복 생성) */
function generateBoard(rng, obstacleMap) {
  let board = [];
  for (let attempt = 0; attempt < 100; attempt++) {
    board = [];
    for (let r = 0; r < ROWS; r++) {
      board[r] = [];
      for (let c = 0; c < COLS; c++) {
        let color = rng.nextInt(0, GEM_COLORS - 1);
        // 3매치 방지
        while (
          (c >= 2 && board[r][c-1] && board[r][c-2] && board[r][c-1].color === color && board[r][c-2].color === color) ||
          (r >= 2 && board[r-1] && board[r-2] && board[r-1][c] && board[r-2][c] && board[r-1][c].color === color && board[r-2][c].color === color)
        ) {
          color = rng.nextInt(0, GEM_COLORS - 1);
        }
        const obs = (obstacleMap && obstacleMap[r] && obstacleMap[r][c]) ? obstacleMap[r][c] : OBS.NONE;
        board[r][c] = createCell(color, SP.NONE, obs);
      }
    }
    if (!hasMatchesOnBoard(board) && countValidMoves(board) > 0) break;
  }
  return board;
}

/** 보드 전체 3매치 이상 존재 여부 검사 */
function hasMatchesOnBoard(board) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const a = safeGridAccess(board, r, c);
      const b = safeGridAccess(board, r, c+1);
      const d = safeGridAccess(board, r, c+2);
      if (a && b && d && a.color >= 0 && a.color === b.color && b.color === d.color && a.obstacle !== OBS.STONE) return true;
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const a = safeGridAccess(board, r, c);
      const b = safeGridAccess(board, r+1, c);
      const d = safeGridAccess(board, r+2, c);
      if (a && b && d && a.color >= 0 && a.color === b.color && b.color === d.color && a.obstacle !== OBS.STONE) return true;
    }
  }
  return false;
}

/** 유효한 이동 수 계산 */
function countValidMoves(board) {
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell || cell.obstacle === OBS.STONE) continue;
      // 오른쪽 스왑 체크
      if (c < COLS - 1) {
        const right = safeGridAccess(board, r, c+1);
        if (right && right.obstacle !== OBS.STONE) {
          swapCells(board, r, c, r, c+1);
          if (hasMatchesOnBoard(board)) count++;
          swapCells(board, r, c, r, c+1);
        }
      }
      // 아래 스왑 체크
      if (r < ROWS - 1) {
        const below = safeGridAccess(board, r+1, c);
        if (below && below.obstacle !== OBS.STONE) {
          swapCells(board, r, c, r+1, c);
          if (hasMatchesOnBoard(board)) count++;
          swapCells(board, r, c, r+1, c);
        }
      }
    }
  }
  return count;
}

/** 두 셀 교환 */
function swapCells(board, r1, c1, r2, c2) {
  const a = safeGridAccess(board, r1, c1);
  const b = safeGridAccess(board, r2, c2);
  if (!a || !b) return;
  board[r1][c1] = b;
  board[r2][c2] = a;
}

/** 유효한 이동 하나 찾기 (힌트용) */
function findOneValidMove(board) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell || cell.obstacle === OBS.STONE) continue;
      const dirs = [[0,1],[1,0]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        const nb = safeGridAccess(board, nr, nc);
        if (!nb || nb.obstacle === OBS.STONE) continue;
        swapCells(board, r, c, nr, nc);
        if (hasMatchesOnBoard(board)) {
          swapCells(board, r, c, nr, nc);
          return [{r,c},{r:nr,c:nc}];
        }
        swapCells(board, r, c, nr, nc);
      }
    }
  }
  return null;
}

/** 모든 유효 이동 찾기 (AI용) */
function findAllValidMoves(board) {
  const moves = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell || cell.obstacle === OBS.STONE) continue;
      const dirs = [[0,1],[1,0]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        const nb = safeGridAccess(board, nr, nc);
        if (!nb || nb.obstacle === OBS.STONE) continue;
        swapCells(board, r, c, nr, nc);
        if (hasMatchesOnBoard(board)) {
          moves.push({ r1:r, c1:c, r2:nr, c2:nc });
        }
        swapCells(board, r, c, nr, nc);
      }
    }
  }
  return moves;
}

// ── consumed[][] 매치 소비 추적 ─────────────────────────────────
function resetConsumed() {
  gConsumed = [];
  for (let r = 0; r < ROWS; r++) {
    gConsumed[r] = [];
    for (let c = 0; c < COLS; c++) gConsumed[r][c] = false;
  }
}

/** 매치 검출 (우선순위: 5→T/L→4→3 + consumed 추적) */
function findMatches(board) {
  resetConsumed();
  const matches = [];

  // 5매치 (가로)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 5; c++) {
      if (checkLine(board, r, c, 0, 1, 5)) {
        const cells = [];
        for (let i = 0; i < 5; i++) cells.push({ r, c: c + i });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match5', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }
  // 5매치 (세로)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 5; r++) {
      if (checkLine(board, r, c, 1, 0, 5)) {
        const cells = [];
        for (let i = 0; i < 5; i++) cells.push({ r: r + i, c });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match5', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }

  // T형/L형 매치 (5칸)
  findTLMatches(board, matches);

  // 4매치 (가로)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 4; c++) {
      if (checkLine(board, r, c, 0, 1, 4)) {
        const cells = [];
        for (let i = 0; i < 4; i++) cells.push({ r, c: c + i });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match4h', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }
  // 4매치 (세로)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 4; r++) {
      if (checkLine(board, r, c, 1, 0, 4)) {
        const cells = [];
        for (let i = 0; i < 4; i++) cells.push({ r: r + i, c });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match4v', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }

  // 3매치 (가로)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 3; c++) {
      if (checkLine(board, r, c, 0, 1, 3)) {
        const cells = [];
        for (let i = 0; i < 3; i++) cells.push({ r, c: c + i });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match3', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }
  // 3매치 (세로)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 3; r++) {
      if (checkLine(board, r, c, 1, 0, 3)) {
        const cells = [];
        for (let i = 0; i < 3; i++) cells.push({ r: r + i, c });
        if (!anyCellConsumed(cells)) { consumeCells(cells); matches.push({ type: 'match3', cells, color: safeGridAccess(board, r, c).color }); }
      }
    }
  }

  return matches;
}

/** 직선 검사 (같은 색상이 length개 연속인가) */
function checkLine(board, r, c, dr, dc, length) {
  const first = safeGridAccess(board, r, c);
  if (!first || first.color < 0 || first.obstacle === OBS.STONE) return false;
  for (let i = 1; i < length; i++) {
    const cell = safeGridAccess(board, r + dr * i, c + dc * i);
    if (!cell || cell.color !== first.color || cell.obstacle === OBS.STONE) return false;
  }
  return true;
}

/** T형/L형 매치 검사 */
function findTLMatches(board, matches) {
  // T형과 L형: 3가로+3세로가 겹치는 패턴
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell || cell.color < 0 || cell.obstacle === OBS.STONE) continue;
      const color = cell.color;

      // L형: 3가로(시작)+3세로(아래) 등
      const patterns = [
        // L형 — 우+하
        [[0,0],[0,1],[0,2],[1,0],[2,0]],
        // L형 — 우+상
        [[0,0],[0,1],[0,2],[-1,0],[-2,0]],
        // L형 — 좌+하
        [[0,0],[0,-1],[0,-2],[1,0],[2,0]],
        // L형 — 좌+상
        [[0,0],[0,-1],[0,-2],[-1,0],[-2,0]],
        // T형 — 가로줄+중간에서 아래
        [[0,-1],[0,0],[0,1],[1,0],[2,0]],
        // T형 — 가로줄+중간에서 위
        [[0,-1],[0,0],[0,1],[-1,0],[-2,0]],
        // T형 — 세로줄+중간에서 오른쪽
        [[-1,0],[0,0],[1,0],[0,1],[0,2]],
        // T형 — 세로줄+중간에서 왼쪽
        [[-1,0],[0,0],[1,0],[0,-1],[0,-2]],
      ];

      for (const pattern of patterns) {
        let valid = true;
        const cells = [];
        for (const [dr, dc] of pattern) {
          const nr = r + dr, nc = c + dc;
          const t = safeGridAccess(board, nr, nc);
          if (!t || t.color !== color || t.obstacle === OBS.STONE) { valid = false; break; }
          cells.push({ r: nr, c: nc });
        }
        if (valid && !anyCellConsumed(cells)) {
          consumeCells(cells);
          matches.push({ type: 'matchTL', cells, color });
        }
      }
    }
  }
}

function anyCellConsumed(cells) {
  for (const { r, c } of cells) {
    if (gConsumed[r] && gConsumed[r][c]) return true;
  }
  return false;
}

function consumeCells(cells) {
  for (const { r, c } of cells) {
    if (gConsumed[r]) gConsumed[r][c] = true;
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 스페셜 보석 시스템 ─────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

/** 매치 결과에 따라 스페셜 보석 생성 */
function processMatchSpecials(board, match, swapPos) {
  let spawnR = -1, spawnC = -1;
  let spType = SP.NONE;

  switch (match.type) {
    case 'match5':
      spType = SP.RAINBOW;
      break;
    case 'matchTL':
      spType = SP.BOMB;
      break;
    case 'match4h':
      spType = SP.LINE_H;
      break;
    case 'match4v':
      spType = SP.LINE_V;
      break;
  }

  if (spType !== SP.NONE) {
    // 스페셜 생성 위치: 스왑한 셀 위치 우선, 아니면 매치 중앙
    if (swapPos) {
      const inMatch = match.cells.find(c => c.r === swapPos.r && c.c === swapPos.c);
      if (inMatch) { spawnR = swapPos.r; spawnC = swapPos.c; }
    }
    if (spawnR < 0) {
      const mid = Math.floor(match.cells.length / 2);
      spawnR = match.cells[mid].r;
      spawnC = match.cells[mid].c;
    }
    playSfx('specialCreate');
  }

  return { spType, spawnR, spawnC };
}

/** 스페셜 보석 발동 */
function activateSpecial(board, r, c, isCombo) {
  const cell = safeGridAccess(board, r, c);
  if (!cell) return [];
  const destroyed = [];
  const sp = cell.special;
  cell.special = SP.NONE;

  switch (sp) {
    case SP.LINE_H: {
      playSfx('lineDestroy');
      for (let cc = 0; cc < COLS; cc++) {
        const t = safeGridAccess(board, r, cc);
        if (t && t.obstacle !== OBS.STONE) destroyed.push({ r, c: cc });
      }
      addScore(board === gGrid ? 'player' : 'opponent', SCORE_TABLE.spLine);
      // 라인 레이저 이펙트
      const lpx = getBoardPixelX(c, engine.W, engine.H);
      const lpy = getBoardPixelY(r, engine.W, engine.H);
      const lbl = getBoardLayout(engine.W, engine.H);
      addMatchEffect('effectLineLaser', lpx, lpy, lbl.cellSize * 1.5);
      break;
    }

    case SP.LINE_V: {
      playSfx('lineDestroy');
      for (let rr = 0; rr < ROWS; rr++) {
        const t = safeGridAccess(board, rr, c);
        if (t && t.obstacle !== OBS.STONE) destroyed.push({ r: rr, c });
      }
      addScore(board === gGrid ? 'player' : 'opponent', SCORE_TABLE.spLine);
      // 라인 레이저 이펙트
      const vpx = getBoardPixelX(c, engine.W, engine.H);
      const vpy = getBoardPixelY(r, engine.W, engine.H);
      const vbl = getBoardLayout(engine.W, engine.H);
      addMatchEffect('effectLineLaser', vpx, vpy, vbl.cellSize * 1.5);
      break;
    }

    case SP.BOMB: {
      playSfx('bombExplode');
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const t = safeGridAccess(board, r + dr, c + dc);
          if (t && t.obstacle !== OBS.STONE) destroyed.push({ r: r + dr, c: c + dc });
        }
      }
      addScore(board === gGrid ? 'player' : 'opponent', SCORE_TABLE.spBomb);
      // 폭탄 충격파 이펙트
      const bpx = getBoardPixelX(c, engine.W, engine.H);
      const bpy = getBoardPixelY(r, engine.W, engine.H);
      const bbl = getBoardLayout(engine.W, engine.H);
      addMatchEffect('effectBombShockwave', bpx, bpy, bbl.cellSize * 2);
      break;
    }

    case SP.RAINBOW: {
      playSfx('rainbowActivate');
      // 같은 색상 보석 모두 제거
      const targetColor = cell.color >= 0 ? cell.color : MathUtil.randInt(0, GEM_COLORS - 1);
      for (let rr = 0; rr < ROWS; rr++) {
        for (let cc = 0; cc < COLS; cc++) {
          const t = safeGridAccess(board, rr, cc);
          if (t && t.color === targetColor && t.obstacle !== OBS.STONE) destroyed.push({ r: rr, c: cc });
        }
      }
      addScore(board === gGrid ? 'player' : 'opponent', SCORE_TABLE.spRainbow);
      // 레인보우 소용돌이 이펙트
      const rpx = getBoardPixelX(c, engine.W, engine.H);
      const rpy = getBoardPixelY(r, engine.W, engine.H);
      const rbl = getBoardLayout(engine.W, engine.H);
      addMatchEffect('effectRainbowSwirl', rpx, rpy, rbl.cellSize * 2.5);
      break;
    }
  }

  return destroyed;
}

/** 스페셜+스페셜 조합 체크 및 발동 */
function checkSpecialCombo(board, r1, c1, r2, c2) {
  const a = safeGridAccess(board, r1, c1);
  const b = safeGridAccess(board, r2, c2);
  if (!a || !b) return null;
  if (a.special === SP.NONE || b.special === SP.NONE) return null;

  const spA = a.special, spB = b.special;
  const destroyed = [];
  let pvpPenalty = [];

  // Rainbow + Rainbow → 전체 클리어
  if (spA === SP.RAINBOW && spB === SP.RAINBOW) {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) destroyed.push({r,c});
    pvpPenalty = [{type:OBS.POISON,count:5},{type:OBS.STONE,count:5}];
  }
  // Rainbow + Bomb
  else if ((spA === SP.RAINBOW && spB === SP.BOMB) || (spA === SP.BOMB && spB === SP.RAINBOW)) {
    const targetColor = (spA === SP.RAINBOW ? b : a).color;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = safeGridAccess(board, r, c);
      if (t && t.color === targetColor) { t.special = SP.BOMB; destroyed.push({r,c}); }
    }
    pvpPenalty = [{type:OBS.STONE,count:6}];
  }
  // Rainbow + Line
  else if ((spA === SP.RAINBOW && (spB === SP.LINE_H || spB === SP.LINE_V)) ||
           ((spA === SP.LINE_H || spA === SP.LINE_V) && spB === SP.RAINBOW)) {
    const targetColor = (spA === SP.RAINBOW ? b : a).color;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = safeGridAccess(board, r, c);
      if (t && t.color === targetColor) { t.special = (Math.random() > 0.5 ? SP.LINE_H : SP.LINE_V); destroyed.push({r,c}); }
    }
    pvpPenalty = [{type:OBS.ICE1,count:6}];
  }
  // Bomb + Bomb → 5×5
  else if (spA === SP.BOMB && spB === SP.BOMB) {
    const cr = Math.floor((r1+r2)/2), cc = Math.floor((c1+c2)/2);
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      const t = safeGridAccess(board, cr+dr, cc+dc);
      if (t) destroyed.push({r:cr+dr,c:cc+dc});
    }
    pvpPenalty = [{type:OBS.CHAIN,count:3}];
  }
  // Line + Bomb → 3줄
  else if (((spA === SP.LINE_H || spA === SP.LINE_V) && spB === SP.BOMB) ||
           (spA === SP.BOMB && (spB === SP.LINE_H || spB === SP.LINE_V))) {
    const isH = (spA === SP.LINE_H || spB === SP.LINE_H);
    const midR = Math.floor((r1+r2)/2), midC = Math.floor((c1+c2)/2);
    for (let d = -1; d <= 1; d++) {
      if (isH) { for (let cc = 0; cc < COLS; cc++) destroyed.push({r:midR+d,c:cc}); }
      else { for (let rr = 0; rr < ROWS; rr++) destroyed.push({r:rr,c:midC+d}); }
    }
    pvpPenalty = [{type:OBS.STONE,count:4}];
  }
  // Line + Line → 십자
  else if ((spA === SP.LINE_H || spA === SP.LINE_V) && (spB === SP.LINE_H || spB === SP.LINE_V)) {
    const mr = Math.floor((r1+r2)/2), mc = Math.floor((c1+c2)/2);
    for (let cc = 0; cc < COLS; cc++) destroyed.push({r:mr,c:cc});
    for (let rr = 0; rr < ROWS; rr++) destroyed.push({r:rr,c:mc});
    pvpPenalty = [{type:OBS.STONE,count:3}];
  }
  else { return null; }

  a.special = SP.NONE; b.special = SP.NONE;
  if (gPvpMode) {
    for (const p of pvpPenalty) queueObstacle(p.type, p.count);
  }
  return destroyed;
}

// ═══════════════════════════════════════════════════════════════════
// ── 매치 처리 + 중력 + 캐스케이드 ────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

/** 보드에서 매치 처리 (점수, 제거, 스페셜 생성) */
function processMatches(board, swapPos) {
  const matches = findMatches(board);
  if (matches.length === 0) return false;

  gCascadeCount++;
  const mult = comboMultiplier(gComboCount);
  const who = (board === gGrid) ? 'player' : 'opponent';

  for (const match of matches) {
    // 점수 계산
    let base = SCORE_TABLE.match3;
    if (match.type === 'match4h' || match.type === 'match4v') base = SCORE_TABLE.match4;
    else if (match.type === 'matchTL') base = SCORE_TABLE.matchTL;
    else if (match.type === 'match5') base = SCORE_TABLE.match5;

    const pts = Math.floor(base * mult);
    addScore(who, pts);

    // 스페셜 생성
    const { spType, spawnR, spawnC } = processMatchSpecials(board, match, swapPos);

    // 셀 제거 + 장애물 처리
    for (const { r, c } of match.cells) {
      const cell = safeGridAccess(board, r, c);
      if (!cell) continue;

      // §2.6 체인: 해당 셀이 매치되면 체인 해제 (보석 색상 유지)
      if (cell.obstacle === OBS.CHAIN) {
        cell.obstacle = OBS.NONE;
        // 체인 해제 후 보석은 유지 (이번 매치에서 제거됨)
      }

      // §2.6 잠금블록: 매치된 셀의 잠금은 인접 매치에서 해제 (damageAdjacentObstacles)
      // 잠금 해제 시 보석 색상이 반드시 존재하도록 보장
      // (잠금블록은 보석 위에 올라가는 장애물이므로 cell.color >= 0 보장)

      // 인접 장애물 데미지
      damageAdjacentObstacles(board, r, c);

      // 스페셜 발동
      if (cell.special !== SP.NONE && !(r === spawnR && c === spawnC)) {
        const extra = activateSpecial(board, r, c, false);
        for (const e of extra) {
          const ec = safeGridAccess(board, e.r, e.c);
          if (ec) {
            damageAdjacentObstacles(board, e.r, e.c);
            ec.color = -1; ec.special = SP.NONE;
          }
        }
      }

      // 셀 제거 (스페셜 생성 위치는 스페셜로 교체)
      if (r === spawnR && c === spawnC && spType !== SP.NONE) {
        cell.special = spType;
        // 색상 유지
      } else {
        cell.color = -1;
        cell.special = SP.NONE;
      }

      // 파티클
      emitMatchParticles(board, r, c, match.color);
    }

    // PvP 장애물 전송 큐
    if (gPvpMode && board === gGrid) {
      if (match.type === 'match4h' || match.type === 'match4v') queueObstacle(OBS.ICE1, 1);
    }

    // 점수 팝업
    showScorePopup(board, match.cells[0].r, match.cells[0].c, pts);
  }

  gComboCount++;
  if (gComboCount >= 2) {
    showComboText(gComboCount);
    playSfx('comboHit');
  }

  // PvP: 3연쇄+ → 독 전송
  if (gPvpMode && board === gGrid && gCascadeCount >= 3) {
    queueObstacle(OBS.POISON, 1);
  }

  return true;
}

/** 인접 장애물 데미지 (체인은 §2.6에 따라 해당 셀 매치로만 제거 — 여기서 제외) */
function damageAdjacentObstacles(board, r, c) {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    const cell = safeGridAccess(board, r + dr, c + dc);
    if (!cell) continue;
    switch (cell.obstacle) {
      case OBS.ICE1: cell.obstacle = OBS.NONE; break;
      case OBS.ICE2: cell.obstacle = OBS.ICE1; break;
      // OBS.CHAIN: 인접 매치로는 제거 불가, 해당 셀 매치로만 제거 (processMatches 내)
      case OBS.LOCK: cell.obstacle = OBS.NONE; break;
      case OBS.POISON: cell.obstacle = OBS.NONE; break;
    }
  }
}

/** 중력: 빈 셀 아래로 보석 낙하 + 상단 리필 */
function applyGravity(board) {
  let moved = false;
  for (let c = 0; c < COLS; c++) {
    // 아래부터 위로 빈 칸 찾아 위에서 끌어옴
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      const cell = safeGridAccess(board, r, c);
      if (!cell) continue;
      if (cell.obstacle === OBS.STONE) {
        writeRow = r - 1;
        continue;
      }
      if (cell.color >= 0) {
        if (r !== writeRow) {
          board[writeRow][c] = cell;
          board[r][c] = createCell(-1, SP.NONE, OBS.NONE);
          moved = true;
        }
        writeRow--;
      }
    }
    // 상단 빈 칸 리필
    for (let r = writeRow; r >= 0; r--) {
      const cell = safeGridAccess(board, r, c);
      if (cell && cell.obstacle === OBS.STONE) continue;
      if (!cell || cell.color < 0) {
        board[r][c] = createCell(MathUtil.randInt(0, GEM_COLORS - 1), SP.NONE, OBS.NONE);
        moved = true;
      }
    }
  }
  return moved;
}

/** 독 확산 (매 턴) */
function spreadPoison(board) {
  const poisonCells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (cell && cell.obstacle === OBS.POISON) poisonCells.push({r,c});
    }
  }
  if (poisonCells.length === 0) return;

  // 보드 60% 이상 독이면 독 3개 제거
  if (poisonCells.length >= ROWS * COLS * 0.6) {
    for (let i = 0; i < 3 && i < poisonCells.length; i++) {
      const p = poisonCells[i];
      const cell = safeGridAccess(board, p.r, p.c);
      if (cell) cell.obstacle = OBS.NONE;
    }
    return;
  }

  // 랜덤 독 1개 확산
  const src = poisonCells[MathUtil.randInt(0, poisonCells.length - 1)];
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  const shuffled = dirs.sort(() => Math.random() - 0.5);
  for (const [dr, dc] of shuffled) {
    const cell = safeGridAccess(board, src.r + dr, src.c + dc);
    if (cell && cell.obstacle === OBS.NONE && cell.color >= 0) {
      cell.obstacle = OBS.POISON;
      break;
    }
  }
}

/** 보드 셔플 */
function shuffleBoard(board) {
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (cell && cell.obstacle !== OBS.STONE && cell.color >= 0) {
        cells.push({ color: cell.color, special: cell.special });
      }
    }
  }
  // Fisher-Yates
  for (let i = cells.length - 1; i > 0; i--) {
    const j = MathUtil.randInt(0, i);
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (cell && cell.obstacle !== OBS.STONE && cell.color >= 0 && idx < cells.length) {
        cell.color = cells[idx].color;
        cell.special = cells[idx].special;
        idx++;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 캐스케이드 프로세스 (tween 체인, setTimeout 0건) ────────────────
// ═══════════════════════════════════════════════════════════════════
let gCascadeTimer = 0;
let gCascadePhase = 'idle'; // idle, removing, gravity, checking

function startCascade(board) {
  gComboCount = 0;
  gCascadeCount = 0;
  gCascadePhase = 'checking';
  gIsInputBlocked = true;
}

function updateCascade(dt, board) {
  if (gCascadePhase === 'idle') return;

  gCascadeTimer += dt;

  switch (gCascadePhase) {
    case 'checking': {
      const hasMatch = processMatches(board, gSwapFrom);
      if (hasMatch) {
        gCascadePhase = 'removing';
        gCascadeTimer = 0;
      } else {
        finishCascade(board);
      }
      break;
    }
    case 'removing': {
      if (gCascadeTimer >= CASCADE_DELAY) {
        gCascadePhase = 'gravity';
        gCascadeTimer = 0;
      }
      break;
    }
    case 'gravity': {
      applyGravity(board);
      gCascadePhase = 'checking';
      gCascadeTimer = 0;
      break;
    }
  }
}

function finishCascade(board) {
  gCascadePhase = 'idle';
  gCascadeTimer = 0;
  gIsInputBlocked = false;

  // PvP: 전송 큐 처리
  if (gPvpMode && board === gGrid && gObstacleQueue.length > 0) {
    sendQueuedObstacles();
  }

  // 데드록 체크
  if (countValidMoves(board) === 0) {
    shuffleBoard(board);
    if (countValidMoves(board) === 0) {
      shuffleBoard(board);
      if (countValidMoves(board) === 0) {
        // 보드 재생성
        const newBoard = generateBoard(new SeededRNG(Date.now()));
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c] = newBoard[r][c];
      }
    }
  }

  // PvP 턴 종료
  if (gPvpMode) {
    endPvpTurn(board);
    return;
  }

  // 솔로: 이동 소비
  if (gState === STATE.PLAY) {
    gMovesLeft--;
    checkSoloLevelEnd();
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── PvP 시스템 ────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function initPvpMatch() {
  gPvpMode = true;
  gPvpTurn = 0;
  gPlayerScore = 0;
  gOpponentScore = 0;
  gPvpSeed = Date.now();
  gCoinTossResult = (new SeededRNG(gPvpSeed)).next() > 0.5;
  gIsPlayerTurn = gCoinTossResult;
  gAiThinkTimer = 0;
  gAiLevel = getAiLevel();
  gOpponentCharId = MathUtil.randInt(0, 2);
  gPvpBoosters = [1,1,1,1];
  gObstacleQueue = [];
  gComboCount = 0;
  gCascadeCount = 0;
  gLastComboScorePlayer = 0;
  gLastComboScoreOpponent = 0;
  gBoardState = 'idle';
  gCascadePhase = 'idle';
  gIsInputBlocked = false;
  gSelectedCell = null;
  gHintTimer = 0;
  gHintCells = null;

  // 장애물 맵 (리그 기반)
  const obsMap = generatePvpObstacles();

  const rng1 = new SeededRNG(gPvpSeed);
  gGrid = generateBoard(rng1, obsMap);
  const rng2 = new SeededRNG(gPvpSeed);
  gOpponentGrid = generateBoard(rng2, obsMap);

  // VS 연출
  gVsAnimPhase = 0;
  showTurnBanner(gIsPlayerTurn ? t('yourTurn') : t('opponentTurn'));
}

function getAiLevel() {
  switch (gCurrentLeague) {
    case LEAGUE.BRONZE: return 1;
    case LEAGUE.SILVER: return MathUtil.randInt(1, 2);
    case LEAGUE.GOLD: return 2;
    case LEAGUE.PLATINUM: return MathUtil.randInt(2, 3);
    case LEAGUE.DIAMOND: return 3;
    default: return 1;
  }
}

function generatePvpObstacles() {
  const map = [];
  for (let r = 0; r < ROWS; r++) { map[r] = []; for (let c = 0; c < COLS; c++) map[r][c] = OBS.NONE; }

  const league = gCurrentLeague;
  let iceCount = 0, stoneCount = 0, poisonCount = 0;
  if (league >= LEAGUE.SILVER) iceCount = 2;
  if (league >= LEAGUE.GOLD) { iceCount = 3; stoneCount = 1; }
  if (league >= LEAGUE.PLATINUM) { iceCount = 3; stoneCount = 2; }
  if (league >= LEAGUE.DIAMOND) { iceCount = 4; stoneCount = 2; poisonCount = 1; }

  const rng = new SeededRNG(gPvpSeed + 777);
  const placed = new Set();
  function placeObs(type, count) {
    for (let i = 0; i < count; i++) {
      let r, c;
      do { r = rng.nextInt(0, ROWS - 1); c = rng.nextInt(0, COLS - 1); } while (placed.has(r * COLS + c));
      placed.add(r * COLS + c);
      map[r][c] = type;
    }
  }
  placeObs(OBS.ICE1, iceCount);
  placeObs(OBS.STONE, stoneCount);
  placeObs(OBS.POISON, poisonCount);
  return map;
}

/** PvP 장애물 전송 큐에 추가 */
function queueObstacle(type, count) {
  for (let i = 0; i < count; i++) gObstacleQueue.push(type);
}

/** 큐에 쌓인 장애물을 상대 보드에 전송 */
function sendQueuedObstacles() {
  const targetBoard = gIsPlayerTurn ? gOpponentGrid : gGrid;
  const emptyCells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(targetBoard, r, c);
      if (cell && cell.obstacle === OBS.NONE && cell.color >= 0) emptyCells.push({r,c});
    }
  }
  // 전송
  for (let i = 0; i < gObstacleQueue.length && i < emptyCells.length; i++) {
    const pos = emptyCells[MathUtil.randInt(0, emptyCells.length - 1)];
    const cell = safeGridAccess(targetBoard, pos.r, pos.c);
    if (cell) cell.obstacle = gObstacleQueue[i];
    emptyCells.splice(emptyCells.indexOf(pos), 1);
  }
  playSfx('obstacleSend');
  // 장애물 전송 이펙트 (effectObstacleSend 스프라이트 시트)
  addMatchEffect('effectObstacleSend', engine.W / 2, engine.H / 2, Layout.px(80, engine.W, engine.H));
  gObstacleQueue = [];
}

function endPvpTurn(board) {
  // 독 확산
  if (gIsPlayerTurn) spreadPoison(gOpponentGrid);
  else spreadPoison(gGrid);

  gPvpTurn++;
  if (gPvpTurn >= MAX_TURNS_PVP) {
    // 게임 종료
    gDeferredQueue.push(STATE.PVP_RESULT);
    return;
  }

  gIsPlayerTurn = !gIsPlayerTurn;
  gAiThinkTimer = 0;
  showTurnBanner(gIsPlayerTurn ? t('yourTurn') : t('opponentTurn'));
  playSfx('turnChange');
}

// ── AI 의사결정 ──────────────────────────────────────────────────
function aiDecide(board) {
  const allMoves = findAllValidMoves(board);
  if (allMoves.length === 0) return null;

  const scored = allMoves.map(m => {
    let score = evaluateMove(board, m);
    if (gAiLevel >= 2) score += evaluateSpecialCreation(board, m) * 2.0;
    if (gAiLevel >= 3) score += evaluateOpponentImpact(board, m) * 1.5;
    // 약간의 랜덤성
    score *= (0.85 + Math.random() * 0.3);
    return { move: m, score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored[0].move;
}

function evaluateMove(board, move) {
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  const matches = findMatches(board);
  let score = 0;
  for (const m of matches) {
    switch (m.type) {
      case 'match3': score += 50; break;
      case 'match4h': case 'match4v': score += 120; break;
      case 'matchTL': score += 200; break;
      case 'match5': score += 350; break;
    }
  }
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  return score;
}

function evaluateSpecialCreation(board, move) {
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  const matches = findMatches(board);
  let bonus = 0;
  for (const m of matches) {
    if (m.type === 'match5') bonus += 300;
    else if (m.type === 'matchTL') bonus += 200;
    else if (m.type === 'match4h' || m.type === 'match4v') bonus += 100;
  }
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  return bonus;
}

function evaluateOpponentImpact(board, move) {
  // 간단한 평가: 스페셜 발동이 가능하면 장애물 전송 보너스
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  const matches = findMatches(board);
  let bonus = 0;
  for (const m of matches) {
    if (m.type === 'match4h' || m.type === 'match4v') bonus += 50;
    if (m.type === 'matchTL') bonus += 80;
    if (m.type === 'match5') bonus += 120;
  }
  swapCells(board, move.r1, move.c1, move.r2, move.c2);
  return bonus;
}

function updateAiTurn(dt) {
  if (gIsPlayerTurn || gCascadePhase !== 'idle') return;

  gAiThinkTimer += dt;
  const thinkTime = MathUtil.lerp(AI_THINK_MAX, AI_THINK_MIN, (gAiLevel - 1) / 2);

  if (gAiThinkTimer >= thinkTime) {
    const move = aiDecide(gOpponentGrid);
    if (move) {
      // AI 보드에서 스왑 실행
      const combo = checkSpecialCombo(gOpponentGrid, move.r1, move.c1, move.r2, move.c2);
      swapCells(gOpponentGrid, move.r1, move.c1, move.r2, move.c2);
      gSwapFrom = { r: move.r1, c: move.c1 };
      gSwapTo = { r: move.r2, c: move.c2 };

      if (combo) {
        for (const pos of combo) {
          const cell = safeGridAccess(gOpponentGrid, pos.r, pos.c);
          if (cell) { cell.color = -1; cell.special = SP.NONE; }
        }
      }

      startCascade(gOpponentGrid);
      gAiThinkTimer = 0;
    } else {
      // AI 유효 이동 없음 → 셔플
      shuffleBoard(gOpponentGrid);
      gAiThinkTimer = 0;
    }
  }
}

        targets,
        iceCount: z.iceCount[i],
        stoneCount: z.stoneCount[i],
        chainCount: z.chainCount[i],
        lockCount: z.lockCount[i],
        poisonCount: z.poisonCount[i],
        starThresholds: [baseScore, Math.floor(baseScore * 1.5), baseScore * 2]
      });
    }
  }
  return levels;
})();

function initSoloLevel(level) {
  gPvpMode = false;
  gBoardState = 'idle';
  gCascadePhase = 'idle';
  gIsInputBlocked = false;
  gComboCount = 0;
  gCascadeCount = 0;
  gSelectedCell = null;
  gHintTimer = 0;
  gHintCells = null;
  gLevelScore = 0;
  gObstacleQueue = [];

  const data = LEVEL_DATA[level - 1];
  if (!data) return;

  gMovesLeft = data.turns;
  gLevelTargets = data.targets.map(t => ({ ...t, current: 0 }));

  // DDA 보정
  if (gFailStreak >= 4) {
    gMovesLeft += 4;
    // 목표 70%
    for (const tgt of gLevelTargets) tgt.value = Math.floor(tgt.value * 0.7);
  } else if (gFailStreak >= 2) {
    gMovesLeft += 2;
    for (const tgt of gLevelTargets) tgt.value = Math.floor(tgt.value * 0.85);
  }

  // 장애물 맵 생성
  const obsMap = [];
  for (let r = 0; r < ROWS; r++) { obsMap[r] = []; for (let c = 0; c < COLS; c++) obsMap[r][c] = OBS.NONE; }

  const rng = new SeededRNG(level * 1000 + gFailStreak);
  const placed = new Set();
  function placeObs(type, count) {
    for (let i = 0; i < count; i++) {
      let r, c;
      do { r = rng.nextInt(1, ROWS - 2); c = rng.nextInt(1, COLS - 2); } while (placed.has(r * COLS + c));
      placed.add(r * COLS + c);
      obsMap[r][c] = type;
    }
  }
  placeObs(OBS.ICE1, data.iceCount);
  placeObs(OBS.STONE, data.stoneCount);
  placeObs(OBS.CHAIN, data.chainCount);
  placeObs(OBS.LOCK, data.lockCount);
  placeObs(OBS.POISON, data.poisonCount);

  // DDA: failStreak 4+ → 시작 시 스페셜 1개
  gGrid = generateBoard(new SeededRNG(level * 2000 + Date.now() % 10000), obsMap);

  if (gFailStreak >= 4) {
    const r = MathUtil.randInt(1, ROWS - 2);
    const c = MathUtil.randInt(1, COLS - 2);
    const cell = safeGridAccess(gGrid, r, c);
    if (cell && cell.obstacle === OBS.NONE) cell.special = SP.BOMB;
  }
}

/** 솔로 목표 진행 업데이트 */
function updateSoloTargets(type, value) {
  if (!gLevelTargets) return;
  for (const tgt of gLevelTargets) {
    if (tgt.type === type) tgt.current += value;
  }
}

/** 점수 추가 */
function addScore(who, pts) {
  if (who === 'player') {
    if (gPvpMode) {
      gPlayerScore += pts;
      gLastComboScorePlayer = pts; // 동점 판정용 마지막 콤보 점수 추적
    } else {
      gLevelScore += pts;
      updateSoloTargets('score', pts);
    }
  } else {
    if (gPvpMode) {
      gOpponentScore += pts;
      gLastComboScoreOpponent = pts; // 동점 판정용 마지막 콤보 점수 추적
    }
  }
}

/** 레벨 종료 체크 */
function checkSoloLevelEnd() {
  if (!gLevelTargets) return;
  // 모든 목표 달성?
  const allComplete = gLevelTargets.every(t => t.current >= t.value);
  if (allComplete) {
    gDeferredQueue.push(STATE.LEVEL_CLEAR);
    return;
  }
  if (gMovesLeft <= 0) {
    gDeferredQueue.push(STATE.LEVEL_FAIL);
  }
}

function calculateStars() {
  const data = LEVEL_DATA[gCurrentLevel - 1];
  if (!data) { gLevelStars = 1; return; }
  gLevelStars = 1;
  if (gLevelScore >= data.starThresholds[1]) gLevelStars = 2;
  if (gLevelScore >= data.starThresholds[2]) gLevelStars = 3;
  gKingdomData.totalStars += gLevelStars;
  gFailStreak = 0;
  if (gCurrentLevel < 30) gCurrentLevel++;
  saveGameData();
}

function savePvpResult() {
  // §2.2-5: 동점 시 마지막 콤보 점수가 높은 쪽 승리
  let win = gPlayerScore > gOpponentScore;
  let draw = gPlayerScore === gOpponentScore;
  if (draw) {
    if (gLastComboScorePlayer > gLastComboScoreOpponent) {
      win = true; draw = false;
    } else if (gLastComboScoreOpponent > gLastComboScorePlayer) {
      win = false; draw = false;
    }
    // 마지막 콤보 점수도 동일하면 진정한 무승부
  }

  let trophyChange = 0;
  if (win) {
    trophyChange = 25 + gCurrentLeague * 2;
    playSfx('pvpVictory');
  } else if (draw) {
    trophyChange = 5;
  } else {
    trophyChange = -(10 + gCurrentLeague * 2);
    playSfx('pvpDefeat');
  }
  gTrophies = Math.max(0, gTrophies + trophyChange);
  const oldLeague = gCurrentLeague;
  gCurrentLeague = getLeagueFromTrophies(gTrophies);
  if (gCurrentLeague > oldLeague) playSfx('leagueUp');

  // 별 보상
  if (win) gKingdomData.totalStars += 2;
  else if (draw) gKingdomData.totalStars += 1;
  // 코인 보상
  gKingdomData.coins += win ? 50 : (draw ? 25 : 10);

  Save.setHighScore(GAME_ID, Math.max(gPlayerScore, Save.getHighScore(GAME_ID)));
  saveGameData();
}

function generateBuildChoices() {
  gBuildChoices = [];
  // 현재 가장 진행이 덜 된 구역 찾기
  let minZone = 0, minProg = gKingdomData.zones[0];
  for (let i = 1; i < 5; i++) {
    if (gKingdomData.zones[i] < minProg) { minProg = gKingdomData.zones[i]; minZone = i; }
  }
  gBuildZoneIdx = minZone;

  // 3택 1 선택지 생성
  const buildNames_ko = [
    ['성벽 수리','문기둥 세우기','깃발 달기','해자 파기','다리 건설','조명 설치'],
    ['꽃밭 조성','분수대 건설','벤치 배치','나비 정원','장미 아치','연못 파기'],
    ['가판대 설치','천막 치기','상품 진열','간판 달기','수레 배치','거리등 설치'],
    ['책장 설치','독서대 배치','마법 오브 놓기','망원경 설치','이동 사다리','마법 램프'],
    ['왕좌 수리','카펫 깔기','문장 걸기','왕관 전시대','보석 장식','왕실 깃발']
  ];
  const buildNames_en = [
    ['Repair Walls','Build Pillars','Hang Flags','Dig Moat','Build Bridge','Install Lights'],
    ['Plant Flowers','Build Fountain','Place Benches','Butterfly Garden','Rose Arch','Dig Pond'],
    ['Set Up Stalls','Put Up Tents','Display Goods','Hang Signs','Place Carts','Street Lamps'],
    ['Install Shelves','Place Desks','Magic Orb','Telescope','Moving Ladder','Magic Lamp'],
    ['Repair Throne','Lay Carpet','Hang Emblem','Crown Display','Gem Decor','Royal Flag']
  ];

  const zoneBuilds = gLang === 'en' ? buildNames_en[minZone] : buildNames_ko[minZone];
  const startIdx = minProg;
  for (let i = 0; i < 3 && startIdx + i < zoneBuilds.length; i++) {
    gBuildChoices.push({
      name: zoneBuilds[startIdx + i] || '건설 ' + (startIdx + i + 1),
      cost: 1 + Math.floor(minProg / 2),
      bonus: ['점수 +200', '턴 +1', '코인 +20'][i % 3]
    });
  }
  if (gBuildChoices.length === 0) {
    gBuildChoices.push({ name: '장식 추가', cost: 1, bonus: '코인 +10' });
  }
}

function selectBuild(idx) {
  if (idx < 0 || idx >= gBuildChoices.length) return;
  const choice = gBuildChoices[idx];
  if (gKingdomData.totalStars < choice.cost) return;

  gKingdomData.totalStars -= choice.cost;
  gKingdomData.zones[gBuildZoneIdx]++;
  gKingdomData.coins += 20;
  saveGameData();
  playSfx('buttonClick');
  beginTransition(STATE.KINGDOM_MAP);
}

/** 이펙트 스프라이트 시트 기반 매치 이펙트 큐 */
let gMatchEffects = [];
function addMatchEffect(type, x, y, size) {
  gMatchEffects.push({ type, x, y, size, timer: 0, duration: 500 });
}
function updateMatchEffects(dt) {
  for (let i = gMatchEffects.length - 1; i >= 0; i--) {
    gMatchEffects[i].timer += dt;
    if (gMatchEffects[i].timer >= gMatchEffects[i].duration) gMatchEffects.splice(i, 1);
  }
}
function renderMatchEffects(ctx) {
  for (const eff of gMatchEffects) {
    const progress = MathUtil.clamp(eff.timer / eff.duration, 0, 1);
    const alpha = 1 - progress;
    ctx.save();
    ctx.globalAlpha = alpha;
    const sz = eff.size * (1 + progress * 0.5);
    drawEffectSpriteSheet(ctx, eff.type, eff.x - sz / 2, eff.y - sz / 2, sz, sz, progress);
    ctx.restore();
  }
}

function emitMatchParticles(board, r, c, color) {
  // 보드 좌표 → 화면 좌표 계산은 렌더링 시점에 처리
  const px = getBoardPixelX(c, engine.W, engine.H);
  const py = getBoardPixelY(r, engine.W, engine.H);
  // 파티클 텍스처 활용 (particleShard)
  const shardTex = assets.sprites['particleShard'] || null;
  particles.emit(px, py, 8, { color: GEM_HEX[color] || '#fff', speed: 120, life: 0.4, size: 4, texture: shardTex });
  // 매치 버스트 스프라이트 이펙트
  const bl = getBoardLayout(engine.W, engine.H);
  addMatchEffect('effectMatchBurst', px, py, bl.cellSize * 1.2);
}

function activateBooster(idx) {
  if (gIsInputBlocked) return;
  if (gPvpMode && gPvpBoosters[idx] <= 0) return;

  switch (idx) {
    case BOOST.HAMMER:
      gBoosterMode = true;
      gSelectedBooster = idx;
      break;
    case BOOST.SWAP:
      gBoosterMode = true;
      gSelectedBooster = idx;
      gBoosterSwapFirst = null;
      break;
    case BOOST.SHUFFLE:
      shuffleBoard(gGrid);
      if (gPvpMode) gPvpBoosters[idx]--;
      playSfx('buttonClick');
      break;
    case BOOST.EXTRA_TURN:
      if (gPvpMode) { gPvpTurn = Math.max(0, gPvpTurn - 1); gPvpBoosters[idx]--; }
      else gMovesLeft++;
      playSfx('buttonClick');
      break;
  }
}

function handleBoosterClick(r, c) {
  const board = gGrid;
  if (gSelectedBooster === BOOST.HAMMER) {
    const cell = safeGridAccess(board, r, c);
    if (cell && cell.color >= 0 && cell.obstacle !== OBS.STONE) {
      cell.color = -1;
      cell.special = SP.NONE;
      damageAdjacentObstacles(board, r, c);
      applyGravity(board);
      startCascade(board);
      if (gPvpMode) gPvpBoosters[BOOST.HAMMER]--;
      playSfx('bombExplode');
    }
    gBoosterMode = false;
    gSelectedBooster = -1;
  } else if (gSelectedBooster === BOOST.SWAP) {
    if (!gBoosterSwapFirst) {
      gBoosterSwapFirst = { r, c };
    } else {
      swapCells(board, gBoosterSwapFirst.r, gBoosterSwapFirst.c, r, c);
      startCascade(board);
      if (gPvpMode) gPvpBoosters[BOOST.SWAP]--;
      playSfx('gemSwap');
      gBoosterMode = false;
      gSelectedBooster = -1;
      gBoosterSwapFirst = null;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 보드 좌표 계산 (반응형) ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function getBoardLayout(w, h) {
  const safe = Layout.safeArea(w, h);
  const mobile = Layout.isMobile(w);
  const boardAreaH = mobile ? safe.h * 0.65 : safe.h * 0.7;
  const boardAreaW = mobile ? safe.w * 0.95 : safe.w * 0.5;
  const grid = Layout.grid(COLS, ROWS, boardAreaW, boardAreaH, 2);
  const boardX = mobile ? (w - grid.totalW) / 2 : w * 0.25 - grid.totalW / 2 + safe.x;
  const boardY = mobile ? safe.y + safe.h * 0.12 : safe.y + (safe.h - grid.totalH) / 2;
  return { ...grid, boardX, boardY, mobile };
}

function getOpponentBoardLayout(w, h) {
  const safe = Layout.safeArea(w, h);
  const mobile = Layout.isMobile(w);
  const boardAreaH = mobile ? safe.h * 0.3 : safe.h * 0.7;
  const boardAreaW = mobile ? safe.w * 0.5 : safe.w * 0.35;
  const grid = Layout.grid(COLS, ROWS, boardAreaW, boardAreaH, mobile ? 1 : 2);
  const boardX = mobile ? w * 0.5 + (w * 0.5 - grid.totalW) / 2 : w * 0.72 - grid.totalW / 2;
  const boardY = mobile ? safe.y + safe.h * 0.02 : safe.y + (safe.h - grid.totalH) / 2;
  return { ...grid, boardX, boardY, mobile };
}

function getBoardPixelX(c, w, h) {
  const bl = getBoardLayout(w, h);
  return bl.boardX + bl.padding + c * (bl.cellSize + bl.padding) + bl.cellSize / 2;
}

function getBoardPixelY(r, w, h) {
  const bl = getBoardLayout(w, h);
  return bl.boardY + bl.padding + r * (bl.cellSize + bl.padding) + bl.cellSize / 2;
}

function pixelToBoard(px, py, w, h) {
  const bl = getBoardLayout(w, h);
  const c = Math.floor((px - bl.boardX - bl.padding) / (bl.cellSize + bl.padding));
  const r = Math.floor((py - bl.boardY - bl.padding) / (bl.cellSize + bl.padding));
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return { r, c };
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// ── 입력 처리 ─────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

let gDragStart = null;
let gDragging = false;

function handleBoardInput(w, h) {
  if (gIsInputBlocked || gCascadePhase !== 'idle') return;
  if (gPvpMode && !gIsPlayerTurn) return;

  // 보드 영역 터치/클릭 → 드래그 감지
  if (input.tapped && !gDragging) {
    const pos = pixelToBoard(input.tapX, input.tapY, w, h);
    if (pos) {
      if (gBoosterMode) {
        handleBoosterClick(pos.r, pos.c);
        return;
      }
      gDragStart = { r: pos.r, c: pos.c, px: input.tapX, py: input.tapY };
      gSelectedCell = pos;
    }
  }

  // 드래그 감지
  if (gDragStart && input.mouseDown) {
    const dx = input.mouseX - gDragStart.px;
    const dy = input.mouseY - gDragStart.py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist >= SWAP_THRESHOLD) {
      // 방향 결정
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;

      const from = gDragStart;
      const to = { r: from.r + dr, c: from.c + dc };
      if (to.r >= 0 && to.r < ROWS && to.c >= 0 && to.c < COLS) {
        trySwap(gGrid, from.r, from.c, to.r, to.c);
      }
      gDragStart = null;
      gSelectedCell = null;
    }
  }

  if (!input.mouseDown) {
    gDragStart = null;
  }

  // 키보드 부스터
  if (input.jp('Digit1')) activateBooster(0);
  if (input.jp('Digit2')) activateBooster(1);
  if (input.jp('Digit3')) activateBooster(2);
  if (input.jp('Digit4')) activateBooster(3);
}

function trySwap(board, r1, c1, r2, c2) {
  const a = safeGridAccess(board, r1, c1);
  const b = safeGridAccess(board, r2, c2);
  if (!a || !b) return;
  if (a.obstacle === OBS.STONE || b.obstacle === OBS.STONE) return;
  if (a.obstacle === OBS.CHAIN || b.obstacle === OBS.CHAIN) {
    // 체인: 매치 시에만 해제
  }

  // 스페셜 조합 체크
  const combo = checkSpecialCombo(board, r1, c1, r2, c2);
  if (combo) {
    swapCells(board, r1, c1, r2, c2);
    for (const pos of combo) {
      const cell = safeGridAccess(board, pos.r, pos.c);
      if (cell && cell.obstacle !== OBS.STONE) {
        emitMatchParticles(board, pos.r, pos.c, cell.color);
        cell.color = -1;
        cell.special = SP.NONE;
      }
    }
    gSwapFrom = { r: r1, c: c1 };
    gSwapTo = { r: r2, c: c2 };
    playSfx('gemSwap');
    startCascade(board);
    updateSoloTargets('specialCreate', 1);
    return;
  }

  // 일반 스왑
  swapCells(board, r1, c1, r2, c2);
  if (hasMatchesOnBoard(board)) {
    gSwapFrom = { r: r1, c: c1 };
    gSwapTo = { r: r2, c: c2 };
    playSfx('gemSwap');
    startCascade(board);
  } else {
    // 유효하지 않은 스왑 → 되돌리기
    swapCells(board, r1, c1, r2, c2);
    gShakeIntensity = 3;
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── 에셋 드로잉 + 폴백 ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

function drawAssetOrFallback(ctx, key, x, y, w, h, fallbackFn) {
  if (assets.sprites[key]) {
    ctx.drawImage(assets.sprites[key], x, y, w, h);
  } else if (fallbackFn) {
    fallbackFn(ctx, x, y, w, h);
  } else {
    ctx.fillStyle = '#6c3cf766';
    ctx.fillRect(x + w * 0.1, y + h * 0.1, w * 0.8, h * 0.8);
  }
}

// ── 보석 폴백 드로잉 (색상별 고유 형태 — C50 패턴) ────────────
function drawGemFallback(ctx, x, y, w, h, colorIdx) {
  const cx = x + w / 2, cy = y + h / 2, r = w * 0.38;
  ctx.save();
  const gradient = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, r * 0.1, cx, cy, r);
  gradient.addColorStop(0, '#fff');
  gradient.addColorStop(0.3, GEM_HEX[colorIdx] || '#888');
  gradient.addColorStop(1, shadeColor(GEM_HEX[colorIdx] || '#888', -40));
  ctx.fillStyle = gradient;

  switch (colorIdx) {
    case 0: // 빨강 — 다이아몬드
      ctx.beginPath();
      ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r, cy); ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r, cy);
      ctx.closePath(); ctx.fill(); break;
    case 1: // 파랑 — 원형
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); break;
    case 2: // 초록 — 육각형
      ctx.beginPath();
      for (let i = 0; i < 6; i++) { const a = Math.PI / 3 * i - Math.PI / 6; ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a)); }
      ctx.closePath(); ctx.fill(); break;
    case 3: // 노랑 — 별형
      ctx.beginPath();
      for (let i = 0; i < 10; i++) { const a = Math.PI / 5 * i - Math.PI / 2; const rad = i % 2 === 0 ? r : r * 0.5; ctx.lineTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a)); }
      ctx.closePath(); ctx.fill(); break;
    case 4: // 보라 — 하트
      ctx.beginPath();
      ctx.moveTo(cx, cy + r * 0.8);
      ctx.bezierCurveTo(cx - r * 1.2, cy - r * 0.2, cx - r * 0.5, cy - r, cx, cy - r * 0.5);
      ctx.bezierCurveTo(cx + r * 0.5, cy - r, cx + r * 1.2, cy - r * 0.2, cx, cy + r * 0.8);
      ctx.fill(); break;
    case 5: // 주황 — 삼각형
      ctx.beginPath();
      ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r * 0.87, cy + r * 0.5); ctx.lineTo(cx - r * 0.87, cy + r * 0.5);
      ctx.closePath(); ctx.fill(); break;
  }

  // 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.2, cy - r * 0.25, r * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = MathUtil.clamp((num >> 16) + amt, 0, 255);
  const G = MathUtil.clamp((num >> 8 & 0xff) + amt, 0, 255);
  const B = MathUtil.clamp((num & 0xff) + amt, 0, 255);
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// ── 장애물 폴백 ──────────────────────────────────────────────────
function drawObstacleFallback(ctx, x, y, w, h, obsType) {
  ctx.save();
  ctx.globalAlpha = 0.7;
  switch (obsType) {
    case OBS.ICE1:
      ctx.fillStyle = '#88ccff44'; ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 2; ctx.strokeRect(x+2, y+2, w-4, h-4);
      break;
    case OBS.ICE2:
      ctx.fillStyle = '#4488cc88'; ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#88bbff'; ctx.lineWidth = 3; ctx.strokeRect(x+1, y+1, w-2, h-2);
      break;
    case OBS.CHAIN:
      ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+3, y+3); ctx.lineTo(x+w-3, y+h-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w-3, y+3); ctx.lineTo(x+3, y+h-3); ctx.stroke();
      break;
    case OBS.STONE:
      ctx.fillStyle = '#555'; ctx.fillRect(x+2, y+2, w-4, h-4);
      ctx.fillStyle = '#777'; ctx.fillRect(x+4, y+4, w-8, h-8);
      break;
    case OBS.LOCK:
      ctx.fillStyle = '#ffd70088';
      ctx.beginPath(); ctx.arc(x+w/2, y+h*0.4, w*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(x+w*0.3, y+h*0.4, w*0.4, h*0.35);
      break;
    case OBS.POISON:
      ctx.fillStyle = '#8800aa55'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#aa22cc88';
      ctx.beginPath(); ctx.arc(x+w*0.3, y+h*0.6, w*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w*0.7, y+h*0.4, w*0.08, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.restore();
}

// ── 스페셜 오버레이 폴백 ─────────────────────────────────────────
function drawSpecialFallback(ctx, x, y, w, h, spType) {
  ctx.save();
  ctx.globalAlpha = 0.8;
  switch (spType) {
    case SP.LINE_H:
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+2, y+h/2); ctx.lineTo(x+w-2, y+h/2); ctx.stroke();
      drawArrowHead(ctx, x+w-6, y+h/2, 6, 0); drawArrowHead(ctx, x+6, y+h/2, 6, Math.PI);
      break;
    case SP.LINE_V:
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+w/2, y+2); ctx.lineTo(x+w/2, y+h-2); ctx.stroke();
      drawArrowHead(ctx, x+w/2, y+h-6, 6, Math.PI/2); drawArrowHead(ctx, x+w/2, y+6, 6, -Math.PI/2);
      break;
    case SP.BOMB:
      ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w*0.3, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w*0.15, 0, Math.PI*2); ctx.stroke();
      break;
    case SP.RAINBOW:
      const colors = ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'];
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.arc(x+w/2, y+h/2, w*0.35, Math.PI*2/6*i, Math.PI*2/6*(i+1));
        ctx.lineTo(x+w/2, y+h/2);
        ctx.fill();
      }
      break;
  }
  ctx.restore();
}

/** 캐릭터 폴백 — SD 스타일 (왕, 상대 3종) */
function drawCharFallback(ctx, x, y, w, h, type, charId) {
  const cx = x + w/2, headY = y + h*0.3;
  const headR = w*0.22;

  if (type === 'king') {
    // 왕 — 금관+붉은 망토+밝은 얼굴
    ctx.fillStyle = '#cc2244';
    ctx.beginPath(); ctx.ellipse(cx, y + h*0.65, w*0.2, h*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4444cc';
    ctx.beginPath(); ctx.roundRect(cx - w*0.15, headY + headR*0.5, w*0.3, h*0.3, 4); ctx.fill();
    const faceGrad = ctx.createRadialGradient(cx, headY, headR*0.1, cx, headY, headR);
    faceGrad.addColorStop(0, '#ffe0b2'); faceGrad.addColorStop(1, '#ffcc80');
    ctx.fillStyle = faceGrad;
    ctx.beginPath(); ctx.arc(cx, headY, headR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx - headR*0.3, headY - headR*0.1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + headR*0.3, headY - headR*0.1, 2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, headY + headR*0.1, headR*0.2, 0.1, Math.PI - 0.1); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(cx - headR*0.6, headY - headR*0.7);
    ctx.lineTo(cx - headR*0.4, headY - headR*1.2);
    ctx.lineTo(cx, headY - headR*0.8);
    ctx.lineTo(cx + headR*0.4, headY - headR*1.2);
    ctx.lineTo(cx + headR*0.6, headY - headR*0.7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(cx, headY - headR, 2, 0, Math.PI*2); ctx.fill();
  } else {
    // 상대 캐릭터 (3종 — 마법사/기사/드래곤 조련사)
    const colors = [['#8844cc', '#6633aa'], ['#aaaacc', '#888899'], ['#cc4422', '#aa3311']];
    const hatStyles = ['wizard', 'knight', 'dragon'];
    const ci = MathUtil.clamp(charId || 0, 0, 2);
    const [bodyC, bodyD] = colors[ci];

    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.roundRect(cx - w*0.15, headY + headR*0.5, w*0.3, h*0.3, 4); ctx.fill();
    const faceGrad2 = ctx.createRadialGradient(cx, headY, headR*0.1, cx, headY, headR);
    faceGrad2.addColorStop(0, '#ffe0b2'); faceGrad2.addColorStop(1, '#ddb896');
    ctx.fillStyle = faceGrad2;
    ctx.beginPath(); ctx.arc(cx, headY, headR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx - headR*0.3, headY - headR*0.1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + headR*0.3, headY - headR*0.1, 2, 0, Math.PI*2); ctx.fill();

    if (hatStyles[ci] === 'wizard') {
      ctx.fillStyle = '#6633aa';
      ctx.beginPath();
      ctx.moveTo(cx - headR*0.7, headY - headR*0.5);
      ctx.lineTo(cx, headY - headR*1.8);
      ctx.lineTo(cx + headR*0.7, headY - headR*0.5);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(cx, headY - headR*1.2, 3, 0, Math.PI*2); ctx.fill();
    } else if (hatStyles[ci] === 'knight') {
      ctx.fillStyle = '#888899';
      ctx.beginPath();
      ctx.roundRect(cx - headR*0.7, headY - headR*1.1, headR*1.4, headR*0.6, 3);
      ctx.fill();
      ctx.fillStyle = '#666677';
      ctx.beginPath();
      ctx.roundRect(cx - headR*0.5, headY - headR*1.3, headR*1.0, headR*0.3, 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#cc4422';
      ctx.beginPath();
      ctx.moveTo(cx - headR*0.5, headY - headR*0.7);
      ctx.quadraticCurveTo(cx, headY - headR*1.5, cx + headR*0.5, headY - headR*0.7);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff6644';
      ctx.beginPath();
      ctx.moveTo(cx + headR*0.3, headY - headR*0.7);
      ctx.lineTo(cx + headR*0.6, headY - headR*1.2);
      ctx.lineTo(cx + headR*0.1, headY - headR*0.9);
      ctx.closePath(); ctx.fill();
    }

    // 도전적 표정
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - headR*0.15, headY + headR*0.15); ctx.lineTo(cx + headR*0.15, headY + headR*0.15); ctx.stroke();
  }
}

function drawArrowHead(ctx, x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(size, 0); ctx.lineTo(-size/2, -size/2); ctx.lineTo(-size/2, size/2);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// ── 렌더링 함수들 ─────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

/** 배경 렌더 */
function renderBackground(ctx, w, h) {
  // 기본 그라디언트 배경
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, PALETTE.bg);
  grad.addColorStop(1, PALETTE.bgSub);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

/** 타이틀 배경 */
function renderTitleBg(ctx, w, h) {
  drawAssetOrFallback(ctx, 'bgTitle', 0, 0, w, h, (ctx, x, y, w, h) => {
    renderBackground(ctx, w, h);
    // 떠다니는 보석 파티클
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 20; i++) {
      const bx = (w * 0.1 + i * w * 0.04 + gTime * 0.02 * (i % 3 + 1)) % w;
      const by = h * 0.3 + Math.sin(gTime * 0.001 + i) * h * 0.15;
      drawGemFallback(ctx, bx, by, 30, 30, i % GEM_COLORS);
    }
    ctx.globalAlpha = 1;
  });
}

/** PvP 아레나 배경 */
function renderArenaBg(ctx, w, h) {
  drawAssetOrFallback(ctx, 'bgArena', 0, 0, w, h, (ctx, x, y, w, h) => {
    renderBackground(ctx, w, h);
    // 아레나 장식
    ctx.fillStyle = '#ffd70015';
    ctx.fillRect(w * 0.48, 0, w * 0.04, h);
    // 마법진
    ctx.strokeStyle = '#ffd70020';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w/2, h/2, h*0.4, 0, Math.PI*2); ctx.stroke();
  });
}

/** 보석 보드 렌더 */
function renderBoard(ctx, w, h, board, layout) {
  const { cellSize, boardX, boardY, padding } = layout;
  const cs = Math.max(cellSize, MIN_TOUCH);
  const actualCS = cellSize;

  // 보드 배경
  ctx.fillStyle = PALETTE.boardBg + '88';
  const bw = COLS * (actualCS + padding) + padding;
  const bh = ROWS * (actualCS + padding) + padding;
  ctx.beginPath();
  ctx.roundRect(boardX, boardY, bw, bh, 8);
  ctx.fill();

  // 프레임
  drawAssetOrFallback(ctx, 'bgBoard', boardX - 8, boardY - 8, bw + 16, bh + 16, null);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(board, r, c);
      if (!cell) continue;

      const cx = boardX + padding + c * (actualCS + padding);
      const cy = boardY + padding + r * (actualCS + padding);

      // 셀 배경 (체커보드) — uiBoardCell 에셋 활용
      if (assets.sprites['uiBoardCell']) {
        ctx.globalAlpha = (r + c) % 2 === 0 ? 0.8 : 1.0;
        ctx.drawImage(assets.sprites['uiBoardCell'], cx, cy, actualCS, actualCS);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = (r + c) % 2 === 0 ? '#1a1a40' : '#252550';
        ctx.beginPath();
        ctx.roundRect(cx, cy, actualCS, actualCS, 4);
        ctx.fill();
      }

      // 선택 하이라이트
      if (gSelectedCell && gSelectedCell.r === r && gSelectedCell.c === c) {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(cx - 2, cy - 2, actualCS + 4, actualCS + 4, 6);
        ctx.stroke();
      }

      // 힌트 하이라이트
      if (gHintCells) {
        for (const hc of gHintCells) {
          if (hc.r === r && hc.c === c) {
            ctx.fillStyle = 'rgba(255,215,0,0.2)';
            ctx.fillRect(cx, cy, actualCS, actualCS);
            ctx.strokeStyle = 'rgba(255,215,0,0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(cx, cy, actualCS, actualCS);
          }
        }
      }

      // 돌블록 (보석 대신 돌)
      if (cell.obstacle === OBS.STONE) {
        drawAssetOrFallback(ctx, OBS_ASSET[OBS.STONE], cx + 2, cy + 2, actualCS - 4, actualCS - 4, (ctx2, x2, y2, w2, h2) => drawObstacleFallback(ctx2, x2, y2, w2, h2, OBS.STONE));
        continue;
      }

      // 보석
      if (cell.color >= 0) {
        const gem_padding = actualCS * 0.08;
        const gx = cx + gem_padding, gy = cy + gem_padding;
        const gs = actualCS - gem_padding * 2;

        ctx.save();
        if (cell.alpha !== undefined && cell.alpha < 1) ctx.globalAlpha = cell.alpha;
        if (cell.scale !== undefined && cell.scale !== 1) {
          ctx.translate(cx + actualCS / 2, cy + actualCS / 2);
          ctx.scale(cell.scale, cell.scale);
          ctx.translate(-(cx + actualCS / 2), -(cy + actualCS / 2));
        }

        // 아이들 상태에서 gemIdleSheet 활용, 아니면 정적 에셋
        if (gCascadePhase === 'idle' && cell.special === SP.NONE && assets.sprites['gemIdleSheet']) {
          drawGemFromSheet(ctx, cell.color, gx, gy, gs, gs, gTime);
        } else {
          drawAssetOrFallback(ctx, GEM_ASSET_KEYS[cell.color], gx, gy, gs, gs, (ctx2, x2, y2, w2, h2) => drawGemFallback(ctx2, x2, y2, w2, h2, cell.color));
        }

        // 스페셜 오버레이
        if (cell.special !== SP.NONE) {
          drawAssetOrFallback(ctx, SP_ASSET[cell.special], gx, gy, gs, gs, (ctx2, x2, y2, w2, h2) => drawSpecialFallback(ctx2, x2, y2, w2, h2, cell.special));
        }

        ctx.restore();
      }

      // 장애물 오버레이 (보석 위에 그리는 것들)
      if (cell.obstacle !== OBS.NONE && cell.obstacle !== OBS.STONE) {
        drawAssetOrFallback(ctx, OBS_ASSET[cell.obstacle], cx, cy, actualCS, actualCS, (ctx2, x2, y2, w2, h2) => drawObstacleFallback(ctx2, x2, y2, w2, h2, cell.obstacle));
      }
    }
  }
}

/** HUD 렌더 — 솔로 */
function renderSoloHUD(ctx, w, h) {
  const hud = Layout.hud(w, h);
  const fs = Layout.fontSize(16, w, h);
  const s = Layout.scale(w, h);

  // 상단 바
  ctx.fillStyle = '#0a0a1a99';
  ctx.fillRect(0, 0, w, hud.top.h);

  // 레벨
  UI.text(ctx, 'Lv.' + gCurrentLevel, w * 0.06, hud.top.h / 2, { size: fs, bold: true, color: '#ffd700', align: 'left' });

  // 이동 횟수
  UI.text(ctx, t('moves') + ': ' + gMovesLeft, w * 0.25, hud.top.h / 2, { size: fs, bold: true, color: gMovesLeft <= 3 ? '#ff4444' : '#e0e0f0' });

  // 점수
  UI.text(ctx, t('score') + ': ' + gLevelScore, w * 0.5, hud.top.h / 2, { size: fs, bold: true, color: '#ffd700' });

  // 목표
  if (gLevelTargets) {
    for (let i = 0; i < gLevelTargets.length; i++) {
      const tgt = gLevelTargets[i];
      const done = tgt.current >= tgt.value;
      UI.text(ctx, tgt.label + ': ' + tgt.current + '/' + tgt.value, w * 0.8, hud.top.h / 2 + (i - 0.5) * fs * 1.2,
        { size: fs * 0.8, color: done ? '#4ade80' : '#e0e0f0', align: 'right' });
    }
  }

  // 부스터 (하단)
  renderBoosterBar(ctx, w, h, hud);
}

/** HUD 렌더 — PvP */
function renderPvpHUD(ctx, w, h) {
  const hud = Layout.hud(w, h);
  const fs = Layout.fontSize(16, w, h);
  const mobile = Layout.isMobile(w);

  // 상단 바
  ctx.fillStyle = '#0a0a1a99';
  ctx.fillRect(0, 0, w, hud.top.h);

  // 플레이어 점수 (좌)
  UI.text(ctx, t('score') + ': ' + gPlayerScore, w * 0.15, hud.top.h / 2, { size: fs, bold: true, color: '#4ade80', align: 'center' });

  // VS
  UI.text(ctx, 'VS', w * 0.5, hud.top.h / 2, { size: fs * 1.2, bold: true, color: '#ffd700', glow: '#ffd700' });

  // 상대 점수 (우)
  UI.text(ctx, t('score') + ': ' + gOpponentScore, w * 0.85, hud.top.h / 2, { size: fs, bold: true, color: '#ff4444', align: 'center' });

  // 턴 표시
  const turnText = t('turn') + ' ' + (gPvpTurn + 1) + '/' + MAX_TURNS_PVP;
  UI.text(ctx, turnText, w * 0.5, hud.top.h + fs, { size: fs * 0.9, color: '#8080a0' });

  // 현재 턴 표시 — uiTurnIndicator 에셋 활용
  const turnIndW = Layout.px(48, w, h);
  const turnIndH = Layout.px(24, w, h);
  if (gIsPlayerTurn) {
    ctx.fillStyle = '#4ade8033';
    ctx.fillRect(0, hud.top.h, w * (mobile ? 1 : 0.5), 4);
    drawAssetOrFallback(ctx, 'uiTurnIndicator', w * 0.15 - turnIndW / 2, hud.top.h + 6, turnIndW, turnIndH, (ctx2, x2, y2, w2, h2) => {
      ctx2.fillStyle = '#4ade80';
      ctx2.beginPath(); ctx2.moveTo(x2, y2 + h2/2); ctx2.lineTo(x2 + w2 * 0.4, y2); ctx2.lineTo(x2 + w2 * 0.4, y2 + h2); ctx2.closePath(); ctx2.fill();
      ctx2.fillRect(x2 + w2 * 0.4, y2 + h2 * 0.2, w2 * 0.6, h2 * 0.6);
    });
  } else {
    ctx.fillStyle = '#ff444433';
    ctx.fillRect(mobile ? 0 : w * 0.5, hud.top.h, w * (mobile ? 1 : 0.5), 4);
    ctx.save();
    ctx.translate(w * 0.85, hud.top.h + 6 + turnIndH / 2);
    ctx.scale(-1, 1);
    ctx.translate(-turnIndW / 2, -turnIndH / 2);
    drawAssetOrFallback(ctx, 'uiTurnIndicator', 0, 0, turnIndW, turnIndH, (ctx2, x2, y2, w2, h2) => {
      ctx2.fillStyle = '#ff4444';
      ctx2.beginPath(); ctx2.moveTo(x2, y2 + h2/2); ctx2.lineTo(x2 + w2 * 0.4, y2); ctx2.lineTo(x2 + w2 * 0.4, y2 + h2); ctx2.closePath(); ctx2.fill();
      ctx2.fillRect(x2 + w2 * 0.4, y2 + h2 * 0.2, w2 * 0.6, h2 * 0.6);
    });
    ctx.restore();
  }

  // 부스터 (하단)
  renderBoosterBar(ctx, w, h, hud);
}

/** 부스터 바 */
function renderBoosterBar(ctx, w, h, hud) {
  const btnS = Math.max(40, Layout.px(48, w, h));
  const fs = Layout.fontSize(10, w, h);
  const barY = h - btnS - 12;
  const startX = (w - btnS * 4 - 12 * 3) / 2;
  const names = gLang === 'en' ? BOOST_NAMES_EN : BOOST_NAMES_KO;

  for (let i = 0; i < 4; i++) {
    const bx = startX + i * (btnS + 12);
    const by = barY;
    const isActive = gSelectedBooster === i;
    const available = !gPvpMode || gPvpBoosters[i] > 0;

    ctx.fillStyle = isActive ? '#ffd70055' : (available ? '#ffffff15' : '#ffffff08');
    ctx.strokeStyle = isActive ? '#ffd700' : (available ? '#ffffff33' : '#ffffff11');
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnS, btnS, 8);
    ctx.fill(); ctx.stroke();

    drawAssetOrFallback(ctx, BOOST_ASSET[i], bx + 4, by + 2, btnS - 8, btnS * 0.6, (ctx2, x2, y2, w2, h2) => {

function renderTitle(ctx, w, h) {

    // 왕 폴백 — SD 캐릭터
    const cx2 = x2 + w2/2, cy2 = y2 + h2*0.35;
    // 망토
    ctx2.fillStyle = '#cc2244';
    ctx2.beginPath();
    ctx2.moveTo(cx2 - w2*0.25, cy2 + w2*0.1);

    ctx2.lineTo(cx2 + w2*0.25, cy2 + w2*0.1);

    // 몸

    ctx2.beginPath(); ctx2.roundRect(cx2 - w2*0.15, cy2, w2*0.3, w2*0.35, w2*0.05); ctx2.fill();
    // 얼굴

    headGrad.addColorStop(0, '#ffe0b2'); headGrad.addColorStop(1, '#ffcc80');
    ctx2.fillStyle = headGrad;
    ctx2.beginPath(); ctx2.arc(cx2, cy2 - headR*0.1, headR, 0, Math.PI*2); ctx2.fill();
    // 눈
    ctx2.fillStyle = '#333';
    ctx2.beginPath(); ctx2.arc(cx2 - headR*0.35, cy2 - headR*0.15, headR*0.1, 0, Math.PI*2); ctx2.fill();
    ctx2.beginPath(); ctx2.arc(cx2 + headR*0.35, cy2 - headR*0.15, headR*0.1, 0, Math.PI*2); ctx2.fill();
    // 미소
    ctx2.strokeStyle = '#333'; ctx2.lineWidth = 2;
    ctx2.beginPath(); ctx2.arc(cx2, cy2 + headR*0.05, headR*0.25, 0.1, Math.PI - 0.1); ctx2.stroke();
    // 왕관
    ctx2.fillStyle = '#ffd700';
    ctx2.beginPath();
    ctx2.moveTo(cx2 - headR*0.7, cy2 - headR*0.8);
    ctx2.lineTo(cx2 - headR*0.5, cy2 - headR*1.3);
    ctx2.lineTo(cx2 - headR*0.2, cy2 - headR*0.9);
    ctx2.lineTo(cx2, cy2 - headR*1.4);
    ctx2.lineTo(cx2 + headR*0.2, cy2 - headR*0.9);

    ctx2.lineTo(cx2 + headR*0.7, cy2 - headR*0.8);
    ctx2.closePath(); ctx2.fill();
    // 왕관 보석
    ctx2.fillStyle = '#ff4444';
    ctx2.beginPath(); ctx2.arc(cx2, cy2 - headR*1.1, headR*0.1, 0, Math.PI*2); ctx2.fill();
  });

      beginTransition(STATE.KINGDOM_MAP);

    }

  if (input.jp('Escape')) { playSfx('buttonClick'); beginTransition(STATE.KINGDOM_MAP); }

// ── PLAY (솔로) ───────────────────────────────────────────────────
function updatePlay(dt) {
  const w = engine.W, h = engine.H;
  updateCascade(dt, gGrid);
  handleBoardInput(w, h);

  // 힌트 + 데드록
  if (gCascadePhase === 'idle' && !gIsInputBlocked) {
    gHintTimer += dt;
    if (gHintTimer >= HINT_DELAY && !gHintCells) {
      gHintCells = findOneValidMove(gGrid);
    }
    gDeadlockTimer += dt;
    if (gDeadlockTimer >= DEADLOCK_DELAY) {
      if (countValidMoves(gGrid) === 0) {
        shuffleBoard(gGrid);
      }
      gDeadlockTimer = 0;
    }
  } else {
    gHintTimer = 0;
    gHintCells = null;
  }

  // ESC → 설정
  if (input.jp('Escape')) { playSfx('buttonClick'); beginTransition(STATE.SETTINGS); }

  // 대기 큐 처리
  processDeferredQueue();
}

function renderPlay(ctx, w, h) {
  renderBackground(ctx, w, h);
  const bl = getBoardLayout(w, h);
  renderBoard(ctx, w, h, gGrid, bl);
  renderSoloHUD(ctx, w, h);
  renderScorePopups(ctx, w, h);
  renderComboPopup(ctx, w, h);
}

// ── PVP_MATCH ─────────────────────────────────────────────────────
function updatePvpMatch(dt) {
  const w = engine.W, h = engine.H;

  // 플레이어 턴
  if (gIsPlayerTurn) {
    updateCascade(dt, gGrid);
    handleBoardInput(w, h);
  } else {
    // AI 턴
    updateCascade(dt, gOpponentGrid);
    updateAiTurn(dt);
  }

  // 턴 배너 페이드
  if (gTurnBannerAlpha > 0) gTurnBannerAlpha = Math.max(0, gTurnBannerAlpha - dt / 1500);

  // 힌트
  if (gIsPlayerTurn && gCascadePhase === 'idle') {
    gHintTimer += dt;
    if (gHintTimer >= HINT_DELAY && !gHintCells) {
      gHintCells = findOneValidMove(gGrid);
    }
  }

  if (input.jp('Escape')) { playSfx('buttonClick'); beginTransition(STATE.SETTINGS); }

  processDeferredQueue();
}

function renderPvpMatch(ctx, w, h) {
  renderArenaBg(ctx, w, h);
  const mobile = Layout.isMobile(w);

  // 플레이어 보드
  const pbl = getBoardLayout(w, h);
  renderBoard(ctx, w, h, gGrid, pbl);

  // 상대 보드 (PC: 오른쪽, 모바일: 상단 축소)
  const obl = getOpponentBoardLayout(w, h);
  ctx.save();
  if (!gIsPlayerTurn) ctx.globalAlpha = 1;
  else ctx.globalAlpha = 0.7;
  renderBoard(ctx, w, h, gOpponentGrid, obl);
  ctx.restore();

  // 캐릭터 표시
  const charSize = Layout.px(60, w, h);
  drawAssetOrFallback(ctx, 'charKingHappy', pbl.boardX - charSize - 5, pbl.boardY - 5, charSize, charSize, (ctx2, x2, y2, w2, h2) => {
    drawCharFallback(ctx2, x2, y2, w2, h2, 'king');
  });

// ── SETTINGS ──────────────────────────────────────────────────────
function updateSettings(dt) {
  const w = engine.W, h = engine.H;
  const btnW = Layout.px(200, w, h);
  const btnH = Layout.px(50, w, h);
  const gap = Layout.px(15, w, h);

  if (input.tapped) {
    const bx = w / 2 - btnW / 2;
    // 계속하기
    if (UI.hitTest(input.tapX, input.tapY, bx, h * 0.3, btnW, btnH)) {
      playSfx('buttonClick');
      returnFromSettings();
      return;
    }
    // 소리 토글
    if (UI.hitTest(input.tapX, input.tapY, bx, h * 0.3 + btnH + gap, btnW, btnH)) {
      gSettingsSoundOn = !gSettingsSoundOn;
      playSfx('buttonClick');
      saveGameData();
      return;
    }
    // 음악 토글
    if (UI.hitTest(input.tapX, input.tapY, bx, h * 0.3 + (btnH + gap) * 2, btnW, btnH)) {
      gSettingsMusicOn = !gSettingsMusicOn;
      saveGameData();
      return;
    }
    // 언어 토글
    if (UI.hitTest(input.tapX, input.tapY, bx, h * 0.3 + (btnH + gap) * 3, btnW, btnH)) {
      gLang = gLang === 'ko' ? 'en' : 'ko';
      saveGameData();
      return;
    }
    // 타이틀로
    if (UI.hitTest(input.tapX, input.tapY, bx, h * 0.3 + (btnH + gap) * 4, btnW, btnH)) {
      playSfx('buttonClick');
      gPvpMode = false;
      gState = STATE.SETTINGS; // 임시
      gSettingsReturnState = STATE.TITLE;
      returnFromSettings();
      return;
    }
  }
  if (input.jp('Escape') || input.jp('KeyP')) { returnFromSettings(); }
}

function returnFromSettings() {
  // 페이드 상태 완전 정리 (C51 QA: 검은 화면 고착 방지)
  gFadeAlpha = 0;
  gTransitioning = false;

// ── 지연 큐 처리 ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
function processDeferredQueue() {
  if (gDeferredQueue.length > 0 && !gTransitioning && gCascadePhase === 'idle') {
    const next = gDeferredQueue.shift();
    beginTransition(next);
  }
}

// ═══════════════════════════════════════════════════════════════════
// ── coreUpdate / coreRender (단일 진입점) ─────────────────────────
// ═══════════════════════════════════════════════════════════════════

function coreUpdate(dt, timestamp) {
  if (!gReady) return;
  gTime = timestamp;
  gBoardAnimTime += dt;

  // tween 업데이트 (거의 모든 상태에서 활성)
  const sys = ACTIVE_SYSTEMS[gState];
  if (sys && sys.tween) tween.update(dt);
  if (sys && sys.particles) particles.update(dt);
  if (sys && sys.audio) updateBgm(dt);

  // 콤보 팝업 페이드
  if (gShowingCombo) {
    gComboPopAlpha -= dt / 1200;
    if (gComboPopAlpha <= 0) { gShowingCombo = false; gComboPopAlpha = 0; }
  }

  // 점수 팝업 업데이트
  for (let i = gScorePopups.length - 1; i >= 0; i--) {
    gScorePopups[i].life += dt;
    gScorePopups[i].alpha = 1 - gScorePopups[i].life / gScorePopups[i].maxLife;
    if (gScorePopups[i].life >= gScorePopups[i].maxLife) {
      scorePopPool.release(gScorePopups[i]);
      gScorePopups.splice(i, 1);
    }
  }

  // 쉐이크 감쇠
  if (gShakeIntensity > 0) gShakeIntensity *= 0.92;
  if (gShakeIntensity < 0.1) gShakeIntensity = 0;

  // 상태별 업데이트
  switch (gState) {
    case STATE.BOOT: updateBoot(dt); break;
    case STATE.TITLE: updateTitle(dt); break;
    case STATE.MODE_SELECT: updateModeSelect(dt); break;
    case STATE.KINGDOM_MAP: updateKingdomMap(dt); break;
    case STATE.LEVEL_SELECT: updateLevelSelect(dt); break;
    case STATE.PLAY: updatePlay(dt); break;
    case STATE.PVP_MATCH: updatePvpMatch(dt); break;
    case STATE.PVP_RESULT: updatePvpResult(dt); break;
    case STATE.LEVEL_CLEAR: updateLevelClear(dt); break;
    case STATE.LEVEL_FAIL: updateLevelFail(dt); break;
    case STATE.BUILD_SELECT: updateBuildSelect(dt); break;
    case STATE.SETTINGS: updateSettings(dt); break;
  }
}

function coreRender(ctx, w, h, dt) {
  if (!gReady) {
    renderBoot(ctx, w, h);
    input.flush();
    return;
  }

  // 쉐이크 오프셋
  const shk = UI.shake(gShakeIntensity);
  if (shk.x || shk.y) {
    ctx.save();
    ctx.translate(shk.x, shk.y);
  }

  // 상태별 렌더
  switch (gState) {
    case STATE.BOOT: renderBoot(ctx, w, h); break;
    case STATE.TITLE: renderTitle(ctx, w, h); break;
    case STATE.MODE_SELECT: renderModeSelect(ctx, w, h); break;
    case STATE.KINGDOM_MAP: renderKingdomMap(ctx, w, h); break;
    case STATE.LEVEL_SELECT: renderLevelSelect(ctx, w, h); break;
    case STATE.PLAY: renderPlay(ctx, w, h); break;
    case STATE.PVP_MATCH: renderPvpMatch(ctx, w, h); break;
    case STATE.PVP_RESULT: renderPvpResult(ctx, w, h); break;
    case STATE.LEVEL_CLEAR: renderLevelClear(ctx, w, h); break;
    case STATE.LEVEL_FAIL: renderLevelFail(ctx, w, h); break;
    case STATE.BUILD_SELECT: renderBuildSelect(ctx, w, h); break;
    case STATE.SETTINGS: renderSettings(ctx, w, h); break;
  }

  // 파티클
  particles.render(ctx);

  // 매치/스페셜 이펙트 스프라이트 시트 렌더
  renderMatchEffects(ctx);

  if (shk.x || shk.y) ctx.restore();

  // 페이드 오버레이
  UI.fade(ctx, w, h, gFadeAlpha);

  // ⚠️ input.flush()는 coreRender() 마지막에 (C50 교훈)
  input.flush();
}

function onResize(w, h) {
  // 리사이즈 시 배경 캐시 무효화
  gBgCache = null;
}

// ═══════════════════════════════════════════════════════════════════
// ── 에셋 로드 + 초기화 ───────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════

async function init() {
  // manifest.json에서 에셋 목록 읽어 동적 로드
  let manifest = null;
  try {
    manifest = await fetch('assets/manifest.json').then(r => r.json());
  } catch (e) {
    console.warn('[GemArena] manifest.json load failed, using fallbacks');
  }

  if (manifest && manifest.assets) {
    const assetMap = {};
    for (const [key, info] of Object.entries(manifest.assets)) {
      assetMap[key] = 'assets/' + info.file;
    }
    await assets.load(assetMap);
  }

  // 에셋 검증
  validateAssets();

  // 세이브 데이터 로드
  loadGameData();

  // 준비 완료
  gReady = true;
  enterState(STATE.TITLE);
  engine.start();
}

function validateAssets() {
  const required = [

    'uiLeagueBronze','uiLeagueSilver','uiLeagueGold','uiLeaguePlatinum','uiLeagueDiamond',
    'uiTurnIndicator','uiVsEmblem',
    'effectMatchBurst','effectLineLaser','effectBombShockwave',
    'effectRainbowSwirl','effectComboText','effectObstacleSend',

    'particleSparkle','particleStar','particleShard',
