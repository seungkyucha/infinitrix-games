};

// -- beginTransition single definition (F6, F21) --
function beginTransition(fromState, toState, duration) {
  if (STATE_PRIORITY[toState] < STATE_PRIORITY[G.state] && G.state !== STATES.PAUSED) return;
  const proxy1 = { a: 0 };
  G.tween.add(proxy1, { a: 1 }, duration / 2, 'easeIn', () => {
    G.prevState = fromState;
    G.state = toState;
    G._stateTimer = 0;
    G._introProgress = 0;
    const proxy2 = { a: 1 };
    G.tween.add(proxy2, { a: 0 }, duration / 2, 'easeOut', () => {
      G.transAlpha = 0;
    });
    // Sync proxy2 → transAlpha each frame via particle hack
    G._transProxy = proxy2;
  });
  G._transProxy = proxy1;
}

// -- Initialize new run --
function initRun(G) {
  const save = loadSave();
  G.coreHp = CONFIG.CORE_MAX_HP + (G.upgrades.defense >= 1 ? 100 : 0);
  G.coreMaxHp = G.coreHp;
  G.energy = (G._startEnergy || CONFIG.START_ENERGY) + (CONFIG.DDA[G.ddaLevel]?.extraEnergy || 0) * CONFIG.START_ENERGY | 0;
  G.mechas = []; G.enemies = []; G.projectiles = []; G.particles = [];
  G.zone = 0; G.wave = 0; G.score = 0;
  G.boss = null; G.bossRewardGiven = false;
  G.parts = []; G.partChoices = [];
  G._partBonusAtk = 0; G._partBonusCd = 0; G._partBonusRange = 0;
  G._partBonusSplash = 0; G._partBonusEnergy = 0; G._partBonusStun = 0;
  G._partBonusPierce = 0; G._partBonusChain = 0; G._synergyCounts = {};
  G.timeOfDay = 'day'; G.weather = 'clear';
  G._acidRainTimer = 0; G._empStormTimer = 0;
  G.speed = 1; G._killCount = 0; G._waveDamaged = false;
  G._waveClearing = false; G._selectedReward = -1;
  G._earnedCP = 0;
  G.rng = new SeededRNG(Date.now() % 100000);
  G.totalRuns++;
  setupZone(G);
}

// -- Setup zone (map generation) --
function setupZone(G) {
  const isMobile = G.cols <= 8;
  G.cols = isMobile ? CONFIG.GRID_COLS_MOB : CONFIG.GRID_COLS_PC;
  G.rows = isMobile ? CONFIG.GRID_ROWS_MOB : CONFIG.GRID_ROWS_PC;
  const mapData = generateZoneMap(G.zone, G.cols, G.rows, G.rng);
  G._currentGrid = mapData.grid;
  G._spawnCells = mapData.spawnCells;
  G._baseIdx = mapData.baseIdx;
  G.grid = mapData.grid.slice();
  G.wave = 0;
  G.boss = null;
  G.bossRewardGiven = false;
  G.enemies = [];
  G.projectiles = [];
  // Keep existing mechas? No — new zone resets placement
  G.mechas = [];
  // DDA free mechas
  if (CONFIG.DDA[G.ddaLevel]?.freeMechas) {
    // Place free blasters near spawn
    const count = CONFIG.DDA[G.ddaLevel].freeMechas;
    for (let i = 0; i < count && i < G._spawnCells.length; i++) {
      const sc = G._spawnCells[i];
      const r = (sc / G.cols) | 0;
      const c = Math.min(G.cols - 1, (sc % G.cols) + 2);
      if (G.grid[r * G.cols + c] === 0) {
        placeMecha(G, r, c, 0);
      }
    }
  }
  // Recalculate path
  recalcPath(G);
  // Time/Weather for zone
  G.timeOfDay = 'day';
  G.weather = 'clear';
  if (G.zone >= 2) {
    G.weather = G.rng.pick(['clear', 'acid_rain', 'clear']);
  }
  if (G.zone >= 3) {
    G.weather = G.rng.pick(['clear', 'acid_rain', 'emp_storm']);
  }
  if (G.zone >= 4) {
    G.weather = G.rng.pick(['acid_rain', 'emp_storm', 'mag_storm']);
  }
}

// -- Place a mecha on the grid --
function placeMecha(G, row, col, type) {
  const idx = row * G.cols + col;
  if (G.grid[idx] !== 0 && G.grid[idx] !== 1) return false; // Can't place on obstacle/spawn/base
  const cost = CONFIG.MECHA[type].cost;
  // Check if upgrading existing mecha
  const existing = G.mechas.find(m => m.row === row && m.col === col && m.type === type && m.active);
  if (existing) {
    if (existing.level >= 2) return false; // Max level
    const upgCost = (cost * CONFIG.LEVEL_COST_MULT[existing.level + 1]) | 0;
    if (G.energy < upgCost) return false;
    G.energy -= upgCost;
    existing.level++;
    recalcMechaStats(existing, G);
    return true;
  }
  if (G.energy < cost) return false;
  // Check path still exists after placement
  const testGrid = G.grid.slice();
  testGrid[idx] = 1;
  const path = findPath(testGrid, G.cols, G.rows, G._spawnCells[0], G._baseIdx);
  if (!path) return false; // Path blocked (§10.2)
  G.energy -= cost;
  G.grid[idx] = 1;
  const base = CONFIG.MECHA[type];
  const m = {
    type, row, col, level: 0, active: true,
    atk: base.atk, cooldown: base.cd, cooldownTimer: 0,
    range: base.range, splash: base.splash,
    disabled: 0
  };
  recalcMechaStats(m, G);
  G.mechas.push(m);
  recalcPath(G);
  return true;
}

// -- Sell mecha --
function sellMecha(G, row, col) {
  const idx = row * G.cols + col;
  const mi = G.mechas.findIndex(m => m.row === row && m.col === col && m.active);
  if (mi < 0) return false;
  const m = G.mechas[mi];
  const refund = ((CONFIG.MECHA[m.type].cost * 0.5) * (1 + (G.upgrades.utility >= 3 ? 0.2 : 0))) | 0;
  G.energy += refund;
  G.grid[idx] = 0;
  G.mechas.splice(mi, 1);
  recalcPath(G);
  return true;
}

// -- Recalculate BFS path and path cell set --
function recalcPath(G) {
  const path = findPath(G.grid, G.cols, G.rows, G._spawnCells[0], G._baseIdx);
  G._pathCells = new Set();
  if (path) path.forEach(idx => G._pathCells.add(idx));
}

// ═══════════════════════════════════════════════════════════════
// REGION 10: MAIN LOOP & INITIALIZATION (~200 lines)
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// -- Particle system --
function addParticle(x, y, type) {
  const count = type === 'explosion' ? 8 : type === 'core_hit' ? 12 : type === 'emp_wave' ? 1 : 5;
  for (let i = 0; i < count; i++) {
    G.particles.push({
      x, y, type,
      vx: (G.rng ? G.rng.nextFloat(-1, 1) : Math.sin(i)) * 80,
      vy: (G.rng ? G.rng.nextFloat(-1, 1) : Math.cos(i)) * 80,
      life: type === 'emp_wave' ? 600 : 400,
      maxLife: type === 'emp_wave' ? 600 : 400,
      size: type === 'emp_wave' ? 100 : 4
    });
  }
}

G._addParticle = addParticle;

// -- Resize handler (devicePixelRatio) --
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Recalc grid dimensions
  const isMobile = w < 600;
  G.cols = isMobile ? CONFIG.GRID_COLS_MOB : CONFIG.GRID_COLS_PC;
  G.rows = isMobile ? CONFIG.GRID_ROWS_MOB : CONFIG.GRID_ROWS_PC;
  const topBar = 36;
  const bottomPanel = 64;
  const availH = h - topBar - bottomPanel;
  const availW = w - 20;
  G.cellSize = Math.min(CONFIG.CELL_MAX, Math.max(CONFIG.CELL_MIN,
    Math.min(availW / G.cols, availH / G.rows) | 0));
  G._gridOffX = ((w - G.cols * G.cellSize) / 2) | 0;
  G._gridOffY = topBar;
  G._panelY = G._gridOffY + G.rows * G.cellSize + 4;
  G._panelH = h - G._panelY;
  G._canvasW = w;
  G._canvasH = h;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// -- Main game loop --
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const rawDt = timestamp - lastTime;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 50) * G.speed; // Cap + speed multiplier
  G._time = timestamp / 1000;
  G._stateTimer += dt;
  G._introProgress = Math.min(1, G._stateTimer / 2000);
  // Sync transition alpha from proxy
  if (G._transProxy) G.transAlpha = G._transProxy.a;
  const sys = ACTIVE_SYSTEMS[G.state];
  if (!sys) { requestAnimationFrame(gameLoop); return; }
  const L = LANG[G.lang] || LANG.ko;
  const w = G._canvasW;
  const h = G._canvasH;
  // Update systems
  if (sys.tween && G.tween) G.tween.update(dt);
  if (sys.sound && G.sound) G.sound.update(dt);
  // Screen shake
  if (G._shakeTimer > 0) {
    G._shakeTimer -= dt;
    G._shakeX = (Math.sin(G._time * 50) * 3) * (G._shakeTimer / 300);
    G._shakeY = (Math.cos(G._time * 60) * 2) * (G._shakeTimer / 300);
  } else { G._shakeX = 0; G._shakeY = 0; }
  // Update particles
  if (sys.particle) {
    for (let i = G.particles.length - 1; i >= 0; i--) {
      const p = G.particles[i];
      p.life -= dt;
      if (p.life <= 0) { G.particles.splice(i, 1); continue; }
      p.x += p.vx * dt / 1000;
      p.y += p.vy * dt / 1000;
      p.vy += 50 * dt / 1000; // gravity
    }
  }
  // State-specific update
  if (G.state === STATES.WAVE || G.state === STATES.BOSS_FIGHT) {
    if (sys.ai) updateEnemyAI(G.enemies, G.grid, G.cols, G.rows, G._baseIdx,
      G.cellSize, G._gridOffX, G._gridOffY, dt, G);
    if (sys.combat) updateCombat(G.mechas, G.enemies, G.projectiles, dt,
      G.cellSize, G._gridOffX, G._gridOffY, G.cols, G._time, G);
    if (sys.physics) {
      updateProjectiles(G.projectiles, G.enemies, dt, G);
      updateBossProjectiles(G.projectiles, dt, G, G.cellSize, G._gridOffX, G._gridOffY, G.cols, G.rows, G._baseIdx);
    }
    if (sys.spawn && G.state === STATES.WAVE) {
      // Check wave clear
      if (!G._waveClearing && G.enemies.length > 0 &&
          G.enemies.every(e => !e.alive || (!e.spawned && e.spawnDelay <= 0))) {
        // Explicitly check: all enemies dead or done
        const allDead = G.enemies.filter(e => e.spawned).every(e => !e.alive);
        const allSpawned = G.enemies.every(e => e.spawned);
        if (allDead && allSpawned) {
          G._waveClearing = true; // Guard flag (F5)
          // Wave clear rewards
          const cp = CONFIG.CP_WAVE_BASE * (G.zone + 1);
          G.corePoints += cp; G._earnedCP += cp;
          if (!G._waveDamaged) G.score += CONFIG.SCORE_NODMG_WAVE;
          if (G.sound) G.sound.playSfx('reward');
          G.tween.add({ a: 0 }, { a: 1 }, 1500, 'easeOut', () => {
            G._waveClearing = false;
            if (G.wave < G.maxWave - 1) {
              // Next wave or boss
              G.wave++;
              beginTransition(G.state, STATES.REWARD_SELECT, 600);
            } else {
              // Boss wave
              beginTransition(G.state, STATES.BOSS_INTRO, 800);
            }
          });
          beginTransition(G.state, STATES.WAVE_CLEAR, 400);
        }
      }
    }
    // Boss fight specific
    if (G.state === STATES.BOSS_FIGHT && G.boss) {
      updateBoss(G.boss, G.mechas, G.enemies, G.projectiles, dt, G,
        G.cellSize, G._gridOffX, G._gridOffY, G.cols, G.rows, G._baseIdx);
      // Boss damage from mechas (DrillWorm can't be hit underground)
      if (G.boss.alive && G.boss.weakpointExposed && !G.boss._underground) {
        for (const m of G.mechas) {
          if (!m.active || m.disabled > 0 || m.type === 2) continue;
          const mx = G._gridOffX + m.col * G.cellSize + G.cellSize/2;
          const my = G._gridOffY + m.row * G.cellSize + G.cellSize/2;
          const dx = G.boss.x - mx;
          const dy = G.boss.y - my;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist <= m.range * G.cellSize) {
            // Mecha hits boss
            if (m.cooldownTimer <= 0) {
              G.boss.hp -= m.atk;
              m.cooldownTimer = m.cooldown;
              addParticle(G.boss.x, G.boss.y, 'hit');
              if (G.sound) G.sound.playSfx('hit');
            }
          }
        }
      }
      // Boss defeated
      if (G.boss && !G.boss.alive) {
        // Already handled
      }
      if (G.boss && G.boss.hp <= 0 && G.boss.alive) {
        G.boss.alive = false;
        if (!G.bossRewardGiven) { // F17: guard flag
          G.bossRewardGiven = true;
          G.score += CONFIG.SCORE_BOSS_BASE * (G.zone + 1);
          const cp = CONFIG.CP_BOSS_BASE * (G.zone + 1);
          G.corePoints += cp; G._earnedCP += cp;
          // Unlock mechas
          if (G.zone === 1) G.unlockedMechas[3] = true; // EMP
          if (G.zone === 2) G.unlockedMechas[4] = true; // Railgun
          G._shakeTimer = 500;
          if (G.sound) G.sound.playSfx('victory');
          addParticle(G.boss.x, G.boss.y, 'explosion');
          G.tween.add({ a: 0 }, { a: 1 }, 2000, 'easeOut', () => {
            if (G.zone < CONFIG.TOTAL_ZONES - 1) {
              G.zone++;
              G.consecutiveDeaths = 0;
              setupZone(G);
              beginTransition(G.state, STATES.ZONE_INTRO, 800);
            } else {
              beginTransition(G.state, STATES.VICTORY, 800);
            }
          });
          beginTransition(G.state, STATES.BOSS_CLEAR, 600);
        }
      }
    }
    // Check game over
    if (G.coreHp <= 0 && G.state !== STATES.GAMEOVER) {
      G.coreHp = 0;
      G._shakeTimer = 600;
      G.consecutiveDeaths++;
      G.ddaLevel = calcDDALevel(G.consecutiveDeaths);
      savePersistent(G);
      if (G.sound) G.sound.playSfx('coreHit');
      beginTransition(G.state, STATES.GAMEOVER, 800);
    }
    // Environment: night transition at wave 2 (§7.3: 웨이브 2에서 주간→야간)
    if (sys.env) {
      if (G.wave >= 2 && G.timeOfDay === 'day') {
        G.timeOfDay = 'night';
        // Recalc mecha ranges
        for (const m of G.mechas) recalcMechaStats(m, G);
      }
      // §7.3 Weather gameplay effects (not just visual!)
      if (G.weather === 'acid_rain') {
        // Acid rain: enemy speed -20% applied in updateEnemyAI via G.weather
        // Mecha HP -1/s (shield range protects)
        G._acidRainTimer = (G._acidRainTimer || 0) + dt;
        if (G._acidRainTimer >= 1000) {
          G._acidRainTimer -= 1000;
          // Find shield generator ranges
          const shieldRanges = [];
          for (const m of G.mechas) {
            if (m.active && m.type === 2) {
              shieldRanges.push({ col: m.col, row: m.row, range: m.range });
            }
          }
          // Damage unshielded mechas
          for (const m of G.mechas) {
            if (!m.active) continue;
            let shielded = false;
            for (const s of shieldRanges) {
              const dx = m.col - s.col;
              const dy = m.row - s.row;
              if (Math.sqrt(dx*dx + dy*dy) <= s.range) { shielded = true; break; }
            }
            if (!shielded) {
              m._acidDmg = (m._acidDmg || 0) + 1;
              if (m._acidDmg >= 20) { m.active = false; G.grid[m.row * G.cols + m.col] = 0; } // Mecha destroyed
            }
          }
        }
      }
      if (G.weather === 'emp_storm') {
        // EMP storm: stun unshielded mechas 1s every 3s cycle
        G._empStormTimer = (G._empStormTimer || 0) + dt;
        if (G._empStormTimer >= 3000) {
          G._empStormTimer -= 3000;
          const shieldRanges = [];
          for (const m of G.mechas) {
            if (m.active && m.type === 2) {
              shieldRanges.push({ col: m.col, row: m.row, range: m.range });
            }
          }
          for (const m of G.mechas) {
            if (!m.active || m.type === 2) continue;
            let shielded = false;
            for (const s of shieldRanges) {
              const dx = m.col - s.col;
              const dy = m.row - s.row;
              if (Math.sqrt(dx*dx + dy*dy) <= s.range) { shielded = true; break; }
            }
            if (!shielded) m.disabled = 1000; // 1s stun
          }
          if (G._addParticle) G._addParticle(G._canvasW / 2, G._canvasH / 2, 'emp_wave');
        }
      }
      // mag_storm: accuracy -30% handled in projectile collision (railgun immune)
    }
  }
  // ── RENDER ──
  ctx.save();
  ctx.clearRect(0, 0, w, h);
  if (G.state === STATES.BOOT) {
    // Loading screen
    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = COL.uiWhite;
    ctx.font = `16px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(L.loading, w/2, h/2);
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
  else if (G.state === STATES.TITLE) {
    drawTitleScreen(ctx, w, h, G._time, L);
  }
  else if (G.state === STATES.HUB) {
    drawHUBScreen(ctx, w, h, G, L, G._time);
  }
  else if (G.state === STATES.STORY_INTRO) {
    drawZoneIntro(ctx, w, h, -1, L, G._time, G._introProgress);
    // Override with story text
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0, 0, w, h);
    const ts = Math.min(24, w * 0.04);
    ctx.font = `${ts}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = COL.uiWhite;
    ctx.globalAlpha = G._introProgress;
    ctx.fillText(L.storyIntro, w/2, h * 0.45, w * 0.85);
    ctx.fillStyle = '#505070';
    ctx.font = `${ts * 0.6}px 'Segoe UI',system-ui,sans-serif`;
    ctx.globalAlpha = 0.5 + Math.sin(G._time * 3) * 0.5;
    ctx.fillText('TAP / SPACE', w/2, h * 0.7);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
  else if (G.state === STATES.ZONE_INTRO) {
    drawZoneIntro(ctx, w, h, G.zone, L, G._time, G._introProgress);
  }
  else if (G.state === STATES.PLACEMENT || G.state === STATES.WAVE ||
           G.state === STATES.WAVE_CLEAR || G.state === STATES.BOSS_FIGHT ||
           G.state === STATES.BOSS_INTRO || G.state === STATES.BOSS_CLEAR) {
    ctx.save();
    ctx.translate(G._shakeX, G._shakeY);
    // Environment BG
    drawEnvironment(ctx, w, h, G.zone, G.timeOfDay, G.weather, G._time);
    // Grid
    drawGrid(ctx, G._gridOffX, G._gridOffY, G.cols, G.rows, G.cellSize,
      G.grid, G.hoveredCell, G._pathCells, G.state === STATES.PLACEMENT ? G.selectedMecha : -1);
    // Base marker
    const bx = G._gridOffX + (G._baseIdx % G.cols) * G.cellSize;
    const by = G._gridOffY + ((G._baseIdx / G.cols) | 0) * G.cellSize;
    ctx.fillStyle = 'rgba(0,229,255,0.15)';
    ctx.fillRect(bx, by, G.cellSize, G.cellSize);
    ctx.strokeStyle = COL.energyCyan; ctx.lineWidth = 2;
    ctx.strokeRect(bx + 2, by + 2, G.cellSize - 4, G.cellSize - 4);
    ctx.fillStyle = COL.energyCyan;
    ctx.font = `bold ${G.cellSize * 0.3}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⬡', bx + G.cellSize/2, by + G.cellSize/2);
    // Draw mechas
    for (const m of G.mechas) {
      if (!m.active) continue;
      const mx = G._gridOffX + m.col * G.cellSize + G.cellSize/2;
      const my = G._gridOffY + m.row * G.cellSize + G.cellSize/2;
      drawMecha(ctx, mx, my, G.cellSize, m.type, m.level, G._time);
      // Disabled overlay
      if (m.disabled > 0) {
        ctx.fillStyle = 'rgba(255,224,130,0.3)';
        ctx.fillRect(G._gridOffX + m.col * G.cellSize, G._gridOffY + m.row * G.cellSize, G.cellSize, G.cellSize);
      }
    }
    // Draw enemies
    for (const e of G.enemies) {
      if (!e.alive || !e.spawned) continue;
      drawEnemy(ctx, e.x, e.y, G.cellSize, e.type, e.hp, e.maxHp, e.status, G._time);
    }
    // Draw boss
    if (G.boss && G.boss.alive && (G.state === STATES.BOSS_FIGHT || G.state === STATES.BOSS_CLEAR)) {
      // DrillWorm underground: draw warning indicator instead of boss
      if (G.boss._underground && G.boss.id === 2) {
        // Warning circle at emerge position
        const warningPulse = Math.sin(G._time * 8) * 0.5 + 0.5;
        ctx.strokeStyle = `rgba(229,57,53,${0.3 + warningPulse * 0.4})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(G.boss._warningX, G.boss._warningY, G.cellSize * 1.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = `rgba(229,57,53,${0.1 + warningPulse * 0.1})`;
        ctx.beginPath();
        ctx.arc(G.boss._warningX, G.boss._warningY, G.cellSize * 1.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (!G.boss._underground || G.boss.id !== 2) {
        drawBoss(ctx, G.boss.x, G.boss.y, G.cellSize, G.boss.id, G.boss.phase,
          G.boss.hp, G.boss.maxHp, G._time);
      }
      // Crusher charge trail
      if (G.boss.id === 0 && G.boss._charging) {
        ctx.strokeStyle = 'rgba(155,89,182,0.3)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(G.boss.x, G.boss.y);
        ctx.lineTo(G.boss._chargeTargetX, G.boss._chargeTargetY);
        ctx.stroke();
      }
      // Weakpoint indicator
      if (G.boss.weakpointExposed) {
        ctx.strokeStyle = COL.gold; ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.arc(G.boss.x, G.boss.y, G.cellSize * 0.8, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    // Draw projectiles
    for (const p of G.projectiles) {
      drawProjectile(ctx, p.x, p.y, p.type, p.angle, G._time);
    }
    // Draw particles
    for (const p of G.particles) {
      const progress = 1 - p.life / p.maxLife;
      drawExplosion(ctx, p.x, p.y, p.size, progress, p.type);
    }
    ctx.restore();
    // HUD
    drawHUD(ctx, w, h, G, L, G.cellSize, G._gridOffY);
    // Bottom panel
    drawBottomPanel(ctx, w, h, G, L, G._panelY, G._panelH, G.unlockedMechas);
    // Overlays
    if (G.state === STATES.WAVE_CLEAR) {
      drawWaveClearOverlay(ctx, w, h, L, G._time, G._introProgress);
    }
    if (G.state === STATES.BOSS_INTRO) {
      drawBossIntro(ctx, w, h, G.zone, G._introProgress, L, G._time);
    }
    if (G.state === STATES.BOSS_CLEAR) {
      ctx.fillStyle = 'rgba(0,10,20,0.5)';
      ctx.fillRect(0, 0, w, h);
      const ts = Math.min(32, w * 0.05);
      ctx.font = `bold ${ts}px 'Segoe UI',system-ui,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = COL.gold;
      ctx.fillText(L.bossDefeated, w/2, h * 0.4);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }
    // DDA indicator
    if (G.ddaLevel > 0) {
      ctx.fillStyle = 'rgba(255,215,0,0.6)';
      ctx.font = `10px 'Segoe UI',system-ui,sans-serif`;
      ctx.textAlign = 'right';
      ctx.fillText(`${L.dda} Lv${G.ddaLevel}`, w - 10, G._gridOffY - 5);
      ctx.textAlign = 'left';
    }
  }
  else if (G.state === STATES.REWARD_SELECT) {
    // Draw game behind
    drawEnvironment(ctx, w, h, G.zone, G.timeOfDay, G.weather, G._time);
    drawGrid(ctx, G._gridOffX, G._gridOffY, G.cols, G.rows, G.cellSize,
      G.grid, null, G._pathCells, -1);
    for (const m of G.mechas) {
      if (!m.active) continue;
      drawMecha(ctx, G._gridOffX + m.col * G.cellSize + G.cellSize/2,
        G._gridOffY + m.row * G.cellSize + G.cellSize/2, G.cellSize, m.type, m.level, G._time);
    }
    drawHUD(ctx, w, h, G, L, G.cellSize, G._gridOffY);
    // Reward overlay
    G._rewardRects = drawRewardSelect(ctx, w, h, G.partChoices, G._selectedReward, L, G._time);
  }
  else if (G.state === STATES.GAMEOVER) {
    drawGameOverScreen(ctx, w, h, G, L, G._time, G._shakeX, G._shakeY);
  }
  else if (G.state === STATES.VICTORY) {
    drawVictoryScreen(ctx, w, h, G, L, G._time);
  }
  else if (G.state === STATES.PAUSED) {
    // Draw game behind
    drawEnvironment(ctx, w, h, G.zone, G.timeOfDay, G.weather, G._time);
    drawGrid(ctx, G._gridOffX, G._gridOffY, G.cols, G.rows, G.cellSize,
      G.grid, null, G._pathCells, -1);
    for (const m of G.mechas) {
      if (!m.active) continue;
      drawMecha(ctx, G._gridOffX + m.col * G.cellSize + G.cellSize/2,
        G._gridOffY + m.row * G.cellSize + G.cellSize/2, G.cellSize, m.type, m.level, G._time);
    }
    drawPauseOverlay(ctx, w, h, L);
  }
  // Transition overlay
  if (G.transAlpha > 0.01) {
    ctx.fillStyle = `rgba(10,10,15,${G.transAlpha})`;
    ctx.fillRect(0, 0, w, h);
  }
  ctx.restore();
  // ── INPUT HANDLING ──
  handleInput(G, L, w, h);
}

// ═══════════════════════════════════════════════════════════════
// REGION 11: EVENT BINDING & INPUT HANDLING & BOOTSTRAP (~200 lines)
// ═══════════════════════════════════════════════════════════════

function handleInput(G, L, w, h) {
  const input = G.input;
  if (!input) return;
  const mx = input.mouseX;
  const my = input.mouseY;
  // Calculate hovered cell
  if (G.state === STATES.PLACEMENT || G.state === STATES.WAVE || G.state === STATES.BOSS_FIGHT) {
    const gc = ((mx - G._gridOffX) / G.cellSize) | 0;
    const gr = ((my - G._gridOffY) / G.cellSize) | 0;
    if (gc >= 0 && gc < G.cols && gr >= 0 && gr < G.rows && my >= G._gridOffY && my < G._gridOffY + G.rows * G.cellSize) {
      G.hoveredCell = gr * G.cols + gc;
    } else {
      G.hoveredCell = null;
    }
  }
  // -- TITLE --
  if (G.state === STATES.TITLE) {
    if (input.consumeClick() || input.consumeTap() || input.consumeKey('Space')) {
      if (G.sound) { G.sound.resume(); G.sound.playSfx('click'); }
      // Check language toggle (top right)
      if (input.hitTest(mx, my, w - 50, 5, 45, 30)) {
        G.lang = G.lang === 'ko' ? 'en' : 'ko';
        return;
      }
      const save = loadSave();
      G.corePoints = save.corePoints;
      G.upgrades = { ...save.upgrades };
      G.totalRuns = save.totalRuns;
      G.consecutiveDeaths = save.consecutiveDeaths;
      G.unlockedMechas = [...save.unlockedMechas];
      G._bestScore = save.bestScore;
      G._bestZone = save.bestZone;
      G.ddaLevel = calcDDALevel(G.consecutiveDeaths);
      if (save.totalRuns > 0) {
        beginTransition(G.state, STATES.HUB, 600);
      } else {
        beginTransition(G.state, STATES.STORY_INTRO, 800);
      }
      if (G.sound) G.sound.startBGM('title');
    }
  }
  // -- STORY INTRO --
  else if (G.state === STATES.STORY_INTRO) {
    if (input.consumeClick() || input.consumeTap() || input.consumeKey('Space')) {
      if (G.sound) G.sound.playSfx('click');
      initRun(G);
      beginTransition(G.state, STATES.ZONE_INTRO, 600);
    }
  }
  // -- ZONE INTRO --
  else if (G.state === STATES.ZONE_INTRO) {
    if (input.consumeClick() || input.consumeTap() || input.consumeKey('Space')) {
      if (G.sound) { G.sound.playSfx('click'); G.sound.startBGM('calm'); }
      beginTransition(G.state, STATES.PLACEMENT, 400);
    }
  }
  // -- HUB --
  else if (G.state === STATES.HUB) {
    if (input.consumeClick() || input.consumeTap()) {
      // Check upgrade buttons
      if (G._hubUpgradeRects) {
        for (const rect of G._hubUpgradeRects) {
          if (rect && rect.canAfford && input.hitTest(mx, my, rect.x, rect.y, rect.w, rect.h)) {
            if (applyUpgrade(rect.branch, G)) {
              if (G.sound) G.sound.playSfx('upgrade');
              savePersistent(G);
            }
            return;
          }
        }
      }
      // Deploy button
      if (G._deployBtnRect && input.hitTest(mx, my, G._deployBtnRect.x, G._deployBtnRect.y,
          G._deployBtnRect.w, G._deployBtnRect.h)) {
        if (G.sound) G.sound.playSfx('click');
        initRun(G);
        beginTransition(G.state, STATES.ZONE_INTRO, 600);
        return;
      }
    }
  }
  // -- PLACEMENT --
  else if (G.state === STATES.PLACEMENT) {
    // Mecha selection (keyboard 1-5)
    for (let i = 0; i < 5; i++) {
      if (input.consumeKey(`Digit${i+1}`)) {
        if (G.unlockedMechas[i]) G.selectedMecha = i;
      }
    }
    // Start wave (Space)
    if (input.consumeKey('Space')) {
      startWave(G);
      return;
    }
    // Pause (Escape)
    if (input.consumeKey('Escape')) {
      G.prevState = G.state;
      G.state = STATES.PAUSED;
      return;
    }
    // Click/tap — check buttons first, then grid
    if (input.consumeClick() || input.consumeTap()) {
      // Bottom panel mecha buttons
      for (let i = 0; i < G._mechaBtnRects.length; i++) {
        const r = G._mechaBtnRects[i];
        if (r && input.hitTest(mx, my, r.x, r.y, r.w, r.h)) {
          if (G.unlockedMechas[i]) {
            G.selectedMecha = i;
            if (G.sound) G.sound.playSfx('click');
          } else if (G.sound) G.sound.playSfx('error');
          return;
        }
      }
      // Control buttons
      for (const r of G._ctrlBtnRects) {
        if (input.hitTest(mx, my, r.x, r.y, r.w, r.h)) {
          if (r.action === 'startWave') startWave(G);
          else if (r.action === 'speed') G.speed = G.speed > 1 ? 1 : CONFIG.FAST_SPEED;
          else if (r.action === 'pause') { G.prevState = G.state; G.state = STATES.PAUSED; }
          return;
        }
      }
      // Grid placement
      if (G.hoveredCell !== null) {
        const r = (G.hoveredCell / G.cols) | 0;
        const c = G.hoveredCell % G.cols;
        if (placeMecha(G, r, c, G.selectedMecha)) {
          if (G.sound) G.sound.playSfx('place');
        } else if (G.sound) G.sound.playSfx('error');
      }
    }
    // Right click / long press — sell
    if (input.consumeRightClick() || input.consumeLongPress()) {
      if (G.hoveredCell !== null) {
        const r = (G.hoveredCell / G.cols) | 0;
        const c = G.hoveredCell % G.cols;
        if (sellMecha(G, r, c)) {
          if (G.sound) G.sound.playSfx('click');
        }
      }
    }
    // Double tap — upgrade
    if (input.consumeDoubleTap()) {
      if (G.hoveredCell !== null) {
        const r = (G.hoveredCell / G.cols) | 0;
        const c = G.hoveredCell % G.cols;
        const existing = G.mechas.find(m => m.row === r && m.col === c && m.active);
        if (existing) {
          if (placeMecha(G, r, c, existing.type)) {
            if (G.sound) G.sound.playSfx('upgrade');
          }
        }
      }
    }
    // Restart
    if (input.consumeKey('KeyR')) {
      initRun(G);
      beginTransition(G.state, STATES.ZONE_INTRO, 400);
    }
  }
  // -- WAVE / BOSS FIGHT --
  else if (G.state === STATES.WAVE || G.state === STATES.BOSS_FIGHT) {
    if (input.consumeKey('Escape')) {
      G.prevState = G.state;
      G.state = STATES.PAUSED;
      return;
    }
    if (input.consumeKey('Space')) {
      G.speed = G.speed > 1 ? 1 : CONFIG.FAST_SPEED;
    }
    // Skill (Q)
    if (input.consumeKey('KeyQ')) {
      // Ultimate skill — damages all visible enemies
      if (G.upgrades.firepower >= 5) {
        for (const e of G.enemies) {
          if (e.alive && e.spawned) {
            applyDamage(e, 50, G);
            addParticle(e.x, e.y, 'hit');
          }
        }
        if (G.boss && G.boss.alive) {
          G.boss.hp -= 100;
          addParticle(G.boss.x, G.boss.y, 'explosion');
        }
        if (G.sound) G.sound.playSfx('railgun');
      }
    }
    // Control buttons (speed/pause)
    if (input.consumeClick() || input.consumeTap()) {
      for (const r of G._ctrlBtnRects) {
        if (input.hitTest(mx, my, r.x, r.y, r.w, r.h)) {
          if (r.action === 'speed') G.speed = G.speed > 1 ? 1 : CONFIG.FAST_SPEED;
          else if (r.action === 'pause') { G.prevState = G.state; G.state = STATES.PAUSED; }
          return;
        }
      }
    }
    if (input.consumeKey('KeyR') && RESTART_ALLOWED.includes(G.state)) {
      initRun(G);
      beginTransition(G.state, STATES.ZONE_INTRO, 400);
    }
  }
  // -- WAVE CLEAR --
  else if (G.state === STATES.WAVE_CLEAR) {
    // Auto-transition via tween, but allow skip
    if (input.consumeClick() || input.consumeTap() || input.consumeKey('Space')) {
      // Skip handled by tween
    }
  }
  // -- REWARD SELECT --
  else if (G.state === STATES.REWARD_SELECT) {
    if (input.consumeClick() || input.consumeTap()) {
      // Check card clicks
      if (G._rewardRects) {
        for (let i = 0; i < G._rewardRects.length; i++) {
          const r = G._rewardRects[i];
          if (input.hitTest(mx, my, r.x, r.y, r.w, r.h)) {
            if (r.isConfirm && G._selectedReward >= 0) {
              // Apply part
              applyPart(G.partChoices[G._selectedReward], G);
              if (G.sound) G.sound.playSfx('reward');
              G._waveDamaged = false;
              beginTransition(G.state, STATES.PLACEMENT, 400);
            } else if (!r.isConfirm) {
              G._selectedReward = i;
              if (G.sound) G.sound.playSfx('click');
            }
            return;
          }
        }
      }
    }
  }
  // -- BOSS INTRO --
  else if (G.state === STATES.BOSS_INTRO) {
    if (G._stateTimer > 2500 || input.consumeClick() || input.consumeTap() || input.consumeKey('Space')) {
      // Start boss fight
      G.boss = createBoss(G.zone, G.cols, G.rows, G.cellSize, G._gridOffX, G._gridOffY, G._baseIdx, G.rng);
      G.enemies = []; G.projectiles = [];
      if (G.sound) G.sound.startBGM('boss');
      beginTransition(G.state, STATES.BOSS_FIGHT, 400);
    }
  }
  // -- BOSS CLEAR --
  else if (G.state === STATES.BOSS_CLEAR) {
    // Auto-transition via tween
  }
  // -- GAMEOVER --
  else if (G.state === STATES.GAMEOVER) {
    if (input.consumeKey('KeyR') || input.consumeTap()) {
      // Check if tapping hub button
      if (G._hubBtnRect && input.hitTest(mx, my, G._hubBtnRect.x, G._hubBtnRect.y,
          G._hubBtnRect.w, G._hubBtnRect.h)) {
        savePersistent(G);
        beginTransition(G.state, STATES.HUB, 600);
        return;
      }
      savePersistent(G);
      initRun(G);
      beginTransition(G.state, STATES.ZONE_INTRO, 600);
    }
    if (input.consumeClick()) {
      if (G._hubBtnRect && input.hitTest(mx, my, G._hubBtnRect.x, G._hubBtnRect.y,
          G._hubBtnRect.w, G._hubBtnRect.h)) {
        savePersistent(G);
        beginTransition(G.state, STATES.HUB, 600);
      } else {
        savePersistent(G);
        initRun(G);
        beginTransition(G.state, STATES.ZONE_INTRO, 600);
      }
    }
  }
  // -- VICTORY --
  else if (G.state === STATES.VICTORY) {
    if (input.consumeKey('KeyR') || input.consumeClick() || input.consumeTap()) {
      G.consecutiveDeaths = 0;
      G.score += CONFIG.SCORE_RUN_CLEAR;
      savePersistent(G);
      beginTransition(G.state, STATES.HUB, 600);
    }
  }
  // -- PAUSED --
  else if (G.state === STATES.PAUSED) {
    if (input.consumeKey('Escape') || input.consumeKey('KeyP') || input.consumeClick() || input.consumeTap()) {
      G.state = G.prevState;
    }
  }
}

// -- Start wave --
function startWave(G) {
  if (G.state !== STATES.PLACEMENT) return;
  G._waveDamaged = false;
  G._waveClearing = false;
  G._killCount = 0;
  // Generate enemies
  G.enemies = spawnWaveEnemies(G.zone, G.wave, G.rng, G.ddaLevel, G._spawnCells, G.cols);
  // Assign paths
  for (const e of G.enemies) {
    if (!e.path) {
      const startIdx = e.gridR * G.cols + e.gridC;
      e.path = findPath(G.grid, G.cols, G.rows, startIdx, G._baseIdx);
      e.pathIdx = 0;
    }
  }
  G.projectiles = [];
  // Generate reward choices for after wave
  G.partChoices = generatePartChoices(G.zone, G.rng, LANG[G.lang]);
  // Filter out capped categories (§7.4 synergy cap)
  G.partChoices = filterCappedChoices(G.partChoices, G);
  // Ensure at least 1 choice remains
  if (G.partChoices.length === 0) {
    G.partChoices = generatePartChoices(G.zone, G.rng, LANG[G.lang]).slice(0, 1);
  }
  G._selectedReward = -1;
  if (G.sound) G.sound.startBGM('battle');
  beginTransition(G.state, STATES.WAVE, 300);
}

// -- Bootstrap --
async function boot() {
  // No assets to preload (F1, F23: all visuals are Canvas procedural)
  // Init systems
  G.tween = new TweenManager();
  G.sound = new SoundManager();
  G.input = new InputManager();
  G.input.init(canvas);
  G.sound.init();
  G.rng = new SeededRNG(42);
  // Load save
  const save = loadSave();
  G.lang = save.lang || 'ko';
  G._bestScore = save.bestScore;
  G._bestZone = save.bestZone;
  // Auto-transition to title
  G.tween.add({ a: 0 }, { a: 1 }, 1000, 'easeOut', () => {
    G.state = STATES.TITLE;
  });
  // Start loop
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

boot();

// ═══════════════════════════════════════════════════════════════
// REGION 12: EXTENDED SYSTEMS — Camera, Environment Detail,
//            Tooltip, Minimap, Advanced Particles (~450 lines)
// ═══════════════════════════════════════════════════════════════

// -- Camera system (§16) --
const Camera = {
  x: 0, y: 0, zoom: 1.0, targetZoom: 1.0, targetX: 0, targetY: 0,
  shakeIntensity: 0, shakeDecay: 0.95,
  // Smooth follow target
  update(dt) {
    this.x += (this.targetX - this.x) * 0.05;
    this.y += (this.targetY - this.y) * 0.05;
    this.zoom += (this.targetZoom - this.zoom) * 0.03;
    if (this.shakeIntensity > 0.1) {
      this.shakeIntensity *= this.shakeDecay;
    } else {
      this.shakeIntensity = 0;
    }
  },
  // Boss entrance zoom
  zoomToBoss(bx, by) {
    this.targetX = bx * 0.15;
    this.targetY = by * 0.15;
    this.targetZoom = 1.15;
  },
  // Reset camera
  reset() {
    this.targetX = 0; this.targetY = 0;
    this.targetZoom = 1.0;
    this.x = 0; this.y = 0; this.zoom = 1.0;
  },
  // Screen shake
  shake(intensity) {
    this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
  }
};

// -- Advanced particle types --
const PARTICLE_COLORS = {
  explosion: [COL.missileOrange, '#FF9800', '#FFC107', '#FFF'],
  hit: [COL.energyCyan, COL.mechaBlue, '#FFF'],
  core_hit: [COL.enemyRed, '#FF5722', '#FFF', COL.enemyRed],
  emp_wave: [COL.energyCyan, '#FFE082'],
  spark: [COL.energyCyan, COL.gold, '#FFF'],
  smoke: ['#555', '#444', '#333', '#222'],
  boss_death: [COL.bossPurple, COL.gold, '#FFF', COL.enemyRed, COL.energyCyan],
  level_up: [COL.gold, '#FFC107', '#FFE082', '#FFF'],
  shield_break: [COL.shieldBar, COL.energyCyan, '#FFF'],
  chain_lightning: [COL.energyCyan, '#FFF', '#80DEEA']
};

// -- Enhanced particle spawner --
function spawnParticlesBurst(x, y, type, count, rng) {
  const colors = PARTICLE_COLORS[type] || PARTICLE_COLORS.explosion;
  for (let i = 0; i < count; i++) {
    const angle = rng ? rng.nextFloat(0, Math.PI * 2) : (Math.PI * 2 * i / count);
    const speed = rng ? rng.nextFloat(30, 120) : (60 + i * 8);
    const color = colors[i % colors.length];
    G.particles.push({
      x, y, type,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: type === 'smoke' ? 800 : type === 'boss_death' ? 1200 : 500,
      maxLife: type === 'smoke' ? 800 : type === 'boss_death' ? 1200 : 500,
      size: type === 'emp_wave' ? 80 : type === 'boss_death' ? 6 : 3,
      color
    });
  }
}

// -- Draw enhanced particles with colors --
function drawParticleAdvanced(ctx, p) {
  const progress = 1 - p.life / p.maxLife;
  const alpha = Math.max(0, 1 - progress * 1.2);
  ctx.globalAlpha = alpha;
  if (p.type === 'emp_wave') {
    ctx.strokeStyle = p.color || COL.energyCyan;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * progress, 0, Math.PI * 2);
    ctx.stroke();
  } else if (p.type === 'smoke') {
    ctx.fillStyle = p.color || '#444';
    const s = p.size * (1 + progress * 2);
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'chain_lightning') {
    ctx.strokeStyle = p.color || COL.energyCyan;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + p.vx * 0.3, p.y + p.vy * 0.3);
    ctx.stroke();
  } else {
    ctx.fillStyle = p.color || COL.missileOrange;
    const s = p.size * (1 - progress * 0.5);
    ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

// -- Mecha info tooltip --
function drawMechaTooltip(ctx, x, y, mechaType, level, L, G) {
  const base = CONFIG.MECHA[mechaType];
  const w = 160;
  const h = 100;
  const tx = Math.min(x, G._canvasW - w - 10);
  const ty = Math.max(y - h - 10, 5);
  // Background
  ctx.fillStyle = 'rgba(10,10,20,0.95)';
  ctx.fillRect(tx, ty, w, h);
  ctx.strokeStyle = COL.energyCyan;
  ctx.lineWidth = 1;
  ctx.strokeRect(tx, ty, w, h);
  // Content
  ctx.fillStyle = COL.uiWhite;
  ctx.font = `bold 12px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const names = [L.mecha_1, L.mecha_2, L.mecha_3, L.mecha_4, L.mecha_5];
  ctx.fillText(names[mechaType] || base.name, tx + 8, ty + 6);
  ctx.fillStyle = COL.gold;
  ctx.font = `10px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`Lv.${level + 1}`, tx + w - 35, ty + 8);
  ctx.fillStyle = '#aaa';
  ctx.font = `11px 'Segoe UI',system-ui,sans-serif`;
  const atkVal = (base.atk * CONFIG.LEVEL_ATK_MULT[level]) | 0;
  const cdVal = (base.cd * CONFIG.LEVEL_CD_MULT[level] / 1000).toFixed(1);
  ctx.fillText(`${L.atk}: ${atkVal}`, tx + 8, ty + 28);
  ctx.fillText(`${L.range}: ${base.range}`, tx + 8, ty + 44);
  ctx.fillText(`${L.speed}: ${cdVal}s`, tx + 8, ty + 60);
  ctx.fillText(`${L.cost}: ${base.cost}E`, tx + 8, ty + 76);
  ctx.textBaseline = 'alphabetic';
}

// -- Draw minimap --
function drawMinimap(ctx, x, y, w, h, G) {
  ctx.fillStyle = 'rgba(10,10,20,0.8)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(100,100,140,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  const cellW = w / G.cols;
  const cellH = h / G.rows;
  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      const idx = r * G.cols + c;
      const cx = x + c * cellW;
      const cy = y + r * cellH;
      if (G.grid[idx] === 2) {
        ctx.fillStyle = 'rgba(60,60,80,0.8)';
        ctx.fillRect(cx, cy, cellW, cellH);
      } else if (G.grid[idx] === 1) {
        ctx.fillStyle = COL.mechaBlue;
        ctx.fillRect(cx, cy, cellW, cellH);
      } else if (G.grid[idx] === 3) {
        ctx.fillStyle = 'rgba(229,57,53,0.5)';
        ctx.fillRect(cx, cy, cellW, cellH);
      } else if (G.grid[idx] === 4) {
        ctx.fillStyle = COL.energyCyan;
        ctx.fillRect(cx, cy, cellW, cellH);
      }
    }
  }
  // Enemy dots
  for (const e of G.enemies) {
    if (!e.alive || !e.spawned) continue;
    const ex = x + (e.x - G._gridOffX) / G.cellSize * cellW;
    const ey = y + (e.y - G._gridOffY) / G.cellSize * cellH;
    ctx.fillStyle = COL.enemyRed;
    ctx.fillRect(ex - 1, ey - 1, 2, 2);
  }
  // Boss dot
  if (G.boss && G.boss.alive) {
    const bxm = x + (G.boss.x - G._gridOffX) / G.cellSize * cellW;
    const bym = y + (G.boss.y - G._gridOffY) / G.cellSize * cellH;
    ctx.fillStyle = COL.bossPurple;
    ctx.fillRect(bxm - 2, bym - 2, 4, 4);
  }
}

// -- Environmental detail: animated background objects --
function drawZoneDetails(ctx, w, h, zone, time) {
  // Zone 0: City — building silhouettes and fire
  if (zone === 0) {
    ctx.fillStyle = 'rgba(20,20,30,0.3)';
    // Buildings
    const buildings = [
      { x: w*0.05, w: w*0.06, h: h*0.25 },
      { x: w*0.15, w: w*0.05, h: h*0.35 },
      { x: w*0.25, w: w*0.07, h: h*0.20 },
      { x: w*0.75, w: w*0.06, h: h*0.30 },
      { x: w*0.85, w: w*0.05, h: h*0.22 },
      { x: w*0.92, w: w*0.04, h: h*0.28 }
    ];
    buildings.forEach(b => {
      ctx.fillRect(b.x, h * 0.02, b.w, b.h);
      // Flickering fire on some buildings
      if (Math.sin(time * 3 + b.x) > 0.5) {
        ctx.fillStyle = 'rgba(255,100,30,0.06)';
        ctx.fillRect(b.x, h * 0.02, b.w, b.h * 0.3);
        ctx.fillStyle = 'rgba(20,20,30,0.3)';
      }
    });
    // Smoke columns
    for (let i = 0; i < 4; i++) {
      const sx = w * 0.1 + i * w * 0.25;
      const sy = h * 0.05 + Math.sin(time * 0.5 + i * 2) * 10;
      ctx.fillStyle = 'rgba(80,80,100,0.04)';
      ctx.beginPath();
      ctx.arc(sx, sy, 15 + Math.sin(time + i) * 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sx + 5, sy - 15, 10 + Math.sin(time * 0.7 + i) * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Zone 1: Industrial — steam pipes and gears
  else if (zone === 1) {
    // Rotating gears
    for (let i = 0; i < 4; i++) {
      const gx = w * (0.1 + i * 0.25);
      const gy = h * 0.06;
      const radius = 18 + i * 3;
      ctx.save();
      ctx.translate(gx, gy);
      ctx.rotate(time * (i % 2 === 0 ? 0.5 : -0.5));
      ctx.strokeStyle = 'rgba(100,100,120,0.08)';
      ctx.lineWidth = 2;
      // Gear teeth
      for (let t = 0; t < 8; t++) {
        const a = Math.PI * 2 / 8 * t;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * radius, Math.sin(a) * radius);
        ctx.lineTo(Math.cos(a) * (radius + 5), Math.sin(a) * (radius + 5));
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // Steam bursts
    for (let i = 0; i < 3; i++) {
      const steamPhase = (time * 2 + i * 1.5) % 4;
      if (steamPhase < 1) {
        const sx = w * (0.2 + i * 0.3);
        const alpha = 0.03 * (1 - steamPhase);
        ctx.fillStyle = `rgba(200,200,220,${alpha})`;
        ctx.beginPath();
        ctx.arc(sx, h * 0.12, 8 + steamPhase * 20, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  // Zone 2: Energy — pulsing pipeline network
  else if (zone === 2) {
    const pulseAlpha = 0.03 + Math.sin(time * 4) * 0.02;
    ctx.strokeStyle = `rgba(0,229,255,${pulseAlpha})`;
    ctx.lineWidth = 2;
    // Horizontal pipes
    for (let i = 0; i < 4; i++) {
      const py = h * (0.03 + i * 0.05);
      ctx.beginPath();
      ctx.moveTo(0, py);
      ctx.lineTo(w, py);
      ctx.stroke();
    }
    // Vertical connectors
    for (let i = 0; i < 6; i++) {
      const px = w * (0.1 + i * 0.16);
      ctx.beginPath();
      ctx.moveTo(px, h * 0.03);
      ctx.lineTo(px, h * 0.18);
      ctx.stroke();
    }
    // Energy nodes (pulsing circles at intersections)
    for (let i = 0; i < 6; i++) {
      for (let j = 0; j < 4; j++) {
        if ((i + j) % 3 !== 0) continue;
        const nx = w * (0.1 + i * 0.16);
        const ny = h * (0.03 + j * 0.05);
        const nAlpha = 0.05 + Math.sin(time * 3 + i + j) * 0.03;
        ctx.fillStyle = `rgba(0,229,255,${nAlpha})`;
        ctx.beginPath();
        ctx.arc(nx, ny, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Electric arc effect
    ctx.strokeStyle = `rgba(0,229,255,${0.02 + Math.sin(time * 12) * 0.02})`;
    ctx.lineWidth = 1;
    for (let a = 0; a < 2; a++) {
      ctx.beginPath();
      const startX = w * (0.2 + a * 0.5);
      let arcY = h * 0.1;
      ctx.moveTo(startX, arcY);
      for (let px = 0; px < w * 0.3; px += 8) {
        arcY = h * 0.1 + Math.sin((startX + px) * 0.1 + time * 8) * 4;
        ctx.lineTo(startX + px, arcY);
      }
      ctx.stroke();
    }
  }
  // Zone 3: Bunker — emergency lights, cracks
  else if (zone === 3) {
    // Emergency light sweep
    const sweepAngle = time * 1.5;
    const lightX = w * 0.5 + Math.cos(sweepAngle) * w * 0.3;
    const lightAlpha = 0.03 + Math.sin(time * 6) * 0.015;
    const grad = ctx.createRadialGradient(lightX, h * 0.02, 0, lightX, h * 0.02, 80);
    grad.addColorStop(0, `rgba(229,57,53,${lightAlpha})`);
    grad.addColorStop(1, 'rgba(229,57,53,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h * 0.2);
    // Wall cracks
    ctx.strokeStyle = 'rgba(60,60,70,0.15)';
    ctx.lineWidth = 1;
    const cracks = [
      [w*0.1, 0, w*0.12, h*0.08, w*0.15, h*0.04],
      [w*0.7, 0, w*0.72, h*0.06, w*0.68, h*0.1],
      [w*0.45, 0, w*0.47, h*0.05, w*0.44, h*0.09, w*0.46, h*0.12]
    ];
    cracks.forEach(pts => {
      ctx.beginPath();
      ctx.moveTo(pts[0], pts[1]);
      for (let i = 2; i < pts.length; i += 2) {
        ctx.lineTo(pts[i], pts[i+1]);
      }
      ctx.stroke();
    });
  }
  // Zone 4: Command — holographic tactical display
  else if (zone === 4) {
    // Holographic grid
    ctx.strokeStyle = 'rgba(255,215,0,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 15; i++) {
      const ly = h * 0.02 + i * h * 0.012;
      ctx.beginPath();
      ctx.moveTo(w * 0.1, ly);
      ctx.lineTo(w * 0.9, ly);
      ctx.stroke();
    }
    for (let i = 0; i < 20; i++) {
      const lx = w * 0.1 + i * w * 0.04;
      ctx.beginPath();
      ctx.moveTo(lx, h * 0.02);
      ctx.lineTo(lx, h * 0.2);
      ctx.stroke();
    }
    // Scanning line
    const scanY = h * 0.02 + ((time * 30) % (h * 0.18));
    ctx.strokeStyle = 'rgba(255,215,0,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w * 0.1, scanY);
    ctx.lineTo(w * 0.9, scanY);
    ctx.stroke();
    // Status indicators (small blinking dots)
    for (let i = 0; i < 8; i++) {
      const dx = w * (0.12 + i * 0.1);
      const dy = h * 0.04;
      const on = Math.sin(time * 2 + i * 0.7) > 0;
      if (on) {
        ctx.fillStyle = i < 5 ? 'rgba(0,255,135,0.12)' : 'rgba(229,57,53,0.12)';
        ctx.fillRect(dx - 2, dy - 2, 4, 4);
      }
    }
    // Golden beam from center
    const beamAlpha = 0.02 + Math.sin(time * 2) * 0.01;
    const beamGrad = ctx.createRadialGradient(w/2, h * 0.1, 0, w/2, h * 0.1, 60);
    beamGrad.addColorStop(0, `rgba(255,215,0,${beamAlpha})`);
    beamGrad.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = beamGrad;
    ctx.fillRect(w * 0.3, 0, w * 0.4, h * 0.2);
  }
}

// -- Draw selection info panel (shown during PLACEMENT) --
function drawSelectionInfo(ctx, x, y, G, L) {
  if (G.state !== STATES.PLACEMENT) return;
  const mType = G.selectedMecha;
  const base = CONFIG.MECHA[mType];
  if (!base) return;
  const panelW = 130;
  const panelH = 80;
  // Background
  ctx.fillStyle = 'rgba(10,10,20,0.9)';
  ctx.fillRect(x, y, panelW, panelH);
  ctx.strokeStyle = 'rgba(0,229,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, panelW, panelH);
  // Mecha name
  const names = [L.mecha_1, L.mecha_2, L.mecha_3, L.mecha_4, L.mecha_5];
  ctx.fillStyle = COL.energyCyan;
  ctx.font = `bold 11px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(names[mType], x + 6, y + 4);
  // Stats
  ctx.fillStyle = '#aaa';
  ctx.font = `10px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`${L.atk}: ${base.atk}  ${L.range}: ${base.range}`, x + 6, y + 22);
  ctx.fillText(`${L.speed}: ${(base.cd / 1000).toFixed(1)}s`, x + 6, y + 38);
  ctx.fillStyle = COL.gold;
  ctx.fillText(`${L.cost}: ${base.cost}E`, x + 6, y + 54);
  ctx.textBaseline = 'alphabetic';
}

// -- Draw run summary (shown at gameover/victory) --
function drawRunSummary(ctx, x, y, w, h, G, L) {
  ctx.fillStyle = 'rgba(10,10,20,0.95)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(100,100,140,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.gold;
  ctx.font = `bold 14px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(L.runSummary, x + w/2, y + 18);
  ctx.fillStyle = '#aaa';
  ctx.font = `12px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`${L.zone}: ${G.zone + 1}`, x + w/2, y + 40);
  ctx.fillText(`${L.killCount}: ${G._killCount || 0}`, x + w/2, y + 58);
  ctx.fillText(`${L.partsCollected}: ${G.parts.length}`, x + w/2, y + 76);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// -- Mecha shield aura rendering --
function drawShieldAuras(ctx, mechas, cellSize, gridOffX, gridOffY, time) {
  for (const m of mechas) {
    if (!m.active || m.type !== 2) continue;
    const mx = gridOffX + m.col * cellSize + cellSize/2;
    const my = gridOffY + m.row * cellSize + cellSize/2;
    const range = m.range * cellSize;
    const alpha = 0.06 + Math.sin(time * 2) * 0.03;
    ctx.strokeStyle = `rgba(33,150,243,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mx, my, range, 0, Math.PI * 2);
    ctx.stroke();
    // Shield effect on nearby mechas
    for (const m2 of mechas) {
      if (m2 === m || !m2.active || m2.type === 2) continue;
      const dx = (m2.col - m.col) * cellSize;
      const dy = (m2.row - m.row) * cellSize;
      if (Math.sqrt(dx*dx + dy*dy) <= range) {
        const m2x = gridOffX + m2.col * cellSize + cellSize/2;
        const m2y = gridOffY + m2.row * cellSize + cellSize/2;
        ctx.fillStyle = `rgba(33,150,243,${alpha * 0.5})`;
        ctx.beginPath();
        ctx.arc(m2x, m2y, cellSize * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// -- Loading screen with progress bar --
function drawLoadingScreen(ctx, w, h, progress, L) {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);
  // Mecha silhouette
  ctx.fillStyle = 'rgba(74,144,217,0.1)';
  ctx.font = `bold ${Math.min(80, w*0.15)}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⬡', w/2, h * 0.35);
  // Loading text
  ctx.fillStyle = COL.uiWhite;
  ctx.font = `14px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(L.loading, w/2, h * 0.55);
  // Progress bar
  const barW = Math.min(200, w * 0.5);
  const barH = 4;
  const barX = (w - barW) / 2;
  const barY = h * 0.6;
  ctx.fillStyle = 'rgba(40,40,60,0.5)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = COL.energyCyan;
  ctx.fillRect(barX, barY, barW * progress, barH);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// -- Grid cell info on hover (during placement) --
function drawCellInfo(ctx, hoverIdx, G, L) {
  if (hoverIdx === null || G.state !== STATES.PLACEMENT) return;
  const cell = G.grid[hoverIdx];
  const r = (hoverIdx / G.cols) | 0;
  const c = hoverIdx % G.cols;
  const mx = G._gridOffX + c * G.cellSize;
  const my = G._gridOffY + r * G.cellSize;
  // Check for existing mecha
  const existing = G.mechas.find(m => m.row === r && m.col === c && m.active);
  if (existing) {
    drawMechaTooltip(ctx, mx, my, existing.type, existing.level, L, G);
  }
}

// -- Wave countdown display --
function drawWaveCountdown(ctx, w, h, waveNum, maxWave, zone, L) {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,229,255,0.7)';
  ctx.font = `bold 11px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`${L.wave} ${waveNum + 1}/${maxWave}`, w / 2, 14);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// -- Star field background effect for title/victory --
function drawStarfield(ctx, w, h, time) {
  for (let i = 0; i < 50; i++) {
    // Deterministic star positions using sine
    const sx = (w * (0.5 + Math.sin(i * 7.13) * 0.5));
    const sy = (h * (0.5 + Math.cos(i * 11.37) * 0.5));
    const brightness = 0.2 + Math.sin(time * 0.5 + i * 2.1) * 0.15;
    const size = 0.5 + Math.sin(i * 3.7) * 0.5;
    ctx.fillStyle = `rgba(200,200,240,${brightness})`;
    ctx.fillRect(sx, sy, size, size);
  }
}

// -- Integrate extended drawing into main render --
// We hook into the existing render by replacing addParticle
const _origAddParticle = G._addParticle;
G._addParticle = function(x, y, type) {
  // Use enhanced particles when possible
  if (G.rng && PARTICLE_COLORS[type]) {
    spawnParticlesBurst(x, y, type, type === 'boss_death' ? 20 : type === 'explosion' ? 10 : 6, G.rng);
  } else {
    _origAddParticle(x, y, type);
  }
};
