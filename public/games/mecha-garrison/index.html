// -- SeededRNG (F18: Math.random 0건) --
class SeededRNG {
  constructor(seed) { this.s = seed || 12345; }
  next() { this.s = (this.s * 16807 + 0) % 2147483647; return (this.s - 1) / 2147483646; }
  nextInt(min, max) { return min + ((this.next() * (max - min + 1)) | 0); }
  nextFloat(min, max) { return min + this.next() * (max - min); }
  pick(arr) { return arr[(this.next() * arr.length) | 0]; }
  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (this.next() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

// -- TweenManager (F4, F13, F14) --
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; this._updating = false; }
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeInOut', onComplete };
    for (const k in props) t.props[k] = { from: obj[k], to: props[k] };
    if (this._updating) this._toAdd.push(t);
    else this._tweens.push(t);
    return t;
  }
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      let p = Math.min(t.elapsed / t.dur, 1);
      const ep = this._ease(p, t.ease);
      for (const k in t.props) {
        t.obj[k] = t.props[k].from + (t.props[k].to - t.props[k].from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
    this._updating = false;
    if (this._toAdd.length) {
      this._tweens.push(...this._toAdd);
      this._toAdd.length = 0;
    }
  }
  // clearImmediate: F13 — 즉시 정리 (cancelAll 경쟁 조건 방지)
  clearImmediate() { this._tweens.length = 0; this._toAdd.length = 0; }
  cancel(tw) {
    let idx = this._tweens.indexOf(tw);
    if (idx >= 0) this._tweens.splice(idx, 1);
    idx = this._toAdd.indexOf(tw);
    if (idx >= 0) this._toAdd.splice(idx, 1);
  }
  _ease(t, type) {
    if (type === 'linear') return t;
    if (type === 'easeIn') return t * t;
    if (type === 'easeOut') return t * (2 - t);
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // easeInOut
  }
}

// -- ObjectPool --
class ObjectPool {
  constructor(factory, reset) { this._pool = []; this._factory = factory; this._reset = reset; }
  get() {
    const obj = this._pool.length ? this._pool.pop() : this._factory();
    if (this._reset) this._reset(obj);
    return obj;
  }
  release(obj) { this._pool.push(obj); }
  clear() { this._pool.length = 0; }
}

// -- SoundManager (F19, Web Audio API procedural) --
class SoundManager {
  constructor() {
    this.ctx = null; this.master = null; this.bgmGain = null;
    this.sfxGain = null; this.muted = false; this._bgmOsc = [];
    this._bgmTimer = 0; this._bgmBpm = 120; this._bgmKey = '';
  }
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain(); this.master.gain.value = 0.3;
      this.master.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = 0.15;
      this.bgmGain.connect(this.master);
      this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = 0.5;
      this.sfxGain.connect(this.master);
    } catch(e) { /* audio not available */ }
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  // Single update path for BPM (F14)
  setBPM(bpm) { this._bgmBpm = bpm; }
  playSfx(type) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    gain.connect(this.sfxGain);
    osc.connect(gain);
    const sfxDefs = {
      place:    { wave:'square', f:440, f2:880, dur:0.15 },
      shoot:    { wave:'sawtooth', f:660, f2:660, dur:0.1 },
      missile:  { wave:'sawtooth', f:220, f2:330, dur:0.3 },
      explosion:{ wave:'sawtooth', f:100, f2:20, dur:0.4 },
      shield:   { wave:'sine', f:880, f2:1320, dur:0.2 },
      emp:      { wave:'square', f:110, f2:55, dur:0.3 },
      railgun:  { wave:'sawtooth', f:1760, f2:440, dur:0.5 },
      hit:      { wave:'square', f:330, f2:200, dur:0.08 },
      bossAlarm:{ wave:'square', f:220, f2:220, dur:1.0 },
      coreHit:  { wave:'sine', f:110, f2:80, dur:0.3 },
      reward:   { wave:'sine', f:660, f2:1320, dur:0.2 },
      upgrade:  { wave:'sine', f:523, f2:1046, dur:0.4 },
      click:    { wave:'sine', f:600, f2:800, dur:0.05 },
      error:    { wave:'square', f:200, f2:100, dur:0.15 },
      victory:  { wave:'sine', f:523, f2:1046, dur:0.6 }
    };
    const d = sfxDefs[type] || sfxDefs.click;
    osc.type = d.wave;
    osc.frequency.setValueAtTime(d.f, t);
    osc.frequency.linearRampToValueAtTime(d.f2, t + d.dur);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.linearRampToValueAtTime(0, t + d.dur);
    osc.start(t);
    osc.stop(t + d.dur + 0.05);
  }
  startBGM(key) {
    if (!this.ctx || this._bgmKey === key) return;
    this.stopBGM();
    this._bgmKey = key;
    // Simple procedural BGM loop using oscillators
    const bgmDefs = {
      title:  { bpm:90,  notes:[261,293,329,349,392], wave:'sine' },
      calm:   { bpm:100, notes:[220,261,293,329,349], wave:'sine' },
      battle: { bpm:140, notes:[329,392,440,493,523], wave:'sawtooth' },
      boss:   { bpm:160, notes:[293,349,392,440,523], wave:'square' },
      victory:{ bpm:120, notes:[523,659,783,523,659], wave:'sine' },
      gameover:{ bpm:80, notes:[220,196,174,164],      wave:'sine' }
    };
    const d = bgmDefs[key] || bgmDefs.calm;
    this._bgmBpm = d.bpm;
    this._scheduleBGM(d);
  }
  _scheduleBGM(def) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const beatDur = 60 / this._bgmBpm;
    for (let i = 0; i < 8; i++) {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      gain.connect(this.bgmGain);
      osc.connect(gain);
      osc.type = def.wave;
      const note = def.notes[i % def.notes.length];
      osc.frequency.value = note;
      const start = t + i * beatDur;
      gain.gain.setValueAtTime(0.15, start);
      gain.gain.linearRampToValueAtTime(0, start + beatDur * 0.8);
      osc.start(start);
      osc.stop(start + beatDur);
      this._bgmOsc.push(osc);
    }
    this._bgmTimer = 8 * beatDur * 1000;
  }
  stopBGM() {
    this._bgmOsc.forEach(o => { try { o.stop(); } catch(e){} });
    this._bgmOsc = []; this._bgmKey = '';
  }
  update(dt) {
    if (!this.ctx || !this._bgmKey) return;
    this._bgmTimer -= dt;
    if (this._bgmTimer <= 0) {
      const bgmDefs = {
        title:{ bpm:90, notes:[261,293,329,349,392], wave:'sine' },
        calm:{ bpm:100, notes:[220,261,293,329,349], wave:'sine' },
        battle:{ bpm:140, notes:[329,392,440,493,523], wave:'sawtooth' },
        boss:{ bpm:160, notes:[293,349,392,440,523], wave:'square' },
        victory:{ bpm:120, notes:[523,659,783,523,659], wave:'sine' },
        gameover:{ bpm:80, notes:[220,196,174,164], wave:'sine' }
      };
      this._scheduleBGM(bgmDefs[this._bgmKey] || bgmDefs.calm);
    }
  }
  toggle() { this.muted = !this.muted; if (this.master) this.master.gain.value = this.muted ? 0 : 0.3; }
}

// -- InputManager (F16: hitTest single function) --
class InputManager {
  constructor() {
    this.keys = {};
    this.mouseX = 0; this.mouseY = 0;
    this.clicked = false; this.rightClicked = false;
    this.tapped = false; this.doubleTapped = false;
    this.longPressed = false;
    this._touchStart = 0; this._tapCount = 0; this._tapTimer = 0;
    this._touchId = null; this._longPressTimer = null;
    this._touchStartX = 0; this._touchStartY = 0;
    this._preventedKeys = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
      'KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyQ','Digit1','Digit2',
      'Digit3','Digit4','Digit5','Escape','KeyE','KeyL'];
  }
  init(canvas) {
    this._canvas = canvas;
    // Keyboard
    window.addEventListener('keydown', e => {
      if (this._preventedKeys.includes(e.code)) e.preventDefault();
      this.keys[e.code] = true;
    });
    window.addEventListener('keyup', e => {
      this.keys[e.code] = false;
    });
    // Mouse
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      this.mouseX = (e.clientX - r.left) * (canvas.width / r.width);
      this.mouseY = (e.clientY - r.top) * (canvas.height / r.height);
    });
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) this.clicked = true;
      if (e.button === 2) { this.rightClicked = true; e.preventDefault(); }
      const r = canvas.getBoundingClientRect();
      this.mouseX = (e.clientX - r.left) * (canvas.width / r.width);
      this.mouseY = (e.clientY - r.top) * (canvas.height / r.height);
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    // Touch
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const r = canvas.getBoundingClientRect();
      this.mouseX = (touch.clientX - r.left) * (canvas.width / r.width);
      this.mouseY = (touch.clientY - r.top) * (canvas.height / r.height);
      this._touchStartX = this.mouseX;
      this._touchStartY = this.mouseY;
      this._touchStart = performance.now();
      this._touchId = touch.identifier;
      // Long press detection
      this._longPressTimer = performance.now();
      this.tapped = true;
      // Double tap detection
      this._tapCount++;
      if (this._tapCount === 2 && performance.now() - this._tapTimer < 400) {
        this.doubleTapped = true;
        this._tapCount = 0;
      } else if (this._tapCount === 1) {
        this._tapTimer = performance.now();
      }
      if (this._tapCount > 2) this._tapCount = 0;
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const r = canvas.getBoundingClientRect();
      this.mouseX = (touch.clientX - r.left) * (canvas.width / r.width);
      this.mouseY = (touch.clientY - r.top) * (canvas.height / r.height);
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const elapsed = performance.now() - this._touchStart;
      if (elapsed > 500) this.longPressed = true;
      this._touchId = null;
    }, { passive: false });
  }
  // hitTest single function (F16, F26)
  hitTest(x, y, rx, ry, rw, rh) {
    return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
  }
  consumeClick() { const c = this.clicked; this.clicked = false; return c; }
  consumeRightClick() { const c = this.rightClicked; this.rightClicked = false; return c; }
  consumeTap() { const c = this.tapped; this.tapped = false; return c; }
  consumeDoubleTap() { const c = this.doubleTapped; this.doubleTapped = false; return c; }
  consumeLongPress() { const c = this.longPressed; this.longPressed = false; return c; }
  consumeKey(code) { const v = this.keys[code]; this.keys[code] = false; return v; }
}

// -- Draw mecha unit (F9: pure function) --
function drawMecha(ctx, x, y, size, type, level, time) {
  const colors = [COL.mechaBlue, COL.missileOrange, COL.energyCyan, '#FFE082', '#E040FB'];
  const c = colors[type] || COL.mechaBlue;
  const pulse = Math.sin(time * 3) * 0.1 + 0.9;
  const s = size * 0.8;
  {
    ctx.save();
    ctx.translate(x, y);
    // Base body
    ctx.fillStyle = c;
    ctx.globalAlpha = pulse;
    if (type === 0) { // Blaster — triangular
      ctx.beginPath();
      ctx.moveTo(0, -s*0.4);
      ctx.lineTo(s*0.35, s*0.3);
      ctx.lineTo(-s*0.35, s*0.3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = COL.energyCyan; ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (type === 1) { // Missile — square with notch
      ctx.fillRect(-s*0.35, -s*0.35, s*0.7, s*0.7);
      ctx.fillStyle = COL.missileOrange;
      ctx.fillRect(-s*0.15, -s*0.5, s*0.3, s*0.2);
      ctx.strokeStyle = '#FF9800'; ctx.lineWidth = 1.5;
      ctx.strokeRect(-s*0.35, -s*0.35, s*0.7, s*0.7);
    } else if (type === 2) { // Shield — hexagonal
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = Math.cos(a) * s * 0.4;
        const py = Math.sin(a) * s * 0.4;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = COL.energyCyan; ctx.lineWidth = 2;
      ctx.stroke();
      // Shield aura
      ctx.globalAlpha = 0.15 * pulse;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = COL.energyCyan;
      ctx.fill();
    } else if (type === 3) { // EMP — diamond
      ctx.beginPath();
      ctx.moveTo(0, -s*0.45); ctx.lineTo(s*0.35, 0);
      ctx.lineTo(0, s*0.45); ctx.lineTo(-s*0.35, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#FFE082'; ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (type === 4) { // Railgun — long rectangle
      ctx.fillRect(-s*0.15, -s*0.5, s*0.3, s*1.0);
      ctx.fillStyle = '#E040FB';
      ctx.fillRect(-s*0.25, -s*0.2, s*0.5, s*0.15);
      ctx.strokeStyle = '#CE93D8'; ctx.lineWidth = 1.5;
      ctx.strokeRect(-s*0.15, -s*0.5, s*0.3, s*1.0);
    }
    ctx.globalAlpha = 1;
    // Level indicator
    if (level > 0) {
      ctx.fillStyle = COL.gold;
      ctx.font = `bold ${s*0.25}px 'Segoe UI',system-ui,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('★'.repeat(level + 1), 0, s * 0.55);
    }
    // Core glow
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = COL.energyCyan;
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(time * 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// -- Draw enemy unit (F9) --
function drawEnemy(ctx, x, y, size, type, hp, maxHp, status, time) {
  const s = size * 0.7;
  const hpRatio = hp / maxHp;
  {
    ctx.save();
    ctx.translate(x, y);
    // Enemy body — different shapes per type
    const enemyColors = [COL.enemyRed, '#B71C1C', '#FF5722', '#F44336', '#D32F2F', '#C62828', '#9C27B0'];
    ctx.fillStyle = enemyColors[type % enemyColors.length];
    if (type === 0) { // Drone — small diamond
      ctx.beginPath();
      ctx.moveTo(0, -s*0.3); ctx.lineTo(s*0.25, 0);
      ctx.lineTo(0, s*0.3); ctx.lineTo(-s*0.25, 0);
      ctx.closePath(); ctx.fill();
    } else if (type === 1) { // Tank — large square with cross mark + thick border
      const ts = s * 0.45;
      ctx.fillRect(-ts, -ts, ts*2, ts*2);
      ctx.strokeStyle = '#B71C1C'; ctx.lineWidth = 3;
      ctx.strokeRect(-ts, -ts, ts*2, ts*2);
      // Cross mark for visual distinction
      ctx.strokeStyle = '#FF5252'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-ts*0.5, -ts*0.5); ctx.lineTo(ts*0.5, ts*0.5);
      ctx.moveTo(ts*0.5, -ts*0.5); ctx.lineTo(-ts*0.5, ts*0.5);
      ctx.stroke();
    } else if (type === 2) { // Speeder — small triangle
      ctx.beginPath();
      ctx.moveTo(s*0.35, 0); ctx.lineTo(-s*0.25, -s*0.3); ctx.lineTo(-s*0.25, s*0.3);
      ctx.closePath(); ctx.fill();
    } else if (type === 3) { // Shieldbot — circle
      ctx.beginPath(); ctx.arc(0, 0, s*0.35, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = COL.shieldBar; ctx.lineWidth = 2; ctx.stroke();
    } else if (type === 4) { // Bomber — star shape
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = Math.PI * 2 / 5 * i - Math.PI / 2;
        const px = Math.cos(a) * s * 0.35;
        const py = Math.sin(a) * s * 0.35;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
    } else if (type === 5) { // Helix — diamond (flying)
      ctx.beginPath();
      ctx.moveTo(0, -s*0.4); ctx.lineTo(s*0.3, 0);
      ctx.lineTo(0, s*0.4); ctx.lineTo(-s*0.3, 0);
      ctx.closePath(); ctx.fill();
      // Wings
      ctx.globalAlpha = 0.4;
      ctx.fillRect(-s*0.5, -s*0.05, s*1.0, s*0.1);
      ctx.globalAlpha = 1;
    } else { // Hacker
      ctx.fillRect(-s*0.3, -s*0.3, s*0.6, s*0.6);
      ctx.fillStyle = '#9C27B0';
      ctx.fillRect(-s*0.15, -s*0.15, s*0.3, s*0.3);
    }
    // Red eye/core
    ctx.beginPath(); ctx.arc(0, -s*0.05, s*0.08, 0, Math.PI*2);
    ctx.fillStyle = '#FF1744'; ctx.fill();
    // Status effects
    if (status === 'stunned') {
      ctx.strokeStyle = '#FFE082'; ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.arc(0, 0, s*0.45, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
  // HP bar
  if (hpRatio < 1) {
    const barW = size * 0.6;
    const barH = 3;
    ctx.fillStyle = '#333'; ctx.fillRect(x - barW/2, y - size*0.45, barW, barH);
    ctx.fillStyle = hpRatio > 0.3 ? COL.hpBar : COL.hpBarLow;
    ctx.fillRect(x - barW/2, y - size*0.45, barW * hpRatio, barH);
  }
}

// -- Draw boss (F9) --
function drawBoss(ctx, x, y, size, bossId, phase, hp, maxHp, time) {
  const s = size * 1.5;
  const pulse = Math.sin(time * 2) * 0.1 + 0.9;
  ctx.save();
  ctx.translate(x, y);
  // Boss body
  ctx.fillStyle = COL.bossPurple;
  ctx.globalAlpha = pulse;
  // All bosses share general shape with unique decorations
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = COL.enemyRed; ctx.lineWidth = 3;
  ctx.stroke();
  // Inner core
  ctx.beginPath(); ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = COL.enemyRed; ctx.fill();
  // Boss-specific decorations
  if (bossId === 0) { // Crusher — horns
    ctx.fillStyle = COL.bossPurple;
    ctx.fillRect(-s*0.5, -s*0.45, s*0.15, s*0.3);
    ctx.fillRect(s*0.35, -s*0.45, s*0.15, s*0.3);
  } else if (bossId === 1) { // ShieldMother — outer ring
    ctx.strokeStyle = COL.shieldBar; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, s*0.55, 0, Math.PI*2); ctx.stroke();
  } else if (bossId === 2) { // DrillWorm — spikes
    for (let i = 0; i < 8; i++) {
      const a = Math.PI * 2 / 8 * i;
      ctx.fillStyle = COL.missileOrange;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*s*0.4, Math.sin(a)*s*0.4);
      ctx.lineTo(Math.cos(a+0.15)*s*0.55, Math.sin(a+0.15)*s*0.55);
      ctx.lineTo(Math.cos(a-0.15)*s*0.55, Math.sin(a-0.15)*s*0.55);
      ctx.closePath(); ctx.fill();
    }
  } else if (bossId === 3) { // Overload — electric arcs
    ctx.strokeStyle = COL.energyCyan; ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 / 6 * i + time;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*s*0.4, Math.sin(a)*s*0.4);
      ctx.lineTo(Math.cos(a)*s*0.65, Math.sin(a)*s*0.65);
      ctx.stroke();
    }
  } else { // Vortex Prime — multi-ring
    ctx.strokeStyle = COL.gold; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, s*0.55, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = COL.enemyRed;
    ctx.beginPath(); ctx.arc(0, 0, s*0.65, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Phase indicator
  ctx.fillStyle = COL.gold;
  ctx.font = `bold ${s*0.15}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`P${phase+1}`, 0, s*0.08);
  ctx.restore();
  // Boss HP bar
  const barW = size * 2;
  const barH = 6;
  const hpRatio = hp / maxHp;
  ctx.fillStyle = '#333'; ctx.fillRect(x - barW/2, y - s*0.55, barW, barH);
  ctx.fillStyle = hpRatio > 0.3 ? COL.bossPurple : COL.hpBarLow;
  ctx.fillRect(x - barW/2, y - s*0.55, barW * hpRatio, barH);
}

// -- Draw projectile (F9) --
function drawProjectile(ctx, x, y, type, angle, time) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  if (type === 'bullet') {
    ctx.fillStyle = COL.energyCyan;
    ctx.fillRect(-3, -1.5, 6, 3);
  } else if (type === 'missile') {
    ctx.fillStyle = COL.missileOrange;
    ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(-4, -3); ctx.lineTo(-4, 3);
    ctx.closePath(); ctx.fill();
  } else if (type === 'emp') {
    ctx.strokeStyle = '#FFE082'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.stroke();
  } else if (type === 'railbeam') {
    ctx.strokeStyle = '#E040FB'; ctx.lineWidth = 3;
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(time * 10);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(200, 0); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// -- Draw explosion / hit effect (F9) --
function drawExplosion(ctx, x, y, radius, progress, type) {
  const alpha = 1 - progress;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (type === 'explosion') {
    ctx.fillStyle = COL.missileOrange;
    ctx.beginPath(); ctx.arc(x, y, radius * (0.5 + progress * 0.5), 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x, y, radius * 0.3 * (1 - progress), 0, Math.PI*2); ctx.fill();
  } else if (type === 'emp_wave') {
    ctx.strokeStyle = '#FFE082'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, radius * progress, 0, Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = COL.energyCyan;
    ctx.beginPath(); ctx.arc(x, y, radius * progress, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// -- Draw grid (F9) --
function drawGrid(ctx, gridOffX, gridOffY, cols, rows, cellSize, grid, hoveredCell, pathCells, selectedMecha) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = gridOffX + c * cellSize;
      const y = gridOffY + r * cellSize;
      const cell = grid[r * cols + c];
      // Cell background
      if (cell === 2) { // obstacle
        ctx.fillStyle = 'rgba(60,60,80,0.6)';
        ctx.fillRect(x, y, cellSize, cellSize);
        // Debris pattern
        ctx.fillStyle = 'rgba(80,80,100,0.4)';
        ctx.fillRect(x+cellSize*0.2, y+cellSize*0.3, cellSize*0.3, cellSize*0.2);
        ctx.fillRect(x+cellSize*0.5, y+cellSize*0.6, cellSize*0.25, cellSize*0.15);
      } else if (cell === 3) { // spawn
        ctx.fillStyle = 'rgba(229,57,53,0.15)';
        ctx.fillRect(x, y, cellSize, cellSize);
      } else if (cell === 4) { // base
        ctx.fillStyle = 'rgba(0,229,255,0.15)';
        ctx.fillRect(x, y, cellSize, cellSize);
      }
      // Path overlay
      if (pathCells && pathCells.has(r * cols + c) && cell !== 2) {
        ctx.fillStyle = COL.gridPath;
        ctx.fillRect(x, y, cellSize, cellSize);
      }
      // Grid lines
      ctx.strokeStyle = COL.gridLine;
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cellSize, cellSize);
    }
  }
  // Hovered cell highlight
  if (hoveredCell !== null && hoveredCell >= 0 && hoveredCell < cols * rows) {
    const hc = hoveredCell % cols;
    const hr = (hoveredCell / cols) | 0;
    const x = gridOffX + hc * cellSize;
    const y = gridOffY + hr * cellSize;
    const cell = grid[hoveredCell];
    ctx.fillStyle = (cell === 0 || cell === 1) ? COL.gridHover : COL.gridBlocked;
    ctx.fillRect(x, y, cellSize, cellSize);
    // Range preview
    if (selectedMecha >= 0 && selectedMecha < 5 && cell !== 2) {
      const range = CONFIG.MECHA[selectedMecha].range;
      ctx.strokeStyle = 'rgba(0,229,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, range * cellSize, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

// -- Draw environment background (F9) --
function drawEnvironment(ctx, w, h, zone, timeOfDay, weather, time) {
  // Background gradient per zone
  const colors = CONFIG.ZONE_BG[zone] || CONFIG.ZONE_BG[0];
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // Parallax bg layers (procedural — no SVG)
  // Layer 1: slow scrolling grid pattern
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = COL.energyCyan;
  ctx.lineWidth = 0.5;
  const offX1 = (time * 5) % 60;
  for (let lx = -offX1; lx < w; lx += 60) {
    ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, h); ctx.stroke();
  }
  for (let ly = 0; ly < h; ly += 60) {
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(w, ly); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Layer 2: faster scrolling dots/noise
  ctx.globalAlpha = 0.06;
  const offX2 = (time * 12) % 40;
  for (let i = 0; i < 30; i++) {
    const dx = ((i * 137 + offX2 * 3) % w);
    const dy = ((i * 89) % h);
    ctx.fillStyle = i % 2 === 0 ? COL.energyCyan : COL.mechaBlue;
    ctx.fillRect(dx, dy, 2, 2);
  }
  ctx.globalAlpha = 1;
  // Zone-specific decorations
  if (zone === 0) { // City — smoke particles
    ctx.fillStyle = 'rgba(200,100,50,0.04)';
    for (let i = 0; i < 5; i++) {
      const sx = w * 0.15 + i * w * 0.18;
      const sy = h * 0.05 + Math.sin(time + i * 1.5) * 15;
      ctx.beginPath(); ctx.arc(sx, sy, 20 + Math.sin(time * 0.5 + i) * 8, 0, Math.PI*2); ctx.fill();
    }
  } else if (zone === 1) { // Industrial — gears
    ctx.strokeStyle = 'rgba(100,100,120,0.1)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const gx = w * (0.2 + i * 0.3);
      const gy = h * 0.1;
      ctx.beginPath(); ctx.arc(gx, gy, 25, 0, Math.PI*2); ctx.stroke();
    }
  } else if (zone === 2) { // Energy — glowing pipes
    ctx.strokeStyle = 'rgba(0,229,255,0.08)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, h*0.15); ctx.lineTo(w, h*0.15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, h*0.18); ctx.lineTo(w, h*0.18); ctx.stroke();
    // Electric arc
    ctx.strokeStyle = `rgba(0,229,255,${0.05 + 0.05 * Math.sin(time * 8)})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    let arcY = h * 0.16;
    ctx.moveTo(0, arcY);
    for (let px = 0; px < w; px += 20) {
      arcY = h * 0.16 + Math.sin(px * 0.05 + time * 4) * 5;
      ctx.lineTo(px, arcY);
    }
    ctx.stroke();
  } else if (zone === 3) { // Bunker — warning lights
    const blink = Math.sin(time * 3) > 0;
    if (blink) {
      ctx.fillStyle = 'rgba(229,57,53,0.05)';
      ctx.fillRect(0, 0, w, h);
    }
  } else if (zone === 4) { // Command — holographic lines
    ctx.strokeStyle = 'rgba(255,215,0,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const ly = h * 0.05 + i * h * 0.03;
      ctx.beginPath(); ctx.moveTo(w*0.1, ly); ctx.lineTo(w*0.9, ly); ctx.stroke();
    }
  }
  // Night overlay
  if (timeOfDay === 'night') {
    ctx.fillStyle = 'rgba(0,0,20,0.3)';
    ctx.fillRect(0, 0, w, h);
  }
  // Weather effects
  if (weather === 'acid_rain') {
    ctx.strokeStyle = 'rgba(0,255,100,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 30; i++) {
      const rx = (i * 97 + time * 200) % w;
      const ry = (i * 53 + time * 400) % h;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 2, ry + 10); ctx.stroke();
    }
  } else if (weather === 'emp_storm') {
    const flash = Math.sin(time * 6) > 0.8;
    if (flash) {
      ctx.fillStyle = 'rgba(255,224,130,0.08)';
      ctx.fillRect(0, 0, w, h);
    }
  } else if (weather === 'mag_storm') {
    // Magnetic storm: purple/blue distortion lines
    ctx.strokeStyle = 'rgba(155,89,182,0.12)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 15; i++) {
      const mx = (i * 73 + time * 100) % w;
      const my1 = Math.sin(time * 3 + i) * h * 0.3 + h * 0.5;
      const my2 = my1 + Math.cos(time * 4 + i * 2) * 40;
      ctx.beginPath(); ctx.moveTo(mx, my1); ctx.lineTo(mx + 10, my2); ctx.stroke();
    }
    // Flickering overlay
    if (Math.sin(time * 10 + 3) > 0.9) {
      ctx.fillStyle = 'rgba(155,89,182,0.04)';
      ctx.fillRect(0, 0, w, h);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 5: GAME LOGIC — TD CORE (BFS, placement, spawn,
//           combat, projectiles) (~600 lines)
// ═══════════════════════════════════════════════════════════════

// -- BFS pathfinding (§10.3) --
function findPath(grid, cols, rows, startIdx, endIdx) {
  const queue = [startIdx];
  const visited = new Set([startIdx]);
  const parent = new Map();
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur === endIdx) {
      // Reconstruct path
      const path = [];
      let c = endIdx;
      while (c !== undefined) { path.unshift(c); c = parent.get(c); }
      return path;
    }
    const cr = (cur / cols) | 0;
    const cc = cur % cols;
    const neighbors = [];
    if (cr > 0) neighbors.push(cur - cols);
    if (cr < rows - 1) neighbors.push(cur + cols);
    if (cc > 0) neighbors.push(cur - 1);
    if (cc < cols - 1) neighbors.push(cur + 1);
    for (const n of neighbors) {
      if (!visited.has(n) && grid[n] !== 2 && grid[n] !== 1) {
        // 1 = mecha placed, 2 = obstacle
        visited.add(n);
        parent.set(n, cur);
        queue.push(n);
      }
    }
  }
  return null; // No path
}

// -- Generate zone map (§10.2: hybrid procedural) --
function generateZoneMap(zone, cols, rows, rng) {
  const grid = new Array(cols * rows).fill(0);
  const obstacleRatio = 0.2 + zone * 0.03;
  // Fixed spawn (left column) and base (bottom-right)
  const spawnCells = [];
  for (let r = 0; r < rows; r++) {
    if (r % 2 === 0 || rows <= 6) { grid[r * cols] = 3; spawnCells.push(r * cols); }
  }
  const baseIdx = (rows - 1) * cols + (cols - 1);
  grid[baseIdx] = 4;
  // Place obstacles using seeded RNG
  const numObstacles = ((cols * rows * obstacleRatio) | 0);
  let placed = 0;
  let attempts = 0;
  while (placed < numObstacles && attempts < 500) {
    const idx = rng.nextInt(0, cols * rows - 1);
    if (grid[idx] !== 0) { attempts++; continue; }
    const r = (idx / cols) | 0;
    const c = idx % cols;
    // Don't block near spawn or base
    if (c <= 1 || (c >= cols - 2 && r >= rows - 2)) { attempts++; continue; }
    grid[idx] = 2;
    // Verify path still exists
    const testPath = findPath(grid, cols, rows, spawnCells[0], baseIdx);
    if (!testPath) { grid[idx] = 0; } // Rollback if path blocked
    else { placed++; }
    attempts++;
  }
  return { grid, spawnCells, baseIdx };
}

// -- Spawn wave enemies (§7.2) --
function spawnWaveEnemies(zone, wave, rng, ddaLevel, spawnCells, cols) {
  const enemies = [];
  const baseCount = 8 + zone * 4 + wave * 2;
  const hpMult = zone < 2 ? 1.0 : zone < 3 ? 1.5 : 2.5;
  const speedMult = zone < 2 ? 1.0 : zone < 3 ? 1.2 : 1.5;
  const ddaHpReduce = CONFIG.DDA[ddaLevel] ? CONFIG.DDA[ddaLevel].hpReduce : 0;
  const availableTypes = CONFIG.ENEMY.filter(e => e.zone <= zone + 1);
  for (let i = 0; i < baseCount; i++) {
    const typeData = rng.pick(availableTypes);
    const typeIdx = CONFIG.ENEMY.indexOf(typeData);
    const hp = Math.max(5, (typeData.hp * hpMult * (1 - ddaHpReduce)) | 0);
    const spawnIdx = rng.pick(spawnCells);
    const sr = (spawnIdx / cols) | 0;
    const sc = spawnIdx % cols;
    enemies.push({
      type: typeIdx, hp, maxHp: hp,
      speed: typeData.speed * speedMult,
      special: typeData.special, def: typeData.def,
      gridR: sr, gridC: sc, x: 0, y: 0,
      pathIdx: 0, path: null,
      spawnDelay: i * (600 + rng.nextInt(0, 400)),
      spawned: false, alive: true, status: 'normal', statusTimer: 0
    });
  }
  return enemies;
}

// -- Combat: mecha targeting and firing --
function updateCombat(mechas, enemies, projectiles, dt, cellSize, gridOffX, gridOffY, cols, time, G) {
  for (const m of mechas) {
    if (!m.active || m.disabled > 0) {
      m.disabled = Math.max(0, m.disabled - dt);
      continue;
    }
    m.cooldownTimer -= dt;
    if (m.cooldownTimer > 0) continue;
    if (m.type === 2) continue; // Shield doesn't attack
    // Find target in range
    const mx = gridOffX + m.col * cellSize + cellSize/2;
    const my = gridOffY + m.row * cellSize + cellSize/2;
    const rangePx = m.range * cellSize;
    let target = null;
    let minDist = Infinity;
    for (const e of enemies) {
      if (!e.alive || !e.spawned) continue;
      if (e.special === 'flying' && m.type !== 3 && m.type !== 4) {
        // Only EMP and railgun can hit flying
      }
      const dx = e.x - mx;
      const dy = e.y - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist <= rangePx && dist < minDist) {
        minDist = dist;
        target = e;
      }
    }
    if (!target) continue;
    m.cooldownTimer = m.cooldown;
    const angle = Math.atan2(target.y - my, target.x - mx);
    if (m.type === 4) { // Railgun — pierce
      // Hit all enemies in line
      for (const e of enemies) {
        if (!e.alive || !e.spawned) continue;
        const dx = e.x - mx;
        const dy = e.y - my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > rangePx) continue;
        // Check if enemy is on the line
        const cross = Math.abs(dx * Math.sin(angle) - dy * Math.cos(angle));
        if (cross < cellSize * 0.5) {
          applyDamage(e, m.atk, G);
        }
      }
      projectiles.push({
        x: mx, y: my, type: 'railbeam', angle, speed: 0, life: 300, maxLife: 300,
        atk: 0, splash: 0, stun: 0
      });
      if (G.sound) G.sound.playSfx('railgun');
    } else {
      const projType = m.type === 1 ? 'missile' : m.type === 3 ? 'emp' : 'bullet';
      projectiles.push({
        x: mx, y: my, type: projType, angle,
        speed: m.type === 1 ? 250 : 400,
        life: 2000, maxLife: 2000,
        atk: m.atk, splash: m.splash * cellSize,
        stun: m.type === 3 ? 500 : 0, targetId: enemies.indexOf(target)
      });
      if (G.sound) {
        if (m.type === 1) G.sound.playSfx('missile');
        else if (m.type === 3) G.sound.playSfx('emp');
        else G.sound.playSfx('shoot');
      }
    }
  }
}

// -- Apply damage to enemy --
function applyDamage(enemy, atk, G) {
  const actualDmg = Math.max(1, atk * (1 - enemy.def));
  enemy.hp -= actualDmg;
  if (enemy.hp <= 0) {
    enemy.alive = false;
    G.score += CONFIG.SCORE_KILL_BASE * (G.zone + 1);
    G.energy += Math.max(1, CONFIG.ENERGY_PER_KILL - G.zone);
    G._killCount = (G._killCount || 0) + 1;
    // Particle effect
    if (G._addParticle) G._addParticle(enemy.x, enemy.y, 'explosion');
    if (G.sound) G.sound.playSfx('hit');
  }
}

// -- Update projectiles --
function updateProjectiles(projectiles, enemies, dt, G) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    if (p.speed === 0) continue; // Static (railbeam)
    // §7.3 mag_storm: trajectory distortion (railgun immune — railbeam has speed=0)
    let projAngle = p.angle;
    if (G.weather === 'mag_storm' && p.type !== 'railbeam') {
      projAngle += Math.sin(G._time * 8 + p.x * 0.01) * 0.3; // Wobble trajectory
    }
    p.x += Math.cos(projAngle) * p.speed * dt / 1000;
    p.y += Math.sin(projAngle) * p.speed * dt / 1000;
    // Check collision with enemies
    // §7.3 mag_storm: -30% accuracy → larger miss radius (railgun immune)
    const missChance = (G.weather === 'mag_storm' && p.type !== 'railbeam') ? 0.3 : 0;
    for (const e of enemies) {
      if (!e.alive || !e.spawned) continue;
      const dx = e.x - p.x;
      const dy = e.y - p.y;
      if (dx*dx + dy*dy < 400) { // ~20px radius
        // Mag storm miss check
        if (missChance > 0 && G.rng && G.rng.next() < missChance) {
          // Miss — projectile passes through
          continue;
        }
        if (p.splash > 0) {
          // Splash damage
          for (const e2 of enemies) {
            if (!e2.alive || !e2.spawned) continue;
            const sx = e2.x - p.x;
            const sy = e2.y - p.y;
            if (sx*sx + sy*sy < p.splash * p.splash) {
              applyDamage(e2, p.atk, G);
            }
          }
          if (G._addParticle) G._addParticle(p.x, p.y, 'explosion');
          if (G.sound) G.sound.playSfx('explosion');
        } else {
          applyDamage(e, p.atk, G);
          if (p.stun > 0) { e.status = 'stunned'; e.statusTimer = p.stun; }
        }
        projectiles.splice(i, 1);
        break;
      }
    }
  }
}

// -- Update enemy movement along BFS path --
function updateEnemyAI(enemies, grid, cols, rows, baseIdx, cellSize, gridOffX, gridOffY, dt, G) {
  const bx = gridOffX + (baseIdx % cols) * cellSize + cellSize/2;
  const by = gridOffY + ((baseIdx / cols) | 0) * cellSize + cellSize/2;
  for (const e of enemies) {
    if (!e.alive) continue;
    if (!e.spawned) {
      e.spawnDelay -= dt;
      if (e.spawnDelay <= 0) {
        e.spawned = true;
        e.x = gridOffX + e.gridC * cellSize + cellSize/2;
        e.y = gridOffY + e.gridR * cellSize + cellSize/2;
        // Calculate path
        const startIdx = e.gridR * cols + e.gridC;
        e.path = findPath(grid, cols, rows, startIdx, baseIdx);
        e.pathIdx = 0;
      }
      continue;
    }
    // Status effects
    if (e.status === 'stunned') {
      e.statusTimer -= dt;
      if (e.statusTimer <= 0) e.status = 'normal';
      continue;
    }
    if (!e.path || e.pathIdx >= e.path.length) {
      // Reached base — damage core
      G.coreHp -= (e.special === 'suicide' ? 30 : 10);
      e.alive = false;
      if (G._addParticle) G._addParticle(bx, by, 'core_hit');
      if (G.sound) G.sound.playSfx('coreHit');
      G._waveDamaged = true;
      continue;
    }
    // Move toward next path cell
    const nextIdx = e.path[e.pathIdx];
    const nc = nextIdx % cols;
    const nr = (nextIdx / cols) | 0;
    const tx = gridOffX + nc * cellSize + cellSize/2;
    const ty = gridOffY + nr * cellSize + cellSize/2;
    const dx = tx - e.x;
    const dy = ty - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // §7.3 acid rain: enemy speed -20%
    const weatherSpeedMult = (G.weather === 'acid_rain') ? 0.8 : 1.0;
    const moveSpeed = e.speed * weatherSpeedMult * cellSize * dt / 1000;
    if (dist < moveSpeed + 2) {
      e.x = tx; e.y = ty;
      e.gridR = nr; e.gridC = nc;
      e.pathIdx++;
    } else {
      e.x += (dx / dist) * moveSpeed;
      e.y += (dy / dist) * moveSpeed;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 6: GAME LOGIC — BOSS & PARTS (~400 lines)
// ═══════════════════════════════════════════════════════════════

// -- Create boss for zone (§7.5) --
function createBoss(zone, cols, rows, cellSize, gridOffX, gridOffY, baseIdx, rng) {
  const hp = CONFIG.BOSS_HP[zone];
  // Boss appears near center-left of grid
  const bc = ((cols * 0.3) | 0);
  const br = ((rows * 0.5) | 0);
  return {
    id: zone, hp, maxHp: hp, phase: 0,
    x: gridOffX + bc * cellSize + cellSize/2,
    y: gridOffY + br * cellSize + cellSize/2,
    gridR: br, gridC: bc,
    speed: 0.5, attackTimer: 0, attackCd: 3000,
    patternTimer: 0, alive: true,
    minions: [], rewardGiven: false,
    weakpointExposed: false, weakpointTimer: 0
  };
}

// -- Update boss (§7.5 patterns — per-boss unique patterns) --
function updateBoss(boss, mechas, enemies, projectiles, dt, G, cellSize, gridOffX, gridOffY, cols, rows, baseIdx) {
  if (!boss || !boss.alive) return;
  const bx = gridOffX + (baseIdx % cols) * cellSize + cellSize/2;
  const by = gridOffY + ((baseIdx / cols) | 0) * cellSize + cellSize/2;
  // Boss phases
  const hpRatio = boss.hp / boss.maxHp;
  if (boss.id === 4) { // Vortex Prime — 3 phases at 60% and 25%
    if (hpRatio < 0.25 && boss.phase < 2) boss.phase = 2;
    else if (hpRatio < 0.6 && boss.phase < 1) boss.phase = 1;
  } else {
    if (hpRatio < 0.5 && boss.phase < 1) boss.phase = 1;
  }

  // === BOSS-SPECIFIC BEHAVIOR ===
  if (boss.id === 0) {
    // ── Crusher (§7.5): 돌진 → 메카 파괴 + 미끼 유인 ──
    boss.patternTimer = (boss.patternTimer || 0) + dt;
    if (!boss._charging) {
      // Normal: move toward base slowly
      const dx = bx - boss.x; const dy = by - boss.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > cellSize * 2) {
        boss.x += (dx / dist) * boss.speed * cellSize * dt / 1000;
        boss.y += (dy / dist) * boss.speed * cellSize * dt / 1000;
      }
      // Attack
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = boss.attackCd;
        const angle = Math.atan2(by - boss.y, bx - boss.x);
        projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 200, life: 3000, maxLife: 3000, atk: 15, splash: cellSize, stun: 0, isBoss: true });
        if (G.sound) G.sound.playSfx('bossAlarm');
      }
      // Charge pattern: every 6s, pick a random mecha and charge toward it
      if (boss.patternTimer > 6000 && mechas.length > 0) {
        boss.patternTimer = 0;
        const targets = mechas.filter(m => m.active);
        if (targets.length > 0) {
          const target = G.rng ? G.rng.pick(targets) : targets[0];
          boss._chargeTargetX = gridOffX + target.col * cellSize + cellSize/2;
          boss._chargeTargetY = gridOffY + target.row * cellSize + cellSize/2;
          boss._chargeTargetRow = target.row;
          boss._chargeTargetCol = target.col;
          boss._charging = true;
          boss._chargeSpeed = 4; // Fast charge
          if (G.sound) G.sound.playSfx('bossAlarm');
        }
      }
    } else {
      // Charging toward mecha
      const dx = boss._chargeTargetX - boss.x;
      const dy = boss._chargeTargetY - boss.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < cellSize) {
        // Impact — destroy mecha at target cell
        const mi = mechas.findIndex(m => m.row === boss._chargeTargetRow && m.col === boss._chargeTargetCol && m.active);
        if (mi >= 0) {
          mechas[mi].active = false;
          G.grid[mechas[mi].row * G.cols + mechas[mi].col] = 0;
          if (G._addParticle) G._addParticle(boss._chargeTargetX, boss._chargeTargetY, 'explosion');
          if (G.sound) G.sound.playSfx('explosion');
        }
        boss._charging = false;
        G._shakeTimer = 300;
      } else {
        boss.x += (dx / dist) * boss._chargeSpeed * cellSize * dt / 1000;
        boss.y += (dy / dist) * boss._chargeSpeed * cellSize * dt / 1000;
      }
    }
  } else if (boss.id === 1) {
    // ── ShieldMother (§7.5): 잡졸 소환 + 전체 실드 + 등 뒤 약점 ──
    const dx = bx - boss.x; const dy = by - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > cellSize * 2) {
      boss.x += (dx / dist) * boss.speed * cellSize * dt / 1000;
      boss.y += (dy / dist) * boss.speed * cellSize * dt / 1000;
    }
    boss.attackTimer -= dt;
    if (boss.attackTimer <= 0) {
      boss.attackTimer = boss.attackCd;
      const angle = Math.atan2(by - boss.y, bx - boss.x);
      projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 200, life: 3000, maxLife: 3000, atk: 20, splash: cellSize, stun: 0, isBoss: true });
    }
    boss.patternTimer = (boss.patternTimer || 0) + dt;
    if (boss.patternTimer > 5000) {
      boss.patternTimer = 0;
      // Summon minions
      const spawnIdx = boss.gridR * cols + boss.gridC;
      const path = findPath(G._currentGrid, cols, rows, spawnIdx, baseIdx);
      if (path) {
        const count = boss.phase >= 1 ? 3 : 1;
        for (let i = 0; i < count; i++) {
          enemies.push({
            type: 0, hp: 20 + boss.phase * 10, maxHp: 20 + boss.phase * 10, speed: 2.5, special: 'none', def: 0,
            gridR: boss.gridR, gridC: boss.gridC, x: boss.x + (G.rng ? G.rng.nextFloat(-10,10) : 0), y: boss.y,
            pathIdx: 0, path: path.slice(), spawnDelay: i * 300, spawned: i === 0, alive: true, status: 'normal', statusTimer: 0
          });
        }
      }
    }
  } else if (boss.id === 2) {
    // ── DrillWorm (§7.5): 지하 이동 → 출현 시 범위 공격 ──
    boss.patternTimer = (boss.patternTimer || 0) + dt;
    if (!boss._underground) {
      // Above ground: normal movement + attacks
      const dx = bx - boss.x; const dy = by - boss.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > cellSize * 2) {
        boss.x += (dx / dist) * boss.speed * cellSize * dt / 1000;
        boss.y += (dy / dist) * boss.speed * cellSize * dt / 1000;
      }
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = boss.attackCd;
        const angle = Math.atan2(by - boss.y, bx - boss.x);
        projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 200, life: 3000, maxLife: 3000, atk: 25, splash: cellSize * 1.5, stun: 0, isBoss: true });
      }
      // Go underground every 7s
      if (boss.patternTimer > 7000) {
        boss.patternTimer = 0;
        boss._underground = true;
        boss._undergroundTimer = 0;
        boss._visible = false;
        // Pick random emerge position
        const ec = G.rng ? G.rng.nextInt(1, cols - 2) : ((cols / 2) | 0);
        const er = G.rng ? G.rng.nextInt(1, rows - 2) : ((rows / 2) | 0);
        boss._emergeX = gridOffX + ec * cellSize + cellSize/2;
        boss._emergeY = gridOffY + er * cellSize + cellSize/2;
        // Show warning indicator
        boss._warningX = boss._emergeX;
        boss._warningY = boss._emergeY;
        if (G.sound) G.sound.playSfx('emp');
      }
    } else {
      // Underground phase
      boss._undergroundTimer += dt;
      boss._visible = false;
      if (boss._undergroundTimer > 2000) {
        // Emerge with area damage
        boss._underground = false;
        boss._visible = true;
        boss.x = boss._emergeX;
        boss.y = boss._emergeY;
        boss.gridC = ((boss.x - gridOffX) / cellSize) | 0;
        boss.gridR = ((boss.y - gridOffY) / cellSize) | 0;
        // AoE damage to nearby mechas
        for (const m of mechas) {
          if (!m.active) continue;
          const mx = gridOffX + m.col * cellSize + cellSize/2;
          const my = gridOffY + m.row * cellSize + cellSize/2;
          const dx = mx - boss.x; const dy = my - boss.y;
          if (dx*dx + dy*dy < (cellSize * 2) * (cellSize * 2)) {
            m.disabled = 2000; // Stun nearby mechas
          }
        }
        G._shakeTimer = 400;
        if (G._addParticle) G._addParticle(boss.x, boss.y, 'explosion');
        if (G.sound) G.sound.playSfx('explosion');
      }
    }
  } else if (boss.id === 3) {
    // ── Overload (§7.5): EMP 전체 + 3초 회복 중 약점 노출 ──
    const dx = bx - boss.x; const dy = by - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > cellSize * 2) {
      boss.x += (dx / dist) * boss.speed * cellSize * dt / 1000;
      boss.y += (dy / dist) * boss.speed * cellSize * dt / 1000;
    }
    boss.attackTimer -= dt;
    if (boss.attackTimer <= 0) {
      boss.attackTimer = boss.attackCd;
      const angle = Math.atan2(by - boss.y, bx - boss.x);
      projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 200, life: 3000, maxLife: 3000, atk: 30, splash: cellSize, stun: 0, isBoss: true });
    }
    boss.patternTimer = (boss.patternTimer || 0) + dt;
    if (boss.patternTimer > 6000 && !boss._recovering) {
      boss.patternTimer = 0;
      // EMP blast — stun all mechas
      for (const m of mechas) { m.disabled = 1000; }
      if (G._addParticle) G._addParticle(boss.x, boss.y, 'emp_wave');
      if (G.sound) G.sound.playSfx('emp');
      // Enter recovery — weakpoint exposed for 3s
      boss._recovering = true;
      boss._recoverTimer = 0;
    }
    if (boss._recovering) {
      boss._recoverTimer = (boss._recoverTimer || 0) + dt;
      boss.weakpointExposed = true;
      if (boss._recoverTimer > 3000) {
        boss._recovering = false;
        boss.weakpointExposed = false;
        boss._recoverTimer = 0;
      }
    }
  } else if (boss.id === 4) {
    // ── Vortex Prime (§7.5): 3페이즈 변신 ──
    const dx = bx - boss.x; const dy = by - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > cellSize * 2) {
      boss.x += (dx / dist) * boss.speed * cellSize * dt / 1000;
      boss.y += (dy / dist) * boss.speed * cellSize * dt / 1000;
    }
    boss.patternTimer = (boss.patternTimer || 0) + dt;
    if (boss.phase === 0) {
      // Phase 1 (100~60%): 원거리 레이저 → 2초 쿨다운 (약점: 코어 노출)
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = 2000;
        // Laser beam toward base
        const angle = Math.atan2(by - boss.y, bx - boss.x);
        projectiles.push({ x: boss.x, y: boss.y, type: 'railbeam', angle, speed: 0, life: 500, maxLife: 500, atk: 0, splash: 0, stun: 0, isBoss: true });
        // Direct damage to core
        G.coreHp -= 15;
        if (G._addParticle) G._addParticle(bx, by, 'core_hit');
        if (G.sound) G.sound.playSfx('railgun');
      }
      // Weakpoint exposed periodically
      boss.weakpointTimer = (boss.weakpointTimer || 0) + dt;
      if (boss.weakpointTimer > 5000) { boss.weakpointExposed = true; }
      if (boss.weakpointTimer > 8000) { boss.weakpointExposed = false; boss.weakpointTimer = 0; }
    } else if (boss.phase === 1) {
      // Phase 2 (60~25%): 돌진 + 잡졸 소환 → 잡졸 처치 시 실드 해제
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = 3000;
        const angle = Math.atan2(by - boss.y, bx - boss.x);
        projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 250, life: 3000, maxLife: 3000, atk: 25, splash: cellSize, stun: 0, isBoss: true });
      }
      // Summon minions every 5s
      if (boss.patternTimer > 5000) {
        boss.patternTimer = 0;
        const spawnIdx = boss.gridR * cols + boss.gridC;
        const path = findPath(G._currentGrid, cols, rows, spawnIdx, baseIdx);
        if (path) {
          for (let i = 0; i < 2; i++) {
            enemies.push({
              type: G.rng ? G.rng.nextInt(0, 2) : 0, hp: 40, maxHp: 40, speed: 2.5, special: 'none', def: 0,
              gridR: boss.gridR, gridC: boss.gridC, x: boss.x, y: boss.y,
              pathIdx: 0, path: path.slice(), spawnDelay: i * 500, spawned: i === 0, alive: true, status: 'normal', statusTimer: 0
            });
          }
        }
        if (G.sound) G.sound.playSfx('bossAlarm');
      }
      // Weakpoint exposed when no minions alive
      const aliveMinions = enemies.filter(e => e.alive && e.spawned);
      boss.weakpointExposed = aliveMinions.length === 0;
    } else {
      // Phase 3 (25~0%): 전체 EMP + 자폭봇 연속 소환 → 코어 3초 노출
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = 4000;
        // EMP blast
        for (const m of mechas) { m.disabled = 1500; }
        if (G._addParticle) G._addParticle(boss.x, boss.y, 'emp_wave');
        if (G.sound) G.sound.playSfx('emp');
      }
      // Spawn suicide bots every 3s
      if (boss.patternTimer > 3000) {
        boss.patternTimer = 0;
        const spawnIdx = boss.gridR * cols + boss.gridC;
        const path = findPath(G._currentGrid, cols, rows, spawnIdx, baseIdx);
        if (path) {
          enemies.push({
            type: 4, hp: 30, maxHp: 30, speed: 3.5, special: 'suicide', def: 0,
            gridR: boss.gridR, gridC: boss.gridC, x: boss.x, y: boss.y,
            pathIdx: 0, path: path.slice(), spawnDelay: 0, spawned: true, alive: true, status: 'normal', statusTimer: 0
          });
        }
      }
      // Core exposed for 3s after EMP
      boss.weakpointExposed = true;
    }
  } else {
    // Generic fallback for unknown boss IDs
    const dx2 = bx - boss.x; const dy2 = by - boss.y;
    const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
    if (dist2 > cellSize * 2) {
      boss.x += (dx2 / dist2) * boss.speed * cellSize * dt / 1000;
      boss.y += (dy2 / dist2) * boss.speed * cellSize * dt / 1000;
    }
    boss.attackTimer -= dt;
    if (boss.attackTimer <= 0) {
      boss.attackTimer = boss.attackCd;
      const angle = Math.atan2(by - boss.y, bx - boss.x);
      projectiles.push({ x: boss.x, y: boss.y, type: 'missile', angle, speed: 200, life: 3000, maxLife: 3000, atk: 15 + boss.id * 5, splash: cellSize, stun: 0, isBoss: true });
    }
  }

  // Weakpoint for non-special bosses (Crusher, ShieldMother use pattern-based weakpoints)
  if (boss.id === 0 || boss.id === 1 || boss.id === 2) {
    // Default weakpoint exposure timer (if not already managed by pattern)
    if (boss.id !== 3 && boss.id !== 4) {
      boss.weakpointTimer = (boss.weakpointTimer || 0) + dt;
      if (boss.weakpointTimer > 8000) { boss.weakpointExposed = true; }
      if (boss.weakpointTimer > 11000) { boss.weakpointExposed = false; boss.weakpointTimer = 0; }
    }
  }
}

// -- Handle boss projectiles hitting core --
function updateBossProjectiles(projectiles, dt, G, cellSize, gridOffX, gridOffY, cols, rows, baseIdx) {
  const bx = gridOffX + (baseIdx % cols) * cellSize + cellSize/2;
  const by = gridOffY + ((baseIdx / cols) | 0) * cellSize + cellSize/2;
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (!p.isBoss) continue;
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    p.x += Math.cos(p.angle) * p.speed * dt / 1000;
    p.y += Math.sin(p.angle) * p.speed * dt / 1000;
    const dx = bx - p.x;
    const dy = by - p.y;
    if (dx*dx + dy*dy < cellSize * cellSize) {
      G.coreHp -= p.atk;
      projectiles.splice(i, 1);
      if (G._addParticle) G._addParticle(bx, by, 'core_hit');
      if (G.sound) G.sound.playSfx('coreHit');
      G._waveDamaged = true;
    }
  }
}

// -- Generate part choices (§7.4) --
function generatePartChoices(zone, rng, lang) {
  const rarities = [
    { name: 'common', chance: 0.6, label: lang.common || 'Common', color: '#888' },
    { name: 'rare',   chance: 0.3, label: lang.rare || 'Rare', color: COL.mechaBlue },
    { name: 'epic',   chance: 0.1, label: lang.epic || 'Epic', color: COL.bossPurple }
  ];
  const effects = {
    common: [
      { name: lang === LANG.ko ? '사거리 +0.5' : 'Range +0.5', stat: 'range', value: 0.5 },
      { name: lang === LANG.ko ? '공격력 +10%' : 'ATK +10%', stat: 'atkMult', value: 0.1 },
      { name: lang === LANG.ko ? '공속 +15%' : 'Speed +15%', stat: 'cdMult', value: 0.15 },
      { name: lang === LANG.ko ? '에너지 +5' : 'Energy +5', stat: 'energy', value: 5 }
    ],
    rare: [
      { name: lang === LANG.ko ? '공속 +25%' : 'Speed +25%', stat: 'cdMult', value: 0.25 },
      { name: lang === LANG.ko ? '범위 공격' : 'Splash', stat: 'splash', value: 0.5 },
      { name: lang === LANG.ko ? '에너지 회수 +15%' : 'Energy +15%', stat: 'energyMult', value: 0.15 }
    ],
    epic: [
      { name: lang === LANG.ko ? '관통 추가' : 'Pierce', stat: 'pierce', value: 1 },
      { name: lang === LANG.ko ? '스턴 0.3초' : 'Stun 0.3s', stat: 'stun', value: 300 },
      { name: lang === LANG.ko ? '체인 라이트닝' : 'Chain Lightning', stat: 'chain', value: 2 }
    ]
  };
  const choices = [];
  for (let i = 0; i < 3; i++) {
    const roll = rng.next();
    let rarity = 'common';
    if (roll > 0.9) rarity = 'epic';
    else if (roll > 0.6) rarity = 'rare';
    const rarityData = rarities.find(r => r.name === rarity);
    const effectPool = effects[rarity];
    const effect = rng.pick(effectPool);
    choices.push({
      name: effect.name, effect: `${effect.name}`,
      rarity, rarityLabel: rarityData.label,
      stat: effect.stat, value: effect.value
    });
  }
  return choices;
}

// -- Count parts in same stat category for synergy cap (F27, §7.4) --
function getStatCategory(stat) {
  if (stat === 'atkMult' || stat === 'cdMult' || stat === 'pierce' || stat === 'chain') return 'offense';
  if (stat === 'range' || stat === 'splash') return 'range';
  if (stat === 'energy' || stat === 'energyMult') return 'economy';
  if (stat === 'stun') return 'control';
  return 'misc';
}

// -- Check if category has reached synergy cap (150%) --
function isSynergyCapped(category, G) {
  if (!G._synergyCounts) return false;
  const count = G._synergyCounts[category] || 0;
  // Synergy cap: 3+ same-category parts → total bonus capped at 150%
  if (count >= 3) {
    const bonusMap = {
      offense: (G._partBonusAtk || 0) + (G._partBonusCd || 0),
      range: (G._partBonusRange || 0) + (G._partBonusSplash || 0),
      economy: (G._partBonusEnergy || 0),
      control: (G._partBonusStun || 0) / 1000
    };
    return (bonusMap[category] || 0) >= CONFIG.SYNERGY_CAP;
  }
  return false;
}

// -- Apply selected part to all mechas (§7.4 with DPS cap + synergy cap F27) --
function applyPart(part, G) {
  G.parts.push(part);
  // Track synergy counts per category
  if (!G._synergyCounts) G._synergyCounts = {};
  const category = getStatCategory(part.stat);
  G._synergyCounts[category] = (G._synergyCounts[category] || 0) + 1;
  // Synergy cap check (F27, §7.4): 동일 계열 부품 3개 이상 시 시너지 보너스 150% 제한
  const capped = isSynergyCapped(category, G);
  const effectiveMult = capped ? 0 : 1; // If capped, no additional bonus
  // DPS cap + synergy cap applied
  if (part.stat === 'atkMult') G._partBonusAtk = Math.min(CONFIG.DPS_CAP, (G._partBonusAtk || 0) + part.value * effectiveMult);
  else if (part.stat === 'cdMult') G._partBonusCd = Math.min(CONFIG.DPS_CAP, (G._partBonusCd || 0) + part.value * effectiveMult);
  else if (part.stat === 'range') G._partBonusRange = (G._partBonusRange || 0) + part.value * effectiveMult;
  else if (part.stat === 'splash') G._partBonusSplash = (G._partBonusSplash || 0) + part.value * effectiveMult;
  else if (part.stat === 'energy') G.energy += part.value; // Energy is immediate, not capped
  else if (part.stat === 'energyMult') G._partBonusEnergy = Math.min(CONFIG.SYNERGY_CAP, (G._partBonusEnergy || 0) + part.value * effectiveMult);
  else if (part.stat === 'stun') G._partBonusStun = (G._partBonusStun || 0) + part.value * effectiveMult;
  else if (part.stat === 'pierce') G._partBonusPierce = (G._partBonusPierce || 0) + part.value * effectiveMult;
  else if (part.stat === 'chain') G._partBonusChain = (G._partBonusChain || 0) + part.value * effectiveMult;
  // Recalculate mecha stats
  for (const m of G.mechas) {
    recalcMechaStats(m, G);
  }
}

// -- Filter part choices to exclude capped categories (§7.4) --
function filterCappedChoices(choices, G) {
  return choices.filter(c => !isSynergyCapped(getStatCategory(c.stat), G));
}

// -- Recalculate mecha stats with parts and upgrades --
function recalcMechaStats(mecha, G) {
  const base = CONFIG.MECHA[mecha.type];
  const lvlAtk = CONFIG.LEVEL_ATK_MULT[mecha.level];
  const lvlCd = CONFIG.LEVEL_CD_MULT[mecha.level];
  const partAtk = 1 + (G._partBonusAtk || 0);
  const partCd = 1 - Math.min(0.5, G._partBonusCd || 0);
  const upgradeAtk = 1 + (G.upgrades.firepower >= 1 ? 0.1 : 0);
  const upgradeCd = 1 - (G.upgrades.firepower >= 2 ? 0.1 : 0);
  mecha.atk = (base.atk * lvlAtk * partAtk * upgradeAtk) | 0;
  mecha.cooldown = base.cd * lvlCd * partCd * upgradeCd;
  mecha.range = base.range + (G._partBonusRange || 0) + (G.upgrades.firepower >= 4 ? 0.5 : 0);
  mecha.splash = base.splash + (G._partBonusSplash || 0);
  // Night range reduction
  if (G.timeOfDay === 'night' && mecha.type !== 3 && mecha.type !== 4) {
    mecha.range = Math.max(1, mecha.range - 1);
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 7: GAME LOGIC — META PROGRESSION (upgrades, DDA) (~250 lines)
// ═══════════════════════════════════════════════════════════════

const SAVE_KEY = 'mecha-garrison-v1';

// -- Load persistent save --
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    bestScore: 0, bestZone: 0, corePoints: 0,
    upgrades: { firepower: 0, defense: 0, utility: 0 },
    totalRuns: 0, consecutiveDeaths: 0,
    unlockedMechas: [true, true, true, false, false],
    lang: 'ko', version: 1
  };
}

// -- Save persistent data (F8: judge first, save later) --
function savePersistent(G) {
  try {
    const save = loadSave();
    // Judge first
    const isNewBest = G.score > save.bestScore;
    const isNewZone = G.zone > save.bestZone;
    // Then save
    if (isNewBest) save.bestScore = G.score;
    if (isNewZone) save.bestZone = G.zone;
    save.corePoints = G.corePoints;
    save.upgrades = { ...G.upgrades };
    save.totalRuns = G.totalRuns;
    save.consecutiveDeaths = G.consecutiveDeaths;
    save.unlockedMechas = [...G.unlockedMechas];
    save.lang = G.lang;
    localStorage.setItem(SAVE_KEY, JSON.stringify(save));
    return isNewBest;
  } catch(e) { return false; }
}

// -- Calculate DDA level --
function calcDDALevel(consecutiveDeaths) {
  if (consecutiveDeaths >= 10) return 4;
  if (consecutiveDeaths >= 5) return 3;
  if (consecutiveDeaths >= 3) return 2;
  if (consecutiveDeaths >= 1) return 1;
  return 0;
}

// -- Apply upgrade --
function applyUpgrade(upgradeType, G) {
  const level = G.upgrades[upgradeType];
  if (level >= 5) return false;
  const costs = [50, 150, 400, 800, 1500];
  const cost = costs[level];
  if (G.corePoints < cost) return false;
  G.corePoints -= cost;
  G.upgrades[upgradeType] = level + 1;
  // Apply immediate effects
  if (upgradeType === 'defense' && level === 0) G.coreMaxHp += 100;
  if (upgradeType === 'utility' && level === 0) G._startEnergy = (G._startEnergy || CONFIG.START_ENERGY) + 20;
  return true;
}

// -- Get upgrade cost --
function getUpgradeCost(level) {
  const costs = [50, 150, 400, 800, 1500];
  return level < 5 ? costs[level] : 0;
}

// -- Draw title screen --
function drawTitleScreen(ctx, w, h, time, L) {
  // Dark gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0a0a0f');
  grad.addColorStop(0.5, '#1A1A2E');
  grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // Scanline effect
  ctx.fillStyle = 'rgba(0,229,255,0.015)';
  for (let y = 0; y < h; y += 3) {
    ctx.fillRect(0, y, w, 1);
  }
  // Floating particles
  for (let i = 0; i < 20; i++) {
    const px = (w * 0.5 + Math.sin(time * 0.3 + i * 1.1) * w * 0.4);
    const py = (h * 0.5 + Math.cos(time * 0.4 + i * 0.9) * h * 0.35);
    const size = 1.5 + Math.sin(time + i) * 1;
    ctx.fillStyle = i % 3 === 0 ? COL.energyCyan : i % 3 === 1 ? COL.mechaBlue : COL.missileOrange;
    ctx.globalAlpha = 0.3 + Math.sin(time * 2 + i) * 0.2;
    ctx.beginPath(); ctx.arc(px, py, size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Title with glitch effect
  const titleSize = Math.min(48, w * 0.08);
  ctx.font = `bold ${titleSize}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Glitch offset
  const glitchX = Math.sin(time * 15) > 0.95 ? (Math.sin(time * 100) * 3) : 0;
  const glitchY = Math.sin(time * 12) > 0.97 ? (Math.sin(time * 80) * 2) : 0;
  // Shadow
  ctx.fillStyle = COL.energyCyan;
  ctx.globalAlpha = 0.3;
  ctx.fillText(L.title, w/2 + 2 + glitchX, h * 0.32 + 2);
  ctx.globalAlpha = 1;
  // Main title
  ctx.fillStyle = COL.uiWhite;
  ctx.fillText(L.title, w/2 + glitchX, h * 0.32 + glitchY);
  // Subtitle
  ctx.font = `${titleSize * 0.4}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillStyle = COL.energyCyan;
  ctx.fillText(L.subtitle, w/2, h * 0.42);
  // Mecha silhouette (Canvas procedural)
  ctx.globalAlpha = 0.3 + Math.sin(time) * 0.1;
  const imgSize = Math.min(w * 0.2, 120);
  drawMecha(ctx, w/2, h * 0.55, imgSize, 0, 2, time);
  ctx.globalAlpha = 1;
  // Start prompt
  ctx.font = `${titleSize * 0.35}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillStyle = COL.uiWhite;
  ctx.globalAlpha = 0.5 + Math.sin(time * 3) * 0.5;
  ctx.fillText(L.tapToStart, w/2, h * 0.82);
  ctx.globalAlpha = 1;
  // Best score
  const save = loadSave();
  if (save.bestScore > 0) {
    ctx.font = `${titleSize * 0.28}px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillStyle = COL.gold;
    ctx.fillText(`${L.best}: ${save.bestScore}`, w/2, h * 0.9);
  }
  // Lang toggle button
  ctx.font = `bold 14px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillStyle = 'rgba(200,200,220,0.5)';
  ctx.textAlign = 'right';
  ctx.fillText(L.langSwitch, w - 15, 20);
  ctx.textAlign = 'left';
}

// -- Draw HUB screen (upgrade tree) --
function drawHUBScreen(ctx, w, h, G, L, time) {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);
  // Title
  const ts = Math.min(32, w * 0.05);
  ctx.font = `bold ${ts}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.uiWhite;
  ctx.fillText(L.hub, w/2, h * 0.08);
  // Core points
  ctx.fillStyle = COL.gold;
  ctx.font = `bold ${ts * 0.7}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`${L.corePoints}: ${G.corePoints}`, w/2, h * 0.15);
  // 3 upgrade branches
  const branches = ['firepower', 'defense', 'utility'];
  const branchNames = [L.firepower, L.defense, L.utility];
  const branchColors = [COL.enemyRed, COL.mechaBlue, COL.gold];
  const cardW = Math.min(180, w * 0.28);
  const cardH = 180;
  const totalW = 3 * cardW + 2 * 20;
  const startX = (w - totalW) / 2;
  const cardY = h * 0.22;
  G._hubUpgradeRects = [];
  for (let i = 0; i < 3; i++) {
    const cx = startX + i * (cardW + 20);
    const level = G.upgrades[branches[i]];
    const cost = getUpgradeCost(level);
    const canAfford = G.corePoints >= cost && level < 5;
    // Card
    ctx.fillStyle = 'rgba(18,18,30,0.95)';
    ctx.fillRect(cx, cardY, cardW, cardH);
    ctx.strokeStyle = canAfford ? branchColors[i] : 'rgba(100,100,140,0.3)';
    ctx.lineWidth = canAfford ? 2 : 1;
    ctx.strokeRect(cx, cardY, cardW, cardH);
    // Branch name
    ctx.fillStyle = branchColors[i];
    ctx.font = `bold ${ts * 0.5}px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillText(branchNames[i], cx + cardW/2, cardY + 25);
    // Level
    ctx.fillStyle = COL.uiWhite;
    ctx.font = `${ts * 0.4}px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillText(`Lv.${level}/5`, cx + cardW/2, cardY + 50);
    // Level pips
    for (let j = 0; j < 5; j++) {
      ctx.fillStyle = j < level ? branchColors[i] : 'rgba(60,60,80,0.5)';
      const pipX = cx + cardW * 0.2 + j * cardW * 0.15;
      ctx.fillRect(pipX, cardY + 65, cardW * 0.1, 8);
    }
    // Cost
    if (level < 5) {
      ctx.fillStyle = canAfford ? COL.gold : '#666';
      ctx.font = `${ts * 0.35}px 'Segoe UI',system-ui,sans-serif`;
      ctx.fillText(`${cost} CP`, cx + cardW/2, cardY + 100);
      // Upgrade button
      const btnW = cardW * 0.6;
      const btnH = 32;
      const btnX = cx + (cardW - btnW)/2;
      const btnY2 = cardY + 115;
      ctx.fillStyle = canAfford ? 'rgba(0,229,255,0.15)' : 'rgba(40,40,60,0.3)';
      ctx.fillRect(btnX, btnY2, btnW, btnH);
      ctx.strokeStyle = canAfford ? COL.energyCyan : 'rgba(100,100,140,0.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(btnX, btnY2, btnW, btnH);
      ctx.fillStyle = canAfford ? COL.energyCyan : '#666';
      ctx.font = `bold ${ts * 0.3}px 'Segoe UI',system-ui,sans-serif`;
      ctx.fillText(L.upgrade, cx + cardW/2, btnY2 + btnH/2);
      G._hubUpgradeRects.push({ x: btnX, y: btnY2, w: btnW, h: btnH, branch: branches[i], canAfford });
    } else {
      ctx.fillStyle = branchColors[i];
      ctx.font = `bold ${ts * 0.35}px 'Segoe UI',system-ui,sans-serif`;
      ctx.fillText('MAX', cx + cardW/2, cardY + 110);
      G._hubUpgradeRects.push(null);
    }
  }
  // Deploy button
  const deployW = 200;
  const deployH = 48;
  const deployX = w/2 - deployW/2;
  const deployY = h * 0.78;
  ctx.fillStyle = 'rgba(0,229,255,0.2)';
  ctx.fillRect(deployX, deployY, deployW, deployH);
  ctx.strokeStyle = COL.energyCyan; ctx.lineWidth = 2;
  ctx.strokeRect(deployX, deployY, deployW, deployH);
  ctx.fillStyle = COL.energyCyan;
  ctx.font = `bold ${ts * 0.5}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(L.start, w/2, deployY + deployH/2);
  G._deployBtnRect = { x: deployX, y: deployY, w: deployW, h: deployH };
  // Stats
  ctx.fillStyle = '#8080a0';
  ctx.font = `${ts * 0.3}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText(`${L.totalRuns}: ${G.totalRuns}  |  ${L.bestZone}: ${G._bestZone + 1}  |  ${L.best}: ${G._bestScore}`, w/2, h * 0.92);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}
