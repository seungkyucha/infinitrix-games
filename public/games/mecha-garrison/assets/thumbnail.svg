<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="60%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="mecha" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#1e3a6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="85" cy="50" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="18" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="220" cy="40" r="1.3" fill="#fff" opacity="0.9"/>
  <circle cx="310" cy="22" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="370" cy="55" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="55" cy="70" r="0.6" fill="#fff" opacity="0.4"/>
  <circle cx="340" cy="15" r="0.9" fill="#fff" opacity="0.6"/>

  <!-- Distant city silhouette -->
  <rect x="0" y="210" width="400" height="90" fill="url(#ground)"/>
  <rect x="10" y="195" width="18" height="25" fill="#12202e" rx="1"/>
  <rect x="35" y="185" width="12" height="35" fill="#0f1c28" rx="1"/>
  <rect x="55" y="190" width="22" height="30" fill="#12202e" rx="1"/>
  <rect x="85" y="180" width="15" height="40" fill="#0f1c28" rx="1"/>
  <rect x="290" y="188" width="20" height="32" fill="#12202e" rx="1"/>
  <rect x="320" y="178" width="14" height="42" fill="#0f1c28" rx="1"/>
  <rect x="345" y="192" width="25" height="28" fill="#12202e" rx="1"/>
  <rect x="375" y="185" width="18" height="35" fill="#0f1c28" rx="1"/>

  <!-- Grid lines on ground -->
  <line x1="0" y1="220" x2="400" y2="220" stroke="#00ffcc" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#00ffcc" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#00ffcc" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="280" x2="400" y2="280" stroke="#00ffcc" stroke-width="0.2" opacity="0.05"/>

  <!-- Central Mecha Unit (Main Hero) -->
  <g transform="translate(200, 130)">
    <!-- Mecha legs -->
    <rect x="-22" y="50" width="12" height="40" fill="#2a4a7a" rx="2"/>
    <rect x="10" y="50" width="12" height="40" fill="#2a4a7a" rx="2"/>
    <!-- Feet -->
    <rect x="-26" y="85" width="20" height="8" fill="#3a5a8a" rx="2"/>
    <rect x="6" y="85" width="20" height="8" fill="#3a5a8a" rx="2"/>

    <!-- Mecha body -->
    <rect x="-25" y="10" width="50" height="45" fill="url(#mecha)" rx="4"/>
    <!-- Chest reactor -->
    <circle cx="0" cy="32" r="10" fill="#001a33" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="0" cy="32" r="5" fill="#00ffcc" opacity="0.9" filter="url(#neon)"/>

    <!-- Mecha head -->
    <rect x="-14" y="-10" width="28" height="22" fill="#3a6aaa" rx="3"/>
    <!-- Visor -->
    <rect x="-10" y="-4" width="20" height="8" fill="#00ffcc" rx="2" filter="url(#neon)" opacity="0.9"/>

    <!-- Left arm + cannon -->
    <rect x="-42" y="14" width="16" height="12" fill="#2a5a9a" rx="2"/>
    <rect x="-55" y="10" width="16" height="20" fill="#3a6aaa" rx="3"/>
    <rect x="-62" y="14" width="10" height="12" fill="#4a7abb" rx="2"/>
    <!-- Cannon barrel -->
    <rect x="-76" y="17" width="16" height="6" fill="#5a8acc" rx="1"/>
    <!-- Muzzle flash -->
    <circle cx="-80" cy="20" r="6" fill="#00ffcc" opacity="0.4" filter="url(#softGlow)"/>

    <!-- Right arm + shield -->
    <rect x="26" y="14" width="16" height="12" fill="#2a5a9a" rx="2"/>
    <rect x="39" y="8" width="18" height="30" fill="#3a6aaa" rx="3"/>
    <!-- Shield -->
    <path d="M44,5 L62,10 L62,38 L44,42 Z" fill="#00aaff" opacity="0.3" stroke="#00ffcc" stroke-width="1.5"/>

    <!-- Shoulder pads -->
    <rect x="-32" y="6" width="14" height="10" fill="#4a7abb" rx="2"/>
    <rect x="18" y="6" width="14" height="10" fill="#4a7abb" rx="2"/>

    <!-- Energy glow around mecha -->
    <ellipse cx="0" cy="45" rx="45" ry="8" fill="#00ffcc" opacity="0.08" filter="url(#softGlow)"/>
  </g>

  <!-- Left small mecha -->
  <g transform="translate(70, 170) scale(0.5)">
    <rect x="-20" y="30" width="10" height="30" fill="#2a4a6a" rx="2"/>
    <rect x="10" y="30" width="10" height="30" fill="#2a4a6a" rx="2"/>
    <rect x="-22" y="5" width="44" height="30" fill="#2a5a8a" rx="3"/>
    <circle cx="0" cy="20" r="6" fill="#00ffcc" opacity="0.7" filter="url(#neon)"/>
    <rect x="-12" y="-10" width="24" height="16" fill="#3a6a9a" rx="2"/>
    <rect x="-8" y="-5" width="16" height="6" fill="#00ffcc" rx="1" opacity="0.8"/>
    <rect x="-40" y="10" width="20" height="6" fill="#4a7aaa" rx="1"/>
  </g>

  <!-- Right small mecha -->
  <g transform="translate(330, 175) scale(0.45)">
    <rect x="-20" y="30" width="10" height="30" fill="#2a4a6a" rx="2"/>
    <rect x="10" y="30" width="10" height="30" fill="#2a4a6a" rx="2"/>
    <rect x="-22" y="5" width="44" height="30" fill="#2a5a8a" rx="3"/>
    <circle cx="0" cy="20" r="6" fill="#00ffcc" opacity="0.7" filter="url(#neon)"/>
    <rect x="-12" y="-10" width="24" height="16" fill="#3a6a9a" rx="2"/>
    <rect x="-8" y="-5" width="16" height="6" fill="#00ffcc" rx="1" opacity="0.8"/>
    <rect x="20" y="10" width="20" height="6" fill="#4a7aaa" rx="1"/>
  </g>

  <!-- Incoming alien enemies (top right) -->
  <g filter="url(#neon)">
    <!-- Enemy 1 -->
    <polygon points="340,60 350,45 360,60 355,58 350,65 345,58" fill="#ff3366" opacity="0.8"/>
    <circle cx="350" cy="55" r="2" fill="#ff6699"/>
    <!-- Enemy 2 -->
    <polygon points="360,80 370,65 380,80 375,78 370,85 365,78" fill="#ff3366" opacity="0.6"/>
    <circle cx="370" cy="75" r="2" fill="#ff6699"/>
    <!-- Enemy 3 -->
    <polygon points="310,75 320,60 330,75 325,73 320,80 315,73" fill="#ff3366" opacity="0.5"/>
    <circle cx="320" cy="70" r="2" fill="#ff6699"/>
  </g>

  <!-- Laser beams from mecha -->
  <line x1="124" y1="140" x2="320" y2="70" stroke="#00ffcc" stroke-width="2" opacity="0.6" filter="url(#neon)"/>
  <line x1="124" y1="140" x2="350" y2="55" stroke="#00ffcc" stroke-width="1.5" opacity="0.4" filter="url(#neon)"/>

  <!-- Explosion particles -->
  <circle cx="320" cy="68" r="8" fill="#ff6633" opacity="0.4" filter="url(#softGlow)"/>
  <circle cx="348" cy="52" r="6" fill="#ffaa33" opacity="0.3" filter="url(#softGlow)"/>

  <!-- HUD overlay elements -->
  <rect x="15" y="12" width="80" height="6" rx="3" fill="#1a1a3e" stroke="#00ffcc" stroke-width="0.5" opacity="0.7"/>
  <rect x="16" y="13" width="55" height="4" rx="2" fill="#00ffcc" opacity="0.6"/>
  <rect x="15" y="22" width="60" height="4" rx="2" fill="#1a1a3e" stroke="#ff6633" stroke-width="0.5" opacity="0.6"/>
  <rect x="16" y="23" width="40" height="2" rx="1" fill="#ff6633" opacity="0.5"/>

  <!-- Wave indicator -->
  <text x="385" y="18" font-family="monospace" font-size="9" fill="#00ffcc" text-anchor="end" opacity="0.7">WAVE 03</text>
  <text x="385" y="28" font-family="monospace" font-size="7" fill="#ff9966" text-anchor="end" opacity="0.5">SECTOR 2</text>

  <!-- Title -->
  <text x="200" y="280" font-family="'Arial Black', 'Impact', sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#neon)" letter-spacing="3">MECHA GARRISON</text>
  <text x="200" y="296" font-family="Arial, sans-serif" font-size="10" fill="#00ffcc" text-anchor="middle" opacity="0.7" letter-spacing="5">TOWER DEFENSE</text>
</svg>