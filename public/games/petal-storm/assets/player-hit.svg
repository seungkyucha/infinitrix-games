<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="h-bodyGrad" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="60%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#060e16"/>
    </radialGradient>
    <linearGradient id="h-robeGrad" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.75"/>
      <stop offset="35%" stop-color="#ddd0c0" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#c8b8a8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b0a090" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="h-robeEdgeGrad" x1="0" y1="0.3" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#ff6b8a" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#ff4060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cc2040" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="h-hairGrad" x1="0.75" y1="0" x2="0.25" y2="1">
      <stop offset="0%" stop-color="#d4d0c8"/>
      <stop offset="40%" stop-color="#a8a29e"/>
      <stop offset="75%" stop-color="#807a74" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#68625c" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="h-painAuraGrad" cx="48%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#ff6b8a" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#ff4060" stop-opacity="0.2"/>
      <stop offset="65%" stop-color="#cc2040" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#990020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h-wingLeftGrad" x1="0" y1="0.2" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c8a000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8a7000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="h-wingRightGrad" x1="1" y1="0.2" x2="0" y2="0.8">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c8a000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8a7000" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="h-flashGrad" cx="46%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ff2040" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#ff6b8a" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ff0030" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#990000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h-crackGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b8a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="h-painGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="outerBlur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="innerBlur"/>
      <feColorMatrix in="innerBlur" type="matrix" result="redShift"
        values="1.2 0 0 0 0.1
                0 0.3 0 0 0
                0 0 0.4 0 0
                0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode in="outerBlur"/>
        <feMergeNode in="redShift"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="h-wingDimGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComponentTransfer in="blur" result="dimmed">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="dimmed"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="h-redFlash" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="bigBlur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="smallBlur"/>
      <feMerge>
        <feMergeNode in="bigBlur"/>
        <feMergeNode in="smallBlur"/>
      </feMerge>
    </filter>
    <filter id="h-hairGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="h-sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Pain effects — red flash aura behind everything -->
  <g id="h-pain-effects">
    <ellipse cx="272" cy="268" rx="210" ry="240" fill="url(#h-flashGrad)" filter="url(#h-redFlash)"/>
    <ellipse cx="270" cy="258" rx="145" ry="185" fill="url(#h-painAuraGrad)" filter="url(#h-painGlow)"/>
    <line x1="185" y1="195" x2="135" y2="165" stroke="#ff6b8a" stroke-width="2.2" opacity="0.55" stroke-linecap="round"/>
    <line x1="175" y1="255" x2="118" y2="242" stroke="#ff6b8a" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    <line x1="190" y1="315" x2="142" y2="328" stroke="#ff4060" stroke-width="1.6" opacity="0.38" stroke-linecap="round"/>
    <line x1="205" y1="165" x2="168" y2="135" stroke="#ff6b8a" stroke-width="1.3" opacity="0.32" stroke-linecap="round"/>
    <line x1="178" y1="360" x2="138" y2="370" stroke="#ff4060" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
    <circle cx="148" cy="185" r="3.5" fill="#ff6b8a" opacity="0.65"/>
    <circle cx="132" cy="268" r="2.8" fill="#ff4060" opacity="0.55"/>
    <circle cx="155" cy="342" r="2.2" fill="#ff6b8a" opacity="0.42"/>
    <circle cx="355" cy="198" r="2" fill="#ff6b8a" opacity="0.3"/>
    <circle cx="125" cy="220" r="1.8" fill="#ff4060" opacity="0.35"/>
    <circle cx="165" cy="150" r="1.5" fill="#ffffff" opacity="0.4"/>
  </g>
  <!-- Layer 2: Wings — dimmer, slightly folded from pain -->
  <g id="h-wings" filter="url(#h-wingDimGlow)" opacity="0.7">
    <path d="M240 228 C225 182, 165 148, 132 170 C108 188, 122 222, 152 233
             C167 239, 202 242, 240 236 Z"
          fill="url(#h-wingLeftGrad)" opacity="0.55"/>
    <path d="M240 240 C222 256, 175 276, 155 262 C134 247, 142 224, 158 231
             C175 238, 210 245, 240 242 Z"
          fill="url(#h-wingLeftGrad)" opacity="0.38"/>
    <path d="M298 228 C312 185, 368 150, 398 174 C420 192, 406 224, 378 235
             C363 241, 330 244, 298 237 Z"
          fill="url(#h-wingRightGrad)" opacity="0.55"/>
    <path d="M298 240 C314 258, 358 280, 378 266 C398 251, 390 226, 374 233
             C356 240, 322 246, 298 243 Z"
          fill="url(#h-wingRightGrad)" opacity="0.38"/>
    <path d="M238 230 C214 196, 170 168, 140 178" stroke="#fff8e1" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M300 230 C324 198, 364 170, 392 182" stroke="#fff8e1" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M238 234 C220 210, 180 185, 150 195" stroke="#ffd700" stroke-width="0.4" fill="none" opacity="0.15"/>
    <path d="M300 234 C318 212, 355 188, 385 198" stroke="#ffd700" stroke-width="0.4" fill="none" opacity="0.15"/>
  </g>
  <!-- Layer 3: Body and robe — flinching backward -->
  <g id="h-body-robe" transform="rotate(-4 268 350)">
    <path d="M230 248 C224 288, 212 348, 202 408
             C197 438, 207 472, 227 490
             Q254 506, 270 508 Q286 506, 316 490
             C336 472, 344 438, 340 408
             C330 348, 316 288, 310 248 Z"
          fill="url(#h-robeGrad)"/>
    <path d="M240 268 C236 308, 226 368, 220 418
             C217 443, 230 468, 250 480
             Q262 487, 270 489 Q278 487, 292 480
             C312 468, 324 443, 320 418
             C314 368, 304 308, 300 268 Z"
          fill="#0d1b2a" opacity="0.35"/>
    <path d="M202 408 C197 438, 207 472, 227 490
             Q254 506, 270 508 Q286 506, 316 490
             C336 472, 344 438, 340 408"
          stroke="url(#h-robeEdgeGrad)" stroke-width="4.5" fill="none" opacity="0.85"/>
    <path d="M208 425 C204 450, 214 475, 232 488" stroke="#ff6b8a" stroke-width="2.2" fill="none" opacity="0.55"/>
    <path d="M334 425 C338 450, 328 475, 310 488" stroke="#ff6b8a" stroke-width="2.2" fill="none" opacity="0.55"/>
    <path d="M227 490 Q254 506, 270 508 Q286 506, 316 490"
          stroke="#ff6b8a" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M248 310 Q260 350, 255 400" stroke="#0d1b2a" stroke-width="0.8" fill="none" opacity="0.2"/>
    <path d="M288 310 Q278 350, 282 400" stroke="#0d1b2a" stroke-width="0.8" fill="none" opacity="0.2"/>
    <path d="M246 247 Q270 238, 294 247" stroke="#f0e6d3" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M255 380 L248 400 L260 395 L252 420" stroke="url(#h-crackGrad)" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M285 375 L292 398 L280 392 L290 415" stroke="url(#h-crackGrad)" stroke-width="0.8" fill="none" opacity="0.3"/>
  </g>
  <!-- Layer 4: Head — tilted back from flinch -->
  <g id="h-head">
    <ellipse cx="270" cy="178" rx="38" ry="46" fill="url(#h-bodyGrad)" transform="rotate(-10 270 178)"/>
    <ellipse cx="260" cy="167" rx="24" ry="28" fill="#1b2838" opacity="0.45"/>
    <ellipse cx="274" cy="176" rx="16" ry="19" fill="#ff6b8a" opacity="0.1"/>
    <path d="M256 172 Q260 170, 264 172" stroke="#0d1b2a" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M274 170 Q278 168, 282 170" stroke="#0d1b2a" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M250 160 Q258 153, 264 160" fill="#2a3a4f" opacity="0.2"/>
  </g>
  <!-- Layer 5: Hair — wildly windswept backward from impact force -->
  <g id="h-hair" filter="url(#h-hairGlow)">
    <path d="M232 170 C224 145, 240 118, 270 113
             C300 118, 316 145, 308 170
             C318 180, 335 205, 348 235
             C356 260, 355 288, 352 318
             L344 300 C346 275, 344 250, 336 230
             C324 200, 248 192, 234 200
             C228 218, 224 244, 227 265
             L220 278 C214 252, 210 230, 216 212
             C220 194, 226 180, 232 170 Z"
          fill="url(#h-hairGrad)"/>
    <path d="M352 318 C366 348, 378 380, 374 412" stroke="#a8a29e" stroke-width="2.8" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M344 300 C362 332, 372 364, 366 396" stroke="#9e9a94" stroke-width="2.2" fill="none" opacity="0.42" stroke-linecap="round"/>
    <path d="M220 278 C214 310, 218 342, 224 368" stroke="#a8a29e" stroke-width="2.4" fill="none" opacity="0.42" stroke-linecap="round"/>
    <path d="M356 328 C374 358, 384 390, 380 418" stroke="#908a84" stroke-width="1.6" fill="none" opacity="0.32" stroke-linecap="round"/>
    <path d="M308 130 C335 118, 368 122, 392 138" stroke="#c0bab4" stroke-width="1.8" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M302 142 C328 133, 360 138, 380 155" stroke="#b0aaa4" stroke-width="1.4" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M312 120 C342 105, 380 110, 405 128" stroke="#c8c2bc" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M224 150 C210 135, 200 118, 195 100" stroke="#b0aaa4" stroke-width="1.2" fill="none" opacity="0.28" stroke-linecap="round"/>
    <path d="M360 340 C375 355, 382 375, 378 395" stroke="#78716c" stroke-width="1.3" fill="none" opacity="0.25" stroke-linecap="round"/>
    <path d="M254 128 Q265 122, 280 128" stroke="#e0dcd5" stroke-width="0.9" fill="none" opacity="0.45"/>
    <path d="M260 138 Q272 132, 288 138" stroke="#d0ccc5" stroke-width="0.7" fill="none" opacity="0.3"/>
  </g>
  <!-- Layer 6: Arms — flung outward/back from impact -->
  <g id="h-arms" transform="rotate(-4 268 350)">
    <path d="M240 262 C226 280, 214 298, 208 315
             C205 324, 210 328, 216 326
             C220 324, 218 316, 215 308"
          fill="#0d1b2a" opacity="0.82"/>
    <path d="M300 260 C314 278, 326 295, 334 310
             C337 318, 332 323, 326 320
             C322 318, 324 310, 328 302"
          fill="#0d1b2a" opacity="0.82"/>
    <path d="M240 262 C230 274, 222 290, 216 304" stroke="#f0e6d3" stroke-width="0.9" fill="none" opacity="0.35"/>
    <path d="M240 264 C232 276, 224 292, 218 306" stroke="#ff6b8a" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M300 260 C310 272, 320 288, 328 302" stroke="#f0e6d3" stroke-width="0.9" fill="none" opacity="0.35"/>
    <path d="M300 262 C308 274, 318 290, 326 304" stroke="#ff6b8a" stroke-width="0.5" fill="none" opacity="0.2"/>
  </g>
  <!-- Layer 7: Impact sparks and energy dissipation -->
  <g id="h-impact-sparks" filter="url(#h-sparkGlow)">
    <circle cx="190" cy="225" r="3" fill="#ff6b8a" opacity="0.75"/>
    <circle cx="172" cy="295" r="2.5" fill="#ff4060" opacity="0.6"/>
    <circle cx="348" cy="245" r="2" fill="#ff6b8a" opacity="0.45"/>
    <circle cx="155" cy="218" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="145" cy="275" r="1.5" fill="#ffffff" opacity="0.45"/>
    <circle cx="365" cy="215" r="1.3" fill="#ff6b8a" opacity="0.3"/>
    <circle cx="195" cy="180" r="1.5" fill="#b388ff" opacity="0.4"/>
    <circle cx="340" cy="185" r="1.2" fill="#b388ff" opacity="0.3"/>
    <circle cx="165" cy="310" r="1.8" fill="#00e5ff" opacity="0.25"/>
    <circle cx="350" cy="290" r="1.3" fill="#00e5ff" opacity="0.2"/>
  </g>
  <!-- Layer 8: Foreground damage overlay — screen-like red flash -->
  <g id="h-damage-overlay" opacity="0.15">
    <rect x="0" y="0" width="512" height="512" fill="#ff2040" rx="4"/>
  </g>
</svg>