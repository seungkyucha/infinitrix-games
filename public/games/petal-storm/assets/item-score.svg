<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="pinkPetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffb3c6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6b8a" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="lavPetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4b3ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="goldPetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff0a0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="centerShine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="itemGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>
  <!-- Overall soft glow backdrop -->
  <circle cx="32" cy="34" r="16" fill="#ff6b8a" opacity="0.15" filter="url(#itemGlow)"/>
  <!-- Petal 1: pink, top-left -->
  <path d="M28 18 C22 22, 18 30, 22 34 C26 38, 30 34, 32 32 C30 26, 30 20, 28 18Z"
        fill="url(#pinkPetal)" filter="url(#softBlur)" opacity="0.9"/>
  <!-- Petal 2: lavender, top-right -->
  <path d="M38 20 C44 24, 46 32, 42 36 C38 40, 34 36, 32 32 C36 28, 38 22, 38 20Z"
        fill="url(#lavPetal)" filter="url(#softBlur)" opacity="0.85"/>
  <!-- Petal 3: pink, bottom-right -->
  <path d="M40 38 C42 44, 38 48, 34 46 C30 44, 30 40, 32 36 C36 38, 38 38, 40 38Z"
        fill="url(#pinkPetal)" filter="url(#softBlur)" opacity="0.8"/>
  <!-- Petal 4: gold, bottom-left -->
  <path d="M22 40 C18 44, 20 48, 26 46 C30 44, 32 40, 32 36 C28 38, 24 40, 22 40Z"
        fill="url(#goldPetal)" filter="url(#softBlur)" opacity="0.85"/>
  <!-- Small accent petal: lavender, behind -->
  <path d="M32 14 C36 18, 38 26, 36 30 C34 28, 30 26, 28 28 C28 22, 30 16, 32 14Z"
        fill="url(#lavPetal)" opacity="0.5" filter="url(#softBlur)"/>
  <!-- Center sparkle glow -->
  <circle cx="32" cy="34" r="6" fill="url(#centerShine)" filter="url(#itemGlow)"/>
  <!-- Center bright dot -->
  <circle cx="32" cy="34" r="2" fill="#ffffff" opacity="1"/>
  <!-- Sparkle arm top -->
  <polygon points="32,24 33,32 32,34 31,32" fill="#ffffff" opacity="0.7"/>
  <!-- Sparkle arm right -->
  <polygon points="40,34 34,35 32,34 34,33" fill="#ffffff" opacity="0.7"/>
  <!-- Sparkle arm bottom -->
  <polygon points="32,42 31,36 32,34 33,36" fill="#ffffff" opacity="0.6"/>
  <!-- Sparkle arm left -->
  <polygon points="24,34 30,33 32,34 30,35" fill="#ffffff" opacity="0.6"/>
  <!-- Tiny highlight dots -->
  <circle cx="26" cy="26" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="38" cy="28" r="0.8" fill="#ffffff" opacity="0.4"/>
</svg>