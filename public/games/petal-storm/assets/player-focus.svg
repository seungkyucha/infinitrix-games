<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients -->
    <radialGradient id="f-bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="80%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#070f18"/>
    </radialGradient>
    <linearGradient id="f-robeGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#e0d6c3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c8bfb0" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="f-hairGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#d0ccc5"/>
      <stop offset="50%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#78716c" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="f-wingGlowGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffc800" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffa000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f-orbGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#00b8d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0088a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f-auraGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#7c4dff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6200ea" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="f-wingLeftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffb300" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="f-wingRightGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffb300" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="f-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="f-wingGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="f-orbGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="outerBlur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="innerBlur"/>
      <feMerge>
        <feMergeNode in="outerBlur"/>
        <feMergeNode in="innerBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="f-auraFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="f-hairGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Aura group -->
  <g id="f-aura">
    <ellipse cx="256" cy="280" rx="160" ry="200" fill="url(#f-auraGrad)" filter="url(#f-auraFilter)"/>
    <ellipse cx="256" cy="260" rx="100" ry="130" fill="#b388ff" opacity="0.06" filter="url(#f-auraFilter)"/>
  </g>

  <!-- Wings group — brighter glow for focus mode -->
  <g id="f-wings" filter="url(#f-wingGlow)">
    <!-- Wing glow halos -->
    <ellipse cx="175" cy="210" rx="70" ry="90" fill="url(#f-wingGlowGrad)" opacity="0.5"/>
    <ellipse cx="337" cy="210" rx="70" ry="90" fill="url(#f-wingGlowGrad)" opacity="0.5"/>
    <!-- Left butterfly wing upper -->
    <path d="M230 220 C210 170, 150 130, 120 155 C95 175, 110 210, 140 225 C155 232, 190 238, 230 230 Z"
          fill="url(#f-wingLeftGrad)" opacity="0.9"/>
    <!-- Left butterfly wing lower -->
    <path d="M230 235 C210 250, 160 275, 140 260 C118 244, 125 215, 145 225 C165 233, 200 240, 230 238 Z"
          fill="url(#f-wingLeftGrad)" opacity="0.7"/>
    <!-- Right butterfly wing upper -->
    <path d="M282 220 C302 170, 362 130, 392 155 C417 175, 402 210, 372 225 C357 232, 322 238, 282 230 Z"
          fill="url(#f-wingRightGrad)" opacity="0.9"/>
    <!-- Right butterfly wing lower -->
    <path d="M282 235 C302 250, 352 275, 372 260 C394 244, 387 215, 367 225 C347 233, 312 240, 282 238 Z"
          fill="url(#f-wingRightGrad)" opacity="0.7"/>
    <!-- Wing vein details -->
    <path d="M228 222 C200 185, 155 155, 130 165" stroke="#fff8e1" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M284 222 C312 185, 357 155, 382 165" stroke="#fff8e1" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Body / Robe group -->
  <g id="f-body-robe">
    <!-- Main robe shape — slightly narrower, collected pose -->
    <path d="M216 240 C210 280, 195 340, 185 400 C180 430, 190 470, 210 485
             Q240 500, 256 502 Q272 500, 302 485
             C322 470, 332 430, 327 400 C317 340, 302 280, 296 240 Z"
          fill="url(#f-robeGrad)"/>
    <!-- Robe inner shadow -->
    <path d="M226 260 C222 300, 210 360, 205 410 C202 435, 215 462, 235 475
             Q248 482, 256 484 Q264 482, 277 475
             C297 462, 310 435, 307 410 C302 360, 290 300, 286 260 Z"
          fill="#0d1b2a" opacity="0.3"/>
    <!-- Robe hem luminous edge -->
    <path d="M210 485 Q240 500, 256 502 Q272 500, 302 485"
          stroke="#f0e6d3" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Robe collar detail -->
    <path d="M232 240 Q256 232, 280 240" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Head group -->
  <g id="f-head">
    <!-- Head silhouette -->
    <ellipse cx="256" cy="175" rx="38" ry="46" fill="url(#f-bodyGrad)"/>
    <!-- Ethereal celestial glow (top-left light) -->
    <ellipse cx="246" cy="165" rx="25" ry="30" fill="#1b2838" opacity="0.5"/>
    <!-- Subtle face highlight from light direction -->
    <path d="M235 160 Q245 150, 252 158 Q248 168, 235 165 Z" fill="#2a3a4f" opacity="0.3"/>
  </g>

  <!-- Hair group -->
  <g id="f-hair" filter="url(#f-hairGlow)">
    <!-- Main hair mass -->
    <path d="M218 165 C210 140, 225 115, 256 110 C287 115, 302 140, 294 165
             C300 175, 305 195, 308 220 C310 240, 300 260, 295 280
             L290 265 C294 240, 296 215, 290 195
             C280 185, 232 185, 222 195
             C216 215, 218 240, 222 265
             L217 280 C212 260, 202 240, 204 220
             C207 195, 212 175, 218 165 Z"
          fill="url(#f-hairGrad)"/>
    <!-- Hair strands flowing down -->
    <path d="M217 280 C212 310, 208 340, 215 370" stroke="#a8a29e" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M295 280 C300 310, 304 340, 297 370" stroke="#a8a29e" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M210 270 C205 295, 200 325, 208 355" stroke="#9e9a94" stroke-width="1.8" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M302 270 C307 295, 312 325, 304 355" stroke="#9e9a94" stroke-width="1.8" fill="none" opacity="0.35" stroke-linecap="round"/>
    <!-- Hair shimmer highlights -->
    <path d="M240 125 Q250 120, 260 125" stroke="#e0dcd5" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M230 135 Q245 128, 265 135" stroke="#d0ccc5" stroke-width="0.8" fill="none" opacity="0.4"/>
  </g>

  <!-- Hands group — clasped in front of chest -->
  <g id="f-hands">
    <!-- Left arm coming to center -->
    <path d="M226 260 C220 275, 230 290, 244 295 Q250 297, 256 296"
          fill="#0d1b2a" opacity="0.85"/>
    <!-- Right arm coming to center -->
    <path d="M286 260 C292 275, 282 290, 268 295 Q262 297, 256 296"
          fill="#0d1b2a" opacity="0.85"/>
    <!-- Clasped hands detail -->
    <ellipse cx="256" cy="294" rx="18" ry="10" fill="#0d1b2a"/>
    <!-- Finger highlights -->
    <path d="M244 290 Q250 285, 256 290 Q262 285, 268 290" stroke="#1b2838" stroke-width="1.2" fill="none" opacity="0.6"/>
    <!-- Sleeve edges -->
    <path d="M226 260 C224 265, 228 272, 235 278" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M286 260 C288 265, 284 272, 277 278" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Glow orb group — hitbox visualization -->
  <g id="f-glow-orb" filter="url(#f-orbGlow)">
    <!-- Outer orb halo -->
    <circle cx="256" cy="294" r="28" fill="#00e5ff" opacity="0.1"/>
    <!-- Mid orb ring -->
    <circle cx="256" cy="294" r="18" fill="#00e5ff" opacity="0.2"/>
    <!-- Inner orb -->
    <circle cx="256" cy="294" r="10" fill="url(#f-orbGrad)"/>
    <!-- Orb core -->
    <circle cx="254" cy="291" r="4" fill="#ffffff" opacity="0.9"/>
    <!-- Orb sparkle lines -->
    <line x1="256" y1="278" x2="256" y2="270" stroke="#00e5ff" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
    <line x1="270" y1="288" x2="276" y2="284" stroke="#00e5ff" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="242" y1="288" x2="236" y2="284" stroke="#00e5ff" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="256" y1="310" x2="256" y2="316" stroke="#00e5ff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Additional ethereal particles -->
  <g id="f-particles" opacity="0.6">
    <circle cx="200" cy="180" r="2" fill="#ffd700" opacity="0.5" filter="url(#f-softGlow)"/>
    <circle cx="310" cy="190" r="1.5" fill="#ffd700" opacity="0.4" filter="url(#f-softGlow)"/>
    <circle cx="180" cy="250" r="1.8" fill="#b388ff" opacity="0.35" filter="url(#f-softGlow)"/>
    <circle cx="330" cy="260" r="1.5" fill="#b388ff" opacity="0.3" filter="url(#f-softGlow)"/>
    <circle cx="230" cy="150" r="1.2" fill="#00e5ff" opacity="0.4" filter="url(#f-softGlow)"/>
    <circle cx="280" cy="340" r="1.5" fill="#00e5ff" opacity="0.35" filter="url(#f-softGlow)"/>
  </g>
</svg>