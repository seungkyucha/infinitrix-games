<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Corruption gradient for trunk -->
    <linearGradient id="trunkCorrupt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="40%" stop-color="#1a0f0a"/>
      <stop offset="70%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <!-- Crimson eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2244"/>
      <stop offset="60%" stop-color="#cc0033"/>
      <stop offset="100%" stop-color="#660018" stop-opacity="0"/>
    </radialGradient>
    <!-- Dark aura gradient -->
    <radialGradient id="darkAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b2838" stop-opacity="0"/>
      <stop offset="60%" stop-color="#1b2838" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#2a1a3a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Blossom-to-thorn gradient -->
    <linearGradient id="thornPetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="50%" stop-color="#cc2244"/>
      <stop offset="100%" stop-color="#661122"/>
    </linearGradient>
    <!-- Corruption vein glow -->
    <linearGradient id="veinGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="50%" stop-color="#3a1a4a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="auraShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <filter id="eyeBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="corruptPulse" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Ominous dark purple aura -->
  <ellipse cx="256" cy="280" rx="220" ry="240" fill="url(#darkAura)" filter="url(#auraShadow)"/>

  <!-- Inner aura ring -->
  <ellipse cx="256" cy="270" rx="160" ry="180" fill="none" stroke="#2a1a4a" stroke-width="3" opacity="0.4" filter="url(#corruptPulse)"/>

  <!-- Root base -->
  <path d="M200,480 Q180,440 170,400 Q160,370 190,350 L220,340 L256,350 L292,340 L322,350 Q352,370 342,400 Q332,440 312,480 Z" fill="#1a0f0a" stroke="#0d1b2a" stroke-width="2"/>
  <!-- Root tendrils -->
  <path d="M190,460 Q140,470 110,490 Q100,495 90,510" fill="none" stroke="#1a0f0a" stroke-width="8" stroke-linecap="round"/>
  <path d="M322,460 Q370,470 400,490 Q410,495 420,510" fill="none" stroke="#1a0f0a" stroke-width="8" stroke-linecap="round"/>
  <path d="M210,470 Q170,490 150,512" fill="none" stroke="#2a1510" stroke-width="6" stroke-linecap="round"/>
  <path d="M302,470 Q340,490 362,512" fill="none" stroke="#2a1510" stroke-width="6" stroke-linecap="round"/>

  <!-- Main trunk body -->
  <path d="M220,340 Q210,280 215,220 Q218,180 230,150 L256,130 L282,150 Q294,180 297,220 Q302,280 292,340 Z" fill="url(#trunkCorrupt)" stroke="#0d1b2a" stroke-width="2"/>

  <!-- Bark texture lines -->
  <path d="M230,320 Q235,280 232,240" fill="none" stroke="#2a1510" stroke-width="2" opacity="0.5"/>
  <path d="M280,320 Q278,280 282,240" fill="none" stroke="#2a1510" stroke-width="2" opacity="0.5"/>
  <path d="M256,330 Q256,290 256,250" fill="none" stroke="#2a1510" stroke-width="1.5" opacity="0.4"/>

  <!-- Black corruption patch — right side -->
  <path d="M270,320 Q300,290 295,240 Q290,200 275,170 L282,150 Q294,180 297,220 Q302,280 292,340 Z" fill="#0d1b2a" opacity="0.85"/>
  <!-- Black corruption patch — lower left -->
  <path d="M220,340 Q215,320 218,300 Q230,310 240,330 Z" fill="#0d1b2a" opacity="0.7"/>

  <!-- Corruption veins across trunk -->
  <path d="M240,310 Q250,280 245,250 Q242,230 248,210" fill="none" stroke="url(#veinGlow)" stroke-width="3" opacity="0.8"/>
  <path d="M265,300 Q270,260 262,230 Q258,210 265,190" fill="none" stroke="url(#veinGlow)" stroke-width="2.5" opacity="0.7"/>
  <path d="M235,290 Q260,275 280,285" fill="none" stroke="#3a1a4a" stroke-width="2" opacity="0.6"/>
  <path d="M240,260 Q256,250 275,258" fill="none" stroke="#3a1a4a" stroke-width="2" opacity="0.5"/>
  <path d="M250,230 Q256,220 270,225" fill="none" stroke="#3a1a4a" stroke-width="1.5" opacity="0.6"/>

  <!-- LEFT branch-arm (longer, aggressive) -->
  <path d="M222,220 Q180,190 130,160 Q100,145 60,120" fill="none" stroke="#1a0f0a" stroke-width="14" stroke-linecap="round"/>
  <path d="M222,220 Q180,190 130,160 Q100,145 60,120" fill="none" stroke="#2a1510" stroke-width="10" stroke-linecap="round"/>
  <!-- Left arm sub-branches -->
  <path d="M150,175 Q130,200 105,215" fill="none" stroke="#1a0f0a" stroke-width="6" stroke-linecap="round"/>
  <path d="M110,150 Q90,165 65,170" fill="none" stroke="#1a0f0a" stroke-width="5" stroke-linecap="round"/>
  <path d="M80,130 Q60,140 40,138" fill="none" stroke="#2a1510" stroke-width="4" stroke-linecap="round"/>
  <!-- Left claw tips -->
  <path d="M60,120 L42,105" fill="none" stroke="#0d1b2a" stroke-width="4" stroke-linecap="round"/>
  <path d="M60,120 L50,108" fill="none" stroke="#0d1b2a" stroke-width="3" stroke-linecap="round"/>

  <!-- RIGHT branch-arm (longer, aggressive, more corrupted) -->
  <path d="M290,210 Q340,175 400,140 Q430,125 465,100" fill="none" stroke="#0d1b2a" stroke-width="14" stroke-linecap="round"/>
  <path d="M290,210 Q340,175 400,140 Q430,125 465,100" fill="none" stroke="#1a0f0a" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm sub-branches -->
  <path d="M360,160 Q380,185 405,200" fill="none" stroke="#0d1b2a" stroke-width="6" stroke-linecap="round"/>
  <path d="M410,135 Q435,148 455,155" fill="none" stroke="#0d1b2a" stroke-width="5" stroke-linecap="round"/>
  <path d="M440,115 Q460,120 475,118" fill="none" stroke="#1a0f0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Right claw tips -->
  <path d="M465,100 L480,82" fill="none" stroke="#0d1b2a" stroke-width="4" stroke-linecap="round"/>
  <path d="M465,100 L472,88" fill="none" stroke="#0d1b2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Blossom crown — transformed to thorn spikes -->
  <!-- Back layer dark blossoms -->
  <polygon points="256,60 248,90 240,68 230,95 225,70 218,98 222,75" fill="#661122" opacity="0.6"/>
  <polygon points="256,60 264,90 272,68 282,95 287,70 294,98 290,75" fill="#661122" opacity="0.6"/>

  <!-- Thorn-spike petals radiating from crown -->
  <polygon points="256,55 250,100 262,100" fill="url(#thornPetal)"/>
  <polygon points="230,65 238,105 225,100" fill="url(#thornPetal)" transform="rotate(-25,235,85)"/>
  <polygon points="282,65 274,105 287,100" fill="url(#thornPetal)" transform="rotate(25,280,85)"/>
  <polygon points="210,80 225,110 212,115" fill="url(#thornPetal)" transform="rotate(-40,218,98)"/>
  <polygon points="302,80 287,110 300,115" fill="url(#thornPetal)" transform="rotate(40,295,98)"/>
  <!-- Additional sharp thorns -->
  <polygon points="245,50 242,85 252,82" fill="#cc2244"/>
  <polygon points="267,50 270,85 260,82" fill="#cc2244"/>
  <polygon points="220,60 228,92 218,95" fill="#991133" opacity="0.8"/>
  <polygon points="292,60 284,92 294,95" fill="#991133" opacity="0.8"/>
  <!-- Small dark thorns -->
  <polygon points="238,45 236,70 244,68" fill="#661122"/>
  <polygon points="274,45 276,70 268,68" fill="#661122"/>

  <!-- Scattered corrupted petals falling -->
  <ellipse cx="180" cy="200" rx="8" ry="5" fill="#ff6b8a" opacity="0.5" transform="rotate(-30,180,200)"/>
  <ellipse cx="340" cy="180" rx="7" ry="4" fill="#cc2244" opacity="0.6" transform="rotate(20,340,180)"/>
  <ellipse cx="150" cy="280" rx="6" ry="4" fill="#cc2244" opacity="0.5" transform="rotate(-45,150,280)"/>
  <ellipse cx="360" cy="260" rx="8" ry="4" fill="#661122" opacity="0.6" transform="rotate(35,360,260)"/>
  <ellipse cx="130" cy="350" rx="7" ry="4" fill="#ff6b8a" opacity="0.4" transform="rotate(-15,130,350)"/>
  <ellipse cx="380" cy="330" rx="6" ry="3" fill="#cc2244" opacity="0.5" transform="rotate(50,380,330)"/>

  <!-- Eyes — crimson red with glow -->
  <!-- Left eye glow -->
  <ellipse cx="242" cy="195" rx="18" ry="18" fill="url(#eyeGlow)" filter="url(#eyeBloom)"/>
  <!-- Right eye glow -->
  <ellipse cx="272" cy="195" rx="18" ry="18" fill="url(#eyeGlow)" filter="url(#eyeBloom)"/>
  <!-- Left eye core -->
  <ellipse cx="242" cy="195" rx="9" ry="10" fill="#cc0033"/>
  <ellipse cx="242" cy="195" rx="4" ry="5" fill="#ff2244"/>
  <ellipse cx="242" cy="193" rx="2" ry="2" fill="#ff8899"/>
  <!-- Right eye core -->
  <ellipse cx="272" cy="195" rx="9" ry="10" fill="#cc0033"/>
  <ellipse cx="272" cy="195" rx="4" ry="5" fill="#ff2244"/>
  <ellipse cx="272" cy="193" rx="2" ry="2" fill="#ff8899"/>

  <!-- Mouth — dark gash -->
  <path d="M245,215 Q256,225 267,215" fill="none" stroke="#cc0033" stroke-width="2" opacity="0.7"/>
</svg>