<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep ice gradient for body -->
    <radialGradient id="frostAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0055aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <!-- Ice wing gradient -->
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f0ff"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0055aa"/>
    </linearGradient>
    <!-- Crown glow gradient -->
    <radialGradient id="crownGlow" cx="50%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#e0f0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Dress spike gradient -->
    <linearGradient id="spikeGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#0055aa"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0055aa"/>
    </radialGradient>
    <!-- Blizzard blur -->
    <filter id="blizzardBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="auraGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <!-- Ground crack pattern -->
    <linearGradient id="crackGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0055aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background aura -->
  <ellipse cx="256" cy="260" rx="240" ry="240" fill="url(#frostAura)" filter="url(#auraGlow)"/>

  <!-- Outer ominous blue ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0055aa" stroke-width="2" stroke-opacity="0.3" filter="url(#blizzardBlur)"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.2" filter="url(#blizzardBlur)"/>

  <!-- LEFT ICE WING — jagged crystalline -->
  <polygon points="140,180 40,120 80,190 20,200 70,240 10,290 90,270 60,340 130,280 110,220" fill="url(#wingGrad)" opacity="0.85"/>
  <polygon points="130,200 60,150 90,200 30,220 80,250 50,310 120,270" fill="#e0f0ff" opacity="0.25"/>

  <!-- RIGHT ICE WING — jagged crystalline -->
  <polygon points="372,180 472,120 432,190 492,200 442,240 502,290 422,270 452,340 382,280 402,220" fill="url(#wingGrad)" opacity="0.85"/>
  <polygon points="382,200 452,150 422,200 482,220 432,250 462,310 392,270" fill="#e0f0ff" opacity="0.25"/>

  <!-- Queen body silhouette — torso -->
  <path d="M230,190 Q240,160 256,155 Q272,160 282,190 L290,260 Q256,270 222,260 Z" fill="#0055aa"/>
  <!-- Shoulders -->
  <path d="M220,200 Q200,195 195,210 Q200,230 222,240 Z" fill="#0055aa"/>
  <path d="M292,200 Q312,195 317,210 Q312,230 290,240 Z" fill="#0055aa"/>

  <!-- Arms extended outward (casting pose) -->
  <path d="M195,210 Q170,230 148,250 Q145,252 150,248" fill="none" stroke="#0055aa" stroke-width="8" stroke-linecap="round"/>
  <path d="M317,210 Q342,230 364,250 Q367,252 362,248" fill="none" stroke="#0055aa" stroke-width="8" stroke-linecap="round"/>

  <!-- Dress → SHARP ICE SPIKES -->
  <polygon points="222,260 190,400 210,360 180,440 220,380 200,470 240,400 230,480 256,410 270,480 282,400 312,470 292,380 332,440 302,360 322,400 290,260" fill="url(#spikeGrad)"/>
  <!-- Ice spike accent lines -->
  <line x1="210" y1="360" x2="200" y2="470" stroke="#e0f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="400" x2="230" y2="480" stroke="#e0f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="282" y1="400" x2="270" y2="480" stroke="#e0f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="302" y1="360" x2="312" y2="470" stroke="#e0f0ff" stroke-width="1" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="256" cy="150" rx="32" ry="38" fill="#c8dce8"/>
  <!-- Hair flowing upward (fury) -->
  <path d="M224,150 Q210,110 220,80 Q230,100 235,90 Q228,70 240,60 Q244,80 250,75 Q248,55 260,50 Q258,75 268,72 Q270,52 280,62 Q275,82 282,88 Q285,70 295,82 Q290,105 288,150" fill="#b0d0e8" opacity="0.8"/>

  <!-- Crystalline ICE CROWN — sharp points -->
  <polygon points="256,68 248,100 230,95 236,75 220,85 232,65 218,68 240,50 250,62 256,42 262,62 272,50 294,68 280,65 288,85 276,75 282,95 264,100" fill="#e0f0ff" stroke="#00e5ff" stroke-width="1"/>
  <!-- Crown glow -->
  <ellipse cx="256" cy="80" rx="40" ry="25" fill="url(#crownGlow)" filter="url(#blizzardBlur)"/>

  <!-- FURY EYES — intense ice-blue glow -->
  <ellipse cx="244" cy="145" rx="6" ry="4" fill="url(#eyeGlow)"/>
  <ellipse cx="268" cy="145" rx="6" ry="4" fill="url(#eyeGlow)"/>
  <!-- Eye glow bleed -->
  <ellipse cx="244" cy="145" rx="12" ry="8" fill="#00e5ff" opacity="0.3" filter="url(#blizzardBlur)"/>
  <ellipse cx="268" cy="145" rx="12" ry="8" fill="#00e5ff" opacity="0.3" filter="url(#blizzardBlur)"/>
  <!-- Fury mouth -->
  <path d="M248,160 Q256,166 264,160" fill="none" stroke="#0d1b2a" stroke-width="1.5"/>

  <!-- Hands — frost energy orbs -->
  <circle cx="148" cy="250" r="14" fill="#00e5ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="148" cy="250" r="7" fill="#e0f0ff"/>
  <circle cx="364" cy="250" r="14" fill="#00e5ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="364" cy="250" r="7" fill="#e0f0ff"/>

  <!-- BLIZZARD PARTICLES — swirling white/blue shapes around body -->
  <circle cx="180" cy="170" r="4" fill="#e0f0ff" opacity="0.7" filter="url(#blizzardBlur)"/>
  <circle cx="340" cy="190" r="3" fill="#e0f0ff" opacity="0.6" filter="url(#blizzardBlur)"/>
  <circle cx="160" cy="280" r="5" fill="#00e5ff" opacity="0.5" filter="url(#blizzardBlur)"/>
  <circle cx="350" cy="300" r="4" fill="#e0f0ff" opacity="0.6" filter="url(#blizzardBlur)"/>
  <circle cx="200" cy="130" r="3" fill="#b388ff" opacity="0.4" filter="url(#blizzardBlur)"/>
  <circle cx="310" cy="140" r="4" fill="#e0f0ff" opacity="0.5" filter="url(#blizzardBlur)"/>
  <circle cx="170" cy="330" r="3" fill="#00e5ff" opacity="0.6" filter="url(#blizzardBlur)"/>
  <circle cx="340" cy="350" r="5" fill="#e0f0ff" opacity="0.4" filter="url(#blizzardBlur)"/>
  <circle cx="130" cy="240" r="3" fill="#b388ff" opacity="0.3" filter="url(#blizzardBlur)"/>
  <circle cx="380" cy="260" r="4" fill="#00e5ff" opacity="0.5" filter="url(#blizzardBlur)"/>
  <!-- Snowflake-like diamond shapes -->
  <rect x="188" y="308" width="6" height="6" transform="rotate(45,191,311)" fill="#e0f0ff" opacity="0.6" filter="url(#blizzardBlur)"/>
  <rect x="318" y="168" width="5" height="5" transform="rotate(45,320,170)" fill="#e0f0ff" opacity="0.5" filter="url(#blizzardBlur)"/>
  <rect x="148" y="198" width="5" height="5" transform="rotate(45,150,200)" fill="#00e5ff" opacity="0.5" filter="url(#blizzardBlur)"/>
  <rect x="358" cy="228" width="6" height="6" transform="rotate(45,361,231)" fill="#e0f0ff" opacity="0.4" filter="url(#blizzardBlur)"/>

  <!-- FROST CRACKS spreading on ground below -->
  <g opacity="0.8">
    <line x1="256" y1="480" x2="256" y2="450" stroke="url(#crackGrad)" stroke-width="2"/>
    <line x1="256" y1="460" x2="230" y2="490" stroke="url(#crackGrad)" stroke-width="1.5"/>
    <line x1="256" y1="460" x2="285" y2="495" stroke="url(#crackGrad)" stroke-width="1.5"/>
    <line x1="230" y1="490" x2="210" y2="500" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="230" y1="490" x2="225" y2="510" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="285" y1="495" x2="305" y2="510" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="285" y1="495" x2="290" y2="512" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="256" y1="470" x2="200" y2="500" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="256" y1="470" x2="310" y2="505" stroke="url(#crackGrad)" stroke-width="1"/>
    <line x1="200" y1="500" x2="180" y2="512" stroke="url(#crackGrad)" stroke-width="0.8"/>
    <line x1="310" y1="505" x2="335" y2="512" stroke="url(#crackGrad)" stroke-width="0.8"/>
  </g>

  <!-- Purple accent sparkles -->
  <circle cx="220" cy="100" r="2" fill="#b388ff" opacity="0.7"/>
  <circle cx="295" cy="105" r="2.5" fill="#b388ff" opacity="0.6"/>
  <circle cx="175" cy="260" r="2" fill="#b388ff" opacity="0.5"/>
  <circle cx="338" cy="275" r="2" fill="#b388ff" opacity="0.5"/>
</svg>