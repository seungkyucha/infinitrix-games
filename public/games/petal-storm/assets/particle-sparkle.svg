<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sparkleCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="armGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="outerGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Background glow halo -->
  <circle cx="32" cy="32" r="16" fill="#00e5ff" opacity="0.15" filter="url(#coreGlow)"/>
  <!-- Outer soft cross arms (large, faint) -->
  <polygon points="32,2 34,28 32,30 30,28" fill="#00e5ff" opacity="0.3" filter="url(#softGlow)"/>
  <polygon points="62,32 36,34 34,32 36,30" fill="#00e5ff" opacity="0.3" filter="url(#softGlow)"/>
  <polygon points="32,62 30,36 32,34 34,36" fill="#00e5ff" opacity="0.3" filter="url(#softGlow)"/>
  <polygon points="2,32 28,30 30,32 28,34" fill="#00e5ff" opacity="0.3" filter="url(#softGlow)"/>
  <!-- Main 4-pointed star arms -->
  <polygon points="32,4 35,27 32,30 29,27" fill="url(#armGrad)" filter="url(#outerGlow)"/>
  <polygon points="60,32 37,35 34,32 37,29" fill="url(#armGrad)" filter="url(#outerGlow)"/>
  <polygon points="32,60 29,37 32,34 35,37" fill="url(#armGrad)" filter="url(#outerGlow)"/>
  <polygon points="4,32 27,29 30,32 27,35" fill="url(#armGrad)" filter="url(#outerGlow)"/>
  <!-- Diagonal accent arms (smaller) -->
  <polygon points="18,18 30,30 32,32 30,32" fill="#00e5ff" opacity="0.25" filter="url(#softGlow)"/>
  <polygon points="46,18 34,30 32,32 34,32" fill="#00e5ff" opacity="0.25" filter="url(#softGlow)"/>
  <!-- Inner bright core -->
  <circle cx="32" cy="32" r="4" fill="url(#sparkleCore)" filter="url(#outerGlow)"/>
  <!-- Hot white center -->
  <circle cx="32" cy="32" r="1.5" fill="#ffffff" opacity="1"/>
</svg>