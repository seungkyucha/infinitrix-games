<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="thinGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outermost faint glow ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#00e5ff" stroke-width="6" opacity="0.1" filter="url(#wideGlow)"/>
  <!-- Outer ring - faint -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.25" filter="url(#ringGlow)"/>
  <!-- Middle ring - medium -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.5" filter="url(#ringGlow)"/>
  <!-- Inner ring - bright -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.85" filter="url(#ringGlow)"/>
  <!-- Innermost accent ring -->
  <circle cx="64" cy="64" r="33" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Energy radial lines -->
  <line x1="64" y1="16" x2="64" y2="24" stroke="#00e5ff" stroke-width="1" opacity="0.4" filter="url(#thinGlow)"/>
  <line x1="64" y1="104" x2="64" y2="112" stroke="#00e5ff" stroke-width="1" opacity="0.4" filter="url(#thinGlow)"/>
  <line x1="16" y1="64" x2="24" y2="64" stroke="#00e5ff" stroke-width="1" opacity="0.4" filter="url(#thinGlow)"/>
  <line x1="104" y1="64" x2="112" y2="64" stroke="#00e5ff" stroke-width="1" opacity="0.4" filter="url(#thinGlow)"/>
  <!-- Diagonal energy lines -->
  <line x1="25" y1="25" x2="31" y2="31" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" filter="url(#thinGlow)"/>
  <line x1="103" y1="25" x2="97" y2="31" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" filter="url(#thinGlow)"/>
  <line x1="25" y1="103" x2="31" y2="97" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" filter="url(#thinGlow)"/>
  <line x1="103" y1="103" x2="97" y2="97" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" filter="url(#thinGlow)"/>
  <!-- Golden sparkle dots on the ring -->
  <circle cx="64" cy="22" r="2.5" fill="#ffd700" opacity="0.9" filter="url(#sparkGlow)"/>
  <circle cx="98" cy="38" r="2" fill="#ffd700" opacity="0.8" filter="url(#sparkGlow)"/>
  <circle cx="106" cy="64" r="2.5" fill="#ffd700" opacity="0.9" filter="url(#sparkGlow)"/>
  <circle cx="94" cy="94" r="2" fill="#ffd700" opacity="0.7" filter="url(#sparkGlow)"/>
  <circle cx="64" cy="106" r="2" fill="#ffd700" opacity="0.8" filter="url(#sparkGlow)"/>
  <circle cx="30" cy="90" r="2.5" fill="#ffd700" opacity="0.9" filter="url(#sparkGlow)"/>
  <circle cx="22" cy="64" r="2" fill="#ffd700" opacity="0.8" filter="url(#sparkGlow)"/>
  <circle cx="34" cy="30" r="2" fill="#ffd700" opacity="0.7" filter="url(#sparkGlow)"/>
  <!-- Small white sparkle accents -->
  <circle cx="80" cy="24" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="104" cy="52" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="48" cy="104" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="20" cy="48" r="1.2" fill="#ffffff" opacity="0.6"/>
</svg>