<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="thumbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d0d2a"/>
    </linearGradient>
    <radialGradient id="thumbNebula" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3388ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3388ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bRed" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ff6688"/>
      <stop offset="100%" stop-color="#cc1144"/>
    </radialGradient>
    <radialGradient id="bBlue" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#66aaff"/>
      <stop offset="100%" stop-color="#1155cc"/>
    </radialGradient>
    <radialGradient id="bGreen" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#66ffaa"/>
      <stop offset="100%" stop-color="#118844"/>
    </radialGradient>
    <radialGradient id="bYellow" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffee66"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </radialGradient>
    <radialGradient id="bPurple" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#dd77ff"/>
      <stop offset="100%" stop-color="#7722aa"/>
    </radialGradient>
    <radialGradient id="bCyan" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#88ffee"/>
      <stop offset="100%" stop-color="#009988"/>
    </radialGradient>
    <radialGradient id="titleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#33ffee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#33ffee" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tBubbleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleShadow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="launcherGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="50%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#thumbBg)"/>
  <rect width="400" height="300" fill="url(#thumbNebula)"/>
  <!-- 별 필드 -->
  <g opacity="0.6">
    <circle cx="30" cy="20" r="0.8" fill="#ffffff"/>
    <circle cx="90" cy="55" r="0.6" fill="#ffffff"/>
    <circle cx="150" cy="30" r="0.7" fill="#ffffff"/>
    <circle cx="250" cy="15" r="0.5" fill="#ffffff"/>
    <circle cx="320" cy="45" r="0.8" fill="#ffffff"/>
    <circle cx="370" cy="25" r="0.6" fill="#ffffff"/>
    <circle cx="60" cy="280" r="0.6" fill="#ffffff"/>
    <circle cx="340" cy="270" r="0.7" fill="#ffffff"/>
    <circle cx="180" cy="290" r="0.5" fill="#33ffee" opacity="0.5"/>
  </g>
  <!-- 버블 격자 (상단) — 오프셋 배열 -->
  <g id="bubble-grid" filter="url(#tBubbleGlow)">
    <!-- 행 0 (짝수, 8개) -->
    <circle cx="110" cy="60" r="14" fill="url(#bRed)"/>
    <circle cx="140" cy="60" r="14" fill="url(#bBlue)"/>
    <circle cx="170" cy="60" r="14" fill="url(#bGreen)"/>
    <circle cx="200" cy="60" r="14" fill="url(#bRed)"/>
    <circle cx="230" cy="60" r="14" fill="url(#bYellow)"/>
    <circle cx="260" cy="60" r="14" fill="url(#bPurple)"/>
    <circle cx="290" cy="60" r="14" fill="url(#bCyan)"/>
    <!-- 행 1 (홀수, 7개, 오프셋) -->
    <circle cx="125" cy="85" r="14" fill="url(#bBlue)"/>
    <circle cx="155" cy="85" r="14" fill="url(#bGreen)"/>
    <circle cx="185" cy="85" r="14" fill="url(#bYellow)"/>
    <circle cx="215" cy="85" r="14" fill="url(#bRed)"/>
    <circle cx="245" cy="85" r="14" fill="url(#bCyan)"/>
    <circle cx="275" cy="85" r="14" fill="url(#bPurple)"/>
    <!-- 행 2 (짝수) -->
    <circle cx="140" cy="110" r="14" fill="url(#bPurple)"/>
    <circle cx="170" cy="110" r="14" fill="url(#bRed)"/>
    <circle cx="200" cy="110" r="14" fill="url(#bBlue)"/>
    <circle cx="230" cy="110" r="14" fill="url(#bGreen)"/>
    <circle cx="260" cy="110" r="14" fill="url(#bYellow)"/>
    <!-- 행 3 (홀수, 일부) -->
    <circle cx="155" cy="135" r="14" fill="url(#bCyan)"/>
    <circle cx="185" cy="135" r="14" fill="url(#bBlue)"/>
    <circle cx="215" cy="135" r="14" fill="url(#bRed)"/>
    <circle cx="245" cy="135" r="14" fill="url(#bGreen)"/>
  </g>
  <!-- 버블 하이라이트 (몇 개에 광택) -->
  <g opacity="0.5">
    <ellipse cx="106" cy="56" rx="4" ry="3" fill="#ffffff"/>
    <ellipse cx="166" cy="56" rx="4" ry="3" fill="#ffffff"/>
    <ellipse cx="226" cy="56" rx="4" ry="3" fill="#ffffff"/>
    <ellipse cx="121" cy="81" rx="4" ry="3" fill="#ffffff"/>
    <ellipse cx="181" cy="81" rx="4" ry="3" fill="#ffffff"/>
  </g>
  <!-- 발사대 -->
  <g id="thumb-launcher">
    <!-- 베이스 -->
    <path d="M175 265 Q175 250 200 245 Q225 250 225 265 Z" fill="#999999" stroke="#666666" stroke-width="1"/>
    <!-- 포신 (각도를 둬서 역동적으로) -->
    <rect x="196" y="200" width="8" height="46" rx="2" fill="url(#launcherGrad)" transform="rotate(-15 200 245)"/>
    <!-- 포구 글로우 -->
    <circle cx="190" cy="202" r="6" fill="#33ffee" opacity="0.4" filter="url(#tGlow)"/>
    <!-- 피벗 -->
    <circle cx="200" cy="248" r="4" fill="#444444" stroke="#33ffee" stroke-width="0.8"/>
  </g>
  <!-- 발사 중인 버블 (궤적) -->
  <g filter="url(#tBubbleGlow)">
    <circle cx="175" cy="185" r="12" fill="url(#bCyan)" opacity="0.9"/>
    <ellipse cx="172" cy="182" rx="3.5" ry="2.5" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- 조준선 (점선) -->
  <g opacity="0.35" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,3">
    <line x1="190" y1="202" x2="175" y2="185"/>
    <line x1="175" y1="185" x2="155" y2="160"/>
  </g>
  <!-- 팝 이펙트 (우측 상단) -->
  <g filter="url(#tBubbleGlow)" opacity="0.7">
    <circle cx="280" cy="100" r="18" fill="#ffdd33" opacity="0.15"/>
    <circle cx="280" cy="100" r="10" fill="#ffffff" opacity="0.2"/>
    <line x1="280" y1="100" x2="280" y2="78" stroke="#ffdd33" stroke-width="1" opacity="0.5"/>
    <line x1="280" y1="100" x2="298" y2="90" stroke="#ffdd33" stroke-width="1" opacity="0.5"/>
    <line x1="280" y1="100" x2="262" y2="90" stroke="#ffdd33" stroke-width="1" opacity="0.5"/>
    <circle cx="275" cy="82" r="2" fill="#ffdd33" opacity="0.6"/>
    <circle cx="295" cy="88" r="1.5" fill="#ffdd33" opacity="0.5"/>
  </g>
  <!-- 타이틀 글로우 배경 -->
  <ellipse cx="200" cy="230" rx="160" ry="30" fill="url(#titleGlow)"/>
  <!-- 타이틀 텍스트 -->
  <g filter="url(#titleShadow)">
    <text x="200" y="226" text-anchor="middle" font-size="28" font-weight="bold" fill="#33ffee" font-family="Arial, Helvetica, sans-serif">NEON BUBBLE POP</text>
  </g>
  <text x="200" y="248" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.6" font-family="Arial, Helvetica, sans-serif">AIM · SHOOT · POP!</text>
  <!-- 프레임 장식 -->
  <g opacity="0.2" stroke="#33ffee" stroke-width="0.8" fill="none">
    <rect x="8" y="8" width="384" height="284" rx="4"/>
  </g>
  <g opacity="0.1" stroke="#bb44ff" stroke-width="0.5" fill="none">
    <rect x="12" y="12" width="376" height="276" rx="3"/>
  </g>
</svg>