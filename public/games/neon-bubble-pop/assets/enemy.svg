<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bubbleBody" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#ff3366" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc1144" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="#ff3366" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerShine" cx="30%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spikeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5588"/>
      <stop offset="100%" stop-color="#cc1144"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 네온 글로우 -->
  <circle cx="32" cy="32" r="28" fill="url(#outerGlow)" filter="url(#redGlow)"/>
  <!-- 위협적 스파이크 돌기 (6방향) -->
  <g id="spikes" filter="url(#softGlow)">
    <polygon points="32,2 29,12 35,12" fill="url(#spikeGrad)"/>
    <polygon points="32,62 29,52 35,52" fill="url(#spikeGrad)"/>
    <polygon points="2,32 12,29 12,35" fill="url(#spikeGrad)"/>
    <polygon points="62,32 52,29 52,35" fill="url(#spikeGrad)"/>
    <polygon points="10,10 17,15 13,19" fill="url(#spikeGrad)"/>
    <polygon points="54,10 47,15 51,19" fill="url(#spikeGrad)"/>
    <polygon points="10,54 17,49 13,45" fill="url(#spikeGrad)"/>
    <polygon points="54,54 47,49 51,45" fill="url(#spikeGrad)"/>
  </g>
  <!-- 메인 버블 몸체 -->
  <circle cx="32" cy="32" r="18" fill="url(#bubbleBody)" stroke="#ff5588" stroke-width="1" filter="url(#softGlow)"/>
  <!-- 내부 링 장식 -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#ff6688" stroke-width="0.5" opacity="0.4"/>
  <!-- 광택 하이라이트 -->
  <ellipse cx="27" cy="25" rx="6" ry="4" fill="url(#innerShine)"/>
  <!-- 위협적 눈 -->
  <g id="eyes">
    <ellipse cx="26" cy="30" rx="3.5" ry="4" fill="#1a0010" stroke="#ff3366" stroke-width="0.5"/>
    <ellipse cx="38" cy="30" rx="3.5" ry="4" fill="#1a0010" stroke="#ff3366" stroke-width="0.5"/>
    <circle cx="26" cy="29" r="1.5" fill="#ff3366" filter="url(#softGlow)"/>
    <circle cx="38" cy="29" r="1.5" fill="#ff3366" filter="url(#softGlow)"/>
  </g>
  <!-- 험상궂은 입 -->
  <path d="M24 38 Q28 35 32 38 Q36 35 40 38" fill="none" stroke="#ff3366" stroke-width="1.2" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- 하단 반사광 -->
  <ellipse cx="36" cy="42" rx="4" ry="2" fill="#ffffff" opacity="0.15"/>
</svg>