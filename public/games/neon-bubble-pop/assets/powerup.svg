<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="orbGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#33ffee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0088aa" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#33ffee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#33ffee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbShine" cx="35%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffdd33"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <filter id="powerGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 링 -->
  <circle cx="24" cy="24" r="22" fill="url(#orbGlow)"/>
  <!-- 회전하는 궤도 링 -->
  <g id="orbit-rings" opacity="0.4" filter="url(#powerGlow)">
    <ellipse cx="24" cy="24" rx="18" ry="6" fill="none" stroke="#33ffee" stroke-width="0.8" transform="rotate(-30 24 24)"/>
    <ellipse cx="24" cy="24" rx="18" ry="6" fill="none" stroke="#33ffee" stroke-width="0.6" transform="rotate(30 24 24)"/>
    <ellipse cx="24" cy="24" rx="18" ry="6" fill="none" stroke="#33ffee" stroke-width="0.4" transform="rotate(90 24 24)"/>
  </g>
  <!-- 궤도 위 작은 입자 -->
  <g id="particles" filter="url(#boltGlow)">
    <circle cx="8" cy="18" r="1.5" fill="#33ffee" opacity="0.8"/>
    <circle cx="40" cy="30" r="1.5" fill="#33ffee" opacity="0.8"/>
    <circle cx="24" cy="6" r="1.2" fill="#ffffff" opacity="0.6"/>
    <circle cx="24" cy="42" r="1.2" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- 오브 본체 -->
  <circle cx="24" cy="24" r="12" fill="url(#orbGrad)" filter="url(#powerGlow)"/>
  <!-- 번개 심볼 -->
  <g filter="url(#boltGlow)">
    <path d="M26 15 L21 23 L25 23 L22 33 L29 22 L25 22 Z" fill="url(#boltGrad)" stroke="#ffffff" stroke-width="0.3"/>
  </g>
  <!-- 광택 -->
  <ellipse cx="21" cy="20" rx="4" ry="3" fill="url(#orbShine)"/>
  <!-- 미세 반짝임 -->
  <g opacity="0.6">
    <line x1="6" y1="8" x2="8" y2="10" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="7" y1="10" x2="7" y2="8" stroke="#ffffff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="40" y1="6" x2="42" y2="8" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="38" y1="40" x2="40" y2="42" stroke="#ffffff" stroke-width="0.6" stroke-linecap="round"/>
  </g>
</svg>