<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee66"/>
      <stop offset="50%" stop-color="#ffdd33"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <radialGradient id="starOuterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="#ffdd33" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffdd33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starCenter" cx="45%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffdd33" stop-opacity="0"/>
    </radialGradient>
    <filter id="starNeon">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#starOuterGlow)"/>
  <!-- 별 본체 -->
  <g filter="url(#starNeon)">
    <path d="M16 3 L19.1 11.5 L28 12.2 L21.2 18 L23.2 27 L16 22.5 L8.8 27 L10.8 18 L4 12.2 L12.9 11.5 Z" fill="url(#starGrad)" stroke="#ffee88" stroke-width="0.3"/>
  </g>
  <!-- 중심 광택 -->
  <circle cx="15" cy="14" r="4" fill="url(#starCenter)"/>
  <!-- 꼭짓점 강조 -->
  <circle cx="16" cy="4" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="27" cy="12.5" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="4.5" cy="12.5" r="0.8" fill="#ffffff" opacity="0.4"/>
</svg>