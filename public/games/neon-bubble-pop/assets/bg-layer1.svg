<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d0d2a"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#3388ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3388ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#bb44ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#bb44ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaC" cx="50%" cy="80%" r="25%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="twinkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 그라디언트 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 성운 레이어 -->
  <rect width="800" height="600" fill="url(#nebulaA)"/>
  <rect width="800" height="600" fill="url(#nebulaB)"/>
  <rect width="800" height="600" fill="url(#nebulaC)"/>
  <!-- 별 필드 - 작은 별 -->
  <g id="small-stars" opacity="0.7">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="123" cy="67" r="0.6" fill="#ffffff"/>
    <circle cx="198" cy="145" r="0.7" fill="#ffffff"/>
    <circle cx="267" cy="34" r="0.5" fill="#ffffff"/>
    <circle cx="312" cy="189" r="0.8" fill="#ffffff"/>
    <circle cx="389" cy="78" r="0.6" fill="#ffffff"/>
    <circle cx="445" cy="234" r="0.7" fill="#ffffff"/>
    <circle cx="512" cy="56" r="0.5" fill="#ffffff"/>
    <circle cx="567" cy="167" r="0.8" fill="#ffffff"/>
    <circle cx="634" cy="45" r="0.6" fill="#ffffff"/>
    <circle cx="689" cy="123" r="0.7" fill="#ffffff"/>
    <circle cx="745" cy="89" r="0.5" fill="#ffffff"/>
    <circle cx="78" cy="312" r="0.6" fill="#ffffff"/>
    <circle cx="156" cy="389" r="0.7" fill="#ffffff"/>
    <circle cx="234" cy="456" r="0.5" fill="#ffffff"/>
    <circle cx="345" cy="345" r="0.8" fill="#ffffff"/>
    <circle cx="423" cy="412" r="0.6" fill="#ffffff"/>
    <circle cx="534" cy="378" r="0.7" fill="#ffffff"/>
    <circle cx="612" cy="445" r="0.5" fill="#ffffff"/>
    <circle cx="689" cy="312" r="0.8" fill="#ffffff"/>
    <circle cx="756" cy="456" r="0.6" fill="#ffffff"/>
    <circle cx="67" cy="534" r="0.7" fill="#ffffff"/>
    <circle cx="178" cy="567" r="0.5" fill="#ffffff"/>
    <circle cx="289" cy="523" r="0.8" fill="#ffffff"/>
    <circle cx="456" cy="534" r="0.6" fill="#ffffff"/>
    <circle cx="589" cy="567" r="0.7" fill="#ffffff"/>
    <circle cx="712" cy="545" r="0.5" fill="#ffffff"/>
    <circle cx="400" cy="150" r="0.6" fill="#33ffee" opacity="0.6"/>
    <circle cx="600" cy="280" r="0.5" fill="#3388ff" opacity="0.5"/>
    <circle cx="150" cy="480" r="0.6" fill="#bb44ff" opacity="0.5"/>
  </g>
  <!-- 밝은 별 (글로우) -->
  <g id="bright-stars" filter="url(#twinkle)">
    <circle cx="120" cy="90" r="1.5" fill="#ffffff"/>
    <circle cx="350" cy="120" r="2" fill="#33ffee" opacity="0.8"/>
    <circle cx="580" cy="200" r="1.8" fill="#ffffff"/>
    <circle cx="700" cy="350" r="1.5" fill="#3388ff" opacity="0.8"/>
    <circle cx="200" cy="420" r="2" fill="#ffffff"/>
    <circle cx="450" cy="500" r="1.5" fill="#bb44ff" opacity="0.7"/>
    <circle cx="680" cy="520" r="1.8" fill="#ffffff"/>
  </g>
  <!-- 수평 네온 그리드 라인 (매우 희미) -->
  <g id="grid-hints" opacity="0.04" stroke="#33ffee" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
</svg>