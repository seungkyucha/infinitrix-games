<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="blastCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#33ffee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#3388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3388ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blastOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#bb44ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#bb44ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#33ffee"/>
      <stop offset="100%" stop-color="#33ffee" stop-opacity="0"/>
    </radialGradient>
    <filter id="blastGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 충격파 -->
  <circle cx="48" cy="48" r="44" fill="url(#blastOuter)" filter="url(#blastGlow)"/>
  <!-- 내부 충격파 링 -->
  <circle cx="48" cy="48" r="32" fill="none" stroke="#33ffee" stroke-width="1.5" opacity="0.4" filter="url(#sparkGlow)"/>
  <circle cx="48" cy="48" r="22" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- 중심 폭발 코어 -->
  <circle cx="48" cy="48" r="16" fill="url(#blastCore)" filter="url(#blastGlow)"/>
  <!-- 방사형 스파크 라인 (12방향) -->
  <g id="sparks" filter="url(#sparkGlow)" stroke-linecap="round">
    <line x1="48" y1="48" x2="48" y2="6" stroke="url(#sparkGrad)" stroke-width="2" opacity="0.8"/>
    <line x1="48" y1="48" x2="48" y2="90" stroke="url(#sparkGrad)" stroke-width="2" opacity="0.8" transform="rotate(180 48 48)"/>
    <line x1="48" y1="48" x2="90" y2="48" stroke="url(#sparkGrad)" stroke-width="2" opacity="0.7" transform="rotate(0 48 48)"/>
    <line x1="48" y1="48" x2="6" y2="48" stroke="url(#sparkGrad)" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="48" x2="78" y2="18" stroke="#33ffee" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="48" x2="18" y2="78" stroke="#33ffee" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="48" x2="78" y2="78" stroke="#ff3366" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="18" y2="18" stroke="#ff3366" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="68" y2="12" stroke="#ffdd33" stroke-width="1" opacity="0.4"/>
    <line x1="48" y1="48" x2="28" y2="84" stroke="#ffdd33" stroke-width="1" opacity="0.4"/>
    <line x1="48" y1="48" x2="12" y2="28" stroke="#bb44ff" stroke-width="1" opacity="0.4"/>
    <line x1="48" y1="48" x2="84" y2="68" stroke="#bb44ff" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- 파편 파티클 (작은 원들) -->
  <g id="debris" filter="url(#sparkGlow)">
    <circle cx="28" cy="14" r="2.5" fill="#ff3366" opacity="0.7"/>
    <circle cx="72" cy="20" r="2" fill="#33ffee" opacity="0.8"/>
    <circle cx="16" cy="52" r="1.8" fill="#ffdd33" opacity="0.6"/>
    <circle cx="80" cy="56" r="2.2" fill="#3388ff" opacity="0.7"/>
    <circle cx="35" cy="80" r="1.5" fill="#33ff88" opacity="0.6"/>
    <circle cx="65" cy="82" r="2" fill="#bb44ff" opacity="0.7"/>
    <circle cx="20" cy="35" r="1.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="76" cy="38" r="1.8" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>