<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1744"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#448aff"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69f0ae"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="50%" style="stop-color:#80deea"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="topaz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffab40"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="amethyst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea80fc"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd740"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="50" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="20" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="35" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="320" cy="18" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="370" cy="45" r="1.3" fill="#fff" opacity="0.6"/>
  <circle cx="55" cy="70" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="345" cy="65" r="1.2" fill="#fff" opacity="0.5"/>

  <!-- Crown -->
  <g transform="translate(200, 52)" filter="url(#glow)">
    <polygon points="0,-32 -28,0 -18,0 -14,-16 -7,0 0,-20 7,0 14,-16 18,0 28,0" fill="url(#crown)" stroke="#ffca28" stroke-width="1"/>
    <rect x="-28" y="0" width="56" height="8" rx="2" fill="url(#crown)" stroke="#ffca28" stroke-width="1"/>
    <!-- Crown gems -->
    <circle cx="-14" cy="-10" r="4" fill="url(#ruby)"/>
    <circle cx="0" cy="-14" r="4.5" fill="url(#diamond)"/>
    <circle cx="14" cy="-10" r="4" fill="url(#sapphire)"/>
  </g>

  <!-- 3x3 Gem Grid -->
  <g transform="translate(200, 148)">
    <!-- Row 1 -->
    <polygon points="-60,-52 -48,-68 -36,-52 -36,-36 -48,-28 -60,-36" fill="url(#ruby)" stroke="#ff5252" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="0,-52 12,-68 24,-52 24,-36 12,-28 0,-36" fill="url(#sapphire)" stroke="#82b1ff" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="60,-52 72,-68 84,-52 84,-36 72,-28 60,-36" fill="url(#emerald)" stroke="#b9f6ca" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Row 2 -->
    <polygon points="-60,0 -48,-16 -36,0 -36,16 -48,24 -60,16" fill="url(#topaz)" stroke="#ffab40" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="0,0 12,-16 24,0 24,16 12,24 0,16" fill="url(#diamond)" stroke="#e0f7fa" stroke-width="2" filter="url(#glow)"/>
    <polygon points="60,0 72,-16 84,0 84,16 72,24 60,16" fill="url(#amethyst)" stroke="#ea80fc" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Row 3 -->
    <polygon points="-60,52 -48,36 -36,52 -36,68 -48,76 -60,68" fill="url(#sapphire)" stroke="#82b1ff" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="0,52 12,36 24,52 24,68 12,76 0,68" fill="url(#ruby)" stroke="#ff5252" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="60,52 72,36 84,52 84,68 72,76 60,68" fill="url(#topaz)" stroke="#ffab40" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Match highlight (row 2 swap effect) -->
    <line x1="-48" y1="4" x2="72" y2="4" stroke="#fff" stroke-width="2" opacity="0.3" stroke-dasharray="6,4"/>
  </g>

  <!-- Sparkle effects -->
  <g filter="url(#sparkle)">
    <polygon points="100,100 103,108 96,104 108,104 101,108" fill="#fff" opacity="0.9"/>
    <polygon points="300,85 302,91 297,88 307,88 302,91" fill="#fff" opacity="0.8"/>
    <polygon points="130,200 132,206 127,203 137,203 132,206" fill="#ffd740" opacity="0.7"/>
    <polygon points="280,210 282,216 277,213 287,213 282,216" fill="#ffd740" opacity="0.8"/>
    <polygon points="80,160 82,166 77,163 87,163 82,166" fill="#80deea" opacity="0.6"/>
    <polygon points="320,150 322,156 317,153 327,153 322,156" fill="#ea80fc" opacity="0.7"/>
  </g>

  <!-- Trophy icon (small, top-right) -->
  <g transform="translate(340, 50)" filter="url(#glow)">
    <path d="M-8,0 L8,0 L6,12 L2,16 L-2,16 L-6,12 Z" fill="url(#crown)" stroke="#ffd740" stroke-width="1"/>
    <rect x="-4" y="16" width="8" height="3" rx="1" fill="#ffca28"/>
    <rect x="-6" y="19" width="12" height="3" rx="1" fill="#ffc107"/>
    <path d="M-8,0 Q-16,4 -12,12 L-6,10" fill="none" stroke="#ffd740" stroke-width="1.5"/>
    <path d="M8,0 Q16,4 12,12 L6,10" fill="none" stroke="#ffd740" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <text x="200" y="262" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" filter="url(#glow)">
    <tspan fill="#ffd740">GEM</tspan>
    <tspan fill="#fff"> ROYAL </tspan>
    <tspan fill="#ffd740">CHALLENGE</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="284" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#b0bec5" letter-spacing="3">
    MATCH · COMPETE · CONQUER
  </text>

  <!-- Border frame -->
  <rect x="4" y="4" width="392" height="292" rx="8" fill="none" stroke="url(#crown)" stroke-width="2" opacity="0.4"/>
</svg>
