// Layout wrapper — engine Layout API requires (w,h) params, game calls without them
const Layout = {
  cx() { return window.innerWidth / 2; },
  cy() { return window.innerHeight / 2; },
  hud() {
    const w = window.innerWidth, h = window.innerHeight;
    const hud = _Layout.hud(w, h);
    return { top: hud.top.h, bottom: hud.bottom.h };
  },
  fontSize(base) {
    return _Layout.fontSize(base, window.innerWidth, window.innerHeight, 10, 72);
  },
  safeArea() {
    return _Layout.safeArea(window.innerWidth, window.innerHeight);
  },
  scale() { return _Layout.scale(window.innerWidth, window.innerHeight); },
};
// UI wrapper — engine UI.text/hitTest may need (w,h) context
const UI = {
  text(ctx, text, x, y, opts) {
    if (!opts) opts = {};
    ctx.save();
    ctx.fillStyle = opts.fill || '#fff';
    ctx.font = opts.font || '14px system-ui';
    ctx.textAlign = opts.align || 'left';
    ctx.textBaseline = opts.baseline || 'alphabetic';
    ctx.fillText(text, x, y);
    ctx.restore();
  },
  hitTest(tx, ty, x, y, w, h) {
    return tx >= x && tx <= x + w && ty >= y && ty <= y + h;
  }
};

// §8. SEEDED RNG
// ═══════════════════════════════════════════════════════════════════════════════
class SeededRNG {
  constructor(seed) { this.seed = (seed || Date.now()) >>> 0; }
  next() {
    this.seed = (this.seed * 16807 + 0) % 2147483647;
    return (this.seed - 1) / 2147483646;
  }
  randInt(mn, mx) { return Math.floor(this.next() * (mx - mn + 1)) + mn; }
  pick(arr) { return arr[this.randInt(0, arr.length - 1)]; }
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.randInt(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}
let gRng = new SeededRNG(Date.now());

function dailySeed() {
  const now = new Date();
  return now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
}

const assets = new AssetLoader();
let gAssetsLoaded = false;
let gLoadProgress = 0;

function loadAssets() {
  fetch('assets/manifest.json')
    .then(r => r.json())
    .then(manifest => {
      const map = {};
      for (const [key, info] of Object.entries(manifest.assets)) {
        map[key] = 'assets/' + info.file;
      }
      assets.load(map).then(() => {
        gAssetsLoaded = true;
        gLoadProgress = 1;
        deferTransition(STATE.TITLE);
      }).catch(() => {
        gAssetsLoaded = true;
        gLoadProgress = 1;
        deferTransition(STATE.TITLE);
      });
    })
    .catch(() => {
      gAssetsLoaded = true;
      gLoadProgress = 1;
      deferTransition(STATE.TITLE);
    });
}

// drawAssetOrFallback — pattern for every asset draw
function drawAssetOrFallback(ctx, key, x, y, w, h, fallbackFn) {
  if (assets.sprites[key]) {
    assets.draw(ctx, key, x, y, w, h);
  } else if (fallbackFn) {
    fallbackFn(ctx, x, y, w, h);
  }
}

function fbGem(ctx, x, y, w, h, color, dark, shape) {
  const r = Math.min(w, h) * 0.42;
  const cx2 = x + w/2, cy2 = y + h/2;
  const grd = ctx.createRadialGradient(cx2-r*0.3, cy2-r*0.3, r*0.05, cx2, cy2, r);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.3, color);
  grd.addColorStop(1, dark);
  ctx.beginPath();
  ctx.arc(cx2, cy2, r, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  if (shape) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = `bold ${r*0.9}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(shape, cx2, cy2+1);
  }
}
function fbGemByType(ctx, x, y, w, h, type) {
  fbGem(ctx, x, y, w, h, GEM_COLORS[type]||'#aaa', GEM_COLORS_DARK[type]||'#333',
    CONFIG.colorBlind ? GEM_SHAPES[type] : null);
}
function fbSpecial(ctx, x, y, w, h, type, baseColor) {
  fbGem(ctx, x, y, w, h, baseColor||'#ff0', '#880', null);
  const cx2 = x+w/2, cy2 = y+h/2;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  if (type === SPECIAL.LINE_H) {
    ctx.beginPath(); ctx.moveTo(x+4,cy2); ctx.lineTo(x+w-4,cy2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-10,cy2-5); ctx.lineTo(x+w-4,cy2); ctx.lineTo(x+w-10,cy2+5); ctx.stroke();
  } else if (type === SPECIAL.LINE_V) {
    ctx.beginPath(); ctx.moveTo(cx2,y+4); ctx.lineTo(cx2,y+h-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx2-5,y+h-10); ctx.lineTo(cx2,y+h-4); ctx.lineTo(cx2+5,y+h-10); ctx.stroke();
  } else if (type === SPECIAL.BOMB) {
    ctx.beginPath(); ctx.arc(cx2,cy2,w*0.35,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,200,0,0.8)'; ctx.lineWidth=3; ctx.stroke();
  } else if (type === SPECIAL.RAINBOW) {
    const cols = ['#f00','#f80','#ff0','#0f0','#00f','#80f'];
    cols.forEach((c,i) => {
      ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx2,cy2,(i+1)*(w*0.06),0,Math.PI*2); ctx.stroke();
    });
  }
}

      ctx.fillStyle='#aaa'; ctx.font=`${w*0.45}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';

      ctx.fillStyle='rgba(180,0,220,0.4)'; ctx.beginPath(); ctx.arc(cx2-w*0.1,cy2-w*0.1,w*0.15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#d0f0a0'; ctx.font=`${w*0.42}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('☠',cx2,cy2+1);
      break;
    }
    case OBS.STONE: {
      ctx.fillStyle='#777'; ctx.fillRect(x+2,y+2,w-4,h-4);
      ctx.strokeStyle='#444'; ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,w-4,h-4);

    }
    case OBS.CURTAIN: {

      ctx.fillStyle='rgba(255,215,0,0.9)'; ctx.font=`${w*0.42}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';

    }
    case OBS.JELLY: {
      const jl = layer||1;
      const alpha = 0.5 + jl*0.2;
      ctx.fillStyle=`rgba(255,100,200,${alpha})`; ctx.beginPath(); ctx.arc(cx2,cy2,w*0.44,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,180,230,0.9)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx2,cy2,w*0.44,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.ellipse(cx2-w*0.12,cy2-w*0.12,w*0.08,w*0.05,-0.5,0,Math.PI*2); ctx.fill();
      if (jl>1) { ctx.fillStyle='rgba(180,0,100,0.7)'; ctx.font=`${w*0.35}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(jl,cx2,cy2+1); }
      break;
    }
    case OBS.PIE: {
      const slices = 6;
      const sliceColors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
      const data = gPieData[`${Math.round(x)}_${Math.round(y)}`] || {remaining:6};
      const total = data.remaining || 6;
      for (let i=0; i<slices; i++) {
        const startA = (i/slices)*Math.PI*2 - Math.PI/2;
        const endA = ((i+1)/slices)*Math.PI*2 - Math.PI/2;
        const active = i < total;
        ctx.fillStyle = active ? sliceColors[i] : 'rgba(50,50,50,0.3)';
        ctx.beginPath(); ctx.moveTo(cx2,cy2);
        ctx.arc(cx2,cy2,w*0.43,startA,endA); ctx.closePath(); ctx.fill();
        ctx.strokeStyle='#FFD700'; ctx.lineWidth=1; ctx.stroke();
      }
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx2,cy2,w*0.43,0,Math.PI*2); ctx.stroke();
      if (CONFIG.colorBlind) {
        ctx.fillStyle='#000'; ctx.font=`bold ${w*0.35}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(total,cx2,cy2);
      }
      break;
    }
  }
}
function fbKing(ctx, x, y, w, h, emotion) {
  const cx2=x+w/2, cy2=y+h/2;
  // body
  ctx.fillStyle='#4466CC'; ctx.beginPath(); ctx.ellipse(cx2,cy2+h*0.15,w*0.3,h*0.35,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#FFDAB9'; ctx.beginPath(); ctx.arc(cx2,cy2-h*0.15,w*0.25,0,Math.PI*2); ctx.fill();
  // crown
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.moveTo(cx2-w*0.22,cy2-h*0.35);
  ctx.lineTo(cx2-w*0.18,cy2-h*0.48); ctx.lineTo(cx2,cy2-h*0.42);
  ctx.lineTo(cx2+w*0.18,cy2-h*0.48); ctx.lineTo(cx2+w*0.22,cy2-h*0.35);
  ctx.closePath(); ctx.fill();
  // eyes/expression
  if (emotion==='happy') {
    ctx.strokeStyle='#333'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx2-w*0.08,cy2-h*0.15,w*0.04,Math.PI,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx2+w*0.08,cy2-h*0.15,w*0.04,Math.PI,Math.PI*2); ctx.stroke();
  } else if (emotion==='scared') {
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx2-w*0.08,cy2-h*0.16,w*0.05,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx2-w*0.08,cy2-h*0.16,w*0.025,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx2+w*0.08,cy2-h*0.16,w*0.05,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx2+w*0.08,cy2-h*0.16,w*0.025,0,Math.PI*2); ctx.fill();
  } else if (emotion==='surprised') {
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(cx2-w*0.08,cy2-h*0.16,w*0.04,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx2+w*0.08,cy2-h*0.16,w*0.04,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx2,cy2-h*0.05,w*0.06,0,Math.PI); ctx.stroke();
  } else {
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(cx2-w*0.08,cy2-h*0.16,w*0.035,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx2+w*0.08,cy2-h*0.16,w*0.035,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx2,cy2-h*0.05,w*0.05,0,Math.PI); ctx.stroke();
  }
}
function fbBgRegion(ctx, x, y, w, h, regionIdx) {
  const regionBgs = [
    ['#1a0a4a','#2d1b69','#4a2a8c'], // Crystal Forest
    ['#4a0a0a','#8b1a0a','#cc3300'], // Ruby Volcano
    ['#0a2a4a','#0a4a8b','#0066cc'], // Sapphire Coast
    ['#0a2a0a','#1a5a1a','#2d8b2d'], // Emerald Garden
    ['#1a1a3a','#2a2a5a','#4a4a8b'], // Diamond Castle
  ];
  const colors = regionBgs[regionIdx % 5];
  const grd = ctx.createLinearGradient(x,y,x,y+h);
  grd.addColorStop(0, colors[0]); grd.addColorStop(0.5, colors[1]); grd.addColorStop(1, colors[2]);
  ctx.fillStyle = grd; ctx.fillRect(x,y,w,h);
}
// 중경 배경 폴백 — 시각적 깊이감을 위한 반투명 대기 레이어
function fbBgMid(ctx, x, y, w, h, regionIdx) {
  const midPatterns = [
    {c1:'rgba(100,50,200,0.15)',c2:'rgba(50,0,100,0.08)',shape:'tree'},   // Crystal Forest
    {c1:'rgba(200,50,0,0.12)',c2:'rgba(100,20,0,0.06)',shape:'rock'},     // Ruby Volcano
    {c1:'rgba(0,100,180,0.12)',c2:'rgba(0,50,100,0.06)',shape:'wave'},    // Sapphire Coast
    {c1:'rgba(50,150,50,0.15)',c2:'rgba(0,80,0,0.08)',shape:'flower'},    // Emerald Garden
    {c1:'rgba(100,100,180,0.12)',c2:'rgba(50,50,100,0.06)',shape:'crystal'}, // Diamond Castle
  ];
  const pat=midPatterns[regionIdx%5];
  // Atmospheric gradient overlay
  const grd=ctx.createLinearGradient(x,y+h*0.3,x,y+h);
  grd.addColorStop(0,'transparent'); grd.addColorStop(0.5,pat.c1); grd.addColorStop(1,pat.c2);
  ctx.fillStyle=grd; ctx.fillRect(x,y,w,h);
  // Silhouette shapes for depth
  ctx.save(); ctx.globalAlpha=0.08;
  const shapes=6;
  for (let i=0;i<shapes;i++) {
    const sx=x+w*(i/shapes)+w*0.05;
    const sy=y+h*0.5+(i%3)*h*0.08;
    const sw=w*0.15, sh=h*0.4;
    ctx.fillStyle=pat.c1;
    if (pat.shape==='tree') { ctx.beginPath(); ctx.moveTo(sx+sw/2,sy); ctx.lineTo(sx,sy+sh); ctx.lineTo(sx+sw,sy+sh); ctx.closePath(); ctx.fill(); }
    else if (pat.shape==='rock') { ctx.beginPath(); ctx.ellipse(sx+sw/2,sy+sh*0.7,sw*0.5,sh*0.3,0,0,Math.PI*2); ctx.fill(); }

}
function loadGame() {
  try {
    const d = Save.get(GAME_ID+'_save');
    if (d) {
      gSaveData = Object.assign({
        levelProgress:{}, boosters:{hammer:3,shuffle:2,extraTurns:2,colorBomb:1},
        failStreak:0, winStreak:0, miniFailStreak:0,
        kingsCupBest:0, dailyDate:0, dailyStars:0, teamBattleWins:0,
        settings:{lang:'ko',colorBlind:false,sfx:true,bgm:true}, totalStars:0
      }, d);
    }
  } catch(e) {}
  CONFIG.lang = gSaveData.settings.lang || 'ko';
  CONFIG.colorBlind = gSaveData.settings.colorBlind || false;
  CONFIG.sfxEnabled = gSaveData.settings.sfx !== false;
  CONFIG.bgmEnabled = gSaveData.settings.bgm !== false;
  gBoosters = Object.assign({hammer:3,shuffle:2,extraTurns:2,colorBomb:1}, gSaveData.boosters);

  gWinStreak = gSaveData.winStreak || 0;
  gMiniFailStreak = gSaveData.miniFailStreak || 0;
}
function isLevelUnlocked(idx) {
  if (idx === 0) return true;
  if (idx >= LEVELS.length) return false;
  if (LEVELS[idx].isEvent) return true;
  const prevId = LEVELS[idx-1].id;
  return !!(gSaveData.levelProgress[prevId] && gSaveData.levelProgress[prevId].stars >= 1);
}
function getLevelStars(levelId) {
  return (gSaveData.levelProgress[levelId] && gSaveData.levelProgress[levelId].stars) || 0;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §16. BOARD CREATION + UTILITY
// ═══════════════════════════════════════════════════════════════════════════════
function safeGridAccess(grid, r, c) {
  if (!grid || r<0||r>=ROWS||c<0||c>=COLS) return null;
  if (!grid[r]) return null;
  return grid[r][c] || null;
}
function makeCell(type, special) {
  return { type: type||'ruby', special: special||SPECIAL.NONE, obs: OBS.NONE, obsLayer: 0, matched: false, falling: false, offsetY: 0, scale: 1, alpha: 1, pieId: -1 };
}
function randomGemType() {
  return GEM_TYPES[gRng.randInt(0, GEM_TYPES.length-1)];
}

function createBoard(levelDef) {
  gGrid = [];
  for (let r=0; r<ROWS; r++) {
    gGrid[r] = [];
    for (let c=0; c<COLS; c++) {
      gGrid[r][c] = makeCell(randomGemType());
    }
  }
  // Place obstacles
  if (levelDef && levelDef.obstacles) {
    placeObstacles(levelDef.obstacles);
  }
  // Remove initial matches
  let tries = 0;
  while (findMatches().length > 0 && tries < 50) {
    resolveInitialMatches();
    tries++;
  }
  // Apply DDA adjustments
  applyDdaToBoard(levelDef);
}

function placeObstacles(obsDefs) {
  // Collect available positions (avoid corners for PIE)
  const positions = [];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) positions.push([r,c]);
  const shuffled = gRng.shuffle(positions);
  let ptr = 0;
  for (const def of obsDefs) {
    const count = def.count || 1;
    for (let i=0; i<count && ptr<shuffled.length; i++, ptr++) {
      const [r,c] = shuffled[ptr];
      if (def.obs === OBS.PIE) {
        // PIE needs 2x2 space ideally, just place center
        const cell = gGrid[r][c];
        cell.obs = OBS.PIE;
        cell.obsLayer = 6;
        const key = `${Math.round(0)}_${Math.round(0)}`; // will be fixed in render
        gPieData[r+'_'+c] = { remaining: 6, r, c };
      } else if (def.obs === OBS.STONE) {
        gGrid[r][c].obs = OBS.STONE;
        gGrid[r][c].obsLayer = 99; // indestructible
      } else if (def.obs === OBS.JELLY) {
        gGrid[r][c].obs = OBS.JELLY;
        gGrid[r][c].obsLayer = def.layer || 1;
      } else if (def.obs === OBS.ICE) {
        gGrid[r][c].obs = OBS.ICE;
        gGrid[r][c].obsLayer = def.layer || 1;
      } else {
        gGrid[r][c].obs = def.obs;
        gGrid[r][c].obsLayer = def.layer || (def.obs===OBS.CHAIN?2:1);
      }
    }
  }
}

function resolveInitialMatches() {
  const matches = findMatches();
  for (const match of matches) {
    for (const [r,c] of match.cells) {
      let newType;
      do { newType = randomGemType(); } while (newType === gGrid[r][c].type);
      gGrid[r][c].type = newType;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §17. MATCH FINDING — Priority: 5→T/L→4→3 with used[][] tracking
// ═══════════════════════════════════════════════════════════════════════════════
function findMatches() {
  const used = Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const matches = [];

  // Scan horizontal runs
  const hRuns = [];
  for (let r=0; r<ROWS; r++) {
    let c=0;
    while (c<COLS) {
      const cell = safeGridAccess(gGrid,r,c);
      if (!cell || cell.obs===OBS.STONE || cell.matched) { c++; continue; }
      let len=1;
      while (c+len<COLS) {
        const nc = safeGridAccess(gGrid,r,c+len);
        if (!nc || nc.type!==cell.type || nc.obs===OBS.STONE || nc.matched) break;
        len++;
      }
      if (len>=3) hRuns.push({r,c,len,dir:'h',type:cell.type});
      c+=len;
    }
  }
  // Scan vertical runs
  const vRuns = [];
  for (let c=0; c<COLS; c++) {
    let r=0;
    while (r<ROWS) {
      const cell = safeGridAccess(gGrid,r,c);
      if (!cell || cell.obs===OBS.STONE || cell.matched) { r++; continue; }
      let len=1;
      while (r+len<ROWS) {
        const nc = safeGridAccess(gGrid,r+len,c);
        if (!nc || nc.type!==cell.type || nc.obs===OBS.STONE || nc.matched) break;
        len++;
      }
      if (len>=3) vRuns.push({r,c,len,dir:'v',type:cell.type});
      r+=len;
    }
  }

  // Combine into match objects, priority: 5→T/L→4→3
  // Find T/L intersections
  const tlMatches = [];
  for (const h of hRuns) {
    for (const v of vRuns) {
      if (h.type !== v.type) continue;
      // Check overlap
      const overlapC = (v.c >= h.c && v.c < h.c+h.len);
      const overlapR = (h.r >= v.r && h.r < v.r+v.len);
      if (overlapC && overlapR) {
        const cells = new Set();
        for (let i=0;i<h.len;i++) cells.add(`${h.r},${h.c+i}`);
        for (let i=0;i<v.len;i++) cells.add(`${v.r+i},${v.c}`);
        const cellArr = [...cells].map(s=>s.split(',').map(Number));
        const total = cellArr.length;
        const special = (h.len>=3&&v.len>=3) ? SPECIAL.BOMB : SPECIAL.NONE;
        tlMatches.push({cells:cellArr,type:h.type,special,score:SCORE_TABLE.matchTL*total,tl:true,h,v});
      }
    }
  }

  // Priority: 5→T/L→4→3 (기획서 §2.2 매치 검출 우선순위)
  // Handle 5-matches FIRST (RAINBOW)
  for (const run of [...hRuns,...vRuns]) {
    if (run.len < 5) continue;
    const cells = [];
    for (let i=0;i<run.len;i++) {
      const r2 = run.dir==='h'?run.r:run.r+i;
      const c2 = run.dir==='h'?run.c+i:run.c;
      cells.push([r2,c2]);
    }
    let anyUsed = false;
    for (const [r,c] of cells) if (used[r][c]) { anyUsed=true; break; }
    if (anyUsed) continue;
    for (const [r,c] of cells) used[r][c]=true;
    matches.push({cells,type:run.type,special:SPECIAL.RAINBOW,score:SCORE_TABLE.match5*run.len,len5:true});
  }

  // Then T/L matches
  for (const m of tlMatches) {
    let anyUsed = false;
    for (const [r,c] of m.cells) if (used[r][c]) { anyUsed=true; break; }
    if (anyUsed) continue;
    for (const [r,c] of m.cells) used[r][c]=true;
    matches.push(m);
  }

  // 4-matches (LINE_H or LINE_V)
  for (const run of [...hRuns,...vRuns]) {
    if (run.len !== 4) continue;
    const cells = [];
    for (let i=0;i<run.len;i++) {
      const r2 = run.dir==='h'?run.r:run.r+i;
      const c2 = run.dir==='h'?run.c+i:run.c;
      cells.push([r2,c2]);
    }
    let anyUsed = false;
    for (const [r,c] of cells) if (used[r][c]) { anyUsed=true; break; }
    if (anyUsed) continue;
    for (const [r,c] of cells) used[r][c]=true;
    const special = run.dir==='h'?SPECIAL.LINE_H:SPECIAL.LINE_V;
    matches.push({cells,type:run.type,special,score:SCORE_TABLE.match4*4,len4:true});
  }

  // 3-matches
  for (const run of [...hRuns,...vRuns]) {
    if (run.len !== 3) continue;
    const cells = [];
    for (let i=0;i<run.len;i++) {
      const r2 = run.dir==='h'?run.r:run.r+i;
      const c2 = run.dir==='h'?run.c+i:run.c;
      cells.push([r2,c2]);
    }
    let anyUsed = false;
    for (const [r,c] of cells) if (used[r][c]) { anyUsed=true; break; }
    if (anyUsed) continue;
    for (const [r,c] of cells) used[r][c]=true;
    matches.push({cells,type:run.type,special:SPECIAL.NONE,score:SCORE_TABLE.match3*3,len3:true});
  }

  return matches;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §18. SPECIAL COMBO DETECTION
// ═══════════════════════════════════════════════════════════════════════════════
function checkSpecialCombo(r1,c1,r2,c2) {
  const a = safeGridAccess(gGrid,r1,c1);
  const b = safeGridAccess(gGrid,r2,c2);
  if (!a||!b) return null;
  const sa=a.special, sb=b.special;
  if (sa===SPECIAL.NONE && sb===SPECIAL.NONE) return null;
  // Both specials
  const isLine = s=>(s===SPECIAL.LINE_H||s===SPECIAL.LINE_V);
  if (sa===SPECIAL.RAINBOW && sb===SPECIAL.RAINBOW) return {type:'rainbowRainbow',r:r1,c:c1,score:SCORE_TABLE.rainbowRainbow};
  if (sa===SPECIAL.RAINBOW||sb===SPECIAL.RAINBOW) {
    const other = sa===SPECIAL.RAINBOW?sb:sa;
    const or2=sa===SPECIAL.RAINBOW?r2:r1, oc2=sa===SPECIAL.RAINBOW?c2:c1;
    if (other===SPECIAL.BOMB) return {type:'bombRainbow',r:or2,c:oc2,targetType:sa===SPECIAL.RAINBOW?b.type:a.type,score:SCORE_TABLE.bombRainbow};
    if (isLine(other)) return {type:'lineRainbow',r:or2,c:oc2,targetType:sa===SPECIAL.RAINBOW?b.type:a.type,score:SCORE_TABLE.lineRainbow};
    return {type:'basicRainbow',r:r1,c:c1,targetType:sb===SPECIAL.RAINBOW?a.type:b.type,score:SCORE_TABLE.lineRainbow};
  }
  if (sa===SPECIAL.BOMB && sb===SPECIAL.BOMB) return {type:'bombBomb',r:r1,c:c1,score:SCORE_TABLE.bombBomb};
  if (isLine(sa)&&isLine(sb)) return {type:'lineLine',r:r1,c:c1,score:SCORE_TABLE.lineLine};
  if ((isLine(sa)&&sb===SPECIAL.BOMB)||(sa===SPECIAL.BOMB&&isLine(sb))) return {type:'lineBomb',r:r1,c:c1,score:SCORE_TABLE.lineBomb};
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §19. OBSTACLE DAMAGE
// ═══════════════════════════════════════════════════════════════════════════════
function damageObstacle(r, c, direct) {
  const cell = safeGridAccess(gGrid,r,c);
  if (!cell||cell.obs===OBS.NONE) return false;
  if (cell.obs===OBS.STONE) return false; // indestructible
  if (cell.obs===OBS.ICE) {
    if (direct) { cell.obsLayer--; if (cell.obsLayer<=0) { cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('ice',1); gScore+=SCORE_TABLE.obstacle; return true; } }
    return false;
  }
  if (cell.obs===OBS.CHAIN) {
    cell.obsLayer--; if (cell.obsLayer<=0) { cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('chain',1); gScore+=SCORE_TABLE.obstacle; return true; }
    return false;
  }
  if (cell.obs===OBS.WOOD) {
    cell.obsLayer--; if (cell.obsLayer<=0) { cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('wood',1); gScore+=SCORE_TABLE.obstacle; return true; }
    return false;
  }
  if (cell.obs===OBS.CURTAIN) {
    cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('curtain',1); gScore+=SCORE_TABLE.obstacle; return true;
  }
  if (cell.obs===OBS.POISON) {
    cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('poison',1); gScore+=SCORE_TABLE.obstacle; return true;
  }
  if (cell.obs===OBS.JELLY) {
    cell.obsLayer--; if (cell.obsLayer<=0) { cell.obs=OBS.NONE; cell.obsLayer=0; addGoalProgress('jelly',1); gScore+=SCORE_TABLE.obstacle; return true; }
    return false;
  }
  if (cell.obs===OBS.PIE) {
    const key = r+'_'+c;
    if (gPieData[key]) {
      gPieData[key].remaining--;
      gScore+=SCORE_TABLE.piePiece;
      addGoalProgress('pie_piece',1);
      if (gPieData[key].remaining<=0) {
        delete gPieData[key];
        cell.obs=OBS.NONE; cell.obsLayer=0;
        gScore+=SCORE_TABLE.pieComplete;
        addGoalProgress('pie',1);
        return true;
      }
    }
    return false;
  }
  return false;
}

function damageAdjacentObstacles(r, c) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr,dc] of dirs) damageObstacle(r+dr, c+dc, true);
}

// ═══════════════════════════════════════════════════════════════════════════════
// §20. GOAL PROGRESS TRACKING
// ═══════════════════════════════════════════════════════════════════════════════
function initGoalProgress(levelDef) {
  gGoalProgress = {};
  if (!levelDef) return;
  for (const goal of levelDef.goals) {
    if (goal.type==='score') gGoalProgress.score = { current:0, target:goal.target };
    else if (goal.type==='collect') gGoalProgress['gem_'+goal.gem] = { current:0, target:goal.count };
    else if (goal.type==='obstacle') gGoalProgress[goal.obs] = { current:0, target:goal.count };
    else if (goal.type==='jelly') gGoalProgress.jelly = { current:0, target:goal.count };
    else if (goal.type==='pie') gGoalProgress.pie = { current:0, target:goal.count };
  }
}
function addGoalProgress(key, amount) {
  if (gGoalProgress[key]) {
    gGoalProgress[key].current = Math.min(gGoalProgress[key].current+amount, gGoalProgress[key].target);
  }
  // Score always tracked
  if (key==='score') {
    if (gGoalProgress.score) gGoalProgress.score.current = Math.min(gGoalProgress.score.current+amount, gGoalProgress.score.target);
  }
}
function updateScoreGoal() {
  if (gGoalProgress.score) gGoalProgress.score.current = Math.min(gScore, gGoalProgress.score.target);
}
function allGoalsComplete() {
  for (const k in gGoalProgress) {
    if (gGoalProgress[k].current < gGoalProgress[k].target) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §21. MATCH PROCESSING — processMatches, gravity, refill
// ═══════════════════════════════════════════════════════════════════════════════
function processMatches(matches, comboMult) {
  let totalScore = 0;
  const specials = []; // {r,c,special,type} to create
  for (const match of matches) {
    // Score
    const base = match.score || (SCORE_TABLE.match3 * match.cells.length);
    const scored = Math.floor(base * comboMult);
    totalScore += scored;
    // Collect gems
    for (const [r,c] of match.cells) {
      const cell = safeGridAccess(gGrid,r,c);
      if (!cell) continue;
      if (cell.obs===OBS.ICE) { damageObstacle(r,c,true); continue; }
      // Count gem for collection goals
      addGoalProgress('gem_'+cell.type, 1);
      addGoalProgress('gem_any', 1);
      // Damage adjacent obstacles (ice/jelly/chain etc)
      damageAdjacentObstacles(r,c);
      // Particle effect
      emitMatchParticles(r,c,cell.type);
      cell.matched = true;
    }
    // Create special gem if needed
    if (match.special !== SPECIAL.NONE) {
      // Place at center of match
      const centerCell = match.cells[Math.floor(match.cells.length/2)];
      specials.push({ r:centerCell[0], c:centerCell[1], special:match.special, type:match.type });
    }
  }
  gScore += totalScore;
  updateScoreGoal();
  // Remove matched cells
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    if (gGrid[r][c] && gGrid[r][c].matched) {
      // If stone overlay — don't remove gem underneath? No, stone is never matched
      gGrid[r][c] = null;
    }
  }
  // Place specials
  for (const sp of specials) {
    if (!gGrid[sp.r][sp.c]) {
      gGrid[sp.r][sp.c] = makeCell(sp.type, sp.special);
    }
  }
  return totalScore;
}

function doGravity() {
  let moved = false;
  for (let c=0; c<COLS; c++) {
    let emptyRow = ROWS-1;
    for (let r=ROWS-1; r>=0; r--) {
      if (gGrid[r][c]) {
        if (r!==emptyRow) {
          gGrid[emptyRow][c] = gGrid[r][c];
          gGrid[r][c] = null;
          gGrid[emptyRow][c].falling = true;
          gGrid[emptyRow][c].offsetY = -(emptyRow-r)*getCellSize();
          moved = true;
        }
        emptyRow--;
      }
    }
  }
  return moved;
}

function refillBoard() {
  let added = false;
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (!gGrid[r][c]) {
        // Random chance for special on refill
        const sp = (gCurrentLevel && gRng.next()<(gCurrentLevel.specialRate||0.05)) ? pickSpecialType() : SPECIAL.NONE;
        gGrid[r][c] = makeCell(randomGemType(), sp);
        gGrid[r][c].falling = true;
        gGrid[r][c].offsetY = -(r+1)*getCellSize();
        added = true;
      }
    }
  }
  return added;
}
function pickSpecialType() {
  const r = gRng.next();
  if (r<0.35) return SPECIAL.LINE_H;
  if (r<0.70) return SPECIAL.LINE_V;
  if (r<0.90) return SPECIAL.BOMB;
  return SPECIAL.RAINBOW;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §22. SPECIAL ACTIVATION
// ═══════════════════════════════════════════════════════════════════════════════
function activateSpecial(r, c, skipQueue) {
  const cell = safeGridAccess(gGrid,r,c);
  if (!cell || cell.special===SPECIAL.NONE) return;
  const sp = cell.special;
  cell.special = SPECIAL.NONE; // consume
  soundSfx('special');
  if (sp===SPECIAL.LINE_H) {
    for (let cc=0; cc<COLS; cc++) explodeCell(r,cc);
    addEffect('laser',r,c,'h');
  } else if (sp===SPECIAL.LINE_V) {
    for (let rr=0; rr<ROWS; rr++) explodeCell(rr,c);
    addEffect('laser',r,c,'v');
  } else if (sp===SPECIAL.BOMB) {
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) explodeCell(r+dr,c+dc);
    addEffect('bomb',r,c);
  } else if (sp===SPECIAL.RAINBOW) {
    // destroy all gems of a random type
    const targetType = GEM_TYPES[gRng.randInt(0,GEM_TYPES.length-1)];
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) {
      const nc=safeGridAccess(gGrid,rr,cc);
      if (nc && nc.type===targetType) explodeCell(rr,cc);
    }
    addEffect('rainbow',r,c);
    gScore += SCORE_TABLE.lineRainbow;
  }
}

function explodeCell(r, c) {
  const cell = safeGridAccess(gGrid,r,c);
  if (!cell) return;
  if (cell.obs===OBS.STONE) return;
  if (cell.special !== SPECIAL.NONE) {
    // Chain reaction — push to queue
    const sp = cell.special;
    gSpecialQueue.push({r,c});
  }
  damageObstacle(r,c,true);
  if (cell.obs===OBS.NONE || cell.obs===OBS.ICE && cell.obsLayer<=0) {
    addGoalProgress('gem_'+cell.type,1);
    addGoalProgress('gem_any',1);
    emitMatchParticles(r,c,cell.type||'ruby');
    gGrid[r][c] = null;
    gScore += 30;
    updateScoreGoal();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §23. CASCADE CHAIN (enterState → CASCADE → processMatches → gravity → refill → repeat)
// ═══════════════════════════════════════════════════════════════════════════════
function startCascade() {
  GUARDS.cascadeInProgress = true;
  gCascadeDepth = 0;
  continueCascade();
}

function continueCascade() {
  // Process special queue first
  while (gSpecialQueue.length>0) {
    const {r,c} = gSpecialQueue.shift();
    activateSpecial(r,c,true);
  }
  const matches = findMatches();
  if (matches.length===0) {
    // Check gravity
    const moved = doGravity();
    if (moved) {
      // animate gravity then retry
      tweener.add({_:0},{_:1},280,'easeOut',()=>{ refillBoard(); tweener.add({_:0},{_:1},200,'easeOut',()=>continueCascade()); });
      return;
    }
    refillBoard();
    tweener.add({_:0},{_:1},200,'easeOut',()=>{
      const m2=findMatches();
      if (m2.length>0) { gCascadeDepth++; continueWithMatches(m2); }
      else { finishCascade(); }
    });
    return;
  }
  continueWithMatches(matches);
}

function continueWithMatches(matches) {
  let mult = 1;
  if (gCascadeDepth===1) mult=SCORE_TABLE.cascade2;
  else if (gCascadeDepth===2) mult=SCORE_TABLE.cascade3;
  else if (gCascadeDepth>=3) mult=SCORE_TABLE.cascade4p;
  if (gCascadeDepth>=1) { showComboPopup(gCascadeDepth+1); soundSfx('combo'); }
  processMatches(matches, mult);
  gCascadeDepth++;
  poisonSpread();
  tweener.add({_:0},{_:1},300,'easeOut',()=>{
    doGravity();
    tweener.add({_:0},{_:1},250,'easeOut',()=>{ refillBoard(); tweener.add({_:0},{_:1},200,'easeOut',()=>continueCascade()); });
  });
}

function finishCascade() {
  GUARDS.cascadeInProgress = false;
  GUARDS.swapLocked = false;
  // Process special queue remnants
  while (gSpecialQueue.length>0) { const {r,c}=gSpecialQueue.shift(); activateSpecial(r,c,true); }
  soundSfx('land');
  deferTransition(STATE.GOAL_CHECK);
}

// ═══════════════════════════════════════════════════════════════════════════════
// §24. POISON SPREAD
// ═══════════════════════════════════════════════════════════════════════════════
function poisonSpread() {
  if (gState!==STATE.PLAY && gState!==STATE.CASCADE) return;
  gPoisonSpreadCounter++;
  if (gPoisonSpreadCounter % CONFIG.poisonSpreadInterval !== 0) return;
  const poisonCells = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (gGrid[r][c] && gGrid[r][c].obs===OBS.POISON) poisonCells.push([r,c]);
  }
  if (poisonCells.length===0) return;
  GUARDS.poisonSpreading = true;
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  for (const [r,c] of poisonCells) {
    gRng.shuffle(dirs);
    for (const [dr,dc] of dirs) {
      const nr=r+dr, nc=c+dc;
      const nc2=safeGridAccess(gGrid,nr,nc);
      if (nc2 && nc2.obs===OBS.NONE && nc2.obs!==OBS.STONE) {
        nc2.obs=OBS.POISON; nc2.obsLayer=1;
        break;
      }
    }
  }
  GUARDS.poisonSpreading = false;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §25. SWAP LOGIC
// ═══════════════════════════════════════════════════════════════════════════════
function trySwap(r1, c1, r2, c2) {
  if (isInputBlocked()) return;
  if (Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
  const a=safeGridAccess(gGrid,r1,c1), b=safeGridAccess(gGrid,r2,c2);
  if (!a||!b) return;
  if (a.obs===OBS.STONE||b.obs===OBS.STONE) return;

  // Check special combo first
  const combo=checkSpecialCombo(r1,c1,r2,c2);
  if (combo) {
    GUARDS.swapLocked=true;
    doSwap(r1,c1,r2,c2);
    soundSfx('special');
    resolveSpecialCombo(combo);
    gTurnsLeft--;
    soundSfx('swap');
    return;
  }

  // Normal swap
  doSwap(r1,c1,r2,c2);
  const matches = findMatches();
  if (matches.length===0 && !a.special && !b.special) {
    // invalid swap — revert
    soundSfx('fail');
    tweener.add({_:0},{_:1},200,'easeOut',()=>doSwap(r1,c1,r2,c2));
    return;
  }
  // Valid
  GUARDS.swapLocked=true;
  gTurnsLeft--;
  gHintTimer=0; gHintCells=null;
  soundSfx('swap');
  if (a.special!==SPECIAL.NONE) { gSpecialQueue.push({r:r1,c:c1}); }
  if (b.special!==SPECIAL.NONE) { gSpecialQueue.push({r:r2,c:c2}); }
  tweener.add({_:0},{_:1},180,'easeOut',()=>startCascade());
}

function doSwap(r1,c1,r2,c2) {
  const tmp=gGrid[r1][c1]; gGrid[r1][c1]=gGrid[r2][c2]; gGrid[r2][c2]=tmp;
}

function resolveSpecialCombo(combo) {
  const {type,r,c} = combo;
  gScore += combo.score||0;
  updateScoreGoal();
  if (type==='rainbowRainbow') {
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) explodeCell(rr,cc);
    addEffect('rainbow',r,c);
  } else if (type==='bombBomb') {
    for (let dr=-2;dr<=2;dr++) for (let dc=-2;dc<=2;dc++) explodeCell(r+dr,c+dc);
    addEffect('bomb',r,c);
  } else if (type==='lineLine') {
    for (let cc=0;cc<COLS;cc++) explodeCell(r,cc);
    for (let rr=0;rr<ROWS;rr++) explodeCell(rr,c);
    addEffect('laser',r,c,'cross');
  } else if (type==='lineBomb') {
    for (let cc=0;cc<COLS;cc++) { explodeCell(r,cc); explodeCell(r-1,cc); explodeCell(r+1,cc); }
    addEffect('bomb',r,c);
  } else if (type==='lineRainbow') {
    const target=combo.targetType||'ruby';
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) {
      const nc=safeGridAccess(gGrid,rr,cc); if (nc&&nc.type===target) { gSpecialQueue.push({r:rr,c:cc}); explodeCell(rr,cc); }
    }
    addEffect('rainbow',r,c);
  } else if (type==='bombRainbow') {
    const target=combo.targetType||'ruby';
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) {
      const nc=safeGridAccess(gGrid,rr,cc); if (nc&&nc.type===target) { for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) explodeCell(rr+dr,cc+dc); }
    }
    addEffect('bomb',r,c);
  } else if (type==='basicRainbow') {
    const target=combo.targetType||'ruby';
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) {
      const nc=safeGridAccess(gGrid,rr,cc); if (nc&&nc.type===target) explodeCell(rr,cc);
    }
    addEffect('rainbow',r,c);
  }
  tweener.add({_:0},{_:1},350,'easeOut',()=>startCascade());
}

// ═══════════════════════════════════════════════════════════════════════════════
// §26. BOOSTER SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function useBooster(type) {
  if (isInputBlocked()) return;
  if (gBoosters[boosterKey(type)] <= 0) return;
  GUARDS.boosterActive = true;
  gBoosterMode = type;
  soundSfx('booster');
}
function boosterKey(type) {
  const keys = ['hammer','shuffle','extraTurns','colorBomb'];
  return keys[type] || 'hammer';
}
function executeBooster(type, r, c) {
  if (type===BOOSTER.HAMMER) {
    const cell=safeGridAccess(gGrid,r,c); if (!cell) return;
    if (cell.obs===OBS.STONE) { GUARDS.boosterActive=false; gBoosterMode=null; soundSfx('fail'); return; }
    gBoosters.hammer = Math.max(0,gBoosters.hammer-1);
    explodeCell(r,c); soundSfx('special');
    tweener.add({_:0},{_:1},250,'easeOut',()=>{ doGravity(); tweener.add({_:0},{_:1},200,'easeOut',()=>{ refillBoard(); startCascade(); }); });
  } else if (type===BOOSTER.COLOR_BOMB) {
    const cell=safeGridAccess(gGrid,r,c); if (!cell) return;
    gBoosters.colorBomb = Math.max(0,gBoosters.colorBomb-1);
    GUARDS.colorBombResolving=true;
    const target=cell.type;
    for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) { const nc=safeGridAccess(gGrid,rr,cc); if (nc&&nc.type===target) explodeCell(rr,cc); }
    addEffect('rainbow',r,c);
    tweener.add({_:0},{_:1},300,'easeOut',()=>{ GUARDS.colorBombResolving=false; doGravity(); tweener.add({_:0},{_:1},200,'easeOut',()=>{ refillBoard(); startCascade(); }); });
  }
  GUARDS.boosterActive=false;
  gBoosterMode=null;
}
function executeShuffleBooster() {
  if (isInputBlocked()) return;
  gBoosters.shuffle=Math.max(0,gBoosters.shuffle-1);
  GUARDS.boardShuffling=true;
  soundSfx('shuffle');
  // Collect non-obstacle gems
  const gems=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const cell=gGrid[r][c]; if (cell&&cell.obs===OBS.NONE&&cell.special===SPECIAL.NONE) gems.push(cell);
  }
  const shuffled=gRng.shuffle([...gems]);
  let idx=0;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const cell=gGrid[r][c]; if (cell&&cell.obs===OBS.NONE&&cell.special===SPECIAL.NONE) { gGrid[r][c]=shuffled[idx++]; }
  }
  tweener.add({_:0},{_:1},400,'easeOut',()=>{ GUARDS.boardShuffling=false; });
}
function executeExtraTurns() {
  gBoosters.extraTurns=Math.max(0,gBoosters.extraTurns-1);
  gTurnsLeft+=5;
  soundSfx('reward');
}

// ═══════════════════════════════════════════════════════════════════════════════
// §27. DDA — Dynamic Difficulty Adjustment (4 levels)
// ═══════════════════════════════════════════════════════════════════════════════
function applyDdaToBoard(levelDef) {
  if (!levelDef || !levelDef.ddaOk) return;
  const fs = gFailStreak;
  if (fs<=0) return;
  gDdaAdjusted = true;
  if (fs>=6) {
    gTurnsLeft+=6;
    // Reduce goal targets by up to 6
    reduceGoals(6);
    // Remove random obstacle type
    removeRandomObstacleType();
    // Grant free booster
    if (!gDdaFreeBooster) { gBoosters.hammer++; gDdaFreeBooster=true; soundSfx('reward'); }
  } else if (fs>=4) {
    gTurnsLeft+=4;
    reduceGoals(4);
    // reduce obstacle durability by 1
    reduceObstacleDurability(1);
  } else if (fs>=2) {
    gTurnsLeft+=2;
    reduceGoals(2);
  }
}
function reduceGoals(amount) {
  for (const k in gGoalProgress) {
    const g=gGoalProgress[k];
    if (g.target>5) g.target=Math.max(1,g.target-amount);
  }
}
function reduceObstacleDurability(amount) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const cell=gGrid[r][c]; if (!cell||cell.obs===OBS.NONE||cell.obs===OBS.STONE) continue;
    cell.obsLayer=Math.max(1,cell.obsLayer-amount);
  }
}
function removeRandomObstacleType() {
  const types=[OBS.ICE,OBS.CHAIN,OBS.WOOD,OBS.CURTAIN,OBS.POISON,OBS.JELLY];
  const present=[]; for (const t of types) { for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) { if (gGrid[r][c]&&gGrid[r][c].obs===t){present.push(t);break;} } }
  if (present.length===0) return;
  const t=present[gRng.randInt(0,present.length-1)];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) { if (gGrid[r][c]&&gGrid[r][c].obs===t) { gGrid[r][c].obs=OBS.NONE; gGrid[r][c].obsLayer=0; } }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §28. HINT SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function findHint() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const dirs=[[0,1],[1,0]];
    for (const [dr,dc] of dirs) {
      const r2=r+dr, c2=c+dc;
      if (r2>=ROWS||c2>=COLS) continue;
      doSwap(r,c,r2,c2);
      const m=findMatches();
      doSwap(r,c,r2,c2);
      if (m.length>0) return [[r,c],[r2,c2]];
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §29. STAR RATING
// ═══════════════════════════════════════════════════════════════════════════════
function calcStars(levelDef, score, turnsLeft) {
  if (!allGoalsComplete()) return 0;
  const s2 = levelDef.star2||0, s3 = levelDef.star3||0;
  if (s3>0 && score>=s3 && turnsLeft>=3) return 3;
  if (s2>0 && score>=s2) return 2;
  return 1;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §30. EFFECT OVERLAYS + PARTICLES
// ═══════════════════════════════════════════════════════════════════════════════
const _rawParticles = new Particles(500);
// Wrap: Particles.update expects dt in ms, but game now passes dt in seconds
const particles = {
  emit(x,y,count,opts) { _rawParticles.emit(x,y,count,opts); },
  update(dtSec) { _rawParticles.update(dtSec * 1000); },
  render(ctx) { _rawParticles.render(ctx); },
  clear() { _rawParticles.clear(); },
  get count() { return _rawParticles.count; },
};
function emitMatchParticles(r, c, gemType) {
  const {x,y} = cellCenter(r,c);
  const col = GEM_COLORS[gemType]||'#fff';
  particles.emit(x,y,8,{color:col,speed:120,life:0.5,size:4,spread:Math.PI*2});
}
function addEffect(type, r, c, dir) {
  const {x,y}=cellCenter(r,c); const sz=getCellSize();
  gActiveEffects.push({type,x,y,sz,dir,timer:0,duration:0.5,alpha:1});
}
function showComboPopup(n) {
  const w2=Layout.cx()*2, h2=Layout.cy()*2;
  gComboPopups.push({n,x:w2*0.5,y:h2*0.4,timer:0,duration:1.2,alpha:1,scale:1});
  if (n>=3) particles.emit(w2*0.5,h2*0.4,20,{color:'#FFD700',speed:200,life:0.8,size:6,spread:Math.PI*2});
}
function updateEffects(dt) {
  for (let i=gActiveEffects.length-1;i>=0;i--) {
    const e=gActiveEffects[i]; e.timer+=dt;
    e.alpha=1-e.timer/e.duration;
    if (e.timer>=e.duration) gActiveEffects.splice(i,1);
  }
  for (let i=gComboPopups.length-1;i>=0;i--) {
    const p=gComboPopups[i]; p.timer+=dt;
    p.alpha=1-p.timer/p.duration; p.scale=1+p.timer*0.5;
    if (p.timer>=p.duration) gComboPopups.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §31. BOARD LAYOUT HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function getCellSize() {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const boardW=cw*0.86, boardH=ch*0.6;
  return Math.floor(Math.min(boardW/COLS, boardH/ROWS));
}
function getBoardOrigin() {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const cs=getCellSize();
  const bw=cs*COLS, bh=cs*ROWS;
  return { x:Math.floor((cw-bw)/2), y:Math.floor(ch*0.22) };
}
function cellToPixel(r, c) {
  const {x,y}=getBoardOrigin(); const cs=getCellSize();
  return { x:x+c*cs, y:y+r*cs };
}
function cellCenter(r, c) {
  const p=cellToPixel(r,c); const cs=getCellSize();
  return { x:p.x+cs/2, y:p.y+cs/2 };
}
function pixelToCell(px, py) {
  const {x,y}=getBoardOrigin(); const cs=getCellSize();
  const c=Math.floor((px-x)/cs), r=Math.floor((py-y)/cs);
  if (r<0||r>=ROWS||c<0||c>=COLS) return null;
  return {r,c};
}

// ═══════════════════════════════════════════════════════════════════════════════
// §32. SOUND SYSTEM — BGM (dt-based) + 18 SFX
// ═══════════════════════════════════════════════════════════════════════════════
const _rawSound = new Sound();

const sound = {
  init() { _rawSound.init(); _rawSound.resume(); },
  tone(freq, vol, duration, type) { _rawSound.tone(freq, duration || 0.1, type || 'square', vol || 0.3); },
};
let soundInited = false;
function ensureSound() { if (!soundInited) { try { sound.init(); soundInited=true; } catch(e){} } }
function soundSfx(name) {
  if (!CONFIG.sfxEnabled||!soundInited) return;
  const sfxMap = {
    swap:   ()=>sound.tone(440,0.05,0.1,'sine'),

    booster:()=>sound.tone(784,0.1,0.2,'triangle'),

    event:  ()=>{ [440,550,660,880].forEach((f,i)=>setTimeout(()=>sound.tone(f,0.08,0.15,'triangle'),i*90)); },
    mini:   ()=>sound.tone(330,0.08,0.2,'sawtooth'),
    poison: ()=>sound.tone(200,0.07,0.25,'sawtooth'),
    ice:    ()=>sound.tone(800,0.06,0.1,'sine'),
    pie:    ()=>{ [440,550,440].forEach((f,i)=>setTimeout(()=>sound.tone(f,0.06,0.1,'triangle'),i*70)); },
  };
  try { (sfxMap[name]||sfxMap.tap)(); } catch(e){}
}
function updateBgm(dt) {
  if (!CONFIG.bgmEnabled||!soundInited) return;
  bgmTimer+=dt;
  const interval=0.45;
  if (bgmTimer>=interval) {
    bgmTimer-=interval;
    const note=bgmScale[bgmPhase%bgmScale.length];
    bgmPhase++;
    try { sound.tone(note*0.5,0.04,interval*0.7,'sine'); } catch(e){}
    // Occasional harmony
    if (bgmPhase%4===0) { try { sound.tone(note*0.75,0.025,interval*0.5,'triangle'); } catch(e){} }
  }
}
function setBgmRegion(regionIdx) {
  bgmScale = BGM_SCALES[regionIdx%BGM_SCALES.length];
  bgmPhase = 0;
}

// ═══════════════════════════════════════════════════════════════════════════════
// §33. STATE ENTRY — enterState() centralized
// ═══════════════════════════════════════════════════════════════════════════════
function enterState(newState, data) {
  data = data || {};
  gPrevState = gState;
  gState = newState;
  resetGuards();
  gSelectedCell = null;
  gBoosterMode = null;

  switch(newState) {
    case STATE.TITLE:
      setBgmRegion(0);
      gTitleTimer = 0;
      gTitleGems = [];
      for (let i=0;i<12;i++) {
        gTitleGems.push({
          type:GEM_TYPES[gRng.randInt(0,GEM_TYPES.length-1)],
          x:gRng.next(), y:gRng.next(),
          vx:(gRng.next()-0.5)*0.04, vy:(gRng.next()-0.5)*0.04,
          size:gRng.randInt(20,50), alpha:gRng.next()*0.6+0.2,
          phase:gRng.next()*Math.PI*2
        });
      }
      break;

    case STATE.MAP:
      setBgmRegion(data.regionIdx||0);
      gMapScrollY = data.scrollY||0;
      gMapScrollVel = 0;
      gMapDragStart = null;
      break;

    case STATE.EVENT_HUB:
      setBgmRegion(0);
      gEventState.hubTab = data.tab||0;
      gEventState.superBoosterReady = gWinStreak >= CONFIG.superBoosterStreaks[0];
      break;

    case STATE.LEVEL_INTRO:
      gCurrentLevelIdx = data.levelIdx !== undefined ? data.levelIdx : gCurrentLevelIdx;
      gCurrentLevel = LEVELS[gCurrentLevelIdx];
      setBgmRegion(gCurrentLevel.region||0);
      gLevelIntroTimer = 0;
      gKingEmotion = 'idle';
      break;

    case STATE.PLAY:
    case STATE.DAILY_CHALLENGE:
    case STATE.KINGS_CUP:
    case STATE.TEAM_BATTLE: {
      const lvl = data.levelDef || gCurrentLevel;
      if (!lvl) break;
      gCurrentLevel = lvl;
      gScore = 0;
      gTurnsLeft = lvl.turns;
      gComboCount = 0;
      gCascadeDepth = 0;
      gPoisonSpreadCounter = 0;
      gPieData = {};
      gActiveEffects = [];
      gComboPopups = [];
      gSpecialQueue = [];
      gHintTimer = 0;
      gHintCells = null;
      gDdaFreeBooster = false;
      gBoosters = Object.assign({hammer:3,shuffle:2,extraTurns:2,colorBomb:1}, gSaveData.boosters);
      initGoalProgress(lvl);
      createBoard(lvl);
      setBgmRegion(lvl.region||0);
      soundSfx('tap');
      break;
    }

    case STATE.CASCADE:
      break;

    case STATE.GOAL_CHECK:
      GUARDS.goalChecking = true;
      break;

    case STATE.RESULT: {
      GUARDS.goalChecking = false;
      const won = data.won !== undefined ? data.won : allGoalsComplete();
      gResultStars = won ? calcStars(gCurrentLevel, gScore, gTurnsLeft) : 0;
      gResultAnimTimer = 0;
      gResultScore = gScore;
      if (won) {
        soundSfx('clear');
        gKingEmotion = 'happy';
        const bonus = gTurnsLeft * SCORE_TABLE.turnRemain;
        gScore += bonus; gResultScore = gScore;
        if (gCurrentLevel) {
          const id = gCurrentLevel.id;
          const prev = gSaveData.levelProgress[id] || {stars:0, score:0};
          if (gResultStars > prev.stars || gScore > prev.score) {
            gSaveData.levelProgress[id] = { stars:Math.max(prev.stars,gResultStars), score:Math.max(prev.score,gScore) };
          }
        }
        gWinStreak++;
        gFailStreak = 0;
        gSaveData.winStreak = gWinStreak;
        gSaveData.failStreak = gFailStreak;
        gSaveData.totalStars = Object.values(gSaveData.levelProgress).reduce((a,v)=>a+(v.stars||0),0);
        gSaveData.boosters = {...gBoosters};
        saveGame();
      } else {
        soundSfx('lose');
        gKingEmotion = 'scared';
        gFailStreak++;
        gWinStreak = 0;
        gSaveData.failStreak = gFailStreak;
        gSaveData.winStreak = gWinStreak;
        saveGame();
      }
      particles.clear();
      if (won && gResultStars>=3) {
        const cwR=Layout.cx()*2;
        particles.emit(cwR*0.5,Layout.cy()*0.5,40,{color:'#FFD700',speed:300,life:1.5,size:8,spread:Math.PI*2});
      }
      break;
    }

    case STATE.PAUSE:
      gKingEmotion = 'surprised';
      break;

    case STATE.MINI_HUB:
      setBgmRegion(0);
      break;

    case STATE.MINI_INTRO:
      gMiniType = data.miniType !== undefined ? data.miniType : gMiniType;
      gLevelIntroTimer = 0;
      setBgmRegion(gMiniType+1);
      break;

    case STATE.MINI_GAME:
      GUARDS.miniGameActive = true;
      gMiniSuccess = false;
      gMiniStars = 0;
      gMiniData = {};
      gMiniTimer = 45000;
      initMiniGame(gMiniType);
      break;

    case STATE.MINI_RESULT:
      GUARDS.miniGameActive = false;
      gMiniFailStreak = gMiniSuccess ? 0 : (gMiniFailStreak+1);
      gSaveData.miniFailStreak = gMiniFailStreak;
      saveGame();
      soundSfx(gMiniSuccess ? 'clear' : 'lose');
      if (gMiniSuccess) particles.emit(Layout.cx(),Layout.cy(),30,{color:'#FFD700',speed:250,life:1.2,size:7,spread:Math.PI*2});
      break;

    case STATE.SUPER_BOOSTER: {
      const streakSB = gWinStreak;
      let rewardTypeSB = null;
      if (streakSB>=10) rewardTypeSB=BOOSTER.COLOR_BOMB;
      else if (streakSB>=7) rewardTypeSB=BOOSTER.EXTRA_TURNS;
      else if (streakSB>=5) rewardTypeSB=BOOSTER.HAMMER;
      else if (streakSB>=3) rewardTypeSB=BOOSTER.SHUFFLE;
      if (rewardTypeSB!==null) {
        const keySB=boosterKey(rewardTypeSB);
        gBoosters[keySB]=(gBoosters[keySB]||0)+1;
        gSaveData.boosters={...gBoosters};
        saveGame();
        soundSfx('reward');
      }
      gEventState.superBoosterReady = false;
      break;
    }
  }

  gFadeObj = {a:1};
  tweener.add(gFadeObj,{a:0},350,'easeOut');
}

function beginTransition(toState, data) {
  if (!TRANSITION_TABLE[gState] || !TRANSITION_TABLE[gState].includes(toState)) {
    console.warn('Invalid transition: '+STATE_NAMES[gState]+' -> '+STATE_NAMES[toState]);
    return;
  }
  gFadeObj = {a:0};
  tweener.add(gFadeObj,{a:1},280,'easeIn',()=>enterState(toState, data||{}));
}

function directTransition(toState, data) {
  if (!TRANSITION_TABLE[gState] || !TRANSITION_TABLE[gState].includes(toState)) {
    console.warn('Invalid direct: '+STATE_NAMES[gState]+' -> '+STATE_NAMES[toState]);
    return;
  }
  enterState(toState, data||{});
}

function kingsCupGenerateAI(levelIdx) {
  const baseMults = [0.6,0.75,0.85,0.95,1.1];
  return CONFIG.kingsCupAI.map((_name,i) => {
    const rngAI = new SeededRNG(Date.now()+i*1337+levelIdx*999);
    const base = 8000 + levelIdx*3000;
    return Math.floor(base * baseMults[i] * (0.8+rngAI.next()*0.4));
  });
}
function kingsCupNextLevel() {
  const kc = gEventState;
  kc.kingsCupLevel++;
  if (kc.kingsCupLevel >= 5) { deferTransition(STATE.RESULT, {won:true, isKingsCup:true}); return; }
  const evIdx = 25 + kc.kingsCupLevel;
  const kcLvl = LEVELS[Math.min(evIdx, LEVELS.length-1)];
  beginTransition(STATE.PLAY, {levelDef:kcLvl});
}

  const kc = gEventState;
  kc.kingsCupScores.push(score);

  aiScores.forEach((s,i)=>{ kc.kingsCupAIScores[i]=(kc.kingsCupAIScores[i]||0)+s; });
  if (score > gSaveData.kingsCupBest) { gSaveData.kingsCupBest=score; saveGame(); }
}

function getDailyChallengeDef() {
  const seed = dailySeed();
  const rngDC = new SeededRNG(seed);
  const ruleIdx = rngDC.randInt(0, CONFIG.dailyRules.length-1);
  const rule = CONFIG.dailyRules[ruleIdx];
  const baseLvl = LEVELS[rngDC.randInt(0,24)];
  const daily = JSON.parse(JSON.stringify(baseLvl));
  daily.id = 'DAILY_'+seed;
  daily.turns = 20;
  daily.ddaOk = false;
  daily.isDaily = true;
  daily.rule = rule;
  if (rule==='timed') daily.turns = 99;
  if (rule==='noSpecial') daily.specialRate = 0;
  if (rule==='score') { daily.goals=[{type:'score',target:rngDC.randInt(20000,60000)}]; daily.star2=daily.goals[0].target*1.5; daily.star3=daily.goals[0].target*2; }

}

function teamBattleGenerateAI(teamIdx, levelIdx) {

function generateMaze(cols, rows) {
  const maze=[];
  for (let r=0;r<rows;r++) { maze[r]=[]; for (let c=0;c<cols;c++) maze[r][c]={right:true,down:true,visited:false}; }
  const stack=[[0,0]]; maze[0][0].visited=true;
  while (stack.length>0) {
    const [r,c]=stack[stack.length-1]; const neighbors=[];
    if (r>0&&!maze[r-1][c].visited) neighbors.push([r-1,c,'up']);
    if (r<rows-1&&!maze[r+1][c].visited) neighbors.push([r+1,c,'down']);
    if (c>0&&!maze[r][c-1].visited) neighbors.push([r,c-1,'left']);
    if (c<cols-1&&!maze[r][c+1].visited) neighbors.push([r,c+1,'right']);
    if (neighbors.length===0) { stack.pop(); continue; }
    const [nr,nc,dir]=neighbors[gRng.randInt(0,neighbors.length-1)];
    if (dir==='right') maze[r][c].right=false;
    else if (dir==='down') maze[r][c].down=false;
    else if (dir==='left') maze[r][nc].right=false;
    else if (dir==='up') maze[nr][c].down=false;
    maze[nr][nc].visited=true; stack.push([nr,nc]);
  }
  return maze;
}
function mazeBFS(maze,sr,sc,er,ec,rows,cols) {
  const queue=[[sr,sc,[]]]; const vis=Array.from({length:rows},()=>Array(cols).fill(false)); vis[sr][sc]=true;
  while (queue.length>0) {
    const [r,c,path]=queue.shift();
    if (r===er&&c===ec) return [...path,[r,c]];
    const dirs3=[[-1,c,'up'],[r+1,c,'down'],[r,c+1,'right'],[r,c-1,'left']];
    for (const [nr,nc,dir] of dirs3) {
      if (nr<0||nr>=rows||nc<0||nc>=cols||vis[nr][nc]) continue;
      let ok=false;
      if (dir==='right'&&!maze[r][c].right) ok=true;
      else if (dir==='down'&&!maze[r][c].down) ok=true;

function updateMiniDragon(dt, inp) {
  const dDR=gMiniData; if (dDR.gameOver) return;
  const cwDR=Layout.cx()*2, chDR=Layout.cy()*2;
  dDR.phaseTimer+=dt; dDR.attackTimer+=dt;

  if (inp.tapped) dDR.lastTap={x:inp.tapX,y:inp.tapY};

  const distDR=Math.hypot(dxDR,dyDR);
  if (distDR>5) { const spdDR=180; dDR.playerX+=dxDR/distDR*spdDR*dt; dDR.playerY+=dyDR/distDR*spdDR*dt; }
  dDR.playerX=MathUtil.clamp(dDR.playerX,20,cwDR-20); dDR.playerY=MathUtil.clamp(dDR.playerY,chDR*0.45,chDR-30);

function renderBoard(ctx) {
  const cs=getCellSize();
  const {x:ox,y:oy}=getBoardOrigin();
  const cw=Layout.cx()*2;

  // Board background
  drawAssetOrFallback(ctx,'bgBoardFrame',ox-cs*0.5,oy-cs*0.5,cs*COLS+cs,cs*ROWS+cs,
    (c,x,y,w,h)=>{ c.fillStyle='rgba(0,0,40,0.4)'; c.fillRect(x,y,w,h); c.strokeStyle='rgba(255,215,0,0.4)'; c.lineWidth=2; c.strokeRect(x,y,w,h); });

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  for (let r=0;r<=ROWS;r++) { ctx.beginPath(); ctx.moveTo(ox,oy+r*cs); ctx.lineTo(ox+COLS*cs,oy+r*cs); ctx.stroke(); }
  for (let c=0;c<=COLS;c++) { ctx.beginPath(); ctx.moveTo(ox+c*cs,oy); ctx.lineTo(ox+c*cs,oy+ROWS*cs); ctx.stroke(); }

  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const cell = safeGridAccess(gGrid,r,c);
      if (!cell) continue;
      const cx2=ox+c*cs, cy2=oy+r*cs;
      const offsetY = cell.offsetY || 0;
      const scale = cell.scale || 1;
      const alpha2 = cell.alpha !== undefined ? cell.alpha : 1;
      ctx.save();
      ctx.globalAlpha = alpha2;
      ctx.translate(cx2+cs/2, cy2+cs/2+offsetY);
      if (scale!==1) ctx.scale(scale,scale);
      ctx.translate(-cs/2,-cs/2);
      // Animate offset
      if (cell.falling && Math.abs(offsetY)>0.5) cell.offsetY = MathUtil.lerp(offsetY,0,0.18);
      else if (cell.falling) { cell.offsetY=0; cell.falling=false; }

      // Draw gem base
      if (cell.obs===OBS.ICE) {
        // Draw gem underneath (dimmed), then ice overlay with PNG asset
        fbGemByType(ctx,0,0,cs,cs,cell.type);
        const iceKey='obstacleIce-'+MathUtil.clamp(cell.obsLayer||1,1,3);
        drawAssetOrFallback(ctx,iceKey,0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.ICE,cell.obsLayer));
      } else if (cell.obs===OBS.STONE) {
        drawAssetOrFallback(ctx,'obstacleStone',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.STONE,1));
      } else if (cell.obs===OBS.CHAIN) {
        fbGemByType(ctx,0,0,cs,cs,cell.type);
        drawAssetOrFallback(ctx,'obstacleChain',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.CHAIN,cell.obsLayer));
      } else if (cell.obs===OBS.WOOD) {
        drawAssetOrFallback(ctx,'obstacleWood',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.WOOD,cell.obsLayer));
      } else if (cell.obs===OBS.POISON) {
        fbGemByType(ctx,0,0,cs,cs,cell.type);
        drawAssetOrFallback(ctx,'obstaclePoison',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.POISON,1));
      } else if (cell.obs===OBS.CURTAIN) {
        drawAssetOrFallback(ctx,'obstacleCurtain',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.CURTAIN,1));
      } else if (cell.obs===OBS.JELLY) {
        fbGemByType(ctx,0,0,cs,cs,cell.type);
        drawAssetOrFallback(ctx,'obstacleJelly',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.JELLY,cell.obsLayer));
      } else if (cell.obs===OBS.PIE) {
        const pieKey=r+'_'+c;
        drawAssetOrFallback(ctx,'obstaclePie',0,0,cs,cs,(c2,x,y,w,h)=>fbObstacle(c2,x,y,w,h,OBS.PIE,gPieData[pieKey]?gPieData[pieKey].remaining:6));
      } else {
        // Normal gem (with special overlay)
        if (cell.special===SPECIAL.LINE_H) {
          fbGemByType(ctx,0,0,cs,cs,cell.type);
          drawAssetOrFallback(ctx,'specialLineH',0,0,cs,cs,(c2,x,y,w,h)=>fbSpecial(c2,x,y,w,h,SPECIAL.LINE_H,GEM_COLORS[cell.type]));
        } else if (cell.special===SPECIAL.LINE_V) {
          fbGemByType(ctx,0,0,cs,cs,cell.type);
          drawAssetOrFallback(ctx,'specialLineV',0,0,cs,cs,(c2,x,y,w,h)=>fbSpecial(c2,x,y,w,h,SPECIAL.LINE_V,GEM_COLORS[cell.type]));
        } else if (cell.special===SPECIAL.BOMB) {
          fbGemByType(ctx,0,0,cs,cs,cell.type);
          drawAssetOrFallback(ctx,'specialBomb',0,0,cs,cs,(c2,x,y,w,h)=>fbSpecial(c2,x,y,w,h,SPECIAL.BOMB,GEM_COLORS[cell.type]));
        } else if (cell.special===SPECIAL.RAINBOW) {
          drawAssetOrFallback(ctx,'specialRainbow',0,0,cs,cs,(c2,x,y,w,h)=>fbSpecial(c2,x,y,w,h,SPECIAL.RAINBOW,'#fff'));
        } else {
          const sheetKey='gem'+cell.type.charAt(0).toUpperCase()+cell.type.slice(1)+'Sheet';
          const baseKey='gem'+cell.type.charAt(0).toUpperCase()+cell.type.slice(1);
          if (assets.sprites[sheetKey]) {
            const frameW=128; const totalFrames=6;
            const frame=Math.floor(Date.now()/300)%totalFrames;
            const img=assets.sprites[sheetKey];
            ctx.drawImage(img,frame*frameW,0,frameW,128,0,0,cs,cs);
          } else {
            drawAssetOrFallback(ctx,baseKey,0,0,cs,cs,(c2,x,y,w,h)=>fbGemByType(c2,x,y,w,h,cell.type));
          }
        }
      }

      ctx.restore();

      // Selected highlight
      if (gSelectedCell&&gSelectedCell.r===r&&gSelectedCell.c===c) {
        ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
        ctx.strokeRect(cx2+2,cy2+2+Math.min(offsetY,0),cs-4,cs-4);
        ctx.shadowBlur=0;
      }

      // Hint blink
      if (gHintCells) {
        const isHint=gHintCells.some(([hr,hc])=>hr===r&&hc===c);
        if (isHint) {
          const blink=Math.sin(Date.now()/200)*0.5+0.5;
          ctx.strokeStyle=`rgba(255,255,100,${blink})`; ctx.lineWidth=3;
          ctx.strokeRect(cx2+2,cy2+2,cs-4,cs-4);
        }
      }
    }
  }

  // Draw active effects
  for (const e of gActiveEffects) {
    ctx.save(); ctx.globalAlpha=e.alpha;
    if (e.type==='laser') {
      ctx.strokeStyle='rgba(255,220,0,0.8)'; ctx.lineWidth=4;
      if (e.dir==='h'||e.dir==='cross') {
        drawAssetOrFallback(ctx,'effectLineLaser',ox,e.y-8,COLS*cs,16,(c2,x,y,w,h)=>{ c2.fillStyle='rgba(255,220,0,0.6)'; c2.fillRect(x,y,w,h); });
      }
      if (e.dir==='v'||e.dir==='cross') {
        drawAssetOrFallback(ctx,'effectLineLaser',e.x-8,oy,16,ROWS*cs,(c2,x,y,w,h)=>{ c2.fillStyle='rgba(255,220,0,0.6)'; c2.fillRect(x,y,w,h); });
      }
    } else if (e.type==='bomb') {
      const bRad=e.sz*2*e.alpha;
      drawAssetOrFallback(ctx,'effectBombShockwave',e.x-bRad,e.y-bRad,bRad*2,bRad*2,
        (c2,x,y,w,h)=>{ c2.strokeStyle='rgba(255,140,0,0.8)'; c2.lineWidth=4; c2.beginPath(); c2.arc(e.x,e.y,bRad,0,Math.PI*2); c2.stroke(); });
    } else if (e.type==='rainbow') {
      drawAssetOrFallback(ctx,'effectRainbowWave',ox,oy,COLS*cs,ROWS*cs,
        (c2,x,y,w,h)=>{ const rg=c2.createRadialGradient(e.x,e.y,0,e.x,e.y,COLS*cs*0.8); ['#ff0','#0ff','#f0f','#0f0','#00f','#f00'].forEach((col,i)=>rg.addColorStop(i/5,col)); c2.fillStyle=rg; c2.globalAlpha=0.3; c2.fillRect(x,y,w,h); c2.globalAlpha=1; });
    }
    ctx.restore();
  }
}

function renderHUD(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const hud=Layout.hud();
  const fs14=Layout.fontSize(14), fs12=Layout.fontSize(12), fs18=Layout.fontSize(18), fs22=Layout.fontSize(22);

  // Top HUD panel
  ctx.fillStyle='rgba(0,0,20,0.75)';
  ctx.fillRect(0,0,cw,hud.top+4);

  // Score
  UI.text(ctx,T('score'),cw*0.08,hud.top*0.35,{fill:'rgba(255,255,255,0.7)',font:fs12+'px system-ui'});
  UI.text(ctx,String(gScore).replace(/\B(?=(\d{3})+(?!\d))/g,','),cw*0.08,hud.top*0.72,{fill:'#FFD700',font:'bold '+fs18+'px system-ui'});

  // Turns
  const turnColor = gTurnsLeft<=5 ? '#FF4444' : '#fff';
  drawAssetOrFallback(ctx,'uiTurnCounter',cw*0.42,4,cw*0.16,hud.top,(c2,x,y,w,h)=>{ c2.fillStyle='rgba(0,0,40,0.6)'; c2.beginPath(); c2.arc(x+w/2,y+h/2,Math.min(w,h)*0.44,0,Math.PI*2); c2.fill(); c2.strokeStyle=turnColor; c2.lineWidth=2; c2.stroke(); });
  UI.text(ctx,T('turns'),cw*0.5,hud.top*0.28,{fill:'rgba(255,255,255,0.7)',font:fs12+'px system-ui',align:'center'});
  UI.text(ctx,String(gTurnsLeft),cw*0.5,hud.top*0.75,{fill:turnColor,font:'bold '+fs22+'px system-ui',align:'center'});

  // King emotion
  const kingSize=hud.top*0.9;
  drawAssetOrFallback(ctx,'king'+gKingEmotion.charAt(0).toUpperCase()+gKingEmotion.slice(1),cw*0.82,2,kingSize*0.85,kingSize,
    (c2,x,y,w,h)=>fbKing(c2,x,y,w,h,gKingEmotion));

  // Goals panel
  if (gCurrentLevel) {
    const goalY = hud.top+6;
    const goalH = 38;
    ctx.fillStyle='rgba(0,0,30,0.7)'; ctx.fillRect(0,goalY,cw,goalH);
    const goals=gCurrentLevel.goals; const goalW=cw/Math.max(goals.length,1);
    goals.forEach((goal,i)=>{
      const gx=goalW*i+goalW*0.5;
      let label='', val='', done=false;
      if (goal.type==='score') { const pg=gGoalProgress.score; label='점수'; val=pg?(pg.current+'/'+pg.target):'?'; done=pg&&pg.current>=pg.target; }
      else if (goal.type==='collect') { const pk=gGoalProgress['gem_'+goal.gem]; label=GEM_LABEL[goal.gem]||goal.gem; val=pk?(pk.current+'/'+pk.count):'?'; done=pk&&pk.current>=goal.count; }
      else if (goal.type==='obstacle') { const pk2=gGoalProgress[goal.obs]; label=T(goal.obs); val=pk2?(pk2.current+'/'+goal.count):'?'; done=pk2&&pk2.current>=goal.count; }
      else if (goal.type==='jelly') { const pk3=gGoalProgress.jelly; label=T('jelly'); val=pk3?(pk3.current+'/'+goal.count):'?'; done=pk3&&pk3.current>=goal.count; }
      else if (goal.type==='pie') { const pk4=gGoalProgress.pie; label=T('pie'); val=pk4?(pk4.current+'/'+goal.count):'?'; done=pk4&&pk4.current>=goal.count; }
      UI.text(ctx,label,gx,goalY+11,{fill:done?'#44FF88':'rgba(255,255,255,0.75)',font:fs12+'px system-ui',align:'center'});
      UI.text(ctx,val,gx,goalY+28,{fill:done?'#FFD700':'#fff',font:'bold '+fs14+'px system-ui',align:'center'});
    });
  }

  // Booster bar (bottom)
  const bsz=Math.max(MIN_TOUCH,Math.min(cw*0.1,56));
  const boty=ch-bsz-Layout.safeArea().bottom-8;
  const bNames=['hammer','shuffle','extraTurns','colorBomb'];
  const bIcons=['🔨','🔀','+5','🎨'];
  const bCount=[gBoosters.hammer,gBoosters.shuffle,gBoosters.extraTurns,gBoosters.colorBomb];
  for (let i=0;i<4;i++) {
    const bx=cw*0.5-(4*bsz+3*8)*0.5+i*(bsz+8);
    const isActive=gBoosterMode===i;
    ctx.globalAlpha=bCount[i]>0?1:0.4;
    drawAssetOrFallback(ctx,'uiBoosterSlot',bx,boty,bsz,bsz,(c2,x,y,w,h)=>fbBoosterIcon(c2,x,y,w,h,i));
    if (isActive) { ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(bx+bsz/2,boty+bsz/2,bsz*0.5,0,Math.PI*2); ctx.stroke(); }
    ctx.globalAlpha=1;
    if (bCount[i]>0) {
      const badgeSize=16;
      ctx.fillStyle='#FF3B30'; ctx.beginPath(); ctx.arc(bx+bsz-badgeSize/2,boty+badgeSize/2,badgeSize/2,0,Math.PI*2); ctx.fill();
      UI.text(ctx,String(bCount[i]),bx+bsz-badgeSize/2,boty+badgeSize/2,{fill:'#fff',font:'bold '+Layout.fontSize(10)+'px system-ui',align:'center',baseline:'middle'});
    }
  }

  // Combo popup
  for (const cp of gComboPopups) {
    ctx.save(); ctx.globalAlpha=cp.alpha;
    ctx.translate(cp.x,cp.y); ctx.scale(cp.scale,cp.scale);
    ctx.fillStyle='#FFD700'; ctx.font='bold '+Layout.fontSize(28)+'px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#FF8800'; ctx.shadowBlur=10;
    ctx.fillText('COMBO x'+cp.n,0,0);
    ctx.restore();
  }
}

function renderLoading(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,cw,ch);
  UI.text(ctx,T('loading'),cw*0.5,ch*0.5,{fill:'#FFD700',font:'bold '+Layout.fontSize(20)+'px system-ui',align:'center'});
  // Progress bar
  const bw=cw*0.5, bh=8, bx=(cw-bw)/2, by=ch*0.55;
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#FFD700'; ctx.fillRect(bx,by,bw*gLoadProgress,bh);
  // Animated gems
  for (let i=0;i<6;i++) {

  }
}

function renderMap(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  // Background based on current region
  const regionIdx=gCurrentLevel?gCurrentLevel.region:0;
  drawAssetOrFallback(ctx,'bgCrystalForestFar',0,0,cw,ch,(c2,x,y,w,h)=>fbBgRegion(c2,x,y,w,h,regionIdx));
  drawAssetOrFallback(ctx,'bgCrystalForestMid',0,0,cw,ch,(c2,x,y,w,h)=>fbBgMid(c2,x,y,w,h,regionIdx));

  const nodeSize=Math.max(MIN_TOUCH,Math.min(cw*0.12,60));
  const cols=3;
  const startX=cw*0.12, startY=ch*0.15;
  const padX=(cw-startX*2)/cols, padY=ch*0.13;

  // Region banners
  const regionColors=['#6A0DAD','#8B0000','#004080','#005020','#2a2a5a'];
  CONFIG.regions.forEach((name,ri)=>{
    const gy=startY+ri*(5*padY+40)+gMapScrollY;
    drawAssetOrFallback(ctx,'mapRegionBanner',(cw-cw*0.7)/2,gy-30,cw*0.7,30,
      (c2,x,y,w,h)=>fbRegionBanner(c2,x,y,w,h,CONFIG.lang==='ko'?CONFIG.regions[ri]:CONFIG.regionsEn[ri],regionColors[ri]));
  });

  // Level nodes
  LEVELS.slice(0,25).forEach((lvl,idx)=>{
    const ri=lvl.region; const liInRegion=idx-ri*5;
    const col=liInRegion%cols; const row=Math.floor(liInRegion/cols);
    const nx=startX+col*padX+gRng.randInt(-8,8); // stable jitter per level
    const ny=startY+ri*(5*padY+40)+row*padY+gMapScrollY;
    const stars=getLevelStars(lvl.id);
    const locked=!isLevelUnlocked(idx);
    drawAssetOrFallback(ctx,'mapPathNode',nx,ny,nodeSize,nodeSize,
      (c2,x,y,w,h)=>fbMapNode(c2,x,y,w,h,lvl.id,stars,locked));
    // Stars below node
    for (let s=0;s<3;s++) {
      drawAssetOrFallback(ctx,s<stars?'uiStarFull':'uiStarEmpty',nx+s*(nodeSize/3),ny+nodeSize+2,nodeSize/3,nodeSize/3,
        (c2,x,y,w,h)=>fbStar(c2,x,y,w,h,s<stars));
    }
    if (locked) {
      drawAssetOrFallback(ctx,'mapLock',nx+nodeSize*0.25,ny+nodeSize*0.25,nodeSize*0.5,nodeSize*0.5,
        (c2,x,y,w,h)=>{ c2.fillStyle='rgba(0,0,0,0.5)'; c2.fillRect(x,y,w,h); c2.font=(w*0.7)+'px system-ui'; c2.textAlign='center'; c2.textBaseline='middle'; c2.fillText('🔒',x+w/2,y+h/2); });
    }
  });

  // Top HUD
  ctx.fillStyle='rgba(0,0,20,0.7)'; ctx.fillRect(0,0,cw,Layout.hud().top);
  UI.text(ctx,T('map'),cw*0.5,Layout.hud().top*0.5,{fill:'#FFD700',font:'bold '+Layout.fontSize(16)+'px system-ui',align:'center',baseline:'middle'});
  UI.text(ctx,'★ '+gSaveData.totalStars,cw*0.85,Layout.hud().top*0.5,{fill:'#FFD700',font:Layout.fontSize(13)+'px system-ui',align:'center',baseline:'middle'});
  // Back button
  const btnSz=Math.max(MIN_TOUCH,cw*0.1);
  fbUiPanel(ctx,8,8,btnSz,btnSz-4,'rgba(0,0,40,0.8)');
  UI.text(ctx,'←',8+btnSz/2,8+(btnSz-4)/2,{fill:'#fff',font:'bold '+Layout.fontSize(16)+'px system-ui',align:'center',baseline:'middle'});
}

    UI.text(ctx,ev.label,cx3+iconSz+16,cy3+cardH*0.3,{fill:'#FFD700',font:'bold '+Layout.fontSize(13)+'px system-ui'});

  UI.text(ctx,T('streak')+': '+gWinStreak,cw*0.5,ch*0.78,{fill:'#FFD700',font:'bold '+Layout.fontSize(16)+'px system-ui',align:'center'});

  // Back button
  const btnH2=Math.max(MIN_TOUCH,48), btnW2=Math.max(MIN_TOUCH*2,120);
  fbUiPanel(ctx,(cw-btnW2)/2,ch*0.86,btnW2,btnH2,'rgba(40,20,80,0.85)');
  UI.text(ctx,T('backToTitle'),cw*0.5,ch*0.86+btnH2/2,{fill:'#fff',font:Layout.fontSize(14)+'px system-ui',align:'center',baseline:'middle'});

function renderLevelIntro(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  if (!gCurrentLevel) return;
  const lvl=gCurrentLevel;
  const ri=lvl.region||0;
  fbBgRegion(ctx,0,0,cw,ch,ri);
  // Panel
  const pw=cw*0.82, ph=ch*0.62, px=(cw-pw)/2, py=(ch-ph)/2;
  fbUiPanel(ctx,px,py,pw,ph,'rgba(0,0,30,0.92)');
  // Level title
  const regionName=CONFIG.lang==='ko'?CONFIG.regions[ri]:CONFIG.regionsEn[ri];
  UI.text(ctx,regionName,cw*0.5,py+32,{fill:'rgba(255,215,0,0.7)',font:Layout.fontSize(12)+'px system-ui',align:'center'});
  UI.text(ctx,T('levelIntro')+' '+lvl.id,cw*0.5,py+58,{fill:'#FFD700',font:'bold '+Layout.fontSize(22)+'px system-ui',align:'center'});
  // King
  const kingH2=ph*0.32;
  drawAssetOrFallback(ctx,'kingIdle',cw*0.5-kingH2*0.5,py+70,kingH2,kingH2,(c2,x,y,w,h)=>fbKing(c2,x,y,w,h,'idle'));
  // Goals
  const goalSy=py+70+kingH2+8;
  UI.text(ctx,T('goal'),cw*0.5,goalSy,{fill:'rgba(255,255,255,0.7)',font:Layout.fontSize(12)+'px system-ui',align:'center'});
  lvl.goals.forEach((goal,i)=>{
    let label='';
    if (goal.type==='score') label=T('score')+': '+goal.target;
    else if (goal.type==='collect') label=(GEM_LABEL[goal.gem]||goal.gem)+' '+goal.count+'개';
    else if (goal.type==='obstacle') label=T(goal.obs)+' '+goal.count+'개';
    else if (goal.type==='jelly') label=T('jelly')+' '+goal.count+'개';
    else if (goal.type==='pie') label=T('pie')+' '+goal.count+'개';
    UI.text(ctx,'• '+label,cw*0.5,goalSy+18+i*18,{fill:'#fff',font:Layout.fontSize(13)+'px system-ui',align:'center'});
  });
  // Turns
  UI.text(ctx,T('turns')+': '+lvl.turns,cw*0.5,py+ph-64,{fill:'#adf',font:Layout.fontSize(13)+'px system-ui',align:'center'});
  // DDA notice
  if (gDdaAdjusted) UI.text(ctx,'★ 도움 모드 활성화',cw*0.5,py+ph-48,{fill:'#88FF88',font:Layout.fontSize(11)+'px system-ui',align:'center'});
  // Buttons
  const btnW3=Math.max(MIN_TOUCH*2,pw*0.36), btnH3=Math.max(MIN_TOUCH,44);
  fbUiPanel(ctx,cw*0.5-btnW3-8,py+ph-btnH3-8,btnW3,btnH3,'rgba(50,20,80,0.9)');
  UI.text(ctx,T('backToMap'),cw*0.5-btnW3*0.5-8,py+ph-btnH3-8+btnH3/2,{fill:'#aaa',font:Layout.fontSize(13)+'px system-ui',align:'center',baseline:'middle'});
  fbUiPanel(ctx,cw*0.5+8,py+ph-btnH3-8,btnW3,btnH3,'rgba(20,60,20,0.9)');
  UI.text(ctx,T('play'),cw*0.5+8+btnW3/2,py+ph-btnH3-8+btnH3/2,{fill:'#FFD700',font:'bold '+Layout.fontSize(14)+'px system-ui',align:'center',baseline:'middle'});
}

function renderPlay(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const ri=gCurrentLevel?gCurrentLevel.region:0;
  // Far background
  const farKey=CONFIG.regionBgFar[ri]||'bgCrystalForestFar';
  const midKey=CONFIG.regionBgMid[ri]||'bgCrystalForestMid';
  drawAssetOrFallback(ctx,farKey,0,0,cw,ch,(c2,x,y,w,h)=>fbBgRegion(c2,x,y,w,h,ri));
  drawAssetOrFallback(ctx,midKey,0,0,cw,ch,(c2,x,y,w,h)=>fbBgMid(c2,x,y,w,h,ri));
  // Board
  renderBoard(ctx);
  // HUD
  renderHUD(ctx);
  // Booster mode overlay
  if (gBoosterMode!==null) {
    ctx.fillStyle='rgba(255,215,0,0.08)';
    const {x:ox,y:oy}=getBoardOrigin(); const cs=getCellSize();
    ctx.fillRect(ox,oy,cs*COLS,cs*ROWS);
    UI.text(ctx,'보스터 사용: 위치 선택',cw*0.5,oy-12,{fill:'#FFD700',font:'bold '+Layout.fontSize(13)+'px system-ui',align:'center'});
  }
}

function renderResult(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const won=gResultStars>0;
  const ri=gCurrentLevel?gCurrentLevel.region:0;
  fbBgRegion(ctx,0,0,cw,ch,ri);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,cw,ch);
  const pw=cw*0.86, ph=ch*0.74, px=(cw-pw)/2, py=(ch-ph)/2;
  fbUiPanel(ctx,px,py,pw,ph,'rgba(5,0,20,0.97)');
  // Title
  UI.text(ctx,won?T('levelClear'):T('levelFail'),cw*0.5,py+36,{fill:won?'#FFD700':'#FF4444',font:'bold '+Layout.fontSize(22)+'px system-ui',align:'center'});
  // King
  const kingH3=ph*0.25;

// ═══════════════════════════════════════════════════════════════════════════════
// §38. UPDATE PIPELINE — coreUpdate (single entry + finally flush)
// ═══════════════════════════════════════════════════════════════════════════════
let tweener, inp;

function coreUpdate(dt) {
  if (!_ready) return;

  try {
    // Always update tweener + particles
    tweener.update(dt);
    if (ACTIVE_SYSTEMS[gState]&&ACTIVE_SYSTEMS[gState].particle) particles.update(dt);
    updateEffects(dt);
    updateBgm(dt);
    // Update long press popup timer
    if (gLongPressPopup) { gLongPressPopup.timer-=dt; if (gLongPressPopup.timer<=0) gLongPressPopup=null; }
    gKingEmotionTimer+=dt;
    if (gKingEmotionTimer>4) { gKingEmotion='idle'; }

    // Title gem animation
    if (gState===STATE.TITLE) {
      gTitleTimer+=dt;
      gTitleGems.forEach(g=>{
        g.x+=g.vx; g.y+=g.vy;
        if (g.x<0||g.x>1) g.vx=-g.vx;
        if (g.y<0||g.y>1) g.vy=-g.vy;
        g.phase+=dt*2;
        g.alpha=0.4+Math.sin(g.phase)*0.3+0.3;
      });
    }

    // Result animation
    if (gState===STATE.RESULT) { gResultAnimTimer+=dt; }

    // Level intro timer
    if (gState===STATE.LEVEL_INTRO) {
      gLevelIntroTimer+=dt;
      if (gLevelIntroTimer>0.1) gKingEmotion='idle';
    }

    // Hint timer
    if ((gState===STATE.PLAY||gState===STATE.DAILY_CHALLENGE||gState===STATE.KINGS_CUP||gState===STATE.TEAM_BATTLE) && !isInputBlocked()) {
      gHintTimer+=dt;
      if (gHintTimer>CONFIG.hintDelay/1000) {
        if (!gHintCells) gHintCells=findHint();
      }
    }

    // Map scroll inertia
    if (gState===STATE.MAP) {
      gMapScrollY+=gMapScrollVel*dt;
      gMapScrollVel*=0.88;
      gMapScrollY=MathUtil.clamp(gMapScrollY,-1200,0);
    }

    // GOAL_CHECK processing
    if (gState===STATE.GOAL_CHECK && GUARDS.goalChecking) {
      GUARDS.goalChecking=false;
      updateScoreGoal();
      if (allGoalsComplete()) {
        gKingEmotion='happy'; gKingEmotionTimer=0;
        soundSfx('clear');
        deferTransition(STATE.RESULT,{won:true});
      } else if (gTurnsLeft<=0) {
        gKingEmotion='scared'; gKingEmotionTimer=0;
        soundSfx('lose');
        deferTransition(STATE.RESULT,{won:false});
      } else {
        GUARDS.swapLocked=false;
        deferTransition(STATE.PLAY);
      }
    }

    // INPUT
    if (ACTIVE_SYSTEMS[gState]&&ACTIVE_SYSTEMS[gState].input) {
      handleInput(dt);
    }

    // MINI GAME update
    if (gState===STATE.MINI_GAME&&ACTIVE_SYSTEMS[STATE.MINI_GAME].mini) {
      updateMiniGame(dt,inp);
    }

    // Process deferred transitions (AFTER state update)
    while (deferredQueue.length>0) {
      const {toState,data}=deferredQueue.shift();
      if (TRANSITION_TABLE[gState]&&TRANSITION_TABLE[gState].includes(toState)) {
        enterState(toState,data);
      } else {
        console.warn('Deferred invalid: '+STATE_NAMES[gState]+' -> '+STATE_NAMES[toState]);
      }
    }

  } finally {
    inp.flush();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §39. INPUT HANDLING per state
// ═══════════════════════════════════════════════════════════════════════════════
function handleInput(dt) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;

  // Global: sound init on any tap
  if (inp.tapped||inp.mouseDown) { ensureSound(); }

  // §3 조작: F5 색맹 모드 토글 (어떤 상태에서든)
  if (inp.jp('F5')) {
    CONFIG.colorBlind=!CONFIG.colorBlind;
    gSaveData.settings.colorBlind=CONFIG.colorBlind; saveGame(); soundSfx('tap');
  }
  // §3 조작: Tab 이벤트 패널 열기 (MAP/PLAY 등에서 EVENT_HUB로)
  if (inp.jp('Tab')) {
    if (gState===STATE.MAP||gState===STATE.TITLE) {
      soundSfx('tap'); beginTransition(STATE.EVENT_HUB);
      return;
    } else if (gState===STATE.EVENT_HUB) {
      soundSfx('tap'); beginTransition(STATE.TITLE);
      return;
    }
  }

  switch(gState) {
    case STATE.TITLE: handleTitleInput(cw,ch); break;
    case STATE.MAP: handleMapInput(dt,cw,ch); break;
    case STATE.EVENT_HUB: handleEventHubInput(cw,ch); break;
    case STATE.LEVEL_INTRO: handleLevelIntroInput(cw,ch); break;
    case STATE.PLAY:
    case STATE.DAILY_CHALLENGE:
    case STATE.KINGS_CUP:
    case STATE.TEAM_BATTLE:
      handlePlayInput(cw,ch); break;
    case STATE.RESULT: handleResultInput(cw,ch); break;
    case STATE.PAUSE: handlePauseInput(cw,ch); break;
    case STATE.MINI_HUB: handleMiniHubInput(cw,ch); break;
    case STATE.MINI_INTRO: handleMiniIntroInput(cw,ch); break;
    case STATE.MINI_RESULT: handleMiniResultInput(cw,ch); break;
    case STATE.SUPER_BOOSTER: handleSuperBoosterInput(cw,ch); break;
    default: break;
  }
}

function handleTitleInput(cw,ch) {
  if (!inp.tapped) return;
  const tx=inp.tapX, ty=inp.tapY;
  const btnW=Math.max(MIN_TOUCH*3,cw*0.4), btnH=Math.max(MIN_TOUCH,ch*0.07);
  const btnX=(cw-btnW)/2;
  const btns=[
    {y:ch*0.60,action:()=>beginTransition(STATE.MAP)},
    {y:ch*0.69,action:()=>beginTransition(STATE.EVENT_HUB)},
    {y:ch*0.78,action:()=>beginTransition(STATE.MINI_HUB)},
  ];
  for (const btn of btns) {
    if (UI.hitTest(tx,ty,btnX,btn.y,btnW,btnH)) { soundSfx('tap'); btn.action(); return; }
  }
  // Lang toggle
  if (UI.hitTest(tx,ty,cw-72,8,60,32)) {
    CONFIG.lang=CONFIG.lang==='ko'?'en':'ko';
    gSaveData.settings.lang=CONFIG.lang; saveGame(); soundSfx('tap');
  }
}

function handleMapInput(dt,cw,ch) {
  const hud=Layout.hud();
  const btnSz=Math.max(MIN_TOUCH,cw*0.1);
  // Back button
  if (inp.tapped&&UI.hitTest(inp.tapX,inp.tapY,8,8,btnSz,btnSz-4)) {
    soundSfx('tap'); beginTransition(STATE.TITLE); return;
  }
  // Scroll drag
  if (inp.mouseDown&&!gMapDragStart) {
    gMapDragStart={y:inp.tapY||inp.mouseY,scrollY:gMapScrollY};
    gMapDragDist=0;
  }
  if (!inp.mouseDown) { gMapDragStart=null; }
  if (inp.mouseDown&&gMapDragStart) {
    const curY=inp.tapY||inp.mouseY;
    const dy=curY-gMapDragStart.y;
    gMapScrollY=gMapDragStart.scrollY+dy;
    gMapScrollVel=(curY-(gMapDragStart.y+gMapDragDist))/dt;
    gMapDragDist=dy;
    gMapScrollY=MathUtil.clamp(gMapScrollY,-1200,0);
  }
  // Tap on level node
  if (inp.tapped) {
    const tx=inp.tapX, ty=inp.tapY;
    const nodeSize=Math.max(MIN_TOUCH,Math.min(cw*0.12,60));
    const cols=3, startX=cw*0.12, startY=ch*0.15, padX=(cw-startX*2)/cols, padY=ch*0.13;
    LEVELS.slice(0,25).forEach((lvl,idx)=>{
      const ri=lvl.region; const liInRegion=idx-ri*5;
      const col=liInRegion%cols; const row=Math.floor(liInRegion/cols);
      const nx=startX+col*padX; const ny=startY+ri*(5*padY+40)+row*padY+gMapScrollY;
      if (UI.hitTest(tx,ty,nx,ny,nodeSize,nodeSize)) {
        if (!isLevelUnlocked(idx)) { soundSfx('fail'); return; }
        soundSfx('tap');
        gCurrentLevelIdx=idx;
        gCurrentLevel=lvl;
        beginTransition(STATE.LEVEL_INTRO,{levelIdx:idx});
      }
    });
  }
}
