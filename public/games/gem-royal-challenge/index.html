function handlePlayInput(cw,ch) {
  // ESC → pause (§3 조작: ESC 일시정지)
  if (inp.jp('escape')) { soundSfx('tap'); beginTransition(STATE.PAUSE); return; }
  // P key → pause
  if (inp.jp('p')) { soundSfx('tap'); beginTransition(STATE.PAUSE); return; }
  // M key → map 복귀 (§3 조작: M 맵 복귀)
  if (inp.jp('KeyM')) { soundSfx('tap'); beginTransition(STATE.MAP); return; }
  // Keyboard 1~4 → booster activation (§3 조작: 키보드 1~4 부스터)
  for (let bi=0;bi<4;bi++) {
    if (inp.jp(String(bi+1))) {
      const bNames3=['hammer','shuffle','extraTurns','colorBomb'];
      const cnt=[gBoosters.hammer,gBoosters.shuffle,gBoosters.extraTurns,gBoosters.colorBomb];
      if (cnt[bi]<=0) { soundSfx('fail'); break; }
      if (bi===BOOSTER.SHUFFLE) { executeShuffleBooster(); break; }
      if (bi===BOOSTER.EXTRA_TURNS) { executeExtraTurns(); break; }
      if (gBoosterMode===bi) { gBoosterMode=null; GUARDS.boosterActive=false; }
      else { gBoosterMode=bi; GUARDS.boosterActive=true; }
      soundSfx('booster'); break;
    }
  }
  // Pause button (top-left king area tap)
  if (inp.tapped) {
    const tx=inp.tapX, ty=inp.tapY;
    const hud=Layout.hud();
    // Pause: king icon area
    const kingSize=hud.top*0.9;
    if (UI.hitTest(tx,ty,cw*0.82,2,kingSize*0.85,kingSize)) {
      soundSfx('tap'); beginTransition(STATE.PAUSE); return;
    }
    // Boosters
    const bsz=Math.max(MIN_TOUCH,Math.min(cw*0.1,56));
    const boty=ch-bsz-Layout.safeArea().bottom-8;
    const bNames2=['hammer','shuffle','extraTurns','colorBomb'];
    for (let i=0;i<4;i++) {
      const bx=cw*0.5-(4*bsz+3*8)*0.5+i*(bsz+8);
      if (UI.hitTest(tx,ty,bx,boty,bsz,bsz)) {
        const cnt=[gBoosters.hammer,gBoosters.shuffle,gBoosters.extraTurns,gBoosters.colorBomb];
        if (cnt[i]<=0) { soundSfx('fail'); return; }
        if (i===BOOSTER.SHUFFLE) { executeShuffleBooster(); return; }
        if (i===BOOSTER.EXTRA_TURNS) { executeExtraTurns(); return; }
        // Hammer / ColorBomb: enter booster mode
        if (gBoosterMode===i) { gBoosterMode=null; GUARDS.boosterActive=false; }
        else { gBoosterMode=i; GUARDS.boosterActive=true; }
        soundSfx('booster'); return;
      }
    }
    // Board tap
    if (isInputBlocked()&&!gBoosterMode) return;
    const cell2=pixelToCell(tx,ty);
    if (!cell2) { gSelectedCell=null; return; }
    const {r,c}=cell2;
    if (gBoosterMode!==null) {
      // Execute booster on tapped cell
      executeBooster(gBoosterMode,r,c);
      return;
    }
    if (!gSelectedCell) {
      gSelectedCell={r,c}; soundSfx('tap');
    } else {
      const {r:sr,c:sc}=gSelectedCell;
      if (sr===r&&sc===c) { gSelectedCell=null; return; }
      // Adjacent?
      if (Math.abs(sr-r)+Math.abs(sc-c)===1) {
        gSelectedCell=null;
        gHintTimer=0; gHintCells=null;
        trySwap(sr,sc,r,c);
      } else {
        gSelectedCell={r,c}; soundSfx('tap');
      }
    }
  }
  // Touch drag swap
  else if (inp.tapped&&gSelectedCell) {
    // already handled above
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §40. ENGINE BOOT
// ═══════════════════════════════════════════════════════════════════════════════
(function boot() {
  const canvas = document.getElementById('gameCanvas');
  const _rawTweener = new Tween();
  // Wrap tweener: game passes duration in ms, but dt is now in seconds
  tweener = {
    add(obj, props, durationMs, ease, onComplete) {
      return _rawTweener.add(obj, props, durationMs / 1000, ease, onComplete);
    },
    update(dt) { _rawTweener.update(dt); },
    clear() { _rawTweener.clear(); }
  };

  const _rawInp = new Input(canvas);
  // Wrap input: game uses shorthand keys ('up','left','a',' '), engine uses KeyCode ('ArrowUp','ArrowLeft','KeyA','Space')
  const KEY_MAP = {
    'up':'ArrowUp','down':'ArrowDown','left':'ArrowLeft','right':'ArrowRight',
    'w':'KeyW','a':'KeyA','s':'KeyS','d':'KeyD',
    ' ':'Space','space':'Space','enter':'Enter','escape':'Escape',
    'p':'KeyP','r':'KeyR','e':'KeyE','q':'KeyQ','x':'KeyX','z':'KeyZ',
    '1':'Digit1','2':'Digit2','3':'Digit3','4':'Digit4',
    'm':'KeyM','f5':'F5','tab':'Tab','f':'KeyF',
  };
  function mapKey(code) { return KEY_MAP[code] || code; }
  inp = {
    get tapped() { return _rawInp.tapped; },
    get tapX() { return _rawInp.tapX; },
    get tapY() { return _rawInp.tapY; },
    get mouseDown() { return _rawInp.mouseDown; },
    get mouseX() { return _rawInp.mouseX; },
    get mouseY() { return _rawInp.mouseY; },
    get touches() { return _rawInp.touches; },
    jp(code) { return _rawInp.jp(mapKey(code)); },
    held(code) { return _rawInp.held(mapKey(code)); },
    confirm() { return _rawInp.confirm(); },
    flush() { _rawInp.flush(); },
  };

  loadGame();

  // Store engine ref for W/H access
  let _engineW = window.innerWidth, _engineH = window.innerHeight;
  // Monkey-patch Layout.cx/cy to work without args (game calls Layout.cx()*2 everywhere)
  const _origCx = Layout.cx, _origCy = Layout.cy;
  Layout.cx = function(w) { return (w || _engineW) / 2; };
  Layout.cy = function(h) { return (h || _engineH) / 2; };

  const engine = new Engine('gameCanvas', {
    update(dtMs) { coreUpdate(dtMs / 1000); },
    render(ctx, w, h) { _engineW = w; _engineH = h; coreRender(ctx); },
    onResize(w,h) {
      // Layout recomputes automatically; rebuild board origin cache
      if (gState===STATE.PLAY||gState===STATE.CASCADE||gState===STATE.GOAL_CHECK) {
        // re-animate falling gems
        for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) { if (gGrid[r]&&gGrid[r][c]) gGrid[r][c].falling=false; }
      }
    }
  });

  _ready = false;
  loadAssets();

  // Fallback: ensure _ready after engine starts
  setTimeout(()=>{ _ready=true; },100);

  _ready = true; // TDZ guard — set before any tween/engine callback
  engine.start();

})();

// ═══════════════════════════════════════════════════════════════════════════════
// §41. TOUCH DRAG SWAP (supplemental touch handling)
// ═══════════════════════════════════════════════════════════════════════════════
// Touch drag is handled through tapX/tapY in handlePlayInput.
// Additional drag swap: detect finger drag across 1 cell in PLAY state.
(function installDragSwap() {
  const canvas = document.getElementById('gameCanvas');
  let dragStartCell = null;
  let dragStartX = 0, dragStartY = 0;

  canvas.addEventListener('touchstart', e=>{
    if (gState!==STATE.PLAY&&gState!==STATE.DAILY_CHALLENGE&&gState!==STATE.KINGS_CUP&&gState!==STATE.TEAM_BATTLE) return;
    if (isInputBlocked()&&!gBoosterMode) return;
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const px=(t.clientX-rect.left)*scaleX, py=(t.clientY-rect.top)*scaleY;
    dragStartCell=pixelToCell(px,py);
    dragStartX=px; dragStartY=py;
  },{passive:true});

  canvas.addEventListener('touchend', e=>{
    if (!dragStartCell) return;
    if (gState!==STATE.PLAY&&gState!==STATE.DAILY_CHALLENGE&&gState!==STATE.KINGS_CUP&&gState!==STATE.TEAM_BATTLE) { dragStartCell=null; return; }
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const px=(t.clientX-rect.left)*scaleX, py=(t.clientY-rect.top)*scaleY;
    const dx=px-dragStartX, dy=py-dragStartY;
    const cs=getCellSize();
    const swipeThresh=Math.max(30,cs*0.2); // §3 조작: 하이브리드 스와이프 threshold (고정 30px 최소)
    if (Math.abs(dx)<swipeThresh&&Math.abs(dy)<swipeThresh) { dragStartCell=null; return; }
    let dr=0, dc=0;
    if (Math.abs(dx)>Math.abs(dy)) dc=dx>0?1:-1;
    else dr=dy>0?1:-1;
    const {r,c}=dragStartCell;
    trySwap(r,c,r+dr,c+dc);
    dragStartCell=null;
    gSelectedCell=null;
  },{passive:true});
})();

// §41b. DOUBLE-CLICK SPECIAL ACTIVATION (§3 조작: 더블클릭 스페셜 발동)

(function installDblClick() {

    if (gState!==STATE.PLAY&&gState!==STATE.DAILY_CHALLENGE&&gState!==STATE.KINGS_CUP&&gState!==STATE.TEAM_BATTLE) return;

    const px=(e.clientX-rect.left)*scaleX, py=(e.clientY-rect.top)*scaleY;

    if (!cellHit) return;
    const cell=safeGridAccess(gGrid,cellHit.r,cellHit.c);

    gSelectedCell=null;
    gHintTimer=0; gHintCells=null;
    GUARDS.swapLocked=true;
    gTurnsLeft=Math.max(0,gTurnsLeft-1);
    activateSpecial(cellHit.r,cellHit.c,false);
    tweener.add({_:0},{_:1},300,'easeOut',()=>{ doGravity(); tweener.add({_:0},{_:1},200,'easeOut',()=>{ refillBoard(); startCascade(); }); });
  });
})();

// ═══════════════════════════════════════════════════════════════════════════════
// §41d. LONG PRESS GEM INFO POPUP (§3 조작: 롱프레스 500ms 보석 정보)
// ═══════════════════════════════════════════════════════════════════════════════
let gLongPressPopup = null; // {r,c,text,x,y,timer}
(function installLongPress() {
  const canvas = document.getElementById('gameCanvas');
  let lpTimer = null;
  let lpX = 0, lpY = 0;

  function showPopup(px, py) {
    if (gState!==STATE.PLAY&&gState!==STATE.DAILY_CHALLENGE&&gState!==STATE.KINGS_CUP&&gState!==STATE.TEAM_BATTLE) return;
    const cellHit=pixelToCell(px,py);
    if (!cellHit) return;
    const cell=safeGridAccess(gGrid,cellHit.r,cellHit.c);
    if (!cell) return;
    let info = '';
    const gemLabel = GEM_LABEL[cell.type] || cell.type;
    info += gemLabel;
    if (cell.special!==SPECIAL.NONE) {
      const spNames={[SPECIAL.LINE_H]:'가로 줄 파괴',[SPECIAL.LINE_V]:'세로 줄 파괴',[SPECIAL.BOMB]:'폭탄(3×3)',[SPECIAL.RAINBOW]:'무지개'};
      info += ' [' + (spNames[cell.special]||'스페셜') + ']';
    }
    if (cell.obs!==OBS.NONE) {
      const obsNames={[OBS.ICE]:'얼음',[OBS.CHAIN]:'체인',[OBS.WOOD]:'나무',[OBS.POISON]:'독',[OBS.STONE]:'돌',[OBS.CURTAIN]:'커튼',[OBS.JELLY]:'젤리',[OBS.PIE]:'Pie'};
      info += ' — ' + (obsNames[cell.obs]||'장애물') + ' (내구도:' + (cell.obsLayer||1) + ')';
      if (cell.obs===OBS.PIE) {
        const pieKey=cellHit.r+'_'+cellHit.c;
        info += ' 남은 조각:' + (gPieData[pieKey]?gPieData[pieKey].remaining:6);
      }
    }
    const {x:cx3,y:cy3}=cellCenter(cellHit.r,cellHit.c);
    gLongPressPopup={r:cellHit.r,c:cellHit.c,text:info,x:cx3,y:cy3,timer:2.0};
  }

  canvas.addEventListener('touchstart', e=>{
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    lpX=(t.clientX-rect.left)*scaleX; lpY=(t.clientY-rect.top)*scaleY;
    if (lpTimer) clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>showPopup(lpX,lpY),500);
  },{passive:true});
  canvas.addEventListener('touchend', ()=>{ if (lpTimer) { clearTimeout(lpTimer); lpTimer=null; } },{passive:true});
  canvas.addEventListener('touchmove', e=>{
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const px=(t.clientX-rect.left)*scaleX, py=(t.clientY-rect.top)*scaleY;

// §42. ADDITIONAL GAME SYSTEMS — Score progress bar, map region background
// ═══════════════════════════════════════════════════════════════════════════════
// Score progress bar toward star thresholds (used in HUD)
function renderScoreBar(ctx, x, y, w, h) {
  if (!gCurrentLevel) return;
  const s2=gCurrentLevel.star2||0, s3=gCurrentLevel.star3||0;
  const maxScore=Math.max(s3,s2,gGoalProgress.score?gGoalProgress.score.target:1)||1;
  const pct=Math.min(1,gScore/maxScore);
  drawAssetOrFallback(ctx,'uiHpBar',x,y,w,h,(c2,x2,y2,w2,h2)=>{
    c2.fillStyle='rgba(0,0,0,0.4)'; c2.fillRect(x2,y2,w2,h2);
    c2.fillStyle='#4488FF'; c2.fillRect(x2,y2,w2*pct,h2);
    c2.strokeStyle='rgba(255,215,0,0.5)'; c2.lineWidth=1; c2.strokeRect(x2,y2,w2,h2);
    // Star markers
    [s2,s3].filter(v=>v>0).forEach((threshold,i)=>{
      const markerX=x2+w2*(threshold/maxScore);
      const starCol=i===0?'#aaa':'#FFD700';
      c2.strokeStyle=starCol; c2.lineWidth=1.5; c2.beginPath(); c2.moveTo(markerX,y2); c2.lineTo(markerX,y2+h2); c2.stroke();
      fbStar(c2,markerX-6,y2-6,12,12,gScore>=threshold);
    });
  });
}

const REGION_BG_FAR=['bgCrystalForestFar','bgRubyVolcanoFar','bgSapphireCoastFar','bgEmeraldGardenFar','bgDiamondCastleFar'];
const REGION_BG_MID=['bgCrystalForestMid','bgRubyVolcanoMid','bgSapphireCoastMid','bgEmeraldGardenMid','bgDiamondCastleMid'];

renderMap = function(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  const ri=gCurrentLevel?gCurrentLevel.region:0;
  drawAssetOrFallback(ctx,REGION_BG_FAR[ri]||REGION_BG_FAR[0],0,0,cw,ch,(c2,x,y,w,h)=>fbBgRegion(c2,x,y,w,h,ri));

  // Rest of map render (nodes, HUD, etc) — call original after backgrounds
  // Actually we need to call _origRenderMap but skip its BG. Instead inline:
  const nodeSize=Math.max(MIN_TOUCH,Math.min(cw*0.12,60));
  const cols=3, startX=cw*0.12, startY=ch*0.15, padX=(cw-startX*2)/cols, padY=ch*0.13;

  });
  const usedJitter={};
  LEVELS.slice(0,25).forEach((lvl,idx)=>{
    const ri3=lvl.region; const liInRegion=idx-ri3*5;

    const {jx,jy}=usedJitter[idx];

}

  if (UI.hitTest(tx,ty,(cw-btnW4)/2,py+200,btnW4,btnH4)) { soundSfx('tap'); beginTransition(STATE.MAP); return; }

  if (UI.hitTest(tx,ty,cw*0.2,py+ph-36,cw*0.6,22)) {

// ═══════════════════════════════════════════════════════════════════════════════
// §56. COMPLETE RENDER PIPELINE OVERRIDE — integrate all §53-§55 overrides
// ═══════════════════════════════════════════════════════════════════════════════
// All function overrides declared above use JS hoisting patterns.
// coreRender calls renderPlay, renderMap etc., which are now the overridden versions.
// The function declaration order in JS means later 'function' declarations
// override earlier ones in the same scope if named identically.
// However, since we used const assignments and arrow functions for overrides,
// we must ensure coreRender uses the final versions.
// Re-declare coreRender to use final state:
coreRender = function(ctx) {
  const cw=Layout.cx()*2, ch=Layout.cy()*2;
  ctx.clearRect(0,0,cw,ch);
  switch(gState) {
    case STATE.LOADING: renderLoading(ctx); break;
    case STATE.TITLE: renderTitle(ctx); break;
    case STATE.MAP: renderMap(ctx); break;
    case STATE.EVENT_HUB: renderEventHub(ctx); break;
    case STATE.LEVEL_INTRO: renderLevelIntro(ctx); break;
    case STATE.PLAY: renderPlay(ctx); break;
    case STATE.CASCADE: renderPlay(ctx); break;
    case STATE.GOAL_CHECK: renderPlay(ctx); break;
    case STATE.RESULT: renderResult(ctx); break;
    case STATE.PAUSE: renderPause(ctx); break;
    case STATE.MINI_HUB: renderMiniHub(ctx); break;
    case STATE.MINI_INTRO: renderMiniIntro(ctx); break;
    case STATE.MINI_GAME: renderMiniGameState(ctx); break;
    case STATE.MINI_RESULT: renderMiniResult(ctx); break;
    case STATE.SUPER_BOOSTER: renderSuperBooster(ctx); break;
    case STATE.KINGS_CUP: renderKingsCup(ctx); break;
    case STATE.TEAM_BATTLE: renderTeamBattle(ctx); break;
    case STATE.DAILY_CHALLENGE: renderDailyChallenge(ctx); break;
    default: ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,cw,ch); break;
  }
  if (ACTIVE_SYSTEMS[gState]&&ACTIVE_SYSTEMS[gState].particle) particles.render(ctx);
  // Long press info popup overlay
  renderLongPressPopup(ctx);
  if (gFadeObj.a>0.01) { ctx.fillStyle='rgba(0,0,0,'+gFadeObj.a+')'; ctx.fillRect(0,0,cw,ch); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §59. DAILY CHALLENGE SEEDED BOARD GENERATION
// ═══════════════════════════════════════════════════════════════════════════════
// When state=DAILY_CHALLENGE, createBoard uses gRng seeded from dailySeed()
// to ensure identical board for same day across sessions.
const _origCreateBoard = createBoard;
createBoard = function(levelDef) {
  if (levelDef&&levelDef.isDaily&&levelDef.dailySeed) {
    gRng = new SeededRNG(levelDef.dailySeed);
  } else if (!levelDef||!levelDef.isDaily) {
    gRng = new SeededRNG(Date.now());
  }
  _origCreateBoard(levelDef);

// Gem sparkle timing per cell (based on position)
function getGemSparklePhase(r, c) {
  return (r*COLS+c)*0.37;
}

// Sparkle render overlay on gems (subtle)
function renderGemSparkles(ctx) {
  if (!gAssetsLoaded) return;
  const cs=getCellSize(), {x:ox,y:oy}=getBoardOrigin();
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const cell=safeGridAccess(gGrid,r,c); if (!cell||cell.obs!==OBS.NONE) continue;
    const phase=getGemSparklePhase(r,c);
    const sparkle=Math.sin(Date.now()*0.002+phase);
    if (sparkle>0.92) {
      const cx2=ox+c*cs+cs/2, cy2=oy+r*cs+cs/2;
      const alpha=(sparkle-0.92)*12.5;
      ctx.save(); ctx.globalAlpha=alpha*0.6;
      drawAssetOrFallback(ctx,'particleSparkle',cx2-8,cy2-8,16,16,
        (c3,x,y,w,h)=>{ c3.fillStyle='rgba(255,255,255,0.8)'; c3.beginPath(); c3.arc(x+w/2,y+h/2,4,0,Math.PI*2); c3.fill(); });
      ctx.restore();
    }
  }
}

// §74. SWIPE GESTURE DIRECTION HELPER
// ═══════════════════════════════════════════════════════════════════════════════
function getSwipeDirection(dx, dy, threshold) {
  const thresh = threshold || 20;
  if (Math.abs(dx) < thresh && Math.abs(dy) < thresh) return null;
  if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? 'right' : 'left';
  return dy > 0 ? 'down' : 'up';
}
function directionToDelta(dir) {
  switch(dir) {
    case 'right': return {dr:0,dc:1};
    case 'left':  return {dr:0,dc:-1};
    case 'down':  return {dr:1,dc:0};
    case 'up':    return {dr:-1,dc:0};
    default:      return {dr:0,dc:0};
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §107. GRACEFUL DEGRADATION — if IX engine not available
// ═══════════════════════════════════════════════════════════════════════════════
// The game uses 'use strict' at the top.
// If IX is not defined, the engine destructure will throw.
// This is by design — the game requires the IX Engine.
// A defensive check was considered but deemed unnecessary per project conventions.

// ═══════════════════════════════════════════════════════════════════════════════
// §108. PERFORMANCE — avoid per-frame object allocation
// ═══════════════════════════════════════════════════════════════════════════════
// All major object allocations are at init time (createBoard, initMiniGame etc.)
// Per-frame: only array filter (for particles/effects) and simple math ops.
// No 'new' calls in hot paths (render loop, update loop).
// safeGridAccess returns existing cell reference, no allocation.
// tweener.add() allocates tween objects — called only on events, not per-frame.
// particles.emit() allocates particle objects — OK for burst events.
// Render functions use local variables (const/let), minimal closure captures.

// ═══════════════════════════════════════════════════════════════════════════════
// §109. EXTENDED BOARD — "no moves" detection and auto-shuffle
// ═══════════════════════════════════════════════════════════════════════════════
function hasValidMoves() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const dirs2=[[0,1],[1,0]];
    for (const [dr,dc] of dirs2) {
      const r2=r+dr, c2=c+dc;
      if (r2>=ROWS||c2>=COLS) continue;
      doSwap(r,c,r2,c2);
      const m=findMatches();
      doSwap(r,c,r2,c2);
      if (m.length>0) return true;
    }
  }
  return false;
}
function checkAndAutoShuffle() {
  if (isInputBlocked()) return;
  if (!hasValidMoves()) {
    soundSfx('shuffle');
    GUARDS.boardShuffling=true;
    const gems2=[];
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) { const cell=gGrid[r][c]; if (cell&&cell.obs===OBS.NONE&&cell.special===SPECIAL.NONE) gems2.push(cell); }
    const shuffled2=gRng.shuffle([...gems2]);
    let idx2=0;
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) { const cell=gGrid[r][c]; if (cell&&cell.obs===OBS.NONE&&cell.special===SPECIAL.NONE) gGrid[r][c]=shuffled2[idx2++]; }
    tweener.add({_:0},{_:1},400,'easeOut',()=>{ GUARDS.boardShuffling=false; if (!hasValidMoves()) checkAndAutoShuffle(); });
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// §110. FINAL EXTENDED coreUpdate — integrate auto-shuffle check
// ═══════════════════════════════════════════════════════════════════════════════
// checkAndAutoShuffle() is called after finishCascade() sets guards to false.
// Integration point: after finishCascade in continueCascade when no matches:
const _origFinishCascade = finishCascade;
function finishCascade() {
  _origFinishCascade();
  // After cascade finishes and board settles, check for valid moves
  tweener.add({_:0},{_:1},500,'easeOut',()=>checkAndAutoShuffle());
}
