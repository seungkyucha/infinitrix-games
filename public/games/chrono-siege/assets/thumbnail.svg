<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#0a0e1a"/>
      <stop offset="80%" stop-color="#0f1528"/>
      <stop offset="100%" stop-color="#1a2040"/>
    </linearGradient>
    <radialGradient id="tMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f0ff" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#b0d0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b0d0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tPortal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0b0ff" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#ce93d8" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ab47bc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tCyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="tTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
    <radialGradient id="tCharBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6dd5fa"/>
      <stop offset="60%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </radialGradient>
    <radialGradient id="tEnemyBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="60%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </radialGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="tSubGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#ffd740"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#tSky)"/>

  <!-- Nebula -->
  <ellipse cx="280" cy="80" rx="120" ry="60" fill="#ab47bc" opacity="0.06"/>
  <ellipse cx="100" cy="100" rx="100" ry="50" fill="#00e5ff" opacity="0.04"/>

  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="30" cy="25" r="1.2" fill="#fff"/>
    <circle cx="90" cy="15" r="0.8" fill="#e0f0ff"/>
    <circle cx="150" cy="35" r="1" fill="#fff"/>
    <circle cx="220" cy="20" r="1.3" fill="#e0f0ff"/>
    <circle cx="310" cy="30" r="0.9" fill="#fff"/>
    <circle cx="370" cy="15" r="1.1" fill="#e0f0ff"/>
    <circle cx="60" cy="55" r="0.6" fill="#c0d8ff"/>
    <circle cx="180" cy="60" r="0.7" fill="#fff"/>
    <circle cx="260" cy="50" r="0.8" fill="#c0d8ff"/>
    <circle cx="340" cy="55" r="0.6" fill="#fff"/>
  </g>
  <g opacity="0.4">
    <circle cx="45" cy="40" r="0.5" fill="#c0d8ff"/>
    <circle cx="120" cy="45" r="0.4" fill="#fff"/>
    <circle cx="200" cy="40" r="0.5" fill="#e0f0ff"/>
    <circle cx="280" cy="38" r="0.4" fill="#fff"/>
    <circle cx="380" cy="42" r="0.5" fill="#c0d8ff"/>
    <circle cx="15" cy="70" r="0.4" fill="#fff"/>
    <circle cx="395" cy="70" r="0.4" fill="#e0f0ff"/>
  </g>

  <!-- Moon -->
  <circle cx="340" cy="55" r="25" fill="url(#tMoon)"/>
  <circle cx="340" cy="55" r="12" fill="#e0f0ff" opacity="0.3"/>

  <!-- Distant mountains -->
  <path d="M0 170 Q30 150 60 165 Q90 140 130 155 Q170 130 210 150 Q250 125 290 145 Q330 120 370 140 L400 135 L400 200 L0 200 Z" fill="#0f1528" opacity="0.7"/>

  <!-- Time rift portal (central drama) -->
  <g filter="url(#tGlow)">
    <ellipse cx="200" cy="120" rx="45" ry="55" fill="url(#tPortal)"/>
    <ellipse cx="200" cy="120" rx="25" ry="35" fill="#ce93d8" opacity="0.2"/>
    <ellipse cx="200" cy="120" rx="12" ry="18" fill="#e0b0ff" opacity="0.15"/>
    <ellipse cx="200" cy="120" rx="40" ry="50" fill="none" stroke="#ce93d8" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Ground / battlefield -->
  <path d="M0 190 Q100 185 200 192 Q300 186 400 190 L400 250 L0 250 Z" fill="url(#tGround)"/>

  <!-- Grid lines on ground -->
  <g opacity="0.1">
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1a2744" stroke-width="0.8"/>
    <line x1="0" y1="210" x2="400" y2="210" stroke="#1a2744" stroke-width="0.8"/>
    <line x1="0" y1="220" x2="400" y2="220" stroke="#1a2744" stroke-width="0.8"/>
    <line x1="0" y1="230" x2="400" y2="230" stroke="#1a2744" stroke-width="0.8"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#1a2744" stroke-width="0.8"/>
    <line x1="50" y1="190" x2="50" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="100" y1="190" x2="100" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="150" y1="190" x2="150" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="200" y1="190" x2="200" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="250" y1="190" x2="250" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="300" y1="190" x2="300" y2="250" stroke="#1a2744" stroke-width="0.5"/>
    <line x1="350" y1="190" x2="350" y2="250" stroke="#1a2744" stroke-width="0.5"/>
  </g>

  <!-- Towers on grid -->
  <g>
    <!-- Arrow tower -->
    <rect x="97" y="198" width="16" height="22" rx="2" fill="url(#tTower)" opacity="0.8"/>
    <path d="M100 198 L105 190 L110 198" fill="#4fc3f7"/>
    <circle cx="105" cy="205" r="2" fill="#00e5ff" opacity="0.6"/>

    <!-- Cannon tower -->
    <rect x="147" y="195" width="18" height="25" rx="2" fill="#ffab40" opacity="0.7"/>
    <circle cx="156" cy="205" r="4" fill="#ff7043" opacity="0.5"/>
    <rect x="154" y="192" width="4" height="8" fill="#ffd740"/>

    <!-- Time tower -->
    <rect x="247" y="196" width="16" height="24" rx="2" fill="#0097a7" opacity="0.8"/>
    <circle cx="255" cy="205" r="5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.7"/>
    <line x1="255" y1="202" x2="255" y2="205" stroke="#00e5ff" stroke-width="0.8" opacity="0.8"/>
    <line x1="255" y1="205" x2="257" y2="207" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
    <!-- Time tower glow -->
    <circle cx="255" cy="205" r="10" fill="url(#tCyanGlow)" opacity="0.3"/>

    <!-- Lightning tower -->
    <rect x="297" y="198" width="16" height="22" rx="2" fill="#1a3a5c" opacity="0.8"/>
    <path d="M305 192 L302 200 L308 200 L304 210" stroke="#4dd0e1" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Projectiles in flight -->
  <g filter="url(#tSoftGlow)">
    <circle cx="130" cy="170" r="2" fill="#ffd740" opacity="0.8"/>
    <line x1="128" y1="172" x2="132" y2="168" stroke="#ffd740" stroke-width="0.8" opacity="0.5"/>
    <circle cx="180" cy="160" r="2.5" fill="#00e5ff" opacity="0.7"/>
    <circle cx="270" cy="155" r="2" fill="#4dd0e1" opacity="0.6"/>
  </g>

  <!-- Player character (Chronomancer) - left side -->
  <g transform="translate(60, 160) scale(0.45)">
    <!-- Cloak -->
    <path d="M38 55 C35 60 30 85 32 105 Q34 118 50 120 L78 120 Q96 118 96 105 C98 85 93 60 90 55 Z" fill="#0a0e1a"/>
    <!-- Body -->
    <path d="M44 50 Q42 55 42 65 L44 80 Q50 82 64 82 Q78 82 84 80 L86 65 Q86 55 84 50 Z" fill="url(#tCharBody)"/>
    <!-- Clock emblem -->
    <circle cx="64" cy="62" r="5" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <!-- Head -->
    <path d="M46 25 Q44 20 48 14 Q54 6 64 5 Q74 6 80 14 Q84 20 82 25 Q80 32 78 40 L76 48 Q72 52 64 53 Q56 52 52 48 L50 40 Q48 32 46 25 Z" fill="#0a0e1a"/>
    <!-- Glowing eyes -->
    <ellipse cx="56" cy="35" rx="3" ry="2" fill="#00e5ff" filter="url(#tSoftGlow)"/>
    <ellipse cx="72" cy="35" rx="3" ry="2" fill="#00e5ff" filter="url(#tSoftGlow)"/>
    <!-- Staff -->
    <line x1="30" y1="20" x2="36" y2="100" stroke="#c9a227" stroke-width="3"/>
    <circle cx="30" cy="12" r="6" fill="#00e5ff" filter="url(#tGlow)" opacity="0.8"/>
    <!-- Casting hand -->
    <circle cx="95" cy="30" r="8" fill="url(#tCyanGlow)" filter="url(#tGlow)"/>
    <circle cx="95" cy="30" r="3" fill="#00e5ff" opacity="0.6"/>
  </g>

  <!-- Enemies emerging from portal -->
  <g>
    <!-- Enemy 1 (large, near portal) -->
    <g transform="translate(195, 135) scale(0.3)">
      <path d="M40 45 Q36 55 36 70 Q36 82 44 88 Q52 94 64 94 Q76 94 84 88 Q92 82 92 70 Q92 55 88 45 Q82 35 64 32 Q46 35 40 45 Z" fill="url(#tEnemyBody)"/>
      <path d="M48 20 Q44 12 38 4" stroke="#8b4513" stroke-width="3" fill="none"/>
      <path d="M80 20 Q84 12 90 4" stroke="#8b4513" stroke-width="3" fill="none"/>
      <path d="M54 28 L58 26 L62 28 L58 30 Z" fill="#ffeb3b"/>
      <path d="M66 28 L70 26 L74 28 L70 30 Z" fill="#ffeb3b"/>
      <circle cx="64" cy="62" r="4" fill="#ffab40" filter="url(#tSoftGlow)" opacity="0.6"/>
    </g>

    <!-- Enemy 2 -->
    <g transform="translate(230, 150) scale(0.22)">
      <path d="M40 45 Q36 55 36 70 Q36 82 44 88 Q52 94 64 94 Q76 94 84 88 Q92 82 92 70 Q92 55 88 45 Q82 35 64 32 Q46 35 40 45 Z" fill="#ef5350" opacity="0.8"/>
      <path d="M54 28 L62 28 L58 32 Z" fill="#ffeb3b"/>
      <path d="M66 28 L74 28 L70 32 Z" fill="#ffeb3b"/>
    </g>

    <!-- Enemy 3 -->
    <g transform="translate(170, 155) scale(0.2)">
      <path d="M40 45 Q36 55 36 70 Q36 82 44 88 Q52 94 64 94 Q76 94 84 88 Q92 82 92 70 Q92 55 88 45 Q82 35 64 32 Q46 35 40 45 Z" fill="#ef5350" opacity="0.7"/>
      <path d="M54 28 L62 28 L58 32 Z" fill="#ffeb3b" opacity="0.8"/>
      <path d="M66 28 L74 28 L70 32 Z" fill="#ffeb3b" opacity="0.8"/>
    </g>

    <!-- Enemy 4 - smaller, further -->
    <circle cx="210" cy="130" r="5" fill="#ef5350" opacity="0.5"/>
    <circle cx="190" cy="125" r="4" fill="#ef5350" opacity="0.4"/>
  </g>

  <!-- Time slow effect zone -->
  <g filter="url(#tSoftGlow)" opacity="0.3">
    <circle cx="200" cy="175" r="35" fill="none" stroke="#4dd0e1" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="200" cy="175" r="25" fill="none" stroke="#00e5ff" stroke-width="1" stroke-dasharray="3 4"/>
  </g>

  <!-- Time distortion particles -->
  <g opacity="0.5">
    <circle cx="170" cy="145" r="1" fill="#ce93d8"/>
    <circle cx="230" cy="140" r="0.8" fill="#e0b0ff"/>
    <circle cx="185" cy="165" r="1.2" fill="#4dd0e1"/>
    <circle cx="215" cy="170" r="0.9" fill="#00e5ff"/>
    <circle cx="160" cy="175" r="0.7" fill="#ce93d8"/>
    <circle cx="240" cy="165" r="1" fill="#4dd0e1"/>
  </g>

  <!-- HUD elements -->
  <g opacity="0.5">
    <!-- Gold counter -->
    <circle cx="370" cy="15" r="5" fill="#ffd740" opacity="0.6"/>
    <text x="355" y="19" font-size="8" fill="#ffd740" font-family="monospace">1250</text>
    <!-- Wave indicator -->
    <text x="10" y="18" font-size="8" fill="#e0e0e0" font-family="monospace" opacity="0.6">Wave 3/5</text>
    <!-- Time energy bar -->
    <rect x="320" y="25" width="60" height="5" rx="2" fill="#1a2744" opacity="0.5"/>
    <rect x="320" y="25" width="40" height="5" rx="2" fill="#00e5ff" opacity="0.4"/>
  </g>

  <!-- Dark gradient overlay for title area -->
  <rect x="0" y="230" width="400" height="70" fill="#000" opacity="0.6"/>
  <rect x="0" y="225" width="400" height="10" fill="url(#tGround)" opacity="0.5"/>

  <!-- Title text -->
  <g filter="url(#tTextGlow)">
    <text x="200" y="262" text-anchor="middle" font-size="30" font-weight="bold" fill="url(#tTitleGrad)" font-family="'Courier New', Consolas, monospace" letter-spacing="3">CHRONO SIEGE</text>
  </g>
  <g filter="url(#tTextShadow)">
    <text x="200" y="262" text-anchor="middle" font-size="30" font-weight="bold" fill="url(#tTitleGrad)" font-family="'Courier New', Consolas, monospace" letter-spacing="3" opacity="0.9">CHRONO SIEGE</text>
  </g>

  <!-- Subtitle -->
  <text x="200" y="280" text-anchor="middle" font-size="10" fill="url(#tSubGrad)" font-family="'Courier New', Consolas, monospace" letter-spacing="5" opacity="0.7">크 로 노  시 즈</text>

  <!-- Decorative lines -->
  <line x1="80" y1="268" x2="130" y2="268" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="270" y1="268" x2="320" y2="268" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner accents -->
  <path d="M5 5 L25 5 L25 8 L8 8 L8 25 L5 25 Z" fill="#00e5ff" opacity="0.2"/>
  <path d="M395 5 L375 5 L375 8 L392 8 L392 25 L395 25 Z" fill="#00e5ff" opacity="0.2"/>
  <path d="M5 295 L25 295 L25 292 L8 292 L8 275 L5 275 Z" fill="#00e5ff" opacity="0.2"/>
  <path d="M395 295 L375 295 L375 292 L392 292 L392 275 L395 275 Z" fill="#00e5ff" opacity="0.2"/>

  <!-- Hourglass icon near title -->
  <g transform="translate(60, 248) scale(0.5)" opacity="0.5">
    <path d="M0 0 L20 0 L14 10 Q10 12 6 10 Z" fill="#ffd740" opacity="0.6"/>
    <path d="M0 24 L20 24 L14 14 Q10 12 6 14 Z" fill="#ffd740" opacity="0.4"/>
    <rect x="-1" y="-1" width="22" height="2" fill="#c9a227"/>
    <rect x="-1" y="23" width="22" height="2" fill="#c9a227"/>
  </g>
  <g transform="translate(315, 248) scale(0.5)" opacity="0.5">
    <path d="M0 0 L20 0 L14 10 Q10 12 6 10 Z" fill="#ffd740" opacity="0.6"/>
    <path d="M0 24 L20 24 L14 14 Q10 12 6 14 Z" fill="#ffd740" opacity="0.4"/>
    <rect x="-1" y="-1" width="22" height="2" fill="#c9a227"/>
    <rect x="-1" y="23" width="22" height="2" fill="#c9a227"/>
  </g>

  <!-- Additional environmental details -->
  <g opacity="0.25">
    <!-- Ruins silhouettes on mountains -->
    <rect x="45" y="155" width="6" height="18" fill="#0f1528"/>
    <path d="M42 155 L48 148 L54 155" fill="#0f1528"/>
    <rect x="320" y="148" width="8" height="22" fill="#0f1528"/>
    <path d="M316 148 L324 140 L332 148" fill="#0f1528"/>
    <!-- Broken column -->
    <rect x="360" y="160" width="4" height="14" fill="#0f1528"/>
    <rect x="358" y="158" width="8" height="3" fill="#1a2744"/>
  </g>

  <!-- Extra floating crystals -->
  <g filter="url(#tSoftGlow)" opacity="0.4">
    <path d="M30 120 L33 110 L36 120 Z" fill="#00e5ff"/>
    <path d="M370 135 L373 126 L376 135 Z" fill="#4dd0e1"/>
    <path d="M15 170 L17 164 L19 170 Z" fill="#00e5ff" opacity="0.5"/>
    <path d="M385 170 L387 164 L389 170 Z" fill="#4dd0e1" opacity="0.5"/>
  </g>

  <!-- Additional time particles -->
  <g opacity="0.4">
    <circle cx="50" cy="100" r="0.8" fill="#00e5ff"/>
    <circle cx="350" cy="100" r="0.7" fill="#4dd0e1"/>
    <circle cx="110" cy="130" r="0.6" fill="#ce93d8"/>
    <circle cx="300" cy="120" r="0.7" fill="#ce93d8"/>
    <circle cx="80" cy="180" r="0.5" fill="#00e5ff"/>
    <circle cx="330" cy="180" r="0.6" fill="#4dd0e1"/>
    <circle cx="140" cy="155" r="0.5" fill="#ffd740"/>
    <circle cx="260" cy="140" r="0.6" fill="#ffd740"/>
  </g>

  <!-- Extra tower details -->
  <g opacity="0.5">
    <!-- Ice tower -->
    <path d="M48 205 L53 195 L58 205 Z" fill="#4dd0e1" opacity="0.6"/>
    <rect x="50" y="205" width="6" height="15" rx="1" fill="#0097a7" opacity="0.7"/>
    <!-- Fire tower -->
    <rect x="197" y="200" width="14" height="20" rx="2" fill="#ff7043" opacity="0.6"/>
    <circle cx="204" cy="198" r="4" fill="#ffab40" opacity="0.4"/>
    <path d="M201 196 Q204 190 207 196" fill="#ffd740" opacity="0.3"/>
  </g>

  <!-- Explosion effect in distance -->
  <g filter="url(#tSoftGlow)" opacity="0.3">
    <circle cx="155" cy="155" r="6" fill="#ffd740"/>
    <circle cx="155" cy="155" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="155" cy="155" r="10" fill="none" stroke="#ffab40" stroke-width="0.5"/>
  </g>

  <!-- Additional stars -->
  <g opacity="0.5">
    <circle cx="10" cy="10" r="0.6" fill="#fff"/>
    <circle cx="50" cy="8" r="0.4" fill="#e0f0ff"/>
    <circle cx="130" cy="12" r="0.5" fill="#fff"/>
    <circle cx="280" cy="8" r="0.4" fill="#c0d8ff"/>
    <circle cx="390" cy="10" r="0.5" fill="#fff"/>
    <circle cx="170" cy="5" r="0.4" fill="#e0f0ff"/>
    <circle cx="240" cy="8" r="0.6" fill="#fff"/>
    <circle cx="100" cy="30" r="0.4" fill="#c0d8ff"/>
    <circle cx="350" cy="35" r="0.5" fill="#e0f0ff"/>
  </g>

  <!-- Subtle energy beams from time tower -->
  <g opacity="0.15">
    <line x1="255" y1="196" x2="220" y2="155" stroke="#00e5ff" stroke-width="1" stroke-linecap="round"/>
    <line x1="255" y1="196" x2="240" y2="160" stroke="#4dd0e1" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>