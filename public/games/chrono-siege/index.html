// Tween manager — handles all animations without setTimeout
class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }
  // Add a new tween
  add(obj, props, duration, easing, onComplete) {
    const tw = { obj, props: {}, duration, elapsed: 0, easing: easing || 'easeOut', onComplete };
    for (const k in props) { tw.props[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(tw);
    return tw;
  }
  // Update all tweens
  update(dt) {
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; return; }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt;
      let p = Math.min(1, tw.elapsed / tw.duration);
      const ep = this._ease(p, tw.easing);
      for (const k in tw.props) {
        const pr = tw.props[k];
        tw.obj[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  // Cancel all (deferred)
  cancelAll() { this._pendingCancel = true; }
  // Immediately clear all tweens
  clearImmediate() { this._tweens.length = 0; this._pendingCancel = false; }
  // Easing functions
  _ease(t, type) {
    switch (type) {
      case 'linear': return t;
      case 'easeIn': return t * t;
      case 'easeOut': return 1 - (1 - t) * (1 - t);
      case 'easeInOut': return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      case 'bounce': {
        const n = 7.5625, d = 2.75;
        if (t < 1/d) return n*t*t;
        if (t < 2/d) return n*(t-=1.5/d)*t+0.75;
        if (t < 2.5/d) return n*(t-=2.25/d)*t+0.9375;
        return n*(t-=2.625/d)*t+0.984375;
      }
      default: return 1 - (1 - t) * (1 - t);
    }
  }
  get count() { return this._tweens.length; }
}

// Object pool — prevents GC spikes
class ObjectPool {
  constructor(createFn, updateFn, capacity) {
    this._createFn = createFn;
    this._updateFn = updateFn;
    this._pool = [];
    this._active = [];
    for (let i = 0; i < capacity; i++) this._pool.push(createFn());
  }
  // Spawn an active object
  spawn(initFn) {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._createFn();
    initFn(obj);
    this._active.push(obj);
    return obj;
  }
  // Update all active objects — try-catch for exception safety (F36)
  updateAll(dt) {
    for (let i = this._active.length - 1; i >= 0; i--) {
      try {
        if (!this._updateFn(this._active[i], dt)) {
          this._pool.push(this._active.splice(i, 1)[0]);
        }
      } catch (e) {
        console.error('[ObjectPool] Update error:', e);
        this._pool.push(this._active.splice(i, 1)[0]);
      }
    }
  }
  // Iterate active objects
  forEach(fn) { for (let i = 0; i < this._active.length; i++) fn(this._active[i], i); }
  // Clear all
  clear() {
    while (this._active.length) this._pool.push(this._active.pop());
  }
  get activeCount() { return this._active.length; }
  get active() { return this._active; }
}

// Sound manager — Web Audio API procedural audio
class SoundManager {
  constructor() { this._ctx = null; this._muted = false; this._bgmOsc = []; }
  // Lazy init audio context on user gesture
  _init() {
    if (this._ctx) return;
    try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  // Play a procedural sound effect
  play(type) {
    this._init();
    if (!this._ctx || this._muted) return;
    const ctx = this._ctx;
    const now = ctx.currentTime;
    const g = ctx.createGain();
    g.connect(ctx.destination);
    switch (type) {
      case 'towerPlace': {
        const o = ctx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(440, now);
        o.frequency.linearRampToValueAtTime(880, now + 0.15);
        g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.15); break;
      }
      case 'arrowFire': {
        const o = ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(600, now);
        o.frequency.linearRampToValueAtTime(300, now + 0.08);
        g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.08);
        o.connect(g); o.start(now); o.stop(now + 0.08); break;
      }
      case 'cannonFire': {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        const src = ctx.createBufferSource(); src.buffer = buf;
        g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.2);
        src.connect(g); src.start(now); break;
      }
      case 'lightning': {
        const o = ctx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(200 + Math.random() * 1800, now);
        o.frequency.linearRampToValueAtTime(200 + Math.random() * 1800, now + 0.1);
        g.gain.setValueAtTime(0.12, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
        o.connect(g); o.start(now); o.stop(now + 0.1); break;
      }
      case 'timeSlow': {
        const o = ctx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(220, now);
        o.frequency.linearRampToValueAtTime(110, now + 0.5);
        g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.5);
        o.connect(g); o.start(now); o.stop(now + 0.5); break;
      }
      case 'timeHaste': {
        const o = ctx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(220, now);
        o.frequency.linearRampToValueAtTime(440, now + 0.3);
        g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.3);
        o.connect(g); o.start(now); o.stop(now + 0.3); break;
      }
      case 'timeRewind': {
        const o1 = ctx.createOscillator(); const o2 = ctx.createOscillator();
        o1.type = 'triangle'; o2.type = 'sine';
        o1.frequency.setValueAtTime(440, now);
        o1.frequency.linearRampToValueAtTime(110, now + 0.4);
        o1.frequency.linearRampToValueAtTime(440, now + 0.8);
        o2.frequency.setValueAtTime(330, now);
        o2.frequency.linearRampToValueAtTime(165, now + 0.8);
        g.gain.setValueAtTime(0.12, now); g.gain.linearRampToValueAtTime(0, now + 0.8);
        o1.connect(g); o2.connect(g); o1.start(now); o2.start(now);
        o1.stop(now + 0.8); o2.stop(now + 0.8); break;
      }
      case 'enemyDie': {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length) * 0.5;
        const src = ctx.createBufferSource(); src.buffer = buf;
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(300, now); o.frequency.linearRampToValueAtTime(0, now + 0.12);
        g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.12);
        src.connect(g); o.connect(g); src.start(now); o.start(now); o.stop(now + 0.12); break;
      }
      case 'bossAppear': {
        const notes = [130.81, 164.81, 196]; // C3, E3, G3
        notes.forEach(freq => {
          const o = ctx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(freq, now);
          const gn = ctx.createGain();
          gn.gain.setValueAtTime(0.1, now);
          gn.gain.linearRampToValueAtTime(0.15, now + 0.5);
          gn.gain.linearRampToValueAtTime(0, now + 2);
          o.connect(gn); gn.connect(ctx.destination);
          o.start(now); o.stop(now + 2);
        }); break;
      }
      case 'coreHit': {
        const o = ctx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(100, now);
        o.frequency.linearRampToValueAtTime(50, now + 0.4);
        g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.4);
        o.connect(g); o.start(now); o.stop(now + 0.4); break;
      }
      case 'click': {
        const o = ctx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(660, now);
        g.gain.setValueAtTime(0.08, now); g.gain.linearRampToValueAtTime(0, now + 0.05);
        o.connect(g); o.start(now); o.stop(now + 0.05); break;
      }
      case 'upgrade': {
        const o = ctx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(440, now);
        o.frequency.linearRampToValueAtTime(880, now + 0.1);
        o.frequency.linearRampToValueAtTime(1320, now + 0.2);
        g.gain.setValueAtTime(0.12, now); g.gain.linearRampToValueAtTime(0, now + 0.3);
        o.connect(g); o.start(now); o.stop(now + 0.3); break;
      }
      case 'waveStart': {
        const o = ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(220, now);
        o.frequency.linearRampToValueAtTime(440, now + 0.2);
        g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.3);
        o.connect(g); o.start(now); o.stop(now + 0.3); break;
      }
    }
  }
  toggle() { this._muted = !this._muted; }
}

// Scroll manager — momentum-based touch scrolling for menus
class ScrollManager {
  constructor() { this.scrollY = 0; this.momentum = 0; this.maxScroll = 0; this.isDragging = false;
    this._startY = 0; this._lastY = 0; this._lastTime = 0; }
  // Begin touch drag
  startDrag(y) { this.isDragging = true; this._startY = y; this._lastY = y; this._lastTime = performance.now(); this.momentum = 0; }
  // Move during drag
  moveDrag(y) {
    if (!this.isDragging) return;
    const dy = y - this._lastY;
    this.scrollY -= dy;
    const now = performance.now();
    const dt = now - this._lastTime;
    if (dt > 0) this.momentum = -dy / dt * 16;
    this._lastY = y; this._lastTime = now;
  }
  // End drag
  endDrag() { this.isDragging = false; }
  // Was it a tap (not a scroll)?
  wasTap(y) { return Math.abs(y - this._startY) < CONFIG.SCROLL_THRESHOLD; }
  // Update scroll with momentum and bounce
  update(dt) {
    if (!this.isDragging && Math.abs(this.momentum) > 0.1) {
      this.scrollY += this.momentum;
      this.momentum *= CONFIG.MOMENTUM_DECAY;
    }
    // Bounce back
    if (this.scrollY < 0) {
      this.scrollY *= CONFIG.BOUNCE_FACTOR;
      this.momentum *= 0.5;
    } else if (this.scrollY > this.maxScroll) {
      this.scrollY = this.maxScroll + (this.scrollY - this.maxScroll) * CONFIG.BOUNCE_FACTOR;
      this.momentum *= 0.5;
    }
    // Clamp momentum
    this.momentum = Math.max(-CONFIG.MAX_MOMENTUM, Math.min(CONFIG.MAX_MOMENTUM, this.momentum));
  }
  reset() { this.scrollY = 0; this.momentum = 0; this.maxScroll = 0; this.isDragging = false; }
}

// Wave composition per era+stage — generate enemy counts
function generateWaveComposition(era, stageIdx, waveIdx, totalW) {
  const mult = CONFIG.ERA_MULT[era];
  const baseCount = Math.floor(lerp(mult.count[0], mult.count[1], waveIdx / Math.max(1, totalW - 1)));
  const isBossWave = (waveIdx === totalW - 1 && STAGE_DATA[era][stageIdx].boss !== undefined);
  const comp = [];
  // Available enemy types for this era
  const available = ENEMY_DEFS.filter(e => e.era <= era);
  for (let i = 0; i < baseCount; i++) {
    const eDef = available[Math.floor(Math.random() * available.length)];
    comp.push(eDef);
  }
  return { enemies: comp, isBossWave, delay: 800 - era * 80 };
}

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

// Draw a tower at given position
function drawTower(ctx, x, y, size, towerType, level, selected) {
  const def = TOWER_DEFS[towerType];
  const s = size * 0.8;
  ctx.save();
  ctx.translate(x, y);
  // Base platform
  ctx.fillStyle = '#1a2744';
  ctx.beginPath();
  ctx.arc(0, size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.fill();
  // Tower body by type
  const col = def.color;
  ctx.fillStyle = col;
  switch (towerType) {
    case 0: // Arrow
      ctx.beginPath(); ctx.moveTo(-s*0.2, s*0.3); ctx.lineTo(-s*0.2, -s*0.25);
      ctx.lineTo(0, -s*0.4); ctx.lineTo(s*0.2, -s*0.25);
      ctx.lineTo(s*0.2, s*0.3); ctx.closePath(); ctx.fill();
      // Arrow tip
      ctx.fillStyle = '#fff'; ctx.beginPath();
      ctx.moveTo(0, -s*0.45); ctx.lineTo(-s*0.08, -s*0.3); ctx.lineTo(s*0.08, -s*0.3);
      ctx.closePath(); ctx.fill(); break;
    case 1: // Cannon
      ctx.fillRect(-s*0.25, -s*0.1, s*0.5, s*0.35);
      ctx.fillStyle = '#333'; ctx.fillRect(-s*0.15, -s*0.35, s*0.3, s*0.25);
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(0, -s*0.35, s*0.12, 0, Math.PI * 2); ctx.fill(); break;
    case 2: // Lightning
      ctx.beginPath(); ctx.moveTo(0, -s*0.45); ctx.lineTo(-s*0.15, -s*0.05);
      ctx.lineTo(-s*0.05, -s*0.05); ctx.lineTo(-s*0.1, s*0.3);
      ctx.lineTo(s*0.15, 0); ctx.lineTo(s*0.05, 0); ctx.lineTo(s*0.1, -s*0.45);
      ctx.closePath(); ctx.fill();
      ctx.shadowColor = col; ctx.shadowBlur = 8;
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.stroke(); ctx.shadowBlur = 0; break;
    case 3: // Time tower
      ctx.beginPath(); ctx.arc(0, -s*0.05, s*0.25, 0, Math.PI * 2);
      ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.stroke();
      // Clock hands
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, -s*0.05); ctx.lineTo(0, -s*0.2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -s*0.05); ctx.lineTo(s*0.12, -s*0.05); ctx.stroke();
      ctx.shadowColor = col; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, -s*0.05, s*0.25, 0, Math.PI * 2);
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.stroke(); ctx.shadowBlur = 0; break;
    case 4: // Flame
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
        const r = s * 0.15;
        ctx.fillStyle = i % 2 === 0 ? '#ff5722' : '#ff9800';
        ctx.beginPath(); ctx.arc(Math.cos(a) * r, Math.sin(a) * r - s * 0.05, s * 0.1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffeb3b'; ctx.beginPath();
      ctx.arc(0, -s*0.05, s*0.08, 0, Math.PI * 2); ctx.fill(); break;
    case 5: // Ice
      ctx.fillStyle = col;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(0, -s*0.05);
        ctx.lineTo(Math.cos(a) * s * 0.3, Math.sin(a) * s * 0.3 - s*0.05);
        ctx.lineTo(Math.cos(a + Math.PI/6) * s * 0.15, Math.sin(a + Math.PI/6) * s * 0.15 - s*0.05);
        ctx.closePath(); ctx.fill();
      } break;
    case 6: // Relic
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(0, -s*0.4); ctx.lineTo(s*0.25, -s*0.1);
      ctx.lineTo(s*0.15, s*0.3); ctx.lineTo(-s*0.15, s*0.3);
      ctx.lineTo(-s*0.25, -s*0.1); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffd740'; ctx.beginPath();
      ctx.arc(0, 0, s*0.08, 0, Math.PI * 2); ctx.fill();
      ctx.shadowColor = col; ctx.shadowBlur = 12;
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowBlur = 0; break;
  }
  // Level indicator
  if (level > 1) {
    ctx.fillStyle = '#ffd740';
    for (let i = 0; i < level; i++) {
      ctx.beginPath(); ctx.arc(-s*0.15 + i * s * 0.15, s * 0.35, 3, 0, Math.PI * 2); ctx.fill();
    }
  }
  // Selection highlight
  if (selected) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(0, 0, size * 0.45, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// Draw an enemy
function drawEnemy(ctx, x, y, size, enemyType, hp, maxHp, statusEffects) {
  const def = ENEMY_DEFS[enemyType];
  const s = size * 0.4;
  ctx.save();
  ctx.translate(x, y);
  // Canvas drawing — shape by type
  {
    ctx.fillStyle = def.color;
    switch (enemyType) {
      case 0: // Rusher — small diamond
        ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, 0);
        ctx.lineTo(0, s); ctx.lineTo(-s, 0); ctx.closePath(); ctx.fill(); break;
      case 1: // Tanker — large square with shield
        ctx.fillRect(-s, -s, s*2, s*2);
        ctx.fillStyle = '#bdbdbd'; ctx.fillRect(-s*0.6, -s*0.6, s*0.4, s*1.2); break;
      case 2: // Flyer — triangle
        ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, s*0.5);
        ctx.lineTo(-s, s*0.5); ctx.closePath(); ctx.fill(); break;
      case 3: // Splitter — circle pair
        ctx.beginPath(); ctx.arc(-s*0.3, 0, s*0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.3, 0, s*0.5, 0, Math.PI*2); ctx.fill(); break;
      case 4: // Time thief — hourglass shape
        ctx.beginPath(); ctx.moveTo(-s, -s); ctx.lineTo(s, -s);
        ctx.lineTo(0, 0); ctx.lineTo(s, s); ctx.lineTo(-s, s);
        ctx.lineTo(0, 0); ctx.closePath(); ctx.fill(); break;
      case 5: // Warper — star
        for (let i = 0; i < 5; i++) {
          const a1 = (i/5)*Math.PI*2 - Math.PI/2;
          const a2 = ((i+0.5)/5)*Math.PI*2 - Math.PI/2;
          if (i === 0) ctx.beginPath();
          ctx.lineTo(Math.cos(a1)*s, Math.sin(a1)*s);
          ctx.lineTo(Math.cos(a2)*s*0.4, Math.sin(a2)*s*0.4);
        }
        ctx.closePath(); ctx.fill(); break;
      case 6: // Shielder — hexagon
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i/6)*Math.PI*2 - Math.PI/2;
          ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#90caf9'; ctx.lineWidth = 2; ctx.stroke(); break;
      case 7: // Healer — cross
        ctx.fillRect(-s*0.2, -s, s*0.4, s*2);
        ctx.fillRect(-s, -s*0.2, s*2, s*0.4); break;
    }
  }
  // Status effects
  if (statusEffects) {
    if (statusEffects.slowed) {
      ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(0, 0, s * 1.2, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (statusEffects.frozen) {
      ctx.fillStyle = 'rgba(128,222,234,0.4)';
      ctx.beginPath(); ctx.arc(0, 0, s * 1.1, 0, Math.PI*2); ctx.fill();
    }
    if (statusEffects.burning) {
      ctx.fillStyle = '#ff5722'; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(s * 0.5, -s * 0.5, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s * 0.3, -s * 0.6, 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  // HP bar
  if (hp < maxHp) {
    const barW = s * 2;
    const barH = 4;
    const hpRatio = hp / maxHp;
    ctx.fillStyle = '#333'; ctx.fillRect(-barW/2, -s - 8, barW, barH);
    ctx.fillStyle = hpRatio > 0.5 ? '#66bb6a' : (hpRatio > 0.25 ? '#ffa726' : '#ef5350');
    ctx.fillRect(-barW/2, -s - 8, barW * hpRatio, barH);
  }
  ctx.restore();
}

// Draw a boss
function drawBoss(ctx, x, y, size, bossType, phase, hp, maxHp, animT) {
  const def = BOSS_DEFS[bossType];
  const s = size * 0.5;
  ctx.save();
  ctx.translate(x, y);
  // Pulsing glow
  const glow = 5 + Math.sin(animT * 3) * 3;
  ctx.shadowColor = def.color;
  ctx.shadowBlur = glow;
  ctx.fillStyle = def.color;
  // Base body
  switch (bossType) {
    case 0: // Pharaoh — trapezoid with crown
      ctx.beginPath(); ctx.moveTo(-s*0.4, s*0.4); ctx.lineTo(-s*0.3, -s*0.2);
      ctx.lineTo(0, -s*0.5); ctx.lineTo(s*0.3, -s*0.2);
      ctx.lineTo(s*0.4, s*0.4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffd740';
      ctx.beginPath(); ctx.moveTo(-s*0.2, -s*0.2); ctx.lineTo(0, -s*0.6);
      ctx.lineTo(s*0.2, -s*0.2); ctx.closePath(); ctx.fill(); break;
    case 1: // Black Knight — armored figure
      ctx.fillStyle = '#455a64'; ctx.fillRect(-s*0.3, -s*0.3, s*0.6, s*0.7);
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(0, -s*0.35, s*0.2, 0, Math.PI*2); ctx.fill();
      // Sword
      ctx.strokeStyle = '#cfd8dc'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*0.4, -s*0.3); ctx.lineTo(s*0.5, s*0.3); ctx.stroke(); break;
    case 2: // Colossus — mechanical giant
      ctx.fillStyle = '#607d8b';
      ctx.fillRect(-s*0.4, -s*0.2, s*0.8, s*0.5);
      ctx.fillRect(-s*0.5, 0, s*0.2, s*0.4);
      ctx.fillRect(s*0.3, 0, s*0.2, s*0.4);
      ctx.fillStyle = '#ff5722'; ctx.beginPath();
      ctx.arc(0, -s*0.05, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(0, -s*0.3, s*0.2, 0, Math.PI*2); ctx.fill(); break;
    case 3: // AI Core — digital sphere
      ctx.strokeStyle = def.color; ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath(); ctx.arc(0, 0, s * (0.2 + i * 0.12), 0, Math.PI*2); ctx.stroke();
      }
      ctx.fillStyle = def.color; ctx.beginPath();
      ctx.arc(0, 0, s*0.15, 0, Math.PI*2); ctx.fill(); break;
    case 4: // Chronos — cosmic entity
      ctx.fillStyle = def.color;
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + animT;
        const r = s * 0.35;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*r, Math.sin(a)*r, s*0.08, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#fff'; ctx.beginPath();
      ctx.arc(0, 0, s*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = def.color; ctx.beginPath();
      ctx.arc(0, 0, s*0.12, 0, Math.PI*2); ctx.fill(); break;
  }
  ctx.shadowBlur = 0;
  // Phase indicator
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(10, s*0.2)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`P${phase + 1}`, 0, s * 0.55);
  // HP bar
  const barW = s * 1.8;
  const barH = 6;
  const hpR = hp / maxHp;
  ctx.fillStyle = '#333'; ctx.fillRect(-barW/2, -s*0.6 - 12, barW, barH);
  ctx.fillStyle = hpR > 0.5 ? '#66bb6a' : (hpR > 0.25 ? '#ffa726' : '#ef5350');
  ctx.fillRect(-barW/2, -s*0.6 - 12, barW * hpR, barH);
  ctx.restore();
}

// Draw a projectile
function drawProjectile(ctx, x, y, size, projType, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  const s = size;
  switch (projType) {
    case 'arrow':
      ctx.fillStyle = '#4fc3f7';
      ctx.beginPath(); ctx.moveTo(s, 0); ctx.lineTo(-s, -s*0.3);
      ctx.lineTo(-s*0.5, 0); ctx.lineTo(-s, s*0.3); ctx.closePath(); ctx.fill(); break;
    case 'cannon':
      ctx.fillStyle = '#ff7043';
      ctx.beginPath(); ctx.arc(0, 0, s*0.6, 0, Math.PI*2); ctx.fill(); break;
    case 'lightning':
      ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
      ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.moveTo(-s, 0); ctx.lineTo(-s*0.3, -s*0.3);
      ctx.lineTo(0, s*0.2); ctx.lineTo(s, 0); ctx.stroke(); ctx.shadowBlur = 0; break;
    case 'flame':
      ctx.fillStyle = '#ff5722';
      ctx.beginPath(); ctx.arc(0, 0, s*0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath(); ctx.arc(0, 0, s*0.25, 0, Math.PI*2); ctx.fill(); break;
    case 'ice':
      ctx.fillStyle = '#80deea';
      ctx.beginPath(); ctx.moveTo(0, -s*0.5); ctx.lineTo(s*0.4, s*0.3);
      ctx.lineTo(-s*0.4, s*0.3); ctx.closePath(); ctx.fill(); break;
    case 'relic':
      ctx.fillStyle = '#ce93d8';
      ctx.beginPath(); ctx.arc(0, 0, s*0.4, 0, Math.PI*2); ctx.fill();
      ctx.shadowColor = '#ce93d8'; ctx.shadowBlur = 8;
      ctx.strokeStyle = '#ce93d8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, s*0.6, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0; break;
    default:
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, s*0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// Draw time magic field overlay
function drawTimeMagicField(ctx, cx, cy, radius, magicType, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.3;
  const colors = ['#4dd0e1', '#ff7043', '#ce93d8'];
  const col = colors[magicType] || '#fff';
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, col);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
  // Ring
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// Draw a 5-point star shape at (cx,cy)
function drawStarShape(ctx, cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
}

// Draw hit effect — canvas only
function drawHitEffect(ctx, x, y, size, progress) {
  const alpha = 1 - progress;
  const scale = 0.5 + progress * 1.5;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  // Canvas burst effect
  const colors = ['#00e5ff', '#ab47bc', '#ffd740'];
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const r = size * 0.3 * (1 + progress);
    ctx.fillStyle = colors[i % 3];
    ctx.beginPath(); ctx.arc(Math.cos(a) * r, Math.sin(a) * r, size * 0.06, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════
// §F — TOWER LOGIC
// ═══════════════════════════════════════

// Place a tower on the grid
function placeTower(col, row, towerType) {
  if (col < 0 || col >= CONFIG.GRID_COLS || row < 0 || row >= CONFIG.GRID_ROWS) return false;
  if (grid[row][col] !== 0) return false;
  const def = TOWER_DEFS[towerType];
  const cost = getTowerCost(def.cost);
  if (gold < cost) return false;
  modifyGold(-cost);
  grid[row][col] = 2;
  const tower = {
    col, row, type: towerType, level: 1, cooldown: 0,
    x: gridOffsetX + col * tileSize + tileSize / 2,
    y: gridOffsetY + row * tileSize + tileSize / 2,
    range: def.range * tileSize,
    atkSpd: def.atkSpd, dmg: def.dmg, splash: def.splash * tileSize,
    special: def.special, kills: 0
  };
  towers.push(tower);
  sound.play('towerPlace');
  return true;
}

// Sell a tower
function sellTower(towerIdx) {
  if (towerIdx < 0 || towerIdx >= towers.length) return;
  const t = towers[towerIdx];
  const def = TOWER_DEFS[t.type];
  const refund = Math.floor(getTowerCost(def.cost) * CONFIG.SELL_REFUND_RATE * t.level);
  modifyGold(refund);
  grid[t.row][t.col] = 0;
  towers.splice(towerIdx, 1);
  sound.play('click');
}

// Get tower cost (with upgrades)
function getTowerCost(baseCost) {
  const upg = saveData ? saveData.upgrades.towerCost : 0;
  return Math.floor(baseCost * (1 - upg * 0.05));
}

// Update towers — find targets and fire
function updateTowers(dt) {
  const allEnemies = enemies.concat(bossActive ? [bossActive] : []);
  for (const t of towers) {
    if (t.atkSpd <= 0) continue; // Passive towers (time tower)
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    // Find closest enemy in range
    let target = null, minDist = Infinity;
    for (const e of allEnemies) {
      if (e.hp <= 0) continue;
      const dx = e.x - t.x, dy = e.y - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Apply haste multiplier from time magic
      const effectiveRange = t.range;
      if (dist < effectiveRange && dist < minDist) {
        minDist = dist; target = e;
      }
    }
    if (!target) continue;
    // Fire
    const hasteM = getHasteMultiplier(t.x, t.y);
    t.cooldown = 1000 / (t.atkSpd * hasteM);
    const projTypes = ['arrow','cannon','lightning','time','flame','ice','relic'];
    fireProjectile(t.x, t.y, target.x, target.y, t.dmg, projTypes[t.type], t.splash, t.special, towers.indexOf(t));
    // Sound
    const sounds = ['arrowFire','cannonFire','lightning','click','cannonFire','arrowFire','arrowFire'];
    sound.play(sounds[t.type]);
  }
  // Passive tower effects (time tower slow aura)
  for (const t of towers) {
    if (t.type === 3) { // Time tower
      for (const e of allEnemies) {
        if (e.hp <= 0) continue;
        const dx = e.x - t.x, dy = e.y - t.y;
        if (dx*dx + dy*dy < t.range * t.range) {
          if (!e.effects) e.effects = {};
          e.effects.towerSlowed = true;
        }
      }
    }
  }
}

// Fire a projectile
function fireProjectile(sx, sy, tx, ty, dmg, type, splash, special, towerId) {
  projectilePool.spawn(p => {
    p.x = sx; p.y = sy; p.tx = tx; p.ty = ty;
    p.dmg = dmg; p.type = type; p.splash = splash;
    p.special = special; p.spd = 6; p.towerId = towerId;
    p.angle = Math.atan2(ty - sy, tx - sx);
  });
}

// Get haste multiplier at a position from time magic fields
function getHasteMultiplier(x, y) {
  let mult = 1;
  for (const f of timeMagicFields) {
    if (f.type !== 1) continue; // Only haste
    const dx = x - f.x, dy = y - f.y;
    if (dx*dx + dy*dy < f.radius * f.radius) {
      mult = CONFIG.HASTE_ATTACK_MULT;
    }
  }
  return mult;
}

// ═══════════════════════════════════════
// §G — ENEMY LOGIC
// ═══════════════════════════════════════

// Spawn an enemy at the path start
function spawnEnemy(enemyDef, era) {
  const p = path[0];
  const px = gridOffsetX + p[0] * tileSize + tileSize / 2;
  const py = gridOffsetY + p[1] * tileSize + tileSize / 2;
  const mult = CONFIG.ERA_MULT[era];
  const diffM = CONFIG.DIFF[difficulty];
  const e = {
    type: ENEMY_DEFS.indexOf(enemyDef),
    x: px, y: py, pathIdx: 0,
    hp: Math.floor(enemyDef.hp * mult.hp * diffM.hpMult),
    maxHp: Math.floor(enemyDef.hp * mult.hp * diffM.hpMult),
    spd: enemyDef.spd * mult.spd, baseSpd: enemyDef.spd * mult.spd,
    gold: Math.floor(enemyDef.gold * diffM.goldMult),
    armor: enemyDef.armor, special: enemyDef.special,
    effects: {}, burnTimer: 0, burnDmg: 0, freezeTimer: 0,
    teleportTimer: 5000, posHistory: [], historyTimer: 0
  };
  enemies.push(e);
}

// Spawn boss
function spawnBoss(bossIdx, era) {
  const def = BOSS_DEFS[bossIdx];
  const p = path[0];
  const px = gridOffsetX + p[0] * tileSize + tileSize / 2;
  const py = gridOffsetY + p[1] * tileSize + tileSize / 2;
  const diffM = CONFIG.DIFF[difficulty];
  bossActive = {
    type: bossIdx, x: px, y: py, pathIdx: 0,
    hp: Math.floor(def.hp * diffM.hpMult), maxHp: Math.floor(def.hp * diffM.hpMult),
    spd: 0.6, baseSpd: 0.6, phase: 0,
    effects: {}, patternTimer: 0, animT: 0,
    gold: 100, armor: 0, special: 'boss',
    burnTimer: 0, burnDmg: 0, freezeTimer: 0,
    posHistory: [], historyTimer: 0
  };
  isBossPhase = true;
}

// Update enemies along path
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hp <= 0) { removeEnemy(i, true); continue; }
    // Status effect updates
    updateEnemyEffects(e, dt);
    // Movement
    if (e.freezeTimer > 0) { e.freezeTimer -= dt; continue; }
    let spd = e.baseSpd;
    if (e.effects.slowed || e.effects.towerSlowed) spd *= CONFIG.SLOW_SPEED_MULT;
    e.effects.towerSlowed = false; // Reset each frame
    // Check time magic slow fields
    for (const f of timeMagicFields) {
      if (f.type === 0) {
        const dx = e.x - f.x, dy = e.y - f.y;
        if (dx*dx + dy*dy < f.radius * f.radius) { spd *= CONFIG.SLOW_SPEED_MULT; e.effects.slowed = true; break; }
      }
    }
    // Flying enemies move straight to core
    if (e.special === 'flying') {
      const coreTile = STAGE_DATA[currentEra][currentStage].core;
      const coreX = gridOffsetX + coreTile[0] * tileSize + tileSize / 2;
      const coreY = gridOffsetY + coreTile[1] * tileSize + tileSize / 2;
      const dx = coreX - e.x, dy = coreY - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < spd * dt / 16 * tileSize * 0.05) {
        enemyReachesCore(i); continue;
      }
      e.x += (dx/dist) * spd * dt / 16 * tileSize * 0.02;
      e.y += (dy/dist) * spd * dt / 16 * tileSize * 0.02;
    } else {
      // Path following
      if (e.pathIdx >= path.length - 1) { enemyReachesCore(i); continue; }
      const target = path[e.pathIdx + 1];
      const tx = gridOffsetX + target[0] * tileSize + tileSize / 2;
      const ty = gridOffsetY + target[1] * tileSize + tileSize / 2;
      const dx = tx - e.x, dy = ty - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const moveAmt = spd * dt / 16 * tileSize * 0.02;
      if (dist < moveAmt) {
        e.x = tx; e.y = ty; e.pathIdx++;
      } else {
        e.x += (dx/dist) * moveAmt;
        e.y += (dy/dist) * moveAmt;
      }
    }
    // Teleport special
    if (e.special === 'teleport') {
      e.teleportTimer -= dt;
      if (e.teleportTimer <= 0) {
        e.teleportTimer = 5000;
        e.pathIdx = Math.min(e.pathIdx + 3, path.length - 2);
        const np = path[e.pathIdx];
        e.x = gridOffsetX + np[0] * tileSize + tileSize / 2;
        e.y = gridOffsetY + np[1] * tileSize + tileSize / 2;
        spawnParticles(e.x, e.y, '#ab47bc', 6);
      }
    }
    // Position history for time rewind
    e.historyTimer += dt;
    if (e.historyTimer >= 200) {
      e.historyTimer = 0;
      e.posHistory.push({ x: e.x, y: e.y, pathIdx: e.pathIdx });
      if (e.posHistory.length > 25) e.posHistory.shift();
    }
    // Healer special
    if (e.special === 'heal') {
      for (const other of enemies) {
        if (other === e || other.hp <= 0) continue;
        const dx = other.x - e.x, dy = other.y - e.y;
        if (dx*dx + dy*dy < (tileSize * 2) * (tileSize * 2)) {
          other.hp = Math.min(other.maxHp, other.hp + 5 * dt / 1000);
        }
      }
    }
    // Shield bearer special
    if (e.special === 'shield') {
      for (const other of enemies) {
        if (other === e || other.hp <= 0) continue;
        const dx = other.x - e.x, dy = other.y - e.y;
        if (dx*dx + dy*dy < (tileSize * 1) * (tileSize * 1)) {
          other.effects.shielded = true;
        }
      }
    }
  }
  // Update boss
  if (bossActive) {
    updateBoss(dt);
  }
}

// Update enemy status effects
function updateEnemyEffects(e, dt) {
  if (e.burnTimer > 0) {
    e.burnTimer -= dt;
    e.hp -= e.burnDmg * dt / 1000;
    e.effects.burning = true;
  } else {
    e.effects.burning = false;
  }
  e.effects.shielded = false;
  if (!e.effects.slowed) e.effects.slowed = false;
}

// Enemy reaches core
function enemyReachesCore(idx) {
  const e = enemies[idx];
  modifyCoreHP(-1);
  sound.play('coreHit');
  spawnParticles(e.x, e.y, '#ef5350', 5);
  shakeAmount = 5;
  enemies.splice(idx, 1);
  waveEnemiesLeft--;
  if (e.special === 'stealEnergy') modifyTimeEnergy(-2);
  checkGameOver();
}

// Remove enemy (killed)
function removeEnemy(idx, killed) {
  const e = enemies[idx];
  if (killed) {
    modifyGold(e.gold);
    const pts = Math.floor(e.maxHp * getEraScoreMult());
    // Combo
    comboTimer = CONFIG.COMBO_WINDOW;
    comboCount = Math.min(comboCount + 1, CONFIG.MAX_COMBO);
    const comboMult = Math.min(comboCount, CONFIG.MAX_COMBO);
    addScore(pts * comboMult);
    sound.play('enemyDie');
    spawnParticles(e.x, e.y, ENEMY_DEFS[e.type].color, 8);
    // Spawn hit effect particle
    particlePool.spawn(p => {
      p.x = e.x; p.y = e.y; p.vx = 0; p.vy = 0;
      p.life = 400; p.maxLife = 400; p.r = 20; p.color = '#fff'; p.type = 'hit';
    });
    // Splitter special
    if (e.special === 'split') {
      for (let s = 0; s < 2; s++) {
        const mini = {
          type: e.type, x: e.x + (s === 0 ? -10 : 10), y: e.y,
          pathIdx: e.pathIdx, hp: 20, maxHp: 20, spd: e.baseSpd * 1.3,
          baseSpd: e.baseSpd * 1.3, gold: Math.floor(e.gold * 0.5),
          armor: 0, special: 'none', effects: {},
          burnTimer: 0, burnDmg: 0, freezeTimer: 0,
          teleportTimer: 5000, posHistory: [], historyTimer: 0
        };
        enemies.push(mini);
        waveEnemiesLeft++;
      }
    }
    // Time thief steals energy on death too
    if (e.special === 'stealEnergy') modifyTimeEnergy(-2);
    // Relic tower energy on kill
    for (const t of towers) {
      if (t.type === 6) { // Relic tower
        const dx = e.x - t.x, dy = e.y - t.y;
        if (dx*dx + dy*dy < t.range * t.range) modifyTimeEnergy(1);
      }
    }
  }
  enemies.splice(idx, 1);
  waveEnemiesLeft--;
}

// Update boss
function updateBoss(dt) {
  if (!bossActive) return;
  const b = bossActive;
  b.animT += dt / 1000;
  // Check phase transitions
  const def = BOSS_DEFS[b.type];
  if (b.phase < def.phases - 1) {
    const threshold = def.phaseThresholds[b.phase];
    if (b.hp / b.maxHp <= threshold) {
      b.phase++;
      spawnParticles(b.x, b.y, def.color, 15);
      shakeAmount = 8;
    }
  }
  // Movement along path
  if (b.freezeTimer > 0) { b.freezeTimer -= dt; }
  else {
    let spd = b.baseSpd;
    for (const f of timeMagicFields) {
      if (f.type === 0) {
        const dx = b.x - f.x, dy = b.y - f.y;
        if (dx*dx+dy*dy < f.radius*f.radius) spd *= CONFIG.SLOW_SPEED_MULT;
      }
    }
    if (b.pathIdx < path.length - 1) {
      const target = path[b.pathIdx + 1];
      const tx = gridOffsetX + target[0]*tileSize + tileSize/2;
      const ty = gridOffsetY + target[1]*tileSize + tileSize/2;
      const dx = tx - b.x, dy = ty - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const moveAmt = spd * dt / 16 * tileSize * 0.015;
      if (dist < moveAmt) { b.x = tx; b.y = ty; b.pathIdx++; }
      else { b.x += (dx/dist)*moveAmt; b.y += (dy/dist)*moveAmt; }
    } else {
      // Boss reached core
      modifyCoreHP(-5);
      sound.play('coreHit');
      shakeAmount = 10;
      b.pathIdx = 0;
      const sp = path[0];
      b.x = gridOffsetX + sp[0]*tileSize + tileSize/2;
      b.y = gridOffsetY + sp[1]*tileSize + tileSize/2;
    }
  }
  // Boss patterns
  b.patternTimer -= dt;
  if (b.patternTimer <= 0) {
    executeBossPattern(b);
    b.patternTimer = 3000 + Math.random() * 2000;
  }
  // Position history
  b.historyTimer = (b.historyTimer || 0) + dt;
  if (b.historyTimer >= 200) {
    b.historyTimer = 0;
    b.posHistory.push({ x: b.x, y: b.y, pathIdx: b.pathIdx });
    if (b.posHistory.length > 25) b.posHistory.shift();
  }
  // Check boss death
  if (b.hp <= 0) {
    bossDefeated();
  }
}

// Execute boss pattern
function executeBossPattern(boss) {
  const def = BOSS_DEFS[boss.type];
  const pattern = def.patterns[boss.phase];
  switch (pattern) {
    case 'sandstorm':
      // Slow all towers
      for (const t of towers) { t.cooldown += 2000; }
      spawnParticles(W/2, H/2, '#ffd740', 20);
      shakeAmount = 4; break;
    case 'summonMummy':
      for (let i = 0; i < 3; i++) spawnEnemy(ENEMY_DEFS[0], currentEra);
      waveEnemiesLeft += 3; break;
    case 'swordBeam':
      spawnParticles(boss.x, boss.y, '#cfd8dc', 10);
      // Damage random tower
      if (towers.length > 0) {
        const t = towers[Math.floor(Math.random()*towers.length)];
        spawnParticles(t.x, t.y, '#ef5350', 5);
      }
      shakeAmount = 3; break;
    case 'aura':
      for (const e of enemies) { e.hp = Math.min(e.maxHp, e.hp + e.maxHp * 0.1); }
      break;
    case 'steamLaser':
      shakeAmount = 6;
      spawnParticles(boss.x, boss.y, '#ff5722', 12); break;
    case 'detach':
      for (let i = 0; i < 2; i++) spawnEnemy(ENEMY_DEFS[1], currentEra);
      waveEnemiesLeft += 2; break;
    case 'selfdestruct':
      modifyCoreHP(-2); shakeAmount = 8;
      spawnParticles(boss.x, boss.y, '#ff5722', 20); break;
    case 'hologram':
      for (let i = 0; i < 2; i++) spawnEnemy(ENEMY_DEFS[5], currentEra);
      waveEnemiesLeft += 2; break;
    case 'hack':
      // Disable random tower briefly
      if (towers.length > 0) {
        const t = towers[Math.floor(Math.random()*towers.length)];
        t.cooldown += 5000;
        spawnParticles(t.x, t.y, '#00e5ff', 5);
      } break;
    case 'timeStop':
      // Freeze all towers
      for (const t of towers) t.cooldown += 3000;
      shakeAmount = 5; break;
    case 'timeReverse':
      // Revive some enemies
      for (let i = 0; i < 2; i++) spawnEnemy(ENEMY_DEFS[0], currentEra);
      waveEnemiesLeft += 2; break;
    case 'collapse':
      shakeAmount = 10;
      modifyCoreHP(-1);
      spawnParticles(W/2, H/2, '#e040fb', 25); break;
  }
}

// Boss defeated — with ending trigger for Chronos (§9.2)
function bossDefeated() {
  if (!bossActive) return;
  const bossType = bossActive.type;
  addScore(1000 * (currentEra + 1));
  modifyGold(bossActive.gold);
  const crystals = 15;
  if (saveData) saveData.timeCrystals += crystals;
  spawnParticles(bossActive.x, bossActive.y, BOSS_DEFS[bossActive.type].color, 30);
  shakeAmount = 10;
  bossActive = null;
  isBossPhase = false;
  isWaveClearing = true;
  // Track tower count at clear for hidden stage unlock
  if (saveData) saveData._lastClearTowers = towers.length;
  // Chronos (era 4 boss) defeated → ending
  if (bossType === 4 && currentEra === 4) {
    calculateResult(); // Save results first
    beginTransition(S.ENDING);
  } else {
    beginTransition(S.RESULT);
  }
}

// §H — TIME MAGIC SYSTEM
// ═══════════════════════════════════════

// Cast time magic at position
function castTimeMagic(magicType, cx, cy) {
  if (magicType === 2) { // Rewind
    if (rewindCooldown > 0 || timeEnergy < CONFIG.REWIND_COST) return;
    modifyTimeEnergy(-CONFIG.REWIND_COST);
    rewindCooldown = CONFIG.REWIND_COOLDOWN;
    sound.play('timeRewind');
    // Rewind all enemies to 5 seconds ago
    for (const e of enemies) {
      if (e.posHistory.length > 0) {
        const oldPos = e.posHistory[0];
        spawnParticles(e.x, e.y, '#ce93d8', 4);
        e.x = oldPos.x; e.y = oldPos.y; e.pathIdx = oldPos.pathIdx;
      }
    }
    if (bossActive && bossActive.posHistory.length > 0) {
      const oldPos = bossActive.posHistory[0];
      bossActive.x = oldPos.x; bossActive.y = oldPos.y;
      bossActive.pathIdx = oldPos.pathIdx;
    }
    spawnParticles(W/2, H/2, '#ce93d8', 15);
    shakeAmount = 4;
    return;
  }
  // Toggle slow/haste fields
  const radius = tileSize * 2.5;
  // Check if field already exists at similar position
  for (let i = timeMagicFields.length - 1; i >= 0; i--) {
    if (timeMagicFields[i].type === magicType) {
      timeMagicFields.splice(i, 1);
      return;
    }
  }
  timeMagicFields.push({ type: magicType, x: cx, y: cy, radius, alpha: 1 });
  sound.play(magicType === 0 ? 'timeSlow' : 'timeHaste');
}

// Update time magic fields (energy drain)
function updateTimeMagic(dt) {
  for (let i = timeMagicFields.length - 1; i >= 0; i--) {
    const f = timeMagicFields[i];
    const costPerSec = f.type === 0 ? CONFIG.SLOW_COST_PER_SEC : CONFIG.HASTE_COST_PER_SEC;
    const cost = costPerSec * dt / 1000;
    if (timeEnergy < cost) {
      timeMagicFields.splice(i, 1);
      continue;
    }
    modifyTimeEnergy(-cost);
    f.alpha = 0.6 + Math.sin(performance.now() / 500) * 0.2;
  }
  // Regen
  const regenRate = CONFIG.DIFF[difficulty].regen + (saveData ? saveData.upgrades.timeRegen * 0.5 : 0);
  if (timeMagicFields.length === 0) modifyTimeEnergy(regenRate * dt / 1000);
  // Rewind cooldown
  if (rewindCooldown > 0) rewindCooldown -= dt;
}

// ═══════════════════════════════════════
// §I — COLLISION & COMBAT
// ═══════════════════════════════════════

// Check projectile-enemy collisions (pure function pattern)
function checkCollisions() {
  const allTargets = enemies.concat(bossActive ? [bossActive] : []);
  projectilePool.forEach((proj, pIdx) => {
    // Check if projectile reached target area
    for (const e of allTargets) {
      if (e.hp <= 0) continue;
      const dx = proj.x - e.x, dy = proj.y - e.y;
      const hitDist = (e.special === 'boss' ? tileSize * 0.5 : tileSize * 0.35);
      if (dx*dx + dy*dy < hitDist * hitDist) {
        applyDamage(e, proj.dmg, proj.special, proj.splash, proj.x, proj.y);
        proj.x = -1000; proj.y = -1000; // Force removal
        break;
      }
    }
  });
}

// Apply damage to an enemy (pure function parameters)
function applyDamage(enemy, baseDmg, special, splash, hitX, hitY) {
  let dmg = baseDmg;
  if (enemy.effects.shielded) dmg *= 0.5;
  dmg = Math.max(1, dmg - enemy.armor);
  enemy.hp -= dmg;
  // Splash damage
  if (splash > 0) {
    const targets = enemies.concat(bossActive ? [bossActive] : []);
    for (const e of targets) {
      if (e === enemy || e.hp <= 0) continue;
      const dx = e.x - hitX, dy = e.y - hitY;
      if (dx*dx + dy*dy < splash * splash) {
        const splashDmg = Math.max(1, baseDmg * 0.5 - e.armor);
        e.hp -= splashDmg;
      }
    }
    spawnParticles(hitX, hitY, '#ff7043', 6);
  }
  // Special effects
  if (special === 'burn') { enemy.burnTimer = 5000; enemy.burnDmg = 3; }
  if (special === 'freeze30') { if (Math.random() < 0.3) enemy.freezeTimer = 1000; }
  if (special === 'chain3') {
    // Chain to 2 more nearby enemies
    let chainCount = 0;
    const targets = enemies.concat(bossActive ? [bossActive] : []);
    for (const e of targets) {
      if (e === enemy || e.hp <= 0 || chainCount >= 2) continue;
      const dx = e.x - enemy.x, dy = e.y - enemy.y;
      if (dx*dx + dy*dy < (tileSize * 2) * (tileSize * 2)) {
        e.hp -= Math.max(1, baseDmg * 0.6 - e.armor);
        chainCount++;
        spawnParticles(e.x, e.y, '#ffeb3b', 3);
      }
    }
  }
  spawnParticles(hitX, hitY, '#fff', 3);
}

// Helper: ensure touch-safe button size
function touchSafe(w, h) {
  return { w: Math.max(CONFIG.MIN_TOUCH, w), h: Math.max(CONFIG.MIN_TOUCH, h) };
}

// Draw HUD during gameplay
function drawHUD() {
  const f = `bold ${Math.max(14, tileSize * 0.25)}px 'Courier New','Consolas',monospace`;
  ctx.font = f;
  ctx.textAlign = 'left';
  const pad = 10;
  const iconS = 20;
  // Core HP — heart icon (canvas drawn)
  ctx.fillStyle = '#ef5350';
  ctx.save(); ctx.translate(pad + iconS/2, pad + iconS/2);
  ctx.beginPath();
  ctx.moveTo(0, iconS*0.15);
  ctx.bezierCurveTo(-iconS*0.5, -iconS*0.3, -iconS*0.5, iconS*0.1, 0, iconS*0.4);
  ctx.bezierCurveTo(iconS*0.5, iconS*0.1, iconS*0.5, -iconS*0.3, 0, iconS*0.15);
  ctx.fill(); ctx.restore();
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText(`${coreHP}/${maxCoreHP}`, pad + iconS + 6, pad + iconS - 4);
  // Gold
  ctx.fillStyle = '#ffd740';
  ctx.fillText(`💰 ${gold}`, pad, pad + iconS + 20);
  // Score
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText(`${t('score')}: ${score}`, pad, pad + iconS + 40);
  // Wave
  ctx.fillText(`${t('wave')} ${currentWave + 1}/${totalWaves}`, pad, pad + iconS + 60);
  // Time Energy bar (top right)
  const barW = Math.min(200, W * 0.25);
  const barH = 16;
  const barX = W - barW - pad;
  const barY = pad;
  ctx.fillStyle = '#1a2744';
  ctx.fillRect(barX, barY, barW, barH);
  const eRatio = timeEnergy / maxTimeEnergy;
  const eGrad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
  eGrad.addColorStop(0, '#00e5ff'); eGrad.addColorStop(1, '#4dd0e1');
  ctx.fillStyle = eGrad;
  ctx.fillRect(barX, barY, barW * eRatio, barH);
  ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = `bold 11px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${t('timeEnergy')} ${Math.floor(timeEnergy)}`, barX + barW/2, barY + 12);
  // Combo
  if (comboCount > 1) {
    ctx.fillStyle = '#ffd740';
    ctx.font = `bold ${16 + comboCount * 2}px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`×${comboCount} COMBO`, W/2, pad + 20);
  }
  // Rewind cooldown
  if (rewindCooldown > 0) {
    ctx.fillStyle = '#ce93d8';
    ctx.font = `bold 12px 'Courier New',monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(`${t('magicNames')[2]} CD: ${(rewindCooldown/1000).toFixed(1)}s`, W - pad, barY + barH + 20);
  }
}

// Draw tower selection panel (bottom)
function drawTowerPanel() {
  const panelH = Math.max(70, tileSize * 1.2);
  const panelY = H - panelH;
  // Panel background
  ctx.fillStyle = 'rgba(10, 14, 26, 0.9)';
  ctx.fillRect(0, panelY, W, panelH);
  ctx.strokeStyle = '#1a2744';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, panelY); ctx.lineTo(W, panelY); ctx.stroke();
  // Tower slots
  const slotSize = touchSafe(54, 54);
  const maxSlots = 7;
  const totalSlotW = maxSlots * (slotSize.w + 6);
  const startX = Math.max(8, (W * 0.6 - totalSlotW) / 2);
  const slotY = panelY + (panelH - slotSize.h) / 2;
  for (let i = 0; i < maxSlots; i++) {
    const def = TOWER_DEFS[i];
    const unlocked = def.era <= currentEra;
    const sx = startX + i * (slotSize.w + 6);
    // Background
    ctx.fillStyle = selectedTowerSlot === i ? '#2a3a5a' : '#12121e';
    ctx.fillRect(sx, slotY, slotSize.w, slotSize.h);
    ctx.strokeStyle = selectedTowerSlot === i ? '#00e5ff' : '#1e1e30';
    ctx.lineWidth = selectedTowerSlot === i ? 2 : 1;
    ctx.strokeRect(sx, slotY, slotSize.w, slotSize.h);
    if (unlocked) {
      // Mini tower icon
      drawTower(ctx, sx + slotSize.w/2, slotY + slotSize.h/2 - 6, slotSize.w * 0.6, i, 1, false);
      // Cost
      ctx.fillStyle = gold >= getTowerCost(def.cost) ? '#ffd740' : '#ef5350';
      ctx.font = `bold 10px 'Courier New',monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(`${getTowerCost(def.cost)}`, sx + slotSize.w/2, slotY + slotSize.h - 4);
    } else {
      ctx.fillStyle = '#505070';
      ctx.font = `bold 10px 'Courier New',monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('🔒', sx + slotSize.w/2, slotY + slotSize.h/2 + 4);
    }
    // Key hint
    ctx.fillStyle = '#505070';
    ctx.font = `9px 'Courier New',monospace`;
    ctx.fillText(`${i+1}`, sx + slotSize.w/2, slotY - 2);
    // Hit area
    buttons.push({ id: `tower_${i}`, x: sx, y: slotY, w: slotSize.w, h: slotSize.h, action: () => {
      if (TOWER_DEFS[i].era <= currentEra) { selectedTowerSlot = (selectedTowerSlot === i) ? -1 : i; selectedMagic = -1; }
    }});
  }
  // Magic buttons (right side)
  const magicColors = ['#4dd0e1', '#ff7043', '#ce93d8'];
  const magicStartX = W - (3 * (slotSize.w + 6)) - 8;
  for (let i = 0; i < 3; i++) {
    const sx = magicStartX + i * (slotSize.w + 6);
    const unlocked = i === 0 || (i === 1 && currentEra >= 1) || (i === 2 && currentEra >= 2);
    ctx.fillStyle = selectedMagic === i ? '#2a3a5a' : '#12121e';
    ctx.fillRect(sx, slotY, slotSize.w, slotSize.h);
    ctx.strokeStyle = selectedMagic === i ? magicColors[i] : '#1e1e30';
    ctx.lineWidth = selectedMagic === i ? 2 : 1;
    ctx.strokeRect(sx, slotY, slotSize.w, slotSize.h);
    if (unlocked) {
      ctx.fillStyle = magicColors[i];
      ctx.font = `bold 12px 'Courier New',monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(t('magicNames')[i], sx + slotSize.w/2, slotY + slotSize.h/2 + 4);
    } else {
      ctx.fillStyle = '#505070';
      ctx.font = `bold 10px 'Courier New',monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('🔒', sx + slotSize.w/2, slotY + slotSize.h/2 + 4);
    }
    // Key hint
    ctx.fillStyle = '#505070';
    ctx.font = `9px 'Courier New',monospace`;
    ctx.fillText(['Q','W','E'][i], sx + slotSize.w/2, slotY - 2);
    buttons.push({ id: `magic_${i}`, x: sx, y: slotY, w: slotSize.w, h: slotSize.h, action: () => {
      if (i === 0 || (i === 1 && currentEra >= 1) || (i === 2 && currentEra >= 2)) {
        selectedMagic = (selectedMagic === i) ? -1 : i; selectedTowerSlot = -1;
      }
    }});
  }
  // Early wave / pause buttons
  if (state === S.WAVE_PREP || (state === S.GAMEPLAY && !isWaveActive)) {
    const btnW = Math.max(100, W * 0.12);
    const btnH = 32;
    const bx = W / 2 - btnW / 2;
    const by = panelY - btnH - 8;
    ctx.fillStyle = '#1a2744';
    ctx.fillRect(bx, by, btnW, btnH);
    ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, btnW, btnH);
    ctx.fillStyle = '#e0e0e0';
    ctx.font = `bold 13px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(t('earlyWave'), bx + btnW/2, by + btnH/2 + 4);
    buttons.push({ id:'earlyWave', x:bx, y:by, w:btnW, h:btnH, action: () => startNextWave() });
  }
}

// Draw tower info panel (Tab toggle / tower tap)
function drawTowerInfoPanel() {
  const t = towers[towerInfoTarget];
  if (!t) { showTowerInfo = false; return; }
  const def = TOWER_DEFS[t.type];
  const panelW = Math.min(220, W * 0.45);
  const panelH = 160;
  // Position panel near the tower, but clamp to screen
  let px = t.x + tileSize * 0.6;
  let py = t.y - panelH / 2;
  if (px + panelW > W - 10) px = t.x - tileSize * 0.6 - panelW;
  if (py < 10) py = 10;
  if (py + panelH > H - 80) py = H - 80 - panelH;
  // Panel background
  ctx.fillStyle = 'rgba(18,18,30,0.95)';
  ctx.fillRect(px, py, panelW, panelH);
  ctx.strokeStyle = def.color; ctx.lineWidth = 2;
  ctx.strokeRect(px, py, panelW, panelH);
  // Tower icon
  drawTower(ctx, px + 24, py + 30, 36, t.type, t.level, false);
  // Tower name + level
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold 13px 'Courier New',monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(`${LANG === 'ko' ? def.nameKo : def.nameEn} Lv${t.level}`, px + 50, py + 22);
  // Stats
  ctx.fillStyle = '#8080a0';
  ctx.font = `11px 'Courier New',monospace`;
  const dmg = Math.floor(t.dmg * (1 + 0.4 * (t.level - 1)));
  ctx.fillText(`DMG: ${dmg}  SPD: ${t.atkSpd.toFixed(1)}/s`, px + 50, py + 40);
  ctx.fillText(`Range: ${(t.range / tileSize).toFixed(1)} tiles`, px + 50, py + 56);
  ctx.fillText(`Kills: ${t.kills}`, px + 50, py + 72);
  // Upgrade button (if level < 3)
  if (t.level < 3) {
    const upgCost = Math.floor(getTowerCost(def.cost) * (t.level === 1 ? 0.7 : 1.0));
    const canUp = gold >= upgCost;
    const ubx = px + 8, uby = py + 85;
    const ubw = panelW - 16, ubh = 28;
    ctx.fillStyle = canUp ? '#1a2744' : '#12121e';
    ctx.fillRect(ubx, uby, ubw, ubh);
    ctx.strokeStyle = canUp ? '#ffd740' : '#1e1e30'; ctx.lineWidth = 1;
    ctx.strokeRect(ubx, uby, ubw, ubh);
    ctx.fillStyle = canUp ? '#ffd740' : '#505070';
    ctx.font = `bold 11px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`${LANG==='ko'?'업그레이드':'Upgrade'} (${upgCost}G)`, ubx + ubw/2, uby + 18);
    if (canUp) {
      buttons.push({ id: 'upgTower', x: ubx, y: uby, w: ubw, h: ubh, action: () => {
        modifyGold(-upgCost);
        t.level = Math.min(3, t.level + 1);
        t.dmg = def.dmg * (1 + 0.4 * (t.level - 1));
        t.range = def.range * tileSize * (1 + 0.05 * (t.level - 1));
        sound.play('upgrade');
      }});
    }
  }
  // Sell button
  const sbx = px + 8, sby = py + 120;
  const sbw = panelW - 16, sbh = 28;
  ctx.fillStyle = '#1a1218';
  ctx.fillRect(sbx, sby, sbw, sbh);
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 1;
  ctx.strokeRect(sbx, sby, sbw, sbh);
  const refund = Math.floor(getTowerCost(def.cost) * CONFIG.SELL_REFUND_RATE * t.level);
  ctx.fillStyle = '#ef5350';
  ctx.font = `bold 11px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${t('sell')} (+${refund}G)`, sbx + sbw/2, sby + 18);
  buttons.push({ id: 'sellTowerInfo', x: sbx, y: sby, w: sbw, h: sbh, action: () => {
    sellTower(towerInfoTarget);
    showTowerInfo = false;
  }});
}

// Spawn visual particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particlePool.spawn(p => {
      p.x = x; p.y = y;
      p.vx = (Math.random() - 0.5) * 4;
      p.vy = (Math.random() - 0.5) * 4;
      p.life = 300 + Math.random() * 300;
      p.maxLife = p.life;
      p.r = 2 + Math.random() * 3;
      p.color = color;
      p.type = 'circle';
    });
  }
}

// ═══════════════════════════════════════
// §K — INPUT HANDLING
// ═══════════════════════════════════════

// Key state
const keys = {};

// Process click/tap at a position
function processClick(px, py) {
  // Check buttons first
  for (const btn of buttons) {
    if (px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h) {
      btn.action();
      sound.play('click');
      return;
    }
  }
  // State-specific click handling
  if (state === S.TITLE) {
    beginTransition(S.ERA_SELECT);
    sound.play('click');
    return;
  }
  if (state === S.GAMEOVER) {
    beginTransition(S.TITLE);
    return;
  }
  // Gameplay: tower placement or magic cast
  if (state === S.GAMEPLAY || state === S.WAVE_PREP || state === S.BOSS_FIGHT) {
    // Grid click?
    const col = Math.floor((px - gridOffsetX) / tileSize);
    const row = Math.floor((py - gridOffsetY) / tileSize);
    if (col >= 0 && col < CONFIG.GRID_COLS && row >= 0 && row < CONFIG.GRID_ROWS) {
      if (selectedTowerSlot >= 0) {
        placeTower(col, row, selectedTowerSlot);
        return;
      }
      if (selectedMagic >= 0) {
        const cx = gridOffsetX + col * tileSize + tileSize / 2;
        const cy = gridOffsetY + row * tileSize + tileSize / 2;
        castTimeMagic(selectedMagic, cx, cy);
        return;
      }
      // Click on existing tower
      if (grid[row] && grid[row][col] === 2) {
        const tIdx = towers.findIndex(t => t.col === col && t.row === row);
        if (tIdx >= 0) {
          // Show sell option
          sellTower(tIdx);
        }
      }
    }
  }
}

// Keyboard handlers
function onKeyDown(e) {
  keys[e.key] = true;
  if (!ACTIVE_SYSTEMS.input.includes(state)) return;
  switch (e.key) {
    case ' ':
    case 'Space':
      e.preventDefault();
      if (state === S.TITLE) { beginTransition(S.ERA_SELECT); sound.play('click'); }
      else if (state === S.GAMEPLAY || state === S.BOSS_FIGHT) {
        if (selectedMagic >= 0) castTimeMagic(selectedMagic, mouseX, mouseY);
      }
      break;
    case 'Escape':
      if (state === S.GAMEPLAY || state === S.WAVE_PREP || state === S.BOSS_FIGHT) {
        prevState = state;
        enterState(S.PAUSED);
      } else if (state === S.PAUSED) {
        enterState(prevState);
      } else if (ESCAPE_ALLOWED[state] !== undefined) {
        const target = ESCAPE_ALLOWED[state];
        if (target !== null) beginTransition(target);
      }
      break;
    case 'r': case 'R':
      if (state === S.GAMEOVER) { beginTransition(S.TITLE); }
      else if (state === S.GAMEPLAY || state === S.WAVE_PREP) { selectedTowerSlot = -1; selectedMagic = -1; }
      break;
    case 'f': case 'F':
      if (state === S.WAVE_PREP || (state === S.GAMEPLAY && !isWaveActive)) startNextWave();
      break;
    case '1': case '2': case '3': case '4': case '5': case '6': case '7':
      const idx = parseInt(e.key) - 1;
      if (TOWER_DEFS[idx].era <= currentEra) {
        selectedTowerSlot = (selectedTowerSlot === idx) ? -1 : idx;
        selectedMagic = -1;
      }
      break;
    case 'q': case 'Q': selectedMagic = (selectedMagic === 0) ? -1 : 0; selectedTowerSlot = -1; break;
    case 'w': case 'W':
      if (currentEra >= 1) { selectedMagic = (selectedMagic === 1) ? -1 : 1; selectedTowerSlot = -1; }
      break;
    case 'e': case 'E':
      if (currentEra >= 2) { selectedMagic = (selectedMagic === 2) ? -1 : 2; selectedTowerSlot = -1; }
      break;
    case 'Tab':
      e.preventDefault();
      // Toggle tower info panel
      if (state === S.GAMEPLAY || state === S.WAVE_PREP || state === S.BOSS_FIGHT) {
        showTowerInfo = !showTowerInfo;
        if (showTowerInfo && towers.length > 0) {
          // Find nearest tower to mouse
          let minD = Infinity, nearest = 0;
          for (let i = 0; i < towers.length; i++) {
            const dx = towers[i].x - mouseX, dy = towers[i].y - mouseY;
            const d = dx*dx + dy*dy;
            if (d < minD) { minD = d; nearest = i; }
          }
          towerInfoTarget = nearest;
        }
      }
      break;
  }
}

function onKeyUp(e) { keys[e.key] = false; }

// Mouse handlers
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
}

function onMouseDown(e) {
  mouseDown = true;
  sound._init();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (W / rect.width);
  const py = (e.clientY - rect.top) * (H / rect.height);
  mouseX = px; mouseY = py;
  if (e.button === 2) {
    // Right click — sell tower
    e.preventDefault();
    const col = Math.floor((px - gridOffsetX) / tileSize);
    const row = Math.floor((py - gridOffsetY) / tileSize);
    if (col >= 0 && col < CONFIG.GRID_COLS && row >= 0 && row < CONFIG.GRID_ROWS) {
      if (grid[row] && grid[row][col] === 2) {
        const tIdx = towers.findIndex(t => t.col === col && t.row === row);
        if (tIdx >= 0) sellTower(tIdx);
      }
    }
    return;
  }
  // Scroll check
  if (ACTIVE_SYSTEMS.scroll.includes(state)) {
    scroll.startDrag(py);
    return;
  }
  processClick(px, py);
}

function onMouseUp(e) {
  mouseDown = false;
  if (ACTIVE_SYSTEMS.scroll.includes(state)) {
    scroll.endDrag();
  }
}

// Touch handlers
function onTouchStart(e) {
  e.preventDefault();
  touchActive = true;
  sound._init();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const px = (touch.clientX - rect.left) * (W / rect.width);
  const py = (touch.clientY - rect.top) * (H / rect.height);
  mouseX = px; mouseY = py;
  lastTouchTime = performance.now();
  if (ACTIVE_SYSTEMS.scroll.includes(state)) {
    scroll.startDrag(py);
    return;
  }
  // Long press detection via timestamp (no setTimeout)
  longPressTimer = performance.now();
  longPressTarget = { x: px, y: py };
}

function onTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const px = (touch.clientX - rect.left) * (W / rect.width);
  const py = (touch.clientY - rect.top) * (H / rect.height);
  mouseX = px; mouseY = py;
  if (ACTIVE_SYSTEMS.scroll.includes(state)) {
    scroll.moveDrag(py);
  }
  // Long press → tower drag initiation
  if (longPressTarget && performance.now() - longPressTimer >= 300 && draggingTower === null) {
    const col = Math.floor((longPressTarget.x - gridOffsetX) / tileSize);
    const row = Math.floor((longPressTarget.y - gridOffsetY) / tileSize);
    if (col >= 0 && col < CONFIG.GRID_COLS && row >= 0 && row < CONFIG.GRID_ROWS) {
      if (grid[row] && grid[row][col] === 2) {
        const tIdx = towers.findIndex(t => t.col === col && t.row === row);
        if (tIdx >= 0) { draggingTower = tIdx; return; }
      }
    }
  }
  // Cancel long press if moved too far (and not dragging)
  if (longPressTarget && draggingTower === null && (Math.abs(px - longPressTarget.x) > 10 || Math.abs(py - longPressTarget.y) > 10)) {
    longPressTarget = null;
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  touchActive = false;
  if (ACTIVE_SYSTEMS.scroll.includes(state)) {
    if (scroll.wasTap(mouseY)) processClick(mouseX, mouseY);
    scroll.endDrag();
    return;
  }
  // Tower drag-move completion (long press)
  if (draggingTower !== null) {
    const newCol = Math.floor((mouseX - gridOffsetX) / tileSize);
    const newRow = Math.floor((mouseY - gridOffsetY) / tileSize);
    const t = towers[draggingTower];
    if (t && newCol >= 0 && newCol < CONFIG.GRID_COLS && newRow >= 0 && newRow < CONFIG.GRID_ROWS
        && grid[newRow][newCol] === 0) {
      // Move tower to new position
      grid[t.row][t.col] = 0;
      t.col = newCol; t.row = newRow;
      t.x = gridOffsetX + newCol * tileSize + tileSize / 2;
      t.y = gridOffsetY + newRow * tileSize + tileSize / 2;
      grid[newRow][newCol] = 2;
      sound.play('towerPlace');
    }
    draggingTower = null;
    longPressTarget = null;
    return;
  }
  // Long press check (300ms) — initiate drag but we ended without move = show tower info popup
  if (longPressTarget && performance.now() - longPressTimer >= 300) {
    const col = Math.floor((longPressTarget.x - gridOffsetX) / tileSize);
    const row = Math.floor((longPressTarget.y - gridOffsetY) / tileSize);
    if (col >= 0 && col < CONFIG.GRID_COLS && row >= 0 && row < CONFIG.GRID_ROWS) {
      if (grid[row] && grid[row][col] === 2) {
        const tIdx = towers.findIndex(t => t.col === col && t.row === row);
        if (tIdx >= 0) {
          // Show tower info (tap on tower = info popup with sell/upgrade)
          showTowerInfo = true;
          towerInfoTarget = tIdx;
          longPressTarget = null;
          return;
        }
      }
    }
  }
  longPressTarget = null;
  processClick(mouseX, mouseY);
}

// Context menu prevention
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Mouse wheel — cycle tower slots
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (state === S.GAMEPLAY || state === S.WAVE_PREP || state === S.BOSS_FIGHT) {
    const dir = e.deltaY > 0 ? 1 : -1;
    // Find available tower types
    const available = [];
    for (let i = 0; i < TOWER_DEFS.length; i++) {
      if (TOWER_DEFS[i].era <= currentEra) available.push(i);
    }
    if (available.length === 0) return;
    if (selectedTowerSlot < 0) {
      selectedTowerSlot = dir > 0 ? available[0] : available[available.length - 1];
    } else {
      const curIdx = available.indexOf(selectedTowerSlot);
      const nextIdx = (curIdx + dir + available.length) % available.length;
      selectedTowerSlot = available[nextIdx];
    }
    selectedMagic = -1;
  }
}, { passive: false });

// ═══════════════════════════════════════
// §L — STATE MACHINE & TRANSITIONS
// ═══════════════════════════════════════

// Enter a state directly (only for PAUSED exception)
function enterState(newState) {
  state = newState;
}

// Begin animated transition to new state
function beginTransition(targetState) {
  if (isTransitioning) return;
  isTransitioning = true;
  transTarget = targetState;
  tw.add(transObj, { a: 1 }, 300, 'easeIn', () => {
    performStateChange(transTarget);
    tw.add(transObj, { a: 0 }, 300, 'easeOut', () => {
      isTransitioning = false;
      transObj.a = 0;
    });
  });
}

// Perform the actual state change
function performStateChange(newState) {
  prevState = state;
  state = newState;
  buttons = [];
  switch (newState) {
    case S.TITLE:
      titleAnim = { alpha: 0, glitch: 0, scanline: 0, particleT: 0 };
      tw.add(titleAnim, { alpha: 1 }, 800, 'easeOut');
      break;
    case S.ERA_SELECT:
      scroll.reset();
      break;
    case S.STAGE_SELECT:
      scroll.reset();
      break;
    case S.GAMEPLAY:
      initStage();
      break;
    case S.WAVE_PREP:
      wavePrepTimer = isFirstWave ? CONFIG.INITIAL_PREP_TIME : CONFIG.WAVE_PREP_TIME;
      isFirstWave = false;
      break;
    case S.BOSS_INTRO:
      bossIntroTimer = 2000;
      sound.play('bossAppear');
      break;
    case S.RESULT:
      calculateResult();
      break;
    case S.GAMEOVER:
      saveProgress();
      shakeAmount = 10;
      break;
    case S.UPGRADE:
      scroll.reset();
      break;
    case S.CODEX:
      scroll.reset();
      break;
  }
}

// Initialize a stage
function initStage() {
  const stageInfo = STAGE_DATA[currentEra][currentStage];
  // Reset game state
  towers = [];
  enemies = [];
  timeMagicFields = [];
  bossActive = null;
  isBossPhase = false;
  isWaveActive = false;
  isWaveClearing = false;
  currentWave = 0;
  totalWaves = stageInfo.waves;
  waveEnemiesLeft = 0;
  coreHP = CONFIG.DIFF[difficulty].coreHp + (saveData ? saveData.upgrades.coreHp * 3 : 0);
  maxCoreHP = coreHP;
  gold = CONFIG.START_GOLD + (saveData ? saveData.upgrades.startGold * 50 : 0);
  score = 0;
  timeEnergy = CONFIG.ERA_MULT[currentEra].energy + (saveData ? saveData.upgrades.timeMax * 10 : 0);
  maxTimeEnergy = timeEnergy;
  comboCount = 0;
  comboTimer = 0;
  rewindCooldown = 0;
  selectedTowerSlot = -1;
  selectedMagic = -1;
  particlePool.clear();
  projectilePool.clear();
  // Build grid
  grid = [];
  for (let r = 0; r < CONFIG.GRID_ROWS; r++) {
    grid.push(new Array(CONFIG.GRID_COLS).fill(0));
  }
  // Set path
  path = stageInfo.path;
  for (const p of path) { grid[p[1]][p[0]] = 1; }
  // Set core
  if (stageInfo.core) grid[stageInfo.core[1]][stageInfo.core[0]] = 3;
  // Set spawn
  if (stageInfo.spawn) grid[stageInfo.spawn[1]][stageInfo.spawn[0]] = 4;
  // Rebuild caches
  buildGridCache();
  buildBgCache();
  // Start wave prep — first wave gets 30s, subsequent get 10s
  isFirstWave = true;
  wavePrepTimer = CONFIG.INITIAL_PREP_TIME;
}

// Start next wave
function startNextWave() {
  if (isWaveActive || isWaveClearing) return;
  if (currentWave >= totalWaves) {
    isWaveClearing = true;
    beginTransition(S.RESULT);
    return;
  }
  isWaveActive = true;
  sound.play('waveStart');
  const stageInfo = STAGE_DATA[currentEra][currentStage];
  const comp = generateWaveComposition(currentEra, currentStage, currentWave, totalWaves);
  waveEnemiesLeft = comp.enemies.length;
  // Check for boss wave
  if (comp.isBossWave && stageInfo.boss !== undefined) {
    // Spawn boss after regular enemies
    let delay = 0;
    comp.enemies.forEach((eDef, idx) => {
      const spawnDelay = idx * comp.delay;
      // Use tween timer for delayed spawn (no setTimeout)
      const timer = { t: 0 };
      tw.add(timer, { t: 1 }, spawnDelay, 'linear', () => spawnEnemy(eDef, currentEra));
    });
    const bossDelay = comp.enemies.length * comp.delay + 1000;
    const bTimer = { t: 0 };
    tw.add(bTimer, { t: 1 }, bossDelay, 'linear', () => {
      beginTransition(S.BOSS_INTRO);
    });
  } else {
    // Regular wave — stagger spawns via tweens
    comp.enemies.forEach((eDef, idx) => {
      const spawnDelay = idx * comp.delay;
      const timer = { t: 0 };
      tw.add(timer, { t: 1 }, spawnDelay, 'linear', () => spawnEnemy(eDef, currentEra));
    });
  }
  if (state === S.WAVE_PREP) enterState(S.GAMEPLAY);
}

let bossIntroTimer = 0;

// Check wave completion
function checkWaveComplete() {
  if (!isWaveActive || isWaveClearing) return;
  if (waveEnemiesLeft <= 0 && enemies.length === 0 && !bossActive) {
    isWaveActive = false;
    isWaveClearing = true;
    currentWave++;
    // Wave bonus
    addScore(coreHP * 50);
    modifyGold(Math.floor(20 * CONFIG.DIFF[difficulty].goldMult));
    if (currentWave >= totalWaves) {
      // Stage complete
      const timer = { t: 0 };
      tw.add(timer, { t: 1 }, 1000, 'linear', () => {
        isWaveClearing = false;
        beginTransition(S.RESULT);
      });
    } else {
      const timer = { t: 0 };
      tw.add(timer, { t: 1 }, 500, 'linear', () => {
        isWaveClearing = false;
        beginTransition(S.WAVE_PREP);
      });
    }
  }
}

// Check game over
function checkGameOver() {
  if (coreHP <= 0) {
    coreHP = 0;
    if (state !== S.GAMEOVER && !isTransitioning) {
      isWaveActive = false;
      beginTransition(S.GAMEOVER);
    }
  }
}

// Calculate stage result
function calculateResult() {
  const stars = coreHP >= maxCoreHP ? 3 : (coreHP >= maxCoreHP * 0.5 ? 2 : 1);
  const crystals = stars * 3 + (bossActive === null && STAGE_DATA[currentEra][currentStage].boss !== undefined ? 15 : 0);
  if (saveData) {
    const key = `${currentEra}-${currentStage}`;
    const prevStars = saveData.stageStars[key] || 0;
    saveData.stageStars[key] = Math.max(prevStars, stars);
    saveData.timeCrystals += crystals;
    saveData.totalScore += score;
    const prevBest = saveData.bestScorePerStage[key] || 0;
    saveData.bestScorePerStage[key] = Math.max(prevBest, score);
    // Era progress
    let cleared = 0;
    for (let i = 0; i < 4; i++) {
      if (saveData.stageStars[`${currentEra}-${i}`] > 0) cleared++;
    }
    saveData.eraProgress[currentEra] = Math.max(saveData.eraProgress[currentEra], cleared);
    // §10.3 — Hidden stage unlock checks
    checkHiddenStageUnlock(currentEra, stars);
    saveProgress();
  }
}

// Check if hidden stage should be unlocked (§10.3)
function checkHiddenStageUnlock(era, starsEarned) {
  if (!saveData) return;
  // Already unlocked?
  if (saveData.hiddenStagesUnlocked.includes(era)) return;
  switch (era) {
    case 0: {
      // Ancient: all 4 stages ★★★
      let all3 = true;
      for (let i = 0; i < 4; i++) {
        if ((saveData.stageStars[`0-${i}`] || 0) < 3) { all3 = false; break; }
      }
      if (all3) saveData.hiddenStagesUnlocked.push(0);
      break;
    }
    case 1: {
      // Medieval: boss defeated without rewind (tracked in gameplay)
      // Simplified: check if boss stage cleared with 3 stars
      if ((saveData.stageStars['1-3'] || 0) >= 3) saveData.hiddenStagesUnlocked.push(1);
      break;
    }
    case 2: {
      // Industrial: clear with 3 or fewer towers — checked separately
      // Tracked via stageStars completion + towers.length at clear time
      if ((saveData.stageStars['2-3'] || 0) >= 2 && saveData._lastClearTowers <= 3) {
        saveData.hiddenStagesUnlocked.push(2);
      }
      break;
    }
    case 3: {
      // Future: time thief 0-hit clear — simplified to 3-star boss clear
      if ((saveData.stageStars['3-3'] || 0) >= 3) saveData.hiddenStagesUnlocked.push(3);
      break;
    }
    case 4: {
      // End of Time: all previous hidden stages cleared
      if ([0,1,2,3].every(e => saveData.hiddenStagesUnlocked.includes(e))) {
        saveData.hiddenStagesUnlocked.push(4);
      }
      break;
    }
  }
}

// Get era score multiplier
function getEraScoreMult() { return 1 + currentEra * 0.5; }

// ═══════════════════════════════════════
// §M — MAIN LOOP, RENDERING & INIT
// ═══════════════════════════════════════

// Canvas resize
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Recalculate grid layout
  const panelH = Math.max(70, 60 * 1.2);
  const availH = H - panelH - 20;
  const availW = W - 20;
  tileSize = Math.min(availW / CONFIG.GRID_COLS, availH / CONFIG.GRID_ROWS);
  tileSize = Math.max(30, Math.min(80, tileSize));
  const gridW = CONFIG.GRID_COLS * tileSize;
  const gridH = CONFIG.GRID_ROWS * tileSize;
  gridOffsetX = (W - gridW) / 2;
  gridOffsetY = (H - panelH - gridH) / 2;
  // Rebuild caches
  buildBgCache();
  buildGridCache();
}

// Build background cache
function buildBgCache() {
  bgCache = document.createElement('canvas');
  bgCache.width = W * dpr;
  bgCache.height = H * dpr;
  const c = bgCache.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  const eraBg = ['#1a0f0a', '#0a1a0f', '#1a1410', '#0a0a1f', '#0f0020'];
  const bgCol = eraBg[currentEra] || '#0a0e1a';
  c.fillStyle = bgCol;
  c.fillRect(0, 0, W, H);
  // Layer 1: era-specific distant starfield / atmosphere
  const eraParticleColors = [
    ['#ffd740','#ff9800','#795548'], // Ancient: sand/gold
    ['#66bb6a','#2e7d32','#81c784'], // Medieval: forest green
    ['#78909c','#ff5722','#9e9e9e'], // Industrial: smoke/fire
    ['#00e5ff','#304ffe','#7c4dff'], // Future: neon
    ['#e040fb','#ce93d8','#7b1fa2']  // End of Time: purple/cosmic
  ];
  const cols1 = eraParticleColors[currentEra] || eraParticleColors[0];
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137.5 + i * i * 3.7) % W;
    const sy = (i * 97.3 + i * i * 2.3) % H;
    c.fillStyle = cols1[i % 3];
    c.globalAlpha = 0.15 + (i % 5) * 0.06;
    c.beginPath(); c.arc(sx, sy, 1 + (i % 3), 0, Math.PI * 2); c.fill();
  }
  c.globalAlpha = 1;
  // Layer 2: era-specific atmosphere overlay
  if (currentEra === 0) {
    // Ancient: subtle sand dunes
    c.fillStyle = 'rgba(255,215,64,0.04)';
    for (let x = 0; x < W; x += 60) {
      c.beginPath();
      c.moveTo(x, H); c.quadraticCurveTo(x + 30, H - 30 - (x % 90), x + 60, H);
      c.fill();
    }
  } else if (currentEra === 1) {
    // Medieval: fog wisps at bottom
    const fogGrad = c.createLinearGradient(0, H * 0.7, 0, H);
    fogGrad.addColorStop(0, 'rgba(10,26,15,0)');
    fogGrad.addColorStop(1, 'rgba(30,60,30,0.15)');
    c.fillStyle = fogGrad; c.fillRect(0, H * 0.7, W, H * 0.3);
  } else if (currentEra === 2) {
    // Industrial: gear shapes
    c.strokeStyle = 'rgba(120,144,156,0.08)'; c.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const gx = (i * 231 + 100) % W, gy = (i * 167 + 50) % H, gr = 30 + i * 10;
      c.beginPath(); c.arc(gx, gy, gr, 0, Math.PI * 2); c.stroke();
    }
  } else if (currentEra === 3) {
    // Future: grid lines
    c.strokeStyle = 'rgba(0,229,255,0.04)'; c.lineWidth = 1;
    for (let x = 0; x < W; x += 40) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke(); }
    for (let y = 0; y < H; y += 40) { c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke(); }
  } else if (currentEra === 4) {
    // End of Time: vortex center glow
    const vGrad = c.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.4);
    vGrad.addColorStop(0, 'rgba(224,64,251,0.08)');
    vGrad.addColorStop(1, 'rgba(15,0,32,0)');
    c.fillStyle = vGrad; c.fillRect(0, 0, W, H);
  }
}

// Build grid cache
function buildGridCache() {
  if (!grid || grid.length === 0) return;
  gridCache = document.createElement('canvas');
  gridCache.width = W * dpr;
  gridCache.height = H * dpr;
  const c = gridCache.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Grid lines
  c.strokeStyle = '#1a2744';
  c.lineWidth = 1;
  for (let col = 0; col <= CONFIG.GRID_COLS; col++) {
    c.beginPath();
    c.moveTo(gridOffsetX + col * tileSize, gridOffsetY);
    c.lineTo(gridOffsetX + col * tileSize, gridOffsetY + CONFIG.GRID_ROWS * tileSize);
    c.stroke();
  }
  for (let row = 0; row <= CONFIG.GRID_ROWS; row++) {
    c.beginPath();
    c.moveTo(gridOffsetX, gridOffsetY + row * tileSize);
    c.lineTo(gridOffsetX + CONFIG.GRID_COLS * tileSize, gridOffsetY + row * tileSize);
    c.stroke();
  }
  // Path highlighting
  for (const p of path) {
    c.fillStyle = 'rgba(26, 39, 68, 0.5)';
    c.fillRect(gridOffsetX + p[0] * tileSize, gridOffsetY + p[1] * tileSize, tileSize, tileSize);
  }
  // Core
  const stageInfo = STAGE_DATA[currentEra] && STAGE_DATA[currentEra][currentStage];
  if (stageInfo && stageInfo.core) {
    const cx = gridOffsetX + stageInfo.core[0] * tileSize + tileSize / 2;
    const cy = gridOffsetY + stageInfo.core[1] * tileSize + tileSize / 2;
    c.fillStyle = '#00e5ff';
    c.globalAlpha = 0.3;
    c.beginPath(); c.arc(cx, cy, tileSize * 0.4, 0, Math.PI * 2); c.fill();
    c.globalAlpha = 1;
    c.strokeStyle = '#00e5ff'; c.lineWidth = 2;
    c.beginPath(); c.arc(cx, cy, tileSize * 0.35, 0, Math.PI * 2); c.stroke();
  }
  // Spawn point
  if (stageInfo && stageInfo.spawn) {
    const sx = gridOffsetX + stageInfo.spawn[0] * tileSize + tileSize / 2;
    const sy = gridOffsetY + stageInfo.spawn[1] * tileSize + tileSize / 2;
    c.fillStyle = '#ef5350';
    c.globalAlpha = 0.3;
    c.beginPath(); c.arc(sx, sy, tileSize * 0.3, 0, Math.PI * 2); c.fill();
    c.globalAlpha = 1;
  }
}

// Single value modification functions (F16)
function modifyCoreHP(delta) { coreHP = Math.max(0, Math.min(maxCoreHP, coreHP + delta)); }
function modifyTimeEnergy(delta) { timeEnergy = Math.max(0, Math.min(maxTimeEnergy, timeEnergy + delta)); }
function modifyGold(delta) { gold = Math.max(0, gold + delta); }
function addScore(points) { score += points; }

// Save/Load
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      saveData = JSON.parse(raw);
    } else {
      saveData = createDefaultSave();
    }
  } catch (e) {
    saveData = createDefaultSave();
  }
}

function createDefaultSave() {
  return {
    version: 1, lang: LANG, difficulty: 'medium',
    eraProgress: [0, 0, 0, 0, 0], stageStars: {},
    upgrades: {
      timeMax:0, timeRegen:0, slowEff:0, hasteEff:0, rewindCd:0,
      towerDmg:0, towerRange:0, towerCost:0, sellRefund:0, towerLv3:[],
      coreHp:0, coreRegen:0, goldBonus:0, startGold:0
    },
    timeCrystals: 0, totalScore: 0, codexUnlocked: [],
    hiddenStagesUnlocked: [], playCount: 0,
    bestScorePerStage: {}, tutorialComplete: false
  };
}

function saveProgress() {
  if (!saveData) return;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); } catch (e) {}
}
