// Title screen rendering
function renderTitle() {
  // Background
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);
  // Animated background particles
  titleAnim.particleT += 0.016;
  for (let i = 0; i < 30; i++) {
    const x = (i * 137 + titleAnim.particleT * 20 * (i % 3 + 1)) % W;
    const y = (i * 97 + titleAnim.particleT * 10) % H;
    ctx.fillStyle = i % 3 === 0 ? '#00e5ff' : (i % 3 === 1 ? '#ab47bc' : '#4fc3f7');
    ctx.globalAlpha = 0.2 + Math.sin(titleAnim.particleT + i) * 0.15;
    ctx.beginPath(); ctx.arc(x, y, 1.5 + Math.sin(titleAnim.particleT * 2 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Chronomancer silhouette — hooded figure with staff + clock motif
  const charY = H * 0.35;
  const cScale = Math.min(1.2, W / 500);
  ctx.save(); ctx.translate(W/2, charY);
  // Cloak body
  ctx.fillStyle = '#1a2744';
  ctx.beginPath();
  ctx.moveTo(0, -35 * cScale); ctx.lineTo(-28 * cScale, 30 * cScale);
  ctx.quadraticCurveTo(-30 * cScale, 38 * cScale, -22 * cScale, 38 * cScale);
  ctx.lineTo(22 * cScale, 38 * cScale);
  ctx.quadraticCurveTo(30 * cScale, 38 * cScale, 28 * cScale, 30 * cScale);
  ctx.closePath(); ctx.fill();
  // Hood
  ctx.fillStyle = '#0f1a2e';
  ctx.beginPath();
  ctx.arc(0, -30 * cScale, 18 * cScale, 0, Math.PI * 2); ctx.fill();
  // Hood opening
  ctx.fillStyle = '#0a0e1a';
  ctx.beginPath();
  ctx.arc(0, -28 * cScale, 12 * cScale, 0, Math.PI); ctx.fill();
  // Eyes (glowing cyan)
  ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#00e5ff';
  ctx.beginPath(); ctx.arc(-5 * cScale, -30 * cScale, 2.5 * cScale, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5 * cScale, -30 * cScale, 2.5 * cScale, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Staff (right side)
  ctx.strokeStyle = '#78909c'; ctx.lineWidth = 3 * cScale;
  ctx.beginPath(); ctx.moveTo(22 * cScale, -20 * cScale); ctx.lineTo(26 * cScale, 38 * cScale); ctx.stroke();
  // Staff top — clock orb
  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2 * cScale;
  ctx.beginPath(); ctx.arc(21 * cScale, -24 * cScale, 8 * cScale, 0, Math.PI * 2); ctx.stroke();
  // Clock hands
  const handAngle = performance.now() / 1000;
  ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 1.5 * cScale;
  ctx.beginPath(); ctx.moveTo(21 * cScale, -24 * cScale);
  ctx.lineTo(21 * cScale + Math.cos(handAngle) * 5 * cScale, -24 * cScale + Math.sin(handAngle) * 5 * cScale);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(21 * cScale, -24 * cScale);
  ctx.lineTo(21 * cScale + Math.cos(handAngle * 0.2) * 4 * cScale, -24 * cScale + Math.sin(handAngle * 0.2) * 4 * cScale);
  ctx.stroke();
  // Glow around orb
  ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(0,229,255,0.15)';
  ctx.beginPath(); ctx.arc(21 * cScale, -24 * cScale, 10 * cScale, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Title text with glitch/scanline effect
  const titleSize = Math.min(48, W * 0.08);
  ctx.font = `bold ${titleSize}px 'Courier New','Consolas',monospace`;
  ctx.textAlign = 'center';
  // Scanline effect
  const scanOffset = Math.sin(performance.now() / 1000) * 2;
  ctx.fillStyle = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 15;
  ctx.fillText(t('title'), W/2 + scanOffset, H * 0.58);
  ctx.shadowBlur = 0;
  // Glitch line
  if (Math.random() < 0.05) {
    ctx.fillStyle = '#ff0040';
    ctx.fillText(t('title'), W/2 + (Math.random()-0.5)*6, H * 0.58 + (Math.random()-0.5)*3);
  }
  // Subtitle
  ctx.fillStyle = '#8080a0';
  ctx.font = `${Math.min(20, W*0.035)}px 'Courier New',monospace`;
  ctx.fillText(t('subtitle'), W/2, H * 0.64);
  // Menu buttons
  const btnW = Math.min(240, W * 0.5);
  const btnH = touchSafe(btnW, 48).h;
  // Lower-bound menuY so all 3 buttons + prompt fit within viewport (P3-ADV fix)
  const menuY = Math.min(H * 0.72, H - (3 * (btnH + 12) + 40));
  const menuItems = [
    { label: t('start'), action: () => beginTransition(S.ERA_SELECT) },
    { label: t('upgrade'), action: () => beginTransition(S.UPGRADE) },
    { label: t('codex'), action: () => beginTransition(S.CODEX) }
  ];
  menuItems.forEach((item, i) => {
    const bx = W/2 - btnW/2;
    const by = menuY + i * (btnH + 12);
    const hover = mouseX >= bx && mouseX <= bx+btnW && mouseY >= by && mouseY <= by+btnH;
    ctx.fillStyle = hover ? '#1a2744' : '#12121e';
    ctx.fillRect(bx, by, btnW, btnH);
    ctx.strokeStyle = hover ? '#00e5ff' : '#1e1e30';
    ctx.lineWidth = hover ? 2 : 1;
    ctx.strokeRect(bx, by, btnW, btnH);
    ctx.fillStyle = '#e0e0e0';
    ctx.font = `bold ${Math.min(16, W*0.03)}px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(item.label, W/2, by + btnH/2 + 5);
    buttons.push({ id: `menu_${i}`, x: bx, y: by, w: btnW, h: btnH, action: item.action });
  });
  // Prompt — positioned below the last menu button with margin
  const promptY = menuY + menuItems.length * (btnH + 12) + 20;
  ctx.fillStyle = '#505070';
  ctx.font = `${Math.min(14, W*0.025)}px 'Courier New',monospace`;
  ctx.fillText(t('tapToStart'), W/2, Math.min(promptY, H * 0.95));
  // High score
  if (saveData && saveData.totalScore > 0) {
    ctx.fillStyle = '#ffd740';
    ctx.fillText(`${t('best')}: ${saveData.totalScore}`, W/2, H * 0.68);
  }
}

// Era selection screen
function renderEraSelect() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold ${Math.min(28, W*0.05)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(LANG === 'ko' ? '시대 선택' : 'Select Era', W/2, 50);
  const eraBg = ['#3e2723','#1b5e20','#4e342e','#1a237e','#4a148c'];
  const eraColors = ['#ffd740','#66bb6a','#78909c','#00e5ff','#e040fb'];
  const cardW = Math.min(180, (W - 60) / 3);
  const cardH = cardW * 1.2;
  const gap = 12;
  const cols = Math.min(5, Math.floor((W - 20) / (cardW + gap)));
  const startX = (W - cols * (cardW + gap) + gap) / 2;
  for (let i = 0; i < 5; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = startX + col * (cardW + gap);
    const cy = 80 + row * (cardH + gap);
    const unlocked = i === 0 || (saveData && saveData.eraProgress[i - 1] >= 4);
    const hover = mouseX >= cx && mouseX <= cx+cardW && mouseY >= cy && mouseY <= cy+cardH;
    ctx.fillStyle = unlocked ? (hover ? eraBg[i] : '#12121e') : '#0a0a0f';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = unlocked ? eraColors[i] : '#1e1e30';
    ctx.lineWidth = hover ? 2 : 1;
    ctx.strokeRect(cx, cy, cardW, cardH);
    ctx.fillStyle = unlocked ? eraColors[i] : '#505070';
    ctx.font = `bold ${Math.min(14, cardW*0.09)}px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(t('era_names')[i], cx + cardW/2, cy + cardH * 0.4);
    if (!unlocked) {
      ctx.fillText('🔒', cx + cardW/2, cy + cardH * 0.65);
    } else {
      // Stars
      const cleared = saveData ? saveData.eraProgress[i] : 0;
      ctx.fillStyle = '#ffd740';
      ctx.font = `12px 'Courier New',monospace`;
      ctx.fillText(`${cleared}/4 ${t('clear')}`, cx + cardW/2, cy + cardH * 0.65);
    }
    if (unlocked) {
      buttons.push({ id: `era_${i}`, x: cx, y: cy, w: cardW, h: cardH, action: () => {
        currentEra = i; beginTransition(S.STAGE_SELECT);
      }});
    }
  }
  // Back hint
  ctx.fillStyle = '#505070';
  ctx.font = `12px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ESC: ' + (LANG === 'ko' ? '뒤로' : 'Back'), W/2, H - 20);
}

// Stage selection screen
function renderStageSelect() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold ${Math.min(24, W*0.04)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${t('era_names')[currentEra]} — ${t('stage')}`, W/2, 45);
  const stages = STAGE_DATA[currentEra];
  const cardW = Math.min(200, (W - 40) / 3);
  const cardH = 80;
  const gap = 12;
  const startX = (W - Math.min(stages.length, 3) * (cardW + gap) + gap) / 2;
  for (let i = 0; i < stages.length; i++) {
    const s = stages[i];
    const col = i % 3;
    const row = Math.floor(i / 3);
    const cx = startX + col * (cardW + gap);
    const cy = 70 + row * (cardH + gap);
    const unlocked = !s.hidden && (i === 0 || (saveData && saveData.stageStars[`${currentEra}-${i-1}`] > 0));
    const hover = mouseX >= cx && mouseX <= cx+cardW && mouseY >= cy && mouseY <= cy+cardH;
    ctx.fillStyle = hover && unlocked ? '#1a2744' : '#12121e';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = unlocked ? (s.boss !== undefined ? '#ef5350' : '#4dd0e1') : '#1e1e30';
    ctx.lineWidth = hover ? 2 : 1;
    ctx.strokeRect(cx, cy, cardW, cardH);
    ctx.fillStyle = unlocked ? '#e0e0e0' : '#505070';
    ctx.font = `bold ${Math.min(13, cardW*0.08)}px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(LANG === 'ko' ? s.name : s.nameEn, cx + cardW/2, cy + 25);
    if (s.boss !== undefined && unlocked) {
      ctx.fillStyle = '#ef5350'; ctx.fillText(`⚔ ${t('boss')}`, cx + cardW/2, cy + 45);
    }
    // Stars
    if (saveData && saveData.stageStars[`${currentEra}-${i}`]) {
      const stars = saveData.stageStars[`${currentEra}-${i}`];
      ctx.fillStyle = '#ffd740';
      ctx.fillText('★'.repeat(stars) + '☆'.repeat(3 - stars), cx + cardW/2, cy + cardH - 12);
    } else if (!unlocked) {
      ctx.fillText('🔒', cx + cardW/2, cy + 50);
    }
    if (unlocked) {
      buttons.push({ id: `stage_${i}`, x: cx, y: cy, w: cardW, h: cardH, action: () => {
        currentStage = i; beginTransition(S.GAMEPLAY);
      }});
    }
  }
  // Difficulty selector
  const diffY = H - 80;
  const diffs = ['easy', 'medium', 'hard'];
  const diffW = Math.min(100, (W - 40) / 3);
  const diffStartX = (W - 3 * (diffW + 8) + 8) / 2;
  ctx.fillStyle = '#8080a0'; ctx.font = `12px 'Courier New',monospace`;
  ctx.fillText(LANG === 'ko' ? '난이도:' : 'Difficulty:', W/2, diffY - 10);
  diffs.forEach((d, i) => {
    const dx = diffStartX + i * (diffW + 8);
    const selected = difficulty === d;
    ctx.fillStyle = selected ? '#1a2744' : '#12121e';
    ctx.fillRect(dx, diffY, diffW, 32);
    ctx.strokeStyle = selected ? '#00e5ff' : '#1e1e30';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(dx, diffY, diffW, 32);
    ctx.fillStyle = selected ? '#e0e0e0' : '#8080a0';
    ctx.font = `bold 11px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(t('difficulty')[i], dx + diffW/2, diffY + 20);
    buttons.push({ id: `diff_${d}`, x: dx, y: diffY, w: diffW, h: 32, action: () => {
      difficulty = d;
      if (saveData) saveData.difficulty = d;
    }});
  });
  ctx.fillStyle = '#505070'; ctx.font = `12px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ESC: ' + (LANG === 'ko' ? '뒤로' : 'Back'), W/2, H - 15);
}

// Gameplay rendering
function renderGameplay() {
  // Background cache
  if (bgCache) ctx.drawImage(bgCache, 0, 0, W * dpr, H * dpr, 0, 0, W, H);
  else { ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H); }
  // Grid cache
  if (gridCache) ctx.drawImage(gridCache, 0, 0, W * dpr, H * dpr, 0, 0, W, H);
  // Tower placement preview
  if (selectedTowerSlot >= 0) {
    const col = Math.floor((mouseX - gridOffsetX) / tileSize);
    const row = Math.floor((mouseY - gridOffsetY) / tileSize);
    if (col >= 0 && col < CONFIG.GRID_COLS && row >= 0 && row < CONFIG.GRID_ROWS) {
      const valid = grid[row][col] === 0;
      ctx.fillStyle = valid ? 'rgba(0,229,255,0.15)' : 'rgba(239,68,80,0.15)';
      ctx.fillRect(gridOffsetX + col * tileSize, gridOffsetY + row * tileSize, tileSize, tileSize);
      // Range preview
      if (valid) {
        const def = TOWER_DEFS[selectedTowerSlot];
        const cx = gridOffsetX + col * tileSize + tileSize/2;
        const cy = gridOffsetY + row * tileSize + tileSize/2;
        ctx.strokeStyle = 'rgba(0,229,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, def.range * tileSize, 0, Math.PI * 2); ctx.stroke();
      }
    }
  }
  // Time magic fields
  for (const f of timeMagicFields) {
    drawTimeMagicField(ctx, f.x, f.y, f.radius, f.type, f.alpha);
  }
  // Towers
  for (const t of towers) {
    drawTower(ctx, t.x, t.y, tileSize, t.type, t.level, false);
  }
  // Path direction arrows (subtle)
  ctx.fillStyle = 'rgba(0,229,255,0.15)';
  for (let i = 0; i < path.length - 1; i++) {
    const p1 = path[i], p2 = path[i + 1];
    const cx = gridOffsetX + (p1[0] + p2[0]) / 2 * tileSize + tileSize / 2;
    const cy = gridOffsetY + (p1[1] + p2[1]) / 2 * tileSize + tileSize / 2;
    const angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-4, -4); ctx.lineTo(-4, 4); ctx.closePath();
    ctx.fill(); ctx.restore();
  }
  // Enemies
  for (const e of enemies) {
    drawEnemy(ctx, e.x, e.y, tileSize, e.type, e.hp, e.maxHp, e.effects);
  }
  // Boss
  if (bossActive) {
    drawBoss(ctx, bossActive.x, bossActive.y, tileSize * 1.5, bossActive.type, bossActive.phase,
      bossActive.hp, bossActive.maxHp, bossActive.animT || 0);
  }
  // Projectiles
  projectilePool.forEach(p => {
    drawProjectile(ctx, p.x, p.y, 8, p.type, p.angle);
  });
  // Particles
  particlePool.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    if (p.type === 'hit') {
      const progress = 1 - p.life / p.maxLife;
      drawHitEffect(ctx, p.x, p.y, p.r * 2, progress);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
  // Tower drag visual
  if (draggingTower !== null && towers[draggingTower]) {
    const dt2 = towers[draggingTower];
    ctx.globalAlpha = 0.5;
    drawTower(ctx, mouseX, mouseY, tileSize, dt2.type, dt2.level, true);
    ctx.globalAlpha = 1;
    // Highlight drop cell
    const dc = Math.floor((mouseX - gridOffsetX) / tileSize);
    const dr = Math.floor((mouseY - gridOffsetY) / tileSize);
    if (dc >= 0 && dc < CONFIG.GRID_COLS && dr >= 0 && dr < CONFIG.GRID_ROWS) {
      const valid = grid[dr][dc] === 0;
      ctx.fillStyle = valid ? 'rgba(0,229,255,0.2)' : 'rgba(239,68,80,0.2)';
      ctx.fillRect(gridOffsetX + dc * tileSize, gridOffsetY + dr * tileSize, tileSize, tileSize);
    }
  }
  // HUD
  drawHUD();
  // Tower panel
  drawTowerPanel();
  // Tower info panel (Tab toggle)
  if (showTowerInfo && towerInfoTarget >= 0 && towerInfoTarget < towers.length) {
    drawTowerInfoPanel();
  }
  // Wave prep overlay
  if (state === S.WAVE_PREP) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const barH = 40;
    const barY = gridOffsetY - barH - 5;
    ctx.fillRect(gridOffsetX, barY, CONFIG.GRID_COLS * tileSize, barH);
    ctx.fillStyle = '#e0e0e0';
    ctx.font = `bold ${Math.min(16, tileSize*0.3)}px 'Courier New',monospace`;
    ctx.textAlign = 'center';
    const timeLeft = Math.max(0, wavePrepTimer / 1000).toFixed(1);
    ctx.fillText(`${LANG === 'ko' ? '배치 시간' : 'Prep Time'}: ${timeLeft}s — ${t('nextWave')} ${currentWave + 1}/${totalWaves}`, gridOffsetX + CONFIG.GRID_COLS * tileSize / 2, barY + barH/2 + 5);
  }
}

// Boss intro rendering
function renderBossIntro() {
  renderGameplay(); // Keep game visible
  // Dark overlay
  const progress = 1 - Math.max(0, bossIntroTimer) / 2000;
  ctx.fillStyle = `rgba(0,0,0,${0.7 * Math.min(1, progress * 2)})`;
  ctx.fillRect(0, 0, W, H);
  // Boss silhouette
  const stageInfo = STAGE_DATA[currentEra][currentStage];
  if (stageInfo.boss !== undefined) {
    const bDef = BOSS_DEFS[stageInfo.boss];
    const bossScale = 0.3 + progress * 0.7;
    const bossY = H * 0.6 - progress * H * 0.15;
    ctx.save();
    ctx.translate(W/2, bossY);
    ctx.scale(bossScale, bossScale);
    drawBoss(ctx, 0, 0, tileSize * 2, stageInfo.boss, 0, bDef.hp, bDef.hp, performance.now() / 1000);
    ctx.restore();
    // Boss name
    if (progress > 0.4) {
      ctx.fillStyle = bDef.color;
      ctx.shadowColor = bDef.color;
      ctx.shadowBlur = 10;
      ctx.font = `bold ${Math.min(32, W*0.06)}px 'Courier New',monospace`;
      ctx.textAlign = 'center';
      // Glitch text
      const glitchX = Math.random() < 0.1 ? (Math.random() - 0.5) * 4 : 0;
      ctx.fillText(LANG === 'ko' ? bDef.nameKo : bDef.nameEn, W/2 + glitchX, H * 0.35);
      ctx.shadowBlur = 0;
    }
  }
  // Time warp visual (sin wave)
  ctx.strokeStyle = 'rgba(206,147,216,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x < W; x += 4) {
    const y = H/2 + Math.sin(x * 0.02 + performance.now() / 300) * 20 * progress;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// Result screen rendering
function renderResult() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  const won = coreHP > 0;
  ctx.fillStyle = won ? '#00e5ff' : '#ef5350';
  ctx.shadowColor = won ? '#00e5ff' : '#ef5350';
  ctx.shadowBlur = 15;
  ctx.font = `bold ${Math.min(40, W*0.07)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(won ? t('victory') : t('defeat'), W/2, H * 0.2);
  ctx.shadowBlur = 0;
  // Stars — canvas drawn
  const stars = coreHP >= maxCoreHP ? 3 : (coreHP >= maxCoreHP * 0.5 ? 2 : (coreHP > 0 ? 1 : 0));
  const starS = Math.min(36, W * 0.06);
  for (let i = 0; i < 3; i++) {
    const sx = W/2 - 60 + i * 60;
    const sy = H * 0.28;
    ctx.fillStyle = i < stars ? '#ffd740' : '#1e1e30';
    if (i < stars) { ctx.shadowColor = '#ffd740'; ctx.shadowBlur = 8; }
    drawStarShape(ctx, sx, sy, starS * 0.5, starS * 0.25, 5);
    ctx.shadowBlur = 0;
  }
  // Stats
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `${Math.min(18, W*0.03)}px 'Courier New',monospace`;
  const statsY = H * 0.4;
  ctx.fillText(`${t('score')}: ${score}`, W/2, statsY);
  ctx.fillText(`${t('coreHp')}: ${coreHP}/${maxCoreHP}`, W/2, statsY + 30);
  ctx.fillText(`${t('wave')}: ${currentWave}/${totalWaves}`, W/2, statsY + 60);
  // Best score
  if (saveData) {
    const key = `${currentEra}-${currentStage}`;
    const best = saveData.bestScorePerStage[key] || 0;
    if (score >= best && score > 0) {
      ctx.fillStyle = '#ffd740';
      ctx.font = `bold ${Math.min(20, W*0.035)}px 'Courier New',monospace`;
      ctx.fillText(t('newRecord'), W/2, statsY + 100);
    }
  }
  // Buttons
  const btnW = Math.min(200, W * 0.4);
  const btnH = touchSafe(btnW, 48).h;
  const btnY = H * 0.7;
  // Continue
  const bx1 = W/2 - btnW/2;
  ctx.fillStyle = '#12121e'; ctx.fillRect(bx1, btnY, btnW, btnH);
  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1; ctx.strokeRect(bx1, btnY, btnW, btnH);
  ctx.fillStyle = '#e0e0e0'; ctx.font = `bold 14px 'Courier New',monospace`; ctx.textAlign = 'center';
  ctx.fillText(LANG === 'ko' ? '계속' : 'Continue', W/2, btnY + btnH/2 + 5);
  buttons.push({ id: 'resultContinue', x: bx1, y: btnY, w: btnW, h: btnH, action: () => beginTransition(S.STAGE_SELECT) });
  // Retry
  const bx2 = W/2 - btnW/2;
  const by2 = btnY + btnH + 12;
  ctx.fillStyle = '#12121e'; ctx.fillRect(bx2, by2, btnW, btnH);
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 1; ctx.strokeRect(bx2, by2, btnW, btnH);
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText(t('retry'), W/2, by2 + btnH/2 + 5);
  buttons.push({ id: 'resultRetry', x: bx2, y: by2, w: btnW, h: btnH, action: () => beginTransition(S.GAMEPLAY) });
}

// Game over rendering
function renderGameover() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  // Screen shake offset
  const shX = (Math.random() - 0.5) * shakeAmount * 2;
  const shY = (Math.random() - 0.5) * shakeAmount * 2;
  ctx.save(); ctx.translate(shX, shY);
  ctx.fillStyle = '#ef5350';
  ctx.shadowColor = '#ef5350'; ctx.shadowBlur = 20;
  ctx.font = `bold ${Math.min(48, W*0.08)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(t('defeat'), W/2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `${Math.min(18, W*0.03)}px 'Courier New',monospace`;
  ctx.fillText(`${t('score')}: ${score}`, W/2, H * 0.45);
  if (saveData) {
    ctx.fillStyle = '#ffd740';
    ctx.fillText(`${t('timeCrystal')}: +${Math.max(1, Math.floor(currentWave * 0.5 + 1))}`, W/2, H * 0.5);
  }
  ctx.fillStyle = '#505070';
  ctx.font = `${Math.min(14, W*0.025)}px 'Courier New',monospace`;
  ctx.fillText(t('tapToRestart'), W/2, H * 0.7);
  ctx.restore();
  // Restart button
  const btnW = Math.min(200, W*0.4);
  const btnH = touchSafe(btnW, 48).h;
  const bx = W/2 - btnW/2;
  const by = H * 0.75;
  ctx.fillStyle = '#12121e'; ctx.fillRect(bx, by, btnW, btnH);
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, btnW, btnH);
  ctx.fillStyle = '#e0e0e0'; ctx.font = `bold 14px 'Courier New',monospace`; ctx.textAlign = 'center';
  ctx.fillText(LANG === 'ko' ? '타이틀로' : 'To Title', W/2, by + btnH/2 + 5);
  buttons.push({ id: 'goTitle', x: bx, y: by, w: btnW, h: btnH, action: () => beginTransition(S.TITLE) });
}

// Paused overlay
function renderPaused() {
  // Render underlying state first
  if (prevState === S.GAMEPLAY || prevState === S.WAVE_PREP || prevState === S.BOSS_FIGHT) renderGameplay();
  // Overlay
  ctx.fillStyle = 'rgba(10,14,26,0.8)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold ${Math.min(36, W*0.06)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(t('paused'), W/2, H * 0.3);
  const btnW = Math.min(200, W*0.4);
  const btnH = touchSafe(btnW, 48).h;
  // Resume
  let by = H * 0.45;
  ctx.fillStyle = '#12121e'; ctx.fillRect(W/2-btnW/2, by, btnW, btnH);
  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1; ctx.strokeRect(W/2-btnW/2, by, btnW, btnH);
  ctx.fillStyle = '#e0e0e0'; ctx.font = `bold 14px 'Courier New',monospace`;
  ctx.fillText(t('resume'), W/2, by + btnH/2 + 5);
  buttons.push({ id:'resume', x:W/2-btnW/2, y:by, w:btnW, h:btnH, action: () => enterState(prevState) });
  // Quit
  by += btnH + 12;
  ctx.fillStyle = '#12121e'; ctx.fillRect(W/2-btnW/2, by, btnW, btnH);
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 1; ctx.strokeRect(W/2-btnW/2, by, btnW, btnH);
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText(t('quit'), W/2, by + btnH/2 + 5);
  buttons.push({ id:'quit', x:W/2-btnW/2, y:by, w:btnW, h:btnH, action: () => beginTransition(S.TITLE) });
}

// Upgrade screen
function renderUpgrade() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold ${Math.min(24, W*0.04)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(t('upgrade'), W/2, 40);
  // Time crystals — canvas drawn gem icon
  ctx.fillStyle = '#4dd0e1';
  ctx.save(); ctx.translate(W/2 - 58, 62);
  ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(6, -2); ctx.lineTo(4, 8);
  ctx.lineTo(-4, 8); ctx.lineTo(-6, -2); ctx.closePath(); ctx.fill();
  ctx.shadowColor = '#4dd0e1'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
  ctx.restore();
  ctx.fillStyle = '#4dd0e1';
  ctx.font = `bold 16px 'Courier New',monospace`;
  ctx.fillText(`${t('timeCrystal')}: ${saveData ? saveData.timeCrystals : 0}`, W/2, 66);
  // Upgrade categories
  const categories = [
    { name: t('upgCategory')[0], items: [
      { key:'timeMax', nameKo:'에너지 최대 +10', nameEn:'Max Energy +10', maxLv:5, cost:[5,10,20,35,50] },
      { key:'timeRegen', nameKo:'회복속도 +0.5/s', nameEn:'Regen +0.5/s', maxLv:5, cost:[5,10,20,35,50] },
      { key:'slowEff', nameKo:'감속 효율 +10%', nameEn:'Slow +10%', maxLv:3, cost:[10,20,35] },
      { key:'hasteEff', nameKo:'가속 효율 +10%', nameEn:'Haste +10%', maxLv:3, cost:[10,20,35] },
      { key:'rewindCd', nameKo:'역전 쿨다운 -2s', nameEn:'Rewind CD -2s', maxLv:3, cost:[15,25,40] }
    ]},
    { name: t('upgCategory')[1], items: [
      { key:'towerDmg', nameKo:'공격력 +5%', nameEn:'Damage +5%', maxLv:5, cost:[5,10,20,35,50] },
      { key:'towerRange', nameKo:'사거리 +5%', nameEn:'Range +5%', maxLv:5, cost:[5,10,20,35,50] },
      { key:'towerCost', nameKo:'타워 비용 -5%', nameEn:'Tower Cost -5%', maxLv:5, cost:[5,10,20,35,50] }
    ]},
    { name: t('upgCategory')[2], items: [
      { key:'coreHp', nameKo:'코어 HP +3', nameEn:'Core HP +3', maxLv:5, cost:[5,10,20,35,50] },
      { key:'goldBonus', nameKo:'골드 보너스 +10%', nameEn:'Gold +10%', maxLv:5, cost:[5,10,20,35,50] },
      { key:'startGold', nameKo:'시작 골드 +50', nameEn:'Start Gold +50', maxLv:5, cost:[5,10,20,35,50] }
    ]}
  ];
  const itemH = 44;
  let yPos = 90 - scroll.scrollY;
  let totalContentH = 0;
  categories.forEach(cat => {
    ctx.fillStyle = '#4dd0e1';
    ctx.font = `bold 14px 'Courier New',monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(cat.name, 20, yPos + 14);
    yPos += 28;
    totalContentH += 28;
    cat.items.forEach(item => {
      const currentLv = saveData ? (saveData.upgrades[item.key] || 0) : 0;
      const maxed = currentLv >= item.maxLv;
      const cost = maxed ? 0 : item.cost[currentLv];
      const canAfford = saveData && saveData.timeCrystals >= cost;
      const rowW = Math.min(W - 40, 400);
      const rx = (W - rowW) / 2;
      const hover = mouseX >= rx && mouseX <= rx+rowW && mouseY >= yPos && mouseY <= yPos+itemH;
      ctx.fillStyle = hover && !maxed ? '#1a2744' : '#12121e';
      ctx.fillRect(rx, yPos, rowW, itemH - 4);
      ctx.strokeStyle = maxed ? '#66bb6a' : (canAfford ? '#4dd0e1' : '#1e1e30');
      ctx.lineWidth = 1;
      ctx.strokeRect(rx, yPos, rowW, itemH - 4);
      ctx.fillStyle = '#e0e0e0';
      ctx.font = `12px 'Courier New',monospace`;
      ctx.textAlign = 'left';
      ctx.fillText(LANG === 'ko' ? item.nameKo : item.nameEn, rx + 8, yPos + 18);
      // Level dots
      ctx.fillStyle = '#ffd740';
      for (let l = 0; l < item.maxLv; l++) {
        ctx.fillStyle = l < currentLv ? '#ffd740' : '#1e1e30';
        ctx.beginPath(); ctx.arc(rx + 8 + l * 14, yPos + 32, 4, 0, Math.PI*2); ctx.fill();
      }
      // Cost
      if (!maxed) {
        ctx.fillStyle = canAfford ? '#4dd0e1' : '#ef5350';
        ctx.textAlign = 'right';
        ctx.fillText(`${cost} 💎`, rx + rowW - 8, yPos + 25);
      } else {
        ctx.fillStyle = '#66bb6a';
        ctx.textAlign = 'right';
        ctx.fillText('MAX', rx + rowW - 8, yPos + 25);
      }
      if (!maxed && canAfford) {
        buttons.push({ id: `upg_${item.key}`, x: rx, y: yPos, w: rowW, h: itemH - 4, action: () => {
          const cLv = saveData.upgrades[item.key] || 0;
          if (cLv < item.maxLv) {
            const c = item.cost[cLv];
            if (saveData.timeCrystals >= c) {
              saveData.timeCrystals -= c;
              saveData.upgrades[item.key] = cLv + 1;
              saveProgress();
              sound.play('upgrade');
            }
          }
        }});
      }
      yPos += itemH;
      totalContentH += itemH;
    });
    yPos += 10;
    totalContentH += 10;
  });
  scroll.maxScroll = Math.max(0, totalContentH - H + 100);
  ctx.fillStyle = '#505070'; ctx.font = `12px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ESC: ' + (LANG === 'ko' ? '뒤로' : 'Back'), W/2, H - 15);
}

// Codex screen (simple list)
function renderCodex() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold ${Math.min(24, W*0.04)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(t('codex'), W/2, 40);
  let yPos = 70 - scroll.scrollY;
  // Towers
  ctx.fillStyle = '#4dd0e1';
  ctx.font = `bold 14px 'Courier New',monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(LANG === 'ko' ? '타워' : 'Towers', 20, yPos); yPos += 24;
  TOWER_DEFS.forEach((def, i) => {
    const unlocked = def.era <= (saveData ? Math.max(...saveData.eraProgress.map((p,idx) => p > 0 ? idx : -1)) : 0);
    const rx = 30;

    ctx.font = `12px 'Courier New',monospace`;

    yPos += 22;
  });
  yPos += 10;
  // Enemies
  ctx.fillStyle = '#ef5350';
  ctx.font = `bold 14px 'Courier New',monospace`;
  ctx.fillText(LANG === 'ko' ? '적' : 'Enemies', 20, yPos); yPos += 24;
  ENEMY_DEFS.forEach((def, i) => {
    ctx.fillStyle = def.color;
    ctx.font = `12px 'Courier New',monospace`;
    ctx.fillText(`${LANG === 'ko' ? def.nameKo : def.nameEn} — HP:${def.hp} SPD:${def.spd}`, 30, yPos);
    yPos += 22;
  });
  yPos += 10;
  // Bosses
  ctx.fillStyle = '#ab47bc';
  ctx.font = `bold 14px 'Courier New',monospace`;
  ctx.fillText(LANG === 'ko' ? '보스' : 'Bosses', 20, yPos); yPos += 24;
  BOSS_DEFS.forEach((def, i) => {
    ctx.fillStyle = def.color;
    ctx.font = `12px 'Courier New',monospace`;
    ctx.fillText(`${LANG === 'ko' ? def.nameKo : def.nameEn} — HP:${def.hp} Phases:${def.phases}`, 30, yPos);
    yPos += 22;
  });
  scroll.maxScroll = Math.max(0, yPos + scroll.scrollY - H + 40);
  ctx.fillStyle = '#505070'; ctx.font = `12px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ESC: ' + (LANG === 'ko' ? '뒤로' : 'Back'), W/2, H - 15);
}

// Ending screen
function renderEnding() {
  ctx.fillStyle = '#0f0020'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e040fb';
  ctx.shadowColor = '#e040fb'; ctx.shadowBlur = 20;
  ctx.font = `bold ${Math.min(36, W*0.06)}px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(LANG === 'ko' ? '시간이 안정되었다.' : 'Time is Stable.', W/2, H * 0.35);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `${Math.min(16, W*0.03)}px 'Courier New',monospace`;
  ctx.fillText(LANG === 'ko' ? '크로노맨서의 여정이 끝났습니다.' : 'The Chronomancer\'s journey ends.', W/2, H * 0.5);
  ctx.fillText(`${t('score')}: ${saveData ? saveData.totalScore : 0}`, W/2, H * 0.6);
  ctx.fillStyle = '#505070';
  ctx.fillText(t('tapToRestart'), W/2, H * 0.8);
  buttons.push({ id:'endToTitle', x:0, y:0, w:W, h:H, action: () => beginTransition(S.TITLE) });
}

// Loading screen
function renderLoading(progress) {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e0e0e0';
  ctx.font = `bold 20px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('LOADING...', W/2, H/2 - 20);
  const barW = Math.min(300, W * 0.6);
  const barH = 8;
  ctx.fillStyle = '#1a2744';
  ctx.fillRect(W/2 - barW/2, H/2, barW, barH);
  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(W/2 - barW/2, H/2, barW * progress, barH);
}

// Main update function
function update(dt) {
  // Tween manager — always active
  if (ACTIVE_SYSTEMS.tween.includes(state)) tw.update(dt);
  // Particles
  if (ACTIVE_SYSTEMS.particle.includes(state)) particlePool.updateAll(dt);
  // Projectiles
  if (ACTIVE_SYSTEMS.projectile.includes(state)) projectilePool.updateAll(dt);
  // Enemies
  if (ACTIVE_SYSTEMS.enemy.includes(state)) updateEnemies(dt);
  // Towers
  if (ACTIVE_SYSTEMS.tower.includes(state)) updateTowers(dt);
  // Time magic
  if (ACTIVE_SYSTEMS.timeMagic.includes(state)) updateTimeMagic(dt);
  // Collisions
  if (ACTIVE_SYSTEMS.collision.includes(state)) checkCollisions();
  // Scroll
  if (ACTIVE_SYSTEMS.scroll.includes(state)) scroll.update(dt);
  // Combo timer
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }
  // Wave prep timer
  if (state === S.WAVE_PREP) {
    wavePrepTimer -= dt;
    if (wavePrepTimer <= 0 && !isWaveActive) startNextWave();
  }
  // Boss intro timer
  if (state === S.BOSS_INTRO) {
    bossIntroTimer -= dt;
    if (bossIntroTimer <= 0) {
      const stageInfo = STAGE_DATA[currentEra][currentStage];
      if (stageInfo.boss !== undefined) spawnBoss(stageInfo.boss, currentEra);
      enterState(S.BOSS_FIGHT);
    }
  }
  // Wave completion check
  if (state === S.GAMEPLAY || state === S.BOSS_FIGHT) checkWaveComplete();
  // Shake decay
  if (shakeAmount > 0.1) shakeAmount *= shakeDecay;
  else shakeAmount = 0;
}

// Main render function — pure output, no state changes
function render() {
  // Rebuild button list each frame
  buttons = [];
  // Shake transform
  ctx.save();
  if (shakeAmount > 0.5) {
    ctx.translate((Math.random()-0.5)*shakeAmount*2, (Math.random()-0.5)*shakeAmount*2);
  }
  switch (state) {
    case S.TITLE: renderTitle(); break;
    case S.ERA_SELECT: renderEraSelect(); break;
    case S.STAGE_SELECT: renderStageSelect(); break;
    case S.GAMEPLAY: renderGameplay(); break;
    case S.WAVE_PREP: renderGameplay(); break;
    case S.BOSS_INTRO: renderBossIntro(); break;
    case S.BOSS_FIGHT: renderGameplay(); break;
    case S.RESULT: renderResult(); break;
    case S.GAMEOVER: renderGameover(); break;
    case S.PAUSED: renderPaused(); break;
    case S.UPGRADE: renderUpgrade(); break;
    case S.CODEX: renderCodex(); break;
    case S.ENDING: renderEnding(); break;
    case S.TUTORIAL: renderGameplay(); break;
  }
  ctx.restore();
  // Transition overlay
  if (isTransitioning) {
    ctx.fillStyle = `rgba(10,14,26,${transObj.a})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// Main game loop — try-catch protected (F12)
function gameLoop(timestamp) {
  try {
    const dt = Math.min(timestamp - lastTime, 33.33);
    lastTime = timestamp;
    update(dt);
    render();
  } catch (e) {
    console.error('[ChronoSiege] Loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// Transition alpha tracking via tween
const transObj = { a: 0 };

// Initialize game — no external assets, 100% Canvas drawing
function init() {
  resize();
  // Load save
  loadSave();
  if (saveData) difficulty = saveData.difficulty || 'medium';
  // Event listeners
  window.addEventListener('resize', resize);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });
  // Start title
  performStateChange(S.TITLE);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Boot
init();
</script>
