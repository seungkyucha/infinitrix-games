<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="fruitBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <radialGradient id="apple" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
    <radialGradient id="orange" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="watermelon" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <radialGradient id="grape" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </radialGradient>
    <radialGradient id="lemon" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <radialGradient id="cherry" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#E57373"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <linearGradient id="container" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BDBDBD" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <filter id="fruitShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#fruitBg)"/>
  <!-- Playful background circles -->
  <g opacity="0.08">
    <circle cx="50" cy="50" r="40" fill="#F44336"/>
    <circle cx="350" cy="40" r="35" fill="#FF9800"/>
    <circle cx="100" cy="200" r="30" fill="#4CAF50"/>
    <circle cx="320" cy="180" r="25" fill="#9C27B0"/>
  </g>
  <!-- Container/box -->
  <path d="M80,230 L80,100 Q80,90 90,90 L310,90 Q320,90 320,100 L320,230 Z" fill="url(#container)" stroke="#BDBDBD" stroke-width="2"/>
  <path d="M80,230 L80,100 Q80,90 90,90 L310,90 Q320,90 320,100 L320,230" fill="none" stroke="#9E9E9E" stroke-width="1" opacity="0.5"/>
  <!-- Watermelon (large, bottom) -->
  <g transform="translate(200,195)" filter="url(#fruitShadow)">
    <circle r="35" fill="url(#watermelon)"/>
    <!-- Stripes -->
    <path d="M-20,-28 Q-15,0 -20,28" stroke="#1B5E20" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M0,-35 Q5,0 0,35" stroke="#1B5E20" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M20,-28 Q15,0 20,28" stroke="#1B5E20" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Highlight -->
    <ellipse cx="-10" cy="-15" rx="8" ry="12" fill="white" opacity="0.15"/>
  </g>
  <!-- Apple (left) -->
  <g transform="translate(130,148)" filter="url(#fruitShadow)">
    <circle r="22" fill="url(#apple)"/>
    <ellipse cx="-6" cy="-10" rx="5" ry="8" fill="white" opacity="0.15"/>
    <!-- Stem -->
    <path d="M0,-22 Q2,-28 0,-30" stroke="#5D4037" stroke-width="2" fill="none"/>
    <!-- Leaf -->
    <path d="M0,-26 Q8,-30 12,-25" fill="#4CAF50"/>
  </g>
  <!-- Orange (right) -->
  <g transform="translate(270,155)" filter="url(#fruitShadow)">
    <circle r="24" fill="url(#orange)"/>
    <ellipse cx="-7" cy="-10" rx="5" ry="8" fill="white" opacity="0.12"/>
    <!-- Navel -->
    <circle cx="0" cy="10" r="3" fill="#E65100" opacity="0.4"/>
    <!-- Stem dot -->
    <circle cx="0" cy="-23" r="2" fill="#4CAF50"/>
  </g>
  <!-- Grape cluster (top-left) -->
  <g transform="translate(110,110)" filter="url(#fruitShadow)">
    <circle cx="0" cy="0" r="7" fill="url(#grape)"/>
    <circle cx="10" cy="0" r="7" fill="url(#grape)"/>
    <circle cx="5" cy="-10" r="7" fill="url(#grape)"/>
    <circle cx="5" cy="10" r="7" fill="url(#grape)"/>
    <circle cx="15" cy="-6" r="6" fill="url(#grape)"/>
    <!-- Stem -->
    <path d="M5,-17 Q6,-25 10,-27" stroke="#5D4037" stroke-width="1.5" fill="none"/>
    <path d="M10,-27 Q16,-28 18,-24" fill="#4CAF50"/>
  </g>
  <!-- Lemon (top-right) -->
  <g transform="translate(280,108)" filter="url(#fruitShadow)">
    <ellipse rx="18" ry="13" fill="url(#lemon)" transform="rotate(-20)"/>
    <ellipse cx="-4" cy="-4" rx="5" ry="4" fill="white" opacity="0.15" transform="rotate(-20)"/>
  </g>
  <!-- Cherry pair (top center) -->
  <g transform="translate(195,105)" filter="url(#fruitShadow)">
    <circle cx="-8" cy="5" r="10" fill="url(#cherry)"/>
    <circle cx="8" cy="8" r="9" fill="url(#cherry)"/>
    <ellipse cx="-10" cy="1" rx="3" ry="4" fill="white" opacity="0.15"/>
    <path d="M-5,-5 Q0,-18 5,-5" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
    <path d="M0,-16 Q4,-20 8,-17" fill="#4CAF50"/>
  </g>
  <!-- Merge arrows -->
  <g transform="translate(165,130)" opacity="0.6">
    <path d="M-5,0 L5,0 L3,-3 M5,0 L3,3" stroke="#FF6D00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(240,135)" opacity="0.6">
    <path d="M5,0 L-5,0 L-3,-3 M-5,0 L-3,3" stroke="#FF6D00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Sparkle effects -->
  <g fill="#FFD54F" filter="url(#sparkle)">
    <polygon points="155,90 157,95 162,95 158,98 160,103 155,100 150,103 152,98 148,95 153,95"/>
    <polygon points="300,85 301,88 304,88 302,90 303,93 300,91 297,93 298,90 296,88 299,88" opacity="0.7"/>
    <polygon points="100,75 101,78 104,78 102,80 103,83 100,81 97,83 98,80 96,78 99,78" opacity="0.6"/>
  </g>
  <!-- Plus signs (merge indicator) -->
  <g font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF6D00" opacity="0.5">
    <text x="160" y="175">+</text>
    <text x="240" y="180">+</text>
  </g>
  <!-- Score bubble -->
  <g transform="translate(340,50)">
    <rect x="-25" y="-15" width="50" height="28" rx="14" fill="#FF6D00" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2048</text>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="#FFAB40" opacity="0.6"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="white" filter="url(#fruitShadow)">Fruits Merge</text>
</svg>