<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="arwG" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffcc66" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddddee"/>
    </linearGradient>
    <linearGradient id="trailG" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#44bbff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#44bbff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="aGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#44bbff" flood-opacity="0.5"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#aGlow)">
    <!-- Trail glow -->
    <path d="M8,64 Q40,58 80,62 Q100,63 108,64" fill="none" stroke="url(#trailG)" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M20,64 Q50,60 85,63" fill="none" stroke="#88ddff" stroke-width="4" opacity="0.3"/>
    <!-- Arrow shaft -->
    <line x1="30" y1="64" x2="100" y2="64" stroke="url(#arwG)" stroke-width="4" stroke-linecap="round"/>
    <line x1="40" y1="63" x2="95" y2="63" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Arrowhead -->
    <path d="M98,54 L118,64 L98,74 Z" fill="#dddde8" stroke="#111" stroke-width="2.5"/>
    <path d="M102,58 L112,64 L102,70" fill="#ffffff" opacity="0.4"/>
    <!-- Fletching -->
    <path d="M34,58 L28,64 L34,70" fill="#44bbff" stroke="#111" stroke-width="2" opacity="0.8"/>
    <path d="M38,60 L33,64 L38,68" fill="#88ddff" stroke="none" opacity="0.5"/>
    <!-- Sparkle particles -->
    <circle cx="50" cy="60" r="2" fill="white" opacity="0.6"/>
    <circle cx="70" cy="66" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="85" cy="62" r="2.5" fill="#88ddff" opacity="0.5"/>
  </g>
</svg>