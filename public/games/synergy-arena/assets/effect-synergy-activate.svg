<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="synG" cx="0.5" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="synGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#synGlow)">
    <!-- Magic circle at base -->
    <ellipse cx="128" cy="210" rx="90" ry="30" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.6"/>
    <ellipse cx="128" cy="210" rx="70" ry="22" fill="none" stroke="#ffee88" stroke-width="2" stroke-dasharray="10,6" opacity="0.5"/>
    <ellipse cx="128" cy="210" rx="50" ry="16" fill="#ffd700" opacity="0.15"/>
    <!-- Rune marks on circle -->
    <text x="80" y="215" font-size="14" fill="#ffd700" opacity="0.5" font-family="serif">✦</text>
    <text x="120" y="218" font-size="14" fill="#ffd700" opacity="0.5" font-family="serif">✧</text>
    <text x="160" y="215" font-size="14" fill="#ffd700" opacity="0.5" font-family="serif">✦</text>
    <!-- Rising pillar of light -->
    <path d="M100,210 Q108,130 118,60 L128,20 L138,60 Q148,130 156,210 Z" fill="url(#synG)" opacity="0.5"/>
    <!-- Rising particles -->
    <circle cx="115" cy="180" r="4" fill="#ffee88" opacity="0.7"/>
    <circle cx="140" cy="150" r="5" fill="#ffd700" opacity="0.6"/>
    <circle cx="120" cy="120" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="138" cy="90" r="4" fill="#ffee88" opacity="0.6"/>
    <circle cx="125" cy="60" r="3" fill="#ffffff" opacity="0.5"/>
    <circle cx="133" cy="40" r="2.5" fill="#ffd700" opacity="0.4"/>
    <!-- Sparkle stars -->
    <path d="M110,160 L112,156 L114,160 L112,164 Z" fill="white" opacity="0.7"/>
    <path d="M145,130 L148,124 L151,130 L148,136 Z" fill="white" opacity="0.6"/>
    <path d="M128,80 L130,76 L132,80 L130,84 Z" fill="white" opacity="0.8"/>
    <!-- Side energy wisps -->
    <path d="M90,200 Q85,160 95,120" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
    <path d="M166,200 Q171,160 161,120" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  </g>
</svg>