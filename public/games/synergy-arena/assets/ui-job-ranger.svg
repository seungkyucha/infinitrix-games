<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bowG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#bb8844"/>
      <stop offset="100%" stop-color="#774422"/>
    </linearGradient>
    <linearGradient id="rBg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a1e15"/>
      <stop offset="100%" stop-color="#0a150d"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#dddde8"/>
      <stop offset="100%" stop-color="#8888aa"/>
    </linearGradient>
    <filter id="rGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#44cc44" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="64" cy="64" r="56" fill="url(#rBg)" stroke="#111" stroke-width="4"/>
  <circle cx="64" cy="64" r="56" fill="none" stroke="#44cc44" stroke-width="2" opacity="0.5"/>
  <g filter="url(#rGlow)">
    <!-- Bow -->
    <path d="M38,24 Q28,44 28,64 Q28,84 38,104" fill="none" stroke="url(#bowG)" stroke-width="6" stroke-linecap="round"/>
    <path d="M38,24 Q28,44 28,64 Q28,84 38,104" fill="none" stroke="#cc9955" stroke-width="3" opacity="0.5"/>
    <!-- Bowstring -->
    <line x1="38" y1="24" x2="38" y2="104" stroke="#ddccaa" stroke-width="2"/>
    <!-- Arrow shaft -->
    <line x1="38" y1="64" x2="102" y2="64" stroke="url(#arrowG)" stroke-width="4" stroke-linecap="round"/>
    <!-- Arrow highlight -->
    <line x1="50" y1="63" x2="90" y2="63" stroke="#eeeeff" stroke-width="1.5" opacity="0.4"/>
    <!-- Arrowhead -->
    <path d="M98,56 L112,64 L98,72 Z" fill="url(#arrowG)" stroke="#111" stroke-width="2.5"/>
    <!-- Arrow fletching -->
    <path d="M42,58 L38,64 L42,70" fill="#44cc44" stroke="#111" stroke-width="2"/>
    <path d="M46,60 L42,64 L46,68" fill="#88ee44" stroke="#111" stroke-width="1.5"/>
    <!-- Bow grip wrapping -->
    <rect x="25" y="58" width="8" height="12" rx="2" fill="#664422" stroke="#111" stroke-width="1.5"/>
    <line x1="26" y1="60" x2="32" y2="60" stroke="#553311" stroke-width="1"/>
    <line x1="26" y1="63" x2="32" y2="63" stroke="#553311" stroke-width="1"/>
    <line x1="26" y1="66" x2="32" y2="66" stroke="#553311" stroke-width="1"/>
  </g>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#44cc44" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
</svg>