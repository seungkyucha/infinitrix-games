<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="flameG" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff6622"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="flameBg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a1515"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#ff6622" flood-opacity="0.5"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Badge circle -->
  <circle cx="64" cy="64" r="56" fill="url(#flameBg)" stroke="#111" stroke-width="4"/>
  <circle cx="64" cy="64" r="56" fill="none" stroke="#ff6622" stroke-width="2" opacity="0.5"/>
  <!-- Flame symbol -->
  <g filter="url(#fGlow)">
    <path d="M64,22 Q78,42 82,56 Q85,65 78,72 Q84,62 76,50 Q72,58 74,68 Q76,78 68,86 Q72,78 68,68 Q66,60 58,54 Q54,64 56,74 Q58,82 52,88 Q48,78 50,66 Q44,72 46,82 Q48,90 44,96 Q38,86 42,72 Q38,60 44,48 Q50,36 64,22 Z" fill="url(#flameG)" stroke="#111" stroke-width="3"/>
    <!-- Inner bright core -->
    <path d="M64,50 Q70,58 68,66 Q66,72 62,68 Q58,62 62,54 Z" fill="#ffdd66" stroke="none" opacity="0.8"/>
  </g>
  <!-- Outer ring detail -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
</svg>