<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="leafG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#88ee44"/>
      <stop offset="100%" stop-color="#44cc44"/>
    </linearGradient>
    <linearGradient id="natBg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a1e0a"/>
      <stop offset="100%" stop-color="#0a150a"/>
