    <path d="M64,50 Q50,54 40,64" fill="none" stroke="#2a8a2a" stroke-width="2"/>
    <path d="M64,50 Q78,54 88,64" fill="none" stroke="#2a8a2a" stroke-width="2"/>
    <path d="M64,66 Q52,70 44,78" fill="none" stroke="#2a8a2a" stroke-width="1.8"/>
    <path d="M64,66 Q76,70 84,78" fill="none" stroke="#2a8a2a" stroke-width="1.8"/>
    <!-- Highlight -->
