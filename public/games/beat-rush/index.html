<style>
*{margin:0;padding:0;box-sizing:border-box}

canvas{display:block;width:100%;height:100%}

<body>
<canvas id="gameCanvas"></canvas>
<script>
/* ════════════════════════════════════════════
   비트 러시 (Beat Rush) — Cycle 5
   4레인 리듬 아케이드 · Web Audio 절차적 음악

   상태×시스템 업데이트 매트릭스:
   ─────────────────────────────────────────────
   상태            | Tw | Beat | Note | Input | Combo | HP | BeatViz | Ptcl | Render | Audio
   LOADING         |  ✗ |  ✗   |  ✗   |  ✗    |  ✗    | ✗  |   ✗     |  ✗   | load   |  ✗
   TITLE           |  ✓ |  ✗   |  ✗   | start |  ✗    | ✗  |  slow   |  ✗   | title  |  ✗
   PLAYING         |  ✓ |  ✓   |  ✓   |  ✓    |  ✓    | ✓  |   ✓     |  ✓   | game   |  ✓
   PAUSE           |  ✓ |  ✗   |  ✗   | resume|  ✗    | ✗  |  stop   |  ✗   | +pause |  sus
   CONFIRM_MODAL   |  ✓ |  ✗   |  ✗   | y/n   |  ✗    | ✗  |  stop   |  ✗   | +modal |  sus
   GAMEOVER        |  ✓ |  ✗   |  ✗   | restart| ✗    | ✗  |  decay  |  ✓   | +result|  ✗
   ═══════════════════════════════════════════ */

'use strict';

// ── 상수 ──────────────────────────────────
const STATES = { LOADING:0, TITLE:1, PLAYING:2, PAUSE:3, CONFIRM_MODAL:4, GAMEOVER:5 };
const STATE_PRIORITY = { 0:0, 1:10, 2:20, 3:30, 4:35, 5:99 };

// 레인 색상 (레드/블루/그린/앰버)
const LANE_COLORS = ['#FF1744','#2979FF','#00E676','#FFAB00'];
const LANE_KEYS = ['d','f','j','k'];

// 판정 기준 (ms)
const JUDGE_PERFECT = 30;
const JUDGE_GREAT = 60;
const JUDGE_GOOD = 100;
const JUDGE_MISS_THRESHOLD = 100;

// 판정 점수 & HP
const JUDGE = {
  perfect: { score:300, hp:2,  combo:true,  color:'#FFD740', label:'PERFECT' },
  great:   { score:200, hp:1,  combo:true,  color:'#00E5FF', label:'GREAT' },
  good:    { score:100, hp:0,  combo:false, color:'#AAAAAA', label:'GOOD' },
  miss:    { score:0,   hp:-8, combo:false, color:'#FF1744', label:'MISS' }
};

// BPM 곡선 [시간(초), BPM]
const BPM_CURVE = [[0,100],[15,110],[30,120],[60,130],[90,140],[120,150],[150,160]];

// 베이스 음계 (Am 진행)
const BASS_NOTES = [55, 65.4, 73.4, 82.4, 55, 82.4, 73.4, 65.4];
// 멜로디 음계 (Am 스케일)
const MELODY_SCALE = [220, 261.6, 293.7, 329.6, 392, 440, 523.3];

// 노트 크기
const NOTE_W = 52, NOTE_H = 16;

// ── Canvas 초기화 ─────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr, judgeLineY, laneXs, laneW;

// DPR 대응 리사이즈
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  judgeLineY = H - 60;
  laneW = Math.min(68, W * 0.15);
  laneXs = [W*0.25, W*0.40, W*0.60, W*0.75];
  // 오프스크린 그리드 캐시 재생성
  buildGridCache();
}

// ── 오프스크린 그리드 캐시 ─────────────────
let gridCanvas, gridCtx;
function buildGridCache() {
  gridCanvas = document.createElement('canvas');
  gridCanvas.width = W * dpr;
  gridCanvas.height = H * dpr;
  gridCtx = gridCanvas.getContext('2d');
  gridCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gridCtx.strokeStyle = 'rgba(26,26,62,0.15)';
  gridCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 20) {
    gridCtx.beginPath(); gridCtx.moveTo(x,0); gridCtx.lineTo(x,H); gridCtx.stroke();
  }
  for (let y = 0; y < H; y += 20) {
    gridCtx.beginPath(); gridCtx.moveTo(0,y); gridCtx.lineTo(W,y); gridCtx.stroke();
  }
}

// ── 이징 함수 5종 ─────────────────────────
const EASING = {
  linear:        t => t,
  easeOutQuad:   t => t * (2 - t),
  easeInQuad:    t => t * t,
  easeOutBack:   t => { const c = 1.70158; return 1 + (--t) * t * ((c+1)*t + c); },
  easeOutElastic: t => t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1
};

// ── TweenManager (clearImmediate 포함 — Cycle 4 B1 해결) ──
class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }

  // tween 추가
  add(target, props, duration, easing, onComplete) {
    const tw = { target, props:{}, duration, easing: easing||'linear', onComplete, elapsed:0 };
    for (const k in props) {
      tw.props[k] = { from: target[k] !== undefined ? target[k] : 0, to: props[k] };
    }
    this._tweens.push(tw);
    return this;
  }

  // 매 프레임 업데이트
  update(dt) {
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; return; }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt * 1000;
      const t = Math.min(1, tw.elapsed / tw.duration);
      const e = EASING[tw.easing](t);
      for (const k in tw.props) {
        const p = tw.props[k];
        tw.target[k] = p.from + (p.to - p.from) * e;
      }
      if (t >= 1) {
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }

  // deferred cancel (update 루프 내부 안전)
  cancelAll() { this._pendingCancel = true; }

  // ⭐ 즉시 정리 — resetGame()에서 사용 (Cycle 4 B1 CRITICAL 해결)
  clearImmediate() { this._tweens.length = 0; this._pendingCancel = false; }
}

// ── ObjectPool ────────────────────────────
class ObjectPool {
  constructor(factory, size) {
    this._pool = []; this._factory = factory;
    for (let i = 0; i < size; i++) this._pool.push(factory());
    this._active = [];
  }
  acquire() {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._factory();
    this._active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  // 역순 순회로 안전하게 각 활성 요소 처리
  forEach(fn) { for (let i = this._active.length - 1; i >= 0; i--) fn(this._active[i], i); }
  clear() { this._active.forEach(o => this._pool.push(o)); this._active.length = 0; }
  get activeCount() { return this._active.length; }
}

// ── 이벤트 리스너 관리 (destroy 패턴) ─────
const registeredListeners = [];
function listen(el, evt, fn, opts) {
  el.addEventListener(evt, fn, opts);
  registeredListeners.push([el, evt, fn, opts]);
}
function destroy() {
  cancelAnimationFrame(rafId);
  registeredListeners.forEach(([el, evt, fn, opts]) => el.removeEventListener(evt, fn, opts));
  registeredListeners.length = 0;
  notePool.clear(); particlePool.clear(); wavePool.clear();
  tw.clearImmediate();
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
}

// ── localStorage 안전 래핑 ────────────────
function getLS(k, def) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; } }
function setLS(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { /* silent */ } }

// ── 전역 게임 상태 ───────────────────────
const tw = new TweenManager();
const notePool = new ObjectPool(() => ({type:'tap',lane:0,y:0,targetTime:0,active:true,held:false,longEnd:0,longStartY:0,judged:false}), 40);
const particlePool = new ObjectPool(() => ({x:0,y:0,vx:0,vy:0,life:0,maxLife:0,color:'#fff',size:3}), 60);
const wavePool = new ObjectPool(() => ({x:0,y:0,r:0,maxR:0,life:0,maxLife:0,color:'#fff'}), 10);

let state = STATES.LOADING;
let transitioning = false;
let rafId = 0;
let lastTime = 0;
let inputMode = 'keyboard'; // 'keyboard' | 'mouse' | 'touch'

// 게임 변수
let score, combo, maxCombo, hp;
let perfectCount, greatCount, goodCount, missCount;
let consecutivePerfects, consecutiveMisses;
let elapsedTime, bpm, noteSpeed;
let gameStartAudioTime; // AudioContext.currentTime 기준 게임 시작 시각

// 비트 스케줄러 상태
let beatIndex, nextBeatTime;
const SCHEDULE_AHEAD = 0.1;

// 동적 밸런스
let densityMod; // 노트 밀도 보정 (1.0 기본)
let feverActive;

// HUD tween 대상
const hud = { comboScale:1, scoreFlash:0, bpmScale:1, titleAlpha:0, titleGlow:0.7 };
const resultAnim = { alpha:0, scoreY:0, comboY:0, timeY:0, judgeY:0, newBestScale:0 };
const pauseAnim = { alpha:0 };
const modalAnim = { alpha:0 };

// 판정 텍스트 표시
let judgeText = { label:'', color:'#fff', alpha:0, y:0 };
// 레인 플래시
let laneFlash = [0,0,0,0];
// 비트 비주얼
let kickFlash = 0;
let gridAlpha = 0.15;

// 키 상태
const keyDown = {};

// 결과 데이터
let resultData = {};

// 롱 노트 추적
const longNoteActive = [null, null, null, null];

// 부유 파티클
const floaters = [];

// AudioContext
let audioCtx = null;
let masterGain = null;

// ── Web Audio 초기화 ─────────────────────
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  } catch(e) { audioCtx = null; }
}

// ── 드럼 트랙 ────────────────────────────
function playDrumBeat(time, beatInBar) {
  if (!audioCtx || !masterGain) return;
  try {
    // 킥 (1,3 박)
    if (beatInBar === 0 || beatInBar === 2) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(150, time);
      o.frequency.exponentialRampToValueAtTime(30, time + 0.1);
      g.gain.setValueAtTime(0.4, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      o.connect(g); g.connect(masterGain);
      o.start(time); o.stop(time + 0.15);
      kickFlash = 1.0; // 비트 비주얼
    }
    // 스네어 (2,4 박)
    if (beatInBar === 1 || beatInBar === 3) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(200, time);
      g.gain.setValueAtTime(0.15, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      o.connect(g); g.connect(masterGain);
      o.start(time); o.stop(time + 0.08);
    }
    // 하이햇 (매 비트)
    const hh = audioCtx.createOscillator(), hg = audioCtx.createGain();
    hh.type = 'square';
    hh.frequency.setValueAtTime(800, time);
    hg.gain.setValueAtTime(0.05, time);
    hg.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
    hh.connect(hg); hg.connect(masterGain);
    hh.start(time); hh.stop(time + 0.03);
  } catch(e) { /* silent */ }
}

// 베이스 트랙
function playBassBeat(time) {
  if (!audioCtx || !masterGain) return;
  try {
    const freq = BASS_NOTES[Math.floor(beatIndex / 2) % BASS_NOTES.length];
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(freq, time);
    g.gain.setValueAtTime(0.12, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
    o.connect(g); g.connect(masterGain);
    o.start(time); o.stop(time + 0.25);
  } catch(e) { /* silent */ }
}

// 멜로디 트랙 (난이도 3+ 에서)
function playMelodyNote(time) {
  if (!audioCtx || !masterGain) return;
  try {
    const freq = MELODY_SCALE[Math.floor(Math.random() * MELODY_SCALE.length)];
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq, time);
    g.gain.setValueAtTime(0.08, time);
    g.gain.linearRampToValueAtTime(0.06, time + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
    o.connect(g); g.connect(masterGain);
    o.start(time); o.stop(time + 0.3);
  } catch(e) { /* silent */ }
}

// 판정 효과음
function sfxPerfect() {
  if (!audioCtx || !masterGain) return;
  try {
    const t = audioCtx.currentTime;
    [880, 1320].forEach(f => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.1);
    });
  } catch(e) {}
}
function sfxGreat() {
  if (!audioCtx || !masterGain) return;
  try {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(660, t);
    g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.08);
  } catch(e) {}
}
function sfxMiss() {
  if (!audioCtx || !masterGain) return;
  try {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(120, t);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.06);
  } catch(e) {}
}

// ── BPM 관련 함수 ────────────────────────
// 경과 시간에 따른 목표 BPM 반환
function getBPMForTime(t) {
  let result = BPM_CURVE[0][1];
  for (let i = BPM_CURVE.length - 1; i >= 0; i--) {
    if (t >= BPM_CURVE[i][0]) { result = BPM_CURVE[i][1]; break; }
  }
  return result;
}

// 난이도 레벨 (0~10)
function getDifficulty() { return Math.min(10, Math.floor(elapsedTime / 15)); }

// 노트 속도 계산
function calcNoteSpeed() { return 200 + (bpm - 100) * 1.5; }

// ── 절차적 비트맵 생성 ───────────────────
function generateNotePattern(bi) {
  const diff = getDifficulty();
  const density = densityMod * (0.5 + diff * 0.05);
  const notes = [];

  // 확률적으로 노트 생성
  if (Math.random() > density) return notes;

  // 사용 가능 레인 수
  const maxLanes = diff < 3 ? 2 : diff < 5 ? 3 : 4;
  const lane = Math.floor(Math.random() * maxLanes);

  // 탭 노트 기본
  notes.push({ lane, type: 'tap', duration: 0 });

  // 동시 노트 (난이도 5+, 30% 확률)
  if (diff >= 5 && Math.random() < 0.3) {
    let lane2 = (lane + 1 + Math.floor(Math.random() * (maxLanes - 1))) % maxLanes;
    notes.push({ lane: lane2, type: 'tap', duration: 0 });
  }

  // 롱 노트 (난이도 3+, 20% 확률, 단일만)
  if (diff >= 3 && notes.length === 1 && Math.random() < 0.2) {
    const beats = 2 + Math.floor(Math.random() * 3);
    notes[0].type = 'long';
    notes[0].duration = beats * (60 / bpm);
  }

  return notes;
}

// 안전 규칙 체크용 이전 노트 기록
let lastNoteLanes = [];
let lastNoteBeats = [];

// 노트 생성
function spawnNote(lane, type, targetTime, duration) {
  const n = notePool.acquire();
  n.lane = lane;
  n.type = type;
  n.targetTime = targetTime;
  n.y = -20;
  n.active = true;
  n.judged = false;
  n.held = false;
  n.longEnd = type === 'long' ? targetTime + duration : 0;
  n.longStartY = 0;
}

// ── 비트 스케줄러 ────────────────────────
function beatSchedulerUpdate() {
  if (!audioCtx) return;
  const currentTime = audioCtx.currentTime;

  while (nextBeatTime < currentTime + SCHEDULE_AHEAD) {
    const beatInBar = beatIndex % 4;

    // 사운드 스케줄링
    playDrumBeat(nextBeatTime, beatInBar);
    if (beatIndex % 2 === 0) playBassBeat(nextBeatTime);
    if (getDifficulty() >= 3 && beatIndex % 4 === 0) playMelodyNote(nextBeatTime);

    // 비트맵 생성 + 노트 스폰
    // BPM 전환 직후 2비트는 밀도 감소
    const pattern = generateNotePattern(beatIndex);
    pattern.forEach(p => {
      // 안전 규칙: 롱 노트 활성 중인 레인 금지
      if (longNoteActive[p.lane]) return;
      spawnNote(p.lane, p.type, nextBeatTime, p.duration);
    });

    nextBeatTime += 60 / bpm;
    beatIndex++;
  }

  // BPM 단계 체크
  const targetBPM = getBPMForTime(elapsedTime);
  if (Math.abs(targetBPM - bpm) > 1) {
    // BPM 변경 시 스케일 펄스 연출
    hud.bpmScale = 1.3;
    tw.add(hud, { bpmScale: 1 }, 300, 'easeOutBack');
    bpm = targetBPM; // 즉시 반영 (스케줄러는 다음 비트부터 적용)
  }
}

// ── 노트 관리 ────────────────────────────
function updateNotes(dt) {
  noteSpeed = calcNoteSpeed();
  const currentTime = audioCtx ? audioCtx.currentTime : 0;

  notePool.forEach((n) => {
    if (!n.active) return;

    // y 위치: targetTime 기준으로 판정 라인까지의 거리 계산
    const timeUntilJudge = n.targetTime - currentTime;
    n.y = judgeLineY - timeUntilJudge * noteSpeed;

    // 롱 노트 꼬리 시작 위치
    if (n.type === 'long') {
      const endTimeUntil = n.longEnd - currentTime;
      n.longStartY = judgeLineY - endTimeUntil * noteSpeed;
    }

    // 자동 Miss: 판정 라인 아래로 100ms 분량 이상 통과
    if (!n.judged && currentTime - n.targetTime > JUDGE_MISS_THRESHOLD / 1000) {
      processJudgment('miss', n.lane);
      n.judged = true;
    }

    // 롱 노트 유지 보너스
    if (n.type === 'long' && n.held && !n.judged) {
      // 비트마다 보너스 (간단히 dt로 근사)
      const comboMult = Math.min(3, 1 + Math.floor(combo / 10) * 0.1);
      score += Math.round(50 * comboMult * dt);
    }

    // 롱 노트 끝: 키를 떼었거나 시간 초과
    if (n.type === 'long' && n.held && currentTime >= n.longEnd) {
      n.judged = true;
      n.active = false;
      longNoteActive[n.lane] = null;
      processJudgment('perfect', n.lane); // 끝까지 유지 = perfect
    }

    // 화면 밖 → 풀로 반환
    if (n.y > H + 50 || (n.judged && n.type !== 'long')) {
      n.active = false;
      if (n.type === 'long') longNoteActive[n.lane] = null;
      notePool.release(n);
    }
  });
}

// ── 판정 처리 ────────────────────────────
function processJudgment(grade, lane) {
  const j = JUDGE[grade];

  // 콤보
  if (j.combo) {
    combo++;
    if (combo > maxCombo) {
      // 최대 콤보 갱신 보너스
      if (maxCombo > 0) score += 200;
      maxCombo = combo;
    }
    // Perfect 연속 체크
    if (grade === 'perfect') {
      consecutivePerfects++;
      if (consecutivePerfects === 10) { score += 500; showJudgeText('PERFECT STREAK!', '#FFD740'); }
    } else {
      consecutivePerfects = 0;
    }
    consecutiveMisses = 0;
  } else {
    combo = 0;
    consecutivePerfects = 0;
    if (grade === 'miss') {
      consecutiveMisses++;
      // Miss 3연속 → 밀도 감소
      if (consecutiveMisses >= 3) { densityMod = 0.5; showJudgeText('Focus!', '#AAAAAA'); }
    }
  }

  // 점수 (콤보 배율 적용)
  const comboMult = Math.min(3, 1 + Math.floor(combo / 10) * 0.1);
  score += Math.round(j.score * comboMult);

  // HP
  hp = Math.max(0, Math.min(100, hp + j.hp));

  // 통계
  if (grade === 'perfect') perfectCount++;
  else if (grade === 'great') greatCount++;
  else if (grade === 'good') goodCount++;
  else missCount++;

  // 콤보 카운터 tween
  if (combo > 0) {
    hud.comboScale = 1.3;
    tw.add(hud, { comboScale: 1 }, 150, 'easeOutBack');
  }

  // 점수 플래시
  hud.scoreFlash = 1;
  tw.add(hud, { scoreFlash: 0 }, 300, 'easeOutQuad');

  // 판정 텍스트
  showJudgeText(j.label, j.color);

  // 레인 플래시
  laneFlash[lane] = grade === 'miss' ? -1 : 1;

  // 이펙트
  if (grade === 'perfect') {
    spawnJudgeEffect(lane, 6, '#FFFFFF', 40);
    spawnWave(laneXs[lane], judgeLineY, LANE_COLORS[lane], 60);
    sfxPerfect();
  } else if (grade === 'great') {
    spawnJudgeEffect(lane, 3, LANE_COLORS[lane], 25);
    spawnWave(laneXs[lane], judgeLineY, LANE_COLORS[lane], 40);
    sfxGreat();
  } else if (grade === 'good') {
    spawnJudgeEffect(lane, 1, LANE_COLORS[lane], 15);
  } else {
    sfxMiss();
  }

  // 동적 밸런스: HP 30 이하 → 밀도 감소
  if (hp <= 30) densityMod = Math.max(densityMod, 0.7);
  else if (consecutiveMisses < 3) densityMod = 1.0;

  // FEVER 체크
  if (combo === 50 && !feverActive) {
    feverActive = true;
    showJudgeText('FEVER!', '#00E5FF');
  }
  if (combo === 100) showJudgeText('PERFECT FEVER!', '#FFD740');
  if (combo === 0) feverActive = false;

  // HP 게임오버 체크
  if (hp <= 0 && !transitioning) {
    beginTransition(STATES.GAMEOVER, {
      target: { _go: 0 }, props: { _go: 1 }, duration: 500, easing: 'easeOutQuad'
    });
  }
}

// 판정 텍스트 표시
function showJudgeText(label, color) {
  judgeText.label = label;
  judgeText.color = color;
  judgeText.alpha = 1;
  judgeText.y = judgeLineY - 40;
  tw.add(judgeText, { alpha: 0, y: judgeLineY - 60 }, 400, 'easeOutQuad');
}

// 판정 이펙트 파티클 생성
function spawnJudgeEffect(lane, count, color, spread) {
  for (let i = 0; i < count; i++) {
    const p = particlePool.acquire();
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    p.x = laneXs[lane]; p.y = judgeLineY;
    p.vx = Math.cos(angle) * spread * (0.5 + Math.random());
    p.vy = Math.sin(angle) * spread * (0.5 + Math.random()) - 20;
    p.life = 0; p.maxLife = 0.3 + Math.random() * 0.2;
    p.color = color; p.size = 2 + Math.random() * 3;
  }
}

// 원형 파동 생성
function spawnWave(x, y, color, maxR) {
  const w = wavePool.acquire();
  w.x = x; w.y = y; w.r = 0; w.maxR = maxR;
  w.life = 0; w.maxLife = 0.5; w.color = color;
}

// ── 파티클 업데이트 ──────────────────────
function updateParticles(dt) {
  particlePool.forEach((p) => {
    p.life += dt;
    if (p.life >= p.maxLife) { particlePool.release(p); return; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 60 * dt; // 중력
  });
  // 파동
  wavePool.forEach((w) => {
    w.life += dt;
    if (w.life >= w.maxLife) { wavePool.release(w); return; }
    w.r = w.maxR * (w.life / w.maxLife);
  });
}

// ── 부유 파티클 (배경 장식) ───────────────
function initFloaters() {
  floaters.length = 0;
  for (let i = 0; i < 10; i++) {
    floaters.push({
      x: Math.random() * W, y: Math.random() * H,
      vy: -(10 + Math.random() * 20),
      size: 1 + Math.random() * 2,
      color: LANE_COLORS[Math.floor(Math.random() * 4)],
      alpha: 0.2 + Math.random() * 0.3
    });
  }
}
function updateFloaters(dt) {
  floaters.forEach(f => {
    f.y += f.vy * dt;
    if (f.y < -10) { f.y = H + 10; f.x = Math.random() * W; }
  });
  // 콤보 50+ → 밀도 증가
  if (feverActive && floaters.length < 20) {
    floaters.push({
      x: Math.random() * W, y: H + 10,
      vy: -(15 + Math.random() * 25),
      size: 1 + Math.random() * 3,
      color: LANE_COLORS[Math.floor(Math.random() * 4)],
      alpha: 0.3 + Math.random() * 0.3
    });
  }
}

// ── 입력 처리 ────────────────────────────
function handleLaneInput(lane) {
  if (state !== STATES.PLAYING) return;
  if (lane < 0 || lane > 3) return;
  if (!audioCtx) return;

  const currentTime = audioCtx.currentTime;
  let closestNote = null;
  let closestDist = Infinity;

  // 해당 레인의 가장 가까운 미판정 노트 검색
  notePool.forEach(n => {
    if (!n.active || n.judged || n.lane !== lane) return;
    const dist = Math.abs(n.targetTime - currentTime);
    if (dist < closestDist) { closestDist = dist; closestNote = n; }
  });

  if (!closestNote) return;

  const diffMs = Math.abs(closestNote.targetTime - currentTime) * 1000;

  // 판정 등급 결정
  let grade;
  if (diffMs <= JUDGE_PERFECT) grade = 'perfect';
  else if (diffMs <= JUDGE_GREAT) grade = 'great';
  else if (diffMs <= JUDGE_GOOD) grade = 'good';
  else return; // 너무 먼 노트는 무시

  closestNote.judged = true;

  // 롱 노트 시작
  if (closestNote.type === 'long') {
    closestNote.held = true;
    longNoteActive[lane] = closestNote;
    processJudgment(grade, lane);
    return;
  }

  processJudgment(grade, lane);
  closestNote.active = false;
  notePool.release(closestNote);
}

// 롱 노트 키 릴리즈
function handleLaneRelease(lane) {
  if (longNoteActive[lane]) {
    const n = longNoteActive[lane];
    if (n.active && n.held) {
      n.judged = true;
      n.active = false;
      longNoteActive[lane] = null;
      // 일찍 떼면 good
      if (audioCtx && audioCtx.currentTime < n.longEnd - 0.1) {
        processJudgment('good', lane);
      } else {
        processJudgment('great', lane);
      }
      notePool.release(n);
    }
  }
}

// 터치/마우스에서 레인 결정
function getLaneFromX(x) {
  const margin = inputMode === 'touch' ? 8 : 0;
  for (let i = 0; i < 4; i++) {
    if (Math.abs(x - laneXs[i]) < laneW / 2 + margin) return i;
  }
  return -1;
}

// ── 키보드 이벤트 ────────────────────────
function onKeyDown(e) {
  const key = e.key.toLowerCase();
  if (keyDown[key]) return;
  keyDown[key] = true;
  inputMode = 'keyboard';

  if (state === STATES.TITLE) {
    if (key === ' ' || key === 'enter') { e.preventDefault(); startGame(); }
  } else if (state === STATES.PLAYING) {
    const laneIdx = LANE_KEYS.indexOf(key);
    if (laneIdx >= 0) { e.preventDefault(); handleLaneInput(laneIdx); }
    if (key === 'p' || key === 'escape') togglePause();
  } else if (state === STATES.PAUSE) {
    if (key === 'p' || key === 'escape') togglePause();
    if (key === 'r') showConfirmModal();
  } else if (state === STATES.CONFIRM_MODAL) {
    if (key === 'y' || key === 'enter') confirmRestart();
    if (key === 'n' || key === 'escape') cancelModal();
  } else if (state === STATES.GAMEOVER) {
    if (key === 'r' || key === ' ' || key === 'enter') goToTitle();
  }
}
function onKeyUp(e) {
  const key = e.key.toLowerCase();
  keyDown[key] = false;
  if (state === STATES.PLAYING) {
    const laneIdx = LANE_KEYS.indexOf(key);
    if (laneIdx >= 0) handleLaneRelease(laneIdx);
  }
}

// ── 터치 이벤트 ──────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  inputMode = 'touch';
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const t = touches[i];
    const x = t.clientX, y = t.clientY;

    if (state === STATES.TITLE) { startGame(); return; }
    if (state === STATES.GAMEOVER) { goToTitle(); return; }
    if (state === STATES.PLAYING) {
      // 일시정지 버튼 (우상단)
      if (x > W - 50 && y < 50) { togglePause(); return; }
      const lane = getLaneFromX(x);
      if (lane >= 0) handleLaneInput(lane);
    }
    if (state === STATES.PAUSE) {
      // 화면 중앙 탭 → 재개
      togglePause();
    }
    if (state === STATES.CONFIRM_MODAL) {
      // 예/아니오 영역 체크
      const cx = W / 2, cy = H / 2;
      if (y > cy + 10 && y < cy + 50) {
        if (x < cx) confirmRestart();
        else cancelModal();
      }
    }
  }
}
function onTouchEnd(e) {
  e.preventDefault();
  if (state === STATES.PLAYING) {
    const touches = e.changedTouches;
    for (let i = 0; i < touches.length; i++) {
      const lane = getLaneFromX(touches[i].clientX);
      if (lane >= 0) handleLaneRelease(lane);
    }
  }
}

// ── 마우스 이벤트 ────────────────────────
function onMouseDown(e) {
  inputMode = 'mouse';
  const x = e.clientX, y = e.clientY;

  if (state === STATES.TITLE) { startGame(); return; }
  if (state === STATES.GAMEOVER) { goToTitle(); return; }
  if (state === STATES.PLAYING) {
    if (x > W - 50 && y < 50) { togglePause(); return; }
    const lane = getLaneFromX(x);
    if (lane >= 0) handleLaneInput(lane);
  }
  if (state === STATES.PAUSE) togglePause();
  if (state === STATES.CONFIRM_MODAL) {
    const cx = W / 2, cy = H / 2;
    if (y > cy + 10 && y < cy + 50) {
      if (x < cx) confirmRestart();
      else cancelModal();
    }
  }
}
function onMouseUp(e) {
  if (state === STATES.PLAYING) {
    const lane = getLaneFromX(e.clientX);
    if (lane >= 0) handleLaneRelease(lane);
  }
}

// ── 상태 전환 ────────────────────────────
function beginTransition(targetState, tweenConfig) {
  if (transitioning) return false;
  if (STATE_PRIORITY[state] >= STATE_PRIORITY[targetState]) return false;
  transitioning = true;

  if (tweenConfig) {
    tw.add(tweenConfig.target, tweenConfig.props, tweenConfig.duration,
      tweenConfig.easing, () => {
        state = targetState;
        transitioning = false;
        enterState(targetState);
        if (tweenConfig.onComplete) tweenConfig.onComplete();
      });
  } else {
    state = targetState;
    transitioning = false;
    enterState(targetState);
  }
  return true;
}

// 상태 진입 시 초기화 (Cycle 4 글로우 미복구 해결)
function enterState(s) {
  switch(s) {
    case STATES.TITLE:
      // 타이틀 글로우 tween 시작
      pulseTitle();
      if (audioCtx) audioCtx.suspend().catch(()=>{});
      break;
    case STATES.PLAYING:
      if (audioCtx) audioCtx.resume().catch(()=>{});
      break;
    case STATES.PAUSE:
      if (audioCtx) audioCtx.suspend().catch(()=>{});
      pauseAnim.alpha = 0;
      tw.add(pauseAnim, { alpha: 1 }, 200, 'easeOutQuad');
      break;
    case STATES.CONFIRM_MODAL:
      modalAnim.alpha = 0;
      tw.add(modalAnim, { alpha: 1 }, 200, 'easeOutQuad');
      break;
    case STATES.GAMEOVER:
      if (audioCtx) audioCtx.suspend().catch(()=>{});
      calculateResults();
      startResultSequence();
      break;
  }
}

// 타이틀 글로우 펄스 반복 tween
function pulseTitle() {
  hud.titleGlow = 0.7;
  tw.add(hud, { titleGlow: 1 }, 800, 'easeOutQuad', () => {
    if (state === STATES.TITLE) {
      tw.add(hud, { titleGlow: 0.7 }, 800, 'easeOutQuad', () => {
        if (state === STATES.TITLE) pulseTitle();
      });
    }
  });
}

// ── 게임 액션 ────────────────────────────
function startGame() {
  initAudio();
  resetGame();
  // tween으로 타이틀 fadeOut → PLAYING
  hud.titleAlpha = 1;
  tw.add(hud, { titleAlpha: 0 }, 300, 'easeOutQuad', () => {
    state = STATES.PLAYING;
    transitioning = false;
    enterState(STATES.PLAYING);
    if (audioCtx) {
      gameStartAudioTime = audioCtx.currentTime + 0.5;
      nextBeatTime = gameStartAudioTime;
    }
  });
  transitioning = true;
}

function resetGame() {
  tw.clearImmediate(); // ⭐ cancelAll이 아닌 clearImmediate 사용!
  notePool.clear(); particlePool.clear(); wavePool.clear();

  score = 0; combo = 0; maxCombo = 0; hp = 100;
  perfectCount = 0; greatCount = 0; goodCount = 0; missCount = 0;
  consecutivePerfects = 0; consecutiveMisses = 0;
  elapsedTime = 0; bpm = 100; noteSpeed = 200;
  beatIndex = 0; nextBeatTime = 0;
  densityMod = 1.0; feverActive = false;
  laneFlash = [0, 0, 0, 0];
  kickFlash = 0;
  judgeText = { label: '', color: '#fff', alpha: 0, y: 0 };
  longNoteActive[0] = longNoteActive[1] = longNoteActive[2] = longNoteActive[3] = null;
  hud.comboScale = 1; hud.scoreFlash = 0; hud.bpmScale = 1;
  initFloaters();

  // 플레이 횟수 증가
  setLS('br_totalPlays', getLS('br_totalPlays', 0) + 1);
}

function togglePause() {
  if (state === STATES.PLAYING) {
    state = STATES.PAUSE;
    enterState(STATES.PAUSE);
  } else if (state === STATES.PAUSE) {
    state = STATES.PLAYING;
    enterState(STATES.PLAYING);
  }
}

function showConfirmModal() {
  if (state === STATES.PAUSE) {
    state = STATES.CONFIRM_MODAL;
    enterState(STATES.CONFIRM_MODAL);
  }
}

function confirmRestart() {
  goToTitle();
}

function cancelModal() {
  tw.add(modalAnim, { alpha: 0 }, 200, 'easeOutQuad', () => {
    state = STATES.PAUSE;
  });
}

function goToTitle() {
  tw.clearImmediate();
  notePool.clear(); particlePool.clear(); wavePool.clear();
  state = STATES.TITLE;
  transitioning = false;
  enterState(STATES.TITLE);
}

// ── 결과 계산 ────────────────────────────
function calculateResults() {
  // ⚠️ "판정 먼저, 저장 나중에" (Cycle 2 B4 교훈)
  const isNewBest = score > getLS('br_bestScore', 0);
  const isNewCombo = maxCombo > getLS('br_bestCombo', 0);
  const totalNotes = perfectCount + greatCount + goodCount + missCount;
  const isFullCombo = missCount === 0 && totalNotes > 0;

  // Full Combo 보너스
  if (isFullCombo) score = Math.round(score * 1.5);

  resultData = {
    score, maxCombo, isNewBest, isNewCombo, isFullCombo,
    perfectCount, greatCount, goodCount, missCount,
    prevBest: getLS('br_bestScore', 0),
    elapsedTime,
    totalNotes
  };

  // 저장
  if (isNewBest) setLS('br_bestScore', score);
  if (isNewCombo) setLS('br_bestCombo', maxCombo);
  setLS('br_totalPerfects', getLS('br_totalPerfects', 0) + perfectCount);
}

function startResultSequence() {
  resultAnim.alpha = 0;
  resultAnim.scoreY = 20; resultAnim.comboY = 20;
  resultAnim.timeY = 20; resultAnim.judgeY = 20;
  resultAnim.newBestScale = 0;

  tw.add(resultAnim, { alpha: 1 }, 300, 'easeOutQuad');
  tw.add(resultAnim, { scoreY: 0 }, 400, 'easeOutQuad');
  // 순차 fadeIn을 위한 지연 — tween chain으로 구현 (setTimeout 금지)
  const dummy1 = { _: 0 };
  tw.add(dummy1, { _: 1 }, 200, 'linear', () => {
    tw.add(resultAnim, { comboY: 0 }, 400, 'easeOutQuad');
  });
  const dummy2 = { _: 0 };
  tw.add(dummy2, { _: 1 }, 400, 'linear', () => {
    tw.add(resultAnim, { timeY: 0 }, 400, 'easeOutQuad');
  });
  const dummy3 = { _: 0 };
  tw.add(dummy3, { _: 1 }, 600, 'linear', () => {
    tw.add(resultAnim, { judgeY: 0 }, 400, 'easeOutQuad');
  });
  if (resultData.isNewBest) {
    const dummy4 = { _: 0 };
    tw.add(dummy4, { _: 1 }, 800, 'linear', () => {
      tw.add(resultAnim, { newBestScale: 1 }, 600, 'easeOutElastic');
    });
  }
}

// ── 렌더링 ───────────────────────────────

// 배경 그라데이션 (비트 반응)
function renderBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const flash = Math.max(0, kickFlash * 0.15);
  const r1 = Math.min(255, 10 + flash * 255);
  const g1 = Math.min(255, 10 + flash * 100);
  const b1 = Math.min(255, 20 + flash * 100);
  grad.addColorStop(0, `rgb(${r1|0},${g1|0},${b1|0})`);
  grad.addColorStop(1, '#0F0A1E');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

}

// 격자 그리드 (offscreen 캐시, BPM 진동)
function renderGrid() {
  const alpha = gridAlpha + Math.sin(elapsedTime * bpm / 30 * Math.PI) * 0.05;
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.drawImage(gridCanvas, 0, 0, W, H);
  ctx.globalAlpha = 1;
}

// 레인 배경
function renderLanes() {
  for (let i = 0; i < 4; i++) {
    const x = laneXs[i] - laneW / 2;
    // 기본 레인 배경
    ctx.fillStyle = 'rgba(18,18,42,0.6)';
    ctx.fillRect(x, 0, laneW, H);

    // 입력 플래시
    if (laneFlash[i] > 0) {
      ctx.fillStyle = LANE_COLORS[i];
      ctx.globalAlpha = laneFlash[i] * 0.2;
      ctx.fillRect(x, 0, laneW, H);
      ctx.globalAlpha = 1;
      laneFlash[i] = Math.max(0, laneFlash[i] - 0.05);
    } else if (laneFlash[i] < 0) {
      ctx.fillStyle = '#FF1744';
      ctx.globalAlpha = Math.abs(laneFlash[i]) * 0.3;
      ctx.fillRect(x, 0, laneW, H);
      ctx.globalAlpha = 1;
      laneFlash[i] = Math.min(0, laneFlash[i] + 0.05);
    }

    // 레인 구분선
    ctx.strokeStyle = 'rgba(42,42,94,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.moveTo(x + laneW, 0); ctx.lineTo(x + laneW, H);
    ctx.stroke();
  }
}

// 원형 파동
function renderWaves() {
  wavePool.forEach(w => {
    const progress = w.life / w.maxLife;
    ctx.strokeStyle = w.color;
    ctx.globalAlpha = 1 - progress;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
}

// 노트 렌더링
function renderNotes() {
  notePool.forEach(n => {
    if (!n.active) return;
    const x = laneXs[n.lane];
    const color = LANE_COLORS[n.lane];

    // 롱 노트 꼬리
    if (n.type === 'long') {
      const tailTop = Math.max(0, n.longStartY);
      const tailBot = Math.min(H, n.y);
      if (tailBot > tailTop) {
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(x - NOTE_W / 2, tailTop, NOTE_W, tailBot - tailTop);
        // 중앙 밝은 선
        ctx.fillStyle = '#FFFFFF';
        ctx.globalAlpha = 0.2;
        ctx.fillRect(x - 1, tailTop, 2, tailBot - tailTop);
        ctx.globalAlpha = 1;
      }
    }

    // 노트 헤드 (둥근 사각형)
    drawNote(x, n.y, color);
  });

  // 동시 노트 연결선 (같은 targetTime의 노트들)
  const activeNotes = [];
  notePool.forEach(n => { if (n.active && !n.judged) activeNotes.push(n); });
  for (let i = 0; i < activeNotes.length; i++) {
    for (let j = i + 1; j < activeNotes.length; j++) {
      if (Math.abs(activeNotes[i].targetTime - activeNotes[j].targetTime) < 0.01) {
        const a = activeNotes[i], b = activeNotes[j];
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(laneXs[a.lane], a.y);
        ctx.lineTo(laneXs[b.lane], b.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }
}

// 노트 도형 (둥근 사각형)
function drawNote(cx, cy, color) {
  const x = cx - NOTE_W / 2, y = cy - NOTE_H / 2;
  const r = 4;
  // 본체
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + NOTE_W - r, y);
  ctx.arcTo(x + NOTE_W, y, x + NOTE_W, y + r, r);
  ctx.lineTo(x + NOTE_W, y + NOTE_H - r);
  ctx.arcTo(x + NOTE_W, y + NOTE_H, x + NOTE_W - r, y + NOTE_H, r);
  ctx.lineTo(x + r, y + NOTE_H);
  ctx.arcTo(x, y + NOTE_H, x, y + NOTE_H - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  ctx.fill();

  // 밝은 테두리
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 상단 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(x + 2, y + 1, NOTE_W - 4, 1);
}

// 판정 라인
function renderJudgeLine() {
  // 글로우
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, judgeLineY - 6, W, 14);

  // 라인
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillRect(0, judgeLineY - 1, W, 2);

  // 키 가이드 또는 레인 하이라이트
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  if (inputMode === 'keyboard') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 4; i++) {
      ctx.fillText(LANE_KEYS[i].toUpperCase(), laneXs[i], judgeLineY + 20);
    }
  } else {
    // 터치/마우스: 레인 영역 하이라이트
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = LANE_COLORS[i];
      ctx.globalAlpha = 0.1;
      ctx.fillRect(laneXs[i] - laneW / 2, judgeLineY + 2, laneW, 30);
      ctx.globalAlpha = 1;
    }
  }
}

// 판정 이펙트 파티클
function renderParticles() {
  particlePool.forEach(p => {
    const progress = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - progress;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (1 - progress * 0.5), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

}

// 판정 텍스트
function renderJudgeText() {
  if (judgeText.alpha <= 0.01) return;
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = judgeText.color;
  ctx.globalAlpha = judgeText.alpha;
  ctx.fillText(judgeText.label, W / 2, judgeText.y);
  ctx.globalAlpha = 1;
}

// HP 바 (좌측 세로)
function renderHP() {
  const barX = 6, barW = 8;
  const barTop = 40, barH = H - 100;
  const fillH = barH * (hp / 100);

  // 배경
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  roundRect(ctx, barX, barTop, barW, barH, 4);
  ctx.fill();

  // HP 색상
  let hpColor;
  if (hp >= 60) hpColor = '#00E676';
  else if (hp >= 30) hpColor = '#FFD740';
  else hpColor = '#FF1744';

  // HP 30 이하 깜빡임
  if (hp <= 30) {
    ctx.globalAlpha = 0.5 + Math.sin(elapsedTime * 6) * 0.5;
  }

  // 채우기
  ctx.fillStyle = hpColor;
  roundRect(ctx, barX, barTop + barH - fillH, barW, fillH, 4);
  ctx.fill();
  ctx.globalAlpha = 1;

  // HP 라벨
  ctx.fillStyle = hpColor;
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('HP', barX + barW / 2, barTop - 8);

  // HP 30이하 → 화면 가장자리 적색 비네트
  if (hp <= 30) {
    const vAlpha = (1 - hp / 30) * 0.3;
    const vGrad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    vGrad.addColorStop(0, 'rgba(255,23,68,0)');
    vGrad.addColorStop(1, `rgba(255,23,68,${vAlpha})`);
    ctx.fillStyle = vGrad;
    ctx.fillRect(0, 0, W, H);
  }
}

// 콤보 카운터 (중앙 상단)
function renderCombo() {
  if (combo <= 0) return;
  ctx.save();
  ctx.translate(W / 2, 32);
  ctx.scale(hud.comboScale, hud.comboScale);
  ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  // 글로우
  ctx.fillStyle = 'rgba(0,229,255,0.2)';
  ctx.fillText(combo, 1, 1);
  // 메인 텍스트
  ctx.fillStyle = '#00E5FF';
  ctx.fillText(combo, 0, 0);
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(0,229,255,0.7)';
  ctx.fillText('COMBO', 0, 18);
  ctx.restore();
}

// 점수 (우상단)
function renderScore() {
  const flash = hud.scoreFlash;
  const alpha = 0.8 + flash * 0.2;

  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = `rgba(224,224,224,${alpha})`;
  ctx.fillText(score.toLocaleString(), W - 20, 24);
}

// BPM 표시 (우하단)
function renderBPM() {
  ctx.save();
  ctx.translate(W - 30, H - 16);
  ctx.scale(hud.bpmScale, hud.bpmScale);
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#D500F9';
  ctx.fillText(`♪ ${Math.round(bpm)} BPM`, 0, 0);
  ctx.restore();
}

// 부유 파티클
function renderFloaters() {
  floaters.forEach(f => {
    ctx.fillStyle = f.color;
    ctx.globalAlpha = f.alpha;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// 일시정지 버튼 (마우스/터치 모드)
function renderPauseBtn() {
  if (inputMode === 'keyboard') return;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(W - 40, 10, 4, 14);
  ctx.fillRect(W - 32, 10, 4, 14);
}

// ── 화면 렌더링 ──────────────────────────

// 로딩 화면
function renderLoading() {
  ctx.fillStyle = '#0A0A14';
  ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('LOADING...', W / 2, H / 2);
}

// 타이틀 화면
function renderTitle() {
  renderBackground();
  renderGrid();
  renderFloaters();

  const cx = W / 2, cy = H / 2;

  // 타이틀 텍스트
  ctx.save();
  ctx.translate(cx, cy - 50);

  // 레인 4색 네온 글로우
  const glowAlpha = hud.titleGlow;
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = LANE_COLORS[i];
    ctx.globalAlpha = glowAlpha * 0.15;
    ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('비트 러시', Math.cos(i * Math.PI / 2) * 3, Math.sin(i * Math.PI / 2) * 3);
  }
  ctx.globalAlpha = glowAlpha;
  ctx.fillStyle = '#E0E0F0';
  ctx.fillText('비트 러시', 0, 0);

  ctx.globalAlpha = glowAlpha * 0.8;
  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00E5FF';
  ctx.fillText('BEAT RUSH', 0, 28);
  ctx.restore();

  // 음표 아이콘
  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#D500F9';
  ctx.globalAlpha = 0.5 + Math.sin(elapsedTitleTime * 2) * 0.3;
  ctx.fillText('♪  ♫  ♪', cx, cy + 5);
  ctx.globalAlpha = 1;

  // 최고 기록
  const best = getLS('br_bestScore', 0);
  const bestCombo = getLS('br_bestCombo', 0);
  if (best > 0) {
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#8080a0';
    ctx.fillText(`BEST: ${best.toLocaleString()}pts  |  ${bestCombo} COMBO`, cx, cy + 30);
  }

  // 시작 안내
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.globalAlpha = 0.5 + Math.sin(elapsedTitleTime * 3) * 0.3;
  const startText = inputMode === 'keyboard' ? 'SPACE / ENTER 로 시작' :
                    inputMode === 'touch' ? '탭하여 시작' : '클릭하여 시작';
  ctx.fillText(startText, cx, cy + 60);
  ctx.globalAlpha = 1;

  // 조작 안내
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#505070';
  ctx.fillText('D  F  J  K : 4레인 입력    P : 일시정지', cx, cy + 90);

  // 4색 레인 미니 가이드
  for (let i = 0; i < 4; i++) {
    const gx = cx - 45 + i * 30;
    ctx.fillStyle = LANE_COLORS[i];
    ctx.globalAlpha = 0.5;
    ctx.fillRect(gx - 8, cy + 100, 16, 4);
    ctx.globalAlpha = 1;
  }
}

// 게임 화면 (PLAYING 기본 렌더)
function renderGame() {
  renderBackground();
  renderGrid();
  renderLanes();
  renderWaves();
  renderNotes();
  renderJudgeLine();
  renderParticles();
  renderJudgeText();
  renderHP();
  renderCombo();
  renderScore();
  renderBPM();
  renderFloaters();
  renderPauseBtn();
}

// 일시정지 오버레이
function renderPause() {
  ctx.fillStyle = `rgba(0,0,0,${pauseAnim.alpha * 0.6})`;
  ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#E0E0F0';
  ctx.globalAlpha = pauseAnim.alpha;
  ctx.fillText('PAUSED', W / 2, H / 2 - 20);

  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  const resumeText = inputMode === 'keyboard' ? 'P키로 재개  |  R키로 포기' :
                     inputMode === 'touch' ? '탭하여 재개' : '클릭하여 재개';
  ctx.fillText(resumeText, W / 2, H / 2 + 15);
  ctx.globalAlpha = 1;
}

// 확인 모달 오버레이 (Canvas 기반 — confirm() 금지)
function renderModal() {
  ctx.fillStyle = `rgba(0,0,0,${modalAnim.alpha * 0.7})`;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.globalAlpha = modalAnim.alpha;

  // 모달 박스
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = '#2A2A5E';
  ctx.lineWidth = 2;
  roundRect(ctx, cx - 120, cy - 50, 240, 100, 8);
  ctx.fill(); ctx.stroke();

  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#E0E0F0';
  ctx.fillText('게임을 포기하시겠습니까?', cx, cy - 20);

  // 예/아니오 버튼
  ctx.fillStyle = '#FF1744';
  roundRect(ctx, cx - 100, cy + 10, 80, 35, 6);
  ctx.fill();
  ctx.fillStyle = '#2979FF';
  roundRect(ctx, cx + 20, cy + 10, 80, 35, 6);
  ctx.fill();

  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#E0E0F0';
  ctx.fillText('예 (Y)', cx - 60, cy + 33);
  ctx.fillText('아니오 (N)', cx + 60, cy + 33);

  ctx.globalAlpha = 1;
}

// 게임오버 결과 화면
function renderGameover() {
  // 반투명 검정 오버레이
  ctx.fillStyle = `rgba(0,0,0,${resultAnim.alpha * 0.7})`;
  ctx.fillRect(0, 0, W, H);

  if (resultAnim.alpha < 0.1) return;

  const cx = W / 2;
  let baseY = H * 0.18;
  ctx.textAlign = 'center';
  ctx.globalAlpha = resultAnim.alpha;

  // GAME OVER 제목
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FF1744';
  ctx.fillText('GAME OVER', cx, baseY);

  // 점수
  baseY += 50;
  ctx.globalAlpha = Math.max(0, 1 - resultAnim.scoreY / 20) * resultAnim.alpha;
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('SCORE', cx, baseY + resultAnim.scoreY);
  ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#E0E0F0';
  ctx.fillText(resultData.score?.toLocaleString() || '0', cx, baseY + 22 + resultAnim.scoreY);

  // 최대 콤보
  baseY += 55;
  ctx.globalAlpha = Math.max(0, 1 - resultAnim.comboY / 20) * resultAnim.alpha;
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('MAX COMBO', cx, baseY + resultAnim.comboY);
  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00E5FF';
  ctx.fillText(resultData.maxCombo || 0, cx, baseY + 20 + resultAnim.comboY);

  // 플레이 시간
  baseY += 50;
  ctx.globalAlpha = Math.max(0, 1 - resultAnim.timeY / 20) * resultAnim.alpha;
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  const mins = Math.floor((resultData.elapsedTime || 0) / 60);
  const secs = Math.floor((resultData.elapsedTime || 0) % 60);
  ctx.fillText(`TIME  ${mins}:${secs.toString().padStart(2, '0')}`, cx, baseY + resultAnim.timeY);

  // 판정 통계
  baseY += 35;
  ctx.globalAlpha = Math.max(0, 1 - resultAnim.judgeY / 20) * resultAnim.alpha;
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  const stats = [
    { label: 'Perfect', val: resultData.perfectCount, color: '#FFD740' },
    { label: 'Great', val: resultData.greatCount, color: '#00E5FF' },
    { label: 'Good', val: resultData.goodCount, color: '#AAAAAA' },
    { label: 'Miss', val: resultData.missCount, color: '#FF1744' }
  ];
  const totalW = stats.length * 70;
  stats.forEach((s, i) => {
    const sx = cx - totalW / 2 + i * 70 + 35;
    ctx.fillStyle = s.color;
    ctx.fillText(s.label, sx, baseY + resultAnim.judgeY);
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(s.val || 0, sx, baseY + 16 + resultAnim.judgeY);
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  });

  // Full Combo
  if (resultData.isFullCombo) {
    baseY += 40;
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#FFD740';
    ctx.fillText('★ FULL COMBO ★', cx, baseY);
  }

  // NEW BEST
  if (resultData.isNewBest && resultAnim.newBestScale > 0) {
    baseY += 30;
    ctx.save();
    ctx.translate(cx, baseY);
    ctx.scale(resultAnim.newBestScale, resultAnim.newBestScale);
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#FFD740';
    ctx.fillText('🏆 NEW BEST!', 0, 0);
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#8080a0';
    ctx.fillText(`이전: ${(resultData.prevBest || 0).toLocaleString()}`, 0, 18);
    ctx.restore();
  }

  // 재시작 안내
  ctx.globalAlpha = resultAnim.alpha * (0.5 + Math.sin(Date.now() / 500) * 0.3);
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  const restartText = inputMode === 'keyboard' ? 'R키 / SPACE로 재시작' :
                      inputMode === 'touch' ? '탭하여 재시작' : '클릭하여 재시작';
  ctx.fillText(restartText, cx, H * 0.88);
  ctx.globalAlpha = 1;
}

// 둥근 사각형 헬퍼
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r);
  c.closePath();
}

// ── 메인 루프 ────────────────────────────
let elapsedTitleTime = 0;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 최대 50ms 캡
  lastTime = timestamp;

  switch (state) {
    case STATES.LOADING:
      renderLoading();
      break;

    case STATES.TITLE:
      elapsedTitleTime += dt;
      tw.update(dt);
      updateFloaters(dt);
      renderTitle();
      break;

    case STATES.PLAYING:
      elapsedTime += dt;
      beatSchedulerUpdate();
      updateNotes(dt);
      updateParticles(dt);
      updateFloaters(dt);
      // 비트 비주얼 감쇠
      kickFlash = Math.max(0, kickFlash - dt * 4);
      tw.update(dt);
      renderGame();
      break;

    case STATES.PAUSE:
      tw.update(dt);
      renderGame();
      renderPause();
      break;

    case STATES.CONFIRM_MODAL:
      tw.update(dt);
      renderGame();
      renderModal();
      break;

    case STATES.GAMEOVER:
      tw.update(dt);
      updateParticles(dt); // 마지막 이펙트 자연 소멸
      kickFlash = Math.max(0, kickFlash - dt * 2); // 느린 감쇠
      renderGame();
      renderGameover();
      break;
  }

  rafId = requestAnimationFrame(loop);
}

// ── 초기화 ───────────────────────────────
async function init() {
  resize();

  // 이벤트 리스너 등록 (destroy 패턴)
  listen(window, 'resize', resize);
  listen(window, 'keydown', onKeyDown);
  listen(window, 'keyup', onKeyUp);
  listen(canvas, 'touchstart', onTouchStart, { passive: false });
  listen(canvas, 'touchend', onTouchEnd, { passive: false });
  listen(canvas, 'mousedown', onMouseDown);
  listen(canvas, 'mouseup', onMouseUp);

  // 컨텍스트 메뉴 방지
  listen(canvas, 'contextmenu', e => e.preventDefault());

  // 로딩 화면 표시
  renderLoading();

  // 부유 파티클 초기화
  initFloaters();

  // 타이틀로 전환
  state = STATES.TITLE;
  elapsedTitleTime = 0;
  enterState(STATES.TITLE);

  lastTime = performance.now();
  rafId = requestAnimationFrame(loop);
}

init();
</script>
