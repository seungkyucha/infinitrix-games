<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="15%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitWave1" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#D500F9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitWave2" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#D500F9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D500F9" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="#FF1744" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB00" stop-opacity="0"/>
      <stop offset="70%" stop-color="#FFAB00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFAB00" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitGlowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outermost wave ring -->
  <circle cx="48" cy="48" r="46" fill="url(#hitOuter)"/>
  <!-- Second wave ring -->
  <circle cx="48" cy="48" r="38" fill="url(#hitWave2)"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#D500F9" stroke-width="1" opacity="0.2"/>
  <!-- Inner wave ring -->
  <circle cx="48" cy="48" r="26" fill="url(#hitWave1)"/>
  <circle cx="48" cy="48" r="26" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>
  <!-- Light rays (8 directions) -->
  <g filter="url(#rayGlow)" opacity="0.6">
    <!-- Vertical/Horizontal -->
    <line x1="48" y1="8" x2="48" y2="22" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="74" x2="48" y2="88" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="48" x2="22" y2="48" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="74" y1="48" x2="88" y2="48" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <!-- Diagonals -->
    <line x1="16" y1="16" x2="26" y2="26" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="16" x2="70" y2="26" stroke="#D500F9" stroke-width="1.5" opacity="0.5"/>
    <line x1="16" y1="80" x2="26" y2="70" stroke="#FFAB00" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="80" x2="70" y2="70" stroke="#FF1744" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Scattered particles -->
  <g filter="url(#hitGlow)">
    <circle cx="30" cy="20" r="2.5" fill="#FF1744" opacity="0.7"/>
    <circle cx="68" cy="22" r="2" fill="#2979FF" opacity="0.6"/>
    <circle cx="22" cy="60" r="2.2" fill="#00E676" opacity="0.6"/>
    <circle cx="72" cy="65" r="2.5" fill="#FFAB00" opacity="0.7"/>
    <circle cx="38" cy="75" r="1.8" fill="#D500F9" opacity="0.5"/>
    <circle cx="60" cy="78" r="2" fill="#00E5FF" opacity="0.5"/>
    <circle cx="18" cy="38" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="78" cy="40" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <!-- Central bright core -->
  <g filter="url(#hitGlowStrong)">
    <circle cx="48" cy="48" r="12" fill="url(#hitCore)"/>
    <circle cx="48" cy="48" r="5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <!-- Musical note burst shapes -->
  <g filter="url(#rayGlow)" opacity="0.35">
    <path d="M35 30 L35 22 Q38 21 38 24 Q38 26 35 25" fill="#FF1744" stroke="none"/>
    <path d="M62 32 L62 24 Q65 23 65 26 Q65 28 62 27" fill="#2979FF" stroke="none"/>
    <path d="M28 52 L28 44 Q31 43 31 46 Q31 48 28 47" fill="#00E676" stroke="none"/>
    <path d="M66 56 L66 48 Q69 47 69 50 Q69 52 66 51" fill="#FFAB00" stroke="none"/>
  </g>
</svg>