<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#0F0A1E"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="25%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#D500F9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="20%" r="25%">
      <stop offset="0%" stop-color="#2979FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2979FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="60%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigStarGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Deep space background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- Nebula clouds -->
  <rect width="800" height="600" fill="url(#nebula1)"/>
  <rect width="800" height="600" fill="url(#nebula2)"/>
  <rect width="800" height="600" fill="url(#nebula3)"/>
  <!-- Grid lines (subtle rhythm grid) -->
  <g opacity="0.06" stroke="#2A2A5E" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="40" y1="0" x2="40" y2="600"/>
    <line x1="80" y1="0" x2="80" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/><line x1="280" y1="0" x2="280" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="440" y1="0" x2="440" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/><line x1="520" y1="0" x2="520" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/><line x1="680" y1="0" x2="680" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/><line x1="760" y1="0" x2="760" y2="600"/>
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/><line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="520" x2="800" y2="520"/><line x1="0" y1="560" x2="800" y2="560"/>
  </g>
  <!-- Small stars scattered -->
  <g filter="url(#starGlow)">
    <circle cx="45" cy="28" r="1.2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="120" cy="85" r="0.8" fill="#00E5FF" opacity="0.6"/>
    <circle cx="200" cy="42" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="310" cy="110" r="0.9" fill="#D500F9" opacity="0.5"/>
    <circle cx="380" cy="35" r="1.3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="450" cy="78" r="0.7" fill="#2979FF" opacity="0.6"/>
    <circle cx="530" cy="22" r="1.1" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="620" cy="95" r="0.8" fill="#00E676" opacity="0.5"/>
    <circle cx="700" cy="55" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="760" cy="130" r="0.9" fill="#FF1744" opacity="0.4"/>
    <circle cx="88" cy="180" r="0.7" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="175" cy="220" r="1.2" fill="#FFAB00" opacity="0.4"/>
    <circle cx="290" cy="195" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="410" cy="170" r="1" fill="#00E5FF" opacity="0.5"/>
    <circle cx="555" cy="200" r="0.9" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="660" cy="185" r="1.1" fill="#D500F9" opacity="0.4"/>
    <circle cx="730" cy="250" r="0.7" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="60" cy="320" r="0.8" fill="#2979FF" opacity="0.5"/>
    <circle cx="150" cy="380" r="1" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="340" cy="310" r="0.9" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="490" cy="350" r="0.7" fill="#00E676" opacity="0.4"/>
    <circle cx="580" cy="290" r="1.2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="720" cy="340" r="0.8" fill="#FFAB00" opacity="0.5"/>
    <circle cx="100" cy="450" r="0.9" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="250" cy="480" r="1" fill="#FF1744" opacity="0.3"/>
    <circle cx="400" cy="440" r="0.7" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="550" cy="470" r="0.8" fill="#D500F9" opacity="0.4"/>
    <circle cx="680" cy="510" r="1.1" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <!-- Larger accent stars -->
  <g filter="url(#bigStarGlow)">
    <circle cx="160" cy="120" r="2.5" fill="#00E5FF" opacity="0.5"/>
    <circle cx="500" cy="60" r="2" fill="#D500F9" opacity="0.4"/>
    <circle cx="650" cy="240" r="2.2" fill="#2979FF" opacity="0.35"/>
    <circle cx="350" cy="400" r="1.8" fill="#FFAB00" opacity="0.3"/>
  </g>
  <!-- Distant horizon glow -->
  <ellipse cx="400" cy="600" rx="500" ry="120" fill="#D500F9" opacity="0.03"/>
  <ellipse cx="400" cy="600" rx="350" ry="80" fill="#00E5FF" opacity="0.04"/>
  <!-- Subtle sound wave arcs in the sky -->
  <g opacity="0.04" fill="none" stroke="#00E5FF" stroke-width="1">
    <path d="M150 250 Q250 220 350 250 Q450 280 550 250"/>
    <path d="M200 300 Q300 275 400 300 Q500 325 600 300"/>
    <path d="M100 350 Q250 320 400 350 Q550 380 700 350"/>
  </g>
</svg>