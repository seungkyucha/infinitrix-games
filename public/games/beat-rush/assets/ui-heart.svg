<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#C51162"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#FF1744" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <ellipse cx="16" cy="17" rx="14" ry="13" fill="url(#heartAura)"/>
  <!-- Heart shape -->
  <g filter="url(#hGlow)">
    <path d="M16 28 C8 22 2 16 2 11 C2 6 6 3 10 3 C12.5 3 14.5 4.5 16 7 C17.5 4.5 19.5 3 22 3 C26 3 30 6 30 11 C30 16 24 22 16 28 Z" fill="url(#heartGrad)"/>
  </g>
  <!-- Shine highlight -->
  <path d="M10 9 C10 6.5 12 5 14 6 C12 5.5 10.5 7 10.5 9 Z" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="11" cy="10" rx="3" ry="2.5" fill="url(#heartShine)"/>
  <!-- Neon pulse ring -->
  <path d="M16 27 C9 21 3 16 3 11 C3 6.5 6.5 4 10 4 C12.3 4 14.3 5 16 7.5 C17.7 5 19.7 4 22 4 C25.5 4 29 6.5 29 11 C29 16 23 21 16 27 Z" fill="none" stroke="#FF5252" stroke-width="0.8" opacity="0.4"/>
</svg>