<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bldg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12122A"/>
      <stop offset="100%" stop-color="#08081A"/>
    </linearGradient>
    <linearGradient id="roadGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D500F9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="laneGlowL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="laneGlowR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFAB00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFAB00" stop-opacity="0"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Building silhouettes - far layer -->
  <g opacity="0.5">
    <!-- Far buildings -->
    <rect x="20" y="280" width="60" height="320" fill="url(#bldg2)"/>
    <rect x="90" y="310" width="45" height="290" fill="url(#bldg2)"/>
    <rect x="145" y="260" width="55" height="340" fill="url(#bldg2)"/>
    <rect x="220" y="300" width="40" height="300" fill="url(#bldg2)"/>
    <rect x="520" y="290" width="50" height="310" fill="url(#bldg2)"/>
    <rect x="590" y="270" width="60" height="330" fill="url(#bldg2)"/>
    <rect x="665" y="310" width="45" height="290" fill="url(#bldg2)"/>
    <rect x="720" y="255" width="55" height="345" fill="url(#bldg2)"/>
  </g>
  <!-- Closer building silhouettes -->
  <g opacity="0.7">
    <rect x="0" y="340" width="70" height="260" fill="url(#bldg1)"/>
    <rect x="80" y="360" width="50" height="240" fill="url(#bldg1)"/>
    <rect x="140" y="320" width="65" height="280" fill="url(#bldg1)"/>
    <rect x="550" y="350" width="55" height="250" fill="url(#bldg1)"/>
    <rect x="620" y="330" width="70" height="270" fill="url(#bldg1)"/>
    <rect x="700" y="310" width="60" height="290" fill="url(#bldg1)"/>
    <rect x="770" y="350" width="40" height="250" fill="url(#bldg1)"/>
  </g>
  <!-- Neon window lights on buildings -->
  <g filter="url(#windowGlow)">
    <!-- Left buildings -->
    <rect x="30" y="295" width="3" height="3" fill="#00E5FF" opacity="0.7"/>
    <rect x="40" y="305" width="3" height="3" fill="#D500F9" opacity="0.6"/>
    <rect x="50" y="315" width="3" height="3" fill="#FF1744" opacity="0.5"/>
    <rect x="35" y="330" width="3" height="3" fill="#FFAB00" opacity="0.6"/>
    <rect x="45" y="345" width="3" height="3" fill="#2979FF" opacity="0.5"/>
    <rect x="28" y="360" width="3" height="3" fill="#00E676" opacity="0.6"/>
    <rect x="100" y="325" width="3" height="3" fill="#D500F9" opacity="0.5"/>
    <rect x="110" y="340" width="3" height="3" fill="#00E5FF" opacity="0.6"/>
    <rect x="105" y="370" width="3" height="3" fill="#FFAB00" opacity="0.4"/>
    <rect x="155" y="280" width="3" height="3" fill="#FF1744" opacity="0.6"/>
    <rect x="170" y="300" width="3" height="3" fill="#00E5FF" opacity="0.7"/>
    <rect x="160" y="335" width="3" height="3" fill="#2979FF" opacity="0.5"/>
    <rect x="180" y="350" width="3" height="3" fill="#00E676" opacity="0.6"/>
    <rect x="165" y="375" width="3" height="3" fill="#D500F9" opacity="0.4"/>
    <!-- Right buildings -->
    <rect x="540" y="310" width="3" height="3" fill="#00E5FF" opacity="0.6"/>
    <rect x="550" y="340" width="3" height="3" fill="#FF1744" opacity="0.5"/>
    <rect x="560" y="365" width="3" height="3" fill="#FFAB00" opacity="0.6"/>
    <rect x="630" y="290" width="3" height="3" fill="#D500F9" opacity="0.7"/>
    <rect x="645" y="310" width="3" height="3" fill="#00E676" opacity="0.5"/>
    <rect x="635" y="345" width="3" height="3" fill="#2979FF" opacity="0.6"/>
    <rect x="660" y="360" width="3" height="3" fill="#00E5FF" opacity="0.4"/>
    <rect x="715" y="275" width="3" height="3" fill="#FF1744" opacity="0.6"/>
    <rect x="730" y="300" width="3" height="3" fill="#FFAB00" opacity="0.5"/>
    <rect x="720" y="330" width="3" height="3" fill="#D500F9" opacity="0.6"/>
    <rect x="740" y="355" width="3" height="3" fill="#00E5FF" opacity="0.5"/>
  </g>
  <!-- Neon sign accents on buildings -->
  <g filter="url(#neonGlow)">
    <line x1="15" y1="345" x2="55" y2="345" stroke="#D500F9" stroke-width="1.5" opacity="0.5"/>
    <line x1="155" y1="325" x2="190" y2="325" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>
    <line x1="615" y1="340" x2="670" y2="340" stroke="#FF1744" stroke-width="1.5" opacity="0.4"/>
    <line x1="710" y1="315" x2="750" y2="315" stroke="#FFAB00" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Central lane area (rhythm highway) -->
  <g opacity="0.6">
    <!-- Road surface -->
    <rect x="250" y="250" width="300" height="350" fill="#12122A" opacity="0.7"/>
    <!-- Lane dividers -->
    <line x1="325" y1="250" x2="325" y2="600" stroke="#2A2A5E" stroke-width="1" opacity="0.3"/>
    <line x1="400" y1="250" x2="400" y2="600" stroke="#2A2A5E" stroke-width="1" opacity="0.3"/>
    <line x1="475" y1="250" x2="475" y2="600" stroke="#2A2A5E" stroke-width="1" opacity="0.3"/>
    <!-- Edge glow strips -->
    <rect x="245" y="250" width="20" height="350" fill="url(#laneGlowL)"/>
    <rect x="535" y="250" width="20" height="350" fill="url(#laneGlowR)"/>
  </g>
  <!-- Road glow at horizon -->
  <rect x="250" y="230" width="300" height="60" fill="url(#roadGlow)"/>
  <!-- Floating musical note shapes (ambient) -->
  <g opacity="0.12" filter="url(#neonGlow)">
    <!-- Note shape 1 -->
    <circle cx="280" cy="200" r="4" fill="#FF1744"/>
    <line x1="284" y1="200" x2="284" y2="180" stroke="#FF1744" stroke-width="1.5"/>
    <path d="M284 180 Q290 178 290 183 Q290 186 284 185" fill="#FF1744"/>
    <!-- Note shape 2 -->
    <circle cx="500" cy="220" r="4" fill="#2979FF"/>
    <line x1="504" y1="220" x2="504" y2="200" stroke="#2979FF" stroke-width="1.5"/>
    <path d="M504 200 Q510 198 510 203 Q510 206 504 205" fill="#2979FF"/>
    <!-- Note shape 3 -->
    <circle cx="380" cy="180" r="3.5" fill="#00E676"/>
    <line x1="383.5" y1="180" x2="383.5" y2="162" stroke="#00E676" stroke-width="1.5"/>
    <path d="M383.5 162 Q389 160 389 165 Q389 168 383.5 167" fill="#00E676"/>
  </g>
  <!-- Perspective lines converging to center horizon -->
  <g opacity="0.04" stroke="#00E5FF" stroke-width="0.5">
    <line x1="0" y1="600" x2="400" y2="250"/>
    <line x1="800" y1="600" x2="400" y2="250"/>
    <line x1="100" y1="600" x2="400" y2="250"/>
    <line x1="700" y1="600" x2="400" y2="250"/>
  </g>
</svg>