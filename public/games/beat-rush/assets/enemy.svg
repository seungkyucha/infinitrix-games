<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="enemyBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="50%" stop-color="#C51162"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <radialGradient id="enemyCore" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#FFAB00" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF1744" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spikeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
    <radialGradient id="enemyAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#880E4F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eGlowStrong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <ellipse cx="32" cy="32" rx="30" ry="30" fill="url(#enemyAura)"/>
  <!-- Spikes radiating outward -->
  <g filter="url(#eGlow)">
    <path d="M32 4 L35 16 L32 14 L29 16 Z" fill="url(#spikeGrad)" opacity="0.9"/>
    <path d="M32 60 L35 48 L32 50 L29 48 Z" fill="url(#spikeGrad)" opacity="0.9"/>
    <path d="M4 32 L16 29 L14 32 L16 35 Z" fill="url(#spikeGrad)" opacity="0.9"/>
    <path d="M60 32 L48 29 L50 32 L48 35 Z" fill="url(#spikeGrad)" opacity="0.9"/>
    <!-- Diagonal spikes -->
    <path d="M12 12 L20 20 L18 22 L16 20 Z" fill="#FF1744" opacity="0.7"/>
    <path d="M52 12 L44 20 L46 22 L48 20 Z" fill="#FF1744" opacity="0.7"/>
    <path d="M12 52 L20 44 L18 42 L16 44 Z" fill="#FF1744" opacity="0.7"/>
    <path d="M52 52 L44 44 L46 42 L48 44 Z" fill="#FF1744" opacity="0.7"/>
  </g>
  <!-- Main hexagonal body -->
  <g filter="url(#eGlow)">
    <path d="M32 14 L46 22 L46 42 L32 50 L18 42 L18 22 Z" fill="url(#enemyBody)" opacity="0.95"/>
    <!-- Inner hex detail -->
    <path d="M32 20 L40 25 L40 39 L32 44 L24 39 L24 25 Z" fill="#880E4F" opacity="0.6"/>
  </g>
  <!-- Core glow -->
  <ellipse cx="32" cy="32" rx="10" ry="10" fill="url(#enemyCore)" filter="url(#eGlowStrong)"/>
  <!-- Eye / sensor -->
  <g filter="url(#eGlowStrong)">
    <ellipse cx="32" cy="30" rx="5" ry="4" fill="#FFAB00" opacity="0.9"/>
    <ellipse cx="32" cy="30" rx="2.5" ry="2" fill="#FFFFFF" opacity="0.8"/>
  </g>
  <!-- Mouth / vent lines -->
  <line x1="26" y1="38" x2="38" y2="38" stroke="#FFAB00" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="41" x2="36" y2="41" stroke="#FF1744" stroke-width="1" opacity="0.4"/>
  <!-- Pulsing rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#FF1744" stroke-width="0.8" opacity="0.3"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#FF1744" stroke-width="0.5" opacity="0.15"/>
</svg>