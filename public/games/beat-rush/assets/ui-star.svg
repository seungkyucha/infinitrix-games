<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="50%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="starCenter" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB00" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#FFAB00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFAB00" stop-opacity="0"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <circle cx="16" cy="16" r="14" fill="url(#starAura)"/>
  <!-- Musical note star hybrid -->
  <g filter="url(#sGlow)">
    <!-- 5-point star -->
    <path d="M16 3 L19.2 11.5 L28 12.2 L21.4 18 L23.5 27 L16 22.5 L8.5 27 L10.6 18 L4 12.2 L12.8 11.5 Z" fill="url(#starGrad)"/>
  </g>
  <!-- Inner glow -->
  <circle cx="16" cy="15" r="5" fill="url(#starCenter)"/>
  <!-- Sparkle details -->
  <line x1="16" y1="1" x2="16" y2="5" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="27" x2="16" y2="31" stroke="#FFD740" stroke-width="0.8" opacity="0.4"/>
  <line x1="1" y1="16" x2="5" y2="16" stroke="#FFD740" stroke-width="0.8" opacity="0.4"/>
  <line x1="27" y1="16" x2="31" y2="16" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
  <!-- Tiny accent dots -->
  <circle cx="6" cy="6" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="26" cy="8" r="0.6" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="8" cy="26" r="0.7" fill="#FFD740" opacity="0.4"/>
  <circle cx="25" cy="25" r="0.6" fill="#FFFFFF" opacity="0.3"/>
</svg>