<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tbgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#0F0A1E"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="25%" stop-color="#2979FF"/>
      <stop offset="50%" stop-color="#00E676"/>
      <stop offset="75%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
    <linearGradient id="laneHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#D500F9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitFlash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tGlowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tGlowText">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noteGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#tbgGrad)"/>
  <rect width="400" height="300" fill="url(#spotGlow)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#2A2A5E" stroke-width="0.5">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="220" x2="400" y2="220"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="260" x2="400" y2="260"/><line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="20" y1="0" x2="20" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="300"/><line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="140" y1="0" x2="140" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="220" y1="0" x2="220" y2="300"/><line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="260" y1="0" x2="260" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="340" y1="0" x2="340" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="380" y1="0" x2="380" y2="300"/>
  </g>

  <!-- 4 Lane areas (centered) -->
  <g opacity="0.5">
    <rect x="120" y="100" width="40" height="200" fill="#12122A" opacity="0.6"/>
    <rect x="165" y="100" width="40" height="200" fill="#12122A" opacity="0.6"/>
    <rect x="210" y="100" width="40" height="200" fill="#12122A" opacity="0.6"/>
    <rect x="255" y="100" width="40" height="200" fill="#12122A" opacity="0.6"/>
    <!-- Lane dividers -->
    <line x1="160" y1="100" x2="160" y2="300" stroke="#2A2A5E" stroke-width="0.5" opacity="0.4"/>
    <line x1="205" y1="100" x2="205" y2="300" stroke="#2A2A5E" stroke-width="0.5" opacity="0.4"/>
    <line x1="250" y1="100" x2="250" y2="300" stroke="#2A2A5E" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Judge line -->
  <g filter="url(#tGlow)">
    <line x1="115" y1="240" x2="300" y2="240" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <line x1="115" y1="240" x2="300" y2="240" stroke="#FFFFFF" stroke-width="6" opacity="0.15"/>
  </g>

  <!-- Falling notes - Lane 1 (Red) -->
  <g filter="url(#noteGlow)">
    <rect x="125" y="130" width="30" height="10" rx="3" fill="#FF1744" opacity="0.8"/>
    <rect x="125" y="131" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
    <rect x="125" y="190" width="30" height="10" rx="3" fill="#FF1744" opacity="0.9"/>
    <rect x="125" y="191" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- Lane 2 (Blue) -->
  <g filter="url(#noteGlow)">
    <rect x="170" y="160" width="30" height="10" rx="3" fill="#2979FF" opacity="0.85"/>
    <rect x="170" y="161" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- Lane 3 (Green) - Long note -->
  <g filter="url(#noteGlow)">
    <rect x="215" y="140" width="30" height="60" rx="2" fill="#00E676" opacity="0.35"/>
    <line x1="230" y1="140" x2="230" y2="200" stroke="#00E676" stroke-width="1" opacity="0.5"/>
    <rect x="215" y="140" width="30" height="10" rx="3" fill="#00E676" opacity="0.9"/>
    <rect x="215" y="141" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- Lane 4 (Amber) -->
  <g filter="url(#noteGlow)">
    <rect x="260" y="175" width="30" height="10" rx="3" fill="#FFAB00" opacity="0.85"/>
    <rect x="260" y="176" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
    <rect x="260" y="220" width="30" height="10" rx="3" fill="#FFAB00" opacity="0.95"/>
    <rect x="260" y="221" width="30" height="1.5" rx="1" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Hit flash effect at judge line -->
  <circle cx="275" cy="240" r="18" fill="url(#hitFlash)" filter="url(#tGlowStrong)"/>

  <!-- PERFECT text above judge line -->
  <text x="207" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FFD740" text-anchor="middle" filter="url(#tGlow)" opacity="0.9">PERFECT!</text>

  <!-- Combo counter -->
  <text x="207" y="115" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#tGlow)" opacity="0.8">87 COMBO</text>

  <!-- Key guide labels under judge line -->
  <g opacity="0.4" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">
    <text x="140" y="258">D</text>
    <text x="185" y="258">F</text>
    <text x="230" y="258">J</text>
    <text x="275" y="258">K</text>
  </g>

  <!-- HP bar (left side) -->
  <rect x="105" y="110" width="5" height="140" rx="2.5" fill="#1A1A3E" opacity="0.5"/>
  <rect x="105" y="150" width="5" height="100" rx="2.5" fill="#00E676" opacity="0.7"/>

  <!-- BPM indicator -->
  <text x="305" y="280" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#D500F9" opacity="0.6">120 BPM</text>

  <!-- Stars / ambient particles -->
  <g filter="url(#tGlow)">
    <circle cx="50" cy="45" r="1.2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="340" cy="60" r="1" fill="#D500F9" opacity="0.4"/>
    <circle cx="70" cy="150" r="0.8" fill="#00E5FF" opacity="0.5"/>
    <circle cx="350" cy="170" r="1.2" fill="#FFAB00" opacity="0.4"/>
    <circle cx="30" cy="250" r="0.9" fill="#2979FF" opacity="0.4"/>
    <circle cx="375" cy="130" r="1" fill="#FF1744" opacity="0.3"/>
    <circle cx="55" cy="90" r="0.7" fill="#00E676" opacity="0.4"/>
  </g>

  <!-- Building silhouettes (sides) -->
  <g opacity="0.3">
    <rect x="0" y="160" width="60" height="140" fill="#12122A"/>
    <rect x="15" y="140" width="35" height="160" fill="#1A1A3E"/>
    <rect x="55" y="180" width="40" height="120" fill="#12122A"/>
    <rect x="320" y="150" width="45" height="150" fill="#12122A"/>
    <rect x="350" y="170" width="50" height="130" fill="#1A1A3E"/>
  </g>
  <!-- Building neon windows -->
  <g filter="url(#noteGlow)" opacity="0.5">
    <rect x="22" y="155" width="2" height="2" fill="#D500F9"/>
    <rect x="30" y="170" width="2" height="2" fill="#00E5FF"/>
    <rect x="25" y="190" width="2" height="2" fill="#FF1744"/>
    <rect x="35" y="210" width="2" height="2" fill="#FFAB00"/>
    <rect x="65" y="195" width="2" height="2" fill="#2979FF"/>
    <rect x="72" y="215" width="2" height="2" fill="#00E676"/>
    <rect x="330" y="165" width="2" height="2" fill="#00E5FF"/>
    <rect x="340" y="185" width="2" height="2" fill="#D500F9"/>
    <rect x="360" y="185" width="2" height="2" fill="#FFAB00"/>
    <rect x="370" y="200" width="2" height="2" fill="#FF1744"/>
    <rect x="380" y="220" width="2" height="2" fill="#2979FF"/>
  </g>

  <!-- Sound wave arcs (top area) -->
  <g opacity="0.08" fill="none" stroke="#00E5FF" stroke-width="1">
    <path d="M100 50 Q200 30 300 50"/>
    <path d="M120 60 Q200 42 280 60"/>
    <path d="M140 70 Q200 55 260 70"/>
  </g>

  <!-- Title text -->
  <text x="200" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" filter="url(#tGlowText)">BEAT RUSH</text>
  <text x="200" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#00E5FF" text-anchor="middle" opacity="0.7">Rhythm Arcade</text>

  <!-- Decorative border glow -->
  <rect x="1" y="1" width="398" height="298" rx="4" fill="none" stroke="#D500F9" stroke-width="1" opacity="0.2"/>
  <rect x="3" y="3" width="394" height="294" rx="3" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.1"/>
</svg>