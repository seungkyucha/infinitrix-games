// ═══════════════════════════════════════════════════
// §K. INPUT HANDLING (~150 lines)
// ═══════════════════════════════════════════════════

// Keyboard input maps
const keys={};
let longPressTimer=null;
let longPressTarget=null;

// Process button click by coordinates
function processClick(px,py){
  // Tutorial overlay intercepts all clicks (F34)
  if(tutorialStep>=0&&state==='PUZZLE'){
    tutorialStep++;
    if(tutorialStep>=3){
      tutorialStep=-1;
      try{localStorage.setItem('rune_tutorial_done','1');}catch(e){}
    }
    return true;
  }
  for(const btn of buttons){
    if(px>=btn.x&&px<=btn.x+btn.w&&py>=btn.y&&py<=btn.y+btn.h){
      handleAction(btn.action);
      return true;
    }
  }
  return false;
}

// Handle a named action
function handleAction(action){
  snd.init(); // initialize audio on first interaction
  if(action==='activate'&&state==='PUZZLE'){
    activateCircles();
    beginTransition('DEFENSE');return;
  }
  if(action==='resume'){beginTransition('PAUSED');return;}
  if(action==='restart_game'||action==='restart_full'){resetGame();return;}
  if(action==='next_stage'){advanceStage();return;}
  if(action==='goto_upgrade'){beginTransition('UPGRADE');return;}
  if(action==='back_title'){beginTransition('TITLE');return;}
  if(action==='back_from_upgrade'||action==='back_from_recipe'){
    if(prevState==='RESULT')beginTransition('RESULT');
    else beginTransition('STAGE_SELECT');return;
  }
  if(action==='upgrade'){prevState=state;beginTransition('UPGRADE');return;}
  if(action==='recipe'){prevState=state;beginTransition('RECIPE_BOOK');return;}
  if(action.startsWith('difficulty_')){
    difficulty=action.replace('difficulty_','');return;
  }
  if(action.startsWith('select_region_')){
    const idx=parseInt(action.replace('select_region_',''));
    if(idx>=0&&idx<REGION_DATA.length)currentRegion=idx;return;
  }
  if(action.startsWith('select_stage_')){
    currentStage=parseInt(action.replace('select_stage_',''));
    beginTransition('PUZZLE');return;
  }
  if(action.startsWith('buy_')){
    buyUpgrade(action.replace('buy_',''));return;
  }
  if(action.startsWith('grid_')&&state==='PUZZLE'){
    const parts=action.replace('grid_','').split('_');
    const r=parseInt(parts[0]),c=parseInt(parts[1]);
    if(selectedRune>=0&&selectedRune<inventory.length){
      if(placeRune(r,c,inventory[selectedRune])){
        inventory.splice(selectedRune,1);
        selectedRune=Math.min(selectedRune,inventory.length-1);
        if(inventory.length===0)giveRunes();
      }
    }
    return;
  }
}

// Advance to next stage
function advanceStage(){
  currentStage++;
  if(currentStage>=3){
    currentStage=0;currentRegion++;
    if(currentRegion>=REGION_DATA.length){
      beginTransition('ENDING');return;
    }
  }
  beginTransition('PUZZLE');
}

// Full game reset
function resetGame(){
  score=0;lives=DIFFICULTY_DATA[difficulty].lives;
  currentRegion=0;currentStage=0;
  enemies=[];boss=null;activeMagics=[];
  projectiles=[];inventory=[];grid=[];
  tw.clearImmediate();particles.clearAll();projPool.clearAll();
  weatherParticles=[];notifications=[];
  isTransitioning=false;isPlacingRune=false;isWaveActive=false;
  camZoom=1;camTargetZoom=1;camShakeAmt=0;timeScale=1;
  shieldHP=0;waveIndex=0;
  circlesActivated=0;perfectBossKills=0;mixedCrossCount=0;speedActivation=0;
  beginTransition('TITLE');
}

// Keyboard event handlers
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;
  keys[e.code]=true;inputMode='keyboard';
  snd.init();
  // Global keys
  if(e.code==='KeyM'){snd.toggleMute();return;}
  if(e.code==='Escape'||e.code==='KeyP'){
    if(state==='PUZZLE'||state==='DEFENSE'||state==='BOSS_FIGHT')beginTransition('PAUSED');
    else if(state==='PAUSED')beginTransition('PAUSED');
    return;
  }
  // Title
  if(state==='TITLE'&&(e.code==='Space'||e.code==='Enter')){
    lives=DIFFICULTY_DATA[difficulty].lives;
    beginTransition('STAGE_SELECT');return;
  }
  // Gameover/Ending restart
  if((state==='GAMEOVER'||state==='ENDING')&&(e.code==='KeyR'||e.code==='Space')){
    resetGame();return;
  }
  // Puzzle controls
  if(state==='PUZZLE'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')cursorX=Math.max(0,cursorX-1);
    if(e.code==='ArrowRight'||e.code==='KeyD')cursorX=Math.min(CONFIG.GRID_SIZE-1,cursorX+1);
    if(e.code==='ArrowUp'||e.code==='KeyW')cursorY=Math.max(0,cursorY-1);
    if(e.code==='ArrowDown'||e.code==='KeyS')cursorY=Math.min(CONFIG.GRID_SIZE-1,cursorY+1);
    // Place rune
    if(e.code==='Space'||e.code==='Enter'){
      if(selectedRune>=0&&selectedRune<inventory.length){
        if(placeRune(cursorY,cursorX,inventory[selectedRune])){
          inventory.splice(selectedRune,1);
          selectedRune=Math.min(selectedRune,inventory.length-1);
          if(inventory.length===0)giveRunes();
        }
      }
    }
    // Select rune by number
    if(e.code>='Digit1'&&e.code<='Digit5'){
      const idx=parseInt(e.code.replace('Digit',''))-1;
      if(idx<inventory.length)selectedRune=idx;
    }
    // Remove last rune
    if(e.code==='KeyR'){
      // Find last placed rune and remove it
      for(let r=CONFIG.GRID_SIZE-1;r>=0;r--){
        for(let c=CONFIG.GRID_SIZE-1;c>=0;c--){
          if(grid[r][c]){
            const type=removeRune(r,c);
            if(type)inventory.push(type);
            return;
          }
        }
      }
    }
    // Activate
    if(e.code==='KeyQ'){
      activateCircles();beginTransition('DEFENSE');
    }
    // Recipe book
    if(e.code==='Tab'){
      e.preventDefault();
      prevState=state;beginTransition('RECIPE_BOOK');
    }
  }
});

document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Mouse events
canvas.addEventListener('mousedown',e=>{
  inputMode='mouse';snd.init();
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left);const py=(e.clientY-rect.top);
  // Right click to remove rune in puzzle
  if(e.button===2&&state==='PUZZLE'){
    const gc=Math.floor((px-gridOffsetX)/cellSize);
    const gr=Math.floor((py-gridOffsetY)/cellSize);
    if(gr>=0&&gr<CONFIG.GRID_SIZE&&gc>=0&&gc<CONFIG.GRID_SIZE&&grid[gr][gc]){
      const type=removeRune(gr,gc);
      if(type)inventory.push(type);
    }
    e.preventDefault();return;
  }
  processClick(px,py);
  // Inventory click
  if(state==='PUZZLE'){
    const panelX=W*0.58;const panelY=H*0.78;
    const slotSize=Math.max(CONFIG.MIN_TOUCH,40);
    for(let i=0;i<inventory.length;i++){
      const sx=panelX+i*(slotSize+4);const sy=panelY;
      if(px>=sx&&px<=sx+slotSize&&py>=sy&&py<=sy+slotSize){
        selectedRune=i;snd.sfxClick();return;
      }
    }
  }
});

canvas.addEventListener('contextmenu',e=>e.preventDefault());

// Mouse wheel for scroll
canvas.addEventListener('wheel',e=>{
  if(state==='UPGRADE'){upgradeScroll.offset+=e.deltaY>0?-30:30;upgradeScroll.offset=Math.max(upgradeScroll.minOffset,Math.min(upgradeScroll.maxOffset,upgradeScroll.offset));}
  if(state==='RECIPE_BOOK'){recipeScroll.offset+=e.deltaY>0?-30:30;recipeScroll.offset=Math.max(recipeScroll.minOffset,Math.min(recipeScroll.maxOffset,recipeScroll.offset));}
});

// Touch events (F32: full touch support)
let touchStartTime=0;
let touchStartX=0,touchStartY=0;
let isDraggingRune=false;
let dragRuneIdx=-1;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();inputMode='touch';snd.init();
  const touch=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const px=touch.clientX-rect.left;const py=touch.clientY-rect.top;
  touchStartX=px;touchStartY=py;touchStartTime=performance.now();
  // Scroll start for upgrade/recipe
  if(state==='UPGRADE')upgradeScroll.beginDrag(py);
  if(state==='RECIPE_BOOK')recipeScroll.beginDrag(py);
  // Inventory touch
  if(state==='PUZZLE'){
    const panelX=W*0.58;const panelY=H*0.78;
    const slotSize=Math.max(CONFIG.MIN_TOUCH,40);
    for(let i=0;i<inventory.length;i++){
      const sx=panelX+i*(slotSize+4);const sy=panelY;
      if(px>=sx&&px<=sx+slotSize&&py>=sy&&py<=sy+slotSize){
        selectedRune=i;isDraggingRune=true;dragRuneIdx=i;
        snd.sfxClick();return;
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const py=touch.clientY-rect.top;
  const ty=touch.clientY-rect.top;
  if(state==='UPGRADE')upgradeScroll.moveDrag(ty);
  if(state==='RECIPE_BOOK')recipeScroll.moveDrag(ty);
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state==='UPGRADE')upgradeScroll.endDrag();
  if(state==='RECIPE_BOOK')recipeScroll.endDrag();
  const touch=e.changedTouches[0];
  const rect=canvas.getBoundingClientRect();
  const px=touch.clientX-rect.left;const py=touch.clientY-rect.top;
  const elapsed=performance.now()-touchStartTime;
  const dist=Math.hypot(px-touchStartX,py-touchStartY);
  // Long press detection for rune removal
  if(elapsed>=CONFIG.LONG_PRESS_MS&&dist<20&&state==='PUZZLE'){
    const gc=Math.floor((px-gridOffsetX)/cellSize);
    const gr=Math.floor((py-gridOffsetY)/cellSize);
    if(gr>=0&&gr<CONFIG.GRID_SIZE&&gc>=0&&gc<CONFIG.GRID_SIZE&&grid[gr][gc]){
      const type=removeRune(gr,gc);
      if(type)inventory.push(type);
      isDraggingRune=false;dragRuneIdx=-1;
      return;
    }
  }
  // Drag-and-drop rune placement
  if(isDraggingRune&&state==='PUZZLE'){
    const gc=Math.floor((px-gridOffsetX)/cellSize);
    const gr=Math.floor((py-gridOffsetY)/cellSize);
    if(gr>=0&&gr<CONFIG.GRID_SIZE&&gc>=0&&gc<CONFIG.GRID_SIZE&&dragRuneIdx>=0){
      if(placeRune(gr,gc,inventory[dragRuneIdx])){
        inventory.splice(dragRuneIdx,1);
        selectedRune=Math.min(selectedRune,inventory.length-1);
        if(inventory.length===0)giveRunes();
      }
    }
    isDraggingRune=false;dragRuneIdx=-1;
    return;
  }
  isDraggingRune=false;dragRuneIdx=-1;
  // Tap = click if short duration and small distance
  if(dist<20){
    if(!processClick(px,py)){
      // Title tap to start
      if(state==='TITLE'){
        lives=DIFFICULTY_DATA[difficulty].lives;
        beginTransition('STAGE_SELECT');
      }
      // Gameover tap to restart
      if(state==='GAMEOVER'||state==='ENDING'){resetGame();}
    }
  }
},{passive:false});

// Two-finger tap for pause
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    if(state==='PUZZLE'||state==='DEFENSE'||state==='BOSS_FIGHT')beginTransition('PAUSED');
    else if(state==='PAUSED')beginTransition('PAUSED');
  }
},{passive:false});

// ═══════════════════════════════════════════════════
// §L. INIT & GAME LOOP (~100 lines)
// ═══════════════════════════════════════════════════

// Initialize game
function init(){
  loadProgress();
  loadBestScore();
  resizeCanvas();
  // Tutorial check
  try{
    if(!localStorage.getItem('rune_tutorial_done'))tutorialStep=0;
  }catch(e){}
  enterState('TITLE');
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

// Main game loop (F12: try-catch wrapped)
function gameLoop(timestamp){
  try{
    const rawDt=(timestamp-lastTime)/1000;
    const dt=Math.min(rawDt,CONFIG.MAX_DT);
    lastTime=timestamp;
    frameCount++;
    buttons=[]; // clear button registry each frame
    update(dt);
    render();
    // Tutorial overlay (first play)
    if(tutorialStep>=0&&state==='PUZZLE'){
      renderTutorial();
    }
  }catch(e){
    console.error('[GameLoop Error]',e);
  }
  requestAnimationFrame(gameLoop);
}

// Tutorial overlay rendering (F34)
function renderTutorial(){
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=PAL.textPrimary;ctx.font='bold 16px '+FONT_UI;ctx.textAlign='center';
  const messages=[
    lang==='ko'?'1. 아래 룬을 탭하여 선택하세요':'1. Tap a rune below to select it',
    lang==='ko'?'2. 그리드에 탭하여 배치하세요':'2. Tap the grid to place it',
    lang==='ko'?'3. 패턴을 완성하고 [발동] 버튼을 누르세요':'3. Complete patterns and press [Activate]'
  ];
  if(tutorialStep<messages.length){
    ctx.fillText(messages[tutorialStep],W/2,H*0.4);
    // Arrow animation
    const arrowY=H*0.45+Math.sin(frameCount*0.05)*5;
    ctx.fillText('▼',W/2,arrowY);
    ctx.fillStyle=PAL.textSecondary;ctx.font='12px '+FONT_UI;
    ctx.fillText(lang==='ko'?'탭하여 계속':'Tap to continue',W/2,H*0.55);
  }
  ctx.restore();
  // Tutorial click is handled in processClick() directly
}

// Window resize handler
window.addEventListener('resize',resizeCanvas);

// Start the game
init();
</script>
