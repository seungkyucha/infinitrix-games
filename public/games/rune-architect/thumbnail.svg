<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0520"/>
      <stop offset="40%" stop-color="#1A0A3E"/>
      <stop offset="80%" stop-color="#2E1A5E"/>
      <stop offset="100%" stop-color="#3D2470"/>
    </linearGradient>
    <!-- Grid glow -->
    <radialGradient id="gridGlow" cx="0.5" cy="0.55" r="0.35">
      <stop offset="0%" stop-color="#6B3FA0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A0A3E" stop-opacity="0"/>
    </radialGradient>
    <!-- Rune glow -->
    <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="tGlowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE488"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
    <!-- Subtitle gradient -->
    <linearGradient id="subGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AAEEFF"/>
      <stop offset="100%" stop-color="#6699CC"/>
    </linearGradient>
    <!-- Crystal orb -->
    <radialGradient id="tOrb" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#AAEEFF"/>
      <stop offset="50%" stop-color="#4488CC"/>
      <stop offset="100%" stop-color="#224466"/>
    </radialGradient>
    <!-- Mage robe -->
    <linearGradient id="tRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4B2D8E"/>
      <stop offset="100%" stop-color="#1A0A3E"/>
    </linearGradient>
    <!-- Enemy glow -->
    <radialGradient id="enemyAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#66DD55" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#33AA22" stop-opacity="0"/>
    </radialGradient>
    <!-- Magic circle -->
    <radialGradient id="magicCircle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <!-- Text shadow filter -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#tSky)"/>

  <!-- Stars -->
  <g id="tStars">
    <circle cx="30" cy="20" r="1.2" fill="white" opacity="0.8" filter="url(#tGlow)"/>
    <circle cx="90" cy="40" r="1" fill="#EEEEFF" opacity="0.7"/>
    <circle cx="150" cy="15" r="1.5" fill="white" opacity="0.9" filter="url(#tGlow)"/>
    <circle cx="220" cy="35" r="0.8" fill="#DDDDFF" opacity="0.6"/>
    <circle cx="280" cy="20" r="1.3" fill="white" opacity="0.8" filter="url(#tGlow)"/>
    <circle cx="340" cy="30" r="1" fill="#EEEEFF" opacity="0.7"/>
    <circle cx="375" cy="15" r="1.2" fill="white" opacity="0.6"/>
    <circle cx="60" cy="60" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="130" cy="55" r="0.8" fill="#CCCCEE" opacity="0.4"/>
    <circle cx="310" cy="50" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="180" cy="70" r="0.7" fill="#DDDDFF" opacity="0.4"/>
    <circle cx="250" cy="60" r="0.9" fill="white" opacity="0.5"/>
  </g>

  <!-- Mountains silhouette -->
  <path d="M0 180 Q50 140 100 160 Q150 120 200 150 Q250 110 300 145 Q350 130 400 155 L400 300 L0 300Z" fill="#1A0A3E" opacity="0.6"/>

  <!-- Magic circle on ground (grid area) -->
  <circle cx="200" cy="170" r="80" fill="url(#magicCircle)"/>
  <circle cx="200" cy="170" r="70" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="200" cy="170" r="55" fill="none" stroke="#FFD700" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 5"/>

  <!-- 5x5 Grid with runes -->
  <g id="grid" transform="translate(155, 115)">
    <!-- Grid lines -->
    <g stroke="#6B3FA0" stroke-width="0.5" opacity="0.3">
      <line x1="0" y1="0" x2="90" y2="0"/>
      <line x1="0" y1="18" x2="90" y2="18"/>
      <line x1="0" y1="36" x2="90" y2="36"/>
      <line x1="0" y1="54" x2="90" y2="54"/>
      <line x1="0" y1="72" x2="90" y2="72"/>
      <line x1="0" y1="90" x2="90" y2="90"/>
      <line x1="0" y1="0" x2="0" y2="90"/>
      <line x1="18" y1="0" x2="18" y2="90"/>
      <line x1="36" y1="0" x2="36" y2="90"/>
      <line x1="54" y1="0" x2="54" y2="90"/>
      <line x1="72" y1="0" x2="72" y2="90"/>
      <line x1="90" y1="0" x2="90" y2="90"/>
    </g>
    <!-- Fire runes (forming a line) -->
    <rect x="2" y="38" width="14" height="14" rx="2" fill="#FF4444" opacity="0.6" filter="url(#tGlow)"/>
    <rect x="20" y="38" width="14" height="14" rx="2" fill="#FF4444" opacity="0.6" filter="url(#tGlow)"/>
    <rect x="38" y="38" width="14" height="14" rx="2" fill="#FF4444" opacity="0.6" filter="url(#tGlow)"/>
    <!-- Water rune -->
    <rect x="56" y="20" width="14" height="14" rx="2" fill="#4488FF" opacity="0.5" filter="url(#tGlow)"/>
    <!-- Earth rune -->
    <rect x="38" y="56" width="14" height="14" rx="2" fill="#88AA44" opacity="0.5" filter="url(#tGlow)"/>
    <!-- Wind rune -->
    <rect x="74" y="56" width="14" height="14" rx="2" fill="#AADDFF" opacity="0.5" filter="url(#tGlow)"/>
    <!-- Thunder rune -->
    <rect x="20" y="74" width="14" height="14" rx="2" fill="#FFDD00" opacity="0.5" filter="url(#tGlow)"/>
    <!-- Line-3 activation glow -->
    <rect x="0" y="36" width="54" height="18" rx="3" fill="#FF4444" opacity="0.15" filter="url(#tGlowStrong)"/>
  </g>

  <!-- Mage character (left side) -->
  <g id="tMage" transform="translate(50, 110)">
    <!-- Robe -->
    <path d="M0 40 Q-4 55 -6 80 Q-7 95 -2 100 L22 100 Q27 95 26 80 Q24 55 20 40Z" fill="url(#tRobe)"/>
    <!-- Belt -->
    <path d="M-2 58 Q10 61 22 58" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.7"/>
    <!-- Left arm -->
    <path d="M0 42 Q-8 50 -12 60" fill="url(#tRobe)" stroke="#2A1654" stroke-width="0.3"/>
    <!-- Staff -->
    <rect x="-14" y="5" width="2.5" height="70" rx="1" fill="#8B5E3C"/>
    <circle cx="-13" cy="5" r="5" fill="url(#tOrb)" filter="url(#tGlow)"/>
    <circle cx="-13" cy="5" r="8" fill="#88EEFF" opacity="0.15" filter="url(#tGlowStrong)"/>
    <circle cx="-14" cy="3.5" r="1.5" fill="white" opacity="0.4"/>
    <!-- Head -->
    <ellipse cx="10" cy="28" rx="8" ry="10" fill="#FFE4C4"/>
    <!-- Hat -->
    <path d="M0 30 Q2 28 4 26 L10 2 L16 26 Q18 28 20 30 Q10 33 0 30Z" fill="#4B2D8E"/>
    <ellipse cx="10" cy="30" rx="12" ry="3.5" fill="#4B2D8E"/>
    <path d="M0 29 Q10 32 20 29" stroke="#FFD700" stroke-width="0.8" fill="none"/>
    <!-- Star on hat -->
    <path d="M10 10 L11 13 L14 13 L11.5 15 L12.5 18 L10 16 L7.5 18 L8.5 15 L6 13 L9 13Z" fill="#FFD700" opacity="0.7" filter="url(#tGlow)"/>
    <!-- Eyes -->
    <circle cx="7" cy="27" r="1.2" fill="#00CCFF" opacity="0.9" filter="url(#tGlow)"/>
    <circle cx="13" cy="27" r="1.2" fill="#00CCFF" opacity="0.9" filter="url(#tGlow)"/>
    <!-- Right arm casting -->
    <path d="M20 42 Q28 48 32 55" fill="url(#tRobe)" stroke="#2A1654" stroke-width="0.3"/>
    <!-- Magic cast from hand -->
    <circle cx="34" cy="57" r="3" fill="#FFD700" opacity="0.5" filter="url(#tGlowStrong)"/>
    <circle cx="36" cy="54" r="1.5" fill="#88EEFF" opacity="0.4" filter="url(#tGlow)"/>
  </g>

  <!-- Enemy slimes approaching from right -->
  <g id="enemies">
    <!-- Slime 1 -->
    <g transform="translate(310, 150)">
      <circle cx="0" cy="0" r="18" fill="url(#enemyAura)"/>
      <path d="M-15 8 Q-18 -2 -12 -10 Q-6 -16 2 -14 Q12 -16 16 -8 Q20 0 18 10 Q14 16 2 18 Q-10 16 -15 8Z" fill="#33AA22" stroke="#1A7711" stroke-width="0.5"/>
      <ellipse cx="-4" cy="-4" rx="4" ry="4.5" fill="white"/>
      <circle cx="-3" cy="-3" r="2" fill="#220000"/>
      <circle cx="-2" cy="-4" r="0.8" fill="#FF2200"/>
      <ellipse cx="6" cy="-5" rx="3.5" ry="4" fill="white"/>
      <circle cx="7" cy="-4" r="1.8" fill="#220000"/>
      <circle cx="8" cy="-5" r="0.7" fill="#FF2200"/>
      <path d="M-8 4 Q0 10 8 4" fill="#0D4408"/>
      <path d="M-5 5 L-3 3 L-1 5" fill="#CCFFCC"/>
      <path d="M3 5 L5 3 L7 5" fill="#CCFFCC"/>
    </g>
    <!-- Slime 2 (smaller, behind) -->
    <g transform="translate(350, 165) scale(0.7)">
      <path d="M-15 8 Q-18 -2 -12 -10 Q-6 -16 2 -14 Q12 -16 16 -8 Q20 0 18 10 Q14 16 2 18 Q-10 16 -15 8Z" fill="#44BB33" opacity="0.7"/>
      <ellipse cx="-3" cy="-3" rx="3" ry="3.5" fill="white" opacity="0.8"/>
      <circle cx="-2" cy="-2" r="1.5" fill="#220000"/>
      <ellipse cx="6" cy="-4" rx="2.5" ry="3" fill="white" opacity="0.8"/>
      <circle cx="7" cy="-3" r="1.3" fill="#220000"/>
    </g>
    <!-- Slime 3 (smallest, far back) -->
    <g transform="translate(375, 145) scale(0.5)">
      <path d="M-15 8 Q-18 -2 -12 -10 Q-6 -16 2 -14 Q12 -16 16 -8 Q20 0 18 10 Q14 16 2 18 Q-10 16 -15 8Z" fill="#55CC44" opacity="0.5"/>
      <ellipse cx="-3" cy="-3" rx="3" ry="3.5" fill="white" opacity="0.6"/>
      <circle cx="-2" cy="-2" r="1.5" fill="#220000" opacity="0.6"/>
      <ellipse cx="6" cy="-4" rx="2.5" ry="3" fill="white" opacity="0.6"/>
      <circle cx="7" cy="-3" r="1.3" fill="#220000" opacity="0.6"/>
    </g>
  </g>

  <!-- Magic projectile from grid to enemies -->
  <g id="magicProjectile" filter="url(#tGlowStrong)">
    <circle cx="265" cy="155" r="5" fill="#FF6644" opacity="0.7"/>
    <circle cx="265" cy="155" r="3" fill="#FFAA44" opacity="0.9"/>
    <circle cx="265" cy="155" r="1.5" fill="#FFFFDD"/>
    <!-- Trail -->
    <ellipse cx="255" cy="155" rx="8" ry="2" fill="#FF6644" opacity="0.3"/>
    <ellipse cx="245" cy="155" rx="6" ry="1.5" fill="#FF6644" opacity="0.15"/>
  </g>

  <!-- Defense lane indicators -->
  <g id="lanes" opacity="0.15">
    <line x1="250" y1="130" x2="400" y2="130" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="3 5"/>
    <line x1="250" y1="155" x2="400" y2="155" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="3 5"/>
    <line x1="250" y1="180" x2="400" y2="180" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="3 5"/>
  </g>

  <!-- Ground -->
  <path d="M0 220 Q100 210 200 225 Q300 215 400 230 L400 300 L0 300Z" fill="#0D1A0C" opacity="0.8"/>
  <path d="M0 235 Q80 228 160 238 Q240 232 320 242 Q380 236 400 240 L400 300 L0 300Z" fill="#0D0520"/>

  <!-- Ground rune stones -->
  <path d="M30 230 L35 215 Q37 212 39 215 L44 230Z" fill="#3D3055" opacity="0.5"/>
  <path d="M36 220 L34 225 L38 222Z" stroke="#88EEFF" stroke-width="0.5" fill="none" opacity="0.4" filter="url(#tGlow)"/>

  <!-- Vignette overlay -->
  <rect width="400" height="300" fill="url(#vignette)"/>

  <!-- Title text -->
  <g id="title" filter="url(#textShadow)">
    <text x="200" y="268" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="url(#titleGrad)" letter-spacing="3">RUNE</text>
    <text x="200" y="293" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="url(#subGrad)" letter-spacing="5">ARCHITECT</text>
  </g>

  <!-- Decorative rune glyphs around title -->
  <text x="95" y="275" font-size="12" fill="#FFD700" opacity="0.4" font-family="serif" filter="url(#tGlow)">ᚱ</text>
  <text x="300" y="275" font-size="12" fill="#FFD700" opacity="0.4" font-family="serif" filter="url(#tGlow)">ᛟ</text>
  <text x="120" y="295" font-size="8" fill="#88EEFF" opacity="0.3" font-family="serif">ᚦ</text>
  <text x="278" y="295" font-size="8" fill="#88EEFF" opacity="0.3" font-family="serif">ᛊ</text>
</svg>