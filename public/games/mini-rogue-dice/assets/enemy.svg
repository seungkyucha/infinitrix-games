<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dragonBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6f00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </radialGradient>
    <filter id="enemyGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireFilter">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 위협 아우라 -->
  <ellipse cx="32" cy="36" rx="26" ry="20" fill="url(#fireGlow)" filter="url(#fireFilter)"/>
  <!-- 날개 왼쪽 -->
  <path d="M18 22 Q4 10 6 28 Q8 36 18 34 Z" fill="url(#wingGrad)" opacity="0.9"/>
  <path d="M16 20 Q2 6 4 24 Q6 32 16 30 Z" fill="#bf360c" opacity="0.5"/>
  <!-- 날개 오른쪽 -->
  <path d="M46 22 Q60 10 58 28 Q56 36 46 34 Z" fill="url(#wingGrad)" opacity="0.9"/>
  <path d="M48 20 Q62 6 60 24 Q58 32 48 30 Z" fill="#bf360c" opacity="0.5"/>
  <!-- 몸통 -->
  <path d="M32 14 Q44 14 48 32 Q48 44 40 48 L32 52 L24 48 Q16 44 16 32 Q20 14 32 14 Z" fill="url(#dragonBody)" filter="url(#enemyGlow)"/>
  <!-- 뿔 왼쪽 -->
  <path d="M24 16 Q20 4 18 8 Q20 12 24 16 Z" fill="#f5c542"/>
  <!-- 뿔 오른쪽 -->
  <path d="M40 16 Q44 4 46 8 Q44 12 40 16 Z" fill="#f5c542"/>
  <!-- 비늘 패턴 -->
  <path d="M26 28 Q32 26 38 28" fill="none" stroke="#e65100" stroke-width="1" opacity="0.6"/>
  <path d="M24 34 Q32 32 40 34" fill="none" stroke="#e65100" stroke-width="1" opacity="0.6"/>
  <path d="M26 40 Q32 38 38 40" fill="none" stroke="#e65100" stroke-width="1" opacity="0.6"/>
  <!-- 눈 왼쪽 - 사나운 눈 -->
  <g>
    <path d="M22 22 L28 20 L28 26 Z" fill="#f5c542" filter="url(#fireFilter)"/>
    <circle cx="26" cy="22" r="1.5" fill="#1a1a2e"/>
  </g>
  <!-- 눈 오른쪽 -->
  <g>
    <path d="M42 22 L36 20 L36 26 Z" fill="#f5c542" filter="url(#fireFilter)"/>
    <circle cx="38" cy="22" r="1.5" fill="#1a1a2e"/>
  </g>
  <!-- 입 -->
  <path d="M26 32 Q28 30 30 32 L32 34 L34 32 Q36 30 38 32" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- 이빨 -->
  <polygon points="28,32 29,35 30,32" fill="#ffffff"/>
  <polygon points="34,32 35,35 36,32" fill="#ffffff"/>
  <!-- 불꽃 입김 -->
  <g filter="url(#fireFilter)" opacity="0.7">
    <path d="M30 36 Q28 42 26 46 Q30 44 32 48 Q34 44 38 46 Q36 42 34 36 Z" fill="#ff6f00"/>
    <path d="M31 38 Q30 42 28 44 Q31 43 32 46 Q33 43 36 44 Q34 42 33 38 Z" fill="#f5c542"/>
  </g>
  <!-- 꼬리 -->
  <path d="M32 50 Q28 54 24 56 Q20 58 18 56 Q16 54 18 52" fill="none" stroke="#e65100" stroke-width="3" stroke-linecap="round"/>
  <polygon points="18,52 14,50 16,56" fill="#ff6f00"/>
</svg>
