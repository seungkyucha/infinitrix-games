<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="diceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0e0"/>
    </linearGradient>
    <linearGradient id="diceEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#b71c4a"/>
    </linearGradient>
    <radialGradient id="diceAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c542" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#e94560" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="diceShine" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="diceGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 아우라 -->
  <circle cx="24" cy="24" r="22" fill="url(#diceAura)" filter="url(#diceGlow)"/>
  <!-- 주사위 몸체 (3D 느낌) -->
  <g filter="url(#diceGlow)">
    <!-- 윗면 -->
    <path d="M24 8 L38 16 L38 32 L24 40 L10 32 L10 16 Z" fill="url(#diceGrad)" stroke="url(#diceEdge)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- 왼쪽 면 -->
    <path d="M10 16 L24 24 L24 40 L10 32 Z" fill="#c0c0d0" opacity="0.8"/>
    <!-- 오른쪽 면 -->
    <path d="M38 16 L24 24 L24 40 L38 32 Z" fill="#a0a0b0" opacity="0.7"/>
    <!-- 윗면 (밝게) -->
    <path d="M24 8 L38 16 L24 24 L10 16 Z" fill="url(#diceGrad)"/>
  </g>
  <!-- 윗면 도트 — 6면 표시 (파워업!) -->
  <g fill="#e94560">
    <circle cx="17" cy="13" r="1.5"/>
    <circle cx="24" cy="13" r="1.5"/>
    <circle cx="31" cy="13" r="1.5"/>
    <circle cx="17" cy="19" r="1.5"/>
    <circle cx="24" cy="19" r="1.5"/>
    <circle cx="31" cy="19" r="1.5"/>
  </g>
  <!-- 오른쪽 면 도트 -->
  <g fill="#b71c4a" opacity="0.7">
    <circle cx="33" cy="22" r="1"/>
    <circle cx="30" cy="26" r="1"/>
    <circle cx="33" cy="30" r="1"/>
  </g>
  <!-- 하이라이트 -->
  <path d="M24 8 L38 16 L24 24 L10 16 Z" fill="url(#diceShine)"/>
  <!-- 반짝이 이펙트 -->
  <g filter="url(#sparkle)">
    <path d="M6 8 L7 5 L8 8 L11 9 L8 10 L7 13 L6 10 L3 9 Z" fill="#f5c542" opacity="0.8"/>
    <path d="M40 6 L41 4 L42 6 L44 7 L42 8 L41 10 L40 8 L38 7 Z" fill="#f5c542" opacity="0.6"/>
    <path d="M42 36 L43 34 L44 36 L46 37 L44 38 L43 40 L42 38 L40 37 Z" fill="#f5c542" opacity="0.7"/>
    <path d="M4 34 L5 32 L6 34 L8 35 L6 36 L5 38 L4 36 L2 35 Z" fill="#f5c542" opacity="0.5"/>
  </g>
</svg>
