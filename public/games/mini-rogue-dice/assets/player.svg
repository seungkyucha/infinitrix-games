<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b7f"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="cloakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#2a1a4a"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 아우라 글로우 -->
  <ellipse cx="32" cy="34" rx="22" ry="22" fill="url(#heroGlow)" filter="url(#softGlow)"/>
  <!-- 망토 (뒤쪽) -->
  <path d="M20 28 Q16 40 18 54 L32 48 L46 54 Q48 40 44 28 Z" fill="url(#cloakGrad)" opacity="0.9"/>
  <!-- 몸통 - 둥근 삼각형 -->
  <path d="M32 12 Q40 12 46 30 Q48 38 42 44 L32 48 L22 44 Q16 38 18 30 Q24 12 32 12 Z" fill="url(#bodyGrad)" filter="url(#glow)"/>
  <!-- 벨트 -->
  <rect x="24" y="34" width="16" height="3" rx="1.5" fill="#f5c542" opacity="0.9"/>
  <rect x="30" y="33" width="4" height="5" rx="1" fill="#f5c542"/>
  <!-- 눈 (왼쪽) -->
  <g>
    <ellipse cx="27" cy="24" rx="4" ry="4.5" fill="#ffffff"/>
    <circle cx="28" cy="24" r="2" fill="#1a1a2e"/>
    <circle cx="29" cy="23" r="0.8" fill="#ffffff"/>
  </g>
  <!-- 눈 (오른쪽) -->
  <g>
    <ellipse cx="37" cy="24" rx="4" ry="4.5" fill="#ffffff"/>
    <circle cx="38" cy="24" r="2" fill="#1a1a2e"/>
    <circle cx="39" cy="23" r="0.8" fill="#ffffff"/>
  </g>
  <!-- 입 -->
  <path d="M29 30 Q32 33 35 30" fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 검 (오른손) -->
  <g filter="url(#glow)">
    <rect x="46" y="18" width="3" height="20" rx="1" fill="#c0c0c0" transform="rotate(15, 47.5, 28)"/>
    <rect x="44" y="36" width="7" height="3" rx="1" fill="#8B6914" transform="rotate(15, 47.5, 37.5)"/>
    <polygon points="47.5,10 46,18 49,18" fill="#e0e0e0" transform="rotate(15, 47.5, 14)"/>
  </g>
  <!-- 방패 (왼손) -->
  <g filter="url(#glow)">
    <circle cx="14" cy="32" r="8" fill="#4fc3f7" opacity="0.8"/>
    <circle cx="14" cy="32" r="5.5" fill="#16213e" opacity="0.6"/>
    <path d="M14 27 L14 37 M9 32 L19 32" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- 발 -->
  <ellipse cx="26" cy="52" rx="5" ry="3" fill="#533483"/>
  <ellipse cx="38" cy="52" rx="5" ry="3" fill="#533483"/>
</svg>
