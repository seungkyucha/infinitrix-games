<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="thumbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="thumbPlayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b7f"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="thumbDragon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="thumbDice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0e0"/>
    </linearGradient>
    <radialGradient id="thumbFireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6f00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="titleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <filter id="thumbGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#thumbBg)"/>
  <!-- 던전 바닥 타일 -->
  <g opacity="0.2">
    <rect x="60" y="180" width="280" height="100" fill="#0f3460"/>
    <line x1="60" y1="200" x2="340" y2="200" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="60" y1="220" x2="340" y2="220" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="60" y1="240" x2="340" y2="240" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="60" y1="260" x2="340" y2="260" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="180" x2="120" y2="280" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="180" y1="180" x2="180" y2="280" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="240" y1="180" x2="240" y2="280" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="300" y1="180" x2="300" y2="280" stroke="#1a1a2e" stroke-width="0.5"/>
  </g>
  <!-- 벽 실루엣 -->
  <g opacity="0.3">
    <rect x="0" y="100" width="50" height="200" fill="#533483"/>
    <rect x="350" y="100" width="50" height="200" fill="#533483"/>
    <rect x="40" y="95" width="20" height="10" rx="2" fill="#533483"/>
    <rect x="340" y="95" width="20" height="10" rx="2" fill="#533483"/>
  </g>
  <!-- 드래곤 (오른쪽) -->
  <g transform="translate(280, 120)" filter="url(#thumbGlow)">
    <circle cx="0" cy="20" r="50" fill="url(#thumbFireGlow)"/>
    <!-- 날개 -->
    <path d="M-10 0 Q-40 -30 -35 10 Q-30 20 -10 15 Z" fill="#bf360c" opacity="0.8"/>
    <path d="M30 0 Q60 -30 55 10 Q50 20 30 15 Z" fill="#bf360c" opacity="0.8"/>
    <!-- 몸통 -->
    <path d="M10 -15 Q25 -15 30 5 Q30 20 22 28 L10 32 L-2 28 Q-10 20 -10 5 Q-5 -15 10 -15 Z" fill="url(#thumbDragon)"/>
    <!-- 뿔 -->
    <path d="M2 -14 Q-2 -24 -4 -20 Q-2 -16 2 -14 Z" fill="#f5c542"/>
    <path d="M18 -14 Q22 -24 24 -20 Q22 -16 18 -14 Z" fill="#f5c542"/>
    <!-- 눈 -->
    <path d="M0 -2 L6 -4 L6 2 Z" fill="#f5c542"/>
    <path d="M20 -2 L14 -4 L14 2 Z" fill="#f5c542"/>
    <circle cx="4" cy="-1" r="1" fill="#1a1a2e"/>
    <circle cx="16" cy="-1" r="1" fill="#1a1a2e"/>
    <!-- 불꽃 -->
    <g opacity="0.8">
      <path d="M6 10 Q4 18 0 24 Q6 20 10 26 Q14 20 20 24 Q16 18 14 10 Z" fill="#ff6f00"/>
      <path d="M8 12 Q6 18 4 22 Q8 19 10 24 Q12 19 16 22 Q14 18 12 12 Z" fill="#f5c542"/>
    </g>
  </g>
  <!-- 플레이어 (왼쪽) -->
  <g transform="translate(100, 150)" filter="url(#thumbGlow)">
    <!-- 망토 -->
    <path d="M-8 -4 Q-14 8 -12 24 L0 20 L12 24 Q14 8 8 -4 Z" fill="#2a1a4a" opacity="0.9"/>
    <!-- 몸통 -->
    <path d="M0 -18 Q8 -18 12 -2 Q14 6 8 12 L0 16 L-8 12 Q-14 6 -12 -2 Q-8 -18 0 -18 Z" fill="url(#thumbPlayer)"/>
    <!-- 눈 -->
    <ellipse cx="-4" cy="-8" rx="3" ry="3.5" fill="#ffffff"/>
    <circle cx="-3" cy="-8" r="1.5" fill="#1a1a2e"/>
    <ellipse cx="4" cy="-8" rx="3" ry="3.5" fill="#ffffff"/>
    <circle cx="5" cy="-8" r="1.5" fill="#1a1a2e"/>
    <!-- 검 -->
    <g>
      <rect x="14" y="-14" width="2.5" height="16" rx="0.5" fill="#c0c0c0" transform="rotate(20, 15, -6)"/>
      <polygon points="15,-18 14,-14 17,-14" fill="#e0e0e0" transform="rotate(20, 15, -16)"/>
      <rect x="12.5" y="1" width="6" height="2.5" rx="0.5" fill="#8B6914" transform="rotate(20, 15.5, 2)"/>
    </g>
    <!-- 방패 -->
    <circle cx="-16" cy="0" r="6" fill="#4fc3f7" opacity="0.8"/>
    <path d="M-16 -4 L-16 4 M-20 0 L-12 0" stroke="#16213e" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- 주사위들 (하단 중앙) -->
  <g transform="translate(160, 220)">
    <!-- 주사위 1 -->
    <g filter="url(#thumbGlow)">
      <rect x="0" y="0" width="28" height="28" rx="4" fill="url(#thumbDice)" stroke="#e94560" stroke-width="2"/>
      <circle cx="8" cy="8" r="2.5" fill="#e94560"/>
      <circle cx="20" cy="8" r="2.5" fill="#e94560"/>
      <circle cx="14" cy="14" r="2.5" fill="#e94560"/>
      <circle cx="8" cy="20" r="2.5" fill="#e94560"/>
      <circle cx="20" cy="20" r="2.5" fill="#e94560"/>
    </g>
    <!-- 주사위 2 -->
    <g filter="url(#thumbGlow)" transform="translate(36, -8) rotate(12, 14, 14)">
      <rect x="0" y="0" width="28" height="28" rx="4" fill="url(#thumbDice)" stroke="#e94560" stroke-width="2"/>
      <circle cx="8" cy="8" r="2.5" fill="#e94560"/>
      <circle cx="20" cy="8" r="2.5" fill="#e94560"/>
      <circle cx="8" cy="20" r="2.5" fill="#e94560"/>
      <circle cx="20" cy="20" r="2.5" fill="#e94560"/>
      <circle cx="14" cy="14" r="2.5" fill="#e94560"/>
      <circle cx="20" cy="14" r="2.5" fill="#e94560"/>
    </g>
  </g>
  <!-- 타이틀 글로우 배경 -->
  <ellipse cx="200" cy="42" rx="160" ry="30" fill="url(#titleGlow)" filter="url(#heavyGlow)"/>
  <!-- 타이틀 텍스트 -->
  <text x="200" y="38" text-anchor="middle" font-size="28" font-weight="bold" fill="#e94560" filter="url(#textGlow)" font-family="'Segoe UI', system-ui, sans-serif">MINI ROGUE DICE</text>
  <text x="200" y="38" text-anchor="middle" font-size="28" font-weight="bold" fill="#ff8a9e" font-family="'Segoe UI', system-ui, sans-serif">MINI ROGUE DICE</text>
  <!-- 서브타이틀 -->
  <text x="200" y="60" text-anchor="middle" font-size="12" fill="#f5c542" opacity="0.8" font-family="'Segoe UI', system-ui, sans-serif">Roll the Dice, Conquer the Dungeon</text>
  <!-- 하단 바 -->
  <rect x="0" y="285" width="400" height="15" fill="#0a0a1a" opacity="0.6"/>
  <rect x="0" y="285" width="400" height="1" fill="#533483" opacity="0.4"/>
  <!-- 장르 태그 -->
  <g opacity="0.7">
    <rect x="140" y="70" width="56" height="16" rx="8" fill="#e94560" opacity="0.3"/>
    <text x="168" y="82" text-anchor="middle" font-size="9" fill="#eaeaea" font-family="'Segoe UI', system-ui, sans-serif">ACTION</text>
    <rect x="204" y="70" width="66" height="16" rx="8" fill="#533483" opacity="0.3"/>
    <text x="237" y="82" text-anchor="middle" font-size="9" fill="#eaeaea" font-family="'Segoe UI', system-ui, sans-serif">STRATEGY</text>
  </g>
</svg>
