<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f5c542" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e94560" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0"/>
      <stop offset="70%" stop-color="#e94560" stop-opacity="0"/>
      <stop offset="85%" stop-color="#e94560" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerFlash" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 충격파 링 -->
  <circle cx="48" cy="48" r="44" fill="url(#shockwave)"/>
  <circle cx="48" cy="48" r="36" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  <!-- 메인 폭발 코어 -->
  <circle cx="48" cy="48" r="28" fill="url(#hitCore)" filter="url(#heavyGlow)"/>
  <!-- 빛 방사선 -->
  <g filter="url(#hitGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="8" stroke="#f5c542" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="#f5c542" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#f5c542" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#f5c542" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="20" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="20" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="76" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="76" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- 파편 파티클 -->
  <g filter="url(#hitGlow)">
    <circle cx="30" cy="22" r="3" fill="#f5c542" opacity="0.8"/>
    <circle cx="68" cy="28" r="2.5" fill="#e94560" opacity="0.7"/>
    <circle cx="24" cy="60" r="2" fill="#f5c542" opacity="0.6"/>
    <circle cx="72" cy="65" r="3" fill="#e94560" opacity="0.8"/>
    <circle cx="38" cy="74" r="2" fill="#f5c542" opacity="0.5"/>
    <circle cx="60" cy="18" r="2.5" fill="#ff6f00" opacity="0.7"/>
    <circle cx="18" cy="40" r="1.5" fill="#f5c542" opacity="0.4"/>
    <circle cx="78" cy="48" r="2" fill="#ff6f00" opacity="0.6"/>
  </g>
  <!-- 내부 플래시 -->
  <circle cx="48" cy="48" r="14" fill="url(#innerFlash)"/>
  <!-- 균열 패턴 -->
  <g stroke="#f5c542" stroke-width="1" opacity="0.5" fill="none" stroke-linecap="round">
    <path d="M48 48 L42 36 L38 28"/>
    <path d="M48 48 L56 38 L62 32"/>
    <path d="M48 48 L40 56 L34 64"/>
    <path d="M48 48 L58 54 L66 60"/>
    <path d="M48 48 L48 60 L46 70"/>
  </g>
</svg>
