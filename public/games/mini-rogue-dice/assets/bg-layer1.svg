<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#533483" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#533483" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eaeaea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#eaeaea" stop-opacity="0"/>
    </radialGradient>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fogFilter">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- 하늘 배경 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 달 -->
  <g filter="url(#bgGlow)">
    <circle cx="650" cy="100" r="60" fill="url(#moonGlow)"/>
    <circle cx="650" cy="100" r="30" fill="#533483" opacity="0.3"/>
    <circle cx="650" cy="100" r="22" fill="#6a4c93" opacity="0.2"/>
    <circle cx="643" cy="93" r="5" fill="#3a2060" opacity="0.3"/>
    <circle cx="658" cy="105" r="3" fill="#3a2060" opacity="0.3"/>
    <circle cx="648" cy="110" r="4" fill="#3a2060" opacity="0.2"/>
  </g>
  <!-- 별들 -->
  <g>
    <circle cx="100" cy="50" r="1.5" fill="#eaeaea" opacity="0.9"/>
    <circle cx="200" cy="80" r="1" fill="#eaeaea" opacity="0.7"/>
    <circle cx="320" cy="30" r="1.8" fill="#f5c542" opacity="0.8"/>
    <circle cx="450" cy="60" r="1" fill="#eaeaea" opacity="0.6"/>
    <circle cx="550" cy="45" r="1.5" fill="#eaeaea" opacity="0.9"/>
    <circle cx="720" cy="55" r="1.2" fill="#f5c542" opacity="0.7"/>
    <circle cx="80" cy="120" r="1" fill="#eaeaea" opacity="0.5"/>
    <circle cx="380" cy="110" r="1.3" fill="#eaeaea" opacity="0.8"/>
    <circle cx="500" cy="90" r="0.8" fill="#eaeaea" opacity="0.6"/>
    <circle cx="150" cy="150" r="1" fill="#4fc3f7" opacity="0.5"/>
    <circle cx="760" cy="130" r="1.5" fill="#eaeaea" opacity="0.7"/>
    <circle cx="280" cy="140" r="0.8" fill="#eaeaea" opacity="0.4"/>
    <circle cx="600" cy="25" r="1.2" fill="#e94560" opacity="0.4"/>
    <circle cx="50" cy="200" r="1" fill="#eaeaea" opacity="0.3"/>
    <circle cx="430" cy="170" r="0.8" fill="#eaeaea" opacity="0.5"/>
    <circle cx="690" cy="180" r="1.3" fill="#f5c542" opacity="0.4"/>
  </g>
  <!-- 큰 별 (십자 형태) -->
  <g filter="url(#bgGlow)">
    <path d="M320 30 L321 26 L322 30 L326 31 L322 32 L321 36 L320 32 L316 31 Z" fill="#f5c542" opacity="0.9"/>
    <path d="M720 55 L721 51 L722 55 L726 56 L722 57 L721 61 L720 57 L716 56 Z" fill="#f5c542" opacity="0.8"/>
  </g>
  <!-- 원경 산맥 -->
  <g opacity="0.3">
    <path d="M0 400 Q50 300 120 350 Q180 280 260 340 Q320 290 400 330 Q460 270 540 320 Q600 280 680 350 Q740 300 800 360 L800 600 L0 600 Z" fill="#0f3460"/>
  </g>
  <!-- 던전 입구 실루엣 (원경) -->
  <g opacity="0.2">
    <path d="M350 380 L350 320 Q360 300 380 300 L420 300 Q440 300 450 320 L450 380 Z" fill="#533483"/>
    <path d="M380 380 L380 340 Q390 330 400 330 Q410 330 420 340 L420 380 Z" fill="#1a1a2e"/>
    <!-- 작은 탑들 -->
    <rect x="345" y="310" width="10" height="20" fill="#533483"/>
    <polygon points="345,310 350,295 355,310" fill="#533483"/>
    <rect x="445" y="310" width="10" height="20" fill="#533483"/>
    <polygon points="445,310 450,295 455,310" fill="#533483"/>
  </g>
  <!-- 안개 레이어 -->
  <g filter="url(#fogFilter)" opacity="0.15">
    <ellipse cx="200" cy="420" rx="200" ry="30" fill="#533483"/>
    <ellipse cx="600" cy="450" rx="250" ry="25" fill="#533483"/>
    <ellipse cx="400" cy="500" rx="300" ry="40" fill="#16213e"/>
  </g>
  <!-- 바닥 그라디언트 -->
  <rect x="0" y="480" width="800" height="120" fill="#0f3460" opacity="0.4"/>
</svg>
