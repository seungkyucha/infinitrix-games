<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="50%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#c49000"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f5c542" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5c542" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldShine" cx="40%" cy="35%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldGlowFilter">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외부 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#goldGlow)" filter="url(#goldGlowFilter)"/>
  <!-- 코인 본체 -->
  <circle cx="16" cy="16" r="11" fill="url(#goldGrad)" filter="url(#goldGlowFilter)"/>
  <!-- 코인 테두리 -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#c49000" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#c49000" stroke-width="0.5" opacity="0.6"/>
  <!-- 중앙 G 문양 (골드 심볼) -->
  <path d="M13 12 Q16 10 19 12 Q21 14 20 17 L17 17 L17 15 Q18 14 17 13 Q16 12 15 13 Q13 14 13 16 Q13 18 15 19 Q17 20 19 19" fill="none" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 하이라이트 -->
  <circle cx="16" cy="16" r="11" fill="url(#goldShine)"/>
  <!-- 상단 빛 반사 -->
  <path d="M12 11 Q16 9 20 11" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
</svg>
