<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="40%" stop-color="#2d1520"/>
      <stop offset="100%" stop-color="#4a2030"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="smoke">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8"/>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Ambient glow from fires -->
  <ellipse cx="200" cy="260" rx="200" ry="80" fill="url(#glow)"/>

  <!-- Distant ruined buildings silhouette -->
  <g fill="#15080d" opacity="0.7">
    <rect x="0" y="160" width="30" height="60"/>
    <rect x="25" y="140" width="20" height="80"/>
    <polygon points="60,180 80,130 100,180"/>
    <rect x="340" y="150" width="25" height="70"/>
    <rect x="360" y="130" width="40" height="90"/>
    <polygon points="310,180 325,140 340,180"/>
  </g>

  <!-- Ground / ash terrain -->
  <rect x="0" y="220" width="400" height="80" fill="#2a1a1a"/>
  <rect x="0" y="218" width="400" height="6" fill="#3a2525" rx="2"/>

  <!-- Fortress main structure (damaged) -->
  <g fill="#4a3a3a" stroke="#3a2a2a" stroke-width="1">
    <!-- Left tower -->
    <rect x="100" y="130" width="40" height="90"/>
    <rect x="95" y="125" width="50" height="10" fill="#5a4a4a"/>
    <!-- Battlements left -->
    <rect x="95" y="115" width="12" height="15" fill="#5a4a4a"/>
    <rect x="115" y="118" width="12" height="12" fill="#5a4a4a"/>
    <rect x="133" y="115" width="12" height="15" fill="#5a4a4a"/>

    <!-- Right tower -->
    <rect x="260" y="140" width="40" height="80"/>
    <rect x="255" y="135" width="50" height="10" fill="#5a4a4a"/>
    <!-- Battlements right (damaged) -->
    <rect x="255" y="125" width="12" height="15" fill="#5a4a4a"/>
    <rect x="290" y="128" width="10" height="12" fill="#5a4a4a"/>

    <!-- Center wall -->
    <rect x="140" y="160" width="120" height="60" fill="#443333"/>
    <rect x="140" y="155" width="120" height="8" fill="#554444"/>

    <!-- Gate -->
    <rect x="180" y="180" width="40" height="40" fill="#1a0e0e" rx="20" ry="0"/>
    <path d="M180,220 L180,180 A20,20 0 0,1 220,180 L220,220 Z" fill="#1a0e0e"/>
  </g>

  <!-- Damage cracks on fortress -->
  <g stroke="#2a1a1a" stroke-width="2" fill="none">
    <path d="M270,145 L275,160 L268,175"/>
    <path d="M115,135 L120,150 L112,158"/>
    <path d="M160,158 L165,170 L155,180"/>
  </g>

  <!-- Barricade in front -->
  <g fill="#6a5533" stroke="#4a3a22" stroke-width="1">
    <rect x="130" y="225" width="50" height="12" rx="2" transform="rotate(-5,155,231)"/>
    <rect x="220" y="227" width="45" height="10" rx="2" transform="rotate(3,242,232)"/>
    <rect x="165" y="222" width="8" height="18" rx="1"/>
    <rect x="230" y="224" width="8" height="16" rx="1"/>
  </g>

  <!-- Turret on left tower -->
  <g fill="#666" stroke="#444" stroke-width="1">
    <rect x="112" y="108" width="16" height="12" rx="2"/>
    <rect x="118" y="96" width="4" height="16"/>
    <circle cx="120" cy="94" r="3" fill="#888"/>
  </g>

  <!-- Fire/flames on right side (damage) -->
  <g fill="url(#fire)" opacity="0.8">
    <ellipse cx="285" cy="135" rx="8" ry="14"/>
    <ellipse cx="290" cy="138" rx="5" ry="10"/>
    <ellipse cx="280" cy="140" rx="4" ry="8"/>
  </g>

  <!-- Zombie silhouettes approaching -->
  <g fill="#1a2a1a" opacity="0.85">
    <!-- Zombie 1 -->
    <circle cx="50" cy="210" r="6"/>
    <rect x="47" y="216" width="6" height="14" rx="1"/>
    <line x1="47" y1="220" x2="40" y2="226" stroke="#1a2a1a" stroke-width="2"/>
    <line x1="53" y1="218" x2="60" y2="212" stroke="#1a2a1a" stroke-width="2"/>

    <!-- Zombie 2 -->
    <circle cx="70" cy="212" r="5"/>
    <rect x="67" y="217" width="6" height="12" rx="1"/>
    <line x1="67" y1="221" x2="62" y2="228" stroke="#1a2a1a" stroke-width="2"/>
    <line x1="73" y1="219" x2="79" y2="214" stroke="#1a2a1a" stroke-width="2"/>

    <!-- Zombie 3 (hulk, bigger) -->
    <circle cx="30" cy="205" r="8"/>
    <rect x="25" y="213" width="10" height="18" rx="2"/>
    <line x1="25" y1="218" x2="16" y2="226" stroke="#1a2a1a" stroke-width="3"/>
    <line x1="35" y1="216" x2="44" y2="210" stroke="#1a2a1a" stroke-width="3"/>

    <!-- Zombie 4 (right side) -->
    <circle cx="355" cy="212" r="5"/>
    <rect x="352" y="217" width="6" height="12" rx="1"/>
    <line x1="352" y1="220" x2="346" y2="226" stroke="#1a2a1a" stroke-width="2"/>
    <line x1="358" y1="218" x2="364" y2="213" stroke="#1a2a1a" stroke-width="2"/>

    <!-- Zombie 5 (right side) -->
    <circle cx="375" cy="208" r="6"/>
    <rect x="372" y="214" width="6" height="14" rx="1"/>
    <line x1="372" y1="219" x2="366" y2="225" stroke="#1a2a1a" stroke-width="2"/>
  </g>

  <!-- Zombie glowing eyes -->
  <g fill="#44ff44">
    <circle cx="48" cy="209" r="1.2"/>
    <circle cx="52" cy="209" r="1.2"/>
    <circle cx="68" cy="211" r="1"/>
    <circle cx="72" cy="211" r="1"/>
    <circle cx="27" cy="204" r="1.5"/>
    <circle cx="33" cy="204" r="1.5"/>
    <circle cx="353" cy="211" r="1"/>
    <circle cx="357" cy="211" r="1"/>
    <circle cx="373" cy="207" r="1.2"/>
    <circle cx="377" cy="207" r="1.2"/>
  </g>

  <!-- Ash particles -->
  <g fill="#888" opacity="0.5">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="150" cy="70" r="1"/>
    <circle cx="230" cy="90" r="1.2"/>
    <circle cx="310" cy="60" r="1"/>
    <circle cx="180" cy="50" r="0.8"/>
    <circle cx="350" cy="80" r="1.3"/>
    <circle cx="50" cy="130" r="1"/>
    <circle cx="280" cy="40" r="0.9"/>
    <circle cx="120" cy="85" r="1.1"/>
  </g>

  <!-- Moon -->
  <circle cx="330" cy="45" r="22" fill="#eeddcc" opacity="0.8"/>
  <circle cx="338" cy="40" r="18" fill="url(#sky)"/>

  <!-- Title text -->
  <text x="200" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#ff9966" stroke="#000" stroke-width="0.5" letter-spacing="2">
    ASHEN STRONGHOLD
  </text>
  <text x="200" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#cc8866" opacity="0.8">
    잿빛 요새
  </text>
</svg>
