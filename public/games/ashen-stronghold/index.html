// ── 스피터 좀비 원거리 공격 시스템 ──
// 스피터는 원거리에서 산성액을 발사하여 바리케이드/코어를 손상
function updateSpitterAttack(dt) {
  const dtSec = dt / 1000;
  const cs = G.cellSize;
  for (const z of G.zombies) {
    if (!z.alive || z.type !== 'spitter' || z.stunTimer > 0) continue;
    if (!z._spitCd) z._spitCd = 0;
    z._spitCd -= dtSec;
    if (z._spitCd > 0) continue;
    // 사거리 내 타겟 찾기 (코어 또는 바리케이드)
    const corePos = getCorePos();
    const corePx = G.gridOffX + corePos.x * cs + cs;
    const corePy = G.gridOffY + corePos.y * cs + cs;
    const distToCore = MathUtil.dist(z.x, z.y, corePx, corePy);
    if (distToCore < cs * 5) {
      // 산성액 투사체 생성
      const angle = MathUtil.angle(z.x, z.y, corePx, corePy);
      G.projectiles.push({
        x: z.x, y: z.y, angle, speed: 180, dmg: 3,
        type: 'acid', life: 2.0, piercing: false, hitCount: 0, maxHits: 1,
        isEnemy: true, // 적 투사체 플래그
      });
      z._spitCd = 3.0;
      sfx('zombie_hit');
      particles.emit(z.x, z.y, 5, { color: '#4a7c59', speed: 50, life: 0.3, size: 3 });
    }
  }
}

// 적 투사체 처리 (산성액 → 바리케이드/코어 데미지)
function updateEnemyProjectiles(dt) {
  const dtSec = dt / 1000;
  const cs = G.cellSize;
  for (let i = G.projectiles.length - 1; i >= 0; i--) {
    const p = G.projectiles[i];
    if (!p.isEnemy) continue;
    // 바리케이드 충돌
    for (const b of G.barricades) {
      if (b.hp <= 0) continue;
      const bx = G.gridOffX + b.gx * cs + cs / 2;
      const by = G.gridOffY + b.gy * cs + cs / 2;
      if (MathUtil.dist(p.x, p.y, bx, by) < cs * 0.6) {
        b.hp -= p.dmg;
        p.life = 0;
        particles.emit(bx, by, 4, { color: '#4a7c59', speed: 40, life: 0.2 });
        break;
      }
    }
    // 코어 충돌
    const corePos = getCorePos();
    const corePx = G.gridOffX + corePos.x * cs + cs;
    const corePy = G.gridOffY + corePos.y * cs + cs;
    if (MathUtil.dist(p.x, p.y, corePx, corePy) < cs * 1.5) {
      G.core.hp -= p.dmg;
      p.life = 0;
      particles.emit(corePx, corePy, 3, { color: COL.fire, speed: 30, life: 0.2 });
    }
    // 플레이어 충돌
    if (MathUtil.dist(p.x, p.y, G.player.x, G.player.y) < 15) {
      G.player.hp -= p.dmg * 2;
      p.life = 0;
      G.shakeIntensity = 2;
    }
  }
}

// ── 미니맵 시스템 ──
// Tab 키 또는 터치로 토글
function renderMinimap(ctx, w, h) {
  if (!G.minimap) return;
  const mapW = 120, mapH = 120;
  const mx = w - mapW - 10, my = 50;
  const cs = G.cellSize;
  const scale = mapW / (DEFENSE_GRID * cs);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(mx - 2, my - 2, mapW + 4, mapH + 4);
  ctx.strokeStyle = COL.frame;
  ctx.lineWidth = 1;
  ctx.strokeRect(mx - 2, my - 2, mapW + 4, mapH + 4);
  // 그리드
  for (let y = 0; y < DEFENSE_GRID; y++) {
    for (let x = 0; x < DEFENSE_GRID; x++) {
      const px = mx + x * (mapW / DEFENSE_GRID);
      const py = my + y * (mapH / DEFENSE_GRID);
      const cw = mapW / DEFENSE_GRID;
      const ch = mapH / DEFENSE_GRID;
      const cell = G.defenseGrid[y][x];
      if (cell === 2) { ctx.fillStyle = COL.heal + '88'; ctx.fillRect(px, py, cw, ch); }
      else if (cell === 1) { ctx.fillStyle = '#555'; ctx.fillRect(px, py, cw, ch); }
    }
  }
  // 좀비 도트
  ctx.fillStyle = COL.fire;
  for (const z of G.zombies) {
    if (!z.alive) continue;
    const rx = mx + ((z.x - G.gridOffX) / (DEFENSE_GRID * cs)) * mapW;
    const ry = my + ((z.y - G.gridOffY) / (DEFENSE_GRID * cs)) * mapH;
    ctx.fillRect(rx - 1, ry - 1, 3, 3);
  }
  // 보스 도트
  if (G.boss && G.boss.alive) {
    ctx.fillStyle = '#ff0000';
    const bx = mx + ((G.boss.x - G.gridOffX) / (DEFENSE_GRID * cs)) * mapW;
    const by = my + ((G.boss.y - G.gridOffY) / (DEFENSE_GRID * cs)) * mapH;
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
  }
  // 플레이어 도트
  ctx.fillStyle = COL.gold;
  const px2 = mx + ((G.player.x - G.gridOffX) / (DEFENSE_GRID * cs)) * mapW;
  const py2 = my + ((G.player.y - G.gridOffY) / (DEFENSE_GRID * cs)) * mapH;
  ctx.beginPath(); ctx.arc(px2, py2, 2, 0, Math.PI * 2); ctx.fill();
  UI.text(ctx, 'MAP', mx + mapW / 2, my - 8, { size: 9, color: '#888' });
}

// ── 날씨/환경 효과 시스템 ──
const WEATHER = {
  NONE: 0, RAIN: 1, FOG: 2, DUST: 3,
};
let currentWeather = WEATHER.NONE;
let weatherParticles = [];
const MAX_WEATHER_PARTICLES = 150;

function updateWeather(dt) {
  const dtSec = dt / 1000;
  // 구역별 날씨 결정
  if (G.state === ST.NIGHT_WAVE || G.state === ST.BOSS_NIGHT) {
    if (G.zone === 0) currentWeather = WEATHER.RAIN;
    else if (G.zone === 1) currentWeather = WEATHER.DUST;
    else if (G.zone === 2) currentWeather = WEATHER.FOG;
  } else if (G.state === ST.DAY_EXPLORE) {
    currentWeather = G.zone === 2 ? WEATHER.FOG : WEATHER.NONE;
  } else {
    currentWeather = WEATHER.NONE;
  }
  // 날씨 파티클 업데이트
  if (currentWeather === WEATHER.NONE) {
    weatherParticles = [];
    return;
  }
  // 생성
  while (weatherParticles.length < MAX_WEATHER_PARTICLES) {
    const rng = G.rng;
    switch (currentWeather) {
      case WEATHER.RAIN:
        weatherParticles.push({
          x: rng.range(0, G.screenW), y: rng.range(-50, -10),
          vx: -30, vy: 350 + rng.range(0, 100),
          life: rng.range(0.5, 1.5), maxLife: 1.5,
          size: rng.range(1, 2), color: 'rgba(150,200,255,0.3)',
        });
        break;
      case WEATHER.DUST:
        weatherParticles.push({
          x: rng.range(-20, G.screenW + 20), y: rng.range(0, G.screenH),
          vx: 40 + rng.range(0, 30), vy: rng.range(-5, 5),
          life: rng.range(2, 5), maxLife: 5,
          size: rng.range(2, 5), color: 'rgba(180,160,120,0.15)',
        });
        break;
      case WEATHER.FOG:
        weatherParticles.push({
          x: rng.range(0, G.screenW), y: rng.range(0, G.screenH),
          vx: rng.range(-10, 10), vy: rng.range(-5, 5),
          life: rng.range(3, 8), maxLife: 8,
          size: rng.range(30, 80), color: 'rgba(150,150,170,0.04)',
        });
        break;
    }
  }
  // 업데이트
  for (let i = weatherParticles.length - 1; i >= 0; i--) {
    const wp = weatherParticles[i];
    wp.x += wp.vx * dtSec;
    wp.y += wp.vy * dtSec;
    wp.life -= dtSec;
    if (wp.life <= 0 || wp.y > G.screenH + 50 || wp.x > G.screenW + 50) {
      weatherParticles.splice(i, 1);
    }
  }
}

function renderWeather(ctx, w, h) {
  if (currentWeather === WEATHER.NONE) return;
  for (const wp of weatherParticles) {
    const alpha = Math.min(1, wp.life / wp.maxLife);
    ctx.globalAlpha = alpha;
    if (currentWeather === WEATHER.RAIN) {
      ctx.strokeStyle = wp.color;
      ctx.lineWidth = wp.size;
      ctx.beginPath();
      ctx.moveTo(wp.x, wp.y);
      ctx.lineTo(wp.x + wp.vx * 0.02, wp.y + wp.vy * 0.02);
      ctx.stroke();
    } else if (currentWeather === WEATHER.DUST) {
      ctx.fillStyle = wp.color;
      ctx.beginPath(); ctx.arc(wp.x, wp.y, wp.size, 0, Math.PI * 2); ctx.fill();
    } else if (currentWeather === WEATHER.FOG) {
      ctx.fillStyle = wp.color;
      ctx.beginPath(); ctx.arc(wp.x, wp.y, wp.size, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function spawnDmgPopup(x, y, dmg, color) {

// ── 보스 등장 컷신 시스템 ──
let cutscene = null;

function startBossCutscene(bossIndex) {
  cutscene = {
    phase: 0, timer: 0, totalDur: 3.0,
    bossIndex, flashAlpha: 0, textAlpha: 0,
    zoomLevel: 1,
  };
}

function updateCutscene(dt) {
  if (!cutscene) return false;
  const dtSec = dt / 1000;
  cutscene.timer += dtSec;
  const t = cutscene.timer / cutscene.totalDur;
  if (t < 0.3) {
    cutscene.phase = 0;
    cutscene.flashAlpha = t / 0.3;
  } else if (t < 0.7) {
    cutscene.phase = 1;
    cutscene.textAlpha = (t - 0.3) / 0.4;
    cutscene.zoomLevel = 1 + (t - 0.3) * 0.3;
  } else if (t < 1.0) {
    cutscene.phase = 2;
    cutscene.flashAlpha = 1 - (t - 0.7) / 0.3;
    cutscene.textAlpha = 1 - (t - 0.7) / 0.3;
  } else {
    cutscene = null;
    return false;
  }
  return true;
}

function renderCutscene(ctx, w, h) {
  if (!cutscene) return;
  // 어두운 오버레이
  ctx.fillStyle = `rgba(0,0,0,${0.7 * cutscene.flashAlpha})`;
  ctx.fillRect(0, 0, w, h);
  // 보스 이름
  if (cutscene.phase >= 1) {
    ctx.globalAlpha = cutscene.textAlpha;
    const bossName = t(BOSS_NAMES[cutscene.bossIndex]);
    UI.text(ctx, '⚠ ' + bossName + ' ⚠', w / 2, h / 2 - 20, {
      size: 32, bold: true, color: COL.fire, glow: COL.fire
    });
    UI.text(ctx, t('bossWeakness') + ': ' + t(BOSS_WEAKNESSES[cutscene.bossIndex]), w / 2, h / 2 + 20, {
      size: 16, color: COL.cyan
    });
    ctx.globalAlpha = 1;
  }
  // 화면 테두리 적색 글로우
  ctx.strokeStyle = `rgba(231,76,60,${cutscene.flashAlpha * 0.6})`;
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, w - 4, h - 4);
}

// ── 요새 시각적 진화 시스템 ──
// 클리어한 구역 수에 따라 코어 외관 변화
function getCoreLevel() {
  const cleared = G.zonesCleared.filter(z => z).length;
  // 0=폐허, 1=임시캠프, 2=방어진지, 3=견고한요새
  return cleared;
}

function renderCoreVisual(ctx, cx, cy, cs) {
  const level = getCoreLevel();
  const size = cs * 2;
  switch (level) {
    case 0: // 폐허
      ctx.fillStyle = '#3a3a40';
      ctx.fillRect(cx, cy, size, size);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx, cy, size, size);
      // 균열선
      ctx.strokeStyle = '#2a2a30';
      ctx.beginPath();
      ctx.moveTo(cx + size * 0.3, cy);
      ctx.lineTo(cx + size * 0.5, cy + size * 0.7);
      ctx.stroke();
      break;
    case 1: // 임시 캠프
      ctx.fillStyle = '#4a4a50';
      ctx.fillRect(cx, cy, size, size);
      ctx.strokeStyle = COL.frame;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(cx, cy, size, size);
      // 모래주머니
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(cx - 3, cy + size - 6, size + 6, 6);
      break;
    case 2: // 방어 진지
      ctx.fillStyle = '#5c6b73';
      ctx.fillRect(cx, cy, size, size);
      ctx.strokeStyle = COL.heal;
      ctx.lineWidth = 2;
      ctx.strokeRect(cx, cy, size, size);
      // 강화벽
      ctx.fillStyle = '#4a5a63';
      ctx.fillRect(cx - 4, cy - 4, size + 8, 4);
      ctx.fillRect(cx - 4, cy + size, size + 8, 4);
      break;
    case 3: // 견고한 요새
      // 글로우 효과
      const glow = ctx.createRadialGradient(cx + size / 2, cy + size / 2, 0, cx + size / 2, cy + size / 2, size);
      glow.addColorStop(0, 'rgba(0,184,148,0.2)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(cx - size / 2, cy - size / 2, size * 2, size * 2);
      ctx.fillStyle = '#6c7c85';
      ctx.fillRect(cx, cy, size, size);
      ctx.strokeStyle = COL.gold;
      ctx.lineWidth = 2;
      ctx.strokeRect(cx, cy, size, size);
      // 깃발
      ctx.fillStyle = COL.fire;
      ctx.fillRect(cx + size / 2 - 1, cy - 12, 2, 12);
      ctx.fillStyle = COL.gold;
      ctx.fillRect(cx + size / 2 + 1, cy - 12, 8, 6);
      break;
  }
  // CORE 텍스트
  UI.text(ctx, 'CORE', cx + size / 2, cy + size / 2, { size: 10, bold: true, color: COL.heal });
}

// ── 자원 관리 야간 소모 시스템 ──
// 야간에 서바이버 유지 비용 (식량)
function consumeSurvivorFood(dt) {
  if (G.state !== ST.NIGHT_WAVE && G.state !== ST.BOSS_NIGHT) return;
  const dtSec = dt / 1000;
  const survCount = G.survivors.filter(s => s.alive && s.placed).length;
  // 서바이버 1명당 초당 0.2 식량 소모
  const consumption = survCount * 0.2 * dtSec;
  G.food -= consumption;
  if (G.food < 0) {
    G.food = 0;
    // 식량 부족 시 서바이버 약화
    for (const s of G.survivors) {
      if (s.alive && s.placed) s.hp -= 0.5 * dtSec;
    }
  }
}

// ── 웨이브 간 보너스 계산 시스템 ──
function calculateWaveScore() {
  let score = 100 * (G.zone + 1);
  // 코어 무손실 보너스
  if (G.core.hp >= G.core.maxHp) score += 200;
  // DDA 레벨 0 보너스
  if (G.dda.level === 0) score = Math.floor(score * 1.5);
  return score;
}

// ── 킬 콤보 시스템 ──
let comboCount = 0;
let comboTimer = 0;
const COMBO_TIMEOUT = 2.0; // 2초 내 연속 킬

function onZombieKilled(x, y, score) {
  comboTimer = COMBO_TIMEOUT;
  comboCount++;
  // 콤보 보너스
  let bonus = 0;
  if (comboCount >= 10) { bonus = score; spawnFloatingText(x, y - 20, 'x10 COMBO!', COL.purple); }
  else if (comboCount >= 5) { bonus = Math.floor(score * 0.5); spawnFloatingText(x, y - 20, 'x5 COMBO!', COL.gold); }
  else if (comboCount >= 3) { bonus = Math.floor(score * 0.2); spawnFloatingText(x, y - 20, 'x3!', COL.accent); }
  G.score += bonus;
}

function updateCombo(dt) {
  if (comboTimer > 0) {
    comboTimer -= dt / 1000;
    if (comboTimer <= 0) comboCount = 0;
  }
}

// ── 렌더 콤보 카운터 ──
function renderCombo(ctx, w, h) {
  if (comboCount >= 3) {
    const pulse = 0.8 + Math.sin(G.animTime / 100) * 0.2;
    const size = 16 + comboCount;
    ctx.globalAlpha = Math.min(1, comboTimer / 0.5) * pulse;
    UI.text(ctx, comboCount + 'x COMBO', w / 2, 70, {
      size: Math.min(size, 30), bold: true, color: comboCount >= 10 ? COL.purple : COL.gold,
      glow: comboCount >= 10 ? COL.purple : COL.gold,
    });
    ctx.globalAlpha = 1;
  }
}

// ── 업그레이드 효과 적용 헬퍼 ──
function getUpgradeEffect(axis, level) {
  if (level <= 0) return {};
  switch (axis) {
    case 'defense':
      return {
        barricadeHpMult: level >= 1 ? 1.2 : 1,
        coreHpBonus: level >= 2 ? 25 : 0,
        canRepair: level >= 3,
        doubleBarricade: level >= 4,
        coreRegen: level >= 5 ? 2 : 0,
      };
    case 'attack':
      return {
        dmgMult: level >= 1 ? 1.15 : 1,
        turretRangeBonus: level >= 2 ? 1 : 0,
        piercing: level >= 3,
        advancedTurrets: level >= 4,
        critChance: level >= 5 ? 0.2 : 0,
      };
    case 'explore':
      return {
        timeBonus: level >= 1 ? 10 : 0,
        radarRange: level >= 2 ? 1.5 : 1,
        survFindBonus: level >= 3 ? 0.2 : 0,
        bossHint: level >= 4,
        hiddenAccess: level >= 5,
      };
  }
  return {};
}

// ── 유물 시너지 계산 ──
function calculateRelicSynergies() {
  const synergies = {};
  for (const r of G.relics) {
    if (!synergies[r.stat]) synergies[r.stat] = 0;
    synergies[r.stat] += r.val;
  }
  // 캡 적용 (F30)
  for (const key in synergies) {
    if (synergies[key] > SYNERGY_CAP_MULT - 1) {
      synergies[key] = SYNERGY_CAP_MULT - 1;
    }
  }
  return synergies;
}

// ── 유물 표시 패널 (MAP 화면 하단) ──
function renderRelicPanel(ctx, w, h) {
  if (G.relics.length === 0) return;
  const panelY = h - 140;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, panelY, w - 20, 50);
  UI.text(ctx, 'Relics:', 40, panelY + 12, { size: 10, color: '#888', align: 'left' });
  const tierColors = ['#aaa', COL.cyan, COL.purple];
  for (let i = 0; i < Math.min(G.relics.length, 8); i++) {
    const r = G.relics[i];
    const rx = 80 + i * 35;
    ctx.fillStyle = tierColors[r.tier] + '44';
    ctx.strokeStyle = tierColors[r.tier];
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(rx, panelY + 5, 28, 28, 4); ctx.fill(); ctx.stroke();
    UI.text(ctx, r.name[0], rx + 14, panelY + 19, { size: 10, bold: true, color: tierColors[r.tier] });
  }
  if (G.relics.length > 8) {
    UI.text(ctx, '+' + (G.relics.length - 8), 80 + 8 * 35 + 15, panelY + 19, { size: 10, color: '#888' });
  }
}

// ── 탐색 맵 Fog of War 시스템 ──
let fogGrid = null;
function initFogOfWar() {
  fogGrid = [];
  for (let y = 0; y < GRID_ROWS; y++) {
    fogGrid[y] = [];
    for (let x = 0; x < GRID_COLS; x++) {
      fogGrid[y][x] = false; // false = 안개
    }
  }
}

function updateFogOfWar() {
  if (!fogGrid) initFogOfWar();
  const cs = Math.max(MIN_TOUCH_TARGET, Math.floor(Math.min(G.screenW / GRID_COLS, (G.screenH - 60) / GRID_ROWS)));
  const px = Math.floor((G.player.x) / cs);
  const py = Math.floor((G.player.y - 50) / cs);
  const radarRange = G.upgrades.explore >= 2 ? 4 : 3;
  for (let dy = -radarRange; dy <= radarRange; dy++) {
    for (let dx = -radarRange; dx <= radarRange; dx++) {
      const fx = px + dx, fy = py + dy;
      if (fx >= 0 && fx < GRID_COLS && fy >= 0 && fy < GRID_ROWS) {
        if (dx * dx + dy * dy <= radarRange * radarRange) {
          fogGrid[fy][fx] = true;
        }
      }
    }
  }
}

function renderFogOfWar(ctx, w, h) {
  if (!fogGrid) return;
  const cs = Math.max(MIN_TOUCH_TARGET, Math.floor(Math.min(w / GRID_COLS, (h - 60) / GRID_ROWS)));
  for (let y = 0; y < GRID_ROWS; y++) {
    for (let x = 0; x < GRID_COLS; x++) {
      if (!fogGrid[y][x]) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(x * cs, y * cs + 50, cs, cs);
      }
    }
  }
}

// ── 밤 시각 효과 (비네트 + 제한된 시야) ──
function renderNightVignette(ctx, w, h) {
  if (G.dayNightLerp > 0.5) return;
  // 비네트 — 코어/플레이어 중심으로 밝고 가장자리 어두운 효과
  const cx = G.player.x || w / 2;
  const cy = G.player.y || h / 2;
  const maxDim = Math.max(w, h);
  const grad = ctx.createRadialGradient(cx, cy, maxDim * 0.2, cx, cy, maxDim * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// ── 바리케이드 수리 시스템 (업그레이드 방어 Lv3) ──
function repairBarricadesDuringDay(dt) {
  if (G.state !== ST.DAY_EXPLORE) return;
  if (G.upgrades.defense < 3) return;
  const dtSec = dt / 1000;
  for (const b of G.barricades) {
    if (b.hp < b.maxHp && b.hp > 0) {
      b.hp = Math.min(b.maxHp, b.hp + 5 * dtSec);
    }
  }
}

// ── 히든 스테이지 접근 시스템 (업그레이드 탐색 Lv5) ──
function checkHiddenStage() {
  if (G.upgrades.explore < 5) return false;
  // 모든 구역 클리어 + 탐색 Lv5 → 히든 스테이지
  if (G.zonesCleared.every(z => z)) {
    return true;
  }
  return false;
}

// ── 스프라이트 시트 시뮬레이션 (단일 PNG에서 애니메이션 프레임 추출) ──
function drawAnimatedSprite(ctx, assetKey, x, y, w, h, frame, totalFrames) {
  const img = assets.sprites[assetKey];
  if (!img) return false;
  // 단일 이미지이므로 약간의 회전/스케일로 애니메이션 시뮬레이션
  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  const bobX = Math.sin(frame * 0.5) * 2;
  const bobY = Math.abs(Math.sin(frame * 0.3)) * -3;
  ctx.translate(bobX, bobY);
  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  ctx.restore();
  return true;
}

// ── 화면 전환 이펙트 (와이프) ──
let wipeProgress = 0;
let wipeDirection = 1;
function renderWipeTransition(ctx, w, h) {
  if (G.fadeAlpha <= 0) return;
  // 원형 와이프
  const radius = Math.max(w, h) * (1 - G.fadeAlpha);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, w, h);
  ctx.arc(w / 2, h / 2, Math.max(0, radius), 0, Math.PI * 2, true);
  ctx.clip();
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ── 레이더/적 감지 UI ──
function renderRadar(ctx, w, h) {
  if (G.state !== ST.NIGHT_PREP) return;
  // 스폰 방향 미리보기
  const cs = G.cellSize;
  const spawns = getSpawnPoints();
  const rng = new SeededRNG(G.zone * 1000 + G.nightNum * 100 + G.waveNum + 1);
  const activeCount = 2 + (G.zone > 0 ? 1 : 0);
  const activeSpawns = rng.shuffle([...spawns]).slice(0, activeCount);
  for (const sp of activeSpawns) {
    const px = G.gridOffX + sp.x * cs + cs / 2;
    const py = G.gridOffY + sp.y * cs + cs / 2;
    // 펄스 경고
    const pulse = 0.3 + Math.sin(G.animTime / 300) * 0.3;
    ctx.strokeStyle = `rgba(231,76,60,${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    const r = 15 + Math.sin(G.animTime / 200) * 5;
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.stroke();
    // 방향 화살표
    const arrowLen = 20;
    const core = getCorePos();
    const corePx = G.gridOffX + core.x * cs + cs;
    const corePy = G.gridOffY + core.y * cs + cs;
    const ang = MathUtil.angle(px, py, corePx, corePy);
    ctx.strokeStyle = COL.fire + '88';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(ang) * arrowLen, py + Math.sin(ang) * arrowLen);
    ctx.stroke();
  }
}

// ── 체력 재생 시스템 (식량 소비) ──
function playerHealWithFood(dt) {
  if (G.state !== ST.DAY_EXPLORE) return;
  const dtSec = dt / 1000;
  if (G.player.hp < G.player.maxHp && G.food > 0) {
    const healRate = 5; // HP/초
    const foodCost = 0.5; // 식량/초
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + healRate * dtSec);
    G.food -= foodCost * dtSec;
    if (G.food < 0) G.food = 0;
  }
}

// ── 구역 선택 맵 시각적 연결선 ──
function renderZoneConnections(ctx, w, h) {
  // 구역 간 연결선
  for (let i = 0; i < 2; i++) {
    const y1 = 120 + i * 80 + 60;
    const y2 = 120 + (i + 1) * 80;
    const cleared = G.zonesCleared[i];
    ctx.strokeStyle = cleared ? COL.heal + '44' : '#333';
    ctx.lineWidth = 2;
    ctx.setLineDash(cleared ? [] : [5, 5]);
    ctx.beginPath();
    ctx.moveTo(w / 2, y1);
    ctx.lineTo(w / 2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── 주간 탐색 건물 진입 이벤트 ──
const BUILDING_EVENTS = [
  { type: 'loot', chance: 0.6, rewards: ['scrap', 'food', 'ammo'] },
  { type: 'ambush', chance: 0.2, zombieCount: 2 },
  { type: 'survivor', chance: 0.1 },
  { type: 'empty', chance: 0.1 },
];

function triggerBuildingEvent(gx, gy) {
  const roll = G.rng.next();
  let cumulative = 0;
  for (const evt of BUILDING_EVENTS) {
    cumulative += evt.chance;
    if (roll < cumulative) {
      switch (evt.type) {
        case 'loot': {
          const resType = G.rng.pick(evt.rewards);
          const amount = G.rng.int(5, 20);
          const zoneBonus = ZONE_FEATURES[G.zone] ? ZONE_FEATURES[G.zone].itemBonus[resType] || 1 : 1;
          const final = Math.floor(amount * zoneBonus);
          if (resType === 'scrap') G.scrap += final;
          else if (resType === 'food') G.food += final;
          else if (resType === 'ammo') G.ammo += final;
          sfx('pickup');
          const cs = Math.max(MIN_TOUCH_TARGET, Math.floor(Math.min(G.screenW / GRID_COLS, (G.screenH - 60) / GRID_ROWS)));
          spawnFloatingText(gx * cs + cs / 2, gy * cs + 40, '+' + final + ' ' + t(resType), COL.gold);
          break;
        }
        case 'ambush': {
          const cs = Math.max(MIN_TOUCH_TARGET, Math.floor(Math.min(G.screenW / GRID_COLS, (G.screenH - 60) / GRID_ROWS)));
          for (let i = 0; i < evt.zombieCount; i++) {
            const z = createZombie(
              gx * cs + cs / 2 + G.rng.range(-30, 30),
              gy * cs + cs / 2 + 50 + G.rng.range(-30, 30),
              'basic', G.zone
            );
            z.speed = 50;
            z.patrolAngle = G.rng.range(0, Math.PI * 2);
            z.patrolTimer = 1;
            G.zombies.push(z);
          }
          sfx('alert');
          showWarning('⚠ Ambush!');
          break;
        }
        case 'survivor': {
          const st = G.rng.pick(SURV_ORDER);
          const s = createSurvivor(st);
          if (s) G.survivors.push(s);
          sfx('score');
          showWarning(t('survivor_found'));
          break;
        }
        case 'empty':
          // 빈 건물
          break;
      }
      return;
    }
  }
}

// ── 건물 탐색 상태 추적 ──
let exploredBuildings = new Set();

function interactWithBuilding(gx, gy) {
  const key = gx + ',' + gy;
  if (exploredBuildings.has(key)) return;
  if (G.exploreGrid && G.exploreGrid[gy] && G.exploreGrid[gy][gx] === 'building') {
    exploredBuildings.add(key);
    triggerBuildingEvent(gx, gy);
    G.exploreGrid[gy][gx] = 'explored';
  }
}

// ── 서바이버 사망 처리 ──
function cleanupSurvivors() {
  for (const s of G.survivors) {
    if (s.hp <= 0) s.alive = false;
  }
}

// ── 확장 렌더링 통합 (기존 render 함수에 훅) ──
// 기존 render 함수의 particles.render(ctx) 이후에 이 함수들이 호출되도록
// 직접 patch하기 어려우므로, 각 상태별 렌더에서 개별 호출로 통합

// 이 확장 시스템들은 기존 update/render 루프에서 조건부로 호출됩니다.
// 실제 통합은 기존 함수 내부의 적절한 위치에서 이루어집니다.

// ═══════════════════════════════════════════════════════════
// TAB 키 미니맵 토글 바인딩
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', (e) => {
  if (e.code === 'Tab') {
    e.preventDefault();
    G.minimap = !G.minimap;
  }
});

// ═══════════════════════════════════════════════════════════
// 디버그/통계 오버레이 (개발용, Shift+D 토글)
// ═══════════════════════════════════════════════════════════
let debugOverlay = false;
window.addEventListener('keydown', (e) => {
  if (e.code === 'KeyD' && e.shiftKey) {
    debugOverlay = !debugOverlay;
  }
});

function renderDebugOverlay(ctx, w, h) {
  if (!debugOverlay) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 200, 200);
  const lines = [
    'State: ' + G.state,
    'Zone: ' + G.zone + ' Night: ' + G.nightNum + ' Wave: ' + G.waveNum,
    'Core: ' + Math.round(G.core.hp) + '/' + G.core.maxHp,
    'Zombies: ' + G.zombies.length + ' Queue: ' + G.spawnQueue.length,
    'Projectiles: ' + G.projectiles.length,
    'Survivors: ' + G.survivors.filter(s => s.alive).length,
    'Barricades: ' + G.barricades.length,
    'Turrets: ' + G.turrets.length,
    'DDA: ' + G.dda.level,
    'Relics: ' + G.relics.length,
    'FPS: ' + (engine ? Math.round(1000 / 16.67) : '?'),
    'Combo: ' + comboCount,
    'Weather: ' + currentWeather,
  ];
  for (let i = 0; i < lines.length; i++) {
    UI.text(ctx, lines[i], 100, 15 + i * 14, { size: 10, color: '#0f0', align: 'center' });
  }
}

// ═══════════════════════════════════════════════════════════
// 탐색 시 폐허 파괴 (잔해 제거로 이동 공간 확보)
// ═══════════════════════════════════════════════════════════
function destroyRubble(gx, gy) {
  if (G.exploreGrid && G.exploreGrid[gy] && G.exploreGrid[gy][gx] === 'rubble') {
    G.exploreGrid[gy][gx] = 'road';
    G.scrap += 2; // 약간의 고철 획득
    sfx('build');
    const cs = Math.max(MIN_TOUCH_TARGET, Math.floor(Math.min(G.screenW / GRID_COLS, (G.screenH - 60) / GRID_ROWS)));
    particles.emit(gx * cs + cs / 2, gy * cs + cs / 2 + 50, 6, { color: '#8a8a8a', speed: 50, life: 0.3 });
  }
}

// ── 보스 페이즈 추적 변수 (updateExtended에서 사용) ──
let lastBossPhase = -1;
</script>
