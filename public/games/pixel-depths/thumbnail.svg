<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="pixelShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#c4b5fd" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Dungeon grid lines -->
  <g opacity="0.1" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Dungeon walls (pixel-style blocks) -->
  <g fill="#2d1b69" opacity="0.7">
    <rect x="0" y="0" width="80" height="60"/>
    <rect x="80" y="0" width="80" height="60"/>
    <rect x="240" y="0" width="80" height="60"/>
    <rect x="320" y="0" width="80" height="60"/>
    <rect x="0" y="60" width="80" height="60"/>
    <rect x="320" y="60" width="80" height="60"/>
    <rect x="0" y="180" width="80" height="60"/>
    <rect x="320" y="180" width="80" height="60"/>
    <rect x="0" y="240" width="80" height="60"/>
    <rect x="80" y="240" width="80" height="60"/>
    <rect x="240" y="240" width="80" height="60"/>
    <rect x="320" y="240" width="80" height="60"/>
  </g>

  <!-- Wall highlights -->
  <g fill="#4c1d95" opacity="0.4">
    <rect x="0" y="0" width="80" height="4"/>
    <rect x="80" y="0" width="80" height="4"/>
    <rect x="240" y="0" width="80" height="4"/>
    <rect x="320" y="0" width="80" height="4"/>
    <rect x="0" y="240" width="80" height="4"/>
    <rect x="80" y="240" width="80" height="4"/>
    <rect x="240" y="240" width="80" height="4"/>
    <rect x="320" y="240" width="80" height="4"/>
  </g>

  <!-- Floor tiles subtle pattern -->
  <g fill="#1e1145" opacity="0.3">
    <rect x="120" y="80" width="36" height="36" rx="2"/>
    <rect x="164" y="80" width="36" height="36" rx="2"/>
    <rect x="208" y="80" width="36" height="36" rx="2"/>
    <rect x="120" y="124" width="36" height="36" rx="2"/>
    <rect x="164" y="124" width="36" height="36" rx="2"/>
    <rect x="208" y="124" width="36" height="36" rx="2"/>
    <rect x="120" y="168" width="36" height="36" rx="2"/>
    <rect x="164" y="168" width="36" height="36" rx="2"/>
    <rect x="208" y="168" width="36" height="36" rx="2"/>
  </g>

  <!-- Player character (pixel hero) -->
  <g filter="url(#pixelShadow)" transform="translate(176, 110)">
    <!-- Body -->
    <rect x="12" y="0" width="24" height="8" fill="#60a5fa"/>
    <rect x="8" y="8" width="32" height="8" fill="#3b82f6"/>
    <rect x="8" y="16" width="32" height="8" fill="#2563eb"/>
    <rect x="4" y="24" width="40" height="8" fill="#1d4ed8"/>
    <!-- Sword -->
    <rect x="44" y="12" width="8" height="4" fill="#fbbf24"/>
    <rect x="52" y="8" width="16" height="4" fill="#e5e7eb"/>
    <rect x="52" y="12" width="16" height="4" fill="#d1d5db"/>
    <!-- Shield -->
    <rect x="-8" y="16" width="12" height="16" fill="#a78bfa" rx="2"/>
    <rect x="-4" y="20" width="4" height="8" fill="#c4b5fd"/>
    <!-- Eyes -->
    <rect x="16" y="4" width="4" height="4" fill="#fff"/>
    <rect x="28" y="4" width="4" height="4" fill="#fff"/>
  </g>

  <!-- Slime enemy -->
  <g transform="translate(260, 140)" opacity="0.9">
    <ellipse cx="16" cy="24" rx="20" ry="12" fill="#22c55e" opacity="0.3"/>
    <rect x="4" y="8" width="24" height="16" fill="#22c55e" rx="4"/>
    <rect x="0" y="12" width="32" height="12" fill="#16a34a" rx="4"/>
    <rect x="8" y="12" width="4" height="4" fill="#fff"/>
    <rect x="20" y="12" width="4" height="4" fill="#fff"/>
  </g>

  <!-- Treasure chest -->
  <g transform="translate(110, 170)">
    <rect x="0" y="4" width="24" height="16" fill="#a16207" rx="2"/>
    <rect x="0" y="4" width="24" height="8" fill="#ca8a04" rx="2"/>
    <rect x="8" y="8" width="8" height="8" fill="#fbbf24"/>
    <rect x="10" y="10" width="4" height="4" fill="#fef08a"/>
  </g>

  <!-- Stairs down -->
  <g transform="translate(250, 190)" opacity="0.6">
    <rect x="0" y="0" width="28" height="4" fill="#6b7280"/>
    <rect x="4" y="4" width="24" height="4" fill="#4b5563"/>
    <rect x="8" y="8" width="20" height="4" fill="#374151"/>
    <rect x="12" y="12" width="16" height="4" fill="#1f2937"/>
  </g>

  <!-- Ambient particles -->
  <g fill="#a78bfa">
    <circle cx="140" cy="100" r="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="130" r="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="180" r="1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="90" r="1.5" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom glow -->
  <rect x="80" y="220" width="240" height="80" fill="url(#glow)" opacity="0.3"/>

  <!-- Title text -->
  <text x="200" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#e9d5ff" filter="url(#textGlow)">PIXEL DEPTHS</text>
  <text x="200" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a78bfa" opacity="0.7">픽셀 심연</text>
</svg>