<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Main body gradient: bright green top to darker green bottom -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%" fx="45%" fy="35%">
      <stop offset="0%" stop-color="#80e080" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#40c040" stop-opacity="0.92"/>
      <stop offset="75%" stop-color="#2a7a2a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#207020" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Inner glow gradient for translucency feel -->
    <radialGradient id="innerGlow" cx="45%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#80e080" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#60d060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#40c040" stop-opacity="0"/>
    </radialGradient>

    <!-- Top highlight gradient -->
    <radialGradient id="highlightGrad" cx="40%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#b0f0b0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#80e080" stop-opacity="0"/>
    </radialGradient>

    <!-- Puddle gradient -->
    <radialGradient id="puddleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#30a030" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#2a7a2a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#207020" stop-opacity="0"/>
    </radialGradient>

    <!-- Bubble gradient -->
    <radialGradient id="bubbleGrad" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a0f0a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60d060" stop-opacity="0.15"/>
    </radialGradient>

    <!-- Sparkle gradient (gold) -->
    <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for body -->
    <filter id="bodyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for puddle -->
    <filter id="puddleBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ==================== PUDDLE GROUP ==================== -->
  <g id="puddle">
    <!-- Shadow on ground -->
    <ellipse cx="64" cy="108" rx="42" ry="8" fill="#1a3a1a" opacity="0.3" filter="url(#puddleBlur)"/>
    <!-- Slime puddle base -->
    <ellipse cx="64" cy="104" rx="38" ry="6" fill="url(#puddleGrad)"/>
    <!-- Drip puddle left -->
    <ellipse cx="40" cy="106" rx="8" ry="3" fill="#30a030" opacity="0.35" filter="url(#puddleBlur)"/>
    <!-- Drip puddle right -->
    <ellipse cx="86" cy="107" rx="6" ry="2.5" fill="#30a030" opacity="0.3" filter="url(#puddleBlur)"/>
  </g>

  <!-- ==================== BODY GROUP ==================== -->
  <g id="body" filter="url(#bodyGlow)">
    <!-- Main slime body: blobby organic shape -->
    <path d="
      M 28,88
      C 24,78 22,62 30,48
      C 36,38 44,28 56,24
      C 62,22 68,22 74,24
      C 86,28 94,38 100,50
      C 106,62 104,78 100,88
      C 98,94 92,100 84,102
      C 76,104 52,104 44,102
      C 36,100 30,94 28,88
      Z
    " fill="url(#bodyGrad)"/>

    <!-- Inner glow layer for translucent jelly effect -->
    <path d="
      M 32,86
      C 28,76 27,60 34,48
      C 40,38 48,30 58,27
      C 64,25 70,25 76,28
      C 86,32 92,42 96,52
      C 102,64 100,78 96,86
      C 94,92 88,96 82,98
      C 74,100 54,100 46,98
      C 38,96 34,92 32,86
      Z
    " fill="url(#innerGlow)"/>

    <!-- Top highlight for glossy look -->
    <ellipse cx="56" cy="42" rx="22" ry="14" fill="url(#highlightGrad)" transform="rotate(-8 56 42)"/>

    <!-- Secondary smaller highlight -->
    <ellipse cx="48" cy="36" rx="8" ry="5" fill="#ffffff" opacity="0.25" transform="rotate(-15 48 36)"/>

    <!-- Body contour detail: left bump -->
    <path d="
      M 30,70
      C 26,65 25,55 30,50
    " fill="none" stroke="#2a7a2a" stroke-width="1.5" opacity="0.4"/>

    <!-- Body contour detail: right bump -->
    <path d="
      M 98,72
      C 102,66 103,56 98,50
    " fill="none" stroke="#2a7a2a" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom edge darker line for grounding -->
    <path d="
      M 44,102
      C 52,105 76,105 84,102
    " fill="none" stroke="#1a5a1a" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ==================== EYES GROUP ==================== -->
  <g id="eyes">
    <!-- Left eye -->
    <ellipse cx="50" cy="62" rx="7" ry="8" fill="#1a1a2e"/>
    <!-- Left eye inner -->
    <ellipse cx="50" cy="63" rx="5" ry="6" fill="#0e0e1e"/>
    <!-- Left eye shine (top) -->
    <ellipse cx="48" cy="59" rx="2.5" ry="2" fill="#ffffff" opacity="0.95"/>
    <!-- Left eye shine (bottom small) -->
    <ellipse cx="52" cy="66" rx="1.2" ry="1" fill="#ffffff" opacity="0.5"/>

    <!-- Right eye -->
    <ellipse cx="78" cy="62" rx="7" ry="8" fill="#1a1a2e"/>
    <!-- Right eye inner -->
    <ellipse cx="78" cy="63" rx="5" ry="6" fill="#0e0e1e"/>
    <!-- Right eye shine (top) -->
    <ellipse cx="76" cy="59" rx="2.5" ry="2" fill="#ffffff" opacity="0.95"/>
    <!-- Right eye shine (bottom small) -->
    <ellipse cx="80" cy="66" rx="1.2" ry="1" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- ==================== MOUTH ==================== -->
  <g id="mouth">
    <!-- Small curved mouth - cute but slightly menacing -->
    <path d="M 58,76 C 60,80 68,80 70,76" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
    <!-- Tiny fang hint left -->
    <path d="M 59,76 L 60,79" fill="none" stroke="#1a1a2e" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <!-- Tiny fang hint right -->
    <path d="M 69,76 L 68,79" fill="none" stroke="#1a1a2e" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- ==================== INTERNAL DETAILS ==================== -->
  <g id="internalDetails">
    <!-- Internal bubble 1 -->
    <circle cx="42" cy="50" r="3" fill="url(#bubbleGrad)" opacity="0.5"/>
    <!-- Internal bubble 2 -->
    <circle cx="85" cy="48" r="2.5" fill="url(#bubbleGrad)" opacity="0.4"/>
    <!-- Internal bubble 3 -->
    <circle cx="60" cy="88" r="2" fill="url(#bubbleGrad)" opacity="0.35"/>
    <!-- Internal bubble 4 -->
    <circle cx="74" cy="84" r="1.8" fill="url(#bubbleGrad)" opacity="0.3"/>
    <!-- Internal bubble 5 (tiny) -->
    <circle cx="38" cy="72" r="1.5" fill="#80e080" opacity="0.3"/>
    <!-- Internal bubble 6 -->
    <circle cx="90" cy="70" r="1.2" fill="#80e080" opacity="0.25"/>
  </g>

  <!-- ==================== EXTERNAL DROPLETS ==================== -->
  <g id="droplets">
    <!-- Drip from left side -->
    <path d="
      M 32,82
      C 28,84 26,90 28,94
      C 29,96 31,96 32,94
      C 33,92 32,86 32,82
      Z
    " fill="#40c040" opacity="0.7"/>

    <!-- Small droplet right -->
    <ellipse cx="100" cy="92" rx="3" ry="4" fill="#40c040" opacity="0.5"/>

    <!-- Tiny splat left ground -->
    <ellipse cx="24" cy="106" rx="4" ry="1.5" fill="#30a030" opacity="0.4"/>

    <!-- Tiny droplet floating top-right -->
    <circle cx="96" cy="44" r="2" fill="#60d060" opacity="0.45"/>

    <!-- Drip bead mid-air left -->
    <ellipse cx="22" cy="96" rx="2" ry="2.5" fill="#40c040" opacity="0.5"/>
  </g>

  <!-- ==================== SPARKLES / MAGIC ==================== -->
  <g id="sparkles">
    <!-- Gold sparkle top-left -->
    <g transform="translate(34,26)" filter="url(#sparkleGlow)">
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
      <line x1="-2" y1="-2" x2="2" y2="2" stroke="#ffd700" stroke-width="0.8" opacity="0.5"/>
      <line x1="2" y1="-2" x2="-2" y2="2" stroke="#ffd700" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- Gold sparkle right -->
    <g transform="translate(104,56)" filter="url(#sparkleGlow)">
      <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
      <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
    </g>

    <!-- Gold sparkle bottom -->
    <g transform="translate(52,110)" filter="url(#sparkleGlow)">
      <line x1="-2" y1="0" x2="2" y2="0" stroke="#ffd700" stroke-width="0.8" opacity="0.6"/>
      <line x1="0" y1="-2" x2="0" y2="2" stroke="#ffd700" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- Tiny white dot sparkle -->
    <circle cx="92" cy="34" r="1" fill="#ffffff" opacity="0.7"/>
    <circle cx="20" cy="68" r="0.8" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- ==================== EXTRA SURFACE DETAIL ==================== -->
  <g id="surfaceDetail">
    <!-- Highlight streak on body surface -->
    <path d="M 44,38 C 48,34 56,32 62,34" fill="none" stroke="#b0f0b0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Secondary surface streak -->
    <path d="M 70,36 C 76,34 82,38 84,42" fill="none" stroke="#a0e8a0" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

    <!-- Belly highlight -->
    <ellipse cx="64" cy="80" rx="14" ry="6" fill="#60d060" opacity="0.15" transform="rotate(3 64 80)"/>
  </g>
</svg>