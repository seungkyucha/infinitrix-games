<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <defs>
    <!-- Armor gradient: dark blue-black plate -->
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a5e"/>
      <stop offset="40%" stop-color="#2a2a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Cape gradient: crimson flowing -->
    <linearGradient id="capeGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e04040"/>
      <stop offset="60%" stop-color="#c03030"/>
      <stop offset="100%" stop-color="#901818"/>
    </linearGradient>

    <!-- Dark energy gradient: purple-black -->
    <radialGradient id="darkEnergyGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#6a0060" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4a0040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a001e" stop-opacity="0"/>
    </radialGradient>

    <!-- Sword blade gradient -->
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a8a9e"/>
      <stop offset="40%" stop-color="#c0c0d0"/>
      <stop offset="60%" stop-color="#a0a0b0"/>
      <stop offset="100%" stop-color="#8a8a9e"/>
    </linearGradient>

    <!-- Eye glow gradient -->
    <radialGradient id="eyeGlowGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff5050" stop-opacity="1"/>
      <stop offset="60%" stop-color="#e04040" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e04040" stop-opacity="0"/>
    </radialGradient>

    <!-- Dark aura gradient -->
    <radialGradient id="auraGrad" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#2a0030" stop-opacity="0"/>
      <stop offset="60%" stop-color="#3a0040" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#4a0040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a001e" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Ground energy gradient -->
    <radialGradient id="groundGrad" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#6a0060" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a0040" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for dark energy -->
    <filter id="darkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow for eyes -->
    <filter id="eyeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow for sword energy -->
    <filter id="swordGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Ground crack glow -->
    <filter id="groundGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== DARK AURA (background layer) ===== -->
  <g id="dark-aura">
    <ellipse cx="64" cy="68" rx="50" ry="55" fill="url(#auraGrad)"/>
    <!-- Outer wisp ring -->
    <ellipse cx="64" cy="64" rx="56" ry="58" fill="none" stroke="#3a0040" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4 6 2 8"/>
  </g>

  <!-- ===== GROUND EFFECTS ===== -->
  <g id="ground-effects">
    <!-- Ground shadow -->
    <ellipse cx="64" cy="118" rx="32" ry="6" fill="#0a0a14" opacity="0.7"/>

    <!-- Ground cracks with dark energy -->
    <g filter="url(#groundGlow)">
      <path d="M42 116 L48 108 L50 114 L54 106 L56 116" fill="none" stroke="#6a0060" stroke-width="1.5" opacity="0.8"/>
      <path d="M60 118 L64 104 L66 112 L70 102 L72 116" fill="none" stroke="#6a0060" stroke-width="1.5" opacity="0.8"/>
      <path d="M76 116 L78 110 L82 114 L86 108 L88 118" fill="none" stroke="#4a0040" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- Ground energy pool -->
    <ellipse cx="64" cy="116" rx="26" ry="4" fill="url(#groundGrad)" opacity="0.6"/>

    <!-- Pixel debris / ground crack blocks -->
    <rect x="44" y="114" width="3" height="3" fill="#2a2a4e" opacity="0.5"/>
    <rect x="80" y="112" width="2" height="2" fill="#1a1a2e" opacity="0.6"/>
    <rect x="56" y="110" width="2" height="3" fill="#3a3a5e" opacity="0.4"/>
    <rect x="72" y="111" width="3" height="2" fill="#2a2a4e" opacity="0.5"/>
  </g>

  <!-- ===== CAPE (behind body) ===== -->
  <g id="cape">
    <!-- Cape main body billowing right -->
    <path d="M52 46 L48 50 L42 60 L38 74 L34 88 L32 98 L36 108 L40 114
             L46 116 L50 112 L52 104 L54 94 L56 84 L58 72 L60 58 L58 48 Z"
          fill="url(#capeGrad)"/>
    <!-- Cape billowing section (dramatic wind effect to the left) -->
    <path d="M40 114 L36 108 L30 104 L26 100 L24 106 L26 112 L30 116
             L34 118 L40 116 Z"
          fill="#c03030"/>
    <!-- Cape fold behind right side -->
    <path d="M76 46 L80 54 L84 68 L86 82 L88 96 L86 108 L84 114
             L80 116 L76 110 L74 98 L72 84 L70 68 L72 54 Z"
          fill="url(#capeGrad)"/>
    <!-- Cape far right billowing -->
    <path d="M86 108 L90 104 L94 100 L98 104 L96 110 L92 114
             L88 116 L84 114 Z"
          fill="#c03030"/>
    <!-- Cape highlight folds -->
    <path d="M46 60 L44 72 L42 84 L44 80 L46 68 Z" fill="#e04040" opacity="0.4"/>
    <path d="M82 68 L84 80 L86 92 L84 88 L82 76 Z" fill="#e04040" opacity="0.3"/>
    <!-- Cape shadow creases -->
    <path d="M50 70 L48 82 L46 94 L48 90 L50 78 Z" fill="#901818" opacity="0.5"/>
    <path d="M78 74 L80 86 L82 98 L80 94 L78 82 Z" fill="#901818" opacity="0.4"/>
  </g>

  <!-- ===== LEGS (wide powerful stance) ===== -->
  <g id="legs">
    <!-- Left leg -->
    <path d="M44 94 L42 98 L40 104 L38 110 L38 118 L42 118 L46 118
             L46 110 L48 104 L50 98 L50 94 Z"
          fill="url(#armorGrad)"/>
    <!-- Left leg armor highlight -->
    <path d="M42 98 L42 106 L44 106 L44 98 Z" fill="#5a5a7e" opacity="0.5"/>
    <!-- Left boot -->
    <path d="M36 114 L36 118 L38 120 L46 120 L48 118 L48 114
             L46 112 L38 112 Z"
          fill="#1a1a2e"/>
    <rect x="38" y="112" width="8" height="2" fill="#5a5a7e" opacity="0.4"/>

    <!-- Right leg -->
    <path d="M74 94 L76 98 L78 104 L80 110 L82 118 L86 118 L90 118
             L88 110 L86 104 L82 98 L78 94 Z"
          fill="url(#armorGrad)"/>
    <!-- Right leg armor highlight -->
    <path d="M80 98 L82 106 L84 106 L82 98 Z" fill="#5a5a7e" opacity="0.5"/>
    <!-- Right boot -->
    <path d="M80 114 L78 118 L80 120 L88 120 L92 118 L90 114
             L88 112 L82 112 Z"
          fill="#1a1a2e"/>
    <rect x="82" y="112" width="8" height="2" fill="#5a5a7e" opacity="0.4"/>

    <!-- Knee guards -->
    <path d="M42 96 L40 98 L42 100 L48 100 L50 98 L48 96 Z" fill="#2a2a4e"/>
    <rect x="43" y="96" width="4" height="2" fill="#5a5a7e" opacity="0.6"/>
    <path d="M76 96 L74 98 L76 100 L84 100 L86 98 L84 96 Z" fill="#2a2a4e"/>
    <rect x="78" y="96" width="4" height="2" fill="#5a5a7e" opacity="0.6"/>
  </g>

  <!-- ===== TORSO / BODY ARMOR ===== -->
  <g id="armor-torso">
    <!-- Main chestplate -->
    <path d="M46 48 L44 54 L42 64 L42 76 L44 86 L46 94
             L50 96 L58 98 L64 98 L70 98 L78 96 L82 94
             L84 86 L86 76 L86 64 L84 54 L82 48
             L76 44 L70 42 L64 42 L58 42 L52 44 Z"
          fill="url(#armorGrad)"/>
    <!-- Chest center plate -->
    <path d="M54 50 L52 58 L52 70 L54 80 L58 84 L64 86 L70 84
             L74 80 L76 70 L76 58 L74 50 L70 48 L58 48 Z"
          fill="#2a2a4e"/>
    <!-- Chest emblem (dark symbol) -->
    <path d="M60 56 L64 52 L68 56 L66 62 L64 66 L62 62 Z" fill="#4a0040" opacity="0.7"/>
    <rect x="62" y="54" width="4" height="4" fill="#6a0060" opacity="0.5"/>

    <!-- Armor edge highlights -->
    <path d="M46 50 L44 60 L44 64" fill="none" stroke="#5a5a7e" stroke-width="1" opacity="0.6"/>
    <path d="M82 50 L84 60 L84 64" fill="none" stroke="#5a5a7e" stroke-width="1" opacity="0.6"/>
    <!-- Belly plate division -->
    <path d="M52 76 L54 82 L64 86 L74 82 L76 76" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Belt -->
    <rect x="46" y="90" width="36" height="4" rx="1" fill="#1a1a2e"/>
    <rect x="60" y="89" width="8" height="6" rx="1" fill="#ffd700" opacity="0.8"/>
    <rect x="62" y="90" width="4" height="4" fill="#c0a000"/>

    <!-- Shoulder pauldrons -->
    <!-- Left shoulder (raised - arm is up) -->
    <path d="M38 42 L36 46 L38 52 L44 54 L50 52 L52 48 L50 44
             L46 42 Z"
          fill="#2a2a4e"/>
    <path d="M38 44 L40 44 L40 50 L38 50 Z" fill="#5a5a7e" opacity="0.6"/>
    <path d="M44 42 L48 42 L48 46 L44 46 Z" fill="#5a5a7e" opacity="0.4"/>
    <!-- Left shoulder spike -->
    <path d="M40 42 L42 36 L44 42 Z" fill="#3a3a5e"/>

    <!-- Right shoulder (raised - arm is up) -->
    <path d="M76 42 L78 44 L82 42 L88 42 L92 46 L90 52 L84 54
             L78 52 L76 48 Z"
          fill="#2a2a4e"/>
    <path d="M86 44 L88 44 L88 50 L86 50 Z" fill="#5a5a7e" opacity="0.6"/>
    <path d="M80 42 L84 42 L84 46 L80 46 Z" fill="#5a5a7e" opacity="0.4"/>
    <!-- Right shoulder spike -->
    <path d="M84 42 L86 36 L88 42 Z" fill="#3a3a5e"/>
  </g>

  <!-- ===== ARMS (raised overhead for strike) ===== -->
  <g id="arms">
    <!-- Left arm raised up -->
    <path d="M40 50 L36 44 L34 36 L36 28 L40 24 L44 26 L46 32
             L46 40 L48 48 Z"
          fill="url(#armorGrad)"/>
    <!-- Left arm highlight -->
    <path d="M38 36 L38 28 L40 28 L40 36 Z" fill="#5a5a7e" opacity="0.5"/>
    <!-- Left gauntlet -->
    <path d="M34 24 L32 20 L36 16 L42 16 L46 20 L44 26 L40 26 Z" fill="#1a1a2e"/>
    <rect x="36" y="18" width="6" height="2" fill="#5a5a7e" opacity="0.4"/>

    <!-- Right arm raised up -->
    <path d="M80 48 L82 40 L82 32 L84 26 L88 24 L92 28 L94 36
             L92 44 L88 50 Z"
          fill="url(#armorGrad)"/>
    <!-- Right arm highlight -->
    <path d="M88 36 L88 28 L90 28 L90 36 Z" fill="#5a5a7e" opacity="0.5"/>
    <!-- Right gauntlet -->
    <path d="M84 26 L82 20 L86 16 L92 16 L96 20 L94 26 L88 26 Z" fill="#1a1a2e"/>
    <rect x="86" y="18" width="6" height="2" fill="#5a5a7e" opacity="0.4"/>
  </g>

  <!-- ===== HELMET / HEAD ===== -->
  <g id="helmet">
    <!-- Helmet base -->
    <path d="M52 28 L50 32 L50 40 L52 44 L58 46 L64 46 L70 46
             L76 44 L78 40 L78 32 L76 28 L72 24 L64 22 L56 24 Z"
          fill="#2a2a4e"/>
    <!-- Helmet top crest -->
    <path d="M56 24 L58 18 L62 14 L64 12 L66 14 L70 18 L72 24
             L68 22 L64 20 L60 22 Z"
          fill="#1a1a2e"/>
    <!-- Helmet center ridge -->
    <path d="M62 14 L64 12 L66 14 L66 24 L64 22 L62 24 Z" fill="#3a3a5e"/>
    <!-- Visor slit -->
    <rect x="54" y="34" width="20" height="4" rx="1" fill="#0a0a14"/>
    <!-- Visor frame top -->
    <path d="M52 33 L54 32 L74 32 L76 33 L74 34 L54 34 Z" fill="#3a3a5e"/>
    <!-- Visor frame bottom -->
    <path d="M52 38 L54 39 L74 39 L76 38 L74 37 L54 37 Z" fill="#3a3a5e"/>
    <!-- Cheek guards -->
    <path d="M50 34 L48 38 L50 42 L52 40 L52 36 Z" fill="#2a2a4e"/>
    <path d="M78 34 L80 38 L78 42 L76 40 L76 36 Z" fill="#2a2a4e"/>
    <!-- Helmet edge highlights -->
    <path d="M54 26 L58 24 L64 22 L70 24 L74 26" fill="none" stroke="#5a5a7e" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ===== GLOWING RED EYES (intensified) ===== -->
  <g id="eyes" filter="url(#eyeGlow)">
    <!-- Left eye -->
    <rect x="56" y="35" width="4" height="2" fill="#ff3030"/>
    <rect x="57" y="35" width="2" height="2" fill="#ff8080"/>
    <!-- Right eye -->
    <rect x="66" y="35" width="4" height="2" fill="#ff3030"/>
    <rect x="67" y="35" width="2" height="2" fill="#ff8080"/>
    <!-- Eye glow halos -->
    <ellipse cx="58" cy="36" rx="4" ry="3" fill="#e04040" opacity="0.3"/>
    <ellipse cx="68" cy="36" rx="4" ry="3" fill="#e04040" opacity="0.3"/>
  </g>

  <!-- ===== GREATSWORD (raised overhead) ===== -->
  <g id="greatsword">
    <!-- Sword blade - raised high, angled for downward strike -->
    <path d="M56 18 L64 -10 L66 -10 L72 18 L68 20 L64 22 L60 20 Z"
          fill="url(#bladeGrad)"/>
    <!-- Blade center fuller -->
    <path d="M62 16 L64 -6 L66 -6 L66 16 Z" fill="#c0c0d0" opacity="0.4"/>
    <!-- Blade edge highlights -->
    <path d="M58 16 L64 -8" fill="none" stroke="#d0d0e0" stroke-width="0.5" opacity="0.7"/>
    <path d="M70 16 L64 -8" fill="none" stroke="#d0d0e0" stroke-width="0.5" opacity="0.5"/>
    <!-- Blade tip -->
    <path d="M63 -10 L64 -16 L65 -10 Z" fill="#c0c0d0"/>

    <!-- Cross guard (gold) -->
    <rect x="50" y="18" width="28" height="4" rx="1" fill="#ffd700"/>
    <rect x="52" y="19" width="24" height="2" fill="#c0a000"/>
    <!-- Guard ornaments -->
    <circle cx="52" cy="20" r="2" fill="#ffd700"/>
    <circle cx="76" cy="20" r="2" fill="#ffd700"/>
    <circle cx="52" cy="20" r="1" fill="#e0b800"/>
    <circle cx="76" cy="20" r="1" fill="#e0b800"/>

    <!-- Grip -->
    <rect x="62" y="22" width="4" height="6" fill="#3a2020"/>
    <rect x="62" y="22" width="4" height="1" fill="#5a3030" opacity="0.6"/>
    <rect x="62" y="25" width="4" height="1" fill="#5a3030" opacity="0.6"/>

    <!-- Pommel -->
    <circle cx="64" cy="30" r="2.5" fill="#ffd700"/>
    <circle cx="64" cy="30" r="1.5" fill="#e04040"/>
  </g>

  <!-- ===== DARK ENERGY / SHADOW WISPS ===== -->
  <g id="dark-energy">
    <!-- Dark energy around sword blade -->
    <g filter="url(#swordGlow)">
      <!-- Wisp left of blade -->
      <path d="M54 10 Q50 4 52 -2 Q56 2 58 8 Q56 12 54 10 Z"
            fill="#6a0060" opacity="0.6"/>
      <path d="M50 14 Q44 8 46 0 Q50 6 52 12 Z"
            fill="#4a0040" opacity="0.5"/>
      <!-- Wisp right of blade -->
      <path d="M74 10 Q78 4 76 -2 Q72 2 70 8 Q72 12 74 10 Z"
            fill="#6a0060" opacity="0.6"/>
      <path d="M78 14 Q84 8 82 0 Q78 6 76 12 Z"
            fill="#4a0040" opacity="0.5"/>
      <!-- Top energy burst -->
      <path d="M60 -6 Q58 -14 62 -18 Q64 -12 64 -8 Z"
            fill="#6a0060" opacity="0.5"/>
      <path d="M66 -6 Q68 -14 66 -18 Q64 -12 64 -8 Z"
            fill="#4a0040" opacity="0.5"/>
      <!-- Swirling wisps around blade mid-section -->
      <path d="M56 4 Q48 0 50 -6 Q54 -2 58 2 Z" fill="#6a0060" opacity="0.4"/>
      <path d="M72 4 Q80 0 78 -6 Q74 -2 70 2 Z" fill="#6a0060" opacity="0.4"/>
    </g>

    <!-- Dark energy at hands/guard level -->
    <g filter="url(#darkGlow)">
      <ellipse cx="64" cy="20" rx="18" ry="6" fill="#4a0040" opacity="0.35"/>
      <ellipse cx="64" cy="20" rx="12" ry="4" fill="#6a0060" opacity="0.25"/>
    </g>

    <!-- Floating dark particles around character -->
    <g opacity="0.7">
      <rect x="30" y="50" width="2" height="2" fill="#6a0060" opacity="0.5"/>
      <rect x="94" y="44" width="2" height="2" fill="#4a0040" opacity="0.6"/>
      <rect x="26" y="72" width="2" height="2" fill="#4a0040" opacity="0.4"/>
      <rect x="98" y="68" width="2" height="2" fill="#6a0060" opacity="0.5"/>
      <rect x="34" y="90" width="2" height="2" fill="#6a0060" opacity="0.3"/>
      <rect x="92" y="86" width="2" height="2" fill="#4a0040" opacity="0.4"/>
      <rect x="20" y="62" width="1" height="1" fill="#6a0060" opacity="0.3"/>
      <rect x="104" y="56" width="1" height="1" fill="#6a0060" opacity="0.3"/>
      <rect x="28" y="82" width="1" height="1" fill="#4a0040" opacity="0.4"/>
      <rect x="100" y="78" width="1" height="1" fill="#4a0040" opacity="0.4"/>
    </g>

    <!-- Dark energy tendrils rising from feet -->
    <g filter="url(#darkGlow)" opacity="0.6">
      <path d="M46 116 Q44 108 40 100 Q42 106 44 112 Z" fill="#6a0060"/>
      <path d="M82 116 Q84 108 88 100 Q86 106 84 112 Z" fill="#6a0060"/>
      <path d="M56 116 Q54 110 52 104 Q54 108 56 112 Z" fill="#4a0040"/>
      <path d="M72 116 Q74 110 76 104 Q74 108 72 112 Z" fill="#4a0040"/>
    </g>
  </g>

  <!-- ===== FINAL OVERLAY: dark energy vignette ===== -->
  <g id="energy-overlay" opacity="0.15">
    <rect x="0" y="0" width="128" height="128" fill="url(#darkEnergyGrad)"/>
  </g>
</svg>