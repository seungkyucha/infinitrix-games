<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <defs>
    <!-- Helmet metallic gradient -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a8e"/>
      <stop offset="40%" stop-color="#5a5a6e"/>
      <stop offset="100%" stop-color="#3a3a4e"/>
    </linearGradient>
    <!-- Armor leather gradient -->
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="50%" stop-color="#6b5335"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>
    <!-- Cape gradient -->
    <linearGradient id="capeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="40%" stop-color="#0098cc"/>
      <stop offset="100%" stop-color="#006688"/>
    </linearGradient>
    <!-- Sword blade gradient -->
    <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c0d0"/>
      <stop offset="50%" stop-color="#a0a0b0"/>
      <stop offset="100%" stop-color="#808090"/>
    </linearGradient>
    <!-- Damage red glow -->
    <radialGradient id="damageGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e04040" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#e04040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e04040" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye glow filter (dimmed for hurt) -->
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Damage spark glow -->
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Red damage flash filter -->
    <filter id="damageFlash" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blurAlpha"/>
      <feFlood flood-color="#e04040" flood-opacity="0.6" result="redFlood"/>
      <feComposite in="redFlood" in2="blurAlpha" operator="in" result="redGlow"/>
      <feMerge>
        <feMergeNode in="redGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Impact line filter -->
    <filter id="impactBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background damage flash (full scene red overlay) -->
  <rect x="0" y="0" width="128" height="128" fill="url(#damageGlow)" opacity="0.4"/>

  <!-- ===== CHARACTER GROUP (leaning back from impact) ===== -->
  <g transform="translate(64,64) rotate(12) translate(-64,-64) translate(4,0)">

    <!-- ===== CAPE (billowing from impact force) ===== -->
    <g id="cape">
      <!-- Cape main body - billowing outward to the right -->
      <polygon points="52,52 42,54 32,68 28,82 34,94 40,98 46,96 50,88 54,72 56,60"
               fill="url(#capeGrad)" opacity="0.9"/>
      <!-- Cape wind-blown extension -->
      <polygon points="32,68 24,74 20,86 26,96 34,94 28,82"
               fill="#0098cc" opacity="0.8"/>
      <!-- Cape highlight -->
      <polygon points="48,54 44,58 42,66 46,62 50,56"
               fill="#00d8ff" opacity="0.5"/>
      <!-- Cape trailing edge (impact billow) -->
      <polygon points="28,82 22,90 24,100 32,102 40,98 34,94"
               fill="#006688" opacity="0.7"/>
      <!-- Cape inner shadow -->
      <polygon points="46,58 42,64 40,74 44,80 48,70 50,62"
               fill="#004455" opacity="0.4"/>
    </g>

    <!-- ===== SHADOW ON GROUND ===== -->
    <ellipse cx="66" cy="118" rx="22" ry="5" fill="#0a0a2e" opacity="0.5"/>

    <!-- ===== LEGS AND BOOTS ===== -->
    <g id="legs">
      <!-- Left leg (back leg, stumbling) -->
      <rect x="54" y="92" width="8" height="14" fill="#2a2a3e"/>
      <!-- Left boot -->
      <rect x="52" y="104" width="10" height="6" rx="1" fill="#3d2b1f"/>
      <rect x="52" y="104" width="10" height="3" fill="#4d3b2f"/>
      <!-- Boot sole -->
      <rect x="51" y="109" width="12" height="2" fill="#2a1a0f"/>

      <!-- Right leg (front leg, bracing) -->
      <rect x="66" y="90" width="8" height="16" fill="#2a2a3e"/>
      <!-- Right boot -->
      <rect x="65" y="104" width="10" height="6" rx="1" fill="#3d2b1f"/>
      <rect x="65" y="104" width="10" height="3" fill="#4d3b2f"/>
      <!-- Boot sole -->
      <rect x="64" y="109" width="12" height="2" fill="#2a1a0f"/>
      <!-- Boot buckle details -->
      <rect x="68" y="105" width="4" height="1" fill="#8b7355"/>
      <rect x="55" y="105" width="4" height="1" fill="#8b7355"/>
    </g>

    <!-- ===== BODY / TORSO ===== -->
    <g id="torso">
      <!-- Chainmail under-layer -->
      <rect x="52" y="58" width="24" height="20" rx="2" fill="#5a5a6e"/>
      <!-- Chainmail texture dots -->
      <circle cx="56" cy="62" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="60" cy="62" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="64" cy="62" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="68" cy="62" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="72" cy="62" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="58" cy="66" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="62" cy="66" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="66" cy="66" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="70" cy="66" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="56" cy="70" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="60" cy="70" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="64" cy="70" r="0.8" fill="#6a6a7e" opacity="0.7"/>
      <circle cx="68" cy="70" r="0.8" fill="#6a6a7e" opacity="0.7"/>

      <!-- Leather armor overlay -->
      <rect x="54" y="60" width="20" height="18" rx="2" fill="url(#armorGrad)" opacity="0.85"/>
      <!-- Armor center strap -->
      <rect x="62" y="60" width="4" height="18" fill="#3d2b1f"/>
      <!-- Belt -->
      <rect x="52" y="76" width="24" height="4" fill="#3d2b1f"/>
      <!-- Belt buckle -->
      <rect x="62" y="76" width="4" height="4" fill="#a0a0b0"/>
      <rect x="63" y="77" width="2" height="2" fill="#c0c0d0"/>
      <!-- Shoulder armor (left) -->
      <rect x="48" y="56" width="10" height="6" rx="2" fill="#5a5a6e"/>
      <rect x="49" y="57" width="8" height="2" fill="#7a7a8e"/>
      <!-- Shoulder armor (right - raised defensively) -->
      <rect x="70" y="50" width="10" height="6" rx="2" fill="#5a5a6e"/>
      <rect x="71" y="51" width="8" height="2" fill="#7a7a8e"/>
    </g>

    <!-- ===== ARMS ===== -->
    <g id="arms">
      <!-- Left arm (holding sword loosely, drooping down) -->
      <rect x="44" y="60" width="8" height="6" fill="#5a5a6e"/>
      <rect x="42" y="64" width="7" height="14" fill="#2a2a3e"/>
      <!-- Left hand/gauntlet -->
      <rect x="41" y="76" width="8" height="5" rx="1" fill="#5a5a6e"/>
      <rect x="42" y="77" width="6" height="3" fill="#7a7a8e"/>

      <!-- Right arm (raised defensively) -->
      <rect x="76" y="54" width="8" height="6" fill="#5a5a6e"/>
      <!-- Forearm raised up -->
      <rect x="78" y="42" width="7" height="14" fill="#2a2a3e"/>
      <!-- Right hand/gauntlet (defensive) -->
      <rect x="77" y="38" width="8" height="6" rx="1" fill="#5a5a6e"/>
      <rect x="78" y="39" width="6" height="4" fill="#7a7a8e"/>
    </g>

    <!-- ===== SWORD (held loosely, pointing down) ===== -->
    <g id="sword" transform="rotate(15, 45, 80)">
      <!-- Sword blade (drooping) -->
      <rect x="43" y="82" width="4" height="24" fill="url(#swordGrad)"/>
      <!-- Blade edge highlight -->
      <rect x="43" y="82" width="1" height="24" fill="#d0d0e0" opacity="0.5"/>
      <!-- Blade tip -->
      <polygon points="43,106 45,110 47,106" fill="#a0a0b0"/>
      <!-- Crossguard -->
      <rect x="39" y="79" width="12" height="3" rx="1" fill="#a0a0b0"/>
      <rect x="40" y="80" width="10" height="1" fill="#c0c0d0"/>
      <!-- Grip -->
      <rect x="44" y="76" width="3" height="6" fill="#3d2b1f"/>
      <!-- Grip wrap -->
      <rect x="44" y="77" width="3" height="1" fill="#5a4535"/>
      <rect x="44" y="79" width="3" height="1" fill="#5a4535"/>
      <!-- Pommel -->
      <circle cx="45.5" cy="75" r="2" fill="#a0a0b0"/>
      <circle cx="45.5" cy="75" r="1" fill="#c0c0d0"/>
    </g>

    <!-- ===== HEAD / HELMET ===== -->
    <g id="head">
      <!-- Helmet base -->
      <rect x="50" y="20" width="28" height="30" rx="4" fill="url(#helmetGrad)"/>
      <!-- Helmet top crest -->
      <rect x="58" y="14" width="12" height="8" rx="2" fill="#5a5a6e"/>
      <rect x="60" y="12" width="8" height="6" rx="2" fill="#7a7a8e"/>
      <!-- Helmet top highlight -->
      <rect x="62" y="14" width="4" height="3" fill="#9a9aae" opacity="0.6"/>
      <!-- Visor slit -->
      <rect x="54" y="32" width="20" height="6" rx="1" fill="#0a0a2e"/>
      <!-- Visor frame top -->
      <rect x="52" y="30" width="24" height="3" fill="#4a4a5e"/>
      <!-- Visor frame bottom -->
      <rect x="52" y="37" width="24" height="2" fill="#4a4a5e"/>

      <!-- Eyes through visor (dimmed/flickering - hurt state) -->
      <!-- Left eye (dimmer) -->
      <rect x="57" y="33" width="5" height="3" rx="1" fill="#00c8ff" opacity="0.4" filter="url(#eyeGlow)"/>
      <rect x="58" y="34" width="3" height="1" fill="#00e8ff" opacity="0.3"/>
      <!-- Right eye (flickering, slightly brighter) -->
      <rect x="66" y="33" width="5" height="3" rx="1" fill="#00c8ff" opacity="0.6" filter="url(#eyeGlow)"/>
      <rect x="67" y="34" width="3" height="1" fill="#00e8ff" opacity="0.5"/>

      <!-- Helmet cheek guards -->
      <rect x="50" y="38" width="6" height="10" rx="1" fill="#5a5a6e"/>
      <rect x="72" y="38" width="6" height="10" rx="1" fill="#5a5a6e"/>
      <!-- Helmet nose guard -->
      <rect x="62" y="30" width="4" height="12" fill="#6a6a7e"/>
      <!-- Helmet rivets -->
      <circle cx="54" cy="26" r="1" fill="#8a8a9e"/>
      <circle cx="74" cy="26" r="1" fill="#8a8a9e"/>
      <circle cx="54" cy="42" r="1" fill="#8a8a9e"/>
      <circle cx="74" cy="42" r="1" fill="#8a8a9e"/>
      <!-- Helmet edge highlight -->
      <rect x="52" y="20" width="24" height="2" fill="#8a8a9e" opacity="0.5" rx="1"/>
    </g>

  </g>
  <!-- ===== END CHARACTER GROUP ===== -->

  <!-- ===== DAMAGE EFFECTS OVERLAY ===== -->
  <g id="damage-effects">
    <!-- Semi-transparent red damage flash over character -->
    <rect x="30" y="10" width="70" height="110" rx="8" fill="#e04040" opacity="0.18"/>

    <!-- Red damage outline glow -->
    <ellipse cx="68" cy="68" rx="38" ry="50" fill="none" stroke="#e04040" stroke-width="2" opacity="0.25" filter="url(#impactBlur)"/>

    <!-- Damage sparks / particles -->
    <!-- Spark 1 - top right -->
    <g filter="url(#sparkGlow)">
      <polygon points="90,24 92,20 94,24 92,22" fill="#e04040" opacity="0.9"/>
      <polygon points="91,22 93,22 92,19 92,25" fill="#ff6060" opacity="0.7"/>
    </g>
    <!-- Spark 2 - right side -->
    <g filter="url(#sparkGlow)">
      <polygon points="96,48 99,45 100,50 97,47" fill="#e04040" opacity="0.85"/>
      <polygon points="97,46 100,47 98,44 98,50" fill="#ff6060" opacity="0.6"/>
    </g>
    <!-- Spark 3 - upper left -->
    <g filter="url(#sparkGlow)">
      <polygon points="30,30 32,26 34,30 32,28" fill="#e04040" opacity="0.8"/>
      <polygon points="31,28 33,28 32,25 32,31" fill="#ff6060" opacity="0.6"/>
    </g>
    <!-- Spark 4 - lower right -->
    <g filter="url(#sparkGlow)">
      <polygon points="94,72 97,68 98,74 95,70" fill="#e04040" opacity="0.75"/>
    </g>
    <!-- Spark 5 - mid left -->
    <g filter="url(#sparkGlow)">
      <polygon points="26,56 28,52 30,56 28,54" fill="#e04040" opacity="0.7"/>
    </g>
    <!-- Spark 6 - bottom -->
    <g filter="url(#sparkGlow)">
      <polygon points="80,100 83,96 84,102 81,98" fill="#e04040" opacity="0.65"/>
    </g>

    <!-- Small red damage dots / debris -->
    <circle cx="88" cy="36" r="1.5" fill="#e04040" opacity="0.8"/>
    <circle cx="100" cy="58" r="1" fill="#ff6060" opacity="0.7"/>
    <circle cx="24" cy="44" r="1.2" fill="#e04040" opacity="0.6"/>
    <circle cx="36" cy="18" r="1" fill="#ff6060" opacity="0.5"/>
    <circle cx="92" cy="88" r="1.3" fill="#e04040" opacity="0.7"/>
    <circle cx="22" cy="72" r="1" fill="#e04040" opacity="0.5"/>
    <circle cx="102" cy="38" r="0.8" fill="#ff8080" opacity="0.6"/>

    <!-- Impact lines radiating from hit point (right side of body) -->
    <line x1="86" y1="44" x2="96" y2="38" stroke="#e04040" stroke-width="1.5" opacity="0.6" filter="url(#impactBlur)"/>
    <line x1="88" y1="52" x2="100" y2="50" stroke="#e04040" stroke-width="1.2" opacity="0.5" filter="url(#impactBlur)"/>
    <line x1="86" y1="60" x2="98" y2="62" stroke="#e04040" stroke-width="1" opacity="0.45" filter="url(#impactBlur)"/>
    <line x1="84" y1="36" x2="92" y2="28" stroke="#e04040" stroke-width="1.3" opacity="0.5" filter="url(#impactBlur)"/>
  </g>

  <!-- ===== FINAL RED VIGNETTE ===== -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="0%" stop-color="#e04040" stop-opacity="0"/>
    <stop offset="70%" stop-color="#e04040" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#e04040" stop-opacity="0.2"/>
  </radialGradient>
  <rect x="0" y="0" width="128" height="128" fill="url(#vignette)"/>
</svg>