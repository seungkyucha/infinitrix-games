<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <!-- Background split gradient -->
    <linearGradient id="tbgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="45%" stop-color="#F5E6C8"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="55%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#0A0A2E"/>
    </linearGradient>
    <!-- Sky light side -->
    <linearGradient id="tSkyLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4A0"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
    <!-- Sky dark side -->
    <linearGradient id="tSkyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050518"/>
      <stop offset="100%" stop-color="#0A0A2E"/>
    </linearGradient>
    <!-- Rift glow center -->
    <radialGradient id="tRiftGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0A0A2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Player glow -->
    <radialGradient id="tPlayerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <!-- Enemy glow -->
    <radialGradient id="tEnemyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#DC143C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC143C" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Title bar bg -->
    <linearGradient id="titleBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A2E" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0A0A2E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0A0A2E" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Floor light -->
    <linearGradient id="tFloorLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#C4943A"/>
    </linearGradient>
    <!-- Floor dark -->
    <linearGradient id="tFloorDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#0A0A2E"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND SPLIT: Light (left) / Shadow (right) === -->

  <!-- Light side sky -->
  <rect x="0" y="0" width="200" height="200" fill="url(#tSkyLight)"/>
  <!-- Shadow side sky -->
  <rect x="200" y="0" width="200" height="200" fill="url(#tSkyDark)"/>

  <!-- Light side floor -->
  <rect x="0" y="180" width="200" height="120" fill="url(#tFloorLight)"/>
  <!-- Shadow side floor -->
  <rect x="200" y="180" width="200" height="120" fill="url(#tFloorDark)"/>

  <!-- Dungeon grid lines - light side -->
  <g id="tGridLight" stroke="#C4943A" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="200" x2="200" y2="200"/>
    <line x1="0" y1="220" x2="200" y2="220"/>
    <line x1="0" y1="240" x2="200" y2="240"/>
    <line x1="40" y1="180" x2="40" y2="260"/><line x1="80" y1="180" x2="80" y2="260"/>
    <line x1="120" y1="180" x2="120" y2="260"/><line x1="160" y1="180" x2="160" y2="260"/>
  </g>

  <!-- Dungeon grid lines - shadow side -->
  <g id="tGridDark" stroke="#8B5CF6" stroke-width="0.5" opacity="0.2">
    <line x1="200" y1="200" x2="400" y2="200"/>
    <line x1="200" y1="220" x2="400" y2="220"/>
    <line x1="200" y1="240" x2="400" y2="240"/>
    <line x1="240" y1="180" x2="240" y2="260"/><line x1="280" y1="180" x2="280" y2="260"/>
    <line x1="320" y1="180" x2="320" y2="260"/><line x1="360" y1="180" x2="360" y2="260"/>
  </g>

  <!-- Walls - light side -->
  <g id="tWallsLight">
    <rect x="0" y="100" width="30" height="100" fill="#C4943A" opacity="0.6"/>
    <rect x="40" y="120" width="25" height="60" fill="#C4943A" opacity="0.4"/>
    <rect x="140" y="130" width="30" height="50" fill="#C4943A" opacity="0.5"/>
    <!-- wall bricks -->
    <rect x="2" y="110" width="26" height="10" fill="#D4A44A" opacity="0.3" rx="1"/>
    <rect x="2" y="130" width="26" height="10" fill="#D4A44A" opacity="0.3" rx="1"/>
    <rect x="2" y="150" width="26" height="10" fill="#D4A44A" opacity="0.3" rx="1"/>
  </g>

  <!-- Walls - shadow side (different layout = dimension puzzle!) -->
  <g id="tWallsDark">
    <rect x="370" y="100" width="30" height="100" fill="#2D1B69" opacity="0.7"/>
    <rect x="300" y="110" width="25" height="70" fill="#2D1B69" opacity="0.5"/>
    <rect x="230" y="140" width="30" height="40" fill="#2D1B69" opacity="0.6"/>
    <!-- Shadow wall glow cracks -->
    <line x1="372" y1="120" x2="398" y2="120" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="372" y1="140" x2="398" y2="140" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="372" y1="160" x2="398" y2="160" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Dimensional rift at center -->
  <ellipse cx="200" cy="100" rx="60" ry="90" fill="url(#tRiftGlow)" opacity="0.6"/>
  <ellipse cx="200" cy="100" rx="30" ry="50" fill="#FFFFFF" opacity="0.08"/>
  <!-- Rift crack lines -->
  <path d="M190 20 L195 50 L192 80 L198 100 L192 120 L195 150 L190 180" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <path d="M210 20 L205 50 L208 80 L202 100 L208 120 L205 150 L210 180" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>
  <!-- Small particles around rift -->
  <circle cx="185" cy="60" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="215" cy="70" r="2" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="180" cy="130" r="1.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="220" cy="140" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="195" cy="40" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="205" cy="160" r="1" fill="#FFFFFF" opacity="0.5"/>

  <!-- Stars on shadow side -->
  <g id="tStars">
    <circle cx="220" cy="15" r="1" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="260" cy="25" r="0.8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="300" cy="12" r="1.2" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="340" cy="30" r="0.8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="370" cy="18" r="1" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="250" cy="50" r="0.7" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="320" cy="45" r="0.9" fill="#FFD700" opacity="0.4"/>
    <circle cx="380" cy="55" r="0.6" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Light side sun glow -->
  <circle cx="50" cy="30" r="25" fill="#FFD700" opacity="0.15"/>
  <circle cx="50" cy="30" r="15" fill="#FFE87C" opacity="0.2"/>
  <circle cx="50" cy="30" r="8" fill="#FFFFFF" opacity="0.3"/>

  <!-- Shadow side moon -->
  <circle cx="350" cy="35" r="12" fill="#E8D8FF" opacity="0.25"/>
  <circle cx="350" cy="35" r="8" fill="#FFFFFF" opacity="0.15"/>
  <path d="M350 23 A12 12 0 0 1 350 47 A8 8 0 0 0 350 23 Z" fill="#2D1B69" opacity="0.4"/>

  <!-- === PLAYER CHARACTER (center-left, in light zone) === -->
  <g id="tPlayer" transform="translate(140, 160)">
    <ellipse cx="0" cy="5" rx="18" ry="18" fill="url(#tPlayerGlow)"/>
    <!-- Cloak -->
    <path d="M-10 -8 C-14 0, -16 15, -14 25 L0 20 L14 25 C16 15, 14 0, 10 -8 Z" fill="#2D1B69" opacity="0.7"/>
    <!-- Body split -->
    <path d="M-6 -14 L0 -16 L0 18 L-8 16 C-10 10, -10 -8, -6 -14 Z" fill="#F0C040"/>
    <path d="M0 -16 L6 -14 C10 -8, 10 10, 8 16 L0 18 Z" fill="#6B3FA0"/>
    <!-- Head -->
    <ellipse cx="0" cy="-22" rx="8" ry="9" fill="#C4943A"/>
    <path d="M0 -31 A8 9 0 0 0 -8 -22 A8 9 0 0 0 0 -13 Z" fill="#F0C040"/>
    <path d="M0 -31 A8 9 0 0 1 8 -22 A8 9 0 0 1 0 -13 Z" fill="#6B3FA0"/>
    <!-- Hood -->
    <path d="M-10 -20 C-10 -28, -4 -34, 0 -35 C4 -34, 10 -28, 10 -20 L8 -20 C8 -26, 4 -32, 0 -33 C-4 -32, -8 -26, -8 -20 Z" fill="#1A0A4E"/>
    <!-- Eyes -->
    <ellipse cx="-3" cy="-23" rx="2.5" ry="2" fill="#FFD700"/>
    <circle cx="-3.5" cy="-23.5" r="0.8" fill="#FFFFFF"/>
    <ellipse cx="3" cy="-23" rx="2.5" ry="2" fill="#8B5CF6"/>
    <circle cx="2.5" cy="-23.5" r="0.8" fill="#FFFFFF"/>
    <!-- Chest emblem -->
    <circle cx="0" cy="-4" r="3" fill="#FFD700" opacity="0.5"/>
    <circle cx="0" cy="-4" r="2" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="0" cy="-4" r="1" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- === ENEMY (center-right, in shadow zone) === -->
  <g id="tEnemy" transform="translate(280, 140)">
    <ellipse cx="0" cy="10" rx="20" ry="20" fill="url(#tEnemyGlow)"/>
    <!-- Ghost body -->
    <ellipse cx="0" cy="0" rx="16" ry="18" fill="#8B0A1E" opacity="0.8"/>
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="#0A0A2E" opacity="0.4"/>
    <!-- Wisp tails -->
    <path d="M-10 12 C-12 20, -14 30, -10 36 Q-8 38, -6 34 C-8 28, -8 22, -6 14 Z" fill="#DC143C" opacity="0.5"/>
    <path d="M-2 14 C-4 24, -6 32, -2 38 Q0 40, 2 36 C0 28, 0 22, 2 16 Z" fill="#DC143C" opacity="0.4"/>
    <path d="M10 12 C12 20, 14 30, 10 36 Q8 38, 6 34 C8 28, 8 22, 6 14 Z" fill="#DC143C" opacity="0.5"/>
    <!-- Horns -->
    <path d="M-10 -12 C-12 -18, -16 -24, -20 -28" fill="none" stroke="#DC143C" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M10 -12 C12 -18, 16 -24, 20 -28" fill="none" stroke="#DC143C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-4" rx="4" ry="3" fill="#FF4444"/>
    <ellipse cx="-5" cy="-4.5" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
    <ellipse cx="5" cy="-4" rx="4" ry="3" fill="#FF4444"/>
    <ellipse cx="5" cy="-4.5" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
    <!-- Mouth -->
    <path d="M-6 4 Q0 2, 6 4" fill="none" stroke="#DC143C" stroke-width="1"/>
  </g>

  <!-- === SECONDARY ENEMIES (smaller, in background) === -->
  <g opacity="0.5">
    <ellipse cx="330" cy="120" rx="8" ry="10" fill="#8B0A1E"/>
    <circle cx="327" cy="118" r="2" fill="#FF4444" opacity="0.7"/>
    <circle cx="333" cy="118" r="2" fill="#FF4444" opacity="0.7"/>
    <ellipse cx="360" cy="150" rx="6" ry="8" fill="#8B0A1E" opacity="0.7"/>
    <circle cx="358" cy="148" r="1.5" fill="#FF4444" opacity="0.5"/>
    <circle cx="362" cy="148" r="1.5" fill="#FF4444" opacity="0.5"/>
  </g>

  <!-- Dimension shift particles (dramatic moment) -->
  <g id="tShiftParticles">
    <circle cx="170" cy="120" r="3" fill="#FFD700" opacity="0.4"/>
    <circle cx="160" cy="90" r="2" fill="#FFD700" opacity="0.5"/>
    <circle cx="230" cy="110" r="3" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="240" cy="80" r="2" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="190" cy="70" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="210" cy="50" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Floating collectibles in scene -->
  <g id="tCollectibles">
    <!-- Gold coin (light side) -->
    <circle cx="90" cy="170" r="5" fill="#F1C40F" opacity="0.6"/>
    <circle cx="90" cy="170" r="3" fill="#FFE87C" opacity="0.5"/>
    <!-- Crystal (shadow side) -->
    <path d="M310 170 L313 163 L316 170 L313 177 Z" fill="#8B5CF6" opacity="0.5"/>
  </g>

  <!-- === HUD OVERLAY (semi-transparent, showing gameplay) === -->
  <g id="tHUD" opacity="0.45">
    <!-- HP bar frame -->
    <rect x="10" y="8" width="80" height="10" rx="3" fill="#0A0A2E" opacity="0.6"/>
    <rect x="11" y="9" width="60" height="8" rx="2" fill="#E74C3C" opacity="0.7"/>
    <!-- Dimension energy bar -->
    <rect x="10" y="22" width="80" height="8" rx="3" fill="#0A0A2E" opacity="0.6"/>
    <rect x="11" y="23" width="50" height="6" rx="2" fill="#3498DB" opacity="0.7"/>
    <!-- Floor indicator -->
    <text x="390" y="18" font-size="9" fill="#FFFFFF" font-family="sans-serif" text-anchor="end" opacity="0.6">Floor 7</text>
    <!-- Q button prompt -->
    <rect x="175" y="4" width="50" height="14" rx="4" fill="#0A0A2E" opacity="0.5"/>
    <text x="200" y="14" font-size="8" fill="#8B5CF6" font-family="sans-serif" text-anchor="middle" font-weight="bold">[Q] Shift</text>
  </g>

  <!-- === TITLE BAR (bottom) === -->
  <rect x="0" y="240" width="400" height="60" fill="url(#titleBarGrad)"/>

  <!-- Title text -->
  <text x="200" y="274" font-size="28" font-weight="bold" fill="url(#titleGrad)" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle" letter-spacing="3">PHANTOM SHIFT</text>

  <!-- Subtitle -->
  <text x="200" y="292" font-size="10" fill="#B794F6" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle" opacity="0.7">빛과 그림자, 두 차원의 던전을 넘나들어라</text>

  <!-- Corner decorations -->
  <g id="tCorners" opacity="0.4">
    <!-- Top-left: light ornament -->
    <path d="M0 0 L20 0 L0 20 Z" fill="#FFD700" opacity="0.3"/>
    <text x="4" y="42" font-size="10" fill="#FFD700" font-family="serif">&#x2726;</text>
    <!-- Top-right: shadow ornament -->
    <path d="M400 0 L380 0 L400 20 Z" fill="#8B5CF6" opacity="0.3"/>
    <text x="386" y="42" font-size="10" fill="#8B5CF6" font-family="serif">&#x2727;</text>
    <!-- Bottom corners -->
    <text x="8" y="294" font-size="8" fill="#FFD700" font-family="serif">&#x25C7;</text>
    <text x="386" y="294" font-size="8" fill="#8B5CF6" font-family="serif">&#x25C6;</text>
  </g>

  <!-- Divider lines at title area -->
  <line x1="40" y1="258" x2="160" y2="258" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="258" x2="360" y2="258" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3"/>

  <!-- Additional atmospheric details: light pillars -->
  <g id="tLightPillars" opacity="0.08">
    <path d="M30 60 L25 200 L35 200 Z" fill="#FFD700"/>
    <path d="M90 40 L85 200 L95 200 Z" fill="#FFE87C"/>
    <path d="M150 55 L145 200 L155 200 Z" fill="#FFD700"/>
  </g>

  <!-- Shadow dimension floating fragments -->
  <g id="tShadowFragments" opacity="0.3">
    <path d="M250 60 L255 55 L260 62 L256 66 Z" fill="#8B5CF6" opacity="0.5"/>
    <path d="M310 80 L315 74 L320 82 L314 85 Z" fill="#2D1B69" opacity="0.5"/>
    <path d="M350 55 L353 48 L358 56 L352 58 Z" fill="#8B5CF6" opacity="0.4"/>
    <path d="M280 40 L283 34 L288 42 Z" fill="#DC143C" opacity="0.3"/>
    <path d="M370 70 L374 64 L378 72 Z" fill="#2D1B69" opacity="0.4"/>
  </g>

  <!-- Light side floating dust motes -->
  <g id="tDustMotes" opacity="0.35">
    <circle cx="30" cy="80" r="1" fill="#FFD700"/><circle cx="60" cy="120" r="0.8" fill="#FFE87C"/>
    <circle cx="100" cy="95" r="1.2" fill="#FFD700"/><circle cx="130" cy="140" r="0.7" fill="#FFFFFF"/>
    <circle cx="50" cy="150" r="0.9" fill="#FFE87C"/><circle cx="170" cy="110" r="1" fill="#FFD700"/>
    <circle cx="85" cy="60" r="0.6" fill="#FFFFFF"/><circle cx="155" cy="80" r="0.8" fill="#FFD700"/>
  </g>

  <!-- Extra dungeon floor details -->
  <g id="tFloorDetails">
    <!-- Light side floor cracks -->
    <path d="M20 210 L40 215 L55 210 L70 218" fill="none" stroke="#C4943A" stroke-width="0.5" opacity="0.2"/>
    <path d="M100 225 L120 220 L140 228" fill="none" stroke="#C4943A" stroke-width="0.4" opacity="0.2"/>
    <!-- Shadow side floor cracks -->
    <path d="M220 212 L240 218 L260 210 L280 216" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.15"/>
    <path d="M320 222 L340 215 L360 225" fill="none" stroke="#8B5CF6" stroke-width="0.4" opacity="0.15"/>
    <!-- Glowing floor runes -->
    <text x="60" y="235" font-size="6" fill="#FFD700" opacity="0.15" font-family="serif">&#x25C8;</text>
    <text x="120" y="230" font-size="5" fill="#FFD700" opacity="0.12" font-family="serif">&#x2726;</text>
    <text x="280" y="235" font-size="6" fill="#8B5CF6" opacity="0.12" font-family="serif">&#x25C6;</text>
    <text x="340" y="230" font-size="5" fill="#8B5CF6" opacity="0.1" font-family="serif">&#x2727;</text>
  </g>

  <!-- Additional enemies approaching from shadows -->
  <g id="tDistantEnemies" opacity="0.3">
    <ellipse cx="380" cy="100" rx="5" ry="6" fill="#8B0A1E"/>
    <circle cx="378" cy="98" r="1" fill="#FF4444" opacity="0.6"/>
    <circle cx="382" cy="98" r="1" fill="#FF4444" opacity="0.6"/>
    <ellipse cx="395" cy="130" rx="4" ry="5" fill="#8B0A1E" opacity="0.6"/>
    <circle cx="394" cy="128" r="0.8" fill="#FF4444" opacity="0.4"/>
    <circle cx="396" cy="128" r="0.8" fill="#FF4444" opacity="0.4"/>
  </g>

  <!-- Decorative border lines -->
  <g id="tBorderDecor" opacity="0.2">
    <line x1="0" y1="240" x2="400" y2="240" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="240" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
    <line x1="400" y1="0" x2="400" y2="240" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Genre tags -->
  <g id="tGenreTags" opacity="0.5">
    <rect x="10" y="248" width="55" height="14" rx="3" fill="#FFD700" opacity="0.15"/>
    <text x="37" y="258" font-size="7" fill="#FFD700" font-family="sans-serif" text-anchor="middle">PUZZLE</text>
    <rect x="335" y="248" width="55" height="14" rx="3" fill="#8B5CF6" opacity="0.15"/>
    <text x="362" y="258" font-size="7" fill="#8B5CF6" font-family="sans-serif" text-anchor="middle">ACTION</text>
  </g>
</svg>