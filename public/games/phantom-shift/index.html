function setupInput() {
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
      e.preventDefault();
    }
    input.keys[e.code] = true;

    // [Feedback #3] Seed input on title screen
    if (gameState === 'TITLE' && seedInputActive) {
      if (e.code >= 'Digit0' && e.code <= 'Digit9') {
        const digit = e.code.replace('Digit', '');
        if (seedInputText.length < 10) seedInputText += digit;
        e.preventDefault();
        return;
      }
      if (e.code === 'Backspace') {
        seedInputText = seedInputText.slice(0, -1);
        e.preventDefault();
        return;
      }
      if (e.code === 'Enter' || e.code === 'Escape') {
        seedInputActive = false;
        gs.customSeed = seedInputText.length > 0 ? parseInt(seedInputText, 10) : 0;
        e.preventDefault();
        return;
      }
    }

    // ESC handling
    if (e.code === 'Escape') {
      if (ESCAPE_ALLOWED[gameState] !== undefined) {
        const target = ESCAPE_ALLOWED[gameState];
        if (target) enterState(target);
      } else if (gameState === 'GAMEPLAY' || gameState === 'BOSS_FIGHT') {
        enterState('PAUSED');
      }
    }

    // [Feedback #8] Tab key minimap toggle
    if (e.code === 'Tab') {
      showMinimap = !showMinimap;
    }

    // Prevent default for game keys
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', (e) => { input.keys[e.code] = false; });

  // Touch events
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

  // Mouse click
  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    // Right click = dimension shift
    if (gameState === 'GAMEPLAY' || gameState === 'BOSS_FIGHT') {
      tryDimensionShift(ps, gs, performance.now(), tw, snd);
    }
  });

  // Mouse wheel for minimap scroll
  canvas.addEventListener('wheel', (e) => {
    if (gameState === 'SHOP') shopScroll.scrollWheel(e.deltaY * 0.5);
    e.preventDefault();
  }, { passive: false });
}

// Touch button layout
function getTouchButtons() {
  const s = Math.max(CONFIG.MIN_TOUCH, 56);
  const pad = 12;
  return {
    joystick: { x: pad + 60, y: H - pad - 60, r: 60, touchR: 80 },
    attack:   { x: W - pad - s, y: H - pad - s, w: s, h: s, label: '\u2694' },
    shift:    { x: W - pad - s, y: H - pad - s*2 - 8, w: s, h: s, label: 'Q' },
    interact: { x: W - pad - s*2 - 8, y: H - pad - s, w: s, h: s, label: 'E' },
    skill1:   { x: W - pad - s*2 - 8, y: H - pad - s*2 - 8, w: Math.max(CONFIG.MIN_TOUCH, s*0.85), h: Math.max(CONFIG.MIN_TOUCH, s*0.85), label: '1' },
    skill2:   { x: W - pad - s*3 - 16, y: H - pad - s, w: Math.max(CONFIG.MIN_TOUCH, s*0.85), h: Math.max(CONFIG.MIN_TOUCH, s*0.85), label: '2' },
    skill3:   { x: W - pad - s*3 - 16, y: H - pad - s*2 - 8, w: Math.max(CONFIG.MIN_TOUCH, s*0.85), h: Math.max(CONFIG.MIN_TOUCH, s*0.85), label: '3' }
  };
}

function handleTouchStart(e) {
  e.preventDefault();
  snd.resume();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  for (const touch of e.changedTouches) {
    const tx = (touch.clientX - rect.left) * scaleX;
    const ty = (touch.clientY - rect.top) * scaleY;
    // Check game-state specific taps
    if (gameState === 'TITLE' || gameState === 'GAMEOVER' || gameState === 'VICTORY') {
      input.touchTap = true;
      input.touchTapPos = { x: tx, y: ty };
      // [Feedback #3] Check seed input area tap on title
      if (gameState === 'TITLE') {
        const seedBoxX = W/2 - 80, seedBoxY = H * 0.85 - 5, seedBoxW = 160, seedBoxH = 26;
        if (tx >= seedBoxX && tx <= seedBoxX + seedBoxW && ty >= seedBoxY && ty <= seedBoxY + seedBoxH) {
          seedInputActive = !seedInputActive;
          if (!seedInputActive) {
            gs.customSeed = seedInputText.length > 0 ? parseInt(seedInputText, 10) : 0;
          }
        }
      }
    }
    // Joystick
    if (gameState === 'GAMEPLAY' || gameState === 'BOSS_FIGHT' || gameState === 'TUTORIAL') {
      const tb = getTouchButtons();
      const jdx = tx - tb.joystick.x, jdy = ty - tb.joystick.y;
      if (Math.sqrt(jdx*jdx+jdy*jdy) < tb.joystick.touchR && !input.touchJoy.active) {
        input.touchJoy.active = true; input.touchJoy.id = touch.identifier;
        input.touchJoy.sx = tx; input.touchJoy.sy = ty; input.touchJoy.dx = 0; input.touchJoy.dy = 0;
        continue;
      }
      // Buttons
      if (hitTest(tx, ty, tb.attack)) input.touchBtns.attack = true;
      if (hitTest(tx, ty, tb.shift)) input.touchBtns.shift = true;
      if (hitTest(tx, ty, tb.interact)) input.touchBtns.interact = true;
      if (hitTest(tx, ty, tb.skill1)) input.touchBtns.skill1 = true;
      if (hitTest(tx, ty, tb.skill2)) input.touchBtns.skill2 = true;
      if (hitTest(tx, ty, tb.skill3)) input.touchBtns.skill3 = true;
    }
    // Button hit testing for UI screens
    input.touchTap = true;
    input.touchTapPos = { x: tx, y: ty };
    // Shop scrolling
    if (gameState === 'SHOP') shopScroll.touchStart(ty);
    checkButtonHit(tx, ty);
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  for (const touch of e.changedTouches) {
    const tx = (touch.clientX - rect.left) * scaleX;
    const ty = (touch.clientY - rect.top) * scaleY;
    if (input.touchJoy.active && touch.identifier === input.touchJoy.id) {
      input.touchJoy.dx = tx - input.touchJoy.sx;
      input.touchJoy.dy = ty - input.touchJoy.sy;
      const maxDist = 40;
      const dist = Math.sqrt(input.touchJoy.dx*input.touchJoy.dx + input.touchJoy.dy*input.touchJoy.dy);
      if (dist > maxDist) {
        input.touchJoy.dx = input.touchJoy.dx/dist*maxDist;
        input.touchJoy.dy = input.touchJoy.dy/dist*maxDist;
      }
    }
    if (gameState === 'SHOP') shopScroll.touchMove(ty);
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (input.touchJoy.active && touch.identifier === input.touchJoy.id) {
      input.touchJoy.active = false; input.touchJoy.dx = 0; input.touchJoy.dy = 0;
    }
  }
  input.touchBtns.attack = false;
  input.touchBtns.shift = false;
  input.touchBtns.interact = false;
  input.touchBtns.skill1 = false;
  input.touchBtns.skill2 = false;
  input.touchBtns.skill3 = false;
  if (gameState === 'SHOP') shopScroll.touchEnd();
}

function handleClick(e) {
  snd.resume();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const tx = (e.clientX - rect.left) * scaleX;
  const ty = (e.clientY - rect.top) * scaleY;
  input.touchTap = true;
  input.touchTapPos = { x: tx, y: ty };

  // [Feedback #3] Check seed input area click on title
  if (gameState === 'TITLE') {
    const seedBoxX = W/2 - 80, seedBoxY = H * 0.85 - 5, seedBoxW = 160, seedBoxH = 26;
    if (tx >= seedBoxX && tx <= seedBoxX + seedBoxW && ty >= seedBoxY && ty <= seedBoxY + seedBoxH) {
      seedInputActive = !seedInputActive;
      if (!seedInputActive) {
        gs.customSeed = seedInputText.length > 0 ? parseInt(seedInputText, 10) : 0;
      }
      return;
    } else if (seedInputActive) {
      seedInputActive = false;
      gs.customSeed = seedInputText.length > 0 ? parseInt(seedInputText, 10) : 0;
    }
  }

  checkButtonHit(tx, ty);
}

// Hit test a point against a rect
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// Check button hits
function checkButtonHit(tx, ty) {
  for (const btn of buttons) {
    if (hitTest(tx, ty, btn)) {
      snd.sfxUI();
      if (btn.action) btn.action();
      return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════
// REGION 8: UPDATE & RENDER (per state)
// ═══════════════════════════════════════════

// Main update dispatcher
function update(dt) {
  const sys = ACTIVE_SYSTEMS[gameState] || [];
  const dtS = dt / 1000;
  frameCount++;

  // Tween always updates
  if (sys.includes('tween')) tw.update(dt);

  // Shake decay
  if (shakeAmount > 0) shakeAmount *= 0.92;
  if (shakeAmount < 0.1) shakeAmount = 0;

  // State-specific update
  switch (gameState) {
    case 'TITLE': updateTitle(dtS); break;
    case 'DIFFICULTY': break;
    case 'TUTORIAL': updateGameplay(dtS, true); break;
    case 'FLOOR_INTRO': break;
    case 'GAMEPLAY': updateGameplay(dtS, false); break;
    case 'DIMENSION_SHIFT': updateDimensionShift(dtS); break;
    case 'PAUSED': break;
    case 'LEVEL_UP': break;
    case 'SHOP': shopScroll.update(dt); break;
    case 'BOSS_CUTSCENE': updateBossCutscene(dtS); break;
    case 'BOSS_FIGHT': updateGameplay(dtS, false); updateBossFight(dtS); break;
    case 'VICTORY': updateTitle(dtS); break;
    case 'GAMEOVER': break;
  }
}

function updateTitle(dtS) {
  titleAnim.t += dtS;
  for (const p of titleAnim.particles) {
    p.x += p.vx * dtS;
    p.y += p.vy * dtS;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    p.alpha = 0.3 + Math.sin(titleAnim.t * 2 + p.x * 0.01) * 0.3;
  }
}

function updateGameplay(dtS, isTutorial) {
  // Player movement
  let dx = 0, dy = 0;
  if (input.isDown('ArrowLeft') || input.isDown('KeyA')) dx -= 1;
  if (input.isDown('ArrowRight') || input.isDown('KeyD')) dx += 1;
  if (input.isDown('ArrowUp') || input.isDown('KeyW')) dy -= 1;
  if (input.isDown('ArrowDown') || input.isDown('KeyS')) dy += 1;
  // Touch joystick
  if (input.touchJoy.active) {
    const deadzone = 8;
    if (Math.abs(input.touchJoy.dx) > deadzone) dx = input.touchJoy.dx > 0 ? 1 : -1;
    if (Math.abs(input.touchJoy.dy) > deadzone) dy = input.touchJoy.dy > 0 ? 1 : -1;
  }
  // Normalize diagonal
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  // Update facing
  if (dx < 0) ps.facing = 'left';
  else if (dx > 0) ps.facing = 'right';
  else if (dy < 0) ps.facing = 'up';
  else if (dy > 0) ps.facing = 'down';
  // Move
  let speedMul = ps.speedMul;
  // [Feedback #7] Haste buff
  if (ps.hasteBuff > 0) {
    ps.hasteBuff -= dtS;
    speedMul *= 1.5;
  }
  const speed = CONFIG.PLAYER_SPEED * speedMul * dtS;
  const newX = ps.x + dx * speed;
  const newY = ps.y + dy * speed;
  // Collision with walls
  const map = gs.dimension === 'light' ? floorData.lightMap : floorData.shadowMap;
  if (!isTileBlocked(map, newX, ps.y, CONFIG.PLAYER_SIZE)) ps.x = newX;
  if (!isTileBlocked(map, ps.x, newY, CONFIG.PLAYER_SIZE)) ps.y = newY;
  // Clamp to map bounds
  ps.x = Math.max(CONFIG.TILE_SIZE, Math.min(ps.x, CONFIG.MAP_W * CONFIG.TILE_SIZE - CONFIG.TILE_SIZE));
  ps.y = Math.max(CONFIG.TILE_SIZE, Math.min(ps.y, CONFIG.MAP_H * CONFIG.TILE_SIZE - CONFIG.TILE_SIZE));
  // Walk animation
  if (dx !== 0 || dy !== 0) ps.animFrame += dtS * 10;
  else ps.animFrame = 0;
  // Reveal map around player
  const pr = Math.floor(ps.y / CONFIG.TILE_SIZE), pc = Math.floor(ps.x / CONFIG.TILE_SIZE);
  const mmRange = 3 + (gs.upgrades.minimap || 0);
  revealAround(pr, pc, mmRange);

  // Dimension shift input
  if (input.justPressed('KeyQ') || input.touchBtns.shift) {
    tryDimensionShift(ps, gs, performance.now(), tw, snd);
  }
  // Attack input
  if (input.justPressed('Space') || input.touchBtns.attack) {
    if (gameState === 'BOSS_FIGHT' && bossState && bossState.active) {
      processBossAttack(ps, gs, bossState, particlePool, snd);
    }
    processAttack(ps, gs, floorData.enemies, particlePool, gs.dimension, snd, tw);
  }
  // Interact
  if (input.justPressed('KeyE') || input.touchBtns.interact) {
    processInteract();
  }

  // Skill activation [Feedback #7]
  for (let si = 0; si < 3; si++) {
    if ((input.justPressed(`Digit${si+1}`) || input.touchBtns[`skill${si+1}`]) && ps.skills[si]) {
      if (gameState !== 'LEVEL_UP') {
        activateSkill(ps, gs, si, floorData.enemies, particlePool, snd);
      }
    }
  }

  // Cooldowns
  if (ps.attackCooldown > 0) ps.attackCooldown -= dtS;
  if (ps.attackAnim > 0) ps.attackAnim -= dtS;
  if (ps.invulnFrames > 0) ps.invulnFrames -= dtS;
  // Skill cooldowns [Feedback #7]
  for (let si = 0; si < 3; si++) {
    if (ps.skillCooldowns[si] > 0) ps.skillCooldowns[si] -= dtS;
    if (ps.skillCooldowns[si] < 0) ps.skillCooldowns[si] = 0;
  }
  // Energy regen
  const regenMul = CONFIG.DIFF[gs.difficulty].regenMul;
  // [Feedback #4] Energy buff: +30% regen
  const energyBuffMul = gs.energyBuff ? 1.3 : 1.0;
  ps.energy = Math.min(ps.maxEnergy, ps.energy + ps.energyRegen * regenMul * energyBuffMul * dtS);
  // Regen skill
  if (ps.skills.includes('regen')) ps.hp = Math.min(ps.maxHp, ps.hp + 0.5 * dtS);

  // Enemy AI
  if (!isTutorial) updateEnemyAI(dtS);

  // Enemy-player collision (damage)
  for (const e of floorData.enemies) {
    if (!e.alive) continue;
    const edx = ps.x - e.x, edy = ps.y - e.y;
    const dist = Math.sqrt(edx*edx + edy*edy);
    if (dist < CONFIG.PLAYER_SIZE + ENEMY_DEFS[e.type].size) {
      const dmgMul = getEnemyDamageMul(e.type, gs.dimension);
      if (dmgMul > 0 && ps.invulnFrames <= 0) {
        const dmg = Math.round(e.atk * dmgMul);
        ps.hp -= dmg;
        ps.invulnFrames = 0.8;
        ps.noHitFloor = false;
        ps.allFloorsNoHit = false; // [Feedback #1]
        shakeAmount = 5;
        snd.sfxHit();
        // [Visual D: spark shape for hit particles]
        spawnDamageNumber(particlePool, ps.x, ps.y - 20, dmg, false);
        for (let hi = 0; hi < 4; hi++) {
          const ha = Math.random() * Math.PI * 2;
          spawnParticle(particlePool, ps.x, ps.y, Math.cos(ha)*30, Math.sin(ha)*30, '#FF4444', 0.3, null, 0, 'spark');
        }
        // Dimension shield skill
        if (ps.skills.includes('dim_shield') && performance.now() - ps.lastShiftTime < 1000) {
          ps.hp += dmg; // Negate damage
          ps.invulnFrames = 1.0;
        }
        if (ps.hp <= 0) { ps.hp = 0; beginTransition('GAMEOVER'); return; }
      }
    }
  }

  // Trap collision
  const currentTile = map[pr * CONFIG.MAP_W + pc];
  if (currentTile === 3 && ps.invulnFrames <= 0) {
    ps.hp -= 10;
    ps.invulnFrames = 1.0;
    shakeAmount = 3;
    snd.sfxHit();
    if (ps.hp <= 0) { ps.hp = 0; beginTransition('GAMEOVER'); return; }
  }

  // Item collection
  for (const item of floorData.items) {
    if (item.collected) continue;
    const idx = ps.x - item.x, idy = ps.y - item.y;
    if (Math.sqrt(idx*idx + idy*idy) < 20) {
      item.collected = true;
      snd.sfxItem();
      if (item.type === 'potion') ps.hp = Math.min(ps.maxHp, ps.hp + 30);
      else if (item.type === 'gold') gs.gold += 15 + gs.floor * 5;
      else if (item.type === 'energy') ps.energy = Math.min(ps.maxEnergy, ps.energy + 25);
      else if (item.type === 'lore') {
        gs.score += 50;
        if (!save.unlockedLore.includes(`${gs.floor}-${Math.round(item.x)}`)) {
          save.unlockedLore.push(`${gs.floor}-${Math.round(item.x)}`);
          saveSave();
        }
      }
    }
  }

  // Check exit
  const exitDx = ps.x - floorData.exitX, exitDy = ps.y - floorData.exitY;
  if (Math.sqrt(exitDx*exitDx + exitDy*exitDy) < 20) {
    // Boss floor check
    if (bossState && !bossState.active && gameState !== 'BOSS_FIGHT') {
      bossState.active = true;
      beginTransition('BOSS_CUTSCENE');
      return;
    }
    if (!bossState || (bossState && bossState.hp <= 0)) {
      // Floor clear
      gs.score += 100 * gs.floor;
      if (ps.noHitFloor) gs.score = Math.round(gs.score * 1.5);

      // [Feedback #1] Track allFloorsNoHit
      if (!ps.noHitFloor) ps.allFloorsNoHit = false;

      // [Feedback #1] Hidden stage check at floor 15
      if (gs.floor >= 15) {
        // Check hidden stage conditions
        const allNoHit = ps.allFloorsNoHit;
        const allLore = save.unlockedLore.length >= 15;
        if (gs.floor === 15 && allNoHit && allLore) {
          // Enter hidden floor 16
          gs.floor = 16;
          ps.noHitFloor = true;
          gs.consecutiveDeaths = 0; // Reset on progress
          generateNewFloor();
          beginTransition('FLOOR_INTRO');
          return;
        } else if (gs.floor === 16) {
          // Completed hidden floor
          gs.score += 5000;
          beginTransition('VICTORY');
          return;
        } else {
          beginTransition('VICTORY');
          return;
        }
      }

      gs.floor++;
      ps.noHitFloor = true;
      gs.consecutiveDeaths = 0; // [Feedback #4] Reset on progress
      generateNewFloor();
      beginTransition('FLOOR_INTRO');
      return;
    }
  }

  // Level up check
  if (checkLevelUp(ps)) {
    snd.sfxLevelUp();
    levelUpChoices = getSkillChoices(ps.skills, gs.rng);
    enterState('LEVEL_UP');
    return;
  }

  // Update camera
  camera.x += (ps.x - camera.x) * CONFIG.CAM_LERP;
  camera.y += (ps.y - camera.y) * CONFIG.CAM_LERP;
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;

  // Update particles
  updateParticles(dtS);
}

function updateEnemyAI(dtS) {
  if (!floorData) return;
  for (const e of floorData.enemies) {
    if (!e.alive) continue;
    e.animFrame++;
    e.hitFlash = Math.max(0, e.hitFlash - dtS);
    e.aiTimer -= dtS;
    if (e.aiTimer <= 0) {
      e.aiTimer = 0.5 + Math.random() * 0.5;
      // Simple chase AI: move toward player if within range
      const dx = ps.x - e.x, dy = ps.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200) {
        e.dx = (dx/dist) * e.speed;
        e.dy = (dy/dist) * e.speed;
      } else {
        e.dx = (Math.random() - 0.5) * e.speed * 0.5;
        e.dy = (Math.random() - 0.5) * e.speed * 0.5;
      }
      // Adaptive enemy switches dimension
      if (e.type === 'phantom_mage') {
        e.adaptDim = gs.dimension === 'light' ? 'shadow' : 'light';
      }
    }
    // Move enemy
    const map = gs.dimension === 'light' ? floorData.lightMap : floorData.shadowMap;
    const newX = e.x + e.dx * dtS;
    const newY = e.y + e.dy * dtS;
    if (!isTileBlocked(map, newX, e.y, ENEMY_DEFS[e.type].size * 0.5))  e.x = newX;
    if (!isTileBlocked(map, e.x, newY, ENEMY_DEFS[e.type].size * 0.5))  e.y = newY;
    e.tileC = Math.floor(e.x / CONFIG.TILE_SIZE);
    e.tileR = Math.floor(e.y / CONFIG.TILE_SIZE);
  }
}

function updateBossFight(dtS) {
  if (!bossState || !bossState.active || bossState.hp <= 0) return;
  bossState.animFrame++;
  bossState.attackTimer -= dtS;
  // Phase check
  const hpRatio = bossState.hp / bossState.maxHp;
  let newPhase = 0;
  for (let i = 0; i < bossState.def.phases.length; i++) {
    if (hpRatio <= bossState.def.phases[i]) newPhase = i;
  }
  if (newPhase > bossState.phase) {
    bossState.phase = newPhase;
    shakeAmount = 8;
  }
  // Boss attack patterns
  if (bossState.attackTimer <= 0) {
    bossState.attackTimer = 2 - bossState.phase * 0.3;
    bossAttackPattern(bossState, ps, particlePool);
  }
  // Boss-player collision
  const bdx = ps.x - bossState.x, bdy = ps.y - bossState.y;
  const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
  if (bdist < bossState.def.size + CONFIG.PLAYER_SIZE && ps.invulnFrames <= 0) {
    const dmg = Math.round(bossState.def.atk * (1 + bossState.phase * 0.3));
    ps.hp -= dmg;
    ps.invulnFrames = 1.0;
    ps.noHitFloor = false;
    ps.allFloorsNoHit = false;
    shakeAmount = 8;
    snd.sfxHit();
    spawnDamageNumber(particlePool, ps.x, ps.y - 20, dmg, false);
    if (ps.hp <= 0) { ps.hp = 0; beginTransition('GAMEOVER'); }
  }
  // Boss death
  if (bossState.hp <= 0) {
    const bossScore = [500, 1000, 2000][bossState.idx] || 500;
    gs.score += bossScore;
    snd.sfxVictory();
    camera.targetZoom = 1;
    // Particles
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      spawnParticle(particlePool, bossState.x, bossState.y, Math.cos(a)*80, Math.sin(a)*80, bossState.def.color, 1.5, null, 0, 'star');
    }
    beginTransition('GAMEPLAY');
  }
}

function bossAttackPattern(boss, player, particles) {
  const bidx = boss.idx;
  if (bidx === 0) {
    // Shadow Guardian: charge toward player
    const dx = player.x - boss.x, dy = player.y - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    boss.x += (dx/dist) * 60;
    boss.y += (dy/dist) * 60;
    // Spawn projectile particles
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI/3 + boss.animFrame * 0.1;
      spawnParticle(particles, boss.x, boss.y, Math.cos(a)*50, Math.sin(a)*50, '#DC143C', 0.4);
    }
  } else if (bidx === 1) {
    // Dimension Weaver: area denial
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI/4;
      spawnParticle(particles, boss.x + Math.cos(a)*40, boss.y + Math.sin(a)*40, Math.cos(a)*30, Math.sin(a)*30, '#8B5CF6', 0.6, null, 0, 'ring');
    }
  } else if (bidx === 2) {
    // Shadow Lord: summon + area attack
    for (let i = 0; i < 12; i++) {
      const a = i * Math.PI/6;
      const speed = 40 + boss.phase * 20;
      spawnParticle(particles, boss.x, boss.y, Math.cos(a)*speed, Math.sin(a)*speed, '#DC143C', 0.8, null, 0, 'star');
    }
  }
}

function processBossAttack(ps, gs, boss, particles, snd) {
  if (!boss || boss.hp <= 0) return;
  const dx = boss.x - ps.x, dy = boss.y - ps.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 60) return;
  const dmg = Math.round(ps.atk + (gs.upgrades.atk || 0) * 2);
  boss.hp -= dmg;
  spawnDamageNumber(particles, boss.x, boss.y - 20, dmg, false);
  snd.sfxAttack(gs.dimension);
}

function updateBossCutscene(dtS) {
  if (!bossState) return;
  bossState.animFrame++;
  // Pan camera to boss
  camera.x += (bossState.x - camera.x) * 0.03;
  camera.y += (bossState.y - camera.y) * 0.03;
  camera.targetZoom = CONFIG.BOSS_ZOOM;
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.02;
  // After 3 seconds, enter boss fight
  if (bossState.animFrame > 180) { // ~3s at 60fps
    beginTransition('BOSS_FIGHT');
  }
}

function updateDimensionShift(dtS) {
  shiftEffect.progress += dtS * 2.5;
  if (shiftEffect.progress >= 1) {
    shiftEffect.active = false;
    enterState('GAMEPLAY');
  }
}

function processInteract() {
  // Check for exit stair proximity
  if (!floorData) return;
  const dx = ps.x - floorData.exitX, dy = ps.y - floorData.exitY;
  if (Math.sqrt(dx*dx + dy*dy) < 30) {
    snd.sfxPuzzle();
  }
}

// Tile collision check
function isTileBlocked(map, x, y, pad) {
  const ts = CONFIG.TILE_SIZE;
  const checks = [
    [Math.floor((y-pad)/ts), Math.floor((x-pad)/ts)],
    [Math.floor((y-pad)/ts), Math.floor((x+pad)/ts)],
    [Math.floor((y+pad)/ts), Math.floor((x-pad)/ts)],
    [Math.floor((y+pad)/ts), Math.floor((x+pad)/ts)]
  ];
  for (const [r, c] of checks) {
    if (r < 0 || r >= CONFIG.MAP_H || c < 0 || c >= CONFIG.MAP_W) return true;
    if (map[r * CONFIG.MAP_W + c] === 1) return true;
  }
  return false;
}

// Update particles
function updateParticles(dtS) {
  const active = particlePool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    const p = active[i];
    p.life -= dtS;
    if (p.life <= 0) { particlePool.release(p); continue; }
    p.x += p.vx * dtS;
    p.y += p.vy * dtS;
    p.vy += 20 * dtS; // gravity for non-text
    if (p.text) p.vy = -30; // Float up for damage numbers
  }
}

// ═══════════════════════════════════════════
// REGION 9: RENDER (per state)
// ═══════════════════════════════════════════

function render() {
  ctx.save();
  // Screen shake
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random()-0.5) * shakeAmount * 2,
      (Math.random()-0.5) * shakeAmount * 2
    );
  }
  // Screen alpha for transitions
  ctx.globalAlpha = screenAlpha.value;

  switch (gameState) {
    case 'LOADING': renderLoading(); break;
    case 'TITLE': renderTitle(); break;
    case 'DIFFICULTY': renderDifficulty(); break;
    case 'TUTORIAL': renderGameplay(); renderTutorialOverlay(); break;
    case 'FLOOR_INTRO': renderFloorIntro(); break;
    case 'GAMEPLAY': renderGameplay(); break;
    case 'DIMENSION_SHIFT': renderGameplay(); renderShiftOverlay(); break;
    case 'PAUSED': renderGameplay(); renderPaused(); break;
    case 'LEVEL_UP': renderGameplay(); renderLevelUp(); break;
    case 'SHOP': renderShop(); break;
    case 'INVENTORY': renderGameplay(); break;
    case 'BOSS_CUTSCENE': renderGameplay(); renderBossCutscene(); break;
    case 'BOSS_FIGHT': renderGameplay(); break;
    case 'VICTORY': renderVictory(); break;
    case 'GAMEOVER': renderGameover(); break;
  }
  ctx.restore();
}

function renderLoading() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#6c3cf7';
  ctx.font = 'bold 18px "Segoe UI",system-ui,-apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading...', W/2, H/2);
}

function renderTitle() {
  const t = getText();
  // Background — split light/shadow
  ctx.fillStyle = '#0A0A2E';
  ctx.fillRect(0, 0, W, H);
  // Left half — light
  ctx.fillStyle = '#FFF8E720';
  ctx.fillRect(0, 0, W/2, H);
  // Right half — shadow
  ctx.fillStyle = '#0A0A2E40';
  ctx.fillRect(W/2, 0, W/2, H);
  // Dividing line — animated
  const lineX = W/2 + Math.sin(titleAnim.t * 1.5) * 15;
  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#6c3cf7';
  ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.moveTo(lineX, 0); ctx.lineTo(lineX, H); ctx.stroke();
  ctx.shadowBlur = 0;
  // Particles
  for (const p of titleAnim.particles) {
    const col = p.dim === 'light' ? '#FFD700' : '#8B5CF6';
    drawParticle(ctx, p.x, p.y, p.size, p.alpha, col);
  }
  // Title text with scanline effect
  ctx.save();
  ctx.textAlign = 'center';
  // Title glow
  ctx.shadowColor = '#8B5CF6';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#E0E0F0';
  ctx.font = `bold ${Math.min(48, W*0.08)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(t.title, W/2, H*0.28);
  ctx.shadowBlur = 0;
  // Subtitle
  ctx.fillStyle = '#8080A0';
  ctx.font = `${Math.min(18, W*0.035)}px "Segoe UI",system-ui,-apple-system,sans-serif`;

  }

function renderGameplay() {
  const t = getText();
  const pal = getPal(gs.dimension);
  // Fill bg
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);
  // Camera transform
  ctx.save();
  const camX = W/2 - camera.x * camera.zoom;
  const camY = H/2 - camera.y * camera.zoom;
  ctx.translate(camX, camY);
  ctx.scale(camera.zoom, camera.zoom);
  // Determine visible tile range
  const ts = CONFIG.TILE_SIZE;
  const viewLeft = (camera.x - W/2/camera.zoom) / ts;
  const viewRight = (camera.x + W/2/camera.zoom) / ts;
  const viewTop = (camera.y - H/2/camera.zoom) / ts;
  const viewBottom = (camera.y + H/2/camera.zoom) / ts;
  const minC = Math.max(0, Math.floor(viewLeft) - 1);
  const maxC = Math.min(CONFIG.MAP_W - 1, Math.ceil(viewRight) + 1);
  const minR = Math.max(0, Math.floor(viewTop) - 1);
  const maxR = Math.min(CONFIG.MAP_H - 1, Math.ceil(viewBottom) + 1);
  const map = gs.dimension === 'light' ? floorData.lightMap : floorData.shadowMap;
  const hasClairvoyance = ps.skills.includes('clairvoyance');
  // Draw tiles
  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) {
      const idx = r * CONFIG.MAP_W + c;
      const revealed = floorData.explored[idx];
      drawTile(ctx, c*ts, r*ts, ts, map[idx], gs.dimension, revealed, hasClairvoyance);
    }
  }
  // Draw items [Visual C: pass animFrame]
  for (const item of floorData.items) {
    if (item.collected) continue;
    const ic = Math.floor(item.x/ts), ir = Math.floor(item.y/ts);
    if (floorData.explored[ir * CONFIG.MAP_W + ic])
      drawItem(ctx, item.x, item.y, 12, item.type, item.rarity, frameCount);
  }
  // Draw enemies
  for (const e of floorData.enemies) {
    if (!e.alive) continue;
    const ec = Math.floor(e.x/ts), er = Math.floor(e.y/ts);
    if (!floorData.explored[er * CONFIG.MAP_W + ec]) continue;
    // Hit flash
    if (e.hitFlash > 0) { ctx.save(); ctx.globalAlpha = 0.5 + Math.sin(e.hitFlash*40)*0.5; }
    drawEnemy(ctx, e.x, e.y, ENEMY_DEFS[e.type].size, e.type, gs.dimension, e.hp, e.maxHp, e.animFrame);
    if (e.hitFlash > 0) ctx.restore();
  }
  // Draw boss
  if (bossState && bossState.active && bossState.hp > 0) {
    drawBoss(ctx, bossState.x, bossState.y, bossState.def.size, bossState.idx,
      bossState.phase, bossState.hp, bossState.maxHp, bossState.animFrame, gs.dimension);
  }
  // Draw player
  drawPlayer(ctx, ps.x, ps.y, CONFIG.PLAYER_SIZE, gs.dimension, ps.animFrame, ps.facing, ps.invulnFrames);
  // Attack animation
  if (ps.attackAnim > 0) {
    const dirs = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    const d = dirs[ps.facing] || [0,-1];
    const aLen = 25 * (ps.attackAnim / 0.2);
    ctx.strokeStyle = gs.dimension === 'light' ? '#FFD70088' : '#9B59B688';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ps.x, ps.y);
    ctx.lineTo(ps.x + d[0]*aLen, ps.y + d[1]*aLen);
    ctx.stroke();
  }
  // Draw particles (in world space) [Visual D: shape support]
  for (const p of particlePool.active) {
    if (p.text) {
      ctx.save();
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.font = `bold ${p.fontSize}px "Segoe UI",system-ui,-apple-system,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    } else {
      drawParticle(ctx, p.x, p.y, p.size, p.life/p.maxLife, p.color, p.shape);
    }
  }
  ctx.restore(); // End camera

  // HUD overlay
  drawHUD(ctx, W, H, ps, gs, gs.dimension, t);

  // Minimap [Feedback #8: wrap with showMinimap check]
  if (showMinimap) {
    const mmSize = Math.min(120, W*0.18);
    drawMinimap(ctx, W - mmSize - 8, 50, mmSize, mmSize,
      floorData.lightMap, floorData.shadowMap, gs.dimension,
      { r: Math.floor(ps.y/ts), c: Math.floor(ps.x/ts) },
      floorData.enemies, gs.floor, floorData.explored);
  }

  // Touch controls overlay
  renderTouchControls();
}

function renderTouchControls() {
  // Only render on touch-capable or small screens
  if (W > 1024 && !('ontouchstart' in window)) return;
  const tb = getTouchButtons();
  ctx.save();
  ctx.globalAlpha = 0.4;
  // Joystick base
  ctx.strokeStyle = '#E0E0F080';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(tb.joystick.x, tb.joystick.y, tb.joystick.r, 0, Math.PI*2);
  ctx.stroke();
  // Joystick knob
  ctx.fillStyle = '#E0E0F044';
  ctx.beginPath();
  ctx.arc(tb.joystick.x + input.touchJoy.dx, tb.joystick.y + input.touchJoy.dy, 20, 0, Math.PI*2);
  ctx.fill();
  // Buttons
  const renderBtn = (b) => {
    ctx.fillStyle = '#6c3cf744';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = '#6c3cf7';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = '#E0E0F0';
    ctx.font = `bold ${Math.min(b.h*0.4, 18)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2);
  };
  renderBtn(tb.attack);
  renderBtn(tb.shift);
  renderBtn(tb.interact);
  if (ps.skills.length >= 1) renderBtn(tb.skill1);
  if (ps.skills.length >= 2) renderBtn(tb.skill2);
  if (ps.skills.length >= 3) renderBtn(tb.skill3);
  ctx.restore();
}

  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 3;
  ctx.globalAlpha = (1 - p) * 0.8;
  ctx.beginPath();
  ctx.arc(W/2, H/2, p * Math.max(W, H), 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

function renderLevelUp() {
  const t = getText();
  ctx.save();
  ctx.fillStyle = '#0A0A2EDD';
  ctx.fillRect(0, 0, W, H);
  // Title
  ctx.fillStyle = '#2ECC71';
  ctx.font = `bold ${Math.min(32,W*0.06)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(t.levelUp, W/2, H*0.15);
  ctx.fillStyle = '#8080A0';
  ctx.font = `${Math.min(16,W*0.03)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(t.choose, W/2, H*0.22);

  buttons = [];
  const cardW = Math.min(180, W*0.28), cardH = Math.min(160, H*0.3);
  const gap = 12;
  const totalW = levelUpChoices.length * cardW + (levelUpChoices.length-1) * gap;
  const startX = W/2 - totalW/2;
  const cardY = Math.min(H*0.3, H - cardH - 60);

  levelUpChoices.forEach((skill, i) => {
    const cx = startX + i * (cardW + gap);
    // Card bg
    ctx.fillStyle = '#12121E';
    ctx.strokeStyle = skill.color;
    ctx.lineWidth = 2;
    ctx.fillRect(cx, cardY, cardW, cardH);
    ctx.strokeRect(cx, cardY, cardW, cardH);
    // Icon circle
    ctx.fillStyle = skill.color + '44';
    ctx.beginPath();
    ctx.arc(cx + cardW/2, cardY + 35, 18, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = skill.color;
    ctx.beginPath();
    ctx.arc(cx + cardW/2, cardY + 35, 12, 0, Math.PI*2);
    ctx.fill();
    // Name
    ctx.fillStyle = '#E0E0F0';
    ctx.font = `bold ${Math.min(14,cardW*0.08)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lang === 'ko' ? skill.nameKo : skill.nameEn, cx + cardW/2, cardY + 70);
    // Desc
    ctx.fillStyle = '#8080A0';
    ctx.font = `${Math.min(12,cardW*0.07)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.fillText(skill.desc, cx + cardW/2, cardY + 90);
    // Select button
    const btnY = cardY + cardH - 36;
    drawButton(ctx, cx+10, btnY, cardW-20, 28, lang === 'ko' ? '\uC120\uD0DD' : 'Select', 'normal', { color: skill.color });
    buttons.push({ x:cx, y:cardY, w:cardW, h:cardH, action: () => {
      if (ps.skills.length < ps.maxSkills) ps.skills.push(skill.id);
      else ps.skills[ps.skills.length-1] = skill.id; // Replace last
      applyUpgrades(ps, gs.upgrades);
      enterState(prevState === 'BOSS_FIGHT' ? 'BOSS_FIGHT' : 'GAMEPLAY');
    }});
  });
  // Key shortcuts
  for (let i = 0; i < levelUpChoices.length; i++) {
    if (input.justPressed(`Digit${i+1}`)) {
      const skill = levelUpChoices[i];
      if (ps.skills.length < ps.maxSkills) ps.skills.push(skill.id);
      else ps.skills[ps.skills.length-1] = skill.id;
      applyUpgrades(ps, gs.upgrades);
      enterState(prevState === 'BOSS_FIGHT' ? 'BOSS_FIGHT' : 'GAMEPLAY');
      break;
    }
  }
  ctx.restore();
}

function renderShop() {
  const t = getText();
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  // Header
  ctx.fillStyle = '#E0E0F0';
  ctx.font = `bold ${Math.min(28,W*0.05)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(t.upgrade, W/2, 36);
  // Gold display
  ctx.fillStyle = '#F1C40F';
  ctx.font = 'bold 16px "Segoe UI",system-ui,-apple-system,sans-serif';
  ctx.fillText(`Gold: ${save.gold}`, W/2, 58);

  buttons = [];
  const cardW = Math.min(300, W - 40), cardH = 60;
  const gap = 8;
  const startY = 80 - shopScroll.y;
  shopScroll.setMax(Math.max(0, UPGRADE_DEFS.length * (cardH + gap) - (H - 130)));

  UPGRADE_DEFS.forEach((upg, i) => {
    const cy = startY + i * (cardH + gap);
    if (cy + cardH < 70 || cy > H - 50) return;
    const cx = W/2 - cardW/2;
    const lv = save.upgrades[upg.id] || 0;
    const isMax = lv >= upg.maxLv;
    const cost = upg.baseCost * (lv + 1);
    const canBuy = !isMax && save.gold >= cost;
    // Card bg
    ctx.fillStyle = canBuy ? '#12121E' : '#0a0a12';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = canBuy ? '#6c3cf7' : '#1e1e30';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx, cy, cardW, cardH);
    // Name
    ctx.fillStyle = '#E0E0F0';
    ctx.font = `bold 14px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(lang === 'ko' ? upg.nameKo : upg.nameEn, cx + 12, cy + 22);
    // Level
    ctx.fillStyle = '#8080A0';
    ctx.font = '12px "Segoe UI",system-ui,-apple-system,sans-serif';
    ctx.fillText(`${t.lv} ${lv}/${upg.maxLv}  |  ${upg.effect}`, cx + 12, cy + 42);
    // Buy button
    const btnText = isMax ? t.maxLevel : `${t.buy} (${cost}G)`;
    const btnColor = isMax ? '#505070' : canBuy ? '#2ECC71' : '#505070';
    const btnX = cx + cardW - 100, btnY = cy + 10;
    drawButton(ctx, btnX, btnY, 88, 40, btnText, 'normal', { color: btnColor });
    if (canBuy) {
      buttons.push({ x:btnX, y:btnY, w:88, h:40, action: () => {
        save.gold -= cost;
        save.upgrades[upg.id] = lv + 1;
        saveSave();
        snd.sfxItem();
      }});
    }
  });

  // Back button
  const backW = Math.min(160, W*0.3), backH = Math.max(CONFIG.MIN_TOUCH, 40);
  const backX = W/2 - backW/2, backY = H - backH - 10;
  drawButton(ctx, backX, backY, backW, backH, t.back, 'normal', { color:'#505070' });
  buttons.push({ x:backX, y:backY, w:backW, h:backH, action: () => beginTransition('TITLE') });
}

function renderBossCutscene() {
  if (!bossState) return;
  const t = getText();
  ctx.save();
  // Dark overlay increasing
  const p = Math.min(1, bossState.animFrame / 60);
  ctx.fillStyle = `rgba(10,10,15,${p*0.5})`;
  ctx.fillRect(0, 0, W, H);
  // Boss name
  ctx.fillStyle = '#E74C3C';
  ctx.font = `bold ${Math.min(30,W*0.05)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.globalAlpha = Math.min(1, bossState.animFrame / 90);
  ctx.fillText(lang === 'ko' ? bossState.def.nameKo : bossState.def.nameEn, W/2, H*0.15);
  ctx.restore();
}

function renderGameover() {
  const t = getText();
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  // Blood vignette
  ctx.save();
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, '#DC143C22');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  ctx.textAlign = 'center';
  // Game Over text
  ctx.fillStyle = '#E74C3C';
  ctx.font = `bold ${Math.min(42,W*0.07)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(t.gameover, W/2, H*0.22);
  // Stats
  ctx.fillStyle = '#E0E0F0';
  ctx.font = `${Math.min(18,W*0.035)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(`${t.score}: ${gs.score}`, W/2, H*0.35);
  ctx.fillText(`${t.floor}: ${gs.floor}`, W/2, H*0.42);
  ctx.fillStyle = '#F1C40F';
  ctx.fillText(`${t.goldRetained}: ${Math.round(gs.gold * CONFIG.GOLD_RETAIN_RATE)}G`, W/2, H*0.49);
  // New best
  if (gs.isNewBest) {
    ctx.fillStyle = '#FFEB3B';
    ctx.font = `bold ${Math.min(22,W*0.04)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.fillText(t.newBest, W/2, H*0.57);
  }
  ctx.fillStyle = '#8080A0';
  ctx.font = `${Math.min(16,W*0.03)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(`${t.bestScore}: ${save.bestScore}`, W/2, H*0.64);
  // Restart prompt
  ctx.fillStyle = '#8080A0';
  ctx.font = '14px "Segoe UI",system-ui,-apple-system,sans-serif';
  const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillText(t.pressR, W/2, H*0.78);
  ctx.globalAlpha = 1;

  buttons = [];
  const btnW = Math.min(180, W*0.35), btnH = Math.max(CONFIG.MIN_TOUCH, 44);
  const bx = W/2 - btnW/2;
  const btnY = Math.min(H*0.82, H - btnH - 20);
  drawButton(ctx, bx, btnY, btnW, btnH, t.restart, 'normal', { color:'#6c3cf7' });
  buttons.push({ x:bx, y:btnY, w:btnW, h:btnH, action: () => beginTransition('TITLE') });
  drawButton(ctx, bx, btnY + btnH + 8, btnW, btnH, t.toTitle, 'normal', { color:'#505070' });
  buttons.push({ x:bx, y:btnY+btnH+8, w:btnW, h:btnH, action: () => beginTransition('TITLE') });

  // R key / tap to restart
  if (input.justPressed('KeyR') || (input.touchTap && !checkButtonHit(input.touchTapPos.x, input.touchTapPos.y))) {
    beginTransition('TITLE');
  }
}

function renderVictory() {
  const t = getText();
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  // Gold vignette
  ctx.save();
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, '#FFD70011');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  // Victory particles
  for (const p of titleAnim.particles) {
    drawParticle(ctx, p.x, p.y, p.size, p.alpha, '#FFD700');
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(40,W*0.07)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(t.victory, W/2, H*0.25);
  ctx.fillStyle = '#E0E0F0';
  ctx.font = `${Math.min(18,W*0.035)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.fillText(t.victoryMsg, W/2, H*0.35);
  ctx.fillText(`${t.score}: ${gs.score}`, W/2, H*0.45);
  if (gs.isNewBest) {
    ctx.fillStyle = '#FFEB3B';
    ctx.font = `bold ${Math.min(20,W*0.04)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
    ctx.fillText(t.newBest, W/2, H*0.55);
  }
  // Return button
  buttons = [];
  const btnW = Math.min(180, W*0.35), btnH = Math.max(CONFIG.MIN_TOUCH, 44);
  const bx = W/2 - btnW/2;
  const btnY = Math.min(H*0.7, H - btnH - 20);
  drawButton(ctx, bx, btnY, btnW, btnH, t.toTitle, 'normal', { color:'#FFD700' });
  buttons.push({ x:bx, y:btnY, w:btnW, h:btnH, action: () => beginTransition('TITLE') });

  if (input.justPressed('Space') || input.justPressed('KeyR') || input.touchTap) {
    beginTransition('TITLE');
  }
}

// Get text for current language
function getText() { return TEXT[lang] || TEXT.ko; }

// ═══════════════════════════════════════════
// REGION 10: INITIALIZATION & MAIN LOOP
// ═══════════════════════════════════════════

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Rebuild title particles if on title
  if (gameState === 'TITLE') {
    for (const p of titleAnim.particles) {
      p.x = Math.random() * W;
      p.y = Math.random() * H;
    }
  }
}

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  try {
    const dt = Math.min(timestamp - lastTime, CONFIG.MAX_DT);
    lastTime = timestamp;
    if (dt <= 0) return;
    input.update();
    update(dt);
    render();
  } catch(e) {
    // Catch errors so loop never stops
    console.error('Game error:', e);
  }
}

// Bootstrap
document.addEventListener('DOMContentLoaded', () => {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  // Load save
  save = loadSave();
  lang = save.lang || 'ko';
  // Resize
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  // Input
  setupInput();
  // Sound (init on first user interaction)
  snd.init();
  // Start
  enterState('TITLE');
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
});
</script>
