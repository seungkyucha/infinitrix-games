// TweenManager — setTimeout 대체, 모든 지연/애니메이션 처리
class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }
  add(obj) {
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; }
    const t = { elapsed:0, duration:obj.duration||300, target:obj.target||{},
      prop:obj.prop||'value', from:obj.from??0, to:obj.to??1,
      ease:obj.ease||'easeOut', onComplete:obj.onComplete||null, onUpdate:obj.onUpdate||null };
    t.target[t.prop] = t.from;
    this._tweens.push(t);
    return t;
  }
  // Timer: simple delay callback
  delay(ms, cb) {
    return this.add({ duration:ms, onComplete:cb });
  }
  update(dt) {
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      let p = Math.min(t.elapsed / t.duration, 1);
      let ep = p;
      if (t.ease === 'easeOut') ep = 1 - (1 - p) * (1 - p);
      else if (t.ease === 'easeIn') ep = p * p;
      else if (t.ease === 'easeInOut') ep = p < 0.5 ? 2*p*p : 1-(-2*p+2)*(-2*p+2)/2;
      t.target[t.prop] = t.from + (t.to - t.from) * ep;
      if (t.onUpdate) t.onUpdate(ep);
      if (p >= 1) {
        t.target[t.prop] = t.to;
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  cancelAll() { this._pendingCancel = true; }
  clearImmediate() { this._tweens.length = 0; this._pendingCancel = false; }
  get count() { return this._tweens.length; }
}

// ObjectPool — GC 스파이크 방지
class ObjectPool {
  constructor(factory, reset, size) {
    this._factory = factory; this._reset = reset;
    this._pool = []; this._active = [];
    for (let i = 0; i < size; i++) this._pool.push(factory());
  }
  get() {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._factory();
    this._reset(obj);
    this._active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  releaseAll() {
    while (this._active.length) this._pool.push(this._active.pop());
  }
  get active() { return this._active; }
}

// SoundManager — Web Audio API, setTimeout 미사용
class SoundManager {
  constructor() { this.ctx = null; this.bgmGain = null; this.sfxGain = null; this.muted = false; }
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.connect(this.ctx.destination);
      this.bgmGain.gain.value = 0.3;
      this.sfxGain.gain.value = 0.5;
    } catch(e) { /* silent */ }
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  // Play a tone with given params
  playTone(freq, dur, type, vol, delay) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + (delay||0);
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime((vol||0.3) * this.sfxGain.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + dur);
  }
  // Specific sound effects
  sfxShift(dim) {
    if (dim === 'light') { this.playTone(600,0.15,'sine',0.3); this.playTone(900,0.1,'sine',0.2,0.05); }
    else { this.playTone(300,0.15,'sine',0.3); this.playTone(150,0.2,'triangle',0.2,0.05); }
  }
  sfxAttack(dim) {
    if (dim === 'light') { this.playTone(800,0.08,'square',0.15); this.playTone(1200,0.05,'square',0.1,0.03); }
    else { this.playTone(400,0.12,'sawtooth',0.12); this.playTone(300,0.08,'sine',0.1,0.04); }
  }
  sfxHit() { this.playTone(200,0.1,'sawtooth',0.25); this.playTone(100,0.15,'square',0.15,0.05); }
  sfxKill() { this.playTone(500,0.08,'sine',0.2); this.playTone(700,0.08,'sine',0.15,0.06); this.playTone(1000,0.12,'sine',0.1,0.12); }
  sfxLevelUp() { for(let i=0;i<5;i++) this.playTone(400+i*150,0.15,'sine',0.15,i*0.08); }
  sfxItem() { this.playTone(1200,0.1,'sine',0.15); this.playTone(1600,0.12,'sine',0.1,0.08); }
  sfxBoss() { for(let i=0;i<8;i++) this.playTone(80+i*10,0.3,'sawtooth',0.1,i*0.15); }
  sfxUI() { this.playTone(800,0.05,'sine',0.1); }
  sfxPuzzle() { for(let i=0;i<4;i++) this.playTone(500+i*200,0.2,'sine',0.12,i*0.12); }
  sfxVictory() { const notes=[523,659,784,1047]; notes.forEach((f,i)=>this.playTone(f,0.3,'sine',0.15,i*0.15)); }
  // Simple BGM loop using oscillators
  startBGM(type) {
    this.stopBGM();
    if (!this.ctx || this.muted) return;
    this._bgmOscs = [];
    const now = this.ctx.currentTime;
    const loopDur = 4;
    const makeLoop = (freqs, waveType, vol) => {
      freqs.forEach((f, i) => {
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = waveType;
        osc.frequency.value = f;
        g.gain.value = vol * this.bgmGain.gain.value;
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(now);
        this._bgmOscs.push({ osc, gain: g });
      });
    };
    if (type === 'title') makeLoop([220,277,330],'sine',0.06);
    else if (type === 'light') makeLoop([330,415,494],'sine',0.04);
    else if (type === 'shadow') makeLoop([165,196,247],'triangle',0.05);
    else if (type === 'boss') makeLoop([110,165,220,330],'sawtooth',0.03);
    else if (type === 'shop') makeLoop([440,554,659],'sine',0.03);
  }
  stopBGM() {
    if (this._bgmOscs) {
      this._bgmOscs.forEach(o => { try { o.osc.stop(); } catch(e){} });
      this._bgmOscs = null;
    }
  }
}

// InputManager — 키보드+터치 통합
class InputManager {
  constructor() {
    this.keys = {};
    this.keysJustPressed = {};
    this._prevKeys = {};
    // Touch
    this.touchJoy = { active:false, id:-1, sx:0, sy:0, dx:0, dy:0 };
    this.touchBtns = { attack:false, shift:false, interact:false, skill1:false, skill2:false, skill3:false };
    this.touchTap = false;
    this.touchTapPos = { x:0, y:0 };
  }
  update() {
    // Compute justPressed
    for (const k in this.keys) {
      this.keysJustPressed[k] = this.keys[k] && !this._prevKeys[k];
    }
    this._prevKeys = { ...this.keys };
    this.touchTap = false;
  }
  justPressed(key) { return !!this.keysJustPressed[key]; }
  isDown(key) { return !!this.keys[key]; }
}

// Seeded RNG for procedural generation
class SeededRNG {
  constructor(seed) { this.s = seed || (Date.now() % 2147483647); if (this.s <= 0) this.s += 2147483646; }
  next() { this.s = this.s * 16807 % 2147483647; return (this.s - 1) / 2147483646; }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = this.nextInt(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
}

// ScrollManager for upgrade/shop screens
class ScrollManager {
  constructor() { this.y = 0; this.vy = 0; this.maxY = 0; this.touching = false; this.lastTouchY = 0; }
  setMax(m) { this.maxY = Math.max(0, m); }
  touchStart(y) { this.touching = true; this.lastTouchY = y; this.vy = 0; }
  touchMove(y) { if (!this.touching) return; this.vy = y - this.lastTouchY; this.y -= this.vy; this.lastTouchY = y; }
  touchEnd() { this.touching = false; }
  update(dt) {
    if (!this.touching) { this.y += this.vy * 0.9; this.vy *= 0.92; if (Math.abs(this.vy) < 0.1) this.vy = 0; }
    // Bounce
    if (this.y < 0) { this.y *= 0.7; this.vy = 0; }
    if (this.y > this.maxY) { this.y = this.maxY - (this.maxY - this.y) * 0.3; this.vy = 0; }
    this.y = Math.max(0, Math.min(this.y, this.maxY));
  }
  scrollWheel(delta) { this.y = Math.max(0, Math.min(this.y + delta, this.maxY)); }
}

// Color palette helpers
const LIGHT_PAL = { bg:'#FFF8E7', wall:'#C4943A', floor:'#F5E6C8', player:'#FFD700', accent:'#FF8C00', enemyGlow:'#FFFFFF' };
const SHADOW_PAL = { bg:'#0A0A2E', wall:'#2D1B69', floor:'#1A1A3E', player:'#9B59B6', accent:'#8B5CF6', enemyGlow:'#DC143C' };

// Get palette for current dimension
function getPal(dim) { return dim === 'light' ? LIGHT_PAL : SHADOW_PAL; }

// Draw a single tile
function drawTile(ctx, x, y, ts, tileType, dim, revealed, altDimVisible) {
  const pal = getPal(dim);
  if (!revealed) { ctx.fillStyle = '#050510'; ctx.fillRect(x, y, ts, ts); return; }
  if (tileType === 1) {
    ctx.fillStyle = pal.wall;
    ctx.fillRect(x, y, ts, ts);
    // Brick pattern
    ctx.strokeStyle = dim === 'light' ? '#A07830' : '#1A0D45';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+1, y+1, ts-2, ts-2);
    ctx.beginPath();
    ctx.moveTo(x, y + ts/2); ctx.lineTo(x + ts, y + ts/2);
    ctx.moveTo(x + ts/2, y); ctx.lineTo(x + ts/2, y + ts/2);
    ctx.stroke();
  } else if (tileType === 0) {
    ctx.fillStyle = pal.floor;
    ctx.fillRect(x, y, ts, ts);
    // Subtle floor pattern
    ctx.fillStyle = dim === 'light' ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.02)';
    if ((Math.floor(x/ts) + Math.floor(y/ts)) % 2 === 0) ctx.fillRect(x, y, ts, ts);
  } else if (tileType === 2) {
    // Stairs / exit
    ctx.fillStyle = pal.floor;
    ctx.fillRect(x, y, ts, ts);
    ctx.fillStyle = '#2ECC71';
    ctx.fillRect(x+ts*0.2, y+ts*0.2, ts*0.6, ts*0.6);
    ctx.fillStyle = '#27AE60';
    ctx.fillRect(x+ts*0.3, y+ts*0.3, ts*0.4, ts*0.15);
    ctx.fillRect(x+ts*0.3, y+ts*0.55, ts*0.4, ts*0.15);
  } else if (tileType === 3) {
    // Trap
    ctx.fillStyle = pal.floor;
    ctx.fillRect(x, y, ts, ts);
    ctx.fillStyle = '#E74C3C44';
    ctx.fillRect(x+2, y+2, ts-4, ts-4);
    ctx.strokeStyle = '#E74C3C';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+4,y+4); ctx.lineTo(x+ts-4,y+ts-4);
    ctx.moveTo(x+ts-4,y+4); ctx.lineTo(x+4,y+ts-4); ctx.stroke();
  }
  // Show alt dimension tiles as transparent overlay when clairvoyance active
  if (altDimVisible && tileType === 1) {
    ctx.fillStyle = dim === 'light' ? 'rgba(139,92,246,0.15)' : 'rgba(255,215,0,0.15)';
    ctx.fillRect(x, y, ts, ts);
  }
}

// Draw player character — hooded guardian [Visual A: Enhanced Player Drawing]
function drawPlayer(ctx, x, y, size, dim, animFrame, facing, invulnFrames) {
  if (invulnFrames > 0 && Math.floor(invulnFrames * 10) % 2) return; // Blink on hit
  const pal = getPal(dim);
  ctx.save();
  ctx.translate(x, y);

  // Walk animation — slight bounce (moved BEFORE drawing) [Visual A fix]
  let bobY = 0;
  if (animFrame > 0) {
    bobY = Math.sin(animFrame * 0.3) * 2;
    ctx.translate(0, bobY);
  }

  // 1. Glow trail effect [Visual A]
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = pal.player;
  ctx.beginPath(); ctx.arc(-2, 3, size * 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(-4, 6, size * 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // 2. Outer glow
  ctx.shadowColor = pal.player;
  ctx.shadowBlur = 14;

  // 3. Legs [Visual A: body segmentation]
  ctx.fillStyle = dim === 'light' ? '#B8860B' : '#5B2370';
  const legSpread = animFrame > 0 ? Math.sin(animFrame * 0.5) * 3 : 0;
  ctx.fillRect(-size * 0.3 - legSpread, size * 0.2, size * 0.28, size * 0.7);
  ctx.fillRect(size * 0.05 + legSpread, size * 0.2, size * 0.28, size * 0.7);

  // 4. Torso [Visual A: body segmentation]
  ctx.fillStyle = dim === 'light' ? '#DAA520' : '#6A3D7E';
  ctx.beginPath();
  ctx.moveTo(-size * 0.5, size * 0.3);
  ctx.lineTo(-size * 0.45, -size * 0.2);
  ctx.lineTo(size * 0.45, -size * 0.2);
  ctx.lineTo(size * 0.5, size * 0.3);
  ctx.closePath();
  ctx.fill();

  // 5. Body circle base
  ctx.fillStyle = pal.player;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.65, 0, Math.PI * 2);
  ctx.fill();

  // 6. Dimension glyph on chest [Visual A]
  ctx.shadowBlur = 0;
  ctx.fillStyle = dim === 'light' ? '#FFF8E7' : '#E0C0FF';
  ctx.globalAlpha = 0.6;
  ctx.font = `bold ${size * 0.5}px "Segoe UI",system-ui,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(dim === 'light' ? '\u2600' : '\u263D', 0, 1);
  ctx.globalAlpha = 1;

  // 7. Hood / cloak with bezier curve [Visual A]
  ctx.shadowColor = pal.player;
  ctx.shadowBlur = 8;
  ctx.fillStyle = dim === 'light' ? '#D4A800' : '#7B2D8E';
  ctx.beginPath();
  ctx.moveTo(-size * 0.55, size * 0.1);
  ctx.bezierCurveTo(-size * 0.65, -size * 0.5, -size * 0.3, -size * 0.95, 0, -size * 0.85);
  ctx.bezierCurveTo(size * 0.3, -size * 0.95, size * 0.65, -size * 0.5, size * 0.55, size * 0.1);
  ctx.closePath();
  ctx.fill();

  // 8. Inner hood shadow
  ctx.fillStyle = dim === 'light' ? '#B8930A' : '#5C1A6E';
  ctx.beginPath();
  ctx.bezierCurveTo(-size * 0.4, -size * 0.3, -size * 0.2, -size * 0.7, 0, -size * 0.65);
  ctx.bezierCurveTo(size * 0.2, -size * 0.7, size * 0.4, -size * 0.3, 0, 0);
  ctx.closePath();
  ctx.fill();

  // 9. Eyes
  ctx.shadowBlur = 0;
  ctx.fillStyle = dim === 'light' ? '#FFF' : '#E0E0F0';
  const eyeOff = facing === 'left' ? -3 : facing === 'right' ? 3 : 0;
  const eyeY = facing === 'up' ? -2 : facing === 'down' ? 2 : 0;
  ctx.fillRect(-4 + eyeOff, -3 + eyeY, 3, 3);
  ctx.fillRect(2 + eyeOff, -3 + eyeY, 3, 3);

  // 10. Eye pupils
  ctx.fillStyle = dim === 'light' ? '#B8860B' : '#4A0080';
  ctx.fillRect(-3 + eyeOff, -2 + eyeY, 1.5, 1.5);
  ctx.fillRect(3 + eyeOff, -2 + eyeY, 1.5, 1.5);

  // 11. Shoulder plates
  ctx.fillStyle = dim === 'light' ? '#C9A200' : '#6B2FA0';
  ctx.beginPath();
  ctx.ellipse(-size * 0.55, -size * 0.05, size * 0.18, size * 0.12, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(size * 0.55, -size * 0.05, size * 0.18, size * 0.12, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // 12. Belt
  ctx.fillStyle = dim === 'light' ? '#8B6914' : '#3A1050';
  ctx.fillRect(-size * 0.4, size * 0.15, size * 0.8, size * 0.1);

  // 13. Belt buckle
  ctx.fillStyle = dim === 'light' ? '#FFD700' : '#9B59B6';
  ctx.fillRect(-size * 0.08, size * 0.15, size * 0.16, size * 0.1);

  // 14. Cloak hem detail
  ctx.strokeStyle = dim === 'light' ? '#B8930A55' : '#7B2D8E55';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-size * 0.5, size * 0.3);
  ctx.lineTo(0, size * 0.4);
  ctx.lineTo(size * 0.5, size * 0.3);
  ctx.stroke();

  // 15. Aura ring
  ctx.strokeStyle = pal.player + '44';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, size * 1.1 + Math.sin(animFrame * 0.1) * 2, 0, Math.PI * 2);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

// Draw enemy by type
function drawEnemy(ctx, x, y, size, type, dim, hp, maxHp, animFrame) {
  const def = ENEMY_DEFS[type];
  if (!def) return;
  // Check visibility based on dimension
  const vis = getEnemyVisibility(type, dim);
  if (vis <= 0) return;
  ctx.save();
  ctx.globalAlpha = vis;
  ctx.translate(x, y);
  // Glow
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 8;
  ctx.fillStyle = def.color;
  if (type === 'shadow_slime') {
    // Blob shape
    const wobble = Math.sin(animFrame * 0.1) * 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, size + wobble, size - wobble, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-4, -3, 3, 4);
    ctx.fillRect(2, -3, 3, 4);
  } else if (type === 'light_wisp') {
    // Floating orb with rays
    ctx.beginPath();
    ctx.arc(0, Math.sin(animFrame*0.08)*3, size*0.7, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#FFD70088';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI/3 + animFrame * 0.05;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*size*0.8, Math.sin(a)*size*0.8);
      ctx.lineTo(Math.cos(a)*size*1.4, Math.sin(a)*size*1.4);
      ctx.stroke();
    }
  } else if (type === 'shadow_knight') {
    // Enhanced Shadow Knight [Visual B]
    // Body - menacing silhouette
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.9);
    ctx.lineTo(size * 0.6, -size * 0.4);
    ctx.lineTo(size * 0.5, size * 0.8);
    ctx.lineTo(-size * 0.5, size * 0.8);
    ctx.lineTo(-size * 0.6, -size * 0.4);
    ctx.closePath();
    ctx.fill();
    // Shoulder pauldrons
    ctx.fillStyle = '#AA1133';
    ctx.beginPath();
    ctx.ellipse(-size * 0.65, -size * 0.3, size * 0.25, size * 0.15, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(size * 0.65, -size * 0.3, size * 0.25, size * 0.15, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Helmet
    ctx.fillStyle = '#880020';
    ctx.beginPath();
    ctx.arc(0, -size * 0.45, size * 0.35, 0, Math.PI * 2);
    ctx.fill();
    // Triangular visor
    ctx.fillStyle = '#FF4444';
    ctx.beginPath();
    ctx.moveTo(-size * 0.2, -size * 0.55);
    ctx.lineTo(size * 0.2, -size * 0.55);
    ctx.lineTo(0, -size * 0.35);
    ctx.closePath();
    ctx.fill();
    // Sword / blade shape
    ctx.fillStyle = '#CCCCCC';
    ctx.beginPath();
    ctx.moveTo(size * 0.7, -size * 0.2);
    ctx.lineTo(size * 1.1, -size * 0.8);
    ctx.lineTo(size * 0.9, -size * 0.85);
    ctx.lineTo(size * 0.55, -size * 0.25);
    ctx.closePath();
    ctx.fill();
    // Sword hilt
    ctx.fillStyle = '#666';
    ctx.fillRect(size * 0.5, -size * 0.3, size * 0.3, size * 0.12);
    // Shield on other arm
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.moveTo(-size * 0.7, -size * 0.4);
    ctx.lineTo(-size * 0.9, 0);
    ctx.lineTo(-size * 0.7, size * 0.3);
    ctx.lineTo(-size * 0.5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#DC143C44';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else if (type === 'dim_crystal') {
    // Rotating crystal
    const a = animFrame * 0.04;
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(0, -size); ctx.lineTo(size*0.6, 0);
    ctx.lineTo(0, size); ctx.lineTo(-size*0.6, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#FFF4'; ctx.lineWidth = 1; ctx.stroke();
  } else if (type === 'phantom_mage') {
    // Floating mage
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size*0.7, size*0.3);
    ctx.lineTo(size*0.3, size);
    ctx.lineTo(-size*0.3, size);
    ctx.lineTo(-size*0.7, size*0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#E0E0F0';
    ctx.beginPath(); ctx.arc(0, -size*0.3, 3, 0, Math.PI*2); ctx.fill();
  }
  // HP bar
  if (hp < maxHp) {
    ctx.shadowBlur = 0;
    const bw = size * 2, bx = -size, by = -size - 8;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = '#E74C3C'; ctx.fillRect(bx, by, bw * (hp/maxHp), 4);
  }
  ctx.restore();
}

// Get enemy visibility by dimension
function getEnemyVisibility(type, dim) {
  const d = ENEMY_DEFS[type]?.dim;
  if (d === 'shadow' && dim === 'light') return 0.15;
  if (d === 'shadow' && dim === 'shadow') return 1;
  if (d === 'light' && dim === 'light') return 1;
  if (d === 'light' && dim === 'shadow') return 0.15;
  if (d === 'shadow_strong') return dim === 'shadow' ? 1 : 0.5;
  if (d === 'both') return 1;
  if (d === 'adaptive') return 1;
  return 1;
}

// Get enemy damage multiplier by dimension
function getEnemyDamageMul(type, dim) {
  const d = ENEMY_DEFS[type]?.dim;
  if (d === 'shadow' && dim === 'light') return 0;
  if (d === 'light' && dim === 'shadow') return 0;
  if (d === 'shadow_strong') return dim === 'shadow' ? 1.5 : 0.5;
  return 1;
}

// Draw boss
function drawBoss(ctx, x, y, size, bossIdx, phase, hp, maxHp, animFrame, dim) {
  const def = BOSS_DEFS[bossIdx];
  if (!def) return;
  ctx.save();
  ctx.translate(x, y);
  // Aura
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 20 + Math.sin(animFrame * 0.05) * 10;
  // Body
  ctx.fillStyle = def.color;
  if (bossIdx === 0) {
    // Shadow Guardian — massive armored figure
    ctx.fillRect(-size*0.5, -size*0.7, size, size*1.4);
    ctx.fillStyle = '#DC143C';
    ctx.fillRect(-size*0.3, -size*0.5, size*0.6, 6); // Eyes
    // Shield
    ctx.fillStyle = '#4A008088';
    ctx.beginPath();
    ctx.arc(0, 0, size*0.8, 0, Math.PI*2); ctx.fill();
    // Phase indicator
    if (phase >= 1) {
      ctx.strokeStyle = '#DC143C88';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const a = animFrame * 0.08 + i * Math.PI/2;
        ctx.beginPath();
        ctx.arc(0, 0, size + 10, a, a + 0.5); ctx.stroke();
      }
    }
  } else if (bossIdx === 1) {
    // Dimension Weaver — geometric entity
    const a = animFrame * 0.03;
    for (let ring = 0; ring < 3; ring++) {
      ctx.strokeStyle = ring === phase ? '#8B5CF6' : def.color + '88';
      ctx.lineWidth = 3 - ring;
      ctx.beginPath();
      const r = size * (0.4 + ring * 0.25);
      for (let i = 0; i < 6; i++) {
        const pa = a * (ring % 2 ? 1 : -1) + i * Math.PI/3;
        const px = Math.cos(pa) * r, py = Math.sin(pa) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
    }
    ctx.fillStyle = '#8B5CF6';
    ctx.beginPath(); ctx.arc(0, 0, size*0.3, 0, Math.PI*2); ctx.fill();
  } else if (bossIdx === 2) {
    // Shadow Lord — massive dark entity
    ctx.fillStyle = '#0A0030';
    ctx.beginPath();
    ctx.moveTo(0, -size);
    for (let i = 0; i < 8; i++) {
      const a = (i/8) * Math.PI*2 - Math.PI/2;
      const r = size * (0.7 + Math.sin(animFrame*0.05 + i) * 0.15);
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    // Crown
    ctx.fillStyle = '#DC143C';
    ctx.beginPath();
    ctx.moveTo(-size*0.4, -size*0.6);
    ctx.lineTo(-size*0.2, -size*0.9);
    ctx.lineTo(0, -size*0.65);
    ctx.lineTo(size*0.2, -size*0.9);
    ctx.lineTo(size*0.4, -size*0.6);
    ctx.closePath(); ctx.fill();
    // Eyes
    ctx.fillStyle = '#DC143C';
    ctx.beginPath(); ctx.arc(-size*0.15, -size*0.2, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(size*0.15, -size*0.2, 4, 0, Math.PI*2); ctx.fill();
  }
  // Boss HP bar
  ctx.shadowBlur = 0;
  const bw = size*2.5, bx = -bw/2, by = -size - 16;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(bx-1, by-1, bw+2, 10);
  ctx.fillStyle = '#E74C3C'; ctx.fillRect(bx, by, bw * Math.max(0, hp/maxHp), 8);
  ctx.fillStyle = '#FFF8'; ctx.font = '10px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(hp)}/${maxHp}`, 0, by - 3);
  ctx.restore();
}

// Draw item on ground [Visual C: Enhanced Item Drawing]
function drawItem(ctx, x, y, size, itemType, rarity, animFrame) {
  ctx.save();
  // Hover bounce effect [Visual C]
  const bounceY = Math.sin((animFrame || frameCount) * 0.06) * 3;
  ctx.translate(x, y + bounceY);

  const colors = { common:'#95A5A6', rare:'#3498DB', epic:'#9B59B6', legendary:'#F1C40F' };
  const glow = colors[rarity] || colors.common;
  ctx.shadowColor = glow;
  ctx.shadowBlur = 10 + Math.sin((animFrame || frameCount) * 0.08) * 4;

  if (itemType === 'potion') {
    // Gradient fill [Visual C]
    const grad = ctx.createRadialGradient(0, 2, 0, 0, 2, size * 0.6);
    grad.addColorStop(0, '#FF6B6B');
    grad.addColorStop(1, '#C0392B');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 2, size*0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E74C3C';
    ctx.fillRect(-2, -size*0.5, 4, size*0.5);
    // Cork
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(-3, -size*0.55, 6, 3);
  } else if (itemType === 'gold') {
    // Gradient gold [Visual C]
    const grad = ctx.createRadialGradient(-2, -2, 0, 0, 0, size * 0.6);
    grad.addColorStop(0, '#FFE066');
    grad.addColorStop(1, '#C49000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, size*0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8B6914';
    ctx.font = `${size*0.6}px "Segoe UI",system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('G', 0, 0);
  } else if (itemType === 'energy') {
    // Gradient energy crystal [Visual C]
    const grad = ctx.createLinearGradient(0, -size*0.6, 0, size*0.6);
    grad.addColorStop(0, '#5DADE2');
    grad.addColorStop(1, '#1A5276');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -size*0.6); ctx.lineTo(size*0.4, 0);
    ctx.lineTo(0, size*0.6); ctx.lineTo(-size*0.4, 0);
    ctx.closePath(); ctx.fill();
  } else if (itemType === 'lore') {
    // Gradient scroll [Visual C]
    const grad = ctx.createLinearGradient(-size*0.4, 0, size*0.4, 0);
    grad.addColorStop(0, '#D4A843');
    grad.addColorStop(0.5, '#F5DEB3');
    grad.addColorStop(1, '#D4A843');
    ctx.fillStyle = grad;
    ctx.fillRect(-size*0.4, -size*0.5, size*0.8, size);
    ctx.fillStyle = '#8B6914';
    ctx.font = `${size*0.4}px "Segoe UI",system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u53E4', 0, 0);
  } else {
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size*0.5);
    grad.addColorStop(0, glow);
    grad.addColorStop(1, '#333');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, size*0.5, 0, Math.PI*2); ctx.fill();
  }

  // Sparkle/shimmer animation [Visual C]
  ctx.shadowBlur = 0;
  const sparkleTime = (animFrame || frameCount) * 0.12;
  for (let si = 0; si < 3; si++) {
    const sa = sparkleTime + si * 2.1;
    const sx = Math.cos(sa) * size * 0.7;
    const sy = Math.sin(sa) * size * 0.5;
    const salpha = Math.max(0, Math.sin(sa * 1.5)) * 0.7;
    if (salpha > 0.05) {
      ctx.globalAlpha = salpha;
      ctx.fillStyle = '#FFF';
      ctx.fillRect(sx - 1, sy - 1, 2, 2);
    }
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// Draw particle [Visual D: Shape differentiation]
function drawParticle(ctx, x, y, size, alpha, color, shape) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  if (shape === 'star') {
    // Star shape for kill particles [Visual D]
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = (i * 2 * Math.PI / 5) - Math.PI / 2;
      const a2 = a1 + Math.PI / 5;
      ctx.lineTo(x + Math.cos(a1) * size, y + Math.sin(a1) * size);
      ctx.lineTo(x + Math.cos(a2) * size * 0.45, y + Math.sin(a2) * size * 0.45);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'spark') {
    // Spark/line shape for hit particles [Visual D]
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - size, y);
    ctx.lineTo(x + size, y);
    ctx.moveTo(x, y - size);
    ctx.lineTo(x, y + size);
    ctx.stroke();
  } else if (shape === 'ring') {
    // Ring shape for dimension shift [Visual D]
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // Default circle
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// Draw a button (pure)
function drawButton(ctx, x, y, w, h, text, state, style) {
  ctx.save();
  const isHover = state === 'hover';
  const isActive = state === 'active';
  const baseColor = style?.color || '#6c3cf7';
  ctx.fillStyle = isActive ? '#4a2a9f' : isHover ? '#8B5CF6' : baseColor;
  ctx.strokeStyle = isHover ? '#B794F6' : baseColor;
  ctx.lineWidth = 2;
  // Rounded rect
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Text
  ctx.fillStyle = '#E0E0F0';
  ctx.font = `bold ${Math.min(h*0.45, 16)}px "Segoe UI",system-ui,-apple-system,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x+w/2, y+h/2);
  ctx.restore();
}

// Draw HUD [Visual E, F: Enhanced HP/Energy bars]
function drawHUD(ctx, W, H, ps, gs, dim, t) {
  ctx.save();
  const pal = getPal(dim);
  const pad = 10;
  const hpW = Math.min(180, W*0.3), hpH = 16, hpX = pad, hpY = pad;
  const r = 4; // corner radius

  // HP bar [Visual E: Enhanced HP Bar]
  // Frame with rounded rect
  ctx.fillStyle = '#0a0a1a';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(hpX+r, hpY); ctx.lineTo(hpX+hpW-r, hpY); ctx.quadraticCurveTo(hpX+hpW, hpY, hpX+hpW, hpY+r);
  ctx.lineTo(hpX+hpW, hpY+hpH-r); ctx.quadraticCurveTo(hpX+hpW, hpY+hpH, hpX+hpW-r, hpY+hpH);
  ctx.lineTo(hpX+r, hpY+hpH); ctx.quadraticCurveTo(hpX, hpY+hpH, hpX, hpY+hpH-r);
  ctx.lineTo(hpX, hpY+r); ctx.quadraticCurveTo(hpX, hpY, hpX+r, hpY);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // HP gradient fill
  const hpRatio = Math.max(0, ps.hp / ps.maxHp);
  const fillW = hpW * hpRatio;
  if (fillW > 0) {
    const hpGrad = ctx.createLinearGradient(hpX, hpY, hpX, hpY + hpH);
    hpGrad.addColorStop(0, '#FF6B6B');
    hpGrad.addColorStop(0.4, '#E74C3C');
    hpGrad.addColorStop(1, '#8B0000');
    ctx.fillStyle = hpGrad;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(hpX+r, hpY+1); ctx.lineTo(hpX+fillW-1, hpY+1);
    ctx.lineTo(hpX+fillW-1, hpY+hpH-1);
    ctx.lineTo(hpX+r, hpY+hpH-1); ctx.quadraticCurveTo(hpX+1, hpY+hpH-1, hpX+1, hpY+hpH-r);
    ctx.lineTo(hpX+1, hpY+r); ctx.quadraticCurveTo(hpX+1, hpY+1, hpX+r, hpY+1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Top highlight line [Visual E]
    ctx.strokeStyle = '#FF9999';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(hpX + 3, hpY + 3);
    ctx.lineTo(hpX + fillW - 3, hpY + 3);
    ctx.stroke();
  }
  // Low HP blink effect [Visual E]
  if (hpRatio < 0.25 && hpRatio > 0) {
    const blinkAlpha = 0.3 + Math.sin(frameCount * 0.15) * 0.3;
    ctx.fillStyle = `rgba(255,0,0,${blinkAlpha})`;
    ctx.beginPath();
    ctx.moveTo(hpX+r, hpY); ctx.lineTo(hpX+hpW-r, hpY); ctx.quadraticCurveTo(hpX+hpW, hpY, hpX+hpW, hpY+r);
    ctx.lineTo(hpX+hpW, hpY+hpH-r); ctx.quadraticCurveTo(hpX+hpW, hpY+hpH, hpX+hpW-r, hpY+hpH);
    ctx.lineTo(hpX+r, hpY+hpH); ctx.quadraticCurveTo(hpX, hpY+hpH, hpX, hpY+hpH-r);
    ctx.lineTo(hpX, hpY+r); ctx.quadraticCurveTo(hpX, hpY, hpX+r, hpY);
    ctx.closePath();
    ctx.fill();
  }
  // HP text
  ctx.fillStyle = '#FFF';
  ctx.font = '11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${t.hp}: ${Math.ceil(ps.hp)}/${ps.maxHp}`, hpX+4, hpY+12);

  // Energy bar [Visual F: Enhanced Energy Bar]
  const enY = hpY + hpH + 5;
  // Frame
  ctx.fillStyle = '#0a0a1a';
  ctx.strokeStyle = '#224';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(hpX+r, enY); ctx.lineTo(hpX+hpW-r, enY); ctx.quadraticCurveTo(hpX+hpW, enY, hpX+hpW, enY+r);
  ctx.lineTo(hpX+hpW, enY+hpH-r); ctx.quadraticCurveTo(hpX+hpW, enY+hpH, hpX+hpW-r, enY+hpH);
  ctx.lineTo(hpX+r, enY+hpH); ctx.quadraticCurveTo(hpX, enY+hpH, hpX, enY+hpH-r);
  ctx.lineTo(hpX, enY+r); ctx.quadraticCurveTo(hpX, enY, hpX+r, enY);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Energy gradient fill
  const enRatio = Math.max(0, ps.energy / ps.maxEnergy);
  const enFillW = hpW * enRatio;
  if (enFillW > 0) {
    const enGrad = ctx.createLinearGradient(hpX, enY, hpX, enY + hpH);
    enGrad.addColorStop(0, '#5DADE2');
    enGrad.addColorStop(0.4, '#3498DB');
    enGrad.addColorStop(1, '#1A5276');
    ctx.fillStyle = enGrad;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(hpX+r, enY+1); ctx.lineTo(hpX+enFillW-1, enY+1);
    ctx.lineTo(hpX+enFillW-1, enY+hpH-1);
    ctx.lineTo(hpX+r, enY+hpH-1); ctx.quadraticCurveTo(hpX+1, enY+hpH-1, hpX+1, enY+hpH-r);
    ctx.lineTo(hpX+1, enY+r); ctx.quadraticCurveTo(hpX+1, enY+1, hpX+r, enY+1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Segmented fill effect [Visual F]
    ctx.strokeStyle = '#0a0a1a44';
    ctx.lineWidth = 1;
    const segW = hpW / 10;
    for (let si = 1; si < 10; si++) {
      const sx = hpX + si * segW;
      if (sx < hpX + enFillW) {
        ctx.beginPath();
        ctx.moveTo(sx, enY + 2);
        ctx.lineTo(sx, enY + hpH - 2);
        ctx.stroke();
      }
    }
  }
  // Pulsing glow when full [Visual F]
  if (enRatio >= 1) {
    const glowAlpha = 0.15 + Math.sin(frameCount * 0.1) * 0.1;
    ctx.shadowColor = '#5DADE2';
    ctx.shadowBlur = 8;
    ctx.fillStyle = `rgba(93,173,226,${glowAlpha})`;
    ctx.beginPath();
    ctx.moveTo(hpX+r, enY); ctx.lineTo(hpX+hpW-r, enY); ctx.quadraticCurveTo(hpX+hpW, enY, hpX+hpW, enY+r);
    ctx.lineTo(hpX+hpW, enY+hpH-r); ctx.quadraticCurveTo(hpX+hpW, enY+hpH, hpX+hpW-r, enY+hpH);
    ctx.lineTo(hpX+r, enY+hpH); ctx.quadraticCurveTo(hpX, enY+hpH, hpX, enY+hpH-r);
    ctx.lineTo(hpX, enY+r); ctx.quadraticCurveTo(hpX, enY, hpX+r, enY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // Energy text
  ctx.fillStyle = '#FFF';
  ctx.font = '11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${t.energy}: ${Math.ceil(ps.energy)}`, hpX+4, enY+12);

  // XP bar
  const xpY = enY + hpH + 4;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(hpX-1, xpY-1, hpW+2, 8);
  ctx.fillStyle = '#2ECC71';
  ctx.fillRect(hpX, xpY, hpW * Math.min(1, ps.xp / ps.xpToLevel), 6);
  // Floor + Level
  ctx.fillStyle = '#E0E0F0';
  ctx.font = 'bold 13px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(`${t.floor} ${gs.floor}  ${t.lv} ${ps.level}`, hpX, xpY + 18);
  // Score + Gold (top right)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#F1C40F';
  ctx.font = 'bold 14px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(`${gs.score}`, W - pad, pad + 14);
  ctx.fillStyle = '#F1C40F88';
  ctx.font = '11px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(`Gold: ${gs.gold}`, W - pad, pad + 30);
  // Dimension indicator
  ctx.textAlign = 'center';
  ctx.fillStyle = pal.accent;
  ctx.font = 'bold 12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(dim === 'light' ? t.dimension.light : t.dimension.shadow, W/2, pad + 14);

  // Adaptive difficulty hint [Feedback #4]
  if (gs.deathsOnFloor >= 3) {
    ctx.fillStyle = '#FFD70088';
    ctx.font = 'bold 12px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t.hiddenHint || '', W/2, pad + 30);
  }
  // Energy buff indicator [Feedback #4]
  if (gs.energyBuff) {
    ctx.fillStyle = '#2ECC7188';
    ctx.font = '10px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('EN+30%', hpX, enY + hpH + 38);
  }

  // Skills
  if (ps.skills && ps.skills.length > 0) {
    const skY = H - 70;
    ctx.textAlign = 'left';
    ps.skills.forEach((sk, i) => {
      const skDef = SKILL_POOL.find(s => s.id === sk);
      if (!skDef) return;
      ctx.fillStyle = skDef.color + '44';
      ctx.fillRect(pad + i * 50, skY, 44, 44);
      ctx.strokeStyle = skDef.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(pad + i * 50, skY, 44, 44);
      // Cooldown overlay [Feedback #7]
      if (ps.skillCooldowns && ps.skillCooldowns[i] > 0) {
        ctx.fillStyle = '#00000088';
        const cdRatio = Math.min(1, ps.skillCooldowns[i] / 3);
        ctx.fillRect(pad + i * 50, skY, 44, 44 * cdRatio);
      }
      ctx.fillStyle = '#E0E0F0';
      ctx.font = '10px "Segoe UI",system-ui,sans-serif';
      ctx.fillText(`${i+1}`, pad + i * 50 + 4, skY + 12);
      ctx.fillText(skDef.nameKo.slice(0, 3), pad + i * 50 + 4, skY + 36);
    });
  }
  ctx.restore();
}

// Draw minimap
function drawMinimap(ctx, mx, my, mw, mh, mapLight, mapShadow, dim, playerTile, enemies, floor, explored) {
  ctx.save();
  ctx.fillStyle = '#0a0a0f99';
  ctx.fillRect(mx-1, my-1, mw+2, mh+2);
  const ts = Math.min(mw / CONFIG.MAP_W, mh / CONFIG.MAP_H);
  const map = dim === 'light' ? mapLight : mapShadow;
  if (!map) { ctx.restore(); return; }
  for (let r = 0; r < CONFIG.MAP_H; r++) {
    for (let c = 0; c < CONFIG.MAP_W; c++) {
      if (!explored[r * CONFIG.MAP_W + c]) continue;
      const tile = map[r * CONFIG.MAP_W + c];
      const px = mx + c * ts, py = my + r * ts;
      if (tile === 1) ctx.fillStyle = dim === 'light' ? '#C4943A44' : '#2D1B6944';
      else if (tile === 2) ctx.fillStyle = '#2ECC71';
      else ctx.fillStyle = dim === 'light' ? '#F5E6C822' : '#1A1A3E44';
      ctx.fillRect(px, py, ts, ts);
    }
  }
  // Player dot
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(mx + playerTile.c * ts - 1, my + playerTile.r * ts - 1, 3, 3);
  // Enemy dots
  ctx.fillStyle = '#E74C3C';
  enemies.forEach(e => {
    if (e.alive && explored[e.tileR * CONFIG.MAP_W + e.tileC])
      ctx.fillRect(mx + e.tileC * ts, my + e.tileR * ts, 2, 2);
  });
  ctx.restore();
}

// REGION 4: PROCEDURAL GENERATION

// Generate a floor using BSP room placement
function generateFloor(floor, rng, difficulty) {
  const W = CONFIG.MAP_W, H = CONFIG.MAP_H;
  const lightMap = new Uint8Array(W * H).fill(1); // All walls initially
  const shadowMap = new Uint8Array(W * H).fill(1);
  const rooms = [];
  const numRooms = rng.nextInt(CONFIG.ROOMS_MIN, CONFIG.ROOMS_MAX);

  // Place rooms
  for (let attempt = 0; attempt < 200 && rooms.length < numRooms; attempt++) {
    const rw = rng.nextInt(CONFIG.ROOM_MIN, CONFIG.ROOM_MAX);
    const rh = rng.nextInt(CONFIG.ROOM_MIN, CONFIG.ROOM_MAX);
    const rx = rng.nextInt(2, W - rw - 2);
    const ry = rng.nextInt(2, H - rh - 2);
    // Check overlap
    let ok = true;
    for (const r of rooms) {
      if (rx < r.x + r.w + 2 && rx + rw + 2 > r.x && ry < r.y + r.h + 2 && ry + rh + 2 > r.y) { ok = false; break; }
    }
    if (!ok) continue;
    rooms.push({ x:rx, y:ry, w:rw, h:rh, cx: Math.floor(rx+rw/2), cy: Math.floor(ry+rh/2) });
    // Carve room in light map
    for (let r = ry; r < ry+rh; r++)
      for (let c = rx; c < rx+rw; c++)
        lightMap[r * W + c] = 0;
  }
  if (rooms.length < 3) {
    // Fallback: ensure at least 3 rooms
    for (let i = 0; i < 3; i++) {
      const rx = 4 + i * 14, ry = 4 + i * 10, rw = 8, rh = 6;
      rooms.push({ x:rx, y:ry, w:rw, h:rh, cx:rx+4, cy:ry+3 });
      for (let r = ry; r < ry+rh; r++)
        for (let c = rx; c < rx+rw; c++) lightMap[r * W + c] = 0;
    }
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i-1], b = rooms[i];
    let cx = a.cx, cy = a.cy;
    while (cx !== b.cx) {
      lightMap[cy * W + cx] = 0;
      if (cy > 0) lightMap[(cy-1) * W + cx] = 0; // 2-wide corridor
      cx += cx < b.cx ? 1 : -1;
    }
    while (cy !== b.cy) {
      lightMap[cy * W + cx] = 0;
      if (cx > 0) lightMap[cy * W + cx - 1] = 0;
      cy += cy < b.cy ? 1 : -1;
    }
  }

  // Generate shadow map: copy light, then flip ~40% of walls to passages
  shadowMap.set(lightMap);
  for (let i = 0; i < W * H; i++) {
    if (lightMap[i] === 1 && rng.next() < 0.4) shadowMap[i] = 0;
    // Add shadow-only walls [Feedback #6: 8% -> 20%]
    if (lightMap[i] === 0 && rng.next() < 0.20) shadowMap[i] = 1;
  }

  // Ensure start and exit are accessible in both dimensions
  const startRoom = rooms[0];
  const endRoom = rooms[rooms.length - 1];
  // Mark exit
  lightMap[endRoom.cy * W + endRoom.cx] = 2;
  shadowMap[endRoom.cy * W + endRoom.cx] = 2;
  // Clear around start/end in shadow map
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++) {
      const si = (startRoom.cy+dy)*W + startRoom.cx+dx;
      const ei = (endRoom.cy+dy)*W + endRoom.cx+dx;
      if (si >= 0 && si < W*H) shadowMap[si] = shadowMap[si] === 2 ? 2 : 0;
      if (ei >= 0 && ei < W*H) shadowMap[ei] = shadowMap[ei] === 2 ? 2 : 0;
    }

  // Verify paths in both dimensions [Feedback #2]
  const sR = startRoom.cy, sC = startRoom.cx, eR = endRoom.cy, eC = endRoom.cx;
  if (!verifyPath(lightMap, sR, sC, eR, eC)) {
    // Carve emergency corridor in light map
    let cr = sR, cc = sC;
    while (cr !== eR) { lightMap[cr * W + cc] = lightMap[cr * W + cc] === 2 ? 2 : 0; cr += cr < eR ? 1 : -1; }
    while (cc !== eC) { lightMap[cr * W + cc] = lightMap[cr * W + cc] === 2 ? 2 : 0; cc += cc < eC ? 1 : -1; }
  }
  if (!verifyPath(shadowMap, sR, sC, eR, eC)) {
    let cr = sR, cc = sC;
    while (cr !== eR) { shadowMap[cr * W + cc] = shadowMap[cr * W + cc] === 2 ? 2 : 0; cr += cr < eR ? 1 : -1; }
    while (cc !== eC) { shadowMap[cr * W + cc] = shadowMap[cr * W + cc] === 2 ? 2 : 0; cc += cc < eC ? 1 : -1; }
  }

  // Place enemies (skip for hidden floor 16) [Feedback #1]
  const enemies = [];
  const isHiddenFloor = floor === 16;
  if (!isHiddenFloor) {
    const enemyTypes = Object.keys(ENEMY_DEFS);
    const maxEnemyTypes = Math.min(floor, 5); // Unlock more types as floors increase
    const enemiesPerRoom = Math.min(2 + Math.floor(floor * 0.6), 10);
    for (let ri = 1; ri < rooms.length; ri++) { // Skip start room
      const room = rooms[ri];
      const ne = rng.nextInt(Math.max(1, enemiesPerRoom - 2), enemiesPerRoom);
      for (let e = 0; e < ne; e++) {
        const ec = rng.nextInt(room.x + 1, room.x + room.w - 2);
        const er = rng.nextInt(room.y + 1, room.y + room.h - 2);
        const typeIdx = rng.nextInt(0, maxEnemyTypes - 1);
        const type = enemyTypes[typeIdx];
        const def = ENEMY_DEFS[type];
        const floorMul = 1 + (floor - 1) * 0.15;
        enemies.push({
          type, x: ec * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
          y: er * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
          tileC: ec, tileR: er,
          hp: Math.round(def.hp * floorMul * CONFIG.DIFF[difficulty].atkMul),
          maxHp: Math.round(def.hp * floorMul * CONFIG.DIFF[difficulty].atkMul),
          atk: Math.round(def.atk * floorMul * CONFIG.DIFF[difficulty].atkMul),
          speed: def.speed, alive: true, animFrame: rng.nextInt(0, 100),
          aiTimer: 0, dx: 0, dy: 0, hitFlash: 0,
          adaptDim: rng.next() > 0.5 ? 'light' : 'shadow'
        });
      }
    }
  }

  // Place items
  const items = [];
  const dropChance = 0.4 - floor * 0.015;
  for (let ri = 1; ri < rooms.length; ri++) {
    const room = rooms[ri];
    if (rng.next() < dropChance + 0.1) {
      const ix = rng.nextInt(room.x+1, room.x+room.w-2);
      const iy = rng.nextInt(room.y+1, room.y+room.h-2);
      const roll = rng.next();
      let type = 'gold', rarity = 'common';
      if (roll < 0.3) { type = 'potion'; rarity = 'common'; }
      else if (roll < 0.5) { type = 'energy'; rarity = 'rare'; }
      else if (roll < 0.55) { type = 'lore'; rarity = 'epic'; }
      items.push({
        type, rarity, x: ix * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
        y: iy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2, collected: false
      });
    }
  }

  // Place traps for floors 6+
  if (floor >= 6) {
    for (let ri = 2; ri < rooms.length - 1; ri++) {
      const room = rooms[ri];
      if (rng.next() < 0.3 + floor * 0.02) {
        const tx = rng.nextInt(room.x+1, room.x+room.w-2);
        const ty = rng.nextInt(room.y+1, room.y+room.h-2);
        lightMap[ty * W + tx] = 3;
        if (rng.next() < 0.5) shadowMap[ty * W + tx] = 3;
      }
    }
  }

  // Explored array
  const explored = new Uint8Array(W * H);

  return { lightMap, shadowMap, rooms, enemies, items, explored,
    startX: startRoom.cx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
    startY: startRoom.cy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
    exitX: endRoom.cx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2,
    exitY: endRoom.cy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE/2
  };
}

// BFS to verify path exists
function verifyPath(map, startR, startC, endR, endC) {
  const W = CONFIG.MAP_W, H = CONFIG.MAP_H;
  const visited = new Uint8Array(W * H);
  const queue = [[startR, startC]];
  visited[startR * W + startC] = 1;
  while (queue.length > 0) {
    const [r, c] = queue.shift();
    if (r === endR && c === endC) return true;
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr < 0 || nr >= H || nc < 0 || nc >= W) continue;
      if (visited[nr * W + nc]) continue;
      if (map[nr * W + nc] === 1) continue;
      visited[nr * W + nc] = 1;
      queue.push([nr, nc]);
    }
  }
  return false;
}

// Dimension system — handles shift logic
function tryDimensionShift(ps, gs, now, tw, snd) {
  if (ps.energy < CONFIG.DIM_SHIFT_COST) return false;
  if (now - ps.lastShiftTime < CONFIG.DIM_SHIFT_COOLDOWN) return false;
  ps.energy -= CONFIG.DIM_SHIFT_COST;
  ps.lastShiftTime = now;
  ps.shiftCount++;
  const newDim = gs.dimension === 'light' ? 'shadow' : 'light';
  gs.dimension = newDim;
  snd.sfxShift(newDim);
  return true;
}

// Combat system — process attack
function processAttack(ps, gs, enemies, particles, dim, snd, tw) {
  if (ps.attackCooldown > 0) return;
  ps.attackCooldown = 0.35;
  ps.attackAnim = 0.2;
  snd.sfxAttack(dim);
  const range = 40;
  const atkPower = ps.atk + (gs.upgrades.atk || 0) * 2;
  let hitAny = false;
  // Check for enemies in range and correct dimension
  for (const e of enemies) {
    if (!e.alive) continue;
    const dx = e.x - ps.x, dy = e.y - ps.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > range) continue;
    const dmgMul = getEnemyDamageMul(e.type, dim);
    if (dmgMul <= 0) continue;
    const dmg = Math.round(atkPower * dmgMul);
    e.hp -= dmg;
    e.hitFlash = 0.15;
    hitAny = true;
    // Spawn damage number particle
    spawnDamageNumber(particles, e.x, e.y - 15, dmg, dmgMul > 1);
    if (e.hp <= 0) {
      e.alive = false;
      gs.score += 10 * gs.floor;
      gs.kills++;
      ps.xp += 5 + gs.floor * 2;
      const goldDrop = Math.round((5 + gs.floor * 3) * CONFIG.DIFF[gs.difficulty].rewardMul);
      gs.gold += goldDrop;
      snd.sfxKill();
      // Energy drain skill
      if (ps.skills.includes('energy_drain')) ps.energy = Math.min(ps.maxEnergy, ps.energy + 5);
      // Spawn kill particles [Visual D: star shape]
      for (let i = 0; i < 8; i++) {
        const a = Math.random() * Math.PI * 2;
        spawnParticle(particles, e.x, e.y, Math.cos(a)*60, Math.sin(a)*60, ENEMY_DEFS[e.type]?.color || '#F00', 0.5, null, 0, 'star');
      }
    }
  }
  // Light spear: piercing attack in facing direction
  if (ps.skills.includes('light_spear') && dim === 'light') {
    const dirs = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    const d = dirs[ps.facing] || [0, -1];
    for (let dist = 40; dist < 120; dist += 20) {
      const ax = ps.x + d[0]*dist, ay = ps.y + d[1]*dist;
      for (const e of enemies) {
        if (!e.alive) continue;
        const dx = e.x-ax, dy = e.y-ay;
        if (Math.sqrt(dx*dx+dy*dy) < 20) {
          e.hp -= Math.round(atkPower * 0.5);
          e.hitFlash = 0.1;
          if (e.hp <= 0) { e.alive = false; gs.score += 10*gs.floor; gs.kills++; snd.sfxKill(); }
        }
      }
    }
  }
  return hitAny;
}

// Spawn a floating damage number
function spawnDamageNumber(particles, x, y, dmg, isCrit) {
  spawnParticle(particles, x, y, 0, -30,
    isCrit ? '#FFEB3B' : '#FFF', 0.8, `${dmg}`, isCrit ? 16 : 12);
}

// Spawn particle [Visual D: shape parameter added]
function spawnParticle(pool, x, y, vx, vy, color, life, text, fontSize, shape) {
  const p = pool.get();
  p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.color = color; p.life = life; p.maxLife = life;
  p.text = text || null; p.fontSize = fontSize || 4;
  p.size = text ? 0 : 3;
  p.shape = shape || null;
  return p;
}

// Level up check
function checkLevelUp(ps) {
  if (ps.xp >= ps.xpToLevel) {
    ps.xp -= ps.xpToLevel;
    ps.level++;
    ps.xpToLevel = Math.round(ps.xpToLevel * 1.4);
    return true;
  }
  return false;
}

// Get random skill choices (3 options, no duplicates with owned)
function getSkillChoices(ownedSkills, rng) {
  const available = SKILL_POOL.filter(s => !ownedSkills.includes(s.id));
  if (available.length === 0) return SKILL_POOL.slice(0, 3);
  rng.shuffle(available);
  return available.slice(0, Math.min(3, available.length));
}

// Apply upgrade effects to player state
function applyUpgrades(ps, upgrades) {
  ps.maxHp = CONFIG.PLAYER_HP + (upgrades.hp || 0) * 10;
  ps.atk = CONFIG.PLAYER_ATK + (upgrades.atk || 0) * 2;
  ps.maxEnergy = CONFIG.DIM_ENERGY_MAX + (upgrades.energy || 0) * 10;
  ps.energyRegen = CONFIG.DIM_ENERGY_REGEN + (upgrades.regen || 0) * 0.2;
  ps.speedMul = 1 + (ps.skills.includes('haste') ? 0.15 : 0);
}

// Activate skill [Feedback #7]
function activateSkill(ps, gs, slotIdx, enemies, particles, snd) {
  if (!ps.skills[slotIdx]) return;
  if (ps.skillCooldowns[slotIdx] > 0) return;
  const skillId = ps.skills[slotIdx];
  const atkPower = ps.atk + (gs.upgrades.atk || 0) * 2;
  const dirs = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const d = dirs[ps.facing] || [0, -1];

  if (skillId === 'light_spear') {
    // Fire a piercing projectile in facing direction
    ps.skillCooldowns[slotIdx] = 3;
    snd.sfxAttack('light');
    for (let dist = 20; dist < 160; dist += 15) {
      const ax = ps.x + d[0] * dist, ay = ps.y + d[1] * dist;
      spawnParticle(particles, ax, ay, d[0]*20, d[1]*20, '#FFD700', 0.4, null, 0, 'spark');
      for (const e of enemies) {
        if (!e.alive) continue;
        const edx = e.x - ax, edy = e.y - ay;
        if (Math.sqrt(edx*edx + edy*edy) < 22) {
          e.hp -= Math.round(atkPower * 0.7);
          e.hitFlash = 0.15;
          if (e.hp <= 0) { e.alive = false; gs.score += 10 * gs.floor; gs.kills++; snd.sfxKill(); }
        }
      }
    }
  } else if (skillId === 'shadow_dagger') {
    // Chain attack nearby enemies
    ps.skillCooldowns[slotIdx] = 4;
    snd.sfxAttack('shadow');
    let lastX = ps.x, lastY = ps.y;
    let chainCount = 0;
    for (const e of enemies) {
      if (!e.alive || chainCount >= 4) continue;
      const edx = e.x - lastX, edy = e.y - lastY;
      if (Math.sqrt(edx*edx + edy*edy) < 120) {
        e.hp -= Math.round(atkPower * 0.5);
        e.hitFlash = 0.15;
        spawnParticle(particles, e.x, e.y, 0, -20, '#9B59B6', 0.3, null, 0, 'spark');
        if (e.hp <= 0) { e.alive = false; gs.score += 10 * gs.floor; gs.kills++; snd.sfxKill(); }
        lastX = e.x; lastY = e.y;
        chainCount++;
      }
    }
  } else if (skillId === 'dim_shield') {
    // Give 2s invulnerability
    ps.skillCooldowns[slotIdx] = 8;
    ps.invulnFrames = 2.0;
    snd.sfxShift(gs.dimension);
    for (let i = 0; i < 12; i++) {
      const a = i * Math.PI / 6;
      spawnParticle(particles, ps.x + Math.cos(a) * 20, ps.y + Math.sin(a) * 20, Math.cos(a)*15, Math.sin(a)*15, '#3498DB', 0.5, null, 0, 'ring');
    }
  } else if (skillId === 'energy_drain') {
    // AoE energy steal
    ps.skillCooldowns[slotIdx] = 5;
    snd.sfxShift('shadow');
    for (const e of enemies) {
      if (!e.alive) continue;
      const edx = e.x - ps.x, edy = e.y - ps.y;
      if (Math.sqrt(edx*edx + edy*edy) < 80) {
        e.hp -= Math.round(atkPower * 0.3);
        e.hitFlash = 0.1;
        ps.energy = Math.min(ps.maxEnergy, ps.energy + 8);
        spawnParticle(particles, e.x, e.y, (ps.x - e.x) * 0.5, (ps.y - e.y) * 0.5, '#2ECC71', 0.4, null, 0, 'ring');
        if (e.hp <= 0) { e.alive = false; gs.score += 10 * gs.floor; gs.kills++; snd.sfxKill(); }
      }
    }
  } else if (skillId === 'haste') {
    // Speed burst for 3s
    ps.skillCooldowns[slotIdx] = 10;
    ps.hasteBuff = 3.0;
    snd.sfxItem();
    for (let i = 0; i < 6; i++) {
      spawnParticle(particles, ps.x, ps.y, (Math.random()-0.5)*40, (Math.random()-0.5)*40, '#FF8C00', 0.3, null, 0, 'star');
    }
  } else if (skillId === 'clairvoyance') {
    // Reveal large area
    ps.skillCooldowns[slotIdx] = 6;
    snd.sfxPuzzle();
    const pr = Math.floor(ps.y / CONFIG.TILE_SIZE), pc = Math.floor(ps.x / CONFIG.TILE_SIZE);
    revealAround(pr, pc, 12);
  } else if (skillId === 'fortune') {
    // Bonus gold burst
    ps.skillCooldowns[slotIdx] = 12;
    snd.sfxItem();
    gs.gold += 10 + gs.floor * 3;
    spawnDamageNumber(particles, ps.x, ps.y - 20, 10 + gs.floor * 3, true);
  } else if (skillId === 'regen') {
    // Instant heal burst
    ps.skillCooldowns[slotIdx] = 8;
    snd.sfxItem();
    const healAmt = Math.round(ps.maxHp * 0.2);
    ps.hp = Math.min(ps.maxHp, ps.hp + healAmt);
    spawnDamageNumber(particles, ps.x, ps.y - 20, healAmt, true);
  }
}

// Game state variables
let canvas, ctx;
let W = 800, H = 600, dpr = 1;

let prevState = 'LOADING';
let transitionGuard = false;
let screenAlpha = { value: 1 };
let shakeAmount = 0;
let lastTime = 0;
let frameCount = 0;
let currentBGM = '';
let lang = 'ko';

// [Feedback #8] Minimap toggle
let showMinimap = true;

// [Feedback #3] Seed input state
let seedInputActive = false;
let seedInputText = '';

// Instances
const tw = new TweenManager();
const snd = new SoundManager();
const input = new InputManager();
const shopScroll = new ScrollManager();

// Particle pool [Visual D: shape property added]
const particlePool = new ObjectPool(
  () => ({ x:0,y:0,vx:0,vy:0,color:'#FFF',life:0,maxLife:1,size:3,text:null,fontSize:12,shape:null }),
  (p) => { p.life = 0; p.text = null; p.shape = null; },
  300
);

// Game state data
let save = { ...DEFAULT_SAVE };
let gs = {}; // Current game session
let ps = {}; // Player state
let floorData = null; // Current floor data
let camera = { x:0, y:0, zoom:1, targetZoom:1 };
let titleAnim = { t: 0, particles: [] };
let levelUpChoices = [];
let bossState = null;
let tutorialStep = 0;
let shiftEffect = { active:false, progress:0, fromDim:'light' };

// Buttons for hit testing
let buttons = [];

// Enter a new state
function enterState(newState) {
  prevState = gameState;
  gameState = newState;
  buttons = [];
  // State-specific initialization
  if (newState === 'TITLE') {
    titleAnim.t = 0;
    titleAnim.particles = [];
    for (let i = 0; i < 30; i++) {
      titleAnim.particles.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20,
        dim: Math.random() > 0.5 ? 'light' : 'shadow',
        size: 2 + Math.random()*4, alpha: 0.3 + Math.random()*0.5
      });
    }
    if (currentBGM !== 'title') { snd.startBGM('title'); currentBGM = 'title'; }
  }
  if (newState === 'GAMEPLAY' || newState === 'BOSS_FIGHT') {
    const bgm = gs.dimension === 'light' ? 'light' : 'shadow';
    if (newState === 'BOSS_FIGHT') { snd.startBGM('boss'); currentBGM = 'boss'; }
    else if (currentBGM !== bgm) { snd.startBGM(bgm); currentBGM = bgm; }
  }
  if (newState === 'SHOP') {
    shopScroll.y = 0; shopScroll.vy = 0;
    if (currentBGM !== 'shop') { snd.startBGM('shop'); currentBGM = 'shop'; }
  }
  if (newState === 'GAMEOVER') {
    shakeAmount = 15;
    // [Feedback #4] Increment death counters
    gs.deathsOnFloor = (gs.deathsOnFloor || 0) + 1;
    gs.consecutiveDeaths = (gs.consecutiveDeaths || 0) + 1;
    // Save results
    const isNewBest = gs.score > save.bestScore;
    if (isNewBest) save.bestScore = gs.score;
    if (gs.floor > save.bestFloor) save.bestFloor = gs.floor;
    save.totalRuns++;
    save.totalKills += gs.kills;
    save.gold += Math.round(gs.gold * CONFIG.GOLD_RETAIN_RATE);
    gs.isNewBest = isNewBest;
    saveSave();
    snd.stopBGM(); currentBGM = '';
  }
  if (newState === 'VICTORY') {
    shakeAmount = 5;
    gs.score += 5000;
    const isNewBest = gs.score > save.bestScore;
    if (isNewBest) save.bestScore = gs.score;
    save.bestFloor = Math.max(save.bestFloor, gs.floor);
    save.totalRuns++;
    save.totalKills += gs.kills;
    save.gold += gs.gold;
    gs.isNewBest = isNewBest;
    saveSave();
    snd.sfxVictory();
    snd.stopBGM(); currentBGM = '';
  }
}

// Begin transition with fade (guarded) [F5, F6]
function beginTransition(target) {
  // GAMEOVER/VICTORY에서의 역방향 "탈출" 전환은 허용 (재시작 등)
  const RESTART_ALLOWED = ['GAMEOVER', 'VICTORY'];
  if (!RESTART_ALLOWED.includes(gameState) &&
      gameState !== 'LOADING' &&
      STATE_PRIORITY[target] < STATE_PRIORITY[gameState]) return;
  if (transitionGuard) return;
  transitionGuard = true;
  tw.add({ target: screenAlpha, prop: 'value', from: 1, to: 0, duration: 250,
    onComplete: () => {
      enterState(target);
      tw.add({ target: screenAlpha, prop: 'value', from: 0, to: 1, duration: 250,
        onComplete: () => { transitionGuard = false; }
      });
    }
  });
}

// Initialize a new run
function initRun(difficulty) {
  // [Feedback #3] Use custom seed if provided
  const seed = (gs.customSeed && gs.customSeed > 0) ? gs.customSeed : (Date.now() % 2147483647);
  const prevConsecutiveDeaths = gs.consecutiveDeaths || 0;
  const prevDeathsOnFloor = gs.deathsOnFloor || 0;
  gs = {
    seed, rng: new SeededRNG(seed),
    floor: 1, dimension: 'light', difficulty: difficulty || 'normal',
    score: 0, gold: 0, kills: 0, shiftCount: 0,
    upgrades: { ...save.upgrades },
    isNewBest: false,
    customSeed: gs.customSeed || 0,
    // [Feedback #4] Adaptive difficulty
    deathsOnFloor: prevDeathsOnFloor,
    consecutiveDeaths: prevConsecutiveDeaths,
    energyBuff: prevConsecutiveDeaths >= 5
  };
  ps = {
    x: 0, y: 0, hp: CONFIG.PLAYER_HP, maxHp: CONFIG.PLAYER_HP,
    atk: CONFIG.PLAYER_ATK, energy: CONFIG.DIM_ENERGY_MAX, maxEnergy: CONFIG.DIM_ENERGY_MAX,
    energyRegen: CONFIG.DIM_ENERGY_REGEN,
    level: 1, xp: 0, xpToLevel: 30,
    facing: 'down', animFrame: 0,
    skills: [], maxSkills: 3 + (save.upgrades.skillSlot || 0),
    attackCooldown: 0, attackAnim: 0,
    invulnFrames: 0, speedMul: 1,
    lastShiftTime: 0, shiftCount: 0,
    noHitFloor: true,
    allFloorsNoHit: true, // [Feedback #1]
    skillCooldowns: [0, 0, 0], // [Feedback #7]
    hasteBuff: 0 // [Feedback #7: haste skill timer]
  };
  applyUpgrades(ps, gs.upgrades);
  ps.hp = ps.maxHp;
  ps.energy = ps.maxEnergy;
  generateNewFloor();
}

// Generate and enter a new floor
function generateNewFloor() {
  // [Feedback #4] Reset floor death counter on new floor
  if (gs.floor > 1) {
    gs.deathsOnFloor = 0;
  }
  floorData = generateFloor(gs.floor, gs.rng, gs.difficulty);
  ps.x = floorData.startX;
  ps.y = floorData.startY;
  camera.x = ps.x;
  camera.y = ps.y;
  camera.zoom = 1;
  camera.targetZoom = 1;
  bossState = null;
  // Check if boss floor
  const bossDef = BOSS_DEFS.find(b => b.floor === gs.floor);
  if (bossDef) {
    const bossIdx = BOSS_DEFS.indexOf(bossDef);
    // [Feedback #5] Use bossHpMul instead of atkMul for boss HP
    const hpMul = CONFIG.DIFF[gs.difficulty].bossHpMul;
    bossState = {
      idx: bossIdx, def: bossDef,
      x: floorData.exitX, y: floorData.exitY,
      hp: Math.round(bossDef.hp * hpMul), maxHp: Math.round(bossDef.hp * hpMul),
      phase: 0, animFrame: 0, active: false,
      attackTimer: 0, patternIdx: 0
    };
  }
  particlePool.releaseAll();
  // Reveal around start
  revealAround(Math.floor(ps.y / CONFIG.TILE_SIZE), Math.floor(ps.x / CONFIG.TILE_SIZE), 4);
}

// Reveal explored tiles around position
function revealAround(r, c, radius) {
  if (!floorData) return;
  for (let dr = -radius; dr <= radius; dr++)
    for (let dc = -radius; dc <= radius; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < CONFIG.MAP_H && nc >= 0 && nc < CONFIG.MAP_W)
        floorData.explored[nr * CONFIG.MAP_W + nc] = 1;
    }
}

// Save/Load
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return { ...DEFAULT_SAVE };
    const data = JSON.parse(raw);
    if (data.version < SAVE_VERSION) return { ...DEFAULT_SAVE, ...data, version: SAVE_VERSION };
    return { ...DEFAULT_SAVE, ...data };
  } catch(e) { return { ...DEFAULT_SAVE }; }
}
function saveSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e) {}
}

// REGION 7: INPUT & EVENT HANDLERS
