/* ═══════════════════════════════════════════════════════════
   HELPER FUNCTIONS
   ═══════════════════════════════════════════════════════════ */

/** 배열 셔플 — 엔진 MathUtil.shuffle 사용 */
const shuffle = (arr) => MathUtil.shuffle(arr);

/** 카드 데이터 가져오기 */
function cardData(id) { return CARDS[id]; }

/** 카드 등급별 색상 */
function rarityColor(r) {
  if (r === 'rare') return COL.cardRare;
  if (r === 'uncommon') return COL.cardUncommon;
  return COL.cardCommon;
}

/** 뽑기 더미에서 n장 드로우 */
function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (hand.length >= 10) break;
    if (drawPile.length === 0) {
      if (discardPile.length === 0) break;
      drawPile = shuffle(discardPile.slice());
      discardPile = [];
    }
    hand.push(drawPile.pop());
  }
}

/** 데미지 팝업 추가 — IX.PopupText 엔진 모듈 사용 */
function addPopup(x, y, text, color) {
  popups.add(x, y, text, color);
}

/** 전투 이펙트 오버레이 생성 (에셋 기반) */
function spawnBattleEffect(assetKey, x, y, duration) {
  if (!assets.has(assetKey)) return; // 에셋 없으면 스킵
  battleEffects.push({ asset: assetKey, x, y, life: duration, maxLife: duration, alpha: 1, scale: 1 });
}

/** 전투 이펙트 업데이트 */
function updateBattleEffects(dt) {
  for (let i = battleEffects.length - 1; i >= 0; i--) {
    const fx = battleEffects[i];
    fx.life -= dt / 1000;
    fx.alpha = Math.max(0, fx.life / fx.maxLife);
    fx.scale = 1 + (1 - fx.alpha) * 0.3; // 약간 확대되면서 사라짐
    if (fx.life <= 0) battleEffects.splice(i, 1);
  }
}

/** 전투 이펙트 렌더 */
function renderBattleEffects(ctx, w, h) {
  const s = lScale(w, h);
  for (const fx of battleEffects) {
    ctx.save();
    ctx.globalAlpha = fx.alpha;
    const size = 80 * s * fx.scale;
    const dx = fx.x - size / 2;
    const dy = fx.y - size / 2;
    assets.draw(ctx, fx.asset, dx, dy, size, size, COL.cyan);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/** 맵 생성: 층당 7노드 */
function generateMap(floor) {
  const nodes = [];
  const count = 7;
  // 첫 노드: 전투, 마지막: 보스, 중간 랜덤
  const types = ['combat'];
  const midTypes = ['combat','combat','elite','shop','rest','event'];
  for (let i = 1; i < count - 1; i++) {
    types.push(midTypes[MathUtil.randInt(0, midTypes.length - 1)]);
  }
  types.push('boss');
  // 엘리트 수 보정
  let eliteCount = types.filter(t => t === 'elite').length;
  const target = diff.elitesPerFloor;
  while (eliteCount < target && types.length > 2) {
    const idx = MathUtil.randInt(1, types.length - 2);
    if (types[idx] === 'combat') { types[idx] = 'elite'; eliteCount++; }
  }
  for (let i = 0; i < types.length; i++) {
    nodes.push({ type: types[i], index: i, floor });
  }
  return nodes;
}

/** 적 인스턴스 생성 */
function createEnemy(id, floorNum) {
  const def = ENEMIES[id];
  const hp = MathUtil.randInt(def.hpRange[0], def.hpRange[1]);
  const scaledHP = Math.round(hp * diff.hpMul);
  return {
    id, name: def.name, hp: scaledHP, maxHp: scaledHP,
    block: 0, asset: def.asset, pattern: def.pattern, patternIdx: 0,
    poison: 0, vulnerable: 0, weakened: 0, dot: 0, dotTurns: 0,
    atkBuff: 0, x: 0, y: 0, intentIcon: '', shakeX: 0,
  };
}

/** 보스 인스턴스 생성 */
function createBoss(bossId) {
  const def = BOSSES[bossId];
  const scaledHP = Math.round(def.hp * diff.hpMul);
  return {
    id: bossId, name: def.name, hp: scaledHP, maxHp: scaledHP,
    block: 0, asset: def.asset, asset2: def.asset2 || null,
    p1: def.p1, p2: def.p2, threshold: def.threshold,
    phase: 1, patternIdx: 0, isBoss: true,
    poison: 0, vulnerable: 0, weakened: 0, dot: 0, dotTurns: 0,
    atkBuff: 0, x: 0, y: 0, intentIcon: '', shakeX: 0,
  };
}

/** 적 의도 해석 (아이콘 표시용) */
function getEnemyIntent(e) {
  const pat = e.isBoss
    ? (e.phase === 2 ? e.p2 : e.p1)
    : e.pattern;
  const action = pat[e.patternIdx % pat.length];
  if (action.includes('atk')) return { icon: '⚔', color: COL.red };
  if (action.includes('def')) return { icon: '🛡', color: COL.green };
  if (action.includes('poison') || action.includes('vuln')) return { icon: '💀', color: '#a855f7' };
  if (action.includes('buff') || action.includes('heal')) return { icon: '✦', color: COL.gold };
  if (action.includes('summon')) return { icon: '👥', color: COL.cyan };
  return { icon: '?', color: COL.dim };
}

/** 적 행동 실행 */
function executeEnemyAction(e, idx) {
  const pat = e.isBoss ? (e.phase === 2 ? e.p2 : e.p1) : e.pattern;
  const action = pat[e.patternIdx % pat.length];
  let rawDmg = 0;

  // 파싱
  if (action === 'atk6')  rawDmg = 6;
  else if (action === 'atk8')  rawDmg = 8;
  else if (action === 'atk10') rawDmg = 10;
  else if (action === 'atk12') rawDmg = 12;
  else if (action === 'atk14') rawDmg = 14;
  else if (action === 'atk15') rawDmg = 15;
  else if (action === 'atk16') rawDmg = 16;
  else if (action === 'atk18') rawDmg = 18;
  else if (action === 'atk20_summon') { rawDmg = 20; spawnMinion('skeleton'); }
  else if (action === 'atk24') rawDmg = 24;
  else if (action === 'atk18_summon') { rawDmg = 18; spawnMinion('slime'); }
  else if (action === 'atk5p1') { rawDmg = 5; /* poison 1 */ applyPlayerPoison(1); }
  else if (action === 'aoe12') rawDmg = 12;
  else if (action === 'def6')  e.block += 6;
  else if (action === 'def10') e.block += 10;
  else if (action === 'def12') e.block += 12;
  else if (action === 'def15') e.block += 15;
  else if (action === 'def12_atk8') { e.block += 12; rawDmg = 8; }
  else if (action === 'poison2') { applyPlayerPoison(2); }
  else if (action === 'vuln1') { playerVulnerable += 1; addPopup(engine.W * 0.25, engine.H * 0.45, '취약!', COL.red); }
  else if (action === 'vuln2') { playerVulnerable += 2; addPopup(engine.W * 0.25, engine.H * 0.45, '취약 2턴!', COL.red); }
  else if (action === 'buff3') { e.atkBuff = (e.atkBuff || 0) + 3; addPopup(e.x, e.y - 20, '공격력+3', COL.gold); }
  else if (action === 'heal5') { e.hp = Math.min(e.maxHp, e.hp + 5); addPopup(e.x, e.y - 20, '+5', COL.green); }
  else if (action === 'summon_slime') { spawnMinion('slime'); }
  else if (action === 'ignore_def') { rawDmg = 16; /* bypass block partially */ }

  // HIGH-3: 고대 골렘 atkBuff 적용
  if (e.atkBuff && rawDmg > 0) rawDmg += e.atkBuff;
  // 약화 적용
  if (e.weakened > 0) rawDmg = Math.round(rawDmg * 0.75);
  // 난이도 공격력 배율
  rawDmg = Math.round(rawDmg * diff.atkMul);

  if (rawDmg > 0) dealDamageToPlayer(rawDmg, e, action === 'ignore_def');
  e.patternIdx++;
}

function applyPlayerPoison(amount) {
  /* HIGH-1 fix: 플레이어 독 실제 누적 */
  playerPoison += amount;
  addPopup(engine.W * 0.25, engine.H * 0.5, '독 +' + amount, '#a855f7');
  spawnBattleEffect('effectPoison', engine.W * 0.15, engine.H * 0.35, 0.6);
}

function spawnMinion(type) {
  if (enemies.length >= 3) return;
  const e = createEnemy(type, currentFloor);
  e.hp = Math.round(e.hp * 0.6);
  e.maxHp = e.hp;
  enemies.push(e);
  positionEnemies();
  addPopup(engine.W * 0.7, engine.H * 0.3, '소환!', COL.cyan);
}

function positionEnemies() {
  const w = engine.W, h = engine.H;
  const startX = w * 0.55;
  const spacing = Math.min(w * 0.18, 140);
  enemies.forEach((e, i) => {
    e.x = startX + i * spacing;
    e.y = h * 0.35;
  });
}

function dealDamageToPlayer(dmg, source, ignoreBlock) {
  let actual = dmg;
  // HIGH-2: 취약 상태 — 받는 피해 50% 증가
  if (playerVulnerable > 0) actual = Math.round(actual * 1.5);
  // R-8: 무피격 턴 추적
  playerDamagedThisTurn = true;
  // 반사
  if (reflectActive > 0 && source) {
    const reflected = Math.round(dmg * reflectActive);
    source.hp -= reflected;
    addPopup(source.x, source.y - 20, '-' + reflected, COL.cyan);
  }
  // 가시
  if (thornsActive > 0 && source) {
    source.hp -= thornsActive;
    addPopup(source.x, source.y - 10, '-' + thornsActive, '#a855f7');
  }
  // 블록 흡수 (H-4: ignoreBlock이면 블록 무시)
  if (playerBlock > 0 && !ignoreBlock) {
    if (playerBlock >= actual) {
      playerBlock -= actual; actual = 0;
    } else {
      actual -= playerBlock; playerBlock = 0;
    }
  }
  if (actual > 0) {
    playerHP -= actual;
    shakeIntensity = 8;
    sound.sfx('hit');
    addPopup(engine.W * 0.25, engine.H * 0.45, '-' + actual, COL.red);
    spawnBattleEffect('effectHit', engine.W * 0.15, engine.H * 0.4, 0.4);
  }
}

/** 카드 사용 */
function playCard(cardId, targetIdx) {
  const c = cardData(cardId);
  if (!c) return false;
  const effectiveCost = Math.max(0, c.cost - costReduction);
  if (playerEnergy < effectiveCost) {
    shakeIntensity = 3;
    sound.tone(200, 0.1, 'sawtooth');
    return false;
  }
  playerEnergy -= effectiveCost;
  cardsPlayedThisTurn++;

  sound.sfx('select');
  const target = enemies[targetIdx] || enemies[0];

  // ── 공격 카드 ──
  if (c.type === 'attack') {
    attacksPlayedThisTurn++;
    /* 이펙트: 베기 에셋 오버레이 */
    if (target) spawnBattleEffect('effectSlash', target.x + 40, target.y + 40, 0.4);
    let baseDmg = c.dmg || 0;

    if (c.bladeStorm) baseDmg = discardCount * 4;
    if (c.chainBonus) baseDmg += chainBonusAccum;

    let totalDmg = baseDmg;
    if (nextAtkBonus > 0) { totalDmg = Math.round(totalDmg * (1 + nextAtkBonus)); nextAtkBonus = 0; }
    if (target && target.vulnerable > 0) totalDmg = Math.round(totalDmg * 1.5);

    const hits = c.hits || 1;
    const targets = c.aoe ? enemies : (target ? [target] : []);

    for (const t of targets) {
      for (let h = 0; h < hits; h++) {
        let dmg = totalDmg;
        if (!c.pierceBlock) {
          if (t.block >= dmg) { t.block -= dmg; dmg = 0; }
          else { dmg -= t.block; t.block = 0; }
        }
        t.hp -= dmg;
        if (dmg > 0) {
          addPopup(t.x + MathUtil.randRange(-10, 10), t.y - 30, '-' + dmg, COL.red);
          t.shakeX = 8;
          particles.emit(t.x + 40, t.y + 40, 6, { color: COL.red, speed: 80, life: 0.4 });
        }
      }
      if (c.vulnerable) t.vulnerable += c.vulnerable;
      if (c.dot) { t.dot += c.dot; t.dotTurns = Math.max(t.dotTurns, c.dotTurns || 0); }
      // 즉사 체크
      if (c.executeThreshold && t.hp > 0 && t.hp / t.maxHp <= c.executeThreshold) {
        t.hp = 0;
        addPopup(t.x, t.y - 50, '처형!', COL.gold);
      }
    }
    // 체인 보너스 누적
    if (c.chainBonus) chainBonusAccum += c.chainBonus;
    // 뱀파이어 검 유물
    checkEnemyDeath();
  }

  // ── 방어 카드 ──
  if (c.type === 'defense') {
    /* 이펙트: 방어 에셋 오버레이 */
    spawnBattleEffect('effectShield', engine.W * 0.15, engine.H * 0.4, 0.5);
    let blockAmt = c.block || 0;
    if (c.rageBlock) blockAmt = Math.round((playerMaxHP - playerHP) * 0.5);
    playerBlock += blockAmt;
    if (blockAmt > 0) addPopup(engine.W * 0.25, engine.H * 0.4, '+' + blockAmt + ' 🛡', COL.green);
    if (c.thorns) thornsActive += c.thorns;
    if (c.retainBlock) retainBlock = true;
    if (c.reflect) reflectActive = c.reflect;
    if (c.dmg && target) {
      let dmg = c.dmg;
      if (target.block >= dmg) { target.block -= dmg; dmg = 0; }
      else { dmg -= target.block; target.block = 0; }
      target.hp -= dmg;
      if (dmg > 0) addPopup(target.x, target.y - 30, '-' + dmg, COL.red);
    }
    if (c.draw) drawCards(c.draw);
    particles.emit(engine.W * 0.25, engine.H * 0.5, 8, { color: COL.green, speed: 60, life: 0.3 });
    sound.tone(500, 0.08, 'sine');
    checkEnemyDeath();
  }

  // ── 스킬 카드 ──
  if (c.type === 'skill') {
    /* H-6: 카드 연금술은 소멸 후 드로우 */
    if (c.alchExhaust) { alchemyMode = true; } else if (c.draw) { drawCards(c.draw); }
    if (c.heal) {
      playerHP = Math.min(playerMaxHP, playerHP + c.heal);
      addPopup(engine.W * 0.25, engine.H * 0.4, '+' + c.heal, COL.green);
      spawnBattleEffect('effectHeal', engine.W * 0.15, engine.H * 0.35, 0.6);
      particles.emit(engine.W * 0.25, engine.H * 0.5, 6, { color: COL.green, speed: 40, life: 0.5 });
    }
    if (c.nextAtkBonus) nextAtkBonus += c.nextAtkBonus;
    if (c.gainEnergy) playerEnergy += c.gainEnergy;
    if (c.weakenNext && target) target.weakened += 2;
    if (c.poisonAll) enemies.forEach(e => { e.poison += c.poisonAll; });
    if (c.costReduction) costReduction += c.costReduction;
    if (c.recycleDiscard && discardPile.length > 0) {
      const n = Math.min(c.recycleDiscard, discardPile.length);
      for (let i = 0; i < n; i++) {
        const idx = MathUtil.randInt(0, discardPile.length - 1);
        drawPile.push(discardPile.splice(idx, 1)[0]);
      }
    }
    sound.tone(700, 0.08, 'sine');
  }

  // 카드를 버리기 더미 또는 소멸 더미로
  if (c.exhaust) {
    exhaustPile.push(cardId);
  } else {
    discardPile.push(cardId);
    discardCount++;
  }
  return true;
}

function checkEnemyDeath() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].hp <= 0) {
      const e = enemies[i];
      // 뱀파이어 검 유물
      if (relics.includes('vampireSword')) {
        playerHP = Math.min(playerMaxHP, playerHP + 3);
        addPopup(engine.W * 0.25, engine.H * 0.35, '+3 HP', COL.green);
      }
      spawnBattleEffect('effectDeath', e.x + 40, e.y + 40, 0.7);
      particles.emit(e.x + 40, e.y + 40, 15, { color: COL.cyan, speed: 120, life: 0.6 });
      sound.sfx('explosion');
      enemies.splice(i, 1);
      positionEnemies();
    }
  }
}

/** 점수 계산 헬퍼 */
function addScore(amount, reason) {
  score += amount;
  combatLog.push('+' + amount + ' (' + reason + ')');
}

function getGrade() {
  if (score >= 2000) return { grade: 'S', color: COL.gold };
  if (score >= 1500) return { grade: 'A', color: COL.cardUncommon };
  if (score >= 1000) return { grade: 'B', color: COL.green };
  return { grade: 'C', color: COL.text };
}

/** 카드 보상 풀에서 랜덤 카드 선택 */
function getRewardCards(count) {
  const pool = Object.keys(CARDS).filter(id => !STARTER_DECK.includes(id) || id === 'strike' || id === 'defend');
  const result = [];
  const used = new Set();
  for (let i = 0; i < count && pool.length > 0; i++) {
    let picked;
    const roll = Math.random();
    const rarity = roll < 0.1 ? 'rare' : (roll < 0.4 ? 'uncommon' : 'common');
    const filtered = pool.filter(id => CARDS[id].rarity === rarity && !used.has(id));
    if (filtered.length > 0) {
      picked = filtered[MathUtil.randInt(0, filtered.length - 1)];
    } else {
      picked = pool[MathUtil.randInt(0, pool.length - 1)];
    }
    result.push(picked);
    used.add(picked);
  }
  return result;
}

/** 배경 렌더 */
function renderBG(ctx, w, h, floorNum) {
  const bgKey = 'bgFloor' + floorNum;
  if (assets.has(bgKey)) {
    ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
    ctx.fillStyle = 'rgba(13,27,42,0.3)';
    ctx.fillRect(0, 0, w, h);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    if (floorNum === 1) { grad.addColorStop(0, '#0d2b1a'); grad.addColorStop(1, '#0d1b2a'); }
    else if (floorNum === 2) { grad.addColorStop(0, '#1a0d2a'); grad.addColorStop(1, '#0d1b2a'); }
    else { grad.addColorStop(0, '#0d2a2a'); grad.addColorStop(1, '#0d1b2a'); }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }
}

/** 카드 렌더 — 카드 프레임/아트 에셋 활용 */
function renderCard(ctx, cardId, x, y, cw, ch, selected, hovering) {
  const c = cardData(cardId);
  if (!c) return;
  const rc = rarityColor(c.rarity);
  ctx.save();
  if (selected) { ctx.translate(0, -10); y -= 5; }

  // 카드 프레임 에셋 결정
  const frameKey = c.rarity === 'rare' ? 'cardFrameRare'
    : c.rarity === 'uncommon' ? 'cardFrameUncommon' : 'cardFrameCommon';

  // 프레임 에셋 사용 또는 폴백
  if (assets.has(frameKey)) {
    ctx.drawImage(assets.sprites[frameKey], x, y, cw, ch);
    // 선택/호버 오버레이
    if (selected) {
      ctx.fillStyle = 'rgba(0,212,255,0.15)';
      ctx.fillRect(x, y, cw, ch);
    } else if (hovering) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x, y, cw, ch);
    }
    // 선택/호버 테두리 강조
    if (selected || hovering) {
      ctx.strokeStyle = hovering ? '#fff' : COL.cyan;
      ctx.lineWidth = selected ? 3 : 2;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, cw, ch, 6);
      else ctx.rect(x, y, cw, ch);
      ctx.stroke();
    }
  } else {
    // 폴백: 수동 그리기
    ctx.fillStyle = selected ? '#2a2a4a' : '#161628';
    ctx.strokeStyle = hovering ? '#fff' : rc;
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, cw, ch, 6);
    else ctx.rect(x, y, cw, ch);
    ctx.fill(); ctx.stroke();
  }

  // 카드 아트 에셋 (상단 영역) — 주요 카드만 아트 존재
  const artMap = { strike: 'cardArtStrike', defend: 'cardArtDefend', heavyStrike: 'cardArtHeavy' };
  const artKey = artMap[cardId];
  const artAreaH = ch * 0.3;
  if (artKey && assets.has(artKey)) {
    const artPad = cw * 0.08;
    ctx.drawImage(assets.sprites[artKey], x + artPad, y + ch * 0.08, cw - artPad * 2, artAreaH);
  } else {
    // 폴백: 타입 아이콘
    const typeIcon = c.type === 'attack' ? '⚔' : c.type === 'defense' ? '🛡' : '✦';
    const iconSize = Math.max(12, cw * 0.2);
    ctx.fillStyle = rc;
    ctx.font = `${iconSize}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(typeIcon, x + cw / 2, y + ch * 0.22);
  }

  // 코스트 원형 배지
  const costSize = Math.max(14, cw * 0.2);
  ctx.fillStyle = COL.cyan;
  ctx.beginPath();
  ctx.arc(x + costSize * 0.6, y + costSize * 0.6, costSize * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = `bold ${costSize * 0.6}px system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const effCost = Math.max(0, c.cost - costReduction);
  ctx.fillText(effCost, x + costSize * 0.6, y + costSize * 0.6);

  // 카드 이름
  ctx.fillStyle = rc;
  const nameSize = Math.max(9, cw * 0.13);
  ctx.font = `bold ${nameSize}px system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(c.name, x + cw / 2, y + ch * 0.48);

  // 설명
  ctx.fillStyle = COL.dim;
  const descSize = Math.max(7, cw * 0.1);
  ctx.font = `${descSize}px system-ui, sans-serif`;
  const words = c.desc.split(' ');
  let line = '', ly = y + ch * 0.6;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > cw - 8) {
      ctx.fillText(line.trim(), x + cw / 2, ly);
      line = word + ' '; ly += descSize + 2;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), x + cw / 2, ly);
  ctx.restore();
}

/** 적 렌더 */
function renderEnemy(ctx, e, w, h) {
  const s = lScale(w, h);
  const size = (e.isBoss ? 100 : 70) * s;
  const drawX = e.x + (e.shakeX || 0);
  // 에셋 또는 폴백
  const assetKey = (e.isBoss && e.phase === 2 && e.asset2) ? e.asset2 : e.asset;
  assets.draw(ctx, assetKey, drawX, e.y, size, size, e.isBoss ? COL.red : COL.cyan);
  // HP 바
  const barW = size; const barH = 8 * s;
  const barY = e.y + size + 4;
  UI.hpBar(ctx, drawX, barY, barW, barH, e.hp, e.maxHp, { fgColor: COL.red, bgColor: '#333' });
  ctx.fillStyle = COL.text;
  ctx.font = `${Math.max(9, 11 * s)}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(e.hp + '/' + e.maxHp, drawX + size / 2, barY + barH + 12 * s);
  // 이름
  ctx.fillText(e.name, drawX + size / 2, e.y - 8 * s);
  // 블록 표시
  if (e.block > 0) {
    ctx.fillStyle = COL.green;
    ctx.fillText('🛡' + e.block, drawX + size / 2, barY + barH + 24 * s);
  }
  // 의도 아이콘
  if (turnPhase === 'player') {
    const intent = getEnemyIntent(e);
    ctx.fillStyle = intent.color;
    ctx.font = `${Math.max(16, 22 * s)}px system-ui, sans-serif`;
    ctx.fillText(intent.icon, drawX + size / 2, e.y - 24 * s);
  }
  // 상태이상 아이콘 — 에셋 사용 (폴백: 이모지)
  let statusX = drawX;
  const iconS = 16 * s;
  if (e.poison > 0) {
    if (assets.has('uiPoison')) {
      assets.draw(ctx, 'uiPoison', statusX, barY + barH + 24 * s, iconS, iconS, '#a855f7');
    } else {
      ctx.fillStyle = '#a855f7'; ctx.font = `${iconS}px system-ui`; ctx.textAlign = 'left'; ctx.fillText('☠', statusX, barY + barH + 36 * s);
    }
    ctx.fillStyle = '#a855f7'; ctx.font = `bold ${Math.max(9, 11 * s)}px system-ui`; ctx.textAlign = 'left';
    ctx.fillText('' + e.poison, statusX + iconS + 2, barY + barH + 37 * s);
    statusX += (iconS + 18) * s + 4;
  }
  if (e.vulnerable > 0) {
    if (assets.has('uiVulnerable')) {
      assets.draw(ctx, 'uiVulnerable', statusX, barY + barH + 24 * s, iconS, iconS, COL.red);
    } else {
      ctx.fillStyle = COL.red; ctx.font = `${iconS}px system-ui`; ctx.textAlign = 'left'; ctx.fillText('💔', statusX, barY + barH + 36 * s);
    }
    ctx.fillStyle = COL.red; ctx.font = `bold ${Math.max(9, 11 * s)}px system-ui`; ctx.textAlign = 'left';
    ctx.fillText('' + e.vulnerable, statusX + iconS + 2, barY + barH + 37 * s);
    statusX += (iconS + 18) * s + 4;
  }
  // atkBuff 표시 (HIGH-3)
  if (e.atkBuff > 0) {
    ctx.fillStyle = COL.gold; ctx.font = `bold ${Math.max(9, 11 * s)}px system-ui`; ctx.textAlign = 'left';
    ctx.fillText('⚔+' + e.atkBuff, statusX, barY + barH + 37 * s);
  }
  // shakeX 감쇠
  if (e.shakeX) e.shakeX *= 0.8;
  if (Math.abs(e.shakeX) < 0.5) e.shakeX = 0;
}

/** 플레이어 HUD */
function renderPlayerHUD(ctx, w, h) {
  const s = lScale(w, h);
  const px = w * 0.05;
  const py = h * 0.32;
  const pSize = 80 * s;
  // 플레이어 에셋
  const pAsset = turnPhase === 'enemy' ? 'playerHurt' : (selectedCardIdx >= 0 ? 'playerAttack' : 'player');
  assets.draw(ctx, pAsset, px, py, pSize, pSize, COL.cyan);
  // HP 바
  const barX = px; const barY = py + pSize + 4;
  const barW = pSize * 1.5; const barH = 10 * s;
  UI.hpBar(ctx, barX, barY, barW, barH, playerHP, playerMaxHP, { fgColor: COL.red });
  ctx.fillStyle = COL.text;
  ctx.font = `bold ${fontSize(12, w, h)}px system-ui, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + playerHP + '/' + playerMaxHP, barX, barY + barH + 14 * s);
  // 블록
  if (playerBlock > 0) {
    ctx.fillStyle = COL.green;
    ctx.fillText('🛡 ' + playerBlock, barX + barW * 0.6, barY + barH + 14 * s);
  }
  // 에너지
  ctx.fillStyle = COL.cyan;
  ctx.font = `bold ${fontSize(18, w, h)}px system-ui, sans-serif`;
  ctx.fillText('⚡ ' + playerEnergy + '/' + maxEnergy, barX, barY + barH + 34 * s);
  // 골드
  ctx.fillStyle = COL.gold;
  ctx.font = `${fontSize(13, w, h)}px system-ui, sans-serif`;
  ctx.fillText('💰 ' + gold, barX, barY + barH + 52 * s);
  // 플레이어 상태이상 (독/취약) 표시
  let pStatusX = barX;
  const pIconS = 16 * s;
  const pStatusY = barY + barH + 52 * s + 16 * s;
  if (playerPoison > 0) {
    if (assets.has('uiPoison')) {
      assets.draw(ctx, 'uiPoison', pStatusX, pStatusY - pIconS + 2, pIconS, pIconS, '#a855f7');
      pStatusX += pIconS + 2;
    }
    ctx.fillStyle = '#a855f7'; ctx.font = `bold ${fontSize(11, w, h)}px system-ui, sans-serif`; ctx.textAlign = 'left';
    ctx.fillText('독 ' + playerPoison, pStatusX, pStatusY);
    pStatusX += 40 * s;
  }
  if (playerVulnerable > 0) {
    if (assets.has('uiVulnerable')) {
      assets.draw(ctx, 'uiVulnerable', pStatusX, pStatusY - pIconS + 2, pIconS, pIconS, COL.red);
      pStatusX += pIconS + 2;
    }
    ctx.fillStyle = COL.red; ctx.font = `bold ${fontSize(11, w, h)}px system-ui, sans-serif`; ctx.textAlign = 'left';
    ctx.fillText('취약 ' + playerVulnerable, pStatusX, pStatusY);
  }
  // 유물
  relics.forEach((rId, i) => {
    const rd = RELICS[rId];
    if (rd) {
      assets.draw(ctx, rd.asset, barX + i * 28 * s, barY + barH + 62 * s, 24 * s, 24 * s, COL.gold);
    }
  });
  // 포션
  potions.forEach((pId, i) => {
    if (pId) {
      const pd = POTIONS[pId];
      assets.draw(ctx, pd.asset, barX + i * 28 * s, barY + barH + 90 * s, 24 * s, 24 * s, '#ff88aa');
    }
  });
}

/** 데미지 팝업 업데이트/렌더 — IX.PopupText 위임 */

        if (nAssetKey && assets.has(nAssetKey)) {
          const origRender = btn.render.bind(btn);

            origRender(ctx2);
            /* 버튼 위에 에셋 아이콘 오버레이 */
            assets.draw(ctx2, nAssetKey, nx - 20, ny - 20, 40, 40, nodeColors[node.type]);
          };
        }

    });

  update(dt, inp) {
    inputDelay = Math.max(0, inputDelay - dt / 1000);
    tween.update(dt);
  },

      ctx.drawImage(assets.sprites.bgMap, 0, 0, w, h);
      ctx.fillStyle = 'rgba(13,27,42,0.5)';
      ctx.fillRect(0, 0, w, h);
    } else {
      ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, w, h);
    }
    const safe = safeArea(w, h);
    const s = lScale(w, h);
    UI.text(ctx, currentFloor + '층 — 맵', w / 2, safe.y + safe.h * 0.03, { size: fontSize(22, w, h), bold: true, color: COL.text });
    UI.text(ctx, '💰 ' + gold + '  HP ' + playerHP + '/' + playerMaxHP, w / 2, safe.y + safe.h * 0.93,
      { size: fontSize(13, w, h), color: COL.dim });
    // 연결선
    const nodeCount = mapNodes.length;
    const startY = safe.y + safe.h * 0.1;
    const endY = safe.y + safe.h * 0.85;
    const stepY = (endY - startY) / (nodeCount - 1);
    ctx.strokeStyle = 'rgba(0,212,255,0.2)';
    ctx.lineWidth = 2;
    for (let i = 0; i < nodeCount - 1; i++) {
      const x1 = w / 2 + (i % 2 === 0 ? -1 : 1) * w * 0.12 * ((i % 3) - 1);
      const y1 = startY + i * stepY;
      const x2 = w / 2 + ((i + 1) % 2 === 0 ? -1 : 1) * w * 0.12 * (((i + 1) % 3) - 1);
      const y2 = startY + (i + 1) * stepY;

    }

    const nodeAssetMap2 = { combat:'nodeCombat', elite:'nodeElite', shop:'nodeShop', rest:'nodeRest', event:'nodeEvent', boss:'nodeBoss' };
    const nodeIcons2 = { combat: '⚔', elite: '💀', shop: '🏪', rest: '🔥', event: '❓', boss: '👑' };
    const nodeColors2 = { combat: COL.dim, elite: COL.red, shop: COL.gold, rest: '#ff8800', event: COL.cyan, boss: COL.red };
    mapNodes.forEach((node, i) => {
      const nx = w / 2 + (i % 2 === 0 ? -1 : 1) * w * 0.12 * ((i % 3) - 1);
      const ny = startY + i * stepY;
      const visited = visitedNodes.has(i);
      const isCurrent = i === currentNodeIdx;
      if (isCurrent) return; // 현재 노드는 Button이 그림

      const nAK = nodeAssetMap2[node.type];

        assets.draw(ctx, nAK, nx - 18, ny - 18, 36, 36, nodeColors2[node.type] || COL.dim);

        ctx.font = '20px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      }
      ctx.globalAlpha = 1;
    });
    /* 모바일 노드 타입 안내 */
    if (isMobileView(w) && currentNodeIdx < mapNodes.length) {
      const nextNode = mapNodes[currentNodeIdx];
      const nodeNames = { combat: '전투', elite: '엘리트', shop: '상점', rest: '휴식', event: '이벤트', boss: '보스' };
      UI.text(ctx, '다음: ' + (nodeNames[nextNode.type] || '?') + ' — 탭하여 진입', w / 2, safe.y + safe.h * 0.97,

});

function enterNode(node) {
  if (node.type === 'combat') startBattle(node.floor, false);
  else if (node.type === 'elite') startBattle(node.floor, true);
  else if (node.type === 'boss') startBossBattle(node.floor);
  else if (node.type === 'shop') Scene.transition('SHOP');
  else if (node.type === 'rest') Scene.transition('REST');
  else if (node.type === 'event') Scene.transition('EVENT');
}

/* ═══════════════════════════════════════════════════════════
   DYNAMIC BUTTON MANAGEMENT (카드/적 선택용)
   ═══════════════════════════════════════════════════════════ */

/** 카드/적 버튼만 선별 제거 — 엔진 Button.removeList 사용 */
function clearDynamicButtons() {
  Button.removeList(cardButtons);
  Button.removeList(enemyButtons);
  cardButtons = [];
  enemyButtons = [];
}

/** 손패 카드 레이아웃 계산 (모바일/포트레이트 대응) */
function getHandLayout(w, h) {
  const mobile = isMobileView(w);
  const portrait = isPortrait(w, h);
  const safe = safeArea(w, h);
  let cardH, cardW, gap;
  if (portrait) {
    cardH = Math.min(100, h * 0.14);
    cardW = cardH * 0.62;
    gap = 2;
  } else if (mobile) {
    cardH = Math.min(110, h * 0.2);
    cardW = cardH * 0.63;
    gap = 2;
  } else {
    cardH = Math.min(140, h * 0.22);
    cardW = cardH * 0.65;
    gap = 4;
  }
  const handY = safe.y + safe.h - cardH - 10;
  const totalW = hand.length * (cardW + gap);
  const maxTotalW = w * 0.95;
  const actualGap = totalW > maxTotalW ? Math.max(1, (maxTotalW - hand.length * cardW) / Math.max(1, hand.length)) : gap;
  const actualTotalW = hand.length * (cardW + actualGap);
  const startX = (w - actualTotalW) / 2;
  return { cardH, cardW, gap: actualGap, handY, startX, totalW: actualTotalW };
}

/** 현재 손패/적 상태에 맞게 동적 버튼 재생성 */
function rebuildBattleButtons() {
  clearDynamicButtons();
  if (turnPhase !== 'player') return;
  const w = engine.W, h = engine.H;
  const s = lScale(w, h);
  const layout = getHandLayout(w, h);
  const { cardH, cardW, gap, handY, startX } = layout;

  // 손패 카드 버튼
  hand.forEach((cId, i) => {
    const cx = startX + i * (cardW + gap);
    const btn = new Button({
      x: cx, y: handY, w: cardW, h: cardH,
      text: '', /* 카드 렌더는 별도 함수에서 처리 */
      key: i < 9 ? ['Digit' + (i + 1)] : [],
      color: 'rgba(0,0,0,0)',  /* 투명 — 커스텀 렌더 사용 */
      onClick: () => {
        /* H-6: 연금술 모드 — 이 카드를 소멸시키고 2장 드로우 */
        if (alchemyMode) {
          const exhaustedId = hand.splice(i, 1)[0];
          exhaustPile.push(exhaustedId);
          addPopup(engine.W / 2, engine.H * 0.4, '소멸!', '#a855f7');
          drawCards(2);
          alchemyMode = false;
          selectedCardIdx = -1;
          rebuildBattleButtons();
          return;
        }
        if (selectedCardIdx === i) { selectedCardIdx = -1; }
        else { selectedCardIdx = i; }
        sound.tone(440, 0.05, 'sine');
        // 방어/스킬 카드는 선택 즉시 사용 가능하도록 (더블탭)
        if (selectedCardIdx === -1) {
          const c = cardData(cId);
          if (c && (c.type === 'defense' || c.type === 'skill')) {
            if (playCard(cId, 0)) {
              hand.splice(i, 1); selectedCardIdx = -1;
              rebuildBattleButtons(); checkBattleEnd();
            }
          }
        }
      },
    });
    btn.render = () => {}; /* 카드 렌더링은 씬 render에서 직접 */
    cardButtons.push(btn);
  });

  // 적 타겟 버튼
  enemies.forEach((e, i) => {
    const eSize = (e.isBoss ? 100 : 70) * s;
    const btn = new Button({
      x: e.x - 10, y: e.y - 10, w: eSize + 20, h: eSize + 40,
      text: '', color: 'rgba(0,0,0,0)',
      key: ['Digit' + (i + 6)],  /* HIGH-2 fix: 적 타겟 Digit6~8 */
      onClick: () => {
        if (selectedCardIdx >= 0 && selectedCardIdx < hand.length) {
          const cardId = hand[selectedCardIdx];
          if (playCard(cardId, i)) {
            hand.splice(selectedCardIdx, 1); selectedCardIdx = -1;
            rebuildBattleButtons(); checkBattleEnd();
          }
        }
      },
    });
    btn.render = () => {}; /* 적 렌더링은 씬 render에서 직접 */
    enemyButtons.push(btn);
  });
}

/* ═══════════════════════════════════════════════════════════
   BATTLE SYSTEM
   ═══════════════════════════════════════════════════════════ */

function startBattle(floor, elite) {
  isEliteBattle = elite;
  enemies = [];
  // 적 구성
  const floorEnemies = Object.entries(ENEMIES).filter(([, d]) => d.floor.includes(floor));
  const count = floor >= 3 ? 2 : (elite ? 1 : (Math.random() < 0.4 ? 2 : 1));
  for (let i = 0; i < count; i++) {
    const [id] = floorEnemies[MathUtil.randInt(0, floorEnemies.length - 1)];
    enemies.push(createEnemy(id, floor));
  }
  initBattle();
  Scene.transition('BATTLE');
}

function startBossBattle(floor) {
  isEliteBattle = false;
  enemies = [];
  const bossIds = ['slimeKing', 'boneLord', 'polygonCore'];
  const boss = createBoss(bossIds[floor - 1] || 'slimeKing');
  enemies.push(boss);
  initBattle();
  Scene.transition('BATTLE');
}

function initBattle() {
  drawPile = shuffle(deck.slice());
  discardPile = []; exhaustPile = []; hand = [];
  turnNum = 0; turnPhase = 'player';
  selectedCardIdx = -1; cardsPlayedThisTurn = 0;
  attacksPlayedThisTurn = 0; nextAtkBonus = 0;
  thornsActive = 0; retainBlock = false; costReduction = 0;
  reflectActive = 0; popups.clear(); discardCount = 0;
  chainBonusAccum = 0; alchemyMode = false;
  battleAnimTimer = 0;
  positionEnemies();
  startPlayerTurn();
}

function startPlayerTurn() {
  /* R-8: 이전 턴 무피격 보너스 — 첫 턴(turnNum>0) 이후만 */
  if (turnNum > 0 && !playerDamagedThisTurn) {
    addScore(20, '무피격 턴');
    addPopup(engine.W * 0.25, engine.H * 0.3, '+20 무피격!', COL.gold);
  }
  playerDamagedThisTurn = false;
  turnNum++;
  if (!retainBlock) playerBlock = 0;
  retainBlock = false;
  playerEnergy = maxEnergy;
  if (relics.includes('energyCore')) playerEnergy = Math.max(playerEnergy, 4);
  cardsPlayedThisTurn = 0; attacksPlayedThisTurn = 0;
  nextAtkBonus = 0; thornsActive = 0; costReduction = 0;
  reflectActive = 0; chainBonusAccum = 0;
  /* HIGH-1: 플레이어 독 피해 처리 */
  if (playerPoison > 0) {
    playerHP -= playerPoison;
    addPopup(engine.W * 0.25, engine.H * 0.45, '☠ 독 ' + playerPoison, '#a855f7');
    spawnBattleEffect('effectPoison', engine.W * 0.15, engine.H * 0.35, 0.5);
    playerPoison = Math.max(0, playerPoison - 1);
  }
  /* HIGH-2: 플레이어 취약 감소 */
  if (playerVulnerable > 0) playerVulnerable--;
  // 유물 효과
  if (relics.includes('spikeShield')) playerBlock += 2;
  if (relics.includes('poisonFlower')) enemies.forEach(e => { e.poison += 1; });
  const drawCount = 5 + (relics.includes('drawEngine') ? 1 : 0);
  drawCards(drawCount);
  selectedCardIdx = -1;
  turnPhase = 'player';
  rebuildBattleButtons();
}

function endPlayerTurn() {
  turnPhase = 'discard';
  clearDynamicButtons();
  /* R-8: 카드 콤보 보너스 — 한 턴에 4장 이상 사용 시 */
  if (cardsPlayedThisTurn >= 4) {
    addScore(30, '카드 콤보');
    addPopup(engine.W * 0.5, engine.H * 0.3, '콤보 +30!', COL.gold);
  }
  // 손패를 버리기 더미로
  /* H-5: 적 블록 초기화 — 적 턴 시작 시 */
  enemies.forEach(e => { e.block = 0; });
  while (hand.length > 0) {
    discardPile.push(hand.pop());
    discardCount++;
  }
  battleAnimTimer = 0;
  turnPhase = 'enemy';
}

/* ═══════════════════════════════════════════════════════════
   SCENE: BATTLE
   ═══════════════════════════════════════════════════════════ */

Scene.register('BATTLE', {
  enter() {
    inputDelay = 0.2;
    enemyActionIdx = 0; enemyActionTimer = 0;
    deckViewMode = null; battleEffects = [];
    const w = engine.W, h = engine.H;
    const safe = safeArea(w, h);
    const portrait = isPortrait(w, h);
    const mobile = isMobileView(w);
    // 턴 종료 버튼 — 모바일에서 더 크게
    const endBtnW = mobile ? Math.max(110, w * 0.25) : Math.max(100, w * 0.12);
    const endBtnH = Math.max(48, 48);
    const endBtnY = portrait ? safe.y + safe.h * 0.55 : safe.y + safe.h * 0.62;
    new Button({
      x: w * 0.5 - endBtnW / 2, y: endBtnY, w: endBtnW, h: endBtnH,
      text: '턴 종료', key: ['KeyE'],
      color: '#665533',
      fontSize: Math.max(13, Math.round(fontSize(15, w, h))),
      onClick: () => { if (turnPhase === 'player') endPlayerTurn(); },
    });
    // 포션 버튼 — 모바일에서 위치 조정
    const potBtnW = mobile ? Math.max(90, w * 0.2) : Math.max(90, w * 0.08);
    for (let i = 0; i < potions.length; i++) {
      if (potions[i]) {
        const pd = POTIONS[potions[i]];
        new Button({
          x: portrait ? w * 0.55 + i * (potBtnW + 8) : w * 0.01,
          y: portrait ? safe.y + safe.h * 0.55 : safe.y + safe.h * 0.75 + i * 52,
          w: potBtnW, h: 48,
          text: pd.name, key: [i === 0 ? 'KeyQ' : 'KeyW'],
          color: '#884444', fontSize: 11,
          onClick: () => usePotion(i),
        });
      }
    }
    // ★ 첫 턴 카드/적 버튼 생성 — Scene.transition이 Button._active를 클리어하므로
    //   enter() 내에서 rebuildBattleButtons()를 다시 호출해야 첫 턴 터치 조작 가능
    if (turnPhase === 'player' && hand.length > 0) {
      rebuildBattleButtons();
    }
  },
  update(dt, inp) {
    inputDelay = Math.max(0, inputDelay - dt / 1000);
    tween.update(dt);
    particles.update(dt);
    updatePopups(dt);
    updateBattleEffects(dt);
    shakeIntensity *= 0.92;

    /* R-10: Tab 키로 덱 보기 토글 */
    if (inp.jp('Tab')) {
      if (deckViewMode === null) deckViewMode = 'draw';
      else if (deckViewMode === 'draw') deckViewMode = 'discard';
      else deckViewMode = null;
    }

    if (turnPhase === 'player' && inputDelay <= 0) {
      /* Enter/Space: 선택된 공격카드를 첫번째 적에게 사용 */
      if (selectedCardIdx >= 0 && (inp.jp('Space') || inp.jp('Enter'))) {
        const c = cardData(hand[selectedCardIdx]);
        if (c && c.type === 'attack' && enemies.length > 0) {
          const cardId = hand[selectedCardIdx];
          if (playCard(cardId, 0)) {
            hand.splice(selectedCardIdx, 1);
            selectedCardIdx = -1;
            rebuildBattleButtons(); checkBattleEnd();
          }
        }
      }
    }

    // 적 턴 처리
    if (turnPhase === 'enemy') {
      enemyActionTimer += dt;
      if (enemyActionTimer > 500) {
        if (enemyActionIdx < enemies.length) {
          const e = enemies[enemyActionIdx];
          executeEnemyAction(e, enemyActionIdx);
          // 독 피해
          if (e.poison > 0) {
            e.hp -= e.poison;
            addPopup(e.x, e.y - 10, '☠' + e.poison, '#a855f7');
            e.poison = Math.max(0, e.poison - 1);
          }
          // DOT
          if (e.dot > 0 && e.dotTurns > 0) {
            e.hp -= e.dot;
            addPopup(e.x, e.y, '-' + e.dot, COL.red);
            e.dotTurns--;
            if (e.dotTurns <= 0) e.dot = 0;
          }
          // 취약/약화 감소
          if (e.vulnerable > 0) e.vulnerable--;
          if (e.weakened > 0) e.weakened--;
          // 보스 페이즈 체크
          if (e.isBoss && e.phase === 1 && e.hp <= e.maxHp * e.threshold) {
            e.phase = 2; e.patternIdx = 0;
            addPopup(e.x, e.y - 40, '페이즈 2!', COL.red);
            shakeIntensity = 12;
            sound.sfx('explosion');
          }
          /* H-5: 블록은 턴 시작에서 이미 초기화됨 — 적이 이번턴 쌓은 블록은 유지 */
          enemyActionIdx++;
          enemyActionTimer = 0;
        } else {
          checkEnemyDeath();
          if (!checkBattleEnd()) {
            enemyActionIdx = 0;
            startPlayerTurn();
          }
        }
      }
    }

    // HP 체크
    if (playerHP <= 0 && turnPhase !== 'gameover') {
      turnPhase = 'gameover';
      addScore(playerHP > 0 ? 0 : 0, '패배');
      Scene.setTimeout(() => GameFlow.gameOver({ score }), 1500);
    }
  },
  render(ctx, w, h) {
    const safe = safeArea(w, h);
    const shake = UI.shake(shakeIntensity);
    ctx.save();
    ctx.translate(shake.x, shake.y);
    renderBG(ctx, w, h, currentFloor);
    // 적 렌더
    enemies.forEach(e => renderEnemy(ctx, e, w, h));
    // 플레이어 HUD
    renderPlayerHUD(ctx, w, h);
    // 손패 렌더 — 모바일 대응 레이아웃
    const layout = getHandLayout(w, h);
    const { cardH, cardW, gap, handY, startX } = layout;
    // 손패 배경
    ctx.fillStyle = 'rgba(27,40,56,0.7)';
    ctx.fillRect(0, handY - 10, w, cardH + 22);
    for (let i = 0; i < hand.length; i++) {
      const cx = startX + i * (cardW + gap);
      const sel = selectedCardIdx === i;
      const hov = cardButtons[i] ? cardButtons[i].hover : false;
      renderCard(ctx, hand[i], cx, handY - (sel ? 15 : 0), cardW, cardH, sel, hov);
    }
    // 턴 표시
    const turnText = turnPhase === 'player' ? '🎴 플레이어 턴' : (turnPhase === 'enemy' ? '⚔ 적 턴' : '');
    UI.text(ctx, turnText, w / 2, safe.y + 12, { size: fontSize(14, w, h), color: COL.text });
    UI.text(ctx, '턴 ' + turnNum + '  |  뽑기 ' + drawPile.length + '  버림 ' + discardPile.length,
      w / 2, safe.y + 28, { size: fontSize(11, w, h), color: COL.dim });
    /* H-6: 연금술 모드 안내 */
    if (alchemyMode) {
      ctx.fillStyle = 'rgba(168,85,247,0.85)';
      ctx.fillRect(w * 0.1, handY - 55, w * 0.8, 42);
      UI.text(ctx, '카드 연금술: 소멸할 카드를 선택하세요', w / 2, handY - 35, { size: fontSize(14, w, h), bold: true, color: '#fff' });
    }
    /* 모바일: 선택된 카드 정보 표시 (카드가 작아서 읽기 어려울 수 있으므로) */
    if (isMobileView(w) && selectedCardIdx >= 0 && selectedCardIdx < hand.length) {
      const c = cardData(hand[selectedCardIdx]);
      if (c) {
        ctx.fillStyle = 'rgba(27,40,56,0.9)';
        ctx.fillRect(w * 0.05, handY - 50, w * 0.9, 38);
        UI.text(ctx, c.name + ' (⚡' + Math.max(0, c.cost - costReduction) + ') — ' + c.desc, w / 2, handY - 32,
          { size: fontSize(12, w, h), color: COL.text });
      }
    }
    // 전투 이펙트 오버레이
    renderBattleEffects(ctx, w, h);
    // 팝업
    renderPopups(ctx, w, h);
    particles.render(ctx);
    ctx.restore();

    /* R-10: 덱 보기 오버레이 (Tab) */
    if (deckViewMode) {
      ctx.fillStyle = 'rgba(13,27,42,0.92)';
      ctx.fillRect(0, 0, w, h);
      const pile = deckViewMode === 'draw' ? drawPile : discardPile;
      const title = deckViewMode === 'draw' ? '뽑기 더미 (' + pile.length + '장)' : '버리기 더미 (' + pile.length + '장)';
      UI.text(ctx, title, w / 2, safe.y + safe.h * 0.06, { size: fontSize(22, w, h), bold: true, color: COL.cyan });
      UI.text(ctx, 'Tab: 전환  |  다시 Tab: 닫기', w / 2, safe.y + safe.h * 0.12, { size: fontSize(11, w, h), color: COL.dim });
      const cols = Math.max(3, Math.floor(w / 100));
      const cw2 = Math.min(80, (w - 40) / cols - 8);
      const ch2 = cw2 * 1.4;
      for (let i = 0; i < pile.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = (w - cols * (cw2 + 8)) / 2 + col * (cw2 + 8);
        const cy = safe.y + safe.h * 0.16 + row * (ch2 + 6);
        if (cy + ch2 > h) break;
        renderCard(ctx, pile[i], cx, cy, cw2, ch2, false, false);
      }
    }
  },
});

function checkBattleEnd() {
  if (playerHP <= 0) return true;
  if (enemies.length === 0) {
    turnPhase = 'victory';
    const isBoss = mapNodes[currentNodeIdx - 1]?.type === 'boss';
    if (isEliteBattle) { addScore(100, '엘리트 승리'); battleRewardGold = MathUtil.randInt(25, 40); }
    else if (isBoss) { addScore(200, '보스 승리'); battleRewardGold = MathUtil.randInt(40, 60); }
    else { addScore(50, '전투 승리'); battleRewardGold = MathUtil.randInt(10, 25); }
    gold += battleRewardGold;
    Scene.setTimeout(() => {
      if (isBoss) {
        addScore(150 * currentFloor, currentFloor + '층 클리어');
        if (currentFloor >= 3) {
          gameWon = true;
          addScore(500, '완주 보너스');
          addScore(playerHP * 2, 'HP 보너스');
          addScore(relics.length * 80, '유물 보너스');
          Save.setHighScore(GAME_ID, score);
          Scene.transition('VICTORY');
        } else {
          currentFloor++;
          mapNodes = generateMap(currentFloor);
          currentNodeIdx = 0; visitedNodes.clear();
          Scene.transition('REWARD', { isElite: false, isBoss: true });
        }
      } else {
        Scene.transition('REWARD', { isElite: isEliteBattle });
      }
    }, 1000);
    return true;
  }
  return false;
}

function usePotion(idx) {
  if (idx >= potions.length || !potions[idx]) return;
  const p = POTIONS[potions[idx]];
  if (p.effect === 'heal') { playerHP = Math.min(playerMaxHP, playerHP + p.value); addPopup(engine.W * 0.2, engine.H * 0.4, '+' + p.value, COL.green); }
  if (p.effect === 'damage' && enemies.length > 0) { enemies[0].hp -= p.value; addPopup(enemies[0].x, enemies[0].y - 20, '-' + p.value, COL.red); checkEnemyDeath(); }
  if (p.effect === 'block') { playerBlock += p.value; addPopup(engine.W * 0.2, engine.H * 0.4, '+' + p.value + '🛡', COL.green); }
  if (p.effect === 'energy') { playerEnergy += p.value; }
  potions[idx] = null;
  sound.sfx('powerup');
}

    const btnW = Math.min(240, w * 0.6);
    new Button({
      x: w / 2 - btnW / 2, y: safe.y + safe.h * 0.72, w: btnW, h: 56,
      text: '타이틀로', key: ['Space', 'Enter'],
      color: COL.gold, fontSize: 18,
      onClick: () => Scene.transition('TITLE'),
    });
  },
  update(dt) { tween.update(dt); particles.update(dt); },
  render(ctx, w, h) {
    const safe = safeArea(w, h);
    ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, w, h);
    if (Math.random() < 0.1) {
      particles.emit(MathUtil.randRange(0, w), 0, 2, { color: COL.gold, speed: 80, life: 2, size: 4 });
    }
    particles.render(ctx);
    UI.text(ctx, '🏆 승리!', w / 2, safe.y + safe.h * 0.2, { size: fontSize(48, w, h), bold: true, color: COL.gold, glow: COL.gold });
    UI.text(ctx, '폴리곤 코어를 무찌르고 탑을 정복했습니다!', w / 2, safe.y + safe.h * 0.35, { size: fontSize(16, w, h), color: COL.text });
    const g = getGrade();
    UI.text(ctx, '등급: ' + g.grade, w / 2, safe.y + safe.h * 0.45, { size: fontSize(36, w, h), bold: true, color: g.color, glow: g.color });
    UI.text(ctx, '점수: ' + score, w / 2, safe.y + safe.h * 0.55, { size: fontSize(22, w, h), color: COL.gold });
  },
});

/* ═══════════════════════════════════════════════════════════
   SCENE: GAMEOVER (커스텀 — platform-wisdom #6: 명시 전달)
   ═══════════════════════════════════════════════════════════ */
Scene.register('GAMEOVER', {
  enter(data) {
    const w = engine.W, h = engine.H;
    const safe = safeArea(w, h);
    Save.setHighScore(GAME_ID, score);
    const btnW = Math.min(240, w * 0.6);
    new Button({
      x: w / 2 - btnW / 2, y: safe.y + safe.h * 0.6, w: btnW, h: 56,
      text: '재시작', key: ['KeyR', 'Space', 'Enter'],
      color: COL.red, fontSize: 18,
      onClick: () => {
        resetGameState();
        Scene.transition('DIFF_SELECT');
      },
    });
    new Button({
      x: w / 2 - btnW / 2, y: safe.y + safe.h * 0.72, w: btnW, h: 48,
      text: '타이틀', key: ['Escape'],
      color: COL.dim, fontSize: 14,
      onClick: () => Scene.transition('TITLE'),
    });
  },
  update(dt) { tween.update(dt); },
  render(ctx, w, h) {
    const safe = safeArea(w, h);
    ctx.fillStyle = 'rgba(13,27,42,0.95)'; ctx.fillRect(0, 0, w, h);
    UI.text(ctx, 'GAME OVER', w / 2, safe.y + safe.h * 0.25, { size: fontSize(48, w, h), bold: true, color: COL.red, glow: COL.red });
    const g = getGrade();
    UI.text(ctx, '등급: ' + g.grade, w / 2, safe.y + safe.h * 0.38, { size: fontSize(28, w, h), bold: true, color: g.color });
    UI.text(ctx, '점수: ' + score, w / 2, safe.y + safe.h * 0.47, { size: fontSize(20, w, h), color: COL.gold });
    UI.text(ctx, currentFloor + '층에서 쓰러졌습니다', w / 2, safe.y + safe.h * 0.54, { size: fontSize(14, w, h), color: COL.dim });
  },
});

/* ═══════════════════════════════════════════════════════════
   GAMEFLOW INIT (커스텀 씬 명시 전달 — platform-wisdom #6)
   ═══════════════════════════════════════════════════════════ */
GameFlow.init({
  titleText: '폴리 스파이어',
  title: Scene._states.TITLE,
  play: Scene._states.BATTLE,     // play는 필수지만 실제로는 MAP→BATTLE 흐름
  gameover: Scene._states.GAMEOVER,
  onReset: resetGameState,
  stuckMs: 45000,  /* LOW-1 fix: 60초→45초 */
});

/* ═══════════════════════════════════════════════════════════
   MAIN INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  // 에셋 로드
  const manifest = await fetch('assets/manifest.json').then(r => r.json()).catch(() => null);
  if (manifest && manifest.assets) {
    const assetMap = {};
    for (const [key, info] of Object.entries(manifest.assets)) {
      assetMap[key] = 'assets/' + info.file;
    }
    await assets.load(assetMap, { timeoutMs: 10000 });
  }

  Scene.bind({ tween, particles });

  engine._update = (dt) => {
    Scene.update(dt, input);
    input.flush();
  };
  engine._render = (ctx, w, h) => {
    Scene.render(ctx, w, h);
  };

  GameFlow.start();
  engine.start();
}
init();
</script>
