<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 384">
  <defs>
    <linearGradient id="frameBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce0"/>
      <stop offset="50%" stop-color="#c8ccd0"/>
      <stop offset="100%" stop-color="#9aa0a6"/>
    </linearGradient>
    <linearGradient id="artAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="textAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2636"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="triPattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <polygon points="0,24 12,0 24,24" fill="none" stroke="#c8ccd0" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Card outer shape -->
  <rect x="4" y="4" width="248" height="376" rx="12" fill="url(#frameBg)" stroke="url(#borderGrad)" stroke-width="3"/>

  <!-- Triangle pattern overlay -->
  <rect x="8" y="8" width="240" height="368" rx="10" fill="url(#triPattern)"/>

  <!-- Inner border line -->
  <rect x="12" y="12" width="232" height="360" rx="8" fill="none" stroke="#c8ccd0" stroke-width="1" opacity="0.3"/>

  <!-- Art area (upper) -->
  <rect x="18" y="46" width="220" height="160" rx="4" fill="url(#artAreaBg)" stroke="#9aa0a6" stroke-width="1.5" filter="url(#innerShadow)"/>

  <!-- Art area corner accents -->
  <polygon points="18,46 38,46 18,66" fill="#c8ccd0" opacity="0.15"/>
  <polygon points="238,46 218,46 238,66" fill="#c8ccd0" opacity="0.1"/>

  <!-- Card name area -->
  <rect x="18" y="18" width="220" height="24" rx="3" fill="#1b2838" stroke="#9aa0a6" stroke-width="1" opacity="0.8"/>

  <!-- Cost circle (top-left) -->
  <circle cx="30" cy="30" r="14" fill="#1b2838" stroke="#c8ccd0" stroke-width="2"/>
  <circle cx="30" cy="30" r="10" fill="#0d1b2a"/>

  <!-- Divider line -->
  <line x1="24" y1="216" x2="232" y2="216" stroke="#c8ccd0" stroke-width="1" opacity="0.4"/>

  <!-- Text/description area (lower) -->
  <rect x="18" y="222" width="220" height="120" rx="4" fill="url(#textAreaBg)" stroke="#9aa0a6" stroke-width="1" opacity="0.8"/>

  <!-- Bottom decorative bar -->
  <rect x="18" y="350" width="220" height="16" rx="3" fill="#1b2838" stroke="#9aa0a6" stroke-width="1" opacity="0.6"/>

  <!-- Corner decorations - low-poly style -->
  <polygon points="4,4 18,4 4,18" fill="#c8ccd0" opacity="0.3"/>
  <polygon points="252,4 238,4 252,18" fill="#c8ccd0" opacity="0.25"/>
  <polygon points="4,380 18,380 4,366" fill="#9aa0a6" opacity="0.2"/>
  <polygon points="252,380 238,380 252,366" fill="#9aa0a6" opacity="0.18"/>

  <!-- Subtle highlight on top edge -->
  <line x1="16" y1="5" x2="240" y2="5" stroke="#e0e4e8" stroke-width="1" opacity="0.3"/>

  <!-- Polygon edge decoration along sides -->
  <line x1="6" y1="120" x2="6" y2="260" stroke="#c8ccd0" stroke-width="0.5" opacity="0.2"/>
  <line x1="250" y1="120" x2="250" y2="260" stroke="#9aa0a6" stroke-width="0.5" opacity="0.15"/>
</svg>