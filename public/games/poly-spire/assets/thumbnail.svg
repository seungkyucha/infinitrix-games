<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#6c3cf7"/>
      <stop offset="100%" stop-color="#3a1a6e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="30" cy="25" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="90" cy="50" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="18" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="35" r="1.3" fill="#fff" opacity="0.8"/>
  <circle cx="320" cy="20" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="370" cy="55" r="1.1" fill="#fff" opacity="0.6"/>
  <circle cx="60" cy="80" r="0.7" fill="#fff" opacity="0.4"/>
  <circle cx="340" cy="75" r="1" fill="#fff" opacity="0.5"/>
  <g filter="url(#glow2)">
    <polygon points="200,30 230,120 220,120 240,200 210,200 225,260 175,260 190,200 160,200 180,120 170,120" fill="url(#tower)" opacity="0.9"/>
    <polygon points="200,30 215,75 200,80 185,75" fill="#00d4ff" opacity="0.4"/>
    <polygon points="215,75 230,120 210,125 200,80" fill="#5533cc" opacity="0.3"/>
    <polygon points="185,75 200,80 190,125 170,120" fill="#00aadd" opacity="0.3"/>
    <circle cx="200" cy="35" r="8" fill="#00d4ff" opacity="0.6"/>
    <circle cx="200" cy="35" r="4" fill="#fff" opacity="0.8"/>
  </g>
  <g transform="translate(80, 140)">
    <polygon points="0,40 20,20 40,40 35,80 5,80" fill="#4a6fa5" stroke="#00d4ff" stroke-width="1"/>
    <polygon points="10,25 20,8 30,25" fill="#6a8fc5" stroke="#00d4ff" stroke-width="1"/>
    <line x1="14" y1="18" x2="26" y2="18" stroke="#00d4ff" stroke-width="1.5"/>
    <polygon points="-5,35 -15,50 -5,65 5,50" fill="#3a5f95" stroke="#00d4ff" stroke-width="1"/>
    <line x1="40" y1="35" x2="60" y2="15" stroke="#ffd700" stroke-width="2.5" filter="url(#glow)"/>
    <polygon points="58,17 64,11 60,9 56,13" fill="#ffd700"/>
    <polygon points="8,78 5,105 15,105 18,78" fill="#3a5080"/>
    <polygon points="22,78 25,105 35,105 32,78" fill="#3a5080"/>
  </g>
  <g transform="translate(280, 100) rotate(-15)">
    <rect x="0" y="0" width="45" height="65" rx="4" fill="#1a1a2e" stroke="url(#card)" stroke-width="2"/>
    <text x="22.5" y="35" text-anchor="middle" fill="#ffd700" font-size="22" font-family="serif">&#9876;</text>
    <rect x="5" y="48" width="35" height="3" rx="1" fill="#ffd700" opacity="0.5"/>
  </g>
  <g transform="translate(300, 130) rotate(10)">
    <rect x="0" y="0" width="45" height="65" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <text x="22.5" y="35" text-anchor="middle" fill="#00d4ff" font-size="22" font-family="serif">&#9781;</text>
    <rect x="5" y="48" width="35" height="3" rx="1" fill="#00d4ff" opacity="0.5"/>
  </g>
  <polygon points="0,260 50,250 120,255 200,260 280,252 350,258 400,255 400,300 0,300" fill="#0f0f2a" opacity="0.8"/>
  <text x="200" y="285" text-anchor="middle" fill="#e0e0f0" font-size="22" font-family="system-ui, sans-serif" font-weight="bold" filter="url(#glow)">폴리 스파이어</text>
</svg>
