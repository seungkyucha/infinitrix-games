<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="triGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="triGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow layer -->
  <polygon points="32,4 6,56 58,56" fill="#00d4ff" opacity="0.15" filter="url(#triGlow)"/>
  <!-- Main triangle body -->
  <g filter="url(#triGlow)">
    <!-- Left face -->
    <polygon points="32,8 10,52 32,42" fill="#0099cc" stroke="#00d4ff" stroke-width="0.5" opacity="0.85"/>
    <!-- Right face -->
    <polygon points="32,8 54,52 32,42" fill="#00bbee" stroke="#00d4ff" stroke-width="0.5" opacity="0.85"/>
    <!-- Bottom face -->
    <polygon points="10,52 54,52 32,42" fill="#006699" stroke="#00d4ff" stroke-width="0.5" opacity="0.7"/>
  </g>
  <!-- Highlight edge -->
  <line x1="32" y1="8" x2="10" y2="52" stroke="#88ffff" stroke-width="1" opacity="0.6"/>
  <!-- Center bright point -->
  <circle cx="32" cy="36" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="32" cy="36" r="2" fill="#00ffff" opacity="0.8"/>
</svg>