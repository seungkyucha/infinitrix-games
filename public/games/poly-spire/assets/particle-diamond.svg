<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="diaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffee44" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cc8800" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="diaGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <polygon points="32,2 8,32 32,62 56,32" fill="#ffd700" opacity="0.12" filter="url(#diaGlow)"/>
  <!-- Diamond body - 4 faces -->
  <g filter="url(#diaGlow)">
    <!-- Top-left face -->
    <polygon points="32,6 12,32 32,34" fill="#ffcc00" stroke="#ffd700" stroke-width="0.5" opacity="0.9"/>
    <!-- Top-right face -->
    <polygon points="32,6 52,32 32,34" fill="#ffdd44" stroke="#ffd700" stroke-width="0.5" opacity="0.9"/>
    <!-- Bottom-left face -->
    <polygon points="12,32 32,58 32,34" fill="#cc9900" stroke="#ffd700" stroke-width="0.5" opacity="0.8"/>
    <!-- Bottom-right face -->
    <polygon points="52,32 32,58 32,34" fill="#ddaa00" stroke="#ffd700" stroke-width="0.5" opacity="0.8"/>
  </g>
  <!-- Highlight -->
  <line x1="32" y1="6" x2="12" y2="32" stroke="#ffffaa" stroke-width="1.2" opacity="0.6"/>
  <!-- Center sparkle -->
  <circle cx="32" cy="30" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="32" cy="30" r="2" fill="#ffd700" opacity="0.9"/>
  <!-- Small sparkle points -->
  <circle cx="24" cy="22" r="1" fill="#ffffcc" opacity="0.7"/>
  <circle cx="40" cy="26" r="1" fill="#ffffcc" opacity="0.5"/>
</svg>