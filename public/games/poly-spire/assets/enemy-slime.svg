<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Shadow underneath -->
  <g id="shadow">
    <ellipse cx="256" cy="440" rx="130" ry="30" fill="#0a2010" opacity="0.5"/>
  </g>

  <!-- Body polygons: low-poly triangulated blob -->
  <g id="body-polygons" stroke="#1a5a2a" stroke-width="2" stroke-linejoin="round">
    <!-- Bottom row -->
    <polygon points="140,380 200,410 160,410" fill="#2d8a4e"/>
    <polygon points="140,380 200,410 180,350" fill="#33aa55"/>
    <polygon points="200,410 280,420 240,370" fill="#228844"/>
    <polygon points="280,420 350,410 310,360" fill="#2d8a4e"/>
    <polygon points="350,410 380,380 310,360" fill="#33aa55"/>
    <polygon points="200,410 240,370 180,350" fill="#44cc66"/>

    <!-- Middle row -->
    <polygon points="140,380 180,350 120,300" fill="#44cc66"/>
    <polygon points="180,350 240,370 200,290" fill="#55dd77"/>
    <polygon points="240,370 310,360 270,280" fill="#44cc66"/>
    <polygon points="310,360 380,380 350,300" fill="#33aa55"/>
    <polygon points="180,350 200,290 120,300" fill="#33aa55"/>
    <polygon points="240,370 270,280 200,290" fill="#2d8a4e"/>
    <polygon points="310,360 350,300 270,280" fill="#44cc66"/>

    <!-- Upper row -->
    <polygon points="120,300 200,290 160,220" fill="#55dd77"/>
    <polygon points="200,290 270,280 230,200" fill="#44cc66"/>
    <polygon points="270,280 350,300 320,220" fill="#55dd77"/>
    <polygon points="200,290 230,200 160,220" fill="#33aa55"/>
    <polygon points="270,280 320,220 230,200" fill="#2d8a4e"/>

    <!-- Top cap -->
    <polygon points="160,220 230,200 190,150" fill="#44cc66"/>
    <polygon points="230,200 320,220 280,160" fill="#33aa55"/>
    <polygon points="230,200 280,160 190,150" fill="#55dd77"/>
    <polygon points="190,150 280,160 240,120" fill="#44cc66"/>
  </g>

  <!-- Highlight polygons (top-left sheen) -->
  <g id="highlights">
    <polygon points="160,220 230,200 190,150" fill="#88ffaa" opacity="0.35"/>
    <polygon points="190,150 280,160 240,120" fill="#aaffcc" opacity="0.3"/>
    <polygon points="120,300 200,290 160,220" fill="#77eeaa" opacity="0.2"/>
    <polygon points="190,150 230,200 160,220" fill="#66dd88" opacity="0.15"/>
  </g>

  <!-- Eyes -->
  <g id="eyes">
    <!-- Left eye -->
    <ellipse cx="200" cy="260" rx="28" ry="32" fill="white" stroke="#1a5a2a" stroke-width="2"/>
    <ellipse cx="208" cy="264" rx="13" ry="16" fill="#1a1a2e"/>
    <circle cx="213" cy="258" r="5" fill="white"/>

    <!-- Right eye -->
    <ellipse cx="300" cy="260" rx="28" ry="32" fill="white" stroke="#1a5a2a" stroke-width="2"/>
    <ellipse cx="308" cy="264" rx="13" ry="16" fill="#1a1a2e"/>
    <circle cx="313" cy="258" r="5" fill="white"/>
  </g>

  <!-- Mouth (slightly menacing grin) -->
  <g id="mouth">
    <path d="M220,310 Q250,335 280,310" fill="none" stroke="#1a5a2a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Dripping drops at bottom -->
  <g id="drips" fill="#33aa55" stroke="#1a5a2a" stroke-width="1.5">
    <path d="M180,410 Q178,430 175,445 Q172,450 178,448 Q184,446 182,430 Z" fill="#44cc66"/>
    <path d="M240,418 Q238,440 236,458 Q233,464 239,462 Q245,460 243,440 Z" fill="#33aa55"/>
    <path d="M310,415 Q308,432 306,442 Q303,447 309,445 Q315,443 313,432 Z" fill="#44cc66"/>
    <path d="M350,405 Q349,418 347,428 Q345,432 349,430 Q353,428 352,418 Z" fill="#2d8a4e"/>
    <path d="M155,400 Q153,412 151,420 Q149,424 153,422 Q157,420 156,412 Z" fill="#33aa55"/>
  </g>

  <!-- Small specular highlight dot -->
  <g id="specular">
    <ellipse cx="200" cy="155" rx="18" ry="10" fill="white" opacity="0.25" transform="rotate(-20,200,155)"/>
  </g>
</svg>