<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55dd77"/>
      <stop offset="100%" stop-color="#228844"/>
    </linearGradient>
    <linearGradient id="shieldHighlight" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#88ffaa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#44cc66" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#0d1b2a" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Shadow base -->
  <ellipse cx="64" cy="118" rx="30" ry="6" fill="#0d1b2a" opacity="0.4"/>
  <!-- Shield body - low-poly with visible faces -->
  <g filter="url(#shadow)">
    <!-- Main shield shape -->
    <polygon points="64,12 20,40 20,78 64,116 108,78 108,40" fill="url(#shieldMain)" stroke="#1a5a2a" stroke-width="1.5"/>
    <!-- Face divisions (low-poly triangulation) -->
    <!-- Top-left face -->
    <polygon points="64,12 20,40 64,50" fill="#44cc66" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Top-right face -->
    <polygon points="64,12 108,40 64,50" fill="#55dd77" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Mid-left upper -->
    <polygon points="20,40 20,62 64,50" fill="#33aa55" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Mid-right upper -->
    <polygon points="108,40 108,62 64,50" fill="#44cc66" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Mid-left lower -->
    <polygon points="20,62 20,78 64,80" fill="#2d8a4e" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Center -->
    <polygon points="20,62 64,50 108,62 64,80" fill="#44cc66" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Mid-right lower -->
    <polygon points="108,62 108,78 64,80" fill="#33aa55" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Bottom-left -->
    <polygon points="20,78 64,116 64,80" fill="#228844" stroke="#1a5a2a" stroke-width="0.8"/>
    <!-- Bottom-right -->
    <polygon points="108,78 64,116 64,80" fill="#2d8a4e" stroke="#1a5a2a" stroke-width="0.8"/>
  </g>
  <!-- Shield emblem - geometric diamond -->
  <g filter="url(#glow)">
    <polygon points="64,38 50,58 64,78 78,58" fill="#00d4ff" opacity="0.8" stroke="#00ffff" stroke-width="1"/>
    <polygon points="64,38 50,58 64,52" fill="#44eeff" opacity="0.6"/>
    <polygon points="64,38 78,58 64,52" fill="#00bbdd" opacity="0.6"/>
  </g>
  <!-- Highlight reflection -->
  <polygon points="64,12 20,40 40,28" fill="url(#shieldHighlight)" opacity="0.5"/>
  <!-- Rim light top -->
  <path d="M64,12 L20,40" stroke="#88ffaa" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M64,12 L108,40" stroke="#66dd88" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- Small rivets -->
  <circle cx="42" cy="38" r="3" fill="#2a3a4a" stroke="#44cc66" stroke-width="0.5"/>
  <circle cx="86" cy="38" r="3" fill="#2a3a4a" stroke="#44cc66" stroke-width="0.5"/>
  <circle cx="42" cy="72" r="3" fill="#2a3a4a" stroke="#44cc66" stroke-width="0.5"/>
  <circle cx="86" cy="72" r="3" fill="#2a3a4a" stroke="#44cc66" stroke-width="0.5"/>
</svg>