// TweenManager (Cycle 2~6 stable, clearImmediate for Cycle 4 B1)
class TweenManager {
  constructor(){ this._tw=[]; this._rm=[]; }
  add(obj,prop,from,to,dur,ease,onDone){
    const t={obj,prop,from,to,dur,el:0,ease:ease||'lin',onDone};
    obj[prop]=from; this._tw.push(t); return t;
  }
  update(dt){
    for(let i=this._tw.length-1;i>=0;i--){
      const t=this._tw[i]; t.el+=dt;
      let p=Math.min(t.el/t.dur,1);
      p=TweenManager.ease(p,t.ease);
      t.obj[t.prop]=t.from+(t.to-t.from)*p;
      if(t.el>=t.dur){
        t.obj[t.prop]=t.to;
        this._rm.push(i);
        if(t.onDone) t.onDone();
      }
    }
    for(let i=0;i<this._rm.length;i++) this._tw.splice(this._rm[i],1);
    this._rm.length=0;
  }
  // Immediate clear — safe before add() (Cycle 4 B1)
  clearImmediate(){ this._tw.length=0; this._rm.length=0; }
  static ease(t,type){
    if(type==='eOut') return 1-(1-t)*(1-t);
    if(type==='eIn') return t*t;
    if(type==='eIO') return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    return t;
  }
}

// ObjectPool (Cycle 2 verified)
class ObjectPool {
  constructor(create,reset,n){
    this._p=[]; this._a=[]; this._c=create; this._r=reset;
    for(let i=0;i<n;i++) this._p.push(create());
  }
  acquire(){
    const o=this._p.pop()||this._c();
    o._active=true; this._a.push(o); return o;
  }
  release(o){
    o._active=false;
    const i=this._a.indexOf(o);
    if(i!==-1) this._a.splice(i,1);
    this._r(o); this._p.push(o);
  }
  forEach(fn){ for(let i=this._a.length-1;i>=0;i--) if(this._a[i]._active) fn(this._a[i],i); }
  clear(){ while(this._a.length){ const o=this._a.pop(); o._active=false; this._r(o); this._p.push(o); } }
  get count(){ return this._a.length; }
}

// Event tracking (Cycle 3 listen/destroy)
const _ev=[];
function listen(t,e,h,o){ t.addEventListener(e,h,o); _ev.push({t,e,h,o}); }
function destroyListeners(){ _ev.forEach(l=>l.t.removeEventListener(l.e,l.h,l.o)); _ev.length=0; }

// Seeded RNG (djb2 hash + LCG)
function dateSeed(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))&0xFFFFFFFF; return h>>>0; }
function seededRng(seed){ let s=seed; return ()=>{ s=(s*1664525+1013904223)&0xFFFFFFFF; return(s>>>0)/0xFFFFFFFF; }; }

// Pure math helpers
function clamp(v,lo,hi){ return v<lo?lo:v>hi?hi:v; }
function dist(x1,y1,x2,y2){ const dx=x1-x2,dy=y1-y2; return Math.sqrt(dx*dx+dy*dy); }
function distSq(x1,y1,x2,y2){ const dx=x1-x2,dy=y1-y2; return dx*dx+dy*dy; }
function norm(dx,dy){ const l=Math.sqrt(dx*dx+dy*dy)||1; return{x:dx/l,y:dy/l}; }
function lerp(a,b,t){ return a+(b-a)*t; }
function circHit(ax,ay,ar,bx,by,br){ return distSq(ax,ay,bx,by)<(ar+br)*(ar+br); }

// HP bar color gradient
function hpCol(ratio){
  const r=Math.round(lerp(255,0,ratio)), g=Math.round(lerp(51,255,ratio));
  return`rgb(${r},${g},${Math.round(lerp(51,102,ratio))})`;
}

/* ═══════════════════════════════════════════════
   §2. AUDIO SYSTEM (Web Audio procedural SFX)
   ═══════════════════════════════════════════════ */
let actx=null;
function initAudio(){ try{ actx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
function resumeAudio(){ if(actx&&actx.state==='suspended') actx.resume().catch(()=>{}); }
function tone(f1,f2,dur,wave,vol){
  if(!actx)return; try{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=wave||'square'; o.frequency.setValueAtTime(f1,actx.currentTime);
    o.frequency.linearRampToValueAtTime(f2,actx.currentTime+dur);
    g.gain.setValueAtTime(vol||0.1,actx.currentTime);
    g.gain.linearRampToValueAtTime(0,actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sfxShoot(){ tone(880,440,0.05,'square',0.08); }
function sfxHit(){ tone(220,110,0.08,'sawtooth',0.1); }
function sfxKill(){ tone(440,880,0.12,'square',0.1); }
function sfxGem(){ tone(660,880,0.1,'sine',0.08); }

function sfxGO(){ tone(440,110,0.5,'sine',0.12); }

      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,actx.currentTime+i*0.1);
      g.gain.linearRampToValueAtTime(0.1,actx.currentTime+i*0.1+0.05);
      g.gain.linearRampToValueAtTime(0,actx.currentTime+i*0.1+0.15);
      o.connect(g); g.connect(actx.destination);
      o.start(actx.currentTime+i*0.1); o.stop(actx.currentTime+i*0.1+0.2);
    });
  }catch(e){}
}
function sfxVictory(){

function resize(){
  dpr=window.devicePixelRatio||1;
  cw=window.innerWidth; ch=window.innerHeight;
  cvs.width=cw*dpr; cvs.height=ch*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scaleX=cw/VIEW_W; scaleY=ch/VIEW_H;
  buildGrid();
}
function buildGrid(){
  const ts=256;
  const oc=document.createElement('canvas'); oc.width=ts; oc.height=ts;
  const c=oc.getContext('2d');
  c.fillStyle=C.floor; c.fillRect(0,0,ts,ts);
  c.strokeStyle=C.grid; c.lineWidth=1;
  for(let x=0;x<=ts;x+=GRID_SIZE){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,ts); c.stroke(); }
  for(let y=0;y<=ts;y+=GRID_SIZE){ c.beginPath(); c.moveTo(0,y); c.lineTo(ts,y); c.stroke(); }
  gridTile=oc;
}
resize();
listen(window,'resize',resize);

// New player
function createPlayer(){
  return{
    x:WORLD_W/2, y:WORLD_H/2, r:PLAYER_R, hitR:PLAYER_HIT_R,
    hp:10, maxHp:10, baseSpd:BASE_SPEED,
    spdBonus:0, level:1, xp:0,
    iFrame:0, alpha:1,
    magnet:0, defense:0, critCh:0,
    knockPow:0, weaponN:1, fireInt:1.0, pierceN:0,
    orbN:0, shockR:0, shockD:0, lightN:0, lightD:0, regenInt:0,
    fireT:0, skills:{}
  };
}

// XP needed for level N→N+1
function calcXp(lv){ return Math.floor(5+(lv-1)*1.5+Math.pow(lv-1,1.3)); }

// Declarative wave config
function waveCfg(w){
  return{
    count:Math.min(40,8+w*2),
    interval:Math.max(0.3,1.5-w*0.06),
    hpMul:1+(w-1)*0.1,
    spdMul:1+(w-1)*0.03,
    fastR:Math.min(0.4,w*0.02),
    tankR:w>=5?Math.min(0.2,(w-4)*0.02):0,
    rangeR:w>=8?Math.min(0.15,(w-7)*0.02):0,
    isBoss:w%5===0
  };
}

// Damage calc with crit
function calcDmg(base,critCh){
  const crit=rng()<critCh;
  return{dmg:crit?base*2:base,crit};
}

// Update player position (pure)
function updatePlayer(p,dx,dy,dt,bnd){
  const spd=p.baseSpd*(1+p.spdBonus);
  p.x+=dx*spd*dt; p.y+=dy*spd*dt;
  p.x=clamp(p.x,bnd.l+p.r,bnd.r-p.r);
  p.y=clamp(p.y,bnd.t+p.r,bnd.b-p.r);
  if(p.iFrame>0) p.iFrame-=dt;
}

// Camera lerp (pure)
function updateCam(c,tx,ty,vw,vh,ww,wh,sm){
  c.x+=(tx-c.x-vw/2)*sm;
  c.y+=(ty-c.y-vh/2)*sm;
  c.x=clamp(c.x,0,ww-vw);
  c.y=clamp(c.y,0,wh-vh);
}

// World to screen
function w2s(wx,wy){ return{sx:wx-cam.x,sy:wy-cam.y}; }

// In viewport?
function inView(wx,wy,m){ return wx>cam.x-m&&wx<cam.x+VIEW_W+m&&wy>cam.y-m&&wy<cam.y+VIEW_H+m; }

// Spawn pos around viewport
function spawnPos(px,py,margin){
  const a=rng()*Math.PI*2;
  const d=Math.sqrt(VIEW_W*VIEW_W+VIEW_H*VIEW_H)/2+margin;
  return{x:clamp(px+Math.cos(a)*d,10,WORLD_W-10),y:clamp(py+Math.sin(a)*d,10,WORLD_H-10)};
}

// Pick skill choices
function pickSkills(pool,owned,count){
  const av=[];
  for(const s of pool){ const lv=owned[s.id]||0; if(lv<s.maxLv) av.push({...s,curLv:lv}); }
  for(let i=av.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1));[av[i],av[j]]=[av[j],av[i]]; }
  return av.slice(0,count);
}

/* ═══════════════════════════════════════════════
   §6. ENEMY LOGIC
   ═══════════════════════════════════════════════ */

// Move all enemies toward target (parameterized, no global P reference)
function updateEnemies(dt,target){
  enemies.forEach(e=>{
    if(e.spawnA<1){ e.spawnA=Math.min(1,e.spawnA+dt*3); return; }
    // knockback decay
    if(e.kx||e.ky){
      e.x+=e.kx*dt*8; e.y+=e.ky*dt*8;
      e.kx*=0.85; e.ky*=0.85;
      if(Math.abs(e.kx)<0.5&&Math.abs(e.ky)<0.5){e.kx=0;e.ky=0;}
    }
    if(e.flash>0) e.flash-=dt;
    const dx=target.x-e.x, dy=target.y-e.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/d, ny=dy/d;

    if(e.type==='boss') updateBoss(e,nx,ny,d,dt,target);
    else if(e.type==='ranged'){
      e.shootT-=dt;
      if(d>120){e.x+=nx*e.spd*dt; e.y+=ny*e.spd*dt;}
      if(d<=200&&e.shootT<=0){ e.shootT=2; fireEProj(e.x,e.y,nx,ny,120,1); }
    } else { e.x+=nx*e.spd*dt; e.y+=ny*e.spd*dt; }
    e.x=clamp(e.x,5,WORLD_W-5); e.y=clamp(e.y,5,WORLD_H-5);
  });
}

// Boss 3-phase AI (parameterized target)
function updateBoss(b,nx,ny,d,dt,target){
  const hr=b.hp/b.maxHp;
  const np=hr>0.6?1:hr>0.3?2:3;
  if(np!==b.phase){
    if(target.hp<=0)return; // GAMEOVER priority (Cycle 3)
    b.phase=np; b.phaseT=0; b.chargeT=0;
    shakeT=0.3; shakeI=4;
  }
  b.phaseT+=dt;
  if(b.phase===1||b.phase===3){
    b.chargeT-=dt;
    if(b.chargeT<=0){ b.chargeDir=norm(target.x-b.x,target.y-b.y); b.chargeT=3; }
    const sm=b.phase===3?3:2.5;
    if(b.chargeT>1){ b.x+=b.chargeDir.x*b.spd*sm*dt; b.y+=b.chargeDir.y*b.spd*sm*dt; }
    if(b.phase===3){ b.shootT-=dt; if(b.shootT<=0){ b.shootT=3;
      for(let i=0;i<4;i++){ const a=Math.PI*2/4*i; spawnEnemy(b.x+Math.cos(a)*40,b.y+Math.sin(a)*40,'normal'); }
    }}
  } else {
    b.shootT-=dt;
    if(b.shootT<=0){ b.shootT=1.5;
      for(let i=0;i<8;i++){ const a=Math.PI*2/8*i; fireEProj(b.x,b.y,Math.cos(a),Math.sin(a),120,1); }
    }
    b.x+=nx*b.spd*0.3*dt; b.y+=ny*b.spd*0.3*dt;
  }
}

// Spawn enemy projectile
function fireEProj(ex,ey,dx,dy,spd,dmg){
  const p=projs.acquire(); if(!p)return;
  p.x=ex;p.y=ey;p.dx=dx;p.dy=dy;p.spd=spd;p.dmg=dmg;
  p.r=4;p.pierce=0;p.isEnemy=true;p.trail.length=0;
}

// Spawn enemy at position
function spawnEnemy(x,y,type){
  if(enemies.count>=MAX_ENEMIES)return null;
  const cfg=waveCfg(wave);
  const e=enemies.acquire(); if(!e)return null;
  const base=E_STATS[type];
  e.x=x;e.y=y;e.type=type;e.flash=0;e.spawnA=0;
  e.kx=0;e.ky=0;e.phase=1;e.phaseT=0;e.chargeT=0;e.shootT=2;
  const hm=cfg.hpMul*(diff==='hard'?1.5:1);
  const sm=cfg.spdMul;
  e.hp=Math.ceil(base.hp*hm); e.maxHp=e.hp;
  e.spd=base.spd*sm; e.r=base.r; e.dmg=base.dmg;
  e.xp=base.xp; e.pts=base.pts;
  if(type==='boss'){ e.hp=Math.ceil((50+wave*10)*hm); e.maxHp=e.hp; e.pts=200+wave*20; }
  return e;
}

/* ═══════════════════════════════════════════════
   §7. COLLISION & COMBAT
   ═══════════════════════════════════════════════ */

function updateProjs(dt){
  projs.forEach(p=>{
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>5) p.trail.shift();
    p.x+=p.dx*p.spd*dt; p.y+=p.dy*p.spd*dt;
    if(p.x<-50||p.x>WORLD_W+50||p.y<-50||p.y>WORLD_H+50) projs.release(p);
  });
}

// Player projectiles vs enemies (parameterized player)
function hitProjEnemy(pl){
  projs.forEach(p=>{
    if(p.isEnemy)return;
    enemies.forEach(e=>{
      if(e.spawnA<0.5)return;
      if(!circHit(p.x,p.y,p.r,e.x,e.y,e.r))return;
      const{dmg,crit}=calcDmg(p.dmg,pl.critCh);
      e.hp-=dmg; e.flash=0.1; sfxHit();
      if(pl.knockPow>0){ const n=norm(e.x-pl.x,e.y-pl.y); e.kx=n.x*pl.knockPow; e.ky=n.y*pl.knockPow; }
      addFloat(e.x,e.y-e.r,'-'+dmg,crit?'#FFFF00':C.dmg,crit?18:14);
      spawnParts(p.x,p.y,4,C.proj);
      if(p.pierce>0) p.pierce--; else projs.release(p);
      if(e.hp<=0) killEnemy(e);
    });
  });
}

// Enemy projectiles vs player (parameterized player)
function hitEProjPlayer(pl){
  if(pl.iFrame>0)return;
  projs.forEach(p=>{
    if(!p.isEnemy)return;
    if(!circHit(p.x,p.y,p.r,pl.x,pl.y,pl.hitR))return;
    const dmg=Math.max(1,p.dmg-pl.defense);
    pl.hp-=dmg; pl.iFrame=IFRAME_DUR;
    sfxPhit(); addFloat(pl.x,pl.y-pl.r-10,'-'+dmg,C.dmg,16);
    projs.release(p); shakeT=0.15; shakeI=3;
  });
}

// Enemy contact vs player (parameterized player)
function hitEnemyPlayer(pl){
  if(pl.iFrame>0)return;
  enemies.forEach(e=>{
    if(e.spawnA<0.5)return;
    if(!circHit(e.x,e.y,e.r,pl.x,pl.y,pl.hitR))return;
    const dmg=Math.max(1,e.dmg-pl.defense);
    pl.hp-=dmg; pl.iFrame=IFRAME_DUR;
    sfxPhit(); addFloat(pl.x,pl.y-pl.r-10,'-'+dmg,C.dmg,16);
    shakeT=0.15; shakeI=3;
    const n=norm(e.x-pl.x,e.y-pl.y); e.kx=n.x*40; e.ky=n.y*40;
  });
}

// Gem pickup (parameterized player)
function pickGems(dt,pl){
  const mr=GEM_MAGNET_BASE+pl.magnet;
  gems.forEach(g=>{
    const d=dist(pl.x,pl.y,g.x,g.y);
    if(d<mr+20){ const n=norm(pl.x-g.x,pl.y-g.y); g.x+=n.x*GEM_ACCEL*dt; g.y+=n.y*GEM_ACCEL*dt; }
    if(d<15){ pl.xp+=g.xp; sfxGem(); spawnParts(g.x,g.y,3,C.gem); gems.release(g); }
  });
}

function killEnemy(e){
  sfxKill();
  combo++; comboT=COMBO_TIMEOUT;
  const mul=Math.min(3,1+combo*0.1);
  score+=Math.round(e.pts*mul);
  if(gems.count<MAX_GEMS){ const g=gems.acquire(); if(g){g.x=e.x;g.y=e.y;g.xp=e.xp;g.rot=0;} }
  spawnParts(e.x,e.y,8,eColor(e.type));
  if(e.type==='boss') boss=null;
  enemies.release(e);
}

function eColor(t){
  return t==='normal'?C.eNorm:t==='fast'?C.eFast:t==='tanker'?C.eTank:t==='ranged'?C.eRange:C.eBoss;
}

/* ═══════════════════════════════════════════════
   §8. WEAPON & SKILL SYSTEMS
   ═══════════════════════════════════════════════ */

// Auto-fire nearest enemy (parameterized player)
function fireWeapon(dt,pl){
  pl.fireT-=dt; if(pl.fireT>0)return;
  pl.fireT=pl.fireInt;
  let near=null,md=Infinity;
  enemies.forEach(e=>{ if(e.spawnA<0.5)return; const d=dist(pl.x,pl.y,e.x,e.y); if(d<md){md=d;near=e;} });
  if(!near||md>500)return;
  sfxShoot();
  const ba=Math.atan2(near.y-pl.y,near.x-pl.x);
  const n=pl.weaponN, spread=n>1?Math.PI/8:0;
  for(let i=0;i<n;i++){
    const a=ba+(i-(n-1)/2)*spread;
    const p=projs.acquire(); if(!p)break;
    p.x=pl.x;p.y=pl.y;p.dx=Math.cos(a);p.dy=Math.sin(a);
    p.spd=300;p.dmg=1;p.r=3;p.pierce=pl.pierceN;p.isEnemy=false;p.trail.length=0;
  }
}

// Orbitals (parameterized player)
function updateOrbitals(dt,pl){
  if(pl.orbN<=0)return;
  orbAngle+=dt*2.5;
  orbitals.length=pl.orbN;
  for(let i=0;i<pl.orbN;i++){
    const a=orbAngle+Math.PI*2/pl.orbN*i;
    const ox=pl.x+Math.cos(a)*60, oy=pl.y+Math.sin(a)*60;
    orbitals[i]={x:ox,y:oy};
    enemies.forEach(e=>{
      if(e.spawnA<0.5)return;
      if(dist(ox,oy,e.x,e.y)<e.r+8){
        e.hp-=2; e.flash=0.1; spawnParts(ox,oy,3,C.player);
        if(e.hp<=0) killEnemy(e);
      }
    });
  }
}

// Shockwave (parameterized player)
function updateShock(dt,pl){
  if(pl.shockR<=0)return;
  shockT-=dt; if(shockT>0)return; shockT=5;
  enemies.forEach(e=>{
    if(dist(pl.x,pl.y,e.x,e.y)<pl.shockR){
      e.hp-=pl.shockD; e.flash=0.1;
      if(e.hp<=0) killEnemy(e);
    }
  });
  for(let i=0;i<16;i++){
    const a=Math.PI*2/16*i;
    const pp=parts.acquire(); if(!pp)break;
    pp.x=pl.x+Math.cos(a)*pl.shockR*0.3; pp.y=pl.y+Math.sin(a)*pl.shockR*0.3;
    pp.dx=Math.cos(a)*pl.shockR*2; pp.dy=Math.sin(a)*pl.shockR*2;
    pp.life=0.4;pp.maxL=0.4;pp.col='#88CCFF';pp.sz=4;
  }
}

// Lightning (parameterized player)
function updateLight(dt,pl){
  if(pl.lightN<=0)return;
  lightT-=dt; if(lightT>0)return; lightT=3;
  const tgts=[];
  enemies.forEach(e=>{ if(e.spawnA>=0.5)tgts.push(e); });
  for(let i=tgts.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[tgts[i],tgts[j]]=[tgts[j],tgts[i]];}
  const cnt=Math.min(pl.lightN,tgts.length);
  for(let i=0;i<cnt;i++){
    const e=tgts[i]; e.hp-=pl.lightD; e.flash=0.15;
    addFloat(e.x,e.y-e.r,'-'+pl.lightD,'#88CCFF',14);
    for(let s=0;s<5;s++){
      const pp=parts.acquire(); if(!pp)break;
      const t=s/5;
      pp.x=lerp(pl.x,e.x,t)+(rng()-0.5)*20; pp.y=lerp(pl.y,e.y,t)+(rng()-0.5)*20;
      pp.dx=(rng()-0.5)*40; pp.dy=(rng()-0.5)*40;
      pp.life=0.3;pp.maxL=0.3;pp.col='#88DDFF';pp.sz=3;
    }
    if(e.hp<=0) killEnemy(e);
  }
}

// Regen (parameterized player)
function updateRegen(dt,pl){
  if(pl.regenInt<=0)return;
  regenT-=dt; if(regenT>0)return; regenT=pl.regenInt;
  if(pl.hp<pl.maxHp){ pl.hp=Math.min(pl.maxHp,pl.hp+1); addFloat(pl.x,pl.y-pl.r-20,'+1',C.heal,14); }
}

// Apply skill on selection
function applySkill(id){
  const lv=(P.skills[id]||0)+1; P.skills[id]=lv;
  switch(id){
    case'multi':P.weaponN=1+lv;break;
    case'rapid':P.fireInt=Math.max(0.5,1-lv*0.1);break;
    case'pierce':P.pierceN=lv;break;
    case'orbital':P.orbN=1+lv;break;
    case'shock':P.shockR=80+(lv-1)*40;P.shockD=3+(lv-1)*1.5;break;
    case'lightning':P.lightN=3+(lv-1)*2;P.lightD=2+(lv-1)*1.5;break;
    case'speed':P.spdBonus=lv*0.15;break;
    case'magnet':P.magnet=lv*50;break;
    case'defense':P.defense=lv;break;
    case'regen':P.regenInt=Math.max(5,10-(lv-1)*2.5);regenT=P.regenInt;break;
    case'knockback':P.knockPow=30+(lv-1)*30;break;
    case'crit':P.critCh=0.15+(lv-1)*0.075;break;
  }
}

/* ═══════════════════════════════════════════════
   §9. PARTICLES & FLOATING TEXT
   ═══════════════════════════════════════════════ */

function spawnParts(x,y,n,col){
  for(let i=0;i<n;i++){
    const p=parts.acquire(); if(!p)break;
    const a=rng()*Math.PI*2, s=50+rng()*100;
    p.x=x;p.y=y;p.dx=Math.cos(a)*s;p.dy=Math.sin(a)*s;
    p.life=0.3+rng()*0.3;p.maxL=p.life;p.col=col;p.sz=2+rng()*3;
  }
}
function updateParts(dt){
  parts.forEach(p=>{
    p.x+=p.dx*dt; p.y+=p.dy*dt;
    p.dx*=0.95; p.dy*=0.95; p.life-=dt;
    if(p.life<=0) parts.release(p);
  });
}
function addFloat(x,y,txt,col,sz){ floats.push({x,y,txt,col,sz:sz||14,life:0.8,maxL:0.8}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){ floats[i].y-=40*dt; floats[i].life-=dt; if(floats[i].life<=0)floats.splice(i,1); }
}

/* ═══════════════════════════════════════════════
   §10. STATE MANAGEMENT (TransitionGuard)
   ═══════════════════════════════════════════════ */

function enterState(ns){
  if(isTransitioning&&STATE_PRIORITY[ns]<STATE_PRIORITY[state])return;
  isTransitioning=true;
  tw.clearImmediate();
  const prev=state; state=ns;
  switch(ns){
    case'TITLE':
      enemies.clear();projs.clear();gems.clear();parts.clear();
      floats.length=0;boss=null;break;
    case'PLAYING':
      if(prev==='TITLE'||prev==='GAMEOVER'||prev==='VICTORY') initGame();
      isWaveClearing=false;break;
    case'WAVE_PREP':
      isWaveClearing=false;wave++;
      score+=100*(wave-1); // prev wave bonus
      wavePrepT=3;spawned=0;spawnT=0;break;
    case'LEVELUP':
      isLevelingUp=true;
      skillChoices=pickSkills(SKILLS,P.skills,diff==='hard'?2:3);
      hoverSkill=-1;sfxLvUp();score+=50;break;
    case'PAUSE':break;
    case'GAMEOVER':sfxGO();shakeT=0.4;shakeI=6;saveBest();break;
    case'VICTORY':score+=5000;sfxVictory();saveBest();break;
  }
  isTransitioning=false;
}

function initGame(){
  P=createPlayer();
  cam={x:WORLD_W/2-VIEW_W/2,y:WORLD_H/2-VIEW_H/2};
  wave=1;score=0;combo=0;comboT=0;
  spawnT=0;spawned=0;
  isWaveClearing=false;isLevelingUp=false;
  shockT=5;lightT=3;regenT=10;
  orbitals.length=0;orbAngle=0;floats.length=0;
  enemies.clear();projs.clear();gems.clear();parts.clear();
  boss=null;
  best=loadBest();
  if(isDaily){
    rng=seededRng(dateSeed(new Date().toISOString().slice(0,10)));
    dailyBest=loadDaily();
  } else rng=Math.random;
}

/* ═══════════════════════════════════════════════
   §11. SAVE / LOAD (try-catch for iframe safety)
   ═══════════════════════════════════════════════ */

function saveBest(){
  try{
    // 判定 먼저, 저장 나중에 (Cycle 2)
    const k=isDaily?'msa_d_'+new Date().toISOString().slice(0,10):'msa_best';
    const prev=parseInt(localStorage.getItem(k))||0;
    if(score>prev) localStorage.setItem(k,score);
  }catch(e){}
}
function loadBest(){ try{return parseInt(localStorage.getItem('msa_best'))||0;}catch(e){return 0;} }
function loadDaily(){ try{return parseInt(localStorage.getItem('msa_d_'+new Date().toISOString().slice(0,10)))||0;}catch(e){return 0;} }

/* ═══════════════════════════════════════════════
   §12. INPUT HANDLING
   ═══════════════════════════════════════════════ */

listen(window,'keydown',e=>{
  if(!inputMode)inputMode='keyboard';
  keys[e.key]=true;keys[e.code]=true;
  resumeAudio();
  handleKey(e.key);
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
listen(window,'keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

function handleKey(k){
  if(state==='TITLE'){
    if(k==='Enter'||k===' '){isDaily=false;enterState('PLAYING');}
    if(k==='h'||k==='H'){diff=diff==='hard'?'normal':'hard';}
    if(k==='c'||k==='C'){isDaily=true;enterState('PLAYING');}
  }else if(state==='PLAYING'){
    if(k==='p'||k==='P'||k==='Escape')enterState('PAUSE');
  }else if(state==='PAUSE'){
    if(k==='p'||k==='P'||k==='Escape')enterState('PLAYING');
  }else if(state==='LEVELUP'){
    if(k==='1'&&skillChoices.length>=1)selSkill(0);
    if(k==='2'&&skillChoices.length>=2)selSkill(1);
    if(k==='3'&&skillChoices.length>=3)selSkill(2);
  }else if(state==='GAMEOVER'||state==='VICTORY'){
    if(k==='Enter'||k===' '||k==='r'||k==='R')enterState('TITLE');
  }
}

function selSkill(i){
  if(i<0||i>=skillChoices.length)return;
  applySkill(skillChoices[i].id);
  isLevelingUp=false;skillChoices.length=0;
  enterState('PLAYING');
}

function getKbInput(){
  let dx=0,dy=0;
  if(keys['w']||keys['W']||keys['ArrowUp'])dy=-1;
  if(keys['s']||keys['S']||keys['ArrowDown'])dy=1;
  if(keys['a']||keys['A']||keys['ArrowLeft'])dx=-1;
  if(keys['d']||keys['D']||keys['ArrowRight'])dx=1;
  if(dx&&dy){dx*=Math.SQRT1_2;dy*=Math.SQRT1_2;}
  return{dx,dy};
}

// Touch
listen(cvs,'touchstart',e=>{
  if(!inputMode)inputMode='touch';
  resumeAudio(); e.preventDefault();
  const t=e.changedTouches[0];
  const r=cvs.getBoundingClientRect();
  const tx=(t.clientX-r.left)/r.width*cw;
  const ty=(t.clientY-r.top)/r.height*ch;
  const sx=tx/scaleX,sy=ty/scaleY;

  if(state==='TITLE'){
    if(sy>VIEW_H*0.62&&sy<VIEW_H*0.72){isDaily=true;enterState('PLAYING');return;}
    if(sy>VIEW_H*0.73&&sy<VIEW_H*0.82){diff=diff==='hard'?'normal':'hard';return;}
    isDaily=false;enterState('PLAYING');return;
  }
  if(state==='GAMEOVER'||state==='VICTORY'){enterState('TITLE');return;}
  if(state==='PAUSE'){enterState('PLAYING');return;}
  if(state==='LEVELUP'){handleSkillTap(sx,sy);return;}
  // joystick
  if(state==='PLAYING'){
    joy.on=true;joy.sx=tx;joy.sy=ty;joy.cx=tx;joy.cy=ty;joy.dx=0;joy.dy=0;
  }
},{passive:false});

listen(cvs,'touchmove',e=>{
  e.preventDefault();
  if(!joy.on)return;
  const t=e.changedTouches[0];
  const r=cvs.getBoundingClientRect();
  joy.cx=(t.clientX-r.left)/r.width*cw;
  joy.cy=(t.clientY-r.top)/r.height*ch;
  const dx=joy.cx-joy.sx,dy=joy.cy-joy.sy;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const c=Math.min(d,60);
  joy.dx=(dx/d)*(c/60);joy.dy=(dy/d)*(c/60);
},{passive:false});

listen(cvs,'touchend',e=>{e.preventDefault();joy.on=false;joy.dx=0;joy.dy=0;},{passive:false});

// Mouse
listen(cvs,'mousemove',e=>{
  const r=cvs.getBoundingClientRect();
  msx=(e.clientX-r.left)/r.width*cw/scaleX;
  msy=(e.clientY-r.top)/r.height*ch/scaleY;
  if(state==='LEVELUP')hoverSkill=getCardIdx(msx,msy);
});
listen(cvs,'click',e=>{
  resumeAudio();
  const r=cvs.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*cw/scaleX;
  const my=(e.clientY-r.top)/r.height*ch/scaleY;
  if(state==='TITLE'){
    if(my>VIEW_H*0.62&&my<VIEW_H*0.72){isDaily=true;enterState('PLAYING');return;}
    if(my>VIEW_H*0.73&&my<VIEW_H*0.82){diff=diff==='hard'?'normal':'hard';return;}
    isDaily=false;enterState('PLAYING');
  }else if(state==='GAMEOVER'||state==='VICTORY')enterState('TITLE');
  else if(state==='PAUSE')enterState('PLAYING');
  else if(state==='LEVELUP')handleSkillTap(mx,my);
});

function handleSkillTap(sx,sy){const i=getCardIdx(sx,sy);if(i>=0)selSkill(i);}
function getCardIdx(sx,sy){
  const n=skillChoices.length; if(!n)return-1;
  const cw2=180,ch2=220,gap=20;
  const tw2=n*cw2+(n-1)*gap;
  const x0=(VIEW_W-tw2)/2, y0=VIEW_H/2-ch2/2;
  for(let i=0;i<n;i++){
    const cx=x0+i*(cw2+gap);
    if(sx>=cx&&sx<=cx+cw2&&sy>=y0&&sy<=y0+ch2)return i;
  }
  return-1;
}

/* ═══════════════════════════════════════════════
   §13. SPAWNING
   ═══════════════════════════════════════════════ */

// Spawn enemies around player (parameterized player)
function updateSpawn(dt,pl){
  const cfg=waveCfg(wave);
  if(spawned>=cfg.count)return;
  spawnT-=dt; if(spawnT>0)return;
  spawnT=cfg.interval;
  // boss first
  if(cfg.isBoss&&!boss&&spawned===0){
    const p=spawnPos(pl.x,pl.y,50);
    boss=spawnEnemy(p.x,p.y,'boss');
    sfxBoss();spawned++;return;
  }
  const roll=rng();
  let type='normal';
  if(roll<cfg.rangeR)type='ranged';
  else if(roll<cfg.rangeR+cfg.tankR)type='tanker';
  else if(roll<cfg.rangeR+cfg.tankR+cfg.fastR)type='fast';
  const p=spawnPos(pl.x,pl.y,50);
  spawnEnemy(p.x,p.y,type);spawned++;
}

// Cull far enemies (parameterized player)
function cullFar(pl){
  enemies.forEach(e=>{
    if(dist(e.x,e.y,pl.x,pl.y)>1200&&e.type!=='boss'){
      const p=spawnPos(pl.x,pl.y,50);e.x=p.x;e.y=p.y;
    }
  });
}

/* ═══════════════════════════════════════════════
   §14. RENDERING
   ═══════════════════════════════════════════════ */

function render(){
  ctx.save();
  ctx.scale(scaleX,scaleY);
  // shake
  if(shakeT>0){ctx.translate((Math.random()-0.5)*shakeI*2,(Math.random()-0.5)*shakeI*2);}
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,VIEW_W,VIEW_H);

  if(state==='TITLE'){renderTitle();ctx.restore();return;}

  drawWorld();drawGems();drawProjs();drawEnemies();drawOrbitals();drawPlayer();
  drawParts();drawFloats();drawHUD();

  if(state==='WAVE_PREP')drawWavePrep();
  if(state==='LEVELUP')drawLevelUp();
  if(state==='PAUSE')drawPause();
  if(state==='GAMEOVER')drawGO();
  if(state==='VICTORY')drawVict();
  ctx.restore();
}

function drawWorld(){
  if(!gridTile)return;
  const ts=256;
  const sx=Math.floor(cam.x/ts)*ts, sy=Math.floor(cam.y/ts)*ts;
  for(let ty=sy;ty<cam.y+VIEW_H+ts;ty+=ts)
    for(let tx=sx;tx<cam.x+VIEW_W+ts;tx+=ts)
      ctx.drawImage(gridTile,tx-cam.x,ty-cam.y,ts,ts);
  ctx.strokeStyle=C.border;ctx.lineWidth=2;
  ctx.strokeRect(-cam.x,-cam.y,WORLD_W,WORLD_H);
}

function drawGems(){
  gems.forEach(g=>{
    if(!inView(g.x,g.y,20))return;
    g.rot+=0.03;
    const s=w2s(g.x,g.y);
    ctx.save();ctx.translate(s.sx,s.sy);ctx.rotate(g.rot);
    ctx.globalAlpha=0.7+Math.sin(g.rot*3)*0.3;
    ctx.fillStyle=C.gem;
    ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(6,0);ctx.lineTo(0,6);ctx.lineTo(-6,0);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  });
}

function drawProjs(){
  projs.forEach(p=>{
    if(!inView(p.x,p.y,20))return;
    const s=w2s(p.x,p.y);
    // trail
    if(p.trail.length>1){
      ctx.strokeStyle=p.isEnemy?'rgba(255,68,68,0.3)':'rgba(255,255,68,0.3)';
      ctx.lineWidth=2;ctx.beginPath();
      const t0=w2s(p.trail[0].x,p.trail[0].y);ctx.moveTo(t0.sx,t0.sy);
      for(let i=1;i<p.trail.length;i++){const ti=w2s(p.trail[i].x,p.trail[i].y);ctx.lineTo(ti.sx,ti.sy);}
      ctx.lineTo(s.sx,s.sy);ctx.stroke();
    }
    ctx.fillStyle=p.isEnemy?'#FF6666':C.proj;
    ctx.beginPath();ctx.arc(s.sx,s.sy,p.r,0,Math.PI*2);ctx.fill();
  });
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(!inView(e.x,e.y,40))return;
    const s=w2s(e.x,e.y);
    ctx.save();
    ctx.globalAlpha=e.spawnA;
    if(e.flash>0)ctx.globalAlpha*=0.5;
    const col=eColor(e.type);

    switch(e.type){
      case'normal':
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(s.sx,s.sy,e.r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FFF';
        ctx.beginPath();ctx.arc(s.sx-3,s.sy-3,2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(s.sx+3,s.sy-3,2,0,Math.PI*2);ctx.fill();
        break;
      case'fast':{
        const a=Math.atan2(P.y-e.y,P.x-e.x);
        ctx.fillStyle=col;ctx.beginPath();
        ctx.moveTo(s.sx+Math.cos(a)*10,s.sy+Math.sin(a)*10);
        ctx.lineTo(s.sx+Math.cos(a+2.4)*8,s.sy+Math.sin(a+2.4)*8);
        ctx.lineTo(s.sx+Math.cos(a-2.4)*8,s.sy+Math.sin(a-2.4)*8);
        ctx.closePath();ctx.fill();break;}
      case'tanker':
        ctx.fillStyle=col;ctx.fillRect(s.sx-e.r,s.sy-e.r,e.r*2,e.r*2);
        ctx.strokeStyle='#AA66FF';ctx.lineWidth=3;
        ctx.strokeRect(s.sx-e.r,s.sy-e.r,e.r*2,e.r*2);break;
      case'ranged':
        ctx.fillStyle=col;ctx.beginPath();
        ctx.moveTo(s.sx,s.sy-8);ctx.lineTo(s.sx+8,s.sy);
        ctx.lineTo(s.sx,s.sy+8);ctx.lineTo(s.sx-8,s.sy);ctx.closePath();ctx.fill();
        ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(s.sx,s.sy,2,0,Math.PI*2);ctx.fill();break;
      case'boss':
        if(e.phase===3){ctx.fillStyle='rgba(255,0,68,0.15)';ctx.beginPath();ctx.arc(s.sx,s.sy,e.r*2,0,Math.PI*2);ctx.fill();}
        if((e.phase===1||e.phase===3)&&e.chargeT>1){
          ctx.fillStyle='rgba(255,0,68,0.2)';
          for(let t=1;t<=3;t++){ctx.beginPath();ctx.arc(s.sx-e.chargeDir.x*t*10,s.sy-e.chargeDir.y*t*10,e.r-t*2,0,Math.PI*2);ctx.fill();}
        }
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(s.sx,s.sy,e.r,0,Math.PI*2);ctx.fill();
        // crown
        ctx.fillStyle='#FFD700';ctx.beginPath();
        ctx.moveTo(s.sx-12,s.sy-e.r+2);ctx.lineTo(s.sx-8,s.sy-e.r-8);
        ctx.lineTo(s.sx-4,s.sy-e.r+2);ctx.lineTo(s.sx,s.sy-e.r-10);
        ctx.lineTo(s.sx+4,s.sy-e.r+2);ctx.lineTo(s.sx+8,s.sy-e.r-8);
        ctx.lineTo(s.sx+12,s.sy-e.r+2);ctx.closePath();ctx.fill();
        // boss HP bar
        drawBossBar(e);break;
    }
    // HP bar for non-boss damaged
    if(e.type!=='boss'&&e.hp<e.maxHp){
      const bw=e.r*2;
      ctx.fillStyle=C.hpBg;ctx.fillRect(s.sx-bw/2,s.sy-e.r-6,bw,3);
      ctx.fillStyle=hpCol(e.hp/e.maxHp);ctx.fillRect(s.sx-bw/2,s.sy-e.r-6,bw*(e.hp/e.maxHp),3);
    }
    ctx.restore();
  });
}

function drawBossBar(b){
  const bw=200,bh=8,bx=VIEW_W/2-bw/2,by=40;
  ctx.fillStyle=C.hpBg;ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=C.eBoss;ctx.fillRect(bx,by,bw*(b.hp/b.maxHp),bh);
  ctx.strokeStyle='#FF4466';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=C.text;ctx.font=`bold 11px ${FONT}`;ctx.textAlign='center';
  ctx.fillText('BOSS',VIEW_W/2,by-4);
}

function drawOrbitals(){
  if(!P||P.orbN<=0)return;
  for(const o of orbitals){
    if(!o)continue;
    const s=w2s(o.x,o.y);
    ctx.fillStyle='rgba(0,255,170,0.6)';ctx.beginPath();ctx.arc(s.sx,s.sy,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=C.player;ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.sx,s.sy,8,0,Math.PI*2);ctx.stroke();
  }
}

function drawPlayer(){
  if(!P)return;
  const s=w2s(P.x,P.y);
  ctx.save();
  if(P.iFrame>0) ctx.globalAlpha=Math.sin(P.iFrame*20)>0?1:0.3;
  // glow
  ctx.fillStyle=C.playerGlow;ctx.beginPath();ctx.arc(s.sx,s.sy,P.r+6,0,Math.PI*2);ctx.fill();
  // body
  ctx.fillStyle=C.player;ctx.beginPath();ctx.arc(s.sx,s.sy,P.r,0,Math.PI*2);ctx.fill();
  // direction
  const kb=getKbInput();
  const dx=joy.on?joy.dx:kb.dx, dy=joy.on?joy.dy:kb.dy;
  if(dx||dy){
    const a=Math.atan2(dy,dx);
    ctx.fillStyle='#004433';ctx.beginPath();
    ctx.moveTo(s.sx+Math.cos(a)*8,s.sy+Math.sin(a)*8);
    ctx.lineTo(s.sx+Math.cos(a+2.5)*5,s.sy+Math.sin(a+2.5)*5);
    ctx.lineTo(s.sx+Math.cos(a-2.5)*5,s.sy+Math.sin(a-2.5)*5);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawParts(){
  parts.forEach(p=>{
    if(!inView(p.x,p.y,20))return;
    const s=w2s(p.x,p.y);
    ctx.globalAlpha=p.life/p.maxL;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(s.sx,s.sy,p.sz*(p.life/p.maxL),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawFloats(){
  for(const f of floats){
    if(!inView(f.x,f.y,40))continue;
    const s=w2s(f.x,f.y);
    ctx.globalAlpha=f.life/f.maxL;ctx.fillStyle=f.col;
    ctx.font=`bold ${f.sz}px ${FONT}`;ctx.textAlign='center';
    ctx.fillText(f.txt,s.sx,s.sy);ctx.globalAlpha=1;
  }
}

function drawHUD(){
  if(!P)return;
  // HP bar
  const hx=12,hy=12,hw=160,hh=14;
  ctx.fillStyle=C.hpBg;ctx.fillRect(hx,hy,hw,hh);
  const hr=P.hp/P.maxHp;
  ctx.fillStyle=hpCol(hr);ctx.fillRect(hx,hy,hw*Math.max(0,hr),hh);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,hh);
  ctx.fillStyle=C.text;ctx.font=`bold 11px ${FONT}`;ctx.textAlign='left';
  ctx.fillText(`HP ${Math.max(0,P.hp)}/${P.maxHp}`,hx+4,hy+11);

  // XP bar
  const xy=hy+hh+4;
  const xpN=calcXp(P.level);
  ctx.fillStyle=C.hpBg;ctx.fillRect(hx,xy,hw,8);
  ctx.fillStyle=C.xpBar;ctx.fillRect(hx,xy,hw*Math.min(1,P.xp/xpN),8);
  ctx.fillStyle=C.text;ctx.font=`10px ${FONT}`;
  ctx.fillText(`Lv.${P.level}  XP ${P.xp}/${xpN}`,hx,xy+20);

  // Wave & Score
  ctx.textAlign='right';ctx.fillStyle=C.text;ctx.font=`bold 14px ${FONT}`;
  ctx.fillText(`WAVE ${wave}/${WAVE_COUNT}`,VIEW_W-12,22);
  ctx.font=`13px ${FONT}`;ctx.fillText(`SCORE: ${score}`,VIEW_W-12,40);
  if(best>0){ctx.fillStyle=C.textDim;ctx.font=`10px ${FONT}`;ctx.fillText(`BEST: ${best}`,VIEW_W-12,54);}

  // Combo
  if(combo>=5){ctx.fillStyle='#FFAA00';ctx.font=`bold 16px ${FONT}`;ctx.textAlign='right';
    ctx.fillText(`${combo} COMBO! ×${Math.min(3,1+combo*0.1).toFixed(1)}`,VIEW_W-12,74);}
  else if(combo>=2){ctx.fillStyle=C.textDim;ctx.font=`12px ${FONT}`;ctx.textAlign='right';
    ctx.fillText(`${combo} Combo`,VIEW_W-12,74);}

  // Owned skills
  const sk=Object.entries(P.skills);
  if(sk.length){
    ctx.textAlign='left';
    let sy2=VIEW_H-12-sk.length*16;
    for(const[id,lv] of sk){
      const sd=SKILLS.find(s=>s.id===id);if(!sd)continue;
      ctx.fillStyle='rgba(26,26,58,0.8)';ctx.fillRect(8,sy2-10,120,15);
      ctx.fillStyle=C.cardBorder;ctx.font=`bold 10px ${FONT}`;ctx.fillText(sd.icon,12,sy2);
      ctx.fillStyle=C.text;ctx.font=`10px ${FONT}`;ctx.fillText(`${sd.name} Lv${lv}`,26,sy2);
      sy2+=16;
    }
  }

  // Minimap
  drawMinimap();

  // Daily badge
  if(isDaily){ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.font=`bold 11px ${FONT}`;
    ctx.fillText('DAILY CHALLENGE',VIEW_W/2,16);}

  // Virtual joystick
  if(joy.on&&inputMode==='touch'){
    const jx=joy.sx/scaleX,jy=joy.sy/scaleY,jcx=joy.cx/scaleX,jcy=joy.cy/scaleY;
    ctx.globalAlpha=0.3;ctx.strokeStyle=C.player;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(jx,jy,50,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=C.player;ctx.beginPath();ctx.arc(jcx,jcy,24,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawMinimap(){
  if(!P)return;
  const mw=80,mh=80,mx=VIEW_W-mw-10,my=VIEW_H-mh-10;
  ctx.fillStyle='rgba(10,10,30,0.7)';ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#2A2A4A';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  ctx.fillStyle=C.player;
  ctx.beginPath();ctx.arc(mx+(P.x/WORLD_W)*mw,my+(P.y/WORLD_H)*mh,2,0,Math.PI*2);ctx.fill();
  if(boss&&boss._active){
    ctx.fillStyle=C.eBoss;
    ctx.beginPath();ctx.arc(mx+(boss.x/WORLD_W)*mw,my+(boss.y/WORLD_H)*mh,3,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.strokeRect(mx+(cam.x/WORLD_W)*mw,my+(cam.y/WORLD_H)*mh,(VIEW_W/WORLD_W)*mw,(VIEW_H/WORLD_H)*mh);
}

function rRect(c,x,y,w,h,r,fill,stroke){
  c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
  if(fill)c.fill();if(stroke)c.stroke();
}

/* ═══════════════════════════════════════════════
   §17. MAIN GAME LOOP
   ═══════════════════════════════════════════════ */

let lastT=0;

function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,DT_CAP);
  lastT=ts;

  // tween update (most states per §5.3)
  if(state!=='PAUSE') tw.update(dt);
  if(shakeT>0) shakeT-=dt;
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}

  switch(state){
    case'TITLE':break;
    case'PLAYING':{
      const kb=getKbInput();
      const dx=joy.on?joy.dx:kb.dx, dy=joy.on?joy.dy:kb.dy;
      const bnd={l:0,t:0,r:WORLD_W,b:WORLD_H};
      updatePlayer(P,dx,dy,dt,bnd);
      updateCam(cam,P.x,P.y,VIEW_W,VIEW_H,WORLD_W,WORLD_H,0.1);
      fireWeapon(dt,P);
      updateProjs(dt);
      updateEnemies(dt,P);
      updateOrbitals(dt,P);
      updateShock(dt,P);
      updateLight(dt,P);
      updateRegen(dt,P);
      hitProjEnemy(P);
      hitEProjPlayer(P);
      hitEnemyPlayer(P);
      pickGems(dt,P);
      updateParts(dt);
      updateFloats(dt);
      updateSpawn(dt,P);
      cullFar(P);
      // XP → level up
      const xpN=calcXp(P.level);
      if(P.xp>=xpN){P.xp-=xpN;P.level++;enterState('LEVELUP');}
      // Wave clear (guard)
      if(!isWaveClearing){
        const cfg=waveCfg(wave);
        if(spawned>=cfg.count&&enemies.count===0){
          isWaveClearing=true;
          if(wave>=WAVE_COUNT)enterState('VICTORY');
          else enterState('WAVE_PREP');
        }
      }
      // HP check (guard)
      if(P.hp<=0&&!isTransitioning)enterState('GAMEOVER');
      break;
    }
    case'WAVE_PREP':
      wavePrepT-=dt;
      updateProjs(dt);updateParts(dt);updateFloats(dt);
      if(wavePrepT<=0)enterState('PLAYING');
      break;
    case'LEVELUP':updateParts(dt);break;
    case'PAUSE':break;
    case'GAMEOVER':updateParts(dt);break;
    case'VICTORY':updateParts(dt);break;
  }
  render();
}

/* ═══════════════════════════════════════════════
   §18. INIT
   ═══════════════════════════════════════════════ */

function init(){
  initAudio();
  best=loadBest();
  enterState('TITLE');
  lastT=performance.now();
  requestAnimationFrame(loop);
}
init();

</script>
