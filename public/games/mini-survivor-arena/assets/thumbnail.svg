<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="arenaBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2D1B4E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </radialGradient>
    <radialGradient id="arenaGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="swordBlade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FF1744" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#arenaBg)"/>
  <!-- Arena floor glow -->
  <rect width="400" height="300" fill="url(#arenaGlow)"/>
  <!-- Grid lines on floor -->
  <g stroke="#7C4DFF" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="50" y1="140" x2="50" y2="240"/>
    <line x1="130" y1="140" x2="130" y2="240"/>
    <line x1="210" y1="140" x2="210" y2="240"/>
    <line x1="290" y1="140" x2="290" y2="240"/>
    <line x1="370" y1="140" x2="370" y2="240"/>
  </g>
  <!-- Arena circle -->
  <ellipse cx="200" cy="185" rx="150" ry="45" fill="none" stroke="#7C4DFF" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="200" cy="185" rx="120" ry="35" fill="none" stroke="#E040FB" stroke-width="1" opacity="0.2"/>
  <!-- Monster 1 (top-left) - green slime -->
  <g transform="translate(80,130)">
    <ellipse cx="0" cy="15" rx="16" ry="6" fill="#00000040"/>
    <path d="M-15,0 Q-18,-20 -8,-25 Q0,-30 8,-25 Q18,-20 15,0 Q10,8 0,10 Q-10,8 -15,0Z" fill="#69F0AE"/>
    <path d="M-12,-2 Q-15,-15 -5,-20 Q0,-22 5,-20 Q15,-15 12,-2 Q8,4 0,6 Q-8,4 -12,-2Z" fill="#B9F6CA" opacity="0.4"/>
    <circle cx="-5" cy="-10" r="3" fill="#1B5E20"/>
    <circle cx="5" cy="-10" r="3" fill="#1B5E20"/>
    <circle cx="-4" cy="-11" r="1" fill="white"/>
    <circle cx="6" cy="-11" r="1" fill="white"/>
  </g>
  <!-- Monster 2 (top-right) - red demon -->
  <g transform="translate(320,125)">
    <ellipse cx="0" cy="20" rx="14" ry="5" fill="#00000040"/>
    <rect x="-12" y="-10" width="24" height="25" rx="4" fill="#F44336"/>
    <polygon points="-12,-10 -8,-22 -4,-10" fill="#D32F2F"/>
    <polygon points="12,-10 8,-22 4,-10" fill="#D32F2F"/>
    <circle cx="-5" cy="-2" r="3" fill="#FFEB3B"/>
    <circle cx="5" cy="-2" r="3" fill="#FFEB3B"/>
    <circle cx="-5" cy="-2" r="1.5" fill="#1A1A1A"/>
    <circle cx="5" cy="-2" r="1.5" fill="#1A1A1A"/>
    <path d="M-6,8 Q0,13 6,8" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Monster 3 (left) - purple ghost -->
  <g transform="translate(115,170)" filter="url(#neonGlow)">
    <path d="M-14,-5 Q-14,-22 0,-25 Q14,-22 14,-5 L14,10 L8,5 L4,10 L-2,5 L-8,10 L-14,5 Z" fill="#CE93D8" opacity="0.85"/>
    <circle cx="-4" cy="-12" r="3" fill="white"/>
    <circle cx="6" cy="-12" r="3" fill="white"/>
    <circle cx="-3" cy="-11" r="1.5" fill="#1A1A1A"/>
    <circle cx="7" cy="-11" r="1.5" fill="#1A1A1A"/>
  </g>
  <!-- Monster 4 (right) - orange bat -->
  <g transform="translate(290,155)">
    <path d="M-20,0 Q-15,-8 -8,-3 L0,-10 L8,-3 Q15,-8 20,0 Q15,5 8,2 L0,8 L-8,2 Q-15,5 -20,0Z" fill="#FF9800"/>
    <circle cx="-3" cy="-2" r="2" fill="#FFEB3B"/>
    <circle cx="3" cy="-2" r="2" fill="#FFEB3B"/>
    <circle cx="-3" cy="-2" r="1" fill="#1A1A1A"/>
    <circle cx="3" cy="-2" r="1" fill="#1A1A1A"/>
  </g>
  <!-- Monster 5 (bottom-left) - skull -->
  <g transform="translate(135,210)">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#ECEFF1"/>
    <rect x="-8" y="5" width="16" height="8" rx="2" fill="#CFD8DC"/>
    <circle cx="-4" cy="-3" r="3" fill="#1A1A1A"/>
    <circle cx="4" cy="-3" r="3" fill="#1A1A1A"/>
    <circle cx="-4" cy="-3" r="1" fill="#F44336"/>
    <circle cx="4" cy="-3" r="1" fill="#F44336"/>
    <path d="M-3,7 L-3,12 M0,7 L0,12 M3,7 L3,12" stroke="#1A1A1A" stroke-width="1"/>
  </g>
  <!-- Monster 6 (bottom-right) -->
  <g transform="translate(270,205)">
    <circle r="13" fill="#FF6F00"/>
    <circle cx="-4" cy="-3" r="3" fill="white"/>
    <circle cx="4" cy="-3" r="3" fill="white"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#1A1A1A"/>
    <circle cx="4" cy="-2" r="1.5" fill="#1A1A1A"/>
    <path d="M-5,5 Q0,10 5,5" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <line x1="-15" y1="-8" x2="-20" y2="-14" stroke="#FF6F00" stroke-width="3"/>
    <line x1="15" y1="-8" x2="20" y2="-14" stroke="#FF6F00" stroke-width="3"/>
  </g>
  <!-- Hero character (center) -->
  <g transform="translate(200,175)">
    <!-- Shadow -->
    <ellipse cx="0" cy="30" rx="20" ry="6" fill="#00000060"/>
    <!-- Body -->
    <rect x="-12" y="-5" width="24" height="30" rx="5" fill="url(#heroBody)"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="12" fill="#FFCC80"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-17" r="2" fill="white"/>
    <circle cx="4" cy="-17" r="2" fill="white"/>
    <circle cx="-3.5" cy="-17" r="1" fill="#1565C0"/>
    <circle cx="4.5" cy="-17" r="1" fill="#1565C0"/>
    <!-- Determined mouth -->
    <line x1="-3" y1="-10" x2="3" y2="-10" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Sword -->
    <g transform="rotate(-30)" filter="url(#neonGlow)">
      <rect x="15" y="-2" width="30" height="4" rx="1" fill="url(#swordBlade)"/>
      <rect x="12" y="-4" width="5" height="8" rx="1" fill="#FFD54F"/>
    </g>
    <!-- Shield glow ring -->
    <circle cx="0" cy="5" r="28" fill="none" stroke="#E040FB" stroke-width="1.5" opacity="0.4" filter="url(#neonGlow)"/>
  </g>
  <!-- Scattered particles -->
  <g fill="#E040FB" opacity="0.6">
    <circle cx="50" cy="80" r="2"/><circle cx="350" cy="90" r="1.5"/>
    <circle cx="160" cy="60" r="1"/><circle cx="250" cy="70" r="1.5"/>
    <circle cx="30" cy="200" r="1"/><circle cx="370" cy="190" r="1.2"/>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBar)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="url(#neonPurple)" opacity="0.7"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#E040FB" filter="url(#textGlow)">Mini Survivor Arena</text>
</svg>