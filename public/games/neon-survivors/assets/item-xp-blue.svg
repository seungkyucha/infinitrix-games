<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" shape-rendering="crispEdges">
  <defs>
    <!-- Cyan blue gem gradient -->
    <linearGradient id="gemBlue" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#004466"/>
    </linearGradient>
    <!-- Gem highlight -->
    <linearGradient id="gemBlueHL" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ddeeff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Outer glow -->
    <radialGradient id="blueGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow aura -->
  <circle cx="64" cy="64" r="52" fill="url(#blueGlow)"/>

  <!-- Diamond shape - slightly larger than green (5XP value) -->
  <g id="gem-body" filter="url(#glow)">
    <!-- Main diamond -->
    <path d="M64 16 L104 64 L64 112 L24 64Z" fill="url(#gemBlue)" stroke="#003344" stroke-width="2"/>

    <!-- Left facet -->
    <path d="M64 16 L24 64 L64 56Z" fill="#00bbee" opacity="0.6"/>
    <!-- Right facet -->
    <path d="M64 16 L104 64 L64 56Z" fill="#0088aa" opacity="0.5"/>
    <!-- Bottom left facet -->
    <path d="M24 64 L64 112 L64 56Z" fill="#006688" opacity="0.7"/>
    <!-- Bottom right facet -->
    <path d="M104 64 L64 112 L64 56Z" fill="#004466" opacity="0.8"/>

    <!-- Center lines -->
    <line x1="64" y1="16" x2="64" y2="112" stroke="#0088aa" stroke-width="1" opacity="0.5"/>
    <line x1="24" y1="64" x2="104" y2="64" stroke="#0099bb" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Highlight facet -->
  <g id="highlight" filter="url(#innerGlow)">
    <path d="M64 20 L32 62 L64 54Z" fill="url(#gemBlueHL)"/>
    <path d="M50 36 L54 34 L52 40Z" fill="#ffffff" opacity="0.9"/>
    <path d="M40 52 L44 50 L42 54Z" fill="#ddeeff" opacity="0.6"/>
  </g>

  <!-- Inner sparkle -->
  <g id="sparkle" opacity="0.8">
    <line x1="60" y1="64" x2="68" y2="64" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="64" y1="60" x2="64" y2="68" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="61" y1="61" x2="67" y2="67" stroke="#ddeeff" stroke-width="1" opacity="0.6"/>
    <line x1="67" y1="61" x2="61" y2="67" stroke="#ddeeff" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Pixel edge detail -->
  <g id="edge-detail" opacity="0.4">
    <rect x="62" y="14" width="4" height="4" fill="#aaddff"/>
    <rect x="22" y="62" width="4" height="4" fill="#66bbdd"/>
    <rect x="102" y="62" width="4" height="4" fill="#448899"/>
    <rect x="62" y="110" width="4" height="4" fill="#336677"/>
  </g>
</svg>