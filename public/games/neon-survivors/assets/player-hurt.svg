<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512" shape-rendering="crispEdges">
  <defs>
    <!-- Body gradient matching player.png dark blue-gray mech -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7a8f"/>
      <stop offset="40%" stop-color="#3a5568"/>
      <stop offset="100%" stop-color="#1e3040"/>
    </linearGradient>
    <!-- Cyan neon glow -->
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#006688"/>
    </linearGradient>
    <!-- Red damage flash -->
    <linearGradient id="redFlash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <!-- Visor red alert -->
    <radialGradient id="visorAlert" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="60%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
    <!-- Spark glow -->
    <radialGradient id="sparkGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffdd44" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="damageGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ff4444" flood-opacity="0.3" result="red"/>
      <feComposite in="red" in2="blur" operator="in" result="redGlow"/>
      <feMerge><feMergeNode in="redGlow"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <g id="shadow-layer">
    <ellipse cx="64" cy="118" rx="28" ry="8" fill="url(#shadow)"/>
  </g>

  <!-- Body tilt (hurt recoil - leaning back slightly) -->
  <g id="mech-body" transform="translate(64,64) rotate(-5) translate(-64,-64) translate(2, -2)">

    <!-- Legs -->
    <g id="legs">
      <!-- Left leg -->
      <rect x="38" y="88" width="14" height="22" rx="2" fill="#2a4050" stroke="#1a2a35" stroke-width="1"/>
      <rect x="38" y="88" width="14" height="4" fill="#3a5a6a"/>
      <path d="M38 106 L36 114 L54 114 L52 106" fill="#1e3040" stroke="#1a2a35" stroke-width="1"/>
      <!-- Left leg cyan line -->
      <rect x="43" y="92" width="4" height="12" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>

      <!-- Right leg -->
      <rect x="74" y="86" width="14" height="24" rx="2" fill="#2a4050" stroke="#1a2a35" stroke-width="1"/>
      <rect x="74" y="86" width="14" height="4" fill="#3a5a6a"/>
      <path d="M74 106 L72 114 L90 114 L88 106" fill="#1e3040" stroke="#1a2a35" stroke-width="1"/>
      <!-- Right leg cyan line -->
      <rect x="79" y="90" width="4" height="12" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
    </g>

    <!-- Torso -->
    <g id="torso">
      <path d="M36 52 L34 88 L50 92 L78 92 L94 88 L92 52 Q88 46 64 44 Q40 46 36 52Z" fill="url(#bodyGrad)" stroke="#1a2a35" stroke-width="1.5"/>
      <!-- Chest plate -->
      <path d="M44 56 L46 78 L64 82 L82 78 L84 56 L64 50Z" fill="#2e4858" stroke="#1a2a35" stroke-width="1"/>
      <!-- Chest cyan lines -->
      <line x1="54" y1="55" x2="50" y2="74" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
      <line x1="74" y1="55" x2="78" y2="74" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
      <line x1="64" y1="52" x2="64" y2="78" stroke="#00d4ff" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
      <!-- DAMAGE: Crack on torso -->
      <path d="M58 60 L54 66 L60 68 L56 76 L62 72 L58 80" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.9" filter="url(#damageGlow)"/>
      <!-- Damage spark on chest -->
      <circle cx="56" cy="68" r="3" fill="url(#sparkGlow)" opacity="0.8"/>
    </g>

    <!-- Arms -->
    <g id="arms">
      <!-- Left arm (recoiling) -->
      <path d="M36 54 L24 58 L20 72 L26 86 L34 88" fill="#3a5568" stroke="#1a2a35" stroke-width="1.5"/>
      <rect x="20" y="64" width="10" height="6" rx="2" fill="#2a4050"/>
      <!-- Left fist -->
      <circle cx="24" cy="88" r="6" fill="#2a4555" stroke="#1a2a35" stroke-width="1"/>
      <!-- Left shoulder mount -->
      <rect x="24" y="50" width="14" height="10" rx="2" fill="#3a5a6a" stroke="#1a2a35" stroke-width="1"/>
      <rect x="22" y="48" width="8" height="6" rx="1" fill="#2e4858"/>
      <!-- Left gun barrel -->
      <rect x="16" y="50" width="8" height="4" rx="1" fill="#1e3040" stroke="#1a2a35" stroke-width="0.5"/>

      <!-- Right arm -->
      <path d="M92 54 L104 58 L108 72 L102 86 L94 88" fill="#3a5568" stroke="#1a2a35" stroke-width="1.5"/>
      <rect x="98" y="64" width="10" height="6" rx="2" fill="#2a4050"/>
      <!-- Right fist -->
      <circle cx="104" cy="88" r="6" fill="#2a4555" stroke="#1a2a35" stroke-width="1"/>
      <!-- Right shoulder mount -->
      <rect x="90" y="50" width="14" height="10" rx="2" fill="#3a5a6a" stroke="#1a2a35" stroke-width="1"/>
      <rect x="98" y="48" width="8" height="6" rx="1" fill="#2e4858"/>
      <!-- DAMAGE: right arm spark -->
      <circle cx="100" cy="56" r="4" fill="url(#sparkGlow)" opacity="0.9"/>
      <path d="M98 52 L102 48 M96 56 L92 54 M100 60 L104 62" stroke="#ffdd44" stroke-width="1" opacity="0.8"/>
    </g>

    <!-- Head -->
    <g id="head">
      <!-- Neck -->
      <rect x="54" y="40" width="20" height="8" rx="2" fill="#2a4555" stroke="#1a2a35" stroke-width="1"/>
      <!-- Head dome -->
      <path d="M42 38 Q42 14 64 12 Q86 14 86 38 L86 42 L42 42Z" fill="url(#bodyGrad)" stroke="#1a2a35" stroke-width="1.5"/>
      <!-- Visor (RED ALERT - flashing) -->
      <path d="M46 28 Q64 24 82 28 L80 36 Q64 38 48 36Z" fill="url(#visorAlert)" stroke="#880000" stroke-width="1" filter="url(#damageGlow)"/>
      <!-- Visor glint -->
      <path d="M52 30 L58 29 L56 32Z" fill="#ff8888" opacity="0.6"/>
      <!-- Head top detail -->
      <rect x="58" y="10" width="12" height="6" rx="2" fill="#3a5a6a" stroke="#1a2a35" stroke-width="0.5"/>
      <!-- Antenna left -->
      <line x1="48" y1="18" x2="40" y2="8" stroke="#3a5a6a" stroke-width="2"/>
      <circle cx="40" cy="8" r="2" fill="#ff4444" filter="url(#damageGlow)"/>
      <!-- Antenna right (broken/damaged) -->
      <line x1="80" y1="18" x2="86" y2="10" stroke="#3a5a6a" stroke-width="2"/>
      <line x1="86" y1="10" x2="90" y2="14" stroke="#3a5a6a" stroke-width="1.5" stroke-dasharray="2,1"/>
      <!-- DAMAGE: Head crack -->
      <path d="M70 16 L74 22 L72 28" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.8"/>
    </g>

    <!-- Red damage overlay flicker -->
    <g id="damage-overlay" opacity="0.15">
      <rect x="34" y="10" width="60" height="104" rx="4" fill="#ff0000"/>
    </g>

    <!-- Highlight/rim light (top-left) -->
    <g id="highlights" opacity="0.3">
      <path d="M42 18 Q50 14 58 14" fill="none" stroke="#8abfcf" stroke-width="2"/>
      <path d="M36 52 L38 66" fill="none" stroke="#8abfcf" stroke-width="1.5"/>
    </g>

    <!-- Small floating damage particles -->
    <g id="damage-particles" filter="url(#damageGlow)">
      <rect x="30" y="44" width="3" height="3" fill="#ff4444" transform="rotate(45,31.5,45.5)" opacity="0.7"/>
      <rect x="92" y="38" width="2" height="2" fill="#ff6644" transform="rotate(30,93,39)" opacity="0.6"/>
      <rect x="48" y="20" width="2" height="2" fill="#ffaa44" transform="rotate(15,49,21)" opacity="0.8"/>
      <rect x="86" y="70" width="3" height="3" fill="#ff4444" transform="rotate(60,87.5,71.5)" opacity="0.5"/>
    </g>
  </g>
</svg>