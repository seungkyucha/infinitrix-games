<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512" shape-rendering="crispEdges">
  <defs>
    <!-- Core energy gradient (more red/aggressive in phase 2) -->
    <radialGradient id="coreEnergy" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#ff6666"/>
      <stop offset="40%" stop-color="#ff2222"/>
      <stop offset="70%" stop-color="#cc0044"/>
      <stop offset="100%" stop-color="#440022"/>
    </radialGradient>
    <!-- Outer shell gradient (cracked) -->
    <radialGradient id="shellGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b00ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#5500aa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#220044" stop-opacity="0.8"/>
    </radialGradient>
    <!-- Lightning energy -->
    <linearGradient id="lightning" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ddff"/>
      <stop offset="50%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </linearGradient>
    <!-- Red energy burst -->
    <radialGradient id="redBurst" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ff4444"/>
      <stop offset="70%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <!-- Satellite part gradient -->
    <linearGradient id="satGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a7a8a"/>
      <stop offset="50%" stop-color="#3a4a5a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="energyGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crackGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#ff2222" flood-opacity="0.5" result="red"/>
      <feComposite in="red" in2="blur" operator="in" result="redGlow"/>
      <feMerge><feMergeNode in="redGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer energy burst (phase 2 unstable energy) -->
  <g id="energy-burst" opacity="0.3">
    <circle cx="64" cy="64" r="60" fill="url(#redBurst)"/>
    <circle cx="64" cy="64" r="52" fill="url(#redBurst)" opacity="0.5"/>
  </g>

  <!-- Broken outer ring/shell fragments -->
  <g id="broken-shell">
    <!-- Shell fragment top-left -->
    <path d="M30 28 Q20 40 24 54 L32 50 Q34 38 38 30Z" fill="#3a2a5a" stroke="#220044" stroke-width="1" opacity="0.8"/>
    <!-- Shell fragment top-right -->
    <path d="M98 28 Q108 40 104 54 L96 50 Q94 38 90 30Z" fill="#3a2a5a" stroke="#220044" stroke-width="1" opacity="0.8"/>
    <!-- Shell fragment bottom-left -->
    <path d="M26 78 Q20 90 30 100 L36 94 Q30 86 32 78Z" fill="#3a2a5a" stroke="#220044" stroke-width="1" opacity="0.7"/>
    <!-- Shell fragment bottom-right -->
    <path d="M102 78 Q108 90 98 100 L92 94 Q98 86 96 78Z" fill="#3a2a5a" stroke="#220044" stroke-width="1" opacity="0.7"/>
    <!-- Crack lines between fragments -->
    <path d="M38 30 L44 38 L40 48" fill="none" stroke="#ff2222" stroke-width="1" filter="url(#crackGlow)"/>
    <path d="M90 30 L84 38 L88 48" fill="none" stroke="#ff2222" stroke-width="1" filter="url(#crackGlow)"/>
    <path d="M32 78 L38 72 L34 64" fill="none" stroke="#ff2222" stroke-width="1" filter="url(#crackGlow)"/>
    <path d="M96 78 L90 72 L94 64" fill="none" stroke="#ff2222" stroke-width="1" filter="url(#crackGlow)"/>
  </g>

  <!-- Inner energy sphere (exposed core) -->
  <g id="inner-sphere" filter="url(#coreGlow)">
    <!-- Main energy sphere -->
    <circle cx="64" cy="64" r="30" fill="url(#coreEnergy)"/>
    <!-- Swirling purple energy layer -->
    <circle cx="64" cy="64" r="28" fill="url(#shellGrad)" opacity="0.4"/>
    <!-- Energy swirl lines -->
    <path d="M44 54 Q54 48 64 54 Q74 60 84 54" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.6"/>
    <path d="M44 74 Q54 68 64 74 Q74 80 84 74" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.5"/>
    <path d="M50 44 Q58 54 58 64 Q58 74 50 84" fill="none" stroke="#ff44cc" stroke-width="1" opacity="0.4"/>
    <path d="M78 44 Q70 54 70 64 Q70 74 78 84" fill="none" stroke="#ff44cc" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Central eye (more aggressive red) -->
  <g id="eye" filter="url(#energyGlow)">
    <ellipse cx="64" cy="62" rx="12" ry="10" fill="url(#eyeGlow)"/>
    <!-- Pupil (slit, angry) -->
    <ellipse cx="64" cy="62" rx="3" ry="8" fill="#220000"/>
    <!-- Eye highlight -->
    <ellipse cx="60" cy="58" rx="3" ry="2" fill="#ffffff" opacity="0.7"/>
    <!-- Eye outer ring -->
    <ellipse cx="64" cy="62" rx="14" ry="12" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Lightning bolts (energy leaking from cracks) -->
  <g id="lightning-bolts" filter="url(#energyGlow)">
    <path d="M40 50 L32 42 L36 38 L26 28" fill="none" stroke="url(#lightning)" stroke-width="1.5" opacity="0.8"/>
    <path d="M88 50 L96 42 L92 38 L102 28" fill="none" stroke="url(#lightning)" stroke-width="1.5" opacity="0.8"/>
    <path d="M50 82 L42 90 L46 94 L38 104" fill="none" stroke="url(#lightning)" stroke-width="1.5" opacity="0.7"/>
    <path d="M78 82 L86 90 L82 94 L90 104" fill="none" stroke="url(#lightning)" stroke-width="1.5" opacity="0.7"/>
    <!-- Additional smaller sparks -->
    <path d="M36 64 L24 62 L28 58" fill="none" stroke="#00ddff" stroke-width="1" opacity="0.6"/>
    <path d="M92 64 L104 62 L100 58" fill="none" stroke="#00ddff" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Satellite parts (4 orbiting, irregular rotation in phase 2) -->
  <g id="satellites">
    <!-- Satellite 1 (top) - tilted/damaged -->
    <g transform="translate(64,18) rotate(15)">
      <path d="M-10,-6 L-6,-8 L6,-8 L10,-6 L8,6 L-8,6Z" fill="url(#satGrad)" stroke="#1a2a3a" stroke-width="1"/>
      <circle cx="0" cy="-2" r="3" fill="#4488aa" opacity="0.6"/>
      <rect x="-2" y="2" width="4" height="3" fill="#00aaff" opacity="0.4"/>
      <!-- Damage mark -->
      <path d="M-4,-4 L0,0 L2,-2" fill="none" stroke="#ff4444" stroke-width="0.8" opacity="0.7"/>
    </g>
    <!-- Satellite 2 (right) -->
    <g transform="translate(108,64) rotate(-20)">
      <path d="M-10,-6 L-6,-8 L6,-8 L10,-6 L8,6 L-8,6Z" fill="url(#satGrad)" stroke="#1a2a3a" stroke-width="1"/>
      <circle cx="0" cy="-2" r="3" fill="#aa4488" opacity="0.6"/>
      <rect x="-2" y="2" width="4" height="3" fill="#ff44aa" opacity="0.4"/>
    </g>
    <!-- Satellite 3 (bottom) - heavily damaged -->
    <g transform="translate(64,112) rotate(-10)">
      <path d="M-10,-6 L-6,-8 L6,-8 L10,-6 L8,6 L-8,6Z" fill="url(#satGrad)" stroke="#1a2a3a" stroke-width="1"/>
      <circle cx="0" cy="-2" r="3" fill="#4488aa" opacity="0.4"/>
      <!-- Trailing debris -->
      <rect x="12" y="-2" width="3" height="3" fill="#3a4a5a" opacity="0.5" transform="rotate(30)"/>
      <rect x="18" y="2" width="2" height="2" fill="#3a4a5a" opacity="0.3" transform="rotate(45)"/>
    </g>
    <!-- Satellite 4 (left) -->
    <g transform="translate(20,64) rotate(25)">
      <path d="M-10,-6 L-6,-8 L6,-8 L10,-6 L8,6 L-8,6Z" fill="url(#satGrad)" stroke="#1a2a3a" stroke-width="1"/>
      <circle cx="0" cy="-2" r="3" fill="#aa4488" opacity="0.6"/>
      <rect x="-2" y="2" width="4" height="3" fill="#ff44aa" opacity="0.4"/>
    </g>
  </g>

  <!-- Floating debris particles -->
  <g id="debris" opacity="0.6">
    <rect x="22" y="36" width="3" height="3" fill="#4a3a6a" transform="rotate(45,23.5,37.5)"/>
    <rect x="100" y="40" width="2" height="4" fill="#3a2a5a" transform="rotate(30,101,42)"/>
    <rect x="28" y="88" width="4" height="2" fill="#4a3a6a" transform="rotate(-20,30,89)"/>
    <rect x="96" y="92" width="3" height="3" fill="#3a2a5a" transform="rotate(55,97.5,93.5)"/>
    <rect x="50" y="16" width="2" height="2" fill="#5a4a7a" transform="rotate(15,51,17)"/>
    <rect x="80" y="108" width="2" height="3" fill="#5a4a7a" transform="rotate(-35,81,109.5)"/>
  </g>

  <!-- Overall red energy haze -->
  <circle cx="64" cy="64" r="40" fill="#ff0000" opacity="0.05"/>
</svg>