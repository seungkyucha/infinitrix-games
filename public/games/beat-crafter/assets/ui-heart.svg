<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5E7D"/>
      <stop offset="50%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 오라 -->
  <circle cx="16" cy="17" r="14" fill="url(#heartAura)"/>
  <!-- 하트 본체 -->
  <g filter="url(#heartGlow)">
    <path d="M16 28 C10 22 3 17 3 11 C3 6.5 6.5 3 10.5 3 C13 3 15 4.5 16 6.5 C17 4.5 19 3 21.5 3 C25.5 3 29 6.5 29 11 C29 17 22 22 16 28 Z"
          fill="url(#heartGrad)"/>
    <!-- 하이라이트 -->
    <path d="M10.5 6 C8 6 6 8 6 10.5 C6 11.5 6.5 12.5 7 13.5 Q9 9 13 7 Q12 6 10.5 6 Z"
          fill="url(#heartShine)"/>
  </g>
  <!-- 음표 장식 -->
  <g opacity="0.5">
    <circle cx="8" cy="6" r="1.2" fill="#D500F9"/>
    <line x1="9" y1="6" x2="9" y2="2" stroke="#D500F9" stroke-width="0.7"/>
    <circle cx="25" cy="5" r="1" fill="#00E5FF"/>
    <line x1="25.8" y1="5" x2="25.8" y2="2" stroke="#00E5FF" stroke-width="0.6"/>
  </g>
</svg>
