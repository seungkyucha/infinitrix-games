<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#D500F9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing1" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#FF1744" stop-opacity="0"/>
      <stop offset="85%" stop-color="#FF1744" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing2" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#FFAB00" stop-opacity="0"/>
      <stop offset="78%" stop-color="#FFAB00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFAB00" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSpark">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 충격파 링 -->
  <circle cx="48" cy="48" r="44" fill="url(#hitRing2)"/>
  <circle cx="48" cy="48" r="36" fill="url(#hitRing1)"/>
  <!-- 코어 폭발 -->
  <circle cx="48" cy="48" r="24" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 방사형 광선 -->
  <g filter="url(#hitSpark)" opacity="0.7">
    <!-- 8방향 광선 -->
    <line x1="48" y1="48" x2="48" y2="6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="48" y1="48" x2="48" y2="90" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="48" y1="48" x2="6" y2="48" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="48" y1="48" x2="90" y2="48" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="48" y1="48" x2="18" y2="18" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="48" x2="78" y2="78" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="48" x2="78" y2="18" stroke="#D500F9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="48" x2="18" y2="78" stroke="#D500F9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- 파티클 (음표 색상 5종) -->
  <g filter="url(#hitSpark)">
    <circle cx="20" cy="14" r="3" fill="#FF1744" opacity="0.8"/>
    <circle cx="76" cy="18" r="2.5" fill="#2979FF" opacity="0.7"/>
    <circle cx="82" cy="68" r="3" fill="#00E676" opacity="0.8"/>
    <circle cx="14" cy="72" r="2.5" fill="#FFAB00" opacity="0.7"/>
    <circle cx="48" cy="8" r="2" fill="#D500F9" opacity="0.8"/>
    <circle cx="12" cy="40" r="2" fill="#FF1744" opacity="0.6"/>
    <circle cx="84" cy="42" r="2.5" fill="#00E5FF" opacity="0.7"/>
    <circle cx="30" cy="82" r="2" fill="#D500F9" opacity="0.6"/>
    <circle cx="68" cy="84" r="2" fill="#FFAB00" opacity="0.6"/>
    <circle cx="36" cy="10" r="1.5" fill="#00E676" opacity="0.5"/>
    <circle cx="60" cy="86" r="1.5" fill="#2979FF" opacity="0.5"/>
    <circle cx="88" cy="30" r="1.5" fill="#FF1744" opacity="0.5"/>
  </g>
  <!-- 중앙 플래시 -->
  <circle cx="48" cy="48" r="8" fill="#FFFFFF" opacity="0.6"/>
</svg>
