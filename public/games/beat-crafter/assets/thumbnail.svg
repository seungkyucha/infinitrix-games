<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="60%" stop-color="#0D0A1E"/>
      <stop offset="100%" stop-color="#12122A"/>
    </linearGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="25%" stop-color="#FFAB00"/>
      <stop offset="50%" stop-color="#00E676"/>
      <stop offset="75%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
    <linearGradient id="tGridGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#12122A"/>
    </linearGradient>
    <radialGradient id="tGlow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#D500F9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tBlockGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlowF">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSmallGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#tBg)"/>
  <rect width="400" height="300" fill="url(#tGlow1)"/>

  <!-- 이퀄라이저 바 (하단) -->
  <g opacity="0.3" filter="url(#tSmallGlow)">
    <rect x="20" y="240" width="8" height="60" rx="2" fill="#D500F9" opacity="0.5"/>
    <rect x="34" y="220" width="8" height="80" rx="2" fill="#2979FF" opacity="0.5"/>
    <rect x="48" y="250" width="8" height="50" rx="2" fill="#00E676" opacity="0.4"/>
    <rect x="62" y="230" width="8" height="70" rx="2" fill="#FFAB00" opacity="0.5"/>
    <rect x="76" y="245" width="8" height="55" rx="2" fill="#FF1744" opacity="0.4"/>
    <rect x="310" y="235" width="8" height="65" rx="2" fill="#FF1744" opacity="0.5"/>
    <rect x="324" y="225" width="8" height="75" rx="2" fill="#FFAB00" opacity="0.5"/>
    <rect x="338" y="248" width="8" height="52" rx="2" fill="#00E676" opacity="0.4"/>
    <rect x="352" y="218" width="8" height="82" rx="2" fill="#2979FF" opacity="0.5"/>
    <rect x="366" y="240" width="8" height="60" rx="2" fill="#D500F9" opacity="0.4"/>
  </g>

  <!-- 4x4 그리드 (중앙) -->
  <g transform="translate(140, 85)">
    <!-- 그리드 배경 -->
    <rect x="0" y="0" width="120" height="160" rx="4" fill="url(#tGridGrad)" stroke="#4A4A8E" stroke-width="2"/>
    <!-- 격자선 -->
    <g stroke="#2A2A5E" stroke-width="0.5" opacity="0.4">
      <line x1="30" y1="0" x2="30" y2="160"/>
      <line x1="60" y1="0" x2="60" y2="160"/>
      <line x1="90" y1="0" x2="90" y2="160"/>
      <line x1="0" y1="40" x2="120" y2="40"/>
      <line x1="0" y1="80" x2="120" y2="80"/>
      <line x1="0" y1="120" x2="120" y2="120"/>
    </g>
    <!-- 블록들 — 도(C) 원형 레드 -->
    <g filter="url(#tSmallGlow)">
      <circle cx="15" cy="140" r="11" fill="#FF1744" opacity="0.9"/>
      <circle cx="15" cy="140" r="5" fill="url(#tBlockGlow)"/>
    </g>
    <!-- 레(D) 다이아몬드 블루 -->
    <g filter="url(#tSmallGlow)">
      <rect x="38" y="128" width="16" height="16" rx="1" fill="#2979FF" opacity="0.9" transform="rotate(45 46 136)"/>
    </g>
    <!-- 미(E) 삼각형 그린 -->
    <g filter="url(#tSmallGlow)">
      <path d="M75 128 L86 148 L64 148 Z" fill="#00E676" opacity="0.9"/>
    </g>
    <!-- 도(C) 원형 레드 — 매치 중! -->
    <g filter="url(#tSmallGlow)">
      <circle cx="105" cy="140" r="11" fill="#FF1744" opacity="0.9"/>
    </g>
    <!-- 두 번째 행 -->
    <g filter="url(#tSmallGlow)">
      <path d="M15 92 L22 104 L18 104 L18 110 L12 110 L12 104 L8 104 Z" fill="#D500F9" opacity="0.9"/>
    </g>
    <g filter="url(#tSmallGlow)">
      <rect x="38" y="88" width="16" height="16" rx="1" fill="#2979FF" opacity="0.9" transform="rotate(45 46 96)"/>
    </g>
    <g filter="url(#tSmallGlow)">
      <rect x="68" y="92" width="16" height="16" rx="2" fill="#FFAB00" opacity="0.9"/>
    </g>
    <g filter="url(#tSmallGlow)">
      <circle cx="105" cy="100" r="11" fill="#FF1744" opacity="0.9"/>
    </g>

    <!-- 세 번째 행 — 3매치 하이라이트 (세로 3 레드 원) -->
    <g filter="url(#tGlowF)">
      <circle cx="105" cy="60" r="11" fill="#FF1744"/>
      <!-- 매치 글로우 이펙트 -->
      <circle cx="105" cy="60" r="14" stroke="#FF1744" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="105" cy="100" r="14" stroke="#FF1744" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="105" cy="140" r="14" stroke="#FF1744" stroke-width="2" fill="none" opacity="0.5"/>
    </g>

    <!-- 떨어지는 블록 (상단) -->
    <g filter="url(#tSmallGlow)" opacity="0.8">
      <path d="M45 12 L52 24 L48 24 L48 30 L42 30 L42 24 L38 24 Z" fill="#D500F9"/>
    </g>
    <!-- 고스트 블록 -->
    <rect x="38" y="52" width="16" height="16" rx="1" fill="none" stroke="#D500F9" stroke-width="1" stroke-dasharray="3 2" opacity="0.3" transform="rotate(45 46 60)"/>
  </g>

  <!-- 체인 텍스트 -->
  <g filter="url(#tTextGlow)">
    <text x="300" y="145" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="bold" fill="#00E5FF" text-anchor="middle">Chain ×3!</text>
  </g>

  <!-- 부유 음표 -->
  <g opacity="0.5" filter="url(#tSmallGlow)">
    <g transform="translate(40, 60)">
      <ellipse cx="0" cy="0" rx="4" ry="3" fill="#D500F9" transform="rotate(-15)"/>
      <line x1="3" y1="-1" x2="3" y2="-12" stroke="#D500F9" stroke-width="1.2"/>
      <path d="M3 -12 Q7 -10 5 -7" stroke="#D500F9" stroke-width="1" fill="none"/>
    </g>
    <g transform="translate(360, 80)">
      <ellipse cx="0" cy="0" rx="3.5" ry="2.5" fill="#00E676" transform="rotate(-10)"/>
      <line x1="3" y1="-1" x2="3" y2="-10" stroke="#00E676" stroke-width="1"/>
      <path d="M3 -10 Q6 -8 5 -6" stroke="#00E676" stroke-width="0.8" fill="none"/>
    </g>
    <g transform="translate(100, 200)">
      <ellipse cx="0" cy="0" rx="3" ry="2.2" fill="#2979FF" transform="rotate(-12)"/>
      <line x1="2.5" y1="-1" x2="2.5" y2="-9" stroke="#2979FF" stroke-width="0.8"/>
    </g>
    <g transform="translate(320, 220)">
      <ellipse cx="0" cy="0" rx="3.5" ry="2.5" fill="#FFAB00" transform="rotate(-18)"/>
      <line x1="3" y1="-1" x2="3" y2="-10" stroke="#FFAB00" stroke-width="1"/>
    </g>
  </g>

  <!-- 별 배경 -->
  <g opacity="0.5">
    <circle cx="30" cy="20" r="1.2" fill="#FFFFFF"/>
    <circle cx="180" cy="15" r="1" fill="#D500F9"/>
    <circle cx="350" cy="25" r="1.5" fill="#FFFFFF"/>
    <circle cx="80" cy="45" r="0.8" fill="#FFFFFF"/>
    <circle cx="280" cy="35" r="0.7" fill="#00E5FF"/>
    <circle cx="370" cy="55" r="1" fill="#FFFFFF"/>
  </g>

  <!-- 제목 -->
  <g filter="url(#tTextGlow)">
    <text x="200" y="40" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" text-anchor="middle">BEAT CRAFTER</text>
    <text x="200" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#B0B0C0" text-anchor="middle">비트 크래프터</text>
  </g>

  <!-- 하단 장르 태그 -->
  <g opacity="0.6">
    <rect x="140" y="270" width="50" height="18" rx="9" fill="none" stroke="#D500F9" stroke-width="1"/>
    <text x="165" y="283" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#D500F9" text-anchor="middle">PUZZLE</text>
    <rect x="200" y="270" width="60" height="18" rx="9" fill="none" stroke="#00E5FF" stroke-width="1"/>
    <text x="230" y="283" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#00E5FF" text-anchor="middle">RHYTHM</text>
  </g>

  <!-- 테두리 -->
  <rect x="1" y="1" width="398" height="298" rx="8" fill="none" stroke="#2A2A5E" stroke-width="1.5"/>
</svg>
