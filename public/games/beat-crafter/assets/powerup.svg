<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="puGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <radialGradient id="puGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="puCore" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="20%" stop-color="#FFAB00"/>
      <stop offset="40%" stop-color="#00E676"/>
      <stop offset="60%" stop-color="#2979FF"/>
      <stop offset="80%" stop-color="#D500F9"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
    <filter id="puGlowF">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puSoftGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 오라 글로우 -->
  <circle cx="24" cy="24" r="22" fill="url(#puGlow)"/>
  <!-- 무지개 회전 링 -->
  <circle cx="24" cy="24" r="18" stroke="url(#ringGrad)" stroke-width="2" fill="none" opacity="0.5" filter="url(#puSoftGlow)"/>
  <!-- 메인 바디 — 음표 모양 크리스탈 -->
  <g filter="url(#puGlowF)">
    <!-- 크리스탈 다이아몬드 외곽 -->
    <path d="M24 6 L36 20 L24 42 L12 20 Z" fill="url(#puGrad)" stroke="#00E5FF" stroke-width="1" opacity="0.9"/>
    <!-- 내부 면 (입체감) -->
    <path d="M24 6 L30 20 L24 42 Z" fill="#2979FF" opacity="0.3"/>
    <path d="M24 6 L18 20 L24 42 Z" fill="#FFFFFF" opacity="0.1"/>
    <!-- 중앙 음악 심볼 (트레블 클레프 느낌의 S곡선) -->
    <path d="M22 16 Q20 20 24 22 Q28 24 26 28 Q24 32 20 30" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <circle cx="20" cy="30" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <!-- 코어 빛 -->
  <ellipse cx="22" cy="18" rx="5" ry="6" fill="url(#puCore)"/>
  <!-- 스파크 -->
  <g opacity="0.6" filter="url(#puSoftGlow)">
    <circle cx="8" cy="10" r="1.5" fill="#FFAB00"/>
    <circle cx="40" cy="12" r="1.2" fill="#FF1744"/>
    <circle cx="6" cy="36" r="1" fill="#00E676"/>
    <circle cx="42" cy="34" r="1.5" fill="#D500F9"/>
    <circle cx="24" cy="3" r="1" fill="#FFFFFF"/>
  </g>
</svg>
