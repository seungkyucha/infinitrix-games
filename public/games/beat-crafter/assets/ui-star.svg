<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="40%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FFAB00"/>
    </linearGradient>
    <radialGradient id="starShine" cx="40%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlowF">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 오라 -->
  <circle cx="16" cy="16" r="14" fill="url(#starAura)"/>
  <!-- 별 본체 -->
  <g filter="url(#starGlowF)">
    <path d="M16 3 L19.2 11.5 L28 12.2 L21.5 18 L23.5 27 L16 22.5 L8.5 27 L10.5 18 L4 12.2 L12.8 11.5 Z"
          fill="url(#starGrad)" stroke="#FFAB00" stroke-width="0.5"/>
    <!-- 하이라이트 -->
    <path d="M16 5 L17.8 10.5 L13.5 12 L10 13 L16 8 Z"
          fill="url(#starShine)"/>
  </g>
  <!-- 음표 스파크 -->
  <g opacity="0.5">
    <circle cx="6" cy="6" r="1" fill="#D500F9"/>
    <circle cx="27" cy="7" r="0.8" fill="#00E5FF"/>
    <circle cx="5" cy="26" r="0.8" fill="#FF1744"/>
    <circle cx="28" cy="25" r="1" fill="#00E676"/>
  </g>
</svg>
