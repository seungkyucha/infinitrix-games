// ────────────────────────────────────────
// 5. TweenManager (Cycle 4 clearImmediate)
// ────────────────────────────────────────
class TweenManager {
  constructor() { this._tweens = []; }
  // 트윈 추가
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props:{}, dur, elapsed:0, ease:ease||'linear', onComplete };
    for (const k in props) t.props[k] = { from:obj[k], to:props[k] };
    this._tweens.push(t);
    return t;
  }
  // 프레임 업데이트 — 역순 순회
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const r = Math.min(t.elapsed / t.dur, 1);
      const e = this._ease(t.ease, r);
      for (const k in t.props) {
        const p = t.props[k];
        t.obj[k] = p.from + (p.to - p.from) * e;
      }
      if (r >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // 이징 함수
  _ease(name, t) {
    switch(name) {
      case 'easeIn': return t*t;
      case 'easeOut': return 1-(1-t)*(1-t);
      case 'easeInOut': return t<0.5?2*t*t:1-(-2*t+2)**2/2;
      case 'easeOutBack': { const c=1.70158; return 1+((t-1)**2)*((c+1)*(t-1)+c); }
      case 'easeOutBounce': {
        if(t<1/2.75) return 7.5625*t*t;
        if(t<2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
        if(t<2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
        return 7.5625*(t-=2.625/2.75)*t+0.984375;
      }
      case 'easeOutElastic': {
        if(t===0||t===1) return t;
        return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI)/3)+1;
      }
      default: return t;
    }
  }
  // 즉시 정리 — cancelAll+add 경쟁 조건 방지 (Cycle 4)
  clearImmediate() { this._tweens.length = 0; }
  get count() { return this._tweens.length; }
}
const tw = new TweenManager();

// 6. TransitionGuard (Cycle 3,5,8 교훈)
// ────────────────────────────────────────
class TransitionGuard {
  constructor(fn) { this._t = false; this._fn = fn; }
  // 상태 전환 — 우선순위 가드
  beginTransition(target, opts) {
    const imm = opts && opts.immediate;
    if (this._t && (STATE_PRIORITY[target]||0) <= (STATE_PRIORITY[gameState]||0)) return false;
    if (imm) { this._fn(target); return true; }
    this._t = true;
    tw.clearImmediate();
    transitionFade = { alpha:0 };
    tw.add(transitionFade, {alpha:1}, CONFIG.TRANSITION_DURATION, 'easeIn', () => {
      this._fn(target);
      tw.add(transitionFade, {alpha:0}, CONFIG.TRANSITION_DURATION, 'easeOut', () => { this._t = false; });
    });
    return true;
  }
  get transitioning() { return this._t; }
  reset() { this._t = false; }
}

}

// 7. SoundManager (Web Audio, §12)
// ────────────────────────────────────────
class SoundManager {
  constructor() { this._ctx = null; this._vol = 0.3; this._muted = false; }
  _init() {
    if (this._ctx) return;
    try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  resume() { this._init(); if (this._ctx && this._ctx.state === 'suspended') this._ctx.resume(); }
  setMuted(m) { this._muted = m; }
  _gain(t, dur, vol) {
    const g = this._ctx.createGain();
    g.gain.setValueAtTime((vol||1)*this._vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    g.connect(this._ctx.destination);
    return g;
  }
  // 효과음 — 파라미터 기반 스케줄링 (setTimeout 0건)
  play(name) {
    if (!this._ctx || this._muted) return;
    const t = this._ctx.currentTime;
    try {
      switch(name) {
        case 'key': {
          const o = this._ctx.createOscillator(); o.type='square';
          o.frequency.setValueAtTime(440,t);
          o.connect(this._gain(t,0.03,0.2)); o.start(t); o.stop(t+0.03); break;
        }
        case 'delete': {
          const o = this._ctx.createOscillator(); o.type='square';
          o.frequency.setValueAtTime(330,t);
          o.connect(this._gain(t,0.03,0.2)); o.start(t); o.stop(t+0.03); break;
        }
        case 'flip': {
          const o = this._ctx.createOscillator(); o.type='triangle';
          o.frequency.setValueAtTime(520,t);
          o.frequency.linearRampToValueAtTime(660,t+0.15);
          o.connect(this._gain(t,0.15,0.3)); o.start(t); o.stop(t+0.15); break;
        }
        case 'submit': {
          const o = this._ctx.createOscillator(); o.type='triangle';
          o.frequency.setValueAtTime(440,t);
          o.connect(this._gain(t,0.05,0.3)); o.start(t); o.stop(t+0.05); break;
        }
        case 'win': {
          [523.25,659.25,783.99].forEach((f,i) => {
            const o = this._ctx.createOscillator(); o.type='sine';
            o.frequency.setValueAtTime(f,t+i*0.1);
            o.connect(this._gain(t+i*0.1,0.2,0.4)); o.start(t+i*0.1); o.stop(t+i*0.1+0.2);
          }); break;
        }
        case 'lose': {
          const o = this._ctx.createOscillator(); o.type='sawtooth';
          o.frequency.setValueAtTime(220,t);
          o.frequency.linearRampToValueAtTime(110,t+0.4);
          o.connect(this._gain(t,0.4,0.3)); o.start(t); o.stop(t+0.4); break;
        }
        case 'invalid': {
          const buf = this._ctx.createBuffer(1,this._ctx.sampleRate*0.1,this._ctx.sampleRate);
          const d = buf.getChannelData(0);
          for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.3;
          const s = this._ctx.createBufferSource(); s.buffer=buf;
          const f = this._ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
          s.connect(f); f.connect(this._gain(t,0.1,0.4)); s.start(t); break;
        }
      }
    } catch(e) {}
  }
}
const sound = new SoundManager();

// ────────────────────────────────────────
// 8. 순수 함수: 자모 분해 (§8.1)
// ────────────────────────────────────────
// 한글 한 글자를 자모 배열로 분해
function decomposeHangul(ch) {
  const code = ch.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return [ch];
  const cho = Math.floor(code / 588);
  const jung = Math.floor((code % 588) / 28);
  const jong = code % 28;
  const res = [CHO[cho], JUNG[jung]];
  if (jong > 0) {
    const j = JONG[jong];
    if (DOUBLE_JONG[j]) res.push(...DOUBLE_JONG[j]);
    else res.push(j);
  }
  return res;
}

// 단어를 자모 배열로 분해
function decomposeWord(word) {
  return [...word].flatMap(decomposeHangul);
}

// 음절 경계 계산
function getSyllableBounds(word) {
  const bounds = [];
  let pos = 0;
  for (const ch of word) {
    const jamo = decomposeHangul(ch);
    bounds.push({ start:pos, end:pos+jamo.length-1 });
    pos += jamo.length;
  }
  return bounds;
}

// ────────────────────────────────────────
// 9. 순수 함수: 피드백 판정 (§8.2)
// ────────────────────────────────────────
function evaluateGuess(guessJamo, answerJamo) {
  const result = new Array(guessJamo.length).fill('absent');
  const used = new Array(answerJamo.length).fill(false);
  // 1차: 정확 위치
  for (let i = 0; i < guessJamo.length; i++) {
    if (guessJamo[i] === answerJamo[i]) { result[i] = 'correct'; used[i] = true; }
  }
  // 2차: 포함 다른 위치
  for (let i = 0; i < guessJamo.length; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < answerJamo.length; j++) {
      if (!used[j] && guessJamo[i] === answerJamo[j]) { result[i] = 'present'; used[j] = true; break; }
    }
  }
  return result;
}

// 점수 계산 (§7.1)
function calculateScore(attempts, diffKey, elapsed, mode) {
  const base = (CONFIG.MAX_ATTEMPTS - attempts + 1) * 100;
  const dm = diffKey==='EASY'?1.0:diffKey==='MEDIUM'?1.5:2.0;
  const tb = mode===MODES.DAILY?Math.max(0,300-elapsed):0;
  const cm = mode===MODES.CHOSUNG?1.3:1.0;
  return Math.floor(base*dm*cm+tb);
}

// 일일 단어 선정
function getDailyWord(dict, dateStr) {
  return dict[parseInt(dateStr,10) % dict.length];
}

// 이모지 공유 생성
function generateShareText(allResults, attStr, maxAtt, dateStr) {
  const h = '한글 워드 퀘스트 '+dateStr+' '+attStr+'/'+maxAtt+'\n\n';
  return h + allResults.map(row => row.map(r => r==='correct'?'🟩':r==='present'?'🟨':'⬛').join('')).join('\n');
}

// 승리 확인
function checkWin(results) { return results.every(r => r==='correct'); }

// ────────────────────────────────────────
// 11. 레이아웃 계산 (§13)
// ────────────────────────────────────────
function calculateLayout(w, h, diffKey, jCount, mAtt) {
  const cols = jCount || CONFIG.DIFFICULTY[diffKey].maxJamo;
  const rows = mAtt || CONFIG.MAX_ATTEMPTS;
  let cellSize = w>=420?52:w>=360?48:40;
  const cellGap = CONFIG.CELL_GAP;
  const maxCW = Math.floor((w-20-cellGap*(cols-1))/cols);
  cellSize = Math.min(cellSize, maxCW, 52);
  const gridW = cols*cellSize+(cols-1)*cellGap;
  const gridH = rows*cellSize+(rows-1)*cellGap;
  const gridX = (w-gridW)/2;
  const titleBarH = 44;
  let keyW = w>=420?48:w>=360?44:40;
  const keyH = 48;
  // 좁은 뷰포트에서 패딩·간격 축소로 키 너비 44px 이상 확보
  const kbPad = w<440?6:20;
  const keyGap = w<440?2:4;
  const maxKW = Math.floor((w-kbPad-keyGap*9)/10);
  keyW = Math.min(keyW, maxKW);
  // 터치 히트박스는 키 중간점까지 확장 (WCAG 44px 보장)
  const touchKeyW = Math.max(keyW, Math.floor((w-kbPad)/10));
  const kbTotalH = 3*keyH+2*keyGap+keyH+keyGap;
  const kbY = h-kbTotalH-10;
  const availH = kbY-titleBarH-20;
  const gridY = titleBarH+Math.max(10,(availH-gridH)/2);
  return {gridX,gridY,cellSize,cellGap,gridW,gridH,kbY,keyW,keyH,keyGap,touchKeyW,kbPad,cols,rows,titleBarH};
}

// ────────────────────────────────────────
// 12. Canvas 리사이즈 (§13.1)
// ────────────────────────────────────────
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W = Math.min(window.innerWidth, 500);
  H = window.innerHeight;
  canvas.width = W*dpr;
  canvas.height = H*dpr;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if (gameState === STATES.PLAYING && jamoCount > 0) {
    layout = calculateLayout(W, H, currentDifficulty, jamoCount, maxAttempts);
  } else {
    layout = calculateLayout(W, H, currentDifficulty);
  }
}

function enterPlaying() {

  const dict = currentDifficulty==='EASY'?DICT_EASY:currentDifficulty==='MEDIUM'?DICT_MEDIUM:DICT_HARD;
  if (currentMode === MODES.DAILY) {

      jamoCount = targetJamo.length;

      guard.beginTransition(STATES.RESULT, {immediate:true});
      return;
    }
    targetWord = getDailyWord(dict, today);
  } else {
    targetWord = dict[Math.floor(Math.random()*dict.length)];
  }
  targetJamo = decomposeWord(targetWord);
  jamoCount = targetJamo.length;
  maxAttempts = currentMode===MODES.CHOSUNG?CONFIG.CHOSUNG_ATTEMPTS:CONFIG.MAX_ATTEMPTS;
  syllableBounds = getSyllableBounds(targetWord);
  // 그리드 초기화
  grid = [];
  for (let r = 0; r < maxAttempts; r++) {
    const row = [];
    for (let c = 0; c < jamoCount; c++) row.push({jamo:'',state:'empty',flipProgress:0,bounceY:0,scale:1,_flipObj:null,_flipResult:null});
    grid.push(row);
  }
  // 초성 퀴즈 고정
  chosungFixed = [];
  if (currentMode === MODES.CHOSUNG) {
    syllableBounds.forEach(b => {
      chosungFixed.push(b.start);
      grid[0][b.start].jamo = targetJamo[b.start];
      grid[0][b.start].state = 'correct';
    });
    inputJamo = grid[0].map(c => c.jamo);
    currentCol = getNextEditableCol(0);
  } else {
    inputJamo = [];
    currentCol = 0;
  }
  currentRow = 0;
  keyboardState = {};
  gameWon = false;
  gameLost = false;
  shiftActive = false;
  startTime = Date.now();
  shakeOffset = 0;
  shakeTimer = 0;
  toastTimer = 0;

  layout = calculateLayout(W, H, currentDifficulty, jamoCount, maxAttempts);

// 초성 퀴즈: 다음 편집 가능 열
function getNextEditableCol(startCol) {
  for (let c = startCol; c < jamoCount; c++) { if (!chosungFixed.includes(c)) return c; }
  return jamoCount;
}
// 이전 편집 가능 열
function getPrevEditableCol(startCol) {
  for (let c = startCol-1; c >= 0; c--) { if (!chosungFixed.includes(c)) return c; }
  return -1;
}

function enterResult() {
  elapsedSeconds = Math.floor((Date.now()-startTime)/1000);
  if (gameWon) {
    lastScore = calculateScore(currentRow+1, currentDifficulty, elapsedSeconds, currentMode);
    sound.play('win');
  } else {
    lastScore = 0;
    sound.play('lose');
  }
  // 판정 먼저, 저장 나중 (Cycle 2)
  const isNewBest = lastScore > cachedStats.bestScore;
  cachedStats.totalPlayed++;
  if (gameWon) {
    cachedStats.totalWon++;
    cachedStats.currentStreak++;
    cachedStats.maxStreak = Math.max(cachedStats.maxStreak, cachedStats.currentStreak);
    if (currentRow < 6) cachedStats.distribution[currentRow] = (cachedStats.distribution[currentRow]||0)+1;
  } else {
    cachedStats.currentStreak = 0;
  }
  cachedStats.bestScore = Math.max(cachedStats.bestScore, lastScore);
  saveStats(cachedStats);
  if (currentMode === MODES.DAILY) {
    cachedDaily = {date:getTodayStr(),finished:true,won:gameWon,attempts:currentRow+1};
    saveDaily(cachedDaily);
  }
  resultNewBest = isNewBest;
  // 공유 텍스트
  const allR = [];
  const endRow = gameWon ? currentRow : Math.min(currentRow, maxAttempts-1);
  for (let r = 0; r <= endRow; r++) allR.push(grid[r].map(c=>c.state));
  resultShareText = generateShareText(allR, gameWon?(currentRow+1):'X', maxAttempts, getTodayStr());
  copiedToast = 0;
}

function enterStats() { loadStats(); }

// ────────────────────────────────────────
// 14. 입력 처리
// ────────────────────────────────────────

function handleJamoInput(jamo) {
  if (gameWon || gameLost || currentRow >= maxAttempts || currentCol >= jamoCount) return;
  // 복합 모음 시도
  if (inputJamo.length > 0) {
    const prev = inputJamo[inputJamo.length-1];
    const comp = COMPOUND_VOWEL[prev+jamo];
    if (comp && JUNG.includes(prev) && JUNG.includes(jamo)) {
      inputJamo[inputJamo.length-1] = comp;
      const pc = currentMode===MODES.CHOSUNG?getPrevEditableCol(currentCol):currentCol-1;
      if (pc >= 0) { grid[currentRow][pc].jamo = comp; animInput(currentRow,pc); }
      sound.play('key');
      return;
    }
  }
  inputJamo.push(jamo);
  grid[currentRow][currentCol].jamo = jamo;
  grid[currentRow][currentCol].state = 'typing';
  animInput(currentRow, currentCol);
  sound.play('key');
  currentCol = currentMode===MODES.CHOSUNG?getNextEditableCol(currentCol+1):currentCol+1;
}

function handleDelete() {
  if (gameWon || gameLost) return;
  if (currentMode === MODES.CHOSUNG) {
    const pc = getPrevEditableCol(currentCol);
    if (pc < 0) return;
    grid[currentRow][pc].jamo = '';
    grid[currentRow][pc].state = 'empty';
    inputJamo.pop();
    currentCol = pc;
  } else {
    if (currentCol <= 0 && inputJamo.length === 0) return;
    currentCol--;
    grid[currentRow][currentCol].jamo = '';
    grid[currentRow][currentCol].state = 'empty';
    inputJamo.pop();
  }
  sound.play('delete');
}

function handleSubmit() {
  if (gameWon || gameLost || currentRow >= maxAttempts) return;
  if (grid[currentRow].some(c => c.jamo==='')) {
    triggerShake();
    sound.play('invalid');
    showToast('모든 칸을 채워주세요');
    return;
  }
  sound.play('submit');
  const guessJ = grid[currentRow].map(c=>c.jamo);
  const result = evaluateGuess(guessJ, targetJamo);
  startFlipAnim(currentRow, result);
}

// 타일 스케일 애니메이션
function animInput(row, col) {
  const c = grid[row][col];
  c.scale = 1.15;
  tw.add(c, {scale:1}, 100, 'easeOutBack');
}

function triggerShake() { shakeTimer = CONFIG.SHAKE_DURATION; }
function showToast(msg) { toastMsg = msg; toastTimer = 2000; }

// 타일 플립 시퀀스
function startFlipAnim(row, results) {
  let done = 0;
  for (let c = 0; c < jamoCount; c++) {
    const cell = grid[row][c];
    const delay = c * CONFIG.FLIP_DELAY_PER_TILE;
    const rs = results[c];
    const fObj = { progress:0 };
    cell._flipObj = fObj;
    cell._flipResult = rs;
    const wait = { t:0 };
    tw.add(wait, {t:1}, delay, 'linear', () => {
      sound.play('flip');
      tw.add(fObj, {progress:1}, CONFIG.FLIP_DURATION, 'easeInOut', () => {
        cell.flipProgress = 0;
        cell._flipObj = null;
        cell.state = rs;
        done++;
        if (done === jamoCount) onFlipDone(row, results);
      });
    });
  }
}

// 플립 완료 — 가드 플래그 (Cycle 3)
function onFlipDone(row, results) {
  if (flipCompleteGuard) return;
  flipCompleteGuard = true;
  // 키보드 색상 업데이트
  const pri = {'absent':0,'present':1,'correct':2};
  for (let c = 0; c < jamoCount; c++) {
    const j = grid[row][c].jamo;
    const s = results[c];
    if (!keyboardState[j] || pri[s] > pri[keyboardState[j]]) keyboardState[j] = s;
  }
  if (checkWin(results)) {
    gameWon = true;
    startBounce(row);
    return;
  }
  currentRow++;
  if (currentRow >= maxAttempts) {
    gameLost = true;
    const w = {t:0};
    tw.add(w, {t:1}, 800, 'linear', () => { guard.beginTransition(STATES.RESULT); });
    return;
  }
  // 다음 행 초기화
  if (currentMode === MODES.CHOSUNG) {
    chosungFixed.forEach(idx => { grid[currentRow][idx].jamo = targetJamo[idx]; grid[currentRow][idx].state = 'correct'; });
    inputJamo = grid[currentRow].map(c=>c.jamo);
    currentCol = getNextEditableCol(0);
  } else {
    inputJamo = [];
    currentCol = 0;
  }
  flipCompleteGuard = false;
}

// 승리 바운스
function startBounce(row) {
  let done = 0;
  for (let c = 0; c < jamoCount; c++) {
    const cell = grid[row][c];
    const w = {t:0};
    tw.add(w, {t:1}, c*50, 'linear', () => {
      cell.bounceY = 0;
      tw.add(cell, {bounceY:-15}, 200, 'easeOut', () => {
        tw.add(cell, {bounceY:0}, 300, 'easeOutBounce', () => {
          done++;
          if (done === jamoCount) {
            flipCompleteGuard = false;
            const w2 = {t:0};
            tw.add(w2, {t:1}, 500, 'linear', () => { guard.beginTransition(STATES.RESULT); });
          }
        });
      });
    });
  }
}

// ────────────────────────────────────────
// 15. 렌더링 함수
// ────────────────────────────────────────

// 둥근 사각형 경로
function rr(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// 그리드 렌더링 (파라미터 기반)
function renderGrid(c, gd, lay, jLen, mAtt, sBounds) {
  const {gridX,gridY,cellSize,cellGap} = lay;
  const sx = shakeOffset;
  for (let r = 0; r < mAtt; r++) {
    for (let i = 0; i < jLen; i++) {
      const cell = gd[r][i];
      const x = gridX+i*(cellSize+cellGap)+sx;
      const y = gridY+r*(cellSize+cellGap)+(cell.bounceY||0);
      let scY = 1, ds = cell.state;
      if (cell._flipObj) {
        const p = cell._flipObj.progress;
        if (p < 0.5) { scY = 1-p*2; }
        else { scY = (p-0.5)*2; ds = cell._flipResult; }
      }
      const sc = cell.scale||1;
      let bg = COLORS.empty, bd = cell.jamo?COLORS.borderActive:COLORS.border;
      if (ds==='correct') { bg=COLORS.correct; bd=COLORS.correct; }
      else if (ds==='present') { bg=COLORS.present; bd=COLORS.present; }
      else if (ds==='absent') { bg=COLORS.absent; bd=COLORS.absent; }
      c.save();
      c.translate(x+cellSize/2, y+cellSize/2);
      c.scale(sc, scY*sc);
      c.fillStyle = bg;
      c.fillRect(-cellSize/2,-cellSize/2,cellSize,cellSize);
      c.strokeStyle = bd; c.lineWidth = 2;
      c.strokeRect(-cellSize/2,-cellSize/2,cellSize,cellSize);
      if (cell.jamo && Math.abs(scY) > 0.1) {
        c.fillStyle = COLORS.text;
        const fs = cellSize<=40?16:cellSize<=48?20:22;
        c.font = 'bold '+fs+'px '+FONT;
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(cell.jamo, 0, 1);
        // 색맹 보조 (§11.6)
        if (ds==='correct'||ds==='present'||ds==='absent') {
          c.font = Math.round(fs*0.4)+'px '+FONT;
          c.fillStyle = 'rgba(255,255,255,0.45)';
          c.fillText(ds==='correct'?'✓':ds==='present'?'→':'✗', cellSize/2-8, -cellSize/2+9);
        }
      }
      c.restore();
    }
  }
  // 음절 글로우 힌트
  for (let r = 0; r < mAtt; r++) {
    for (const b of sBounds) {
      let ok = true;
      for (let i = b.start; i <= b.end; i++) { if (gd[r][i].state !== 'correct') { ok=false; break; } }
      if (ok) {
        const bx = gridX+b.start*(cellSize+cellGap)+sx-3;
        const by = gridY+r*(cellSize+cellGap)-3;
        const bw = (b.end-b.start+1)*(cellSize+cellGap)-cellGap+6;
        const bh = cellSize+6;
        c.save();
        c.strokeStyle = COLORS.cyan; c.lineWidth = 2;
        c.shadowColor = COLORS.cyan; c.shadowBlur = 10;
        c.strokeRect(bx,by,bw,bh);
        c.restore();
      }
    }
  }
}

// 가상 키보드 렌더링
function renderKeyboard(c, lay, kbSt, isShift) {
  const {kbY,keyW,keyH,keyGap} = lay;
  for (let r = 0; r < KB_ROWS.length; r++) {
    const row = KB_ROWS[r];
    const rowW = row.length*keyW+(row.length-1)*keyGap;
    const startX = (W-rowW)/2;
    const y = kbY+r*(keyH+keyGap);
    for (let k = 0; k < row.length; k++) {
      let key = row[k];
      const x = startX+k*(keyW+keyGap);
      const isSp = key==='⇧'||key==='⌫';
      let dk = key;
      if (isShift && SHIFT_MAP[key]) dk = SHIFT_MAP[key];
      let bg = '#818384';
      const st = kbSt[key]||kbSt[SHIFT_MAP[key]];
      if (st==='correct') bg=COLORS.correct;
      else if (st==='present') bg=COLORS.present;
      else if (st==='absent') bg='#3A3A3C';
      if (isSp) bg = key==='⇧'&&isShift?COLORS.pink:COLORS.cyan;

// ────────────────────────────────────────
// 16. 게임 루프 (§11.9 try-catch)
// ────────────────────────────────────────
function gameLoop(timestamp) {
  try {
    const dt = Math.min(timestamp - lastTime, 100);
    lastTime = timestamp;
    // 상태별 TweenManager 업데이트 (§5.3 매트릭스)
    if (gameState !== STATES.PAUSED) tw.update(dt);
    // 흔들기
    if (shakeTimer > 0) {
      shakeTimer -= dt;
      shakeOffset = Math.sin(shakeTimer*0.05)*6*(shakeTimer/CONFIG.SHAKE_DURATION);
      if (shakeTimer <= 0) { shakeTimer=0; shakeOffset=0; }
    }
    // 타이머 감소
    if (toastTimer > 0) toastTimer -= dt;
    if (copiedToast > 0) copiedToast -= dt;
    // 렌더링
    switch(gameState) {
      case STATES.TITLE: renderTitle(ctx, timestamp); break;
      case STATES.MODE_SELECT: renderModeSelect(ctx); break;
      case STATES.PLAYING: renderPlaying(ctx, timestamp); break;
      case STATES.PAUSED: renderPlaying(ctx, timestamp); renderPaused(ctx); break;
      case STATES.RESULT: renderResult(ctx, timestamp); break;
      case STATES.STATS: renderStats(ctx); break;
    }
    // 전환 페이드
    if (transitionFade.alpha > 0.01) {
      ctx.fillStyle = 'rgba(18,18,19,'+transitionFade.alpha+')';
      ctx.fillRect(0,0,W,H);
    }
  } catch(e) {
    console.error('[HangulWordQuest] Loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

  KeyB:'ㅠ',KeyN:'ㅜ',KeyM:'ㅡ',
};
const SKC = {KeyQ:'ㅃ',KeyW:'ㅉ',KeyE:'ㄸ',KeyR:'ㄲ',KeyT:'ㅆ',KeyO:'ㅒ',KeyP:'ㅖ'};

function handleKeyDown(e) {
  sound.resume();
  if (e.key==='Escape') {
    if (gameState===STATES.PLAYING) guard.beginTransition(STATES.PAUSED,{immediate:true});
    else if (gameState===STATES.PAUSED) guard.beginTransition(STATES.PLAYING,{immediate:true});
    return;
  }
  if (gameState===STATES.TITLE) {
    if (e.code==='Space'||e.key==='Enter') guard.beginTransition(STATES.MODE_SELECT);
    return;
  }
  if (gameState===STATES.MODE_SELECT) {
    if (e.key==='Enter') startGame();
    return;
  }
  if (gameState===STATES.PLAYING) {
    if (e.key==='Enter') { handleSubmit(); return; }
    if (e.key==='Backspace') { e.preventDefault(); handleDelete(); return; }
    if (e.key==='Shift') { shiftActive=true; return; }
    let j = null;
    if (e.shiftKey && SKC[e.code]) j=SKC[e.code];
    else if (KC[e.code]) j=KC[e.code];
    if (j) handleJamoInput(j);
    return;
  }
  if (gameState===STATES.RESULT) {
    if (e.key==='r'||e.key==='R') guard.beginTransition(STATES.MODE_SELECT);
  }
}

function handleKeyUp(e) { if (e.key==='Shift') shiftActive=false; }

function startGame() {
  if (cachedSettings) { cachedSettings.difficulty=currentDifficulty; saveSettings(cachedSettings); }
  guard.beginTransition(STATES.PLAYING);
}

// 좌표 변환
function gcp(e) {
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};
}
// 히트 테스트
function ht(p,b) { return p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h; }

function handlePointerDown(e) {
  e.preventDefault();
  sound.resume();
  const t = e.touches?e.touches[0]:e;
  const p = gcp(t);

  if (gameState===STATES.TITLE) { guard.beginTransition(STATES.MODE_SELECT); return; }
  if (gameState===STATES.MODE_SELECT) {
    for (const b of modeButtons) { if (ht(p,b)) { currentMode=b.mode; sound.play('key'); return; } }
    for (const b of diffButtons) { if (ht(p,b)) { currentDifficulty=b.diff; sound.play('key'); return; } }
    if (ht(p,soundToggleArea)) { cachedSettings.soundOn=!cachedSettings.soundOn; sound.setMuted(!cachedSettings.soundOn); saveSettings(cachedSettings); sound.play('key'); return; }
    if (ht(p,playButton)) { startGame(); return; }
    if (ht(p,statsButton)) { guard.beginTransition(STATES.STATS); return; }
    return;
  }
  if (gameState===STATES.PLAYING) {
    if (ht(p,pauseButton)) { guard.beginTransition(STATES.PAUSED,{immediate:true}); return; }
    handleKBTouch(p);
    return;
  }
  if (gameState===STATES.PAUSED) {
    if (ht(p,resumeBtn)) { guard.beginTransition(STATES.PLAYING,{immediate:true}); return; }
    if (ht(p,titleBtn)) { guard.beginTransition(STATES.TITLE); return; }
    return;
  }
  if (gameState===STATES.RESULT) {
    if (ht(p,shareBtn)) { copyShare(); return; }
    if (ht(p,retryBtn)) { guard.beginTransition(STATES.MODE_SELECT); return; }
    if (ht(p,resultStatsBtn)) { guard.beginTransition(STATES.STATS); return; }
    if (ht(p,homeBtn)) { guard.beginTransition(STATES.TITLE); return; }
    return;
  }
  if (gameState===STATES.STATS) {
    if (ht(p,statsBackBtn)) { guard.beginTransition(STATES.MODE_SELECT); return; }
  }
}

// 가상 키보드 터치 — 확장 히트박스로 WCAG 44px 보장
function handleKBTouch(p) {
  const {kbY,keyW,keyH,keyGap,touchKeyW} = layout;
  // 확인 버튼
  const eW=Math.min(W-40,200),eH=keyH,eX=(W-eW)/2,eY=kbY+3*(keyH+keyGap);
  if (p.x>=eX&&p.x<=eX+eW&&p.y>=eY&&p.y<=eY+eH) { handleSubmit(); return; }
  // 키 행 — 터치 영역은 키 중심점 기준 가장 가까운 키로 판정
  for (let r=0;r<KB_ROWS.length;r++) {
    const row=KB_ROWS[r];
    const rw=row.length*keyW+(row.length-1)*keyGap;
    const sx=(W-rw)/2;
    const y=kbY+r*(keyH+keyGap);
    // 세로 히트박스: 키 높이 + 간격 절반까지 확장
    const yPad=keyGap/2+2;
    if (p.y<y-yPad||p.y>y+keyH+yPad) continue;
    // 가로: 가장 가까운 키 중심점 기반 판정
    let bestK=-1, bestDist=Infinity;
    for (let k=0;k<row.length;k++) {
      const cx=sx+k*(keyW+keyGap)+keyW/2;
      const dist=Math.abs(p.x-cx);
      if (dist<bestDist&&dist<touchKeyW/2+2) { bestDist=dist; bestK=k; }
    }
    if (bestK>=0) {
      let key=row[bestK];
      if (key==='⇧') { shiftActive=!shiftActive; sound.play('key'); return; }
      if (key==='⌫') { handleDelete(); return; }
      if (shiftActive&&SHIFT_MAP[key]) { key=SHIFT_MAP[key]; shiftActive=false; }
      handleJamoInput(key);
      return;
    }
  }
}

// 클립보드 복사
function copyShare() {
  try {
    navigator.clipboard.writeText(resultShareText).then(()=>{copiedToast=2000;}).catch(()=>{copiedToast=2000;showToast('복사 실패');});
  } catch(e) { copiedToast=2000; showToast('클립보드 접근 불가'); }
}

// ────────────────────────────────────────
// 18. 이벤트 리스너 등록
// ────────────────────────────────────────
window.addEventListener('keydown', handleKeyDown);
window.addEventListener('keyup', handleKeyUp);
canvas.addEventListener('mousedown', handlePointerDown);
canvas.addEventListener('touchstart', handlePointerDown, {passive:false});
window.addEventListener('resize', resizeCanvas);

// ────────────────────────────────────────
// 19. 초기화
// ────────────────────────────────────────
function init() {
  loadStats();
  loadSettings();
  sound.setMuted(cachedSettings?!cachedSettings.soundOn:false);
  resizeCanvas();
  gameState = STATES.TITLE;
  enterTitle();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}
init();
</script>
</body>
</html>
