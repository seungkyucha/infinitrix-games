<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="tileActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="tileCorrect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1157"/>
    </linearGradient>
    <filter id="tileShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000040"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  <rect width="400" height="300" fill="url(#spotlight)"/>
  <!-- Decorative pattern dots -->
  <g fill="white" opacity="0.05">
    <circle cx="20" cy="20" r="8"/><circle cx="60" cy="20" r="8"/>
    <circle cx="100" cy="20" r="8"/><circle cx="140" cy="20" r="8"/>
    <circle cx="20" cy="60" r="8"/><circle cx="60" cy="60" r="8"/>
    <circle cx="340" cy="40" r="8"/><circle cx="380" cy="40" r="8"/>
    <circle cx="340" cy="80" r="8"/><circle cx="380" cy="80" r="8"/>
  </g>
  <!-- Floating Korean letters in background -->
  <text x="40" y="80" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="28" fill="#7C4DFF" opacity="0.15" transform="rotate(-15,40,80)">ㄱ</text>
  <text x="350" y="70" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="#B388FF" opacity="0.12" transform="rotate(10,350,70)">ㅎ</text>
  <text x="60" y="200" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="#7C4DFF" opacity="0.1" transform="rotate(-8,60,200)">ㅁ</text>
  <text x="340" y="210" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#B388FF" opacity="0.1" transform="rotate(12,340,210)">ㅅ</text>
  <!-- Main word grid (4x3) -->
  <g transform="translate(95,45)">
    <!-- Row 1 -->
    <g filter="url(#tileShadow)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="24" y="35" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㄱ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="55" y="0" width="48" height="48" rx="8" fill="url(#tileActive)"/>
      <text x="79" y="35" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="white">ㄴ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="110" y="0" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="134" y="35" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㄷ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="165" y="0" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="189" y="35" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㄹ</text>
    </g>
    <!-- Row 2 -->
    <g filter="url(#tileShadow)">
      <rect x="0" y="55" width="48" height="48" rx="8" fill="url(#tileCorrect)"/>
      <text x="24" y="90" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="white">한</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="55" y="55" width="48" height="48" rx="8" fill="url(#tileCorrect)"/>
      <text x="79" y="90" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="white">글</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="110" y="55" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="134" y="90" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㅂ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="165" y="55" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="189" y="90" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㅅ</text>
    </g>
    <!-- Row 3 -->
    <g filter="url(#tileShadow)">
      <rect x="0" y="110" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="24" y="145" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㅇ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="55" y="110" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="79" y="145" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㅈ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="110" y="110" width="48" height="48" rx="8" fill="url(#tileActive)"/>
      <text x="134" y="145" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="white">ㅊ</text>
    </g>
    <g filter="url(#tileShadow)">
      <rect x="165" y="110" width="48" height="48" rx="8" fill="url(#tileGrad)"/>
      <text x="189" y="145" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="bold" fill="#1A237E">ㅋ</text>
    </g>
  </g>
  <!-- Score indicator -->
  <g transform="translate(320,55)">
    <rect x="0" y="0" width="60" height="25" rx="12" fill="#7C4DFF" opacity="0.8"/>
    <text x="30" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">+100</text>
  </g>
  <!-- Sparkle effects on correct tiles -->
  <g fill="#FFEB3B" filter="url(#softGlow)">
    <polygon points="105,100 107,106 113,106 108,110 110,116 105,112 100,116 102,110 97,106 103,106" transform="scale(0.6)" opacity="0.8"/>
    <polygon points="180,100 182,106 188,106 183,110 185,116 180,112 175,116 177,110 172,106 178,106" transform="scale(0.5) translate(160,80)" opacity="0.6"/>
  </g>
  <!-- Progress bar -->
  <g transform="translate(95,215)">
    <rect x="0" y="0" width="213" height="8" rx="4" fill="#1A1A4E" opacity="0.5"/>
    <rect x="0" y="0" width="140" height="8" rx="4" fill="#7C4DFF"/>
    <rect x="0" y="0" width="140" height="4" rx="2" fill="#B388FF" opacity="0.3"/>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="#B388FF" opacity="0.5"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Malgun Gothic', Arial, sans-serif" font-size="25" font-weight="bold" fill="#B388FF" filter="url(#softGlow)">Hangul Word Quest</text>
</svg>