  drawRoundedRect(ctx, w/2 - btnW/2, h * 0.58, btnW, btnH, 10, '#E74C3C', '#FFF');
  UI.text(ctx, `🏠 ${T('toTitle')}`, w/2, h * 0.58 + btnH/2, { size: Layout.fontSize(16, w, h), color: '#fff', bold: true });

  // SFX 토글
  drawRoundedRect(ctx, w/2 - btnW/2, h * 0.71, btnW, btnH, 10, '#8B7355', '#FFF8E7');
  UI.text(ctx, gSaveData.settings.sfx ? T('sfxOn') : T('sfxOff'), w/2, h * 0.71 + btnH/2, {
    size: Layout.fontSize(14, w, h), color: '#FFF8E7'
  });

  // 입력
  if (GUARDS.isTransitioning) return;
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(STATE.PLAY);
    return;
  }
  if (input.tapped) {
    const tx = input.tapX, ty = input.tapY;
    if (UI.hitTest(tx, ty, w/2 - btnW/2, h * 0.45, btnW, btnH)) {
      directTransition(STATE.PLAY); return;
    }
    if (UI.hitTest(tx, ty, w/2 - btnW/2, h * 0.58, btnW, btnH)) {
      beginTransition(STATE.KINGDOM_MAP); return;
    }
    if (UI.hitTest(tx, ty, w/2 - btnW/2, h * 0.71, btnW, btnH)) {
      gSaveData.settings.sfx = !gSaveData.settings.sfx;
      gSaveData.settings.bgm = gSaveData.settings.sfx;
      saveGame();
    }
  }
};

// ═══════════════════════════════════════════════════════════════
// §30. RENDER — LEVEL CLEAR
// ═══════════════════════════════════════════════════════════════
const renderLevelClear = (ctx, w, h) => {
  const s = Layout.scale(w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, h);

  // 왕 기쁨
  drawAssetOrFallback(ctx, 'charKingHappy', w/2 - 50*s, h*0.15, 100*s, 100*s, () => {
    ctx.fillStyle = '#DAA520';
    ctx.beginPath(); ctx.arc(w/2, h*0.2, 25*s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = `${20*s}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.fillText('😊', w/2, h*0.2+5*s);
  });

  UI.text(ctx, T('clear'), w/2, h * 0.33, { size: Layout.fontSize(36, w, h), color: '#FFD700', bold: true });
  UI.text(ctx, T('kingHappy'), w/2, h * 0.4, { size: Layout.fontSize(16, w, h), color: '#FFF8E7' });

  // 별 표시
  for (let i = 0; i < 3; i++) {
    const sx = w/2 - 50*s + i * 50*s;
    const sy = h * 0.46;
    const filled = i < gStarsEarned;
    drawAssetOrFallback(ctx, filled ? 'uiStarFilled' : 'uiStarEmpty', sx, sy, 40*s, 40*s, () => {
      ctx.font = `${30*s}px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(filled ? '⭐' : '☆', sx + 20*s, sy + 25*s);
    });
  }

  // 점수
  UI.text(ctx, `${T('score')}: ${gScore.toLocaleString()}`, w/2, h * 0.58, {
    size: Layout.fontSize(20, w, h), color: '#FFD700', bold: true
  });

  // 버튼 — play 에셋 활용
  const btnW = touchSafe(160 * s), btnH = touchSafe(48 * s);
  drawAssetOrFallback(ctx, 'uiButtonPlay', w/2 - btnW/2, h * 0.66, btnW, btnH, () => {
    drawRoundedRect(ctx, w/2 - btnW/2, h * 0.66, btnW, btnH, 10, '#2ECC71', '#FFF');
  });
  UI.text(ctx, `▶ ${T('next')}`, w/2, h * 0.66 + btnH/2, { size: Layout.fontSize(18, w, h), color: '#fff', bold: true });

  // 입력
  if (GUARDS.isTransitioning) return;
  if (input.tapped || input.jp('Space') || input.jp('Enter')) {
    sound.sfx('select');
    // 건설 선택 or 레벨맵
    if (gStarsEarned > 0 && !gDailyMode) {
      beginTransition(STATE.BUILD_SELECT);
    } else {
      beginTransition(STATE.KINGDOM_MAP);
    }
  }
};

// ═══════════════════════════════════════════════════════════════
// §31. RENDER — LEVEL FAIL
// ═══════════════════════════════════════════════════════════════
const renderLevelFail = (ctx, w, h) => {
  const s = Layout.scale(w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  // 왕 슬픔
  drawAssetOrFallback(ctx, 'charKingSad', w/2 - 50*s, h*0.18, 100*s, 100*s, () => {
    ctx.fillStyle = '#DAA520';
    ctx.beginPath(); ctx.arc(w/2, h*0.23, 25*s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = `${20*s}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.fillText('😢', w/2, h*0.23+5*s);
  });

  UI.text(ctx, T('fail'), w/2, h * 0.38, { size: Layout.fontSize(32, w, h), color: '#E74C3C', bold: true });
  UI.text(ctx, T('kingSad'), w/2, h * 0.44, { size: Layout.fontSize(14, w, h), color: '#ccc' });
  UI.text(ctx, `${T('score')}: ${gScore.toLocaleString()}`, w/2, h * 0.5, {
    size: Layout.fontSize(18, w, h), color: '#FFD700', bold: true
  });

  // 재시도 버튼 — retry 에셋 활용
  const btnW = touchSafe(160 * s), btnH = touchSafe(48 * s);
  drawAssetOrFallback(ctx, 'uiButtonRetry', w/2 - btnW/2, h * 0.58, btnW, btnH, () => {
    drawRoundedRect(ctx, w/2 - btnW/2, h * 0.58, btnW, btnH, 10, '#3498DB', '#FFF');
  });
  UI.text(ctx, `🔄 ${T('retry')}`, w/2, h * 0.58 + btnH/2, { size: Layout.fontSize(18, w, h), color: '#fff', bold: true });

  // 레벨맵 버튼
  drawRoundedRect(ctx, w/2 - btnW/2, h * 0.7, btnW, btnH, 10, '#8B7355', '#FFF8E7');
  UI.text(ctx, `🏠 ${T('kingdom')}`, w/2, h * 0.7 + btnH/2, { size: Layout.fontSize(16, w, h), color: '#FFF8E7' });

  UI.text(ctx, T('rToRestart'), w/2, h * 0.82, { size: Layout.fontSize(12, w, h), color: '#888' });

  // 입력
  if (GUARDS.isTransitioning) return;
  if (input.jp('KeyR') || (input.tapped && UI.hitTest(input.tapX, input.tapY, w/2 - btnW/2, h*0.58, btnW, btnH))) {
    sound.sfx('select');
    beginTransition(STATE.PLAY);
    return;
  }
  if (input.tapped && UI.hitTest(input.tapX, input.tapY, w/2 - btnW/2, h*0.7, btnW, btnH)) {
    beginTransition(STATE.KINGDOM_MAP);
    return;
  }
  // Space/Enter도 재시도
  if (input.jp('Space') || input.jp('Enter')) {
    beginTransition(STATE.PLAY);
  }
};

// ═══════════════════════════════════════════════════════════════
// §32. RENDER — BUILD SELECT
// ═══════════════════════════════════════════════════════════════
const renderBuildSelect = (ctx, w, h) => {
  const s = Layout.scale(w, h);

  // 배경
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, T('selectBuilding'), w/2, h * 0.08, { size: Layout.fontSize(24, w, h), color: '#FFD700', bold: true });
  UI.text(ctx, `⭐ ${gStarsEarned} ${T('stars')}`, w/2, h * 0.14, { size: Layout.fontSize(16, w, h), color: '#FFD700' });

  // 3택 카드
  const cardW = Math.min(120 * s, (w - 60) / 3);
  const cardH = cardW * 1.5;
  const spacing = 15 * s;
  const totalW = cardW * 3 + spacing * 2;
  const startX = (w - totalW) / 2;
  const cardY = h * 0.22;

  gBuildChoices.forEach((choice, i) => {
    const cx = startX + i * (cardW + spacing);
    const selected = gSelectedBuildIdx === i;

    ctx.save();
    // 카드 배경
    drawAssetOrFallback(ctx, 'uiBuildCard', cx, cardY, cardW, cardH, () => {
      drawRoundedRect(ctx, cx, cardY, cardW, cardH, 10,
        selected ? '#FFD700' : '#DAA520', '#FFF8E7');
    });

    // 건물 이미지
    const buildImgSize = cardW * 0.7;
    drawAssetOrFallback(ctx, choice.id, cx + (cardW - buildImgSize)/2, cardY + 15*s, buildImgSize, buildImgSize, () => {
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(cx + cardW*0.2, cardY + 20*s, cardW*0.6, buildImgSize * 0.8);
    });

    // 건물 이름
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${Layout.fontSize(12, w, h)}px ${FONT}`;
    ctx.fillStyle = '#4a3520';
    ctx.fillText(gLang === 'en' ? choice.nameEn : choice.name, cx + cardW/2, cardY + cardH * 0.7);

    // 보너스
    ctx.font = `${Layout.fontSize(10, w, h)}px ${FONT}`;
    ctx.fillStyle = '#2ECC71';
    ctx.fillText(choice.bonus, cx + cardW/2, cardY + cardH * 0.82);

    // 선택 표시
    if (selected) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      drawRoundedRectPath(ctx, cx - 2, cardY - 2, cardW + 4, cardH + 4, 12);
      ctx.stroke();
    }

    ctx.restore();

    // 클릭 처리
    if (input.tapped && UI.hitTest(input.tapX, input.tapY, cx, cardY, cardW, cardH)) {
      gSelectedBuildIdx = i;
      sound.sfx('select');
    }
  });

  // 확인 버튼 (선택 후)
  if (gSelectedBuildIdx >= 0) {
    const btnW = touchSafe(160 * s), btnH = touchSafe(48 * s);
    const btnY = cardY + cardH + 30 * s;
    drawRoundedRect(ctx, w/2 - btnW/2, btnY, btnW, btnH, 10, '#2ECC71', '#FFF');
    UI.text(ctx, `🏗️ ${T('build')}`, w/2, btnY + btnH/2, { size: Layout.fontSize(18, w, h), color: '#fff', bold: true });

    if ((input.tapped && UI.hitTest(input.tapX, input.tapY, w/2 - btnW/2, btnY, btnW, btnH)) || input.jp('Enter')) {
      sound.sfx('select');
      beginTransition(STATE.BUILD_ANIM);
    }
  }

  // 스킵 버튼
  const skipW = touchSafe(100 * s), skipH = touchSafe(36 * s);
  drawRoundedRect(ctx, w/2 - skipW/2, h * 0.9, skipW, skipH, 8, '#8B7355', '#FFF8E7');
  UI.text(ctx, T('next') + ' →', w/2, h * 0.9 + skipH/2, { size: Layout.fontSize(12, w, h), color: '#FFF8E7' });

  if (input.tapped && UI.hitTest(input.tapX, input.tapY, w/2 - skipW/2, h * 0.9, skipW, skipH)) {
    beginTransition(STATE.KINGDOM_MAP);
  }
};

// ═══════════════════════════════════════════════════════════════
// §33. RENDER — BUILD ANIM
// ═══════════════════════════════════════════════════════════════
const renderBuildAnim = (ctx, w, h) => {
  const s = Layout.scale(w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, h);

  const choice = gBuildChoices[gSelectedBuildIdx];
  if (!choice) return;

  UI.text(ctx, T('buildComplete'), w/2, h * 0.15, { size: Layout.fontSize(28, w, h), color: '#FFD700', bold: true });

  // 건물 애니메이션 (확대)
  const buildSize = 150 * s * Math.min(1, gBuildAnimProgress * 1.2);
  ctx.save();
  ctx.globalAlpha = Math.min(1, gBuildAnimProgress * 2);
  drawAssetOrFallback(ctx, choice.id, w/2 - buildSize/2, h*0.3, buildSize, buildSize, () => {
    ctx.fillStyle = '#DAA520';
    ctx.fillRect(w/2 - buildSize/2, h*0.3, buildSize, buildSize);
  });
  ctx.restore();

  // 건물 이름
  if (gBuildAnimProgress > 0.5) {
    ctx.save();
    ctx.globalAlpha = (gBuildAnimProgress - 0.5) * 2;
    UI.text(ctx, gLang === 'en' ? choice.nameEn : choice.name, w/2, h * 0.65, {
      size: Layout.fontSize(22, w, h), color: '#4a3520', bold: true
    });
    UI.text(ctx, `✨ ${choice.bonus}`, w/2, h * 0.72, { size: Layout.fontSize(16, w, h), color: '#2ECC71' });
    ctx.restore();
  }

  // 이펙트 시퀀스 + 파티클
  if (gBuildAnimProgress > 0.3 && gBuildAnimProgress < 0.35) {
    spawnEffect('buildComplete', w/2, h * 0.45, 200 * s, 200 * s);
    particles.emit(w/2, h * 0.45, 20, { color: '#FFD700', speed: 150, life: 0.8, size: 5 });
  }
};

// ═══════════════════════════════════════════════════════════════
// §34. RENDER — DAILY CHALLENGE OVERLAY
// ═══════════════════════════════════════════════════════════════
const renderDailyOverlay = (ctx, w, h) => {
  if (!gDailyMode) return;
  const s = Layout.scale(w, h);

  // 일일 챌린지 배지 (좌상단) — 배지 + 트로피 에셋 활용
  const badgeSize = touchSafe(36 * s);
  ctx.save();
  ctx.globalAlpha = 0.9;
  drawAssetOrFallback(ctx, 'uiDailyBadge', 10, h * 0.12, badgeSize, badgeSize, () => {
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath(); ctx.arc(10 + badgeSize/2, h*0.12 + badgeSize/2, badgeSize/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${badgeSize * 0.5}px ${FONT}`;
    ctx.fillText('🎯', 10 + badgeSize/2, h*0.12 + badgeSize/2);
  });
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${Layout.fontSize(11, w, h)}px ${FONT}`;
  ctx.fillStyle = '#E74C3C';
  ctx.fillText(DAILY_RULE_NAMES[gLang][gDailyRule] || gDailyRule, 10 + badgeSize + 5, h * 0.12 + badgeSize/2);
  ctx.restore();
};

// ═══════════════════════════════════════════════════════════════
// §35. UTILITY — 공통 드로잉 헬퍼
// ═══════════════════════════════════════════════════════════════

/* 에셋 또는 폴백 드로잉 */
const drawAssetOrFallback = (ctx, key, x, y, w, h, fallbackFn) => {
  if (assets.sprites[key]) {
    ctx.drawImage(assets.sprites[key], x, y, w, h);
  } else if (fallbackFn) {
    fallbackFn();
  }
};

/* 둥근 사각형 */
const drawRoundedRect = (ctx, x, y, w, h, r, fillColor, strokeColor) => {
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke(); }
  ctx.restore();
};

const drawRoundedRectPath = (ctx, x, y, w, h, r) => {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
};

// ═══════════════════════════════════════════════════════════════
// §36. INITIALIZATION — 에셋 로드 + 게임 시작
// ═══════════════════════════════════════════════════════════════
const preloadAssets = async () => {
  try {
    const resp = await fetch('assets/manifest.json');
    const manifest = await resp.json();
    if (manifest && manifest.assets) {
      const assetMap = {};
      for (const [key, info] of Object.entries(manifest.assets)) {
        assetMap[key] = 'assets/' + info.file;
      }
      await assets.load(assetMap);
      console.log(`[ASSETS] Loaded ${Object.keys(assets.sprites).length}/${Object.keys(manifest.assets).length} assets`);
    }
  } catch(e) {
    console.warn('[ASSETS] manifest.json load failed, using fallbacks:', e);
  }
};

const gameInit = async () => {
  // 세이브 로드
  loadGame();

  // 에셋 프리로드
  await preloadAssets();

  // 초기 상태
  gState = STATE.BOOT;
  gReady = true;

  // 부트 → 타이틀 전환
  const delay = { t: 0 };
  tween.add(delay, { t: 1 }, 500, 'linear', () => {
    enterState(STATE.TITLE);
  });

  // 게임 루프 시작
  engine.start();
  console.log(`[GEM KINGDOM BUILDER] Cycle #50 initialized. Assets: ${Object.keys(assets.sprites).length}`);
};

gameInit();
</script>
