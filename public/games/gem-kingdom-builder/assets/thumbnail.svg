<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2d1b69;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a2c8a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4466"/>
      <stop offset="50%" style="stop-color:#cc1133"/>
      <stop offset="100%" style="stop-color:#880022"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44ff88"/>
      <stop offset="50%" style="stop-color:#11cc55"/>
      <stop offset="100%" style="stop-color:#008833"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff"/>
      <stop offset="50%" style="stop-color:#1155cc"/>
      <stop offset="100%" style="stop-color:#003388"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#bbddff"/>
      <stop offset="100%" style="stop-color:#88aadd"/>
    </linearGradient>
    <linearGradient id="topaz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdd44"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#cc7700"/>
    </linearGradient>
    <linearGradient id="castle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5a3"/>
      <stop offset="100%" style="stop-color:#c4a86b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Stars in sky -->
  <circle cx="30" cy="25" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="40" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="15" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="250" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="320" cy="20" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="370" cy="45" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="55" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="340" cy="55" r="1.2" fill="#fff" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#2a5e1e" rx="0"/>
  <rect x="0" y="230" width="400" height="70" fill="#1e4a15" rx="0"/>

  <!-- Castle - Main body -->
  <rect x="130" y="100" width="140" height="130" fill="url(#castle)" rx="3"/>

  <!-- Castle - Left tower -->
  <rect x="110" y="70" width="40" height="160" fill="url(#castle)" rx="2"/>
  <polygon points="110,70 130,40 150,70" fill="#c4a86b"/>
  <!-- Tower battlements -->
  <rect x="110" y="65" width="10" height="12" fill="url(#castle)"/>
  <rect x="130" y="65" width="10" height="12" fill="url(#castle)"/>

  <!-- Castle - Right tower -->
  <rect x="250" y="70" width="40" height="160" fill="url(#castle)" rx="2"/>
  <polygon points="250,70 270,40 290,70" fill="#c4a86b"/>
  <rect x="250" y="65" width="10" height="12" fill="url(#castle)"/>
  <rect x="270" y="65" width="10" height="12" fill="url(#castle)"/>

  <!-- Castle - Center tower -->
  <rect x="175" y="55" width="50" height="75" fill="url(#castle)" rx="2"/>
  <polygon points="175,55 200,25 225,55" fill="#ddc88e"/>
  <!-- Flag on center -->
  <line x1="200" y1="25" x2="200" y2="5" stroke="#8B4513" stroke-width="2"/>
  <polygon points="200,5 220,12 200,19" fill="#cc2244"/>

  <!-- Castle windows -->
  <rect x="185" y="70" width="12" height="18" rx="6" ry="6" fill="#1a0533" opacity="0.8"/>
  <rect x="205" y="70" width="12" height="18" rx="6" ry="6" fill="#1a0533" opacity="0.8"/>
  <rect x="155" y="130" width="10" height="15" rx="5" ry="5" fill="#1a0533" opacity="0.7"/>
  <rect x="235" y="130" width="10" height="15" rx="5" ry="5" fill="#1a0533" opacity="0.7"/>

  <!-- Castle gate -->
  <rect x="180" y="175" width="40" height="55" rx="20" ry="20" fill="#3a2510"/>
  <rect x="182" y="177" width="36" height="53" rx="18" ry="18" fill="#2a1a0a"/>
  <!-- Gate details -->
  <circle cx="208" cy="205" r="3" fill="#c4a86b"/>

  <!-- Gems floating around castle -->
  <!-- Ruby (left) -->
  <g filter="url(#glow)" transform="translate(60, 130)">
    <polygon points="0,-18 15,0 0,18 -15,0" fill="url(#ruby)"/>
    <polygon points="0,-18 15,0 0,0" fill="#ff6688" opacity="0.5"/>
  </g>

  <!-- Emerald (left-lower) -->
  <g filter="url(#glow)" transform="translate(45, 200)">
    <polygon points="0,-15 12,0 0,15 -12,0" fill="url(#emerald)"/>
    <polygon points="0,-15 12,0 0,0" fill="#66ffaa" opacity="0.5"/>
  </g>

  <!-- Sapphire (right) -->
  <g filter="url(#glow)" transform="translate(340, 120)">
    <polygon points="0,-18 15,0 0,18 -15,0" fill="url(#sapphire)"/>
    <polygon points="0,-18 15,0 0,0" fill="#66aaff" opacity="0.5"/>
  </g>

  <!-- Diamond (top-right) -->
  <g filter="url(#glow)" transform="translate(320, 80)">
    <polygon points="0,-14 11,0 0,14 -11,0" fill="url(#diamond)"/>
    <polygon points="0,-14 11,0 0,0" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Topaz (right-lower) -->
  <g filter="url(#glow)" transform="translate(355, 190)">
    <polygon points="0,-15 12,0 0,15 -12,0" fill="url(#topaz)"/>
    <polygon points="0,-15 12,0 0,0" fill="#ffee66" opacity="0.5"/>
  </g>

  <!-- Amethyst (top-left) -->
  <g filter="url(#glow)" transform="translate(75, 85)">
    <polygon points="0,-14 11,0 0,14 -11,0" fill="#aa44ff"/>
    <polygon points="0,-14 11,0 0,0" fill="#cc88ff" opacity="0.5"/>
  </g>

  <!-- Sparkle effects -->
  <g filter="url(#starGlow)">
    <polygon points="95,160 97,155 99,160 97,165" fill="#fff" opacity="0.9"/>
    <polygon points="310,150 312,145 314,150 312,155" fill="#fff" opacity="0.8"/>
    <polygon points="200,95 202,90 204,95 202,100" fill="#ffdd44" opacity="0.9"/>
  </g>

  <!-- 3 Stars above castle -->
  <g filter="url(#starGlow)" transform="translate(165, 15)">
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#ffdd44"/>
  </g>
  <g filter="url(#starGlow)" transform="translate(200, 8)">
    <polygon points="0,-10 3,-4 10,-4 4,1 6,8 0,4 -6,8 -4,1 -10,-4 -3,-4" fill="#ffee66"/>
  </g>
  <g filter="url(#starGlow)" transform="translate(235, 15)">
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#ffdd44"/>
  </g>

  <!-- Title text -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffdd44" filter="url(#starGlow)">Gem Kingdom Builder</text>
  <text x="200" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e8d5a3" opacity="0.8">보석 왕국 건설기</text>
</svg>
