/** 효과음 재생 */
function playSound(name) {
  if (!soundInited) return;
  switch (name) {
    case 'swap':
      sound.tone(440, 0.08, 'sine', 0.2);
      sound.tone(550, 0.06, 'sine', 0.15);
      break;
    case 'match':
      sound.tone(660, 0.1, 'square', 0.12);
      sound.tone(880, 0.08, 'square', 0.1);
      break;
    case 'match-special':
      sound.tone(523, 0.06, 'square', 0.12);
      sound.tone(659, 0.06, 'square', 0.12);
      sound.tone(784, 0.1, 'square', 0.12);
      break;
    case 'cascade':
      sound.tone(330, 0.1, 'sine', 0.12);
      sound.tone(440, 0.08, 'sine', 0.1);
      break;
    case 'special-activate':
      sound.tone(200, 0.12, 'sawtooth', 0.15);
      sound.tone(600, 0.15, 'sine', 0.12);
      break;
    case 'combo':
      sound.tone(523, 0.04, 'square', 0.15);
      sound.tone(659, 0.04, 'square', 0.15);
      sound.tone(784, 0.04, 'square', 0.15);
      sound.tone(1047, 0.08, 'square', 0.12);
      break;
    case 'level-complete':
      sound.tone(523, 0.12, 'sine', 0.2);
      sound.tone(659, 0.12, 'sine', 0.2);
      sound.tone(784, 0.12, 'sine', 0.2);
      sound.tone(1047, 0.2, 'sine', 0.2);
      break;
    case 'level-fail':
      sound.tone(440, 0.15, 'sawtooth', 0.12);
      sound.tone(330, 0.2, 'sawtooth', 0.12);
      sound.tone(262, 0.25, 'sawtooth', 0.12);
      break;
    case 'button':
      sound.tone(880, 0.05, 'square', 0.08);
      break;
    case 'star':
      sound.tone(1200, 0.08, 'sine', 0.15);
      sound.tone(1400, 0.12, 'sine', 0.12);
      break;
    case 'hit':
      sound.tone(200, 0.12, 'sawtooth', 0.2);
      break;
    case 'shuffle':
      sound.tone(300, 0.05, 'square', 0.1);
      sound.tone(400, 0.05, 'square', 0.1);
      sound.tone(500, 0.05, 'square', 0.1);
      break;
    case 'booster':
      sound.tone(800, 0.1, 'sine', 0.15);
      sound.tone(1000, 0.1, 'sine', 0.12);
      break;
    default:
      sound.sfx('select');
  }
}

/** BGM 업데이트 (매 프레임 dt 기반, F4 준수) */
function updateBGM(dt) {
  if (!soundInited || !bgmPlaying) return;
  bgmTimer += dt;
  if (bgmTimer >= BGM_NOTE_INTERVAL) {
    bgmTimer -= BGM_NOTE_INTERVAL;
    const melody = (state === STATE.PLAY || state === STATE.PAUSE) ? BGM_MELODY_PLAY : BGM_MELODY_TITLE;
    const note = melody[bgmNoteIdx % melody.length];
    sound.tone(note, 0.18, 'sine', 0.03);
    bgmNoteIdx++;
  }
}

/** BGM 시작 */
function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  bgmNoteIdx = 0;
  bgmTimer = 0;
}

/** BGM 정지 */
function stopBGM() {
  bgmPlaying = false;
}

// ═══════════════════════════════════════════════════════════════════════
// §14. 화면 흔들림 시스템
// ═══════════════════════════════════════════════════════════════════════
function addShake(intensity, durationMs) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
  shakeTimer = Math.max(shakeTimer, durationMs);
}

function updateShake(dt) {
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeIntensity *= 0.92; // 감쇠
    if (shakeTimer <= 0) {
      shakeTimer = 0;
      shakeIntensity = 0;
    }
  }
}

function getShakeOffset() {
  if (shakeIntensity <= 0.1) return { x: 0, y: 0 };
  return {
    x: (Math.random() - 0.5) * shakeIntensity * 2,
    y: (Math.random() - 0.5) * shakeIntensity * 2
  };
}

// ═══════════════════════════════════════════════════════════════════════
// §15. 레벨 시작/종료 관리
// ═══════════════════════════════════════════════════════════════════════

/** 레벨 시작 */
function startLevel(levelIdx) {
  currentLevelIdx = levelIdx;
  currentLevel = LEVELS[levelIdx];
  score = 0;
  turnsLeft = currentLevel.turns;
  comboCount = 0;
  playSub = PLAY_SUB.IDLE;
  selectedCell = null;
  cursorCell = { r: 0, c: 0 };
  dragStart = null;
  isDragging = false;

  // 가드 플래그 리셋
  swapLocked = false;
  cascadeInProgress = false;
  resolving = false;
  goalChecking = false;

  // 시각 리셋
  hintTimer = 0;
  hintCells = null;
  activeBooster = null;
  bonusTurnsLeft = 0;
  bonusProcessing = false;
  noMoveShuffle = false;
  comboPopups = [];
  scorePopups = [];
  floatTexts = [];
  matchBurstEffects = [];
  isNewRecord = false;

  // DDA: 5연속 실패 시 턴 보너스
  const fails = saveData.failStreak[currentLevel.id] || 0;
  if (fails >= 5) {
    turnsLeft += 3;
    floatTexts.push({
      text: `+3 ${t('turns')}!`,
      x: W / 2, y: H / 2,
      timer: 0, maxTimer: 2000,
      color: '#00ff87', size: 20
    });
  }

  // 튜토리얼 (첫 플레이)
  if (saveData.totalPlays === 0 && levelIdx === 0) {
    showTutorial = true;
    tutorialStep = 0;
    tutorialTimer = 0;
  } else {
    showTutorial = false;
  }

  initGoalProgress();
  recalcGrid();
  generateBoard(currentLevel);
  startBGM();

  saveData.totalPlays++;
}

/** 레벨 클리어 처리 */
function onLevelComplete() {
  // 별 계산 (잔여 턴 기준)
  const th = currentLevel.starThresholds;
  starsEarned = 1;
  if (turnsLeft >= th[1]) starsEarned = 2;
  if (turnsLeft >= th[2]) starsEarned = 3;

  // 기존 별과 비교하여 CP 추가
  const prevStars = saveData.stars[currentLevelIdx] || 0;
  if (starsEarned > prevStars) {
    const diff = starsEarned - prevStars;
    saveData.castleCP += diff;
    saveData.stars[currentLevelIdx] = starsEarned;
  }

  // 최고 점수 갱신 (판정 먼저, 저장 나중 — [C2] 교훈)
  isNewRecord = false;
  if (!saveData.bestScores[currentLevelIdx] || score > saveData.bestScores[currentLevelIdx]) {
    isNewRecord = true;
    saveData.bestScores[currentLevelIdx] = score;
  }

  // 부스터 보상
  if (starsEarned >= 3) boosters.hammer++;
  const totalStars = saveData.stars.reduce((a, b) => (a || 0) + (b || 0), 0);
  if (totalStars > 0 && totalStars % 5 === 0) boosters.shuffle++;
  if (currentLevel.id % 10 === 0) boosters.rainbow++;

  // 다음 레벨 해금
  if (currentLevelIdx + 1 >= saveData.currentLevel) {
    saveData.currentLevel = Math.min(currentLevelIdx + 2, LEVELS.length);
  }

  // DDA 스트릭 리셋
  saveData.failStreak[currentLevel.id] = 0;

  // 캐슬 구역 해금 체크
  updateCastleZones();

  // 저장
  saveSave();
  Save.setHighScore(GAME_ID, score);

  // 별 애니메이션 초기화
  levelStarAnim = { count: 0, timer: 0 };

  playSound('level-complete');
}

/** 레벨 실패 처리 */
function onLevelFail() {
  saveData.failStreak[currentLevel.id] = (saveData.failStreak[currentLevel.id] || 0) + 1;
  saveSave();
  playSound('level-fail');
  stopBGM();
}

/** 캐슬 구역 해금 갱신 */
function updateCastleZones() {
  let zones = 0;
  for (let i = 0; i < CASTLE_ZONES.length; i++) {
    if (saveData.castleCP >= CASTLE_ZONES[i].cpNeeded) zones = i + 1;
  }
  // 새 구역 해금 감지
  if (zones > saveData.unlockedZones) {
    zoneUnlockAnim = { zone: zones - 1, timer: 0 };
  }
  saveData.unlockedZones = zones;
}

// ═══════════════════════════════════════════════════════════════════════
// §16. 스왑 실행 & 캐스케이드 체인
// ═══════════════════════════════════════════════════════════════════════

/** 화면 좌표 → 그리드 셀 */
function screenToGrid(x, y) {
  const gc = Math.floor((x - gridX) / cellSize);
  const gr = Math.floor((y - gridY) / cellSize);
  if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) return { r: gr, c: gc };
  return null;
}

/** 인접 셀 여부 */
function isAdjacent(r1, c1, r2, c2) {
  return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
}

/** 스왑 실행 (애니메이션 + 매치 체크) */
function executeSwap(r1, c1, r2, c2) {
  if (swapLocked || cascadeInProgress || resolving || goalChecking) return;
  if (!isAdjacent(r1, c1, r2, c2)) return;
  if (!canSwap(r1, c1, r2, c2)) return;

  swapLocked = true;
  playSub = PLAY_SUB.SWAP;
  selectedCell = null;
  hintTimer = 0;
  hintCells = null;
  playSound('swap');

  // 스왑 애니메이션 (위치 교환)
  const a = board[r1][c1];
  const b = board[r2][c2];
  const ax = a.renderX, ay = a.renderY;
  const bx = b.renderX, by = b.renderY;

  tween.add(a, { renderX: bx, renderY: by }, ANIM.SWAP_DUR, 'easeInOut');
  tween.add(b, { renderX: ax, renderY: ay }, ANIM.SWAP_DUR, 'easeInOut', () => {
    // 데이터 교환
    swapCellData(r1, c1, r2, c2);

    // ── 스페셜+스페셜 조합 체크 ──
    if (resolveSpecialCombo(r1, c1, r2, c2)) {
      turnsLeft--;
      comboCount = 1;
      playSub = PLAY_SUB.CASCADE;
      cascadeInProgress = true;
      swapLocked = false;
      // 중력 → 재매칭
      const gw = { t: 0 };
      tween.add(gw, { t: 1 }, ANIM.RESOLVE_DUR, 'linear', () => {
        applyGravity();
        const gw2 = { t: 0 };
        tween.add(gw2, { t: 1 }, ANIM.GRAVITY_DUR, 'linear', () => {
          cascadeInProgress = false;
          playSub = PLAY_SUB.SETTLE;
          settleAndCheck();
        });
      });
      return;
    }

    // ── 일반 매치 체크 ──
    const matches = findAllMatches();
    if (matches.length > 0) {
      turnsLeft--;
      comboCount = 1;
      swapLocked = false;
      processMatchChain(matches);
    } else {
      // 매치 없음 → 원위치 (리버스 스왑)
      swapCellData(r1, c1, r2, c2);
      tween.add(a, { renderX: ax, renderY: ay }, ANIM.SWAP_DUR, 'easeInOut');
      tween.add(b, { renderX: bx, renderY: by }, ANIM.SWAP_DUR, 'easeInOut', () => {
        swapLocked = false;
        playSub = PLAY_SUB.IDLE;
      });
    }
  });
}

/** 매치 체인 처리 (캐스케이드 루프의 핵심) */
function processMatchChain(matches) {
  resolving = true;
  playSub = PLAY_SUB.MATCH_RESOLVE;

  // 콤보 사운드
  if (comboCount >= 3) {
    playSound('combo');
  } else if (matches.some(m => m.special !== SPECIAL.NONE)) {
    playSound('match-special');
  } else {
    playSound('match');
  }

  // 콤보 팝업 (2 이상일 때)
  if (comboCount >= 2) {
    const idx = Math.min(comboCount, 4);
    const text = t('combo')[idx];
    if (text) {
      comboPopups.push({
        text,
        x: W / 2, y: gridY - 30,
        timer: 0, maxTimer: 1200,
        scale: 0.3, alpha: 1
      });
    }
  }

  // 매치 실행 (보석 제거 + 점수 + 스페셜 생성)
  resolveMatches(matches);

  // 제거 애니메이션 대기 → 중력
  const rw = { t: 0 };
  tween.add(rw, { t: 1 }, ANIM.RESOLVE_DUR, 'linear', () => {
    resolving = false;
    cascadeInProgress = true;
    playSub = PLAY_SUB.CASCADE;
    playSound('cascade');

    applyGravity();

    const gw = { t: 0 };
    tween.add(gw, { t: 1 }, ANIM.GRAVITY_DUR, 'linear', () => {
      cascadeInProgress = false;
      playSub = PLAY_SUB.SETTLE;
      settleAndCheck();
    });
  });
}

/** 안착 → 재매칭 체크 or 목표 체크 */
function settleAndCheck() {
  const newMatches = findAllMatches();
  if (newMatches.length > 0) {
    comboCount++;
    processMatchChain(newMatches);
  } else {
    // 캐스케이드 종료
    playSub = PLAY_SUB.CHECK_GOAL;
    goalChecking = true;
    checkLevelEnd();
  }
}

/** 레벨 종료 조건 확인 */
function checkLevelEnd() {
  comboCount = 0;

  // ── 목표 달성 확인 ──
  if (checkGoalsComplete()) {
    goalChecking = false;
    onLevelComplete();

    // 잔여 턴 보너스 처리
    if (turnsLeft > 0) {
      bonusTurnsLeft = turnsLeft;
      bonusProcessing = true;
      playSub = PLAY_SUB.BONUS;
      processBonusTurns();
    } else {
      doTransition(STATE.LEVEL_COMPLETE);
    }
    return;
  }

  // ── 턴 소진 확인 ──
  if (turnsLeft <= 0) {
    goalChecking = false;
    onLevelFail();
    doTransition(STATE.LEVEL_FAIL);
    return;
  }

  // ── 유효 이동 확인 ──
  if (countValidMoves() === 0) {
    goalChecking = false;
    shuffleBoard();
    return;
  }

  goalChecking = false;
  playSub = PLAY_SUB.IDLE;
  hintTimer = 0;
}

/** 보너스 턴 처리 (잔여 턴 → 랜덤 스페셜 → 폭발) */
function processBonusTurns() {
  if (bonusTurnsLeft <= 0) {
    bonusProcessing = false;
    doTransition(STATE.LEVEL_COMPLETE);
    return;
  }
  bonusTurnsLeft--;

  // 랜덤 빈 셀에 스페셜 보석 생성
  const validCells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c].color >= 0 && board[r][c].special === SPECIAL.NONE)
        validCells.push({ r, c });

  if (validCells.length === 0) {
    bonusProcessing = false;
    doTransition(STATE.LEVEL_COMPLETE);
    return;
  }

  const pick = validCells[MathUtil.randInt(0, validCells.length - 1)];
  const specials = [SPECIAL.LINE_H, SPECIAL.LINE_V, SPECIAL.BOMB];
  board[pick.r][pick.c].special = specials[MathUtil.randInt(0, 2)];

  // 이펙트
  const px = gridX + pick.c * cellSize + cellSize / 2;
  const py = gridY + pick.r * cellSize + cellSize / 2;
  particles.emit(px, py, 8, { color: '#ffd700', speed: 100, life: 0.5, size: 4 });
  playSound('star');

  // 대기 → 발동 → 중력 → 다음 보너스
  const w1 = { t: 0 };
  tween.add(w1, { t: 1 }, ANIM.BONUS_SPAWN, 'linear', () => {
    const affected = activateSpecial(pick.r, pick.c);
    for (const a of affected) {
      removeCell(a.r, a.c);
      const apx = gridX + a.c * cellSize + cellSize / 2;
      const apy = gridY + a.r * cellSize + cellSize / 2;
      particles.emit(apx, apy, 3, { color: '#ffd700', speed: 80, life: 0.3, size: 3 });
    }
    score += affected.length * 30;

    const w2 = { t: 0 };
    tween.add(w2, { t: 1 }, ANIM.BONUS_EXPLODE, 'linear', () => {
      applyGravity();
      const w3 = { t: 0 };
      tween.add(w3, { t: 1 }, ANIM.GRAVITY_DUR, 'linear', () => {
        processBonusTurns();
      });
    });
  });
}

/** 보드 셔플 (유효 이동 없을 때) */
function shuffleBoard() {
  noMoveShuffle = true;
  playSound('shuffle');

  // 일반 보석만 수집
  const gems = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c].color >= 0 && board[r][c].obsType !== OBS.CRATE)
        gems.push({ color: board[r][c].color, special: board[r][c].special });

  // Fisher-Yates 셔플
  for (let i = gems.length - 1; i > 0; i--) {
    const j = MathUtil.randInt(0, i);
    [gems[i], gems[j]] = [gems[j], gems[i]];
  }

  // 재배치
  let idx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c].color >= 0 && board[r][c].obsType !== OBS.CRATE && idx < gems.length) {
        board[r][c].color = gems[idx].color;
        board[r][c].special = gems[idx].special;
        idx++;
      }

  // 3매치 제거
  for (let pass = 0; pass < 50; pass++) {
    let fixed = true;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        if (c >= 2 && board[r][c].color === board[r][c - 1].color && board[r][c].color === board[r][c - 2].color && board[r][c].color >= 0) {
          board[r][c].color = randColor(currentLevel.colors, board[r][c].color);
          fixed = false;
        }
        if (r >= 2 && board[r][c].color === board[r - 1][c].color && board[r][c].color === board[r - 2][c].color && board[r][c].color >= 0) {
          board[r][c].color = randColor(currentLevel.colors, board[r][c].color);
          fixed = false;
        }
      }
    if (fixed) break;
  }

  updateCellPositions(true);

  const w = { t: 0 };
  tween.add(w, { t: 1 }, 600, 'linear', () => {
    noMoveShuffle = false;
    if (countValidMoves() === 0) shuffleBoard();
    else playSub = PLAY_SUB.IDLE;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// §17. 부스터 시스템
// ═══════════════════════════════════════════════════════════════════════

/** 부스터 사용 시작 */
function useBooster(type) {
  if (playSub !== PLAY_SUB.IDLE || swapLocked || cascadeInProgress || resolving) return;
  if (boosters[type] <= 0) return;

  if (type === 'shuffle') {
    boosters.shuffle--;
    shuffleBoard();
    saveSave();
    playSound('booster');
    return;
  }

  // 대상 선택 모드 진입
  activeBooster = type;
  selectedCell = null;
  playSound('booster');
}

/** 부스터 적용 (대상 셀에) */
function applyBooster(r, c) {
  if (!activeBooster) return false;

  if (activeBooster === 'hammer') {
    if (board[r][c].color < 0 && board[r][c].obsType === OBS.NONE) {
      activeBooster = null;
      return false;
    }
    boosters.hammer--;
    // 셀 파괴
    damageAdjacentObstacles(r, c);
    if (board[r][c].obsType === OBS.CRATE) {
      board[r][c].obsHp = 0;
      board[r][c].obsType = OBS.NONE;
      board[r][c].color = -1;
      trackGoal('obstacle', 'crate', 1);
    } else {
      removeCell(r, c);
      board[r][c].color = -1;
    }
    const px = gridX + c * cellSize + cellSize / 2;
    const py = gridY + r * cellSize + cellSize / 2;
    particles.emit(px, py, 15, { color: '#ffd700', speed: 150, life: 0.5, size: 4 });
    playSound('hit');
    addShake(3, 150);
    // 중력 → 재매칭
    afterBoosterAction();
    activeBooster = null;
    saveSave();
    return true;
  }

  if (activeBooster === 'rainbow') {
    if (board[r][c].color < 0) { activeBooster = null; return false; }
    boosters.rainbow--;
    const targetColor = board[r][c].color;
    const hex = GEM_HEX[GEM_COLORS[targetColor]];
    for (let rr = 0; rr < ROWS; rr++)
      for (let cc = 0; cc < COLS; cc++)
        if (board[rr][cc].color === targetColor) {
          removeCell(rr, cc);
          board[rr][cc].color = -1;
          const px = gridX + cc * cellSize + cellSize / 2;
          const py = gridY + rr * cellSize + cellSize / 2;
          particles.emit(px, py, 4, { color: hex, speed: 100, life: 0.4, size: 3 });
        }
    playSound('special-activate');
    addShake(5, 250);
    afterBoosterAction();
    activeBooster = null;
    saveSave();
    return true;
  }

  activeBooster = null;
  return false;
}

/** 부스터 사용 후 중력 + 재매칭 처리 */
function afterBoosterAction() {
  cascadeInProgress = true;
  playSub = PLAY_SUB.CASCADE;
  const w1 = { t: 0 };
  tween.add(w1, { t: 1 }, 200, 'linear', () => {
    applyGravity();
    const w2 = { t: 0 };
    tween.add(w2, { t: 1 }, ANIM.GRAVITY_DUR, 'linear', () => {
      cascadeInProgress = false;
      const matches = findAllMatches();
      if (matches.length > 0) {
        comboCount = 1;
        processMatchChain(matches);
      } else {
        playSub = PLAY_SUB.CHECK_GOAL;
        goalChecking = true;
        checkLevelEnd();
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════
// §18. 메인 UPDATE 루프
// — 상태×시스템 매트릭스에 따라 각 시스템 업데이트 (F3 해결)
// ═══════════════════════════════════════════════════════════════════════
function update(dt, time) {
  // ── 항상 업데이트하는 시스템 ──
  tween.update(dt);     // 모든 상태에서 트윈 (상태 전환 트윈이 멈추지 않도록)
  particles.update(dt); // 대부분 상태에서 파티클
  updateShake(dt);
  updatePopups(dt);
  updateBGM(dt);

  // ── _fadeAlpha 동기화 ──
  _fadeAlpha = _fadeObj.a;

  // ── 상태별 입력/로직 ──
  switch (state) {
    case STATE.TITLE:
      titleTime += dt;
      handleTitleInput();
      break;

    case STATE.CASTLE_MAP:
      handleCastleMapInput(dt);
      updateCastleScroll(dt);
      if (zoneUnlockAnim) {
        zoneUnlockAnim.timer += dt;
        if (zoneUnlockAnim.timer > 3000) zoneUnlockAnim = null;
      }
      break;

    case STATE.LEVEL_INTRO:
      introTimer += dt;
      if (introTimer >= ANIM.INTRO_DUR) {
        directTransition(STATE.PLAY);
        introTimer = 0;
      }
      break;

    case STATE.PLAY:
      handlePlayInput(dt);
      if (showTutorial) updateTutorial(dt);
      break;

    case STATE.LEVEL_COMPLETE:
      handleLevelCompleteInput();
      levelStarAnim.timer += dt;
      // 축하 파티클 계속 생성
      if (Math.random() < 0.15) {
        const colors = ['#ffd700', '#e63946', '#00d4ff', '#00ff87', '#9b5de5'];
        particles.emit(
          MathUtil.randRange(0, W), -5, 2,
          { color: colors[MathUtil.randInt(0, 4)], speed: 60, life: 2.5, size: 4, angle: Math.PI / 2, spread: 0.6 }
        );
      }
      break;

    case STATE.LEVEL_FAIL:
      handleLevelFailInput();
      break;

    case STATE.PAUSE:
      handlePauseInput();
      break;
  }

  input.flush();
}

/** 팝업 업데이트 */
function updatePopups(dt) {
  // 콤보 팝업
  for (let i = comboPopups.length - 1; i >= 0; i--) {
    const p = comboPopups[i];
    p.timer += dt;
    p.y -= dt * 0.03;
    p.scale = MathUtil.lerp(0.3, 1.5, Math.min(p.timer / 200, 1));
    p.alpha = Math.max(0, 1 - p.timer / p.maxTimer);
    if (p.timer >= p.maxTimer) comboPopups.splice(i, 1);
  }

  // 스코어 팝업
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.timer += dt;
    p.y -= dt * 0.04;
    if (p.timer >= p.maxTimer) scorePopups.splice(i, 1);
  }

  // 일반 플로팅 텍스트
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.timer += dt;
    f.y -= dt * 0.02;
    if (f.timer >= f.maxTimer) floatTexts.splice(i, 1);
  }

  // 매치 폭발 이펙트 (effectMatchBurst 에셋)
  for (let i = matchBurstEffects.length - 1; i >= 0; i--) {
    const e = matchBurstEffects[i];
    e.timer += dt;
    if (e.timer >= e.maxTimer) matchBurstEffects.splice(i, 1);
  }
}

/** 캐슬맵 스크롤 보간 */
function updateCastleScroll(dt) {
  castleScrollY = MathUtil.lerp(castleScrollY, castleTargetScroll, 0.12);
}

/** 튜토리얼 업데이트 */
function updateTutorial(dt) {
  tutorialTimer += dt;
  if (tutorialTimer > 4000) {
    tutorialStep++;
    tutorialTimer = 0;
    if (tutorialStep >= 3) showTutorial = false;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// §19. 입력 핸들러 — 각 상태별
// ═══════════════════════════════════════════════════════════════════════

/** 타이틀 입력 */
function handleTitleInput() {
  if (transitioning) return;
  if (input.confirm()) {
    if (!soundInited) { sound.init(); soundInited = true; }
    playSound('button');
    loadSave();
    updateCastleZones();
    startBGM();
    doTransition(STATE.CASTLE_MAP);
  }
}

/** 캐슬맵 입력 */
function handleCastleMapInput(dt) {
  if (transitioning) return;

  // 키보드 스크롤
  if (input.held('ArrowUp')) castleTargetScroll -= dt * 0.2;
  if (input.held('ArrowDown')) castleTargetScroll += dt * 0.2;
  const maxScroll = Math.max(0, Math.ceil(LEVELS.length / 3) * 80 - H + 200);
  castleTargetScroll = MathUtil.clamp(castleTargetScroll, 0, maxScroll);

  // 레벨 노드 클릭/탭
  if (input.tapped) {
    const tx = input.tapX, ty = input.tapY;
    for (let i = 0; i < LEVELS.length; i++) {
      if (i >= saveData.currentLevel) continue; // 미해금
      const pos = getLevelNodePos(i);
      const nx = pos.x;
      const ny = pos.y - castleScrollY;
      if (MathUtil.dist(tx, ty, nx, ny) < 32) {
        playSound('button');
        introTimer = 0;
        doTransition(STATE.LEVEL_INTRO, () => startLevel(i));
        return;
      }
    }
  }

  // ESC → 타이틀
  if (input.jp('Escape')) {
    doTransition(STATE.TITLE);
  }
}

/** 레벨 노드 위치 계산 (지그재그 패턴) */
function getLevelNodePos(idx) {
  const cols = 3;
  const startY = 160;
  const spacingY = 80;
  const row = Math.floor(idx / cols);
  const col = idx % cols;
  const baseX = W * 0.2 + col * (W * 0.3);
  const y = startY + row * spacingY;
  // 홀수 줄은 좌우 반전 (지그재그)
  if (row % 2 === 1) {
    return { x: W - baseX + W * 0.2, y };
  }
  return { x: baseX, y };
}

/** 플레이 입력 */
function handlePlayInput(dt) {
  if (transitioning) return;

  // ESC → 일시정지
  if (input.jp('Escape')) {
    directTransition(STATE.PAUSE);
    return;
  }

  // 액션 불가 상태 체크
  if (playSub === PLAY_SUB.BONUS) return; // 보너스 턴 진행 중
  if (playSub !== PLAY_SUB.IDLE && !activeBooster) return;
  if (swapLocked || cascadeInProgress || resolving || noMoveShuffle) return;

  // ── 힌트 타이머 ──
  if (playSub === PLAY_SUB.IDLE) {
    hintTimer += dt;
    if (hintTimer >= ANIM.HINT_DELAY && !hintCells) {
      hintCells = findHintMove();
    }
    if (hintCells) {
      hintAlpha = 0.5 + 0.5 * Math.sin(performance.now() * 0.005);
    }
  }

  // ── Enter: 부스터 메뉴 토글 (기획서 §3.2) ──
  if (input.jp('Enter')) {
    const types = ['hammer', 'shuffle', 'rainbow'];
    if (activeBooster) {
      // 이미 활성 부스터가 있으면 해제
      activeBooster = null;
      selectedCell = null;
    } else {
      // 첫 번째 보유 부스터를 활성화 (사이클 방식)
      const available = types.filter(t => boosters[t] > 0);
      if (available.length > 0) {
        useBooster(available[0]);
      }
    }
    return;
  }

  // ── 부스터 단축키 ──
  if (input.jp('Digit1')) { useBooster('hammer'); return; }
  if (input.jp('Digit2')) { useBooster('shuffle'); return; }
  if (input.jp('Digit3')) { useBooster('rainbow'); return; }

  // ── 키보드 커서 ──
  let cursorMoved = false;
  if (input.jp('ArrowUp')) { cursorCell.r = Math.max(0, cursorCell.r - 1); cursorMoved = true; }
  if (input.jp('ArrowDown')) { cursorCell.r = Math.min(ROWS - 1, cursorCell.r + 1); cursorMoved = true; }
  if (input.jp('ArrowLeft')) { cursorCell.c = Math.max(0, cursorCell.c - 1); cursorMoved = true; }
  if (input.jp('ArrowRight')) { cursorCell.c = Math.min(COLS - 1, cursorCell.c + 1); cursorMoved = true; }
  if (cursorMoved) { hintTimer = 0; hintCells = null; }

  // ── 키보드 Space: 선택/스왑 ──
  if (input.jp('Space')) {
    hintTimer = 0;
    hintCells = null;
    if (activeBooster) {
      applyBooster(cursorCell.r, cursorCell.c);
    } else if (selectedCell) {
      if (selectedCell.r === cursorCell.r && selectedCell.c === cursorCell.c) {
        selectedCell = null;
      } else if (isAdjacent(selectedCell.r, selectedCell.c, cursorCell.r, cursorCell.c)) {
        executeSwap(selectedCell.r, selectedCell.c, cursorCell.r, cursorCell.c);
      } else {
        selectedCell = { r: cursorCell.r, c: cursorCell.c };
      }
    } else {
      selectedCell = { r: cursorCell.r, c: cursorCell.c };
    }
    return;
  }

  // ── 마우스/터치 입력 ──
  if (input.tapped) {
    hintTimer = 0;
    hintCells = null;

    // 부스터 버튼 탭 체크
    if (checkBoosterTap(input.tapX, input.tapY)) return;

    const cell = screenToGrid(input.tapX, input.tapY);
    if (cell) {
      // 부스터 대상 선택
      if (activeBooster) {
        applyBooster(cell.r, cell.c);
        return;
      }
      // 선택/스왑
      if (selectedCell) {
        if (selectedCell.r === cell.r && selectedCell.c === cell.c) {
          selectedCell = null;
        } else if (isAdjacent(selectedCell.r, selectedCell.c, cell.r, cell.c)) {
          executeSwap(selectedCell.r, selectedCell.c, cell.r, cell.c);
        } else {
          selectedCell = cell;
        }
      } else {
        selectedCell = cell;
        dragStart = { r: cell.r, c: cell.c, x: input.tapX, y: input.tapY };
      }
    } else {
      selectedCell = null;
      activeBooster = null;
    }
  }

  // ── 드래그 스왑 감지 ──
  if (dragStart && input.mouseDown) {
    const dx = input.mouseX - dragStart.x;
    const dy = input.mouseY - dragStart.y;
    const threshold = cellSize * 0.35;
    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;
      const nr = dragStart.r + dr;
      const nc = dragStart.c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        executeSwap(dragStart.r, dragStart.c, nr, nc);
      }
      dragStart = null;
      selectedCell = null;
    }
  }
  if (!input.mouseDown) dragStart = null;
}

/** 부스터 버튼 탭 체크 */
function checkBoosterTap(tx, ty) {
  const btnW = Math.max(MIN_TOUCH, 56);
  const btnH = Math.max(MIN_TOUCH, 48);
  const gap = 12;
  const totalW = 3 * btnW + 2 * gap;
  const startX = (W - totalW) / 2;
  const btnY = gridY + ROWS * cellSize + 15;
  const types = ['hammer', 'shuffle', 'rainbow'];
  for (let i = 0; i < 3; i++) {
    const bx = startX + i * (btnW + gap);
    if (UI.hitTest(tx, ty, bx, btnY, btnW, btnH)) {
      useBooster(types[i]);
      return true;
    }
  }
  return false;
}

/** 레벨 완료 화면 입력 */
function handleLevelCompleteInput() {
  if (transitioning) return;
  // 별 애니메이션 끝날 때까지 대기
  if (levelStarAnim.timer < ANIM.STAR_DELAY * 3 + ANIM.STAR_POP) return;

  if (input.tapped || input.jp('Space') || input.jp('Enter')) {
    playSound('button');
    stopBGM();
    doTransition(STATE.CASTLE_MAP);
  }
}

/** 레벨 실패 화면 입력 */
function handleLevelFailInput() {
  if (transitioning) return;

  // R키 = 재시작
  if (input.jp('KeyR')) {
    playSound('button');
    doTransition(STATE.PLAY, () => startLevel(currentLevelIdx));
    return;
  }

  if (input.tapped) {
    // 재시도 버튼 영역
    const btnW = Math.max(MIN_TOUCH * 3, 180);
    const btnH = Math.max(MIN_TOUCH, 50);
    const btnX = W / 2 - btnW / 2;
    const retryY = H * 0.55;
    const quitY = H * 0.70;

    if (UI.hitTest(input.tapX, input.tapY, btnX, retryY, btnW, btnH)) {
      playSound('button');
      doTransition(STATE.PLAY, () => startLevel(currentLevelIdx));
      return;
    }
    if (UI.hitTest(input.tapX, input.tapY, btnX, quitY, btnW, btnH)) {
      playSound('button');
      doTransition(STATE.CASTLE_MAP);
      return;
    }
  }

  if (input.jp('Space') || input.jp('Enter')) {
    playSound('button');
    doTransition(STATE.CASTLE_MAP);
  }
}

/** 일시정지 입력 */
function handlePauseInput() {
  if (transitioning) return;

  if (input.jp('Escape') || input.jp('Space')) {
    directTransition(STATE.PLAY);
    return;
  }

  if (input.tapped) {
    const bw = 180, bh = 50;
    const cx = W / 2;
    // Resume
    if (UI.hitTest(input.tapX, input.tapY, cx - bw / 2, H / 2 - 40, bw, bh)) {
      directTransition(STATE.PLAY);
      return;
    }
    // Quit
    if (UI.hitTest(input.tapX, input.tapY, cx - bw / 2, H / 2 + 30, bw, bh)) {
      stopBGM();
      doTransition(STATE.CASTLE_MAP);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// §20. 리사이즈 처리
// ═══════════════════════════════════════════════════════════════════════
function onResize(w, h) {
  W = w;
  H = h;
  recalcGrid();
}

function recalcGrid() {
  // 상하 여백 확보 (HUD + 부스터)
  const topMargin = 80;
  const bottomMargin = 80;
  const maxGridW = W * 0.9;
  const maxGridH = H - topMargin - bottomMargin;
  cellSize = Math.floor(Math.min(maxGridW / COLS, maxGridH / ROWS));
  cellSize = MathUtil.clamp(cellSize, 28, 80);
  gridW = cellSize * COLS;
  gridH = cellSize * ROWS;
  gridX = Math.floor((W - gridW) / 2);
  gridY = Math.floor(topMargin + (maxGridH - gridH) / 2);

  if (board.length > 0) updateCellPositions(false);
}

// ═══════════════════════════════════════════════════════════════════════
// §21. 메인 RENDER 루프
// ═══════════════════════════════════════════════════════════════════════
function render(ctx, w, h, dt) {
  W = w; H = h;
  ctx.save();

  // 화면 흔들림
  const shake = getShakeOffset();
  if (shake.x !== 0 || shake.y !== 0) ctx.translate(shake.x, shake.y);

  // 상태별 렌더
  switch (state) {
    case STATE.TITLE:          renderTitle(ctx, w, h); break;
    case STATE.CASTLE_MAP:     renderCastleMap(ctx, w, h); break;
    case STATE.LEVEL_INTRO:    renderLevelIntro(ctx, w, h); break;
    case STATE.PLAY:           renderPlay(ctx, w, h); break;
    case STATE.LEVEL_COMPLETE: renderLevelComplete(ctx, w, h); break;
    case STATE.LEVEL_FAIL:     renderLevelFail(ctx, w, h); break;
    case STATE.PAUSE:          renderPlay(ctx, w, h); renderPauseOverlay(ctx, w, h); break;
  }

  // 파티클 (모든 상태)
  particles.render(ctx);

  // 팝업 (콤보/스코어)
  renderPopups(ctx);

  // 페이드
  if (_fadeAlpha > 0.01) UI.fade(ctx, w, h, _fadeAlpha);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// §22. 타이틀 화면 렌더링
// ═══════════════════════════════════════════════════════════════════════
function renderTitle(ctx, w, h) {
  // 배경 그라디언트
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.6, '#4a6fa5');
  grad.addColorStop(1, '#1a1a4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 배경 이미지
  if (assets.sprites.bgCastle) {
    ctx.globalAlpha = 0.35;
    ctx.drawImage(assets.sprites.bgCastle, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // 떨어지는 보석 배경
  renderFallingGems(ctx, w, h, titleTime);

  // 별 배경
  renderStarfield(ctx, w, h, titleTime, 25);

  // 장식 반짝이 (배경 보석 파티클)
  const sparklePhase = titleTime * 0.003;
  for (let i = 0; i < 20; i++) {
    const sx = (Math.sin(sparklePhase + i * 1.7) * 0.45 + 0.5) * w;
    const sy = (Math.cos(sparklePhase * 0.7 + i * 2.1) * 0.35 + 0.35) * h;
    const ss = 1.5 + Math.sin(titleTime * 0.005 + i) * 1.5;
    const sa = 0.3 + Math.sin(titleTime * 0.004 + i * 0.8) * 0.2;
    ctx.globalAlpha = sa;
    ctx.fillStyle = GEM_HEX[GEM_COLORS[i % 6]];
    ctx.beginPath();
    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 타이틀 텍스트 (그림자 + 금색)
  const titleY = h * 0.25;
  const titleSize = MathUtil.clamp(w * 0.07, 24, 44);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 4;
  ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;

  // 금색 그라디언트 텍스트
  const textGrad = ctx.createLinearGradient(w / 2 - 100, titleY - 20, w / 2 + 100, titleY + 20);
  textGrad.addColorStop(0, '#ffd700');
  textGrad.addColorStop(0.5, '#fff8e0');
  textGrad.addColorStop(1, '#cc9900');
  ctx.fillStyle = textGrad;
  ctx.fillText(t('title'), w / 2, titleY);
  ctx.restore();

  // 서브타이틀
  UI.text(ctx, t('subtitle'), w / 2, titleY + titleSize * 0.8, {
    size: MathUtil.clamp(w * 0.03, 12, 18),
    color: '#e0e0f0',
    shadow: true
  });

  // 보석 라인업 (타이틀 아래 장식)
  const gemS = MathUtil.clamp(w * 0.06, 24, 44);
  const gemY = h * 0.42;
  const totalGemW = 6 * gemS * 0.8;
  for (let i = 0; i < 6; i++) {
    const gx = w / 2 - totalGemW / 2 + i * gemS * 0.8;
    const bounce = Math.sin(titleTime * 0.003 + i * 0.6) * 6;
    const ak = GEM_ASSET_MAP[GEM_COLORS[i]];
    if (assets.sprites[ak]) {
      ctx.drawImage(assets.sprites[ak], gx, gemY + bounce, gemS, gemS);
    } else {
      ctx.fillStyle = GEM_HEX[GEM_COLORS[i]];
      ctx.beginPath();
      ctx.arc(gx + gemS / 2, gemY + bounce + gemS / 2, gemS * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 시작 버튼
  const btnW = MathUtil.clamp(w * 0.5, MIN_TOUCH * 3, 240);
  const btnH = Math.max(MIN_TOUCH, 54);
  const btnX = w / 2 - btnW / 2;
  const btnY = h * 0.58;
  const hover = UI.hitTest(input.mouseX, input.mouseY, btnX, btnY, btnW, btnH);

  ctx.save();
  if (hover) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20; }
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#ffd700');
  btnGrad.addColorStop(1, '#b8860b');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 14);
  ctx.fill();
  ctx.strokeStyle = '#ffee88';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 세이브 데이터 있으면 "이어하기"
  const hasData = Save.get(SAVE_KEY);
  const btnLabel = hasData ? t('continue') : t('start');
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#2a1a00';
  ctx.font = `bold ${MathUtil.clamp(w * 0.04, 14, 22)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText(btnLabel, w / 2, btnY + btnH / 2);
  ctx.restore();

  // 하단 안내
  const infoText = input.isMobile ? t('tapToStart') : t('pressSpace');
  const pulse = 0.4 + 0.4 * Math.sin(titleTime * 0.004);
  ctx.globalAlpha = pulse;
  UI.text(ctx, infoText, w / 2, h * 0.78, { size: 13, color: '#b0b0d0' });
  ctx.globalAlpha = 1;

  // 게임 통계
  renderGameStats(ctx, w, h);

  // 버전
  UI.text(ctx, 'v1.0.0', w / 2, h * 0.94, { size: 10, color: '#505070' });
}

// ═══════════════════════════════════════════════════════════════════════
// §23. 캐슬맵 렌더링
// ═══════════════════════════════════════════════════════════════════════
function renderCastleMap(ctx, w, h) {
  // 배경
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#5a8a5a');
  grad.addColorStop(1, '#2a4a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 배경 이미지 (패럴랙스)
  if (assets.sprites.bgCastle) {
    ctx.globalAlpha = 0.5;
    ctx.drawImage(assets.sprites.bgCastle, 0, -castleScrollY * 0.2, w, h);
    ctx.globalAlpha = 1;
  }

  // 상단 바
  ctx.fillStyle = 'rgba(26,26,78,0.9)';
  ctx.fillRect(0, 0, w, 55);
  UI.text(ctx, t('title'), w / 2, 18, { size: 16, color: '#ffd700', bold: true });

  // 캐슬 구역 진행 바
  const barW = w * 0.6;
  const barX = (w - barW) / 2;
  const barY = 35;
  const barH = 12;
  const maxCP = CASTLE_ZONES[CASTLE_ZONES.length - 1].cpNeeded;
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 6);
  ctx.fill();
  const fillW = barW * MathUtil.clamp(saveData.castleCP / maxCP, 0, 1);
  const barGrad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
  barGrad.addColorStop(0, '#ffd700');
  barGrad.addColorStop(1, '#ff8800');
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  ctx.roundRect(barX, barY, fillW, barH, 6);
  ctx.fill();
  UI.text(ctx, `CP: ${saveData.castleCP}/${maxCP}`, w / 2, barY + barH / 2, { size: 9, color: '#fff' });

  // 구역 마커
  for (let i = 0; i < CASTLE_ZONES.length; i++) {
    const zx = barX + (CASTLE_ZONES[i].cpNeeded / maxCP) * barW;
    const unlocked = i < saveData.unlockedZones;
    ctx.fillStyle = unlocked ? CASTLE_ZONES[i].color : '#555';
    ctx.beginPath();
    ctx.arc(zx, barY + barH / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 캐슬 건물
  renderCastleBuilding(ctx, w, h);

  // 레벨 경로 곡선
  renderLevelPath(ctx, w, h);

  // ── 레벨 노드 렌더링 ──
  ctx.save();
  for (let i = 0; i < LEVELS.length; i++) {
    const pos = getLevelNodePos(i);
    const nx = pos.x;
    const ny = pos.y - castleScrollY;
    if (ny < -50 || ny > h + 50) continue;

    const unlocked = i < saveData.currentLevel;
    const cleared = (saveData.stars[i] || 0) > 0;
    const isCurrent = i === saveData.currentLevel - 1;
    const stars = saveData.stars[i] || 0;

    // 연결선
    if (i > 0) {
      const prev = getLevelNodePos(i - 1);
      ctx.strokeStyle = cleared ? '#ffd70088' : '#ffffff20';
      ctx.lineWidth = cleared ? 3 : 1;
      ctx.setLineDash(cleared ? [] : [4, 4]);
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y - castleScrollY);
      ctx.lineTo(nx, ny);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 노드
    const R = 24;
    ctx.beginPath();
    ctx.arc(nx, ny, R, 0, Math.PI * 2);

    if (!unlocked) {
      // 잠긴 노드
      ctx.fillStyle = '#444';
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.stroke();
      UI.text(ctx, '🔒', nx, ny, { size: 12 });
    } else if (isCurrent) {
      // 현재 레벨 (빛남)
      const glow = 0.6 + 0.4 * Math.sin(performance.now() * 0.004);
      ctx.save();
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 15 * glow;
      ctx.fillStyle = `rgba(255, 215, 0, ${0.7 + glow * 0.3})`;
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#ffee88';
      ctx.lineWidth = 3;
      ctx.stroke();
      UI.text(ctx, `${i + 1}`, nx, ny, { size: 15, color: '#2a1a00', bold: true });
    } else if (cleared) {
      // 클리어 노드
      ctx.fillStyle = '#cc9900';
      ctx.fill();
      ctx.strokeStyle = '#996600';
      ctx.lineWidth = 2;
      ctx.stroke();
      UI.text(ctx, `${i + 1}`, nx, ny - 5, { size: 13, color: '#2a1a00', bold: true });
      // 별
      const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
      UI.text(ctx, starStr, nx, ny + 11, { size: 8, color: '#ffd700' });
    } else {
      // 해금했지만 미클리어
      ctx.fillStyle = '#4488cc';
      ctx.fill();
      ctx.strokeStyle = '#3366aa';
      ctx.lineWidth = 2;
      ctx.stroke();
      UI.text(ctx, `${i + 1}`, nx, ny, { size: 14, color: '#fff', bold: true });
    }
  }
  ctx.restore();

  // 구역 해금 애니메이션
  if (zoneUnlockAnim) {
    const z = CASTLE_ZONES[zoneUnlockAnim.zone];
    const alpha = Math.max(0, 1 - zoneUnlockAnim.timer / 3000);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(w * 0.1, h * 0.4, w * 0.8, 60);
    UI.text(ctx, `${z.icon} ${t('castleUnlock')} — ${t('castle')[zoneUnlockAnim.zone]}`,
      w / 2, h * 0.4 + 30, { size: 20, color: z.color, bold: true, glow: z.color });
    ctx.globalAlpha = 1;
  }

  // 하단 안내
  ctx.fillStyle = 'rgba(26,26,78,0.85)';
  ctx.fillRect(0, h - 35, w, 35);
  UI.text(ctx, `${t('selectLevel')} | ${t('escToBack')}`, w / 2, h - 18, { size: 11, color: '#8080a0' });
}

// ═══════════════════════════════════════════════════════════════════════
// §24. 레벨 인트로 렌더링
// ═══════════════════════════════════════════════════════════════════════
function renderLevelIntro(ctx, w, h) {
  ctx.fillStyle = '#1a1a4e';
  ctx.fillRect(0, 0, w, h);

  const progress = Math.min(introTimer / ANIM.INTRO_DUR, 1);
  const entryScale = MathUtil.clamp(introTimer / 400, 0.5, 1);

  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(entryScale, entryScale);
  ctx.translate(-w / 2, -h / 2);

  // 레벨 번호 (큰 텍스트)
  UI.text(ctx, `${t('level')} ${currentLevel.id}`, w / 2, h * 0.28, {
    size: 40, color: '#ffd700', bold: true, glow: '#ffd70066'
  });

  // 팁
  if (currentLevel.tip) {
    UI.text(ctx, currentLevel.tip, w / 2, h * 0.37, { size: 14, color: '#b0b0d0' });
  }

  // 목표 헤더
  UI.text(ctx, t('goal'), w / 2, h * 0.46, { size: 20, color: '#e0e0f0', bold: true, shadow: true });

  // 목표 리스트
  let gy = h * 0.54;
  for (const goal of currentLevel.goals) {
    let icon = '🎯';
    let text = '';
    if (goal.type === 'score') {
      icon = '🏆';
      text = `${t('goalTypes').score}: ${goal.target.toLocaleString()}`;
    } else if (goal.type === 'collect') {
      icon = GEM_HEX[goal.color] ? '💎' : '💎';
      text = `${t('goalTypes').collect}: ${goal.color} ×${goal.count}`;
    } else if (goal.type === 'obstacle') {
      icon = goal.target === 'ice' ? '❄️' : goal.target === 'crate' ? '📦' : '⛓️';
      text = `${t('goalTypes').obstacle}: ${goal.target} ×${goal.count}`;
    }
    UI.text(ctx, `${icon} ${text}`, w / 2, gy, { size: 15, color: '#e0e0f0' });
    gy += 28;
  }

  // 턴 수
  UI.text(ctx, `${t('turns')}: ${currentLevel.turns}`, w / 2, gy + 15, {
    size: 18, color: '#00d4ff', bold: true
  });

  ctx.restore();

  // 진행 바
  const barW2 = w * 0.5;
  const barX2 = (w - barW2) / 2;
  const barY2 = h * 0.88;
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(barX2, barY2, barW2, 6, 3);
  ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.roundRect(barX2, barY2, barW2 * progress, 6, 3);
  ctx.fill();
}

// ═══════════════════════════════════════════════════════════════════════
// §25. 플레이 화면 렌더링
// ═══════════════════════════════════════════════════════════════════════
function renderPlay(ctx, w, h) {
  // 배경
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a1a4e');
  bg.addColorStop(0.4, '#252560');
  bg.addColorStop(1, '#0a0a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // 배경 이미지
  if (assets.sprites.bgPlay) {
    ctx.globalAlpha = 0.25;
    ctx.drawImage(assets.sprites.bgPlay, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // 배경 디테일 (촛불 등)
  renderPlayBgDetails(ctx, w, h, performance.now());

  // 그리드 배경 (나무 프레임)
  renderGridFrame(ctx);

  // 보석 렌더링
  renderGems(ctx);

  // 선택 하이라이트
  renderSelection(ctx);

  // 힌트 오버레이
  renderHint(ctx);

  // 상단 HUD
  renderPlayHUD(ctx, w, h);

  // 부스터 패널
  renderBoosterPanel(ctx, w, h);

  // 셔플 메시지
  if (noMoveShuffle) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const msgH = 40;
    ctx.fillRect(0, h / 2 - msgH / 2, w, msgH);
    UI.text(ctx, t('noMoves'), w / 2, h / 2, { size: 16, color: '#ffd700', bold: true });
  }

  // 보너스 턴 안내
  if (playSub === PLAY_SUB.BONUS) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, gridY - 35, w, 25);
    UI.text(ctx, `${t('bonusTurns')} (${bonusTurnsLeft})`, w / 2, gridY - 22, {
      size: 14, color: '#ffd700', bold: true
    });
  }

  // 튜토리얼
  if (showTutorial) renderTutorial(ctx, w, h);

  // 콤보 카운터
  renderComboCounter(ctx, w, h);

  // DDA 인디케이터
  renderDDAIndicator(ctx, w, h);

  // 부스터 대상 안내
  if (activeBooster) {
    const abText = activeBooster === 'hammer' ? '🔨 대상을 선택하세요' : '🌈 색상을 선택하세요';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, gridY - 30, w, 22);
    UI.text(ctx, abText, w / 2, gridY - 19, { size: 12, color: '#ffd700' });
  }
}

/** 그리드 프레임 */
function renderGridFrame(ctx) {
  const pad = 8;

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(gridX - pad + 4, gridY - pad + 4, gridW + pad * 2, gridH + pad * 2, 6);
  ctx.fill();

  // 프레임 (나무 텍스처)
  const frameGrad = ctx.createLinearGradient(gridX, gridY, gridX + gridW, gridY + gridH);
  frameGrad.addColorStop(0, '#8B6914');
  frameGrad.addColorStop(0.3, '#a07830');
  frameGrad.addColorStop(0.7, '#8B6914');
  frameGrad.addColorStop(1, '#7B5904');
  ctx.fillStyle = frameGrad;
  ctx.beginPath();
  ctx.roundRect(gridX - pad, gridY - pad, gridW + pad * 2, gridH + pad * 2, 6);
  ctx.fill();

  // 금색 테두리
  ctx.strokeStyle = '#ffd70055';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 셀 배경 (체커보드)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cx = gridX + c * cellSize;
      const cy = gridY + r * cellSize;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(92, 58, 30, 0.8)' : 'rgba(107, 69, 40, 0.8)';
      ctx.fillRect(cx, cy, cellSize, cellSize);
    }
  }
}

/** 보석 렌더링 */
function renderGems(ctx) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (cell.color === -1 && cell.obsType === OBS.NONE) continue;

      const px = cell.renderX;
      const py = cell.renderY;
      const size = cellSize * cell.scale;
      const offset = (cellSize - size) / 2;
      const dx = px + offset;
      const dy = py + offset;
      const cx = px + cellSize / 2;
      const cy = py + cellSize / 2;

      ctx.globalAlpha = cell.alpha;

      // 상자 (보석 덮기)
      if (cell.obsType === OBS.CRATE && cell.obsHp > 0) {
        if (assets.sprites.obstacleCrate) {
          ctx.drawImage(assets.sprites.obstacleCrate, dx, dy, size, size);
        } else {
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(dx + 3, dy + 3, size - 6, size - 6);
          ctx.strokeStyle = '#5c3a1e';
          ctx.lineWidth = 2;
          ctx.strokeRect(dx + 3, dy + 3, size - 6, size - 6);
          // X 무늬
          ctx.beginPath();
          ctx.moveTo(dx + 6, dy + 6);
          ctx.lineTo(dx + size - 6, dy + size - 6);
          ctx.moveTo(dx + size - 6, dy + 6);
          ctx.lineTo(dx + 6, dy + size - 6);
          ctx.stroke();
        }
        // HP 표시
        if (cell.obsHp > 1) {
          UI.text(ctx, `${cell.obsHp}`, cx, cy, { size: 11, color: '#fff', bold: true });
        }
        ctx.globalAlpha = 1;
        continue;
      }

      // 보석 그리기
      if (cell.color >= 0) {
        if (cell.special === SPECIAL.RAINBOW) {
          // 무지개 보석 (독립 에셋)
          if (assets.sprites.specialRainbow) {
            ctx.drawImage(assets.sprites.specialRainbow, dx, dy, size, size);
          } else {
            // 폴백: 무지개 그라디언트
            const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.4);
            grd.addColorStop(0, '#ff4444');
            grd.addColorStop(0.2, '#ff8800');
            grd.addColorStop(0.4, '#ffff44');
            grd.addColorStop(0.6, '#44ff44');
            grd.addColorStop(0.8, '#4488ff');
            grd.addColorStop(1, '#8844ff');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2);
            ctx.fill();
            // 빛남
            ctx.strokeStyle = '#ffffff88';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        } else {
          // 일반 보석 에셋/폴백
          const colorName = GEM_COLORS[cell.color];
          const assetKey = GEM_ASSET_MAP[colorName];
          const pad = size * 0.1;

          if (assets.sprites[assetKey]) {
            ctx.drawImage(assets.sprites[assetKey], dx + pad, dy + pad, size - pad * 2, size - pad * 2);
          } else {
            // 폴백: 보석 원
            const gemGrad = ctx.createRadialGradient(cx - size * 0.1, cy - size * 0.1, size * 0.05, cx, cy, size * 0.4);
            gemGrad.addColorStop(0, '#ffffff');
            gemGrad.addColorStop(0.3, GEM_HEX[colorName]);
            gemGrad.addColorStop(1, '#000000');
            ctx.fillStyle = gemGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
          }

          // 스페셜 오버레이
          if (cell.special !== SPECIAL.NONE) {
            renderSpecialOverlay(ctx, cell.special, dx, dy, size, cx, cy);
          }
        }
      }

      // 얼음 오버레이
      if (cell.obsType === OBS.ICE && cell.obsHp > 0) {
        const iceA = cell.obsHp >= 2 ? 0.65 : 0.35;
        if (assets.sprites.obstacleIce) {
          ctx.globalAlpha = iceA;
          ctx.drawImage(assets.sprites.obstacleIce, dx, dy, size, size);
        } else {
          ctx.fillStyle = `rgba(135, 206, 235, ${iceA})`;
          ctx.fillRect(dx + 2, dy + 2, size - 4, size - 4);
          // 결정 패턴
          ctx.strokeStyle = `rgba(200, 230, 255, ${iceA * 0.8})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(dx + size * 0.3, dy + size * 0.2);
          ctx.lineTo(dx + size * 0.7, dy + size * 0.5);
          ctx.moveTo(dx + size * 0.2, dy + size * 0.6);
          ctx.lineTo(dx + size * 0.6, dy + size * 0.8);
          ctx.stroke();
        }
        ctx.globalAlpha = cell.alpha;
      }

      // 체인 오버레이
      if (cell.obsType === OBS.CHAIN && cell.obsHp > 0) {
        if (assets.sprites.obstacleChain) {
          ctx.drawImage(assets.sprites.obstacleChain, dx, dy, size, size);
        } else {
          ctx.strokeStyle = '#aaaaaa';
          ctx.lineWidth = 3;
          ctx.strokeRect(dx + 5, dy + 5, size - 10, size - 10);
          ctx.strokeStyle = '#777777';
          ctx.lineWidth = 1;
          // 체인 링크 패턴
          for (let i = 0; i < 3; i++) {
            const ly = dy + 5 + i * (size - 10) / 3;
            ctx.beginPath();
            ctx.arc(dx + 5, ly, 3, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(dx + size - 5, ly, 3, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      }

      ctx.globalAlpha = 1;
    }
  }
}

/** 스페셜 보석 오버레이 렌더 */
function renderSpecialOverlay(ctx, special, dx, dy, size, cx, cy) {
  if (special === SPECIAL.LINE_H) {
    if (assets.sprites.specialLineH) {
      ctx.drawImage(assets.sprites.specialLineH, dx, dy, size, size);
    } else {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(dx + 4, cy);
      ctx.lineTo(dx + size - 4, cy);
      ctx.stroke();
      // 화살표
      ctx.beginPath();
      ctx.moveTo(dx + size - 10, cy - 4);
      ctx.lineTo(dx + size - 4, cy);
      ctx.lineTo(dx + size - 10, cy + 4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(dx + 10, cy - 4);
      ctx.lineTo(dx + 4, cy);
      ctx.lineTo(dx + 10, cy + 4);
      ctx.stroke();
    }
  } else if (special === SPECIAL.LINE_V) {
    if (assets.sprites.specialLineV) {
      ctx.drawImage(assets.sprites.specialLineV, dx, dy, size, size);
    } else {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, dy + 4);
      ctx.lineTo(cx, dy + size - 4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - 4, dy + size - 10);
      ctx.lineTo(cx, dy + size - 4);
      ctx.lineTo(cx + 4, dy + size - 10);
      ctx.stroke();
    }
  } else if (special === SPECIAL.BOMB) {
    if (assets.sprites.specialBomb) {
      ctx.drawImage(assets.sprites.specialBomb, dx, dy, size, size);
    } else {
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      // 중앙 점
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

/** 선택 하이라이트 */
function renderSelection(ctx) {
  if (selectedCell && (playSub === PLAY_SUB.IDLE || activeBooster)) {
    const sx = gridX + selectedCell.c * cellSize;
    const sy = gridY + selectedCell.r * cellSize;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(sx + 2, sy + 2, cellSize - 4, cellSize - 4, 4);
    ctx.stroke();
    // 내부 글로우
    ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
    ctx.fill();
  }

  // 키보드 커서 (데스크톱)
  if (!input.isMobile && playSub === PLAY_SUB.IDLE) {
    const kx = gridX + cursorCell.c * cellSize;
    const ky = gridY + cursorCell.r * cellSize;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(kx + 1, ky + 1, cellSize - 2, cellSize - 2);
    ctx.setLineDash([]);
  }
}

/** 힌트 오버레이 */
function renderHint(ctx) {
  if (!hintCells || playSub !== PLAY_SUB.IDLE) return;
  ctx.globalAlpha = hintAlpha * 0.4;
  for (const hc of hintCells) {
    const hx = gridX + hc.c * cellSize;
    const hy = gridY + hc.r * cellSize;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.roundRect(hx + 2, hy + 2, cellSize - 4, cellSize - 4, 4);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/** 상단 HUD */
function renderPlayHUD(ctx, w, h) {
  const hudH = 68;
  const hudY = 2;

  // 배경
  if (assets.sprites.uiGoalPanel) {
    ctx.globalAlpha = 0.75;
    ctx.drawImage(assets.sprites.uiGoalPanel, 5, hudY, w - 10, hudH);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = 'rgba(26,26,78,0.88)';
    ctx.beginPath();
    ctx.roundRect(5, hudY, w - 10, hudH, 8);
    ctx.fill();
    ctx.strokeStyle = '#ffd70033';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 레벨
  UI.text(ctx, `Lv.${currentLevel.id}`, 40, hudY + 14, { size: 13, color: '#ffd700', bold: true });

  // 점수
  UI.text(ctx, score.toLocaleString(), w / 2, hudY + 14, { size: 14, color: '#e0e0f0', bold: true });

  // 턴
  const turnColor = turnsLeft <= 3 ? '#e63946' : turnsLeft <= 6 ? '#f4a261' : '#00d4ff';
  UI.text(ctx, `${turnsLeft}`, w - 40, hudY + 14, { size: 16, color: turnColor, bold: true });
  UI.text(ctx, t('turns'), w - 40, hudY + 28, { size: 8, color: '#8080a0' });

  // 목표 진행
  let gx = 15;
  const gy = hudY + 50;
  for (const goal of currentLevel.goals) {
    const ratio = goalProgressRatio(goal);
    const done = ratio >= 1;
    const key = goalKey(goal);
    const current = goalProgress[key] || 0;
    const target = goal.type === 'score' ? goal.target : goal.count;

    // 아이콘/색상
    let icon = '🎯';
    if (goal.type === 'collect') {
      const ak = GEM_ASSET_MAP[goal.color];
      if (assets.sprites[ak]) {
        ctx.drawImage(assets.sprites[ak], gx, gy - 8, 16, 16);
        gx += 18;
      } else {
        ctx.fillStyle = GEM_HEX[goal.color] || '#aaa';
        ctx.beginPath();
        ctx.arc(gx + 8, gy, 6, 0, Math.PI * 2);
        ctx.fill();
        gx += 18;
      }
    } else if (goal.type === 'obstacle') {
      icon = goal.target === 'ice' ? '❄' : goal.target === 'crate' ? '📦' : '⛓';
      UI.text(ctx, icon, gx + 8, gy, { size: 11 });
      gx += 18;
    } else {
      UI.text(ctx, '🏆', gx + 8, gy, { size: 11 });
      gx += 18;
    }

    // 진행률 바
    const barW = 50;
    const barH2 = 6;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.roundRect(gx, gy - 3, barW, barH2, 3);
    ctx.fill();
    ctx.fillStyle = done ? '#00ff87' : '#ffd700';
    ctx.beginPath();
    ctx.roundRect(gx, gy - 3, barW * ratio, barH2, 3);
    ctx.fill();

    // 텍스트
    UI.text(ctx, `${Math.min(current, target)}/${target}`, gx + barW + 20, gy, {
      size: 9, color: done ? '#00ff87' : '#e0e0f0', align: 'left'
    });

    gx += barW + 45;
  }
}

/** 부스터 패널 */
function renderBoosterPanel(ctx, w, h) {
  const btnW = Math.max(MIN_TOUCH, 56);
  const btnH = Math.max(MIN_TOUCH, 48);
  const gap = 12;
  const totalW = 3 * btnW + 2 * gap;
  const startX = (w - totalW) / 2;
  const btnY = gridY + ROWS * cellSize + 12;

  // 부스터 패널 배경 에셋 (있으면 사용)
  const panelSprite = assets.sprites.uiBoosterPanel;
  if (panelSprite) {
    const panelPad = 10;
    const panelW = totalW + panelPad * 2;
    const panelH = btnH + panelPad * 2;
    ctx.drawImage(panelSprite, startX - panelPad, btnY - panelPad, panelW, panelH);
  }

  const types = ['hammer', 'shuffle', 'rainbow'];
  const icons = ['🔨', '🔄', '🌈'];

  for (let i = 0; i < 3; i++) {
    const bx = startX + i * (btnW + gap);
    const type = types[i];
    const count = boosters[type];
    const active = activeBooster === type;
    const hover = UI.hitTest(input.mouseX, input.mouseY, bx, btnY, btnW, btnH);

    // 배경 (에셋이 없거나 에셋 위 개별 슬롯 강조)
    ctx.fillStyle = active ? 'rgba(255,215,0,0.2)' :
                    count > 0 ? 'rgba(42,42,94,0.8)' : 'rgba(26,26,62,0.6)';
    ctx.beginPath();
    ctx.roundRect(bx, btnY, btnW, btnH, 8);
    ctx.fill();

    // 테두리
    ctx.strokeStyle = active ? '#ffd700' : count > 0 ? (hover ? '#6688cc' : '#446699') : '#333';
    ctx.lineWidth = active ? 2 : 1;
    ctx.stroke();

    // 아이콘
    UI.text(ctx, icons[i], bx + btnW / 2, btnY + btnH / 2 - 7, { size: 18 });

    // 수량 배지
    if (count > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(bx + btnW - 8, btnY + 8, 8, 0, Math.PI * 2);
      ctx.fill();
      UI.text(ctx, `${count}`, bx + btnW - 8, btnY + 8, { size: 9, color: '#1a1a4e', bold: true });
    } else {
      UI.text(ctx, '0', bx + btnW / 2, btnY + btnH - 8, { size: 9, color: '#555' });
    }
  }
}

/** 튜토리얼 오버레이 */
function renderTutorial(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, h - 60, w, 60);
  const tips = [
    input.isMobile ? t('dragOrTap') : t('keyboard'),
    '스페셜: 4매치→줄 파괴, 5매치→무지개!',
    '목표를 모두 달성하면 레벨 클리어!'
  ];
  const tip = tips[Math.min(tutorialStep, tips.length - 1)];
  UI.text(ctx, tip, w / 2, h - 30, { size: 13, color: '#ffd700' });
}

// ═══════════════════════════════════════════════════════════════════════
// §26. 레벨 완료 화면
// ═══════════════════════════════════════════════════════════════════════
function renderLevelComplete(ctx, w, h) {
  // 배경
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a1a4e');
  bg.addColorStop(1, '#2a2a3e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // 클리어 텍스트
  UI.text(ctx, t('complete'), w / 2, h * 0.15, {
    size: 34, color: '#ffd700', bold: true, glow: '#ffd70066'
  });
  UI.text(ctx, `${t('level')} ${currentLevel.id}`, w / 2, h * 0.24, {
    size: 18, color: '#e0e0f0'
  });

  // 별 애니메이션
  const starY = h * 0.35;
  const starSize = 40;
  for (let i = 0; i < 3; i++) {
    const sx = w / 2 + (i - 1) * (starSize * 1.2);
    const earned = i < starsEarned;
    const delay = i * ANIM.STAR_DELAY;
    const show = levelStarAnim.timer > delay;

    if (show && earned) {
      const t2 = MathUtil.clamp((levelStarAnim.timer - delay) / ANIM.STAR_POP, 0, 1);
      const scale = 0.3 + 0.7 * t2;
      const bounce = t2 < 0.5 ? t2 * 2 : 1 + Math.sin((t2 - 0.5) * Math.PI) * 0.2;
      ctx.save();
      ctx.translate(sx, starY);
      ctx.scale(bounce, bounce);
      ctx.translate(-sx, -starY);
      UI.text(ctx, '★', sx, starY, { size: starSize, color: '#ffd700', bold: true, glow: '#ffd700' });
      ctx.restore();
      // 별 획득 사운드 (1회)
      if (t2 >= 0.95 && levelStarAnim.count <= i) {
        levelStarAnim.count = i + 1;
        playSound('star');
      }
    } else {
      UI.text(ctx, '☆', sx, starY, { size: starSize, color: '#555' });
    }
  }

  // 점수
  UI.text(ctx, `${t('score')}: ${score.toLocaleString()}`, w / 2, h * 0.50, {
    size: 22, color: '#e0e0f0', bold: true
  });

  // 신기록
  if (isNewRecord) {
    const nrPulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.005);
    ctx.globalAlpha = nrPulse;
    UI.text(ctx, `🏆 ${t('newRecord')}!`, w / 2, h * 0.57, {
      size: 16, color: '#ff6600', bold: true, glow: '#ff6600'
    });
    ctx.globalAlpha = 1;
  }

  // 최고 점수
  const best = saveData.bestScores[currentLevelIdx] || 0;
  UI.text(ctx, `${t('highScore')}: ${best.toLocaleString()}`, w / 2, h * 0.63, {
    size: 13, color: '#8080a0'
  });

  // 보석 분수 이펙트
  renderGemFountain(ctx, w, h, performance.now());

  // 목표 달성 체크마크
  renderGoalChecks(ctx, w, h);

  // 다음 레벨 버튼
  const readyForBtn = levelStarAnim.timer > ANIM.STAR_DELAY * 3 + ANIM.STAR_POP;
  if (readyForBtn) {
    const btnW = MathUtil.clamp(w * 0.45, MIN_TOUCH * 3, 200);
    const btnH = Math.max(MIN_TOUCH, 50);
    const btnX = w / 2 - btnW / 2;
    const btnY = h * 0.73;
    const hover = UI.hitTest(input.mouseX, input.mouseY, btnX, btnY, btnW, btnH);

    const btnAlpha = MathUtil.clamp((levelStarAnim.timer - ANIM.STAR_DELAY * 3 - ANIM.STAR_POP) / 300, 0, 1);
    ctx.globalAlpha = btnAlpha;
    ctx.fillStyle = hover ? '#ffd700' : '#cc9900';
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 12);
    ctx.fill();
    UI.text(ctx, t('nextLevel'), w / 2, btnY + btnH / 2, {
      size: 16, color: '#1a1a4e', bold: true
    });
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// §27. 레벨 실패 화면
// ═══════════════════════════════════════════════════════════════════════
function renderLevelFail(ctx, w, h) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  // 비네트 효과
  const vigGrad = ctx.createRadialGradient(w / 2, h / 2, h * 0.2, w / 2, h / 2, h * 0.7);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('fail'), w / 2, h * 0.22, {
    size: 36, color: '#e63946', bold: true
  });
  UI.text(ctx, `${t('level')} ${currentLevel.id}`, w / 2, h * 0.32, {
    size: 18, color: '#8080a0'
  });
  UI.text(ctx, `${t('score')}: ${score.toLocaleString()}`, w / 2, h * 0.42, {
    size: 18, color: '#e0e0f0'
  });

  // 재시도 버튼
  const btnW = MathUtil.clamp(w * 0.45, MIN_TOUCH * 3, 200);
  const btnH = Math.max(MIN_TOUCH, 50);
  const btnX = w / 2 - btnW / 2;
  const retryY = h * 0.55;
  const hoverR = UI.hitTest(input.mouseX, input.mouseY, btnX, retryY, btnW, btnH);

  ctx.fillStyle = hoverR ? '#4488cc' : '#336699';
  ctx.beginPath();
  ctx.roundRect(btnX, retryY, btnW, btnH, 10);
  ctx.fill();
  UI.text(ctx, `${t('retry')} (R)`, w / 2, retryY + btnH / 2, {
    size: 16, color: '#fff', bold: true
  });

  // 나가기 버튼
  const quitY = h * 0.70;
  const hoverQ = UI.hitTest(input.mouseX, input.mouseY, btnX, quitY, btnW, btnH);
  ctx.fillStyle = hoverQ ? '#444' : '#333';
  ctx.beginPath();
  ctx.roundRect(btnX, quitY, btnW, btnH, 10);
  ctx.fill();
  UI.text(ctx, t('quit'), w / 2, quitY + btnH / 2, {
    size: 16, color: '#aaa'
  });

  // 하단 안내
  UI.text(ctx, t('rToRetry'), w / 2, h * 0.88, { size: 11, color: '#505070' });
}

// ═══════════════════════════════════════════════════════════════════════
// §28. 일시정지 오버레이
// ═══════════════════════════════════════════════════════════════════════
function renderPauseOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('pause'), w / 2, h * 0.32, {
    size: 36, color: '#ffd700', bold: true
  });

  const bw = 180, bh = 50;
  const cx = w / 2;

  // Resume
  const h1 = UI.hitTest(input.mouseX, input.mouseY, cx - bw / 2, h / 2 - 40, bw, bh);
  ctx.fillStyle = h1 ? '#4488cc' : '#336699';
  ctx.beginPath();
  ctx.roundRect(cx - bw / 2, h / 2 - 40, bw, bh, 10);
  ctx.fill();
  UI.text(ctx, t('resume'), cx, h / 2 - 15, { size: 16, color: '#fff', bold: true });

  // Quit
  const h2 = UI.hitTest(input.mouseX, input.mouseY, cx - bw / 2, h / 2 + 30, bw, bh);
  ctx.fillStyle = h2 ? '#444' : '#333';
  ctx.beginPath();
  ctx.roundRect(cx - bw / 2, h / 2 + 30, bw, bh, 10);
  ctx.fill();
  UI.text(ctx, t('quit'), cx, h / 2 + 55, { size: 16, color: '#aaa' });

  // 안내
  UI.text(ctx, `ESC / SPACE: ${t('resume')}`, cx, h * 0.82, { size: 11, color: '#505070' });
}

// ═══════════════════════════════════════════════════════════════════════
// §29. 팝업 렌더링 (콤보/스코어/플로팅 텍스트)
// ═══════════════════════════════════════════════════════════════════════
function renderPopups(ctx) {
  // 매치 폭발 이펙트 (effectMatchBurst 에셋)
  const burstSprite = assets.sprites.effectMatchBurst;
  if (burstSprite) {
    for (const e of matchBurstEffects) {
      const progress = e.timer / e.maxTimer;
      const scale = 0.5 + progress * 0.8;
      const alpha = Math.max(0, 1 - progress * 1.5);
      const sz = e.size * scale;
      ctx.globalAlpha = alpha;
      ctx.drawImage(burstSprite, e.x - sz / 2, e.y - sz / 2, sz, sz);
    }
    ctx.globalAlpha = 1;
  }

  // 콤보 팝업 (effectComboText 에셋 병용)
  const comboSprite = assets.sprites.effectComboText;
  for (const p of comboPopups) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.scale(p.scale, p.scale);
    ctx.translate(-p.x, -p.y);
    // 에셋이 있으면 텍스트 뒤에 콤보 이펙트 이미지 배경 표시
    if (comboSprite) {
      const cw = 160 * p.scale;
      const ch = 80 * p.scale;
      ctx.drawImage(comboSprite, p.x - cw / 2, p.y - ch / 2, cw, ch);
    }
    UI.text(ctx, p.text, p.x, p.y, {
      size: 30, color: '#ffd700', bold: true, glow: '#ffd700'
    });
    ctx.restore();
  }

  // 스코어 팝업
  for (const p of scorePopups) {
    const progress = p.timer / p.maxTimer;
    ctx.globalAlpha = Math.max(0, 1 - progress * 1.2);
    UI.text(ctx, `+${p.value}`, p.x, p.y, {
      size: 13, color: '#ffd700', bold: true
    });
  }

  // 일반 플로팅 텍스트
  for (const f of floatTexts) {
    const progress = f.timer / f.maxTimer;
    ctx.globalAlpha = Math.max(0, 1 - progress);
    UI.text(ctx, f.text, f.x, f.y, {
      size: f.size || 16, color: f.color || '#ffd700', bold: true
    });
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════════════
// §30. 배경 장식 렌더링 시스템
// ═══════════════════════════════════════════════════════════════════════

/** 별 배경 (타이틀/완료 화면 용) */
function renderStarfield(ctx, w, h, time, density) {
  const starCount = density || 30;
  for (let i = 0; i < starCount; i++) {
    // 시드 기반 고정 위치 (매 프레임 동일)
    const seed = i * 7919 + 1013;
    const sx = ((seed * 13) % 10000) / 10000 * w;
    const sy = ((seed * 17) % 10000) / 10000 * h;
    const baseSize = ((seed * 23) % 100) / 100 * 2 + 0.5;
    const twinkle = Math.sin(time * 0.003 + i * 1.3) * 0.5 + 0.5;
    const size = baseSize * (0.5 + twinkle * 0.5);
    const alpha = 0.2 + twinkle * 0.4;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = i % 5 === 0 ? '#ffd700' : '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/** 떨어지는 보석 배경 (타이틀 장식) */
function renderFallingGems(ctx, w, h, time) {
  const gemCount = 8;
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < gemCount; i++) {
    const seed = i * 3571 + 997;
    const baseX = ((seed * 13) % 10000) / 10000 * w;
    const speed = 20 + ((seed * 7) % 40);
    const phase = (seed * 11) % 10000;
    const y = ((time * speed / 1000 + phase) % (h + 100)) - 50;
    const x = baseX + Math.sin(time * 0.001 + i * 2) * 30;
    const rotation = time * 0.002 + i;
    const gemIdx = i % 6;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    const gemS = 25 + (i % 3) * 8;

    const ak = GEM_ASSET_MAP[GEM_COLORS[gemIdx]];
    if (assets.sprites[ak]) {
      ctx.drawImage(assets.sprites[ak], -gemS / 2, -gemS / 2, gemS, gemS);
    } else {
      ctx.fillStyle = GEM_HEX[GEM_COLORS[gemIdx]];
      ctx.beginPath();
      ctx.arc(0, 0, gemS * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/** 플레이 화면 배경 디테일 (촛불 깜빡임 등) */
function renderPlayBgDetails(ctx, w, h, time) {
  // 촛불 효과 (그리드 좌우)
  const candlePositions = [
    { x: gridX - 25, y: gridY + gridH * 0.3 },
    { x: gridX + gridW + 15, y: gridY + gridH * 0.3 },
    { x: gridX - 25, y: gridY + gridH * 0.7 },
    { x: gridX + gridW + 15, y: gridY + gridH * 0.7 }
  ];

  for (const pos of candlePositions) {
    if (pos.x < 5 || pos.x > w - 5) continue; // 화면 밖

    // 촛불 불꽃
    const flicker = 0.6 + Math.random() * 0.4;
    const size = 6 + Math.sin(time * 0.01 + pos.x) * 2;
    const glowGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * 4);
    glowGrad.addColorStop(0, `rgba(255, 200, 50, ${0.3 * flicker})`);
    glowGrad.addColorStop(0.5, `rgba(255, 150, 0, ${0.15 * flicker})`);
    glowGrad.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(pos.x - size * 4, pos.y - size * 4, size * 8, size * 8);

    // 불꽃 중심
    ctx.fillStyle = `rgba(255, 230, 100, ${flicker})`;
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y - 2, size * 0.4, size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

/** 콤보 카운터 디스플레이 (화면 좌상단) */
function renderComboCounter(ctx, w, h) {
  if (comboCount < 2) return;
  const cx = gridX + gridW + 20;
  const cy = gridY + 30;
  if (cx > w - 40) return; // 공간 부족

  const pulse = 0.8 + 0.2 * Math.sin(performance.now() * 0.008);
  ctx.save();
  ctx.globalAlpha = 0.9;

  // 배경
  ctx.fillStyle = 'rgba(255, 100, 0, 0.3)';
  ctx.beginPath();
  ctx.arc(cx, cy, 22 * pulse, 0, Math.PI * 2);
  ctx.fill();

  // 텍스트
  UI.text(ctx, `×${comboCount}`, cx, cy - 4, {
    size: 16, color: '#ff6600', bold: true
  });
  UI.text(ctx, 'COMBO', cx, cy + 12, {
    size: 8, color: '#ff8800'
  });

  ctx.restore();
}

/** 레벨 완료 — 목표 달성 체크마크 애니메이션 */
function renderGoalChecks(ctx, w, h) {
  if (state !== STATE.LEVEL_COMPLETE) return;
  if (!currentLevel) return;

  const baseY = h * 0.80;
  const goalCount = currentLevel.goals.length;
  const spacing = Math.min(w / (goalCount + 1), 120);
  const startX = w / 2 - (goalCount - 1) * spacing / 2;

  for (let i = 0; i < goalCount; i++) {
    const goal = currentLevel.goals[i];
    const gx = startX + i * spacing;
    const gy = baseY;
    const showDelay = 500 + i * 200;
    const show = levelStarAnim.timer > showDelay;

    if (!show) continue;

    const t2 = MathUtil.clamp((levelStarAnim.timer - showDelay) / 300, 0, 1);
    ctx.globalAlpha = t2;

    // 아이콘
    let icon = '✅';
    if (goal.type === 'score') icon = '🏆';
    else if (goal.type === 'collect') icon = '💎';
    else if (goal.type === 'obstacle') {
      icon = goal.target === 'ice' ? '❄️' : goal.target === 'crate' ? '📦' : '⛓️';
    }

    UI.text(ctx, icon, gx, gy, { size: 18 });
    UI.text(ctx, '✓', gx + 12, gy - 8, { size: 12, color: '#00ff87', bold: true });
  }
  ctx.globalAlpha = 1;
}

/** 캐슬 맵 — 캐슬 건물 시각화 */
function renderCastleBuilding(ctx, w, h) {
  const baseX = w * 0.65;
  const baseY = h * 0.3 - castleScrollY * 0.1;
  const s = Math.min(w * 0.15, 60);

  // 단순화된 캐슬 시루엣
  ctx.fillStyle = 'rgba(200, 180, 140, 0.4)';

  // 기초
  ctx.fillRect(baseX - s, baseY, s * 2, s * 0.8);

  // 탑 (해금 수에 따라)
  if (saveData.unlockedZones >= 2) {
    ctx.fillRect(baseX - s * 0.3, baseY - s * 0.6, s * 0.6, s * 0.6);
  }
  if (saveData.unlockedZones >= 3) {
    ctx.fillRect(baseX - s * 0.15, baseY - s * 1.2, s * 0.3, s * 0.6);
    // 깃발
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.moveTo(baseX, baseY - s * 1.2);
    ctx.lineTo(baseX + s * 0.2, baseY - s * 1.4);
    ctx.lineTo(baseX, baseY - s * 1.6);
    ctx.fill();
  }
  if (saveData.unlockedZones >= 4) {
    // 왕좌 장식
    ctx.fillStyle = '#9b5de5';
    ctx.beginPath();
    ctx.arc(baseX, baseY - s * 1.6, s * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
  if (saveData.unlockedZones >= 5) {
    // 왕관
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(baseX - s * 0.15, baseY - s * 1.7);
    ctx.lineTo(baseX - s * 0.1, baseY - s * 2);
    ctx.lineTo(baseX, baseY - s * 1.8);
    ctx.lineTo(baseX + s * 0.1, baseY - s * 2);
    ctx.lineTo(baseX + s * 0.15, baseY - s * 1.7);
    ctx.fill();
  }

  // 정원 (해금 시 녹색)
  if (saveData.unlockedZones >= 1) {
    ctx.fillStyle = 'rgba(42, 157, 143, 0.4)';
    ctx.beginPath();
    ctx.arc(baseX - s * 0.8, baseY + s * 0.6, s * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(baseX + s * 0.8, baseY + s * 0.6, s * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
}

/** 에셋 로딩 화면 */
function renderLoadingScreen(ctx, w, h, progress) {
  ctx.fillStyle = '#1a1a4e';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, t('loading'), w / 2, h / 2 - 20, {
    size: 20, color: '#ffd700', bold: true
  });

  // 로딩 바
  const barW = w * 0.5;
  const barH = 8;
  const barX = (w - barW) / 2;
  const barY = h / 2 + 10;
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 4);
  ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * progress, barH, 4);
  ctx.fill();

  // 보석 아이콘 회전
  const gemIdx = Math.floor(performance.now() / 200) % 6;
  const hex = GEM_HEX[GEM_COLORS[gemIdx]];
  ctx.fillStyle = hex;
  ctx.beginPath();
  ctx.arc(w / 2, h / 2 + 40, 6, 0, Math.PI * 2);
  ctx.fill();
}

/** 캐슬맵에서 레벨 경로 곡선 렌더링 */
function renderLevelPath(ctx, w, h) {
  if (LEVELS.length < 2) return;

  ctx.save();
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 6]);

  ctx.beginPath();
  const first = getLevelNodePos(0);
  ctx.moveTo(first.x, first.y - castleScrollY);

  for (let i = 1; i < LEVELS.length; i++) {
    const pos = getLevelNodePos(i);
    const ny = pos.y - castleScrollY;
    if (ny < -100 || ny > h + 100) continue;
    ctx.lineTo(pos.x, ny);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

/** 결과 화면 보석 분수 이펙트 */
function renderGemFountain(ctx, w, h, time) {
  const count = 6;
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < count; i++) {
    const angle = (time * 0.002 + i * Math.PI * 2 / count) % (Math.PI * 2);
    const radius = 60 + Math.sin(time * 0.003 + i) * 20;
    const gx = w / 2 + Math.cos(angle) * radius;
    const gy = h * 0.35 + Math.sin(angle) * radius * 0.3;
    const gemIdx = i % 6;
    const ak = GEM_ASSET_MAP[GEM_COLORS[gemIdx]];
    const gs = 20;

    if (assets.sprites[ak]) {
      ctx.drawImage(assets.sprites[ak], gx - gs / 2, gy - gs / 2, gs, gs);
    } else {
      ctx.fillStyle = GEM_HEX[GEM_COLORS[gemIdx]];
      ctx.beginPath();
      ctx.arc(gx, gy, gs * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

/** DDA 인디케이터 (디버그/UI용) */
function renderDDAIndicator(ctx, w, h) {
  if (!currentLevel) return;
  const fails = saveData.failStreak[currentLevel.id] || 0;
  if (fails < 3) return;

  // DDA 활성 표시 (미묘한 하트 아이콘)
  ctx.globalAlpha = 0.6;
  UI.text(ctx, '💝', gridX + gridW + 5, gridY + gridH - 15, { size: 12 });
  ctx.globalAlpha = 1;
}

/** 게임 통계 표시 (타이틀 화면 하단) */
function renderGameStats(ctx, w, h) {
  const totalStars = (saveData.stars || []).reduce((a, b) => (a || 0) + (b || 0), 0);
  const maxStars = LEVELS.length * 3;
  const clearedLevels = (saveData.stars || []).filter(s => s && s > 0).length;

  if (clearedLevels === 0) return;

  const statsY = h * 0.86;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(w * 0.15, statsY - 12, w * 0.7, 30, 8);
  ctx.fill();

  UI.text(ctx, `★ ${totalStars}/${maxStars}  |  📋 ${clearedLevels}/${LEVELS.length}  |  CP: ${saveData.castleCP}`,
    w / 2, statsY + 3, { size: 10, color: '#8080a0' });
}

// ═══════════════════════════════════════════════════════════════════════
// §31. 초기화 (에셋 로드 + 엔진 시작)
// ═══════════════════════════════════════════════════════════════════════
async function init() {
  W = engine.W;
  H = engine.H;
  recalcGrid();

  // manifest.json에서 에셋 동적 로드 (F11)
  try {
    const manifest = await fetch('assets/manifest.json').then(r => r.json()).catch(() => null);
    if (manifest && manifest.assets) {
      const assetMap = {};
      for (const [key, info] of Object.entries(manifest.assets)) {
        assetMap[key] = 'assets/' + info.file;
      }
      await assets.load(assetMap);
      assetsLoaded = true;
    }
  } catch (e) {
    console.warn('[RGC] Asset load failed, using Canvas fallbacks');
    assetsLoaded = false;
  }

  // 세이브 로드
  loadSave();
  updateCastleZones();

  // 타이틀 페이드 인
  _fadeObj = { a: 1 };
  tween.add(_fadeObj, { a: 0 }, 600, 'easeOut');

  // 엔진 시작!
  engine.start();
}

init();
</script>
</body>
</html>
