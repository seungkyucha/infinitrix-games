// ═══════════════════════════════════════════════════════════════════════
// §6. 안전한 상태 전환 시스템 (F4, F6, F12 해결)
// — setTimeout/setInterval 사용 0건
// — 모든 상태 전환은 TRANSITION_TABLE 검증 경유
// ═══════════════════════════════════════════════════════════════════════

/**
 * 안전한 상태 전환: TRANSITION_TABLE 검증 + 페이드 IN/OUT
 * @param {number} to - 목표 상태
 * @param {Function} onMid - 페이드 중간(화면 검정) 시 실행할 콜백
 * @returns {boolean} 전환 성공 여부
 */
function doTransition(to, onMid) {
  // 이미 전환 중이면 무시
  if (transitioning) return false;
  // TRANSITION_TABLE 검증
  const allowed = TRANSITION_TABLE[state];
  if (!allowed || !allowed.includes(to)) {
    console.warn(`[RGC] Invalid transition: ${state} → ${to}`);
    return false;
  }
  transitioning = true;

  // 페이드 아웃 (0 → 1)
  _fadeObj = { a: 0 };
  tween.add(_fadeObj, { a: 1 }, ANIM.FADE_DUR, 'easeIn', () => {
    // 화면 완전 검정 — 상태 전환 실행
    if (onMid) onMid();
    state = to;
    // 페이드 인 (1 → 0)
    _fadeObj = { a: 1 };
    tween.add(_fadeObj, { a: 0 }, ANIM.FADE_DUR, 'easeOut', () => {
      transitioning = false;
    });
  });
  return true;
}

/**
 * 직접 상태 전환 (페이드 없이, 일시정지 해제 등)
 * TRANSITION_TABLE 검증은 유지
 */
function directTransition(to) {
  const allowed = TRANSITION_TABLE[state];
  if (!allowed || !allowed.includes(to)) {
    console.warn(`[RGC] Invalid direct transition: ${state} → ${to}`);
    return false;
  }
  state = to;
  return true;
}

// §7. 세이브/로드 시스템
// ═══════════════════════════════════════════════════════════════════════

/** 세이브 데이터 불러오기 */
function loadSave() {
  const data = Save.get(SAVE_KEY);
  if (data) {
    // 기존 데이터와 병합 (새 필드 추가 대응)
    saveData = {
      ...saveData,
      ...data,
      boosters: { ...saveData.boosters, ...(data.boosters || {}) },
      failStreak: { ...saveData.failStreak, ...(data.failStreak || {}) }
    };
    boosters = { ...saveData.boosters };
  }
}

/** 세이브 데이터 저장 */
function saveSave() {
  saveData.boosters = { ...boosters };
  Save.set(SAVE_KEY, saveData);
}

// ═══════════════════════════════════════════════════════════════════════
// §8. 그리드/보드 로직
// ═══════════════════════════════════════════════════════════════════════

/** 보드 셀 생성 */
function makeCell(colorIdx, r, c) {
  return {
    color: colorIdx,         // 0~5 (GEM_COLORS 인덱스) 또는 -1 (비어있음)
    special: SPECIAL.NONE,
    obsType: OBS.NONE,
    obsHp: 0,
    renderX: gridX + c * cellSize,
    renderY: gridY + r * cellSize,
    alpha: 1,
    scale: 1,
    removing: false,
    sparkle: 0              // 반짝임 효과 타이머
  };
}

/** 레벨에 맞는 랜덤 보석 색 생성 (DDA 가중치 포함) */
function randColor(numColors, exclude) {
  const ddaActive = currentLevel && applyDDA();
  let c;
  let attempts = 0;
  do {
    if (ddaActive && Math.random() < 0.2 && currentLevel.goals) {
      // DDA: 목표 색 보석을 20% 확률로 가중
      const collectGoal = currentLevel.goals.find(g => g.type === 'collect');
      if (collectGoal) {
        const targetIdx = GEM_COLORS.indexOf(collectGoal.color);
        if (targetIdx >= 0 && targetIdx < numColors && targetIdx !== exclude) {
          return targetIdx;
        }
      }
    }
    c = MathUtil.randInt(0, numColors - 1);
    attempts++;
  } while (c === exclude && attempts < 20);
  return c;
}

/**
 * 초기 보드 생성 (F10: 3매치 없음 + 유효 이동 1개+ 검증)
 * 최대 100회 시도
 */
function generateBoard(level) {
  const nc = level.colors;

  for (let attempt = 0; attempt < 100; attempt++) {
    // 빈 보드 생성
    board = [];
    for (let r = 0; r < ROWS; r++) {
      board[r] = [];
      for (let c = 0; c < COLS; c++) {
        board[r][c] = makeCell(MathUtil.randInt(0, nc - 1), r, c);
      }
    }

    // 3매치 제거 루프 (최대 50회 패스)
    let fixed = true;
    for (let pass = 0; pass < 50; pass++) {
      fixed = true;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          // 가로 3연속 검출
          if (c >= 2 &&
            board[r][c].color === board[r][c - 1].color &&
            board[r][c].color === board[r][c - 2].color &&
            board[r][c].color >= 0) {
            board[r][c].color = randColor(nc, board[r][c].color);
            fixed = false;
          }
          // 세로 3연속 검출
          if (r >= 2 &&
            board[r][c].color === board[r - 1][c].color &&
            board[r][c].color === board[r - 2][c].color &&
            board[r][c].color >= 0) {
            board[r][c].color = randColor(nc, board[r][c].color);
            fixed = false;
          }
        }
      }
      if (fixed) break;
    }

    // 장애물 배치
    placeObstacles(level);

    // 유효 이동 1개 이상 검증
    if (countValidMoves() >= 1) {
      // 성공! 렌더 좌표 초기화
      updateCellPositions(false);
      return;
    }
  }

  // 100회 실패 시 안전 보드 (줄무늬 패턴)
  console.warn('[RGC] Board generation failed after 100 attempts, using safe pattern');
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = makeCell((r + c) % level.colors, r, c);
    }
  }
  placeObstacles(level);
  updateCellPositions(false);
}

/** 장애물 배치 */
function placeObstacles(level) {
  if (!level.obstacles) return;
  const obsMap = { ice: OBS.ICE, crate: OBS.CRATE, chain: OBS.CHAIN };
  for (const obs of level.obstacles) {
    const ot = obsMap[obs.type] || OBS.NONE;
    for (const [r, c] of obs.positions) {
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        board[r][c].obsType = ot;
        board[r][c].obsHp = obs.hp;
      }
    }
  }
}

/** 모든 셀의 렌더 좌표 갱신 */
function updateCellPositions(animate) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const targetX = gridX + c * cellSize;
      const targetY = gridY + r * cellSize;
      if (animate) {
        const dx = Math.abs(board[r][c].renderX - targetX);
        const dy = Math.abs(board[r][c].renderY - targetY);
        if (dx > 1 || dy > 1) {
          const dist = Math.max(dx, dy);
          const dur = MathUtil.clamp(dist * 0.8, 150, 500);
          tween.add(board[r][c], { renderX: targetX, renderY: targetY }, dur, 'easeOut');
        } else {
          board[r][c].renderX = targetX;
          board[r][c].renderY = targetY;
        }
      } else {
        board[r][c].renderX = targetX;
        board[r][c].renderY = targetY;
      }
    }
  }
}

/** 스왑 가능 여부 체크 */
function canSwap(r1, c1, r2, c2) {
  if (r1 < 0 || r1 >= ROWS || c1 < 0 || c1 >= COLS) return false;
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return false;
  const a = board[r1][c1];
  const b = board[r2][c2];
  // 상자는 스왑 불가
  if (a.obsType === OBS.CRATE || b.obsType === OBS.CRATE) return false;
  // 빈 셀 불가
  if (a.color === -1 || b.color === -1) return false;
  // 무지개는 아무거나 OK
  if (a.special === SPECIAL.RAINBOW || b.special === SPECIAL.RAINBOW) return true;
  return true;
}

/** 색상/스페셜 교환 (로직용) */
function swapCellData(r1, c1, r2, c2) {
  const a = board[r1][c1];
  const b = board[r2][c2];
  const tc = a.color; a.color = b.color; b.color = tc;
  const ts = a.special; a.special = b.special; b.special = ts;
}

/** 유효 이동 수 계산 (최소 1개 찾으면 조기 반환) */
function countValidMoves() {
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // 오른쪽 스왑
      if (c < COLS - 1 && canSwap(r, c, r, c + 1)) {
        swapCellData(r, c, r, c + 1);
        if (findAllMatches().length > 0) count++;
        swapCellData(r, c, r, c + 1);
        if (count > 0) return count;
      }
      // 아래 스왑
      if (r < ROWS - 1 && canSwap(r, c, r + 1, c)) {
        swapCellData(r, c, r + 1, c);
        if (findAllMatches().length > 0) count++;
        swapCellData(r, c, r + 1, c);
        if (count > 0) return count;
      }
    }
  }
  return count;
}

/** 힌트 이동 찾기 (첫 유효 이동 1개) */
function findHintMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c < COLS - 1 && canSwap(r, c, r, c + 1)) {
        swapCellData(r, c, r, c + 1);
        const valid = findAllMatches().length > 0;
        swapCellData(r, c, r, c + 1);
        if (valid) return [{ r, c }, { r, c: c + 1 }];
      }
      if (r < ROWS - 1 && canSwap(r, c, r + 1, c)) {
        swapCellData(r, c, r + 1, c);
        const valid = findAllMatches().length > 0;
        swapCellData(r, c, r + 1, c);
        if (valid) return [{ r, c }, { r: r + 1, c }];
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════
// §9. 매치 검출 시스템 (F9: 우선순위 기반)
// 5매치(P1) → T/L자(P2) → 4매치(P4) → 3매치(P5)
// ═══════════════════════════════════════════════════════════════════════

/**
 * 모든 매치 찾기 (우선순위 순으로 소비)
 * @returns {Array} 매치 리스트 [{type, cells, center, priority, scoreType, color, special}]
 */
function findAllMatches() {
  // 가로 연속 세그먼트 수집
  const hRuns = [];
  for (let r = 0; r < ROWS; r++) {
    let start = 0;
    for (let c = 1; c <= COLS; c++) {
      const sameColor = c < COLS &&
        board[r][c].color === board[r][start].color &&
        board[r][c].color >= 0 &&
        board[r][c].obsType !== OBS.CRATE &&
        board[r][start].obsType !== OBS.CRATE;
      if (!sameColor) {
        const len = c - start;
        if (len >= 3 && board[r][start].color >= 0) {
          const cells = [];
          for (let i = start; i < c; i++) cells.push({ r, c: i });
          hRuns.push({ cells, dir: 'h', len, color: board[r][start].color });
        }
        start = c;
      }
    }
  }

  // 세로 연속 세그먼트 수집
  const vRuns = [];
  for (let c = 0; c < COLS; c++) {
    let start = 0;
    for (let r = 1; r <= ROWS; r++) {
      const sameColor = r < ROWS &&
        board[r][c].color === board[start][c].color &&
        board[r][c].color >= 0 &&
        board[r][c].obsType !== OBS.CRATE &&
        board[start][c].obsType !== OBS.CRATE;
      if (!sameColor) {
        const len = r - start;
        if (len >= 3 && board[start][c].color >= 0) {
          const cells = [];
          for (let i = start; i < r; i++) cells.push({ r: i, c });
          vRuns.push({ cells, dir: 'v', len, color: board[start][c].color });
        }
        start = r;
      }
    }
  }

  // 5매치 수집 (P1)
  const fiveMatches = [];
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len >= 5) {
      const mid = Math.floor(run.cells.length / 2);
      fiveMatches.push({
        type: 'five',
        cells: run.cells.slice(),
        center: run.cells[mid],
        priority: 1,
        scoreType: '5',
        color: run.color,
        special: SPECIAL.RAINBOW
      });
    }
  }

  // T/L자 교차 검출 (P2/P3)
  const crossMatches = [];
  for (let i = 0; i < hRuns.length; i++) {
    for (let j = 0; j < vRuns.length; j++) {
      if (hRuns[i].color !== vRuns[j].color) continue;
      // 교차점 찾기
      const shared = hRuns[i].cells.find(a =>
        vRuns[j].cells.some(b => a.r === b.r && a.c === b.c)
      );
      if (!shared) continue;
      if (hRuns[i].len < 3 || vRuns[j].len < 3) continue;

      // 셀 병합 (중복 제거)
      const cellMap = new Map();
      for (const cell of hRuns[i].cells) cellMap.set(`${cell.r},${cell.c}`, cell);
      for (const cell of vRuns[j].cells) cellMap.set(`${cell.r},${cell.c}`, cell);
      const combined = [...cellMap.values()];

      if (combined.length >= 5) {
        crossMatches.push({
          type: 'cross',
          cells: combined,
          center: shared,
          priority: 2,
          scoreType: 'T',
          color: hRuns[i].color,
          special: SPECIAL.BOMB
        });
      }
    }
  }

  // 4매치 수집 (P4)
  const fourMatches = [];
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len === 4) {
      // 줄 파괴 방향: 매치 직교
      const lineDir = run.dir === 'h' ? SPECIAL.LINE_V : SPECIAL.LINE_H;
      fourMatches.push({
        type: 'four',
        cells: run.cells.slice(),
        center: run.cells[1],
        priority: 4,
        scoreType: '4',
        color: run.color,
        special: lineDir
      });
    }
  }

  // 3매치 수집 (P5)
  const threeMatches = [];
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len === 3) {
      threeMatches.push({
        type: 'three',
        cells: run.cells.slice(),
        center: run.cells[1],
        priority: 5,
        scoreType: '3',
        color: run.color,
        special: SPECIAL.NONE
      });
    }
  }

  // 우선순위 순 정렬 → 소비된 셀 추적
  const allCandidates = [...fiveMatches, ...crossMatches, ...fourMatches, ...threeMatches];
  allCandidates.sort((a, b) => a.priority - b.priority);

  const used = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const result = [];

  for (const match of allCandidates) {
    // 모든 셀이 미소비인지 확인
    if (match.cells.every(c => !used[c.r][c.c])) {
      // 셀 소비 표시
      for (const c of match.cells) used[c.r][c.c] = true;
      result.push(match);
    }
  }

  return result;
}

// ═══════════════════════════════════════════════════════════════════════
// §10. 스페셜 보석 효과 & 조합
// ═══════════════════════════════════════════════════════════════════════

/** 스페셜+스페셜 조합 해결 (스왑 시 양쪽 다 스페셜인 경우) */
function resolveSpecialCombo(r1, c1, r2, c2) {
  const s1 = board[r1][c1].special;
  const s2 = board[r2][c2].special;
  if (s1 === SPECIAL.NONE && s2 === SPECIAL.NONE) return false;

  // 유틸
  const isLine = s => s === SPECIAL.LINE_H || s === SPECIAL.LINE_V;
  const isBomb = s => s === SPECIAL.BOMB;
  const isRainbow = s => s === SPECIAL.RAINBOW;

  let affected = [];
  let handled = false;

  // ── 무지개 + 무지개 = 전체 클리어 ──
  if (isRainbow(s1) && isRainbow(s2)) {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c].color >= 0)
          affected.push({ r, c });
    finishSpecialExplosion(affected, r1, c1, 'ultimate');
    return true;
  }

  // ── 무지개 + 일반/스페셜 ──
  if (isRainbow(s1) || isRainbow(s2)) {
    const rr = isRainbow(s1) ? r1 : r2;
    const rc = isRainbow(s1) ? c1 : c2;
    const or = isRainbow(s1) ? r2 : r1;
    const oc = isRainbow(s1) ? c2 : c1;
    const targetColor = board[or][oc].color;
    const otherSpecial = board[or][oc].special;

    if (targetColor >= 0) {
      // 무지개 + 일반 = 해당 색 전부 제거
      if (otherSpecial === SPECIAL.NONE) {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (board[r][c].color === targetColor)
              affected.push({ r, c });
        affected.push({ r: rr, c: rc });
        finishSpecialExplosion(affected, rr, rc, 'rainbow');
        return true;
      }

      // 무지개 + 줄 파괴 = 해당 색 전부를 줄 파괴로 변환 후 발동
      if (isLine(otherSpecial)) {
        const targets = [];
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (board[r][c].color === targetColor)
              targets.push({ r, c });
        // 무지개 제거
        board[rr][rc].color = -1;
        board[rr][rc].special = SPECIAL.NONE;
        board[or][oc].color = -1;
        board[or][oc].special = SPECIAL.NONE;
        // 각 타겟을 줄 파괴로 변환 후 발동
        for (const tgt of targets) {
          board[tgt.r][tgt.c].special = Math.random() < 0.5 ? SPECIAL.LINE_H : SPECIAL.LINE_V;
          const extra = activateSpecial(tgt.r, tgt.c);
          for (const e of extra) affected.push(e);
        }
        finishSpecialExplosion(affected, rr, rc, 'rainbow-line');
        return true;
      }

      // 무지개 + 폭탄 = 해당 색 전부를 폭탄으로 변환 후 발동
      if (isBomb(otherSpecial)) {
        const targets = [];
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (board[r][c].color === targetColor)
              targets.push({ r, c });
        board[rr][rc].color = -1;
        board[rr][rc].special = SPECIAL.NONE;
        board[or][oc].color = -1;
        board[or][oc].special = SPECIAL.NONE;
        for (const tgt of targets) {
          board[tgt.r][tgt.c].special = SPECIAL.BOMB;
          const extra = activateSpecial(tgt.r, tgt.c);
          for (const e of extra) affected.push(e);
        }
        finishSpecialExplosion(affected, rr, rc, 'rainbow-bomb');
        return true;
      }
    }
    // 폴백: 전체 클리어
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c].color >= 0)
          affected.push({ r, c });
    finishSpecialExplosion(affected, rr, rc, 'rainbow');
    return true;
  }

  // ── 폭탄 + 폭탄 = 5×5 ──
  if (isBomb(s1) && isBomb(s2)) {
    const cr = Math.floor((r1 + r2) / 2);
    const cc = Math.floor((c1 + c2) / 2);
    for (let dr = -2; dr <= 2; dr++)
      for (let dc = -2; dc <= 2; dc++) {
        const nr = cr + dr, nc = cc + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS)
          affected.push({ r: nr, c: nc });
      }
    finishSpecialExplosion(affected, cr, cc, 'mega-bomb');
    return true;
  }

  // ── 줄 파괴 + 폭탄 = 5줄 십자 ──
  if ((isLine(s1) && isBomb(s2)) || (isBomb(s1) && isLine(s2))) {
    const cr = Math.floor((r1 + r2) / 2);
    const cc = Math.floor((c1 + c2) / 2);
    for (let dr = -1; dr <= 1; dr++)
      for (let c = 0; c < COLS; c++) {
        const nr = cr + dr;
        if (nr >= 0 && nr < ROWS)
          affected.push({ r: nr, c });
      }
    for (let dc = -1; dc <= 1; dc++)
      for (let r = 0; r < ROWS; r++) {
        const nc = cc + dc;
        if (nc >= 0 && nc < COLS)
          affected.push({ r, c: nc });
      }
    affected = deduplicateCells(affected);
    finishSpecialExplosion(affected, cr, cc, 'line-bomb');
    return true;
  }

  // ── 줄 파괴 + 줄 파괴 = 십자 2줄 ──
  if (isLine(s1) && isLine(s2)) {
    const cr = Math.floor((r1 + r2) / 2);
    const cc = Math.floor((c1 + c2) / 2);
    for (let c = 0; c < COLS; c++) affected.push({ r: cr, c });
    for (let r = 0; r < ROWS; r++) affected.push({ r, c: cc });
    affected = deduplicateCells(affected);
    finishSpecialExplosion(affected, cr, cc, 'cross-line');
    return true;
  }

  return false;
}

/** 셀 배열 중복 제거 */
function deduplicateCells(cells) {
  const map = new Map();
  for (const c of cells) map.set(`${c.r},${c.c}`, c);
  return [...map.values()];
}

/** 스페셜 폭발 마무리: 셀 제거 + 이펙트 */
function finishSpecialExplosion(cells, centerR, centerC, effectType) {
  let pts = 0;
  for (const { r, c } of cells) {
    if (board[r][c].color >= 0 || board[r][c].obsType !== OBS.NONE) {
      damageAdjacentObstacles(r, c);
      removeCell(r, c);
      pts += 50;
      // 파티클
      const px = gridX + c * cellSize + cellSize / 2;
      const py = gridY + r * cellSize + cellSize / 2;
      const hex = board[r][c].color >= 0 ? GEM_HEX[GEM_COLORS[board[r][c].color]] : '#ffd700';
      particles.emit(px, py, 3, { color: hex, speed: 120, life: 0.4, size: 4 });
    }
  }
  score += pts;
  trackGoal('score', null, pts);

  // 이펙트 강도 결정
  const intensity = effectType === 'ultimate' ? 12 :
                    effectType.includes('bomb') ? 8 :
                    effectType.includes('rainbow') ? 10 : 6;
  addShake(intensity, 400);
  playSound('special-activate');

  // 중앙 파티클
  const cpx = gridX + centerC * cellSize + cellSize / 2;
  const cpy = gridY + centerR * cellSize + cellSize / 2;
  particles.emit(cpx, cpy, 20, { color: '#ffd700', speed: 200, life: 0.6, size: 5 });

  // 스코어 팝업
  scorePopups.push({
    value: pts,
    x: cpx, y: cpy,
    timer: 0, maxTimer: 1000
  });
}

/** 스페셜 보석 단독 발동 (매칭 시) */
function activateSpecial(r, c) {
  const cell = board[r][c];
  if (cell.special === SPECIAL.NONE) return [];
  const affected = [];
  const spec = cell.special;
  cell.special = SPECIAL.NONE;

  if (spec === SPECIAL.LINE_H) {
    for (let cc = 0; cc < COLS; cc++) affected.push({ r, c: cc });
    emitLineEffect(r, c, 'h');
  } else if (spec === SPECIAL.LINE_V) {
    for (let rr = 0; rr < ROWS; rr++) affected.push({ r: rr, c });
    emitLineEffect(r, c, 'v');
  } else if (spec === SPECIAL.BOMB) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS)
          affected.push({ r: nr, c: nc });
      }
    emitBombEffect(r, c);
  } else if (spec === SPECIAL.RAINBOW) {
    // 보드에서 가장 많은 색 제거
    const counts = {};
    for (let rr = 0; rr < ROWS; rr++)
      for (let cc = 0; cc < COLS; cc++)
        if (board[rr][cc].color >= 0)
          counts[board[rr][cc].color] = (counts[board[rr][cc].color] || 0) + 1;
    let maxColor = 0, maxCount = 0;
    for (const [col, cnt] of Object.entries(counts)) {
      if (cnt > maxCount) { maxColor = parseInt(col); maxCount = cnt; }
    }
    for (let rr = 0; rr < ROWS; rr++)
      for (let cc = 0; cc < COLS; cc++)
        if (board[rr][cc].color === maxColor)
          affected.push({ r: rr, c: cc });
    affected.push({ r, c });
    emitRainbowEffect(r, c, GEM_HEX[GEM_COLORS[maxColor]]);
  }

  return affected;
}

/** 줄 파괴 이펙트 */
function emitLineEffect(r, c, dir) {
  const px = gridX + c * cellSize + cellSize / 2;
  const py = gridY + r * cellSize + cellSize / 2;
  if (dir === 'h') {
    particles.emit(px, py, 15, { color: '#ffd700', speed: 350, life: 0.3, size: 3, spread: 0.2, angle: 0 });
    particles.emit(px, py, 15, { color: '#ffd700', speed: 350, life: 0.3, size: 3, spread: 0.2, angle: Math.PI });
  } else {
    particles.emit(px, py, 15, { color: '#ffd700', speed: 350, life: 0.3, size: 3, spread: 0.2, angle: -Math.PI / 2 });
    particles.emit(px, py, 15, { color: '#ffd700', speed: 350, life: 0.3, size: 3, spread: 0.2, angle: Math.PI / 2 });
  }
  addShake(4, 200);
  playSound('special-activate');
}

/** 폭탄 이펙트 */
function emitBombEffect(r, c) {
  const px = gridX + c * cellSize + cellSize / 2;
  const py = gridY + r * cellSize + cellSize / 2;
  particles.emit(px, py, 25, { color: '#ff6600', speed: 220, life: 0.5, size: 5 });
  particles.emit(px, py, 12, { color: '#ffd700', speed: 160, life: 0.4, size: 3 });
  addShake(8, 350);
  playSound('special-activate');
}

/** 무지개 이펙트 */
function emitRainbowEffect(r, c, targetHex) {
  const px = gridX + c * cellSize + cellSize / 2;
  const py = gridY + r * cellSize + cellSize / 2;
  const rainbowColors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];
  for (const clr of rainbowColors) {
    particles.emit(px, py, 4, { color: clr, speed: 180, life: 0.6, size: 4 });
  }
  addShake(6, 300);
}

// ═══════════════════════════════════════════════════════════════════════
// §11. 캐스케이드 루프 엔진
// ═══════════════════════════════════════════════════════════════════════

/** 셀 제거 (장애물 타입별 처리) */
function removeCell(r, c) {
  const cell = board[r][c];
  if (cell.color === -1 && cell.obsType === OBS.NONE) return;

  // ── 체인: 해당 보석 매치 시 체인 해제 ──
  if (cell.obsType === OBS.CHAIN) {
    cell.obsHp--;
    if (cell.obsHp <= 0) {
      cell.obsType = OBS.NONE;
      cell.obsHp = 0;
      trackGoal('obstacle', 'chain', 1);
      playSound('match');
      emitObstacleBreak(r, c, '#888888');
    }
    // 보석도 같이 제거
    if (cell.color >= 0) {
      trackGoal('collect', GEM_COLORS[cell.color], 1);
    }
    cell.color = -1;
    cell.special = SPECIAL.NONE;
    return;
  }

  // ── 상자: HP 감소 (인접 매치) ──
  if (cell.obsType === OBS.CRATE) {
    // 상자는 damageAdjacentObstacles에서 처리
    return;
  }

  // ── 얼음: damageAdjacentObstacles에서 처리 ──
  if (cell.obsType === OBS.ICE) {
    // 얼음 위의 보석 제거
    if (cell.color >= 0) {
      trackGoal('collect', GEM_COLORS[cell.color], 1);
    }
    cell.color = -1;
    cell.special = SPECIAL.NONE;
    return;
  }

  // ── 일반 보석 제거 ──
  if (cell.color >= 0) {
    trackGoal('collect', GEM_COLORS[cell.color], 1);
  }
  cell.color = -1;
  cell.special = SPECIAL.NONE;
}

/** 인접 장애물에 데미지 */
function damageAdjacentObstacles(r, c) {
  const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
    const cell = board[nr][nc];

    if (cell.obsType === OBS.ICE && cell.obsHp > 0) {
      cell.obsHp--;
      if (cell.obsHp <= 0) {
        cell.obsType = OBS.NONE;
        cell.obsHp = 0;
        trackGoal('obstacle', 'ice', 1);
        emitObstacleBreak(nr, nc, '#87CEEB');
      }
    } else if (cell.obsType === OBS.CRATE && cell.obsHp > 0) {
      cell.obsHp--;
      if (cell.obsHp <= 0) {
        cell.obsType = OBS.NONE;
        cell.obsHp = 0;
        cell.color = -1; // 상자 제거 → 빈 칸
        trackGoal('obstacle', 'crate', 1);
        emitObstacleBreak(nr, nc, '#8B6914');
        playSound('hit');
      }
    }
  }
}

/** 장애물 파괴 이펙트 */
function emitObstacleBreak(r, c, color) {
  const px = gridX + c * cellSize + cellSize / 2;
  const py = gridY + r * cellSize + cellSize / 2;
  particles.emit(px, py, 8, { color, speed: 100, life: 0.5, size: 4 });
}

/** 매치 해결: 보석 제거 + 점수 계산 + 스페셜 생성 */
function resolveMatches(matches) {
  let totalScore = 0;
  const comboIdx = Math.min(comboCount, COMBO_MULT.length - 1);
  const mult = COMBO_MULT[comboIdx];

  for (const match of matches) {
    // 기본 점수
    const base = SCORE_BASE[match.scoreType] || SCORE_BASE['3'];
    const pts = Math.round(base * mult);
    totalScore += pts;

    // 점수 팝업
    const center = match.center;
    const px = gridX + center.c * cellSize + cellSize / 2;
    const py = gridY + center.r * cellSize + cellSize / 2;
    scorePopups.push({ value: pts, x: px, y: py, timer: 0, maxTimer: 900 });

    // 보석 제거 + 이펙트
    for (const cell of match.cells) {
      const gemColor = board[cell.r][cell.c].color;
      const hex = gemColor >= 0 ? GEM_HEX[GEM_COLORS[gemColor]] : '#fff';

      // 스페셜 보석이 매칭에 포함되면 발동
      if (board[cell.r][cell.c].special !== SPECIAL.NONE &&
          board[cell.r][cell.c].special !== match.special) {
        // 매치로 생성될 스페셜이 아닌, 기존 스페셜 발동
        const extra = activateSpecial(cell.r, cell.c);
        for (const e of extra) {
          if (e.r !== cell.r || e.c !== cell.c) {
            damageAdjacentObstacles(e.r, e.c);
            removeCell(e.r, e.c);
          }
        }
      }

      // 인접 장애물 데미지
      damageAdjacentObstacles(cell.r, cell.c);
      // 보석 제거
      removeCell(cell.r, cell.c);

      // 매치 파티클 + 폭발 이펙트 에셋
      const cpx = gridX + cell.c * cellSize + cellSize / 2;
      const cpy = gridY + cell.r * cellSize + cellSize / 2;
      particles.emit(cpx, cpy, 5, { color: hex, speed: 100, life: 0.4, size: 3 });
      // effectMatchBurst 에셋이 있으면 일시적 표시
      if (assets.sprites.effectMatchBurst) {
        matchBurstEffects.push({
          x: cpx, y: cpy, timer: 0, maxTimer: 400, size: cellSize * 1.3
        });
      }
    }

    // 스페셜 보석 생성 (매치 센터에)
    if (match.special !== SPECIAL.NONE) {
      const cr = match.center.r;
      const cc = match.center.c;
      board[cr][cc].color = match.color;
      board[cr][cc].special = match.special;
      board[cr][cc].scale = 0;
      tween.add(board[cr][cc], { scale: 1 }, 300, 'easeOut');
      // 스페셜 생성 이펙트
      const spx = gridX + cc * cellSize + cellSize / 2;
      const spy = gridY + cr * cellSize + cellSize / 2;
      particles.emit(spx, spy, 10, { color: '#ffd700', speed: 80, life: 0.5, size: 4 });
      playSound('match-special');
    }
  }

  score += totalScore;
  trackGoal('score', null, totalScore);
  return totalScore;
}

/** 중력: 빈 칸을 아래로 밀고 상단 리필 */
function applyGravity() {
  let maxDrop = 0;

  for (let c = 0; c < COLS; c++) {
    // 아래서 위로 스캔하며 빈 칸 채우기
    let writeRow = ROWS - 1;

    for (let r = ROWS - 1; r >= 0; r--) {
      // 상자는 이동 불가 — writeRow를 상자 위로 올림
      if (board[r][c].obsType === OBS.CRATE && board[r][c].obsHp > 0) {
        writeRow = r - 1;
        continue;
      }

      if (board[r][c].color !== -1) {
        if (r !== writeRow) {
          // 보석 데이터 이동
          board[writeRow][c].color = board[r][c].color;
          board[writeRow][c].special = board[r][c].special;
          // 장애물은 이동하지 않음 (얼음 등)
          if (board[r][c].obsType !== OBS.CRATE) {
            board[writeRow][c].obsType = board[r][c].obsType;
            board[writeRow][c].obsHp = board[r][c].obsHp;
            board[r][c].obsType = OBS.NONE;
            board[r][c].obsHp = 0;
          }
          board[r][c].color = -1;
          board[r][c].special = SPECIAL.NONE;

          const drop = writeRow - r;
          if (drop > maxDrop) maxDrop = drop;
        }
        writeRow--;
      }
    }

    // 상단 빈 칸 리필
    for (let r = writeRow; r >= 0; r--) {
      if (board[r][c].obsType === OBS.CRATE && board[r][c].obsHp > 0) continue;
      if (board[r][c].color === -1) {
        const nc = currentLevel ? currentLevel.colors : 6;
        board[r][c].color = randColor(nc);
        board[r][c].special = SPECIAL.NONE;
        // 위에서 떨어지는 시작 위치
        board[r][c].renderY = gridY - (writeRow - r + 2) * cellSize;
        const drop = writeRow - r + 2;
        if (drop > maxDrop) maxDrop = drop;
      }
    }
  }

  // 애니메이션 적용
  updateCellPositions(true);
  return maxDrop;
}

/** DDA 보정 확인 */
function applyDDA() {
  if (!currentLevel) return false;
  const fails = saveData.failStreak[currentLevel.id] || 0;
  return fails >= 3;
}

// ═══════════════════════════════════════════════════════════════════════
// §12. 목표 추적 시스템
// ═══════════════════════════════════════════════════════════════════════

/** 목표 진행도 초기화 */
function initGoalProgress() {
  goalProgress = {};
  for (const goal of currentLevel.goals) {
    const key = goalKey(goal);
    goalProgress[key] = 0;
  }
}

/** 목표 키 생성 */
function goalKey(goal) {
  if (goal.type === 'score') return 'score';
  if (goal.type === 'collect') return `collect_${goal.color}`;
  if (goal.type === 'obstacle') return `obstacle_${goal.target}`;
  return 'unknown';
}

/** 목표 진행 추적 */
function trackGoal(type, subtype, amount) {
  if (type === 'score') {
    if (goalProgress.score !== undefined) goalProgress.score = score;
  } else if (type === 'collect') {
    const key = `collect_${subtype}`;
    if (goalProgress[key] !== undefined) goalProgress[key] += amount;
  } else if (type === 'obstacle') {
    const key = `obstacle_${subtype}`;
    if (goalProgress[key] !== undefined) goalProgress[key] += amount;
  }
}

/** 모든 목표 달성 여부 */
function checkGoalsComplete() {
  for (const goal of currentLevel.goals) {
    const key = goalKey(goal);
    const current = goalProgress[key] || 0;
    const target = goal.type === 'score' ? goal.target : goal.count;
    if (current < target) return false;
  }
  return true;
}

/** 목표 진행률 (0~1) */
function goalProgressRatio(goal) {
  const key = goalKey(goal);
  const current = goalProgress[key] || 0;
  const target = goal.type === 'score' ? goal.target : goal.count;
  return MathUtil.clamp(current / target, 0, 1);
}

// — BGM은 tween 기반 타이머로 실행 (setInterval 미사용, F4 준수)
