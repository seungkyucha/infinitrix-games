<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4466;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#cc1133;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2255cc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44dd66;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22aa44;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="topaz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc22;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dd9900;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="amethyst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bb66ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8833cc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ccddff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#99bbff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="castle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8899bb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#445577;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="50" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="18" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="35" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="320" cy="20" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="370" cy="55" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="70" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="340" cy="75" r="1.2" fill="#fff" opacity="0.5"/>

  <!-- Castle silhouette in background -->
  <g opacity="0.25">
    <!-- Left tower -->
    <rect x="40" y="120" width="30" height="100" fill="url(#castle-grad)"/>
    <polygon points="35,120 55,85 75,120" fill="url(#castle-grad)"/>
    <!-- Wall -->
    <rect x="70" y="160" width="60" height="60" fill="url(#castle-grad)"/>
    <!-- Center tower -->
    <rect x="110" y="100" width="40" height="120" fill="url(#castle-grad)"/>
    <polygon points="105,100 130,60 155,100" fill="url(#castle-grad)"/>
    <!-- Right wall -->
    <rect x="150" y="160" width="50" height="60" fill="url(#castle-grad)"/>
    <!-- Right tower -->
    <rect x="180" y="130" width="25" height="90" fill="url(#castle-grad)"/>
    <polygon points="175,130 192,95 210,130" fill="url(#castle-grad)"/>
  </g>

  <!-- 3x3 gem grid (center focus) -->
  <!-- Row 1 -->
  <g filter="url(#glow)">
    <!-- Ruby - top left -->
    <polygon points="145,100 155,80 165,100 155,110" fill="url(#ruby)" stroke="#ff6688" stroke-width="1"/>
    <line x1="155" y1="82" x2="148" y2="98" stroke="#ff8899" stroke-width="0.5" opacity="0.6"/>
    <line x1="155" y1="82" x2="162" y2="98" stroke="#ff8899" stroke-width="0.5" opacity="0.6"/>
  </g>

  <g filter="url(#glow)">
    <!-- Diamond - top center -->
    <polygon points="195,100 205,78 215,100 205,112" fill="url(#diamond)" stroke="#ddeeff" stroke-width="1"/>
    <line x1="205" y1="80" x2="198" y2="98" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
    <line x1="205" y1="80" x2="212" y2="98" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
    <line x1="205" y1="88" x2="205" y2="108" stroke="#eef" stroke-width="0.5" opacity="0.4"/>
  </g>

  <g filter="url(#glow)">
    <!-- Emerald - top right -->
    <polygon points="245,100 255,80 265,100 255,110" fill="url(#emerald)" stroke="#66ee88" stroke-width="1"/>
    <line x1="255" y1="82" x2="248" y2="98" stroke="#88ffaa" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Row 2 -->
  <g filter="url(#glow)">
    <!-- Sapphire - mid left -->
    <polygon points="145,140 155,120 165,140 155,150" fill="url(#sapphire)" stroke="#6699ff" stroke-width="1"/>
    <line x1="155" y1="122" x2="148" y2="138" stroke="#88aaff" stroke-width="0.5" opacity="0.6"/>
  </g>

  <g filter="url(#glow)">
    <!-- Amethyst - center (featured, larger) -->
    <polygon points="190,145 205,115 220,145 205,160" fill="url(#amethyst)" stroke="#cc88ff" stroke-width="1.5"/>
    <line x1="205" y1="118" x2="194" y2="142" stroke="#dd99ff" stroke-width="0.7" opacity="0.6"/>
    <line x1="205" y1="118" x2="216" y2="142" stroke="#dd99ff" stroke-width="0.7" opacity="0.6"/>
    <line x1="205" y1="125" x2="205" y2="155" stroke="#cc88ff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <g filter="url(#glow)">
    <!-- Topaz - mid right -->
    <polygon points="245,140 255,120 265,140 255,150" fill="url(#topaz)" stroke="#ffdd44" stroke-width="1"/>
    <line x1="255" y1="122" x2="248" y2="138" stroke="#ffee66" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Row 3 -->
  <g filter="url(#glow)">
    <!-- Emerald - bottom left -->
    <polygon points="145,180 155,160 165,180 155,190" fill="url(#emerald)" stroke="#66ee88" stroke-width="1"/>
  </g>

  <g filter="url(#glow)">
    <!-- Ruby - bottom center -->
    <polygon points="195,180 205,160 215,180 205,190" fill="url(#ruby)" stroke="#ff6688" stroke-width="1"/>
  </g>

  <g filter="url(#glow)">
    <!-- Sapphire - bottom right -->
    <polygon points="245,180 255,160 265,180 255,190" fill="url(#sapphire)" stroke="#6699ff" stroke-width="1"/>
  </g>

  <!-- Match-3 highlight line (horizontal glow across row 2) -->
  <line x1="140" y1="137" x2="270" y2="137" stroke="#ffdd66" stroke-width="2" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Sparkle effects -->
  <g filter="url(#sparkle)">
    <polygon points="290,90 293,97 300,100 293,103 290,110 287,103 280,100 287,97" fill="#ffdd44" opacity="0.8"/>
  </g>
  <g filter="url(#sparkle)">
    <polygon points="120,130 122,134 126,136 122,138 120,142 118,138 114,136 118,134" fill="#88ccff" opacity="0.7"/>
  </g>
  <g filter="url(#sparkle)">
    <polygon points="310,160 312,164 316,166 312,168 310,172 308,168 304,166 308,164" fill="#ff88aa" opacity="0.6"/>
  </g>
  <g filter="url(#sparkle)">
    <polygon points="100,180 101.5,183 105,184 101.5,185 100,188 98.5,185 95,184 98.5,183" fill="#bb88ff" opacity="0.5"/>
  </g>

  <!-- Crown above center gem -->
  <g transform="translate(205,105)" opacity="0.9">
    <polygon points="-10,0 -8,-8 -4,-3 0,-10 4,-3 8,-8 10,0" fill="#ffcc22" stroke="#ddaa00" stroke-width="0.5"/>
    <circle cx="-6" cy="-5" r="1.5" fill="#ff4466"/>
    <circle cx="0" cy="-8" r="1.5" fill="#4488ff"/>
    <circle cx="6" cy="-5" r="1.5" fill="#44dd66"/>
  </g>

  <!-- Title text -->
  <text x="200" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffdd88" filter="url(#glow)">Royal Gem Chronicle</text>
  <text x="200" y="265" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#ccbbdd" opacity="0.9">로얄 젬 크로니클</text>

  <!-- Decorative bottom line -->
  <line x1="120" y1="278" x2="280" y2="278" stroke="#ffcc44" stroke-width="1" opacity="0.4"/>
  <circle cx="120" cy="278" r="2" fill="#ffcc44" opacity="0.6"/>
  <circle cx="200" cy="278" r="2" fill="#ffcc44" opacity="0.6"/>
  <circle cx="280" cy="278" r="2" fill="#ffcc44" opacity="0.6"/>
</svg>