<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="tree1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A2A"/>
      <stop offset="100%" stop-color="#0D1F15"/>
    </linearGradient>
    <linearGradient id="tree2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162E22"/>
      <stop offset="100%" stop-color="#0A1A10"/>
    </linearGradient>
    <linearGradient id="fogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B2CBF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1F2E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2A2F3E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A1F2E" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD60A" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="fgGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lanternFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Left tree cluster -->
  <g opacity="0.7">
    <!-- Tree 1 trunk -->
    <rect x="55" y="350" width="12" height="200" fill="#1A1210"/>
    <!-- Tree 1 foliage layers -->
    <path d="M20 360 L61 250 L102 360 Z" fill="url(#tree1Grad)"/>
    <path d="M28 310 L61 220 L94 310 Z" fill="url(#tree1Grad)" opacity="0.9"/>
    <path d="M35 270 L61 200 L87 270 Z" fill="#1A3A2A" opacity="0.85"/>
    <!-- Tree 1 detail branches -->
    <path d="M40 340 Q30 330 20 340" fill="none" stroke="#0D1F15" stroke-width="1.5" opacity="0.5"/>
    <path d="M82 340 Q92 330 102 340" fill="none" stroke="#0D1F15" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Left secondary tree -->
  <g opacity="0.5">
    <rect x="115" y="400" width="8" height="160" fill="#1A1210"/>
    <path d="M92 410 L119 320 L146 410 Z" fill="url(#tree2Grad)"/>
    <path d="M98 370 L119 300 L140 370 Z" fill="url(#tree2Grad)" opacity="0.8"/>
  </g>
  <!-- Right tree cluster -->
  <g opacity="0.7">
    <rect x="690" y="340" width="14" height="210" fill="#1A1210"/>
    <path d="M650 350 L697 230 L744 350 Z" fill="url(#tree1Grad)"/>
    <path d="M658 300 L697 210 L736 300 Z" fill="url(#tree1Grad)" opacity="0.9"/>
    <path d="M665 260 L697 190 L729 260 Z" fill="#1A3A2A" opacity="0.85"/>
    <path d="M660 330 Q648 320 640 335" fill="none" stroke="#0D1F15" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Right secondary tree -->
  <g opacity="0.5">
    <rect x="750" y="380" width="10" height="180" fill="#1A1210"/>
    <path d="M725 390 L755 290 L785 390 Z" fill="url(#tree2Grad)"/>
    <path d="M732 350 L755 270 L778 350 Z" fill="url(#tree2Grad)" opacity="0.8"/>
  </g>
  <!-- Stone path in center -->
  <g opacity="0.4">
    <path d="M350 600 Q360 520 380 480 Q400 450 400 400 Q400 350 390 300" fill="none" stroke="url(#pathGrad)" stroke-width="40"/>
    <!-- Cobblestones -->
    <ellipse cx="370" cy="560" rx="12" ry="4" fill="#2A2F3E" opacity="0.3"/>
    <ellipse cx="380" cy="530" rx="10" ry="3" fill="#2A2F3E" opacity="0.25"/>
    <ellipse cx="385" cy="500" rx="9" ry="3" fill="#2A2F3E" opacity="0.2"/>
    <ellipse cx="390" cy="470" rx="8" ry="2.5" fill="#2A2F3E" opacity="0.15"/>
  </g>
  <!-- Lantern on right tree -->
  <g>
    <circle cx="720" cy="340" r="25" fill="url(#lanternGlow)" filter="url(#lanternFilter)"/>
    <rect x="716" y="334" width="8" height="12" rx="2" fill="#8B6B2F" opacity="0.8"/>
    <rect x="718" y="336" width="4" height="6" rx="1" fill="#FFD60A" opacity="0.7" filter="url(#fgGlow)"/>
  </g>
  <!-- Lantern on left tree -->
  <g>
    <circle cx="85" cy="350" r="20" fill="url(#lanternGlow)" filter="url(#lanternFilter)"/>
    <rect x="81" y="344" width="8" height="12" rx="2" fill="#8B6B2F" opacity="0.8"/>
    <rect x="83" y="346" width="4" height="6" rx="1" fill="#FFD60A" opacity="0.7" filter="url(#fgGlow)"/>
  </g>
  <!-- Ground vegetation -->
  <g opacity="0.4">
    <path d="M0 580 Q50 560 100 575 Q150 555 200 570 Q250 558 300 572 Q350 555 400 568 Q450 558 500 575 Q550 560 600 572 Q650 555 700 570 Q750 558 800 575 L800 600 L0 600 Z" fill="#0D1F15"/>
    <!-- Mushrooms -->
    <ellipse cx="180" cy="575" rx="5" ry="3" fill="#7B2CBF" opacity="0.4"/>
    <rect x="179" y="575" width="2" height="5" fill="#6B5B7B" opacity="0.3"/>
    <ellipse cx="620" cy="570" rx="4" ry="2.5" fill="#A855F7" opacity="0.3"/>
    <rect x="619" y="570" width="2" height="4" fill="#6B5B7B" opacity="0.25"/>
  </g>
  <!-- Floating particles / fireflies -->
  <g filter="url(#fgGlow)" opacity="0.6">
    <circle cx="150" cy="400" r="2" fill="#FFD60A"/>
    <circle cx="300" cy="350" r="1.5" fill="#FFD60A"/>
    <circle cx="500" cy="380" r="1.8" fill="#FFD60A"/>
    <circle cx="650" cy="300" r="2" fill="#FFD60A"/>
    <circle cx="250" cy="450" r="1.2" fill="#A855F7"/>
    <circle cx="550" cy="420" r="1.5" fill="#A855F7"/>
  </g>
  <!-- Fog overlay -->
  <rect width="800" height="600" fill="url(#fogGrad)" opacity="0.5"/>
</svg>