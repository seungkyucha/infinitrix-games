<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0F1628"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2CBF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4C1D95" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonCore" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8E0F0"/>
      <stop offset="100%" stop-color="#A78BCA"/>
    </radialGradient>
    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1030"/>
      <stop offset="100%" stop-color="#0D0818"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starFilter">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- Stars layer -->
  <g filter="url(#starFilter)">
    <circle cx="120" cy="50" r="1.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="250" cy="80" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="380" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="500" cy="100" r="0.6" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="620" cy="45" r="1.1" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="720" cy="90" r="0.7" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="80" cy="130" r="0.9" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="180" cy="160" r="0.5" fill="#E8E0F0" opacity="0.6"/>
    <circle cx="340" cy="120" r="1.3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="450" cy="60" r="0.7" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="570" cy="140" r="1" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="680" cy="170" r="0.6" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="50" cy="200" r="0.8" fill="#E8E0F0" opacity="0.6"/>
    <circle cx="760" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="300" cy="180" r="0.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="640" cy="95" r="0.9" fill="#E8E0F0" opacity="0.7"/>
    <circle cx="160" cy="210" r="0.6" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="420" cy="150" r="0.7" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="530" cy="200" r="1.1" fill="#E8E0F0" opacity="0.5"/>
    <circle cx="700" cy="220" r="0.8" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <!-- Moon with glow -->
  <g>
    <circle cx="650" cy="100" r="80" fill="url(#moonGlow)"/>
    <circle cx="650" cy="100" r="28" fill="url(#moonCore)" filter="url(#bgGlow)"/>
    <!-- Moon craters -->
    <circle cx="642" cy="92" r="4" fill="#9B7FC0" opacity="0.3"/>
    <circle cx="658" cy="105" r="3" fill="#9B7FC0" opacity="0.25"/>
    <circle cx="648" cy="110" r="2" fill="#9B7FC0" opacity="0.2"/>
  </g>
  <!-- Distant mountains -->
  <g opacity="0.3">
    <path d="M0 450 L80 340 L160 400 L240 320 L320 380 L400 300 L480 360 L560 310 L640 370 L720 330 L800 390 L800 450 Z" fill="#1A1030"/>
  </g>
  <!-- Dark Tower (central, far distance) -->
  <g opacity="0.5">
    <path d="M370 200 L380 200 L385 420 L365 420 Z" fill="url(#towerGrad)"/>
    <!-- Tower top -->
    <path d="M360 200 L375 160 L390 200 Z" fill="#1A1030"/>
    <!-- Tower windows (glowing) -->
    <rect x="372" y="230" width="6" height="8" rx="3" fill="#E63946" opacity="0.6" filter="url(#bgGlow)"/>
    <rect x="372" y="270" width="6" height="8" rx="3" fill="#7B2CBF" opacity="0.5" filter="url(#bgGlow)"/>
    <rect x="372" y="310" width="6" height="8" rx="3" fill="#E63946" opacity="0.4" filter="url(#bgGlow)"/>
    <rect x="372" y="350" width="6" height="8" rx="3" fill="#7B2CBF" opacity="0.3" filter="url(#bgGlow)"/>
    <!-- Tower spire glow -->
    <circle cx="375" cy="165" r="5" fill="#E63946" opacity="0.4" filter="url(#bgGlow)"/>
  </g>
  <!-- Nebula/mist far background -->
  <g opacity="0.15">
    <ellipse cx="200" cy="300" rx="200" ry="80" fill="#7B2CBF"/>
    <ellipse cx="600" cy="250" rx="180" ry="60" fill="#4C1D95"/>
  </g>
  <!-- Ground fog -->
  <g opacity="0.2">
    <ellipse cx="200" cy="560" rx="250" ry="60" fill="#1A1F2E"/>
    <ellipse cx="600" cy="570" rx="300" ry="50" fill="#1A1F2E"/>
  </g>
  <!-- Far treeline silhouette -->
  <g opacity="0.25">
    <path d="M0 480 L20 440 L40 470 L60 430 L80 460 L100 420 L120 455 L140 425 L160 450 L180 410 L200 445 L220 420 L240 455 L260 415 L280 448 L300 430 L320 460 L340 420 L360 450 L380 425 L400 455 L420 418 L440 448 L460 430 L480 460 L500 415 L520 445 L540 425 L560 455 L580 420 L600 450 L620 430 L640 458 L660 415 L680 445 L700 428 L720 455 L740 420 L760 445 L780 430 L800 460 L800 480 Z" fill="#0D1A0D"/>
  </g>
</svg>