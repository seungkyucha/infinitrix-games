<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dragonBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#450A0A"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="1"/>
      <stop offset="40%" stop-color="#F97316" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fire breath glow -->
  <g filter="url(#fireFilter)">
    <ellipse cx="32" cy="48" rx="14" ry="8" fill="url(#fireGlow)" opacity="0.5"/>
  </g>
  <!-- Left wing -->
  <g>
    <path d="M16 18 L2 8 L6 20 L10 14 L14 22 L8 28 L20 30 Z" fill="url(#wingGrad)" filter="url(#eGlow)"/>
    <!-- Wing membrane lines -->
    <path d="M16 18 L6 12" fill="none" stroke="#7F1D1D" stroke-width="0.5" opacity="0.6"/>
    <path d="M16 22 L10 16" fill="none" stroke="#7F1D1D" stroke-width="0.5" opacity="0.6"/>
  </g>
  <!-- Right wing -->
  <g>
    <path d="M48 18 L62 8 L58 20 L54 14 L50 22 L56 28 L44 30 Z" fill="url(#wingGrad)" filter="url(#eGlow)"/>
    <path d="M48 18 L58 12" fill="none" stroke="#7F1D1D" stroke-width="0.5" opacity="0.6"/>
    <path d="M48 22 L54 16" fill="none" stroke="#7F1D1D" stroke-width="0.5" opacity="0.6"/>
  </g>
  <!-- Body -->
  <g>
    <path d="M24 16 L32 10 L40 16 L42 34 Q32 40 22 34 Z" fill="url(#dragonBody)" filter="url(#eGlow)"/>
    <!-- Belly scales -->
    <path d="M28 22 Q32 24 36 22 L35 28 Q32 30 29 28 Z" fill="#EF4444" opacity="0.4"/>
    <path d="M29 28 Q32 30 35 28 L34 33 Q32 35 30 33 Z" fill="#EF4444" opacity="0.3"/>
  </g>
  <!-- Head -->
  <g>
    <ellipse cx="32" cy="12" rx="8" ry="6" fill="#B91C1C"/>
    <!-- Horns -->
    <path d="M26 8 L22 2 L24 7 Z" fill="#7F1D1D"/>
    <path d="M38 8 L42 2 L40 7 Z" fill="#7F1D1D"/>
    <!-- Snout -->
    <ellipse cx="32" cy="14" rx="4" ry="2.5" fill="#991B1B"/>
    <!-- Nostrils -->
    <circle cx="30" cy="14" r="0.8" fill="#450A0A"/>
    <circle cx="34" cy="14" r="0.8" fill="#450A0A"/>
    <!-- Eyes -->
    <g filter="url(#eGlow)">
      <ellipse cx="28" cy="10" rx="2.5" ry="2" fill="#FBBF24"/>
      <ellipse cx="28" cy="10" rx="1" ry="1.8" fill="#1F2937"/>
      <ellipse cx="36" cy="10" rx="2.5" ry="2" fill="#FBBF24"/>
      <ellipse cx="36" cy="10" rx="1" ry="1.8" fill="#1F2937"/>
    </g>
  </g>
  <!-- Tail -->
  <path d="M32 38 Q28 44 22 48 Q20 50 24 50 L28 46 Q30 44 32 42" fill="#991B1B" opacity="0.8"/>
  <!-- Tail spike -->
  <path d="M22 48 L18 46 L20 50 Z" fill="#7F1D1D"/>
  <!-- Claws / legs -->
  <g>
    <path d="M26 34 L22 42 L20 40 L22 44 L24 42 L26 44 L28 40 Z" fill="#7F1D1D"/>
    <path d="M38 34 L42 42 L44 40 L42 44 L40 42 L38 44 L36 40 Z" fill="#7F1D1D"/>
  </g>
  <!-- Fire particles from mouth -->
  <g filter="url(#fireFilter)" opacity="0.8">
    <circle cx="30" cy="17" r="1.5" fill="#FCD34D"/>
    <circle cx="34" cy="18" r="1" fill="#F97316"/>
    <circle cx="32" cy="19" r="1.2" fill="#FCD34D" opacity="0.6"/>
  </g>
</svg>