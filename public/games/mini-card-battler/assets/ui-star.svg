<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="50%" stop-color="#E9C46A"/>
      <stop offset="100%" stop-color="#C4941A"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD60A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD60A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldShine" cx="40%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFF3A0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD60A" stop-opacity="0"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="url(#goldGlow)"/>
  <!-- Coin body -->
  <g filter="url(#sGlow)">
    <circle cx="16" cy="16" r="12" fill="url(#goldGrad)"/>
    <!-- Coin rim -->
    <circle cx="16" cy="16" r="12" fill="none" stroke="#C4941A" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="10" fill="none" stroke="#E9C46A" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Inner emblem — dragon (simplified) -->
  <g opacity="0.7">
    <path d="M13 12 L16 8 L19 12 L18 16 Q16 18 14 16 Z" fill="#C4941A"/>
    <!-- Wings -->
    <path d="M13 12 L9 10 L11 14 Z" fill="#B8860B" opacity="0.8"/>
    <path d="M19 12 L23 10 L21 14 Z" fill="#B8860B" opacity="0.8"/>
    <!-- Tail -->
    <path d="M16 18 Q14 20 12 22 Q13 22 14 21 Q15 20 16 19" fill="#C4941A" opacity="0.6"/>
  </g>
  <!-- Shine -->
  <ellipse cx="12" cy="11" rx="4" ry="3" fill="url(#goldShine)"/>
  <!-- Gold sparkle dots -->
  <circle cx="22" cy="10" r="0.8" fill="#FFF3A0" opacity="0.8" filter="url(#sGlow)"/>
  <circle cx="10" cy="20" r="0.6" fill="#FFF3A0" opacity="0.6" filter="url(#sGlow)"/>
</svg>