<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#C1121F"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FF6B7A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="16" cy="17" rx="14" ry="13" fill="url(#heartGlow)"/>
  <!-- Heart shape -->
  <g filter="url(#hGlow)">
    <path d="M16 28 C10 22 2 17 2 10 C2 5 6 2 10 2 C12.5 2 14.5 3.5 16 6 C17.5 3.5 19.5 2 22 2 C26 2 30 5 30 10 C30 17 22 22 16 28 Z" fill="url(#heartGrad)"/>
  </g>
  <!-- Shine highlight -->
  <path d="M10 8 C10 5.5 12 4 14 5 C12 4.5 10 6 10 8 Z" fill="#FF8A95" opacity="0.7"/>
  <ellipse cx="11" cy="9" rx="3" ry="2.5" fill="url(#heartShine)"/>
  <!-- Inner detail line -->
  <path d="M16 24 C12 20 7 16 7 11" fill="none" stroke="#FF4D5E" stroke-width="0.5" opacity="0.3"/>
</svg>