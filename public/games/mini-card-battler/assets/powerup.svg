<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="40%" stop-color="#457B9D"/>
      <stop offset="100%" stop-color="#2A5070"/>
    </linearGradient>
    <linearGradient id="shieldRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9C46A"/>
      <stop offset="100%" stop-color="#C4941A"/>
    </linearGradient>
    <radialGradient id="shieldAura" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#48CAE4" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#457B9D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#457B9D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#7B2CBF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B2CBF" stop-opacity="0"/>
    </radialGradient>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pSoftGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <ellipse cx="24" cy="26" rx="20" ry="18" fill="url(#shieldAura)" filter="url(#pSoftGlow)"/>
  <!-- Shield body -->
  <g filter="url(#pGlow)">
    <path d="M24 6 L40 14 L38 32 Q24 44 10 32 L8 14 Z" fill="url(#shieldGrad)"/>
    <!-- Shield rim -->
    <path d="M24 6 L40 14 L38 32 Q24 44 10 32 L8 14 Z" fill="none" stroke="url(#shieldRim)" stroke-width="2"/>
  </g>
  <!-- Inner shield design -->
  <g>
    <!-- Center line -->
    <path d="M24 10 L24 38" fill="none" stroke="#5A9BBD" stroke-width="1" opacity="0.4"/>
    <!-- Cross -->
    <path d="M16 20 L32 20" fill="none" stroke="#5A9BBD" stroke-width="1" opacity="0.4"/>
    <!-- Inner chevron -->
    <path d="M24 14 L34 20 L32 30 Q24 38 16 30 L14 20 Z" fill="none" stroke="#48CAE4" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Center gem -->
  <g filter="url(#pGlow)">
    <circle cx="24" cy="22" r="5" fill="url(#gemGlow)"/>
    <path d="M24 17 L28 22 L24 27 L20 22 Z" fill="#A855F7" opacity="0.8"/>
    <!-- Gem highlight -->
    <path d="M22 19 L24 17 L26 19 L24 21 Z" fill="#D4A0FF" opacity="0.6"/>
  </g>
  <!-- Sparkle effects -->
  <g filter="url(#pGlow)" opacity="0.7">
    <path d="M6 8 L7 6 L8 8 L7 10 Z" fill="#48CAE4"/>
    <path d="M40 6 L41 4 L42 6 L41 8 Z" fill="#48CAE4"/>
    <path d="M4 28 L5 26 L6 28 L5 30 Z" fill="#A855F7"/>
    <path d="M42 30 L43 28 L44 30 L43 32 Z" fill="#A855F7"/>
  </g>
</svg>