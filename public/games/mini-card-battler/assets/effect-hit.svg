<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E63946" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#C1121F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C1121F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSoftGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer shockwave ring -->
  <circle cx="48" cy="48" r="42" fill="none" stroke="#E63946" stroke-width="2" opacity="0.3" filter="url(#hitSoftGlow)"/>
  <circle cx="48" cy="48" r="34" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.25" filter="url(#hitGlow)"/>
  <!-- Outer glow -->
  <circle cx="48" cy="48" r="38" fill="url(#hitOuter)" filter="url(#hitSoftGlow)"/>
  <!-- Core explosion -->
  <circle cx="48" cy="48" r="18" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- Burst rays -->
  <g filter="url(#hitGlow)" opacity="0.8">
    <path d="M48 48 L48 10 L50 16 L48 48" fill="#FCD34D" opacity="0.6"/>
    <path d="M48 48 L80 28 L74 34 L48 48" fill="#FCD34D" opacity="0.5"/>
    <path d="M48 48 L88 48 L82 50 L48 48" fill="#E63946" opacity="0.5"/>
    <path d="M48 48 L78 72 L72 68 L48 48" fill="#E63946" opacity="0.4"/>
    <path d="M48 48 L48 86 L46 80 L48 48" fill="#FCD34D" opacity="0.5"/>
    <path d="M48 48 L18 72 L24 68 L48 48" fill="#E63946" opacity="0.4"/>
    <path d="M48 48 L8 48 L14 46 L48 48" fill="#E63946" opacity="0.5"/>
    <path d="M48 48 L16 26 L22 30 L48 48" fill="#FCD34D" opacity="0.5"/>
  </g>
  <!-- Spark particles -->
  <g filter="url(#hitGlow)">
    <circle cx="30" cy="20" r="2.5" fill="url(#sparkCore)"/>
    <circle cx="70" cy="24" r="2" fill="url(#sparkCore)"/>
    <circle cx="76" cy="56" r="1.8" fill="url(#sparkCore)"/>
    <circle cx="64" cy="76" r="2.2" fill="url(#sparkCore)"/>
    <circle cx="28" cy="70" r="1.5" fill="url(#sparkCore)"/>
    <circle cx="20" cy="44" r="2" fill="url(#sparkCore)"/>
    <circle cx="58" cy="14" r="1.5" fill="#FCD34D"/>
    <circle cx="82" cy="40" r="1.2" fill="#FCD34D"/>
    <circle cx="38" cy="82" r="1.8" fill="#F97316"/>
    <circle cx="14" cy="58" r="1.3" fill="#F97316"/>
  </g>
  <!-- Center white flash -->
  <circle cx="48" cy="48" r="6" fill="#FFFFFF" opacity="0.9" filter="url(#hitGlow)"/>
</svg>