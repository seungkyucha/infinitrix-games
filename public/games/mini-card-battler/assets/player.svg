<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#457B9D"/>
      <stop offset="50%" stop-color="#2A5070"/>
      <stop offset="100%" stop-color="#1A3A50"/>
    </linearGradient>
    <linearGradient id="cloakGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="manaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7B2CBF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7B2CBF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="faceGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </radialGradient>
    <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="40%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mana aura behind character -->
  <g filter="url(#softGlow)">
    <ellipse cx="32" cy="36" rx="22" ry="18" fill="url(#manaGlow)" opacity="0.5"/>
  </g>
  <!-- Cloak / body -->
  <g>
    <path d="M22 28 Q20 32 18 52 L26 50 L32 54 L38 50 L46 52 Q44 32 42 28 Z" fill="url(#cloakGrad)" filter="url(#glow)"/>
    <!-- Cloak inner fold -->
    <path d="M28 34 Q30 40 30 50 L34 50 Q34 40 36 34 Z" fill="#5B1DA0" opacity="0.6"/>
  </g>
  <!-- Armor chest plate -->
  <g>
    <path d="M25 26 L32 22 L39 26 L39 36 Q32 40 25 36 Z" fill="url(#armorGrad)" filter="url(#glow)"/>
    <!-- Armor highlight -->
    <path d="M29 25 L32 23 L35 25 L35 30 Q32 32 29 30 Z" fill="#5A9BBD" opacity="0.5"/>
  </g>
  <!-- Head -->
  <g>
    <ellipse cx="32" cy="17" rx="7" ry="8" fill="url(#faceGlow)"/>
    <!-- Hood -->
    <path d="M24 18 Q24 8 32 6 Q40 8 40 18 Q38 12 32 11 Q26 12 24 18 Z" fill="#4C1D95"/>
    <!-- Eyes -->
    <ellipse cx="29" cy="16" rx="1.5" ry="1.8" fill="#1A1F2E"/>
    <ellipse cx="35" cy="16" rx="1.5" ry="1.8" fill="#1A1F2E"/>
    <!-- Eye glint -->
    <circle cx="29.5" cy="15.5" r="0.5" fill="#FFFFFF"/>
    <circle cx="35.5" cy="15.5" r="0.5" fill="#FFFFFF"/>
    <!-- Mouth -->
    <path d="M30 20 Q32 21 34 20" fill="none" stroke="#8B6B4A" stroke-width="0.5"/>
  </g>
  <!-- Sword (right hand) -->
  <g>
    <path d="M44 26 L48 8 L46 8 L42 24 Z" fill="url(#swordGrad)" filter="url(#glow)"/>
    <!-- Sword guard -->
    <rect x="40" y="24" width="8" height="2" rx="1" fill="#E9C46A"/>
    <!-- Sword grip -->
    <rect x="43" y="26" width="2" height="6" rx="0.5" fill="#8B4513"/>
    <!-- Sword pommel -->
    <circle cx="44" cy="33" r="1.5" fill="#E9C46A"/>
  </g>
  <!-- Shield (left hand) -->
  <g>
    <path d="M14 28 L22 24 L22 38 Q18 42 14 38 Z" fill="#457B9D" filter="url(#glow)"/>
    <path d="M16 30 L20 27 L20 36 Q18 38 16 36 Z" fill="#5A9BBD" opacity="0.6"/>
    <!-- Shield emblem -->
    <circle cx="18" cy="32" r="2" fill="#48CAE4" filter="url(#glow)"/>
  </g>
  <!-- Card floating (behind right shoulder) -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="42" y="12" width="8" height="11" rx="1" fill="#1A1F2E" stroke="#E63946" stroke-width="0.8"/>
    <path d="M44 16 L46 14 L48 16 L47 18 L45 18 Z" fill="#E63946" opacity="0.8"/>
  </g>
  <!-- Boots -->
  <g>
    <path d="M24 50 L20 54 L28 54 L26 50 Z" fill="#2A1A10"/>
    <path d="M38 50 L36 54 L44 54 L40 50 Z" fill="#2A1A10"/>
  </g>
</svg>