<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tbgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="50%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <linearGradient id="tCardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#0F1420"/>
    </linearGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="50%" stop-color="#E9C46A"/>
      <stop offset="100%" stop-color="#C4941A"/>
    </linearGradient>
    <radialGradient id="tManaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7B2CBF"/>
    </radialGradient>
    <radialGradient id="tDragonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tMoonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2CBF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#tbgGrad)"/>
  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="30" cy="25" r="1" fill="#FFF"/>
    <circle cx="90" cy="40" r="0.7" fill="#FFF"/>
    <circle cx="150" cy="15" r="1.1" fill="#FFF"/>
    <circle cx="250" cy="35" r="0.8" fill="#FFF"/>
    <circle cx="330" cy="20" r="1" fill="#FFF"/>
    <circle cx="370" cy="50" r="0.6" fill="#FFF"/>
    <circle cx="60" cy="70" r="0.5" fill="#FFF"/>
    <circle cx="310" cy="60" r="0.9" fill="#FFF"/>
  </g>
  <!-- Moon -->
  <g>
    <circle cx="340" cy="55" r="30" fill="url(#tMoonGlow)"/>
    <circle cx="340" cy="55" r="14" fill="#A78BCA" opacity="0.6" filter="url(#tSoftGlow)"/>
  </g>
  <!-- Dark tower silhouette (right) -->
  <g opacity="0.4">
    <path d="M350 80 L356 80 L360 260 L346 260 Z" fill="#1A1030"/>
    <path d="M342 80 L353 55 L364 80 Z" fill="#1A1030"/>
    <rect x="350" y="120" width="4" height="6" rx="2" fill="#E63946" opacity="0.5" filter="url(#tGlow)"/>
    <rect x="350" y="160" width="4" height="6" rx="2" fill="#7B2CBF" opacity="0.4" filter="url(#tGlow)"/>
  </g>
  <!-- Dragon enemy (upper right) -->
  <g transform="translate(280, 80) scale(1.4)" opacity="0.9">
    <circle cx="0" cy="0" r="30" fill="url(#tDragonGlow)"/>
    <!-- Dragon body -->
    <path d="M0 -14 L12 2 L0 -2 L-12 2 Z" fill="#DC2626" filter="url(#tGlow)"/>
    <!-- Wings -->
    <path d="M-12 2 L-24 -6 L-16 6 Z" fill="#991B1B"/>
    <path d="M12 2 L24 -6 L16 6 Z" fill="#991B1B"/>
    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="5" ry="4" fill="#B91C1C"/>
    <!-- Eyes -->
    <circle cx="-2.5" cy="-11" r="1.2" fill="#FBBF24" filter="url(#tGlow)"/>
    <circle cx="2.5" cy="-11" r="1.2" fill="#FBBF24" filter="url(#tGlow)"/>
    <!-- Fire breath -->
    <path d="M-2 -6 L0 -3 L2 -6 L1 -1 L-1 -1 Z" fill="#FCD34D" opacity="0.7" filter="url(#tGlow)"/>
  </g>
  <!-- Cards fan (center-left) -->
  <g transform="translate(120, 170)">
    <!-- Card 3 (back, leftmost) -->
    <g transform="rotate(-20, 0, 60)">
      <rect x="-22" y="0" width="44" height="62" rx="4" fill="url(#tCardGrad1)" stroke="#457B9D" stroke-width="1.5"/>
      <!-- Shield icon -->
      <path d="M0 18 L10 24 L8 36 Q0 42 -8 36 L-10 24 Z" fill="#457B9D" opacity="0.6"/>
      <!-- Mana cost -->
      <circle cx="-14" cy="10" r="5" fill="url(#tManaGrad)" filter="url(#tGlow)"/>
      <text x="-14" y="13" font-size="7" font-weight="bold" fill="#FFF" text-anchor="middle" font-family="system-ui, sans-serif">2</text>
    </g>
    <!-- Card 2 (middle) -->
    <g transform="rotate(0, 0, 60)">
      <rect x="-22" y="0" width="44" height="62" rx="4" fill="url(#tCardGrad1)" stroke="#E63946" stroke-width="1.5" filter="url(#tGlow)"/>
      <!-- Sword icon -->
      <path d="M0 14 L3 14 L3 34 L5 36 L-5 36 L-3 34 L-3 14 Z" fill="#E8E8E8" opacity="0.8"/>
      <rect x="-7" y="34" width="14" height="3" rx="1" fill="#E9C46A" opacity="0.7"/>
      <!-- Mana cost -->
      <circle cx="-14" cy="10" r="5" fill="url(#tManaGrad)" filter="url(#tGlow)"/>
      <text x="-14" y="13" font-size="7" font-weight="bold" fill="#FFF" text-anchor="middle" font-family="system-ui, sans-serif">1</text>
      <!-- Damage text -->
      <text x="0" y="52" font-size="8" font-weight="bold" fill="#E63946" text-anchor="middle" font-family="system-ui, sans-serif">8</text>
    </g>
    <!-- Card 1 (right) -->
    <g transform="rotate(20, 0, 60)">
      <rect x="-22" y="0" width="44" height="62" rx="4" fill="url(#tCardGrad1)" stroke="#2A9D8F" stroke-width="1.5"/>
      <!-- Star icon (skill) -->
      <path d="M0 18 L2 24 L8 24 L3 28 L5 34 L0 30 L-5 34 L-3 28 L-8 24 L-2 24 Z" fill="#2A9D8F" opacity="0.6"/>
      <!-- Mana cost -->
      <circle cx="-14" cy="10" r="5" fill="url(#tManaGrad)" filter="url(#tGlow)"/>
      <text x="-14" y="13" font-size="7" font-weight="bold" fill="#FFF" text-anchor="middle" font-family="system-ui, sans-serif">1</text>
    </g>
  </g>
  <!-- Player hero silhouette (lower left) -->
  <g transform="translate(50, 160)" opacity="0.8">
    <!-- Cloak -->
    <path d="M0 30 Q-4 35 -8 70 L4 68 L10 72 L16 68 L24 70 Q20 35 16 30 Z" fill="#4C1D95" filter="url(#tGlow)"/>
    <!-- Armor -->
    <path d="M2 26 L8 22 L14 26 L14 34 Q8 38 2 34 Z" fill="#457B9D"/>
    <!-- Head -->
    <ellipse cx="8" cy="18" rx="5" ry="6" fill="#D4A574"/>
    <!-- Hood -->
    <path d="M2 20 Q2 10 8 8 Q14 10 14 20 Q12 14 8 13 Q4 14 2 20 Z" fill="#4C1D95"/>
    <!-- Sword -->
    <path d="M20 24 L24 8 L22 8 L18 22 Z" fill="#C0C0C0" filter="url(#tGlow)"/>
    <rect x="16" y="22" width="6" height="1.5" rx="0.5" fill="#E9C46A"/>
  </g>
  <!-- HP bar -->
  <g transform="translate(30, 252)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#1A1F2E"/>
    <rect x="0" y="0" width="60" height="8" rx="4" fill="#E63946"/>
    <rect x="0" y="0" width="20" height="4" rx="2" fill="#FF6B7A" opacity="0.3"/>
  </g>
  <!-- Mana orbs -->
  <g transform="translate(30, 268)">
    <circle cx="0" cy="0" r="6" fill="url(#tManaGrad)" filter="url(#tGlow)"/>
    <circle cx="16" cy="0" r="6" fill="url(#tManaGrad)" filter="url(#tGlow)"/>
    <circle cx="32" cy="0" r="6" fill="#3D1A5E" opacity="0.5"/>
  </g>
  <!-- Ground fog -->
  <g opacity="0.2">
    <ellipse cx="200" cy="285" rx="220" ry="20" fill="#1A1F2E"/>
  </g>
  <!-- Title text -->
  <g filter="url(#tTextGlow)">
    <text x="200" y="46" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" letter-spacing="2">MINI CARD</text>
    <text x="200" y="74" font-size="24" font-weight="bold" fill="url(#tTitleGrad)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" letter-spacing="3">BATTLER</text>
  </g>
  <!-- Subtitle -->
  <text x="200" y="290" font-size="10" fill="#6B7280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Deck-Building Roguelike</text>
  <!-- Decorative border -->
  <rect x="4" y="4" width="392" height="292" rx="8" fill="none" stroke="#E9C46A" stroke-width="1" opacity="0.3"/>
  <rect x="8" y="8" width="384" height="284" rx="6" fill="none" stroke="#E9C46A" stroke-width="0.5" opacity="0.15"/>
</svg>