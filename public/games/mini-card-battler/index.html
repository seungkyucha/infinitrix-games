/* ═══ SEEDED RNG ═══ */
function mkR(s){let x=s|0||1;return()=>{x=(x*1664525+1013904223)|0;return(x>>>0)/4294967296};}

/* ═══ TWEEN MGR ═══ */
class TW{
  constructor(){this.t=[];}
  add(o,p,d,e,cb){const tw={o,p:{},d,el:0,e:e||'eo',cb};for(const k in p)tw.p[k]={f:o[k],t:p[k]};this.t.push(tw);return tw;}
  clearImmediate(){for(const t of this.t)for(const k in t.p)t.o[k]=t.p[k].t;this.t.length=0;}
  update(dt){for(let i=this.t.length-1;i>=0;i--){const t=this.t[i];t.el+=dt;const r=Math.min(t.el/t.d,1),ep=this._e(r,t.e);
    for(const k in t.p){const p=t.p[k];t.o[k]=p.f+(p.t-p.f)*ep;}if(r>=1){this.t.splice(i,1);if(t.cb)t.cb();}}}
  _e(t,y){if(y==='eo')return 1-(1-t)*(1-t);if(y==='ei')return t*t;if(y==='eob'){const c=2.70158;return 1+c*Math.pow(t-1,3)+1.70158*Math.pow(t-1,2);}return t;}
}

/* ═══ POOL ═══ */
class PL{
  constructor(f){this.p=[];this.a=[];this.f=f;}
  get(){const o=this.p.length?this.p.pop():this.f();this.a.push(o);return o;}
  update(dt){for(let i=this.a.length-1;i>=0;i--){const p=this.a[i];p.li-=dt;if(p.li<=0){this.a.splice(i,1);this.p.push(p);continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.g*dt;p.al=Math.max(0,p.li/p.ml);}}
  clear(){this.p.push(...this.a);this.a.length=0;}
}

/* ═══ AUDIO ═══ */
class AU{
  constructor(){this.c=null;}
  init(){try{this.c=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  play(ty){if(!this.c)return;if(this.c.state==='suspended')this.c.resume();
    const n=this.c.currentTime,o=this.c.createOscillator(),g=this.c.createGain();o.connect(g);g.connect(this.c.destination);
    const S={cd:{f:[800,1200],w:'sine',d:0.08,v:0.12},hit:{f:[200,100],w:'sawtooth',d:0.12,v:0.15},
      blk:{f:[600,800],w:'triangle',d:0.1,v:0.1},die:{f:[400,50],w:'square',d:0.3,v:0.12},
      trn:{f:[500,700],w:'sine',d:0.15,v:0.08},win:{f:[523,659],w:'sine',d:0.4,v:0.1},
      los:{f:[220,175],w:'triangle',d:0.5,v:0.12},sel:{f:[1000,1000],w:'sine',d:0.05,v:0.06},
      gld:{f:[1200,1500],w:'sine',d:0.1,v:0.08},bos:{f:[80,120],w:'sawtooth',d:0.5,v:0.15},
      hel:{f:[400,800],w:'sine',d:0.2,v:0.08},up:{f:[600,1200],w:'sine',d:0.3,v:0.1},
      err:{f:[200,150],w:'square',d:0.1,v:0.08}}[ty];
    if(!S)return;o.type=S.w;o.frequency.setValueAtTime(S.f[0],n);o.frequency.linearRampToValueAtTime(S.f[S.f.length-1],n+S.d);
    g.gain.setValueAtTime(S.v,n);g.gain.linearRampToValueAtTime(0,n+S.d);o.start(n);o.stop(n+S.d+0.01);}
}

function rsz(){dp=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;

function ldB(){try{bst=JSON.parse(localStorage.getItem('mcb_b')||'{}')}catch(e){bst={}}}
function svB(s,f){try{const n=s>(bst.score||0);if(n){bst={score:s,floor:f};localStorage.setItem('mcb_b',JSON.stringify(bst))}return n}catch(e){return false}}
function ldU(){try{ulk=JSON.parse(localStorage.getItem('mcb_u')||'{}')}catch(e){ulk={}}}

/* ═══ beginT — ALL transitions §5.2 ═══ */
function beginT(tg,op){
  if(isTr&&SP[tg]<=SP[trTg])return;
  if(op&&op.im){enterS(tg);return;}
  isTr=true;trTg=tg;
  const o={v:0};tw.add(o,{v:1},CFG.TRD*0.5,'ei',()=>{trAl=1;enterS(trTg);
    const o2={v:1};tw.add(o2,{v:0},CFG.TRD*0.5,'eo',()=>{trAl=0;isTr=false;});});
}

function enterS(s){pSt=st;st=s;
  if(s==='TITLE')iTitle();else if(s==='MAP')iMap();else if(s==='PREB')iPreB();
  else if(s==='PTURN')iPT();else if(s==='ETURN')iET();else if(s==='REW')iRew();
  else if(s==='SHOP')iShop();else if(s==='EVT')iEvt();else if(s==='VIC')iVic();
  else if(s==='GO')iGO();}

function iTitle(){gT=0;mDr=[];for(let i=0;i<30;i++)mDr.push({x:Math.random()*W,y:Math.random()*H,sp:50+Math.random()*150,ch:'ABCDEFカタナ剣盾01'});ldB();ldU();}

function iRun(){
  const rng=mkR(Date.now());
  P={hp:CFG.STARTHP,mh:CFG.MAXHP,bk:0,bf:{str:0,pre:0,th:0,ab:0,po:0,bk:0,im:false},db:{vl:0,wk:0,bl:0}};
  dk=[];hd=[];ds=[];dr=[];
  const s=CD.find(c=>c.id==='A1'),d=CD.find(c=>c.id==='D1'),b=CD.find(c=>c.id==='A2');
  for(let i=0;i<5;i++)dk.push(mC(s));for(let i=0;i<4;i++)dk.push(mC(d));dk.push(mC(b));
  cFl=0;mD=null;en=[];sC=-1;tE=-1;
  sts={kl:0,cp:0,cg:0,md:0,gd:0,sc:0,bk:0,pf:true,rng};pt.clear();ft.length=0;
}

function mC(df,up){return{...df,uid:Math.random(),up:!!up,cv:up?df.uv:df.v,ch:up?(df.uh||df.h||1):(df.h||1)};}

function iMap(){if(!mD||cFl!==(mD.fl||0))mD=genM(sts.rng,cFl);sC=-1;tE=-1;}

function genM(rng,fl){
  const ty=[[' b',' b',' b','e','s'],['b','b','el','s','r'],['b','el','r','bs']][Math.min(fl,2)];
  const sh=[...ty];for(let i=sh.length-1;i>0;i--){const j=0|rng()*(i+1);[sh[i],sh[j]]=[sh[j],sh[i]];}
  if(fl===2){const bi=sh.indexOf('bs');if(bi>=0){sh.splice(bi,1);sh.push('bs');}}
  const nd=[];for(let c=0;c<sh.length;c++){nd.push({co:c,ro:c===0?1:0|rng()*3,tp:sh[c].trim(),vi:false,x:0,y:0,cn:[]});}
  for(let i=0;i<nd.length-1;i++){const nx=nd.filter(n=>n.co===nd[i].co+1);if(nx.length>0){nd[i].cn.push(nd.indexOf(nx[0|rng()*nx.length]));
    if(nx.length>1&&rng()>0.5){const o=nx.find(n=>!nd[i].cn.includes(nd.indexOf(n)));if(o)nd[i].cn.push(nd.indexOf(o));}}}
  const mw=W*0.8,mh=H*0.4,sx=W*0.1,sy=H*0.25;
  for(const n of nd){n.x=sx+((n.co+0.5)/sh.length)*mw;n.y=sy+((n.ro+0.5)/3)*mh;}
  return{nd,fl,ci:0};
}
function gR(m,i){if(i==null)return[0];const n=m.nd[i];return n?n.cn:[];}

function iPreB(){
  const nd=mD.nd[mD.ci];en=[];const fl=cFl,hs=CFG.FHP[fl]||1,ds2=CFG.FDMG[fl]||1;
  if(nd.tp==='bs'){const bk=fl===0?'fdragon':fl===1?'flich':'dknight';en.push(mE(bk,hs,ds2));}
  else if(nd.tp==='el'){const el=Object.keys(ED).filter(k=>ED[k].el&&ED[k].fl.includes(fl+1));en.push(mE(el.length?el[0|sts.rng()*el.length]:'orc',hs,ds2));}
  else{const nm=Object.keys(ED).filter(k=>{const d=ED[k];return!d.el&&!d.bs&&d.fl.includes(fl+1);});
    en.push(mE(nm.length?nm[0|sts.rng()*nm.length]:'slime',hs,ds2));
    if(fl>=1&&sts.rng()>0.5&&nm.length>0)en.push(mE(nm[0|sts.rng()*nm.length],hs,ds2));}
  bT=0;sts.pf=nd.tp==='bs';au.play('bos');
  tw.add({v:0},{v:1},0.8,'eo',()=>{beginT('PTURN',{im:true});});
}

function mE(k,hs,ds2){
  const d=ED[k],hp=0|d.hp*hs;
  const pa=(d.pa||d.p1||[]).map(a=>({...a,v:a.v?0|a.v*ds2:0}));
  return{k,n:d.n,hp,mh:hp,bk:0,cl:d.cl,sh:d.sh,
    bf:{str:0,th:0},db:{vl:0,wk:0,bl:0},
    pa,ph:1,pi:0,x:0,y:0,bs:!!d.bs,
    p2:d.p2?d.p2.map(a=>({...a,v:a.v?0|a.v*ds2:0})):null,
    p3:d.p3?d.p3.map(a=>({...a,v:a.v?0|a.v*ds2:0})):null,
    pt:d.pt||0.5,pt3:d.pt3||0.25};}

function iPT(){bT++;if(CFG.BLKRESET)P.bk=0;if(P.bf.ab>0)P.bk+=P.bf.ab;
  tMn=CFG.MANA;sC=-1;tE=-1;drN(CFG.HAND);au.play('trn');}
function drN(n){for(let i=0;i<n;i++){if(dr.length===0){dr=shf([...ds],sts.rng);ds=[];}if(dr.length>0){hd.push(dr.pop());au.play('cd');}}}
function shf(d,r){for(let i=d.length-1;i>0;i--){const j=0|r()*(i+1);[d[i],d[j]]=[d[j],d[i]];}return d;}
function iET(){eQ=[...en.filter(e=>e.hp>0)];eTm=0;eAct=false;ds.push(...hd);hd=[];}

function iRew(){
  const nd=mD.nd[mD.ci];let gr=CFG.GBAT;if(nd.tp==='el')gr=CFG.GELI;if(nd.tp==='bs')gr=CFG.GBOS;
  const gs=CFG.FGLD[cFl]||1,g=0|(gr[0]+sts.rng()*(gr[1]-gr[0]))*gs;
  sts.gd+=g;aFT(W/2,H/2-40,'+'+g+'G',C.GD);au.play('gld');
  rwC=genRC(CFG.REWN,sts.rng,cFl);sR=-1;}

function genRC(n,rng,fl){
  const pool=CD.filter(c=>{if(c.r==='b')return false;
    if(c.id==='A3'&&!ulk.fc)return false;if(c.id==='S4'&&!ulk.f2)return false;
    if(c.id==='P1'&&!ulk.f3)return false;if(c.id==='A9'&&!ulk.bk)return false;
    if(c.id==='A10'&&!ulk.c3)return false;if(c.id==='D8'&&!ulk.c5)return false;return true;});
  const cards=[];for(let i=0;i<n&&pool.length>0;i++){
    const rv=rng();let ra='n';if(rv>CFG.RAR.r)ra='l';else if(rv>CFG.RAR.n)ra='r';

function iVic(){const sc=cSc();sts.sc=sc;sts.nb=svB(sc,cFl+1);

/* ═══ DAMAGE §7.4 ═══ */
function cDm(b,ab,dd){let d=b+(ab.str||0)+(ab.bk||0);if((ab.wk||0)>0)d=0|d*CFG.WEAK;if((dd.vl||0)>0)d=0|d*CFG.VULN;if((ab.pre||0)>0)d*=2;return Math.max(0,0|d);}

/* ═══ APPLY CARD ═══ */
function apC(ci,ti){
  if(st!=='PTURN'||isTr)return;const c=hd[ci];if(!c||c.c>tMn)return;
  if(c.t==='ATK'&&!c.ao){const al=en.map((e,i)=>e.hp>0?i:-1).filter(i=>i>=0);
    if(ti<0||!en[ti]||en[ti].hp<=0){if(al.length===1)ti=al[0];else return;}}
  tMn-=c.c;sts.cp++;au.play(c.t==='ATK'?'hit':c.t==='DEF'?'blk':'sel');

  if(c.t==='ATK'){const ht=c.ch||1;const tg=c.ao?en.filter(e=>e.hp>0):[en[ti]].filter(Boolean);
    for(const e of tg){for(let h=0;h<ht;h++){
      let dm=cDm(c.cv,{str:P.bf.str,bk:P.bf.bk,wk:P.db.wk,pre:P.bf.pre},{vl:e.db.vl});
      if(c.ex2&&e.db.vl>0)dm=0|dm*2;if(c.exc&&e.hp/e.mh<c.exc)dm=e.hp+e.bk+1;
      if(c.pi){e.hp-=dm;}else{const bl=Math.min(e.bk,dm);e.bk-=bl;e.hp-=dm-bl;}
      if(dm>sts.md)sts.md=dm;aFT(e.x||W/2,e.y||H*0.25,'-'+dm,C.ATK);sPt(e.x||W/2,e.y||H*0.25,C.ATK);}}
    if(P.bf.pre>0)P.bf.pre=0;
    if(c.db){const ts=c.ao?en.filter(e=>e.hp>0):[en[ti]].filter(Boolean);
      for(const e of ts){if(c.db==='vl')e.db.vl+=(c.dv||0);if(c.db==='wk')e.db.wk+=(c.dv||0);if(c.db==='bl')e.db.bl+=(c.dv||0);}}
    if(c.rt){const al=en.filter(e=>e.hp>0);if(al.length>0){const e=al[0];const bl=Math.min(e.bk,c.rt);e.bk-=bl;e.hp-=c.rt-bl;}}}

  if(c.t==='DEF'){P.bk+=c.cv;aFT(W/2,H*0.7,'+'+c.cv+'BLK',C.BK);
    if(c.hl){P.hp=Math.min(P.mh,P.hp+c.hl);aFT(W/2,H*0.65,'+'+c.hl+'HP',C.GN);}
    if(c.th)P.bf.th+=c.th;if(c.im)P.bf.im=true;
    if(c.rt){const al=en.filter(e=>e.hp>0);if(al.length>0){const e=ti>=0?en[ti]:al[0];const bl=Math.min(e.bk,c.rt);e.bk-=bl;e.hp-=c.rt-bl;aFT(e.x||W/2,e.y||H*0.25,'-'+c.rt,C.ATK);}}}

  if(c.t==='SKL'){if(c.dr)drN(c.up?c.uv:c.v);if(c.am)tMn+=c.am;if(c.pr)P.bf.pre=2;
    if(c.st){const g=c.cv+0|sts.rng()*(c.up?16:11);sts.gd+=g;aFT(W/2,H*0.6,'+'+g+'G',C.GD);}
    if(c.cl){P.db={vl:0,wk:0,bl:0};}
    if(c.db){const ts=c.ao?en.filter(e=>e.hp>0):[en[ti]].filter(Boolean);
      for(const e of ts){if(c.db==='vl')e.db.vl+=(c.dv||0);if(c.db==='wk')e.db.wk+=(c.dv||0);}
      if(c.db2){for(const e of ts){if(c.db2==='vl')e.db.vl+=(c.dv2||0);if(c.db2==='wk')e.db.wk+=(c.dv2||0);}}}}

  if(c.t==='PWR'){if(c.pw==='s')P.bf.str+=c.cv;if(c.pw==='ab')P.bf.ab+=c.cv;if(c.pw==='po')P.bf.po+=c.cv;if(c.pw==='bk')P.bf.bk+=c.cv;}

  ds.push(hd.splice(ci,1)[0]);sC=-1;chkE();
}

function chkE(){
  if(P.hp<=0){beginT('GO');return;}
  if(en.every(e=>e.hp<=0)){en.forEach(e=>{if(e.hp<=0){sts.kl++;if(e.bs)sts.bk++;}});
    const nd=mD.nd[mD.ci];
    if(nd.tp==='bs'&&cFl>=2)beginT('VIC');
    else if(nd.tp==='bs'){cFl++;mD=null;if(cFl>=1&&!ulk.f2){ulk.f2=true;svU();}if(cFl>=2&&!ulk.f3){ulk.f3=true;svU();}if(!ulk.bk){ulk.bk=true;svU();}beginT('REW');}
    else beginT('REW');}
}

/* ═══ ENEMY TURN dt-based ═══ */
function uET(dt){if(st!=='ETURN')return;eTm+=dt;
  if(!eAct&&eQ.length>0&&eTm>=CFG.EAD){eAct=true;exEA(eQ.shift());eTm=0;eAct=false;}
  if(eQ.length===0&&eTm>=CFG.EAD){
    for(const e of en){if(e.hp>0){tDb(e);cBP(e);}}
    tDb(P);if(P.db.bl>0){P.hp-=P.db.bl;aFT(W/2,H*0.7,'-'+P.db.bl,C.ATK);}
    if(P.bf.po>0){for(const e of en){if(e.hp>0){e.hp-=P.bf.po;aFT(e.x,e.y,'-'+P.bf.po,'#A855F7');}}}
    P.bf.im=false;
    if(P.hp<=0)beginT('GO');
    else if(en.every(e=>e.hp<=0)){en.forEach(e=>{if(e.hp<=0){sts.kl++;if(e.bs)sts.bk++;}});
      const nd=mD.nd[mD.ci];if(nd.tp==='bs'&&cFl>=2)beginT('VIC');
      else if(nd.tp==='bs'){cFl++;mD=null;if(!ulk.f2&&cFl>=1){ulk.f2=true;svU();}if(!ulk.f3&&cFl>=2){ulk.f3=true;svU();}if(!ulk.bk){ulk.bk=true;svU();}beginT('REW');}
      else beginT('REW');}
    else beginT('PTURN',{im:true});}}

function exEA(e){if(e.hp<=0)return;const pa=e.ph===3?e.p3:e.ph===2?e.p2:e.pa;if(!pa||!pa.length)return;
  const a=pa[e.pi%pa.length];e.pi++;
  if(a.t==='a'){const ht=a.ht||1;for(let h=0;h<ht;h++){
    let dm=cDm(a.v,{str:e.bf.str,wk:e.db.wk},{vl:P.db.vl});
    if(!P.bf.im){const bl=Math.min(P.bk,dm);P.bk-=bl;P.hp-=dm-bl;if(dm-bl>0)sts.pf=false;
      if(P.bf.th>0){e.hp-=P.bf.th;aFT(e.x,e.y,'-'+P.bf.th,C.BK);}}
    aFT(W/2,H*0.7,'-'+dm,C.IA);sPt(W/2,H*0.7,C.IA);doSk(0.15,3);}au.play('hit');
    if(a.db){if(a.db==='vl')P.db.vl+=(a.dbv||0);if(a.db==='wk')P.db.wk+=(a.dbv||0);if(a.db==='bl')P.db.bl+=(a.dbv||0);}}
  else if(a.t==='d'){e.bk+=a.v;aFT(e.x,e.y,'+'+a.v,C.ID);if(a.db==='bl')P.db.bl+=(a.dbv||0);}
  else if(a.t==='b'){if(a.bf==='s')e.bf.str+=a.v;aFT(e.x,e.y,'BUFF!',C.IB);}}

function cBP(e){if(!e.bs)return;if(e.ph===1&&e.hp/e.mh<=e.pt&&e.p2){e.ph=2;e.pi=0;}if(e.ph===2&&e.pt3&&e.hp/e.mh<=e.pt3&&e.p3){e.ph=3;e.pi=0;}}
function tDb(e){if(e.db.vl>0)e.db.vl--;if(e.db.wk>0)e.db.wk--;if(e.db.bl>0)e.db.bl--;}

function sPt(x,y,cl){for(let i=0;i<8;i++){const p=pt.get();const a=Math.random()*Math.PI*2;p.x=x;p.y=y;p.vx=Math.cos(a)*100*(0.5+Math.random());p.vy=Math.sin(a)*100*(0.5+Math.random());p.g=200;p.li=0.5+Math.random()*0.3;p.ml=p.li;p.cl=cl;p.sz=2+Math.random()*3;p.al=1;}}
function aFT(x,y,tx,cl){ft.push({x,y,tx:String(tx),cl,li:1,ml:1,vy:-60});}

function onK(k){
  if(st==='TITLE'&&(k===' '||k==='Enter')){stG();return;}

  if(st==='PTURN'){if(k>='1'&&k<='5'){const i=+k-1;if(i<hd.length)sCC(i);return;}

    if(k==='w'||k==='W'){if(sC>=0&&en[1]&&en[1].hp>0)apC(sC,1);return;}
    if(k==='e'||k==='E'){eT();return;}}
  if(st==='REW'&&k===' '){if(sR>=0)pR(sR);else skR();}}

function stG(){tw.clearImmediate();pt.clear();ft.length=0;iRun();beginT('MAP');}
function sCC(i){if(st!=='PTURN')return;const c=hd[i];if(!c)return;if(c.c>tMn){au.play('err');return;}
  if(sC===i){if(c.t!=='ATK'||c.ao){apC(i,0);}else{const al=en.filter(e=>e.hp>0);if(al.length===1)apC(i,en.indexOf(al[0]));}return;}

function oC(mx,my){
  if(st==='TITLE'){stG();return;}if(st==='GO'){stG();return;}if(st==='VIC'){beginT('TITLE');return;}
  if(st==='PAUSE'){beginT(pF,{im:true});return;}

  if(st==='MAP'){const rc=gR(mD,mD.ci);for(const ni of rc){const n=mD.nd[ni];if(!n)continue;
    if((mx-n.x)**2+(my-n.y)**2<900){mD.ci=ni;
      if(n.tp==='b'||n.tp==='el'||n.tp==='bs')beginT('PREB');
      else if(n.tp==='s')beginT('SHOP');else if(n.tp==='e')beginT('EVT');
      else if(n.tp==='r')beginT('REST');return;}}return;}

  if(st==='PTURN'){if(mx>=W-120&&mx<=W-20&&my>=H-60&&my<=H-24){eT();return;}
    const hY=H-CFG.CH-20,tw2=hd.length*(CFG.CW+8),sx=(W-tw2)/2;
    for(let i=0;i<hd.length;i++){const cx=sx+i*(CFG.CW+8);if(mx>=cx&&mx<=cx+CFG.CW&&my>=hY&&my<=hY+CFG.CH){sCC(i);return;}}
    if(sC>=0){for(let i=0;i<en.length;i++){const e=en[i];if(e.hp<=0)continue;if(Math.abs(mx-gEX(i))<40&&Math.abs(my-H*0.22)<50){apC(sC,i);return;}}}return;}

  if(st==='REW'){const rw=130,rh=180,trw=rwC.length*(rw+20),rsx=(W-trw)/2,ry=H*0.28;
    for(let i=0;i<rwC.length;i++){const rx=rsx+i*(rw+20);if(mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh){pR(i);return;}}
    if(my>H*0.78&&mx>W/2-50&&mx<W/2+50){skR();return;}return;}

  if(st==='SHOP'){const sw=120,sh=160;
    for(let i=0;i<shI.cards.length;i++){const si=shI.cards[i];if(si.bo)continue;const sx=W*0.15+i*(sw+30),sy=H*0.22;
      if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){if(sts.gd>=si.pr){sts.gd-=si.pr;dk.push(si.card);si.bo=true;sts.cg++;au.play('gld');}else au.play('err');return;}}
    if(!shI.bp&&my>H*0.65&&my<H*0.65+40&&mx>W*0.15&&mx<W*0.45){if(sts.gd>=CFG.SHPOT){sts.gd-=CFG.SHPOT;P.hp=Math.min(P.mh,P.hp+CFG.SHPHEAL);shI.bp=true;au.play('hel');}else au.play('err');return;}
    if(!shI.br&&dk.length>0&&my>H*0.72&&my<H*0.72+40&&mx>W*0.15&&mx<W*0.45){if(sts.gd>=CFG.SHOPREM){sts.gd-=CFG.SHOPREM;dk.splice(0|sts.rng()*dk.length,1);shI.br=true;au.play('sel');}else au.play('err');return;}
    if(my>H*0.85&&mx>W/2-50&&mx<W/2+50){gM();return;}return;}

  if(st==='EVT'){if(evD.cho>=0){gM();return;}
    for(let i=0;i<evD.ch.length;i++){const by=H*0.5+i*50;
      if(mx>W*0.15&&mx<W*0.85&&my>by&&my<by+40){evD.cho=i;const ac=evD.ch[i].ac;
        if(ac==='sac'){P.hp-=CFG.EVTHP;const rc=CD.filter(c=>c.r==='r');if(rc.length)dk.push(mC(rc[0|sts.rng()*rc.length]));sts.cg++;if(P.hp<=0){beginT('GO');return;}}
        else if(ac==='tr'){if(sts.gd>=20){sts.gd-=20;P.hp=Math.min(P.mh,P.hp+15);au.play('hel');}}
        else if(ac==='gm'){if(sts.rng()>0.5){P.hp=Math.min(P.mh,P.hp+20);au.play('hel');}else{P.hp-=10;au.play('hit');if(P.hp<=0){beginT('GO');return;}}}
        return;}}return;}

  if(st==='REST'){if(my>H*0.45&&my<H*0.45+45&&mx>W*0.2&&mx<W*0.6){
      const h=0|P.mh*CFG.REST;P.hp=Math.min(P.mh,P.hp+h);au.play('hel');aFT(W/2,H/2,'+'+h,C.GN);gM();return;}
    if(my>H*0.55&&my<H*0.55+45&&mx>W*0.2&&mx<W*0.6){
      if(dk.length>0){const nu=dk.filter(c=>!c.up);if(nu.length>0){const c=nu[0|sts.rng()*nu.length];c.up=true;c.cv=c.uv;c.ch=c.uh||c.h||1;au.play('up');}}gM();return;}return;}}

  if(Math.random()<0.08){cx.fillStyle=C.BK;cx.font='bold 36px "Share Tech Mono",monospace';cx.fillText('\uBBF8\uB2C8 \uCE74\uB4DC \uBC30\uD2C0\uB7EC',W/2+(Math.random()*6-3),ty+(Math.random()*4-2));}
  cx.fillStyle=C.GN;cx.font='bold 36px "Share Tech Mono",monospace';cx.fillText('\uBBF8\uB2C8 \uCE74\uB4DC \uBC30\uD2C0\uB7EC',W/2,ty);
  cx.fillStyle=C.TX;cx.font='14px "Share Tech Mono",monospace';cx.fillText('\uD134\uC81C \uB371\uBE4C\uB529 \uB85C\uADF8\uB77C\uC774\uD06C',W/2,ty+45);
