<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="eBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="50%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </linearGradient>
    <radialGradient id="eEyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="70%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <linearGradient id="eSpike" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#FF8A80"/>
    </linearGradient>
    <radialGradient id="eCoreGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D50000" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="eArmor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="50%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="eGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7F0000" flood-opacity="0.5"/>
    </filter>
    <filter id="eRedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Danger aura -->
  <g opacity="0.2" filter="url(#eRedGlow)">
    <circle cx="64" cy="64" r="55" fill="#FF1744"/>
  </g>

  <!-- Spikes (top) -->
  <g id="eSpikesTop">
    <path d="M40 28 L44 12 L48 28Z" fill="url(#eSpike)"/>
    <path d="M52 24 L56 6 L60 24Z" fill="url(#eSpike)"/>
    <path d="M64 22 L68 2 L72 22Z" fill="url(#eSpike)"/>
    <path d="M76 24 L80 6 L84 24Z" fill="url(#eSpike)"/>
    <path d="M88 28 L92 12 L96 28Z" fill="url(#eSpike)"/>
  </g>

  <!-- Spikes (bottom) -->
  <g id="eSpikesBot" transform="rotate(180 68 74)">
    <path d="M40 28 L44 12 L48 28Z" fill="url(#eSpike)"/>
    <path d="M52 24 L56 6 L60 24Z" fill="url(#eSpike)"/>
    <path d="M64 22 L68 2 L72 22Z" fill="url(#eSpike)"/>
    <path d="M76 24 L80 6 L84 24Z" fill="url(#eSpike)"/>
    <path d="M88 28 L92 12 L96 28Z" fill="url(#eSpike)"/>
  </g>

  <!-- Main body (cube-ish hostile drone) -->
  <g id="eBody" filter="url(#eShadow)">
    <!-- Armor shell -->
    <path d="M32 32 Q28 32 28 36 L28 92 Q28 96 32 96 L96 96 Q100 96 100 92 L100 36 Q100 32 96 32Z" fill="url(#eArmor)" stroke="#424242" stroke-width="1"/>
    <!-- Red face plate -->
    <path d="M36 36 Q34 36 34 38 L34 90 Q34 92 36 92 L92 92 Q94 92 94 90 L94 38 Q94 36 92 36Z" fill="url(#eBodyGrad)"/>
    <!-- Armor edges -->
    <line x1="34" y1="50" x2="94" y2="50" stroke="#FF8A80" stroke-width="0.5" opacity="0.3"/>
    <line x1="34" y1="78" x2="94" y2="78" stroke="#FF8A80" stroke-width="0.5" opacity="0.3"/>
    <!-- Corner rivets -->
    <circle cx="38" cy="40" r="2" fill="#616161" stroke="#424242" stroke-width="0.5"/>
    <circle cx="90" cy="40" r="2" fill="#616161" stroke="#424242" stroke-width="0.5"/>
    <circle cx="38" cy="88" r="2" fill="#616161" stroke="#424242" stroke-width="0.5"/>
    <circle cx="90" cy="88" r="2" fill="#616161" stroke="#424242" stroke-width="0.5"/>
  </g>

  <!-- Single eye (menacing) -->
  <g id="eEye">
    <ellipse cx="64" cy="58" rx="18" ry="14" fill="#1A1A1A" stroke="#FF5252" stroke-width="1.5"/>
    <ellipse cx="64" cy="58" rx="14" ry="10" fill="url(#eEyeGlow)" filter="url(#eGlow)"/>
    <ellipse cx="64" cy="58" rx="6" ry="8" fill="#D50000"/>
    <ellipse cx="64" cy="58" rx="3" ry="4" fill="#000000"/>
    <!-- Eye highlight -->
    <circle cx="58" cy="54" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="68" cy="62" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Danger core (chest) -->
  <g id="eCore">
    <circle cx="64" cy="80" r="6" fill="url(#eCoreGrad)" filter="url(#eGlow)"/>
    <circle cx="64" cy="80" r="4" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
    <!-- Warning symbol -->
    <path d="M64 76 L61 82 L67 82Z" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.8"/>
    <line x1="64" y1="77.5" x2="64" y2="80.5" stroke="#FFFFFF" stroke-width="1" opacity="0.8"/>
    <circle cx="64" cy="81.5" r="0.5" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Side spikes -->
  <g id="eSideSpikes">
    <path d="M28 50 L16 54 L28 58Z" fill="url(#eSpike)"/>
    <path d="M28 64 L12 68 L28 72Z" fill="url(#eSpike)"/>
    <path d="M100 50 L112 54 L100 58Z" fill="url(#eSpike)"/>
    <path d="M100 64 L116 68 L100 72Z" fill="url(#eSpike)"/>
  </g>

  <!-- Gravity disruption lines -->
  <g opacity="0.3">
    <path d="M20 44 Q64 38 108 44" fill="none" stroke="#FF5252" stroke-width="0.8" stroke-dasharray="4 3"/>
    <path d="M20 84 Q64 90 108 84" fill="none" stroke="#FF5252" stroke-width="0.8" stroke-dasharray="4 3"/>
  </g>

  <!-- Scan line decoration -->
  <g opacity="0.15">
    <line x1="36" y1="42" x2="92" y2="42" stroke="#FF8A80" stroke-width="1"/>
    <line x1="36" y1="46" x2="92" y2="46" stroke="#FF8A80" stroke-width="0.5"/>
    <line x1="36" y1="70" x2="92" y2="70" stroke="#FF8A80" stroke-width="0.5"/>
    <line x1="36" y1="74" x2="92" y2="74" stroke="#FF8A80" stroke-width="1"/>
  </g>
</svg>