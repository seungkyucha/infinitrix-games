<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="pCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#69F0AE"/>
      <stop offset="60%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#1B5E20" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="pShell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="50%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <radialGradient id="pAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#69F0AE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#69F0AE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pArrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B9F6CA"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="pGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pOuterGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1B5E20" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer energy aura -->
  <circle cx="32" cy="32" r="30" fill="url(#pAura)" filter="url(#pOuterGlow)"/>

  <!-- Orbital ring 1 -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#69F0AE" stroke-width="0.8" opacity="0.4" transform="rotate(-30 32 32)" stroke-dasharray="4 3"/>
  <!-- Orbital ring 2 -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#B9F6CA" stroke-width="0.6" opacity="0.3" transform="rotate(30 32 32)" stroke-dasharray="3 4"/>
  <!-- Orbital ring 3 -->
  <ellipse cx="32" cy="32" rx="24" ry="8" fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.35" transform="rotate(90 32 32)"/>

  <!-- Hexagon frame -->
  <path d="M32 6 L52 17 L52 39 L32 50 L12 39 L12 17Z" fill="none" stroke="#A5D6A7" stroke-width="1.5" opacity="0.5"/>
  <path d="M32 10 L48 19 L48 37 L32 46 L16 37 L16 19Z" fill="none" stroke="#69F0AE" stroke-width="0.8" opacity="0.3"/>

  <!-- Main sphere -->
  <g filter="url(#pShadow)">
    <circle cx="32" cy="30" r="14" fill="url(#pShell)"/>
  </g>
  <circle cx="32" cy="30" r="14" fill="url(#pShell)" stroke="#43A047" stroke-width="0.8"/>

  <!-- Core glow -->
  <circle cx="32" cy="30" r="8" fill="url(#pCore)" filter="url(#pGlow)"/>

  <!-- Gravity arrows (up+down power symbol) -->
  <g filter="url(#pGlow)">
    <path d="M32 22 L28 28 L36 28Z" fill="url(#pArrow)" opacity="0.9"/>
    <path d="M32 38 L28 32 L36 32Z" fill="url(#pArrow)" opacity="0.9"/>
  </g>

  <!-- Inner sparkle -->
  <circle cx="28" cy="26" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="35" cy="34" r="1" fill="#FFFFFF" opacity="0.4"/>

  <!-- Energy wisps -->
  <path d="M10 28 Q16 24 20 30" fill="none" stroke="#69F0AE" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M44 34 Q48 30 54 32" fill="none" stroke="#69F0AE" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M28 8 Q32 12 36 8" fill="none" stroke="#B9F6CA" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <path d="M28 52 Q32 48 36 52" fill="none" stroke="#B9F6CA" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>

  <!-- Orbiting dots -->
  <circle cx="8" cy="20" r="1.5" fill="#69F0AE" opacity="0.6"/>
  <circle cx="56" cy="40" r="1.5" fill="#69F0AE" opacity="0.6"/>
  <circle cx="18" cy="52" r="1" fill="#B9F6CA" opacity="0.5"/>
  <circle cx="48" cy="12" r="1" fill="#B9F6CA" opacity="0.5"/>

  <!-- Corner accent dots (volume up) -->
  <circle cx="6" cy="6" r="0.8" fill="#A5D6A7" opacity="0.3"/>
  <circle cx="58" cy="6" r="0.8" fill="#A5D6A7" opacity="0.3"/>
  <circle cx="6" cy="58" r="0.8" fill="#A5D6A7" opacity="0.3"/>
  <circle cx="58" cy="58" r="0.8" fill="#A5D6A7" opacity="0.3"/>

  <!-- ⚡ Unicode energy symbol -->
  <text x="32" y="62" text-anchor="middle" font-size="7" fill="#69F0AE" opacity="0.5" font-family="Arial">⚡</text>

  <!-- Inner crystal facets -->
  <g opacity="0.3">
    <path d="M28 24 L32 20 L36 24 L32 28Z" fill="#FFFFFF" stroke="#B9F6CA" stroke-width="0.3"/>
    <path d="M24 30 L28 26 L32 30 L28 34Z" fill="#E8F5E9" stroke="#B9F6CA" stroke-width="0.3"/>
    <path d="M32 30 L36 26 L40 30 L36 34Z" fill="#E8F5E9" stroke="#B9F6CA" stroke-width="0.3"/>
  </g>

  <!-- Sound wave arcs -->
  <g opacity="0.25" fill="none" stroke="#69F0AE" stroke-width="0.8" stroke-linecap="round">
    <path d="M4 26 Q2 30 4 34"/>
    <path d="M2 24 Q-1 30 2 36"/>
    <path d="M60 26 Q62 30 60 34"/>
    <path d="M62 24 Q65 30 62 36"/>
  </g>

  <!-- Additional energy particles -->
  <g opacity="0.5">
    <circle cx="14" cy="14" r="1.2" fill="#B9F6CA"/>
    <circle cx="50" cy="14" r="1" fill="#69F0AE"/>
    <circle cx="14" cy="50" r="1" fill="#69F0AE"/>
    <circle cx="50" cy="50" r="1.2" fill="#B9F6CA"/>
    <circle cx="32" cy="4" r="0.8" fill="#FFFFFF"/>
    <circle cx="4" cy="32" r="0.8" fill="#FFFFFF"/>
    <circle cx="60" cy="32" r="0.8" fill="#FFFFFF"/>
    <circle cx="32" cy="56" r="0.8" fill="#FFFFFF"/>
  </g>

  <!-- Hexagon rune text -->
  <g opacity="0.2">
    <text x="32" y="10" text-anchor="middle" font-size="5" fill="#69F0AE" font-family="Arial">▲</text>
    <text x="32" y="55" text-anchor="middle" font-size="5" fill="#69F0AE" font-family="Arial">▼</text>
    <text x="10" y="30" text-anchor="middle" font-size="4" fill="#69F0AE" font-family="Arial">◆</text>
    <text x="54" y="30" text-anchor="middle" font-size="4" fill="#69F0AE" font-family="Arial">◆</text>
  </g>

  <!-- Spiral energy trail -->
  <path d="M32 18 Q40 20 38 28 Q36 36 28 34 Q20 32 22 24 Q24 16 32 18Z" fill="none" stroke="#B9F6CA" stroke-width="0.5" opacity="0.2"/>
</svg>