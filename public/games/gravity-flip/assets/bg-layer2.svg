<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="b2WallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="50%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="b2Pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="30%" stop-color="#546E7A"/>
      <stop offset="70%" stop-color="#455A64"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="b2Glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0288D1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="b2Light" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2DangerLight" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FF5252" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF5252" stop-opacity="0"/>
    </radialGradient>
    <filter id="b2Glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="b2Shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Lab wall sections -->
  <g id="b2Walls">
    <!-- Wall section 1 (left) -->
    <rect x="0" y="0" width="200" height="800" fill="url(#b2WallGrad)" opacity="0.6"/>
    <rect x="200" y="0" width="5" height="800" fill="#263238" opacity="0.8"/>
    <!-- Wall section 2 -->
    <rect x="350" y="0" width="150" height="300" fill="url(#b2WallGrad)" opacity="0.5"/>
    <rect x="350" y="500" width="150" height="300" fill="url(#b2WallGrad)" opacity="0.5"/>
    <!-- Wall section 3 -->
    <rect x="650" y="0" width="180" height="250" fill="url(#b2WallGrad)" opacity="0.5"/>
    <rect x="650" y="550" width="180" height="250" fill="url(#b2WallGrad)" opacity="0.5"/>
    <!-- Wall section 4 (right) -->
    <rect x="1000" y="0" width="200" height="800" fill="url(#b2WallGrad)" opacity="0.6"/>
    <rect x="995" y="0" width="5" height="800" fill="#263238" opacity="0.8"/>
  </g>

  <!-- Windows with lab glow -->
  <g id="b2Windows">
    <rect x="30" y="100" width="60" height="80" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.8" opacity="0.6"/>
    <rect x="30" y="250" width="60" height="80" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.8" opacity="0.4"/>
    <rect x="30" y="400" width="60" height="80" rx="3" fill="url(#b2DangerLight)" stroke="#FF5252" stroke-width="0.8" opacity="0.5"/>
    <rect x="30" y="550" width="60" height="80" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.8" opacity="0.3"/>
    <rect x="120" y="150" width="50" height="60" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.5" opacity="0.5"/>
    <rect x="120" y="350" width="50" height="60" rx="3" fill="url(#b2DangerLight)" stroke="#FF5252" stroke-width="0.5" opacity="0.4"/>
    <rect x="1050" y="100" width="60" height="80" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.8" opacity="0.6"/>
    <rect x="1050" y="300" width="60" height="80" rx="3" fill="url(#b2DangerLight)" stroke="#FF5252" stroke-width="0.8" opacity="0.5"/>
    <rect x="1050" y="500" width="60" height="80" rx="3" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.8" opacity="0.4"/>
    <rect x="1130" y="200" width="40" height="50" rx="2" fill="url(#b2Glass)" stroke="#4FC3F7" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Pipe systems -->
  <g id="b2Pipes">
    <!-- Horizontal pipes top -->
    <rect x="0" y="80" width="1200" height="8" rx="4" fill="url(#b2Pipe)" opacity="0.7"/>
    <rect x="0" y="92" width="1200" height="4" rx="2" fill="#37474F" opacity="0.5"/>
    <!-- Horizontal pipes bottom -->
    <rect x="0" y="720" width="1200" height="8" rx="4" fill="url(#b2Pipe)" opacity="0.7"/>
    <rect x="0" y="710" width="1200" height="4" rx="2" fill="#37474F" opacity="0.5"/>
    <!-- Vertical pipes -->
    <rect x="205" y="0" width="6" height="800" rx="3" fill="url(#b2Pipe)" opacity="0.6"/>
    <rect x="500" y="0" width="6" height="300" rx="3" fill="url(#b2Pipe)" opacity="0.5"/>
    <rect x="500" y="500" width="6" height="300" rx="3" fill="url(#b2Pipe)" opacity="0.5"/>
    <rect x="830" y="0" width="6" height="250" rx="3" fill="url(#b2Pipe)" opacity="0.5"/>
    <rect x="830" y="550" width="6" height="250" rx="3" fill="url(#b2Pipe)" opacity="0.5"/>
    <rect x="993" y="0" width="6" height="800" rx="3" fill="url(#b2Pipe)" opacity="0.6"/>
    <!-- Pipe joints -->
    <circle cx="208" cy="84" r="6" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.7"/>
    <circle cx="503" cy="84" r="5" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.6"/>
    <circle cx="833" cy="84" r="5" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.6"/>
    <circle cx="996" cy="84" r="6" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.7"/>
    <circle cx="208" cy="724" r="6" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.7"/>
    <circle cx="503" cy="724" r="5" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.6"/>
    <circle cx="996" cy="724" r="6" fill="#546E7A" stroke="#37474F" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Caution stripes -->
  <g opacity="0.3">
    <pattern id="cautionStripe" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="20" fill="#FFD600"/>
      <rect x="10" width="10" height="20" fill="#212121"/>
    </pattern>
    <rect x="350" y="295" width="150" height="8" fill="url(#cautionStripe)" transform="rotate(0)"/>
    <rect x="350" y="497" width="150" height="8" fill="url(#cautionStripe)"/>
    <rect x="650" y="245" width="180" height="8" fill="url(#cautionStripe)"/>
    <rect x="650" y="547" width="180" height="8" fill="url(#cautionStripe)"/>
  </g>

  <!-- Lab equipment silhouettes -->
  <g opacity="0.2">
    <!-- Console desk -->
    <rect x="370" y="320" width="110" height="40" rx="3" fill="#263238"/>
    <rect x="380" y="325" width="30" height="20" rx="2" fill="#0D1B2A"/>
    <circle cx="425" cy="335" r="3" fill="#4FC3F7" opacity="0.5"/>
    <circle cx="435" cy="335" r="3" fill="#69F0AE" opacity="0.5"/>
    <circle cx="445" cy="335" r="3" fill="#FF5252" opacity="0.5"/>
    <!-- Server rack -->
    <rect x="680" y="270" width="40" height="100" rx="2" fill="#1A1A1A"/>
    <rect x="685" y="280" width="30" height="4" rx="1" fill="#263238"/>
    <rect x="685" y="290" width="30" height="4" rx="1" fill="#263238"/>
    <rect x="685" y="300" width="30" height="4" rx="1" fill="#263238"/>
    <rect x="685" y="310" width="30" height="4" rx="1" fill="#263238"/>
    <circle cx="700" cy="282" r="1.5" fill="#69F0AE" opacity="0.6"/>
    <circle cx="700" cy="292" r="1.5" fill="#69F0AE" opacity="0.6"/>
    <circle cx="700" cy="302" r="1.5" fill="#FF5252" opacity="0.6"/>
    <circle cx="700" cy="312" r="1.5" fill="#FFEB3B" opacity="0.6"/>
  </g>

  <!-- Gravity field lines (mid-ground, denser than bg1) -->
  <g opacity="0.1">
    <path d="M220 350 Q400 330 600 350 Q800 370 990 350" fill="none" stroke="#69F0AE" stroke-width="1.5" stroke-dasharray="8 5"/>
    <path d="M220 450 Q400 470 600 450 Q800 430 990 450" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="8 5"/>
  </g>

  <!-- Floating debris (gravity anomaly — closer, bigger) -->
  <g opacity="0.2" filter="url(#b2Shadow)">
    <rect x="280" y="380" width="15" height="12" rx="2" fill="#37474F" transform="rotate(15 287 386)"/>
    <rect x="540" y="340" width="12" height="18" rx="2" fill="#455A64" transform="rotate(-20 546 349)"/>
    <rect x="780" y="420" width="18" height="10" rx="2" fill="#37474F" transform="rotate(30 789 425)"/>
    <rect x="920" y="360" width="10" height="14" rx="2" fill="#455A64" transform="rotate(-10 925 367)"/>
    <rect x="420" y="460" width="14" height="8" rx="2" fill="#37474F" transform="rotate(25 427 464)"/>
    <rect x="600" y="480" width="16" height="16" rx="2" fill="#455A64" transform="rotate(-35 608 488)"/>
  </g>

  <!-- Warning signs -->
  <g opacity="0.25">
    <path d="M260 200 L270 180 L280 200Z" fill="none" stroke="#FFD600" stroke-width="1.5"/>
    <text x="270" y="197" text-anchor="middle" font-size="8" fill="#FFD600" font-family="Arial">!</text>
    <path d="M900 600 L910 580 L920 600Z" fill="none" stroke="#FFD600" stroke-width="1.5"/>
    <text x="910" y="597" text-anchor="middle" font-size="8" fill="#FFD600" font-family="Arial">!</text>
  </g>

  <!-- Light cones from ceiling -->
  <g filter="url(#b2Glow)">
    <path d="M300 0 L280 200 L320 200Z" fill="url(#b2Light)" opacity="0.15"/>
    <path d="M600 0 L580 200 L620 200Z" fill="url(#b2Light)" opacity="0.12"/>
    <path d="M900 0 L880 200 L920 200Z" fill="url(#b2DangerLight)" opacity="0.1"/>
  </g>

  <!-- Sparking wires -->
  <g opacity="0.3">
    <path d="M250 90 Q255 110 260 95 Q265 120 270 100" fill="none" stroke="#FFD600" stroke-width="1" stroke-linecap="round"/>
    <circle cx="270" cy="100" r="3" fill="#FFEB3B" filter="url(#b2Glow)" opacity="0.5"/>
    <path d="M750 720 Q755 700 760 715 Q765 690 770 710" fill="none" stroke="#FFD600" stroke-width="1" stroke-linecap="round"/>
    <circle cx="770" cy="710" r="3" fill="#FFEB3B" filter="url(#b2Glow)" opacity="0.5"/>
  </g>

  <!-- Floor cracks (lab damage) -->
  <g opacity="0.15" stroke="#37474F" stroke-width="1" fill="none">
    <path d="M300 780 L320 760 L310 740 L330 730"/>
    <path d="M550 790 L560 770 L580 775 L570 750"/>
    <path d="M800 785 L810 770 L830 778 L825 755"/>
  </g>

  <!-- Emergency lights -->
  <g>
    <circle cx="300" cy="88" r="4" fill="#FF5252" opacity="0.3" filter="url(#b2Glow)"/>
    <circle cx="600" cy="88" r="4" fill="#FF5252" opacity="0.25" filter="url(#b2Glow)"/>
    <circle cx="900" cy="88" r="4" fill="#FF5252" opacity="0.3" filter="url(#b2Glow)"/>
  </g>

  <!-- Gravity direction indicators on walls -->
  <g opacity="0.15">
    <path d="M160 500 L155 510 L165 510Z" fill="#69F0AE"/>
    <path d="M160 520 L155 510 L165 510Z" fill="#69F0AE"/>
    <path d="M1060 500 L1055 510 L1065 510Z" fill="#69F0AE"/>
    <path d="M1060 520 L1055 510 L1065 510Z" fill="#69F0AE"/>
  </g>
</svg>