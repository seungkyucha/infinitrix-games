<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Body gradient - lab suit blue -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <!-- Visor glow -->
    <radialGradient id="visorGlow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="60%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </radialGradient>
    <!-- Jetpack flame -->
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="40%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#F44336" stop-opacity="0"/>
    </linearGradient>
    <!-- Energy core -->
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Helmet highlight -->
    <linearGradient id="helmetHL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Rim light -->
    <linearGradient id="rimLight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80D8FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#80D8FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Gravity aura (signature element) -->
  <g opacity="0.3" filter="url(#softGlow)">
    <ellipse cx="64" cy="64" rx="50" ry="50" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="8 6"/>
    <ellipse cx="64" cy="64" rx="42" ry="42" fill="none" stroke="#69F0AE" stroke-width="1" stroke-dasharray="5 8"/>
  </g>

  <!-- Jetpack flames (behind body) -->
  <g id="flames">
    <path d="M42 88 Q40 105 38 118 Q42 110 44 88Z" fill="url(#flameGrad)" opacity="0.9"/>
    <path d="M48 90 Q47 108 45 120 Q49 112 50 90Z" fill="url(#flameGrad)" opacity="0.7"/>
    <path d="M80 88 Q82 105 84 118 Q80 110 78 88Z" fill="url(#flameGrad)" opacity="0.9"/>
    <path d="M74 90 Q75 108 77 120 Q73 112 72 90Z" fill="url(#flameGrad)" opacity="0.7"/>
  </g>

  <!-- Legs / boots -->
  <g id="legs">
    <path d="M48 82 L46 96 Q45 100 48 100 L54 100 Q57 100 56 96 L54 82Z" fill="#0277BD" stroke="#01579B" stroke-width="0.5"/>
    <path d="M70 82 L68 96 Q67 100 70 100 L76 100 Q79 100 78 96 L76 82Z" fill="#0277BD" stroke="#01579B" stroke-width="0.5"/>
    <!-- Boot accents -->
    <rect x="46" y="94" width="12" height="2" rx="1" fill="#4FC3F7" opacity="0.6"/>
    <rect x="68" y="94" width="12" height="2" rx="1" fill="#4FC3F7" opacity="0.6"/>
  </g>

  <!-- Body / torso -->
  <g id="body">
    <path d="M44 40 Q40 45 40 55 L40 80 Q40 86 48 86 L76 86 Q84 86 84 80 L84 55 Q84 45 80 40Z" fill="url(#bodyGrad)" stroke="#0277BD" stroke-width="0.8"/>
    <!-- Suit lines -->
    <line x1="64" y1="42" x2="64" y2="84" stroke="#4FC3F7" stroke-width="0.5" opacity="0.4"/>
    <path d="M46 55 Q64 50 82 55" fill="none" stroke="#4FC3F7" stroke-width="0.5" opacity="0.4"/>
    <!-- Belt -->
    <rect x="42" y="72" width="40" height="4" rx="2" fill="#01579B"/>
    <rect x="58" y="71" width="8" height="6" rx="1" fill="#FFD600" stroke="#F9A825" stroke-width="0.5"/>
    <!-- Gravity core on chest -->
    <circle cx="64" cy="58" r="8" fill="url(#coreGlow)" filter="url(#glow)"/>
    <circle cx="64" cy="58" r="5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
    <!-- Gravity arrows on chest -->
    <path d="M64 50 L61 54 L67 54Z" fill="#FFFFFF" opacity="0.8"/>
    <path d="M64 66 L61 62 L67 62Z" fill="#FFFFFF" opacity="0.8"/>
    <!-- Shoulder pads -->
    <ellipse cx="42" cy="48" rx="6" ry="4" fill="#0288D1" stroke="#4FC3F7" stroke-width="0.5"/>
    <ellipse cx="86" cy="48" rx="6" ry="4" fill="#0288D1" stroke="#4FC3F7" stroke-width="0.5"/>
  </g>

  <!-- Arms -->
  <g id="arms">
    <path d="M38 48 Q32 55 30 65 Q28 70 32 70 L36 68 Q40 64 40 55Z" fill="url(#bodyGrad)" stroke="#0277BD" stroke-width="0.5"/>
    <path d="M86 48 Q92 55 94 65 Q96 70 92 70 L88 68 Q84 64 84 55Z" fill="url(#bodyGrad)" stroke="#0277BD" stroke-width="0.5"/>
    <!-- Gloves -->
    <ellipse cx="31" cy="70" rx="4" ry="3" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="0.5"/>
    <ellipse cx="93" cy="70" rx="4" ry="3" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="0.5"/>
  </g>

  <!-- Jetpack backpack -->
  <g id="jetpack">
    <rect x="46" y="44" width="6" height="20" rx="3" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
    <rect x="76" y="44" width="6" height="20" rx="3" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
    <rect x="50" y="48" width="24" height="16" rx="3" fill="#546E7A" stroke="#455A64" stroke-width="0.5"/>
    <!-- Jetpack vents -->
    <circle cx="55" cy="56" r="2" fill="#FF5722" opacity="0.8"/>
    <circle cx="69" cy="56" r="2" fill="#FF5722" opacity="0.8"/>
    <rect x="52" y="60" width="6" height="1" rx="0.5" fill="#78909C"/>
    <rect x="66" y="60" width="6" height="1" rx="0.5" fill="#78909C"/>
  </g>

  <!-- Head / helmet -->
  <g id="head">
    <!-- Helmet base -->
    <path d="M46 16 Q44 14 44 20 L44 38 Q44 44 52 44 L76 44 Q84 44 84 38 L84 20 Q84 14 78 14 L50 14 Q46 14 46 16Z" fill="#263238" stroke="#37474F" stroke-width="0.8"/>
    <!-- Visor -->
    <path d="M48 22 Q48 18 54 18 L74 18 Q80 18 80 22 L80 34 Q80 40 74 40 L54 40 Q48 40 48 34Z" fill="url(#visorGlow)" stroke="#4FC3F7" stroke-width="1"/>
    <!-- Visor reflection -->
    <path d="M50 20 Q50 19 55 19 L65 19 Q68 19 68 22 L58 28 Q50 26 50 20Z" fill="url(#helmetHL)"/>
    <!-- Eyes inside visor -->
    <ellipse cx="57" cy="30" rx="4" ry="5" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="71" cy="30" rx="4" ry="5" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="58" cy="31" rx="2" ry="2.5" fill="#0D47A1"/>
    <ellipse cx="72" cy="31" rx="2" ry="2.5" fill="#0D47A1"/>
    <!-- Eye highlights -->
    <circle cx="59" cy="29.5" r="1" fill="#FFFFFF"/>
    <circle cx="73" cy="29.5" r="1" fill="#FFFFFF"/>
    <!-- Helmet antenna -->
    <line x1="64" y1="14" x2="64" y2="6" stroke="#78909C" stroke-width="1.5"/>
    <circle cx="64" cy="5" r="2.5" fill="#69F0AE" filter="url(#glow)"/>
    <!-- Helmet side lights -->
    <circle cx="45" cy="28" r="1.5" fill="#FF5722" opacity="0.9"/>
    <circle cx="83" cy="28" r="1.5" fill="#69F0AE" opacity="0.9"/>
    <!-- Chin guard -->
    <path d="M52 40 Q64 46 76 40" fill="none" stroke="#455A64" stroke-width="1"/>
  </g>

  <!-- Rim light overlay -->
  <path d="M44 14 Q84 14 84 38 L84 86 Q84 86 80 86" fill="none" stroke="url(#rimLight)" stroke-width="1.5" opacity="0.5"/>
</svg>