    <ellipse cx="200" cy="300" rx="150" ry="40" fill="#E040FB"/>
    <ellipse cx="700" cy="350" rx="180" ry="35" fill="#00BCD4"/>
    <ellipse cx="1050" cy="280" rx="120" ry="30" fill="#7C4DFF"/>
  </g>

  <!-- Distant antenna arrays -->
  <g opacity="0.1">
    <line x1="550" y1="400" x2="550" y2="350" stroke="#546E7A" stroke-width="1"/>
    <circle cx="550" cy="348" r="3" fill="none" stroke="#4FC3F7" stroke-width="0.5"/>
    <line x1="700" y1="420" x2="700" y2="370" stroke="#546E7A" stroke-width="1"/>
    <circle cx="700" cy="368" r="3" fill="none" stroke="#FF5252" stroke-width="0.5"/>
    <line x1="850" y1="410" x2="850" y2="360" stroke="#546E7A" stroke-width="1"/>
    <line x1="840" y1="365" x2="860" y2="365" stroke="#546E7A" stroke-width="0.5"/>
  </g>

  <!-- Constellation lines -->
  <g opacity="0.06" stroke="#B3E5FC" stroke-width="0.5">
    <line x1="200" y1="20" x2="280" y2="80"/>
    <line x1="280" y1="80" x2="350" y2="40"/>
    <line x1="350" y1="40" x2="420" y2="15"/>
    <line x1="650" y1="70" x2="730" y2="35"/>
    <line x1="730" y1="35" x2="800" y2="50"/>
    <line x1="950" y1="65" x2="1030" y2="30"/>
    <line x1="1030" y1="30" x2="1100" y2="45"/>
  </g>

  <!-- Gravity wave pulse rings -->
  <g opacity="0.05">
    <circle cx="400" cy="500" r="80" fill="none" stroke="#69F0AE" stroke-width="1.5"/>
    <circle cx="400" cy="500" r="100" fill="none" stroke="#69F0AE" stroke-width="1"/>
    <circle cx="400" cy="500" r="120" fill="none" stroke="#69F0AE" stroke-width="0.5"/>
    <circle cx="800" cy="480" r="70" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="800" cy="480" r="90" fill="none" stroke="#4FC3F7" stroke-width="1"/>
    <circle cx="800" cy="480" r="110" fill="none" stroke="#4FC3F7" stroke-width="0.5"/>
  </g>
</svg>