  <!-- Distant lab structures (far background) -->
  <g opacity="0.15">
    <!-- Tower 1 -->
    <rect x="100" y="350" width="40" height="250" fill="#1A237E"/>
    <rect x="105" y="360" width="8" height="12" rx="1" fill="#4FC3F7" opacity="0.5"/>
    <rect x="120" y="380" width="8" height="12" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <circle cx="120" cy="350" r="15" fill="none" stroke="#4FC3F7" stroke-width="0.8" opacity="0.4"/>
    <!-- Tower 2 -->
    <rect x="300" y="380" width="50" height="220" fill="#1A237E"/>
    <rect x="310" y="390" width="10" height="14" rx="1" fill="#69F0AE" opacity="0.4"/>
    <rect x="330" y="410" width="10" height="14" rx="1" fill="#69F0AE" opacity="0.3"/>
    <!-- Tower 3 -->
    <rect x="800" y="360" width="35" height="240" fill="#1A237E"/>
    <rect x="805" y="370" width="8" height="10" rx="1" fill="#FF5252" opacity="0.3"/>
    <!-- Tower 4 -->
    <rect x="1000" y="390" width="45" height="210" fill="#1A237E"/>
    <circle cx="1022" cy="395" r="10" fill="none" stroke="#FF5252" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Atmospheric fog layers -->
  <g filter="url(#bgGlow)">
    <ellipse cx="300" cy="500" rx="400" ry="60" fill="#1A237E" opacity="0.15"/>
    <ellipse cx="900" cy="520" rx="350" ry="50" fill="#283593" opacity="0.12"/>
    <ellipse cx="600" cy="480" rx="300" ry="40" fill="#4A148C" opacity="0.08"/>
  </g>

  <!-- Distant mountain/terrain line -->
  <path d="M0 550 Q100 500 200 530 Q350 480 500 520 Q600 490 700 510 Q850 470 950 500 Q1050 480 1100 510 L1200 520 L1200 800 L0 800Z" fill="#0D1B2A" opacity="0.4"/>

  <!-- Grid pattern (lab floor distant) -->
  <g opacity="0.06" stroke="#4FC3F7" stroke-width="0.5">
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="650" x2="1200" y2="650"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="750" x2="1200" y2="750"/>
    <line x1="100" y1="550" x2="100" y2="800"/>
    <line x1="250" y1="550" x2="250" y2="800"/>
    <line x1="400" y1="550" x2="400" y2="800"/>
    <line x1="550" y1="550" x2="550" y2="800"/>
    <line x1="700" y1="550" x2="700" y2="800"/>
    <line x1="850" y1="550" x2="850" y2="800"/>
    <line x1="1000" y1="550" x2="1000" y2="800"/>
    <line x1="1150" y1="550" x2="1150" y2="800"/>
  </g>

  <!-- Gravity distortion waves (signature) -->
  <g opacity="0.08" filter="url(#bgSoftGlow)">
    <path d="M0 400 Q300 380 600 400 Q900 420 1200 400" fill="none" stroke="#69F0AE" stroke-width="2"/>
    <path d="M0 410 Q300 430 600 410 Q900 390 1200 410" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <path d="M0 420 Q300 400 600 420 Q900 440 1200 420" fill="none" stroke="#69F0AE" stroke-width="1"/>
  </g>

  <!-- Distant floating debris (gravity anomaly) -->
  <g opacity="0.12">
    <rect x="180" y="300" width="8" height="8" rx="1" fill="#455A64" transform="rotate(20 184 304)"/>
    <rect x="520" y="250" width="6" height="10" rx="1" fill="#37474F" transform="rotate(-15 523 255)"/>
    <rect x="750" y="280" width="10" height="6" rx="1" fill="#455A64" transform="rotate(35 755 283)"/>
    <rect x="1050" y="260" width="7" height="7" rx="1" fill="#37474F" transform="rotate(-25 1053 263)"/>
    <rect x="380" y="320" width="5" height="8" rx="1" fill="#455A64" transform="rotate(40 382 324)"/>
    <rect x="920" y="310" width="8" height="5" rx="1" fill="#37474F" transform="rotate(-30 924 312)"/>
  </g>

  <!-- Meteors -->
  <g opacity="0.25">
    <line x1="200" y1="80" x2="240" y2="120" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="202" y1="80" x2="210" y2="88" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
    <line x1="900" y1="150" x2="930" y2="180" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Warning lights on distant structures -->
  <g filter="url(#bgSoftGlow)">
    <circle cx="120" cy="350" r="2" fill="#FF5252" opacity="0.6"/>
    <circle cx="325" cy="380" r="2" fill="#69F0AE" opacity="0.5"/>
    <circle cx="817" cy="360" r="2" fill="#FF5252" opacity="0.6"/>
    <circle cx="1022" cy="390" r="2" fill="#FFEB3B" opacity="0.5"/>
  </g>

  <!-- Additional star clusters for density -->
  <g fill="#FFFFFF">
    <circle cx="30" cy="380" r="0.6" opacity="0.5"/><circle cx="90" cy="440" r="0.7" opacity="0.4"/>
    <circle cx="170" cy="460" r="0.5" opacity="0.6"/><circle cx="260" cy="430" r="0.8" opacity="0.3"/>
    <circle cx="350" cy="450" r="0.6" opacity="0.5"/><circle cx="440" cy="420" r="0.7" opacity="0.4"/>
    <circle cx="530" cy="440" r="0.5" opacity="0.6"/><circle cx="620" cy="410" r="0.8" opacity="0.3"/>
    <circle cx="710" cy="450" r="0.6" opacity="0.5"/><circle cx="800" cy="430" r="0.7" opacity="0.4"/>
    <circle cx="890" cy="460" r="0.5" opacity="0.6"/><circle cx="980" cy="420" r="0.8" opacity="0.3"/>
    <circle cx="1070" cy="440" r="0.6" opacity="0.5"/><circle cx="1160" cy="430" r="0.7" opacity="0.4"/>
  </g>

  <!-- Additional nebula wisps -->
