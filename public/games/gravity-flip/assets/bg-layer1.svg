<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="40%" stop-color="#1B2838"/>
      <stop offset="70%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="0.3" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="#4A148C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.7" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#01579B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="0.5" cy="0.7" r="0.3">
      <stop offset="0%" stop-color="#1B5E20" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1B5E20" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="labWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="bgGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="bgSoftGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <!-- Nebulae -->
  <rect width="1200" height="800" fill="url(#nebula1)"/>
  <rect width="1200" height="800" fill="url(#nebula2)"/>
  <rect width="1200" height="800" fill="url(#nebula3)"/>

  <!-- Stars (80+ tiny dots) -->
  <g fill="#FFFFFF">
    <circle cx="50" cy="30" r="1" opacity="0.8"/><circle cx="120" cy="60" r="0.7" opacity="0.6"/>
    <circle cx="200" cy="20" r="1.2" opacity="0.9"/><circle cx="280" cy="80" r="0.8" opacity="0.5"/>
    <circle cx="350" cy="40" r="1" opacity="0.7"/><circle cx="420" cy="15" r="0.6" opacity="0.8"/>
    <circle cx="500" cy="55" r="1.1" opacity="0.6"/><circle cx="580" cy="25" r="0.9" opacity="0.7"/>
    <circle cx="650" cy="70" r="0.7" opacity="0.9"/><circle cx="730" cy="35" r="1" opacity="0.5"/>
    <circle cx="800" cy="50" r="0.8" opacity="0.8"/><circle cx="880" cy="20" r="1.2" opacity="0.6"/>
    <circle cx="950" cy="65" r="0.7" opacity="0.7"/><circle cx="1030" cy="30" r="1" opacity="0.9"/>
    <circle cx="1100" cy="45" r="0.9" opacity="0.5"/><circle cx="1170" cy="75" r="0.6" opacity="0.8"/>
    <circle cx="80" cy="120" r="0.8" opacity="0.7"/><circle cx="160" cy="140" r="1" opacity="0.6"/>
    <circle cx="240" cy="110" r="0.7" opacity="0.9"/><circle cx="320" cy="150" r="1.1" opacity="0.5"/>
    <circle cx="400" cy="130" r="0.9" opacity="0.8"/><circle cx="480" cy="100" r="0.6" opacity="0.7"/>
    <circle cx="560" cy="160" r="1" opacity="0.6"/><circle cx="640" cy="120" r="0.8" opacity="0.9"/>
    <circle cx="720" cy="145" r="0.7" opacity="0.5"/><circle cx="800" cy="110" r="1.2" opacity="0.7"/>
    <circle cx="880" cy="135" r="0.9" opacity="0.8"/><circle cx="960" cy="105" r="0.7" opacity="0.6"/>
    <circle cx="1040" cy="155" r="1" opacity="0.9"/><circle cx="1120" cy="125" r="0.8" opacity="0.5"/>
    <circle cx="70" cy="200" r="1" opacity="0.6"/><circle cx="150" cy="220" r="0.7" opacity="0.8"/>
    <circle cx="230" cy="190" r="1.1" opacity="0.7"/><circle cx="310" cy="230" r="0.8" opacity="0.5"/>
    <circle cx="390" cy="210" r="0.9" opacity="0.9"/><circle cx="470" cy="180" r="0.6" opacity="0.7"/>
    <circle cx="550" cy="240" r="1" opacity="0.5"/><circle cx="630" cy="200" r="0.8" opacity="0.8"/>
    <circle cx="710" cy="225" r="0.7" opacity="0.6"/><circle cx="790" cy="195" r="1.2" opacity="0.9"/>
    <circle cx="870" cy="215" r="0.9" opacity="0.7"/><circle cx="950" cy="185" r="0.7" opacity="0.5"/>
    <circle cx="1030" cy="235" r="1" opacity="0.8"/><circle cx="1110" cy="205" r="0.8" opacity="0.6"/>
    <circle cx="45" cy="280" r="0.7" opacity="0.9"/><circle cx="135" cy="300" r="1" opacity="0.5"/>
    <circle cx="225" cy="270" r="0.8" opacity="0.7"/><circle cx="315" cy="310" r="1.1" opacity="0.6"/>
    <circle cx="405" cy="290" r="0.9" opacity="0.8"/><circle cx="495" cy="260" r="0.6" opacity="0.9"/>
    <circle cx="585" cy="320" r="1" opacity="0.5"/><circle cx="675" cy="280" r="0.7" opacity="0.7"/>
    <circle cx="765" cy="305" r="0.8" opacity="0.6"/><circle cx="855" cy="275" r="1.2" opacity="0.8"/>
    <circle cx="945" cy="295" r="0.9" opacity="0.9"/><circle cx="1035" cy="265" r="0.7" opacity="0.5"/>
    <circle cx="1125" cy="315" r="1" opacity="0.7"/><circle cx="100" cy="350" r="0.8" opacity="0.6"/>
    <circle cx="250" cy="340" r="0.7" opacity="0.8"/><circle cx="400" cy="360" r="1" opacity="0.5"/>
    <circle cx="550" cy="345" r="0.9" opacity="0.7"/><circle cx="700" cy="355" r="0.6" opacity="0.9"/>
    <circle cx="850" cy="340" r="1.1" opacity="0.6"/><circle cx="1000" cy="365" r="0.8" opacity="0.8"/>
