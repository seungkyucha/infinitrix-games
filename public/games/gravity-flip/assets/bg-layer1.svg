    <circle cx="660" cy="415" r="0.6" opacity="0.3"/><circle cx="820" cy="395" r="0.8" opacity="0.5"/>
    <circle cx="980" cy="405" r="0.5" opacity="0.4"/><circle cx="1140" cy="385" r="0.7" opacity="0.3"/>
