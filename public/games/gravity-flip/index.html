}

// Death screen (within PLAY state) — enhanced with effect-hit overlay [Fix: Issue #8]
function renderDeathOverlay(ctx, w, h) {
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 1;

  // Show effect-hit.svg at player position if available
  if (assets.sprites.effectHit && G.respawnTimer > RESPAWN_DELAY * 0.3) {
    const scale = h / GAME_H;
    const px = G.px * scale - G.camX * scale;
    const py = G.py * scale;
    const effectSize = 80 * scale;
    const flashAlpha = clamp(G.respawnTimer / RESPAWN_DELAY, 0, 1);
    ctx.globalAlpha = flashAlpha * 0.8;
    ctx.drawImage(assets.sprites.effectHit, px - effectSize / 2, py - effectSize / 2, effectSize, effectSize);
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 11: RENDERING (Pure functions) [F9]
// ═══════════════════════════════════════════════════════════════

function drawPlayerShape(ctx, x, y, size, gravDir, pose, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  if (gravDir === -1) ctx.scale(1, -1);

  const hs = size / 2;

  // Body (rounded square)
  ctx.fillStyle = PLAYER_COLOR;
  ctx.beginPath();
  ctx.roundRect(-hs, -hs, size, size, size * 0.25);
  ctx.fill();

  // Eyes
  const eyeSize = size * 0.15;
  const eyeY = -size * 0.1;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-hs * 0.5 - eyeSize / 2, eyeY - eyeSize / 2, eyeSize, eyeSize);
  ctx.fillRect(hs * 0.5 - eyeSize / 2, eyeY - eyeSize / 2, eyeSize, eyeSize);

  // Pupils
  ctx.fillStyle = '#000';
  const pupilSize = eyeSize * 0.5;
  ctx.fillRect(-hs * 0.5 - pupilSize / 2 + 1, eyeY - pupilSize / 2, pupilSize, pupilSize);
  ctx.fillRect(hs * 0.5 - pupilSize / 2 + 1, eyeY - pupilSize / 2, pupilSize, pupilSize);

  // Gravity direction arrow
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  const arrowY = hs * 0.6;
  ctx.beginPath();
  ctx.moveTo(0, arrowY - 4);
  ctx.lineTo(0, arrowY + 4);
  ctx.moveTo(-3, arrowY + 1);
  ctx.lineTo(0, arrowY + 4);
  ctx.lineTo(3, arrowY + 1);
  ctx.stroke();

  // Death pose — enhanced with rotation, cracks, and effect-hit overlay [Fix: Issue #10]
  if (pose === 3) {
    // Crack lines radiating from center
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-hs, -hs); ctx.lineTo(hs, hs);
    ctx.moveTo(hs, -hs); ctx.lineTo(-hs, hs);
    ctx.moveTo(0, -hs); ctx.lineTo(0, hs);
    ctx.moveTo(-hs, 0); ctx.lineTo(hs, 0);
    ctx.stroke();

    // Red overlay flash
    ctx.fillStyle = '#ff333366';
    ctx.beginPath();
    ctx.roundRect(-hs, -hs, size, size, size * 0.25);
    ctx.fill();

    // Shatter fragments
    ctx.fillStyle = PLAYER_COLOR + '88';
    ctx.fillRect(-hs * 0.8, -hs * 0.3, size * 0.2, size * 0.15);
    ctx.fillRect(hs * 0.2, hs * 0.1, size * 0.15, size * 0.2);
    ctx.fillRect(-hs * 0.3, hs * 0.3, size * 0.25, size * 0.1);

    // effect-hit overlay if available
    if (assets.sprites.effectHit) {
      ctx.globalAlpha = 0.6;
      ctx.drawImage(assets.sprites.effectHit, -hs * 1.5, -hs * 1.5, size * 1.5, size * 1.5);
      ctx.globalAlpha = alpha;
    }
  }

  ctx.restore();
}

function drawSpike(ctx, x, y, tileSize, direction, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.translate(x + tileSize / 2, y + tileSize / 2);

  switch (direction) {
    case 'up':
      ctx.beginPath();
      ctx.moveTo(0, -tileSize / 2);
      ctx.lineTo(tileSize / 2, tileSize / 2);
      ctx.lineTo(-tileSize / 2, tileSize / 2);
      ctx.closePath();
      ctx.fill();
      break;
    case 'down':
      ctx.beginPath();
      ctx.moveTo(0, tileSize / 2);
      ctx.lineTo(tileSize / 2, -tileSize / 2);
      ctx.lineTo(-tileSize / 2, -tileSize / 2);
      ctx.closePath();
      ctx.fill();
      break;
    default: // bottom spikes
      ctx.beginPath();
      ctx.moveTo(0, -tileSize / 2);
      ctx.lineTo(tileSize / 2, tileSize / 2);
      ctx.lineTo(-tileSize / 2, tileSize / 2);
      ctx.closePath();
      ctx.fill();
  }
  ctx.restore();
}

function drawPortal(ctx, x, y, size, time) {
  ctx.save();
  ctx.translate(x, y);

  // Outer glow
  const glowSize = size * (1.2 + Math.sin(time * 0.005) * 0.2);
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#00ccff';
  ctx.beginPath();
  ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
  ctx.fill();

  // Inner portal
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#00eeff';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Rotating ring
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  const rot = time * 0.003;
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.6, rot, 0, Math.PI * 2);
  ctx.stroke();

  // Center bright spot
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCoin(ctx, x, y, size, time) {
  ctx.save();
  ctx.translate(x, y);

  const bobY = Math.sin(time * 0.005 + x * 0.01) * 3;
  ctx.translate(0, bobY);

  // Coin body
  const scale = 0.7 + Math.abs(Math.sin(time * 0.004)) * 0.3;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * scale, size, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = '#ffee88';
  ctx.beginPath();
  ctx.ellipse(-size * 0.2, -size * 0.2, size * 0.3 * scale, size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawGravityArrows(ctx, x, y, size, time) {
  ctx.save();
  ctx.translate(x, y);

  const bounce = Math.sin(time * 0.004) * 10;

  // Up arrow
  ctx.fillStyle = '#00eeff';
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, -size / 2 + bounce);
  ctx.lineTo(size / 3, -size / 6 + bounce);
  ctx.lineTo(-size / 3, -size / 6 + bounce);
  ctx.closePath();
  ctx.fill();

  // Down arrow
  ctx.beginPath();
  ctx.moveTo(0, size / 2 - bounce);
  ctx.lineTo(size / 3, size / 6 - bounce);
  ctx.lineTo(-size / 3, size / 6 - bounce);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawStarfield(ctx, w, h, time) {
  const rng = new SeededRNG(12345);
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 80; i++) {
    const sx = rng.range(0, w);
    const sy = rng.range(0, h);
    const ss = rng.range(0.5, 2);
    const twinkle = 0.3 + Math.sin(time * 0.002 + i * 0.5) * 0.3;
    ctx.globalAlpha = twinkle;
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1;
}

function drawBossShape(ctx, boss, time, zoneColors) {
  if (!boss || !boss.alive) return;

  ctx.save();
  ctx.translate(boss.x, boss.y);

  const flash = boss.hitFlash > 0 && Math.floor(boss.hitFlash / 50) % 2 === 0;

  // Use enemy sprite if available
  if (assets.sprites.enemy && !flash) {
    ctx.drawImage(assets.sprites.enemy, -boss.w / 2, -boss.h / 2, boss.w, boss.h);
  } else {
    // Enhanced fallback shape — hexagonal armored drone [Fix: Issue #9]
    const r = boss.w / 2;

    // Outer shell glow
    ctx.shadowColor = flash ? '#fff' : zoneColors.danger;
    ctx.shadowBlur = 12;

    // Hexagonal body
    ctx.fillStyle = flash ? '#ffffff' : '#1a1a2e';
    ctx.strokeStyle = flash ? '#ffffff' : zoneColors.danger;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner core
    ctx.fillStyle = flash ? '#ff0000' : zoneColors.danger + '88';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.45, 0, Math.PI * 2);
    ctx.fill();

    // Main eye — menacing single red eye
    ctx.fillStyle = flash ? '#ff0000' : '#ffff00';
    ctx.beginPath();
    ctx.ellipse(0, -4, r * 0.22, r * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(2, -4, r * 0.08, 0, Math.PI * 2);
    ctx.fill();
    // Eye glow
    ctx.fillStyle = '#ff000044';
    ctx.beginPath();
    ctx.arc(0, -4, r * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Rotating spikes (8 triangular protrusions)
    ctx.fillStyle = zoneColors.danger;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + time * 0.002;
      const r1 = r;
      const r2 = r + 12;
      const spread = 0.15;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a - spread) * r1, Math.sin(a - spread) * r1);
      ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
      ctx.lineTo(Math.cos(a + spread) * r1, Math.sin(a + spread) * r1);
      ctx.closePath();
      ctx.fill();
    }

    // Warning symbol on body
    ctx.strokeStyle = flash ? '#fff' : '#ffff0088';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, 6); ctx.lineTo(-6, 16); ctx.lineTo(6, 16); ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(-1, 9, 2, 4);
    ctx.fillRect(-1, 14, 2, 2);
  }

  // Vulnerability indicator
  if (boss.vulnerable) {
    ctx.strokeStyle = '#33ff88';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + Math.sin(time * 0.01) * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, boss.w / 2 + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// Render boss attacks
function renderBossAttacks(ctx, boss, w, h, time) {
  if (!boss || !boss.alive) return;

  const zc = ZONE_COLORS[boss.type];

  switch (boss.type) {
    case 0: // DR-01: laser sweep line
      if (!boss.vulnerable) {
        ctx.fillStyle = '#ff333388';
        ctx.fillRect(0, boss.sweepY - 8, w, 16);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(0, boss.sweepY - 2, w, 4);
      }
      break;

    case 1: // CR-02: crush zones
      if (!boss.vulnerable) {
        const crushH = 80;
        ctx.fillStyle = '#ff333344';
        if (boss.crushTop) {
          ctx.fillRect(0, 0, w, crushH);
          // Warning stripes
          drawDangerStripes(ctx, 0, crushH - 10, w, 10, time);
        } else {
          ctx.fillRect(0, h - crushH, w, crushH);
          drawDangerStripes(ctx, 0, h - crushH, w, 10, time);
        }
      }
      break;

    case 2: // RX-03: laser grid
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.6;
      if (boss.laserPattern === 0) {
        // Cross
        ctx.strokeStyle = '#ff3366';
        ctx.beginPath();
        ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h);
        ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2);
        ctx.stroke();
      } else if (boss.laserPattern === 1) {
        // X
        ctx.strokeStyle = '#ff3366';
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(w, h);
        ctx.moveTo(w, 0); ctx.lineTo(0, h);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;

    case 3: // GV-04: magnetic field visualization
      if (!boss.vulnerable) {
        ctx.strokeStyle = '#cc33ff44';
        ctx.lineWidth = 1;
        for (let r = 50; r < 200; r += 30) {
          ctx.beginPath();
          ctx.arc(boss.x, boss.y, r, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      break;

    case 4: // NX-05: collapse visualization
      if (boss.collapseWaves > 0) {
        const waveX = boss.collapseWaves * 100;
        ctx.fillStyle = `rgba(255,0,0,${0.1 * boss.collapseWaves})`;
        ctx.fillRect(0, 0, waveX, h);
        // Danger zone indicators
        ctx.fillStyle = '#ff000044';
        ctx.fillRect(0, 0, w, 40);
        ctx.fillRect(0, h - 40, w, 40);
      }
      break;
  }
}

function drawDangerStripes(ctx, x, y, w, h, time) {
  ctx.save();
  ctx.fillStyle = '#ff3333';
  const stripeW = 20;
  const offset = (time * 0.05) % stripeW;
  for (let sx = x - stripeW + offset; sx < x + w; sx += stripeW) {
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(sx + stripeW / 2, y);
    ctx.lineTo(sx + stripeW, y + h);
    ctx.lineTo(sx + stripeW / 2, y + h);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// Main stage render
function renderStage(ctx, w, h, time) {
  const scale = h / GAME_H;
  const zc = ZONE_COLORS[G.currentZone];

  ctx.save();

  // Camera shake
  const shake = UI.shake(G.camShake);
  ctx.translate(shake.x, shake.y);

  // Camera zoom
  const zoom = G.camZoom;
  if (zoom !== 1) {
    ctx.translate(w / 2, h / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-w / 2, -h / 2);
  }

  // Camera scroll
  const camOffsetX = G.camX * scale;
  ctx.translate(-camOffsetX, 0);

  // Background layers
  drawBackground(ctx, w, h, G.camX, time, zc);

  // Ghost path (DDA)
  if (G.ddaLevel >= 2 && G.ghostPath.length > 0) {
    ctx.strokeStyle = '#33ff8833';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    for (let i = 0; i < G.ghostPath.length; i++) {
      const gp = G.ghostPath[i];
      const sx = gp.x * scale;
      const sy = gp.y * scale;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Tiles
  const startTileX = Math.max(0, Math.floor(G.camX / TILE_SIZE) - 2);
  const endTileX = Math.min(G.tiles[0] ? G.tiles[0].length : 0, startTileX + Math.ceil(w / (TILE_SIZE * scale)) + 4);

  for (let ty = 0; ty < TILES_Y; ty++) {
    for (let tx = startTileX; tx < endTileX; tx++) {
      if (!G.tiles[ty] || G.tiles[ty][tx] === undefined) continue;
      const tile = G.tiles[ty][tx];
      const sx = tx * TILE_SIZE * scale;
      const sy = ty * TILE_SIZE * scale;
      const ts = TILE_SIZE * scale;

      switch (tile) {
        case T_SOLID:
          ctx.fillStyle = zc.bg2;
          ctx.fillRect(sx, sy, ts, ts);
          ctx.strokeStyle = zc.danger + '33';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(sx, sy, ts, ts);
          break;
        case T_SPIKE:
          drawSpike(ctx, sx, sy, ts, ty <= 1 ? 'down' : 'up', zc.danger);
          break;
        case T_COIN:
          // Skip if collected (handled in coins array)
          break;
        case T_PORTAL:
          drawPortal(ctx, sx + ts / 2, sy + ts / 2, ts / 2, time);
          break;
      }
    }
  }

  // Moving platforms
  for (const mp of G.movingPlatforms) {
    ctx.fillStyle = zc.safe;
    ctx.fillRect(mp.x * scale, mp.y * scale, mp.w * scale, mp.h * scale);
    // Path indicator
    ctx.strokeStyle = zc.safe + '33';
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(
      (mp.baseX - mp.rangeX) * scale,
      (mp.baseY - mp.rangeY) * scale,
      (mp.rangeX * 2 + mp.w) * scale,
      (mp.rangeY * 2 + mp.h) * scale
    );
    ctx.setLineDash([]);
  }

  // Crushers
  for (const c of G.crushers) {
    // Warning
    if (c.warning) {
      ctx.fillStyle = '#ff333344';
      ctx.fillRect(c.x * scale, c.baseY * scale, c.w * scale, (c.targetY - c.baseY) * scale);
    }
    // Crusher body
    ctx.fillStyle = zc.danger;
    ctx.fillRect(c.x * scale, c.y * scale, c.w * scale, c.h * scale);
    // Danger stripes
    ctx.fillStyle = '#000';
    const stripeH = c.h * scale * 0.3;
    ctx.fillRect(c.x * scale, (c.y + c.h) * scale - stripeH, c.w * scale, stripeH);
  }

  // Lasers
  for (const l of G.lasers) {
    if (l.active) {
      ctx.fillStyle = zc.danger;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(l.x * scale, l.y * scale, l.w * scale, l.h * scale);
      // Glow
      ctx.fillStyle = zc.danger;
      ctx.globalAlpha = 0.2;
      ctx.fillRect(l.x * scale, (l.y - 6) * scale, l.w * scale, (l.h + 12) * scale);
      ctx.globalAlpha = 1;
    } else if (l.charging) {
      ctx.strokeStyle = zc.danger + '66';
      ctx.setLineDash([3, 5]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(l.x * scale, (l.y + l.h / 2) * scale);
      ctx.lineTo((l.x + l.w) * scale, (l.y + l.h / 2) * scale);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Vanish floors
  for (const vf of G.vanishFloors) {
    if (!vf.visible) continue;
    ctx.globalAlpha = vf.cracking ? (0.3 + Math.sin(time * 0.02) * 0.3) : 0.8;
    ctx.fillStyle = zc.safe;
    ctx.fillRect(vf.x * scale, vf.y * scale, vf.w * scale, vf.h * scale);
    if (vf.cracking) {
      // Crack lines
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo((vf.x + 5) * scale, vf.y * scale);
      ctx.lineTo((vf.x + vf.w / 2) * scale, (vf.y + vf.h) * scale);
      ctx.moveTo((vf.x + vf.w - 5) * scale, vf.y * scale);
      ctx.lineTo((vf.x + vf.w / 2) * scale, (vf.y + vf.h) * scale);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Gravity zones — use powerup.svg if available [Fix: Issue #7]
  for (const gz of G.gravZones) {
    ctx.fillStyle = '#cc33ff22';
    ctx.fillRect(gz.x * scale, gz.y * scale, gz.w * scale, gz.h * scale);
    ctx.strokeStyle = '#cc33ff66';
    ctx.lineWidth = 1;
    ctx.strokeRect(gz.x * scale, gz.y * scale, gz.w * scale, gz.h * scale);
    const cx = (gz.x + gz.w / 2) * scale;
    const cy = (gz.y + gz.h / 2) * scale;
    if (assets.sprites.powerup) {
      const pSize = TILE_SIZE * scale * 0.8;
      ctx.globalAlpha = 0.7 + Math.sin(time * 0.005 + gz.x) * 0.2;
      ctx.drawImage(assets.sprites.powerup, cx - pSize / 2, cy - pSize / 2, pSize, pSize);
      ctx.globalAlpha = 1;
    } else {
      drawGravityArrows(ctx, cx, cy, 15, time);
    }
  }

  // Flames [T6 §7.2] — directional burst rendering
  for (const fl of G.flames) {
    const fx = fl.x * scale;
    const fy = fl.y * scale;
    const fw = fl.w * scale;
    const fh = fl.h * scale;

    // Nozzle base
    ctx.fillStyle = '#666';
    ctx.fillRect(fx, fy, fw, TILE_SIZE * scale);

    if (fl.warning) {
      // Warning glow — nozzle turns orange
      ctx.fillStyle = '#ff880088';
      ctx.fillRect(fx + 2, fy + 2, fw - 4, TILE_SIZE * scale - 4);
    }
    if (fl.active) {
      // Flame burst
      const burstY = fl.dir === 'down' ? fy + TILE_SIZE * scale : fy - fh + TILE_SIZE * scale;
      const grad = ctx.createLinearGradient(fx, burstY, fx, burstY + fh);
      if (fl.dir === 'down') {
        grad.addColorStop(0, '#ff6600cc');
        grad.addColorStop(0.4, '#ff3300aa');
        grad.addColorStop(1, '#ff000022');
      } else {
        grad.addColorStop(0, '#ff000022');
        grad.addColorStop(0.6, '#ff3300aa');
        grad.addColorStop(1, '#ff6600cc');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(fx + 2, burstY, fw - 4, fh);
      // Inner bright core
      ctx.fillStyle = '#ffcc0066';
      ctx.fillRect(fx + fw * 0.3, burstY + fh * 0.1, fw * 0.4, fh * 0.5);
    }
  }

  // Magnets [T8 §7.2] — blue wave zones
  for (const mg of G.magnets) {
    const mx = mg.x * scale;
    const my = mg.y * scale;
    const mw = mg.w * scale;
    const mh = mg.h * scale;
    // Blue tinted zone
    const waveAlpha = 0.15 + Math.sin(mg.wavePhase) * 0.1;
    ctx.fillStyle = mg.speedMult < 1 ? `rgba(0,100,255,${waveAlpha})` : `rgba(255,100,0,${waveAlpha})`;
    ctx.fillRect(mx, my, mw, mh);
    // Wave rings
    ctx.strokeStyle = mg.speedMult < 1 ? '#4488ff44' : '#ff884444';
    ctx.lineWidth = 1;
    const wcx = mx + mw / 2;
    const wcy = my + mh / 2;
    for (let r = 5; r < mw / 2; r += 8) {
      ctx.globalAlpha = 0.3 + Math.sin(mg.wavePhase + r * 0.3) * 0.2;
      ctx.beginPath();
      ctx.arc(wcx, wcy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Speed indicator arrow
    const arrowDir = mg.speedMult < 1 ? '<<' : '>>';
    UI.text(ctx, arrowDir, wcx, wcy, { size: 8, color: mg.speedMult < 1 ? '#4488ff' : '#ff8844' });
  }

  // Chain collapse
  if (G.chainCollapse && G.chainCollapse.active) {
    const colX = G.chainCollapse.x * scale;
    // Destruction wall
    const grad = ctx.createLinearGradient(colX - 100, 0, colX, 0);
    grad.addColorStop(0, 'rgba(255,0,0,0)');
    grad.addColorStop(0.7, 'rgba(255,50,0,0.3)');
    grad.addColorStop(1, 'rgba(255,100,0,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(colX - 100, 0, 100, h);
    // Solid wall
    ctx.fillStyle = '#ff3300';
    ctx.fillRect(0, 0, colX, h);
  }

  // Coins (not collected)
  for (const c of G.coins) {
    if (c.collected) continue;
    drawCoin(ctx, c.x * scale, c.y * scale, 8 * scale, time);
  }

  // Player
  const px = G.px * scale;
  const py = G.py * scale;
  const ps = PLAYER_SIZE * scale;

  if (G.playState !== PS_DEAD || G.respawnTimer > RESPAWN_DELAY * 0.5) {
    if (assets.sprites.player && G.pose !== 3) {
      ctx.save();
      ctx.globalAlpha = G.playerAlpha;
      ctx.translate(px, py);
      if (G.gravDir === -1) ctx.scale(1, -1);
      ctx.drawImage(assets.sprites.player, -ps / 2, -ps / 2, ps, ps);
      ctx.restore();
    } else {
      drawPlayerShape(ctx, px, py, ps, G.gravDir, G.pose, G.playerAlpha);
    }

    // Dash afterimage
    if (G.dashActive) {
      ctx.globalAlpha = 0.3;
      drawPlayerShape(ctx, px - 15 * scale, py, ps * 0.8, G.gravDir, 2, 0.3);
      drawPlayerShape(ctx, px - 30 * scale, py, ps * 0.6, G.gravDir, 2, 0.15);
      ctx.globalAlpha = 1;
    }
  }

  // Powerup sprite (if available and relevant)
  // (Powerups would spawn here in future expansion)

  ctx.restore();
}

function drawBackground(ctx, w, h, camX, time, zc) {
  // Base gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, zc.bg);
  grad.addColorStop(1, zc.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(camX * (h / GAME_H), 0, w + 100, h);

  // Background layer 1 (parallax far)
  if (assets.sprites.bgLayer1) {
    ctx.globalAlpha = 0.15;
    const bgW = 1200;
    const parallax1 = -(camX * 0.1) % bgW;
    ctx.drawImage(assets.sprites.bgLayer1, parallax1, 0, bgW, h);
    ctx.drawImage(assets.sprites.bgLayer1, parallax1 + bgW, 0, bgW, h);
    ctx.globalAlpha = 1;
  }

  // Background layer 2 (parallax near)
  if (assets.sprites.bgLayer2) {
    ctx.globalAlpha = 0.25;
    const bgW = 1200;
    const parallax2 = -(camX * 0.3) % bgW;
    ctx.drawImage(assets.sprites.bgLayer2, parallax2, 0, bgW, h);
    ctx.drawImage(assets.sprites.bgLayer2, parallax2 + bgW, 0, bgW, h);
    ctx.globalAlpha = 1;
  }

  // Grid pattern (subtle)
  ctx.strokeStyle = zc.danger + '0a';
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  const offsetX = -(camX * 0.5) % gridSize;
  for (let x = offsetX; x < w + gridSize; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = 0; y < h; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w + 100, y);
    ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 12: AUDIO (BGM + SFX) [F19]
// ═══════════════════════════════════════════════════════════════

let audioCtx = null;
let bgmGain = null;
let currentBGM = '';
let bgmScheduledUntil = 0;
let bgmNoteIndex = 0;
let bgmData = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.15;
    bgmGain.connect(audioCtx.destination);
  } catch (e) {
    console.warn('[Audio] Failed to init');
  }
}

// BGM data definitions
const BGM_DATA = {
  title:  { bpm: 90,  notes: [261, 329, 392, 329, 261, 220, 261, 329], type: 'sine',     vol: 0.1 },
  map:    { bpm: 100, notes: [392, 440, 523, 587, 523, 440, 392, 349], type: 'triangle',  vol: 0.08 },
  play:   { bpm: 130, notes: [130, 164, 196, 164, 130, 98, 130, 164],  type: 'square',    vol: 0.06 },
  boss:   { bpm: 150, notes: [98, 116, 130, 164, 196, 164, 130, 98],   type: 'sawtooth',  vol: 0.05 }
};

function playBGM(name) {
  if (!audioCtx) return;
  stopBGM();
  currentBGM = name;
  bgmData = BGM_DATA[name];
  if (!bgmData) return;
  bgmNoteIndex = 0;
  bgmScheduledUntil = audioCtx.currentTime;
  // Schedule first batch immediately
  scheduleBGMNotes();
}

// Schedule notes ahead using audioCtx.currentTime — no setInterval [F4, §12.4]
function scheduleBGMNotes() {
  if (!audioCtx || !bgmData || !currentBGM) return;

  const lookaheadSec = 2.0; // Schedule 2 seconds ahead
  const noteDuration = (60 / bgmData.bpm) / 2; // 8th note duration in seconds
  const now = audioCtx.currentTime;

  while (bgmScheduledUntil < now + lookaheadSec) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = bgmData.type;
      osc.frequency.value = bgmData.notes[bgmNoteIndex % bgmData.notes.length];
      gain.gain.setValueAtTime(bgmData.vol, bgmScheduledUntil);
      gain.gain.exponentialRampToValueAtTime(0.001, bgmScheduledUntil + noteDuration * 0.8);
      osc.connect(gain);
      gain.connect(bgmGain);
      osc.start(bgmScheduledUntil);
      osc.stop(bgmScheduledUntil + noteDuration);
      bgmScheduledUntil += noteDuration;
      bgmNoteIndex++;
    } catch (e) { break; }
  }
}

function stopBGM() {
  currentBGM = '';
  bgmData = null;
  bgmNoteIndex = 0;
  bgmScheduledUntil = 0;
}

function playSFX(name) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  try {
    switch (name) {
      case 'flip': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.linearRampToValueAtTime(G.gravDir === 1 ? 600 : 150, t + 0.1);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.1);
        break;
      }
      case 'land': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 80;
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.05);
        break;
      }
      case 'die': {
        // Noise burst + descending tone
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.3);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.3);
        // Noise burst
        const bufferSize = audioCtx.sampleRate * 0.15;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        const noiseRng = new SeededRNG(42);
        for (let i = 0; i < bufferSize; i++) data[i] = noiseRng.range(-1, 1);
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const nGain = audioCtx.createGain();
        nGain.gain.setValueAtTime(0.15, t);
        nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        noise.connect(nGain); nGain.connect(audioCtx.destination);
        noise.start(t); noise.stop(t + 0.15);
        break;
      }
      case 'coin': {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.type = 'triangle';
        osc1.frequency.value = 880;
        osc2.type = 'triangle';
        osc2.frequency.value = 1100;
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
        osc1.start(t); osc1.stop(t + 0.07);
        osc2.start(t + 0.07); osc2.stop(t + 0.15);
        break;
      }
      case 'clear': {
        // Ascending arpeggio
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.12, t + i * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.2);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.2);
        });
        break;
      }
      case 'boss_hit': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.2);
        break;
      }
      case 'boss_die': {
        // Explosion + fanfare
        [100, 200, 300, 400, 523, 659, 784, 1047].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = i < 4 ? 'sawtooth' : 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(i < 4 ? 0.15 : 0.1, t + i * 0.1);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.15);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.15);
        });
        break;
      }
      case 'ui_select': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.05);
        break;
      }
      case 'dash': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(600, t + 0.2);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.2);
        break;
      }
      case 'warning': {
        for (let i = 0; i < 4; i++) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = i % 2 === 0 ? 600 : 400;
          gain.gain.setValueAtTime(0.08, t + i * 0.1);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.08);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.08);
        }
        break;
      }
    }
  } catch (e) {}
}

function saveProgress() {
  const data = {
    stageStars: G.stageStars,
    stageUnlocked: G.stageUnlocked,
    bossDefeated: G.bossDefeated,
    hiddenUnlocked: G.hiddenUnlocked,
    upgrades: G.upgrades,
    totalScore: G.totalScore,
    totalCoinsCollected: G.totalCoinsCollected,
    masterSeed: G.masterSeed,
    lang: G.lang
  };
  Save.set(`${GAME_ID}_progress`, data);
}

function loadProgress() {
  const data = Save.get(`${GAME_ID}_progress`);
  if (data) {
    G.stageStars = data.stageStars || G.stageStars;
    G.stageUnlocked = data.stageUnlocked || G.stageUnlocked;
    G.bossDefeated = data.bossDefeated || G.bossDefeated;
    G.hiddenUnlocked = data.hiddenUnlocked || G.hiddenUnlocked;
    G.upgrades = data.upgrades || G.upgrades;
    G.totalScore = data.totalScore || 0;
    G.totalCoinsCollected = data.totalCoinsCollected || 0;
    G.masterSeed = data.masterSeed || 42;
    G.lang = data.lang || detectLanguage();
  }
  // Always unlock first stage
  G.stageUnlocked[0] = true;
}

function detectLanguage() {
  try {
    return navigator.language.startsWith('ko') ? 'ko' : 'en';
  } catch (e) {
    return 'en';
  }
}

// UPDATE — called every frame by IX Engine [F7]
function gameUpdate(dt, timestamp) {
  if (!G) return;

  // Tween ALWAYS updated in ALL states [F7]
  tween.update(dt);

  // Particles ALWAYS updated
  particles.update(dt);

  // Update transAlpha from proxy
  if (G._transProxy) {
    G.transAlpha = G._transProxy.alpha;
  }

  // BGM scheduling (lookahead pattern — no setInterval) [§12.4]
  scheduleBGMNotes();

  // Camera shake decay
  if (G.camShake > 0) {
    G.camShake *= 0.92;
    if (G.camShake < 0.1) G.camShake = 0;
  }

  // Title pulse timer
  G.titlePulse += dt;

  // State-specific updates
  switch (G.state) {
    case S_TITLE:
      updateTitleState(dt, timestamp);
      break;
    case S_MAP:
      updateMapState(dt, timestamp);
      break;
    case S_PLAY:
      updatePlayState(dt, timestamp);
      break;
    case S_BOSS:
      updateBossState(dt, timestamp);
      break;
  }

  // Camera update
  updateCamera(dt);

  // Flush input at end of frame [MUST]
  input.flush();
}

// === TITLE STATE ===
function updateTitleState(dt, timestamp) {
  // Background particles
  G.titleParticleTimer += dt;
  if (G.titleParticleTimer > 500) {
    G.titleParticleTimer = 0;
    const rng = new SeededRNG(timestamp | 0);
    particles.emit(rng.range(0, engine.W), rng.range(0, engine.H), 3, {
      color: PLAYER_COLOR,
      speed: 30,
      life: 2,
      size: 2
    });
  }

  // Start game
  if (input.confirm() || input.jp('Space') || input.jp('Enter')) {
    if (!G.soundInit) {
      G.soundInit = true;
      sound.init();
      initAudio();
    }
    playSFX('ui_select');
    beginTransition(S_TITLE, S_MAP);
  }
}

// === MAP STATE ===
function updateMapState(dt, timestamp) {
  const maxStages = 23;

  if (G.showUpgrades) {
    // Upgrade shop controls
    if (input.jp('ArrowLeft') || input.jp('KeyA')) {
      G.upgradeSelection = Math.max(0, G.upgradeSelection - 1);
      playSFX('ui_select');
    }
    if (input.jp('ArrowRight') || input.jp('KeyD')) {
      G.upgradeSelection = Math.min(2, G.upgradeSelection + 1);
      playSFX('ui_select');
    }
    if (input.jp('Enter') || input.jp('Space')) {
      tryPurchaseUpgrade(G.upgradeSelection);
    }
    if (input.jp('Escape') || input.jp('KeyP')) {
      G.showUpgrades = false;
      playSFX('ui_select');
    }

    // Touch: upgrade purchase
    if (input.tapped) {
      const w = engine.W, h = engine.H;
      const btnW = Math.max(MIN_TOUCH * 2, 120);
      const btnH = Math.max(MIN_TOUCH, 40);
      // Back button
      if (UI.hitTest(input.tapX, input.tapY, w / 2 - btnW / 2, h - 45, btnW, btnH)) {
        G.showUpgrades = false;
        playSFX('ui_select');
      }
      // Branch selection by tap X position
      const colW = Math.min(200, (w - 40) / 3);
      const startX = (w - colW * 3) / 2;
      for (let b = 0; b < 3; b++) {
        const bx = startX + b * colW;
        if (input.tapX >= bx && input.tapX < bx + colW) {
          G.upgradeSelection = b;
          tryPurchaseUpgrade(b);
        }
      }
    }
    return;
  }

  // Map navigation
  if (input.jp('ArrowLeft') || input.jp('KeyA')) {
    G.mapSelection = Math.max(0, G.mapSelection - 1);
    playSFX('ui_select');
  }
  if (input.jp('ArrowRight') || input.jp('KeyD')) {
    G.mapSelection = Math.min(maxStages - 1, G.mapSelection + 1);
    playSFX('ui_select');
  }
  if (input.jp('ArrowUp') || input.jp('KeyW')) {
    // Move between rows
    if (G.mapSelection >= 3) G.mapSelection -= 3;
    playSFX('ui_select');
  }
  if (input.jp('ArrowDown') || input.jp('KeyS')) {
    if (G.mapSelection + 3 < maxStages) G.mapSelection += 3;
    playSFX('ui_select');
  }

  // Select stage
  if (input.jp('Enter') || input.jp('Space')) {
    tryStartStage(G.mapSelection);
  }

  // Back to title
  if (input.jp('Escape')) {
    beginTransition(S_MAP, S_TITLE);
  }

  // Touch: stage selection and buttons
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const nodeSize = Math.max(MIN_TOUCH, 40);
    const nodeStartY = 120;
    const nodeSpacingY = 50;

    // Check main stages
    for (let i = 0; i < 15; i++) {
      const zone = Math.floor(i / 3);
      const local = i % 3;
      const nx = w * 0.2 + local * (w * 0.25);
      const ny = nodeStartY + zone * nodeSpacingY;
      if (UI.hitTest(input.tapX, input.tapY, nx - nodeSize / 2, ny - nodeSize / 2, nodeSize, nodeSize)) {
        G.mapSelection = i;
        tryStartStage(i);
      }
    }

    // Check boss stages
    for (let i = 0; i < 5; i++) {
      const idx = 15 + i;
      const nx = w * 0.85;
      const ny = nodeStartY + i * nodeSpacingY;
      if (UI.hitTest(input.tapX, input.tapY, nx - nodeSize / 2, ny - nodeSize / 2, nodeSize, nodeSize)) {
        G.mapSelection = idx;
        tryStartStage(idx);
      }
    }

    // Check hidden stages
    const hiddenY = nodeStartY + 5 * nodeSpacingY + 20;
    for (let i = 0; i < 3; i++) {
      const idx = 20 + i;
      const nx = w * 0.25 + i * (w * 0.25);
      if (UI.hitTest(input.tapX, input.tapY, nx - nodeSize / 2, hiddenY - nodeSize / 2, nodeSize, nodeSize)) {
        G.mapSelection = idx;
        tryStartStage(idx);
      }
    }

    // Upgrade button
    const btnW = Math.max(MIN_TOUCH * 2, 120);
    const btnH = Math.max(MIN_TOUCH, 40);
    const btnY = h - btnH - 15;
    if (UI.hitTest(input.tapX, input.tapY, 15, btnY, btnW, btnH)) {
      G.showUpgrades = true;
      playSFX('ui_select');
    }

    // Back button
    if (UI.hitTest(input.tapX, input.tapY, w - btnW - 15, btnY, btnW, btnH)) {
      beginTransition(S_MAP, S_TITLE);
    }
  }
}

function tryStartStage(idx) {
  if (!G.stageUnlocked[idx]) {
    playSFX('warning');
    return;
  }

  const info = stageToZoneInfo(idx);
  G.stageIndex = idx;

  if (info.type === 'boss') {
    G.currentZone = info.zone;
    beginTransition(S_MAP, S_BOSS);
  } else {
    beginTransition(S_MAP, S_PLAY);
  }
}

function tryPurchaseUpgrade(branch) {
  const currentLevel = G.upgrades[branch];
  if (currentLevel >= 5) return;

  const cost = UPGRADE_COSTS[currentLevel + 1];
  if (G.totalCoinsCollected >= cost) {
    G.totalCoinsCollected -= cost;
    G.upgrades[branch]++;
    saveProgress();
    playSFX('coin');
    particles.emit(engine.W / 2, engine.H / 2, 15, {
      color: '#ffd700',
      speed: 150,
      life: 0.5,
      size: 4
    });
  } else {
    playSFX('warning');
  }
}

// === PLAY STATE ===
function updatePlayState(dt, timestamp) {
  switch (G.playState) {
    case PS_INTRO:
      G.introTimer -= dt;
      if (G.introTimer <= 0 || input.confirm()) {
        G.playState = PS_ALIVE;
        G.briefingAlpha = 0;
      }
      break;

    case PS_ALIVE:
      // Input processing
      processPlayInput(dt);
      updatePhysics(dt);
      updateTraps(dt);
      break;

    case PS_DEAD:
      G.respawnTimer -= dt;
      // Already handled by tween callback
      break;

    case PS_CLEAR:
      G.camZoom = lerp(G.camZoom, G.camTargetZoom, 0.02);
      if (input.confirm()) {
        G.camTargetZoom = 1;
        G.camZoom = 1;
        beginTransition(S_PLAY, S_MAP);
      }
      break;

    case PS_PAUSED:
      updatePauseMenu(dt);
      break;
  }
}

function processPlayInput(dt) {
  // Check if tap hit a UI button first [Fix: Issue #6 — UI click causing flip]
  let tappedUIButton = false;
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const btnSize = Math.max(MIN_TOUCH, 36);
    const pad = 10;
    // Pause button hit test
    if (UI.hitTest(input.tapX, input.tapY, w - btnSize - pad, pad + 28, btnSize, btnSize)) {
      G.playState = PS_PAUSED;
      G.pauseSelection = 0;
      playSFX('ui_select');
      tappedUIButton = true;
    }
    // Restart button hit test
    if (UI.hitTest(input.tapX, input.tapY, w - btnSize - pad, pad + 28 + btnSize + 5, btnSize, btnSize)) {
      restartStage();
      tappedUIButton = true;
    }
  }

  // Gravity flip — only if not tapping a UI button
  const flipPressed = input.jp('Space') || input.jp('KeyW') || input.jp('ArrowUp');
  const tappedCenter = input.tapped && !tappedUIButton && !isHoldingLeft() && !isHoldingRight();

  if (flipPressed || tappedCenter) {
    flipGravity();
  }

  // Dash (Shift or double-tap right)
  if (input.jp('ShiftLeft') || input.jp('ShiftRight') || input.jp('KeyE')) {
    if (G.upgrades[1] > 0) activateDash();
  }

  // Slow (Q)
  if (input.jp('KeyQ')) {
    if (G.upgrades[2] > 0) activateSlow();
  }

  // Pause
  if (input.jp('Escape') || input.jp('KeyP')) {
    G.playState = PS_PAUSED;
    G.pauseSelection = 0;
    playSFX('ui_select');
  }

  // Restart
  if (input.jp('KeyR')) {
    restartStage();
  }
}

function restartStage() {
  tweenClearImmediate(tween);  // [F13]
  initStage(G.stageIndex);
  G.playState = PS_ALIVE;
}

function updatePauseMenu(dt) {
  if (input.jp('ArrowUp') || input.jp('KeyW')) {
    G.pauseSelection = Math.max(0, G.pauseSelection - 1);
    playSFX('ui_select');
  }
  if (input.jp('ArrowDown') || input.jp('KeyS')) {
    G.pauseSelection = Math.min(2, G.pauseSelection + 1);
    playSFX('ui_select');
  }
  if (input.jp('Escape') || input.jp('KeyP')) {
    G.playState = PS_ALIVE;
    playSFX('ui_select');
  }
  if (input.jp('Enter') || input.jp('Space')) {
    switch (G.pauseSelection) {
      case 0: // Resume
        G.playState = PS_ALIVE;
        break;
      case 1: // Restart
        restartStage();
        break;
      case 2: // Quit
        tweenClearImmediate(tween);
        beginTransition(S_PLAY, S_MAP);
        break;
    }
    playSFX('ui_select');
  }

  // Touch
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const mw = Math.min(300, w * 0.8);
    const mh = 200;
    const mx = (w - mw) / 2;
    const my = (h - mh) / 2;
    const btnW = mw - 40;
    const btnH = Math.max(MIN_TOUCH, 36);

    for (let i = 0; i < 3; i++) {
      const by = my + 60 + i * (btnH + 10);
      if (UI.hitTest(input.tapX, input.tapY, mx + 20, by, btnW, btnH)) {
        G.pauseSelection = i;
        switch (i) {
          case 0: G.playState = PS_ALIVE; break;
          case 1: restartStage(); break;
          case 2: tweenClearImmediate(tween); beginTransition(S_PLAY, S_MAP); break;
        }
        playSFX('ui_select');
      }
    }
  }
}

// === BOSS STATE ===
function updateBossState(dt, timestamp) {
  switch (G.playState) {
    case PS_INTRO:
      G.introTimer -= dt;
      if (G.introTimer <= 0 || input.confirm()) {
        G.playState = PS_ALIVE;
      }
      break;

    case PS_ALIVE:
      processPlayInput(dt);
      // Boss-specific: player moves freely (no auto-run)
      G.pvx = 0;
      if (input.held('KeyD') || input.held('ArrowRight') || isHoldingRight()) G.pvx = BASE_SPEED;
      if (input.held('KeyA') || input.held('ArrowLeft') || isHoldingLeft()) G.pvx = -BASE_SPEED;

      updatePhysics(dt);
      updateBoss(dt);
      break;

    case PS_DEAD:
      G.respawnTimer -= dt;
      break;

    case PS_CLEAR:
      // Boss death animation
      if (G.boss) {
        G.boss.deathTimer -= dt;
      }
      if (input.confirm()) {
        beginTransition(S_BOSS, S_MAP);
      }
      break;

    case PS_PAUSED:
      updatePauseMenu(dt);
      break;
  }
}

// === CAMERA ===
function updateCamera(dt) {
  if (G.state === S_PLAY || G.state === S_BOSS) {
    // Follow player horizontally (player at left 1/3)
    const targetCamX = G.px - engine.W / (3 * (engine.H / GAME_H));
    G.camX = lerp(G.camX, Math.max(0, targetCamX), 0.08);

    // Zoom
    G.camZoom = lerp(G.camZoom, G.camTargetZoom, 0.05);
  }
}

// RENDER — called every frame by IX Engine
function gameRender(ctx, w, h, dt) {
  if (!G) return;

  // Clear
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  switch (G.state) {
    case S_TITLE:
      renderTitle(ctx, w, h);
      break;

    case S_MAP:
      renderMap(ctx, w, h);
      break;

    case S_PLAY:
      renderStage(ctx, w, h, G.titlePulse);
      renderHUD(ctx, w, h);
      if (G.playState === PS_INTRO) renderIntro(ctx, w, h);
      if (G.playState === PS_DEAD) renderDeathOverlay(ctx, w, h);
      if (G.playState === PS_CLEAR) renderClearScreen(ctx, w, h);
      if (G.playState === PS_PAUSED) renderPauseModal(ctx, w, h);
      break;

    case S_BOSS:
      renderBossArena(ctx, w, h, G.titlePulse);
      renderHUD(ctx, w, h);
      if (G.playState === PS_INTRO) renderBossIntro(ctx, w, h);
      if (G.playState === PS_DEAD) renderDeathOverlay(ctx, w, h);
      if (G.playState === PS_CLEAR) renderClearScreen(ctx, w, h);
      if (G.playState === PS_PAUSED) renderPauseModal(ctx, w, h);
      break;
  }

  // Particles always rendered
  particles.render(ctx);

  // Transition fade
  if (G.transAlpha > 0) {
    UI.fade(ctx, w, h, G.transAlpha);
  }

  // Scanlines
  UI.scanlines(ctx, w, h, 0.02);
}

function renderIntro(ctx, w, h) {
  const alpha = clamp(G.introTimer / 500, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.7 * alpha})`;
  ctx.fillRect(0, 0, w, h);

  const info = stageToZoneInfo(G.stageIndex);
  UI.text(ctx, `${getText('zone' + (G.currentZone + 1))} - ${info.stage + 1}`, w / 2, h * 0.35, {
    size: 28, bold: true, color: ZONE_COLORS[G.currentZone].portal, glow: ZONE_COLORS[G.currentZone].portal
  });

  ctx.globalAlpha = alpha;
  UI.text(ctx, G.introText, w / 2, h * 0.5, {
    size: 14, color: '#8080a0'
  });
  ctx.globalAlpha = 1;
}

function renderBossIntro(ctx, w, h) {
  const alpha = clamp(G.introTimer / 500, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.8 * alpha})`;
  ctx.fillRect(0, 0, w, h);

  const zc = ZONE_COLORS[G.currentZone];

  // Boss name with dramatic entrance
  const shakeX = G.introTimer > 1500 ? (new SeededRNG(G.introTimer | 0)).range(-3, 3) : 0;
  UI.text(ctx, G.boss ? G.boss.name : '', w / 2 + shakeX, h * 0.35, {
    size: 36, bold: true, color: zc.danger, glow: zc.danger
  });

  // Warning text
  ctx.globalAlpha = alpha;
  UI.text(ctx, G.introText, w / 2, h * 0.5, {
    size: 14, color: '#ff5555'
  });
  ctx.globalAlpha = 1;

  // Enemy sprite preview
  if (assets.sprites.enemy) {
    const scale = 1 + Math.sin(G.introTimer * 0.005) * 0.1;
    const size = 80 * scale;
    ctx.save();
    ctx.globalAlpha = alpha * 0.8;
    ctx.drawImage(assets.sprites.enemy, w / 2 - size / 2, h * 0.6 - size / 2, size, size);
    ctx.restore();
  }
}

function renderBossArena(ctx, w, h, time) {
  const zc = ZONE_COLORS[G.currentZone];

  ctx.save();

  // Camera shake
  const shake = UI.shake(G.camShake);
  ctx.translate(shake.x, shake.y);

  // Camera zoom
  if (G.camZoom !== 1) {
    ctx.translate(w / 2, h / 2);
    ctx.scale(G.camZoom, G.camZoom);
    ctx.translate(-w / 2, -h / 2);
  }

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, zc.bg);
  grad.addColorStop(1, zc.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Background assets
  if (assets.sprites.bgLayer1) {
    ctx.globalAlpha = 0.1;
    ctx.drawImage(assets.sprites.bgLayer1, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // Arena walls
  const scale = h / GAME_H;
  ctx.fillStyle = zc.bg2;
  ctx.fillRect(0, 0, w, TILE_SIZE * scale);
  ctx.fillRect(0, h - TILE_SIZE * scale, w, TILE_SIZE * scale);

  // Boss attacks
  renderBossAttacks(ctx, G.boss, w, h, time);

  // Boss
  if (G.boss && G.boss.alive) {
    drawBossShape(ctx, G.boss, time, zc);
  } else if (G.boss && !G.boss.alive) {
    // Death explosion
    ctx.globalAlpha = Math.max(0, G.boss.deathTimer / 2000);
    drawBossShape(ctx, G.boss, time, zc);
    ctx.globalAlpha = 1;
  }

  // Player
  const px = G.px * scale;
  const py = G.py * scale;
  const ps = PLAYER_SIZE * scale;

  if (G.playState !== PS_DEAD || G.respawnTimer > RESPAWN_DELAY * 0.5) {
    if (assets.sprites.player && G.pose !== 3) {
      ctx.save();
      ctx.globalAlpha = G.playerAlpha;
      ctx.translate(px, py);
      if (G.gravDir === -1) ctx.scale(1, -1);
      ctx.drawImage(assets.sprites.player, -ps / 2, -ps / 2, ps, ps);
      ctx.restore();
    } else {
      drawPlayerShape(ctx, px, py, ps, G.gravDir, G.pose, G.playerAlpha);
    }
  }

  ctx.restore();
}

// Resize handler
function onGameResize(w, h) {
  // Nothing specific needed; engine handles DPR
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  // Create game state
  G = createGameState();

  // Detect language
  G.lang = detectLanguage();

  // Load progress
  loadProgress();

  // Load assets [preloadAssets pattern — user instruction > F1]
  await assets.load({
    player:    'assets/player.svg',
    enemy:     'assets/enemy.svg',
    bgLayer1:  'assets/bg-layer1.svg',
    bgLayer2:  'assets/bg-layer2.svg',
    uiHeart:   'assets/ui-heart.svg',
    uiStar:    'assets/ui-star.svg',
    powerup:   'assets/powerup.svg',
    effectHit: 'assets/effect-hit.svg'
  });

  // Enter title state
  G.state = S_TITLE;
  G.titleAlpha = 0;
  tween.add(G, { titleAlpha: 1 }, 1000, 'easeOut');

  // Start engine
  engine.start();
}

init();

</script>
