// SeededRNG [F18] — Math.random() 0건
class SeededRNG {
  constructor(seed) { this.s = seed | 0; }
  next() {
    this.s = (this.s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (this.s >>> 0) / 0xFFFFFFFF;
  }
  range(min, max) { return min + this.next() * (max - min); }
  int(min, max) { return Math.floor(this.range(min, max + 1)); }
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  chance(p) { return this.next() < p; }
  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.int(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

// Extended Tween helper (clearImmediate) [F13]
function tweenClearImmediate(tw) {
  tw._tweens.length = 0;
  tw._pending.length = 0;
}

// Simple easing functions
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
}

// Clamp helper
function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

// beginTransition — only allows TRANSITION_TABLE routes [F6]
function beginTransition(from, to, callback) {
  if (G.transitioning) return false;
  const allowed = TRANSITION_TABLE[from];
  if (!allowed || !allowed.includes(to)) {
    console.warn(`[STATE] Transition ${from}->${to} not in TRANSITION_TABLE`);
    return false;
  }
  G.transitioning = true;  // Guard flag [F5]
  G._transProxy = { alpha: 0 };
  tween.add(G._transProxy, { alpha: 1 }, 300, 'easeIn', () => {
    G.transAlpha = 1;
    enterState(to);
    if (callback) callback();
    // New proxy for fade-in [Cycle 34/35 pattern]
    const proxy2 = { alpha: 1 };
    G._transProxy = proxy2;
    tween.add(proxy2, { alpha: 0 }, 300, 'easeOut', () => {
      G.transitioning = false;
      G.transAlpha = 0;
    });
  });
  return true;
}

// enterState — only called by beginTransition [F6]
function enterState(newState) {
  const prevState = G.state;
  G.state = newState;

  switch (newState) {
    case S_TITLE:
      G.titleAlpha = 0;
      G.titlePulse = 0;
      tween.add(G, { titleAlpha: 1 }, 500, 'easeOut');
      playBGM('title');
      break;

    case S_MAP:
      G.showUpgrades = false;
      G.upgradeSelection = 0;
      G.mapSelection = findNextUnlockedStage();
      saveProgress();
      playBGM('map');
      break;

    case S_PLAY:
      initStage(G.stageIndex);
      G.playState = PS_INTRO;
      G.introTimer = 2000;
      G.introText = getZoneBriefing(G.currentZone);
      playBGM('play');
      break;

    case S_BOSS:
      initBoss(G.currentZone);
      G.playState = PS_INTRO;
      G.introTimer = 2500;
      G.introText = getBossBriefing(G.currentZone);
      G.bossRewardGiven = false;  // [F17]
      playBGM('boss');
      break;
  }
}

function findNextUnlockedStage() {
  for (let i = 0; i < 23; i++) {
    if (G.stageUnlocked[i] && G.stageStars[i] === 0) return i;
  }
  return 0;
}

// ═══════════════════════════════════════════════════════════════
// REGION 5: LEVEL GENERATOR (Procedural + BFS) [F25]
// ═══════════════════════════════════════════════════════════════

// Difficulty curve formulas [F26]
function getDifficulty(stageNum) {
  const n = stageNum + 1; // 1-based
  return {
    obstacleDensity: 0.3 + 0.05 * n,
    obstacleSpeed: 80 + 8 * n,
    safeInterval: Math.max(1.0, 3.0 - 0.13 * n),
    coinCount: 5 + Math.floor(n * 0.8),
    baseTime: 30 + n * 4,
    segDifficulties: getSegmentDifficulties(n)
  };
}

function getSegmentDifficulties(n) {
  // Returns array of 8 difficulty chars
  if (n <= 3) return ['E','E','E','M','M','M','E','E'];
  if (n <= 6) return ['E','E','M','M','M','H','M','E'];
  if (n <= 9) return ['E','M','M','H','M','H','H','E'];
  if (n <= 12) return ['M','M','H','H','H','H','X','E'];
  return ['M','H','H','H','X','H','X','E'];
}

// 20 predefined segment patterns (each is TILES_PER_SEG_X × TILES_Y)
function getSegmentPattern(rng, difficulty, zoneId, trapTypes) {
  const grid = [];
  for (let y = 0; y < TILES_Y; y++) {
    grid[y] = new Array(TILES_PER_SEG_X).fill(T_EMPTY);
  }

  // Floor and ceiling
  for (let x = 0; x < TILES_PER_SEG_X; x++) {
    grid[0][x] = T_SOLID;
    grid[TILES_Y - 1][x] = T_SOLID;
  }

  const d = { 'E': 0, 'M': 1, 'H': 2, 'X': 3 }[difficulty] || 0;

  // Pattern generation — extended range includes flame(8) & magnet(9) when traps available
  let maxPattern = 4 + d;
  if (trapTypes.includes(T_FLAME)) maxPattern = Math.max(maxPattern, 8);
  if (trapTypes.includes(T_MAGNET)) maxPattern = Math.max(maxPattern, 9);
  const patternType = rng.int(0, maxPattern);

  switch (patternType) {
    case 0: // Simple gap
      placeGap(grid, rng, 3 + rng.int(0, 2), d);
      break;
    case 1: // Spike corridor
      placeSpikeCorridor(grid, rng, d, trapTypes);
      break;
    case 2: // Platform climb
      placePlatformClimb(grid, rng, d);
      break;
    case 3: // Narrow passage
      placeNarrowPassage(grid, rng, d);
      break;
    case 4: // Crusher zone
      if (trapTypes.includes(T_CRUSHER)) {
        placeCrusherZone(grid, rng, d);
      } else {
        placeSpikeCorridor(grid, rng, d, trapTypes);
      }
      break;
    case 5: // Laser grid
      if (trapTypes.includes(T_LASER)) {
        placeLaserGrid(grid, rng, d);
      } else {
        placeNarrowPassage(grid, rng, d);
      }
      break;
    case 6: // Gravity zone
      if (trapTypes.includes(T_GRAV_ZONE)) {
        placeGravityZone(grid, rng, d);
      } else {
        placePlatformClimb(grid, rng, d);
      }
      break;
    case 7: // Mixed
      placeMixed(grid, rng, d, trapTypes);
      break;
    case 8: // Flame zone [§7.2 T6]
      if (trapTypes.includes(T_FLAME)) {
        placeFlameZone(grid, rng, d);
      } else {
        placeSpikeCorridor(grid, rng, d, trapTypes);
      }
      break;
    case 9: // Magnet zone [§7.2 T8]
      if (trapTypes.includes(T_MAGNET)) {
        placeMagnetZone(grid, rng, d);
      } else {
        placeNarrowPassage(grid, rng, d);
      }
      break;
  }

  // Apply ±2 tile variation [F18]
  if (rng.chance(0.3)) {
    applyVariation(grid, rng);
  }

  return grid;
}

function placeGap(grid, rng, gapWidth, d) {
  const gapStart = rng.int(2, TILES_PER_SEG_X - gapWidth - 2);
  for (let x = gapStart; x < gapStart + gapWidth; x++) {
    grid[TILES_Y - 1][x] = T_EMPTY;
  }
  // Add spikes on harder difficulties
  if (d >= 1) {
    for (let x = gapStart; x < gapStart + gapWidth; x++) {
      if (rng.chance(0.4)) grid[TILES_Y - 2][x] = T_SPIKE;
    }
  }
  if (d >= 2) {
    grid[0][gapStart + 1] = T_SPIKE;
  }
}

function placeSpikeCorridor(grid, rng, d, trapTypes) {
  const spikeCount = 2 + d;
  for (let i = 0; i < spikeCount; i++) {
    const x = rng.int(1, TILES_PER_SEG_X - 2);
    const fromTop = rng.chance(0.5);
    if (fromTop) {
      grid[1][x] = T_SPIKE;
      if (d >= 2) grid[2][x] = T_SPIKE;
    } else {
      grid[TILES_Y - 2][x] = T_SPIKE;
      if (d >= 2) grid[TILES_Y - 3][x] = T_SPIKE;
    }
  }
  // Add walls for harder difficulty
  if (d >= 2) {
    const wallX = rng.int(3, 7);
    for (let y = 2; y < TILES_Y - 4; y++) {
      grid[y][wallX] = T_SOLID;
    }
    // Gap in wall
    const gapY = rng.int(3, TILES_Y - 5);
    grid[gapY][wallX] = T_EMPTY;
    grid[gapY + 1][wallX] = T_EMPTY;
  }
}

function placePlatformClimb(grid, rng, d) {
  // Remove most of the floor
  for (let x = 2; x < TILES_PER_SEG_X - 2; x++) {
    grid[TILES_Y - 1][x] = T_EMPTY;
  }
  // Add floating platforms
  const platCount = 3 + d;
  for (let i = 0; i < platCount; i++) {
    const px = rng.int(1, TILES_PER_SEG_X - 3);
    const py = rng.int(3, TILES_Y - 3);
    const pw = rng.int(2, 3);
    for (let x = px; x < px + pw && x < TILES_PER_SEG_X; x++) {
      grid[py][x] = T_SOLID;
    }
  }
  // Add spikes below platforms on harder
  if (d >= 1) {
    for (let x = 2; x < TILES_PER_SEG_X - 2; x++) {
      if (rng.chance(0.2 * d)) grid[TILES_Y - 2][x] = T_SPIKE;
    }
  }
}

function placeNarrowPassage(grid, rng, d) {
  // Create walls from top and bottom meeting in center with a gap
  const gapY = rng.int(4, TILES_Y - 5);
  const gapH = Math.max(2, 4 - d);
  for (let x = 2; x < TILES_PER_SEG_X - 2; x++) {
    for (let y = 1; y < gapY; y++) {
      if (rng.chance(0.3 + d * 0.1)) grid[y][x] = T_SOLID;
    }
    for (let y = gapY + gapH; y < TILES_Y - 1; y++) {
      if (rng.chance(0.3 + d * 0.1)) grid[y][x] = T_SOLID;
    }
  }
  // Add spikes at passage edges
  if (d >= 1) {
    for (let x = 3; x < TILES_PER_SEG_X - 3; x += 2) {
      if (rng.chance(0.5)) grid[gapY][x] = T_SPIKE;
      if (rng.chance(0.5)) grid[gapY + gapH - 1][x] = T_SPIKE;
    }
  }
}

function placeCrusherZone(grid, rng, d) {
  const count = 1 + d;
  for (let i = 0; i < count; i++) {
    const cx = rng.int(2, TILES_PER_SEG_X - 3);
    grid[1][cx] = T_CRUSHER;
    grid[1][cx + 1] = T_CRUSHER;
  }
}

function placeLaserGrid(grid, rng, d) {
  const count = 1 + d;
  for (let i = 0; i < count; i++) {
    const ly = rng.int(3, TILES_Y - 4);
    grid[ly][rng.int(1, 4)] = T_LASER;
  }
}

function placeGravityZone(grid, rng, d) {
  const zx = rng.int(2, 5);
  const zy = rng.int(3, 7);
  const zw = rng.int(2, 4);
  const zh = rng.int(2, 3);
  for (let y = zy; y < zy + zh && y < TILES_Y - 1; y++) {
    for (let x = zx; x < zx + zw && x < TILES_PER_SEG_X; x++) {
      grid[y][x] = T_GRAV_ZONE;
    }
  }
  // Add spikes around
  if (d >= 1) {
    for (let x = zx; x < zx + zw && x < TILES_PER_SEG_X; x++) {
      if (rng.chance(0.4)) grid[zy - 1][x] = T_SPIKE;
    }
  }
}

// T6 화염 분사 — 벽면 노즐에서 방향성 짧은 버스트 [§7.2]
function placeFlameZone(grid, rng, d) {
  const count = 1 + d;
  for (let i = 0; i < count; i++) {
    const fx = rng.int(2, TILES_PER_SEG_X - 3);
    const fromTop = rng.chance(0.5);
    if (fromTop) {
      grid[1][fx] = T_FLAME; // Nozzle on ceiling
    } else {
      grid[TILES_Y - 2][fx] = T_FLAME; // Nozzle on floor
    }
  }
  // Add spikes around flames on harder difficulties
  if (d >= 1) {
    const sx = rng.int(1, TILES_PER_SEG_X - 2);
    grid[rng.chance(0.5) ? 1 : TILES_Y - 2][sx] = T_SPIKE;
  }
}

// T8 자기장 — 캐릭터 이동 속도 변화 + 파란 파동 표시 [§7.2]
function placeMagnetZone(grid, rng, d) {
  const mx = rng.int(2, 6);
  const my = rng.int(3, 7);
  const mw = rng.int(2, 3 + d);
  const mh = rng.int(2, 3);
  for (let y = my; y < my + mh && y < TILES_Y - 1; y++) {
    for (let x = mx; x < mx + mw && x < TILES_PER_SEG_X; x++) {
      grid[y][x] = T_MAGNET;
    }
  }
}

function placeMixed(grid, rng, d, trapTypes) {
  placeSpikeCorridor(grid, rng, Math.max(0, d - 1), trapTypes);
  if (rng.chance(0.5) && trapTypes.includes(T_CRUSHER)) {
    placeCrusherZone(grid, rng, Math.max(0, d - 1));
  }
  if (rng.chance(0.5) && trapTypes.includes(T_FLAME)) {
    placeFlameZone(grid, rng, Math.max(0, d - 1));
  }
  if (rng.chance(0.5)) {
    placeGap(grid, rng, 2, d);
  }
}

function applyVariation(grid, rng) {
  // Move some tiles ±1 position
  for (let y = 2; y < TILES_Y - 2; y++) {
    for (let x = 2; x < TILES_PER_SEG_X - 2; x++) {
      if (grid[y][x] === T_SPIKE && rng.chance(0.3)) {
        const ny = y + rng.int(-1, 1);
        if (ny > 0 && ny < TILES_Y - 1 && grid[ny][x] === T_EMPTY) {
          grid[ny][x] = T_SPIKE;
          grid[y][x] = T_EMPTY;
        }
      }
    }
  }
}

// Available traps per zone
function getZoneTraps(zoneId) {
  const traps = [T_SPIKE, T_SOLID]; // Always available
  if (zoneId >= 1) traps.push(T_VANISH, T_CRUSHER);
  if (zoneId >= 2) traps.push(T_LASER, T_FLAME);  // T6 화염 분사 §7.2
  if (zoneId >= 3) traps.push(T_GRAV_ZONE, T_MAGNET); // T8 자기장 §7.2
  return traps;
}

// Generate full stage
function generateStage(zoneId, stageId, seed) {
  const rng = new SeededRNG(seed);
  const diff = getDifficulty(zoneId * 3 + stageId);
  const trapTypes = getZoneTraps(zoneId);

  // Upgrade difficulty compensation [§8.3]
  const totalUpgradeLvl = G.upgrades.reduce((a, b) => a + b, 0);
  const compensatedDensity = diff.obstacleDensity * (1 + 0.02 * totalUpgradeLvl);

  // Generate segments
  const fullTiles = [];
  for (let y = 0; y < TILES_Y; y++) {
    fullTiles[y] = [];
  }

  for (let seg = 0; seg < STAGE_SEGMENTS; seg++) {
    const segDiff = diff.segDifficulties[seg];
    let grid;

    if (seg === STAGE_SEGMENTS - 1) {
      // Last segment: safe zone with portal
      grid = createSafeSegment(rng);
    } else if (seg === 0) {
      // First segment: easy entry
      grid = createEntrySegment(rng);
    } else {
      grid = getSegmentPattern(rng, segDiff, zoneId, trapTypes);
    }

    // Apply DDA modifications
    if (G.ddaLevel >= 1) {
      reduceDifficulty(grid, rng, G.ddaLevel);
    }

    // Merge into full tiles
    for (let y = 0; y < TILES_Y; y++) {
      for (let x = 0; x < TILES_PER_SEG_X; x++) {
        fullTiles[y][seg * TILES_PER_SEG_X + x] = grid[y][x];
      }
    }
  }

  // Place coins
  const coinPositions = [];
  const coinCount = diff.coinCount;
  let placed = 0;
  let attempts = 0;
  while (placed < coinCount && attempts < 200) {
    const cx = rng.int(5, STAGE_SEGMENTS * TILES_PER_SEG_X - 5);
    const cy = rng.int(2, TILES_Y - 3);
    if (fullTiles[cy][cx] === T_EMPTY) {
      fullTiles[cy][cx] = T_COIN;
      coinPositions.push({ x: cx * TILE_SIZE + TILE_SIZE / 2, y: cy * TILE_SIZE + TILE_SIZE / 2 });
      placed++;
    }
    attempts++;
  }

  // Place portal in last segment
  const portalX = (STAGE_SEGMENTS * TILES_PER_SEG_X - 3) * TILE_SIZE;
  const portalY = (TILES_Y / 2) * TILE_SIZE;
  fullTiles[Math.floor(TILES_Y / 2)][(STAGE_SEGMENTS * TILES_PER_SEG_X - 3)] = T_PORTAL;

  // Extract dynamic objects
  const crushers = [];
  const lasers = [];
  const vanishFloors = [];
  const gravZones = [];
  const movingPlatforms = [];
  const flames = [];
  const magnets = [];

  for (let y = 0; y < TILES_Y; y++) {
    for (let x = 0; x < fullTiles[y].length; x++) {
      const t = fullTiles[y][x];
      if (t === T_CRUSHER) {
        crushers.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE, h: TILE_SIZE,
          baseY: y * TILE_SIZE,
          targetY: (TILES_Y - 2) * TILE_SIZE,
          timer: rng.range(0, 4000),
          period: 3000 + rng.int(0, 2000),
          state: 'waiting',
          warning: false
        });
        fullTiles[y][x] = T_EMPTY;
      }
      if (t === T_LASER) {
        lasers.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE * 6, h: 4,
          timer: rng.range(0, 3000),
          onDuration: 2000, offDuration: 1000,
          active: true,
          charging: false
        });
        fullTiles[y][x] = T_EMPTY;
      }
      if (t === T_VANISH) {
        vanishFloors.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE, h: TILE_SIZE,
          timer: 0, touchTimer: 0,
          visible: true, cracking: false
        });
        fullTiles[y][x] = T_EMPTY;
      }
      if (t === T_GRAV_ZONE) {
        gravZones.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE, h: TILE_SIZE
        });
        fullTiles[y][x] = T_EMPTY;
      }
      // T6 화염 분사 [§7.2]
      if (t === T_FLAME) {
        const dir = y <= 2 ? 'down' : 'up'; // Nozzle direction
        flames.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE, h: TILE_SIZE * 4,
          dir: dir,
          timer: rng.range(0, 4000),
          period: 2500 + rng.int(0, 1500),
          burstDuration: 800,
          warningDuration: 500,
          active: false,
          warning: false
        });
        fullTiles[y][x] = T_EMPTY;
      }
      // T8 자기장 [§7.2]
      if (t === T_MAGNET) {
        magnets.push({
          x: x * TILE_SIZE, y: y * TILE_SIZE,
          w: TILE_SIZE, h: TILE_SIZE,
          speedMult: rng.chance(0.5) ? 0.4 : 1.8, // Slow or fast
          wavePhase: rng.range(0, Math.PI * 2)
        });
        fullTiles[y][x] = T_EMPTY;
      }
    }
  }

  // Add some moving platforms for variety
  if (zoneId >= 0) {
    const mpCount = rng.int(1, 3);
    for (let i = 0; i < mpCount; i++) {
      const mx = rng.int(3, STAGE_SEGMENTS * TILES_PER_SEG_X - 6) * TILE_SIZE;
      const my = rng.int(3, TILES_Y - 4) * TILE_SIZE;
      movingPlatforms.push({
        x: mx, y: my,
        w: TILE_SIZE * 3, h: TILE_SIZE * 0.4,
        baseX: mx, baseY: my,
        rangeX: rng.int(0, 2) * TILE_SIZE * 2,
        rangeY: rng.int(0, 2) * TILE_SIZE * 2,
        speed: 0.5 + rng.next() * 0.5,
        timer: rng.range(0, 6283)
      });
    }
  }

  // BFS reachability check [F25]
  const reachable = bfsCheck(fullTiles, 2, Math.floor(TILES_Y / 2));
  if (!reachable) {
    // Retry with next seed (max 10 attempts)
    if (seed < G.masterSeed + 1000) {
      return generateStage(zoneId, stageId, seed + 1);
    }
  }

  return {
    tiles: fullTiles,
    coins: coinPositions.map(c => ({ ...c, collected: false, bobTimer: 0 })),
    crushers,
    lasers,
    vanishFloors,
    gravZones,
    movingPlatforms,
    flames,
    magnets,
    portalX,
    portalY,
    difficulty: diff
  };
}

function createSafeSegment(rng) {
  const grid = [];
  for (let y = 0; y < TILES_Y; y++) {
    grid[y] = new Array(TILES_PER_SEG_X).fill(T_EMPTY);
    grid[y][0] = T_EMPTY;
  }
  // Floor and ceiling
  for (let x = 0; x < TILES_PER_SEG_X; x++) {
    grid[0][x] = T_SOLID;
    grid[TILES_Y - 1][x] = T_SOLID;
  }
  return grid;
}

function createEntrySegment(rng) {
  const grid = [];
  for (let y = 0; y < TILES_Y; y++) {
    grid[y] = new Array(TILES_PER_SEG_X).fill(T_EMPTY);
  }
  for (let x = 0; x < TILES_PER_SEG_X; x++) {
    grid[0][x] = T_SOLID;
    grid[TILES_Y - 1][x] = T_SOLID;
  }
  // Small platforms
  if (rng.chance(0.5)) {
    const py = rng.int(4, 8);
    for (let x = 3; x < 6; x++) grid[py][x] = T_SOLID;
  }
  return grid;
}

// BFS check: can player reach the right side of the stage?
function bfsCheck(tiles, startX, startY) {
  const totalX = tiles[0].length;
  const visited = new Set();
  const queue = [{ x: startX, y: startY, grav: 1 }];
  const targetX = totalX - 5;

  const key = (x, y, g) => `${x},${y},${g}`;
  visited.add(key(startX, startY, 1));

  let steps = 0;
  const maxSteps = 5000;

  while (queue.length > 0 && steps < maxSteps) {
    steps++;
    const cur = queue.shift();

    if (cur.x >= targetX) return true;

    // Possible moves: right, right+gravity, right+flip
    const moves = [
      { x: cur.x + 1, y: cur.y, grav: cur.grav },
      { x: cur.x + 1, y: cur.y + cur.grav, grav: cur.grav },
      { x: cur.x, y: cur.y + cur.grav, grav: cur.grav },
      { x: cur.x + 1, y: cur.y - cur.grav, grav: -cur.grav }, // flip
      { x: cur.x, y: cur.y - cur.grav, grav: -cur.grav },     // flip in place
    ];

    for (const m of moves) {
      if (m.x < 0 || m.x >= totalX || m.y < 1 || m.y >= TILES_Y - 1) continue;
      const tile = tiles[m.y][m.x];
      if (tile === T_SOLID) continue;
      // Skip spikes for BFS (player can sometimes dodge)
      const k = key(m.x, m.y, m.grav);
      if (visited.has(k)) continue;
      visited.add(k);
      queue.push(m);
    }
  }

  return false;
}

// DDA difficulty reduction
function reduceDifficulty(grid, rng, level) {
  // Level 1: Remove 15% of spikes
  if (level >= 1) {
    for (let y = 0; y < TILES_Y; y++) {
      for (let x = 0; x < TILES_PER_SEG_X; x++) {
        if (grid[y][x] === T_SPIKE && rng.chance(0.15)) {
          grid[y][x] = T_EMPTY;
        }
      }
    }
  }
  // Level 2+: Widen passages
  if (level >= 2) {
    for (let y = 2; y < TILES_Y - 2; y++) {
      for (let x = 1; x < TILES_PER_SEG_X - 1; x++) {
        if (grid[y][x] === T_SOLID && rng.chance(0.1)) {
          grid[y][x] = T_EMPTY;
        }
      }
    }
  }
}

// Init stage
function initStage(stageIndex) {
  // Use unified stageToZoneInfo mapping [Fix: Issue #5 mapping inconsistency]
  const info = stageToZoneInfo(stageIndex);
  const zone = info.zone;
  const stageNum = info.stage;

  G.currentZone = Math.min(zone, 4);
  G.currentStage = stageNum;
  G.stageIndex = stageIndex;

  const seed = G.masterSeed + stageIndex * 1000;
  const stage = generateStage(G.currentZone, stageNum, seed);

  G.tiles = stage.tiles;
  G.coins = stage.coins;
  G.crushers = stage.crushers;
  G.lasers = stage.lasers;
  G.vanishFloors = stage.vanishFloors;
  G.gravZones = stage.gravZones;
  G.movingPlatforms = stage.movingPlatforms;
  G.flames = stage.flames || [];
  G.magnets = stage.magnets || [];
  G.portalX = stage.portalX;
  G.portalY = stage.portalY;
  G.portalActive = true;
  G.totalCoins = stage.coins.length;
  G.collectedCoins = 0;
  G.stageDeaths = 0;
  G.stageTime = 0;
  G.playState = PS_ALIVE;
  G.chainCollapse = null;

  // Reset player
  G.px = 60;
  G.py = GAME_H / 2;
  G.pvx = BASE_SPEED;
  G.pvy = 0;
  G.gravDir = 1;
  G.flipping = false;
  G.flipTimer = 0;
  G.dashActive = false;
  G.dashTimer = 0;
  G.dashCooldown = 0;
  G.slowActive = false;
  G.slowTimer = 0;
  G.playerAlpha = 1;
  G.grounded = false;
  G.speedMult = 1;
  G.checkpointX = 60;
  G.checkpointY = GAME_H / 2;
  G.respawnTimer = 0;

  // Camera
  G.camX = 0;
  G.camY = 0;
  G.camZoom = 1;
  G.camTargetZoom = 1;
  G.camShake = 0;

  // Ghost path for DDA level 2+
  if (G.ddaLevel >= 2) {
    generateGhostPath(stage.tiles);
  } else {
    G.ghostPath = [];
  }

  // Zone 5: chain collapse mechanic
  if (G.currentZone === 4 && stageNum >= 1) {
    G.chainCollapse = {
      x: -TILE_SIZE * 3,
      speed: 40 + stageNum * 15,
      active: true
    };
  }
}

// Generate ghost path (DDA hint)
function generateGhostPath(tiles) {
  G.ghostPath = [];
  let gx = 2, gy = Math.floor(TILES_Y / 2), grav = 1;
  const rng = new SeededRNG(G.masterSeed + 9999);
  for (let step = 0; step < 200; step++) {
    G.ghostPath.push({ x: gx * TILE_SIZE, y: gy * TILE_SIZE });
    gx++;
    if (gx >= tiles[0].length - 2) break;
    // Simple pathfinding
    const nextY = gy + grav;
    if (nextY >= 1 && nextY < TILES_Y - 1 && tiles[nextY][gx] !== T_SOLID && tiles[nextY][gx] !== T_SPIKE) {
      gy = nextY;
    } else if (tiles[gy][gx] === T_SPIKE || tiles[gy][gx] === T_SOLID) {
      grav = -grav;
      gy = gy + grav;
    }
    gy = clamp(gy, 1, TILES_Y - 2);
  }
}

// Stage to zone/stage mapping
function stageToZoneInfo(stageIndex) {
  // 0-14: main stages (5 zones × 3)
  // 15-19: bosses (zones 0-4)
  // 20-22: hidden stages
  if (stageIndex < 15) {
    return { zone: Math.floor(stageIndex / 3), stage: stageIndex % 3, type: 'stage' };
  } else if (stageIndex < 20) {
    return { zone: stageIndex - 15, stage: 0, type: 'boss' };
  } else {
    return { zone: stageIndex - 20, stage: 0, type: 'hidden' };
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 6: PHYSICS
// ═══════════════════════════════════════════════════════════════

function updatePhysics(dt) {
  const dtSec = dt / 1000;

  if (G.playState !== PS_ALIVE) return;

  // Gravity
  const gravAccel = GRAVITY * G.gravDir;
  G.pvy += gravAccel * dtSec;
  G.pvy = clamp(G.pvy, -MAX_FALL_SPEED, MAX_FALL_SPEED);

  // Flip transition [F14]
  if (G.flipping) {
    G.flipTimer -= dt;
    if (G.flipTimer <= 0) {
      G.flipping = false;
    }
  }

  // Horizontal speed
  let targetSpeed = BASE_SPEED;
  if (input.held('KeyA') || input.held('ArrowLeft') || isHoldingLeft()) {
    targetSpeed = SLOW_SPEED;
  } else if (input.held('KeyD') || input.held('ArrowRight') || isHoldingRight()) {
    targetSpeed = FAST_SPEED;
  }

  // Apply upgrade bonuses
  if (G.upgrades[0] >= 1) {
    // Gravity control: faster flip
  }
  if (G.dashActive) {
    targetSpeed = FAST_SPEED * 1.5;
  }
  if (G.slowActive) {
    G.speedMult = 0.4;
  } else {
    G.speedMult = 1;
  }

  G.pvx = lerp(G.pvx, targetSpeed, 0.1);

  // Move player
  G.px += G.pvx * dtSec * G.speedMult;
  G.py += G.pvy * dtSec * G.speedMult;

  // Collision with tiles
  G.grounded = false;
  resolveCollisions();

  // Dash
  if (G.dashActive) {
    G.dashTimer -= dt;
    if (G.dashTimer <= 0) {
      G.dashActive = false;
      // Dash Lv4: afterimage explosion
      if (G.upgrades[1] >= 4) {
        particles.emit(G.px, G.py, 20, { color: '#ff8800', speed: 200, life: 0.5, size: 4 });
      }
    }
  }
  if (G.dashCooldown > 0) G.dashCooldown -= dt;

  // Slow
  if (G.slowActive) {
    G.slowTimer -= dt;
    if (G.slowTimer <= 0) {
      G.slowActive = false;
      // Slow Lv4: speed boost on end
      if (G.upgrades[2] >= 4) {
        G.pvx = FAST_SPEED * 1.5;
      }
    }
  }
  if (G.slowCharge < 3000) G.slowCharge += dt * (1 + (G.upgrades[2] >= 2 ? 0.3 : 0));

  // Update stage time
  G.stageTime += dt * G.speedMult;
}

function resolveCollisions() {
  const hs = PLAYER_SIZE / 2;
  const px = G.px, py = G.py;

  // Get tile at player corners
  const left   = Math.floor((px - hs) / TILE_SIZE);
  const right  = Math.floor((px + hs) / TILE_SIZE);
  const top    = Math.floor((py - hs) / TILE_SIZE);
  const bottom = Math.floor((py + hs) / TILE_SIZE);

  const totalX = G.tiles[0] ? G.tiles[0].length : 0;

  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (ty < 0 || ty >= TILES_Y || tx < 0 || tx >= totalX) {
        // Out of bounds = death
        if (ty < 0 || ty >= TILES_Y) killPlayer();
        continue;
      }

      const tile = G.tiles[ty][tx];

      if (tile === T_SOLID) {
        // AABB resolution
        const tileLeft   = tx * TILE_SIZE;
        const tileTop    = ty * TILE_SIZE;
        const tileRight  = tileLeft + TILE_SIZE;
        const tileBottom = tileTop + TILE_SIZE;

        const overlapX = Math.min(px + hs - tileLeft, tileRight - (px - hs));
        const overlapY = Math.min(py + hs - tileTop, tileBottom - (py - hs));

        if (overlapX > 0 && overlapY > 0) {
          if (overlapX < overlapY) {
            // Push horizontally
            if (px < tileLeft + TILE_SIZE / 2) {
              G.px -= overlapX;
            } else {
              G.px += overlapX;
            }
            // Don't zero pvx for auto-runner
          } else {
            // Push vertically
            if (py < tileTop + TILE_SIZE / 2) {
              G.py -= overlapY;
              if (G.gravDir === 1) { G.grounded = true; G.pvy = 0; }
            } else {
              G.py += overlapY;
              if (G.gravDir === -1) { G.grounded = true; G.pvy = 0; }
            }
          }
        }
      }

      if (tile === T_SPIKE) {
        // Check precise overlap
        const tileLeft = tx * TILE_SIZE + 4;
        const tileTop = ty * TILE_SIZE + 4;
        const tw = TILE_SIZE - 8;
        const th = TILE_SIZE - 8;
        if (px + hs > tileLeft && px - hs < tileLeft + tw &&
            py + hs > tileTop && py - hs < tileTop + th) {
          if (!isInvincible()) killPlayer();
        }
      }

      if (tile === T_COIN) {
        const cx = tx * TILE_SIZE + TILE_SIZE / 2;
        const cy = ty * TILE_SIZE + TILE_SIZE / 2;
        if (MathUtil.dist(px, py, cx, cy) < PLAYER_SIZE) {
          collectCoin(tx, ty);
        }
      }

      if (tile === T_PORTAL) {
        if (G.portalActive && MathUtil.dist(px, py, G.portalX, G.portalY) < TILE_SIZE * 1.5) {
          stageCleared();
        }
      }
    }
  }

  // Collision with dynamic objects
  checkDynamicCollisions();
}

function isInvincible() {
  // Upgrade: gravity Lv4 = invincible during flip
  if (G.upgrades[0] >= 4 && G.flipping) return true;
  // Upgrade: dash Lv3 = invincible during dash
  if (G.upgrades[1] >= 3 && G.dashActive) return true;
  return false;
}

function checkDynamicCollisions() {
  const hs = PLAYER_SIZE / 2;

  // Crushers
  for (const c of G.crushers) {
    if (c.state === 'crushing' || c.state === 'holding') {
      if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                               c.x, c.y, c.w, c.h)) {
        if (!isInvincible()) killPlayer();
      }
    }
  }

  // Lasers
  for (const l of G.lasers) {
    if (l.active) {
      if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                               l.x, l.y, l.w, l.h)) {
        if (!isInvincible()) killPlayer();
      }
    }
  }

  // Moving platforms (as solid)
  for (const mp of G.movingPlatforms) {
    if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                             mp.x, mp.y, mp.w, mp.h)) {
      // Push player on top
      if (G.gravDir === 1 && G.pvy > 0) {
        G.py = mp.y - hs;
        G.pvy = 0;
        G.grounded = true;
      } else if (G.gravDir === -1 && G.pvy < 0) {
        G.py = mp.y + mp.h + hs;
        G.pvy = 0;
        G.grounded = true;
      }
    }
  }

  // Vanish floors
  for (const vf of G.vanishFloors) {
    if (!vf.visible) continue;
    if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                             vf.x, vf.y, vf.w, vf.h)) {
      // Act as solid
      if (G.gravDir === 1 && G.pvy > 0 && G.py < vf.y) {
        G.py = vf.y - hs;
        G.pvy = 0;
        G.grounded = true;
      }
      // Start vanish timer
      if (!vf.cracking) {
        vf.cracking = true;
        vf.touchTimer = 1000;
      }
    }
  }

  // Gravity zones
  for (const gz of G.gravZones) {
    if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                             gz.x, gz.y, gz.w, gz.h)) {
      // Auto-flip gravity
      if (G.gravDir === 1) flipGravity();
    }
  }

  // Flames [T6 §7.2]
  for (const fl of G.flames) {
    if (fl.active) {
      const flameX = fl.x;
      const flameY = fl.dir === 'down' ? fl.y : fl.y - fl.h + TILE_SIZE;
      if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                               flameX, flameY, fl.w, fl.h)) {
        if (!isInvincible()) killPlayer();
      }
    }
  }

  // Magnets [T8 §7.2] — speed change effect
  let magnetActive = false;
  for (const mg of G.magnets) {
    if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                             mg.x, mg.y, mg.w, mg.h)) {
      G.speedMult = mg.speedMult;
      magnetActive = true;
    }
  }
  // Reset speed if not in magnet zone (and not slow-active)
  if (!magnetActive && !G.slowActive) {
    G.speedMult = 1;
  }

  // Chain collapse (zone 5)
  if (G.chainCollapse && G.chainCollapse.active) {
    if (G.px < G.chainCollapse.x) {
      if (!isInvincible()) killPlayer();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 7: PLAYER
// ═══════════════════════════════════════════════════════════════

function flipGravity() {
  if (G.flipping && G.upgrades[0] < 3) return; // Can't double-flip without upgrade

  const flipSpeed = G.upgrades[0] >= 1 ? FLIP_DURATION * 0.85 : FLIP_DURATION;
  G.gravDir *= -1;
  G.flipping = true;
  G.flipTimer = flipSpeed;
  G.pvy = JUMP_VEL * G.gravDir * -1; // Impulse in new direction

  // Upgrade: gravity Lv2 = brief float
  if (G.upgrades[0] >= 2) {
    G.pvy *= 0.5; // Softer impulse
  }

  playSFX('flip');
  particles.emit(G.px, G.py, 8, {
    color: PLAYER_COLOR,
    speed: 80,
    life: 0.3,
    size: 3,
    angle: G.gravDir === 1 ? -Math.PI / 2 : Math.PI / 2,
    spread: Math.PI / 3
  });
}

function activateDash() {
  if (G.dashCooldown > 0) return;
  if (G.dashActive) {
    // Upgrade: dash Lv5 = triple dash
    if (G.upgrades[1] >= 5) {
      // Allow re-dash
    } else {
      return;
    }
  }

  G.dashActive = true;
  const baseDuration = 200;
  const dashDist = G.upgrades[1] >= 1 ? 1.2 : 1.0;
  G.dashTimer = baseDuration * dashDist;
  const baseCooldown = 3000;
  G.dashCooldown = G.upgrades[1] >= 2 ? baseCooldown * 0.8 : baseCooldown;

  playSFX('dash');
  particles.emit(G.px, G.py, 12, { color: '#ff8800', speed: 120, life: 0.4, size: 3 });
}

function activateSlow() {
  if (G.slowCharge < 1000) return;
  if (G.slowActive) return;

  G.slowActive = true;
  const baseDuration = G.upgrades[2] >= 1 ? 1500 : 1000;
  G.slowTimer = baseDuration;
  G.slowCharge = 0;

  playSFX('ui_select');
}

function killPlayer() {
  if (G.playState !== PS_ALIVE) return;
  if (G.respawnTimer > 0) return;

  G.playState = PS_DEAD;
  G.pose = 3;
  G.deaths++;
  G.stageDeaths++;
  G.consecutiveDeaths++;

  // Update DDA
  if (G.consecutiveDeaths >= DDA_THRESHOLD_3) G.ddaLevel = 3;
  else if (G.consecutiveDeaths >= DDA_THRESHOLD_2) G.ddaLevel = 2;
  else if (G.consecutiveDeaths >= DDA_THRESHOLD_1) G.ddaLevel = 1;

  playSFX('die');

  // Screen shake
  G.camShake = 8;

  // Death particles
  particles.emit(G.px, G.py, 25, {
    color: '#ff3333',
    speed: 200,
    life: 0.6,
    size: 4
  });
  particles.emit(G.px, G.py, 15, {
    color: PLAYER_COLOR,
    speed: 150,
    life: 0.4,
    size: 2
  });

  // Respawn via tween [F4] — no setTimeout
  G.respawnTimer = RESPAWN_DELAY;
  const respawnProxy = { t: 0 };
  tween.add(respawnProxy, { t: 1 }, RESPAWN_DELAY, 'easeOut', () => {
    respawnPlayer();
  });
}

function respawnPlayer() {
  G.px = G.checkpointX;
  G.py = G.checkpointY;
  G.pvy = 0;
  G.pvx = BASE_SPEED;
  G.gravDir = 1;
  G.flipping = false;
  G.dashActive = false;
  G.slowActive = false;
  G.playerAlpha = 1;
  G.playState = PS_ALIVE;
  G.respawnTimer = 0;
  G.pose = 0;

  // Brief invincibility flash
  const flashProxy = { alpha: 0.3 };
  tween.add(flashProxy, { alpha: 1 }, 500, 'linear', () => {
    G.playerAlpha = 1;
  });
}

function stageCleared() {
  if (G.playState !== PS_ALIVE) return;
  G.playState = PS_CLEAR;
  G.consecutiveDeaths = 0; // Reset DDA counter on clear

  // Calculate score [F8] — judge first, save later
  const diff = getDifficulty(G.stageIndex);
  const baseScore = 100 * (G.currentZone + 1);
  const coinBonus = G.collectedCoins * 10;
  const timeBonus = Math.max(0, Math.floor((diff.baseTime * 1000 - G.stageTime) / 1000)) * 5;
  const deathlessBonus = G.stageDeaths === 0 ? 500 : 0;
  G.clearScore = baseScore + coinBonus + timeBonus + deathlessBonus;

  // Stars [§7.4]
  let stars = 1;
  const timeSec = G.stageTime / 1000;
  if (G.stageDeaths <= 3 && G.collectedCoins >= G.totalCoins * 0.6 && timeSec <= diff.baseTime * 1.2) stars = 2;
  if (G.stageDeaths === 0 && G.collectedCoins >= G.totalCoins && timeSec <= diff.baseTime * 0.8) stars = 3;
  G.clearStars = stars;

  // Check new record [F8]
  const prevStars = G.stageStars[G.stageIndex];
  G.newRecord = stars > prevStars;
  if (stars > prevStars) G.stageStars[G.stageIndex] = stars;

  G.totalScore += G.clearScore;
  G.totalCoinsCollected += G.collectedCoins;

  // Unlock next stage
  unlockNextStages(G.stageIndex);

  // Save [F8] — save after judgment
  saveProgress();
  Save.setHighScore(GAME_ID, G.totalScore);

  // Effects
  playSFX('clear');
  G.camTargetZoom = 1.3;
  particles.emit(G.portalX, G.portalY, 40, {
    color: ZONE_COLORS[G.currentZone].portal,
    speed: 200,
    life: 1,
    size: 5
  });
}

function collectCoin(tx, ty) {
  G.tiles[ty][tx] = T_EMPTY;
  G.collectedCoins++;
  // Mark in coins array
  for (const c of G.coins) {
    const cx = Math.floor(c.x / TILE_SIZE);
    const cy = Math.floor(c.y / TILE_SIZE);
    if (cx === tx && cy === ty) {
      c.collected = true;
      break;
    }
  }
  playSFX('coin');
  // Slow Lv3: double coins
  if (G.slowActive && G.upgrades[2] >= 3) {
    G.collectedCoins++;
  }
  particles.emit(tx * TILE_SIZE + TILE_SIZE / 2, ty * TILE_SIZE + TILE_SIZE / 2, 8, {
    color: '#ffd700',
    speed: 100,
    life: 0.4,
    size: 3
  });
}

function unlockNextStages(clearedIdx) {
  const info = stageToZoneInfo(clearedIdx);
  if (info.type === 'stage') {
    // Unlock next stage in zone
    const nextInZone = clearedIdx + 1;
    if (nextInZone < 15 && Math.floor(nextInZone / 3) === info.zone) {
      G.stageUnlocked[nextInZone] = true;
    }
    // If all 3 stages in zone cleared, unlock boss
    const zoneStart = info.zone * 3;
    if (G.stageStars[zoneStart] > 0 && G.stageStars[zoneStart + 1] > 0 && G.stageStars[zoneStart + 2] > 0) {
      G.stageUnlocked[15 + info.zone] = true; // Boss stage
    }
    // H1 해금: 구역 2 스테이지 2 (stageIndex 4) 천장 비밀 통과 ≈ ★3 클리어 [§10.3]
    if (clearedIdx === 4 && G.clearStars >= 3) {
      G.hiddenUnlocked[0] = true;
    }
  } else if (info.type === 'boss') {
    G.bossDefeated[info.zone] = true;
    // Unlock next zone's first stage
    if (info.zone < 4) {
      G.stageUnlocked[(info.zone + 1) * 3] = true;
    }
    // H2 해금: 구역 4 보스(zone index 3) 무사망 클리어 [§10.3]
    if (info.zone === 3 && G.stageDeaths === 0) G.hiddenUnlocked[1] = true;
  }

  // Hidden 3: all stars 3
  let allThreeStars = true;
  for (let i = 0; i < 20; i++) {
    if (G.stageStars[i] < 3) { allThreeStars = false; break; }
  }
  if (allThreeStars) G.hiddenUnlocked[2] = true;

  // Set unlocked flags for hidden stages
  for (let i = 0; i < 3; i++) {
    if (G.hiddenUnlocked[i]) G.stageUnlocked[20 + i] = true;
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 8: ENEMIES & TRAPS
// ═══════════════════════════════════════════════════════════════

function updateTraps(dt) {
  const dtSec = dt / 1000;

  // Crushers
  for (const c of G.crushers) {
    c.timer += dt;
    switch (c.state) {
      case 'waiting':
        c.warning = false;
        if (c.timer >= c.period - 1000) {
          c.warning = true;
        }
        if (c.timer >= c.period) {
          c.state = 'crushing';
          c.timer = 0;
        }
        break;
      case 'crushing':
        c.y = lerp(c.baseY, c.targetY, Math.min(c.timer / 300, 1));
        if (c.timer >= 300) {
          c.state = 'holding';
          c.timer = 0;
          G.camShake = Math.max(G.camShake, 3);
        }
        break;
      case 'holding':
        if (c.timer >= 500) {
          c.state = 'returning';
          c.timer = 0;
        }
        break;
      case 'returning':
        c.y = lerp(c.targetY, c.baseY, Math.min(c.timer / 800, 1));
        if (c.timer >= 800) {
          c.y = c.baseY;
          c.state = 'waiting';
          c.timer = 0;
        }
        break;
    }
  }

  // Lasers
  for (const l of G.lasers) {
    l.timer += dt;
    const totalCycle = l.onDuration + l.offDuration;
    const phase = l.timer % totalCycle;

    if (phase < l.onDuration) {
      l.active = true;
      l.charging = false;
    } else if (phase < l.onDuration + 200) {
      l.active = false;
      l.charging = true; // About to turn off → charging for next on
    } else {
      l.active = false;
      l.charging = phase > totalCycle - 300; // Charging before next on
    }
  }

  // Moving platforms
  for (const mp of G.movingPlatforms) {
    mp.timer += dt * mp.speed * 0.001;
    mp.x = mp.baseX + Math.sin(mp.timer) * mp.rangeX;
    mp.y = mp.baseY + Math.cos(mp.timer * 0.7) * mp.rangeY;
  }

  // Vanish floors
  for (const vf of G.vanishFloors) {
    if (vf.cracking) {
      vf.touchTimer -= dt;
      if (vf.touchTimer <= 0) {
        vf.visible = false;
        vf.cracking = false;
        // Restore after 3 seconds
        const restoreProxy = { t: 0 };
        tween.add(restoreProxy, { t: 1 }, 3000, 'linear', () => {
          vf.visible = true;
        });
      }
    }
  }

  // Flames [T6 §7.2] — periodic directional bursts
  for (const fl of G.flames) {
    fl.timer += dt;
    const phase = fl.timer % fl.period;
    if (phase < fl.warningDuration) {
      fl.warning = true;
      fl.active = false;
    } else if (phase < fl.warningDuration + fl.burstDuration) {
      fl.warning = false;
      fl.active = true;
    } else {
      fl.warning = false;
      fl.active = false;
    }
  }

  // Magnets [T8 §7.2] — wave phase animation
  for (const mg of G.magnets) {
    mg.wavePhase += dt * 0.003;
  }

  // Chain collapse (zone 5)
  if (G.chainCollapse && G.chainCollapse.active) {
    const speedMult = G.slowActive ? 0.4 : 1;
    G.chainCollapse.x += G.chainCollapse.speed * dtSec * speedMult;
    // Screen shake when close
    if (G.px - G.chainCollapse.x < 200) {
      G.camShake = Math.max(G.camShake, 2);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// REGION 9: BOSS (5 types)
// ═══════════════════════════════════════════════════════════════

function initBoss(zoneId) {
  const bossData = [
    { name: 'DR-01', maxHP: 3, pattern: 'sweep', sweepPeriod: 5000, windowDuration: BOSS1_WINDOW },
    { name: 'CR-02', maxHP: 3, pattern: 'crush', cycleDuration: 5000, windowDuration: BOSS2_WINDOW },
    { name: 'RX-03', maxHP: 3, pattern: 'laser_grid', cycleDuration: 4000, windowDuration: 1500 },
    { name: 'GV-04', maxHP: 4, pattern: 'gravity_chaos', cycleDuration: 6000, windowDuration: 3000 },
    { name: 'NX-05', maxHP: 5, pattern: 'all_traps', cycleDuration: 5000, windowDuration: 800 }
  ];

  const bd = bossData[zoneId];
  G.boss = {
    type: zoneId,
    name: bd.name,
    x: engine.W * 0.7,
    y: GAME_H / 2,
    w: 64,
    h: 64,
    phase: 0,
    timer: 0,
    vulnerable: false,
    windowTimer: 0,
    attackTimer: 0,
    sweepY: GAME_H / 4,
    sweepDir: 1,
    crushTop: false,
    laserPattern: 0,
    gravDir: 1,
    collapseWaves: 0,
    hitFlash: 0,
    deathTimer: 0,
    alive: true
  };
  G.bossHP = bd.maxHP;
  G.bossMaxHP = bd.maxHP;
  G.bossPhase = 0;
  G.bossTimer = 0;
  G.bossRewardGiven = false;

  // Boss arena setup
  G.tiles = [];
  for (let y = 0; y < TILES_Y; y++) {
    G.tiles[y] = new Array(30).fill(T_EMPTY);
    G.tiles[y][0] = T_SOLID;
    G.tiles[y][29] = T_SOLID;
  }
  for (let x = 0; x < 30; x++) {
    G.tiles[0][x] = T_SOLID;
    G.tiles[TILES_Y - 1][x] = T_SOLID;
  }

  G.px = 60;
  G.py = GAME_H / 2;
  G.pvx = 0;
  G.pvy = 0;
  G.gravDir = 1;
  G.camX = 0;
  G.camZoom = 1;
  G.camTargetZoom = 0.85;

  // Boss arena objects
  G.crushers = [];
  G.lasers = [];
  G.movingPlatforms = [];
  G.vanishFloors = [];
  G.gravZones = [];
  G.coins = [];
  G.flames = [];
  G.magnets = [];
  G.chainCollapse = null;
  G.stageDeaths = 0;
  G.stageTime = 0;
  G.collectedCoins = 0;
  G.totalCoins = 0;
}

function updateBoss(dt) {
  if (!G.boss || !G.boss.alive) return;
  if (G.playState !== PS_ALIVE) return;

  const dtSec = dt / 1000;
  const b = G.boss;
  b.timer += dt;

  if (b.hitFlash > 0) b.hitFlash -= dt;

  const bossPatterns = [updateBoss0, updateBoss1, updateBoss2, updateBoss3, updateBoss4];
  bossPatterns[b.type](b, dt, dtSec);

  // Check if player hits vulnerable boss
  if (b.vulnerable) {
    const hs = PLAYER_SIZE / 2;
    if (MathUtil.rectCollide(G.px - hs, G.py - hs, PLAYER_SIZE, PLAYER_SIZE,
                             b.x - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
      hitBoss();
    }
  }

  // Boss attacks hit player
  checkBossAttacks(b);
}

// Boss 0: DR-01 (Surveillance Drone) — horizontal laser sweep
function updateBoss0(b, dt, dtSec) {
  const period = 5000;
  const sweepTime = 3000;
  const windowTime = 2000;

  const phase = b.timer % period;

  if (phase < sweepTime) {
    // Sweeping: laser goes up and down
    b.vulnerable = false;
    b.sweepY += b.sweepDir * 150 * dtSec;
    if (b.sweepY > GAME_H - 60) { b.sweepDir = -1; }
    if (b.sweepY < 60) { b.sweepDir = 1; }
    // Move boss
    b.y = lerp(b.y, b.sweepY, 0.05);
  } else {
    // Stopped: vulnerable
    b.vulnerable = true;
    b.windowTimer = windowTime - (phase - sweepTime);
    // Boss stays at top — player must flip to reach
    b.y = lerp(b.y, 60, 0.03);
  }
}

// Boss 1: CR-02 (Crusher Robot) — alternating floor/ceiling crush
function updateBoss1(b, dt, dtSec) {
  const cycleTime = 5000;
  const phase = b.timer % cycleTime;

  if (phase < 2000) {
    // Bottom crush
    b.crushTop = false;
    b.vulnerable = false;
    b.y = lerp(b.y, GAME_H - 40, 0.05);
  } else if (phase < 2500) {
    // Transition — vulnerable
    b.vulnerable = true;
    b.x = engine.W * 0.7;
    b.y = GAME_H / 2;
  } else if (phase < 4500) {
    // Top crush
    b.crushTop = true;
    b.vulnerable = false;
    b.y = lerp(b.y, 40, 0.05);
  } else {
    // Transition — vulnerable
    b.vulnerable = true;
    b.y = GAME_H / 2;
  }
}

// Boss 2: RX-03 (Reactor Core) — laser grid pattern
function updateBoss2(b, dt, dtSec) {
  const cycleTime = 4000;
  const phase = b.timer % cycleTime;

  if (phase < 1500) {
    // Cross pattern
    b.laserPattern = 0;
    b.vulnerable = false;
  } else if (phase < 3000) {
    // Transition safe zone + vulnerable
    b.vulnerable = true;
    b.laserPattern = -1;
  } else {
    // X pattern
    b.laserPattern = 1;
    b.vulnerable = false;
  }
  // Boss stays center
  b.x = engine.W * 0.5;
  b.y = GAME_H / 2;
}

// Boss 3: GV-04 (Gravity Master) — random gravity + magnetic push
function updateBoss3(b, dt, dtSec) {
  const cycleTime = 6000;
  const phase = b.timer % cycleTime;

  if (phase < 3000) {
    // Gravity chaos
    b.vulnerable = false;
    // Periodically flip gravity
    if (Math.floor(phase / 500) !== Math.floor((phase - dt) / 500)) {
      const rng = new SeededRNG(G.masterSeed + Math.floor(b.timer));
      if (rng.chance(0.5)) {
        G.gravDir *= -1;
        G.pvy *= -0.5;
      }
    }
    // Magnetic push
    const dx = G.px - b.x;
    const dy = G.py - b.y;
    const dist = Math.max(50, MathUtil.dist(G.px, G.py, b.x, b.y));
    G.px += (dx / dist) * 50 * dtSec;
    G.py += (dy / dist) * 50 * dtSec;
  } else {
    // Gravity stabilized — vulnerable
    b.vulnerable = true;
    G.gravDir = 1; // Stabilize
  }
  b.x = engine.W * 0.6;
  b.y = GAME_H / 2 + Math.sin(b.timer * 0.001) * 50;
}

// Boss 4: NX-05 (Core AI) — all traps + chain collapse
function updateBoss4(b, dt, dtSec) {
  const cycleTime = 5000;
  const phase = b.timer % cycleTime;

  if (phase < 1500) {
    // Collapse wave 1
    b.vulnerable = false;
    b.collapseWaves = 1;
    G.camShake = Math.max(G.camShake, 4);
  } else if (phase < 1800) {
    // Brief stop — vulnerable
    b.vulnerable = true;
    b.collapseWaves = 0;
  } else if (phase < 3300) {
    // Collapse wave 2
    b.vulnerable = false;
    b.collapseWaves = 2;
    G.camShake = Math.max(G.camShake, 5);
  } else if (phase < 3600) {
    // Brief stop — vulnerable
    b.vulnerable = true;
    b.collapseWaves = 0;
  } else if (phase < 4800) {
    // Collapse wave 3
    b.vulnerable = false;
    b.collapseWaves = 3;
    G.camShake = Math.max(G.camShake, 6);
  } else {
    // Brief stop — vulnerable
    b.vulnerable = true;
    b.collapseWaves = 0;
  }
  b.x = engine.W * 0.5;
  b.y = GAME_H / 2 + Math.sin(b.timer * 0.002) * 30;
}

function checkBossAttacks(b) {
  const hs = PLAYER_SIZE / 2;

  switch (b.type) {
    case 0: // DR-01: laser at sweepY height
      if (!b.vulnerable) {
        if (Math.abs(G.py - b.sweepY) < 15) {
          if (!isInvincible()) killPlayer();
        }
      }
      break;
    case 1: // CR-02: crush zones
      if (!b.vulnerable) {
        if (b.crushTop && G.py < 80) {
          if (!isInvincible()) killPlayer();
        }
        if (!b.crushTop && G.py > GAME_H - 80) {
          if (!isInvincible()) killPlayer();
        }
      }
      break;
    case 2: // RX-03: laser grid
      if (b.laserPattern === 0) {
        // Cross: horizontal + vertical center lines
        if (Math.abs(G.px - engine.W / 2) < 10 || Math.abs(G.py - GAME_H / 2) < 10) {
          if (!isInvincible()) killPlayer();
        }
      } else if (b.laserPattern === 1) {
        // X: diagonal lines
        const cx = engine.W / 2, cy = GAME_H / 2;
        const dx = G.px - cx, dy = G.py - cy;
        if (Math.abs(dx - dy) < 15 || Math.abs(dx + dy) < 15) {
          if (!isInvincible()) killPlayer();
        }
      }
      break;
    case 3: // GV-04: magnetic damage near boss
      if (!b.vulnerable) {
        if (MathUtil.dist(G.px, G.py, b.x, b.y) < 50) {
          if (!isInvincible()) killPlayer();
        }
      }
      break;
    case 4: // NX-05: collapse waves
      if (b.collapseWaves > 0) {
        // Dangerous zones based on collapse wave
        const waveX = b.collapseWaves * 100;
        if (G.px < waveX || G.py < 40 || G.py > GAME_H - 40) {
          if (!isInvincible()) killPlayer();
        }
      }
      break;
  }
}

function hitBoss() {
  if (!G.boss.vulnerable) return;
  G.boss.vulnerable = false;
  G.bossHP--;
  G.boss.hitFlash = 300;

  playSFX('boss_hit');
  G.camShake = 10;
  particles.emit(G.boss.x, G.boss.y, 30, { color: '#ff3333', speed: 250, life: 0.6, size: 5 });

  if (G.bossHP <= 0) {
    bossDied();
  } else {
    // Phase up
    G.bossPhase++;
    G.boss.timer = 0;
  }
}

function bossDied() {
  G.boss.alive = false;
  G.boss.deathTimer = 2000;
  G.playState = PS_CLEAR;

  if (!G.bossRewardGiven) {  // [F17]
    G.bossRewardGiven = true;
    G.clearScore = 1000 * (G.boss.type + 1);
    G.totalScore += G.clearScore;
    G.clearStars = G.stageDeaths === 0 ? 3 : (G.stageDeaths <= 3 ? 2 : 1);

    const bossIdx = 15 + G.boss.type;
    if (G.clearStars > G.stageStars[bossIdx]) G.stageStars[bossIdx] = G.clearStars;
    unlockNextStages(bossIdx);
    saveProgress();
    Save.setHighScore(GAME_ID, G.totalScore);
  }

  playSFX('boss_die');
  G.camShake = 15;

  // Explosion particles
  for (let i = 0; i < 5; i++) {
    const delay = { t: 0 };
    tween.add(delay, { t: 1 }, 200 * i, 'linear', () => {
      if (G.boss) {
        particles.emit(G.boss.x + (i - 2) * 20, G.boss.y + (i - 2) * 15, 20, {
          color: i % 2 === 0 ? '#ff3333' : '#ffd700',
          speed: 300,
          life: 0.8,
          size: 6
        });
      }
    });
  }
}

// REGION 10: UI & HUD

function isHoldingLeft() {
  if (!input.isMobile) return false;
  for (const t of input.touches) {
    if (t.x < engine.W / 3) return true;
  }
  return false;
}

function isHoldingRight() {
  if (!input.isMobile) return false;
  for (const t of input.touches) {
    if (t.x > engine.W * 2 / 3) return true;
  }
  return false;
}

// Render title screen
function renderTitle(ctx, w, h) {
  const zc = ZONE_COLORS[0];

  // Background
  ctx.fillStyle = zc.bg;
  ctx.fillRect(0, 0, w, h);

  // Starfield background
  drawStarfield(ctx, w, h, G.titlePulse);

  // Background layer
  if (assets.sprites.bgLayer1) {
    ctx.globalAlpha = 0.3;
    ctx.drawImage(assets.sprites.bgLayer1, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // Title text with glow
  const titleY = h * 0.3;
  ctx.save();
  const pulse = 0.8 + Math.sin(G.titlePulse * 0.003) * 0.2;

  // Title shadow
  UI.text(ctx, getText('title'), w / 2, titleY, {
    size: Math.min(48, w * 0.1), bold: true, color: PLAYER_COLOR, glow: PLAYER_COLOR
  });

  // Subtitle
  UI.text(ctx, getText('subtitle'), w / 2, titleY + 50, {
    size: Math.min(18, w * 0.04), color: '#8080a0'
  });

  ctx.restore();

  // Gravity flip animation
  const arrowY = titleY - 80 + Math.sin(G.titlePulse * 0.005) * 20;
  drawGravityArrows(ctx, w / 2, arrowY, 40, G.titlePulse);

  // Player character preview
  if (assets.sprites.player) {
    const px = w / 2 - 32;
    const py = h * 0.5 - 32;
    const bobY = Math.sin(G.titlePulse * 0.003) * 10;
    ctx.save();
    ctx.globalAlpha = G.titleAlpha;
    ctx.drawImage(assets.sprites.player, px, py + bobY, 64, 64);
    ctx.restore();
  } else {
    drawPlayerShape(ctx, w / 2, h * 0.5, PLAYER_SIZE * 2, 1, 0, 1);
  }

  // Start prompt
  const promptAlpha = 0.5 + Math.sin(G.titlePulse * 0.005) * 0.5;
  ctx.globalAlpha = promptAlpha * G.titleAlpha;
  const promptText = input.isMobile ? getText('tapToStart') : getText('pressToStart');
  UI.text(ctx, promptText, w / 2, h * 0.75, {
    size: Math.min(20, w * 0.04), color: '#e0e0f0'
  });
  ctx.globalAlpha = 1;

  // Version
  UI.text(ctx, 'v1.0', w - 40, h - 20, { size: 10, color: '#505070' });
}

// Render map screen
function renderMap(ctx, w, h) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  if (G.showUpgrades) {
    renderUpgradeShop(ctx, w, h);
    return;
  }

  // Title
  UI.text(ctx, getText('stageSelect'), w / 2, 30, { size: 22, bold: true, color: '#e0e0f0' });

  // Total score
  UI.text(ctx, `${getText('totalScore')}: ${G.totalScore}`, w / 2, 55, {
    size: 14, color: '#ffd700'
  });

  // Zone tabs
  const tabW = Math.min(80, (w - 20) / 5);
  const tabY = 75;
  for (let z = 0; z < 5; z++) {
    const tx = 10 + z * tabW;
    const active = G.mapSelection >= z * 3 && G.mapSelection < (z + 1) * 3 + 2;
    const zc = ZONE_COLORS[z];
    ctx.fillStyle = active ? zc.bg2 : '#12121e';
    ctx.fillRect(tx, tabY, tabW - 4, 28);
    ctx.strokeStyle = active ? zc.portal : '#1e1e30';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, tabY, tabW - 4, 28);
    UI.text(ctx, getText('zone' + (z + 1)), tx + (tabW - 4) / 2, tabY + 14, {
      size: 10, color: active ? '#e0e0f0' : '#505070'
    });
  }

  // Stage nodes
  const nodeStartY = 120;
  const nodeSpacingY = 50;
  const nodeSize = Math.max(MIN_TOUCH, 40);

  // Main stages (15)
  for (let i = 0; i < 15; i++) {
    const zone = Math.floor(i / 3);
    const local = i % 3;
    const nx = w * 0.2 + local * (w * 0.25);
    const ny = nodeStartY + zone * nodeSpacingY;
    const unlocked = G.stageUnlocked[i];
    const selected = G.mapSelection === i;
    const stars = G.stageStars[i];
    const zc = ZONE_COLORS[zone];

    drawStageNode(ctx, nx, ny, nodeSize, unlocked, selected, stars, zc, `${zone + 1}-${local + 1}`);
  }

  // Boss stages (5)
  for (let i = 0; i < 5; i++) {
    const idx = 15 + i;
    const nx = w * 0.85;
    const ny = nodeStartY + i * nodeSpacingY;
    const unlocked = G.stageUnlocked[idx];
    const selected = G.mapSelection === idx;
    const stars = G.stageStars[idx];
    const zc = ZONE_COLORS[i];

    drawStageNode(ctx, nx, ny, nodeSize, unlocked, selected, stars, zc, getText('boss'));
  }

  // Hidden stages (3)
  const hiddenY = nodeStartY + 5 * nodeSpacingY + 20;
  for (let i = 0; i < 3; i++) {
    const idx = 20 + i;
    const nx = w * 0.25 + i * (w * 0.25);
    const ny = hiddenY;
    const unlocked = G.stageUnlocked[idx];
    const selected = G.mapSelection === idx;
    const stars = G.stageStars[idx];

    drawStageNode(ctx, nx, ny, nodeSize, unlocked, selected, stars, ZONE_COLORS[2], unlocked ? 'H' + (i + 1) : '?');
  }

  // Bottom buttons
  const btnW = Math.max(MIN_TOUCH * 2, 120);
  const btnH = Math.max(MIN_TOUCH, 40);
  const btnY = h - btnH - 15;

  // Upgrade button
  UI.button(ctx, getText('upgrade'), 15, btnY, btnW, btnH, { color: '#6c3cf7' });

  // Coins display
  if (assets.sprites.uiStar) {
    ctx.drawImage(assets.sprites.uiStar, w / 2 - 40, btnY + 5, 30, 30);
  }
  UI.text(ctx, `${G.totalCoinsCollected}`, w / 2 + 10, btnY + btnH / 2, {
    size: 16, color: '#ffd700', align: 'left'
  });

  // Back button
  UI.button(ctx, getText('back'), w - btnW - 15, btnY, btnW, btnH, { color: '#333' });

  // Selected stage info
  if (G.mapSelection >= 0 && G.mapSelection < 23) {
    const info = stageToZoneInfo(G.mapSelection);
    const infoY = h - 80;
    if (G.stageUnlocked[G.mapSelection]) {
      UI.text(ctx, getText('pressToPlay'), w / 2, infoY, { size: 14, color: '#8080a0' });
    } else {
      UI.text(ctx, getText('locked'), w / 2, infoY, { size: 14, color: '#505070' });
    }
  }
}

function drawStageNode(ctx, x, y, size, unlocked, selected, stars, zc, label) {
  const s = size * 0.5;
  ctx.save();

  if (selected) {
    ctx.shadowColor = zc.portal;
    ctx.shadowBlur = 15;
  }

  ctx.fillStyle = unlocked ? (selected ? zc.bg2 : '#1a1a2e') : '#0a0a0f';
  ctx.strokeStyle = unlocked ? (selected ? zc.portal : zc.danger + '66') : '#1e1e30';
  ctx.lineWidth = selected ? 2 : 1;

  ctx.beginPath();
  ctx.roundRect(x - s, y - s, size, size, 6);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Label
  UI.text(ctx, label, x, y - 4, {
    size: 11, color: unlocked ? '#e0e0f0' : '#505070', bold: selected
  });

  // Stars
  if (stars > 0) {
    const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
    UI.text(ctx, starStr, x, y + 12, { size: 8, color: '#ffd700' });
  }

  ctx.restore();
}

function renderUpgradeShop(ctx, w, h) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  UI.text(ctx, getText('upgrade'), w / 2, 30, { size: 24, bold: true, color: '#6c3cf7', glow: '#6c3cf7' });

  const branches = [
    { name: getText('gravity'), color: '#00eeff', icon: '↕' },
    { name: getText('dash'), color: '#ff8800', icon: '→' },
    { name: getText('slow'), color: '#cc33ff', icon: '◎' }
  ];

  const colW = Math.min(200, (w - 40) / 3);
  const startX = (w - colW * 3) / 2;
  const startY = 70;

  for (let b = 0; b < 3; b++) {
    const bx = startX + b * colW + colW / 2;
    const selected = G.upgradeSelection === b;

    // Branch header
    UI.text(ctx, branches[b].icon + ' ' + branches[b].name, bx, startY, {
      size: 14, bold: true, color: selected ? branches[b].color : '#8080a0'
    });

    // Level dots
    for (let lv = 0; lv < 5; lv++) {
      const ly = startY + 30 + lv * 45;
      const filled = G.upgrades[b] >= lv + 1;
      const canAfford = G.totalCoinsCollected >= UPGRADE_COSTS[lv + 1];

      ctx.fillStyle = filled ? branches[b].color : (canAfford ? '#333' : '#1a1a1a');
      ctx.strokeStyle = selected && G.upgrades[b] === lv ? '#fff' : branches[b].color + '44';
      ctx.lineWidth = selected && G.upgrades[b] === lv ? 2 : 1;

      ctx.beginPath();
      ctx.arc(bx, ly, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      UI.text(ctx, `Lv${lv + 1}`, bx, ly, { size: 9, color: filled ? '#000' : '#666' });

      if (!filled && G.upgrades[b] === lv) {
        UI.text(ctx, `${UPGRADE_COSTS[lv + 1]}`, bx, ly + 20, {
          size: 9, color: canAfford ? '#ffd700' : '#666'
        });
      }
    }
  }

  // Coins
  UI.text(ctx, `${getText('coins')}: ${G.totalCoinsCollected}`, w / 2, h - 60, {
    size: 16, color: '#ffd700'
  });

  // Back button
  const btnW = Math.max(MIN_TOUCH * 2, 120);
  const btnH = Math.max(MIN_TOUCH, 40);
  UI.button(ctx, getText('back'), w / 2 - btnW / 2, h - 45, btnW, btnH, { color: '#333' });
}

// Render HUD during gameplay
function renderHUD(ctx, w, h) {
  const pad = 10;
  const iconSize = 24;

  // Coins
  if (assets.sprites.uiStar) {
    ctx.drawImage(assets.sprites.uiStar, pad, pad, iconSize, iconSize);
  }
  UI.text(ctx, `${G.collectedCoins}/${G.totalCoins}`, pad + iconSize + 5, pad + iconSize / 2, {
    size: 14, color: '#ffd700', align: 'left'
  });

  // Deaths
  if (assets.sprites.uiHeart) {
    ctx.drawImage(assets.sprites.uiHeart, pad, pad + 30, iconSize, iconSize);
  }
  UI.text(ctx, `${getText('deaths')}: ${G.stageDeaths}`, pad + iconSize + 5, pad + 30 + iconSize / 2, {
    size: 12, color: '#ff5555', align: 'left'
  });

  // Time
  const timeSec = Math.floor(G.stageTime / 1000);
  UI.text(ctx, `${Math.floor(timeSec / 60)}:${(timeSec % 60).toString().padStart(2, '0')}`, w - pad, pad + 12, {
    size: 14, color: '#e0e0f0', align: 'right'
  });

  // Zone name
  const info = stageToZoneInfo(G.stageIndex);
  UI.text(ctx, `${getText('zone' + (G.currentZone + 1))} ${info.stage + 1}`, w / 2, pad + 12, {
    size: 12, color: '#8080a0'
  });

  // Pause button (top right) — Canvas-drawn icon [Fix: Issues #11,#12]
  const pauseBtnSize = Math.max(MIN_TOUCH, 36);
  const pbx = w - pauseBtnSize - pad;
  const pby = pad + 28;
  ctx.fillStyle = '#1a1a2e99';
  ctx.strokeStyle = '#8080a066';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(pbx, pby, pauseBtnSize, pauseBtnSize, 6);
  ctx.fill();
  ctx.stroke();
  // Draw pause icon (two vertical bars)
  const pcx = pbx + pauseBtnSize / 2;
  const pcy = pby + pauseBtnSize / 2;
  ctx.fillStyle = '#e0e0f0';
  ctx.fillRect(pcx - 6, pcy - 7, 4, 14);
  ctx.fillRect(pcx + 2, pcy - 7, 4, 14);

  // Restart button (top right below pause) — Canvas-drawn icon
  const rbx = pbx;
  const rby = pby + pauseBtnSize + 5;
  ctx.fillStyle = '#1a1a2e99';
  ctx.strokeStyle = '#8080a066';
  ctx.beginPath();
  ctx.roundRect(rbx, rby, pauseBtnSize, pauseBtnSize, 6);
  ctx.fill();
  ctx.stroke();
  // Draw restart icon (circular arrow)
  const rcx = rbx + pauseBtnSize / 2;
  const rcy = rby + pauseBtnSize / 2;
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(rcx, rcy, 8, -Math.PI * 0.8, Math.PI * 0.6);
  ctx.stroke();
  // Arrowhead
  const arrowAngle = Math.PI * 0.6;
  const arrowTipX = rcx + Math.cos(arrowAngle) * 8;
  const arrowTipY = rcy + Math.sin(arrowAngle) * 8;
  ctx.fillStyle = '#e0e0f0';
  ctx.beginPath();
  ctx.moveTo(arrowTipX + 4, arrowTipY - 2);
  ctx.lineTo(arrowTipX - 2, arrowTipY - 4);
  ctx.lineTo(arrowTipX, arrowTipY + 3);
  ctx.closePath();
  ctx.fill();

  // DDA hint
  if (G.ddaLevel >= 3) {
    UI.text(ctx, getText('dda_hint'), w / 2, h - 20, { size: 10, color: '#555' });
  }

  // Dash/Slow cooldowns
  if (G.upgrades[1] > 0) {
    const dashReady = G.dashCooldown <= 0 && !G.dashActive;
    drawCooldownIndicator(ctx, w - 60, h - 50, 18, G.dashCooldown, 3000, '#ff8800', dashReady, 'D');
  }
  if (G.upgrades[2] > 0) {
    const slowReady = G.slowCharge >= 1000 && !G.slowActive;
    drawCooldownIndicator(ctx, w - 30, h - 50, 18, 3000 - G.slowCharge, 3000, '#cc33ff', slowReady, 'S');
  }

  // Boss HP bar
  if (G.state === S_BOSS && G.boss) {
    const barW = Math.min(300, w * 0.6);
    const barH = 12;
    const barX = (w - barW) / 2;
    const barY = h - 30;
    UI.hpBar(ctx, barX, barY, barW, barH, G.bossHP, G.bossMaxHP, { fgColor: '#ff3333' });
    UI.text(ctx, G.boss.name, w / 2, barY - 10, { size: 12, color: '#ff3333', bold: true });
  }
}

function drawCooldownIndicator(ctx, x, y, r, current, max, color, ready, label) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = ready ? color + '44' : '#222';
  ctx.fill();
  ctx.strokeStyle = ready ? color : '#444';
  ctx.lineWidth = 2;
  ctx.stroke();

  if (!ready) {
    // Draw arc for cooldown
    const progress = 1 - clamp(current / max, 0, 1);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
    ctx.closePath();
    ctx.fillStyle = color + '66';
    ctx.fill();
  }

  UI.text(ctx, label, x, y, { size: 10, color: ready ? '#fff' : '#888' });
  ctx.restore();
}

// Pause modal [F3]
function renderPauseModal(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  const mw = Math.min(300, w * 0.8);
  const mh = 200;
  const mx = (w - mw) / 2;
  const my = (h - mh) / 2;

  ctx.fillStyle = '#12121e';
  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(mx, my, mw, mh, 12);
  ctx.fill();
  ctx.stroke();

  UI.text(ctx, getText('pause'), w / 2, my + 30, { size: 24, bold: true, color: '#e0e0f0' });

  const options = [getText('resume'), getText('restart'), getText('quit')];
  const btnW = mw - 40;
  const btnH = Math.max(MIN_TOUCH, 36);

  for (let i = 0; i < options.length; i++) {
    const by = my + 60 + i * (btnH + 10);
    const selected = G.pauseSelection === i;
    UI.button(ctx, options[i], mx + 20, by, btnW, btnH, {
      color: selected ? '#6c3cf7' : '#333',
      hover: selected
    });
  }
}

// Clear screen
function renderClearScreen(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  const cy = h * 0.3;
  UI.text(ctx, getText('clear'), w / 2, cy, {
    size: 40, bold: true, color: '#ffd700', glow: '#ffd700'
  });

  // Stars
  const starStr = '★'.repeat(G.clearStars) + '☆'.repeat(3 - G.clearStars);
  UI.text(ctx, starStr, w / 2, cy + 50, { size: 30, color: '#ffd700' });

  // Score
  UI.text(ctx, `${getText('score')}: ${G.clearScore}`, w / 2, cy + 90, {
    size: 18, color: '#e0e0f0'
  });

  if (G.newRecord) {
    UI.text(ctx, getText('newRecord'), w / 2, cy + 115, {
      size: 16, color: '#ff3333', glow: '#ff3333'
    });
  }

  // Stats
  UI.text(ctx, `${getText('deaths')}: ${G.stageDeaths}  |  ${getText('coins')}: ${G.collectedCoins}/${G.totalCoins}`, w / 2, cy + 140, {
    size: 13, color: '#8080a0'
  });
