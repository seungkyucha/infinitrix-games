// SeededRNG (F18: Math.random 0건)
class SeededRNG {
  constructor(seed) { this.seed = seed | 0; if (!this.seed) this.seed = 1; }
  // xorshift32 의사 난수 생성
  next() {
    let s = this.seed;
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    this.seed = s;
    return (s >>> 0) / 4294967296;
  }
  // min~max 범위 정수
  int(min, max) { return min + ((this.next() * (max - min + 1)) | 0); }
  // min~max 범위 실수
  float(min, max) { return min + this.next() * (max - min); }
  // 배열에서 랜덤 선택
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  // Fisher-Yates 셔플
  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.int(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

// TweenManager (F4, F5, F13, F14)
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; this._updating = false; }
  // 트윈 추가
  add(target, prop, from, to, duration, onComplete, easing) {
    const tw = { target, prop, from, to, duration, elapsed: 0, onComplete, easing: easing || 'easeInOut', done: false };
    if (target && prop) target[prop] = from;
    if (this._updating) this._toAdd.push(tw);
    else this._tweens.push(tw);
    return tw;
  }
  // 지연 실행 (setTimeout 대체)
  delay(duration, onComplete) {
    return this.add(null, null, 0, 1, duration, onComplete, 'linear');
  }
  // 즉시 정리 (F13: cancelAll과 add 사이 경쟁 조건 방지)
  clearImmediate() {
    this._tweens.length = 0;
    this._toAdd.length = 0;
  }
  // 프레임 업데이트
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.done) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      let p = Math.min(tw.elapsed / tw.duration, 1);
      // 이징 함수
      if (tw.easing === 'easeInOut') p = p < 0.5 ? 2 * p * p : 1 - (-2 * p + 2) * (-2 * p + 2) / 2;
      else if (tw.easing === 'easeOut') p = 1 - (1 - p) * (1 - p);
      else if (tw.easing === 'easeIn') p = p * p;
      if (tw.target && tw.prop) tw.target[tw.prop] = tw.from + (tw.to - tw.from) * p;
      if (tw.elapsed >= tw.duration) {
        tw.done = true;
        if (tw.target && tw.prop) tw.target[tw.prop] = tw.to;
        if (tw.onComplete) tw.onComplete();
        this._tweens.splice(i, 1);
      }
    }
    this._updating = false;
    // 업데이트 중 추가된 트윈 반영
    if (this._toAdd.length) {
      this._tweens.push(...this._toAdd);
      this._toAdd.length = 0;
    }
  }
  // 활성 트윈 수
  get count() { return this._tweens.length; }
}

// ObjectPool — 파티클/투사체 재사용
class ObjectPool {
  constructor(factory, reset, maxSize) {
    this._factory = factory; this._reset = reset;
    this._pool = []; this._active = []; this._max = maxSize || 500;
  }
  // 풀에서 획득
  get() {
    let obj = this._pool.length > 0 ? this._pool.pop() : (this._active.length < this._max ? this._factory() : null);
    if (obj) { this._reset(obj); this._active.push(obj); }
    return obj;
  }
  // 풀에 반환
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  // 모두 반환
  releaseAll() {
    while (this._active.length) this._pool.push(this._active.pop());
  }
  // 활성 목록 순회
  forEach(fn) {
    for (let i = this._active.length - 1; i >= 0; i--) fn(this._active[i], i);
  }
  get activeCount() { return this._active.length; }
  get activeList() { return this._active; }
}

// SoundManager (Web Audio API)
class SoundManager {
  constructor() {
    this._ctx = null; this._master = null; this._sfxVol = 0.7; this._bgmVol = 0.5;
    this._bgmNode = null; this._bgmGain = null; this._initialized = false;
  }
  // 유저 인터랙션 후 초기화
  init() {
    if (this._initialized) return;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._master = this._ctx.createGain();
      this._master.connect(this._ctx.destination);
      this._initialized = true;
    } catch (e) { /* 오디오 미지원 */ }
  }
  // 효과음 재생
  play(type) {
    if (!this._initialized) return;
    const ctx = this._ctx;
    const now = ctx.currentTime;
    const g = ctx.createGain();
    g.gain.value = this._sfxVol * 0.3;
    g.connect(this._master);
    let osc, dur;
    switch (type) {
      case 'deploy': // 유닛 배치
        osc = ctx.createOscillator(); osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(880, now + 0.2);
        osc.connect(g); osc.start(now); osc.stop(now + 0.2);
        g.gain.linearRampToValueAtTime(0, now + 0.2); dur = 0.2; break;
      case 'attack_melee': // 근접 공격
        { const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
          const data = buf.getChannelData(0);
          const rng2 = new SeededRNG(Date.now() & 0xFFFF);
          for (let i = 0; i < data.length; i++) data[i] = (rng2.next() * 2 - 1) * 0.5;
          const src = ctx.createBufferSource(); src.buffer = buf;
          src.connect(g); src.start(now); }
        g.gain.linearRampToValueAtTime(0, now + 0.1); break;
      case 'attack_range': // 원거리 사격
        osc = ctx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.linearRampToValueAtTime(220, now + 0.15);
        osc.connect(g); osc.start(now); osc.stop(now + 0.15);
        g.gain.linearRampToValueAtTime(0, now + 0.15); break;
      case 'skill': // 스킬 발동
        osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.linearRampToValueAtTime(1320, now + 0.3);
        osc.connect(g); osc.start(now); osc.stop(now + 0.3);
        g.gain.linearRampToValueAtTime(0, now + 0.3); break;
      case 'hit': // 피격
        { const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
          const data = buf.getChannelData(0);
          const rng3 = new SeededRNG((Date.now() + 7) & 0xFFFF);
          for (let i = 0; i < data.length; i++) data[i] = (rng3.next() * 2 - 1) * 0.4;
          const src = ctx.createBufferSource(); src.buffer = buf;
          src.connect(g); src.start(now); }
        g.gain.linearRampToValueAtTime(0, now + 0.08); break;
      case 'explosion': // 폭발
        osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(110, now);
        osc.frequency.linearRampToValueAtTime(30, now + 0.4);
        osc.connect(g); g.gain.value = this._sfxVol * 0.5;
        osc.start(now); osc.stop(now + 0.4);
        g.gain.linearRampToValueAtTime(0, now + 0.4); break;
      case 'boss_roar': // 보스 등장
        osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(55, now);
        osc.frequency.linearRampToValueAtTime(110, now + 1.0);
        osc.connect(g); g.gain.value = this._sfxVol * 0.6;
        osc.start(now); osc.stop(now + 1.0);
        g.gain.linearRampToValueAtTime(0, now + 1.0); break;
      case 'gear': // 기어 획득
        osc = ctx.createOscillator(); osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.linearRampToValueAtTime(1760, now + 0.1);
        osc.connect(g); osc.start(now); osc.stop(now + 0.1);
        g.gain.linearRampToValueAtTime(0, now + 0.1); break;
      case 'blueprint': // 블루프린트 선택
        osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now); // C5
        osc.connect(g); osc.start(now); osc.stop(now + 0.5);
        g.gain.linearRampToValueAtTime(0, now + 0.5);
        const osc2 = ctx.createOscillator(); osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659, now + 0.05); // E5
        osc2.connect(g); osc2.start(now + 0.05); osc2.stop(now + 0.5); break;
      case 'steam': // 스팀 분출
        { const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
          const data = buf.getChannelData(0);
          const rng4 = new SeededRNG((Date.now() + 17) & 0xFFFF);
          for (let i = 0; i < data.length; i++) data[i] = (rng4.next() * 2 - 1) * 0.2 * (1 - i / data.length);
          const src = ctx.createBufferSource(); src.buffer = buf;
          const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 2000;
          src.connect(filt); filt.connect(g); src.start(now); }
        g.gain.linearRampToValueAtTime(0, now + 0.3); break;
      case 'click': // UI 클릭
        osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.value = 600;
        osc.connect(g); g.gain.value = this._sfxVol * 0.15;
        osc.start(now); osc.stop(now + 0.05);
        g.gain.linearRampToValueAtTime(0, now + 0.05); break;
    }
  }
  // BGM 시작 (프로시저럴)
  startBGM(mood) {
    if (!this._initialized) return;
    this.stopBGM();
    const ctx = this._ctx;
    this._bgmGain = ctx.createGain();
    this._bgmGain.gain.value = this._bgmVol * 0.15;
    this._bgmGain.connect(this._master);
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const freqs = { title: 130.81, deploy: 174.61, combat: 146.83, boss: 164.81, victory: 261.63 };
    osc.frequency.value = freqs[mood] || 130.81;
    const osc2 = ctx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = (freqs[mood] || 130.81) * 1.5;
    const g2 = ctx.createGain(); g2.gain.value = 0.5;
    osc.connect(this._bgmGain);
    osc2.connect(g2); g2.connect(this._bgmGain);
    osc.start(); osc2.start();
    this._bgmNode = [osc, osc2];
  }
  // BGM 정지
  stopBGM() {
    if (this._bgmNode) {
      this._bgmNode.forEach(n => { try { n.stop(); } catch(e) {} });
      this._bgmNode = null;
    }
  }
  // 볼륨 설정
  setSfxVol(v) { this._sfxVol = v; }
  setBgmVol(v) { this._bgmVol = v; if (this._bgmGain) this._bgmGain.gain.value = v * 0.15; }
  update(dt) { /* 현재 업데이트 필요 없음 */ }
}

// InputManager — 키보드 + 마우스 + 터치 통합
class InputManager {
  constructor() {
    this.keys = {}; this.keysJustPressed = {};
    this.mouse = { x: 0, y: 0, down: false, justClicked: false, rightClick: false, justRight: false };
    this.touches = []; this.touchStart = null; this.touchMoved = false;
    this.longPressTimer = 0; this.longPressed = false;
    this.doubleTapTimer = 0; this.doubleTapped = false;
    this._lastTapTime = 0; this._lastTapX = 0; this._lastTapY = 0;
    this.virtualButtons = []; // {x, y, w, h, id, label, active}
  }
  // 프레임 후 플래그 리셋
  update() {
    this.keysJustPressed = {};
    this.mouse.justClicked = false;
    this.mouse.justRight = false;
    this.doubleTapped = false;
    this.longPressed = false;
  }
  // 키 입력
  onKeyDown(e) { if (!this.keys[e.code]) this.keysJustPressed[e.code] = true; this.keys[e.code] = true; }
  onKeyUp(e) { this.keys[e.code] = false; }
  // 마우스 입력
  onMouseDown(e, canvasRect, dpr) {
    const x = (e.clientX - canvasRect.left) * dpr;
    const y = (e.clientY - canvasRect.top) * dpr;
    this.mouse.x = x; this.mouse.y = y; this.mouse.down = true;
    if (e.button === 0) this.mouse.justClicked = true;
    if (e.button === 2) { this.mouse.rightClick = true; this.mouse.justRight = true; }
  }
  onMouseUp(e) { this.mouse.down = false; if (e.button === 2) this.mouse.rightClick = false; }
  onMouseMove(e, canvasRect, dpr) {
    this.mouse.x = (e.clientX - canvasRect.left) * dpr;
    this.mouse.y = (e.clientY - canvasRect.top) * dpr;
  }
  // 터치 입력 (canvasRect, dpr 전달)
  onTouchStart(e, canvasRect, dpr) {
    e.preventDefault();
    const t = e.changedTouches[0];
    const x = (t.clientX - canvasRect.left) * dpr;
    const y = (t.clientY - canvasRect.top) * dpr;
    this.touchStart = { x, y, time: performance.now() };
    this.touchMoved = false;
    this.mouse.x = x; this.mouse.y = y;
    this.mouse.down = true;
    this.mouse.justClicked = true;
    // 더블 탭 검출
    const now = performance.now();
    const dist = Math.hypot(x - this._lastTapX, y - this._lastTapY);
    if (now - this._lastTapTime < 350 && dist < 40 * dpr) this.doubleTapped = true;
    this._lastTapTime = now; this._lastTapX = x; this._lastTapY = y;
  }
  onTouchMove(e, canvasRect, dpr) {
    e.preventDefault();
    if (!e.changedTouches[0]) return;
    const t = e.changedTouches[0];
    const x = (t.clientX - canvasRect.left) * dpr;
    const y = (t.clientY - canvasRect.top) * dpr;
    this.mouse.x = x; this.mouse.y = y;
    if (this.touchStart) {
      const dist = Math.hypot(x - this.touchStart.x, y - this.touchStart.y);
      if (dist > 10 * dpr) this.touchMoved = true;
    }
  }
  onTouchEnd(e, canvasRect, dpr) {
    e.preventDefault();
    this.mouse.down = false;
    if (this.touchStart && !this.touchMoved) {
      const elapsed = performance.now() - this.touchStart.time;
      if (elapsed > 500) this.longPressed = true;
    }
    this.touchStart = null;
  }
  // hitTest 단일 함수 (F16)
  hitTest(px, py, rx, ry, rw, rh) {
    return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
  }
  // 가상 버튼 체크
  checkVirtualButton(id) {
    if (!this.mouse.justClicked) return false;
    const btn = this.virtualButtons.find(b => b.id === id);
    if (!btn) return false;
    return this.hitTest(this.mouse.x, this.mouse.y, btn.x, btn.y, btn.w, btn.h);
  }
}

let entityIdCounter = 0;

// 아군 유닛 생성
function createUnit(type, x, y, workshopBonus) {
  const base = CONFIG.UNIT[type];
  const wb = workshopBonus || { atk: 0, hp: 0, def: 0, speed: 0 };
  return {
    id: ++entityIdCounter, type, x, y, targetX: x, targetY: y,
    hp: base.hp * (1 + wb.hp), maxHp: base.hp * (1 + wb.hp),
    atk: base.dps * (1 + wb.atk), range: base.range * CONFIG.TILE,
    speed: base.speed * CONFIG.TILE * (1 + wb.speed), def: base.def + wb.def,
    cooldown: 0, skillCooldown: 0, alive: true,
    state: 'idle', stateTimer: 0, animFrame: 0,
    evolved: 0, blueprintBonuses: {},
    flashTimer: 0 // 피격 시 흰색 플래시
  };
}

// 적 유닛 생성
function createEnemy(type, x, y, diffMults, ddaMults) {
  const base = CONFIG.ENEMY[type];
  const dm = diffMults || { hpMult: 1, atkMult: 1 };
  const dda = ddaMults || { hpMult: 1, atkMult: 1 };
  return {
    id: ++entityIdCounter, type, x, y, targetX: x, targetY: y,
    hp: base.hp * dm.hpMult * dda.hpMult,
    maxHp: base.hp * dm.hpMult * dda.hpMult,
    atk: base.atk * dm.atkMult * dda.atkMult,
    speed: base.speed * CONFIG.TILE,
    range: (base.range || 1.2) * CONFIG.TILE,
    score: base.score, alive: true,
    state: 'move', stateTimer: 0, animFrame: 0,
    cooldown: 0, flashTimer: 0,
    healRate: base.healRate || 0
  };
}

// 보스 생성
function createBoss(zoneIndex, diffMults, ddaMults) {
  const zone = ZONES[zoneIndex];
  const bossData = CONFIG.BOSS[zone.bossKey];
  const dm = diffMults || { hpMult: 1, atkMult: 1 };
  const dda = ddaMults || { hpMult: 1, atkMult: 1 };
  return {
    id: ++entityIdCounter, zoneIndex, bossKey: zone.bossKey,
    x: CONFIG.MAP_W * CONFIG.TILE * 0.75, y: CONFIG.MAP_H * CONFIG.TILE * 0.5,
    hp: bossData.hp * dm.hpMult * dda.hpMult,
    maxHp: bossData.hp * dm.hpMult * dda.hpMult,
    atk: bossData.atk * dm.atkMult * dda.atkMult,
    phases: bossData.phases, currentPhase: 0,
    phaseTransitioning: false, alive: true,
    state: 'idle', stateTimer: 0, animFrame: 0,
    fireTimer: 2.0, patternTimer: 0, patternId: 0,
    flashTimer: 0, rewardGiven: false, // F17
    shakeTimer: 0
  };
}

// 투사체 생성
function createProjectile(x, y, tx, ty, damage, speed, owner, type) {
  const dx = tx - x, dy = ty - y;
  const len = Math.hypot(dx, dy) || 1;
  return {
    x, y, vx: (dx / len) * speed, vy: (dy / len) * speed,
    damage, owner, type: type || 'bullet',
    alive: true, timer: 0, maxLife: 3.0
  };
}

// R4: DRAW — 모든 드로잉 함수 (순수 함수, F9, F19)

// 텍스트 그리기 유틸 (정렬)
function drawText(ctx, text, x, y, size, color, align, font) {
  ctx.fillStyle = color || COL.steamWhite;
  ctx.font = `${size}px ${font || "'Segoe UI', system-ui, -apple-system, sans-serif"}`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

// 텍스트에 글로우 효과
function drawGlowText(ctx, text, x, y, size, color, glowColor, align) {
  ctx.save();
  ctx.shadowColor = glowColor || color;
  ctx.shadowBlur = 12;
  drawText(ctx, text, x, y, size, color, align);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// 둥근 직사각형
function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

// 하트 아이콘 폴백 (순수 함수)
function drawHeartIcon(ctx, cx, cy, r, color) {
  ctx.save();
  ctx.fillStyle = color || COL.hpRed;
  ctx.beginPath();
  ctx.moveTo(cx, cy + r * 0.4);
  ctx.bezierCurveTo(cx - r * 1.2, cy - r * 0.6, cx - r * 0.6, cy - r * 1.4, cx, cy - r * 0.5);
  ctx.bezierCurveTo(cx + r * 0.6, cy - r * 1.4, cx + r * 1.2, cy - r * 0.6, cx, cy + r * 0.4);
  ctx.fill();
  ctx.restore();
}

// HP 바 (순수 함수)
function drawHPBar(ctx, x, y, w, h, ratio, color) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, w, h);
  const c = ratio > 0.6 ? COL.hpGreen : ratio > 0.3 ? COL.hpYellow : COL.hpRed;
  ctx.fillStyle = color || c;
  ctx.fillRect(x + 1, y + 1, (w - 2) * Math.max(0, ratio), h - 2);
}

// 톱니바퀴 그리기 (시그니처 비주얼)
function drawGear(ctx, x, y, r, teeth, color, gt) {
  const angle = gt * 0.5;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  const step = (Math.PI * 2) / teeth;
  for (let i = 0; i < teeth; i++) {
    const a1 = step * i - step * 0.2;
    const a2 = step * i + step * 0.2;
    ctx.lineTo(Math.cos(a1) * r * 1.15, Math.sin(a1) * r * 1.15);
    ctx.lineTo(Math.cos(a2) * r * 1.15, Math.sin(a2) * r * 1.15);
    const a3 = step * i + step * 0.35;
    const a4 = step * (i + 1) - step * 0.35;
    ctx.lineTo(Math.cos(a3) * r * 0.85, Math.sin(a3) * r * 0.85);
    ctx.lineTo(Math.cos(a4) * r * 0.85, Math.sin(a4) * r * 0.85);
  }
  ctx.closePath();
  ctx.fillStyle = color || COL.copper;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 중심 구멍
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = COL.darkIron;
  ctx.fill();
  ctx.restore();
}

// 증기 파티클 그리기
function drawSteamParticle(ctx, x, y, size, alpha, gt) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.6;
  ctx.fillStyle = COL.steamWhite;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// 배경 레이어 1 (원거리 도시 풍경)
function drawBgLayer1(ctx, w, h, scrollX, gt) {
  // 화면 좌표
  {
    // Canvas 폴백: 그라데이션 도시
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0D0D1A');
    grad.addColorStop(0.4, '#1A1A2E');
    grad.addColorStop(1, '#0D0D0D');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    // 별
    const starRng = new SeededRNG(42);
    for (let i = 0; i < 60; i++) {
      const sx = starRng.float(0, w);
      const sy = starRng.float(0, h * 0.4);
      const ss = starRng.float(1, 2.5);
      ctx.fillStyle = `rgba(224,224,240,${0.3 + Math.sin(gt * 2 + i) * 0.2})`;
      ctx.fillRect(sx, sy, ss, ss);
    }
    // 실루엣 건물
    ctx.fillStyle = '#111118';
    const bRng = new SeededRNG(77);
    for (let i = 0; i < 15; i++) {
      const bx = bRng.float(0, w) - scrollX * 0.05;
      const bw = bRng.float(30, 80);
      const bh = bRng.float(60, 180);
      ctx.fillRect(bx % w, h - bh, bw, bh);
    }
  }
}

// 배경 레이어 2 (중거리 산업 시설)
function drawBgLayer2(ctx, w, h, scrollX, gt) {
  // 화면 좌표
  {
    // Canvas 폴백: 산업 시설
    ctx.fillStyle = '#151520';
    const fRng = new SeededRNG(99);
    for (let i = 0; i < 8; i++) {
      const fx = fRng.float(0, w) - scrollX * 0.2;
      const fw = fRng.float(60, 120);
      const fh = fRng.float(80, 200);
      ctx.fillRect(fx % w, h - fh - 20, fw, fh);
      // 창문
      ctx.fillStyle = COL.furnace + '33';
      for (let wy = h - fh; wy < h - 30; wy += 25) {
        for (let wx = (fx % w) + 10; wx < (fx % w) + fw - 10; wx += 20) {
          ctx.fillRect(wx, wy, 8, 12);
        }
      }
      ctx.fillStyle = '#151520';
    }
    // 파이프
    ctx.strokeStyle = COL.steel + '66';
    ctx.lineWidth = 3;
    for (let i = 0; i < 5; i++) {
      const py = h * 0.5 + i * 30;
      ctx.beginPath();
      ctx.moveTo(0, py);
      ctx.lineTo(w, py + Math.sin(gt + i) * 10);
      ctx.stroke();
    }
  }
}

// 유닛 드로잉 (순수 함수)
function drawUnit(ctx, x, y, size, unitType, state, gt, evolved, flashTimer) {
  const sz = size || 32;
  const halfSz = sz / 2;
  if (flashTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(gt * 30) * 0.5;
  }
  {
    // Canvas 폴백: 유닛 타입별 도형
    const colors = { STRIKER: COL.copper, GUNNER: COL.brass, ENGINEER: COL.aether };
    const col = colors[unitType] || COL.copper;
    ctx.fillStyle = col;
    ctx.beginPath();
    if (unitType === 'STRIKER') {
      // 방패 모양 — 명확한 실루엣
      ctx.moveTo(x, y - halfSz);
      ctx.lineTo(x + halfSz, y - halfSz * 0.3);
      ctx.lineTo(x + halfSz * 0.8, y + halfSz);
      ctx.lineTo(x - halfSz * 0.8, y + halfSz);
      ctx.lineTo(x - halfSz, y - halfSz * 0.3);
    } else if (unitType === 'GUNNER') {
      // 포탑 모양 — 몸체 + 포신
      ctx.rect(x - halfSz * 0.6, y - halfSz * 0.4, sz * 0.6, sz * 0.5);
      ctx.fill();
      ctx.beginPath();
      ctx.rect(x + halfSz * 0.2, y - halfSz * 0.15, halfSz * 0.8, sz * 0.15);
    } else {
      // 엔지니어 폴백 개선: 육각형 + 렌치 아이콘
      const sides = 6;
      for (let i = 0; i < sides; i++) {
        const a = (Math.PI * 2 / sides) * i - Math.PI / 6;
        const px = x + Math.cos(a) * halfSz * 0.75;
        const py = y + Math.sin(a) * halfSz * 0.75;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // 렌치 십자 표시
      ctx.strokeStyle = COL.steamWhite;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - halfSz * 0.3, y);
      ctx.lineTo(x + halfSz * 0.3, y);
      ctx.moveTo(x, y - halfSz * 0.3);
      ctx.lineTo(x, y + halfSz * 0.3);
      ctx.stroke();
      // 렌치 헤드 (좌상)
      ctx.beginPath();
      ctx.arc(x - halfSz * 0.3, y - halfSz * 0.3, 3, 0, Math.PI * 2);
      ctx.fillStyle = COL.steamWhite;
      ctx.fill();
    }
    if (unitType !== 'ENGINEER') ctx.closePath();
    if (unitType !== 'ENGINEER') ctx.fill();
    // 외곽선
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 에테르 코어 글로우
    ctx.beginPath();
    ctx.arc(x, y, halfSz * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = COL.aether;
    ctx.shadowColor = COL.aether;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
    // 진화 표시
    if (evolved > 0) {
      ctx.fillStyle = COL.gold;
      for (let i = 0; i < evolved; i++) {
        ctx.fillRect(x - halfSz + i * 7, y - halfSz - 6, 5, 3);
      }
    }
  }
  if (flashTimer > 0) ctx.restore();
}

// 적 유닛 드로잉 (순수 함수)
function drawEnemy(ctx, x, y, size, enemyType, hpRatio, gt) {
  const sz = size || 28;
  const halfSz = sz / 2;
  {
    // Canvas 폴백: 적 유형별 차별화된 도형
    const typeColors = {
      GRUNT: '#553333', SHOOTER: '#664422', CHARGER: '#884411',
      DRONE: '#336655', INFECTED: COL.corrupt, ELITE: COL.danger
    };
    ctx.fillStyle = typeColors[enemyType] || '#553333';
    ctx.beginPath();
    if (enemyType === 'GRUNT') {
      // 사각형 — 보병
      ctx.rect(x - halfSz * 0.7, y - halfSz * 0.7, sz * 0.7, sz * 0.7);
    } else if (enemyType === 'SHOOTER') {
      // 삼각형 — 원거리
      ctx.moveTo(x, y - halfSz);
      ctx.lineTo(x + halfSz * 0.8, y + halfSz * 0.6);
      ctx.lineTo(x - halfSz * 0.8, y + halfSz * 0.6);
    } else if (enemyType === 'CHARGER') {
      // 화살표 — 돌진
      ctx.moveTo(x + halfSz, y);
      ctx.lineTo(x - halfSz * 0.5, y - halfSz * 0.8);
      ctx.lineTo(x - halfSz * 0.2, y);
      ctx.lineTo(x - halfSz * 0.5, y + halfSz * 0.8);
    } else if (enemyType === 'DRONE') {
      // 다이아몬드 — 수리 드론
      ctx.moveTo(x, y - halfSz);
      ctx.lineTo(x + halfSz * 0.6, y);
      ctx.lineTo(x, y + halfSz);
      ctx.lineTo(x - halfSz * 0.6, y);
    } else if (enemyType === 'INFECTED') {
      // 불규칙 별형 — 감염체
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i;
        const r = i % 2 === 0 ? halfSz : halfSz * 0.5;
        ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
    } else if (enemyType === 'ELITE') {
      // 큰 팔각형 + 왕관 모양
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i - Math.PI / 8;
        const r = i % 2 === 0 ? halfSz * 1.1 : halfSz * 0.8;
        ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
    } else {
      // 기본 팔각형
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i - Math.PI / 8;
        ctx.lineTo(x + Math.cos(a) * halfSz, y + Math.sin(a) * halfSz);
      }
    }
    ctx.closePath();
    ctx.fill();
    // 외곽선
    ctx.strokeStyle = 'rgba(255,100,100,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 부패 코어
    ctx.beginPath();
    ctx.arc(x, y, halfSz * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#FF2222';
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 4;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // HP 바
  if (hpRatio < 1) drawHPBar(ctx, x - halfSz, y - halfSz - 6, sz, 4, hpRatio);
}

// 보스 드로잉 (순수 함수)
function drawBoss(ctx, x, y, size, bossKey, phase, hpRatio, gt) {
  const sz = size || 96;
  const halfSz = sz / 2;
  // 보스 몸체
  const phaseColors = ['#8B4513', '#AA3333', '#CC1111', '#FFD700'];
  const col = phaseColors[Math.min(phase, 3)];
  // 보스 오라
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, halfSz + 10 + Math.sin(gt * 3) * 5, 0, Math.PI * 2);
  ctx.fillStyle = COL.corrupt + '33';
  ctx.fill();
  // 메인 보디
  ctx.beginPath();
  // 톱니바퀴형 보스
  const teeth = 12;
  const step = (Math.PI * 2) / teeth;
  for (let i = 0; i < teeth; i++) {
    const a1 = step * i + gt * 0.3;
    const a2 = step * i + step * 0.4 + gt * 0.3;
    const r1 = halfSz * (0.8 + 0.2 * Math.sin(gt * 2 + i));
    const r2 = halfSz * 0.65;
    ctx.lineTo(x + Math.cos(a1) * r1, y + Math.sin(a1) * r1);
    ctx.lineTo(x + Math.cos(a2) * r2, y + Math.sin(a2) * r2);
  }
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.fill();
  ctx.strokeStyle = COL.copper;
  ctx.lineWidth = 3;
  ctx.stroke();
  // 보스 눈 (부패 보라)
  ctx.beginPath();
  ctx.arc(x - 12, y - 8, 8, 0, Math.PI * 2);
  ctx.arc(x + 12, y - 8, 8, 0, Math.PI * 2);
  ctx.fillStyle = COL.corrupt;
  ctx.shadowColor = COL.corrupt;
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
  // 보스 이름 & HP
  ctx.restore();
}

// 투사체 드로잉
function drawProjectile(ctx, x, y, type, owner, gt) {
  ctx.beginPath();
  if (owner === 'player') {
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = COL.aether;
    ctx.shadowColor = COL.aether;
    ctx.shadowBlur = 6;
  } else {
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = COL.danger;
    ctx.shadowColor = COL.danger;
    ctx.shadowBlur = 6;
  }
  ctx.fill();
  ctx.shadowBlur = 0;
}

// 이펙트 드로잉 (히트 이펙트)
function drawEffect(ctx, x, y, effectType, progress, gt) {
  if (effectType === 'hit') {
    const alpha = 1 - progress;
    const size = 20 + progress * 40;
    {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = COL.furnace;
      ctx.fill();
      // 파편
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i + gt;
        const d = size * 0.8;
        ctx.fillStyle = COL.brass;
        ctx.fillRect(x + Math.cos(a) * d - 2, y + Math.sin(a) * d - 2, 4, 4);
      }
      ctx.restore();
    }
  } else if (effectType === 'steam') {
    const alpha = (1 - progress) * 0.5;
    const size = 10 + progress * 30;
    drawSteamParticle(ctx, x, y, size, alpha, gt);
  } else if (effectType === 'gear_pickup') {
    const alpha = 1 - progress;
    const yOff = progress * -30;
    ctx.save();
    ctx.globalAlpha = alpha;
    drawGear(ctx, x, y + yOff, 8, 6, COL.gold, gt);
    ctx.restore();
  } else if (effectType === 'score_popup') {
    const alpha = 1 - progress;
    const yOff = progress * -40;
    ctx.save();
    ctx.globalAlpha = alpha;
    drawText(ctx, '+', x, y + yOff, 14, COL.gold, 'center');
    ctx.restore();
  }
}

// HUD 유닛 아이콘 (하단 바)
function drawUnitIcon(ctx, x, y, w, h, unitType, selected, canAfford, gt) {
  drawRoundRect(ctx, x, y, w, h, 6, selected ? COL.copper + 'CC' : COL.panel, selected ? COL.brass : COL.steel + '66');
  if (!canAfford) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
  }
  // 미니 유닛 아이콘
  const cx = x + w / 2, cy = y + h / 2 - 4;
  const colors = { STRIKER: COL.copper, GUNNER: COL.brass, ENGINEER: COL.aether };
  ctx.fillStyle = colors[unitType];
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI * 2);
  ctx.fill();
  // 코스트
  const costs = { STRIKER: 20, GUNNER: 30, ENGINEER: 25 };
  drawText(ctx, costs[unitType], cx, y + h - 10, 10, COL.steamWhite, 'center');
}

// 미니맵 드로잉
function drawMinimap(ctx, x, y, w, h, camera, units, enemies, boss, mapW, mapH) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = COL.copper + '88';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  const scaleX = w / mapW, scaleY = h / mapH;
  // 아군 유닛
  units.forEach(u => {
    if (!u.alive) return;
    ctx.fillStyle = COL.aether;
    ctx.fillRect(x + u.x * scaleX - 2, y + u.y * scaleY - 2, 4, 4);
  });
  // 적 유닛
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = COL.danger;
    ctx.fillRect(x + e.x * scaleX - 1, y + e.y * scaleY - 1, 3, 3);
  });
  // 보스
  if (boss && boss.alive) {
    ctx.fillStyle = COL.corrupt;
    ctx.fillRect(x + boss.x * scaleX - 3, y + boss.y * scaleY - 3, 6, 6);
  }
  // 카메라 뷰포트
  ctx.strokeStyle = COL.steamWhite + '66';
  ctx.strokeRect(x + camera.x * scaleX, y + camera.y * scaleY, camera.w * scaleX, camera.h * scaleY);
}

// 타이틀 화면 그리기
function drawTitleScreen(ctx, w, h, gt) {
  // 화면 좌표
  // 배경
  drawBgLayer1(ctx, w, h, gt * 20, gt);
  drawBgLayer2(ctx, w, h, gt * 30, gt);
  // 어두운 오버레이
  ctx.fillStyle = 'rgba(13,13,13,0.5)';
  ctx.fillRect(0, 0, w, h);
  // 장식 톱니바퀴
  drawGear(ctx, w * 0.15, h * 0.3, 40, 8, COL.copper + '44', gt);
  drawGear(ctx, w * 0.85, h * 0.25, 55, 10, COL.brass + '33', -gt);
  drawGear(ctx, w * 0.1, h * 0.75, 30, 6, COL.steel + '44', gt * 1.5);
  drawGear(ctx, w * 0.9, h * 0.8, 45, 9, COL.copper + '33', -gt * 0.7);
  // 증기 파티클
  const steamRng = new SeededRNG(123);
  for (let i = 0; i < 20; i++) {
    const sx = steamRng.float(0, w);
    const baseY = steamRng.float(h * 0.3, h);
    const sy = baseY - ((gt * 30 + i * 50) % (h * 0.7));
    const ss = steamRng.float(5, 15);
    const alpha = 0.1 + Math.sin(gt + i) * 0.08;
    drawSteamParticle(ctx, sx, sy, ss, alpha, gt);
  }
  // 타이틀 텍스트
  const titleY = h * 0.28;
  // 스캔라인 효과
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let ly = 0; ly < h; ly += 3) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, ly, w, 1);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  // 메인 타이틀 (글리치 느낌)
  const glitchOff = Math.sin(gt * 10) > 0.95 ? (Math.sin(gt * 100) * 3) : 0;
  drawGlowText(ctx, L().title, w / 2 + glitchOff, titleY, Math.min(w / 10, 52), COL.copper, COL.furnace, 'center');
  // 부제
  drawText(ctx, L().subtitle, w / 2, titleY + 45, Math.min(w / 20, 20), COL.brass, 'center');
  // 시작 안내
  const pulse = 0.5 + Math.sin(gt * 3) * 0.3;
  ctx.globalAlpha = pulse;
  drawText(ctx, L().tapToStart, w / 2, h * 0.55, Math.min(w / 18, 22), COL.steamWhite, 'center');
  ctx.globalAlpha = 1;
  // 하단 정보
  drawText(ctx, `${L().difficulty}: ${CONFIG.DIFF[G.difficulty].label[G.lang]}`, w / 2, h * 0.72, 16, COL.steel, 'center');
  drawText(ctx, `${L().best}: ${G.save.bestScore[G.difficulty.toLowerCase()] || 0}`, w / 2, h * 0.78, 14, COL.brass, 'center');
  // 설정 버튼 안내
  drawText(ctx, `[D] ${L().difficulty}  [L] ${L().language}`, w / 2, h * 0.88, 12, COL.steel, 'center');
  // 버전
  drawText(ctx, 'Ironclad Vanguard v1.0 — Cycle #31', w / 2, h * 0.95, 10, COL.steel + '88', 'center');
}

// 워크샵 화면 그리기
function drawWorkshopScreen(ctx, w, h, gt) {
  // 화면 좌표
  ctx.fillStyle = COL.bgDark;
  ctx.fillRect(0, 0, w, h);
  // 배경 톱니
  drawGear(ctx, w * 0.5, h * 0.5, Math.min(w, h) * 0.35, 16, COL.darkIron, gt * 0.2);
  // 타이틀
  drawGlowText(ctx, L().workshop, w / 2, 40, 32, COL.brass, COL.copper, 'center');
  // 기어 잔고
  drawGear(ctx, w / 2 - 68, 67, 10, 6, COL.gold, gt);
  drawText(ctx, `${G.save.totalGears}`, w / 2 - 45, 68, 20, COL.gold, 'left');
  // 3개 트리
  const trees = [
    { key: 'attack', label: L().attack, color: COL.danger, levels: CONFIG.WORKSHOP.ATK, current: G.save.workshop.attack },
    { key: 'defense', label: L().defense, color: COL.aether, levels: CONFIG.WORKSHOP.DEF, current: G.save.workshop.defense },
    { key: 'production', label: L().production, color: COL.brass, levels: CONFIG.WORKSHOP.PROD, current: G.save.workshop.production }
  ];
  const treeW = Math.min(w / 3 - 20, 180);
  const startX = (w - treeW * 3 - 20) / 2;
  trees.forEach((tree, ti) => {
    const tx = startX + ti * (treeW + 10);
    const ty = 100;
    const th = h - 200;
    drawRoundRect(ctx, tx, ty, treeW, th, 8, COL.panel, tree.color + '66');
    drawText(ctx, tree.label, tx + treeW / 2, ty + 25, 18, tree.color, 'center');
    // 레벨 표시
    for (let lv = 0; lv < 5; lv++) {
      const ly = ty + 55 + lv * (th - 90) / 5;
      const filled = lv < tree.current;
      const isNext = lv === tree.current;
      ctx.fillStyle = filled ? tree.color + 'CC' : (isNext ? tree.color + '44' : '#222233');
      ctx.fillRect(tx + 10, ly, treeW - 20, 24);
      ctx.strokeStyle = tree.color + '66';
      ctx.lineWidth = 1;
      ctx.strokeRect(tx + 10, ly, treeW - 20, 24);
      drawText(ctx, `Lv${lv + 1}`, tx + treeW / 2, ly + 12, 12, filled ? COL.steamWhite : COL.steel, 'center');
      if (isNext && lv < tree.levels.length) {
        const cost = tree.levels[lv].cost;
        const canBuy = G.save.totalGears >= cost;
        drawText(ctx, `${cost}G`, tx + treeW - 15, ly + 12, 10, canBuy ? COL.gold : COL.danger, 'right');
      }
    }
    // 클릭 영역 등록
    G.workshopBtns[ti] = { x: tx, y: 100, w: treeW, h: th, key: tree.key };
  });
  // 출격 버튼
  const btnW = 200, btnH = 50;
  const btnX = (w - btnW) / 2, btnY = h - 80;
  drawRoundRect(ctx, btnX, btnY, btnW, btnH, 10, COL.copper, COL.brass);
  drawGlowText(ctx, L().start, w / 2, btnY + 25, 24, COL.steamWhite, COL.brass, 'center');
  G.startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  // 뒤로가기
  drawText(ctx, '[ESC] ' + L().toTitle, w / 2, h - 20, 12, COL.steel, 'center');
}

// 존 선택 화면
function drawZoneSelect(ctx, w, h, gt) {
  ctx.fillStyle = COL.bgDark;
  ctx.fillRect(0, 0, w, h);
  drawGlowText(ctx, L().zone + ' ' + L().deploy, w / 2, 35, 28, COL.brass, COL.copper, 'center');
  const maxZone = Math.min(G.save.furthestZone + 1, G.save.hiddenUnlocked ? 6 : 5);
  const cols = Math.min(3, maxZone);
  const zoneW = Math.min((w - 40) / cols - 10, 200);
  const zoneH = Math.min((h - 120) / 2 - 10, 120);
  G.zoneBtns = [];
  for (let i = 0; i < maxZone; i++) {
    const col = i % cols;
    const row = (i / cols) | 0;
    const zx = (w - cols * (zoneW + 10) + 10) / 2 + col * (zoneW + 10);
    const zy = 70 + row * (zoneH + 10);
    const zone = ZONES[i];
    const unlocked = i <= G.save.furthestZone || (i === 5 && G.save.hiddenUnlocked);
    const cleared = i < G.save.furthestZone;
    drawRoundRect(ctx, zx, zy, zoneW, zoneH, 8, unlocked ? COL.panel : '#0A0A0F', zone.col1 + (unlocked ? 'AA' : '33'));
    drawText(ctx, zone.name[G.lang], zx + zoneW / 2, zy + 30, 16, unlocked ? COL.steamWhite : COL.steel, 'center');
    if (cleared) drawText(ctx, '✓', zx + zoneW - 20, zy + 15, 18, COL.green, 'center');
    if (!unlocked) drawText(ctx, '🔒', zx + zoneW / 2, zy + 60, 20, COL.steel, 'center');
    else {
      // 스테이지 표시
      const stageStr = i < 5 ? `${i + 1}-1 ~ ${i + 1}-3` : 'H-1';
      drawText(ctx, stageStr, zx + zoneW / 2, zy + 55, 12, zone.col2, 'center');
      G.zoneBtns.push({ x: zx, y: zy, w: zoneW, h: zoneH, zone: i });
    }
  }
  drawText(ctx, '[ESC] ' + L().workshop, w / 2, h - 20, 12, COL.steel, 'center');
}

// 게임 오버 화면
function drawGameOverScreen(ctx, w, h, gt, score, bestScore, isNewBest) {
  // 화면 좌표
  ctx.fillStyle = 'rgba(13,13,13,0.85)';
  ctx.fillRect(0, 0, w, h);
  // 화면 쉐이크 잔여
  const shakeAmt = Math.max(0, G.screenShake);
  if (shakeAmt > 0) {
    const sx = Math.sin(gt * 50) * shakeAmt;
    const sy = Math.cos(gt * 50) * shakeAmt;
    ctx.translate(sx, sy);
  }
  // 부서진 톱니
  drawGear(ctx, w * 0.3, h * 0.4, 30, 8, COL.danger + '44', gt * 0.3);
  drawGear(ctx, w * 0.7, h * 0.35, 40, 10, COL.danger + '33', -gt * 0.2);
  // 게임 오버 텍스트
  drawGlowText(ctx, L().gameOver, w / 2, h * 0.3, 40, COL.danger, COL.furnace, 'center');
  // 점수
  drawText(ctx, `${L().score}: ${score}`, w / 2, h * 0.45, 24, COL.steamWhite, 'center');
  if (isNewBest) {
    drawGlowText(ctx, L().newBest, w / 2, h * 0.53, 22, COL.gold, COL.brass, 'center');
  }
  drawText(ctx, `${L().best}: ${bestScore}`, w / 2, h * 0.60, 18, COL.brass, 'center');
  // 획득 기어
  drawText(ctx, `${L().gears}: +${G.runGears}`, w / 2, h * 0.67, 18, COL.gold, 'center');
  // 재시작 안내
  const pulse = 0.5 + Math.sin(gt * 3) * 0.3;
  ctx.globalAlpha = pulse;
  drawText(ctx, L().restart, w / 2, h * 0.80, 20, COL.steamWhite, 'center');
  ctx.globalAlpha = 1;
  if (shakeAmt > 0) ctx.setTransform(G.dpr, 0, 0, G.dpr, 0, 0);
}

// 승리 화면
function drawVictoryScreen(ctx, w, h, gt, trueEnding) {

  ctx.fillRect(0, 0, w, h);
  // 황금 빛줄기
  ctx.save();

  grad.addColorStop(0, COL.gold);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  drawGear(ctx, w / 2, h * 0.3, 60, 12, COL.gold + '66', gt * 0.5);

  // 엔딩 텍스트
  const ending = trueEnding ? STORY.endings.true_ : STORY.endings.normal;
  const lines = ending[G.lang].split('\n');

  });

  drawText(ctx, `${L().gears}: +${G.runGears}`, w / 2, h * 0.72, 18, COL.gold, 'center');
  const pulse = 0.5 + Math.sin(gt * 3) * 0.3;
  ctx.globalAlpha = pulse;
  drawText(ctx, L().restart, w / 2, h * 0.85, 20, COL.steamWhite, 'center');
  ctx.globalAlpha = 1;
}

// 일시정지 오버레이
function drawPauseOverlay(ctx, w, h, gt) {
  ctx.fillStyle = 'rgba(13,13,13,0.75)';
  ctx.fillRect(0, 0, w, h);
  drawGear(ctx, w / 2, h * 0.35, 50, 10, COL.copper + '66', 0);
  drawGlowText(ctx, L().pause, w / 2, h * 0.35, 36, COL.brass, COL.copper, 'center');
  drawText(ctx, L().resume + ' [ESC]', w / 2, h * 0.52, 20, COL.steamWhite, 'center');
  drawText(ctx, L().toTitle + ' [T]', w / 2, h * 0.60, 18, COL.steel, 'center');
}

// 보스 HP 바 (화면 상단)
function drawBossHPBar(ctx, w, boss, gt) {
  if (!boss || !boss.alive) return;
  const barW = w * 0.6, barH = 20;
  const barX = (w - barW) / 2, barY = 10;
  const bossData = CONFIG.BOSS[boss.bossKey];
  // 배경
  drawRoundRect(ctx, barX - 2, barY - 2, barW + 4, barH + 4, 4, 'rgba(0,0,0,0.7)', COL.corrupt);
  // HP
  const ratio = boss.hp / boss.maxHp;
  const hpCol = ratio > 0.6 ? COL.danger : ratio > 0.3 ? COL.furnace : COL.corrupt;
  ctx.fillStyle = hpCol;
  ctx.fillRect(barX, barY, barW * ratio, barH);
  // 페이즈 구분선
  bossData.phases.forEach(p => {
    if (p < 1 && p > 0) {
      const px = barX + barW * p;
      ctx.strokeStyle = COL.steamWhite + '88';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px, barY); ctx.lineTo(px, barY + barH); ctx.stroke();
    }
  });
  // 이름
  drawText(ctx, bossData.name, w / 2, barY + barH + 15, 14, COL.steamWhite, 'center');
}

// 블루프린트 선택 화면
function drawBlueprintSelect(ctx, w, h, choices, gt) {
  ctx.fillStyle = 'rgba(13,13,13,0.85)';
  ctx.fillRect(0, 0, w, h);
  drawGlowText(ctx, L().selectBlueprint, w / 2, h * 0.15, 28, COL.brass, COL.copper, 'center');
  G.blueprintBtns = [];
  const cardW = Math.min((w - 60) / 3, 180);
  const cardH = Math.min(h * 0.5, 200);
  const startX = (w - cardW * 3 - 20) / 2;
  choices.forEach((bp, i) => {
    const cx = startX + i * (cardW + 10);
    const cy = h * 0.25;
    const isRare = bp.id.startsWith('r');
    const isEpic = bp.id.startsWith('e');
    const borderCol = isEpic ? COL.gold : isRare ? COL.aether : COL.copper;
    drawRoundRect(ctx, cx, cy, cardW, cardH, 8, COL.panel, borderCol);
    // 등급 표시
    const grade = isEpic ? 'EPIC' : isRare ? 'RARE' : 'COMMON';
    drawText(ctx, grade, cx + cardW / 2, cy + 25, 14, borderCol, 'center');
    // 이름
    drawText(ctx, bp.name[G.lang], cx + cardW / 2, cy + cardH / 2, 13, COL.steamWhite, 'center');
    if (bp.desc) drawText(ctx, bp.desc[G.lang], cx + cardW / 2, cy + cardH / 2 + 25, 11, COL.brass, 'center');
    // 장식
    drawGear(ctx, cx + cardW / 2, cy + cardH - 30, 12, 6, borderCol + '44', gt);
    G.blueprintBtns.push({ x: cx, y: cy, w: cardW, h: cardH, bp: bp });
  });
}

// 내러티브 컷신
function drawNarrative(ctx, w, h, text, portrait, progress, gt) {
  // 어둡게
  ctx.fillStyle = `rgba(13,13,13,${0.7 * Math.min(progress * 3, 1)})`;
  ctx.fillRect(0, 0, w, h);
  // 텍스트 박스
  const boxH = Math.min(120, h * 0.25);
  const boxY = h - boxH - 20;
  drawRoundRect(ctx, 20, boxY, w - 40, boxH, 8, COL.panel, COL.copper + '88');
  // 포트레이트 (간단 실루엣)
  const pSize = Math.min(80, boxH - 20);
  drawRoundRect(ctx, 30, boxY + 10, pSize, pSize, 4, COL.darkIron, COL.copper);
  ctx.fillStyle = COL.copper;
  ctx.beginPath();
  ctx.arc(30 + pSize / 2, boxY + 10 + pSize / 2, pSize * 0.3, 0, Math.PI * 2);
  ctx.fill();
  // 타이핑 효과
  const displayLen = Math.min(text.length, (progress * 40) | 0);
  const displayText = text.substring(0, displayLen);
  const textX = 40 + pSize + 10;
  const maxW = w - textX - 30;
  // 줄바꿈 처리
  ctx.font = '14px "Segoe UI", system-ui, -apple-system, sans-serif';
  const words = displayText.split('');
  let line = '', lineY = boxY + 35;
  words.forEach(ch => {
    const testLine = line + ch;
    if (ctx.measureText(testLine).width > maxW) {
      drawText(ctx, line, textX, lineY, 14, COL.steamWhite, 'left');
      line = ch;
      lineY += 22;
    } else { line = testLine; }
  });
  if (line) drawText(ctx, line, textX, lineY, 14, COL.steamWhite, 'left');
  // 스킵 안내
  const skipAlpha = 0.4 + Math.sin(gt * 4) * 0.3;
  ctx.globalAlpha = skipAlpha;
  drawText(ctx, 'TAP / ENTER ▶', w - 80, boxY - 15, 12, COL.steel, 'center');
  ctx.globalAlpha = 1;
}

// R5: DEPLOY — 배치 페이즈 로직
// ══════════════════════════════════════════════════════════════════

// 배치 가능 영역 체크
function canDeployAt(x, y, mapTiles) {
  const tx = (x / CONFIG.TILE) | 0, ty = (y / CONFIG.TILE) | 0;
  if (tx < 0 || tx >= CONFIG.MAP_W || ty < 0 || ty >= CONFIG.MAP_H) return false;
  return mapTiles[ty][tx] === 0; // 0 = 빈 타일
}

// 배치 페이즈 입력 처리
function handleDeployInput(input, camera) {
  // 유닛 타입 선택 (키보드)
  if (input.keysJustPressed['Digit1']) G.selectedUnitType = 'STRIKER';
  if (input.keysJustPressed['Digit2']) G.selectedUnitType = 'GUNNER';
  if (input.keysJustPressed['Digit3']) G.selectedUnitType = 'ENGINEER';
  // 가상 버튼 체크
  if (input.checkVirtualButton('striker')) G.selectedUnitType = 'STRIKER';
  if (input.checkVirtualButton('gunner')) G.selectedUnitType = 'GUNNER';
  if (input.checkVirtualButton('engineer')) G.selectedUnitType = 'ENGINEER';
  // 배치 (클릭/탭)
  if (input.mouse.justClicked && G.selectedUnitType) {
    const worldX = input.mouse.x + camera.x;
    const worldY = input.mouse.y + camera.y;
    // 하단 UI 영역 클릭은 무시
    if (input.mouse.y > G.canvasH - 80) return;
    const cost = CONFIG.UNIT[G.selectedUnitType].steamCost;
    // 1-2: 스팀 소모 캡 (최대 스팀의 80%)
    if (cost > G.steamMax * 0.8) return;
    // 1-1: 같은 유닛 타입 쿨다운 체크
    if (G.spawnCooldowns[G.selectedUnitType] > 0) return;
    if (G.steam >= cost && canDeployAt(worldX, worldY, G.mapTiles)) {
      G.steam -= cost;
      G.spawnCooldowns[G.selectedUnitType] = CONFIG.STEAM.COOLDOWN; // 3초 쿨다운
      const wb = getWorkshopBonus();
      const unit = createUnit(G.selectedUnitType, worldX, worldY, wb);
      applyBlueprintBonusesToUnit(unit); // 1-3: 블루프린트 보너스 적용
      G.units.push(unit);
      snd.play('deploy');
      spawnEffect(worldX, worldY, 'steam', 0.5);
    }
  }
  // Space → 전투 시작
  if (input.keysJustPressed['Space'] && G.units.length > 0) {
    beginTransition('COMBAT');
  }
  if (input.checkVirtualButton('go') && G.units.length > 0) {
    beginTransition('COMBAT');
  }
}

// 배치 화면 그리기
function drawDeployScreen(ctx, w, h, camera, gt) {
  // 월드 좌표로 그리드 & 배치 가능 영역
  ctx.save();
  ctx.translate(-camera.x, -camera.y); // 월드 좌표
  // 그리드
  ctx.strokeStyle = COL.steel + '22';
  ctx.lineWidth = 0.5;
  for (let tx = 0; tx < CONFIG.MAP_W; tx++) {
    for (let ty = 0; ty < CONFIG.MAP_H; ty++) {
      ctx.strokeRect(tx * CONFIG.TILE, ty * CONFIG.TILE, CONFIG.TILE, CONFIG.TILE);
      if (G.mapTiles[ty][tx] === 1) {
        ctx.fillStyle = COL.steel + '44';
        ctx.fillRect(tx * CONFIG.TILE, ty * CONFIG.TILE, CONFIG.TILE, CONFIG.TILE);
      }
    }
  }
  // 배치된 유닛
  G.units.forEach(u => {
    drawUnit(ctx, u.x, u.y, 32, u.type, u.state, gt, u.evolved, u.flashTimer);
    drawHPBar(ctx, u.x - 16, u.y - 24, 32, 4, u.hp / u.maxHp);
  });
  ctx.restore(); // 화면 좌표
  // HUD
  drawText(ctx, L().deploy_hint, w / 2, 30, 16, COL.steamWhite, 'center');
  // 스팀 게이지
  drawSteamGauge(ctx, w - 120, 50, 100, 16, G.steam, G.steamMax);
  // 유닛 수
  drawText(ctx, `${L().units}: ${G.units.length}`, 80, 50, 14, COL.brass, 'center');
}

// 스팀 게이지
function drawSteamGauge(ctx, x, y, w, h, steam, maxSteam) {
  drawRoundRect(ctx, x, y, w, h, 4, 'rgba(0,0,0,0.6)', COL.steel + '66');
  const ratio = steam / maxSteam;
  ctx.fillStyle = COL.steamWhite + 'CC';
  ctx.fillRect(x + 2, y + 2, (w - 4) * ratio, h - 4);
  drawText(ctx, `${steam | 0}/${maxSteam}`, x + w / 2, y + h / 2, 10, COL.darkIron, 'center');
}

// ══════════════════════════════════════════════════════════════════
// R6: COMBAT — 전투 로직, AI, 충돌
// ══════════════════════════════════════════════════════════════════

// 전투 업데이트
function updateCombatLogic(dt, gt) {
  // 1-1: 유닛 소환 쿨다운 감소
  for (const key in G.spawnCooldowns) {
    G.spawnCooldowns[key] = Math.max(0, G.spawnCooldowns[key] - dt * G.gameSpeed);
  }
  // 스팀 자연 회복
  const regenRate = CONFIG.STEAM.REGEN + G.workshopBonuses.steamRegen;
  G.steam = Math.min(G.steam + regenRate * dt * G.gameSpeed, G.steamMax);
  // 유닛 AI
  G.units.forEach(u => {
    if (!u.alive) return;
    updateUnitAI(u, dt, gt);
  });
  // 적 AI
  G.enemies.forEach(e => {
    if (!e.alive) return;
    updateEnemyAI(e, dt, gt);
  });
  // 투사체 업데이트
  G.projectiles.forEach((p, pi) => {
    if (!p.alive) return;
    p.x += p.vx * dt * G.gameSpeed;
    p.y += p.vy * dt * G.gameSpeed;
    p.timer += dt * G.gameSpeed;
    if (p.timer > p.maxLife) { p.alive = false; return; }
    // 충돌 체크
    if (p.owner === 'player') {
      const hit = findNearestEnemy(p.x, p.y, 12);
      if (hit) { damageEnemy(hit, p.damage, gt); p.alive = false; }
      // 보스 충돌
      if (G.boss && G.boss.alive) {
        if (Math.hypot(p.x - G.boss.x, p.y - G.boss.y) < 48) {
          damageBoss(G.boss, p.damage, gt);
          p.alive = false;
        }
      }
    } else {
      const hitU = findNearestUnit(p.x, p.y, 12);
      if (hitU) { damageUnit(hitU, p.damage, gt); p.alive = false; }
    }
  });
  // 죽은 엔티티 정리
  G.projectiles = G.projectiles.filter(p => p.alive);
  // 콤보 타이머
  if (G.comboTimer > 0) {
    G.comboTimer -= dt * G.gameSpeed;
    if (G.comboTimer <= 0) { G.combo = 0; G.comboTimer = 0; }
  }
  // 웨이브 체크
  checkWaveComplete(gt);
}

// 유닛 AI
function updateUnitAI(unit, dt, gt) {
  unit.cooldown = Math.max(0, unit.cooldown - dt * G.gameSpeed);
  unit.flashTimer = Math.max(0, unit.flashTimer - dt);
  // 타겟 찾기
  let target = null;
  let minDist = unit.range;
  // 적 중에서 가장 가까운 것
  G.enemies.forEach(e => {
    if (!e.alive) return;
    const d = Math.hypot(e.x - unit.x, e.y - unit.y);
    if (d < minDist) { minDist = d; target = e; }
  });
  // 보스 체크
  if (G.boss && G.boss.alive) {
    const d = Math.hypot(G.boss.x - unit.x, G.boss.y - unit.y);
    if (d < minDist) { minDist = d; target = { x: G.boss.x, y: G.boss.y, isBoss: true }; }
  }
  if (target && unit.cooldown <= 0) {
    // 공격
    unit.state = 'attack';
    unit.stateTimer = 0.3;
    unit.cooldown = 1.0 / (unit.atk / 10); // DPS 기반 공격 간격
    if (unit.type === 'GUNNER') {
      // 원거리 투사체
      const proj = createProjectile(unit.x, unit.y, target.x, target.y, unit.atk * 0.5, 300, 'player', 'bullet');
      G.projectiles.push(proj);
      // 1-4: 거너 진화 → AOE 스플래시
      if (unit.evolved >= 1) {
        const pierce = (unit.blueprintBonuses.pierce || 0);
        G.enemies.forEach(e => {
          if (!e.alive || e === target) return;
          if (Math.hypot(e.x - target.x, e.y - target.y) < CONFIG.TILE * (1.5 + unit.evolved * 0.5)) {
            damageEnemy(e, unit.atk * 0.15 * unit.evolved, gt);
          }
        });
      }
      snd.play('attack_range');
    } else if (unit.type === 'STRIKER') {
      // 근접 직접 데미지
      if (target.isBoss) damageBoss(G.boss, unit.atk * 0.3, gt);
      else damageEnemy(target, unit.atk * 0.3, gt);
      snd.play('attack_melee');
    } else if (unit.type === 'ENGINEER') {
      // 수리 모드: 아군 수리 우선
      const healMult = unit.blueprintBonuses.healMult || 1;
      const healTarget = findDamagedUnit(unit.x, unit.y, unit.range);
      if (healTarget) {
        healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + unit.atk * 0.2 * healMult);
      } else {
        // 적이 있으면 공격
        const proj = createProjectile(unit.x, unit.y, target.x, target.y, unit.atk * 0.3, 200, 'player', 'wrench');
        G.projectiles.push(proj);
      }
      // 1-4: 엔지니어 진화 → 자동 수리 드론 (주변 아군 자동 회복)
      if (unit.evolved >= 1) {
        G.units.forEach(u => {
          if (!u.alive || u === unit) return;
          if (Math.hypot(u.x - unit.x, u.y - unit.y) < CONFIG.TILE * 3) {
            u.hp = Math.min(u.maxHp, u.hp + 2 * unit.evolved * healMult * dt);
            // 자동 드론 파티클
            if (G.rng.next() < 0.1) spawnEffect(u.x, u.y, 'steam', 0.3);
          }
        });
      }
    }
  } else if (!target) {
    unit.state = 'idle';
  }
  // 이동 명령
  if (Math.hypot(unit.targetX - unit.x, unit.targetY - unit.y) > 4) {
    const dx = unit.targetX - unit.x;
    const dy = unit.targetY - unit.y;
    const len = Math.hypot(dx, dy);
    unit.x += (dx / len) * unit.speed * dt * G.gameSpeed;
    unit.y += (dy / len) * unit.speed * dt * G.gameSpeed;
    unit.state = 'move';
  }
  // 상태 타이머
  if (unit.stateTimer > 0) unit.stateTimer -= dt * G.gameSpeed;
}

// 적 AI
function updateEnemyAI(enemy, dt, gt) {
  enemy.cooldown = Math.max(0, enemy.cooldown - dt * G.gameSpeed);
  enemy.flashTimer = Math.max(0, enemy.flashTimer - dt);
  // 수리 드론: 주변 적 수리
  if (enemy.healRate > 0) {
    G.enemies.forEach(e => {
      if (e === enemy || !e.alive) return;
      if (Math.hypot(e.x - enemy.x, e.y - enemy.y) < CONFIG.TILE * 3) {
        e.hp = Math.min(e.maxHp, e.hp + enemy.healRate * dt * G.gameSpeed);
      }
    });
  }
  // 타겟 찾기 (가장 가까운 아군 유닛)
  let target = null, minDist = Infinity;
  G.units.forEach(u => {
    if (!u.alive) return;
    const d = Math.hypot(u.x - enemy.x, u.y - enemy.y);
    if (d < minDist) { minDist = d; target = u; }
  });
  if (!target) return;
  // 이동
  const attackRange = enemy.range || CONFIG.TILE * 1.2;
  if (minDist > attackRange) {
    const dx = target.x - enemy.x;
    const dy = target.y - enemy.y;
    const len = Math.hypot(dx, dy) || 1;
    enemy.x += (dx / len) * enemy.speed * dt * G.gameSpeed;
    enemy.y += (dy / len) * enemy.speed * dt * G.gameSpeed;
    enemy.state = 'move';
  } else if (enemy.cooldown <= 0) {
    // 공격
    enemy.state = 'attack';
    enemy.cooldown = 1.0;
    if (enemy.type === 'SHOOTER' || enemy.type === 'ELITE') {
      const proj = createProjectile(enemy.x, enemy.y, target.x, target.y, enemy.atk, 200, 'enemy', 'bullet');
      G.projectiles.push(proj);
    } else if (enemy.type === 'CHARGER') {
      // 돌진 공격
      damageUnit(target, enemy.atk * 1.5, gt);
      enemy.hp = 0; enemy.alive = false; // 자폭
      snd.play('explosion');
      spawnEffect(enemy.x, enemy.y, 'hit', 0.5);
      addScore(enemy.score, enemy.x, enemy.y);
    } else {
      damageUnit(target, enemy.atk, gt);
    }
  }
}

// 가장 가까운 적 찾기
function findNearestEnemy(x, y, radius) {
  let best = null, bestDist = radius;
  G.enemies.forEach(e => {
    if (!e.alive) return;
    const d = Math.hypot(e.x - x, e.y - y);
    if (d < bestDist) { bestDist = d; best = e; }
  });
  return best;
}

// 가장 가까운 유닛 찾기
function findNearestUnit(x, y, radius) {
  let best = null, bestDist = radius;
  G.units.forEach(u => {
    if (!u.alive) return;
    const d = Math.hypot(u.x - x, u.y - y);
    if (d < bestDist) { bestDist = d; best = u; }
  });
  return best;
}

// 피해 입은 아군 찾기
function findDamagedUnit(x, y, range) {
  let best = null, lowestRatio = 1;
  G.units.forEach(u => {
    if (!u.alive) return;
    const ratio = u.hp / u.maxHp;
    if (ratio < 1 && ratio < lowestRatio && Math.hypot(u.x - x, u.y - y) < range) {
      lowestRatio = ratio;
      best = u;
    }
  });
  return best;
}

// 적에게 데미지
function damageEnemy(enemy, damage, gt) {
  if (!enemy.alive) return;
  // 크리티컬 체크
  const critChance = G.workshopBonuses.critChance;
  const isCrit = G.rng.next() < critChance;
  const finalDmg = isCrit ? damage * G.workshopBonuses.critDmg : damage;
  enemy.hp -= finalDmg;
  enemy.flashTimer = 0.1;
  spawnEffect(enemy.x, enemy.y, 'hit', 0.3);
  snd.play('hit');
  if (enemy.hp <= 0) {
    enemy.alive = false;
    addScore(enemy.score, enemy.x, enemy.y);
    // 기어 드롭
    const gearChance = 0.3 + G.workshopBonuses.gearDrop;
    if (G.rng.next() < gearChance) {
      G.runGears += 1;
      spawnEffect(enemy.x, enemy.y, 'gear_pickup', 0.6);
      snd.play('gear');
    }
    snd.play('explosion');
    // 파워업 드롭 확률
    if (G.rng.next() < 0.15) {
      spawnPowerup(enemy.x, enemy.y);
    }
  }
}

// 유닛에게 데미지
function damageUnit(unit, damage, gt) {
  if (!unit.alive) return;
  const dodge = G.workshopBonuses.dodge;
  if (G.rng.next() < dodge) return; // 회피
  const def = unit.def;
  const finalDmg = damage * (1 - def);
  unit.hp -= finalDmg;
  unit.flashTimer = 0.15;
  snd.play('hit');
  // 1-4: 스트라이커 진화 → 반격 데미지
  if (unit.type === 'STRIKER' && unit.evolved >= 1 && unit.alive) {
    const counterDmg = finalDmg * 0.2 * unit.evolved;
    // 가장 가까운 적에게 반격
    const nearEnemy = findNearestEnemy(unit.x, unit.y, unit.range * 1.5);
    if (nearEnemy) {
      damageEnemy(nearEnemy, counterDmg, gt);
      spawnEffect(unit.x, unit.y, 'hit', 0.2);
    }
  }
  if (unit.hp <= 0) {
    unit.alive = false;
    spawnEffect(unit.x, unit.y, 'hit', 0.5);
    // 모든 유닛 사망 → 지휘관 HP 감소
    const aliveUnits = G.units.filter(u => u.alive);
    if (aliveUnits.length === 0) {
      G.commanderHP -= 20;
      if (G.commanderHP <= 0) {
        triggerGameOver(gt);
      }
    }
  }
}

// 보스에게 데미지
function damageBoss(boss, damage, gt) {
  if (!boss.alive || boss.phaseTransitioning) return;
  const critChance = G.workshopBonuses.critChance;
  const isCrit = G.rng.next() < critChance;
  const finalDmg = isCrit ? damage * G.workshopBonuses.critDmg : damage;
  boss.hp -= finalDmg;
  boss.flashTimer = 0.1;
  spawnEffect(boss.x + G.rng.float(-20, 20), boss.y + G.rng.float(-20, 20), 'hit', 0.3);
  checkBossPhase(boss, gt);
  if (boss.hp <= 0 && !boss.rewardGiven) {
    boss.alive = false;
    boss.rewardGiven = true; // F17
    addScore(boss.zoneIndex === 5 ? CONFIG.SCORE.HIDDEN_KILL : CONFIG.SCORE.BOSS_KILL, boss.x, boss.y);
    G.runGears += 10 + boss.zoneIndex * 5;
    snd.play('explosion');
    snd.play('blueprint');
    triggerBossDefeat(boss, gt);
  }
}

// 보스 페이즈 체크
function checkBossPhase(boss, gt) {
  if (boss.phaseTransitioning) return;
  const ratio = boss.hp / boss.maxHp;
  const phases = boss.phases;
  for (let i = phases.length - 1; i > boss.currentPhase; i--) {
    if (ratio <= phases[i]) {
      boss.phaseTransitioning = true;
      boss.currentPhase = i;
      G.screenShake = 10;
      snd.play('boss_roar');
      tw.delay(1.5, () => {
        boss.phaseTransitioning = false;
        boss.fireTimer = 2.0; // 타이머 리셋 (Cycle 30 교훈)
      });
      break;
    }
  }
}

// 점수 추가
function addScore(points, x, y) {
  G.combo++;
  G.comboTimer = CONFIG.COMBO_TIMEOUT;
  const comboMult = Math.min(1 + G.combo * 0.1, CONFIG.COMBO_MAX_MULT);
  const finalPoints = (points * comboMult) | 0;
  G.score += finalPoints;
  spawnEffect(x, y - 20, 'score_popup', 0.8);
}

// 웨이브 완료 체크
function checkWaveComplete(gt) {
  if (G.waveClearing) return; // F5: 가드 플래그
  const alive = G.enemies.filter(e => e.alive).length;
  if (alive === 0 && G.waveSpawnComplete) {
    G.waveClearing = true; // 가드
    G.wave++;
    if (G.wave >= 3) {
      // 보스 스폰 또는 스테이지 클리어
      if (G.currentStage === 2) { // 3번째 스테이지 → 보스전
        tw.delay(1.0, () => {
          G.waveClearing = false;
          beginTransition('BOSS_INTRO');
        });
      } else {
        tw.delay(1.0, () => {
          G.waveClearing = false;
          G.currentStage++;
          beginTransition('STAGE_CLEAR');
        });
      }
    } else {
      tw.delay(0.5, () => {
        G.waveClearing = false;
        spawnWave(G.currentZone, G.currentStage, G.wave);
      });
    }
  }
}

// 이펙트 스폰
function spawnEffect(x, y, type, duration) {
  G.effects.push({ x, y, type, duration, timer: 0 });
}

// 전투 입력 처리
function handleCombatInput(input, camera, gt) {
  // 카메라 이동 (WASD)
  const camSpeed = 300;
  if (input.keys['KeyW'] || input.keys['ArrowUp']) camera.y -= camSpeed * (1 / 60);
  if (input.keys['KeyS'] || input.keys['ArrowDown']) camera.y += camSpeed * (1 / 60);
  if (input.keys['KeyA'] || input.keys['ArrowLeft']) camera.x -= camSpeed * (1 / 60);
  if (input.keys['KeyD'] || input.keys['ArrowRight']) camera.x += camSpeed * (1 / 60);
  // 카메라 범위 제한
  camera.x = Math.max(0, Math.min(camera.x, CONFIG.MAP_W * CONFIG.TILE - camera.w));
  camera.y = Math.max(0, Math.min(camera.y, CONFIG.MAP_H * CONFIG.TILE - camera.h));
  // 유닛 선택 & 이동 명령
  if (input.keysJustPressed['Digit1']) G.selectedUnitType = 'STRIKER';
  if (input.keysJustPressed['Digit2']) G.selectedUnitType = 'GUNNER';
  if (input.keysJustPressed['Digit3']) G.selectedUnitType = 'ENGINEER';
  if (input.checkVirtualButton('striker')) G.selectedUnitType = 'STRIKER';
  if (input.checkVirtualButton('gunner')) G.selectedUnitType = 'GUNNER';
  if (input.checkVirtualButton('engineer')) G.selectedUnitType = 'ENGINEER';
  // 클릭/탭 → 유닛 배치 또는 선택
  if (input.mouse.justClicked && input.mouse.y < G.canvasH - 80) {
    const worldX = input.mouse.x + camera.x;
    const worldY = input.mouse.y + camera.y;
    // 기존 유닛 선택 체크
    let selectedUnit = null;
    G.units.forEach(u => {
      if (!u.alive) return;
      if (Math.hypot(u.x - worldX, u.y - worldY) < 20) selectedUnit = u;
    });
    if (selectedUnit) {
      G.selectedUnit = selectedUnit;
    } else if (G.selectedUnitType) {
      // 전투 중 유닛 배치
      const cost = CONFIG.UNIT[G.selectedUnitType].steamCost;
      // 1-2: 스팀 소모 캡 (최대 스팀의 80%)
      if (cost > G.steamMax * 0.8) { /* 소모 캡 초과 */ }
      // 1-1: 같은 유닛 타입 쿨다운 체크
      else if (G.spawnCooldowns[G.selectedUnitType] > 0) { /* 쿨다운 중 */ }
      else if (G.steam >= cost) {
        G.steam -= cost;
        G.spawnCooldowns[G.selectedUnitType] = CONFIG.STEAM.COOLDOWN - G.workshopBonuses.cooldown; // 쿨다운 (워크샵 감소 적용)
        const wb = getWorkshopBonus();
        const unit = createUnit(G.selectedUnitType, worldX, worldY, wb);
        applyBlueprintBonusesToUnit(unit); // 1-3: 블루프린트 보너스 적용
        G.units.push(unit);
        snd.play('deploy');
        spawnEffect(worldX, worldY, 'steam', 0.5);
      }
    }
  }
  // 우클릭 / 롱프레스 → 이동 명령
  if ((input.mouse.justRight || input.longPressed) && G.selectedUnit && G.selectedUnit.alive) {
    G.selectedUnit.targetX = input.mouse.x + camera.x;
    G.selectedUnit.targetY = input.mouse.y + camera.y;
  }
  // Q → 스킬
  if (input.keysJustPressed['KeyQ'] || input.checkVirtualButton('skill')) {
    if (G.selectedUnit && G.selectedUnit.alive && G.selectedUnit.skillCooldown <= 0) {
      activateSkill(G.selectedUnit, gt);
    }
  }
  // R → 회수
  if (input.keysJustPressed['KeyR'] || input.checkVirtualButton('recall')) {
    if (G.selectedUnit && G.selectedUnit.alive) {
      const reclaim = G.workshopBonuses.reclaim;
      G.steam += CONFIG.UNIT[G.selectedUnit.type].steamCost * reclaim;
      G.selectedUnit.alive = false;
      spawnEffect(G.selectedUnit.x, G.selectedUnit.y, 'steam', 0.5);
      G.selectedUnit = null;
    }
  }
  // E → 집합/분산
  if (input.keysJustPressed['KeyE']) {
    const cx = G.units.reduce((s, u) => u.alive ? s + u.x : s, 0) / Math.max(1, G.units.filter(u => u.alive).length);
    const cy = G.units.reduce((s, u) => u.alive ? s + u.y : s, 0) / Math.max(1, G.units.filter(u => u.alive).length);
    G.units.forEach(u => { if (u.alive) { u.targetX = cx; u.targetY = cy; } });
  }
  // Space → 배속 토글
  if (input.keysJustPressed['Space'] || input.checkVirtualButton('speed')) {
    G.gameSpeed = G.gameSpeed === 1 ? 2 : 1;
  }
  // Esc → 일시정지
  if (input.keysJustPressed['Escape']) {
    beginTransition('PAUSE');
  }
  // 터치 드래그로 카메라 이동
  if (input.touchMoved && input.touchStart) {
    const dx = input.mouse.x - input.touchStart.x;
    const dy = input.mouse.y - input.touchStart.y;
    camera.x -= dx * 0.5;
    camera.y -= dy * 0.5;
    camera.x = Math.max(0, Math.min(camera.x, CONFIG.MAP_W * CONFIG.TILE - camera.w));
    camera.y = Math.max(0, Math.min(camera.y, CONFIG.MAP_H * CONFIG.TILE - camera.h));
  }
}

// 스킬 발동
function activateSkill(unit, gt) {
  unit.skillCooldown = 8.0;
  snd.play('skill');
  if (unit.type === 'STRIKER') {
    // 도발: 주변 적을 자신에게 끌어당김
    G.enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(e.x - unit.x, e.y - unit.y) < CONFIG.TILE * 4) {
        e.targetX = unit.x; e.targetY = unit.y;
      }
    });
    spawnEffect(unit.x, unit.y, 'steam', 1.0);
  } else if (unit.type === 'GUNNER') {
    // 폭격: 범위 공격
    G.enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(e.x - unit.x, e.y - unit.y) < CONFIG.TILE * 5) {
        damageEnemy(e, unit.atk * 2, gt);
      }
    });
    spawnEffect(unit.x, unit.y, 'hit', 0.8);
    snd.play('explosion');
  } else if (unit.type === 'ENGINEER') {
    // 바리케이드 설치
    G.units.forEach(u => {
      if (!u.alive) return;
      if (Math.hypot(u.x - unit.x, u.y - unit.y) < CONFIG.TILE * 3) {
        u.hp = Math.min(u.maxHp, u.hp + u.maxHp * 0.3);
      }
    });
    spawnEffect(unit.x, unit.y, 'steam', 0.8);
  }
}

// ══════════════════════════════════════════════════════════════════
// R7: BOSS — 보스 패턴, 페이즈, 컷신
// ══════════════════════════════════════════════════════════════════

// 보스 AI 업데이트
function updateBossAI(boss, dt, gt) {
  if (!boss || !boss.alive || boss.phaseTransitioning) return;
  boss.fireTimer -= dt * G.gameSpeed;
  boss.flashTimer = Math.max(0, boss.flashTimer - dt);
  boss.shakeTimer = Math.max(0, boss.shakeTimer - dt);
  // 보스 이동 (천천히 유닛에게 접근)
  let nearestUnit = null, nearDist = Infinity;
  G.units.forEach(u => {
    if (!u.alive) return;
    const d = Math.hypot(u.x - boss.x, u.y - boss.y);
    if (d < nearDist) { nearDist = d; nearestUnit = u; }
  });
  if (nearestUnit && nearDist > CONFIG.TILE * 3) {
    const dx = nearestUnit.x - boss.x;
    const dy = nearestUnit.y - boss.y;
    const len = Math.hypot(dx, dy) || 1;
    boss.x += (dx / len) * CONFIG.TILE * 0.5 * dt * G.gameSpeed;
    boss.y += (dy / len) * CONFIG.TILE * 0.5 * dt * G.gameSpeed;
  }
  // 패턴 실행
  if (boss.fireTimer <= 0) {
    boss.fireTimer = Math.max(1.0, 3.0 - boss.currentPhase * 0.5);
    executeBossPattern(boss, gt);
  }
}

// 공통 보스 패턴 (모든 보스가 공유)
function executeCommonBossPattern(boss, patternId, gt) {
  const aliveUnits = G.units.filter(u => u.alive);
  switch (patternId) {
    case 0: // 직선 투사체
      if (aliveUnits.length > 0) {
        const target = G.rng.pick(aliveUnits);
        if (target) {
          const proj = createProjectile(boss.x, boss.y, target.x, target.y, boss.atk, 250, 'enemy', 'boss_shot');
          G.projectiles.push(proj);
        }
      }
      break;
    case 1: // 3방향 산탄
      for (let a = 0; a < 3; a++) {
        const angle = (Math.PI * 2 / 3) * a + gt;
        const tx = boss.x + Math.cos(angle) * 200;
        const ty = boss.y + Math.sin(angle) * 200;
        G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.7, 200, 'enemy', 'boss_shot'));
      }
      break;
    case 2: // 전방위 8방향
      for (let a = 0; a < 8; a++) {
        const angle = (Math.PI * 2 / 8) * a;
        const tx = boss.x + Math.cos(angle) * 300;
        const ty = boss.y + Math.sin(angle) * 300;
        G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.5, 180, 'enemy', 'boss_shot'));
      }
      break;
  }
}

// 1-6: 보스별 고유 패턴
function executeBossUniquePattern(boss, gt) {
  const aliveUnits = G.units.filter(u => u.alive);
  switch (boss.bossKey) {
    case 'HARBOR': // 하버마스터: 크레인 암 스윙 (부채꼴 2초 예고)
      { const baseAngle = aliveUnits.length > 0 ? Math.atan2(G.rng.pick(aliveUnits).y - boss.y, G.rng.pick(aliveUnits).x - boss.x) : G.rng.float(0, Math.PI * 2);
        for (let i = -2; i <= 2; i++) {
          const a = baseAngle + i * 0.25;
          const tx = boss.x + Math.cos(a) * 250;
          const ty = boss.y + Math.sin(a) * 250;
          G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.8, 180, 'enemy', 'boss_shot'));
        }
        spawnEffect(boss.x, boss.y, 'steam', 1.0);
      }
      break;
    case 'FACTORY': // 크러셔: 직선 프레스 (장방형 판정)
      { if (aliveUnits.length > 0) {
          const target = G.rng.pick(aliveUnits);
          // 수직 프레스 라인 — 대상 X축 기준 범위 데미지
          G.units.forEach(u => {
            if (!u.alive) return;
            if (Math.abs(u.x - target.x) < CONFIG.TILE * 3) {
              damageUnit(u, boss.atk * 0.6, gt);
            }
          });
          G.screenShake = 8;
          spawnEffect(target.x, boss.y, 'hit', 0.6);
          snd.play('explosion');
        }
      }
      break;
    case 'FURNACE': // 매그마코어: 3방향 용암탄 (착탄 시 지속 데미지 영역)
      { for (let i = 0; i < 3; i++) {
          const angle = G.rng.float(0, Math.PI * 2);
          const dist = G.rng.float(100, 250);
          const tx = boss.x + Math.cos(angle) * dist;
          const ty = boss.y + Math.sin(angle) * dist;
          G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.9, 160, 'enemy', 'boss_shot'));
          spawnEffect(tx, ty, 'hit', 1.2);
        }
      }
      break;
    case 'CLOCK': // 크로노기어: 시간 역전 — 모든 유닛 속도 50% 감소 3초
      { G.units.forEach(u => {
          if (u.alive) {
            const origSpeed = u.speed;
            u.speed *= 0.5;
            tw.delay(3.0, () => { if (u.alive) u.speed = origSpeed; });
          }
        });
        // 시계 방향 나선형 탄막
        for (let i = 0; i < 12; i++) {
          const a = (Math.PI * 2 / 12) * i + gt * 2;
          const tx = boss.x + Math.cos(a) * 280;
          const ty = boss.y + Math.sin(a) * 280;
          G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.4, 150, 'enemy', 'boss_shot'));
        }
        spawnEffect(boss.x, boss.y, 'steam', 1.5);
      }
      break;
    case 'CORE': // 페릭스: 에테르 부패 — 스팀 흡수 + 전방위 16방향 밀집 탄막
      { G.steam = Math.max(0, G.steam - 15);
        for (let i = 0; i < 16; i++) {
          const a = (Math.PI * 2 / 16) * i;
          const tx = boss.x + Math.cos(a) * 350;
          const ty = boss.y + Math.sin(a) * 350;
          G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.6, 200, 'enemy', 'boss_shot'));
        }
      }
      break;
    case 'HIDDEN': // 클럭워크 아르케: 전체 화면 경고 + 안전 지대
      { // 전 유닛 50% 확률 데미지 + 광역 쉐이크
        G.units.forEach(u => {
          if (!u.alive) return;
          if (G.rng.next() < 0.6) damageUnit(u, boss.atk * 0.5, gt);
        });
        G.screenShake = 12;
        snd.play('explosion');
        // 이중 나선 탄막
        for (let i = 0; i < 10; i++) {
          const a1 = (Math.PI * 2 / 10) * i + gt;
          const a2 = (Math.PI * 2 / 10) * i + gt + Math.PI;
          G.projectiles.push(createProjectile(boss.x, boss.y, boss.x + Math.cos(a1) * 300, boss.y + Math.sin(a1) * 300, boss.atk * 0.5, 220, 'enemy', 'boss_shot'));
          G.projectiles.push(createProjectile(boss.x, boss.y, boss.x + Math.cos(a2) * 300, boss.y + Math.sin(a2) * 300, boss.atk * 0.4, 180, 'enemy', 'boss_shot'));
        }
      }
      break;
  }
}

// 보스 패턴 실행 (1-6: 보스별 고유, 1-7: P2/P3 누적)
function executeBossPattern(boss, gt) {
  const phase = boss.currentPhase;
  // P1: 공통 패턴 1개 + 고유 패턴
  // P2: 공통 패턴 1~2개 + 고유 패턴 (기존 + 강화)
  // P3: 공통 패턴 2개 + 고유 패턴 + 광폭화(속도/데미지 증가)
  const commonCount = Math.min(1 + phase, 3);
  for (let p = 0; p < commonCount; p++) {
    const patternId = G.rng.int(0, 2);
    executeCommonBossPattern(boss, patternId, gt);
  }
  // 고유 패턴 실행 (모든 페이즈에서)
  executeBossUniquePattern(boss, gt);
  // P3+: 광폭화 — 추가 전방위 탄막
  if (phase >= 2) {
    for (let a = 0; a < 6; a++) {
      const angle = G.rng.float(0, Math.PI * 2);
      const tx = boss.x + Math.cos(angle) * 250;
      const ty = boss.y + Math.sin(angle) * 250;
      G.projectiles.push(createProjectile(boss.x, boss.y, tx, ty, boss.atk * 0.3, 250, 'enemy', 'boss_shot'));
    }
    G.screenShake = Math.max(G.screenShake, 3);
  }
  snd.play('attack_range');
}

// 보스 인트로 업데이트
function updateBossIntro(dt, gt) {
  G.bossIntroTimer += dt;
  if (G.bossIntroTimer > 3.0 || input.keysJustPressed['Space'] || input.keysJustPressed['Enter'] || input.mouse.justClicked) {
    G.bossIntroTimer = 0;
    G.boss = createBoss(G.currentZone, getDiffMults(), getDDAMults());
    snd.play('boss_roar');
    beginTransition('BOSS_FIGHT');
    snd.startBGM('boss');
  }
}

// 보스 격파 후 처리 (F17: 보상 중복 방지)
function triggerBossDefeat(boss, gt) {
  if (boss.rewardGiven) return; // 1-5: 이미 보상 지급됨
  boss.rewardGiven = true;
  G.screenShake = 15;
  tw.delay(2.0, () => {
    if (boss.zoneIndex === 5) {
      // 히든 보스 격파 → 진 엔딩
      G.save.trueEndingSeen = true;
      beginTransition('VICTORY');
    } else {
      // 일반 보스 격파 → 존 클리어
      G.save.furthestZone = Math.max(G.save.furthestZone, boss.zoneIndex + 1);
      if (boss.zoneIndex === 4) {
        // 5존 클리어 → 일반 엔딩 (히든 해금)
        G.save.hiddenUnlocked = true;
        beginTransition('VICTORY');
      } else {
        generateBlueprintChoices();
        beginTransition('ZONE_CLEAR');
      }
    }
    saveProgress();
  });
}

// 워크샵 보너스 계산
function getWorkshopBonus() {
  const atk = G.save.workshop.attack;
  const def = G.save.workshop.defense;
  const prod = G.save.workshop.production;
  let atkBonus = 0, critChance = 0, critDmg = 1.5;
  for (let i = 0; i < atk; i++) {
    const lv = CONFIG.WORKSHOP.ATK[i];
    atkBonus += lv.atkBonus; critChance += lv.critChance; critDmg = lv.critDmg;
  }
  let hpBonus = 0, unitHp = 0, unitDef = 0, dodge = 0;
  for (let i = 0; i < def; i++) {
    const lv = CONFIG.WORKSHOP.DEF[i];
    hpBonus += lv.hpBonus; unitHp += lv.unitHp; unitDef += lv.unitDef; dodge += lv.dodge;
  }
  let steamMax = 0, steamRegen = 0, cooldown = 0, gearDrop = 0, reclaim = 0.5;
  for (let i = 0; i < prod; i++) {
    const lv = CONFIG.WORKSHOP.PROD[i];
    steamMax += lv.steamMax; steamRegen += lv.steamRegen;
    cooldown += lv.cooldown; gearDrop += lv.gearDrop; reclaim = lv.reclaim;
  }
  return { atk: atkBonus, hp: unitHp, def: unitDef, speed: 0, critChance, critDmg, dodge, hpBonus, steamMax, steamRegen, cooldown, gearDrop, reclaim };
}

// 블루프린트 3택 생성
function generateBlueprintChoices() {
  const diff = G.difficulty;
  let pool = [...BLUEPRINTS.common, ...BLUEPRINTS.rare];
  if (diff !== 'APPRENTICE') pool = pool.concat(BLUEPRINTS.epic);
  G.blueprintChoices = G.rng.shuffle(pool).slice(0, 3);
}

// 블루프린트 적용 (1-3: 실제 스탯 반영)
function applyBlueprint(bp) {
  if (!bp) return;
  G.activeBlueprints.push(bp);
  // 1-3: stat별 분기 — 즉시 효과 적용
  if (bp.stat === 'steamMax' && bp.unit === 'ALL') {
    G.steamMax += bp.value;
  }
  // 1-4: evolve 블루프린트 → 기존 유닛에도 진화 적용
  if (bp.stat === 'evolve') {
    G.units.forEach(u => {
      if (u.alive && (bp.unit === u.type || bp.unit === 'ALL')) {
        u.evolved = Math.min(3, u.evolved + bp.value);
      }
    });
  }
  // 기존 유닛에게도 수치 보너스 즉시 적용
  G.units.forEach(u => {
    if (!u.alive) return;
    if (bp.unit !== 'ALL' && bp.unit !== u.type) return;
    applyBpStatToUnit(u, bp);
  });
  snd.play('blueprint');
}

// 블루프린트 단일 스탯을 유닛에 적용
function applyBpStatToUnit(unit, bp) {
  switch (bp.stat) {
    case 'atk': unit.atk *= (1 + bp.value); break;
    case 'hp':
      unit.maxHp *= (1 + bp.value);
      unit.hp = Math.min(unit.hp + unit.maxHp * bp.value, unit.maxHp);
      break;
    case 'range': unit.range += bp.value * CONFIG.TILE; break;
    case 'heal': unit.blueprintBonuses.healMult = (unit.blueprintBonuses.healMult || 1) * (1 + bp.value); break;
    case 'speed': unit.speed *= (1 + bp.value); break;
    case 'taunt': unit.blueprintBonuses.tauntMult = (unit.blueprintBonuses.tauntMult || 1) * bp.value; break;
    case 'pierce': unit.blueprintBonuses.pierce = (unit.blueprintBonuses.pierce || 0) + bp.value; break;
    case 'barricade': unit.blueprintBonuses.barricadeMult = (unit.blueprintBonuses.barricadeMult || 1) * bp.value; break;
    case 'evolve': unit.evolved = Math.min(3, unit.evolved + bp.value); break;
  }
}

// 1-3: 신규 유닛 생성 시 활성 블루프린트 보너스 일괄 적용
function applyBlueprintBonusesToUnit(unit) {
  G.activeBlueprints.forEach(bp => {
    if (bp.unit !== 'ALL' && bp.unit !== unit.type) return;
    applyBpStatToUnit(unit, bp);
  });
}

// 워크샵 업그레이드
function workshopUpgrade(treeKey) {
  const tree = treeKey === 'attack' ? 'attack' : treeKey === 'defense' ? 'defense' : 'production';
  const level = G.save.workshop[tree];
  if (level >= 5) return false;
  const costs = CONFIG.WORKSHOP[tree.toUpperCase()];
  if (!costs || !costs[level]) return false;
  const cost = costs[level].cost;
  if (G.save.totalGears < cost) return false;
  G.save.totalGears -= cost;
  G.save.workshop[tree]++;
  saveProgress();
  snd.play('gear');
  return true;
}
