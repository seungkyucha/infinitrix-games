// 다국어 헬퍼
function L() { return LANG[G.lang] || LANG.ko; }

// 난이도 배율
function getDiffMults() {
  const d = CONFIG.DIFF[G.difficulty];
  return { hpMult: d.hpMult, atkMult: d.atkMult };
}

// DDA 배율
function getDDAMults() {
  if (G.ddaDeaths >= 3) return CONFIG.DDA.EASE;
  return CONFIG.DDA.NORMAL;
}

// 각 상태에서 허용되는 이탈/재시작 전환 목록 (P3: ESCAPE_ALLOWED 패턴)
const ESCAPE_ALLOWED = {
  TITLE:       ['WORKSHOP'],
  WORKSHOP:    ['ZONE_SELECT', 'TITLE'],
  ZONE_SELECT: ['DEPLOY', 'WORKSHOP'],
  DEPLOY:      ['COMBAT', 'ZONE_SELECT', 'PAUSE'],
  COMBAT:      ['PAUSE', 'BOSS_INTRO', 'STAGE_CLEAR', 'GAME_OVER'],
  BOSS_INTRO:  ['BOSS_FIGHT'],
  BOSS_FIGHT:  ['PAUSE', 'STAGE_CLEAR', 'ZONE_CLEAR', 'VICTORY', 'GAME_OVER'],
  STAGE_CLEAR: ['DEPLOY', 'ZONE_CLEAR', 'WORKSHOP'],
  ZONE_CLEAR:  ['WORKSHOP', 'ZONE_SELECT'],
  VICTORY:     ['TITLE', 'WORKSHOP'],
  GAME_OVER:   ['TITLE', 'WORKSHOP'],
  PAUSE:       ['COMBAT', 'BOSS_FIGHT', 'DEPLOY', 'TITLE'],
  MODAL:       [] // 모달은 자체 닫기로 처리
};

// RESTART_ALLOWED — 게임오버 등에서 허용되는 재시작 대상
const RESTART_ALLOWED = { GAME_OVER: ['TITLE', 'WORKSHOP'], VICTORY: ['TITLE', 'WORKSHOP'] };

// 상태 전환 (F6: beginTransition 체계)
function beginTransition(targetState) {
  if (G.transitioning) return; // F5: 가드
  // 우선순위 체크 (ESCAPE_ALLOWED 딕셔너리 기반)
  const allowed = ESCAPE_ALLOWED[G.state];
  if (allowed && !allowed.includes(targetState)) return; // 허용 목록에 없으면 무시
  G.transitioning = true;
  G.prevState = G.state;
  tw.add(G, 'transitionAlpha', 0, 1, 0.3, () => {
    G.state = targetState;
    onStateEnter(targetState);
    tw.add(G, 'transitionAlpha', 1, 0, 0.3, () => {
      G.transitioning = false;
    }, 'easeOut');
  }, 'easeIn');
}

// 상태 진입 처리
function onStateEnter(state) {
  switch (state) {
    case 'TITLE':
      snd.startBGM('title');
      break;
    case 'WORKSHOP':
      G.workshopBonuses = getWorkshopBonus();
      break;
    case 'ZONE_SELECT':
      break;
    case 'DEPLOY':
      initRun();
      snd.startBGM('deploy');
      break;
    case 'COMBAT':
      spawnWave(G.currentZone, G.currentStage, G.wave);
      snd.startBGM('combat');
      break;
    case 'BOSS_INTRO':
      G.bossIntroTimer = 0;
      const zoneId = ZONES[G.currentZone].id;
      G.narrativeText = STORY.zones[zoneId] ? (STORY.zones[zoneId].boss ? STORY.zones[zoneId].boss[G.lang] : '') : '';
      break;
    case 'BOSS_FIGHT':
      break;
    case 'STAGE_CLEAR':
      generateBlueprintChoices();
      break;
    case 'ZONE_CLEAR':
      break;
    case 'GAME_OVER':
      snd.stopBGM();
      G.screenShake = 20;
      handleScoreSave();
      G.save.totalGears += G.runGears;
      G.save.totalRuns++;
      G.ddaDeaths++;
      saveProgress();
      break;
    case 'VICTORY':
      snd.startBGM('victory');
      G.trueEnding = G.save.trueEndingSeen;
      handleScoreSave();
      G.save.totalGears += G.runGears;
      saveProgress();
      break;
    case 'PAUSE':
      snd.stopBGM();
      break;
  }
}

// 점수 저장 처리 (F8: 판정 먼저, 저장 나중에)
function handleScoreSave() {
  const key = G.difficulty.toLowerCase();
  const best = G.save.bestScore[key] || 0;
  G.isNewBest = G.score > best;
  if (G.isNewBest) G.save.bestScore[key] = G.score;
}

// 런 초기화
function initRun() {
  G.score = 0; G.combo = 0; G.comboTimer = 0;
  G.runGears = 0; G.wave = 0; G.currentStage = 0;
  G.waveClearing = false; G.waveSpawnComplete = false;
  G.units = []; G.enemies = []; G.projectiles = []; G.effects = [];
  G.boss = null; G.selectedUnit = null; G.activeBlueprints = [];
  G.gameSpeed = 1; G.screenShake = 0;
  G.isNewBest = false;
  G.spawnCooldowns = { STRIKER: 0, GUNNER: 0, ENGINEER: 0 }; // 쿨다운 리셋
  G.powerups = []; G.envTimer = 0; G.envActive = false;
  G.envTraps = null; G.envLavaSpots = null; G.envCorruptTimer = 0;
  G.envTimeWarp = 1; G.ddaLevel = 'NORMAL';
  // 워크샵 보너스 적용
  G.workshopBonuses = getWorkshopBonus();
  G.steamMax = CONFIG.STEAM.MAX + G.workshopBonuses.steamMax;
  G.steam = G.steamMax;
  G.commanderMaxHP = 100 + G.workshopBonuses.hpBonus;
  G.commanderHP = G.commanderMaxHP;
  // 시드 설정
  G.runSeed = (G.save.totalRuns * 1000 + G.currentZone * 100 + G.currentStage) | 0;
  if (G.runSeed === 0) G.runSeed = 1;
  G.rng = new SeededRNG(G.runSeed);
  // 맵 생성
  generateMap();
}

// 맵 타일 생성 (프로시저럴)
function generateMap() {
  G.mapTiles = [];
  for (let y = 0; y < CONFIG.MAP_H; y++) {
    G.mapTiles[y] = [];
    for (let x = 0; x < CONFIG.MAP_W; x++) {
      // 가장자리는 벽
      if (x === 0 || x === CONFIG.MAP_W - 1 || y === 0 || y === CONFIG.MAP_H - 1) {
        G.mapTiles[y][x] = 1;
      } else {
        // 랜덤 장애물
        G.mapTiles[y][x] = G.rng.next() < 0.08 ? 1 : 0;
      }
    }
  }
}

// 웨이브 스폰
function spawnWave(zone, stage, wave) {
  G.waveSpawnComplete = false;
  const difficulty = getDiffMults();
  const dda = getDDAMults();
  const baseCount = 3 + zone * 2 + stage + wave * 2;
  const count = Math.min(baseCount, 20);
  const types = ['GRUNT', 'GRUNT', 'SHOOTER'];
  if (zone >= 1) types.push('CHARGER');
  if (zone >= 2) types.push('DRONE');
  if (zone >= 3) types.push('INFECTED');
  if (wave >= 2) types.push('ELITE');
  for (let i = 0; i < count; i++) {
    const type = G.rng.pick(types);
    const side = G.rng.int(0, 3); // 4방향에서 스폰
    let ex, ey;
    switch (side) {
      case 0: ex = G.rng.float(CONFIG.TILE * 2, CONFIG.MAP_W * CONFIG.TILE - CONFIG.TILE * 2); ey = CONFIG.TILE; break;
      case 1: ex = CONFIG.MAP_W * CONFIG.TILE - CONFIG.TILE; ey = G.rng.float(CONFIG.TILE * 2, CONFIG.MAP_H * CONFIG.TILE - CONFIG.TILE * 2); break;
      case 2: ex = G.rng.float(CONFIG.TILE * 2, CONFIG.MAP_W * CONFIG.TILE - CONFIG.TILE * 2); ey = CONFIG.MAP_H * CONFIG.TILE - CONFIG.TILE; break;
      case 3: ex = CONFIG.TILE; ey = G.rng.float(CONFIG.TILE * 2, CONFIG.MAP_H * CONFIG.TILE - CONFIG.TILE * 2); break;
    }
    G.enemies.push(createEnemy(type, ex, ey, difficulty, dda));
  }
  G.waveSpawnComplete = true;
}

// 게임 오버 트리거
function triggerGameOver(gt) {
  if (G.state === 'GAME_OVER') return; // 가드
  beginTransition('GAME_OVER');
}

// 저장
function saveProgress() {
  try {
    localStorage.setItem('ironclad_vanguard_save', JSON.stringify(G.save));
  } catch (e) { /* localStorage 미사용 가능 환경 */ }
}

// 로드
function loadProgress() {
  try {
    const data = localStorage.getItem('ironclad_vanguard_save');
    if (data) {
      const parsed = JSON.parse(data);
      Object.assign(G.save, parsed);
      G.lang = G.save.lang || 'ko';
      G.difficulty = G.save.difficulty || 'TECHNICIAN';
    }
  } catch (e) { /* 로드 실패 시 기본값 사용 */ }
}

// 전역 인스턴스
const tw = new TweenManager();
const snd = new SoundManager();
const input = new InputManager();
let canvas, ctx;
let lastTime = 0;
let gt = 0; // gameTime (F19)

// Canvas 초기화 + 리사이즈
function setupCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
}

// 리사이즈 (devicePixelRatio 대응)
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  G.dpr = dpr;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  G.canvasW = w * dpr;
  G.canvasH = h * dpr;
  G.camera.w = G.canvasW;
  G.camera.h = G.canvasH;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // 내부적으로 CSS 픽셀 기준 작업
  G.canvasW = w;
  G.canvasH = h;
  G.camera.w = w;
  G.camera.h = h;
}

// 이벤트 리스너 등록 (F12: 변수 선언 → DOM 할당 → 이벤트 등록)
function setupEvents() {
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('keydown', e => {
    e.preventDefault();
    input.onKeyDown(e);
    // 첫 입력 시 오디오 초기화
    snd.init();
  });
  window.addEventListener('keyup', e => input.onKeyUp(e));
  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    snd.init();
    input.onMouseDown(e, canvas.getBoundingClientRect(), 1);
  });
  canvas.addEventListener('mouseup', e => input.onMouseUp(e));
  canvas.addEventListener('mousemove', e => input.onMouseMove(e, canvas.getBoundingClientRect(), 1));
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('touchstart', e => {
    snd.init();
    input.onTouchStart(e, canvas.getBoundingClientRect(), 1);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    input.onTouchMove(e, canvas.getBoundingClientRect(), 1);
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    input.onTouchEnd(e, canvas.getBoundingClientRect(), 1);
  }, { passive: false });
}

// 가상 버튼 세팅 (화면 크기 기반)
function setupVirtualButtons() {
  const w = G.canvasW, h = G.canvasH;
  const isSmall = w <= 400;
  const btnSize = isSmall ? Math.max(44, 44) : 56; // F11: 최소 48px → 56px or 44px
  const gap = isSmall ? 8 : 12;
  const barY = h - btnSize - 15;
  const startX = 10;
  input.virtualButtons = [
    { id: 'striker',  x: startX,                       y: barY, w: btnSize, h: btnSize, label: 'S' },
    { id: 'gunner',   x: startX + btnSize + gap,       y: barY, w: btnSize, h: btnSize, label: 'G' },
    { id: 'engineer', x: startX + (btnSize + gap) * 2, y: barY, w: btnSize, h: btnSize, label: 'E' },
    { id: 'skill',    x: w - (btnSize + gap) * 2 - 10, y: barY, w: btnSize, h: btnSize, label: 'SK' },
    { id: 'recall',   x: w - btnSize - 10,             y: barY, w: btnSize, h: btnSize, label: 'RC' },
    { id: 'speed',    x: w - btnSize - 10,             y: 10,   w: Math.max(btnSize, 48), h: Math.max(btnSize, 48), label: '2×' },
    { id: 'go',       x: (w - 120) / 2,                y: barY, w: 120, h: btnSize, label: 'GO' }
  ];
}

// 가상 버튼 렌더링
function drawVirtualButtons(ctx, w, h, gt) {
  const state = G.state;
  input.virtualButtons.forEach(btn => {
    // 배치/전투 상태에서만 유닛 버튼 표시
    if (['striker', 'gunner', 'engineer', 'skill', 'recall'].includes(btn.id)) {
      if (state !== 'DEPLOY' && state !== 'COMBAT' && state !== 'BOSS_FIGHT') return;
    }
    if (btn.id === 'go' && state !== 'DEPLOY') return;
    if (btn.id === 'speed' && state !== 'COMBAT' && state !== 'BOSS_FIGHT') return;
    const isSelected = (btn.id === 'striker' && G.selectedUnitType === 'STRIKER') ||
                       (btn.id === 'gunner' && G.selectedUnitType === 'GUNNER') ||
                       (btn.id === 'engineer' && G.selectedUnitType === 'ENGINEER');
    const bg = isSelected ? COL.copper + 'CC' : COL.panel;
    const border = isSelected ? COL.brass : COL.copper + '66';
    drawRoundRect(ctx, btn.x, btn.y, btn.w, btn.h, 6, bg, border);
    drawText(ctx, btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2, Math.min(14, btn.w * 0.3), COL.steamWhite, 'center');
  });
}

// 메인 게임 루프
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gt += dt;
  // 화면 쉐이크 감쇠
  G.screenShake = Math.max(0, G.screenShake - dt * 20);
  // 입력 처리
  switch (G.state) {
    case 'TITLE':
      updateTitle(dt, gt);
      break;
    case 'WORKSHOP':
      updateWorkshop(dt, gt);
      break;
    case 'ZONE_SELECT':
      updateZoneSelect(dt, gt);
      break;
    case 'DEPLOY':
      handleDeployInput(input, G.camera);
      break;
    case 'COMBAT':
      handleCombatInput(input, G.camera, gt);
      updateCombatLogic(dt, gt);
      updateEnvironmentHazards(dt, gt);
      updatePowerups(dt);
      updateCamera(dt);
      updateDDA();
      break;
    case 'BOSS_INTRO':
      updateBossIntro(dt, gt);
      break;
    case 'BOSS_FIGHT':
      handleCombatInput(input, G.camera, gt);
      updateCombatLogic(dt, gt);
      updateBossAI(G.boss, dt, gt);
      updateEnvironmentHazards(dt, gt);
      updatePowerups(dt);
      updateCamera(dt);
      break;
    case 'STAGE_CLEAR':
      updateStageClear(dt, gt);
      break;
    case 'ZONE_CLEAR':
      updateZoneClear(dt, gt);
      break;
    case 'GAME_OVER':
      updateGameOver(dt, gt);
      break;
    case 'VICTORY':
      updateVictory(dt, gt);
      break;
    case 'PAUSE':
      updatePause(dt, gt);
      break;
  }
  // 트윈 업데이트 (F7: 모든 상태에서)
  tw.update(dt);
  // 이펙트 업데이트
  updateEffects(dt);
  // 유닛 생존 체크
  G.units = G.units.filter(u => u.alive);
  G.enemies = G.enemies.filter(e => e.alive);
  // 렌더링
  render(gt);
  // 가상 버튼 재계산 (리사이즈 대응)
  setupVirtualButtons();
  // 입력 플래그 리셋
  input.update();
  requestAnimationFrame(gameLoop);
}

// 이펙트 업데이트
function updateEffects(dt) {
  for (let i = G.effects.length - 1; i >= 0; i--) {
    G.effects[i].timer += dt;
    if (G.effects[i].timer >= G.effects[i].duration) {
      G.effects.splice(i, 1);
    }
  }
}

// === 상태별 업데이트 함수 ===

// 타이틀 업데이트
function updateTitle(dt, gt) {
  if (input.keysJustPressed['Space'] || input.keysJustPressed['Enter'] || input.mouse.justClicked) {
    snd.play('click');
    beginTransition('WORKSHOP');
  }
  if (input.keysJustPressed['KeyD']) {
    // 난이도 순환
    const diffs = ['APPRENTICE', 'TECHNICIAN', 'MASTER'];
    const idx = diffs.indexOf(G.difficulty);
    G.difficulty = diffs[(idx + 1) % 3];
    G.save.difficulty = G.difficulty;
    saveProgress();
    snd.play('click');
  }
  if (input.keysJustPressed['KeyL']) {
    G.lang = G.lang === 'ko' ? 'en' : 'ko';
    G.save.lang = G.lang;
    saveProgress();
    snd.play('click');
  }
}

// 워크샵 업데이트
function updateWorkshop(dt, gt) {
  if (input.keysJustPressed['Escape']) {
    beginTransition('TITLE');
    return;
  }
  // 클릭 체크
  if (input.mouse.justClicked) {
    // 트리 클릭
    G.workshopBtns.forEach(btn => {
      if (input.hitTest(input.mouse.x, input.mouse.y, btn.x, btn.y, btn.w, btn.h)) {
        workshopUpgrade(btn.key);
      }
    });
    // 출격 버튼
    if (G.startBtn && input.hitTest(input.mouse.x, input.mouse.y, G.startBtn.x, G.startBtn.y, G.startBtn.w, G.startBtn.h)) {
      beginTransition('ZONE_SELECT');
    }
  }
  if (input.keysJustPressed['Space'] || input.keysJustPressed['Enter']) {
    beginTransition('ZONE_SELECT');
  }
}

// 존 선택 업데이트
function updateZoneSelect(dt, gt) {
  if (input.keysJustPressed['Escape']) {
    beginTransition('WORKSHOP');
    return;
  }
  if (input.mouse.justClicked && G.zoneBtns) {
    G.zoneBtns.forEach(btn => {
      if (input.hitTest(input.mouse.x, input.mouse.y, btn.x, btn.y, btn.w, btn.h)) {
        G.currentZone = btn.zone;
        G.currentStage = 0;
        beginTransition('DEPLOY');
        snd.play('click');
      }
    });
  }
  // 키보드 숫자로 존 선택
  for (let i = 0; i < 6; i++) {
    if (input.keysJustPressed[`Digit${i + 1}`]) {
      if (i <= G.save.furthestZone || (i === 5 && G.save.hiddenUnlocked)) {
        G.currentZone = i;
        G.currentStage = 0;
        beginTransition('DEPLOY');
        snd.play('click');
      }
    }
  }
}

// 스테이지 클리어 업데이트
function updateStageClear(dt, gt) {
  if (input.mouse.justClicked && G.blueprintBtns) {
    G.blueprintBtns.forEach(btn => {
      if (input.hitTest(input.mouse.x, input.mouse.y, btn.x, btn.y, btn.w, btn.h)) {
        applyBlueprint(btn.bp);
        G.blueprintChoices = [];
        // 다음 스테이지로
        G.wave = 0;
        G.waveClearing = false;
        beginTransition('COMBAT');
      }
    });
  }
}

// 존 클리어 업데이트
function updateZoneClear(dt, gt) {
  if (input.mouse.justClicked && G.blueprintBtns) {
    G.blueprintBtns.forEach(btn => {
      if (input.hitTest(input.mouse.x, input.mouse.y, btn.x, btn.y, btn.w, btn.h)) {
        applyBlueprint(btn.bp);
        G.blueprintChoices = [];
        beginTransition('ZONE_SELECT');
      }
    });
  }
}

// 게임 오버 업데이트
function updateGameOver(dt, gt) {
  if (input.keysJustPressed['KeyR'] || input.keysJustPressed['Space'] || input.mouse.justClicked) {
    snd.play('click');
    beginTransition('WORKSHOP');
  }
}

// 승리 업데이트
function updateVictory(dt, gt) {
  if (input.keysJustPressed['KeyR'] || input.keysJustPressed['Space'] || input.mouse.justClicked) {
    snd.play('click');
    beginTransition('WORKSHOP');
  }
}

// 일시정지 업데이트
function updatePause(dt, gt) {
  if (input.keysJustPressed['Escape']) {
    // 즉시 전환 (Cycle 28 교훈: PAUSE 복귀는 즉시)
    G.state = G.prevState || 'COMBAT';
    snd.startBGM(G.state === 'BOSS_FIGHT' ? 'boss' : 'combat');
  }
  if (input.keysJustPressed['KeyT'] || input.mouse.justClicked) {
    beginTransition('TITLE');
  }
}

// === 메인 렌더링 ===
function render(gt) {
  const w = G.canvasW, h = G.canvasH;
  // 배경 클리어
  ctx.fillStyle = COL.bgDark;
  ctx.fillRect(0, 0, w, h);
  // 화면 쉐이크
  if (G.screenShake > 0.5) {
    const sx = Math.sin(gt * 50) * G.screenShake * 0.5;
    const sy = Math.cos(gt * 50) * G.screenShake * 0.5;
    ctx.save();
    ctx.translate(sx, sy);
  }
  switch (G.state) {
    case 'BOOT':
    case 'TITLE':
      drawTitleScreen(ctx, w, h, gt);
      break;
    case 'WORKSHOP':
      drawWorkshopScreen(ctx, w, h, gt);
      break;
    case 'ZONE_SELECT':
      drawZoneSelect(ctx, w, h, gt);
      break;
    case 'DEPLOY':
      drawBgLayer1(ctx, w, h, G.camera.x, gt);
      drawBgLayer2(ctx, w, h, G.camera.x, gt);
      drawDeployScreen(ctx, w, h, G.camera, gt);
      drawHUD(ctx, w, h, gt);
      drawVirtualButtons(ctx, w, h, gt);
      break;
    case 'COMBAT':
    case 'BOSS_FIGHT':
      drawGameWorld(ctx, w, h, gt);
      drawHUD(ctx, w, h, gt);
      if (G.boss && G.boss.alive) drawBossHPBar(ctx, w, G.boss, gt);
      drawVirtualButtons(ctx, w, h, gt);
      break;
    case 'BOSS_INTRO':
      drawGameWorld(ctx, w, h, gt);
      drawNarrative(ctx, w, h, G.narrativeText, 'boss', G.bossIntroTimer, gt);
      drawGlowText(ctx, L().bossIncoming, w / 2, h * 0.3, 36, COL.danger, COL.corrupt, 'center');
      break;
    case 'STAGE_CLEAR':
    case 'ZONE_CLEAR':
      drawGameWorld(ctx, w, h, gt);
      drawGlowText(ctx, G.state === 'ZONE_CLEAR' ? L().zoneClear : L().waveCleared, w / 2, h * 0.12, 28, COL.gold, COL.brass, 'center');
      if (G.blueprintChoices.length > 0) {
        drawBlueprintSelect(ctx, w, h, G.blueprintChoices, gt);
      }
      break;
    case 'GAME_OVER':
      drawGameOverScreen(ctx, w, h, gt, G.score, G.save.bestScore[G.difficulty.toLowerCase()] || 0, G.isNewBest);
      break;
    case 'VICTORY':
      drawVictoryScreen(ctx, w, h, gt, G.trueEnding);
      break;
    case 'PAUSE':
      drawGameWorld(ctx, w, h, gt);
      drawPauseOverlay(ctx, w, h, gt);
      break;
  }
  if (G.screenShake > 0.5) ctx.restore();
  // 전환 오버레이
  if (G.transitionAlpha > 0.01) {
    ctx.fillStyle = `rgba(13,13,13,${G.transitionAlpha})`;
    ctx.fillRect(0, 0, w, h);
  }
}

// 게임 월드 렌더링
function drawGameWorld(ctx, w, h, gt) {
  // 화면 좌표: 배경
  drawBgLayer1(ctx, w, h, G.camera.x, gt);
  drawBgLayer2(ctx, w, h, G.camera.x, gt);
  // 월드 좌표로 전환
  ctx.save();
  ctx.translate(-G.camera.x, -G.camera.y); // 월드 좌표
  // 그리드 (반투명)
  ctx.strokeStyle = COL.steel + '11';
  ctx.lineWidth = 0.5;
  const startTX = Math.max(0, (G.camera.x / CONFIG.TILE) | 0);
  const startTY = Math.max(0, (G.camera.y / CONFIG.TILE) | 0);
  const endTX = Math.min(CONFIG.MAP_W, ((G.camera.x + w) / CONFIG.TILE) | 0 + 1);
  const endTY = Math.min(CONFIG.MAP_H, ((G.camera.y + h) / CONFIG.TILE) | 0 + 1);
  for (let tx = startTX; tx < endTX; tx++) {
    for (let ty = startTY; ty < endTY; ty++) {
      if (G.mapTiles[ty] && G.mapTiles[ty][tx] === 1) {
        ctx.fillStyle = COL.steel + '33';
        ctx.fillRect(tx * CONFIG.TILE, ty * CONFIG.TILE, CONFIG.TILE, CONFIG.TILE);
      }
    }
  }
  // 적 유닛
  G.enemies.forEach(e => {
    if (!e.alive) return;
    drawEnemy(ctx, e.x, e.y, 28, e.type, e.hp / e.maxHp, gt);
  });
  // 아군 유닛
  G.units.forEach(u => {
    if (!u.alive) return;
    drawUnit(ctx, u.x, u.y, 32, u.type, u.state, gt, u.evolved, u.flashTimer);
    drawHPBar(ctx, u.x - 16, u.y - 24, 32, 4, u.hp / u.maxHp);
    // 선택 표시
    if (G.selectedUnit === u) {
      ctx.strokeStyle = COL.gold;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(u.x, u.y, 20, 0, Math.PI * 2);
      ctx.stroke();
    }
  });
  // 보스
  if (G.boss && G.boss.alive) {
    drawBoss(ctx, G.boss.x, G.boss.y, 96, G.boss.bossKey, G.boss.currentPhase, G.boss.hp / G.boss.maxHp, gt);
  }
  // 투사체
  G.projectiles.forEach(p => {
    if (!p.alive) return;
    drawProjectile(ctx, p.x, p.y, p.type, p.owner, gt);
  });
  // 환경 위험 렌더링 (월드 좌표)
  drawEnvironmentHazards(ctx, G.currentZone, gt);
  // 파워업 렌더링 (월드 좌표)
  drawPowerups(ctx, gt);
  // 이펙트
  G.effects.forEach(eff => {
    drawEffect(ctx, eff.x, eff.y, eff.type, eff.timer / eff.duration, gt);
  });
  ctx.restore(); // 화면 좌표로 복원
  // 날씨 효과 (화면 좌표)
  drawWeatherEffects(ctx, w, h, G.currentZone, gt);
  // 비네팅
  drawVignette(ctx, w, h, 0.25);
}

// HUD 렌더링 (화면 좌표)
function drawHUD(ctx, w, h, gt) {
  // 좌상단: 점수 + 콤보
  drawGear(ctx, 22, 20, 10, 6, COL.gold, gt); // 점수 아이콘: 톱니 기어
  drawText(ctx, `${L().score}: ${G.score}`, 40, 20, 16, COL.gold, 'left');
  if (G.combo > 1) {
    const comboMult = Math.min(1 + G.combo * 0.1, CONFIG.COMBO_MAX_MULT);
    drawGlowText(ctx, `${G.combo} ${L().combo} ×${comboMult.toFixed(1)}`, 10, 42, 13, COL.furnace, COL.danger, 'left');
  }
  // 우상단: 스팀 게이지
  drawText(ctx, L().steam, w - 125, 18, 12, COL.steamWhite, 'left');
  drawSteamGauge(ctx, w - 115, 28, 105, 14, G.steam, G.steamMax);
  // 지휘관 HP
  drawHeartIcon(ctx, 20, 65, 9, COL.hpRed);
  drawHPBar(ctx, 35, 58, 100, 12, G.commanderHP / G.commanderMaxHP, COL.hpGreen);
  drawText(ctx, `${G.commanderHP | 0}/${G.commanderMaxHP}`, 85, 64, 10, COL.steamWhite, 'center');
  // 웨이브 + 구역 정보
  const zoneText = ZONES[G.currentZone] ? ZONES[G.currentZone].name[G.lang] : '';
  drawText(ctx, `${zoneText} ${G.currentStage + 1}-${G.wave + 1}`, w / 2, 16, 14, COL.brass, 'center');
  // 배속 표시
  if (G.gameSpeed > 1) {
    drawGlowText(ctx, `×${G.gameSpeed}`, w - 30, 60, 16, COL.furnace, COL.danger, 'center');
  }
  // 미니맵 (좌하단)
  const mmW = Math.min(120, w * 0.2), mmH = mmW * (CONFIG.MAP_H / CONFIG.MAP_W);
  const mmX = 10, mmY = h - mmH - 85;
  drawMinimap(ctx, mmX, mmY, mmW, mmH, G.camera, G.units, G.enemies, G.boss,
    CONFIG.MAP_W * CONFIG.TILE, CONFIG.MAP_H * CONFIG.TILE);
  // 기어 카운트
  drawText(ctx, `${L().gears}: ${G.runGears}`, w - 60, h - 85, 12, COL.gold, 'center');
}

// EXTRA: 환경 역학, 날씨 효과, 카메라 연출, DDA 세부 로직

// 구역별 환경 위험 업데이트 (F84: 수치 명시)
function updateEnvironmentHazards(dt, gt) {
  const zone = G.currentZone;
  switch (zone) {
    case 0: // 증기 항구: 시야 제한 + 속도 감소 (3초/8초)
      G.envTimer = (G.envTimer || 0) + dt * G.gameSpeed;
      if (G.envTimer % 11 < 3) {
        // 증기 분출 활성
        G.envActive = true;
        G.units.forEach(u => {
          if (u.alive) u.speed = CONFIG.UNIT[u.type].speed * CONFIG.TILE * 0.75;
        });
        // 증기 파티클 스폰
        if (G.rng.next() < 0.3) {
          spawnEffect(G.rng.float(0, CONFIG.MAP_W * CONFIG.TILE),
            G.rng.float(0, CONFIG.MAP_H * CONFIG.TILE), 'steam', 2.0);
        }
      } else {
        G.envActive = false;
        G.units.forEach(u => {
          if (u.alive) u.speed = CONFIG.UNIT[u.type].speed * CONFIG.TILE * (1 + G.workshopBonuses.speed);
        });
      }
      break;
    case 1: // 톱니 공장: 회전 톱니 (5 DPS, 4초 주기)
      G.envTimer = (G.envTimer || 0) + dt * G.gameSpeed;
      // 톱니 트랩 3개 (고정 위치, 시드 기반)
      if (!G.envTraps) {
        const trapRng = new SeededRNG(G.runSeed + 100);
        G.envTraps = [];
        for (let i = 0; i < 3; i++) {
          G.envTraps.push({
            x: trapRng.float(CONFIG.TILE * 5, CONFIG.MAP_W * CONFIG.TILE - CONFIG.TILE * 5),
            y: trapRng.float(CONFIG.TILE * 5, CONFIG.MAP_H * CONFIG.TILE - CONFIG.TILE * 5),
            radius: CONFIG.TILE * 2, active: true
          });
        }
      }
      // 4초 주기, 안전 구간 1.5초
      const trapPhase = G.envTimer % 4;
      G.envTraps.forEach(trap => {
        trap.active = trapPhase > 1.5;
        if (trap.active) {
          G.units.forEach(u => {
            if (!u.alive) return;
            if (Math.hypot(u.x - trap.x, u.y - trap.y) < trap.radius) {
              u.hp -= 5 * dt * G.gameSpeed; // 5 DPS
              if (u.hp <= 0) { u.alive = false; spawnEffect(u.x, u.y, 'hit', 0.5); }
            }
          });
        }
      });
      break;
    case 2: // 용광로 지대: 용암 분출 (8 DPS, 4초 경고 2초 분출)
      G.envTimer = (G.envTimer || 0) + dt * G.gameSpeed;
      if (!G.envLavaSpots) {
        const lavaRng = new SeededRNG(G.runSeed + 200);
        G.envLavaSpots = [];
        for (let i = 0; i < 4; i++) {
          G.envLavaSpots.push({
            x: lavaRng.float(CONFIG.TILE * 4, CONFIG.MAP_W * CONFIG.TILE - CONFIG.TILE * 4),
            y: lavaRng.float(CONFIG.TILE * 4, CONFIG.MAP_H * CONFIG.TILE - CONFIG.TILE * 4),
            radius: CONFIG.TILE * 2, phase: lavaRng.float(0, 6)
          });
        }
      }
      G.envLavaSpots.forEach(spot => {
        const p = (G.envTimer + spot.phase) % 6;
        spot.warning = p >= 0 && p < 4;
        spot.erupting = p >= 4;
        if (spot.erupting) {
          G.units.forEach(u => {
            if (!u.alive) return;
            if (Math.hypot(u.x - spot.x, u.y - spot.y) < spot.radius) {
              u.hp -= 8 * dt * G.gameSpeed; // 8 DPS
              if (u.hp <= 0) { u.alive = false; spawnEffect(u.x, u.y, 'hit', 0.5); }
            }
          });
        }
      });
      break;
    case 3: // 시계탑 광장: 공속 변동 (±30%, 5초 주기)
      G.envTimer = (G.envTimer || 0) + dt * G.gameSpeed;
      const timeWarp = Math.sin(G.envTimer * (Math.PI * 2 / 5)) * 0.3;
      G.envTimeWarp = 1 + timeWarp;
      break;
    case 4: // 에테르 코어: 스팀 감소 + 유닛 최대HP 감소
      G.steam = Math.max(0, G.steam - 1 * dt * G.gameSpeed);
      G.envCorruptTimer = (G.envCorruptTimer || 0) + dt * G.gameSpeed;
      if (G.envCorruptTimer >= 30) {
        G.envCorruptTimer = 0;
        const cap = 0.7; // -30% 캡
        G.units.forEach(u => {
          if (u.alive) {
            const minHp = CONFIG.UNIT[u.type].hp * cap;
            u.maxHp = Math.max(minHp, u.maxHp * 0.95);
            u.hp = Math.min(u.hp, u.maxHp);
          }
        });
      }
      break;
  }
}

// 환경 위험 렌더링 (월드 좌표 내에서 호출)
function drawEnvironmentHazards(ctx, zone, gt) {
  switch (zone) {
    case 0: // 증기 안개
      if (G.envActive) {
        ctx.fillStyle = 'rgba(232,232,232,0.12)';
        ctx.fillRect(0, 0, CONFIG.MAP_W * CONFIG.TILE, CONFIG.MAP_H * CONFIG.TILE);
      }
      break;
    case 1: // 회전 톱니 트랩
      if (G.envTraps) {
        G.envTraps.forEach(trap => {
          drawGear(ctx, trap.x, trap.y, trap.radius, 8,
            trap.active ? COL.danger + 'AA' : COL.steel + '44', gt * 2);
          if (trap.active) {
            ctx.beginPath();
            ctx.arc(trap.x, trap.y, trap.radius + 5, 0, Math.PI * 2);
            ctx.strokeStyle = COL.danger + '44';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        });
      }
      break;
    case 2: // 용암 분출
      if (G.envLavaSpots) {
        G.envLavaSpots.forEach(spot => {
          if (spot.warning && !spot.erupting) {
            // 경고 원
            ctx.beginPath();
            ctx.arc(spot.x, spot.y, spot.radius, 0, Math.PI * 2);
            ctx.strokeStyle = COL.furnace + '66';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
          if (spot.erupting) {
            // 용암 폭발
            ctx.beginPath();
            ctx.arc(spot.x, spot.y, spot.radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(spot.x, spot.y, 0, spot.x, spot.y, spot.radius);
            grad.addColorStop(0, COL.furnace + 'CC');
            grad.addColorStop(0.5, COL.danger + '88');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fill();
          }
        });
      }
      break;
    case 3: // 시간 왜곡 비주얼
      { const warp = G.envTimeWarp || 1;
        if (Math.abs(warp - 1) > 0.05) {
          ctx.fillStyle = warp > 1 ? 'rgba(0,206,209,0.05)' : 'rgba(139,0,139,0.05)';
          ctx.fillRect(0, 0, CONFIG.MAP_W * CONFIG.TILE, CONFIG.MAP_H * CONFIG.TILE);
        }
      }
      break;
    case 4: // 에테르 부패 파티클
      { const corruptRng = new SeededRNG(((gt * 10) | 0) + 500);
        for (let i = 0; i < 15; i++) {
          const cx = corruptRng.float(G.camera.x, G.camera.x + G.canvasW);
          const cy = corruptRng.float(G.camera.y, G.camera.y + G.canvasH);
          const cs = corruptRng.float(3, 8);
          ctx.beginPath();
          ctx.arc(cx, cy, cs, 0, Math.PI * 2);
          ctx.fillStyle = COL.corrupt + '33';
          ctx.fill();
        }
      }
      break;
  }
}

// DDA 계산 업데이트 (Cycle 30 교훈: 동적 밸런스)
function updateDDA() {
  if (G.ddaDeaths >= 3) {
    G.ddaLevel = 'EASE';
  } else if (G.score > 2000 && G.commanderHP > G.commanderMaxHP * 0.8) {
    G.ddaLevel = 'CHALLENGE';
  } else {
    G.ddaLevel = 'NORMAL';
  }
}

// 카메라 줌/팬 연출 (보스 추적)
function updateCamera(dt) {
  if (G.state === 'BOSS_FIGHT' && G.boss && G.boss.alive) {
    // 보스 추적 카메라
    const targetX = G.boss.x - G.canvasW / 2;
    const targetY = G.boss.y - G.canvasH / 2;
    G.camera.x += (targetX - G.camera.x) * 2 * dt;
    G.camera.y += (targetY - G.camera.y) * 2 * dt;
  }
  // 카메라 범위 제한
  G.camera.x = Math.max(0, Math.min(G.camera.x, CONFIG.MAP_W * CONFIG.TILE - G.camera.w));
  G.camera.y = Math.max(0, Math.min(G.camera.y, CONFIG.MAP_H * CONFIG.TILE - G.camera.h));
}

// 날씨/시간대 변화 효과 (gt 기반)
function drawWeatherEffects(ctx, w, h, zone, gt) {
  // 구역별 특수 날씨
  switch (zone) {
    case 0: // 안개
      { const fogAlpha = 0.03 + Math.sin(gt * 0.5) * 0.02;
        ctx.fillStyle = `rgba(232,232,232,${fogAlpha})`;
        ctx.fillRect(0, 0, w, h);
      }
      break;
    case 2: // 열기 shimmer (열 왜곡)
      { const shimmerY = Math.sin(gt * 3) * 2;
        ctx.save();
        ctx.globalAlpha = 0.02;
        ctx.fillStyle = COL.furnace;
        for (let y = 0; y < h; y += 8) {
          const xOff = Math.sin(gt * 2 + y * 0.05) * 3;
          ctx.fillRect(xOff, y + shimmerY, w, 1);
        }
        ctx.restore();
      }
      break;
    case 4: // 에테르 맥동
      { const pulseAlpha = 0.02 + Math.sin(gt * 2) * 0.015;
        const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.7);
        grad.addColorStop(0, `rgba(139,0,139,${pulseAlpha})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }
      break;
  }
}

// 파워업 아이템 시스템
function spawnPowerup(x, y) {
  G.powerups = G.powerups || [];
  G.powerups.push({
    x, y, type: G.rng.pick(['steam', 'heal', 'damage']),
    alive: true, timer: 0, maxLife: 15
  });
}

// 파워업 업데이트
function updatePowerups(dt) {
  if (!G.powerups) return;
  G.powerups.forEach(p => {
    if (!p.alive) return;
    p.timer += dt;
    if (p.timer > p.maxLife) { p.alive = false; return; }
    // 유닛 근접 시 자동 획득
    G.units.forEach(u => {
      if (!u.alive || !p.alive) return;
      if (Math.hypot(u.x - p.x, u.y - p.y) < CONFIG.TILE) {
        p.alive = false;
        snd.play('gear');
        switch (p.type) {
          case 'steam': G.steam = Math.min(G.steamMax, G.steam + 30); break;
          case 'heal': u.hp = Math.min(u.maxHp, u.hp + u.maxHp * 0.5); break;
          case 'damage': u.atk *= 1.3; break; // 일시적 강화
        }
        spawnEffect(p.x, p.y, 'gear_pickup', 0.8);
      }
    });
  });
  G.powerups = G.powerups.filter(p => p.alive);
}

// 파워업 렌더링 (월드 좌표)
function drawPowerups(ctx, gt) {
  if (!G.powerups) return;
  G.powerups.forEach(p => {
    if (!p.alive) return;
    const bob = Math.sin(gt * 3 + p.x) * 4;
    {
      // Canvas 폴백: 빛나는 원
      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y + bob, 12, 0, Math.PI * 2);
      const colors = { steam: COL.steamWhite, heal: COL.hpGreen, damage: COL.danger };
      ctx.fillStyle = colors[p.type] || COL.aether;
      ctx.shadowColor = colors[p.type] || COL.aether;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  });
}

// 스캔라인 포스트 이펙트 (타이틀/보스 인트로용)
function drawScanlines(ctx, w, h, intensity) {
  ctx.save();
  ctx.globalAlpha = intensity || 0.03;
  for (let y = 0; y < h; y += 3) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, w, 1);
  }
  ctx.restore();
}

// CRT 비네팅 효과
function drawVignette(ctx, w, h, intensity) {
  const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.8);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, `rgba(0,0,0,${intensity || 0.3})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// === 초기화 & 시작 ===
async function init() {
  // 1. CONFIG 이미 선언 완료
  // 2. G 전역 상태 선언 완료
  // 3. Canvas DOM 할당
  setupCanvas();
  // 4. (에셋 프리로드 삭제 — F1 준수, Canvas 폴백 사용)
  // 5. 저장 데이터 로드
  loadProgress();
  G.workshopBonuses = getWorkshopBonus();
  // 6. 이벤트 리스너 등록
  setupEvents();
  setupVirtualButtons();
  // 7. 초기 상태
  G.state = 'TITLE';
  onStateEnter('TITLE');
  // 8. 게임 루프 시작
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// 로딩 화면 표시 후 시작
(function boot() {
  const c = document.getElementById('gameCanvas');
  const tempCtx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  tempCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = window.innerWidth, h = window.innerHeight;
  // 로딩 배경
  tempCtx.fillStyle = COL.bgDark;
  tempCtx.fillRect(0, 0, w, h);
  // 로딩 톱니바퀴 (회전 없이 정적)
  tempCtx.save();
  tempCtx.translate(w / 2, h / 2 - 30);
  tempCtx.beginPath();
  const teeth = 10, r = 30;
  const step = (Math.PI * 2) / teeth;
  for (let i = 0; i < teeth; i++) {
    const a1 = step * i - step * 0.2;
    const a2 = step * i + step * 0.2;
    tempCtx.lineTo(Math.cos(a1) * r * 1.15, Math.sin(a1) * r * 1.15);
    tempCtx.lineTo(Math.cos(a2) * r * 1.15, Math.sin(a2) * r * 1.15);
    const a3 = step * i + step * 0.35;
    const a4 = step * (i + 1) - step * 0.35;
    tempCtx.lineTo(Math.cos(a3) * r * 0.85, Math.sin(a3) * r * 0.85);
    tempCtx.lineTo(Math.cos(a4) * r * 0.85, Math.sin(a4) * r * 0.85);
  }
  tempCtx.closePath();
  tempCtx.fillStyle = COL.copper;
  tempCtx.fill();
  tempCtx.beginPath();
  tempCtx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
  tempCtx.fillStyle = COL.darkIron;
  tempCtx.fill();
  tempCtx.restore();
  // 로딩 텍스트
  tempCtx.fillStyle = COL.steamWhite;
  tempCtx.font = '18px "Segoe UI", system-ui, -apple-system, sans-serif';
  tempCtx.textAlign = 'center';
  tempCtx.fillText('Loading...', w / 2, h / 2 + 30);
  tempCtx.fillStyle = COL.brass;
  tempCtx.font = '12px "Segoe UI", system-ui, -apple-system, sans-serif';
  tempCtx.fillText('Ironclad Vanguard', w / 2, h / 2 + 55);
  // 에셋 로드 후 게임 시작
  init();
})();
</script>
