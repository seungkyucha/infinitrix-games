/*
 * ═══════════════════════════════════════════════════════════════════
 *  네온 대시 러너 (Neon Dash Runner) — Cycle 4
 *  장르: arcade + casual | 무한 러너
 *  100% Canvas + Vanilla JS | 외부 의존 0개
 *
 *  상태 × 시스템 업데이트 매트릭스:
 *  ─────────────────────────────────────────────────────────────────
 *  State          | Tw | Scrl | Chunk| Plyr | Obst | Coin | PwUp | Part | Input  | Render      | SFX
 *  LOADING        | ✗  | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✗      | loading     | ✗
 *  TITLE          | ✓  | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | start  | title       | ✗
 *  PLAYING        | ✓  | ✓    | ✓    | ✓    | ✓    | ✓    | ✓    | ✓    | move+j | game        | ✓
 *  PAUSE          | ✓  | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | resume | game+pause  | ✗
 *  CONFIRM_MODAL  | ✓  | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | yn     | game+modal  | ✗
 *  GAMEOVER       | ✓  | ✗    | ✗    | ✗    | ✗    | ✗    | ✗    | ✓    | restart| game+result | ✗
 * ═══════════════════════════════════════════════════════════════════
 */

// ─── 상수 & 설정 ──────────────────────────────────────────────
const STATES = { LOADING:0, TITLE:1, PLAYING:2, PAUSE:3, CONFIRM_MODAL:4, GAMEOVER:5 };
const STATE_PRIORITY = { 0:0, 1:10, 2:20, 3:30, 4:35, 5:99 };

// 색상 팔레트
const C = {
  bgTop:'#0D0D1A', bgBot:'#1A0A2E', road:'#1C1C2E', laneLine:'rgba(45,45,78,0.4)',
  player:'#00E5FF', playerGlow:'rgba(0,229,255,0.3)',
  coinNormal:'#FFD740', coinSuper:'#FF4081',
  barrier:'#FF1744', spike:'#FF9100', laser:'#D500F9', drone:'#00E5FF',
  puMagnet:'#2979FF', puShield:'#00E676', puDouble:'#FFAB00',
  hudText:'#E0E0E0', hudCyan:'#00E5FF', hudRed:'#FF1744', hudGold:'#FFD740',
  roadStripe:'rgba(255,215,64,0.5)', neonStrip:'#D500F9',
  buildSil1:'#14142B', buildSil2:'#1A1A3E',
  buildWin:['#FF1744','#D500F9','#00E5FF']
};

// 게임 파라미터
const BASE_SPEED = 200, MAX_SPEED = 600, ACCEL = 0.04;
const JUMP_HEIGHT = 60, JUMP_DURATION = 500;
const CHUNK_WIDTH = 400;
const HUD_HEIGHT = 40;
const PLAYER_SIZE = 32, PLAYER_X_RATIO = 0.15;
const HITBOX_SHRINK = 0.7, COIN_HITBOX_GROW = 1.3;
const NEAR_MISS_DIST = 40;
const LANE_SWITCH_MS = 150;
const SWIPE_THRESHOLD = 30;

// 장애물 사이즈
const OBS = {
  barrier: { w:40, h:50 }, spike: { w:30, h:20 },
  laser: { w:400, h:8 }, drone: { w:28, h:28 }
};

// 폰트 스택 (시스템 폰트만 — 기획서 §4.4)
const FONT = "'Segoe UI',system-ui,-apple-system,sans-serif";

// ─── 캔버스 & DPR ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr, gameW, gameH, gameTop;

// DPR 대응 리사이즈 (Cycle 1 성공 패턴)
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gameW = W;
  gameH = H - HUD_HEIGHT;
  gameTop = HUD_HEIGHT;
  laneYs = [gameTop + gameH * 0.25, gameTop + gameH * 0.50, gameTop + gameH * 0.75];
  playerX = W * PLAYER_X_RATIO;
  rebuildBgCache();
}

let laneYs = [], playerX = 80;

// ─── 에셋 없음 (100% Canvas 드로잉 — 기획서 §4.5) ─────────────
// SVG/외부 이미지 완전 미사용. 모든 시각 요소를 순수 Canvas로 렌더링.

// ─── TweenManager (Cycle 2~3 인프라, 이징 5종) ───────────────
const EASING = {
  linear: t => t,
  easeOutQuad: t => t * (2 - t),
  easeInQuad: t => t * t,
  easeOutBack: t => { t--; return 1 + t * t * (2.70158 * t + 1.70158); },
  easeOutElastic: t => t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1
};

class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }
  // 트윈 추가
  add(target, props, dur, easing, onComplete) {
    const starts = {};
    for (const k in props) starts[k] = target[k] !== undefined ? target[k] : 0;
    this._tweens.push({ target, props, starts, dur, easing: EASING[easing]||EASING.linear, elapsed:0, onComplete: onComplete||null });
  }
  // 매 프레임 업데이트 (모든 상태에서 호출!)
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      if (this._pendingCancel) break;
      const tw = this._tweens[i];
      tw.elapsed += dt * 1000;
      const t = Math.min(1, tw.elapsed / tw.dur);
      const e = tw.easing(t);
      for (const k in tw.props) tw.target[k] = tw.starts[k] + (tw.props[k] - tw.starts[k]) * e;
      if (t >= 1) {
        const cb = tw.onComplete;
        this._tweens.splice(i, 1);
        if (cb) cb();
      }
    }
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; }
  }
  // 안전한 전체 취소 (deferred — Cycle 2 교훈)
  cancelAll() { this._pendingCancel = true; }
  // 특정 대상 트윈 제거
  cancelFor(target) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      if (this._tweens[i].target === target) this._tweens.splice(i, 1);
    }
  }
}
const tw = new TweenManager();

// ─── ObjectPool (Cycle 2~3 인프라) ────────────────────────────
class ObjectPool {
  constructor(factory, size) {
    this._pool = []; this._factory = factory;
    for (let i = 0; i < size; i++) this._pool.push(factory());
  }
  // 객체 획득
  acquire() { return this._pool.length > 0 ? this._pool.pop() : this._factory(); }
  // 객체 반환
  release(obj) { this._pool.push(obj); }
  // 전체 해제
  clear() { this._pool.length = 0; }
}

// ─── 게임 상태 ────────────────────────────────────────────────
let state = STATES.LOADING;
let transitioning = false;
let rafId = null;
let lastTime = 0;

// 플레이어
let player = { lane:1, y:0, targetY:0, vy:0, jumping:false, jumpT:0,
               shieldActive:false, magnetActive:false, doubleActive:false,
               magnetTimer:0, doubleTimer:0, invincible:false, invTimer:0 };
let lives = 3, score = 0, distance = 0, coinCount = 0;
let coinCombo = 0; // 연속 코인 카운터 (5개마다 +20 보너스 — §7.1)
let speed = BASE_SPEED;
let gameSpeedMul = 1; // 슬로모 효과용

// 입력 모드 (§5.3 — 4곳에서 사용, 유령 코드 방지)
let inputMode = 'keyboard'; // 'keyboard' | 'mouse' | 'touch'

// 활성 엔티티
let obstacles = [], coins = [], powerups = [], particles = [], popups = [];

// 청크 생성
let nextChunkX = 0;
let timeSinceLastPowerup = 0;
let lastLaserChunk = -999;

// 동적 밸런스
let consecutiveSafeDist = 0; // 무피격 거리 추적 (갱신: updateGame, 리셋: handleCollision)
let dangerModeChunks = 0;    // 위기 상태 남은 쉬운 청크 수 (갱신: handleCollision, 사용: generateChunk)

// Near Miss
let nearMissCount = 0;       // 연속 Near Miss (갱신: checkNearMiss, 리셋: handleCollision)
let passedObstacles = [];    // Near Miss 판정용

// HUD 애니메이션
let hudDistPulse = 0, hudScoreBright = 0, hudLifeShake = 0;
let hudDistLastHundred = 0;

// 게임오버 연출
let goOverlay = { alpha: 0 };
let goResultAlpha = { dist:0, score:0, coin:0, best:0 };
let isNewBest = false, isNewDist = false, prevBest = 0, prevBestDist = 0;

// 타이틀 연출
let titleGlow = { alpha: 0.7 };
let titleBgScroll = 0;

// 일시정지/모달
let modalAlpha = { alpha: 0 };
let modalSelection = 0; // 0=예, 1=아니오

// 스캔라인 오프셋
let scanlineOffset = 0;

// 오프스크린 배경 캐시
let bgFarCanvas, bgFarCtx, bgMidCanvas, bgMidCtx;
let bgFarScroll = 0, bgMidScroll = 0, bgRoadScroll = 0;
let buildings = [];

// ─── TransitionGuard (Cycle 3 B1/B2 해결 — §10.1) ────────────
function beginTransition(targetState, tweenConfig) {
  if (transitioning) return false;
  if (STATE_PRIORITY[state] >= STATE_PRIORITY[targetState]) return false;
  transitioning = true;
  if (tweenConfig) {
    tw.add(tweenConfig.target, tweenConfig.props, tweenConfig.dur,
      tweenConfig.easing, () => {
        state = targetState;
        transitioning = false;
        if (tweenConfig.onComplete) tweenConfig.onComplete();
      });
  } else {
    state = targetState;
    transitioning = false;
  }
  return true;
}

// 즉시 상태 변경 (우선순위 무시 — 리셋용)
function forceState(s) { state = s; transitioning = false; }

// ─── Object Pools ─────────────────────────────────────────────
const poolObs = new ObjectPool(() => ({ type:'barrier', x:0, y:0, w:40, h:50, lane:0, active:false, passed:false, collected:false, patrolDir:1, patrolY:0 }), 20);
const poolCoin = new ObjectPool(() => ({ type:'normal', x:0, y:0, value:10, active:false, collected:false, rot:0 }), 30);
const poolPU = new ObjectPool(() => ({ type:'magnet', x:0, y:0, active:false, collected:false, pulseT:0 }), 5);
const poolParticle = new ObjectPool(() => ({ x:0, y:0, vx:0, vy:0, life:0, maxLife:1, color:'#fff', size:3, alpha:1 }), 60);

// ─── 이벤트 리스너 관리 (Cycle 3 destroy 패턴) ─────────────────
const registeredListeners = [];
function listen(el, evt, fn, opts) {
  el.addEventListener(evt, fn, opts);
  registeredListeners.push([el, evt, fn, opts]);
}

// ─── Web Audio API (Cycle 3 성공 패턴 확장) ───────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) {}
  }
}

// 범용 사운드 헬퍼
function playTone(freq, freqEnd, dur, type, vol) {
  if (!audioCtx || state !== STATES.PLAYING) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freqEnd !== freq) o.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + dur/1000);
    g.gain.setValueAtTime(vol || 0.25, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur/1000);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur/1000);
  } catch(e) {}
}
function sfxJump()    { playTone(300, 600, 150, 'sine', 0.2); }
function sfxCoin()    { playTone(1200, 800, 80, 'triangle', 0.15); }
function sfxHit()     { playTone(150, 80, 200, 'sawtooth', 0.3); }
function sfxPowerup() {
  playTone(440, 440, 100, 'sine', 0.15);
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
    o2.type='sine'; o2.frequency.value=660;
    g2.gain.setValueAtTime(0.15, t+0.1); g2.gain.linearRampToValueAtTime(0, t+0.2);
    o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t+0.1); o2.stop(t+0.2);
    const o3 = audioCtx.createOscillator(); const g3 = audioCtx.createGain();
    o3.type='sine'; o3.frequency.value=880;
    g3.gain.setValueAtTime(0.15, t+0.2); g3.gain.linearRampToValueAtTime(0, t+0.3);
    o3.connect(g3); g3.connect(audioCtx.destination); o3.start(t+0.2); o3.stop(t+0.3);
  } catch(e) {}
}
function sfxGameover() { playTone(400, 100, 600, 'sawtooth', 0.3); }

// ─── localStorage 헬퍼 (try-catch 래핑 — iframe 안전) ──────────
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, v); } catch(e) {} }
function getBest() { return parseInt(lsGet('ndr_bestScore')) || 0; }
function getBestDist() { return parseInt(lsGet('ndr_bestDist')) || 0; }
function saveBest(v) { lsSet('ndr_bestScore', v); }
function saveBestDist(v) { lsSet('ndr_bestDist', v); }
function addRun() { lsSet('ndr_totalRuns', (parseInt(lsGet('ndr_totalRuns'))||0)+1); }
function addCoins(n) { lsSet('ndr_totalCoins', (parseInt(lsGet('ndr_totalCoins'))||0)+n); }

// ─── 배경 캐시 생성 ──────────────────────────────────────────
function rebuildBgCache() {
  const bw = Math.max(W * 2, 1600);
  // 원경 (하늘 + 별 + 달)
  bgFarCanvas = document.createElement('canvas');
  bgFarCanvas.width = bw; bgFarCanvas.height = H;
  bgFarCtx = bgFarCanvas.getContext('2d');
  drawFarBg(bgFarCtx, bw, H);

  // 중경 (건물 실루엣)
  bgMidCanvas = document.createElement('canvas');
  bgMidCanvas.width = bw; bgMidCanvas.height = H;
  bgMidCtx = bgMidCanvas.getContext('2d');
  generateBuildings(bw);
  drawMidBg(bgMidCtx, bw, H);
}

// 원경 그리기 — 밤하늘 + 별 + 달
function drawFarBg(c, w, h) {
  const g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, C.bgTop); g.addColorStop(1, C.bgBot);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  // 별
  for (let i = 0; i < 120; i++) {
    const sx = Math.random()*w, sy = Math.random()*h*0.5;
    const ss = Math.random()*1.5+0.5;
    c.fillStyle = `rgba(255,255,255,${Math.random()*0.6+0.2})`;
    c.beginPath(); c.arc(sx, sy, ss, 0, Math.PI*2); c.fill();
  }
  // 달
  c.fillStyle = 'rgba(255,255,220,0.15)';
  c.beginPath(); c.arc(w*0.75, h*0.12, 30, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgba(255,255,220,0.4)';
  c.beginPath(); c.arc(w*0.75, h*0.12, 15, 0, Math.PI*2); c.fill();
}

// 건물 절차적 생성
function generateBuildings(bw) {
  buildings = [];
  let bx = 0;
  while (bx < bw) {
    const bw2 = 30 + Math.random()*50;
    const bh = 50 + Math.random()*120;
    const wins = [];
    // 네온 창문
    for (let wy = 5; wy < bh - 10; wy += 10) {
      for (let wx = 5; wx < bw2 - 5; wx += 8) {
        if (Math.random() > 0.5) wins.push({ x: wx, y: wy, c: C.buildWin[Math.floor(Math.random()*3)] });
      }
    }
    const hasAntenna = Math.random() > 0.6;
    buildings.push({ x: bx, w: bw2, h: bh, wins, hasAntenna });
    bx += bw2 + 2 + Math.random()*10;
  }
}

// 중경 그리기 — 건물 실루엣
function drawMidBg(c, w, h) {
  c.clearRect(0,0,w,h);
  const groundY = gameTop + gameH * 0.55;
  buildings.forEach(b => {
    const g = c.createLinearGradient(b.x, groundY - b.h, b.x, groundY);
    g.addColorStop(0, C.buildSil1); g.addColorStop(1, C.buildSil2);
    c.fillStyle = g;
    c.fillRect(b.x, groundY - b.h, b.w, b.h);
    // 안테나
    if (b.hasAntenna) {
      c.strokeStyle = '#2a2a4e'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(b.x+b.w/2, groundY-b.h); c.lineTo(b.x+b.w/2, groundY-b.h-15); c.stroke();
      c.fillStyle = '#FF1744'; c.beginPath(); c.arc(b.x+b.w/2, groundY-b.h-15, 2, 0, Math.PI*2); c.fill();
    }
    // 창문
    b.wins.forEach(win => {
      c.fillStyle = win.c;
      c.globalAlpha = 0.6;
      c.fillRect(b.x + win.x, groundY - b.h + win.y, 3, 3);
      c.globalAlpha = 1;
    });
  });
}

// ─── 렌더링 헬퍼 ─────────────────────────────────────────────
// 네온 글로우 원 (성능 고려하여 간단 구현)
function drawGlow(x, y, r, color, alpha) {
  ctx.globalAlpha = alpha || 0.3;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

// 플레이어 그리기 (시안 삼각형 + 글로우 + 속도선)
function drawPlayer(px, py) {
  const s = PLAYER_SIZE / 2;
  // 쉴드 효과
  if (player.shieldActive) {
    drawGlow(px, py, s + 12, C.puShield, 0.15 + Math.sin(Date.now()*0.005)*0.1);
    ctx.strokeStyle = C.puShield; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.arc(px, py, s + 8, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // 글로우
  drawGlow(px, py, s + 8, C.player, 0.2);
  // 시안 삼각형 (순수 Canvas — §4.3)
  ctx.fillStyle = C.player;
  ctx.beginPath();
  ctx.moveTo(px + s, py);
  ctx.lineTo(px - s, py - s);
  ctx.lineTo(px - s + 4, py);
  ctx.lineTo(px - s, py + s);
  ctx.closePath(); ctx.fill();
  // 내부 밝은 삼각형
  ctx.fillStyle = '#80f0ff';
  ctx.beginPath();
  ctx.moveTo(px + s*0.5, py);
  ctx.lineTo(px - s*0.3, py - s*0.4);
  ctx.lineTo(px - s*0.3, py + s*0.4);
  ctx.closePath(); ctx.fill();
  // 속도선
  ctx.strokeStyle = 'rgba(0,229,255,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(px - s - 5, py - 4); ctx.lineTo(px - s - 15 - speed*0.02, py - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px - s - 5, py + 4); ctx.lineTo(px - s - 12 - speed*0.015, py + 4); ctx.stroke();
  // 무적 깜빡임
  if (player.invincible && Math.floor(Date.now()/80) % 2 === 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - s, py - s, PLAYER_SIZE, PLAYER_SIZE);
    ctx.globalAlpha = 1;
  }
}

// 장애물 그리기
function drawObstacle(ob) {
  const cx = ob.x + ob.w/2, cy = ob.y + ob.h/2;
  switch(ob.type) {
    case 'barrier':
      // 네온 직사각형 벽 (순수 Canvas — §4.3)
      drawGlow(cx, cy, 30, C.barrier, 0.15);
      ctx.fillStyle = C.barrier; ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 1.5; ctx.strokeRect(ob.x+2, ob.y+2, ob.w-4, ob.h-4);
      ctx.fillStyle = '#ff6666';
      ctx.fillRect(ob.x, ob.y, ob.w, 3);
      ctx.fillRect(ob.x, ob.y+ob.h-3, ob.w, 3);
      break;
    case 'spike':
      drawGlow(cx, ob.y + ob.h, 18, C.spike, 0.15);
      ctx.fillStyle = C.spike;
      ctx.beginPath();
      ctx.moveTo(ob.x + ob.w/2, ob.y);
      ctx.lineTo(ob.x + ob.w, ob.y + ob.h);
      ctx.lineTo(ob.x, ob.y + ob.h);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#ffb74d'; ctx.lineWidth = 1; ctx.stroke();
      break;
    case 'laser':
      // 레이저 빔 (2레인 점유)
      ctx.fillStyle = C.laser; ctx.globalAlpha = 0.3;
      ctx.fillRect(ob.x, ob.y - 4, ob.w, ob.h + 8);
      ctx.globalAlpha = 0.7;
      ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#e040fb';
      ctx.fillRect(ob.x, ob.y + ob.h/2 - 1, ob.w, 2);
      // 이미터
      ctx.fillStyle = C.laser;
      ctx.beginPath(); ctx.arc(ob.x, ob.y + ob.h/2, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ob.x + ob.w, ob.y + ob.h/2, 6, 0, Math.PI*2); ctx.fill();
      break;
    case 'drone':
      drawGlow(cx, cy, 20, C.drone, 0.15);
      // 역삼각형
      ctx.fillStyle = C.drone;
      ctx.beginPath();
      ctx.moveTo(cx, cy + ob.h/2);
      ctx.lineTo(cx - ob.w/2, cy - ob.h/2);
      ctx.lineTo(cx + ob.w/2, cy - ob.h/2);
      ctx.closePath(); ctx.fill();
      // 프로펠러 (회전)
      const pa = Date.now() * 0.01;
      ctx.strokeStyle = 'rgba(0,229,255,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cx - 10*Math.cos(pa), cy - ob.h/2 - 3); ctx.lineTo(cx + 10*Math.cos(pa), cy - ob.h/2 - 3); ctx.stroke();
      // 빨간 눈
      ctx.fillStyle = C.barrier;
      ctx.beginPath(); ctx.arc(cx, cy - 2, 2, 0, Math.PI*2); ctx.fill();
      break;
  }
}

// 코인 그리기
function drawCoin(c) {
  const cx = c.x, cy = c.y;
  if (c.type === 'super') {
    // 핑크 별
    drawGlow(cx, cy, 18, C.coinSuper, 0.2);
    drawStar(cx, cy, 5, 12, 6, C.coinSuper);
    // 깜빡임
    if (Math.sin(Date.now()*0.008) > 0) {
      ctx.globalAlpha = 0.4;
      drawStar(cx, cy, 5, 14, 7, '#fff');
      ctx.globalAlpha = 1;
    }
  } else {
    // 골드 원 (순수 Canvas — §4.3)
    drawGlow(cx, cy, 12, C.coinNormal, 0.2);
    ctx.fillStyle = C.coinNormal;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe082';
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
  }
}

// 별 그리기 헬퍼
function drawStar(cx, cy, points, outer, inner, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = (i * Math.PI / points) - Math.PI/2;
    if (i === 0) ctx.moveTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
    else ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

// 파워업 캡슐 그리기
function drawPowerup(pu) {
  const cx = pu.x, cy = pu.y;
  const colors = { magnet: C.puMagnet, shield: C.puShield, double: C.puDouble };
  const col = colors[pu.type] || C.puMagnet;
  const pulse = Math.sin(pu.pulseT * 4) * 0.2 + 0.8;

  // 네온 캡슐 (순수 Canvas — §4.3)
  drawGlow(cx, cy, 22, col, 0.15 * pulse);
  ctx.fillStyle = col; ctx.globalAlpha = pulse;
  roundRect(cx - 16, cy - 16, 32, 32, 6);
  ctx.globalAlpha = 1;
  // 아이콘
  ctx.fillStyle = '#fff'; ctx.font = `bold 11px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (pu.type === 'magnet') ctx.fillText('M', cx, cy);
  else if (pu.type === 'shield') ctx.fillText('S', cx, cy);
  else ctx.fillText('x2', cx, cy);
}

// 둥근 사각형 헬퍼
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath(); ctx.fill();
}

// ─── 파티클 시스템 ────────────────────────────────────────────
function spawnParticles(x, y, count, color, spdMin, spdMax, lifeMs) {
  for (let i = 0; i < count; i++) {
    const p = poolParticle.acquire();
    const ang = Math.random() * Math.PI * 2;
    const spd = spdMin + Math.random() * (spdMax - spdMin);
    p.x = x; p.y = y; p.vx = Math.cos(ang)*spd; p.vy = Math.sin(ang)*spd;
    p.life = lifeMs/1000; p.maxLife = lifeMs/1000; p.color = color;
    p.size = 2 + Math.random()*3; p.alpha = 1;
    particles.push(p);
  }
}

function spawnPopup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 0.5, maxLife: 0.5, alpha: 1, offsetY: 0 });
}

// ─── 충돌 판정 (AABB, 관대한 히트박스) ────────────────────────
function collideRect(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function playerHitbox() {
  const s = PLAYER_SIZE * HITBOX_SHRINK;
  const off = (PLAYER_SIZE - s) / 2;
  return { x: playerX - PLAYER_SIZE/2 + off, y: player.y - PLAYER_SIZE/2 + off, w: s, h: s };
}

function obsHitbox(ob) {
  const sw = ob.w * HITBOX_SHRINK, sh = ob.h * HITBOX_SHRINK;
  return { x: ob.x + (ob.w-sw)/2, y: ob.y + (ob.h-sh)/2, w: sw, h: sh };
}

function coinHitbox(c) {
  const s = (c.type === 'super' ? 24 : 16) * COIN_HITBOX_GROW;
  return { x: c.x - s/2, y: c.y - s/2, w: s, h: s };
}

// ─── 게임 초기화 ──────────────────────────────────────────────
function resetGame() {
  player.lane = 1; player.y = laneYs[1]; player.targetY = laneYs[1];
  player.vy = 0; player.jumping = false; player.jumpT = 0;
  player.shieldActive = false; player.magnetActive = false; player.doubleActive = false;
  player.magnetTimer = 0; player.doubleTimer = 0;
  player.invincible = false; player.invTimer = 0;
  lives = 3; score = 0; distance = 0; coinCount = 0; coinCombo = 0;
  speed = BASE_SPEED; gameSpeedMul = 1;
  nextChunkX = W + 100;
  timeSinceLastPowerup = 0;
  lastLaserChunk = -999;
  consecutiveSafeDist = 0; dangerModeChunks = 0;
  nearMissCount = 0;
  passedObstacles = [];
  hudDistPulse = 0; hudScoreBright = 0; hudLifeShake = 0;
  hudDistLastHundred = 0;
  bgFarScroll = 0; bgMidScroll = 0; bgRoadScroll = 0;
  goOverlay.alpha = 0;
  goResultAlpha.dist = 0; goResultAlpha.score = 0; goResultAlpha.coin = 0; goResultAlpha.best = 0;
  isNewBest = false; isNewDist = false;
  // 엔티티 풀 회수
  obstacles.forEach(o => poolObs.release(o)); obstacles = [];
  coins.forEach(c => poolCoin.release(c)); coins = [];
  powerups.forEach(p => poolPU.release(p)); powerups = [];
  particles.forEach(p => poolParticle.release(p)); particles = [];
  popups = [];
  tw.cancelAll();
}

// ─── 레인 전환 ────────────────────────────────────────────────
function switchLane(dir) {
  const newLane = player.lane + dir;
  if (newLane < 0 || newLane > 2) return;
  player.lane = newLane;
  player.targetY = laneYs[newLane];
  // 레인 전환 tween — inputMode에 따른 속도 (사용처 1)
  tw.cancelFor(player);
  tw.add(player, { y: player.targetY }, inputMode === 'touch' ? 180 : LANE_SWITCH_MS, 'easeOutQuad');
}

// 점프
function doJump() {
  if (player.jumping) return;
  player.jumping = true;
  player.jumpT = 0;
  sfxJump();
}

// ─── 입력 처리 ────────────────────────────────────────────────
let keysDown = {};
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

function handleKeyDown(e) {
  if (keysDown[e.code]) return;
  keysDown[e.code] = true;
  inputMode = 'keyboard'; // 입력 모드 갱신
  initAudio();

  switch(state) {
    case STATES.TITLE:
      if (e.code === 'Space' || e.code === 'Enter') startGame();
      break;
    case STATES.PLAYING:
      if (e.code === 'ArrowUp' || e.code === 'KeyW') switchLane(-1);
      else if (e.code === 'ArrowDown' || e.code === 'KeyS') switchLane(1);
      else if (e.code === 'Space') doJump();
      else if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
      break;
    case STATES.PAUSE:
      if (e.code === 'KeyP' || e.code === 'Escape') resumeGame();
      else if (e.code === 'KeyR') showConfirmModal();
      break;
    case STATES.CONFIRM_MODAL:
      if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') modalSelection = modalSelection === 0 ? 1 : 0;
      else if (e.code === 'Enter' || e.code === 'Space') {
        if (modalSelection === 0) confirmRestart();
        else cancelModal();
      }
      else if (e.code === 'Escape') cancelModal();
      break;
    case STATES.GAMEOVER:
      if (e.code === 'KeyR' || e.code === 'Space' || e.code === 'Enter') goToTitle();
      break;
  }
}

function handleKeyUp(e) { keysDown[e.code] = false; }

// 마우스 클릭 (사용처 2/3/4 — inputMode 분기)
function handleClick(e) {
  inputMode = 'mouse';
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  switch(state) {
    case STATES.TITLE:
      startGame(); break;
    case STATES.PLAYING:
      // 일시정지 버튼 (inputMode === mouse/touch — 사용처 4)
      if (mx > W - 40 && my < 40) { togglePause(); return; }
      // 화면 3분할
      if (my < H / 3) switchLane(-1);
      else if (my > H * 2/3) switchLane(1);
      else doJump();
      break;
    case STATES.PAUSE:
      resumeGame(); break;
    case STATES.CONFIRM_MODAL:
      handleModalClick(mx, my); break;
    case STATES.GAMEOVER:
      if (goOverlay.alpha > 0.5) goToTitle(); break;
  }
}

// 터치 입력 (스와이프 감도 적용 — inputMode 사용처 1)
function handleTouchStart(e) {
  e.preventDefault();
  inputMode = 'touch';
  initAudio();
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
  touchStartTime = Date.now();
}

function handleTouchEnd(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  const rect = canvas.getBoundingClientRect();
  const mx = t.clientX - rect.left, my = t.clientY - rect.top;

  switch(state) {
    case STATES.TITLE:
      startGame(); break;
    case STATES.PLAYING:
      // 일시정지 버튼 (사용처 4)
      if (mx > W - 50 && my < 50) { togglePause(); return; }
      // 스와이프 감지 (SWIPE_THRESHOLD — 사용처 1)
      if (Math.abs(dy) > SWIPE_THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
        if (dy < 0) switchLane(-1); else switchLane(1);
      } else {
        doJump(); // 탭 = 점프
      }
      break;
    case STATES.PAUSE:
      resumeGame(); break;
    case STATES.CONFIRM_MODAL:
      handleModalClick(mx, my); break;
    case STATES.GAMEOVER:
      if (goOverlay.alpha > 0.5) goToTitle(); break;
  }
}

// ─── 상태 전환 함수들 ─────────────────────────────────────────
function startGame() {
  resetGame();
  // cancelAll의 deferred 처리를 즉시 해제 (B1 수정 — resetGame이 이미 엔티티를 비움)
  tw._pendingCancel = false;
  tw._tweens.length = 0;
  tw.add(titleGlow, { alpha: 0 }, 300, 'easeOutQuad', () => {
    forceState(STATES.PLAYING);
    titleGlow.alpha = 0.7;
  });
  transitioning = true;
}

function togglePause() {
  if (state === STATES.PLAYING && !transitioning) {
    state = STATES.PAUSE;
  }
}

function resumeGame() {
  if (state === STATES.PAUSE) {
    state = STATES.PLAYING;
    lastTime = performance.now(); // 프레임 점프 방지
  }
}

function showConfirmModal() {
  modalAlpha.alpha = 0;
  modalSelection = 0;
  state = STATES.CONFIRM_MODAL;
  tw.add(modalAlpha, { alpha: 1 }, 200, 'easeOutQuad');
}

function confirmRestart() {
  tw.add(modalAlpha, { alpha: 0 }, 200, 'easeOutQuad', () => { goToTitle(); });
}

function cancelModal() {
  tw.add(modalAlpha, { alpha: 0 }, 200, 'easeOutQuad', () => {
    forceState(STATES.PAUSE);
  });
}

function handleModalClick(mx, my) {
  const bw = inputMode === 'touch' ? 120 : 80; // 사용처 2 — 터치 시 버튼 1.5배
  const bh = inputMode === 'touch' ? 54 : 36;
  const gap = 20;
  const by = H/2 + 30;
  const yesX = W/2 - bw - gap/2, noX = W/2 + gap/2;
  if (my > by && my < by + bh) {
    if (mx > yesX && mx < yesX + bw) confirmRestart();
    else if (mx > noX && mx < noX + bw) cancelModal();
  }
}

function triggerGameover() {
  if (transitioning || state === STATES.GAMEOVER) return;
  sfxGameover();
  // 판정 먼저, 저장 나중에 (Cycle 2 B4 교훈)
  prevBest = getBest(); prevBestDist = getBestDist();
  isNewBest = score > prevBest;
  isNewDist = Math.floor(distance) > prevBestDist;
  saveBest(Math.max(score, prevBest));
  saveBestDist(Math.max(Math.floor(distance), prevBestDist));
  addRun(); addCoins(coinCount);

  goOverlay.alpha = 0;
  goResultAlpha.dist = 0; goResultAlpha.score = 0; goResultAlpha.coin = 0; goResultAlpha.best = 0;

  beginTransition(STATES.GAMEOVER, {
    target: goOverlay, props: { alpha: 0.75 }, dur: 500, easing: 'easeOutQuad',
    onComplete: () => {
      // 순차 fadeIn 연출
      tw.add(goResultAlpha, { dist: 1 }, 300, 'easeOutQuad');
      tw.add(goResultAlpha, { score: 1 }, 300, 'easeOutQuad');
      tw.add(goResultAlpha, { coin: 1 }, 300, 'easeOutQuad');
      if (isNewBest || isNewDist) {
        tw.add(goResultAlpha, { best: 1 }, 500, 'easeOutElastic');
      }
    }
  });
}

// 타이틀 글로우 tween 반복 (B3 수정 — 외부 스코프로 이동, goToTitle에서 재호출)
function pulseTitle() {
  if (state !== STATES.TITLE) return;
  tw.add(titleGlow, { alpha: 1 }, 800, 'easeOutQuad', () => {
    tw.add(titleGlow, { alpha: 0.7 }, 800, 'easeInQuad', pulseTitle);
  });
}

function goToTitle() {
  resetGame();
  // cancelAll의 deferred 처리를 즉시 해제 (resetGame 후 안전)
  tw._pendingCancel = false;
  tw._tweens.length = 0;
  forceState(STATES.TITLE);
  titleGlow.alpha = 0.7;
  pulseTitle(); // B3 수정 — 글로우 tween 재시작
}

// ─── 충돌 처리 ────────────────────────────────────────────────
function handleCollision(ob) {
  if (player.invincible) return;
  if (player.shieldActive) {
    // 쉴드 소멸 (충돌 1회 흡수)
    player.shieldActive = false;
    // 쉴드 파괴 이펙트
    spawnParticles(playerX, player.y, 6, C.puShield, 60, 120, 400);
    // 충격파 효과 — 파티클로 표현
    for (let i = 0; i < 8; i++) {
      const ang = i * Math.PI / 4;
      const p = poolParticle.acquire();
      p.x = playerX; p.y = player.y; p.vx = Math.cos(ang)*100; p.vy = Math.sin(ang)*100;
      p.life = 0.3; p.maxLife = 0.3; p.color = C.puShield; p.size = 5; p.alpha = 0.7;
      particles.push(p);
    }
    sfxHit();
    return;
  }

  lives--;
  hudLifeShake = 0.3;
  consecutiveSafeDist = 0; // 무피격 거리 리셋
  nearMissCount = 0;
  coinCombo = 0; // 충돌 시 코인 콤보 리셋

  // 충돌 이펙트 — 빨강 파티클 방사 (순수 Canvas — §4.3)
  spawnParticles(playerX, player.y, 8, C.barrier, 50, 120, 400);
  sfxHit();

  // 무적 부여 (1.5초)
  player.invincible = true;
  player.invTimer = 1.5;

  // 위기 상태 (라이프 1) — 동적 밸런스 (사용처: dangerModeChunks)
  if (lives === 1) dangerModeChunks = 3;

  // 화면 흔들림
  hudLifeShake = 0.3;

  if (lives <= 0) triggerGameover();
}

// Near Miss 체크
function checkNearMiss(ob) {
  if (ob.passed) return;
  const ph = playerHitbox();
  // 장애물이 플레이어를 지나침
  if (ob.x + ob.w < ph.x) {
    ob.passed = true;
    // Y 거리 검사
    const obCy = ob.y + ob.h/2;
    const pCy = player.y;
    if (Math.abs(obCy - pCy) < NEAR_MISS_DIST) {
      // Near Miss!
      const pts = 30 * (player.doubleActive ? 2 : 1);
      score += pts;
      nearMissCount++; // 갱신
      spawnPopup(playerX + 20, player.y - 30, 'NEAR MISS! +' + pts, C.hudGold);
      // 슬로모 효과 (tween으로 복원)
      gameSpeedMul = 0.8;
      const slowObj = { v: 0.8 };
      tw.add(slowObj, { v: 1 }, 200, 'easeOutQuad', () => { gameSpeedMul = slowObj.v; });
    }
  }
}

// ─── 절차적 레벨 생성 (청크 시스템 §10.4) ─────────────────────
function generateChunk() {
  const difficulty = Math.min(10, Math.floor(distance / 500));
  const chunkX = nextChunkX;

  // 동적 밸런스: 위기 상태 시 밀도 감소 (사용처: dangerModeChunks)
  const densityPenalty = dangerModeChunks > 0 ? 1 : 0;
  if (dangerModeChunks > 0) dangerModeChunks--;

  const maxObs = Math.max(1, Math.min(4, 1 + difficulty) - densityPenalty);

  // 패턴 가중 선택
  const patterns = [];
  patterns.push({ type:'single_barrier', weight: Math.max(1, 10 - difficulty) });
  patterns.push({ type:'spike_row', weight: Math.max(1, 8 - difficulty*0.5) });
  if (difficulty >= 1) patterns.push({ type:'double_barrier', weight: difficulty * 1.5 });
  if (distance >= 300) patterns.push({ type:'laser_gate', weight: difficulty * 1.0 });
  if (distance >= 600) patterns.push({ type:'drone_patrol', weight: difficulty * 0.8 });
  if (distance >= 800) patterns.push({ type:'gauntlet', weight: difficulty * 0.5 });

  const pattern = weightedRandom(patterns);
  const spawnedObs = [];
  const occupiedLanes = new Set();

  switch(pattern) {
    case 'single_barrier': {
      const lane = Math.floor(Math.random()*3);
      spawnObs('barrier', chunkX + 50, lane);
      occupiedLanes.add(lane);
      break;
    }
    case 'spike_row': {
      const lane = Math.floor(Math.random()*3);
      const count = 2 + Math.floor(Math.random()*2);
      for (let i = 0; i < count; i++) {
        spawnObs('spike', chunkX + 30 + i * 50, lane);
      }
      occupiedLanes.add(lane);
      break;
    }
    case 'double_barrier': {
      const skip = Math.floor(Math.random()*3);
      for (let l = 0; l < 3; l++) {
        if (l !== skip) { spawnObs('barrier', chunkX + 50, l); occupiedLanes.add(l); }
      }
      break;
    }
    case 'laser_gate': {
      // 2레인 점유 레이저 — 연속 배치 금지
      if (Math.floor(distance / CHUNK_WIDTH) - lastLaserChunk < 2) {
        // 폴백: 단일 배리어
        const lane = Math.floor(Math.random()*3);
        spawnObs('barrier', chunkX + 50, lane);
        occupiedLanes.add(lane);
      } else {
        lastLaserChunk = Math.floor(distance / CHUNK_WIDTH);
        const safeLane = Math.floor(Math.random()*3);
        const laserY = calcLaserY(safeLane);
        spawnObsRaw('laser', chunkX + 0, laserY, OBS.laser.w, OBS.laser.h);
        for (let l = 0; l < 3; l++) { if (l !== safeLane) occupiedLanes.add(l); }
      }
      break;
    }
    case 'drone_patrol': {
      const count = 1 + (difficulty > 5 ? 1 : 0);
      for (let i = 0; i < count; i++) {
        const lane = Math.floor(Math.random()*3);
        spawnObs('drone', chunkX + 50 + i*120, lane);
        occupiedLanes.add(lane);
      }
      break;
    }
    case 'gauntlet': {
      const safeLane = Math.floor(Math.random()*3);
      for (let l = 0; l < 3; l++) {
        if (l === safeLane) continue;
        const types = ['barrier','spike'];
        spawnObs(types[Math.floor(Math.random()*types.length)], chunkX + 50 + l*30, l);
        occupiedLanes.add(l);
      }
      if (distance >= 600 && Math.random() > 0.5) {
        spawnObs('drone', chunkX + 200, safeLane);
      }
      break;
    }
  }

  // 안전 레인 보장
  const safeLanes = [];
  for (let l = 0; l < 3; l++) { if (!occupiedLanes.has(l)) safeLanes.push(l); }
  if (safeLanes.length === 0) {
    // 마지막 장애물 제거
    if (obstacles.length > 0) {
      const removed = obstacles.pop();
      poolObs.release(removed);
    }
    safeLanes.push(Math.floor(Math.random()*3));
  }

  // 코인 배치 — 안전 레인에
  spawnChunkCoins(chunkX, safeLanes, difficulty);

  // 파워업 배치 (timeSinceLastPowerup 사용 — 유령 변수 방지)
  const minInterval = 15 + Math.random() * 10;
  if (timeSinceLastPowerup > minInterval && Math.random() < 0.3) {
    const puLane = safeLanes[Math.floor(Math.random()*safeLanes.length)];
    spawnPowerup(chunkX + CHUNK_WIDTH/2, puLane);
    timeSinceLastPowerup = 0;
  }

  // 무피격 보너스 (consecutiveSafeDist 사용 — 유령 변수 방지)
  if (consecutiveSafeDist > 500) {
    // 보너스 코인 줄 추가
    const bonusLane = safeLanes[Math.floor(Math.random()*safeLanes.length)];
    for (let i = 0; i < 5; i++) {
      spawnCoin('normal', chunkX + 250 + i * 25, bonusLane);
    }
    spawnPopup(W/2, H/3, 'PERFECT RUN!', C.hudCyan);
    score += 200 * (player.doubleActive ? 2 : 1);
    consecutiveSafeDist = 0;
  }

  nextChunkX += CHUNK_WIDTH;
}

// 레이저 Y 계산 (safeLane 제외한 2레인 사이)
function calcLaserY(safeLane) {
  if (safeLane === 0) return (laneYs[1] + laneYs[2]) / 2 - OBS.laser.h/2;
  if (safeLane === 2) return (laneYs[0] + laneYs[1]) / 2 - OBS.laser.h/2;
  return (laneYs[0] + laneYs[2]) / 2 - OBS.laser.h/2;
}

// 가중 랜덤 선택
function weightedRandom(items) {
  const total = items.reduce((s, i) => s + i.weight, 0);
  let r = Math.random() * total;
  for (const item of items) { r -= item.weight; if (r <= 0) return item.type; }
  return items[0].type;
}

// 장애물 스폰
function spawnObs(type, x, lane) {
  const ob = poolObs.acquire();
  const size = OBS[type] || OBS.barrier;
  ob.type = type; ob.x = x; ob.w = size.w; ob.h = size.h;
  ob.y = laneYs[lane] - size.h/2; ob.lane = lane;
  ob.active = true; ob.passed = false; ob.collected = false;
  ob.patrolDir = 1; ob.patrolY = ob.y;
  obstacles.push(ob);
}

function spawnObsRaw(type, x, y, w, h) {
  const ob = poolObs.acquire();
  ob.type = type; ob.x = x; ob.y = y; ob.w = w; ob.h = h;
  ob.lane = -1; ob.active = true; ob.passed = false; ob.collected = false;
  obstacles.push(ob);
}

// 코인 스폰
function spawnCoin(type, x, lane) {
  const c = poolCoin.acquire();
  c.type = type; c.x = x; c.y = laneYs[lane];
  c.value = type === 'super' ? 50 : 10;
  c.active = true; c.collected = false; c.rot = 0;
  coins.push(c);
}

function spawnChunkCoins(chunkX, safeLanes, difficulty) {
  const coinRoll = Math.random();
  const lane = safeLanes[Math.floor(Math.random()*safeLanes.length)];

  if (coinRoll < 0.15) {
    // 연속 코인 줄
    const count = 5 + Math.floor(Math.random()*4);
    for (let i = 0; i < count; i++) spawnCoin('normal', chunkX + 80 + i*25, lane);
  } else if (coinRoll < 0.30) {
    // 슈퍼 코인
    spawnCoin('super', chunkX + CHUNK_WIDTH/2, lane);
  } else {
    // 일반 코인 3~5개
    const count = 3 + Math.floor(Math.random()*3);
    for (let i = 0; i < count; i++) {
      const cl = safeLanes[Math.floor(Math.random()*safeLanes.length)];
      spawnCoin('normal', chunkX + 60 + i*50 + Math.random()*30, cl);
    }
  }
}

// 파워업 스폰
function spawnPowerup(x, lane) {
  const pu = poolPU.acquire();
  const types = ['magnet', 'shield', 'double'];
  pu.type = types[Math.floor(Math.random()*types.length)];
  pu.x = x; pu.y = laneYs[lane];
  pu.active = true; pu.collected = false; pu.pulseT = 0;
  powerups.push(pu);
}

// 파워업 활성화
function activatePowerup(type) {
  sfxPowerup();
  switch(type) {
    case 'magnet':
      player.magnetActive = true;
      player.magnetTimer = 8;
      break;
    case 'shield':
      player.shieldActive = true;
      break;
    case 'double':
      player.doubleActive = true;
      player.doubleTimer = 10;
      break;
  }
}

// ─── 게임 업데이트 (§5.2 상세 흐름) ──────────────────────────
function updateGame(dt) {
  const effectiveDt = dt * gameSpeedMul;

  // 1. 속도 & 스크롤
  speed = Math.min(MAX_SPEED, BASE_SPEED + distance * ACCEL);
  const scrollPx = speed * effectiveDt;
  distance += scrollPx / 100; // px → m 변환 (100px = 1m 근사)
  bgFarScroll += scrollPx * 0.1;
  bgMidScroll += scrollPx * 0.4;
  bgRoadScroll += scrollPx;
  timeSinceLastPowerup += dt;
  consecutiveSafeDist += scrollPx / 100; // 무피격 거리 갱신

  // 거리 100m 마다 점수
  const hundredNow = Math.floor(distance / 100);
  if (hundredNow > hudDistLastHundred) {
    const gained = (hundredNow - hudDistLastHundred) * 100 * (player.doubleActive ? 2 : 1);
    score += gained;
    hudDistLastHundred = hundredNow;
    hudDistPulse = 0.3;
  }

  // 최고 기록 근접 (90%) — HUD 강조 (동적 밸런스 사용처)
  const bestScore = getBest();
  if (bestScore > 0 && score > bestScore * 0.9) hudScoreBright = 0.5;

  // 2. 청크 생성
  while (nextChunkX < bgRoadScroll + W + 200) generateChunk();

  // 3. 플레이어 업데이트
  if (player.jumping) {
    player.jumpT += dt * 1000;
    const t = Math.min(1, player.jumpT / JUMP_DURATION);
    const jumpY = -JUMP_HEIGHT * 4 * t * (1 - t); // 포물선
    player.y = player.targetY + jumpY;
    if (t >= 1) { player.jumping = false; player.y = player.targetY; }
  }

  // 무적 타이머
  if (player.invincible) {
    player.invTimer -= dt;
    if (player.invTimer <= 0) player.invincible = false;
  }

  // 파워업 타이머
  if (player.magnetActive) {
    player.magnetTimer -= dt;
    if (player.magnetTimer <= 0) player.magnetActive = false;
  }
  if (player.doubleActive) {
    player.doubleTimer -= dt;
    if (player.doubleTimer <= 0) player.doubleActive = false;
  }

  // 4. 장애물 업데이트 (역순 순회 — Cycle 2 패턴)
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x -= scrollPx;
    // 드론 상하 왕복
    if (ob.type === 'drone') {
      ob.patrolY += ob.patrolDir * 40 * dt;
      if (Math.abs(ob.patrolY) > 30) ob.patrolDir *= -1;
      ob.y += ob.patrolDir * 40 * dt;
    }
    // 화면 밖 회수
    if (ob.x + ob.w < -50) {
      poolObs.release(obstacles.splice(i, 1)[0]);
      continue;
    }
    // Near Miss 체크
    checkNearMiss(ob);
    // 충돌
    const ph = playerHitbox();
    const oh = obsHitbox(ob);
    if (collideRect(ph.x, ph.y, ph.w, ph.h, oh.x, oh.y, oh.w, oh.h)) {
      handleCollision(ob);
      poolObs.release(obstacles.splice(i, 1)[0]);
    }
  }

  // 5. 코인 업데이트
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.x -= scrollPx;
    c.rot += dt * 3;
    // 자석 흡인
    if (player.magnetActive && !c.collected) {
      const dx = playerX - c.x, dy = player.y - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const magnetRange = Math.abs(laneYs[0] - laneYs[2]); // 2레인 범위
      if (dist < magnetRange) {
        const attract = 300 * dt;
        c.x += (dx / dist) * attract;
        c.y += (dy / dist) * attract;
      }
    }
    // 화면 밖
    if (c.x < -20) { poolCoin.release(coins.splice(i, 1)[0]); continue; }
    // 획득
    if (c.collected) continue; // 가드 (C3 B1 교훈)
    const ph = playerHitbox();
    const ch = coinHitbox(c);
    if (collideRect(ph.x, ph.y, ph.w, ph.h, ch.x, ch.y, ch.w, ch.h)) {
      c.collected = true;
      const pts = c.value * (player.doubleActive ? 2 : 1);
      score += pts;
      coinCount++;
      coinCombo++;
      // 연속 코인 5개 콤보 보너스 (§7.1 — B4 수정)
      if (coinCombo >= 5) {
        const comboBonus = 20 * (player.doubleActive ? 2 : 1);
        score += comboBonus;
        spawnPopup(c.x + 10, c.y - 30, 'COMBO +' + comboBonus, C.hudGold);
        coinCombo = 0;
      }
      hudScoreBright = 0.2;
      spawnPopup(c.x, c.y - 15, '+' + pts, c.type === 'super' ? C.coinSuper : C.coinNormal);
      spawnParticles(c.x, c.y, 4, c.type === 'super' ? C.coinSuper : C.coinNormal, 30, 60, 250);
      sfxCoin();
      poolCoin.release(coins.splice(i, 1)[0]);
    }
  }

  // 6. 파워업 업데이트
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.x -= scrollPx;
    pu.pulseT += dt;
    if (pu.x < -40) { poolPU.release(powerups.splice(i, 1)[0]); continue; }
    if (pu.collected) continue; // 가드
    const ph = playerHitbox();
    const puHB = { x: pu.x - 16, y: pu.y - 16, w: 32, h: 32 };
    if (collideRect(ph.x, ph.y, ph.w, ph.h, puHB.x, puHB.y, puHB.w, puHB.h)) {
      pu.collected = true;
      activatePowerup(pu.type);
      spawnParticles(pu.x, pu.y, 6, C.puMagnet, 40, 80, 300);
      poolPU.release(powerups.splice(i, 1)[0]);
    }
  }

  // 8. 파티클/팝업 업데이트
  updateParticles(dt);

  // HUD 애니메이션 감쇠
  if (hudDistPulse > 0) hudDistPulse -= dt * 2;
  if (hudScoreBright > 0) hudScoreBright -= dt;
  if (hudLifeShake > 0) hudLifeShake -= dt;
}

// 파티클 업데이트 (GAMEOVER에서도 동작 — 매트릭스)
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) { poolParticle.release(particles.splice(i, 1)[0]); }
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.life -= dt;
    p.offsetY -= 40 * dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) popups.splice(i, 1);
  }
}

// ─── 렌더링 ───────────────────────────────────────────────────
function renderGame() {
  // 1. 원경 (하늘)
  if (bgFarCanvas) {
    const farOff = bgFarScroll % bgFarCanvas.width;
    ctx.drawImage(bgFarCanvas, -farOff, 0, bgFarCanvas.width, H);
    ctx.drawImage(bgFarCanvas, bgFarCanvas.width - farOff, 0, bgFarCanvas.width, H);
  }

  // 2. 중경 (건물)
  if (bgMidCanvas) {
    const midOff = bgMidScroll % bgMidCanvas.width;
    ctx.drawImage(bgMidCanvas, -midOff, 0, bgMidCanvas.width, H);
    ctx.drawImage(bgMidCanvas, bgMidCanvas.width - midOff, 0, bgMidCanvas.width, H);
  }

  // 3. 도로
  const roadTop = gameTop + gameH * 0.25 - 30;
  const roadBot = gameTop + gameH * 0.75 + 30;
  ctx.fillStyle = C.road;
  ctx.fillRect(0, roadTop, W, roadBot - roadTop);

  // 레인 구분선
  ctx.strokeStyle = C.laneLine; ctx.lineWidth = 1;
  for (let l = 0; l < 3; l++) {
    const ly = laneYs[l];
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
  }

  // 도로 중앙선 대시 (속도감)
  ctx.strokeStyle = C.roadStripe; ctx.lineWidth = 2;
  ctx.setLineDash([20, 15]);
  const dashOff = bgRoadScroll % 35;
  const centerY = laneYs[1];
  ctx.beginPath(); ctx.moveTo(-dashOff, centerY - (laneYs[1]-laneYs[0])/2); ctx.lineTo(W + 40, centerY - (laneYs[1]-laneYs[0])/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-dashOff, centerY + (laneYs[2]-laneYs[1])/2); ctx.lineTo(W + 40, centerY + (laneYs[2]-laneYs[1])/2); ctx.stroke();
  ctx.setLineDash([]);

  // 도로 양옆 네온 스트립
  ctx.strokeStyle = C.neonStrip; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, roadTop); ctx.lineTo(W, roadTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, roadBot); ctx.lineTo(W, roadBot); ctx.stroke();
  // 글로우
  ctx.strokeStyle = 'rgba(213,0,249,0.2)'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(0, roadTop); ctx.lineTo(W, roadTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, roadBot); ctx.lineTo(W, roadBot); ctx.stroke();

  // 5. 코인
  coins.forEach(c => { if (!c.collected) drawCoin(c); });

  // 6. 파워업
  powerups.forEach(pu => { if (!pu.collected) drawPowerup(pu); });

  // 7. 장애물
  obstacles.forEach(ob => drawObstacle(ob));

  // 8. 플레이어
  drawPlayer(playerX, player.y);

  // 자석 효과 범위 표시
  if (player.magnetActive) {
    ctx.strokeStyle = 'rgba(41,121,255,0.2)'; ctx.lineWidth = 1;
    const magnetRange = Math.abs(laneYs[0] - laneYs[2]);
    ctx.beginPath(); ctx.arc(playerX, player.y, magnetRange, 0, Math.PI*2); ctx.stroke();
  }

  // 9. 파티클
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // 팝업
  popups.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.font = `bold 12px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.text, p.x, p.y + p.offsetY);
  });
  ctx.globalAlpha = 1;

  // 위기 비네트 (라이프 1)
  if (lives === 1 && state === STATES.PLAYING) {
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
    vg.addColorStop(0, 'rgba(255,0,0,0)');
    vg.addColorStop(1, 'rgba(255,0,0,0.2)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // 10. HUD
  renderHUD();
}

function renderHUD() {
  // HUD 배경
  ctx.fillStyle = 'rgba(13,13,26,0.85)';
  ctx.fillRect(0, 0, W, HUD_HEIGHT);
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(0, HUD_HEIGHT - 1, W, 1);

  const shakeX = hudLifeShake > 0 ? (Math.random()-0.5) * 6 : 0;
  const shakeY = hudLifeShake > 0 ? (Math.random()-0.5) * 6 : 0;

  // 거리
  const distStr = Math.floor(distance).toLocaleString() + 'm';
  ctx.font = `bold 16px ${FONT}`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const distScale = 1 + hudDistPulse * 0.3;
  ctx.save();
  ctx.translate(12, HUD_HEIGHT/2);
  ctx.scale(distScale, distScale);
  ctx.fillStyle = C.hudCyan;
  ctx.fillText('🏃 ' + distStr, 0, 0);
  ctx.restore();

  // 점수
  const scoreStr = score.toLocaleString();
  ctx.textAlign = 'left';
  const scoreX = 130;
  const scoreBright = hudScoreBright > 0 ? '#fff' : C.hudGold;
  // 별 아이콘 (Canvas 드로잉)
  ctx.fillStyle = C.hudGold;
  drawStar(scoreX + 9, HUD_HEIGHT/2, 5, 9, 4, C.hudGold);
  ctx.fillStyle = scoreBright;
  ctx.fillText(scoreStr, scoreX + 22, HUD_HEIGHT/2);
  // x2 표시
  if (player.doubleActive) {
    ctx.fillStyle = C.puDouble;
    ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.008)*0.5;
    ctx.fillText('×2', scoreX + 22 + ctx.measureText(scoreStr).width + 6, HUD_HEIGHT/2);
    ctx.globalAlpha = 1;
  }

  // 라이프 (하트)
  ctx.save();
  ctx.translate(shakeX, shakeY);
  for (let i = 0; i < 3; i++) {
    const hx = W - 90 + i * 25;
    const hy = HUD_HEIGHT/2 - 8;
    if (i < lives) {
      ctx.fillStyle = C.hudRed;
      ctx.font = '14px serif';
      ctx.fillText('♥', hx, hy + 12);
    } else {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = C.hudRed;
      ctx.font = '14px serif';
      ctx.fillText('♥', hx, hy + 12);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();

  // 파워업 타이머
  let puX = W - 110;
  ctx.font = `11px ${FONT}`; ctx.textAlign = 'right';
  if (player.magnetActive) {
    ctx.fillStyle = C.puMagnet;
    ctx.fillText('🧲' + player.magnetTimer.toFixed(1) + 's', puX, HUD_HEIGHT/2);
    puX -= 60;
  }
  if (player.doubleActive) {
    ctx.fillStyle = C.puDouble;
    ctx.fillText('x2 ' + player.doubleTimer.toFixed(1) + 's', puX, HUD_HEIGHT/2);
    puX -= 60;
  }
  if (player.shieldActive) {
    ctx.fillStyle = C.puShield;
    ctx.fillText('🛡️', puX, HUD_HEIGHT/2);
  }

  // 일시정지 버튼 (마우스/터치 모드만 — inputMode 사용처 4)
  if (inputMode !== 'keyboard') {
    const bx = W - 35, by = 8, bs = 24;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(bx, by, bs, bs, 4);
    ctx.fillStyle = '#e0e0f0';
    ctx.fillRect(bx + 7, by + 6, 3, 12);
    ctx.fillRect(bx + 14, by + 6, 3, 12);
  }
}

// ─── 타이틀 화면 ──────────────────────────────────────────────
function renderTitle() {
  // 느린 배경 스크롤
  titleBgScroll += 0.3;
  if (bgFarCanvas) {
    const off = titleBgScroll % bgFarCanvas.width;
    ctx.drawImage(bgFarCanvas, -off, 0, bgFarCanvas.width, H);
    ctx.drawImage(bgFarCanvas, bgFarCanvas.width - off, 0, bgFarCanvas.width, H);
  }
  if (bgMidCanvas) {
    const off = (titleBgScroll * 2) % bgMidCanvas.width;
    ctx.drawImage(bgMidCanvas, -off, 0, bgMidCanvas.width, H);
    ctx.drawImage(bgMidCanvas, bgMidCanvas.width - off, 0, bgMidCanvas.width, H);
  }

  // 오버레이
  ctx.fillStyle = 'rgba(13,13,26,0.5)';
  ctx.fillRect(0, 0, W, H);

  // 스캔라인 효과 (아케이드 장르 시그니처)
  scanlineOffset = (scanlineOffset + 0.5) % 4;
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = scanlineOffset; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }

  const cx = W/2, cy = H * 0.38;

  // 타이틀 글로우
  ctx.globalAlpha = titleGlow.alpha;
  ctx.fillStyle = C.player;
  ctx.font = `bold 28px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // 글로우 뒤
  ctx.shadowColor = C.player; ctx.shadowBlur = 20;
  ctx.fillText('NEON DASH RUNNER', cx, cy);
  ctx.shadowBlur = 0;

  ctx.font = `bold 16px ${FONT}`;
  ctx.fillStyle = C.hudText;
  ctx.fillText('네온 대시 러너', cx, cy + 35);
  ctx.globalAlpha = 1;

  // 최고 기록
  const best = getBest(), bestDist = getBestDist();
  if (best > 0) {
    ctx.font = `14px ${FONT}`;
    ctx.fillStyle = C.hudGold;
    ctx.fillText('BEST: ' + best.toLocaleString() + 'pts  |  ' + bestDist.toLocaleString() + 'm', cx, cy + 70);
  }

  // 시작 안내 (깜빡임)
  if (Math.sin(Date.now() * 0.004) > -0.3) {
    ctx.font = `bold 14px ${FONT}`;
    ctx.fillStyle = C.hudText;
    const startText = inputMode === 'touch' ? '탭하여 시작' : 'SPACE / Enter 로 시작';
    ctx.fillText(startText, cx, cy + 110);
  }

  // 조작 안내
  ctx.font = `11px ${FONT}`;
  ctx.fillStyle = '#8080a0';
  if (inputMode === 'touch') {
    ctx.fillText('스와이프: 레인 이동  |  탭: 점프', cx, H - 30);
  } else {
    ctx.fillText('↑↓/W·S: 레인 이동  |  SPACE: 점프  |  P: 일시정지', cx, H - 30);
  }
}

// ─── 일시정지 오버레이 ────────────────────────────────────────
function renderPause() {
  ctx.fillStyle = 'rgba(13,13,26,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = C.hudText;
  ctx.font = `bold 24px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', W/2, H/2 - 30);

  ctx.font = `14px ${FONT}`;
  ctx.fillStyle = '#8080a0';
  // inputMode 사용처 3
  if (inputMode === 'touch') {
    ctx.fillText('탭하여 계속', W/2, H/2 + 10);
  } else if (inputMode === 'mouse') {
    ctx.fillText('클릭하여 계속 | R: 재시작', W/2, H/2 + 10);
  } else {
    ctx.fillText('P/ESC: 계속 | R: 재시작', W/2, H/2 + 10);
  }
}

// ─── 확인 모달 (Canvas 기반 — confirm 금지) ───────────────────
function renderModal() {
  ctx.fillStyle = `rgba(13,13,26,${0.7 * modalAlpha.alpha})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = modalAlpha.alpha;

  // 모달 박스
  const mw = 260, mh = 140;
  const mx = W/2 - mw/2, my = H/2 - mh/2;
  ctx.fillStyle = '#12121e';
  ctx.strokeStyle = '#2d2d4e';
  ctx.lineWidth = 2;
  roundRect(mx, my, mw, mh, 8);
  ctx.strokeRect(mx, my, mw, mh);

  ctx.fillStyle = C.hudText;
  ctx.font = `bold 16px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('재시작하시겠습니까?', W/2, my + 35);

  ctx.font = `13px ${FONT}`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText('현재 진행이 초기화됩니다', W/2, my + 60);

  // 버튼 (inputMode 사용처 2 — 터치 시 1.5배)
  const bw = inputMode === 'touch' ? 120 : 80;
  const bh = inputMode === 'touch' ? 54 : 36;
  const gap = 20;
  const by = my + mh - bh - 20;
  const yesX = W/2 - bw - gap/2, noX = W/2 + gap/2;

  // 예 버튼
  ctx.fillStyle = modalSelection === 0 ? C.barrier : '#1a1a2e';
  roundRect(yesX, by, bw, bh, 6);
  ctx.fillStyle = '#fff';
  ctx.font = `bold 14px ${FONT}`;
  ctx.fillText('예', yesX + bw/2, by + bh/2);

  // 아니오 버튼
  ctx.fillStyle = modalSelection === 1 ? '#2d2d4e' : '#1a1a2e';
  roundRect(noX, by, bw, bh, 6);
  ctx.fillStyle = '#fff';
  ctx.fillText('아니오', noX + bw/2, by + bh/2);

  ctx.globalAlpha = 1;
}

// ─── 게임오버 화면 ────────────────────────────────────────────
function renderGameover() {
  // 반투명 오버레이
  ctx.fillStyle = `rgba(0,0,0,${goOverlay.alpha})`;
  ctx.fillRect(0, 0, W, H);

  const cx = W/2, cy = H * 0.3;

  // GAME OVER 텍스트
  ctx.fillStyle = C.barrier;
  ctx.font = `bold 30px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = C.barrier; ctx.shadowBlur = 15;
  ctx.fillText('GAME OVER', cx, cy);
  ctx.shadowBlur = 0;

  // 결과 (순차 fadeIn)
  const rY = cy + 55;
  ctx.font = `16px ${FONT}`;

  ctx.globalAlpha = goResultAlpha.dist;
  ctx.fillStyle = C.hudCyan;
  ctx.fillText('거리: ' + Math.floor(distance).toLocaleString() + 'm', cx, rY);

  ctx.globalAlpha = goResultAlpha.score;
  ctx.fillStyle = C.hudGold;
  ctx.fillText('점수: ' + score.toLocaleString(), cx, rY + 30);

  ctx.globalAlpha = goResultAlpha.coin;
  ctx.fillStyle = C.hudText;
  ctx.fillText('코인: ' + coinCount + '개', cx, rY + 60);

  // NEW BEST
  if ((isNewBest || isNewDist) && goResultAlpha.best > 0) {
    ctx.globalAlpha = goResultAlpha.best;
    const bestScale = goResultAlpha.best;
    ctx.save();
    ctx.translate(cx, rY + 100);
    ctx.scale(bestScale, bestScale);
    ctx.fillStyle = C.hudGold;
    ctx.font = `bold 18px ${FONT}`;
    ctx.shadowColor = C.hudGold; ctx.shadowBlur = 10;
    ctx.fillText('🏆 NEW BEST!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.font = `12px ${FONT}`;
    ctx.fillStyle = '#8080a0';
    if (isNewBest) ctx.fillText('(이전: ' + prevBest.toLocaleString() + ')', 0, 22);
    ctx.restore();
  }

  ctx.globalAlpha = 1;

  // 재시작 안내 (inputMode 사용처 3)
  if (goOverlay.alpha > 0.5 && Math.sin(Date.now()*0.004) > -0.3) {
    ctx.font = `bold 13px ${FONT}`;
    ctx.fillStyle = '#8080a0';
    const restartText = inputMode === 'touch' ? '탭하여 재시작' :
                         inputMode === 'mouse' ? '클릭하여 재시작' : 'R / Space 로 재시작';
    ctx.fillText(restartText, cx, H - 40);
  }
}

// ─── 로딩 화면 ────────────────────────────────────────────────
let loadProgress = 0;
function renderLoading() {
  ctx.fillStyle = C.bgTop;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = C.hudText;
  ctx.font = `bold 16px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('LOADING...', W/2, H/2 - 15);

  // 프로그레스 바
  const bw = 200, bh = 6;
  const bx = W/2 - bw/2, by = H/2 + 10;
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = C.player;
  ctx.fillRect(bx, by, bw * loadProgress, bh);
}

// ─── 메인 루프 (§5.1) ────────────────────────────────────────
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 최대 50ms 캡
  lastTime = timestamp;

  switch(state) {
    case STATES.LOADING:
      renderLoading();
      break;
    case STATES.TITLE:
      tw.update(dt);
      renderTitle();
      break;
    case STATES.PLAYING:
      updateGame(dt);
      tw.update(dt);
      renderGame();
      break;
    case STATES.PAUSE:
      tw.update(dt);
      renderGame();
      renderPause();
      break;
    case STATES.CONFIRM_MODAL:
      tw.update(dt);
      renderGame();
      renderModal();
      break;
    case STATES.GAMEOVER:
      tw.update(dt);
      updateParticles(dt); // GAMEOVER에서도 파티클 업데이트 (매트릭스)
      renderGame();
      renderGameover();
      break;
  }

  rafId = requestAnimationFrame(loop);
}

// ─── 초기화 & 시작 ───────────────────────────────────────────
function init() {
  resize();
  state = STATES.LOADING;
  loadProgress = 0.1;
  rafId = requestAnimationFrame(loop);

  // 이벤트 리스너 등록 (listen 헬퍼 — destroy 패턴)
  listen(window, 'resize', resize);
  listen(window, 'keydown', handleKeyDown);
  listen(window, 'keyup', handleKeyUp);
  listen(canvas, 'click', handleClick);
  listen(canvas, 'touchstart', handleTouchStart, { passive: false });
  listen(canvas, 'touchend', handleTouchEnd, { passive: false });

  // 에셋 없음 (100% Canvas 드로잉) — 배경 캐시만 확인
  loadProgress = 1.0;

  forceState(STATES.TITLE);
  pulseTitle();
}

// ─── destroy 패턴 (Cycle 3 표준) ──────────────────────────────
function destroy() {
  cancelAnimationFrame(rafId);
  registeredListeners.forEach(([el, evt, fn, opts]) => el.removeEventListener(evt, fn, opts));
  registeredListeners.length = 0;
  poolObs.clear(); poolCoin.clear(); poolPU.clear(); poolParticle.clear();
  tw.cancelAll();
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
}

// 시작
init();
</script>
