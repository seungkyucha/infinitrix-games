<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="blastCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFAB91" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF1744" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#FF1744" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#FF1744" stop-opacity="0"/>
      <stop offset="85%" stop-color="#FF5252" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF9100" stop-opacity="0"/>
    </radialGradient>
    <filter id="blastGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 충격파 링 -->
  <circle cx="48" cy="48" r="40" fill="url(#shockwave)"/>
  <circle cx="48" cy="48" r="32" fill="none" stroke="#FF5252" stroke-width="1.5" opacity="0.4"/>
  <!-- 폭발 코어 -->
  <g filter="url(#blastGlow)">
    <circle cx="48" cy="48" r="18" fill="url(#blastCore)"/>
  </g>
  <!-- 빛 방사선 (8방향) -->
  <g filter="url(#sparkGlow)" opacity="0.8">
    <line x1="48" y1="48" x2="48" y2="10" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="48" y2="86" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="10" y2="48" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="86" y2="48" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="21" y2="21" stroke="#FF8A80" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="75" y2="21" stroke="#FF8A80" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="21" y2="75" stroke="#FF8A80" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="75" y2="75" stroke="#FF8A80" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 파편 파티클 (방사형) -->
  <g filter="url(#sparkGlow)">
    <circle cx="28" cy="18" r="3" fill="#FFD740" opacity="0.9"/>
    <circle cx="70" cy="22" r="2.5" fill="#FF9100" opacity="0.8"/>
    <circle cx="15" cy="55" r="2" fill="#FFD740" opacity="0.7"/>
    <circle cx="80" cy="60" r="2.5" fill="#FF1744" opacity="0.8"/>
    <circle cx="25" cy="78" r="3" fill="#FF9100" opacity="0.9"/>
    <circle cx="72" cy="75" r="2" fill="#FFD740" opacity="0.7"/>
    <circle cx="48" cy="8" r="2" fill="#FF5252" opacity="0.8"/>
    <circle cx="48" cy="88" r="2" fill="#FF5252" opacity="0.8"/>
  </g>
  <!-- 중심 백열 -->
  <circle cx="48" cy="48" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="48" cy="48" r="8" fill="#FFFFFF" opacity="0.3"/>
</svg>