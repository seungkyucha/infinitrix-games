<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#C51162"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FF8A80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#FF1744" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <ellipse cx="16" cy="17" rx="14" ry="13" fill="url(#heartGlow)"/>
  <!-- 하트 형태 -->
  <g filter="url(#neonGlow)">
    <path d="M16 28 C16 28 3 20 3 12 C3 7 7 4 11 4 C13.5 4 15 5.5 16 7.5 C17 5.5 18.5 4 21 4 C25 4 29 7 29 12 C29 20 16 28 16 28 Z"
          fill="url(#heartGrad)" stroke="#FF5252" stroke-width="0.5"/>
  </g>
  <!-- 광택 -->
  <path d="M11 9 C11 9 8 10 8 13 C8 14 8.5 15 9 15.5"
        fill="none" stroke="#FF8A80" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- 하이라이트 -->
  <ellipse cx="12" cy="11" rx="3" ry="2.5" fill="url(#heartShine)"/>
</svg>