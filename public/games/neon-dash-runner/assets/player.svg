<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#0097A7"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="playerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <g filter="url(#softGlow)">
    <ellipse cx="38" cy="32" rx="22" ry="20" fill="url(#playerGlow)"/>
  </g>
  <!-- 속도선 (후방) -->
  <g opacity="0.6">
    <line x1="4" y1="24" x2="18" y2="24" stroke="url(#trailGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="32" x2="16" y2="32" stroke="url(#trailGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="40" x2="18" y2="40" stroke="url(#trailGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 메인 삼각형 몸체 (우측 뾰족) -->
  <g filter="url(#glow)">
    <path d="M56 32 L20 14 Q18 14 18 16 L18 48 Q18 50 20 50 Z" fill="url(#bodyGrad)" stroke="#00E5FF" stroke-width="0.5" stroke-opacity="0.5"/>
  </g>
  <!-- 내부 밝은 삼각형 -->
  <path d="M48 32 L26 20 L26 44 Z" fill="url(#innerGrad)" opacity="0.35"/>
  <!-- 콕핏 라인 -->
  <path d="M44 32 L28 22 M44 32 L28 42" stroke="#B2EBF2" stroke-width="1" stroke-opacity="0.6" fill="none"/>
  <!-- 핵심 코어 (발광 점) -->
  <circle cx="36" cy="32" r="3.5" fill="#B2EBF2" filter="url(#glow)"/>
  <circle cx="36" cy="32" r="1.5" fill="#FFFFFF"/>
  <!-- 상단 날개 장식 -->
  <path d="M24 16 L16 8 L20 16 Z" fill="#0097A7" stroke="#00E5FF" stroke-width="0.5" opacity="0.8"/>
  <!-- 하단 날개 장식 -->
  <path d="M24 48 L16 56 L20 48 Z" fill="#0097A7" stroke="#00E5FF" stroke-width="0.5" opacity="0.8"/>
  <!-- 엔진 배기 -->
  <ellipse cx="16" cy="32" rx="5" ry="8" fill="#00E5FF" opacity="0.2" filter="url(#softGlow)"/>
</svg>