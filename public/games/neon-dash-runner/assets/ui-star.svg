<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="40%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFD740" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#coinGlow)"/>
  <!-- 코인 본체 -->
  <g filter="url(#goldGlow)">
    <circle cx="16" cy="16" r="11" fill="url(#coinGrad)" stroke="#F9A825" stroke-width="1"/>
    <!-- 내부 원 -->
    <circle cx="16" cy="16" r="8" fill="none" stroke="#FFF176" stroke-width="0.8" opacity="0.6"/>
    <!-- 별 마크 (5꼭지) -->
    <path d="M16 8 L17.8 13.2 L23.2 13.2 L18.8 16.8 L20.4 22 L16 18.8 L11.6 22 L13.2 16.8 L8.8 13.2 L14.2 13.2 Z"
          fill="#FFF176" opacity="0.7"/>
  </g>
  <!-- 광택 하이라이트 -->
  <ellipse cx="13" cy="12" rx="4" ry="3" fill="url(#coinShine)"/>
  <!-- 반짝임 -->
  <g opacity="0.8">
    <line x1="4" y1="5" x2="6" y2="7" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
    <line x1="5" y1="7" x2="5" y2="5" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
    <line x1="26" y1="4" x2="28" y2="6" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>