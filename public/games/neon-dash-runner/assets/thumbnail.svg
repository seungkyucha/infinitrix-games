<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="tRoadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#12122A"/>
    </linearGradient>
    <linearGradient id="tPlayerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="tBuildGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#14142B"/>
    </linearGradient>
    <radialGradient id="tPlayerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tMoonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C0C0E8" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#8080B0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D0D1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 밤하늘 배경 -->
  <rect width="400" height="300" fill="url(#tSkyGrad)"/>

  <!-- 달 -->
  <circle cx="340" cy="50" r="30" fill="url(#tMoonGlow)"/>
  <circle cx="340" cy="50" r="14" fill="#C0C0E8" opacity="0.6"/>

  <!-- 별 -->
  <g opacity="0.7">
    <circle cx="30" cy="20" r="1.2" fill="#FFFFFF"/><circle cx="80" cy="40" r="0.8" fill="#00E5FF"/>
    <circle cx="140" cy="15" r="1" fill="#FFFFFF"/><circle cx="200" cy="35" r="0.8" fill="#D500F9"/>
    <circle cx="260" cy="22" r="1.2" fill="#FFFFFF"/><circle cx="380" cy="30" r="0.8" fill="#FFFFFF"/>
    <circle cx="50" cy="60" r="0.6" fill="#E0E0FF"/><circle cx="170" cy="55" r="0.7" fill="#FFFFFF"/>
    <circle cx="310" cy="25" r="0.8" fill="#FFD740"/><circle cx="115" cy="45" r="0.6" fill="#FFFFFF"/>
  </g>

  <!-- 건물 실루엣 -->
  <g opacity="0.6">
    <rect x="0" y="100" width="30" height="200" fill="url(#tBuildGrad)"/>
    <rect x="35" y="80" width="25" height="220" fill="url(#tBuildGrad)"/>
    <rect x="65" y="120" width="35" height="180" fill="url(#tBuildGrad)"/>
    <rect x="108" y="70" width="28" height="230" fill="url(#tBuildGrad)"/>
    <rect x="142" y="110" width="32" height="190" fill="url(#tBuildGrad)"/>
    <rect x="180" y="90" width="25" height="210" fill="url(#tBuildGrad)"/>
    <rect x="210" y="130" width="30" height="170" fill="url(#tBuildGrad)"/>
    <rect x="248" y="85" width="28" height="215" fill="url(#tBuildGrad)"/>
    <rect x="282" y="105" width="35" height="195" fill="url(#tBuildGrad)"/>
    <rect x="322" y="75" width="26" height="225" fill="url(#tBuildGrad)"/>
    <rect x="354" y="115" width="30" height="185" fill="url(#tBuildGrad)"/>
    <rect x="390" y="90" width="20" height="210" fill="url(#tBuildGrad)"/>
  </g>

  <!-- 네온 창문 -->
  <g filter="url(#tGlow)" opacity="0.8">
    <rect x="10" y="120" width="3" height="3" fill="#FF1744"/><rect x="20" y="140" width="3" height="3" fill="#00E5FF"/>
    <rect x="42" y="100" width="3" height="3" fill="#D500F9"/><rect x="48" y="130" width="3" height="3" fill="#FF1744"/>
    <rect x="80" y="140" width="3" height="3" fill="#00E5FF"/><rect x="72" y="160" width="3" height="3" fill="#D500F9"/>
    <rect x="115" y="90" width="3" height="3" fill="#FF1744"/><rect x="125" y="115" width="3" height="3" fill="#00E5FF"/>
    <rect x="155" y="130" width="3" height="3" fill="#D500F9"/><rect x="148" y="150" width="3" height="3" fill="#FF1744"/>
    <rect x="190" y="110" width="3" height="3" fill="#00E5FF"/><rect x="195" y="140" width="3" height="3" fill="#D500F9"/>
    <rect x="220" y="150" width="3" height="3" fill="#FF1744"/><rect x="230" y="170" width="3" height="3" fill="#00E5FF"/>
    <rect x="258" y="105" width="3" height="3" fill="#D500F9"/><rect x="265" y="130" width="3" height="3" fill="#FF1744"/>
    <rect x="295" y="125" width="3" height="3" fill="#00E5FF"/><rect x="305" y="150" width="3" height="3" fill="#D500F9"/>
    <rect x="330" y="95" width="3" height="3" fill="#FF1744"/><rect x="338" y="120" width="3" height="3" fill="#00E5FF"/>
    <rect x="365" y="135" width="3" height="3" fill="#D500F9"/><rect x="375" y="155" width="3" height="3" fill="#FF1744"/>
  </g>

  <!-- 도로 -->
  <rect x="0" y="195" width="400" height="105" fill="url(#tRoadGrad)"/>

  <!-- 레인 구분선 -->
  <g stroke="#2D2D4E" stroke-width="1" stroke-dasharray="15,10" opacity="0.35">
    <line x1="0" y1="220" x2="400" y2="220"/>
    <line x1="0" y1="248" x2="400" y2="248"/>
    <line x1="0" y1="275" x2="400" y2="275"/>
  </g>

  <!-- 네온 도로 스트립 -->
  <g filter="url(#tSoftGlow)">
    <line x1="0" y1="195" x2="400" y2="195" stroke="#D500F9" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="195" x2="400" y2="195" stroke="#D500F9" stroke-width="6" opacity="0.15"/>
  </g>

  <!-- 배리어 (적 장애물) -->
  <g filter="url(#tGlow)">
    <rect x="280" y="204" width="22" height="28" rx="2" fill="#FF1744" stroke="#FF5252" stroke-width="1"/>
    <line x1="284" y1="210" x2="298" y2="210" stroke="#FF8A80" stroke-width="1" opacity="0.7"/>
    <line x1="284" y1="226" x2="298" y2="226" stroke="#FF8A80" stroke-width="1" opacity="0.7"/>
    <path d="M288 215 L296 223 M296 215 L288 223" stroke="#FF8A80" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- 레이저 장애물 -->
  <g filter="url(#tGlow)" opacity="0.7">
    <line x1="320" y1="248" x2="400" y2="248" stroke="#D500F9" stroke-width="3"/>
    <line x1="320" y1="248" x2="400" y2="248" stroke="#D500F9" stroke-width="8" opacity="0.2"/>
    <circle cx="320" cy="248" r="4" fill="#D500F9" opacity="0.8"/>
  </g>

  <!-- 코인들 -->
  <g filter="url(#tGlow)">
    <circle cx="180" cy="275" r="5" fill="#FFD740" stroke="#F9A825" stroke-width="0.5"/>
    <circle cx="200" cy="275" r="5" fill="#FFD740" stroke="#F9A825" stroke-width="0.5"/>
    <circle cx="220" cy="275" r="5" fill="#FFD740" stroke="#F9A825" stroke-width="0.5"/>
    <circle cx="240" cy="275" r="5" fill="#FFD740" stroke="#F9A825" stroke-width="0.5"/>
    <circle cx="260" cy="275" r="5" fill="#FFD740" stroke="#F9A825" stroke-width="0.5"/>
  </g>

  <!-- 파워업 캡슐 -->
  <g filter="url(#tGlow)">
    <rect x="150" y="232" width="16" height="16" rx="4" fill="#00E676" stroke="#69F0AE" stroke-width="0.8"/>
    <circle cx="158" cy="240" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- 플레이어 (시안 삼각형) -->
  <g filter="url(#tSoftGlow)">
    <ellipse cx="100" cy="248" rx="18" ry="16" fill="url(#tPlayerGlow)"/>
  </g>
  <g filter="url(#tGlow)">
    <path d="M115 248 L82 234 L82 262 Z" fill="url(#tPlayerGrad)" stroke="#00E5FF" stroke-width="0.8"/>
    <path d="M108 248 L88 238 L88 258 Z" fill="#B2EBF2" opacity="0.3"/>
    <circle cx="96" cy="248" r="3" fill="#B2EBF2"/>
    <circle cx="96" cy="248" r="1.5" fill="#FFFFFF"/>
  </g>
  <!-- 속도선 -->
  <g opacity="0.5">
    <line x1="50" y1="240" x2="75" y2="240" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="45" y1="248" x2="72" y2="248" stroke="#00E5FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="256" x2="75" y2="256" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 타이틀 텍스트 -->
  <g filter="url(#tTextGlow)">
    <text x="200" y="52" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="bold" fill="url(#tTitleGrad)">NEON DASH RUNNER</text>
  </g>
  <text x="200" y="52" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="bold" fill="#00E5FF" opacity="0.9">NEON DASH RUNNER</text>

  <!-- 부제 -->
  <text x="200" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#B2EBF2" opacity="0.7">네온 대시 러너</text>

  <!-- HUD 시뮬레이션 -->
  <g opacity="0.6">
    <text x="15" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#00E5FF" font-weight="bold">1,250m</text>
    <text x="90" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FFD740" font-weight="bold">⭐ 8,430</text>
    <text x="175" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FF1744">❤❤❤</text>
  </g>
</svg>