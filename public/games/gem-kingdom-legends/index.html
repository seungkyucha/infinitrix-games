/* ═══════════════════════════════════════════════════════════════════
 * [S03] SEEDED RNG — Math.random() 0건 정책
 * ═══════════════════════════════════════════════════════════════════ */
class SeededRNG {
  constructor(seed) { this.seed = seed % 2147483647; if (this.seed <= 0) this.seed += 2147483646; }
  next() { this.seed = (this.seed * 16807) % 2147483647; return (this.seed - 1) / 2147483646; }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this.nextInt(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
}

/* Global RNG — re-seeded per level */
let gRng = new SeededRNG(Date.now());

/* ═══════════════════════════════════════════════════════════════════
 * [S05] LEVEL DEFINITIONS (36 levels, 6 zones × 6 levels)
 * ═══════════════════════════════════════════════════════════════════ */
const LEVELS = [];

function generateLevels() {
  /* Zone 1: Castle Gate (levels 1-6), Zone 2: Garden (7-12), etc. */
  const zoneConfig = [
    { turns: [30,28,27,26,25,25], obs: [OBS.ICE], goals: ['score','collect'] },
    { turns: [28,26,25,24,23,22], obs: [OBS.ICE,OBS.STONE,OBS.CHAIN], goals: ['score','collect','obstacle'] },
    { turns: [25,24,23,22,21,20], obs: [OBS.ICE,OBS.STONE,OBS.CHAIN,OBS.POISON], goals: ['score','collect','obstacle'] },
    { turns: [23,22,21,20,19,18], obs: [OBS.ICE,OBS.STONE,OBS.CHAIN,OBS.POISON,OBS.LOCK], goals: ['score','collect','obstacle','descend'] },
    { turns: [22,21,20,19,18,16], obs: [OBS.ICE,OBS.STONE,OBS.CHAIN,OBS.POISON,OBS.LOCK,OBS.CURSE], goals: ['score','collect','obstacle','descend'] },
    { turns: [20,19,18,17,16,14], obs: [OBS.ICE,OBS.STONE,OBS.CHAIN,OBS.POISON,OBS.LOCK,OBS.CURSE], goals: ['score','collect','obstacle','descend'] },
  ];

  for (let z = 0; z < 6; z++) {
    const zc = zoneConfig[z];
    for (let i = 0; i < 6; i++) {
      const lvl = z * 6 + i + 1;
      const goalType = zc.goals[i % zc.goals.length];
      const targetScore = 500 + lvl * 150;
      const level = {
        id: lvl,
        zone: z,
        turns: zc.turns[i],
        goalType: goalType,
        targetScore: targetScore,
        star2Score: Math.floor(targetScore * 1.5),
        star3Score: Math.floor(targetScore * 2.0),
        collectColor: (lvl - 1) % GEM_COLORS,
        collectCount: 15 + z * 5,
        obstacleCount: Math.min(z * 2 + i, 12),
        obstacleTypes: zc.obs,
        descendGemCount: z >= 3 ? 2 + Math.floor(i / 2) : 0,
        seed: lvl * 7919 + 42,
      };
      LEVELS.push(level);
    }
  }
}
generateLevels();

/* ═══════════════════════════════════════════════════════════════════
 * [S06] GRID / BOARD CORE
 * ═══════════════════════════════════════════════════════════════════ */

/* Cell structure */
function makeCell(color, special, obstacle, obsHp) {
  return {
    color: color,           // 0~5 gem color, -1 = empty
    special: special || SPECIAL.NONE,
    obstacle: obstacle || OBS.NONE,
    obsHp: obsHp || 0,
    locked: false,          // OBS.LOCK
    descend: false,         // descend gem marker
    animY: 0,               // animation offset (gravity)
    animX: 0,               // animation offset (swap)
    animScale: 1.0,
    animAlpha: 1.0,
    selected: false,
    sparkle: 0,             // sparkle timer
    hintGlow: 0,
  };
}

let gGrid = [];   // 2D array [row][col]
let gBoardX = 0;
let gBoardY = 0;
let gCellSize = 0;
let gBoardW = 0;
let gBoardH = 0;

/* Initialize empty grid */
function initGrid() {
  gGrid = [];
  for (let r = 0; r < ROWS; r++) {
    gGrid[r] = [];
    for (let c = 0; c < COLS; c++) {
      gGrid[r][c] = makeCell(-1, SPECIAL.NONE, OBS.NONE, 0);
    }
  }
}

/* Safe grid access */
function safeCell(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return gGrid[r][c];
}

/* Fill board with random gems ensuring no initial 3-match */
function fillBoard(rng, level) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].color >= 0) continue; // skip pre-filled
      let color;
      let attempts = 0;
      do {
        color = rng.nextInt(0, GEM_COLORS - 1);
        attempts++;
      } while (attempts < 50 && wouldMatch3(r, c, color));
      gGrid[r][c].color = color;
    }
  }
}

/* Check if placing color at (r,c) creates a 3-match */
function wouldMatch3(r, c, color) {
  // Horizontal
  let hCount = 1;
  if (c >= 1 && safeCell(r, c - 1) && safeCell(r, c - 1).color === color) {
    hCount++;
    if (c >= 2 && safeCell(r, c - 2) && safeCell(r, c - 2).color === color) hCount++;
  }
  // Vertical
  let vCount = 1;
  if (r >= 1 && safeCell(r - 1, c) && safeCell(r - 1, c).color === color) {
    vCount++;
    if (r >= 2 && safeCell(r - 2, c) && safeCell(r - 2, c).color === color) vCount++;
  }
  return hCount >= 3 || vCount >= 3;
}

/* Place obstacles for a level */
function placeObstacles(rng, level) {
  const count = level.obstacleCount;
  const types = level.obstacleTypes;
  if (!types || types.length === 0 || count === 0) return;
  let placed = 0;
  let attempts = 0;
  while (placed < count && attempts < 200) {
    attempts++;
    const r = rng.nextInt(0, ROWS - 1);
    const c = rng.nextInt(0, COLS - 1);
    const cell = gGrid[r][c];
    if (cell.obstacle !== OBS.NONE) continue;
    const obsType = types[rng.nextInt(0, types.length - 1)];
    cell.obstacle = obsType;
    cell.obsHp = OBS_HP[obsType] || 1;
    if (obsType === OBS.LOCK) cell.locked = true;
    placed++;
  }
}

/* Place descend gems */
function placeDescendGems(rng, level) {
  if (!level.descendGemCount || level.descendGemCount <= 0) return;
  let placed = 0;
  for (let c = 0; c < COLS && placed < level.descendGemCount; c++) {
    if (rng.next() < 0.5) {
      gGrid[0][c].descend = true;
      placed++;
    }
  }
  /* Ensure we placed enough */
  for (let c = 0; c < COLS && placed < level.descendGemCount; c++) {
    if (!gGrid[0][c].descend) {
      gGrid[0][c].descend = true;
      placed++;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S07] MATCH DETECTION — consumed[][] tracking (C44~52)
 * Priority: 5-match → T/L-match → 4-match → 3-match
 * ═══════════════════════════════════════════════════════════════════ */

function createConsumed() {
  const c = [];
  for (let r = 0; r < ROWS; r++) {
    c[r] = [];
    for (let col = 0; col < COLS; col++) c[r][col] = false;
  }
  return c;
}

/* Find all matches with priority ordering, returns array of match groups */
function findMatches() {
  const consumed = createConsumed();
  const matches = [];

  /* Helper: find run at position in direction */
  function findRun(r, c, dr, dc) {
    const color = gGrid[r][c].color;
    if (color < 0) return [];
    const cells = [{ r, c }];
    let nr = r + dr, nc = c + dc;
    while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
      const cell = gGrid[nr][nc];
      if (cell.color !== color || cell.color < 0) break;
      cells.push({ r: nr, c: nc });
      nr += dr; nc += dc;
    }
    return cells;
  }

  /* 1st pass: Find 5-matches (straight line of 5) */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (consumed[r][c] || gGrid[r][c].color < 0) continue;
      // Horizontal 5
      const hRun = findRun(r, c, 0, 1);
      if (hRun.length >= 5) {
        const group = hRun.slice(0, 5);
        if (!group.some(p => consumed[p.r][p.c])) {
          group.forEach(p => consumed[p.r][p.c] = true);
          matches.push({ type: 'match5', cells: group, color: gGrid[r][c].color });
        }
      }
      // Vertical 5
      const vRun = findRun(r, c, 1, 0);
      if (vRun.length >= 5) {
        const group = vRun.slice(0, 5);
        if (!group.some(p => consumed[p.r][p.c])) {
          group.forEach(p => consumed[p.r][p.c] = true);
          matches.push({ type: 'match5', cells: group, color: gGrid[r][c].color });
        }
      }
    }
  }

  /* 2nd pass: T/L matches (5 cells in T or L shape) */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (consumed[r][c] || gGrid[r][c].color < 0) continue;
      const color = gGrid[r][c].color;
      const hRun = findRun(r, c, 0, 1);
      const vRun = findRun(r, c, 1, 0);
      /* Check T/L: 3+ horizontal AND 3+ vertical sharing corner */
      if (hRun.length >= 3 && vRun.length >= 3) {
        const combined = [];
        const seen = new Set();
        for (const p of hRun.concat(vRun)) {
          const key = p.r * COLS + p.c;
          if (!seen.has(key)) { seen.add(key); combined.push(p); }
        }
        if (combined.length >= 5 && !combined.some(p => consumed[p.r][p.c])) {
          combined.forEach(p => consumed[p.r][p.c] = true);
          matches.push({ type: 'matchTL', cells: combined, color });
        }
      }
    }
  }

  /* 3rd pass: 4-matches */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (consumed[r][c] || gGrid[r][c].color < 0) continue;
      const hRun = findRun(r, c, 0, 1).filter(p => !consumed[p.r][p.c]);
      if (hRun.length >= 4) {
        const group = hRun.slice(0, 4);
        group.forEach(p => consumed[p.r][p.c] = true);
        matches.push({ type: 'match4h', cells: group, color: gGrid[r][c].color });
      }
      const vRun = findRun(r, c, 1, 0).filter(p => !consumed[p.r][p.c]);
      if (vRun.length >= 4) {
        const group = vRun.slice(0, 4);
        group.forEach(p => consumed[p.r][p.c] = true);
        matches.push({ type: 'match4v', cells: group, color: gGrid[r][c].color });
      }
    }
  }

  /* 4th pass: 3-matches */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (consumed[r][c] || gGrid[r][c].color < 0) continue;
      const hRun = findRun(r, c, 0, 1).filter(p => !consumed[p.r][p.c]);
      if (hRun.length >= 3) {
        const group = hRun.slice(0, 3);
        group.forEach(p => consumed[p.r][p.c] = true);
        matches.push({ type: 'match3', cells: group, color: gGrid[r][c].color });
      }
      const vRun = findRun(r, c, 1, 0).filter(p => !consumed[p.r][p.c]);
      if (vRun.length >= 3) {
        const group = vRun.slice(0, 3);
        group.forEach(p => consumed[p.r][p.c] = true);
        matches.push({ type: 'match3', cells: group, color: gGrid[r][c].color });
      }
    }
  }

  return matches;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S08] SPECIAL GEM LOGIC
 * ═══════════════════════════════════════════════════════════════════ */

/* Determine what special to create from a match */
function specialFromMatch(match) {
  if (match.type === 'match5') return SPECIAL.RAINBOW;
  if (match.type === 'matchTL') return SPECIAL.BOMB;
  if (match.type === 'match4h') return SPECIAL.LINE_H;
  if (match.type === 'match4v') return SPECIAL.LINE_V;
  return SPECIAL.NONE;
}

/* Activate a special gem: returns list of cells to destroy */
function activateSpecial(r, c, specialType, targetColor) {
  const destroyed = [];
  if (specialType === SPECIAL.LINE_H) {
    for (let col = 0; col < COLS; col++) destroyed.push({ r, c: col });
  } else if (specialType === SPECIAL.LINE_V) {
    for (let row = 0; row < ROWS; row++) destroyed.push({ r: row, c });
  } else if (specialType === SPECIAL.BOMB) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) destroyed.push({ r: nr, c: nc });
      }
    }
  } else if (specialType === SPECIAL.RAINBOW) {
    const color = targetColor >= 0 ? targetColor : gRng.nextInt(0, GEM_COLORS - 1);
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) {
        if (gGrid[rr][cc].color === color) destroyed.push({ r: rr, c: cc });
      }
    }
  }
  return destroyed;
}

/* Special + Special combination effects */
function activateSpecialCombo(r1, c1, r2, c2) {
  const s1 = gGrid[r1][c1].special;
  const s2 = gGrid[r2][c2].special;
  const destroyed = [];
  const isLine = (s) => s === SPECIAL.LINE_H || s === SPECIAL.LINE_V;

  if (isLine(s1) && isLine(s2)) {
    /* Cross: both row + col */
    for (let i = 0; i < COLS; i++) destroyed.push({ r: r1, c: i });
    for (let i = 0; i < ROWS; i++) destroyed.push({ r: i, c: c1 });
  } else if ((isLine(s1) && s2 === SPECIAL.BOMB) || (s1 === SPECIAL.BOMB && isLine(s2))) {
    /* 3 rows centered */
    for (let dr = -1; dr <= 1; dr++) {
      const rr = MathUtil.clamp(r1 + dr, 0, ROWS - 1);
      for (let cc = 0; cc < COLS; cc++) destroyed.push({ r: rr, c: cc });
    }
  } else if (s1 === SPECIAL.BOMB && s2 === SPECIAL.BOMB) {
    /* 5×5 */
    for (let dr = -2; dr <= 2; dr++) {
      for (let dc = -2; dc <= 2; dc++) {
        const nr = r1 + dr, nc = c1 + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) destroyed.push({ r: nr, c: nc });
      }
    }
  } else if ((s1 === SPECIAL.RAINBOW && isLine(s2)) || (isLine(s1) && s2 === SPECIAL.RAINBOW)) {
    /* All of one color → line gems, then activate */
    const color = s1 === SPECIAL.RAINBOW ? gGrid[r2][c2].color : gGrid[r1][c1].color;
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) {
        if (gGrid[rr][cc].color === color) {
          destroyed.push({ r: rr, c: cc });
          /* Also activate as line */
          for (let i = 0; i < COLS; i++) destroyed.push({ r: rr, c: i });
        }
      }
    }
  } else if ((s1 === SPECIAL.RAINBOW && s2 === SPECIAL.BOMB) || (s1 === SPECIAL.BOMB && s2 === SPECIAL.RAINBOW)) {
    /* All of one color → bombs */
    const color = s1 === SPECIAL.RAINBOW ? gGrid[r2][c2].color : gGrid[r1][c1].color;
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) {
        if (gGrid[rr][cc].color === color) {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = rr + dr, nc = cc + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) destroyed.push({ r: nr, c: nc });
            }
          }
        }
      }
    }
  } else if (s1 === SPECIAL.RAINBOW && s2 === SPECIAL.RAINBOW) {
    /* Board clear */
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) destroyed.push({ r: rr, c: cc });
    }
  }
  return destroyed;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S09] OBSTACLE SYSTEM
 * ═══════════════════════════════════════════════════════════════════ */

/* Damage obstacles adjacent to matched cells */
function damageAdjacentObstacles(matchedCells) {
  const damaged = new Set();
  for (const { r, c } of matchedCells) {
    const neighbors = [
      { r: r - 1, c }, { r: r + 1, c }, { r, c: c - 1 }, { r, c: c + 1 }
    ];
    for (const n of neighbors) {
      const cell = safeCell(n.r, n.c);
      if (!cell || cell.obstacle === OBS.NONE) continue;
      const key = n.r * COLS + n.c;
      if (damaged.has(key)) continue;
      damaged.add(key);
      cell.obsHp--;
      if (cell.obsHp <= 0) {
        cell.obstacle = OBS.NONE;
        cell.locked = false;
        gLevelProgress.obstaclesDestroyed++;
      }
    }
  }
}

/* Spread poison (called at end of player turn) */
function spreadPoison() {
  const newPoison = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].obstacle !== OBS.POISON) continue;
      const neighbors = [
        { r: r - 1, c }, { r: r + 1, c }, { r, c: c - 1 }, { r, c: c + 1 }
      ];
      const valid = neighbors.filter(n => {
        const cell = safeCell(n.r, n.c);
        return cell && cell.obstacle === OBS.NONE && cell.color >= 0;
      });
      if (valid.length > 0) {
        const target = valid[gRng.nextInt(0, valid.length - 1)];
        newPoison.push(target);
      }
    }
  }
  for (const p of newPoison) {
    gGrid[p.r][p.c].obstacle = OBS.POISON;
    gGrid[p.r][p.c].obsHp = 1;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S10] CASCADE ENGINE
 * ═══════════════════════════════════════════════════════════════════ */

let gCascadeCount = 0;
let gCascadeTimer = 0;
let gCascadePhase = 'idle'; // idle, removing, falling, checking
const CASCADE_REMOVE_TIME = 200;
const CASCADE_FALL_TIME = 150;

/* Process matches: remove matched gems, create specials, score */
function processMatches(matches) {
  if (matches.length === 0) return false;
  gCascadeCount++;

  for (const match of matches) {
    const specialType = specialFromMatch(match);
    let specialCreated = false;
    const allCells = [...match.cells];

    /* Handle special gem activation within match */
    for (const { r, c } of match.cells) {
      const cell = gGrid[r][c];
      if (cell.special !== SPECIAL.NONE) {
        const extraDestroyed = activateSpecial(r, c, cell.special, cell.color);
        for (const d of extraDestroyed) {
          if (!allCells.some(p => p.r === d.r && p.c === d.c)) {
            allCells.push(d);
          }
        }
        playSpecialSfx(cell.special);
      }
    }

    /* Score calculation */
    let baseScore = 0;
    if (match.type === 'match5') baseScore = SCORE_TABLE.match5;
    else if (match.type === 'matchTL') baseScore = SCORE_TABLE.matchTL;
    else if (match.type.startsWith('match4')) baseScore = SCORE_TABLE.match4;
    else baseScore = SCORE_TABLE.match3;

    const comboMult = Math.min(1.0 + (gCascadeCount - 1) * SCORE_TABLE.comboMultBase, SCORE_TABLE.comboMultMax);
    const matchScore = Math.floor(baseScore * comboMult);
    gLevelProgress.score += matchScore;

    /* Score popup */
    spawnScorePopup(allCells[0].r, allCells[0].c, matchScore, gCascadeCount > 1);

    /* Track gem collection */
    for (const { r, c } of allCells) {
      const cell = safeCell(r, c);
      if (cell && cell.color >= 0) {
        gLevelProgress.gemsCollected[cell.color] = (gLevelProgress.gemsCollected[cell.color] || 0) + 1;
      }
    }

    /* Damage adjacent obstacles */
    damageAdjacentObstacles(allCells);

    /* Create special gem at first match position */
    if (specialType !== SPECIAL.NONE && allCells.length > 0) {
      const spawnPos = allCells[0];
      /* Don't destroy the spawn position yet, mark for special */
      const spawnCell = safeCell(spawnPos.r, spawnPos.c);
      if (spawnCell) {
        spawnCell.special = specialType;
        spawnCell.color = match.color;
        specialCreated = true;
      }
    }

    /* Remove matched gems (except the special spawn position) */
    for (const { r, c } of allCells) {
      const cell = safeCell(r, c);
      if (!cell) continue;
      if (specialCreated && r === allCells[0].r && c === allCells[0].c) continue;
      /* Check descend goal */
      if (cell.descend && r === ROWS - 1) {
        gLevelProgress.descendedGems++;
        cell.descend = false;
      }
      cell.color = -1;
      cell.special = SPECIAL.NONE;
      cell.animAlpha = 0;
    }

    /* Particles */
    if (allCells.length > 0) {
      const px = gBoardX + allCells[0].c * gCellSize + gCellSize / 2;
      const py = gBoardY + allCells[0].r * gCellSize + gCellSize / 2;
      particles.emit(px, py, 8 + allCells.length * 2, {
        color: GEM_HEX[match.color] || '#fff',
        speed: 120, life: 0.6, size: 4
      });
    }
  }

  /* SFX */
  if (gCascadeCount <= 1) playSfxMatch();
  else playSfxCombo(gCascadeCount);

  return true;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S11] GRAVITY & FILL
 * ═══════════════════════════════════════════════════════════════════ */

/* Apply gravity: move gems down into empty cells */
function applyGravity() {
  let moved = false;
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (gGrid[r][c].color >= 0) {
        if (r !== writeRow) {
          /* Copy cell data down */
          const src = gGrid[r][c];
          const dst = gGrid[writeRow][c];
          dst.color = src.color;
          dst.special = src.special;
          dst.descend = src.descend;
          dst.animY = (r - writeRow) * gCellSize * -1;
          src.color = -1;
          src.special = SPECIAL.NONE;
          src.descend = false;
          moved = true;
        }
        writeRow--;
      }
    }
    /* Fill empty cells from top */
    for (let r = writeRow; r >= 0; r--) {
      gGrid[r][c].color = gRng.nextInt(0, GEM_COLORS - 1);
      gGrid[r][c].special = SPECIAL.NONE;
      gGrid[r][c].animY = -(writeRow + 1 - r) * gCellSize;
      gGrid[r][c].animAlpha = 1;
      moved = true;
    }
  }
  return moved;
}

/* Animate gravity (called in CASCADE update) */
function animateGravity(dt) {
  let allDone = true;
  const speed = gCellSize * 8; // pixels per second
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      if (cell.animY < -0.5) {
        cell.animY = Math.min(cell.animY + speed * dt / 1000, 0);
        allDone = false;
      } else if (cell.animY < 0) {
        cell.animY = 0;
      }
      /* Fade in */
      if (cell.animAlpha < 1) {
        cell.animAlpha = Math.min(cell.animAlpha + dt / 150, 1);
      }
    }
  }
  return allDone;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S12] HINT & DEADLOCK
 * ═══════════════════════════════════════════════════════════════════ */

let gHintTimer = 0;
let gHintPair = null;
let gDeadlockTimer = 0;
const HINT_DELAY = 3000;    // ms before showing hint
const DEADLOCK_DELAY = 15000; // ms before auto-shuffle

/* Count valid moves */
function countValidMoves() {
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].locked) continue;
      /* Try swap right */
      if (c + 1 < COLS && !gGrid[r][c + 1].locked) {
        swapCells(r, c, r, c + 1);
        if (findMatches().length > 0) count++;
        swapCells(r, c, r, c + 1);
        if (count > 0) return count;
      }
      /* Try swap down */
      if (r + 1 < ROWS && !gGrid[r + 1][c].locked) {
        swapCells(r, c, r + 1, c);
        if (findMatches().length > 0) count++;
        swapCells(r, c, r + 1, c);
        if (count > 0) return count;
      }
    }
  }
  return count;
}

/* Find first valid move for hint */
function findHintMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].locked) continue;
      if (c + 1 < COLS && !gGrid[r][c + 1].locked) {
        swapCells(r, c, r, c + 1);
        if (findMatches().length > 0) { swapCells(r, c, r, c + 1); return [{ r, c }, { r, c: c + 1 }]; }
        swapCells(r, c, r, c + 1);
      }
      if (r + 1 < ROWS && !gGrid[r + 1][c].locked) {
        swapCells(r, c, r + 1, c);
        if (findMatches().length > 0) { swapCells(r, c, r + 1, c); return [{ r, c }, { r: r + 1, c }]; }
        swapCells(r, c, r + 1, c);
      }
    }
  }
  return null;
}

/* Swap two cells (data only) */
function swapCells(r1, c1, r2, c2) {
  const a = gGrid[r1][c1];
  const b = gGrid[r2][c2];
  const tmp = { color: a.color, special: a.special, descend: a.descend, locked: a.locked, obstacle: a.obstacle, obsHp: a.obsHp };
  a.color = b.color; a.special = b.special; a.descend = b.descend; a.locked = b.locked; a.obstacle = b.obstacle; a.obsHp = b.obsHp;
  b.color = tmp.color; b.special = tmp.special; b.descend = tmp.descend; b.locked = tmp.locked; b.obstacle = tmp.obstacle; b.obsHp = tmp.obsHp;
}

/* Shuffle board (deadlock resolution) */
function shuffleBoard() {
  const gems = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].color >= 0 && gGrid[r][c].obstacle === OBS.NONE) {
        gems.push({ color: gGrid[r][c].color, special: gGrid[r][c].special, descend: gGrid[r][c].descend });
      }
    }
  }
  gRng.shuffle(gems);
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].color >= 0 && gGrid[r][c].obstacle === OBS.NONE && idx < gems.length) {
        gGrid[r][c].color = gems[idx].color;
        gGrid[r][c].special = gems[idx].special;
        gGrid[r][c].descend = gems[idx].descend;
        idx++;
      }
    }
  }
  /* Re-check: if still deadlocked, regenerate entire board */
  if (countValidMoves() === 0) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (gGrid[r][c].obstacle === OBS.NONE) {
          gGrid[r][c].color = gRng.nextInt(0, GEM_COLORS - 1);
          gGrid[r][c].special = SPECIAL.NONE;
        }
      }
    }
  }
  gHintTimer = 0;
  gHintPair = null;
  gDeadlockTimer = 0;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S13] BOOSTER SYSTEM
 * ═══════════════════════════════════════════════════════════════════ */

let gActiveBooster = -1;  // which booster is selected (-1 = none)
let gBoosterPhase = 'none'; // none, selecting, swap_first, swap_second

function useBooster(type) {
  if (gSave.boosters[type] <= 0) return false;
  gActiveBooster = type;
  if (type === BOOSTER.HAMMER) gBoosterPhase = 'selecting';
  else if (type === BOOSTER.SWAP) gBoosterPhase = 'swap_first';
  else if (type === BOOSTER.SHUFFLE) {
    gSave.boosters[type]--;
    shuffleBoard();
    playSfxMatch();
    gActiveBooster = -1;
    gBoosterPhase = 'none';
    saveSave();
    return true;
  } else if (type === BOOSTER.EXTRA_TURN) {
    gSave.boosters[type]--;
    gLevelProgress.turnsLeft += 5;
    gActiveBooster = -1;
    gBoosterPhase = 'none';
    saveSave();
    return true;
  }
  return true;
}

function handleBoosterTap(r, c) {
  if (gActiveBooster === BOOSTER.HAMMER) {
    gSave.boosters[BOOSTER.HAMMER]--;
    const cell = gGrid[r][c];
    if (cell.special !== SPECIAL.NONE) {
      /* Activate special */
      const destroyed = activateSpecial(r, c, cell.special, cell.color);
      for (const d of destroyed) {
        const dc = safeCell(d.r, d.c);
        if (dc) { dc.color = -1; dc.special = SPECIAL.NONE; }
      }
      playSpecialSfx(cell.special);
    } else if (cell.obstacle !== OBS.NONE) {
      cell.obsHp--;
      if (cell.obsHp <= 0) { cell.obstacle = OBS.NONE; cell.locked = false; gLevelProgress.obstaclesDestroyed++; }
    } else {
      cell.color = -1;
      cell.special = SPECIAL.NONE;
    }
    gActiveBooster = -1;
    gBoosterPhase = 'none';
    beginCascade();
    saveSave();
    return true;
  }
  return false;
}

let gSwapFirst = null;

function handleBoosterSwapTap(r, c) {
  if (gBoosterPhase === 'swap_first') {
    gSwapFirst = { r, c };
    gBoosterPhase = 'swap_second';
    gGrid[r][c].selected = true;
    return true;
  } else if (gBoosterPhase === 'swap_second') {
    gSave.boosters[BOOSTER.SWAP]--;
    swapCells(gSwapFirst.r, gSwapFirst.c, r, c);
    gGrid[gSwapFirst.r][gSwapFirst.c].selected = false;
    gActiveBooster = -1;
    gBoosterPhase = 'none';
    gSwapFirst = null;
    beginCascade();
    saveSave();
    return true;
  }
  return false;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S14] DDA (Dynamic Difficulty Adjustment)
 * ═══════════════════════════════════════════════════════════════════ */

const DDA_CONFIG = {
  EASY:   { failStreak: 3, turnBonus: 3, spawnSpecialChance: 0.15 },
  NORMAL: { failStreak: 0, turnBonus: 0, spawnSpecialChance: 0.05 },
  HARD:   { failStreak: -3, turnBonus: -2, spawnSpecialChance: 0.02 },
};

function getDDALevel(levelId) {
  const streak = gSave.failStreak[levelId] || 0;
  if (streak >= 3) return 'EASY';
  if (streak <= -3) return 'HARD';
  return 'NORMAL';
}

function getDDATurnBonus(levelId) {
  const dda = getDDALevel(levelId);
  const bonus = DDA_CONFIG[dda].turnBonus;
  /* Building Tower bonus */
  const towerLevel = gSave.buildings[BUILDING.TOWER];
  return bonus + towerLevel;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S15] AI ENGINE — 4-level behavior model
 * ═══════════════════════════════════════════════════════════════════ */

/* AI finds the best move from the grid (used for hints and guild raid) */
function aiFindMove(aiLevel) {
  const moves = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].locked || gGrid[r][c].color < 0) continue;
      const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }];
      for (const { dr, dc } of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr >= ROWS || nc >= COLS) continue;
        if (gGrid[nr][nc].locked || gGrid[nr][nc].color < 0) continue;
        swapCells(r, c, nr, nc);
        const matches = findMatches();
        const score = evaluateMove(matches, aiLevel);
        swapCells(r, c, nr, nc);
        if (matches.length > 0) moves.push({ r1: r, c1: c, r2: nr, c2: nc, score });
      }
    }
  }
  if (moves.length === 0) return null;
  moves.sort((a, b) => b.score - a.score);
  /* AI level determines randomness */
  const topN = aiLevel >= 3 ? 1 : aiLevel >= 2 ? 3 : 5;
  const pick = gRng.nextInt(0, Math.min(topN - 1, moves.length - 1));
  return moves[pick];
}

function evaluateMove(matches, aiLevel) {
  let score = 0;
  const weights = aiLevel >= 4 ? { score: 0.3, special: 0.5, obstacle: 0.2 }
    : aiLevel >= 3 ? { score: 0.2, special: 0.5, obstacle: 0.3 }
    : aiLevel >= 2 ? { score: 0.3, special: 0.6, obstacle: 0.1 }
    : { score: 0.9, special: 0.1, obstacle: 0.0 };

  for (const m of matches) {
    let base = m.type === 'match5' ? 5 : m.type === 'matchTL' ? 4 : m.type.startsWith('match4') ? 3 : 2;
    score += base * weights.score;
    if (specialFromMatch(m) !== SPECIAL.NONE) score += 3 * weights.special;
    /* Count adjacent obstacles */
    for (const { r, c } of m.cells) {
      const nbrs = [{ r: r - 1, c }, { r: r + 1, c }, { r, c: c - 1 }, { r, c: c + 1 }];
      for (const n of nbrs) {
        const cell = safeCell(n.r, n.c);
        if (cell && cell.obstacle !== OBS.NONE) score += 2 * weights.obstacle;
      }
    }
  }
  return score;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S16] KINGDOM BUILDING
 * ═══════════════════════════════════════════════════════════════════ */

let gKingdomScroll = 0;
let gKingdomBuildAnim = -1;
let gKingdomBuildTimer = 0;

function canBuild(buildingId) {
  const level = gSave.buildings[buildingId];
  if (level >= 3) return false;
  const cost = BUILDING_COSTS[buildingId][level];
  return gSave.totalStars >= cost;
}

function buildBuilding(buildingId) {
  const level = gSave.buildings[buildingId];
  if (level >= 3) return false;
  const cost = BUILDING_COSTS[buildingId][level];
  if (gSave.totalStars < cost) return false;
  gSave.totalStars -= cost;
  gSave.buildings[buildingId]++;
  gKingdomBuildAnim = buildingId;
  gKingdomBuildTimer = 0;
  saveSave();
  playSfxBuild();
  return true;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S17] SEASON PASS
 * ═══════════════════════════════════════════════════════════════════ */

const SEASON_MAX_TIER = 30;
const SEASON_XP_PER_TIER = 100;
const SEASON_DURATION_MS = 7 * 24 * 60 * 60 * 1000; // 7 days

const SEASON_REWARDS_FREE = [];
const SEASON_REWARDS_PREMIUM = [];

function initSeasonRewards() {
  for (let i = 0; i < SEASON_MAX_TIER; i++) {
    const tier = i + 1;
    if (tier % 5 === 0) {
      SEASON_REWARDS_FREE.push({ type: 'booster', id: (tier / 5 - 1) % 4, count: 2 });
      SEASON_REWARDS_PREMIUM.push({ type: 'booster', id: (tier / 5 - 1) % 4, count: 5 });
    } else {
      SEASON_REWARDS_FREE.push({ type: 'gems', count: 100 + tier * 20 });
      SEASON_REWARDS_PREMIUM.push({ type: 'gems', count: 300 + tier * 30 });
    }
  }
}
initSeasonRewards();

function addSeasonXP(amount) {
  /* Building Market bonus */
  const marketLevel = gSave.buildings[BUILDING.MARKET];
  const bonus = 1.0 + marketLevel * 0.1;
  gSave.seasonXP += Math.floor(amount * bonus);
  while (gSave.seasonXP >= SEASON_XP_PER_TIER && gSave.seasonTier < SEASON_MAX_TIER) {
    gSave.seasonXP -= SEASON_XP_PER_TIER;
    gSave.seasonTier++;
  }
  saveSave();
}

function getSeasonDaysLeft() {
  const elapsed = Date.now() - gSave.seasonStart;
  return Math.max(0, Math.ceil((SEASON_DURATION_MS - elapsed) / (24 * 60 * 60 * 1000)));
}

function checkSeasonExpiry() {
  if (Date.now() - gSave.seasonStart > SEASON_DURATION_MS) {
    gSave.seasonXP = 0;
    gSave.seasonTier = 0;
    gSave.seasonStart = Date.now();
    saveSave();
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S18] GUILD RAID / BOSS
 * ═══════════════════════════════════════════════════════════════════ */

const BOSS_MAX_HP = 5000;
const BOSS_TURN_LIMIT = 30;
const GUILD_MEMBERS = ['charKnight', 'charWizard', 'charHealer'];
const GUILD_NAMES = ['기사', '마법사', '치유사'];

let gRaidState = {
  bossHp: BOSS_MAX_HP,
  bossTurn: 0,
  currentTurn: 0, // 0=player, 1~3=guild members, 4=boss
  turnCount: 0,
  guildDamage: [0, 0, 0],
  playerDamage: 0,
  bossAttackAnim: 0,
  introPlayed: false,
};

function initRaid() {
  gRaidState = {
    bossHp: BOSS_MAX_HP,
    bossTurn: 0,
    currentTurn: 0,
    turnCount: 0,
    guildDamage: [0, 0, 0],
    playerDamage: 0,
    bossAttackAnim: 0,
    introPlayed: false,
  };
}

function bossAttack() {
  const hpPct = gRaidState.bossHp / BOSS_MAX_HP;
  let obstacleCount = 3;
  let types = [OBS.ICE];

  if (hpPct <= 0.1) {
    obstacleCount = 7;
    types = [OBS.ICE, OBS.STONE, OBS.CHAIN, OBS.POISON, OBS.LOCK];
  } else if (hpPct <= 0.4) {
    obstacleCount = 5;
    types = [OBS.POISON, OBS.CURSE];
  } else if (hpPct <= 0.7) {
    obstacleCount = 4;
    types = [OBS.STONE, OBS.CHAIN];
  }

  let placed = 0;
  let attempts = 0;
  while (placed < obstacleCount && attempts < 100) {
    attempts++;
    const r = gRng.nextInt(0, ROWS - 1);
    const c = gRng.nextInt(0, COLS - 1);
    if (gGrid[r][c].obstacle !== OBS.NONE) continue;
    const obsType = types[gRng.nextInt(0, types.length - 1)];
    gGrid[r][c].obstacle = obsType;
    gGrid[r][c].obsHp = OBS_HP[obsType] || 1;
    if (obsType === OBS.LOCK) gGrid[r][c].locked = true;
    placed++;
  }
  gRaidState.bossAttackAnim = 1.0;
  playSfxBossAttack();
}

function guildMemberTurn(memberIdx) {
  const aiLevel = 2 + Math.floor(memberIdx / 2);
  const move = aiFindMove(aiLevel);
  if (move) {
    swapCells(move.r1, move.c1, move.r2, move.c2);
    const matches = findMatches();
    let damage = 0;
    for (const m of matches) {
      damage += m.cells.length * 10;
    }
    processMatches(matches);
    gRaidState.guildDamage[memberIdx] += damage;
    gRaidState.bossHp = Math.max(0, gRaidState.bossHp - damage);
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S19] SCORE POPUPS & OBJECT POOL
 * ═══════════════════════════════════════════════════════════════════ */

const POPUP_POOL_SIZE = 30;
const gPopups = [];

function spawnScorePopup(row, col, score, isCombo) {
  const x = gBoardX + col * gCellSize + gCellSize / 2;
  const y = gBoardY + row * gCellSize;
  const popup = {
    x, y, score, isCombo,
    alpha: 1.0, vy: -60, life: 1.2, maxLife: 1.2, scale: isCombo ? 1.3 : 1.0
  };
  if (gPopups.length < POPUP_POOL_SIZE) gPopups.push(popup);
}

function updatePopups(dt) {
  const dtSec = dt / 1000;
  for (let i = gPopups.length - 1; i >= 0; i--) {
    const p = gPopups[i];
    p.y += p.vy * dtSec;
    p.life -= dtSec;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) gPopups.splice(i, 1);
  }
}

function renderPopups(ctx, w, h) {
  for (const p of gPopups) {
    const size = Layout.fontSize(16, w, h) * p.scale;
    ctx.globalAlpha = p.alpha;
    ctx.font = 'bold ' + size + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = p.isCombo ? '#FFD700' : '#FFF';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8;
    ctx.fillText('+' + p.score, p.x, p.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

/* BGM — procedural using dt-based timer (no setInterval!) */
let gBgmTimer = 0;
let gBgmEnabled = true;
const BGM_INTERVAL = 2000; // ms between notes
const BGM_THEMES = {
  main: [523, 587, 659, 698, 784, 698, 659, 587],
  boss: [294, 330, 349, 392, 349, 330, 294, 262],
  kingdom: [349, 392, 440, 523, 440, 392, 349, 523],
};

let gCurrentBgm = 'main';
let gBgmNoteIdx = 0;

function updateBgm(dt) {
  if (!gBgmEnabled || !sound._ctx) return;
  gBgmTimer += dt;
  if (gBgmTimer >= BGM_INTERVAL) {
    gBgmTimer -= BGM_INTERVAL;
    const theme = BGM_THEMES[gCurrentBgm] || BGM_THEMES.main;
    const freq = theme[gBgmNoteIdx % theme.length];
    sound.tone(freq, 0.4, 'sine', gSave.bgmVol * 0.15);
    sound.tone(freq / 2, 0.6, 'sine', gSave.bgmVol * 0.08);
    gBgmNoteIdx++;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S21] BACKGROUND RENDERER
 * ═══════════════════════════════════════════════════════════════════ */

let gBgCache = null;
let gBgCacheW = 0;
let gBgCacheH = 0;

function drawBackground(ctx, w, h, bgKey) {
  /* Try asset first */
  if (assets.sprites[bgKey]) {
    ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
    return;
  }
  /* Fallback: gradient */
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#B8E6B8');
  grad.addColorStop(1, '#2ECC71');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  /* Clouds */
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 5; i++) {
    const cx = (i * w / 5 + gTimestamp * 0.01) % (w + 100) - 50;
    const cy = h * 0.1 + i * h * 0.05;
    ctx.beginPath();
    ctx.arc(cx, cy, w * 0.04, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.03, cy - w * 0.01, w * 0.03, 0, Math.PI * 2);
    ctx.arc(cx - w * 0.02, cy + w * 0.005, w * 0.025, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* Draw a dark overlay for UI screens */
function drawDarkOverlay(ctx, w, h, alpha) {
  ctx.fillStyle = 'rgba(26,35,126,' + alpha + ')';
  ctx.fillRect(0, 0, w, h);
}

/* Draw a gold framed panel */
function drawPanel(ctx, x, y, pw, ph, opts) {
  const { radius = 12, bgColor = 'rgba(26,35,126,0.9)', borderColor = PAL.gold } = opts || {};
  ctx.save();
  ctx.fillStyle = bgColor;
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(x, y, pw, ph, radius);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════
 * [S22] BOARD RENDERER
 * ═══════════════════════════════════════════════════════════════════ */

function calcBoardLayout(w, h) {
  const safe = Layout.safeArea(w, h);
  const hudH = Layout.hud(w, h).top.h;
  const boosterH = Math.max(50, h * 0.08);
  const availH = safe.h - hudH - boosterH - 20;
  const availW = safe.w * 0.95;
  const grid = Layout.grid(COLS, ROWS, availW, availH);
  gCellSize = grid.cellSize;
  gBoardW = grid.totalW;
  gBoardH = grid.totalH;
  gBoardX = (w - gBoardW) / 2;
  gBoardY = hudH + 10 + (availH - gBoardH) / 2 + safe.y;
}

function renderBoard(ctx, w, h) {
  calcBoardLayout(w, h);

  /* Board frame — use uiBoardFrame asset if available */
  if (assets.sprites.uiBoardFrame) {
    const framePad = gCellSize * 0.3;
    ctx.drawImage(assets.sprites.uiBoardFrame, gBoardX - framePad, gBoardY - framePad, gBoardW + framePad * 2, gBoardH + framePad * 2);
  } else {
    drawPanel(ctx, gBoardX - 4, gBoardY - 4, gBoardW + 8, gBoardH + 8, { bgColor: 'rgba(10,10,30,0.6)', borderColor: PAL.gold });
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      const x = gBoardX + c * gCellSize + cell.animX;
      const y = gBoardY + r * gCellSize + cell.animY;
      const size = gCellSize - 2;

      /* Cell background */
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
      ctx.fillRect(x + 1, y + 1, size, size);

      /* Obstacle layer (behind gem) */
      if (cell.obstacle !== OBS.NONE) {
        renderObstacle(ctx, cell, x + 1, y + 1, size);
      }

      /* Gem */
      if (cell.color >= 0) {
        ctx.globalAlpha = cell.animAlpha;
        const gemPad = size * 0.08;
        const gemSize = size - gemPad * 2;
        const gemX = x + 1 + gemPad;
        const gemY = y + 1 + gemPad;

        /* Draw gem asset or fallback */
        drawGem(ctx, cell.color, gemX, gemY, gemSize, gemSize);

        /* Special overlay */
        if (cell.special !== SPECIAL.NONE) {
          drawSpecialOverlay(ctx, cell.special, gemX, gemY, gemSize, gemSize);
        }

        /* Descend marker */
        if (cell.descend) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(gemX + gemSize * 0.3, gemY + gemSize * 0.6);
          ctx.lineTo(gemX + gemSize * 0.5, gemY + gemSize * 0.9);
          ctx.lineTo(gemX + gemSize * 0.7, gemY + gemSize * 0.6);
          ctx.stroke();
        }

        /* Selection highlight */
        if (cell.selected) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 3;
          ctx.strokeRect(x, y, gCellSize, gCellSize);
        }

        /* Hint glow */
        if (cell.hintGlow > 0) {
          ctx.fillStyle = 'rgba(255,215,0,' + (cell.hintGlow * 0.3) + ')';
          ctx.fillRect(x + 1, y + 1, size, size);
        }

        /* Lock overlay */
        if (cell.locked) {
          drawObstacleLockOverlay(ctx, x + 1, y + 1, size);
        }

        ctx.globalAlpha = 1;
      }
    }
  }
}

/* Draw gem with asset or canvas fallback */
function drawGem(ctx, colorIdx, x, y, w, h) {
  const assetKey = GEM_ASSET_KEYS[colorIdx];
  if (assets.sprites[assetKey]) {
    ctx.drawImage(assets.sprites[assetKey], x, y, w, h);
  } else {
    drawGemFallback(ctx, colorIdx, x, y, w, h);
  }
}

/* Canvas fallback gem shapes (C50~52 pattern) */
function drawGemFallback(ctx, colorIdx, x, y, w, h) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  const r = Math.min(w, h) * 0.4;
  const color = GEM_HEX[colorIdx];

  ctx.save();
  /* Gradient fill */
  const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, r * 0.1, cx, cy, r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, color);
  grad.addColorStop(1, color + '88');
  ctx.fillStyle = grad;

  ctx.beginPath();
  switch (colorIdx) {
    case GEM.RED: // Heart / Diamond
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      break;
    case GEM.BLUE: // Oval
      ctx.ellipse(cx, cy, r * 0.75, r, 0, 0, Math.PI * 2);
      break;
    case GEM.GREEN: // Square (emerald cut)
      ctx.roundRect(cx - r * 0.75, cy - r * 0.75, r * 1.5, r * 1.5, r * 0.15);
      break;
    case GEM.YELLOW: // Star
      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + i * Math.PI * 2 / 5;
        const innerAngle = angle + Math.PI / 5;
        ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        ctx.lineTo(cx + Math.cos(innerAngle) * r * 0.5, cy + Math.sin(innerAngle) * r * 0.5);
      }
      break;
    case GEM.PURPLE: // Circle (brilliant cut)
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      break;
    case GEM.ORANGE: // Drop
      ctx.moveTo(cx, cy - r);
      ctx.quadraticCurveTo(cx + r, cy, cx, cy + r);
      ctx.quadraticCurveTo(cx - r, cy, cx, cy - r);
      break;
  }
  ctx.closePath();
  ctx.fill();

  /* Glossy highlight */
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(cx, cy - r * 0.3, r * 0.5, r * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* Draw special gem overlay */
function drawSpecialOverlay(ctx, specialType, x, y, w, h) {
  const assetKey = SPECIAL_ASSET[specialType];
  if (assetKey && assets.sprites[assetKey]) {
    ctx.globalAlpha = 0.8;
    ctx.drawImage(assets.sprites[assetKey], x, y, w, h);
    ctx.globalAlpha = 1;
    return;
  }
  /* Fallback */
  ctx.save();
  const cx = x + w / 2, cy = y + h / 2;
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 6;
  if (specialType === SPECIAL.LINE_H) {
    ctx.beginPath(); ctx.moveTo(x + 2, cy); ctx.lineTo(x + w - 2, cy); ctx.stroke();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.moveTo(x + 2, cy); ctx.lineTo(x + 8, cy - 4); ctx.lineTo(x + 8, cy + 4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + w - 2, cy); ctx.lineTo(x + w - 8, cy - 4); ctx.lineTo(x + w - 8, cy + 4); ctx.fill();
  } else if (specialType === SPECIAL.LINE_V) {
    ctx.beginPath(); ctx.moveTo(cx, y + 2); ctx.lineTo(cx, y + h - 2); ctx.stroke();
  } else if (specialType === SPECIAL.BOMB) {
    ctx.beginPath(); ctx.arc(cx, cy, w * 0.3, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - w * 0.3); ctx.lineTo(cx + 3, cy - w * 0.45); ctx.stroke();
  } else if (specialType === SPECIAL.RAINBOW) {
    const colors = ['#E53935', '#FDD835', '#43A047', '#1E88E5', '#8E24AA', '#FB8C00'];
    for (let i = 0; i < 6; i++) {
      ctx.strokeStyle = colors[i];
      ctx.beginPath();
      ctx.arc(cx, cy, w * 0.25 + i * 2, i * Math.PI / 3, i * Math.PI / 3 + Math.PI / 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

/* Render obstacle on cell */
function renderObstacle(ctx, cell, x, y, size) {
  const obsType = cell.obstacle;
  const assetKey = OBS_ASSET[obsType];

  /* For multi-frame assets (stone, curse) */
  if (assetKey && assets.sprites[assetKey]) {
    if (obsType === OBS.STONE) {
      /* Stone: 2 frames (256x128, each 128x128) */
      const frame = cell.obsHp <= 1 ? 1 : 0;
      const img = assets.sprites[assetKey];
      ctx.globalAlpha = 0.8;
      ctx.drawImage(img, frame * 128, 0, 128, 128, x, y, size, size);
      ctx.globalAlpha = 1;
    } else if (obsType === OBS.CURSE) {
      /* Curse: 3 frames (384x128, each 128x128) */
      const frame = MathUtil.clamp(3 - cell.obsHp, 0, 2);
      const img = assets.sprites[assetKey];
      ctx.globalAlpha = 0.8;
      ctx.drawImage(img, frame * 128, 0, 128, 128, x, y, size, size);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.7;
      ctx.drawImage(assets.sprites[assetKey], x, y, size, size);
      ctx.globalAlpha = 1;
    }
    return;
  }

  /* Fallback */
  ctx.save();
  ctx.globalAlpha = 0.6;
  switch (obsType) {
    case OBS.ICE:
      ctx.fillStyle = 'rgba(135,206,250,0.5)';
      ctx.fillRect(x, y, size, size);
      ctx.strokeStyle = '#ADD8E6'; ctx.lineWidth = 1; ctx.strokeRect(x, y, size, size);
      break;
    case OBS.STONE:
      ctx.fillStyle = '#777';
      ctx.fillRect(x, y, size, size);
      if (cell.obsHp <= 1) {
        ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + size * 0.2, y); ctx.lineTo(x + size * 0.6, y + size); ctx.stroke();
      }
      break;
    case OBS.CHAIN:
      ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + size, y + size); ctx.moveTo(x + size, y); ctx.lineTo(x, y + size); ctx.stroke();
      break;
    case OBS.POISON:
      ctx.fillStyle = 'rgba(128,0,128,0.4)';
      ctx.fillRect(x, y, size, size);
      ctx.fillStyle = '#800080';
      ctx.beginPath(); ctx.arc(x + size / 2, y + size / 2, size * 0.15, 0, Math.PI * 2); ctx.fill();
      break;
    case OBS.LOCK:
      drawObstacleLockOverlay(ctx, x, y, size);
      break;
    case OBS.CURSE:
      ctx.strokeStyle = '#4A0080'; ctx.lineWidth = 2;
      for (let i = 0; i < cell.obsHp; i++) {
        ctx.beginPath(); ctx.arc(x + size / 2, y + size / 2, size * (0.25 + i * 0.1), 0, Math.PI * 2); ctx.stroke();
      }
      break;
  }
  ctx.restore();
}

function drawObstacleLockOverlay(ctx, x, y, size) {
  ctx.fillStyle = 'rgba(255,215,0,0.3)';
  ctx.fillRect(x, y, size, size);
  ctx.fillStyle = '#FFD700';
  const lw = size * 0.3, lh = size * 0.25;
  const lx = x + (size - lw) / 2, ly = y + size * 0.55;
  ctx.fillRect(lx, ly, lw, lh);
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x + size / 2, ly, lw * 0.4, Math.PI, 0); ctx.stroke();
}

/* ═══════════════════════════════════════════════════════════════════
 * [S23] HUD RENDERER
 * ═══════════════════════════════════════════════════════════════════ */

function renderHUD(ctx, w, h) {
  const hud = Layout.hud(w, h);
  const s = Layout.scale(w, h);
  const fs = hud.fontSize;

  /* Top bar background */
  drawPanel(ctx, 0, 0, w, hud.top.h, { bgColor: 'rgba(26,35,126,0.85)', borderColor: 'transparent', radius: 0 });

  /* Level info */
  ctx.font = 'bold ' + fs + 'px ' + FONT;
  ctx.textAlign = 'left';
  ctx.fillStyle = PAL.cream;
  ctx.fillText('Lv.' + gCurrentLevel, hud.padding, hud.top.h / 2 + 2);

  /* Zone name */
  const zoneIdx = Math.floor((gCurrentLevel - 1) / 6);
  ctx.font = (fs - 2) + 'px ' + FONT;
  ctx.fillStyle = PAL.textSecondary;
  ctx.fillText(ZONE_NAMES[zoneIdx] || '', hud.padding + 60 * s, hud.top.h / 2 + 2);

  /* Score */
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.gold;
  ctx.font = 'bold ' + fs + 'px ' + FONT;
  ctx.fillText(gLevelProgress.score.toLocaleString(), w / 2, hud.top.h / 2 + 2);

  /* Turns left — use uiTurnCounter asset as background badge */
  ctx.textAlign = 'right';
  const turnCounterSize = Math.max(28, 36 * s);
  const turnX = w - hud.padding - turnCounterSize / 2;
  const turnY = hud.top.h / 2;
  if (assets.sprites.uiTurnCounter) {
    ctx.drawImage(assets.sprites.uiTurnCounter, turnX - turnCounterSize / 2, turnY - turnCounterSize / 2, turnCounterSize, turnCounterSize);
  }
  ctx.fillStyle = gLevelProgress.turnsLeft <= 3 ? '#E53935' : PAL.cream;
  ctx.fillText('♦ ' + gLevelProgress.turnsLeft, w - hud.padding, hud.top.h / 2 + 2);

  /* Goal progress bar below HUD — use uiScoreBar asset if available */
  const barY = hud.top.h + 2;
  const barH = Math.max(6 * s, 10);
  const progress = getLevelGoalProgress();
  if (assets.sprites.uiScoreBar) {
    ctx.drawImage(assets.sprites.uiScoreBar, 0, barY, w, barH);
    ctx.fillStyle = progress >= 1.0 ? 'rgba(67,160,71,0.8)' : 'rgba(30,136,229,0.8)';
    ctx.fillRect(0, barY, w * Math.min(1, progress), barH);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, barY, w, barH);
    ctx.fillStyle = progress >= 1.0 ? '#43A047' : '#1E88E5';
    ctx.fillRect(0, barY, w * Math.min(1, progress), barH);
  }

  /* Star markers on progress bar */
  const level = LEVELS[gCurrentLevel - 1];
  if (level) {
    const star2Pct = level.star2Score / level.star3Score;
    const star3Pct = 1.0;
    for (const pct of [0.5, star2Pct, star3Pct]) {
      ctx.fillStyle = (gLevelProgress.score / level.star3Score) >= pct ? '#FFD700' : '#555';
      ctx.font = Math.max(8, 12 * s) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText('★', w * Math.min(1, pct), barY + barH + Math.max(8, 10 * s));
    }
  }
}

/* Goal text */
function getLevelGoalText() {
  const level = LEVELS[gCurrentLevel - 1];
  if (!level) return '';
  switch (level.goalType) {
    case 'score': return '점수 ' + level.targetScore.toLocaleString() + ' 달성';
    case 'collect': return GEM_NAMES[level.collectColor] + ' ' + level.collectCount + '개 수집';
    case 'obstacle': return '장애물 ' + level.obstacleCount + '개 제거';
    case 'descend': return '보석 ' + level.descendGemCount + '개 하강';
    default: return '';
  }
}

function getLevelGoalProgress() {
  const level = LEVELS[gCurrentLevel - 1];
  if (!level) return 0;
  switch (level.goalType) {
    case 'score': return gLevelProgress.score / level.targetScore;
    case 'collect': return (gLevelProgress.gemsCollected[level.collectColor] || 0) / level.collectCount;
    case 'obstacle': return gLevelProgress.obstaclesDestroyed / Math.max(1, level.obstacleCount);
    case 'descend': return gLevelProgress.descendedGems / Math.max(1, level.descendGemCount);
    default: return 0;
  }
}

/* Render boosters at bottom */
function renderBoosters(ctx, w, h) {
  const s = Layout.scale(w, h);
  const btnSize = Math.max(MIN_TOUCH, 48 * s);
  const gap = 10 * s;
  const totalW = 4 * btnSize + 3 * gap;
  const startX = (w - totalW) / 2;
  const y = h - btnSize - Math.max(10, 15 * s);

  for (let i = 0; i < 4; i++) {
    const x = startX + i * (btnSize + gap);
    const isActive = gActiveBooster === i;

    /* Button background */
    ctx.fillStyle = isActive ? 'rgba(255,215,0,0.3)' : 'rgba(26,35,126,0.7)';
    ctx.strokeStyle = isActive ? PAL.gold : 'rgba(255,215,0,0.3)';
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(x, y, btnSize, btnSize, 8);
    ctx.fill();
    ctx.stroke();

    /* Booster icon */
    const assetKey = BOOSTER_ASSET[i];
    if (assets.sprites[assetKey]) {
      ctx.drawImage(assets.sprites[assetKey], x + 4, y + 4, btnSize - 8, btnSize - 8);
    } else {
      ctx.font = 'bold ' + Math.max(10, 12 * s) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillStyle = PAL.cream;
      ctx.fillText(BOOSTER_NAMES[i], x + btnSize / 2, y + btnSize / 2);
    }

    /* Count badge */
    const count = gSave.boosters[i];
    ctx.fillStyle = count > 0 ? '#43A047' : '#E53935';
    ctx.beginPath();
    ctx.arc(x + btnSize - 6, y + 6, 10 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = 'bold ' + Math.max(8, 10 * s) + 'px ' + FONT;
    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'center';
    ctx.fillText('' + count, x + btnSize - 6, y + 6 + 3);
  }

  /* Store layout for touch hit testing */
  gBoosterLayout = { startX, y, btnSize, gap };
}

let gBoosterLayout = null;

function getBoosterAtTap(tapX, tapY) {
  if (!gBoosterLayout) return -1;
  const { startX, y, btnSize, gap } = gBoosterLayout;
  for (let i = 0; i < 4; i++) {
    const bx = startX + i * (btnSize + gap);
    if (UI.hitTest(tapX, tapY, bx, y, btnSize, btnSize)) return i;
  }
  return -1;
}

 * [S24] STATE HANDLERS — update + render per state

/* --- Shared game variables (declared BEFORE engine, TDZ safe) --- */
let gCurrentLevel = 1;
let gLevelProgress = {
  score: 0, turnsLeft: 0, gemsCollected: {},
  obstaclesDestroyed: 0, descendedGems: 0,
};
let gSelectedCell = null;
let gSwapAnimating = false;
let gDragStart = null;
let gDragCell = null;
let gTimestamp = 0;
let gTitleAlpha = 0;
let gTitleReady = false;
let gBootProgress = 0;
let gLevelSelectScroll = 0;
let gSettingsReturnState = STATE.TITLE;
let gPauseReturnState = STATE.PLAY;
let gLevelClearStars = 0;
let gLevelClearTimer = 0;
let gModeSelectHover = -1;
let gStuckTimer = 0;
let gRestartConfirm = false;
let gRestartConfirmTimer = 0;
let gRaidTurnTimer = 0;
let gRaidAutoTimer = 0;
let gSeasonScrollY = 0;

/* State transition helpers */
function canTransition(from, to) {
  const fromName = STATE_NAMES[from];
  const toName = STATE_NAMES[to];
  const allowed = TRANSITION_TABLE[fromName];
  return allowed && allowed.includes(toName);
}

function directTransition(toState) {
  if (!canTransition(gState, toState)) {
    console.warn('[Transition] blocked: ' + STATE_NAMES[gState] + ' → ' + STATE_NAMES[toState]);
    return false;
  }
  gPrevState = gState;
  gState = toState;
  enterState(toState);
  return true;
}

function beginTransition(toState, duration) {
  if (!canTransition(gState, toState)) {
    console.warn('[Transition] blocked: ' + STATE_NAMES[gState] + ' → ' + STATE_NAMES[toState]);
    return false;
  }
  if (gTransitioning) {
    gDeferredQueue.push(toState);
    return false;
  }
  gTransitioning = true;
  gFadeProxy = { alpha: 0 };
  tween.add(gFadeProxy, { alpha: 1 }, duration || 300, 'easeIn', () => {
    gPrevState = gState;
    gState = toState;
    enterState(toState);
    gFadeProxy = { alpha: 1 };
    tween.add(gFadeProxy, { alpha: 0 }, duration || 300, 'easeOut', () => {
      gTransitioning = false;
      gFadeAlpha = 0;
      /* Process deferred queue */
      if (gDeferredQueue.length > 0) {
        const next = gDeferredQueue.shift();
        beginTransition(next, duration);
      }
    });
  });
  return true;
}

/* Enter state: initialization */
function enterState(state) {
  validateActiveSystems();

  switch (state) {
    case STATE.BOOT:
      gBootProgress = 0;
      break;

    case STATE.TITLE:
      gTitleAlpha = 0;
      gTitleReady = false;
      gCurrentBgm = 'main';
      gBgmNoteIdx = 0;
      tween.add({ v: 0 }, { v: 1 }, 800, 'easeOut', () => { gTitleReady = true; });
      // Animate title fade
      const titleProxy = { a: 0 };
      tween.add(titleProxy, { a: 1 }, 1200, 'easeOut');
      // We track it via gTitleAlpha in render using timestamp
      break;

    case STATE.MODE_SELECT:
      gModeSelectHover = -1;
      break;

    case STATE.KINGDOM:
      gKingdomScroll = 0;
      gKingdomBuildAnim = -1;
      gCurrentBgm = 'kingdom';
      gBgmNoteIdx = 0;
      break;

    case STATE.LEVEL_SELECT:
      gLevelSelectScroll = 0;
      break;

    case STATE.PLAY:
      if (gPrevState !== STATE.CASCADE && gPrevState !== STATE.PAUSE) {
        initLevel(gCurrentLevel);
      }
      gRestartConfirm = false;
      gStuckTimer = 0;
      gHintTimer = 0;
      gHintPair = null;
      gDeadlockTimer = 0;
      gActiveBooster = -1;
      gBoosterPhase = 'none';
      gCurrentBgm = 'main';
      break;

    case STATE.CASCADE:
      gCascadePhase = 'checking';
      gCascadeTimer = 0;
      break;

    case STATE.LEVEL_CLEAR:
      gLevelClearTimer = 0;
      gLevelClearStars = calcStars();
      handleLevelClear();
      playSfxLevelClear();
      break;

    case STATE.LEVEL_FAIL:
      playSfxLevelFail();
      break;

    case STATE.GUILD_RAID:
      if (gPrevState !== STATE.CASCADE && gPrevState !== STATE.PAUSE) {
        initRaid();
        initLevel(1); // Raid uses a generic board
        gCurrentBgm = 'boss';
        gBgmNoteIdx = 0;
      }
      gRaidTurnTimer = 0;
      gRaidAutoTimer = 0;
      break;

    case STATE.SEASON_PASS:
      checkSeasonExpiry();
      gSeasonScrollY = 0;
      break;

    case STATE.SETTINGS:
      break;

    case STATE.PAUSE:
      break;
  }
}

/* Init a level (board setup) */
function initLevel(levelId) {
  gCurrentLevel = levelId;
  const level = LEVELS[levelId - 1];
  if (!level) return;

  gRng = gDailyMode ? new SeededRNG(dailySeed()) : new SeededRNG(level.seed + Date.now() % 10000);
  gCascadeCount = 0;

  const ddaBonus = getDDATurnBonus(levelId);

  gLevelProgress = {
    score: 0,
    turnsLeft: level.turns + ddaBonus,
    gemsCollected: {},
    obstaclesDestroyed: 0,
    descendedGems: 0,
  };

  initGrid();
  fillBoard(gRng, level);
  placeObstacles(gRng, level);
  placeDescendGems(gRng, level);

  /* Ensure valid moves exist */
  let retries = 0;
  while (countValidMoves() === 0 && retries < 10) {
    initGrid();
    fillBoard(gRng, level);
    placeObstacles(gRng, level);
    placeDescendGems(gRng, level);
    retries++;
  }

  gSelectedCell = null;
  gSwapAnimating = false;
  gDragStart = null;
  gDragCell = null;
  gPopups.length = 0;
}

/* Calculate stars for current level */
function calcStars() {
  const level = LEVELS[gCurrentLevel - 1];
  if (!level) return 1;
  if (gLevelProgress.score >= level.star3Score) return 3;
  if (gLevelProgress.score >= level.star2Score) return 2;
  return 1;
}

/* Handle level clear: save data, season XP, etc */
function handleLevelClear() {
  const levelId = gCurrentLevel;
  const stars = gLevelClearStars;
  const prevStars = gSave.levelStars[levelId] || 0;

  if (stars > prevStars) {
    const newStars = stars - prevStars;
    gSave.totalStars += newStars;
    gSave.levelStars[levelId] = stars;
  }

  if (levelId >= gSave.maxLevel) {
    gSave.maxLevel = Math.min(levelId + 1, LEVELS.length);
  }

  /* Update fail streak */
  gSave.failStreak[levelId] = Math.max((gSave.failStreak[levelId] || 0) - 1, -5);

  /* Season XP */
  const xp = stars >= 3 ? 25 : 10;
  addSeasonXP(xp);

  /* High score */
  if (gLevelProgress.score > gSave.highScore) {
    gSave.highScore = gLevelProgress.score;
  }

  Save.setHighScore(GAME_ID, gSave.highScore);
  saveSave();
}

/* Handle level fail */
function handleLevelFail() {
  const levelId = gCurrentLevel;
  gSave.failStreak[levelId] = (gSave.failStreak[levelId] || 0) + 1;
  saveSave();
}

/* Begin cascade */
function beginCascade() {
  gCascadeCount = 0;
  if (gState === STATE.PLAY) {
    directTransition(STATE.CASCADE);
  } else if (gState === STATE.GUILD_RAID) {
    /* Handle cascade within raid context */
    gCascadePhase = 'checking';
    gCascadeTimer = 0;
  }
}

/* Check if level goal is met */
function isGoalMet() {
  return getLevelGoalProgress() >= 1.0;
}

/* ─── KINGDOM ─── */
function updateKingdom(dt) {
  if (gKingdomBuildAnim >= 0) {
    gKingdomBuildTimer += dt;
    if (gKingdomBuildTimer > 2000) {
      gKingdomBuildAnim = -1;
    }
    return;
  }

  if (input.jp('Escape')) {
    beginTransition(STATE.MODE_SELECT, 400);
    return;
  }

  if (input.tapped) {
    /* Check building taps */
    for (let i = 0; i < 4; i++) {
      const btn = gKingdomBuildingLayout[i];
      if (btn && UI.hitTest(input.tapX, input.tapY, btn.x, btn.y, btn.w, btn.h)) {
        if (canBuild(i)) {
          buildBuilding(i);
          return;
        }
      }
    }
    /* Check "Play" button */
    if (gKingdomPlayBtn && UI.hitTest(input.tapX, input.tapY, gKingdomPlayBtn.x, gKingdomPlayBtn.y, gKingdomPlayBtn.w, gKingdomPlayBtn.h)) {
      playSfxSelect();
      beginTransition(STATE.LEVEL_SELECT, 400);
      return;
    }
  }
}

let gKingdomPlayBtn = null;

function renderKingdom(ctx, w, h) {
  drawBackground(ctx, w, h, 'bgKingdomMap');
  drawDarkOverlay(ctx, w, h, 0.3);

  const s = Layout.scale(w, h);

  const bldgW = Math.min(w * 0.4, 180 * s);

    const canBuildThis = canBuild(i);

    if (isAnimating) {
      const progress = Math.min(1, gKingdomBuildTimer / 2000);
      ctx.fillStyle = 'rgba(255,215,0,' + (0.3 * (1 - progress)) + ')';
      ctx.fillRect(bx, by, bldgW, bldgH);
      particles.emit(bx + bldgW / 2, by + bldgH / 2, 3, { color: '#FFD700', speed: 80, life: 0.5 });
    }
  }

  /* Play button */
  const playBtnW = Math.min(w * 0.5, 220 * s);
  const playBtnH = Math.max(MIN_TOUCH, 55 * s);

  const playBtnY = startY + gridH + 20 * s;
  gKingdomPlayBtn = { x: playBtnX, y: playBtnY, w: playBtnW, h: playBtnH };

  drawPanel(ctx, playBtnX, playBtnY, playBtnW, playBtnH, { bgColor: 'rgba(67,160,71,0.8)' });
  ctx.font = 'bold ' + Layout.fontSize(20, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.cream;
  ctx.fillText('▶ 레벨 선택', cx, playBtnY + playBtnH / 2 + 3);

  /* Level progress text */
  ctx.font = Layout.fontSize(13, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.textSecondary;
  const clearedCount = Object.keys(gSave.levelStars).length;
  ctx.fillText('클리어: ' + clearedCount + ' / ' + LEVELS.length, cx, playBtnY + playBtnH + 20 * s);

  /* ESC hint */
  ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
  ctx.fillText('ESC: 모드 선택', cx, h * 0.97);
}

/* ─── LEVEL SELECT ─── */
function updateLevelSelect(dt) {
  if (input.jp('Escape')) {
    beginTransition(STATE.KINGDOM, 400);
    return;
  }
  if (input.tapped) {
    for (const btn of gLevelBtnLayout) {
      if (UI.hitTest(input.tapX, input.tapY, btn.x, btn.y, btn.w, btn.h) && btn.unlocked) {
        playSfxSelect();
        gCurrentLevel = btn.level;
        gDailyMode = false;
        beginTransition(STATE.PLAY, 400);
        return;
      }
    }
    if (gLevelBackBtn && UI.hitTest(input.tapX, input.tapY, gLevelBackBtn.x, gLevelBackBtn.y, gLevelBackBtn.w, gLevelBackBtn.h)) {
      beginTransition(STATE.KINGDOM, 400);
    }
  }
}

let gLevelBtnLayout = [];
let gLevelBackBtn = null;

function renderLevelSelect(ctx, w, h) {
  const zoneIdx = Math.floor((gSave.maxLevel - 1) / 6);
  drawBackground(ctx, w, h, ZONE_BG[zoneIdx] || 'bgZone1CastleGate');
  drawDarkOverlay(ctx, w, h, 0.6);

  const s = Layout.scale(w, h);
  const cx = w / 2;

  /* Zone title */
  ctx.font = 'bold ' + Layout.fontSize(22, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.gold;
  ctx.fillText(ZONE_NAMES[zoneIdx] + ' — ' + ZONE_NAMES_EN[zoneIdx], cx, h * 0.07);

  /* Level grid (6 cols, 6 rows) */
  const cols = 6;
  const rows = 6;
  const btnSize = Math.max(MIN_TOUCH, Math.min(w / 8, 60 * s));
  const gap = 8 * s;
  const gridW = cols * (btnSize + gap);
  const startX = (w - gridW) / 2;
  const startY = h * 0.14;

  gLevelBtnLayout = [];
  for (let i = 0; i < LEVELS.length; i++) {
    const level = LEVELS[i];
    const col = i % cols;
    const row = Math.floor(i / cols);
    const bx = startX + col * (btnSize + gap);
    const by = startY + row * (btnSize + gap);
    const unlocked = level.id <= gSave.maxLevel;
    const stars = gSave.levelStars[level.id] || 0;

    gLevelBtnLayout.push({ x: bx, y: by, w: btnSize, h: btnSize, level: level.id, unlocked });

    /* Zone color coding */
    const zoneColors = ['#1A237E', '#2E7D32', '#E65100', '#4A148C', '#B71C1C', '#FF6F00'];
    const bgCol = unlocked ? zoneColors[level.zone] : '#333';

    ctx.fillStyle = bgCol + (unlocked ? 'cc' : '66');
    ctx.beginPath();
    ctx.roundRect(bx, by, btnSize, btnSize, 6);
    ctx.fill();

    if (unlocked) {
      ctx.strokeStyle = PAL.gold + '44';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    /* Level number */
    ctx.font = 'bold ' + Layout.fontSize(14, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = unlocked ? PAL.cream : '#555';
    ctx.fillText('' + level.id, bx + btnSize / 2, by + btnSize / 2 - 3);

    /* Stars */
    if (stars > 0) {
      ctx.font = Layout.fontSize(10, w, h) + 'px ' + FONT;
      ctx.fillStyle = PAL.gold;
      ctx.fillText('★'.repeat(stars), bx + btnSize / 2, by + btnSize - 8);
    }

    if (!unlocked) {
      ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
      ctx.fillStyle = '#666';
      ctx.fillText('🔒', bx + btnSize / 2, by + btnSize / 2 + 3);
    }
  }

  /* Back button */
  const backBtnW = Math.max(MIN_TOUCH, 100 * s);
  const backBtnH = Math.max(MIN_TOUCH, 40 * s);
  const backBtnX = cx - backBtnW / 2;
  const backBtnY = h - backBtnH - 10 * s;
  gLevelBackBtn = { x: backBtnX, y: backBtnY, w: backBtnW, h: backBtnH };

  drawPanel(ctx, backBtnX, backBtnY, backBtnW, backBtnH);
  ctx.font = 'bold ' + Layout.fontSize(14, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.cream;
  ctx.fillText('← 왕국으로', cx, backBtnY + backBtnH / 2 + 2);
}

/* ─── PLAY ─── */
function updatePlay(dt) {
  /* Check stuck / hint */
  if (!gSwapAnimating) {
    gHintTimer += dt;
    gDeadlockTimer += dt;
    gStuckTimer += dt;

    if (gHintTimer > HINT_DELAY && !gHintPair) {
      gHintPair = findHintMove();
    }

    if (gDeadlockTimer > DEADLOCK_DELAY) {
      if (countValidMoves() === 0) {
        shuffleBoard();
      }
      gDeadlockTimer = 0;
    }
  }

  /* Update hint glow */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      gGrid[r][c].hintGlow = 0;
    }
  }
  if (gHintPair) {
    const glow = (Math.sin(gTimestamp / 300) + 1) / 2;
    for (const p of gHintPair) {
      if (gGrid[p.r] && gGrid[p.r][p.c]) gGrid[p.r][p.c].hintGlow = glow;
    }
  }

  /* ESC: pause */
  if (input.jp('Escape')) {
    gPauseReturnState = STATE.PLAY;
    directTransition(STATE.PAUSE);
    return;
  }

  /* Space: force hint */
  if (input.jp('Space')) {
    gHintPair = findHintMove();
    gHintTimer = HINT_DELAY + 1;
  }

  /* R key: restart level with confirmation */
  if (input.jp('KeyR') && !gRestartConfirm) {
    gRestartConfirm = true;
    gRestartConfirmTimer = 3000;
  } else if (gRestartConfirm) {
    gRestartConfirmTimer -= dt;
    if (gRestartConfirmTimer <= 0) {
      gRestartConfirm = false;
    } else if (input.jp('KeyR') || input.confirm()) {
      gRestartConfirm = false;
      /* Direct restart — reinit level without state transition */
      initLevel(gCurrentLevel);
      playSfxSelect();
      return;
    } else if (input.jp('Escape')) {
      gRestartConfirm = false;
    }
  }

  /* Booster keys 1-4 */
  for (let i = 0; i < 4; i++) {
    if (input.jp('Digit' + (i + 1))) {
      if (gActiveBooster === i) {
        gActiveBooster = -1;
        gBoosterPhase = 'none';
      } else {
        useBooster(i);
      }
    }
  }

  /* Handle input (skip if restart confirm is showing) */
  if (!gSwapAnimating && !gTransitioning && !gRestartConfirm) {
    handlePlayInput();
  }
}

/* Handle mouse/touch input for gem selection and swapping */
function handlePlayInput() {
  /* Booster tap handling */
  if (input.tapped) {
    const boosterIdx = getBoosterAtTap(input.tapX, input.tapY);
    if (boosterIdx >= 0) {
      if (gActiveBooster === boosterIdx) {
        gActiveBooster = -1;
        gBoosterPhase = 'none';
      } else {
        useBooster(boosterIdx);
      }
      return;
    }
  }

  /* Get grid cell from tap/mouse */
  const getCell = (mx, my) => {
    const col = Math.floor((mx - gBoardX) / gCellSize);
    const row = Math.floor((my - gBoardY) / gCellSize);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) return { r: row, c: col };
    return null;
  };

  /* Drag-based swap */
  if (input.mouseDown && !gDragStart) {
    const cell = getCell(input.mouseX, input.mouseY);
    if (cell) {
      gDragStart = { x: input.mouseX, y: input.mouseY };
      gDragCell = cell;

      /* Booster handling */
      if (gBoosterPhase === 'selecting') {
        handleBoosterTap(cell.r, cell.c);
        gDragStart = null;
        gDragCell = null;
        return;
      }
      if (gBoosterPhase === 'swap_first' || gBoosterPhase === 'swap_second') {
        handleBoosterSwapTap(cell.r, cell.c);
        gDragStart = null;
        gDragCell = null;
        return;
      }

      /* Clear previous selection */
      if (gSelectedCell) {
        gGrid[gSelectedCell.r][gSelectedCell.c].selected = false;
      }
      gGrid[cell.r][cell.c].selected = true;
      gSelectedCell = cell;
    }
  }

  /* Detect drag direction */
  if (gDragStart && gDragCell && input.mouseDown) {
    const dx = input.mouseX - gDragStart.x;
    const dy = input.mouseY - gDragStart.y;
    const threshold = gCellSize * 0.3;

    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;

      const nr = gDragCell.r + dr;
      const nc = gDragCell.c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        attemptSwap(gDragCell.r, gDragCell.c, nr, nc);
      }

      gDragStart = null;
      gDragCell = null;
      if (gSelectedCell) {
        gGrid[gSelectedCell.r][gSelectedCell.c].selected = false;
        gSelectedCell = null;
      }
    }
  }

  if (!input.mouseDown) {
    gDragStart = null;
    gDragCell = null;
  }
}

/* Attempt gem swap */
function attemptSwap(r1, c1, r2, c2) {
  const cell1 = gGrid[r1][c1];
  const cell2 = gGrid[r2][c2];

  if (cell1.locked || cell2.locked) return;
  if (cell1.color < 0 || cell2.color < 0) return;

  /* Check for special combo */
  if (cell1.special !== SPECIAL.NONE && cell2.special !== SPECIAL.NONE) {
    const destroyed = activateSpecialCombo(r1, c1, r2, c2);
    if (destroyed.length > 0) {
      const deduped = [];
      const seen = new Set();
      for (const d of destroyed) {
        const key = d.r * COLS + d.c;
        if (!seen.has(key)) { seen.add(key); deduped.push(d); }
      }
      for (const d of deduped) {
        const cell = safeCell(d.r, d.c);
        if (cell) {
          damageAdjacentObstacles([d]);
          cell.color = -1;
          cell.special = SPECIAL.NONE;
        }
      }
      const px = gBoardX + c1 * gCellSize + gCellSize / 2;
      const py = gBoardY + r1 * gCellSize + gCellSize / 2;
      particles.emit(px, py, 30, { color: '#FFD700', speed: 200, life: 0.8, size: 6 });
      spawnScorePopup(r1, c1, SCORE_TABLE.specialCombo, true);
      gLevelProgress.score += SCORE_TABLE.specialCombo;
      playSpecialSfx(SPECIAL.RAINBOW);
      consumeTurn();
      beginCascade();
      return;
    }
  }

  /* Normal swap */
  swapCells(r1, c1, r2, c2);
  const matches = findMatches();

  if (matches.length > 0) {
    playSfxMatch();
    gHintTimer = 0;
    gHintPair = null;
    gDeadlockTimer = 0;
    gStuckTimer = 0;
    consumeTurn();
    beginCascade();
  } else {
    /* Invalid swap: swap back */
    swapCells(r1, c1, r2, c2);
    sound.tone(200, 0.1, 'square', 0.2);
  }
}

/* Consume a turn */
function consumeTurn() {
  if (gDailyMode) return; // Daily mode doesn't consume turns
  gLevelProgress.turnsLeft--;

  /* Spread poison at end of turn */
  if (LEVELS[gCurrentLevel - 1]) {
    const level = LEVELS[gCurrentLevel - 1];
    if (level.obstacleTypes && level.obstacleTypes.includes(OBS.POISON)) {
      spreadPoison();
    }
  }
}

/* ─── CASCADE ─── */
function updateCascade(dt) {
  gCascadeTimer += dt;

  switch (gCascadePhase) {
    case 'checking': {
      const matches = findMatches();
      if (matches.length > 0) {
        processMatches(matches);
        gCascadePhase = 'removing';
        gCascadeTimer = 0;
      } else {
        /* No more matches: check win/lose then return */
        finishCascade();
      }
      break;
    }
    case 'removing':
      if (gCascadeTimer > CASCADE_REMOVE_TIME) {
        applyGravity();
        gCascadePhase = 'falling';
        gCascadeTimer = 0;
      }
      break;
    case 'falling':
      if (animateGravity(dt)) {
        gCascadePhase = 'checking';
        gCascadeTimer = 0;
      }
      break;
  }
}

function finishCascade() {
  gCascadeCount = 0;

  /* Check level goal */
  if (isGoalMet()) {
    if (gState === STATE.CASCADE) directTransition(STATE.LEVEL_CLEAR);
    return;
  }

  /* Check if out of turns */
  if (gLevelProgress.turnsLeft <= 0 && !gDailyMode) {
    handleLevelFail();
    if (gState === STATE.CASCADE) directTransition(STATE.LEVEL_FAIL);
    return;
  }

  /* Return to play */
  if (gState === STATE.CASCADE) directTransition(STATE.PLAY);
}

function renderCascade(ctx, w, h) {
  /* Same as PLAY render */
  renderPlayScreen(ctx, w, h);
}

function renderPlayScreen(ctx, w, h) {
  const zoneIdx = Math.floor((gCurrentLevel - 1) / 6);
  drawBackground(ctx, w, h, ZONE_BG[zoneIdx] || 'bgZone1CastleGate');

  renderBoard(ctx, w, h);
  renderHUD(ctx, w, h);
  renderBoosters(ctx, w, h);
  renderPopups(ctx, w, h);

  /* Goal text */
  const s = Layout.scale(w, h);
  ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.cream;
  ctx.fillText('목표: ' + getLevelGoalText(), w / 2, gBoardY - 8 * s);

  /* Active booster indicator */
  if (gActiveBooster >= 0) {
    ctx.font = 'bold ' + Layout.fontSize(14, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.gold;
    const boosterText = gBoosterPhase === 'swap_second' ? '교환할 두 번째 보석을 선택' :
      gBoosterPhase === 'swap_first' ? '교환할 첫 번째 보석을 선택' :
      BOOSTER_NAMES[gActiveBooster] + ' 사용할 위치를 탭하세요';
    ctx.fillText(boosterText, w / 2, gBoardY + gBoardH + 20 * s);
  }

  /* Daily mode indicator */
  if (gDailyMode) {
    ctx.font = 'bold ' + Layout.fontSize(12, w, h) + 'px ' + FONT;
    ctx.fillStyle = '#43A047';
    ctx.fillText('📅 일일 챌린지', w / 2, gBoardY + gBoardH + 35 * s);
  }

  /* Cascade combo display */
  if (gState === STATE.CASCADE && gCascadeCount > 1) {
    ctx.font = 'bold ' + Layout.fontSize(24, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.gold;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 15;
    ctx.fillText('COMBO x' + gCascadeCount, w / 2, h / 2);
    ctx.shadowBlur = 0;
  }
}

/* ─── LEVEL CLEAR ─── */
function updateLevelClear(dt) {
  gLevelClearTimer += dt;

  if (gLevelClearTimer > 2000) {
    if (input.confirm()) {
      playSfxSelect();
      beginTransition(STATE.KINGDOM, 400);
    }
  }
}
