/* ─── GUILD RAID ─── */
function updateGuildRaid(dt) {
  /* Boss intro */
  if (!gRaidState.introPlayed) {
    gRaidTurnTimer += dt;
    if (gRaidTurnTimer > 3000) {
      gRaidState.introPlayed = true;
      gRaidTurnTimer = 0;
    }
    return;
  }

  /* Boss defeated */
  if (gRaidState.bossHp <= 0) {
    gRaidTurnTimer += dt;
    if (gRaidTurnTimer > 2000 && input.confirm()) {
      gSave.guildRaidWins++;
      gSave.trophies += 10;
      addSeasonXP(30);
      saveSave();
      beginTransition(STATE.MODE_SELECT, 400);
    }
    return;
  }

  /* Turn limit exceeded */
  if (gRaidState.turnCount >= BOSS_TURN_LIMIT) {
    if (input.confirm()) {
      beginTransition(STATE.MODE_SELECT, 400);
    }
    return;
  }

  /* Boss attack animation */
  if (gRaidState.bossAttackAnim > 0) {
    gRaidState.bossAttackAnim -= dt / 1000;
    return;
  }

  /* Handle turns */
  if (gRaidState.currentTurn === 0) {
    /* Player turn — same as PLAY input */
    if (input.jp('Escape')) {
      gPauseReturnState = STATE.GUILD_RAID;
      directTransition(STATE.PAUSE);
      return;
    }
    if (!gSwapAnimating && !gTransitioning) {
      handlePlayInput();
    }
  } else if (gRaidState.currentTurn >= 1 && gRaidState.currentTurn <= 3) {
    /* Guild member auto-turn */
    gRaidAutoTimer += dt;
    if (gRaidAutoTimer > 800) {
      gRaidAutoTimer = 0;
      const memberIdx = gRaidState.currentTurn - 1;
      guildMemberTurn(memberIdx);
      gRaidState.currentTurn++;
      if (gRaidState.currentTurn > 3) gRaidState.currentTurn = 4;
    }
  } else if (gRaidState.currentTurn === 4) {
    /* Boss turn */
    gRaidAutoTimer += dt;
    if (gRaidAutoTimer > 600) {
      gRaidAutoTimer = 0;
      bossAttack();
      gRaidState.turnCount++;
      gRaidState.currentTurn = 0; // back to player
    }
  }
}

function renderGuildRaid(ctx, w, h) {
  drawBackground(ctx, w, h, 'bgZone6Throne');
  drawDarkOverlay(ctx, w, h, 0.3);

  const s = Layout.scale(w, h);
  const cx = w / 2;

  /* Boss intro */
  if (!gRaidState.introPlayed) {
    drawDarkOverlay(ctx, w, h, 0.7);
    const dragonSize = Math.min(w * 0.6, 300 * s);
    if (assets.sprites.bossDragon) {
      const progress = Math.min(1, gRaidTurnTimer / 2000);
      ctx.globalAlpha = progress;
      ctx.drawImage(assets.sprites.bossDragon, cx - dragonSize / 2, h * 0.15, dragonSize, dragonSize * 0.75);
      ctx.globalAlpha = 1;
    }
    /* Guild emblem during raid intro */
    if (assets.sprites.uiGuildEmblem) {
      const emblemSize = Math.max(60, 80 * s);
      ctx.globalAlpha = Math.min(1, gRaidTurnTimer / 1500);
      ctx.drawImage(assets.sprites.uiGuildEmblem, cx - emblemSize / 2, h * 0.6, emblemSize, emblemSize);
      ctx.globalAlpha = 1;
    }
    ctx.font = 'bold ' + Layout.fontSize(30, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#E53935';
    ctx.shadowColor = '#E53935';
    ctx.shadowBlur = 15;
    ctx.fillText('🐉 드래곤 레이드', cx, h * 0.85);
    ctx.shadowBlur = 0;
    return;
  }

  /* Board */
  renderBoard(ctx, w, h);

  /* Boss HP bar — use uiHpBar asset as background texture */
  const barW = w * 0.7;
  const barH = Math.max(20, 25 * s);
  const barX = (w - barW) / 2;
  const barY = 8;
  if (assets.sprites.uiHpBar) {
    ctx.drawImage(assets.sprites.uiHpBar, barX, barY, barW, barH);
    /* Draw HP fill on top */
    const hpPct = MathUtil.clamp(gRaidState.bossHp / BOSS_MAX_HP, 0, 1);
    ctx.fillStyle = hpPct > 0.5 ? '#E53935' : hpPct > 0.25 ? '#FF8C00' : '#8B0000';
    ctx.fillRect(barX + 2, barY + 2, (barW - 4) * hpPct, barH - 4);
  } else {
    UI.hpBar(ctx, barX, barY, barW, barH, gRaidState.bossHp, BOSS_MAX_HP, { fgColor: '#E53935', borderColor: '#FFD700' });
  }
  ctx.font = 'bold ' + Layout.fontSize(12, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.cream;
  ctx.fillText('드래곤 HP: ' + gRaidState.bossHp + '/' + BOSS_MAX_HP, cx, barY + barH + 14 * s);

  /* Turn indicator */
  const turnNames = ['플레이어', ...GUILD_NAMES, '보스'];
  const turnText = '턴 ' + (gRaidState.turnCount + 1) + '/' + BOSS_TURN_LIMIT + ' — ' + turnNames[gRaidState.currentTurn];
  ctx.fillText(turnText, cx, barY + barH + 30 * s);

  /* Guild emblem — display uiGuildEmblem if available */
  if (assets.sprites.uiGuildEmblem) {
    const emblemSize = Math.max(32, 40 * s);
    ctx.globalAlpha = 0.7;
    ctx.drawImage(assets.sprites.uiGuildEmblem, 6, barY + barH + 40 * s, emblemSize, emblemSize);
    ctx.globalAlpha = 1;
  }

  /* Guild members at bottom */
  const memberSize = Math.max(MIN_TOUCH, 40 * s);
  for (let i = 0; i < 3; i++) {
    const mx = w * 0.15 + i * w * 0.25;
    const my = h - memberSize - 10;
    const assetKey = GUILD_MEMBERS[i];
    if (assets.sprites[assetKey]) {
      ctx.drawImage(assets.sprites[assetKey], mx, my, memberSize, memberSize);
    } else {
      ctx.fillStyle = ['#C0C0C0', '#8E24AA', '#43A047'][i];
      ctx.fillRect(mx, my, memberSize, memberSize);
    }
    ctx.font = Layout.fontSize(10, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.cream;
    ctx.fillText(GUILD_NAMES[i], mx + memberSize / 2, my - 5);
  }

  /* Boss attack flash */
  if (gRaidState.bossAttackAnim > 0) {
    ctx.fillStyle = 'rgba(229,57,53,' + (gRaidState.bossAttackAnim * 0.3) + ')';
    ctx.fillRect(0, 0, w, h);
  }

  /* Victory/Defeat overlay */
  if (gRaidState.bossHp <= 0) {
    drawDarkOverlay(ctx, w, h, 0.5);
    ctx.font = 'bold ' + Layout.fontSize(36, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.gold;
    ctx.fillText('⚔️ 승리!', cx, h / 2);
    ctx.font = Layout.fontSize(16, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.cream;
    ctx.fillText('탭하여 계속', cx, h / 2 + 40 * s);
  } else if (gRaidState.turnCount >= BOSS_TURN_LIMIT) {
    drawDarkOverlay(ctx, w, h, 0.5);
    ctx.font = 'bold ' + Layout.fontSize(30, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#E53935';
    ctx.fillText('시간 초과', cx, h / 2);
    ctx.font = Layout.fontSize(16, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.cream;
    ctx.fillText('탭하여 계속', cx, h / 2 + 40 * s);
  }

  renderPopups(ctx, w, h);
}

/* ─── SETTINGS ─── */
function updateSettings(dt) {
  if (input.jp('Escape') || (input.tapped && gSettingsBackBtn && UI.hitTest(input.tapX, input.tapY, gSettingsBackBtn.x, gSettingsBackBtn.y, gSettingsBackBtn.w, gSettingsBackBtn.h))) {
    /* Return to previous state */
    const returnTo = gSettingsReturnState;
    /* Need to handle reverse transition */
    gPrevState = gState;
    gState = returnTo;
    enterState(returnTo);
  }

  if (input.tapped) {
    /* SFX volume slider */
    if (gSfxSlider && UI.hitTest(input.tapX, input.tapY, gSfxSlider.x, gSfxSlider.y, gSfxSlider.w, gSfxSlider.h)) {
      gSave.sfxVol = MathUtil.clamp((input.tapX - gSfxSlider.x) / gSfxSlider.w, 0, 1);
      sound.setVolume(gSave.sfxVol);
      saveSave();
    }
    /* BGM volume slider */
    if (gBgmSlider && UI.hitTest(input.tapX, input.tapY, gBgmSlider.x, gBgmSlider.y, gBgmSlider.w, gBgmSlider.h)) {
      gSave.bgmVol = MathUtil.clamp((input.tapX - gBgmSlider.x) / gBgmSlider.w, 0, 1);
      saveSave();
    }
    /* Reset button */
    if (gResetBtn && UI.hitTest(input.tapX, input.tapY, gResetBtn.x, gResetBtn.y, gResetBtn.w, gResetBtn.h)) {
      gSave = defaultSaveData();
      saveSave();
    }
  }
}

/* ─── PAUSE ─── */
function updatePause(dt) {
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(gPauseReturnState);
    return;
  }
  if (input.tapped) {
    if (gPauseResumeBtn && UI.hitTest(input.tapX, input.tapY, gPauseResumeBtn.x, gPauseResumeBtn.y, gPauseResumeBtn.w, gPauseResumeBtn.h)) {
      directTransition(gPauseReturnState);
      return;

    if (gPauseQuitBtn && UI.hitTest(input.tapX, input.tapY, gPauseQuitBtn.x, gPauseQuitBtn.y, gPauseQuitBtn.w, gPauseQuitBtn.h)) {
      beginTransition(STATE.LEVEL_SELECT, 400);
      return;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S25] CORE UPDATE & RENDER — single entry point
 * ═══════════════════════════════════════════════════════════════════ */

/* State handler map — function references, NO function overrides */
const stateUpdaters = {
  [STATE.BOOT]: (dt) => {},
  [STATE.TITLE]: updateTitle,
  [STATE.MODE_SELECT]: updateModeSelect,
  [STATE.KINGDOM]: updateKingdom,
  [STATE.LEVEL_SELECT]: updateLevelSelect,
  [STATE.PLAY]: updatePlay,
  [STATE.CASCADE]: updateCascade,
  [STATE.LEVEL_CLEAR]: updateLevelClear,
  [STATE.LEVEL_FAIL]: updateLevelFail,
  [STATE.GUILD_RAID]: updateGuildRaid,
  [STATE.SEASON_PASS]: updateSeasonPass,
  [STATE.SETTINGS]: updateSettings,
  [STATE.PAUSE]: updatePause,
};

const stateRenderers = {
  [STATE.BOOT]: (ctx, w, h) => {
    ctx.fillStyle = PAL.bgPrimary;
    ctx.fillRect(0, 0, w, h);
    const s = Layout.scale(w, h);
    ctx.font = 'bold ' + Layout.fontSize(20, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.gold;
    ctx.fillText('보석 왕국 전설', w / 2, h / 2 - 30 * s);
    /* Loading bar */
    const barW = w * 0.5;
    const barH = 8 * s;
    ctx.fillStyle = '#333';
    ctx.fillRect((w - barW) / 2, h / 2, barW, barH);
    ctx.fillStyle = PAL.gold;
    ctx.fillRect((w - barW) / 2, h / 2, barW * gBootProgress, barH);
    ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.textSecondary;
    ctx.fillText('로딩 중...', w / 2, h / 2 + 25 * s);
  },
  [STATE.TITLE]: renderTitle,
  [STATE.MODE_SELECT]: renderModeSelect,
  [STATE.KINGDOM]: renderKingdom,
  [STATE.LEVEL_SELECT]: renderLevelSelect,
  [STATE.PLAY]: renderPlayScreen,
  [STATE.CASCADE]: renderCascade,
  [STATE.LEVEL_CLEAR]: renderLevelClear,
  [STATE.LEVEL_FAIL]: renderLevelFail,
  [STATE.GUILD_RAID]: renderGuildRaid,
  [STATE.SEASON_PASS]: renderSeasonPass,
  [STATE.SETTINGS]: renderSettings,
  [STATE.PAUSE]: renderPause,
};

function coreUpdate(dt, timestamp) {
  if (!gReady) return;
  gTimestamp = timestamp;

  const sys = ACTIVE_SYSTEMS[STATE_NAMES[gState]];
  if (!sys) return;

  /* Always update tween (all states tween=true) */
  tween.update(dt);

  if (sys.particles) particles.update(dt);
  if (sys.sound) updateBgm(dt);

  /* Update popups always */
  updatePopups(dt);

  /* State-specific update */
  if (sys.input) {
    const updater = stateUpdaters[gState];
    if (updater) updater(dt);
  }

  /* Deferred transitions */
  if (!gTransitioning && gDeferredQueue.length > 0) {
    const next = gDeferredQueue.shift();
    beginTransition(next, 300);
  }

  /* Flush input at end — AFTER all state handlers */
  input.flush();
}

function coreRender(ctx, w, h, dt) {
  if (!gReady) return;

  /* Clear */
  ctx.fillStyle = PAL.bgPrimary;
  ctx.fillRect(0, 0, w, h);

  /* State-specific render */
  const renderer = stateRenderers[gState];
  if (renderer) renderer(ctx, w, h);

  /* Particles overlay */
  particles.render(ctx);

  /* Fade overlay (transitions) */
  if (gFadeProxy) {
    gFadeAlpha = gFadeProxy.alpha || 0;
  }
  UI.fade(ctx, w, h, gFadeAlpha);
}

/* ═══════════════════════════════════════════════════════════════════
 * [S26] INIT & BOOT
 * ═══════════════════════════════════════════════════════════════════ */

/* Engine instance — TDZ safe: all referenced variables declared above */
const engine = new Engine('gameCanvas', {
  update: coreUpdate,
  render: coreRender,
});
const input = new Input(engine.canvas);
const sound = new Sound();
const tween = new Tween();
const particles = new Particles(500);
const assets = new AssetLoader();

async function init() {
  loadSave();
  gState = STATE.BOOT;
  gReady = true;

  /* Load assets from manifest.json */
  try {
    const manifest = await fetch('assets/manifest.json').then(r => r.json()).catch(() => null);
    if (manifest && manifest.assets) {
      const assetMap = {};
      const entries = Object.entries(manifest.assets);
      let loaded = 0;
      for (const [key, info] of entries) {
        assetMap[key] = 'assets/' + info.file;
      }
      /* Load with progress tracking */
      const total = Object.keys(assetMap).length;
      await Promise.all(
        Object.entries(assetMap).map(([key, src]) =>
          new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
              assets.sprites[key] = img;
              loaded++;
              gBootProgress = loaded / total;
              resolve();
            };
            img.onerror = () => {
              loaded++;
              gBootProgress = loaded / total;
              resolve();
            };
            img.src = src;
          })
        )
      );
    }
  } catch (e) {
    console.warn('[Assets] Load failed, using fallbacks');
  }

  gBootProgress = 1;
  sound.setVolume(gSave.sfxVol);

  /* Start engine */
  engine.start();

  /* Transition to title after brief boot screen (tween-based, no setTimeout) */
  const bootProxy = { t: 0 };
  tween.add(bootProxy, { t: 1 }, 500, 'linear', () => {
    if (gState === STATE.BOOT) {
      gPrevState = STATE.BOOT;
      gState = STATE.TITLE;
      enterState(STATE.TITLE);
    }
  });
}

init();

let gTutorialStep = -1;
let gTutorialActive = false;

function startTutorial() {
  gTutorialStep = 0;
  gTutorialActive = true;
}

function advanceTutorial() {
  gTutorialStep++;
  if (gTutorialStep >= TUTORIAL_STEPS.length) {
    gTutorialActive = false;
    gTutorialStep = -1;
    gSave.tutorialDone = true;
    saveSave();
  }
}

function renderTutorialOverlay(ctx, w, h) {
  if (!gTutorialActive || gTutorialStep < 0) return;
  const step = TUTORIAL_STEPS[gTutorialStep];
  if (!step) return;

  const s = Layout.scale(w, h);
  const cx = w / 2, cy = h / 2;

  /* Dark overlay */
  drawDarkOverlay(ctx, w, h, 0.8);

  /* Tutorial panel */
  const panelW = Math.min(w * 0.85, 380 * s);
  const panelH = Math.min(h * 0.35, 200 * s);
  const px = cx - panelW / 2;
  const py = cy - panelH / 2;
  drawPanel(ctx, px, py, panelW, panelH, { bgColor: 'rgba(26,35,126,0.95)' });

  /* Step indicator */
  ctx.font = Layout.fontSize(11, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.textSecondary;
  ctx.fillText((gTutorialStep + 1) + ' / ' + TUTORIAL_STEPS.length, cx, py + 15 * s);

  /* Title */
  ctx.font = 'bold ' + Layout.fontSize(22, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.gold;
  ctx.fillText(step.title, cx, py + panelH * 0.3);

  /* Description (multi-line) */
  ctx.font = Layout.fontSize(14, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.cream;
  const lines = step.desc.split('\n');
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], cx, py + panelH * 0.5 + i * Layout.fontSize(16, w, h));
  }

  /* Next prompt */
  const blink = Math.sin(gTimestamp / 350) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.font = Layout.fontSize(14, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.gold;
  ctx.fillText('탭하여 계속 →', cx, py + panelH - 15 * s);
  ctx.globalAlpha = 1;

  /* Highlight markers based on step.highlight */
  if (step.highlight === 'board' && gBoardX) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(gBoardX - 5, gBoardY - 5, gBoardW + 10, gBoardH + 10);
    ctx.setLineDash([]);
  } else if (step.highlight === 'booster' && gBoosterLayout) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.setLineDash([5, 5]);
    const bl = gBoosterLayout;
    ctx.strokeRect(bl.startX - 5, bl.y - 5, bl.btnSize * 4 + bl.gap * 3 + 10, bl.btnSize + 10);
    ctx.setLineDash([]);
  }
}

function handleTutorialInput() {
  if (!gTutorialActive) return false;
  if (input.confirm()) {
    advanceTutorial();
    return true;
  }
  return false;
}

let gNewAchievements = [];
let gAchievementPopup = null;
let gAchievementPopupTimer = 0;

function checkAchievements() {
  if (!gSave.achievements) gSave.achievements = [];
  for (const ach of ACHIEVEMENTS) {
    if (gSave.achievements.includes(ach.id)) continue;
    if (ach.condition(gSave)) {
      gSave.achievements.push(ach.id);
      gNewAchievements.push(ach);
      saveSave();
    }
  }
  /* Show popup for first new achievement */
  if (gNewAchievements.length > 0 && !gAchievementPopup) {
    gAchievementPopup = gNewAchievements.shift();
    gAchievementPopupTimer = 3000;
  }
}

function updateAchievementPopup(dt) {
  if (gAchievementPopup) {
    gAchievementPopupTimer -= dt;
    if (gAchievementPopupTimer <= 0) {
      gAchievementPopup = null;
      /* Check for more queued */
      if (gNewAchievements.length > 0) {
        gAchievementPopup = gNewAchievements.shift();
        gAchievementPopupTimer = 3000;
      }
    }
  }
}

function renderAchievementPopup(ctx, w, h) {
  if (!gAchievementPopup) return;
  const s = Layout.scale(w, h);
  const progress = gAchievementPopupTimer / 3000;
  const slideY = progress > 0.9 ? (1 - (progress - 0.9) / 0.1) : progress < 0.1 ? progress / 0.1 : 1;

  const panelW = Math.min(w * 0.8, 300 * s);
  const panelH = Math.max(MIN_TOUCH, 55 * s);
  const px = (w - panelW) / 2;
  const py = 10 * s + (1 - slideY) * -panelH;

  ctx.globalAlpha = slideY;
  drawPanel(ctx, px, py, panelW, panelH, { bgColor: 'rgba(255,215,0,0.15)', borderColor: PAL.gold });

  ctx.font = Layout.fontSize(18, w, h) + 'px ' + FONT;
  ctx.textAlign = 'left';
  ctx.fillStyle = PAL.cream;
  ctx.fillText(gAchievementPopup.icon, px + 12 * s, py + panelH / 2);

  ctx.font = 'bold ' + Layout.fontSize(13, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.gold;
  ctx.fillText('업적 달성!', px + 40 * s, py + panelH * 0.35);

  ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.cream;
  ctx.fillText(gAchievementPopup.name + ' — ' + gAchievementPopup.desc, px + 40 * s, py + panelH * 0.7);

  ctx.globalAlpha = 1;
}

/* Floating gems animation on title screen */
const gTitleGems = [];
const TITLE_GEM_COUNT = 12;

function initTitleGems() {
  gTitleGems.length = 0;
  for (let i = 0; i < TITLE_GEM_COUNT; i++) {
    gTitleGems.push({
      x: Math.random(),    // 0~1 fraction of width
      y: Math.random(),    // 0~1 fraction of height
      size: 0.02 + Math.random() * 0.03,  // fraction of min dimension
      color: i % GEM_COLORS,
      speed: 0.00005 + Math.random() * 0.0001,
      phase: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.002,
      rotation: Math.random() * Math.PI * 2,
      alpha: 0.3 + Math.random() * 0.4,
    });
  }
}
initTitleGems();

function updateTitleGems(dt) {
  for (const gem of gTitleGems) {
    gem.y -= gem.speed * dt;
    gem.x += Math.sin(gTimestamp * 0.001 + gem.phase) * 0.00003 * dt;
    gem.rotation += gem.rotSpeed * dt;
    if (gem.y < -0.05) {
      gem.y = 1.05;
      gem.x = Math.random();
      gem.color = Math.floor(Math.random() * GEM_COLORS);
    }
  }
}

function renderTitleGems(ctx, w, h) {
  const minDim = Math.min(w, h);
  for (const gem of gTitleGems) {
    const x = gem.x * w;
    const y = gem.y * h;
    const size = gem.size * minDim;
    ctx.save();
    ctx.globalAlpha = gem.alpha * gTitleAlpha;
    ctx.translate(x, y);
    ctx.rotate(gem.rotation);
    drawGemFallback(ctx, gem.color, -size / 2, -size / 2, size, size);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

 * ═══════════════════════════════════════════════════════════════════ */

let gOffscreenBg = null;
let gOffscreenBgKey = '';
let gOffscreenBgW = 0;
let gOffscreenBgH = 0;

function getCachedBackground(w, h, bgKey) {
  if (gOffscreenBgKey === bgKey && gOffscreenBgW === w && gOffscreenBgH === h && gOffscreenBg) {
    return gOffscreenBg;
  }
  /* Rebuild cache */
  if (!gOffscreenBg || gOffscreenBgW !== w || gOffscreenBgH !== h) {
    gOffscreenBg = document.createElement('canvas');
    gOffscreenBg.width = w;
    gOffscreenBg.height = h;
  }
  const octx = gOffscreenBg.getContext('2d');
  drawBackground(octx, w, h, bgKey);
  gOffscreenBgKey = bgKey;
  gOffscreenBgW = w;
  gOffscreenBgH = h;
  return gOffscreenBg;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S33] SPARKLE ANIMATION FOR GEMS
 * ═══════════════════════════════════════════════════════════════════ */

let gSparkleTimer = 0;
const SPARKLE_INTERVAL = 2000;

function updateSparkles(dt) {
  gSparkleTimer += dt;
  if (gSparkleTimer > SPARKLE_INTERVAL) {
    gSparkleTimer -= SPARKLE_INTERVAL;
    /* Random gem sparkles */
    if (gState === STATE.PLAY || gState === STATE.CASCADE || gState === STATE.GUILD_RAID) {
      const r = gRng.nextInt(0, ROWS - 1);
      const c = gRng.nextInt(0, COLS - 1);
      const cell = safeCell(r, c);
      if (cell && cell.color >= 0) {
        cell.sparkle = 1.0;
      }
    }
  }
  /* Decay sparkles */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r] && gGrid[r][c] && gGrid[r][c].sparkle > 0) {
        gGrid[r][c].sparkle -= dt / 500;
        if (gGrid[r][c].sparkle < 0) gGrid[r][c].sparkle = 0;
      }
    }
  }
}

function renderGemSparkle(ctx, cell, x, y, size) {
  if (cell.sparkle <= 0) return;
  ctx.save();
  ctx.globalAlpha = cell.sparkle * 0.7;
  ctx.fillStyle = '#FFF';
  const sx = x + size * 0.3, sy = y + size * 0.2;
  const ss = size * 0.15 * cell.sparkle;
  /* 4-point star */
  ctx.beginPath();
  ctx.moveTo(sx, sy - ss);
  ctx.lineTo(sx + ss * 0.3, sy - ss * 0.3);
  ctx.lineTo(sx + ss, sy);
  ctx.lineTo(sx + ss * 0.3, sy + ss * 0.3);
  ctx.lineTo(sx, sy + ss);
  ctx.lineTo(sx - ss * 0.3, sy + ss * 0.3);
  ctx.lineTo(sx - ss, sy);
  ctx.lineTo(sx - ss * 0.3, sy - ss * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════
 * [S34] SCREEN SHAKE SYSTEM
 * ═══════════════════════════════════════════════════════════════════ */

let gShakeIntensity = 0;
let gShakeDecay = 0.95;

function triggerShake(intensity) {
  gShakeIntensity = Math.max(gShakeIntensity, intensity);
}

function updateShake(dt) {
  if (gShakeIntensity > 0.1) {
    gShakeIntensity *= gShakeDecay;
  } else {
    gShakeIntensity = 0;
  }
}

function getShakeOffset() {
  if (gShakeIntensity <= 0) return { x: 0, y: 0 };
  return UI.shake(gShakeIntensity);
}

/* ═══════════════════════════════════════════════════════════════════
 * [S35] ENHANCED BOARD RENDER WITH SPARKLES + SHAKE
 * ═══════════════════════════════════════════════════════════════════ */

/* Override board rendering to include sparkles */
const _origRenderBoard = renderBoard;

/* We use a wrapper approach instead of function override (C49~52 policy) */
function renderBoardEnhanced(ctx, w, h) {
  const shake = getShakeOffset();
  if (shake.x !== 0 || shake.y !== 0) {
    ctx.save();
    ctx.translate(shake.x, shake.y);
  }

  _origRenderBoard(ctx, w, h);

  /* Sparkle overlays */
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      if (cell.sparkle > 0 && cell.color >= 0) {
        const x = gBoardX + c * gCellSize;
        const y = gBoardY + r * gCellSize + cell.animY;
        renderGemSparkle(ctx, cell, x, y, gCellSize);
      }
    }
  }

  if (shake.x !== 0 || shake.y !== 0) {
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S36] NOTIFICATIONS & MESSAGES SYSTEM
 * ═══════════════════════════════════════════════════════════════════ */

const gNotifications = [];
const MAX_NOTIFICATIONS = 5;

function addNotification(text, type) {
  gNotifications.push({ text, type: type || 'info', timer: 3000 });
  if (gNotifications.length > MAX_NOTIFICATIONS) gNotifications.shift();
}

function updateNotifications(dt) {
  for (let i = gNotifications.length - 1; i >= 0; i--) {
    gNotifications[i].timer -= dt;
    if (gNotifications[i].timer <= 0) gNotifications.splice(i, 1);
  }
}

function renderNotifications(ctx, w, h) {
  const s = Layout.scale(w, h);
  for (let i = 0; i < gNotifications.length; i++) {
    const n = gNotifications[i];
    const alpha = Math.min(1, n.timer / 500);
    const ny = h * 0.15 + i * 30 * s;

    ctx.globalAlpha = alpha;
    const colors = { info: 'rgba(30,136,229,0.8)', success: 'rgba(67,160,71,0.8)', warning: 'rgba(255,215,0,0.8)', error: 'rgba(229,57,53,0.8)' };
    ctx.fillStyle = colors[n.type] || colors.info;
    const textW = ctx.measureText ? 200 * s : 200;
    const panelW = Math.min(w * 0.7, 280 * s);
    ctx.beginPath();
    ctx.roundRect((w - panelW) / 2, ny, panelW, 25 * s, 6);
    ctx.fill();

    ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText(n.text, w / 2, ny + 14 * s);
  }
  ctx.globalAlpha = 1;
}

 * ═══════════════════════════════════════════════════════════════════ */

/* Patch coreUpdate to include new systems (via wrapper, not override) */
const _origCoreUpdate = coreUpdate;
engine._update = function(dt, timestamp) {
  _origCoreUpdate(dt, timestamp);

  if (!gReady) return;

  /* Additional systems */
  updateTitleGems(dt);
  updateAchievementPopup(dt);
  updateComboDisplay(dt);
  updateSparkles(dt);
  updateShake(dt);
  updateNotifications(dt);

  /* Periodic achievement check */
  if (Math.floor(timestamp / 5000) !== Math.floor((timestamp - dt) / 5000)) {
    checkAchievements();
  }

  /* Tutorial input intercept */
  if (gTutorialActive) {
    handleTutorialInput();
  }
};

/* Patch coreRender to include new overlays */
const _origCoreRender = coreRender;
engine._render = function(ctx, w, h, dt) {
  _origCoreRender(ctx, w, h, dt);

  if (!gReady) return;

  /* Title screen floating gems */
  if (gState === STATE.TITLE) {

  /* Tutorial overlay */
  renderTutorialOverlay(ctx, w, h);

  /* Achievement popup */
  renderAchievementPopup(ctx, w, h);

  /* Combo display */
  renderComboDisplay(ctx, w, h);

  /* Notifications */
  renderNotifications(ctx, w, h);
};

 * ═══════════════════════════════════════════════════════════════════ */

/* Zone unlock paths on kingdom map */
function renderKingdomPaths(ctx, w, h) {
  const s = Layout.scale(w, h);
  const positions = [
    { x: w * 0.2, y: h * 0.75 },   // Zone 1: Castle Gate
    { x: w * 0.45, y: h * 0.65 },   // Zone 2: Garden
    { x: w * 0.7, y: h * 0.6 },     // Zone 3: Market
    { x: w * 0.8, y: h * 0.45 },    // Zone 4: Library
    { x: w * 0.55, y: h * 0.35 },   // Zone 5: Cathedral
    { x: w * 0.3, y: h * 0.3 },     // Zone 6: Throne Room
  ];

  /* Draw paths between zones */
  ctx.strokeStyle = 'rgba(255,215,0,0.4)';
  ctx.lineWidth = 3 * s;
  ctx.setLineDash([8, 4]);
  for (let i = 0; i < positions.length - 1; i++) {
    const from = positions[i];
    const to = positions[i + 1];
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  /* Draw zone markers */
  const markerSize = Math.max(MIN_TOUCH, 36 * s);
  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];
    const unlocked = gSave.maxLevel > i * 6;
    const cleared = gSave.maxLevel > (i + 1) * 6;

    ctx.fillStyle = cleared ? 'rgba(67,160,71,0.8)' : unlocked ? 'rgba(26,35,126,0.8)' : 'rgba(80,80,80,0.5)';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, markerSize / 2, 0, Math.PI * 2);
    ctx.fill();

    if (unlocked) {
      ctx.strokeStyle = cleared ? '#43A047' : PAL.gold;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.font = 'bold ' + Layout.fontSize(10, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = unlocked ? PAL.cream : '#555';
    ctx.fillText(ZONE_NAMES[i], pos.x, pos.y + 2);

    /* Stars count for this zone */
    if (unlocked) {
      let zoneStars = 0;
      for (let lv = i * 6 + 1; lv <= (i + 1) * 6; lv++) {
        zoneStars += gSave.levelStars[lv] || 0;
      }
      ctx.font = Layout.fontSize(9, w, h) + 'px ' + FONT;
      ctx.fillStyle = PAL.gold;
      ctx.fillText('⭐' + zoneStars + '/18', pos.x, pos.y + markerSize / 2 + 10 * s);
    }
  }
}

let gRaidDamagePopups = [];

function spawnRaidDamagePopup(damage, x, y, isBoss) {
  gRaidDamagePopups.push({
    x, y, damage, isBoss,
    timer: 1200, alpha: 1, vy: -50
  });
}

function updateRaidDamagePopups(dt) {
  const dtSec = dt / 1000;
  for (let i = gRaidDamagePopups.length - 1; i >= 0; i--) {
    const p = gRaidDamagePopups[i];
    p.y += p.vy * dtSec;
    p.timer -= dt;
    p.alpha = Math.max(0, p.timer / 1200);
    if (p.timer <= 0) gRaidDamagePopups.splice(i, 1);
  }
}

function renderRaidDamagePopups(ctx, w, h) {
  for (const p of gRaidDamagePopups) {
    ctx.globalAlpha = p.alpha;
    ctx.font = 'bold ' + Layout.fontSize(16, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = p.isBoss ? '#E53935' : '#43A047';
    ctx.fillText((p.isBoss ? '💥' : '⚔️') + ' -' + p.damage, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

/* ═══════════════════════════════════════════════════════════════════
 * [S44] PARALLAX BACKGROUND LAYERS
 * ═══════════════════════════════════════════════════════════════════ */

/* 3-layer parallax for backgrounds */
function renderParallaxBg(ctx, w, h, bgKey) {
  /* Layer 1: Main background */
  if (assets.sprites[bgKey]) {
    ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
  } else {
    /* Fallback gradient */
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.6, '#B8E6B8');
    grad.addColorStop(1, '#2ECC71');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  /* Layer 2: Moving clouds */
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  const cloudOffset = (gTimestamp * 0.015) % (w + 200);
  for (let i = 0; i < 4; i++) {
    const cx = ((i * w / 4 + cloudOffset) % (w + 200)) - 100;
    const cy = h * 0.08 + i * h * 0.04;
    const cloudW = w * 0.08 + i * w * 0.02;
    ctx.beginPath();
    ctx.arc(cx, cy, cloudW, 0, Math.PI * 2);
    ctx.arc(cx + cloudW * 0.6, cy - cloudW * 0.3, cloudW * 0.7, 0, Math.PI * 2);
    ctx.arc(cx - cloudW * 0.4, cy + cloudW * 0.1, cloudW * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  /* Layer 3: Distant sparkle particles */
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 8; i++) {
    const sx = ((i * 137.5 + gTimestamp * 0.01) % w);
    const sy = ((i * 89.3 + gTimestamp * 0.008) % (h * 0.4));
    const sz = 1 + Math.sin(gTimestamp * 0.003 + i) * 1;
    ctx.fillRect(sx, sy, sz, sz);
  }
}

 * ═══════════════════════════════════════════════════════════════════ */

/* Apply parallax to kingdom screen */
const _origKingdomRenderer = stateRenderers[STATE.KINGDOM];
stateRenderers[STATE.KINGDOM] = function(ctx, w, h) {
  renderParallaxBg(ctx, w, h, 'bgKingdomMap');
  drawDarkOverlay(ctx, w, h, 0.3);

  /* Render zone paths on kingdom map */
  renderKingdomPaths(ctx, w, h);

  const s = Layout.scale(w, h);
  const cx = w / 2;

  ctx.font = 'bold ' + Layout.fontSize(24, w, h) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.gold;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.fillText('⭐ ' + gSave.totalStars + ' 별', cx, h * 0.06);
  ctx.shadowBlur = 0;

  /* Buildings grid (2x2) */
  const bldgW = Math.min(w * 0.4, 180 * s);
  const bldgH = Math.min(h * 0.25, 140 * s);
  const gap = 10 * s;
  const gridW = bldgW * 2 + gap;
  const startX = (w - gridW) / 2;
  const startY = h * 0.12;

  gKingdomBuildingLayout = [];
  for (let i = 0; i < 4; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const bx = startX + col * (bldgW + gap);
    const by = startY + row * (bldgH + gap);
    gKingdomBuildingLayout.push({ x: bx, y: by, w: bldgW, h: bldgH });

    const level = gSave.buildings[i];
    const isAnimating = gKingdomBuildAnim === i;
    const canBuildThis = canBuild(i);

    drawPanel(ctx, bx, by, bldgW, bldgH, {
      bgColor: isAnimating ? 'rgba(255,215,0,0.3)' : canBuildThis ? 'rgba(26,35,126,0.85)' : 'rgba(26,35,126,0.7)'
    });

    const imgSize = Math.min(bldgW * 0.35, bldgH * 0.5);
    const assetKey = BUILDING_ASSET[i];
    if (assets.sprites[assetKey]) {
      ctx.drawImage(assets.sprites[assetKey], bx + 8, by + 8, imgSize, imgSize * 0.66);
    } else {
      /* Building fallback icon */
      ctx.font = Layout.fontSize(24, w, h) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText(['🏰', '🌸', '🛒', '🗼'][i], bx + imgSize / 2 + 8, by + imgSize * 0.4 + 8);
    }

    ctx.font = 'bold ' + Layout.fontSize(13, w, h) + 'px ' + FONT;
    ctx.textAlign = 'left';
    ctx.fillStyle = PAL.cream;
    ctx.fillText(BUILDING_NAMES[i] + ' Lv.' + level, bx + imgSize + 14, by + bldgH * 0.25);

    ctx.font = Layout.fontSize(10, w, h) + 'px ' + FONT;
    ctx.fillStyle = PAL.textSecondary;
    ctx.fillText(BUILDING_DESC[i], bx + imgSize + 14, by + bldgH * 0.43);

    /* Build indicator */
    if (level >= 3) {
      ctx.fillStyle = '#43A047';
      ctx.font = 'bold ' + Layout.fontSize(11, w, h) + 'px ' + FONT;
      ctx.fillText('✅ MAX', bx + imgSize + 14, by + bldgH * 0.65);
    } else {
      const cost = BUILDING_COSTS[i][level];
      ctx.fillStyle = canBuildThis ? '#43A047' : '#888';
      ctx.font = 'bold ' + Layout.fontSize(11, w, h) + 'px ' + FONT;
      ctx.fillText(canBuildThis ? '🔨 건설 (⭐' + cost + ')' : '⭐' + cost + ' 필요', bx + imgSize + 14, by + bldgH * 0.65);
    }

    /* Level progress bar */
    const barW2 = bldgW - imgSize - 20;
    const barH2 = 6 * s;
    const barX2 = bx + imgSize + 14;
    const barY2 = by + bldgH * 0.8;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX2, barY2, barW2, barH2);
    ctx.fillStyle = PAL.gold;
    ctx.fillRect(barX2, barY2, barW2 * (level / 3), barH2);

    if (isAnimating) {
      const progress = Math.min(1, gKingdomBuildTimer / 2000);
      ctx.fillStyle = 'rgba(255,215,0,' + (0.2 * (1 - progress)) + ')';
      ctx.fillRect(bx, by, bldgW, bldgH);
    }
  }

  /* Play button */
  const playBtnW = Math.min(w * 0.5, 220 * s);
  const playBtnH = Math.max(MIN_TOUCH, 55 * s);
  const playBtnX = cx - playBtnW / 2;
  const playBtnY = startY + (bldgH * 2 + gap) + 20 * s;
  gKingdomPlayBtn = { x: playBtnX, y: playBtnY, w: playBtnW, h: playBtnH };

  /* Play button — use uiButtonPlay asset if available */
  if (assets.sprites.uiButtonPlay) {
    ctx.drawImage(assets.sprites.uiButtonPlay, playBtnX, playBtnY, playBtnW, playBtnH);
    ctx.font = 'bold ' + Layout.fontSize(20, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText('▶ 레벨 선택', cx, playBtnY + playBtnH / 2 + 3);
    ctx.shadowBlur = 0;
  } else {
    drawPanel(ctx, playBtnX, playBtnY, playBtnW, playBtnH, { bgColor: 'rgba(67,160,71,0.85)' });
    ctx.font = 'bold ' + Layout.fontSize(20, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.cream;
    ctx.fillText('▶ 레벨 선택', cx, playBtnY + playBtnH / 2 + 3);
  }

  /* Level progress */
  const clearedCount = Object.keys(gSave.levelStars).length;
  ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
  ctx.fillStyle = PAL.textSecondary;
  ctx.fillText('클리어: ' + clearedCount + ' / ' + LEVELS.length + '  |  ESC: 모드 선택', cx, playBtnY + playBtnH + 18 * s);
};

/* ═══════════════════════════════════════════════════════════════════
 * [S46] MOBILE VIRTUAL CONTROLS HINT
 * ═══════════════════════════════════════════════════════════════════ */

function renderMobileHint(ctx, w, h) {
  if (!input.isMobile) return;
  if (gState !== STATE.PLAY && gState !== STATE.GUILD_RAID) return;

  const s = Layout.scale(w, h);
  /* Swipe indicator on first play */
  if (gLevelProgress.turnsLeft === LEVELS[gCurrentLevel - 1]?.turns + getDDATurnBonus(gCurrentLevel)) {
    ctx.globalAlpha = 0.4 + Math.sin(gTimestamp / 500) * 0.2;
    ctx.font = Layout.fontSize(12, w, h) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.cream;
    ctx.fillText('👆 보석을 스와이프하여 매칭', w / 2, gBoardY + gBoardH + 55 * s);
    ctx.globalAlpha = 1;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 * [S47] FINAL INTEGRATION — patch all new systems into render pipeline
 * ═══════════════════════════════════════════════════════════════════ */

/* Final render wrapper */
const _finalCoreRender = engine._render;
engine._render = function(ctx, w, h, dt) {
  _finalCoreRender(ctx, w, h, dt);

  /* Mobile hint */
  renderMobileHint(ctx, w, h);

  /* Raid damage popups */
  renderRaidDamagePopups(ctx, w, h);
};

/* Final update wrapper */
const _finalCoreUpdate = engine._update;
engine._update = function(dt, timestamp) {
  _finalCoreUpdate(dt, timestamp);
  updateRaidDamagePopups(dt);
};

/* ═══════════════════════════════════════════════════════════════════
 * [S48] TUTORIAL AUTO-START FOR FIRST PLAY
 * ═══════════════════════════════════════════════════════════════════ */

/* Check if tutorial should start when entering MODE_SELECT for first time */
const _origModeSelectUpdate = stateUpdaters[STATE.MODE_SELECT];
stateUpdaters[STATE.MODE_SELECT] = function(dt) {
  if (!gSave.tutorialDone && !gTutorialActive && gSave.maxLevel <= 1) {
    startTutorial();
    return;
  }
  if (gTutorialActive) return; // Tutorial handles its own input
  _origModeSelectUpdate(dt);
};

/* ═══════════════════════════════════════════════════════════════════
 * [S49] COMPLETE DAILY CHALLENGE INTEGRATION
 * ═══════════════════════════════════════════════════════════════════ */

/* Patch level clear to handle daily challenge */
const _origLevelClearUpdate = stateUpdaters[STATE.LEVEL_CLEAR];
stateUpdaters[STATE.LEVEL_CLEAR] = function(dt) {
  gLevelClearTimer += dt;

  /* Daily challenge completion */
  if (gDailyMode && gLevelClearTimer > 500 && !gSave.dailyDone) {
    completeDailyChallenge(gLevelProgress.score);
  }

  if (gLevelClearTimer > 2000) {
    if (input.confirm()) {
      playSfxSelect();
      if (gDailyMode) {
        gDailyMode = false;
        beginTransition(STATE.MODE_SELECT, 400);
      } else {
        beginTransition(STATE.KINGDOM, 400);
      }
    }
  }
};

/* ═══════════════════════════════════════════════════════════════════
 * [S50] CONSTELLATION MAP FOR ZONE PROGRESSION
 * ═══════════════════════════════════════════════════════════════════ */

/* Draw constellation-style connections between levels in level select */
function renderLevelConstellation(ctx, w, h) {
  const s = Layout.scale(w, h);
  ctx.strokeStyle = 'rgba(255,215,0,0.2)';
  ctx.lineWidth = 1;

  for (let i = 0; i < gLevelBtnLayout.length - 1; i++) {
    const a = gLevelBtnLayout[i];
    const b = gLevelBtnLayout[i + 1];
    if (!a || !b) continue;

    /* Only draw if at least one is unlocked */
    if (!a.unlocked && !b.unlocked) continue;

    ctx.beginPath();
    ctx.moveTo(a.x + a.w / 2, a.y + a.h / 2);
    ctx.lineTo(b.x + b.w / 2, b.y + b.h / 2);
    ctx.stroke();
  }

  /* Current level indicator */
  const currentBtn = gLevelBtnLayout.find(b => b.level === gSave.maxLevel);
  if (currentBtn) {
    const pulse = Math.sin(gTimestamp / 400) * 3 + 5;
    ctx.strokeStyle = 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(currentBtn.x + currentBtn.w / 2, currentBtn.y + currentBtn.h / 2, currentBtn.w / 2 + pulse, 0, Math.PI * 2);
    ctx.stroke();
  }
}

/* Patch level select renderer */
const _origLevelSelectRender = stateRenderers[STATE.LEVEL_SELECT];
stateRenderers[STATE.LEVEL_SELECT] = function(ctx, w, h) {
  _origLevelSelectRender(ctx, w, h);
  renderLevelConstellation(ctx, w, h);
};
</script>
