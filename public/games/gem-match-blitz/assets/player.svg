<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B7A"/>
      <stop offset="50%" stop-color="#FF4757"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <radialGradient id="gemShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4757" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#FF4757" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF4757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="facetLeft" x1="0" y1="0" x2="1" y2="0">
