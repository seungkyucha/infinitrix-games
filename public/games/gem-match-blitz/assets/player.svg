<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cursorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <radialGradient id="cursorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ffb300" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gemHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 글로우 -->
  <circle cx="32" cy="32" r="28" fill="url(#cursorGlow)"/>
  <!-- 선택 커서 외곽 사각형 (둥근 모서리) -->
  <rect x="8" y="8" width="48" height="48" rx="10" ry="10" fill="none" stroke="url(#cursorGrad)" stroke-width="3.5" filter="url(#outerGlow)"/>
  <!-- 내부 보석 형태 (다이아몬드 커서) -->
  <g filter="url(#glow)">
    <path d="M32 14 L44 28 L32 50 L20 28 Z" fill="url(#cursorGrad)" opacity="0.85"/>
    <path d="M32 14 L44 28 L32 30 L20 28 Z" fill="url(#gemHighlight)"/>
  </g>
  <!-- 보석 광택 하이라이트 -->
  <ellipse cx="28" cy="22" rx="5" ry="3" fill="#ffffff" opacity="0.4"/>
  <!-- 코너 장식 - 좌상 -->
  <path d="M12 12 L18 12 M12 12 L12 18" fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 코너 장식 - 우상 -->
  <path d="M52 12 L46 12 M52 12 L52 18" fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 코너 장식 - 좌하 -->
  <path d="M12 52 L18 52 M12 52 L12 46" fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 코너 장식 - 우하 -->
  <path d="M52 52 L46 52 M52 52 L52 46" fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 중앙 십자 에너지 라인 -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#ffd54f" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="58" stroke="#ffd54f" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="14" y2="32" stroke="#ffd54f" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="58" y2="32" stroke="#ffd54f" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>