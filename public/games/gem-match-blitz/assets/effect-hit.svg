<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="15%" stop-color="#ffd54f" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#ff8a65" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#e94560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#4fc3f7" stop-opacity="0"/>
      <stop offset="82%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="88%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="94%" stop-color="#4fc3f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#ab47bc" stop-opacity="0"/>
      <stop offset="90%" stop-color="#ab47bc" stop-opacity="0.2"/>
      <stop offset="95%" stop-color="#ab47bc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 충격파 링 -->
  <circle cx="48" cy="48" r="46" fill="url(#outerRing)"/>
  <circle cx="48" cy="48" r="38" fill="url(#shockwave)"/>
  <!-- 핵심 폭발 코어 -->
  <circle cx="48" cy="48" r="24" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 방사형 광선 (8방향) -->
  <g stroke="#ffd54f" stroke-width="2" opacity="0.6" stroke-linecap="round" filter="url(#sparkGlow)">
    <line x1="48" y1="20" x2="48" y2="8"/>
    <line x1="48" y1="76" x2="48" y2="88"/>
    <line x1="20" y1="48" x2="8" y2="48"/>
    <line x1="76" y1="48" x2="88" y2="48"/>
    <line x1="28" y1="28" x2="18" y2="18"/>
    <line x1="68" y1="28" x2="78" y2="18"/>
    <line x1="28" y1="68" x2="18" y2="78"/>
    <line x1="68" y1="68" x2="78" y2="78"/>
  </g>
  <!-- 보석 파편 (6색) -->
  <g filter="url(#sparkGlow)">
    <path d="M30 18 L33 14 L36 18 L33 20 Z" fill="#e94560" opacity="0.8"/>
    <path d="M62 20 L65 16 L68 20 L65 22 Z" fill="#4fc3f7" opacity="0.7"/>
    <path d="M18 40 L21 36 L24 40 L21 42 Z" fill="#66bb6a" opacity="0.7"/>
    <path d="M72 42 L75 38 L78 42 L75 44 Z" fill="#ffd54f" opacity="0.8"/>
    <path d="M26 70 L29 66 L32 70 L29 72 Z" fill="#ab47bc" opacity="0.7"/>
    <path d="M66 72 L69 68 L72 72 L69 74 Z" fill="#ff8a65" opacity="0.7"/>
  </g>
  <!-- 내부 밝은 십자 -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round" filter="url(#hitGlow)">
    <line x1="48" y1="36" x2="48" y2="28"/>
    <line x1="48" y1="60" x2="48" y2="68"/>
    <line x1="36" y1="48" x2="28" y2="48"/>
    <line x1="60" y1="48" x2="68" y2="48"/>
  </g>
  <!-- 중심 밝은 점 -->
  <circle cx="48" cy="48" r="4" fill="#ffffff" opacity="0.9" filter="url(#hitGlow)"/>
</svg>