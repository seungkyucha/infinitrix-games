<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="25%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ab47bc" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#ab47bc" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#4fc3f7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaC" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigStarGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 그라디언트 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 성운 레이어 -->
  <rect width="800" height="600" fill="url(#nebulaA)"/>
  <rect width="800" height="600" fill="url(#nebulaB)"/>
  <rect width="800" height="600" fill="url(#nebulaC)"/>
  <!-- 작은 별들 -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="50" cy="40" r="1"/>
    <circle cx="120" cy="80" r="0.8"/>
    <circle cx="200" cy="30" r="1.2"/>
    <circle cx="280" cy="110" r="0.7"/>
    <circle cx="350" cy="60" r="1"/>
    <circle cx="420" cy="25" r="0.9"/>
    <circle cx="500" cy="90" r="1.1"/>
    <circle cx="580" cy="45" r="0.8"/>
    <circle cx="650" cy="100" r="1"/>
    <circle cx="720" cy="35" r="0.7"/>
    <circle cx="770" cy="75" r="1.2"/>
    <circle cx="90" cy="180" r="0.9"/>
    <circle cx="170" cy="220" r="1"/>
    <circle cx="310" cy="190" r="0.8"/>
    <circle cx="460" cy="170" r="1.1"/>
    <circle cx="550" cy="210" r="0.7"/>
    <circle cx="680" cy="160" r="1"/>
    <circle cx="40" cy="320" r="0.8"/>
    <circle cx="150" cy="350" r="1.2"/>
    <circle cx="260" cy="300" r="0.7"/>
    <circle cx="370" cy="380" r="1"/>
    <circle cx="490" cy="340" r="0.9"/>
    <circle cx="600" cy="310" r="1.1"/>
    <circle cx="710" cy="370" r="0.8"/>
    <circle cx="80" cy="450" r="1"/>
    <circle cx="240" cy="480" r="0.7"/>
    <circle cx="400" cy="460" r="1.2"/>
    <circle cx="560" cy="440" r="0.9"/>
    <circle cx="700" cy="500" r="1"/>
    <circle cx="760" cy="470" r="0.8"/>
  </g>
  <!-- 중간 별들 (약간 더 밝고 큼) -->
  <g fill="#ffffff" opacity="0.8" filter="url(#starGlow)">
    <circle cx="100" cy="120" r="1.5"/>
    <circle cx="300" cy="50" r="1.8"/>
    <circle cx="500" cy="150" r="1.5"/>
    <circle cx="700" cy="80" r="1.7"/>
    <circle cx="180" cy="400" r="1.6"/>
    <circle cx="620" cy="350" r="1.5"/>
    <circle cx="450" cy="520" r="1.8"/>
    <circle cx="350" cy="270" r="1.4"/>
  </g>
  <!-- 큰 빛나는 별 (보석 색상) -->
  <g filter="url(#bigStarGlow)">
    <circle cx="200" cy="150" r="2.5" fill="#4fc3f7" opacity="0.7"/>
    <circle cx="600" cy="200" r="2" fill="#ab47bc" opacity="0.6"/>
    <circle cx="400" cy="100" r="2.5" fill="#ffd54f" opacity="0.5"/>
    <circle cx="150" cy="500" r="2" fill="#e94560" opacity="0.5"/>
    <circle cx="680" cy="450" r="2.5" fill="#66bb6a" opacity="0.5"/>
  </g>
  <!-- 원경 산맥 실루엣 (크리스탈 산) -->
  <g opacity="0.15">
    <path d="M0 580 L40 520 L80 540 L130 480 L180 510 L220 460 L270 490 L320 440 L370 470 L420 420 L470 460 L520 430 L560 470 L600 410 L650 450 L700 400 L740 440 L780 420 L800 450 L800 600 L0 600 Z" fill="#0f3460"/>
  </g>
  <g opacity="0.08">
    <path d="M0 590 L60 550 L120 560 L190 520 L260 540 L340 500 L410 530 L480 490 L550 520 L630 480 L700 510 L770 470 L800 490 L800 600 L0 600 Z" fill="#4fc3f7"/>
  </g>
</svg>