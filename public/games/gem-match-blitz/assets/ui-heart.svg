<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="heartGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="60%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#b71540"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heartShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="heartGlowF">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#heartGlow)"/>
  <!-- 하트 본체 -->
  <g filter="url(#heartGlowF)">
    <path d="M16 28 C12 24 4 19 4 12 C4 7.6 7.6 4 12 4 C13.8 4 15.4 5 16 6.4 C16.6 5 18.2 4 20 4 C24.4 4 28 7.6 28 12 C28 19 20 24 16 28 Z" fill="url(#heartGrad)"/>
  </g>
  <!-- 광택 하이라이트 -->
  <path d="M12 8 C9.5 8 7 10.2 7 13 C7 14 7.4 15 8 15.8 Q10 11 14 9 Z" fill="url(#heartShine)" opacity="0.7"/>
  <!-- 작은 별 반짝임 -->
  <g fill="#ffffff" opacity="0.8" filter="url(#heartGlowF)">
    <circle cx="11" cy="9" r="1"/>
    <circle cx="9" cy="11" r="0.6"/>
  </g>
</svg>