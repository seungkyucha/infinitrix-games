<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="starGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </radialGradient>
    <radialGradient id="starGlowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starShine" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="starGlowF">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <circle cx="16" cy="16" r="14" fill="url(#starGlowBg)"/>
  <!-- 별 본체 -->
  <g filter="url(#starGlowF)">
    <path d="M16 3 L19.2 11.5 L28 12.2 L21.5 18 L23.5 27 L16 22.5 L8.5 27 L10.5 18 L4 12.2 L12.8 11.5 Z" fill="url(#starGrad)"/>
  </g>
  <!-- 상단 광택 -->
  <path d="M16 5 L18 11 L16 10 L14 11 Z" fill="url(#starShine)" opacity="0.6"/>
  <!-- 중앙 하이라이트 -->
  <circle cx="15" cy="13" r="2.5" fill="#ffffff" opacity="0.25"/>
  <!-- 반짝이는 점들 -->
  <g fill="#ffffff" opacity="0.9" filter="url(#starGlowF)">
    <circle cx="14" cy="10" r="0.8"/>
    <circle cx="12" cy="12" r="0.5"/>
  </g>
</svg>