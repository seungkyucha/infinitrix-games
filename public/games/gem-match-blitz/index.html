// ─── TweenManager (C4 교훈: clearImmediate 지원) ───
const tw = {
  _tweens: [],
  _toAdd: [],
  _clearing: false,
  // 트윈 추가
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeInOutQuad', onComplete: onComplete || null };
    for (const k in props) {
      t.props[k] = { from: obj[k], to: props[k] };
    }
    if (this._clearing) this._toAdd.push(t);
    else this._tweens.push(t);
    return t;
  },
  // 즉시 정리 (C4 경쟁 조건 방지)
  clearImmediate() {
    this._tweens.length = 0;
    this._toAdd.length = 0;
    this._clearing = false;
  },
  // 매 프레임 업데이트
  update(dt) {
    this._clearing = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.dur, 1);
      const ep = easeFn(t.ease, p);
      for (const k in t.props) {
        t.obj[k] = t.props[k].from + (t.props[k].to - t.props[k].from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
    this._clearing = false;
    if (this._toAdd.length > 0) {
      this._tweens.push(...this._toAdd);
      this._toAdd.length = 0;
    }
  },
  count() { return this._tweens.length; }
};

// ─── 이징 함수 ───
function easeFn(name, t) {
  switch (name) {
    case 'linear': return t;
    case 'easeInOutQuad': return t < 0.5 ? 2*t*t : 1-(-2*t+2)*(-2*t+2)/2;
    case 'easeOutBack': { const c = 1.70158; const c3 = c + 1; return 1 + c3 * Math.pow(t-1,3) + c * Math.pow(t-1,2); }
    case 'easeOutBounce': {
      if (t < 1/2.75) return 7.5625*t*t;
      if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
      if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
      return 7.5625*(t-=2.625/2.75)*t+0.984375;
    }
    default: return t < 0.5 ? 2*t*t : 1-(-2*t+2)*(-2*t+2)/2;
  }
}

// ─── ObjectPool (파티클 + 팝업) ───
function createPool(size, factory) {
  const pool = [];
  for (let i = 0; i < size; i++) pool.push(factory());
  return {
    items: pool,
    // 비활성 아이템 가져오기
    get() {
      for (let i = 0; i < pool.length; i++) {
        if (!pool[i].active) { pool[i].active = true; return pool[i]; }
      }
      return null;
    },
    // 활성 아이템 업데이트
    update(dt) {
      for (let i = 0; i < pool.length; i++) {
        if (pool[i].active) {
          pool[i].life -= dt;
          if (pool[i].life <= 0) { pool[i].active = false; continue; }
          pool[i].x += pool[i].vx * dt;
          pool[i].y += pool[i].vy * dt;
          if (pool[i].vy !== undefined) pool[i].vy += (pool[i].gravity || 0) * dt;
          pool[i].alpha = Math.max(0, pool[i].life / pool[i].maxLife);
          if (pool[i].scaleDecay) pool[i].scale = pool[i].alpha;
        }
      }
    },
    // 모든 아이템 비활성화
    clear() { for (let i = 0; i < pool.length; i++) pool[i].active = false; }
  };
}

// ─── SoundManager (Web Audio — §9 정확 반영) ───
const sound = {
  ctx: null,
  gain: null,
  muted: false,
  // 오디오 컨텍스트 초기화
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.gain = this.ctx.createGain();
      this.gain.gain.value = CONFIG.MASTER_VOLUME;
      this.gain.connect(this.ctx.destination);
    } catch(e) { console.warn('Web Audio unavailable'); }
  },
  // 모바일 터치 시 resume
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  // 단일 톤 재생
  _tone(freq1, freq2, dur, wave, delay) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = wave || 'sine';
    osc.frequency.setValueAtTime(freq1, t);
    if (freq2 !== freq1) osc.frequency.linearRampToValueAtTime(freq2, t + dur/1000);
    g.gain.setValueAtTime(0.3, t);
    g.gain.linearRampToValueAtTime(0, t + dur/1000);
    osc.connect(g);
    g.connect(this.gain);
    osc.start(t);
    osc.stop(t + dur/1000);
  },
  swap() { this._tone(440, 660, 120, 'sine'); },
  match() { this._tone(523, 262, 150, 'triangle'); },
  cascade(n) { this._tone(523*Math.pow(1.1, n), 262*Math.pow(1.1, n), 150, 'triangle'); },
  specialCreate() { this._tone(880, 1320, 200, 'square'); this._tone(880, 1320, 200, 'sine'); },
  specialExplode() { this._tone(220, 880, 150, 'sawtooth'); this._tone(880, 110, 150, 'sawtooth', 0.15); },
  stageClear() { const n=[523,659,784,1047]; for(let i=0;i<n.length;i++) this._tone(n[i],n[i],150,'sine',i*0.15); },
  gameOver() { const n=[262,220,175]; for(let i=0;i<n.length;i++) this._tone(n[i],n[i],170,'sine',i*0.17); },
  revert() { this._tone(330, 220, 100, 'sine'); },
  setMute(m) {
    this.muted = m;
    if (this.gain) this.gain.gain.value = m ? 0 : CONFIG.MASTER_VOLUME;
  }
};

// ─── TransitionGuard ───
function beginTransition(target) {
  if (transitioning) return;
  transitioning = true;
  transitionTarget = target;
  const fadeObj = { alpha: 0 };
  tw.add(fadeObj, { alpha: 1 }, CONFIG.TRANSITION_DURATION * 0.5, 'easeInOutQuad', () => {
    enterState(target);
    tw.add(fadeObj, { alpha: 0 }, CONFIG.TRANSITION_DURATION * 0.5, 'easeInOutQuad', () => {
      transitioning = false;
      transitionAlpha = 0;
    });
  });
  // transitionAlpha 추적용 트윈 객체 참조
  transitionFadeObj = fadeObj;
}
let transitionFadeObj = { alpha: 0 };

  switch(s) {

      titleAnim = 0;

      saveProgress();
      sound.stageClear();
      break;
    case STATE.GAME_OVER:

      saveProgress();
      sound.gameOver();
      break;
    case STATE.VICTORY:
      totalScore += score;
      saveProgress();
      sound.stageClear();
      break;
  }
}

// ─── §10 순수 함수 ───

// 초기 그리드 생성 (3매치 없는 배치 보장)
function createGrid(rows, cols, numColors) {
  const g = [];
  for (let r = 0; r < rows; r++) {
    g[r] = [];
    for (let c = 0; c < cols; c++) {
      let color;
      do {
        color = Math.floor(Math.random() * numColors);
      } while (
        (c >= 2 && g[r][c-1].color === color && g[r][c-2].color === color) ||
        (r >= 2 && g[r-1][c].color === color && g[r-2][c].color === color)
      );
      g[r][c] = { color, special: SPECIAL.NONE, x: 0, y: 0, scale: 1, alpha: 1, offsetX: 0, offsetY: 0 };
    }
  }
  return g;
}

// 모든 매치 탐색
function findMatches(g) {
  const rows = g.length, cols = g[0].length;
  const matchGroups = [];
  // 가로 스캔
  for (let r = 0; r < rows; r++) {
    let start = 0;
    for (let c = 1; c <= cols; c++) {
      if (c < cols && g[r][c] && g[r][start] && g[r][c].color === g[r][start].color &&
          g[r][c].special !== SPECIAL.COLOR && g[r][start].special !== SPECIAL.COLOR) continue;
      const len = c - start;
      if (len >= 3 && g[r][start] && g[r][start].color >= 0) {
        const cells = [];
        for (let i = start; i < c; i++) cells.push({r, c: i});
        matchGroups.push({ cells, dir: 'h', len });
      }
      start = c;
    }
  }
  // 세로 스캔
  for (let c = 0; c < cols; c++) {
    let start = 0;
    for (let r = 1; r <= rows; r++) {
      if (r < rows && g[r] && g[start] && g[r][c] && g[start][c] && g[r][c].color === g[start][c].color &&
          g[r][c].special !== SPECIAL.COLOR && g[start][c].special !== SPECIAL.COLOR) continue;
      const len = r - start;
      if (len >= 3 && g[start] && g[start][c] && g[start][c].color >= 0) {
        const cells = [];
        for (let i = start; i < r; i++) cells.push({r: i, c});
        matchGroups.push({ cells, dir: 'v', len });
      }
      start = r;
    }
  }
  return mergeOverlapping(matchGroups, cols);
}

// 교차 매치 그룹 병합
function mergeOverlapping(groups, cols) {
  if (groups.length <= 1) return groups;
  const merged = [];
  const used = new Array(groups.length).fill(false);
  for (let i = 0; i < groups.length; i++) {
    if (used[i]) continue;
    let combined = [...groups[i].cells];
    let hasH = groups[i].dir === 'h';
    let hasV = groups[i].dir === 'v';
    let changed = true;
    used[i] = true;
    while (changed) {
      changed = false;
      for (let j = 0; j < groups.length; j++) {
        if (used[j]) continue;
        let overlap = false;
        for (const c1 of combined) {
          for (const c2 of groups[j].cells) {
            if (c1.r === c2.r && c1.c === c2.c) { overlap = true; break; }
          }
          if (overlap) break;
        }
        if (overlap) {
          used[j] = true; changed = true;
          if (groups[j].dir === 'h') hasH = true;
          if (groups[j].dir === 'v') hasV = true;
          for (const c2 of groups[j].cells) {
            if (!combined.some(c1 => c1.r === c2.r && c1.c === c2.c)) combined.push(c2);
          }
        }
      }
    }
    let type = 'normal';
    if (combined.length >= 5 && hasH && hasV) type = 'LT';
    else if (combined.length >= 5) type = '5line';
    else if (hasH && hasV) type = 'LT';
    else if (combined.length === 4) type = '4line';
    merged.push({ cells: combined, type, dir: hasH ? 'h' : 'v', len: combined.length });
  }
  return merged;
}

// 교환 후 매치 가능 여부
function isValidSwap(g, r1, c1, r2, c2) {
  if (g[r1][c1].special === SPECIAL.COLOR || g[r2][c2].special === SPECIAL.COLOR) return true;
  const tmp = g[r1][c1];
  g[r1][c1] = g[r2][c2];
  g[r2][c2] = tmp;
  const matches = findMatches(g);
  g[r2][c2] = g[r1][c1];
  g[r1][c1] = tmp;
  return matches.length > 0;
}

// 빈 칸 위 보석 낙하
function applyGravity(g) {
  const rows = g.length, cols = g[0].length;
  const moves = [];
  for (let c = 0; c < cols; c++) {
    let writeRow = rows - 1;
    for (let r = rows - 1; r >= 0; r--) {
      if (g[r][c] !== null) {
        if (r !== writeRow) {
          moves.push({ fromR: r, fromC: c, toR: writeRow, toC: c, dist: writeRow - r });
          g[writeRow][c] = g[r][c];
          g[r][c] = null;
        }
        writeRow--;
      }
    }
  }
  return moves;
}

// 최상단 빈 칸 채우기
function fillEmpty(g, numColors) {
  const rows = g.length, cols = g[0].length;
  const fills = [];
  for (let c = 0; c < cols; c++) {
    let emptyCount = 0;
    for (let r = 0; r < rows; r++) {
      if (g[r][c] === null) emptyCount++;
      else break;
    }
    for (let r = 0; r < emptyCount; r++) {
      const color = Math.floor(Math.random() * numColors);
      g[r][c] = { color, special: SPECIAL.NONE, x: 0, y: 0, scale: 1, alpha: 1, offsetX: 0, offsetY: 0 };
      fills.push({ r, c, color, dist: emptyCount - r });
    }
  }
  return fills;
}

// 힌트 탐색
function findHint(g) {
  const rows = g.length, cols = g[0].length;
  const dirs = [[0,1],[1,0]];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      for (const [dr, dc] of dirs) {
        const nr = r+dr, nc = c+dc;
        if (nr >= rows || nc >= cols) continue;
        if (isValidSwap(g, r, c, nr, nc)) return {r1:r,c1:c,r2:nr,c2:nc};
      }
    }
  }
  return null;
}

// 셔플
function shuffleGrid(g, numColors) {
  const rows = g.length, cols = g[0].length;
  const flat = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (g[r][c]) flat.push(g[r][c].color);
  for (let attempts = 0; attempts < 10; attempts++) {
    for (let i = flat.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    let idx = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        g[r][c].color = flat[idx++];
        g[r][c].special = SPECIAL.NONE;
      }
    if (findMatches(g).length === 0 && findHint(g) !== null) return g;
  }
  return createGrid(rows, cols, numColors);
}

// 점수 계산
function calcScore(matchType, cascadeNum) {
  let base = CONFIG.SCORE_3MATCH;
  if (matchType === '4line') base = CONFIG.SCORE_4MATCH;
  else if (matchType === '5line') base = CONFIG.SCORE_5MATCH;
  else if (matchType === 'LT') base = CONFIG.SCORE_LT_MATCH;
  const mult = Math.min(1 + (cascadeNum - 1) * CONFIG.CASCADE_BONUS_STEP, CONFIG.CASCADE_BONUS_MAX);
  return Math.floor(base * mult);
}

// 특수 보석 판정
function getSpecialType(cells, dir) {
  if (cells.length >= 5) {
    const rows = new Set(cells.map(c=>c.r));
    const cols = new Set(cells.map(c=>c.c));
    if (rows.size > 1 && cols.size > 1) return SPECIAL.BLAST;
    return SPECIAL.COLOR;
  }
  if (cells.length === 4) return dir === 'h' ? SPECIAL.LINE_V : SPECIAL.LINE_H;
  return SPECIAL.NONE;
}

// 스테이지 목표 확인
function checkStageGoal(stageIdx, progress) {
  const s = STAGES[stageIdx];
  if (s.goalType === 'score') return progress.score >= s.goalVal;
  if (s.goalType === 'color') {
    for (let i = 0; i < s.goalColors.length; i++)
      if ((progress.colorCount[s.goalColors[i]] || 0) < s.goalAmounts[i]) return false;
    return true;
  }
  if (s.goalType === 'special') {
    for (let i = 0; i < s.goalSpecials.length; i++) {
      const key = s.goalSpecials[i];
      if (key === 'any') {
        if ((progress.lineCount||0)+(progress.blastCount||0)+(progress.colorCount2||0) < s.goalAmounts[i]) return false;
      } else if (key === 'line') { if ((progress.lineCount||0) < s.goalAmounts[i]) return false; }
      else if (key === 'blast') { if ((progress.blastCount||0) < s.goalAmounts[i]) return false; }
      else if (key === 'color') { if ((progress.colorCount2||0) < s.goalAmounts[i]) return false; }
    }
    return true;
  }
  return false;
}

// 스타 계산
function calcStars(left, total, star3Threshold) {
  if (left >= star3Threshold) return 3;
  if (left >= Math.ceil(total / 3)) return 2;
  return 1;
}

// ─── localStorage (F19) ───
let savedProgress = null;

function loadProgress() {
  try {
    const raw = localStorage.getItem('gemMatchBlitz_progress');
    if (raw) {
      savedProgress = JSON.parse(raw);
      currentStage = savedProgress.currentStage || 0;
      starsEarned = savedProgress.stars || [];
      totalScore = savedProgress.totalScore || 0;
      bestScore = savedProgress.bestScore || 0;
    }
  } catch(e) {}
}

function saveProgress() {
  const newBest = totalScore > bestScore;
  if (newBest) bestScore = totalScore;
  try {
    localStorage.setItem('gemMatchBlitz_progress', JSON.stringify({
      currentStage, stars: starsEarned, totalScore, bestScore
    }));
  } catch(e) {}
}

// ─── 레이아웃 계산 ───
function calcGridLayout() {
  const margin = 10;
  const hudTop = 70;
  const hudBottom = 60;
  const availW = W - margin * 2;
  const availH = H - hudTop - hudBottom - margin * 2;
  const maxSize = Math.min(availW, availH);
  cellSize = Math.max(CONFIG.MIN_TOUCH_TARGET, Math.floor(maxSize / CONFIG.GRID_COLS));
  const gridW = cellSize * CONFIG.GRID_COLS;
  const gridH = cellSize * CONFIG.GRID_ROWS;
  gridOffsetX = Math.floor((W - gridW) / 2);
  gridOffsetY = hudTop + Math.floor((availH - gridH) / 2) + margin;
}

function updateGemPositions(g) {
  for (let r = 0; r < CONFIG.GRID_ROWS; r++)
    for (let c = 0; c < CONFIG.GRID_COLS; c++)
      if (g[r] && g[r][c]) {
        g[r][c].x = gridOffsetX + c * cellSize + cellSize / 2;
        g[r][c].y = gridOffsetY + r * cellSize + cellSize / 2;
      }
}

// ─── 배경 ───
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < CONFIG.BG_STAR_COUNT; i++) {
    bgStars.push({
      x: Math.random() * W, y: Math.random() * H,
      size: Math.random() * 2 + 0.5, speed: Math.random() * 15 + 5,
      alpha: Math.random() * 0.5 + 0.3
    });
  }
}

function renderBgCache() {
  if (!bgCache) bgCache = document.createElement('canvas');
  bgCache.width = canvas.width;
  bgCache.height = canvas.height;
  const bctx = bgCache.getContext('2d');
  bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const grd = bctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0a0a1a');
  grd.addColorStop(0.5, '#0f0f2a');
  grd.addColorStop(1, '#0a0a1a');
  bctx.fillStyle = grd;
  bctx.fillRect(0, 0, W, H);
  // 그리드 배경
  const gw = cellSize * CONFIG.GRID_COLS;
  const gh = cellSize * CONFIG.GRID_ROWS;
  if (cellSize > 0) {
    bctx.fillStyle = '#151530';
    roundRect(bctx, gridOffsetX - 6, gridOffsetY - 6, gw + 12, gh + 12, 12);
    bctx.fill();
    bctx.strokeStyle = '#2a2a5a';
    bctx.lineWidth = 0.5;
    for (let r = 0; r < CONFIG.GRID_ROWS; r++)
      for (let c = 0; c < CONFIG.GRID_COLS; c++)
        bctx.strokeRect(gridOffsetX + c * cellSize, gridOffsetY + r * cellSize, cellSize, cellSize);
  }
  bgCacheDirty = false;
}

// ─── 보석 드로잉 ───
function drawGem(c, x, y, sz, gem) {
  const col = GEM_COLORS[gem.color];
  if (!col) return;
  const half = sz * 0.4;
  c.save();
  c.translate(x, y);
  c.globalAlpha = gem.alpha !== undefined ? gem.alpha : 1;
  c.scale(gem.scale || 1, gem.scale || 1);
  c.shadowColor = col.main;
  c.shadowBlur = 8;
  c.fillStyle = col.main;
  switch(col.shape) {
    case 'diamond':
      c.rotate(Math.PI/4);
      roundRect(c, -half*0.7, -half*0.7, half*1.4, half*1.4, 3);
      c.fill();
      c.fillStyle = col.hi + '50';
      c.fillRect(-half*0.3, -half*0.5, half*0.6, half*0.3);
      break;
    case 'circle':
      c.beginPath(); c.arc(0, 0, half, 0, Math.PI*2); c.fill();
      c.fillStyle = col.hi + '50';
      c.beginPath(); c.arc(-half*0.2, -half*0.2, half*0.45, 0, Math.PI*2); c.fill();
      break;
    case 'hexagon':
      c.beginPath();
      for (let i = 0; i < 6; i++) { const a = Math.PI/6 + i*Math.PI/3; c.lineTo(Math.cos(a)*half, Math.sin(a)*half); }
      c.closePath(); c.fill();
      c.fillStyle = col.hi + '50';
      c.beginPath();
      for (let i = 0; i < 6; i++) { const a = Math.PI/6 + i*Math.PI/3; c.lineTo(Math.cos(a)*half*0.5, Math.sin(a)*half*0.5 - half*0.15); }
      c.closePath(); c.fill();
      break;
    case 'star':
      c.beginPath();
      for (let i = 0; i < 10; i++) { const a = -Math.PI/2 + i*Math.PI/5; const rad = i%2===0 ? half : half*0.45; c.lineTo(Math.cos(a)*rad, Math.sin(a)*rad); }
      c.closePath(); c.fill();
      c.fillStyle = col.hi + '50';
      c.beginPath(); c.arc(0, -half*0.15, half*0.3, 0, Math.PI*2); c.fill();
      break;
    case 'triangle':
      c.beginPath(); c.moveTo(0, -half); c.lineTo(half*0.9, half*0.7); c.lineTo(-half*0.9, half*0.7); c.closePath(); c.fill();
      c.fillStyle = col.hi + '50';
      c.beginPath(); c.moveTo(0, -half*0.5); c.lineTo(half*0.3, half*0.1); c.lineTo(-half*0.3, half*0.1); c.closePath(); c.fill();
      break;
    case 'square':
      roundRect(c, -half*0.8, -half*0.8, half*1.6, half*1.6, 5); c.fill();
      c.fillStyle = col.hi + '50';
      c.fillRect(-half*0.4, -half*0.5, half*0.8, half*0.35);
      break;
  }
  // 특수 보석 오버레이
  c.shadowBlur = 0;
  if (gem.special === SPECIAL.LINE_H || gem.special === SPECIAL.LINE_V) {
    c.strokeStyle = '#ffffffcc'; c.lineWidth = 2;
    if (gem.special === SPECIAL.LINE_H) {
      c.beginPath(); c.moveTo(-half*0.7, 0); c.lineTo(half*0.7, 0); c.stroke();
      c.beginPath(); c.moveTo(half*0.4, -half*0.2); c.lineTo(half*0.7, 0); c.lineTo(half*0.4, half*0.2); c.stroke();
      c.beginPath(); c.moveTo(-half*0.4, -half*0.2); c.lineTo(-half*0.7, 0); c.lineTo(-half*0.4, half*0.2); c.stroke();
    } else {
      c.beginPath(); c.moveTo(0, -half*0.7); c.lineTo(0, half*0.7); c.stroke();
      c.beginPath(); c.moveTo(-half*0.2, half*0.4); c.lineTo(0, half*0.7); c.lineTo(half*0.2, half*0.4); c.stroke();
      c.beginPath(); c.moveTo(-half*0.2, -half*0.4); c.lineTo(0, -half*0.7); c.lineTo(half*0.2, -half*0.4); c.stroke();
    }
  } else if (gem.special === SPECIAL.BLAST) {
    c.strokeStyle = '#ffd70099'; c.lineWidth = 2;
    c.strokeRect(-half*0.5, -half*0.5, half, half);
    c.strokeRect(-half*0.25, -half*0.25, half*0.5, half*0.5);
  } else if (gem.special === SPECIAL.COLOR) {
    const rGrd = c.createRadialGradient(0, 0, 0, 0, 0, half);
    rGrd.addColorStop(0, '#ffffff'); rGrd.addColorStop(0.3, '#ff3366');
    rGrd.addColorStop(0.5, '#ffcc00'); rGrd.addColorStop(0.7, '#33ff66');
    rGrd.addColorStop(0.9, '#3366ff'); rGrd.addColorStop(1, '#cc33ff');
    c.fillStyle = rGrd;
    c.beginPath(); c.arc(0, 0, half*0.9, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

// ─── 유틸 ───
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y); c.closePath();
}

function drawStar5(c, x, y, size) {
  c.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI/2 + i*Math.PI/5;
    const r = i%2===0 ? size : size*0.4;
    c.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  c.closePath(); c.fill();
}

function emitParticles(x, y, color, count) {
  const col = GEM_COLORS[color] ? GEM_COLORS[color].main : '#ffffff';
  for (let i = 0; i < count; i++) {
    const p = particles.get();
    if (!p) break;
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 120;
    p.x = x; p.y = y; p.vx = Math.cos(angle)*speed; p.vy = Math.sin(angle)*speed;
    p.gravity = 200; p.life = 0.5+Math.random()*0.3; p.maxLife = p.life;
    p.color = col; p.size = 3+Math.random()*3; p.scale = 1; p.scaleDecay = true; p.alpha = 1;
  }
}

function emitPopup(x, y, text, color) {
  const p = popups.get();
  if (!p) return;
  p.x = x; p.y = y; p.vx = 0; p.vy = -60; p.gravity = 0;
  p.life = CONFIG.POPUP_DURATION; p.maxLife = CONFIG.POPUP_DURATION;
  p.text = text; p.color = color||'#ffcc00'; p.size = 16; p.scale = 1; p.scaleDecay = false; p.alpha = 1;
}

// ─── 스와이프 처리 ───
function handleSwap(r1, c1, r2, c2) {
  if (state !== STATE.PLAYING || isProcessing || transitioning) return;
  if (r1<0||r1>=CONFIG.GRID_ROWS||c1<0||c1>=CONFIG.GRID_COLS) return;
  if (r2<0||r2>=CONFIG.GRID_ROWS||c2<0||c2>=CONFIG.GRID_COLS) return;
  if (Math.abs(r1-r2)+Math.abs(c1-c2) !== 1) return;
  sound.swap();
  const valid = isValidSwap(grid, r1, c1, r2, c2) ||
    grid[r1][c1].special === SPECIAL.COLOR || grid[r2][c2].special === SPECIAL.COLOR;
  executeSwap(r1, c1, r2, c2, !valid);
}

function executeSwap(r1, c1, r2, c2, revert) {
  enterState(STATE.ANIMATING);
  selectedGem = null;
  const g1 = grid[r1][c1], g2 = grid[r2][c2];
  const dur = revert ? CONFIG.REVERT_DURATION : CONFIG.SWAP_DURATION;
  const easing = revert ? 'easeOutBack' : 'easeInOutQuad';
  const dx = (c2-c1)*cellSize, dy = (r2-r1)*cellSize;
  // 실제 그리드 교환 (렌더링 용)
  grid[r1][c1] = g2; grid[r2][c2] = g1;
  g1.offsetX = -dx; g1.offsetY = -dy;
  g2.offsetX = dx; g2.offsetY = dy;
  let done = 0;
  const onDone = () => {
    done++;
    if (done < 2) return;
    g1.offsetX = 0; g1.offsetY = 0;
    g2.offsetX = 0; g2.offsetY = 0;
    if (revert) {
      grid[r1][c1] = g1; grid[r2][c2] = g2;
      enterState(STATE.PLAYING);
      sound.revert();
    } else {
      updateGemPositions(grid);
      movesLeft--;
      cascadeCount = 0;
      if (g1.special !== SPECIAL.NONE && g2.special !== SPECIAL.NONE) {
        handleSpecialCombo(r2, c2, r1, c1);
      } else if (g1.special === SPECIAL.COLOR) {
        handleColorBomb(r2, c2, g2.color);
      } else if (g2.special === SPECIAL.COLOR) {
        handleColorBomb(r1, c1, g1.color);
      } else {
        enterState(STATE.CASCADE);
        processCascade();
      }
    }
  };
  tw.add(g1, {offsetX:0, offsetY:0}, dur, easing, onDone);
  tw.add(g2, {offsetX:0, offsetY:0}, dur, easing, onDone);
}

// ─── 색상 폭탄 ───
function handleColorBomb(br, bc, targetColor) {
  enterState(STATE.CASCADE);
  cascadeCount = 1;
  grid[br][bc] = null;
  let pts = CONFIG.SCORE_COLOR_ACTIVATE;
  for (let r = 0; r < CONFIG.GRID_ROWS; r++)
    for (let c = 0; c < CONFIG.GRID_COLS; c++)
      if (grid[r][c] && grid[r][c].color === targetColor) {
        emitParticles(grid[r][c].x, grid[r][c].y, targetColor, 5);
        trackRemoval(grid[r][c]); grid[r][c] = null; pts += 20;
      }
  score += pts;
  trackSpecialActivation('color');
  emitPopup(gridOffsetX+bc*cellSize+cellSize/2, gridOffsetY+br*cellSize, '+'+pts, '#ffffff');
  sound.specialExplode();
  tw.add({v:0},{v:1}, CONFIG.EXPLODE_DURATION, 'linear', () => { doCascadeGravityAndFill(); });
}

// ─── 특수+특수 조합 ───
function handleSpecialCombo(r1, c1, r2, c2) {
  enterState(STATE.CASCADE);
  cascadeCount = 1;
  const s1 = grid[r1][c1] ? grid[r1][c1].special : SPECIAL.NONE;
  const s2 = grid[r2][c2] ? grid[r2][c2].special : SPECIAL.NONE;
  let pts = CONFIG.SCORE_COMBO_SPECIAL;
  const cells = new Set();
  const addCell = (r,c) => { if(r>=0&&r<CONFIG.GRID_ROWS&&c>=0&&c<CONFIG.GRID_COLS) cells.add(r*CONFIG.GRID_COLS+c); };
  if (s1===SPECIAL.COLOR && s2===SPECIAL.COLOR) {
    for(let r=0;r<CONFIG.GRID_ROWS;r++) for(let c=0;c<CONFIG.GRID_COLS;c++) addCell(r,c);
  } else if (s1===SPECIAL.COLOR || s2===SPECIAL.COLOR) {
    const other = s1===SPECIAL.COLOR ? grid[r2][c2] : grid[r1][c1];
    const tc = other ? other.color : 0;
    for(let r=0;r<CONFIG.GRID_ROWS;r++) for(let c=0;c<CONFIG.GRID_COLS;c++)
      if(grid[r][c] && grid[r][c].color === tc) addCell(r,c);
    addCell(r1,c1); addCell(r2,c2);
  } else {
    const isL = s => s===SPECIAL.LINE_H||s===SPECIAL.LINE_V;
    const isB = s => s===SPECIAL.BLAST;
    if(isL(s1)&&isL(s2)){ for(let c=0;c<CONFIG.GRID_COLS;c++) addCell(r1,c); for(let r=0;r<CONFIG.GRID_ROWS;r++) addCell(r,c1); }
    else if((isL(s1)&&isB(s2))||(isB(s1)&&isL(s2))){
      for(let dr=-1;dr<=1;dr++) for(let c=0;c<CONFIG.GRID_COLS;c++) addCell(r1+dr,c);
      for(let dc=-1;dc<=1;dc++) for(let r=0;r<CONFIG.GRID_ROWS;r++) addCell(r,c1+dc);
    } else if(isB(s1)&&isB(s2)){
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++) addCell(r1+dr,c1+dc);
    }
  }
  cells.forEach(key => {
    const r=Math.floor(key/CONFIG.GRID_COLS), c=key%CONFIG.GRID_COLS;
    if(grid[r][c]){ emitParticles(grid[r][c].x,grid[r][c].y,grid[r][c].color,4); trackRemoval(grid[r][c]); grid[r][c]=null; }
  });
  score += pts;
  emitPopup(gridOffsetX+c1*cellSize+cellSize/2, gridOffsetY+r1*cellSize, '+'+pts, '#ffffff');
  sound.specialExplode();
  tw.add({v:0},{v:1}, CONFIG.SPECIAL_EXPLODE_DURATION, 'linear', () => { doCascadeGravityAndFill(); });
}

// ─── 진행 추적 ───
function resetProgress() {
  stageProgress = { score:0, colorCount:{}, lineCount:0, blastCount:0, colorCount2:0 };
}
function trackRemoval(gem) {
  if(!gem) return;
  if(!stageProgress.colorCount[gem.color]) stageProgress.colorCount[gem.color] = 0;
  stageProgress.colorCount[gem.color]++;
}
function trackSpecialActivation(type) {
  if(type==='line') stageProgress.lineCount++;
  else if(type==='blast') stageProgress.blastCount++;
  else if(type==='color') stageProgress.colorCount2++;
}

// ─── 연쇄(Cascade) 처리 (§5.4) ───
function processCascade() {
  if (isProcessing) return;
  isProcessing = true;
  const matches = findMatches(grid);
  if (matches.length === 0) {
    isProcessing = false;
    stageProgress.score = score;
    if (checkStageGoal(currentStage, stageProgress)) {
      beginTransition(STATE.STAGE_CLEAR);
    } else if (movesLeft <= 0) {
      beginTransition(STATE.GAME_OVER);
    } else {
      enterState(STATE.PLAYING);
      if (!findHint(grid)) {
        grid = shuffleGrid(grid, CONFIG.NUM_COLORS);
        updateGemPositions(grid);
      }
    }
    return;
  }
  cascadeCount++;
  if (cascadeCount > 1) sound.cascade(cascadeCount); else sound.match();
  const toRemove = new Set();
  matches.forEach(m => {
    const pts = calcScore(m.type, cascadeCount);
    score += pts;
    stageProgress.score = score;
    const specialType = getSpecialType(m.cells, m.dir);
    if (specialType !== SPECIAL.NONE) {
      const mid = m.cells[Math.floor(m.cells.length/2)];
      if (grid[mid.r][mid.c]) {
        grid[mid.r][mid.c].special = specialType;
        grid[mid.r][mid.c].scale = 0;
        tw.add(grid[mid.r][mid.c], {scale:1}, 0.3, 'easeOutBack');
        sound.specialCreate();
        if(specialType===SPECIAL.LINE_H||specialType===SPECIAL.LINE_V) trackSpecialActivation('line');
        else if(specialType===SPECIAL.BLAST) trackSpecialActivation('blast');
        else if(specialType===SPECIAL.COLOR) trackSpecialActivation('color');
      }
      m.cells.forEach(cell => { if(cell.r!==mid.r||cell.c!==mid.c) toRemove.add(cell.r*CONFIG.GRID_COLS+cell.c); });
    } else {
      m.cells.forEach(cell => toRemove.add(cell.r*CONFIG.GRID_COLS+cell.c));
    }
    const cx = m.cells.reduce((s,c)=>s+c.c,0)/m.cells.length;
    const cy = m.cells.reduce((s,c)=>s+c.r,0)/m.cells.length;
    emitPopup(gridOffsetX+cx*cellSize+cellSize/2, gridOffsetY+cy*cellSize, '+'+pts, cascadeCount>1?'#ff6699':'#ffcc00');
  });
  // 특수 보석 활성화 체크
  const extraRemove = new Set();
  toRemove.forEach(key => {
    const r=Math.floor(key/CONFIG.GRID_COLS), c=key%CONFIG.GRID_COLS;
    if(grid[r][c] && grid[r][c].special !== SPECIAL.NONE) activateSpecial(r, c, extraRemove);
  });
  extraRemove.forEach(k => toRemove.add(k));
  // 폭발 애니메이션
  let animCount = 0;
  toRemove.forEach(key => {
    const r=Math.floor(key/CONFIG.GRID_COLS), c=key%CONFIG.GRID_COLS;
    if(grid[r][c]) {
      emitParticles(grid[r][c].x, grid[r][c].y, grid[r][c].color, 5);
      trackRemoval(grid[r][c]);
      animCount++;
      tw.add(grid[r][c], {scale:0, alpha:0}, CONFIG.EXPLODE_DURATION, 'linear', () => {
        animCount--;
        if(animCount <= 0) {
          toRemove.forEach(k2 => { const rr=Math.floor(k2/CONFIG.GRID_COLS), cc=k2%CONFIG.GRID_COLS; grid[rr][cc]=null; });
          doCascadeGravityAndFill();
        }
      });
    }
  });
  if(animCount === 0) {
    toRemove.forEach(k2 => { const rr=Math.floor(k2/CONFIG.GRID_COLS), cc=k2%CONFIG.GRID_COLS; grid[rr][cc]=null; });
    doCascadeGravityAndFill();
  }
  bgPulseAlpha = 1;
}

function activateSpecial(r, c, removeSet) {
  const gem = grid[r][c];
  if(!gem) return;
  const s = gem.special;
  gem.special = SPECIAL.NONE;
  if(s===SPECIAL.LINE_H){ for(let cc=0;cc<CONFIG.GRID_COLS;cc++) removeSet.add(r*CONFIG.GRID_COLS+cc); score+=CONFIG.SCORE_LINE_ACTIVATE; }
  else if(s===SPECIAL.LINE_V){ for(let rr=0;rr<CONFIG.GRID_ROWS;rr++) removeSet.add(rr*CONFIG.GRID_COLS+c); score+=CONFIG.SCORE_LINE_ACTIVATE; }
  else if(s===SPECIAL.BLAST){
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<CONFIG.GRID_ROWS&&nc>=0&&nc<CONFIG.GRID_COLS) removeSet.add(nr*CONFIG.GRID_COLS+nc);
    }
    score+=CONFIG.SCORE_BLAST_ACTIVATE;
  } else if(s===SPECIAL.COLOR){
    const tc=gem.color;
    for(let rr=0;rr<CONFIG.GRID_ROWS;rr++) for(let cc=0;cc<CONFIG.GRID_COLS;cc++)
      if(grid[rr][cc]&&grid[rr][cc].color===tc) removeSet.add(rr*CONFIG.GRID_COLS+cc);
    score+=CONFIG.SCORE_COLOR_ACTIVATE;
  }
  sound.specialExplode();
}

function doCascadeGravityAndFill() {
  const gravMoves = applyGravity(grid);
  updateGemPositions(grid);
  let maxDist = 0;
  gravMoves.forEach(m => { if(m.dist>maxDist) maxDist=m.dist; });
  const gravDur = Math.min(maxDist * CONFIG.FALL_DURATION, CONFIG.MAX_FALL_DURATION);
  gravMoves.forEach(m => {
    const gem = grid[m.toR][m.toC];
    gem.offsetY = -(m.dist * cellSize);
    tw.add(gem, {offsetY:0}, Math.min(m.dist*CONFIG.FALL_DURATION, CONFIG.MAX_FALL_DURATION), 'easeOutBounce');
  });
  const afterGravity = () => {
    const fills = fillEmpty(grid, CONFIG.NUM_COLORS);
    updateGemPositions(grid);
    let fillDone = 0;
    const totalFills = fills.length;
    if(totalFills === 0){ isProcessing=false; processCascade(); return; }
    fills.forEach(f => {
      const gem = grid[f.r][f.c];
      gem.offsetY = -(f.dist*cellSize) - cellSize;
      gem.alpha = 0;
      tw.add(gem, {offsetY:0, alpha:1}, Math.min(f.dist*CONFIG.FALL_DURATION, CONFIG.MAX_FALL_DURATION), 'easeOutBounce', () => {
        fillDone++;
        if(fillDone >= totalFills){ isProcessing=false; processCascade(); }
      });
    });
  };
  if(gravMoves.length > 0) tw.add({v:0},{v:1}, gravDur+0.05, 'linear', afterGravity);
  else afterGravity();
}

// ─── 스테이지 시작 ───
function startStage(stageIdx) {
  currentStage = stageIdx;
  if(currentStage >= CONFIG.TOTAL_STAGES){ beginTransition(STATE.VICTORY); return; }
  movesLeft = STAGES[currentStage].moves;
  score = 0; cascadeCount = 0; isProcessing = false;
  selectedGem = null; hintTimer = 0; hintPair = null;
  resetProgress();
  grid = createGrid(CONFIG.GRID_ROWS, CONFIG.GRID_COLS, CONFIG.NUM_COLORS);
  calcGridLayout();
  updateGemPositions(grid);
  bgCacheDirty = true;
  let safety = 0;
  while(findMatches(grid).length > 0 && safety++ < 100) {
    grid = createGrid(CONFIG.GRID_ROWS, CONFIG.GRID_COLS, CONFIG.NUM_COLORS);
    updateGemPositions(grid);
  }
  enterState(STATE.PLAYING);
}

// ─── 업데이트 ───
function updateTitle(dt) { titleAnim += dt; }
function updatePlaying(dt) {
  hintTimer += dt; selectPulse += dt;
  if(hintTimer >= CONFIG.HINT_IDLE_TIME && !hintPair) hintPair = findHint(grid);
  if(hintPair) hintAlpha = 0.5+0.5*Math.sin(hintTimer*Math.PI*2/CONFIG.HINT_PULSE_PERIOD);
}
function updateAnimating(dt) {}
function updateCascade(dt) {}
function updateStageClear(dt) { clearAnimTimer += dt; }
function updateGameOver(dt) { if(shakeTimer>0) shakeTimer -= dt; }
function updateVictory(dt) { clearAnimTimer += dt; }
function updateBgStars(dt) {
  for(const s of bgStars){
    s.y += s.speed*dt;
    if(s.y > H){ s.y=0; s.x=Math.random()*W; }
    s.alpha = 0.3+0.2*Math.sin(s.y*0.01);
  }
  if(bgPulseAlpha > 0.85) bgPulseAlpha = Math.max(0.85, bgPulseAlpha - dt*0.5);
}

// ─── 렌더링 ───
function render(st, dt) {
  ctx.save();
  if(shakeTimer > 0){
    const si = shakeIntensity*(shakeTimer/0.4);
    ctx.translate((Math.random()-0.5)*si, (Math.random()-0.5)*si);
  }
  if(bgCacheDirty || !bgCache) renderBgCache();
  ctx.drawImage(bgCache, 0, 0, W, H);
  for(const s of bgStars){
    ctx.globalAlpha = s.alpha; ctx.fillStyle = '#8888dd';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  switch(st){
    case STATE.TITLE: renderTitle(); break;
    case STATE.PLAYING: case STATE.ANIMATING: case STATE.CASCADE: case STATE.PAUSED:
      renderGame(); if(st===STATE.PAUSED) renderPause(); break;
    case STATE.STAGE_CLEAR: renderGame(); renderStageClear(); break;
    case STATE.GAME_OVER: renderGame(); renderGameOver(); break;
    case STATE.VICTORY: renderGame(); renderVictory(); break;
  }
  renderParticles();
  renderPopups();
  if(transitioning){
    ctx.fillStyle = '#0a0a1a';
    ctx.globalAlpha = transitionFadeObj.alpha || 0;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function renderGame() {
  const hudY = 10, fs = Math.min(16, W*0.035);

  ctx.textAlign = 'right'; ctx.fillStyle = '#00ccff';
  ctx.fillText('Moves: '+movesLeft, W-12, hudY);
  ctx.textAlign = 'center';
  ctx.font = Math.min(13,W*0.028)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0'; ctx.fillText(getGoalText(), W/2, hudY+fs+4);

  const barY = hudY+fs+20, barW = Math.min(W*0.6,300), barH = 6, barX = W/2-barW/2;
  ctx.fillStyle = '#1a1a3a'; roundRect(ctx, barX, barY, barW, barH, 3); ctx.fill();
  const prog = getGoalProgress(), fillW = Math.min(barW*prog, barW);
  if(fillW > 0){
    const grd = ctx.createLinearGradient(barX,0,barX+fillW,0);
    grd.addColorStop(0,'#33ff66'); grd.addColorStop(1,'#ffcc00');
    ctx.fillStyle = grd; roundRect(ctx, barX, barY, fillW, barH, 3); ctx.fill();
  }
  // 보석
  for(let r=0;r<CONFIG.GRID_ROWS;r++) for(let c=0;c<CONFIG.GRID_COLS;c++){
    const gem = grid[r] ? grid[r][c] : null;
    if(!gem) continue;
    const gx = gem.x+(gem.offsetX||0), gy = gem.y+(gem.offsetY||0);
    if(selectedGem && selectedGem.r===r && selectedGem.c===c){
      const pulse = 1.05+0.05*Math.sin(selectPulse*Math.PI*2/CONFIG.SELECT_PULSE_PERIOD);
      ctx.save();
      const sv = gem.scale; gem.scale = sv*pulse;
      ctx.shadowColor = GEM_COLORS[gem.color] ? GEM_COLORS[gem.color].main : '#fff';
      ctx.shadowBlur = 16; drawGem(ctx, gx, gy, cellSize*0.8, gem);
      gem.scale = sv; ctx.restore();
    } else if(hintPair && ((hintPair.r1===r&&hintPair.c1===c)||(hintPair.r2===r&&hintPair.c2===c))){
      ctx.save(); ctx.globalAlpha = hintAlpha; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=16;
      drawGem(ctx, gx, gy, cellSize*0.8, gem); ctx.restore();
      drawGem(ctx, gx, gy, cellSize*0.8, gem);
    } else {
      drawGem(ctx, gx, gy, cellSize*0.8, gem);
    }
  }
  // 키보드 커서
  if(state === STATE.PLAYING){
    ctx.save(); ctx.strokeStyle='#00d4ff88'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.strokeRect(gridOffsetX+cursorGem.c*cellSize+2, gridOffsetY+cursorGem.r*cellSize+2, cellSize-4, cellSize-4);
    ctx.setLineDash([]); ctx.restore();
  }
  // 일시정지 버튼
  const pbS = CONFIG.MIN_TOUCH_TARGET, pbx = W-pbS-8, pby = gridOffsetY+cellSize*CONFIG.GRID_ROWS+8;
  ctx.fillStyle = '#2a2a5a'; roundRect(ctx, pbx, pby, pbS, pbS, 6); ctx.fill();
  ctx.fillStyle = '#e0e0ff';
  ctx.fillRect(pbx+pbS*0.3, pby+pbS*0.25, pbS*0.12, pbS*0.5);
  ctx.fillRect(pbx+pbS*0.55, pby+pbS*0.25, pbS*0.12, pbS*0.5);
}

// ─── 목표 텍스트/진행률 ───
function getGoalText() {
  const s = STAGES[currentStage];
  if(!s) return '';
  if(s.goalType==='score') return '\uC810\uC218 '+s.goalVal.toLocaleString()+' \uB2EC\uC131';
  if(s.goalType==='color'){
    const parts = [];
    for(let i=0;i<s.goalColors.length;i++) parts.push(GEM_COLORS[s.goalColors[i]].name+' '+s.goalAmounts[i]+'\uAC1C');
    return parts.join(' + ')+' \uC81C\uAC70';
  }
  if(s.goalType==='special'){
    const parts = [];
    for(let i=0;i<s.goalSpecials.length;i++){
      const nm = s.goalSpecials[i]==='any'?'\uD2B9\uC218':s.goalSpecials[i]==='line'?'\uB77C\uC778':s.goalSpecials[i]==='blast'?'\uBC94\uC704':'\uC0C9\uC0C1';
      parts.push(nm+' '+s.goalAmounts[i]+'\uAC1C');
    }
    return parts.join(' + ')+' \uC0DD\uC131';
  }
  return '';
}

function getGoalProgress() {
  const s = STAGES[currentStage];
  if(!s) return 0;
  if(s.goalType==='score') return Math.min(1, score/s.goalVal);
  if(s.goalType==='color'){
    let total=0, done=0;
    for(let i=0;i<s.goalColors.length;i++){
      total += s.goalAmounts[i];
      done += Math.min(stageProgress.colorCount[s.goalColors[i]]||0, s.goalAmounts[i]);
    }
    return total>0 ? done/total : 0;
  }
  if(s.goalType==='special'){
    let total=0, done=0;
    for(let i=0;i<s.goalSpecials.length;i++){
      total += s.goalAmounts[i];
      const k = s.goalSpecials[i];
      if(k==='any') done += Math.min((stageProgress.lineCount||0)+(stageProgress.blastCount||0)+(stageProgress.colorCount2||0), s.goalAmounts[i]);
      else if(k==='line') done += Math.min(stageProgress.lineCount||0, s.goalAmounts[i]);
      else if(k==='blast') done += Math.min(stageProgress.blastCount||0, s.goalAmounts[i]);
      else if(k==='color') done += Math.min(stageProgress.colorCount2||0, s.goalAmounts[i]);
    }
    return total>0 ? done/total : 0;
  }
  return 0;
}

// ─── 입력 유틸 ───
function pixelToCell(px, py) {
  const c = Math.floor((px-gridOffsetX)/cellSize);
  const r = Math.floor((py-gridOffsetY)/cellSize);
  if(r>=0&&r<CONFIG.GRID_ROWS&&c>=0&&c<CONFIG.GRID_COLS) return {r,c};
  return null;
}
function hitButton(px, py, bx, by, bw, bh) { return px>=bx&&px<=bx+bw&&py>=by&&py<=by+bh; }
function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0]||e.changedTouches[0] : e;
  return { x: (touch.clientX-rect.left)*(W/rect.width), y: (touch.clientY-rect.top)*(H/rect.height) };
}

// ─── 클릭 핸들러 ───
function handleTitleClick(px, py) {
  const bw=Math.max(200,W*0.4), bh=Math.max(CONFIG.MIN_TOUCH_TARGET,52);
  const bx=W/2-bw/2, by=H*0.68;
  if(hitButton(px,py,bx,by,bw,bh)){ startStage(currentStage); return; }
  if(starsEarned.length>0){
    const b2y=by+bh+12;
    if(hitButton(px,py,bx,b2y,bw,bh)){ currentStage=0; starsEarned=[]; totalScore=0; saveProgress(); startStage(0); }
  }
}
function handleStageClearClick(px, py) {
  const bw=Math.max(180,W*0.4), bh=CONFIG.MIN_TOUCH_TARGET, by=H*0.64;
  if(hitButton(px,py,W/2-bw/2,by,bw,bh)){
    currentStage++;
    if(currentStage>=CONFIG.TOTAL_STAGES) beginTransition(STATE.VICTORY);
    else startStage(currentStage);
  }
}
function handleGameOverClick(px, py) {
  const bw=Math.max(160,W*0.35), bh=CONFIG.MIN_TOUCH_TARGET, by=H*0.58;
  if(hitButton(px,py,W/2-bw/2,by,bw,bh)){ startStage(currentStage); return; }
  if(hitButton(px,py,W/2-bw/2,by+bh+12,bw,bh)) beginTransition(STATE.TITLE);
}
function handleVictoryClick(px, py) {
  const bw=Math.max(160,W*0.35), bh=CONFIG.MIN_TOUCH_TARGET, by=H*0.62;
  if(hitButton(px,py,W/2-bw/2,by,bw,bh)) beginTransition(STATE.TITLE);
}
function handlePauseClick(px, py) {
  const bw=Math.max(160,W*0.35), bh=CONFIG.MIN_TOUCH_TARGET;
  if(hitButton(px,py,W/2-bw/2,H*0.58,bw,bh)) togglePause();
}
function togglePause() {
  if(state===STATE.PAUSED){ state=pausedFromState; sound.setMute(false); }
  else if(state===STATE.PLAYING||state===STATE.ANIMATING||state===STATE.CASCADE){
    pausedFromState=state; state=STATE.PAUSED; sound.setMute(true);
  }
}
function isPauseButtonHit(px, py) {
  const s=CONFIG.MIN_TOUCH_TARGET;
  return hitButton(px, py, W-s-8, gridOffsetY+cellSize*CONFIG.GRID_ROWS+8, s, s);
}

// ─── 이벤트 핸들러 ───
function onPointerDown(e) {
  e.preventDefault(); sound.resume();
  const pos = getPointerPos(e);
  if(e.touches) touchId = e.touches[0].identifier;
  if(transitioning) return;
  switch(state){
    case STATE.TITLE: handleTitleClick(pos.x,pos.y); break;
    case STATE.PLAYING:
      if(isPauseButtonHit(pos.x,pos.y)){ togglePause(); return; }
      const cell = pixelToCell(pos.x, pos.y);
      if(!cell){ dragStart=null; return; }
      dragStart = { r:cell.r, c:cell.c, x:pos.x, y:pos.y };
      if(selectedGem){
        const sr=selectedGem.r, sc=selectedGem.c;
        if(Math.abs(sr-cell.r)+Math.abs(sc-cell.c)===1){ handleSwap(sr,sc,cell.r,cell.c); dragStart=null; return; }
      }
      selectedGem = {r:cell.r, c:cell.c};
      cursorGem = {r:cell.r, c:cell.c};
      hintTimer=0; hintPair=null;
      break;
    case STATE.STAGE_CLEAR: handleStageClearClick(pos.x,pos.y); break;
    case STATE.GAME_OVER: handleGameOverClick(pos.x,pos.y); break;
    case STATE.VICTORY: handleVictoryClick(pos.x,pos.y); break;
    case STATE.PAUSED: handlePauseClick(pos.x,pos.y); break;
  }
}
function onPointerMove(e) {
  e.preventDefault();
  if(!dragStart||state!==STATE.PLAYING) return;
  const pos = getPointerPos(e);
  const dx=pos.x-dragStart.x, dy=pos.y-dragStart.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const threshold = Math.max(CONFIG.MIN_SWIPE_DIST, cellSize*CONFIG.MIN_DRAG_RATIO);
  if(dist >= threshold){
    let dr=0,dc=0;
    if(Math.abs(dx)>Math.abs(dy)) dc=dx>0?1:-1; else dr=dy>0?1:-1;
    handleSwap(dragStart.r, dragStart.c, dragStart.r+dr, dragStart.c+dc);
    dragStart=null;
  }
}
function onPointerUp(e) { e.preventDefault(); dragStart=null; touchId=null; }

const keys = {};
function onKeyDown(e) {
  if(keys[e.code]) return; keys[e.code]=true;
  if(transitioning) return;
  switch(state){
    case STATE.TITLE:
      if(e.code==='Space'||e.code==='Enter') startStage(currentStage); break;
    case STATE.PLAYING:
      if(e.code==='ArrowUp') cursorGem.r=Math.max(0,cursorGem.r-1);
      if(e.code==='ArrowDown') cursorGem.r=Math.min(CONFIG.GRID_ROWS-1,cursorGem.r+1);
      if(e.code==='ArrowLeft') cursorGem.c=Math.max(0,cursorGem.c-1);
      if(e.code==='ArrowRight') cursorGem.c=Math.min(CONFIG.GRID_COLS-1,cursorGem.c+1);
      if(e.code==='Space'||e.code==='Enter'){
        if(selectedGem){
          if(Math.abs(selectedGem.r-cursorGem.r)+Math.abs(selectedGem.c-cursorGem.c)===1)
            handleSwap(selectedGem.r,selectedGem.c,cursorGem.r,cursorGem.c);
          else selectedGem={r:cursorGem.r,c:cursorGem.c};
        } else selectedGem={r:cursorGem.r,c:cursorGem.c};
        hintTimer=0; hintPair=null;
      }
      if(e.code==='KeyP'||e.code==='Escape') togglePause();
      if(e.code==='KeyH'){ hintPair=findHint(grid); hintTimer=CONFIG.HINT_IDLE_TIME; }
      break;
    case STATE.GAME_OVER:
      if(e.code==='KeyR') startStage(currentStage);
      if(e.code==='Escape') beginTransition(STATE.TITLE); break;
    case STATE.STAGE_CLEAR:
      if(e.code==='Space'||e.code==='Enter'){
        currentStage++;
        if(currentStage>=CONFIG.TOTAL_STAGES) beginTransition(STATE.VICTORY);
        else startStage(currentStage);
      } break;
    case STATE.VICTORY:
      if(e.code==='Space'||e.code==='Enter') beginTransition(STATE.TITLE); break;
    case STATE.PAUSED:
      if(e.code==='KeyP'||e.code==='Escape') togglePause(); break;
  }
}
function onKeyUp(e) { keys[e.code]=false; }

// ─── 리사이즈 ───
function resizeCanvas() {
  dpr = window.devicePixelRatio||1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  calcGridLayout();
  if(grid.length>0) updateGemPositions(grid);
  bgCacheDirty=true; initBgStars();
}

// ─── 게임 루프 (§5.2, F15) ───
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp-lastTime)/1000, 0.033);
    lastTime = timestamp;
    tw.update(dt);
    if(state !== STATE.PAUSED){ particles.update(dt); popups.update(dt); updateBgStars(dt); }
    switch(state){
      case STATE.TITLE: updateTitle(dt); break;
      case STATE.PLAYING: updatePlaying(dt); break;
      case STATE.ANIMATING: updateAnimating(dt); break;
      case STATE.CASCADE: updateCascade(dt); break;
      case STATE.STAGE_CLEAR: updateStageClear(dt); break;
      case STATE.GAME_OVER: updateGameOver(dt); break;
      case STATE.VICTORY: updateVictory(dt); break;
      case STATE.PAUSED: break;
    }
    render(state, dt);
  } catch(e) { console.error('GameLoop Error:', e); }
  requestAnimationFrame(gameLoop);
}

// ─── init (§5.1 — 이벤트 리스너 반드시 여기서, F7) ───
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  particles = createPool(CONFIG.PARTICLE_POOL_SIZE, () => ({
    active:false,x:0,y:0,vx:0,vy:0,gravity:0,life:0,maxLife:1,color:'#fff',size:3,scale:1,scaleDecay:false,alpha:1
  }));
  popups = createPool(CONFIG.POPUP_POOL_SIZE, () => ({
    active:false,x:0,y:0,vx:0,vy:0,gravity:0,life:0,maxLife:1,color:'#ffcc00',text:'',size:16,scale:1,scaleDecay:false,alpha:1
  }));
  sound.init();
  loadProgress();
  // ★ 이벤트 리스너 — init 내부에서만 등록 (F7)
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive:false});
  canvas.addEventListener('touchmove', onPointerMove, {passive:false});
  canvas.addEventListener('touchend', onPointerUp, {passive:false});
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);
  window.addEventListener('resize', resizeCanvas);
  enterState(STATE.TITLE);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('load', init);
</script>
