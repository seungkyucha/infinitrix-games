// ── 이징 함수 ───────────────────────────────────────────
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOutBounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
  if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
  return 7.5625*(t-=2.625/2.75)*t+0.984375;
}
function easeOutCubic(t) { return 1-Math.pow(1-t,3); }
function lerp(a,b,t) { return a+(b-a)*t; }

// ── TweenManager (F6: clearImmediate 분리) ──────────────
class TweenManager {
  constructor() { this._tweens = []; }
  // 새 tween 추가
  add(obj, props, dur, easeFn, onComplete) {
    const tw = { obj, props: {}, dur, elapsed: 0, easeFn: easeFn || easeInOut, onComplete: onComplete || null };
    for (const k in props) { tw.props[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(tw);
    return tw;
  }
  // 즉시 모든 tween 정리 (F6 — cancelAll과 add 경쟁 조건 차단)
  clearImmediate() { this._tweens.length = 0; }
  // 매 프레임 업데이트
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt;
      const t = Math.min(tw.elapsed / tw.dur, 1);
      const e = tw.easeFn(t);
      for (const k in tw.props) {
        tw.obj[k] = lerp(tw.props[k].from, tw.props[k].to, e);
      }
      if (t >= 1) {
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  // 활성 tween 수 확인
  get active() { return this._tweens.length; }
}

// ── ObjectPool (F25) ────────────────────────────────────
class ObjectPool {
  constructor(size, factory) {
    this.pool = [];
    for (let i = 0; i < size; i++) this.pool.push(factory());
  }
  // 비활성 오브젝트 하나를 반환
  get() {
    for (let i = 0; i < this.pool.length; i++) {
      if (!this.pool[i].active) { this.pool[i].active = true; return this.pool[i]; }
    }
    return null;
  }
  // 활성 오브젝트에 대해 콜백 실행
  forEach(fn) {
    for (let i = 0; i < this.pool.length; i++) {
      if (this.pool[i].active) fn(this.pool[i]);
    }
  }
}

// ── SoundManager (F10: Web Audio 네이티브 스케줄링) ─────
class SoundManager {
  constructor() { this.ctx = null; this.muted = false; }
  // 사용자 입력 시 AudioContext 생성
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // 짧은 톤 생성 유틸
  _tone(freq, dur, startOffset, type, vol) {
    if (this.muted || !this.ctx) return;
    const t = this.ctx.currentTime + startOffset;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime((vol || CONFIG.SFX_VOLUME) * CONFIG.MASTER_VOLUME, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur);
  }
  // 효과음 재생
  play(type, cascadeLevel) {
    if (this.muted || !this.ctx) return;
    const cl = cascadeLevel || 0;
    switch (type) {
      case 'swap': this._tone(600, 0.05, 0, 'sine', 0.3); break;
      case 'invalid': this._tone(200, 0.1, 0, 'sawtooth', 0.2); break;
      case 'match':
        this._tone(523 + cl * 50, 0.1, 0, 'sine');
        this._tone(659 + cl * 50, 0.1, 0.05, 'sine');
        break;
      case 'special':
        this._tone(523, 0.15, 0, 'triangle');
        this._tone(659, 0.15, 0.08, 'triangle');
        this._tone(784, 0.15, 0.16, 'triangle');
        break;
      case 'clear':
        this._tone(523, 0.15, 0, 'sine'); this._tone(659, 0.15, 0.1, 'sine');
        this._tone(784, 0.15, 0.2, 'sine'); this._tone(1047, 0.3, 0.3, 'sine');
        break;
      case 'fail':
        this._tone(400, 0.2, 0, 'sawtooth', 0.3);
        this._tone(300, 0.3, 0.15, 'sawtooth', 0.2);
        break;
    }
  }
}

// 반응형 리사이즈
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  const maxBoard = Math.min(W - 20, H * 0.65, 520);
  cellSize = Math.floor((maxBoard - CONFIG.BOARD_PAD * 2) / CONFIG.GRID_COLS);
  cellSize = Math.max(40, Math.min(64, cellSize));
  boardSize = cellSize * CONFIG.GRID_COLS + CONFIG.BOARD_PAD * 2;
  boardX = Math.floor((W - boardSize) / 2);
  boardY = Math.floor(H * 0.18);
  cacheBackground(W, H);
}

// 배경 캐시 렌더 (F26)
function cacheBackground(w, h) {
  bgCache.width = w; bgCache.height = h;
  // 메인 그라디언트
  const grad = bgCtx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, CONFIG.COLORS.bg1);
  grad.addColorStop(1, CONFIG.COLORS.bg2);
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, w, h);
  // 기하학적 퍼즐 패턴 (puzzle 장르)
  bgCtx.strokeStyle = 'rgba(0,212,255,0.04)';
  bgCtx.lineWidth = 1;
  for (let i = 0; i < w; i += 40) {
    bgCtx.beginPath(); bgCtx.moveTo(i, 0); bgCtx.lineTo(i, h); bgCtx.stroke();
  }
  for (let j = 0; j < h; j += 40) {
    bgCtx.beginPath(); bgCtx.moveTo(0, j); bgCtx.lineTo(w, j); bgCtx.stroke();
  }
  // 배경 에셋 (parallax layer 1)
  if (SPRITES.bgLayer1) {
    bgCtx.globalAlpha = 0.3;
    bgCtx.drawImage(SPRITES.bgLayer1, 0, 0, w, h);
    bgCtx.globalAlpha = 1;
  }
}

// ── 게임 상태 ───────────────────────────────────────────
const STATE = { TITLE: 'TITLE', LEVEL_SELECT: 'LEVEL_SELECT', PLAYING: 'PLAYING', ANIMATING: 'ANIMATING', LEVEL_CLEAR: 'LEVEL_CLEAR', GAME_OVER: 'GAME_OVER', PAUSED: 'PAUSED' };
const STATE_PRIORITY = { GAME_OVER: 100, LEVEL_CLEAR: 90, PAUSED: 80, ANIMATING: 50, PLAYING: 40, LEVEL_SELECT: 20, TITLE: 10 };

let gameState = STATE.TITLE;
let _transitioning = false; // 가드 플래그 (F4)
let transAlpha = 0;

// 상태 전환 (F4, F5, F16)
function beginTransition(toState, options) {
  const opt = options || {};
  if (_transitioning && !opt.force) {
    // 우선순위 비교 (F5)
    if ((STATE_PRIORITY[toState] || 0) <= (STATE_PRIORITY[gameState] || 0)) return;
  }
  _transitioning = true;
  if (opt.immediate) {
    gameState = toState;
    _transitioning = false;
    return;
  }
  const overlay = { alpha: 0 };
  tw.add(overlay, { alpha: 1 }, 200, easeInOut, () => {
    gameState = toState;
    tw.add(overlay, { alpha: 0 }, 200, easeInOut, () => { _transitioning = false; });
  });
  transAlpha = overlay.alpha;
}

// ── 보드 로직 (순수 함수, F12) ──────────────────────────

// 보석 생성 팩토리
function createGem(type, special) {
  return { type: type, special: special || SPECIAL.NONE, x: 0, y: 0, scale: 1, alpha: 1, _targetY: 0 };
}

// 초기 보드 생성 — 매치 없는 상태 보장 (§11.1)
function generateBoard(cols, rows, gemTypes) {
  const g = [];
  for (let r = 0; r < rows; r++) {
    g[r] = [];
    for (let c = 0; c < cols; c++) {
      const candidates = [];
      for (let t = 0; t < gemTypes; t++) candidates.push(t);
      // 가로 중복 제거
      if (c >= 2 && g[r][c-1] && g[r][c-2] && g[r][c-1].type === g[r][c-2].type) {
        const idx = candidates.indexOf(g[r][c-1].type);
        if (idx !== -1) candidates.splice(idx, 1);
      }
      // 세로 중복 제거
      if (r >= 2 && g[r-1][c] && g[r-2][c] && g[r-1][c].type === g[r-2][c].type) {
        const idx = candidates.indexOf(g[r-1][c].type);
        if (idx !== -1) candidates.splice(idx, 1);
      }
      const type = candidates[Math.floor(Math.random() * candidates.length)];
      g[r][c] = createGem(type);
    }
  }
  return g;
}

// 매칭 탐색 (§11.2) — 반환: { cells: Set<'r,c'>, patterns: [{cells, dir, len}] }
function findMatches(g, cols, rows) {
  const matched = new Set();
  const patterns = [];
  // 가로 스캔
  for (let r = 0; r < rows; r++) {
    let streak = 1;
    for (let c = 1; c < cols; c++) {
      if (g[r][c] && g[r][c-1] && g[r][c].type === g[r][c-1].type && g[r][c].type >= 0) {
        streak++;
      } else {
        if (streak >= 3) {
          const cells = [];
          for (let k = c - streak; k < c; k++) { matched.add(r+','+k); cells.push([r,k]); }
          patterns.push({ cells, dir: 'h', len: streak, type: g[r][c-1].type });
        }
        streak = 1;
      }
    }
    if (streak >= 3) {
      const cells = [];
      for (let k = cols - streak; k < cols; k++) { matched.add(r+','+k); cells.push([r,k]); }
      patterns.push({ cells, dir: 'h', len: streak, type: g[r][cols-1].type });
    }
  }
  // 세로 스캔
  for (let c = 0; c < cols; c++) {
    let streak = 1;
    for (let r = 1; r < rows; r++) {
      if (g[r][c] && g[r-1][c] && g[r][c].type === g[r-1][c].type && g[r][c].type >= 0) {
        streak++;
      } else {
        if (streak >= 3) {
          const cells = [];
          for (let k = r - streak; k < r; k++) { matched.add(k+','+c); cells.push([k,c]); }
          patterns.push({ cells, dir: 'v', len: streak, type: g[r-1][c].type });
        }
        streak = 1;
      }
    }
    if (streak >= 3) {
      const cells = [];
      for (let k = rows - streak; k < rows; k++) { matched.add(k+','+c); cells.push([k,c]); }
      patterns.push({ cells, dir: 'v', len: streak, type: g[rows-1][c].type });
    }
  }
  return { cells: matched, patterns };
}

// 교환 유효성 검사
function isValidSwap(g, r1, c1, r2, c2, cols, rows) {
  // 색상 폭탄은 항상 유효
  if (g[r1][c1].special === SPECIAL.COLOR_BOMB || g[r2][c2].special === SPECIAL.COLOR_BOMB) return true;
  // 가상 교환 후 매칭 확인
  const tmp = g[r1][c1];
  g[r1][c1] = g[r2][c2];
  g[r2][c2] = tmp;
  const matches = findMatches(g, cols, rows);
  g[r2][c2] = g[r1][c1];
  g[r1][c1] = tmp;
  return matches.cells.size > 0;
}

// 데드록 검사 (§11.5)
function checkNoMoves(g, cols, rows) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!g[r][c]) continue;
      // 오른쪽
      if (c + 1 < cols && g[r][c+1] && isValidSwap(g, r, c, r, c+1, cols, rows)) return false;
      // 아래
      if (r + 1 < rows && g[r+1][c] && isValidSwap(g, r, c, r+1, c, cols, rows)) return false;
    }
  }
  return true;
}

// 힌트 찾기 — 가능한 교환 하나 반환
function findHint(g, cols, rows) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!g[r][c]) continue;
      if (c + 1 < cols && g[r][c+1] && isValidSwap(g, r, c, r, c+1, cols, rows)) return [[r,c],[r,c+1]];
      if (r + 1 < rows && g[r+1][c] && isValidSwap(g, r, c, r+1, c, cols, rows)) return [[r,c],[r+1,c]];
    }
  }
  return null;
}

// 보드 셔플 (§11.5)
function shuffleBoard(g, cols, rows, gemTypes) {
  const gems = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (g[r][c]) gems.push(g[r][c].type);
  // Fisher-Yates 셔플
  for (let i = gems.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [gems[i],gems[j]] = [gems[j],gems[i]]; }
  let idx = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (g[r][c]) { g[r][c].type = gems[idx++]; g[r][c].special = SPECIAL.NONE; }
  }
  // 셔플 후 매치가 있으면 재시도
  if (findMatches(g, cols, rows).cells.size > 0 || checkNoMoves(g, cols, rows)) {
    return generateBoard(cols, rows, gemTypes);
  }
  return g;
}

// 점수 계산 (순수 함수)
function calculateScore(matchCount, cascadeLvl, config) {
  return matchCount * config.BASE_MATCH_SCORE * (1 + config.CASCADE_MULTIPLIER * cascadeLvl);
}

// ── 특수 보석 판정 ──────────────────────────────────────
function determineSpecials(patterns, swapR, swapC) {
  const specials = []; // [{r, c, special, type}]
  // L/T 형태 검사: 같은 타입의 가로+세로 패턴이 교차
  const byType = {};
  patterns.forEach(p => {
    if (!byType[p.type]) byType[p.type] = [];
    byType[p.type].push(p);
  });
  const usedPatterns = new Set();
  for (const type in byType) {
    const ps = byType[type];
    for (let i = 0; i < ps.length; i++) {
      for (let j = i+1; j < ps.length; j++) {
        if (ps[i].dir !== ps[j].dir) {
          // 교차점 찾기
          for (const [r1,c1] of ps[i].cells) {
            for (const [r2,c2] of ps[j].cells) {
              if (r1 === r2 && c1 === c2) {
                specials.push({ r: r1, c: c1, special: SPECIAL.CROSS, type: parseInt(type) });
                usedPatterns.add(i); usedPatterns.add(j);
              }
            }
          }
        }
      }
    }
  }
  // 5개 직선 → 색상 폭탄
  patterns.forEach((p, i) => {
    if (usedPatterns.has(i)) return;
    if (p.len >= 5) {
      const pos = p.cells.find(([r,c]) => r === swapR && c === swapC) || p.cells[Math.floor(p.cells.length/2)];
      specials.push({ r: pos[0], c: pos[1], special: SPECIAL.COLOR_BOMB, type: p.type });
      usedPatterns.add(i);
    }
  });
  // 4개 직선 → 줄 폭탄
  patterns.forEach((p, i) => {
    if (usedPatterns.has(i)) return;
    if (p.len === 4) {
      const pos = p.cells.find(([r,c]) => r === swapR && c === swapC) || p.cells[1];
      specials.push({ r: pos[0], c: pos[1], special: p.dir === 'h' ? SPECIAL.LINE_H : SPECIAL.LINE_V, type: p.type });
      usedPatterns.add(i);
    }
  });
  return specials;
}

// ── 특수 보석 발동 효과 ─────────────────────────────────
function activateSpecial(g, r, c, cols, rows, extraCells) {
  if (!g[r] || !g[r][c]) return;
  const sp = g[r][c].special;
  if (sp === SPECIAL.LINE_H) {
    for (let cc = 0; cc < cols; cc++) extraCells.add(r+','+cc);
  } else if (sp === SPECIAL.LINE_V) {
    for (let rr = 0; rr < rows; rr++) extraCells.add(rr+','+c);
  } else if (sp === SPECIAL.CROSS) {
    for (let cc = 0; cc < cols; cc++) extraCells.add(r+','+cc);
    for (let rr = 0; rr < rows; rr++) extraCells.add(rr+','+c);
  } else if (sp === SPECIAL.COLOR_BOMB) {
    const target = g[r][c]._bombTarget != null ? g[r][c]._bombTarget : g[r][c].type;
    for (let rr = 0; rr < rows; rr++) {
      for (let cc = 0; cc < cols; cc++) {
        if (g[rr][cc] && g[rr][cc].type === target) extraCells.add(rr+','+cc);
      }
    }
  }
}

// ── 특수+특수 콤보 처리 ─────────────────────────────────
function handleSpecialCombo(g, r1, c1, r2, c2, cols, rows) {
  const s1 = g[r1][c1].special, s2 = g[r2][c2].special;
  const extraCells = new Set();
  if (s1 === SPECIAL.COLOR_BOMB && s2 === SPECIAL.COLOR_BOMB) {
    // 보드 전체 소멸
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) extraCells.add(r+','+c);
    return extraCells;
  }
  if (s1 === SPECIAL.COLOR_BOMB || s2 === SPECIAL.COLOR_BOMB) {
    const bombCell = s1 === SPECIAL.COLOR_BOMB ? [r1,c1] : [r2,c2];
    const otherCell = s1 === SPECIAL.COLOR_BOMB ? [r2,c2] : [r1,c1];
    const targetType = g[otherCell[0]][otherCell[1]].type;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      if (g[r][c] && g[r][c].type === targetType) extraCells.add(r+','+c);
    }
    extraCells.add(r1+','+c1); extraCells.add(r2+','+c2);
    return extraCells;
  }
  // 줄+줄 → 가로+세로
  if ((s1 === SPECIAL.LINE_H || s1 === SPECIAL.LINE_V) && (s2 === SPECIAL.LINE_H || s2 === SPECIAL.LINE_V)) {
    for (let cc = 0; cc < cols; cc++) extraCells.add(r1+','+cc);
    for (let rr = 0; rr < rows; rr++) extraCells.add(rr+','+c1);
    return extraCells;
  }
  // 십자+십자 → 5x5
  if (s1 === SPECIAL.CROSS && s2 === SPECIAL.CROSS) {
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      const nr = r1+dr, nc = c1+dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) extraCells.add(nr+','+nc);
    }
    return extraCells;
  }
  // 줄+십자 또는 십자+줄 → 4줄
  if ((s1 === SPECIAL.CROSS || s2 === SPECIAL.CROSS) && (s1 === SPECIAL.LINE_H || s1 === SPECIAL.LINE_V || s2 === SPECIAL.LINE_H || s2 === SPECIAL.LINE_V)) {
    for (let cc = 0; cc < cols; cc++) { extraCells.add(r1+','+cc); extraCells.add(r2+','+cc); }
    for (let rr = 0; rr < rows; rr++) { extraCells.add(rr+','+c1); extraCells.add(rr+','+c2); }
    return extraCells;
  }
  return null; // 일반 교환
}

// ── 애니메이션 파이프라인 ────────────────────────────────
let animPhase = ''; // 'swap', 'invalid', 'destroy', 'fall', 'cascade-check'
let pendingSwap = null;
let swapCells = null;
let comboExtraCells = null;

// 교환 시작
function startSwap(r1, c1, r2, c2) {
  if (gameState !== STATE.PLAYING || _transitioning) return;
  const gem1 = grid[r1][c1], gem2 = grid[r2][c2];
  if (!gem1 || !gem2) return;
  // 특수+특수 콤보 확인
  if (gem1.special !== SPECIAL.NONE && gem2.special !== SPECIAL.NONE) {
    comboExtraCells = handleSpecialCombo(grid, r1, c1, r2, c2, CONFIG.GRID_COLS, CONFIG.GRID_ROWS);
  } else {
    comboExtraCells = null;
  }
  // 유효성 (색상 폭탄 또는 콤보는 항상 유효)
  if (!comboExtraCells && !isValidSwap(grid, r1, c1, r2, c2, CONFIG.GRID_COLS, CONFIG.GRID_ROWS)) {
    // 무효 교환 — 왕복 애니메이션
    sound.play('invalid');
    gameState = STATE.ANIMATING;
    animPhase = 'invalid';
    const dx = (c2 - c1) * cellSize, dy = (r2 - r1) * cellSize;
    gem1.x = 0; gem1.y = 0; gem2.x = 0; gem2.y = 0;
    tw.add(gem1, { x: dx, y: dy }, CONFIG.ANIM_SWAP / 2, easeInOut, () => {
      tw.add(gem1, { x: 0, y: 0 }, CONFIG.ANIM_SWAP / 2, easeInOut);
    });
    tw.add(gem2, { x: -dx, y: -dy }, CONFIG.ANIM_SWAP / 2, easeInOut, () => {
      tw.add(gem2, { x: 0, y: 0 }, CONFIG.ANIM_SWAP / 2, easeInOut, () => {
        gameState = STATE.PLAYING;
        animPhase = '';
      });
    });
    return;
  }
  // 유효 교환
  sound.play('swap');
  gameState = STATE.ANIMATING;
  animPhase = 'swap';
  pendingSwap = { r1, c1, r2, c2 };
  cascadeLevel = 0;
  const dx = (c2 - c1) * cellSize, dy = (r2 - r1) * cellSize;
  gem1.x = 0; gem1.y = 0; gem2.x = 0; gem2.y = 0;
  tw.add(gem1, { x: dx, y: dy }, CONFIG.ANIM_SWAP, easeInOut);
  tw.add(gem2, { x: -dx, y: -dy }, CONFIG.ANIM_SWAP, easeInOut, () => {
    onSwapComplete();
  });
}

// 교환 완료 — 실제 그리드 교환 + 매칭 시작
function onSwapComplete() {
  const { r1, c1, r2, c2 } = pendingSwap;
  // 그리드 교환
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
  grid[r1][c1].x = 0; grid[r1][c1].y = 0;
  grid[r2][c2].x = 0; grid[r2][c2].y = 0;
  turnsLeft--;
  hintTimer = 0;
  hintCells = null;
  // 콤보 처리
  if (comboExtraCells && comboExtraCells.size > 0) {
    startDestroy(comboExtraCells, r2, c2, true);
    comboExtraCells = null;
    return;
  }
  // 일반 매칭
  startMatchPhase(r2, c2);
}

// 매칭 단계 시작
function startMatchPhase(swapR, swapC) {
  const result = findMatches(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS);
  if (result.cells.size === 0) {
    // 매칭 없음
    afterCascade();
    return;
  }
  // 특수 보석 판정
  const specials = determineSpecials(result.patterns, swapR, swapC);
  // 특수 보석 발동으로 추가 셀 수집
  const extraCells = new Set(result.cells);
  result.cells.forEach(key => {
    const [r,c] = key.split(',').map(Number);
    if (grid[r][c] && grid[r][c].special !== SPECIAL.NONE) {
      activateSpecial(grid, r, c, CONFIG.GRID_COLS, CONFIG.GRID_ROWS, extraCells);
    }
  });
  // 특수 보석 생성 (소멸 대상에서 제외)
  specials.forEach(sp => { extraCells.delete(sp.r+','+sp.c); });
  startDestroy(extraCells, swapR, swapC, false, specials);
}

// 소멸 애니메이션 시작
function startDestroy(cells, swapR, swapC, isCombo, specials) {
  animPhase = 'destroy';
  const matchCount = cells.size;
  // 점수 계산
  const pts = calculateScore(matchCount, cascadeLevel, CONFIG);
  score += pts;
  if (isCombo) {
    score += 500; // 콤보 보너스
    sound.play('special');
  } else {
    sound.play('match', cascadeLevel);
  }
  // 점수 팝업
  spawnPopup(boardX + boardSize / 2, boardY + boardSize / 2, '+' + Math.floor(pts));
  // 파티클 생성 + 소멸 tween
  let destroyCount = 0;
  const totalCells = cells.size;
  cells.forEach(key => {
    const [r,c] = key.split(',').map(Number);
    if (!grid[r][c]) { destroyCount++; if (destroyCount === totalCells) onDestroyComplete(swapR, swapC, specials); return; }
    const gem = grid[r][c];
    const px = boardX + CONFIG.BOARD_PAD + c * cellSize + cellSize / 2;
    const py = boardY + CONFIG.BOARD_PAD + r * cellSize + cellSize / 2;
    spawnParticles(px, py, GEM_COLORS[gem.type] || CONFIG.COLORS.accent, 4);
    tw.add(gem, { scale: 0, alpha: 0 }, CONFIG.ANIM_DESTROY, easeInOut, () => {
      grid[r][c] = null;
      destroyCount++;
      if (destroyCount === totalCells) onDestroyComplete(swapR, swapC, specials);
    });
  });
}

// 소멸 완료 — 특수 보석 배치 + 중력 낙하
function onDestroyComplete(swapR, swapC, specials) {
  // 특수 보석 배치
  if (specials) {
    specials.forEach(sp => {
      if (!grid[sp.r][sp.c]) {
        grid[sp.r][sp.c] = createGem(sp.type, sp.special);
        grid[sp.r][sp.c].scale = 0;
        tw.add(grid[sp.r][sp.c], { scale: 1 }, 200, easeOutCubic);
      }
    });
  }
  startGravity(swapR, swapC);
}

// 중력 낙하 (§11.4)
function startGravity(swapR, swapC) {
  animPhase = 'fall';
  let maxFallDist = 0;
  const cols = CONFIG.GRID_COLS, rows = CONFIG.GRID_ROWS;
  const gemTypes = CONFIG.GEM_TYPES_BY_LEVEL[currentLevel] || 6;
  for (let c = 0; c < cols; c++) {
    let emptyCount = 0;
    for (let r = rows - 1; r >= 0; r--) {
      if (!grid[r][c]) { emptyCount++; }
      else if (emptyCount > 0) {
        grid[r + emptyCount][c] = grid[r][c];
        grid[r][c] = null;
        const gem = grid[r + emptyCount][c];
        gem.y = -emptyCount * cellSize;
        gem.x = 0;
        const fallDur = CONFIG.ANIM_FALL_PER_CELL * emptyCount;
        tw.add(gem, { y: 0 }, fallDur, easeOutBounce);
        maxFallDist = Math.max(maxFallDist, emptyCount);
      }
    }
    // 상단 빈 칸에 새 보석 생성
    for (let r = 0; r < emptyCount; r++) {
      const type = Math.floor(Math.random() * gemTypes);
      grid[r][c] = createGem(type);
      grid[r][c].y = -(emptyCount - r) * cellSize;
      grid[r][c].x = 0;
      const fallDur = CONFIG.ANIM_FALL_PER_CELL * (emptyCount - r);
      tw.add(grid[r][c], { y: 0 }, fallDur, easeOutBounce);
      maxFallDist = Math.max(maxFallDist, emptyCount - r);
    }
  }
  // 낙하 완료 대기 후 캐스케이드 검사
  const waitDur = CONFIG.ANIM_FALL_PER_CELL * maxFallDist + 50;
  const waitObj = { t: 0 };
  tw.add(waitObj, { t: 1 }, Math.max(waitDur, 100), easeInOut, () => {
    onGravityComplete(swapR, swapC);
  });
}

// 낙하 완료 — 캐스케이드 재검사
function onGravityComplete(swapR, swapC) {
  cascadeLevel++;
  const result = findMatches(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS);
  if (result.cells.size > 0) {
    // 캐스케이드 — 특수 발동 포함
    const extraCells = new Set(result.cells);
    result.cells.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      if (grid[r][c] && grid[r][c].special !== SPECIAL.NONE) {
        activateSpecial(grid, r, c, CONFIG.GRID_COLS, CONFIG.GRID_ROWS, extraCells);
      }
    });
    const specials = determineSpecials(result.patterns, swapR, swapC);
    specials.forEach(sp => { extraCells.delete(sp.r+','+sp.c); });
    startDestroy(extraCells, swapR, swapC, false, specials);
  } else {
    afterCascade();
  }
}

// 캐스케이드 종료
function afterCascade() {
  animPhase = '';
  // 레벨 클리어 확인
  const [targetScore] = CONFIG.LEVELS[currentLevel];
  if (score >= targetScore) {
    onLevelClear();
    return;
  }
  // 턴 소진 확인
  if (turnsLeft <= 0) {
    onGameOver();
    return;
  }
  // 데드록 확인
  if (checkNoMoves(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS)) {
    const gemTypes = CONFIG.GEM_TYPES_BY_LEVEL[currentLevel] || 6;
    grid = shuffleBoard(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS, gemTypes);
    // 셔플 후 다시 확인
    if (checkNoMoves(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS)) {
      grid = generateBoard(CONFIG.GRID_COLS, CONFIG.GRID_ROWS, gemTypes);
    }
  }
  gameState = STATE.PLAYING;
}

// ── 레벨 클리어 ─────────────────────────────────────────
function onLevelClear() {
  if (gameState === STATE.LEVEL_CLEAR) return; // 가드 플래그
  gameState = STATE.LEVEL_CLEAR;
  _transitioning = true;
  // 남은 턴 보너스
  const bonus = turnsLeft * CONFIG.REMAINING_TURN_BONUS;
  score += bonus;
  // 별 평가
  const [targetScore] = CONFIG.LEVELS[currentLevel];
  if (score >= targetScore * CONFIG.STAR_3_MULTIPLIER) clearStars = 3;
  else if (score >= targetScore * CONFIG.STAR_2_MULTIPLIER) clearStars = 2;
  else clearStars = 1;
  clearAnimT = 0;
  // 세이브 갱신 (판정 먼저, 저장 나중에 — F2 Cycle 2)
  const lvlIdx = currentLevel;
  if (clearStars > saveData.stars[lvlIdx]) saveData.stars[lvlIdx] = clearStars;
  if (score > saveData.highScores[lvlIdx]) saveData.highScores[lvlIdx] = score;
  if (currentLevel + 1 >= saveData.currentLevel) saveData.currentLevel = currentLevel + 2; // 다음 레벨 해금 (1-indexed)
  saveData.totalScore += score;
  writeSave();
  sound.play('clear');
  // 축하 파티클
  for (let i = 0; i < 30; i++) {
    spawnParticles(W/2 + (Math.random()-0.5)*300, H/2 + (Math.random()-0.5)*200,
      GEM_COLORS[Math.floor(Math.random()*6)], 2);
  }
  _transitioning = false;
}

// ── 게임 오버 ───────────────────────────────────────────
function onGameOver() {
  if (gameState === STATE.GAME_OVER) return; // 가드 플래그
  gameState = STATE.GAME_OVER;
  _transitioning = true;
  sound.play('fail');
  // 화면 쉐이크
  shakeX = 8; shakeY = 8;
  // 세이브
  const lvlIdx = currentLevel;
  if (score > saveData.highScores[lvlIdx]) saveData.highScores[lvlIdx] = score;
  writeSave();
  _transitioning = false;
}

// ── 레벨 시작 ───────────────────────────────────────────
function startLevel(levelIdx) {
  currentLevel = levelIdx;
  const [targetScore, turns] = CONFIG.LEVELS[levelIdx];
  const gemTypes = CONFIG.GEM_TYPES_BY_LEVEL[levelIdx] || 6;
  score = 0;
  turnsLeft = turns;
  cascadeLevel = 0;
  selectedR = -1; selectedC = -1;
  hintTimer = 0; hintCells = null;
  animPhase = '';
  tw.clearImmediate();
  grid = generateBoard(CONFIG.GRID_COLS, CONFIG.GRID_ROWS, gemTypes);
  // 데드록 방지
  let attempts = 0;
  while (checkNoMoves(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS) && attempts < 10) {
    grid = generateBoard(CONFIG.GRID_COLS, CONFIG.GRID_ROWS, gemTypes);
    attempts++;
  }
  gameState = STATE.PLAYING;
  _transitioning = false;
}

// ── 파티클 & 팝업 ──────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const p = particlePool.get();
    if (!p) return;
    p.x = x; p.y = y;
    p.vx = (Math.random() - 0.5) * 200;
    p.vy = (Math.random() - 0.5) * 200 - 50;
    p.life = 0; p.maxLife = 400 + Math.random() * 300;
    p.color = color; p.size = 3 + Math.random() * 4; p.alpha = 1;
  }
}

function spawnPopup(x, y, text) {
  const p = popupPool.get();
  if (!p) return;
  p.x = x; p.y = y; p.text = text; p.alpha = 1;
  p.life = 0; p.maxLife = CONFIG.ANIM_POPUP; p.dy = 0;
}

function updateParticles(dt) {
  particlePool.forEach(p => {
    p.life += dt;
    if (p.life >= p.maxLife) { p.active = false; return; }
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.vy += 300 * dt / 1000; // 중력
    p.alpha = 1 - p.life / p.maxLife;
  });
}

function updatePopups(dt) {
  popupPool.forEach(p => {
    p.life += dt;
    if (p.life >= p.maxLife) { p.active = false; return; }
    const t = p.life / p.maxLife;
    p.dy = -60 * t;
    p.alpha = 1 - t;
  });
}

// ── 입력 처리 ───────────────────────────────────────────
let pointerDown = false;
let pointerStartX = 0, pointerStartY = 0;
let pointerStartR = -1, pointerStartC = -1;
let keys = {};

// 그리드 좌표 변환
function screenToGrid(sx, sy) {
  const lx = sx - boardX - CONFIG.BOARD_PAD;
  const ly = sy - boardY - CONFIG.BOARD_PAD;
  const c = Math.floor(lx / cellSize);
  const r = Math.floor(ly / cellSize);
  if (r >= 0 && r < CONFIG.GRID_ROWS && c >= 0 && c < CONFIG.GRID_COLS) return { r, c };
  return null;
}

// 버튼 히트 테스트
function hitTest(sx, sy, bx, by, bw, bh) {
  return sx >= bx && sx <= bx + bw && sy >= by && sy <= by + bh;
}

function handlePointerDown(x, y) {
  sound.init();
  if (gameState === STATE.TITLE) {
    beginTransition(STATE.LEVEL_SELECT, { immediate: true });
    return;
  }
  if (gameState === STATE.LEVEL_SELECT) {
    handleLevelSelectClick(x, y);
    return;
  }
  if (gameState === STATE.LEVEL_CLEAR) {
    handleClearClick(x, y);
    return;
  }
  if (gameState === STATE.GAME_OVER) {
    handleGameOverClick(x, y);
    return;
  }
  if (gameState === STATE.PAUSED) {
    handlePauseClick(x, y);
    return;
  }
  if (gameState === STATE.PLAYING) {
    // UI 버튼 체크
    if (handlePlayingUIClick(x, y)) return;
    // 보석 클릭/스와이프 시작
    const cell = screenToGrid(x, y);
    if (cell) {
      pointerDown = true;
      pointerStartX = x; pointerStartY = y;
      pointerStartR = cell.r; pointerStartC = cell.c;
      // 탭 선택 모드
      if (selectedR >= 0 && selectedC >= 0) {
        const dr = Math.abs(cell.r - selectedR), dc = Math.abs(cell.c - selectedC);
        if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
          startSwap(selectedR, selectedC, cell.r, cell.c);
          selectedR = -1; selectedC = -1;
          return;
        }
      }
    }
  }
}

function handlePointerMove(x, y) {
  if (!pointerDown || gameState !== STATE.PLAYING) return;
  const dx = x - pointerStartX, dy = y - pointerStartY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist >= CONFIG.SWIPE_THRESHOLD) {
    pointerDown = false;
    // 스와이프 방향 결정
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) { dc = dx > 0 ? 1 : -1; }
    else { dr = dy > 0 ? 1 : -1; }
    const tr = pointerStartR + dr, tc = pointerStartC + dc;
    if (tr >= 0 && tr < CONFIG.GRID_ROWS && tc >= 0 && tc < CONFIG.GRID_COLS) {
      startSwap(pointerStartR, pointerStartC, tr, tc);
      selectedR = -1; selectedC = -1;
    }
  }
}

function handlePointerUp(x, y) {
  if (pointerDown && gameState === STATE.PLAYING) {
    // 탭 (스와이프 안 됨) — 보석 선택
    const cell = screenToGrid(x, y);
    if (cell) {
      if (selectedR === cell.r && selectedC === cell.c) {
        selectedR = -1; selectedC = -1; // 선택 해제
      } else {
        selectedR = cell.r; selectedC = cell.c;
      }
    }
  }
  pointerDown = false;
}

// 마우스 이벤트
canvas.addEventListener('mousedown', e => { inputMode = 'mouse'; handlePointerDown(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => { handlePointerMove(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', e => { handlePointerUp(e.clientX, e.clientY); });

// 터치 이벤트
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); inputMode = 'touch';
  const t = e.touches[0];
  handlePointerDown(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  handlePointerMove(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handlePointerUp(t.clientX, t.clientY);
}, { passive: false });

// 키보드 이벤트
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  inputMode = 'keyboard';
  sound.init();
  if (gameState === STATE.TITLE) {
    if (e.code === 'Space' || e.code === 'Enter') { beginTransition(STATE.LEVEL_SELECT, { immediate: true }); }
    return;
  }
  if (gameState === STATE.PLAYING) {
    if (e.code === 'ArrowLeft') cursorC = Math.max(0, cursorC - 1);
    if (e.code === 'ArrowRight') cursorC = Math.min(CONFIG.GRID_COLS - 1, cursorC + 1);
    if (e.code === 'ArrowUp') cursorR = Math.max(0, cursorR - 1);
    if (e.code === 'ArrowDown') cursorR = Math.min(CONFIG.GRID_ROWS - 1, cursorR + 1);
    if (e.code === 'Space' || e.code === 'Enter') {
      if (selectedR >= 0 && selectedC >= 0) {
        const dr = Math.abs(cursorR - selectedR), dc = Math.abs(cursorC - selectedC);
        if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
          startSwap(selectedR, selectedC, cursorR, cursorC);
          selectedR = -1; selectedC = -1;
        } else {
          selectedR = cursorR; selectedC = cursorC;
        }
      } else {
        selectedR = cursorR; selectedC = cursorC;
      }
    }
    if (e.code === 'KeyP') { gameState = STATE.PAUSED; }
    if (e.code === 'KeyM') { sound.muted = !sound.muted; saveData.muted = sound.muted; writeSave(); }
    if (e.code === 'Escape') { beginTransition(STATE.LEVEL_SELECT, { immediate: true }); tw.clearImmediate(); }
  }
  if (gameState === STATE.PAUSED && e.code === 'KeyP') { gameState = STATE.PLAYING; }
  if (gameState === STATE.GAME_OVER && e.code === 'KeyR') { startLevel(currentLevel); }
  if (gameState === STATE.LEVEL_CLEAR && (e.code === 'Space' || e.code === 'Enter')) {
    if (currentLevel + 1 < 30) startLevel(currentLevel + 1);
    else beginTransition(STATE.LEVEL_SELECT, { immediate: true });
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── UI 버튼 레이아웃 (touchSafe 적용) ──────────────────
function getPlayingButtons() {
  const btnH = touchSafe(36);
  const btnW = touchSafe(36);
  const margin = 8;
  return {
    pause: { x: W - btnW - margin, y: margin, w: btnW, h: btnH, label: '⏸' },
    mute: { x: W - btnW * 2 - margin * 2, y: margin, w: btnW, h: btnH, label: sound.muted ? '🔇' : '🔊' },
  };
}

function handlePlayingUIClick(x, y) {
  const btns = getPlayingButtons();
  if (hitTest(x, y, btns.pause.x, btns.pause.y, btns.pause.w, btns.pause.h)) {
    gameState = STATE.PAUSED; return true;
  }
  if (hitTest(x, y, btns.mute.x, btns.mute.y, btns.mute.w, btns.mute.h)) {
    sound.muted = !sound.muted; saveData.muted = sound.muted; writeSave(); return true;
  }
  return false;
}

// ── 레벨 선택 화면 ──────────────────────────────────────
function getLevelSelectButtons() {
  const cols = 5, rowCount = 6;
  const btnSize = touchSafe(50);
  const gap = 10;
  const totalW = cols * btnSize + (cols - 1) * gap;
  const startX = (W - totalW) / 2;
  const startY = H * 0.2;
  const btns = [];
  for (let i = 0; i < 30; i++) {
    const r = Math.floor(i / cols), c = i % cols;
    btns.push({
      x: startX + c * (btnSize + gap),
      y: startY + r * (btnSize + gap),
      w: btnSize, h: btnSize,
      level: i, unlocked: i < saveData.currentLevel
    });
  }
  return btns;
}

function handleLevelSelectClick(x, y) {
  const btns = getLevelSelectButtons();
  for (const btn of btns) {
    if (btn.unlocked && hitTest(x, y, btn.x, btn.y, btn.w, btn.h)) {
      startLevel(btn.level);
      return;
    }
  }
}

// ── 클리어/게임오버 버튼 ────────────────────────────────
function getClearButtons() {
  const btnW = 160, btnH = touchSafe(44);
  const cx = W / 2;
  const btns = [];
  if (currentLevel + 1 < 30) {
    btns.push({ x: cx - btnW / 2, y: H * 0.65, w: btnW, h: btnH, action: 'next', label: '다음 레벨' });
  }
  btns.push({ x: cx - btnW / 2, y: H * 0.65 + (btns.length ? btnH + 12 : 0), w: btnW, h: btnH, action: 'select', label: '레벨 선택' });
  return btns;
}

function handleClearClick(x, y) {
  for (const btn of getClearButtons()) {
    if (hitTest(x, y, btn.x, btn.y, btn.w, btn.h)) {
      if (btn.action === 'next') startLevel(currentLevel + 1);
      else beginTransition(STATE.LEVEL_SELECT, { immediate: true });
    }
  }
}

function getGameOverButtons() {
  const btnW = 160, btnH = touchSafe(44);
  const cx = W / 2;
  return [
    { x: cx - btnW / 2, y: H * 0.62, w: btnW, h: btnH, action: 'retry', label: '재시작' },
    { x: cx - btnW / 2, y: H * 0.62 + btnH + 12, w: btnW, h: btnH, action: 'select', label: '레벨 선택' },
  ];
}

function handleGameOverClick(x, y) {
  for (const btn of getGameOverButtons()) {
    if (hitTest(x, y, btn.x, btn.y, btn.w, btn.h)) {
      if (btn.action === 'retry') startLevel(currentLevel);
      else beginTransition(STATE.LEVEL_SELECT, { immediate: true });
    }
  }
}

function handlePauseClick(x, y) {
  const btnW = 160, btnH = touchSafe(44);
  const cx = W / 2, cy = H / 2;
  if (hitTest(x, y, cx - btnW/2, cy - 10, btnW, btnH)) {
    gameState = STATE.PLAYING;
  }
  if (hitTest(x, y, cx - btnW/2, cy + btnH + 10, btnW, btnH)) {
    beginTransition(STATE.LEVEL_SELECT, { immediate: true });
    tw.clearImmediate();
  }
}

// ── 렌더링 ──────────────────────────────────────────────

// 보석 렌더링 (순수 함수, F12)
function renderGem(c, gem, px, py, size) {
  if (!gem || gem.alpha <= 0) return;
  const half = size / 2 - CONFIG.GEM_PAD;
  const cx = px + gem.x, cy = py + gem.y;
  c.save();
  c.globalAlpha = gem.alpha;
  c.translate(cx, cy);
  c.scale(gem.scale, gem.scale);
  if (gem.special === SPECIAL.COLOR_BOMB) {
    // 무지개 원형 — powerup 에셋 또는 폴백
    if (SPRITES.powerup) {
      c.drawImage(SPRITES.powerup, -half, -half, half*2, half*2);
    } else {
      const grad = c.createRadialGradient(0, 0, 2, 0, 0, half);
      for (let i = 0; i < 6; i++) grad.addColorStop(i/5, GEM_COLORS[i]);
      c.beginPath(); c.arc(0, 0, half, 0, Math.PI*2);
      c.fillStyle = grad; c.fill();
      c.strokeStyle = '#fff'; c.lineWidth = 2; c.stroke();
    }
  } else {
    // 일반/특수 보석 — 둥근 사각형
    const color = GEM_COLORS[gem.type] || '#888';
    c.fillStyle = color;
    roundRect(c, -half, -half, half*2, half*2, 8);
    c.fill();
    // 광택 하이라이트
    c.fillStyle = 'rgba(255,255,255,0.3)';
    c.beginPath(); c.arc(-half*0.2, -half*0.2, half*0.35, 0, Math.PI*2); c.fill();
    // 특수 표시
    if (gem.special === SPECIAL.LINE_H || gem.special === SPECIAL.LINE_V) {
      c.strokeStyle = 'rgba(255,255,255,0.8)'; c.lineWidth = 2;
      if (gem.special === SPECIAL.LINE_H) {
        c.beginPath(); c.moveTo(-half+4, -3); c.lineTo(half-4, -3); c.stroke();
        c.beginPath(); c.moveTo(-half+4, 3); c.lineTo(half-4, 3); c.stroke();
      } else {
        c.beginPath(); c.moveTo(-3, -half+4); c.lineTo(-3, half-4); c.stroke();
        c.beginPath(); c.moveTo(3, -half+4); c.lineTo(3, half-4); c.stroke();
      }
    } else if (gem.special === SPECIAL.CROSS) {
      c.strokeStyle = 'rgba(255,255,255,0.9)'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(-half+4, 0); c.lineTo(half-4, 0); c.stroke();
      c.beginPath(); c.moveTo(0, -half+4); c.lineTo(0, half-4); c.stroke();
    }
  }
  c.restore();
}

// 둥근 사각형 유틸
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

// 보드 전체 렌더
function renderBoard(c) {
  // 보드 배경
  c.fillStyle = CONFIG.COLORS.board;
  roundRect(c, boardX, boardY, boardSize, boardSize, 12);
  c.fill();
  c.strokeStyle = CONFIG.COLORS.boardBorder;
  c.lineWidth = 2;
  roundRect(c, boardX, boardY, boardSize, boardSize, 12);
  c.stroke();
  // bgLayer2 오버레이
  if (SPRITES.bgLayer2) {
    c.save();
    c.globalAlpha = 0.15;
    c.beginPath();
    roundRect(c, boardX, boardY, boardSize, boardSize, 12);
    c.clip();
    c.drawImage(SPRITES.bgLayer2, boardX, boardY, boardSize, boardSize);
    c.restore();
  }
  // 그리드 셀 배경
  for (let r = 0; r < CONFIG.GRID_ROWS; r++) {
    for (let cl = 0; cl < CONFIG.GRID_COLS; cl++) {
      const px = boardX + CONFIG.BOARD_PAD + cl * cellSize;
      const py = boardY + CONFIG.BOARD_PAD + r * cellSize;
      c.fillStyle = (r + cl) % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.1)';
      c.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
    }
  }
  // 힌트 펄스
  if (hintCells && gameState === STATE.PLAYING) {
    hintPulse += 0.05;
    const scale = 1 + 0.08 * Math.sin(hintPulse * Math.PI * 2);
    hintCells.forEach(([r,cl]) => {
      const px = boardX + CONFIG.BOARD_PAD + cl * cellSize + cellSize/2;
      const py = boardY + CONFIG.BOARD_PAD + r * cellSize + cellSize/2;
      c.save();
      c.strokeStyle = CONFIG.COLORS.accent;
      c.lineWidth = 3;
      c.globalAlpha = 0.5 + 0.3 * Math.sin(hintPulse * Math.PI * 2);
      const hs = cellSize/2 * scale;
      roundRect(c, px - hs, py - hs, hs*2, hs*2, 6);
      c.stroke();
      c.restore();
    });
  }
  // 보석 렌더링
  for (let r = 0; r < CONFIG.GRID_ROWS; r++) {
    for (let cl = 0; cl < CONFIG.GRID_COLS; cl++) {
      if (grid[r] && grid[r][cl]) {
        const px = boardX + CONFIG.BOARD_PAD + cl * cellSize + cellSize/2;
        const py = boardY + CONFIG.BOARD_PAD + r * cellSize + cellSize/2;
        renderGem(c, grid[r][cl], px, py, cellSize);
      }
    }
  }
  // 선택 표시
  if (selectedR >= 0 && selectedC >= 0) {
    const px = boardX + CONFIG.BOARD_PAD + selectedC * cellSize;
    const py = boardY + CONFIG.BOARD_PAD + selectedR * cellSize;
    c.strokeStyle = CONFIG.COLORS.white;
    c.lineWidth = 3;
    c.globalAlpha = 0.8;
    roundRect(c, px + 2, py + 2, cellSize - 4, cellSize - 4, 6);
    c.stroke();
    c.globalAlpha = 1;
  }
  // 키보드 커서 (inputMode === 'keyboard'일 때만, F2)
  if (inputMode === 'keyboard') {
    const px = boardX + CONFIG.BOARD_PAD + cursorC * cellSize;
    const py = boardY + CONFIG.BOARD_PAD + cursorR * cellSize;
    c.strokeStyle = CONFIG.COLORS.topaz;
    c.lineWidth = 2;
    c.setLineDash([6, 3]);
    roundRect(c, px + 1, py + 1, cellSize - 2, cellSize - 2, 6);
    c.stroke();
    c.setLineDash([]);
  }
}

// HUD 렌더링
function renderHUD(c) {
  const fs = Math.max(14, Math.min(18, W * 0.035));
  c.textAlign = 'left';
  c.textBaseline = 'top';
  const hudY = boardY - fs * 2.2;
  // 레벨
  c.fillStyle = CONFIG.COLORS.text;
  c.font = 'bold ' + Math.floor(fs) + 'px ' + CONFIG.FONT;
  c.fillText('Lv.' + (currentLevel + 1), boardX, hudY);
  // 목표 점수
  const [targetScore] = CONFIG.LEVELS[currentLevel];
  c.textAlign = 'center';
  c.fillStyle = CONFIG.COLORS.score;
  c.fillText(score + ' / ' + targetScore, W / 2, hudY);
  // 남은 턴
  c.textAlign = 'right';
  c.fillStyle = turnsLeft <= 5 ? '#e94560' : CONFIG.COLORS.text;
  c.fillText('턴: ' + turnsLeft, boardX + boardSize, hudY);
  // 별 게이지
  const gaugeY = boardY + boardSize + 12;
  const gaugeW = boardSize - 20;
  const gaugeH = 8;
  const gaugeX = boardX + 10;
  c.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(c, gaugeX, gaugeY, gaugeW, gaugeH, 4);
  c.fill();
  const progress = Math.min(score / (targetScore * CONFIG.STAR_3_MULTIPLIER), 1);
  c.fillStyle = CONFIG.COLORS.accent;
  roundRect(c, gaugeX, gaugeY, gaugeW * progress, gaugeH, 4);
  c.fill();
  // 별 마커
  const starPositions = [1, CONFIG.STAR_2_MULTIPLIER, CONFIG.STAR_3_MULTIPLIER];
  const starSize = 12;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = Math.floor(starSize) + 'px ' + CONFIG.FONT;
  starPositions.forEach((mult, i) => {
    const sx = gaugeX + gaugeW * (mult / CONFIG.STAR_3_MULTIPLIER);
    const sy = gaugeY + gaugeH + starSize;
    const earned = score >= targetScore * mult;
    if (SPRITES.uiStar && earned) {
      c.drawImage(SPRITES.uiStar, sx - 8, sy - 8, 16, 16);
    } else {
      c.fillStyle = earned ? CONFIG.COLORS.score : CONFIG.COLORS.muted;
      c.fillText('★', sx, sy);
    }
  });
  // UI 버튼
  const btns = getPlayingButtons();
  Object.values(btns).forEach(btn => {
    c.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(c, btn.x, btn.y, btn.w, btn.h, 8);
    c.fill();
    c.strokeStyle = 'rgba(0,212,255,0.3)';
    c.lineWidth = 1;
    roundRect(c, btn.x, btn.y, btn.w, btn.h, 8);
    c.stroke();
    c.fillStyle = CONFIG.COLORS.text;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.font = Math.floor(btn.h * 0.5) + 'px ' + CONFIG.FONT;
    c.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
  });
}

// 파티클 렌더링
function renderParticles(c) {
  particlePool.forEach(p => {
    c.globalAlpha = p.alpha;
    if (SPRITES.effectHit && p.size > 5) {
      c.drawImage(SPRITES.effectHit, p.x - p.size, p.y - p.size, p.size*2, p.size*2);
    } else {
      c.fillStyle = p.color;
      c.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
  });
  c.globalAlpha = 1;
}

// 팝업 렌더링
function renderPopups(c) {
  c.textAlign = 'center'; c.textBaseline = 'middle';
  popupPool.forEach(p => {
    c.globalAlpha = p.alpha;
    c.fillStyle = CONFIG.COLORS.score;
    c.font = 'bold 20px ' + CONFIG.FONT;
    c.shadowColor = CONFIG.COLORS.score;
    c.shadowBlur = 8;
    c.fillText(p.text, p.x, p.y + p.dy);
    c.shadowBlur = 0;
  });
  c.globalAlpha = 1;
}

// 타이틀 화면 — 크리스탈 글리치 이펙트 (puzzle 시그니처)
function renderTitle(c, dt) {
  titleAnim += dt * 0.001;
  // 배경
  c.drawImage(bgCache, 0, 0);
  // 크리스탈 파티클 (배경 장식)
  c.save();
  for (let i = 0; i < 20; i++) {
    const x = (W * 0.1 + i * W * 0.04 + Math.sin(titleAnim + i) * 30) % W;
    const y = (H * 0.3 + Math.cos(titleAnim * 0.7 + i * 0.5) * H * 0.2);
    const a = 0.15 + 0.1 * Math.sin(titleAnim * 2 + i);
    c.globalAlpha = a;
    c.fillStyle = GEM_COLORS[i % 6];
    c.save();
    c.translate(x, y);
    c.rotate(titleAnim * 0.5 + i);
    // 다이아몬드 형태
    c.beginPath();
    c.moveTo(0, -12); c.lineTo(10, 0); c.lineTo(0, 12); c.lineTo(-10, 0);
    c.closePath(); c.fill();
    c.restore();
  }
  c.restore();
  // 제목 — 스캔라인 + 시안 글로우
  const titleY = H * 0.35;
  c.save();
  c.textAlign = 'center'; c.textBaseline = 'middle';
  // 글로우
  c.shadowColor = CONFIG.COLORS.accent;
  c.shadowBlur = 20 + 5 * Math.sin(titleAnim * 3);
  c.fillStyle = CONFIG.COLORS.white;
  c.font = 'bold ' + Math.floor(Math.min(W*0.08, 48)) + 'px ' + CONFIG.FONT;
  c.fillText('GEM MATCH', W/2, titleY - 20);
  c.fillStyle = CONFIG.COLORS.accent;
  c.font = 'bold ' + Math.floor(Math.min(W*0.1, 56)) + 'px ' + CONFIG.FONT;
  c.fillText('BLITZ', W/2, titleY + 30);
  c.shadowBlur = 0;
  // 스캔라인 오버레이
  c.globalAlpha = 0.06;
  for (let y = 0; y < H; y += 3) {
    c.fillStyle = '#000';
    c.fillRect(0, y, W, 1);
  }
  c.globalAlpha = 1;
  c.restore();
  // 부제
  c.fillStyle = CONFIG.COLORS.muted;
  c.textAlign = 'center';
  c.font = Math.floor(Math.min(W*0.035, 16)) + 'px ' + CONFIG.FONT;
  c.fillText('보석을 스와이프로 교환해 3개 이상 연결!', W/2, titleY + 70);
  // 시작 안내
  const blink = Math.sin(titleAnim * 4) > 0;
  if (blink) {
    c.fillStyle = CONFIG.COLORS.accent;
    c.font = Math.floor(Math.min(W*0.04, 18)) + 'px ' + CONFIG.FONT;
    c.fillText('TAP 또는 SPACE 키를 눌러 시작', W/2, H * 0.7);
  }
}

// 레벨 선택 화면
function renderLevelSelect(c) {
  c.drawImage(bgCache, 0, 0);
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = CONFIG.COLORS.accent;
  c.font = 'bold ' + Math.floor(Math.min(W*0.06, 32)) + 'px ' + CONFIG.FONT;
  c.shadowColor = CONFIG.COLORS.accent;
  c.shadowBlur = 10;
  c.fillText('레벨 선택', W/2, H * 0.1);
  c.shadowBlur = 0;
  const btns = getLevelSelectButtons();
  btns.forEach(btn => {
    const lvl = btn.level;
    if (btn.unlocked) {
      c.fillStyle = CONFIG.COLORS.board;
      roundRect(c, btn.x, btn.y, btn.w, btn.h, 8);
      c.fill();
      c.strokeStyle = CONFIG.COLORS.accent;
      c.lineWidth = 1.5;
      roundRect(c, btn.x, btn.y, btn.w, btn.h, 8);
      c.stroke();
      c.fillStyle = CONFIG.COLORS.text;
      c.font = 'bold ' + Math.floor(btn.h * 0.35) + 'px ' + CONFIG.FONT;
      c.fillText('' + (lvl + 1), btn.x + btn.w/2, btn.y + btn.h * 0.4);
      // 별 표시
      const stars = saveData.stars[lvl];
      c.font = Math.floor(btn.h * 0.22) + 'px ' + CONFIG.FONT;
      for (let s = 0; s < 3; s++) {
        c.fillStyle = s < stars ? CONFIG.COLORS.score : CONFIG.COLORS.muted;
        c.fillText('★', btn.x + btn.w * (0.25 + s * 0.25), btn.y + btn.h * 0.75);
      }
    } else {
      c.fillStyle = 'rgba(255,255,255,0.03)';
      roundRect(c, btn.x, btn.y, btn.w, btn.h, 8);
      c.fill();
      c.fillStyle = CONFIG.COLORS.muted;
      c.font = Math.floor(btn.h * 0.3) + 'px ' + CONFIG.FONT;
      c.fillText('🔒', btn.x + btn.w/2, btn.y + btn.h/2);
    }
  });
}

// 레벨 클리어 화면
function renderLevelClear(c, dt) {
  clearAnimT += dt * 0.001;
  c.drawImage(bgCache, 0, 0);
  renderBoard(c);
  // 오버레이
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'middle';
  // 클리어 텍스트
  c.shadowColor = CONFIG.COLORS.score;
  c.shadowBlur = 15;
  c.fillStyle = CONFIG.COLORS.score;
  c.font = 'bold ' + Math.floor(Math.min(W*0.08, 40)) + 'px ' + CONFIG.FONT;
  c.fillText('LEVEL CLEAR!', W/2, H * 0.25);
  c.shadowBlur = 0;
  // 점수
  c.fillStyle = CONFIG.COLORS.text;
  c.font = Math.floor(Math.min(W*0.04, 20)) + 'px ' + CONFIG.FONT;
  c.fillText('점수: ' + score, W/2, H * 0.35);
  // 별 표시 (애니메이션)
  for (let i = 0; i < 3; i++) {
    const delay = i * 0.3;
    const t = Math.max(0, Math.min(1, (clearAnimT - delay) * 3));
    const earned = i < clearStars;
    const s = earned ? easeOutBounce(t) : 0.5;
    c.save();
    c.translate(W/2 + (i - 1) * 50, H * 0.45);
    c.scale(s, s);
    c.rotate(earned ? Math.sin(clearAnimT * 2 + i) * 0.1 : 0);
    if (SPRITES.uiStar && earned) {
      c.drawImage(SPRITES.uiStar, -16, -16, 32, 32);
    } else {
      c.fillStyle = earned ? CONFIG.COLORS.score : CONFIG.COLORS.muted;
      c.font = '36px ' + CONFIG.FONT;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('★', 0, 0);
    }
    c.restore();
  }
  // 보너스 정보
  c.fillStyle = CONFIG.COLORS.muted;
  c.font = Math.floor(Math.min(W*0.03, 14)) + 'px ' + CONFIG.FONT;
  c.fillText('남은 턴 보너스: +' + (turnsLeft * CONFIG.REMAINING_TURN_BONUS), W/2, H * 0.55);
  // 버튼
  renderButtons(c, getClearButtons());
  renderParticles(c);
}

// 게임오버 화면
function renderGameOver(c) {
  c.drawImage(bgCache, 0, 0);
  renderBoard(c);
  c.fillStyle = 'rgba(0,0,0,0.7)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#e94560';
  c.shadowColor = '#e94560';
  c.shadowBlur = 12;
  c.font = 'bold ' + Math.floor(Math.min(W*0.08, 40)) + 'px ' + CONFIG.FONT;
  c.fillText('GAME OVER', W/2, H * 0.3);
  c.shadowBlur = 0;
  c.fillStyle = CONFIG.COLORS.text;
  c.font = Math.floor(Math.min(W*0.04, 20)) + 'px ' + CONFIG.FONT;
  c.fillText('점수: ' + score, W/2, H * 0.42);
  const hs = saveData.highScores[currentLevel];
  if (hs > 0) {
    c.fillStyle = CONFIG.COLORS.score;
    c.font = Math.floor(Math.min(W*0.035, 16)) + 'px ' + CONFIG.FONT;
    c.fillText('최고 점수: ' + hs, W/2, H * 0.5);
  }
  renderButtons(c, getGameOverButtons());
}

// 일시정지 화면
function renderPause(c) {
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = CONFIG.COLORS.accent;
  c.font = 'bold ' + Math.floor(Math.min(W*0.07, 36)) + 'px ' + CONFIG.FONT;
  c.fillText('PAUSED', W/2, H * 0.35);
  const btnW = 160, btnH = touchSafe(44);
  const cx = W / 2;
  renderButtons(c, [
    { x: cx - btnW/2, y: H/2 - 10, w: btnW, h: btnH, label: '계속하기' },
    { x: cx - btnW/2, y: H/2 + btnH + 10, w: btnW, h: btnH, label: '레벨 선택' },
  ]);
}

// 공용 버튼 렌더
function renderButtons(c, btns) {
  btns.forEach(btn => {
    c.fillStyle = CONFIG.COLORS.board;
    roundRect(c, btn.x, btn.y, btn.w, btn.h, 10);
    c.fill();
    c.strokeStyle = CONFIG.COLORS.accent;
    c.lineWidth = 1.5;
    roundRect(c, btn.x, btn.y, btn.w, btn.h, 10);
    c.stroke();
    c.fillStyle = CONFIG.COLORS.text;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.font = 'bold ' + Math.floor(btn.h * 0.38) + 'px ' + CONFIG.FONT;
    c.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
  });
}

// ── 메인 루프 ───────────────────────────────────────────
let lastTime = 0;
let loadingDone = false;

function gameLoop(timestamp) {
  try {
    const dt = Math.min(timestamp - lastTime, 100); // 100ms 캡
    lastTime = timestamp;
    // tween 업데이트 (PAUSED 제외 — §5.3 매트릭스)
    if (gameState !== STATE.PAUSED) tw.update(dt);
    // 파티클/팝업 업데이트 (PAUSED, GAME_OVER 제외)
    if (gameState !== STATE.PAUSED && gameState !== STATE.GAME_OVER) {
      updateParticles(dt);
      updatePopups(dt);
    }
    // 힌트 타이머 (PLAYING 상태에서만)
    if (gameState === STATE.PLAYING && animPhase === '') {
      hintTimer += dt;
      if (hintTimer >= CONFIG.HINT_DELAY && !hintCells) {
        hintCells = findHint(grid, CONFIG.GRID_COLS, CONFIG.GRID_ROWS);
        hintPulse = 0;
      }
    }
    // 화면 쉐이크 감쇠
    if (shakeX > 0.5) shakeX *= 0.9; else shakeX = 0;
    if (shakeY > 0.5) shakeY *= 0.9; else shakeY = 0;
    // 자동 저장 타이머
    saveTimer += dt;
    if (saveTimer >= CONFIG.SAVE_INTERVAL) { saveTimer = 0; writeSave(); }
    // ── 렌더링 ──
    ctx.save();
    if (shakeX > 0 || shakeY > 0) {
      ctx.translate((Math.random()-0.5)*shakeX*2, (Math.random()-0.5)*shakeY*2);
    }
    switch (gameState) {
      case STATE.TITLE:
        renderTitle(ctx, dt);
        break;
      case STATE.LEVEL_SELECT:
        renderLevelSelect(ctx);
        break;
      case STATE.PLAYING:
      case STATE.ANIMATING:
        ctx.drawImage(bgCache, 0, 0);
        renderBoard(ctx);
        renderHUD(ctx);
        renderParticles(ctx);
        renderPopups(ctx);
        break;
      case STATE.LEVEL_CLEAR:
        renderLevelClear(ctx, dt);
        break;
      case STATE.GAME_OVER:
        renderGameOver(ctx);
        break;
      case STATE.PAUSED:
        ctx.drawImage(bgCache, 0, 0);
        renderBoard(ctx);
        renderHUD(ctx);
        renderPause(ctx);
        break;
    }
    ctx.restore();
  } catch (e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

// ── 로딩 화면 렌더 ─────────────────────────────────────
function renderLoading(progress) {
  ctx.fillStyle = CONFIG.COLORS.bg1;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = CONFIG.COLORS.accent;
  ctx.font = 'bold 24px ' + CONFIG.FONT;
  ctx.fillText('GEM MATCH BLITZ', W/2, H/2 - 30);
  // 로딩 바
  const barW = 200, barH = 6;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, W/2 - barW/2, H/2 + 10, barW, barH, 3);
  ctx.fill();
  ctx.fillStyle = CONFIG.COLORS.accent;
  roundRect(ctx, W/2 - barW/2, H/2 + 10, barW * progress, barH, 3);
  ctx.fill();
  ctx.fillStyle = CONFIG.COLORS.muted;
  ctx.font = '14px ' + CONFIG.FONT;
  ctx.fillText('로딩 중...', W/2, H/2 + 40);
}

// ── 초기화 ──────────────────────────────────────────────
async function init() {
  resize();
  renderLoading(0);
  await preloadAssets();
  renderLoading(1);
  loadSave();
  cacheBackground(W, H); // 에셋 로드 후 배경 재캐시
  loadingDone = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();
</script>
