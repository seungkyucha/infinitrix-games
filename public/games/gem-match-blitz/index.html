/* ============================================================
   TweenManager (§5.1)
   ============================================================ */
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; }
  // 새 tween 추가
  add(obj, props, dur, ease, onComplete) {
    const tw = { obj, targets:{}, elapsed:0, dur, ease:ease||'easeOutQuad', onComplete:onComplete||null, done:false };
    for (const k in props) { tw.targets[k] = { from: obj[k], to: props[k] }; }
    this._toAdd.push(tw);
    return tw;
  }
  // 즉시 모두 정리 (경쟁 조건 방지 — §12.5 clearImmediate)
  clearImmediate() { this._tweens.length = 0; this._toAdd.length = 0; }
  // 매 프레임 업데이트
  update(dt) {
    // 신규 tween 병합
    if (this._toAdd.length) { this._tweens.push(...this._toAdd); this._toAdd.length = 0; }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt;
      let t = Math.min(tw.elapsed / tw.dur, 1);
      const et = EASING[tw.ease](t);
      for (const k in tw.targets) {
        const { from, to } = tw.targets[k];
        tw.obj[k] = from + (to - from) * et;
      }
      if (t >= 1) {
        tw.done = true;
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  get active() { return this._tweens.length + this._toAdd.length; }
}

/* 이징 함수 */
const EASING = {
  linear: t => t,
  easeOutQuad: t => t * (2 - t),
  easeInBack: t => t * t * (2.70158 * t - 1.70158),
  easeOutBounce: t => {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+.75;
    if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+.9375;
    return 7.5625*(t-=2.625/2.75)*t+.984375;
  },
  easeOutExpo: t => t===1?1:1-Math.pow(2,-10*t),
  easeInOutCubic: t => t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1
};

/* ============================================================
   ObjectPool (§4.4 파티클/팝업)
   ============================================================ */
class ObjectPool {
  constructor(size, factory) {
    this.pool = [];
    for (let i = 0; i < size; i++) this.pool.push(factory());
  }
  // 비활성 객체 가져오기
  get() {
    for (const obj of this.pool) if (!obj.active) return obj;
    return null;
  }
  // 활성 객체 업데이트
  update(dt) {
    for (const obj of this.pool) {
      if (!obj.active) continue;
      obj.life -= dt;
      if (obj.life <= 0) { obj.active = false; continue; }
      obj.x += obj.vx * dt;
      obj.y += obj.vy * dt;
      obj.vy += (obj.gravity || 0) * dt;
      obj.alpha = Math.max(0, obj.life / obj.maxLife);
      obj.scale = obj.alpha;
    }
  }
  // 활성 객체 순회
  forEach(fn) { for (const obj of this.pool) if (obj.active) fn(obj); }
}

/* ============================================================
   SoundManager (§9 — Web Audio, setTimeout 0건)
   ============================================================ */
class SoundManager {
  constructor() { this.ctx = null; }
  // AudioContext 초기화
  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.warn('[Sound] AudioContext 생성 실패', e); }
  }
  // 모바일 resume
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }
  // 톤 재생
  play(freq, dur, type, freqEnd, delay) {
    if (muted || !this.ctx) return;
    const t0 = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, t0 + dur);
    gain.gain.setValueAtTime(0.15, t0);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }
  // 효과음 매핑 (§9.2)
  gemSelect() { this.play(880, 0.05, 'sine'); }
  gemSwap() { this.play(440, 0.1, 'sine', 660); }
  match3() { this.play(523, 0.08, 'sine', 784); }
  match4() { this.play(784, 0.12, 'sine', 1047); }
  match5() { this.play(523, 0.2, 'sine', 1047); }
  comboHit(n) { this.play(523 * Math.pow(1.1, n), 0.1, 'sine'); }
  lineBomb() {
    if (muted || !this.ctx) return;
    const t0 = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.2, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.max(0,1-i/d.length);
    const src = this.ctx.createBufferSource();
    const gain = this.ctx.createGain();
    src.buffer = buf; gain.gain.setValueAtTime(0.1, t0); gain.gain.linearRampToValueAtTime(0, t0+0.2);
    src.connect(gain).connect(this.ctx.destination); src.start(t0);
  }
  areaBomb() { this.play(110, 0.3, 'sine', 55); }
  colorBomb() { this.play(220, 0.4, 'sine', 1760); }
  swapFail() { this.play(220, 0.15, 'square'); }
  stageClear() {
    this.play(523, 0.12, 'sine', 523, 0);
    this.play(659, 0.12, 'sine', 659, 0.12);
    this.play(784, 0.12, 'sine', 784, 0.24);
    this.play(1047, 0.2, 'sine', 1047, 0.36);
  }
  gameOver() { this.play(440, 0.4, 'sine', 110); }
}

/* ============================================================
   TransitionGuard (§6.2 — beginTransition)
   ============================================================ */
function beginTransition(nextState, cb) {
  if (isTransitioning) return;
  isTransitioning = true;
  transitionAlpha = 0;
  // 페이드 아웃
  tweens.add({ v:0 }, { v:1 }, 0.25, 'easeInOutCubic', () => {
    transitionAlpha = 1;
    if (cb) cb();
    enterState(nextState);
    // 페이드 인
    tweens.add({ v:1 }, { v:0 }, 0.25, 'easeInOutCubic', () => {
      transitionAlpha = 0;
      isTransitioning = false;
    });
  });
}

// 상태 진입
function enterState(ns) {
  prevState = state;
  state = ns;
}

/* ============================================================
   순수 함수 (§10 — 전역 변수 직접 접근 금지)
   ============================================================ */

// 터치 안전 크기 보장
function touchSafe(size) { return Math.max(CONFIG.MIN_TOUCH_TARGET, size); }

// 그리드에서 가로/세로 3+매치 탐지
function findMatches(g) {
  const sz = CONFIG.GRID_SIZE;
  const matched = Array.from({length:sz}, ()=>Array(sz).fill(false));
  const matches = [];
  // 가로 검사
  for (let r=0;r<sz;r++) {
    let c=0;
    while(c<sz) {
      const t = g[r][c] ? g[r][c].type : -1;
      if (t<0) { c++; continue; }
      let end=c+1;
      while(end<sz && g[r][end] && g[r][end].type===t && g[r][end].special!==SPECIAL.COLOR_BOMB) end++;
      if (g[r][c].special===SPECIAL.COLOR_BOMB) { c++; continue; }
      if (end-c>=3) {
        const cells=[];
        for(let i=c;i<end;i++) { cells.push({r,c:i}); matched[r][i]=true; }
        matches.push({cells, type:'h', len:end-c, gemType:t});
      }
      c=end;
    }
  }
  // 세로 검사
  for (let c=0;c<sz;c++) {
    let r=0;
    while(r<sz) {
      const t = g[r][c] ? g[r][c].type : -1;
      if (t<0) { r++; continue; }
      let end=r+1;
      while(end<sz && g[end][c] && g[end][c].type===t && g[end][c].special!==SPECIAL.COLOR_BOMB) end++;
      if (g[r][c].special===SPECIAL.COLOR_BOMB) { r++; continue; }
      if (end-r>=3) {
        const cells=[];
        for(let i=r;i<end;i++) { cells.push({r:i,c}); matched[i][c]=true; }
        matches.push({cells, type:'v', len:end-r, gemType:t});
      }
      r=end;
    }
  }
  // L/T 매치 탐지 — 교차하는 매치 병합
  for (let i=0;i<matches.length;i++) {
    for (let j=i+1;j<matches.length;j++) {
      if (matches[i].gemType!==matches[j].gemType) continue;
      let shared=false;
      for (const a of matches[i].cells)
        for (const b of matches[j].cells)
          if (a.r===b.r&&a.c===b.c) { shared=true; break; }
      if (shared && matches[i].type!==matches[j].type) {
        // 병합
        const merged = new Set();
        for (const a of matches[i].cells) merged.add(a.r*sz+a.c);
        for (const b of matches[j].cells) merged.add(b.r*sz+b.c);
        const cells = [];
        merged.forEach(v => cells.push({r:Math.floor(v/sz),c:v%sz}));
        matches[i] = {cells, type:'LT', len:cells.length, gemType:matches[i].gemType};
        matches.splice(j,1); j--;
      }
    }
  }
  return matches;
}

// 교환 시 매치가 생기는지 확인
function canSwap(g, a, b) {
  if (!g[a.r]||!g[b.r]||!g[a.r][a.c]||!g[b.r][b.c]) return false;
  // 특수 보석 조합은 항상 허용
  if (g[a.r][a.c].special===SPECIAL.COLOR_BOMB || g[b.r][b.c].special===SPECIAL.COLOR_BOMB) return true;
  if (g[a.r][a.c].special && g[b.r][b.c].special) return true;
  // 임시 교환
  const tmp = g[a.r][a.c]; g[a.r][a.c] = g[b.r][b.c]; g[b.r][b.c] = tmp;
  const m = findMatches(g);
  g[b.r][b.c] = g[a.r][a.c]; g[a.r][a.c] = tmp;
  return m.length > 0;
}

// 빈 칸에 중력 적용 — 낙하 정보 반환
function applyGravityCalc(g) {
  const sz = CONFIG.GRID_SIZE;
  const falls = [];
  for (let c=0;c<sz;c++) {
    let empty = 0;
    for (let r=sz-1;r>=0;r--) {
      if (!g[r][c]) { empty++; }
      else if (empty>0) {
        falls.push({fromR:r,c,toR:r+empty});
        g[r+empty][c] = g[r][c];
        g[r][c] = null;
      }
    }
  }
  return falls;
}

// 빈 칸에 새 보석 채우기
function fillEmptyCells(g, gemCount) {
  const sz = CONFIG.GRID_SIZE;
  const newGems = [];
  for (let c=0;c<sz;c++) {
    let count = 0;
    for (let r=0;r<sz;r++) {
      if (!g[r][c]) {
        const type = Math.floor(Math.random()*gemCount);
        g[r][c] = createGemObj(type);
        newGems.push({r,c,type,fromRow:-(count+1)});
        count++;
      }
    }
  }
  return newGems;
}

// 점수 계산 (§7.1)
function calcScore(matches, combo) {
  let total = 0;
  const multi = Math.min(1 + (combo-1)*0.5, CONFIG.MAX_COMBO_MULTI);
  for (const m of matches) {
    let base = CONFIG.SCORE_3MATCH;
    if (m.type==='LT') base = CONFIG.SCORE_LMATCH;
    else if (m.len===4) base = CONFIG.SCORE_4MATCH;
    else if (m.len>=5) base = CONFIG.SCORE_5MATCH;
    total += Math.floor(base * multi);
  }
  return total;
}

// 스테이지 목표 달성 확인
function checkGoalPure(goal, progress) {
  if (!goal) return false;
  if (goal.type==='score') return progress.score >= goal.target;
  if (goal.type==='collect') return (progress.collected||0) >= goal.target;
  if (goal.type==='special') return (progress.specialCreated||0) >= goal.target;
  if (goal.type==='ice') return (progress.iceBroken||0) >= goal.target;
  if (goal.type==='composite') {
    return goal.sub.every(s => checkGoalPure(s, progress));
  }
  return false;
}

// 스타 등급 계산 (§7.4)
function getStarRating(movesRemain) {
  if (movesRemain >= CONFIG.STAR3_MOVES) return 3;
  if (movesRemain >= CONFIG.STAR2_MOVES) return 2;
  return 1;
}

// 특수 보석 결정 (§2.2)
function createSpecialType(matchType, matchLen) {
  if (matchType==='LT') return SPECIAL.AREA;
  if (matchLen>=5) return SPECIAL.COLOR_BOMB;
  if (matchLen===4) return SPECIAL.LINE_H; // 방향은 교환 방향에 따라 결정
  return SPECIAL.NONE;
}

// 유효한 이동 존재 여부 (교착 방지)
function hasValidMoves(g, gemCount) {
  const sz = CONFIG.GRID_SIZE;
  for (let r=0;r<sz;r++) {
    for (let c=0;c<sz;c++) {
      if (c+1<sz && canSwap(g,{r,c},{r,c:c+1})) return true;
      if (r+1<sz && canSwap(g,{r,c},{r:r+1,c})) return true;
    }
  }
  return false;
}

// 스테이지 설정 반환 (§7.3)
function getStageConfig(stageNum) {
  const stages = [
    {goal:{type:'score',target:1000},moves:25,gems:5},
    {goal:{type:'collect',target:15,gemType:0},moves:22,gems:5},
    {goal:{type:'score',target:2000},moves:22,gems:5},
    {goal:{type:'collect',target:18,gemType:1},moves:20,gems:5},
    {goal:{type:'special',target:2,specialType:'line'},moves:20,gems:5},
    {goal:{type:'composite',sub:[{type:'collect',target:12,gemType:2},{type:'score',target:1500}]},moves:22,gems:6},
    {goal:{type:'ice',target:8},moves:20,gems:5,ice:8},
    {goal:{type:'score',target:4000},moves:20,gems:6},
    {goal:{type:'special',target:2,specialType:'area'},moves:20,gems:6},
    {goal:{type:'composite',sub:[{type:'collect',target:20,gemType:0},{type:'ice',target:6}]},moves:22,gems:6,ice:6},
  ];
  if (stageNum <= 10) return stages[stageNum-1] || stages[0];
  // 스테이지 11-30 프로시저 생성
  const tier = stageNum <= 20 ? 'mid' : 'hard';
  const types = ['score','collect','ice','composite','special'];
  const t = types[(stageNum-1) % types.length];
  let cfg;
  if (tier==='mid') {
    const moves = 22 - Math.floor((stageNum-11)*0.4);
    if (t==='score') cfg = {goal:{type:'score',target:5000+(stageNum-11)*1000},moves,gems:6};
    else if (t==='collect') cfg = {goal:{type:'collect',target:25+Math.floor((stageNum-11)*1.5),gemType:(stageNum%6)},moves,gems:6};
    else if (t==='ice') cfg = {goal:{type:'ice',target:10+Math.floor((stageNum-11)*0.6)},moves,gems:6,ice:10+Math.floor((stageNum-11)*0.6)};
    else if (t==='special') cfg = {goal:{type:'special',target:2+Math.floor((stageNum-11)/3),specialType:stageNum%2===0?'line':'area'},moves,gems:6};
    else cfg = {goal:{type:'composite',sub:[{type:'score',target:3000+(stageNum-11)*500},{type:'collect',target:15+(stageNum-11),gemType:stageNum%6}]},moves,gems:6};
  } else {
    const moves = 20 - Math.floor((stageNum-21)*0.5);
    if (t==='score') cfg = {goal:{type:'score',target:15000+(stageNum-21)*1500},moves:Math.max(15,moves),gems:6};
    else if (t==='collect') cfg = {goal:{type:'collect',target:30+Math.floor((stageNum-21)*1),gemType:(stageNum%6)},moves:Math.max(15,moves),gems:6};
    else if (t==='ice') cfg = {goal:{type:'ice',target:16+Math.floor((stageNum-21)*0.8)},moves:Math.max(15,moves),gems:6,ice:16+Math.floor((stageNum-21)*0.8)};
    else if (t==='special') cfg = {goal:{type:'special',target:3+Math.floor((stageNum-21)/3),specialType:stageNum%2===0?'line':'area'},moves:Math.max(15,moves),gems:6};
    else cfg = {goal:{type:'composite',sub:[{type:'score',target:10000+(stageNum-21)*1000},{type:'ice',target:10+Math.floor((stageNum-21)*0.5)}]},moves:Math.max(15,moves),gems:6,ice:10+Math.floor((stageNum-21)*0.5)};
  }
  // 얼음 기본값
  if (!cfg.ice && stageNum>=7) cfg.ice = Math.min(24, Math.floor((stageNum-6)*0.8)+4);
  return cfg;
}

   유틸리티
   ============================================================ */
const tweens = new TweenManager();

// 보석 객체 생성
function createGemObj(type, special) {
  return { type, special:special||SPECIAL.NONE, animX:0, animY:0, animScale:1, animAlpha:1 };
}

// 단일 경로 점수 갱신 (§7.1 F21)
function addScore(pts) {
  score += pts;
  goalProgress.score = score;
}

// localStorage 래핑 (§12.4)
function loadSave() {
  try {
    const d = localStorage.getItem('gem-match-blitz-save');
    if (d) saveData = JSON.parse(d);
  } catch(e) { console.warn('[Save] load fail', e); }
}
function writeSave() {
  try {
    localStorage.setItem('gem-match-blitz-save', JSON.stringify(saveData));
  } catch(e) { console.warn('[Save] write fail', e); }
}
function loadMuted() {
  try { muted = localStorage.getItem('gem-match-blitz-muted')==='true'; } catch(e){}
}
function saveMuted() {
  try { localStorage.setItem('gem-match-blitz-muted', muted?'true':'false'); } catch(e){}
}

/* ============================================================
   그리드 초기화
   ============================================================ */
function initGrid(gemCount, iceCount) {
  const sz = CONFIG.GRID_SIZE;
  grid = Array.from({length:sz}, ()=>Array(sz).fill(null));
  iceTiles = Array.from({length:sz}, ()=>Array(sz).fill(0));
  // 보석 채우기 — 초기 매치 없이
  for (let r=0;r<sz;r++) {
    for (let c=0;c<sz;c++) {
      let type;
      do { type=Math.floor(Math.random()*gemCount); }
      while(hasInitMatch(r,c,type));
      grid[r][c] = createGemObj(type);
    }
  }
  // 얼음 배치
  if (iceCount && iceCount>0) {
    const positions = [];
    for (let r=1;r<sz-1;r++) for (let c=1;c<sz-1;c++) positions.push({r,c});
    shuffle(positions);
    const layers = currentStage >= 21 ? 3 : currentStage >= 11 ? 2 : 1;
    for (let i=0;i<Math.min(iceCount, positions.length);i++) {
      iceTiles[positions[i].r][positions[i].c] = layers;
    }
  }
}

// 초기 배치 시 매치 확인
function hasInitMatch(r,c,type) {
  if (c>=2 && grid[r][c-1] && grid[r][c-2] && grid[r][c-1].type===type && grid[r][c-2].type===type) return true;
  if (r>=2 && grid[r-1] && grid[r-2] && grid[r-1][c] && grid[r-2][c] && grid[r-1][c].type===type && grid[r-2][c].type===type) return true;
  return false;
}

// 배열 셔플
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
}

/* ============================================================
   게임 플로우
   ============================================================ */

// 스테이지 시작
function startStage(stageNum) {
  currentStage = stageNum;
  const cfg = getStageConfig(stageNum);
  stageGoal = cfg.goal;
  movesLeft = cfg.moves;
  score = 0;
  comboCount = 0;
  selectedGem = null;
  isResolving = false;
  isSwapping = false;
  goalProgress = { score:0, collected:0, specialCreated:0, iceBroken:0 };
  tweens.clearImmediate();
  initGrid(cfg.gems, cfg.ice||0);
  // 교착 확인
  if (!hasValidMoves(grid, cfg.gems)) {
    shuffleGridSafe(cfg.gems);
  }
}

// 안전한 셔플 (교착 해소)
function shuffleGridSafe(gemCount) {
  const sz = CONFIG.GRID_SIZE;
  for (let r=0;r<sz;r++) for (let c=0;c<sz;c++) {
    if (grid[r][c]) grid[r][c].type = Math.floor(Math.random()*gemCount);
  }
  // 매치 제거
  let m = findMatches(grid);
  let tries = 0;
  while (m.length>0 && tries<100) {
    for (const match of m) {
      const last = match.cells[match.cells.length-1];
      if (grid[last.r][last.c]) grid[last.r][last.c].type = Math.floor(Math.random()*gemCount);
    }
    m = findMatches(grid);
    tries++;
  }
}

/* ============================================================
   스와이프/교환 로직
   ============================================================ */

function trySwap(a, b) {
  if (isResolving || isSwapping || isTransitioning) return;
  if (!a || !b) return;
  if (Math.abs(a.r-b.r)+Math.abs(a.c-b.c)!==1) return;
  if (!grid[a.r][a.c] || !grid[b.r][b.c]) return;

  isSwapping = true;
  sound.gemSwap();

  const gemA = grid[a.r][a.c], gemB = grid[b.r][b.c];
  // 교환 애니메이션
  const dx = (b.c-a.c)*cellSize, dy = (b.r-a.r)*cellSize;
  gemA.animX = 0; gemA.animY = 0; gemB.animX = 0; gemB.animY = 0;

  tweens.add(gemA, {animX:dx, animY:dy}, CONFIG.SWAP_DURATION, 'easeOutQuad');
  tweens.add(gemB, {animX:-dx, animY:-dy}, CONFIG.SWAP_DURATION, 'easeOutQuad', () => {
    // 실제 교환
    gemA.animX=0; gemA.animY=0; gemB.animX=0; gemB.animY=0;
    grid[a.r][a.c] = gemB; grid[b.r][b.c] = gemA;

    // 특수 보석 조합 체크
    if (gemA.special===SPECIAL.COLOR_BOMB || gemB.special===SPECIAL.COLOR_BOMB) {
      isSwapping = false;
      handleSpecialSwap(a, b, gemA, gemB);
      return;
    }
    if (gemA.special && gemB.special) {
      isSwapping = false;
      handleSpecialCombo(a, b, gemA, gemB);
      return;
    }

    const matches = findMatches(grid);
    if (matches.length===0) {
      // 되돌림
      sound.swapFail();
      grid[b.r][b.c] = gemB; grid[a.r][a.c] = gemA;
      gemA.animX = dx; gemA.animY = dy; gemB.animX = -dx; gemB.animY = -dy;
      tweens.add(gemA, {animX:0, animY:0}, 0.25, 'easeOutBounce');
      tweens.add(gemB, {animX:0, animY:0}, 0.25, 'easeOutBounce', () => {
        isSwapping = false;
      });
    } else {
      isSwapping = false;
      movesLeft--;
      comboCount = 0;
      startResolve(matches, b); // b는 교환 방향 (4매치 줄 폭탄 방향 결정)
    }
  });
}

// 특수 보석 스와이프 핸들러
function handleSpecialSwap(a, b, gemA, gemB) {
  const colorBomb = gemA.special===SPECIAL.COLOR_BOMB ? a : b;
  const other = colorBomb===a ? b : a;
  const otherGem = grid[other.r][other.c];
  const targetType = otherGem.type;

  movesLeft--;
  comboCount = 0;

  // 색상 폭탄 + 색상 폭탄 = 전체 제거
  if (gemA.special===SPECIAL.COLOR_BOMB && gemB.special===SPECIAL.COLOR_BOMB) {
    const toRemove = [];
    for (let r=0;r<CONFIG.GRID_SIZE;r++) for (let c=0;c<CONFIG.GRID_SIZE;c++) {
      if (grid[r][c]) toRemove.push({r,c});
    }
    addScore(CONFIG.SCORE_ULTIMATE);
    sound.colorBomb();
    removeAndResolve(toRemove);
    return;
  }

  // 색상 폭탄 + 특수 보석 — 해당 색 모두 해당 특수로 변환
  if (otherGem.special) {
    const toRemove = [];
    for (let r=0;r<CONFIG.GRID_SIZE;r++) for (let c=0;c<CONFIG.GRID_SIZE;c++) {
      if (grid[r][c] && grid[r][c].type===targetType) {
        grid[r][c].special = otherGem.special;
        toRemove.push({r,c});
      }
    }
    toRemove.push(colorBomb);
    addScore(CONFIG.SCORE_COMBO_SPECIAL * toRemove.length);
    sound.colorBomb();
    removeAndResolve(toRemove);
    return;
  }

  // 색상 폭탄 + 일반 보석 — 해당 색 모두 제거
  const toRemove = [{r:colorBomb.r,c:colorBomb.c}];
  for (let r=0;r<CONFIG.GRID_SIZE;r++) for (let c=0;c<CONFIG.GRID_SIZE;c++) {
    if (grid[r][c] && grid[r][c].type===targetType) toRemove.push({r,c});
  }
  addScore(CONFIG.SCORE_COMBO_SPECIAL);
  sound.colorBomb();
  removeAndResolve(toRemove);
}

// 특수 보석끼리 조합
function handleSpecialCombo(a, b, gemA, gemB) {
  movesLeft--;
  comboCount = 0;
  const toRemove = new Set();
  const sA = gemA.special, sB = gemB.special;

  // 줄+줄 = 십자
  if ((sA===SPECIAL.LINE_H||sA===SPECIAL.LINE_V)&&(sB===SPECIAL.LINE_H||sB===SPECIAL.LINE_V)) {
    for (let i=0;i<CONFIG.GRID_SIZE;i++) { toRemove.add(a.r*CONFIG.GRID_SIZE+i); toRemove.add(i*CONFIG.GRID_SIZE+a.c); }
    sound.lineBomb();
  }
  // 줄+범위 = 3줄+3열
  else if (((sA===SPECIAL.LINE_H||sA===SPECIAL.LINE_V)&&sB===SPECIAL.AREA)||((sB===SPECIAL.LINE_H||sB===SPECIAL.LINE_V)&&sA===SPECIAL.AREA)) {
    const cr=a.r, cc=a.c;
    for (let dr=-1;dr<=1;dr++) for (let i=0;i<CONFIG.GRID_SIZE;i++) {
      if (cr+dr>=0&&cr+dr<CONFIG.GRID_SIZE) toRemove.add((cr+dr)*CONFIG.GRID_SIZE+i);
      if (cc+dr>=0&&cc+dr<CONFIG.GRID_SIZE) toRemove.add(i*CONFIG.GRID_SIZE+cc+dr);
    }
    sound.areaBomb();
  }
  // 범위+범위 = 5x5
  else if (sA===SPECIAL.AREA&&sB===SPECIAL.AREA) {
    for (let dr=-2;dr<=2;dr++) for (let dc=-2;dc<=2;dc++) {
      const nr=a.r+dr, nc=a.c+dc;
      if (nr>=0&&nr<CONFIG.GRID_SIZE&&nc>=0&&nc<CONFIG.GRID_SIZE) toRemove.add(nr*CONFIG.GRID_SIZE+nc);
    }
    sound.areaBomb();
  }

  const cells = [];
  toRemove.forEach(v => cells.push({r:Math.floor(v/CONFIG.GRID_SIZE),c:v%CONFIG.GRID_SIZE}));
  addScore(CONFIG.SCORE_COMBO_SPECIAL);
  removeAndResolve(cells);
}

// 제거 후 연쇄 처리 시작
function removeAndResolve(cells) {
  isResolving = true;
  enterState('RESOLVING');
  comboCount = 1;
  removeGems(cells, () => {
    cascadeStep();
  });
}

// 연쇄 처리 루프 시작 (매치 발견 후)
function startResolve(matches, swapDir) {
  isResolving = true;
  enterState('RESOLVING');
  comboCount = 1;

  // 점수 계산 및 추가
  const pts = calcScore(matches, comboCount);
  addScore(pts);
  sound.match3();

  // 특수 보석 생성
  for (const m of matches) {
    const spType = createSpecialType(m.type, m.len);
    if (spType!==SPECIAL.NONE) {
      // 생성 위치: 매치 중앙 또는 스와이프 위치
      const mid = m.cells[Math.floor(m.cells.length/2)];
      // 4매치 줄 방향
      let finalType = spType;
      if (spType===SPECIAL.LINE_H && m.type==='v') finalType = SPECIAL.LINE_V;
      if (spType===SPECIAL.LINE_H && m.type==='h') finalType = SPECIAL.LINE_H;
      // 매치 셀에서 해당 위치 제외
      m.cells = m.cells.filter(c => !(c.r===mid.r && c.c===mid.c));
      grid[mid.r][mid.c] = createGemObj(m.gemType, finalType);
      goalProgress.specialCreated = (goalProgress.specialCreated||0) + 1;
      if (spType===SPECIAL.COLOR_BOMB) sound.match5();
      else if (spType===SPECIAL.AREA) sound.match4();
      else sound.match4();
    }
    // 수집 목표 갱신
    if (stageGoal) {
      for (const cell of m.cells) {
        if (grid[cell.r] && grid[cell.r][cell.c]) {
          const gt = grid[cell.r][cell.c].type;
          if (stageGoal.type==='collect' && gt===stageGoal.gemType) goalProgress.collected = (goalProgress.collected||0)+1;
          if (stageGoal.type==='composite' && stageGoal.sub) {
            for (const s of stageGoal.sub) {
              if (s.type==='collect' && gt===s.gemType) goalProgress.collected = (goalProgress.collected||0)+1;
            }
          }
        }
      }
    }
  }

  // 특수 보석 폭발 처리 — 매치에 포함된 특수 보석 효과 적용
  const extraCells = [];
  for (const m of matches) {
    for (const cell of m.cells) {
      if (grid[cell.r]&&grid[cell.r][cell.c]&&grid[cell.r][cell.c].special) {
        const sp = grid[cell.r][cell.c].special;
        if (sp===SPECIAL.LINE_H) {
          for (let i=0;i<CONFIG.GRID_SIZE;i++) extraCells.push({r:cell.r,c:i});
          sound.lineBomb();
        } else if (sp===SPECIAL.LINE_V) {
          for (let i=0;i<CONFIG.GRID_SIZE;i++) extraCells.push({r:i,c:cell.c});
          sound.lineBomb();
        } else if (sp===SPECIAL.AREA) {
          for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
            const nr=cell.r+dr,nc=cell.c+dc;
            if (nr>=0&&nr<CONFIG.GRID_SIZE&&nc>=0&&nc<CONFIG.GRID_SIZE) extraCells.push({r:nr,c:nc});
          }
          sound.areaBomb();
        }
      }
    }
  }

  // 모든 제거할 셀 수집
  const allCells = new Set();
  for (const m of matches) for (const c of m.cells) allCells.add(c.r*CONFIG.GRID_SIZE+c.c);
  for (const c of extraCells) allCells.add(c.r*CONFIG.GRID_SIZE+c.c);

  const toRemove = [];
  allCells.forEach(v => toRemove.push({r:Math.floor(v/CONFIG.GRID_SIZE),c:v%CONFIG.GRID_SIZE}));

  // 점수 팝업
  spawnPopup(gridX + 4*cellSize, gridY + 4*cellSize, '+' + pts, '#FFD700');

  removeGems(toRemove, () => cascadeStep());
}

// 보석 제거 애니메이션
function removeGems(cells, cb) {
  let count = 0;
  const total = cells.length;
  if (total===0) { cb(); return; }

  for (const cell of cells) {
    if (!grid[cell.r]||!grid[cell.r][cell.c]) { count++; if(count>=total)cb(); continue; }
    const gem = grid[cell.r][cell.c];
    // 얼음 처리
    if (iceTiles[cell.r][cell.c] > 0) {
      iceTiles[cell.r][cell.c]--;
      goalProgress.iceBroken = (goalProgress.iceBroken||0)+1;
    }
    // 파티클 방사
    spawnParticles(gridX + cell.c*cellSize + cellSize/2, gridY + cell.r*cellSize + cellSize/2, GEM_DEFS[gem.type%6].color, 6);

    tweens.add(gem, {animScale:0, animAlpha:0}, CONFIG.REMOVE_DURATION, 'easeInBack', () => {
      grid[cell.r][cell.c] = null;
      count++;
      if (count >= total) cb();
    });
  }
}

// 연쇄 낙하 → 재매칭
function cascadeStep() {
  const cfg = getStageConfig(currentStage);
  const falls = applyGravityCalc(grid);

  // 낙하 애니메이션
  for (const f of falls) {
    const gem = grid[f.toR][f.c];
    if (!gem) continue;
    gem.animY = -(f.toR - f.fromR)*cellSize;
    tweens.add(gem, {animY:0}, CONFIG.FALL_DURATION * (f.toR-f.fromR), 'easeOutBounce');
  }

  // 새 보석 채우기
  const newGems = fillEmptyCells(grid, cfg.gems);
  for (const ng of newGems) {
    const gem = grid[ng.r][ng.c];
    if (!gem) continue;
    gem.animY = ng.fromRow * cellSize;
    tweens.add(gem, {animY:0}, CONFIG.FALL_DURATION * Math.abs(ng.fromRow), 'easeOutBounce');
  }

  // 낙하 완료 후 재매칭 체크 (최대 낙하 시간 기준)
  const maxFallDist = Math.max(1, ...falls.map(f=>f.toR-f.fromR), ...newGems.map(n=>Math.abs(n.fromRow)));
  const fallTime = CONFIG.FALL_DURATION * maxFallDist + 0.05;

  tweens.add({v:0},{v:1}, fallTime, 'linear', () => {
    const newMatches = findMatches(grid);
    if (newMatches.length > 0) {
      comboCount++;
      sound.comboHit(comboCount);
      const pts = calcScore(newMatches, comboCount);
      addScore(pts);
      spawnPopup(gridX+4*cellSize, gridY+4*cellSize, 'x'+comboCount+' +'+pts, '#00D2FF');

      // 특수 보석 생성
      for (const m of newMatches) {
        const spType = createSpecialType(m.type, m.len);
        if (spType!==SPECIAL.NONE) {
          const mid = m.cells[Math.floor(m.cells.length/2)];
          let finalType = spType;
          if (spType===SPECIAL.LINE_H && m.type==='v') finalType = SPECIAL.LINE_V;
          m.cells = m.cells.filter(c=>!(c.r===mid.r&&c.c===mid.c));
          grid[mid.r][mid.c] = createGemObj(m.gemType, finalType);
          goalProgress.specialCreated = (goalProgress.specialCreated||0)+1;
        }
        // 수집 목표
        for (const cell of m.cells) {
          if (grid[cell.r]&&grid[cell.r][cell.c]) {
            const gt=grid[cell.r][cell.c].type;
            if (stageGoal&&stageGoal.type==='collect'&&gt===stageGoal.gemType) goalProgress.collected=(goalProgress.collected||0)+1;
            if (stageGoal&&stageGoal.type==='composite'&&stageGoal.sub) {
              for(const s of stageGoal.sub) if(s.type==='collect'&&gt===s.gemType) goalProgress.collected=(goalProgress.collected||0)+1;
            }
          }
        }
      }

      // 특수 보석 효과
      const extraCells = [];
      for (const m of newMatches) for (const cell of m.cells) {
        if (grid[cell.r]&&grid[cell.r][cell.c]&&grid[cell.r][cell.c].special) {
          const sp=grid[cell.r][cell.c].special;
          if(sp===SPECIAL.LINE_H) for(let i=0;i<CONFIG.GRID_SIZE;i++) extraCells.push({r:cell.r,c:i});
          else if(sp===SPECIAL.LINE_V) for(let i=0;i<CONFIG.GRID_SIZE;i++) extraCells.push({r:i,c:cell.c});
          else if(sp===SPECIAL.AREA) for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
            const nr=cell.r+dr,nc=cell.c+dc;
            if(nr>=0&&nr<CONFIG.GRID_SIZE&&nc>=0&&nc<CONFIG.GRID_SIZE) extraCells.push({r:nr,c:nc});
          }
        }
      }
      const allC=new Set();
      for(const m of newMatches) for(const c of m.cells) allC.add(c.r*CONFIG.GRID_SIZE+c.c);
      for(const c of extraCells) allC.add(c.r*CONFIG.GRID_SIZE+c.c);
      const toRem=[];
      allC.forEach(v=>toRem.push({r:Math.floor(v/CONFIG.GRID_SIZE),c:v%CONFIG.GRID_SIZE}));

      removeGems(toRem, () => cascadeStep());
    } else {
      // 연쇄 종료
      isResolving = false;
      comboCount = 0;
      // 판정 먼저, 저장 나중에 (Cycle 2 교훈)
      if (checkGoalPure(stageGoal, goalProgress)) {
        onStageClear();
      } else if (movesLeft <= 0) {
        onGameOver();
      } else if (!hasValidMoves(grid, cfg.gems)) {
        shuffleGridSafe(cfg.gems);
      }
      if (state==='RESOLVING') enterState('PLAYING');
    }
  });
}

// 스테이지 클리어
function onStageClear() {
  clearStars = getStarRating(movesLeft);
  clearBonusScore = movesLeft * CONFIG.BONUS_PER_MOVE;
  addScore(clearBonusScore);
  // 저장
  const prev = saveData.stars[currentStage] || 0;
  if (clearStars > prev) saveData.stars[currentStage] = clearStars;
  const prevScore = saveData.highScores[currentStage] || 0;
  if (score > prevScore) saveData.highScores[currentStage] = score;
  if (currentStage >= saveData.unlockedStage && currentStage < CONFIG.TOTAL_STAGES) {
    saveData.unlockedStage = currentStage + 1;
  }
  writeSave();
  sound.stageClear();
  clearTimer = 0;
  // 컨페티
  for (let i=0;i<40;i++) {
    spawnParticles(Math.random()*W, Math.random()*H*0.3, '#FFD700', 1);
  }
  enterState('STAGE_CLEAR');
}

// 게임오버
function onGameOver() {
  sound.gameOver();
  shakeTimer = 0.5;
  shakeIntensity = 8;
  enterState('GAMEOVER');
}

/* ============================================================
   파티클/팝업 스폰
   ============================================================ */
function spawnParticles(x, y, color, count) {
  for (let i=0;i<count;i++) {
    const p = particles.get();
    if (!p) break;
    p.active = true;
    p.x = x; p.y = y;
    const angle = Math.random()*Math.PI*2;
    const spd = 80 + Math.random()*120;
    p.vx = Math.cos(angle)*spd;
    p.vy = Math.sin(angle)*spd;
    p.gravity = 200;
    p.life = p.maxLife = 0.6 + Math.random()*0.4;
    p.alpha = 1;
    p.scale = 1;
    p.color = color;
    p.size = 3 + Math.random()*4;
  }
}

function spawnPopup(x, y, text, color) {
  const p = popups.get();
  if (!p) return;
  p.active = true;
  p.x = x; p.y = y;
  p.vx = 0; p.vy = -60;
  p.gravity = 0;
  p.life = p.maxLife = 0.8;
  p.alpha = 1; p.scale = 1;
  p.text = text; p.color = color;
}

/* ============================================================
   렌더링
   ============================================================ */

function render(st, dt) {
  ctx.save();

  // 셰이크 효과
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    const sx = (Math.random()-0.5)*2*shakeIntensity*Math.min(1,shakeTimer/0.3);
    const sy = (Math.random()-0.5)*2*shakeIntensity*Math.min(1,shakeTimer/0.3);
    ctx.translate(sx, sy);
  }

  // 배경 그라디언트
  drawBackground();

  switch(st) {
    case 'TITLE': drawTitle(dt); break;
    case 'STAGE_SELECT': drawStageSelect(); break;
    case 'PLAYING':
    case 'RESOLVING':
      drawGrid(); drawHUD(); drawParticlesAndPopups(); break;
    case 'STAGE_CLEAR':
      drawGrid(); drawHUD(); drawParticlesAndPopups(); drawStageClear(dt); break;
    case 'GAMEOVER':
      drawGrid(); drawHUD(); drawParticlesAndPopups(); drawGameOver(); break;
    case 'PAUSED':
      drawGrid(); drawHUD(); drawPaused(); break;
  }

  // 전환 오버레이
  if (isTransitioning || transitionAlpha > 0) {
    ctx.fillStyle = 'rgba(10,10,26,' + transitionAlpha + ')';
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

// 배경 (기하학적 퍼즐 패턴)
function drawBackground() {
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#1A1A2E');
  grd.addColorStop(1,'#16213E');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // 기하학 패턴 오버레이
  ctx.strokeStyle = 'rgba(0,212,255,0.03)';
  ctx.lineWidth = 1;
  const spacing = 40;
  for (let x = (titleTime*10)%spacing - spacing; x < W+spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = (titleTime*8)%spacing - spacing; y < H+spacing; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

// 타이틀 화면
function drawTitle(dt) {
  titleTime += dt;
  const cx = W/2, cy = H*0.35;

  // 배경 다이아몬드 파티클
  ctx.save();
  for (let i=0;i<12;i++) {
    const t = titleTime*0.5 + i*0.52;
    const px = cx + Math.sin(t*1.3+i)*W*0.3;
    const py = cy + Math.cos(t*0.9+i*2)*H*0.2;
    const sz = 8 + Math.sin(t*2)*4;
    const a = 0.15 + Math.sin(t*1.5)*0.1;
    ctx.fillStyle = GEM_DEFS[i%6].color;
    ctx.globalAlpha = a;
    drawDiamond(ctx, px, py, sz);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // 제목 — 시안 글로우
  const titleText = 'GEM MATCH';
  const subText = 'BLITZ';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 글로우
  ctx.shadowColor = '#00D2FF';
  ctx.shadowBlur = 20 + Math.sin(titleTime*3)*10;
  ctx.font = 'bold ' + Math.floor(W*0.09) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(titleText, cx, cy);

  ctx.shadowBlur = 15 + Math.sin(titleTime*3+1)*8;
  ctx.shadowColor = '#E94560';
  ctx.font = 'bold ' + Math.floor(W*0.12) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText(subText, cx, cy + W*0.1);
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  // 스캔라인 효과
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);

  // 안내 텍스트 (깜빡임)
  if (Math.sin(titleTime*4)>-0.3) {
    ctx.font = Math.floor(W*0.04)+'px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#00D2FF';
    ctx.fillText('TAP TO START', cx, H*0.7);
  }

  // 버전
  ctx.font = Math.floor(W*0.025)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#505070';
  ctx.fillText('v1.0 — InfiniTriX', cx, H*0.92);
}

// 스테이지 선택 화면
function drawStageSelect() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 타이틀
  ctx.font = 'bold '+Math.floor(W*0.06)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00D2FF';
  ctx.shadowColor = '#00D2FF'; ctx.shadowBlur = 10;
  ctx.fillText('STAGE SELECT', W/2, 40);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

  // 스테이지 그리드 (5열×6행)
  const cols = 5, rows = 6;
  const pad = 12;
  const btnW = touchSafe(Math.floor((W - pad*(cols+1)) / cols));
  const btnH = touchSafe(btnW * 0.8);
  const startY = 80 - stageScrollY;

  for (let i=0;i<CONFIG.TOTAL_STAGES;i++) {
    const col = i % cols, row = Math.floor(i/cols);
    const x = pad + col*(btnW+pad);
    const y = startY + row*(btnH+pad);
    if (y+btnH<0 || y>H) continue;

    const sn = i+1;
    const unlocked = sn <= saveData.unlockedStage;
    const stars = saveData.stars[sn] || 0;

    // 버튼 배경
    ctx.fillStyle = unlocked ? (sn===currentStage?'#E94560':'#0F3460') : '#0a0a1a';
    ctx.strokeStyle = unlocked ? '#00D2FF' : '#1e1e30';
    ctx.lineWidth = 1.5;
    roundRect(ctx, x, y, btnW, btnH, 6);
    ctx.fill(); ctx.stroke();

    // 숫자
    ctx.font = 'bold '+Math.floor(btnW*0.35)+'px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = unlocked ? '#e0e0f0' : '#505070';
    ctx.fillText(sn+'', x+btnW/2, y+btnH*0.4);

    // 별
    if (stars>0) {
      const starSize = Math.floor(btnW*0.12);
      for (let s=0;s<3;s++) {
        ctx.fillStyle = s<stars ? '#FFD700' : '#1e1e30';
        ctx.font = starSize+'px "Segoe UI"';
        ctx.fillText('★', x+btnW/2+(s-1)*(starSize+2), y+btnH*0.75);
      }
    }

    // 잠금 아이콘
    if (!unlocked) {
      ctx.font = Math.floor(btnW*0.25)+'px "Segoe UI"';
      ctx.fillStyle = '#505070';
      ctx.fillText('🔒', x+btnW/2, y+btnH*0.75);
    }
  }

  // 뒤로가기 버튼
  const backW = touchSafe(80), backH = touchSafe(36);
  ctx.fillStyle = '#0F3460';
  ctx.strokeStyle = '#E94560';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 10, H-backH-10, backW, backH, 4);
  ctx.fill(); ctx.stroke();
  ctx.font = 'bold '+Math.floor(backH*0.45)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText('◀ BACK', 10+backW/2, H-backH/2-10);
}

// 그리드 렌더링
function drawGrid() {
  const sz = CONFIG.GRID_SIZE;

  // 그리드 배경
  ctx.fillStyle = 'rgba(15,52,96,0.4)';
  roundRect(ctx, gridX-6, gridY-6, sz*cellSize+12, sz*cellSize+12, 8);
  ctx.fill();

  // 셀
  for (let r=0;r<sz;r++) {
    for (let c=0;c<sz;c++) {
      const x = gridX + c*cellSize;
      const y = gridY + r*cellSize;

      // 셀 배경
      ctx.fillStyle = (r+c)%2===0 ? 'rgba(15,52,96,0.3)' : 'rgba(15,52,96,0.15)';
      ctx.fillRect(x, y, cellSize, cellSize);

      // 셀 테두리
      ctx.strokeStyle = 'rgba(233,69,96,0.15)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cellSize, cellSize);

      // 얼음 타일
      if (iceTiles[r][c] > 0) {
        const iceAlpha = 0.15 + iceTiles[r][c]*0.12;
        ctx.fillStyle = 'rgba(100,180,255,'+iceAlpha+')';
        ctx.fillRect(x+1, y+1, cellSize-2, cellSize-2);
        // 빗금
        ctx.strokeStyle = 'rgba(200,230,255,'+(0.2+iceTiles[r][c]*0.1)+')';
        ctx.lineWidth = 1;
        for (let d=-cellSize;d<cellSize;d+=8) {
          ctx.beginPath();
          ctx.moveTo(x+Math.max(0,d), y+Math.max(0,-d));
          ctx.lineTo(x+Math.min(cellSize,d+cellSize), y+Math.min(cellSize,-d+cellSize));
          ctx.stroke();
        }
        if (iceTiles[r][c]>=2) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(x+2, y+2, cellSize-4, cellSize-4);
        }
      }

      // 보석
      const gem = grid[r][c];
      if (!gem) continue;

      ctx.save();
      const gx = x + cellSize/2 + (gem.animX||0);
      const gy = y + cellSize/2 + (gem.animY||0);
      const sc = gem.animScale||1;
      const al = gem.animAlpha!==undefined ? gem.animAlpha : 1;
      ctx.globalAlpha = al;
      ctx.translate(gx, gy);
      ctx.scale(sc, sc);

      const gemSize = cellSize*0.38;
      const def = GEM_DEFS[gem.type % 6];

      // 특수 보석 글로우
      if (gem.special) {
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 8 + Math.sin(titleTime*4)*4;
      }

      // 보석 도형
      ctx.fillStyle = def.color;
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;

      switch(def.shape) {
        case 'diamond': drawDiamond(ctx,0,0,gemSize); break;
        case 'circle':
          ctx.beginPath(); ctx.arc(0,0,gemSize,0,Math.PI*2); break;
        case 'triangle': drawTriangle(ctx,0,0,gemSize); break;
        case 'square':
          ctx.beginPath(); ctx.rect(-gemSize*0.8,-gemSize*0.8,gemSize*1.6,gemSize*1.6); break;
        case 'star': drawStar(ctx,0,0,gemSize,gemSize*0.5,5); break;
        case 'hexagon': drawHexagon(ctx,0,0,gemSize); break;
      }
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

      // 글자 오버레이
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = 'bold '+Math.floor(gemSize*0.7)+'px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(def.letter, 0, 1);

      // 특수 보석 마커
      if (gem.special===SPECIAL.LINE_H) {
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-gemSize*0.6,0); ctx.lineTo(gemSize*0.6,0); ctx.stroke();
        ctx.fillStyle='#FFF';ctx.font='bold '+Math.floor(gemSize*0.5)+'px sans-serif';
        ctx.fillText('↔',0,0);
      } else if (gem.special===SPECIAL.LINE_V) {
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0,-gemSize*0.6); ctx.lineTo(0,gemSize*0.6); ctx.stroke();
        ctx.fillStyle='#FFF';ctx.font='bold '+Math.floor(gemSize*0.5)+'px sans-serif';
        ctx.fillText('↕',0,0);
      } else if (gem.special===SPECIAL.AREA) {
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-gemSize*0.5,0); ctx.lineTo(gemSize*0.5,0);
        ctx.moveTo(0,-gemSize*0.5); ctx.lineTo(0,gemSize*0.5); ctx.stroke();
      } else if (gem.special===SPECIAL.COLOR_BOMB) {
        // 무지개 원
        const rainbow = ['#FF4757','#FFA502','#ECCC68','#2ED573','#3742FA','#A55EEA'];
        for (let i=0;i<6;i++) {
          ctx.beginPath();
          ctx.arc(0,0,gemSize*0.5, i*Math.PI/3, (i+1)*Math.PI/3);
          ctx.lineTo(0,0); ctx.closePath();
          ctx.fillStyle = rainbow[i]; ctx.fill();
        }
      }

      ctx.restore();

      // 선택 하이라이트
      if (selectedGem && selectedGem.r===r && selectedGem.c===c) {
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FFF'; ctx.shadowBlur = 10;
        ctx.strokeRect(x+2, y+2, cellSize-4, cellSize-4);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
      }

      // 키보드 커서
      if (state==='PLAYING' && cursorR===r && cursorC===c) {
        ctx.strokeStyle = 'rgba(0,212,255,0.6)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4,4]);
        ctx.strokeRect(x+1, y+1, cellSize-2, cellSize-2);
        ctx.setLineDash([]);
      }
    }
  }
}

// HUD 렌더링
function drawHUD() {
  const hudH = 38;
  ctx.fillStyle = 'rgba(10,10,26,0.8)';
  ctx.fillRect(0,0,W,hudH);

  ctx.textBaseline = 'middle';
  const fy = hudH/2;

  // 일시정지 버튼
  const btnSz = touchSafe(38);
  ctx.fillStyle = '#0F3460';
  ctx.strokeStyle = '#00D2FF';
  ctx.lineWidth = 1;
  roundRect(ctx, 6, (hudH-btnSz)/2, btnSz, btnSz, 4);
  ctx.fill(); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = Math.floor(btnSz*0.5)+'px "Segoe UI"';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText('⏸', 6+btnSz/2, fy);

  // 음소거 버튼
  const muteX = W - btnSz - 6;
  ctx.fillStyle = '#0F3460';
  ctx.strokeStyle = '#00D2FF';
  roundRect(ctx, muteX, (hudH-btnSz)/2, btnSz, btnSz, 4);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText(muted?'🔇':'🔊', muteX+btnSz/2, fy);

  // 스테이지 번호
  ctx.textAlign = 'left';
  ctx.font = 'bold '+Math.floor(W*0.035)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText('Stage '+currentStage, btnSz+16, fy);

  // 점수
  ctx.textAlign = 'right';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold '+Math.floor(W*0.035)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(score.toLocaleString(), muteX-10, fy);

  // 이동 횟수
  const movesY = hudH + 4;
  ctx.textAlign = 'center';
  ctx.font = 'bold '+Math.floor(W*0.032)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00D2FF';
  ctx.fillText('Moves: '+movesLeft, W/2, movesY+10);

  // 목표 표시
  const goalY = movesY + 24;
  drawGoalBar(goalY);
}

// 목표 바 그리기
function drawGoalBar(y) {
  if (!stageGoal) return;
  ctx.textAlign = 'center';
  ctx.font = Math.floor(W*0.028)+'px "Segoe UI", system-ui, sans-serif';

  const goalText = getGoalText(stageGoal);
  ctx.fillStyle = 'rgba(10,10,26,0.6)';
  roundRect(ctx, W*0.1, y, W*0.8, 22, 4);
  ctx.fill();

  ctx.fillStyle = '#e0e0f0';
  ctx.fillText(goalText, W/2, y+12);
}

// 목표 텍스트 생성
function getGoalText(goal) {
  if (goal.type==='score') return '🎯 Score '+goalProgress.score+'/'+goal.target;
  if (goal.type==='collect') {
    const def = GEM_DEFS[goal.gemType%6];
    return '🎯 '+def.name+' '+(goalProgress.collected||0)+'/'+goal.target;
  }
  if (goal.type==='special') return '🎯 Special '+(goalProgress.specialCreated||0)+'/'+goal.target;
  if (goal.type==='ice') return '🎯 Ice '+(goalProgress.iceBroken||0)+'/'+goal.target;
  if (goal.type==='composite') {
    return goal.sub.map(s=>getGoalText(s)).join(' | ');
  }
  return '';
}

// 파티클과 팝업 렌더링
function drawParticlesAndPopups() {
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.scale, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  popups.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold '+Math.floor(W*0.04*p.scale)+'px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  });
  ctx.globalAlpha = 1;
}

// 스테이지 클리어 화면
function drawStageClear(dt) {
  clearTimer += dt;
  ctx.fillStyle = 'rgba(10,10,26,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const cy = H*0.35;

  // 타이틀
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
  ctx.font = 'bold '+Math.floor(W*0.08)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('STAGE CLEAR!', W/2, cy);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

  // 별
  const starSize = Math.floor(W*0.08);
  for (let i=0;i<3;i++) {
    const delay = i*0.2;
    const appear = Math.min(1, Math.max(0, (clearTimer-0.3-delay)/0.3));
    ctx.globalAlpha = appear;
    ctx.font = Math.floor(starSize*(0.8+appear*0.2))+'px "Segoe UI"';
    ctx.fillStyle = i<clearStars ? '#FFD700' : '#505070';
    ctx.fillText('★', W/2+(i-1)*(starSize+8), cy+starSize*1.5);
  }
  ctx.globalAlpha = 1;

  // 점수
  ctx.font = Math.floor(W*0.04)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText('Score: '+score.toLocaleString(), W/2, cy+starSize*2.8);
  ctx.fillStyle = '#00D2FF';
  ctx.fillText('Bonus: +'+clearBonusScore, W/2, cy+starSize*3.5);

  // 버튼들
  if (clearTimer > 1) {
    const btnW = touchSafe(W*0.35), btnH = touchSafe(40);
    const gap = 20;
    // 다음 스테이지
    if (currentStage < CONFIG.TOTAL_STAGES) {
      ctx.fillStyle = '#E94560'; ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
      roundRect(ctx, W/2-btnW-gap/2, H*0.72, btnW, btnH, 6);
      ctx.fill(); ctx.stroke();
      ctx.font = 'bold '+Math.floor(btnH*0.4)+'px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#FFF';
      ctx.fillText('NEXT ▶', W/2-gap/2-btnW/2, H*0.72+btnH/2);
    }
    // 스테이지 선택
    ctx.fillStyle = '#0F3460'; ctx.strokeStyle = '#00D2FF'; ctx.lineWidth = 2;
    const selectX = currentStage<CONFIG.TOTAL_STAGES ? W/2+gap/2 : W/2-btnW/2;
    roundRect(ctx, selectX, H*0.72, btnW, btnH, 6);
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold '+Math.floor(btnH*0.4)+'px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#e0e0f0';
    ctx.fillText('SELECT', selectX+btnW/2, H*0.72+btnH/2);
  }
}

// 게임오버 화면
function drawGameOver() {
  ctx.fillStyle = 'rgba(10,10,26,0.75)';
  ctx.fillRect(0,0,W,H);

// 일시정지 화면
function drawPaused() {
  ctx.fillStyle = 'rgba(10,10,26,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.shadowColor = '#00D2FF'; ctx.shadowBlur = 12;
  ctx.font = 'bold '+Math.floor(W*0.07)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00D2FF';
  ctx.fillText('PAUSED', W/2, H*0.35);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

  const btnW = touchSafe(W*0.4), btnH = touchSafe(44);

  // Resume
  ctx.fillStyle = '#E94560'; ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  roundRect(ctx, W/2-btnW/2, H*0.48, btnW, btnH, 6);
  ctx.fill(); ctx.stroke();
  ctx.font = 'bold '+Math.floor(btnH*0.4)+'px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FFF';
  ctx.fillText('RESUME', W/2, H*0.48+btnH/2);

  // Title
  ctx.fillStyle = '#0F3460'; ctx.strokeStyle = '#00D2FF'; ctx.lineWidth = 2;
  roundRect(ctx, W/2-btnW/2, H*0.58, btnW, btnH, 6);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#e0e0f0';
  ctx.fillText('TITLE', W/2, H*0.58+btnH/2);
}

/* ============================================================
   도형 헬퍼
   ============================================================ */
function drawDiamond(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y-s); ctx.lineTo(x+s*0.7, y);
  ctx.lineTo(x, y+s); ctx.lineTo(x-s*0.7, y); ctx.closePath();
}

function drawTriangle(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y-s); ctx.lineTo(x+s*0.866, y+s*0.5);
  ctx.lineTo(x-s*0.866, y+s*0.5); ctx.closePath();
}

function drawStar(ctx, x, y, outer, inner, pts) {
  ctx.beginPath();
  for (let i=0;i<pts*2;i++) {
    const a = -Math.PI/2 + i*Math.PI/pts;
    const r = i%2===0 ? outer : inner;
    if (i===0) ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    else ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawHexagon(ctx, x, y, s) {
  ctx.beginPath();
  for (let i=0;i<6;i++) {
    const a = -Math.PI/2 + i*Math.PI/3;
    if (i===0) ctx.moveTo(x+Math.cos(a)*s, y+Math.sin(a)*s);
    else ctx.lineTo(x+Math.cos(a)*s, y+Math.sin(a)*s);
  }
  ctx.closePath();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ============================================================
   입력 처리 — init() 내부에서만 등록 (F3)
   ============================================================ */

function getGridCell(px, py) {
  const c = Math.floor((px - gridX) / cellSize);
  const r = Math.floor((py - gridY) / cellSize);
  if (r>=0&&r<CONFIG.GRID_SIZE&&c>=0&&c<CONFIG.GRID_SIZE) return {r,c};
  return null;
}

function handlePointerDown(px, py) {
  // 사운드 resume
  if (!audioResumed) { sound.resume(); audioResumed = true; }

  if (isTransitioning) return;

  if (state==='TITLE') {
    beginTransition('STAGE_SELECT');
    return;
  }

  if (state==='STAGE_SELECT') {
    handleStageSelectClick(px, py);
    return;
  }

  if (state==='PAUSED') {
    handlePausedClick(px, py);
    return;
  }

  if (state==='STAGE_CLEAR') {
    handleStageClearClick(px, py);
    return;
  }

  if (state==='GAMEOVER') {
    handleGameOverClick(px, py);
    return;
  }

  if (state!=='PLAYING' || isResolving || isSwapping) return;

  // HUD 버튼 체크
  const hudH = 38;
  const btnSz = touchSafe(38);
  if (py < hudH) {
    if (px < btnSz+12) { enterState('PAUSED'); prevState = 'PLAYING'; return; }
    if (px > W-btnSz-12) { muted = !muted; saveMuted(); return; }
    return;
  }

  // 그리드 터치
  const cell = getGridCell(px, py);
  if (!cell) return;

  isDragging = true;
  touchStartX = px; touchStartY = py;
  touchStartR = cell.r; touchStartC = cell.c;

  if (selectedGem) {
    // 두 번째 클릭 — 인접 보석 교환
    if (Math.abs(selectedGem.r-cell.r)+Math.abs(selectedGem.c-cell.c)===1) {
      trySwap(selectedGem, cell);
      selectedGem = null;
    } else {
      sound.gemSelect();
      selectedGem = cell;
    }
  } else {
    sound.gemSelect();
    selectedGem = cell;
  }
}

function handlePointerMove(px, py) {
  if (!isDragging || state!=='PLAYING' || isResolving || isSwapping) return;
  const dx = px - touchStartX, dy = py - touchStartY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist >= CONFIG.SWIPE_THRESHOLD) {
    isDragging = false;
    // 방향 결정
    let dr=0, dc=0;
    if (Math.abs(dx)>Math.abs(dy)) dc = dx>0?1:-1;
    else dr = dy>0?1:-1;
    const from = {r:touchStartR, c:touchStartC};
    const to = {r:touchStartR+dr, c:touchStartC+dc};
    if (to.r>=0&&to.r<CONFIG.GRID_SIZE&&to.c>=0&&to.c<CONFIG.GRID_SIZE) {
      selectedGem = null;
      trySwap(from, to);
    }
  }
}

function handlePointerUp() { isDragging = false; }

function handleStageSelectClick(px, py) {
  const cols = 5, pad = 12;
  const btnW = touchSafe(Math.floor((W - pad*(cols+1)) / cols));
  const btnH = touchSafe(btnW * 0.8);
  const startY = 80 - stageScrollY;

  // 뒤로가기
  const backW = touchSafe(80), backH = touchSafe(36);
  if (px>=10&&px<=10+backW&&py>=H-backH-10&&py<=H-10) {
    beginTransition('TITLE');
    return;
  }

  for (let i=0;i<CONFIG.TOTAL_STAGES;i++) {
    const col = i%cols, row = Math.floor(i/cols);
    const x = pad + col*(btnW+pad);
    const y = startY + row*(btnH+pad);
    const sn = i+1;
    if (px>=x&&px<=x+btnW&&py>=y&&py<=y+btnH) {
      if (sn <= saveData.unlockedStage) {
        beginTransition('PLAYING', () => startStage(sn));
      }
      return;
    }
  }
}

function handlePausedClick(px, py) {
  const btnW = touchSafe(W*0.4), btnH = touchSafe(44);
  // Resume
  if (px>=W/2-btnW/2&&px<=W/2+btnW/2&&py>=H*0.48&&py<=H*0.48+btnH) {
    enterState('PLAYING');
    return;
  }
  // Title
  if (px>=W/2-btnW/2&&px<=W/2+btnW/2&&py>=H*0.58&&py<=H*0.58+btnH) {
    beginTransition('TITLE');
    return;
  }
}

function handleStageClearClick(px, py) {
  if (clearTimer < 1) return;
  const btnW = touchSafe(W*0.35), btnH = touchSafe(40);
  const gap = 20;

  // Next
  if (currentStage < CONFIG.TOTAL_STAGES) {
    if (px>=W/2-btnW-gap/2&&px<=W/2-gap/2&&py>=H*0.72&&py<=H*0.72+btnH) {
      beginTransition('PLAYING', () => startStage(currentStage+1));
      return;
    }
  }
  // Select
  const selectX = currentStage<CONFIG.TOTAL_STAGES ? W/2+gap/2 : W/2-btnW/2;
  if (px>=selectX&&px<=selectX+btnW&&py>=H*0.72&&py<=H*0.72+btnH) {
    beginTransition('STAGE_SELECT');
    return;
  }
}

function handleGameOverClick(px, py) {
  const btnW = touchSafe(W*0.35), btnH = touchSafe(40);
  const gap = 20;

  // Retry
  if (px>=W/2-btnW-gap/2&&px<=W/2-gap/2&&py>=H*0.6&&py<=H*0.6+btnH) {
    beginTransition('PLAYING', () => startStage(currentStage));
    return;
  }
  // Select
  if (px>=W/2+gap/2&&px<=W/2+gap/2+btnW&&py>=H*0.6&&py<=H*0.6+btnH) {
    beginTransition('STAGE_SELECT');
    return;
  }
}

/* ============================================================
   캔버스 리사이즈
   ============================================================ */
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 레이아웃 계산
  cellSize = Math.floor(Math.min(W*0.85, H*0.55) / CONFIG.GRID_SIZE);
  cellSize = Math.max(touchSafe(40), Math.min(70, cellSize));
  gridX = Math.floor((W - cellSize*CONFIG.GRID_SIZE) / 2);
  gridY = Math.floor(H*0.18);
}

/* ============================================================
   게임 루프 (§5.1 — try-catch, F13)
   ============================================================ */
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, CONFIG.DT_CAP);
    lastTime = timestamp;

    titleTime += dt * 0.5; // 전역 시간

    // 상태별 시스템 업데이트 (§6.2 매트릭스)
    if (state !== 'PAUSED') {
      tweens.update(dt);
    }
    if (state !== 'PAUSED' && state !== 'STAGE_SELECT') {
      particles.update(dt);
    }
    if (state !== 'PAUSED' && state !== 'STAGE_SELECT' && state !== 'TITLE') {
      popups.update(dt);
    }

    render(state, dt);
  } catch (e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

/* ============================================================
   init() — DOMContentLoaded 후 실행 (§5.2)
   ============================================================ */
function init() {
  // 6a. canvas 할당
  canvas = document.getElementById('gc');
  // 6b. 2d context
  ctx = canvas.getContext('2d');

  // 6c. 리사이즈
  resizeCanvas();

  // ObjectPool 생성
  particles = new ObjectPool(CONFIG.PARTICLE_POOL_SIZE, () => ({
    active:false, x:0, y:0, vx:0, vy:0, gravity:0,
    life:0, maxLife:1, alpha:1, scale:1, color:'#FFF', size:3
  }));
  popups = new ObjectPool(CONFIG.POPUP_POOL_SIZE, () => ({
    active:false, x:0, y:0, vx:0, vy:0, gravity:0,
    life:0, maxLife:1, alpha:1, scale:1, text:'', color:'#FFF'
  }));

  // SoundManager
  sound.init();
  loadMuted();

  // 저장 데이터 로드
  loadSave();

  // 6d. 이벤트 리스너 등록 — init() 내부에서만 (F3)
  window.addEventListener('resize', resizeCanvas);

  // 키보드
  window.addEventListener('keydown', e => {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
    if (isTransitioning) return;

    if (state==='TITLE') {
      if (e.code==='Space'||e.code==='Enter') {
        e.preventDefault();
        beginTransition('STAGE_SELECT');
      }
      return;
    }

    if (state==='PLAYING' && !isResolving && !isSwapping) {
      if (e.code==='ArrowLeft') { cursorC = Math.max(0, cursorC-1); e.preventDefault(); }
      else if (e.code==='ArrowRight') { cursorC = Math.min(CONFIG.GRID_SIZE-1, cursorC+1); e.preventDefault(); }
      else if (e.code==='ArrowUp') { cursorR = Math.max(0, cursorR-1); e.preventDefault(); }
      else if (e.code==='ArrowDown') { cursorR = Math.min(CONFIG.GRID_SIZE-1, cursorR+1); e.preventDefault(); }
      else if (e.code==='Space'||e.code==='Enter') {
        e.preventDefault();
        const cell = {r:cursorR, c:cursorC};
        if (selectedGem) {
          if (Math.abs(selectedGem.r-cell.r)+Math.abs(selectedGem.c-cell.c)===1) {
            trySwap(selectedGem, cell);
            selectedGem = null;
          } else {
            selectedGem = cell;
          }
        } else {
          sound.gemSelect();
          selectedGem = cell;
        }
      }
    }

    if (e.code==='KeyP'||e.code==='Escape') {
      e.preventDefault();
      if (state==='PLAYING') { prevState='PLAYING'; enterState('PAUSED'); }
      else if (state==='PAUSED') { enterState(prevState==='PLAYING'?'PLAYING':'TITLE'); }
    }

    if (e.code==='KeyR' && state==='PAUSED') {
      e.preventDefault();
      beginTransition('PLAYING', () => startStage(currentStage));
    }
  });

  // 마우스
  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    handlePointerDown(e.clientX - rect.left, e.clientY - rect.top);
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    handlePointerMove(e.clientX - rect.left, e.clientY - rect.top);
  });
  canvas.addEventListener('mouseup', handlePointerUp);

  // 터치 (F1, F4 — passive:false, touch-action:none)
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    handlePointerDown(t.clientX - rect.left, t.clientY - rect.top);
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    handlePointerMove(t.clientX - rect.left, t.clientY - rect.top);
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    handlePointerUp();
  }, {passive:false});

  // 6f. 초기 상태
  enterState('TITLE');

  // 6g. 게임 루프 시작
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// DOMContentLoaded → init()
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
