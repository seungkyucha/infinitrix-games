<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.8"/>
      <stop offset="20%" style="stop-color:#ff8800;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#ffff00;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#00ff44;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#0088ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8800ff;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="85" cy="55" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="150" cy="20" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="250" cy="40" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="320" cy="18" r="0.9" fill="#ffffff" opacity="0.4"/>
  <circle cx="370" cy="60" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="60" cy="90" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="340" cy="95" r="1" fill="#ffffff" opacity="0.4"/>

  <!-- Incoming white light beam -->
  <line x1="0" y1="150" x2="175" y2="150" stroke="#ffffff" stroke-width="4" opacity="0.9" filter="url(#glow)"/>
  <line x1="0" y1="150" x2="175" y2="150" stroke="#ffffff" stroke-width="2" opacity="1"/>

  <!-- Central Prism (triangle) -->
  <polygon points="200,95 170,185 230,185" fill="none" stroke="#88ccff" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <polygon points="200,95 170,185 230,185" fill="#0a0a2e" fill-opacity="0.3"/>
  <polygon points="200,100 173,182 227,182" fill="none" stroke="#aaddff" stroke-width="0.8" opacity="0.5"/>

  <!-- Refracted light beams (rainbow spectrum) -->
  <line x1="225" y1="155" x2="390" y2="80" stroke="#ff0044" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="225" y1="158" x2="395" y2="105" stroke="#ff6600" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="226" y1="162" x2="398" y2="135" stroke="#ffcc00" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="226" y1="166" x2="398" y2="165" stroke="#00dd44" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="225" y1="170" x2="395" y2="195" stroke="#0088ff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="224" y1="174" x2="390" y2="225" stroke="#6622ff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>

  <!-- Shadow enemies (dark silhouettes being hit by light) -->
  <g opacity="0.7">
    <!-- Shadow enemy 1 - dissolving -->
    <circle cx="340" cy="105" r="14" fill="#1a0033" stroke="#330055" stroke-width="1.5"/>
    <circle cx="335" cy="101" r="2.5" fill="#660088" opacity="0.8"/>
    <circle cx="345" cy="101" r="2.5" fill="#660088" opacity="0.8"/>
    <path d="M333,110 Q340,115 347,110" stroke="#660088" stroke-width="1.5" fill="none"/>
    <!-- Dissolve particles -->
    <circle cx="355" cy="98" r="2" fill="#ff6600" opacity="0.5"/>
    <circle cx="352" cy="112" r="1.5" fill="#ffcc00" opacity="0.4"/>
    <circle cx="328" cy="95" r="1.8" fill="#ff6600" opacity="0.3"/>
  </g>

  <g opacity="0.5">
    <!-- Shadow enemy 2 - fading -->
    <circle cx="360" cy="195" r="12" fill="#1a0033" stroke="#330055" stroke-width="1"/>
    <circle cx="356" cy="192" r="2" fill="#660088" opacity="0.6"/>
    <circle cx="364" cy="192" r="2" fill="#660088" opacity="0.6"/>
    <!-- Dissolve particles -->
    <circle cx="372" cy="188" r="2.5" fill="#0088ff" opacity="0.5"/>
    <circle cx="348" cy="200" r="1.8" fill="#6622ff" opacity="0.4"/>
  </g>

  <!-- Small crystal decorations -->
  <polygon points="80,220 75,235 85,235" fill="none" stroke="#88eeff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="310,250 305,262 315,262" fill="none" stroke="#aaddff" stroke-width="1.2" opacity="0.4"/>
  <polygon points="130,260 126,270 134,270" fill="none" stroke="#88ccff" stroke-width="1" opacity="0.3"/>

  <!-- Title text -->
  <text x="200" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#rainbow)" filter="url(#softGlow)">PRISM BREAK</text>
  <text x="200" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#88aacc" opacity="0.8">프리즘 브레이크</text>
</svg>