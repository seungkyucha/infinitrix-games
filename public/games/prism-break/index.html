// §20. BACKGROUND PARTICLES
// ───────────────────────────────────────────────────────────────

/** Initialize background particles for visual flair */
function initBgParticles(count) {
  G.bgParticles = [];
  const localRng = new SeededRNG(G.seed + 777);
  for (let i = 0; i < count; i++) {
    G.bgParticles.push({
      x: localRng.next() * engine.W,
      y: localRng.next() * engine.H,
      size: localRng.nextFloat(1, 3),
      speed: localRng.nextFloat(5, 20),
      alpha: localRng.nextFloat(0.1, 0.5),
      color: [COL.CRYSTAL, COL.LIGHT, COL.CYAN, COL.COIN][localRng.nextInt(0, 3)],
      phase: localRng.next() * Math.PI * 2
    });
  }
}

/** Update background particles */
function updateBgParticles(dt, w, h) {
  const dtSec = dt / 1000;
  for (const p of G.bgParticles) {
    p.y -= p.speed * dtSec;
    p.x += Math.sin(p.phase + p.y * 0.01) * dtSec * 10;
    p.phase += dtSec;
    if (p.y < -10) { p.y = h + 10; p.x = rng.next() * w; }
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
  }
}

// ───────────────────────────────────────────────────────────────
// §21. MAIN UPDATE LOOP
// ───────────────────────────────────────────────────────────────

function update(dt, timestamp) {
  // Global systems — always update (F7: 상태×시스템 매트릭스)
  tween.update(dt);
  particles.update(dt);
  SND.scheduleBGM();

  // Shake decay
  if (G.shakeIntensity > 0) G.shakeIntensity *= 0.9;
  if (G.shakeIntensity < 0.1) G.shakeIntensity = 0;

  // Update floating texts
  updateFloatingTexts(dt);

  // Update notifications
  updateNotifications(dt);

  // Update background particles
  updateBgParticles(dt, engine.W, engine.H);

  // State-specific updates
  switch (G.state) {
    case STATE.TITLE:
      updateTitle(dt);
      break;
    case STATE.MAP:
      updateMap(dt);
      break;
    case STATE.PLAY:
      updatePlay(dt);
      break;
    case STATE.BOSS:
      updateBossState(dt);
      break;
  }

  input.flush(); // ⚠️ 필수: 프레임 끝에 flush
}

/** Update title state */
function updateTitle(dt) {
  G.titleTime += dt / 1000;

  if (input.confirm()) {
    SND.init();
    SND.sfx('select');
    beginTransition(STATE.TITLE, STATE.MAP, () => {
      loadProgress();
      SND.startBGM('map');
    });
  }
}

/** Update map state */
function updateMap(dt) {
  handleMapInput();
}

/** Update play state */
function updatePlay(dt) {
  const dtSec = dt / 1000;

  handlePlayInput(dt);

  if (G.playState === PS.PAUSED || G.playState === PS.DEAD || G.playState === PS.CLEAR) {
    return;
  }

  G.stageTimer += dtSec;

  // R3: Update moving walls (Zone 2)
  if (G.movingWalls.length > 0) {
    let wallMoved = false;
    for (const mw of G.movingWalls) {
      mw.timer += dtSec;
      if (mw.timer >= mw.interval) {
        mw.timer = 0;
        // Check target position is still empty (no crystal placed there)
        if (G.grid[mw.x2][mw.y2] === CELL.EMPTY) {
          G.grid[mw.x][mw.y] = CELL.EMPTY;
          G.grid[mw.x2][mw.y2] = CELL.WALL;
          // Swap positions
          const tmpX = mw.x, tmpY = mw.y;
          mw.x = mw.x2; mw.y = mw.y2;
          mw.x2 = tmpX; mw.y2 = tmpY;
          wallMoved = true;
        }
      }
    }
    if (wallMoved) recalcLight();
  }

  // Recalculate light paths continuously
  recalcLight();

  if (G.playState === PS.WAVE) {
    // Spawn enemies
    G.spawnTimer += dtSec;
    if (G.spawnTimer >= G.spawnInterval && G.waveEnemiesSpawned < G.waveEnemiesToSpawn) {
      G.spawnTimer = 0;
      const typeIdx = G._spawnQueue[G.waveEnemiesSpawned];
      const spawnIdx = G.waveEnemiesSpawned % G.spawnPoints.length;
      const sp = G.spawnPoints[spawnIdx];
      const spPx = gridToPixel(sp.x, sp.y, G.gridOffsetX, G.gridOffsetY, G.cellSize);
      G.enemies.push(createEnemy(typeIdx, spPx.px, spPx.py, G.gridOffsetX, G.gridOffsetY, G.cellSize));
      G.waveEnemiesSpawned++;
    }

    // Update enemies
    const srcPx = gridToPixel(G.lightSource.x, G.lightSource.y, G.gridOffsetX, G.gridOffsetY, G.cellSize);
    updateEnemies(G.enemies, dt, srcPx.px, srcPx.py, G.gridOffsetX, G.gridOffsetY, G.cellSize);

    // Check enemy hits by light (F8: judge first)
    const hitResult = checkShadowHit(G.lightPaths, G.enemies, G.gridOffsetX, G.gridOffsetY, G.cellSize);

    // Process kills
    for (const killed of hitResult.kills) {
      const coinDrop = stageDifficulty(absStageNum(G.zone, G.stage)).coinDrop;
      G.coins += coinDrop;
      G.comboCount++;
      G.comboTimer = 1.5;
      G.score += 100 * G.comboCount;

      addFloatingText(`+${100 * G.comboCount}`, killed.x, killed.y - 15, COL.COIN);
      particles.emit(killed.x, killed.y, 12, { color: COL.SHADOW, speed: 80, life: 0.6 });

      if (G.comboCount >= 3) {
        SND.sfx('combo');
        addFloatingText(`COMBO ×${G.comboCount}!`, killed.x, killed.y - 35, COL.CYAN, 22);
      } else {
        SND.sfx('hit');
      }
    }

    // Combo timer
    if (G.comboTimer > 0) {
      G.comboTimer -= dtSec;
      if (G.comboTimer <= 0) G.comboCount = 0;
    }

    // Check blast crystals
    checkBlastCrystals(dt);

    // Check enemy reaching source
    if (checkEnemyReachSource(G.enemies, srcPx.px, srcPx.py, G.cellSize * 0.8)) {
      G.energy--;
      G.shakeIntensity = 8;
      SND.sfx('damage');
      addFloatingText(`-1 ${t('energy')}`, srcPx.px, srcPx.py - 20, COL.RED, 20);

      if (G.energy <= 0) {
        stageFail();
        return;
      }
    }

    // Check wave completion
    checkWaveComplete();
  }
}

/** Update boss state */
function updateBossState(dt) {
  const dtSec = dt / 1000;

  // Boss intro
  if (G.playState === PS.BOSS_INTRO) {
    G.introTimer -= dtSec;
    if (G.introTimer <= 0) {
      G.playState = PS.SETUP;
      addNotification(t('boss_warning'), 2);
    }
    return;
  }

  handlePlayInput(dt);

  if (G.playState === PS.PAUSED) return;

  G.stageTimer += dtSec;
  recalcLight();

  // Boss AI + enemies
  updateBoss(dt, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  const srcPx = gridToPixel(G.lightSource.x, G.lightSource.y, G.gridOffsetX, G.gridOffsetY, G.cellSize);
  updateEnemies(G.enemies, dt, srcPx.px, srcPx.py, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Enemy hits
  const hitResult = checkShadowHit(G.lightPaths, G.enemies, G.gridOffsetX, G.gridOffsetY, G.cellSize);
  for (const killed of hitResult.kills) {
    G.score += 100;
    particles.emit(killed.x, killed.y, 10, { color: COL.SHADOW, speed: 80, life: 0.5 });
    SND.sfx('hit');
  }

  // Enemy reaching source
  if (checkEnemyReachSource(G.enemies, srcPx.px, srcPx.py, G.cellSize * 0.8)) {
    G.energy--;
    G.shakeIntensity = 8;
    SND.sfx('damage');

    if (G.energy <= 0) {
      stageFail();
    }
  }

  // Camera zoom for boss
  G.targetZoom = 0.85;
  G.cameraZoom = lerp(G.cameraZoom, G.targetZoom, dtSec * 2);
}

/** Update floating texts */
function updateFloatingTexts(dt) {
  const dtSec = dt / 1000;
  for (let i = G.floatingTexts.length - 1; i >= 0; i--) {
    const ft = G.floatingTexts[i];
    ft.y += ft.vy * dtSec;
    ft.life -= dtSec;
    ft.alpha = Math.max(0, ft.life / 1.2);
    if (ft.life <= 0) G.floatingTexts.splice(i, 1);
  }
}

/** Update notifications */
function updateNotifications(dt) {
  const dtSec = dt / 1000;
  for (let i = G.notifications.length - 1; i >= 0; i--) {
    const n = G.notifications[i];
    n.life -= dtSec;
    n.alpha = Math.min(1, n.life);
    if (n.life <= 0) G.notifications.splice(i, 1);
  }
}

// ───────────────────────────────────────────────────────────────
// §22. RENDER FUNCTIONS — All pure (F9)
// ───────────────────────────────────────────────────────────────

function render(ctx, w, h, dt) {
  const shake = UI.shake(G.shakeIntensity);
  ctx.save();
  ctx.translate(shake.x, shake.y);

  // Background
  ctx.fillStyle = COL.BG;
  ctx.fillRect(-10, -10, w + 20, h + 20);

  // Background particles
  renderBgParticles(ctx, w, h);

  // State-specific render
  switch (G.state) {
    case STATE.TITLE: renderTitle(ctx, w, h); break;
    case STATE.MAP:   renderMap(ctx, w, h); break;
    case STATE.PLAY:  renderPlay(ctx, w, h); break;
    case STATE.BOSS:  renderBossState(ctx, w, h); break;
  }

  // Floating texts
  renderFloatingTexts(ctx);

  // Notifications
  renderNotifications(ctx, w, h);

  // Particles (engine)
  particles.render(ctx);

  // Fade overlay
  if (G.fadeAlpha > 0.01 || G.transitioning) {
    const alpha = G.transitioning ? G.fadeAlpha : 0;
    UI.fade(ctx, w, h, alpha);
  }

  ctx.restore();
}

/** Render background particles */
function renderBgParticles(ctx, w, h) {
  for (const p of G.bgParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ───────────────────────────────────────────────────────────────
// §23. TITLE SCREEN RENDER
// ───────────────────────────────────────────────────────────────

function renderTitle(ctx, w, h) {
  // Animated background gradient
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#0a0e2a');
  grad.addColorStop(0.5, '#0f1338');
  grad.addColorStop(1, '#0a0e2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Prism light effect
  const centerX = w / 2;
  const centerY = h * 0.35;
  const time = G.titleTime;

  // Draw prism
  ctx.save();
  ctx.translate(centerX, centerY);

  // Rainbow beams from prism
  const beamColors = ['#ff4466', '#ff8844', '#ffcc44', '#44ff88', '#44aaff', '#8844ff'];
  for (let i = 0; i < beamColors.length; i++) {
    const angle = -0.5 + i * 0.2 + Math.sin(time * 0.5 + i) * 0.05;
    ctx.strokeStyle = beamColors[i];
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.6 + Math.sin(time * 2 + i) * 0.3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(angle) * 300, Math.sin(angle) * 300);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Prism triangle
  ctx.fillStyle = COL.CRYSTAL + '88';
  ctx.strokeStyle = COL.CRYSTAL;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -35);
  ctx.lineTo(30, 20);
  ctx.lineTo(-30, 20);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Input beam
  ctx.strokeStyle = COL.LIGHT;
  ctx.lineWidth = 4;
  ctx.shadowColor = COL.LIGHT;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.moveTo(-300, 0);
  ctx.lineTo(-30, 0);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();

  // Title text
  const titleY = h * 0.58;
  ctx.save();
  ctx.shadowColor = COL.CRYSTAL;
  ctx.shadowBlur = 20;
  UI.text(ctx, t('title'), centerX, titleY, { size: Math.min(48, w / 10), bold: true, color: COL.TEXT, glow: COL.CRYSTAL });
  ctx.restore();

  // Subtitle
  UI.text(ctx, t('subtitle'), centerX, titleY + 40, { size: Math.min(16, w / 28), color: COL.TEXT2 });

  // Start prompt — pulsing
  const pulse = 0.5 + Math.sin(time * 3) * 0.5;
  ctx.globalAlpha = pulse;
  UI.text(ctx, input.isMobile ? t('tapToStart') : `[SPACE] ${t('start')}`, centerX, h * 0.78, { size: 18, color: COL.CYAN });
  ctx.globalAlpha = 1;

  // High score
  const hi = Save.getHighScore(GAME_ID);
  if (hi > 0) {
    UI.text(ctx, `${t('highScore')}: ${hi}`, centerX, h * 0.88, { size: 14, color: COL.COIN });
  }

  // Version
  UI.text(ctx, 'Cycle #39 v1.0', w - 60, h - 15, { size: 10, color: COL.TEXT3, align: 'right' });

  // Scanlines
  UI.scanlines(ctx, w, h, 0.02);
}

// ───────────────────────────────────────────────────────────────
// §24. MAP SCREEN RENDER
// ───────────────────────────────────────────────────────────────

function renderMap(ctx, w, h) {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0a0e2a');
  grad.addColorStop(1, '#0f1338');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Header
  UI.text(ctx, t('title'), w / 2, 25, { size: 20, bold: true, color: COL.TEXT, glow: COL.CRYSTAL });

  // Coins display
  UI.text(ctx, `🔮 ${G.coins}`, 80, 22, { size: 14, color: COL.COIN, align: 'left' });

  // Total score
  UI.text(ctx, `⭐ ${G.totalScore}`, 10, 22, { size: 14, color: COL.TEXT2, align: 'left' });

  // Language toggle
  UI.button(ctx, t('lang'), w - 70, 8, 60, 28, { color: COL.TEXT3 });

  // Shop button
  UI.button(ctx, t('shop'), w - 140, 8, 60, 28, { color: COL.COIN });

  // Draw zones and stages
  const startY = 70;
  const nodeSize = Math.max(MIN_TOUCH_SIZE, 44);
  const spacing = Math.min(110, (w - 80) / 4);

  for (let z = 1; z <= TOTAL_ZONES; z++) {
    const zoneY = startY + (z - 1) * 120;
    const zoneName = t('zone_names')[z - 1];

    // Zone label
    UI.text(ctx, `${z}. ${zoneName}`, w / 2, zoneY, { size: 16, bold: true, color: COL.TEXT });

    // Draw connecting line
    ctx.strokeStyle = COL.GRID_LINE;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, zoneY + 30);
    ctx.lineTo(50 + (STAGES_PER_ZONE + 0.5) * spacing, zoneY + 30);
    ctx.stroke();

    // Stage nodes
    for (let s = 1; s <= STAGES_PER_ZONE; s++) {
      const nodeX = 50 + (s - 1) * spacing;
      const nodeY = zoneY + 30;
      const stageKey = `${z}-${s}`;
      const cleared = G.stageCleared[stageKey];
      const accessible = isStageAccessible(z, s);
      const stars = G.stageStars[stageKey] || 0;

      // Node circle
      ctx.beginPath();
      ctx.arc(nodeX, nodeY, nodeSize / 2 - 4, 0, Math.PI * 2);
      if (cleared) {
        ctx.fillStyle = COL.PURIFY + '44';
        ctx.strokeStyle = COL.PURIFY;
      } else if (accessible) {
        ctx.fillStyle = COL.CRYSTAL + '44';
        ctx.strokeStyle = COL.CRYSTAL;
      } else {
        ctx.fillStyle = COL.WALL + '44';
        ctx.strokeStyle = COL.TEXT3;
      }
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();

      // Stage number
      UI.text(ctx, `${s}`, nodeX, nodeY - 3, {
        size: 16, bold: true,
        color: accessible ? COL.TEXT : COL.TEXT3
      });

      // Stars
      if (stars > 0) {
        const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
        UI.text(ctx, starStr, nodeX, nodeY + 16, { size: 9, color: COL.COIN });
      }
    }

    // Boss node
    const bossX = 50 + STAGES_PER_ZONE * spacing;
    const bossY = zoneY + 30;
    const bossKey = `${z}-boss`;
    const bossCleared = G.stageCleared[bossKey];
    const allStagesCleared = [1, 2, 3].every(s => G.stageCleared[`${z}-${s}`]);

    ctx.beginPath();
    ctx.arc(bossX, bossY, nodeSize / 2 - 2, 0, Math.PI * 2);
    if (bossCleared) {
      ctx.fillStyle = COL.COIN + '44';
      ctx.strokeStyle = COL.COIN;
    } else if (allStagesCleared) {
      ctx.fillStyle = COL.RED + '44';
      ctx.strokeStyle = COL.RED;
    } else {
      ctx.fillStyle = COL.WALL + '44';
      ctx.strokeStyle = COL.TEXT3;
    }
    ctx.lineWidth = 3;
    ctx.fill();
    ctx.stroke();

    // Boss label
    UI.text(ctx, 'BOSS', bossX, bossY - 3, {
      size: 11, bold: true,
      color: allStagesCleared ? COL.RED : COL.TEXT3
    });

    if (bossCleared) {
      UI.text(ctx, '★★★', bossX, bossY + 16, { size: 9, color: COL.COIN });
    }
  }

  // Game clear message
  if (G.gameClear) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, h - 60, w, 50);
    UI.text(ctx, t('game_clear'), w / 2, h - 35, { size: 18, bold: true, color: COL.COIN, glow: COL.COIN });
  }

  // Shop overlay
  if (G.showShop) {
    renderShop(ctx, w, h);
  }

  UI.scanlines(ctx, w, h, 0.015);
}

/** Render shop overlay */
function renderShop(ctx, w, h) {
  // Dimmed background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  const shopW = Math.min(350, w - 40);
  const shopX = (w - shopW) / 2;
  const shopY = 70;
  const shopH = 280;

  // Shop panel
  ctx.fillStyle = '#12121e';
  ctx.strokeStyle = COL.CRYSTAL;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(shopX, shopY, shopW, shopH, 12);
  ctx.fill();
  ctx.stroke();

  // Title
  UI.text(ctx, `${t('upgrade')} — 🔮 ${G.coins}`, shopX + shopW / 2, shopY + 22, {
    size: 18, bold: true, color: COL.COIN
  });

  // Close button
  UI.button(ctx, '✕', shopX + shopW - 40, shopY - 5, 35, 35, { color: COL.RED });

  // Upgrade branches
  const branches = ['light', 'refract', 'crystal'];
  const branchNames = t('upgrade_branches') || ['Light', 'Refract', 'Crystal'];
  const icons = ['💡', '🔮', '💎'];
  const btnH = 48;

  for (let i = 0; i < 3; i++) {
    const by = shopY + 50 + i * (btnH + 16);
    const lv = G.upgrades[branches[i]];
    const isMax = lv >= MAX_UPGRADE_LV;
    const cost = isMax ? 0 : UPGRADE_COSTS[lv];
    const canBuy = !isMax && G.coins >= cost;

    // Branch info
    UI.text(ctx, `${icons[i]} ${branchNames[i]}`, shopX + 20, by + 12, {
      size: 14, bold: true, color: COL.TEXT, align: 'left'
    });

    // Level bar
    for (let j = 0; j < MAX_UPGRADE_LV; j++) {
      const bx = shopX + 20 + j * 22;
      ctx.fillStyle = j < lv ? COL.CRYSTAL : COL.WALL;
      ctx.fillRect(bx, by + 26, 18, 8);
    }

    // Buy button
    const btnX = shopX + shopW - 100;
    if (isMax) {
      UI.button(ctx, t('max'), btnX, by, 90, btnH, { color: COL.TEXT3 });
    } else {
      UI.button(ctx, `${cost} 🔮`, btnX, by, 90, btnH, {
        color: canBuy ? COL.PURIFY : COL.TEXT3,
        hover: canBuy
      });
    }
  }
}

// ───────────────────────────────────────────────────────────────
// §25. PLAY STATE RENDER
// ───────────────────────────────────────────────────────────────

function renderPlay(ctx, w, h) {
  // Background based on zone
  renderZoneBackground(ctx, w, h, G.zone);

  // Grid
  renderGrid(ctx, G.grid, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Placed crystals
  renderCrystals(ctx, G.placedCrystals, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Light paths
  renderLightPaths(ctx, G.lightPaths, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Enemies
  renderEnemies(ctx, G.enemies, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Light source
  renderLightSource(ctx, G.lightSource, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Cores
  renderCores(ctx, G.cores, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Hint cells (DDA)
  renderHints(ctx, G.hintCells, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Ghost preview (selected crystal placement)
  if (G.playState === PS.SETUP && inGrid(G.mouseGridX, G.mouseGridY)) {
    renderGhostCrystal(ctx, G.mouseGridX, G.mouseGridY, G.selectedCrystal, G.crystalAngle,
      G.gridOffsetX, G.gridOffsetY, G.cellSize);
  }

  // HUD
  renderPlayHUD(ctx, w, h);

  // Bottom bar (crystal selection + start button)
  renderBottomBar(ctx, w, h);

  // Sub-state overlays
  if (G.playState === PS.PAUSED) renderPauseOverlay(ctx, w, h);
  if (G.playState === PS.DEAD) renderDeadOverlay(ctx, w, h);
  if (G.playState === PS.CLEAR) renderClearOverlay(ctx, w, h);
}

/** Render zone-specific background (procedural — F1/F24: no assets) */
function renderZoneBackground(ctx, w, h, zone) {
  const colors = [
    ['#0a0e2a', '#1a103a'], // Zone 1: Crystal Cavern
    ['#0a0e2a', '#1a1040'], // Zone 2: Prism Palace
    ['#0a1a30', '#0a1040']  // Zone 3: Rainbow Bridge
  ];
  const [c1, c2] = colors[(zone - 1) % 3];
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

/** Render the game grid */
function renderGrid(ctx, grid, ox, oy, cs) {
  if (!grid) return;

  // Grid background
  ctx.fillStyle = 'rgba(10, 14, 42, 0.7)';
  ctx.fillRect(ox - 2, oy - 2, GRID_COLS * cs + 4, GRID_ROWS * cs + 4);

  // Grid lines
  ctx.strokeStyle = COL.GRID_LINE;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= GRID_COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(ox + x * cs, oy);
    ctx.lineTo(ox + x * cs, oy + GRID_ROWS * cs);
    ctx.stroke();
  }
  for (let y = 0; y <= GRID_ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(ox, oy + y * cs);
    ctx.lineTo(ox + GRID_COLS * cs, oy + y * cs);
    ctx.stroke();
  }

  // Draw walls
  for (let x = 0; x < GRID_COLS; x++) {
    for (let y = 0; y < GRID_ROWS; y++) {
      if (grid[x][y] === CELL.WALL) {
        drawWall(ctx, ox + x * cs, oy + y * cs, cs);
      }
    }
  }

  // R3: Highlight moving walls with pulsing border
  if (G.movingWalls && G.movingWalls.length > 0) {
    const time = performance.now() / 1000;
    const pulse = 0.4 + Math.sin(time * 3) * 0.3;
    ctx.strokeStyle = COL.CYAN;
    ctx.lineWidth = 2;
    ctx.globalAlpha = pulse;
    for (const mw of G.movingWalls) {
      ctx.strokeRect(ox + mw.x * cs + 2, oy + mw.y * cs + 2, cs - 4, cs - 4);
      // Also show target position as ghost
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(ox + mw.x2 * cs + 2, oy + mw.y2 * cs + 2, cs - 4, cs - 4);
      ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
  }
}

/** Draw a wall cell */
function drawWall(ctx, x, y, size) {
  ctx.fillStyle = COL.WALL;
  ctx.fillRect(x + 1, y + 1, size - 2, size - 2);

  // Brick pattern
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 3, y + 3, size / 2 - 3, size / 2 - 3);
  ctx.strokeRect(x + size / 2 + 1, y + 3, size / 2 - 4, size / 2 - 3);
  ctx.strokeRect(x + 3, y + size / 2 + 1, size - 6, size / 2 - 3);
}

/** Render light source */
function renderLightSource(ctx, source, ox, oy, cs) {
  const px = ox + source.x * cs + cs / 2;
  const py = oy + source.y * cs + cs / 2;
  const r = cs * 0.4;

  // Glow
  ctx.save();
  ctx.shadowColor = COL.LIGHT;
  ctx.shadowBlur = 20;
  ctx.fillStyle = COL.LIGHT;
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Inner
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px, py, r * 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Direction arrow
  ctx.strokeStyle = COL.LIGHT;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px + r, py);
  ctx.lineTo(px + r + 10, py);
  ctx.lineTo(px + r + 6, py - 4);
  ctx.moveTo(px + r + 10, py);
  ctx.lineTo(px + r + 6, py + 4);
  ctx.stroke();
}

/** Render cores */
function renderCores(ctx, cores, ox, oy, cs) {
  for (const core of cores) {
    const px = ox + core.x * cs + cs / 2;
    const py = oy + core.y * cs + cs / 2;
    const r = cs * 0.35;
    const time = performance.now() / 1000;

    // Core glow
    const glowColor = core.purified ? COL.PURIFY :
      core.color === 'red' ? COL.LIGHT_R :
      core.color === 'blue' ? COL.LIGHT_B : COL.CRYSTAL;

    ctx.save();
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = core.purified ? 25 : 10 + Math.sin(time * 3) * 5;

    // Outer ring
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, r + 3, 0, Math.PI * 2);
    ctx.stroke();

    // Core fill
    ctx.fillStyle = core.purified ? COL.PURIFY + '88' : glowColor + '44';
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner diamond
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.moveTo(px, py - r * 0.5);
    ctx.lineTo(px + r * 0.5, py);
    ctx.lineTo(px, py + r * 0.5);
    ctx.lineTo(px - r * 0.5, py);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Color label
    if (!core.purified && core.color !== 'white') {
      const label = core.color === 'red' ? 'R' : 'B';
      UI.text(ctx, label, px, py, { size: 12, bold: true, color: '#fff' });
    }

    // Purified check
    if (core.purified) {
      UI.text(ctx, '✓', px, py, { size: 16, bold: true, color: '#fff' });
    }
  }
}

/** Render placed crystals */
function renderCrystals(ctx, crystals, ox, oy, cs) {
  for (const c of crystals) {
    const px = ox + c.gx * cs + cs / 2;
    const py = oy + c.gy * cs + cs / 2;
    const r = cs * 0.35;

    // R1: Dim crystals darkened by E5 enemies
    const darkened = isCrystalDarkened(c.gx, c.gy, G.enemies);
    if (darkened) ctx.globalAlpha = 0.3;
    drawCrystal(ctx, px, py, r, c.type, c.angle, c._active);
    if (darkened) {
      // Draw "disabled" X mark
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = COL.RED;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - r * 0.6, py - r * 0.6);
      ctx.lineTo(px + r * 0.6, py + r * 0.6);
      ctx.moveTo(px + r * 0.6, py - r * 0.6);
      ctx.lineTo(px - r * 0.6, py + r * 0.6);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

/** Draw a single crystal — pure function (F9) */
function drawCrystal(ctx, x, y, size, typeIdx, angle, active) {
  const type = CRYSTAL_TYPES[typeIdx];
  const colors = {
    'C1': COL.TEXT,       // reflect: white
    'C2': COL.CRYSTAL,    // split: purple
    'C3': COL.COIN,       // focus: gold
    'C4': COL.LIGHT_R,    // red filter
    'C5': COL.LIGHT_B,    // blue filter
    'C6': COL.CYAN,       // time: cyan
    'C7': COL.RED         // blast: red
  };
  const color = colors[type.id] || COL.CRYSTAL;

  ctx.save();
  ctx.translate(x, y);

  // Active glow
  if (active) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
  }

  // Crystal body — shape based on type
  ctx.fillStyle = color + '88';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;

  switch (type.id) {
    case 'C1': // Reflect — diamond with mirror line
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size, 0);
      ctx.lineTo(0, size);
      ctx.lineTo(-size, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Mirror line showing angle
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      const mirrorAngle = angle % 2 === 0 ? -Math.PI / 4 : Math.PI / 4;
      ctx.beginPath();
      ctx.moveTo(Math.cos(mirrorAngle) * size * 0.8, Math.sin(mirrorAngle) * size * 0.8);
      ctx.lineTo(-Math.cos(mirrorAngle) * size * 0.8, -Math.sin(mirrorAngle) * size * 0.8);
      ctx.stroke();
      break;

    case 'C2': // Split — triangle prism
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.87, size * 0.5);
      ctx.lineTo(-size * 0.87, size * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;

    case 'C3': // Focus — lens shape
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.4, size, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      break;

    case 'C4': // Red filter — hexagon
    case 'C5': // Blue filter — hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](Math.cos(a) * size, Math.sin(a) * size);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;

    case 'C6': // Time — clock-like circle
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Clock hands
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -size * 0.6);
      ctx.moveTo(0, 0);
      ctx.lineTo(size * 0.4, 0);
      ctx.stroke();
      break;

    case 'C7': // Blast — star shape
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = Math.PI / 4 * i;
        const r = i % 2 === 0 ? size : size * 0.5;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
  }

  ctx.restore();
}

/** Render ghost crystal preview + C2: light path preview on hover */
function renderGhostCrystal(ctx, gx, gy, typeIdx, angle, ox, oy, cs) {
  if (!G.grid || G.grid[gx]?.[gy] !== CELL.EMPTY) return;
  if (G.inventory[typeIdx] <= 0) return;

  const px = ox + gx * cs + cs / 2;
  const py = oy + gy * cs + cs / 2;

  ctx.globalAlpha = 0.4;
  drawCrystal(ctx, px, py, cs * 0.35, typeIdx, angle, false);

  // C2: Light path preview — simulate placement and trace
  const virtualCrystal = { gx, gy, type: typeIdx, angle, _active: false, _cooldown: 0 };
  const tempCrystals = [...G.placedCrystals, virtualCrystal];
  // Temporarily mark cell as crystal for tracing
  const prevCell = G.grid[gx][gy];
  G.grid[gx][gy] = CELL.CRYSTAL;
  const previewPaths = traceLight(G.grid, G.lightSource, tempCrystals, 50, G.enemies);
  G.grid[gx][gy] = prevCell; // Restore
  ctx.globalAlpha = 0.2;
  renderLightPaths(ctx, previewPaths, ox, oy, cs);
  ctx.globalAlpha = 1;
}

/** Render light path beams */
function renderLightPaths(ctx, paths, ox, oy, cs) {
  for (const p of paths) {
    const x1 = ox + p.x1 * cs + cs / 2;
    const y1 = oy + p.y1 * cs + cs / 2;
    const x2 = ox + p.x2 * cs + cs / 2;
    const y2 = oy + p.y2 * cs + cs / 2;

    const color = p.color === 'red' ? COL.LIGHT_R :
                  p.color === 'blue' ? COL.LIGHT_B :
                  p.color === 'purple' ? COL.LIGHT_P : COL.LIGHT;

    // Glow effect
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3 * p.intensity;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();

    // Inner bright line
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6 * p.intensity;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/** Render enemies */
function renderEnemies(ctx, enemies, ox, oy, cs) {
  for (const e of enemies) {
    if (e.alpha <= 0) continue;

    ctx.save();
    ctx.globalAlpha = e.alpha * (e.spawnAnim > 0 ? (1 - e.spawnAnim / 0.5) : 1);
    ctx.translate(e.x, e.y);

    const r = cs * 0.35;

    // Hit flash
    if (e.hitFlash > 0) {
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 20;
    }

    // Procedural enemy rendering (all assets removed per F1/F24)
    drawEnemyProcedural(ctx, 0, 0, r, e.type, e.facingDir);

    // HP bar for multi-HP enemies
    if (e.maxHp > 1 && !e.dead) {
      UI.hpBar(ctx, -r, -r - 6, r * 2, 4, e.hp, e.maxHp, {
        bgColor: '#333', fgColor: COL.RED
      });
    }

    // E5 darkness field
    if (e.type === 4 && !e.dead) {
      ctx.fillStyle = 'rgba(76, 29, 149, 0.3)';
      ctx.beginPath();
      ctx.arc(0, 0, e.darknessRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

/** Draw enemy procedurally — pure function (F9) */
function drawEnemyProcedural(ctx, x, y, size, type, facing) {
  const colors = [COL.SHADOW, '#993366', '#4a4a8a', '#663399', '#330066'];
  ctx.fillStyle = colors[type] || COL.SHADOW;

  switch (type) {
    case 0: // Grunt — blob
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(x - size * 0.25, y - size * 0.15, size * 0.12, 0, Math.PI * 2);
      ctx.arc(x + size * 0.25, y - size * 0.15, size * 0.12, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 1: // Charger — triangle
      ctx.beginPath();
      const angle = [0, Math.PI / 2, Math.PI, -Math.PI / 2][facing] || 0;
      ctx.save();
      ctx.rotate(angle);
      ctx.moveTo(size, 0);
      ctx.lineTo(-size * 0.7, -size * 0.7);
      ctx.lineTo(-size * 0.7, size * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(size * 0.2, 0, size * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;

    case 2: // Shield — square with shield
      ctx.fillRect(x - size, y - size, size * 2, size * 2);
      // Shield on facing side
      ctx.fillStyle = '#6666aa';
      const sx = facing === 0 ? size : facing === 2 ? -size * 1.2 : x - size;
      const sy = facing === 1 ? size : facing === 3 ? -size * 1.2 : y - size;
      if (facing === 0 || facing === 2) {
        ctx.fillRect(sx, y - size, size * 0.3, size * 2);
      } else {
        ctx.fillRect(x - size, sy, size * 2, size * 0.3);
      }
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 3: // Splitter — double blob
      ctx.beginPath();
      ctx.arc(x - size * 0.3, y, size * 0.7, 0, Math.PI * 2);
      ctx.arc(x + size * 0.3, y, size * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(x - size * 0.3, y - size * 0.1, size * 0.1, 0, Math.PI * 2);
      ctx.arc(x + size * 0.3, y - size * 0.1, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 4: // Corruptor — irregular
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = Math.PI / 4 * i;
        const r = size * (0.7 + (i % 2) * 0.3);
        if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
        else ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

/** Render DDA hint cells */
function renderHints(ctx, hintCells, ox, oy, cs) {
  if (hintCells.length === 0) return;

  const time = performance.now() / 1000;
  ctx.globalAlpha = 0.3 + Math.sin(time * 2) * 0.15;
  ctx.strokeStyle = COL.CYAN;
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);

  for (const h of hintCells) {
    ctx.strokeRect(ox + h.x * cs + 4, oy + h.y * cs + 4, cs - 8, cs - 8);
  }

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

/** Render play HUD (top bar) */
function renderPlayHUD(ctx, w, h) {
  // Top bar background
  ctx.fillStyle = 'rgba(10, 14, 42, 0.85)';
  ctx.fillRect(0, 0, w, 36);

  const y = 18;

  // Energy hearts (procedural — F1/F24: no assets)
  for (let i = 0; i < G.maxEnergy; i++) {
    const hx = 12 + i * 22;
    ctx.fillStyle = i < G.energy ? COL.ENERGY : COL.WALL;
    ctx.font = '16px sans-serif';
    ctx.fillText('♥', hx, y + 2);
  }

  // Score
  UI.text(ctx, `⭐ ${G.score}`, w / 2 - 50, y, { size: 13, color: COL.COIN, align: 'left' });

  // Coins
  UI.text(ctx, `🔮 ${G.coins}`, w / 2 + 30, y, { size: 13, color: COL.COIN, align: 'left' });

  // Wave info
  if (G.waveStarted) {
    UI.text(ctx, `${t('wave')} ${G.wave}/${G.maxWaves}`, w - 80, y, { size: 13, color: COL.CYAN, align: 'left' });
  }

  // Zone-Stage info
  UI.text(ctx, `${G.zone}-${G.stage}`, w - 20, y, { size: 13, color: COL.TEXT2, align: 'right' });

  // Combo display
  if (G.comboCount >= 2) {
    UI.text(ctx, `COMBO ×${G.comboCount}`, w / 2, 50, {
      size: 22, bold: true, color: COL.CYAN, glow: COL.CYAN
    });
  }
}

/** Render bottom bar (crystal selection + controls) */
function renderBottomBar(ctx, w, h) {
  const barH = input.isMobile ? 58 : 50;
  const barY = h - barH;

  // Bar background
  ctx.fillStyle = 'rgba(10, 14, 42, 0.9)';
  ctx.fillRect(0, barY, w, barH);
  ctx.strokeStyle = COL.GRID_LINE;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, barY);
  ctx.lineTo(w, barY);
  ctx.stroke();

  // Crystal buttons
  const btnSize = Math.max(MIN_TOUCH_SIZE, 42);
  const crystalNames = t('crystal_names');

  for (let i = 0; i < 7; i++) {
    if (!isCrystalUnlocked(i, G.zone, G.stage)) continue;

    const bx = 10 + i * (btnSize + 4);
    const by = barY + (barH - btnSize) / 2;
    const selected = G.selectedCrystal === i;
    const hasStock = G.inventory[i] > 0;

    // Button background
    ctx.fillStyle = selected ? COL.CRYSTAL + '66' : 'rgba(30,30,58,0.8)';
    ctx.strokeStyle = selected ? COL.CRYSTAL : (hasStock ? COL.TEXT3 : '#333');
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnSize, btnSize, 6);
    ctx.fill();
    ctx.stroke();

    // Crystal mini icon
    drawCrystal(ctx, bx + btnSize / 2, by + btnSize / 2 - 4, btnSize * 0.25, i, G.crystalAngle, false);

    // Inventory count
    ctx.globalAlpha = hasStock ? 1 : 0.4;
    UI.text(ctx, `${G.inventory[i]}`, bx + btnSize / 2, by + btnSize - 6, {
      size: 10, color: hasStock ? COL.TEXT : COL.TEXT3
    });
    ctx.globalAlpha = 1;

    // Hotkey hint (PC)
    if (!input.isMobile) {
      UI.text(ctx, `${i + 1}`, bx + 8, by + 8, { size: 8, color: COL.TEXT3, align: 'left' });
    }
  }

  // Start wave button (only in SETUP)
  if (G.playState === PS.SETUP && !G.waveStarted) {
    const startBtnW = Math.max(80, w * 0.15);
    const startBtnH = Math.max(MIN_TOUCH_SIZE, 38);
    const startBtnX = w - startBtnW - 15;
    const startBtnY = barY + (barH - startBtnH) / 2;

    UI.button(ctx, input.isMobile ? '▶' : `[SPACE] ${t('startWave')}`,
      startBtnX, startBtnY, startBtnW, startBtnH, {
        color: COL.PURIFY,
        hover: true
      });
  }

  // Rotation hint
  if (G.playState === PS.SETUP && !input.isMobile) {
    UI.text(ctx, 'Q/E: ' + t('rotateCrystal'), w - 15, barY - 12, {
      size: 10, color: COL.TEXT3, align: 'right'
    });
  }
}

// ───────────────────────────────────────────────────────────────
// §26. BOSS STATE RENDER
// ───────────────────────────────────────────────────────────────

function renderBossState(ctx, w, h) {
  // Save transform for camera zoom
  ctx.save();
  if (G.cameraZoom !== 1.0) {
    const cx = w / 2, cy = h / 2;
    ctx.translate(cx, cy);
    ctx.scale(G.cameraZoom, G.cameraZoom);
    ctx.translate(-cx, -cy);
  }

  // Zone background
  renderZoneBackground(ctx, w, h, G.zone);

  // Grid
  renderGrid(ctx, G.grid, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Crystals
  renderCrystals(ctx, G.placedCrystals, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Light paths
  renderLightPaths(ctx, G.lightPaths, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Enemies
  renderEnemies(ctx, G.enemies, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Light source
  renderLightSource(ctx, G.lightSource, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  // Boss
  renderBoss(ctx, G.gridOffsetX, G.gridOffsetY, G.cellSize);

  ctx.restore();

  // Boss intro
  if (G.playState === PS.BOSS_INTRO) {
    renderBossIntro(ctx, w, h);
    return;
  }

  // HUD
  renderPlayHUD(ctx, w, h);
  renderBottomBar(ctx, w, h);

  // Boss HP bar
  renderBossHPBar(ctx, w, h);

  // Sub-state overlays
  if (G.playState === PS.PAUSED) renderPauseOverlay(ctx, w, h);
  if (G.playState === PS.DEAD) renderDeadOverlay(ctx, w, h);
  if (G.playState === PS.CLEAR) renderBossClearOverlay(ctx, w, h);
}

/** Render boss entity */
function renderBoss(ctx, ox, oy, cs) {
  const bpx = ox + G.bossX * cs + cs / 2;
  const bpy = oy + G.bossY * cs + cs / 2;
  const bossSize = cs * 1.5;
  const def = BOSS_DEFS[G.bossType];

  if (G.bossType === 2) {
    // Serpent: draw segments
    for (let i = G.bossSegments.length - 1; i >= 0; i--) {
      const seg = G.bossSegments[i];
      const sx = ox + seg.x * cs + cs / 2;
      const sy = oy + seg.y * cs + cs / 2;
      const segSize = cs * 0.8;

      // Segment body
      const hue = i / G.bossSegments.length;
      ctx.fillStyle = `hsl(${hue * 300}, 70%, 40%)`;
      ctx.beginPath();
      ctx.arc(sx, sy, segSize / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `hsl(${hue * 300}, 70%, 60%)`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Tail (red weakness)
    if (G.bossSegments.length > 0) {
      const tail = G.bossSegments[G.bossSegments.length - 1];
      const tx = ox + tail.x * cs + cs / 2;
      const ty = oy + tail.y * cs + cs / 2;
      ctx.save();
      if (G.bossVulnerable) {
        ctx.shadowColor = COL.LIGHT_R;
        ctx.shadowBlur = 15;
      }
      ctx.fillStyle = COL.LIGHT_R + '88';
      ctx.strokeStyle = COL.LIGHT_R;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tx, ty, cs * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      UI.text(ctx, 'R', tx, ty, { size: 10, bold: true, color: '#fff' });
      ctx.restore();
    }
  }

  ctx.save();
  ctx.translate(bpx, bpy);

  // Vulnerability glow
  if (G.bossVulnerable) {
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 25;
  }

  // Procedural boss rendering (F1/F24: no assets)
  drawBossProcedural(ctx, 0, 0, bossSize, G.bossType, G.bossVulnerable, G.bossShieldDir);

  // Head weakness (Serpent: blue)
  if (G.bossType === 2 && G.bossVulnerable) {
    ctx.fillStyle = COL.LIGHT_B + '88';
    ctx.strokeStyle = COL.LIGHT_B;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -bossSize * 0.3, cs * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    UI.text(ctx, 'B', 0, -bossSize * 0.3, { size: 10, bold: true, color: '#fff' });
  }

  ctx.restore();
}

/** Draw boss procedurally — pure function (F9) */
function drawBossProcedural(ctx, x, y, size, type, vulnerable, shieldDir) {
  const time = performance.now() / 1000;

  switch (type) {
    case 0: // Sentinel — armored knight
      ctx.fillStyle = vulnerable ? '#663399' : '#4c1d95';
      // Body
      ctx.fillRect(x - size * 0.6, y - size * 0.5, size * 1.2, size);
      // Helmet
      ctx.beginPath();
      ctx.arc(x, y - size * 0.5, size * 0.5, Math.PI, 0);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(x - size * 0.25, y - size * 0.35, size * 0.15, size * 0.1);
      ctx.fillRect(x + size * 0.1, y - size * 0.35, size * 0.15, size * 0.1);
      // Weakness core (back)
      if (vulnerable) {
        ctx.fillStyle = COL.LIGHT + '88';
        ctx.beginPath();
        ctx.arc(x, y + size * 0.3, size * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    case 1: // Tyrant — crowned shadow lord
      ctx.fillStyle = vulnerable ? '#663399' : '#4c1d95';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
      ctx.fill();
      // Crown
      ctx.fillStyle = COL.COIN;
      ctx.beginPath();
      ctx.moveTo(x - size * 0.4, y - size * 0.5);
      ctx.lineTo(x - size * 0.3, y - size * 0.8);
      ctx.lineTo(x - size * 0.1, y - size * 0.6);
      ctx.lineTo(x + size * 0.1, y - size * 0.8);
      ctx.lineTo(x + size * 0.3, y - size * 0.6);
      ctx.lineTo(x + size * 0.4, y - size * 0.5);
      ctx.closePath();
      ctx.fill();
      // Shield (purple barrier)
      ctx.strokeStyle = '#9966cc';
      ctx.lineWidth = 4;
      const shieldAngle = shieldDir * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(x + Math.cos(shieldAngle) * size * 0.5, y + Math.sin(shieldAngle) * size * 0.5,
        size * 0.3, shieldAngle - 0.8, shieldAngle + 0.8);
      ctx.stroke();
      // Red weakness indicator
      if (vulnerable) {
        ctx.fillStyle = COL.LIGHT_R + '66';
        ctx.beginPath();
        ctx.arc(x, y, size * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    case 2: // Serpent — head
      ctx.fillStyle = '#2244aa';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x - size * 0.15, y - size * 0.1, size * 0.1, 0, Math.PI * 2);
      ctx.arc(x + size * 0.15, y - size * 0.1, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(x - size * 0.15, y - size * 0.1, size * 0.05, 0, Math.PI * 2);
      ctx.arc(x + size * 0.15, y - size * 0.1, size * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

/** Render boss HP bar */
function renderBossHPBar(ctx, w, h) {
  if (G.bossHP <= 0) return;

  const def = BOSS_DEFS[G.bossType];
  const barW = Math.min(300, w * 0.6);
  const barH = 16;
  const barX = (w - barW) / 2;
  const barY = 42;

  // Background
  ctx.fillStyle = 'rgba(10,14,42,0.9)';
  ctx.fillRect(barX - 5, barY - 5, barW + 10, barH + 22);

  // Boss name
  UI.text(ctx, t(def.name), w / 2, barY + 3, { size: 10, color: COL.RED });

  // HP bar
  UI.hpBar(ctx, barX, barY + 12, barW, barH, G.bossHP, G.bossMaxHP, {
    bgColor: '#1a1a30', fgColor: COL.RED, borderColor: '#4c1d95'
  });

  // HP text
  UI.text(ctx, `${Math.ceil(G.bossHP)} / ${G.bossMaxHP}`, w / 2, barY + 20, {
    size: 10, color: COL.TEXT
  });

  // Vulnerable indicator
  if (G.bossVulnerable) {
    const pulse = Math.sin(performance.now() / 200) > 0;
    if (pulse) {
      UI.text(ctx, '⚠ VULNERABLE', w / 2, barY + 38, { size: 12, bold: true, color: COL.COIN });
    }
  }
}

/** Render boss intro */
function renderBossIntro(ctx, w, h) {
  ctx.fillStyle = `rgba(0,0,0,${0.6 * Math.min(1, G.introTimer)})`;
  ctx.fillRect(0, 0, w, h);

  const def = BOSS_DEFS[G.bossType];
  const phase = Math.floor((3 - G.introTimer) / 1);

  if (phase >= 0) {
    // Warning text
    const warningAlpha = Math.min(1, (3 - G.introTimer) / 0.5);
    ctx.globalAlpha = warningAlpha;
    UI.text(ctx, '⚠ ' + t('boss_warning') + ' ⚠', w / 2, h / 2 - 30, {
      size: 28, bold: true, color: COL.RED, glow: COL.RED
    });
    ctx.globalAlpha = 1;
  }

  if (phase >= 1) {
    // Boss name
    const nameAlpha = Math.min(1, (2 - G.introTimer) / 0.5);
    ctx.globalAlpha = nameAlpha;
    UI.text(ctx, t(def.name), w / 2, h / 2 + 20, {
      size: 22, bold: true, color: COL.CRYSTAL, glow: COL.CRYSTAL
    });
    ctx.globalAlpha = 1;
  }
}

/** Render boss clear overlay */
function renderBossClearOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, h);

  if (G.gameClear) {
    UI.text(ctx, t('game_clear'), w / 2, h / 2 - 30, {
      size: 24, bold: true, color: COL.COIN, glow: COL.COIN
    });
    UI.text(ctx, `${t('score')}: ${G.totalScore}`, w / 2, h / 2 + 15, {
      size: 18, color: COL.TEXT
    });
  } else {
    UI.text(ctx, t('bossDefeat'), w / 2, h / 2 - 20, {
      size: 28, bold: true, color: COL.PURIFY, glow: COL.PURIFY
    });
  }
}

/** Render floating texts */
function renderFloatingTexts(ctx) {
  for (const ft of G.floatingTexts) {
    ctx.globalAlpha = ft.alpha;
    UI.text(ctx, ft.text, ft.x, ft.y, { size: ft.size, bold: true, color: ft.color });
  }
  ctx.globalAlpha = 1;
}

/** Render notifications (top center) */
function renderNotifications(ctx, w, h) {
  for (let i = 0; i < G.notifications.length; i++) {
    const n = G.notifications[i];
    ctx.globalAlpha = n.alpha;
    const ny = 60 + i * 28;
    UI.text(ctx, n.text, w / 2, ny, { size: 14, color: COL.CYAN, glow: COL.CYAN });
  }
  ctx.globalAlpha = 1;
}

// ───────────────────────────────────────────────────────────────
// §27. RESIZE HANDLER
// ───────────────────────────────────────────────────────────────

function onResize(w, h) {
  if (G.state === STATE.PLAY || G.state === STATE.BOSS) {
    calculateGridLayout();
  }
  // Reinitialize background particles for new size
  initBgParticles(40);
}

// ───────────────────────────────────────────────────────────────
// §28. INIT
// ───────────────────────────────────────────────────────────────

function init() {
  // Load saved progress
  loadProgress();

  // Initialize background particles
  initBgParticles(40);

  // Start engine (F1/F24: no asset loading — all rendering is procedural)
  engine.start();
}

init();

</script>
</body>
</html>
