// ───────────────────────────────────────────────────────────────
// §2. SeededRNG (F18: Math.random 0건)
// ───────────────────────────────────────────────────────────────
class SeededRNG {
  constructor(seed) { this.seed = seed % 2147483647; if (this.seed <= 0) this.seed += 2147483646; }
  next() { this.seed = (this.seed * 16807) % 2147483647; return (this.seed - 1) / 2147483646; }
  nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  nextFloat(min, max) { return min + this.next() * (max - min); }
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.nextInt(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

/** Get localized text */
function t(key) { return I18N[G.lang][key] || key; }

/** Clamp value between min and max */
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

/** Linear interpolation */
function lerp(a, b, t) { return a + (b - a) * t; }

/** Distance between two points */
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

/** Get grid cell from pixel coordinates */
function pixelToGrid(px, py, offsetX, offsetY, cellSize) {
  const gx = Math.floor((px - offsetX) / cellSize);
  const gy = Math.floor((py - offsetY) / cellSize);
  return { gx, gy };
}

/** Get pixel center of grid cell */
function gridToPixel(gx, gy, offsetX, offsetY, cellSize) {
  return {
    px: offsetX + gx * cellSize + cellSize / 2,
    py: offsetY + gy * cellSize + cellSize / 2
  };
}

/** Check if grid coords are valid */
function inGrid(gx, gy) { return gx >= 0 && gx < GRID_COLS && gy >= 0 && gy < GRID_ROWS; }

/** Check if crystal is unlocked for given zone/stage */
function isCrystalUnlocked(crystalIdx, zone, stage) {
  const [uz, us] = CRYSTAL_TYPES[crystalIdx].unlockedAt;
  return zone > uz || (zone === uz && stage >= us);
}

/** Get upgrade level with cap */
function getUpgrade(branch) { return clamp(G.upgrades[branch], 0, MAX_UPGRADE_LV); }

/** Calculate effective damage based on upgrades */
function calcDamage(lightColor) {
  let dmg = 1;
  const lv = getUpgrade('light');
  if (lv >= 1) dmg = 2;
  return Math.min(dmg * DPS_CAP, dmg);
}

/** Calculate beam penetration based on upgrades */
function canPenetrate() { return getUpgrade('light') >= 2; }

/** Calculate crystal rotation step (90° or 45°) */
function rotationStep() { return getUpgrade('refract') >= 1 ? 8 : 4; }

/** Max crystal inventory count */
function maxInventory() { return 3 + (getUpgrade('refract') >= 2 ? 1 : 0); }

/** Get DDA speed multiplier */
function ddaSpeedMult() {
  const mults = [1.0, 0.85, 0.75, 0.6];
  return mults[clamp(G.dda, 0, MAX_DDA_LV)];
}

/** Get DDA extra energy */
function ddaExtraEnergy() {
  const extras = [0, 1, 2, 3];
  return extras[clamp(G.dda, 0, MAX_DDA_LV)];
}

/** Get DDA hint count */
function ddaHintCount() {
  const hints = [0, 0, 1, 2];
  return hints[clamp(G.dda, 0, MAX_DDA_LV)];
}

/** Calculate difficulty values for stage n (1-based) */
function stageDifficulty(n) {
  return {
    enemyCount: 5 + Math.floor(n * 1.5),
    enemySpeed: 30 + n * 3,
    emptyCells: Math.max(6, 20 - n),
    waveCount: 1 + Math.floor(n / 4),
    coinDrop: Math.floor(n * 0.5) + 1,
    clearTime: 30 + n * 6
  };
}

/** Convert zone+stage to absolute stage number */
function absStageNum(zone, stage) {
  return (zone - 1) * STAGES_PER_ZONE + stage;
}

/** Add floating text notification */

  G.floatingTexts.push({ text, x, y, color: color || COL.COIN, size: size || 18, alpha: 1, vy: -40, life: 1.2 });
}

/** Begin state transition with fade (F4: tween only, no setTimeout) */
function beginTransition(from, to, onMid, onComplete) {
  if (G.transitioning) return false;
  if (!TRANSITION_TABLE[from] || !TRANSITION_TABLE[from].includes(to)) {
    console.warn('Invalid transition:', from, '→', to);
    return false;
  }
  G.transitioning = true;
  G.transitionFrom = from;
  G.transitionTo = to;

  // Phase 1: fade out (F5: guard flag prevents re-entry)
  const proxy1 = { alpha: 0 };
  tween.add(proxy1, { alpha: 1 }, 300, 'easeIn', () => {
    G.fadeAlpha = 1;
    G.state = to;
    if (onMid) onMid();

    // Phase 2: fade in — new proxy (Cycle 35 패턴)
    const proxy2 = { alpha: 1 };
    tween.add(proxy2, { alpha: 0 }, 300, 'easeOut', () => {
      G.fadeAlpha = 0;
      G.transitioning = false;
      if (onComplete) onComplete();
    });
    // Sync fadeAlpha to proxy2 in tween update
    const syncFade = { _t: 0 };
    tween.add(syncFade, { _t: 1 }, 300, 'easeOut', null);
  });

  // Sync fadeAlpha to proxy1
  const syncOut = { _t: 0 };
  tween.add(syncOut, { _t: 1 }, 300, 'easeIn', null);

  return true;
}

// ───────────────────────────────────────────────────────────────
// §8. SOUND SYSTEM — Procedural BGM + SFX (F19)
// ───────────────────────────────────────────────────────────────
const SND = {
  ctx: null,
  masterGain: null,
  bgmGain: null,
  bgmNodes: [],
  bgmPlaying: false,
  currentBGM: null,
  bgmScheduleTime: 0,
  bgmBeatIndex: 0,
  bgmTempo: 120,

  /** Initialize audio context */
  init() {
    if (this.ctx) return;
    sound.init();
    this.ctx = sound._ctx;
    if (!this.ctx) return;
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
    this.bgmGain = this.ctx.createGain();
    this.bgmGain.gain.value = 0.15;
    this.bgmGain.connect(this.masterGain);
  },

  /** Play SFX by name */
  sfx(name) {
    if (!this.ctx) return;
    const ct = this.ctx.currentTime;
    const sfxDefs = {
      place: () => this._playNotes([{ f: 880, d: 0.06, t: 'sine' }, { f: 1320, d: 0.08, t: 'sine', delay: 0.04 }], 0.25),
      rotate: () => this._playNotes([{ f: 660, d: 0.04, t: 'sine' }, { f: 770, d: 0.04, t: 'sine', delay: 0.03 }], 0.2),
      light: () => this._playNotes([{ f: 440, d: 0.15, t: 'sine' }, { f: 550, d: 0.2, t: 'sine', delay: 0.05 }], 0.15),
      hit: () => this._playNotes([{ f: 200, d: 0.1, t: 'sawtooth' }, { f: 100, d: 0.15, t: 'square', delay: 0.03 }], 0.3),
      combo: () => this._playNotes([{ f: 523, d: 0.06, t: 'sine' }, { f: 659, d: 0.06, t: 'sine', delay: 0.06 }, { f: 784, d: 0.08, t: 'sine', delay: 0.12 }], 0.25),
      damage: () => this._playNotes([{ f: 120, d: 0.2, t: 'sawtooth' }, { f: 80, d: 0.3, t: 'square', delay: 0.05 }], 0.4),
      clear: () => this._playNotes([{ f: 523, d: 0.1, t: 'square' }, { f: 659, d: 0.1, t: 'square', delay: 0.1 }, { f: 784, d: 0.15, t: 'square', delay: 0.2 }, { f: 1047, d: 0.25, t: 'sine', delay: 0.3 }], 0.3),
      bossRoar: () => this._playNotes([{ f: 60, d: 0.5, t: 'sawtooth' }, { f: 80, d: 0.4, t: 'square', delay: 0.1 }, { f: 50, d: 0.6, t: 'sawtooth', delay: 0.2 }], 0.5),
      upgrade: () => this._playNotes([{ f: 440, d: 0.08, t: 'sine' }, { f: 660, d: 0.08, t: 'sine', delay: 0.06 }, { f: 880, d: 0.12, t: 'sine', delay: 0.12 }], 0.2),
      coin: () => this._playNotes([{ f: 1200, d: 0.04, t: 'sine' }, { f: 1600, d: 0.06, t: 'sine', delay: 0.03 }], 0.2),
      select: () => this._playNotes([{ f: 660, d: 0.06, t: 'square' }, { f: 880, d: 0.08, t: 'square', delay: 0.04 }], 0.2),
      gameover: () => this._playNotes([{ f: 440, d: 0.2, t: 'sawtooth' }, { f: 330, d: 0.25, t: 'sawtooth', delay: 0.15 }, { f: 220, d: 0.4, t: 'sawtooth', delay: 0.3 }], 0.35)
    };
    if (sfxDefs[name]) sfxDefs[name]();
  },

  /** Play note array */
  _playNotes(notes, vol) {
    if (!this.ctx) return;
    const ct = this.ctx.currentTime;
    for (const n of notes) {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = n.t || 'sine';
      osc.frequency.value = n.f;
      gain.gain.setValueAtTime(vol * 0.3, ct + (n.delay || 0));
      gain.gain.exponentialRampToValueAtTime(0.001, ct + (n.delay || 0) + n.d);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(ct + (n.delay || 0));
      osc.stop(ct + (n.delay || 0) + n.d + 0.05);
    }
  },

  /** Start BGM for given state */
  startBGM(type) {
    if (this.currentBGM === type) return;
    this.stopBGM();
    this.currentBGM = type;
    this.bgmPlaying = true;
    this.bgmBeatIndex = 0;
    if (!this.ctx) return;
    this.bgmScheduleTime = this.ctx.currentTime + 0.1;

    const tempos = { title: 80, map: 90, play: 110, boss: 140 };
    this.bgmTempo = tempos[type] || 110;
  },

  /** Stop BGM */
  stopBGM() {
    this.bgmPlaying = false;
    this.currentBGM = null;
    for (const n of this.bgmNodes) {
      try { n.stop(); } catch(e) {}
    }
    this.bgmNodes = [];
  },

  /** Schedule BGM notes — called each frame (Cycle 38: lookahead scheduling) */
  scheduleBGM() {
    if (!this.bgmPlaying || !this.ctx) return;
    const ct = this.ctx.currentTime;
    const beatDur = 60 / this.bgmTempo;
    const lookahead = 2.0;

    while (this.bgmScheduleTime < ct + lookahead) {
      const beat = this.bgmBeatIndex % 16;
      this._scheduleBeat(beat, this.bgmScheduleTime, beatDur);
      this.bgmScheduleTime += beatDur;
      this.bgmBeatIndex++;
    }
  },

  /** Schedule a single BGM beat */
  _scheduleBeat(beat, time, dur) {
    if (!this.ctx || !this.bgmGain) return;
    const type = this.currentBGM;

    // Title BGM — dreamy crystal arpeggios in C major
    if (type === 'title') {
      const notes = [261, 329, 392, 523, 392, 329, 261, 196,
                     261, 349, 440, 523, 440, 349, 261, 196];
      if (beat < notes.length) {
        this._schedNote(notes[beat], dur * 0.8, 'sine', time, 0.12);
        if (beat % 4 === 0) this._schedNote(notes[beat] / 2, dur * 1.5, 'triangle', time, 0.08);
      }
    }
    // Map BGM — peaceful harp
    else if (type === 'map') {
      const notes = [349, 440, 523, 659, 523, 440, 349, 293,
                     349, 523, 659, 784, 659, 523, 349, 293];
      if (beat < notes.length) {
        this._schedNote(notes[beat], dur * 0.6, 'sine', time, 0.1);
        if (beat % 8 === 0) this._schedNote(notes[beat] / 4, dur * 2, 'sine', time, 0.06);
      }
    }
    // Play BGM — tense puzzle ambient A minor
    else if (type === 'play') {
      const bass = [220, 220, 247, 247, 262, 262, 247, 247,
                    220, 220, 196, 196, 175, 175, 196, 196];
      const melody = [0, 440, 0, 523, 0, 659, 0, 523,
                      0, 440, 0, 392, 0, 349, 0, 392];
      this._schedNote(bass[beat], dur * 0.9, 'triangle', time, 0.08);
      if (melody[beat] > 0) this._schedNote(melody[beat], dur * 0.5, 'sine', time, 0.06);
      if (beat % 4 === 0) this._schedNote(110, dur * 0.1, 'square', time, 0.03);
    }
    // Boss BGM — intense battle in D minor
    else if (type === 'boss') {
      const bass = [147, 147, 175, 175, 196, 196, 220, 220,
                    196, 196, 175, 175, 147, 147, 131, 131];
      const melody = [587, 0, 698, 0, 784, 0, 698, 587,
                      0, 523, 0, 587, 0, 466, 0, 440];
      this._schedNote(bass[beat], dur * 0.4, 'sawtooth', time, 0.1);
      if (melody[beat] > 0) this._schedNote(melody[beat], dur * 0.3, 'square', time, 0.08);
      if (beat % 2 === 0) this._schedNote(73, dur * 0.15, 'square', time, 0.12);
      if (beat % 4 === 0) this._schedNote(50, dur * 0.08, 'sawtooth', time, 0.15);
    }
  },

  /** Schedule a single note at a specific time */
  _schedNote(freq, dur, type, time, vol) {
    if (!this.ctx || !this.bgmGain) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
      osc.connect(gain);
      gain.connect(this.bgmGain);
      osc.start(time);
      osc.stop(time + dur + 0.05);
      this.bgmNodes.push(osc);
      // Clean up old nodes to prevent memory leak
      if (this.bgmNodes.length > 64) {
        this.bgmNodes = this.bgmNodes.slice(-32);
      }
    } catch(e) {}
  }
};

/** Generate a stage grid */
function generateStage(zone, stage, seed) {
  const rng = new SeededRNG(seed);
  const template = ZONE_TEMPLATES[zone][(stage - 1) % 3];

  // Create empty grid
  const grid = [];
  for (let x = 0; x < GRID_COLS; x++) {
    grid[x] = [];
    for (let y = 0; y < GRID_ROWS; y++) {
      grid[x][y] = CELL.EMPTY;
    }
  }

  // Place walls with ±1 variation
  const walls = [];
  for (const w of template.walls) {
    let wx = clamp(w[0] + rng.nextInt(-1, 1), 1, GRID_COLS - 2);
    let wy = clamp(w[1] + rng.nextInt(-1, 1), 0, GRID_ROWS - 1);
    // Don't place wall on source or core columns
    if (wx === 0 || wx >= GRID_COLS - 1) wx = clamp(wx, 1, GRID_COLS - 2);
    grid[wx][wy] = CELL.WALL;
    walls.push({ x: wx, y: wy });
  }

  // Place light source
  const srcY = clamp(template.source.y + rng.nextInt(-1, 1), 0, GRID_ROWS - 1);
  grid[0][srcY] = CELL.SOURCE;
  const lightSource = { x: 0, y: srcY, dir: 0 }; // dir 0 = right

  // Place cores
  const cores = [];
  for (const c of template.cores) {
    let cy = clamp(c.y + rng.nextInt(-1, 1), 0, GRID_ROWS - 1);
    let cx = clamp(c.x, GRID_COLS - 3, GRID_COLS - 1);
    // Make sure core cell is empty
    if (grid[cx][cy] !== CELL.EMPTY) cy = clamp(cy + 1, 0, GRID_ROWS - 1);
    grid[cx][cy] = CELL.CORE;
    cores.push({ x: cx, y: cy, color: c.color, purified: false });
  }

  // Place spawn points at edges
  const spawnPoints = [];
  const edgeCells = [];
  for (let y = 0; y < GRID_ROWS; y++) {
    if (grid[GRID_COLS - 1][y] === CELL.EMPTY) edgeCells.push({ x: GRID_COLS - 1, y });
    if (grid[0][y] === CELL.EMPTY) edgeCells.push({ x: 0, y });
  }
  for (let x = 1; x < GRID_COLS - 1; x++) {
    if (grid[x][0] === CELL.EMPTY) edgeCells.push({ x, y: 0 });
    if (grid[x][GRID_ROWS - 1] === CELL.EMPTY) edgeCells.push({ x, y: GRID_ROWS - 1 });
  }
  // Pick 4-6 spawn points
  const shuffled = rng.shuffle(edgeCells);
  const numSpawns = Math.min(shuffled.length, rng.nextInt(4, 6));
  for (let i = 0; i < numSpawns; i++) {
    spawnPoints.push(shuffled[i]);
  }

  return { grid, walls, lightSource, cores, spawnPoints };
}

/** BFS light path reachability check (F27) */
function validateStageReachability(grid, lightSource, cores) {
  // Simple reachability: check there's a clear path from source to each core
  for (const core of cores) {
    const visited = new Set();
    const queue = [{ x: lightSource.x, y: lightSource.y }];
    let found = false;

    while (queue.length > 0) {
      const { x, y } = queue.shift();
      const key = `${x},${y}`;
      if (visited.has(key)) continue;
      visited.add(key);

      if (x === core.x && y === core.y) { found = true; break; }

      // 4-direction movement
      const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      for (const [dx, dy] of dirs) {
        const nx = x + dx, ny = y + dy;
        if (inGrid(nx, ny) && grid[nx][ny] !== CELL.WALL && !visited.has(`${nx},${ny}`)) {
          queue.push({ x: nx, y: ny });
        }
      }
    }
    if (!found) return false;
  }
  return true;
}

/** Generate stage with validation (F27: BFS + retry) */
function generateValidStage(zone, stage) {
  let seed = G.seed + zone * 100 + stage * 10;
  for (let attempt = 0; attempt < 10; attempt++) {
    const result = generateStage(zone, stage, seed + attempt);
    if (validateStageReachability(result.grid, result.lightSource, result.cores)) {
      return result;
    }
  }
  // Fallback: use basic template without variation
  return generateStage(zone, stage, 0);
}

// §10. LIGHT TRACING SYSTEM — Core mechanic
// ───────────────────────────────────────────────────────────────

/** Check if crystal at gx,gy is darkened by any E5 enemy (R1: darkness field invalidation) */
function isCrystalDarkened(gx, gy, enemies) {
  if (!enemies || enemies.length === 0) return false;
  for (const e of enemies) {
    if (e.type !== 4 || e.dead || e.spawnAnim > 0) continue;
    // Convert enemy pixel position to grid cell
    const egx = Math.floor((e.x - G.gridOffsetX) / G.cellSize);
    const egy = Math.floor((e.y - G.gridOffsetY) / G.cellSize);
    // E5 darkness radius = 1 cell (Manhattan distance)
    if (Math.abs(egx - gx) <= 1 && Math.abs(egy - gy) <= 1) return true;
  }
  return false;
}

/** Direction vectors: 0=right, 1=down, 2=left, 3=up, 4-7=diagonals */
const DIR_VEC = [
  { dx: 1, dy: 0 },  // 0: right
  { dx: 0, dy: 1 },  // 1: down
  { dx: -1, dy: 0 }, // 2: left
  { dx: 0, dy: -1 }, // 3: up
  { dx: 1, dy: 1 },  // 4: down-right
  { dx: -1, dy: 1 }, // 5: down-left
  { dx: -1, dy: -1 },// 6: up-left
  { dx: 1, dy: -1 }  // 7: up-right
];

/** Trace light from source through crystals — returns path segments */
function traceLight(grid, lightSource, placedCrystals, maxDepth, enemies) {
  const paths = [];
  const maxD = maxDepth || 50;

  function trace(x, y, dir, color, depth, intensity) {
    if (depth > maxD) return;

    const dv = DIR_VEC[dir % 4]; // Only use cardinal directions for main beams
    let cx = x, cy = y;

    for (let step = 0; step < GRID_COLS + GRID_ROWS; step++) {
      const nx = cx + dv.dx;
      const ny = cy + dv.dy;

      if (!inGrid(nx, ny)) {
        paths.push({ x1: x, y1: y, x2: cx, y2: cy, color, intensity, dir });
        return;
      }

      // Check wall
      if (grid[nx][ny] === CELL.WALL) {
        paths.push({ x1: x, y1: y, x2: cx, y2: cy, color, intensity, dir });
        return;
      }

      // Check crystal at this position
      const crystal = placedCrystals.find(c => c.gx === nx && c.gy === ny);
      if (crystal) {
        // R1: E5 darkness field invalidates crystal — treat as empty cell, beam passes through
        if (isCrystalDarkened(nx, ny, enemies)) {
          cx = nx;
          cy = ny;
          continue;
        }
        paths.push({ x1: x, y1: y, x2: nx, y2: ny, color, intensity, dir });

        // Process crystal effect
        const cType = CRYSTAL_TYPES[crystal.type];
        switch (cType.id) {
          case 'C1': { // Reflect — 90° reflection based on angle
            const angles = [0, 1, 2, 3]; // right, down, left, up
            const newDir = crystal.angle;
            // Reflect: if coming from left(0), mirror up(3) or down(1) based on angle
            let reflected = reflectDirection(dir, crystal.angle);
            if (reflected !== dir) { // Only trace if direction actually changes
              trace(nx, ny, reflected, color, depth + 1, intensity);
            }
            break;
          }
          case 'C2': { // Split — 2 beams at ±90° from current direction
            const d1 = (dir + 1) % 4;
            const d2 = (dir + 3) % 4;
            trace(nx, ny, d1, color, depth + 1, intensity * 0.7);
            trace(nx, ny, d2, color, depth + 1, intensity * 0.7);
            break;
          }
          case 'C3': { // Focus — continue in same direction but stronger
            trace(nx, ny, dir, color, depth + 1, Math.min(intensity * 1.5, 2.0));
            break;
          }
          case 'C4': { // Red filter
            trace(nx, ny, dir, 'red', depth + 1, intensity);
            break;
          }
          case 'C5': { // Blue filter
            trace(nx, ny, dir, 'blue', depth + 1, intensity);
            break;
          }
          case 'C6': { // Time crystal — continue, marks area for slow
            crystal._active = true;
            trace(nx, ny, dir, color, depth + 1, intensity);
            break;
          }
          case 'C7': { // Blast crystal — continue, marks for explosion
            crystal._active = true;
            trace(nx, ny, dir, color, depth + 1, intensity);
            break;
          }
        }
        return; // Crystal consumes the beam
      }

      cx = nx;
      cy = ny;
    }

    paths.push({ x1: x, y1: y, x2: cx, y2: cy, color, intensity, dir });
  }

  // Start tracing from source
  trace(lightSource.x, lightSource.y, 0, 'white', 0, 1.0);
  return paths;
}

/** Calculate reflection direction based on crystal angle */
function reflectDirection(inDir, crystalAngle) {
  // crystalAngle: 0 = /, 1 = \, 2 = /, 3 = \  (alternating mirror orientations)
  // For simplicity: angle 0 & 2 = / mirror, angle 1 & 3 = \ mirror
  const mirrorType = crystalAngle % 2; // 0 = /, 1 = \

  if (mirrorType === 0) {
    // / mirror: right→up, down→left, left→down, up→right
    const reflectMap = { 0: 3, 1: 2, 2: 1, 3: 0 };
    return reflectMap[inDir];
  } else {
    // \ mirror: right→down, up→left, left→up, down→right
    const reflectMap = { 0: 1, 1: 0, 2: 3, 3: 2 };
    return reflectMap[inDir];
  }
}

/** Check if light path hits a specific grid cell */
function lightHitsCell(paths, gx, gy) {
  for (const p of paths) {
    // Check if cell is along the path
    const dx = Math.sign(p.x2 - p.x1);
    const dy = Math.sign(p.y2 - p.y1);
    let cx = p.x1, cy = p.y1;

    for (let i = 0; i <= GRID_COLS + GRID_ROWS; i++) {
      if (cx === gx && cy === gy) return { hit: true, color: p.color, intensity: p.intensity };
      if (cx === p.x2 && cy === p.y2) break;
      cx += dx;
      cy += dy;
    }
  }
  return { hit: false };
}

/** Check shadow enemy hit by light (F8: 판정 먼저) */
function checkShadowHit(lightPaths, enemies, offsetX, offsetY, cellSize) {
  const kills = [];
  const damaged = [];

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) continue;

    // Convert enemy pixel position to grid cell
    const egx = Math.floor((e.x - offsetX) / cellSize);
    const egy = Math.floor((e.y - offsetY) / cellSize);

    const result = lightHitsCell(lightPaths, egx, egy);
    if (result.hit) {
      let dmg = calcDamage(result.color);

      // E3 shield: front resistance
      if (e.type === 2 && e.facingDir === result.dir) {
        dmg *= 0.5;
      }

      e.hp -= dmg * result.intensity;

      if (e.hp <= 0) {
        e.dead = true;
        kills.push(e);

        // E4 splitter: spawn 2 grunts on death
        if (e.type === 3) {
          for (let j = 0; j < 2; j++) {
            enemies.push(createEnemy(0, e.x + (j === 0 ? -15 : 15), e.y, offsetX, offsetY, cellSize));
          }
        }
      } else {
        damaged.push(e);
      }
    }
  }

  return { kills, damaged };
}

/** Create enemy entity */
function createEnemy(typeIdx, px, py, offsetX, offsetY, cellSize) {
  const et = ENEMY_TYPES[typeIdx];
  return {
    type: typeIdx,
    x: px,
    y: py,
    hp: et.hp,
    maxHp: et.hp,
    speed: et.speed * ddaSpeedMult(),
    dead: false,
    alpha: 1,
    facingDir: 2, // facing left (toward source)
    hitFlash: 0,
    spawnAnim: 0.5,
    darknessRadius: typeIdx === 4 ? cellSize : 0 // E5 darkness field
  };
}

/** Update all enemies — pure function approach with target reference */
function updateEnemies(enemies, dt, targetX, targetY, offsetX, offsetY, cellSize) {
  const dtSec = dt / 1000;

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    // Spawn animation
    if (e.spawnAnim > 0) {
      e.spawnAnim -= dtSec;
      continue;
    }

    if (e.dead) {
      e.alpha -= dtSec * 3;
      if (e.alpha <= 0) enemies.splice(i, 1);
      continue;
    }

    // Hit flash decay
    if (e.hitFlash > 0) e.hitFlash -= dtSec * 5;

    // Move toward light source
    const dx = targetX - e.x;
    const dy = targetY - e.y;
    const d = Math.hypot(dx, dy);

    if (d > 2) {
      const moveSpeed = e.speed * dtSec;

      // E2 charger: straight line dash
      if (e.type === 1) {
        e.x += (dx / d) * moveSpeed * 1.2;
        e.y += (dy / d) * moveSpeed * 0.3;
      } else {
        e.x += (dx / d) * moveSpeed;
        e.y += (dy / d) * moveSpeed;
      }

      // Update facing direction
      if (Math.abs(dx) > Math.abs(dy)) {
        e.facingDir = dx > 0 ? 0 : 2;
      } else {
        e.facingDir = dy > 0 ? 1 : 3;
      }
    }

    // Time crystal slow effect
    const timeSlowRange = (getUpgrade('crystal') >= 3 ? 3 : 2) * cellSize;
    for (const c of G.placedCrystals) {
      if (CRYSTAL_TYPES[c.type].id === 'C6' && c._active) {
        const cp = gridToPixel(c.gx, c.gy, offsetX, offsetY, cellSize);
        if (dist(e.x, e.y, cp.px, cp.py) < timeSlowRange) {
          e.speed = ENEMY_TYPES[e.type].speed * ddaSpeedMult() * 0.5;
        }
      }
    }
  }
}

/** Check if any enemy reached the light source */
function checkEnemyReachSource(enemies, sourceX, sourceY, radius) {
  for (const e of enemies) {
    if (e.dead || e.spawnAnim > 0) continue;
    if (dist(e.x, e.y, sourceX, sourceY) < radius) {
      e.dead = true;
      e.alpha = 0;
      return true;
    }
  }
  return false;
}

/** Spawn enemies for current wave */
function spawnWaveEnemies(waveData, spawnPoints, offsetX, offsetY, cellSize) {
  const toSpawn = [];
  for (const [key, count] of Object.entries(waveData)) {
    const typeIdx = parseInt(key.substring(1)) - 1;
    for (let i = 0; i < count; i++) {
      toSpawn.push(typeIdx);
    }
  }
  return toSpawn;
}

  G.bossTimer += dtSec;
  G.bossMoveTimer += dtSec;
  G.bossSpawnTimer += dtSec;

  // Determine phase
  const phaseIdx = G.bossHP > def.phases[0].hpThreshold ? 0 : 1;
  const phase = def.phases[phaseIdx];

  // Vulnerability window
  if (G.bossVulnerable) {
    G.bossVulnTimer -= dtSec;
    if (G.bossVulnTimer <= 0) G.bossVulnerable = false;
  }

  // Boss movement
  const moveInterval = phase.moveInterval || def.moveInterval;
  if (G.bossMoveTimer >= moveInterval) {
    G.bossMoveTimer = 0;

    // Move to random position in center area
    const rngLocal = new SeededRNG(G.seed + Math.floor(G.bossTimer * 100));
    const newTargetX = rngLocal.nextInt(4, 9);
    const newTargetY = rngLocal.nextInt(1, 6);

    // R5: Determine boss facing direction from movement vector
    const mdx = newTargetX - G.bossX;
    const mdy = newTargetY - G.bossY;
    if (Math.abs(mdx) > Math.abs(mdy)) {
      G.bossFacingDir = mdx > 0 ? 0 : 2; // facing right or left
    } else {
      G.bossFacingDir = mdy > 0 ? 1 : 3; // facing down or up
    }

    G.bossTargetX = newTargetX;
    G.bossTargetY = newTargetY;

    // Vulnerability after move
    G.bossVulnerable = true;
    G.bossVulnTimer = moveInterval * 0.6;

    // Tyrant shield rotation
    if (G.bossType === 1) {
      G.bossShieldDir = (G.bossShieldDir + 1) % 4;
      G.bossVulnTimer = 2.0; // 2 second window
    }

    // Serpent movement
    if (G.bossType === 2) {
      // Add current position to segments
      G.bossSegments.unshift({ x: G.bossX, y: G.bossY });
      const maxLen = phaseIdx === 1 ? 5 : 3;
      while (G.bossSegments.length > maxLen) G.bossSegments.pop();
    }
  }

  // Smooth boss movement
  G.bossX = lerp(G.bossX, G.bossTargetX, dtSec * 2);
  G.bossY = lerp(G.bossY, G.bossTargetY, dtSec * 2);

  // Enemy spawning
  if (G.bossSpawnTimer >= (phase.spawnInterval || def.spawnInterval)) {
    G.bossSpawnTimer = 0;
    const spawnType = phase.spawnType;
    const count = phase.spawnCount || 1;

    for (let i = 0; i < count; i++) {
      const rngS = new SeededRNG(G.seed + Math.floor(G.bossTimer * 1000) + i);
      const sy = rngS.nextInt(0, GRID_ROWS - 1);
      const px = offsetX + (GRID_COLS - 1) * cellSize + cellSize / 2;
      const py = offsetY + sy * cellSize + cellSize / 2;
      G.enemies.push(createEnemy(spawnType, px, py, offsetX, offsetY, cellSize));
    }
  }

  // Check boss damage from light
  if (G.bossVulnerable && G.lightPaths.length > 0) {
    const bossGX = Math.round(G.bossX);
    const bossGY = Math.round(G.bossY);

    // R6: Serpent requires simultaneous head+tail hit — accumulate across all paths
    if (G.bossType === 2) {
      let headBlueHit = false;
      let tailRedHit = false;
      let bestIntensity = 0;

      for (const path of G.lightPaths) {
        // Check head (blue required)
        const hh = lightHitsCell([path], bossGX, bossGY);
        if (hh.hit && hh.color === 'blue') {
          headBlueHit = true;
          bestIntensity = Math.max(bestIntensity, hh.intensity);
        }
        // Check tail (red required)
        if (G.bossSegments.length > 0) {
          const tail = G.bossSegments[G.bossSegments.length - 1];
          const th = lightHitsCell([path], Math.round(tail.x), Math.round(tail.y));
          if (th.hit && th.color === 'red') {
            tailRedHit = true;
            bestIntensity = Math.max(bestIntensity, th.intensity);
          }
        }
      }

      // Only damage when BOTH head (blue) and tail (red) are hit simultaneously
      if (headBlueHit && tailRedHit) {
        const dmg = calcDamage('blue') * bestIntensity;
        G.bossHP -= dmg * dtSec * 2;
        G.shakeIntensity = Math.max(G.shakeIntensity, 3);
        if (G.bossHP <= 0) { G.bossHP = 0; bossDeath(); return; }
      }
    } else {
      // Sentinel and Tyrant — per-path check
      for (const path of G.lightPaths) {
        const hit = lightHitsCell([path], bossGX, bossGY);
        if (hit.hit) {
          let canDamage = false;

          // R5: Sentinel — only back side (light must come from behind boss)
          if (G.bossType === 0) {
            const backDir = (G.bossFacingDir + 2) % 4; // opposite of facing
            canDamage = (path.dir === backDir);
          }
          // Tyrant: only red light
          else if (G.bossType === 1) {
            canDamage = hit.color === 'red';
          }

          if (canDamage) {
            const dmg = calcDamage(hit.color) * hit.intensity;
            G.bossHP -= dmg * dtSec * 2;
            G.shakeIntensity = Math.max(G.shakeIntensity, 3);
            if (G.bossHP <= 0) { G.bossHP = 0; bossDeath(); return; }
          }
        }
      }
    }
  }
}

/** Handle boss death */
function bossDeath() {
  if (G.bossRewardGiven) return; // F17: guard flag
  G.bossRewardGiven = true;

  const reward = BOSS_DEFS[G.bossType].hp * 200;
  const coinReward = 50 + G.bossType * 30;

  // F8: judge first, save later
  const isNewBest = reward > (Save.get(`ix_${GAME_ID}_boss_${G.bossType}`, 0));
  G.score += reward;
  G.coins += coinReward;
  G.totalScore += reward;

  Save.set(`ix_${GAME_ID}_boss_${G.bossType}`, reward);
  Save.setHighScore(GAME_ID, G.totalScore);

  // Mark boss stage as cleared
  const stageKey = `${G.zone}-boss`;
  G.stageCleared[stageKey] = true;
  G.stageStars[stageKey] = 3;
  saveProgress();

  SND.sfx('clear');
  addNotification(t('bossDefeat'), 3);
  addFloatingText(`+${reward}`, engine.W / 2, engine.H / 2, COL.COIN, 32);

  G.shakeIntensity = 15;
  particles.emit(engine.W / 2, engine.H / 2, 50, { color: COL.COIN, speed: 200, life: 1.5, size: 5 });

  // Check game clear (Zone 3 boss = final boss for MVP)
  if (G.zone >= TOTAL_ZONES) {
    G.gameClear = true;
    G.playState = PS.CLEAR;

    tween.add({ _t: 0 }, { _t: 1 }, 3000, 'linear', () => {
      beginTransition(STATE.BOSS, STATE.MAP, () => {
        SND.startBGM('map');
      });
    });
  } else {
    tween.add({ _t: 0 }, { _t: 1 }, 2000, 'linear', () => {
      beginTransition(STATE.BOSS, STATE.MAP, () => {
        SND.startBGM('map');
      });
    });
  }
}

// ───────────────────────────────────────────────────────────────
// §13. UPGRADE SYSTEM
// ───────────────────────────────────────────────────────────────

/** Apply upgrade purchase */
function purchaseUpgrade(branch) {
  const lv = G.upgrades[branch];
  if (lv >= MAX_UPGRADE_LV) return false;
  const cost = UPGRADE_COSTS[lv];
  if (G.coins < cost) return false;

  G.coins -= cost;
  G.upgrades[branch] = lv + 1;
  saveProgress();
  SND.sfx('upgrade');
  addNotification(`${t('upgrade')}: ${t('upgrade_branches')?.[['light','refract','crystal'].indexOf(branch)] || branch} Lv${lv + 1}`, 2);
  return true;
}

// ───────────────────────────────────────────────────────────────
// §14. SAVE / LOAD SYSTEM
// ───────────────────────────────────────────────────────────────

/** Save game progress */
function saveProgress() {
  Save.set(`ix_${GAME_ID}_progress`, {
    coins: G.coins,
    totalScore: G.totalScore,
    upgrades: G.upgrades,
    stageCleared: G.stageCleared,
    stageStars: G.stageStars,
    seed: G.seed,
    lang: G.lang
  });
}

/** Load game progress */
function loadProgress() {
  const data = Save.get(`ix_${GAME_ID}_progress`, null);
  if (data) {
    G.coins = data.coins || 0;
    G.totalScore = data.totalScore || 0;
    G.upgrades = data.upgrades || { light: 0, refract: 0, crystal: 0 };
    G.stageCleared = data.stageCleared || {};
    G.stageStars = data.stageStars || {};
    G.seed = data.seed || Date.now() % 10000;
    G.lang = data.lang || 'ko';
  } else {
    G.seed = Date.now() % 10000;
  }
}

// ───────────────────────────────────────────────────────────────
// §15. STAGE SETUP
// ───────────────────────────────────────────────────────────────

/** Initialize a stage for play */
function setupStage(zone, stage) {
  G.zone = zone;
  G.stage = stage;
  G.playState = PS.SETUP;

  const stageData = generateValidStage(zone, stage);
  G.grid = stageData.grid;
  G.wallCells = stageData.walls;
  G.lightSource = stageData.lightSource;
  G.cores = stageData.cores;
  G.spawnPoints = stageData.spawnPoints;

  G.placedCrystals = [];
  G.lightPaths = [];
  G.enemies = [];
  G.energy = INIT_ENERGY + ddaExtraEnergy();
  G.maxEnergy = G.energy;
  G.wave = 0;
  G.maxWaves = (WAVE_COMPOSITIONS[`${zone}-${stage}`] || [{ E1: 5 }]).length;
  G.stageTimer = 0;
  G.comboCount = 0;
  G.comboTimer = 0;
  G.score = 0;
  G.waveClearing = false;
  G.waveStarted = false;
  G.waveEnemiesSpawned = 0;
  G.waveEnemiesToSpawn = 0;
  G.spawnTimer = 0;
  G.selectedCrystal = 0;
  G.crystalAngle = 0;
  G.hintCells = [];
  G.shakeIntensity = 0;
  G.notifications = [];
  G.floatingTexts = [];

  // Set inventory based on zone/stage
  const n = absStageNum(zone, stage);
  G.inventory = [3, 0, 0, 0, 0, 0, 0];
  if (isCrystalUnlocked(1, zone, stage)) G.inventory[1] = 1;
  if (isCrystalUnlocked(2, zone, stage)) G.inventory[2] = 1;
  if (isCrystalUnlocked(3, zone, stage)) G.inventory[3] = 1;
  if (isCrystalUnlocked(4, zone, stage)) G.inventory[4] = 1;
  if (isCrystalUnlocked(5, zone, stage)) G.inventory[5] = 1;
  if (isCrystalUnlocked(6, zone, stage)) G.inventory[6] = 1;

  // R3: Zone 2 moving walls (stages 2-1 and 2-2)
  G.movingWalls = [];
  if (zone === 2 && stage <= 2) {
    const mwRng = new SeededRNG(G.seed + zone * 200 + stage * 20);
    // Pick up to 2 wall cells to make moving
    const eligibleWalls = G.wallCells.filter(w => {
      // Must have empty adjacent cell to move to
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      return dirs.some(([dx, dy]) => {
        const nx = w.x + dx, ny = w.y + dy;
        return inGrid(nx, ny) && G.grid[nx][ny] === CELL.EMPTY;
      });
    });
    const mwCount = Math.min(stage, eligibleWalls.length);
    const shuffled = mwRng.shuffle(eligibleWalls);
    for (let i = 0; i < mwCount; i++) {
      const w = shuffled[i];
      // Find a valid alternate position
      const dirs = mwRng.shuffle([[1,0],[-1,0],[0,1],[0,-1]]);
      for (const [dx, dy] of dirs) {
        const nx = w.x + dx, ny = w.y + dy;
        if (inGrid(nx, ny) && G.grid[nx][ny] === CELL.EMPTY) {
          G.movingWalls.push({ x: w.x, y: w.y, x2: nx, y2: ny, timer: 0, interval: 3 + mwRng.nextFloat(0, 2) });
          break;
        }
      }
    }
  }

  // DDA hint system
  const hintCount = ddaHintCount();
  if (hintCount > 0) {
    generateHints(hintCount);
  }

  // Calculate grid layout
  calculateGridLayout();

  // Tutorial for first stage
  if (zone === 1 && stage === 1 && !G.tutorialShown) {
    addNotification(t('tutorial1'), 5);
    G.tutorialShown = true;
  }
}

/** Calculate grid layout based on screen size */
function calculateGridLayout() {
  const w = engine.W;
  const h = engine.H;
  const margin = input.isMobile ? 10 : 20;
  const topBar = 40;
  const bottomBar = input.isMobile ? 60 : 52;

  const availW = w - margin * 2;
  const availH = h - topBar - bottomBar - margin;

  G.cellSize = Math.max(MIN_TOUCH_SIZE / 1.5, Math.min(
    Math.floor(availW / GRID_COLS),
    Math.floor(availH / GRID_ROWS)
  ));

  // Ensure minimum touch target
  if (input.isMobile) G.cellSize = Math.max(30, G.cellSize);

  const gridW = GRID_COLS * G.cellSize;
  const gridH = GRID_ROWS * G.cellSize;

  G.gridOffsetX = Math.floor((w - gridW) / 2);
  G.gridOffsetY = topBar + Math.floor((availH - gridH) / 2);
}

/** Generate DDA hint cells */
function generateHints(count) {
  // Simple hint: suggest positions for crystals
  G.hintCells = [];
  const rngHint = new SeededRNG(G.seed + G.zone * 1000 + G.stage * 100);
  let placed = 0;

  for (let x = 2; x < GRID_COLS - 2 && placed < count; x++) {
    for (let y = 0; y < GRID_ROWS && placed < count; y++) {
      if (G.grid[x][y] === CELL.EMPTY && rngHint.next() > 0.7) {
        G.hintCells.push({ x, y });
        placed++;
      }
    }
  }
}

// ───────────────────────────────────────────────────────────────
// §16. WAVE MANAGEMENT
// ───────────────────────────────────────────────────────────────

/** R2: Apply wind effect in Zone 3 — shift crystals 1 cell in random direction */
function applyWindEffect() {
  const windRng = new SeededRNG(G.seed + G.zone * 1000 + G.stage * 100 + G.wave);
  G.windDirection = windRng.nextInt(0, 3); // 0=right, 1=down, 2=left, 3=up
  const dv = DIR_VEC[G.windDirection];
  const windDirNames = { ko: ['→', '↓', '←', '↑'], en: ['→', '↓', '←', '↑'] };

  addNotification(`💨 ${G.lang === 'ko' ? '바람' : 'Wind'} ${windDirNames[G.lang][G.windDirection]}`, 2);

  // Shift all placed crystals
  const toMove = [];
  for (const c of G.placedCrystals) {
    const ngx = c.gx + dv.dx;
    const ngy = c.gy + dv.dy;
    toMove.push({ crystal: c, ngx, ngy, ogx: c.gx, ogy: c.gy });
  }

  for (const m of toMove) {
    const { crystal, ngx, ngy, ogx, ogy } = m;
    // Only move if new position is valid and empty (not wall/core/source/another crystal)
    if (inGrid(ngx, ngy) && G.grid[ngx][ngy] === CELL.EMPTY) {
      // Check no other crystal already occupies the target
      const occupied = G.placedCrystals.some(c => c !== crystal && c.gx === ngx && c.gy === ngy);
      if (!occupied) {
        G.grid[ogx][ogy] = CELL.EMPTY;
        G.grid[ngx][ngy] = CELL.CRYSTAL;
        crystal.gx = ngx;
        crystal.gy = ngy;
      }
    }
    // If blocked, crystal stays in place
  }

  recalcLight();
  SND.sfx('light');
}

/** Start a wave */
function startWave() {
  if (G.waveStarted) return;
  G.waveStarted = true;
  G.wave++;
  G.playState = PS.WAVE;

  // R2: Zone 3 wind effect — shift crystals 1 cell per wave
  if (G.zone === 3 && G.placedCrystals.length > 0) {
    applyWindEffect();
  }

  const waveKey = `${G.zone}-${G.stage}`;
  const waves = WAVE_COMPOSITIONS[waveKey] || [{ E1: 5 }];
  const waveIdx = Math.min(G.wave - 1, waves.length - 1);
  const waveData = waves[waveIdx];

  // Queue enemies to spawn
  G.waveEnemiesToSpawn = 0;
  G._spawnQueue = [];
  for (const [key, count] of Object.entries(waveData)) {
    const typeIdx = parseInt(key.substring(1)) - 1;
    for (let i = 0; i < count; i++) {
      G._spawnQueue.push(typeIdx);
      G.waveEnemiesToSpawn++;
    }
  }
  G.waveEnemiesSpawned = 0;
  G.spawnTimer = 0;
  G.spawnInterval = Math.max(0.8, 2.5 - absStageNum(G.zone, G.stage) * 0.1);

  SND.sfx('light');
}

/** Check if wave/stage is complete */
function checkWaveComplete() {
  if (G.waveClearing) return; // F5: guard flag

  const allCoresPurified = G.cores.every(c => c.purified);

  // R4: Alternative clear — survival time exceeded + cores purified
  const diff = stageDifficulty(absStageNum(G.zone, G.stage));
  const allSpawnedAndDead = G.waveEnemiesSpawned >= G.waveEnemiesToSpawn &&
      G.enemies.filter(e => !e.dead).length === 0;
  const survivalTimeMet = G.stageTimer >= diff.clearTime && allCoresPurified;

  if (allSpawnedAndDead && allCoresPurified || survivalTimeMet) {
    G.waveClearing = true; // F5: set guard

    // If clearing by survival time, kill remaining enemies
    if (survivalTimeMet && !allSpawnedAndDead) {
      G.enemies.forEach(e => { e.dead = true; e.alpha = 0; });
    }

    if (G.wave >= G.maxWaves) {
      stageComplete();
    } else {
      // More waves — back to setup
      G.waveStarted = false;
      G.waveClearing = false;
      G.playState = PS.SETUP;
      addNotification(`${t('wave')} ${G.wave} ${t('clear')}`, 2);
      SND.sfx('clear');
    }
  }
}

/** Handle core purification check */
function checkCorePurification() {
  for (const core of G.cores) {
    if (core.purified) continue;

    const hit = lightHitsCell(G.lightPaths, core.x, core.y);
    if (hit.hit) {
      // Check color match
      let colorMatch = false;
      if (core.color === 'white' && (hit.color === 'white' || hit.color === 'red' || hit.color === 'blue')) {
        colorMatch = true;
      } else if (core.color === hit.color) {
        colorMatch = true;
      }

      if (colorMatch) {
        core.purified = true;
        const cp = gridToPixel(core.x, core.y, G.gridOffsetX, G.gridOffsetY, G.cellSize);
        particles.emit(cp.px, cp.py, 20, { color: COL.PURIFY, speed: 100, life: 1.0, size: 4 });
        addFloatingText(t('clear'), cp.px, cp.py - 20, COL.PURIFY, 20);
        SND.sfx('combo');
      }
    }
  }
}

/** Handle stage completion */
function stageComplete() {
  G.playState = PS.CLEAR;
  const n = absStageNum(G.zone, G.stage);
  const diff = stageDifficulty(n);

  // Calculate score (F8: judge first)
  const baseScore = G.enemies.length * 100;
  const timeBonus = Math.max(0, (diff.clearTime - G.stageTimer) * 10);
  const noDamage = G.energy === G.maxEnergy ? 500 : 0;
  const stageScore = Math.floor(baseScore + timeBonus + noDamage);

  const stageKey = `${G.zone}-${G.stage}`;
  const prevBest = Save.get(`ix_${GAME_ID}_stage_${stageKey}`, 0);
  G.newBestFlag = stageScore > prevBest;

  // Stars
  let stars = 1;
  if (timeBonus > 0) stars = 2;
  if (noDamage > 0) stars = 3;

  G.score = stageScore;
  G.totalScore += stageScore;
  G.coins += diff.coinDrop * 3;

  // Save (F8: save after judge)
  Save.set(`ix_${GAME_ID}_stage_${stageKey}`, Math.max(stageScore, prevBest));
  G.stageCleared[stageKey] = true;
  G.stageStars[stageKey] = Math.max(stars, G.stageStars[stageKey] || 0);
  Save.setHighScore(GAME_ID, G.totalScore);
  saveProgress();

  SND.sfx('clear');
  G.shakeIntensity = 5;
  particles.emit(engine.W / 2, engine.H / 3, 30, { color: COL.COIN, speed: 150, life: 1.0 });

  if (G.newBestFlag) addNotification(t('newBest'), 3);
  addNotification(`${t('score')}: ${stageScore}`, 3);

  // Reset DDA on success
  G.failCount = 0;
  G.dda = 0;
}

/** Handle stage failure */
function stageFail() {
  G.playState = PS.DEAD;
  G.failCount++;
  G.dda = clamp(Math.floor(G.failCount / 2), 0, MAX_DDA_LV);
  G.shakeIntensity = 10;
  SND.sfx('gameover');

  particles.emit(engine.W / 2, engine.H / 2, 20, { color: COL.RED, speed: 100, life: 0.8 });
}

// ───────────────────────────────────────────────────────────────
// §17. BLAST CRYSTAL SYSTEM
// ───────────────────────────────────────────────────────────────

/** Check and execute blast crystal explosions */
function checkBlastCrystals(dt) {
  for (const c of G.placedCrystals) {
    if (CRYSTAL_TYPES[c.type].id !== 'C7') continue;
    if (!c._active) continue;

    if (!c._cooldown) c._cooldown = 0;
    c._cooldown -= dt / 1000;

    if (c._cooldown <= 0) {
      const blastRange = 3 * G.cellSize;
      const cp = gridToPixel(c.gx, c.gy, G.gridOffsetX, G.gridOffsetY, G.cellSize);
      let blasted = false;

      for (const e of G.enemies) {
        if (e.dead) continue;
        if (dist(e.x, e.y, cp.px, cp.py) < blastRange) {
          e.hp = 0;
          e.dead = true;
          blasted = true;
        }
      }

      if (blasted) {
        const cooldown = getUpgrade('crystal') >= 4 ? 3 : 5;
        c._cooldown = cooldown;
        particles.emit(cp.px, cp.py, 30, { color: COL.LIGHT, speed: 200, life: 0.6, size: 5 });
        SND.sfx('hit');
      }
    }
  }
}

// ───────────────────────────────────────────────────────────────
// §18. INPUT HANDLING
// ───────────────────────────────────────────────────────────────

/** Handle input for PLAY state */
function handlePlayInput(dt) {
  const dtSec = dt / 1000;

  // Crystal rotation (Q/E keys)
  if (input.jp('KeyQ')) {
    G.crystalAngle = (G.crystalAngle + 3) % 4;
    SND.sfx('rotate');
  }
  if (input.jp('KeyE')) {
    G.crystalAngle = (G.crystalAngle + 1) % 4;
    SND.sfx('rotate');
  }

  // Crystal selection (1-7 keys)
  for (let i = 0; i < 7; i++) {
    if (input.jp(`Digit${i + 1}`) && isCrystalUnlocked(i, G.zone, G.stage) && G.inventory[i] > 0) {
      G.selectedCrystal = i;
      SND.sfx('select');
    }
  }

  // Pause
  if (input.jp('KeyP') || input.jp('Escape')) {
    if (G.playState === PS.WAVE || G.playState === PS.SETUP) {
      G.playState = PS.PAUSED;
      SND.sfx('select');
    } else if (G.playState === PS.PAUSED) {
      G.playState = G.waveStarted ? PS.WAVE : PS.SETUP;
      SND.sfx('select');
    }
  }

  // C3: Two-finger tap pause (mobile)
  if (input.touches.length >= 2) {
    if (!G._twoFingerPauseUsed) {
      G._twoFingerPauseUsed = true;
      if (G.playState === PS.WAVE || G.playState === PS.SETUP) {
        G.playState = PS.PAUSED;
        SND.sfx('select');
      } else if (G.playState === PS.PAUSED) {
        G.playState = G.waveStarted ? PS.WAVE : PS.SETUP;
        SND.sfx('select');
      }
    }
  } else {
    G._twoFingerPauseUsed = false;
  }

  // Restart (R key)
  if (input.jp('KeyR')) {
    if (G.playState === PS.DEAD || G.playState === PS.CLEAR) {
      if (G.playState === PS.DEAD) {
        setupStage(G.zone, G.stage);
      } else {
        // Return to map after clear
        beginTransition(STATE.PLAY, STATE.MAP, () => { SND.startBGM('map'); });
      }
    }
  }

  // Space — start wave or pause
  if (input.jp('Space')) {
    if (G.playState === PS.SETUP && !G.waveStarted) {
      startWave();
    } else if (G.playState === PS.WAVE) {
      G.playState = PS.PAUSED;
    } else if (G.playState === PS.PAUSED) {
      G.playState = G.waveStarted ? PS.WAVE : PS.SETUP;
    }
  }

  // Mouse hover — track grid position
  const gp = pixelToGrid(input.mouseX, input.mouseY, G.gridOffsetX, G.gridOffsetY, G.cellSize);
  G.mouseGridX = gp.gx;
  G.mouseGridY = gp.gy;

  // Right-click — remove crystal
  if (G.rightClicked && G.playState === PS.SETUP) {
    const rgp = pixelToGrid(G.rightClickX, G.rightClickY, G.gridOffsetX, G.gridOffsetY, G.cellSize);
    removeCrystalAt(rgp.gx, rgp.gy);
    G.rightClicked = false;
  }

  // Touch/click handling
  if (input.tapped) {
    const tapGP = pixelToGrid(input.tapX, input.tapY, G.gridOffsetX, G.gridOffsetY, G.cellSize);

    if (G.playState === PS.SETUP) {
      handleSetupTap(tapGP.gx, tapGP.gy, input.tapX, input.tapY);
    } else if (G.playState === PS.WAVE) {
      handleWaveTap(tapGP.gx, tapGP.gy, input.tapX, input.tapY);
    } else if (G.playState === PS.DEAD) {
      handleDeadTap(input.tapX, input.tapY);
    } else if (G.playState === PS.CLEAR) {
      handleClearTap(input.tapX, input.tapY);
    } else if (G.playState === PS.PAUSED) {
      handlePauseTap(input.tapX, input.tapY);
    }
  }

  // Long press detection for crystal removal (mobile)
  if (input.mouseDown && G.playState === PS.SETUP) {
    const lpGP = pixelToGrid(input.mouseX, input.mouseY, G.gridOffsetX, G.gridOffsetY, G.cellSize);
    if (G.longPressCell && G.longPressCell.gx === lpGP.gx && G.longPressCell.gy === lpGP.gy) {
      G.longPressTimer += dtSec;
      if (G.longPressTimer >= 0.5) {
        removeCrystalAt(lpGP.gx, lpGP.gy);
        G.longPressTimer = 0;
        G.longPressCell = null;
      }
    } else {
      G.longPressCell = { gx: lpGP.gx, gy: lpGP.gy };
      G.longPressTimer = 0;
    }
  } else {
    G.longPressTimer = 0;
    G.longPressCell = null;
  }

  G.rightClicked = false;
}

/** Handle tap during setup phase */
function handleSetupTap(gx, gy, tapX, tapY) {
  const w = engine.W;
  const h = engine.H;

  // Check bottom bar buttons first
  const bottomY = h - (input.isMobile ? 58 : 50);
  const btnH = Math.max(MIN_TOUCH_SIZE, 40);

  // Start wave button
  const startBtnW = 100;
  const startBtnX = w - startBtnW - 15;
  if (UI.hitTest(tapX, tapY, startBtnX, bottomY, startBtnW, btnH)) {
    startWave();
    return;
  }

  // Crystal selection buttons
  const crystalBarX = 10;
  const crystalBtnSize = Math.max(MIN_TOUCH_SIZE, 42);
  for (let i = 0; i < 7; i++) {
    if (!isCrystalUnlocked(i, G.zone, G.stage)) continue;
    const bx = crystalBarX + i * (crystalBtnSize + 4);
    if (UI.hitTest(tapX, tapY, bx, bottomY, crystalBtnSize, btnH)) {
      G.selectedCrystal = i;
      SND.sfx('select');
      return;
    }
  }

  // Grid interaction
  if (!inGrid(gx, gy)) return;

  // Check if there's already a crystal here
  const existingCrystal = G.placedCrystals.find(c => c.gx === gx && c.gy === gy);
  if (existingCrystal) {
    // Tap to rotate
    existingCrystal.angle = (existingCrystal.angle + 1) % 4;
    SND.sfx('rotate');
    recalcLight();
    return;
  }

  // Place crystal on empty cell
  if (G.grid[gx][gy] === CELL.EMPTY && G.inventory[G.selectedCrystal] > 0) {
    placeCrystalAt(gx, gy, G.selectedCrystal, G.crystalAngle);
  }
}

/** Handle tap during wave phase */
function handleWaveTap(gx, gy, tapX, tapY) {
  // During wave, can only rotate existing crystals (if upgrade)
  if (getUpgrade('refract') >= 3 && inGrid(gx, gy)) {
    const crystal = G.placedCrystals.find(c => c.gx === gx && c.gy === gy);
    if (crystal) {
      crystal.angle = (crystal.angle + 1) % 4;
      SND.sfx('rotate');
      recalcLight();
    }
  }
}

/** Handle tap during dead state */
function handleDeadTap(tapX, tapY) {
  const w = engine.W, h = engine.H;
  const btnW = 160, btnH = 48;
  const btnX = (w - btnW) / 2;

  // Retry button
  if (UI.hitTest(tapX, tapY, btnX, h / 2 + 30, btnW, btnH)) {
    setupStage(G.zone, G.stage);
    return;
  }

  // Back to map button
  if (UI.hitTest(tapX, tapY, btnX, h / 2 + 90, btnW, btnH)) {
    beginTransition(STATE.PLAY, STATE.MAP, () => { SND.startBGM('map'); });
  }
}

/** Handle tap during clear state */
function handleClearTap(tapX, tapY) {
  const w = engine.W, h = engine.H;
  const btnW = 160, btnH = 48;
  const btnX = (w - btnW) / 2;

  if (UI.hitTest(tapX, tapY, btnX, h / 2 + 50, btnW, btnH)) {
    beginTransition(STATE.PLAY, STATE.MAP, () => { SND.startBGM('map'); });
  }
}

/** Handle tap during paused state */
function handlePauseTap(tapX, tapY) {
  const w = engine.W, h = engine.H;
  const btnW = 160, btnH = 48;
  const btnX = (w - btnW) / 2;

  // Resume
  if (UI.hitTest(tapX, tapY, btnX, h / 2 - 10, btnW, btnH)) {
    G.playState = G.waveStarted ? PS.WAVE : PS.SETUP;
    return;
  }

  // Restart
  if (UI.hitTest(tapX, tapY, btnX, h / 2 + 50, btnW, btnH)) {
    setupStage(G.zone, G.stage);
    return;
  }

  // Back to map
  if (UI.hitTest(tapX, tapY, btnX, h / 2 + 110, btnW, btnH)) {
    beginTransition(STATE.PLAY, STATE.MAP, () => { SND.startBGM('map'); });
  }
}

/** Place crystal on grid */
function placeCrystalAt(gx, gy, typeIdx, angle) {
  G.placedCrystals.push({
    gx, gy,
    type: typeIdx,
    angle: angle,
    _active: false,
    _cooldown: 0
  });
  G.grid[gx][gy] = CELL.CRYSTAL;
  G.inventory[typeIdx]--;
  SND.sfx('place');

  const cp = gridToPixel(gx, gy, G.gridOffsetX, G.gridOffsetY, G.cellSize);
  particles.emit(cp.px, cp.py, 8, { color: COL.CRYSTAL, speed: 60, life: 0.4, size: 3 });

  recalcLight();
}

/** Remove crystal from grid */
function removeCrystalAt(gx, gy) {
  const idx = G.placedCrystals.findIndex(c => c.gx === gx && c.gy === gy);
  if (idx === -1) return;

  const crystal = G.placedCrystals[idx];
  G.inventory[crystal.type]++;
  G.grid[gx][gy] = CELL.EMPTY;
  G.placedCrystals.splice(idx, 1);
  SND.sfx('rotate');

  recalcLight();
}

/** Recalculate light paths */
function recalcLight() {
  // Reset active states
  for (const c of G.placedCrystals) c._active = false;

  G.lightPaths = traceLight(G.grid, G.lightSource, G.placedCrystals, 50, G.enemies);

  // Check core purification
  checkCorePurification();
}

/** Handle MAP state input */
function handleMapInput() {
  if (input.jp('Escape')) {
    beginTransition(STATE.MAP, STATE.TITLE, () => { SND.startBGM('title'); });
    return;
  }

  // Toggle language
  if (input.jp('KeyP')) {
    G.lang = G.lang === 'ko' ? 'en' : 'ko';
    saveProgress();
    SND.sfx('select');
  }

  // Toggle shop
  if (input.jp('KeyS')) {
    G.showShop = !G.showShop;
    SND.sfx('select');
  }

  if (!input.tapped) return;

  const w = engine.W, h = engine.H;

  // Language toggle button (top-right)
  if (UI.hitTest(input.tapX, input.tapY, w - 70, 8, 60, 30)) {
    G.lang = G.lang === 'ko' ? 'en' : 'ko';
    saveProgress();
    SND.sfx('select');
    return;
  }

  // Shop button
  if (UI.hitTest(input.tapX, input.tapY, w - 140, 8, 60, 30)) {
    G.showShop = !G.showShop;
    SND.sfx('select');
    return;
  }

  // If shop is open, handle shop taps
  if (G.showShop) {
    handleShopTap(input.tapX, input.tapY);
    return;
  }

  // Stage selection
  handleStageSelection(input.tapX, input.tapY);
}

/** Handle stage selection on map */
function handleStageSelection(tapX, tapY) {
  const w = engine.W, h = engine.H;
  const startY = 80;
  const nodeSize = Math.max(MIN_TOUCH_SIZE, 50);
  const spacing = Math.min(110, (w - 60) / 4);

  for (let z = 1; z <= TOTAL_ZONES; z++) {
    const zoneY = startY + (z - 1) * 120;

    for (let s = 1; s <= STAGES_PER_ZONE; s++) {
      const nodeX = 50 + (s - 1) * spacing;
      const nodeY = zoneY + 30;
      const stageKey = `${z}-${s}`;

      if (UI.hitTest(tapX, tapY, nodeX - nodeSize / 2, nodeY - nodeSize / 2, nodeSize, nodeSize)) {
        // Check if stage is accessible
        if (isStageAccessible(z, s)) {
          SND.sfx('select');
          beginTransition(STATE.MAP, STATE.PLAY, () => {
            setupStage(z, s);
            SND.startBGM('play');
          });
        }
        return;
      }
    }

    // Boss node
    const bossX = 50 + STAGES_PER_ZONE * spacing;
    const bossY = zoneY + 30;
    const bossKey = `${z}-boss`;

    if (UI.hitTest(tapX, tapY, bossX - nodeSize / 2, bossY - nodeSize / 2, nodeSize, nodeSize)) {
      // Boss accessible only if all 3 stages cleared
      const allCleared = [1, 2, 3].every(s => G.stageCleared[`${z}-${s}`]);
      if (allCleared && !G.stageCleared[bossKey]) {
        SND.sfx('select');
        beginTransition(STATE.MAP, STATE.BOSS, () => {
          initBoss(z - 1);
          setupBossStage();
          SND.startBGM('boss');
        });
      } else if (G.stageCleared[bossKey]) {
        addNotification(t('bossDefeat'), 1.5);
      }
      return;
    }
  }
}

/** Check if a stage is accessible */
function isStageAccessible(zone, stage) {
  if (zone === 1 && stage === 1) return true;
  // Previous stage in same zone must be cleared
  if (stage > 1) return !!G.stageCleared[`${zone}-${stage - 1}`];
  // First stage of new zone: previous zone boss must be cleared
  return !!G.stageCleared[`${zone - 1}-boss`];
}

/** Handle shop tap */
function handleShopTap(tapX, tapY) {
  const w = engine.W, h = engine.H;
  const shopW = Math.min(350, w - 40);
  const shopX = (w - shopW) / 2;
  const shopY = 80;
  const btnH = 48;
  const branches = ['light', 'refract', 'crystal'];

  for (let i = 0; i < 3; i++) {
    const by = shopY + 40 + i * (btnH + 16);
    const bx = shopX + shopW - 100;
    if (UI.hitTest(tapX, tapY, bx, by, 90, btnH)) {
      purchaseUpgrade(branches[i]);
      return;
    }
  }

  // Close button
  if (UI.hitTest(tapX, tapY, shopX + shopW - 40, shopY - 5, 35, 35)) {
    G.showShop = false;
    SND.sfx('select');
  }
}

/** Setup grid for boss fight */
function setupBossStage() {
  // Simple grid for boss arena
  G.grid = [];
  for (let x = 0; x < GRID_COLS; x++) {
    G.grid[x] = [];
    for (let y = 0; y < GRID_ROWS; y++) {
      G.grid[x][y] = CELL.EMPTY;
    }
  }

  G.lightSource = { x: 0, y: 3, dir: 0 };
  G.grid[0][3] = CELL.SOURCE;
  G.cores = [];
  G.placedCrystals = [];
  G.lightPaths = [];
  G.enemies = [];
  G.energy = INIT_ENERGY + 3;
  G.maxEnergy = G.energy;
  G.playState = PS.BOSS_INTRO;
  G.introTimer = 3;
  G.introPhase = 0;
  G.spawnPoints = [{ x: 11, y: 2 }, { x: 11, y: 5 }];
  G.waveStarted = true;
  G.stageTimer = 0;
  G.shakeIntensity = 0;

  // Boss gets more crystals
  G.inventory = [4, 2, 1, 2, 2, 1, 1];
  if (G.bossType === 0) G.inventory = [4, 1, 0, 0, 0, 0, 0];
  if (G.bossType === 1) G.inventory = [3, 1, 1, 3, 0, 0, 0];
  if (G.bossType === 2) G.inventory = [3, 2, 1, 2, 2, 1, 0];

  G.selectedCrystal = 0;
  G.crystalAngle = 0;

  calculateGridLayout();
}
