/* ============================================================
   SEEDED RNG — 기획서 §12 (LCG)
   ============================================================ */
function createRng(seed) {
  let s = seed | 0 || (Date.now() ^ 0xDEAD);
  return {
    next() { s = (s * 1664525 + 1013904223) & 0x7FFFFFFF; return s / 0x7FFFFFFF; },
    nextInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); },
    shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = this.nextInt(0, i);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
  };
}

/* ============================================================
   TWEEN MANAGER — Cycle 2~5 확정, clearImmediate 포함
   ============================================================ */
class TweenManager {
  constructor() { this._tweens = []; }
  // 새 tween 추가
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeOut', onComplete };
    for (const k in props) t.props[k] = { from: obj[k], to: props[k] };
    this._tweens.push(t);
    return t;
  }
  // dt 기반 업데이트
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.dur, 1);
      const ep = this._ease(p, t.ease);
      for (const k in t.props) {
        const pr = t.props[k];
        t.obj[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // 즉시 정리 — cancelAll+add 경쟁 조건 방지 (Cycle 4 wisdom)
  clearImmediate() { this._tweens.length = 0; }
  get active() { return this._tweens.length; }
  // easing 함수
  _ease(t, type) {
    if (type === 'easeOut') return 1 - (1 - t) * (1 - t);
    if (type === 'easeIn') return t * t;
    if (type === 'easeInOut') return t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) ** 2 / 2;
    return t; // linear
  }
}

/* ============================================================
   OBJECT POOL — 파티클 풀링
   ============================================================ */
class ObjectPool {
  constructor(factory, max) { this._pool = []; this._factory = factory; this._max = max || 200; }
  get() { return this._pool.length > 0 ? this._pool.pop() : this._factory(); }
  release(obj) { if (this._pool.length < this._max) this._pool.push(obj); }
}

/* ============================================================
   PARTICLE SYSTEM
   ============================================================ */
const particlePool = new ObjectPool(() => ({ x:0,y:0,vx:0,vy:0,life:0,maxLife:1,size:3,color:'#fff',type:'circle' }), 300);
let particles = [];

// 파티클 생성 헬퍼
function spawnParticles(x, y, count, color, spread, life) {
  for (let i = 0; i < count; i++) {
    const p = particlePool.get();
    p.x = x; p.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (spread || 80) + 20;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.life = life || (0.3 + Math.random() * 0.5);
    p.maxLife = p.life;
    p.size = 2 + Math.random() * 4;
    p.color = color || '#fff';
    particles.push(p);
  }
}

// 파티클 업데이트
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particlePool.release(p); particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt; // gravity
  }
}

// 파티클 렌더
function drawParticles(ctx, dt) {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

/* ============================================================
   AUDIO MANAGER — Web Audio 절차적 SFX (§11)
   ============================================================ */
const Audio = (() => {
  let actx = null;
  function ctx() {
    if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    return actx;
  }
  function resume() { if (actx && actx.state === 'suspended') actx.resume(); }
  // 짧은 톤 생성
  function tone(freq, dur, type, vol, freqEnd) {
    const c = ctx(); if (!c) return;
    try {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(freq, c.currentTime);
      if (freqEnd) o.frequency.linearRampToValueAtTime(freqEnd, c.currentTime + dur);
      g.gain.setValueAtTime(vol || 0.15, c.currentTime);
      g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    } catch(e) {}
  }
  // 노이즈 버스트
  function noise(dur, vol) {
    const c = ctx(); if (!c) return;
    try {
      const bufSize = c.sampleRate * dur;
      const buf = c.createBuffer(1, bufSize, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const s = c.createBufferSource(), g = c.createGain();
      s.buffer = buf;
      g.gain.setValueAtTime(vol || 0.1, c.currentTime);
      g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
      s.connect(g); g.connect(c.destination);
      s.start(); s.stop(c.currentTime + dur);
    } catch(e) {}
  }
  return {
    resume,
    cardDraw()    { noise(0.05, 0.15); },
    cardAttack()  { noise(0.1, 0.2); tone(300, 0.1, 'sawtooth', 0.1); },
    cardDefend()  { tone(200, 0.15, 'sine', 0.2); },
    cardSkill()   { tone(800, 0.1, 'triangle', 0.15, 1200); },
    dmgPlayer()   { tone(100, 0.2, 'sine', 0.25); noise(0.15, 0.15); },
    dmgEnemy()    { tone(300, 0.1, 'sine', 0.2); noise(0.08, 0.1); },
    enemyKill()   { tone(200, 0.3, 'sine', 0.2, 800); },
    turnEnd()     { tone(1000, 0.03, 'sine', 0.1); },
    reward()      { tone(523, 0.15, 'sine', 0.15); tone(659, 0.15, 'sine', 0.12); tone(784, 0.2, 'sine', 0.1); },
    healSfx()     { tone(400, 0.2, 'sine', 0.15, 600); },
    poisonTick()  { noise(0.05, 0.08); },
    levelUp()     { tone(659, 0.15, 'sine', 0.15); tone(784, 0.3, 'sine', 0.12); },
    bossAppear()  { tone(50, 1, 'sine', 0.2); },
    victory()     { tone(523,0.15,'sine',0.15); tone(659,0.15,'sine',0.12); tone(784,0.15,'sine',0.1); tone(1047,0.3,'sine',0.15); },
    defeat()      { tone(400, 0.5, 'sine', 0.2, 100); },
    click()       { tone(600, 0.05, 'sine', 0.08); },
    error()       { tone(200, 0.15, 'square', 0.1); tone(150, 0.15, 'square', 0.08); },
  };
})();

// 상태 전환 함수 — 모든 전환 경유 (§5.2)
function beginTransition(nextState, opts) {
  const options = opts || {};
  const priority = STATE_PRIORITY[nextState] || 3;
  // 가드: 전환 중 더 낮은 우선순위는 차단
  if (isTransitioning && priority < (STATE_PRIORITY[transObj._target] || 3)) return;
  if (options.immediate) {
    isTransitioning = false;
    enterState(nextState);
    return;
  }
  isTransitioning = true;
  transObj._target = nextState;
  transObj.alpha = 0;
  tw.add(transObj, { alpha: 1 }, CONFIG.TRANSITION_FADE_DURATION, 'easeIn', () => {
    enterState(nextState);
    tw.add(transObj, { alpha: 0 }, CONFIG.TRANSITION_FADE_DURATION, 'easeOut', () => {
      isTransitioning = false;
    });
  });
}

function createStarterDeck() {
  const deck = [];
  for (let i = 0; i < 5; i++) deck.push(makeCard('strike'));
  for (let i = 0; i < 3; i++) deck.push(makeCard('defend'));
  deck.push(makeCard('rush'));
  deck.push(makeCard('guard'));
  return deck;
}

// 카드 인스턴스 생성
function makeCard(id, upgraded) {
  const def = CARD_DEFS[id];
  return { id, name: def.name + (upgraded ? '+' : ''), type: def.type, cost: def.cost,
           desc: def.desc, val: upgraded ? def.upVal : def.val, upgraded: !!upgraded,
           hits: def.hits, poison: def.poison, aoe: def.aoe, dmg: upgraded ? def.upDmg : def.dmg,
           uid: Math.random().toString(36).slice(2, 8) };
}

/* ============================================================
   PURE FUNCTIONS — §10 순수 함수, 전역 참조 0건
   ============================================================ */

// 덱에서 N장 드로우
function drawCards(drawPile, discardPile, count, rng) {
  const drawn = [];
  let dp = drawPile.slice(), disc = discardPile.slice();
  for (let i = 0; i < count; i++) {
    if (dp.length === 0) {
      if (disc.length === 0) break;
      dp = rng.shuffle(disc);
      disc = [];
    }
    drawn.push(dp.shift());
  }
  return { drawn, newDrawPile: dp, newDiscardPile: disc };
}

// 패를 버린 카드 더미로
function discardHand(hand, discardPile) {
  return { newHand: [], newDiscardPile: discardPile.concat(hand) };
}

// 데미지 계산
function calculateDamage(baseDmg, strengthBuff, isRageActive, multiplier) {
  let dmg = baseDmg + strengthBuff;
  if (isRageActive) dmg *= (multiplier || CONFIG.CARD_RAGE_MULTIPLIER);
  return Math.floor(dmg);
}

// 방어도 적용
function applyBlock(player, amount) {
  return Object.assign({}, player, { block: player.block + amount });
}

// 힐 적용
function applyHeal(player, amount, maxHp) {
  return Object.assign({}, player, { hp: Math.min(player.hp + amount, maxHp) });
}

// 독 처리 — 매 턴 종료 시
function applyPoison(enemies) {
  const newEnemies = [];
  const parts = [];
  for (const e of enemies) {
    const ne = Object.assign({}, e);
    if (ne.poison > 0) {
      ne.hp -= ne.poison;
      ne.poison--;
      parts.push({ x: ne.renderX || 0, y: ne.renderY || 0, color: C.poison, count: 5 });
    }
    newEnemies.push(ne);
  }
  return { enemies: newEnemies, particleData: parts };
}

// 적 의도 결정
function getEnemyIntent(enemy, turnCount) {
  const pattern = ENEMY_DEFS[enemy.defId].pattern;
  return pattern[turnCount % pattern.length];
}

// 전투 종료 판정
function checkBattleEnd(player, enemies) {
  if (player.hp <= 0) return 'defeat';
  if (enemies.every(e => e.hp <= 0)) return 'victory';
  return 'ongoing';
}

// 보상 카드 생성
function generateRewards(floor, isElite, rng) {
  const pool = isElite || floor >= 2
    ? CARD_RARITY.common.concat(CARD_RARITY.rare)
    : CARD_RARITY.basic.concat(CARD_RARITY.common);
  const cards = [];
  const used = new Set();
  for (let i = 0; i < 3; i++) {
    let id;
    let tries = 0;
    do { id = pool[rng.nextInt(0, pool.length - 1)]; tries++; } while (used.has(id) && tries < 20);
    used.add(id);
    cards.push(makeCard(id));
  }
  return cards;
}

// 골드 보상 계산
function calcGoldReward(floor, isElite, isBoss, rng) {
  if (isBoss) return CONFIG.GOLD_BOSS_CLEAR;
  if (isElite) return rng.nextInt(CONFIG.GOLD_ELITE_MIN, CONFIG.GOLD_ELITE_MAX);
  return rng.nextInt(CONFIG.GOLD_BATTLE_MIN, CONFIG.GOLD_BATTLE_MAX);
}

// 맵 생성 (§2: 3층)
function generateMap(rng) {
  const map = [];
  // Floor 1: 전투×2, 이벤트×1, 엘리트×1
  const f1types = rng.shuffle(['battle','battle','event','elite']);
  map.push(f1types.map((t, i) => ({ type: t, idx: i, visited: false, available: true })));
  // Floor 2: 전투×1, 상점×1, 휴식×1, 엘리트×1
  const f2types = rng.shuffle(['battle','shop','rest','elite']);
  map.push(f2types.map((t, i) => ({ type: t, idx: i, visited: false, available: false })));
  // Floor 3: 보스×1
  map.push([{ type: 'boss', idx: 0, visited: false, available: false }]);
  return map;
}

// 이용 가능 노드 (한 층에서 4노드 중 3개 선택)
function getAvailableNodes(map, floor) {
  if (floor >= map.length) return [];
  return map[floor].filter(n => !n.visited).map(n => n.idx);
}

// 점수 계산 (§7)
function calculateScore(stats, floor, isVictory) {
  return stats.dmgDealt + floor * 100 + (isVictory ? 500 : 0) - stats.dmgTaken;
}

// 최고 기록 비교 — 판정 먼저, 저장 나중에 (Cycle 2 wisdom)
function isNewBest(current, best) { return current > best; }

// 카드 업그레이드
function upgradeCard(card) {
  const def = CARD_DEFS[card.id];
  return Object.assign({}, card, { name: def.name + '+', val: def.upVal, upgraded: true, dmg: def.upDmg });
}

/* ============================================================
   LOCALSTORAGE WRAPPER — try-catch 안전 (§12)
   ============================================================ */
function saveData(key, val) { try { localStorage.setItem('mcc_' + key, JSON.stringify(val)); } catch(e) {} }
function loadData(key, def) { try { const v = localStorage.getItem('mcc_' + key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }

let bestData = loadData('best', { bestScore:0, totalRuns:0, totalClears:0, totalKills:0, fastestClear:Infinity, cardsSeen:[] });

/* ============================================================
   INPUT MANAGER — 키보드/마우스/터치 통합 (§8)
   ============================================================ */
let inputMode = 'mouse'; // 'mouse' | 'keyboard' | 'touch'
let mouseX = 0, mouseY = 0;
let mouseClicked = false;
let keysPressed = {};
let keyJustPressed = {};
let touchStartTime = 0;
let longPressTarget = null;

// 이벤트 리스너 관리 — destroy() 패턴 (Cycle 3 wisdom)
const listeners = [];
function listen(el, evt, fn, opts) {
  el.addEventListener(evt, fn, opts);
  listeners.push({ el, evt, fn, opts });
}
function destroyListeners() {
  for (const l of listeners) l.el.removeEventListener(l.evt, l.fn, l.opts);
  listeners.length = 0;
}

function setupInput() {
  listen(document, 'keydown', (e) => {
    inputMode = 'keyboard';
    Audio.resume();
    keysPressed[e.key] = true;
    keyJustPressed[e.key] = true;
    e.preventDefault();
  });
  listen(document, 'keyup', (e) => {
    keysPressed[e.key] = false;
  });
  listen(canvas, 'mousemove', (e) => {
    if (inputMode !== 'touch') inputMode = 'mouse';
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  });
  listen(canvas, 'mousedown', (e) => {
    if (inputMode === 'touch') return;
    Audio.resume();
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
    mouseClicked = true;
  });
  listen(canvas, 'touchstart', (e) => {
    inputMode = 'touch';
    Audio.resume();
    e.preventDefault();
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    mouseX = t.clientX - r.left;
    mouseY = t.clientY - r.top;
    mouseClicked = true;
    touchStartTime = Date.now();
  }, { passive: false });
  listen(canvas, 'touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    mouseX = t.clientX - r.left;
    mouseY = t.clientY - r.top;
  }, { passive: false });
  listen(canvas, 'touchend', (e) => {
    e.preventDefault();
  }, { passive: false });
}

// 입력 클리어 (매 프레임 끝)
function clearInput() {
  mouseClicked = false;
  keyJustPressed = {};
}

// 히트 테스트
function hitRect(mx, my, x, y, w, h) { return mx >= x && mx <= x + w && my >= y && my <= y + h; }

/* ============================================================
   ENTER STATE — 상태 진입 초기화 일원화 (§12)
   ============================================================ */
function enterState(newState) {
  prevState = state;
  state = newState;

  if (newState === 'TITLE') {
    bestData = loadData('best', bestData);
  }
  else if (newState === 'MAP') {
    // 현재 층 노드 열기
    if (G.currentFloor < G.map.length) {
      G.map[G.currentFloor].forEach(n => {
        if (!n.visited) n.available = true;
      });
    }
  }
  else if (newState === 'PRE_BATTLE') {
    // 전투 시작 연출
    G.turnCount = 0;
    G.strengthBuff = 0;
    G.isRageActive = false;
    G.selectedCardIdx = -1;
    G.targetEnemyIdx = 0;
    G.isBossEnraged = false;
    // 적 등장 tween은 렌더에서 처리
    preBattleTimer = CONFIG.PRE_BATTLE_DURATION;
  }
  else if (newState === 'PLAYER_TURN') {
    startPlayerTurn();
  }
  else if (newState === 'ENEMY_TURN') {
    enemyActionQueue = [];
    for (let i = 0; i < G.enemies.length; i++) {
      if (G.enemies[i].hp > 0) {
        enemyActionQueue.push(i);
      }
    }
    enemyActionTimer = 0;
    currentEnemyAction = 0;
    enemyActing = false;
  }
  else if (newState === 'REWARD') {
    // 보상 카드 생성
    const node = G.map[G.currentFloor][G.currentNode];
    const isElite = node.type === 'elite';
    const isBoss = node.type === 'boss';
    G.rewardCards = generateRewards(G.currentFloor, isElite, G.rng);
    const gold = calcGoldReward(G.currentFloor, isElite, isBoss, G.rng);
    G.player.gold += gold;
    G.stats.goldEarned += gold;
    rewardGold = gold;
    Audio.reward();
  }
  else if (newState === 'SHOP') {
    // 상점 카드 3장 생성
    G.shopCards = [];
    const pool = CARD_RARITY.common.concat(CARD_RARITY.rare);
    for (let i = 0; i < 3; i++) {
      const id = pool[G.rng.nextInt(0, pool.length - 1)];
      const card = makeCard(id);
      card.shopCost = G.rng.nextInt(CONFIG.SHOP_CARD_COST_MIN, CONFIG.SHOP_CARD_COST_MAX);
      G.shopCards.push(card);
    }
  }
  else if (newState === 'REST') {
    G.restUpgradeIdx = -1;
  }
  else if (newState === 'EVENT') {
    // 랜덤 이벤트 생성
    const events = [
      { text: '신비한 샘', desc: 'HP를 10 회복합니다.', effect: 'heal', val: 10 },
      { text: '보물 상자', desc: '골드 15를 획득합니다.', effect: 'gold', val: 15 },
      { text: '수상한 상인', desc: '랜덤 카드 1장 획득.', effect: 'card' },
    ];
    G.eventData = events[G.rng.nextInt(0, events.length - 1)];
    G.eventData.chosen = false;
  }
  else if (newState === 'VICTORY') {
    const score = calculateScore(G.stats, G.currentFloor, true);
    G.finalScore = score;
    G.isNewBest = isNewBest(score, bestData.bestScore);
    // 판정 먼저, 저장 나중에
    bestData.totalRuns++;
    bestData.totalClears++;
    bestData.totalKills += G.stats.kills;
    if (G.isNewBest) bestData.bestScore = score;
    const clearTime = Date.now() - G.stats.startTime;
    if (clearTime < bestData.fastestClear) bestData.fastestClear = clearTime;
    saveData('best', bestData);
    Audio.victory();
  }
  else if (newState === 'DEFEAT') {
    const score = calculateScore(G.stats, G.currentFloor, false);
    G.finalScore = score;
    G.isNewBest = isNewBest(score, bestData.bestScore);
    bestData.totalRuns++;
    bestData.totalKills += G.stats.kills;
    if (G.isNewBest) bestData.bestScore = score;
    saveData('best', bestData);
    Audio.defeat();
    G.shakeTimer = 0.4;
    G.shakeIntensity = 8;
  }
}

/* ============================================================
   PLAYER TURN LOGIC
   ============================================================ */
function startPlayerTurn() {
  G.player.energy = CONFIG.PLAYER_START_ENERGY;
  G.player.block = 0;
  G.isRageActive = false;
  G.selectedCardIdx = -1;
  G.targetEnemyIdx = 0;
  G.hoveredCardIdx = -1;

  // 독 틱
  if (G.enemies.some(e => e.poison > 0)) {
    const result = applyPoison(G.enemies);
    G.enemies = result.enemies;
    for (const pd of result.particleData) {
      spawnParticles(pd.x, pd.y, pd.count, pd.color, 40, 0.5);
      Audio.poisonTick();
    }
    // 독으로 적이 죽었는지 확인
    G.enemies = G.enemies.filter(e => {
      if (e.hp <= 0) { G.stats.kills++; Audio.enemyKill(); return false; }
      return true;
    });
    if (G.enemies.length === 0) {
      beginTransition('REWARD');
      return;
    }
  }

  // 카드 드로우
  const result = drawCards(G.drawPile, G.discardPile, CONFIG.PLAYER_DRAW_COUNT, G.rng);
  G.hand = result.drawn;
  G.drawPile = result.newDrawPile;
  G.discardPile = result.newDiscardPile;
  for (let i = 0; i < G.hand.length; i++) Audio.cardDraw();

  G.turnCount++;
}

// 카드 사용
function playCard(cardIdx, targetIdx, g) {
  const card = g.hand[cardIdx];
  if (!card || g.player.energy < card.cost) {
    Audio.error();
    return false;
  }

  g.player.energy -= card.cost;
  g.stats.cardsPlayed++;

  const cardType = card.type;
  const val = card.val;

  if (cardType === 'attack') {
    if (card.id === 'flurry') {
      const hits = card.hits || CONFIG.CARD_FLURRY_HITS;
      for (let h = 0; h < hits; h++) {
        if (card.aoe) {
          g.enemies.forEach(e => { if (e.hp > 0) dealDmgToEnemy(e, val, g); });
        } else {
          const t = g.enemies[targetIdx];
          if (t && t.hp > 0) dealDmgToEnemy(t, val, g);
        }
      }
    } else if (card.id === 'execute') {
      const t = g.enemies[targetIdx];
      if (t && t.hp > 0) {
        dealDmgToEnemy(t, val, g);
        if (t.hp > 0 && t.hp / t.maxHp <= CONFIG.CARD_EXECUTE_THRESHOLD) {
          t.hp = 0; // 즉사
          spawnParticles(t.renderX, t.renderY, 20, '#ff0', 100, 0.6);
        }
      }
    } else if (card.aoe) {
      g.enemies.forEach(e => { if (e.hp > 0) dealDmgToEnemy(e, val, g); });
    } else {
      const t = g.enemies[targetIdx];
      if (t && t.hp > 0) dealDmgToEnemy(t, val, g);
    }
    // 독 부여 (맹독검)
    if (card.poison) {
      if (card.aoe) {
        g.enemies.forEach(e => { if (e.hp > 0) e.poison = (e.poison || 0) + card.poison; });
      } else {
        const t = g.enemies[targetIdx];
        if (t && t.hp > 0) t.poison = (t.poison || 0) + card.poison;
      }
    }
    Audio.cardAttack();
  }
  else if (cardType === 'defense') {
    g.player = applyBlock(g.player, val);
    // 반격 카드
    if (card.dmg) {
      const t = g.enemies[targetIdx];
      if (t && t.hp > 0) dealDmgToEnemy(t, card.dmg, g);
    }
    Audio.cardDefend();
    spawnParticles(W * 0.2, H * 0.6, 8, C.block, 30, 0.3);
  }
  else if (cardType === 'skill') {
    if (card.id === 'heal') {
      g.player = applyHeal(g.player, val, g.player.maxHp);
      Audio.healSfx();
      spawnParticles(W * 0.2, H * 0.6, 10, '#2ecc71', 40, 0.4);
      addFloatingText(W * 0.2, H * 0.55, '+' + val + ' HP', '#2ecc71');
    } else if (card.id === 'draw') {
      const r = drawCards(g.drawPile, g.discardPile, val, g.rng);
      g.hand = g.hand.concat(r.drawn);
      g.drawPile = r.newDrawPile;
      g.discardPile = r.newDiscardPile;
    } else if (card.id === 'mist') {
      g.enemies.forEach(e => { if (e.hp > 0) e.poison = (e.poison || 0) + val; });
      spawnParticles(W * 0.65, H * 0.35, 15, C.poison, 80, 0.6);
    } else if (card.id === 'strength') {
      g.strengthBuff += val;
      addFloatingText(W * 0.2, H * 0.55, '공격력 +' + val, '#f39c12');
    } else if (card.id === 'energy') {
      g.player.energy += val;
      addFloatingText(W * 0.2, H * 0.55, '에너지 +' + val, C.energyOrb);
    } else if (card.id === 'rage') {
      g.isRageActive = true;
      addFloatingText(W * 0.2, H * 0.55, '분노!', '#e74c3c');
    }
    Audio.cardSkill();
  }

  // 카드를 버린 카드 파일로
  g.discardPile.push(g.hand.splice(cardIdx, 1)[0]);

  // 적 제거
  g.enemies = g.enemies.filter(e => {
    if (e.hp <= 0) { g.stats.kills++; Audio.enemyKill(); spawnParticles(e.renderX, e.renderY, 15, C.cardAtk, 60, 0.5); return false; }
    return true;
  });

  // 전투 종료 체크
  if (g.enemies.length === 0) {
    beginTransition('REWARD');
  }

  g.selectedCardIdx = -1;
  return true;
}

// 적에게 데미지
function dealDmgToEnemy(enemy, baseDmg, g) {
  const dmg = calculateDamage(baseDmg, g.strengthBuff, g.isRageActive, CONFIG.CARD_RAGE_MULTIPLIER);
  let actual = dmg;
  if (enemy.block > 0) {
    const blocked = Math.min(enemy.block, actual);
    enemy.block -= blocked;
    actual -= blocked;
  }
  enemy.hp = Math.max(0, enemy.hp - actual);
  g.stats.dmgDealt += actual;
  if (actual > 0) {
    spawnParticles(enemy.renderX, enemy.renderY, 8, C.cardAtk, 50, 0.4);
    addFloatingText(enemy.renderX, enemy.renderY - 30, '-' + actual, C.cardAtk);
    Audio.dmgEnemy();
  }
}

// 플레이어에게 데미지
function dealDmgToPlayer(amount, g) {
  let actual = amount;
  if (g.player.block > 0) {
    const blocked = Math.min(g.player.block, actual);
    g.player.block -= blocked;
    actual -= blocked;
  }
  g.player.hp = Math.max(0, g.player.hp - actual);
  g.stats.dmgTaken += actual;
  if (actual > 0) {
    spawnParticles(W * 0.2, H * 0.6, 10, C.cardAtk, 50, 0.4);
    addFloatingText(W * 0.2, H * 0.55, '-' + actual, C.cardAtk);
    Audio.dmgPlayer();
    g.shakeTimer = CONFIG.DAMAGE_SHAKE_DURATION;
    g.shakeIntensity = 5;
  }
}

/* ============================================================
   ENEMY TURN LOGIC
   ============================================================ */
let enemyActionQueue = [];
let currentEnemyAction = 0;
let enemyActionTimer = 0;
let enemyActing = false;
let preBattleTimer = 0;
let rewardGold = 0;

function processEnemyTurn(dt) {
  enemyActionTimer += dt;
  if (enemyActionTimer < CONFIG.ENEMY_ACTION_ANIM_DURATION) return;

  if (currentEnemyAction >= enemyActionQueue.length) {
    // 모든 적 행동 완료
    if (G.player.hp <= 0) {
      beginTransition('DEFEAT');
      return;
    }
    beginTransition('PLAYER_TURN');
    return;
  }

  const eIdx = enemyActionQueue[currentEnemyAction];
  const enemy = G.enemies[eIdx];
  if (!enemy || enemy.hp <= 0) {
    currentEnemyAction++;
    enemyActionTimer = 0;
    return;
  }

  const intent = getEnemyIntent(enemy, G.turnCount - 1);

  if (intent.type === 'attack') {
    dealDmgToPlayer(intent.val + (enemy.atkBuff || 0), G);
  } else if (intent.type === 'defend') {
    enemy.block = (enemy.block || 0) + intent.val;
    spawnParticles(enemy.renderX, enemy.renderY, 5, C.block, 30, 0.3);
  } else if (intent.type === 'buff') {
    enemy.atkBuff = (enemy.atkBuff || 0) + intent.val;
    addFloatingText(enemy.renderX, enemy.renderY - 30, '공격력 +' + intent.val, '#8e44ad');
  } else if (intent.type === 'poison') {
    // 독 부여 = 직접 데미지로 처리
    dealDmgToPlayer(intent.val, G);
    spawnParticles(W * 0.2, H * 0.6, 8, C.poison, 40, 0.4);
  } else if (intent.type === 'summon') {
    // 보스 소환
    const summoned = spawnEnemy('slime', G.rng);
    summoned.hp = intent.val;
    summoned.maxHp = intent.val;
    summoned.name = '소환 슬라임';
    G.enemies.push(summoned);
    addFloatingText(W * 0.65, H * 0.35, '소환!', '#8e44ad');
  } else if (intent.type === 'blast') {
    // 보스 대폭발 — 전체 피해
    dealDmgToPlayer(intent.val + (enemy.atkBuff || 0), G);
    spawnParticles(W * 0.4, H * 0.4, 20, '#ff4444', 100, 0.6);
  }

  // 보스 분노 체크
  if (enemy.defId === 'boss' && !G.isBossEnraged && enemy.hp <= enemy.maxHp * CONFIG.BOSS_ENRAGE_THRESHOLD) {
    G.isBossEnraged = true;
    enemy.atkBuff = (enemy.atkBuff || 0) + CONFIG.BOSS_ENRAGE_BUFF;
    addFloatingText(enemy.renderX, enemy.renderY - 40, '분노! +' + CONFIG.BOSS_ENRAGE_BUFF, '#ff0000');
  }

  currentEnemyAction++;
  enemyActionTimer = 0;

  // 전투 종료 체크
  if (G.player.hp <= 0) {
    beginTransition('DEFEAT');
  }
}

// 적 생성
function spawnEnemy(type, rng) {
  const def = ENEMY_DEFS[type];
  return {
    defId: type, name: def.name, hp: def.hp, maxHp: def.hp,
    block: 0, poison: 0, atkBuff: 0,
    shape: def.shape, color: def.color, isBoss: def.isBoss || false,
    renderX: 0, renderY: 0,
  };
}

// 노드에 따른 적 생성
function spawnEnemiesForNode(nodeType, floor, rng) {
  const enemies = [];
  if (nodeType === 'battle') {
    const types = ['slime','goblin','bat','skeleton'];
    if (floor === 0) {
      enemies.push(spawnEnemy(types[rng.nextInt(0, types.length - 1)], rng));
    } else {
      enemies.push(spawnEnemy(types[rng.nextInt(0, types.length - 1)], rng));
      if (rng.next() > 0.4) enemies.push(spawnEnemy(types[rng.nextInt(0, types.length - 1)], rng));
    }
  } else if (nodeType === 'elite') {
    const elites = ['orc','spider'];
    enemies.push(spawnEnemy(elites[rng.nextInt(0, 1)], rng));
  } else if (nodeType === 'boss') {
    enemies.push(spawnEnemy('boss', rng));
  }
  return enemies;
}

/* ============================================================
   FLOATING TEXT
   ============================================================ */
function addFloatingText(x, y, text, color) {
  G.floatingTexts.push({ x, y, text, color, life: 1.0, vy: -40 });
}

function updateFloatingTexts(dt) {
  for (let i = G.floatingTexts.length - 1; i >= 0; i--) {
    const f = G.floatingTexts[i];
    f.life -= dt;
    f.y += f.vy * dt;
    if (f.life <= 0) G.floatingTexts.splice(i, 1);
  }
}

/* ============================================================
   RENDERING — 100% Canvas 드로잉
   ============================================================ */

// 둥근 사각형 헬퍼
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// 배경 렌더
function drawBackground(ctx) {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, C.bg1);
  grd.addColorStop(1, C.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // 전술 그리드 패턴
  ctx.strokeStyle = 'rgba(0,255,135,0.04)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 별 파티클 (정적)
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  const seed = 42;
  for (let i = 0; i < 50; i++) {
    const sx = ((seed * (i + 1) * 7919) % 10000) / 10000 * W;
    const sy = ((seed * (i + 1) * 6271) % 10000) / 10000 * H * 0.6;
    const ss = ((seed * (i + 1) * 3571) % 10000) / 10000 * 2 + 0.5;
    ctx.fillRect(sx, sy, ss, ss);
  }
}

// HP 바 렌더
function drawHPBar(ctx, current, max, x, y, w, h, color) {
  ctx.fillStyle = '#333';
  roundRect(ctx, x, y, w, h, 3);
  ctx.fill();
  const ratio = Math.max(0, current / max);
  if (ratio > 0) {
    ctx.fillStyle = color;
    roundRect(ctx, x, y, w * ratio, h, 3);
    ctx.fill();
  }
  ctx.fillStyle = C.textMain;
  ctx.font = 'bold ' + Math.max(10, h - 2) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.max(0, current) + '/' + max, x + w / 2, y + h - 2);
}

// 에너지 구슬 렌더
function drawEnergy(ctx, current, max, x, y) {
  for (let i = 0; i < max; i++) {
    const ox = x + i * 28;
    ctx.beginPath();
    ctx.arc(ox, y, 11, 0, Math.PI * 2);
    ctx.fillStyle = i < current ? C.energyOrb : '#333';
    ctx.fill();
    ctx.strokeStyle = i < current ? '#fff' : '#555';
    ctx.lineWidth = 2;
    ctx.stroke();
    if (i < current) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('E', ox, y);
    }
  }
}

// 방패 도형 렌더
function drawShield(ctx, x, y, val) {
  ctx.fillStyle = C.block;
  ctx.beginPath();
  ctx.moveTo(x, y - 12);
  ctx.lineTo(x + 10, y - 8);
  ctx.lineTo(x + 10, y + 4);
  ctx.lineTo(x, y + 12);
  ctx.lineTo(x - 10, y + 4);
  ctx.lineTo(x - 10, y - 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(val, x, y);
}

// 카드 렌더 — §9 스타일
function drawCardVisual(ctx, card, x, y, w, h, cardState) {
  const isHovered = cardState === 'hovered';
  const isSelected = cardState === 'selected';
  const isDisabled = cardState === 'disabled';
  const cy = isHovered ? y - 15 : y;

  ctx.save();
  if (isDisabled) ctx.globalAlpha = 0.5;

  // 카드 배경
  ctx.fillStyle = C.cardBg;
  roundRect(ctx, x, cy, w, h, 8);
  ctx.fill();

  // 타입별 상단 색상 밴드
  const typeColor = card.type === 'attack' ? C.cardAtk : card.type === 'defense' ? C.cardDef : C.cardSkl;
  ctx.fillStyle = typeColor;
  roundRect(ctx, x, cy, w, 28, 8);
  ctx.fill();
  ctx.fillStyle = C.cardBg;
  ctx.fillRect(x, cy + 20, w, 8);

  // 선택 글로우
  if (isSelected) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    roundRect(ctx, x, cy, w, h, 8);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // 코스트 원
  ctx.beginPath();
  ctx.arc(x + 16, cy + 16, 12, 0, Math.PI * 2);
  ctx.fillStyle = C.energyOrb;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(card.cost, x + 16, cy + 16);

  // 카드명
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(card.name, x + w / 2 + 8, cy + 17);

  // 중앙 아이콘 (타입별 도형)
  const cx = x + w / 2, ccy = cy + h * 0.45;
  ctx.fillStyle = typeColor;
  if (card.type === 'attack') {
    // 검 아이콘
    ctx.beginPath();
    ctx.moveTo(cx, ccy - 18);
    ctx.lineTo(cx + 4, ccy + 6);
    ctx.lineTo(cx + 12, ccy + 10);
    ctx.lineTo(cx + 4, ccy + 10);
    ctx.lineTo(cx, ccy + 20);
    ctx.lineTo(cx - 4, ccy + 10);
    ctx.lineTo(cx - 12, ccy + 10);
    ctx.lineTo(cx - 4, ccy + 6);
    ctx.closePath();
    ctx.fill();
  } else if (card.type === 'defense') {
    // 방패 아이콘
    ctx.beginPath();
    ctx.moveTo(cx, ccy - 18);
    ctx.lineTo(cx + 16, ccy - 10);
    ctx.lineTo(cx + 16, ccy + 6);
    ctx.lineTo(cx, ccy + 20);
    ctx.lineTo(cx - 16, ccy + 6);
    ctx.lineTo(cx - 16, ccy - 10);
    ctx.closePath();
    ctx.fill();
  } else {
    // 별 아이콘
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 72 - 90) * Math.PI / 180;
      const r1 = 16, r2 = 7;
      ctx.lineTo(cx + Math.cos(a) * r1, ccy + Math.sin(a) * r1);
      const a2 = ((i * 72 + 36) - 90) * Math.PI / 180;
      ctx.lineTo(cx + Math.cos(a2) * r2, ccy + Math.sin(a2) * r2);
    }
    ctx.closePath();
    ctx.fill();
  }

  // 효과 텍스트
  ctx.fillStyle = C.textCard;
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  let descText = card.desc.replace('{v}', card.val).replace('{p}', card.poison || '').replace('{b}', card.val).replace('{d}', card.dmg || '');
  // 텍스트 줄바꿈
  const maxW = w - 10;
  const words = descText.split('');
  let line = '';
  let ly = cy + h * 0.7;
  for (const ch of words) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, cx, ly);
      line = ch;
      ly += 12;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, cx, ly);

  // 타입 뱃지
  const typeName = card.type === 'attack' ? '공격' : card.type === 'defense' ? '방어' : '스킬';
  ctx.fillStyle = typeColor;
  ctx.globalAlpha = (isDisabled ? 0.5 : 1) * 0.8;
  roundRect(ctx, x + w/2 - 16, cy + h - 18, 32, 14, 3);
  ctx.fill();
  ctx.globalAlpha = isDisabled ? 0.5 : 1;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.fillText(typeName, cx, cy + h - 9);

  ctx.restore();
}

// 적 렌더 — §9 타입별 도형
function drawEnemyVisual(ctx, enemy, x, y, size) {
  enemy.renderX = x;
  enemy.renderY = y;
  const s = enemy.isBoss ? size * 1.5 : size;

  ctx.fillStyle = enemy.color;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;

  if (enemy.shape === 'circle') {
    ctx.beginPath(); ctx.arc(x, y, s/2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else if (enemy.shape === 'triangle') {
    ctx.beginPath();
    ctx.moveTo(x, y - s/2); ctx.lineTo(x + s/2, y + s/2); ctx.lineTo(x - s/2, y + s/2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (enemy.shape === 'vshape') {
    ctx.beginPath();
    ctx.moveTo(x - s/2, y - s/3); ctx.lineTo(x, y + s/3);
    ctx.lineTo(x + s/2, y - s/3); ctx.lineTo(x + s/3, y);
    ctx.lineTo(x, y + s/2); ctx.lineTo(x - s/3, y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (enemy.shape === 'skull') {
    // 해골형
    ctx.beginPath(); ctx.arc(x, y - s*0.1, s*0.4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillRect(x - s*0.15, y + s*0.2, s*0.3, s*0.2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - s*0.15, y - s*0.15, s*0.08, s*0.1);
    ctx.fillRect(x + s*0.07, y - s*0.15, s*0.08, s*0.1);
    ctx.fillStyle = enemy.color;
  } else if (enemy.shape === 'rect') {
    ctx.fillRect(x - s/2, y - s/2, s, s); ctx.strokeRect(x - s/2, y - s/2, s, s);
  } else if (enemy.shape === 'octagon') {
    const r = s / 2;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i * 45 - 22.5) * Math.PI / 180;
      ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (enemy.shape === 'crown') {
    // 보스 왕관형
    ctx.beginPath();
    ctx.moveTo(x - s*0.6, y + s*0.3);
    ctx.lineTo(x - s*0.6, y - s*0.2);
    ctx.lineTo(x - s*0.3, y + s*0.1);
    ctx.lineTo(x, y - s*0.5);
    ctx.lineTo(x + s*0.3, y + s*0.1);
    ctx.lineTo(x + s*0.6, y - s*0.2);
    ctx.lineTo(x + s*0.6, y + s*0.3);
    ctx.closePath();
    ctx.fillStyle = '#8e44ad';
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(x, y - s*0.5, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x - s*0.6, y - s*0.2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + s*0.6, y - s*0.2, 4, 0, Math.PI * 2); ctx.fill();
  }

  // 이름
  ctx.fillStyle = C.textMain;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(enemy.name, x, y + s/2 + 16);

  // HP 바
  drawHPBar(ctx, enemy.hp, enemy.maxHp, x - 30, y + s/2 + 22, 60, 12, C.hpBar);

  // 방어도
  if (enemy.block > 0) {
    drawShield(ctx, x + 35, y - s/2, enemy.block);
  }

  // 독 표시
  if (enemy.poison > 0) {
    ctx.fillStyle = C.poison;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('☠' + enemy.poison, x - 38, y + s/2 + 48);
  }

  // 의도 표시 (§4)
  const intent = getEnemyIntent(enemy, G.turnCount);
  drawIntent(ctx, intent, x, y - s/2 - 22, enemy.atkBuff || 0);
}

// 적 의도 아이콘 렌더
function drawIntent(ctx, intent, x, y, atkBuff) {
  ctx.save();
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 배경
  roundRect(ctx, x - 22, y - 12, 44, 24, 6);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fill();

  if (intent.type === 'attack') {
    ctx.fillStyle = C.cardAtk;
    ctx.fillText('⚔' + (intent.val + atkBuff), x, y);
  } else if (intent.type === 'defend') {
    ctx.fillStyle = C.block;
    ctx.fillText('🛡' + intent.val, x, y);
  } else if (intent.type === 'buff') {
    ctx.fillStyle = '#8e44ad';
    ctx.fillText('⬆+' + intent.val, x, y);
  } else if (intent.type === 'poison') {
    ctx.fillStyle = C.poison;
    ctx.fillText('☠' + intent.val, x, y);
  } else if (intent.type === 'summon') {
    ctx.fillStyle = '#8e44ad';
    ctx.fillText('📦소환', x, y);
  } else if (intent.type === 'blast') {
    ctx.fillStyle = '#ff4444';
    ctx.fillText('💥' + (intent.val + atkBuff), x, y);
  }
  ctx.restore();
}

// 플레이어 캐릭터 렌더 — 파란 다이아몬드
function drawPlayer(ctx, x, y) {
  ctx.save();
  ctx.fillStyle = C.cardDef;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  // 다이아몬드
  const s = 35;
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s, y);
  ctx.lineTo(x, y + s);
  ctx.lineTo(x - s, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // 눈
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 10, y - 8, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 10, y - 8, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(x - 10, y - 8, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 10, y - 8, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// 맵 렌더 (§2)
function drawMap(ctx, map, currentFloor, completedNodes) {
  const mapW = Math.min(W * 0.85, 500);
  const mapH = H * 0.55;
  const startX = (W - mapW) / 2;
  const startY = H * 0.15;

  // 맵 타이틀
  ctx.fillStyle = C.accent;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('── 던전 맵 ──', W / 2, startY - 20);

  // 층별 표시
  ctx.fillStyle = C.textMain;
  ctx.font = '12px monospace';
  ctx.textAlign = 'right';

  const nodeIcons = { battle:'⚔', elite:'💀', event:'❓', shop:'🛒', rest:'🔥', boss:'👑' };
  const floorNames = ['Floor 1', 'Floor 2', 'Boss'];

  for (let f = 0; f < map.length; f++) {
    const fy = startY + f * (mapH / (map.length - 1 || 1));
    ctx.fillStyle = f === currentFloor ? C.accent : C.textSecondary;
    ctx.textAlign = 'left';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(floorNames[f], startX - 70, fy + 4);

    const nodes = map[f];
    const nodeSpacing = mapW / (nodes.length + 1);

    // 연결선
    if (f < map.length - 1) {
      ctx.strokeStyle = 'rgba(0,255,135,0.15)';
      ctx.lineWidth = 1;
      for (const n of nodes) {
        const nx = startX + (n.idx + 1) * nodeSpacing;
        const nextFloor = map[f + 1];
        const nextSpacing = mapW / (nextFloor.length + 1);
        for (const nn of nextFloor) {
          const nnx = startX + (nn.idx + 1) * nextSpacing;
          const nny = startY + (f + 1) * (mapH / (map.length - 1 || 1));
          ctx.beginPath();
          ctx.moveTo(nx, fy);
          ctx.lineTo(nnx, nny);
          ctx.stroke();
        }
      }
    }

    for (const n of nodes) {
      const nx = startX + (n.idx + 1) * nodeSpacing;
      const radius = n.type === 'boss' ? 28 : 22;

      // 노드 원
      ctx.beginPath();
      ctx.arc(nx, fy, radius, 0, Math.PI * 2);
      if (n.visited) {
        ctx.fillStyle = C.nodeDone;
      } else if (n.available && f === currentFloor) {
        ctx.fillStyle = C.nodeActive;
        // 글로우
        ctx.shadowColor = C.accent;
        ctx.shadowBlur = 12;
      } else {
        ctx.fillStyle = C.nodeIdle;
      }
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = n.available && f === currentFloor && !n.visited ? '#fff' : '#555';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 아이콘
      ctx.fillStyle = n.visited ? '#555' : '#fff';
      ctx.font = (n.type === 'boss' ? '22' : '16') + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(nodeIcons[n.type] || '?', nx, fy);
    }
  }

  // 층수/골드 HUD
  ctx.fillStyle = C.textMain;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP: ' + G.player.hp + '/' + G.player.maxHp, 20, H * 0.82);
  ctx.fillStyle = C.gold;
  ctx.fillText('💰 ' + G.player.gold, 20, H * 0.87);
  ctx.fillStyle = '#8080a0';
  ctx.font = '12px monospace';
  ctx.fillText('덱: ' + G.deck.length + '장', 20, H * 0.92);

  // 안내
  ctx.fillStyle = '#8080a0';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('노드를 클릭/탭하여 진행', W / 2, H * 0.95);
}

// 전투 화면 렌더
function drawBattleScene(ctx) {
  // 플레이어
  const px = W * 0.15, py = H * 0.38;
  drawPlayer(ctx, px, py);

  // 플레이어 HP 바
  drawHPBar(ctx, G.player.hp, G.player.maxHp, px - 40, py + 45, 80, 14, C.hpBar);

  // 방어도
  if (G.player.block > 0) {
    drawShield(ctx, px + 45, py - 20, G.player.block);
  }

  // 적 렌더
  const enemyStartX = W * 0.55;
  const enemySpacing = Math.min(120, (W * 0.4) / Math.max(1, G.enemies.length));
  for (let i = 0; i < G.enemies.length; i++) {
    const ex = enemyStartX + i * enemySpacing;
    const ey = H * 0.3;
    const isTarget = i === G.targetEnemyIdx && G.selectedCardIdx >= 0;
    if (isTarget) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(ex, ey, 40, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    drawEnemyVisual(ctx, G.enemies[i], ex, ey, 50);
  }

  // 에너지
  drawEnergy(ctx, G.player.energy, CONFIG.PLAYER_START_ENERGY, W * 0.04 + 14, H * 0.58);

  // 핸드 카드
  const handLen = G.hand.length;
  const cardW = Math.min(90, (W * 0.85) / Math.max(handLen, 1));
  const cardH = Math.min(130, H * 0.32);
  const handTotalW = handLen * (cardW + 6);
  const handStartX = (W - handTotalW) / 2;
  const handY = H - cardH - 15;

  for (let i = 0; i < handLen; i++) {
    const card = G.hand[i];
    const cx = handStartX + i * (cardW + 6);
    let cardState = 'normal';
    if (G.selectedCardIdx === i && G.player.energy >= card.cost) cardState = 'selected';
    else if (G.player.energy < card.cost) cardState = 'disabled';
    else if (G.hoveredCardIdx === i && inputMode !== 'touch') cardState = 'hovered';
    drawCardVisual(ctx, card, cx, handY, cardW, cardH, cardState);
  }

  // 턴 종료 버튼
  if (state === 'PLAYER_TURN') {
    const btnW = 100, btnH = 44;
    const bx = W - btnW - 15, by = H * 0.55;
    ctx.fillStyle = G.endTurnBtnHover ? C.btnHover : C.btn;
    roundRect(ctx, bx, by, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('턴 종료', bx + btnW / 2, by + btnH / 2);

    // 드로우/버림 카드 개수 표시
    ctx.fillStyle = '#8080a0';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('드로우: ' + G.drawPile.length, W - 110, H * 0.66);
    ctx.fillText('버림: ' + G.discardPile.length, W - 110, H * 0.70);
  }

  // 버프 표시
  if (G.strengthBuff > 0) {
    ctx.fillStyle = C.cardSkl;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('💪+' + G.strengthBuff, 10, H * 0.50);
  }
  if (G.isRageActive) {
    ctx.fillStyle = C.cardAtk;
    ctx.fillText('🔥분노!', 10, H * 0.54);
  }
}

// 시간 포맷
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

/* ============================================================
   INPUT PROCESSING — 상태별 분기
   ============================================================ */
function processInput() {
  if (state === 'TITLE') {
    if (keyJustPressed[' '] || keyJustPressed['Enter'] || mouseClicked) {
      startNewGame();
    }
  }
  else if (state === 'MAP') {
    processMapInput();
  }
  else if (state === 'PLAYER_TURN') {
    processPlayerTurnInput();
  }
  else if (state === 'REWARD') {
    processRewardInput();
  }
  else if (state === 'SHOP') {
    processShopInput();
  }
  else if (state === 'REST') {
    processRestInput();
  }
  else if (state === 'EVENT') {
    processEventInput();
  }
  else if (state === 'VICTORY' || state === 'DEFEAT') {
    if (keyJustPressed['r'] || keyJustPressed['R'] || mouseClicked) {
      beginTransition('TITLE');
    }
  }
  else if (state === 'PAUSED') {
    if (keyJustPressed['Escape']) {
      beginTransition(prevState, { immediate: true });
      return;
    }
    if (mouseClicked) {
      const btnW = 160, btnH = 42, bx = W / 2 - btnW / 2;
      if (hitRect(mouseX, mouseY, bx, H * 0.48, btnW, btnH)) {
        beginTransition(prevState, { immediate: true });
      } else if (hitRect(mouseX, mouseY, bx, H * 0.60, btnW, btnH)) {
        beginTransition('DEFEAT');
      }
    }
  }

  // ESC → PAUSED (어느 전투/맵 상태에서든)
  if (keyJustPressed['Escape'] && state !== 'PAUSED' && state !== 'TITLE' && state !== 'VICTORY' && state !== 'DEFEAT') {
    beginTransition('PAUSED', { immediate: true });
  }
}

function startNewGame() {
  const rng = createRng(Date.now());
  tw.clearImmediate();
  particles = [];
  G = newRunState(rng);
  G.deck = createStarterDeck();
  G.drawPile = rng.shuffle(G.deck.slice());
  G.map = generateMap(rng);
  Audio.click();
  beginTransition('MAP');
}

function processMapInput() {
  if (!mouseClicked && !keyJustPressed['Enter'] && !keyJustPressed[' ']) return;

  if (mouseClicked) {
    const map = G.map;
    if (G.currentFloor >= map.length) return;
    const nodes = map[G.currentFloor];
    const mapW = Math.min(W * 0.85, 500);
    const mapH = H * 0.55;
    const startX = (W - mapW) / 2;
    const startY = H * 0.15;
    const nodeSpacing = mapW / (nodes.length + 1);

    for (const n of nodes) {
      if (!n.available || n.visited) continue;
      const nx = startX + (n.idx + 1) * nodeSpacing;
      const ny = startY + G.currentFloor * (mapH / (map.length - 1 || 1));
      const dist = Math.sqrt((mouseX - nx) ** 2 + (mouseY - ny) ** 2);
      if (dist <= 30) {
        selectMapNode(n);
        return;
      }
    }
  }
}

function selectMapNode(node) {
  node.visited = true;
  G.currentNode = node.idx;
  Audio.click();

  // 해당 층의 남은 노드 수 체크
  const visited = G.map[G.currentFloor].filter(n => n.visited).length;
  const total = G.map[G.currentFloor].length;

  if (node.type === 'battle' || node.type === 'elite' || node.type === 'boss') {
    G.enemies = spawnEnemiesForNode(node.type, G.currentFloor, G.rng);
    if (node.type === 'boss') Audio.bossAppear();
    beginTransition('PRE_BATTLE');
  } else if (node.type === 'shop') {
    beginTransition('SHOP');
  } else if (node.type === 'rest') {
    beginTransition('REST');
  } else if (node.type === 'event') {
    beginTransition('EVENT');
  }
}

function advanceFloor() {
  // 한 층에서 3노드 방문 또는 모든 노드 선택했으면 다음 층
  const visited = G.map[G.currentFloor].filter(n => n.visited).length;
  if (visited >= 3 || G.map[G.currentFloor].every(n => n.visited)) {
    G.currentFloor++;
    if (G.currentFloor >= G.map.length) {
      // 이미 보스 클리어 상태
      return;
    }
    Audio.levelUp();
  }
  beginTransition('MAP');
}

function processPlayerTurnInput() {
  const handLen = G.hand.length;
  const cardW = Math.min(90, (W * 0.85) / Math.max(handLen, 1));
  const cardH = Math.min(130, H * 0.32);
  const handTotalW = handLen * (cardW + 6);
  const handStartX = (W - handTotalW) / 2;
  const handY = H - cardH - 15;

  // 호버 감지 (마우스 모드)
  G.hoveredCardIdx = -1;
  G.endTurnBtnHover = false;
  if (inputMode === 'mouse') {
    for (let i = 0; i < handLen; i++) {
      const cx = handStartX + i * (cardW + 6);
      if (hitRect(mouseX, mouseY, cx, handY - 15, cardW, cardH + 15)) {
        G.hoveredCardIdx = i;
      }
    }
    // 턴 종료 버튼 호버
    const btnW = 100, btnH = 44, bx = W - btnW - 15, by = H * 0.55;
    if (hitRect(mouseX, mouseY, bx, by, btnW, btnH)) {
      G.endTurnBtnHover = true;
    }
  }

  // 키보드: 1~5로 카드 선택
  for (let i = 1; i <= 5; i++) {
    if (keyJustPressed[String(i)] && i <= handLen) {
      if (G.selectedCardIdx === i - 1) {
        G.selectedCardIdx = -1; // 토글
      } else {
        G.selectedCardIdx = i - 1;
        tryAutoPlay();
      }
    }
  }

  // 방향키: 카드/적 선택 (키보드 모드)
  if (inputMode === 'keyboard') {
    if (keyJustPressed['ArrowLeft'] && G.selectedCardIdx > 0) G.selectedCardIdx--;
    if (keyJustPressed['ArrowRight'] && G.selectedCardIdx < handLen - 1) G.selectedCardIdx++;
    if (keyJustPressed['ArrowUp'] && G.targetEnemyIdx > 0) G.targetEnemyIdx--;
    if (keyJustPressed['ArrowDown'] && G.targetEnemyIdx < G.enemies.length - 1) G.targetEnemyIdx++;
    if (keyJustPressed['Enter'] || keyJustPressed[' ']) {
      if (G.selectedCardIdx >= 0) {
        const card = G.hand[G.selectedCardIdx];
        if (card) {
          if (card.type !== 'attack' || G.enemies.length <= 1) {
            playCard(G.selectedCardIdx, G.targetEnemyIdx, G);
          } else {
            playCard(G.selectedCardIdx, G.targetEnemyIdx, G);
          }
        }
      } else {
        endPlayerTurn();
      }
    }
  }

  // 마우스/터치 클릭
  if (mouseClicked) {
    // 턴 종료 버튼
    const btnW = 100, btnH = 44, bx = W - btnW - 15, by = H * 0.55;
    if (hitRect(mouseX, mouseY, bx, by, btnW, btnH)) {
      endPlayerTurn();
      return;
    }

    // 카드 클릭
    for (let i = 0; i < handLen; i++) {
      const cx = handStartX + i * (cardW + 6);
      if (hitRect(mouseX, mouseY, cx, handY - 15, cardW, cardH + 15)) {
        if (G.selectedCardIdx === i) {
          // 이미 선택된 카드를 다시 클릭 → 해제
          G.selectedCardIdx = -1;
        } else {
          G.selectedCardIdx = i;
          tryAutoPlay();
        }
        return;
      }
    }

    // 적 클릭 (공격 카드 선택 중)
    if (G.selectedCardIdx >= 0) {
      const card = G.hand[G.selectedCardIdx];
      if (card && card.type === 'attack') {
        const enemyStartX = W * 0.55;
        const enemySpacing = Math.min(120, (W * 0.4) / Math.max(1, G.enemies.length));
        for (let i = 0; i < G.enemies.length; i++) {
          const ex = enemyStartX + i * enemySpacing;
          const ey = H * 0.3;
          if (Math.sqrt((mouseX - ex) ** 2 + (mouseY - ey) ** 2) < 40) {
            G.targetEnemyIdx = i;
            playCard(G.selectedCardIdx, i, G);
            return;
          }
        }
      }
    }
  }
}

// 대상 불필요 카드 자동 사용
function tryAutoPlay() {
  if (G.selectedCardIdx < 0) return;
  const card = G.hand[G.selectedCardIdx];
  if (!card) return;
  // 방어/스킬 카드 or 단일 적이면 자동 사용
  if (card.type !== 'attack' || G.enemies.length <= 1 || card.aoe) {
    playCard(G.selectedCardIdx, G.targetEnemyIdx, G);
  }
  // 다중 적 + 공격 카드 → 적 클릭 대기
}

function endPlayerTurn() {
  Audio.turnEnd();
  // 패를 버린 카드로
  const result = discardHand(G.hand, G.discardPile);
  G.hand = result.newHand;
  G.discardPile = result.newDiscardPile;
  G.selectedCardIdx = -1;
  beginTransition('ENEMY_TURN', { immediate: true });
}

function processRewardInput() {
  if (!mouseClicked) return;

  const cardW = 100, cardH = 145;
  const totalW = G.rewardCards.length * (cardW + 20);
  const startX = (W - totalW) / 2;

  for (let i = 0; i < G.rewardCards.length; i++) {
    const cx = startX + i * (cardW + 20);
    const cy = H * 0.32;
    if (hitRect(mouseX, mouseY, cx, cy, cardW, cardH)) {
      // 카드 획득
      G.deck.push(G.rewardCards[i]);
      G.discardPile.push(G.rewardCards[i]);
      Audio.reward();
      advanceFloor();
      return;
    }
  }

  // 건너뛰기
  const skipW = 120, skipH = 36;
  const skipX = W / 2 - skipW / 2, skipY = H * 0.82;
  if (hitRect(mouseX, mouseY, skipX, skipY, skipW, skipH)) {
    advanceFloor();
  }
}

function processShopInput() {
  if (!mouseClicked) return;

  const cardW = 90, cardH = 130;
  const totalW = G.shopCards.length * (cardW + 15);
  const startX = (W - totalW) / 2;

  // 카드 구매
  for (let i = 0; i < G.shopCards.length; i++) {
    const cx = startX + i * (cardW + 15);
    const cy = H * 0.2;
    const card = G.shopCards[i];
    if (hitRect(mouseX, mouseY, cx, cy, cardW, cardH + 20) && G.player.gold >= card.shopCost) {
      G.player.gold -= card.shopCost;
      G.deck.push(makeCard(card.id));
      G.discardPile.push(makeCard(card.id));
      G.shopCards.splice(i, 1);
      Audio.reward();
      return;
    }
  }

  // 카드 제거
  const rmW = 160, rmH = 36, rmX = W / 2 - rmW / 2, rmY = H * 0.62;
  if (hitRect(mouseX, mouseY, rmX, rmY, rmW, rmH) && G.player.gold >= CONFIG.SHOP_REMOVE_COST && G.deck.length > 5) {
    G.player.gold -= CONFIG.SHOP_REMOVE_COST;
    // 가장 기본적인 카드 제거 (타격 우선)
    const idx = G.deck.findIndex(c => c.id === 'strike');
    if (idx >= 0) G.deck.splice(idx, 1);
    else G.deck.pop();
    Audio.click();
    return;
  }

  // HP 회복
  const healY = rmY + 50;
  if (hitRect(mouseX, mouseY, rmX, healY, rmW, rmH) && G.player.gold >= CONFIG.SHOP_HEAL_COST) {
    G.player.gold -= CONFIG.SHOP_HEAL_COST;
    G.player = applyHeal(G.player, CONFIG.SHOP_HEAL_AMOUNT, G.player.maxHp);
    Audio.healSfx();
    return;
  }

  // 나가기
  const exitY = healY + 50;
  if (hitRect(mouseX, mouseY, rmX, exitY, rmW, rmH)) {
    advanceFloor();
  }
}

function processRestInput() {
  if (!mouseClicked) return;

  const btnW = 200, btnH = 50, bx = W / 2 - btnW / 2;

  if (G.restUpgradeIdx === -2) {
    // 업그레이드 모드 — 카드 선택
    const cw = 80, ch = 110;
    const cols = Math.min(5, G.deck.length);
    const tw2 = cols * (cw + 8);
    const sx = (W - tw2) / 2;

    for (let i = 0; i < G.deck.length; i++) {
      const card = G.deck[i];
      if (card.upgraded) continue;
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = sx + col * (cw + 8);
      const cy = H * 0.14 + row * (ch + 10);
      if (hitRect(mouseX, mouseY, cx, cy, cw, ch)) {
        G.deck[i] = upgradeCard(card);
        Audio.reward();
        advanceFloor();
        return;
      }
    }
    return;
  }

  // 휴식
  const hy = H * 0.3;
  if (hitRect(mouseX, mouseY, bx, hy, btnW, btnH)) {
    const healAmt = Math.floor(G.player.maxHp * CONFIG.REST_HEAL_PERCENT);
    G.player = applyHeal(G.player, healAmt, G.player.maxHp);
    Audio.healSfx();
    advanceFloor();
    return;
  }

  // 업그레이드
  const uy = H * 0.45;
  if (hitRect(mouseX, mouseY, bx, uy, btnW, btnH)) {
    G.restUpgradeIdx = -2; // 업그레이드 모드 진입
    return;
  }
}

function processEventInput() {
  if (!mouseClicked || !G.eventData || G.eventData.chosen) return;

  const btnW = 200, btnH = 45, bx = W / 2 - btnW / 2;

  // 수락
  if (hitRect(mouseX, mouseY, bx, H * 0.4, btnW, btnH)) {
    G.eventData.chosen = true;
    if (G.eventData.effect === 'heal') {
      G.player = applyHeal(G.player, G.eventData.val, G.player.maxHp);
      Audio.healSfx();
    } else if (G.eventData.effect === 'gold') {
      G.player.gold += G.eventData.val;
      Audio.reward();
    } else if (G.eventData.effect === 'card') {
      const pool = CARD_RARITY.common.concat(CARD_RARITY.rare);
      const id = pool[G.rng.nextInt(0, pool.length - 1)];
      G.deck.push(makeCard(id));
      Audio.reward();
    }
    advanceFloor();
    return;
  }

  // 건너뛰기
  if (hitRect(mouseX, mouseY, bx, H * 0.55, btnW, btnH)) {
    G.eventData.chosen = true;
    advanceFloor();
  }
}

/* ============================================================
   MAIN GAME LOOP — §5.4 (dt 전달, 하드코딩 금지)
   ============================================================ */
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // 상태별 시스템 업데이트 (§5.3 매트릭스)
  if (state !== 'PAUSED') tw.update(dt);
  if (STATES_WITH_INPUT[state]) processInput();
  if (STATES_WITH_PARTICLES[state]) updateParticles(dt);

  // 상태별 로직
  if (state === 'PRE_BATTLE') {
    preBattleTimer -= dt;
    if (preBattleTimer <= 0) {
      beginTransition('PLAYER_TURN', { immediate: true });
    }
  }
  if (state === 'ENEMY_TURN') {
    processEnemyTurn(dt);
  }

  // 플로팅 텍스트 업데이트
  if (G.floatingTexts) updateFloatingTexts(dt);

  // 쉐이크 타이머
  if (G.shakeTimer > 0) G.shakeTimer -= dt;

  // 렌더링
  render(ctx, dt, timestamp);

  // 입력 클리어
  clearInput();

  requestAnimationFrame(gameLoop);
}

/* ============================================================
   RENDER — 모든 상태에서 호출
   ============================================================ */
function render(ctx, dt, timestamp) {
  ctx.save();

  // 화면 쉐이크
  if (G.shakeTimer > 0) {
    const shake = G.shakeIntensity * (G.shakeTimer / CONFIG.DAMAGE_SHAKE_DURATION);
    ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
  }

  // 배경
  drawBackground(ctx);

  // 스캔라인 (strategy 장르 시각)
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }

  // 상태별 렌더
  if (state === 'TITLE') {
    drawTitleScreen(ctx, dt);
  }
  else if (state === 'MAP') {
    drawMap(ctx, G.map, G.currentFloor, G.completedNodes);
  }
  else if (state === 'PRE_BATTLE') {
    drawBattleScene(ctx);
    // 등장 연출 오버레이
    const progress = 1 - preBattleTimer / CONFIG.PRE_BATTLE_DURATION;
    ctx.fillStyle = C.textMain;
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 1 - progress;
    ctx.fillText('⚔ 전투 시작!', W / 2, H * 0.3);
    ctx.globalAlpha = 1;
  }
  else if (state === 'PLAYER_TURN') {
    drawBattleScene(ctx);
    // 키보드 모드: 포커스 인디케이터 (§8 inputMode 분기)
    if (inputMode === 'keyboard' && G.selectedCardIdx >= 0) {
      ctx.strokeStyle = C.accent;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      const cardW2 = Math.min(90, (W * 0.85) / Math.max(G.hand.length, 1));
      const handTotalW2 = G.hand.length * (cardW2 + 6);
      const handStartX2 = (W - handTotalW2) / 2;
      const handY2 = H - Math.min(130, H * 0.32) - 15;
      const cx = handStartX2 + G.selectedCardIdx * (cardW2 + 6);
      ctx.strokeRect(cx - 2, handY2 - 17, cardW2 + 4, Math.min(130, H * 0.32) + 20);
      ctx.setLineDash([]);
    }
  }
  else if (state === 'ENEMY_TURN') {
    drawBattleScene(ctx);
    ctx.fillStyle = C.cardAtk;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('적 턴...', W / 2, H * 0.52);
  }
  else if (state === 'REWARD') {
    drawBattleScene(ctx);
    drawRewardScreen(ctx);
  }
  else if (state === 'SHOP') {
    drawShopScreen(ctx);
  }
  else if (state === 'REST') {
    drawRestScreen(ctx);
  }
  else if (state === 'EVENT') {
    drawEventScreen(ctx);
  }
  else if (state === 'VICTORY') {
    drawEndScreen(ctx, true, timestamp);
  }
  else if (state === 'DEFEAT') {
    drawEndScreen(ctx, false, timestamp);
  }

  // 파티클
  if (STATES_WITH_PARTICLES[state]) drawParticles(ctx, dt);

  // 플로팅 텍스트
  if (G.floatingTexts) drawFloatingTexts(ctx);

  // 일시정지 오버레이
  if (state === 'PAUSED') {
    drawPausedScreen(ctx);
  }

  // 전환 오버레이
  if (isTransitioning && transObj.alpha > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + transObj.alpha + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // 상단 HUD (전투 중)
  if (['PLAYER_TURN','ENEMY_TURN','PRE_BATTLE'].includes(state)) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 28);
    ctx.fillStyle = C.textMain;
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Floor ' + (G.currentFloor + 1) + ' | 턴 ' + G.turnCount, 10, 18);
    ctx.fillStyle = C.gold;
    ctx.textAlign = 'right';
    ctx.fillText('💰 ' + G.player.gold, W - 10, 18);
  }

  ctx.restore();
}

/* ============================================================
   INITIALIZATION
   ============================================================ */
function init() {
  G = newRunState(createRng(1));
  G.floatingTexts = [];
  enterState('TITLE');
  setupInput();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();

</script>
