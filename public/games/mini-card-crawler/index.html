// ── CONFIG ──
const CONFIG={
  PLAYER_MAX_HP:50,PLAYER_START_ENERGY:3,PLAYER_DRAW_COUNT:5,
  CARD_STRIKE_DMG:6,CARD_STRIKE_PLUS_DMG:9,
  CARD_DEFEND_BLOCK:5,CARD_DEFEND_PLUS_BLOCK:8,
  CARD_RUSH_DMG:10,CARD_RUSH_PLUS_DMG:14,
  CARD_GUARD_BLOCK:9,CARD_GUARD_PLUS_BLOCK:13,
  CARD_FLURRY_DMG:3,CARD_FLURRY_HITS:2,CARD_FLURRY_PLUS_DMG:4,

  CARD_VENOM_DMG:4,CARD_VENOM_POISON:2,CARD_VENOM_PLUS_DMG:6,CARD_VENOM_PLUS_POISON:3,

  CARD_COUNTER_BLOCK:4,CARD_COUNTER_DMG:4,CARD_COUNTER_PLUS_BLOCK:6,CARD_COUNTER_PLUS_DMG:6,

  CARD_HEAL_AMOUNT:5,CARD_HEAL_PLUS_AMOUNT:8,
  CARD_DRAW_COUNT:2,CARD_DRAW_PLUS_COUNT:3,

  ENEMY_SLIME_HP:20,ENEMY_SLIME_ATK:6,ENEMY_SLIME_DEF:5,
  ENEMY_GOBLIN_HP:25,ENEMY_GOBLIN_ATK:8,ENEMY_GOBLIN_BUFF:2,
  ENEMY_BAT_HP:15,ENEMY_BAT_ATK:4,
  ENEMY_SKELETON_HP:30,ENEMY_SKELETON_ATK:10,ENEMY_SKELETON_DEF:8,

  BOSS_HP:60,BOSS_SUMMON_HP:12,BOSS_BUFF:3,BOSS_BLAST_DMG:15,

  GOLD_BATTLE_MIN:5,GOLD_BATTLE_MAX:10,
  GOLD_ELITE_MIN:10,GOLD_ELITE_MAX:15,
  GOLD_BOSS_CLEAR:50,
  SHOP_CARD_COST_MIN:15,SHOP_CARD_COST_MAX:25,
  SHOP_REMOVE_COST:10,SHOP_HEAL_COST:10,SHOP_HEAL_AMOUNT:10,
  REST_HEAL_PERCENT:0.25,
  TRANSITION_FADE_DURATION:0.3,
  PRE_BATTLE_DURATION:0.5,
  CARD_PLAY_ANIM_DURATION:0.3,
  ENEMY_ACTION_ANIM_DURATION:0.4,
  DAMAGE_SHAKE_DURATION:0.2,
};

// ── CARDS 18종 ──
const CARDS={
  strike:{id:'strike',name:'타격',type:'attack',cost:1,grade:'basic'},
  rush:{id:'rush',name:'돌진',type:'attack',cost:2,grade:'basic'},
  flurry:{id:'flurry',name:'연타',type:'attack',cost:1,grade:'normal'},
  heavy:{id:'heavy',name:'강타',type:'attack',cost:2,grade:'normal'},
  venom:{id:'venom',name:'맹독검',type:'attack',cost:1,grade:'normal'},
  whirl:{id:'whirl',name:'회오리',type:'attack',cost:2,grade:'rare'},
  execute:{id:'execute',name:'처형',type:'attack',cost:2,grade:'rare'},
  defend:{id:'defend',name:'수비',type:'defense',cost:1,grade:'basic'},
  guard:{id:'guard',name:'경계',type:'defense',cost:2,grade:'basic'},
  bastion:{id:'bastion',name:'보루',type:'defense',cost:2,grade:'normal'},
  counter:{id:'counter',name:'반격',type:'defense',cost:1,grade:'normal'},
  fortress:{id:'fortress',name:'철벽',type:'defense',cost:3,grade:'rare'},
  heal:{id:'heal',name:'힐링',type:'skill',cost:1,grade:'normal'},
  draw:{id:'draw',name:'드로우',type:'skill',cost:1,grade:'normal'},
  mist:{id:'mist',name:'독안개',type:'skill',cost:2,grade:'normal'},
  strength:{id:'strength',name:'힘의물약',type:'skill',cost:0,grade:'normal'},
  energyBall:{id:'energyBall',name:'에너지볼',type:'skill',cost:0,grade:'rare'},
  rage:{id:'rage',name:'분노',type:'skill',cost:1,grade:'rare'},
};

function createCard(id,up){const b=CARDS[id];if(!b)return null;return{...b,upgraded:!!up,uid:Math.random().toString(36).slice(2,8)};}

function getCardValues(c){
  const u=c.upgraded;
  switch(c.id){
    case'strike':return{dmg:u?CONFIG.CARD_STRIKE_PLUS_DMG:CONFIG.CARD_STRIKE_DMG};
    case'rush':return{dmg:u?CONFIG.CARD_RUSH_PLUS_DMG:CONFIG.CARD_RUSH_DMG};
    case'flurry':return{dmg:u?CONFIG.CARD_FLURRY_PLUS_DMG:CONFIG.CARD_FLURRY_DMG,hits:CONFIG.CARD_FLURRY_HITS};
    case'heavy':return{dmg:u?CONFIG.CARD_HEAVY_PLUS_DMG:CONFIG.CARD_HEAVY_DMG};
    case'venom':return{dmg:u?CONFIG.CARD_VENOM_PLUS_DMG:CONFIG.CARD_VENOM_DMG,poison:u?CONFIG.CARD_VENOM_PLUS_POISON:CONFIG.CARD_VENOM_POISON};
    case'whirl':return{dmg:u?CONFIG.CARD_WHIRL_PLUS_DMG:CONFIG.CARD_WHIRL_DMG,aoe:true};
    case'execute':return{dmg:u?CONFIG.CARD_EXECUTE_PLUS_DMG:CONFIG.CARD_EXECUTE_DMG,threshold:CONFIG.CARD_EXECUTE_THRESHOLD};
    case'defend':return{block:u?CONFIG.CARD_DEFEND_PLUS_BLOCK:CONFIG.CARD_DEFEND_BLOCK};
    case'guard':return{block:u?CONFIG.CARD_GUARD_PLUS_BLOCK:CONFIG.CARD_GUARD_BLOCK};
    case'bastion':return{block:u?CONFIG.CARD_BASTION_PLUS_BLOCK:CONFIG.CARD_BASTION_BLOCK};
    case'counter':return{block:u?CONFIG.CARD_COUNTER_PLUS_BLOCK:CONFIG.CARD_COUNTER_BLOCK,dmg:u?CONFIG.CARD_COUNTER_PLUS_DMG:CONFIG.CARD_COUNTER_DMG};
    case'fortress':return{block:u?CONFIG.CARD_FORTRESS_PLUS_BLOCK:CONFIG.CARD_FORTRESS_BLOCK};
    case'heal':return{healAmt:u?CONFIG.CARD_HEAL_PLUS_AMOUNT:CONFIG.CARD_HEAL_AMOUNT};
    case'draw':return{drawCount:u?CONFIG.CARD_DRAW_PLUS_COUNT:CONFIG.CARD_DRAW_COUNT};
    case'mist':return{poison:u?CONFIG.CARD_MIST_PLUS_POISON:CONFIG.CARD_MIST_POISON,aoe:true};
    case'strength':return{buff:u?CONFIG.CARD_STRENGTH_PLUS_BUFF:CONFIG.CARD_STRENGTH_BUFF};
    case'energyBall':return{energy:1};
    case'rage':return{multiplier:CONFIG.CARD_RAGE_MULTIPLIER};
    default:return{};
  }
}

function getCardDesc(c){
  const v=getCardValues(c);
  switch(c.id){
    case'strike':case'rush':case'heavy':return v.dmg+' 피해';
    case'flurry':return v.dmg+' x'+v.hits+'회';
    case'venom':return v.dmg+' + 독'+v.poison;
    case'whirl':return '전체 '+v.dmg;
    case'execute':return v.dmg+' 즉사';
    case'defend':case'guard':case'bastion':case'fortress':return '방어 '+v.block;
    case'counter':return '방어'+v.block+'+'+v.dmg;
    case'heal':return 'HP+'+v.healAmt;
    case'draw':return '+'+v.drawCount+'장';
    case'mist':return '전체독'+v.poison;
    case'strength':return '공+'+v.buff;
    case'energyBall':return '에너지+1';
    case'rage':return '공격x2';
    default:return'';
  }
}

function cardNeedsTarget(c){return c.type==='attack'&&!getCardValues(c).aoe;}

// ── ENEMIES 7종 ──
const ENEMY_DEFS={
  slime:{id:'slime',name:'슬라임',baseHp:CONFIG.ENEMY_SLIME_HP,pattern:[{type:'attack',value:CONFIG.ENEMY_SLIME_ATK},{type:'attack',value:CONFIG.ENEMY_SLIME_ATK},{type:'defend',value:CONFIG.ENEMY_SLIME_DEF}],shape:'circle',color:'#27ae60'},
  goblin:{id:'goblin',name:'고블린',baseHp:CONFIG.ENEMY_GOBLIN_HP,pattern:[{type:'attack',value:CONFIG.ENEMY_GOBLIN_ATK},{type:'buff',value:CONFIG.ENEMY_GOBLIN_BUFF},{type:'attack',value:CONFIG.ENEMY_GOBLIN_ATK}],shape:'triangle',color:'#8B6914'},
  bat:{id:'bat',name:'박쥐',baseHp:CONFIG.ENEMY_BAT_HP,pattern:[{type:'attack',value:CONFIG.ENEMY_BAT_ATK},{type:'attack',value:CONFIG.ENEMY_BAT_ATK},{type:'attack',value:CONFIG.ENEMY_BAT_ATK}],shape:'vshape',color:'#8e44ad'},
  skeleton:{id:'skeleton',name:'해골전사',baseHp:CONFIG.ENEMY_SKELETON_HP,pattern:[{type:'defend',value:CONFIG.ENEMY_SKELETON_DEF},{type:'attack',value:CONFIG.ENEMY_SKELETON_ATK},{type:'attack',value:CONFIG.ENEMY_SKELETON_ATK}],shape:'skull',color:'#bdc3c7'},
  orc:{id:'orc',name:'오크전사',baseHp:CONFIG.ENEMY_ORC_HP,pattern:[{type:'buff',value:CONFIG.ENEMY_ORC_BUFF},{type:'attack',value:CONFIG.ENEMY_ORC_ATK},{type:'attack',value:CONFIG.ENEMY_ORC_ATK},{type:'defend',value:CONFIG.ENEMY_ORC_DEF}],shape:'rect',color:'#a0522d',elite:true},
  spider:{id:'spider',name:'독거미',baseHp:CONFIG.ENEMY_SPIDER_HP,pattern:[{type:'poison',value:CONFIG.ENEMY_SPIDER_POISON},{type:'attack',value:CONFIG.ENEMY_SPIDER_ATK},{type:'poison',value:CONFIG.ENEMY_SPIDER_POISON},{type:'attack',value:CONFIG.ENEMY_SPIDER_ATK}],shape:'octagon',color:'#4a0080',elite:true},
  lichKing:{id:'lichKing',name:'리치킹',baseHp:CONFIG.BOSS_HP,pattern:[{type:'summon',value:CONFIG.BOSS_SUMMON_HP},{type:'buff',value:CONFIG.BOSS_BUFF},{type:'blast',value:CONFIG.BOSS_BLAST_DMG}],shape:'crown',color:'#1a0033',boss:true},
};

function spawnEnemy(tid,hpOv){const d=ENEMY_DEFS[tid];return{id:d.id,name:d.name,shape:d.shape,color:d.color,hp:hpOv||d.baseHp,maxHp:hpOv||d.baseHp,block:0,poison:0,atkBuff:0,turnIdx:0,pattern:d.pattern,boss:!!d.boss,elite:!!d.elite,x:0,y:0,shakeX:0,shakeY:0,alpha:1,enraged:false};}

function getEnemyIntent(e){const i=e.turnIdx%e.pattern.length;const intent={...e.pattern[i]};if(intent.type==='attack'||intent.type==='blast')intent.value+=e.atkBuff;return intent;}

// ── RNG ──
function createRng(seed){let s=seed||(Date.now()^(Math.random()*0xFFFFFF));return{next(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/0xFFFFFFFF;},nextInt(a,b){return a+Math.floor(this.next()*(b-a+1));},shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(this.next()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}};}

// ── TweenManager ──
class TweenManager{
  constructor(){this._t=[];}
  clearImmediate(){this._t.length=0;}
  add(obj,props,dur,ease,cb){const tw={obj,props:{},dur,el:0,ease:ease||'easeOut',cb};for(const k in props)tw.props[k]={s:obj[k],e:props[k]};this._t.push(tw);return tw;}
  update(dt){for(let i=this._t.length-1;i>=0;i--){const tw=this._t[i];tw.el+=dt;let t=Math.min(tw.el/tw.dur,1);if(tw.ease==='easeOut')t=1-(1-t)*(1-t);else if(tw.ease==='easeIn')t=t*t;for(const k in tw.props)tw.obj[k]=tw.props[k].s+(tw.props[k].e-tw.props[k].s)*t;if(tw.el>=tw.dur){for(const k in tw.props)tw.obj[k]=tw.props[k].e;this._t.splice(i,1);if(tw.cb)tw.cb();}}}
}

// ── Particles ──
let particles=[];
function emitP(x,y,col,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;const s=(spd||80)*(0.5+Math.random()*0.5);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0,ml:0.3+Math.random()*0.4,sz:2+Math.random()*4,col,a:1});}}
function updateP(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=100*dt;p.life+=dt;p.a=Math.max(0,1-p.life/p.ml);if(p.life>=p.ml)particles.splice(i,1);}}
function drawP(ctx){for(const p of particles){ctx.globalAlpha=p.a;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}ctx.globalAlpha=1;}

// ── Audio ──
const SFX=(()=>{let ac=null;function g(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return ac;}function r(){if(ac&&ac.state==='suspended')ac.resume().catch(()=>{});}function t(f,d,tp,v){try{const c=g();if(!c)return;const o=c.createOscillator(),gn=c.createGain();o.type=tp||'sine';o.frequency.value=f;gn.gain.setValueAtTime(v||0.12,c.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(gn);gn.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}function n(d,v){try{const c=g();if(!c)return;const bs=Math.floor(c.sampleRate*d),b=c.createBuffer(1,bs,c.sampleRate),dt=b.getChannelData(0);for(let i=0;i<bs;i++)dt[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;const gn=c.createGain();gn.gain.setValueAtTime(v||0.08,c.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);s.connect(gn);gn.connect(c.destination);s.start(c.currentTime);}catch(e){}}return{resume:r,cardDraw(){n(.05,.06);},cardAtk(){n(.1,.1);t(300,.1,'sawtooth',.06);},cardDef(){t(200,.15,'sine',.1);},cardSkill(){t(800,.1,'triangle',.08);},pHit(){t(100,.2,'sine',.12);n(.15,.08);},eHit(){t(300,.1,'sine',.1);n(.08,.06);},eDeath(){t(200,.1,'sine',.08);setTimeout(()=>t(500,.2,'sine',.08),100);},turnEnd(){t(1000,.03,'sine',.06);},reward(){t(523,.1,'sine',.06);setTimeout(()=>t(659,.1,'sine',.06),100);setTimeout(()=>t(784,.2,'sine',.08),200);},healS(){t(400,.1,'sine',.06);t(600,.15,'sine',.05);},poisonT(){n(.05,.05);},floorUp(){t(659,.15,'sine',.08);setTimeout(()=>t(784,.3,'sine',.08),150);},bossIn(){t(50,1,'sine',.12);},victory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>t(f,.15,'sine',.08),i*150));},defeat(){t(400,.15,'sine',.08);setTimeout(()=>t(200,.4,'sine',.1),150);},click(){t(800,.03,'sine',.05);},err(){t(200,.1,'square',.05);},};})();

// ── Canvas ──
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=0,H=0,dpr=1;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);initStars();}

// ── Listen/Destroy ──
const _ls=[];
function listen(el,ev,fn,o){el.addEventListener(ev,fn,o);_ls.push({el,ev,fn,o});}

// ── State Machine ──
const SP={DEFEAT:10,VICTORY:9,PAUSED:8,ENEMY_TURN:5,PLAYER_TURN:5,REWARD:4,MAP:3,PRE_BATTLE:3,SHOP:3,REST:3,EVENT:3,TITLE:3,LOADING:3};
const SI={TITLE:1,MAP:1,PLAYER_TURN:1,REWARD:1,SHOP:1,REST:1,EVENT:1,VICTORY:1,DEFEAT:1,PAUSED:1};
const SPARTICLE={PRE_BATTLE:1,PLAYER_TURN:1,ENEMY_TURN:1,VICTORY:1,DEFEAT:1};

let state='LOADING',prevSt=null,isTrans=false,transTgt=null,transPri=0;
const tw=new TweenManager();
const trO={alpha:0};

function beginTransition(ns,opts){
  const o=opts||{};const pri=o.priority||SP[ns]||3;
  if(isTrans&&pri<=transPri)return;
  if(o.immediate){if(ns==='PAUSED')prevSt=state;enterState(ns);return;}
  isTrans=true;transTgt=ns;transPri=pri;trO.alpha=0;
  tw.add(trO,{alpha:1},CONFIG.TRANSITION_FADE_DURATION*0.5,'easeIn',()=>{
    if(ns==='PAUSED')prevSt=state;enterState(transTgt);
    tw.add(trO,{alpha:0},CONFIG.TRANSITION_FADE_DURATION*0.5,'easeOut',()=>{isTrans=false;transTgt=null;transPri=0;});
  });
}

// ── Game Data ──
let G=null,inputMode='mouse';

function newRun(){
  const rng=createRng();
  const deck=[];
  for(let i=0;i<5;i++)deck.push(createCard('strike'));
  for(let i=0;i<3;i++)deck.push(createCard('defend'));
  deck.push(createCard('rush'));deck.push(createCard('guard'));
  return{rng,hp:CONFIG.PLAYER_MAX_HP,maxHp:CONFIG.PLAYER_MAX_HP,energy:0,block:0,gold:0,
    strBuff:0,rageActive:false,deck,drawPile:[],discardPile:[],hand:[],
    map:genMap(rng),floor:0,nodeIdx:-1,visited:new Set(),
    enemies:[],selCard:-1,selEnemy:0,turnCount:0,
    stats:{startTime:Date.now(),floors:0,kills:0,dmgTaken:0,dmgDealt:0,goldEarned:0},
    rewardCards:[],shopCards:[],shopCosts:[],eventChoices:[],
    upgradeMode:false,upgradeCards:[],
    endBtn:{x:0,y:0,w:0,h:0},floats:[],shakeT:0,shakeI:0,
    _mc:0,_score:0,_newBest:false};
}

function genMap(rng){
  return[
    rng.shuffle(['battle','battle','event','elite']).map((t,i)=>({type:t,idx:i,done:false})),
    rng.shuffle(['battle','shop','rest','elite']).map((t,i)=>({type:t,idx:i,done:false})),
    [{type:'boss',idx:0,done:false}]
  ];
}

function getAvail(map,floor,vis){if(floor>=map.length)return[];return map[floor].filter(n=>!n.done).map(n=>n.idx);}
function shuffleDeck(d,rng){return rng.shuffle(d);}

function drawCards(dp,disc,cnt,rng){
  let d=[...dp],di=[...disc],drawn=[];
  for(let i=0;i<cnt;i++){if(!d.length&&di.length){d=rng.shuffle(di);di=[];}if(d.length)drawn.push(d.shift());}
  return{drawn,dp:d,disc:di};
}

function discardHand(h,disc){return{hand:[],disc:[...disc,...h]};}
function calcDmg(base,str,rage){let d=base+str;if(rage)d*=CONFIG.CARD_RAGE_MULTIPLIER;return Math.max(0,Math.floor(d));}

function applyPlayerDmg(raw){
  if(!G)return;let r=raw;
  if(G.block>0){const b=Math.min(G.block,r);G.block-=b;r-=b;}
  G.hp=Math.max(0,G.hp-r);G.stats.dmgTaken+=r;
}

function applyEntityDmg(tgt,dmg){
  let r=dmg;if(tgt.block>0){const b=Math.min(tgt.block,r);tgt.block-=b;r-=b;}
  tgt.hp=Math.max(0,tgt.hp-r);return r;
}

function applyPoison(enemies){
  const res=[];
  for(const e of enemies){if(e.poison>0&&e.hp>0){e.hp=Math.max(0,e.hp-e.poison);res.push({e,d:e.poison});e.poison=Math.max(0,e.poison-1);}}
  return res;
}

function checkBattle(php,enemies){if(php<=0)return'defeat';if(enemies.every(e=>e.hp<=0))return'victory';return'ongoing';}

function genRewards(floor,isElite,rng){
  const gMin=isElite?CONFIG.GOLD_ELITE_MIN:CONFIG.GOLD_BATTLE_MIN;
  const gMax=isElite?CONFIG.GOLD_ELITE_MAX:CONFIG.GOLD_BATTLE_MAX;
  const gold=rng.nextInt(gMin,gMax);
  const pool=Object.keys(CARDS).filter(id=>{const c=CARDS[id];if(c.grade==='basic')return false;if(floor===0&&c.grade==='rare')return false;return true;});
  const cards=rng.shuffle(pool).slice(0,3).map(id=>createCard(id));
  return{cards,gold};
}

function addFloat(x,y,txt,col){if(G)G.floats.push({x,y,txt,col,life:0,ml:1});}

// ── Card Effect ──
function applyCard(card,g,enemies,ti){
  const v=getCardValues(card);
  switch(card.id){
    case'strike':case'rush':case'heavy':{const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const t=enemies[ti];if(t&&t.hp>0){const h=applyEntityDmg(t,d);g.stats.dmgDealt+=h;emitP(t.x,t.y,'#e74c3c',8,100);addFloat(t.x,t.y-30,'-'+d,'#e74c3c');SFX.eHit();}break;}
    case'flurry':{const t=enemies[ti];if(t&&t.hp>0){for(let h=0;h<v.hits;h++){const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const hp=applyEntityDmg(t,d);g.stats.dmgDealt+=hp;addFloat(t.x+h*10-5,t.y-30-h*12,'-'+d,'#e74c3c');}emitP(t.x,t.y,'#e74c3c',10,120);SFX.eHit();}break;}
    case'venom':{const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const t=enemies[ti];if(t&&t.hp>0){const hp=applyEntityDmg(t,d);g.stats.dmgDealt+=hp;t.poison+=v.poison;emitP(t.x,t.y,'#27ae60',8,80);addFloat(t.x,t.y-30,'-'+d,'#e74c3c');addFloat(t.x+18,t.y-45,'+독'+v.poison,'#27ae60');SFX.eHit();}break;}
    case'whirl':{for(const e of enemies){if(e.hp>0){const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const hp=applyEntityDmg(e,d);g.stats.dmgDealt+=hp;emitP(e.x,e.y,'#e74c3c',6,90);addFloat(e.x,e.y-30,'-'+d,'#e74c3c');}}SFX.cardAtk();break;}
    case'execute':{const t=enemies[ti];if(t&&t.hp>0){if(t.hp/t.maxHp<=v.threshold){g.stats.dmgDealt+=t.hp;t.hp=0;emitP(t.x,t.y,'#ff0000',20,150);addFloat(t.x,t.y-30,'즉사!','#ff4444');}else{const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const hp=applyEntityDmg(t,d);g.stats.dmgDealt+=hp;emitP(t.x,t.y,'#e74c3c',8,100);addFloat(t.x,t.y-30,'-'+d,'#e74c3c');}SFX.eHit();}break;}
    case'counter':{g.block+=v.block;addFloat(W*.22,H*.42,'+'+v.block+'방어','#3498db');const t=enemies[ti];if(t&&t.hp>0){const d=calcDmg(v.dmg,g.strBuff,g.rageActive);const hp=applyEntityDmg(t,d);g.stats.dmgDealt+=hp;emitP(t.x,t.y,'#e74c3c',5,80);addFloat(t.x,t.y-30,'-'+d,'#e74c3c');SFX.eHit();}SFX.cardDef();break;}
    case'defend':case'guard':case'bastion':case'fortress':{g.block+=v.block;emitP(W*.22,H*.42,'#3498db',6,60);addFloat(W*.22,H*.42,'+'+v.block+'방어','#3498db');SFX.cardDef();break;}
    case'heal':{const h=Math.min(v.healAmt,g.maxHp-g.hp);g.hp+=h;emitP(W*.22,H*.42,'#2ecc71',8,60);addFloat(W*.22,H*.42,'+'+h+'HP','#2ecc71');SFX.healS();break;}
    case'draw':{const r=drawCards(G.drawPile,G.discardPile,v.drawCount,G.rng);G.hand.push(...r.drawn);G.drawPile=r.dp;G.discardPile=r.disc;addFloat(W*.5,H*.65,'+'+r.drawn.length+'장','#f39c12');SFX.cardDraw();break;}
    case'mist':{for(const e of enemies){if(e.hp>0){e.poison+=v.poison;emitP(e.x,e.y,'#27ae60',6,60);addFloat(e.x,e.y-30,'+독'+v.poison,'#27ae60');}}SFX.cardSkill();break;}
    case'strength':{g.strBuff+=v.buff;emitP(W*.22,H*.42,'#f39c12',8,70);addFloat(W*.22,H*.42,'공+'+v.buff,'#f39c12');SFX.cardSkill();break;}
    case'energyBall':{g.energy+=1;emitP(W*.22,H*.42,'#f39c12',10,80);addFloat(W*.22,H*.42,'에너지+1','#f39c12');SFX.cardSkill();break;}
    case'rage':{g.rageActive=true;emitP(W*.22,H*.42,'#e74c3c',12,90);addFloat(W*.22,H*.42,'분노!','#e74c3c');SFX.cardSkill();break;}
  }
  for(const e of enemies){if(e.hp<=0&&e.alpha>0){e.alpha=0;SFX.eDeath();emitP(e.x,e.y,e.color,15,120);g.stats.kills++;}}
}

// ── Score/Save ──
function calcScore(s,won){return s.dmgDealt+s.floors*100+(won?500:0)-s.dmgTaken;}
function loadSave(){try{return JSON.parse(localStorage.getItem('mcc'))||{best:0,runs:0,clears:0,kills:0,fast:0};}catch(e){return{best:0,runs:0,clears:0,kills:0,fast:0};}}
function saveSave(d){try{localStorage.setItem('mcc',JSON.stringify(d));}catch(e){}}

// ── enterState ──
function enterState(ns){
  state=ns;
  switch(ns){
    case'TITLE':tw.clearImmediate();particles.length=0;G=null;break;
    case'MAP':break;
    case'PRE_BATTLE':{
      if(!G)break;const node=G.map[G.floor][G.nodeIdx];
      G.enemies=[];G.turnCount=0;G.strBuff=0;G.rageActive=false;
      if(node.type==='boss'){G.enemies.push(spawnEnemy('lichKing'));SFX.bossIn();}
      else if(node.type==='elite'){G.enemies.push(spawnEnemy(['orc','spider'][G.rng.nextInt(0,1)]));}
      else{const ns2=['slime','goblin','bat','skeleton'];const cnt=G.floor>=1?G.rng.nextInt(1,2):1;for(let i=0;i<cnt;i++)G.enemies.push(spawnEnemy(ns2[G.rng.nextInt(0,3)]));}
      layoutEnemies();
      G.drawPile=shuffleDeck([...G.deck],G.rng);G.discardPile=[];G.hand=[];
      for(const e of G.enemies)e.alpha=0;
      for(const e of G.enemies)tw.add(e,{alpha:1},CONFIG.PRE_BATTLE_DURATION,'easeOut');
      let done=false;tw.add({t:0},{t:1},CONFIG.PRE_BATTLE_DURATION+0.2,'linear',()=>{if(done)return;done=true;startPTurn();});
      break;}
    case'PLAYER_TURN':break;
    case'ENEMY_TURN':if(G)execEnemyTurns();break;
    case'REWARD':break;
    case'SHOP':if(G)setupShop();break;
    case'REST':if(G){G.upgradeMode=false;G.upgradeCards=[];}break;
    case'EVENT':if(G)setupEvent();break;
    case'VICTORY':{
      if(!G)break;SFX.victory();
      const sv=loadSave();const sc=calcScore(G.stats,true);
      const isNew=sc>sv.best;if(isNew)sv.best=sc;
      sv.runs=(sv.runs||0)+1;sv.clears=(sv.clears||0)+1;sv.kills=(sv.kills||0)+G.stats.kills;
      const el=Date.now()-G.stats.startTime;if(!sv.fast||el<sv.fast)sv.fast=el;
      saveSave(sv);G._score=sc;G._newBest=isNew;break;}
    case'DEFEAT':{
      if(!G)break;SFX.defeat();G.shakeT=0.5;G.shakeI=8;
      const sv=loadSave();const sc=calcScore(G.stats,false);
      const isNew=sc>sv.best;if(isNew)sv.best=sc;
      sv.runs=(sv.runs||0)+1;sv.kills=(sv.kills||0)+G.stats.kills;
      saveSave(sv);G._score=sc;G._newBest=isNew;break;}
    case'PAUSED':break;
  }
}

function layoutEnemies(){if(!G)return;const n=G.enemies.length;const sx=W*0.58;const sp=Math.min(120,W*0.15);for(let i=0;i<n;i++){G.enemies[i].x=sx+i*sp;G.enemies[i].y=H*0.32;}}

function startPTurn(){
  if(!G)return;if(G.hp<=0){beginTransition('DEFEAT');return;}
  G.energy=CONFIG.PLAYER_START_ENERGY;G.block=0;G.rageActive=false;G.turnCount++;G.selCard=-1;G.selEnemy=0;
  const r=drawCards(G.drawPile,G.discardPile,CONFIG.PLAYER_DRAW_COUNT,G.rng);
  G.hand=r.drawn;G.drawPile=r.dp;G.discardPile=r.disc;
  for(const e of G.enemies){if(e.hp<=0)continue;if(e.boss&&!e.enraged&&e.hp/e.maxHp<=CONFIG.BOSS_ENRAGE_THRESHOLD){e.atkBuff+=CONFIG.BOSS_ENRAGE_BUFF;e.enraged=true;addFloat(e.x,e.y-50,'분노!','#ff4444');}}
  beginTransition('PLAYER_TURN',{immediate:true});
}

function execEnemyTurns(){
  if(!G)return;
  const pr=applyPoison(G.enemies);
  for(const r of pr){addFloat(r.e.x,r.e.y-20,'-'+r.d+'독','#27ae60');emitP(r.e.x,r.e.y,'#27ae60',5,50);SFX.poisonT();}
  for(const e of G.enemies){if(e.hp<=0&&e.alpha>0){e.alpha=0;SFX.eDeath();emitP(e.x,e.y,e.color,15,120);G.stats.kills++;}}
  const alive=G.enemies.filter(e=>e.hp>0);
  let delay=0;
  for(const e of alive){
    const intent=getEnemyIntent(e);let done=false;
    tw.add({t:0},{t:1},delay+CONFIG.ENEMY_ACTION_ANIM_DURATION,'linear',()=>{if(done)return;done=true;execOneEnemy(e,intent);});
    delay+=CONFIG.ENEMY_ACTION_ANIM_DURATION+0.15;
  }
  let guard=false;
  tw.add({t:0},{t:1},delay+0.3,'linear',()=>{
    if(guard)return;guard=true;
    for(const e of G.enemies){if(e.hp>0)e.turnIdx++;e.block=0;}
    const r=checkBattle(G.hp,G.enemies);
    if(r==='defeat')beginTransition('DEFEAT');
    else if(r==='victory')handleWin();
    else startPTurn();
  });
}

function execOneEnemy(enemy,intent){
  if(!G||enemy.hp<=0)return;
  switch(intent.type){
    case'attack':applyPlayerDmg(intent.value);addFloat(W*.22,H*.42,'-'+intent.value,'#e74c3c');emitP(W*.22,H*.42,'#e74c3c',8,80);G.shakeT=CONFIG.DAMAGE_SHAKE_DURATION;G.shakeI=4;SFX.pHit();break;
    case'defend':enemy.block+=intent.value;addFloat(enemy.x,enemy.y-20,'+'+intent.value+'방어','#3498db');emitP(enemy.x,enemy.y,'#3498db',5,50);break;
    case'buff':enemy.atkBuff+=intent.value;addFloat(enemy.x,enemy.y-20,'공+'+intent.value,'#8e44ad');emitP(enemy.x,enemy.y,'#8e44ad',5,60);break;
    case'poison':applyPlayerDmg(intent.value);addFloat(W*.22,H*.42,'-'+intent.value+'독','#27ae60');emitP(W*.22,H*.42,'#27ae60',8,70);SFX.pHit();break;
    case'summon':{const s=spawnEnemy('slime',intent.value);s.x=enemy.x+80+G.enemies.length*40;s.y=enemy.y+25;s.alpha=0;G.enemies.push(s);tw.add(s,{alpha:1},0.3,'easeOut');addFloat(s.x,s.y-30,'소환!','#8e44ad');break;}
    case'blast':applyPlayerDmg(intent.value);addFloat(W*.22,H*.42,'-'+intent.value+'폭발!','#ff4444');emitP(W*.22,H*.42,'#ff4444',15,120);G.shakeT=0.3;G.shakeI=6;SFX.pHit();break;
  }
  if(G.hp<=0)beginTransition('DEFEAT');
}

function handleWin(){
  if(!G)return;const node=G.map[G.floor][G.nodeIdx];node.done=true;
  if(node.type==='boss'){G.gold+=CONFIG.GOLD_BOSS_CLEAR;G.stats.goldEarned+=CONFIG.GOLD_BOSS_CLEAR;G.stats.floors=3;beginTransition('VICTORY');return;}
  const r=genRewards(G.floor,node.type==='elite',G.rng);
  G.gold+=r.gold;G.stats.goldEarned+=r.gold;G.rewardCards=r.cards;
  addFloat(W*.5,H*.3,'+'+r.gold+'골드','#f1c40f');SFX.reward();
  beginTransition('REWARD',{immediate:true});
}

function setupShop(){if(!G)return;const pool=Object.keys(CARDS).filter(id=>CARDS[id].grade!=='basic');G.shopCards=G.rng.shuffle(pool).slice(0,3).map(id=>createCard(id));G.shopCosts=G.shopCards.map(()=>G.rng.nextInt(CONFIG.SHOP_CARD_COST_MIN,CONFIG.SHOP_CARD_COST_MAX));}

function setupEvent(){if(!G)return;G.eventChoices=[
  {text:'HP 15 회복',act(){G.hp=Math.min(G.maxHp,G.hp+15);addFloat(W/2,H/2,'+15HP','#2ecc71');SFX.healS();}},
  {text:'랜덤 카드 획득',act(){const p=Object.keys(CARDS).filter(id=>CARDS[id].grade!=='basic');const id=p[G.rng.nextInt(0,p.length-1)];G.deck.push(createCard(id));addFloat(W/2,H/2,CARDS[id].name+'!','#f39c12');}},
  {text:'골드 20 획득',act(){G.gold+=20;G.stats.goldEarned+=20;addFloat(W/2,H/2,'+20골드','#f1c40f');}},
];}

function advance(){
  if(!G)return;G.visited.add(G.floor+'-'+G.nodeIdx);
  let cnt=0;for(const k of G.visited)if(k.startsWith(G.floor+'-'))cnt++;
  if(cnt>=3||getAvail(G.map,G.floor,G.visited).length===0){G.floor++;G.nodeIdx=-1;G.stats.floors=G.floor;if(G.floor>=G.map.length){beginTransition('VICTORY');return;}SFX.floorUp();}
  beginTransition('MAP',{immediate:true});
}

// ── Input ──
let mx=0,my=0,cx=-1,cy=-1,cc=false;
function hClick(x,y){SFX.resume();cx=x;cy=y;cc=false;}

listen(window,'resize',resize);
listen(canvas,'mousemove',e=>{mx=e.clientX;my=e.clientY;if(inputMode!=='touch')inputMode='mouse';});
listen(canvas,'mousedown',e=>{hClick(e.clientX,e.clientY);});
let lpt=null;
listen(canvas,'touchstart',e=>{e.preventDefault();inputMode='touch';const t=e.touches[0];mx=t.clientX;my=t.clientY;hClick(t.clientX,t.clientY);lpt=setTimeout(()=>{},500);},{passive:false});
listen(canvas,'touchmove',e=>{e.preventDefault();const t=e.touches[0];mx=t.clientX;my=t.clientY;if(lpt){clearTimeout(lpt);lpt=null;}},{passive:false});
listen(canvas,'touchend',e=>{e.preventDefault();if(lpt){clearTimeout(lpt);lpt=null;}},{passive:false});

listen(document,'keydown',e=>{SFX.resume();inputMode='keyboard';handleKey(e.code);});
  // Prevent browser default for game keys
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }

function handleKey(code){
  if(state==='TITLE'){if(code==='Space'||code==='Enter')startGame();return;}
  if(state==='PAUSED'){if(code==='Escape')beginTransition(prevSt,{immediate:true});return;}
  if(code==='Escape'&&state!=='TITLE'&&state!=='VICTORY'&&state!=='DEFEAT'){beginTransition('PAUSED',{immediate:true});return;}
  if(state==='PLAYER_TURN'&&G){
    const n=parseInt(code.replace('Digit','').replace('Numpad',''));
    if(n>=1&&n<=G.hand.length){selCard(n-1);return;}
    if(code==='ArrowLeft'&&G.selCard>0){G.selCard--;SFX.click();return;}
    if(code==='ArrowRight'&&G.selCard<G.hand.length-1){G.selCard++;SFX.click();return;}
    if(code==='ArrowUp'||code==='ArrowDown'){const al=G.enemies.filter(e=>e.hp>0);if(al.length>1){if(code==='ArrowUp')G.selEnemy=Math.max(0,G.selEnemy-1);else G.selEnemy=Math.min(al.length-1,G.selEnemy+1);SFX.click();}return;}
    if(code==='Enter'||code==='Space'){
      if(G.selCard>=0){const c=G.hand[G.selCard];if(cardNeedsTarget(c)){const al=G.enemies.filter(e=>e.hp>0);tryPlay(G.selCard,G.enemies.indexOf(al[G.selEnemy]||al[0]));}else tryPlay(G.selCard,G.enemies.findIndex(e=>e.hp>0));}
      else endTurn();return;
    }
  }
  if(state==='MAP'&&G){const av=getAvail(G.map,G.floor,G.visited);if(!av.length)return;if(G._mc===undefined)G._mc=av[0];const ci=av.indexOf(G._mc);if(code==='ArrowRight'&&ci<av.length-1){G._mc=av[ci+1];SFX.click();}if(code==='ArrowLeft'&&ci>0){G._mc=av[ci-1];SFX.click();}if(code==='Enter'||code==='Space')selNode(G._mc);}
  if(state==='REWARD'&&G){if(code==='Digit1'||code==='Numpad1')selReward(0);if(code==='Digit2'||code==='Numpad2')selReward(1);if(code==='Digit3'||code==='Numpad3')selReward(2);if(code==='Space'||code==='Enter')skipReward();}
  if(state==='VICTORY'||state==='DEFEAT'){if(code==='KeyR'||code==='Space'||code==='Enter')beginTransition('TITLE');}
}

function selCard(idx){
  if(!G||state!=='PLAYER_TURN'||idx<0||idx>=G.hand.length)return;
  const c=G.hand[idx];if(c.cost>G.energy){SFX.err();return;}
  if(G.selCard===idx){G.selCard=-1;return;}
  G.selCard=idx;SFX.click();
  const al=G.enemies.filter(e=>e.hp>0);
  if(!cardNeedsTarget(c))tryPlay(idx,al.length?G.enemies.indexOf(al[0]):0);
  else if(al.length<=1)tryPlay(idx,G.enemies.indexOf(al[0])||0);
}

function tryPlay(ci,ei){
  if(!G||state!=='PLAYER_TURN')return;const c=G.hand[ci];if(!c||c.cost>G.energy){SFX.err();return;}
  G.energy-=c.cost;applyCard(c,G,G.enemies,cardNeedsTarget(c)?Math.max(0,ei):0);
  G.hand.splice(ci,1);G.discardPile.push(c);G.selCard=-1;G.selEnemy=0;
  if(c.type==='attack'&&c.id!=='counter')SFX.cardAtk();
  const r=checkBattle(G.hp,G.enemies);
  if(r==='defeat')beginTransition('DEFEAT');else if(r==='victory')handleWin();
}

function endTurn(){if(!G||state!=='PLAYER_TURN')return;SFX.turnEnd();const r=discardHand(G.hand,G.discardPile);G.hand=r.hand;G.discardPile=r.disc;G.selCard=-1;beginTransition('ENEMY_TURN',{immediate:true});}

function selNode(ni){if(!G)return;const av=getAvail(G.map,G.floor,G.visited);if(!av.includes(ni))return;G.nodeIdx=ni;SFX.click();const n=G.map[G.floor][ni];switch(n.type){case'battle':case'elite':case'boss':beginTransition('PRE_BATTLE');break;case'shop':beginTransition('SHOP');break;case'rest':beginTransition('REST');break;case'event':beginTransition('EVENT');break;}}

function selReward(i){if(!G||!G.rewardCards[i])return;G.deck.push(G.rewardCards[i]);SFX.reward();advance();}
function skipReward(){if(!G)return;advance();}
function startGame(){G=newRun();beginTransition('MAP');}

// ── Render Helpers ──
const COL={bg1:'#1a1a2e',bg2:'#16213e',cardBg:'#e8e0d0',cAtk:'#e74c3c',cDef:'#3498db',cSkl:'#f39c12',nrg:'#f39c12',hp:'#e74c3c',blk:'#3498db',psn:'#27ae60',gld:'#f1c40f',tL:'#ecf0f1',tD:'#2c3e50',nI:'#7f8c8d',nA:'#2ecc71',nC:'#95a5a6',btn:'#2ecc71',btnH:'#27ae60'};

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

let bgStars=[];
function initStars(){bgStars=[];for(let i=0;i<60;i++)bgStars.push({x:Math.random()*W,y:Math.random()*H,sz:0.5+Math.random()*1.5,sp:5+Math.random()*15,a:0.2+Math.random()*0.4});}

function drawBg(ctx,dt){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,COL.bg1);g.addColorStop(1,COL.bg2);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of bgStars){s.y+=s.sp*dt;if(s.y>H){s.y=-5;s.x=Math.random()*W;}ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz);}ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(0,255,135,0.03)';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function scanlines(ctx,i){ctx.fillStyle='rgba(0,0,0,'+(i||0.04)+')';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);}

function inR(x,y,r){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}

function drawBtn(ctx,txt,x,y,w,h,hov){rr(ctx,x,y,w,h,6);ctx.fillStyle=hov?COL.btnH:COL.btn;ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText(txt,x+w/2,y+h/2+5);return{x,y,w,h};}

function drawCardUI(ctx,c,x,y,w,h,sel,hov,can){
  ctx.save();const tc=c.type==='attack'?COL.cAtk:c.type==='defense'?COL.cDef:COL.cSkl;
  if(sel){ctx.shadowColor='#fff';ctx.shadowBlur=12;}else if(hov){ctx.shadowColor=tc;ctx.shadowBlur=8;}
  rr(ctx,x,y,w,h,8);ctx.fillStyle=can?COL.cardBg:'#a0a090';ctx.fill();ctx.strokeStyle=sel?'#fff':tc;ctx.lineWidth=sel?3:2;ctx.stroke();ctx.shadowBlur=0;
  ctx.save();ctx.beginPath();ctx.moveTo(x+8,y);ctx.lineTo(x+w-8,y);ctx.quadraticCurveTo(x+w,y,x+w,y+8);ctx.lineTo(x+w,y+22);ctx.lineTo(x,y+22);ctx.lineTo(x,y+8);ctx.quadraticCurveTo(x,y,x+8,y);ctx.closePath();ctx.fillStyle=tc;ctx.fill();ctx.restore();

function drawEShape(ctx,e,x,y,sz){
  ctx.fillStyle=e.color;ctx.globalAlpha=e.alpha;const s=sz||35;
  switch(e.shape){
    case'circle':ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();break;
    case'triangle':ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y+s*.7);ctx.lineTo(x-s,y+s*.7);ctx.closePath();ctx.fill();break;
    case'vshape':ctx.beginPath();ctx.moveTo(x-s,y-s*.6);ctx.lineTo(x,y+s*.3);ctx.lineTo(x+s,y-s*.6);ctx.lineTo(x+s*.6,y-s*.3);ctx.lineTo(x,y+s*.6);ctx.lineTo(x-s*.6,y-s*.3);ctx.closePath();ctx.fill();break;
    case'skull':ctx.beginPath();ctx.arc(x,y-5,s*.8,0,Math.PI*2);ctx.fill();ctx.fillRect(x-s*.4,y+s*.3,s*.8,s*.5);ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(x-8,y-8,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+8,y-8,5,0,Math.PI*2);ctx.fill();break;
    case'rect':ctx.fillRect(x-s,y-s,s*2,s*2);break;
    case'octagon':ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2-Math.PI/8;ctx.lineTo(x+Math.cos(a)*s,y+Math.sin(a)*s);}ctx.closePath();ctx.fill();break;
    case'crown':{const r=s*1.3;ctx.beginPath();ctx.moveTo(x-r,y+r*.5);ctx.lineTo(x-r,y-r*.3);ctx.lineTo(x-r*.5,y);ctx.lineTo(x,y-r*.7);ctx.lineTo(x+r*.5,y);ctx.lineTo(x+r,y-r*.3);ctx.lineTo(x+r,y+r*.5);ctx.closePath();ctx.fill();ctx.fillStyle='#8e44ad';ctx.beginPath();ctx.arc(x,y-r*.35,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(x-r*.5,y,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*.5,y,4,0,Math.PI*2);ctx.fill();break;}
  }
  ctx.globalAlpha=1;
  if(e.shape!=='skull'&&e.shape!=='crown'&&e.alpha>.5){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-7,y-5,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+7,y-5,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x-6,y-4,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+8,y-4,2,0,Math.PI*2);ctx.fill();}
}

function drawE(ctx,e,showI){
  if(e.hp<=0&&e.alpha<=0)return;const x=e.x,y=e.y;
  if(e.enraged){ctx.globalAlpha=.2+Math.sin(Date.now()/200)*.1;ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(x,y,50,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  drawEShape(ctx,e,x,y,e.boss?45:e.elite?40:35);
  ctx.fillStyle=COL.tL;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(e.name,x,y+48);
  const bw=56,bh=6,bx=x-bw/2,by=y+52;ctx.fillStyle='#333';rr(ctx,bx,by,bw,bh,3);ctx.fill();
  const hp=Math.max(0,e.hp/e.maxHp);if(hp>0){ctx.fillStyle=COL.hp;rr(ctx,bx,by,bw*hp,bh,3);ctx.fill();}
  ctx.fillStyle=COL.tL;ctx.font='8px monospace';ctx.fillText(e.hp+'/'+e.maxHp,x,by+bh+9);
  if(e.block>0){ctx.fillStyle=COL.blk;ctx.font='bold 9px monospace';ctx.fillText('B:'+e.block,x+32,y-18);}
  if(e.poison>0){ctx.fillStyle=COL.psn;ctx.font='bold 9px monospace';ctx.fillText('P:'+e.poison,x-32,y-18);}
  if(showI&&e.hp>0){const it=getEnemyIntent(e);const iy=y-52;ctx.font='bold 11px monospace';ctx.textAlign='center';
    switch(it.type){case'attack':ctx.fillStyle='#e74c3c';ctx.fillText('ATK '+it.value,x,iy);break;case'defend':ctx.fillStyle='#3498db';ctx.fillText('DEF '+it.value,x,iy);break;case'buff':ctx.fillStyle='#8e44ad';ctx.fillText('BUF +'+it.value,x,iy);break;case'poison':ctx.fillStyle='#27ae60';ctx.fillText('PSN '+it.value,x,iy);break;case'summon':ctx.fillStyle='#8e44ad';ctx.fillText('SUMMON',x,iy);break;case'blast':ctx.fillStyle='#f44';ctx.fillText('BLAST '+it.value,x,iy);break;}}
}

function drawPlayer(ctx,x,y){

function rBattle(ctx,dt){
  drawBg(ctx,dt);if(!G)return;
  let sx2=0,sy2=0;if(G.shakeT>0){G.shakeT-=dt;sx2=(Math.random()-.5)*G.shakeI;sy2=(Math.random()-.5)*G.shakeI;ctx.save();ctx.translate(sx2,sy2);}
  ctx.fillStyle='#00ff87';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText('Floor '+(G.floor+1),8,16);
  ctx.fillStyle='#505070';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('Turn '+G.turnCount,W/2,16);
  ctx.fillStyle=COL.gld;ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText('Gold:'+G.gold,W-8,16);
  const px=W*.18,py=H*.34;drawPlayer(ctx,px,py);
  ctx.textAlign='left';
  for(let i=0;i<CONFIG.PLAYER_START_ENERGY;i++){ctx.beginPath();ctx.arc(12+i*20,H*.51,8,0,Math.PI*2);ctx.fillStyle=i<G.energy?COL.nrg:'#333';ctx.fill();ctx.strokeStyle='#c0a000';ctx.lineWidth=1;ctx.stroke();}
  ctx.fillStyle=COL.tL;ctx.font='bold 9px monospace';ctx.fillText(G.energy+'/'+CONFIG.PLAYER_START_ENERGY,CONFIG.PLAYER_START_ENERGY*20+5,H*.51+3);
  if(G.strBuff>0){ctx.fillStyle='#f39c12';ctx.font='9px monospace';ctx.fillText('STR+'+G.strBuff,10,H*.55);}
  if(G.rageActive){ctx.fillStyle='#e74c3c';ctx.fillText('RAGE!',70,H*.55);}
  const showI=state==='PLAYER_TURN'||state==='PRE_BATTLE';
  for(const e of G.enemies)drawE(ctx,e,showI);
  if(state==='PLAYER_TURN'&&G.selCard>=0){const c=G.hand[G.selCard];if(cardNeedsTarget(c)){const al=G.enemies.filter(e=>e.hp>0);if(al.length>1){const si=Math.max(0,Math.min(G.selEnemy,al.length-1));const tgt=al[si];if(tgt){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(tgt.x,tgt.y,46,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}}}}
  if(state==='PLAYER_TURN'){const bw=Math.min(85,W*.15),bh=32,bx=W-bw-10,by=H*.41;const hov=inR(mx,my,{x:bx,y:by,w:bw,h:bh});G.endBtn=drawBtn(ctx,'턴 종료',bx,by,bw,bh,hov);if(cx>=0&&!cc&&inR(cx,cy,G.endBtn)){cc=true;endTurn();}}
  if(state==='PLAYER_TURN'&&cx>=0&&!cc&&G.selCard>=0){const c=G.hand[G.selCard];if(cardNeedsTarget(c)){for(let i=0;i<G.enemies.length;i++){const e=G.enemies[i];if(e.hp<=0)continue;if(Math.sqrt((cx-e.x)**2+(cy-e.y)**2)<42){cc=true;tryPlay(G.selCard,i);break;}}}}
  if(G.hand.length>0&&(state==='PLAYER_TURN'||state==='ENEMY_TURN'||state==='PRE_BATTLE')){
    const cw=Math.min(76,(W-24)/Math.max(G.hand.length,1)-5),ch=cw*1.44;
    const tcw=G.hand.length*(cw+4)-4,scx=W/2-tcw/2,baseY=H-ch-10;
    for(let i=0;i<G.hand.length;i++){
      const c=G.hand[i],cx2=scx+i*(cw+4);const isSel=i===G.selCard;
      const isH=inputMode!=='touch'&&inR(mx,my,{x:cx2,y:baseY-(isSel?10:0),w:cw,h:ch});
      const canP=state==='PLAYER_TURN'&&c.cost<=G.energy;const oY=(isSel||isH)?-10:0;
      drawCardUI(ctx,c,cx2,baseY+oY,cw,ch,isSel,isH,canP);
      if(state==='PLAYER_TURN'&&cx>=0&&!cc&&inR(cx,cy,{x:cx2,y:baseY+oY,w:cw,h:ch})){cc=true;selCard(i);}
    }
  }
  ctx.fillStyle='#8080a0';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('Deck:'+(G.drawPile?G.drawPile.length:0),6,H-5);
  ctx.textAlign='right';ctx.fillText('Disc:'+(G.discardPile?G.discardPile.length:0),W-6,H-5);
  if(state==='ENEMY_TURN'){ctx.fillStyle='#e74c3c';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('적 턴...',W/2,H*.49);}
  if(G.shakeT>0)ctx.restore();
  drawP(ctx);drawFloats(ctx);scanlines(ctx,.02);
}

function rShop(ctx,dt){

  for(let i=0;i<G.shopCards.length;i++){const c=G.shopCards[i];if(!c)continue;const sx=W/2-(G.shopCards.filter(Boolean).length*(cw+gap)-gap)/2+ci*(cw+gap),sy=H*.18;const cost=G.shopCosts[i];const can=G.gold>=cost;const hov=can&&inR(mx,my,{x:sx,y:sy,w:cw,h:ch});drawCardUI(ctx,c,sx,sy,cw,ch,false,hov,can);ctx.fillStyle=can?COL.gld:'#666';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(cost+'G',sx+cw/2,sy+ch+13);if(cx>=0&&!cc&&can&&inR(cx,cy,{x:sx,y:sy,w:cw,h:ch})){cc=true;G.gold-=cost;G.deck.push(c);G.shopCards[i]=null;SFX.reward();addFloat(sx+cw/2,sy,c.name+'!','#f1c40f');}ci++;}
  const rbw=W*.28,rbh=32,rbx=W*.1,rby=H*.72;const canR=G.gold>=CONFIG.SHOP_REMOVE_COST&&G.deck.length>5;const rH=canR&&inR(mx,my,{x:rbx,y:rby,w:rbw,h:rbh});rr(ctx,rbx,rby,rbw,rbh,6);ctx.fillStyle=rH?'#a0522d':canR?'#8B4513':'#444';ctx.fill();ctx.fillStyle=COL.tL;ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('카드 제거 ('+CONFIG.SHOP_REMOVE_COST+'G)',rbx+rbw/2,rby+20);
  if(cx>=0&&!cc&&canR&&inR(cx,cy,{x:rbx,y:rby,w:rbw,h:rbh})){cc=true;const bs=G.deck.filter(c2=>c2.grade==='basic');if(bs.length){const t=bs[G.rng.nextInt(0,bs.length-1)];const idx=G.deck.indexOf(t);if(idx>=0)G.deck.splice(idx,1);G.gold-=CONFIG.SHOP_REMOVE_COST;addFloat(W/2,H*.65,t.name+' 제거!','#e74c3c');}}
  const hbw=W*.28,hbh=32,hbx=W*.62,hby=H*.72;const canH=G.gold>=CONFIG.SHOP_HEAL_COST&&G.hp<G.maxHp;const hH=canH&&inR(mx,my,{x:hbx,y:hby,w:hbw,h:hbh});rr(ctx,hbx,hby,hbw,hbh,6);ctx.fillStyle=hH?'#27ae60':canH?'#2ecc71':'#444';ctx.fill();ctx.fillStyle=COL.tL;ctx.font='10px monospace';ctx.fillText('HP+'+CONFIG.SHOP_HEAL_AMOUNT+' ('+CONFIG.SHOP_HEAL_COST+'G)',hbx+hbw/2,hby+20);
  if(cx>=0&&!cc&&canH&&inR(cx,cy,{x:hbx,y:hby,w:hbw,h:hbh})){cc=true;G.gold-=CONFIG.SHOP_HEAL_COST;G.hp=Math.min(G.maxHp,G.hp+CONFIG.SHOP_HEAL_AMOUNT);SFX.healS();addFloat(W/2,H*.6,'+'+CONFIG.SHOP_HEAL_AMOUNT+'HP','#2ecc71');}
  const eb={x:W/2-50,y:H*.87,w:100,h:32};const eH=inR(mx,my,eb);drawBtn(ctx,'나가기',eb.x,eb.y,eb.w,eb.h,eH);
  if(cx>=0&&!cc&&inR(cx,cy,eb)){cc=true;G.map[G.floor][G.nodeIdx].done=true;advance();}
  drawFloats(ctx);scanlines(ctx,.02);
}

function rRest(ctx,dt){
  drawBg(ctx,dt);if(!G)return;
  ctx.fillStyle='#e67e22';ctx.font='bold '+Math.min(18,W*.035)+'px monospace';ctx.textAlign='center';ctx.fillText('R 모닥불 R',W/2,H*.09);
  ctx.fillStyle=COL.tL;ctx.font='12px monospace';ctx.fillText('HP: '+G.hp+'/'+G.maxHp,W/2,H*.17);
  if(!G.upgradeMode){
    const ha=Math.floor(G.maxHp*CONFIG.REST_HEAL_PERCENT);
    const b1={x:W*.08,y:H*.28,w:W*.38,h:52},b2={x:W*.54,y:H*.28,w:W*.38,h:52};
    const h1=inR(mx,my,b1);rr(ctx,b1.x,b1.y,b1.w,b1.h,8);ctx.fillStyle=h1?'#27ae60':'#2ecc71';ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.fillText('휴식',b1.x+b1.w/2,b1.y+20);ctx.font='10px monospace';ctx.fillText('HP+'+ha,b1.x+b1.w/2,b1.y+38);
    const h2=inR(mx,my,b2);rr(ctx,b2.x,b2.y,b2.w,b2.h,8);ctx.fillStyle=h2?'#d4a017':'#f1c40f';ctx.fill();ctx.fillStyle='#2c3e50';ctx.font='bold 12px monospace';ctx.fillText('업그레이드',b2.x+b2.w/2,b2.y+20);ctx.font='10px monospace';ctx.fillText('카드 강화',b2.x+b2.w/2,b2.y+38);
    if(cx>=0&&!cc){if(inR(cx,cy,b1)){cc=true;G.hp=Math.min(G.maxHp,G.hp+ha);SFX.healS();G.map[G.floor][G.nodeIdx].done=true;advance();}else if(inR(cx,cy,b2)){cc=true;G.upgradeMode=true;G.upgradeCards=G.deck.filter(c=>!c.upgraded);}}
  }else{
    ctx.fillStyle=COL.tL;ctx.font='12px monospace';ctx.fillText('강화할 카드 선택',W/2,H*.26);
    const cw=Math.min(65,W*.11),ch=cw*1.44,gap=5;const pr=Math.min(G.upgradeCards.length,Math.floor((W-20)/(cw+gap)));
    for(let i=0;i<G.upgradeCards.length;i++){
      const row=Math.floor(i/pr),col=i%pr;const rc=Math.min(pr,G.upgradeCards.length-row*pr);const rw=rc*cw+(rc-1)*gap;
      const cx2=W/2-rw/2+col*(cw+gap),cy2=H*.31+row*(ch+16);const c=G.upgradeCards[i];const hov=inR(mx,my,{x:cx2,y:cy2,w:cw,h:ch});drawCardUI(ctx,c,cx2,cy2,cw,ch,false,hov,true);
      if(cx>=0&&!cc&&inR(cx,cy,{x:cx2,y:cy2,w:cw,h:ch})){cc=true;const di=G.deck.indexOf(c);if(di>=0){G.deck[di]={...c,upgraded:true};SFX.reward();}G.map[G.floor][G.nodeIdx].done=true;advance();}
    }
    const cb={x:W/2-40,y:H*.9,w:80,h:28};const cH=inR(mx,my,cb);rr(ctx,cb.x,cb.y,cb.w,cb.h,6);ctx.fillStyle=cH?'#666':'#555';ctx.fill();ctx.fillStyle=COL.tL;ctx.font='10px monospace';ctx.fillText('취소',W/2,cb.y+18);
    if(cx>=0&&!cc&&inR(cx,cy,cb)){cc=true;G.upgradeMode=false;}
  }
  drawFloats(ctx);scanlines(ctx,.02);
}

function rEvent(ctx,dt){
  drawBg(ctx,dt);if(!G)return;
  ctx.fillStyle='#f39c12';ctx.font='bold '+Math.min(18,W*.035)+'px monospace';ctx.textAlign='center';ctx.fillText('? 이벤트 ?',W/2,H*.12);
  ctx.fillStyle=COL.tL;ctx.font='12px monospace';ctx.fillText('선택지를 고르세요',W/2,H*.2);
  for(let i=0;i<G.eventChoices.length;i++){
    const ch=G.eventChoices[i];const bh=40,bw=Math.min(230,W*.55);const by=H*.3+i*(bh+10),bx=W/2-bw/2;
    const hov=inR(mx,my,{x:bx,y:by,w:bw,h:bh});rr(ctx,bx,by,bw,bh,8);ctx.fillStyle=hov?'#2c3e50':'#1e2d3d';ctx.fill();ctx.strokeStyle='#3498db';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=COL.tL;ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText(ch.text,W/2,by+25);
    if(cx>=0&&!cc&&inR(cx,cy,{x:bx,y:by,w:bw,h:bh})){cc=true;ch.act();G.map[G.floor][G.nodeIdx].done=true;SFX.click();advance();}
  }
  drawFloats(ctx);scanlines(ctx,.02);
}

function rEnd(ctx,dt,won){
  drawBg(ctx,dt);if(!G)return;
  if(!won&&G.shakeT>0)G.shakeT-=dt;
  ctx.textAlign='center';ctx.shadowColor=won?'#00ff87':'#e74c3c';ctx.shadowBlur=20;
  ctx.fillStyle=won?'#00ff87':'#e74c3c';ctx.font='bold '+Math.min(32,W*.06)+'px monospace';
  ctx.fillText(won?'VICTORY!':'DEFEAT',W/2,H*.15);ctx.shadowBlur=0;
  ctx.fillStyle=COL.tL;ctx.font='11px monospace';const s=G.stats;const el=Math.floor((Date.now()-s.startTime)/1000);
  const lines=won?['던전 클리어!','','처치: '+s.kills,'가한: '+s.dmgDealt,'받은: '+s.dmgTaken,'덱: '+G.deck.length+'장','시간: '+Math.floor(el/60)+'m '+(el%60)+'s','','Score: '+(G._score||0)]
    :['도달: '+(G.floor+1)+'층','처치: '+s.kills,'가한: '+s.dmgDealt,'받은: '+s.dmgTaken,'덱: '+G.deck.length+'장','','Score: '+(G._score||0)];
  if(G._newBest)lines.push('NEW BEST!');
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('NEW')){ctx.fillStyle='#f1c40f';ctx.font='bold 13px monospace';}
    else if(lines[i].includes('Score')){ctx.fillStyle=won?'#00ff87':'#e74c3c';ctx.font='bold 14px monospace';}
    else{ctx.fillStyle=COL.tL;ctx.font='11px monospace';}
    ctx.fillText(lines[i],W/2,H*.25+i*18);
  }
  const rb={x:W/2-70,y:H*.85,w:140,h:36};const hov=inR(mx,my,rb);drawBtn(ctx,'타이틀 (R)',rb.x,rb.y,rb.w,rb.h,hov);
  if(cx>=0&&!cc&&inR(cx,cy,rb)){cc=true;beginTransition('TITLE');}
  scanlines(ctx,won?.03:.04);
}

function rPaused(ctx){
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.fillStyle='#00ff87';ctx.font='bold 24px monospace';ctx.fillText('PAUSED',W/2,H*.34);
  const r1={x:W/2-70,y:H*.44,w:140,h:36},r2={x:W/2-70,y:H*.54,w:140,h:36};
  const h1=inR(mx,my,r1);drawBtn(ctx,'재개 (ESC)',r1.x,r1.y,r1.w,r1.h,h1);
  const h2=inR(mx,my,r2);rr(ctx,r2.x,r2.y,r2.w,r2.h,6);ctx.fillStyle=h2?'#c0392b':'#e74c3c';ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.fillText('포기',W/2,r2.y+22);
  if(cx>=0&&!cc){if(inR(cx,cy,r1)){cc=true;beginTransition(prevSt,{immediate:true});}else if(inR(cx,cy,r2)){cc=true;beginTransition('TITLE');}}
}

// ── Main Loop ──
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(state!=='PAUSED')tw.update(dt);
  if(SPARTICLE[state])updateP(dt);
  if(G)updFloats(dt);
  ctx.clearRect(0,0,W,H);
  switch(state){
    case'LOADING':drawBg(ctx,dt);ctx.fillStyle='#00ff87';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText('Loading...',W/2,H/2);beginTransition('TITLE',{immediate:true});break;
    case'TITLE':rTitle(ctx,dt);break;
    case'MAP':rMap(ctx,dt);break;
    case'PRE_BATTLE':case'PLAYER_TURN':case'ENEMY_TURN':rBattle(ctx,dt);break;
    case'REWARD':rReward(ctx,dt);break;
    case'SHOP':rShop(ctx,dt);break;
    case'REST':rRest(ctx,dt);break;
    case'EVENT':rEvent(ctx,dt);break;
    case'VICTORY':rEnd(ctx,dt,true);break;
    case'DEFEAT':rEnd(ctx,dt,false);break;
    case'PAUSED':rBattle(ctx,dt);rPaused(ctx);break;
  }
  if(isTrans&&trO.alpha>0){ctx.fillStyle='rgba(0,0,0,'+trO.alpha+')';ctx.fillRect(0,0,W,H);}
  cx=-1;cy=-1;
  requestAnimationFrame(loop);
}

resize();enterState('LOADING');requestAnimationFrame(loop);
</script>
