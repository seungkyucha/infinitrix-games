<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tbgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="tcardAttack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b7b1"/>
      <stop offset="30%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#d5c4a1"/>
    </linearGradient>
    <linearGradient id="tcardDefend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aed6f1"/>
      <stop offset="30%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#d5c4a1"/>
    </linearGradient>
    <linearGradient id="tcardSkill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fad7a0"/>
      <stop offset="30%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#d5c4a1"/>
    </linearGradient>
    <linearGradient id="tplayerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#2471a3"/>
    </linearGradient>
    <linearGradient id="tenemyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <radialGradient id="tbattleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f39c12" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ttitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9e79f"/>
      <stop offset="50%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#d4ac0d"/>
    </linearGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ttextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tshadow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="300" fill="url(#tbgGrad)"/>
  <!-- 별 -->
  <g opacity="0.6">
    <circle cx="30" cy="20" r="1" fill="white" opacity="0.7"/>
    <circle cx="80" cy="45" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="150" cy="15" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="250" cy="30" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="320" cy="20" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="370" cy="50" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="50" cy="80" r="0.5" fill="white" opacity="0.3"/>
    <circle cx="350" cy="75" r="0.7" fill="white" opacity="0.4"/>
  </g>
  <!-- 던전 아치 -->
  <g opacity="0.3">
    <path d="M100 200 Q150 100 200 90 Q250 100 300 200" fill="none" stroke="#243352" stroke-width="6"/>
    <path d="M105 205 Q155 110 200 100 Q245 110 295 205" fill="none" stroke="#1a2744" stroke-width="3"/>
  </g>
  <!-- 전투 글로우 -->
  <circle cx="200" cy="170" r="80" fill="url(#tbattleGlow)" filter="url(#tshadow)"/>
  <!-- 플레이어 -->
  <g filter="url(#tglow)">
    <path d="M120 140 L140 170 L120 200 L100 170 Z" fill="url(#tplayerGrad)"/>
    <path d="M120 140 L140 170 L120 165 Z" fill="#5dade2" opacity="0.3"/>
    <ellipse cx="114" cy="163" rx="3" ry="3.5" fill="white" opacity="0.9"/>
    <ellipse cx="126" cy="163" rx="3" ry="3.5" fill="white" opacity="0.9"/>
    <path d="M120 178 L117 182 L120 186 L123 182 Z" fill="#f1c40f" opacity="0.7"/>
  </g>
  <!-- 적 -->
  <g filter="url(#tglow)">
    <path d="M280 130 L300 155 L296 195 L288 200 L272 200 L264 195 L260 155 Z" fill="url(#tenemyGrad)"/>
    <path d="M270 150 Q266 136 263 130 Q269 138 272 148 Z" fill="#e74c3c"/>
    <path d="M290 150 Q294 136 297 130 Q291 138 288 148 Z" fill="#e74c3c"/>
    <ellipse cx="274" cy="155" rx="3.5" ry="2.5" fill="#f9e79f" opacity="0.8"/>
    <ellipse cx="286" cy="155" rx="3.5" ry="2.5" fill="#f9e79f" opacity="0.8"/>
    <path d="M274 180 L276 177 L278 180 L280 177 L282 180 L284 177 L286 180" fill="none" stroke="#f5b7b1" stroke-width="1"/>
  </g>
  <!-- 카드 팬 -->
  <g>
    <g transform="translate(130,220) rotate(-15)">
      <rect x="-22" y="-32" width="44" height="64" rx="4" fill="url(#tcardAttack)" stroke="#e74c3c" stroke-width="1.5"/>
      <rect x="-22" y="-32" width="44" height="12" rx="4" fill="#e74c3c" opacity="0.8"/>
      <path d="M0 -8 L6 4 L0 1 L-6 4 Z" fill="#e74c3c" opacity="0.7"/>
    </g>
    <g transform="translate(185,215) rotate(-5)">
      <rect x="-22" y="-32" width="44" height="64" rx="4" fill="url(#tcardDefend)" stroke="#3498db" stroke-width="1.5"/>
      <rect x="-22" y="-32" width="44" height="12" rx="4" fill="#3498db" opacity="0.8"/>
      <path d="M0 -5 L-7 2 L-5 12 L0 14 L5 12 L7 2 Z" fill="#3498db" opacity="0.6"/>
    </g>
    <g transform="translate(240,220) rotate(10)">
      <rect x="-22" y="-32" width="44" height="64" rx="4" fill="url(#tcardSkill)" stroke="#f39c12" stroke-width="1.5"/>
      <rect x="-22" y="-32" width="44" height="12" rx="4" fill="#f39c12" opacity="0.8"/>
      <circle cx="0" cy="2" r="6" fill="none" stroke="#f39c12" stroke-width="1.5" opacity="0.6"/>
      <path d="M-3 2 L0 -2 L3 2 L0 6 Z" fill="#f39c12" opacity="0.5"/>
    </g>
  </g>
  <!-- 에너지 구슬 -->
  <g transform="translate(60, 250)">
    <circle cx="0" cy="0" r="10" fill="#f39c12" opacity="0.3" filter="url(#tglow)"/>
    <circle cx="0" cy="0" r="7" fill="#f1c40f" opacity="0.6"/>
    <circle cx="-2" cy="-2" r="3" fill="#f9e79f" opacity="0.5"/>
  </g>
  <!-- 제목 -->
  <g filter="url(#ttextGlow)">
    <text x="200" y="52" text-anchor="middle" font-size="28" font-weight="bold" font-family="Arial, sans-serif" fill="url(#ttitleGrad)" stroke="#7d6608" stroke-width="0.5">MINI CARD CRAWLER</text>
  </g>
  <text x="200" y="75" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" fill="#bdc3c7" opacity="0.7">Deck-Building Roguelike</text>
  <!-- 테두리 -->
  <rect x="2" y="2" width="396" height="296" rx="6" fill="none" stroke="#f1c40f" stroke-width="1" opacity="0.2"/>
  <rect x="6" y="6" width="388" height="288" rx="4" fill="none" stroke="#f1c40f" stroke-width="0.5" opacity="0.1"/>
</svg>
