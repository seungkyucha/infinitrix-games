 *  §5. 세이브/로드
 * ══════════════════════════════════════════════════════════════════ */
function loadSave() {
  const d = Save.get('ix_' + GAME_ID + '_save', null);
  if (d) {
    gSaveData.levelStars = d.levelStars || [];
    gSaveData.boosters = d.boosters || {hammer:3,shuffle:3,extraTurns:2,colorBomb:1};
    gSaveData.lastLevel = d.lastLevel || 0;
  }
  gBoosters = { ...gSaveData.boosters };
}
function saveSave() {
  gSaveData.boosters = { ...gBoosters };
  Save.set('ix_' + GAME_ID + '_save', gSaveData);
}

/* ══════════════════════════════════════════════════════════════════
 *  §6. 보드 생성 & 유틸
 * ══════════════════════════════════════════════════════════════════ */
function createEmptyGrid() {
  const g = [];
  for (let r = 0; r < ROWS; r++) {
    g[r] = [];
    for (let c = 0; c < COLS; c++) {
      g[r][c] = makeCell();
    }
  }
  return g;
}
function makeCell(color) {
  return {
    color: color || null,
    special: SPECIAL.NONE,
    obs: OBS_TYPE.NONE,
    obsLayers: 0,
    jelly: 0,
    curtain: false,
    // animation
    ax: 0, ay: 0, scale: 1, alpha: 1, shakeX: 0,
    sparkleTimer: 0
  };
}

/* 장애물 배치 — 레벨 데이터 기반 */
function placeObstacles(grid, level) {
  const positions = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      positions.push({r, c});
  gRng.shuffle(positions);

  let pi = 0;
  for (const obsDef of level.obstacles) {
    for (let i = 0; i < obsDef.count && pi < positions.length; i++) {
      const { r, c } = positions[pi++];
      const cell = grid[r][c];
      if (obsDef.type === OBS_TYPE.JELLY) {
        cell.jelly = obsDef.layers || 1;
      } else if (obsDef.type === OBS_TYPE.STONE) {
        cell.obs = OBS_TYPE.STONE;
        cell.obsLayers = 0;
        cell.color = null;
      } else if (obsDef.type === OBS_TYPE.POISON) {
        cell.obs = OBS_TYPE.POISON;
        cell.obsLayers = 1;
        cell.color = null;
      } else if (obsDef.type === OBS_TYPE.WOOD) {
        cell.obs = OBS_TYPE.WOOD;
        cell.obsLayers = obsDef.layers || 2;
        cell.color = null;
      } else if (obsDef.type === OBS_TYPE.ICE) {
        cell.obs = OBS_TYPE.ICE;
        cell.obsLayers = obsDef.layers || 1;
      } else if (obsDef.type === OBS_TYPE.CHAIN) {
        cell.obs = OBS_TYPE.CHAIN;
        cell.obsLayers = 1;
      } else if (obsDef.type === OBS_TYPE.CURTAIN) {
        cell.curtain = true;
      }
    }
  }
}

/* 보드에 보석 채우기 (3매치 없이) */
function fillBoard(grid) {
  for (let pass = 0; pass < 100; pass++) {
    let hadMatch = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        if (cell.obs === OBS_TYPE.STONE || cell.obs === OBS_TYPE.POISON || cell.obs === OBS_TYPE.WOOD) continue;
        if (!cell.color) {
          cell.color = gRng.pick(GEM_COLORS);
        }
        // 3매치 제거
        if (c >= 2 && grid[r][c-1].color === cell.color && grid[r][c-2].color === cell.color) {
          cell.color = pickDifferentColor(cell.color, r > 0 ? grid[r-1][c].color : null);
          hadMatch = true;
        }
        if (r >= 2 && grid[r-1][c].color === cell.color && grid[r-2][c].color === cell.color) {
          cell.color = pickDifferentColor(cell.color, c > 0 ? grid[r][c-1].color : null);
          hadMatch = true;
        }
      }
    }
    if (!hadMatch) break;
  }
}

function pickDifferentColor(exclude1, exclude2) {
  const choices = GEM_COLORS.filter(c => c !== exclude1 && c !== exclude2);
  return gRng.pick(choices);
}

/* BFS 유효 이동 검증 — 최소 1개 스왑으로 매치 가능한지 */
function hasValidMove(grid) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!canSwap(grid, r, c)) continue;
      // 오른쪽 스왑
      if (c < COLS - 1 && canSwap(grid, r, c + 1)) {
        swapColors(grid, r, c, r, c + 1);
        const has = findMatches(grid).length > 0;
        swapColors(grid, r, c, r, c + 1);
        if (has) return true;
      }
      // 아래 스왑
      if (r < ROWS - 1 && canSwap(grid, r + 1, c)) {
        swapColors(grid, r, c, r + 1, c);
        const has = findMatches(grid).length > 0;
        swapColors(grid, r, c, r + 1, c);
        if (has) return true;
      }
    }
  }
  return false;
}

function canSwap(grid, r, c) {
  const cell = grid[r][c];
  if (!cell || !cell.color) return false;
  if (cell.obs === OBS_TYPE.STONE || cell.obs === OBS_TYPE.WOOD || cell.obs === OBS_TYPE.POISON) return false;
  if (cell.obs === OBS_TYPE.CHAIN) return false;
  return true;
}

function swapColors(grid, r1, c1, r2, c2) {
  const a = grid[r1][c1], b = grid[r2][c2];
  [a.color, b.color] = [b.color, a.color];
  [a.special, b.special] = [b.special, a.special];
  [a.curtain, b.curtain] = [b.curtain, a.curtain];
}

/* 보드 셔플 (장애물 유지) */
function shuffleBoard(grid) {
  const gems = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell.color && cell.obs !== OBS_TYPE.STONE && cell.obs !== OBS_TYPE.WOOD &&
          cell.obs !== OBS_TYPE.POISON && cell.obs !== OBS_TYPE.CHAIN) {
        gems.push({ color: cell.color, special: cell.special });
      }
    }
  }
  gRng.shuffle(gems);
  let gi = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell.color && cell.obs !== OBS_TYPE.STONE && cell.obs !== OBS_TYPE.WOOD &&
          cell.obs !== OBS_TYPE.POISON && cell.obs !== OBS_TYPE.CHAIN) {
        cell.color = gems[gi].color;
        cell.special = gems[gi].special;
        gi++;
      }
    }
  }
  // 3매치 없도록 재정리
  fillBoard(grid);
}

/* ══════════════════════════════════════════════════════════════════
 *  §7. 매치 검출 (5→T/L→4→3 우선순위 + used[][] 소비 추적)
 * ══════════════════════════════════════════════════════════════════ */
function findMatches(grid) {
  const used = [];
  for (let r = 0; r < ROWS; r++) { used[r] = []; for (let c = 0; c < COLS; c++) used[r][c] = false; }

  const matches = [];

  // 가로 런 탐색
  const hRuns = [];
  for (let r = 0; r < ROWS; r++) {
    let start = 0;
    for (let c = 1; c <= COLS; c++) {
      const cur = grid[r][c] ? grid[r][c].color : null;
      const prev = grid[r][start].color;
      if (c < COLS && cur && cur === prev && !isBlocker(grid[r][c]) && !isBlocker(grid[r][start])) continue;
      const len = c - start;
      if (len >= 3 && prev && !isBlocker(grid[r][start])) {
        hRuns.push({ r, c: start, len, dir: 'h', color: prev });
      }
      start = c;
    }
  }

  // 세로 런 탐색
  const vRuns = [];
  for (let c = 0; c < COLS; c++) {
    let start = 0;
    for (let r = 1; r <= ROWS; r++) {
      const cur = grid[r] ? (grid[r][c] ? grid[r][c].color : null) : null;
      const prev = grid[start][c].color;
      if (r < ROWS && cur && cur === prev && !isBlocker(grid[r][c]) && !isBlocker(grid[start][c])) continue;
      const len = r - start;
      if (len >= 3 && prev && !isBlocker(grid[start][c])) {
        vRuns.push({ r: start, c, len, dir: 'v', color: prev });
      }
      start = r;
    }
  }

  // 5매치 우선 → T/L → 4 → 3
  // 5매치
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len >= 5) {
      const cells = getRunCells(run);
      if (cells.some(p => used[p.r][p.c])) continue;
      cells.forEach(p => used[p.r][p.c] = true);
      matches.push({ type: 'match5', cells, color: run.color, specialGen: SPECIAL.RAINBOW });
    }
  }

  // T/L자 매치: 가로+세로 런이 교차하는 경우
  for (const h of hRuns) {
    if (h.len < 3) continue;
    for (const v of vRuns) {
      if (v.len < 3 || h.color !== v.color) continue;
      // 교차점 검사
      if (v.c >= h.c && v.c < h.c + h.len && h.r >= v.r && h.r < v.r + v.len) {
        const hCells = getRunCells(h);
        const vCells = getRunCells(v);
        const allCells = mergeUnique(hCells, vCells);
        if (allCells.some(p => used[p.r][p.c])) continue;
        if (allCells.length >= 5) { // T/L자는 최소 5셀
          allCells.forEach(p => used[p.r][p.c] = true);
          matches.push({ type: 'matchTL', cells: allCells, color: h.color, specialGen: SPECIAL.BOMB });
        }
      }
    }
  }

  // 4매치
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len === 4) {
      const cells = getRunCells(run);
      if (cells.some(p => used[p.r][p.c])) continue;
      cells.forEach(p => used[p.r][p.c] = true);
      const sp = run.dir === 'h' ? SPECIAL.LINE_V : SPECIAL.LINE_H; // 반대 방향 라인
      matches.push({ type: 'match4', cells, color: run.color, specialGen: sp });
    }
  }

  // 3매치
  for (const run of [...hRuns, ...vRuns]) {
    if (run.len === 3) {
      const cells = getRunCells(run);
      if (cells.some(p => used[p.r][p.c])) continue;
      cells.forEach(p => used[p.r][p.c] = true);
      matches.push({ type: 'match3', cells, color: run.color, specialGen: SPECIAL.NONE });
    }
  }

  return matches;
}

function isBlocker(cell) {
  if (!cell) return true;
  return cell.obs === OBS_TYPE.STONE || cell.obs === OBS_TYPE.WOOD || cell.obs === OBS_TYPE.POISON;
}

function getRunCells(run) {
  const cells = [];
  if (run.dir === 'h') {
    for (let c = run.c; c < run.c + run.len; c++) cells.push({r: run.r, c});
  } else {
    for (let r = run.r; r < run.r + run.len; r++) cells.push({r, c: run.c});
  }
  return cells;
}

function mergeUnique(a, b) {
  const set = new Set();
  const res = [];
  for (const p of [...a, ...b]) {
    const key = p.r * 100 + p.c;
    if (!set.has(key)) { set.add(key); res.push(p); }
  }
  return res;
}

/* ══════════════════════════════════════════════════════════════════
 *  §8. 매치 처리 + 캐스케이드 루프 (tween 체인, setTimeout 0건)
 * ══════════════════════════════════════════════════════════════════ */

/* 스왑 시작 */
function startSwap(r1, c1, r2, c2) {
  if (GUARDS.swapLocked || GUARDS.cascadeInProgress) return;
  const cell1 = gGrid[r1][c1], cell2 = gGrid[r2][c2];

  // 스페셜 조합 체크
  if (cell1.special !== SPECIAL.NONE && cell2.special !== SPECIAL.NONE) {
    GUARDS.swapLocked = true;
    doSwapAnim(r1, c1, r2, c2, () => {
      swapColors(gGrid, r1, c1, r2, c2);
      processSpecialCombo(r1, c1, r2, c2);
    });
    return;
  }

  // 무지개 + 일반 보석
  if (cell1.special === SPECIAL.RAINBOW || cell2.special === SPECIAL.RAINBOW) {
    GUARDS.swapLocked = true;
    const rainR = cell1.special === SPECIAL.RAINBOW ? r1 : r2;
    const rainC = cell1.special === SPECIAL.RAINBOW ? c1 : c2;
    const targetColor = cell1.special === SPECIAL.RAINBOW ? cell2.color : cell1.color;
    doSwapAnim(r1, c1, r2, c2, () => {
      swapColors(gGrid, r1, c1, r2, c2);
      activateRainbow(rainR, rainC, targetColor);
    });
    return;
  }

  // 일반 스왑 — 매칭 가능 여부 먼저 검사
  swapColors(gGrid, r1, c1, r2, c2);
  const matches = findMatches(gGrid);
  swapColors(gGrid, r1, c1, r2, c2); // 복원

  if (matches.length === 0) {
    // 무효 스왑 → 복귀 애니메이션
    GUARDS.swapLocked = true;
    doSwapAnim(r1, c1, r2, c2, () => {
      doSwapAnim(r2, c2, r1, c1, () => {
        GUARDS.swapLocked = false;
        directTransition(STATE.PLAY);
      });
    });
    playSfx('swap');
    return;
  }

  // 유효 스왑
  GUARDS.swapLocked = true;
  directTransition(STATE.ANIMATING);
  doSwapAnim(r1, c1, r2, c2, () => {
    swapColors(gGrid, r1, c1, r2, c2);
    gTurnsLeft--;
    gComboCount = 0;
    processMatches();
  });
  playSfx('swap');
}

/* 스왑 애니메이션 */
function doSwapAnim(r1, c1, r2, c2, onDone) {
  const cell1 = gGrid[r1][c1], cell2 = gGrid[r2][c2];
  const { cellSize } = gLayout;
  const dx = (c2 - c1) * cellSize, dy = (r2 - r1) * cellSize;
  cell1.ax = 0; cell1.ay = 0;
  cell2.ax = 0; cell2.ay = 0;
  const o1 = { x: 0, y: 0 }, o2 = { x: 0, y: 0 };
  tween.add(o1, { x: dx, y: dy }, 180, 'easeInOut', () => {
    cell1.ax = 0; cell1.ay = 0;
    cell2.ax = 0; cell2.ay = 0;
    if (onDone) onDone();
  });
  tween.add(o2, { x: -dx, y: -dy }, 180, 'easeInOut');
  // 동기화: update에서 읽어 cell.ax/ay에 반영
  gAnimatingCells = [{cell: cell1, proxy: o1}, {cell: cell2, proxy: o2}];
}

/* 매치 처리 메인 */
function processMatches() {
  const matches = findMatches(gGrid);
  if (matches.length === 0) {
    finishCascade();
    return;
  }

  GUARDS.resolving = true;
  gComboCount++;
  let scoreGain = 0;

  // 점수 계산 + 보석 제거
  for (const m of matches) {
    const baseScore = m.type === 'match5' ? SCORE.match5 :
                      m.type === 'matchTL' ? SCORE.matchTL :
                      m.type === 'match4' ? SCORE.match4 : SCORE.match3;
    scoreGain += baseScore;

    // 스페셜 생성 위치 (첫 셀 또는 스왑 셀)
    let specialR = m.cells[0].r, specialC = m.cells[0].c;

    for (const p of m.cells) {
      const cell = gGrid[p.r][p.c];
      // 목표 추적
      trackGoal('collect', cell.color, 1);
      // 장애물 영향
      damageAdjacentObstacles(p.r, p.c);
      // 젤리 제거
      if (cell.jelly > 0) {
        cell.jelly--;
        scoreGain += SCORE.jellyLayer;
        if (cell.jelly <= 0) trackGoal('jelly', null, 1);
      }
      // 체인 해제
      if (cell.obs === OBS_TYPE.CHAIN) {
        cell.obs = OBS_TYPE.NONE;
        cell.obsLayers = 0;
        scoreGain += SCORE.obsChain;
        trackGoal('obstacle', 'chain', 1);
      }
      // 커튼 제거 (인접)
      revealAdjacentCurtains(p.r, p.c);
      // 보석 제거
      cell.color = null;
      cell.special = SPECIAL.NONE;
      cell.alpha = 0;
      // 파티클
      const px = gLayout.boardX + p.c * gLayout.cellSize + gLayout.cellSize / 2;
      const py = gLayout.boardY + p.r * gLayout.cellSize + gLayout.cellSize / 2;
      particles.emit(px, py, 6, { color: GEM_HEX[m.color] || '#FFD700', speed: 120, life: 0.4, size: 4 });
    }

    // 스페셜 보석 생성
    if (m.specialGen !== SPECIAL.NONE) {
      gGrid[specialR][specialC].color = m.color;
      gGrid[specialR][specialC].special = m.specialGen;
      gGrid[specialR][specialC].alpha = 1;
      gGrid[specialR][specialC].scale = 1.5; // 팝 효과
      tween.add(gGrid[specialR][specialC], { scale: 1 }, 200, 'easeOut');
    }
  }

  // 콤보 배율
  const comboMult = 1 + gComboCount * SCORE.cascadeMultBase;
  scoreGain = Math.floor(scoreGain * comboMult);
  gScore += scoreGain;

  // 팝업
  if (scoreGain > 0) {
    spawnPopup('+' + scoreGain + (gComboCount > 1 ? ' x' + gComboCount : ''),
      gLayout.boardX + gLayout.boardW / 2, gLayout.boardY + gLayout.boardH / 2);
  }

  if (gComboCount > 1) {
    playSfx('cascade');
    showCombo(gComboCount, gLayout.boardX + gLayout.boardW / 2, gLayout.boardY + gLayout.boardH / 2 - 50);
    trackStat('cascade', 1);
    trackStat('combo', gComboCount);
    if (gComboCount >= 3) triggerShake(3 + gComboCount);
  }
  else if (matches.some(m => m.type === 'match5')) playSfx('match5');
  else if (matches.some(m => m.type === 'match4' || m.type === 'matchTL')) playSfx('match4');
  else playSfx('match3');
  trackStat('match', matches.length);

  // 제거 연출 후 낙하
  const _dummyResolve = { t: 0 };
  tween.add(_dummyResolve, { t: 1 }, 200, 'linear', () => {
    GUARDS.resolving = false;
    doGravity();
  });
}

/* 인접 장애물 데미지 */
function damageAdjacentObstacles(r, c) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
    const adj = gGrid[nr][nc];
    if (adj.obs === OBS_TYPE.ICE) {
      adj.obsLayers--;
      if (adj.obsLayers <= 0) {
        adj.obs = OBS_TYPE.NONE;
        trackGoal('obstacle', 'ice', 1);
      }
      const px = gLayout.boardX + nc * gLayout.cellSize + gLayout.cellSize / 2;
      const py = gLayout.boardY + nr * gLayout.cellSize + gLayout.cellSize / 2;
      particles.emit(px, py, 5, { color: '#5AC8FA', speed: 80, life: 0.3, size: 3 });
      // 점수는 호출마다 중복 방지를 위해 최초 호출에서만 — 여기선 단순화
    }
    if (adj.obs === OBS_TYPE.WOOD) {
      adj.obsLayers--;
      if (adj.obsLayers <= 0) {
        adj.obs = OBS_TYPE.NONE;
        adj.color = null;
        trackGoal('obstacle', 'wood', 1);
      }
      const px = gLayout.boardX + nc * gLayout.cellSize + gLayout.cellSize / 2;
      const py = gLayout.boardY + nr * gLayout.cellSize + gLayout.cellSize / 2;
      particles.emit(px, py, 4, { color: '#8B4513', speed: 60, life: 0.3, size: 3 });
    }
    if (adj.curtain) {
      adj.curtain = false;
      trackGoal('obstacle', 'curtain', 1);
      const px = gLayout.boardX + nc * gLayout.cellSize + gLayout.cellSize / 2;
      const py = gLayout.boardY + nr * gLayout.cellSize + gLayout.cellSize / 2;
      particles.emit(px, py, 6, { color: '#AF52DE', speed: 80, life: 0.4, size: 3 });
    }
  }
}

function revealAdjacentCurtains(r, c) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
    const adj = gGrid[nr][nc];
    if (adj.curtain) {
      adj.curtain = false;
      trackGoal('obstacle', 'curtain', 1);
    }
  }
}

/* 중력 낙하 */
function doGravity() {
  // §14 #6: 색상 폭탄 제거 중이면 캐스케이드 지연
  if (GUARDS.colorBombResolving) return;
  GUARDS.cascadeInProgress = true;
  directTransition(STATE.CASCADING);
  let maxFallDist = 0;
  const { cellSize } = gLayout;

  for (let c = 0; c < COLS; c++) {
    let emptyRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      const cell = gGrid[r][c];
      if (cell.obs === OBS_TYPE.STONE) {
        emptyRow = r - 1;
        continue;
      }
      if (cell.obs === OBS_TYPE.WOOD || cell.obs === OBS_TYPE.POISON) {
        emptyRow = r - 1;
        continue;
      }
      if (cell.color) {
        if (r !== emptyRow) {
          // 이동
          const target = gGrid[emptyRow][c];
          target.color = cell.color;
          target.special = cell.special;
          target.curtain = cell.curtain;
          target.ay = -(emptyRow - r) * cellSize; // 위에서 내려옴
          cell.color = null;
          cell.special = SPECIAL.NONE;
          cell.curtain = false;
          cell.alpha = 1;
          maxFallDist = Math.max(maxFallDist, emptyRow - r);
        }
        emptyRow--;
      }
    }
    // 빈 셀에 새 보석 리필
    for (let r = emptyRow; r >= 0; r--) {
      const cell = gGrid[r][c];
      if (cell.obs === OBS_TYPE.STONE || cell.obs === OBS_TYPE.WOOD || cell.obs === OBS_TYPE.POISON) continue;
      if (!cell.color) {
        cell.color = gRng.pick(GEM_COLORS);
        cell.special = SPECIAL.NONE;
        cell.ay = -(emptyRow - r + 2) * cellSize;
        cell.alpha = 1;
        maxFallDist = Math.max(maxFallDist, emptyRow - r + 2);
      }
    }
  }

  // 낙하 애니메이션
  const fallDur = Math.min(400, 120 + maxFallDist * 40);
  const _fallProxy = { t: 0 };
  tween.add(_fallProxy, { t: 1 }, fallDur, 'easeIn', () => {
    // 모든 셀 ay=0 정리
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        gGrid[r][c].ay = 0;
    GUARDS.cascadeInProgress = false;
    // 재매칭 체크
    const newMatches = findMatches(gGrid);
    if (newMatches.length > 0) {
      directTransition(STATE.ANIMATING);
      processMatches();
    } else {
      finishCascade();
    }
  });
  // 낙하 중 ay 감소를 update에서 처리
  gAnimatingCells = [{ proxy: _fallProxy, fallDur }];
}

/* 캐스케이드 완료 후 처리 */
function finishCascade() {
  GUARDS.swapLocked = false;
  GUARDS.cascadeInProgress = false;
  GUARDS.resolving = false;

  // 독 확산 (update에서만 처리 — 여기서 호출)
  spreadPoison();

  // 유효 이동 체크
  if (!hasValidMove(gGrid)) {
    spawnPopup(L('noMoves'), gLayout.w / 2, gLayout.h / 2);
    shuffleBoard(gGrid);
    // 셔플 후에도 유효 이동 없으면 재시도
    let attempts = 0;
    while (!hasValidMove(gGrid) && attempts < 10) {
      shuffleBoard(gGrid);
      attempts++;
    }
  }

  // GOAL_CHECK 전환
  directTransition(STATE.GOAL_CHECK);
  checkGoals();
}

/* 독 확산 */
function spreadPoison() {
  const newPoison = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].obs === OBS_TYPE.POISON) {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        gRng.shuffle(dirs);
        for (const [dr, dc] of dirs) {
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
          const adj = gGrid[nr][nc];
          // 기획서 §2.4: 독은 인접 "빈 칸"에만 확산 (보석 있는 칸 제외)
          if (adj.color === null && adj.obs === OBS_TYPE.NONE && !adj.curtain) {
            newPoison.push({r: nr, c: nc});
            break; // 1턴 1칸만
          }
        }
      }
    }
  }
  for (const p of newPoison) {
    gGrid[p.r][p.c].obs = OBS_TYPE.POISON;
    gGrid[p.r][p.c].obsLayers = 1;
    gGrid[p.r][p.c].color = null;
    gGrid[p.r][p.c].special = SPECIAL.NONE;
    const px = gLayout.boardX + p.c * gLayout.cellSize + gLayout.cellSize / 2;
    const py = gLayout.boardY + p.r * gLayout.cellSize + gLayout.cellSize / 2;
    spawnEffect('poisonSpread', px, py);
    particles.emit(px, py, 8, { color: '#8B008B', speed: 60, life: 0.5, size: 4 });
    playSfx('poisonSpread');
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §9. 스페셜 보석 발동
 * ══════════════════════════════════════════════════════════════════ */

/* 줄 파괴 (가로) */
function activateLineH(r, c) {
  const cs = gLayout.cellSize;
  for (let cc = 0; cc < COLS; cc++) {
    destroyCell(r, cc);
  }
  const lx = gLayout.boardX + c * cs + cs / 2;
  const ly = gLayout.boardY + r * cs + cs / 2;
  spawnEffect('lineLaser', lx, ly);
  particles.emit(lx, ly, 15,
    { color: '#FFD700', speed: 200, life: 0.3, size: 5, spread: 0.3, angle: 0 });
  particles.emit(lx, ly, 15,
    { color: '#FFD700', speed: 200, life: 0.3, size: 5, spread: 0.3, angle: Math.PI });
  playSfx('specialCombo');
}

/* 줄 파괴 (세로) */
function activateLineV(r, c) {
  const cs = gLayout.cellSize;
  for (let rr = 0; rr < ROWS; rr++) {
    destroyCell(rr, c);
  }
  const vlx = gLayout.boardX + c * cs + cs / 2;
  const vly = gLayout.boardY + r * cs + cs / 2;
  spawnEffect('lineLaser', vlx, vly);
  particles.emit(vlx, vly, 15,
    { color: '#FFD700', speed: 200, life: 0.3, size: 5, spread: 0.3, angle: -Math.PI / 2 });
  particles.emit(vlx, vly, 15,
    { color: '#FFD700', speed: 200, life: 0.3, size: 5, spread: 0.3, angle: Math.PI / 2 });
  playSfx('specialCombo');
}

/* 폭탄 (3x3) */
function activateBomb(r, c) {
  const cs = gLayout.cellSize;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      destroyCell(r + dr, c + dc);
    }
  }
  const bmx = gLayout.boardX + c * cs + cs / 2;
  const bmy = gLayout.boardY + r * cs + cs / 2;
  spawnEffect('bombShock', bmx, bmy);
  particles.emit(bmx, bmy, 25,
    { color: '#FF6600', speed: 200, life: 0.5, size: 6 });
  triggerShake(5);
  playSfx('explosion');
}

/* 무지개 */
function activateRainbow(r, c, targetColor) {
  const cs = gLayout.cellSize;
  gGrid[r][c].color = null;
  gGrid[r][c].special = SPECIAL.NONE;
  let count = 0;
  for (let rr = 0; rr < ROWS; rr++) {
    for (let cc = 0; cc < COLS; cc++) {
      if (gGrid[rr][cc].color === targetColor) {
        // 스페셜 보석이면 발동
        if (gGrid[rr][cc].special !== SPECIAL.NONE) {
          const sp = gGrid[rr][cc].special;
          gGrid[rr][cc].special = SPECIAL.NONE;
          triggerSpecial(sp, rr, cc);
        }
        destroyCell(rr, cc);
        count++;
      }
    }
  }
  const rbx = gLayout.boardX + c * cs + cs / 2;
  const rby = gLayout.boardY + r * cs + cs / 2;
  spawnEffect('rainbow', rbx, rby);
  particles.emit(rbx, rby, 20,
    { color: '#FF00FF', speed: 150, life: 0.6, size: 5 });
  gScore += count * 100;
  GUARDS.swapLocked = false;
  directTransition(STATE.ANIMATING);
  const _d = { t: 0 };
  tween.add(_d, { t: 1 }, 300, 'linear', () => {
    processMatches();
  });
}

/* 스페셜 트리거 */
function triggerSpecial(sp, r, c) {
  if (sp === SPECIAL.LINE_H) activateLineH(r, c);
  else if (sp === SPECIAL.LINE_V) activateLineV(r, c);
  else if (sp === SPECIAL.BOMB) activateBomb(r, c);
  // 무지개는 별도 처리
}

/* 스페셜 조합 처리 */
function processSpecialCombo(r1, c1, r2, c2) {
  const a = gGrid[r1][c1], b = gGrid[r2][c2];
  const sa = a.special, sb = b.special;
  const cs = gLayout.cellSize;

  // 무지개+무지개
  if (sa === SPECIAL.RAINBOW && sb === SPECIAL.RAINBOW) {
    a.color = null; a.special = SPECIAL.NONE;
    b.color = null; b.special = SPECIAL.NONE;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        destroyCell(r, c);
    gScore += SCORE.comboRainRain;
    particles.emit(gLayout.w / 2, gLayout.h / 2, 40, { color: '#FF00FF', speed: 250, life: 0.8, size: 8 });
    playSfx('match5');
  }
  // 무지개 + 줄/폭탄
  else if (sa === SPECIAL.RAINBOW || sb === SPECIAL.RAINBOW) {
    const rainCell = sa === SPECIAL.RAINBOW ? a : b;
    const otherCell = sa === SPECIAL.RAINBOW ? b : a;
    const otherSp = otherCell.special;
    rainCell.color = null; rainCell.special = SPECIAL.NONE;
    const targetColor = otherCell.color;
    otherCell.special = SPECIAL.NONE;
    // 해당 색 모두 스페셜로 변환 후 발동
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (gGrid[r][c].color === targetColor) {
          gGrid[r][c].special = otherSp;
        }
      }
    }
    // 3개 무작위 발동
    let triggered = 0;
    for (let r = 0; r < ROWS && triggered < 3; r++) {
      for (let c = 0; c < COLS && triggered < 3; c++) {
        if (gGrid[r][c].special === otherSp && gGrid[r][c].color === targetColor) {
          gGrid[r][c].special = SPECIAL.NONE;
          triggerSpecial(otherSp, r, c);
          triggered++;
        }
      }
    }
    gScore += SCORE.comboRainBomb;
  }
  // 폭탄+폭탄 → 5x5
  else if (sa === SPECIAL.BOMB && sb === SPECIAL.BOMB) {
    a.special = SPECIAL.NONE; b.special = SPECIAL.NONE;
    const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2);
    for (let dr = -2; dr <= 2; dr++)
      for (let dc = -2; dc <= 2; dc++)
        destroyCell(cr + dr, cc + dc);
    gScore += SCORE.combo5x5;
    playSfx('explosion');
  }
  // 줄+폭탄 → 3줄
  else if ((sa === SPECIAL.BOMB && (sb === SPECIAL.LINE_H || sb === SPECIAL.LINE_V)) ||
           (sb === SPECIAL.BOMB && (sa === SPECIAL.LINE_H || sa === SPECIAL.LINE_V))) {
    a.special = SPECIAL.NONE; b.special = SPECIAL.NONE;
    const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2);
    for (let d = -1; d <= 1; d++) {
      for (let i = 0; i < COLS; i++) destroyCell(cr + d, i);
      for (let i = 0; i < ROWS; i++) destroyCell(i, cc + d);
    }
    gScore += SCORE.combo3Line;
    playSfx('specialCombo');
  }
  // 줄+줄 → 십자
  else if ((sa === SPECIAL.LINE_H || sa === SPECIAL.LINE_V) && (sb === SPECIAL.LINE_H || sb === SPECIAL.LINE_V)) {
    a.special = SPECIAL.NONE; b.special = SPECIAL.NONE;
    const cr = r1, cc = c1;
    for (let i = 0; i < COLS; i++) destroyCell(cr, i);
    for (let i = 0; i < ROWS; i++) destroyCell(i, cc);
    gScore += SCORE.comboCross;
    playSfx('specialCombo');
  }

  a.color = null; b.color = null;
  GUARDS.swapLocked = false;
  directTransition(STATE.ANIMATING);
  const _d = { t: 0 };
  tween.add(_d, { t: 1 }, 300, 'linear', () => {
    gComboCount = 0;
    processMatches();
  });
}

/* 셀 파괴 (장애물 상호작용 포함) */
function destroyCell(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  const cell = gGrid[r][c];
  if (cell.obs === OBS_TYPE.STONE) return; // 파괴 불가
  if (cell.obs === OBS_TYPE.ICE) {
    cell.obsLayers--;
    if (cell.obsLayers <= 0) {
      cell.obs = OBS_TYPE.NONE;
      trackGoal('obstacle', 'ice', 1);
    }
    return;
  }
  if (cell.obs === OBS_TYPE.WOOD) {
    cell.obsLayers--;
    if (cell.obsLayers <= 0) {
      cell.obs = OBS_TYPE.NONE;
      trackGoal('obstacle', 'wood', 1);
    }
    return;
  }
  if (cell.obs === OBS_TYPE.POISON) {
    cell.obs = OBS_TYPE.NONE;
    cell.obsLayers = 0;
    trackGoal('obstacle', 'poison', 1);
    return;
  }
  if (cell.curtain) {
    cell.curtain = false;
    trackGoal('obstacle', 'curtain', 1);
    // 커튼 제거 이펙트 시퀀스
    const crx = gLayout.boardX + c * gLayout.cellSize + gLayout.cellSize / 2;
    const cry = gLayout.boardY + r * gLayout.cellSize + gLayout.cellSize / 2;
    spawnEffect('curtainReveal', crx, cry);
  }
  if (cell.jelly > 0) {
    cell.jelly--;
    if (cell.jelly <= 0) trackGoal('jelly', null, 1);
  }
  if (cell.obs === OBS_TYPE.CHAIN) {
    cell.obs = OBS_TYPE.NONE;
    cell.obsLayers = 0;
    trackGoal('obstacle', 'chain', 1);
  }
  if (cell.color) {
    trackGoal('collect', cell.color, 1);
    // 이펙트 시퀀스 에셋 활용 — 매칭 폭발 이펙트
    const efx = gLayout.boardX + c * gLayout.cellSize + gLayout.cellSize / 2;
    const efy = gLayout.boardY + r * gLayout.cellSize + gLayout.cellSize / 2;
    spawnEffect('match', efx, efy);
    if (cell.special !== SPECIAL.NONE) {
      const sp = cell.special;
      cell.special = SPECIAL.NONE;
      cell.color = null;
      triggerSpecial(sp, r, c);
      return;
    }
    cell.color = null;
    cell.special = SPECIAL.NONE;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §10. 목표 추적 & 판정
 * ══════════════════════════════════════════════════════════════════ */
function initGoals(level) {
  gGoalProgress = [];
  for (const g of level.goals) {
    let adjusted = g.val;
    // DDA 목표 감소
    const reduction = gDDA.getGoalReduction(level);
    if (g.type !== 'score') {
      adjusted = Math.max(1, g.val - reduction);
    }
    gGoalProgress.push({ ...g, val: adjusted, current: 0 });
  }
}

function trackGoal(type, subtype, amount) {
  for (const g of gGoalProgress) {
    if (type === 'collect' && g.type === 'collect') {
      if (g.color === subtype || g.color === 'any') g.current += amount;
    }
    if (type === 'obstacle' && g.type === 'obstacle' && g.obs === subtype) {
      g.current += amount;
    }
    if (type === 'jelly' && g.type === 'jelly') {
      g.current += amount;
    }
  }
}

function checkGoals() {
  GUARDS.goalChecking = true;
  // 점수 목표 즉시 반영
  for (const g of gGoalProgress) {
    if (g.type === 'score') g.current = gScore;
  }
  const allMet = gGoalProgress.every(g => g.current >= g.val);

  if (allMet) {
    GUARDS.goalChecking = false;
    gLevelCleared = true;
    gDDA.onClear();
    // 별 계산
    const lvl = LEVELS[gCurrentLevel];
    const turnRatio = gTurnsLeft / lvl.turns;
    if (turnRatio >= 0.66 || (lvl.star3 > 0 && gScore >= lvl.star3)) gStarsEarned = 3;
    else if (turnRatio >= 0.33) gStarsEarned = 2;
    else gStarsEarned = 1;
    directTransition(STATE.CLEAR_ANIM);
    gClearTimer = 0;
    GUARDS.clearAnimPlaying = true;
    playSfx('levelClear');
  } else if (gTurnsLeft <= 0) {
    // §14 #11: 추가 턴 부스터 보유 시 FAIL_ANIM 진입 방지 — 사용 제안 오버레이 표시
    if (gBoosters.extraTurns > 0) {
      GUARDS.goalChecking = false;
      gShowExtraTurnsPrompt = true;
      directTransition(STATE.PLAY);
      return;
    }
    GUARDS.goalChecking = false;
    gLevelCleared = false;
    gDDA.onFail();
    directTransition(STATE.FAIL_ANIM);
    gFailTimer = 0;
    GUARDS.failAnimPlaying = true;
    playSfx('levelFail');
  } else {
    GUARDS.goalChecking = false;
    directTransition(STATE.PLAY);
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §11. 부스터 시스템
 * ══════════════════════════════════════════════════════════════════ */
function activateBooster(type) {
  if (isInputBlocked()) return;
  if (gBoosters[type] <= 0) return;

  if (type === 'shuffle') {
    gBoosters[type]--;
    shuffleBoard(gGrid);
    playSfx('boosterActivate');
    saveSave();
    return;
  }
  if (type === 'extraTurns') {
    gBoosters[type]--;
    gTurnsLeft += 5;
    spawnPopup('+5 ' + L('moves'), gLayout.w / 2, gLayout.topBarH + 20);
    playSfx('boosterActivate');
    saveSave();
    return;
  }

  // 망치, 색상 폭탄 — 대상 선택 필요
  gActiveBooster = type;
  GUARDS.boosterActive = true;
  directTransition(STATE.BOOSTING);
}

function applyBoosterToCell(r, c) {
  if (!gActiveBooster) return;
  const cell = gGrid[r][c];

  if (gActiveBooster === 'hammer') {
    if (cell.obs === OBS_TYPE.STONE) {
      spawnPopup(L('obstacleIndestructible'), gLayout.w / 2, gLayout.h / 2);
      cancelBooster();
      return; // 소모 안 함
    }
    gBoosters.hammer--;
    // 최상위 1겹만 파괴
    if (cell.obs === OBS_TYPE.ICE) {
      cell.obsLayers--;
      if (cell.obsLayers <= 0) { cell.obs = OBS_TYPE.NONE; trackGoal('obstacle', 'ice', 1); }
    } else if (cell.obs === OBS_TYPE.WOOD) {
      cell.obsLayers--;
      if (cell.obsLayers <= 0) { cell.obs = OBS_TYPE.NONE; trackGoal('obstacle', 'wood', 1); }
    } else if (cell.obs === OBS_TYPE.POISON) {
      cell.obs = OBS_TYPE.NONE; cell.obsLayers = 0; trackGoal('obstacle', 'poison', 1);
    } else if (cell.curtain) {
      cell.curtain = false; trackGoal('obstacle', 'curtain', 1);
    } else if (cell.obs === OBS_TYPE.CHAIN) {
      cell.obs = OBS_TYPE.NONE; cell.obsLayers = 0; trackGoal('obstacle', 'chain', 1);
    } else if (cell.special !== SPECIAL.NONE) {
      const sp = cell.special;
      cell.special = SPECIAL.NONE;
      cell.color = null;
      triggerSpecial(sp, r, c);
    } else {
      if (cell.color) trackGoal('collect', cell.color, 1);
      cell.color = null; cell.special = SPECIAL.NONE;
    }
    if (cell.jelly > 0) { cell.jelly--; if (cell.jelly <= 0) trackGoal('jelly', null, 1); }
    const px = gLayout.boardX + c * gLayout.cellSize + gLayout.cellSize / 2;
    const py = gLayout.boardY + r * gLayout.cellSize + gLayout.cellSize / 2;
    particles.emit(px, py, 15, { color: '#FFD700', speed: 150, life: 0.5, size: 5 });
    playSfx('hit');
  }
  else if (gActiveBooster === 'colorBomb') {
    if (!cell.color) { cancelBooster(); return; }
    gBoosters.colorBomb--;
    const targetColor = cell.color;
    GUARDS.colorBombResolving = true;
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) {
        if (gGrid[rr][cc].color === targetColor) {
          destroyCell(rr, cc);
          const px = gLayout.boardX + cc * gLayout.cellSize + gLayout.cellSize / 2;
          const py = gLayout.boardY + rr * gLayout.cellSize + gLayout.cellSize / 2;
          particles.emit(px, py, 5, { color: GEM_HEX[targetColor], speed: 100, life: 0.4, size: 4 });
        }
      }
    }
    gScore += 500;
    // §14 #6: colorBombResolving 해제를 애니메이션 완료 콜백에서 수행
    // (동기 블록에서 즉시 false 하지 않음 — doGravity 진입 전까지 가드 유지)
    playSfx('match5');
  }

  // 완료
  GUARDS.boosterActive = false;
  gActiveBooster = null;
  saveSave();

  // 캐스케이드 시작 — 색상 폭탄 제거 애니메이션 완료 후 캐스케이드 개시
  directTransition(STATE.ANIMATING);
  const _d = { t: 0 };
  tween.add(_d, { t: 1 }, 300, 'linear', () => {
    // 색상 폭탄 제거 완료 → 가드 해제 → 캐스케이드 개시
    GUARDS.colorBombResolving = false;
    gComboCount = 0;
    doGravity();
  });
}

function cancelBooster() {
  GUARDS.boosterActive = false;
  gActiveBooster = null;
  directTransition(STATE.PLAY);
}

/* ══════════════════════════════════════════════════════════════════
 *  §12. 사운드 SFX (14종+)
 * ══════════════════════════════════════════════════════════════════ */
function playSfx(name) {
  if (!gSoundInited) return;
  switch (name) {
    case 'swap': sound.tone(440, 0.06, 'sine', 0.2); sound.tone(550, 0.08, 'sine', 0.2); break;
    case 'match3': sound.tone(660, 0.08, 'sine', 0.3); sound.tone(880, 0.1, 'sine', 0.25); break;
    case 'match4': sound.tone(660, 0.06, 'sine', 0.3); sound.tone(880, 0.08, 'sine', 0.3); sound.tone(1100, 0.1, 'sine', 0.25); break;
    case 'match5': sound.tone(660, 0.05, 'sine'); sound.tone(880, 0.07, 'sine'); sound.tone(1100, 0.09, 'sine'); sound.tone(1320, 0.12, 'sine'); break;
    case 'cascade':
      const freq = 440 + gComboCount * 80;
      sound.tone(freq, 0.08, 'sine', 0.3);
      sound.tone(freq * 1.25, 0.1, 'sine', 0.25);
      break;
    case 'specialCombo': sound.tone(300, 0.1, 'sawtooth', 0.3); sound.tone(600, 0.15, 'sine', 0.3); sound.tone(900, 0.2, 'sine', 0.25); break;
    case 'explosion': sound.tone(80, 0.25, 'sawtooth', 0.4); sound.tone(60, 0.3, 'sawtooth', 0.3); break;
    case 'obstacleBreak': sound.tone(1200, 0.05, 'square', 0.2); sound.tone(800, 0.08, 'square', 0.15); break;
    case 'poisonSpread': sound.tone(150, 0.15, 'sawtooth', 0.2); sound.tone(120, 0.2, 'sawtooth', 0.15); break;
    case 'boosterActivate': sound.tone(500, 0.08, 'sine', 0.3); sound.tone(750, 0.1, 'sine', 0.3); sound.tone(1000, 0.12, 'sine', 0.25); break;
    case 'levelClear':
      sound.tone(523, 0.1, 'sine', 0.3); sound.tone(659, 0.1, 'sine', 0.3);
      sound.tone(784, 0.1, 'sine', 0.3); sound.tone(1047, 0.2, 'sine', 0.3);
      break;
    case 'levelFail': sound.tone(440, 0.2, 'sawtooth', 0.3); sound.tone(330, 0.3, 'sawtooth', 0.25); sound.tone(220, 0.4, 'sawtooth', 0.2); break;
    case 'starEarn': sound.tone(880 + gResultStars * 200, 0.1, 'sine', 0.3); sound.tone(1100 + gResultStars * 200, 0.15, 'sine', 0.25); break;
    case 'buttonTap': sound.tone(600, 0.05, 'sine', 0.2); break;
    case 'hit': sound.tone(200, 0.1, 'sawtooth', 0.3); break;
  }
}

/* BGM — dt 기반 타이머 (setInterval 금지) */
const BGM_NOTES_MAP = [
  // C장조 아르페지오 — 밝은 판타지
  523, 659, 784, 1047, 784, 659, 523, 392,
  440, 523, 659, 784, 659, 523, 440, 392,
  349, 440, 523, 659, 523, 440, 349, 294
];
function updateBgm(dt) {
  if (!gSoundInited || !gBgmPlaying) return;
  gBgmTimer += dt;
  const interval = 60000 / gBgmBpm / 2; // 8분음표
  if (gBgmTimer >= interval) {
    gBgmTimer -= interval;
    const note = BGM_NOTES_MAP[gBgmNoteIdx % BGM_NOTES_MAP.length];
    sound.tone(note, 0.15, 'sine', 0.08);
    gBgmNoteIdx++;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §13. 팝업 텍스트 시스템
 * ══════════════════════════════════════════════════════════════════ */
function spawnPopup(text, x, y) {
  gPopups.push({ text, x, y, alpha: 1, vy: -60, timer: 1.2 });
}
function updatePopups(dt) {
  const dtSec = dt / 1000;
  for (let i = gPopups.length - 1; i >= 0; i--) {
    const p = gPopups[i];
    p.y += p.vy * dtSec;
    p.timer -= dtSec;
    p.alpha = Math.max(0, p.timer / 1.2);
    if (p.timer <= 0) gPopups.splice(i, 1);
  }
}
function renderPopups(ctx) {
  for (const p of gPopups) {
    ctx.globalAlpha = p.alpha;
    UI.text(ctx, p.text, p.x, p.y, { size: gLayout.fontSize + 4, color: '#FFD700', bold: true, shadow: true });
  }
  ctx.globalAlpha = 1;
}

/* ══════════════════════════════════════════════════════════════════
 *  §14. enterState() — 상태 진입 초기화 일원화
 * ══════════════════════════════════════════════════════════════════ */
function enterState(st) {
  switch (st) {
    case STATE.TITLE:
      gTitleTime = 0;
      gTitleGems = [];
      for (let i = 0; i < 6; i++) {
        gTitleGems.push({
          x: gLayout.w * 0.2 + (i % 3) * gLayout.w * 0.3,
          y: gLayout.h * 0.3 + Math.floor(i / 3) * 80,
          color: GEM_COLORS[i], scale: 0, targetScale: 1, rot: gRng.next() * Math.PI * 2
        });
      }
      // 보석 등장 트윈
      gTitleGems.forEach((g, i) => {
        const _proxy = { s: 0 };
        tween.add(_proxy, { s: 1 }, 300 + i * 100, 'easeOut');
        g._proxy = _proxy;
      });
      gBgmPlaying = true; gBgmTimer = 0; gBgmNoteIdx = 0;
      break;

    case STATE.MAP:
      // 맵 스크롤 위치를 현재 레벨 기준으로
      const nodeY = getMapNodeY(gCurrentLevel);
      gMapScrollY = MathUtil.clamp(nodeY - gLayout.h / 2, 0, getMapTotalH() - gLayout.h);
      gMapDragging = false;
      break;

    case STATE.LEVEL_INTRO:
      gIntroTimer = 0;
      break;

    case STATE.PLAY:
      gSelected = null;
      gActiveBooster = null;
      GUARDS.boosterActive = false;
      break;

    case STATE.CLEAR_ANIM:
      gClearTimer = 0;
      gResultStars = 0;
      break;

    case STATE.FAIL_ANIM:
      gFailTimer = 0;
      break;

    case STATE.RESULT:
      GUARDS.clearAnimPlaying = false;
      GUARDS.failAnimPlaying = false;
      // 저장
      if (gLevelCleared) {
        const prev = gSaveData.levelStars[gCurrentLevel] || 0;
        gSaveData.levelStars[gCurrentLevel] = Math.max(prev, gStarsEarned);
        if (gCurrentLevel >= gSaveData.lastLevel) gSaveData.lastLevel = gCurrentLevel + 1;
        // 보상 스테이지 부스터 지급
        const lvl = LEVELS[gCurrentLevel];
        if (lvl.bonus) {
          gBoosters.hammer += 1;
          gBoosters.shuffle += 1;
          gBoosters.extraTurns += 1;
          if (lvl.id === 10 || lvl.id === 20) gBoosters.colorBomb += 1;
        }
      }
      saveSave();
      Save.setHighScore(GAME_ID, gScore);
      break;

    case STATE.PAUSED:
      gBgmPlaying = false;
      break;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §15. 레벨 시작
 * ══════════════════════════════════════════════════════════════════ */
function startLevel(levelIdx) {
  gCurrentLevel = levelIdx;
  const lvl = LEVELS[levelIdx];
  gRng = new SeededRNG(lvl.id * 1000 + Date.now() % 10000);
  gGrid = createEmptyGrid();
  placeObstacles(gGrid, lvl);
  fillBoard(gGrid);

  // 유효 이동 보장
  let attempts = 0;
  while (!hasValidMove(gGrid) && attempts < 50) {
    gGrid = createEmptyGrid();
    placeObstacles(gGrid, lvl);
    fillBoard(gGrid);
    attempts++;
  }

  gTurnsLeft = lvl.turns + gDDA.getExtraTurns(lvl);
  gScore = 0;
  gComboCount = 0;
  gLevelCleared = false;
  gStarsEarned = 0;
  gSelected = null;
  gCursorR = 0; gCursorC = 0;
  gActiveBooster = null;
  gSwipeStart = null;
  gSwipeActive = false;
  gShowExtraTurnsPrompt = false;
  resetGuards();
  initGoals(lvl);
  gPopups = [];
  _bgCacheDirty = true;

  // DDA 무료 부스터
  if (gDDA.shouldFreeBooster() && lvl.ddaOverride && lvl.ddaOverride.grantFreeColorBomb) {
    gBoosters.colorBomb += 1;
    spawnPopup('Free Color Bomb!', gLayout.w / 2, gLayout.h / 2);
  } else if (gDDA.shouldFreeShuffle()) {
    gBoosters.shuffle += 1;
  }

  gBgmPlaying = true; gBgmBpm = 110;
}

/* ══════════════════════════════════════════════════════════════════
 *  §16. 맵 시스템
 * ══════════════════════════════════════════════════════════════════ */
function getMapTotalH() { return 1800; }
function getMapNodeY(idx) {
  // 구불구불한 경로: 사인 곡선
  const totalH = getMapTotalH();
  const spacing = (totalH - 200) / 20;
  return totalH - 100 - idx * spacing;
}
function getMapNodeX(idx) {
  const w = gLayout.w;
  const cx = w / 2;
  const amp = w * 0.25;
  return cx + Math.sin(idx * 0.8) * amp;
}

/* ══════════════════════════════════════════════════════════════════
 *  §17. GAME UPDATE — 메인 루프 update
 * ══════════════════════════════════════════════════════════════════ */
function gameUpdate(dt, ts) {
  const sys = ACTIVE_SYSTEMS[gState];

  // Tween 항상 업데이트 (상태 전환 페이드 때문)
  tween.update(dt);
  if (sys.particle) particles.update(dt);
  updatePopups(dt);

  // BGM
  if (gState === STATE.PLAY || gState === STATE.ANIMATING || gState === STATE.CASCADING ||
      gState === STATE.MAP || gState === STATE.TITLE) {
    updateBgm(dt);
  }

  // 낙하 애니메이션 ay 보간
  if (gState === STATE.CASCADING && gAnimatingCells.length > 0 && gGrid.length > 0) {
    const info = gAnimatingCells[0];
    if (info && info.fallDur) {
      const t = info.proxy.t;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = gGrid[r][c];
          if (cell && cell.ay !== 0) {
            // 이동 중인 셀의 ay 보간 (ay → 0)
          }
        }
      }
    }
  }

  // 스왑 애니메이션 프록시 동기화
  if (gAnimatingCells.length > 0 && gAnimatingCells[0].cell) {
    for (const ac of gAnimatingCells) {
      if (ac.cell && ac.proxy) {
        ac.cell.ax = ac.proxy.x || 0;
        ac.cell.ay = ac.proxy.y || 0;
      }
    }
  }

  // 보석 반짝임 — gGrid 초기화 전 접근 방지
  if (gGrid.length > 0) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = gGrid[r][c];
        if (cell && cell.color && cell.sparkleTimer > 0) cell.sparkleTimer -= dt;
      }
    }
  }

  // 상태별 업데이트
  switch (gState) {
    case STATE.LOADING: break; // 이미 init에서 처리
    case STATE.TITLE: updateTitle(dt); break;
    case STATE.MAP: updateMap(dt); break;
    case STATE.LEVEL_INTRO: updateLevelIntro(dt); break;
    case STATE.PLAY: updatePlay(dt); break;
    case STATE.ANIMATING: break;
    case STATE.CASCADING: break;
    case STATE.BOOSTING: updateBoosting(dt); break;
    case STATE.GOAL_CHECK: break;
    case STATE.CLEAR_ANIM: updateClearAnim(dt); break;
    case STATE.FAIL_ANIM: updateFailAnim(dt); break;
    case STATE.RESULT: updateResult(dt); break;
    case STATE.PAUSED: updatePaused(dt); break;
  }

  input.flush();
}

/* --- 상태별 update 함수들 --- */

function updateTitle(dt) {
  gTitleTime += dt;
  // 타이틀 보석 프록시 동기화
  for (const g of gTitleGems) {
    if (g._proxy) g.scale = g._proxy.s;
  }
  if (input.confirm()) {
    if (!gSoundInited) { sound.init(); gSoundInited = true; }
    playSfx('buttonTap');
    loadSave();
    gCurrentLevel = Math.min(gSaveData.lastLevel, LEVELS.length - 1);
    beginTransition(STATE.MAP);
  }
}

function updateMap(dt) {
  // 터치/마우스 스크롤
  if (input.tapped) {
    gMapDragStartY = input.tapY + gMapScrollY;
    gMapDragging = true;
    gMapDragDist = 0;
  }
  if (input.mouseDown && gMapDragging) {
    const newScroll = gMapDragStartY - input.mouseY;
    gMapDragDist += Math.abs(newScroll - gMapScrollY);
    gMapScrollY = MathUtil.clamp(newScroll, 0, Math.max(0, getMapTotalH() - gLayout.h));
  }
  if (!input.mouseDown && gMapDragging) {
    gMapDragging = false;
    // 탭 (드래그 아닌 경우) → 노드 선택
    if (gMapDragDist < 15 && input.tapped === false) {
      // 이미 tapped=false이므로 mouseup 시점에서 처리
    }
  }

  // 탭으로 노드 선택 (드래그 짧을 때)
  if (input.tapped && gMapDragDist < 15) {
    const tapX = input.tapX, tapY = input.tapY;
    for (let i = 0; i <= Math.min(gSaveData.lastLevel, LEVELS.length - 1); i++) {
      const nx = getMapNodeX(i);
      const ny = getMapNodeY(i) - gMapScrollY;
      const nodeSize = 40;
      const hitSize = Math.max(MIN_TOUCH, nodeSize);
      if (UI.hitTest(tapX, tapY, nx - hitSize / 2, ny - hitSize / 2, hitSize, hitSize)) {
        gCurrentLevel = i;
        playSfx('buttonTap');
        beginTransition(STATE.LEVEL_INTRO, () => { startLevel(i); });
        break;
      }
    }
  }

  // 키보드 네비게이션
  if (input.jp('ArrowUp')) {
    gCurrentLevel = Math.min(gCurrentLevel + 1, Math.min(gSaveData.lastLevel, LEVELS.length - 1));
    const ny = getMapNodeY(gCurrentLevel);
    gMapScrollY = MathUtil.clamp(ny - gLayout.h / 2, 0, getMapTotalH() - gLayout.h);
  }
  if (input.jp('ArrowDown')) {
    gCurrentLevel = Math.max(gCurrentLevel - 1, 0);
    const ny = getMapNodeY(gCurrentLevel);
    gMapScrollY = MathUtil.clamp(ny - gLayout.h / 2, 0, getMapTotalH() - gLayout.h);
  }
  if (input.jp('Enter') || input.jp('Space')) {
    playSfx('buttonTap');
    beginTransition(STATE.LEVEL_INTRO, () => { startLevel(gCurrentLevel); });
  }
  if (input.jp('Escape')) {
    beginTransition(STATE.TITLE);
  }
}

function updateLevelIntro(dt) {
  gIntroTimer += dt;
  if (gIntroTimer > 1500 || input.confirm()) {
    directTransition(STATE.PLAY);
  }
}

function updatePlay(dt) {
  // §14 #11: 턴 0 + 추가 턴 부스터 제안 오버레이 처리
  if (gShowExtraTurnsPrompt) {
    if (input.tapped || input.confirm()) {
      const { w, h } = gLayout;
      const btnW = 120, btnH = 45;
      const useX = w / 2 - btnW - 10, useY = h * 0.55;
      const skipX = w / 2 + 10, skipY = h * 0.55;
      // "사용" 버튼 or Space/Enter → 즉시 +5 적용
      if (input.confirm() || (input.tapped && UI.hitTest(input.tapX, input.tapY, useX, useY, btnW, btnH))) {
        gBoosters.extraTurns--;
        gTurnsLeft += 5;
        gShowExtraTurnsPrompt = false;
        spawnPopup('+5 ' + L('moves'), w / 2, gLayout.topBarH + 20);
        playSfx('boosterActivate');
        saveSave();
        return;
      }
      // "포기" 버튼 클릭
      if (input.tapped && UI.hitTest(input.tapX, input.tapY, skipX, skipY, btnW, btnH)) {
        gShowExtraTurnsPrompt = false;
        gLevelCleared = false;
        gDDA.onFail();
        directTransition(STATE.FAIL_ANIM);
        gFailTimer = 0;
        GUARDS.failAnimPlaying = true;
        playSfx('levelFail');
        return;
      }
    }
    return; // 프롬프트 활성 중에는 다른 입력 차단
  }

  if (isInputBlocked()) return;

  // ESC → 일시정지
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(STATE.PAUSED);
    return;
  }

  // 키보드 조작
  if (input.jp('ArrowUp')) gCursorR = Math.max(0, gCursorR - 1);
  if (input.jp('ArrowDown')) gCursorR = Math.min(ROWS - 1, gCursorR + 1);
  if (input.jp('ArrowLeft')) gCursorC = Math.max(0, gCursorC - 1);
  if (input.jp('ArrowRight')) gCursorC = Math.min(COLS - 1, gCursorC + 1);

  if (input.jp('Space') || input.jp('Enter')) {
    handleCellSelect(gCursorR, gCursorC);
  }

  // 부스터 단축키
  if (input.jp('Digit1')) activateBooster('hammer');
  if (input.jp('Digit2')) activateBooster('shuffle');
  if (input.jp('Digit3')) activateBooster('extraTurns');
  if (input.jp('Digit4')) activateBooster('colorBomb');

  // 마우스/터치 — 클릭 선택
  if (input.tapped) {
    const { boardX, boardY, cellSize } = gLayout;
    const gr = Math.floor((input.tapY - boardY) / cellSize);
    const gc = Math.floor((input.tapX - boardX) / cellSize);

    // 부스터 바 체크
    if (input.tapY >= gLayout.boosterY) {
      const boosterTypes = ['hammer', 'shuffle', 'extraTurns', 'colorBomb'];
      const bw = gLayout.boosterBtnSize;
      const totalW = boosterTypes.length * (bw + 10) - 10;
      const startX = (gLayout.w - totalW) / 2;
      for (let i = 0; i < boosterTypes.length; i++) {
        const bx = startX + i * (bw + 10);
        if (UI.hitTest(input.tapX, input.tapY, bx, gLayout.boosterY + 5, bw, bw)) {
          activateBooster(boosterTypes[i]);
          return;
        }
      }
      return;
    }

    // 일시정지 버튼 체크
    if (UI.hitTest(input.tapX, input.tapY, gLayout.w - 50, 5, 45, 40)) {
      directTransition(STATE.PAUSED);
      return;
    }

    if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
      // 스와이프 시작
      gSwipeStart = { r: gr, c: gc, x: input.tapX, y: input.tapY };
      gSwipeActive = true;
      handleCellSelect(gr, gc);
    }
  }

  // 스와이프 감지
  if (gSwipeActive && input.mouseDown && gSwipeStart) {
    const dx = input.mouseX - gSwipeStart.x;
    const dy = input.mouseY - gSwipeStart.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > gLayout.cellSize * 0.3) {
      gSwipeActive = false;
      // 방향 판정
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;
      const tr = gSwipeStart.r + dr, tc = gSwipeStart.c + dc;
      if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
        gSelected = null;
        if (canSwap(gGrid, gSwipeStart.r, gSwipeStart.c) && canSwap(gGrid, tr, tc)) {
          startSwap(gSwipeStart.r, gSwipeStart.c, tr, tc);
        }
      }
      gSwipeStart = null;
    }
  }
  if (!input.mouseDown) {
    gSwipeActive = false;
    gSwipeStart = null;
  }
}

function handleCellSelect(r, c) {
  if (!canSwap(gGrid, r, c) && gGrid[r][c].obs !== OBS_TYPE.NONE) return;
  resetHint();

  if (gSelected) {
    const dr = Math.abs(gSelected.r - r), dc = Math.abs(gSelected.c - c);
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      // 인접 → 스왑 시도
      if (canSwap(gGrid, gSelected.r, gSelected.c) && canSwap(gGrid, r, c)) {
        startSwap(gSelected.r, gSelected.c, r, c);
        gSelected = null;
        return;
      }
    }
    // 같은 셀 또는 비인접 → 재선택
    gSelected = (gSelected.r === r && gSelected.c === c) ? null : { r, c };
  } else {
    gSelected = { r, c };
  }
}

function updateBoosting(dt) {
  if (input.jp('Escape')) { cancelBooster(); return; }

  if (input.tapped) {
    const { boardX, boardY, cellSize } = gLayout;
    const gr = Math.floor((input.tapY - boardY) / cellSize);
    const gc = Math.floor((input.tapX - boardX) / cellSize);
    if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
      applyBoosterToCell(gr, gc);
    }
  }

  if (input.jp('Space') || input.jp('Enter')) {
    if (gCursorR >= 0 && gCursorR < ROWS && gCursorC >= 0 && gCursorC < COLS) {
      applyBoosterToCell(gCursorR, gCursorC);
    }
  }
  // 키보드 커서
  if (input.jp('ArrowUp')) gCursorR = Math.max(0, gCursorR - 1);
  if (input.jp('ArrowDown')) gCursorR = Math.min(ROWS - 1, gCursorR + 1);
  if (input.jp('ArrowLeft')) gCursorC = Math.max(0, gCursorC - 1);
  if (input.jp('ArrowRight')) gCursorC = Math.min(COLS - 1, gCursorC + 1);
}

function updateClearAnim(dt) {
  gClearTimer += dt;
  // 별 등장
  if (gClearTimer > 800 && gResultStars < gStarsEarned) {
    if (gClearTimer > 800 + gResultStars * 400) {
      gResultStars++;
      playSfx('starEarn');
      particles.emit(gLayout.w / 2, gLayout.h * 0.35, 15, { color: '#FFD700', speed: 150, life: 0.6, size: 5 });
    }
  }
  // 불꽃놀이
  if (gClearTimer > 300 && gClearTimer < 1500) {
    if (gRng.next() < 0.15) {
      const fx = gRng.next() * gLayout.w;
      const fy = gRng.next() * gLayout.h * 0.5;
      particles.emit(fx, fy, 10, { color: gRng.pick(['#FF2D55','#007AFF','#34C759','#FFCC00','#AF52DE','#FFD700']), speed: 120, life: 0.5, size: 4 });
    }
  }
  if (gClearTimer > 3000) {
    beginTransition(STATE.RESULT);
  }
}

function updateFailAnim(dt) {
  gFailTimer += dt;
  if (gFailTimer > 1500) {
    beginTransition(STATE.RESULT);
  }
}

function updateResult(dt) {
  // 재시도
  if (input.jp('KeyR') || input.tapped) {
    const { w, h } = gLayout;
    // 버튼 위치 체크
    const btnW = 140, btnH = 50;
    if (gLevelCleared) {
      // 다음 레벨 / 맵
      const nextBtnX = w / 2 - btnW - 10, nextBtnY = h * 0.65;
      const mapBtnX = w / 2 + 10, mapBtnY = h * 0.65;
      if (input.tapped) {
        if (UI.hitTest(input.tapX, input.tapY, nextBtnX, nextBtnY, btnW, btnH)) {
          const nextIdx = gCurrentLevel + 1;
          if (nextIdx < LEVELS.length) {
            playSfx('buttonTap');
            beginTransition(STATE.MAP);
          }
        } else if (UI.hitTest(input.tapX, input.tapY, mapBtnX, mapBtnY, btnW, btnH)) {
          playSfx('buttonTap');
          beginTransition(STATE.MAP);
        }
      }
    } else {
      // 재시도 / 맵
      const retryBtnX = w / 2 - btnW - 10, retryBtnY = h * 0.65;
      const mapBtnX = w / 2 + 10, mapBtnY = h * 0.65;
      if (input.tapped) {
        if (UI.hitTest(input.tapX, input.tapY, retryBtnX, retryBtnY, btnW, btnH)) {
          playSfx('buttonTap');
          beginTransition(STATE.PLAY, () => { startLevel(gCurrentLevel); });
        } else if (UI.hitTest(input.tapX, input.tapY, mapBtnX, mapBtnY, btnW, btnH)) {
          playSfx('buttonTap');
          beginTransition(STATE.MAP);
        }
      }
    }
  }
  // 키보드
  if (input.jp('Enter') || input.jp('Space')) {
    playSfx('buttonTap');
    if (gLevelCleared) {
      beginTransition(STATE.MAP);
    } else {
      beginTransition(STATE.PLAY, () => { startLevel(gCurrentLevel); });
    }
  }
}

function updatePaused(dt) {
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(STATE.PLAY);
    gBgmPlaying = true;
    return;
  }
  if (input.tapped) {
    const { w, h } = gLayout;
    const btnW = 160, btnH = 50;
    const resumeX = w / 2 - btnW / 2, resumeY = h * 0.4;
    const quitX = w / 2 - btnW / 2, quitY = h * 0.55;
    if (UI.hitTest(input.tapX, input.tapY, resumeX, resumeY, btnW, btnH)) {
      directTransition(STATE.PLAY);
      gBgmPlaying = true;
      playSfx('buttonTap');
    } else if (UI.hitTest(input.tapX, input.tapY, quitX, quitY, btnW, btnH)) {
      playSfx('buttonTap');
      beginTransition(STATE.MAP);
      gBgmPlaying = true;
    }
  }
  if (input.jp('Enter') || input.jp('Space')) {
    directTransition(STATE.PLAY);
    gBgmPlaying = true;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §18. GAME RENDER — 메인 렌더
 * ══════════════════════════════════════════════════════════════════ */
function gameRender(ctx, w, h, dt) {
  // 배경
  ctx.fillStyle = CLR.bgPrimary;
  ctx.fillRect(0, 0, w, h);

  switch (gState) {
    case STATE.LOADING: renderLoading(ctx, w, h); break;
    case STATE.TITLE: renderTitle(ctx, w, h); break;
    case STATE.MAP: renderMap(ctx, w, h); break;
    case STATE.LEVEL_INTRO:
    case STATE.PLAY:
    case STATE.ANIMATING:
    case STATE.CASCADING:
    case STATE.BOOSTING:
    case STATE.GOAL_CHECK:
    case STATE.CLEAR_ANIM:
    case STATE.FAIL_ANIM:
      renderGameplay(ctx, w, h);
      break;
    case STATE.RESULT: renderResult(ctx, w, h); break;
    case STATE.PAUSED:
      renderGameplay(ctx, w, h);
      renderPauseOverlay(ctx, w, h);
      break;
  }

  particles.render(ctx);
  renderPopups(ctx);

  // 전역 페이드
  if (_fadeObj.a > 0.01) UI.fade(ctx, w, h, _fadeObj.a);
}

/* ══════════════════════════════════════════════════════════════════
 *  §18.1 로딩 화면
 * ══════════════════════════════════════════════════════════════════ */
function renderLoading(ctx, w, h) {
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0a0a1e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  UI.text(ctx, 'Loading...', w / 2, h / 2, { size: 20, color: '#FFD700' });
}

/* ══════════════════════════════════════════════════════════════════
 *  §18.2 타이틀 화면
 * ══════════════════════════════════════════════════════════════════ */
function renderTitle(ctx, w, h) {
  // 배경 그라디언트
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#E8F4FD');
  grad.addColorStop(0.5, '#C4E8C2');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 배경 에셋
  if (assets.sprites.bgGarden) {
    ctx.globalAlpha = 0.3;
    ctx.drawImage(assets.sprites.bgGarden, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // 장식 보석들
  for (const g of gTitleGems) {
    if (g.scale <= 0) continue;
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.scale(g.scale, g.scale);
    ctx.rotate(Math.sin(gTitleTime / 1000 + g.rot) * 0.15);
    drawGemFallback(ctx, g.color, -25, -25, 50, 50);
    ctx.restore();
  }

  // 제목
  const titleY = h * 0.18;
  ctx.save();
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 20;
  UI.text(ctx, L('title'), w / 2, titleY, { size: Math.min(40, w * 0.08), color: '#FFD700', bold: true });
  ctx.restore();
  UI.text(ctx, 'Gem Odyssey', w / 2, titleY + 35, { size: Math.min(18, w * 0.04), color: '#3D2B1F' });

  // PLAY 버튼
  const btnW = 160, btnH = 55;
  const btnX = w / 2 - btnW / 2, btnY = h * 0.72;
  drawFancyButton(ctx, L('play'), btnX, btnY, btnW, btnH, '#34C759');

  // 탭 안내
  const pulse = 0.5 + 0.5 * Math.sin(gTitleTime / 500);
  ctx.globalAlpha = pulse;
  UI.text(ctx, L('tapToStart'), w / 2, h * 0.88, { size: 14, color: '#3D2B1F' });
  ctx.globalAlpha = 1;
}

/* ══════════════════════════════════════════════════════════════════
 *  §18.3 레벨 맵 화면
 * ══════════════════════════════════════════════════════════════════ */
function renderMap(ctx, w, h) {
  // 배경
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#90EE90');
  grad.addColorStop(1, '#FFE4B5');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  if (assets.sprites.bgMap) {
    const mapH = getMapTotalH();
    const srcY = (gMapScrollY / mapH) * 2400;
    ctx.drawImage(assets.sprites.bgMap, 0, srcY, 800, Math.min(2400 - srcY, h * (2400 / mapH)),
      0, 0, w, h);
  }

  ctx.save();

  // 경로 선
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  for (let i = 0; i < LEVELS.length; i++) {
    const nx = getMapNodeX(i);
    const ny = getMapNodeY(i) - gMapScrollY;
    if (i === 0) ctx.moveTo(nx, ny);
    else ctx.lineTo(nx, ny);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // 노드
  for (let i = 0; i < LEVELS.length; i++) {
    const nx = getMapNodeX(i);
    const ny = getMapNodeY(i) - gMapScrollY;
    if (ny < -60 || ny > h + 60) continue;

    const nodeSize = 36;
    const hitSize = Math.max(MIN_TOUCH, nodeSize);
    const lvl = LEVELS[i];
    const stars = gSaveData.levelStars[i] || 0;
    const isUnlocked = i <= gSaveData.lastLevel;
    const isCurrent = i === gCurrentLevel;

    // 노드 그리기
    ctx.save();
    ctx.translate(nx, ny);

    if (isCurrent) {
      // 펄스 글로우
      const pulse = 1 + 0.15 * Math.sin(performance.now() / 300);
      ctx.scale(pulse, pulse);
    }

    if (!isUnlocked) {
      // 잠긴 노드 — PNG 에셋 활용
      if (assets.sprites.mapNodeLocked) {
        ctx.drawImage(assets.sprites.mapNodeLocked, -hitSize / 2, -hitSize / 2, hitSize, hitSize);
      } else {
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.arc(0, 0, hitSize / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      UI.text(ctx, '🔒', 0, 0, { size: 16, color: '#555' });
    } else if (lvl.bonus) {
      // 보상 노드 — PNG 에셋 활용
      if (assets.sprites.mapNodeBonus) {
        ctx.drawImage(assets.sprites.mapNodeBonus, -hitSize / 2, -hitSize / 2, hitSize, hitSize);
      } else {
        ctx.fillStyle = '#FFD700';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(0, 0, hitSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      UI.text(ctx, '★', 0, -1, { size: 20, color: '#FFF' });
      UI.text(ctx, String(lvl.id), 0, 18, { size: 11, color: '#3D2B1F', bold: true });
    } else if (stars > 0) {
      // 클리어된 노드 — PNG 에셋 활용
      if (assets.sprites.mapNodeComplete) {
        ctx.drawImage(assets.sprites.mapNodeComplete, -hitSize / 2, -hitSize / 2, hitSize, hitSize);
      } else {
        ctx.fillStyle = '#34C759';
        ctx.beginPath();
        ctx.arc(0, 0, hitSize / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      UI.text(ctx, String(lvl.id), 0, -4, { size: 14, color: '#FFF', bold: true });
      // 별
      const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
      UI.text(ctx, starStr, 0, 14, { size: 10, color: '#FFD700' });
    } else {
      // 현재 레벨 (미클리어) — PNG 에셋 활용
      if (isCurrent && assets.sprites.mapNodeCurrent) {
        ctx.drawImage(assets.sprites.mapNodeCurrent, -hitSize / 2, -hitSize / 2, hitSize, hitSize);
      } else if (!isCurrent && assets.sprites.mapNodeLocked) {
        // 잠금 해제됐지만 미클리어 — current 에셋 대신 일반 파란 스타일
        ctx.fillStyle = '#4A90D9';
        ctx.beginPath();
        ctx.arc(0, 0, hitSize / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = isCurrent ? '#007AFF' : '#4A90D9';
        if (isCurrent) { ctx.shadowColor = '#007AFF'; ctx.shadowBlur = 12; }
        ctx.beginPath();
        ctx.arc(0, 0, hitSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      UI.text(ctx, String(lvl.id), 0, 0, { size: 14, color: '#FFF', bold: true });
    }

    ctx.restore();
  }

  ctx.restore();

  // 상단 바
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, w, 40);
  UI.text(ctx, L('title'), w / 2, 20, { size: 16, color: '#FFD700', bold: true });

  // 지역 표시
  const worldIdx = Math.floor(gCurrentLevel / 5);
  const wName = gLang === 'ko' ? WORLD_NAMES[worldIdx] : WORLD_NAMES_EN[worldIdx];
  UI.text(ctx, wName || '', w / 2, h - 20, { size: 12, color: '#FFF' });
}

/* ══════════════════════════════════════════════════════════════════
 *  §18.4 게임플레이 렌더
 * ══════════════════════════════════════════════════════════════════ */
function renderGameplay(ctx, w, h) {
  const { boardX, boardY, cellSize, boardW, boardH, topBarH } = gLayout;
  const lvl = LEVELS[gCurrentLevel];
  const worldIdx = lvl.world;

  // 배경
  const bgKeys = ['bgGarden','bgCave','bgForest','bgCastle'];
  if (assets.sprites[bgKeys[worldIdx]]) {
    ctx.drawImage(assets.sprites[bgKeys[worldIdx]], 0, 0, w, h);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, CLR.bgGradTop);
    grad.addColorStop(1, WORLD_COLORS[worldIdx] || CLR.bgGradBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  // 보드 프레임
  ctx.fillStyle = 'rgba(20,20,40,0.6)';
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  const pad = 4;
  ctx.beginPath();
  ctx.roundRect(boardX - pad, boardY - pad, boardW + pad * 2, boardH + pad * 2, 8);
  ctx.fill();
  ctx.stroke();

  // 보드 셀
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      const cx = boardX + c * cellSize;
      const cy = boardY + r * cellSize;
      const ay = cell.ay || 0; // 낙하 보간

      // 체커보드 배경
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
      ctx.fillRect(cx, cy, cellSize, cellSize);

      // 젤리
      if (cell.jelly > 0) {
        drawJelly(ctx, cx, cy, cellSize, cell.jelly);
      }

      // 장애물 (돌, 나무, 독)
      if (cell.obs === OBS_TYPE.STONE) {
        drawObstacle(ctx, 'stone', cx, cy, cellSize, 0);
        continue;
      }
      if (cell.obs === OBS_TYPE.WOOD) {
        drawObstacle(ctx, 'wood', cx, cy, cellSize, cell.obsLayers);
        continue;
      }
      if (cell.obs === OBS_TYPE.POISON) {
        drawObstacle(ctx, 'poison', cx, cy, cellSize, 1);
        continue;
      }

      // 보석
      if (cell.color) {
        const drawX = cx + (cell.ax || 0);
        const drawY = cy + ay;
        const s = cell.scale || 1;
        const gemSize = cellSize * 0.8 * s;
        const offset = (cellSize - gemSize) / 2;

        ctx.globalAlpha = cell.alpha !== undefined ? cell.alpha : 1;

        // 커튼
        if (cell.curtain) {
          drawObstacle(ctx, 'curtain', cx, cy + ay, cellSize, 1);
        } else {
          // 스페셜 보석
          if (cell.special !== SPECIAL.NONE) {
            drawSpecialGem(ctx, cell.special, cell.color, drawX + offset, drawY + offset, gemSize);
          } else {
            // 스프라이트 시트 반짝임 포함 렌더
            drawGemWithSheet(ctx, cell.color, drawX + offset, drawY + offset, gemSize, cell.sparkleTimer || 0);
          }
        }

        ctx.globalAlpha = 1;

        // 얼음 오버레이
        if (cell.obs === OBS_TYPE.ICE) {
          drawObstacle(ctx, 'ice', cx, cy + ay, cellSize, cell.obsLayers);
        }
        // 체인 오버레이
        if (cell.obs === OBS_TYPE.CHAIN) {
          drawObstacle(ctx, 'chain', cx, cy + ay, cellSize, 1);
        }
      } else if (cell.obs === OBS_TYPE.NONE) {
        // 빈 셀 — 아무것도 안 그림
      }

      // 선택 표시
      if (gSelected && gSelected.r === r && gSelected.c === c) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(cx + 2, cy + 2, cellSize - 4, cellSize - 4);
      }
    }
  }

  // 키보드 커서
  if (gState === STATE.PLAY || gState === STATE.BOOSTING) {
    const cxK = boardX + gCursorC * cellSize;
    const cyK = boardY + gCursorR * cellSize;
    ctx.strokeStyle = gState === STATE.BOOSTING ? '#FF6600' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(cxK + 1, cyK + 1, cellSize - 2, cellSize - 2);
    ctx.setLineDash([]);
  }

  // 상단 UI
  renderTopBar(ctx, w, h);

  // 하단 부스터 바
  renderBoosterBar(ctx, w, h);

  // 레벨 인트로 오버레이
  if (gState === STATE.LEVEL_INTRO) {
    renderLevelIntroOverlay(ctx, w, h);
  }

  // 클리어 연출
  if (gState === STATE.CLEAR_ANIM) {
    renderClearAnim(ctx, w, h);
  }

  // 실패 연출
  if (gState === STATE.FAIL_ANIM) {
    renderFailAnim(ctx, w, h);
  }

  // 부스터 활성 안내
  if (gState === STATE.BOOSTING && gActiveBooster) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, topBarH - 5, w, 25);
    const hint = gActiveBooster === 'hammer' ? L('selectTarget') :
                 gActiveBooster === 'colorBomb' ? L('selectColor') : '';
    UI.text(ctx, hint, w / 2, topBarH + 7, { size: 13, color: '#FFD700', bold: true });
  }
}

/* --- 상단 바: 목표 + 턴 + 점수 + 일시정지 --- */
function renderTopBar(ctx, w, h) {
  const { topBarH, fontSize } = gLayout;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, w, topBarH);

  // 레벨 번호
  UI.text(ctx, 'Lv.' + LEVELS[gCurrentLevel].id, 40, topBarH / 2, { size: fontSize, color: '#FFD700', bold: true, align: 'left' });

  // 점수
  UI.text(ctx, L('score') + ': ' + gScore, w / 2, topBarH / 2, { size: fontSize, color: '#FFF' });

  // 남은 턴 — PNG 에셋 활용
  const turnsX = w - 80, turnsSize = 36;
  if (assets.sprites.uiMovesIcon) {
    ctx.drawImage(assets.sprites.uiMovesIcon, turnsX - turnsSize / 2, topBarH / 2 - turnsSize / 2, turnsSize, turnsSize);
  } else {
    ctx.fillStyle = '#007AFF';
    ctx.beginPath();
    ctx.arc(turnsX, topBarH / 2, turnsSize / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  UI.text(ctx, String(gTurnsLeft), turnsX, topBarH / 2, { size: fontSize + 2, color: '#FFF', bold: true });
  UI.text(ctx, L('moves'), turnsX, topBarH / 2 + 18, { size: 9, color: '#AAF' });

  // 일시정지 버튼 — PNG 에셋 활용 + Canvas 폴백
  const pBtn = Math.max(MIN_TOUCH, 36);
  if (assets.sprites.uiPauseButton) {
    ctx.drawImage(assets.sprites.uiPauseButton, w - 25 - pBtn / 2 + 4, topBarH / 2 - pBtn / 2 + 4, pBtn - 8, pBtn - 8);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(w - 25, topBarH / 2, pBtn / 2 - 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.fillRect(w - 30, topBarH / 2 - 7, 3, 14);
    ctx.fillRect(w - 23, topBarH / 2 - 7, 3, 14);
  }

  // 목표 표시 (상단바 아래)
  renderGoalPanel(ctx, w, topBarH);
}

function renderGoalPanel(ctx, w, startY) {
  const goalH = 28;
  // 목표 프레임 — PNG 에셋 활용 + Canvas 폴백
  if (assets.sprites.uiGoalFrame) {
    ctx.drawImage(assets.sprites.uiGoalFrame, 0, startY, w, goalH);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, startY, w, goalH);
  }

  const count = gGoalProgress.length;
  const itemW = Math.min(120, (w - 20) / count);
  const startX = (w - count * itemW) / 2;

  for (let i = 0; i < count; i++) {
    const g = gGoalProgress[i];
    const gx = startX + i * itemW + itemW / 2;
    const gy = startY + goalH / 2;
    const done = g.current >= g.val;

    // 아이콘
    let icon = '';
    if (g.type === 'score') icon = '⭐';
    else if (g.type === 'collect') {
      icon = g.color === 'any' ? '💎' : getGemEmoji(g.color);
    }
    else if (g.type === 'obstacle') icon = getObsEmoji(g.obs);
    else if (g.type === 'jelly') icon = '🍬';

    const text = icon + ' ' + Math.min(g.current, g.val) + '/' + g.val;
    UI.text(ctx, text, gx, gy, { size: 11, color: done ? '#34C759' : '#FFF', bold: done });
    if (done) {
      UI.text(ctx, '✓', gx + itemW / 2 - 8, gy, { size: 12, color: '#34C759', bold: true });
    }
  }
}

function getGemEmoji(color) {
  const map = { ruby:'🔴', sapphire:'🔵', emerald:'🟢', topaz:'🟡', amethyst:'🟣', diamond:'💠' };
  return map[color] || '💎';
}
function getObsEmoji(obs) {
  const map = { ice:'🧊', chain:'⛓', wood:'📦', curtain:'🎭', poison:'☠', stone:'🪨' };
  return map[obs] || '❓';
}

/* --- 부스터 바 --- */
function renderBoosterBar(ctx, w, h) {
  const { boosterY, boosterBtnSize } = gLayout;
  // 부스터 바 배경 — PNG 에셋 활용 + Canvas 폴백
  if (assets.sprites.uiBoosterBar) {
    ctx.drawImage(assets.sprites.uiBoosterBar, 0, boosterY, w, h - boosterY);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, boosterY, w, h - boosterY);
  }

  const boosterTypes = ['hammer', 'shuffle', 'extraTurns', 'colorBomb'];
  const icons = ['🔨', '🔄', '⏳', '🌈'];
  const bw = boosterBtnSize;
  const totalW = boosterTypes.length * (bw + 10) - 10;
  const startX = (w - totalW) / 2;

  for (let i = 0; i < boosterTypes.length; i++) {
    const bx = startX + i * (bw + 10);
    const by = boosterY + 5;
    const count = gBoosters[boosterTypes[i]];
    const isActive = gActiveBooster === boosterTypes[i];

    // 배경
    ctx.fillStyle = isActive ? 'rgba(255,165,0,0.5)' : count > 0 ? 'rgba(255,215,0,0.2)' : 'rgba(100,100,100,0.2)';
    ctx.strokeStyle = isActive ? '#FF6600' : count > 0 ? '#FFD700' : '#555';
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bw, 8);
    ctx.fill();
    ctx.stroke();

    // 아이콘 — PNG 에셋 활용
    const boosterAssetKeys = ['boosterHammer', 'boosterShuffle', 'boosterExtraTurns', 'boosterColorBomb'];
    const boosterSprite = assets.sprites[boosterAssetKeys[i]];
    if (boosterSprite) {
      ctx.globalAlpha = count > 0 ? 1 : 0.4;
      ctx.drawImage(boosterSprite, bx + 4, by + 4, bw - 8, bw - 8);
      ctx.globalAlpha = 1;
    } else {
      UI.text(ctx, icons[i], bx + bw / 2, by + bw / 2 - 5, { size: Math.floor(bw * 0.4), color: count > 0 ? '#FFF' : '#555' });
    }
    // 수량
    UI.text(ctx, 'x' + count, bx + bw / 2, by + bw - 8, { size: 10, color: count > 0 ? '#FFD700' : '#555' });
  }
}

/* --- 레벨 인트로 오버레이 --- */
function renderLevelIntroOverlay(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  const lvl = LEVELS[gCurrentLevel];
  const t = Math.min(gIntroTimer / 500, 1);

  ctx.save();
  ctx.globalAlpha = t;
  UI.text(ctx, L('level') + ' ' + lvl.id, w / 2, h * 0.3, { size: 28, color: '#FFD700', bold: true });

  // 목표 표시
  let gy = h * 0.42;
  UI.text(ctx, L('goal'), w / 2, gy, { size: 16, color: '#FFF', bold: true });
  gy += 30;
  for (const g of gGoalProgress) {
    let text = '';
    if (g.type === 'score') text = '⭐ ' + g.val + ' ' + L('score');
    else if (g.type === 'collect') text = getGemEmoji(g.color) + ' ' + g.color + ' x' + g.val;
    else if (g.type === 'obstacle') text = getObsEmoji(g.obs) + ' ' + g.obs + ' x' + g.val;
    else if (g.type === 'jelly') text = '🍬 Jelly x' + g.val;
    UI.text(ctx, text, w / 2, gy, { size: 14, color: '#FFF' });
    gy += 25;
  }

  UI.text(ctx, L('moves') + ': ' + gTurnsLeft, w / 2, gy + 15, { size: 16, color: '#007AFF', bold: true });
  ctx.restore();
}

/* --- 클리어 연출 --- */
function renderClearAnim(ctx, w, h) {
  const t = Math.min(gClearTimer / 2500, 1);
  ctx.fillStyle = `rgba(255,255,200,${0.1 * t})`;
  ctx.fillRect(0, 0, w, h);

  if (gClearTimer > 800) {
    // 별
    for (let i = 0; i < gResultStars; i++) {
      const sx = w / 2 + (i - (gResultStars - 1) / 2) * 60;
      const sy = h * 0.35;
      const bounce = 1 + 0.2 * Math.sin((gClearTimer - 800 - i * 400) / 100);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.scale(bounce, bounce);
      drawStar(ctx, 0, 0, 20, '#FFD700');
      ctx.restore();
    }
  }

  if (gClearTimer > 1500) {
    const scaleT = Math.min((gClearTimer - 1500) / 500, 1);
    const s = 0.5 + scaleT * 0.5;
    ctx.save();
    ctx.translate(w / 2, h * 0.5);
    ctx.scale(s, s);
    UI.text(ctx, L('levelClear'), 0, 0, { size: 32, color: '#FFD700', bold: true, glow: '#FFD700' });
    ctx.restore();

    UI.text(ctx, L('score') + ': ' + gScore, w / 2, h * 0.58, { size: 18, color: '#FFF' });
  }
}

/* --- 실패 연출 --- */
function renderFailAnim(ctx, w, h) {
  const t = Math.min(gFailTimer / 1000, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.4 * t})`;
  ctx.fillRect(0, 0, w, h);

  if (gFailTimer > 200) {
    const shakeX = (gFailTimer < 600) ? (Math.sin(gFailTimer / 30) * 5 * (1 - (gFailTimer - 200) / 400)) : 0;
    UI.text(ctx, L('levelFail'), w / 2 + shakeX, h * 0.4, { size: 28, color: '#FF4444', bold: true, shadow: true });
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §18.5 결과 화면
 * ══════════════════════════════════════════════════════════════════ */
function renderResult(ctx, w, h) {
  // 배경
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0a0a1e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 패널
  const pw = Math.min(w * 0.85, 350), ph = h * 0.55;
  const px = (w - pw) / 2, py = h * 0.15;
  ctx.fillStyle = 'rgba(30,30,60,0.95)';
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 12);
  ctx.fill();
  ctx.stroke();

  if (gLevelCleared) {
    UI.text(ctx, L('levelClear'), w / 2, py + 40, { size: 24, color: '#FFD700', bold: true });

    // 별
    for (let i = 0; i < 3; i++) {
      const sx = w / 2 + (i - 1) * 50;
      const sy = py + 90;
      drawStar(ctx, sx, sy, 18, i < gStarsEarned ? '#FFD700' : '#444');
    }

    UI.text(ctx, L('score') + ': ' + gScore, w / 2, py + 140, { size: 18, color: '#FFF' });
    UI.text(ctx, L('moves') + ' ' + L('level') + ': +' + (gTurnsLeft * 300), w / 2, py + 170, { size: 13, color: '#AAF' });

    const btnW = 120, btnH = 45;
    // 다음 / 맵
    if (gCurrentLevel < LEVELS.length - 1) {
      drawFancyButton(ctx, '▶ Next', w / 2 - btnW - 10, py + ph - 65, btnW, btnH, '#34C759');
    }
    drawFancyButton(ctx, L('backToMap'), w / 2 + 10, py + ph - 65, btnW, btnH, '#007AFF');
  } else {
    UI.text(ctx, L('levelFail'), w / 2, py + 40, { size: 24, color: '#FF4444', bold: true });
    UI.text(ctx, L('score') + ': ' + gScore, w / 2, py + 100, { size: 18, color: '#FFF' });

    const btnW = 120, btnH = 45;
    drawFancyButton(ctx, L('retry'), w / 2 - btnW - 10, py + ph - 65, btnW, btnH, '#FF6600');
    drawFancyButton(ctx, L('backToMap'), w / 2 + 10, py + ph - 65, btnW, btnH, '#007AFF');
  }
}
