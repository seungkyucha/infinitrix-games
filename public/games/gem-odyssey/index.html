/* ══════════════════════════════════════════════════════════════════
 *  §0. SeededRNG — Math.random() 0건 정책
 * ══════════════════════════════════════════════════════════════════ */
class SeededRNG {
  constructor(seed) { this.s = seed || Date.now(); }
  next() {
    this.s = (this.s * 1664525 + 1013904223) & 0x7fffffff;
    return this.s / 0x7fffffff;
  }
  int(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this.int(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
}
let gRng = new SeededRNG(Date.now());

/* ══════════════════════════════════════════════════════════════════

  LOADING:0, TITLE:1, MAP:2, LEVEL_INTRO:3, PLAY:4,
  ANIMATING:5, CASCADING:6, BOOSTING:7, GOAL_CHECK:8,
  CLEAR_ANIM:9, FAIL_ANIM:10, RESULT:11, PAUSED:12
};
const STATE_NAMES = Object.keys(STATE);

const TRANSITION_TABLE = {
  [STATE.LOADING]:     [STATE.TITLE],
  [STATE.TITLE]:       [STATE.MAP],
  [STATE.MAP]:         [STATE.LEVEL_INTRO, STATE.TITLE],
  [STATE.LEVEL_INTRO]: [STATE.PLAY],

  [STATE.ANIMATING]:   [STATE.CASCADING, STATE.PLAY, STATE.GOAL_CHECK],

  [STATE.BOOSTING]:    [STATE.ANIMATING, STATE.PLAY],
  [STATE.GOAL_CHECK]:  [STATE.CLEAR_ANIM, STATE.FAIL_ANIM, STATE.PLAY],
  [STATE.CLEAR_ANIM]:  [STATE.RESULT],
  [STATE.FAIL_ANIM]:   [STATE.RESULT],
  [STATE.RESULT]:      [STATE.MAP, STATE.PLAY],
  [STATE.PAUSED]:      [STATE.PLAY, STATE.MAP]
};

  }
  m[STATE.LOADING].tween = true; m[STATE.LOADING].sound = false; m[STATE.LOADING].particle = false;
  m[STATE.TITLE].input = true;
  m[STATE.MAP].input = true;
  m[STATE.PLAY].input = true; m[STATE.PLAY].board = true;
  m[STATE.ANIMATING].board = true;
  m[STATE.CASCADING].board = true;
  m[STATE.BOOSTING].input = true; m[STATE.BOOSTING].board = true;
  m[STATE.RESULT].input = true;
  m[STATE.PAUSED].input = true; m[STATE.PAUSED].board = true;
  m[STATE.PAUSED].sound = false;
  m[STATE.GOAL_CHECK].tween = false; m[STATE.GOAL_CHECK].particle = false;
  m[STATE.LEVEL_INTRO].board = true;
  return m;
})();

  clearAnimPlaying: false,
  failAnimPlaying: false,

function isInputBlocked() { return Object.values(GUARDS).some(v => v); }
function resetGuards() { for (const k in GUARDS) GUARDS[k] = false; }

/* 상태 전환 함수 — 화이트리스트 검증 */
function beginTransition(targetState, onMid, onComplete) {
  if (GUARDS.transitioning) return false;
  const allowed = TRANSITION_TABLE[gState];
  if (!allowed || !allowed.includes(targetState)) {
    console.warn(`[Transition] Blocked: ${STATE_NAMES[gState]} → ${STATE_NAMES[targetState]}`);
    return false;
  }
  GUARDS.transitioning = true;
  _fadeObj = { a: 0 };
  tween.add(_fadeObj, { a: 1 }, 200, 'easeIn', () => {
    if (onMid) onMid();
    gState = targetState;
    enterState(targetState);
    _fadeObj = { a: 1 };
    tween.add(_fadeObj, { a: 0 }, 200, 'easeOut', () => {
      GUARDS.transitioning = false;
      if (onComplete) onComplete();
    });
  });
  return true;
}

function directTransition(targetState) {
  const allowed = TRANSITION_TABLE[gState];
  if (!allowed || !allowed.includes(targetState)) {
    console.warn(`[Direct] Blocked: ${STATE_NAMES[gState]} → ${STATE_NAMES[targetState]}`);
    return false;
  }
  gState = targetState;
  enterState(targetState);
  return true;
}

 * ══════════════════════════════════════════════════════════════════ */
let gLayout = {};
function calcLayout(w, h) {
  const isPortrait = h > w;
  const topBarH = Math.max(50, h * 0.08);
  const bottomBarH = Math.max(60, h * 0.09);
  const availH = h - topBarH - bottomBarH - 20;
  const availW = w - 20;
  const cellSize = Math.max(MIN_TOUCH, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS)));
  const boardW = cellSize * COLS;
  const boardH = cellSize * ROWS;
  const boardX = Math.floor((w - boardW) / 2);
  const boardY = Math.floor(topBarH + (availH - boardH) / 2) + 10;
  gLayout = {
    w, h, cellSize, boardX, boardY, boardW, boardH,
    topBarH, bottomBarH,
    boosterY: h - bottomBarH,
    boosterBtnSize: Math.max(48, cellSize * 0.8),
    fontSize: Math.max(12, Math.floor(cellSize * 0.3)),
    isPortrait
  };
}

  failStreak: 0, maxAdjust: 3,
  onFail() { this.failStreak = Math.min(this.failStreak + 1, this.maxAdjust); },
  onClear() { this.failStreak = Math.max(this.failStreak - 1, 0); },
  getExtraTurns(lvl) {
    let extra = this.failStreak * 2;
    if (lvl.ddaOverride) extra = Math.min(extra + this.failStreak, lvl.ddaOverride.maxExtraTurns || extra);
    return extra;
  },
  getGoalReduction(lvl) {
    let r = this.failStreak * 2;
    if (lvl.ddaOverride && lvl.ddaOverride.goalReductionCap) {
      return r; // 보수적으로 기본만
    }
    return r;
  },
  shouldFreeShuffle() { return this.failStreak >= 2; },
  shouldFreeBooster() { return this.failStreak >= 3; }
};
