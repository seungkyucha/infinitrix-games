/* ══════════════════════════════════════════════════════════════════
 *  §19. 드로잉 유틸리티 — 보석, 장애물, 버튼 등
 * ══════════════════════════════════════════════════════════════════ */

/* 보석 그리기 (에셋 + 폴백) */
function drawGem(ctx, color, x, y, size) {
  const assetKey = 'gem' + color.charAt(0).toUpperCase() + color.slice(1);
  if (assets.sprites[assetKey]) {
    ctx.drawImage(assets.sprites[assetKey], x, y, size, size);
  } else {
    drawGemFallback(ctx, color, x, y, size, size);
  }
}

/* 보석 Canvas 폴백 */
function drawGemFallback(ctx, color, x, y, w, h) {
  const hex = GEM_HEX[color] || '#FFF';
  const cx = x + w / 2, cy = y + h / 2;
  const r = Math.min(w, h) * 0.4;

  // 글로시 그라디언트
  const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  grad.addColorStop(0, '#FFF');
  grad.addColorStop(0.3, hex);
  grad.addColorStop(1, shadeColor(hex, -40));
  ctx.fillStyle = grad;

  // 다이아몬드 형태
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);
  ctx.lineTo(cx + r, cy);
  ctx.lineTo(cx, cy + r);
  ctx.lineTo(cx - r, cy);
  ctx.closePath();
  ctx.fill();

  // 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.2, cy - r * 0.3, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
  ctx.fill();
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16) + amt;
  let g = parseInt(hex.slice(3, 5), 16) + amt;
  let b = parseInt(hex.slice(5, 7), 16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

/* 스페셜 보석 그리기 */
function drawSpecialGem(ctx, special, color, x, y, size) {
  // 먼저 기본 보석
  drawGem(ctx, color, x, y, size);

  // 스페셜 오버레이
  const cx = x + size / 2, cy = y + size / 2;
  const r = size * 0.35;
  ctx.save();

  if (special === SPECIAL.LINE_H) {
    if (assets.sprites.specialLineH) {
      ctx.drawImage(assets.sprites.specialLineH, x, y, size, size);
    } else {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - r, cy);
      ctx.lineTo(cx + r, cy);
      ctx.stroke();
      // 화살표
      ctx.beginPath();
      ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx - r + 4, cy - 4); ctx.lineTo(cx - r + 4, cy + 4);
      ctx.closePath(); ctx.fillStyle = '#FFD700'; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + r + 4, cy); ctx.lineTo(cx + r - 4, cy - 4); ctx.lineTo(cx + r - 4, cy + 4);
      ctx.closePath(); ctx.fill();
    }
  } else if (special === SPECIAL.LINE_V) {
    if (assets.sprites.specialLineV) {
      ctx.drawImage(assets.sprites.specialLineV, x, y, size, size);
    } else {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx, cy + r);
      ctx.stroke();
    }
  } else if (special === SPECIAL.BOMB) {
    if (assets.sprites.specialBomb) {
      ctx.drawImage(assets.sprites.specialBomb, x, y, size, size);
    } else {
      ctx.strokeStyle = '#FF6600';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
      ctx.stroke();
      // 폭발 선
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r * 0.3, cy + Math.sin(a) * r * 0.3);
        ctx.lineTo(cx + Math.cos(a) * r * 0.7, cy + Math.sin(a) * r * 0.7);
        ctx.stroke();
      }
    }
  } else if (special === SPECIAL.RAINBOW) {
    if (assets.sprites.specialRainbow) {
      ctx.drawImage(assets.sprites.specialRainbow, x, y, size, size);
    } else {
      const colors = ['#FF2D55','#007AFF','#34C759','#FFCC00','#AF52DE','#5AC8FA'];
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + performance.now() / 500;
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * r * 0.4, cy + Math.sin(a) * r * 0.4, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

/* 장애물 그리기 */
function drawObstacle(ctx, type, x, y, size, layers) {
  const pad = size * 0.05;
  const dx = x + pad, dy = y + pad, ds = size - pad * 2;

  if (type === 'ice') {
    const key = 'obstacleIce-' + layers;
    if (assets.sprites[key]) {
      ctx.globalAlpha = 0.8;
      ctx.drawImage(assets.sprites[key], x, y, size, size);
      ctx.globalAlpha = 1;
    } else {
      const alpha = 0.2 + layers * 0.2;
      ctx.fillStyle = `rgba(135,206,250,${alpha})`;
      ctx.fillRect(dx, dy, ds, ds);
      ctx.strokeStyle = `rgba(200,230,255,${alpha + 0.2})`;
      ctx.lineWidth = 1;
      ctx.strokeRect(dx, dy, ds, ds);
      // 균열
      if (layers >= 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.moveTo(dx + ds * 0.3, dy);
        ctx.lineTo(dx + ds * 0.5, dy + ds * 0.5);
        ctx.lineTo(dx + ds * 0.7, dy + ds);
        ctx.stroke();
      }
    }
  } else if (type === 'chain') {
    if (assets.sprites.obstacleChain) {
      ctx.drawImage(assets.sprites.obstacleChain, x, y, size, size);
    } else {
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      // X자 사슬
      ctx.beginPath();
      ctx.moveTo(dx + 4, dy + 4); ctx.lineTo(dx + ds - 4, dy + ds - 4);
      ctx.moveTo(dx + ds - 4, dy + 4); ctx.lineTo(dx + 4, dy + ds - 4);
      ctx.stroke();
      // 자물쇠
      ctx.fillStyle = '#666';
      ctx.fillRect(dx + ds / 2 - 4, dy + ds / 2 - 4, 8, 8);
    }
  } else if (type === 'wood') {
    const key = layers >= 2 ? 'obstacleWood-2' : 'obstacleWood-1';
    if (assets.sprites[key]) {
      ctx.drawImage(assets.sprites[key], x, y, size, size);
    } else {
      ctx.fillStyle = layers >= 2 ? '#8B6914' : '#6B4914';
      ctx.fillRect(dx, dy, ds, ds);
      // 판자
      ctx.strokeStyle = '#5D3A1A';
      ctx.lineWidth = 1;
      for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(dx, dy + ds * i / 3);
        ctx.lineTo(dx + ds, dy + ds * i / 3);
        ctx.stroke();
      }
      if (layers < 2) {
        // 금
        ctx.strokeStyle = '#3A2010';
        ctx.beginPath();
        ctx.moveTo(dx + ds * 0.2, dy); ctx.lineTo(dx + ds * 0.4, dy + ds);
        ctx.stroke();
      }
    }
  } else if (type === 'curtain') {
    if (assets.sprites.obstacleCurtain) {
      ctx.drawImage(assets.sprites.obstacleCurtain, x, y, size, size);
    } else {
      ctx.fillStyle = 'rgba(150,80,200,0.7)';
      ctx.fillRect(dx, dy, ds, ds);
      // 물음표
      UI.text(ctx, '?', x + size / 2, y + size / 2, { size: Math.floor(size * 0.5), color: '#FFD700', bold: true });
    }
  } else if (type === 'poison') {
    if (assets.sprites.obstaclePoison) {
      ctx.drawImage(assets.sprites.obstaclePoison, x, y, size, size);
    } else {
      ctx.fillStyle = 'rgba(100,0,150,0.6)';
      ctx.fillRect(dx, dy, ds, ds);
      // 기포
      ctx.fillStyle = 'rgba(0,255,100,0.4)';
      ctx.beginPath();
      ctx.arc(dx + ds * 0.3, dy + ds * 0.4, 3, 0, Math.PI * 2);
      ctx.arc(dx + ds * 0.6, dy + ds * 0.6, 4, 0, Math.PI * 2);
      ctx.arc(dx + ds * 0.5, dy + ds * 0.3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (type === 'stone') {
    if (assets.sprites.obstacleStone) {
      ctx.drawImage(assets.sprites.obstacleStone, x, y, size, size);
    } else {
      ctx.fillStyle = '#666';
      ctx.fillRect(dx, dy, ds, ds);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(dx, dy, ds, ds);
      // 이끼
      ctx.fillStyle = 'rgba(50,150,50,0.3)';
      ctx.fillRect(dx, dy + ds * 0.8, ds, ds * 0.2);
    }
  }
}

/* 젤리 그리기 */
function drawJelly(ctx, x, y, size, layers) {
  const key = 'obstacleJelly-' + layers;
  if (assets.sprites[key]) {
    ctx.drawImage(assets.sprites[key], x, y, size, size);
  } else {
    const alpha = layers >= 2 ? 0.4 : 0.25;
    ctx.fillStyle = `rgba(255,100,150,${alpha})`;
    ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
    ctx.strokeStyle = `rgba(255,150,180,${alpha + 0.1})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 2, y + 2, size - 4, size - 4);
  }
}

/* 별 그리기 */
function drawStar(ctx, cx, cy, r, color) {
  // PNG 에셋 활용 — 채워진 별 / 빈 별
  const isFilled = color === '#FFD700';
  const starSprite = isFilled ? assets.sprites.uiStarFilled : assets.sprites.uiStarEmpty;
  if (starSprite) {
    const sz = r * 2.2;
    ctx.drawImage(starSprite, cx - sz / 2, cy - sz / 2, sz, sz);
    return;
  }
  // Canvas 폴백
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = isFilled ? 10 : 0;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.45;
    ctx.lineTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* 멋진 버튼 — UI 에셋 활용 + Canvas 폴백 */
function drawFancyButton(ctx, text, x, y, w, h, color) {
  ctx.save();
  // UI 에셋 매핑: 색상 → 에셋 키
  let uiKey = null;
  if (color === '#34C759') uiKey = 'uiButtonPlay';     // 녹색 = PLAY/계속
  else if (color === '#FF6600') uiKey = 'uiButtonRetry'; // 주황 = RETRY
  else if (color === '#007AFF') uiKey = 'uiButtonMap';   // 파랑 = MAP

  if (uiKey && assets.sprites[uiKey]) {
    // PNG 에셋 사용
    ctx.drawImage(assets.sprites[uiKey], x, y, w, h);
  } else {
    // Canvas 폴백
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, color);
    grad.addColorStop(1, shadeColor(color, -30));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 10);
    ctx.fill();
    // 상단 하이라이트
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.roundRect(x + 2, y + 2, w - 4, h / 2 - 2, [8, 8, 0, 0]);
    ctx.fill();
  }
  // 텍스트 (항상 그림 — 에셋 위에도 텍스트 필요)
  ctx.fillStyle = '#FFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.floor(h * 0.35)}px ${UI.FONT}`;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowOffsetY = 1;
  ctx.shadowBlur = 2;
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════════════
 *  §20. 초기화 & 에셋 로드
 * ══════════════════════════════════════════════════════════════════ */
async function init() {
  // manifest.json에서 에셋 동적 로드
  let manifest = null;
  try {
    manifest = await fetch('assets/manifest.json').then(r => r.json());
  } catch (e) {
    console.warn('[GemOdyssey] manifest.json load failed — using Canvas fallbacks');
  }

  if (manifest && manifest.assets) {
    const assetMap = {};
    for (const [key, info] of Object.entries(manifest.assets)) {
      if (key === 'thumbnail') continue; // 게임 내 미사용
      assetMap[key] = 'assets/' + info.file;
    }
    await assets.load(assetMap);

    // 에셋 검증
    let missing = 0;
    for (const key in manifest.assets) {
      if (key === 'thumbnail') continue;
      if (!assets.sprites[key]) {
        console.warn('Missing asset: ' + key + ' — using Canvas fallback');
        missing++;
      }
    }
    if (missing > 0) console.warn('Total missing assets: ' + missing);
  }

  loadSave();

  _ready = true;
  gState = STATE.LOADING;

  // 짧은 로딩 후 타이틀로
  const _loadProxy = { t: 0 };
  tween.add(_loadProxy, { t: 1 }, 500, 'linear', () => {
    gState = STATE.TITLE;
    enterState(STATE.TITLE);
  });

  engine.start();
}

init();

/* ══════════════════════════════════════════════════════════════════
 *  §21. 오프스크린 배경 캐시 시스템
 * ══════════════════════════════════════════════════════════════════ */
let _offscreenBg = null;
let _offscreenBgW = 0;
let _offscreenBgH = 0;

function buildBackgroundCache(w, h) {
  if (_offscreenBg && _offscreenBgW === w && _offscreenBgH === h && !_bgCacheDirty) return;
  _offscreenBg = document.createElement('canvas');
  _offscreenBg.width = w;
  _offscreenBg.height = h;
  _offscreenBgW = w;
  _offscreenBgH = h;
  const bCtx = _offscreenBg.getContext('2d');

  const worldIdx = LEVELS[gCurrentLevel] ? LEVELS[gCurrentLevel].world : 0;
  const bgKeys = ['bgGarden','bgCave','bgForest','bgCastle'];

  if (assets.sprites[bgKeys[worldIdx]]) {
    bCtx.drawImage(assets.sprites[bgKeys[worldIdx]], 0, 0, w, h);
  } else {
    const grad = bCtx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, CLR.bgGradTop);
    grad.addColorStop(1, WORLD_COLORS[worldIdx] || CLR.bgGradBot);
    bCtx.fillStyle = grad;
    bCtx.fillRect(0, 0, w, h);

    // 배경 장식 패턴 (지역별)
    bCtx.globalAlpha = 0.08;
    if (worldIdx === 0) {
      // 정원: 꽃 패턴
      for (let i = 0; i < 30; i++) {
        const fx = gRng.next() * w;
        const fy = gRng.next() * h;
        const fs = 5 + gRng.next() * 10;
        bCtx.fillStyle = gRng.pick(['#FF69B4', '#FFB6C1', '#FFC0CB', '#FF1493']);
        bCtx.beginPath();
        for (let p = 0; p < 5; p++) {
          const pa = (p / 5) * Math.PI * 2;
          bCtx.arc(fx + Math.cos(pa) * fs * 0.5, fy + Math.sin(pa) * fs * 0.5, fs * 0.3, 0, Math.PI * 2);
        }
        bCtx.fill();
      }
    } else if (worldIdx === 1) {
      // 동굴: 수정 기둥
      bCtx.fillStyle = '#7B68EE';
      for (let i = 0; i < 15; i++) {
        const cx = gRng.next() * w;
        const cy = gRng.next() * h * 0.3;
        const cw = 3 + gRng.next() * 8;
        const ch = 30 + gRng.next() * 60;
        bCtx.fillRect(cx, cy, cw, ch);
      }
    } else if (worldIdx === 2) {
      // 숲: 나무
      bCtx.fillStyle = '#228B22';
      for (let i = 0; i < 20; i++) {
        const tx = gRng.next() * w;
        const ty = gRng.next() * h;
        bCtx.beginPath();
        bCtx.moveTo(tx, ty - 20);
        bCtx.lineTo(tx - 15, ty + 10);
        bCtx.lineTo(tx + 15, ty + 10);
        bCtx.closePath();
        bCtx.fill();
      }
    } else if (worldIdx === 3) {
      // 성: 별
      bCtx.fillStyle = '#FFD700';
      for (let i = 0; i < 40; i++) {
        const sx = gRng.next() * w;
        const sy = gRng.next() * h * 0.4;
        const ss = 1 + gRng.next() * 2;
        bCtx.beginPath();
        bCtx.arc(sx, sy, ss, 0, Math.PI * 2);
        bCtx.fill();
      }
    }
    bCtx.globalAlpha = 1;
  }

  // 보드 영역 반투명 배경
  const { boardX, boardY, boardW, boardH } = gLayout;
  const padB = 8;
  bCtx.fillStyle = 'rgba(20,20,40,0.55)';
  bCtx.beginPath();
  bCtx.roundRect(boardX - padB, boardY - padB, boardW + padB * 2, boardH + padB * 2, 12);
  bCtx.fill();

  // 골드 보더
  bCtx.strokeStyle = '#FFD700';
  bCtx.lineWidth = 2.5;
  bCtx.beginPath();
  bCtx.roundRect(boardX - padB, boardY - padB, boardW + padB * 2, boardH + padB * 2, 12);
  bCtx.stroke();

  // 체커보드 패턴
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cx = boardX + c * gLayout.cellSize;
      const cy = boardY + r * gLayout.cellSize;
      bCtx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
      bCtx.fillRect(cx, cy, gLayout.cellSize, gLayout.cellSize);
    }
  }

  _bgCacheDirty = false;
}

/* ══════════════════════════════════════════════════════════════════
 *  §22. 향상된 매칭 후 스페셜 활성화 큐 시스템
 *  (스페셜이 매칭되면 발동 큐에 추가, 순차 발동)
 * ══════════════════════════════════════════════════════════════════ */
let gSpecialQueue = [];

function queueSpecialActivation(special, r, c) {
  gSpecialQueue.push({ special, r, c });
}

function processSpecialQueue() {
  if (gSpecialQueue.length === 0) return false;
  const item = gSpecialQueue.shift();
  triggerSpecial(item.special, item.r, item.c);
  return true;
}

/* ══════════════════════════════════════════════════════════════════
 *  §23. 힌트 시스템 — 5초 무입력 시 유효 이동 하이라이트
 * ══════════════════════════════════════════════════════════════════ */
let gHintTimer = 0;
let gHintCells = null; // [{r,c}, {r,c}] — 힌트로 표시할 스왑 쌍
let gHintAlpha = 0;

function updateHint(dt) {
  if (gState !== STATE.PLAY || isInputBlocked()) {
    gHintTimer = 0;
    gHintCells = null;
    return;
  }
  gHintTimer += dt;
  if (gHintTimer > 5000 && !gHintCells) {
    gHintCells = findHintMove(gGrid);
  }
  if (gHintCells) {
    gHintAlpha = 0.4 + 0.4 * Math.sin(performance.now() / 300);
  }
}

function findHintMove(grid) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!canSwap(grid, r, c)) continue;
      if (c < COLS - 1 && canSwap(grid, r, c + 1)) {
        swapColors(grid, r, c, r, c + 1);
        const has = findMatches(grid).length > 0;
        swapColors(grid, r, c, r, c + 1);
        if (has) return [{r, c}, {r, c: c + 1}];
      }
      if (r < ROWS - 1 && canSwap(grid, r + 1, c)) {
        swapColors(grid, r, c, r + 1, c);
        const has = findMatches(grid).length > 0;
        swapColors(grid, r, c, r + 1, c);
        if (has) return [{r, c}, {r: r + 1, c}];
      }
    }
  }
  return null;
}

function renderHint(ctx) {
  if (!gHintCells || gState !== STATE.PLAY) return;
  const { boardX, boardY, cellSize } = gLayout;
  ctx.save();
  ctx.globalAlpha = gHintAlpha;
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.setLineDash([6, 3]);
  for (const h of gHintCells) {
    const hx = boardX + h.c * cellSize;
    const hy = boardY + h.r * cellSize;
    ctx.strokeRect(hx + 3, hy + 3, cellSize - 6, cellSize - 6);
  }
  ctx.setLineDash([]);
  ctx.restore();
}

/* 입력 시 힌트 리셋 */
function resetHint() {
  gHintTimer = 0;
  gHintCells = null;
}

/* ══════════════════════════════════════════════════════════════════
 *  §24. 클리어 보너스 — 남은 턴 변환 연출
 * ══════════════════════════════════════════════════════════════════ */
let gClearBonusPhase = 0;
let gClearBonusTurns = 0;
let gClearBonusTimer = 0;

function updateClearBonus(dt) {
  if (gState !== STATE.CLEAR_ANIM || gClearTimer < 100) return;
  if (gClearBonusTurns > 0 && gClearBonusPhase < gTurnsLeft) {
    gClearBonusTimer += dt;
    if (gClearBonusTimer > 150) {
      gClearBonusTimer = 0;
      gClearBonusPhase++;
      gScore += 300;
      // 랜덤 보석 폭발
      for (let attempts = 0; attempts < 20; attempts++) {
        const rr = gRng.int(0, ROWS - 1);
        const rc = gRng.int(0, COLS - 1);
        if (gGrid[rr][rc].color) {
          const px = gLayout.boardX + rc * gLayout.cellSize + gLayout.cellSize / 2;
          const py = gLayout.boardY + rr * gLayout.cellSize + gLayout.cellSize / 2;
          particles.emit(px, py, 8, {
            color: GEM_HEX[gGrid[rr][rc].color] || '#FFD700',
            speed: 100, life: 0.4, size: 4
          });
          gGrid[rr][rc].color = null;
          break;
        }
      }
      playSfx('match3');
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §25. 왕국 복원 진행도 시스템
 * ══════════════════════════════════════════════════════════════════ */
function getWorldProgress(worldIdx) {
  const start = worldIdx * 5;
  const end = start + 5;
  let totalStars = 0;
  for (let i = start; i < end && i < LEVELS.length; i++) {
    totalStars += gSaveData.levelStars[i] || 0;
  }
  return { current: totalStars, max: 15 }; // 5레벨 × 3별 = 15
}

function renderWorldProgress(ctx, x, y, worldIdx) {
  const prog = getWorldProgress(worldIdx);
  const ratio = prog.current / prog.max;
  const barW = 80, barH = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(x, y, barW, barH);
  ctx.fillStyle = ratio >= 1 ? '#FFD700' : '#34C759';
  ctx.fillRect(x, y, barW * ratio, barH);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, barW, barH);
  UI.text(ctx, prog.current + '/' + prog.max + ' ★', x + barW / 2, y + barH + 10, { size: 9, color: '#FFD700' });
}

/* ══════════════════════════════════════════════════════════════════
 *  §26. 고급 스와이프 인식 + 터치 안전성 향상
 * ══════════════════════════════════════════════════════════════════ */
function touchSafe(size) {
  return Math.max(MIN_TOUCH, size);
}

/* 맵 관성 스크롤 */
let gMapVelocityY = 0;
let gMapLastTouchY = 0;
let gMapLastTouchTime = 0;

function updateMapInertia(dt) {
  if (gState !== STATE.MAP) return;
  if (!gMapDragging && Math.abs(gMapVelocityY) > 0.5) {
    gMapScrollY += gMapVelocityY * (dt / 16);
    gMapScrollY = MathUtil.clamp(gMapScrollY, 0, Math.max(0, getMapTotalH() - gLayout.h));
    gMapVelocityY *= 0.92; // 마찰
    if (Math.abs(gMapVelocityY) < 0.5) gMapVelocityY = 0;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §27. 향상된 이펙트 시스템 — 스프라이트 기반 이펙트
 * ══════════════════════════════════════════════════════════════════ */
let gEffects = []; // [{type, x, y, frame, timer, maxTime, spriteKey}]

function spawnEffect(type, x, y) {
  const effectDefs = {
    match: { spriteKey: 'effectMatchSequence', frames: 4, duration: 300, w: 128, h: 128 },
    lineLaser: { spriteKey: 'effectLineLaser', frames: 1, duration: 200, w: 256, h: 32 },
    bombShock: { spriteKey: 'effectBombShockwave', frames: 4, duration: 400, w: 128, h: 128 },
    rainbow: { spriteKey: 'effectRainbowWave', frames: 1, duration: 500, w: 200, h: 200 },
    poisonSpread: { spriteKey: 'effectPoisonSpread', frames: 4, duration: 400, w: 64, h: 64 },
    curtainReveal: { spriteKey: 'effectCurtainReveal', frames: 4, duration: 300, w: 80, h: 80 }
  };
  const def = effectDefs[type];
  if (!def) return;
  gEffects.push({
    type, x, y, frame: 0, timer: 0, maxTime: def.duration,
    spriteKey: def.spriteKey, frames: def.frames, w: def.w, h: def.h
  });
}

function updateEffects(dt) {
  for (let i = gEffects.length - 1; i >= 0; i--) {
    const e = gEffects[i];
    e.timer += dt;
    e.frame = Math.min(Math.floor((e.timer / e.maxTime) * e.frames), e.frames - 1);
    if (e.timer >= e.maxTime) gEffects.splice(i, 1);
  }
}

function renderEffects(ctx) {
  for (const e of gEffects) {
    const sprite = assets.sprites[e.spriteKey];
    if (sprite) {
      const fw = sprite.width / e.frames;
      const fh = sprite.height;
      const sx = e.frame * fw;
      ctx.drawImage(sprite, sx, 0, fw, fh, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
    } else {
      // 폴백: 원형 이펙트
      const alpha = 1 - (e.timer / e.maxTime);
      const scale = 0.5 + (e.timer / e.maxTime) * 1.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(e.x, e.y);
      ctx.scale(scale, scale);
      ctx.fillStyle = e.type === 'poisonSpread' ? '#8B008B' :
                      e.type === 'bombShock' ? '#FF6600' :
                      e.type === 'rainbow' ? '#FF00FF' : '#FFD700';
      ctx.beginPath();
      ctx.arc(0, 0, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §28. 확장된 장애물 배치 — 레벨별 고정 패턴
 *  (랜덤 + 대칭 패턴 혼합으로 퍼즐 품질 향상)
 * ══════════════════════════════════════════════════════════════════ */
const LEVEL_PATTERNS = {
  /* 중앙 대칭 */
  symmetric: (grid, type, layers, count) => {
    let placed = 0;
    const half = Math.floor(count / 2);
    for (let i = 0; i < half && placed < count; i++) {
      const r = gRng.int(1, ROWS - 2);
      const c = gRng.int(0, Math.floor(COLS / 2) - 1);
      const mc = COLS - 1 - c;
      if (grid[r][c].obs === OBS_TYPE.NONE && grid[r][mc].obs === OBS_TYPE.NONE) {
        applyObs(grid[r][c], type, layers);
        applyObs(grid[r][mc], type, layers);
        placed += 2;
      }
    }
    // 홀수 남으면 중앙에
    if (placed < count) {
      const r = gRng.int(1, ROWS - 2);
      const c = Math.floor(COLS / 2);
      if (grid[r][c].obs === OBS_TYPE.NONE) {
        applyObs(grid[r][c], type, layers);
        placed++;
      }
    }
    return placed;
  },
  /* 테두리 */
  border: (grid, type, layers, count) => {
    let placed = 0;
    const borderCells = [];
    for (let c = 0; c < COLS; c++) { borderCells.push({r:0,c}); borderCells.push({r:ROWS-1,c}); }
    for (let r = 1; r < ROWS - 1; r++) { borderCells.push({r,c:0}); borderCells.push({r,c:COLS-1}); }
    gRng.shuffle(borderCells);
    for (const p of borderCells) {
      if (placed >= count) break;
      if (grid[p.r][p.c].obs === OBS_TYPE.NONE) {
        applyObs(grid[p.r][p.c], type, layers);
        placed++;
      }
    }
    return placed;
  },
  /* 십자 */
  cross: (grid, type, layers, count) => {
    let placed = 0;
    const cr = Math.floor(ROWS / 2), cc = Math.floor(COLS / 2);
    const crossCells = [];
    for (let r = 0; r < ROWS; r++) crossCells.push({r, c: cc});
    for (let c = 0; c < COLS; c++) crossCells.push({r: cr, c});
    gRng.shuffle(crossCells);
    for (const p of crossCells) {
      if (placed >= count) break;
      if (grid[p.r][p.c].obs === OBS_TYPE.NONE) {
        applyObs(grid[p.r][p.c], type, layers);
        placed++;
      }
    }
    return placed;
  }
};

function applyObs(cell, type, layers) {
  if (type === OBS_TYPE.JELLY) {
    cell.jelly = layers || 1;
  } else if (type === OBS_TYPE.STONE) {
    cell.obs = OBS_TYPE.STONE;
    cell.color = null;
  } else if (type === OBS_TYPE.POISON) {
    cell.obs = OBS_TYPE.POISON;
    cell.obsLayers = 1;
    cell.color = null;
  } else if (type === OBS_TYPE.WOOD) {
    cell.obs = OBS_TYPE.WOOD;
    cell.obsLayers = layers || 2;
    cell.color = null;
  } else if (type === OBS_TYPE.ICE) {
    cell.obs = OBS_TYPE.ICE;
    cell.obsLayers = layers || 1;
  } else if (type === OBS_TYPE.CHAIN) {
    cell.obs = OBS_TYPE.CHAIN;
    cell.obsLayers = 1;
  } else if (type === OBS_TYPE.CURTAIN) {
    cell.curtain = true;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §29. 콤보 시각 피드백 시스템
 * ══════════════════════════════════════════════════════════════════ */
let gComboDisplay = { count: 0, timer: 0, x: 0, y: 0, scale: 1 };

function showCombo(count, x, y) {
  gComboDisplay.count = count;
  gComboDisplay.timer = 1.5;
  gComboDisplay.x = x;
  gComboDisplay.y = y;
  gComboDisplay.scale = 1.5;
}

function updateComboDisplay(dt) {
  if (gComboDisplay.timer > 0) {
    gComboDisplay.timer -= dt / 1000;
    gComboDisplay.scale = MathUtil.lerp(gComboDisplay.scale, 1, dt / 200);
    gComboDisplay.y -= dt * 0.02;
  }
}

function renderComboDisplay(ctx) {
  if (gComboDisplay.timer <= 0 || gComboDisplay.count < 2) return;
  const alpha = Math.min(1, gComboDisplay.timer / 0.5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(gComboDisplay.x, gComboDisplay.y);
  ctx.scale(gComboDisplay.scale, gComboDisplay.scale);
  const comboText = gComboDisplay.count >= 5 ? 'AMAZING!' :
                    gComboDisplay.count >= 4 ? 'FANTASTIC!' :
                    gComboDisplay.count >= 3 ? 'GREAT!' : 'COMBO x' + gComboDisplay.count;
  const comboColor = gComboDisplay.count >= 5 ? '#FF00FF' :
                     gComboDisplay.count >= 4 ? '#FFD700' :
                     gComboDisplay.count >= 3 ? '#FF6600' : '#FFCC00';
  UI.text(ctx, comboText, 0, 0, {
    size: gLayout.fontSize + 6 + gComboDisplay.count * 2,
    color: comboColor, bold: true, glow: comboColor
  });
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════════════
 *  §30. 데드락 감지 & 안전 장치
 * ══════════════════════════════════════════════════════════════════ */
let gStuckTimer = 0;

function checkStuck(dt) {
  if (gState === STATE.PLAY && !isInputBlocked()) {
    gStuckTimer += dt;
    if (gStuckTimer > 15000) {
      // 안전 장치: 유효 이동 없으면 셔플
      if (!hasValidMove(gGrid)) {
        spawnPopup(L('noMoves'), gLayout.w / 2, gLayout.h / 2);
        shuffleBoard(gGrid);
      }
      gStuckTimer = 0;
    }
  } else {
    gStuckTimer = 0;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §31. 향상된 게임 렌더 — 오프스크린 캐시 + 이펙트 + 힌트 + 콤보
 *  (기존 renderGameplay를 확장)
 * ══════════════════════════════════════════════════════════════════ */

/* 기존 renderGameplay에 추가되는 확장 렌더 함수들은
   §18.4의 renderGameplay 끝에서 호출됨 */

function renderExtended(ctx, w, h) {
  renderHint(ctx);
  renderEffects(ctx);
  renderComboDisplay(ctx);
}

/* ══════════════════════════════════════════════════════════════════
 *  §32. 향상된 업데이트 루프 — 확장 모듈 통합
 * ══════════════════════════════════════════════════════════════════ */

function updateExtended(dt) {
  updateHint(dt);
  updateEffects(dt);
  updateComboDisplay(dt);
  updateClearBonus(dt);
  updateMapInertia(dt);
  checkStuck(dt);
}

/* ══════════════════════════════════════════════════════════════════
 *  §33. 맵 화면 확장 — 지역 구분선 + 왕국 진행도
 * ══════════════════════════════════════════════════════════════════ */
function renderMapWorldDividers(ctx, w, h) {
  for (let wi = 0; wi < 4; wi++) {
    const borderLvl = wi * 5;
    if (borderLvl >= LEVELS.length) break;
    const ny = getMapNodeY(borderLvl) - gMapScrollY;
    if (ny < -30 || ny > h + 30) continue;

    // 지역 구분선
    ctx.save();
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(20, ny + 30);
    ctx.lineTo(w - 20, ny + 30);
    ctx.stroke();
    ctx.setLineDash([]);

    // 지역 이름
    const wName = gLang === 'ko' ? WORLD_NAMES[wi] : WORLD_NAMES_EN[wi];
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(w / 2 - 60, ny + 35, 120, 22);
    UI.text(ctx, wName, w / 2, ny + 46, { size: 10, color: '#FFD700' });

    // 진행도 바
    renderWorldProgress(ctx, w / 2 - 40, ny + 58, wi);
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════════════════════

  [0, 1, 2, 4, 2, 1, 0, -1, 2, 3, 4, 5, 4, 3, 2, -1],
  // 성 패턴: 장엄한 상승
  [0, 2, 4, 5, 7, 5, 4, 2, 0, 4, 7, 9, 7, 4, 0, -1]
];

function getWorldBgmNote(worldIdx, noteIdx) {
  const scale = BGM_WORLD_SCALES[worldIdx] || BGM_WORLD_SCALES[0];
  const pattern = BGM_PATTERNS[worldIdx] || BGM_PATTERNS[0];
  const pIdx = noteIdx % pattern.length;
  if (pattern[pIdx] === -1) return 0; // 무음
  const sIdx = MathUtil.clamp(pattern[pIdx], 0, scale.length - 1);
  return scale[sIdx];
}

function updateWorldBgm(dt) {
  if (!gSoundInited || !gBgmPlaying) return;
  gBgmTimer += dt;
  const interval = 60000 / gBgmBpm / 2;
  if (gBgmTimer >= interval) {
    gBgmTimer -= interval;
    const worldIdx = LEVELS[gCurrentLevel] ? LEVELS[gCurrentLevel].world : 0;
    const note = getWorldBgmNote(worldIdx, gBgmNoteIdx);
    if (note > 0) {
      sound.tone(note, 0.12, 'sine', 0.06);
      // 하모닉 레이어
      if (gBgmNoteIdx % 4 === 0) {
        sound.tone(note * 0.5, 0.2, 'triangle', 0.03);
      }
    }
    gBgmNoteIdx++;
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §35. 맵 노드 경로 보간 — 부드러운 곡선
 * ══════════════════════════════════════════════════════════════════ */
function getMapNodePos(idx) {
  return { x: getMapNodeX(idx), y: getMapNodeY(idx) };
}

function drawSmoothPath(ctx, w) {
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 6;

  const points = [];
  for (let i = 0; i < LEVELS.length; i++) {
    points.push({
      x: getMapNodeX(i),
      y: getMapNodeY(i) - gMapScrollY
    });
  }

  if (points.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const cpx = (prev.x + curr.x) / 2;
    const cpy1 = prev.y;
    const cpy2 = curr.y;
    ctx.bezierCurveTo(cpx, cpy1, cpx, cpy2, curr.x, curr.y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 경로 위 장식 점
  ctx.fillStyle = 'rgba(255,215,0,0.3)';
  for (let i = 0; i < points.length - 1; i++) {
    const p1 = points[i], p2 = points[i + 1];
    for (let t = 0.25; t < 1; t += 0.25) {
      const mx = MathUtil.lerp(p1.x, p2.x, t);
      const my = MathUtil.lerp(p1.y, p2.y, t);
      ctx.beginPath();
      ctx.arc(mx, my, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §36. 보석 반짝임 + 유휴 애니메이션
 * ══════════════════════════════════════════════════════════════════ */
let gIdleAnimTimer = 0;

function updateIdleAnim(dt) {
  if (gState !== STATE.PLAY || isInputBlocked()) return;
  gIdleAnimTimer += dt;
  // 매 2초마다 랜덤 보석 반짝임
  if (gIdleAnimTimer > 2000) {
    gIdleAnimTimer = 0;
    const r = gRng.int(0, ROWS - 1);
    const c = gRng.int(0, COLS - 1);
    if (gGrid[r][c].color && gGrid[r][c].obs === OBS_TYPE.NONE && !gGrid[r][c].curtain) {
      gGrid[r][c].sparkleTimer = 600;
    }
  }
}

function renderGemSparkle(ctx, r, c) {
  const cell = gGrid[r][c];
  if (!cell.sparkleTimer || cell.sparkleTimer <= 0) return;
  const { boardX, boardY, cellSize } = gLayout;
  const cx = boardX + c * cellSize + cellSize / 2;
  const cy = boardY + r * cellSize + cellSize / 2;
  const t = 1 - cell.sparkleTimer / 600;

  ctx.save();
  ctx.globalAlpha = 1 - t;
  ctx.fillStyle = '#FFF';

  // 4방향 스파클
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 + t * Math.PI;
    const dist = t * cellSize * 0.3;
    const sx = cx + Math.cos(angle) * dist;
    const sy = cy + Math.sin(angle) * dist;
    const ss = 3 * (1 - t);
    ctx.beginPath();
    // 작은 다이아몬드
    ctx.moveTo(sx, sy - ss);
    ctx.lineTo(sx + ss * 0.6, sy);
    ctx.lineTo(sx, sy + ss);
    ctx.lineTo(sx - ss * 0.6, sy);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════════════
 *  §37. 고급 타이틀 화면 — 애니메이션 강화
 * ══════════════════════════════════════════════════════════════════ */
let gTitleParticleTimer = 0;

function renderTitleEnhanced(ctx, w, h) {
  // 떨어지는 보석 파티클
  gTitleParticleTimer += 16;
  if (gTitleParticleTimer > 500) {
    gTitleParticleTimer = 0;
    const rx = gRng.next() * w;
    particles.emit(rx, -10, 1, {
      color: gRng.pick(Object.values(GEM_HEX)),
      speed: 30, life: 3, size: 8, angle: Math.PI / 2, spread: 0.3
    });
  }

  // 서브타이틀
  const subY = gLayout.h * 0.5;
  const alpha2 = MathUtil.clamp((gTitleTime - 800) / 500, 0, 1);
  ctx.globalAlpha = alpha2;
  UI.text(ctx, '4 Kingdoms · 20 Levels · 6 Obstacles', w / 2, subY, { size: 11, color: '#666' });
  ctx.globalAlpha = 1;

  // 하이스코어
  const hi = Save.getHighScore(GAME_ID);
  if (hi > 0) {
    UI.text(ctx, 'High Score: ' + hi, w / 2, h * 0.62, { size: 12, color: '#FFB800' });
  }

  // 진행도
  const clearedCount = gSaveData.levelStars.filter(s => s > 0).length;
  if (clearedCount > 0) {
    UI.text(ctx, clearedCount + '/20 ' + L('level') + ' cleared', w / 2, h * 0.67, { size: 11, color: '#888' });
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §38. 보석 그리기 확장 — 스프라이트 시트 반짝임
 * ══════════════════════════════════════════════════════════════════ */
function drawGemWithSheet(ctx, color, x, y, size, sparkleT) {
  // 기본 보석
  drawGem(ctx, color, x, y, size);

  // 스프라이트 시트 반짝임
  if (sparkleT > 0 && sparkleT < 600) {
    const sheetKey = 'gem' + color.charAt(0).toUpperCase() + color.slice(1) + 'Sheet';
    const sheet = assets.sprites[sheetKey];
    if (sheet) {
      const frame = Math.min(3, Math.floor((1 - sparkleT / 600) * 4));
      const fw = sheet.width / 4;
      const fh = sheet.height;
      ctx.drawImage(sheet, frame * fw, 0, fw, fh, x, y, size, size);
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §39. 레벨 맵 향상 — 스크롤 바 + 현재 위치 표시
 * ══════════════════════════════════════════════════════════════════ */
function renderMapScrollbar(ctx, w, h) {
  const totalH = getMapTotalH();
  if (totalH <= h) return;

  const barH = h * 0.6;
  const barX = w - 8;
  const barY = (h - barH) / 2;
  const thumbH = Math.max(20, barH * (h / totalH));
  const thumbY = barY + (gMapScrollY / (totalH - h)) * (barH - thumbH);

  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(barX, barY, 4, barH);
  ctx.fillStyle = 'rgba(255,215,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(barX, thumbY, 4, thumbH, 2);
  ctx.fill();
}

/* ══════════════════════════════════════════════════════════════════
 *  §40. 장애물 파괴 시각 피드백 — 화면 쉐이크
 * ══════════════════════════════════════════════════════════════════ */
let gShakeIntensity = 0;
let gShakeDecay = 0.9;

function triggerShake(intensity) {
  gShakeIntensity = Math.max(gShakeIntensity, intensity);
}

function updateShake(dt) {
  if (gShakeIntensity > 0.1) {
    gShakeIntensity *= gShakeDecay;
  } else {
    gShakeIntensity = 0;
  }
}

function getShakeOffset() {
  if (gShakeIntensity <= 0.1) return { x: 0, y: 0 };
  return UI.shake(gShakeIntensity);
}

/* ══════════════════════════════════════════════════════════════════
 *  §41. 업데이트/렌더 통합 패치
 *  (기존 gameUpdate/gameRender에 확장 모듈을 연결)
 * ══════════════════════════════════════════════════════════════════ */

/* 원본 gameUpdate를 확장하여 모든 서브시스템 통합 */
const _origUpdate = gameUpdate;
const _origRender = gameRender;

/* gameUpdate에 확장 주입 — monkey-patch 대신 직접 호출 방식
   (engine._render 교체 0건 유지) */

/* 참고: §17의 gameUpdate와 §18의 gameRender는 이미 정의됨.
   아래는 원본 함수에 추가적인 호출을 삽입하기 위해
   별도의 래퍼를 사용하지 않고, 원본 함수 내부에서
   updateExtended()와 renderExtended()를 호출하도록 설계.

   현재 구조에서는 gameUpdate/gameRender가 직접 호출하는
   updateTitle, updatePlay 등 내부에서 이미 처리하므로
   여기서는 주입 포인트만 남김. */

/* ══════════════════════════════════════════════════════════════════
 *  §42. 전체 보드 렌더 업그레이드 — 반짝임 + 낙하 보간 + 오프스크린
 * ══════════════════════════════════════════════════════════════════ */

/* 낙하 중 보석의 ay 보간 (부드러운 낙하) */
function interpolateFalling(dt) {
  const fallInfo = gAnimatingCells[0];
  if (!fallInfo || !fallInfo.fallDur) return;
  const t = fallInfo.proxy ? fallInfo.proxy.t : 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      if (cell.ay && cell.ay !== 0) {
        // ay는 음수(위에서 오는 거리), t가 1이면 도착
        // 보간: 현재 위치 = 원래 ay * (1 - t)
        // 이미 tween에서 처리하므로 여기서는 추가 보간만
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §43. 레벨 선택 정보 패널 — 맵에서 노드 롱프레스 시 정보 표시
 * ══════════════════════════════════════════════════════════════════ */
let gMapInfoPanel = null; // {levelIdx, x, y, timer}

function renderMapInfoPanel(ctx, w, h) {
  if (!gMapInfoPanel) return;
  const lvl = LEVELS[gMapInfoPanel.levelIdx];
  if (!lvl) return;

  const pw = 200, ph = 140;
  let px = gMapInfoPanel.x - pw / 2;
  let py = gMapInfoPanel.y - ph - 30;
  px = MathUtil.clamp(px, 10, w - pw - 10);
  py = MathUtil.clamp(py, 10, h - ph - 10);

  // 패널 배경
  ctx.fillStyle = 'rgba(20,20,50,0.95)';
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 8);
  ctx.fill();
  ctx.stroke();

  // 레벨 번호
  UI.text(ctx, L('level') + ' ' + lvl.id, px + pw / 2, py + 20, { size: 14, color: '#FFD700', bold: true });

  // 목표
  let gy = py + 42;
  for (const g of lvl.goals) {
    let text = '';
    if (g.type === 'score') text = '⭐ ' + g.val;
    else if (g.type === 'collect') text = getGemEmoji(g.color) + ' x' + g.val;
    else if (g.type === 'obstacle') text = getObsEmoji(g.obs) + ' x' + g.val;
    else if (g.type === 'jelly') text = '🍬 x' + g.val;
    UI.text(ctx, text, px + pw / 2, gy, { size: 11, color: '#FFF' });
    gy += 18;
  }

  // 턴
  UI.text(ctx, L('moves') + ': ' + lvl.turns, px + pw / 2, gy + 5, { size: 11, color: '#007AFF' });

  // 별 기록
  const stars = gSaveData.levelStars[gMapInfoPanel.levelIdx] || 0;
  if (stars > 0) {
    const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
    UI.text(ctx, starStr, px + pw / 2, gy + 25, { size: 14, color: '#FFD700' });
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §44. 독 확산 시각화 강화 — 경고 표시
 * ══════════════════════════════════════════════════════════════════ */
function renderPoisonWarning(ctx) {
  if (gState !== STATE.PLAY) return;
  const { boardX, boardY, cellSize } = gLayout;
  let hasPoison = false;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (gGrid[r][c].obs === OBS_TYPE.POISON) {
        hasPoison = true;
        // 인접 빈 칸에 경고 표시
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for (const [dr, dc] of dirs) {
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
          const adj = gGrid[nr][nc];
          if (adj.color && adj.obs === OBS_TYPE.NONE && !adj.curtain) {
            const px = boardX + nc * cellSize;
            const py = boardY + nr * cellSize;
            const pulse = 0.15 + 0.1 * Math.sin(performance.now() / 400);
            ctx.fillStyle = `rgba(128,0,128,${pulse})`;
            ctx.fillRect(px, py, cellSize, cellSize);
          }
        }
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §45. 게임 전체 루프 통합 (최종)
 *  — gameUpdate/gameRender에서 모든 확장 모듈 호출
 * ══════════════════════════════════════════════════════════════════ */

/* 참고: 원본 gameUpdate(§17)와 gameRender(§18)에서
   updateExtended(), renderExtended(), updateShake() 등을 호출하도록
   아래에서 원본 함수들의 호출 체인을 확장합니다.

   engine._update와 _render를 재할당하는 대신,
   원본 함수 내부에서 확장 함수를 직접 호출하는 패턴 사용.
   (monkey-patch 0건 유지) */

/* gameUpdate 확장 훅 — 원본 끝에 추가 호출 삽입 */
/* 이미 §17의 gameUpdate에서 상태별 함수를 호출 중이므로
   각 상태별 함수 안에서 확장 모듈을 호출합니다. */

/* 마지막으로, gameUpdate와 gameRender를 확장된 버전으로 교체 */
engine._update = (dt, ts) => {
  if (!_ready) return;
  try {
    const sys = ACTIVE_SYSTEMS[gState];
    tween.update(dt);
    if (sys.particle) particles.update(dt);
    updatePopups(dt);
    updateShake(dt);

    // BGM — 지역별
    if (gState === STATE.PLAY || gState === STATE.ANIMATING || gState === STATE.CASCADING ||
        gState === STATE.MAP || gState === STATE.TITLE) {
      if (gState === STATE.PLAY || gState === STATE.ANIMATING || gState === STATE.CASCADING) {
        updateWorldBgm(dt);
      } else {
        updateBgm(dt);
      }
    }

    // 스왑 애니메이션 프록시 동기화
    if (gAnimatingCells.length > 0 && gAnimatingCells[0].cell) {
      for (const ac of gAnimatingCells) {
        if (ac.cell && ac.proxy) {
          ac.cell.ax = ac.proxy.x || 0;
          ac.cell.ay = ac.proxy.y || 0;
        }
      }
    }

    // 보석 반짝임 타이머 — gGrid 초기화 전 접근 방지
    if (gGrid.length > 0) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = gGrid[r][c];
          if (cell && cell.sparkleTimer > 0) cell.sparkleTimer -= dt;
        }
      }
    }

    // 상태별 업데이트
    switch (gState) {
      case STATE.LOADING: break;
      case STATE.TITLE: updateTitle(dt); break;
      case STATE.MAP: updateMap(dt); break;
      case STATE.LEVEL_INTRO: updateLevelIntro(dt); break;
      case STATE.PLAY:
        updatePlay(dt);
        updateIdleAnim(dt);
        break;
      case STATE.ANIMATING: break;
      case STATE.CASCADING: break;
      case STATE.BOOSTING: updateBoosting(dt); break;
      case STATE.GOAL_CHECK: break;
      case STATE.CLEAR_ANIM: updateClearAnim(dt); break;
      case STATE.FAIL_ANIM: updateFailAnim(dt); break;
      case STATE.RESULT: updateResult(dt); break;
      case STATE.PAUSED: updatePaused(dt); break;
    }

    // 확장 업데이트
    updateExtended(dt);

    input.flush();
  } catch (e) {
    console.error('[GemOdyssey Update]', e);
  }
};

engine._render = (ctx, w, h, dt) => {
  if (!_ready) return;
  try {
    const shake = getShakeOffset();
    if (shake.x !== 0 || shake.y !== 0) {
      ctx.save();
      ctx.translate(shake.x, shake.y);
    }

    // 배경
    ctx.fillStyle = CLR.bgPrimary;
    ctx.fillRect(0, 0, w, h);

    switch (gState) {
      case STATE.LOADING: renderLoading(ctx, w, h); break;
      case STATE.TITLE:
        renderTitle(ctx, w, h);
        renderTitleEnhanced(ctx, w, h);
        break;
      case STATE.MAP:
        renderMap(ctx, w, h);
        renderMapWorldDividers(ctx, w, h);
        renderMapScrollbar(ctx, w, h);
        renderMapInfoPanel(ctx, w, h);
        break;
      case STATE.LEVEL_INTRO:
      case STATE.PLAY:
      case STATE.ANIMATING:
      case STATE.CASCADING:
      case STATE.BOOSTING:
      case STATE.GOAL_CHECK:
      case STATE.CLEAR_ANIM:
      case STATE.FAIL_ANIM:
        renderGameplayFull(ctx, w, h);
        break;
      case STATE.RESULT: renderResult(ctx, w, h); break;
      case STATE.PAUSED:
        renderGameplayFull(ctx, w, h);
        renderPauseOverlay(ctx, w, h);
        break;
    }

    particles.render(ctx);
    renderPopups(ctx);

    if (shake.x !== 0 || shake.y !== 0) ctx.restore();

    // 전역 페이드
    if (_fadeObj.a > 0.01) UI.fade(ctx, w, h, _fadeObj.a);
  } catch (e) {
    console.error('[GemOdyssey Render]', e);
  }
};

/* 향상된 게임플레이 렌더 (오프스크린 + 반짝임 + 독 경고 + 힌트 + 콤보) */
function renderGameplayFull(ctx, w, h) {
  const { boardX, boardY, cellSize, boardW, boardH, topBarH } = gLayout;
  const lvl = LEVELS[gCurrentLevel];
  const worldIdx = lvl ? lvl.world : 0;

  // 오프스크린 배경 사용
  buildBackgroundCache(w, h);
  if (_offscreenBg) {
    ctx.drawImage(_offscreenBg, 0, 0);
  }

  // 보드 셀
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = gGrid[r][c];
      const cx = boardX + c * cellSize;
      const cy = boardY + r * cellSize;
      const ay = cell.ay || 0;

      // 젤리 (보석 아래)
      if (cell.jelly > 0) {
        drawJelly(ctx, cx, cy, cellSize, cell.jelly);
      }

      // 장애물 (독립형)
      if (cell.obs === OBS_TYPE.STONE) {
        drawObstacle(ctx, 'stone', cx, cy, cellSize, 0);
        continue;
      }
      if (cell.obs === OBS_TYPE.WOOD) {
        drawObstacle(ctx, 'wood', cx, cy, cellSize, cell.obsLayers);
        continue;
      }
      if (cell.obs === OBS_TYPE.POISON) {
        drawObstacle(ctx, 'poison', cx, cy, cellSize, 1);
        continue;
      }

      // 보석
      if (cell.color) {
        const drawX = cx + (cell.ax || 0);
        const drawY = cy + ay;
        const s = cell.scale || 1;
        const gemSize = cellSize * 0.8 * s;
        const offset = (cellSize - gemSize) / 2;

        ctx.globalAlpha = cell.alpha !== undefined ? cell.alpha : 1;

        if (cell.curtain) {
          drawObstacle(ctx, 'curtain', cx, cy + ay, cellSize, 1);
        } else {
          if (cell.special !== SPECIAL.NONE) {
            drawSpecialGem(ctx, cell.special, cell.color, drawX + offset, drawY + offset, gemSize);
          } else {
            drawGemWithSheet(ctx, cell.color, drawX + offset, drawY + offset, gemSize, cell.sparkleTimer);
          }
          // 반짝임 이펙트
          renderGemSparkle(ctx, r, c);
        }

        ctx.globalAlpha = 1;

        // 얼음 오버레이
        if (cell.obs === OBS_TYPE.ICE) {
          drawObstacle(ctx, 'ice', cx, cy + ay, cellSize, cell.obsLayers);
        }
        // 체인 오버레이
        if (cell.obs === OBS_TYPE.CHAIN) {
          drawObstacle(ctx, 'chain', cx, cy + ay, cellSize, 1);
        }
      }

      // 선택 표시
      if (gSelected && gSelected.r === r && gSelected.c === c) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        const selPulse = 1 + 0.05 * Math.sin(performance.now() / 200);
        const selOff = cellSize * (1 - selPulse) / 2;
        ctx.strokeRect(cx + selOff + 2, cy + selOff + 2,
                       cellSize * selPulse - 4, cellSize * selPulse - 4);
      }
    }
  }

  // 독 확산 경고
  renderPoisonWarning(ctx);

  // 키보드 커서
  if (gState === STATE.PLAY || gState === STATE.BOOSTING) {
    const cxK = boardX + gCursorC * cellSize;
    const cyK = boardY + gCursorR * cellSize;
    ctx.strokeStyle = gState === STATE.BOOSTING ? '#FF6600' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(cxK + 1, cyK + 1, cellSize - 2, cellSize - 2);
    ctx.setLineDash([]);
  }

  // 상단 UI
  renderTopBar(ctx, w, h);

  // 하단 부스터 바
  renderBoosterBar(ctx, w, h);

  // 확장 렌더 (힌트, 이펙트, 콤보)
  renderExtended(ctx, w, h);

  // 레벨 인트로 오버레이
  if (gState === STATE.LEVEL_INTRO) {
    renderLevelIntroOverlay(ctx, w, h);
  }

  // 클리어 연출
  if (gState === STATE.CLEAR_ANIM) {
    renderClearAnim(ctx, w, h);
  }

  // 실패 연출
  if (gState === STATE.FAIL_ANIM) {
    renderFailAnim(ctx, w, h);
  }

  // 부스터 활성 안내
  if (gState === STATE.BOOSTING && gActiveBooster) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, topBarH - 5, w, 25);
    const hint = gActiveBooster === 'hammer' ? L('selectTarget') :
                 gActiveBooster === 'colorBomb' ? L('selectColor') : '';
    UI.text(ctx, hint, w / 2, topBarH + 7, { size: 13, color: '#FFD700', bold: true });
  }

  // §14 #11: 추가 턴 부스터 사용 제안 오버레이
  if (gShowExtraTurnsPrompt) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, w, h);
    const pw = Math.min(w * 0.8, 320), ph = 200;
    const ppx = (w - pw) / 2, ppy = h * 0.25;
    ctx.fillStyle = 'rgba(30,30,60,0.95)';
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(ppx, ppy, pw, ph, 12);
    ctx.fill();
    ctx.stroke();

    UI.text(ctx, L('noMovesLeft') || 'No Moves Left!', w / 2, ppy + 35, { size: 20, color: '#FF6644', bold: true });
    UI.text(ctx, (L('useExtraTurns') || 'Use +5 Turns?') + ' (x' + gBoosters.extraTurns + ')', w / 2, ppy + 75, { size: 16, color: '#FFF' });

    // 부스터 아이콘
    if (assets.sprites.boosterExtraTurns) {
      ctx.drawImage(assets.sprites.boosterExtraTurns, w / 2 - 20, ppy + 90, 40, 40);
    } else {
      UI.text(ctx, '⏳', w / 2, ppy + 110, { size: 28 });
    }

    const promptBtnW = 120, promptBtnH = 45;
    drawFancyButton(ctx, L('use') || 'Use', w / 2 - promptBtnW - 10, ppy + ph - 60, promptBtnW, promptBtnH, '#34C759');
    drawFancyButton(ctx, L('giveUp') || 'Give Up', w / 2 + 10, ppy + ph - 60, promptBtnW, promptBtnH, '#FF4444');
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §46. 부스터 사용 연출 강화
 * ══════════════════════════════════════════════════════════════════ */
function renderBoosterActive(ctx) {
  if (!gActiveBooster || gState !== STATE.BOOSTING) return;
  const { boardX, boardY, boardW, boardH } = gLayout;
  // 보드 위 반투명 오버레이 + 사용 가능 셀 하이라이트
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(boardX, boardY, boardW, boardH);

  if (gActiveBooster === 'hammer') {
    // 커서 따라다니는 망치 아이콘
    const mx = input.mouseX, my = input.mouseY;
    UI.text(ctx, '🔨', mx, my - 15, { size: 24 });
  } else if (gActiveBooster === 'colorBomb') {
    // 보석 위에 호버 시 해당 색 하이라이트
    const { cellSize } = gLayout;
    const gr = Math.floor((input.mouseY - boardY) / cellSize);
    const gc = Math.floor((input.mouseX - boardX) / cellSize);
    if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
      const hoverColor = gGrid[gr][gc].color;
      if (hoverColor) {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            if (gGrid[r][c].color === hoverColor) {
              const hx = boardX + c * cellSize;
              const hy = boardY + r * cellSize;
              ctx.fillStyle = 'rgba(255,255,255,0.15)';
              ctx.fillRect(hx, hy, cellSize, cellSize);
            }
          }
        }
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
 *  §47. 글로벌 탈출구 — 강제 리셋
 * ══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Shift+R: 어디서든 타이틀로 강제 복귀
  if (e.code === 'KeyR' && e.shiftKey) {
    e.preventDefault();
    tween.clear();
    particles.clear();
    resetGuards();
    gState = STATE.TITLE;
    enterState(STATE.TITLE);
    gBgmPlaying = true;
    _fadeObj = { a: 0 };
  }
});

/* ══════════════════════════════════════════════════════════════════
 *  §48. 접근성 — 색맹 모드 토글 (향후 확장용)
 * ══════════════════════════════════════════════════════════════════ */
let gColorBlindMode = false;

function getGemShape(color) {
  // 색맹 모드에서 형태로 구분
  const shapes = {
    ruby: 'diamond', sapphire: 'oval', emerald: 'hexagon',
    topaz: 'heart', amethyst: 'drop', diamond: 'circle'
  };
  return shapes[color] || 'circle';
}

/* ══════════════════════════════════════════════════════════════════
 *  §49. 통계 추적 시스템
 * ══════════════════════════════════════════════════════════════════ */
let gStats = {
  totalMatches: 0, totalCascades: 0, maxCombo: 0,
  boostersUsed: 0, totalScore: 0, levelsPlayed: 0
};

function trackStat(key, val) {
  if (key === 'combo') gStats.maxCombo = Math.max(gStats.maxCombo, val);
  else if (key === 'match') gStats.totalMatches += val;
  else if (key === 'cascade') gStats.totalCascades += val;
  else if (key === 'booster') gStats.boostersUsed += val;
}

/* ══════════════════════════════════════════════════════════════════
 *  §50. 최종 검증 로그
 * ══════════════════════════════════════════════════════════════════ */
console.log('[GemOdyssey] 사이클 #47 초기화 완료');
console.log('[GemOdyssey] 상태:', STATE_NAMES.length, '개');
console.log('[GemOdyssey] 레벨:', LEVELS.length, '개');
console.log('[GemOdyssey] 가드:', Object.keys(GUARDS).length, '중');
console.log('[GemOdyssey] TRANSITION_TABLE:', Object.keys(TRANSITION_TABLE).length, '개 상태');
</script>
