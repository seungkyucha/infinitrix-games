<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="40%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#1A1E35"/>
    </linearGradient>
    <radialGradient id="tMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EEEEFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#AAAADD" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6666AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tGlyphGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFCC" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00DDAA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tGoldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFA500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tLavaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#CC2200" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B00FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4400AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tPillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1E35"/>
      <stop offset="50%" stop-color="#2A2D3A"/>
      <stop offset="100%" stop-color="#151828"/>
    </linearGradient>
    <linearGradient id="tGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1E35"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CC8400"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66FFE0"/>
      <stop offset="100%" stop-color="#00DDAA"/>
    </linearGradient>
    <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="robeG" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3A2D6B"/>
      <stop offset="100%" stop-color="#1E1445"/>
    </radialGradient>
    <radialGradient id="enemyG" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8B2500"/>
      <stop offset="100%" stop-color="#5C1A00"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#tSky)"/>

  <!-- Nebula atmosphere -->
  <ellipse cx="100" cy="80" rx="120" ry="50" fill="url(#tPurple)" opacity="0.5"/>
  <ellipse cx="320" cy="60" rx="100" ry="40" fill="url(#tGlyphGlow)" opacity="0.15"/>

  <!-- Moon -->
  <circle cx="320" cy="50" r="20" fill="url(#tMoon)"/>
  <circle cx="320" cy="50" r="14" fill="#DDDDF0" opacity="0.5"/>
  <circle cx="324" cy="45" r="3" fill="#BBBBDD" opacity="0.25"/>
  <circle cx="316" cy="52" r="2" fill="#BBBBDD" opacity="0.2"/>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="20" cy="15" r="0.8" opacity="0.7"/><circle cx="60" cy="25" r="0.6" opacity="0.5"/>
    <circle cx="100" cy="12" r="1" opacity="0.8"/><circle cx="140" cy="35" r="0.5" opacity="0.4"/>
    <circle cx="180" cy="18" r="0.8" opacity="0.6"/><circle cx="220" cy="28" r="0.7" opacity="0.5"/>
    <circle cx="260" cy="10" r="0.9" opacity="0.7"/><circle cx="350" cy="22" r="0.6" opacity="0.5"/>
    <circle cx="380" cy="35" r="0.8" opacity="0.6"/><circle cx="45" cy="50" r="0.5" opacity="0.4"/>
    <circle cx="150" cy="55" r="0.7" opacity="0.5"/><circle cx="250" cy="45" r="0.6" opacity="0.4"/>
    <circle cx="30" cy="70" r="0.5" opacity="0.3"/><circle cx="370" cy="65" r="0.6" opacity="0.4"/>
    <circle cx="90" cy="40" r="0.7" opacity="0.5"/><circle cx="200" cy="60" r="0.5" opacity="0.3"/>
    <circle cx="280" cy="72" r="0.6" opacity="0.4"/><circle cx="120" cy="68" r="0.5" opacity="0.3"/>
  </g>

  <!-- Glowing stars -->
  <g filter="url(#tSoft)">
    <circle cx="50" cy="30" r="1.5" fill="#00FFCC" opacity="0.4"/>
    <circle cx="170" cy="40" r="1.2" fill="#FFD700" opacity="0.35"/>
    <circle cx="280" cy="25" r="1.5" fill="#8B00FF" opacity="0.3"/>
  </g>

  <!-- Distant mountain silhouette -->
  <path d="M0,200 C40,180 80,170 120,185 C160,165 200,155 240,170 C280,150 320,145 360,165 C380,160 400,170 400,180 L400,300 L0,300Z" fill="#0F1428" opacity="0.6"/>

  <!-- Left pillar -->
  <g>
    <rect x="40" y="100" width="20" height="150" fill="url(#tPillar)" rx="2"/>
    <rect x="37" y="95" width="26" height="8" fill="#2A2D3A" rx="2"/>
    <rect x="35" y="245" width="30" height="6" fill="#2A2D3A" rx="2"/>
    <polygon points="50,148 53,150 54,154 53,158 50,160 47,158 46,154 47,150" fill="none" stroke="#00FFCC" stroke-width="0.5" opacity="0.5"/>
    <circle cx="50" cy="154" r="2" fill="#00FFCC" opacity="0.3" filter="url(#tGlow)"/>
  </g>

  <!-- Right pillar -->
  <g>
    <rect x="340" y="110" width="20" height="140" fill="url(#tPillar)" rx="2"/>
    <rect x="337" y="105" width="26" height="8" fill="#2A2D3A" rx="2"/>
    <rect x="335" y="245" width="30" height="6" fill="#2A2D3A" rx="2"/>
    <polygon points="350,155 353,157 354,161 353,165 350,167 347,165 346,161 347,157" fill="none" stroke="#00FFCC" stroke-width="0.5" opacity="0.5"/>
    <circle cx="350" cy="161" r="2" fill="#00FFCC" opacity="0.3" filter="url(#tGlow)"/>
  </g>

  <!-- Central arch -->
  <g>
    <rect x="150" y="100" width="16" height="150" fill="url(#tPillar)" rx="2"/>
    <rect x="234" y="100" width="16" height="150" fill="url(#tPillar)" rx="2"/>
    <path d="M150,100 C150,65 170,50 200,44 C230,50 250,65 250,100" fill="none" stroke="#2A2D3A" stroke-width="12"/>
    <path d="M156,100 C156,72 172,58 200,52 C228,58 244,72 244,100" fill="none" stroke="#1A1E35" stroke-width="6"/>
    <!-- Keystone glyph -->
    <circle cx="200" cy="55" r="8" fill="#1A1E35" stroke="#00FFCC" stroke-width="0.8" opacity="0.7"/>
    <polygon points="200,49 203,51 204,55 203,59 200,61 197,59 196,55 197,51" fill="none" stroke="#00FFCC" stroke-width="0.6" opacity="0.6"/>
    <circle cx="200" cy="55" r="2.5" fill="#00FFCC" opacity="0.5" filter="url(#tGlow)"/>
    <ellipse cx="200" cy="55" rx="18" ry="18" fill="url(#tGlyphGlow)" opacity="0.25"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="url(#tGround)"/>

  <!-- Ground texture -->
  <g stroke="#2A2D3A" stroke-width="0.4" opacity="0.3">
    <path d="M0,248 C80,245 160,250 240,247 C320,250 380,246 400,248"/>
    <path d="M0,255 C100,252 200,258 300,254 C380,257 400,253 400,255"/>
  </g>

  <!-- PLAYER CHARACTER (center-left, larger for drama) -->
  <g transform="translate(170, 135) scale(0.6)" filter="url(#tShadow)">
    <!-- Aura -->
    <circle cx="0" cy="0" r="35" fill="url(#tGoldGlow)" opacity="0.3"/>
    <!-- Robe body -->
    <path d="M-18,5 C-20,10 -22,25 -20,40 C-18,48 -15,55 -10,60 L0,63 L10,60 C15,55 18,48 20,40 C22,25 20,10 18,5 C14,0 6,-4 0,-5 C-6,-4 -14,0 -18,5Z" fill="url(#robeG)" stroke="#1A1035" stroke-width="0.4"/>
    <!-- Hood -->
    <path d="M-12,2 C-14,-6 -10,-16 0,-20 C10,-16 14,-6 12,2 C10,4 6,6 0,7 C-6,6 -10,4 -12,2Z" fill="#2A1F55" stroke="#1A1035" stroke-width="0.4"/>
    <!-- Face -->
    <ellipse cx="0" cy="-8" rx="7" ry="6" fill="#EDCC9B"/>
    <!-- Glowing eyes -->
    <circle cx="-3" cy="-9" r="1.2" fill="#00FFCC" filter="url(#tGlow)" opacity="0.9"/>
    <circle cx="3" cy="-9" r="1.2" fill="#00FFCC" filter="url(#tGlow)" opacity="0.9"/>
    <!-- Gold trim -->
    <path d="M-20,40 C-10,46 0,48 10,46 L20,40" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Chest glyph -->
    <polygon points="0,12 3,14 4,18 3,22 0,24 -3,22 -4,18 -3,14" fill="none" stroke="#00FFCC" stroke-width="0.8" opacity="0.7"/>
    <!-- Staff -->
    <rect x="20" y="-25" width="3" height="70" rx="1" fill="#6B4E0A" transform="rotate(10,21,10)"/>
    <polygon points="22,-30 26,-24 24,-18 20,-18 18,-24" fill="#00FFCC" opacity="0.7" filter="url(#tGlow)" transform="rotate(10,22,-24)"/>
    <!-- Orb in hand -->
    <circle cx="-18" cy="20" r="4" fill="url(#tGoldGlow)" opacity="0.6" filter="url(#tGlow)"/>
    <circle cx="-18" cy="20" r="1.5" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- ENEMY (right side, menacing) -->
  <g transform="translate(290, 140) scale(0.5)" filter="url(#tShadow)">
    <!-- Lava glow -->
    <circle cx="0" cy="0" r="35" fill="url(#tLavaGlow)" opacity="0.3"/>
    <!-- Body -->
    <path d="M-20,5 C-24,12 -26,25 -24,38 C-22,46 -18,52 -12,56 L0,60 L12,56 C18,52 22,46 24,38 C26,25 24,12 20,5 C16,0 8,-4 0,-5 C-8,-4 -16,0 -20,5Z" fill="url(#enemyG)" stroke="#1A0A00" stroke-width="0.4"/>
    <!-- Head -->
    <path d="M-12,0 C-14,-8 -10,-18 0,-22 C10,-18 14,-8 12,0 C10,3 6,5 0,6 C-6,5 -10,3 -12,0Z" fill="#5C1A00"/>
    <!-- Horns -->
    <path d="M-8,-14 C-12,-22 -15,-30 -18,-36" stroke="#4A3A2A" stroke-width="2.5" fill="none"/>
    <path d="M8,-14 C12,-22 15,-30 18,-36" stroke="#4A3A2A" stroke-width="2.5" fill="none"/>
    <path d="M-9,-14 C-13,-22 -16,-30" stroke="#FF4500" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M9,-14 C13,-22 16,-30" stroke="#FF4500" stroke-width="0.5" fill="none" opacity="0.6"/>
    <!-- Red eyes -->
    <ellipse cx="-5" cy="-8" rx="3" ry="2" fill="#FF0000" filter="url(#tGlow)" opacity="0.9"/>
    <ellipse cx="5" cy="-8" rx="3" ry="2" fill="#FF0000" filter="url(#tGlow)" opacity="0.9"/>
    <!-- Corrupted glyph -->
    <polygon points="0,15 4,18 5,23 4,28 0,30 -4,28 -5,23 -4,18" fill="none" stroke="#FF4500" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="23" r="2" fill="#FF6600" opacity="0.6"/>
    <!-- Lava cracks -->
    <path d="M-10,10 C-8,20 -10,30 -8,40" stroke="#FF4500" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M10,10 C8,20 10,30 8,40" stroke="#FF4500" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Arms -->
    <path d="M-22,10 C-28,18 -32,28 -30,36" stroke="#5C1A00" stroke-width="4" fill="none"/>
    <path d="M22,10 C28,18 32,28 30,36" stroke="#5C1A00" stroke-width="4" fill="none"/>
    <circle cx="-30" cy="36" r="4" fill="#3A2A1A"/>
    <circle cx="30" cy="36" r="4" fill="#3A2A1A"/>
  </g>

  <!-- Floating glyphs in the scene -->
  <g filter="url(#tGlow)" opacity="0.5">
    <polygon points="120,120 123,122 124,125 123,128 120,130 117,128 116,125 117,122" fill="none" stroke="#00FFCC" stroke-width="0.6"/>
    <circle cx="120" cy="125" r="1.5" fill="#00FFCC" opacity="0.4"/>

    <polygon points="280,100 282,102 283,104 282,106 280,108 278,106 277,104 278,102" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <circle cx="280" cy="104" r="1" fill="#FFD700" opacity="0.4"/>

    <polygon points="90,170 93,172 94,176 93,180 90,182 87,180 86,176 87,172" fill="none" stroke="#8B00FF" stroke-width="0.5"/>
    <circle cx="90" cy="176" r="1.2" fill="#8B00FF" opacity="0.3"/>
  </g>

  <!-- Magic energy beam between player and arch -->
  <g opacity="0.25">
    <path d="M175,148 C185,120 190,80 200,55" stroke="#00FFCC" stroke-width="1.5" fill="none" filter="url(#tSoft)"/>
    <path d="M175,148 C185,125 192,90 200,55" stroke="#FFD700" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Particle effects -->
  <g filter="url(#tSoft)" opacity="0.5">
    <circle cx="160" cy="160" r="1.5" fill="#00FFCC"/>
    <circle cx="185" cy="120" r="1" fill="#FFD700"/>
    <circle cx="210" cy="140" r="1.2" fill="#00FFCC"/>
    <circle cx="140" cy="180" r="0.8" fill="#FFD700"/>
    <circle cx="230" cy="110" r="1" fill="#8B00FF"/>
    <circle cx="310" cy="130" r="1.3" fill="#FF4500"/>
    <circle cx="270" cy="160" r="0.9" fill="#FF6600"/>
    <circle cx="100" cy="140" r="1.1" fill="#00FFCC"/>
  </g>

  <!-- HUD overlay elements (transparent game UI feel) -->
  <g opacity="0.25">
    <!-- HP bar frame -->
    <rect x="10" y="10" width="80" height="8" rx="3" fill="#1A1E35" stroke="#2A2D3A" stroke-width="0.5"/>
    <rect x="11" y="11" width="60" height="6" rx="2" fill="#2ECC71" opacity="0.7"/>
    <!-- Glyph slot indicators -->
    <rect x="10" y="22" width="14" height="14" rx="2" fill="#1A1E35" stroke="#00FFCC" stroke-width="0.4" opacity="0.6"/>
    <rect x="28" y="22" width="14" height="14" rx="2" fill="#1A1E35" stroke="#FFD700" stroke-width="0.4" opacity="0.5"/>
    <rect x="46" y="22" width="14" height="14" rx="2" fill="#1A1E35" stroke="#8B00FF" stroke-width="0.4" opacity="0.5"/>
    <!-- Score -->
    <text x="380" y="18" text-anchor="end" font-size="8" fill="#FFD700" opacity="0.5" font-family="sans-serif">★ 2,450</text>
  </g>

  <!-- Rune inscriptions on pillars -->
  <g font-family="serif" fill="#00FFCC" opacity="0.15" font-size="8">
    <text x="46" y="135">ᚱ</text>
    <text x="46" y="165">ᛟ</text>
    <text x="46" y="195">ᚦ</text>
    <text x="346" y="140">ᛊ</text>
    <text x="346" y="170">ᚠ</text>
    <text x="346" y="200">ᚱ</text>
  </g>

  <!-- Title text area (bottom) -->
  <rect x="0" y="250" width="400" height="50" fill="#0A0E1A" opacity="0.7"/>
  <rect x="0" y="249" width="400" height="1" fill="#00FFCC" opacity="0.3"/>

  <!-- Game title -->
  <text x="200" y="277" text-anchor="middle" font-size="28" font-weight="bold" fill="url(#titleGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" filter="url(#textGlow)">GLYPH LABYRINTH</text>

  <!-- Subtitle -->
  <text x="200" y="293" text-anchor="middle" font-size="11" fill="url(#subtitleGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" opacity="0.8">글리프 래버린스 — 고대 유적의 미궁을 탐험하라</text>

  <!-- Decorative glyph flanking title -->
  <g filter="url(#tGlow)" opacity="0.4">
    <polygon points="50,275 53,277 54,280 53,283 50,285 47,283 46,280 47,277" fill="none" stroke="#00FFCC" stroke-width="0.5"/>
    <polygon points="350,275 353,277 354,280 353,283 350,285 347,283 346,280 347,277" fill="none" stroke="#00FFCC" stroke-width="0.5"/>
  </g>

  <!-- Vignette effect -->
  <rect width="400" height="300" fill="none" stroke="#000000" stroke-width="40" opacity="0.15" rx="5"/>
</svg>