function drawTitle(ctx) {
  const t = G.titleT;
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  // Canvas-drawn animated glyph background (replaces sprite parallax)
  // Layer 1: diagonal grid
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#00FFCC';
  ctx.lineWidth = 1;
  const scrollT = t * 0.0003;
  for (let x = -60 + (scrollT * 60 % 60); x < W + 60; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H * 0.3, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 30, 0); ctx.lineTo(x + 30 - H * 0.3, H); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Floating glyph particles
  for (let i = 0; i < 30; i++) {
    const px = (Math.sin(t * 0.0003 + i * 1.3) * 0.5 + 0.5) * W;
    const py = (Math.cos(t * 0.0002 + i * 0.9) * 0.5 + 0.5) * H;
    const a = 0.1 + Math.sin(t * 0.002 + i) * 0.1;
    ctx.globalAlpha = a;
    const colors = ['#FF4500','#00BFFF','#32CD32','#8B00FF','#FFD700','#00FFCC'];
    drawOctagon(ctx, px, py, 4 + Math.sin(t * 0.003 + i) * 2, colors[i % colors.length]);
  }
  ctx.globalAlpha = 1;
  // Title text
  const titleY = H * 0.3;
  const titleSize = Math.max(28, Math.min(60, W * 0.06));
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.globalAlpha = 0.08 + Math.sin(t * 0.003) * 0.04;
  ctx.beginPath();
  ctx.arc(W/2, titleY, titleSize * 3, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = Math.max(12, titleSize * 0.35) + 'px ' + FONT_MONO;
  ctx.textAlign = 'center';
  ctx.fillText('ANCIENT ARCANA AWAITS', W/2, titleY - titleSize * 0.8);
  ctx.fillStyle = C.PLAYER;
  ctx.font = 'bold ' + titleSize + 'px ' + FONT;
  ctx.fillText('\uAE00\uB9AC\uD504 \uB798\uBC84\uB9B0\uC2A4', W/2, titleY);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + (titleSize * 0.5) + 'px ' + FONT;
  ctx.fillText('GLYPH LABYRINTH', W/2, titleY + titleSize * 0.7);
  // Scanline effect
  ctx.strokeStyle = 'rgba(0,255,204,0.03)';
  ctx.lineWidth = 1;
  for (let sy = titleY - titleSize; sy < titleY + titleSize; sy += 3) {
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }
  // Octagon decorations
  drawOctagon(ctx, W/2 - titleSize * 3, titleY - titleSize * 0.3, 15, '#00FFCC');
  drawOctagon(ctx, W/2 + titleSize * 3, titleY - titleSize * 0.3, 15, '#00FFCC');
  // Prompt
  const promptAlpha = 0.5 + Math.sin(t * 0.004) * 0.5;
  ctx.globalAlpha = promptAlpha;
  ctx.fillStyle = C.TEXT;
  ctx.font = Math.max(14, titleSize * 0.4) + 'px ' + FONT;
  ctx.fillText('SPACE / TAP to Start', W/2, H * 0.6);
  ctx.globalAlpha = 1;
  if (G.bestScore > 0) {
    ctx.fillStyle = C.PLAYER;
    ctx.font = Math.max(12, titleSize * 0.3) + 'px ' + FONT_MONO;
    ctx.fillText('BEST: ' + G.bestScore.toLocaleString(), W/2, H * 0.68);
  }
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = Math.max(10, titleSize * 0.22) + 'px ' + FONT;
  ctx.fillText('WASD/\uBC29\uD5A5\uD0A4: \uC774\uB3D9 | Space: \uB2A5\uB825 | E: \uC0C1\uD638\uC791\uC6A9 | Shift: \uB300\uC2DC', W/2, H * 0.85);
  ctx.fillText('Q: \uAE00\uB9AC\uD504 \uBA54\uB274 | Tab: \uBBF8\uB2C8\uB9F5 | ESC: \uC77C\uC2DC\uC815\uC9C0', W/2, H * 0.89);
  ctx.fillText('M: \uC74C\uC18C\uAC70 \uD1A0\uAE00', W/2, H * 0.93);
  ctx.textAlign = 'left';
  ctx.fillStyle = C.TEXT_MUTED;
  ctx.font = '10px ' + FONT_MONO;
  ctx.fillText('v1.0.0 | Cycle #25', 8, H - 8);
}

function drawDiffSelect(ctx) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  const titleSize = Math.max(20, W * 0.035);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + titleSize + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('\uB09C\uC774\uB3C4 \uC120\uD0DD \u2014 Difficulty', W/2, H * 0.2);
  const options = ['easy', 'normal', 'hard'];
  const labels = ['\uD0D0\uD5D8\uAC00 (Explorer)', '\uBAA8\uD5D8\uAC00 (Adventurer)', '\uC804\uC124 (Legend)'];
  const descs = ['HP x1.5, \uC801 x0.6, \uD78C\uD2B8 \uD45C\uC2DC', 'HP x1.0, \uC801 x1.0, \uAE30\uBCF8', 'HP x0.7, \uC801 x1.4, \uACE0\uB09C\uC774\uB3C4'];
  const colors = [C.HP_GOOD, C.PLAYER, C.HP_DANGER];
  const locked = [false, false, G.bossesDefeated.length < 3];
  const btnW = Math.min(300, W * 0.6);
  const btnH = 60;
  const gap = 20;
  const startY = H * 0.35;
  for (let i = 0; i < 3; i++) {
    const y = startY + i * (btnH + gap);
    const sel = i === G.diffSelectIdx;
    ctx.fillStyle = sel ? 'rgba(0,255,204,0.1)' : 'rgba(30,30,48,0.5)';
    ctx.fillRect(W/2 - btnW/2, y, btnW, btnH);
    ctx.strokeStyle = sel ? C.GLYPH_GLOW : C.TEXT_MUTED;
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(W/2 - btnW/2, y, btnW, btnH);
    ctx.fillStyle = locked[i] ? C.TEXT_MUTED : colors[i];
    ctx.font = 'bold ' + Math.max(16, btnH * 0.35) + 'px ' + FONT;
    ctx.fillText(locked[i] ? '[Locked] ' + labels[i] : labels[i], W/2, y + btnH * 0.4);
    ctx.fillStyle = C.TEXT_DIM;
    ctx.font = Math.max(11, btnH * 0.2) + 'px ' + FONT;
    ctx.fillText(descs[i], W/2, y + btnH * 0.75);
  }
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = Math.max(12, titleSize * 0.5) + 'px ' + FONT;
  ctx.fillText('\u2191\u2193 \uC120\uD0DD / SPACE\xB7ENTER \uD655\uC778 / TAP', W/2, H * 0.88);
  ctx.textAlign = 'left';
}

function drawWorldMap(ctx) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  const titleSize = Math.max(18, W * 0.03);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + titleSize + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('\uC6D4\uB4DC \uB9F5 \u2014 World Map', W/2, H * 0.1);
  const nodeR = Math.min(40, W * 0.05);
  const startX = W * 0.15;
  const endX = W * 0.85;
  const midY = H * 0.45;
  for (let i = 1; i <= 5; i++) {
    const x = startX + (endX - startX) * ((i-1) / 4);
    const y = midY + Math.sin(i * 1.2) * 30;
    const bd = BIOMES[i];
    const defeated = G.bossesDefeated.includes(i);
    const accessible = i === 1 || G.bossesDefeated.includes(i-1);
    const sel = i === G.worldMapIdx;
    if (i < 5) {
      const nx = startX + (endX - startX) * (i / 4);
      const ny = midY + Math.sin((i+1) * 1.2) * 30;
      ctx.strokeStyle = G.bossesDefeated.includes(i) ? C.GLYPH_GLOW : C.TEXT_MUTED;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(nx, ny); ctx.stroke();
    }
    ctx.fillStyle = accessible ? bd.primary : C.TEXT_MUTED;
    ctx.globalAlpha = accessible ? 1 : 0.4;
    ctx.beginPath(); ctx.arc(x, y, nodeR, 0, Math.PI*2); ctx.fill();
    if (sel) {
      ctx.strokeStyle = C.GLYPH_GLOW;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x, y, nodeR + 5, 0, Math.PI*2); ctx.stroke();
    }
    if (defeated) {
      ctx.fillStyle = C.GLYPH_GLOW;
      ctx.font = nodeR + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText('V', x, y + nodeR * 0.35);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = accessible ? C.TEXT : C.TEXT_MUTED;
    ctx.font = Math.max(11, nodeR * 0.35) + 'px ' + FONT;
    ctx.fillText(bd.name, x, y + nodeR + 18);
    ctx.font = Math.max(9, nodeR * 0.25) + 'px ' + FONT;
    ctx.fillText(bd.nameEn, x, y + nodeR + 32);
  }
  if (G.hiddenUnlocked) {
    ctx.fillStyle = '#FF00FF';
    ctx.font = (titleSize * 0.7) + 'px ' + FONT;
    ctx.fillText('* \uC2DC\uAC04\uC758 \uADE0\uC5F4', W/2, H * 0.75);
  }
  const sel = BIOMES[G.worldMapIdx];
  if (sel) {
    ctx.fillStyle = C.UI_BG;
    ctx.fillRect(W * 0.2, H * 0.7, W * 0.6, H * 0.15);
    ctx.fillStyle = sel.primary;
    ctx.font = 'bold ' + Math.max(14, titleSize * 0.7) + 'px ' + FONT;
    ctx.fillText(sel.name + ' \u2014 \uBCF4\uC2A4: ' + sel.bossName, W/2, H * 0.78);
    ctx.fillStyle = C.TEXT_DIM;
    ctx.font = Math.max(11, titleSize * 0.5) + 'px ' + FONT;
    const accessible = G.worldMapIdx === 1 || G.bossesDefeated.includes(G.worldMapIdx-1);
    ctx.fillText(accessible ? 'SPACE / TAP \uC73C\uB85C \uC785\uC7A5' : '\uC774\uC804 \uBC14\uC774\uC634 \uD074\uB9AC\uC5B4 \uD544\uC694', W/2, H * 0.83);
  }
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = Math.max(11, titleSize * 0.5) + 'px ' + FONT;
  ctx.fillText('\u2190\u2192 \uC120\uD0DD / SPACE \uC785\uC7A5 / ESC \uB4A4\uB85C', W/2, H * 0.95);
  ctx.textAlign = 'left';
}

// Pause menu touch button rects (recalculated each frame)
const pauseTouchBtns = { resume: null, toTitle: null };

function drawPause(ctx) {
  ctx.fillStyle = C.OVERLAY;
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(24, W * 0.04);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + sz + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('|| \uC77C\uC2DC\uC815\uC9C0', W/2, H * 0.35);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.5) + 'px ' + FONT;
  ctx.fillText('\uC810\uC218: ' + G.score.toLocaleString(), W/2, H * 0.55);
  const bd = BIOMES[G.currentBiome];
  ctx.fillText('\uBC14\uC774\uC634: ' + (bd ? bd.name : '?') + ' \u2014 \uBC29: ' + (G.currentRoom + 1), W/2, H * 0.6);
  ctx.fillText('\uAE00\uB9AC\uD504: ' + G.glyphsCollected.length + '/5', W/2, H * 0.65);
  ctx.fillText('\uC0AC\uC6B4\uB4DC: ' + (audio.muted ? 'OFF' : 'ON') + ' (M \uD1A0\uAE00)', W/2, H * 0.73);
  // Touch-friendly resume / title buttons
  const btnW = Math.max(160, W * 0.3);
  const btnH = Math.max(CONFIG.TOUCH_MIN_TARGET, 52);
  const gap = 16;
  const bx = (W - btnW) / 2;
  const resumeY = H * 0.78;
  const titleY = resumeY + btnH + gap;
  // Resume button
  ctx.fillStyle = 'rgba(0,255,204,0.15)';
  ctx.fillRect(bx, resumeY, btnW, btnH);
  ctx.strokeStyle = C.GLYPH_GLOW;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, resumeY, btnW, btnH);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + (btnH * 0.38) + 'px ' + FONT;
  ctx.fillText('\u25B6 \uC774\uC5B4\uD558\uAE30 (ESC)', W/2, resumeY + btnH * 0.65);
  pauseTouchBtns.resume = { x: bx, y: resumeY, w: btnW, h: btnH };
  // Title button
  ctx.fillStyle = 'rgba(80,80,112,0.2)';
  ctx.fillRect(bx, titleY, btnW, btnH);
  ctx.strokeStyle = C.TEXT_DIM;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, titleY, btnW, btnH);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (btnH * 0.34) + 'px ' + FONT;
  ctx.fillText('\uD0C0\uC774\uD2C0\uB85C (Q)', W/2, titleY + btnH * 0.65);
  pauseTouchBtns.toTitle = { x: bx, y: titleY, w: btnW, h: btnH };
  ctx.textAlign = 'left';
}

function drawInventory(ctx) {
  ctx.fillStyle = C.OVERLAY;
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(20, W * 0.03);
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = 'bold ' + sz + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('\uAE00\uB9AC\uD504 \uBA54\uB274 \u2014 Glyph Menu', W/2, H * 0.1);
  // Show all glyphs
  const slotSize = Math.min(70, W * 0.1);
  const totalW = GLYPH_TYPES.length * (slotSize + 15);
  const startX = (W - totalW) / 2;
  for (let i = 0; i < GLYPH_TYPES.length; i++) {
    const gt = GLYPH_TYPES[i];
    const owned = G.glyphsCollected.includes(i);
    const x = startX + i * (slotSize + 15);
    const y = H * 0.2;
    ctx.fillStyle = owned ? 'rgba(0,255,204,0.08)' : 'rgba(30,30,48,0.5)';
    ctx.fillRect(x, y, slotSize, slotSize);
    ctx.strokeStyle = owned ? gt.color : C.TEXT_MUTED;
    ctx.lineWidth = owned ? 2 : 1;
    ctx.strokeRect(x, y, slotSize, slotSize);
    if (owned) {
      ctx.fillStyle = gt.color;
      ctx.font = 'bold ' + (slotSize * 0.5) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText(gt.symbol, x + slotSize/2, y + slotSize * 0.6);
      ctx.fillStyle = C.TEXT;
      ctx.font = Math.max(10, slotSize * 0.18) + 'px ' + FONT;
      ctx.fillText(gt.name, x + slotSize/2, y + slotSize + 15);
      ctx.fillStyle = C.TEXT_DIM;
      ctx.fillText(gt.desc, x + slotSize/2, y + slotSize + 30);
    } else {
      ctx.fillStyle = C.TEXT_MUTED;
      ctx.font = (slotSize * 0.3) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText('?', x + slotSize/2, y + slotSize * 0.6);
    }
  }
  // Combo glyph section
  const comboY = H * 0.52;
  ctx.fillStyle = C.PLAYER;
  ctx.font = 'bold ' + Math.max(14, sz * 0.6) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('\uC870\uD569 \uAE00\uB9AC\uD504 \u2014 Combo Glyphs (C \uD0A4\uB85C \uC0AC\uC6A9)', W/2, comboY);
  const comboSlotW = Math.min(180, W * 0.25);
  const comboGap = 15;
  const comboTotalW = COMBO_GLYPHS.length * (comboSlotW + comboGap);
  const comboStartX = (W - comboTotalW) / 2;
  for (let i = 0; i < COMBO_GLYPHS.length; i++) {
    const cg = COMBO_GLYPHS[i];
    const c0 = cg.components[0];
    const c1 = cg.components[1];
    const available = G.glyphsCollected.includes(c0) && G.glyphsCollected.includes(c1);
    const cx = comboStartX + i * (comboSlotW + comboGap);
    const cy = comboY + 15;
    const ch = 50;
    ctx.fillStyle = available ? 'rgba(0,255,204,0.08)' : 'rgba(30,30,48,0.3)';
    ctx.fillRect(cx, cy, comboSlotW, ch);
    ctx.strokeStyle = available ? cg.color : C.TEXT_MUTED;
    ctx.lineWidth = 1;
    ctx.strokeRect(cx, cy, comboSlotW, ch);
    ctx.fillStyle = available ? cg.color : C.TEXT_MUTED;
    ctx.font = 'bold ' + Math.max(11, ch * 0.28) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillText(cg.name, cx + comboSlotW / 2, cy + ch * 0.4);
    ctx.fillStyle = C.TEXT_DIM;
    ctx.font = Math.max(9, ch * 0.2) + 'px ' + FONT;
    ctx.fillText(GLYPH_TYPES[c0].symbol + '+' + GLYPH_TYPES[c1].symbol + ' = ' + cg.desc, cx + comboSlotW / 2, cy + ch * 0.75);
  }
  // Stats
  ctx.fillStyle = C.TEXT;
  ctx.font = Math.max(13, sz * 0.6) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('\uC218\uC9D1: ' + G.glyphsCollected.length + '/5 | \uC810\uC218: ' + G.score.toLocaleString(), W/2, H * 0.78);
  ctx.fillText('\uBCF4\uC2A4 \uACA9\uD30C: ' + G.bossesDefeated.length + '/5 | \uC0AC\uB9DD: ' + G.deathCount, W/2, H * 0.84);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = Math.max(11, sz * 0.45) + 'px ' + FONT;
  ctx.fillText('Q \uB85C \uB2EB\uAE30 / 1~5 \uAE00\uB9AC\uD504 \uC120\uD0DD / C \uC870\uD569 \uC0AC\uC6A9', W/2, H * 0.92);
  ctx.textAlign = 'left';
}

function drawGameOver(ctx) {
  ctx.fillStyle = 'rgba(10,5,20,0.92)';
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(24, W * 0.045);
  // Red vignette
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(200,0,0,0.15)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Shattered glyph decoration
  ctx.globalAlpha = 0.2;
  const shatterT = G.totalTime * 0.001;
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 / 8) * i - Math.PI / 8;
    const drift = 10 + Math.sin(shatterT + i) * 5;
    const px = W/2 + Math.cos(a) * (40 + drift);
    const py = H/2 - 80 + Math.sin(a) * (40 + drift);
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(shatterT * 0.5 + i);
    // Broken octagon piece
    ctx.fillStyle = C.HP_DANGER;
    ctx.beginPath();
    ctx.moveTo(-8, -4);
    ctx.lineTo(8, -6);
    ctx.lineTo(6, 6);
    ctx.lineTo(-6, 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.HP_DANGER;
  ctx.font = 'bold ' + (sz * 1.5) + 'px ' + FONT;
  ctx.fillText('GAME OVER', W/2, H * 0.3);
  ctx.fillStyle = C.PLAYER;
  ctx.font = 'bold ' + sz + 'px ' + FONT_MONO;
  ctx.fillText('\uC810\uC218: ' + G.score.toLocaleString(), W/2, H * 0.42);
  const isNew = G.score > G.bestScore;
  if (isNew) {
    ctx.fillStyle = '#FF8800';
    ctx.font = 'bold ' + (sz * 0.7) + 'px ' + FONT;
    ctx.fillText('* NEW BEST SCORE! *', W/2, H * 0.5);
  }
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.5) + 'px ' + FONT;
  ctx.fillText('\uCD5C\uACE0\uC810: ' + Math.max(G.score, G.bestScore).toLocaleString(), W/2, H * 0.56);
  ctx.fillStyle = C.TEXT;
  ctx.font = (sz * 0.45) + 'px ' + FONT;
  ctx.fillText('\uBC14\uC774\uC634 ' + G.currentBiome + ' | \uAE00\uB9AC\uD504 ' + G.glyphsCollected.length + '/5 | \uBCF4\uC2A4 ' + G.bossesDefeated.length + '/5', W/2, H * 0.64);
  const promptAlpha = 0.5 + Math.sin(G.totalTime * 0.004) * 0.5;
  ctx.globalAlpha = promptAlpha;
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = (sz * 0.55) + 'px ' + FONT;
  ctx.fillText('R / TAP \uC73C\uB85C \uC7AC\uC2DC\uC791', W/2, H * 0.78);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.4) + 'px ' + FONT;
  ctx.fillText('\uC138\uC774\uBE0C \uD3EC\uC778\uD2B8\uC5D0\uC11C \uC774\uC5B4\uD558\uAE30: SPACE', W/2, H * 0.84);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawEnding(ctx) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(22, W * 0.04);
  for (let i = 0; i < 40; i++) {
    const px = (Math.sin(G.endingT * 0.001 + i) * 0.5 + 0.5) * W;
    const py = (Math.cos(G.endingT * 0.0008 + i * 1.3) * 0.5 + 0.5) * H;
    ctx.globalAlpha = 0.5;

  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.fillStyle = C.PLAYER;
  ctx.font = 'bold ' + (sz * 1.5) + 'px ' + FONT;
  ctx.fillText('\uBD09\uC778 \uC644\uB8CC!', W/2, H * 0.25);
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = 'bold ' + sz + 'px ' + FONT;
  ctx.fillText('ARCANA SEALED', W/2, H * 0.33);
  ctx.fillStyle = C.TEXT;
  ctx.font = (sz * 0.55) + 'px ' + FONT;
  ctx.fillText('\uACE0\uB300 \uC720\uC801\uC758 \uBE44\uBC00\uC774 \uB2E4\uC2DC \uC7A0\uB4E4\uC5C8\uC2B5\uB2C8\uB2E4.', W/2, H * 0.45);

  ctx.fillText('\uCD5C\uC885 \uC810\uC218: ' + G.score.toLocaleString(), W/2, H * 0.62);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.45) + 'px ' + FONT;
  ctx.fillText('\uAE00\uB9AC\uD504: ' + G.glyphsCollected.length + '/5 | \uBCF4\uC2A4: ' + G.bossesDefeated.length + '/5 | \uC0AC\uB9DD: ' + G.deathCount, W/2, H * 0.7);

  ctx.globalAlpha = promptAlpha;
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = (sz * 0.5) + 'px ' + FONT;

function drawGlyphGet(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  const gt = GLYPH_TYPES[G.glyphGetType] || GLYPH_TYPES[0];
  const sz = Math.max(20, W * 0.035);
  ctx.textAlign = 'center';
  const pulse = Math.sin(G.glyphGetT * 0.003) * 0.3;
  ctx.globalAlpha = 0.3 + pulse;
  ctx.fillStyle = gt.color;
  ctx.beginPath(); ctx.arc(W/2, H * 0.35, 80 + pulse * 30, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  drawOctagon(ctx, W/2, H * 0.35, 40, gt.color);
  // Glyph symbol in center of octagon
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 28px ' + FONT;
  ctx.fillText(gt.symbol, W/2, H * 0.35 + 10);
  ctx.fillStyle = C.PLAYER;
  ctx.font = 'bold ' + (sz * 1.2) + 'px ' + FONT;
  ctx.fillText('\uAE00\uB9AC\uD504 \uD68D\uB4DD!', W/2, H * 0.55);
  ctx.fillStyle = gt.color;
  ctx.font = 'bold ' + sz + 'px ' + FONT;
  ctx.fillText(gt.symbol + ' ' + gt.name + ' \uAE00\uB9AC\uD504', W/2, H * 0.63);
  ctx.fillStyle = C.TEXT;
  ctx.font = (sz * 0.6) + 'px ' + FONT;
  ctx.fillText(gt.desc, W/2, H * 0.72);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.45) + 'px ' + FONT;
  ctx.fillText('SPACE / TAP \uC73C\uB85C \uACC4\uC18D', W/2, H * 0.85);
  ctx.textAlign = 'left';
}

function drawBossIntro(ctx) {
  if (!boss) return;
  const bd = BIOMES[boss.biome];
  const progress = 1 - (boss.introT / 2000);
  ctx.fillStyle = 'rgba(0,0,0,' + (0.5 * progress) + ')';
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(24, W * 0.045);
  ctx.textAlign = 'center';
  ctx.globalAlpha = Math.min(1, progress * 2);
  ctx.fillStyle = bd.primary;
  ctx.font = 'bold ' + (sz * 1.3) + 'px ' + FONT;
  ctx.fillText(bd.bossName, W/2, H * 0.25);
  ctx.fillStyle = C.TEXT_DIM;
  ctx.font = (sz * 0.5) + 'px ' + FONT;
  ctx.fillText(bd.bossNameEn, W/2, H * 0.32);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawLoading(ctx, progress) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(16, W * 0.025);
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.font = sz + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText('Loading...', W/2, H/2 - 20);
  const barW = Math.min(200, W * 0.4);
  ctx.fillStyle = C.TEXT_MUTED;
  ctx.fillRect(W/2 - barW/2, H/2, barW, 8);
  ctx.fillStyle = C.GLYPH_GLOW;
  ctx.fillRect(W/2 - barW/2, H/2, barW * progress, 8);
  ctx.save();
  ctx.translate(W/2, H/2 + 40);
  ctx.rotate(G.totalTime * 0.003);
  drawOctagon(ctx, 0, 0, 12, C.GLYPH_GLOW);
  ctx.restore();
  ctx.textAlign = 'left';
}

function drawConfirmModal(ctx) {
  ctx.fillStyle = C.OVERLAY;
  ctx.fillRect(0, 0, W, H);
  const mw = Math.min(350, W * 0.7);
  const mh = 160;
  const mx = (W - mw) / 2;
  const my = (H - mh) / 2;
  ctx.fillStyle = '#1A1A2E';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = C.GLYPH_GLOW;
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, mw, mh);
  ctx.fillStyle = C.TEXT;
  ctx.font = 'bold ' + Math.max(14, mw * 0.05) + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillText(G.modalText, W/2, my + 45);
  const btnW = 100; const btnH = 40;
  for (let i = 0; i < 2; i++) {
    const bx = W/2 + (i === 0 ? -btnW - 10 : 10);
    const by = my + mh - btnH - 20;
    const sel = G.modalIdx === i;
    ctx.fillStyle = sel ? 'rgba(0,255,204,0.2)' : 'rgba(50,50,80,0.5)';
    ctx.fillRect(bx, by, btnW, btnH);
    ctx.strokeStyle = sel ? C.GLYPH_GLOW : C.TEXT_MUTED;
    ctx.strokeRect(bx, by, btnW, btnH);
    ctx.fillStyle = C.TEXT;
    ctx.font = 'bold ' + Math.max(13, btnH * 0.35) + 'px ' + FONT;
    ctx.fillText(i === 0 ? '\uC608 (Y)' : '\uC544\uB2C8\uC624 (N)', bx + btnW/2, by + btnH * 0.65);
  }
  ctx.textAlign = 'left';
}

// --- Touch Controls ---
let touchJoyCenter = null;
const touchButtons = [];

function setupTouchButtons() {
  touchButtons.length = 0;
  const pad = 12;
  const btnSize = Math.max(CONFIG.TOUCH_MIN_TARGET, 56);
  touchButtons.push({
    x: W - btnSize - pad, y: H * 0.5, w: btnSize, h: btnSize,
    action: 'attack', label: 'ATK'
  });
  touchButtons.push({
    x: pad, y: H - btnSize * 2 - pad * 3, w: btnSize, h: btnSize,
    action: 'interact', label: 'E'
  });
  touchButtons.push({
    x: W - btnSize - pad, y: pad + 25, w: btnSize, h: btnSize,
    action: 'pause', label: '||'
  });
  touchButtons.push({
    x: W - btnSize - pad, y: H * 0.5 + btnSize + pad, w: btnSize, h: btnSize,
    action: 'dash', label: 'DSH'
  });
  // Glyph slot touch buttons — top center, 56×56px each (§3.3, F11)
  const glyphBtnSize = Math.max(CONFIG.TOUCH_MIN_TARGET, 56);
  const glyphGap = 6;
  const totalGlyphW = GLYPH_TYPES.length * (glyphBtnSize + glyphGap);
  const glyphStartX = (W - totalGlyphW) / 2;
  const glyphY = pad + 25 + btnSize + pad; // below pause button row
  for (let i = 0; i < GLYPH_TYPES.length; i++) {
    touchButtons.push({
      x: glyphStartX + i * (glyphBtnSize + glyphGap),
      y: glyphY,
      w: glyphBtnSize, h: glyphBtnSize,
      action: 'glyph_' + i,
      label: GLYPH_TYPES[i].symbol,
      glyphIdx: i
    });
  }
}
setupTouchButtons();
window.addEventListener('resize', () => { resize(); setupTouchButtons(); });

function drawTouchControls(ctx) {
  if (!('ontouchstart' in window)) return;
  const alpha = 0.25;
  ctx.globalAlpha = alpha;
  if (touchJoyCenter) {
    ctx.strokeStyle = C.TEXT;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touchJoyCenter.x, touchJoyCenter.y, 60, 0, Math.PI*2);
    ctx.stroke();
    if (input.touchActive) {
      const jx = touchJoyCenter.x + Math.cos(input.touchJoyAngle) * Math.min(input.touchJoyDist, 50);
      const jy = touchJoyCenter.y + Math.sin(input.touchJoyAngle) * Math.min(input.touchJoyDist, 50);
      ctx.fillStyle = C.GLYPH_GLOW;
      ctx.beginPath();
      ctx.arc(jx, jy, 20, 0, Math.PI*2);
      ctx.fill();
    }
  }
  for (const btn of touchButtons) {
    const isGlyph = btn.action.startsWith('glyph_');
    if (isGlyph) {
      // Glyph slot button — show color-coded, highlight active
      const gi = btn.glyphIdx;
      const gt = GLYPH_TYPES[gi];
      const owned = G.glyphsCollected && G.glyphsCollected.includes(gi);
      const active = gi === P.activeGlyph;
      ctx.globalAlpha = active ? 0.6 : 0.3;
      ctx.fillStyle = active ? 'rgba(0,255,204,0.25)' : 'rgba(30,30,60,0.5)';
      ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
      ctx.strokeStyle = active ? C.GLYPH_GLOW : (owned ? gt.color : C.TEXT_MUTED);
      ctx.lineWidth = active ? 2.5 : 1;
      ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
      ctx.fillStyle = owned ? gt.color : C.TEXT_MUTED;
      ctx.font = 'bold ' + (btn.w * 0.38) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText(owned ? gt.symbol : '?', btn.x + btn.w/2, btn.y + btn.h * 0.6);
      ctx.fillStyle = C.TEXT_DIM;
      ctx.font = (btn.w * 0.22) + 'px ' + FONT_MONO;
      ctx.fillText('' + (gi + 1), btn.x + btn.w/2, btn.y + btn.h * 0.88);
    } else {
      ctx.fillStyle = 'rgba(30,30,60,0.5)';
      ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
      ctx.strokeStyle = C.TEXT_DIM;
      ctx.lineWidth = 1;
      ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
      ctx.fillStyle = C.TEXT;
      ctx.font = (btn.w * 0.3) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h * 0.65);
    }
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function handleTouchStart(e) {
  e.preventDefault();
  audio.init();
  for (const touch of e.changedTouches) {
    const x = touch.clientX;
    const y = touch.clientY;
    let hitBtn = false;
    for (const btn of touchButtons) {
      const hitX = Math.max(btn.x - 4, 0);
      const hitY = Math.max(btn.y - 4, 0);
      const hitW = btn.w + 8;
      const hitH = btn.h + 8;
      if (x >= hitX && x <= hitX + hitW && y >= hitY && y <= hitY + hitH) {
        if (btn.action === 'attack') { input.justAction = true; input.action = true; input.justTouchAction = true; }
        if (btn.action === 'interact') { input.justInteract = true; input.justE = true; }
        if (btn.action === 'pause') { input.justPause = true; }
        if (btn.action === 'dash') { input.dash = true; input.touchAction = true; }
        // Glyph slot touch — switch active glyph
        if (btn.action.startsWith('glyph_')) { P.activeGlyph = btn.glyphIdx; }
        hitBtn = true;
        break;
      }
    }
    if (!hitBtn && x < W * 0.4) {
      touchJoyCenter = { x: x, y: y, id: touch.identifier };
      input.touchActive = true;
    }
    if (!hitBtn) {
      if (G.state === S.TITLE) { input.justSpace = true; }
      else if (G.state === S.DIFF_SELECT) {
        const btnH = 60; const gap = 20; const startY = H * 0.35;
        for (let i = 0; i < 3; i++) {
          const by = startY + i * (btnH + gap);
          if (y >= by && y <= by + btnH) { G.diffSelectIdx = i; input.justSpace = true; break; }
        }
      }
      else if (G.state === S.PAUSE) {
        // Pause screen touch buttons — resume or go to title
        const rb = pauseTouchBtns.resume;
        const tb = pauseTouchBtns.toTitle;
        if (rb && x >= rb.x && x <= rb.x + rb.w && y >= rb.y && y <= rb.y + rb.h) {
          input.justPause = true; // triggers resume
        } else if (tb && x >= tb.x && x <= tb.x + tb.w && y >= tb.y && y <= tb.y + tb.h) {
          input.justMenu = true; // triggers title return
        }
      }
      else if (G.state === S.GAMEOVER) { input.justR = true; }
      else if (G.state === S.ENDING) { input.justR = true; }
      else if (G.state === S.GLYPH_GET) { input.justSpace = true; }
      else if (G.state === S.CUTSCENE) { input.justSpace = true; }
      else if (G.state === S.WORLD_MAP) {
        const startX = W * 0.15; const endX = W * 0.85;
        for (let i = 1; i <= 5; i++) {
          const nx = startX + (endX - startX) * ((i-1) / 4);
          if (Math.abs(x - nx) < 50) { G.worldMapIdx = i; input.justSpace = true; break; }
        }
      }
      if (x > W * 0.4 && [S.EXPLORE, S.COMBAT, S.BOSS_FIGHT].includes(G.state)) {
        P.aimX = x; P.aimY = y;
        input.justAction = true;
        input.action = true;
      }
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchJoyCenter && touch.identifier === touchJoyCenter.id) {
      const dx = touch.clientX - touchJoyCenter.x;
      const dy = touch.clientY - touchJoyCenter.y;
      input.touchJoyAngle = Math.atan2(dy, dx);
      input.touchJoyDist = Math.hypot(dx, dy);
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchJoyCenter && touch.identifier === touchJoyCenter.id) {
      input.touchActive = false;
      input.touchJoyDist = 0;
      touchJoyCenter = null;
    }
  }
  input.dash = false;
  input.touchAction = false;
  input.action = false;
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });

// --- Keyboard Input ---
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  keys[e.code] = true;
  audio.init();
  if (['KeyA','ArrowLeft'].includes(e.code)) input.left = true;
  if (['KeyD','ArrowRight'].includes(e.code)) input.right = true;
  if (['KeyW','ArrowUp'].includes(e.code)) input.up = true;
  if (['KeyS','ArrowDown'].includes(e.code)) input.down = true;
  if (e.code === 'Space') { input.justSpace = true; input.justAction = true; input.action = true; }
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') input.dash = true;
  if (e.code === 'KeyE') { input.justE = true; input.justInteract = true; }
  if (e.code === 'KeyQ') input.justMenu = true;
  if (e.code === 'Escape') input.justPause = true;
  if (e.code === 'Tab') { e.preventDefault(); input.justTab = true; }
  if (e.code === 'KeyR') input.justR = true;
  if (e.code === 'KeyM') audio.toggle();
  if (e.code === 'KeyC') input.justC = true;
  if (e.code === 'Digit1') input.slot1 = true;
  if (e.code === 'Digit2') input.slot2 = true;
  if (e.code === 'Digit3') input.slot3 = true;
  if (e.code === 'Digit4') input.slot4 = true;
  if (e.code === 'Digit5') input.slot5 = true;
  if (G.state === S.DIFF_SELECT) {
    if (['ArrowUp','KeyW'].includes(e.code)) G.diffSelectIdx = Math.max(0, G.diffSelectIdx - 1);
    if (['ArrowDown','KeyS'].includes(e.code)) G.diffSelectIdx = Math.min(2, G.diffSelectIdx + 1);
  }
  if (G.state === S.WORLD_MAP) {
    if (['ArrowLeft','KeyA'].includes(e.code)) G.worldMapIdx = Math.max(1, G.worldMapIdx - 1);
    if (['ArrowRight','KeyD'].includes(e.code)) G.worldMapIdx = Math.min(5, G.worldMapIdx + 1);
  }
  if (G.state === S.CONFIRM_MODAL) {
    if (['ArrowLeft','KeyA'].includes(e.code)) G.modalIdx = 0;
    if (['ArrowRight','KeyD'].includes(e.code)) G.modalIdx = 1;
    if (e.code === 'KeyY') { if (G.modalYes) G.modalYes(); }
    if (e.code === 'KeyN') { if (G.modalNo) G.modalNo(); }
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (['KeyA','ArrowLeft'].includes(e.code)) input.left = false;
  if (['KeyD','ArrowRight'].includes(e.code)) input.right = false;
  if (['KeyW','ArrowUp'].includes(e.code)) input.up = false;
  if (['KeyS','ArrowDown'].includes(e.code)) input.down = false;
  if (e.code === 'Space') input.action = false;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') input.dash = false;
  if (e.code === 'Digit1') input.slot1 = false;
  if (e.code === 'Digit2') input.slot2 = false;
  if (e.code === 'Digit3') input.slot3 = false;
  if (e.code === 'Digit4') input.slot4 = false;
  if (e.code === 'Digit5') input.slot5 = false;
});

canvas.addEventListener('mousemove', (e) => {
  P.aimX = e.clientX;
  P.aimY = e.clientY;
});
canvas.addEventListener('mousedown', (e) => {
  audio.init();
  if (e.button === 0) { input.justAction = true; input.action = true; input.mouseDown = true; P.aimX = e.clientX; P.aimY = e.clientY; }
  if (e.button === 2) { input.dash = true; }
  if (G.state === S.TITLE) input.justSpace = true;
  if (G.state === S.GAMEOVER) input.justR = true;
  if (G.state === S.ENDING) input.justR = true;
  if (G.state === S.GLYPH_GET) input.justSpace = true;
  if (G.state === S.CUTSCENE) input.justSpace = true;
});
canvas.addEventListener('mouseup', (e) => {
  if (e.button === 0) { input.action = false; input.mouseDown = false; }
  if (e.button === 2) { input.dash = false; }
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// --- Game State Handlers ---

function startNewGame() {
  const options = ['easy', 'normal', 'hard'];
  const diff = options[G.diffSelectIdx];
  if (diff === 'hard' && G.bossesDefeated.length < 3) return;
  G.difficulty = diff;
  G.seed = Date.now();
  G.score = 0;
  G.combo = 0;
  G.comboTimer = 0;
  G.deathCount = 0;
  G.ddaDeaths = {};
  G.glyphsCollected = [];
  G.abilitiesUnlocked = [];
  G.recordsFound = [];
  G.secretsFound = [];
  G.bossesDefeated = [];
  G.discoveredRooms = new Set();
  G.currentBiome = 1;
  G.currentRoom = 0;
  G.hiddenUnlocked = false;
  G.endingT = 0;
  boss = null;
  bossArenaObjects = [];
  projectiles.length = 0;
  particles.length = 0;
  scorePopups.length = 0;
  resetPlayer();
  generateWorld(G.seed);
  G.discoveredRooms.add('1-0');
  G.glyphsCollected.push(0);
  audio.startBGM(1);
  beginTransition(S.EXPLORE, 400);
}

function triggerGameOver() {
  if (G.state === S.GAMEOVER) return;
  G.deathCount++;
  const roomKey = G.currentBiome + '-' + G.currentRoom;
  G.ddaDeaths[roomKey] = (G.ddaDeaths[roomKey] || 0) + 1;
  shakeCamera(25, 600);
  if (G.score > G.bestScore) G.bestScore = G.score;
  saveBestScore();
  setState(S.GAMEOVER);
  audio.stopBGM();
}

function restartToTitle() {
  boss = null;
  bossArenaObjects = [];
  projectiles.length = 0;
  particles.length = 0;
  scorePopups.length = 0;
  tw.clearImmediate();
  G.transitioning = false;
  G.transAlpha = 0;
  resetGlyphEffects();
  setState(S.TITLE);
}

function continueFromSave() {
  if (!G.saveData) {
    restartToTitle();
    return;
  }
  P.hp = G.saveData.hp;
  P.x = W / 2;
  P.y = H / 2;
  G.currentBiome = G.saveData.biome;
  G.currentRoom = G.saveData.room;
  G.score = G.saveData.score;
  projectiles.length = 0;
  particles.length = 0;
  boss = null;
  bossArenaObjects = [];
  resetGlyphEffects();
  const room = curRoom();
  if (room) {
    room.enemies.forEach(e => { e.alive = true; e.hp = e.maxHp; });
  }
  audio.startBGM(G.currentBiome);
  beginTransition(S.EXPLORE, 300);
}

function saveGame() {
  G.saveData = {
    hp: P.hp,
    biome: G.currentBiome,
    room: G.currentRoom,
    score: G.score,
    glyphs: [].concat(G.glyphsCollected),
    bossesDefeated: [].concat(G.bossesDefeated),
  };
  try {
    localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(G.saveData));
  } catch(e) {}
}

function loadSave() {
  try {
    const data = localStorage.getItem(CONFIG.SAVE_KEY);
    if (data) G.saveData = JSON.parse(data);
  } catch(e) {}
}

function saveBestScore() {
  try {
    localStorage.setItem(CONFIG.SCORE_KEY, JSON.stringify({
      best: G.bestScore,
      difficulty: G.difficulty,
    }));
  } catch(e) {}
}

function loadBestScore() {
  try {
    const data = localStorage.getItem(CONFIG.SCORE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      G.bestScore = parsed.best || 0;
    }
  } catch(e) {}
}

function checkWinCondition() {
  if (G.bossesDefeated.length >= 5 && G.state === S.EXPLORE && !G.transitioning) {
    G.endingT = 0;
    if (G.score > G.bestScore) G.bestScore = G.score;
    saveBestScore();
    G.score += SCORE.CLEAR_BONUS;
    beginTransition(S.ENDING, 500);
  }
}

// Track which combo to use (cycles through available combos with C key)
let comboSelectIdx = 0;

function processInput() {
  if (G.state === S.TITLE && input.justSpace) {
    beginTransition(S.DIFF_SELECT, 300);
  }
  if (G.state === S.DIFF_SELECT && input.justSpace) {
    startNewGame();
  }
  if (G.state === S.WORLD_MAP && input.justSpace) {
    const accessible = G.worldMapIdx === 1 || G.bossesDefeated.includes(G.worldMapIdx - 1);
    if (accessible) {
      G.currentBiome = G.worldMapIdx;
      G.currentRoom = 0;
      G.discoveredRooms.add(G.currentBiome + '-0');
      resetPlayer();
      const room = curRoom();
      if (room) room.enemies.forEach(e => { e.alive = true; e.hp = e.maxHp; });
      audio.startBGM(G.currentBiome);
      beginTransition(S.EXPLORE, 300);
    }
  }
  if (G.state === S.WORLD_MAP && input.justPause) {
    beginTransition(S.TITLE, 300);
  }
  if ([S.EXPLORE, S.COMBAT, S.PUZZLE].includes(G.state)) {
    if (input.justAction) playerAttack();
    if (input.justC) {
      // Cycle and use combo glyph
      let found = false;
      for (let attempt = 0; attempt < COMBO_GLYPHS.length; attempt++) {
        const idx = (comboSelectIdx + attempt) % COMBO_GLYPHS.length;
        const cg = COMBO_GLYPHS[idx];
        if (G.glyphsCollected.includes(cg.components[0]) && G.glyphsCollected.includes(cg.components[1])) {
          comboGlyphAttack(idx);
          comboSelectIdx = (idx + 1) % COMBO_GLYPHS.length;
          found = true;
          break;
        }
      }
    }
    if (input.justPause) {
      G.pausePrev = G.state;
      setState(S.PAUSE);
    }
    if (input.justMenu) {
      G.inventoryPrev = G.state;
      setState(S.INVENTORY);
    }
    checkInteract();
  }
  if (G.state === S.BOSS_FIGHT) {
    if (input.justAction) playerAttack();
    if (input.justC) {
      for (let attempt = 0; attempt < COMBO_GLYPHS.length; attempt++) {
        const idx = (comboSelectIdx + attempt) % COMBO_GLYPHS.length;
        const cg = COMBO_GLYPHS[idx];
        if (G.glyphsCollected.includes(cg.components[0]) && G.glyphsCollected.includes(cg.components[1])) {
          comboGlyphAttack(idx);
          comboSelectIdx = (idx + 1) % COMBO_GLYPHS.length;
          break;
        }
      }
    }
    if (input.justPause) {
      G.pausePrev = G.state;
      setState(S.PAUSE);
    }
  }
  if (G.state === S.PAUSE) {
    if (input.justPause) setState(G.pausePrev);
    if (input.justMenu) {
      beginTransition(S.TITLE, 300, () => { audio.stopBGM(); });
    }
  }
  if (G.state === S.INVENTORY) {
    if (input.justMenu || input.justPause) setState(G.inventoryPrev);
  }
  if (G.state === S.GAMEOVER) {
    if (input.justR) restartToTitle();
    if (input.justSpace) continueFromSave();
  }
  if (G.state === S.ENDING) {
    if (input.justR || input.justSpace) restartToTitle();
  }
  if (G.state === S.GLYPH_GET && input.justSpace) {
    beginTransition(S.WORLD_MAP, 300);
  }
  if (G.state === S.CUTSCENE && input.justSpace) {
    beginTransition(S.EXPLORE, 300);
  }
  if (G.state === S.CONFIRM_MODAL && input.justSpace) {
    if (G.modalIdx === 0 && G.modalYes) G.modalYes();
    else if (G.modalNo) G.modalNo();
  }
}

function clearJustFlags() {
  input.justAction = false;
  input.justInteract = false;
  input.justPause = false;
  input.justMenu = false;
  input.justTab = false;
  input.justR = false;
  input.justSpace = false;
  input.justE = false;
  input.justTouchAction = false;
  input.justC = false;
}

// --- Main Update ---
function update(dt) {
  G.totalTime += dt;
  G.titleT += dt;
  if (sys('input')) processInput();
  if (sys('tw')) tw.update(dt);
  if (sys('phys')) {
    updatePlayer(dt);
    updateProjectiles(dt);
  }
  if (sys('enemy')) updateEnemies(dt);
  if (sys('boss')) updateBoss(dt);
  if (sys('puzzle')) updateTraps(dt);
  if (sys('camera')) updateCamera(dt);
  if (sys('particle')) updateParticles(dt);
  if (sys('save')) checkSavePoints();
  if (G.state === S.EXPLORE && !G.transitioning) checkDoors();
  if (G.state === S.EXPLORE) {
    const room = curRoom();
    if (room && room.enemies.some(e => e.alive)) {
      const nearEnemy = room.enemies.find(e => e.alive && Math.hypot(P.x - e.x, P.y - e.y) < 200);
      if (nearEnemy) setState(S.COMBAT);
    }
  }
  if (G.state === S.GLYPH_GET) {
    G.glyphGetT -= dt;
  }
  if (G.state === S.ENDING) {
    G.endingT += dt;
  }
  if (G.state === S.EXPLORE) checkWinCondition();
  if (P.atkT > 0) { P.atkT -= dt; if (P.atkT <= 0) P.attacking = false; }
  clearJustFlags();
}

// --- Main Render ---
function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  if (cam.zoom !== 1) {
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-W/2, -H/2);
  }
  switch (G.state) {
    case S.BOOT:
      drawLoading(ctx, 0.5);
      break;
    case S.TITLE:
      drawTitle(ctx);
      break;
    case S.DIFF_SELECT:
      drawDiffSelect(ctx);
      break;
    case S.WORLD_MAP:
      drawWorldMap(ctx);
      break;
    case S.ROOM_ENTER:
    case S.EXPLORE:
    case S.PUZZLE:
    case S.COMBAT:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawTraps(ctx, curRoom());
      drawSavePoint(ctx, curRoom() ? curRoom().savePoint : null);
      if (sys('enemy')) {
        const room = curRoom();
        if (room) room.enemies.forEach(e => {
          if (e.alive) drawEnemy(ctx, e.x, e.y, 20, e.type, e.frame, e.hitFlash, e.hp, e.maxHp);
        });
      }
      drawPlayer(ctx, P.x, P.y, CONFIG.PLAYER_SIZE, P.dir, P.frame, P.iframes, P.hitFlash, P.dashing, P.activeGlyph, G.glyphsCollected);
      drawProjectiles(ctx);
      drawParticles(ctx);
      drawGlyphEffectVisuals(ctx);
      drawScorePopups(ctx);
      if (sys('hud')) drawHUD(ctx, W, H, P.hp, P.maxHp, G.glyphsCollected, P.activeGlyph, G.score, G.currentBiome, G.combo);
      if (sys('minimap')) drawMinimap(ctx, W, H);
      drawTouchControls(ctx);
      break;
    case S.BOSS_INTRO:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawBossArenaObjects(ctx);
      drawBoss(ctx, boss);
      drawPlayer(ctx, P.x, P.y, CONFIG.PLAYER_SIZE, P.dir, P.frame, P.iframes, P.hitFlash, P.dashing, P.activeGlyph, G.glyphsCollected);
      drawBossIntro(ctx);
      drawParticles(ctx);
      break;
    case S.BOSS_FIGHT:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawBossArenaObjects(ctx);
      drawBoss(ctx, boss);
      drawPlayer(ctx, P.x, P.y, CONFIG.PLAYER_SIZE, P.dir, P.frame, P.iframes, P.hitFlash, P.dashing, P.activeGlyph, G.glyphsCollected);
      drawProjectiles(ctx);
      drawParticles(ctx);
      drawGlyphEffectVisuals(ctx);
      drawScorePopups(ctx);
      if (sys('hud')) drawHUD(ctx, W, H, P.hp, P.maxHp, G.glyphsCollected, P.activeGlyph, G.score, G.currentBiome, G.combo);
      drawTouchControls(ctx);
      break;
    case S.BOSS_DEFEAT:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawBossArenaObjects(ctx);
      drawBoss(ctx, boss);
      drawParticles(ctx);
      drawScorePopups(ctx);
      break;
    case S.GLYPH_GET:
      drawGlyphGet(ctx);
      drawParticles(ctx);
      break;
    case S.CUTSCENE:
      drawRoomBG(ctx, G.currentBiome);
      ctx.fillStyle = C.OVERLAY;
      ctx.fillRect(0, H * 0.7, W, H * 0.3);
      ctx.fillStyle = C.TEXT;
      ctx.font = Math.max(14, W*0.02) + 'px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText(G.cutsceneText, W/2, H * 0.82);
      ctx.fillStyle = C.TEXT_DIM;
      ctx.fillText('SPACE / TAP \uC73C\uB85C \uACC4\uC18D', W/2, H * 0.92);
      ctx.textAlign = 'left';
      break;
    case S.PAUSE:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawPlayer(ctx, P.x, P.y, CONFIG.PLAYER_SIZE, P.dir, P.frame, P.iframes, P.hitFlash, P.dashing, P.activeGlyph, G.glyphsCollected);
      drawPause(ctx);
      break;
    case S.INVENTORY:
      drawRoomBG(ctx, G.currentBiome);
      drawRoomTiles(ctx, curRoom());
      drawInventory(ctx);
      break;
    case S.GAMEOVER:
      drawGameOver(ctx);
      drawParticles(ctx);
      break;
    case S.ENDING:
      drawEnding(ctx);
      drawParticles(ctx);
      break;
    case S.CONFIRM_MODAL:
      drawConfirmModal(ctx);
      break;
  }
  if (G.transAlpha > 0.01) {
    ctx.fillStyle = 'rgba(10,14,26,' + G.transAlpha + ')';
    ctx.fillRect(0, 0, W, H);
  }
  if (cam.zoom !== 1) ctx.restore();
}

// --- Game Loop (rAF based, no setTimeout) ---
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// --- Initialization ---
function init() {
  G.state = S.BOOT;
  resize();
  loadBestScore();
  loadSave();
  // Go straight to title (no asset preloading needed)
  G.state = S.TITLE;
  G.titleT = 0;
  requestAnimationFrame(gameLoop);
}

// Start!
init();
</script>
