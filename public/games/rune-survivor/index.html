// === INPUT HANDLING ===
function handleKeyDown(e) {
  if (isTransitioning) return;
  keys[e.code] = true;
  inputMode = 'keyboard';
  // Init audio on first interaction
  if (!soundMgr) { soundMgr = new SoundManager(); }
  soundMgr.init();

  if (gameState === STATES.TITLE) {
    if (e.code === 'Space' || e.code === 'Enter') {
      initGame();
      enterState(STATES.PLAYING);
    }
  } else if (gameState === STATES.PLAYING) {
    if (e.code === 'Escape' || e.code === 'KeyP') {
      beginTransition(STATES.PAUSED, { immediate: true });
    }
  } else if (gameState === STATES.LEVEL_UP) {
    if (e.code === 'Digit1' || e.code === 'Numpad1') selectUpgradeCard(0);
    else if (e.code === 'Digit2' || e.code === 'Numpad2') selectUpgradeCard(1);
    else if (e.code === 'Digit3' || e.code === 'Numpad3') selectUpgradeCard(2);
  } else if (gameState === STATES.PAUSED) {
    if (e.code === 'Escape' || e.code === 'KeyP') {
      beginTransition(STATES.PLAYING, { immediate: true });
    }
  } else if (gameState === STATES.GAMEOVER || gameState === STATES.RESULT) {
    if (e.code === 'KeyR' || e.code === 'Space') {
      initGame();
      enterState(STATES.TITLE);
    }
  }
}
function handleKeyUp(e) { keys[e.code] = false; }

function handleMouseMove(e) {
  if (inputMode !== 'touch') inputMode = 'mouse';
}

// Select an upgrade card
function selectUpgradeCard(idx) {
  if (idx < 0 || idx >= upgradeCards.length || !isLevelingUp) return;
  const card = upgradeCards[idx];
  applyUpgrade(player, weapons, card);
}

// Handle click for UI buttons
function handleClick(e) {
  if (isTransitioning) return;
  if (!soundMgr) { soundMgr = new SoundManager(); }
  soundMgr.init();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left);
  const my = (e.clientY - rect.top);

  if (gameState === STATES.TITLE) {
    initGame();
    enterState(STATES.PLAYING);
  } else if (gameState === STATES.LEVEL_UP) {
    // Check card clicks
    const cardW = 150, cardH = 200, gap = 20;
    const startX = W/2 - (cardW * 3 + gap * 2) / 2;
    for (let i = 0; i < upgradeCards.length; i++) {
      const cx = startX + (cardW + gap) * i;
      const cy = (upgradeCards[i].animY || (H/2 - 100));
      if (mx >= cx && mx <= cx + cardW && my >= cy && my <= cy + cardH) {
        selectUpgradeCard(i);
        break;
      }
    }
  } else if (gameState === STATES.PLAYING) {
    // Pause button
    const pbSize = touchSafe(36, 36);
    const pbX = W - 16 - pbSize.w, pbY = 16 + 34;
    if (mx >= pbX && mx <= pbX + pbSize.w && my >= pbY && my <= pbY + pbSize.h) {
      beginTransition(STATES.PAUSED, { immediate: true });
    }
  } else if (gameState === STATES.PAUSED) {
    const bw = 200, bh = 48;
    // Resume button
    if (mx >= W/2 - bw/2 && mx <= W/2 + bw/2 && my >= H/2 + 40 && my <= H/2 + 40 + bh) {
      beginTransition(STATES.PLAYING, { immediate: true });
    }
    // Title button
    if (mx >= W/2 - bw/2 && mx <= W/2 + bw/2 && my >= H/2 + 100 && my <= H/2 + 100 + bh) {
      initGame();
      enterState(STATES.TITLE);
    }
  } else if (gameState === STATES.GAMEOVER) {
    const bw = touchSafe(200, 48);
    if (mx >= W/2 - bw.w/2 && mx <= W/2 + bw.w/2 && my >= H/2 + 85 && my <= H/2 + 85 + bw.h) {
      initGame();
      enterState(STATES.TITLE);
    }
  } else if (gameState === STATES.RESULT) {
    const bw = touchSafe(200, 48);
    if (mx >= W/2 - bw.w/2 && mx <= W/2 + bw.w/2 && my >= H/2 + 155 && my <= H/2 + 155 + bw.h) {
      initGame();
      enterState(STATES.TITLE);
    }
  }
}

// === TOUCH HANDLING (§3.2) ===
let touchId = null;
function handleTouchStart(e) {
  e.preventDefault();
  if (isTransitioning) return;
  inputMode = 'touch';
  if (!soundMgr) { soundMgr = new SoundManager(); }
  soundMgr.init();

  const rect = canvas.getBoundingClientRect();
  for (const touch of e.changedTouches) {
    const tx = touch.clientX - rect.left;
    const ty = touch.clientY - rect.top;

    if (gameState === STATES.TITLE) {
      initGame(); enterState(STATES.PLAYING);
      return;
    }
    if (gameState === STATES.GAMEOVER || gameState === STATES.RESULT) {
      initGame(); enterState(STATES.TITLE);
      return;
    }
    if (gameState === STATES.LEVEL_UP) {
      // Card selection
      const cardW = 150, cardH = 200, gap = 20;
      const startX = W/2 - (cardW * 3 + gap * 2) / 2;
      for (let i = 0; i < upgradeCards.length; i++) {
        const cx = startX + (cardW + gap) * i;
        const cy = (upgradeCards[i].animY || (H/2 - 100));
        if (tx >= cx && tx <= cx + cardW && ty >= cy && ty <= cy + cardH) {
          selectUpgradeCard(i); return;
        }
      }
      return;
    }
    if (gameState === STATES.PAUSED) {
      const bw = 200, bh = 48;
      if (tx >= W/2 - bw/2 && tx <= W/2 + bw/2 && ty >= H/2 + 40 && ty <= H/2 + 40 + bh) {
        beginTransition(STATES.PLAYING, { immediate: true }); return;
      }
      if (tx >= W/2 - bw/2 && tx <= W/2 + bw/2 && ty >= H/2 + 100 && ty <= H/2 + 100 + bh) {
        initGame(); enterState(STATES.TITLE); return;
      }
      return;
    }
    if (gameState === STATES.PLAYING) {
      // Pause button check
      const pbSize = touchSafe(36, 36);
      const pbX = W - 16 - pbSize.w, pbY = 16 + 34;
      if (tx >= pbX && tx <= pbX + pbSize.w && ty >= pbY && ty <= pbY + pbSize.h) {
        beginTransition(STATES.PAUSED, { immediate: true }); return;
      }
      // Joystick activation
      if (touchId === null) {
        touchId = touch.identifier;
        joystick.active = true;
        joystick.baseX = tx;
        joystick.baseY = ty;
        joystick.tipX = tx;
        joystick.tipY = ty;
        joystick.dx = 0; joystick.dy = 0;
      }
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === touchId) {
      const rect = canvas.getBoundingClientRect();
      const tx = touch.clientX - rect.left;
      const ty = touch.clientY - rect.top;
      const dx = tx - joystick.baseX;
      const dy = ty - joystick.baseY;
      const dist2 = Math.sqrt(dx*dx + dy*dy);
      const maxDist = CONFIG.JOYSTICK_OUTER;
      if (dist2 > maxDist) {
        joystick.tipX = joystick.baseX + (dx/dist2) * maxDist;
        joystick.tipY = joystick.baseY + (dy/dist2) * maxDist;
      } else {
        joystick.tipX = tx;
        joystick.tipY = ty;
      }
      if (dist2 > CONFIG.JOYSTICK_DEADZONE) {
        joystick.dx = (joystick.tipX - joystick.baseX) / maxDist;
        joystick.dy = (joystick.tipY - joystick.baseY) / maxDist;
      } else {
        joystick.dx = 0; joystick.dy = 0;
      }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === touchId) {
      touchId = null;
      joystick.active = false;
      joystick.dx = 0; joystick.dy = 0;
    }
  }
}

// === GAME LOOP (§5.1, F12) ===
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    update(dt);
    render();
  } catch (e) {
    console.error('GameLoop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// === LOADING SCREEN ===
function drawLoadingScreen(progress) {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 20px Orbitron, sans-serif';
  ctx.fillStyle = COL.TEXT;
  ctx.textAlign = 'center';
  ctx.fillText('LOADING...', W/2, H/2 - 10);
  // Progress bar
  const bw = 200, bh = 6;
  ctx.fillStyle = '#333';
  ctx.fillRect(W/2 - bw/2, H/2 + 10, bw, bh);
  ctx.fillStyle = COL.PLAYER;
  ctx.fillRect(W/2 - bw/2, H/2 + 10, bw * progress, bh);
}

// === INITIALIZATION ===
async function main() {
  // Step 1: Get canvas and context
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Step 2: Show loading screen (no external assets — 100% Canvas drawing)
  drawLoadingScreen(1);

  // Step 3: Build background cache
  buildBgCache();

  // Step 4: Register event listeners
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  window.addEventListener('mousemove', handleMouseMove);
  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  window.addEventListener('resize', resizeCanvas);

  // Step 5: Enter title state and start game loop
  gameState = STATES.TITLE;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Start the game
main();
</script>
