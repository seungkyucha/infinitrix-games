<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#16213e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="75" x2="400" y2="75"/><line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="225" x2="400" y2="225"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
  </g>
  <!-- Central glow -->
  <ellipse cx="200" cy="140" rx="120" ry="120" fill="url(#glow)"/>
  <!-- Rune circle -->
  <circle cx="200" cy="140" r="55" fill="none" stroke="#6c3cf7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="140" r="42" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- Rune marks on circle -->
  <g stroke="#6c3cf7" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="85" x2="200" y2="95"/><line x1="200" y1="185" x2="200" y2="195"/>
    <line x1="145" y1="140" x2="155" y2="140"/><line x1="245" y1="140" x2="255" y2="140"/>
    <line x1="161" y1="101" x2="168" y2="108"/><line x1="232" y1="172" x2="239" y2="179"/>
    <line x1="239" y1="101" x2="232" y2="108"/><line x1="168" y1="172" x2="161" y2="179"/>
  </g>
  <!-- Player character (mage) -->
  <g transform="translate(200,140)">
    <!-- Robe -->
    <polygon points="0,-18 -14,18 14,18" fill="#4a00e0"/>
    <!-- Head -->
    <circle cx="0" cy="-14" r="9" fill="#00d4ff"/>
    <!-- Glow ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- Enemies scattered -->
  <g opacity="0.8">
    <!-- Slime -->
    <ellipse cx="80" cy="120" rx="10" ry="8" fill="#39ff14"/>
    <circle cx="76" cy="117" r="2" fill="#000"/><circle cx="84" cy="117" r="2" fill="#000"/>
    <!-- Bat -->
    <circle cx="320" cy="100" r="5" fill="#8b00ff"/>
    <polygon points="302,92 320,100 310,102" fill="#8b00ff"/>
    <polygon points="338,92 320,100 330,102" fill="#8b00ff"/>
    <!-- Golem -->
    <rect x="60" cy="200" y="195" width="20" height="20" fill="#ff6600" rx="2"/>
    <!-- Skeleton -->
    <circle cx="330" cy="200" r="8" fill="#cccccc"/>
    <rect x="326" y="208" width="8" height="14" fill="#cccccc" rx="1"/>
  </g>
  <!-- Projectiles -->
  <g opacity="0.9">
    <circle cx="230" cy="120" r="3" fill="#00d4ff"/>
    <circle cx="250" cy="110" r="2.5" fill="#00d4ff"/>
    <circle cx="170" cy="130" r="3" fill="#66ccff"/>
    <line x1="200" y1="128" x2="280" y2="95" stroke="#ffff00" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- XP gems -->
  <g fill="#00ff88" opacity="0.7">
    <polygon points="140,170 145,175 140,180 135,175"/>
    <polygon points="260,160 265,165 260,170 255,165"/>
    <polygon points="110,190 115,195 110,200 105,195"/>
  </g>
  <!-- Title text -->
  <text x="200" y="252" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="28" fill="#e0e0f0" letter-spacing="3">RUNE SURVIVOR</text>
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="11" fill="#8080a0">SURVIVE THE ARCANE HORDE</text>
  <!-- Subtle scanlines -->
  <g opacity="0.03">
    <rect y="0" width="400" height="1" fill="#fff"/><rect y="3" width="400" height="1" fill="#fff"/>
    <rect y="6" width="400" height="1" fill="#fff"/><rect y="9" width="400" height="1" fill="#fff"/>
    <rect y="12" width="400" height="1" fill="#fff"/><rect y="15" width="400" height="1" fill="#fff"/>
    <rect y="18" width="400" height="1" fill="#fff"/><rect y="21" width="400" height="1" fill="#fff"/>
    <rect y="24" width="400" height="1" fill="#fff"/><rect y="27" width="400" height="1" fill="#fff"/>
    <rect y="30" width="400" height="1" fill="#fff"/><rect y="33" width="400" height="1" fill="#fff"/>
    <rect y="36" width="400" height="1" fill="#fff"/><rect y="39" width="400" height="1" fill="#fff"/>
    <rect y="42" width="400" height="1" fill="#fff"/><rect y="45" width="400" height="1" fill="#fff"/>
  </g>
</svg>