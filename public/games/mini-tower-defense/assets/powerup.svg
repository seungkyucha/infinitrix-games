<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="40%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="shieldTrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="shieldShine" cx="35%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shieldAura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#42A5F5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sAura">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 오라 -->
  <circle cx="24" cy="26" r="22" fill="url(#shieldAura)" filter="url(#sAura)"/>
  <!-- 방패 본체 -->
  <path d="M24,4 L40,12 L40,24 Q40,38 24,44 Q8,38 8,24 L8,12 Z" fill="url(#shieldGrad)" stroke="#0D47A1" stroke-width="1" filter="url(#sGlow)"/>
  <!-- 금색 테두리 -->
  <path d="M24,6 L38,13 L38,24 Q38,36 24,42 Q10,36 10,24 L10,13 Z" fill="none" stroke="url(#shieldTrim)" stroke-width="2"/>
  <!-- 중앙 십자 장식 -->
  <g filter="url(#sGlow)">
    <rect x="22" y="14" width="4" height="18" rx="1" fill="#FFD700"/>
    <rect x="15" y="21" width="18" height="4" rx="1" fill="#FFD700"/>
  </g>
  <!-- 상단 보석 -->
  <g filter="url(#sGlow)">
    <circle cx="24" cy="12" r="3" fill="#E040FB"/>
    <circle cx="23" cy="11" r="1" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <!-- 광택 오버레이 -->
  <path d="M24,4 L40,12 L40,24 Q40,38 24,44 Q8,38 8,24 L8,12 Z" fill="url(#shieldShine)"/>
  <!-- 반짝임 파티클 -->
  <g opacity="0.6" filter="url(#sGlow)">
    <circle cx="14" cy="16" r="1.5" fill="#FFFFFF"/>
    <circle cx="34" cy="18" r="1" fill="#FFFFFF"/>
    <circle cx="18" cy="34" r="1.2" fill="#FFFFFF"/>
    <circle cx="30" cy="32" r="0.8" fill="#FFFFFF"/>
  </g>
</svg>