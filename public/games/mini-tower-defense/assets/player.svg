<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="towerBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C9E5F"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="towerRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="towerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#81C784" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <!-- B4 fix: SVG 필터(feGaussianBlur) 제거 — 기획서 §0-1 준수 -->
  </defs>
  <!-- 기반 글로우 -->
  <ellipse cx="32" cy="56" rx="18" ry="5" fill="url(#towerGlow)"/>
  <!-- 타워 기단 -->
  <g>
    <rect x="18" y="28" width="28" height="28" rx="3" fill="url(#towerBase)" stroke="#2E7D32" stroke-width="1"/>
    <!-- 벽 디테일 - 벽돌 라인 -->
    <line x1="20" y1="36" x2="44" y2="36" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="44" x2="44" y2="44" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="32" y1="28" x2="32" y2="36" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="26" y1="36" x2="26" y2="44" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="38" y1="36" x2="38" y2="44" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="32" y1="44" x2="32" y2="56" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- 흉벽 (상단 톱니) -->
  <g fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5">
    <rect x="18" y="26" width="5" height="5" rx="0.5"/>
    <rect x="25.5" y="26" width="5" height="5" rx="0.5"/>
    <rect x="33.5" y="26" width="5" height="5" rx="0.5"/>
    <rect x="41" y="26" width="5" height="5" rx="0.5"/>
  </g>
  <!-- 지붕 -->
  <polygon points="32,6 14,28 50,28" fill="url(#towerRoof)" stroke="#B8860B" stroke-width="0.8"/>
  <!-- 지붕 하이라이트 -->
  <polygon points="32,8 20,26 32,20" fill="#FFE082" opacity="0.3"/>
  <!-- 활 -->
  <g transform="translate(44, 32)">
    <path d="M0,-10 Q8,-5 0,0 Q8,5 0,10" fill="none" stroke="url(#bowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#A1887F" stroke-width="0.8"/>
  </g>
  <!-- 화살 (발사 준비) -->
  <g>
    <line x1="44" y1="32" x2="56" y2="26" stroke="#FFD700" stroke-width="1.5"/>
    <polygon points="56,24 58,26 56,28" fill="#FFD700"/>
  </g>
  <!-- 창문 -->
  <rect x="28" y="36" width="8" height="6" rx="1" fill="#1B2631" opacity="0.7"/>
  <rect x="30" y="38" width="4" height="2" rx="0.5" fill="#FFD700" opacity="0.4"/>
  <!-- 입구 -->
  <path d="M28,56 L28,48 Q32,45 36,48 L36,56 Z" fill="#1B2631" opacity="0.8"/>
</svg>