<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="cGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 글로우 배경 -->
  <circle cx="16" cy="16" r="15" fill="url(#coinGlow)"/>
  <!-- 코인 외곽 -->
  <circle cx="16" cy="16" r="13" fill="url(#coinEdge)" filter="url(#cGlow)"/>
  <!-- 코인 본체 -->
  <circle cx="16" cy="16" r="11" fill="url(#coinGrad)"/>
  <!-- 내부 테두리 -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#FF8F00" stroke-width="0.8" opacity="0.5"/>
  <!-- G 문자 (골드) -->
  <g filter="url(#cGlow)">
    <path d="M19,12 C17,10 13,10 11.5,12 C10,14 10,18 11.5,20 C13,22 17,22 19,20 L19,16.5 L15.5,16.5" fill="none" stroke="#B8860B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- 광택 오버레이 -->
  <circle cx="16" cy="16" r="11" fill="url(#coinShine)"/>
  <!-- 엣지 하이라이트 -->
  <path d="M8,10 Q10,6 16,5 Q12,7 10,11" fill="#FFFFFF" opacity="0.3"/>
</svg>