<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goblinBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AED581"/>
      <stop offset="100%" stop-color="#689F38"/>
    </linearGradient>
    <radialGradient id="goblinInner" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#C5E1A5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orcBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="knightArmor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="50%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="runnerBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <!-- B4 fix: SVG 필터(feGaussianBlur) 제거 — 기획서 §0-1 준수 -->
  </defs>
  <!-- 위협 오라 -->
  <circle cx="32" cy="34" r="26" fill="none" stroke="#FF1744" stroke-width="0.5" opacity="0.3"/>
  <!-- 고블린 몸통 -->
  <g>
    <ellipse cx="32" cy="38" rx="14" ry="16" fill="url(#goblinBody)"/>
    <ellipse cx="32" cy="36" rx="12" ry="14" fill="url(#goblinInner)"/>
    <!-- 뾰족 귀 왼쪽 -->
    <path d="M18,28 L10,18 L22,26 Z" fill="#8BC34A" stroke="#689F38" stroke-width="0.8"/>
    <!-- 뾰족 귀 오른쪽 -->
    <path d="M46,28 L54,18 L42,26 Z" fill="#8BC34A" stroke="#689F38" stroke-width="0.8"/>
    <!-- 눈 왼쪽 -->
    <ellipse cx="26" cy="32" rx="4" ry="5" fill="#FFFFFF"/>
    <ellipse cx="27" cy="33" rx="2" ry="2.5" fill="#1B2631"/>
    <circle cx="27.5" cy="32.5" r="0.8" fill="#FFFFFF"/>
    <!-- 눈 오른쪽 -->
    <ellipse cx="38" cy="32" rx="4" ry="5" fill="#FFFFFF"/>
    <ellipse cx="37" cy="33" rx="2" ry="2.5" fill="#1B2631"/>
    <circle cx="37.5" cy="32.5" r="0.8" fill="#FFFFFF"/>
    <!-- 입 - 사악한 미소 -->
    <path d="M24,42 Q28,48 32,44 Q36,48 40,42" fill="none" stroke="#33691E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 이빨 -->
    <polygon points="28,43 30,46 32,43" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="34,43 36,46 38,43" fill="#FFFFFF" opacity="0.9"/>
    <!-- 코 -->
    <circle cx="32" cy="37" r="2" fill="#689F38"/>
  </g>
  <!-- 팔 왼쪽 -->
  <path d="M18,38 Q10,42 12,50" fill="none" stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
  <!-- 팔 오른쪽 + 단검 -->
  <path d="M46,38 Q54,42 50,48" fill="none" stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
  <!-- 단검 -->
  <g>
    <line x1="50" y1="48" x2="58" y2="40" stroke="#B0BEC5" stroke-width="2"/>
    <polygon points="58,38 60,40 58,42" fill="#CFD8DC"/>
    <rect x="48" y="46" width="4" height="3" rx="1" fill="#5D4037"/>
  </g>
  <!-- 발 -->
  <ellipse cx="26" cy="54" rx="5" ry="3" fill="#689F38"/>
  <ellipse cx="38" cy="54" rx="5" ry="3" fill="#689F38"/>
</svg>