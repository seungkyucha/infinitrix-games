<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="tree1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="tree2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <linearGradient id="fenceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5D4037" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="bushGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2E7D32" stop-opacity="0"/>
    </radialGradient>
    <filter id="treeShadow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 나무 1 (좌측 큰 나무) -->
  <g opacity="0.85" transform="translate(60, 280)">
    <rect x="-6" y="40" width="12" height="80" fill="url(#trunkGrad)" rx="2"/>
    <ellipse cx="0" cy="20" rx="40" ry="45" fill="url(#tree1Grad)"/>
    <ellipse cx="-15" cy="10" rx="28" ry="35" fill="#33691E" opacity="0.5"/>
    <ellipse cx="12" cy="30" rx="25" ry="30" fill="#1B5E20" opacity="0.4"/>
    <!-- 잎 디테일 -->
    <circle cx="-20" cy="5" r="8" fill="#43A047" opacity="0.4"/>
    <circle cx="15" cy="15" r="7" fill="#43A047" opacity="0.35"/>
    <circle cx="-5" cy="-10" r="6" fill="#66BB6A" opacity="0.3"/>
  </g>
  <!-- 나무 2 (좌측 작은 나무) -->
  <g opacity="0.75" transform="translate(140, 320)">
    <rect x="-4" y="25" width="8" height="55" fill="url(#trunkGrad)" rx="1.5"/>
    <ellipse cx="0" cy="10" rx="25" ry="30" fill="url(#tree2Grad)"/>
    <ellipse cx="-8" cy="5" rx="18" ry="22" fill="#2E7D32" opacity="0.5"/>
    <circle cx="10" cy="8" r="6" fill="#43A047" opacity="0.3"/>
  </g>
  <!-- 나무 3 (우측 큰 나무) -->
  <g opacity="0.8" transform="translate(700, 260)">
    <rect x="-7" y="45" width="14" height="90" fill="url(#trunkGrad)" rx="2"/>
    <ellipse cx="0" cy="20" rx="45" ry="50" fill="url(#tree1Grad)"/>
    <ellipse cx="18" cy="10" rx="30" ry="38" fill="#33691E" opacity="0.5"/>
    <ellipse cx="-10" cy="35" rx="28" ry="32" fill="#1B5E20" opacity="0.4"/>
    <circle cx="-25" cy="10" r="9" fill="#43A047" opacity="0.35"/>
    <circle cx="20" cy="25" r="8" fill="#43A047" opacity="0.3"/>
  </g>
  <!-- 나무 4 (우측 중간 나무) -->
  <g opacity="0.7" transform="translate(620, 310)">
    <rect x="-4" y="20" width="8" height="50" fill="url(#trunkGrad)" rx="1.5"/>
    <ellipse cx="0" cy="5" rx="22" ry="28" fill="url(#tree2Grad)"/>
    <circle cx="-8" cy="0" r="6" fill="#43A047" opacity="0.3"/>
  </g>
  <!-- 덤불 (하단 좌측) -->
  <g opacity="0.6" transform="translate(200, 460)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#2E7D32"/>
    <ellipse cx="-10" cy="-5" rx="20" ry="14" fill="#388E3C" opacity="0.6"/>
    <ellipse cx="15" cy="-3" rx="18" ry="12" fill="#33691E" opacity="0.5"/>
    <circle cx="0" cy="-8" r="5" fill="#4CAF50" opacity="0.3"/>
  </g>
  <!-- 덤불 (하단 우측) -->
  <g opacity="0.6" transform="translate(550, 470)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#2E7D32"/>
    <ellipse cx="8" cy="-4" rx="18" ry="12" fill="#388E3C" opacity="0.5"/>
    <circle cx="-5" cy="-6" r="4" fill="#4CAF50" opacity="0.3"/>
  </g>
  <!-- 울타리 (중간) -->
  <g opacity="0.55" fill="url(#fenceGrad)">
    <rect x="250" y="420" width="4" height="30" rx="1"/>
    <rect x="275" y="420" width="4" height="30" rx="1"/>
    <rect x="300" y="420" width="4" height="30" rx="1"/>
    <rect x="325" y="420" width="4" height="30" rx="1"/>
    <rect x="350" y="420" width="4" height="30" rx="1"/>
    <!-- 가로대 -->
    <rect x="250" y="428" width="104" height="3" rx="0.5"/>
    <rect x="250" y="440" width="104" height="3" rx="0.5"/>
  </g>
  <!-- 길 (근경에서 원경으로) -->
  <path d="M380,600 Q370,520 360,480 Q350,440 320,400 Q290,360 260,340" fill="url(#pathGrad)" stroke="#795548" stroke-width="1" opacity="0.4"/>
  <path d="M420,600 Q415,520 405,480 Q395,440 370,400 Q340,360 310,340" fill="url(#pathGrad)" opacity="0.3"/>
  <!-- 바위 -->
  <g opacity="0.5">
    <ellipse cx="450" cy="450" rx="20" ry="12" fill="#546E7A"/>
    <ellipse cx="450" cy="448" rx="18" ry="10" fill="#78909C" opacity="0.5"/>
    <ellipse cx="470" cy="455" rx="10" ry="7" fill="#607D8B"/>
  </g>
  <!-- 작은 바위 -->
  <g opacity="0.4">
    <ellipse cx="160" cy="470" rx="8" ry="5" fill="#546E7A"/>
    <ellipse cx="680" cy="465" rx="12" ry="7" fill="#607D8B"/>
  </g>
  <!-- 꽃 장식 -->
  <g opacity="0.5">
    <circle cx="230" cy="480" r="3" fill="#FFEB3B"/>
    <circle cx="235" cy="476" r="2.5" fill="#FFC107"/>
    <circle cx="500" cy="490" r="2.5" fill="#FF7043"/>
    <circle cx="505" cy="486" r="2" fill="#FF5722"/>
    <circle cx="380" cy="475" r="2" fill="#E040FB" opacity="0.4"/>
    <circle cx="650" cy="485" r="3" fill="#FFEB3B" opacity="0.4"/>
  </g>
  <!-- 떨어진 나뭇잎 -->
  <g opacity="0.3">
    <ellipse cx="300" cy="500" rx="4" ry="2" fill="#8BC34A" transform="rotate(30 300 500)"/>
    <ellipse cx="480" cy="510" rx="3" ry="1.5" fill="#689F38" transform="rotate(-20 480 510)"/>
    <ellipse cx="600" cy="495" rx="3.5" ry="1.8" fill="#7CB342" transform="rotate(45 600 495)"/>
  </g>
</svg>