<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 글로우 배경 -->
  <circle cx="16" cy="17" r="14" fill="url(#heartGlow)"/>
  <!-- 하트 본체 -->
  <path d="M16,28 C10,22 2,17 2,10 C2,5.5 5.5,2 10,2 C12.5,2 14.5,3.5 16,5.5 C17.5,3.5 19.5,2 22,2 C26.5,2 30,5.5 30,10 C30,17 22,22 16,28 Z" fill="url(#heartGrad)" filter="url(#hGlow)"/>
  <!-- 하이라이트 -->
  <path d="M10,8 C10,5.5 12,4 14,5 C13,3.5 10.5,3.5 9,5 C7.5,6.5 8,9 10,8 Z" fill="#FFFFFF" opacity="0.5"/>
  <!-- 광택 오버레이 -->
  <path d="M16,28 C10,22 2,17 2,10 C2,5.5 5.5,2 10,2 C12.5,2 14.5,3.5 16,5.5 C17.5,3.5 19.5,2 22,2 C26.5,2 30,5.5 30,10 C30,17 22,22 16,28 Z" fill="url(#heartShine)"/>
</svg>