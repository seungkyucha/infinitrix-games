<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFEB3B" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF9800" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#FF5722" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF5722" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#E65100" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="80%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 충격파 링 -->
  <circle cx="48" cy="48" r="42" fill="url(#shockwave)" filter="url(#hitBlur)"/>
  <!-- 외곽 폭발 -->
  <circle cx="48" cy="48" r="35" fill="url(#hitOuter)" filter="url(#hitBlur)"/>
  <!-- 폭발 플레어 (빛 방사) -->
  <g filter="url(#hitGlow)" opacity="0.7">
    <path d="M48,48 L48,8 L50,48 Z" fill="#FFD700"/>
    <path d="M48,48 L48,88 L46,48 Z" fill="#FFD700"/>
    <path d="M48,48 L8,48 L48,46 Z" fill="#FFD700"/>
    <path d="M48,48 L88,48 L48,50 Z" fill="#FFD700"/>
    <path d="M48,48 L20,20 L48,46 Z" fill="#FFC107" opacity="0.6"/>
    <path d="M48,48 L76,20 L50,48 Z" fill="#FFC107" opacity="0.6"/>
    <path d="M48,48 L20,76 L46,48 Z" fill="#FFC107" opacity="0.6"/>
    <path d="M48,48 L76,76 L48,50 Z" fill="#FFC107" opacity="0.6"/>
  </g>
  <!-- 핵심 폭발 -->
  <circle cx="48" cy="48" r="18" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 중심 코어 (백색) -->
  <circle cx="48" cy="48" r="6" fill="#FFFFFF" opacity="0.9" filter="url(#hitGlow)"/>
  <!-- 스파크 파편 -->
  <g filter="url(#sparkGlow)">
    <circle cx="30" cy="28" r="2.5" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="68" cy="30" r="2" fill="#FF9800" opacity="0.7"/>
    <circle cx="25" cy="55" r="1.8" fill="#FFEB3B" opacity="0.6"/>
    <circle cx="72" cy="60" r="2.2" fill="#FF9800" opacity="0.7"/>
    <circle cx="38" cy="72" r="1.5" fill="#FFC107" opacity="0.5"/>
    <circle cx="62" cy="70" r="1.8" fill="#FFC107" opacity="0.6"/>
    <circle cx="35" cy="22" r="1.2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="60" cy="25" r="1" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <!-- 연기 파편 -->
  <g opacity="0.25">
    <circle cx="32" cy="35" r="5" fill="#795548"/>
    <circle cx="65" cy="40" r="4" fill="#795548"/>
    <circle cx="40" cy="65" r="4.5" fill="#795548"/>
    <circle cx="58" cy="62" r="3.5" fill="#795548"/>
  </g>
</svg>