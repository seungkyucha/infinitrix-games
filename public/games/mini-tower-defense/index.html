/*
 * ═══════════════════════════════════════════════════
 *  미니 타워 디펜스 (Mini Tower Defense)

 *  상태 × 시스템 업데이트 매트릭스:
 *  ┌─────────────────┬────────┬───────┬───────┬──────┬─────┬──────┬───────┬────────┬─────┐
 *  │ State           │ Tween  │ Wave  │ Enemy │Tower │Proj │Ptcl  │ Input │ Render │ SFX │
 *  ├─────────────────┼────────┼───────┼───────┼──────┼─────┼──────┼───────┼────────┼─────┤
 *  │ LOADING         │   ✗    │   ✗   │   ✗   │  ✗   │  ✗  │  ✗   │  ✗    │loading │  ✗  │
 *  │ TITLE           │   ✓    │   ✗   │   ✗   │  ✗   │  ✗  │  ✗   │start  │title   │  ✗  │
 *  │ WAVE_PREP       │   ✓    │   ✗   │   ✗   │  ✗   │  ✗  │  ✓   │배치   │game+UI │  ✗  │
 *  │ PLAYING         │   ✓    │   ✓   │   ✓   │  ✓   │  ✓  │  ✓   │배치   │game    │  ✓  │
 *  │ PAUSE           │   ✓    │   ✗   │   ✗   │  ✗   │  ✗  │  ✗   │resume │game+ov │  ✗  │
 *  │ CONFIRM_MODAL   │   ✓    │   ✗   │   ✗   │  ✗   │  ✗  │  ✗   │yes/no │game+mod│  ✗  │
 *  │ GAMEOVER        │   ✓    │   ✗   │   ✗   │  ✗   │  ✗  │  ✓   │restart│game+res│  ✗  │
 *  └─────────────────┴────────┴───────┴───────┴──────┴─────┴──────┴───────┴────────┴─────┘
 *  핵심: TweenManager는 **모든 상태에서 항상 업데이트**
 */

// ═══════════════════ CONSTANTS ═══════════════════
const STATES = { LOADING:0, TITLE:1, WAVE_PREP:2, PLAYING:3, PAUSE:4, CONFIRM_MODAL:5, GAMEOVER:6 };
const COLS = 8, ROWS = 6, TILE = 64;
const GAME_W = COLS * TILE, GAME_H = ROWS * TILE;
const HUD_H = 40, BAR_H = 48;
const CANVAS_W = GAME_W, CANVAS_H = GAME_H + HUD_H + BAR_H;
const GRID_Y = HUD_H; // 그리드 시작 y 오프셋
const MAX_WAVES = 20, INIT_LIVES = 20, INIT_GOLD = 100;

// 색상 팔레트

// 타워 정의 [비용, 공격력, 사거리, 공격속도ms, 색상]
const TOWER_DEFS = {

  ],
  mage: [

    { cost:40, atk:22, range:90,  speed:900,  color:'#9575CD', upCost:40, slow:0.4, slowDur:1.5, aoe:30 },
    { cost:65, atk:35, range:100, speed:800,  color:'#B39DDB', upCost:65, slow:0.5, slowDur:1.5, aoe:30 },
  ],
  cannon: [
    { cost:75, atk:25, range:85,  speed:1500, color:'#EF5350', upCost:0,  aoe:35 },
    { cost:55, atk:45, range:95,  speed:1300, color:'#E57373', upCost:55, aoe:40 },
    { cost:80, atk:70, range:105, speed:1100, color:'#EF9A9A', upCost:80, aoe:50 },

};

// 적 정의
const ENEMY_TYPES = {
  goblin:  { hp:20, spd:40, reward:5,  score:50,  color:'#8BC34A', armor:0, slowRes:0 },
  orc:     { hp:60, spd:30, reward:12, score:120, color:'#FF9800', armor:0, slowRes:0 },
  dark:    { hp:120,spd:25, reward:20, score:200, color:'#546E7A', armor:3, slowRes:0 },

};

// 웨이브 적 구성 비율
const WAVE_COMP = [
  {goblin:1},                                     // 1-3
  {goblin:1}, {goblin:1},
  {goblin:.7,orc:.3}, {goblin:.7,orc:.3},         // 4-5
  {goblin:.4,orc:.3,runner:.3},                    // 6-7
  {goblin:.4,orc:.3,runner:.3},
  {goblin:.2,orc:.3,dark:.2,runner:.3},            // 8-10
  {goblin:.2,orc:.3,dark:.2,runner:.3},
  {goblin:.2,orc:.3,dark:.2,runner:.3},
  {goblin:.1,orc:.3,dark:.3,runner:.3},            // 11-15
  {goblin:.1,orc:.3,dark:.3,runner:.3},
  {goblin:.1,orc:.3,dark:.3,runner:.3},
  {goblin:.1,orc:.3,dark:.3,runner:.3},
  {goblin:.1,orc:.3,dark:.3,runner:.3},
  {orc:.25,dark:.4,runner:.35},                    // 16-19
  {orc:.25,dark:.4,runner:.35},
  {orc:.25,dark:.4,runner:.35},
  {orc:.25,dark:.4,runner:.35},
  {dark:.5,runner:.5},                             // 20 final
];

// S자 경로 웨이포인트 (타일 중심 좌표, 그리드 기준)
const PATH_WAYPOINTS = [
  {c:-1,r:1},{c:0,r:1},{c:1,r:1},{c:2,r:1},{c:3,r:1},{c:4,r:1},{c:5,r:1},
  {c:5,r:2},{c:5,r:3},
  {c:4,r:3},{c:3,r:3},{c:2,r:3},{c:1,r:3},{c:0,r:3},
  {c:0,r:4},
  {c:1,r:4},{c:2,r:4},{c:3,r:4},{c:4,r:4},{c:5,r:4},{c:6,r:4},{c:7,r:4},
  {c:8,r:4},
];

// 경로 타일 집합 (배치 불가) — 타일 좌표를 키로
const PATH_TILES = new Set();
PATH_WAYPOINTS.forEach(w => {
  if (w.c >= 0 && w.c < COLS && w.r >= 0 && w.r < ROWS) PATH_TILES.add(`${w.c},${w.r}`);
});

// 웨이포인트를 픽셀 좌표로 변환
const WAYPOINTS_PX = PATH_WAYPOINTS.map(w => ({
  x: w.c * TILE + TILE / 2,
  y: GRID_Y + w.r * TILE + TILE / 2
}));

// 폰트
const FONT = "'Segoe UI', system-ui, -apple-system, sans-serif";

// ═══════════════════ ASSET PRELOADER ═══════════════════
const SPRITES = {};
const ASSET_MAP = {
  player:   'assets/player.svg',
  enemy:    'assets/enemy.svg',
  bgLayer1: 'assets/bg-layer1.svg',
  bgLayer2: 'assets/bg-layer2.svg',
  uiHeart:  'assets/ui-heart.svg',
  uiStar:   'assets/ui-star.svg',
  powerup:  'assets/powerup.svg',
  effectHit:'assets/effect-hit.svg',
};

// 에셋 프리로드
async function preloadAssets() {
  await Promise.all(
    Object.entries(ASSET_MAP).map(([key, src]) =>
      new Promise(resolve => {
        const img = new Image();
        img.onload  = () => { SPRITES[key] = img; resolve(); };
        img.onerror = resolve;
        img.src = src;
      })
    )
  );
}

// ═══════════════════ CANVAS SETUP ═══════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let dpr = 1, scale = 1, offsetX = 0, offsetY = 0;
let rafId = null;

// 캔버스 리사이즈 (DPR 대응)
function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  dpr = window.devicePixelRatio || 1;
  scale = Math.min(ww / CANVAS_W, wh / CANVAS_H);
  const cw = Math.floor(CANVAS_W * scale);
  const ch = Math.floor(CANVAS_H * scale);
  canvas.width = Math.floor(CANVAS_W * dpr * scale);
  canvas.height = Math.floor(CANVAS_H * dpr * scale);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  offsetX = Math.floor((ww - cw) / 2);
  offsetY = Math.floor((wh - ch) / 2);
  canvas.style.marginLeft = offsetX + 'px';
  canvas.style.marginTop = offsetY + 'px';
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
}

// ═══════════════════ TWEEN MANAGER ═══════════════════
const EASING = {
  linear:       t => t,
  easeOutQuad:  t => t * (2 - t),
  easeInQuad:   t => t * t,
  easeOutBack:  t => { const s=1.70158; return 1+(--t)*t*((s+1)*t+s); },
  easeOutElastic: t => t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1,
};

class TweenManager {
  constructor() { this._tweens = []; this._pendingCancel = false; }

  // 트윈 추가
  add(target, props, duration, easing, onComplete) {
    const e = EASING[easing] || EASING.linear;
    const starts = {};
    for (const k in props) starts[k] = target[k] !== undefined ? target[k] : 0;
    this._tweens.push({ target, props, starts, duration: duration/1000, elapsed: 0, easeFn: e, onComplete: onComplete||null });
    return target;
  }

  // 매 프레임 업데이트 (deferred cancel 보호)
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.duration, 1);
      const ep = t.easeFn(p);
      for (const k in t.props) t.target[k] = t.starts[k] + (t.props[k] - t.starts[k]) * ep;
      if (p >= 1) {
        const cb = t.onComplete;
        this._tweens.splice(i, 1);
        if (cb) cb();
      }
      if (this._pendingCancel) break;
    }
    if (this._pendingCancel) { this._tweens.length = 0; this._pendingCancel = false; }
  }

  // 안전한 전체 취소
  cancelAll() { this._pendingCancel = true; }
  get count() { return this._tweens.length; }
}
const tw = new TweenManager();

// ═══════════════════ OBJECT POOL ═══════════════════
class ObjectPool {
  constructor(factory, size) {
    this._pool = []; this._factory = factory;
    for (let i = 0; i < size; i++) this._pool.push(factory());
  }
  acquire() { return this._pool.length > 0 ? this._pool.pop() : this._factory(); }
  release(obj) { this._pool.push(obj); }
  clear() { this._pool.length = 0; }
}

// ═══════════════════ WEB AUDIO SFX ═══════════════════
let audioCtx = null;

// 오디오 초기화 (첫 사용자 인터랙션 시)
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) {}
  }
}

// 효과음 생성 유틸
function playTone(freq, freq2, dur, type, vol) {
  if (!audioCtx || state !== STATES.PLAYING) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freq2 !== freq) osc.frequency.linearRampToValueAtTime(freq2, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function sfxShoot(type) {
  if (type === 'archer') playTone(800, 600, 0.05, 'triangle', 0.1);
  else if (type === 'mage') playTone(400, 600, 0.15, 'sine', 0.12);
  else playTone(120, 80, 0.2, 'sawtooth', 0.15);
}
function sfxKill()     { playTone(1200, 200, 0.1, 'sine', 0.15); }
function sfxWave()     { playTone(440, 880, 0.3, 'square', 0.1); }
function sfxGameover() { playTone(400, 100, 0.5, 'sawtooth', 0.15); }

// ═══════════════════ EVENT LISTENER REGISTRY ═══════════════════
const registeredListeners = [];
function listen(el, evt, fn, opts) {
  el.addEventListener(evt, fn, opts);
  registeredListeners.push([el, evt, fn, opts]);
}

// destroy 패턴 — 모든 리소스 정리
function destroy() {
  if (rafId) cancelAnimationFrame(rafId);
  registeredListeners.forEach(([el, evt, fn, opts]) => el.removeEventListener(evt, fn, opts));
  registeredListeners.length = 0;
  tw.cancelAll();
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
}

// ═══════════════════ GAME STATE ═══════════════════
let state = STATES.LOADING;
let lastTime = 0;
let gold, lives, score, wave, enemies, towers, projectiles, particles;
let waveTimer, waveSpawned, waveTotal, waveKilled, wavePrepTimer;
let selectedTower, selectedTowerType, hoverCol, hoverRow;
let inputMode = 'mouse'; // 'mouse' or 'touch'
let isVictory = false, isNewBest = false;
let noUpgradeThisWave = true; // 미니멀리스트 보너스 추적
let consecutiveCleanWaves = 0; // 난이도 보정용
let waveClearing = false; // B1 fix: waveComplete 중복 호출 방지 가드
let screenShake = 0;
let titleAlpha = 0, titleScale = 0;
let bgCache = null; // 오프스크린 캔버스 배경
let grassDots = []; // 잔디 텍스처

// 풀
const enemyPool = new ObjectPool(() => ({}), 30);
const projPool = new ObjectPool(() => ({}), 50);
const ptclPool = new ObjectPool(() => ({}), 80);

// localStorage 안전 래핑
function getBest() { try { return parseInt(localStorage.getItem('mtd_bestScore'))||0; } catch(e) { return 0; } }
function getBestWave() { try { return parseInt(localStorage.getItem('mtd_bestWave'))||0; } catch(e) { return 0; } }
function saveBest(s, w) {
  try {
    if (s > getBest()) localStorage.setItem('mtd_bestScore', s);
    if (w > getBestWave()) localStorage.setItem('mtd_bestWave', w);
  } catch(e) {}
}

// ═══════════════════ INIT / RESET ═══════════════════
function resetGame() {
  gold = INIT_GOLD; lives = INIT_LIVES; score = 0; wave = 0;
  enemies = []; towers = []; projectiles = []; particles = [];
  waveTimer = 0; waveSpawned = 0; waveTotal = 0; waveKilled = 0;
  selectedTower = null; selectedTowerType = null;
  hoverCol = -1; hoverRow = -1;
  isVictory = false; isNewBest = false;
  noUpgradeThisWave = true; consecutiveCleanWaves = 0; waveClearing = false;
  screenShake = 0;
  tw.cancelAll();
  buildBgCache();
}

// 잔디 텍스처 점 생성
function buildGrassDots() {
  grassDots = [];
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (PATH_TILES.has(`${c},${r}`)) continue;
      for (let i = 0; i < 4; i++) {
        grassDots.push({
          x: c * TILE + Math.random() * TILE,
          y: GRID_Y + r * TILE + Math.random() * TILE,
          s: 1 + Math.random() * 2,
        });
      }
    }
  }
}

// 오프스크린 캔버스에 배경 캐시
function buildBgCache() {
  buildGrassDots();
  bgCache = document.createElement('canvas');
  bgCache.width = CANVAS_W; bgCache.height = CANVAS_H;
  const bc = bgCache.getContext('2d');

  // HUD 배경
  bc.fillStyle = C.uiBg; bc.fillRect(0, 0, CANVAS_W, HUD_H);

  // 잔디
  bc.fillStyle = C.bg;
  bc.fillRect(0, GRID_Y, GAME_W, GAME_H);

  // 경로 타일
  PATH_TILES.forEach(key => {
    const [c, r] = key.split(',').map(Number);
    bc.fillStyle = C.path;
    bc.fillRect(c * TILE, GRID_Y + r * TILE, TILE, TILE);
    bc.strokeStyle = C.pathEdge; bc.lineWidth = 2;
    bc.strokeRect(c * TILE + 1, GRID_Y + r * TILE + 1, TILE - 2, TILE - 2);
  });

  // 잔디 텍스처 점
  bc.fillStyle = '#388E3C';
  grassDots.forEach(d => { bc.beginPath(); bc.arc(d.x, d.y, d.s, 0, Math.PI * 2); bc.fill(); });

  // 그리드 라인
  bc.strokeStyle = C.grid; bc.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) { bc.beginPath(); bc.moveTo(c * TILE, GRID_Y); bc.lineTo(c * TILE, GRID_Y + GAME_H); bc.stroke(); }
  for (let r = 0; r <= ROWS; r++) { bc.beginPath(); bc.moveTo(0, GRID_Y + r * TILE); bc.lineTo(GAME_W, GRID_Y + r * TILE); bc.stroke(); }

  // 하단 바 배경
  bc.fillStyle = C.uiBg; bc.fillRect(0, GRID_Y + GAME_H, CANVAS_W, BAR_H);
}

// ═══════════════════ WAVE MANAGER ═══════════════════
function startWave() {
  wave++;
  waveClearing = false; // B1 fix: 웨이브 시작 시 가드 해제
  livesAtWaveStart = lives; // B3 fix: 웨이브 시작 시 라이프 기록
  const n = Math.min(20, Math.floor(5 + wave * 1.5));
  waveTotal = n; waveSpawned = 0; waveKilled = 0;
  waveTimer = 0; noUpgradeThisWave = true;
  state = STATES.PLAYING;
  // 웨이브 시작 연출
  const t = { alpha: 1, scale: 1.5, y: GRID_Y + GAME_H / 2 };
  tw.add(t, { alpha: 0, scale: 0.8, y: GRID_Y + GAME_H / 2 - 30 }, 1500, 'easeOutQuad');
  waveAnnounce = t;
  sfxWave();
}

let waveAnnounce = null;

// 웨이브 적 스폰
function updateWave(dt) {
  if (waveSpawned >= waveTotal) {
    // B1 fix: waveClearing 가드로 중복 호출 방지
    if (!waveClearing && enemies.length === 0 && waveKilled >= waveTotal) {
      waveClearing = true;
      waveComplete();
    }
    return;
  }
  const interval = Math.max(500, 2000 - wave * 80) / 1000;
  waveTimer += dt;
  if (waveTimer >= interval) {
    waveTimer -= interval;
    spawnEnemy();
    waveSpawned++;
  }
}

function waveComplete() {
  // B2 fix: 게임오버 상태면 웨이브 클리어 무시 (endGame tween과 경쟁 방지)
  if (lives <= 0) return;

  const bonus = 20 + wave * 5;
  gold += bonus;
  score += wave * 100;
  // 미니멀리스트 보너스
  if (noUpgradeThisWave) score += 200;
  // B3 fix: 웨이브 시작 시 기록한 라이프와 비교
  if (lives >= livesAtWaveStart) consecutiveCleanWaves++;
  else consecutiveCleanWaves = 0;

  if (wave >= MAX_WAVES) {
    // 승리!
    isVictory = true;
    score += lives * 500;
    endGame();
    return;
  }
  // WAVE CLEAR 연출 → WAVE_PREP 전환
  const t = { alpha: 1, y: GRID_Y + GAME_H / 2 };
  tw.add(t, { alpha: 0, y: GRID_Y + GAME_H / 2 - 40 }, 1500, 'easeOutQuad', () => {
    state = STATES.WAVE_PREP;
    wavePrepTimer = 0;
  });
  waveClearText = t;
}

let waveClearText = null;
let livesAtWaveStart = INIT_LIVES;

function spawnEnemy() {
  const comp = WAVE_COMP[Math.min(wave - 1, WAVE_COMP.length - 1)];
  const r = Math.random();
  let cumul = 0, type = 'goblin';
  for (const [t, p] of Object.entries(comp)) { cumul += p; if (r <= cumul) { type = t; break; } }

  const def = ENEMY_TYPES[type];
  const hpMul = 1 + (wave - 1) * 0.12;
  // 동적 밸런스: 3연속 클린 웨이브 시 HP +15%
  const extraMul = consecutiveCleanWaves >= 3 ? 1.15 : 1;
  // 최종 웨이브 HP x2
  const finalMul = wave === 20 ? 2.0 : 1;

  const e = enemyPool.acquire();
  e.type = type; e.color = def.color;
  e.hp = Math.round(def.hp * hpMul * extraMul * finalMul);
  e.maxHp = e.hp;
  e.spd = def.spd; e.baseSpd = def.spd;
  e.reward = def.reward; e.score = def.score;
  e.armor = def.armor; e.slowRes = def.slowRes;
  e.slowTimer = 0; e.slowAmount = 0;
  e.wpIdx = 0;
  e.x = WAYPOINTS_PX[0].x; e.y = WAYPOINTS_PX[0].y;
  e.dead = false; e.reached = false;
  e.flashTimer = 0;
  enemies.push(e);
}

// ═══════════════════ ENEMY UPDATE ═══════════════════
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    // 감속 처리
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      e.spd = e.baseSpd * (1 - e.slowAmount * (1 - e.slowRes));
    } else {
      e.spd = e.baseSpd;
    }
    // 피격 플래시
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // 경로 이동
    if (e.wpIdx < WAYPOINTS_PX.length - 1) {
      const target = WAYPOINTS_PX[e.wpIdx + 1];
      const dx = target.x - e.x, dy = target.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const move = e.spd * dt;
      if (move >= dist) {
        e.x = target.x; e.y = target.y;
        e.wpIdx++;
      } else {
        e.x += (dx / dist) * move;
        e.y += (dy / dist) * move;
      }
    }

    // 출구 도달
    if (e.wpIdx >= WAYPOINTS_PX.length - 1) {
      lives--;
      e.dead = true; e.reached = true;
      screenShake = 0.2;
    }
    // HP 0 이하
    if (e.hp <= 0 && !e.dead) {
      e.dead = true;
      // 위기 보너스 (라이프 5이하 → 골드 1.3배)
      const goldMul = lives <= 5 ? 1.3 : 1;
      gold += Math.round(e.reward * goldMul);
      score += e.score;
      waveKilled++;
      sfxKill();
      spawnDeathFX(e.x, e.y, e.color);
      spawnGoldPopup(e.x, e.y - 12, '+' + Math.round(e.reward * goldMul) + 'G');
    }
    if (e.dead) {
      enemies.splice(i, 1);
      enemyPool.release(e);
    }
  }
}

// ═══════════════════ TOWER SYSTEM ═══════════════════
function placeTower(col, row, type) {
  const def = TOWER_DEFS[type][0];
  if (gold < def.cost) return false;
  if (PATH_TILES.has(`${col},${row}`)) return false;
  if (towers.find(t => t.col === col && t.row === row)) return false;

  gold -= def.cost;
  const t = {
    col, row, type, level: 0,
    x: col * TILE + TILE / 2, y: GRID_Y + row * TILE + TILE / 2,
    cooldown: 0, totalInvested: def.cost,
    angle: 0,
  };
  towers.push(t);
  // 배치 애니메이션
  const anim = { scale: 0 };
  tw.add(anim, { scale: 1 }, 300, 'easeOutBack');
  t._anim = anim;
  initAudio();
  return true;
}

function upgradeTower(t) {
  if (t.level >= 2) return false;
  const nextDef = TOWER_DEFS[t.type][t.level + 1];
  if (gold < nextDef.upCost) return false;
  gold -= nextDef.upCost;
  t.level++;
  t.totalInvested += nextDef.upCost;
  noUpgradeThisWave = false;
  // 업그레이드 이펙트
  spawnUpgradeFX(t.x, t.y);
  return true;
}

function sellTower(t) {
  const refund = Math.floor(t.totalInvested * 0.6);
  gold += refund;
  const idx = towers.indexOf(t);
  if (idx >= 0) towers.splice(idx, 1);
  selectedTower = null;
  spawnGoldPopup(t.x, t.y - 16, '+' + refund + 'G');
}

function getTowerDef(t) { return TOWER_DEFS[t.type][t.level]; }

function updateTowers(dt) {
  for (const t of towers) {
    const def = getTowerDef(t);
    t.cooldown -= dt * 1000;
    if (t.cooldown > 0) continue;
    // 사거리 내 가장 앞선 적 찾기 (First targeting)
    let best = null, bestWp = -1;
    for (const e of enemies) {
      const dx = e.x - t.x, dy = e.y - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= def.range + 8) { // 관대한 판정 +8px
        if (e.wpIdx > bestWp || (e.wpIdx === bestWp && (!best || calcProgress(e) > calcProgress(best)))) {
          best = e; bestWp = e.wpIdx;
        }
      }
    }
    if (best) {
      t.cooldown = def.speed;
      t.angle = Math.atan2(best.y - t.y, best.x - t.x);
      fireProjectile(t, best, def);
      sfxShoot(t.type);
    }
  }
}

// 적의 현재 웨이포인트 간 진행률 (First 타겟팅용)
function calcProgress(e) {
  if (e.wpIdx >= WAYPOINTS_PX.length - 1) return 9999;
  const target = WAYPOINTS_PX[e.wpIdx + 1];
  const dx = target.x - e.x, dy = target.y - e.y;
  return -Math.sqrt(dx * dx + dy * dy); // 거리 짧을수록 앞선 것
}

// ═══════════════════ PROJECTILE ═══════════════════
function fireProjectile(tower, target, def) {
  const p = projPool.acquire();
  p.x = tower.x; p.y = tower.y;
  p.target = target;
  p.type = tower.type;
  p.atk = def.atk;
  p.aoe = def.aoe || 0;
  p.slow = def.slow || 0;
  p.slowDur = def.slowDur || 0;
  p.dead = false;
  p.speed = tower.type === 'archer' ? 600 : tower.type === 'mage' ? 400 : 300;
  // 캐논 포물선용
  p.startX = tower.x; p.startY = tower.y;
  p.targetX = target.x; p.targetY = target.y;
  p.progress = 0;
  projectiles.push(p);
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];

    if (p.type === 'cannon') {
      // 캐논: 진행률 기반 이동 + 포물선
      p.progress += (p.speed / Math.max(1, dist2d(p.startX, p.startY, p.targetX, p.targetY))) * dt;
      p.x = lerp(p.startX, p.targetX, Math.min(p.progress, 1));
      p.y = lerp(p.startY, p.targetY, Math.min(p.progress, 1));
      // 포물선 높이
      p.arcY = -Math.sin(Math.min(p.progress, 1) * Math.PI) * 25;
      if (p.progress >= 1) {
        applyAoeDamage(p.targetX, p.targetY, p.aoe, p.atk, p.slow, p.slowDur);
        spawnExplosionFX(p.targetX, p.targetY, '#EF5350', p.aoe);
        p.dead = true;
      }
    } else {
      // 화살/마법: 추적
      if (!p.target || p.target.dead) {
        p.dead = true;
      } else {
        const dx = p.target.x - p.x, dy = p.target.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 8) {
          // 명중
          if (p.type === 'mage' && p.aoe > 0) {
            applyAoeDamage(p.target.x, p.target.y, p.aoe, p.atk, p.slow, p.slowDur);
            spawnExplosionFX(p.target.x, p.target.y, '#7E57C2', p.aoe);
          } else {
            applyDamage(p.target, p.atk);
            spawnHitFX(p.target.x, p.target.y);
          }
          p.dead = true;
        } else {
          p.x += (dx / d) * p.speed * dt;
          p.y += (dy / d) * p.speed * dt;
        }
      }
    }
    if (p.dead) {
      projectiles.splice(i, 1);
      projPool.release(p);
    }
  }
}

function applyDamage(enemy, dmg) {
  const actual = Math.max(1, dmg - enemy.armor);
  enemy.hp -= actual;
  enemy.flashTimer = 0.1;
}

function applyAoeDamage(x, y, radius, dmg, slow, slowDur) {
  for (const e of enemies) {
    if (dist2d(e.x, e.y, x, y) <= radius) {
      applyDamage(e, dmg);
      if (slow > 0) { e.slowTimer = slowDur; e.slowAmount = slow; }
    }
  }
}

// ═══════════════════ PARTICLES ═══════════════════
function spawnDeathFX(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const p = ptclPool.acquire();
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.3;
    const spd = 40 + Math.random() * 60;
    p.x = x; p.y = y; p.vx = Math.cos(angle) * spd; p.vy = Math.sin(angle) * spd;
    p.life = 0.5 + Math.random() * 0.3; p.maxLife = p.life;
    p.size = 3 + Math.random() * 3; p.color = color; p.type = 'circle';
    particles.push(p);
  }
}

function spawnHitFX(x, y) {
  for (let i = 0; i < 4; i++) {
    const p = ptclPool.acquire();
    p.x = x; p.y = y;
    p.vx = (Math.random() - 0.5) * 60; p.vy = (Math.random() - 0.5) * 60;
    p.life = 0.3; p.maxLife = 0.3;
    p.size = 2 + Math.random() * 2; p.color = '#FFE082'; p.type = 'circle';
    particles.push(p);
  }
}

function spawnExplosionFX(x, y, color, radius) {
  const p = ptclPool.acquire();
  p.x = x; p.y = y; p.vx = 0; p.vy = 0;
  p.life = 0.4; p.maxLife = 0.4;
  p.size = radius; p.color = color; p.type = 'explosion';
  particles.push(p);
}

function spawnGoldPopup(x, y, text) {
  const p = ptclPool.acquire();
  p.x = x; p.y = y; p.vx = 0; p.vy = -30;
  p.life = 1.0; p.maxLife = 1.0;
  p.text = text; p.color = C.gold; p.type = 'text';
  particles.push(p);
}

function spawnUpgradeFX(x, y) {
  for (let i = 0; i < 6; i++) {
    const p = ptclPool.acquire();
    const angle = (Math.PI * 2 / 6) * i;
    p.x = x; p.y = y; p.vx = Math.cos(angle) * 50; p.vy = Math.sin(angle) * 50;
    p.life = 0.6; p.maxLife = 0.6;
    p.size = 4; p.color = C.accent; p.type = 'circle';
    particles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.life <= 0) { particles.splice(i, 1); ptclPool.release(p); }
  }
}

// ═══════════════════ GAME OVER ═══════════════════
function endGame() {
  // "판정 먼저, 저장 나중에"
  isNewBest = score > getBest();
  saveBest(score, wave);
  screenShake = 0.4;
  // 화면 적색 플래시 → GAMEOVER 전환 (tween, setTimeout 금지)
  const flash = { alpha: 0.6 };
  tw.add(flash, { alpha: 0 }, 800, 'easeOutQuad', () => {
    state = STATES.GAMEOVER;
  });
  gameOverFlash = flash;
  if (!isVictory) sfxGameover();
}

let gameOverFlash = null;

function checkGameOver() {
  if (lives <= 0 && state === STATES.PLAYING) {
    lives = 0;
    endGame();
  }
}

// ═══════════════════ INPUT HANDLING ═══════════════════
let mouseX = 0, mouseY = 0;
let towerBuyMenu = null; // {col, row} 타워 구매 메뉴 위치
let towerInfoPanel = null; // 선택된 타워 정보

// 화면 좌표 → 게임 좌표
function toGameCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / (rect.width / CANVAS_W),
    y: (clientY - rect.top) / (rect.height / CANVAS_H),
  };
}

// 마우스 이동
function onMouseMove(e) {
  inputMode = 'mouse';
  const p = toGameCoords(e.clientX, e.clientY);
  mouseX = p.x; mouseY = p.y;
  hoverCol = Math.floor(p.x / TILE);
  hoverRow = Math.floor((p.y - GRID_Y) / TILE);
}

// 마우스 클릭
function onMouseDown(e) {
  inputMode = 'mouse';
  initAudio();
  const p = toGameCoords(e.clientX, e.clientY);
  handleClick(p.x, p.y, e.button);
}

// 터치 이벤트
function onTouchStart(e) {
  e.preventDefault();
  inputMode = 'touch';
  initAudio();
  const t = e.touches[0];
  const p = toGameCoords(t.clientX, t.clientY);
  mouseX = p.x; mouseY = p.y;
  handleClick(p.x, p.y, 0);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  const p = toGameCoords(t.clientX, t.clientY);
  mouseX = p.x; mouseY = p.y;
  hoverCol = Math.floor(p.x / TILE);
  hoverRow = Math.floor((p.y - GRID_Y) / TILE);
}

// 클릭 처리 통합
function handleClick(x, y, button) {
  // 우클릭이나 빈 곳: 메뉴 닫기
  if (button === 2) { closePanels(); return; }

  if (state === STATES.TITLE) {
    state = STATES.WAVE_PREP; wavePrepTimer = 0;
    return;
  }
  if (state === STATES.GAMEOVER) {
    resetGame(); state = STATES.TITLE;
    return;
  }
  if (state === STATES.PAUSE) {
    // 재개 버튼 영역
    if (isInButton(x, y, CANVAS_W / 2, GRID_Y + GAME_H / 2, 120, 40)) {
      state = STATES.PLAYING;
    }
    return;
  }
  if (state === STATES.CONFIRM_MODAL) {
    // 예/아니오 버튼
    if (isInButton(x, y, CANVAS_W / 2 - 70, GRID_Y + GAME_H / 2 + 30, 80, 32)) {
      resetGame(); state = STATES.TITLE; // 예
    }
    if (isInButton(x, y, CANVAS_W / 2 + 70, GRID_Y + GAME_H / 2 + 30, 80, 32)) {
      state = STATES.PAUSE; // 아니오
    }
    return;
  }

  // WAVE_PREP 또는 PLAYING
  if (state === STATES.WAVE_PREP || state === STATES.PLAYING) {
    // 웨이브 시작 버튼 (하단 바 우측)
    if (state === STATES.WAVE_PREP && y >= GRID_Y + GAME_H) {
      if (x >= CANVAS_W - 130 && x <= CANVAS_W - 10) {
        startWave();
        return;
      }
    }
    // 일시정지 버튼 (우상단)
    if (x >= CANVAS_W - 40 && y <= HUD_H) {
      state = STATES.PAUSE;
      return;
    }

    // 타워 구매 메뉴가 열려있으면
    if (towerBuyMenu) {
      const mx = towerBuyMenu.col * TILE + TILE / 2;
      const my = GRID_Y + towerBuyMenu.row * TILE;
      // 아처/마법/캐논 아이콘 영역
      const types = ['archer', 'mage', 'cannon'];
      for (let i = 0; i < 3; i++) {
        const bx = mx - 60 + i * 44, by = my - 48;
        if (x >= bx && x <= bx + 40 && y >= by && y <= by + 40) {
          if (placeTower(towerBuyMenu.col, towerBuyMenu.row, types[i])) {
            closePanels();
          }
          return;
        }
      }
      closePanels();
      return;
    }

    // 타워 정보 패널이 열려있으면
    if (towerInfoPanel) {
      const t = towerInfoPanel;
      const px = t.x + 40, py = t.y - 70;
      // 업그레이드 버튼
      if (t.level < 2 && isInButton(x, y, px + 70, py + 50, 120, 28)) {
        upgradeTower(t);
        return;
      }
      // 판매 버튼
      if (isInButton(x, y, px + 70, py + 80, 120, 28)) {
        sellTower(t);
        return;
      }
      closePanels();
      return;
    }

    // 하단 바 클릭 — 타워 선택 단축
    if (y >= GRID_Y + GAME_H && y <= CANVAS_H) {
      const types = ['archer', 'mage', 'cannon'];
      for (let i = 0; i < 3; i++) {
        const bx = 10 + i * 100;
        if (x >= bx && x <= bx + 90) {
          selectedTowerType = types[i];
          return;
        }
      }
      return;
    }

    // 그리드 영역 클릭
    const col = Math.floor(x / TILE);
    const row = Math.floor((y - GRID_Y) / TILE);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
      // 기존 타워 클릭
      const existing = towers.find(t => t.col === col && t.row === row);
      if (existing) {
        towerInfoPanel = existing; towerBuyMenu = null;
        return;
      }
      // 빈 타일 클릭
      if (!PATH_TILES.has(`${col},${row}`)) {
        if (selectedTowerType) {
          placeTower(col, row, selectedTowerType);
          selectedTowerType = null;
        } else {
          towerBuyMenu = { col, row }; towerInfoPanel = null;
        }
      }
    }
  }
}

function closePanels() { towerBuyMenu = null; towerInfoPanel = null; selectedTowerType = null; }

function isInButton(x, y, bx, by, bw, bh) {
  return x >= bx - bw/2 && x <= bx + bw/2 && y >= by - bh/2 && y <= by + bh/2;
}

// 키보드 입력
function onKeyDown(e) {
  inputMode = 'mouse';
  initAudio();
  if (state === STATES.TITLE) {
    if (e.code === 'Space') { state = STATES.WAVE_PREP; wavePrepTimer = 0; }
    return;
  }
  if (state === STATES.GAMEOVER) {
    if (e.code === 'KeyR') { resetGame(); state = STATES.TITLE; }
    return;
  }
  if (state === STATES.CONFIRM_MODAL) {
    if (e.code === 'KeyY') { resetGame(); state = STATES.TITLE; }
    if (e.code === 'KeyN' || e.code === 'Escape') { state = STATES.PAUSE; }
    return;
  }
  if (state === STATES.PAUSE) {
    if (e.code === 'KeyP' || e.code === 'Escape') { state = STATES.PLAYING; return; }
    if (e.code === 'KeyR') { state = STATES.CONFIRM_MODAL; return; }
    return;
  }
  if (state === STATES.WAVE_PREP) {
    if (e.code === 'Space') { startWave(); return; }
  }
  if (state === STATES.PLAYING || state === STATES.WAVE_PREP) {
    if (e.code === 'KeyP' || e.code === 'Escape') { state = STATES.PAUSE; return; }
    if (e.code === 'Digit1') { selectedTowerType = 'archer'; return; }
    if (e.code === 'Digit2') { selectedTowerType = 'mage'; return; }
    if (e.code === 'Digit3') { selectedTowerType = 'cannon'; return; }
    if (e.code === 'KeyU' && towerInfoPanel) { upgradeTower(towerInfoPanel); return; }
    if (e.code === 'KeyS' && towerInfoPanel) { sellTower(towerInfoPanel); return; }
  }
}

// 우클릭 방지
function onContextMenu(e) { e.preventDefault(); closePanels(); }

// ═══════════════════ RENDERING ═══════════════════

// 유틸
function lerp(a, b, t) { return a + (b - a) * t; }
function dist2d(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

// 배경 렌더
function renderBg() {
  if (bgCache) ctx.drawImage(bgCache, 0, 0);
}

// 호버 하이라이트
function renderHover() {
  if (inputMode !== 'mouse') return;
  if (state !== STATES.PLAYING && state !== STATES.WAVE_PREP) return;
  if (hoverCol < 0 || hoverCol >= COLS || hoverRow < 0 || hoverRow >= ROWS) return;
  if (PATH_TILES.has(`${hoverCol},${hoverRow}`)) return;
  if (towers.find(t => t.col === hoverCol && t.row === hoverRow)) return;
  ctx.fillStyle = C.hoverTile;
  ctx.fillRect(hoverCol * TILE, GRID_Y + hoverRow * TILE, TILE, TILE);
}

// 적 렌더
function renderEnemies() {
  for (const e of enemies) {
    const x = e.x, y = e.y;
    ctx.save();
    if (e.flashTimer > 0) { ctx.globalAlpha = 0.5 + Math.sin(e.flashTimer * 30) * 0.5; }

    // 적 유형별 드로잉
    if (e.type === 'goblin' && SPRITES.enemy) {
      ctx.drawImage(SPRITES.enemy, x - 16, y - 16, 32, 32);
    } else {
      drawEnemyShape(ctx, e);
    }
    ctx.restore();

    // HP 바
    if (e.hp < e.maxHp) {
      const bw = 24, bh = 3;
      ctx.fillStyle = '#333'; ctx.fillRect(x - bw/2, y - 18, bw, bh);
      ctx.fillStyle = e.hp > e.maxHp * 0.3 ? '#4CAF50' : '#E74C3C';
      ctx.fillRect(x - bw/2, y - 18, bw * (e.hp / e.maxHp), bh);
    }
    // 감속 표시
    if (e.slowTimer > 0) {
      ctx.strokeStyle = 'rgba(100,180,255,0.5)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.stroke();
    }
  }
}

function drawEnemyShape(ctx, e) {
  const x = e.x, y = e.y;
  ctx.fillStyle = e.color;
  if (e.type === 'goblin') {
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
    // 귀
    ctx.beginPath(); ctx.moveTo(x-8,y-6); ctx.lineTo(x-14,y-14); ctx.lineTo(x-4,y-8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+8,y-6); ctx.lineTo(x+14,y-14); ctx.lineTo(x+4,y-8); ctx.fill();
    // 눈
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x-4, y-2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-2, 2, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'orc') {
    ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x-4, y-2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-2, 2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = e.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y+4, 6, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
  } else if (e.type === 'dark') {
    // 방패 (사각)
    ctx.fillRect(x-10, y-10, 20, 20);
    // 투구 (삼각)
    ctx.beginPath(); ctx.moveTo(x, y-18); ctx.lineTo(x-10, y-10); ctx.lineTo(x+10, y-10); ctx.fill();
    // 칼
    ctx.strokeStyle = '#B0BEC5'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+10, y-4); ctx.lineTo(x+18, y-10); ctx.stroke();
  } else if (e.type === 'runner') {
    // 마름모
    ctx.beginPath(); ctx.moveTo(x, y-12); ctx.lineTo(x+10, y); ctx.lineTo(x, y+12); ctx.lineTo(x-10, y); ctx.closePath(); ctx.fill();
    // 속도선
    ctx.strokeStyle = 'rgba(224,64,251,0.5)'; ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(x-14-i*4, y-4+i*4); ctx.lineTo(x-20-i*4, y-4+i*4); ctx.stroke();
    }
  }
}

// 타워 렌더
function renderTowers() {
  for (const t of towers) {
    const def = getTowerDef(t);
    const x = t.x, y = t.y;
    const s = (t._anim && t._anim.scale !== undefined) ? t._anim.scale : 1;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);

    // 사거리 (선택 시)
    if (towerInfoPanel === t) {
      ctx.fillStyle = C.rangeFill;
      ctx.beginPath(); ctx.arc(0, 0, def.range, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.fillStyle = def.color;
    if (t.type === 'archer') {
      if (SPRITES.player) {
        ctx.drawImage(SPRITES.player, -20, -20, 40, 40);
      } else {
        // 기반
        ctx.fillRect(-14, -8, 28, 20);
        // 지붕
        ctx.beginPath(); ctx.moveTo(-16,-8); ctx.lineTo(0,-22); ctx.lineTo(16,-8); ctx.closePath(); ctx.fill();
        // 활
        ctx.strokeStyle = '#8D6E63'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(Math.cos(t.angle)*8, Math.sin(t.angle)*8, 10, t.angle - 0.8, t.angle + 0.8);
        ctx.stroke();
      }
    } else if (t.type === 'mage') {
      // 원통 기반
      ctx.beginPath(); ctx.ellipse(0, 4, 14, 10, 0, 0, Math.PI*2); ctx.fill();
      // 뾰족 삼각
      ctx.beginPath(); ctx.moveTo(-12, -4); ctx.lineTo(0, -26); ctx.lineTo(12, -4); ctx.closePath(); ctx.fill();
      // 빛나는 구체
      ctx.fillStyle = 'rgba(200,170,255,0.6)';
      ctx.beginPath(); ctx.arc(0, -18, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, -18, 3, 0, Math.PI*2); ctx.fill();
    } else if (t.type === 'cannon') {
      // 기반
      ctx.fillRect(-14, -6, 28, 18);
      // 포신
      ctx.strokeStyle = '#B71C1C'; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(t.angle)*20, Math.sin(t.angle)*20);
      ctx.stroke();
      // 바퀴
      ctx.fillStyle = '#5D4037';
      ctx.beginPath(); ctx.arc(-10, 12, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(10, 12, 5, 0, Math.PI*2); ctx.fill();
    }

    // 레벨 표시
    if (t.level > 0) {
      ctx.fillStyle = C.gold; ctx.font = `bold 10px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText('★'.repeat(t.level), 0, 20);
    }
    ctx.restore();
  }
}

// 투사체 렌더
function renderProjectiles() {
  for (const p of projectiles) {
    ctx.save();
    if (p.type === 'archer') {
      const angle = p.target ? Math.atan2(p.target.y - p.y, p.target.x - p.x) : 0;
      ctx.translate(p.x, p.y); ctx.rotate(angle);
      ctx.strokeStyle = '#8D6E63'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 0); ctx.stroke();
      ctx.fillStyle = '#5D4037';
      ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(2, -2); ctx.lineTo(2, 2); ctx.fill();
    } else if (p.type === 'mage') {
      ctx.fillStyle = 'rgba(180,150,255,0.4)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#B39DDB';
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'cannon') {
      const drawY = p.y + (p.arcY || 0);
      // 그림자
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(p.x, p.y + 2, 5, 3, 0, 0, Math.PI*2); ctx.fill();
      // 포탄
      ctx.fillStyle = '#5D4037';
      ctx.beginPath(); ctx.arc(p.x, drawY, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// 파티클 렌더
function renderParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    if (p.type === 'circle') {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'explosion') {
      const r = p.size * (1 - alpha * 0.5);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
      // effectHit 이미지 사용
      if (SPRITES.effectHit) {
        ctx.globalAlpha = alpha * 0.7;
        ctx.drawImage(SPRITES.effectHit, p.x - r, p.y - r, r*2, r*2);
      }
    } else if (p.type === 'text') {
      ctx.fillStyle = p.color;
      ctx.font = `bold 12px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.restore();
  }
}

// HUD 상단
function renderHUD() {
  ctx.fillStyle = C.uiBg; ctx.fillRect(0, 0, CANVAS_W, HUD_H);

  ctx.font = `bold 13px ${FONT}`;

  // 웨이브

  // 웨이브 진행 바
  if (state === STATES.PLAYING && waveTotal > 0) {
    const barX = 8, barY = cy + 6, barW = 100, barH = 5;

  else { ctx.fillStyle = C.gold; ctx.fillText('💰', gx, cy); }
  ctx.fillStyle = C.gold; ctx.textAlign = 'left';
  ctx.fillText(`${gold}G`, gx + 20, cy);
  // 위기 보너스 표시

  }

  // 라이프 (uiHeart 아이콘)
  const lx = 280;
  if (SPRITES.uiHeart) ctx.drawImage(SPRITES.uiHeart, lx, cy - 8, 16, 16);
  else { ctx.fillStyle = C.life; ctx.fillText('❤', lx, cy); }

  // 점수
  ctx.fillStyle = C.uiText; ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${score}`, CANVAS_W - 44, cy);

  // 일시정지 버튼
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.textAlign = 'center';
  ctx.fillText('⏸', CANVAS_W - 20, cy);

// 타워 정보 패널
function renderInfoPanel() {
  if (!towerInfoPanel) return;
  const t = towerInfoPanel;
  const def = getTowerDef(t);
  const names = { archer: '아처 타워', mage: '마법사 타워', cannon: '캐논 타워' };
  const px = t.x + 36, py = t.y - 80;

  // 패널 배경
  ctx.fillStyle = 'rgba(20,25,35,0.95)';
  ctx.fillRect(px, py, 140, 110);
  ctx.strokeStyle = def.color; ctx.lineWidth = 2;
  ctx.strokeRect(px, py, 140, 110);

  ctx.fillStyle = C.uiText; ctx.font = `bold 12px ${FONT}`; ctx.textAlign = 'left';
  ctx.fillText(`${names[t.type]} Lv.${t.level+1}`, px + 6, py + 16);
  ctx.font = `11px ${FONT}`; ctx.fillStyle = '#aaa';
  ctx.fillText(`ATK:${def.atk}  SPD:${def.speed}ms`, px + 6, py + 32);
  ctx.fillText(`범위:${def.range}px`, px + 6, py + 46);

  // 업그레이드 버튼
  if (t.level < 2) {
    const nextDef = TOWER_DEFS[t.type][t.level + 1];
    const canUp = gold >= nextDef.upCost;
    ctx.fillStyle = canUp ? 'rgba(0,255,135,0.2)' : 'rgba(100,100,100,0.2)';
    ctx.fillRect(px + 6, py + 54, 128, 22);
    ctx.fillStyle = canUp ? C.accent : '#666'; ctx.font = `bold 11px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText(`⬆ 업그레이드 ${nextDef.upCost}G`, px + 70, py + 68);
  } else {
    ctx.fillStyle = C.gold; ctx.font = `bold 11px ${FONT}`; ctx.textAlign = 'center';
    ctx.fillText('★ MAX LEVEL ★', px + 70, py + 68);
  }

  // 판매 버튼
  const refund = Math.floor(t.totalInvested * 0.6);
  ctx.fillStyle = 'rgba(231,76,60,0.2)';
  ctx.fillRect(px + 6, py + 80, 128, 22);
  ctx.fillStyle = '#E74C3C'; ctx.font = `bold 11px ${FONT}`; ctx.textAlign = 'center';
  ctx.fillText(`💰 판매 ${refund}G`, px + 70, py + 94);
}

// 로딩 화면
function renderLoading() {

// 타이틀 화면 — 시그니처 이펙트: 터미널 그리드 스캔라인
function renderTitle() {
  ctx.fillStyle = '#0f1a10'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 모눈 배경
  ctx.strokeStyle = 'rgba(0,255,135,0.06)'; ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_W; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CANVAS_H); ctx.stroke(); }
  for (let y = 0; y < CANVAS_H; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CANVAS_W,y); ctx.stroke(); }

  // 스캔라인 효과
  const t = performance.now() * 0.001;
  for (let y = 0; y < CANVAS_H; y += 4) {
    ctx.fillStyle = `rgba(0,255,135,${0.015 + Math.sin(y * 0.1 + t * 3) * 0.01})`;
    ctx.fillRect(0, y, CANVAS_W, 2);
  }

  // bgLayer1 배경
  if (SPRITES.bgLayer1) {
    ctx.globalAlpha = 0.3;
    ctx.drawImage(SPRITES.bgLayer1, 0, 0, CANVAS_W, CANVAS_H);
    ctx.globalAlpha = 1;
  }

  // 타이틀 텍스트
  ctx.fillStyle = C.accent; ctx.font = `bold 32px ${FONT}`; ctx.textAlign = 'center';
  ctx.shadowColor = C.accent; ctx.shadowBlur = 20;
  ctx.fillText('MINI TOWER DEFENSE', CANVAS_W/2, CANVAS_H/2 - 50);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#8fbc8f'; ctx.font = `16px ${FONT}`;
  ctx.fillText('전략적 배치로 20웨이브를 막아라!', CANVAS_W/2, CANVAS_H/2 - 10);

  // 최고 기록
  const best = getBest();
  if (best > 0) {
    ctx.fillStyle = C.gold; ctx.font = `bold 14px ${FONT}`;
    ctx.fillText(`BEST SCORE: ${best}  |  BEST WAVE: ${getBestWave()}`, CANVAS_W/2, CANVAS_H/2 + 30);
  }

  // 시작 안내 — 깜빡임
  ctx.globalAlpha = 0.5 + Math.sin(t * 3) * 0.5;
  ctx.fillStyle = C.accent; ctx.font = `bold 16px ${FONT}`;
  ctx.fillText(inputMode === 'touch' ? 'TAP TO START' : 'PRESS SPACE TO START', CANVAS_W/2, CANVAS_H/2 + 80);
  ctx.globalAlpha = 1;

  // 조작 안내
  ctx.fillStyle = '#556B2F'; ctx.font = `12px ${FONT}`;
  ctx.fillText('1/2/3: 타워 선택 | P: 일시정지 | U: 업그레이드 | S: 판매', CANVAS_W/2, CANVAS_H - 30);
}

function renderGameover() {

  if (isVictory) {

    ctx.shadowBlur = 0;
    ctx.fillStyle = C.uiText; ctx.font = `16px ${FONT}`;
    ctx.fillText(`남은 라이프: ${lives} × 500 = ${lives * 500}점`, CANVAS_W/2, cy - 25);
  } else {
    ctx.fillStyle = C.life; ctx.font = `bold 36px ${FONT}`; ctx.textAlign = 'center';
    ctx.shadowColor = C.life; ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', CANVAS_W/2, cy - 60);
    ctx.shadowBlur = 0;
  }

  ctx.fillStyle = C.uiText; ctx.font = `bold 20px ${FONT}`;
  ctx.fillText(`SCORE: ${score}`, CANVAS_W/2, cy);
  ctx.font = `14px ${FONT}`;
  ctx.fillText(`웨이브 ${wave}/${MAX_WAVES} 도달`, CANVAS_W/2, cy + 25);

  if (isNewBest) {
    ctx.fillStyle = C.gold; ctx.font = `bold 18px ${FONT}`;
    ctx.shadowColor = C.gold; ctx.shadowBlur = 12;
    ctx.fillText('★ NEW BEST! ★', CANVAS_W/2, cy + 55);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#888'; ctx.font = `13px ${FONT}`;
    ctx.fillText(`BEST: ${getBest()}`, CANVAS_W/2, cy + 55);
  }

  // 재시작 안내 깜빡임
  const t = performance.now() * 0.001;
  ctx.globalAlpha = 0.5 + Math.sin(t * 3) * 0.5;
  ctx.fillStyle = C.accent; ctx.font = `bold 15px ${FONT}`;
  ctx.fillText(inputMode === 'touch' ? 'TAP TO RESTART' : 'PRESS R TO RESTART', CANVAS_W/2, cy + 90);
  ctx.globalAlpha = 1;
}

// 웨이브 시작/클리어 텍스트 오버레이
function renderWaveText() {
  if (waveAnnounce && waveAnnounce.alpha > 0.01) {
    ctx.save();
    ctx.globalAlpha = waveAnnounce.alpha;
    ctx.fillStyle = C.wave; ctx.font = `bold 28px ${FONT}`; ctx.textAlign = 'center';
    ctx.shadowColor = C.wave; ctx.shadowBlur = 10;
    ctx.fillText(`WAVE ${wave}`, CANVAS_W/2, waveAnnounce.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  if (waveClearText && waveClearText.alpha > 0.01) {
    ctx.save();
    ctx.globalAlpha = waveClearText.alpha;
    ctx.fillStyle = C.accent; ctx.font = `bold 24px ${FONT}`; ctx.textAlign = 'center';
    ctx.shadowColor = C.accent; ctx.shadowBlur = 10;
    ctx.fillText('WAVE CLEAR!', CANVAS_W/2, waveClearText.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// 게임오버 적색 플래시
function renderFlash() {
  if (gameOverFlash && gameOverFlash.alpha > 0.01) {
    ctx.fillStyle = `rgba(239,68,68,${gameOverFlash.alpha})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

// 전체 게임 화면 렌더
function renderGame() {
  ctx.save();
  // 화면 쉐이크
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake * 20;
    const sy = (Math.random() - 0.5) * screenShake * 20;
    ctx.translate(sx, sy);
  }

  renderBg();
  renderHover();
  renderTowers();
  renderEnemies();
  renderProjectiles();
  renderParticles();
  renderWaveText();
  renderFlash();
  ctx.restore();

  renderHUD();
  renderBottomBar();
  renderBuyMenu();
  renderInfoPanel();
}

// ═══════════════════ MAIN LOOP ═══════════════════
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 최대 50ms 캡
  lastTime = timestamp;

  // 스크린 쉐이크 감쇠
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2);

  // 상태별 업데이트 (매트릭스 준수)
  switch (state) {
    case STATES.LOADING:
      renderLoading();
      break;
    case STATES.TITLE:
      tw.update(dt);
      renderTitle();
      break;
    case STATES.WAVE_PREP:
      tw.update(dt);
      updateParticles(dt);
      renderGame();
      renderWavePrep();
      break;
    case STATES.PLAYING:
      tw.update(dt);
      updateWave(dt);
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
      updateParticles(dt);
      checkGameOver();
      renderGame();
      break;
    case STATES.PAUSE:
      tw.update(dt); // ← Cycle 2 B1 교훈: 모든 상태에서 tween 업데이트
      renderGame();
      renderPause();
      break;
    case STATES.CONFIRM_MODAL:
      tw.update(dt); // ← Cycle 2 B1 교훈: 모달 애니메이션 동작 보장
      renderGame();
      renderModal();
      break;
    case STATES.GAMEOVER:
      tw.update(dt); // ← 결과 화면 애니메이션
      updateParticles(dt);
      renderGame();
      renderGameover();
      break;
  }

  rafId = requestAnimationFrame(loop);
}

// ═══════════════════ INIT ═══════════════════
async function init() {
  resize();
  renderLoading();

  await preloadAssets();

  resetGame();
  state = STATES.TITLE;

  // 이벤트 등록 (listen 헬퍼로 cleanup 보장)
  listen(window, 'resize', resize);
  listen(canvas, 'mousemove', onMouseMove);
  listen(canvas, 'mousedown', onMouseDown);
  listen(canvas, 'touchstart', onTouchStart, { passive: false });
  listen(canvas, 'touchmove', onTouchMove, { passive: false });
  listen(canvas, 'contextmenu', onContextMenu);
  listen(window, 'keydown', onKeyDown);

  lastTime = performance.now();
  rafId = requestAnimationFrame(loop);
}

init();
</script>
