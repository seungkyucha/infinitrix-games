// SeededRNG — 결정론적 난수 생성 (F64: Math.random 금지)
class SeededRNG {
  constructor(seed){ this.seed = seed|0 || 12345; }
  // xorshift32 기반 난수
  next(){
    let s = this.seed;
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    this.seed = s;
    return (s >>> 0) / 4294967296;
  }
  // 범위 정수
  intRange(min,max){ return min + ((this.next()*(max-min+1))|0); }
  // 배열 셔플
  shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=this.intRange(0,i);
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }
  // 배열에서 n개 선택
  pick(arr,n){
    const copy=[...arr];
    this.shuffle(copy);
    return copy.slice(0,n);
  }
}

// TweenManager — setTimeout 0건 (F4), clearImmediate 분리 (F13)
class TweenManager {
  constructor(){ this._tweens=[]; this._toAdd=[]; this._updating=false; }
  // tween 추가
  add(target,props,duration,easing,onComplete){
    const tw = {target,props:{},duration,elapsed:0,easing:easing||'easeOut',onComplete,done:false};
    for(const k in props) tw.props[k]={from:target[k]||0,to:props[k]};
    if(this._updating) this._toAdd.push(tw);
    else this._tweens.push(tw);
    return tw;
  }
  // 즉시 정리 (F13)
  clearImmediate(){
    this._tweens.length=0;
    this._toAdd.length=0;
  }
  // 특정 타겟 제거
  cancelTarget(target){
    this._tweens=this._tweens.filter(t=>t.target!==target);
    this._toAdd=this._toAdd.filter(t=>t.target!==target);
  }
  // 업데이트
  update(dt){
    this._updating=true;
    for(let i=this._tweens.length-1;i>=0;i--){
      const tw=this._tweens[i];
      if(tw.done) continue;
      tw.elapsed+=dt;
      let t=Math.min(tw.elapsed/tw.duration,1);
      const et=this._ease(t,tw.easing);
      for(const k in tw.props){
        const p=tw.props[k];
        tw.target[k]=p.from+(p.to-p.from)*et;
      }
      if(t>=1){
        tw.done=true;
        if(tw.onComplete) tw.onComplete();
      }
    }
    this._tweens=this._tweens.filter(t=>!t.done);
    this._updating=false;
    if(this._toAdd.length){
      this._tweens.push(...this._toAdd);
      this._toAdd.length=0;
    }
  }
  // 이징 함수
  _ease(t,type){
    switch(type){
      case'linear':return t;
      case'easeIn':return t*t;
      case'easeOut':return 1-(1-t)*(1-t);
      case'easeInOut':return t<0.5?2*t*t:1-2*(1-t)*(1-t);
      case'bounce':return t<0.5?4*t*t*t:1-(-2*t+2)**3/2;
      default:return 1-(1-t)*(1-t);
    }
  }
  get count(){ return this._tweens.length; }
}

// ObjectPool — 파티클/이펙트 재활용
class ObjectPool {
  constructor(factory,max){
    this._pool=[]; this._active=[]; this._factory=factory; this._max=max;
  }
  // 풀에서 가져오기
  get(){
    let obj=this._pool.pop();
    if(!obj){
      if(this._active.length>=this._max) return null;
      obj=this._factory();
    }
    obj.active=true;
    this._active.push(obj);
    return obj;
  }
  // 반환
  release(obj){
    obj.active=false;
    this._active=this._active.filter(o=>o!==obj);
    this._pool.push(obj);
  }
  // 전체 반환
  releaseAll(){
    for(const o of this._active){ o.active=false; this._pool.push(o); }
    this._active.length=0;
  }
  // 활성 객체 순회
  forEach(fn){ for(let i=this._active.length-1;i>=0;i--) fn(this._active[i],i); }
  get activeCount(){ return this._active.length; }
}

// SoundManager — Web Audio API (프로시저럴 BGM + SFX)
class SoundManager {
  constructor(){
    this.ctx=null; this.enabled=true; this.musicEnabled=true;
    this.bgmGain=null; this.sfxGain=null; this._bgmOsc=null;
  }
  // 오디오 컨텍스트 초기화
  init(){
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.bgmGain=this.ctx.createGain();
      this.bgmGain.gain.value=0.15;
      this.bgmGain.connect(this.ctx.destination);
      this.sfxGain=this.ctx.createGain();
      this.sfxGain.gain.value=0.3;
      this.sfxGain.connect(this.ctx.destination);
    }catch(e){}
  }
  // 컨텍스트 재개 (터치/클릭 시)
  resume(){ if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); }
  // 효과음 재생
  playSfx(type,pitch){
    if(!this.ctx||!this.enabled) return;
    const now=this.ctx.currentTime;
    const osc=this.ctx.createOscillator();
    const env=this.ctx.createGain();
    osc.connect(env); env.connect(this.sfxGain);
    switch(type){
      case'match':
        osc.frequency.value=440*(pitch||1);
        osc.type='sine';
        env.gain.setValueAtTime(0.4,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.15);
        osc.start(now); osc.stop(now+0.15); break;
      case'combo':
        osc.frequency.value=523*(pitch||1);
        osc.type='triangle';
        env.gain.setValueAtTime(0.3,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.3);
        osc.start(now); osc.stop(now+0.3); break;
      case'spell':
        osc.frequency.value=330*(pitch||1);
        osc.type='sawtooth';
        env.gain.setValueAtTime(0.25,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.4);
        osc.start(now); osc.stop(now+0.4); break;
      case'hit':
        osc.frequency.value=150;
        osc.type='square';
        env.gain.setValueAtTime(0.35,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.1);
        osc.start(now); osc.stop(now+0.1); break;
      case'playerHit':
        osc.frequency.value=200;
        osc.type='sawtooth';
        env.gain.setValueAtTime(0.4,now);
        env.gain.linearRampToValueAtTime(0,now+0.2);
        osc.start(now); osc.stop(now+0.2); break;
      case'select':
        osc.frequency.value=660;
        osc.type='sine';
        env.gain.setValueAtTime(0.2,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.08);
        osc.start(now); osc.stop(now+0.08); break;
      case'relic':
        osc.frequency.value=523;
        osc.type='triangle';
        env.gain.setValueAtTime(0.3,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.5);
        const osc2=this.ctx.createOscillator();
        osc2.connect(env); osc2.frequency.value=659; osc2.type='triangle';
        osc2.start(now+0.15); osc2.stop(now+0.5);
        osc.start(now); osc.stop(now+0.5); break;
      case'victory':
        osc.frequency.value=523;
        osc.type='triangle';
        env.gain.setValueAtTime(0.3,now);
        env.gain.linearRampToValueAtTime(0,now+1);
        osc.start(now); osc.stop(now+1); break;
      case'bossPhase':
        osc.frequency.value=100;
        osc.type='square';
        env.gain.setValueAtTime(0.4,now);
        env.gain.linearRampToValueAtTime(0,now+0.6);
        osc.start(now); osc.stop(now+0.6); break;
      default:
        osc.frequency.value=440;
        osc.type='sine';
        env.gain.setValueAtTime(0.2,now);
        env.gain.exponentialRampToValueAtTime(0.01,now+0.1);
        osc.start(now); osc.stop(now+0.1);
    }
  }
  // 간단한 BGM 시작
  startBgm(type){
    this.stopBgm();
    if(!this.ctx||!this.musicEnabled) return;
    const now=this.ctx.currentTime;
    this._bgmInterval=type;
    // 간단한 아르페지오 BGM
    const notes = type==='boss'?[165,196,220,262]:type==='battle'?[220,262,330,392]:[262,330,392,523];
    let step=0;
    const playNote=()=>{
      if(!this.musicEnabled||this._bgmInterval!==type) return;
      const osc=this.ctx.createOscillator();
      const env=this.ctx.createGain();
      osc.connect(env); env.connect(this.bgmGain);
      osc.frequency.value=notes[step%notes.length];
      osc.type=type==='boss'?'sawtooth':'triangle';
      const t=this.ctx.currentTime;
      env.gain.setValueAtTime(0.15,t);
      env.gain.exponentialRampToValueAtTime(0.01,t+0.3);
      osc.start(t); osc.stop(t+0.35);
      step++;
    };
    // 노트 스케줄링용 루프 (tween 기반)
    this._bgmStep=0;
    this._bgmType=type;
    this._bgmNotes=notes;
    this._bgmTimer=0;
  }
  // BGM 업데이트 (메인 루프에서 호출)
  updateBgm(dt){
    if(!this.ctx||!this.musicEnabled||!this._bgmType) return;
    this._bgmTimer+=dt;
    const interval=this._bgmType==='boss'?250:this._bgmType==='battle'?350:500;
    if(this._bgmTimer>=interval){
      this._bgmTimer-=interval;
      const osc=this.ctx.createOscillator();
      const env=this.ctx.createGain();
      osc.connect(env); env.connect(this.bgmGain);
      osc.frequency.value=this._bgmNotes[this._bgmStep%this._bgmNotes.length];
      osc.type=this._bgmType==='boss'?'sawtooth':'triangle';
      const t=this.ctx.currentTime;
      env.gain.setValueAtTime(0.12,t);
      env.gain.exponentialRampToValueAtTime(0.01,t+0.25);
      osc.start(t); osc.stop(t+0.3);
      this._bgmStep++;
    }
  }
  // BGM 정지
  stopBgm(){ this._bgmType=null; this._bgmTimer=0; this._bgmStep=0; }
}

// hitTest — 단일 판정 함수 (F60)
function hitTest(px, py, rect){
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// InputManager — 키보드/마우스/터치 통합
class InputManager {
  constructor(){
    this.keys={}; this.justPressed={};
    this.mouseX=0; this.mouseY=0; this.mouseDown=false; this.mouseJustDown=false;
    this.mouseJustUp=false; this.mouseUpX=0; this.mouseUpY=0;
    this.dragStartX=0; this.dragStartY=0; this.isDragging=false;
    this.swipeDir=null; this.touchActive=false;
    this._prevKeys={}; this._queuedKeys=[];
  }
  // 키보드 이벤트 등록
  bindKeyboard(){
    document.addEventListener('keydown',e=>{
  // Prevent browser default for game keys
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
      if(!this.keys[e.code]) this._queuedKeys.push(e.code);
      this.keys[e.code]=true;
      e.preventDefault();
    });
    document.addEventListener('keyup',e=>{
      this.keys[e.code]=false;
      e.preventDefault();
    });
  }
  // 마우스 이벤트 등록
  bindMouse(canvas, getScale){
    canvas.addEventListener('mousedown',e=>{
      const r=canvas.getBoundingClientRect();
      const s=getScale();
      this.mouseX=(e.clientX-r.left)*s.sx;
      this.mouseY=(e.clientY-r.top)*s.sy;
      this.mouseDown=true; this.mouseJustDown=true;
      this.dragStartX=this.mouseX; this.dragStartY=this.mouseY;
      this.isDragging=false; this.swipeDir=null;
      sound.resume();
    });
    canvas.addEventListener('mousemove',e=>{
      const r=canvas.getBoundingClientRect();
      const s=getScale();
      this.mouseX=(e.clientX-r.left)*s.sx;
      this.mouseY=(e.clientY-r.top)*s.sy;
      if(this.mouseDown){
        const dx=this.mouseX-this.dragStartX;
        const dy=this.mouseY-this.dragStartY;
        if(!this.isDragging && (dx*dx+dy*dy>400)){
          this.isDragging=true;
          if(Math.abs(dx)>Math.abs(dy)) this.swipeDir=dx>0?'right':'left';
          else this.swipeDir=dy>0?'down':'up';
        }
      }
    });
    canvas.addEventListener('mouseup',e=>{
      const r=canvas.getBoundingClientRect();
      const s=getScale();
      this.mouseUpX=(e.clientX-r.left)*s.sx;
      this.mouseUpY=(e.clientY-r.top)*s.sy;
      this.mouseDown=false; this.mouseJustUp=true;
    });
  }
  // 터치 이벤트 등록
  bindTouch(canvas, getScale){
    const handle=(e,type)=>{
      e.preventDefault();
      const t=e.touches[0]||e.changedTouches[0];
      if(!t) return;
      const r=canvas.getBoundingClientRect();
      const s=getScale();
      const px=(t.clientX-r.left)*s.sx;
      const py=(t.clientY-r.top)*s.sy;
      if(type==='start'){
        this.mouseX=px; this.mouseY=py;
        this.mouseDown=true; this.mouseJustDown=true;
        this.dragStartX=px; this.dragStartY=py;
        this.isDragging=false; this.swipeDir=null;
        this.touchActive=true;
        sound.resume();
      }else if(type==='move'){
        this.mouseX=px; this.mouseY=py;
        const dx=px-this.dragStartX;
        const dy=py-this.dragStartY;
        if(!this.isDragging && (dx*dx+dy*dy>400)){
          this.isDragging=true;
          if(Math.abs(dx)>Math.abs(dy)) this.swipeDir=dx>0?'right':'left';
          else this.swipeDir=dy>0?'down':'up';
        }
      }else{
        this.mouseUpX=px; this.mouseUpY=py;
        this.mouseDown=false; this.mouseJustUp=true;
      }
    };
    canvas.addEventListener('touchstart',e=>handle(e,'start'),{passive:false});
    canvas.addEventListener('touchmove',e=>handle(e,'move'),{passive:false});
    canvas.addEventListener('touchend',e=>handle(e,'end'),{passive:false});
    canvas.addEventListener('touchcancel',e=>handle(e,'end'),{passive:false});
  }
  // 프레임 시작 시 입력 상태 처리
  process(){
    this.justPressed={};
    for(const k of this._queuedKeys) this.justPressed[k]=true;
    this._queuedKeys.length=0;
  }
  // 프레임 끝 입력 리셋
  endFrame(){
    this.mouseJustDown=false;
    this.mouseJustUp=false;
    this.swipeDir=null;
    this.isDragging=false;
  }
}

// ══ REGION 4: MATCH ENGINE — 보석 그리드, 매치, 캐스케이드 ══
// ══════════════════════════════════════════════════════════════

// 보석 그리드 생성 (매치 없는 초기 보드)
function createGrid(rng, size){
  const grid = Array.from({length:size},()=>Array(size).fill(0));
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let elem;
      do{
        elem = rng.intRange(0,CONFIG.ELEMENT_COUNT-1);
      }while(wouldMatch(grid,r,c,elem,size));
      grid[r][c] = elem;
    }
  }
  return grid;
}

// 배치 시 3매치 방지 체크
function wouldMatch(grid,r,c,elem,size){
  // 가로 체크
  if(c>=2 && grid[r][c-1]===elem && grid[r][c-2]===elem) return true;
  // 세로 체크
  if(r>=2 && grid[r-1][c]===elem && grid[r-2][c]===elem) return true;
  return false;
}

// 매치 검출 (5→T→L→4→3 우선순위)
function findMatches(grid, size){
  const matched = Array.from({length:size},()=>Array(size).fill(false));
  const matches = [];
  // 가로 스캔
  for(let r=0;r<size;r++){
    let c=0;
    while(c<size){
      const elem=grid[r][c];
      if(elem<0){c++;continue;}
      let end=c;
      while(end<size && grid[r][end]===elem) end++;
      const len=end-c;
      if(len>=3) matches.push({type:'h',r,c,len,elem});
      c=end;
    }
  }
  // 세로 스캔
  for(let c=0;c<size;c++){
    let r=0;
    while(r<size){
      const elem=grid[r][c];
      if(elem<0){r++;continue;}
      let end=r;
      while(end<size && grid[end][c]===elem) end++;
      const len=end-r;
      if(len>=3) matches.push({type:'v',r,c,len,elem});
      r=end;
    }
  }
  // 매치 분류 (교차점 검출로 L/T 판정)
  const result = [];
  const used = Array.from({length:size},()=>Array(size).fill(false));

  // 5매치 우선
  for(const m of matches){
    if(m.len>=5){
      const cells=[];
      if(m.type==='h') for(let i=0;i<m.len;i++) cells.push([m.r,m.c+i]);
      else for(let i=0;i<m.len;i++) cells.push([m.r+i,m.c]);
      result.push({type:'5',elem:m.elem,cells,mana:CONFIG.MATCH_5_MANA,score:CONFIG.SCORE_5});
      cells.forEach(([r,c])=>used[r][c]=true);
    }
  }
  // L/T 매치 (교차하는 3+3매치)
  for(let i=0;i<matches.length;i++){
    const a=matches[i];
    if(a.len<3||a.len>=5) continue;
    for(let j=i+1;j<matches.length;j++){
      const b=matches[j];
      if(b.len<3||b.len>=5||b.elem!==a.elem) continue;
      if(a.type===b.type) continue;
      // 교차점 확인
      const ha=a.type==='h'?a:b;
      const va=a.type==='v'?a:b;
      if(ha.r>=va.r && ha.r<va.r+va.len && va.c>=ha.c && va.c<ha.c+ha.len){
        const cells=new Set();
        if(ha.type==='h') for(let k=0;k<ha.len;k++) cells.add(`${ha.r},${ha.c+k}`);
        if(va.type==='v') for(let k=0;k<va.len;k++) cells.add(`${va.r+k},${va.c}`);
        const cellArr=[...cells].map(s=>{const[r,c]=s.split(',').map(Number);return[r,c];});
        if(cellArr.every(([r,c])=>!used[r][c])){
          const isT = (ha.len>=3&&va.len>=3) && (va.c===ha.c+((ha.len-1)/2|0) || ha.r===va.r+((va.len-1)/2|0));
          result.push({type:isT?'T':'L',elem:a.elem,cells:cellArr,
            mana:isT?CONFIG.MATCH_T_MANA:CONFIG.MATCH_L_MANA,
            score:isT?CONFIG.SCORE_T:CONFIG.SCORE_L});
          cellArr.forEach(([r,c])=>used[r][c]=true);
        }
      }
    }
  }
  // 4매치
  for(const m of matches){
    if(m.len===4){
      const cells=[];
      if(m.type==='h') for(let i=0;i<4;i++) cells.push([m.r,m.c+i]);
      else for(let i=0;i<4;i++) cells.push([m.r+i,m.c]);
      if(cells.every(([r,c])=>!used[r][c])){
        result.push({type:'4',elem:m.elem,cells,mana:CONFIG.MATCH_4_MANA,score:CONFIG.SCORE_4});
        cells.forEach(([r,c])=>used[r][c]=true);
      }
    }
  }
  // 3매치 (나머지)
  for(const m of matches){
    if(m.len>=3){
      const cells=[];
      if(m.type==='h') for(let i=0;i<m.len;i++) cells.push([m.r,m.c+i]);
      else for(let i=0;i<m.len;i++) cells.push([m.r+i,m.c]);
      const unused=cells.filter(([r,c])=>!used[r][c]);
      if(unused.length>=3){
        const sub=unused.slice(0,3);
        result.push({type:'3',elem:m.elem,cells:sub,mana:CONFIG.MATCH_3_MANA,score:CONFIG.SCORE_3});
        sub.forEach(([r,c])=>used[r][c]=true);
      }
    }
  }
  return result;
}

// 중력 낙하 — 빈 셀(-1) 위의 보석이 아래로 이동
function applyGravity(grid, size, rng){
  const drops = [];
  for(let c=0;c<size;c++){
    let writeRow=size-1;
    for(let r=size-1;r>=0;r--){
      if(grid[r][c]>=0||(grid[r][c]<=-2)){
        // 장애물(-2,-3)은 제자리에 유지 — skip gravity for obstacles
        if(grid[r][c]<=-2){
          // 장애물은 이동하지 않음, writeRow 감소
          if(r===writeRow) writeRow--;
          continue;
        }
        if(r!==writeRow){
          drops.push({fromR:r,fromC:c,toR:writeRow,toC:c,elem:grid[r][c]});
          grid[writeRow][c]=grid[r][c];
          if(G.gridSpecial){
            G.gridSpecial[writeRow][c]=G.gridSpecial[r][c];
            G.gridSpecial[r][c]=null;
          }
          grid[r][c]=-1;
        }
        writeRow--;
      }
    }
    // 상단 빈 셀에 새 보석
    for(let r=writeRow;r>=0;r--){
      if(grid[r][c]<=-2) continue; // 장애물 셀은 건너뜀
      const elem=rng.intRange(0,CONFIG.ELEMENT_COUNT-1);
      grid[r][c]=elem;
      if(G.gridSpecial) G.gridSpecial[r][c]=null;
      drops.push({fromR:r-size,fromC:c,toR:r,toC:c,elem,isNew:true});
    }
  }
  return drops;
}

// 가능한 매치 찾기 (힌트용)
function findPossibleMove(grid, size){
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      // 오른쪽 스왑
      if(c<size-1){
        [grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];
        if(findMatches(grid,size).length>0){
          [grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];
          return {r1:r,c1:c,r2:r,c2:c+1};
        }
        [grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];
      }
      // 아래 스왑
      if(r<size-1){
        [grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];
        if(findMatches(grid,size).length>0){
          [grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];
          return {r1:r,c1:c,r2:r+1,c2:c};
        }
        [grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];
      }
    }
  }
  return null;
}

// 적 생성
function createEnemy(typeIdx, hpBase, atkBase, diffMul, atkMul){
  const t=ENEMY_TYPES[typeIdx];
  return {
    type:typeIdx, name:t.name, ko:t.ko,
    hp:Math.round(hpBase*t.hpMul*diffMul), maxHp:Math.round(hpBase*t.hpMul*diffMul),
    atk:Math.round(atkBase*atkMul), trait:t.trait, armor:t.armor||0,
    healPct:t.healPct||0, stunned:0, slowed:0, dot:0, dotDmg:0,
    atkDebuff:0, atkDebuffTurns:0, alive:true,
    animX:0, animY:0, hitFlash:0, elem:null
  };
}

// 스테이지 적 생성
function createStageEnemies(regionIdx, stageIdx, difficulty){
  const region=REGION_DATA[regionIdx];
  const stageData=region.stages[stageIdx];
  const enemies=[];
  const baseHp=80+regionIdx*40+stageIdx*20;
  const baseAtk=8+regionIdx*3+stageIdx*2;
  for(const group of stageData){
    for(let i=0;i<group.c;i++){
      enemies.push(createEnemy(group.t, baseHp, baseAtk,
        CONFIG.DIFFICULTY_ENEMY_HP[difficulty],
        CONFIG.DIFFICULTY_ENEMY_ATK[difficulty]));
    }
  }
  return enemies;
}

// 보스 생성
function createBoss(regionIdx, difficulty){
  const bd=REGION_DATA[regionIdx].boss;
  const mul=CONFIG.DIFFICULTY_ENEMY_HP[difficulty];
  return {
    name:bd.name, ko:bd.ko, hp:Math.round(bd.hp*mul), maxHp:Math.round(bd.hp*mul),
    phases:bd.phases, weakElem:bd.weakElem, currentPhase:0,
    atk:bd.phases[0].atk, alive:true, animX:0, animY:0, hitFlash:0,
    weakExposed:0, weakTimer:0, phaseTransitioning:false,
    shield:0, stunned:0, dotArr:[], atkDebuff:0, atkDebuffTurns:0,
    tentacles:bd.phases[0].tentacles||0, tentacleHp:bd.phases[0].tentacles?Array(bd.phases[0].tentacles).fill(200*mul):[]
  };
}

// 유물 선택지 생성
function generateRelicChoices(rng, difficulty, ownedRelics){
  const count=difficulty===0?4:3;
  const available=RELICS.filter(r=>{
    const owned=ownedRelics.filter(o=>o.id===r.id).length;
    return owned<2;
  });
  // 등급 확률
  const choices=[];
  const guaranteeRare=difficulty===0;
  for(let i=0;i<count;i++){
    const roll=rng.next();
    let tier;
    if(guaranteeRare&&i===0) tier=1;
    else if(difficulty===2) tier=0;
    else if(roll<0.1) tier=2;
    else if(roll<0.4) tier=1;
    else tier=0;
    const pool=available.filter(r=>r.tier===tier);
    if(pool.length>0){
      choices.push(pool[rng.intRange(0,pool.length-1)]);
    }else{
      const fallback=available.filter(r=>r.tier===0);
      if(fallback.length) choices.push(fallback[rng.intRange(0,fallback.length-1)]);
    }
  }
  return choices;
}

// 업그레이드 효과 계산
function getUpgradeEffects(){
  const eff={manaPlus:0,elemDmg:0,comboBonus:0,spellTier:1,maxHpPlus:0,
    defUp:0,regen:0,revive:false,hintCooldown:1,rarePct:0,
    bossHint:false,gemConvert:0,epicPct:0,turnBonus:0};
  const trees=['offense','defense','utility'];
  for(const tree of trees){
    const lvl=G.upgrades[tree]||0;
    const data=UPGRADE_TREES[tree];
    for(let i=0;i<lvl;i++){
      const u=data[i];
      if(u.effect==='spellTier') eff.spellTier=Math.max(eff.spellTier,u.val);
      else if(u.effect==='revive') eff.revive=true;
      else if(u.effect==='bossHint') eff.bossHint=true;
      else if(typeof eff[u.effect]==='number') eff[u.effect]+=u.val;
    }
  }
  return eff;
}

// 유물 효과 계산 (F62: 캡 적용)
function getRelicEffects(){
  const eff={manaPlus:0,elemDmg:0,startHeal:0,comboBonus:0,gemLuck:0,
    defUp:0,chainLightning:0,elemConvert:0,spellDiscount:0,regen:0,
    cascadeBoost:0,harmonyDmg:0,freeSpell:0};
  for(const r of G.ownedRelics){
    const relic=RELICS[r.id];
    if(typeof eff[relic.effect]==='number') eff[relic.effect]+=relic.val;
  }
  // DPS 캡
  eff.elemDmg=Math.min(eff.elemDmg, CONFIG.DPS_CAP_MULTIPLIER-1);
  eff.harmonyDmg=Math.min(eff.harmonyDmg, CONFIG.SYNERGY_CAP_MULTIPLIER);
  return eff;
}

// 상태 전환 (F6: STATE_PRIORITY + beginTransition + RESTART_ALLOWED 통합 [P2])
function beginTransition(target){
  // RESTART_ALLOWED: 높→낮 우선순위 허용 전환 (게임오버/승리→타이틀 등)
  const allowed=RESTART_ALLOWED[G.state];
  const isRestartAllowed=allowed&&allowed.includes(target);
  if(!isRestartAllowed){
    if(G.isTransitioning && STATE_PRIORITY[target]===undefined) return;
    const curPri=STATE_PRIORITY[G.state]||0;
    const tarPri=STATE_PRIORITY[target]||0;
    if(G.isTransitioning && tarPri<curPri) return;
  }
  G.isTransitioning=true;
  G.transitionTarget=target;
  G.transitionAlpha=0;
  tw.add(G,{transitionAlpha:1},200,'easeOut',()=>{
    G.prevState=G.state;
    G.state=target;
    G.isTransitioning=false;
    G.transitionAlpha=0;
  });
}

// 직접 상태 전환 (삭제 — 모두 beginTransition 사용)
function setState(target){
  G.prevState=G.state;
  G.state=target;
  G.isTransitioning=false;
}

// 매치 처리
function processMatches(){
  const matches=findMatches(G.grid, CONFIG.GRID_SIZE);
  if(matches.length===0) return false;
  G.combo++;
  G.comboTotal++;
  const eff=getUpgradeEffects();
  const reff=getRelicEffects();
  let totalScore=0;
  let totalMana=Array(6).fill(0);
  let elemTypes=new Set();

  for(const m of matches){
    // 마나 생성
    const bonusMana=eff.manaPlus+reff.manaPlus;
    totalMana[m.elem]+=m.mana+bonusMana;
    totalScore+=m.score;
    elemTypes.add(m.elem);

    // 특수 보석 생성: 4매치 → cross, 5매치 → rainbow
    let specialCell=null;
    if(m.type==='5'&&m.cells.length>=5){
      specialCell=m.cells[2]; // 중앙
      if(G.gridSpecial) G.gridSpecial[specialCell[0]][specialCell[1]]='rainbow';
    }else if(m.type==='4'&&m.cells.length>=4){
      specialCell=m.cells[1]; // 중앙
      if(G.gridSpecial) G.gridSpecial[specialCell[0]][specialCell[1]]='cross';
    }

    // 보석 제거 (특수 보석 생성 셀 제외)
    for(const [r,c] of m.cells){
      if(specialCell&&r===specialCell[0]&&c===specialCell[1]) continue;
      // cross 보석이 매치에 포함되면 십자 폭발
      if(G.gridSpecial&&G.gridSpecial[r][c]==='cross'){
        G.gridSpecial[r][c]=null;
        for(let i=0;i<CONFIG.GRID_SIZE;i++){
          if(G.grid[r][i]>=0){ G.grid[r][i]=-1; if(G.gridSpecial)G.gridSpecial[r][i]=null; spawnMatchParticle(r,i,m.elem); }
          if(G.grid[i][c]>=0){ G.grid[i][c]=-1; if(G.gridSpecial)G.gridSpecial[i][c]=null; spawnMatchParticle(i,c,m.elem); }
        }
      }
      G.grid[r][c]=-1;
      if(G.gridSpecial&&!(specialCell&&r===specialCell[0]&&c===specialCell[1])) G.gridSpecial[r][c]=null;
      if(G.gridAnim[r]&&G.gridAnim[r][c]) G.gridAnim[r][c].flash=1;
    }
    // 파티클 생성
    for(const [r,c] of m.cells){
      spawnMatchParticle(r,c,m.elem);
    }

    // 지역별 매치 보너스
    if(G.regionIdx===0 && m.elem===ELEM.FIRE){
      // 화산: 화염 매치 20% 추가 데미지
      const fireBonusDmg=Math.round(CONFIG.BASE_MATCH_DMG*0.2*m.cells.length);
      if(G.isBossFight) applyBossDamage(fireBonusDmg, ELEM.FIRE);
      else dealDamageToAll(fireBonusDmg);
    }
    if(G.regionIdx===2 && m.elem===ELEM.EARTH){
      // 숲: 대지 매치 방어 +15% 2턴
      G.defBuff=Math.max(G.defBuff, 0.15);
      G.defBuffTurns=Math.max(G.defBuffTurns, 2);
    }
    if(G.regionIdx===3 && (m.type==='4'||m.type==='5'||m.type==='L'||m.type==='T')){
      // 뇌운: 4매치 이상 시 번개 50 고정 데미지
      dealDamageToRandom(50);
    }
  }

  // 콤보 배율
  const comboMul=1+(G.combo-1)*CONFIG.COMBO_MULTIPLIER_STEP+eff.comboBonus+reff.comboBonus;
  totalScore=Math.round(totalScore*comboMul);
  G.score+=totalScore;

  // 마나 축적
  for(let i=0;i<6;i++) G.mana[i]+=totalMana[i];

  // 원소 조화 유물 체크
  if(elemTypes.size>=3 && reff.harmonyDmg>1){
    // 전체 적에게 보너스 데미지 (DPS 캡 적용)
    dealDamageToAll(Math.round(30*Math.min(reff.harmonyDmg,CONFIG.SYNERGY_CAP_MULTIPLIER)));
  }

  // 연쇄 번개 유물
  if(G.combo>=3 && reff.chainLightning>0){
    dealDamageToRandom(reff.chainLightning);
  }

  // 환경 효과
  const region=REGION_DATA[G.regionIdx];
  if(region){
    if(region.envBonus>0){
      for(const m of matches){
        if(m.elem===region.envElem) totalScore+=Math.round(totalScore*region.envBonus);
      }
    }
  }

  // 사운드
  if(G.combo>1) sound.playSfx('combo',1+G.combo*0.15);
  else sound.playSfx('match',1+matches.length*0.1);

  // 중력 적용
  applyGravity(G.grid, CONFIG.GRID_SIZE, G.rng);
  return true;
}

// 환경 효과 적용 (매 턴)
function applyEnvironmentEffect(){
  const region=REGION_DATA[G.regionIdx];
  if(!region||!G.grid) return;
  switch(G.regionIdx){
    case 0: // 화산: 화염 매치 추가 데미지는 processMatches에서 처리
      break;
    case 1: // 심해: 물결 보석 매 턴 1개 랜덤 생성
      {
        const r=G.rng.intRange(0,CONFIG.GRID_SIZE-1);
        const c=G.rng.intRange(0,CONFIG.GRID_SIZE-1);
        G.grid[r][c]=ELEM.WATER;
        if(G.gridSpecial) G.gridSpecial[r][c]=null;
      }
      break;
    case 2: // 숲: 대지 매치 방어 보너스는 processMatches에서 처리
      break;
    case 3: // 뇌운: 번개는 processMatches에서 처리
      break;
    case 4: // 심연: 매 턴 10% 확률 보석 변환
      {
        for(let r=0;r<CONFIG.GRID_SIZE;r++){
          for(let c=0;c<CONFIG.GRID_SIZE;c++){
            if(G.rng.next()<0.1){
              G.grid[r][c]=G.rng.intRange(0,CONFIG.ELEMENT_COUNT-1);
              if(G.gridSpecial) G.gridSpecial[r][c]=null;
            }
          }
        }
      }
      break;
  }
}

// 보스 기믹 처리
function processBossGimmick(){
  if(!G.boss||!G.boss.alive||!G.grid) return;
  const phase=G.boss.phases[G.boss.currentPhase];
  const regionIdx=G.regionIdx;
  // 장애물 타이머 갱신
  if(G.obstacleTimers){
    const keys=Object.keys(G.obstacleTimers);
    for(const k of keys){
      G.obstacleTimers[k]--;
      if(G.obstacleTimers[k]<=0){
        const[r,c]=k.split(',').map(Number);
        if(G.grid[r]&&G.grid[r][c]<0){
          G.grid[r][c]=G.rng.intRange(0,CONFIG.ELEMENT_COUNT-1);
          if(G.gridSpecial) G.gridSpecial[r][c]=null;
        }
        delete G.obstacleTimers[k];
      }
    }
  }
  switch(regionIdx){
    case 0: // Ignis — lava gem conversion
      if(phase.selfHeal===undefined||G.boss.currentPhase<2){
        let count=G.boss.currentPhase>=1?6:3;
        if(G.boss.currentPhase>=1){
          for(let r=6;r<8;r++) for(let c=0;c<8;c++){
            if(count<=0) break;
            if(G.grid[r][c]===ELEM.FIRE||G.rng.next()<0.3){
              G.grid[r][c]=-2;
              if(G.gridSpecial) G.gridSpecial[r][c]=null;
              G.obstacleTimers[r+','+c]=3;
              count--;
            }
          }
        }else{
          for(let i=0;i<count;i++){
            const r=G.rng.intRange(0,7),c=G.rng.intRange(0,7);
            if(G.grid[r][c]>=0){
              G.grid[r][c]=-2;
              if(G.gridSpecial) G.gridSpecial[r][c]=null;
              G.obstacleTimers[r+','+c]=3;
            }
          }
        }
      }
      break;
    case 1: // Aqua — ink darkening
      if(phase.ink){
        let darkCount=Math.floor(CONFIG.GRID_SIZE*CONFIG.GRID_SIZE*0.5);
        while(darkCount>0){
          const r=G.rng.intRange(0,7),c=G.rng.intRange(0,7);
          if(G.grid[r][c]>=0&&G.grid[r][c]!==-3){
            G.grid[r][c]=-3;
            if(G.gridSpecial) G.gridSpecial[r][c]=null;
            darkCount--;
          }
        }
      }
      if(phase.shuffle) shuffleBoard();
      break;
    case 2: // Terra — root obstacles
      {
        const obstacleCount=phase.obstacles||0;
        let placed=0;
        for(let attempts=0;attempts<50&&placed<obstacleCount;attempts++){
          const r=G.rng.intRange(0,7),c=G.rng.intRange(0,7);
          if(G.grid[r][c]>=0&&G.grid[r][c]!==-2){
            G.grid[r][c]=-2;
            if(G.gridSpecial) G.gridSpecial[r][c]=null;
            G.obstacleTimers[r+','+c]=3;
            placed++;
          }
        }
        if(phase.selfHeal){
          G.boss.hp=Math.min(G.boss.maxHp,G.boss.hp+Math.round(G.boss.maxHp*0.05));
        }
      }
      break;
    case 3: // Aero — swap gems
      if(phase.swapGems){
        for(let i=0;i<phase.swapGems;i++){
          const r1=G.rng.intRange(0,7),c1=G.rng.intRange(0,7);
          const r2=G.rng.intRange(0,7),c2=G.rng.intRange(0,7);
          [G.grid[r1][c1],G.grid[r2][c2]]=[G.grid[r2][c2],G.grid[r1][c1]];
          if(G.gridSpecial){
            [G.gridSpecial[r1][c1],G.gridSpecial[r2][c2]]=[G.gridSpecial[r2][c2],G.gridSpecial[r1][c1]];
          }
        }
      }
      if(phase.barrier) G.boss.shield=phase.barrier;
      if(phase.reflect) G.boss.reflect=phase.reflect;
      if(phase.reviveTimer){
        if(!G.boss._reviveCountdown) G.boss._reviveCountdown=phase.reviveTimer;
        G.boss._reviveCountdown--;
        if(G.boss._reviveCountdown<=0){
          G.boss.hp=Math.min(G.boss.maxHp,G.boss.hp+Math.round(G.boss.maxHp*0.3));
          G.boss._reviveCountdown=phase.reviveTimer;
        }
      }
      break;
    case 4: // Nox — element shift + corruption
      if(phase.elemShift){
        if(G.turn%phase.elemShift===0){
          G.boss.currentElem=G.rng.intRange(0,5);
          G.boss.weakElem=G.boss.currentElem;
        }
      }
      if(phase.corrupt){
        let count=phase.corrupt;
        for(let i=0;i<CONFIG.GRID_SIZE&&count>0;i++){
          if(G.grid[0][i]>=0){ G.grid[0][i]=ELEM.DARK; count--; }
          if(count>0&&G.grid[7][i]>=0){ G.grid[7][i]=ELEM.DARK; count--; }
          if(count>0&&i>0&&i<7&&G.grid[i][0]>=0){ G.grid[i][0]=ELEM.DARK; count--; }
          if(count>0&&i>0&&i<7&&G.grid[i][7]>=0){ G.grid[i][7]=ELEM.DARK; count--; }
        }
      }
      if(phase.manaDisrupt) G.boss._manaDisrupt=phase.manaDisrupt;
      break;
  }
}

// 적 전체 데미지
function dealDamageToAll(dmg){
  if(G.isBossFight && G.boss && G.boss.alive){
    applyBossDamage(dmg, -1);
  }else{
    for(const e of G.enemies){
      if(e.alive){
        e.hp-=dmg;
        e.hitFlash=1;
        if(e.hp<=0){ e.alive=false; G.score+=CONFIG.ENEMY_KILL_SCORE[e.type]||200; }
      }
    }
  }
}

// 랜덤 적 데미지
function dealDamageToRandom(dmg){
  if(G.isBossFight && G.boss && G.boss.alive){
    applyBossDamage(dmg,-1);
  }else{
    const alive=G.enemies.filter(e=>e.alive);
    if(alive.length){
      const t=alive[G.rng.intRange(0,alive.length-1)];
      t.hp-=dmg; t.hitFlash=1;
      if(t.hp<=0){ t.alive=false; G.score+=CONFIG.ENEMY_KILL_SCORE[t.type]||200; }
    }
  }
}

// 보스 데미지 적용
function applyBossDamage(dmg, elemIdx){
  if(!G.boss||!G.boss.alive) return;
  const b=G.boss;
  // 약점 배율
  let mul=1;
  if(elemIdx>=0 && elemIdx===b.weakElem) mul=CONFIG.ELEMENT_STRONG;
  if(b.weakExposed>0) mul*=2;
  // 쉴드
  if(b.shield>0) dmg=Math.round(dmg*(1-b.shield));
  const finalDmg=Math.round(dmg*mul);
  b.hp-=finalDmg;
  b.hitFlash=1;
  spawnHitParticle(b.animX||canvas.width*0.7, b.animY||canvas.height*0.3);
  // 반사 데미지
  if(b.reflect&&b.reflect>0){
    const reflectDmg=Math.round(finalDmg*b.reflect);
    G.hp-=reflectDmg;
    if(reflectDmg>0){
      G.flashAlpha=0.3; G.flashColor='#9b59b6';
    }
  }
  // 페이즈 전환 체크
  checkBossPhase();
}

// 보스 페이즈 체크
function checkBossPhase(){
  if(!G.boss||G.boss.phaseTransitioning) return;
  const b=G.boss;
  if(b.hp<=0){
    b.alive=false;
    b.hp=0;
    return;
  }
  const hpPct=b.hp/b.maxHp;
  const phases=b.phases;
  for(let i=phases.length-1;i>b.currentPhase;i--){
    if(hpPct<=phases[i].hp||(i===phases.length-1&&phases[i].hp===0&&b.currentPhase<i)){
      b.phaseTransitioning=true;
      b.currentPhase=i;
      b.atk=phases[i].atk||b.atk;
      b.weakExposed=0;
      b.weakTimer=0;
      b.shield=phases[i].barrier||0;
      sound.playSfx('bossPhase');
      G.camShakeIntensity=8;
      tw.add(G,{camShakeIntensity:0},500,'easeOut',()=>{
        b.phaseTransitioning=false;
      });
      break;
    }
  }
}

// 스펠 시전
function castSpell(elemIdx, tier){
  if(elemIdx<0||elemIdx>=6) return false;
  const spell=SPELLS[elemIdx][tier];
  if(!spell) return false;
  const reff=getRelicEffects();
  const cost=Math.max(1, spell.cost-(reff.spellDiscount||0));
  // 무료 스펠 체크
  const isFree=G.freeSpellTimer>0&&reff.freeSpell>0;
  if(!isFree && G.mana[elemIdx]<cost) return false;
  if(!isFree) G.mana[elemIdx]-=cost;
  else G.freeSpellTimer=reff.freeSpell; // 리셋

  G.allSpellsCast.add(elemIdx);
  sound.playSfx('spell',0.8+elemIdx*0.1);

  const eff=getUpgradeEffects();
  const dmgMul=1+eff.elemDmg+reff.elemDmg;
  const baseDmg=Math.round(spell.dmg*dmgMul);

  if(spell.dmg>0){
    if(spell.aoe){
      if(G.isBossFight) applyBossDamage(baseDmg, elemIdx);
      else{
        for(const e of G.enemies){
          if(!e.alive) continue;
          let d=baseDmg;
          if(e.elem!==null) d=Math.round(d*ELEM_MATRIX[elemIdx][e.elem]);
          if(e.armor) d=Math.round(d*(1-e.armor));
          e.hp-=d; e.hitFlash=1;
          if(e.hp<=0){ e.alive=false; G.score+=CONFIG.ENEMY_KILL_SCORE[e.type]||200; }
        }
      }
    }else{
      // 단일 타겟 (첫 번째 살아있는 적)
      if(G.isBossFight) applyBossDamage(baseDmg, elemIdx);
      else{
        const target=G.enemies.find(e=>e.alive);
        if(target){
          let d=baseDmg;
          if(target.armor) d=Math.round(d*(1-target.armor));
          target.hp-=d; target.hitFlash=1;
          if(target.hp<=0){ target.alive=false; G.score+=CONFIG.ENEMY_KILL_SCORE[target.type]||200; }
        }
      }
    }
  }

  // 추가 효과
  if(spell.heal) G.hp=Math.min(G.maxHp, G.hp+spell.heal);
  if(spell.defBuff){ G.defBuff=spell.defBuff; G.defBuffTurns=spell.buffTurns; }
  if(spell.dodge) G.dodge+=spell.dodge;
  if(spell.invuln) G.invuln=spell.invuln;
  if(spell.stun){
    if(G.isBossFight&&G.boss) G.boss.stunned=spell.stun;
    else G.enemies.forEach(e=>{if(e.alive)e.stunned=spell.stun;});
  }
  if(spell.slow){
    G.enemies.forEach(e=>{if(e.alive)e.slowed=spell.slow;});
  }
  if(spell.dot){
    if(G.isBossFight&&G.boss) G.boss.dotArr.push({turns:spell.dot,dmg:spell.dotDmg});
    else G.enemies.forEach(e=>{if(e.alive){e.dot=spell.dot;e.dotDmg=spell.dotDmg;}});
  }
  if(spell.atkDebuff){
    if(G.isBossFight&&G.boss){G.boss.atkDebuff=spell.atkDebuff;G.boss.atkDebuffTurns=spell.debuffTurns;}
    else G.enemies.forEach(e=>{if(e.alive){e.atkDebuff=spell.atkDebuff;e.atkDebuffTurns=spell.debuffTurns;}});
  }
  if(spell.defBreak){
    G.enemies.forEach(e=>{if(e.alive)e.armor=0;});
  }
  if(spell.cleanse){
    G.defBuff=0; G.defBuffTurns=0; G.dodge=0;
  }

  // 파티클
  for(let i=0;i<15;i++) spawnSpellParticle(elemIdx);

  G.spellAnimTimer=600;
  setState(STATE.SPELL_ANIM);
  return true;
}

// 적 턴 처리
function processEnemyTurn(){
  const eff=getUpgradeEffects();
  const reff=getRelicEffects();
  let totalDmg=0;

  if(G.isBossFight && G.boss && G.boss.alive){
    if(G.boss.stunned>0){ G.boss.stunned--; }
    else{
      let atk=G.boss.atk;
      if(G.boss.atkDebuff>0){
        atk=Math.round(atk*(1-G.boss.atkDebuff));
        G.boss.atkDebuffTurns--;
        if(G.boss.atkDebuffTurns<=0) G.boss.atkDebuff=0;
      }
      totalDmg+=atk;
    }
    // DoT 처리
    for(let i=G.boss.dotArr.length-1;i>=0;i--){
      const d=G.boss.dotArr[i];
      G.boss.hp-=d.dmg;
      d.turns--;
      if(d.turns<=0) G.boss.dotArr.splice(i,1);
    }
    // 보스 자가치유
    const phase=G.boss.phases[G.boss.currentPhase];
    if(phase.selfHeal) G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+phase.selfHeal);
    // 약점 타이머
    if(G.boss.weakExposed>0) G.boss.weakExposed--;
    checkBossPhase();
  }else{
    for(const e of G.enemies){
      if(!e.alive) continue;
      if(e.stunned>0){ e.stunned--; continue; }
      let atk=e.atk;
      if(e.atkDebuff>0){
        atk=Math.round(atk*(1-e.atkDebuff));
        e.atkDebuffTurns--;
        if(e.atkDebuffTurns<=0) e.atkDebuff=0;
      }
      if(e.trait==='doubleAttack' && G.turn%2===0) atk*=2;
      totalDmg+=atk;
      // 치유사 효과
      if(e.trait==='healer'){
        for(const a of G.enemies){
          if(a.alive&&a!==e) a.hp=Math.min(a.maxHp, a.hp+Math.round(a.maxHp*e.healPct));
        }
      }
      // DoT
      if(e.dot>0){ e.hp-=e.dotDmg; e.dot--; if(e.hp<=0){e.alive=false;G.score+=CONFIG.ENEMY_KILL_SCORE[e.type]||200;} }
    }
  }

  // 데미지 적용
  if(totalDmg>0 && G.invuln<=0){
    const dodgeRoll=G.rng.next();
    if(dodgeRoll<G.dodge){ totalDmg=0; } // 회피
    else{
      const defReduction=eff.defUp+reff.defUp+(G.defBuff||0);
      totalDmg=Math.round(totalDmg*(1-Math.min(defReduction,0.8)));
      G.hp-=totalDmg;
      if(totalDmg>0){
        G.flashAlpha=0.4; G.flashColor='#e74c3c';
        G.camShakeIntensity=4;
        sound.playSfx('playerHit');
        G.hpAbove50=G.hpAbove50&&(G.hp/G.maxHp>0.5);
      }
    }
  }

  // 버프/디버프 감소
  if(G.defBuffTurns>0){ G.defBuffTurns--; if(G.defBuffTurns<=0)G.defBuff=0; }
  if(G.invuln>0) G.invuln--;
  G.dodge=0; // 매턴 리셋

  // 유물 재생
  const regenTotal=(eff.regen||0)+(reff.regen||0);
  if(regenTotal>0) G.hp=Math.min(G.maxHp, G.hp+regenTotal);

  // 무료 스펠 타이머
  if(reff.freeSpell>0){
    G.freeSpellTimer--;
    if(G.freeSpellTimer<=0) G.freeSpellTimer=reff.freeSpell;
  }

  // 환경 효과 적용
  applyEnvironmentEffect();
  // 보스 기믹 적용
  if(G.isBossFight) processBossGimmick();

  // DDA 체크
  if(totalDmg===0) G.noDmgStreak++;
  else G.noDmgStreak=0;

  G.turn++;

  // 스펠 쿨다운 감소
  for(let i=0;i<6;i++) if(G.spellCooldowns[i]>0) G.spellCooldowns[i]--;

  // 사망 체크
  if(G.hp<=0){
    // 부활 체크
    const uEff=getUpgradeEffects();
    if(uEff.revive && !G.reviveUsed){
      G.hp=Math.round(G.maxHp*0.3);
      G.reviveUsed=true;
      G.flashAlpha=0.6; G.flashColor='#ffd700';
    }else{
      G.hp=0;
      handleGameOver();
      return;
    }
  }

  // 전투 종료 체크
  checkBattleEnd();
}

// 전투 종료 체크 — 적 턴 종료 후 호출, checkEnemiesDefeated()에 위임 (P2/P4 통합)
function checkBattleEnd(){
  // 전멸/사망 체크 위임 (보상은 checkEnemiesDefeated에서 1회만 지급)
  if(checkEnemiesDefeated()) return;
  // 보스전 턴 초과 체크
  if(G.isBossFight && G.turnLimit>0 && G.turn>=G.turnLimit){
    handleGameOver();
    return;
  }
  // 돌아가기
  setState(STATE.MATCH_IDLE);
  G.hintTimer=0;
  G.selectedGem=null;
}

// 게임오버 처리
function handleGameOver(){
  G.isNewBest=saveProgress();
  G.totalRuns++;
  saveSave({
    version:1, crystals:G.crystals, upgrades:G.upgrades,
    bestScore:G.bestScore, bestRegion:G.bestRegion,
    totalRuns:G.totalRuns, totalClears:G.totalClears,
    hiddenUnlocked:G.hiddenUnlocked, trueEndingSeen:G.trueEndingSeen,
    language:G.lang, difficulty:G.difficulty,
    soundEnabled:sound.enabled, musicEnabled:sound.musicEnabled
  });
  sound.stopBgm();
  G.camShakeIntensity=10;
  beginTransition(STATE.GAMEOVER);
}

// 스테이지 클리어 처리
function handleStageClear(){
  if(G.stageIdx<2){
    // 유물 선택
    G.relicChoices=generateRelicChoices(G.rng, G.difficulty, G.ownedRelics);
    if(G.relicChoices.length>0){
      setState(STATE.RELIC_SELECT);
      G.relicHover=-1;
    }else{
      advanceStage();
    }
  }else{
    // 보스전으로
    startBossFight(G.regionIdx);
  }
}

// 보스 격파 처리
function handleBossDefeat(){
  if(G.regionIdx<4){
    G.relicChoices=generateRelicChoices(G.rng, G.difficulty, G.ownedRelics);
    if(G.relicChoices.length>0){
      setState(STATE.RELIC_SELECT);
    }else{
      advanceRegion();
    }
  }else{
    // 히든 보스 조건 체크
    if(canUnlockHidden()){
      G.hiddenUnlocked=true;
      setState(STATE.HIDDEN_INTRO);
      G.introTimer=3000;
    }else{
      // 일반 엔딩
      G.totalClears++;
      G.isNewBest=saveProgress();
      beginTransition(STATE.VICTORY);
      sound.playSfx('victory');
    }
  }
}

// 히든 보스 해금 조건
function canUnlockHidden(){
  return G.hpAbove50 && G.allSpellsCast.size>=6 &&
    (G.upgrades.utility>=3);
}

// 다음 스테이지
function advanceStage(){
  G.stageIdx++;
  startBattle(G.regionIdx, G.stageIdx);
}

// 다음 지역
function advanceRegion(){
  G.regionIdx++;
  G.stageIdx=0;
  if(G.regionIdx>=5){
    G.totalClears++;
    G.isNewBest=saveProgress();
    beginTransition(STATE.VICTORY);
  }else{
    G.introTimer=2000;
    beginTransition(STATE.REGION_INTRO);
  }
}

// 업그레이드 구매
function buyUpgrade(tree, level){
  const data=UPGRADE_TREES[tree];
  if(!data||level>=data.length) return false;
  const cost=data[level].cost;
  if(G.crystals<cost) return false;
  if((G.upgrades[tree]||0)!==level) return false;
  G.crystals-=cost;
  G.upgrades[tree]=level+1;
  saveSave({
    version:1, crystals:G.crystals, upgrades:G.upgrades,
    bestScore:G.bestScore||0, bestRegion:G.bestRegion||0,
    totalRuns:G.totalRuns||0, totalClears:G.totalClears||0,
    hiddenUnlocked:G.hiddenUnlocked||false, trueEndingSeen:G.trueEndingSeen||false,
    language:G.lang, difficulty:G.difficulty,
    soundEnabled:sound.enabled, musicEnabled:sound.musicEnabled
  });
  sound.playSfx('relic');
  return true;
}

// ══ REGION 8: RENDER — 전체 드로잉 함수 ══
// ══════════════════════════════════════════════════════════════

// 보석 그리기 (순수 함수 — F9)
function drawGem(ctx, x, y, size, element, isSelected, glowAlpha, flash, specialType){
  // 장애물 렌더링
  if(element===-2){
    ctx.save();
    const s=size*0.4;
    ctx.fillStyle='#4a2800';
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3;
      ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff4500'; ctx.lineWidth=2; ctx.stroke();
    // 균열 선
    ctx.beginPath(); ctx.moveTo(x-s*0.3,y-s*0.2); ctx.lineTo(x+s*0.1,y+s*0.3);
    ctx.strokeStyle='#ff6a0088'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore(); return;
  }
  if(element===-3){
    ctx.save();
    const s=size*0.4;
    ctx.fillStyle='#0a0020';
    ctx.beginPath(); ctx.arc(x,y,s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a003060';
    ctx.beginPath(); ctx.arc(x,y,s*0.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font=`${s*0.6}px "Segoe UI",system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?',x,y);
    ctx.restore(); return;
  }
  if(element<0) return;
  const s=size*0.4;
  const [c1,c2]=ELEM_COLORS[element]||['#888','#aaa'];
  ctx.save();
  if(isSelected){
    ctx.shadowColor='#00ffcc';
    ctx.shadowBlur=12;
  }
  if(flash>0){
    ctx.globalAlpha=1-flash*0.5;
  }
  // 8각형 외형
  const r=s;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=Math.PI/8+i*Math.PI/4;
    ctx.lineTo(x+r*Math.cos(a), y+r*Math.sin(a));
  }
  ctx.closePath();
  const grad=ctx.createRadialGradient(x-s*0.2,y-s*0.2,0,x,y,s);
  grad.addColorStop(0,c2);
  grad.addColorStop(1,c1);
  ctx.fillStyle=grad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1;
  ctx.stroke();
  // 원소별 내부 문양
  ctx.globalAlpha=0.8;
  const is=s*0.45;
  switch(element){
    case ELEM.FIRE: // 불꽃
      ctx.beginPath();
      ctx.moveTo(x,y-is);
      ctx.quadraticCurveTo(x+is*0.7,y-is*0.3,x+is*0.3,y+is*0.5);
      ctx.quadraticCurveTo(x,y+is*0.2,x-is*0.3,y+is*0.5);
      ctx.quadraticCurveTo(x-is*0.7,y-is*0.3,x,y-is);
      ctx.fillStyle='#fff3';
      ctx.fill();
      break;
    case ELEM.WATER: // 물방울
      ctx.beginPath();
      ctx.moveTo(x,y-is);
      ctx.quadraticCurveTo(x+is,y,x,y+is);
      ctx.quadraticCurveTo(x-is,y,x,y-is);
      ctx.fillStyle='#fff3';
      ctx.fill();
      break;
    case ELEM.EARTH: // 나뭇잎
      ctx.beginPath();
      ctx.ellipse(x,y,is*0.4,is,Math.PI/6,0,Math.PI*2);
      ctx.fillStyle='#fff3';
      ctx.fill();
      break;
    case ELEM.WIND: // 소용돌이
      ctx.beginPath();
      for(let t=0;t<Math.PI*3;t+=0.1){
        const rr=is*(t/(Math.PI*3));
        ctx.lineTo(x+rr*Math.cos(t),y+rr*Math.sin(t));
      }
      ctx.strokeStyle='#fff4';
      ctx.lineWidth=1.5;
      ctx.stroke();
      break;
    case ELEM.LIGHT: // 별 4갈래
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x+is*Math.cos(a),y+is*Math.sin(a));
        ctx.strokeStyle='#fff5';
        ctx.lineWidth=2;
        ctx.stroke();
      }
      break;
    case ELEM.DARK: // 눈동자
      ctx.beginPath();
      ctx.arc(x,y,is*0.6,0,Math.PI*2);
      ctx.strokeStyle='#fff3';
      ctx.lineWidth=1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x,y,is*0.2,0,Math.PI*2);
      ctx.fillStyle='#fff4';
      ctx.fill();
      break;
  }
  // 특수 보석 오버레이
  if(specialType==='cross'){
    ctx.globalAlpha=0.6+0.4*Math.sin(performance.now()*0.008);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x-s*0.7,y); ctx.lineTo(x+s*0.7,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x,y+s*0.7); ctx.stroke();
    ctx.globalAlpha=1;
  }else if(specialType==='rainbow'){
    const t=performance.now()*0.003;
    ctx.globalAlpha=0.7;
    for(let i=0;i<6;i++){
      const a=t+i*Math.PI/3;
      const rx=x+s*0.35*Math.cos(a);
      const ry=y+s*0.35*Math.sin(a);
      ctx.fillStyle=ELEM_COLORS[i][0];
      ctx.beginPath(); ctx.arc(rx,ry,s*0.15,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=0.5+0.3*Math.sin(t*2);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,y,s*0.8,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  // 글로우
  if(glowAlpha>0){
    ctx.globalAlpha=glowAlpha*0.4;
    ctx.shadowColor=c1;
    ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.arc(x,y,s*0.8,0,Math.PI*2);
    ctx.fillStyle=c1;
    ctx.fill();
  }
  ctx.restore();
}

// 그리드 배경 그리기
function drawGridBg(ctx, ox, oy, cellSize, size){
  ctx.fillStyle='#1a1833';
  ctx.fillRect(ox-4,oy-4,cellSize*size+8,cellSize*size+8);
  ctx.strokeStyle='#2d2755';
  ctx.lineWidth=1;
  for(let r=0;r<=size;r++){
    ctx.beginPath();
    ctx.moveTo(ox,oy+r*cellSize);
    ctx.lineTo(ox+size*cellSize,oy+r*cellSize);
    ctx.stroke();
  }
  for(let c=0;c<=size;c++){
    ctx.beginPath();
    ctx.moveTo(ox+c*cellSize,oy);
    ctx.lineTo(ox+c*cellSize,oy+size*cellSize);
    ctx.stroke();
  }
}

// 적 그리기 (순수 함수)
function drawEnemy(ctx, x, y, size, enemyType, hp, maxHp, hitFlash){
  ctx.save();
  if(hitFlash>0){
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';
    ctx.fillRect(x-size/2,y-size/2,size,size);
    ctx.globalAlpha=1-hitFlash;
  }
  const s=size*0.8;
  const colors=['#e74c3c','#e67e22','#95a5a6','#9b59b6','#2ecc71'];
  const col=colors[enemyType]||'#e74c3c';
  switch(enemyType){
    case 0: // Grunt — humanoid
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(x,y-s*0.25,s*0.18,0,Math.PI*2); ctx.fill(); // head
      ctx.fillRect(x-s*0.15,y-s*0.07,s*0.3,s*0.35); // body
      ctx.fillRect(x-s*0.25,y+0,s*0.1,s*0.28); // left arm
      ctx.fillRect(x+s*0.15,y+0,s*0.1,s*0.28); // right arm
      ctx.fillRect(x-s*0.12,y+s*0.28,s*0.1,s*0.2); // left leg
      ctx.fillRect(x+s*0.02,y+s*0.28,s*0.1,s*0.2); // right leg
      // eyes
      ctx.fillStyle='#fff';
      ctx.fillRect(x-s*0.1,y-s*0.3,s*0.07,s*0.05);
      ctx.fillRect(x+s*0.03,y-s*0.3,s*0.07,s*0.05);
      ctx.fillStyle='#000';
      ctx.fillRect(x-s*0.08,y-s*0.29,s*0.03,s*0.03);
      ctx.fillRect(x+s*0.05,y-s*0.29,s*0.03,s*0.03);
      break;
    case 1: // Rusher — lean forward, spiky
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(x+s*0.3,y-s*0.1);
      ctx.lineTo(x+s*0.45,y-s*0.15);
      ctx.lineTo(x+s*0.35,y+s*0.05);
      ctx.lineTo(x-s*0.2,y+s*0.35);
      ctx.lineTo(x-s*0.35,y+s*0.2);
      ctx.lineTo(x-s*0.15,y-s*0.2);
      ctx.lineTo(x-s*0.05,y-s*0.35);
      ctx.lineTo(x+s*0.15,y-s*0.3);
      ctx.closePath(); ctx.fill();
      // spikes
      ctx.strokeStyle='#ff6600'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+s*0.3,y-s*0.25); ctx.lineTo(x+s*0.45,y-s*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-s*0.1,y-s*0.35); ctx.lineTo(x-s*0.15,y-s*0.5); ctx.stroke();
      // eyes
      ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(x+s*0.1,y-s*0.1,s*0.05,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+s*0.1,y-s*0.1,s*0.025,0,Math.PI*2); ctx.fill();
      break;
    case 2: // Tank — wide body with shield
      ctx.fillStyle=col;
      ctx.fillRect(x-s*0.3,y-s*0.2,s*0.6,s*0.5); // wide body
      ctx.beginPath(); ctx.arc(x,y-s*0.2,s*0.2,Math.PI,0); ctx.fill(); // top dome
      // armor plates
      ctx.strokeStyle='#6c757d'; ctx.lineWidth=3;
      ctx.strokeRect(x-s*0.28,y-s*0.18,s*0.56,s*0.46);
      ctx.beginPath(); ctx.moveTo(x-s*0.28,y+s*0.05); ctx.lineTo(x+s*0.28,y+s*0.05); ctx.stroke();
      // shield
      ctx.fillStyle='#778899';
      ctx.beginPath();
      ctx.moveTo(x-s*0.4,y-s*0.15); ctx.lineTo(x-s*0.4,y+s*0.2);
      ctx.quadraticCurveTo(x-s*0.4,y+s*0.35,x-s*0.3,y+s*0.35);
      ctx.lineTo(x-s*0.3,y-s*0.15); ctx.closePath(); ctx.fill();
      // eyes (small slits)
      ctx.fillStyle='#fff';
      ctx.fillRect(x-s*0.12,y-s*0.12,s*0.08,s*0.03);
      ctx.fillRect(x+s*0.04,y-s*0.12,s*0.08,s*0.03);
      break;
    case 3: // Caster — hooded figure with orb
      ctx.fillStyle=col;
      // hood
      ctx.beginPath();
      ctx.moveTo(x,y-s*0.4);
      ctx.quadraticCurveTo(x+s*0.25,y-s*0.2,x+s*0.2,y);
      ctx.lineTo(x-s*0.2,y);
      ctx.quadraticCurveTo(x-s*0.25,y-s*0.2,x,y-s*0.4);
      ctx.fill();
      // robe
      ctx.beginPath();
      ctx.moveTo(x-s*0.2,y); ctx.lineTo(x-s*0.25,y+s*0.35);
      ctx.lineTo(x+s*0.25,y+s*0.35); ctx.lineTo(x+s*0.2,y); ctx.closePath(); ctx.fill();
      // magic orb
      const orbGrad=ctx.createRadialGradient(x+s*0.2,y-s*0.05,0,x+s*0.2,y-s*0.05,s*0.1);
      orbGrad.addColorStop(0,'#fff');
      orbGrad.addColorStop(0.5,'#bf5fff');
      orbGrad.addColorStop(1,'#9b59b680');
      ctx.fillStyle=orbGrad;
      ctx.beginPath(); ctx.arc(x+s*0.25,y-s*0.05,s*0.1,0,Math.PI*2); ctx.fill();
      // eyes (glowing)
      ctx.fillStyle='#e0b0ff';
      ctx.beginPath(); ctx.arc(x-s*0.06,y-s*0.18,s*0.03,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+s*0.06,y-s*0.18,s*0.03,0,Math.PI*2); ctx.fill();
      break;
    case 4: // Healer — soft round shape with cross
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(x,y,s*0.3,0,Math.PI*2); ctx.fill(); // round body
      // soft glow
      ctx.globalAlpha=0.3;
      ctx.fillStyle='#2ecc71';
      ctx.beginPath(); ctx.arc(x,y,s*0.4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // cross/plus
      ctx.fillStyle='#fff';
      ctx.fillRect(x-s*0.04,y-s*0.15,s*0.08,s*0.3);
      ctx.fillRect(x-s*0.15,y-s*0.04,s*0.3,s*0.08);
      // eyes
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(x-s*0.08,y-s*0.08,s*0.04,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+s*0.08,y-s*0.08,s*0.04,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(x-s*0.08,y-s*0.08,s*0.02,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+s*0.08,y-s*0.08,s*0.02,0,Math.PI*2); ctx.fill();
      break;
    default:
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x+s/2,y+s/3); ctx.lineTo(x-s/2,y+s/3); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillRect(x-4,y-8,4,4); ctx.fillRect(x+2,y-8,4,4);
      break;
  }
  // HP 바
  const barW=size*0.8; const barH=4;
  const barX=x-barW/2; const barY=y+s/2+4;
  ctx.fillStyle='#333';
  ctx.fillRect(barX,barY,barW,barH);
  const pct=Math.max(0,hp/maxHp);
  ctx.fillStyle=pct>0.5?'#2ecc71':pct>0.25?'#f39c12':'#e74c3c';
  ctx.fillRect(barX,barY,barW*pct,barH);
  ctx.restore();
}

// 보스 그리기
function drawBoss(ctx, x, y, size, boss){
  if(!boss) return;
  ctx.save();
  const s=size;
  if(boss.hitFlash>0){
    ctx.globalAlpha=1-boss.hitFlash*0.5;
  }
  // 페이즈별 색상
  const phaseColors=['#ff4500','#9b59b6','#e74c3c','#1e90ff'];
  const pc=phaseColors[boss.currentPhase]||'#ff4500';
  // 보스 몸체
  ctx.fillStyle=pc;
  ctx.beginPath();
  ctx.arc(x,y,s*0.4,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#fff3';
  ctx.lineWidth=3;
  ctx.stroke();
  // 보스 눈
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x-s*0.1,y-s*0.08,s*0.06,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+s*0.1,y-s*0.08,s*0.06,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(x-s*0.1,y-s*0.08,s*0.03,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+s*0.1,y-s*0.08,s*0.03,0,Math.PI*2); ctx.fill();
  // 보스 장식
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3+G.envTimer*0.001;
    const rx=x+s*0.5*Math.cos(a);
    const ry=y+s*0.5*Math.sin(a);
    ctx.fillStyle=ELEM_COLORS[i][0];
    ctx.beginPath(); ctx.arc(rx,ry,s*0.05,0,Math.PI*2); ctx.fill();
  }
  // HP 바
  const barW=s*0.8; const barH=8;
  const barX=x-barW/2; const barY=y+s*0.5+10;
  ctx.fillStyle='#333';
  ctx.fillRect(barX,barY,barW,barH);
  const pct=Math.max(0,boss.hp/boss.maxHp);
  ctx.fillStyle=pct>0.5?'#e74c3c':pct>0.25?'#ff4500':'#8b0000';
  ctx.fillRect(barX,barY,barW*pct,barH);
  ctx.strokeStyle='#fff3';
  ctx.strokeRect(barX,barY,barW,barH);
  // 보스 이름
  ctx.fillStyle='#e8e0f0';
  ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';
  const name=G.lang==='ko'?boss.ko:boss.name;
  ctx.fillText(name, x, barY+barH+16);
  // 약점 표시
  if(boss.weakExposed>0){
    ctx.fillStyle='#00ffcc';
    ctx.font='bold 12px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('⚡ WEAK!', x, y-s*0.5);
  }
  ctx.restore();
}

// 배경 렌더링 (지역별 + 패럴랙스)
function drawBackground(ctx, w, h, regionIdx, time){
  // 기본 배경
  const region=REGION_DATA[regionIdx];
  const bgColor=region?region.bgColor:'#0d0b1e';
  ctx.fillStyle=bgColor;
  ctx.fillRect(0,0,w,h);
  // 패럴랙스 레이어 1 (원경) — Canvas 폴백 별 배경
  ctx.fillStyle='#fff';
  const starRng=new SeededRNG(42+regionIdx);
  for(let i=0;i<60;i++){
    const sx2=starRng.next()*w;
    const sy2=starRng.next()*h*0.6;
    const sr2=starRng.next()*1.5+0.5;
    ctx.globalAlpha=0.3+starRng.next()*0.5+Math.sin(time*0.002+i)*0.2;
    ctx.beginPath(); ctx.arc(sx2,sy2,sr2,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // 지역별 환경 이펙트
  drawRegionEffect(ctx,w,h,regionIdx,time);
}

// 지역 환경 이펙트
function drawRegionEffect(ctx,w,h,regionIdx,time){
  switch(regionIdx){
    case 0: // 화산 — 용암 + 파티클
      ctx.fillStyle='#ff450040';
      const lavaH=40+Math.sin(time*0.003)*10;
      ctx.fillRect(0,h-lavaH,w,lavaH);
      for(let i=0;i<5;i++){
        const px=(time*0.05+i*200)%w;
        const py=h-lavaH-10-Math.sin(time*0.005+i)*20;
        ctx.fillStyle='#ff8c0080';
        ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
      }
      break;
    case 1: // 심해 — 물결 + 기포
      ctx.fillStyle='#1e90ff15';
      for(let y=0;y<h;y+=30){
        const shift=Math.sin(time*0.002+y*0.05)*15;
        ctx.fillRect(shift,y,w,2);
      }
      for(let i=0;i<8;i++){
        const bx=((time*0.03+i*150)%w);
        const by=h-((time*0.05+i*80)%h);
        ctx.strokeStyle='#00cfff30';
        ctx.beginPath(); ctx.arc(bx,by,4+i,0,Math.PI*2); ctx.stroke();
      }
      break;
    case 2: // 숲 — 나뭇잎
      for(let i=0;i<6;i++){
        const lx=((time*0.04+i*200)%w);
        const ly=((time*0.02+i*150)%(h*0.7));
        ctx.fillStyle='#2ecc7140';
        ctx.beginPath();
        ctx.ellipse(lx,ly,4,8,time*0.001+i,0,Math.PI*2);
        ctx.fill();
      }
      break;
    case 3: // 하늘 — 번개
      if(Math.sin(time*0.0015)>0.98){
        ctx.fillStyle='#ffd70015';
        ctx.fillRect(0,0,w,h);
      }
      // 구름
      ctx.fillStyle='#bdc3c720';
      for(let i=0;i<3;i++){
        const cx=((time*0.02+i*400)%((w+200)))-100;
        ctx.beginPath();
        ctx.ellipse(cx,30+i*40,80,20,0,0,Math.PI*2);
        ctx.fill();
      }
      break;
    case 4: // 심연 — 왜곡
      ctx.fillStyle='#6b2fa015';
      for(let y=0;y<h;y+=20){
        const shift=Math.sin(time*0.003+y*0.03)*8;
        ctx.fillRect(shift,y,w,3);
      }
      break;
  }
  // 시간대별 비네팅
  const vAlpha=[0.2,0.05,0.15,0.3][G.timeOfDay]||0.1;
  const vGrad=ctx.createRadialGradient(w/2,h/2,w*0.3,w/2,h/2,w*0.8);
  vGrad.addColorStop(0,'transparent');
  vGrad.addColorStop(1,`rgba(0,0,0,${vAlpha})`);
  ctx.fillStyle=vGrad;
  ctx.fillRect(0,0,w,h);
}

// 마나 바 그리기
function drawManaBar(ctx, x, y, w, h, element, current, max){
  const r=h/2;
  // Background rounded rect
  ctx.fillStyle='#1a1833';
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arc(x+w-r,y+r,r,-Math.PI/2,Math.PI/2);
  ctx.lineTo(x+r,y+h);
  ctx.arc(x+r,y+r,r,Math.PI/2,Math.PI*1.5);
  ctx.fill();
  if(current>0){
    const pct=Math.min(current/Math.max(max,10),1);
    const fillW=w*pct;
    const [c1,c2]=ELEM_COLORS[element];
    const grad=ctx.createLinearGradient(x,y,x+fillW,y);
    grad.addColorStop(0,c1); grad.addColorStop(1,c2);
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+Math.min(fillW,w-r),y);
    if(fillW>=w-r) ctx.arc(x+w-r,y+r,r,-Math.PI/2,Math.PI/2);
    else ctx.lineTo(x+fillW,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.arc(x+r,y+r,r,Math.PI/2,Math.PI*1.5);
    ctx.fill();
  }
  ctx.strokeStyle='#2d275540';
  ctx.lineWidth=0.5;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arc(x+w-r,y+r,r,-Math.PI/2,Math.PI/2);
  ctx.lineTo(x+r,y+h);
  ctx.arc(x+r,y+r,r,Math.PI/2,Math.PI*1.5);
  ctx.stroke();
  // Element abbreviation
  const abbr=ELEM_NAMES_EN[element]?ELEM_NAMES_EN[element][0]:'?';
  ctx.fillStyle='#fff8';
  ctx.font=`bold ${h-1}px "Segoe UI",system-ui,sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(abbr,x+3,y+h/2+1);
  ctx.textBaseline='alphabetic';
}

// 스펠 슬롯 그리기
function drawSpellSlot(ctx, x, y, size, elemIdx, tier, isReady, isSelected, cooldown){
  ctx.save();
  const [c1,c2]=ELEM_COLORS[elemIdx];
  ctx.fillStyle=isReady?c1:'#333';
  ctx.globalAlpha=isReady?1:0.5;
  ctx.fillRect(x,y,size,size);
  if(isSelected){
    ctx.strokeStyle='#00ffcc';
    ctx.lineWidth=2;
    ctx.strokeRect(x-1,y-1,size+2,size+2);
  }
  // 원소 아이콘
  ctx.fillStyle='#fff';
  ctx.font=`${size*0.4}px "Segoe UI",system-ui,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const icons=['🔥','💧','🌿','💨','✨','🌑'];
  ctx.fillText(icons[elemIdx], x+size/2, y+size/2);
  // 쿨다운
  if(cooldown>0){
    ctx.fillStyle='#00000080';
    ctx.fillRect(x,y,size,size);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${size*0.3}px "Segoe UI",system-ui,sans-serif`;
    ctx.fillText(cooldown+'', x+size/2, y+size/2);
  }
  ctx.restore();
}

// 유물 카드 그리기
function drawRelicCard(ctx, x, y, w, h, relic, isHovered){
  ctx.save();
  const tierColors=['#bdc3c7','#4169e1','#9b59b6'];
  const bgCol=isHovered?'#2a2a4e':'#1a1a2e';
  ctx.fillStyle=bgCol;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=tierColors[relic.tier];
  ctx.lineWidth=isHovered?3:2;
  ctx.strokeRect(x,y,w,h);
  // 아이콘 — Canvas 드로잉
  ctx.fillStyle=tierColors[relic.tier];
  ctx.beginPath(); ctx.arc(x+w/2,y+35,16,0,Math.PI*2); ctx.fill();
  // 이름
  ctx.fillStyle='#e8e0f0';
  ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';
  const name=G.lang==='ko'?relic.ko:relic.en;
  ctx.fillText(name, x+w/2, y+75);
  // 등급 텍스트
  const tierNames=G.lang==='ko'?['커먼','레어','에픽']:['Common','Rare','Epic'];
  ctx.fillStyle=tierColors[relic.tier];
  ctx.font='11px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(tierNames[relic.tier], x+w/2, y+95);
  ctx.restore();
}

// HUD 그리기
function drawHUD(ctx, w, h){
  const L=LANG[G.lang];
  ctx.save();
  // HP
  const hpBarW=Math.min(160,w*0.25);
  const hpBarH=16;
  const hpX=10; const hpY=10;
  const hpRad=hpBarH/2;
  // HP 아이콘 — 크리스탈 하트 (Canvas paths)
  {
    const hx=hpX+10, hy=hpY+8;
    ctx.fillStyle='#e74c3c';
    ctx.beginPath();
    ctx.moveTo(hx,hy+3);
    ctx.bezierCurveTo(hx,hy-2,hx-6,hy-4,hx-6,hy);
    ctx.bezierCurveTo(hx-6,hy+4,hx,hy+8,hx,hy+10);
    ctx.bezierCurveTo(hx,hy+8,hx+6,hy+4,hx+6,hy);
    ctx.bezierCurveTo(hx+6,hy-4,hx,hy-2,hx,hy+3);
    ctx.fill();
    // 크리스탈 하이라이트
    ctx.fillStyle='#ff8080';
    ctx.beginPath();
    ctx.moveTo(hx-2,hy);
    ctx.lineTo(hx,hy-2);
    ctx.lineTo(hx+1,hy+2);
    ctx.closePath(); ctx.fill();
  }
  // HP 바 (라운드)
  const hpBarX=hpX+24;
  ctx.fillStyle='#1a1833';
  ctx.beginPath();
  ctx.moveTo(hpBarX+hpRad,hpY);
  ctx.lineTo(hpBarX+hpBarW-hpRad,hpY);
  ctx.arc(hpBarX+hpBarW-hpRad,hpY+hpRad,hpRad,-Math.PI/2,Math.PI/2);
  ctx.lineTo(hpBarX+hpRad,hpY+hpBarH);
  ctx.arc(hpBarX+hpRad,hpY+hpRad,hpRad,Math.PI/2,Math.PI*1.5);
  ctx.fill();
  const hpPct=Math.max(0,G.hp/G.maxHp);
  const hpFillW=hpBarW*hpPct;
  if(hpFillW>0){
    const hpGrad=ctx.createLinearGradient(hpBarX,hpY,hpBarX+hpFillW,hpY);
    hpGrad.addColorStop(0,hpPct>0.5?'#e74c3c':hpPct>0.25?'#ff6347':'#8b0000');
    hpGrad.addColorStop(1,hpPct>0.5?'#ff6b6b':hpPct>0.25?'#ff8866':'#c0392b');
    ctx.fillStyle=hpGrad;
    ctx.beginPath();
    ctx.moveTo(hpBarX+hpRad,hpY);
    ctx.lineTo(hpBarX+Math.min(hpFillW,hpBarW-hpRad),hpY);
    if(hpFillW>=hpBarW-hpRad) ctx.arc(hpBarX+hpBarW-hpRad,hpY+hpRad,hpRad,-Math.PI/2,Math.PI/2);
    else{ ctx.lineTo(hpBarX+hpFillW,hpY+hpBarH); }
    ctx.lineTo(hpBarX+hpRad,hpY+hpBarH);
    ctx.arc(hpBarX+hpRad,hpY+hpRad,hpRad,Math.PI/2,Math.PI*1.5);
    ctx.fill();
  }
  ctx.strokeStyle='#2d275580';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(hpBarX+hpRad,hpY);
  ctx.lineTo(hpBarX+hpBarW-hpRad,hpY);
  ctx.arc(hpBarX+hpBarW-hpRad,hpY+hpRad,hpRad,-Math.PI/2,Math.PI/2);
  ctx.lineTo(hpBarX+hpRad,hpY+hpBarH);
  ctx.arc(hpBarX+hpRad,hpY+hpRad,hpRad,Math.PI/2,Math.PI*1.5);
  ctx.stroke();
  ctx.fillStyle='#e8e0f0';
  ctx.font='bold 11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText(`${G.hp}/${G.maxHp}`,hpBarX+hpBarW/2,hpY+12);

  // 점수 (크리스탈 별 아이콘)
  ctx.textAlign='right';
  {
    const sx=w-80, sy=hpY+7;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*Math.PI*2/5;
      const outer=i%2===0?7:3;
      ctx.lineTo(sx+outer*Math.cos(a),sy+outer*Math.sin(a));
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#ffd700';
  ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(`${G.score}`, w-10, hpY+14);

  // 턴/스테이지
  ctx.fillStyle='#8080a0';
  ctx.font='12px "Segoe UI",system-ui,sans-serif';
  const regionName=G.lang==='ko'?L.regions[G.regionIdx]:L.regions[G.regionIdx];
  const stageText=G.isBossFight?`${regionName} - ${L.boss}`:`${regionName} ${G.stageIdx+1}/3`;
  ctx.fillText(stageText, w-10, hpY+30);
  ctx.fillText(`${L.turn}: ${G.turn}${G.turnLimit>0?'/'+G.turnLimit:''}`, w-10, hpY+45);

  // 콤보 표시
  if(G.combo>1){
    ctx.textAlign='center';
    ctx.fillStyle='#ffd700';
    ctx.font=`bold ${18+G.combo*2}px "Segoe UI",system-ui,sans-serif`;
    ctx.shadowColor='#ffd700';
    ctx.shadowBlur=10;
    ctx.fillText(`${G.combo} ${L.combo}!`, w/2, 40);
    ctx.shadowBlur=0;
  }

  // 마나 바 (하단 좌측)
  const manaBarW=Math.min(100,w*0.15);
  const manaBarH=10;
  const manaStartY=h-70;
  ctx.textAlign='left';
  for(let i=0;i<6;i++){
    const my=manaStartY+i*(manaBarH+3);
    drawManaBar(ctx, 10, my, manaBarW, manaBarH, i, G.mana[i], 10);
    ctx.fillStyle='#8080a0';
    ctx.font='9px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(`${G.mana[i]}`, manaBarW+14, my+9);
  }

  // 유물 표시 (좌측 하단 아이콘)
  if(G.ownedRelics.length>0){
    ctx.fillStyle='#8080a0';
    ctx.font='10px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(`${L.relics}: ${G.ownedRelics.length}`, 10, manaStartY-10);
  }

  ctx.restore();
}

// 터치 버튼 그리기
function drawTouchButtons(ctx, w, h){
  if(!input.touchActive && !('ontouchstart' in window)) return;
  const L=LANG[G.lang];
  const btnSize=Math.max(CONFIG.TOUCH_MIN_TARGET, 48);
  const margin=8;
  const btnRad=8;

  // 라운드 버튼 배경 헬퍼
  function drawBtnBg(bx,by,bw,bh,borderColor){
    ctx.fillStyle='#1a1a2e80';
    ctx.beginPath();
    ctx.moveTo(bx+btnRad,by);
    ctx.lineTo(bx+bw-btnRad,by);
    ctx.arc(bx+bw-btnRad,by+btnRad,btnRad,-Math.PI/2,0);
    ctx.lineTo(bx+bw,by+bh-btnRad);
    ctx.arc(bx+bw-btnRad,by+bh-btnRad,btnRad,0,Math.PI/2);
    ctx.lineTo(bx+btnRad,by+bh);
    ctx.arc(bx+btnRad,by+bh-btnRad,btnRad,Math.PI/2,Math.PI);
    ctx.lineTo(bx,by+btnRad);
    ctx.arc(bx+btnRad,by+btnRad,btnRad,Math.PI,Math.PI*1.5);
    ctx.fill();
    ctx.strokeStyle=borderColor||'#2d2755';
    ctx.lineWidth=1.5;
    ctx.shadowColor=borderColor||'#2d2755';
    ctx.shadowBlur=4;
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // 일시정지 버튼 (우측 상단) — 두 세로 직사각형
  const pauseBtn={x:w-btnSize-margin,y:margin,w:btnSize,h:btnSize};
  G.touchBtns.pause=pauseBtn;
  drawBtnBg(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,'#2d2755');
  ctx.fillStyle='#e8e0f0';
  const pcx=pauseBtn.x+btnSize/2, pcy=pauseBtn.y+btnSize/2;
  const pw=btnSize*0.12, ph=btnSize*0.35;
  ctx.fillRect(pcx-pw-2,pcy-ph/2,pw,ph);
  ctx.fillRect(pcx+2,pcy-ph/2,pw,ph);

  if(G.state===STATE.MATCH_IDLE||G.state===STATE.SPELL_SELECT){
    // 힌트 버튼 — 전구 모양
    const hintBtn={x:w-btnSize-margin,y:70,w:btnSize,h:btnSize};
    G.touchBtns.hint=hintBtn;
    drawBtnBg(hintBtn.x,hintBtn.y,hintBtn.w,hintBtn.h,'#ffd70060');
    const hcx=hintBtn.x+btnSize/2, hcy=hintBtn.y+btnSize/2;
    const bulbR=btnSize*0.2;
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.arc(hcx,hcy-bulbR*0.3,bulbR,0,Math.PI*2); ctx.fill();
    // 전구 아래쪽
    ctx.fillStyle='#ffd700';
    ctx.fillRect(hcx-bulbR*0.4,hcy+bulbR*0.5,bulbR*0.8,bulbR*0.5);
    // 전구 줄무늬
    ctx.strokeStyle='#cc9900';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(hcx-bulbR*0.3,hcy+bulbR*0.65); ctx.lineTo(hcx+bulbR*0.3,hcy+bulbR*0.65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hcx-bulbR*0.3,hcy+bulbR*0.8); ctx.lineTo(hcx+bulbR*0.3,hcy+bulbR*0.8); ctx.stroke();
    // 빛 선
    ctx.strokeStyle='#ffd70080'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(hcx-bulbR*1.3,hcy-bulbR*0.3); ctx.lineTo(hcx-bulbR*0.9,hcy-bulbR*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hcx+bulbR*0.9,hcy-bulbR*0.3); ctx.lineTo(hcx+bulbR*1.3,hcy-bulbR*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hcx,hcy-bulbR*1.5); ctx.lineTo(hcx,hcy-bulbR*1.1); ctx.stroke();

    // 턴 종료 버튼 — 화살표 모양
    const endBtn={x:w-btnSize*1.2-margin,y:h-btnSize-margin,w:btnSize*1.2,h:btnSize};
    G.touchBtns.endTurn=endBtn;
    drawBtnBg(endBtn.x,endBtn.y,endBtn.w,endBtn.h,'#4169e1');
    const ecx=endBtn.x+endBtn.w/2, ecy=endBtn.y+endBtn.h/2;
    // 화살표
    ctx.fillStyle='#e8e0f0';
    ctx.beginPath();
    ctx.moveTo(ecx+btnSize*0.2,ecy);
    ctx.lineTo(ecx,ecy-btnSize*0.18);
    ctx.lineTo(ecx,ecy-btnSize*0.08);
    ctx.lineTo(ecx-btnSize*0.2,ecy-btnSize*0.08);
    ctx.lineTo(ecx-btnSize*0.2,ecy+btnSize*0.08);
    ctx.lineTo(ecx,ecy+btnSize*0.08);
    ctx.lineTo(ecx,ecy+btnSize*0.18);
    ctx.closePath(); ctx.fill();
    // 텍스트 라벨
    ctx.fillStyle='#8080c0';
    ctx.font='bold 9px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(L.endTurn,ecx,ecy+btnSize*0.35);
    ctx.textBaseline='alphabetic';
  }
}

// 타이틀 화면
function drawTitle(ctx, w, h, time){
  // 배경
  drawBackground(ctx,w,h,0,time);
  ctx.fillStyle='#0d0b1e90';
  ctx.fillRect(0,0,w,h);
  // 마법사 캐릭터 — Canvas 드로잉 (상세)
  {
    const ps=Math.min(100, w*0.18);
    const mx=w/2, my=h*0.18+ps/2;
    ctx.globalAlpha=0.8+Math.sin(time*0.003)*0.1;
    // 로브 (사다리꼴)
    ctx.fillStyle='#4a1e80';
    ctx.beginPath();
    ctx.moveTo(mx-ps*0.2,my+ps*0.05);
    ctx.lineTo(mx-ps*0.35,my+ps*0.55);
    ctx.lineTo(mx+ps*0.35,my+ps*0.55);
    ctx.lineTo(mx+ps*0.2,my+ps*0.05);
    ctx.closePath(); ctx.fill();
    // 로브 장식 선
    ctx.strokeStyle='#6b2fa060'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mx,my+ps*0.1); ctx.lineTo(mx,my+ps*0.5); ctx.stroke();
    // 머리
    ctx.fillStyle='#e8d5b0';
    ctx.beginPath(); ctx.arc(mx,my-ps*0.05,ps*0.15,0,Math.PI*2); ctx.fill();
    // 뾰족 모자
    ctx.fillStyle='#4a1e80';
    ctx.beginPath();
    ctx.moveTo(mx-ps*0.22,my-ps*0.12);
    ctx.lineTo(mx+ps*0.05,my-ps*0.65);
    ctx.lineTo(mx+ps*0.22,my-ps*0.12);
    ctx.closePath(); ctx.fill();
    // 모자 밴드
    ctx.fillStyle='#ffd700';
    ctx.fillRect(mx-ps*0.22,my-ps*0.15,ps*0.44,ps*0.04);
    // 모자 꼭대기 별
    const starX=mx+ps*0.05, starY=my-ps*0.65;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*Math.PI*2/5;
      const ra=i%2===0?ps*0.06:ps*0.025;
      ctx.lineTo(starX+ra*Math.cos(a),starY+ra*Math.sin(a));
    }
    ctx.closePath(); ctx.fill();
    // 눈 (시안)
    ctx.fillStyle='#00e5ff';
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(mx-ps*0.06,my-ps*0.07,ps*0.03,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+ps*0.06,my-ps*0.07,ps*0.03,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // 지팡이
    ctx.strokeStyle='#8b6914'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(mx+ps*0.3,my-ps*0.3); ctx.lineTo(mx+ps*0.35,my+ps*0.5); ctx.stroke();
    // 지팡이 구슬 (6원소 색상 순환)
    const orbElem=Math.floor(time*0.003)%6;
    const orbCol=ELEM_COLORS[orbElem];
    const orbGrad2=ctx.createRadialGradient(mx+ps*0.3,my-ps*0.35,0,mx+ps*0.3,my-ps*0.35,ps*0.08);
    orbGrad2.addColorStop(0,'#fff');
    orbGrad2.addColorStop(0.4,orbCol[1]);
    orbGrad2.addColorStop(1,orbCol[0]);
    ctx.fillStyle=orbGrad2;
    ctx.shadowColor=orbCol[0]; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(mx+ps*0.3,my-ps*0.35,ps*0.08,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // 주변 룬 기호들
    ctx.globalAlpha=0.4+0.3*Math.sin(time*0.002);
    ctx.font=`${ps*0.12}px "Segoe UI",system-ui,sans-serif`;
    ctx.fillStyle='#bf5fff';
    ctx.textAlign='center';
    const runes=['\u16A0','\u16B1','\u16C7','\u16D2','\u16A6'];
    for(let i=0;i<runes.length;i++){
      const ra=time*0.001+i*Math.PI*2/runes.length;
      const rx2=mx+ps*0.55*Math.cos(ra);
      const ry2=my+ps*0.45*Math.sin(ra);
      ctx.fillText(runes[i],rx2,ry2);
    }
    ctx.globalAlpha=1;
  }
  // 타이틀
  const L=LANG[G.lang];
  ctx.save();
  ctx.textAlign='center';
  // 글리치 효과 타이틀
  const titleY=h*0.48;
  const fontSize=Math.min(36, w*0.07);
  ctx.font=`bold ${fontSize}px "Segoe UI",system-ui,sans-serif`;
  // 6원소 색상으로 한 글자씩
  const title=L.title;
  const totalW=ctx.measureText(title).width;
  let cx=w/2-totalW/2;
  for(let i=0;i<title.length;i++){
    const c=ELEM_COLORS[i%6][0];
    ctx.fillStyle=c;
    ctx.shadowColor=c;
    ctx.shadowBlur=8+Math.sin(time*0.005+i)*4;
    const charW=ctx.measureText(title[i]).width;
    const oy=Math.sin(time*0.004+i*0.5)*3;
    ctx.fillText(title[i], cx+charW/2, titleY+oy);
    cx+=charW;
  }
  ctx.shadowBlur=0;
  // 서브타이틀
  ctx.fillStyle='#8080a0';
  ctx.font=`${Math.min(14,w*0.03)}px "Segoe UI",system-ui,sans-serif`;
  ctx.fillText(L.subtitle, w/2, titleY+30);
  // 시작 안내
  const blink=Math.sin(time*0.004)>0;
  if(blink){
    ctx.fillStyle='#e8e0f0';
    ctx.font=`bold ${Math.min(16,w*0.035)}px "Segoe UI",system-ui,sans-serif`;
    ctx.fillText(L.tapToStart, w/2, h*0.65);
  }
  // 최고 점수
  if(G.bestScore>0){
    ctx.fillStyle='#ffd700';
    ctx.font=`14px "Segoe UI",system-ui,sans-serif`;
    ctx.fillText(`${L.best}: ${G.bestScore}`, w/2, h*0.72);
  }
  // 결정 수
  if(G.crystals>0){
    ctx.fillStyle='#00cfff';
    ctx.font=`13px "Segoe UI",system-ui,sans-serif`;
    ctx.fillText(`${L.crystals}: ${G.crystals}`, w/2, h*0.78);
  }
  // 언어 토글
  const langBtn={x:w-58,y:h-56,w:50,h:48};
  G.touchBtns.lang=langBtn;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(langBtn.x,langBtn.y,langBtn.w,langBtn.h);
  ctx.strokeStyle='#2d2755';
  ctx.strokeRect(langBtn.x,langBtn.y,langBtn.w,langBtn.h);
  ctx.fillStyle='#8080a0';
  ctx.font='bold 12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.langToggle, langBtn.x+langBtn.w/2, langBtn.y+28);
  // 업그레이드 상점 버튼
  if(G.crystals>0){
    const shopBtn={x:10,y:h-56,w:80,h:48};
    G.touchBtns.shop=shopBtn;
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(shopBtn.x,shopBtn.y,shopBtn.w,shopBtn.h);
    ctx.strokeStyle='#2ecc71';
    ctx.strokeRect(shopBtn.x,shopBtn.y,shopBtn.w,shopBtn.h);
    ctx.fillStyle='#2ecc71';
    ctx.fillText(L.shop, shopBtn.x+shopBtn.w/2, shopBtn.y+28);
  }
  ctx.restore();
}

// 난이도 선택 화면
function drawDifficultySelect(ctx, w, h){
  const L=LANG[G.lang];
  ctx.fillStyle='#0d0b1eee';
  ctx.fillRect(0,0,w,h);
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='#e8e0f0';
  ctx.font=`bold ${Math.min(24,w*0.05)}px "Segoe UI",system-ui,sans-serif`;
  ctx.fillText(L.selectDiff, w/2, h*0.2);
  const btnW=Math.min(200,w*0.5);
  const btnH=50;
  const diffColors=['#2ecc71','#f39c12','#e74c3c'];
  G.touchBtns.diff=[];
  for(let i=0;i<3;i++){
    const bx=w/2-btnW/2;
    const by=h*0.3+i*(btnH+15);
    const btn={x:bx,y:by,w:btnW,h:btnH,idx:i};
    G.touchBtns.diff.push(btn);
    // 잠금 체크
    const locked=(i===2&&(G.bestRegion||0)<2);
    ctx.fillStyle=locked?'#333':G.difficulty===i?diffColors[i]+'40':'#1a1a2e';
    ctx.fillRect(bx,by,btnW,btnH);
    ctx.strokeStyle=locked?'#555':diffColors[i];
    ctx.lineWidth=G.difficulty===i?3:1;
    ctx.strokeRect(bx,by,btnW,btnH);
    ctx.fillStyle=locked?'#555':'#e8e0f0';
    ctx.font=`bold 16px "Segoe UI",system-ui,sans-serif`;
    ctx.fillText(locked?`${L.difficulty[i]} (${L.locked})`:L.difficulty[i], w/2, by+22);
    ctx.fillStyle=locked?'#555':'#8080a0';
    ctx.font='12px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(`HP: ${CONFIG.DIFFICULTY_HP[i]}`, w/2, by+40);
  }
  // 뒤로 버튼
  const backBtn={x:10,y:h-58,w:80,h:48};
  G.touchBtns.back=backBtn;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(backBtn.x,backBtn.y,backBtn.w,backBtn.h);
  ctx.strokeStyle='#8080a0';
  ctx.strokeRect(backBtn.x,backBtn.y,backBtn.w,backBtn.h);
  ctx.fillStyle='#8080a0';
  ctx.font='bold 12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(L.back, backBtn.x+backBtn.w/2, backBtn.y+28);
  ctx.restore();
}

// 업그레이드 상점
function drawUpgradeShop(ctx, w, h){
  const L=LANG[G.lang];
  ctx.fillStyle='#0d0b1eee';
  ctx.fillRect(0,0,w,h);
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='#e8e0f0';
  ctx.font=`bold 20px "Segoe UI",system-ui,sans-serif`;
  ctx.fillText(L.upgrade, w/2, 30);
  ctx.fillStyle='#00cfff';
  ctx.font='14px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(`${L.crystals}: ${G.crystals}`, w/2, 50);

  const trees=['offense','defense','utility'];
  const treeNames=[L.offense,L.defense,L.utility];
  const treeColors=['#ff4500','#2ecc71','#1e90ff'];
  const colW=Math.min(180,(w-40)/3);
  G.touchBtns.upgrades=[];

  for(let t=0;t<3;t++){
