// ══════════════════════════════════════════════════════════════
// ══ REGION 10: INIT — DOM, 이벤트, 파티클, 게임 루프 ══
// ══════════════════════════════════════════════════════════════

// 전역 인스턴스 (F12: 선언 → 할당 → 등록 순서)
let canvas, ctx, dpr;
let tw, particles, sound, input;
let lastTime = 0;
let gameTime = 0;

// 파티클 생성
function spawnMatchParticle(r, c, elem){
  const p=particles.get();
  if(!p) return;
  const [c1]=ELEM_COLORS[elem];
  p.x=G.gridOffX+(c+0.5)*G.cellSize;
  p.y=G.gridOffY+(r+0.5)*G.cellSize;
  p.vx=(G.rng.next()-0.5)*3;
  p.vy=(G.rng.next()-0.5)*3-1;
  p.life=1; p.decay=0.02+G.rng.next()*0.02;
  p.color=c1; p.size=3+G.rng.next()*3;
  p.type='match';
}

function spawnHitParticle(x, y){
  for(let i=0;i<8;i++){
    const p=particles.get();
    if(!p) continue;
    p.x=x; p.y=y;
    const a=G.rng.next()*Math.PI*2;
    p.vx=Math.cos(a)*3; p.vy=Math.sin(a)*3;
    p.life=1; p.decay=0.03; p.color='#ff4500'; p.size=4; p.type='hit';
  }
}

function spawnSpellParticle(elem){
  const p=particles.get();
  if(!p) return;
  const [c1]=ELEM_COLORS[elem];
  p.x=canvas.width/dpr*0.3+G.rng.next()*canvas.width/dpr*0.4;
  p.y=canvas.height/dpr*0.5+G.rng.next()*canvas.height/dpr*0.2;
  const a=G.rng.next()*Math.PI*2;
  p.vx=Math.cos(a)*2; p.vy=Math.sin(a)*2-1;
  p.life=1; p.decay=0.015; p.color=c1; p.size=4+G.rng.next()*4; p.type='spell';
}

// 파티클 업데이트/렌더링
function updateParticles(dt){
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.05; // 중력
    p.life-=p.decay;
    if(p.life<=0) particles.release(p);
  });
}

function renderParticles(ctx){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    if(p.type==='spell'){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    }else{
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
  });
  ctx.globalAlpha=1;
  // 히트 이펙트 — Canvas 폴백
  particles.forEach(p=>{
    if(p.type==='hit'&&p.life>0.7){
      ctx.globalAlpha=(p.life-0.7)*3;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(p.x,p.y,12*(p.life-0.7)*3,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ffd700';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,16*(p.life-0.7)*3,0,Math.PI*2); ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
}

// Canvas 리사이즈 (devicePixelRatio 대응)
function resizeCanvas(){
  dpr=window.devicePixelRatio||1;
  const w=window.innerWidth;
  const h=window.innerHeight;
  canvas.width=w*dpr;
  canvas.height=h*dpr;
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // 레이아웃 재계산
  recalcLayout(w,h);
}

// 레이아웃 계산
function recalcLayout(w, h){
  const gridArea=Math.min(w*0.55, h*0.65);
  G.cellSize=gridArea/CONFIG.GRID_SIZE;
  G.cellSize=Math.max(G.cellSize, CONFIG.TOUCH_MIN_TARGET*0.8);
  const totalGrid=G.cellSize*CONFIG.GRID_SIZE;
  G.gridOffX=(w-totalGrid)*0.35;
  G.gridOffY=(h-totalGrid)*0.45;
  // 스펠 바 레이아웃
  G.spellBarX=G.gridOffX;
  G.spellBarY=G.gridOffY+totalGrid+10;
}

// 스케일 계산 (마우스/터치 좌표 변환용)
function getScale(){
  return {
    sx:canvas.width/(dpr*parseFloat(canvas.style.width)),
    sy:canvas.height/(dpr*parseFloat(canvas.style.height))
  };
}

// 입력 처리 (상태별)
function handleInput(){
  const w=canvas.width/dpr;
  const h=canvas.height/dpr;

  switch(G.state){
    case STATE.TITLE:
      if(input.justPressed['Space']||input.justPressed['Enter']||input.mouseJustDown){
        // 언어 토글 체크
        if(G.touchBtns.lang && input.mouseJustDown && hitTest(input.mouseX,input.mouseY,G.touchBtns.lang)){
          G.lang=G.lang==='ko'?'en':'ko';
          sound.playSfx('select');
          return;
        }
        // 상점 버튼 체크
        if(G.touchBtns.shop && input.mouseJustDown && hitTest(input.mouseX,input.mouseY,G.touchBtns.shop)){
          setState(STATE.UPGRADE_SHOP);
          sound.playSfx('select');
          return;
        }
        if(input.justPressed['Space']||input.justPressed['Enter']||
          (input.mouseJustDown && !hitTest(input.mouseX,input.mouseY,G.touchBtns.lang||{x:0,y:0,w:0,h:0})
           && !hitTest(input.mouseX,input.mouseY,G.touchBtns.shop||{x:0,y:0,w:0,h:0}))){
          setState(STATE.DIFFICULTY_SELECT);
          sound.playSfx('select');
        }
      }
      break;

    case STATE.DIFFICULTY_SELECT:
      if(input.mouseJustDown && G.touchBtns.diff){
        for(const btn of G.touchBtns.diff){
          if(hitTest(input.mouseX,input.mouseY,btn)){
            if(btn.idx===2 && (G.bestRegion||0)<2) break;
            G.difficulty=btn.idx;
            sound.playSfx('select');
            // 게임 시작
            G.hp=CONFIG.DIFFICULTY_HP[G.difficulty]+getUpgradeEffects().maxHpPlus;
            G.maxHp=G.hp;
            G.score=0; G.regionIdx=0; G.stageIdx=0;
            G.ownedRelics=[]; G.combo=0; G.comboTotal=0; G.turn=0;
            G.allSpellsCast.clear(); G.hpAbove50=true; G.reviveUsed=false;
            G.totalRuns=(G.totalRuns||0)+1;
            G.introTimer=2000;
            sound.startBgm('battle');
            beginTransition(STATE.REGION_INTRO);
            break;
          }
        }
        // 뒤로
        if(G.touchBtns.back && hitTest(input.mouseX,input.mouseY,G.touchBtns.back)){
          setState(STATE.TITLE);
          sound.playSfx('select');
        }
      }
      if(input.justPressed['Escape']){
        setState(STATE.TITLE);
      }
      if(input.justPressed['Digit1']||input.justPressed['Digit2']||input.justPressed['Digit3']){
        const idx=input.justPressed['Digit1']?0:input.justPressed['Digit2']?1:2;
        if(idx===2 && (G.bestRegion||0)<2) break;
        G.difficulty=idx;
        G.hp=CONFIG.DIFFICULTY_HP[G.difficulty]+getUpgradeEffects().maxHpPlus;
        G.maxHp=G.hp;
        G.score=0; G.regionIdx=0; G.stageIdx=0;
        G.ownedRelics=[]; G.combo=0; G.comboTotal=0; G.turn=0;
        G.allSpellsCast.clear(); G.hpAbove50=true; G.reviveUsed=false;
        G.totalRuns=(G.totalRuns||0)+1;
        G.introTimer=2000;
        sound.startBgm('battle');
        beginTransition(STATE.REGION_INTRO);
      }
      break;

    case STATE.UPGRADE_SHOP:
      if(input.mouseJustDown && G.touchBtns.upgrades){
        for(const btn of G.touchBtns.upgrades){
          if(hitTest(input.mouseX,input.mouseY,btn)){
            buyUpgrade(btn.tree,btn.level);
            break;
          }
        }
        if(G.touchBtns.back && hitTest(input.mouseX,input.mouseY,G.touchBtns.back)){
          setState(STATE.TITLE);
          sound.playSfx('select');
        }
      }
      if(input.justPressed['Escape']){
        setState(STATE.TITLE);
      }
      break;

    case STATE.REGION_INTRO:
      if(input.justPressed['Space']||input.justPressed['Enter']||input.mouseJustDown){
        G.introTimer=0;
      }
      break;

    case STATE.MATCH_IDLE:
      handleMatchInput();
      // 힌트
      if(input.justPressed['KeyH']){
        showHint();
      }
      // ESC → 일시정지
      if(input.justPressed['Escape']){
        G.prevState=G.state;
        setState(STATE.PAUSE);
      }
      // 터치 버튼
      if(input.mouseJustDown){
        if(G.touchBtns.pause && hitTest(input.mouseX,input.mouseY,G.touchBtns.pause)){
          G.prevState=G.state;
          setState(STATE.PAUSE);
          return;
        }
        if(G.touchBtns.hint && hitTest(input.mouseX,input.mouseY,G.touchBtns.hint)){
          showHint();
          return;
        }
        if(G.touchBtns.endTurn && hitTest(input.mouseX,input.mouseY,G.touchBtns.endTurn)){
          endPlayerTurn();
          return;
        }
      }
      // E키 → 턴 종료
      if(input.justPressed['KeyE']){
        endPlayerTurn();
      }
      // 스펠 선택 (1~6)
      for(let i=0;i<6;i++){
        if(input.justPressed['Digit'+(i+1)]){
          handleSpellSelect(i);
        }
      }
      break;

    case STATE.SPELL_SELECT:
      // 스펠 시전 (Space)
      if(input.justPressed['Space']){
        handleCastSpell();
      }
      // 스펠 변경 (1~6)
      for(let i=0;i<6;i++){
        if(input.justPressed['Digit'+(i+1)]){
          handleSpellSelect(i);
        }
      }
      // ESC → 매치로 돌아가기
      if(input.justPressed['Escape']){
        G.selectedSpell=-1;
        setState(STATE.MATCH_IDLE);
      }
      // 터치
      if(input.mouseJustDown){
        handleSpellTouch();
      }
      break;

    case STATE.BOSS_INTRO:
      if(input.justPressed['Space']||input.mouseJustDown){
        G.bossIntroTimer=0;
      }
      break;

    case STATE.GAMEOVER:
      if(input.justPressed['KeyR']||input.justPressed['Space']||input.mouseJustDown){
        sound.stopBgm();
        beginTransition(STATE.TITLE);
      }
      break;

    case STATE.VICTORY:
    case STATE.TRUE_ENDING:
      if(input.justPressed['KeyR']||input.justPressed['Space']||input.mouseJustDown){
        sound.stopBgm();
        beginTransition(STATE.TITLE);
      }
      break;

    case STATE.STAGE_CLEAR:
    case STATE.BOSS_DEFEAT:
    case STATE.REGION_CLEAR:
      // 자동 전환 (타이머)
      break;

    case STATE.RELIC_SELECT:
      if(input.mouseJustDown && G.touchBtns.relics){
        for(const btn of G.touchBtns.relics){
          if(hitTest(input.mouseX,input.mouseY,btn)){
            selectRelic(btn.idx);
            break;
          }
        }
      }
      // 키보드 유물 선택 (1~4)
      for(let i=0;i<G.relicChoices.length;i++){
        if(input.justPressed['Digit'+(i+1)]){
          selectRelic(i);
          break;
        }
      }
      // 마우스 호버
      if(G.touchBtns.relics){
        G.relicHover=-1;
        for(const btn of G.touchBtns.relics){
          if(hitTest(input.mouseX,input.mouseY,btn)){
            G.relicHover=btn.idx;
            break;
          }
        }
      }
      break;

    case STATE.PAUSE:
      if(input.justPressed['Escape']||input.justPressed['Space']){
        setState(G.prevState);
        return;
      }
      if(input.mouseJustDown){
        if(G.touchBtns.resume && hitTest(input.mouseX,input.mouseY,G.touchBtns.resume)){
          setState(G.prevState);
          return;
        }
        if(G.touchBtns.toTitle && hitTest(input.mouseX,input.mouseY,G.touchBtns.toTitle)){
          sound.stopBgm();
          saveProgress();
          beginTransition(STATE.TITLE);
          return;
        }
        if(G.touchBtns.sound && hitTest(input.mouseX,input.mouseY,G.touchBtns.sound)){
          sound.enabled=!sound.enabled;
          return;
        }
        if(G.touchBtns.music && hitTest(input.mouseX,input.mouseY,G.touchBtns.music)){
          sound.musicEnabled=!sound.musicEnabled;
          if(!sound.musicEnabled) sound.stopBgm();
          return;
        }
      }
      break;
  }
}

// 매치 입력 처리
function handleMatchInput(){
  if(!G.grid) return;
  const cs=G.cellSize;
  const ox=G.gridOffX;
  const oy=G.gridOffY;
  const size=CONFIG.GRID_SIZE;

  // 스와이프로 보석 스왑 (P3 수정: 스와이프를 먼저 체크하여 mouseJustDown이 선택을 차단하지 않게)
  if(input.isDragging && input.swipeDir){
    const gc=Math.floor((input.dragStartX-ox)/cs);
    const gr=Math.floor((input.dragStartY-oy)/cs);
    if(gc>=0&&gc<size&&gr>=0&&gr<size){
      let tr=gr,tc=gc;
      switch(input.swipeDir){
        case'up':tr--;break; case'down':tr++;break;
        case'left':tc--;break; case'right':tc++;break;
      }
      if(tr>=0&&tr<size&&tc>=0&&tc<size){
        G.selectedGem=null;
        trySwap(gr,gc,tr,tc);
      }
    }
    input.swipeDir=null;
    input.mouseJustDown=false; // 스와이프 후 클릭 무효화
    return;
  }

  // 클릭/탭으로 보석 선택
  if(input.mouseJustDown){
    const gc=Math.floor((input.mouseX-ox)/cs);
    const gr=Math.floor((input.mouseY-oy)/cs);
    if(gc>=0&&gc<size&&gr>=0&&gr<size){
      if(G.selectedGem){
        // 인접한지 체크
        const dr=Math.abs(gr-G.selectedGem.r);
        const dc=Math.abs(gc-G.selectedGem.c);
        if((dr===1&&dc===0)||(dr===0&&dc===1)){
          trySwap(G.selectedGem.r, G.selectedGem.c, gr, gc);
          return;
        }
      }
      G.selectedGem={r:gr,c:gc};
      sound.playSfx('select');
    }else{
      // 스펠 바 체크
      checkSpellBarClick();
    }
  }

  // 선택된 보석에서 방향키/WASD 스왑
  if(G.selectedGem){
    let dr=0,dc=0;
    if(input.justPressed['ArrowUp']||input.justPressed['KeyW']) dr=-1;
    if(input.justPressed['ArrowDown']||input.justPressed['KeyS']) dr=1;
    if(input.justPressed['ArrowLeft']||input.justPressed['KeyA']) dc=-1;
    if(input.justPressed['ArrowRight']||input.justPressed['KeyD']) dc=1;
    if(dr||dc){
      const nr=G.selectedGem.r+dr;
      const nc=G.selectedGem.c+dc;
      if(nr>=0&&nr<size&&nc>=0&&nc<size){
        trySwap(G.selectedGem.r,G.selectedGem.c,nr,nc);
      }
    }
  }
}

// 보석 스왑 시도
function trySwap(r1,c1,r2,c2){
  // 레인보우 보석 스왑 처리
  const sp1=G.gridSpecial?G.gridSpecial[r1][c1]:null;
  const sp2=G.gridSpecial?G.gridSpecial[r2][c2]:null;
  if(sp1==='rainbow'||sp2==='rainbow'){
    const rainR=sp1==='rainbow'?r1:r2;
    const rainC=sp1==='rainbow'?c1:c2;
    const otherR=sp1==='rainbow'?r2:r1;
    const otherC=sp1==='rainbow'?c2:c1;
    const targetElem=G.grid[otherR][otherC];
    if(targetElem>=0){
      // 해당 원소 전부 제거
      for(let r=0;r<CONFIG.GRID_SIZE;r++){
        for(let c=0;c<CONFIG.GRID_SIZE;c++){
          if(G.grid[r][c]===targetElem){
            G.grid[r][c]=-1;
            if(G.gridSpecial) G.gridSpecial[r][c]=null;
            spawnMatchParticle(r,c,targetElem);
          }
        }
      }
      // 레인보우 보석도 제거
      G.grid[rainR][rainC]=-1;
      if(G.gridSpecial) G.gridSpecial[rainR][rainC]=null;
      G.selectedGem=null;
      G.combo=1;
      G.comboTotal++;
      G.score+=CONFIG.SCORE_5;
      for(let i=0;i<6;i++) G.mana[i]+=CONFIG.MATCH_5_MANA;
      applyGravity(G.grid, CONFIG.GRID_SIZE, G.rng);
      G.matchAnimTimer=CONFIG.SWAP_ANIM_DUR;
      setState(STATE.MATCH_ANIM);
      sound.playSfx('match');
      return;
    }
  }
  // 스왑
  [G.grid[r1][c1],G.grid[r2][c2]]=[G.grid[r2][c2],G.grid[r1][c1]];
  if(G.gridSpecial){
    [G.gridSpecial[r1][c1],G.gridSpecial[r2][c2]]=[G.gridSpecial[r2][c2],G.gridSpecial[r1][c1]];
  }
  // 매치 체크
  if(findMatches(G.grid,CONFIG.GRID_SIZE).length>0){
    G.selectedGem=null;
    G.combo=0;
    G.matchAnimTimer=CONFIG.SWAP_ANIM_DUR;
    setState(STATE.MATCH_ANIM);
    sound.playSfx('match');
  }else{
    // 스왑 복구
    [G.grid[r1][c1],G.grid[r2][c2]]=[G.grid[r2][c2],G.grid[r1][c1]];
    if(G.gridSpecial){
      [G.gridSpecial[r1][c1],G.gridSpecial[r2][c2]]=[G.gridSpecial[r2][c2],G.gridSpecial[r1][c1]];
    }
    G.selectedGem=null;
    // 실패 피드백
    G.camShakeIntensity=2;
    tw.add(G,{camShakeIntensity:0},200,'easeOut');
  }
}

// 스펠 바 클릭 체크
function checkSpellBarClick(){
  if(!G.spellBarX) return;
  const slotSize=Math.max(CONFIG.TOUCH_MIN_TARGET, G.cellSize*0.8);
  for(let i=0;i<6;i++){
    const sx=G.spellBarX+i*(slotSize+4);
    const sy=G.spellBarY;
    if(hitTest(input.mouseX,input.mouseY,{x:sx,y:sy,w:slotSize,h:slotSize})){
      handleSpellSelect(i);
      return;
    }
  }
}

// 스펠 선택
function handleSpellSelect(elemIdx){
  if(G.mana[elemIdx]<SPELLS[elemIdx][0].cost){
    return; // 마나 부족
  }
  G.selectedSpell=elemIdx;
  setState(STATE.SPELL_SELECT);
  sound.playSfx('select');
}

// 스펠 시전
function handleCastSpell(){
  if(G.selectedSpell<0) return;
  // 사용 가능한 최고 등급 스펠
  let tier=0;
  for(let t=Math.min(G.spellTier-1,2);t>=0;t--){
    const reff=getRelicEffects();
    const cost=Math.max(1, SPELLS[G.selectedSpell][t].cost-(reff.spellDiscount||0));
    if(G.mana[G.selectedSpell]>=cost||(G.freeSpellTimer>0&&reff.freeSpell>0)){
      tier=t; break;
    }
  }
  if(castSpell(G.selectedSpell, tier)){
    G.selectedSpell=-1;
  }
}

// 스펠 터치 처리
function handleSpellTouch(){
  checkSpellBarClick();
  // Space 대용: 스펠 선택된 상태에서 적 영역 탭
  if(G.selectedSpell>=0){
    const w=canvas.width/dpr;
    if(input.mouseX>w*0.6){
      handleCastSpell();
    }
  }
}

// 턴 종료 (스펠 미시전)
function endPlayerTurn(){
  G.selectedSpell=-1;
  G.combo=0;
  G.enemyTurnTimer=800;
  setState(STATE.ENEMY_TURN);
}

// 힌트 표시
function showHint(){
  G.hintMove=findPossibleMove(G.grid, CONFIG.GRID_SIZE);
  if(G.hintMove){
    G.hintVisible=true;
    G.hintTimer=3000;
  }else{
    // 보드 셔플
    shuffleBoard();
  }
}

// 보드 셔플
function shuffleBoard(){
  const flat=[];
  for(let r=0;r<CONFIG.GRID_SIZE;r++)
    for(let c=0;c<CONFIG.GRID_SIZE;c++)
      flat.push(G.grid[r][c]);
  G.rng.shuffle(flat);
  let idx=0;
  for(let r=0;r<CONFIG.GRID_SIZE;r++)
    for(let c=0;c<CONFIG.GRID_SIZE;c++){
      G.grid[r][c]=flat[idx++];
      if(G.gridSpecial) G.gridSpecial[r][c]=null;
    }
  // 셔플 후에도 매치가 없으면 재생성
  if(!findPossibleMove(G.grid,CONFIG.GRID_SIZE)){
    G.grid=createGrid(G.rng, CONFIG.GRID_SIZE);
    if(G.gridSpecial) G.gridSpecial=Array.from({length:CONFIG.GRID_SIZE},()=>Array(CONFIG.GRID_SIZE).fill(null));
  }
}

// 유물 선택
function selectRelic(idx){
  if(idx<0||idx>=G.relicChoices.length) return;
  G.ownedRelics.push({id:G.relicChoices[idx].id});
  sound.playSfx('relic');
  G.relicChoices=[];
  // 다음 단계로
  if(G.state===STATE.RELIC_SELECT){
    if(G.isBossFight){
      advanceRegion();
    }else{
      advanceStage();
    }
  }
}

// DDA 체크
function checkDDA(){
  if(G.comboFailStreak>=CONFIG.DDA_COMBO_FAIL_STREAK){
    G.ddaActive=true;
    showHint();
  }
  if(G.hp/G.maxHp<=CONFIG.DDA_HP_THRESHOLD && G.isBossFight && G.boss){
    if(G.boss.hp/G.boss.maxHp>0.5){
      // 보스 공격력 임시 감소
      G.boss.atk=Math.round(G.boss.atk*0.8);
    }
  }
}

// ═══════════════════════════════════════════════
// 메인 게임 루프
// ═══════════════════════════════════════════════

function gameLoop(timestamp){
  const rawDt=timestamp-lastTime;
  const dt=Math.min(rawDt,33.33); // 최대 2프레임 스킵
  lastTime=timestamp;
  gameTime=timestamp;

  const w=canvas.width/dpr;
  const h=canvas.height/dpr;

  // 입력 처리
  input.process();
  handleInput();

  // Tween 업데이트 (모든 상태에서)
  tw.update(dt);

  // 상태별 업데이트
  updateState(dt, w, h);

  // BGM 업데이트
  sound.updateBgm(dt);

  // 카메라 효과 감쇠
  if(G.camShakeIntensity>0.1){
    G.camShakeX=Math.sin(timestamp*0.05)*G.camShakeIntensity;
    G.camShakeY=Math.cos(timestamp*0.07)*G.camShakeIntensity;
    G.camShakeIntensity*=0.95;
  }else{
    G.camShakeX=0; G.camShakeY=0; G.camShakeIntensity=0;
  }
  if(G.flashAlpha>0) G.flashAlpha*=0.92;

  // 패럴랙스 스크롤
  G.bgScrollX+=dt*0.02;
  G.envTimer=timestamp;

  // 렌더링
  ctx.save();
  ctx.translate(G.camShakeX, G.camShakeY);
  render(ctx, w, h, timestamp);
  ctx.restore();

  // 플래시 오버레이
  if(G.flashAlpha>0.01){
    ctx.fillStyle=G.flashColor;
    ctx.globalAlpha=G.flashAlpha;
    ctx.fillRect(0,0,w,h);
    ctx.globalAlpha=1;
  }

  // 전환 오버레이
  if(G.isTransitioning){
    ctx.fillStyle='#0d0b1e';
    ctx.globalAlpha=G.transitionAlpha*0.5;
    ctx.fillRect(0,0,w,h);
    ctx.globalAlpha=1;
  }

  input.endFrame();
  requestAnimationFrame(gameLoop);
}

// 상태별 업데이트
function updateState(dt, w, h){
  switch(G.state){
    case STATE.REGION_INTRO:
      G.introTimer-=dt;
      if(G.introTimer<=0){
        startBattle(G.regionIdx, G.stageIdx);
      }
      break;

    case STATE.MATCH_ANIM:
      G.matchAnimTimer-=dt;
      if(G.matchAnimTimer<=0){
        setState(STATE.MATCH_CHECK);
      }
      break;

    case STATE.MATCH_CHECK:
      if(processMatches()){
        G.matchAnimTimer=CONFIG.MATCH_FLASH_DUR;
        setState(STATE.MATCH_ANIM);
      }else{
        // 캐스케이드 완료
        if(G.combo>0){
          G.comboDisplayTimer=CONFIG.COMBO_DISPLAY_DUR;
          setState(STATE.COMBO_DISPLAY);
          if(G.combo===0) G.comboFailStreak++;
          else G.comboFailStreak=0;
        }else{
          setState(STATE.MATCH_IDLE);
        }
      }
      break;

    case STATE.COMBO_DISPLAY:
      G.comboDisplayTimer-=dt;
      if(G.comboDisplayTimer<=0){
        // 전투 결과 체크
        if(checkEnemiesDefeated()){
          return;
        }
        // 스펠 선택 또는 적 턴
        if(hasUsableSpell()){
          setState(STATE.MATCH_IDLE);
        }else{
          endPlayerTurn();
        }
      }
      break;

    case STATE.SPELL_ANIM:
      G.spellAnimTimer-=dt;
      if(G.spellAnimTimer<=0){
        if(checkEnemiesDefeated()) return;
        setState(STATE.MATCH_IDLE);
      }
      break;

    case STATE.ENEMY_TURN:
      G.enemyTurnTimer-=dt;
      if(G.enemyTurnTimer<=0){
        processEnemyTurn();
        checkDDA();
      }
      break;

    case STATE.BOSS_INTRO:
      G.bossIntroTimer-=dt;
      if(G.bossIntroTimer<=0){
        setState(STATE.MATCH_IDLE);
      }
      break;

    case STATE.STAGE_CLEAR:
      G.clearTimer-=dt;
      if(G.clearTimer<=0){
        handleStageClear();
      }
      break;

    case STATE.BOSS_DEFEAT:
      G.clearTimer-=dt;
      if(G.clearTimer<=0){
        handleBossDefeat();
      }
      break;
  }

  // 파티클 업데이트
  updateParticles(dt);

  // 보석 애니메이션 감쇠
  if(G.gridAnim){
    for(let r=0;r<CONFIG.GRID_SIZE;r++){
      for(let c=0;c<CONFIG.GRID_SIZE;c++){
        const a=G.gridAnim[r][c];
        if(a.flash>0) a.flash*=0.9;
        if(a.offY!==0) a.offY*=0.85;
      }
    }
  }

  // 힌트 타이머
  if(G.state===STATE.MATCH_IDLE){
    G.hintTimer+=dt;
    if(G.hintTimer>=CONFIG.HINT_DELAY_MS&&!G.hintVisible){
      showHint();
    }
    if(G.hintVisible){
      G.hintTimer+=dt;
      if(G.hintTimer>=CONFIG.HINT_DELAY_MS+3000) G.hintVisible=false;
    }
  }
}

// 적 전멸 체크 — 보상 1회 지급 + 전환 (P2 이중 지급 방지: bossRewardGiven 플래그)
function checkEnemiesDefeated(){
  if(G.isBossFight){
    if(G.boss&&!G.boss.alive){
      // 보스 보상은 플래그로 1회만 지급 (checkBattleEnd/checkEnemiesDefeated 어디서든 최초 1회)
      if(!G.bossRewardGiven){
        G.score+=CONFIG.BOSS_KILL_SCORE;
        G.crystals+=REGION_DATA[G.regionIdx]?25+G.regionIdx*10:50;
        G.bossRewardGiven=true;
      }
      sound.playSfx('victory');
      G.clearTimer=2000;
      beginTransition(STATE.BOSS_DEFEAT);
      return true;
    }
  }else{
    if(G.enemies.every(e=>!e.alive)){
      G.crystals+=5+G.regionIdx*3+G.stageIdx*2;
      sound.playSfx('victory');
      G.clearTimer=1500;
      beginTransition(STATE.STAGE_CLEAR);
      return true;
    }
  }
  return false;
}

// 사용 가능한 스펠 있는지
function hasUsableSpell(){
  for(let i=0;i<6;i++){
    const reff=getRelicEffects();
    const cost=Math.max(1, SPELLS[i][0].cost-(reff.spellDiscount||0));
    if(G.mana[i]>=cost) return true;
  }
  return false;
}

// 메인 렌더링
function render(ctx, w, h, time){
  switch(G.state){
    case STATE.LOADING:
      drawLoading(ctx, w, h, G.loadProgress);
      break;
    case STATE.TITLE:
      drawTitle(ctx, w, h, time);
      break;
    case STATE.DIFFICULTY_SELECT:
      drawTitle(ctx, w, h, time); // 배경에 타이틀
      drawDifficultySelect(ctx, w, h);
      break;
    case STATE.UPGRADE_SHOP:
      drawUpgradeShop(ctx, w, h);
      break;
    case STATE.REGION_INTRO:
      drawRegionIntro(ctx, w, h, time);
      break;
    case STATE.BOSS_INTRO:
      drawBossIntro(ctx, w, h, time);
      break;
    case STATE.MATCH_IDLE:
    case STATE.MATCH_ANIM:
    case STATE.MATCH_CHECK:
    case STATE.COMBO_DISPLAY:
    case STATE.SPELL_SELECT:
    case STATE.SPELL_ANIM:
    case STATE.ENEMY_TURN:
    case STATE.BOSS_BATTLE:
      renderBattle(ctx, w, h, time);
      break;
    case STATE.STAGE_CLEAR:
    case STATE.BOSS_DEFEAT:
    case STATE.REGION_CLEAR:
      renderBattle(ctx, w, h, time);
      drawStageClear(ctx, w, h, time);
      break;
    case STATE.RELIC_SELECT:
      renderBattle(ctx, w, h, time);
      drawRelicSelect(ctx, w, h);
      break;
    case STATE.GAMEOVER:
      drawGameOver(ctx, w, h, time);
      break;
    case STATE.VICTORY:
      drawVictory(ctx, w, h, time);
      break;
    case STATE.TRUE_ENDING:
      drawVictory(ctx, w, h, time);
      break;
    case STATE.PAUSE:
      renderBattle(ctx, w, h, time);
      drawPause(ctx, w, h);
      break;
  }
}

// 전투 화면 렌더링
function renderBattle(ctx, w, h, time){
  // 배경
  drawBackground(ctx, w, h, G.regionIdx, time);

  // 그리드
  if(G.grid){
    drawGridBg(ctx, G.gridOffX, G.gridOffY, G.cellSize, CONFIG.GRID_SIZE);
    // 보석 렌더링
    for(let r=0;r<CONFIG.GRID_SIZE;r++){
      for(let c=0;c<CONFIG.GRID_SIZE;c++){
        const elem=G.grid[r][c];
        if(elem===-1) continue;
        const cx=G.gridOffX+(c+0.5)*G.cellSize;
        const cy=G.gridOffY+(r+0.5)*G.cellSize;
        const anim=G.gridAnim?G.gridAnim[r][c]:{offY:0,flash:0};
        const isSelected=G.selectedGem&&G.selectedGem.r===r&&G.selectedGem.c===c;
        const isHint=G.hintVisible&&G.hintMove&&
          ((G.hintMove.r1===r&&G.hintMove.c1===c)||(G.hintMove.r2===r&&G.hintMove.c2===c));
        const glow=isHint?0.5+Math.sin(time*0.008)*0.3:0;
        const spType=G.gridSpecial?G.gridSpecial[r][c]:null;
        drawGem(ctx, cx, cy+anim.offY, G.cellSize, elem, isSelected, glow, anim.flash, spType);
      }
    }
  }

  // 적/보스 렌더링
  const enemyAreaX=G.gridOffX+G.cellSize*CONFIG.GRID_SIZE+20;
  const enemyAreaY=G.gridOffY;
  const enemyAreaW=w-enemyAreaX-10;

  if(G.isBossFight && G.boss && G.boss.alive){
    const bx=enemyAreaX+enemyAreaW/2;
    const by=enemyAreaY+80;
    G.boss.animX=bx; G.boss.animY=by;
    drawBoss(ctx, bx, by, Math.min(150, enemyAreaW*0.8), G.boss);
  }else{
    const alive=G.enemies.filter(e=>e.alive);
    const rows=Math.ceil(alive.length/2);
    for(let i=0;i<alive.length;i++){
      const col=i%2;
      const row=Math.floor(i/2);
      const ex=enemyAreaX+col*(enemyAreaW/2)+enemyAreaW/4;
      const ey=enemyAreaY+30+row*70;
      alive[i].animX=ex; alive[i].animY=ey;
      drawEnemy(ctx, ex, ey, 50, alive[i].type, alive[i].hp, alive[i].maxHp, alive[i].hitFlash);
      // hitFlash 감쇠
      if(alive[i].hitFlash>0) alive[i].hitFlash*=0.9;
    }
  }

  // 스펠 바
  if(G.state===STATE.MATCH_IDLE||G.state===STATE.SPELL_SELECT||
     G.state===STATE.COMBO_DISPLAY||G.state===STATE.ENEMY_TURN){
    const slotSize=Math.max(CONFIG.TOUCH_MIN_TARGET, G.cellSize*0.7);
    for(let i=0;i<6;i++){
      const sx=G.gridOffX+i*(slotSize+4);
      const sy=G.spellBarY;
      const reff=getRelicEffects();
      const cost=Math.max(1, SPELLS[i][0].cost-(reff.spellDiscount||0));
      const isReady=G.mana[i]>=cost;
      const isSel=G.selectedSpell===i;
      drawSpellSlot(ctx, sx, sy, slotSize, i, 0, isReady, isSel, G.spellCooldowns[i]);
    }
  }

  // 파티클
  renderParticles(ctx);

  // HUD
  drawHUD(ctx, w, h);

  // 터치 버튼
  drawTouchButtons(ctx, w, h);

  // 콤보 표시 애니메이션
  if(G.state===STATE.COMBO_DISPLAY && G.combo>0){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='#ffd700';
    const sz=24+G.combo*4;
    ctx.font=`bold ${sz}px "Segoe UI",system-ui,sans-serif`;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;
    const alpha=G.comboDisplayTimer/CONFIG.COMBO_DISPLAY_DUR;
    ctx.globalAlpha=alpha;
    ctx.fillText(`${G.combo}x ${LANG[G.lang].combo}!`, w/2, h*0.25);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // 적 턴 표시
  if(G.state===STATE.ENEMY_TURN){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='#e74c3c';
    ctx.font='bold 16px "Segoe UI",system-ui,sans-serif';
    ctx.globalAlpha=0.8;
    ctx.fillText(G.lang==='ko'?'적의 턴...':'Enemy Turn...', w/2, h*0.15);
    ctx.restore();
  }

  // 스펠 선택 안내
  if(G.state===STATE.SPELL_SELECT && G.selectedSpell>=0){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='#00ffcc';
    ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
    const spName=G.lang==='ko'?SPELLS[G.selectedSpell][0].ko:SPELLS[G.selectedSpell][0].name;
    ctx.fillText(`${LANG[G.lang].spell}: ${spName} — SPACE/${LANG[G.lang].cast}`, w/2, G.gridOffY-15);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════

function init(){
  // DOM 할당 (F12)
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  // 유틸리티 초기화
  tw = new TweenManager();
  particles = new ObjectPool(()=>({x:0,y:0,vx:0,vy:0,life:0,decay:0,color:'#fff',size:2,type:'match',active:false}), CONFIG.MAX_PARTICLES);
  sound = new SoundManager();
  input = new InputManager();

  // 게임 상태 초기화
  initGameState();
  G.state=STATE.LOADING;
  G.loadProgress=0;

  // Canvas 리사이즈
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // 이벤트 등록
  input.bindKeyboard();
  input.bindMouse(canvas, getScale);
  input.bindTouch(canvas, getScale);

  // 사운드 초기화
  sound.init();

  // 에셋 프리로드 + 게임 시작
  preloadAssets().then(()=>{
    G.loadProgress=1;
    applySaveData();
    G.state=STATE.TITLE;
    sound.startBgm('title');
    lastTime=performance.now();
    requestAnimationFrame(gameLoop);
  });

  // 로딩 중 프로그레스 시뮬레이션
  let loadStep=0;
  const loadInterval=()=>{
    if(G.state===STATE.LOADING){
      loadStep+=0.05;
      G.loadProgress=Math.min(loadStep,0.9);
      // 로딩 화면 렌더링
      const w=canvas.width/dpr;
      const h=canvas.height/dpr;
      drawLoading(ctx,w,h,G.loadProgress);
      requestAnimationFrame(loadInterval);
    }
  };
  requestAnimationFrame(loadInterval);
}

// 시작
init();
</script>
