// ── Narrative dialog renderer ──
let dialogState = {
  active: false,
  lines: [],
  currentLine: 0,
  charIndex: 0,
  charTimer: 0,
  typeSpeed: 40,
  waitAfterLine: 1.2,
  waitTimer: 0,
  onComplete: null,
  bgAlpha: 0,
  portraitKey: null
};

function startDialog(key, portraitKey, onComplete) {
  const lines = NARRATIVES[langKey][key];
  if (!lines || lines.length === 0) { if (onComplete) onComplete(); return; }
  dialogState.active = true;
  dialogState.lines = lines;
  dialogState.currentLine = 0;
  dialogState.charIndex = 0;
  dialogState.charTimer = 0;
  dialogState.waitTimer = 0;
  dialogState.bgAlpha = 0;
  dialogState.portraitKey = portraitKey || null;
  dialogState.onComplete = onComplete;
}

function updateDialog(dt) {
  if (!dialogState.active) return false;
  const dtSec = dt / 1000;
  // Fade in background
  if (dialogState.bgAlpha < 0.7) {
    dialogState.bgAlpha = Math.min(0.7, dialogState.bgAlpha + dtSec * 2);
  }
  const line = dialogState.lines[dialogState.currentLine];
  if (dialogState.charIndex < line.length) {
    dialogState.charTimer += dtSec * 1000;
    if (dialogState.charTimer >= dialogState.typeSpeed) {
      dialogState.charTimer = 0;
      dialogState.charIndex++;
    }
    // Skip with confirm
    if (input.confirm()) {
      dialogState.charIndex = line.length;
    }
  } else {
    dialogState.waitTimer += dtSec;
    if (dialogState.waitTimer >= dialogState.waitAfterLine || input.confirm()) {
      dialogState.waitTimer = 0;
      dialogState.currentLine++;
      dialogState.charIndex = 0;
      if (dialogState.currentLine >= dialogState.lines.length) {
        dialogState.active = false;
        if (dialogState.onComplete) dialogState.onComplete();
      }
    }
  }
  return true;
}

function renderDialog(ctx, w, h) {
  if (!dialogState.active) return;
  // Background overlay
  ctx.fillStyle = `rgba(0,0,0,${dialogState.bgAlpha})`;
  ctx.fillRect(0, 0, w, h);
  // Dialog box
  const boxH = 120;
  const boxY = h - boxH - 20;
  const boxX = 20;
  const boxW = w - 40;
  // Box background
  ctx.fillStyle = 'rgba(10,10,26,0.9)';
  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 10);
  ctx.fill();
  ctx.stroke();
  // Inner glow line
  ctx.strokeStyle = '#6c3cf744';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(boxX + 4, boxY + 4, boxW - 8, boxH - 8, 8);
  ctx.stroke();
  // Portrait
  if (dialogState.portraitKey) {
    const pImg = assets.sprites[dialogState.portraitKey];
    const pSize = boxH - 20;
    if (pImg) {
      ctx.drawImage(pImg, boxX + 10, boxY + 10, pSize, pSize);
    }
  }
  // Text
  const textX = dialogState.portraitKey ? boxX + boxH + 10 : boxX + 20;
  const line = dialogState.lines[dialogState.currentLine];
  const displayText = line.substring(0, dialogState.charIndex);
  UI.text(ctx, displayText, textX, boxY + boxH / 2, { size: 15, color: '#e0e0f0', align: 'left', shadow: true });
  // Line indicator
  const indicator = (dialogState.currentLine + 1) + '/' + dialogState.lines.length;
  UI.text(ctx, indicator, boxX + boxW - 15, boxY + boxH - 15, { size: 10, color: '#505070', align: 'right' });
  // Continue prompt
  if (dialogState.charIndex >= line.length) {
    const blink = Math.sin(frameCount * 0.1) > 0;
    if (blink) {
      UI.text(ctx, '▶', boxX + boxW - 15, boxY + boxH / 2, { size: 14, color: '#ffd700', align: 'right' });
    }
  }
}

// ── Screen flash effect ──
let screenFlash = { alpha: 0, color: '#fff', duration: 0 };
function triggerFlash(color, duration) {
  screenFlash.alpha = 1.0;
  screenFlash.color = color || '#fff';
  screenFlash.duration = duration || 0.15;
}
function updateFlash(dt) {
  if (screenFlash.alpha > 0) {
    screenFlash.alpha -= (dt / 1000) / screenFlash.duration;
    if (screenFlash.alpha < 0) screenFlash.alpha = 0;
  }
}
function renderFlash(ctx, w, h) {
  if (screenFlash.alpha <= 0) return;
  ctx.globalAlpha = screenFlash.alpha * 0.4;
  ctx.fillStyle = screenFlash.color;
  ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 1;
}

// ── Trail effect system (dash trails, slash afterimages) ──
const trails = [];
function addTrail(x, y, size, color, life) {
  trails.push({ x, y, size, color, life, maxLife: life, alpha: 1 });
  if (trails.length > 50) trails.shift();
}
function updateTrails(dt) {
  const dtSec = dt / 1000;
  for (let i = trails.length - 1; i >= 0; i--) {
    trails[i].life -= dtSec;
    trails[i].alpha = Math.max(0, trails[i].life / trails[i].maxLife);
    if (trails[i].life <= 0) trails.splice(i, 1);
  }
}
function renderTrails(ctx) {
  for (const t of trails) {
    ctx.globalAlpha = t.alpha * 0.5;
    ctx.fillStyle = t.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size * t.alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Background parallax layers ──
function renderParallaxBg(ctx, w, h, castle, time) {
  const castleColors = [
    ['#0a1a0a', '#0c1f0c', '#0e240e'],
    ['#1a0a0a', '#1f0c0c', '#240e0e'],
    ['#0a0a1a', '#0c0c1f', '#0e0e24']
  ];
  const colors = castleColors[castle] || castleColors[0];
  // Far layer (mountains)
  ctx.fillStyle = colors[0];
  ctx.beginPath();
  ctx.moveTo(0, h * 0.7);
  for (let x = 0; x <= w; x += 20) {
    const y = h * 0.6 + Math.sin(x * 0.003 + time * 0.05) * 40 + Math.sin(x * 0.007) * 20;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fill();
  // Mid layer (hills)
  ctx.fillStyle = colors[1];
  ctx.beginPath();
  ctx.moveTo(0, h * 0.8);
  for (let x = 0; x <= w; x += 15) {
    const y = h * 0.72 + Math.sin(x * 0.005 + time * 0.08) * 25 + Math.cos(x * 0.01) * 15;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fill();
  // Near layer (ground)
  ctx.fillStyle = colors[2];
  ctx.beginPath();
  ctx.moveTo(0, h * 0.9);
  for (let x = 0; x <= w; x += 10) {
    const y = h * 0.85 + Math.sin(x * 0.008 + time * 0.12) * 10;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fill();
}

// ── Star field (title/map background) ──

function initStars(count) {
  stars.length = 0;
  for (let i = 0; i < count; i++) {
    stars.push({

    });

}
initStars(80);

function renderStarField(ctx, w, h, time) {
  for (const star of stars) {
    const alpha = star.brightness * (0.5 + 0.5 * Math.sin(time * star.twinkleSpeed));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#e0e0f0';
    ctx.beginPath();
    ctx.arc(star.x * w, star.y * h, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Japanese ink brush decorative elements ──
function renderInkBrushDecoration(ctx, w, h, time) {
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 3;
  // Vertical ink strokes
  for (let i = 0; i < 5; i++) {
    const x = w * (0.1 + i * 0.2) + Math.sin(time * 0.3 + i) * 10;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    for (let y = 0; y < h; y += 30) {
      ctx.lineTo(x + Math.sin(y * 0.02 + time * 0.2 + i) * 15, y);
    }
    ctx.stroke();
  }
  // Horizontal brush marks
  for (let i = 0; i < 3; i++) {
    const y = h * (0.3 + i * 0.2);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x < w; x += 40) {
      ctx.lineTo(x, y + Math.sin(x * 0.01 + time * 0.15 + i * 2) * 8);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ── Grid pattern (arena boundary) ──
function renderArenaGrid(ctx, x, y, w, h, intensity) {
  if (intensity <= 0) return;
  ctx.save();
  ctx.globalAlpha = intensity * 0.05;
  ctx.strokeStyle = '#6c3cf7';
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  for (let gx = x; gx <= x + w; gx += gridSize) {
    ctx.beginPath();
    ctx.moveTo(gx, y); ctx.lineTo(gx, y + h);
    ctx.stroke();
  }
  for (let gy = y; gy <= y + h; gy += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, gy); ctx.lineTo(x + w, gy);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Combo milestone celebration effect ──

  });

    sound.tone(659, 0.12, 'sine', 0.15);

}

function updateComboEffects(dt) {
  const dtSec = dt / 1000;
  for (let i = comboEffects.length - 1; i >= 0; i--) {
    const e = comboEffects[i];
    e.life -= dtSec;
    e.alpha = Math.max(0, e.life / 1.5);
    e.scale = MathUtil.lerp(e.scale, 1.0, dtSec * 5);
    if (e.life <= 0) comboEffects.splice(i, 1);
  }
}

function renderComboEffects(ctx, w, h) {
  for (const e of comboEffects) {
    ctx.save();
    ctx.globalAlpha = e.alpha;

    UI.text(ctx, e.text, 0, 0, { size: e.size, color: e.color, bold: true, glow: e.color });

  }
}

// ── Formation spawning ──
function spawnFormation(type, count, centerX, centerY) {
  switch (type) {
    case 'line': {
      const spacing = 50;
      const startX = centerX - (count - 1) * spacing / 2;
      for (let i = 0; i < count; i++) {
        const e = enemyPool.get();
        if (!e) break;
        const def = ENEMY_DEFS[rng.int(0, Math.min(G.castle + 1, ENEMY_DEFS.length) - 1)];
        setupEnemy(e, def, startX + i * spacing, centerY);
      }
      break;
    }
    case 'circle': {
      const radius = 60;
      for (let i = 0; i < count; i++) {
        const e = enemyPool.get();
        if (!e) break;
        const angle = (Math.PI * 2 / count) * i;
        const def = ENEMY_DEFS[rng.int(0, Math.min(G.castle + 1, ENEMY_DEFS.length) - 1)];
        setupEnemy(e, def, centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
      }
      break;
    }
    case 'v_shape': {
      for (let i = 0; i < count; i++) {
        const e = enemyPool.get();
        if (!e) break;
        const def = ENEMY_DEFS[rng.int(0, Math.min(G.castle + 1, ENEMY_DEFS.length) - 1)];
        const row = Math.floor(i / 2);
        const side = i % 2 === 0 ? -1 : 1;
        setupEnemy(e, def, centerX + side * row * 40, centerY + row * 30);
      }
      break;
    }
  }
}

function setupEnemy(e, def, x, y) {
  e.def = def;
  e.hp = def.hp * CFG.CASTLE_HP_MULT[G.castle];
  e.maxHp = e.hp;
  e.speed = def.speed;
  e.size = def.size;
  e.fireRate = def.fireRate;
  e.fireTimer = rng.range(0.5, def.fireRate);
  e.active = true;
  e.x = x; e.y = y;
  e.targetX = x;
  e.targetY = y;
  e.moveAngle = rng.range(0, Math.PI * 2);
  e.moveClock = 0;

// ── Wave director (controls enemy spawning intensity) ──
const waveDirector = {
  intensity: 0,
  targetIntensity: 1.0,
  rampSpeed: 0.1,
  spawnAccum: 0,
  formationTimer: 0,
  formationInterval: 12,

  update(dt) {
    const dtSec = dt / 1000;
    this.intensity = MathUtil.lerp(this.intensity, this.targetIntensity, dtSec * this.rampSpeed);

    // Ramp up intensity based on segment progress
    const segmentProgress = 1 - (G.segmentTimer / CFG.SEGMENT_DURATION);
    this.targetIntensity = 0.5 + segmentProgress * 0.5 + G.segment * 0.15;

    // Formation spawning
    this.formationTimer -= dtSec;
    if (this.formationTimer <= 0 && enemyPool.count < CFG.MAX_ENEMIES - 5) {
      this.formationTimer = this.formationInterval / this.intensity;
      const formations = ['line', 'circle', 'v_shape'];
      const type = rng.pick(formations);
      const count = rng.int(3, 5);
      const fx = arenaX + rng.range(arenaW * 0.2, arenaW * 0.8);
      const fy = arenaY + rng.range(arenaH * 0.1, arenaH * 0.35);
      spawnFormation(type, count, fx, fy);
    }
  },

  reset() {
    this.intensity = 0;
    this.targetIntensity = 1.0;
    this.spawnAccum = 0;
    this.formationTimer = 5;
  }
};

/* ═══════════════════════════════════════════════════════════════
   R19 — CAMERA SYSTEM (ZOOM/PAN)
   ═══════════════════════════════════════════════════════════════ */

const camera = {
  x: 0, y: 0, zoom: 1.0,
  targetX: 0, targetY: 0, targetZoom: 1.0,
  lerpSpeed: 3.0,
  shakeX: 0, shakeY: 0,

  update(dt) {
    const dtSec = dt / 1000;
    this.x = MathUtil.lerp(this.x, this.targetX, dtSec * this.lerpSpeed);
    this.y = MathUtil.lerp(this.y, this.targetY, dtSec * this.lerpSpeed);
    this.zoom = MathUtil.lerp(this.zoom, this.targetZoom, dtSec * this.lerpSpeed);
    // Shake
    if (shakeIntensity > 0) {
      this.shakeX = (rng.next() - 0.5) * shakeIntensity * 2;
      this.shakeY = (rng.next() - 0.5) * shakeIntensity * 2;
    } else {
      this.shakeX = 0; this.shakeY = 0;
    }
  },

  apply(ctx, w, h) {
    ctx.translate(w / 2, h / 2);
    ctx.scale(this.zoom, this.zoom);
    ctx.translate(-w / 2 + this.x + this.shakeX, -h / 2 + this.y + this.shakeY);
  },

  focusOnPlayer() {
    this.targetX = 0;
    this.targetY = 0;
    this.targetZoom = 1.0;
  },

  focusOnBoss() {
    if (!G.bossActive) return;
    const midX = (G.player.x + G.bossActive.x) / 2 - W / 2;
    const midY = (G.player.y + G.bossActive.y) / 2 - H / 2;
    this.targetX = -midX * 0.1;
    this.targetY = -midY * 0.1;
    this.targetZoom = 0.95;
  },

  zoomIn(amount) {
    this.targetZoom = MathUtil.clamp(this.targetZoom + amount, 0.8, 1.3);
  },

  reset() {
    this.x = 0; this.y = 0; this.zoom = 1.0;
    this.targetX = 0; this.targetY = 0; this.targetZoom = 1.0;
  }
};

// ── Custom SFX functions ──
function sfxSlash() {
  if (!sound._ctx) return;
  try {
    const ctx = sound._ctx;
    const t = ctx.currentTime;
    // Metallic slash sound
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(1200, t);
    osc1.frequency.exponentialRampToValueAtTime(400, t + 0.08);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(800, t);
    osc2.frequency.exponentialRampToValueAtTime(200, t + 0.1);
    filter.type = 'highpass';
    filter.frequency.value = 500;
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc1.start(t); osc1.stop(t + 0.12);
    osc2.start(t); osc2.stop(t + 0.12);
  } catch (e) {}
}

const tutorial = {
  shown: { move: false, slash: false, dash: false, ult: false, combo: false },
  active: null,
  timer: 0,

  check() {
    if (G.castle !== 0) return;
    if (state !== S.STAGE) return;

    if (!this.shown.move && G.segment === 0 && G.segmentTimer > CFG.SEGMENT_DURATION - 2) {
      this.show('move');
    }
    if (!this.shown.slash && bulletPool.count > 3 && !this.active) {
      this.show('slash');
    }
    if (!this.shown.dash && combo.count >= 3 && !this.active) {
      this.show('dash');
    }
    if (!this.shown.combo && combo.count >= 5 && !this.active) {
      this.show('combo');
    }
    if (!this.shown.ult && G.player.ultGauge >= CFG.ULT_GAUGE_MAX * 0.5 && !this.active) {
      this.show('ult');
    }
  },

  show(type) {
    this.shown[type] = true;
    this.active = type;
    this.timer = 3.0;
  },

  update(dt) {
    if (this.active) {
      this.timer -= dt / 1000;
      if (this.timer <= 0) this.active = null;
    }
  },

  render(ctx, w, h) {
    if (!this.active) return;
    const messages = {
      move: { ko: 'WASD 또는 방향키로 이동!', en: 'Move with WASD or Arrow Keys!' },
      slash: { ko: 'J키로 적 탄막을 반사하세요!', en: 'Press J to reflect enemy bullets!' },
      dash: { ko: 'K키로 대시하여 회피하세요!', en: 'Press K to dash and dodge!' },
      combo: { ko: '연속 반사로 콤보를 쌓으세요!', en: 'Chain reflects to build combos!' },
      ult: { ko: '게이지가 차면 L키로 필살기!', en: 'When gauge is full, press L for Ultimate!' }
    };
    const msg = messages[this.active];
    if (!msg) return;
    const text = msg[langKey] || msg.en;
    const alpha = Math.min(1, this.timer * 2);
    ctx.globalAlpha = alpha;
    // Tutorial box
    const boxW = Math.min(300, w * 0.7);
    const boxH = 40;
    const boxX = w / 2 - boxW / 2;
    const boxY = h * 0.65;
    ctx.fillStyle = 'rgba(108, 60, 247, 0.3)';
    ctx.strokeStyle = '#6c3cf7';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxW, boxH, 6);
    ctx.fill();
    ctx.stroke();
    UI.text(ctx, text, w / 2, boxY + boxH / 2, { size: 13, color: '#e0e0f0', bold: true });
    ctx.globalAlpha = 1;
  },

  reset() {
    this.shown = { move: false, slash: false, dash: false, ult: false, combo: false };
    this.active = null;
    this.timer = 0;
  }
};

/* ═══════════════════════════════════════════════════════════════
   R24 — MAP RENDERING DETAIL (Castle nodes, paths, decorations)
   ═══════════════════════════════════════════════════════════════ */

function renderDetailedMap(ctx, w, h) {
  // Render connecting paths between castles
  const castleCount = 3;
  const btnW = Math.min(180, w * 0.25);
  const startX = w / 2 - (castleCount * (btnW + 20)) / 2;
  for (let i = 0; i < castleCount - 1; i++) {
    const x1 = startX + i * (btnW + 20) + btnW;
    const x2 = startX + (i + 1) * (btnW + 20);
    const y = h / 2 - 20;
    ctx.save();
    ctx.strokeStyle = isCastleUnlocked(i + 1) ? '#6c3cf744' : '#1e1e30';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y); ctx.lineTo(x2, y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Arrow
    if (isCastleUnlocked(i + 1)) {
      ctx.fillStyle = '#6c3cf7';
      const midX = (x1 + x2) / 2;
      ctx.beginPath();
      ctx.moveTo(midX + 6, y);
      ctx.lineTo(midX - 3, y - 4);
      ctx.lineTo(midX - 3, y + 4);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════════════════════════
   R25 — INTEGRATION: Patch extended systems into main loops
   ═══════════════════════════════════════════════════════════════ */

// Extended systems integrated via EventBus pattern (F27) — no monkey-patch
// All extensions use bus.on('frame', ...) and bus.on('post_render', ...) events

// Update flash, trails, combo effects, camera, tutorial, stats, dialog each frame
bus.on('frame', (data) => {
  const dt = data.dt || 16;
  updateFlash(dt);
  updateTrails(dt);
  updateComboEffects(dt);
  camera.update(dt);
  tutorial.update(dt);
  stats.update(dt);
  waveDirector.update(dt);
  // Dialog system
  if (dialogState.active) updateDialog(dt);
  // Tutorial checks
  if (state === S.STAGE && G.castle === 0) tutorial.check();
  // Camera behavior
  if (state === S.BOSS && G.bossActive) camera.focusOnBoss();
  else camera.focusOnPlayer();
});

// Extended rendering uses post_render event hook (no monkey-patch, F27 compliant)
bus.on('post_render', ({ ctx, w, h }) => {
  renderTrails(ctx);
  renderComboEffects(ctx, w, h);
  renderFlash(ctx, w, h);
  if (state === S.STAGE && G.castle === 0) tutorial.render(ctx, w, h);
  if (dialogState.active) renderDialog(ctx, w, h);
  if (state === S.GAMEOVER) renderDetailedGameOver(ctx, w, h);
  if (state === S.VICTORY) renderDetailedVictory(ctx, w, h);
  if (state === S.MAP) renderDetailedMap(ctx, w, h);
  // Render arena grid in gameplay
  if (state === S.STAGE || state === S.BOSS) {
    renderArenaGrid(ctx, arenaX, arenaY, arenaW, arenaH, 1);
    renderInkBrushDecoration(ctx, w, h, titleAnim);
  }
  // Star field for title and map
  if (state === S.TITLE || state === S.MAP) {
    renderStarField(ctx, w, h, titleAnim);
  }
});

// Emit post_render in mainRender — but since we can't modify mainRender,
// we hook into the engine's render callback indirectly.
// The cleanest approach: replace render callback to call original + emit
const engineRenderRef = engine._render;
engine._render = function(ctx, w, h, dt) {
  engineRenderRef(ctx, w, h, dt);
  bus.emit('post_render', { ctx, w, h });
};

/* ═══════════════════════════════════════════════════════════════
   R26 — RELIC DETAILED DESCRIPTIONS & VISUAL CARDS
   ═══════════════════════════════════════════════════════════════ */

function renderRelicCard(ctx, relic, x, y, w, h, selected) {
  const tierColors = { common: '#8899aa', rare: '#9966ff', epic: '#ffd700' };
  const color = tierColors[relic.tier] || '#8899aa';
  // Card background
  ctx.fillStyle = selected ? '#1a1a2e' : '#12121e';
  ctx.strokeStyle = selected ? color : '#1e1e30';
  ctx.lineWidth = selected ? 2 : 1;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 10);
  ctx.fill();
  ctx.stroke();
  // Glow effect on hover
  if (selected) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x + 2, y + 2, w - 4, h - 4, 8);
    ctx.stroke();
    ctx.restore();
  }
  // Relic icon
  const relicImg = assets.sprites['itemRelic'];
  const iconSize = Math.min(40, h * 0.35);
  if (relicImg) {
    ctx.drawImage(relicImg, x + w / 2 - iconSize / 2, y + 8, iconSize, iconSize);
  } else {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x + w / 2, y + 8 + iconSize / 2, iconSize / 2 * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  // Tier badge
  ctx.fillStyle = color + '44';
  ctx.beginPath();
  ctx.roundRect(x + w / 2 - 20, y + iconSize + 12, 40, 14, 4);
  ctx.fill();
  UI.text(ctx, relic.tier.toUpperCase(), x + w / 2, y + iconSize + 19, { size: 8, color: color, bold: true });
  // Name
  UI.text(ctx, relic['name_' + langKey], x + w / 2, y + iconSize + 36, { size: 13, color: '#e0e0f0', bold: true });
  // Description
  UI.text(ctx, relic['desc_' + langKey], x + w / 2, y + iconSize + 52, { size: 10, color: '#8899aa' });
  // DPS indicator
  if (relic.isDPS) {
    UI.text(ctx, 'DPS ↑', x + w - 12, y + 12, { size: 8, color: '#cc2222', align: 'right' });
  }
}

/* ═══════════════════════════════════════════════════════════════
   R27 — UPGRADE VISUAL TREE
   ═══════════════════════════════════════════════════════════════ */

function renderUpgradeTree(ctx, axis, level, x, y, w, h, color) {
  const nodeSize = 16;
  const nodeSpacing = (w - 40) / 3;
  // Connecting line
  ctx.strokeStyle = '#1e1e30';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 20, y + h / 2);
  ctx.lineTo(x + w - 20, y + h / 2);
  ctx.stroke();
  // Nodes
  for (let i = 0; i < 3; i++) {
    const nx = x + 20 + i * nodeSpacing;
    const ny = y + h / 2;
    const unlocked = i < level;
    const current = i === level - 1;
    ctx.save();
    if (current) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
    }
    ctx.fillStyle = unlocked ? color : '#1e1e30';
    ctx.strokeStyle = unlocked ? color : '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(nx, ny, nodeSize / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    // Level number
    UI.text(ctx, String(i + 1), nx, ny, { size: 10, color: unlocked ? '#fff' : '#505070', bold: true });
    // Upgrade name
    const upDef = UPGRADE_DEFS[axis][i];
    if (upDef) {
      const name = upDef['name_' + langKey];
      UI.text(ctx, name, nx, ny + nodeSize + 6, { size: 8, color: unlocked ? '#e0e0f0' : '#505070' });
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   R28 — ADDITIONAL BULLET PATTERNS (Advanced)
   ═══════════════════════════════════════════════════════════════ */

function spawnAdvancedPattern(type, cx, cy, speed, color) {
  switch (type) {
    case 'FLOWER': {
      // Flower-shaped burst (5 petals)
      const petals = 5;
      const bulletsPerPetal = 4;
      for (let p = 0; p < petals; p++) {
        const baseAngle = (Math.PI * 2 / petals) * p + frameCount * 0.02;
        for (let b = 0; b < bulletsPerPetal; b++) {
          const offset = (b - bulletsPerPetal / 2) * 0.15;
          spawnBullet(cx, cy, baseAngle + offset, speed * (0.8 + b * 0.1), color, 1);
        }
      }
      break;
    }
    case 'CROSS': {
      // Cross pattern (4 arms)
      for (let arm = 0; arm < 4; arm++) {
        const baseAngle = (Math.PI / 2) * arm + frameCount * 0.03;
        for (let i = 0; i < 3; i++) {
          spawnBullet(cx, cy, baseAngle, speed * (0.7 + i * 0.2), color, 1);
        }
      }
      break;
    }
    case 'SCATTER': {
      // Aimed scatter shot
      const a = MathUtil.angle(cx, cy, G.player.x, G.player.y);
      const count = rng.int(5, 8);
      for (let i = 0; i < count; i++) {
        const spread = rng.range(-0.4, 0.4);
        const spd = speed * rng.range(0.7, 1.3);
        spawnBullet(cx, cy, a + spread, spd, color, 1);
      }
      break;
    }
    case 'RING': {
      // Expanding ring
      const count = 16;
      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 / count) * i;
        spawnBullet(cx, cy, a, speed * 0.6, color, 1);
      }
      break;
    }
    case 'HELIX': {
      // Double helix
      const t = frameCount * 0.08;
      for (let i = 0; i < 2; i++) {
        const a = t + i * Math.PI;
        spawnBullet(cx, cy, a, speed, color, 1);
        spawnBullet(cx, cy, a + 0.3, speed * 0.85, color, 1);
      }
      break;
    }
  }
}

// ── Boss pattern selector (uses advanced patterns in later phases) ──
function getBossPattern(boss) {
  const phase = boss.phase;
  const def = boss.def;
  if (def.id === 'oni') {
    if (phase === 0) return rng.pick(['RADIAL_8', 'AIMED']);
    if (phase === 1) return rng.pick(['RADIAL_8', 'AIMED', 'CROSS', 'SCATTER']);
    return rng.pick(['RADIAL_8', 'AIMED', 'SPIRAL', 'FLOWER', 'RING']);
  }
  if (def.id === 'fox') {
    if (phase === 0) return rng.pick(['AIMED', 'SCATTER']);
    return rng.pick(['AIMED', 'WAVE', 'HELIX', 'SCATTER', 'CROSS']);
  }
  return 'AIMED';
}

/* ═══════════════════════════════════════════════════════════════
   R29 — PARTICLE PRESETS
   ═══════════════════════════════════════════════════════════════ */

function emitSlashParticles(x, y, angle) {
  const halfArc = (getSlashArc() * Math.PI / 180) / 2;
  for (let i = 0; i < 12; i++) {
    const a = angle - halfArc + rng.range(0, halfArc * 2);
    const spd = rng.range(60, 150);
    particles.emit(
      x + Math.cos(a) * 20,
      y + Math.sin(a) * 20,
      1,
      { color: '#cc2222', speed: spd, life: rng.range(0.2, 0.5), size: rng.range(2, 5), angle: a, spread: 0.3 }
    );
  }
}

function emitPerfectParticles(x, y) {
  // Golden burst
  particles.emit(x, y, 20, { color: '#ffd700', speed: 180, life: 0.6, size: 4 });
  // Cherry blossom petals
  for (let i = 0; i < 8; i++) {
    particles.emit(x, y, 1, { color: '#ffb7c5', speed: rng.range(40, 100), life: rng.range(0.5, 1.0), size: rng.range(3, 6) });
  }
}

function emitDashParticles(x, y, dir) {
  for (let i = 0; i < 5; i++) {
    const offset = rng.range(-15, 15);
    particles.emit(
      x - Math.cos(dir) * 10 + Math.cos(dir + Math.PI/2) * offset,
      y - Math.sin(dir) * 10 + Math.sin(dir + Math.PI/2) * offset,
      1,
      { color: '#00d4ff', speed: rng.range(20, 50), life: 0.3, size: rng.range(2, 4) }
    );
  }
}

function emitUltimateParticles(x, y) {
  // Massive golden explosion
  particles.emit(x, y, 40, { color: '#ffd700', speed: 250, life: 0.8, size: 5 });
  // White flash
  particles.emit(x, y, 20, { color: '#ffffff', speed: 300, life: 0.4, size: 3 });
  // Red energy
  particles.emit(x, y, 15, { color: '#cc2222', speed: 200, life: 0.6, size: 4 });
}

function emitBossDeathParticles(x, y) {
  for (let wave = 0; wave < 3; wave++) {
    const colors = ['#ffd700', '#cc2222', '#6c3cf7'];
    particles.emit(x, y, 20, {
      color: colors[wave], speed: 150 + wave * 50,
      life: 0.5 + wave * 0.3, size: 4 + wave * 2
    });
  }
}

function emitEnemyDeathParticles(x, y, color) {
  particles.emit(x, y, 10, { color: color, speed: 100, life: 0.4, size: 3 });
  // Small ink splash
  particles.emit(x, y, 5, { color: '#1a1a2e', speed: 60, life: 0.3, size: 4 });
}

/* ═══════════════════════════════════════════════════════════════
   R30 — ENHANCED RENDERING HELPERS
   ═══════════════════════════════════════════════════════════════ */

// ── Vignette effect ──
function renderVignette(ctx, w, h, intensity) {
  const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.8);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${intensity})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// ── CRT glow effect ──
function renderCRTGlow(ctx, w, h) {
  ctx.save();
  ctx.globalAlpha = 0.02;
  ctx.fillStyle = '#6c3cf7';
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ── Japanese seal stamp (for title) ──
function renderSeal(ctx, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-0.1);
  ctx.fillStyle = '#cc222288';
  ctx.fillRect(-size / 2, -size / 2, size, size);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 2;
  ctx.strokeRect(-size / 2 + 3, -size / 2 + 3, size - 6, size - 6);
  // Character inside
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.5}px ${UI.FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('斬', 0, 2);
  ctx.restore();
}

// ── Render blood moon (boss background) ──
function renderBloodMoon(ctx, w, h, phase) {
  const moonX = w * 0.8;
  const moonY = h * 0.15;
  const moonR = 40;
  ctx.save();
  ctx.shadowColor = '#cc2222';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#cc2222';
  ctx.globalAlpha = 0.3 + phase * 0.2;
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fill();
  // Inner glow
  ctx.fillStyle = '#ff4444';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Render torii gate (map decoration) ──
function renderToriiGate(ctx, x, y, size) {
  ctx.save();
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 3;
  // Pillars
  ctx.beginPath();
  ctx.moveTo(x - size * 0.4, y); ctx.lineTo(x - size * 0.4, y + size);
  ctx.moveTo(x + size * 0.4, y); ctx.lineTo(x + size * 0.4, y + size);
  ctx.stroke();
  // Top beam
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x - size * 0.55, y + size * 0.1);
  ctx.lineTo(x + size * 0.55, y + size * 0.1);
  ctx.stroke();
  // Cross beam
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - size * 0.45, y + size * 0.25);
  ctx.lineTo(x + size * 0.45, y + size * 0.25);
  ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   R31 — SEEDED RNG VALIDATION & BALANCE CHECKS
   ═══════════════════════════════════════════════════════════════ */

// Validate no Math.random usage at runtime (debug check)
// This section ensures all randomness goes through SeededRNG
// F18 compliance verified: rng.next(), rng.range(), rng.int(), rng.pick(), rng.chance()

// ── Balance verification helper (DPS cap, synergy cap) ──
function validateBuild() {
  const dpsMult = getDPSMult();
  const synergyCount = G.relics.filter(r => r.isDPS).length;
  const synergyMult = 1 + synergyCount * 0.1;
  if (dpsMult > CFG.DPS_CAP) {
    console.warn('[Balance] DPS cap exceeded:', dpsMult, '>', CFG.DPS_CAP);
  }
  if (synergyMult > CFG.SYNERGY_CAP) {
    console.warn('[Balance] Synergy cap exceeded:', synergyMult, '>', CFG.SYNERGY_CAP);
  }
  return { dpsMult, synergyMult, valid: dpsMult <= CFG.DPS_CAP && synergyMult <= CFG.SYNERGY_CAP };
}

// Run validation when relics change
bus.on('combo', () => { /* lightweight, no validation needed per combo */ });

/* ═══════════════════════════════════════════════════════════════
   R32 — ACCESSIBILITY & QUALITY OF LIFE
   ═══════════════════════════════════════════════════════════════ */

// ── Auto-pause on visibility change ──
document.addEventListener('visibilitychange', () => {
  if (document.hidden && (state === S.STAGE || state === S.BOSS)) {
    prevState = state;
    state = S.PAUSED;
  }
});

// ── Keyboard shortcut display ──
function renderKeyboardHints(ctx, w, h) {
  if (input.isMobile) return;
  if (state !== S.STAGE && state !== S.BOSS) return;
  ctx.save();
  ctx.globalAlpha = 0.3;
  const hints = [
    ['J/Z', t('slash')],
    ['K/X', t('dash')],
    ['L/C', t('ultimate')],
    ['ESC', t('pause')]
  ];
  const hintY = h - 12;
  const hintSpacing = 90;
  const startX = w / 2 - (hints.length * hintSpacing) / 2;
  for (let i = 0; i < hints.length; i++) {
    const [key, label] = hints[i];
    const x = startX + i * hintSpacing + hintSpacing / 2;
    // Key box
    ctx.fillStyle = '#1e1e30';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x - 18, hintY - 8, 36, 16, 3);
    ctx.fill();
    ctx.stroke();
    UI.text(ctx, key, x, hintY, { size: 9, color: '#8899aa', bold: true });
  }
  ctx.restore();
}

// Hook keyboard hints rendering
bus.on('post_render', ({ ctx, w, h }) => {
  renderKeyboardHints(ctx, w, h);
  // Vignette for gameplay
  if (state === S.STAGE || state === S.BOSS) {
    renderVignette(ctx, w, h, 0.3);
    renderCRTGlow(ctx, w, h);
  }
  // Blood moon for boss
  if (state === S.BOSS && G.bossActive) {
    renderBloodMoon(ctx, w, h, G.bossActive.phase);
  }
  // Seal on title
  if (state === S.TITLE) {
    renderSeal(ctx, W * 0.82, H * 0.35, 50);
  }
  // Torii on map
  if (state === S.MAP) {
    renderToriiGate(ctx, w * 0.5, h * 0.33, 30);
  }
});
