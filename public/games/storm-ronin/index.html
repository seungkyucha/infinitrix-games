const input = new Input(engine.canvas);
const sound = new Sound();
const tween = new Tween();
const particles = new Particles(300);
const assets = new AssetLoader();

let W = engine.W, H = engine.H;
let arenaX = 0, arenaY = 0, arenaW = 0, arenaH = 0;

function onResize(w, h) {
  W = w; H = h;
  recalcArena();
}
function recalcArena() {
  const hudTop = 50, hudBot = input.isMobile ? 120 : 10;
  arenaX = CFG.ARENA_MARGIN;
  arenaY = hudTop;
  arenaW = W - CFG.ARENA_MARGIN * 2;
  arenaH = H - hudTop - hudBot;
}

/* ═══════════════════════════════════════════════════════════════
   R4.1 — CANVAS FALLBACK DRAWING (F24)
   ═══════════════════════════════════════════════════════════════ */

function drawFallbackPlayer(ctx, x, y, size, pose) {
  ctx.save();
  ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.45, 0, Math.PI * 2);
  ctx.fill();
  // Kimono
  ctx.fillStyle = '#222244';
  ctx.fillRect(-size * 0.3, -size * 0.1, size * 0.6, size * 0.5);
  // Head
  ctx.fillStyle = '#d4a574';
  ctx.beginPath();
  ctx.arc(0, -size * 0.3, size * 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#00d4ff';
  ctx.beginPath();
  ctx.arc(-size * 0.08, -size * 0.32, 2, 0, Math.PI * 2);
  ctx.arc(size * 0.08, -size * 0.32, 2, 0, Math.PI * 2);
  ctx.fill();
  // Katana
  if (pose === 'slash') {
    ctx.strokeStyle = '#ccccdd';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(size * 0.1, -size * 0.1);
    ctx.lineTo(size * 0.6, -size * 0.4);
    ctx.stroke();
    // Slash arc
    ctx.strokeStyle = '#cc2222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.5, -Math.PI * 0.6, -Math.PI * 0.1);
    ctx.stroke();
  } else if (pose === 'dash') {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath();
    ctx.arc(-size * 0.3, 0, size * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Idle katana
    ctx.strokeStyle = '#ccccdd';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(size * 0.15, 0);
    ctx.lineTo(size * 0.15, -size * 0.55);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFallbackEnemy(ctx, x, y, size, def) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = def.color;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.45, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(0, -size * 0.08, size * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(0, -size * 0.08, size * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Horn
  ctx.fillStyle = def.color;
  ctx.beginPath();
  ctx.moveTo(-size * 0.1, -size * 0.4);
  ctx.lineTo(0, -size * 0.6);
  ctx.lineTo(size * 0.1, -size * 0.4);
  ctx.fill();
  ctx.restore();
}

function drawFallbackBoss(ctx, x, y, size, def) {
  ctx.save();
  ctx.translate(x, y);
  const glowColor = def.color;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 20;
  ctx.fillStyle = def.color;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Face
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(-size * 0.15, -size * 0.1, size * 0.1, 0, Math.PI * 2);
  ctx.arc(size * 0.15, -size * 0.1, size * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Horns
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, -size * 0.4);
  ctx.lineTo(-size * 0.1, -size * 0.7);
  ctx.lineTo(0, -size * 0.4);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.4);
  ctx.lineTo(size * 0.1, -size * 0.7);
  ctx.lineTo(size * 0.2, -size * 0.4);
  ctx.fill();
  ctx.restore();
}

function drawFallbackBg(ctx, w, h, castle) {
  const colors = ['#0a1a0a', '#1a0a0a', '#0a0a1a', '#0a1a0a', '#1a0a1a'];
  const col = colors[castle] || '#0a0a1a';
  ctx.fillStyle = col;
  ctx.fillRect(0, 0, w, h);
  // Ink wash mountains
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(0, h * 0.6 - i * 30);
    for (let x = 0; x < w; x += 40) {
      ctx.lineTo(x, h * 0.55 - i * 30 + Math.sin(x * 0.005 + i) * 30);
    }
    ctx.lineTo(w, h); ctx.lineTo(0, h);
    ctx.fill();
  }
}

function drawBullet(ctx, x, y, radius, color, isReflected) {
  ctx.save();
  if (isReflected) {
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffd700';
  } else {
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = color;
  }
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   R5 — BULLET SYSTEM (탄막, 패턴, 반사)
   ═══════════════════════════════════════════════════════════════ */

function createBullet() {
  return { x: 0, y: 0, vx: 0, vy: 0, speed: 0, angle: 0, radius: CFG.BULLET_SIZE,
           color: '#6c3cf7', active: false, reflected: false, damage: 1,
           age: 0, pattern: null, waveAmp: 0, waveFreq: 0, baseAngle: 0 };
}
const bulletPool = new ObjectPool(createBullet, CFG.MAX_BULLETS);

function spawnBullet(x, y, angle, speed, color, damage) {
  const b = bulletPool.get();
  if (!b) return null;
  b.x = x; b.y = y;
  b.angle = angle;
  b.speed = speed * dda.speedMult;
  b.vx = Math.cos(angle) * b.speed;
  b.vy = Math.sin(angle) * b.speed;
  b.color = color || '#6c3cf7';
  b.active = true;
  b.reflected = false;
  b.damage = damage || 1;
  b.age = 0;
  b.radius = CFG.BULLET_SIZE;
  b.waveAmp = 0;
  b.baseAngle = angle;
  return b;
}

function spawnPattern(type, cx, cy, speed, color, targetX, targetY) {
  const density = dda.densityMult;
  switch (type) {
    case 'AIMED': {
      const a = MathUtil.angle(cx, cy, targetX || G.player.x, targetY || G.player.y);
      spawnBullet(cx, cy, a, speed, color, 1);
      break;
    }
    case 'RADIAL_8': {
      const count = Math.round(8 * density);
      const offset = rng.range(0, Math.PI * 2);
      for (let i = 0; i < count; i++) {
        spawnBullet(cx, cy, offset + (Math.PI * 2 / count) * i, speed, color, 1);
      }
      break;
    }
    case 'SPIRAL': {
      const count = Math.round(5 * density);
      const base = frameCount * 0.05;
      for (let i = 0; i < count; i++) {
        spawnBullet(cx, cy, base + (Math.PI * 2 / count) * i, speed * 0.9, color, 1);
      }
      break;
    }
    case 'WAVE': {
      const count = Math.round(3 * density);
      const a = MathUtil.angle(cx, cy, G.player.x, G.player.y);
      for (let i = 0; i < count; i++) {
        const b = spawnBullet(cx, cy, a + (i - 1) * 0.2, speed, color, 1);
        if (b) { b.waveAmp = 40; b.waveFreq = 4; b.baseAngle = b.angle; }
      }
      break;
    }
    case 'RANDOM': {
      const count = Math.round(6 * density);
      for (let i = 0; i < count; i++) {
        spawnBullet(cx, cy, rng.range(0, Math.PI * 2), speed * rng.range(0.6, 1.2), color, 1);
      }
      break;
    }
  }
}

function updateBullets(dt) {
  const dtSec = dt / 1000;
  const active = bulletPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    const b = active[i];
    b.age += dtSec;
    // Wave pattern
    if (b.waveAmp > 0) {
      const perpAngle = b.baseAngle + Math.PI * 0.5;
      const wave = Math.sin(b.age * b.waveFreq * Math.PI * 2) * b.waveAmp;
      b.x += Math.cos(b.baseAngle) * b.speed * dtSec + Math.cos(perpAngle) * wave * dtSec;
      b.y += Math.sin(b.baseAngle) * b.speed * dtSec + Math.sin(perpAngle) * wave * dtSec;
    } else {
      b.x += b.vx * dtSec;
      b.y += b.vy * dtSec;
    }
    // OOB check
    if (b.x < arenaX - 50 || b.x > arenaX + arenaW + 50 ||
        b.y < arenaY - 50 || b.y > arenaY + arenaH + 50) {
      b.active = false;
      bulletPool.release(b);
      continue;
    }
    // Reflected bullet hitting enemies/boss
    if (b.reflected) {
      // Hit enemies
      const enemies = enemyPool.active;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (MathUtil.dist(b.x, b.y, e.x, e.y) < b.radius + e.size * 0.4) {
          e.hp -= b.damage * getDPSMult();
          addPopup(e.x, e.y - e.size * 0.5, String(Math.round(b.damage * getDPSMult())), '#ffd700', 14);
          particles.emit(e.x, e.y, 5, { color: '#cc2222', speed: 80, life: 0.3 });
          shakeIntensity = 3;
          b.active = false;
          bulletPool.release(b);
          if (e.hp <= 0) killEnemy(e, j);
          break;
        }
      }
      if (!b.active) continue;
      // Hit boss
      if (G.bossActive) {
        const boss = G.bossActive;
        if (MathUtil.dist(b.x, b.y, boss.x, boss.y) < b.radius + boss.size * 0.5) {
          boss.hp -= b.damage * getDPSMult();
          addPopup(boss.x, boss.y - boss.size * 0.5, String(Math.round(b.damage * getDPSMult())), '#ffd700', 18);
          particles.emit(boss.x, boss.y, 8, { color: '#cc2222', speed: 100, life: 0.4 });
          shakeIntensity = 5;
          sound.sfx('hit');
          b.active = false;
          bulletPool.release(b);
          if (boss.hp <= 0) { bus.emit('boss_defeated'); }
          continue;
        }
      }
    } else {
      // Enemy bullet hitting player
      if (G.player.invuln <= 0 && !G.player.dashing) {
        if (MathUtil.dist(b.x, b.y, G.player.x, G.player.y) < b.radius + CFG.PLAYER_SIZE * 0.35) {
          // Fox mask dodge check
          if (hasRelic('fox_mask') && rng.chance(0.3)) {
            addPopup(G.player.x, G.player.y - 30, 'Dodge!', '#9966ff', 14);
            b.active = false;
            bulletPool.release(b);
            continue;
          }
          playerHit();
          b.active = false;
          bulletPool.release(b);
          continue;
        }
      }
    }
  }
}

function playerHit() {
  G.player.hp -= 1;
  G.player.invuln = 1.0;
  combo.reset();
  shakeIntensity = 8;
  sound.sfx('hit');
  particles.emit(G.player.x, G.player.y, 12, { color: '#cc2222', speed: 120, life: 0.5 });
  addPopup(G.player.x, G.player.y - 20, '-1', '#cc2222', 20);
  if (G.player.hp <= 0) {
    bus.emit('player_dead');
  }
}

/* ═══════════════════════════════════════════════════════════════
   R5.1 — SLASH REFLECT SYSTEM (참격 반사)
   ═══════════════════════════════════════════════════════════════ */

function startSlash() {
  if (G.player.slashing) return;
  G.player.slashing = true;
  G.player.slashFrame = 0;
  sound.tone(800, 0.08, 'sawtooth', 0.3);
  sound.tone(1200, 0.05, 'square', 0.2);
  bus.emit('slash_start', { dir: G.player.angle });
}

function updateSlash() {
  if (!G.player.slashing) return;
  G.player.slashFrame++;
  // Check for reflectable bullets
  const slashArc = getSlashArc() * Math.PI / 180;
  const playerAngle = G.player.angle;
  const pw = dda.perfectWindow;
  const gw = dda.goodWindow;
  const active = bulletPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    const b = active[i];
    if (b.reflected) continue;
    const dist = MathUtil.dist(b.x, b.y, G.player.x, G.player.y);
    if (dist > CFG.SLASH_RADIUS) continue;
    // Angle check
    const bulletAngle = MathUtil.angle(G.player.x, G.player.y, b.x, b.y);
    let angleDiff = bulletAngle - playerAngle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    if (Math.abs(angleDiff) > slashArc / 2) continue;
    // Timing judgment
    const frame = G.player.slashFrame;
    let isPerfect = frame <= pw;
    let isGood = frame <= gw;
    if (isPerfect) {
      // Perfect reflect
      b.reflected = true;
      b.damage = 2;
      const reflectAngle = MathUtil.angle(G.player.x, G.player.y, b.x, b.y);
      b.speed *= 2;
      b.vx = Math.cos(reflectAngle) * b.speed;
      b.vy = Math.sin(reflectAngle) * b.speed;
      b.waveAmp = 0;
      combo.add(2);
      G.player.ultGauge = Math.min(CFG.ULT_GAUGE_MAX, G.player.ultGauge + 5 * getGaugeChargeMult());
      // Slowmo
      timeScale = 0.3;
      slowTimer = getSlowDuration();
      // Effects
      addPopup(b.x, b.y, t('perfect'), '#ffd700', 22);
      particles.emit(b.x, b.y, 15, { color: '#ffd700', speed: 150, life: 0.5 });
      sound.tone(1200, 0.15, 'sine', 0.3);
      sound.tone(1600, 0.1, 'sine', 0.2);
      shakeIntensity = 4;
      G.score += 50 * (1 + combo.count * 0.1);
      // Chain lightning (thunder seal relic)
      if (hasRelic('thunder_seal')) chainLightning(b.x, b.y, 3);
      bus.emit('slash', { perfect: true, dir: reflectAngle, bullet: b });
    } else if (isGood) {
      // Good reflect
      b.reflected = true;
      b.damage = 1;
      const reflectAngle = MathUtil.angle(G.player.x, G.player.y, b.x, b.y);
      b.speed *= 1.5;
      b.vx = Math.cos(reflectAngle) * b.speed;
      b.vy = Math.sin(reflectAngle) * b.speed;
      b.waveAmp = 0;
      combo.add(1);
      G.player.ultGauge = Math.min(CFG.ULT_GAUGE_MAX, G.player.ultGauge + 3 * getGaugeChargeMult());
      addPopup(b.x, b.y, t('good'), '#00d4ff', 16);
      particles.emit(b.x, b.y, 8, { color: '#00d4ff', speed: 100, life: 0.3 });
      sound.tone(800, 0.1, 'square', 0.25);
      G.score += 20 * (1 + combo.count * 0.05);
      bus.emit('slash', { perfect: false, dir: reflectAngle, bullet: b });
    }
  }
  if (G.player.slashFrame > CFG.SLASH_DURATION) {
    G.player.slashing = false;
  }
}

function chainLightning(x, y, count) {
  const enemies = enemyPool.active;
  const sorted = enemies.slice()
    .map(e => ({ e, d: MathUtil.dist(x, y, e.x, e.y) }))
    .sort((a, b) => a.d - b.d);
  let prevX = x, prevY = y;
  for (let i = 0; i < Math.min(count, sorted.length); i++) {
    const target = sorted[i].e;
    target.hp -= 1;
    addPopup(target.x, target.y - 10, '⚡', '#ffd700', 14);
    particles.emit(target.x, target.y, 5, { color: '#ffd700', speed: 80, life: 0.3 });
    if (target.hp <= 0) {
      const idx = enemies.indexOf(target);
      if (idx >= 0) killEnemy(target, idx);
    }
    prevX = target.x; prevY = target.y;
  }
}

/* ═══════════════════════════════════════════════════════════════
   R5.2 — DASH SYSTEM (대시/회피)
   ═══════════════════════════════════════════════════════════════ */

function startDash() {
  if (G.player.dashing || G.player.dashCooldown > 0) return;
  G.player.dashing = true;
  G.player.dashFrame = 0;
  G.player.dashDir = G.player.moveDir >= 0 ? G.player.moveDir : G.player.angle;
  sound.sfx('dash');
  particles.emit(G.player.x, G.player.y, 8, { color: '#00d4ff', speed: 80, life: 0.4 });
}

function updateDash(dt) {
  if (!G.player.dashing) return;
  G.player.dashFrame++;
  const dashSpeed = CFG.DASH_DIST / (getDashInvuln() / 60);
  const weatherDashMult = (G.weather && G.weather.dashMult) ? G.weather.dashMult : 1.0;
  G.player.x += Math.cos(G.player.dashDir) * dashSpeed * dt / 1000 * weatherDashMult;
  G.player.y += Math.sin(G.player.dashDir) * dashSpeed * dt / 1000 * weatherDashMult;
  // Clamp
  G.player.x = MathUtil.clamp(G.player.x, arenaX + CFG.PLAYER_SIZE, arenaX + arenaW - CFG.PLAYER_SIZE);
  G.player.y = MathUtil.clamp(G.player.y, arenaY + CFG.PLAYER_SIZE, arenaY + arenaH - CFG.PLAYER_SIZE);
  if (G.player.dashFrame >= getDashInvuln()) {
    G.player.dashing = false;
    G.player.dashCooldown = getDashCooldown();
  }
}

/* ═══════════════════════════════════════════════════════════════
   R5.3 — ULTIMATE (필살기)
   ═══════════════════════════════════════════════════════════════ */

function activateUltimate() {
  if (G.player.ultGauge < CFG.ULT_GAUGE_MAX) return;
  G.player.ultGauge = 0;
  shakeIntensity = 15;
  // Clear all bullets
  const active = bulletPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    particles.emit(active[i].x, active[i].y, 3, { color: '#ffd700', speed: 60, life: 0.3 });
    bulletPool.release(active[i]);
  }
  // Damage all enemies
  const enemies = enemyPool.active;
  const ultDmg = getUltDamage();
  for (let i = enemies.length - 1; i >= 0; i--) {
    enemies[i].hp -= ultDmg;
    addPopup(enemies[i].x, enemies[i].y - 10, String(Math.round(ultDmg)), '#ffd700', 20);
    if (enemies[i].hp <= 0) killEnemy(enemies[i], i);
  }
  // Damage boss
  if (G.bossActive) {
    G.bossActive.hp -= ultDmg;
    addPopup(G.bossActive.x, G.bossActive.y - 30, String(Math.round(ultDmg)), '#ffd700', 24);
    particles.emit(G.bossActive.x, G.bossActive.y, 20, { color: '#ffd700', speed: 150, life: 0.6 });
    if (G.bossActive.hp <= 0) bus.emit('boss_defeated');
  }
  // Effects
  sound.tone(200, 0.4, 'sawtooth', 0.4);
  sound.tone(400, 0.3, 'sine', 0.3);
  sound.tone(600, 0.25, 'square', 0.2);
  particles.emit(G.player.x, G.player.y, 30, { color: '#ffd700', speed: 200, life: 0.8 });
  addPopup(G.player.x, G.player.y - 40, '必殺!', '#ffd700', 28);
}

/* ═══════════════════════════════════════════════════════════════
   R6 — ENEMY SYSTEM
   ═══════════════════════════════════════════════════════════════ */

function createEnemy() {
  return { x: 0, y: 0, hp: 1, maxHp: 1, def: null, speed: 0, size: 32,
           fireTimer: 0, fireRate: 2, active: false, moveAngle: 0,
           moveClock: 0, targetX: 0, targetY: 0 };
}
const enemyPool = new ObjectPool(createEnemy, CFG.MAX_ENEMIES);

function spawnEnemy(defIdx) {
  const e = enemyPool.get();
  if (!e) return;
  const def = ENEMY_DEFS[Math.min(defIdx, ENEMY_DEFS.length - 1)];
  e.def = def;
  e.hp = def.hp * CFG.CASTLE_HP_MULT[G.castle];
  e.maxHp = e.hp;
  e.speed = def.speed;
  e.size = def.size;
  e.fireRate = def.fireRate;
  e.fireTimer = rng.range(0.5, def.fireRate);
  e.active = true;
  // Spawn from edge
  const side = rng.int(0, 3);
  if (side === 0) { e.x = arenaX + rng.range(0, arenaW); e.y = arenaY - 20; }
  else if (side === 1) { e.x = arenaX + arenaW + 20; e.y = arenaY + rng.range(0, arenaH); }
  else if (side === 2) { e.x = arenaX + rng.range(0, arenaW); e.y = arenaY + arenaH + 20; }
  else { e.x = arenaX - 20; e.y = arenaY + rng.range(0, arenaH); }
  e.targetX = arenaX + rng.range(arenaW * 0.2, arenaW * 0.8);
  e.targetY = arenaY + rng.range(arenaH * 0.1, arenaH * 0.5);
  e.moveAngle = MathUtil.angle(e.x, e.y, e.targetX, e.targetY);
  e.moveClock = 0;
}

function updateEnemies(dt) {
  const dtSec = dt / 1000;
  const active = enemyPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    const e = active[i];
    e.moveClock += dtSec;
    // Move toward target, then wander
    if (MathUtil.dist(e.x, e.y, e.targetX, e.targetY) > 10) {
      e.x += Math.cos(e.moveAngle) * e.speed * dtSec;
      e.y += Math.sin(e.moveAngle) * e.speed * dtSec;
    } else {
      // Gentle wander
      e.x += Math.sin(e.moveClock * 1.5) * 20 * dtSec;
      e.y += Math.cos(e.moveClock * 1.2) * 15 * dtSec;
    }
    // Clamp to arena
    e.x = MathUtil.clamp(e.x, arenaX + e.size, arenaX + arenaW - e.size);
    e.y = MathUtil.clamp(e.y, arenaY + e.size, arenaY + arenaH * 0.6);
    // Fire
    e.fireTimer -= dtSec;
    if (e.fireTimer <= 0) {
      e.fireTimer = e.fireRate / dda.densityMult;
      const castleBulletSpeed = CFG.CASTLE_SPEED[G.castle] || 140;
      spawnPattern(e.def.pattern, e.x, e.y, castleBulletSpeed, e.def.color, G.player.x, G.player.y);
    }
    // Contact damage with player
    if (G.player.invuln <= 0 && !G.player.dashing) {
      if (MathUtil.dist(e.x, e.y, G.player.x, G.player.y) < e.size * 0.4 + CFG.PLAYER_SIZE * 0.35) {
        playerHit();
      }
    }
  }
}

function killEnemy(e, idx) {
  const def = e.def;
  G.score += def.score * (1 + combo.count * 0.1);
  G.gold += Math.round(rng.range(def.gold * 0.8, def.gold * 1.2) * dda.rewardMult);
  particles.emit(e.x, e.y, 10, { color: def.color, speed: 100, life: 0.4 });
  sound.sfx('score');
  addPopup(e.x, e.y - 15, '+' + def.score, '#ffd700', 12);
  e.active = false;
  enemyPool.release(e);
}

function clearAllEnemies() {
  const active = enemyPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    active[i].active = false;
    enemyPool.release(active[i]);
  }
}

function clearAllBullets() {
  const active = bulletPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    active[i].active = false;
    bulletPool.release(active[i]);
  }
}

/* ═══════════════════════════════════════════════════════════════
   R6.1 — BOSS SYSTEM
   ═══════════════════════════════════════════════════════════════ */

function initBoss(bossIdx) {
  const def = BOSS_DEFS[bossIdx];
  G.bossActive = {
    x: arenaX + arenaW / 2, y: arenaY + arenaH * 0.2,
    hp: def.hp, maxHp: def.hp, def: def, size: def.size,
    phase: 0, fireTimer: 0, moveTimer: 0,
    chargeTimer: 0, charging: false, chargeTargetX: 0, chargeTargetY: 0,
    moveAngle: 0, lastPhase: -1
  };
  G.bossRewardGiven = false;
  G.bossClones = [];
  G.introTimer = 2.5;
  narrativeText = langKey === 'ko' ? def.narrative_ko : def.narrative_en;
  narrativeTimer = 2.5;
  sound.tone(80, 0.5, 'sawtooth', 0.5);
  sound.tone(60, 0.7, 'sine', 0.4);
}

function updateBoss(dt) {
  const boss = G.bossActive;
  if (!boss) return;
  if (G.introTimer > 0) { G.introTimer -= dt / 1000; return; }
  const dtSec = dt / 1000;
  const def = boss.def;
  const hpPct = boss.hp / boss.maxHp;
  // Phase detection
  let currentPhase = 0;
  for (let i = def.phases.length - 1; i >= 0; i--) {
    if (hpPct <= def.phases[i].hpPct) currentPhase = i;
  }
  // Phase transition effect
  if (currentPhase !== boss.lastPhase && boss.lastPhase >= 0) {
    shakeIntensity = 10;
    particles.emit(boss.x, boss.y, 20, { color: def.color, speed: 150, life: 0.6 });
    sound.tone(150, 0.3, 'sawtooth', 0.4);
    addPopup(boss.x, boss.y - boss.size, 'Phase ' + (currentPhase + 1), '#cc2222', 20);
  }
  boss.lastPhase = currentPhase;
  boss.phase = currentPhase;
  const phaseData = def.phases[currentPhase];
  // Boss movement
  boss.moveTimer += dtSec;
  if (!boss.charging) {
    const wobbleX = Math.sin(boss.moveTimer * 0.8) * arenaW * 0.25;
    const wobbleY = Math.cos(boss.moveTimer * 0.6) * arenaH * 0.08;
    boss.x = MathUtil.lerp(boss.x, arenaX + arenaW / 2 + wobbleX, dtSec * 2);
    boss.y = MathUtil.lerp(boss.y, arenaY + arenaH * 0.2 + wobbleY, dtSec * 2);
  }
  // Boss fire
  boss.fireTimer -= dtSec;
  if (boss.fireTimer <= 0) {
    boss.fireTimer = phaseData.fireRate;
    const pattern = rng.pick(phaseData.patterns);
    spawnPattern(pattern, boss.x, boss.y, CFG.CASTLE_SPEED[G.castle] * 1.2, def.color, G.player.x, G.player.y);
  }
  // Oni charge attack
  if (def.id === 'oni' && phaseData.chargeInterval) {
    boss.chargeTimer -= dtSec;
    if (boss.chargeTimer <= 0 && !boss.charging) {
      boss.charging = true;
      boss.chargeTargetX = G.player.x;
      boss.chargeTargetY = G.player.y;
      boss.chargeTimer = 2.0;
      addPopup(boss.x, boss.y - boss.size * 0.5, '！', '#cc2222', 28);
    }
    if (boss.charging) {
      boss.chargeTimer -= dtSec;
      if (boss.chargeTimer <= 1.0) {
        // Actually charge
        const a = MathUtil.angle(boss.x, boss.y, boss.chargeTargetX, boss.chargeTargetY);
        boss.x += Math.cos(a) * 400 * dtSec;
        boss.y += Math.sin(a) * 400 * dtSec;
        // Contact damage
        if (G.player.invuln <= 0 && !G.player.dashing) {
          if (MathUtil.dist(boss.x, boss.y, G.player.x, G.player.y) < boss.size * 0.6 + CFG.PLAYER_SIZE * 0.4) {
            playerHit();
          }
        }
      }
      if (boss.chargeTimer <= 0) {
        boss.charging = false;
        boss.chargeTimer = phaseData.chargeInterval;
      }
    }
  }
  // Fox clone management
  if (def.id === 'fox' && phaseData.clones) {
    while (G.bossClones.length < phaseData.clones) {
      G.bossClones.push({
        x: arenaX + rng.range(arenaW * 0.2, arenaW * 0.8),
        y: arenaY + rng.range(arenaH * 0.1, arenaH * 0.4),
        angle: rng.range(0, Math.PI * 2), speed: 40, fireTimer: rng.range(1, 3)
      });
    }
    for (const clone of G.bossClones) {
      clone.angle += dtSec * 0.5;
      clone.x += Math.cos(clone.angle) * clone.speed * dtSec;
      clone.y += Math.sin(clone.angle) * clone.speed * dtSec;
      clone.x = MathUtil.clamp(clone.x, arenaX + 30, arenaX + arenaW - 30);
      clone.y = MathUtil.clamp(clone.y, arenaY + 30, arenaY + arenaH * 0.5);
      clone.fireTimer -= dtSec;
      if (clone.fireTimer <= 0) {
        clone.fireTimer = phaseData.fireRate * 1.5;
        spawnPattern('AIMED', clone.x, clone.y, CFG.CASTLE_SPEED[G.castle], def.color + '88');
      }
    }
  }
  // Boss clamp
  boss.x = MathUtil.clamp(boss.x, arenaX + boss.size, arenaX + arenaW - boss.size);
  boss.y = MathUtil.clamp(boss.y, arenaY + boss.size, arenaY + arenaH - boss.size);
}

/* ═══════════════════════════════════════════════════════════════
   R7 — PROGRESSION (업그레이드, 유물, DDA)
   ═══════════════════════════════════════════════════════════════ */

function generateRewardChoices() {
  // Pick 3 relics player doesn't have (F25 DPS cap check)
  const available = RELIC_DEFS.filter(r => {
    if (G.relics.some(pr => pr.id === r.id)) return false;
    if (r.isDPS && getDPSMult() >= CFG.DPS_CAP) return false;
    return true;
  });
  G.rewardChoices = [];
  const pool = available.slice();
  for (let i = 0; i < Math.min(CFG.RELICS_PER_REWARD, pool.length); i++) {
    const idx = rng.int(0, pool.length - 1);
    G.rewardChoices.push(pool.splice(idx, 1)[0]);
  }
}

function applyRelic(relic) {
  G.relics.push(relic);
  if (!G.relicsFound.includes(relic.id)) G.relicsFound.push(relic.id);
  // Immediate effects
  if (relic.effect === 'dragonScale') {
    G.player.maxHp = getMaxHP();
    G.player.hp = Math.min(G.player.hp + 2, G.player.maxHp);
  }
  sound.sfx('powerup');
  addPopup(W / 2, H / 2, relic['name_' + langKey], '#ffd700', 20);
}

function canUpgrade(axis, level) {
  if (level >= 3) return false;
  const cost = UPGRADE_DEFS[axis][level].cost;
  return G.gold >= cost;
}

function applyUpgrade(axis) {
  const level = G.upgrades[axis];
  if (level >= 3) return;
  const cost = UPGRADE_DEFS[axis][level].cost;
  if (G.gold < cost) return;
  G.gold -= cost;
  G.upgrades[axis]++;
  sound.sfx('powerup');
  // Immediate effect for body upgrade
  if (axis === 'body') {
    G.player.maxHp = getMaxHP();
    if (G.upgrades.body === 2) G.player.hp = Math.min(G.player.hp + 1, G.player.maxHp);
  }
}

/* ═══════════════════════════════════════════════════════════════
   R8 — SOUND SYSTEM (프로시저럴 BGM + SFX)
   ═══════════════════════════════════════════════════════════════ */

let bgmCtx = null;
let bgmInterval = null;
let bgmGain = null;
let bgmScheduleTime = 0;
const BGM_NOTES = {
  field: [
    { freq: 392, dur: 0.3, type: 'sine' },
    { freq: 440, dur: 0.2, type: 'sine' },
    { freq: 523, dur: 0.4, type: 'sine' },
    { freq: 440, dur: 0.3, type: 'sine' },
    { freq: 349, dur: 0.4, type: 'sine' },
    { freq: 330, dur: 0.3, type: 'sine' },
    { freq: 392, dur: 0.5, type: 'sine' },
    { freq: 0, dur: 0.3, type: 'sine' }
  ],
  battle: [
    { freq: 220, dur: 0.15, type: 'square' },
    { freq: 262, dur: 0.15, type: 'square' },
    { freq: 330, dur: 0.15, type: 'square' },
    { freq: 262, dur: 0.15, type: 'square' },
    { freq: 220, dur: 0.15, type: 'square' },
    { freq: 196, dur: 0.15, type: 'square' },
    { freq: 220, dur: 0.3, type: 'square' },
    { freq: 0, dur: 0.15, type: 'square' }
  ],
  boss: [
    { freq: 110, dur: 0.2, type: 'sawtooth' },
    { freq: 131, dur: 0.2, type: 'sawtooth' },
    { freq: 165, dur: 0.2, type: 'sawtooth' },
    { freq: 196, dur: 0.3, type: 'sawtooth' },
    { freq: 165, dur: 0.2, type: 'sawtooth' },
    { freq: 131, dur: 0.2, type: 'sawtooth' },
    { freq: 110, dur: 0.4, type: 'sawtooth' },
    { freq: 0, dur: 0.2, type: 'sawtooth' }
  ]
};
let bgmNodes = [];
let currentBGM = null;

function scheduleBGMNotes(track) {
  if (bgmMuted || !bgmCtx) return;
  const notes = BGM_NOTES[track];
  if (!notes) return;
  const now = bgmCtx.currentTime;
  const lookahead = 2.0;
  while (bgmScheduleTime < now + lookahead) {
    for (const note of notes) {
      if (note.freq > 0) {
        try {
          const osc = bgmCtx.createOscillator();
          const gain = bgmCtx.createGain();
          osc.type = note.type;
          osc.frequency.value = note.freq;
          gain.gain.setValueAtTime(0.08, bgmScheduleTime);
          gain.gain.exponentialRampToValueAtTime(0.001, bgmScheduleTime + note.dur);
          osc.connect(gain);
          gain.connect(bgmGain || bgmCtx.destination);
          osc.start(bgmScheduleTime);
          osc.stop(bgmScheduleTime + note.dur + 0.05);
          bgmNodes.push(osc);
        } catch (e) {}
      }
      bgmScheduleTime += note.dur;
    }
  }
  // Sliding window cleanup (Cycle 39 pattern)
  if (bgmNodes.length > 64) bgmNodes = bgmNodes.slice(-32);
}

function startBGM(track) {
  if (currentBGM === track) return;
  stopBGM();
  currentBGM = track;
  if (bgmMuted) return;
  try {
    if (!bgmCtx) {
      bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
      bgmGain = bgmCtx.createGain();
      bgmGain.gain.value = 0.15;
      bgmGain.connect(bgmCtx.destination);
    }
    if (bgmCtx.state === 'suspended') bgmCtx.resume();
    bgmScheduleTime = bgmCtx.currentTime;
  } catch (e) {}
}

function stopBGM() {
  currentBGM = null;
  bgmNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  bgmNodes = [];
}

function updateBGM() {
  if (currentBGM && !bgmMuted && bgmCtx) {
    scheduleBGMNotes(currentBGM);
  }
}

/* ═══════════════════════════════════════════════════════════════
   R9 — STATE MACHINE & TRANSITIONS (F5, F6, F21, F30)
   ═══════════════════════════════════════════════════════════════ */

function beginTransition(from, to) {
  if (from === to) return false;
  // Priority override: GAMEOVER/VICTORY always allowed (F30)
  if (to !== S.GAMEOVER && to !== S.VICTORY) {
    const entry = TRANSITION_TABLE[from];
    if (!entry || !entry.targets.includes(to)) {
      console.warn('[Transition] Invalid: ' + S_NAMES[from] + '→' + S_NAMES[to]);
      return false;
    }
  }
  if (_transitioning) return false;
  _transitioning = true;
  // Fade out
  const fadeObj = { alpha: 0 };
  tween.add(fadeObj, { alpha: 1 }, 300, 'easeIn', () => {
    fadeAlpha = 1;
    enterState(to);
    // Fade in
    const fadeInObj = { alpha: 1 };
    tween.add(fadeInObj, { alpha: 0 }, 300, 'easeOut', () => {
      fadeAlpha = 0;
      _transitioning = false;
    });
    const trackFadeIn = () => { fadeAlpha = fadeInObj.alpha; };
    bus.on('_fi', trackFadeIn);
    const origUpdate = tween._tweens;
    // We track via bus frame
    bus.on('frame', function _fiu() { fadeAlpha = fadeInObj.alpha; if (fadeInObj.alpha <= 0.01) bus.off('frame', _fiu); });
  });
  // Track fade out alpha
  bus.on('frame', function _fou() { fadeAlpha = fadeObj.alpha; if (fadeObj.alpha >= 0.99) bus.off('frame', _fou); });
  return true;
}

function enterState(newState) {
  prevState = state;
  state = newState;
  switch (newState) {
    case S.TITLE:
      titleAnim = 0;
      startBGM('field');
      break;
    case S.MAP:
      startBGM('field');
      break;
    case S.STAGE:
      enterStage();
      startBGM('battle');
      break;
    case S.BOSS:
      enterBossStage();
      startBGM('boss');
      break;
    case S.REWARD:
      generateRewardChoices();
      break;
    case S.UPGRADE:
      G.upgradeScroll = 0;
      break;
    case S.GAMEOVER:
      dda.recordDeath();
      G.consecutiveDeaths++;
      sound.sfx('gameover');
      shakeIntensity = 12;
      // F8: 판정 먼저, 저장 나중에
      const isNewBest = G.score > Save.getHighScore(GAME_ID);
      Save.setHighScore(GAME_ID, G.score);
      saveProgress();
      if (isNewBest) addPopup(W / 2, H / 2 - 60, t('new_best'), '#ffd700', 24);
      break;
    case S.VICTORY:
      sound.sfx('powerup');
      const isNewBest2 = G.score > Save.getHighScore(GAME_ID);
      Save.setHighScore(GAME_ID, G.score);
      saveProgress();
      if (isNewBest2) addPopup(W / 2, H / 2 - 60, t('new_best'), '#ffd700', 24);
      break;
    case S.PAUSED:
      break;
  }
}

function enterStage() {
  G.segment = 0;
  G.segmentTimer = CFG.SEGMENT_DURATION;
  G.spawnTimer = 1.0;
  G._clearing = false;
  clearAllEnemies();
  clearAllBullets();
  // Weather
  const wd = WEATHER_DEFS.find(w => w.castle === G.castle);
  G.weather = wd || null;
  if (wd && wd.healOnStart) {
    G.player.hp = Math.min(G.player.hp + 1, G.player.maxHp);
    addPopup(G.player.x, G.player.y - 30, '+1 HP', '#ffb7c5', 16);
  }
  // Narrative
  const castleNarratives = [t('narrative_castle1'), t('narrative_castle2'), t('narrative_castle3')];
  narrativeText = castleNarratives[G.castle] || '';
  narrativeTimer = 2.5;
  // Reset player position
  G.player.x = arenaX + arenaW / 2;
  G.player.y = arenaY + arenaH * 0.75;
}

function enterBossStage() {
  clearAllEnemies();
  clearAllBullets();
  G._clearing = false;
  G.player.x = arenaX + arenaW / 2;
  G.player.y = arenaY + arenaH * 0.75;
  initBoss(G.castle - 1);
}

/* ═══════════════════════════════════════════════════════════════
   R10 — MAIN UPDATE LOOP
   ═══════════════════════════════════════════════════════════════ */

function mainUpdate(dt, timestamp) {
  frameCount++;
  // Slow motion
  if (slowTimer > 0) {
    slowTimer -= dt / 1000;
    if (slowTimer <= 0) { timeScale = 1.0; slowTimer = 0; }
  }
  const effectiveDt = dt * timeScale;
  // Systems that always update (F7 matrix)
  tween.update(effectiveDt);
  particles.update(effectiveDt);
  updateBGM();
  // Shake decay
  if (shakeIntensity > 0) shakeIntensity = Math.max(0, shakeIntensity - dt / 1000 * 30);
  // Narrative timer
  if (narrativeTimer > 0) narrativeTimer -= dt / 1000;
  // Popups update
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.life -= dt / 1000;
    p.y += p.vy * dt / 1000;
    p.alpha = Math.max(0, p.life);
    if (p.life <= 0) popups.splice(i, 1);
  }
  // Weather particles
  updateWeatherParticles(dt);
  // State-specific update
  switch (state) {
    case S.TITLE: updateTitle(effectiveDt); break;
    case S.MAP: updateMap(effectiveDt); break;
    case S.STAGE: updateStage(effectiveDt); break;
    case S.BOSS: updateBossState(effectiveDt); break;
    case S.REWARD: updateReward(effectiveDt); break;
    case S.UPGRADE: updateUpgradeState(effectiveDt); break;
    case S.GAMEOVER: updateGameOver(effectiveDt); break;
    case S.VICTORY: updateVictoryState(effectiveDt); break;
    case S.PAUSED: updatePaused(effectiveDt); break;
  }
  // Global key checks
  if (input.jp('KeyL') && state !== S.STAGE && state !== S.BOSS) {
    langKey = langKey === 'ko' ? 'en' : 'ko';
  }
  if (input.jp('KeyM')) {
    bgmMuted = !bgmMuted;
    if (bgmMuted) stopBGM(); else if (currentBGM) startBGM(currentBGM);
  }
  input.flush();
}

/* ═══════════════════════════════════════════════════════════════
   R10.1 — STATE UPDATE FUNCTIONS
   ═══════════════════════════════════════════════════════════════ */

function updateTitle(dt) {
  titleAnim += dt / 1000;
  titleBlink += dt / 1000;
  if (input.confirm()) {
    sound.init();
    sound.sfx('select');
    initNewRun();
    beginTransition(S.TITLE, S.MAP);
  }
}

function initNewRun() {
  G.player.hp = CFG.MAX_HP;
  G.player.maxHp = CFG.MAX_HP;
  G.player.ultGauge = 0;
  G.player.invuln = 0;
  G.player.slashing = false;
  G.player.dashing = false;
  G.player.dashCooldown = 0;
  G.score = 0;
  G.gold = 0;
  G.castle = 0;
  G.stageInCastle = 0;
  G.segment = 0;
  G.relics = [];
  G.upgrades = { sword: 0, body: 0, mind: 0 };
  G.deathsThisRun = 0;
  G.consecutiveDeaths = 0;
  G.bossActive = null;
  G.bossClones = [];
  G.bossRewardGiven = false;
  combo.fullReset();
  clearAllEnemies();
  clearAllBullets();
  particles.clear();
  popups.length = 0;
  loadProgress();
}

function updateMap(dt) {
  // Castle selection via click/tap
  if (input.tapped) {
    const castleCount = 3; // Phase 1: 3 castles
    const btnW = Math.min(200, W * 0.25);
    const btnH = 60;
    const startX = W / 2 - (castleCount * (btnW + 20)) / 2;
    for (let i = 0; i < castleCount; i++) {
      const bx = startX + i * (btnW + 20);
      const by = H / 2 - 30;
      if (UI.hitTest(input.tapX, input.tapY, bx, by, btnW, btnH)) {
        // Check if unlocked
        if (isCastleUnlocked(i)) {
          G.castle = i;
          G.stageInCastle = 0;
          G.mapSelectedCastle = i;
          sound.sfx('select');
          // If castle has boss and all stages cleared, go to boss
          if (i > 0 && G.stageInCastle >= CFG.STAGE_PER_CASTLE) {
            beginTransition(S.MAP, S.BOSS);
          } else {
            beginTransition(S.MAP, S.STAGE);
          }
        }
      }
    }
    // Upgrade button
    const ubx = W / 2 - 80, uby = H / 2 + 80;
    if (UI.hitTest(input.tapX, input.tapY, ubx, uby, 160, 45)) {
      sound.sfx('select');
      beginTransition(S.MAP, S.UPGRADE);
    }
  }
  // Keyboard navigation
  if (input.jp('Enter') || input.jp('Space')) {
    if (isCastleUnlocked(G.mapSelectedCastle)) {
      G.castle = G.mapSelectedCastle;
      G.stageInCastle = 0;
      sound.sfx('select');
      beginTransition(S.MAP, S.STAGE);
    }
  }
  if (input.jp('ArrowRight') || input.jp('KeyD')) {
    G.mapSelectedCastle = Math.min(2, G.mapSelectedCastle + 1);
    sound.tone(440, 0.05, 'square', 0.2);
  }
  if (input.jp('ArrowLeft') || input.jp('KeyA')) {
    G.mapSelectedCastle = Math.max(0, G.mapSelectedCastle - 1);
    sound.tone(440, 0.05, 'square', 0.2);
  }
}

function isCastleUnlocked(castle) {
  if (castle === 0) return true;
  if (castle === 1) return isCastleCleared(0);
  if (castle === 2) return isCastleCleared(1);
  return false;
}

function isCastleCleared(castle) {
  const saveData = loadSaveData();
  return saveData.castlesCleared.includes(castle);
}

function updateStage(dt) {
  if (G._clearing) return;
  const dtSec = dt / 1000;
  // Player movement
  updatePlayerMovement(dt);
  updateSlash();
  updateDash(dt);
  // Invulnerability
  if (G.player.invuln > 0) G.player.invuln -= dtSec;
  if (G.player.dashCooldown > 0) G.player.dashCooldown -= 1;
  // Combo
  combo.update(dtSec);
  // Bullets
  updateBullets(dt);
  // Enemies
  updateEnemies(dt);
  // Spawn enemies
  G.spawnTimer -= dtSec;
  if (G.spawnTimer <= 0) {
    const spawnInterval = CFG.SPAWN_INTERVAL_CASTLE[G.castle] || 3.0;
    G.spawnTimer = spawnInterval / dda.densityMult;
    // Determine which enemies to spawn based on castle
    const maxEnemyType = Math.min(G.castle + 1, ENEMY_DEFS.length);
    const typeIdx = rng.int(0, maxEnemyType - 1);
    spawnEnemy(typeIdx);
  }
  // Segment timer
  G.segmentTimer -= dtSec;
  if (G.segmentTimer <= 0) {
    advanceSegment();
  }
  // Input: slash/dash/ultimate
  if (input.jp('KeyJ') || input.jp('KeyZ')) startSlash();
  if (input.jp('KeyK') || input.jp('KeyX')) startDash();
  if (input.jp('KeyL') || input.jp('KeyC')) activateUltimate();
  // Pause
  if (input.jp('Escape')) {
    prevState = S.STAGE;
    state = S.PAUSED;
  }
  // Touch buttons
  handleTouchButtons();
}

function advanceSegment() {
  G.segment++;
  if (G.segment >= CFG.SEGMENTS_PER_STAGE) {
    // Stage complete
    G._clearing = true;
    clearAllBullets();
    clearAllEnemies();
    G.score += 500 * (1 + G.player.hp * 0.2);
    G.gold += Math.round(50 * (G.castle * CFG.STAGE_PER_CASTLE + G.stageInCastle + 1) * dda.rewardMult);
    // Heal on clear relic
    if (hasRelic('heal_charm')) {
      G.player.hp = Math.min(G.player.hp + 1, G.player.maxHp);
      addPopup(G.player.x, G.player.y - 30, '+1 HP', '#ffb7c5', 14);
    }
    addPopup(W / 2, H / 2, t('stage_clear'), '#ffd700', 24);
    sound.sfx('score');
    dda.recordClear();
    G.stageInCastle++;
    // Check if need to go to boss
    tween.add({ t: 0 }, { t: 1 }, 1500, 'easeOut', () => {
      G._clearing = false;
      if (G.stageInCastle >= CFG.STAGE_PER_CASTLE && G.castle > 0) {
        // Boss stage
        beginTransition(S.STAGE, S.BOSS);
      } else if (G.stageInCastle >= CFG.STAGE_PER_CASTLE) {
        // Castle 0 complete (no boss)
        markCastleCleared(G.castle);
        beginTransition(S.STAGE, S.REWARD);
      } else {
        // Next stage in same castle
        enterStage();
      }
    });
  } else {
    // Next segment
    G.segmentTimer = CFG.SEGMENT_DURATION;
    addPopup(W / 2, H / 2, t('segment') + ' ' + (G.segment + 1), '#00d4ff', 18);
    sound.tone(600, 0.1, 'sine', 0.2);
  }
}

function updateBossState(dt) {
  if (G._clearing) return;
  const dtSec = dt / 1000;
  updatePlayerMovement(dt);
  updateSlash();
  updateDash(dt);
  if (G.player.invuln > 0) G.player.invuln -= dtSec;
  if (G.player.dashCooldown > 0) G.player.dashCooldown -= 1;
  combo.update(dtSec);
  updateBullets(dt);
  updateBoss(dt);
  // Input
  if (input.jp('KeyJ') || input.jp('KeyZ')) startSlash();
  if (input.jp('KeyK') || input.jp('KeyX')) startDash();
  if (input.jp('KeyL') || input.jp('KeyC')) activateUltimate();
  if (input.jp('Escape')) { prevState = S.BOSS; state = S.PAUSED; }
  handleTouchButtons();
}

function updateReward(dt) {
  if (input.tapped) {
    const choices = G.rewardChoices;
    const btnW = Math.min(180, W * 0.28);
    const btnH = 80;
    const startX = W / 2 - (choices.length * (btnW + 15)) / 2;
    for (let i = 0; i < choices.length; i++) {
      const bx = startX + i * (btnW + 15);
      const by = H / 2 - 20;
      if (UI.hitTest(input.tapX, input.tapY, bx, by, btnW, btnH)) {
        applyRelic(choices[i]);
        beginTransition(S.REWARD, S.MAP);
        return;
      }
    }
    // Skip button
    const skipY = H / 2 + 100;
    if (UI.hitTest(input.tapX, input.tapY, W / 2 - 60, skipY, 120, 40)) {
      beginTransition(S.REWARD, S.MAP);
    }
  }
}

function updateUpgradeState(dt) {
  if (input.tapped) {
    const axes = ['sword', 'body', 'mind'];
    const btnW = Math.min(180, W * 0.28);
    const btnH = 70;
    const startX = W / 2 - (3 * (btnW + 15)) / 2;
    for (let i = 0; i < 3; i++) {
      const bx = startX + i * (btnW + 15);
      const by = H / 2 - 20;
      if (UI.hitTest(input.tapX, input.tapY, bx, by, btnW, btnH)) {
        const axis = axes[i];
        if (canUpgrade(axis, G.upgrades[axis])) {
          applyUpgrade(axis);
        }
      }
    }
    // Back button
    if (UI.hitTest(input.tapX, input.tapY, W / 2 - 60, H / 2 + 100, 120, 40)) {
      beginTransition(S.UPGRADE, S.MAP);
    }
  }
  if (input.jp('Escape')) beginTransition(S.UPGRADE, S.MAP);
}

function updateGameOver(dt) {
  if (input.jp('KeyR') || input.tapped) {
    if (G.consecutiveDeaths >= 3) {
      // 3 consecutive deaths = run over, back to title
      beginTransition(S.GAMEOVER, S.TITLE);
    } else {
      // Retry current stage
      beginTransition(S.GAMEOVER, S.TITLE);
    }
  }
}

function updateVictoryState(dt) {
  if (input.confirm()) {
    beginTransition(S.VICTORY, S.TITLE);
  }
}

function updatePaused(dt) {
  if (input.jp('Escape')) {
    state = prevState;
  }
  if (input.tapped) {
    // Resume button
    if (UI.hitTest(input.tapX, input.tapY, W / 2 - 80, H / 2 - 40, 160, 45)) {
      state = prevState;
    }
    // Quit button
    if (UI.hitTest(input.tapX, input.tapY, W / 2 - 80, H / 2 + 20, 160, 45)) {
      beginTransition(S.PAUSED, S.TITLE);
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   R10.2 — PLAYER MOVEMENT
   ═══════════════════════════════════════════════════════════════ */

function updatePlayerMovement(dt) {
  if (G.player.dashing) return;
  const dtSec = dt / 1000;
  const speed = getPlayerSpeed();
  const weatherSpeedMult = (G.weather && G.weather.speedMult) ? G.weather.speedMult : 1.0;
  let dx = 0, dy = 0;
  // Keyboard
  if (input.held('KeyW') || input.held('ArrowUp')) dy -= 1;
  if (input.held('KeyS') || input.held('ArrowDown')) dy += 1;
  if (input.held('KeyA') || input.held('ArrowLeft')) dx -= 1;
  if (input.held('KeyD') || input.held('ArrowRight')) dx += 1;
  // Virtual joystick
  if (virtualJoystick.active) {
    dx = virtualJoystick.dx;
    dy = virtualJoystick.dy;
  }
  // Normalize
  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;
    G.player.moveDir = Math.atan2(dy, dx);
  } else {
    G.player.moveDir = -1;
  }
  G.player.x += dx * speed * weatherSpeedMult * dtSec;
  G.player.y += dy * speed * weatherSpeedMult * dtSec;
  // Clamp
  G.player.x = MathUtil.clamp(G.player.x, arenaX + CFG.PLAYER_SIZE, arenaX + arenaW - CFG.PLAYER_SIZE);
  G.player.y = MathUtil.clamp(G.player.y, arenaY + CFG.PLAYER_SIZE, arenaY + arenaH - CFG.PLAYER_SIZE);
  // Aim direction (mouse or move direction)
  if (!input.isMobile && (input.mouseX > 0 || input.mouseY > 0)) {
    G.player.angle = MathUtil.angle(G.player.x, G.player.y, input.mouseX, input.mouseY);
  } else if (G.player.moveDir >= 0) {
    G.player.angle = G.player.moveDir;
  }
}

/* ═══════════════════════════════════════════════════════════════
   R10.3 — VIRTUAL JOYSTICK & TOUCH BUTTONS
   ═══════════════════════════════════════════════════════════════ */

const virtualJoystick = { active: false, baseX: 0, baseY: 0, dx: 0, dy: 0, touchId: -1 };
const touchButtons = [
  { id: 'slash', label: '', x: 0, y: 0, w: 56, h: 56, color: '#cc2222', pressed: false },
  { id: 'dash', label: '', x: 0, y: 0, w: 56, h: 56, color: '#00d4ff', pressed: false },
  { id: 'ult', label: '', x: 0, y: 0, w: 56, h: 56, color: '#ffd700', pressed: false }
];

function layoutTouchButtons() {
  if (!input.isMobile) return;
  const size = Math.max(48, 56);
  const margin = 12;
  const bottomY = H - size - margin - 10;
  // Right side buttons
  touchButtons[0].x = W - size * 3 - margin * 3;
  touchButtons[0].y = bottomY;
  touchButtons[0].w = size; touchButtons[0].h = size;
  touchButtons[0].label = t('slash');
  touchButtons[1].x = W - size * 2 - margin * 2;
  touchButtons[1].y = bottomY - size * 0.5;
  touchButtons[1].w = size; touchButtons[1].h = size;
  touchButtons[1].label = t('dash');
  touchButtons[2].x = W - size - margin;
  touchButtons[2].y = bottomY;
  touchButtons[2].w = size; touchButtons[2].h = size;
  touchButtons[2].label = t('ultimate');
  // Joystick base position
  virtualJoystick.baseX = margin + 50;
  virtualJoystick.baseY = bottomY - 10;
}

function handleTouchButtons() {
  if (!input.isMobile) return;
  // Process touches for joystick and buttons
  const touches = input.touches;
  virtualJoystick.active = false;
  touchButtons.forEach(b => b.pressed = false);
  for (const touch of touches) {
    // Joystick - left half of screen
    if (touch.x < W / 2) {
      virtualJoystick.active = true;
      const jx = touch.x - virtualJoystick.baseX;
      const jy = touch.y - virtualJoystick.baseY;
      const dist = Math.sqrt(jx * jx + jy * jy);
      const maxDist = 50;
      if (dist > 5) {
        virtualJoystick.dx = (jx / Math.max(dist, maxDist));
        virtualJoystick.dy = (jy / Math.max(dist, maxDist));
      } else {
        virtualJoystick.dx = 0;
        virtualJoystick.dy = 0;
      }
    }
    // Buttons - right side
    for (const btn of touchButtons) {
      if (UI.hitTest(touch.x, touch.y, btn.x, btn.y, btn.w, btn.h)) {
        btn.pressed = true;
      }
    }
  }
  // Trigger actions on tap
  if (input.tapped) {
    for (const btn of touchButtons) {
      if (UI.hitTest(input.tapX, input.tapY, btn.x, btn.y, btn.w, btn.h)) {
        if (btn.id === 'slash') startSlash();
        else if (btn.id === 'dash') startDash();
        else if (btn.id === 'ult') activateUltimate();
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   R11 — WEATHER PARTICLES
   ═══════════════════════════════════════════════════════════════ */

function updateWeatherParticles(dt) {
  const dtSec = dt / 1000;
  if (state !== S.STAGE && state !== S.BOSS) { weatherParticles.length = 0; return; }
  if (!G.weather) { weatherParticles.length = 0; return; }
  // Spawn new
  const maxP = 60;
  while (weatherParticles.length < maxP) {
    const wd = G.weather;
    if (wd.id === 'cherry') {
      weatherParticles.push({
        x: rng.range(0, W), y: -10, vx: rng.range(-20, 20),
        vy: rng.range(30, 60), size: rng.range(3, 7),
        color: '#ffb7c5', alpha: rng.range(0.3, 0.8), rot: rng.range(0, 6.28)
      });
    } else if (wd.id === 'volcanic') {
      weatherParticles.push({
        x: rng.range(0, W), y: -10, vx: rng.range(-10, 10),
        vy: rng.range(20, 50), size: rng.range(2, 5),
        color: '#888', alpha: rng.range(0.2, 0.5), rot: 0
      });
    } else if (wd.id === 'rain') {
      weatherParticles.push({
        x: rng.range(0, W), y: -10, vx: rng.range(-5, 5),
        vy: rng.range(200, 350), size: rng.range(1, 3),
        color: '#6688cc', alpha: rng.range(0.2, 0.5), rot: 0
      });
    }
  }
  // Update
  for (let i = weatherParticles.length - 1; i >= 0; i--) {
    const p = weatherParticles[i];
    p.x += p.vx * dtSec;
    p.y += p.vy * dtSec;
    if (p.rot) p.rot += dtSec;
    if (p.y > H + 20) weatherParticles.splice(i, 1);
  }
}

/* ═══════════════════════════════════════════════════════════════
   R12 — EVENT BUS HANDLERS
   ═══════════════════════════════════════════════════════════════ */

bus.on('player_dead', () => {
  if (state === S.GAMEOVER) return;
  G.deathsThisRun++;
  beginTransition(state, S.GAMEOVER);
});

bus.on('boss_defeated', () => {
  if (G.bossRewardGiven) return;
  G.bossRewardGiven = true;
  G._clearing = true;
  G.score += 2000 * (1 + G.player.hp * 0.5);
  G.gold += Math.round(300 * dda.rewardMult);
  markCastleCleared(G.castle);
  shakeIntensity = 15;
  sound.sfx('score');
  addPopup(W / 2, H / 2, t('boss_defeated'), '#ffd700', 28);
  particles.emit(G.bossActive.x, G.bossActive.y, 30, { color: '#ffd700', speed: 200, life: 1.0 });
  tween.add({ t: 0 }, { t: 1 }, 2000, 'easeOut', () => {
    G._clearing = false;
    G.bossActive = null;
    G.bossClones = [];
    // Check if all castles cleared
    const saveData = loadSaveData();
    if (saveData.castlesCleared.length >= 3) {
      beginTransition(S.BOSS, S.VICTORY);
    } else {
      beginTransition(S.BOSS, S.REWARD);
    }
  });
});

bus.on('gauge_charge', (data) => {
  G.player.ultGauge = Math.min(CFG.ULT_GAUGE_MAX, G.player.ultGauge + data.amount * getGaugeChargeMult());
});

bus.on('speed_buff', () => {
  // Speed buff handled via combo count check in getPlayerSpeed
});

/* ═══════════════════════════════════════════════════════════════
   R13 — SAVE/LOAD (localStorage)
   ═══════════════════════════════════════════════════════════════ */

function loadSaveData() {
  return Save.get('ix_' + GAME_ID + '_save', {
    version: 1, bestScore: 0, bestCombo: 0, totalRuns: 0, totalKills: 0,
    upgrades: { sword: 0, body: 0, mind: 0 },
    gold: 0, relicsFound: [], castlesCleared: [], bossesDefeated: [],
    hiddenUnlocked: false, lang: 'ko', bgmMuted: false
  });
}

function saveProgress() {
  const data = loadSaveData();
  data.bestScore = Math.max(data.bestScore, G.score);
  data.bestCombo = Math.max(data.bestCombo, combo.best);
  data.totalRuns++;
  for (const id of G.relicsFound) {
    if (!data.relicsFound.includes(id)) data.relicsFound.push(id);
  }
  data.lang = langKey;
  data.bgmMuted = bgmMuted;
  Save.set('ix_' + GAME_ID + '_save', data);
}

function loadProgress() {
  const data = loadSaveData();
  langKey = data.lang || 'ko';
  bgmMuted = data.bgmMuted || false;
  G.relicsFound = data.relicsFound || [];
}

function markCastleCleared(castle) {
  const data = loadSaveData();
  if (!data.castlesCleared.includes(castle)) {
    data.castlesCleared.push(castle);
    Save.set('ix_' + GAME_ID + '_save', data);
  }
}

/* ═══════════════════════════════════════════════════════════════
   R14 — MAIN RENDER
   ═══════════════════════════════════════════════════════════════ */

function mainRender(ctx, w, h, dt) {
  W = w; H = h;
  recalcArena();
  layoutTouchButtons();
  // Shake offset
  const sk = UI.shake(shakeIntensity);
  ctx.save();
  ctx.translate(sk.x, sk.y);
  // Clear
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-10, -10, w + 20, h + 20);
  switch (state) {
    case S.TITLE: renderTitle(ctx, w, h); break;
    case S.MAP: renderMap(ctx, w, h); break;
    case S.STAGE: renderStage(ctx, w, h); break;
    case S.BOSS: renderBossStage(ctx, w, h); break;
    case S.REWARD: renderReward(ctx, w, h); break;
    case S.UPGRADE: renderUpgrade(ctx, w, h); break;
    case S.GAMEOVER: renderGameOver(ctx, w, h); break;
    case S.VICTORY: renderVictory(ctx, w, h); break;
    case S.PAUSED: renderPaused(ctx, w, h); break;
  }
  // Popups (on top of everything)
  renderPopups(ctx);
  // Particles
  particles.render(ctx);
  // Fade overlay
  UI.fade(ctx, w, h, fadeAlpha);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   R14.1 — RENDER: TITLE
   ═══════════════════════════════════════════════════════════════ */

function renderTitle(ctx, w, h) {
  // Background
  drawFallbackBg(ctx, w, h, 0);
  // Background particles (cherry blossom)
  renderTitleParticles(ctx, w, h);
  // Scanlines
  UI.scanlines(ctx, w, h, 0.02);
  // Title text
  const pulse = 1 + Math.sin(titleAnim * 2) * 0.03;
  ctx.save();
  ctx.translate(w / 2, h * 0.28);
  ctx.scale(pulse, pulse);
  // Title shadow
  UI.text(ctx, t('title'), 2, 2, { size: 42, color: '#000', bold: true });
  UI.text(ctx, t('title'), 0, 0, { size: 42, color: '#e0e0f0', bold: true, glow: '#cc2222' });
  ctx.restore();
  // Subtitle
  UI.text(ctx, t('subtitle'), w / 2, h * 0.38, { size: 16, color: '#8899aa' });
  // Narrative
  UI.text(ctx, t('narrative_prologue'), w / 2, h * 0.48, { size: 13, color: '#ffb7c5' });
  // Start button
  const blink = Math.sin(titleBlink * 3) > 0;
  if (blink) {
    const btnW = 180, btnH = 48;
    UI.button(ctx, t('start'), w / 2 - btnW / 2, h * 0.6, btnW, btnH, { color: '#cc2222' });
  }
  // Controls hint
  const hint = input.isMobile ? t('touch_hint') : t('controls_hint');
  UI.text(ctx, hint, w / 2, h * 0.75, { size: 12, color: '#505070' });
  // Version & language
  UI.text(ctx, 'v1.0 | ' + t('lang_toggle'), w / 2, h * 0.88, { size: 11, color: '#505070' });
  // Render player image if available
  const playerImg = assets.sprites['playerIdle'];
  if (playerImg) {
    const imgSize = Math.min(120, w * 0.25);
    ctx.drawImage(playerImg, w * 0.15 - imgSize / 2, h * 0.55, imgSize, imgSize);
  }
  // High score
  const best = Save.getHighScore(GAME_ID);
  if (best > 0) {
    UI.text(ctx, t('best_score') + ': ' + best, w / 2, h * 0.68, { size: 13, color: '#ffd700' });
  }
}

function renderTitleParticles(ctx, w, h) {
  ctx.save();
  const t2 = titleAnim;
  for (let i = 0; i < 20; i++) {
    const x = ((i * 73 + t2 * 20) % (w + 40)) - 20;
    const y = ((i * 97 + t2 * (15 + i * 2)) % (h + 40)) - 20;
    const s = 3 + (i % 5);
    ctx.globalAlpha = 0.3 + (i % 3) * 0.15;
    ctx.fillStyle = '#ffb7c5';
    ctx.beginPath();
    // Petal shape
    ctx.ellipse(x, y, s, s * 0.6, (t2 + i) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   R14.2 — RENDER: MAP
   ═══════════════════════════════════════════════════════════════ */

function renderMap(ctx, w, h) {
  drawFallbackBg(ctx, w, h, 0);
  UI.scanlines(ctx, w, h, 0.02);
  // Title
  UI.text(ctx, t('select_castle'), w / 2, h * 0.12, { size: 22, color: '#e0e0f0', bold: true, glow: '#6c3cf7' });
  // Gold display
  UI.text(ctx, t('gold') + ': ' + G.gold, w / 2, h * 0.2, { size: 16, color: '#ffd700' });
  // Castle buttons
  const castleCount = 3;
  const btnW = Math.min(180, w * 0.25);
  const btnH = 60;
  const startX = w / 2 - (castleCount * (btnW + 20)) / 2;
  const castleColors = ['#00ff87', '#ff6b35', '#66ccff'];
  for (let i = 0; i < castleCount; i++) {
    const bx = startX + i * (btnW + 20);
    const by = h / 2 - 50;
    const unlocked = isCastleUnlocked(i);
    const cleared = isCastleCleared(i);
    const selected = G.mapSelectedCastle === i;
    const color = unlocked ? castleColors[i] : '#333';
    // Castle card
    ctx.fillStyle = selected ? '#1a1a2e' : '#12121e';
    ctx.strokeStyle = selected ? color : '#1e1e30';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    // Castle image
    const bgKey = ['bgField', 'bgVolcano', 'bgWaterfall'][i];
    const bgImg = assets.sprites[bgKey];
    if (bgImg) {
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(bx + 3, by + 3, btnW - 6, 30, [6, 6, 0, 0]);
      ctx.clip();
      ctx.globalAlpha = unlocked ? 0.5 : 0.2;
      ctx.drawImage(bgImg, bx + 3, by + 3, btnW - 6, 30);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // Name
    const name = t('castle_names')[i];
    UI.text(ctx, unlocked ? name : '???', bx + btnW / 2, by + btnH - 15, { size: 13, color: unlocked ? '#e0e0f0' : '#505070', bold: selected });
    // Cleared badge
    if (cleared) {
      ctx.fillStyle = '#00ff87';
      ctx.font = 'bold 12px ' + UI.FONT;
      ctx.textAlign = 'right';
      ctx.fillText('✓', bx + btnW - 8, by + btnH - 8);
    }
    if (!unlocked) {
      UI.text(ctx, '🔒', bx + btnW / 2, by + 20, { size: 16, color: '#505070' });
    }
  }
  // Upgrade button
  UI.button(ctx, t('upgrade') + ' (' + t('gold') + ': ' + G.gold + ')', w / 2 - 100, h / 2 + 60, 200, 45, { color: '#6c3cf7' });
  // Back button
  UI.button(ctx, t('to_title'), w / 2 - 60, h * 0.85, 120, 36, { color: '#333' });
  if (input.tapped && UI.hitTest(input.tapX, input.tapY, w / 2 - 60, h * 0.85, 120, 36)) {
    beginTransition(S.MAP, S.TITLE);
  }
  // Relics display
  if (G.relics.length > 0) {
    UI.text(ctx, t('relic') + ': ' + G.relics.length, w / 2, h * 0.25, { size: 12, color: '#9966ff' });
  }
}

/* ═══════════════════════════════════════════════════════════════
   R14.3 — RENDER: STAGE & BOSS (GAMEPLAY)
   ═══════════════════════════════════════════════════════════════ */

function renderStage(ctx, w, h) {
  renderGameplay(ctx, w, h);
  // Stage info
  const stageNum = G.castle * CFG.STAGE_PER_CASTLE + G.stageInCastle + 1;
  UI.text(ctx, t('stage_num') + ' ' + stageNum + ' - ' + t('segment') + ' ' + (G.segment + 1) + '/' + CFG.SEGMENTS_PER_STAGE, w / 2, 18, { size: 12, color: '#8899aa' });
  // Segment timer bar
  const timerPct = G.segmentTimer / CFG.SEGMENT_DURATION;
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(arenaX, arenaY - 5, arenaW, 3);
  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(arenaX, arenaY - 5, arenaW * timerPct, 3);
}

function renderBossStage(ctx, w, h) {
  renderGameplay(ctx, w, h);
  // Boss intro
  if (G.introTimer > 0 && G.bossActive) {
    ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, G.introTimer * 0.3) + ')';
    ctx.fillRect(0, 0, w, h);
    const def = G.bossActive.def;
    const name = langKey === 'ko' ? def.name_ko : def.name_en;
    UI.text(ctx, t('boss_appear'), w / 2, h * 0.3, { size: 28, color: '#cc2222', bold: true, glow: '#cc2222' });
    UI.text(ctx, name, w / 2, h * 0.42, { size: 22, color: '#ffd700', bold: true });
    // Boss image
    const bossImg = assets.sprites[def.assetKey];
    const bSize = Math.min(160, w * 0.35);
    if (bossImg) {
      ctx.globalAlpha = Math.min(1, (2.5 - G.introTimer) * 2);
      ctx.drawImage(bossImg, w / 2 - bSize / 2, h * 0.5 - bSize * 0.4, bSize, bSize * 0.75);
      ctx.globalAlpha = 1;
    } else {
      drawFallbackBoss(ctx, w / 2, h * 0.55, bSize * 0.5, def);
    }
  }
  // Boss HP bar
  if (G.bossActive && G.introTimer <= 0) {
    const boss = G.bossActive;
    const barW = Math.min(300, w * 0.6);
    const barH = 12;
    const barX = w / 2 - barW / 2;
    const barY = arenaY + 8;
    const name = langKey === 'ko' ? boss.def.name_ko : boss.def.name_en;
    UI.text(ctx, name, w / 2, barY - 4, { size: 11, color: '#cc2222' });
    UI.hpBar(ctx, barX, barY + 4, barW, barH, boss.hp, boss.maxHp, { fgColor: '#cc2222', bgColor: '#2a1010' });
    // Phase indicator
    UI.text(ctx, 'Phase ' + (boss.phase + 1), w / 2, barY + barH + 14, { size: 10, color: '#8899aa' });
  }
}

function renderGameplay(ctx, w, h) {
  // Background
  const bgKeys = ['bgField', 'bgVolcano', 'bgWaterfall'];
  const bgImg = assets.sprites[bgKeys[G.castle]];
  if (bgImg) {
    ctx.globalAlpha = 0.4;
    ctx.drawImage(bgImg, 0, 0, w, h);
    ctx.globalAlpha = 1;
  } else {
    drawFallbackBg(ctx, w, h, G.castle);
  }
  // Weather particles
  renderWeatherParticles(ctx);
  // Vision restriction (volcanic ash)
  if (G.weather && G.weather.visionMult) {
    const grad = ctx.createRadialGradient(G.player.x, G.player.y, w * G.weather.visionMult * 0.4, G.player.x, G.player.y, w * 0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }
  // Arena border
  ctx.strokeStyle = '#1e1e30';
  ctx.lineWidth = 1;
  ctx.strokeRect(arenaX, arenaY, arenaW, arenaH);
  // Enemies
  renderEnemies(ctx);
  // Boss
  if (G.bossActive && G.introTimer <= 0) renderBoss(ctx);
  // Bullets
  renderBullets(ctx);
  // Player
  renderPlayer(ctx);
  // HUD
  renderHUD(ctx, w, h);
  // Touch controls
  if (input.isMobile) renderTouchControls(ctx);
  // Narrative text
  if (narrativeTimer > 0) {
    ctx.globalAlpha = Math.min(1, narrativeTimer);
    UI.text(ctx, narrativeText, w / 2, arenaY + 30, { size: 14, color: '#ffb7c5', shadow: true });
    ctx.globalAlpha = 1;
  }
  UI.scanlines(ctx, w, h, 0.015);
}

function renderPlayer(ctx) {
  const p = G.player;
  ctx.save();
  // Invulnerability blink
  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  // Dash trail
  if (p.dashing) {
    ctx.globalAlpha = 0.3;
    const trailImg = assets.sprites['playerDash'];
    if (trailImg) {
      ctx.drawImage(trailImg, p.x - CFG.PLAYER_SIZE * 0.8 - Math.cos(p.dashDir) * 20,
                    p.y - CFG.PLAYER_SIZE * 0.8 - Math.sin(p.dashDir) * 20,
                    CFG.PLAYER_SIZE * 1.6, CFG.PLAYER_SIZE * 1.6);
    }
    ctx.globalAlpha = p.invuln > 0 ? 0.4 : 1.0;
  }
  // Player sprite
  let pose = 'idle';
  let spriteKey = 'playerIdle';
  if (p.slashing) { pose = 'slash'; spriteKey = 'playerSlash'; }
  else if (p.dashing) { pose = 'dash'; spriteKey = 'playerDash'; }
  const img = assets.sprites[spriteKey];
  const drawSize = CFG.PLAYER_SIZE * 1.8;
  if (img) {
    ctx.save();
    ctx.translate(p.x, p.y);
    // Flip based on angle
    if (Math.abs(p.angle) > Math.PI * 0.5) ctx.scale(-1, 1);
    ctx.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.restore();
  } else {
    drawFallbackPlayer(ctx, p.x, p.y, CFG.PLAYER_SIZE, pose);
  }
  // Slash arc visual
  if (p.slashing) {
    const slashProgress = p.slashFrame / CFG.SLASH_DURATION;
    const arcRadius = CFG.SLASH_RADIUS * (0.5 + slashProgress * 0.5);
    const halfArc = (getSlashArc() * Math.PI / 180) / 2;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.globalAlpha = 0.6 * (1 - slashProgress);
    // Slash effect image
    const slashImg = assets.sprites['effectSlash'];
    if (slashImg) {
      ctx.save();
      ctx.rotate(p.angle);
      ctx.drawImage(slashImg, 0, -arcRadius * 0.5, arcRadius * 1.2, arcRadius);
      ctx.restore();
    } else {
      ctx.strokeStyle = '#cc2222';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#cc2222';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(0, 0, arcRadius, p.angle - halfArc, p.angle + halfArc);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
  // Direction indicator
  if (!p.slashing && !p.dashing) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(p.angle) * CFG.PLAYER_SIZE * 0.6, Math.sin(p.angle) * CFG.PLAYER_SIZE * 0.6);
    ctx.lineTo(Math.cos(p.angle) * CFG.PLAYER_SIZE * 1.2, Math.sin(p.angle) * CFG.PLAYER_SIZE * 1.2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function renderEnemies(ctx) {
  const active = enemyPool.active;
  for (const e of active) {
    const img = assets.sprites[e.def.assetKey];
    const drawSize = e.size * 1.5;
    if (img) {
      ctx.drawImage(img, e.x - drawSize / 2, e.y - drawSize / 2, drawSize, drawSize);
    } else {
      drawFallbackEnemy(ctx, e.x, e.y, e.size, e.def);
    }
    // HP bar
    if (e.hp < e.maxHp) {
      UI.hpBar(ctx, e.x - e.size * 0.5, e.y - e.size * 0.7, e.size, 3, e.hp, e.maxHp, { fgColor: e.def.color });
    }
  }
}

function renderBoss(ctx) {
  const boss = G.bossActive;
  if (!boss) return;
  const def = boss.def;
  // Boss glow
  ctx.save();
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 15 + Math.sin(frameCount * 0.05) * 5;
  const img = assets.sprites[def.assetKey];
  const drawSize = boss.size * 2;
  if (img) {
    ctx.drawImage(img, boss.x - drawSize / 2, boss.y - drawSize * 0.4, drawSize, drawSize * 0.8);
  } else {
    drawFallbackBoss(ctx, boss.x, boss.y, boss.size, def);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Fox clones
  if (def.id === 'fox') {
    for (const clone of G.bossClones) {
      ctx.globalAlpha = 0.4;
      if (img) {
        const cs = boss.size * 1.5;
        ctx.drawImage(img, clone.x - cs / 2, clone.y - cs * 0.4, cs, cs * 0.75);
      } else {
        drawFallbackBoss(ctx, clone.x, clone.y, boss.size * 0.6, def);
      }
      ctx.globalAlpha = 1;
    }
  }
  // Charge warning
  if (boss.charging && boss.chargeTimer > 1.0) {
    ctx.save();
    ctx.strokeStyle = '#cc2222';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(boss.x, boss.y);
    ctx.lineTo(boss.chargeTargetX, boss.chargeTargetY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function renderBullets(ctx) {
  const active = bulletPool.active;
  for (const b of active) {
    drawBullet(ctx, b.x, b.y, b.radius, b.color, b.reflected);
  }
}

function renderWeatherParticles(ctx) {
  for (const p of weatherParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (G.weather && G.weather.id === 'rain') {
      // Rain = lines
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size * 0.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.vx * 0.05, p.y + p.vy * 0.05);
      ctx.stroke();
    } else if (G.weather && G.weather.id === 'cherry') {
      // Cherry petal
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
  }
  ctx.globalAlpha = 1;
}

/* ═══════════════════════════════════════════════════════════════
   R14.4 — RENDER: HUD
   ═══════════════════════════════════════════════════════════════ */

function renderHUD(ctx, w, h) {
  const p = G.player;
  const hudY = 8;
  // HP
  const hpImg = assets.sprites['uiHp'];
  for (let i = 0; i < p.maxHp; i++) {
    const hx = 10 + i * 22;
    if (hpImg && i < p.hp) {
      ctx.drawImage(hpImg, hx, hudY, 20, 20);
    } else if (hpImg) {
      ctx.globalAlpha = 0.3;
      ctx.drawImage(hpImg, hx, hudY, 20, 20);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = i < p.hp ? '#ffb7c5' : '#333';
      ctx.beginPath();
      ctx.arc(hx + 10, hudY + 10, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Combo
  const comboX = w / 2;
  if (combo.count > 0) {
    const scale = 1 + combo._displayPop * 0.3;
    ctx.save();
    ctx.translate(comboX, hudY + 12);
    ctx.scale(scale, scale);
    // Combo frame image
    const comboImg = assets.sprites['uiCombo'];
    if (comboImg) {
      ctx.drawImage(comboImg, -20, -18, 40, 36);
    }
    const comboColor = combo.count >= 50 ? '#ffd700' : combo.count >= 25 ? '#ffd700' : combo.count >= 10 ? '#00d4ff' : '#e0e0f0';
    UI.text(ctx, combo.count + ' ' + t('combo'), 0, 0, { size: 16, color: comboColor, bold: true, glow: comboColor });
    ctx.restore();
  }
  // Score
  UI.text(ctx, t('score') + ': ' + Math.floor(G.score), w - 10, hudY + 8, { size: 13, color: '#ffd700', align: 'right' });
  // Gold
  UI.text(ctx, t('gold') + ': ' + G.gold, w - 10, hudY + 24, { size: 11, color: '#ffd700', align: 'right' });
  // Ultimate gauge
  const gaugeW = 120, gaugeH = 8;
  const gaugeX = w / 2 - gaugeW / 2;
  const gaugeY = hudY + 30;
  const gaugePct = p.ultGauge / CFG.ULT_GAUGE_MAX;
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(gaugeX, gaugeY, gaugeW, gaugeH);
  const gColor = gaugePct >= 1 ? '#ffd700' : '#cc2222';
  ctx.fillStyle = gColor;
  ctx.fillRect(gaugeX, gaugeY, gaugeW * gaugePct, gaugeH);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(gaugeX, gaugeY, gaugeW, gaugeH);
  if (gaugePct >= 1) {
    UI.text(ctx, t('ult_ready'), w / 2, gaugeY + gaugeH + 10, { size: 10, color: '#ffd700', bold: true, glow: '#ffd700' });
  }
  // Dash cooldown
  if (p.dashCooldown > 0) {
    const cdPct = p.dashCooldown / getDashCooldown();
    UI.text(ctx, t('dash_cooldown') + ' ' + Math.ceil(p.dashCooldown), 10, h - 20, { size: 10, color: '#00d4ff', align: 'left' });
  }
  // DDA level indicator (hidden but subtle)
  if (dda.level > 0) {
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < dda.level; i++) {
      ctx.fillStyle = '#00ff87';
      ctx.fillRect(w - 10 - i * 5, h - 8, 3, 3);
    }
    ctx.globalAlpha = 1;
  }
  // Relics mini display
  if (G.relics.length > 0) {
    const relicImg = assets.sprites['itemRelic'];
    for (let i = 0; i < Math.min(G.relics.length, 5); i++) {
      if (relicImg) {
        ctx.globalAlpha = 0.7;
        ctx.drawImage(relicImg, 10 + i * 18, hudY + 26, 16, 16);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = '#9966ff';
        ctx.fillRect(10 + i * 18, hudY + 26, 14, 14);
      }
    }
    if (G.relics.length > 5) {
      UI.text(ctx, '+' + (G.relics.length - 5), 10 + 5 * 18 + 10, hudY + 34, { size: 10, color: '#9966ff', align: 'left' });
    }
  }
  // BGM toggle
  const bgmText = bgmMuted ? t('bgm_off') : t('bgm_on');
  UI.text(ctx, bgmText, w - 15, h - 15, { size: 10, color: '#505070', align: 'right' });
}

/* ═══════════════════════════════════════════════════════════════
   R14.5 — RENDER: TOUCH CONTROLS (MOBILE)
   ═══════════════════════════════════════════════════════════════ */

function renderTouchControls(ctx) {
  if (!input.isMobile) return;
  // Joystick
  const jx = virtualJoystick.baseX;
  const jy = virtualJoystick.baseY;
  const jRadius = 45;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(jx, jy, jRadius, 0, Math.PI * 2);
  ctx.stroke();
  // Stick position
  if (virtualJoystick.active) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#e0e0f0';
    ctx.beginPath();
    ctx.arc(jx + virtualJoystick.dx * jRadius * 0.8, jy + virtualJoystick.dy * jRadius * 0.8, 14, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#e0e0f0';
    ctx.beginPath();
    ctx.arc(jx, jy, 12, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  // Action buttons
  for (const btn of touchButtons) {
    ctx.save();
    ctx.globalAlpha = btn.pressed ? 0.8 : 0.5;
    ctx.fillStyle = btn.color + '66';
    ctx.strokeStyle = btn.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 12);
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = btn.pressed ? 1 : 0.7;
    UI.text(ctx, btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2, { size: 11, color: '#e0e0f0', bold: true });
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════════════════════════
   R14.6 — RENDER: REWARD
   ═══════════════════════════════════════════════════════════════ */

function renderReward(ctx, w, h) {
  drawFallbackBg(ctx, w, h, G.castle);
  UI.scanlines(ctx, w, h, 0.02);
  UI.text(ctx, t('select_relic'), w / 2, h * 0.15, { size: 22, color: '#ffd700', bold: true, glow: '#ffd700' });
  const choices = G.rewardChoices;
  const btnW = Math.min(180, w * 0.28);
  const btnH = 90;
  const startX = w / 2 - (choices.length * (btnW + 15)) / 2;
  for (let i = 0; i < choices.length; i++) {
    const r = choices[i];
    const bx = startX + i * (btnW + 15);
    const by = h / 2 - 40;
    const tierColor = r.tier === 'rare' ? '#9966ff' : r.tier === 'epic' ? '#ffd700' : '#8899aa';
    // Card
    ctx.fillStyle = '#12121e';
    ctx.strokeStyle = tierColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    // Relic icon
    const relicImg = assets.sprites['itemRelic'];
    if (relicImg) {
      ctx.drawImage(relicImg, bx + btnW / 2 - 16, by + 8, 32, 32);
    }
    // Name
    UI.text(ctx, r['name_' + langKey], bx + btnW / 2, by + 50, { size: 12, color: tierColor, bold: true });
    // Desc
    UI.text(ctx, r['desc_' + langKey], bx + btnW / 2, by + 68, { size: 10, color: '#8899aa' });
    // Tier badge
    UI.text(ctx, r.tier.toUpperCase(), bx + btnW / 2, by + btnH - 6, { size: 8, color: tierColor });
  }
  // Skip
  UI.button(ctx, t('continue_text'), w / 2 - 60, h / 2 + 100, 120, 36, { color: '#333' });
}

/* ═══════════════════════════════════════════════════════════════
   R14.7 — RENDER: UPGRADE
   ═══════════════════════════════════════════════════════════════ */

function renderUpgrade(ctx, w, h) {
  drawFallbackBg(ctx, w, h, 0);
  UI.scanlines(ctx, w, h, 0.02);
  UI.text(ctx, t('select_upgrade'), w / 2, h * 0.1, { size: 22, color: '#6c3cf7', bold: true, glow: '#6c3cf7' });
  UI.text(ctx, t('gold') + ': ' + G.gold, w / 2, h * 0.18, { size: 16, color: '#ffd700' });
  const axes = ['sword', 'body', 'mind'];
  const axisColors = ['#cc2222', '#00ff87', '#6c3cf7'];
  const axisLabels = [t('sword'), t('body'), t('mind')];
  const btnW = Math.min(180, w * 0.28);
  const btnH = 110;
  const startX = w / 2 - (3 * (btnW + 15)) / 2;
  for (let i = 0; i < 3; i++) {
    const axis = axes[i];
    const level = G.upgrades[axis];
    const bx = startX + i * (btnW + 15);
    const by = h / 2 - 50;
    const color = axisColors[i];
    // Card
    ctx.fillStyle = '#12121e';
    ctx.strokeStyle = canUpgrade(axis, level) ? color : '#1e1e30';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    // Axis name
    UI.text(ctx, axisLabels[i], bx + btnW / 2, by + 18, { size: 14, color: color, bold: true });
    // Current level
    UI.text(ctx, t('level') + ' ' + level + '/3', bx + btnW / 2, by + 36, { size: 12, color: '#e0e0f0' });
    // Level pips
    for (let l = 0; l < 3; l++) {
      ctx.fillStyle = l < level ? color : '#333';
      ctx.fillRect(bx + btnW / 2 - 20 + l * 15, by + 48, 10, 6);
    }
    // Next upgrade info
    if (level < 3) {
      const upDef = UPGRADE_DEFS[axis][level];
      const name = upDef['name_' + langKey];
      UI.text(ctx, name, bx + btnW / 2, by + 68, { size: 10, color: '#8899aa' });
      UI.text(ctx, t('cost') + ': ' + upDef.cost + 'G', bx + btnW / 2, by + 84, {
        size: 11, color: G.gold >= upDef.cost ? '#ffd700' : '#cc2222'
      });
    } else {
      UI.text(ctx, t('max_level'), bx + btnW / 2, by + 74, { size: 12, color: color, bold: true });
    }
  }
  // Back button
  UI.button(ctx, t('back'), w / 2 - 60, h / 2 + 100, 120, 40, { color: '#333' });
}

/* ═══════════════════════════════════════════════════════════════
   R14.8 — RENDER: GAMEOVER
   ═══════════════════════════════════════════════════════════════ */

function renderGameOver(ctx, w, h) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);
  // Blood splatter effect
  ctx.save();
  for (let i = 0; i < 8; i++) {
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    const rx = w * 0.3 + (i * 137) % (w * 0.4);
    const ry = h * 0.2 + (i * 97) % (h * 0.4);
    ctx.arc(rx, ry, 30 + i * 10, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  UI.text(ctx, t('game_over'), w / 2, h * 0.3, { size: 36, color: '#cc2222', bold: true, glow: '#cc2222' });
  UI.text(ctx, t('total_score') + ': ' + Math.floor(G.score), w / 2, h * 0.45, { size: 18, color: '#ffd700' });
  UI.text(ctx, t('best_score') + ': ' + Save.getHighScore(GAME_ID), w / 2, h * 0.52, { size: 14, color: '#8899aa' });
  UI.text(ctx, t('combo') + ' ' + t('best_score') + ': ' + combo.best, w / 2, h * 0.58, { size: 14, color: '#00d4ff' });
  // Relics found
  UI.text(ctx, t('relics_found') + ': ' + G.relics.length, w / 2, h * 0.64, { size: 13, color: '#9966ff' });
  // Restart prompt
  const hint = input.isMobile ? t('to_title') : 'R / ' + t('to_title');
  UI.button(ctx, hint, w / 2 - 80, h * 0.74, 160, 45, { color: '#cc2222' });
  UI.scanlines(ctx, w, h, 0.03);
}

/* ═══════════════════════════════════════════════════════════════
   R14.9 — RENDER: VICTORY
   ═══════════════════════════════════════════════════════════════ */

function renderVictory(ctx, w, h) {
  drawFallbackBg(ctx, w, h, 0);
  // Golden glow
  ctx.save();
  const grad = ctx.createRadialGradient(w / 2, h * 0.3, 0, w / 2, h * 0.3, w * 0.5);
  grad.addColorStop(0, 'rgba(255,215,0,0.1)');
