// ── SeededRNG (F18: Math.random 0건) ──
class SeededRNG {
  constructor(seed) { this.s = seed % 2147483647; if (this.s <= 0) this.s += 2147483646; }
  next() { this.s = this.s * 16807 % 2147483647; return (this.s - 1) / 2147483646; }
  range(min, max) { return min + this.next() * (max - min); }
  int(min, max) { return Math.floor(this.range(min, max + 1)); }
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  chance(p) { return this.next() < p; }
}
const rng = new SeededRNG(Date.now());

// ── EventBus (F27: monkey-patch 0건) ──
const bus = {
  _h: {},
  on(e, fn) { (this._h[e] ||= []).push(fn); },
  off(e, fn) { const a = this._h[e]; if (a) this._h[e] = a.filter(h => h !== fn); },
  emit(e, d) { (this._h[e] || []).forEach(fn => fn(d)); },
  clear() { this._h = {}; }
};

// ── ObjectPool (탄막/파티클 재사용) ──
class ObjectPool {
  constructor(createFn, maxSize) {
    this._pool = [];
    this._active = [];
    this._create = createFn;
    this._max = maxSize;
  }
  get() {
    let obj = this._pool.pop();
    if (!obj && this._active.length < this._max) obj = this._create();
    if (obj) this._active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  releaseAll() { while (this._active.length) this._pool.push(this._active.pop()); }
  get active() { return this._active; }
  get count() { return this._active.length; }
}

// ── ComboManager (F14, F32: 단일 갱신 경로) ──
class ComboManager {
  constructor() {
    this.count = 0;
    this.timer = 0;
    this.best = 0;
    this._ultraTriggered = false;
    this._displayPop = 0;
  }
  add(n) {
    this.count += n;
    if (this.count > this.best) this.best = this.count;
    this.timer = getComboTimeout();
    this._displayPop = 1.0;
    bus.emit('combo', { count: this.count });
    if (this.count >= 50 && !this._ultraTriggered) {
      this._ultraTriggered = true;
      bus.emit('ultra_ready');
    }
    if (this.count >= 25) bus.emit('gauge_charge', { amount: 5 });
    if (this.count >= 10) bus.emit('speed_buff');
  }
  reset() {
    this.count = 0;
    this._ultraTriggered = false;
    bus.emit('combo', { count: 0 });
  }
  update(dt) {
    if (this._displayPop > 0) this._displayPop = Math.max(0, this._displayPop - dt * 3);
    if (this.count > 0) {
      this.timer -= dt;
      if (this.timer <= 0) this.reset();
    }
  }
  fullReset() { this.count = 0; this.best = 0; this.timer = 0; this._ultraTriggered = false; this._displayPop = 0; }
}

// ── DDA Manager ──
class DDAManager {
  constructor() { this.deaths = []; this.level = 0; }
  recordDeath() {
    this.deaths.push(1);
    if (this.deaths.length > 9) this.deaths = this.deaths.slice(-9);
    const recent = this.deaths.slice(-3).reduce((a,b)=>a+b,0);
    if (recent >= CFG.DDA_DEATHS[3]) this.level = 3;
    else if (recent >= CFG.DDA_DEATHS[2]) this.level = 2;
    else if (recent >= CFG.DDA_DEATHS[1]) this.level = 1;
    else this.level = 0;
  }
  recordClear() {
    this.deaths.push(0);
    if (this.deaths.length > 9) this.deaths = this.deaths.slice(-9);
    const recent = this.deaths.slice(-3).reduce((a,b)=>a+b,0);
    this.level = Math.max(0, this.level - (recent === 0 ? 1 : 0));
  }
  get densityMult() { return CFG.DDA_DENSITY[this.level]; }
  get speedMult() { return CFG.DDA_SPEED[this.level]; }
  get rewardMult() { return CFG.DDA_REWARD[this.level]; }
  get perfectWindow() { return CFG.DDA_PERFECT[this.level]; }
  get goodWindow() { return CFG.DDA_GOOD[this.level]; }
  reset() { this.deaths = []; this.level = 0; }
}

  let v = 0;
  for (const r of G.relics) { if (r.effect === effect) v += r.value; }
  return v;
}
function hasRelic(id) { return G.relics.some(r => r.id === id); }
function getDPSMult() {
  let m = 1.0;
  if (G.upgrades.sword >= 1) m += 0.1;
  m += getRelicValue('dmgMult');
  if (hasRelic('dragon_scale')) m += 0.3;
  return Math.min(m, CFG.DPS_CAP);
}
function getSlashArc() {
  let arc = CFG.SLASH_ARC;
  if (G.upgrades.sword >= 2) arc = 140;
  if (hasRelic('dragon_scale')) arc += 30;
  return Math.min(arc, 210);
}
function getSlowDuration() { return G.upgrades.sword >= 3 ? 0.5 : CFG.SLOW_DURATION; }
function getDashInvuln() { return G.upgrades.body >= 3 ? 12 : CFG.DASH_INVULN; }
function getDashCooldown() { return Math.max(10, CFG.DASH_COOLDOWN * (1 + getRelicValue('dashCdMult'))); }
function getPlayerSpeed() { return CFG.PLAYER_SPEED * (1 + (G.upgrades.body >= 1 ? 0.1 : 0) + getRelicValue('spdMult')); }
function getMaxHP() {
  let hp = CFG.MAX_HP;
  if (G.upgrades.body >= 2) hp += 1;
  if (hasRelic('dragon_scale')) hp += 2;
  return hp;
}
function getUltDamage() {
  let d = CFG.ULT_DAMAGE;
  if (hasRelic('sword_scroll')) d *= 1.5;
  if (G.upgrades.mind >= 3 && combo.count >= 50) d *= 1.5;
  return d;
}
function getGaugeChargeMult() { return 1.0 + (G.upgrades.mind >= 2 ? 0.2 : 0) + (hasRelic('sword_scroll') ? 0.25 : 0); }
