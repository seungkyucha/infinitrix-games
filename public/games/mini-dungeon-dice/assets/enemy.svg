<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dragonBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#6B1010"/>
    </linearGradient>
    <radialGradient id="eyeFire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </radialGradient>
    <radialGradient id="fireBreath" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF6B00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="dragonGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 꼬리 -->
  <path d="M8 48 Q12 42, 20 44 Q24 40, 26 42" stroke="url(#dragonBody)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M6 46 L10 48 L6 50 Z" fill="#E74C3C"/>
  <!-- 몸통 -->
  <g>
    <ellipse cx="34" cy="38" rx="14" ry="12" fill="url(#dragonBody)"/>
    <ellipse cx="34" cy="35" rx="10" ry="6" fill="#D43F3F" opacity="0.4"/>
    <!-- 배 비늘 -->
    <path d="M28 34 Q31 32, 34 34 Q37 32, 40 34" stroke="#FFB3B3" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M27 38 Q31 36, 34 38 Q37 36, 41 38" stroke="#FFB3B3" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M28 42 Q31 40, 34 42 Q37 40, 40 42" stroke="#FFB3B3" stroke-width="0.5" fill="none" opacity="0.5"/>
  </g>
  <!-- 날개 좌 -->
  <path d="M24 30 L8 12 L14 24 L6 8 L16 22 L12 6 L22 26 Z" fill="url(#wingGrad)" opacity="0.9"/>
  <path d="M24 30 L14 24 M24 30 L16 22 M24 30 L22 26" stroke="#8B1A1A" stroke-width="0.5" fill="none"/>
  <!-- 날개 우 -->
  <path d="M44 30 L56 12 L52 24 L58 8 L50 22 L54 6 L44 26 Z" fill="url(#wingGrad)" opacity="0.9"/>
  <path d="M44 30 L52 24 M44 30 L50 22 M44 30 L44 26" stroke="#8B1A1A" stroke-width="0.5" fill="none"/>
  <!-- 머리 -->
  <g>
    <ellipse cx="34" cy="24" rx="8" ry="7" fill="url(#dragonBody)"/>
    <!-- 뿔 좌 -->
    <path d="M28 20 L24 10 L30 18 Z" fill="#FFD700"/>
    <!-- 뿔 우 -->
    <path d="M40 20 L44 10 L38 18 Z" fill="#FFD700"/>
    <!-- 왕관 (보스) -->
    <path d="M27 20 L29 14 L32 18 L34 12 L36 18 L39 14 L41 20 Z" fill="#FFD700" filter="url(#dragonGlow)" opacity="0.7"/>
    <!-- 눈 좌 -->
    <ellipse cx="30" cy="22" rx="2.5" ry="2" fill="url(#eyeFire)" filter="url(#dragonGlow)"/>
    <ellipse cx="30" cy="22" rx="1" ry="1.5" fill="#000000"/>
    <!-- 눈 우 -->
    <ellipse cx="38" cy="22" rx="2.5" ry="2" fill="url(#eyeFire)" filter="url(#dragonGlow)"/>
    <ellipse cx="38" cy="22" rx="1" ry="1.5" fill="#000000"/>
    <!-- 콧구멍 -->
    <circle cx="32" cy="27" r="0.8" fill="#6B1010"/>
    <circle cx="36" cy="27" r="0.8" fill="#6B1010"/>
    <!-- 입 -->
    <path d="M30 28 Q34 31, 38 28" stroke="#6B1010" stroke-width="0.8" fill="none"/>
  </g>
  <!-- 불꽃 브레스 -->
  <ellipse cx="34" cy="32" rx="4" ry="3" fill="url(#fireBreath)" filter="url(#fireGlow)" opacity="0.6"/>
  <!-- 다리 -->
  <path d="M26 46 L24 54 L28 54 L28 48 Z" fill="#8B1A1A"/>
  <path d="M40 46 L38 54 L42 54 L42 48 Z" fill="#8B1A1A"/>
  <!-- 발톱 -->
  <path d="M24 54 L22 56 M26 54 L26 57 M28 54 L30 56" stroke="#FFD700" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M38 54 L36 56 M40 54 L40 57 M42 54 L44 56" stroke="#FFD700" stroke-width="0.8" stroke-linecap="round"/>
</svg>