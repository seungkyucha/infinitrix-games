<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartOuter" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="70%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <path d="M16 28 C8 22, 2 16, 2 10 C2 6, 5 3, 9 3 C12 3, 14 5, 16 7 C18 5, 20 3, 23 3 C27 3, 30 6, 30 10 C30 16, 24 22, 16 28 Z" fill="#FF6B6B" opacity="0.3" filter="url(#heartGlow)"/>
  <!-- 메인 하트 -->
  <path d="M16 26 C9 21, 4 15, 4 10 C4 7, 6.5 4.5, 9.5 4.5 C12 4.5, 14 6, 16 8.5 C18 6, 20 4.5, 22.5 4.5 C25.5 4.5, 28 7, 28 10 C28 15, 23 21, 16 26 Z" fill="url(#heartGrad)" filter="url(#heartGlow)"/>
  <!-- 하이라이트 -->
  <path d="M16 26 C9 21, 4 15, 4 10 C4 7, 6.5 4.5, 9.5 4.5 C12 4.5, 14 6, 16 8.5 C18 6, 20 4.5, 22.5 4.5 C25.5 4.5, 28 7, 28 10 C28 15, 23 21, 16 26 Z" fill="url(#heartShine)"/>
  <!-- 십자가 (HP 표시) -->
  <rect x="14" y="11" width="4" height="10" rx="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="11" y="14" width="10" height="4" rx="1" fill="#FFFFFF" opacity="0.3"/>
</svg>