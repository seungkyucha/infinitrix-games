<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="diceUpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7DC6F"/>
      <stop offset="100%" stop-color="#D4AC0D"/>
    </linearGradient>
    <radialGradient id="upGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="powerGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 글로우 -->
  <circle cx="24" cy="24" r="22" fill="url(#upGlow)"/>
  <!-- 회전하는 다이아몬드 프레임 -->
  <path d="M24 4 L40 24 L24 44 L8 24 Z" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.4" filter="url(#powerGlow)"/>
  <!-- 메인 주사위 (강화 주사위) -->
  <g filter="url(#powerGlow)">
    <!-- 주사위 몸체 -->
    <rect x="12" y="12" width="24" height="24" rx="4" fill="url(#diceUpGrad)"/>
    <rect x="12" y="12" width="24" height="24" rx="4" fill="none" stroke="#B8860B" stroke-width="1"/>
    <!-- 3D 효과 - 상단 하이라이트 -->
    <path d="M16 12 L32 12 Q36 12, 36 16 L36 14 Q36 12, 32 12 L16 12 Q12 12, 12 16 L12 14 Q12 12, 16 12 Z" fill="#FFFFFF" opacity="0.3"/>
    <!-- 주사위 눈 (6면 = 최대) -->
    <circle cx="18" cy="18" r="2" fill="#8B6914"/>
    <circle cx="18" cy="24" r="2" fill="#8B6914"/>
    <circle cx="18" cy="30" r="2" fill="#8B6914"/>
    <circle cx="30" cy="18" r="2" fill="#8B6914"/>
    <circle cx="30" cy="24" r="2" fill="#8B6914"/>
    <circle cx="30" cy="30" r="2" fill="#8B6914"/>
    <!-- 내부 빛 -->
    <rect x="12" y="12" width="24" height="24" rx="4" fill="url(#innerGlow)"/>
  </g>
  <!-- 위쪽 화살표 (업그레이드 의미) -->
  <g filter="url(#sparkle)">
    <path d="M24 2 L28 8 L25 8 L25 12 L23 12 L23 8 L20 8 Z" fill="#4ECDC4" opacity="0.8"/>
  </g>
  <!-- 스파클 -->
  <g filter="url(#sparkle)">
    <path d="M6 10 L7 8 L8 10 L7 12 Z" fill="#FFFFFF" opacity="0.7"/>
    <path d="M40 8 L41 6 L42 8 L41 10 Z" fill="#FFFFFF" opacity="0.6"/>
    <path d="M8 38 L9 36 L10 38 L9 40 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M38 40 L39 38 L40 40 L39 42 Z" fill="#FFFFFF" opacity="0.7"/>
    <path d="M24 42 L25 40 L26 42 L25 44 Z" fill="#FFFFFF" opacity="0.6"/>
  </g>
</svg>