<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF6B6B" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#C0392B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C0392B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="70%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="85%" stop-color="#FF6B6B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 충격파 링 -->
  <circle cx="48" cy="48" r="40" fill="url(#shockwave)" filter="url(#bigGlow)"/>
  <circle cx="48" cy="48" r="30" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.3" filter="url(#hitGlow)"/>
  <!-- 메인 폭발 코어 -->
  <circle cx="48" cy="48" r="18" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- 폭발 광선 (방사형) -->
  <g filter="url(#hitGlow)">
    <line x1="48" y1="48" x2="48" y2="8" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
    <line x1="48" y1="48" x2="20" y2="20" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="20" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="20" y2="76" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="76" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- 파편 (주사위 면 조각) -->
  <g filter="url(#hitGlow)">
    <rect x="22" y="18" width="6" height="6" rx="1" fill="#F7DC6F" opacity="0.7" transform="rotate(25 25 21)"/>
    <rect x="68" y="22" width="5" height="5" rx="1" fill="#FF6B6B" opacity="0.6" transform="rotate(-15 70 24)"/>
    <rect x="16" y="58" width="5" height="5" rx="1" fill="#4ECDC4" opacity="0.6" transform="rotate(40 18 60)"/>
    <rect x="72" y="62" width="6" height="6" rx="1" fill="#45B7D1" opacity="0.5" transform="rotate(-30 75 65)"/>
    <rect x="36" y="74" width="4" height="4" rx="1" fill="#F7DC6F" opacity="0.5" transform="rotate(60 38 76)"/>
    <rect x="56" y="14" width="4" height="4" rx="1" fill="#4ECDC4" opacity="0.6" transform="rotate(-45 58 16)"/>
  </g>
  <!-- 스파크 포인트 -->
  <g>
    <circle cx="30" cy="14" r="2" fill="url(#sparkGrad)"/>
    <circle cx="70" cy="16" r="1.5" fill="url(#sparkGrad)"/>
    <circle cx="14" cy="42" r="1.5" fill="url(#sparkGrad)"/>
    <circle cx="82" cy="38" r="2" fill="url(#sparkGrad)"/>
    <circle cx="18" cy="72" r="1.5" fill="url(#sparkGrad)"/>
    <circle cx="78" cy="74" r="2" fill="url(#sparkGrad)"/>
    <circle cx="48" cy="82" r="1.5" fill="url(#sparkGrad)"/>
  </g>
</svg>