<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="starShine" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starCenter" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <path d="M16 2 L19.5 11.5 L29 12 L22 18.5 L24 28 L16 23 L8 28 L10 18.5 L3 12 L12.5 11.5 Z" fill="#FFD700" opacity="0.3" filter="url(#starGlow)"/>
  <!-- 메인 별 -->
  <path d="M16 4 L19 12 L27.5 12.5 L21 18 L23 26.5 L16 22 L9 26.5 L11 18 L4.5 12.5 L13 12 Z" fill="url(#starGrad)" filter="url(#starGlow)"/>
  <!-- 하이라이트 -->
  <path d="M16 4 L19 12 L27.5 12.5 L21 18 L23 26.5 L16 22 L9 26.5 L11 18 L4.5 12.5 L13 12 Z" fill="url(#starShine)"/>
  <!-- 중앙 빛 -->
  <circle cx="16" cy="15" r="4" fill="url(#starCenter)"/>
  <!-- 주사위 면 눈 (게임 테마) -->
  <circle cx="14" cy="13" r="1" fill="#8B6914" opacity="0.5"/>
  <circle cx="18" cy="13" r="1" fill="#8B6914" opacity="0.5"/>
  <circle cx="16" cy="17" r="1" fill="#8B6914" opacity="0.5"/>
</svg>