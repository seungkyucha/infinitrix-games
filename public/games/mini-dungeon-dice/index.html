// ═══════════════════════════════════════════════════════════
//  TweenManager — §12.2 안전 규칙
// ═══════════════════════════════════════════════════════════
class TweenManager {
  constructor() { this._tweens = []; }
  // 트윈 추가
  add(obj, props, duration, easing, onComplete) {
    const t = { obj, targets: {}, elapsed: 0, duration, easing: easing || 'linear', onComplete };
    for (const k in props) { t.targets[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(t);
    return t;
  }
  // 즉시 정리 — resetGame/goToTitle 등 (§12.2)
  clearImmediate() { this._tweens.length = 0; }
  // 매 프레임 업데이트
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.duration, 1);
      const ep = this._ease(t.easing, p);
      for (const k in t.targets) {
        const { from, to } = t.targets[k];
        t.obj[k] = from + (to - from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // 이징 함수
  _ease(type, p) {
    switch (type) {
      case 'easeOutCubic': return 1 - Math.pow(1 - p, 3);
      case 'easeOutBack': { const c = 1.70158; return 1 + (c + 1) * Math.pow(p - 1, 3) + c * Math.pow(p - 1, 2); }
      case 'easeInOutQuad': return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
      default: return p;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  ObjectPool — §4.6 팝업 텍스트 + 파티클 풀
// ═══════════════════════════════════════════════════════════
class ObjectPool {
  constructor(size) { this.pool = []; for (let i = 0; i < size; i++) this.pool.push({ active: false }); }
  // 비활성 객체 획득
  get() { return this.pool.find(o => !o.active) || null; }
  // 활성 객체 업데이트
  updateAll(dt) {
    for (const o of this.pool) {
      if (!o.active) continue;
      o.elapsed += dt;
      const p = Math.min(o.elapsed / o.duration, 1);
      o.x += (o.vx || 0) * dt;
      o.y += (o.vy || 0) * dt;
      o.alpha = 1 - p;
      if (p >= 1) o.active = false;
    }
  }
  // 활성 객체 렌더
  renderAll(ctx) {
    for (const o of this.pool) {
      if (!o.active) continue;
      ctx.save();
      ctx.globalAlpha = Math.max(0, o.alpha);
      if (o.type === 'popup') {
        ctx.font = 'bold ' + (o.fontSize || 18) + 'px monospace';
        ctx.fillStyle = o.color;
        ctx.textAlign = 'center';
        ctx.fillText(o.text, o.x, o.y);
      } else if (o.type === 'particle') {
        ctx.fillStyle = o.color;
        const s = o.sz * Math.max(0.1, o.alpha);
        ctx.fillRect(o.x - s / 2, o.y - s / 2, s, s);
      }
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  SoundManager — §9 Web Audio API 전용, setTimeout 0건 (F2)
// ═══════════════════════════════════════════════════════════
class SoundManager {
  constructor() { this.ctx = null; this.muted = false; }
  // AudioContext 생성
  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { console.warn('Web Audio unavailable'); }
  }
  // 오실레이터 유틸
  _osc(type, freq, start, dur, vol) {
    if (!this.ctx || this.muted) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.12, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(start); o.stop(start + dur + 0.01);
  }
  // 주사위 굴림 — 노이즈 sweep
  playRoll() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(200, t);
    o.frequency.linearRampToValueAtTime(800, t + 0.15);
    o.frequency.linearRampToValueAtTime(300, t + 0.3);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.31);
  }
  // 주사위 배치
  playPlace() { if (!this.ctx) return; this._osc('sine', 261, this.ctx.currentTime, 0.1, 0.1); }
  // 공격 히트
  playHit() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(330, t);
    o.frequency.linearRampToValueAtTime(130, t + 0.15);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.16);
  }
  // 방어 블록
  playBlock() { if (!this.ctx) return; this._osc('triangle', 392, this.ctx.currentTime, 0.1, 0.08); }
  // 회복
  playHeal() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this._osc('sine', 261, t, 0.1, 0.08);
    this._osc('sine', 330, t + 0.1, 0.1, 0.08);
    this._osc('sine', 392, t + 0.2, 0.1, 0.08);
  }
  // 보스 등장
  playBossIntro() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    this._osc('sawtooth', 65, t, 0.5, 0.12);
  }
  // 층 클리어
  playClear() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this._osc('sine', 261, t, 0.15, 0.1);
    this._osc('sine', 330, t + 0.15, 0.15, 0.1);
    this._osc('sine', 392, t + 0.3, 0.15, 0.1);
    this._osc('sine', 523, t + 0.45, 0.15, 0.1);
  }
  // 게임 오버
  playGameOver() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this._osc('triangle', 130, t, 0.25, 0.1);
    this._osc('triangle', 110, t + 0.25, 0.25, 0.1);
  }
  // 승리 팡파레
  playVictory() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this._osc('sine', 261, t, 1.0, 0.06);
    this._osc('sine', 330, t, 1.0, 0.06);
    this._osc('sine', 392, t, 1.0, 0.06);
    this._osc('triangle', 523, t, 1.0, 0.06);
  }
  // 버튼 클릭
  playClick() { if (!this.ctx) return; this._osc('sine', 440, this.ctx.currentTime, 0.05, 0.06); }
  // AudioContext resume (터치로 해제)
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
}

// ═══════════════════════════════════════════════════════════
//  순수 함수 — §10 전역 상태 직접 참조 금지
// ═══════════════════════════════════════════════════════════

// 단일 주사위 굴림
function rollDice(dice) {
  return dice.min + Math.floor(Math.random() * (dice.max - dice.min + 1));
}

// 전체 주사위 굴림 결과
function rollAllDice(diceArray) {
  return diceArray.map(function(d) {
    return { type: d.type, min: d.min, max: d.max, value: rollDice(d), placed: false };
  });
}

// 적 스탯 계산 — §7.1
function getEnemyStats(floor, roomIdx, isElite, isBoss) {
  var baseHp  = 8 + floor * 4;
  var baseAtk = 2 + Math.floor(floor * 1.5);
  var baseDef = Math.floor(floor * 0.5);
  var eliteMul = isElite ? 1.5 : 1.0;
  var bossMul  = isBoss ? 2.5 : 1.0;
  var roomMul  = 1 + roomIdx * 0.1;
  return {
    hp:  Math.floor(baseHp * eliteMul * bossMul * roomMul),
    atk: Math.floor(baseAtk * eliteMul * bossMul * roomMul),
    def: Math.floor(baseDef * eliteMul * bossMul)
  };
}

// 보스 페이즈 판정 — §7.3
function getBossPhase(hp, maxHp) {
  var ratio = hp / maxHp;
  if (ratio > CONFIG.BOSS_PHASE2_HP) return 1;
  if (ratio > CONFIG.BOSS_PHASE3_HP) return 2;
  return 3;
}

// 적 행동 결정
function getEnemyAction(enemyData, bossPhaseNum) {
  var atk = enemyData.atk;
  var special = null;
  if (enemyData.isBoss) {
    if (bossPhaseNum === 2) { atk = Math.floor(atk * CONFIG.BOSS_P2_ATK_MUL); special = 'nullifyDef'; }
    if (bossPhaseNum === 3) { atk = Math.floor(atk * CONFIG.BOSS_P3_ATK_MUL); special = 'selfHeal'; }
  }
  if (enemyData.doubleAtk) { atk = Math.floor(atk / 2); special = 'doubleStrike'; }
  return { atk: atk, special: special };
}

// 배치 가능 여부 — 만능(wild)은 어디든
function canPlaceDice(diceType, slotType) {
  if (diceType === 'wild') return true;
  return diceType === slotType;
}

// 잔여 재굴림 횟수
function calcRerollsLeft(usedFloor, maxPerFloor) {
  return Math.max(0, maxPerFloor - usedFloor);
}

// 전투 해결 — §2.4
function resolveBattle(slots, enemyData, playerData, bossPhaseNum) {
  var atkSum = 0, defSum = 0, healSum = 0;
  for (var i = 0; i < slots.atk.length; i++) { var d = slots.atk[i]; atkSum += d.value + (d.type === 'wild' ? CONFIG.WILD_BONUS : 0); }
  for (var i = 0; i < slots.def.length; i++) { var d = slots.def[i]; defSum += d.value + (d.type === 'wild' ? CONFIG.WILD_BONUS : 0); }
  for (var i = 0; i < slots.heal.length; i++) { var d = slots.heal[i]; healSum += d.value + (d.type === 'wild' ? CONFIG.WILD_BONUS : 0); }

  var action = getEnemyAction(enemyData, bossPhaseNum);

  // 보스 Phase 2: 방어 슬롯 1개 무효화
  if (action.special === 'nullifyDef' && slots.def.length > 0) {
    defSum = Math.max(0, defSum - slots.def[0].value);
  }

  // 플레이어 → 적
  var rawDmgToEnemy = Math.max(0, atkSum - enemyData.def);
  var enemyHpAfter = enemyData.hp - rawDmgToEnemy;

  // 적 → 플레이어 (고블린: 2회)
  var playerDmgRaw;
  if (action.special === 'doubleStrike') {
    playerDmgRaw = Math.max(0, action.atk - Math.floor(defSum / 2)) * 2;
  } else {
    playerDmgRaw = Math.max(0, action.atk - defSum);
  }

  // 회복
  var playerHpAfter = Math.min(playerData.maxHp, playerData.hp - playerDmgRaw + healSum);

  return {
    dmgToEnemy: rawDmgToEnemy, dmgToPlayer: playerDmgRaw, healAmt: healSum,
    enemyHpAfter: enemyHpAfter, playerHpAfter: playerHpAfter,
    enemyDead: enemyHpAfter <= 0, playerDead: playerHpAfter <= 0
  };
}

// 점수 계산 — §11.1
function calcScore(stats) {
  return stats.floors * CONFIG.SCORE_FLOOR
       + stats.kills * CONFIG.SCORE_ENEMY
       + stats.damage * CONFIG.SCORE_DAMAGE
       + stats.bosses * CONFIG.SCORE_BOSS
       + (stats.floors >= CONFIG.TOTAL_FLOORS ? CONFIG.SCORE_CLEAR_BONUS : 0);
}

// hitTest — 사각형 충돌 판정
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// 층 데이터 생성 — §2.5 적 배치
function generateFloor(floorNum) {
  var rooms = CONFIG.FLOOR_ROOMS[floorNum - 1];
  return rooms.map(function(r, idx) {
    var isBoss = r.t === 'boss';
    var isElite = r.t === 'elite';
    var stats = getEnemyStats(floorNum, idx, isElite, isBoss);
    var enemyType;

    if (isBoss && floorNum === 5) {
      enemyType = CONFIG.ENEMY_TYPES[6]; // 드래곤
    } else if (isElite) {
      var pool = CONFIG.ENEMY_TYPES.filter(function(e) { return e.elite && e.floors.indexOf(floorNum) !== -1; });
      enemyType = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : CONFIG.ENEMY_TYPES[5];
    } else if (isBoss) {
      // 1~4층 보스는 해당 층의 강한 일반 적
      var pool = CONFIG.ENEMY_TYPES.filter(function(e) { return !e.boss && !e.elite && e.floors.indexOf(floorNum) !== -1; });
      enemyType = pool.length > 0 ? pool[pool.length - 1] : CONFIG.ENEMY_TYPES[0];
    } else {
      var pool = CONFIG.ENEMY_TYPES.filter(function(e) { return !e.boss && !e.elite && e.floors.indexOf(floorNum) !== -1; });
      enemyType = pool[Math.floor(Math.random() * pool.length)] || CONFIG.ENEMY_TYPES[0];
    }

    return {
      roomType: r.t,
      enemyType: { name: enemyType.name, color: enemyType.color, draw: enemyType.draw },
      hp: stats.hp, maxHp: stats.hp, atk: stats.atk, def: stats.def,
      isBoss: isBoss, isElite: isElite,
      doubleAtk: !!enemyType.doubleAtk, curseDice: !!enemyType.curseDice
    };
  });
}

// 주사위 업그레이드 — 최대값 +amount
function upgradeDice(dice, amount) {
  return { type: dice.type, min: dice.min, max: dice.max + amount, value: 0 };
}

// localStorage 안전 래퍼 — §11.2 try-catch (iframe sandbox 대응)
function loadBest() {
  try {
    return {
      score: parseInt(localStorage.getItem('mdd_best_score') || '0', 10),
      floor: parseInt(localStorage.getItem('mdd_best_floor') || '0', 10),
      plays: parseInt(localStorage.getItem('mdd_plays') || '0', 10)
    };
  } catch (e) { return { score: 0, floor: 0, plays: 0 }; }
}
function saveBest(score, floor) {
  try {
    var best = loadBest();
    // 판정 먼저, 저장 나중에 (Cycle 2 B4)
    if (score > best.score) localStorage.setItem('mdd_best_score', String(score));
    if (floor > best.floor) localStorage.setItem('mdd_best_floor', String(floor));
    localStorage.setItem('mdd_plays', String(best.plays + 1));
  } catch (e) { /* iframe sandbox 대응 */ }
}

// 던전 벽돌 배경을 offscreen canvas에 1회 렌더
function buildBgCache(floorNum) {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  var bc = bgCanvas.getContext('2d');
  var baseCol = CONFIG.FLOOR_COLORS[(floorNum || 1) - 1] || CONFIG.COL_BG;
  var grad = bc.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, baseCol); grad.addColorStop(1, CONFIG.COL_BG2);
  bc.fillStyle = grad; bc.fillRect(0, 0, W, H);
  // 벽돌 패턴
  bc.strokeStyle = 'rgba(255,255,255,0.04)';
  bc.lineWidth = 1;
  var bw = 48, bh = 24;
  for (var row = 0; row < Math.ceil(H / bh); row++) {
    var offset = (row % 2) * (bw / 2);
    for (var col = -1; col < Math.ceil(W / bw) + 1; col++) {
      bc.strokeRect(col * bw + offset, row * bh, bw, bh);
    }
  }
  // 비네트
  var vg = bc.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.5)');
  bc.fillStyle = vg; bc.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════════
//  적 Canvas 드로잉 — §4.4 기본 도형만 사용 (에셋 0개)
// ═══════════════════════════════════════════════════════════

function drawEnemy(c, ex, ey, sz, type, flash) {
  c.save();
  if (flash > 0) c.globalAlpha = 0.3 + Math.sin(flash * 30) * 0.3;
  c.translate(ex + enemyShakeX, ey);
  var col = type.color;

  switch (type.draw) {
    case 'slime':
      // 몸 (반원 + 아래 볼록)
      c.fillStyle = col;
      c.beginPath();
      c.arc(0, -sz * 0.05, sz * 0.32, Math.PI, 0, false);
      c.quadraticCurveTo(sz * 0.38, sz * 0.25, 0, sz * 0.3);
      c.quadraticCurveTo(-sz * 0.38, sz * 0.25, -sz * 0.32, -sz * 0.05);
      c.fill();
      // 눈
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(-sz * 0.1, -sz * 0.06, sz * 0.06, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.1, -sz * 0.06, sz * 0.06, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#222';
      c.beginPath(); c.arc(-sz * 0.08, -sz * 0.04, sz * 0.03, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.12, -sz * 0.04, sz * 0.03, 0, Math.PI * 2); c.fill();
      break;

    case 'bat':
      c.fillStyle = col;
      // 왼쪽 날개
      c.beginPath(); c.moveTo(-sz * 0.45, -sz * 0.05);
      c.lineTo(-sz * 0.12, -sz * 0.18);
      c.lineTo(-sz * 0.08, sz * 0.1); c.fill();
      // 오른쪽 날개
      c.beginPath(); c.moveTo(sz * 0.45, -sz * 0.05);
      c.lineTo(sz * 0.12, -sz * 0.18);
      c.lineTo(sz * 0.08, sz * 0.1); c.fill();
      // 머리
      c.beginPath(); c.arc(0, 0, sz * 0.12, 0, Math.PI * 2); c.fill();
      // 눈
      c.fillStyle = '#FF0';
      c.beginPath(); c.arc(-sz * 0.04, -sz * 0.02, sz * 0.025, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.04, -sz * 0.02, sz * 0.025, 0, Math.PI * 2); c.fill();
      break;

    case 'skeleton':
      // 두개골
      c.fillStyle = col;
      c.beginPath(); c.arc(0, -sz * 0.15, sz * 0.13, 0, Math.PI * 2); c.fill();
      // 갑옷
      c.fillStyle = '#95A5A6';
      c.fillRect(-sz * 0.13, 0, sz * 0.26, sz * 0.28);
      // 검
      c.strokeStyle = '#BDC3C7'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(sz * 0.18, -sz * 0.1); c.lineTo(sz * 0.35, sz * 0.2); c.stroke();
      // 눈구멍
      c.fillStyle = '#333';
      c.beginPath(); c.arc(-sz * 0.05, -sz * 0.17, sz * 0.03, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.05, -sz * 0.17, sz * 0.03, 0, Math.PI * 2); c.fill();
      break;

    case 'goblin':
      // 모자
      c.fillStyle = col;
      c.beginPath(); c.moveTo(0, -sz * 0.33); c.lineTo(-sz * 0.14, -sz * 0.05);
      c.lineTo(sz * 0.14, -sz * 0.05); c.fill();
      // 얼굴
      c.fillStyle = '#A9A932';
      c.beginPath(); c.arc(0, -sz * 0.02, sz * 0.11, 0, Math.PI * 2); c.fill();
      // 몸
      c.fillStyle = col;
      c.fillRect(-sz * 0.12, sz * 0.08, sz * 0.24, sz * 0.2);
      // 눈
      c.fillStyle = '#000';
      c.beginPath(); c.arc(-sz * 0.04, -sz * 0.04, sz * 0.02, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.04, -sz * 0.04, sz * 0.02, 0, Math.PI * 2); c.fill();
      break;

    case 'mage':
      // 로브
      c.fillStyle = col;
      c.beginPath(); c.moveTo(0, -sz * 0.18); c.lineTo(-sz * 0.22, sz * 0.28);
      c.lineTo(sz * 0.22, sz * 0.28); c.fill();
      // 얼굴
      c.fillStyle = '#D7BDE2';
      c.beginPath(); c.arc(0, -sz * 0.1, sz * 0.09, 0, Math.PI * 2); c.fill();
      // 지팡이
      c.strokeStyle = '#8B4513'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(sz * 0.28, -sz * 0.18); c.lineTo(sz * 0.28, sz * 0.28); c.stroke();
      // 보석
      c.fillStyle = '#E74C3C';
      c.beginPath(); c.arc(sz * 0.28, -sz * 0.22, sz * 0.04, 0, Math.PI * 2); c.fill();
      break;

    case 'minotaur':
      // 몸
      c.fillStyle = col;
      c.fillRect(-sz * 0.18, -sz * 0.03, sz * 0.36, sz * 0.36);
      // 뿔
      c.beginPath(); c.moveTo(-sz * 0.18, -sz * 0.12); c.lineTo(-sz * 0.28, -sz * 0.32);
      c.lineTo(-sz * 0.08, -sz * 0.12); c.fill();
      c.beginPath(); c.moveTo(sz * 0.18, -sz * 0.12); c.lineTo(sz * 0.28, -sz * 0.32);
      c.lineTo(sz * 0.08, -sz * 0.12); c.fill();
      // 머리
      c.beginPath(); c.arc(0, -sz * 0.12, sz * 0.13, 0, Math.PI * 2); c.fill();
      // 빨간 눈
      c.fillStyle = '#C0392B';
      c.beginPath(); c.arc(-sz * 0.05, -sz * 0.14, sz * 0.025, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.05, -sz * 0.14, sz * 0.025, 0, Math.PI * 2); c.fill();
      break;

    case 'dragon':
      // 몸 (큰 삼각)
      c.fillStyle = col;
      c.beginPath(); c.moveTo(0, -sz * 0.32); c.lineTo(-sz * 0.32, sz * 0.28);
      c.lineTo(sz * 0.32, sz * 0.28); c.fill();
      // 날개
      c.fillStyle = '#922B21';
      c.beginPath(); c.moveTo(-sz * 0.18, -sz * 0.08); c.lineTo(-sz * 0.5, -sz * 0.22);
      c.lineTo(-sz * 0.12, sz * 0.08); c.fill();
      c.beginPath(); c.moveTo(sz * 0.18, -sz * 0.08); c.lineTo(sz * 0.5, -sz * 0.22);
      c.lineTo(sz * 0.12, sz * 0.08); c.fill();
      // 머리
      c.fillStyle = col;
      c.beginPath(); c.arc(0, -sz * 0.18, sz * 0.1, 0, Math.PI * 2); c.fill();
      // 꼬리
      c.beginPath(); c.moveTo(sz * 0.18, sz * 0.22); c.lineTo(sz * 0.42, sz * 0.32);
      c.lineTo(sz * 0.32, sz * 0.12); c.fill();
      // 눈
      c.fillStyle = '#F1C40F';
      c.beginPath(); c.arc(-sz * 0.04, -sz * 0.2, sz * 0.025, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(sz * 0.04, -sz * 0.2, sz * 0.025, 0, Math.PI * 2); c.fill();
      // 왕관 — §4.4 보스
      c.fillStyle = CONFIG.COL_BOSS;
      c.beginPath();
      c.moveTo(-sz * 0.09, -sz * 0.28); c.lineTo(-sz * 0.11, -sz * 0.4);
      c.lineTo(-sz * 0.03, -sz * 0.33); c.lineTo(0, -sz * 0.42);
      c.lineTo(sz * 0.03, -sz * 0.33); c.lineTo(sz * 0.11, -sz * 0.4);
      c.lineTo(sz * 0.09, -sz * 0.28); c.fill();
      break;
  }
  c.restore();
}

// ═══════════════════════════════════════════════════════════
//  주사위 렌더링 — §4.3
// ═══════════════════════════════════════════════════════════

// 주사위 색상
function getDiceColor(type) {
  if (type === 'atk') return CONFIG.COL_ATK;
  if (type === 'def') return CONFIG.COL_DEF;
  if (type === 'heal') return CONFIG.COL_HEAL;
  if (type === 'wild') return CONFIG.COL_WILD;
  return '#888';
}

// 둥근 사각형
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// 주사위 눈(pip) 배치 — 1~6
function drawPips(c, cx, cy, sz, val, color) {
  c.fillStyle = color;
  var ps = sz * 0.1;
  var off = sz * 0.22;
  var positions = {
    1: [[0, 0]],
    2: [[-off, -off], [off, off]],
    3: [[-off, -off], [0, 0], [off, off]],
    4: [[-off, -off], [off, -off], [-off, off], [off, off]],
    5: [[-off, -off], [off, -off], [0, 0], [-off, off], [off, off]],
    6: [[-off, -off], [off, -off], [-off, 0], [off, 0], [-off, off], [off, off]]
  };
  var pips = positions[Math.min(Math.max(val, 1), 6)] || positions[6];
  for (var i = 0; i < pips.length; i++) {
    c.beginPath(); c.arc(cx + pips[i][0], cy + pips[i][1], ps, 0, Math.PI * 2); c.fill();
  }
}

// 주사위 1개 렌더
function drawDie(c, x, y, sz, dice, selected, animPhase) {
  var col = getDiceColor(dice.type);
  c.save();
  if (animPhase !== undefined && animPhase < 1) {
    var s = 0.5 + 0.7 * animPhase - 0.2 * Math.sin(animPhase * Math.PI);
    c.translate(x + sz / 2, y + sz / 2);
    c.rotate(animPhase * Math.PI * 6);
    c.scale(s, s);
    c.translate(-x - sz / 2, -y - sz / 2);
  }
  // 3D 그림자
  c.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(c, x + 2, y + 4, sz, sz, 8); c.fill();
  // 본체
  c.fillStyle = col;
  roundRect(c, x, y, sz, sz, 8); c.fill();
  // 상단 하이라이트
  c.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(c, x + 2, y + 1, sz - 4, sz * 0.35, 6); c.fill();
  // 선택 글로우
  if (selected) {
    c.strokeStyle = '#fff'; c.lineWidth = 3;
    c.shadowColor = col; c.shadowBlur = 12;
    roundRect(c, x - 2, y - 2, sz + 4, sz + 4, 10); c.stroke();
    c.shadowBlur = 0;
  }
  // pip
  drawPips(c, x + sz / 2, y + sz / 2, sz, dice.value, '#fff');
  // 종류 아이콘 (좌상단)
  c.font = (sz * 0.2) + 'px monospace';
  c.fillStyle = 'rgba(255,255,255,0.7)'; c.textAlign = 'left';
  var icons = { atk: '\u2694', def: '\u26E8', heal: '\u2665', wild: '\u2605' };
  c.fillText(icons[dice.type] || '?', x + 4, y + sz * 0.24);
  c.restore();
}

// ═══════════════════════════════════════════════════════════
//  UI 헬퍼
// ═══════════════════════════════════════════════════════════

// 버튼 렌더 + 히트 영역 등록 — §4.7 MIN_TOUCH_TARGET 강제 (F1, F4)
function drawButton(c, id, x, y, w, h, text, color, enabled) {
  var bw = Math.max(w, CONFIG.MIN_TOUCH_TARGET);
  var bh = Math.max(h, CONFIG.MIN_TOUCH_TARGET);
  var bx = x - (bw - w) / 2;
  var by = y - (bh - h) / 2;
  buttons[id] = { x: bx, y: by, w: bw, h: bh };
  c.save();
  c.globalAlpha = enabled !== false ? 1 : 0.4;
  c.fillStyle = color || '#333';
  roundRect(c, bx, by, bw, bh, 6); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.15)'; c.lineWidth = 1;
  roundRect(c, bx, by, bw, bh, 6); c.stroke();
  c.fillStyle = CONFIG.COL_TEXT;
  c.font = 'bold ' + Math.min(bh * 0.38, 15) + 'px monospace';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(text, bx + bw / 2, by + bh / 2);
  c.restore();
}

// HP 바
function drawHpBar(c, x, y, w, h, current, max, color) {
  c.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(c, x, y, w, h, 3); c.fill();
  var ratio = Math.max(0, current / max);
  if (ratio > 0) { c.fillStyle = color; roundRect(c, x, y, w * ratio, h, 3); c.fill(); }
  c.fillStyle = CONFIG.COL_TEXT;
  c.font = 'bold ' + (h - 2) + 'px monospace';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(Math.max(0, Math.ceil(current)) + '/' + max, x + w / 2, y + h / 2 + 1);
}

// ═══════════════════════════════════════════════════════════
//  상태 전환 — §6.2 TransitionGuard (F8, F9, F10)
// ═══════════════════════════════════════════════════════════

// 페이드 전환 — tween onComplete로만 상태 변경 (F9)
function beginTransition(targetState) {
  if (transitioning) return; // 가드 (F8)
  if (player && player.hp <= 0 && targetState !== STATES.GAME_OVER) return;
  transitioning = true;
  transitionTarget = targetState;
  fadeObj.alpha = 0;
  // 페이드 아웃
  tweens.add(fadeObj, { alpha: 1 }, CONFIG.TRANSITION_DURATION, 'easeInOutQuad', function() {
    enterState(transitionTarget);
    // 페이드 인
    tweens.add(fadeObj, { alpha: 0 }, CONFIG.TRANSITION_DURATION, 'easeInOutQuad', function() {
      transitioning = false;
    });
  });
}

// 상태 진입 초기화 — 일원화
function enterState(newState) {
  prevState = state;
  state = newState;
  buttons = {};

  switch (state) {
    case STATES.TITLE:
      titleAnim.t = 0;
      break;

    case STATES.DUNGEON_MAP:
      buildBgCache(currentFloor);
      break;

    case STATES.DICE_ROLL:
      rerollsUsedTurn = 0;
      selectedDiceIdx = -1;
      placedSlots = { atk: [], def: [], heal: [] };
      // 다크메이지 저주: 주사위 1개 값 -1
      if (enemy && enemy.curseDice && playerDice.length > 0) {
        var ci = Math.floor(Math.random() * playerDice.length);
        playerDice[ci] = { type: playerDice[ci].type, min: playerDice[ci].min,
          max: Math.max(playerDice[ci].min, playerDice[ci].max - 1), value: 0 };
      }
      diceResults = rollAllDice(playerDice);
      diceRollAnim.t = 0;
      tweens.add(diceRollAnim, { t: 1 }, CONFIG.ROLL_ANIM_DURATION, 'easeOutBack', function() {
        beginTransition(STATES.DICE_PLACE);
      });
      sound.playRoll();
      break;

    case STATES.DICE_PLACE:
      selectedDiceIdx = -1;
      dragDice = null;
      break;

    case STATES.BATTLE_RESOLVE:
      battlePhase = 0; battleTimer = 0;
      bossPhase = enemy.isBoss ? getBossPhase(enemy.hp, enemy.maxHp) : 1;
      battleResult = resolveBattle(placedSlots, enemy, player, bossPhase);
      if (enemy.isBoss && bossPhase === 3) {
        battleResult.enemyHpAfter = Math.min(enemy.maxHp, battleResult.enemyHpAfter + CONFIG.BOSS_P3_HEAL);
      }
      gameStats.damage += battleResult.dmgToEnemy;
      break;

    case STATES.REWARD:
      rewardOptions = generateRewardOptions();
      break;

    case STATES.GAME_OVER:
      currentScore = calcScore(gameStats);
      saveBest(currentScore, currentFloor);
      sound.playGameOver();
      shakeX = 10;
      tweens.add({ v: 10 }, { v: 0 }, 0.4, 'easeOutCubic', function() { shakeX = 0; });
      break;

    case STATES.VICTORY:
      currentScore = calcScore(gameStats);
      saveBest(currentScore, currentFloor);
      sound.playVictory();
      break;

    case STATES.PAUSED:
      break;
  }
}

// 보상 옵션 생성 — §2.5 보상 체계
function generateRewardOptions() {
  var opts = [];
  if (currentFloor === 1 || currentFloor === 3) {
    var amt = currentFloor === 1 ? CONFIG.UPGRADE_SMALL : CONFIG.UPGRADE_BIG;
    for (var i = 0; i < Math.min(2, playerDice.length); i++) {
      opts.push({ type: 'upgrade', diceIdx: i, amount: amt,
        desc: playerDice[i].type + ' +' + amt + ' (' + playerDice[i].max + '\u2192' + (playerDice[i].max + amt) + ')' });
    }
  }
  if (currentFloor === 2 || currentFloor === 4) {
    var types = ['atk', 'def', 'heal', 'wild'];
    // 셔플
    for (var i = types.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = types[i]; types[i] = types[j]; types[j] = tmp;
    }
    var picks = types.slice(0, 2);
    for (var i = 0; i < picks.length; i++) {
      var t = picks[i];
      var cfg = t === 'atk' ? CONFIG.ATK_DICE : t === 'def' ? CONFIG.DEF_DICE :
                t === 'heal' ? CONFIG.HEAL_DICE : CONFIG.WILD_DICE;
      opts.push({ type: 'newDice', diceType: t, min: cfg.min, max: cfg.max,
        desc: '\uC0C8 ' + t + ' \uC8FC\uC0AC\uC704 (1~' + cfg.max + ')' });
    }
  }
  if (opts.length === 0) {
    opts.push({ type: 'heal', desc: 'HP +5 \uD68C\uBCF5', healAmt: 5 });
  }
  return opts;
}

// 게임 리셋
function resetGame() {
  tweens.clearImmediate();
  player = { hp: CONFIG.PLAYER_MAX_HP, maxHp: CONFIG.PLAYER_MAX_HP };
  playerDice = [
    { type: 'atk', min: CONFIG.ATK_DICE.min, max: CONFIG.ATK_DICE.max, value: 0 },
    { type: 'def', min: CONFIG.DEF_DICE.min, max: CONFIG.DEF_DICE.max, value: 0 },
    { type: 'heal', min: CONFIG.HEAL_DICE.min, max: CONFIG.HEAL_DICE.max, value: 0 }
  ];
  diceResults = [];
  placedSlots = { atk: [], def: [], heal: [] };
  currentFloor = 1;
  currentRoom = 0;
  rerollsUsedFloor = 0;
  rerollsUsedTurn = 0;
  gameStats = { floors: 0, kills: 0, damage: 0, bosses: 0 };
  currentScore = 0;
  selectedDiceIdx = -1;
  dragDice = null;
  bossPhase = 1;
  battleResult = null;
  floorRooms = generateFloor(1);
  enemy = null;
}

// ═══════════════════════════════════════════════════════════
//  UPDATE — §6.1 상태 x 시스템 매트릭스 기반
// ═══════════════════════════════════════════════════════════

function update(dt) {
  // TweenMgr는 모든 상태에서 업데이트 (§6.1 매트릭스)
  tweens.update(dt);

  switch (state) {
    case STATES.TITLE:
      titleAnim.t += dt;
      particles.updateAll(dt);
      break;

    case STATES.DICE_ROLL:
      particles.updateAll(dt);
      break;

    case STATES.BATTLE_RESOLVE:
      battleTimer += dt;
      particles.updateAll(dt);
      popups.updateAll(dt);
      updateBattle(dt);
      break;

    case STATES.VICTORY:
      particles.updateAll(dt);
      break;

    default:
      particles.updateAll(dt);
      popups.updateAll(dt);
      break;
  }

  // 쉐이크 감쇠
  if (Math.abs(shakeX) > 0.1) shakeX *= 0.9; else shakeX = 0;
  if (Math.abs(enemyShakeX) > 0.1) enemyShakeX *= 0.9; else enemyShakeX = 0;
  if (enemyFlashAlpha > 0) enemyFlashAlpha -= dt * 5;
}

// 전투 연출 — §2.4 순서: 공격→방어→회복
function updateBattle(dt) {
  if (!battleResult) return;
  var totalDur = CONFIG.BATTLE_ANIM_DURATION;
  var phaseTime = totalDur / 3;

  // 공격 페이즈
  if (battlePhase === 0 && battleTimer >= phaseTime * 0.8) {
    battlePhase = 1;
    enemy.hp = battleResult.enemyHpAfter;
    if (battleResult.dmgToEnemy > 0) {
      spawnPopup(W * 0.5, H * 0.22, '-' + battleResult.dmgToEnemy, CONFIG.COL_ATK);
      enemyFlashAlpha = 1; enemyShakeX = 8;
      spawnParticles(W * 0.5, H * 0.28, CONFIG.COL_ATK, 8);
      sound.playHit();
    }
  }
  // 방어/피격 페이즈
  if (battlePhase === 1 && battleTimer >= phaseTime * 1.8) {
    battlePhase = 2;
    player.hp = Math.max(0, player.hp - battleResult.dmgToPlayer);
    if (battleResult.dmgToPlayer > 0) {
      spawnPopup(W * 0.5, H * 0.62, '-' + battleResult.dmgToPlayer, CONFIG.COL_ENEMY_HP);
      shakeX = 6;
      sound.playHit();
    } else {
      spawnPopup(W * 0.5, H * 0.62, 'Block!', CONFIG.COL_DEF);
      sound.playBlock();
    }
  }
  // 회복 페이즈
  if (battlePhase === 2 && battleTimer >= totalDur * 0.95) {
    battlePhase = 3;
    if (battleResult.healAmt > 0) {
      player.hp = Math.min(player.maxHp, player.hp + battleResult.healAmt);
      spawnPopup(W * 0.5, H * 0.62, '+' + battleResult.healAmt, CONFIG.COL_PLAYER_HP);
      sound.playHeal();
    }
  }
  // 결과 판정 — 가드 (F8)
  if (battlePhase === 3 && battleTimer >= totalDur + 0.3) {
    battlePhase = 4; // 완료 가드 — 1회만 실행 (F8)
    if (player.hp <= 0) {
      beginTransition(STATES.GAME_OVER);
    } else if (battleResult.enemyDead) {
      gameStats.kills++;
      if (enemy.isBoss) gameStats.bosses++;
      currentRoom++;
      if (currentRoom >= floorRooms.length) {
        gameStats.floors++;
        sound.playClear();
        if (currentFloor >= CONFIG.TOTAL_FLOORS) {
          beginTransition(STATES.VICTORY);
        } else {
          beginTransition(STATES.REWARD);
        }
      } else {
        beginTransition(STATES.DUNGEON_MAP);
      }
    } else {
      beginTransition(STATES.DICE_ROLL);
    }
  }
}

// 팝업 스폰
function spawnPopup(x, y, text, color) {
  var p = popups.get();
  if (!p) return;
  p.active = true; p.type = 'popup';
  p.x = x; p.y = y; p.vx = 0; p.vy = -50;
  p.text = text; p.color = color;
  p.alpha = 1; p.elapsed = 0; p.duration = 0.8; p.fontSize = 20;
}

// 파티클 스폰
function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var p = particles.get();
    if (!p) break;
    p.active = true; p.type = 'particle';
    p.x = x; p.y = y;
    p.vx = (Math.random() - 0.5) * 200;
    p.vy = (Math.random() - 0.5) * 200;
    p.color = color; p.alpha = 1;
    p.elapsed = 0; p.duration = 0.4 + Math.random() * 0.3;
    p.sz = 3 + Math.random() * 5;
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER — 상태별 렌더링
// ═══════════════════════════════════════════════════════════

function render(c, dt, ts) {
  c.save();
  // 화면 쉐이크
  if (Math.abs(shakeX) > 0.5) {
    c.translate((Math.random() - 0.5) * shakeX * 2, (Math.random() - 0.5) * shakeX);
  }

  switch (state) {
    case STATES.TITLE: renderTitle(c, ts); break;
    case STATES.DUNGEON_MAP: renderDungeonMap(c); break;
    case STATES.DICE_ROLL: renderDiceRoll(c); break;
    case STATES.DICE_PLACE: renderDicePlace(c); break;
    case STATES.BATTLE_RESOLVE: renderBattle(c); break;
    case STATES.REWARD: renderReward(c); break;
    case STATES.GAME_OVER: renderGameOver(c); break;
    case STATES.VICTORY: renderVictory(c, ts); break;
    case STATES.PAUSED: renderPaused(c); break;
  }

  // 전환 페이드 오버레이
  if (transitioning || fadeObj.alpha > 0.01) {
    c.fillStyle = 'rgba(0,0,0,' + Math.min(1, fadeObj.alpha) + ')';
    c.fillRect(-20, -20, W + 40, H + 40);
  }

  c.restore();
}

// ── 타이틀 화면 — 스캔라인 + 글리치 ──
function renderTitle(c, ts) {
  // 짙은 배경
  var grad = c.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a'); grad.addColorStop(1, '#1a0a2e');
  c.fillStyle = grad; c.fillRect(0, 0, W, H);

  // 스캔라인 효과 (action 장르)
  c.fillStyle = 'rgba(255,255,255,0.012)';
  for (var y = 0; y < H; y += 3) c.fillRect(0, y, W, 1);

  // 배경 파티클
  particles.renderAll(c);
  if (Math.random() < 0.25) {
    spawnParticles(Math.random() * W, Math.random() * H, '#6c3cf7', 1);
  }

  var midY = H * 0.33;
  c.textAlign = 'center'; c.textBaseline = 'middle';

  // 글리치 효과
  var glitch = Math.sin(ts * 0.003) > 0.93;
  var gx = glitch ? (Math.random() - 0.5) * 10 : 0;
  var fontSize = Math.min(W * 0.075, 38);

  // 그림자 레이어
  c.font = 'bold ' + fontSize + 'px monospace';
  c.fillStyle = 'rgba(108,60,247,0.3)';
  c.fillText('\uBBF8\uB2C8 \uB358\uC804 \uB2E4\uC774\uC2A4', W / 2 + 3 + gx, midY + 3);

  // 시안 글리치 오프셋
  if (glitch) {
    c.fillStyle = 'rgba(0,212,255,0.5)';
    c.fillText('\uBBF8\uB2C8 \uB358\uC804 \uB2E4\uC774\uC2A4', W / 2 - 3, midY);
  }
  // 빨강 글리치
  if (glitch) {
    c.fillStyle = 'rgba(239,68,68,0.4)';
    c.fillText('\uBBF8\uB2C8 \uB358\uC804 \uB2E4\uC774\uC2A4', W / 2 + 3, midY + 1);
  }
  // 메인 텍스트
  c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('\uBBF8\uB2C8 \uB358\uC804 \uB2E4\uC774\uC2A4', W / 2 + gx, midY);

  // 부제
  c.font = Math.min(W * 0.032, 15) + 'px monospace';
  c.fillStyle = CONFIG.COL_TEXT_SUB;
  c.fillText('\uC8FC\uC0AC\uC704\uB85C \uB358\uC804\uC744 \uC815\uBCF5\uD558\uB77C!', W / 2, midY + 42);

  // 주사위 장식
  var demoY = midY + 80;
  var demoTypes = ['atk', 'def', 'heal'];
  var demoVals = [4, 3, 2];
  for (var i = 0; i < 3; i++) {
    drawDie(c, W / 2 - 100 + i * 72, demoY, 56,
      { type: demoTypes[i], value: demoVals[i] }, false);
  }

  // 시작 안내 (펄스)
  var pulse = 0.5 + 0.5 * Math.sin(ts * 0.004);
  c.globalAlpha = 0.5 + pulse * 0.5;
  c.font = 'bold ' + Math.min(W * 0.035, 16) + 'px monospace';
  c.fillStyle = CONFIG.COL_WILD;
  c.fillText('SPACE / TAP to START', W / 2, demoY + 80);
  c.globalAlpha = 1;

  // 최고 기록
  var best = loadBest();
  if (best.score > 0) {
    c.font = Math.min(W * 0.028, 13) + 'px monospace';
    c.fillStyle = CONFIG.COL_TEXT_SUB;
    c.fillText('\uCD5C\uACE0\uC810: ' + best.score + ' | \uCD5C\uACE0\uCE35: ' + best.floor + 'F | \uD50C\uB808\uC774: ' + best.plays + '\uD68C', W / 2, H * 0.82);
  }

  // 조작 가이드
  c.font = Math.min(W * 0.023, 11) + 'px monospace';
  c.fillStyle = '#505070';
  c.fillText('1~6: \uC8FC\uC0AC\uC704 \uC120\uD0DD | Q/W/E: \uC2AC\uB86F \uBC30\uCE58 | R: \uC7AC\uAD74\uB9BC | SPACE: \uC804\uD22C', W / 2, H * 0.88);

  // 음소거 버튼
  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ── 던전 맵 ──
function renderDungeonMap(c) {
  if (bgCanvas) c.drawImage(bgCanvas, 0, 0);
  else { c.fillStyle = CONFIG.COL_BG; c.fillRect(0, 0, W, H); }

  c.textAlign = 'center';
  c.font = 'bold ' + Math.min(W * 0.05, 24) + 'px monospace';
  c.fillStyle = CONFIG.COL_BOSS;
  c.fillText(currentFloor + '\uCE35 \uB358\uC804', W / 2, 38);

  // 방 노드
  var roomCount = floorRooms.length;
  var nodeW = Math.min(64, (W - 40) / roomCount - 10);
  var gap = 20;
  var totalNodeW = roomCount * nodeW + (roomCount - 1) * gap;
  var sx = (W - totalNodeW) / 2;

  for (var i = 0; i < roomCount; i++) {
    var nx = sx + i * (nodeW + gap) + nodeW / 2;
    var ny = H * 0.3;
    var room = floorRooms[i];

    // 연결선
    if (i < roomCount - 1) {
      c.strokeStyle = '#444'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(nx + nodeW / 2 + 2, ny);
      c.lineTo(sx + (i + 1) * (nodeW + gap), ny); c.stroke();
    }

    // 노드 배경
    if (i < currentRoom) c.fillStyle = 'rgba(46,204,113,0.3)';
    else if (i === currentRoom) c.fillStyle = 'rgba(108,60,247,0.5)';
    else c.fillStyle = 'rgba(60,60,80,0.4)';
    roundRect(c, nx - nodeW / 2, ny - 22, nodeW, 44, 8); c.fill();

    if (i === currentRoom) {
      c.strokeStyle = '#6c3cf7'; c.lineWidth = 2;
      roundRect(c, nx - nodeW / 2, ny - 22, nodeW, 44, 8); c.stroke();
    }

    // 라벨
    c.font = '12px monospace'; c.fillStyle = CONFIG.COL_TEXT;
    var lbl = room.roomType === 'boss' ? '\uD83D\uDC80' : room.roomType === 'elite' ? '\u26A1' : (i + 1);
    c.fillText(lbl, nx, ny + 4);
  }

  // 적 프리뷰
  if (currentRoom < floorRooms.length) {
    var nextEnemy = floorRooms[currentRoom];
    var previewSz = nextEnemy.isBoss ? 70 : 50;
    drawEnemy(c, W / 2, H * 0.5, previewSz, nextEnemy.enemyType, 0);
    c.font = '13px monospace'; c.fillStyle = CONFIG.COL_TEXT;
    c.fillText(nextEnemy.enemyType.name + (nextEnemy.isElite ? ' \u26A1' : '') + (nextEnemy.isBoss ? ' \uD83D\uDC51' : ''), W / 2, H * 0.5 + previewSz / 2 + 20);
    c.font = '11px monospace'; c.fillStyle = CONFIG.COL_TEXT_SUB;
    c.fillText('HP:' + nextEnemy.hp + ' ATK:' + nextEnemy.atk + ' DEF:' + nextEnemy.def, W / 2, H * 0.5 + previewSz / 2 + 36);
  }

  // 플레이어 정보
  c.font = '12px monospace'; c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('\u2665 HP', W / 2, H * 0.7);
  drawHpBar(c, W / 2 - 70, H * 0.72, 140, 14, player.hp, player.maxHp, CONFIG.COL_PLAYER_HP);
  c.font = '11px monospace'; c.fillStyle = CONFIG.COL_TEXT_SUB;
  c.fillText('\uC8FC\uC0AC\uC704:' + playerDice.length + '\uAC1C | \uC7AC\uAD74\uB9BC:' + calcRerollsLeft(rerollsUsedFloor, CONFIG.REROLLS_PER_FLOOR) + '\uD68C', W / 2, H * 0.72 + 26);

  // 다음 방 버튼
  var bossRoom = floorRooms[currentRoom] && floorRooms[currentRoom].roomType === 'boss';
  drawButton(c, 'enterRoom', W / 2 - 80, H * 0.84, 160, CONFIG.MIN_TOUCH_TARGET,
    bossRoom ? '\u2694 \uBCF4\uC2A4 \uC804\uD22C!' : '\u25B6 \uB2E4\uC74C \uBC29', '#6c3cf7');

  // 일시정지 / 음소거
  drawButton(c, 'pause', 8, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET, '\u23F8', 'rgba(50,50,80,0.8)');
  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ── 주사위 굴림 ──
function renderDiceRoll(c) {
  if (bgCanvas) c.drawImage(bgCanvas, 0, 0);
  else { c.fillStyle = CONFIG.COL_BG; c.fillRect(0, 0, W, H); }

  renderEnemyPanel(c);

  c.textAlign = 'center';
  c.font = 'bold 17px monospace'; c.fillStyle = CONFIG.COL_WILD;
  c.fillText('\uD83C\uDFB2 \uC8FC\uC0AC\uC704 \uAD74\uB9AC\uB294 \uC911...', W / 2, H * 0.48);

  var diceY = H * 0.56;
  var totalDW = diceResults.length * (CONFIG.DICE_SIZE + 8);
  var diceStartX = (W - totalDW) / 2;
  for (var i = 0; i < diceResults.length; i++) {
    drawDie(c, diceStartX + i * (CONFIG.DICE_SIZE + 8), diceY, CONFIG.DICE_SIZE,
      diceResults[i], false, diceRollAnim.t);
  }

  particles.renderAll(c);
  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ── 주사위 배치 (핵심 화면) ──
function renderDicePlace(c) {
  if (bgCanvas) c.drawImage(bgCanvas, 0, 0);
  else { c.fillStyle = CONFIG.COL_BG; c.fillRect(0, 0, W, H); }

  renderEnemyPanel(c);

  // 플레이어 HP (좌하단)
  drawHpBar(c, 8, H - 28, 110, 14, player.hp, player.maxHp, CONFIG.COL_PLAYER_HP);

  // 슬롯 영역 — §4.5
  var slotW = Math.min(W * 0.28, 110);
  var slotH = 72;
  var slotGap = 8;
  var slotTotalW = slotW * 3 + slotGap * 2;
  var slotStartX = (W - slotTotalW) / 2;
  var slotY = H * 0.42;

  var slotTypes = ['atk', 'def', 'heal'];
  var slotColors = [CONFIG.COL_ATK, CONFIG.COL_DEF, CONFIG.COL_HEAL];
  var slotLabels = ['\u2694\uACF5\uACA9', '\u26E8\uBC29\uC5B4', '\u2665\uD68C\uBCF5'];

  for (var si = 0; si < 3; si++) {
    var ssx = slotStartX + si * (slotW + slotGap);
    var st = slotTypes[si];

    // 배경
    c.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(c, ssx, slotY, slotW, slotH, 6); c.fill();

    // 배치됨이면 해당 색상 채움
    if (placedSlots[st].length > 0) {
      c.fillStyle = slotColors[si].replace(')', ',0.15)').replace('rgb', 'rgba');
      roundRect(c, ssx, slotY, slotW, slotH, 6); c.fill();
    }

    // 테두리
    c.setLineDash(placedSlots[st].length > 0 ? [] : [4, 4]);
    c.strokeStyle = slotColors[si]; c.lineWidth = 2;
    roundRect(c, ssx, slotY, slotW, slotH, 6); c.stroke();
    c.setLineDash([]);

    // 라벨
    c.font = '11px monospace'; c.fillStyle = slotColors[si]; c.textAlign = 'center';
    c.fillText(slotLabels[si], ssx + slotW / 2, slotY - 4);

    // 배치된 주사위
    var placed = placedSlots[st];
    if (placed.length > 0) {
      var miniSz = Math.min(36, (slotW - 10) / placed.length);
      for (var j = 0; j < placed.length; j++) {
        drawDie(c, ssx + 4 + j * (miniSz + 2), slotY + (slotH - miniSz) / 2, miniSz, placed[j], false);
      }
      var sum = 0;
      for (var j = 0; j < placed.length; j++) {
        sum += placed[j].value + (placed[j].type === 'wild' ? CONFIG.WILD_BONUS : 0);
      }
      c.font = 'bold 13px monospace'; c.fillStyle = CONFIG.COL_TEXT;
      c.fillText('= ' + sum, ssx + slotW / 2, slotY + slotH + 13);
    } else {
      // 빈 슬롯 아이콘
      c.save(); c.globalAlpha = 0.2;
      c.font = '24px monospace'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillStyle = slotColors[si];
      c.fillText(['\u2694', '\u26E8', '\u2665'][si], ssx + slotW / 2, slotY + slotH / 2);
      c.restore();
    }

    // 히트 영역
    buttons['slot_' + st] = { x: ssx, y: slotY, w: slotW, h: slotH };
  }

  // 미배치 주사위
  var unplaced = [];
  for (var i = 0; i < diceResults.length; i++) {
    if (!diceResults[i].placed) unplaced.push({ dice: diceResults[i], origIdx: i });
  }
  var diceY = H * 0.68;
  var totalDW = unplaced.length * (CONFIG.DICE_SIZE + 10);
  var diceStartX = (W - totalDW) / 2;

  for (var i = 0; i < unplaced.length; i++) {
    var dx = diceStartX + i * (CONFIG.DICE_SIZE + 10);
    var oi = unplaced[i].origIdx;
    drawDie(c, dx, diceY, CONFIG.DICE_SIZE, unplaced[i].dice, oi === selectedDiceIdx);
    buttons['dice_' + oi] = { x: dx, y: diceY, w: CONFIG.DICE_SIZE, h: CONFIG.DICE_SIZE };
  }

  // 드래그 중인 주사위
  if (dragDice) {
    c.save(); c.globalAlpha = 0.7;
    drawDie(c, dragX - CONFIG.DICE_SIZE / 2, dragY - CONFIG.DICE_SIZE / 2,
      CONFIG.DICE_SIZE, dragDice, true);
    c.restore();
  }

  // 전투 버튼
  var allPlaced = unplaced.length === 0 && diceResults.length > 0;
  drawButton(c, 'fight', W / 2 - 80, H * 0.85, 160, CONFIG.MIN_TOUCH_TARGET,
    '\u2694 \uC804\uD22C!', allPlaced ? '#C0392B' : '#444', allPlaced);

  // 재굴림 버튼
  var rerollsLeft = calcRerollsLeft(rerollsUsedFloor, CONFIG.REROLLS_PER_FLOOR);
  var canReroll = rerollsLeft > 0 && rerollsUsedTurn < CONFIG.REROLLS_PER_TURN && unplaced.length > 0;
  drawButton(c, 'reroll', W * 0.78, H * 0.85, 90, CONFIG.MIN_TOUCH_TARGET,
    '\uD83D\uDD04(' + rerollsLeft + ')', canReroll ? '#6c3cf7' : '#444', canReroll);

  // UI 버튼
  drawButton(c, 'pause', 8, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET, '\u23F8', 'rgba(50,50,80,0.8)');
  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');

  popups.renderAll(c);
}

// 적 패널 공용 렌더
function renderEnemyPanel(c) {
  if (!enemy) return;
  var panelY = 48;
  var sz = enemy.isBoss ? 80 : 55;
  var ex = W / 2;
  var ey = panelY + sz / 2 + 18;

  // 이름
  c.textAlign = 'center';
  c.font = 'bold ' + (enemy.isBoss ? 15 : 13) + 'px monospace';
  c.fillStyle = enemy.isBoss ? CONFIG.COL_BOSS : CONFIG.COL_TEXT;
  c.fillText(enemy.enemyType.name + (enemy.isElite ? ' \u26A1' : '') + (enemy.isBoss ? ' \uD83D\uDC51' : ''), ex, panelY);

  drawEnemy(c, ex, ey, sz, enemy.enemyType, enemyFlashAlpha);

  // HP 바
  drawHpBar(c, ex - 55, ey + sz / 2 + 6, 110, 12, enemy.hp, enemy.maxHp, CONFIG.COL_ENEMY_HP);

  // 보스 페이즈
  if (enemy.isBoss) {
    c.font = '10px monospace'; c.fillStyle = CONFIG.COL_BOSS;
    c.fillText('Phase ' + getBossPhase(enemy.hp, enemy.maxHp), ex, ey + sz / 2 + 26);
  }

  // 적 스탯
  c.font = '10px monospace'; c.fillStyle = CONFIG.COL_TEXT_SUB;
  c.fillText('ATK:' + enemy.atk + ' DEF:' + enemy.def + (enemy.doubleAtk ? ' [2\uD68C]' : '') + (enemy.curseDice ? ' [\uC800\uC8FC]' : ''), ex, ey + sz / 2 + (enemy.isBoss ? 38 : 24));
}

// ── 전투 연출 ──
function renderBattle(c) {
  if (bgCanvas) c.drawImage(bgCanvas, 0, 0);
  else { c.fillStyle = CONFIG.COL_BG; c.fillRect(0, 0, W, H); }

  renderEnemyPanel(c);

  // 플레이어 HP
  drawHpBar(c, W / 2 - 55, H * 0.58, 110, 14, player.hp, player.maxHp, CONFIG.COL_PLAYER_HP);

  // 페이즈 텍스트
  c.textAlign = 'center';
  c.font = 'bold 16px monospace';
  var phaseTexts = ['\u2694 \uACF5\uACA9!', '\uD83D\uDEE1 \uBC29\uC5B4!', '\u2665 \uD68C\uBCF5!', '\uC804\uD22C \uC885\uB8CC'];
  c.fillStyle = CONFIG.COL_WILD;
  c.fillText(phaseTexts[Math.min(battlePhase, 3)], W / 2, H * 0.5);

  // 슬롯 요약
  var slotTypes = ['atk', 'def', 'heal'];
  var slotLabels = ['\uACF5\uACA9', '\uBC29\uC5B4', '\uD68C\uBCF5'];
  var slotCols = [CONFIG.COL_ATK, CONFIG.COL_DEF, CONFIG.COL_HEAL];
  for (var i = 0; i < 3; i++) {
    var sum = 0;
    for (var j = 0; j < placedSlots[slotTypes[i]].length; j++) {
      var d = placedSlots[slotTypes[i]][j];
      sum += d.value + (d.type === 'wild' ? CONFIG.WILD_BONUS : 0);
    }
    c.font = '12px monospace'; c.fillStyle = slotCols[i];
    c.fillText(slotLabels[i] + ':' + sum, W * 0.2 + i * W * 0.3, H * 0.68);
  }

  particles.renderAll(c);
  popups.renderAll(c);

  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ── 보상 선택 ──
function renderReward(c) {
  c.fillStyle = CONFIG.COL_BG; c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.font = 'bold ' + Math.min(W * 0.05, 22) + 'px monospace';
  c.fillStyle = CONFIG.COL_BOSS;
  c.fillText(currentFloor + '\uCE35 \uD074\uB9AC\uC5B4!', W / 2, H * 0.1);

  c.font = '13px monospace'; c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('\uBCF4\uC0C1\uC744 \uC120\uD0DD\uD558\uC138\uC694', W / 2, H * 0.17);

  // 보상 카드
  var cardW = Math.min(120, (W - 60) / rewardOptions.length - 10);
  var cardH = 150;
  var cardGap = 16;
  var totalCardW = rewardOptions.length * cardW + (rewardOptions.length - 1) * cardGap;
  var cardStartX = (W - totalCardW) / 2;

  for (var i = 0; i < rewardOptions.length; i++) {
    var rx = cardStartX + i * (cardW + cardGap);
    var ry = H * 0.25;
    var opt = rewardOptions[i];

    c.fillStyle = '#15152a';
    roundRect(c, rx, ry, cardW, cardH, 8); c.fill();
    c.strokeStyle = CONFIG.COL_BOSS; c.lineWidth = 2;
    roundRect(c, rx, ry, cardW, cardH, 8); c.stroke();

    // 아이콘
    c.font = '26px monospace'; c.textAlign = 'center';
    c.fillStyle = CONFIG.COL_TEXT;
    if (opt.type === 'upgrade') c.fillText('\u2B06', rx + cardW / 2, ry + 40);
    else if (opt.type === 'newDice') c.fillText('\uD83C\uDFB2', rx + cardW / 2, ry + 40);
    else c.fillText('\u2665', rx + cardW / 2, ry + 40);

    // 설명 (줄바꿈)
    c.font = '11px monospace'; c.fillStyle = CONFIG.COL_TEXT;
    var words = opt.desc;
    var maxW = cardW - 12;
    if (c.measureText(words).width > maxW) {
      var half = Math.ceil(words.length / 2);
      c.fillText(words.substring(0, half), rx + cardW / 2, ry + 70);
      c.fillText(words.substring(half), rx + cardW / 2, ry + 85);
    } else {
      c.fillText(words, rx + cardW / 2, ry + 75);
    }

    // 타입별 색상 힌트
    if (opt.type === 'newDice') {
      c.fillStyle = getDiceColor(opt.diceType);
      c.beginPath(); c.arc(rx + cardW / 2, ry + cardH - 30, 8, 0, Math.PI * 2); c.fill();
    }

    buttons['reward_' + i] = { x: rx, y: ry, w: cardW, h: cardH };
  }

  drawButton(c, 'mute', W - 56, 8, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ── 게임오버 — 화면 쉐이크 + 페이드 + 최고점 강조 ──
function renderGameOver(c) {
  c.fillStyle = '#0a0a0f'; c.fillRect(0, 0, W, H);

  // 빨간 비네트
  var vg = c.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, H * 0.7);
  vg.addColorStop(0, 'rgba(239,68,68,0.1)'); vg.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = vg; c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.font = 'bold ' + Math.min(W * 0.08, 36) + 'px monospace';
  c.fillStyle = CONFIG.COL_ENEMY_HP;
  c.fillText('GAME OVER', W / 2, H * 0.22);

  c.font = '14px monospace'; c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('\uB3C4\uB2EC: ' + currentFloor + '\uCE35 | \uCC98\uCE58: ' + gameStats.kills + '\uB9C8\uB9AC', W / 2, H * 0.34);

  c.font = 'bold 18px monospace'; c.fillStyle = CONFIG.COL_WILD;
  c.fillText('\uC810\uC218: ' + currentScore, W / 2, H * 0.42);

  var best = loadBest();
  if (currentScore >= best.score && currentScore > 0) {
    c.font = 'bold 16px monospace'; c.fillStyle = CONFIG.COL_BOSS;
    c.fillText('\u2605 NEW BEST! \u2605', W / 2, H * 0.5);
  } else {
    c.font = '12px monospace'; c.fillStyle = CONFIG.COL_TEXT_SUB;
    c.fillText('\uCD5C\uACE0\uC810: ' + best.score, W / 2, H * 0.5);
  }

  drawButton(c, 'restart', W / 2 - 80, H * 0.6, 160, CONFIG.MIN_TOUCH_TARGET,
    '\uD83D\uDD04 \uC7AC\uC2DC\uC791 (R)', '#6c3cf7');
  drawButton(c, 'toTitle', W / 2 - 60, H * 0.72, 120, CONFIG.MIN_TOUCH_TARGET,
    '\uD83C\uDFE0 \uD0C0\uC774\uD2C0', '#444');
}

// ── 승리 — 축하 파티클 ──
function renderVictory(c, ts) {
  c.fillStyle = '#0a0a1a'; c.fillRect(0, 0, W, H);

  // 축하 파티클
  if (Math.random() < 0.4) {
    var cols = [CONFIG.COL_BOSS, CONFIG.COL_ATK, CONFIG.COL_DEF, CONFIG.COL_HEAL, '#6c3cf7'];
    spawnParticles(Math.random() * W, -10, cols[Math.floor(Math.random() * cols.length)], 2);
  }
  // 아래로 떨어지는 파티클 — vy를 양수로
  for (var i = 0; i < particles.pool.length; i++) {
    if (particles.pool[i].active && particles.pool[i].vy < 0) particles.pool[i].vy = Math.abs(particles.pool[i].vy);
  }
  particles.renderAll(c);

  c.textAlign = 'center';
  var pulse = 0.85 + 0.15 * Math.sin(ts * 0.005);
  c.save();
  c.translate(W / 2, H * 0.22);
  c.scale(pulse, pulse);
  c.font = 'bold ' + Math.min(W * 0.09, 42) + 'px monospace';
  c.fillStyle = CONFIG.COL_BOSS;
  c.fillText('VICTORY!', 0, 0);
  c.restore();

  c.font = '14px monospace'; c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('5\uCE35 \uB358\uC804\uC744 \uC815\uBCF5\uD588\uC2B5\uB2C8\uB2E4!', W / 2, H * 0.35);

  c.font = 'bold 20px monospace'; c.fillStyle = CONFIG.COL_WILD;
  c.fillText('\uC810\uC218: ' + currentScore, W / 2, H * 0.43);

  var best = loadBest();
  if (currentScore >= best.score && currentScore > 0) {
    c.font = 'bold 16px monospace'; c.fillStyle = CONFIG.COL_BOSS;
    c.fillText('\u2605 NEW RECORD! \u2605', W / 2, H * 0.51);
  }

  drawButton(c, 'restart', W / 2 - 80, H * 0.62, 160, CONFIG.MIN_TOUCH_TARGET,
    '\uD83D\uDD04 \uB2E4\uC2DC \uB3C4\uC804', '#6c3cf7');
  drawButton(c, 'toTitle', W / 2 - 60, H * 0.74, 120, CONFIG.MIN_TOUCH_TARGET,
    '\uD83C\uDFE0 \uD0C0\uC774\uD2C0', '#444');
}

// ── 일시정지 ──
function renderPaused(c) {
  c.fillStyle = 'rgba(0,0,0,0.75)'; c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.font = 'bold ' + Math.min(W * 0.07, 30) + 'px monospace';
  c.fillStyle = CONFIG.COL_TEXT;
  c.fillText('PAUSED', W / 2, H * 0.28);

  c.font = '12px monospace'; c.fillStyle = CONFIG.COL_TEXT_SUB;
  c.fillText(currentFloor + '\uCE35 | HP:' + player.hp + '/' + player.maxHp + ' | \uC8FC\uC0AC\uC704:' + playerDice.length, W / 2, H * 0.36);

  drawButton(c, 'resume', W / 2 - 80, H * 0.44, 160, CONFIG.MIN_TOUCH_TARGET,
    '\u25B6 \uC7AC\uAC1C', '#6c3cf7');
  drawButton(c, 'toTitle', W / 2 - 80, H * 0.56, 160, CONFIG.MIN_TOUCH_TARGET,
    '\uD83C\uDFE0 \uD0C0\uC774\uD2C0\uB85C', '#444');
  drawButton(c, 'mute', W / 2 - 24, H * 0.68, CONFIG.MIN_TOUCH_TARGET, CONFIG.MIN_TOUCH_TARGET,
    sound.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A', 'rgba(50,50,80,0.8)');
}

// ═══════════════════════════════════════════════════════════
//  입력 처리 — §3 상태 기반 분기
// ═══════════════════════════════════════════════════════════

function handleInput(x, y) {
  if (transitioning) return;
  sound.resume();

  // 음소거 (전역)
  if (buttons.mute && hitTest(x, y, buttons.mute)) {
    sound.muted = !sound.muted; sound.playClick(); return;
  }

  switch (state) {
    case STATES.TITLE:
      resetGame();
      beginTransition(STATES.DUNGEON_MAP);
      sound.playClick();
      break;

    case STATES.DUNGEON_MAP:
      if (buttons.pause && hitTest(x, y, buttons.pause)) {
        prevState = state; state = STATES.PAUSED; return;
      }
      if (buttons.enterRoom && hitTest(x, y, buttons.enterRoom)) {
        var room = floorRooms[currentRoom];
        enemy = { enemyType: room.enemyType, hp: room.hp, maxHp: room.maxHp,
          atk: room.atk, def: room.def, isBoss: room.isBoss, isElite: room.isElite,
          doubleAtk: room.doubleAtk, curseDice: room.curseDice };
        if (enemy.isBoss) sound.playBossIntro();
        beginTransition(STATES.DICE_ROLL);
        sound.playClick();
      }
      break;

    case STATES.DICE_PLACE:
      if (buttons.pause && hitTest(x, y, buttons.pause)) {
        prevState = state; state = STATES.PAUSED; return;
      }
      // 전투 버튼
      if (buttons.fight && hitTest(x, y, buttons.fight)) {
        var unplaced = diceResults.filter(function(d) { return !d.placed; });
        if (unplaced.length === 0 && diceResults.length > 0) {
          beginTransition(STATES.BATTLE_RESOLVE);
          sound.playClick();
        }
        return;
      }
      // 재굴림
      if (buttons.reroll && hitTest(x, y, buttons.reroll)) {
        var rl = calcRerollsLeft(rerollsUsedFloor, CONFIG.REROLLS_PER_FLOOR);
        if (rl > 0 && rerollsUsedTurn < CONFIG.REROLLS_PER_TURN) {
          var hasUnplaced = false;
          for (var i = 0; i < diceResults.length; i++) {
            if (!diceResults[i].placed) { diceResults[i].value = rollDice(diceResults[i]); hasUnplaced = true; }
          }
          if (hasUnplaced) { rerollsUsedFloor++; rerollsUsedTurn++; sound.playRoll(); }
        }
        return;
      }
      // 슬롯 클릭 → 선택된 주사위 배치
      var slotTypes = ['atk', 'def', 'heal'];
      for (var i = 0; i < slotTypes.length; i++) {
        var skey = 'slot_' + slotTypes[i];
        if (buttons[skey] && hitTest(x, y, buttons[skey])) {
          if (selectedDiceIdx >= 0) {
            var d = diceResults[selectedDiceIdx];
            if (d && !d.placed && canPlaceDice(d.type, slotTypes[i])) {
              d.placed = true;
              placedSlots[slotTypes[i]].push(d);
              selectedDiceIdx = -1;
              sound.playPlace();
            }
          }
          return;
        }
      }
      // 주사위 클릭 → 선택
      for (var key in buttons) {
        if (key.indexOf('dice_') === 0 && hitTest(x, y, buttons[key])) {
          var idx = parseInt(key.split('_')[1]);
          selectedDiceIdx = selectedDiceIdx === idx ? -1 : idx;
          sound.playClick();
          return;
        }
      }
      break;

    case STATES.REWARD:
      for (var i = 0; i < rewardOptions.length; i++) {
        if (buttons['reward_' + i] && hitTest(x, y, buttons['reward_' + i])) {
          applyReward(rewardOptions[i]);
          sound.playClick();
          currentFloor++;
          currentRoom = 0;
          rerollsUsedFloor = 0;
          floorRooms = generateFloor(currentFloor);
          beginTransition(STATES.DUNGEON_MAP);
          return;
        }
      }
      break;

    case STATES.GAME_OVER:
    case STATES.VICTORY:
      if (buttons.restart && hitTest(x, y, buttons.restart)) {
        resetGame(); beginTransition(STATES.DUNGEON_MAP); sound.playClick();
      }
      if (buttons.toTitle && hitTest(x, y, buttons.toTitle)) {
        tweens.clearImmediate(); enterState(STATES.TITLE); sound.playClick();
      }
      break;

    case STATES.PAUSED:
      if (buttons.resume && hitTest(x, y, buttons.resume)) {
        state = prevState; buttons = {}; sound.playClick();
      }
      if (buttons.toTitle && hitTest(x, y, buttons.toTitle)) {
        tweens.clearImmediate(); enterState(STATES.TITLE); sound.playClick();
      }
      break;
  }
}

// 보상 적용
function applyReward(opt) {
  if (opt.type === 'upgrade') {
    playerDice[opt.diceIdx] = upgradeDice(playerDice[opt.diceIdx], opt.amount);
  } else if (opt.type === 'newDice') {
    if (playerDice.length < CONFIG.MAX_DICE_COUNT) {
      playerDice.push({ type: opt.diceType, min: opt.min, max: opt.max, value: 0 });
    }
  } else if (opt.type === 'heal') {
    player.hp = Math.min(player.maxHp, player.hp + (opt.healAmt || 5));
  }
}

// 키보드 — §3.1
function handleKeyDown(e) {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
  if (transitioning) return;

  // 일시정지 토글 — PAUSED만 즉시 전환 (F10)
  if ((e.key === 'Escape' || e.key === 'p' || e.key === 'P') &&
      state !== STATES.TITLE && state !== STATES.GAME_OVER && state !== STATES.VICTORY) {
    if (state === STATES.PAUSED) { state = prevState; buttons = {}; }
    else { prevState = state; state = STATES.PAUSED; }
    return;
  }

  switch (state) {
    case STATES.TITLE:
      if (e.key === ' ') { e.preventDefault(); handleInput(W / 2, H / 2); }
      break;

    case STATES.DUNGEON_MAP:
      if (e.key === ' ') {
        e.preventDefault();
        if (buttons.enterRoom) handleInput(buttons.enterRoom.x + 1, buttons.enterRoom.y + 1);
      }
      break;

    case STATES.DICE_PLACE:
      // 1~6 주사위 선택
      var num = parseInt(e.key);
      if (num >= 1 && num <= 6) {
        var unplaced = [];
        for (var i = 0; i < diceResults.length; i++) {
          if (!diceResults[i].placed) unplaced.push(i);
        }
        if (num <= unplaced.length) {
          selectedDiceIdx = unplaced[num - 1];
          sound.playClick();
        }
      }
      // Q/W/E 슬롯 배치
      if ((e.key === 'q' || e.key === 'Q') && selectedDiceIdx >= 0) tryPlaceDice('atk');
      if ((e.key === 'w' || e.key === 'W') && selectedDiceIdx >= 0) { e.preventDefault(); tryPlaceDice('def'); }
      if ((e.key === 'e' || e.key === 'E') && selectedDiceIdx >= 0) tryPlaceDice('heal');
      // R 재굴림
      if (e.key === 'r' || e.key === 'R') {
        if (buttons.reroll) handleInput(buttons.reroll.x + 1, buttons.reroll.y + 1);
      }
      // Space 전투
      if (e.key === ' ') {
        e.preventDefault();
        if (buttons.fight) handleInput(buttons.fight.x + 1, buttons.fight.y + 1);
      }
      break;

    case STATES.GAME_OVER:
    case STATES.VICTORY:
      if (e.key === 'r' || e.key === 'R') {
        resetGame(); beginTransition(STATES.DUNGEON_MAP); sound.playClick();
      }
      break;
  }
}

// 키보드로 슬롯 배치
function tryPlaceDice(slotType) {
  if (selectedDiceIdx < 0) return;
  var d = diceResults[selectedDiceIdx];
  if (d && !d.placed && canPlaceDice(d.type, slotType)) {
    d.placed = true;
    placedSlots[slotType].push(d);
    selectedDiceIdx = -1;
    sound.playPlace();
  }
}

// 드래그 시작
function handleDragStart(x, y) {
  if (state !== STATES.DICE_PLACE || transitioning) return;
  for (var key in buttons) {
    if (key.indexOf('dice_') === 0 && hitTest(x, y, buttons[key])) {
      var idx = parseInt(key.split('_')[1]);
      var d = diceResults[idx];
      if (d && !d.placed) {
        dragDice = d; dragX = x; dragY = y; selectedDiceIdx = idx;
      }
      return;
    }
  }
}

// 드래그 이동
function handleDragMove(x, y) {
  if (dragDice) { dragX = x; dragY = y; }
}

// 드래그 종료 → 슬롯에 드롭
function handleDragEnd(x, y) {
  if (!dragDice || state !== STATES.DICE_PLACE) { dragDice = null; return; }
  var slotTypes = ['atk', 'def', 'heal'];
  for (var i = 0; i < slotTypes.length; i++) {
    var skey = 'slot_' + slotTypes[i];
    if (buttons[skey] && hitTest(x, y, buttons[skey])) {
      if (canPlaceDice(dragDice.type, slotTypes[i])) {
        dragDice.placed = true;
        placedSlots[slotTypes[i]].push(dragDice);
        selectedDiceIdx = -1;
        sound.playPlace();
      }
      break;
    }
  }
  dragDice = null;
}

// canvas 좌표 변환
function canvasCoord(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
}
function touchCoord(touch) {
  var rect = canvas.getBoundingClientRect();
  return { x: (touch.clientX - rect.left) * (W / rect.width), y: (touch.clientY - rect.top) * (H / rect.height) };
}

// ═══════════════════════════════════════════════════════════
//  리사이즈 — window.innerWidth/Height 기준
// ═══════════════════════════════════════════════════════════
function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  if (state !== STATES.TITLE && currentFloor >= 1) buildBgCache(currentFloor);
}

// ═══════════════════════════════════════════════════════════
//  게임 루프 — §5.1, §12.4 try-catch 래핑 (F13)
// ═══════════════════════════════════════════════════════════
function gameLoop(timestamp) {
  try {
    var dt = Math.min((timestamp - lastTime) / 1000, 0.033); // 30fps 하한
    lastTime = timestamp;
    update(dt);
    render(ctx, dt, timestamp);
  } catch (e) {
    console.error('[GameLoop Error]', e);
  }
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════
//  init() — §5.3 유일한 진입점 (F3)
//  모든 이벤트 리스너는 여기서만 등록
// ═══════════════════════════════════════════════════════════
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  tweens = new TweenManager();
  popups = new ObjectPool(CONFIG.POPUP_POOL_SIZE);
  particles = new ObjectPool(CONFIG.PARTICLE_POOL_SIZE);
  sound = new SoundManager();
  sound.init();

  resizeCanvas();

  // 이벤트 리스너 — init() 내부에서만 등록 (F3)
  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', function(e) {
    var p = canvasCoord(e);
    handleDragStart(p.x, p.y);
    if (!dragDice) handleInput(p.x, p.y);
  });
  canvas.addEventListener('mousemove', function(e) {
    var p = canvasCoord(e);
    handleDragMove(p.x, p.y);
  });
  canvas.addEventListener('mouseup', function(e) {
    var p = canvasCoord(e);
    handleDragEnd(p.x, p.y);
  });

  // 터치 — passive:false + CSS touch-action:none (§3.3)
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length > 0) {
      var p = touchCoord(e.touches[0]);
      handleDragStart(p.x, p.y);
      if (!dragDice) handleInput(p.x, p.y);
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length > 0) {
      var p = touchCoord(e.touches[0]);
      handleDragMove(p.x, p.y);
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (e.changedTouches.length > 0) {
      var p = touchCoord(e.changedTouches[0]);
      handleDragEnd(p.x, p.y);
    }
    dragDice = null;
  }, { passive: false });

  window.addEventListener('keydown', handleKeyDown);

  // 초기 상태
  enterState(STATES.TITLE);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// §5.3: 유일한 즉시 실행 코드 (F3, F5)
window.addEventListener('load', init);

</script>
