<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="eHullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A1A2E"/>
      <stop offset="50%" stop-color="#2A0A1E"/>
      <stop offset="100%" stop-color="#1A0010"/>
    </linearGradient>
    <linearGradient id="eSailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="eGlowRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3344"/>
      <stop offset="100%" stop-color="#AA1122"/>
    </linearGradient>
    <radialGradient id="eEyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF3344" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FF3344" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF3344" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eAuraGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF3344" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF3344" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eWaterGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3344" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </linearGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#FF3344" flood-opacity="0.3"/>
    </filter>
    <filter id="eDeepShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ominous aura -->
  <ellipse cx="64" cy="80" rx="55" ry="40" fill="url(#eAuraGlow)"/>

  <!-- Water reflection -->
  <g id="eWaterReflect">
    <ellipse cx="64" cy="112" rx="50" ry="12" fill="url(#eWaterGlow)"/>
    <ellipse cx="64" cy="110" rx="38" ry="5" fill="#FF3344" opacity="0.08"/>
  </g>

  <!-- Hull - dark and menacing -->
  <g id="eHull" filter="url(#eDeepShadow)">
    <path d="M22,88 Q26,70 34,66 L94,66 Q102,70 106,88 Q102,96 90,102 L38,102 Q26,96 22,88Z" fill="url(#eHullGrad)"/>
    <!-- Hull metal plates -->
    <line x1="30" y1="74" x2="98" y2="74" stroke="#5A2A3E" stroke-width="0.8" opacity="0.5"/>
    <line x1="28" y1="82" x2="100" y2="82" stroke="#5A2A3E" stroke-width="0.8" opacity="0.5"/>
    <line x1="26" y1="90" x2="102" y2="90" stroke="#5A2A3E" stroke-width="0.8" opacity="0.5"/>
    <!-- Hull highlight -->
    <path d="M34,68 Q50,66 64,66 Q78,66 94,68 L92,70 Q78,68 64,68 Q50,68 36,70Z" fill="#5A3A4E" opacity="0.5"/>
    <!-- Spiked rivets -->
    <circle cx="32" cy="78" r="1.5" fill="#8B0000"/>
    <circle cx="46" cy="78" r="1.5" fill="#8B0000"/>
    <circle cx="60" cy="78" r="1.5" fill="#8B0000"/>
    <circle cx="74" cy="78" r="1.5" fill="#8B0000"/>
    <circle cx="88" cy="78" r="1.5" fill="#8B0000"/>
    <!-- Menacing bow ram -->
    <path d="M18,86 Q12,78 10,70 Q12,66 16,68 Q20,74 22,86Z" fill="#4A1A2E" stroke="#8B0000" stroke-width="0.5"/>
    <path d="M12,72 L16,70 L14,76Z" fill="#FF3344" opacity="0.6"/>
    <!-- Stern spike -->
    <path d="M110,86 Q114,80 116,72 Q114,68 112,70 Q108,76 106,86Z" fill="#4A1A2E"/>
    <!-- Red glowing portholes -->
    <circle cx="42" cy="86" r="3.5" fill="#1A0010" stroke="#8B0000" stroke-width="1"/>
    <circle cx="42" cy="86" r="2" fill="#FF3344" opacity="0.7" filter="url(#eGlow)"/>
    <circle cx="64" cy="86" r="3.5" fill="#1A0010" stroke="#8B0000" stroke-width="1"/>
    <circle cx="64" cy="86" r="2" fill="#FF3344" opacity="0.7" filter="url(#eGlow)"/>
    <circle cx="86" cy="86" r="3.5" fill="#1A0010" stroke="#8B0000" stroke-width="1"/>
    <circle cx="86" cy="86" r="2" fill="#FF3344" opacity="0.7" filter="url(#eGlow)"/>
  </g>

  <!-- Mast - charred -->
  <g id="eMast">
    <rect x="62" y="14" width="4" height="56" rx="1" fill="#2A1A18"/>
    <rect x="63" y="14" width="1.5" height="56" fill="#3A2A28" opacity="0.5"/>
    <!-- Cross beam with spikes -->
    <rect x="30" y="32" width="68" height="3" rx="1" fill="#2A1A18"/>
    <path d="M28,32 L30,28 L32,32Z" fill="#5A2A3E"/>
    <path d="M96,32 L98,28 L100,32Z" fill="#5A2A3E"/>
  </g>

  <!-- Tattered dark sails -->
  <g id="eSails">
    <path d="M34,34 Q36,30 64,28 Q92,30 94,34 L94,62 Q92,66 64,68 Q36,66 34,62Z" fill="url(#eSailGrad)" stroke="#3A2A2E" stroke-width="0.5"/>
    <!-- Torn edges -->
    <path d="M34,62 Q38,58 36,54 Q34,56 34,62Z" fill="#0A1628"/>
    <path d="M94,56 Q92,52 94,48 Q96,50 96,54Z" fill="#0A1628"/>
    <!-- Red skull emblem -->
    <g filter="url(#eGlow)">
      <circle cx="64" cy="46" r="7" fill="#FF3344" opacity="0.15"/>
      <circle cx="64" cy="44" r="5" fill="none" stroke="#FF3344" stroke-width="1"/>
      <circle cx="61" cy="43" r="1.5" fill="#FF3344"/>
      <circle cx="67" cy="43" r="1.5" fill="#FF3344"/>
      <path d="M60,47 L63,46 L64,48 L65,46 L68,47" stroke="#FF3344" stroke-width="0.8" fill="none"/>
      <path d="M58,50 L64,48 L70,50" stroke="#FF3344" stroke-width="0.7" fill="none"/>
      <path d="M60,50 L60,54" stroke="#FF3344" stroke-width="0.7"/>
      <path d="M68,50 L68,54" stroke="#FF3344" stroke-width="0.7"/>
    </g>
    <!-- Sail tears -->
    <path d="M44,38 Q46,42 44,46" stroke="#2A2A2A" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M82,40 Q84,44 82,48" stroke="#2A2A2A" stroke-width="0.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Pirate flag - tattered -->
  <g id="eFlag">
    <path d="M64,6 L64,16" stroke="#2A1A18" stroke-width="1.5"/>
    <path d="M64,6 Q74,4 80,8 Q76,12 64,10Z" fill="#1A0010" stroke="#8B0000" stroke-width="0.3"/>
    <circle cx="72" cy="8" r="1.5" fill="#FF3344" opacity="0.8"/>
  </g>

  <!-- Ghost fire on mast top -->
  <g id="ghostFire" filter="url(#eGlow)">
    <ellipse cx="64" cy="12" rx="4" ry="6" fill="#FF3344" opacity="0.3"/>
    <ellipse cx="64" cy="10" rx="2" ry="4" fill="#FF6655" opacity="0.5"/>
    <ellipse cx="64" cy="9" rx="1" ry="2" fill="#FFAA88" opacity="0.7"/>
  </g>

  <!-- Heavy cannons -->
  <g id="eCannons">
    <rect x="24" y="72" width="10" height="4" rx="1" fill="#1A0A0A" transform="rotate(-12, 29, 74)"/>
    <circle cx="24" cy="73" r="2.5" fill="#2A1A1A" stroke="#8B0000" stroke-width="0.5"/>
    <rect x="94" y="72" width="10" height="4" rx="1" fill="#1A0A0A" transform="rotate(12, 99, 74)"/>
    <circle cx="104" cy="73" r="2.5" fill="#2A1A1A" stroke="#8B0000" stroke-width="0.5"/>
  </g>

  <!-- Chains dangling -->
  <g id="chains" opacity="0.5">
    <path d="M36,34 Q34,40 36,46 Q34,50 36,54" stroke="#5A5A5A" stroke-width="0.8" fill="none"/>
    <path d="M92,34 Q94,42 92,48 Q94,52 92,56" stroke="#5A5A5A" stroke-width="0.8" fill="none"/>
  </g>

  <!-- Blood-red water splash -->
  <g id="eWaterSplash">
    <path d="M18,102 Q22,96 28,100 Q34,96 40,102" stroke="#8B0000" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M88,102 Q92,96 98,100 Q102,98 110,102" stroke="#8B0000" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
</svg>