<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="hullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#6B3A1F"/>
      <stop offset="100%" stop-color="#4A2510"/>
    </linearGradient>
    <linearGradient id="sailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="40%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#E8D4A8"/>
    </linearGradient>
    <linearGradient id="sailAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E85530"/>
      <stop offset="100%" stop-color="#C43A18"/>
    </linearGradient>
    <linearGradient id="waterGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2CB49C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A6B5A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#2A2A4E"/>
    </linearGradient>
    <radialGradient id="compassGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F0A030" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Water reflection glow -->
  <g id="waterReflection">
    <ellipse cx="64" cy="112" rx="50" ry="12" fill="url(#waterGlow)"/>
    <ellipse cx="64" cy="110" rx="40" ry="6" fill="#2CB49C" opacity="0.15"/>
  </g>

  <!-- Hull -->
  <g id="hull" filter="url(#shadow1)">
    <path d="M24,88 Q28,72 36,68 L92,68 Q100,72 104,88 Q100,96 88,100 L40,100 Q28,96 24,88Z" fill="url(#hullGrad)"/>
    <!-- Hull planks -->
    <line x1="32" y1="76" x2="96" y2="76" stroke="#4A2510" stroke-width="0.7" opacity="0.5"/>
    <line x1="30" y1="82" x2="98" y2="82" stroke="#4A2510" stroke-width="0.7" opacity="0.5"/>
    <line x1="28" y1="88" x2="100" y2="88" stroke="#4A2510" stroke-width="0.7" opacity="0.5"/>
    <!-- Hull highlight -->
    <path d="M36,70 Q44,68 64,68 Q84,68 92,70 L90,72 Q80,70 64,70 Q48,70 38,72Z" fill="#A07850" opacity="0.6"/>
    <!-- Hull rivets -->
    <circle cx="32" cy="80" r="1.2" fill="#3A1A08"/>
    <circle cx="44" cy="80" r="1.2" fill="#3A1A08"/>
    <circle cx="56" cy="80" r="1.2" fill="#3A1A08"/>
    <circle cx="68" cy="80" r="1.2" fill="#3A1A08"/>
    <circle cx="80" cy="80" r="1.2" fill="#3A1A08"/>
    <circle cx="96" cy="80" r="1.2" fill="#3A1A08"/>
    <!-- Bow ornament -->
    <path d="M22,86 Q18,82 16,76 Q18,74 22,76 Q24,80 24,86Z" fill="#F0A030" filter="url(#glow1)"/>
    <!-- Stern ornament -->
    <path d="M106,86 Q110,82 112,76 Q110,74 106,76 Q104,80 104,86Z" fill="#F0A030" opacity="0.7"/>
    <!-- Porthole windows -->
    <circle cx="44" cy="86" r="3" fill="#0a1628" stroke="#F0A030" stroke-width="1"/>
    <circle cx="44" cy="86" r="1.5" fill="#44ddff" opacity="0.5"/>
    <circle cx="64" cy="86" r="3" fill="#0a1628" stroke="#F0A030" stroke-width="1"/>
    <circle cx="64" cy="86" r="1.5" fill="#44ddff" opacity="0.5"/>
    <circle cx="84" cy="86" r="3" fill="#0a1628" stroke="#F0A030" stroke-width="1"/>
    <circle cx="84" cy="86" r="1.5" fill="#44ddff" opacity="0.5"/>
  </g>

  <!-- Mast -->
  <g id="mast">
    <rect x="62" y="16" width="4" height="56" rx="1" fill="#5A3818"/>
    <rect x="63" y="16" width="1.5" height="56" fill="#7A5838" opacity="0.4"/>
    <!-- Crow's nest -->
    <rect x="54" y="24" width="20" height="4" rx="1" fill="#6B3A1F" stroke="#4A2510" stroke-width="0.5"/>
    <rect x="56" y="20" width="16" height="4" rx="1" fill="#8B5E3C"/>
    <!-- Cross beam -->
    <rect x="34" y="34" width="60" height="3" rx="1" fill="#5A3818"/>
  </g>

  <!-- Main Sail -->
  <g id="mainSail">
    <path d="M38,36 Q40,32 64,30 Q88,32 90,36 L90,64 Q88,66 64,68 Q40,66 38,64Z" fill="url(#sailGrad)" stroke="#C8B090" stroke-width="0.5"/>
    <!-- Sail stripe -->
    <path d="M40,44 Q52,42 64,42 Q76,42 88,44 L88,52 Q76,50 64,50 Q52,50 40,52Z" fill="url(#sailAccent)" opacity="0.85"/>
    <!-- Skull emblem on sail -->
    <circle cx="64" cy="48" r="4" fill="#FFF8E8" opacity="0.9"/>
    <circle cx="62" cy="47" r="1" fill="#1A1A2E"/>
    <circle cx="66" cy="47" r="1" fill="#1A1A2E"/>
    <path d="M61,50 Q64,52 67,50" stroke="#1A1A2E" stroke-width="0.8" fill="none"/>
    <!-- Sail wrinkle lines -->
    <path d="M42,40 Q54,38 64,38 Q74,38 86,40" stroke="#D8C8A8" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M40,56 Q54,54 64,54 Q74,54 88,56" stroke="#D8C8A8" stroke-width="0.4" fill="none" opacity="0.5"/>
  </g>

  <!-- Pirate Flag -->
  <g id="flag">
    <path d="M64,8 L64,18" stroke="#5A3818" stroke-width="1.5"/>
    <path d="M64,8 Q72,6 78,10 Q74,14 64,12Z" fill="url(#flagGrad)"/>
    <!-- Tiny skull on flag -->
    <circle cx="70" cy="10" r="2" fill="#FFF" opacity="0.8"/>
    <path d="M68,12 L72,12" stroke="#FFF" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Cannons -->
  <g id="cannons">
    <rect x="28" y="74" width="8" height="3" rx="1" fill="#333" transform="rotate(-10, 32, 75)"/>
    <circle cx="28" cy="75" r="2" fill="#444"/>
    <rect x="92" y="74" width="8" height="3" rx="1" fill="#333" transform="rotate(10, 96, 75)"/>
    <circle cx="100" cy="75" r="2" fill="#444"/>
  </g>

  <!-- Compass Rose Glow (signature) -->
  <g id="compassSignature" filter="url(#glow1)">
    <circle cx="64" cy="96" r="5" fill="url(#compassGlow)"/>
    <path d="M64,92 L65,95 L64,94 L63,95Z" fill="#F0A030"/>
    <path d="M64,100 L63,97 L64,98 L65,97Z" fill="#F0A030" opacity="0.7"/>
    <path d="M60,96 L63,95 L62,96 L63,97Z" fill="#F0A030" opacity="0.7"/>
    <path d="M68,96 L65,97 L66,96 L65,95Z" fill="#F0A030" opacity="0.7"/>
  </g>

  <!-- Rim light (top-left lighting) -->
  <g id="rimLight">
    <path d="M24,86 Q28,72 36,68 L64,68 Q40,70 30,80 Q26,84 24,88Z" fill="#FFF" opacity="0.08"/>
    <path d="M38,36 Q50,34 64,32 L64,38 Q50,38 40,40Z" fill="#FFF" opacity="0.1"/>
  </g>

  <!-- Water splash -->
  <g id="waterSplash">
    <path d="M20,100 Q24,94 30,98 Q36,94 42,100" stroke="#2CB49C" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M86,100 Q90,94 96,98 Q100,96 108,100" stroke="#2CB49C" stroke-width="1" fill="none" opacity="0.4"/>
    <circle cx="18" cy="98" r="1.5" fill="#2CB49C" opacity="0.3"/>
    <circle cx="110" cy="96" r="1" fill="#2CB49C" opacity="0.25"/>
  </g>
</svg>