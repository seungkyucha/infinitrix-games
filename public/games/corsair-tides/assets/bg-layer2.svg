<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="fg-rockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1A10"/>
      <stop offset="100%" stop-color="#1A0A08"/>
    </linearGradient>
    <linearGradient id="fg-woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3818"/>
      <stop offset="100%" stop-color="#3A2008"/>
    </linearGradient>
    <linearGradient id="fg-seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E4A3A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06282A" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="fg-waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2CB49C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A6B5A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fg-lanternGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#F0A030" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fg-fireGlow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FF8030" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#E85530" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E85530" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fg-flagGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#2A2A4E"/>
    </linearGradient>
    <filter id="fgGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fgSoftBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="fgFog">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="fgShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Sea midground -->
  <rect x="0" y="350" width="1200" height="450" fill="url(#fg-seaGrad)"/>

  <!-- Wave patterns (closer, bigger) -->
  <g>
    <path d="M0,380 Q40,368 80,380 Q120,392 160,380 Q200,368 240,380 Q280,392 320,380 Q360,368 400,380 Q440,392 480,380 Q520,368 560,380 Q600,392 640,380 Q680,368 720,380 Q760,392 800,380 Q840,368 880,380 Q920,392 960,380 Q1000,368 1040,380 Q1080,392 1120,380 Q1160,368 1200,380" stroke="#2CB49C" stroke-width="1.5" fill="none" opacity="0.25"/>
    <path d="M0,400 Q50,388 100,400 Q150,412 200,400 Q250,388 300,400 Q350,412 400,400 Q450,388 500,400 Q550,412 600,400 Q650,388 700,400 Q750,412 800,400 Q850,388 900,400 Q950,412 1000,400 Q1050,388 1100,400 Q1150,412 1200,400" stroke="#1A6B5A" stroke-width="1.2" fill="none" opacity="0.2"/>
    <path d="M0,430 Q60,420 120,430 Q180,440 240,430 Q300,420 360,430 Q420,440 480,430 Q540,420 600,430 Q660,440 720,430 Q780,420 840,430 Q900,440 960,430 Q1020,420 1080,430 Q1140,440 1200,430" stroke="#2CB49C" stroke-width="1" fill="none" opacity="0.15"/>
    <!-- Foam highlights -->
    <path d="M100,378 Q120,374 140,378" stroke="#FFF" stroke-width="0.8" fill="none" opacity="0.1"/>
    <path d="M400,378 Q420,374 440,378" stroke="#FFF" stroke-width="0.8" fill="none" opacity="0.08"/>
    <path d="M700,378 Q720,374 740,378" stroke="#FFF" stroke-width="0.8" fill="none" opacity="0.1"/>
    <path d="M1000,378 Q1020,374 1040,378" stroke="#FFF" stroke-width="0.8" fill="none" opacity="0.08"/>
  </g>

  <!-- LEFT: Rocky cliff with dock -->
  <g id="leftCliff" filter="url(#fgShadow)">
    <path d="M0,280 Q20,260 60,270 Q100,250 130,280 Q150,260 170,290 Q180,310 190,350 L190,800 L0,800Z" fill="url(#fg-rockGrad)"/>
    <!-- Rock texture lines -->
    <path d="M10,300 Q30,290 50,300 Q70,290 90,300" stroke="#3A2A18" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M20,330 Q50,320 80,330 Q110,320 140,340" stroke="#3A2A18" stroke-width="0.6" fill="none" opacity="0.35"/>
    <path d="M0,360 Q40,350 80,360 Q120,350 160,365" stroke="#3A2A18" stroke-width="0.5" fill="none" opacity="0.3"/>
    <!-- Moss/vegetation on rocks -->
    <path d="M40,268 Q50,260 60,268 Q55,264 45,264Z" fill="#2A5A3A" opacity="0.5"/>
    <path d="M100,248 Q110,240 120,250 Q115,244 105,244Z" fill="#2A5A3A" opacity="0.45"/>
    <path d="M130,278 Q140,272 148,282 Q142,276 132,274Z" fill="#1A4A2A" opacity="0.4"/>
    <!-- Rock highlight -->
    <path d="M0,280 Q20,260 60,270 Q80,262 100,260" stroke="#4A3A28" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Wooden dock on left -->
  <g id="leftDock">
    <rect x="120" y="340" width="80" height="8" rx="2" fill="url(#fg-woodGrad)" opacity="0.85"/>
    <rect x="120" y="342" width="80" height="2" fill="#6B4A28" opacity="0.3"/>
    <!-- Dock planks -->
    <line x1="130" y1="340" x2="130" y2="348" stroke="#3A2008" stroke-width="0.5" opacity="0.4"/>
    <line x1="145" y1="340" x2="145" y2="348" stroke="#3A2008" stroke-width="0.5" opacity="0.4"/>
    <line x1="160" y1="340" x2="160" y2="348" stroke="#3A2008" stroke-width="0.5" opacity="0.4"/>
    <line x1="175" y1="340" x2="175" y2="348" stroke="#3A2008" stroke-width="0.5" opacity="0.4"/>
    <line x1="190" y1="340" x2="190" y2="348" stroke="#3A2008" stroke-width="0.5" opacity="0.4"/>
    <!-- Dock posts -->
    <rect x="130" y="340" width="5" height="50" fill="#4A2810" opacity="0.8"/>
    <rect x="165" y="340" width="5" height="45" fill="#4A2810" opacity="0.8"/>
    <!-- Rope on post -->
    <path d="M132,345 Q128,350 132,355 Q136,360 132,365" stroke="#8B7B5A" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Lantern on dock -->
  <g filter="url(#fgGlow)">
    <circle cx="168" cy="332" r="12" fill="url(#fg-lanternGlow)"/>
    <rect x="165" y="328" width="6" height="8" rx="1" fill="#F0A030" opacity="0.7"/>
    <rect x="166" y="330" width="4" height="4" rx="1" fill="#FFD080" opacity="0.8"/>
    <rect x="166" y="326" width="4" height="3" fill="#5A3818"/>
  </g>

  <!-- RIGHT: Rock formation with watchtower -->
  <g id="rightCliff" filter="url(#fgShadow)">
    <path d="M1010,300 Q1030,270 1060,285 Q1090,260 1120,280 Q1150,255 1170,275 Q1190,290 1200,320 L1200,800 L1010,800Z" fill="url(#fg-rockGrad)"/>
    <!-- Rock texture -->
    <path d="M1030,310 Q1060,300 1090,310 Q1120,300 1150,315" stroke="#3A2A18" stroke-width="0.7" fill="none" opacity="0.4"/>
    <path d="M1020,340 Q1060,330 1100,340 Q1140,330 1180,345" stroke="#3A2A18" stroke-width="0.6" fill="none" opacity="0.35"/>
    <!-- Moss -->
    <path d="M1060,283 Q1070,276 1078,285 Q1072,280 1062,280Z" fill="#2A5A3A" opacity="0.45"/>
    <path d="M1120,278 Q1130,271 1138,280 Q1132,274 1122,275Z" fill="#2A5A3A" opacity="0.4"/>
  </g>

  <!-- Watchtower on right cliff -->
  <g id="watchtower">
    <rect x="1095" y="220" width="30" height="65" fill="#3A2A18" opacity="0.85"/>
    <rect x="1090" y="215" width="40" height="8" fill="#4A3A28"/>
    <!-- Tower window -->
    <rect x="1104" y="235" width="12" height="15" rx="6" fill="#0a1628" stroke="#5A4A38" stroke-width="0.5"/>
    <circle cx="1110" cy="240" r="3" fill="#F0A030" opacity="0.4" filter="url(#fgGlow)"/>
    <!-- Tower roof -->
    <path d="M1088,215 L1110,195 L1132,215Z" fill="#6B3A1F"/>
    <!-- Flag on tower -->
    <line x1="1110" y1="195" x2="1110" y2="178" stroke="#5A3818" stroke-width="1.5"/>
    <path d="M1110,178 Q1120,175 1128,180 Q1122,185 1110,182Z" fill="url(#fg-flagGrad)" opacity="0.8"/>
    <circle cx="1120" cy="180" r="1.5" fill="#FFF" opacity="0.5"/>
  </g>

  <!-- Center: Floating barrel and crate debris -->
  <g id="debris">
    <ellipse cx="500" cy="390" rx="12" ry="8" fill="#6B4A28" stroke="#4A2810" stroke-width="0.5" opacity="0.6"/>
    <line x1="492" y1="388" x2="492" y2="394" stroke="#4A2810" stroke-width="0.5" opacity="0.4"/>
    <line x1="500" y1="386" x2="500" y2="396" stroke="#4A2810" stroke-width="0.5" opacity="0.4"/>
    <line x1="508" y1="388" x2="508" y2="394" stroke="#4A2810" stroke-width="0.5" opacity="0.4"/>
    <!-- Crate -->
    <rect x="700" y="384" width="16" height="14" fill="#5A3818" stroke="#3A2008" stroke-width="0.5" opacity="0.5" transform="rotate(8, 708, 391)"/>
    <line x1="700" y1="391" x2="716" y2="391" stroke="#3A2008" stroke-width="0.5" opacity="0.3" transform="rotate(8, 708, 391)"/>
  </g>

  <!-- Buoys -->
  <g id="buoys">
    <circle cx="350" cy="375" r="5" fill="#E85530" opacity="0.6"/>
    <circle cx="350" cy="375" r="3" fill="#FF8060" opacity="0.5"/>
    <line x1="350" y1="380" x2="350" y2="400" stroke="#5A5A5A" stroke-width="0.8" opacity="0.3"/>
    <circle cx="850" cy="385" r="4" fill="#E85530" opacity="0.5"/>
    <circle cx="850" cy="385" r="2.5" fill="#FF8060" opacity="0.4"/>
  </g>

  <!-- Sea fog layers -->
  <g filter="url(#fgFog)">
    <ellipse cx="300" cy="400" rx="200" ry="30" fill="#FFF" opacity="0.04"/>
    <ellipse cx="700" cy="390" rx="180" ry="25" fill="#FFF" opacity="0.035"/>
    <ellipse cx="1000" cy="410" rx="150" ry="20" fill="#FFF" opacity="0.03"/>
    <ellipse cx="100" cy="420" rx="120" ry="22" fill="#2CB49C" opacity="0.03"/>
    <ellipse cx="600" cy="430" rx="250" ry="28" fill="#FFF" opacity="0.025"/>
  </g>

  <!-- Foreground waves (biggest, closest) -->
  <g>
    <path d="M0,500 Q80,480 160,500 Q240,520 320,500 Q400,480 480,500 Q560,520 640,500 Q720,480 800,500 Q880,520 960,500 Q1040,480 1120,500 Q1160,510 1200,500" fill="url(#fg-waveGrad)" opacity="0.4"/>
    <path d="M0,520 Q100,505 200,520 Q300,535 400,520 Q500,505 600,520 Q700,535 800,520 Q900,505 1000,520 Q1100,535 1200,520" fill="#0E4A3A" opacity="0.2"/>
  </g>

  <!-- Phosphorescent sea particles -->
  <g opacity="0.3">
    <circle cx="250" cy="420" r="1.5" fill="#44DDFF" filter="url(#fgGlow)"/>
    <circle cx="480" cy="450" r="1" fill="#44DDFF" opacity="0.6"/>
    <circle cx="650" cy="410" r="1.2" fill="#2CB49C" opacity="0.5"/>
    <circle cx="820" cy="440" r="0.8" fill="#44DDFF" opacity="0.5"/>
    <circle cx="380" cy="460" r="1" fill="#2CB49C" opacity="0.4"/>
    <circle cx="560" cy="430" r="1.3" fill="#44DDFF" opacity="0.6"/>
    <circle cx="920" cy="420" r="0.9" fill="#44DDFF" opacity="0.45"/>
    <circle cx="150" cy="440" r="1.1" fill="#2CB49C" opacity="0.5"/>
    <circle cx="1050" cy="450" r="1" fill="#44DDFF" opacity="0.4"/>
    <circle cx="740" cy="460" r="0.8" fill="#2CB49C" opacity="0.35"/>
  </g>

  <!-- Rope bridge remnants between cliffs (atmospheric detail) -->
  <g opacity="0.15">
    <path d="M190,310 Q400,380 600,370 Q800,360 1010,320" stroke="#8B7B5A" stroke-width="1" fill="none" stroke-dasharray="8,6"/>
    <path d="M190,318 Q400,388 600,378 Q800,368 1010,328" stroke="#8B7B5A" stroke-width="0.5" fill="none" stroke-dasharray="4,8"/>
  </g>

  <!-- Anchor chain in water (left) -->
  <g opacity="0.2">
    <path d="M140,390 Q138,420 142,450 Q138,480 140,510" stroke="#5A5A5A" stroke-width="2" fill="none"/>
    <circle cx="140" cy="388" r="3" fill="#5A5A5A" opacity="0.5"/>
  </g>

  <!-- Fire/campfire glow on left cliff -->
  <g filter="url(#fgGlow)">
    <circle cx="80" cy="268" r="15" fill="url(#fg-fireGlow)"/>
    <ellipse cx="80" cy="272" rx="4" ry="6" fill="#FF8030" opacity="0.5"/>
    <ellipse cx="80" cy="270" rx="2" ry="4" fill="#FFD080" opacity="0.6"/>
    <ellipse cx="80" cy="268" rx="1" ry="2" fill="#FFF" opacity="0.5"/>
  </g>

  <!-- Smoke from campfire -->
  <g filter="url(#fgSoftBlur)" opacity="0.12">
    <circle cx="78" cy="252" r="6" fill="#AAA"/>
    <circle cx="75" cy="240" r="8" fill="#999"/>
    <circle cx="72" cy="225" r="10" fill="#888"/>
  </g>

  <!-- Seagull silhouettes (closer, bigger) -->
  <g opacity="0.35">
    <path d="M450,300 Q458,290 466,300 Q474,290 482,300" stroke="#2A1A10" stroke-width="1.5" fill="none"/>
    <path d="M500,320 Q506,312 512,320 Q518,312 524,320" stroke="#2A1A10" stroke-width="1.2" fill="none"/>
    <path d="M430,330 Q434,325 438,330" stroke="#2A1A10" stroke-width="1" fill="none"/>
  </g>
</svg>