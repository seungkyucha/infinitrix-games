<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="puCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#44FFFF"/>
      <stop offset="40%" stop-color="#44DDFF"/>
      <stop offset="100%" stop-color="#2288CC"/>
    </radialGradient>
    <radialGradient id="puGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#44DDFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#44DDFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#44DDFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="puShell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0A030"/>
      <stop offset="50%" stop-color="#D4860A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <radialGradient id="puInnerGlow" cx="0.5" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44DDFF" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="puRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44DDFF" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="puGlowF">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puGlowF2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#006688" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer energy aura -->
  <circle cx="32" cy="32" r="30" fill="url(#puGlow)"/>
  <circle cx="32" cy="32" r="26" fill="url(#puGlow)" opacity="0.3"/>

  <!-- Orbiting energy ring -->
  <g id="puOrbitRing">
    <ellipse cx="32" cy="32" rx="24" ry="8" fill="none" stroke="url(#puRing)" stroke-width="1.5" opacity="0.5" transform="rotate(-25, 32, 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="6" fill="none" stroke="#44DDFF" stroke-width="0.5" opacity="0.3" transform="rotate(15, 32, 32)"/>
    <!-- Orbit particles -->
    <circle cx="10" cy="28" r="2" fill="#44DDFF" opacity="0.6" filter="url(#puGlowF2)"/>
    <circle cx="54" cy="36" r="1.5" fill="#44DDFF" opacity="0.5" filter="url(#puGlowF2)"/>
    <circle cx="20" cy="40" r="1" fill="#F0A030" opacity="0.5"/>
    <circle cx="46" cy="24" r="1.2" fill="#F0A030" opacity="0.4"/>
  </g>

  <!-- Hexagon frame -->
  <g filter="url(#puShadow)">
    <path d="M32,10 L50,20 L50,44 L32,54 L14,44 L14,20Z" fill="none" stroke="url(#puShell)" stroke-width="2" opacity="0.7"/>
    <path d="M32,12 L48,21 L48,43 L32,52 L16,43 L16,21Z" fill="none" stroke="#F0A030" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Crystal/gem core -->
  <g filter="url(#puGlowF)">
    <path d="M32,16 L44,24 L44,40 L32,48 L20,40 L20,24Z" fill="url(#puCore)" opacity="0.85"/>
    <!-- Crystal facets -->
    <path d="M32,16 L44,24 L32,28Z" fill="#88EEFF" opacity="0.4"/>
    <path d="M32,16 L20,24 L32,28Z" fill="#66CCDD" opacity="0.3"/>
    <path d="M32,48 L44,40 L32,36Z" fill="#2288AA" opacity="0.3"/>
    <path d="M32,48 L20,40 L32,36Z" fill="#1A6688" opacity="0.4"/>
  </g>

  <!-- Inner white glow -->
  <ellipse cx="32" cy="28" rx="8" ry="6" fill="url(#puInnerGlow)" opacity="0.7"/>

  <!-- Anchor symbol inside -->
  <g transform="translate(32, 32)" opacity="0.8">
    <path d="M0,-8 L0,6 M-5,6 Q0,11 5,6 M-4,-4 Q0,-2 4,-4" stroke="#FFF" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <circle cx="0" cy="-9" r="2" fill="#FFF" opacity="0.6"/>
  </g>

  <!-- Energy wisps -->
  <g opacity="0.4">
    <path d="M8,18 Q12,14 16,18 Q14,16 10,18" stroke="#44DDFF" stroke-width="0.8" fill="none"/>
    <path d="M48,44 Q52,40 56,44 Q54,42 50,44" stroke="#44DDFF" stroke-width="0.8" fill="none"/>
    <path d="M6,36 Q10,32 14,36" stroke="#44DDFF" stroke-width="0.6" fill="none"/>
    <path d="M50,28 Q54,24 58,28" stroke="#44DDFF" stroke-width="0.6" fill="none"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="8" cy="8" r="1" fill="#F0A030" opacity="0.4"/>
  <circle cx="56" cy="8" r="1" fill="#F0A030" opacity="0.3"/>
  <circle cx="8" cy="56" r="0.8" fill="#F0A030" opacity="0.3"/>
  <circle cx="56" cy="56" r="1" fill="#F0A030" opacity="0.4"/>

  <!-- Sound wave arcs -->
  <path d="M6,32 Q4,28 6,24" stroke="#44DDFF" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M58,32 Q60,28 58,24" stroke="#44DDFF" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Sparkle cross -->
  <g filter="url(#puGlowF2)">
    <path d="M32,4 L33,8 L32,7 L31,8Z" fill="#FFF" opacity="0.5"/>
    <path d="M32,56 L31,52 L32,53 L33,52Z" fill="#FFF" opacity="0.4"/>
    <path d="M4,32 L8,31 L7,32 L8,33Z" fill="#FFF" opacity="0.4"/>
    <path d="M60,32 L56,33 L57,32 L56,31Z" fill="#FFF" opacity="0.4"/>
  </g>

  <!-- Rune text decoration -->
  <text x="32" y="60" text-anchor="middle" font-size="4" fill="#44DDFF" opacity="0.2" font-family="serif">⚓</text>
  <text x="32" y="8" text-anchor="middle" font-size="3" fill="#F0A030" opacity="0.2" font-family="serif">✦</text>
</svg>