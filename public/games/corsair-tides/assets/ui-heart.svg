<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="heartMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5566"/>
      <stop offset="40%" stop-color="#E83344"/>
      <stop offset="100%" stop-color="#AA1122"/>
    </linearGradient>
    <linearGradient id="heartShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="heartGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FF5566" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF5566" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="anchorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0A030"/>
      <stop offset="100%" stop-color="#C88020"/>
    </linearGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hShadow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#8B0000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="offset" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="innerShadow"/>
      <feFlood flood-color="#8B0000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="innerShadow" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="shadow"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="24" cy="26" rx="18" ry="16" fill="url(#heartGlow)"/>

  <!-- Heart body -->
  <g filter="url(#hShadow)">
    <path d="M24,40 C8,30 2,18 12,10 C18,6 24,10 24,16 C24,10 30,6 36,10 C46,18 40,30 24,40Z" fill="url(#heartMain)" filter="url(#innerShadow)"/>
  </g>

  <!-- 3D highlight -->
  <path d="M14,14 C16,10 22,10 24,16 C24,12 18,8 14,14Z" fill="url(#heartShine)" opacity="0.7"/>
  <ellipse cx="16" cy="16" rx="4" ry="3" fill="#FFF" opacity="0.3" transform="rotate(-20, 16, 16)"/>

  <!-- Anchor emblem (pirate theme) -->
  <g transform="translate(24, 24)" filter="url(#hGlow)">
    <path d="M0,-6 L0,4 M-4,4 Q0,8 4,4 M-3,-3 Q0,-1 3,-3" stroke="url(#anchorGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="-7" r="1.5" fill="#F0A030" opacity="0.8"/>
  </g>

  <!-- Rim light -->
  <path d="M24,40 C40,30 46,18 36,10 C34,8 32,8 30,9" stroke="#FF8899" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Small sparkles -->
  <circle cx="10" cy="12" r="0.8" fill="#FFF" opacity="0.6"/>
  <circle cx="38" cy="14" r="0.5" fill="#FFF" opacity="0.4"/>
  <path d="M8,20 L9,18 L10,20 L9,22Z" fill="#FFF" opacity="0.3"/>
  <path d="M36,22 L37,20 L38,22 L37,24Z" fill="#FFF" opacity="0.25"/>

  <!-- Cross-hatch texture -->
  <g opacity="0.06">
    <line x1="14" y1="18" x2="34" y2="18" stroke="#000"/>
    <line x1="12" y1="24" x2="36" y2="24" stroke="#000"/>
    <line x1="14" y1="30" x2="34" y2="30" stroke="#000"/>
    <line x1="18" y1="14" x2="18" y2="36" stroke="#000"/>
    <line x1="24" y1="12" x2="24" y2="38" stroke="#000"/>
    <line x1="30" y1="14" x2="30" y2="36" stroke="#000"/>
  </g>

  <!-- Decorative rope border hint -->
  <path d="M24,40 C8,30 2,18 12,10" stroke="#F0A030" stroke-width="0.4" fill="none" opacity="0.3" stroke-dasharray="2,2"/>
  <path d="M36,10 C46,18 40,30 24,40" stroke="#F0A030" stroke-width="0.4" fill="none" opacity="0.3" stroke-dasharray="2,2"/>
</svg>