// Seeded random number generator [F18]
class SeededRNG {
  constructor(seed) { this.s = seed || 12345; }
  next() {
    this.s = (this.s * 16807 + 0) % 2147483647;
    return (this.s - 1) / 2147483646;
  }
  // Range [min, max]
  range(min, max) { return min + this.next() * (max - min); }
  // Integer range [min, max)
  int(min, max) { return Math.floor(this.range(min, max)); }
  // Pick random element
  pick(arr) { return arr[this.int(0, arr.length)]; }
  // Weighted pick
  weighted(arr, weights) {
    const sum = weights.reduce((a,b)=>a+b,0);
    let r = this.next() * sum;
    for (let i = 0; i < arr.length; i++) {
      r -= weights[i];
      if (r <= 0) return arr[i];
    }
    return arr[arr.length-1];
  }
}

// TweenManager with clearImmediate [F4, F13]
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; }
  // Add a new tween
  add(opts) {
    const t = {
      target: opts.target,
      props: {},
      duration: opts.duration || 0.5,
      elapsed: 0,
      ease: opts.ease || 'easeInOut',
      onComplete: opts.onComplete || null,
      onUpdate: opts.onUpdate || null,
      dead: false
    };
    for (const k in opts.props) {
      t.props[k] = { from: opts.target[k] || 0, to: opts.props[k] };
    }
    this._toAdd.push(t);
    return t;
  }
  // Delay helper — tween-based delay
  delay(dur, cb) {
    const dummy = { _v: 0 };
    return this.add({ target: dummy, props: { _v: 1 }, duration: dur, onComplete: cb });
  }
  // Clear all immediately [F13]
  clearImmediate() {
    this._tweens.length = 0;
    this._toAdd.length = 0;
  }
  // Easing functions
  _ease(type, t) {
    if (type === 'linear') return t;
    if (type === 'easeIn') return t * t;
    if (type === 'easeOut') return t * (2 - t);
    // easeInOut
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }
  // Update all tweens
  update(dt) {
    // Flush pending adds
    if (this._toAdd.length) {
      this._tweens.push(...this._toAdd);
      this._toAdd.length = 0;
    }
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.dead) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      const p = Math.min(tw.elapsed / tw.duration, 1);
      const ep = this._ease(tw.ease, p);
      for (const k in tw.props) {
        const pr = tw.props[k];
        tw.target[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (tw.onUpdate) tw.onUpdate(ep);
      if (p >= 1) {
        tw.dead = true;
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
  }
  // Check if any tweens active
  get active() { return this._tweens.length > 0 || this._toAdd.length > 0; }
}

// Web Audio SoundManager [F19]
class SoundManager {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.sfxGain = null;
    this.bgmGain = null;
    this.bgmNode = null;
    this.sfxVol = 0.7;
    this.bgmVol = 0.5;
    this._inited = false;
  }
  // Init audio context on user gesture
  init() {
    if (this._inited) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = this.sfxVol;
      this.sfxGain.connect(this.master);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = this.bgmVol;
      this.bgmGain.connect(this.master);
      this._inited = true;
    } catch(e) { /* no audio */ }
  }
  // Set volumes
  setSfxVol(v) { this.sfxVol = v; if (this.sfxGain) this.sfxGain.gain.value = v; }
  setBgmVol(v) { this.bgmVol = v; if (this.bgmGain) this.bgmGain.gain.value = v; }
  // Play procedural SFX
  playSfx(type) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const g = this.ctx.createGain();
    g.connect(this.sfxGain);
    switch(type) {
      case 'cannon_fire': {
        // Noise burst + low freq
        const o = this.ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = 80;
        o.frequency.exponentialRampToValueAtTime(30, t + 0.3);
        o.connect(g); g.gain.setValueAtTime(0.5, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        o.start(t); o.stop(t + 0.4);
        break;
      }
      case 'cannon_hit': {
        const o = this.ctx.createOscillator();
        o.type = 'sine'; o.frequency.value = 200;
        o.frequency.exponentialRampToValueAtTime(50, t + 0.2);
        o.connect(g); g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        o.start(t); o.stop(t + 0.3);
        break;
      }
      case 'explosion': {
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.5, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (this._pnoise() * 2 - 1) * (1 - i / d.length);
        const src = this.ctx.createBufferSource();
        src.buffer = buf; src.connect(g);
        g.gain.setValueAtTime(0.6, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        src.start(t);
        break;
      }
      case 'wave_splash': {
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.3, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (this._pnoise() * 2 - 1) * 0.3;
        const src = this.ctx.createBufferSource();
        const flt = this.ctx.createBiquadFilter();
        flt.type = 'lowpass'; flt.frequency.value = 800;
        src.buffer = buf; src.connect(flt); flt.connect(g);
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        src.start(t);
        break;
      }
      case 'coin_collect': {
        const o = this.ctx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(600, t);
        o.frequency.exponentialRampToValueAtTime(1200, t + 0.15);
        o.connect(g); g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        o.start(t); o.stop(t + 0.2);
        break;
      }
      case 'build_complete': {
        [400,500,600,800].forEach((f, i) => {
          const o2 = this.ctx.createOscillator();
          o2.type = 'sine'; o2.frequency.value = f;
          const g2 = this.ctx.createGain(); g2.connect(this.sfxGain);
          g2.gain.setValueAtTime(0, t + i*0.08);
          g2.gain.linearRampToValueAtTime(0.25, t + i*0.08+0.03);
          g2.gain.exponentialRampToValueAtTime(0.01, t + i*0.08+0.15);
          o2.connect(g2); o2.start(t + i*0.08); o2.stop(t + i*0.08+0.2);
        });
        break;
      }
      case 'boarding_clash': {
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.15, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (this._pnoise() * 2 - 1) * 0.8;
        const src = this.ctx.createBufferSource();
        src.buffer = buf; src.connect(g);
        g.gain.setValueAtTime(0.5, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        src.start(t);
        break;
      }
      case 'boss_roar': {
        const o = this.ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = 50;
        const lfo = this.ctx.createOscillator();
        lfo.frequency.value = 8;
        const lfoG = this.ctx.createGain(); lfoG.gain.value = 15;
        lfo.connect(lfoG); lfoG.connect(o.frequency);
        o.connect(g); g.gain.setValueAtTime(0.5, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 1.0);
        lfo.start(t); o.start(t); o.stop(t + 1.0); lfo.stop(t + 1.0);
        break;
      }
      case 'level_up': {
        [523,659,784,1047].forEach((f, i) => {
          const o2 = this.ctx.createOscillator();
          o2.type = 'sine'; o2.frequency.value = f;
          const g2 = this.ctx.createGain(); g2.connect(this.sfxGain);
          g2.gain.setValueAtTime(0.3, t + i*0.12);
          g2.gain.exponentialRampToValueAtTime(0.01, t + i*0.12+0.3);
          o2.connect(g2); o2.start(t + i*0.12); o2.stop(t + i*0.12+0.4);
        });
        break;
      }
      case 'horn_blow': {
        const o = this.ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(130, t);
        o.frequency.linearRampToValueAtTime(196, t + 0.8);
        o.connect(g); g.gain.setValueAtTime(0.4, t);
        g.gain.setValueAtTime(0.4, t + 0.6);
        g.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
        o.start(t); o.stop(t + 1.2);
        break;
      }
      case 'click': {
        const o = this.ctx.createOscillator();
        o.type = 'sine'; o.frequency.value = 800;
        o.connect(g); g.gain.setValueAtTime(0.15, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        o.start(t); o.stop(t + 0.05);
        break;
      }
    }
  }
  _pnoise() { return (this._pSeed = (this._pSeed || 1) * 16807 % 2147483647) / 2147483647; }
  // Play BGM loop
  playBgm(type) {
    if (!this.ctx) return;
    this.stopBgm();
    const bpmMap = {port:90, voyage:110, battle:140, boss:160};
    const bpm = bpmMap[type] || 100;
    const beatDur = 60 / bpm;
    const barDur = beatDur * 4;
    const loopLen = barDur * 4;
    const sr = this.ctx.sampleRate;
    const buf = this.ctx.createBuffer(2, sr * loopLen, sr);
    const L = buf.getChannelData(0);
    const R = buf.getChannelData(1);
    // Simple procedural music generation
    for (let i = 0; i < L.length; i++) {
      const t2 = i / sr;
      const beat = t2 / beatDur;
      let val = 0;
      // Bass line
      const bassFreqs = type === 'battle' ? [110,110,82,98] : type === 'boss' ? [65,73,82,65] :
                         type === 'voyage' ? [130,146,164,130] : [98,110,130,110];
      const barIdx = Math.floor(t2 / barDur) % 4;
      const bf = bassFreqs[barIdx];
      val += Math.sin(2 * Math.PI * bf * t2) * 0.15 * (1 - (t2 % beatDur) / beatDur * 0.5);
      // Melody
      if (type === 'port') {
        const melFreqs = [262,294,330,349,392,349,330,294];
        const mi = Math.floor(beat * 2) % melFreqs.length;
        val += Math.sin(2 * Math.PI * melFreqs[mi] * t2) * 0.08 * (1 - (t2 % (beatDur/2)) / (beatDur/2));
      } else if (type === 'battle' || type === 'boss') {
        // Percussive hits on beats
        const beatPhase = t2 % beatDur;
        if (beatPhase < 0.05) val += (this._pnoise() * 2 - 1) * 0.2 * (1 - beatPhase / 0.05);
        if (Math.floor(beat) % 2 === 1 && beatPhase < 0.03) {
          val += (this._pnoise() * 2 - 1) * 0.15;
        }
      }
      // Subtle pad
      val += Math.sin(2 * Math.PI * bf * 2 * t2) * 0.04;
      L[i] = val;
      R[i] = val * 0.9 + Math.sin(2 * Math.PI * bf * 1.5 * t2) * 0.03;
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.connect(this.bgmGain); src.start(0);
    this.bgmNode = src;
  }
  stopBgm() {
    if (this.bgmNode) {
      try { this.bgmNode.stop(); } catch(e){}
      this.bgmNode = null;
    }
  }
}

// Save/Load localStorage
function saveGame() {
  try {
    const data = {
      version: G.saveVersion,
      gold: G.gold, fame: G.fame,
      totalScore: G.totalScore, bestScore: G.bestScore,
      buildings: {...G.buildings},
      unlockedShips: [...G.unlockedShips],
      crewSkills: {...G.crewSkills},
      bossDefeated: [...G.bossDefeated],
      treasureMap: [...G.treasureMap],
      legendIsland: G.legendIsland,
      stats: {...G.stats},
      lang: G.lang,
      sfxVol: G.sfx ? G.sfx.sfxVol : 0.7,
      bgmVol: G.sfx ? G.sfx.bgmVol : 0.5
    };
    localStorage.setItem('corsair-tides-save', JSON.stringify(data));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('corsair-tides-save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.version !== G.saveVersion) return false;
    G.gold = data.gold || 300;
    G.fame = data.fame || 0;
    G.totalScore = data.totalScore || 0;
    G.bestScore = data.bestScore || 0;
    G.buildings = data.buildings || G.buildings;
    G.unlockedShips = data.unlockedShips || G.unlockedShips;
    G.crewSkills = data.crewSkills || G.crewSkills;
    G.bossDefeated = data.bossDefeated || G.bossDefeated;
    G.treasureMap = data.treasureMap || G.treasureMap;
    G.legendIsland = data.legendIsland || false;
    G.stats = data.stats || G.stats;
    G.lang = data.lang || 'ko';
    if (data.sfxVol !== undefined && G.sfx) G.sfx.setSfxVol(data.sfxVol);
    if (data.bgmVol !== undefined && G.sfx) G.sfx.setBgmVol(data.bgmVol);
    return true;
  } catch(e) { return false; }
}

// Load best score only
function loadBest() {
  try {
    const raw = localStorage.getItem('corsair-tides-save');
    if (!raw) return 0;
    return JSON.parse(raw).bestScore || 0;
  } catch(e) { return 0; }
}

// Enter state with transition [F6, F21]
function beginTransition(fromState, toState, duration) {
  if (duration === undefined) duration = 0.4;
  if (STATE_PRIORITY[toState] < STATE_PRIORITY[G.state] && G.state !== fromState) return;
  if (G._transitioning) return;
  G._transitioning = true;
  const proxy = { a: 1 };
  G.tw.add({
    target: proxy, props: { a: 0 }, duration: duration,
    onUpdate: () => { G._transAlpha = proxy.a; },
    onComplete: () => {
      G._transAlpha = 0;
      enterState(toState);
      const proxy2 = { a: 0 };
      G.tw.add({
        target: proxy2, props: { a: 1 }, duration: duration,
        onUpdate: () => { G._transAlpha = proxy2.a; },
        onComplete: () => { G._transAlpha = 1; G._transitioning = false; }
      });
    }
  });
}

// Direct state entry (for instant transitions)
function enterState(newState) {
  G.prevState = G.state;
  G.state = newState;
  // State entry logic
  switch(newState) {
    case 'TITLE':
      G.sfx && G.sfx.stopBgm();
      break;
    case 'PORT':
      G.phase = 'PORT';
      G.portTab = 0;
      if (G.sfx && G.sfx._inited) G.sfx.playBgm('port');
      break;
    case 'PORT_BUILD':
      G.portTab = 1; G.selectedBuilding = -1;
      break;
    case 'PORT_TRADE':
      G.portTab = 2; generateTradeGoods();
      break;
    case 'PORT_CREW':
      G.portTab = 3;
      break;
    case 'VOYAGE_PREP':
      G.phase = 'VOYAGE';
      break;
    case 'VOYAGE_MAP':
      if (G.sfx && G.sfx._inited) G.sfx.playBgm('voyage');
      break;
    case 'VOYAGE_EVENT':
      generateVoyageEvent();
      break;
    case 'BATTLE_SETUP':
      G.phase = 'BATTLE';
      initBattle();
      break;
    case 'BATTLE':
      if (G.sfx && G.sfx._inited) G.sfx.playBgm('battle');
      break;
    case 'BATTLE_BOSS':
      if (G.sfx && G.sfx._inited) G.sfx.playBgm('boss');
      G.sfx && G.sfx.playSfx('boss_roar');
      G._bossRewardGiven = false;
      break;
    case 'BOARDING':
      G.boardingPhase = 0; G.boardingTimer = 0;
      G.boardingHits = 0; G.boardingWindow = false;
      break;
    case 'BATTLE_RESULT':
      processBattleResult();
      break;
    case 'GAMEOVER':
      G.shakeTimer = 0.5; G.shakeIntensity = 8;
      // Score check [F8]: judge first, save after
      const isNewBest = G.totalScore > loadBest();
      G.bestScore = Math.max(G.totalScore, loadBest());
      G.battleResult = { newBest: isNewBest };
      saveGame();
      G.sfx && G.sfx.stopBgm();
      break;
    case 'VICTORY':
      G.bestScore = Math.max(G.totalScore, loadBest());
      G.battleResult = { newBest: G.totalScore > loadBest() };
      saveGame();
      G.sfx && G.sfx.playSfx('level_up');
      break;
    case 'CUTSCENE':
      G.cutsceneTimer = 0; G.cutsceneIdx = 0;
      break;
    case 'PAUSED':
      break;
    case 'SETTINGS':
      G.settingsTab = 0;
      break;
  }
}

// Generate trade goods with prices influenced by sea region
function generateTradeGoods() {
  G.tradeGoods = CONFIG.TRADE_GOODS.map((g, i) => {
    const priceVar = G.rng.range(0.7, 1.3);
    const seaBonus = (i === G.currentSea % 6) ? 0.6 : 1.0;
    return {
      nameKo: g[0], nameEn: g[1],
      buyPrice: Math.round(g[2] * priceVar * seaBonus),
      sellPrice: Math.round(g[2] * priceVar * (i === (G.currentSea + 3) % 6 ? 1.8 : 1.1)),
      qty: 0, stock: G.rng.int(3, 10)
    };
  });
}

// Build/upgrade facility
function buildFacility(type) {
  const lv = G.buildings[type];
  if (lv >= 5) return false;
  const cost = CONFIG.BUILD_COSTS[type][lv];
  if (G.gold < cost) return false;
  G.gold -= cost;
  G.buildings[type]++;
  G.totalScore += (lv + 1) * 100;
  addPopup(W/2, H/2, '+' + ((lv+1)*100), COL.uiGold);
  G.sfx && G.sfx.playSfx('build_complete');
  // Unlock ship check
  checkShipUnlocks();
  saveGame();
  return true;
}

// Check if new ships should be unlocked based on dock level + boss defeats
function checkShipUnlocks() {
  const dl = G.buildings.dock;
  // Sloop always unlocked; Catboat at dock lv1+gold
  if (dl >= 1 && !G.unlockedShips[1]) G.unlockedShips[1] = true;
  // Brigantine at dock lv2 + boss 0
  if (dl >= 2 && G.bossDefeated[0] && !G.unlockedShips[2]) G.unlockedShips[2] = true;
  // Galleon at dock lv3 + boss 1
  if (dl >= 3 && G.bossDefeated[1] && !G.unlockedShips[3]) G.unlockedShips[3] = true;
  // Frigate at dock lv4 + boss 2
  if (dl >= 4 && G.bossDefeated[2] && !G.unlockedShips[4]) G.unlockedShips[4] = true;
}

// Buy trade goods
function buyTradeGood(idx) {
  const g = G.tradeGoods[idx];
  if (!g || g.stock <= 0 || G.gold < g.buyPrice) return false;
  G.gold -= g.buyPrice;
  g.qty++;
  g.stock--;
  return true;
}

// Sell trade goods
function sellTradeGood(idx) {
  const g = G.tradeGoods[idx];
  if (!g || g.qty <= 0) return false;
  const profit = g.sellPrice;
  G.gold += profit;
  g.qty--;
  const scoreGain = Math.round(profit * CONFIG.SCORE_TRADE_RATIO);
  G.totalScore += scoreGain;
  G.fame += Math.round(profit / 10);
  G.stats.tradesCompleted++;
  addPopup(W/2, H/2, '+' + profit + ' ' + t('gold'), COL.portGold);
  G.sfx && G.sfx.playSfx('coin_collect');
  return true;
}

// Hire crew (upgrade skill)
function hireCrew(skill) {
  const lv = G.crewSkills[skill];
  if (lv >= 5) return false;
  const cost = (lv + 1) * 80;
  if (G.gold < cost) return false;
  G.gold -= cost;
  G.crewSkills[skill]++;
  saveGame();
  return true;
}

// Idle income from lighthouse/market
function updateIdleProduction(dt) {
  G.idleTimer += dt;
  if (G.idleTimer >= 5) { // Every 5 seconds
    G.idleTimer = 0;
    const lhLv = G.buildings.lighthouse;
    const mkLv = G.buildings.market;
    if (lhLv >= 3 && mkLv >= 1) {
      const income = lhLv * mkLv * 2;
      G.gold += income;
      if (income > 0) addPopup(W * 0.8, 30, '+' + income, COL.portGold);
    }
  }
}

// Update economy (passive effects)
function updateEconomy(dt) {
  updateIdleProduction(dt);
}

// Generate voyage route for current sea
function generateVoyageRoute() {
  const numNodes = 3 + G.currentSea;
  G.voyageRoute = [];
  for (let i = 0; i < numNodes; i++) {
    G.voyageRoute.push({
      x: 80 + (W - 160) * (i / (numNodes - 1)),
      y: H * 0.4 + G.rng.range(-60, 60),
      type: i === numNodes - 1 ? 'boss' : (G.rng.next() < 0.3 ? 'event' : 'battle'),
      visited: false,
      name: i === numNodes - 1 ? t('boss') : (i === 0 ? t('port') : 'Island ' + (i+1))
    });
  }
  G.voyagePos = 0;
  G.voyageRoute[0].visited = true;
}

// Generate a random voyage event
function generateVoyageEvent() {
  const events = [
    {type:'merchant', weight:15, ko:'표류 상인을 발견!', en:'Drifting merchant found!'},
    {type:'pirates', weight:20, ko:'해적 습격!', en:'Pirate raid!'},
    {type:'storm', weight:15, ko:'폭풍 접근!', en:'Storm approaching!'},
    {type:'creature', weight:10, ko:'해양 생물 출현!', en:'Sea creature spotted!'},
    {type:'treasure', weight:10, ko:'보물 섬 발견!', en:'Treasure island found!'},
    {type:'survivor', weight:10, ko:'조난 선원 발견!', en:'Stranded sailor found!'},
    {type:'fogBank', weight:10, ko:'안개 지대 진입!', en:'Entering fog bank!'},
    {type:'ally', weight:10, ko:'우호 함대 조우!', en:'Friendly fleet encountered!'}
  ];
  const weights = events.map(e => e.weight);
  G.currentEvent = G.rng.weighted(events, weights);
  G.eventChoices = getEventChoices(G.currentEvent.type);

}

// Get choices for event type
function getEventChoices(type) {
  const lang = G.lang;
  switch(type) {
    case 'merchant': return [
      {label: lang === 'ko' ? '교역하기 (-30 금)' : 'Trade (-30 gold)', action: () => {
        if (G.gold >= 30) { G.gold -= 30; G.supplies += 50; addPopup(W/2,H/2,'+50 '+t('supplies'),COL.accentCyan); }
      }},
      {label: lang === 'ko' ? '무시' : 'Ignore', action: () => {}}
    ];
    case 'pirates': return [
      {label: lang === 'ko' ? '전투!' : 'Fight!', action: () => { beginTransition(G.state, 'BATTLE_SETUP'); }},
      {label: lang === 'ko' ? '협상 (-50 금)' : 'Negotiate (-50 gold)', action: () => {
        if (G.gold >= 50) { G.gold -= 50; } else { beginTransition(G.state, 'BATTLE_SETUP'); }
      }},
      {label: lang === 'ko' ? '도주 (50%)' : 'Flee (50%)', action: () => {
        if (G.rng.next() < 0.5) { addPopup(W/2,H/2, lang==='ko'?'도주 성공!':'Escaped!',COL.accentCyan); }
        else { beginTransition(G.state, 'BATTLE_SETUP'); }
      }}
    ];
    case 'storm': return [
      {label: lang === 'ko' ? '돌파 (선박 피해)' : 'Push through (hull dmg)', action: () => {
        G.ships.forEach(s => { s.hp = Math.max(1, s.hp - Math.round(s.maxHp * 0.2)); });
        G.weather = 'storm';
      }},
      {label: lang === 'ko' ? '우회 (시간+2)' : 'Detour (time+2)', action: () => { G.supplies -= 20; }}
    ];
    case 'creature': return [
      {label: lang === 'ko' ? '전투!' : 'Fight!', action: () => { beginTransition(G.state, 'BATTLE_SETUP'); }},
      {label: lang === 'ko' ? '관찰 (+정보)' : 'Observe (+info)', action: () => {
        G.fame += 30; G.totalScore += 50;
        addPopup(W/2,H/2,'+30 '+t('fame'),COL.uiGold);
      }}
    ];
    case 'treasure': return [
      {label: lang === 'ko' ? '탐색!' : 'Explore!', action: () => {
        if (G.rng.next() < 0.3) {
          G.ships.forEach(s => { s.hp = Math.max(1, s.hp - 30); });
          addPopup(W/2,H/2,lang==='ko'?'함정!':'Trap!',COL.accentRed);
        } else {
          G.gold += 100; G.totalScore += 200;
          // Try to give treasure map piece
          const emptyIdx = G.treasureMap.indexOf(false);
          if (emptyIdx >= 0 && G.rng.next() < 0.4) {
            G.treasureMap[emptyIdx] = true;
            G.totalScore += CONFIG.SCORE_MAP_PIECE;
            addPopup(W/2,H/2-30,t('treasureMap')+'!',COL.uiGold);
          }
          addPopup(W/2,H/2,'+100 '+t('gold'),COL.portGold);
        }
      }},
      {label: lang === 'ko' ? '무시' : 'Ignore', action: () => {}}
    ];
    case 'survivor': return [
      {label: lang === 'ko' ? '구조 (+선원)' : 'Rescue (+crew)', action: () => {
        const skills = Object.keys(G.crewSkills);
        const sk = G.rng.pick(skills);
        if (G.crewSkills[sk] < 5) G.crewSkills[sk]++;
        addPopup(W/2,H/2,'+1 '+sk,COL.accentCyan);
      }},
      {label: lang === 'ko' ? '무시' : 'Ignore', action: () => {}}
    ];
    case 'fogBank': return [
      {label: lang === 'ko' ? '전진' : 'Proceed', action: () => { G.weather = 'fog'; }},
      {label: lang === 'ko' ? '우회' : 'Detour', action: () => { G.supplies -= 15; }}
    ];
    case 'ally': return [
      {label: lang === 'ko' ? '교역' : 'Trade', action: () => {
        if (G.gold >= 20) { G.gold -= 20; G.supplies += 40; }
      }},
      {label: lang === 'ko' ? '동행 요청' : 'Request escort', action: () => {
        G.runBuffs.push({type:'ally', duration:1});
        addPopup(W/2,H/2,lang==='ko'?'동맹 획득!':'Allied!',COL.accentCyan);
      }}
    ];
    default: return [{label:'OK', action:()=>{}}];
  }
}

// Initialize battle encounter
function initBattle() {
  const sea = G.currentSea;
  const es = CONFIG.SEA_ENEMIES[sea];
  const count = G.rng.int(es[4], es[5] + 1);
  G.enemies = [];
  for (let i = 0; i < count; i++) {
    const hp = G.rng.int(es[0], es[1]);
    G.enemies.push({
      x: W * 0.6 + G.rng.range(0, W * 0.25),
      y: H * 0.2 + G.rng.range(0, H * 0.5),
      hp: Math.round(hp * (1 + G.ddaModifier)),
      maxHp: Math.round(hp * (1 + G.ddaModifier)),
      atk: G.rng.int(es[2], es[3]),
      speed: G.rng.range(20, 50),
      fireTimer: G.rng.range(1, 3),
      type: G.rng.int(0, Math.min(sea + 1, 3))
    });
  }
  // Position player ships
  G.ships.forEach((s, i) => {
    s.x = W * 0.15;
    s.y = H * 0.3 + i * 80;
    s.hp = s.maxHp;
    s.selected = i === 0;
    s.cooldowns = [0,0,0,0];
    s.fireTimer = 0;
  });
  G.selectedShipIdx = 0;
  G.cannonType = 0;
  G.camX = 0; G.camY = 0;
}

// Initialize boss battle
function initBossBattle() {
  const sea = G.currentSea;
  const bossData = CONFIG.BOSSES[sea];
  G.boss = {
    x: W * 0.7, y: H * 0.4,
    hp: bossData.hp * (1 + G.ddaModifier),
    maxHp: bossData.hp * (1 + G.ddaModifier),
    phases: bossData.phases,
    atk: CONFIG.SEA_ENEMIES[sea][3] * 1.5,
    speed: 30,
    fireTimer: 2,
    phase: 0,
    thresholds: [],
    animTimer: 0,
    tentacles: [],
    shieldActive: false
  };
  // Set phase HP thresholds
  for (let p = 1; p <= bossData.phases; p++) {
    G.boss.thresholds.push(1 - p / bossData.phases);
  }
  // Boss-specific setup
  if (sea === 1) { // Kraken tentacles
    for (let i = 0; i < 3; i++) {
      G.boss.tentacles.push({
        x: G.boss.x + G.rng.range(-100, 100),
        y: G.boss.y + G.rng.range(-80, 80),
        hp: 80, maxHp: 80, alive: true
      });
    }
  }
  G.bossPhase = 0;
  G.bossPhaseTransitioning = false;
  G._bossRewardGiven = false;
  // Position player ships
  G.ships.forEach((s, i) => {
    s.x = W * 0.15; s.y = H * 0.3 + i * 80;
    s.hp = s.maxHp; s.selected = i === 0;
    s.cooldowns = [0,0,0,0];
  });
}

// Fire cannon from selected ship
function fireCannon(targetX, targetY) {
  const ship = G.ships[G.selectedShipIdx];
  if (!ship || ship.hp <= 0) return;
  const ct = G.cannonType;
  if (ship.cooldowns[ct] > 0) return;
  // Set cooldown
  ship.cooldowns[ct] = CONFIG.CANNON_COOLDOWN[ct];
  // Calculate damage
  const baseDmg = CONFIG.CANNON_DMG[ct];
  const formBonus = CONFIG.FORMATION[G.formation][0];
  const crewBonus = 1 + G.crewSkills.gun * 0.1;
  const weatherMod = CONFIG.WEATHER[G.weather][2];
  let dmg = Math.round(baseDmg * formBonus * crewBonus * weatherMod);
  // DPS cap check [F24]
  const maxDmg = Math.round(baseDmg * CONFIG.DPS_CAP);
  dmg = Math.min(dmg, maxDmg);
  // Create projectile particle
  addParticle(ship.x + 30, ship.y, targetX, targetY, 'cannonball', dmg);
  G.sfx && G.sfx.playSfx('cannon_fire');
}

// Process cannonball hit
function processHit(particle) {
  const dmg = particle.data;
  const px = particle.x, py = particle.y;
  // Check boss hit
  if (G.boss && !G.boss.shieldActive) {
    if (dist(px, py, G.boss.x, G.boss.y) < 60) {
      G.boss.hp -= dmg;
      addPopup(G.boss.x, G.boss.y - 40, '-' + dmg, COL.accentRed);
      spawnHitEffect(G.boss.x, G.boss.y);
      G.sfx && G.sfx.playSfx('cannon_hit');
      checkBossPhase();
      return;
    }
    // Check tentacles
    for (const tent of G.boss.tentacles) {
      if (tent.alive && dist(px, py, tent.x, tent.y) < 30) {
        tent.hp -= dmg;
        if (tent.hp <= 0) tent.alive = false;
        addPopup(tent.x, tent.y - 20, '-' + dmg, COL.accentRed);
        spawnHitEffect(tent.x, tent.y);
        G.sfx && G.sfx.playSfx('cannon_hit');
        return;
      }
    }
  }
  // Check enemy ships
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    if (dist(px, py, e.x, e.y) < 40) {
      e.hp -= dmg;
      addPopup(e.x, e.y - 30, '-' + dmg, COL.accentRed);
      spawnHitEffect(e.x, e.y);
      G.sfx && G.sfx.playSfx('cannon_hit');
      if (e.hp <= 0) {
        const score = Math.round(e.maxHp * 0.5);
        G.totalScore += score;
        G.fame += Math.round(score / 10);
        addPopup(e.x, e.y - 50, '+' + score, COL.uiGold);
        G.sfx && G.sfx.playSfx('explosion');
        spawnExplosion(e.x, e.y);
        G.enemies.splice(i, 1);
      }
      return;
    }
  }
}

// Check boss phase transitions [F17, F5]
function checkBossPhase() {
  if (!G.boss || G.bossPhaseTransitioning) return;
  // Boss defeated
  if (G.boss.hp <= 0 && !G._bossRewardGiven) {
    G._bossRewardGiven = true;
    const score = CONFIG.SCORE_BOSS[G.currentSea];
    G.totalScore += score;
    G.fame += score;
    G.bossDefeated[G.currentSea] = true;
    addPopup(W/2, H/3, '+' + score, COL.uiGold);
    checkShipUnlocks();
    saveGame();
    G.tw.delay(1.5, () => { beginTransition(G.state, 'BATTLE_RESULT'); });
    return;
  }
  // Phase transition
  const hpRatio = G.boss.hp / G.boss.maxHp;
  const nextThreshold = G.boss.thresholds[G.bossPhase];
  if (nextThreshold !== undefined && hpRatio <= nextThreshold) {
    G.bossPhaseTransitioning = true;
    G.sfx && G.sfx.playSfx('boss_roar');
    G.shakeTimer = 0.5; G.shakeIntensity = 6;
    G.tw.delay(1.0, () => {
      G.bossPhase++;
      G.bossPhaseTransitioning = false;
      // Reset boss fire timer on phase change [Cycle 24-26 lesson]
      G.boss.fireTimer = 2;
      // Phase-specific changes
      if (G.currentSea === 1 && G.bossPhase === 1) {
        // Kraken phase 2: add more tentacles
        for (let i = 0; i < 2; i++) {
          G.boss.tentacles.push({
            x: G.boss.x + G.rng.range(-120, 120),
            y: G.boss.y + G.rng.range(-100, 100),
            hp: 100, maxHp: 100, alive: true
          });
        }
      }
      // Re-check in case HP dropped past multiple thresholds [Cycle 29]
      checkBossPhase();
    });
  }
}

// Update enemy AI
function updateEnemyAI(dt) {
  const weatherSpd = CONFIG.WEATHER[G.weather][1];
  // Normal enemies
  G.enemies.forEach(e => {
    // Move toward nearest player ship
    const target = findNearestShip(e.x, e.y);
    if (target) {
      const dx = target.x - e.x, dy = target.y - e.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > 80) {
        e.x += (dx/d) * e.speed * weatherSpd * dt;
        e.y += (dy/d) * e.speed * weatherSpd * dt;
      }
      // Fire at player
      e.fireTimer -= dt;
      if (e.fireTimer <= 0 && d < 300) {
        e.fireTimer = 2 + G.rng.range(0, 1);
        const dmg = Math.round(e.atk * CONFIG.WEATHER[G.weather][2]);
        target.hp -= dmg;
        addPopup(target.x, target.y - 20, '-' + dmg, COL.accentRed);
        spawnHitEffect(target.x, target.y);
        G.sfx && G.sfx.playSfx('cannon_hit');
        if (target.hp <= 0) checkPlayerShipLoss(target);
      }
    }
  });
  // Boss AI
  if (G.boss && G.boss.hp > 0 && !G.bossPhaseTransitioning) {
    G.boss.animTimer += dt;
    G.boss.fireTimer -= dt;
    if (G.boss.fireTimer <= 0) {
      G.boss.fireTimer = Math.max(0.8, 2 - G.bossPhase * 0.3);
      const target = findNearestShip(G.boss.x, G.boss.y);
      if (target) {
        const dmg = Math.round(G.boss.atk * (1 + G.bossPhase * 0.2));
        target.hp -= dmg;
        addPopup(target.x, target.y - 20, '-' + dmg, COL.accentRed);
        spawnHitEffect(target.x, target.y);
        G.shakeTimer = 0.15; G.shakeIntensity = 3;
        if (target.hp <= 0) checkPlayerShipLoss(target);
      }
    }
  }
  // Check battle end
  if (G.enemies.length === 0 && !G.boss) {
    beginTransition(G.state, 'BATTLE_RESULT');
  }
}

// Find nearest alive player ship
function findNearestShip(ex, ey) {
  let best = null, bestD = Infinity;
  G.ships.forEach(s => {
    if (s.hp <= 0) return;
    const d = dist(ex, ey, s.x, s.y);
    if (d < bestD) { bestD = d; best = s; }
  });
  return best;
}

// Check if player lost a ship (and game over if flagship sinks)
function checkPlayerShipLoss(ship) {
  ship.hp = 0;
  spawnExplosion(ship.x, ship.y);
  G.sfx && G.sfx.playSfx('explosion');
  // If all ships sunk
  if (G.ships.every(s => s.hp <= 0)) {
    G.consecutiveLosses++;
    // DDA adjustment [F27]
    if (G.consecutiveLosses >= 5) G.ddaModifier = CONFIG.DDA_5LOSS;
    else if (G.consecutiveLosses >= 3) G.ddaModifier = CONFIG.DDA_3LOSS;
    G.supplies = Math.round(G.supplies * 0.5);
    G.stats.battlesLost++;
    if (G.gold <= 0) {
      beginTransition(G.state, 'GAMEOVER');
    } else {
      // Return to port with losses
      G.battleResult = { won: false };
      beginTransition(G.state, 'BATTLE_RESULT');
    }
  }
}

// Process battle result
function processBattleResult() {
  if (!G.battleResult) G.battleResult = { won: true };
  if (G.battleResult.won !== false) {
    G.battleResult.won = true;
    G.consecutiveLosses = 0;
    G.ddaModifier = 0;
    G.stats.battlesWon++;
    // Loot
    const loot = 30 + G.currentSea * 20 + G.rng.int(0, 50);
    G.gold += loot;
    G.battleResult.loot = loot;
    addPopup(W/2, H/2, '+' + loot + ' ' + t('gold'), COL.portGold);
    G.sfx && G.sfx.playSfx('coin_collect');
  }
}

// Update physics (ship movement, projectiles)
function updatePhysics(dt) {
  // Update wind effect on ships
  const windRad = G.wind.dir * Math.PI / 4;
  const windX = Math.cos(windRad) * G.wind.force * 10;
  const windY = Math.sin(windRad) * G.wind.force * 10;
  G.ships.forEach(s => {
    if (s.hp <= 0) return;
    s.x += windX * dt * 0.3;
    s.y += windY * dt * 0.3;
    // Clamp to screen
    s.x = Math.max(20, Math.min(W - 20, s.x));
    s.y = Math.max(40, Math.min(H - 60, s.y));
    // Update cooldowns
    for (let i = 0; i < 4; i++) {
      if (s.cooldowns[i] > 0) s.cooldowns[i] -= dt;
    }
  });
}

// Update weather
function updateWeather(dt) {
  G.timeOfDay += dt * 0.01;
  if (G.timeOfDay > 4) G.timeOfDay = 0;
  G.tide.level += (G.tide.rising ? 1 : -1) * dt * 0.1;
  if (G.tide.level > 1) { G.tide.level = 1; G.tide.rising = false; }
  if (G.tide.level < 0) { G.tide.level = 0; G.tide.rising = true; }
}

// ══ REGION 8: PARTICLES & EFFECTS ══

// Particle system
function addParticle(x, y, tx, ty, type, data) {
  G.particles.push({
    x, y, tx, ty, type, data,
    life: 1, maxLife: 1,
    vx: 0, vy: 0, size: 6,
    color: type === 'cannonball' ? COL.fireCannon : '#fff'
  });
}

// Spawn hit effect using effectHit sprite
function spawnHitEffect(x, y) {
  for (let i = 0; i < 6; i++) {
    const angle = G.rng.range(0, Math.PI * 2);
    const speed = G.rng.range(40, 120);
    G.particles.push({
      x, y, tx: 0, ty: 0, type: 'hit',
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5, maxLife: 0.5,
      size: G.rng.range(3, 8),
      color: G.rng.pick([COL.fireCannon, COL.fireExplosion, COL.uiGold, '#fff'])
    });
  }
}

// Spawn explosion particles
function spawnExplosion(x, y) {
  for (let i = 0; i < 15; i++) {
    const angle = G.rng.range(0, Math.PI * 2);
    const speed = G.rng.range(60, 180);
    G.particles.push({
      x, y, tx: 0, ty: 0, type: 'explosion',
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: G.rng.range(0.4, 1.0), maxLife: 1.0,
      size: G.rng.range(4, 14),
      color: G.rng.pick([COL.fireExplosion, COL.fireCannon, COL.uiGold, '#ff8800'])
    });
  }
}

// Update particles
function updateParticles(dt) {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      // Cannonball: process hit on arrival
      if (p.type === 'cannonball') processHit(p);
      G.particles.splice(i, 1);
      continue;
    }
    if (p.type === 'cannonball') {
      // Move toward target
      const dx = p.tx - p.x, dy = p.ty - p.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const speed = 600;
      if (d < speed * dt) {
        p.x = p.tx; p.y = p.ty; p.life = 0;
      } else {
        p.x += (dx/d) * speed * dt;
        p.y += (dy/d) * speed * dt;
      }
    } else {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt; // gravity
      p.size *= 0.97;
    }
  }
  // Update popups
  for (let i = G.popups.length - 1; i >= 0; i--) {
    const p = G.popups[i];
    p.life -= dt;
    p.y -= 40 * dt;
    if (p.life <= 0) G.popups.splice(i, 1);
  }
}

// Add floating text popup
function addPopup(x, y, text, color) {
  G.popups.push({ x, y, text, color: color || '#fff', life: 1.5 });
}

// Distance helper
function dist(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

// Main render dispatcher
function render(timestamp) {
  // Apply screen shake [F5]
  ctx.save();
  if (G.shakeTimer > 0) {
    const sx = (G.rng.next() - 0.5) * G.shakeIntensity * 2;
    const sy = (G.rng.next() - 0.5) * G.shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  switch(G.state) {
    case 'INIT': renderLoading(); break;
    case 'TITLE': renderTitle(timestamp); break;
    case 'CUTSCENE': renderCutscene(timestamp); break;
    case 'PORT': case 'PORT_BUILD': case 'PORT_TRADE': case 'PORT_CREW':
      renderPort(timestamp); break;
    case 'VOYAGE_PREP': renderVoyagePrep(timestamp); break;
    case 'VOYAGE_MAP': renderVoyageMap(timestamp); break;
    case 'VOYAGE_EVENT': renderVoyageEvent(timestamp); break;
    case 'BATTLE_SETUP': renderBattleSetup(timestamp); break;
    case 'BATTLE': case 'BATTLE_BOSS': renderBattle(timestamp); break;
    case 'BOARDING': renderBoarding(timestamp); break;
    case 'BATTLE_RESULT': renderBattleResult(timestamp); break;
    case 'UPGRADE': renderUpgrade(timestamp); break;
    case 'GAMEOVER': renderGameover(timestamp); break;
    case 'VICTORY': renderVictory(timestamp); break;
    case 'CONFIRM_MODAL': renderPrevState(timestamp); renderModal(); break;
    case 'PAUSED': renderPrevState(timestamp); renderPause(); break;
    case 'SETTINGS': renderSettings(timestamp); break;
  }

  // Render particles on top
  renderParticles();
  // Render popups
  renderPopups();
  // Transition overlay
  if (G._transAlpha < 1) {
    ctx.fillStyle = 'rgba(10,22,40,' + (1 - G._transAlpha) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

// ── Drawing helpers (pure functions) [F9] ──

// Draw ocean background with parallax
function drawOcean(ctx, w, h, time, weather) {
  // Sky gradient based on time of day
  const tod = G.timeOfDay % 4;
  let skyTop, skyBot;
  if (tod < 1) { skyTop = '#1a0a30'; skyBot = '#ff6030'; }      // dawn
  else if (tod < 2) { skyTop = '#0a2463'; skyBot = '#3da5d9'; }  // day
  else if (tod < 3) { skyTop = '#2a0a20'; skyBot = '#ff3020'; }  // sunset
  else { skyTop = '#050520'; skyBot = '#0a1628'; }               // night

  const grad = ctx.createLinearGradient(0, 0, 0, h * 0.5);
  grad.addColorStop(0, skyTop);
  grad.addColorStop(1, skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h * 0.5);

  // Stars at night
  if (tod > 3 || tod < 0.5) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 137.5 + time * 0.5) % w;
      const sy = (i * 97.3) % (h * 0.4);
      const ss = 1 + (i % 3);
      ctx.fillRect(sx, sy, ss, ss);
    }
  }

  // Background layer 1 (parallax slow) — distant islands
  if (SPRITES.bgLayer1) {
    const scrollX1 = -(time * 5) % w;
    ctx.globalAlpha = 0.4;
    ctx.drawImage(SPRITES.bgLayer1, scrollX1, 0, w, h);
    ctx.drawImage(SPRITES.bgLayer1, scrollX1 + w, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // Ocean water
  const oceanGrad = ctx.createLinearGradient(0, h * 0.45, 0, h);
  oceanGrad.addColorStop(0, COL.oceanSurf);
  oceanGrad.addColorStop(0.4, COL.oceanMid);
  oceanGrad.addColorStop(1, COL.oceanDeep);
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, h * 0.45, w, h * 0.55);

  // Wave lines
  ctx.strokeStyle = 'rgba(212,241,249,0.3)';
  ctx.lineWidth = 2;
  for (let row = 0; row < 6; row++) {
    const wy = h * 0.48 + row * h * 0.08;
    ctx.beginPath();
    for (let x = 0; x < w; x += 4) {
      const waveY = wy + Math.sin((x + time * 60 + row * 50) * 0.02) * (4 + row * 2)
                       + Math.sin((x + time * 30) * 0.01) * 3;
      if (x === 0) ctx.moveTo(x, waveY);
      else ctx.lineTo(x, waveY);
    }
    ctx.stroke();
  }

  // Background layer 2 (parallax fast) — near shore elements
  if (SPRITES.bgLayer2) {
    const scrollX2 = -(time * 15) % w;
    ctx.globalAlpha = 0.3;
    ctx.drawImage(SPRITES.bgLayer2, scrollX2, h * 0.3, w, h * 0.7);
    ctx.drawImage(SPRITES.bgLayer2, scrollX2 + w, h * 0.3, w, h * 0.7);
    ctx.globalAlpha = 1;
  }

  // Weather overlay
  if (weather === 'fog') {
    ctx.fillStyle = 'rgba(180,190,200,0.4)';
    ctx.fillRect(0, 0, w, h);
  } else if (weather === 'storm') {
    ctx.fillStyle = 'rgba(20,20,40,0.3)';
    ctx.fillRect(0, 0, w, h);
    // Rain
    ctx.strokeStyle = 'rgba(150,180,220,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 60; i++) {
      const rx = (i * 73 + time * 200) % w;
      const ry = (i * 97 + time * 500) % h;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 3, ry + 15); ctx.stroke();
    }
  } else if (weather === 'rain') {
    ctx.fillStyle = 'rgba(40,40,60,0.15)';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(150,180,220,0.25)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 30; i++) {
      const rx = (i * 73 + time * 150) % w;
      const ry = (i * 97 + time * 400) % h;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 2, ry + 10); ctx.stroke();
    }
  }
}

// Draw a ship (player or enemy) [F9]
function drawShip(ctx, x, y, size, shipType, isEnemy, dmgRatio, isSelected, time) {
  const sprite = isEnemy ? SPRITES.enemy : SPRITES.player;
  const drawSize = size * (1 + shipType * 0.15);

  if (sprite) {
    // Bob animation on waves
    const bobY = Math.sin(time * 2 + x * 0.01) * 3;
    ctx.drawImage(sprite, x - drawSize/2, y - drawSize/2 + bobY, drawSize, drawSize);
  } else {
    // Fallback: draw ship shape
    const bobY = Math.sin(time * 2 + x * 0.01) * 3;
    ctx.save();
    ctx.translate(x, y + bobY);

    // Hull
    ctx.fillStyle = isEnemy ? '#1a1a2e' : COL.portWood;
    ctx.beginPath();
    ctx.moveTo(-drawSize * 0.4, 0);
    ctx.lineTo(-drawSize * 0.3, drawSize * 0.2);
    ctx.lineTo(drawSize * 0.3, drawSize * 0.2);
    ctx.lineTo(drawSize * 0.5, 0);
    ctx.lineTo(drawSize * 0.3, -drawSize * 0.1);
    ctx.lineTo(-drawSize * 0.3, -drawSize * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = isEnemy ? '#440000' : '#5a3520';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Mast
    ctx.fillStyle = '#654321';
    ctx.fillRect(-2, -drawSize * 0.5, 4, drawSize * 0.5);

    // Sail
    ctx.fillStyle = isEnemy ? '#220000' : '#f5e6c8';
    ctx.beginPath();
    ctx.moveTo(0, -drawSize * 0.5);
    ctx.quadraticCurveTo(drawSize * 0.3, -drawSize * 0.3, 0, -drawSize * 0.1);
    ctx.fill();

    // Flag
    ctx.fillStyle = isEnemy ? COL.accentRed : COL.portGold;
    ctx.fillRect(0, -drawSize * 0.55, 12, 8);

    ctx.restore();
  }

  // Selection ring
  if (isSelected) {
    ctx.strokeStyle = COL.accentCyan;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(x, y, drawSize * 0.55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // HP bar
  if (dmgRatio < 1) {
    const barW = drawSize * 0.6;
    const barH = 4;
    const barX = x - barW / 2;
    const barY = y + drawSize * 0.35;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = dmgRatio > 0.5 ? '#4a4' : dmgRatio > 0.25 ? '#aa4' : '#a44';
    ctx.fillRect(barX, barY, barW * dmgRatio, barH);
  }
}

// Draw boss [F9]
function drawBoss(ctx, x, y, size, bossType, phase, hpRatio, time) {
  const bobY = Math.sin(time * 1.5) * 5;
  const scale = 1.2 + phase * 0.1;

  ctx.save();
  ctx.translate(x, y + bobY);

  // Boss body
  const bossColors = ['#2a0a20', '#0a3030', '#1a0a30', '#0a1040', '#200a10'];
  ctx.fillStyle = bossColors[bossType] || '#200020';

  if (bossType === 1) {
    // Kraken — tentacles + body
    ctx.fillStyle = '#0a3030';
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.4 * scale, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(-15, -10, 8, 0, Math.PI * 2);
    ctx.arc(15, -10, 8, 0, Math.PI * 2);
    ctx.fill();
  } else if (bossType === 2) {
    // Ghost ship
    ctx.globalAlpha = 0.7 + Math.sin(time * 3) * 0.2;
    ctx.fillStyle = '#2a1a3a';
    ctx.beginPath();
    ctx.moveTo(-size*0.5, 0);
    ctx.lineTo(-size*0.4, size*0.25);
    ctx.lineTo(size*0.4, size*0.25);
    ctx.lineTo(size*0.6, 0);
    ctx.lineTo(size*0.4, -size*0.15);
    ctx.lineTo(-size*0.4, -size*0.15);
    ctx.closePath();
    ctx.fill();
    // Ghost glow
    ctx.shadowColor = '#8844ff';
    ctx.shadowBlur = 20;
    ctx.fillRect(-3, -size*0.6, 6, size*0.5);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  } else {
    // Generic boss ship (large)
    ctx.fillStyle = '#1a0a10';
    ctx.beginPath();
    ctx.moveTo(-size*0.5*scale, 0);
    ctx.lineTo(-size*0.4*scale, size*0.3*scale);
    ctx.lineTo(size*0.4*scale, size*0.3*scale);
    ctx.lineTo(size*0.6*scale, 0);
    ctx.closePath();
    ctx.fill();
    // Multiple masts
    ctx.fillStyle = '#3a2010';
    for (let m = -1; m <= 1; m++) {
      ctx.fillRect(m * size * 0.2 * scale - 2, -size * 0.6 * scale, 4, size * 0.6 * scale);
    }
    // Dark sails
    ctx.fillStyle = '#220000';
    for (let m = -1; m <= 1; m++) {
      ctx.beginPath();
      ctx.moveTo(m*size*0.2*scale, -size*0.6*scale);
      ctx.quadraticCurveTo(m*size*0.2*scale + size*0.15, -size*0.35*scale, m*size*0.2*scale, -size*0.1*scale);
      ctx.fill();
    }
  }

  ctx.restore();

  // Boss HP bar
  const barW = size * 1.2;
  const barH = 8;
  const barX = x - barW / 2;
  const barY = y - size * 0.5 - 20;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = hpRatio > 0.5 ? '#c44' : hpRatio > 0.25 ? '#c84' : '#844';
  ctx.fillRect(barX, barY, barW * Math.max(0, hpRatio), barH);
  // Phase markers
  if (G.boss) {
    G.boss.thresholds.forEach(th => {
      const mx = barX + barW * (1 - th);
      ctx.fillStyle = '#fff';
      ctx.fillRect(mx - 1, barY - 2, 2, barH + 4);
    });
  }
  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  const bossName = G.lang === 'ko' ? CONFIG.BOSSES[G.currentSea].ko : CONFIG.BOSSES[G.currentSea].en;
  ctx.fillText(bossName + ' (P' + (G.bossPhase + 1) + ')', x, barY - 6);
}

// Draw HUD [F9]
function drawHUD(ctx, w, h) {
  // Top bar — parchment style
  ctx.fillStyle = 'rgba(245,230,200,0.85)';
  ctx.fillRect(0, 0, w, 36);
  ctx.fillStyle = 'rgba(42,24,16,0.3)';
  ctx.fillRect(0, 35, w, 1);

  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  let hx = 8;
  // HP icon + flagship HP
  if (SPRITES.uiHeart) {
    ctx.drawImage(SPRITES.uiHeart, hx, 4, 28, 28);
  } else {
    ctx.fillStyle = COL.uiAccent;
    ctx.fillText('♥', hx + 6, 18);
  }
  hx += 32;
  const flagship = G.ships[0];
  ctx.fillStyle = COL.uiInk;
  ctx.fillText(Math.max(0, Math.round(flagship ? flagship.hp : 0)) + '/' + (flagship ? flagship.maxHp : 0), hx, 18);
  hx += 70;

  // Gold icon + amount
  if (SPRITES.uiStar) {
    ctx.drawImage(SPRITES.uiStar, hx, 4, 28, 28);
  } else {
    ctx.fillStyle = COL.uiGold;
    ctx.fillText('⚜', hx + 6, 18);
  }
  hx += 32;
  ctx.fillStyle = COL.uiInk;
  ctx.fillText(G.gold, hx, 18);
  hx += 60;

  // Supplies
  ctx.fillStyle = COL.oceanMid;
  ctx.fillText('📦' + G.supplies, hx, 18);
  hx += 70;

  // Score
  ctx.textAlign = 'right';
  ctx.fillStyle = COL.uiInk;
  ctx.fillText(t('score') + ': ' + G.totalScore, w - 8, 18);

  // Weather indicator
  ctx.textAlign = 'center';
  const weatherIcons = {clear:'☀️',cloudy:'☁️',rain:'🌧️',storm:'⛈️',fog:'🌫️'};
  ctx.fillText(weatherIcons[G.weather] || '☀️', w - 100, 18);

  ctx.textBaseline = 'alphabetic';
}

// Draw port scene
function drawPort(ctx, w, h, time) {
  // Port background — dock + buildings
  ctx.fillStyle = COL.portStone;
  ctx.fillRect(0, h * 0.65, w, h * 0.35);

  // Wooden dock
  ctx.fillStyle = COL.portWood;
  for (let i = 0; i < 8; i++) {
    const dx = w * 0.1 + i * w * 0.1;
    ctx.fillRect(dx, h * 0.6, w * 0.08, h * 0.08);
    // Planks
    ctx.strokeStyle = '#6a4020';
    ctx.lineWidth = 1;
    for (let j = 0; j < 3; j++) {
      ctx.beginPath();
      ctx.moveTo(dx, h * 0.6 + j * h * 0.025 + 5);
      ctx.lineTo(dx + w * 0.08, h * 0.6 + j * h * 0.025 + 5);
      ctx.stroke();
    }
  }

  // Buildings
  const buildingTypes = ['dock','warehouse','tavern','market','fort','lighthouse'];
  const buildingColors = [COL.portWood, COL.portStone, '#8a5030', '#6a7040', '#5a5a6a', '#a0a0b0'];
  const buildX = w * 0.08;
  const buildW = Math.min(100, (w - 40) / 6 - 10);

  buildingTypes.forEach((bt, i) => {
    const lv = G.buildings[bt];
    if (lv <= 0) return;
    const bx = buildX + i * (buildW + 8);
    const bh = 30 + lv * 15;
    const by = h * 0.63 - bh;

    ctx.fillStyle = buildingColors[i];
    ctx.fillRect(bx, by, buildW, bh);

    // Roof
    ctx.fillStyle = '#4a3020';
    ctx.beginPath();
    ctx.moveTo(bx - 5, by);
    ctx.lineTo(bx + buildW / 2, by - 15);
    ctx.lineTo(bx + buildW + 5, by);
    ctx.closePath();
    ctx.fill();

    // Windows
    ctx.fillStyle = '#ffd700';
    const winCount = Math.min(lv, 3);
    for (let wi = 0; wi < winCount; wi++) {
      ctx.fillRect(bx + 8 + wi * 18, by + 10, 8, 8);
    }

    // Level indicator
    ctx.fillStyle = '#fff';
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Lv' + lv, bx + buildW/2, by + bh + 12);

    // Building name
    ctx.fillText(t(bt), bx + buildW/2, by + bh + 24);
  });

  // Ships in port
  G.ships.forEach((s, i) => {
    if (s.hp > 0) {
      drawShip(ctx, w * 0.3 + i * 80, h * 0.55, 50, s.type, false, s.hp / s.maxHp, false, time);
    }
  });
}

// Draw UI button [F9, F11]
function drawBtn(ctx, x, y, w, h, label, isHov, isPress) {
  w = Math.max(CONFIG.MIN_TOUCH, w);
  h = Math.max(CONFIG.MIN_TOUCH, h);
  const r = 6;
  ctx.fillStyle = isPress ? COL.portWood : isHov ? '#8b6e4c' : 'rgba(139,94,60,0.8)';
  // Rounded rect
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  ctx.fill();
  // Border
  ctx.strokeStyle = COL.portGold;
  ctx.lineWidth = isHov ? 2 : 1;
  ctx.stroke();
  // Text
  ctx.fillStyle = COL.uiParchment;
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2);
  ctx.textBaseline = 'alphabetic';
  // Return hit rect for touch
  return {x, y, w, h};
}

// Hit test helper [F16]
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// Loading screen
function renderLoading() {
  ctx.fillStyle = COL.bgPrimary;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = COL.uiParchment;
  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t('loading'), W/2, H/2);
  // Progress bar
  ctx.fillStyle = '#333';
  ctx.fillRect(W/4, H/2 + 20, W/2, 8);

}

// Title screen with dramatic intro
function renderTitle(timestamp) {
  const time = timestamp / 1000;
  drawOcean(ctx, W, H, time, 'clear');

  // Title text with glow
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Golden glow behind title
  ctx.shadowColor = COL.uiGold;
  ctx.shadowBlur = 30 + Math.sin(time * 2) * 10;
  ctx.fillStyle = COL.uiGold;
  ctx.font = 'bold ' + Math.min(48, W * 0.08) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(t('title'), W/2, H * 0.28);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = COL.uiParchment;
  ctx.font = Math.min(20, W * 0.035) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(t('subtitle'), W/2, H * 0.36);

  // Compass rose decoration
  drawCompassRose(ctx, W/2, H * 0.55, 60 + Math.sin(time) * 5, time);

  // Start prompt (blinking)
  if (Math.sin(time * 3) > -0.3) {
    ctx.fillStyle = COL.uiParchment;
    ctx.font = 'bold ' + Math.min(16, W * 0.03) + 'px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(t('start'), W/2, H * 0.78);
  }

  // Language toggle
  const langBtn = drawBtn(ctx, W - 80, H - 50, 70, 36, G.lang === 'ko' ? 'EN' : '한국어', false, false);
  titleLangBtn = langBtn;

  // Best score
  if (G.bestScore > 0) {
    ctx.fillStyle = COL.uiGold;
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(t('best') + ': ' + G.bestScore, W/2, H * 0.85);
  }

  ctx.restore();
}

// Draw compass rose (signature visual) [F9]
function drawCompassRose(ctx, cx, cy, r, time) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(time * 0.2);

  // Outer circle
  ctx.strokeStyle = COL.uiGold;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // Cardinal points
  for (let i = 0; i < 8; i++) {
    const angle = i * Math.PI / 4;
    const len = i % 2 === 0 ? r * 0.9 : r * 0.6;
    ctx.fillStyle = i % 2 === 0 ? COL.uiGold : COL.portRope;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(angle - 0.12) * len * 0.3, Math.sin(angle - 0.12) * len * 0.3);
    ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
    ctx.lineTo(Math.cos(angle + 0.12) * len * 0.3, Math.sin(angle + 0.12) * len * 0.3);
    ctx.closePath();
    ctx.fill();
  }

  // Center dot
  ctx.fillStyle = COL.uiAccent;
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

let titleLangBtn = null;

// Cutscene renderer
function renderCutscene(timestamp) {
  const time = timestamp / 1000;
  drawOcean(ctx, W, H, time, 'clear');

  ctx.fillStyle = 'rgba(10,22,40,0.7)';
  ctx.fillRect(0, H * 0.3, W, H * 0.4);

  ctx.fillStyle = COL.uiParchment;
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';

  const text = t('prologue');
  const charCount = Math.min(text.length, Math.floor(G.cutsceneTimer * 15));
  ctx.fillText(text.substring(0, charCount), W/2, H * 0.5);

  if (charCount >= text.length) {
    if (Math.sin(time * 3) > 0) {
      ctx.font = '13px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(G.lang === 'ko' ? '터치/스페이스로 계속' : 'TAP/SPACE to continue', W/2, H * 0.65);
    }
  }
}

// Port screen renderer
function renderPort(timestamp) {
  const time = timestamp / 1000;
  drawOcean(ctx, W, H, time, G.weather);
  drawPort(ctx, W, H, time);
  drawHUD(ctx, W, H);

  // Port UI panel on bottom
  const panelY = H * 0.72;
  const panelH = H * 0.28;
  ctx.fillStyle = 'rgba(245,230,200,0.9)';
  ctx.fillRect(0, panelY, W, panelH);
  ctx.fillStyle = COL.uiInk;
  ctx.fillRect(0, panelY, W, 2);

  // Tab buttons
  const tabs = [t('port'), t('build'), t('trade'), t('crew')];
  portBtns.tabs = [];
  const tabW = Math.min(80, (W - 20) / 4 - 5);
  tabs.forEach((label, i) => {
    const tx = 10 + i * (tabW + 5);
    const isActive = G.portTab === i;
    ctx.fillStyle = isActive ? COL.portWood : 'rgba(139,94,60,0.4)';
    ctx.fillRect(tx, panelY + 5, tabW, 28);
    ctx.strokeStyle = COL.portGold;
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.strokeRect(tx, panelY + 5, tabW, 28);
    ctx.fillStyle = isActive ? '#fff' : COL.uiInk;
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, tx + tabW/2, panelY + 23);
    portBtns.tabs.push({x: tx, y: panelY + 5, w: tabW, h: 28, idx: i});
  });

  // Tab content
  const contentY = panelY + 40;
  const contentH = panelH - 45;
  portBtns.actions = [];

  if (G.state === 'PORT' || G.portTab === 0) {
    // Overview — stats and sail button
    ctx.fillStyle = COL.uiInk;
    ctx.font = '13px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'left';
    const fameLevel = CONFIG.FAME_LEVELS.filter(f => G.fame >= f[0]).pop();
    ctx.fillText(t('fame') + ': ' + G.fame + ' (' + (G.lang==='ko'?fameLevel[1]:fameLevel[2]) + ')', 15, contentY + 18);
    ctx.fillText(t('gold') + ': ' + G.gold + '  ' + t('supplies') + ': ' + G.supplies, 15, contentY + 36);

    // Sea selection / set sail
    const seaNames = [t('sea1'),t('sea2'),t('sea3'),t('sea4'),t('sea5')];
    ctx.fillText(t('selectSea') + ': ' + seaNames[G.currentSea], 15, contentY + 54);

    // Sea arrow buttons
    if (G.currentSea > 0) {
      const lb = drawBtn(ctx, W * 0.55, contentY + 2, 30, 30, '◀', false, false);
      portBtns.actions.push({...lb, action: 'prevSea'});
    }
    if (G.currentSea < 4 && canAccessSea(G.currentSea + 1)) {
      const rb = drawBtn(ctx, W * 0.55 + 35, contentY + 2, 30, 30, '▶', false, false);
      portBtns.actions.push({...rb, action: 'nextSea'});
    }

    // Set sail button
    if (G.supplies >= 20) {
      const sailBtn = drawBtn(ctx, W * 0.6, contentY + 40, 120, 40, '⛵ ' + t('setSail'), false, false);
      portBtns.actions.push({...sailBtn, action: 'sail'});
    }

    // Treasure map progress
    const mapPieces = G.treasureMap.filter(Boolean).length;
    ctx.fillStyle = COL.uiInk;
    ctx.textAlign = 'left';
    ctx.fillText(t('treasureMap') + ': ' + mapPieces + '/7 ' + t('pieces'), 15, contentY + 72);

  } else if (G.state === 'PORT_BUILD' || G.portTab === 1) {
    // Build tab — show buildings and upgrade options
    const types = ['dock','warehouse','tavern','market','fort','lighthouse'];
    const bw = Math.min(140, (W - 30) / 3 - 5);
    types.forEach((bt, i) => {
      const col = i % 3, row = Math.floor(i / 3);
      const bx = 10 + col * (bw + 5);
      const by = contentY + row * 52;
      const lv = G.buildings[bt];
      const maxed = lv >= 5;
      const cost = maxed ? 0 : CONFIG.BUILD_COSTS[bt][lv];
      const canBuild = !maxed && G.gold >= cost;

      ctx.fillStyle = canBuild ? 'rgba(0,180,80,0.15)' : 'rgba(100,100,100,0.1)';
      ctx.fillRect(bx, by, bw, 48);
      ctx.strokeStyle = canBuild ? COL.portGold : '#999';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, 48);

      ctx.fillStyle = COL.uiInk;
      ctx.font = 'bold 12px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(t(bt) + ' Lv' + lv, bx + 5, by + 16);

      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(maxed ? t('max') : t('cost') + ': ' + cost, bx + 5, by + 34);

      if (canBuild) {
        portBtns.actions.push({x: bx, y: by, w: bw, h: 48, action: 'build', data: bt});
      }
    });

  } else if (G.state === 'PORT_TRADE' || G.portTab === 2) {
    // Trade tab
    if (G.tradeGoods.length === 0) generateTradeGoods();
    const tw2 = Math.min(180, (W - 20) / 2 - 5);
    G.tradeGoods.forEach((g, i) => {
      const col = i % 2, row = Math.floor(i / 2);
      const gx = 10 + col * (tw2 + 5);
      const gy = contentY + row * 42;
      if (gy + 42 > H) return;

      ctx.fillStyle = 'rgba(100,100,80,0.1)';
      ctx.fillRect(gx, gy, tw2, 38);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1;
      ctx.strokeRect(gx, gy, tw2, 38);

      ctx.fillStyle = COL.uiInk;
      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      const name = G.lang === 'ko' ? g.nameKo : g.nameEn;
      ctx.fillText(name + ' [' + g.qty + '] stock:' + g.stock, gx + 4, gy + 14);
      ctx.fillText('Buy:' + g.buyPrice + ' Sell:' + g.sellPrice, gx + 4, gy + 30);

      // Buy/sell buttons
      const bbx = gx + tw2 - 65;
      if (g.stock > 0 && G.gold >= g.buyPrice) {
        const bb = drawBtn(ctx, bbx, gy + 2, 30, 16, 'B', false, false);
        portBtns.actions.push({...bb, action: 'buy', data: i});
      }
      if (g.qty > 0) {
        const sb = drawBtn(ctx, bbx + 32, gy + 2, 30, 16, 'S', false, false);
        portBtns.actions.push({...sb, action: 'sell', data: i});
      }
    });

  } else if (G.state === 'PORT_CREW' || G.portTab === 3) {
    // Crew tab — show skills and upgrade
    const skills = Object.keys(G.crewSkills);
    const skillNames = {
      nav: G.lang==='ko'?'항해':'Navigation',
      gun: G.lang==='ko'?'포격':'Gunnery',
      melee: G.lang==='ko'?'백병':'Melee',
      repair: G.lang==='ko'?'수리':'Repair',
      scout: G.lang==='ko'?'정찰':'Scout',
      trade: G.lang==='ko'?'교역':'Trading',
      cook: G.lang==='ko'?'요리':'Cooking',
      medic: G.lang==='ko'?'의료':'Medical'
    };
    const cw = Math.min(160, (W - 20) / 2 - 5);
    skills.forEach((sk, i) => {
      const col = i % 2, row = Math.floor(i / 2);
      const sx = 10 + col * (cw + 5);
      const sy = contentY + row * 32;
      if (sy + 32 > H) return;

      const lv = G.crewSkills[sk];
      const cost = (lv + 1) * 80;
      const canHire = lv < 5 && G.gold >= cost;

      ctx.fillStyle = COL.uiInk;
      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(skillNames[sk] + ' Lv' + lv + (lv < 5 ? ' ('+cost+'g)' : ' MAX'), sx, sy + 14);

      // Level bar
      for (let l = 0; l < 5; l++) {
        ctx.fillStyle = l < lv ? COL.portGold : '#555';
        ctx.fillRect(sx + 120 + l * 8, sy + 4, 6, 12);
      }

      if (canHire) {
        const hb = drawBtn(ctx, sx + cw - 24, sy, 22, 22, '+', false, false);
        portBtns.actions.push({...hb, action: 'hire', data: sk});
      }
    });
  }

  // Mobile touch buttons
  if (isMobile()) drawMobilePortButtons(ctx);
}

// Voyage map screen
function renderVoyageMap(timestamp) {
  const time = timestamp / 1000;
  drawOcean(ctx, W, H, time, G.weather);
  drawHUD(ctx, W, H);

  // Draw route nodes
  voyageMapBtns = [];
  const route = G.voyageRoute;
  // Lines between nodes
  ctx.strokeStyle = COL.portRope;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  for (let i = 0; i < route.length - 1; i++) {
    ctx.beginPath();
    ctx.moveTo(route[i].x, route[i].y);
    ctx.lineTo(route[i+1].x, route[i+1].y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Nodes
  route.forEach((node, i) => {
    const isActive = i === G.voyagePos + 1; // Next node to visit
    const isCurrent = i === G.voyagePos;
    const isVisited = node.visited;

    ctx.beginPath();
    ctx.arc(node.x, node.y, isActive ? 18 : 14, 0, Math.PI * 2);
    ctx.fillStyle = isCurrent ? COL.uiGold :
                    isActive ? COL.accentCyan :
                    isVisited ? COL.portStone : '#555';
    ctx.fill();
    ctx.strokeStyle = isActive ? '#fff' : COL.portRope;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Node icon
    ctx.fillStyle = '#fff';
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    const icon = node.type === 'boss' ? '💀' : node.type === 'event' ? '❓' : '⚔️';
    ctx.fillText(icon, node.x, node.y + 4);

    if (isActive) {
      voyageMapBtns.push({x: node.x - 20, y: node.y - 20, w: 40, h: 40, action: 'advance', data: i});
    }
  });

  // Player ship on current node
  const cNode = route[G.voyagePos];
  if (cNode) {
    drawShip(ctx, cNode.x, cNode.y - 30, 40, G.ships[0].type, false, 1, false, time);
  }

  // Instructions
  ctx.fillStyle = COL.uiParchment;
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(G.lang==='ko' ? '다음 섬을 터치/클릭하여 이동' : 'Tap/click next island to advance', W/2, H * 0.88);
}

// Battle screen renderer
function renderBattle(timestamp) {
  const time = timestamp / 1000;
  // ── screen coordinates
  drawOcean(ctx, W, H, time, G.weather);

  // Draw enemy ships
  G.enemies.forEach(e => {
    drawShip(ctx, e.x, e.y, 45, e.type, true, e.hp / e.maxHp, false, time);
  });

  // Draw boss
  if (G.boss && G.boss.hp > 0) {
    drawBoss(ctx, G.boss.x, G.boss.y, 80, G.currentSea, G.bossPhase, G.boss.hp / G.boss.maxHp, time);
    // Draw tentacles for kraken
    if (G.currentSea === 1) {
      G.boss.tentacles.forEach(tent => {
        if (!tent.alive) return;
        ctx.fillStyle = '#0a5050';
        ctx.beginPath();
        ctx.arc(tent.x, tent.y, 15, 0, Math.PI * 2);
        ctx.fill();
        // Tentacle HP
        ctx.fillStyle = '#333'; ctx.fillRect(tent.x - 12, tent.y - 22, 24, 3);
        ctx.fillStyle = '#4a8'; ctx.fillRect(tent.x - 12, tent.y - 22, 24 * (tent.hp / tent.maxHp), 3);
      });
    }
  }

  // Draw player ships
  G.ships.forEach((s, i) => {
    if (s.hp <= 0) return;
    drawShip(ctx, s.x, s.y, 50, s.type, false, s.hp / s.maxHp, i === G.selectedShipIdx, time);
  });

  // Draw particles (cannonballs, etc.)
  G.particles.forEach(p => {
    if (p.type === 'cannonball') {
      ctx.fillStyle = COL.fireCannon;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.shadowColor = COL.fireCannon;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  drawHUD(ctx, W, H);

  // Battle HUD — cannon type selector + formation
  const hudY = H - 70;
  ctx.fillStyle = 'rgba(42,24,16,0.8)';
  ctx.fillRect(0, hudY, W, 70);

  battleBtns = [];
  // Cannon types
  const cannonLabels = [t('cannon'), t('chain'), t('bomb'), t('grape')];
  const cannonKeys = ['1','2','3','4'];
  cannonLabels.forEach((cl, i) => {
    const cx = 10 + i * 70;
    const isActive = G.cannonType === i;
    const ship = G.ships[G.selectedShipIdx];
    const onCooldown = ship && ship.cooldowns[i] > 0;
    ctx.fillStyle = isActive ? COL.fireCannon : onCooldown ? '#555' : '#8b5e3c';
    ctx.fillRect(cx, hudY + 5, 60, 28);
    ctx.strokeStyle = isActive ? COL.uiGold : '#666';
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.strokeRect(cx, hudY + 5, 60, 28);
    ctx.fillStyle = '#fff';
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(cannonKeys[i] + ':' + cl, cx + 30, hudY + 23);
    if (onCooldown) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(cx, hudY + 5, 60 * (ship.cooldowns[i] / CONFIG.CANNON_COOLDOWN[i]), 28);
    }
    battleBtns.push({x: cx, y: hudY + 5, w: 60, h: 28, action: 'cannon', data: i});
  });

  // Formation indicator
  ctx.fillStyle = COL.uiParchment;
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'right';
  const formLabel = G.formation === 'attack' ? t('attack') :
                    G.formation === 'defense' ? t('defense') : t('wedge');
  ctx.fillText(t('formation') + ': ' + formLabel + ' (R)', W - 10, hudY + 23);

  // Tab to next ship
  ctx.fillText('Tab: ' + (G.lang==='ko'?'함선 전환':'Next ship'), W - 10, hudY + 45);

  // Mobile attack button
  if (isMobile()) {
    const atkBtn = drawBtn(ctx, W - 80, hudY + 35, 70, 30, '⚔️', false, false);
    battleBtns.push({...atkBtn, action: 'mobileAttack'});
  }
}

function generateUpgradeChoices() {
  const choices = [];
  choices.push({
    label: G.lang==='ko' ? '체력 회복 (+30%)' : 'Repair (+30%)',
    apply: () => { G.ships.forEach(s => { s.hp = Math.min(s.maxHp, s.hp + s.maxHp * 0.3); }); }
  });
  choices.push({
    label: G.lang==='ko' ? '보급품 +50' : 'Supplies +50',
    apply: () => { G.supplies += 50; }
  });
  if (G.gold >= 100) {
    choices.push({
      label: G.lang==='ko' ? '포격 강화 (100금)' : 'Gun upgrade (100g)',
      apply: () => { G.gold -= 100; if (G.crewSkills.gun < 5) G.crewSkills.gun++; }
    });
  }
  return choices;
}

  ctx.fillStyle = COL.uiGold; ctx.fillRect(W * 0.55, H * 0.375 - 5, 100 * sv, 10);
  settingsBtns.push({x: W*0.55, y: H*0.375 - 10, w: 100, h: 20, action: 'sfxVol'});

  // BGM volume
  ctx.fillStyle = COL.uiParchment;
  ctx.fillText(t('bgmVol') + ':', W * 0.2, H * 0.48);
  const bv = G.sfx ? G.sfx.bgmVol : 0.5;
  ctx.fillStyle = '#333'; ctx.fillRect(W * 0.55, H * 0.475 - 5, 100, 10);
  ctx.fillStyle = COL.uiGold; ctx.fillRect(W * 0.55, H * 0.475 - 5, 100 * bv, 10);
  settingsBtns.push({x: W*0.55, y: H*0.475 - 10, w: 100, h: 20, action: 'bgmVol'});

  // Back button
  const bb = drawBtn(ctx, W/2 - 50, H * 0.7, 100, 40, '← ' + (G.lang==='ko'?'돌아가기':'Back'), false, false);
  settingsBtns.push({...bb, action: 'settingsBack'});
}

// Render previous state (for pause/modal overlay)
function renderPrevState(timestamp) {
  const prev = G.prevState;
  const save = G.state;
  G.state = prev;
  render(timestamp);
  G.state = save;
}

// Render all particles
function renderParticles() {
  G.particles.forEach(p => {
    if (p.type === 'cannonball') return; // drawn in battle
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    if (p.type === 'hit' && SPRITES.effectHit) {
      ctx.drawImage(SPRITES.effectHit, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(1, p.size), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

// Render floating text popups
function renderPopups() {
  G.popups.forEach(p => {
    const alpha = Math.min(1, p.life);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  });
}
