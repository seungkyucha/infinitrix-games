// Keyboard input [F11 — e.preventDefault for game keys]
window.addEventListener('keydown', e => {
  const blockedKeys = [
    'Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
    'KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE',
    'Digit1','Digit2','Digit3','Digit4',
    'Tab','Escape'
  ];
  if (blockedKeys.includes(e.code)) e.preventDefault();
  keys[e.code] = true;

  // State-specific key handling
  switch(G.state) {
    case 'TITLE':
      if (e.code === 'Space' || e.code === 'Enter') {
        initAudioOnGesture();
        startNewGame();
      }
      break;

    case 'CUTSCENE':
      if (e.code === 'Space') {
        beginTransition(G.state, 'PORT');
      }
      break;

    case 'PORT': case 'PORT_BUILD': case 'PORT_TRADE': case 'PORT_CREW':
      if (e.code === 'Digit1') { G.portTab = 0; enterState('PORT'); }
      if (e.code === 'Digit2') { G.portTab = 1; enterState('PORT_BUILD'); }
      if (e.code === 'Digit3') { G.portTab = 2; enterState('PORT_TRADE'); }
      if (e.code === 'Digit4') { G.portTab = 3; enterState('PORT_CREW'); }
      if (e.code === 'KeyE') beginTransition(G.state, 'VOYAGE_PREP');
      if (e.code === 'Escape') beginTransition(G.state, 'SETTINGS', 0.2);
      if (e.code === 'KeyP') { G.prevState = G.state; enterState('PAUSED'); }
      break;

    case 'VOYAGE_PREP':
      if (e.code === 'Space') doEmbark();
      if (e.code === 'Escape') beginTransition(G.state, 'PORT');
      if (e.code === 'KeyR') cycleFormation();
      break;

    case 'VOYAGE_MAP':
      if (e.code === 'Space') advanceVoyage();
      break;

    case 'VOYAGE_EVENT':
      // Number keys for choices
      if (G.eventChoices && !G.eventResolved) {
        const idx = parseInt(e.key) - 1;
        if (idx >= 0 && idx < G.eventChoices.length) {
          resolveEvent(idx);
        }
      } else if (G.eventResolved) {
        if (e.code === 'Space') continueAfterEvent();
      }
      break;

    case 'BATTLE_SETUP':
      if (e.code === 'Space') {
        enterState(G.boss ? 'BATTLE_BOSS' : 'BATTLE');
      }
      break;

    case 'BATTLE': case 'BATTLE_BOSS':
      if (e.code === 'Digit1') G.cannonType = 0;
      if (e.code === 'Digit2') G.cannonType = 1;
      if (e.code === 'Digit3') G.cannonType = 2;
      if (e.code === 'Digit4') G.cannonType = 3;
      if (e.code === 'Tab') selectNextShip();
      if (e.code === 'KeyR') cycleFormation();
      if (e.code === 'Space') {
        // Fire at nearest enemy
        const ship = G.ships[G.selectedShipIdx];
        if (ship && ship.hp > 0) {
          const target = G.boss || G.enemies[0];
          if (target) fireCannon(target.x, target.y);
        }
      }
      if (e.code === 'KeyE') {
        // Boarding attempt
        const ship = G.ships[G.selectedShipIdx];
        const closest = findClosestEnemy(ship);
        if (closest && dist(ship.x, ship.y, closest.x, closest.y) < 100) {
          enterState('BOARDING');
        }
      }
      if (e.code === 'KeyP') { G.prevState = G.state; enterState('PAUSED'); }
      if (e.code === 'Escape') {
        G.modalTitle = G.lang==='ko' ? '퇴각' : 'Retreat';
        G.modalText = G.lang==='ko' ? '항구로 돌아갑니까?' : 'Return to port?';
        G.modalOnConfirm = () => { beginTransition('CONFIRM_MODAL', 'PORT'); };
        G.modalOnCancel = () => { enterState(G.prevState); };
        G.prevState = G.state;
        enterState('CONFIRM_MODAL');
      }
      // Ship movement with WASD/arrows
      handleShipMovement(e.code);
      break;

    case 'BOARDING':
      if (e.code === 'Space') {
        attemptBoardingStrike();
      }
      break;

    case 'BATTLE_RESULT':
      if (e.code === 'Space') {
        beginTransition(G.state, 'PORT');
      }
      break;

    case 'UPGRADE':
      break;

    case 'GAMEOVER': case 'VICTORY':
      if (e.code === 'KeyR' || e.code === 'Space') {
        resetGame();
        beginTransition(G.state, 'TITLE', 0.3);
      }
      break;

    case 'CONFIRM_MODAL':
      if (e.code === 'Enter' || e.code === 'Space') {
        if (G.modalOnConfirm) G.modalOnConfirm();
      }
      if (e.code === 'Escape') {
        if (G.modalOnCancel) G.modalOnCancel();
      }
      break;

    case 'PAUSED':
      if (e.code === 'KeyP' || e.code === 'Escape') {
        enterState(G.prevState);
      }
      break;

    case 'SETTINGS':
      if (e.code === 'Escape') {
        beginTransition(G.state, 'TITLE', 0.2);
      }
      break;
  }
});

window.addEventListener('keyup', e => { keys[e.code] = false; });

// Handle ship movement with held keys
function handleShipMovement(code) {
  const ship = G.ships[G.selectedShipIdx];
  if (!ship || ship.hp <= 0) return;
  const spd = 8;
  if (code === 'ArrowUp' || code === 'KeyW') ship.y -= spd;
  if (code === 'ArrowDown' || code === 'KeyS') ship.y += spd;
  if (code === 'ArrowLeft' || code === 'KeyA') ship.x -= spd;
  if (code === 'ArrowRight' || code === 'KeyD') ship.x += spd;
  ship.x = Math.max(20, Math.min(W - 20, ship.x));
  ship.y = Math.max(40, Math.min(H - 60, ship.y));
}

// Continuous movement in game loop
function handleContinuousInput(dt) {
  if (!['BATTLE','BATTLE_BOSS'].includes(G.state)) return;
  const ship = G.ships[G.selectedShipIdx];
  if (!ship || ship.hp <= 0) return;
  const spd = 150 * dt;
  if (keys['ArrowUp'] || keys['KeyW']) ship.y -= spd;
  if (keys['ArrowDown'] || keys['KeyS']) ship.y += spd;
  if (keys['ArrowLeft'] || keys['KeyA']) ship.x -= spd;
  if (keys['ArrowRight'] || keys['KeyD']) ship.x += spd;
  // Touch joystick
  if (touchJoystick.active) {
    ship.x += touchJoystick.dx * spd * 2;
    ship.y += touchJoystick.dy * spd * 2;
  }
  ship.x = Math.max(20, Math.min(W - 20, ship.x));
  ship.y = Math.max(40, Math.min(H - 60, ship.y));
}

// Mouse handling
canvas.addEventListener('mousedown', e => {
  mouse.x = e.offsetX; mouse.y = e.offsetY;
  mouse.down = true;
  mouse.clicked = true;
  if (e.button === 2) mouse.rightClicked = true;
  handleClick(mouse.x, mouse.y);
});
canvas.addEventListener('mouseup', e => { mouse.down = false; });
canvas.addEventListener('mousemove', e => { mouse.x = e.offsetX; mouse.y = e.offsetY; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch handling [touchstart/touchmove/touchend]
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const touch of e.changedTouches) {
    const tx = (touch.clientX - rect.left);
    const ty = (touch.clientY - rect.top);
    touches.push({id: touch.identifier, x: tx, y: ty, sx: tx, sy: ty});
    handleClick(tx, ty);

    // Joystick activation on left side
    if (tx < W * 0.4 && ['BATTLE','BATTLE_BOSS'].includes(G.state)) {
      touchJoystick.active = true;
      touchJoystick.sx = tx;
      touchJoystick.sy = ty;
      touchJoystick.cx = tx;
      touchJoystick.cy = ty;
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const touch of e.changedTouches) {
    const tx = (touch.clientX - rect.left);
    const ty = (touch.clientY - rect.top);
    const t2 = touches.find(t3 => t3.id === touch.identifier);
    if (t2) { t2.x = tx; t2.y = ty; }
    // Update joystick
    if (touchJoystick.active) {
      touchJoystick.cx = tx;
      touchJoystick.cy = ty;
      const dx = tx - touchJoystick.sx;
      const dy = ty - touchJoystick.sy;
      const d = Math.sqrt(dx*dx + dy*dy);
      const maxR = 50;
      if (d > 0) {
        const clamp = Math.min(d, maxR);
        touchJoystick.dx = (dx / d) * (clamp / maxR);
        touchJoystick.dy = (dy / d) * (clamp / maxR);
      }
    }
  }
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    const idx = touches.findIndex(t2 => t2.id === touch.identifier);
    if (idx >= 0) touches.splice(idx, 1);
  }
  if (touches.length === 0) {
    touchJoystick.active = false;
    touchJoystick.dx = 0;
    touchJoystick.dy = 0;
  }
}, {passive: false});

// Unified click/tap handler
function handleClick(cx, cy) {
  switch(G.state) {
    case 'TITLE':
      // Check language button
      if (titleLangBtn && hitTest(cx, cy, titleLangBtn)) {
        G.lang = G.lang === 'ko' ? 'en' : 'ko';
        saveGame();
        G.sfx && G.sfx.playSfx('click');
        return;
      }
      initAudioOnGesture();
      startNewGame();
      break;

    case 'CUTSCENE':
      beginTransition(G.state, 'PORT');
      break;

    case 'PORT': case 'PORT_BUILD': case 'PORT_TRADE': case 'PORT_CREW':
      // Check tab buttons
      for (const tb of portBtns.tabs) {
        if (hitTest(cx, cy, tb)) {
          G.portTab = tb.idx;
          const states = ['PORT','PORT_BUILD','PORT_TRADE','PORT_CREW'];
          enterState(states[tb.idx]);
          G.sfx && G.sfx.playSfx('click');
          return;
        }
      }
      // Check action buttons
      for (const ab of portBtns.actions) {
        if (hitTest(cx, cy, ab)) {
          handlePortAction(ab);
          return;
        }
      }
      break;

    case 'VOYAGE_PREP':
      for (const btn of voyagePrepBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'formation') G.formation = btn.data;
          if (btn.action === 'embark') doEmbark();
          if (btn.action === 'backToPort') beginTransition(G.state, 'PORT');
          G.sfx && G.sfx.playSfx('click');
          return;
        }
      }
      break;

    case 'VOYAGE_MAP':
      for (const btn of voyageMapBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'advance') {
            advanceToNode(btn.data);
          }
          return;
        }
      }
      break;

    case 'VOYAGE_EVENT':
      for (const btn of eventBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'eventChoice') resolveEvent(btn.data);
          if (btn.action === 'eventContinue') continueAfterEvent();
          G.sfx && G.sfx.playSfx('click');
          return;
        }
      }
      break;

    case 'BATTLE_SETUP':
      for (const btn of battleSetupBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'startBattle') {
            enterState(G.boss ? 'BATTLE_BOSS' : 'BATTLE');
          }
          G.sfx && G.sfx.playSfx('click');
          return;
        }
      }
      break;

    case 'BATTLE': case 'BATTLE_BOSS':
      // Check battle HUD buttons
      for (const btn of battleBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'cannon') G.cannonType = btn.data;
          if (btn.action === 'mobileAttack') {
            const target = G.boss || G.enemies[0];
            if (target) fireCannon(target.x, target.y);
          }
          G.sfx && G.sfx.playSfx('click');
          return;
        }
      }
      // Click on enemy to fire
      for (const e of G.enemies) {
        if (dist(cx, cy, e.x, e.y) < 50) {
          fireCannon(e.x, e.y);
          return;
        }
      }
      // Click on boss
      if (G.boss && dist(cx, cy, G.boss.x, G.boss.y) < 80) {
        fireCannon(G.boss.x, G.boss.y);
        return;
      }
      // Click on player ship to select
      G.ships.forEach((s, i) => {
        if (s.hp > 0 && dist(cx, cy, s.x, s.y) < 40) {
          G.selectedShipIdx = i;
          G.ships.forEach((s2, j) => { s2.selected = j === i; });
        }
      });
      break;

    case 'BOARDING':
      attemptBoardingStrike();
      break;

    case 'BATTLE_RESULT':
      for (const btn of resultBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'returnPort') beginTransition(G.state, 'PORT');
          return;
        }
      }
      // Also allow tap anywhere
      beginTransition(G.state, 'PORT');
      break;

    case 'UPGRADE':
      for (const btn of upgradeBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'upgrade' && btn.data) {
            btn.data.apply();
            beginTransition(G.state, 'VOYAGE_MAP');
          }
          return;
        }
      }
      break;

    case 'GAMEOVER': case 'VICTORY':
      resetGame();
      beginTransition(G.state, 'TITLE', 0.3);
      break;

    case 'CONFIRM_MODAL':
      for (const btn of modalBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'modalConfirm' && G.modalOnConfirm) G.modalOnConfirm();
          if (btn.action === 'modalCancel' && G.modalOnCancel) G.modalOnCancel();
          return;
        }
      }
      break;

    case 'PAUSED':
      enterState(G.prevState);
      break;

    case 'SETTINGS':
      for (const btn of settingsBtns) {
        if (hitTest(cx, cy, btn)) {
          if (btn.action === 'toggleLang') {
            G.lang = G.lang === 'ko' ? 'en' : 'ko';
            saveGame();
          }
          if (btn.action === 'sfxVol') {
            const v = (cx - btn.x) / btn.w;
            if (G.sfx) G.sfx.setSfxVol(Math.max(0, Math.min(1, v)));
          }
          if (btn.action === 'bgmVol') {
            const v = (cx - btn.x) / btn.w;
            if (G.sfx) G.sfx.setBgmVol(Math.max(0, Math.min(1, v)));
          }
          if (btn.action === 'settingsBack') {
            saveGame();
            beginTransition(G.state, 'TITLE', 0.2);
          }
          return;
        }
      }
      break;
  }
}

// Handle port action buttons
function handlePortAction(btn) {
  switch(btn.action) {
    case 'sail':
      beginTransition(G.state, 'VOYAGE_PREP');
      break;
    case 'prevSea':
      if (G.currentSea > 0) G.currentSea--;
      break;
    case 'nextSea':
      if (G.currentSea < 4 && canAccessSea(G.currentSea + 1)) G.currentSea++;
      break;
    case 'build':
      buildFacility(btn.data);
      break;
    case 'buy':
      buyTradeGood(btn.data);
      break;
    case 'sell':
      sellTradeGood(btn.data);
      break;
    case 'hire':
      hireCrew(btn.data);
      break;
    case 'settings':
      G.prevState = G.state;
      beginTransition(G.state, 'SETTINGS', 0.2);
      break;
  }
  G.sfx && G.sfx.playSfx('click');
}

// Game flow helpers
function startNewGame() {
  loadGame();
  G.cutsceneText = t('prologue');
  beginTransition('TITLE', 'CUTSCENE', 0.5);
}

function doEmbark() {
  if (G.supplies < 20) return;
  G.supplies -= 20;
  G.sfx && G.sfx.playSfx('horn_blow');
  generateVoyageRoute();
  beginTransition(G.state, 'VOYAGE_MAP');
}

function advanceVoyage() {
  if (G.voyagePos < G.voyageRoute.length - 1) {
    advanceToNode(G.voyagePos + 1);
  }
}

function advanceToNode(nodeIdx) {
  G.voyagePos = nodeIdx;
  const node = G.voyageRoute[nodeIdx];
  node.visited = true;
  G.supplies -= 5;

  // Weather change chance
  if (G.rng.next() < 0.3) {
    const weathers = ['clear','cloudy','rain','storm','fog'];
    G.weather = G.rng.pick(weathers);
  }

  if (node.type === 'boss') {
    initBossBattle();
    beginTransition(G.state, 'BATTLE_SETUP');
  } else if (node.type === 'event') {
    beginTransition(G.state, 'VOYAGE_EVENT');
  } else {
    // Regular battle
    beginTransition(G.state, 'BATTLE_SETUP');
  }
}

function resolveEvent(choiceIdx) {
  if (G.eventResolved) return;
  G.eventResolved = true;
  const choice = G.eventChoices[choiceIdx];
  if (choice && choice.action) choice.action();
  G.stats.eventsCleared++;
}

function continueAfterEvent() {
  // Check if more nodes or return to map
  if (G.voyagePos < G.voyageRoute.length - 1) {
    beginTransition(G.state, 'VOYAGE_MAP');
  } else {
    beginTransition(G.state, 'PORT');
  }
}

function selectNextShip() {
  let next = G.selectedShipIdx;
  for (let i = 1; i <= G.ships.length; i++) {
    const idx = (G.selectedShipIdx + i) % G.ships.length;
    if (G.ships[idx].hp > 0) { next = idx; break; }
  }
  G.selectedShipIdx = next;
  G.ships.forEach((s, i) => { s.selected = i === next; });
}

function cycleFormation() {
  const forms = ['attack','defense','wedge'];
  const idx = forms.indexOf(G.formation);
  G.formation = forms[(idx + 1) % 3];
  G.sfx && G.sfx.playSfx('click');
}

function findClosestEnemy(ship) {
  if (!ship) return null;
  let best = null, bestD = Infinity;
  for (const e of G.enemies) {
    const d = dist(ship.x, ship.y, e.x, e.y);
    if (d < bestD) { bestD = d; best = e; }
  }
  if (G.boss && G.boss.hp > 0) {
    const d = dist(ship.x, ship.y, G.boss.x, G.boss.y);
    if (d < bestD) { best = G.boss; }
  }
  return best;
}

function attemptBoardingStrike() {
  const t2 = G.boardingTimer % 2;
  const targetCenter = 0.8; // 40% of bar
  const windowSize = CONFIG.BOARD_WINDOW * 0.15;
  const hitPos = t2 / 2;
  if (Math.abs(hitPos - 0.4) < windowSize / 2) {
    G.boardingHits++;
    G.sfx && G.sfx.playSfx('boarding_clash');
    addPopup(W/2, H * 0.35, 'HIT!', COL.uiGold);
  } else {
    addPopup(W/2, H * 0.35, 'MISS', COL.accentRed);
  }
  if (G.boardingHits >= 3) {
    // Boarding success — destroy nearest enemy
    const ship = G.ships[G.selectedShipIdx];
    const closest = findClosestEnemy(ship);
    if (closest) {
      closest.hp = 0;
      const idx = G.enemies.indexOf(closest);
      if (idx >= 0) {
        G.totalScore += Math.round(closest.maxHp * 0.8);
        G.enemies.splice(idx, 1);
      }
      spawnExplosion(closest.x, closest.y);
    }
    beginTransition(G.state, G.boss ? 'BATTLE_BOSS' : 'BATTLE');
  }
}

function initAudioOnGesture() {
  if (!G.sfx) {
    G.sfx = new SoundManager();
  }
  G.sfx.init();
}

// Main game loop with dt cap [F4]
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, CONFIG.MAX_DT);
    lastTime = timestamp;

    // Continuous input
    handleContinuousInput(dt);

    // System updates based on state matrix [F7]
    const sys = ACTIVE_SYSTEMS[G.state];
    if (sys) {
      if (sys.tween && G.tw) G.tw.update(dt);
      if (sys.physics) updatePhysics(dt);
      if (sys.weather) updateWeather(dt);
      if (sys.economy) updateEconomy(dt);
      if (sys.ai) updateEnemyAI(dt);
      if (sys.particles) updateParticles(dt);
      if (sys.idle) updateIdleProduction(dt);
    }

    // Shake timer decay
    if (G.shakeTimer > 0) {
      G.shakeTimer -= dt;
      if (G.shakeTimer <= 0) { G.shakeTimer = 0; G.shakeIntensity = 0; }
    }

    // Cutscene timer
    if (G.state === 'CUTSCENE') G.cutsceneTimer += dt;

    // Boarding timer
    if (G.state === 'BOARDING') G.boardingTimer += dt * 3;

    // Play time
    G.playTime += dt;

    // Render
    render(timestamp);

    // Reset click states
    mouse.clicked = false;
    mouse.rightClicked = false;

  } catch(e) {
    console.error('gameLoop error:', e);
    ctx.fillStyle = '#200000';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4444';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Error: ' + e.message, W/2, H/2);
  }

  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════════════════════
// ══ REGION 12: INITIALIZATION ══
// ══════════════════════════════════════════════════════════════

// Game initialization
async function init() {
  G.tw = new TweenManager();
  G.rng = new SeededRNG(Date.now() % 100000);
  G.sfx = new SoundManager();
  G.loadProgress = 0.1;

  // Preload assets
  await preloadAssets();
  G.loadProgress = 0.8;

  // Load save data
  loadGame();
  G.loadProgress = 1.0;
  G.loaded = true;

  // Enter title
  enterState('TITLE');

  // Start game loop
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Start
init();
</script>
