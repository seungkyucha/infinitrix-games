<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Gold coin gradient -->
    <radialGradient id="coinMain" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#F1C40F"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <!-- Inner ring gradient -->
    <linearGradient id="coinRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="coinGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#F1C40F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F1C40F" stop-opacity="0"/>
    </radialGradient>
    <!-- Highlight gradient -->
    <radialGradient id="coinHL" cx="0.35" cy="0.3" r="0.3">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="starGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#F1C40F" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="24" cy="24" r="22" fill="url(#coinGlow)"/>

  <!-- Main coin body -->
  <circle cx="24" cy="24" r="18" fill="url(#coinMain)" stroke="#8B6914" stroke-width="1" filter="url(#starGlow)"/>

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="url(#coinRing)" stroke-width="1.2"/>

  <!-- Square hole (traditional Japanese coin) -->
  <rect x="20" y="20" width="8" height="8" rx="0.5" fill="#8B6914" stroke="#6B4F12" stroke-width="0.5"/>
  <rect x="21" y="21" width="6" height="6" rx="0.3" fill="#4A3508"/>

  <!-- Kanji characters around square -->
  <text x="24" y="19" font-size="4" fill="#8B6914" text-anchor="middle" font-weight="bold">金</text>
  <text x="24" y="34" font-size="3.5" fill="#8B6914" text-anchor="middle">宝</text>
  <text x="17" y="25.5" font-size="3" fill="#8B6914" text-anchor="middle">忍</text>
  <text x="31" y="25.5" font-size="3" fill="#8B6914" text-anchor="middle">道</text>

  <!-- Edge details - notches -->
  <circle cx="24" cy="7" r="1" fill="#D4A017"/>
  <circle cx="24" cy="41" r="1" fill="#8B6914"/>
  <circle cx="7" cy="24" r="1" fill="#D4A017"/>
  <circle cx="41" cy="24" r="1" fill="#8B6914"/>
  <circle cx="12" cy="12" r="0.8" fill="#B8860B"/>
  <circle cx="36" cy="12" r="0.8" fill="#B8860B"/>
  <circle cx="12" cy="36" r="0.8" fill="#6B4F12"/>
  <circle cx="36" cy="36" r="0.8" fill="#6B4F12"/>

  <!-- Highlight -->
  <circle cx="24" cy="24" r="14" fill="url(#coinHL)"/>
  <ellipse cx="17" cy="16" rx="4" ry="3" fill="#FFFFFF" opacity="0.25" transform="rotate(-30,17,16)"/>

  <!-- Sparkle rays -->
  <path d="M24 2 L24.5 5 L24 8 L23.5 5Z" fill="#FFE066" opacity="0.6"/>
  <path d="M24 40 L24.5 43 L24 46 L23.5 43Z" fill="#FFE066" opacity="0.4"/>
  <path d="M2 24 L5 24.5 L8 24 L5 23.5Z" fill="#FFE066" opacity="0.6"/>
  <path d="M40 24 L43 24.5 L46 24 L43 23.5Z" fill="#FFE066" opacity="0.4"/>

  <!-- Diagonal sparkles -->
  <path d="M9 9 L10.5 11 L12 9 L10.5 7Z" fill="#FFFFFF" opacity="0.3"/>
  <path d="M36 9 L37.5 11 L39 9 L37.5 7Z" fill="#FFFFFF" opacity="0.3"/>

  <!-- Ink splatter signature -->
  <circle cx="40" cy="8" r="1.2" fill="#1A1A2E" opacity="0.2"/>
  <circle cx="41" cy="10" r="0.6" fill="#1A1A2E" opacity="0.15"/>
</svg>