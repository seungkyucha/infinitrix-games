<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Core explosion gradient -->
    <radialGradient id="hitCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFE066"/>
      <stop offset="45%" stop-color="#FF6B35"/>
      <stop offset="70%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <!-- Shockwave gradient -->
    <radialGradient id="shockwave" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="75%" stop-color="#E74C3C" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#E74C3C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow energy ring -->
    <radialGradient id="shadowRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="70%" stop-color="#00B4D8" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#2E4057" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Blur filter -->
    <filter id="hitBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <!-- Glow filter -->
    <filter id="hitGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Outermost shadow ring -->
  <circle cx="64" cy="64" r="58" fill="url(#shadowRing)" opacity="0.5"/>

  <!-- Layer 2: Ink splatter ring -->
  <g id="inkSplatter" opacity="0.3">
    <path d="M64 10 Q70 20 68 30 Q72 22 78 14" stroke="#1A1A2E" stroke-width="2" fill="none"/>
    <path d="M108 40 Q98 46 90 44 Q100 50 110 52" stroke="#1A1A2E" stroke-width="2" fill="none"/>
    <path d="M110 80 Q100 78 92 82 Q100 86 108 92" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>
    <path d="M64 118 Q60 108 62 98 Q56 106 50 114" stroke="#1A1A2E" stroke-width="2" fill="none"/>
    <path d="M20 88 Q30 84 36 86 Q28 82 18 76" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>
    <path d="M16 48 Q26 50 34 46 Q24 42 16 36" stroke="#1A1A2E" stroke-width="2" fill="none"/>
    <!-- Ink drops -->
    <circle cx="72" cy="16" r="2" fill="#1A1A2E"/>
    <circle cx="108" cy="56" r="1.5" fill="#1A1A2E"/>
    <circle cx="54" cy="112" r="2" fill="#1A1A2E"/>
    <circle cx="14" cy="62" r="1.5" fill="#1A1A2E"/>
  </g>

  <!-- Layer 3: Outer shockwave -->
  <circle cx="64" cy="64" r="48" fill="url(#shockwave)" opacity="0.6"/>

  <!-- Layer 4: Energy spike rays -->
  <g id="spikes" opacity="0.6" filter="url(#hitGlow)">
    <path d="M64 64 L64 18 L68 30 L64 64Z" fill="#FF6B35" opacity="0.5"/>
    <path d="M64 64 L100 32 L90 44 L64 64Z" fill="#E74C3C" opacity="0.4"/>
    <path d="M64 64 L114 64 L100 68 L64 64Z" fill="#FF6B35" opacity="0.5"/>
    <path d="M64 64 L100 96 L90 86 L64 64Z" fill="#E74C3C" opacity="0.4"/>
    <path d="M64 64 L64 110 L60 98 L64 64Z" fill="#FF6B35" opacity="0.5"/>
    <path d="M64 64 L28 96 L38 84 L64 64Z" fill="#E74C3C" opacity="0.4"/>
    <path d="M64 64 L14 64 L28 60 L64 64Z" fill="#FF6B35" opacity="0.5"/>
    <path d="M64 64 L28 32 L38 44 L64 64Z" fill="#E74C3C" opacity="0.4"/>
  </g>

  <!-- Layer 5: Mid-ring vermillion -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.5"/>
  <circle cx="64" cy="64" r="24" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>

  <!-- Layer 6: Inner fire glow -->
  <circle cx="64" cy="64" r="20" fill="url(#hitCore)" opacity="0.8" filter="url(#hitBlur)"/>

  <!-- Layer 7: Core bright center -->
  <circle cx="64" cy="64" r="12" fill="url(#hitCore)" opacity="0.9"/>
  <circle cx="64" cy="64" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="64" cy="64" r="3" fill="#FFFFFF"/>

  <!-- Spark particles -->
  <g id="sparks" opacity="0.7">
    <circle cx="44" cy="38" r="2" fill="#FFE066"/>
    <circle cx="86" cy="42" r="1.5" fill="#FF6B35"/>
    <circle cx="40" cy="82" r="1.8" fill="#FFE066"/>
    <circle cx="90" cy="78" r="2" fill="#FF6B35"/>
    <circle cx="50" cy="54" r="1" fill="#FFFFFF"/>
    <circle cx="78" cy="52" r="1.2" fill="#FFFFFF"/>
    <circle cx="52" cy="76" r="1" fill="#FFFFFF"/>
    <circle cx="80" cy="74" r="1.3" fill="#FFE066"/>
    <!-- Speed lines -->
    <line x1="46" y1="40" x2="38" y2="30" stroke="#FFE066" stroke-width="0.8" opacity="0.5"/>
    <line x1="84" y1="44" x2="94" y2="34" stroke="#FF6B35" stroke-width="0.8" opacity="0.5"/>
    <line x1="42" y1="80" x2="32" y2="90" stroke="#FFE066" stroke-width="0.8" opacity="0.5"/>
    <line x1="88" y1="76" x2="98" y2="86" stroke="#FF6B35" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Kanji impact symbol -->
  <text x="64" y="68" font-size="8" fill="#FFFFFF" text-anchor="middle" opacity="0.4" font-weight="bold">斬</text>
</svg>