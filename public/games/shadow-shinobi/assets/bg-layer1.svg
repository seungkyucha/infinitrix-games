<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Night sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="30%" stop-color="#0D0D24"/>
      <stop offset="60%" stop-color="#1A1A2E"/>
      <stop offset="85%" stop-color="#2D2D4A"/>
      <stop offset="100%" stop-color="#2E4057"/>
    </linearGradient>
    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="30%" stop-color="#E8E8F0"/>
      <stop offset="60%" stop-color="#C0C0D0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <!-- Far mountain gradient -->
    <linearGradient id="farMtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D4A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <!-- Mist gradient -->
    <linearGradient id="mistGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E4057" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2E4057" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#2E4057" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2E4057" stop-opacity="0"/>
    </linearGradient>
    <!-- Nebula gradient -->
    <radialGradient id="nebula1" cx="0.3" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="#7B2D8E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2D8E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.7" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#2E4057" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2E4057" stop-opacity="0"/>
    </radialGradient>
    <!-- Cloud gradient -->
    <radialGradient id="cloudGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2D2D4A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
