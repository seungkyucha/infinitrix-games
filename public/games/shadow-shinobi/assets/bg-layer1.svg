    <path d="M400 570 Q410 550 420 570 Q430 548 440 570 Q450 555 460 570" fill="#0D0D1A"/>
    <path d="M800 530 Q810 510 820 530 Q830 505 840 530 Q850 515 860 530" fill="#0D0D1A"/>
