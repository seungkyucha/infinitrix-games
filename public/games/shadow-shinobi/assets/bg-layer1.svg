    <line x1="350" y1="530" x2="350" y2="470" stroke="#2D5016" stroke-width="1.5"/>
    <line x1="356" y1="535" x2="356" y2="480" stroke="#2D5016" stroke-width="2"/>
    <line x1="720" y1="500" x2="720" y2="440" stroke="#2D5016" stroke-width="1.5"/>
