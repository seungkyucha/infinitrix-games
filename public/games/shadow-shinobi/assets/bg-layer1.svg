    <circle cx="330" cy="120" r="1.2" fill="#F0F0F0" opacity="0.8"/>
    <circle cx="410" cy="100" r="0.7" fill="#F0F0F0" opacity="0.7"/>
    <circle cx="500" cy="140" r="0.9" fill="#F0F0F0" opacity="0.8"/>
    <circle cx="580" cy="110" r="0.5" fill="#FFB7C5" opacity="0.4"/>
