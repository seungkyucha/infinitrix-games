    <rect x="588" y="380" width="4" height="50" fill="#1A1A2E"/>
    <rect x="608" y="390" width="4" height="40" fill="#1A1A2E"/>
    <path d="M570 430 L570 410 L580 400 L590 410 L590 430Z" fill="#1A1A2E"/>
    <path d="M595 430 L595 395 L605 385 L615 395 L615 430Z" fill="#1A1A2E"/>
