  <ellipse cx="600" cy="350" rx="300" ry="100" fill="#7B2D8E" opacity="0.04"/>
  <ellipse cx="1000" cy="300" rx="180" ry="90" fill="#2E4057" opacity="0.06"/>
  <ellipse cx="150" cy="400" rx="200" ry="80" fill="#00B4D8" opacity="0.03"/>

