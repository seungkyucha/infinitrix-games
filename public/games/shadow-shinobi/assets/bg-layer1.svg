  <!-- Mid mountain range -->
  <path d="M0 550 Q60 470 140 500 Q200 440 300 480 Q380 420 460 460 Q540 400 640 440 Q720 380 800 430 Q880 380 960 420 Q1040 370 1120 410 L1200 450 L1200 550Z" fill="url(#mtGrad)" opacity="0.8"/>

  <!-- Castle silhouette on mountain peak -->
