    <line x1="900" y1="80" x2="840" y2="140" stroke="#F0F0F0" stroke-width="1.5" opacity="0.6"/>
    <line x1="900" y1="80" x2="870" y2="110" stroke="#FFFFFF" stroke-width="0.8" opacity="0.8"/>
    <circle cx="900" cy="80" r="2" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Moon -->
  <g id="moon">
    <circle cx="200" cy="120" r="50" fill="url(#moonGlow)"/>
    <circle cx="200" cy="120" r="35" fill="#E8E8F0"/>
    <!-- Moon craters -->
    <circle cx="188" cy="108" r="6" fill="#C8C8D8" opacity="0.4"/>
    <circle cx="210" cy="125" r="8" fill="#C8C8D8" opacity="0.3"/>
    <circle cx="195" cy="135" r="4" fill="#C8C8D8" opacity="0.35"/>
    <circle cx="208" cy="110" r="3" fill="#C8C8D8" opacity="0.25"/>
    <!-- Moon halo -->
    <circle cx="200" cy="120" r="60" fill="none" stroke="#F0F0F0" stroke-width="0.5" opacity="0.15"/>
    <circle cx="200" cy="120" r="75" fill="none" stroke="#F0F0F0" stroke-width="0.3" opacity="0.08"/>
  </g>

  <!-- Distant pagoda silhouettes -->
