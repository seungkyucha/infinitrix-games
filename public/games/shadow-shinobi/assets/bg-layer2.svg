<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <!-- Stone gradient -->
    <linearGradient id="stoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A50"/>
      <stop offset="50%" stop-color="#2D2D4A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <!-- Wood gradient -->
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C4033"/>
      <stop offset="50%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#5C4033"/>
    </linearGradient>
    <!-- Bamboo gradient -->
    <linearGradient id="bambooGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3A0A"/>
      <stop offset="50%" stop-color="#2D5016"/>
      <stop offset="100%" stop-color="#1A3A0A"/>
    </linearGradient>
    <!-- Lantern glow -->
    <radialGradient id="lanternGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FF6B35" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <!-- Cherry blossom gradient -->
    <radialGradient id="blossomGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD4DD"/>
      <stop offset="60%" stop-color="#FFB7C5"/>
      <stop offset="100%" stop-color="#FF9EB0"/>
    </radialGradient>
    <!-- Fog layer -->
    <linearGradient id="fogLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D2D4A" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2D2D4A" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#2D2D4A" stop-opacity="0.25"/>
      <stop offset="80%" stop-color="#2D2D4A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2D2D4A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Midground terrain base -->
  <path d="M0 500 Q100 460 200 480 Q300 440 400 470 Q500 430 600 460 Q700 420 800 450 Q900 410 1000 440 Q1100 400 1200 430 L1200 800 L0 800Z" fill="url(#groundGrad)"/>

  <!-- Rocky cliff formations -->
  <g id="cliffs">
    <!-- Left cliff -->
    <path d="M0 380 Q20 360 40 370 Q60 340 80 360 L100 380 Q120 400 100 430 L80 460 Q60 480 40 470 L0 440Z" fill="url(#stoneGrad)"/>
    <path d="M10 390 Q30 375 50 385 Q70 355 90 375" stroke="#2D2D4A" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M15 420 Q35 410 55 425" stroke="#3A3A50" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Mid-left rock outcrop -->
    <path d="M280 430 Q300 400 320 410 Q340 390 360 410 L370 440 Q360 460 340 460 L300 460 Q280 455 280 430Z" fill="url(#stoneGrad)"/>
    <path d="M290 435 Q310 415 330 425" stroke="#3A3A50" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Right cliff -->
    <path d="M1080 400 Q1100 370 1120 380 Q1140 350 1160 370 Q1180 360 1200 380 L1200 480 Q1180 470 1160 475 Q1140 480 1120 470 L1100 450 Q1080 440 1080 400Z" fill="url(#stoneGrad)"/>
    <path d="M1090 420 Q1110 395 1130 410 Q1150 385 1170 400" stroke="#2D2D4A" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Torii gate (red) -->
  <g id="torii">
    <rect x="520" y="340" width="10" height="180" fill="#C0392B"/>
    <rect x="670" y="340" width="10" height="180" fill="#C0392B"/>
    <!-- Top beam -->
    <path d="M505 340 Q600 330 695 340 Q600 336 505 340Z" fill="#E74C3C"/>
    <rect x="510" y="340" width="180" height="8" rx="3" fill="#E74C3C"/>
    <!-- Second beam -->
    <rect x="518" y="360" width="164" height="6" rx="2" fill="#C0392B"/>
    <!-- Stone base -->
    <rect x="515" y="515" width="20" height="10" rx="2" fill="#3A3A50"/>
    <rect x="665" y="515" width="20" height="10" rx="2" fill="#3A3A50"/>
  </g>

  <!-- Japanese stone lanterns -->
  <g id="lanterns">
    <!-- Lantern 1 -->
    <g transform="translate(180, 440)">
      <rect x="-4" y="0" width="8" height="30" fill="#3A3A50"/>
      <rect x="-8" y="-12" width="16" height="14" rx="1" fill="#3A3A50"/>
      <path d="M-10 -14 L0 -20 L10 -14Z" fill="#3A3A50"/>
      <rect x="-5" y="-7" width="4" height="6" rx="1" fill="#F1C40F" opacity="0.6"/>
      <rect x="1" y="-7" width="4" height="6" rx="1" fill="#F1C40F" opacity="0.6"/>
      <circle cx="0" cy="-4" r="12" fill="url(#lanternGlow)" opacity="0.5"/>
      <rect x="-10" y="30" width="20" height="4" rx="1" fill="#3A3A50"/>
    </g>

    <!-- Lantern 2 -->
    <g transform="translate(820, 420)">
      <rect x="-4" y="0" width="8" height="30" fill="#3A3A50"/>
      <rect x="-8" y="-12" width="16" height="14" rx="1" fill="#3A3A50"/>
      <path d="M-10 -14 L0 -20 L10 -14Z" fill="#3A3A50"/>
      <rect x="-5" y="-7" width="4" height="6" rx="1" fill="#F1C40F" opacity="0.6"/>
      <rect x="1" y="-7" width="4" height="6" rx="1" fill="#F1C40F" opacity="0.6"/>
      <circle cx="0" cy="-4" r="12" fill="url(#lanternGlow)" opacity="0.5"/>
      <rect x="-10" y="30" width="20" height="4" rx="1" fill="#3A3A50"/>
    </g>
  </g>

  <!-- Bamboo grove left -->
  <g id="bambooLeft" opacity="0.7">
    <line x1="50" y1="200" x2="50" y2="500" stroke="url(#bambooGrad)" stroke-width="5"/>
    <line x1="65" y1="180" x2="65" y2="490" stroke="url(#bambooGrad)" stroke-width="4"/>
    <line x1="78" y1="210" x2="78" y2="500" stroke="url(#bambooGrad)" stroke-width="5"/>
    <line x1="92" y1="190" x2="92" y2="490" stroke="url(#bambooGrad)" stroke-width="3.5"/>
    <line x1="105" y1="220" x2="105" y2="500" stroke="url(#bambooGrad)" stroke-width="4"/>
    <!-- Bamboo joints -->
    <rect x="47" y="280" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="47" y="380" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="62" y="260" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="62" y="360" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="75" y="300" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="75" y="400" width="6" height="3" rx="1" fill="#3A6018"/>
    <!-- Bamboo leaves -->
    <path d="M50 200 Q30 190 20 200 Q35 195 50 200Z" fill="#2D5016" opacity="0.6"/>
    <path d="M50 200 Q40 180 45 170 Q48 185 50 200Z" fill="#2D5016" opacity="0.5"/>
    <path d="M65 180 Q80 170 90 175 Q78 174 65 180Z" fill="#2D5016" opacity="0.6"/>
    <path d="M65 180 Q55 165 58 155 Q60 168 65 180Z" fill="#2D5016" opacity="0.5"/>
    <path d="M78 210 Q60 200 55 210 Q65 205 78 210Z" fill="#2D5016" opacity="0.5"/>
    <path d="M105 220 Q120 210 130 215 Q118 213 105 220Z" fill="#2D5016" opacity="0.6"/>
  </g>

  <!-- Bamboo grove right -->
  <g id="bambooRight" opacity="0.6">
    <line x1="1100" y1="190" x2="1100" y2="480" stroke="url(#bambooGrad)" stroke-width="4.5"/>
    <line x1="1115" y1="170" x2="1115" y2="470" stroke="url(#bambooGrad)" stroke-width="3.5"/>
    <line x1="1130" y1="200" x2="1130" y2="480" stroke="url(#bambooGrad)" stroke-width="5"/>
    <line x1="1145" y1="185" x2="1145" y2="475" stroke="url(#bambooGrad)" stroke-width="4"/>
    <!-- Joints -->
    <rect x="1097" y="280" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="1097" y="380" width="6" height="3" rx="1" fill="#3A6018"/>
    <rect x="1127" y="300" width="6" height="3" rx="1" fill="#3A6018"/>
    <!-- Leaves -->
    <path d="M1100 190 Q1085 180 1078 188 Q1090 184 1100 190Z" fill="#2D5016" opacity="0.6"/>
    <path d="M1130 200 Q1150 190 1158 196 Q1146 193 1130 200Z" fill="#2D5016" opacity="0.5"/>
    <path d="M1115 170 Q1105 155 1110 148 Q1112 158 1115 170Z" fill="#2D5016" opacity="0.5"/>
  </g>

  <!-- Stone path -->
  <g id="stonePath" opacity="0.4">
    <ellipse cx="400" cy="530" rx="20" ry="6" fill="#3A3A50"/>
    <ellipse cx="440" cy="540" rx="15" ry="5" fill="#2D2D4A"/>
    <ellipse cx="480" cy="535" rx="18" ry="6" fill="#3A3A50"/>
    <ellipse cx="520" cy="545" rx="14" ry="5" fill="#2D2D4A"/>
    <ellipse cx="560" cy="540" rx="16" ry="6" fill="#3A3A50"/>
    <ellipse cx="600" cy="548" rx="18" ry="5" fill="#2D2D4A"/>
    <ellipse cx="640" cy="542" rx="15" ry="6" fill="#3A3A50"/>
    <ellipse cx="680" cy="550" rx="17" ry="5" fill="#2D2D4A"/>
    <ellipse cx="720" cy="545" rx="14" ry="6" fill="#3A3A50"/>
    <ellipse cx="760" cy="552" rx="16" ry="5" fill="#2D2D4A"/>
  </g>

  <!-- Cherry blossom petals floating -->
  <g id="blossoms" opacity="0.5">
    <ellipse cx="200" cy="300" rx="4" ry="2.5" fill="url(#blossomGrad)" transform="rotate(30,200,300)"/>
    <ellipse cx="350" cy="350" rx="3" ry="2" fill="url(#blossomGrad)" transform="rotate(-20,350,350)"/>
    <ellipse cx="500" cy="280" rx="3.5" ry="2" fill="url(#blossomGrad)" transform="rotate(45,500,280)"/>
    <ellipse cx="650" cy="320" rx="4" ry="2.5" fill="url(#blossomGrad)" transform="rotate(-15,650,320)"/>
    <ellipse cx="800" cy="350" rx="3" ry="2" fill="url(#blossomGrad)" transform="rotate(60,800,350)"/>
    <ellipse cx="950" cy="300" rx="3.5" ry="2" fill="url(#blossomGrad)" transform="rotate(-40,950,300)"/>
    <ellipse cx="120" cy="380" rx="3" ry="1.8" fill="url(#blossomGrad)" transform="rotate(25,120,380)"/>
    <ellipse cx="430" cy="400" rx="2.5" ry="1.5" fill="url(#blossomGrad)" transform="rotate(-55,430,400)"/>
    <ellipse cx="750" cy="380" rx="3" ry="2" fill="url(#blossomGrad)" transform="rotate(35,750,380)"/>
    <ellipse cx="1050" cy="360" rx="3.5" ry="2" fill="url(#blossomGrad)" transform="rotate(-25,1050,360)"/>
    <ellipse cx="280" cy="250" rx="2.5" ry="1.5" fill="#FFD4DD" transform="rotate(70,280,250)" opacity="0.4"/>
    <ellipse cx="580" cy="240" rx="3" ry="1.8" fill="#FFD4DD" transform="rotate(-30,580,240)" opacity="0.3"/>
    <ellipse cx="880" cy="260" rx="2" ry="1.2" fill="#FFD4DD" transform="rotate(50,880,260)" opacity="0.4"/>
  </g>

  <!-- Fog layers -->
  <g id="fog">
    <ellipse cx="400" cy="500" rx="350" ry="40" fill="url(#fogLayer)"/>
    <ellipse cx="900" cy="480" rx="300" ry="35" fill="url(#fogLayer)"/>
    <ellipse cx="200" cy="520" rx="250" ry="30" fill="#2D2D4A" opacity="0.1"/>
    <ellipse cx="1000" cy="510" rx="200" ry="25" fill="#2D2D4A" opacity="0.08"/>
    <ellipse cx="600" cy="550" rx="500" ry="50" fill="#2D2D4A" opacity="0.06"/>
  </g>

  <!-- Wooden bridge -->
  <g id="bridge" opacity="0.5">
    <path d="M900 480 Q950 470 1000 480" stroke="#5C4033" stroke-width="4" fill="none"/>
    <line x1="910" y1="478" x2="910" y2="500" stroke="#3D2B1F" stroke-width="2"/>
    <line x1="930" y1="474" x2="930" y2="496" stroke="#3D2B1F" stroke-width="2"/>
    <line x1="950" y1="472" x2="950" y2="494" stroke="#3D2B1F" stroke-width="2"/>
    <line x1="970" y1="474" x2="970" y2="496" stroke="#3D2B1F" stroke-width="2"/>
    <line x1="990" y1="478" x2="990" y2="500" stroke="#3D2B1F" stroke-width="2"/>
    <!-- Rope rails -->
    <path d="M900 472 Q950 462 1000 472" stroke="#5C4033" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Fireflies -->
  <g id="fireflies" opacity="0.5">
    <circle cx="250" cy="450" r="2.5" fill="#F1C40F" opacity="0.6"/>
    <circle cx="260" cy="445" r="1" fill="#F1C40F" opacity="0.3"/>
    <circle cx="480" cy="420" r="2" fill="#F1C40F" opacity="0.5"/>
    <circle cx="700" cy="440" r="2.5" fill="#F1C40F" opacity="0.6"/>
    <circle cx="710" cy="435" r="1" fill="#F1C40F" opacity="0.3"/>
    <circle cx="950" cy="450" r="2" fill="#F1C40F" opacity="0.5"/>
    <circle cx="150" cy="430" r="1.5" fill="#00B4D8" opacity="0.4"/>
    <circle cx="600" cy="400" r="1.5" fill="#00B4D8" opacity="0.4"/>
    <circle cx="1050" cy="430" r="1.5" fill="#00B4D8" opacity="0.3"/>
  </g>

  <!-- Ground moss/grass tufts -->
  <g id="grass" opacity="0.3">
    <path d="M150 500 Q155 490 160 500 Q165 488 170 500" stroke="#2D5016" stroke-width="1.5" fill="none"/>
    <path d="M350 490 Q355 480 360 490 Q365 478 370 490" stroke="#2D5016" stroke-width="1.5" fill="none"/>
    <path d="M550 500 Q555 488 560 500" stroke="#2D5016" stroke-width="1" fill="none"/>
    <path d="M750 490 Q755 478 760 490 Q765 476 770 490" stroke="#2D5016" stroke-width="1.5" fill="none"/>
    <path d="M1000 500 Q1005 488 1010 500" stroke="#2D5016" stroke-width="1" fill="none"/>
  </g>

  <!-- Foreground dark ground -->
  <path d="M0 580 Q200 560 400 575 Q600 555 800 570 Q1000 550 1200 565 L1200 800 L0 800Z" fill="#0D0D1A" opacity="0.85"/>

  <!-- Small rocks in foreground -->
  <g id="fgRocks" opacity="0.5">
    <ellipse cx="100" cy="600" rx="15" ry="8" fill="#2D2D4A"/>
    <ellipse cx="400" cy="590" rx="12" ry="6" fill="#3A3A50"/>
    <ellipse cx="700" cy="595" rx="18" ry="9" fill="#2D2D4A"/>
    <ellipse cx="1000" cy="588" rx="14" ry="7" fill="#3A3A50"/>
  </g>
</svg>