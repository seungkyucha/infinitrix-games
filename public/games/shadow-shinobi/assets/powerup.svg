<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Scroll body gradient -->
    <linearGradient id="scrollBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="30%" stop-color="#E8D5A8"/>
      <stop offset="70%" stop-color="#D4C094"/>
      <stop offset="100%" stop-color="#C4A872"/>
    </linearGradient>
    <!-- Scroll cap gradient -->
    <linearGradient id="scrollCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="50%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <!-- Energy aura -->
    <radialGradient id="scrollAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#00B4D8" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#2E4057" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold seal gradient -->
    <radialGradient id="sealGrad" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="scrollGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#00B4D8" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Hexagon frame pattern -->
    <linearGradient id="hexFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F1C40F" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Energy aura layers -->
  <circle cx="32" cy="32" r="30" fill="url(#scrollAura)"/>
  <circle cx="32" cy="32" r="24" fill="#00B4D8" opacity="0.06"/>

  <!-- Hexagonal frame -->
  <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18Z" fill="none" stroke="url(#hexFrame)" stroke-width="1" opacity="0.5"/>
  <path d="M32 8 L52 20 L52 44 L32 56 L12 44 L12 20Z" fill="none" stroke="#00B4D8" stroke-width="0.5" opacity="0.3"/>

  <!-- Orbiting energy wisps -->
  <g id="wisps" opacity="0.5">
    <circle cx="10" cy="20" r="1.5" fill="#00B4D8"/>
    <circle cx="54" cy="20" r="1.2" fill="#00B4D8"/>
    <circle cx="10" cy="44" r="1" fill="#00B4D8"/>
    <circle cx="54" cy="44" r="1.3" fill="#00B4D8"/>
    <path d="M8 20 Q6 24 10 28" stroke="#00B4D8" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M56 20 Q58 24 54 28" stroke="#00B4D8" stroke-width="0.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Scroll body (main item) -->
  <g id="scroll" filter="url(#scrollGlow)">
    <!-- Scroll paper -->
    <rect x="20" y="16" width="24" height="32" rx="2" fill="url(#scrollBody)" stroke="#C4A872" stroke-width="0.5"/>
    <!-- Paper texture lines -->
    <line x1="22" y1="22" x2="42" y2="22" stroke="#C4A872" stroke-width="0.3" opacity="0.4"/>
    <line x1="22" y1="26" x2="42" y2="26" stroke="#C4A872" stroke-width="0.3" opacity="0.3"/>
    <line x1="22" y1="30" x2="42" y2="30" stroke="#C4A872" stroke-width="0.3" opacity="0.3"/>
    <line x1="22" y1="34" x2="42" y2="34" stroke="#C4A872" stroke-width="0.3" opacity="0.3"/>
    <line x1="22" y1="38" x2="42" y2="38" stroke="#C4A872" stroke-width="0.3" opacity="0.4"/>
    <line x1="22" y1="42" x2="42" y2="42" stroke="#C4A872" stroke-width="0.3" opacity="0.3"/>

    <!-- Top scroll cap -->
    <rect x="18" y="14" width="28" height="5" rx="2.5" fill="url(#scrollCap)" stroke="#8B1A1A" stroke-width="0.3"/>
    <ellipse cx="18" cy="16.5" rx="2" ry="2.5" fill="#C0392B"/>
    <ellipse cx="46" cy="16.5" rx="2" ry="2.5" fill="#C0392B"/>
    <!-- Bottom scroll cap -->
    <rect x="18" y="45" width="28" height="5" rx="2.5" fill="url(#scrollCap)" stroke="#8B1A1A" stroke-width="0.3"/>
    <ellipse cx="18" cy="47.5" rx="2" ry="2.5" fill="#C0392B"/>
    <ellipse cx="46" cy="47.5" rx="2" ry="2.5" fill="#C0392B"/>

    <!-- Kanji on scroll (jutsu symbol) -->
    <text x="32" y="35" font-size="12" fill="#E74C3C" text-anchor="middle" font-weight="bold" opacity="0.8">術</text>

    <!-- Gold seal -->
    <circle cx="38" cy="42" r="4" fill="url(#sealGrad)" stroke="#D4A017" stroke-width="0.3"/>
    <text x="38" y="43.5" font-size="4" fill="#8B6914" text-anchor="middle" font-weight="bold">印</text>

    <!-- Highlight on scroll -->
    <rect x="22" y="17" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.2"/>
  </g>

  <!-- Energy sound wave arcs -->
  <g id="soundWaves" opacity="0.3">
    <path d="M14 28 Q10 32 14 36" stroke="#00B4D8" stroke-width="0.8" fill="none"/>
    <path d="M11 26 Q6 32 11 38" stroke="#00B4D8" stroke-width="0.6" fill="none"/>
    <path d="M50 28 Q54 32 50 36" stroke="#00B4D8" stroke-width="0.8" fill="none"/>
    <path d="M53 26 Q58 32 53 38" stroke="#00B4D8" stroke-width="0.6" fill="none"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="14" cy="12" r="1" fill="#F1C40F" opacity="0.5"/>
  <circle cx="50" cy="12" r="1" fill="#F1C40F" opacity="0.5"/>
  <circle cx="14" cy="52" r="1" fill="#F1C40F" opacity="0.4"/>
  <circle cx="50" cy="52" r="1" fill="#F1C40F" opacity="0.4"/>

  <!-- Sparkle at top -->
  <path d="M32 6 L33 3 L32 0 L31 3Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M32 6 L35 5 L32 4 L29 5Z" fill="#FFFFFF" opacity="0.3"/>

  <!-- Ink splatter signature -->
  <circle cx="52" cy="8" r="1.5" fill="#1A1A2E" opacity="0.25"/>
  <circle cx="54" cy="10" r="0.7" fill="#1A1A2E" opacity="0.2"/>
  <circle cx="50" cy="6" r="0.5" fill="#1A1A2E" opacity="0.2"/>
</svg>