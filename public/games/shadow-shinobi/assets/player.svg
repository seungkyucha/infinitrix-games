<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Body gradient - dark ninja suit -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E4057"/>
      <stop offset="50%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <!-- Shadow energy aura -->
    <radialGradient id="shadowAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#2E4057" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <!-- Scarf vermillion gradient -->
    <linearGradient id="scarfGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="50%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <!-- Blade gradient -->
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="50%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#708090"/>
    </linearGradient>
    <!-- Shadow glow filter -->
    <filter id="shadowGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Rim light filter -->
    <filter id="rimLight" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#00B4D8" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shadow energy aura background -->
  <g id="aura">
    <ellipse cx="64" cy="68" rx="38" ry="42" fill="url(#shadowAura)" opacity="0.5"/>
    <ellipse cx="64" cy="70" rx="28" ry="32" fill="#00B4D8" opacity="0.08"/>
  </g>

  <!-- Legs -->
  <g id="legs">
    <!-- Left leg -->
    <path d="M50 88 L46 108 Q44 114 48 116 L54 116 Q56 114 55 110 L56 88Z" fill="url(#bodyGrad)" stroke="#0D0D1A" stroke-width="0.5"/>
    <!-- Right leg -->
    <path d="M66 88 L68 108 Q70 114 74 116 L80 116 Q82 114 80 110 L78 88Z" fill="url(#bodyGrad)" stroke="#0D0D1A" stroke-width="0.5"/>
    <!-- Leg wraps left -->
    <path d="M47 100 Q50 99 55 100" stroke="#2D2D4A" stroke-width="1.5" fill="none"/>
    <path d="M47 104 Q50 103 55 104" stroke="#2D2D4A" stroke-width="1.5" fill="none"/>
    <!-- Leg wraps right -->
    <path d="M69 100 Q73 99 79 100" stroke="#2D2D4A" stroke-width="1.5" fill="none"/>
    <path d="M69 104 Q73 103 79 104" stroke="#2D2D4A" stroke-width="1.5" fill="none"/>
    <!-- Sandals -->
    <ellipse cx="50" cy="117" rx="7" ry="3" fill="#3D2B1F"/>
    <ellipse cx="76" cy="117" rx="7" ry="3" fill="#3D2B1F"/>
    <line x1="50" y1="114" x2="50" y2="117" stroke="#5C4033" stroke-width="1"/>
    <line x1="76" y1="114" x2="76" y2="117" stroke="#5C4033" stroke-width="1"/>
  </g>

  <!-- Body / Torso -->
  <g id="torso">
    <!-- Main body -->
    <path d="M46 55 Q44 60 44 70 L44 90 Q44 92 50 92 L78 92 Q82 92 82 90 L82 70 Q82 58 78 55 Q64 48 46 55Z" fill="url(#bodyGrad)" stroke="#0D0D1A" stroke-width="0.5"/>
    <!-- Chest armor plate -->
    <path d="M50 58 Q64 54 76 58 L74 78 Q64 82 52 78Z" fill="#2E4057" opacity="0.8"/>
    <path d="M52 60 Q64 56 74 60 L73 76 Q64 80 53 76Z" fill="none" stroke="#00B4D8" stroke-width="0.5" opacity="0.4"/>
    <!-- Belt / sash -->
    <rect x="44" y="84" width="38" height="5" rx="2" fill="#1A1A2E"/>
    <rect x="58" y="83" width="10" height="7" rx="1" fill="#2E4057" stroke="#F1C40F" stroke-width="0.5"/>
    <!-- Belt buckle symbol -->
    <path d="M61 85 L63 87 L65 85 L63 89Z" fill="#F1C40F" opacity="0.8"/>
    <!-- Shadow energy lines on torso -->
    <path d="M54 62 Q58 66 54 72" stroke="#00B4D8" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M72 62 Q68 66 72 72" stroke="#00B4D8" stroke-width="0.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Arms -->
  <g id="arms">
    <!-- Left arm -->
    <path d="M44 58 Q38 62 34 72 Q32 78 36 82 L40 80 Q42 74 44 68Z" fill="url(#bodyGrad)" stroke="#0D0D1A" stroke-width="0.5"/>
    <!-- Left hand -->
    <ellipse cx="36" cy="82" rx="4" ry="3" fill="#2E4057"/>
    <!-- Right arm with blade -->
    <path d="M82 58 Q88 62 92 70 Q94 76 90 80 L86 78 Q84 72 82 66Z" fill="url(#bodyGrad)" stroke="#0D0D1A" stroke-width="0.5"/>
    <!-- Right hand -->
    <ellipse cx="90" cy="79" rx="4" ry="3" fill="#2E4057"/>
    <!-- Kunai blade -->
    <path d="M90 74 L96 60 L98 58 L94 62 L92 72Z" fill="url(#bladeGrad)" stroke="#F0F0F0" stroke-width="0.3"/>
    <path d="M95 62 L96 60 L97 62Z" fill="#F0F0F0" opacity="0.8"/>
    <!-- Arm wraps -->
    <path d="M36 70 Q40 69 44 70" stroke="#2D2D4A" stroke-width="1.2" fill="none"/>
    <path d="M36 74 Q40 73 44 74" stroke="#2D2D4A" stroke-width="1.2" fill="none"/>
    <path d="M82 70 Q86 69 90 70" stroke="#2D2D4A" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Scarf -->
  <g id="scarf">
    <path d="M48 50 Q64 46 78 50 Q80 54 76 56 Q64 52 50 56 Q46 54 48 50Z" fill="url(#scarfGrad)"/>
    <!-- Scarf tails flowing -->
    <path d="M78 52 Q86 56 92 64 Q96 72 90 78 Q88 74 86 68 Q82 60 78 56Z" fill="url(#scarfGrad)" opacity="0.9"/>
    <path d="M80 54 Q88 60 94 70 Q92 66 86 58 Q82 54 80 54Z" fill="#E74C3C" opacity="0.5"/>
    <path d="M48 52 Q44 58 40 68 Q38 72 36 74 Q38 70 42 62 Q46 56 48 52Z" fill="url(#scarfGrad)" opacity="0.7"/>
  </g>

  <!-- Head -->
  <g id="head" filter="url(#rimLight)">
    <!-- Head shape -->
    <path d="M48 26 Q48 16 56 12 Q64 8 72 12 Q80 16 80 26 L80 44 Q80 50 72 52 L56 52 Q48 50 48 44Z" fill="url(#bodyGrad)"/>
    <!-- Ninja mask/hood -->
    <path d="M46 28 Q46 14 56 10 Q64 6 72 10 Q82 14 82 28 L82 34 Q82 36 80 36 L48 36 Q46 36 46 34Z" fill="#1A1A2E"/>
    <!-- Mask lower portion -->
    <path d="M50 38 Q64 36 78 38 Q78 48 72 50 L56 50 Q50 48 50 38Z" fill="#1A1A2E" opacity="0.9"/>
    <!-- Eyes - glowing cyan -->
    <ellipse cx="56" cy="32" rx="5" ry="3" fill="#0D0D1A"/>
    <ellipse cx="56" cy="32" rx="3.5" ry="2" fill="url(#eyeGlow)"/>
    <ellipse cx="56" cy="31.5" rx="1.5" ry="1" fill="#FFFFFF"/>

    <ellipse cx="72" cy="32" rx="5" ry="3" fill="#0D0D1A"/>
    <ellipse cx="72" cy="32" rx="3.5" ry="2" fill="url(#eyeGlow)"/>
    <ellipse cx="72" cy="31.5" rx="1.5" ry="1" fill="#FFFFFF"/>

    <!-- Eye glow ambient -->
    <ellipse cx="56" cy="32" rx="7" ry="4" fill="#00B4D8" opacity="0.15"/>
    <ellipse cx="72" cy="32" rx="7" ry="4" fill="#00B4D8" opacity="0.15"/>

    <!-- Headband -->
    <rect x="46" y="24" width="36" height="4" rx="1" fill="#E74C3C"/>
    <rect x="60" y="23" width="8" height="6" rx="1" fill="#E74C3C"/>
    <!-- Headband metal plate -->
    <rect x="61" y="24" width="6" height="4" rx="0.5" fill="#708090" stroke="#B0C4DE" stroke-width="0.3"/>
    <!-- Kanji symbol on plate -->
    <text x="64" y="27.5" font-size="3" fill="#F1C40F" text-anchor="middle" font-weight="bold">影</text>
    <!-- Headband tails -->
    <path d="M82 26 Q88 30 92 38 Q90 36 86 30 Q84 28 82 27Z" fill="#E74C3C" opacity="0.8"/>
    <path d="M82 27 Q90 32 96 42 Q94 38 88 32Z" fill="#C0392B" opacity="0.6"/>
  </g>

  <!-- Shuriken on belt -->
  <g id="accessories">
    <g transform="translate(48, 86) rotate(15)">
      <path d="M0 -3 L1 -1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1 -1Z" fill="#B0C4DE" stroke="#708090" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="0.8" fill="#708090"/>
    </g>
    <!-- Pouch -->
    <rect x="72" y="85" width="6" height="5" rx="1" fill="#3D2B1F" stroke="#5C4033" stroke-width="0.3"/>
  </g>

  <!-- Shadow wisps at feet -->
  <g id="shadowWisps" opacity="0.4">
    <path d="M40 118 Q50 112 64 116 Q78 112 88 118" stroke="#00B4D8" stroke-width="1" fill="none"/>
    <path d="M44 120 Q54 115 64 118 Q74 115 84 120" stroke="#2E4057" stroke-width="1.5" fill="none"/>
    <ellipse cx="64" cy="120" rx="24" ry="4" fill="#00B4D8" opacity="0.15"/>
  </g>
</svg>