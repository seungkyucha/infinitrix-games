<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Heart main gradient -->
    <radialGradient id="heartMain" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="40%" stop-color="#E74C3C"/>
      <stop offset="80%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </radialGradient>
    <!-- Inner glow -->
    <radialGradient id="heartInner" cx="0.35" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#FF9999" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow gradient -->
    <radialGradient id="heartShadow" cx="0.5" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#8B1A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4A0A0A" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="heartGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#E74C3C" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ninja-style border pattern -->
    <linearGradient id="heartBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1C40F"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#F1C40F"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <path d="M24 42 C10 34 2 24 2 16 Q2 6 12 4 Q18 2 24 10 Q30 2 36 4 Q46 6 46 16 C46 24 38 34 24 42Z" fill="#E74C3C" opacity="0.15" filter="url(#heartGlow)"/>

  <!-- Heart shadow -->
  <path d="M24 40 C12 33 5 24 5 17 Q5 8 13 6 Q19 4 24 11 Q29 4 35 6 Q43 8 43 17 C43 24 36 33 24 40Z" fill="url(#heartShadow)"/>

  <!-- Main heart shape -->
  <path d="M24 38 C12 31 6 23 6 16 Q6 8 13 6 Q19 4 24 11 Q29 4 35 6 Q42 8 42 16 C42 23 36 31 24 38Z" fill="url(#heartMain)" stroke="url(#heartBorder)" stroke-width="0.8"/>

  <!-- Heart inner glow -->
  <path d="M24 34 C14 28 9 22 9 16 Q9 10 14 8 Q19 6 24 12 Q29 6 34 8 Q39 10 39 16 C39 22 34 28 24 34Z" fill="url(#heartInner)"/>

  <!-- Highlight -->
  <ellipse cx="16" cy="14" rx="5" ry="4" fill="#FFFFFF" opacity="0.35" transform="rotate(-20,16,14)"/>
  <ellipse cx="15" cy="13" rx="2.5" ry="1.8" fill="#FFFFFF" opacity="0.5" transform="rotate(-20,15,13)"/>

  <!-- Decorative kanji-style mark -->
  <path d="M22 22 L24 18 L26 22 L24 26Z" fill="#F1C40F" opacity="0.3"/>

  <!-- Sparkle accents -->
  <path d="M34 10 L35 8 L36 10 L35 12Z" fill="#FFFFFF" opacity="0.6"/>
  <path d="M10 12 L11 10 L12 12 L11 14Z" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="30" cy="12" r="0.8" fill="#FFFFFF" opacity="0.5"/>

  <!-- Bottom shadow -->
  <ellipse cx="24" cy="44" rx="12" ry="2" fill="#1A1A2E" opacity="0.2"/>

  <!-- Ink splatter accent (signature) -->
  <circle cx="38" cy="8" r="1.5" fill="#1A1A2E" opacity="0.3"/>
  <circle cx="39" cy="10" r="0.8" fill="#1A1A2E" opacity="0.2"/>
  <circle cx="40" cy="7" r="0.5" fill="#1A1A2E" opacity="0.25"/>
</svg>