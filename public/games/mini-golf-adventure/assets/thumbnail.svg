<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="fairway" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="50%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1B1B1B"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000040"/>
    </filter>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="340" cy="50" r="35" fill="url(#sun)" opacity="0.9"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="80" cy="45" rx="40" ry="18"/>
    <ellipse cx="110" cy="40" rx="30" ry="15"/>
    <ellipse cx="55" cy="40" rx="25" ry="12"/>
    <ellipse cx="230" cy="65" rx="35" ry="14"/>
    <ellipse cx="260" cy="60" rx="28" ry="12"/>
  </g>
  <!-- Hills background -->
  <ellipse cx="100" cy="170" rx="150" ry="60" fill="#43A047"/>
  <ellipse cx="320" cy="165" rx="130" ry="55" fill="#388E3C"/>
  <!-- Main green -->
  <rect x="0" y="155" width="400" height="100" fill="url(#grass)"/>
  <!-- Fairway stripe -->
  <path d="M50,170 Q200,140 350,170 L350,220 Q200,190 50,220 Z" fill="url(#fairway)" opacity="0.6"/>
  <!-- Darker rough patches -->
  <ellipse cx="60" cy="200" rx="30" ry="10" fill="#2E7D32" opacity="0.4"/>
  <ellipse cx="330" cy="195" rx="25" ry="8" fill="#2E7D32" opacity="0.4"/>
  <!-- Sand bunker -->
  <ellipse cx="280" cy="195" rx="25" ry="12" fill="#F9E4B7"/>
  <ellipse cx="280" cy="195" rx="22" ry="10" fill="#F5D89A"/>
  <!-- Hole -->
  <ellipse cx="200" cy="180" rx="10" ry="5" fill="url(#hole)"/>
  <!-- Flag pole -->
  <line x1="200" y1="180" x2="200" y2="110" stroke="#666" stroke-width="2"/>
  <!-- Flag -->
  <path d="M200,110 L230,120 L200,130 Z" fill="#F44336"/>
  <path d="M200,112 L226,120 L200,128 Z" fill="#EF5350"/>
  <!-- Golf ball -->
  <circle cx="140" cy="177" r="8" fill="url(#ball)" filter="url(#shadow)"/>
  <!-- Ball dimples -->
  <circle cx="138" cy="175" r="1" fill="#C0C0C0" opacity="0.5"/>
  <circle cx="142" cy="176" r="1" fill="#C0C0C0" opacity="0.5"/>
  <circle cx="140" cy="180" r="1" fill="#C0C0C0" opacity="0.5"/>
  <!-- Dotted path from ball to hole -->
  <path d="M148,177 Q170,165 195,180" stroke="white" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.7"/>
  <!-- Small flowers -->
  <g fill="#FF9800" opacity="0.8">
    <circle cx="90" cy="210" r="3"/><circle cx="88" cy="208" r="2"/><circle cx="92" cy="208" r="2"/>
    <circle cx="310" cy="215" r="3"/><circle cx="308" cy="213" r="2"/><circle cx="312" cy="213" r="2"/>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="#81C784" opacity="0.5"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="white" filter="url(#shadow)">Mini Golf Adventure</text>
  <!-- Small golf icon in title -->
  <circle cx="60" cy="273" r="5" fill="white" opacity="0.3"/>
  <circle cx="340" cy="273" r="5" fill="white" opacity="0.3"/>
</svg>