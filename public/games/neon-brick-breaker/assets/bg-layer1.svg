<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#0f0f2a"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#3a1a8e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#006688" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="15%" r="25%">
      <stop offset="0%" stop-color="#FF3366" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#AADDFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="bigStarBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Deep space background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- Nebula clouds -->
  <rect width="800" height="600" fill="url(#nebula1)"/>
  <rect width="800" height="600" fill="url(#nebula2)"/>
  <rect width="800" height="600" fill="url(#nebula3)"/>
  <!-- Distant stars - tiny dots -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="45" cy="23" r="0.5"/><circle cx="120" cy="67" r="0.4"/>
    <circle cx="200" cy="15" r="0.6"/><circle cx="310" cy="45" r="0.3"/>
    <circle cx="380" cy="90" r="0.5"/><circle cx="450" cy="30" r="0.4"/>
    <circle cx="520" cy="72" r="0.6"/><circle cx="600" cy="18" r="0.3"/>
    <circle cx="680" cy="55" r="0.5"/><circle cx="750" cy="40" r="0.4"/>
    <circle cx="70" cy="130" r="0.4"/><circle cx="155" cy="170" r="0.5"/>
    <circle cx="240" cy="145" r="0.3"/><circle cx="330" cy="190" r="0.6"/>
    <circle cx="410" cy="155" r="0.4"/><circle cx="490" cy="180" r="0.5"/>
    <circle cx="570" cy="140" r="0.3"/><circle cx="650" cy="175" r="0.6"/>
    <circle cx="730" cy="130" r="0.4"/><circle cx="90" cy="250" r="0.5"/>
    <circle cx="175" cy="280" r="0.4"/><circle cx="260" cy="240" r="0.6"/>
    <circle cx="350" cy="290" r="0.3"/><circle cx="440" cy="260" r="0.5"/>
    <circle cx="530" cy="300" r="0.4"/><circle cx="620" cy="250" r="0.3"/>
    <circle cx="710" cy="285" r="0.5"/><circle cx="55" cy="350" r="0.4"/>
    <circle cx="140" cy="380" r="0.6"/><circle cx="225" cy="340" r="0.3"/>
    <circle cx="315" cy="395" r="0.5"/><circle cx="400" cy="360" r="0.4"/>
    <circle cx="485" cy="390" r="0.6"/><circle cx="575" cy="345" r="0.3"/>
    <circle cx="660" cy="375" r="0.5"/><circle cx="745" cy="355" r="0.4"/>
    <circle cx="80" cy="440" r="0.5"/><circle cx="165" cy="470" r="0.3"/>
    <circle cx="250" cy="450" r="0.6"/><circle cx="340" cy="490" r="0.4"/>
    <circle cx="425" cy="460" r="0.5"/><circle cx="510" cy="485" r="0.3"/>
    <circle cx="600" cy="445" r="0.6"/><circle cx="690" cy="475" r="0.4"/>
    <circle cx="110" cy="530" r="0.5"/><circle cx="280" cy="555" r="0.4"/>
    <circle cx="460" cy="540" r="0.6"/><circle cx="640" cy="560" r="0.3"/>
    <circle cx="770" cy="520" r="0.5"/>
  </g>
  <!-- Medium stars with glow -->
  <g filter="url(#starBlur)">
    <circle cx="150" cy="80" r="1.2" fill="#CCDDFF" opacity="0.8"/>
    <circle cx="350" cy="120" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="550" cy="200" r="1.0" fill="#AACCFF" opacity="0.8"/>
    <circle cx="700" cy="100" r="1.3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="100" cy="300" r="1.1" fill="#FFCCDD" opacity="0.7"/>
    <circle cx="400" cy="420" r="1.4" fill="#CCFFFF" opacity="0.6"/>
    <circle cx="650" cy="350" r="1.2" fill="#DDCCFF" opacity="0.7"/>
    <circle cx="250" cy="500" r="1.0" fill="#FFFFFF" opacity="0.8"/>
  </g>
  <!-- Bright accent stars -->
  <g filter="url(#bigStarBlur)">
    <circle cx="300" cy="60" r="2" fill="#00FFFF" opacity="0.4"/>
    <circle cx="600" cy="300" r="2.5" fill="#FF3366" opacity="0.3"/>
    <circle cx="100" cy="450" r="1.8" fill="#6c3cf7" opacity="0.35"/>
    <circle cx="720" cy="500" r="2" fill="#00FFFF" opacity="0.3"/>
  </g>
  <!-- Grid lines (retro arcade feel) -->
  <g stroke="#00FFFF" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
</svg>