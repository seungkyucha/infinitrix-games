<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
    <radialGradient id="starCenter" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#starGlow)">
    <!-- 5-pointed star -->
    <path d="M16 3 L19.5 11.5 L28.5 12.5 L21.5 18.5 L23.5 27.5 L16 23 L8.5 27.5 L10.5 18.5 L3.5 12.5 L12.5 11.5 Z"
          fill="url(#starGrad)"/>
    <!-- Center glow -->
    <path d="M16 3 L19.5 11.5 L28.5 12.5 L21.5 18.5 L23.5 27.5 L16 23 L8.5 27.5 L10.5 18.5 L3.5 12.5 L12.5 11.5 Z"
          fill="url(#starCenter)"/>
  </g>
  <!-- Sparkle accents -->
  <g opacity="0.6" fill="#FFFFFF">
    <circle cx="12" cy="10" r="0.8"/>
    <circle cx="22" cy="15" r="0.6"/>
    <circle cx="14" cy="20" r="0.5"/>
  </g>
</svg>