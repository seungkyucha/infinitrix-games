<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="cityGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="cityGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151530"/>
      <stop offset="100%" stop-color="#080818"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#006688" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="groundLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="buildGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Cityscape silhouettes - far buildings -->
  <g opacity="0.25">
    <rect x="20" y="420" width="45" height="180" rx="2" fill="url(#cityGrad1)"/>
    <rect x="80" y="380" width="35" height="220" rx="2" fill="url(#cityGrad2)"/>
    <rect x="130" y="440" width="50" height="160" rx="2" fill="url(#cityGrad1)"/>
    <rect x="195" y="400" width="30" height="200" rx="2" fill="url(#cityGrad2)"/>
    <rect x="240" y="350" width="55" height="250" rx="2" fill="url(#cityGrad1)"/>
    <rect x="310" y="410" width="40" height="190" rx="2" fill="url(#cityGrad2)"/>
    <rect x="365" y="370" width="50" height="230" rx="2" fill="url(#cityGrad1)"/>
    <rect x="430" y="430" width="35" height="170" rx="2" fill="url(#cityGrad2)"/>
    <rect x="480" y="390" width="45" height="210" rx="2" fill="url(#cityGrad1)"/>
    <rect x="540" y="360" width="55" height="240" rx="2" fill="url(#cityGrad2)"/>
    <rect x="610" y="420" width="40" height="180" rx="2" fill="url(#cityGrad1)"/>
    <rect x="665" y="380" width="50" height="220" rx="2" fill="url(#cityGrad2)"/>
    <rect x="730" y="400" width="45" height="200" rx="2" fill="url(#cityGrad1)"/>
  </g>
  <!-- Building windows (scattered glowing dots) -->
  <g opacity="0.5">
    <rect x="30" y="440" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="38" y="455" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="48" y="445" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="90" y="400" width="3" height="3" rx="0.5" fill="#FF3366" opacity="0.6"/>
    <rect x="98" y="420" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="255" y="370" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="265" y="390" width="3" height="3" rx="0.5" fill="#FF3366" opacity="0.6"/>
    <rect x="255" y="410" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="375" y="390" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="385" y="410" width="3" height="3" rx="0.5" fill="#6c3cf7" opacity="0.6"/>
    <rect x="395" y="395" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="495" y="410" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="505" y="430" width="3" height="3" rx="0.5" fill="#FF3366" opacity="0.6"/>
    <rect x="555" y="380" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="565" y="400" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="575" y="390" width="3" height="3" rx="0.5" fill="#6c3cf7" opacity="0.6"/>
    <rect x="680" y="400" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="690" y="420" width="3" height="3" rx="0.5" fill="url(#windowGlow)"/>
    <rect x="745" y="415" width="3" height="3" rx="0.5" fill="#FF3366" opacity="0.6"/>
  </g>
  <!-- Neon horizon line -->
  <g filter="url(#lineGlow)" opacity="0.6">
    <line x1="0" y1="540" x2="800" y2="540" stroke="url(#groundLine)" stroke-width="1.5"/>
  </g>
  <!-- Perspective grid (retro arcade floor) -->
  <g stroke="#00FFFF" opacity="0.06" stroke-width="0.8">
    <!-- Horizontal lines receding -->
    <line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="0" y1="562" x2="800" y2="562"/>
    <line x1="0" y1="576" x2="800" y2="576"/>
    <line x1="0" y1="592" x2="800" y2="592"/>
    <!-- Vertical perspective lines from center -->
    <line x1="400" y1="540" x2="0" y2="600"/>
    <line x1="400" y1="540" x2="100" y2="600"/>
    <line x1="400" y1="540" x2="200" y2="600"/>
    <line x1="400" y1="540" x2="300" y2="600"/>
    <line x1="400" y1="540" x2="500" y2="600"/>
    <line x1="400" y1="540" x2="600" y2="600"/>
    <line x1="400" y1="540" x2="700" y2="600"/>
    <line x1="400" y1="540" x2="800" y2="600"/>
  </g>
  <!-- Floating neon particles -->
  <g filter="url(#buildGlow)" opacity="0.3">
    <circle cx="120" cy="320" r="1.5" fill="#00FFFF"/>
    <circle cx="350" cy="280" r="1" fill="#FF00FF"/>
    <circle cx="580" cy="310" r="1.5" fill="#00FFFF"/>
    <circle cx="700" cy="290" r="1" fill="#6c3cf7"/>
    <circle cx="200" cy="500" r="1.2" fill="#FF3366"/>
    <circle cx="500" cy="480" r="1" fill="#00FFFF"/>
  </g>
</svg>