<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="farmSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <radialGradient id="farmSun" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </radialGradient>
    <linearGradient id="farmGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="barn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="barnRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <filter id="softSh">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#farmSky)"/>
  <!-- Sun -->
  <circle cx="340" cy="50" r="35" fill="url(#farmSun)"/>
  <!-- Sun rays -->
  <g stroke="#FFD54F" stroke-width="2" opacity="0.3">
    <line x1="340" y1="8" x2="340" y2="0"/>
    <line x1="370" y1="22" x2="378" y2="16"/>
    <line x1="382" y1="50" x2="392" y2="50"/>
    <line x1="370" y1="78" x2="378" y2="84"/>
    <line x1="310" y1="22" x2="302" y2="16"/>
  </g>
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="80" cy="40" rx="35" ry="15"/>
    <ellipse cx="105" cy="35" rx="25" ry="12"/>
    <ellipse cx="55" cy="38" rx="22" ry="10"/>
    <ellipse cx="220" cy="55" rx="30" ry="12"/>
    <ellipse cx="245" cy="50" rx="22" ry="10"/>
  </g>
  <!-- Rolling hills -->
  <ellipse cx="100" cy="165" rx="160" ry="45" fill="#81C784"/>
  <ellipse cx="330" cy="160" rx="130" ry="40" fill="#66BB6A"/>
  <!-- Main ground -->
  <rect x="0" y="155" width="400" height="100" fill="url(#farmGrass)"/>
  <!-- Farm plots (dirt rows) -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="150" height="12" rx="2" fill="url(#dirt)"/>
    <rect x="0" y="18" width="150" height="12" rx="2" fill="url(#dirt)"/>
    <rect x="0" y="36" width="150" height="12" rx="2" fill="url(#dirt)"/>
    <!-- Crops row 1 - wheat -->
    <g fill="#FDD835">
      <ellipse cx="15" cy="-3" rx="3" ry="5"/><line x1="15" y1="2" x2="15" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="35" cy="-4" rx="3" ry="5"/><line x1="35" y1="2" x2="35" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="55" cy="-2" rx="3" ry="5"/><line x1="55" y1="3" x2="55" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="75" cy="-3" rx="3" ry="5"/><line x1="75" y1="2" x2="75" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="95" cy="-4" rx="3" ry="5"/><line x1="95" y1="1" x2="95" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="115" cy="-2" rx="3" ry="5"/><line x1="115" y1="3" x2="115" y2="0" stroke="#7CB342" stroke-width="1.5"/>
      <ellipse cx="135" cy="-3" rx="3" ry="5"/><line x1="135" y1="2" x2="135" y2="0" stroke="#7CB342" stroke-width="1.5"/>
    </g>
    <!-- Crops row 2 - carrots -->
    <g>
      <g fill="#4CAF50"><rect x="10" y="13" width="6" height="8" rx="3"/></g>
      <g fill="#4CAF50"><rect x="30" y="14" width="6" height="7" rx="3"/></g>
      <g fill="#4CAF50"><rect x="50" y="13" width="6" height="8" rx="3"/></g>
      <g fill="#4CAF50"><rect x="70" y="14" width="6" height="7" rx="3"/></g>
      <g fill="#4CAF50"><rect x="90" y="13" width="6" height="8" rx="3"/></g>
      <g fill="#4CAF50"><rect x="110" y="14" width="6" height="7" rx="3"/></g>
      <g fill="#4CAF50"><rect x="130" y="13" width="6" height="8" rx="3"/></g>
    </g>
    <!-- Crops row 3 - sprouts (growing) -->
    <g stroke="#7CB342" stroke-width="1.5" fill="none">
      <line x1="15" y1="36" x2="15" y2="32"/><circle cx="15" cy="31" r="2" fill="#A5D6A7"/>
      <line x1="45" y1="36" x2="45" y2="33"/><circle cx="45" cy="32" r="1.5" fill="#A5D6A7"/>
      <line x1="75" y1="36" x2="75" y2="32"/><circle cx="75" cy="31" r="2" fill="#A5D6A7"/>
      <line x1="105" y1="36" x2="105" y2="33"/><circle cx="105" cy="32" r="1.5" fill="#A5D6A7"/>
      <line x1="135" y1="36" x2="135" y2="32"/><circle cx="135" cy="31" r="2" fill="#A5D6A7"/>
    </g>
  </g>
  <!-- Barn -->
  <g transform="translate(255, 105)" filter="url(#softSh)">
    <rect x="0" y="20" width="70" height="50" fill="url(#barn)"/>
    <polygon points="-5,20 35,-5 75,20" fill="url(#barnRoof)"/>
    <!-- Barn door -->
    <rect x="22" y="38" width="26" height="32" rx="13" fill="#5D4037"/>
    <rect x="24" y="40" width="22" height="30" rx="11" fill="#4E342E"/>
    <line x1="35" y1="40" x2="35" y2="70" stroke="#3E2723" stroke-width="1"/>
    <!-- Barn window -->
    <rect x="8" y="30" width="10" height="10" rx="1" fill="#FFF9C4" opacity="0.7"/>
    <line x1="13" y1="30" x2="13" y2="40" stroke="#5D4037" stroke-width="1"/>
    <line x1="8" y1="35" x2="18" y2="35" stroke="#5D4037" stroke-width="1"/>
  </g>
  <!-- Fence -->
  <g stroke="#8D6E63" stroke-width="2" fill="#A1887F">
    <rect x="190" y="165" width="4" height="25" rx="1"/>
    <rect x="210" y="165" width="4" height="25" rx="1"/>
    <rect x="230" y="165" width="4" height="25" rx="1"/>
    <line x1="190" y1="172" x2="234" y2="172"/>
    <line x1="190" y1="182" x2="234" y2="182"/>
  </g>
  <!-- Chicken -->
  <g transform="translate(210,185)">
    <ellipse cx="0" cy="2" rx="8" ry="6" fill="white"/>
    <circle cx="-6" cy="-4" r="4" fill="white"/>
    <polygon points="-10,-4 -13,-3 -10,-2" fill="#FF9800"/>
    <circle cx="-7" cy="-5" r="1" fill="#1A1A1A"/>
    <polygon points="-5,-8 -6,-5 -4,-5" fill="#F44336"/>
    <line x1="-2" y1="8" x2="-3" y2="12" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="3" y1="8" x2="4" y2="12" stroke="#FF9800" stroke-width="1.5"/>
  </g>
  <!-- Cow (simplified) -->
  <g transform="translate(355,168)">
    <ellipse cx="0" cy="5" rx="15" ry="10" fill="white"/>
    <circle cx="-13" cy="-3" r="7" fill="white"/>
    <circle cx="-13" cy="-3" r="5" fill="#F5F5F5"/>
    <ellipse cx="-16" cy="0" rx="4" ry="3" fill="#FFCCBC"/>
    <circle cx="-15" cy="-5" r="1.5" fill="#1A1A1A"/>
    <ellipse cx="5" cy="0" rx="5" ry="4" fill="#795548" opacity="0.5"/>
    <!-- Legs -->
    <line x1="-8" y1="14" x2="-8" y2="22" stroke="#E0E0E0" stroke-width="3"/>
    <line x1="8" y1="14" x2="8" y2="22" stroke="#E0E0E0" stroke-width="3"/>
  </g>
  <!-- Coin/money floating (idle game element) -->
  <g filter="url(#softSh)">
    <circle cx="50" cy="100" r="12" fill="#FFD54F"/>
    <circle cx="50" cy="100" r="9" fill="#FFC107"/>
    <text x="50" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF8F00">$</text>
  </g>
  <!-- Arrow up (idle income) -->
  <g fill="#4CAF50" opacity="0.7">
    <polygon points="50,80 56,88 53,88 53,92 47,92 47,88 44,88"/>
    <text x="50" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4CAF50">+5/s</text>
  </g>
  <!-- Title bar -->
  <rect x="0" y="245" width="400" height="55" fill="url(#titleBg)" opacity="0.95"/>
  <rect x="0" y="245" width="400" height="2" fill="#81C784" opacity="0.5"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#C8E6C9" filter="url(#softSh)">Mini Idle Farm</text>
</svg>