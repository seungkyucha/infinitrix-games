// SeededRNG — mulberry32 기반 결정적 난수
class SeededRNG {
  constructor(seed) { this.s = seed | 0 || 1; }
  next() {
    let t = this.s += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  // 범위 내 정수
  int(min, max) { return min + ((this.next() * (max - min + 1)) | 0); }
  // 배열에서 랜덤 선택
  pick(arr) { return arr[(this.next() * arr.length) | 0]; }
  // 가중치 선택
  weighted(arr, weights) {
    let sum = 0;
    for (let i = 0; i < weights.length; i++) sum += weights[i];
    let r = this.next() * sum;
    for (let i = 0; i < arr.length; i++) { r -= weights[i]; if (r <= 0) return arr[i]; }
    return arr[arr.length - 1];
  }
}

// TweenManager — setTimeout 0건 보장
class TweenManager {
  constructor() { this._tweens = []; this._pendingAdd = []; this._updating = false; }
  // 트윈 추가 (경쟁 조건 방지)
  add(opts) {
    const t = { target: opts.target, prop: opts.prop, from: opts.from, to: opts.to,
      dur: opts.dur || 500, elapsed: 0, ease: opts.ease || 'easeOut',
      onComplete: opts.onComplete || null, onUpdate: opts.onUpdate || null, dead: false };
    if (opts.from !== undefined && opts.target && opts.prop) opts.target[opts.prop] = opts.from;
    if (this._updating) this._pendingAdd.push(t); else this._tweens.push(t);
    return t;
  }
  // 즉시 정리 (F13: clearImmediate)
  clearImmediate() { this._tweens.length = 0; this._pendingAdd.length = 0; }
  // 특정 타겟의 트윈 취소
  cancelFor(target) {
    for (let i = 0; i < this._tweens.length; i++) if (this._tweens[i].target === target) this._tweens[i].dead = true;
  }
  // 프레임 업데이트
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      if (t.dead) { this._tweens.splice(i, 1); continue; }
      t.elapsed += dt;
      let p = t.dur > 0 ? Math.min(t.elapsed / t.dur, 1) : 1;
      let ep = p;
      if (t.ease === 'easeOut') ep = 1 - (1 - p) * (1 - p);
      else if (t.ease === 'easeIn') ep = p * p;
      else if (t.ease === 'easeInOut') ep = p < 0.5 ? 2 * p * p : 1 - (-2 * p + 2) * (-2 * p + 2) / 2;
      else if (t.ease === 'linear') ep = p;
      if (t.target && t.prop) t.target[t.prop] = t.from + (t.to - t.from) * ep;
      if (t.onUpdate) t.onUpdate(ep);
      if (p >= 1) { t.dead = true; if (t.onComplete) t.onComplete(); }
    }
    this._updating = false;
    // 펜딩 추가 반영
    if (this._pendingAdd.length) {
      for (let i = 0; i < this._pendingAdd.length; i++) this._tweens.push(this._pendingAdd[i]);
      this._pendingAdd.length = 0;
    }
  }
}

// ObjectPool — 파티클/이펙트 재활용
class ObjectPool {
  constructor(factory, reset, max) { this._pool = []; this._active = []; this._factory = factory; this._reset = reset; this._max = max || 200; }
  acquire() {
    let obj = this._pool.length > 0 ? this._pool.pop() : (this._active.length < this._max ? this._factory() : null);
    if (!obj) return null;
    this._reset(obj);
    this._active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  update(dt) {
    for (let i = this._active.length - 1; i >= 0; i--) {
      const p = this._active[i];
      p.life -= dt;
      if (p.life <= 0) { this.release(p); continue; }
      p.x += p.vx * dt * 0.001;
      p.y += p.vy * dt * 0.001;
      p.alpha = Math.max(0, p.life / p.maxLife);
      if (p.rotSpeed) p.rot += p.rotSpeed * dt * 0.001;
      if (p.gravity) p.vy += p.gravity * dt * 0.001;
      if (p.scale !== undefined && p.scaleDecay) p.scale *= (1 - p.scaleDecay * dt * 0.001);
    }
  }
  forEach(fn) { for (let i = 0; i < this._active.length; i++) fn(this._active[i]); }
  clear() { while (this._active.length) this._pool.push(this._active.pop()); }
  get count() { return this._active.length; }
}

// SoundManager — Web Audio API 프로시저럴 사운드
class SoundManager {
  constructor() { this._ctx = null; this._gain = null; this._muted = false; }
  // 초기화 (유저 제스처 후 호출)
  init() {
    if (this._ctx) return;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._gain = this._ctx.createGain();
      this._gain.gain.value = 0.3;
      this._gain.connect(this._ctx.destination);
    } catch(e) { /* 오디오 미지원 환경 */ }
  }
  resume() { if (this._ctx && this._ctx.state === 'suspended') this._ctx.resume(); }
  // 프로시저럴 효과음
  playTone(freq, dur, type, vol) {
    if (!this._ctx || this._muted) return;
    try {
      const osc = this._ctx.createOscillator();
      const g = this._ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      g.gain.value = vol || 0.15;
      g.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + dur);
      osc.connect(g);
      g.connect(this._gain);
      osc.start(this._ctx.currentTime);
      osc.stop(this._ctx.currentTime + dur);
    } catch(e) {}
  }
  // 비트 히트 사운드 (판정별)
  playJudge(type) {
    if (type === 'perfect') { this.playTone(880, 0.15, 'sine', 0.2); this.playTone(1320, 0.1, 'sine', 0.1); }
    else if (type === 'great') { this.playTone(660, 0.12, 'sine', 0.18); }
    else if (type === 'good') { this.playTone(440, 0.1, 'triangle', 0.12); }
    else if (type === 'miss') { this.playTone(180, 0.2, 'sawtooth', 0.1); }
  }
  // 콤보 달성 사운드
  playCombo(level) { this.playTone(440 + level * 110, 0.2, 'sine', 0.15); }
  // 보스 등장 사운드
  playBossIntro() {
    this.playTone(110, 0.5, 'sawtooth', 0.2);
    if (this._ctx) { const t = this._ctx.currentTime; try { const o = this._ctx.createOscillator(); const g = this._ctx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(110, t); o.frequency.exponentialRampToValueAtTime(55, t+0.5); g.gain.value = 0.15; g.gain.exponentialRampToValueAtTime(0.001, t+0.6); o.connect(g); g.connect(this._gain); o.start(t); o.stop(t+0.6); } catch(e){} }
  }
  // 비트 틱 사운드 (매 비트마다)
  playBeatTick() { this.playTone(1200, 0.03, 'sine', 0.05); }
  // 피격
  playHit() { this.playTone(200, 0.15, 'sawtooth', 0.12); }
  // 게임오버
  playGameOver() { this.playTone(220, 0.4, 'sawtooth', 0.2); this.playTone(165, 0.6, 'sawtooth', 0.15); }
  // 클리어
  playClear() { this.playTone(523, 0.15, 'sine', 0.2); this.playTone(659, 0.15, 'sine', 0.2); this.playTone(784, 0.2, 'sine', 0.2); }
  // 칩 획득
  playChipGet() { this.playTone(880, 0.1, 'sine', 0.15); this.playTone(1100, 0.15, 'sine', 0.12); }
  // 업그레이드
  playUpgrade() { this.playTone(440, 0.1, 'sine', 0.15); this.playTone(880, 0.2, 'sine', 0.18); }
  // 회피 성공
  playDodge() { this.playTone(600, 0.08, 'triangle', 0.1); this.playTone(900, 0.06, 'triangle', 0.08); }
  // 프로시저럴 BGM (§5.2) — 존별 BPM + 음계 패턴
  startBGM(zone, bpm) {
    this.stopBGM();
    if (!this._ctx || this._muted) return;
    // 존별 음계 패턴 (Hz)
    const scales = [
      [261.6, 293.7, 329.6, 392.0, 440.0],           // Synthwave: 펜타토닉 C
      [220.0, 261.6, 293.7, 329.6, 349.2],           // Dubstep: 마이너
      [261.6, 329.6, 392.0, 440.0, 493.9],           // Lo-fi: 메이저7th
      [329.6, 392.0, 440.0, 523.3, 587.3],           // D&B: 고음 펜타
      [220.0, 246.9, 293.7, 329.6, 370.0],           // Glitch: 크로매틱 변형
      [261.6, 293.7, 349.2, 392.0, 440.0],           // Remix: 믹스
      [130.8, 174.6, 220.0, 261.6, 329.6]            // Void: 저음
    ];
    const scale = scales[Math.min(zone, 6)];
    const waveTypes = ['sine', 'square', 'triangle', 'sawtooth', 'triangle', 'square', 'sine'];
    const waveType = waveTypes[Math.min(zone, 6)];
    this._bgmActive = true;
    this._bgmZone = zone;
    this._bgmBpm = bpm;
    this._bgmBeatIdx = 0;
    this._bgmNextTime = this._ctx.currentTime + 0.1;
    this._bgmScale = scale;
    this._bgmWave = waveType;
    // 프리스케줄: 8비트 앞서 예약
    this._scheduleBGMBeats();
  }
  // BGM 비트 스케줄링 (setTimeout 없이 audioCtx.currentTime 기반)
  _scheduleBGMBeats() {
    if (!this._ctx || !this._bgmActive) return;
    const interval = 60 / this._bgmBpm;
    const lookAhead = 0.2;
    while (this._bgmNextTime < this._ctx.currentTime + lookAhead) {
      try {
        const freq = this._bgmScale[this._bgmBeatIdx % this._bgmScale.length];
        const osc = this._ctx.createOscillator();
        const g = this._ctx.createGain();
        osc.type = this._bgmWave;
        osc.frequency.value = freq;
        g.gain.value = 0.06;
        g.gain.exponentialRampToValueAtTime(0.001, this._bgmNextTime + interval * 0.8);
        osc.connect(g);
        g.connect(this._gain);
        osc.start(this._bgmNextTime);
        osc.stop(this._bgmNextTime + interval * 0.9);
        // 서브 베이스 (매 4비트마다)
        if (this._bgmBeatIdx % 4 === 0) {
          const sub = this._ctx.createOscillator();
          const sg = this._ctx.createGain();
          sub.type = 'sine';
          sub.frequency.value = freq * 0.5;
          sg.gain.value = 0.04;
          sg.gain.exponentialRampToValueAtTime(0.001, this._bgmNextTime + interval * 1.5);
          sub.connect(sg);
          sg.connect(this._gain);
          sub.start(this._bgmNextTime);
          sub.stop(this._bgmNextTime + interval * 1.6);
        }
      } catch(e) {}
      this._bgmNextTime += interval;
      this._bgmBeatIdx++;
    }
  }
  // BGM 업데이트 (매 프레임 호출)
  updateBGM(bpm) {
    if (!this._bgmActive) return;
    this._bgmBpm = bpm;
    this._scheduleBGMBeats();
  }
  // BGM 정지
  stopBGM() { this._bgmActive = false; }
}

// 문자열 가져오기 헬퍼
function str(key) { return CONFIG.STRINGS[G.lang][key] || key; }

// 존 색상 가져오기 헬퍼
function zoneColor(idx) { return CONFIG.ZONE_COLORS[Math.min(idx, CONFIG.ZONE_COLORS.length - 1)]; }

// 배경 그리기 (패럴랙스 3레이어)
function drawBackground(ctx, w, h, zone, scroll1, scroll2, time) {
  const c = zoneColor(zone);
  // Layer 0: 기본 배경색 + 그라디언트
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, c[3]);
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // 비트 동기화 펄스
  const pulse = 0.5 + 0.5 * Math.sin(time * 0.003);
  // 배경 레이어 1 — 원경 별 패럴랙스
  ctx.fillStyle = c[2];
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + scroll1 * 0.2) % w + w) % w;
    const sy = (i * 89) % h;
    const sr = 1 + (i % 3);
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // 배경 레이어 2 — 근경 레트로 그리드
  ctx.strokeStyle = c[0];
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = 1;
  const gridSpacing = 50;
  const offsetY = (scroll2 * 2) % gridSpacing;
  for (let gy = h * 0.6 + offsetY; gy < h; gy += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
  }
  for (let gx = -gridSpacing + ((scroll2) % gridSpacing); gx < w + gridSpacing; gx += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(gx, h * 0.6); ctx.lineTo(gx + (w/2 - gx) * 0.3, h); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // 스캔라인 오버레이 (아케이드 장르)
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let sl = 0; sl < h; sl += 3) ctx.fillRect(0, sl, w, 1);
}

// 플레이어 그리기 (DJ 네온)
function drawPlayer(ctx, x, y, size, pose, glowColor, comboLevel) {
  const s = size || 64;
  ctx.save();
  // 콤보 글로우
  if (comboLevel >= 5) {
    ctx.shadowColor = glowColor || '#FF6EC7';
    ctx.shadowBlur = 10 + comboLevel * 2;
  }
  {
    // DJ 실루엣 — 포즈별 변형 적용
    let ox = 0, oy = 0, armAngle = 0;
    if (pose === 'attack') { oy = -4; armAngle = -0.5; }
    else if (pose === 'dodgeL') { ox = -8; armAngle = 0.3; }
    else if (pose === 'dodgeR') { ox = 8; armAngle = -0.3; }
    else if (pose === 'hit') { ox = (G.rng.next() - 0.5) * 6; }
    else if (pose === 'hold') { oy = -2; armAngle = -0.8; }
    else { oy = Math.sin(G.time * 0.003) * 2; armAngle = Math.sin(G.time * 0.004) * 0.1; }
    ctx.translate(x + ox, y + oy);
    // 다리 (2개 스틱)
    ctx.strokeStyle = '#5a2fd0';
    ctx.lineWidth = 3;
    const legSpread = pose === 'dodgeL' ? -0.1 : pose === 'dodgeR' ? 0.1 : 0;
    ctx.beginPath(); ctx.moveTo(-s*0.08, s*0.3); ctx.lineTo(-s*0.12 + legSpread * s, s*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.08, s*0.3); ctx.lineTo(s*0.12 + legSpread * s, s*0.5); ctx.stroke();
    // 몸체 (슬림 사다리꼴)
    ctx.fillStyle = '#6c3cf7';
    ctx.beginPath();
    ctx.moveTo(-s*0.15, -s*0.1);
    ctx.lineTo(s*0.15, -s*0.1);
    ctx.lineTo(s*0.12, s*0.32);
    ctx.lineTo(-s*0.12, s*0.32);
    ctx.closePath();
    ctx.fill();
    // 가슴 코어 (발광 원)
    ctx.fillStyle = glowColor || '#FF6EC7';
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(G.time * 0.006);
    ctx.beginPath(); ctx.arc(0, s*0.05, s*0.06, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
    // 팔 (좌우 스틱) — 포즈별 각도 변화
    ctx.strokeStyle = '#8060e0';
    ctx.lineWidth = 3;
    // 왼팔
    ctx.beginPath();
    ctx.moveTo(-s*0.15, -s*0.05);
    ctx.lineTo(-s*0.3 + Math.sin(armAngle) * s*0.05, s*0.12 + Math.cos(armAngle) * s*0.05);
    ctx.stroke();
    // 오른팔
    ctx.beginPath();
    ctx.moveTo(s*0.15, -s*0.05);
    ctx.lineTo(s*0.3 - Math.sin(armAngle) * s*0.05, s*0.12 - Math.cos(armAngle) * s*0.05);
    ctx.stroke();
    // 머리
    ctx.beginPath();
    ctx.arc(0, -s*0.25, s*0.18, 0, 6.28);
    ctx.fillStyle = '#e0e0f0';
    ctx.fill();
    // 헤드폰 밴드
    ctx.strokeStyle = glowColor || '#FF6EC7';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, -s*0.28, s*0.22, -2.8, -0.34);
    ctx.stroke();
    // 헤드폰 이어컵 (양쪽 사각형)
    ctx.fillStyle = glowColor || '#FF6EC7';
    const earW = s * 0.08, earH = s * 0.1;
    ctx.fillRect(-s*0.24 - earW/2, -s*0.3 - earH/2, earW, earH);
    ctx.fillRect(s*0.24 - earW/2, -s*0.3 - earH/2, earW, earH);
    // 바이저 (시안 발광)
    ctx.shadowColor = '#00FFFF';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#00FFFF';
    ctx.fillRect(-s*0.12, -s*0.28, s*0.24, s*0.06);
    ctx.shadowBlur = 0;
    // 홀드 비트 차지 이펙트 — 보라색 오라 링 확대 애니메이션
    if (pose === 'hold') {
      const chargeAlpha = 0.3 + 0.3 * Math.sin(G.time * 0.01);
      ctx.globalAlpha = chargeAlpha;
      ctx.strokeStyle = glowColor || '#6c3cf7';
      ctx.lineWidth = 2;
      const chargeR = s * 0.4 + Math.sin(G.time * 0.008) * s * 0.05;
      ctx.beginPath(); ctx.arc(0, 0, chargeR, 0, 6.28); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, chargeR * 1.3, 0, 6.28); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

// 적 그리기 (존별 형태 + 네온 글로우)
function drawEnemy(ctx, x, y, size, type, hp, maxHp, animFrame, zone) {
  const s = size || 48;
  ctx.save();
  ctx.translate(x, y);
  const c = zoneColor(zone);
  {
    // 네온 글로우
    ctx.shadowColor = c[2];
    ctx.shadowBlur = 8 + Math.sin(animFrame * 0.08) * 3;
    const rot = animFrame * 0.05;
    ctx.rotate(rot);
    ctx.fillStyle = c[0];
    ctx.globalAlpha = hp <= 0 ? 0.3 : 1;
    if (zone === 0) { // 음표 — 글로우 코어 추가
      ctx.beginPath(); ctx.arc(0, 0, s*0.3, 0, 6.28); ctx.fill();
      // 밝은 중심
      ctx.fillStyle = c[2]; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(0, 0, s*0.15, 0, 6.28); ctx.fill();
      ctx.globalAlpha = hp <= 0 ? 0.3 : 1; ctx.fillStyle = c[0];
      ctx.fillRect(-2, -s*0.3, 4, -s*0.3);
      // 음표 깃발
      ctx.fillRect(2, -s*0.6, s*0.12, s*0.08);
    } else if (zone === 1) { // 스피커 — 동심원 진동
      ctx.fillRect(-s*0.3, -s*0.3, s*0.6, s*0.6);
      ctx.strokeStyle = c[2]; ctx.lineWidth = 1.5;
      const pulseR = s*0.18 + Math.sin(animFrame * 0.1) * s*0.04;
      ctx.beginPath(); ctx.arc(0, 0, pulseR, 0, 6.28); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, s*0.1, 0, 6.28);
      ctx.fillStyle = c[3]; ctx.fill();
      // 스피커 콘 패턴
      ctx.strokeStyle = c[0]; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(0, 0, s*0.25, 0, 6.28); ctx.stroke();
      ctx.globalAlpha = hp <= 0 ? 0.3 : 1;
    } else if (zone === 2) { // 카세트 — 테이프 릴 회전
      ctx.fillRect(-s*0.35, -s*0.2, s*0.7, s*0.4);
      // 외곽 하이라이트
      ctx.strokeStyle = c[2]; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
      ctx.strokeRect(-s*0.35, -s*0.2, s*0.7, s*0.4);
      ctx.globalAlpha = hp <= 0 ? 0.3 : 1;
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-s*0.12, 0, s*0.09, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.12, 0, s*0.09, 0, 6.28); ctx.fill();
      // 회전 마커
      ctx.strokeStyle = c[1]; ctx.lineWidth = 1;
      const tapAngle = animFrame * 0.08;
      ctx.beginPath(); ctx.moveTo(-s*0.12, 0); ctx.lineTo(-s*0.12 + Math.cos(tapAngle)*s*0.06, Math.sin(tapAngle)*s*0.06); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.12, 0); ctx.lineTo(s*0.12 + Math.cos(-tapAngle)*s*0.06, Math.sin(-tapAngle)*s*0.06); ctx.stroke();
    } else if (zone === 3) { // 드럼스틱 십자 — 끝 둥근 볼 추가
      ctx.fillRect(-s*0.05, -s*0.35, s*0.1, s*0.7);
      ctx.fillRect(-s*0.35, -s*0.05, s*0.7, s*0.1);
      // 스틱 끝 둥근 볼
      ctx.fillStyle = c[2];
      ctx.beginPath(); ctx.arc(0, -s*0.35, s*0.06, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(0, s*0.35, s*0.06, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.35, 0, s*0.06, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.35, 0, s*0.06, 0, 6.28); ctx.fill();
    } else { // 글리치 픽셀 — 더 선명하게 + 글로우 링
      for (let px = -2; px <= 2; px++) for (let py = -2; py <= 2; py++) {
        if (G.rng.next() < 0.6) { ctx.fillStyle = G.rng.next() < 0.5 ? c[0] : c[1]; ctx.fillRect(px*s*0.12, py*s*0.12, s*0.1, s*0.1); }
      }
      // 글리치 외곽 글로우 링
      ctx.strokeStyle = c[2]; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(0, 0, s*0.35, 0, 6.28); ctx.stroke();
      ctx.globalAlpha = hp <= 0 ? 0.3 : 1;
    }
    // HP 바
    ctx.rotate(-rot);
    ctx.shadowBlur = 0;
    if (hp > 0 && hp < maxHp) {
      const bw = s * 0.8, bh = 4;
      ctx.fillStyle = '#333'; ctx.globalAlpha = 1;
      ctx.fillRect(-bw/2, -s/2 - 8, bw, bh);
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(-bw/2, -s/2 - 8, bw * (hp / maxHp), bh);
    }
  }
  ctx.restore();
}

// 보스 그리기 (확대 + 존 특화 + 바이닐 홈 + 이퀄라이저)
function drawBoss(ctx, x, y, size, bossId, phase, hp, maxHp, animFrame) {
  const s = size || 150;
  const c = zoneColor(bossId < 5 ? bossId : 5);
  ctx.save();
  ctx.translate(x, y);
  // 페이즈별 글로우 강도
  const glowStr = 8 + phase * 8;
  ctx.shadowColor = c[2];
  ctx.shadowBlur = glowStr;
  // Void DJ는 모든 색 번갈아
  let bossColor = c[0];
  if (bossId === 5) {
    const ci = ((animFrame * 0.03) | 0) % 5;
    ctx.shadowColor = CONFIG.ZONE_COLORS[ci][2];
    bossColor = CONFIG.ZONE_COLORS[ci][0];
  }
  {
    // 외곽 이퀄라이저 바 (보스 위에 5개 막대)
    ctx.shadowBlur = 0;
    const eqBars = 7;
    const eqW = s * 0.08;
    const eqGap = s * 0.1;
    const eqBaseX = -(eqBars * eqGap) / 2;
    for (let bi = 0; bi < eqBars; bi++) {
      const barH = s * 0.08 + Math.abs(Math.sin((animFrame * 0.06 + bi * 0.8))) * s * 0.15;
      ctx.fillStyle = bi % 2 === 0 ? c[0] : c[1];
      ctx.globalAlpha = 0.5 + phase * 0.1;
      ctx.fillRect(eqBaseX + bi * eqGap, -s * 0.55 - barH, eqW, barH);
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = c[2];
    ctx.shadowBlur = glowStr;
    // 턴테이블 외곽 링
    ctx.strokeStyle = c[1];
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, s * 0.42, 0, 6.28); ctx.stroke();
    // 턴테이블 메인 디스크
    ctx.fillStyle = bossColor;
    ctx.beginPath(); ctx.arc(0, 0, s * 0.4, 0, 6.28); ctx.fill();
    // 바이닐 레코드 홈 패턴 (동심원)
    ctx.strokeStyle = c[3]; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.4;
    for (let gi = 1; gi <= 5; gi++) {
      ctx.beginPath(); ctx.arc(0, 0, s * 0.08 * gi, 0, 6.28); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // 레이블 중심 디스크
    ctx.fillStyle = c[3];
    ctx.beginPath(); ctx.arc(0, 0, s * 0.18, 0, 6.28); ctx.fill();
    // 레이블 글로우 코어
    ctx.fillStyle = c[2];
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(animFrame * 0.04);
    ctx.beginPath(); ctx.arc(0, 0, s * 0.08, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
    // 회전 암 (톤암)
    const armAngle = animFrame * 0.02;
    ctx.strokeStyle = c[1]; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(armAngle) * s * 0.35, Math.sin(armAngle) * s * 0.35);
    ctx.stroke();
    // 톤암 끝 카트리지
    ctx.fillStyle = c[2];
    const tipX = Math.cos(armAngle) * s * 0.35, tipY = Math.sin(armAngle) * s * 0.35;
    ctx.fillRect(tipX - 3, tipY - 3, 6, 6);
    // 보스별 고유 장식
    if (bossId === 0) { // DJ 레트로: 8비트 크라운
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(-s*0.12, -s*0.48, s*0.06, s*0.06);
      ctx.fillRect(s*0.06, -s*0.48, s*0.06, s*0.06);
      ctx.fillRect(-s*0.03, -s*0.52, s*0.06, s*0.06);
    } else if (bossId === 1) { // DJ 워블: 양쪽 스피커 콘
      ctx.strokeStyle = c[2]; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(-s*0.5, 0, s*0.1, 0, 6.28); ctx.stroke();
      ctx.beginPath(); ctx.arc(s*0.5, 0, s*0.1, 0, 6.28); ctx.stroke();
    } else if (bossId === 2) { // DJ 칠: 노이즈 그레인
      ctx.globalAlpha = 0.15;
      for (let ni = 0; ni < 20; ni++) {
        ctx.fillStyle = '#fff';
        const nx = (G.rng.next() - 0.5) * s * 0.8;
        const ny = (G.rng.next() - 0.5) * s * 0.8;
        ctx.fillRect(nx, ny, 2, 2);
      }
      ctx.globalAlpha = 1;
    } else if (bossId === 3) { // DJ 브레이크: 에너지 링
      ctx.strokeStyle = c[2]; ctx.lineWidth = 2; ctx.globalAlpha = 0.4 + phase * 0.15;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(0, 0, s * 0.48 + Math.sin(animFrame * 0.05) * 3, 0, 6.28); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    } else if (bossId >= 4) { // DJ 에러 + Void DJ: 글리치 효과
      ctx.globalAlpha = 0.3;
      const glitchOffset = (G.rng.next() - 0.5) * 4;
      ctx.fillStyle = c[0];
      ctx.fillRect(-s*0.4 + glitchOffset, (G.rng.next()-0.5)*s*0.6, s*0.8, 3);
      ctx.fillStyle = c[1];
      ctx.fillRect(-s*0.3 - glitchOffset, (G.rng.next()-0.5)*s*0.5, s*0.6, 2);
      ctx.globalAlpha = 1;
    }
    // 보스 이름 위 표시
    ctx.shadowBlur = 0;
    ctx.fillStyle = c[2];
    ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(CONFIG.BOSS_NAMES[G.lang][bossId], 0, -s * 0.52);
  }
  ctx.shadowBlur = 0;
  // HP 바 (대형)
  const bw = s * 0.9, bh = 8;
  ctx.fillStyle = '#222';
  ctx.fillRect(-bw/2, s*0.42, bw, bh);
  // 페이즈별 색상
  const hpRatio = hp / maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? c[0] : hpRatio > 0.25 ? '#FFD700' : '#ef4444';
  ctx.fillRect(-bw/2, s*0.42, bw * hpRatio, bh);
  // 페이즈 마커
  const phases = CONFIG.BOSS_PHASES[bossId] || [];
  ctx.fillStyle = '#fff';
  for (let pi = 0; pi < phases.length; pi++) {
    const px = -bw/2 + bw * phases[pi];
    ctx.fillRect(px - 1, s*0.42, 2, bh);
  }
  ctx.restore();
}

// 비트 레인 그리기
function drawBeatLane(ctx, x, y, w, h, beats, currentTime, bpm, zone) {
  const c = zoneColor(zone);
  // 레인 배경
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y, w, h);
  // 판정선
  const judgeX = x + w * 0.2;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(judgeX, y); ctx.lineTo(judgeX, y + h); ctx.stroke();
  // 판정선 글로우
  ctx.strokeStyle = c[2];
  ctx.globalAlpha = 0.5 + 0.3 * Math.sin(G.time * 0.01);
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(judgeX, y); ctx.lineTo(judgeX, y + h); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.lineWidth = 1;
  // 비트 마커
  const beatInterval = 60000 / bpm;
  const visibleRange = beatInterval * 4;
  for (let i = 0; i < beats.length; i++) {
    const b = beats[i];
    if (b.judged && !b.holdActive) continue;
    const timeDiff = b.time - currentTime;
    if (timeDiff < -500 || timeDiff > visibleRange) continue;
    const progress = 1 - timeDiff / visibleRange;
    const bx = x + w * 0.2 + (w * 0.75) * (1 - progress);
    const by = y + h * 0.5;
    const bSize = h * 0.3;
    // 비트 유형별 형태
    ctx.save();
    ctx.translate(bx, by);
    if (b.type === 'basic') {
      ctx.fillStyle = c[0];
      ctx.beginPath(); ctx.arc(0, 0, bSize, 0, 6.28); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, bSize * 0.4, 0, 6.28); ctx.fill();
    } else if (b.type === 'double') {
      ctx.fillStyle = c[1];
      ctx.beginPath(); ctx.arc(-bSize*0.5, 0, bSize*0.7, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(bSize*0.5, 0, bSize*0.7, 0, 6.28); ctx.fill();
    } else if (b.type === 'hold') {
      ctx.fillStyle = c[2];
      const holdW = Math.max(bSize * 2, (b.holdDur / visibleRange) * w * 0.75);
      ctx.fillRect(-bSize, -bSize*0.5, holdW, bSize);
      ctx.beginPath(); ctx.arc(0, 0, bSize * 0.6, 0, 6.28);
      ctx.fillStyle = '#fff'; ctx.fill();
    } else if (b.type === 'dodge') {
      ctx.fillStyle = '#FFD700';
      ctx.save(); ctx.rotate(0.785);
      ctx.fillRect(-bSize*0.5, -bSize*0.5, bSize, bSize);
      ctx.restore();
    } else if (b.type === 'boss') {
      ctx.fillStyle = c[0];
      drawStar(ctx, 0, 0, 5, bSize, bSize * 0.5);
    }
    ctx.restore();
  }
}

// 별 그리기 유틸
function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = -1.5708;
  const step = 3.14159 / spikes;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.closePath(); ctx.fill();
}

// 판정 표시 그리기
function drawJudgement(ctx, x, y, type, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const colors = { perfect: '#FFD700', great: '#00FFFF', good: '#90EE90', miss: '#ef4444' };
  ctx.fillStyle = colors[type] || '#fff';
  ctx.shadowColor = colors[type] || '#fff';
  ctx.shadowBlur = 10;
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str(type), x, y);
  ctx.restore();
}

// 콤보 카운터 그리기
function drawComboCounter(ctx, x, y, combo, multiplier, scale) {
  if (combo <= 0) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale || 1, scale || 1);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 콤보 수
  ctx.fillStyle = combo >= 20 ? '#FFD700' : combo >= 10 ? '#00FFFF' : '#FF6EC7';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = combo >= 10 ? 15 : 8;
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(combo + '', 0, 0);
  // COMBO 라벨
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#e0e0f0';
  ctx.shadowBlur = 0;
  ctx.fillText(str('combo'), 0, 22);
  // 배율
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('x' + multiplier.toFixed(1), 0, -24);
  ctx.restore();
}

// HUD 그리기
function drawUI(ctx, w, h, hp, maxHp, score, combo, zone, stage, crystals) {
  ctx.save();
  // HP 바 (좌상단)
  const hpBarX = 10, hpBarY = 10, hpBarW = 180, hpBarH = 20;
  // 하트 아이콘 (Canvas)
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  const hx = hpBarX + 10, hy = hpBarY + 10;
  ctx.moveTo(hx, hy - 4);
  ctx.bezierCurveTo(hx - 8, hy - 12, hx - 16, hy, hx, hy + 10);
  ctx.moveTo(hx, hy - 4);
  ctx.bezierCurveTo(hx + 8, hy - 12, hx + 16, hy, hx, hy + 10);
  ctx.fill();
  const hbx = hpBarX + 30;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(hbx, hpBarY, hpBarW - 30, hpBarH);
  const hpRatio = Math.max(0, hp / maxHp);
  ctx.fillStyle = hpRatio > 0.5 ? '#00ff87' : hpRatio > 0.25 ? '#FFD700' : '#ef4444';
  ctx.fillRect(hbx, hpBarY, (hpBarW - 30) * hpRatio, hpBarH);
  ctx.strokeStyle = '#505070';
  ctx.strokeRect(hbx, hpBarY, hpBarW - 30, hpBarH);
  // HP 텍스트
  ctx.fillStyle = '#e0e0f0';
  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(hp) + '/' + maxHp, hbx + (hpBarW - 30) / 2, hpBarY + 14);
  // 점수 (우상단)
  ctx.textAlign = 'right';
  // 별 아이콘 (Canvas)
  ctx.fillStyle = '#FFD700';
  const sx = w - 142, sy = 20;
  ctx.beginPath();
  for (let si = 0; si < 5; si++) {
    const a = si * 1.2566 - 1.5708;
    const ra = a + 0.6283;
    ctx.lineTo(sx + Math.cos(a) * 10, sy + Math.sin(a) * 10);
    ctx.lineTo(sx + Math.cos(ra) * 5, sy + Math.sin(ra) * 5);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(score.toLocaleString(), w - 12, 26);
  // 존/스테이지 표시
  ctx.textAlign = 'left';
  ctx.fillStyle = '#8080a0';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  const zName = CONFIG.ZONE_NAMES[G.lang][zone] || '';
  ctx.fillText(zName + ' ' + (stage + 1), 10, hpBarY + hpBarH + 18);
  // 크리스탈 (좌하단)
  ctx.fillStyle = '#00d4ff';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('♦ ' + crystals, 10, h - 10);
  // 일시정지 버튼 (우상단)
  const pbtn = getPauseRect(w);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(pbtn.x, pbtn.y, pbtn.w, pbtn.h);
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⏸', pbtn.x + pbtn.w/2, pbtn.y + pbtn.h/2 + 5);
  ctx.restore();
}

// 일시정지 버튼 rect 가져오기
function getPauseRect(w) {
  const s = Math.max(CONFIG.MIN_TOUCH, 40);
  return { x: w - s - 6, y: 38, w: s, h: s };
}

// hitTest 단일 함수 (F16, F69)
function hitTest(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

// 사운드 칩 카드 그리기
function drawChipCard(ctx, x, y, w, h, chip, selected, alpha, lang) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // 카드 배경
  const rarityColors = { common: '#3a3a5e', rare: '#1a3a5e', epic: '#3a1a4e' };
  const rarityGlow = { common: '#6c3cf7', rare: '#00d4ff', epic: '#FFD700' };
  ctx.fillStyle = selected ? '#2a2a4e' : rarityColors[chip.rarity];
  ctx.strokeStyle = rarityGlow[chip.rarity];
  ctx.lineWidth = selected ? 3 : 1;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill(); ctx.stroke();
  // 칩 아이콘
  {
    ctx.fillStyle = rarityGlow[chip.rarity];
    ctx.beginPath(); ctx.arc(x + w/2, y + 30, 16, 0, 6.28); ctx.fill();
  }
  // 칩 이름
  ctx.fillStyle = '#e0e0f0';
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(chip[lang] || chip.ko, x + w/2, y + 62);
  // 설명
  ctx.fillStyle = '#8080a0';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  const descKey = 'desc_' + lang;
  ctx.fillText(chip[descKey] || chip.desc_ko, x + w/2, y + 80);
  // 희귀도
  ctx.fillStyle = rarityGlow[chip.rarity];
  ctx.font = '10px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(chip.rarity.toUpperCase(), x + w/2, y + h - 10);
  ctx.restore();
}

// 둥근 사각형
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 타이틀 화면 그리기
function drawTitle(ctx, w, h, time) {
  drawBackground(ctx, w, h, 0, time * 0.02, time * 0.05, time);
  // 타이틀 글리치 이펙트
  ctx.save();
  const ty = h * 0.3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 글리치 오프셋
  const glitchX = Math.sin(time * 0.013) * 3;
  const glitchY = Math.cos(time * 0.017) * 2;
  // 그림자 (시안)
  ctx.fillStyle = '#00FFFF';
  ctx.globalAlpha = 0.5;
  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('title'), w/2 + glitchX + 2, ty + glitchY + 2);
  // 그림자 (핑크)
  ctx.fillStyle = '#FF6EC7';
  ctx.globalAlpha = 0.5;
  ctx.fillText(str('title'), w/2 - glitchX - 2, ty - glitchY - 1);
  // 메인
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#FF6EC7';
  ctx.shadowBlur = 20;
  ctx.fillText(str('title'), w/2, ty);
  ctx.shadowBlur = 0;
  // 서브타이틀
  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8080a0';
  ctx.fillText(str('subtitle'), w/2, ty + 40);
  // 플레이어 캐릭터 표시
  drawPlayer(ctx, w/2, h * 0.52, 80, 'idle', '#FF6EC7', 5);
  // 시작 안내
  const flashAlpha = 0.5 + 0.5 * Math.sin(time * 0.005);
  ctx.globalAlpha = flashAlpha;
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('tapToStart'), w/2, h * 0.75);
  ctx.globalAlpha = 1;
  // 하이스코어
  const hs = G.save.highScores[G.difficulty] || 0;
  if (hs > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(str('highScore') + ': ' + hs.toLocaleString(), w/2, h * 0.82);
  }
  // 언어 토글 (우하단)
  const langBtn = getLangRect(w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(langBtn.x, langBtn.y, langBtn.w, langBtn.h);
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(str('lang'), langBtn.x + langBtn.w/2, langBtn.y + langBtn.h/2 + 4);
  // 크리스탈 표시 (좌하단)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00d4ff';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('♦ ' + (G.save.crystals || 0) + ' ' + str('totalCrystals'), 12, h - 14);
  ctx.restore();
}

// 언어 토글 rect
function getLangRect(w, h) {
  const s = Math.max(CONFIG.MIN_TOUCH, 44);
  return { x: w - s - 8, y: h - s - 8, w: s, h: s };
}

// 난이도 선택 화면
function drawDifficultySelect(ctx, w, h, menuIdx, time) {
  drawBackground(ctx, w, h, 0, time * 0.02, time * 0.05, time);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e0e0f0';
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('selectDiff'), w/2, h * 0.15);
  const diffColors = ['#00ff87', '#00d4ff', '#ef4444'];
  for (let i = 0; i < 3; i++) {
    const dy = h * 0.28 + i * 90;
    const rect = getDiffRect(w, h, i);
    const selected = i === menuIdx;
    ctx.fillStyle = selected ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = selected ? diffColors[i] : '#505070';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(ctx, rect.x, rect.y, rect.w, rect.h, 8);
    ctx.fill(); ctx.stroke();
    // 이름
    ctx.fillStyle = diffColors[i];
    ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(str('difficulty')[i], w/2, dy + 22);
    // 설명
    ctx.fillStyle = '#8080a0';
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(str('diffDesc')[i], w/2, dy + 42);
    // 하이스코어
    const diff = ['beginner','dj','maestro'][i];
    const hs = G.save.highScores[diff] || 0;
    if (hs > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(str('highScore') + ': ' + hs.toLocaleString(), w/2, dy + 58);
    }
  }
  ctx.restore();
}

// 난이도 선택 rect
function getDiffRect(w, h, idx) {
  const bw = Math.min(300, w * 0.8), bh = 72;
  return { x: w/2 - bw/2, y: h * 0.28 + idx * 90 - 4, w: bw, h: bh };
}

// 존 맵 화면
function drawZoneMap(ctx, w, h, currentZone, unlockedZones, menuIdx, time) {
  drawBackground(ctx, w, h, 0, time * 0.02, time * 0.05, time);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e0e0f0';
  ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('zone') + ' ' + str('selectDiff'), w/2, h * 0.08 + 12);
  // 존 목록 (7존)
  const visibleZones = [];
  for (let i = 0; i < 7; i++) if (unlockedZones[i]) visibleZones.push(i);
  for (let vi = 0; vi < visibleZones.length; vi++) {
    const zi = visibleZones[vi];
    const rect = getZoneRect(w, h, vi, visibleZones.length);
    const selected = vi === menuIdx;
    const c = zoneColor(zi);
    ctx.fillStyle = selected ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = selected ? c[0] : '#505070';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(ctx, rect.x, rect.y, rect.w, rect.h, 6);

    ctx.fillRect(rect.x + 8, rect.y + 8, 6, rect.h - 16);

    ctx.fillStyle = '#e0e0f0';
    ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';

  ctx.lineWidth = 1;
  roundRect(ctx, upgRect.x, upgRect.y, upgRect.w, upgRect.h, 6);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#00ff87';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(str('upgrade') + ' (♦' + (G.save.crystals||0) + ')', upgRect.x + upgRect.w/2, upgRect.y + upgRect.h/2 + 5);
  ctx.restore();
}

// 존 선택 rect
function getZoneRect(w, h, vi, total) {

  return { x: w/2 - bw/2, y: h * 0.15 + vi * (bh + 8), w: bw, h: bh };
}

// 업그레이드 버튼 rect
function getUpgradeButtonRect(w, h) {

}

// 게임오버 화면 그리기
function drawGameOver(ctx, w, h, score, bestScore, combo, crystals, time) {

  ctx.fillStyle = '#e0e0f0';

  ctx.globalAlpha = flash;
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '15px "Segoe UI", system-ui, sans-serif';

// 칩 선택 화면
function drawChipSelect(ctx, w, h, choices, menuIdx, time) {

// 업그레이드 화면
function drawUpgradeScreen(ctx, w, h, save, treeIdx, time) {
  drawBackground(ctx, w, h, 0, time * 0.01, time * 0.03, time);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e0e0f0';
  ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('upgrade'), w/2, 30);
  // 크리스탈 잔고
  ctx.fillStyle = '#00d4ff';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('♦ ' + (save.crystals || 0), w/2, 52);
  // 3 트리
  const trees = ['rhythm', 'power', 'flow'];
  const treeColors = ['#00d4ff', '#ef4444', '#00ff87'];
  const treeW = Math.min(160, (w - 40) / 3);
  const startX = w/2 - (treeW * 3 + 12 * 2) / 2;
  for (let t = 0; t < 3; t++) {
    const tx = startX + t * (treeW + 12);
    const ty = 70;
    const selected = t === treeIdx;
    const lvl = save.upgrades[trees[t]] || 0;
    const rect = getUpgTreeRect(w, h, t);
    ctx.fillStyle = selected ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.02)';
    ctx.strokeStyle = selected ? treeColors[t] : '#505070';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(ctx, rect.x, rect.y, rect.w, rect.h, 6);
    ctx.fill(); ctx.stroke();
    // 트리 이름
    ctx.fillStyle = treeColors[t];
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(trees[t].toUpperCase(), rect.x + rect.w/2, rect.y + 20);
    // 레벨 표시
    for (let l = 0; l < 5; l++) {
      const ly = rect.y + 35 + l * 30;
      const unlocked = l < lvl;
      const next = l === lvl;
      ctx.fillStyle = unlocked ? treeColors[t] : next ? '#505070' : '#1e1e30';
      ctx.fillRect(rect.x + 8, ly, rect.w - 16, 24);
      if (unlocked || next) {
        const upgDef = CONFIG.UPGRADES[trees[t]][l];
        ctx.fillStyle = unlocked ? '#000' : '#8080a0';
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(upgDef[G.lang] || upgDef.ko, rect.x + rect.w/2, ly + 10);
        if (next && lvl < 5) {
          ctx.fillStyle = '#FFD700';
          ctx.fillText('♦' + CONFIG.UPGRADE_COSTS[l], rect.x + rect.w/2, ly + 21);
        }
      }
    }
  }
  // 뒤로가기
  const backRect = getBackButtonRect(w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, backRect.x, backRect.y, backRect.w, backRect.h, 6);
  ctx.fill();
  ctx.fillStyle = '#e0e0f0';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('← ' + str('toTitle'), backRect.x + backRect.w/2, backRect.y + backRect.h/2 + 5);
  ctx.restore();
}

// 업그레이드 트리 rect
function getUpgTreeRect(w, h, idx) {
  const treeW = Math.min(160, (w - 40) / 3);
  const startX = w/2 - (treeW * 3 + 12 * 2) / 2;
  return { x: startX + idx * (treeW + 12), y: 70, w: treeW, h: 210 };
}

// 뒤로가기 버튼 rect
function getBackButtonRect(w, h) {
  const bw = Math.min(150, w * 0.4), bh = Math.max(CONFIG.MIN_TOUCH, 40);
  return { x: w/2 - bw/2, y: h - bh - 12, w: bw, h: bh };
}

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e0e0f0';

// 히트 이펙트 파티클 그리기
function drawHitEffect(ctx, x, y, size, alpha) {
  // Canvas 방사형 파티클 히트 이펙트
  ctx.save();
  ctx.globalAlpha = alpha;
  const c = zoneColor(G.currentZone);
  const rays = 8;
  for (let i = 0; i < rays; i++) {
    const angle = (i / rays) * 6.28;
    const r = size * 0.4;
    ctx.strokeStyle = c[2];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * r * 0.2, y + Math.sin(angle) * r * 0.2);
    ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
    ctx.stroke();
  }
  // 중심 글로우
  ctx.fillStyle = c[0];
  ctx.beginPath(); ctx.arc(x, y, size * 0.15, 0, 6.28); ctx.fill();
  ctx.restore();
}

// 로딩 화면
function drawLoadingScreen(ctx, w, h, progress, time) {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF6EC7';
  ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('NEON PULSE', w/2, h * 0.4);
  ctx.fillStyle = '#8080a0';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(str('loading'), w/2, h * 0.52);
  // 로딩 바
  const bw = 200, bh = 6;
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(w/2 - bw/2, h * 0.58, bw, bh);
  ctx.fillStyle = '#FF6EC7';
  ctx.fillRect(w/2 - bw/2, h * 0.58, bw * progress, bh);
  // 맥동 효과
  const p = 0.5 + 0.5 * Math.sin(time * 0.008);
  ctx.globalAlpha = p * 0.3;
  ctx.fillStyle = '#FF6EC7';
  ctx.beginPath(); ctx.arc(w/2, h * 0.4, 80, 0, 6.28); ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
// ══ REGION 5: RHYTHM — 비트 생성, BPM 동기화, 타이밍 판정 ══
// ══════════════════════════════════════════════════════════════════

// 비트 패턴 생성 (SeededRNG 기반)
function generateBeats(rng, bpm, density, stageTime, beatTypes) {
  const beats = [];
  const interval = 60000 / bpm;
  const totalBeats = Math.ceil(stageTime / interval);
  const ratios = beatTypes || CONFIG.BEAT_RATIOS;
  for (let i = 0; i < totalBeats; i++) {
    const time = i * interval;
    // 밀도에 따라 일부 비트 스킵
    if (rng.next() > density) continue;
    // 비트 유형 결정
    const r = rng.next();
    let type = 'basic';
    let cumulative = 0;
    if (r < (cumulative += ratios[0])) type = 'basic';
    else if (r < (cumulative += ratios[1])) type = 'double';
    else if (r < (cumulative += ratios[2])) type = 'hold';
    else type = 'dodge';
    const beat = createBeat(type, time, 0);
    if (type === 'hold') {
      beat.holdDur = interval * (1 + rng.next());
    }
    beats.push(beat);
  }
  return beats;
}

// 보스 비트 패턴 생성
function generateBossBeats(rng, bpm, bossIdx, phase) {
  const beats = [];
  const interval = 60000 / bpm;
  // 보스별 패턴 정의
  const patterns = {
    0: [[['basic','basic','hold'],['basic','double','hold','hold']]],
    1: [[['basic','basic','double'],['double','double','hold','dodge'],['double','double','hold','dodge','boss']]],
    2: [[['hold','hold','basic','hold'],['basic','basic','hold','dodge']]],
    3: [[['basic','basic','basic','basic'],['basic','double','double','basic','double'],['basic','basic','basic','double','double'],['double','double','double','dodge','hold','basic','basic']]],
    4: [[['basic','dodge','basic','hold'],['dodge','basic','hold','basic'],['basic','basic','basic','dodge','hold'],['double','double','dodge','hold','basic','basic']]],
    5: [[['basic','dodge','hold'],['basic','double','hold','dodge','basic'],['double','double','hold','dodge'],['double','double','dodge','hold','basic','boss']]]
  };
  const bossPatterns = patterns[bossIdx] || patterns[0];
  const phasePattern = bossPatterns[0][Math.min(phase, bossPatterns[0].length - 1)];
  // 패턴 반복으로 비트 생성 (30초분)
  const totalBeats = Math.ceil(30000 / interval);
  for (let i = 0; i < totalBeats; i++) {
    const type = phasePattern[i % phasePattern.length];
    const beat = createBeat(type, i * interval, 0);
    if (type === 'hold') beat.holdDur = interval * 1.5;
    beats.push(beat);
  }
  return beats;
}

// 타이밍 판정
function judgeInput(inputTime, beats, judgeWindows) {
  let bestDelta = Infinity;
  let bestBeat = null;
  for (let i = 0; i < beats.length; i++) {
    const b = beats[i];
    if (b.judged || b.missed) continue;
    const delta = Math.abs(inputTime - b.time);
    if (delta < bestDelta && delta <= judgeWindows.good + 50) {
      bestDelta = delta;
      bestBeat = b;
    }
  }
  if (!bestBeat) return { type: 'miss', beat: null, delta: Infinity };
  bestBeat.judged = true;
  if (bestDelta <= judgeWindows.perfect) return { type: 'perfect', beat: bestBeat, delta: bestDelta };
  if (bestDelta <= judgeWindows.great) return { type: 'great', beat: bestBeat, delta: bestDelta };
  if (bestDelta <= judgeWindows.good) return { type: 'good', beat: bestBeat, delta: bestDelta };
  bestBeat.judged = false;
  return { type: 'miss', beat: null, delta: bestDelta };
}

// Miss 체크 (비트가 지나갔는데 입력 없음)
function checkMissedBeats(beats, currentTime, goodWindow) {
  const missed = [];
  for (let i = 0; i < beats.length; i++) {
    const b = beats[i];
    if (b.judged || b.missed) continue;
    if (currentTime - b.time > goodWindow + 50) {
      b.missed = true;
      missed.push(b);
    }
  }
  return missed;
}

// 현재 비트 시간 계산
function getCurrentBeatTime() {
  return G.time - G.stageStartTime;
}

// BPM에 따른 비트 간격
function getBeatInterval(bpm) {
  return 60000 / bpm;
}

// 홀드 비트 지속 대미지 업데이트 (§2.2: 유지 시간 비례 배율)
function updateHoldBeats(dt) {
  if (G.state !== STATE.PLAYING && G.state !== STATE.BOSS_FIGHT) return;
  for (let i = 0; i < G.beats.length; i++) {
    const b = G.beats[i];
    if (!b.holdActive) continue;
    const elapsed = G.time - b.holdStart;
    // 홀드 비트 종료 조건: 플레이어가 키를 뗐거나 holdDur 초과
    if (!isHolding || elapsed >= b.holdDur) {
      b.holdActive = false;
      // 홀드 완료 보너스 — 유지 비율에 따라 대미지 추가 지급
      const holdRatio = Math.min(1, elapsed / b.holdDur);
      if (holdRatio >= 0.8) {
        // 80% 이상 유지 시 보너스 대미지
        const bonusDmg = calcDamage(CONFIG.PLAYER_BASE_DMG, 'perfect', G.combo, G.chips, G.save.upgrades, 'hold', G.difficulty) * holdRatio;
        if (G.boss && G.boss.alive) {
          applyDamageToBoss(G.boss, bonusDmg);
        } else {
          const target = G.enemies.find(function(e) { return e.alive; });
          if (target) applyDamageToEnemy(target, bonusDmg);
        }
        // 점수 보너스
        G.score += Math.round(CONFIG.BASE_SCORE * holdRatio * 0.5);
        G.judgeDisplay = { type: 'perfect', alpha: 1, y: logH * 0.5 };
        tw.add({ target: G.judgeDisplay, prop: 'alpha', from: 1, to: 0, dur: 600 });
      }
      if (G.player.pose === 'hold') { G.player.pose = 'idle'; G.player.poseTimer = 0; }
      continue;
    }
    // 지속 대미지: holdDur 동안 tick당 소량 대미지
    const tickDmg = (CONFIG.PLAYER_BASE_DMG * 0.3 * dt / 1000);
    // 칩 보너스: 루프 스테이션 (holdMul)
    let holdMul = 1;
    for (let ci = 0; ci < G.chips.length; ci++) {
      if (G.chips[ci].effect === 'holdMul') holdMul += G.chips[ci].val;
    }
    // 업그레이드: 홀드 마스터 (Power Lv4)
    if (G.save.upgrades.power >= 4) holdMul *= 1.5;
    const holdTickDmg = tickDmg * holdMul;
    if (G.boss && G.boss.alive) {
      applyDamageToBoss(G.boss, holdTickDmg);
    } else {
      const target = G.enemies.find(function(e) { return e.alive; });
      if (target) applyDamageToEnemy(target, holdTickDmg);
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// ══ REGION 6: COMBAT — 전투 로직, 대미지 계산, 콤보 ══
// ══════════════════════════════════════════════════════════════════

// 대미지 계산 (순수 함수)
function calcDamage(baseDmg, judgeType, combo, chips, upgrades, beatType, difficulty) {
  let dmg = baseDmg;
  // 판정 배율
  const jMul = CONFIG.JUDGE_MUL[judgeType] || 0;
  dmg *= jMul;
  // 콤보 배율
  let comboBonus = CONFIG.COMBO_PER;
  // 칩: 이퀄라이저
  for (let i = 0; i < chips.length; i++) {
    if (chips[i].effect === 'comboBonus') comboBonus += chips[i].val;
  }
  let maxMul = CONFIG.COMBO_MAX_MUL;
  // 업그레이드: 콤보 프로 (Lv3)
  if (upgrades.rhythm >= 3) maxMul = 3.5;
  const comboMul = Math.min(maxMul, 1 + combo * comboBonus);
  dmg *= comboMul;
  // 칩 효과: 대미지 보너스 (DPS 캡 적용)
  let chipDmgBonus = 0;
  for (let i = 0; i < chips.length; i++) {
    if (chips[i].effect === 'dmgMul') chipDmgBonus += chips[i].val;
    if (chips[i].effect === 'masterDmg') chipDmgBonus += chips[i].val;
    if (chips[i].effect === 'holdMul' && beatType === 'hold') chipDmgBonus += chips[i].val;
    if (chips[i].effect === 'beatSpec') {
      // 리믹서: 지정 비트 +80%, 나머지 -20%
      chipDmgBonus += (beatType === 'basic' ? chips[i].val : -0.2);
    }
  }
  chipDmgBonus = Math.min(chipDmgBonus, CONFIG.CHIP_DPS_CAP);
  dmg *= (1 + chipDmgBonus);
  // 업그레이드: 파워 앰프
  if (upgrades.power >= 1) dmg *= 1.1;
  // 업그레이드: 더블 스트라이크
  if (upgrades.power >= 3 && beatType === 'double') dmg *= 1.4;
  // 업그레이드: 홀드 마스터
  if (upgrades.power >= 4 && beatType === 'hold') dmg *= 1.5;
  // 업그레이드: 오버드라이브 (콤보15+)
  if (upgrades.power >= 5 && combo >= 15) dmg *= 1.25;
  // 업그레이드: 크리티컬 비트 (Perfect 20% 크리티컬)
  if (upgrades.power >= 2 && judgeType === 'perfect') {
    if (G.rng.next() < 0.2) dmg *= 2;
  }
  // 칩: 하모닉스 (Perfect시 2히트)
  if (judgeType === 'perfect') {
    for (let i = 0; i < chips.length; i++) {
      if (chips[i].effect === 'perfectDouble') dmg *= 2;
    }
  }
  return Math.round(dmg);
}

// 콤보 업데이트
function updateCombo(judgeType, combo, difficulty, upgrades) {
  if (judgeType === 'perfect' || judgeType === 'great') {
    // 마에스트로에서 Perfect만 콤보 유지 (Great 리셋)
    if (difficulty === 'maestro' && judgeType === 'great') return 0;
    return combo + 1;
  }
  if (judgeType === 'good') {
    // 업그레이드: 타이밍 왕 (Lv4)
    if (upgrades.rhythm >= 4) return combo + 1;
    return 0;
  }
  return 0;
}

// 점수 계산
function calcScore(judgeType, combo, comboBonus) {
  const jMul = CONFIG.JUDGE_MUL[judgeType] || 0;
  let maxMul = CONFIG.COMBO_MAX_MUL;
  const per = CONFIG.COMBO_PER + (comboBonus || 0);
  const comboMul = Math.min(maxMul, 1 + combo * per);
  return Math.round(CONFIG.BASE_SCORE * jMul * comboMul);
}

// 적에게 대미지 적용
function applyDamageToEnemy(enemy, dmg) {
  enemy.hp -= dmg;
  enemy.hitFlash = 200;
  if (enemy.hp <= 0) { enemy.hp = 0; enemy.alive = false; }
}

// 보스에게 대미지 적용 + 페이즈 체크
function applyDamageToBoss(boss, dmg) {
  if (!boss || !boss.alive) return;
  boss.hp -= dmg;
  boss.hitFlash = 200;
  if (boss.hp <= 0) { boss.hp = 0; boss.alive = false; return; }
  // 페이즈 전환 체크
  const phases = CONFIG.BOSS_PHASES[boss.idx] || [];
  const hpRatio = boss.hp / boss.maxHp;
  let newPhase = 0;
  for (let i = 0; i < phases.length; i++) {
    if (hpRatio <= phases[i]) newPhase = i + 1;
  }
  if (newPhase > boss.phase && !boss.phaseTransitioning) {
    boss.phaseTransitioning = true;
    boss.phase = newPhase;
    boss.atkTimer = 0;
    // BPM 변경 (tween 경유)
    const bpmRanges = CONFIG.ZONE_BPM[boss.idx < 5 ? boss.idx : 5];
    const targetBpm = bpmRanges[0] + (bpmRanges[1] - bpmRanges[0]) * (newPhase / phases.length);
    tw.add({ target: G, prop: 'bpm', from: G.bpm, to: targetBpm, dur: 1000, onComplete: function() {
      G.beatInterval = getBeatInterval(G.bpm);
      if (G.boss) G.boss.phaseTransitioning = false;
    }});
    // 새 비트 패턴 생성
    G.beats = generateBossBeats(G.rng, targetBpm, boss.idx, newPhase);
    G.stageStartTime = G.time;
  }
}

// 보스 보상 (F17: 단일 경로 + 가드 플래그)
function checkBossDefeat(boss) {
  if (!boss || boss.alive || G.bossRewardGiven) return false;
  G.bossRewardGiven = true;
  const bossIdx = CONFIG.BOSS_STAGES.indexOf(G.stageIdx);
  const reward = CONFIG.STAGES[G.stageIdx][3];
  G.crystalsThisRun += reward;
  G.score += CONFIG.BOSS_BONUS_PER_ZONE * (G.currentZone + 1);
  return true;
}

// 적 공격 (Miss시)
function enemyAttack(player, enemy, chips, upgrades, difficulty) {
  let dmg = enemy.atk * CONFIG.DIFF_ATK_MUL[difficulty];
  // 칩: 리버브 실드
  for (let i = 0; i < chips.length; i++) {
    if (chips[i].effect === 'defMul') dmg *= (1 - chips[i].val);
  }
  // 업그레이드: 페이드 아웃 (Lv2)
  if (upgrades.flow >= 2) dmg *= 0.8;
  // 세컨드 찬스 (Lv4)
  if (player.hp - dmg <= 0 && upgrades.flow >= 4 && !player.secondChanceUsed) {
    player.secondChanceUsed = true;
    player.hp = 1;
    return;
  }
  player.hp = Math.max(0, player.hp - Math.round(dmg));
}

// 회피 처리
function processDodge(direction, chips) {
  let aoe = 0;
  for (let i = 0; i < chips.length; i++) {
    if (chips[i].effect === 'dodgeDmg') aoe += chips[i].val;
  }
  return aoe;
}

// ══════════════════════════════════════════════════════════════════
// ══ REGION 7: ROGUELITE — 사운드 칩, 업그레이드 트리, 진행 관리 ══
// ══════════════════════════════════════════════════════════════════

// 칩 3택 선택지 생성 (캡 고려)
function generateChipChoices(rng, currentChips) {
  const available = [];
  const currentDmgBonus = sumChipEffect(currentChips, 'dmgMul') + sumChipEffect(currentChips, 'masterDmg');
  for (let i = 0; i < CONFIG.CHIPS.length; i++) {
    const chip = CONFIG.CHIPS[i];
    // 이미 보유한 칩 제외
    if (currentChips.some(c => c.id === chip.id)) continue;
    // DPS 캡 체크
    if ((chip.effect === 'dmgMul' || chip.effect === 'masterDmg') && currentDmgBonus + chip.val > CONFIG.CHIP_DPS_CAP) continue;
    available.push(chip);
  }
  // 희귀도 가중치
  const choices = [];
  const weights = available.map(c => c.rarity === 'common' ? 3 : c.rarity === 'rare' ? 2 : 1);
  while (choices.length < 3 && available.length > 0) {
    const idx = weightedPickIndex(rng, weights);
    choices.push(available[idx]);
    available.splice(idx, 1);
    weights.splice(idx, 1);
  }
  return choices;
}

// 가중치 선택 인덱스
function weightedPickIndex(rng, weights) {
  let sum = 0;
  for (let i = 0; i < weights.length; i++) sum += weights[i];
  let r = rng.next() * sum;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) return i; }
  return weights.length - 1;
}

// 칩 효과 합산
function sumChipEffect(chips, effect) {
  let sum = 0;
  for (let i = 0; i < chips.length; i++) if (chips[i].effect === effect) sum += chips[i].val;
  return sum;
}

// 업그레이드 구매
function purchaseUpgrade(save, tree) {
  const lvl = save.upgrades[tree] || 0;
  if (lvl >= 5) return false;
  const cost = CONFIG.UPGRADE_COSTS[lvl];
  if (save.crystals < cost) return false;
  save.crystals -= cost;
  save.upgrades[tree] = lvl + 1;
  saveSave(save);
  return true;
}

// 스테이지 인덱스 계산
function getStageIndex(zone, stage) {
  if (zone >= 5) return 20 + (zone - 5);
  return zone * 4 + stage;
}

// 존/스테이지 → 보스 여부
function isBossStage(stageIdx) {
  return CONFIG.BOSS_STAGES.indexOf(stageIdx) >= 0;
}

// 보스 인덱스
function getBossIndex(stageIdx) {
  return CONFIG.BOSS_STAGES.indexOf(stageIdx);
}

// DDA 업데이트
function updateDDA(player, difficulty, perfectStreak, missStreak) {
  if (difficulty === 'maestro') return 0;
  let level = 0;
  const hpRatio = player.hp / player.maxHp;
  if (hpRatio < CONFIG.DDA_HP_LV2) level = 2;
  else if (hpRatio < CONFIG.DDA_HP_LV1) level = 1;
  if (missStreak >= CONFIG.DDA_MISS_STREAK) level = Math.max(level, 3);
  return Math.min(level, 3);
}

// DDA 적용: 판정 윈도우 확장
function getDDAJudgeWindows(base, ddaLevel) {
  const bonus = ddaLevel >= 2 ? 20 : 0;
  return {
    perfect: base.perfect + bonus,
    great: base.great + bonus,
    good: base.good + bonus
  };
}

// ══════════════════════════════════════════════════════════════════
// ══ REGION 8: STATE — 게임 상태 머신, 전환, 입력 처리 ══
// ══════════════════════════════════════════════════════════════════

// 상태 전환 (F6: 우선순위 체계)
// 역방향 전환 허용 딕셔너리 (P0 수정: STATE_PRIORITY 역방향 차단 버그 해결)
const REVERSE_ALLOWED = {
  [STATE.STAGE_CLEAR]: [STATE.STAGE_INTRO, STATE.BOSS_INTRO, STATE.TITLE, STATE.ZONE_MAP],
  [STATE.BOSS_DEFEAT]: [STATE.CHIP_SELECT, STATE.TITLE],
  [STATE.NARRATIVE]: [STATE.STAGE_INTRO, STATE.BOSS_INTRO, STATE.TITLE, STATE.ZONE_MAP],
  [STATE.UPGRADE]: [STATE.ZONE_MAP, STATE.TITLE],
  [STATE.CHIP_SELECT]: [STATE.NARRATIVE, STATE.STAGE_INTRO, STATE.TITLE],
  [STATE.ZONE_CLEAR]: [STATE.STAGE_INTRO, STATE.ZONE_MAP, STATE.TITLE, STATE.UPGRADE],
  [STATE.GAMEOVER]: [STATE.TITLE],
  [STATE.VICTORY]: [STATE.TITLE],
  [STATE.HIDDEN_ENDING]: [STATE.TITLE],
  [STATE.PAUSE]: [STATE.PLAYING, STATE.BOSS_FIGHT, STATE.TITLE],
  [STATE.DIFFICULTY_SELECT]: [STATE.TITLE]
};

function beginTransition(targetState, onComplete) {
  if (G._transitioning) return;
  // 역방향 전환 우선순위 체크 — REVERSE_ALLOWED 딕셔너리로 허용 여부 판단
  if (targetState < G.state) {
    const allowed = REVERSE_ALLOWED[G.state];
    if (!allowed || !allowed.includes(targetState)) return;
  }
  // PAUSE는 PLAYING/BOSS_FIGHT에서만
  if (targetState === STATE.PAUSE && G.state !== STATE.PLAYING && G.state !== STATE.BOSS_FIGHT) return;
  G._transitioning = true;
  G._transTarget = targetState;
  tw.add({
    target: G, prop: '_transAlpha', from: 0, to: 1, dur: 300,
    onComplete: function() {
      G.prevState = G.state;
      G.state = targetState;
      if (onComplete) onComplete();
      tw.add({
        target: G, prop: '_transAlpha', from: 1, to: 0, dur: 300,
        onComplete: function() { G._transitioning = false; }
      });
    }
  });
}

// 즉시 상태 전환 (인트로/부트용)
function setState(s) {
  G.prevState = G.state;
  G.state = s;
}

// 새 런 시작
function startNewRun() {
  const diff = G.difficulty;
  const save = G.save;
  const maxHp = CONFIG.PLAYER_BASE_HP[diff] + (save.upgrades.flow >= 1 ? 15 : 0);
  G.player = { hp: maxHp, maxHp: maxHp, x: 0, y: 0, pose: 'idle', poseTimer: 0,
    comboGlow: 0, invincible: 0, secondChanceUsed: false };
  G.combo = 0;
  G.maxCombo = 0;
  G.score = 0;
  G.totalPerfects = 0;
  G.totalBeats = 0;
  G.chips = [];
  G.crystalsThisRun = 0;
  G.missCounterUsed = false;
  G._missCounterActive = false;
  G.doublePending = null;
  G.doubleTimer = 0;
  G.doubleFirstJudge = null;
  G.ddaLevel = 0;
  G.ddaMissStreak = 0;
  G.ddaPerfectStreak = 0;
  G.bossRewardGiven = false;
  G.enemies = [];
  G.boss = null;
  G.beats = [];
  G.rng = new SeededRNG(Date.now());
  G.save.totalPlayCount = (G.save.totalPlayCount || 0) + 1;
  saveSave(G.save);
}

// 스테이지 시작
function startStage(zone, stage) {
  G.currentZone = zone;
  G.currentStage = stage;
  G.stageIdx = getStageIndex(zone, stage);
  G.bossRewardGiven = false;
  const stageData = CONFIG.STAGES[G.stageIdx];
  if (!stageData) { beginTransition(STATE.VICTORY); return; }
  // BPM 설정 (tween 경유)
  const bpmRange = CONFIG.ZONE_BPM[zone] || [120, 140];
  const targetBpm = bpmRange[0] + (bpmRange[1] - bpmRange[0]) * (stage / 3);
  tw.add({ target: G, prop: 'bpm', from: G.bpm || bpmRange[0], to: targetBpm, dur: 500, onComplete: function() {
    G.beatInterval = getBeatInterval(G.bpm);
  }});
  // 보스 여부
  if (isBossStage(G.stageIdx)) {
    const bossIdx = getBossIndex(G.stageIdx);
    const hpMul = CONFIG.DIFF_HP_MUL[G.difficulty];
    G.boss = createBoss(bossIdx, Math.round(stageData[0] * hpMul), stageData[1]);
    G.enemies = [];
    G.beats = generateBossBeats(G.rng, targetBpm, bossIdx, 0);
  } else {
    G.boss = null;
    // 일반 적 생성 (3~5마리)
    const numEnemies = G.rng.int(3, 5);
    const hpMul = CONFIG.DIFF_HP_MUL[G.difficulty];
    G.enemies = [];
    for (let i = 0; i < numEnemies; i++) {
      G.enemies.push(createEnemy(
        Math.round(stageData[0] * hpMul),
        stageData[1],
        i % 5,
        zone
      ));
    }
    const density = stageData[2] * CONFIG.DIFF_DENSITY_MUL[G.difficulty];
    G.beats = generateBeats(G.rng, targetBpm, density, 60000, null);
  }
  G.stageStartTime = G.time;
  G.currentBeatIdx = 0;
  // 스테이지 인트로
  G._introAlpha = 0;
  G._introTimer = 0;
  if (isBossStage(G.stageIdx)) {
    beginTransition(STATE.BOSS_INTRO, function() {
      sound.playBossIntro();
      tw.add({ target: G, prop: '_introAlpha', from: 0, to: 1, dur: 500 });
      tw.add({ target: G, prop: '_introTimer', from: 0, to: 3000, dur: 3000, onComplete: function() {
        sound.startBGM(G.currentZone, G.bpm);
        beginTransition(STATE.BOSS_FIGHT);
      }});
    });
  } else {
    beginTransition(STATE.STAGE_INTRO, function() {
      tw.add({ target: G, prop: '_introAlpha', from: 0, to: 1, dur: 500 });
      tw.add({ target: G, prop: '_introTimer', from: 0, to: 2000, dur: 2000, onComplete: function() {
        G.stageStartTime = G.time;
        sound.startBGM(G.currentZone, G.bpm);
        beginTransition(STATE.PLAYING);
      }});
    });
  }
}

// 스테이지 클리어 처리
function onStageClear() {
  if (G._transitioning) return;
  const stageData = CONFIG.STAGES[G.stageIdx];
  const crystals = stageData ? stageData[3] : 0;
  // 크리스탈 배율 칩
  let cMul = 1;
  for (let i = 0; i < G.chips.length; i++) {
    if (G.chips[i].effect === 'crystalMul') cMul += G.chips[i].val;
  }
  const earnedCrystals = Math.round(crystals * cMul);
  G.crystalsThisRun += earnedCrystals;
  G.score += CONFIG.CLEAR_BONUS_PER_STAGE * (G.stageIdx + 1);
  // 업그레이드: 리커버리 (Lv3)
  if (G.save.upgrades.flow >= 3) {
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + 20);
  }
  sound.stopBGM();
  sound.playClear();
  // 보스 스테이지 후 → 칩 선택 + 존 클리어
  if (isBossStage(G.stageIdx)) {
    beginTransition(STATE.BOSS_DEFEAT, function() {
      tw.add({ target: G, prop: '_introTimer', from: 0, to: 2000, dur: 2000, onComplete: function() {
        // 존 클리어 체크
        const zone = G.currentZone;
        if (zone < 5) {
          // 칩 선택
          G.chipChoices = generateChipChoices(G.rng, G.chips);
          if (G.chipChoices.length > 0) {
            G.menuIdx = 0;
            beginTransition(STATE.CHIP_SELECT);
          } else {
            advanceToNextZone();
          }
        } else if (zone === 5) {
          // 히든 1 클리어 → 히든 2
          G.save.unlockedZones[6] = true;
          saveSave(G.save);
          advanceToNextZone();
        } else {
          // Void DJ 격파 → 진엔딩
          G.save.hiddenBossDefeated = true;
          finishRun(true);
          beginTransition(STATE.HIDDEN_ENDING);
        }
      }});
    });
  } else {
    beginTransition(STATE.STAGE_CLEAR, function() {
      tw.add({ target: G, prop: '_introTimer', from: 0, to: 1500, dur: 1500, onComplete: function() {
        advanceStage();
      }});
    });
  }
}

// 다음 스테이지로 진행
function advanceStage() {
  const nextStage = G.currentStage + 1;
  if (nextStage <= 3) {
    startStage(G.currentZone, nextStage);
  } else {
    // 존 클리어 (보스 후 처리이므로 여기는 보통 안 옴)
    advanceToNextZone();
  }
}

// 다음 존으로 진행
function advanceToNextZone() {
  const nextZone = G.currentZone + 1;
  if (nextZone <= 4) {
    // 내러티브 표시
    G.save.unlockedZones[nextZone] = true;
    saveSave(G.save);
    G.narrativeLines = CONFIG.NARRATIVES[G.lang][G.currentZone];
    G.narrativeIdx = 0;
    G._introAlpha = 0;
    beginTransition(STATE.NARRATIVE, function() {
      tw.add({ target: G, prop: '_introAlpha', from: 0, to: 1, dur: 500 });
    });
  } else if (nextZone === 5) {
    // 5존 클리어 → 일반 엔딩 + 히든 해금
    G.save.unlockedZones[5] = true;
    saveSave(G.save);
    finishRun(false);
    beginTransition(STATE.VICTORY);
  } else if (nextZone === 6) {
    // 히든 1 → 히든 2 (Void DJ)
    startStage(6, 0);
  } else {
    finishRun(true);
    beginTransition(STATE.HIDDEN_ENDING);
  }
}

// 칩 선택 완료 후
function onChipSelected(chipIdx) {
  if (chipIdx < 0 || chipIdx >= G.chipChoices.length) return;
  G.chips.push(G.chipChoices[chipIdx]);
  sound.playChipGet();
  G.chipChoices = [];
  // 내러티브 → 다음 존
  advanceToNextZone();
}

// 내러티브 진행
function advanceNarrative() {
  G.narrativeIdx++;
  const narr = CONFIG.NARRATIVES[G.lang][G.currentZone];
  if (!narr || G.narrativeIdx >= narr.length) {
    // 다음 존 시작
    startStage(G.currentZone + 1, 0);
  } else {
    G.narrativeLines = narr;
    G._introAlpha = 0;
    tw.add({ target: G, prop: '_introAlpha', from: 0, to: 1, dur: 500 });
  }
}

// 게임 오버
function onGameOver() {
  if (G._transitioning) return;
  if (G.player.hp > 0) return;
  finishRun(false);
  sound.stopBGM();
  sound.playGameOver();
  camShake(15, 500);
  beginTransition(STATE.GAMEOVER);
}

// 런 종료 + 저장
function finishRun(victory) {
  // 판정 먼저 (F8)
  const diff = G.difficulty;
  const isNew = G.score > (G.save.highScores[diff] || 0);
  // 저장 나중에
  if (isNew) G.save.highScores[diff] = G.score;
  if (G.combo > (G.save.bestCombo || 0)) G.save.bestCombo = G.combo;
  if (G.maxCombo > (G.save.bestCombo || 0)) G.save.bestCombo = G.maxCombo;
  const zoneReached = G.currentZone;
  if (zoneReached > (G.save.bestZone || 0)) G.save.bestZone = zoneReached;
  G.save.crystals = (G.save.crystals || 0) + G.crystalsThisRun;
  G.save.totalBeats = (G.save.totalBeats || 0) + G.totalBeats;
  G.save.totalPerfects = (G.save.totalPerfects || 0) + G.totalPerfects;
  saveSave(G.save);
}

// 카메라 쉐이크
function camShake(intensity, dur) {
  G.camShakeTime = dur;
  tw.add({ target: G, prop: 'camShakeTime', from: dur, to: 0, dur: dur, ease: 'linear' });
}

// 저장 데이터 로드
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      // 기본값 병합
      return Object.assign(getDefaultSave(), data);
    }
  } catch(e) {}
  return getDefaultSave();
}

// 기본 저장 데이터
function getDefaultSave() {
  return {
    version: 1,
    lang: 'ko',
    difficulty: 'dj',
    highScores: { beginner: 0, dj: 0, maestro: 0 },
    bestCombo: 0,
    bestZone: 0,
    bestStage: 0,
    crystals: 0,
    upgrades: { rhythm: 0, power: 0, flow: 0 },
    unlockedZones: [true, false, false, false, false, false, false],
    hiddenBossDefeated: false,
    totalPlayCount: 0,
    totalBeats: 0,
    totalPerfects: 0,
    seed: null
  };
}

// 저장
function saveSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

// 언어 토글
function toggleLang() {
  G.lang = G.lang === 'ko' ? 'en' : 'ko';
  G.save.lang = G.lang;
  saveSave(G.save);
}
