// DOM 요소
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 논리 해상도
let logW = 800, logH = 600;
let scaleX = 1, scaleY = 1;
let dpr = 1;

// 엔진 인스턴스
const tw = new TweenManager();
const sound = new SoundManager();
const particles = new ObjectPool(
  () => ({ x:0,y:0,vx:0,vy:0,life:0,maxLife:1,alpha:1,color:'#fff',size:4,rot:0,rotSpeed:0,gravity:0,scale:1,scaleDecay:0 }),
  (p) => { p.life = p.maxLife; p.alpha = 1; p.rot = 0; p.scale = 1; },
  300
);

// Canvas 리사이즈
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  logW = w;
  logH = h;
  scaleX = 1;
  scaleY = 1;
}

// 입력 좌표 변환
function inputToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

// 키 상태
const keys = {};
let lastTapTime = 0;
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let isTouching = false;
let holdStartTime = 0;
let isHolding = false;

// 비트 공격 처리 — 판정 결과를 적용하는 공통 함수
function applyBeatResult(result, beatType, isDoubleSecondHit) {
  G.totalBeats++;
  // 판정 표시
  G.judgeDisplay = { type: result.type, alpha: 1, y: logH * 0.55 };
  tw.add({ target: G.judgeDisplay, prop: 'alpha', from: 1, to: 0, dur: 800 });
  tw.add({ target: G.judgeDisplay, prop: 'y', from: logH * 0.55, to: logH * 0.45, dur: 800 });
  sound.playJudge(result.type);
  if (result.type === 'perfect' || result.type === 'great' || result.type === 'good') {
    // 콤보 업데이트
    G.combo = updateCombo(result.type, G.combo, G.difficulty, G.save.upgrades);
    if (G.combo > G.maxCombo) G.maxCombo = G.combo;
    // 콤보 마일스톤
    if (G.combo === 5 || G.combo === 10 || G.combo === 20) sound.playCombo(G.combo);
    // 홀드 비트 시작 — 판정 성공 시 holdActive 활성화
    if (result.beat && result.beat.type === 'hold' && (result.type === 'perfect' || result.type === 'great')) {
      result.beat.holdActive = true;
      result.beat.holdStart = G.time;
      G.player.pose = 'hold';
      G.player.poseTimer = result.beat.holdDur + 200;
    }
    // 드롭 더 베이스 반격 보너스: 이전 Miss에서 missCounter 발동 시 대미지 2x
    let missCounterMul = 1;
    if (G._missCounterActive) {
      missCounterMul = 2;
      G._missCounterActive = false;
    }
    // 대미지 계산
    let dmg = calcDamage(CONFIG.PLAYER_BASE_DMG, result.type, G.combo, G.chips, G.save.upgrades, beatType, G.difficulty);
    dmg = Math.round(dmg * missCounterMul);
    // 더블 비트 두 번째 히트 + 두 번 다 Perfect 보너스
    if (isDoubleSecondHit && result.type === 'perfect' && G.doubleFirstJudge === 'perfect') {
      dmg = Math.round(dmg * 1.5);
      G.score += Math.round(CONFIG.BASE_SCORE * 0.5);
      spawnPulseEffect();
    }
    // 점수
    const scoreGain = calcScore(result.type, G.combo, sumChipEffect(G.chips, 'comboBonus'));
    G.score += scoreGain;
    if (result.type === 'perfect') {
      G.totalPerfects++;
      G.ddaPerfectStreak++;
      G.ddaMissStreak = 0;
      // Perfect 오라 (Rhythm Lv5)
      if (G.save.upgrades.rhythm >= 5) G.player.hp = Math.min(G.player.maxHp, G.player.hp + 1);
      // 풀스크린 네온 펄스 이펙트
      if (!isDoubleSecondHit) spawnPulseEffect();
    }
    // 대미지 적용
    if (G.boss && G.boss.alive) {
      applyDamageToBoss(G.boss, dmg);
      if (!G.boss.alive) { checkBossDefeat(G.boss); onStageClear(); }
    } else if (G.enemies.length > 0) {
      const target = G.enemies.find(e => e.alive);
      if (target) {
        applyDamageToEnemy(target, dmg);
        spawnHitParticles(target.x || logW * 0.65, target.y || logH * 0.35);
        if (!target.alive) {
          if (!G.enemies.some(e => e.alive)) onStageClear();
        }
      }
    }
    // 콤보 칩: 크로스페이더 (콤보10+ HP+3)
    if (G.combo >= 10) {
      for (let i = 0; i < G.chips.length; i++) {
        if (G.chips[i].effect === 'comboHeal') G.player.hp = Math.min(G.player.maxHp, G.player.hp + G.chips[i].val);
      }
    }
    // 콤보 칩: 비트드롭 (콤보20 AoE)
    if (G.combo >= 20) {
      for (let i = 0; i < G.chips.length; i++) {
        if (G.chips[i].effect === 'comboAoe') {
          G.enemies.forEach(e => { if (e.alive) applyDamageToEnemy(e, Math.round(e.maxHp * G.chips[i].val)); });
          if (G.boss && G.boss.alive) applyDamageToBoss(G.boss, Math.round(G.boss.maxHp * G.chips[i].val));
        }
      }
    }
    // 플레이어 포즈
    G.player.pose = 'attack';
    G.player.poseTimer = 200;
  } else {
    // Miss
    applyMissPenalty();
  }
  // DDA 업데이트
  G.ddaLevel = updateDDA(G.player, G.difficulty, G.ddaPerfectStreak, G.ddaMissStreak);
}

// Miss 공통 처리 (handleBeatAttack + updateMissedBeats에서 재사용)
function applyMissPenalty() {
  G.combo = 0;
  G.ddaPerfectStreak = 0;
  // 엔듀어 (Flow Lv5): 3연속 Miss 방지 — 3번째 Miss를 Good으로 변환
  if (G.save.upgrades.flow >= 5 && G.ddaMissStreak >= 2) {
    G.ddaMissStreak = 0;
    // Good으로 변환: 대미지 적용 + 콤보는 리셋 상태 유지
    const dmg = calcDamage(CONFIG.PLAYER_BASE_DMG, 'good', 0, G.chips, G.save.upgrades, 'basic', G.difficulty);
    G.judgeDisplay = { type: 'good', alpha: 1, y: logH * 0.55 };
    tw.add({ target: G.judgeDisplay, prop: 'alpha', from: 1, to: 0, dur: 600 });
    sound.playJudge('good');
    // 대미지를 적에게 적용
    if (G.boss && G.boss.alive) {
      applyDamageToBoss(G.boss, dmg);
      if (!G.boss.alive) { checkBossDefeat(G.boss); onStageClear(); }
    } else {
      const target = G.enemies.find(e => e.alive);
      if (target) {
        applyDamageToEnemy(target, dmg);
        if (!target.alive && !G.enemies.some(e => e.alive)) onStageClear();
      }
    }
    return;
  }
  G.ddaMissStreak++;
  // Miss 반격 칩: 드롭 더 베이스 — 다음 비트에 2x 대미지 부여
  if (!G.missCounterUsed) {
    for (let i = 0; i < G.chips.length; i++) {
      if (G.chips[i].effect === 'missCounter') {
        G.missCounterUsed = true;
        G._missCounterActive = true;
        spawnHitParticles(G.player.x || logW * 0.2, G.player.y || logH * 0.45);
        break;
      }
    }
  }
  // 적 공격
  const attacker = G.boss && G.boss.alive ? G.boss : G.enemies.find(e => e.alive);
  if (attacker) {
    enemyAttack(G.player, attacker, G.chips, G.save.upgrades, G.difficulty);
    sound.playHit();
    camShake(5, 200);
    G.player.pose = 'hit';
    G.player.poseTimer = 300;
    if (G.player.hp <= 0) onGameOver();
  }
}

// 비트 공격 처리 (§2.2: 더블 비트 2연타 지원)
function handleBeatAttack() {
  if (G.state !== STATE.PLAYING && G.state !== STATE.BOSS_FIGHT) return;
  sound.resume();
  // 더블 비트 두 번째 탭 처리
  if (G.doublePending) {
    const secondResult = { type: G.doublePending.firstResult.type, beat: G.doublePending.firstResult.beat, delta: G.doublePending.firstResult.delta };
    // 두 번째 탭도 판정 (기존 비트 시간 기준)
    const beatTime2 = getCurrentBeatTime();
    const delta2 = Math.abs(beatTime2 - G.doublePending.beatTime);
    const judgeW2 = G.doublePending.judgeW;
    if (delta2 <= judgeW2.perfect) secondResult.type = 'perfect';
    else if (delta2 <= judgeW2.great) secondResult.type = 'great';
    else if (delta2 <= judgeW2.good) secondResult.type = 'good';
    else secondResult.type = 'miss';
    G.doubleFirstJudge = G.doublePending.firstJudge;
    G.doublePending = null;
    G.doubleTimer = 0;
    applyBeatResult(secondResult, 'double', true);
    return;
  }
  const beatTime = getCurrentBeatTime();
  const baseJudge = CONFIG.JUDGE[G.difficulty];
  // 업그레이드: 비트 감각 (Rhythm Lv1)
  let extraPerfect = 0;
  if (G.save.upgrades.rhythm >= 1) extraPerfect = 5;
  // 칩: 메트로놈
  for (let i = 0; i < G.chips.length; i++) {
    if (G.chips[i].effect === 'perfectWindow') extraPerfect += G.chips[i].val;
  }
  const judgeW = getDDAJudgeWindows({
    perfect: baseJudge.perfect + extraPerfect,
    great: baseJudge.great,
    good: baseJudge.good
  }, G.ddaLevel);
  const result = judgeInput(beatTime, G.beats, judgeW);
  // 더블 비트 첫 번째 탭: 두 번째 입력 대기 상태 진입
  if (result.beat && result.beat.type === 'double' && (result.type === 'perfect' || result.type === 'great' || result.type === 'good')) {
    G.doublePending = {
      firstResult: result,
      firstJudge: result.type,
      beatTime: result.beat.time,
      judgeW: judgeW,
      timer: 0
    };
    G.doubleTimer = 400;
    // 첫 번째 탭 즉시 대미지 적용
    applyBeatResult(result, 'double', false);
    return;
  }
  applyBeatResult(result, result.beat ? result.beat.type : 'basic', false);
}

// 회피 처리
function handleDodge(direction) {
  if (G.state !== STATE.PLAYING && G.state !== STATE.BOSS_FIGHT) return;
  // 현재 회피 비트 확인
  const beatTime = getCurrentBeatTime();
  for (let i = 0; i < G.beats.length; i++) {
    const b = G.beats[i];
    if (b.judged || b.missed || b.type !== 'dodge') continue;
    if (Math.abs(beatTime - b.time) <= CONFIG.JUDGE[G.difficulty].good + 50) {
      b.judged = true;
      G.combo++;
      if (G.combo > G.maxCombo) G.maxCombo = G.combo;
      G.score += calcScore('great', G.combo, 0);
      sound.playDodge();
      G.player.pose = direction < 0 ? 'dodgeL' : 'dodgeR';
      G.player.poseTimer = 300;
      // 서브우퍼 칩
      const aoeDmg = processDodge(direction, G.chips);
      if (aoeDmg > 0) {
        G.enemies.forEach(e => { if (e.alive) applyDamageToEnemy(e, aoeDmg); });
        if (G.boss && G.boss.alive) applyDamageToBoss(G.boss, aoeDmg);
      }
      return;
    }
  }
}

// 네온 펄스 이펙트 (시그니처)
function spawnPulseEffect() {
  const c = zoneColor(G.currentZone);
  for (let i = 0; i < 12; i++) {
    const p = particles.acquire();
    if (!p) break;
    const angle = (i / 12) * 6.28;
    p.x = logW * 0.5;
    p.y = logH * 0.5;
    p.vx = Math.cos(angle) * 300;
    p.vy = Math.sin(angle) * 300;
    p.life = 600;
    p.maxLife = 600;
    p.color = c[2];
    p.size = 6;
    p.gravity = 0;
    p.scaleDecay = 0.5;
  }
}

// 히트 파티클 생성
function spawnHitParticles(x, y) {
  const c = zoneColor(G.currentZone);
  for (let i = 0; i < 6; i++) {
    const p = particles.acquire();
    if (!p) break;
    p.x = x;
    p.y = y;
    p.vx = (G.rng.next() - 0.5) * 200;
    p.vy = (G.rng.next() - 0.5) * 200;
    p.life = 400;
    p.maxLife = 400;
    p.color = G.rng.next() < 0.5 ? c[0] : c[2];
    p.size = 3 + G.rng.next() * 4;
    p.gravity = 100;
  }
}

// 키보드 이벤트
window.addEventListener('keydown', function(e) {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
  if (keys[e.code]) return;
  keys[e.code] = true;
  sound.init();
  sound.resume();
  handleKeyAction(e.code);
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
  // 홀드 비트 종료
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    isHolding = false;
  }
});

// 키 액션 처리
function handleKeyAction(code) {
  switch (G.state) {
    case STATE.TITLE:
      if (code === 'Space' || code === 'Enter') beginTransition(STATE.DIFFICULTY_SELECT);
      break;
    case STATE.DIFFICULTY_SELECT:
      if (code === 'ArrowUp' || code === 'KeyW') G.menuIdx = (G.menuIdx + 2) % 3;
      else if (code === 'ArrowDown' || code === 'KeyS') G.menuIdx = (G.menuIdx + 1) % 3;
      else if (code === 'Space' || code === 'Enter') {
        G.difficulty = ['beginner','dj','maestro'][G.menuIdx];
        G.save.difficulty = G.difficulty;
        saveSave(G.save);
        startNewRun();
        G.menuIdx = 0;
        beginTransition(STATE.ZONE_MAP);
      }
      break;
    case STATE.ZONE_MAP: {
      const unlocked = G.save.unlockedZones.filter(u => u).length;
      if (code === 'ArrowUp' || code === 'KeyW') G.menuIdx = (G.menuIdx + unlocked - 1) % unlocked;
      else if (code === 'ArrowDown' || code === 'KeyS') G.menuIdx = (G.menuIdx + 1) % unlocked;
      else if (code === 'Space' || code === 'Enter') {
        // 선택된 존 시작
        const zones = [];
        for (let i = 0; i < 7; i++) if (G.save.unlockedZones[i]) zones.push(i);
        if (G.menuIdx < zones.length) startStage(zones[G.menuIdx], 0);
      }
      else if (code === 'KeyU') {
        G.upgTreeIdx = 0;
        beginTransition(STATE.UPGRADE);
      }
      break;
    }
    case STATE.PLAYING:
    case STATE.BOSS_FIGHT:
      if (code === 'Space' || code === 'ArrowUp' || code === 'KeyW') {
        holdStartTime = G.time;
        isHolding = true;
        handleBeatAttack();
      }
      else if (code === 'ArrowLeft' || code === 'KeyA') handleDodge(-1);
      else if (code === 'ArrowRight' || code === 'KeyD') handleDodge(1);
      else if (code === 'KeyP' || code === 'Escape') {
        G.pauseReturnState = G.state;
        G.menuIdx = 0;
        sound.stopBGM();
        beginTransition(STATE.PAUSE);
      }
      break;
    case STATE.PAUSE:
      if (code === 'ArrowUp' || code === 'KeyW') G.menuIdx = 0;
      else if (code === 'ArrowDown' || code === 'KeyS') G.menuIdx = 1;
      else if (code === 'Space' || code === 'Enter') {
        if (G.menuIdx === 0) { G._transitioning = false; setState(G.pauseReturnState); sound.startBGM(G.currentZone, G.bpm); }
        else { tw.clearImmediate(); particles.clear(); sound.stopBGM(); setState(STATE.TITLE); G._transitioning = false; }
      }
      else if (code === 'Escape') { G._transitioning = false; setState(G.pauseReturnState); sound.startBGM(G.currentZone, G.bpm); }
      break;
    case STATE.CHIP_SELECT:
      if (code === 'Digit1' || code === 'Numpad1') onChipSelected(0);
      else if (code === 'Digit2' || code === 'Numpad2') onChipSelected(1);
      else if (code === 'Digit3' || code === 'Numpad3') onChipSelected(2);
      else if (code === 'ArrowLeft' || code === 'KeyA') G.menuIdx = Math.max(0, G.menuIdx - 1);
      else if (code === 'ArrowRight' || code === 'KeyD') G.menuIdx = Math.min(G.chipChoices.length - 1, G.menuIdx + 1);
      else if (code === 'Space' || code === 'Enter') onChipSelected(G.menuIdx);
      break;
    case STATE.STAGE_CLEAR:
    case STATE.BOSS_DEFEAT:
    case STATE.STAGE_INTRO:
    case STATE.BOSS_INTRO:
      // 스킵/진행 — 전환 중이면 무시
      break;
    case STATE.NARRATIVE:
      if (code === 'Space' || code === 'Enter') advanceNarrative();
      break;
    case STATE.UPGRADE:
      if (code === 'ArrowLeft' || code === 'KeyA') G.upgTreeIdx = Math.max(0, G.upgTreeIdx - 1);
      else if (code === 'ArrowRight' || code === 'KeyD') G.upgTreeIdx = Math.min(2, G.upgTreeIdx + 1);
      else if (code === 'Space' || code === 'Enter') {
        const trees = ['rhythm','power','flow'];
        if (purchaseUpgrade(G.save, trees[G.upgTreeIdx])) sound.playUpgrade();
      }
      else if (code === 'Escape') beginTransition(STATE.ZONE_MAP);
      break;
    case STATE.GAMEOVER:
    case STATE.VICTORY:
    case STATE.HIDDEN_ENDING:
      if (code === 'KeyR' || code === 'Space' || code === 'Enter') {
        tw.clearImmediate();
        particles.clear();
        G._transitioning = false;
        setState(STATE.TITLE);
      }
      break;
  }
}

// 터치 이벤트
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  sound.init();
  sound.resume();
  const touch = e.touches[0];
  const pos = inputToCanvas(touch.clientX, touch.clientY);
  touchStartX = pos.x;
  touchStartY = pos.y;
  touchStartTime = Date.now();
  isTouching = true;
  handleTouchStart(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (!isTouching) return;
  isTouching = false;
  isHolding = false;
  const now = Date.now();
  // 스와이프 감지
  if (e.changedTouches.length > 0) {
    const touch = e.changedTouches[0];
    const pos = inputToCanvas(touch.clientX, touch.clientY);
    const dx = pos.x - touchStartX;
    const elapsed = now - touchStartTime;
    if (Math.abs(dx) >= CONFIG.SWIPE_MIN_DIST && elapsed <= CONFIG.SWIPE_MAX_TIME) {
      handleDodge(dx > 0 ? 1 : -1);
    }
  }
}, { passive: false });

// 터치 시작 처리
function handleTouchStart(x, y) {
  switch (G.state) {
    case STATE.TITLE: {
      // 언어 토글 체크
      const langR = getLangRect(logW, logH);
      if (hitTest(x, y, langR)) { toggleLang(); return; }
      beginTransition(STATE.DIFFICULTY_SELECT);
      break;
    }
    case STATE.DIFFICULTY_SELECT:
      for (let i = 0; i < 3; i++) {
        const r = getDiffRect(logW, logH, i);
        if (hitTest(x, y, r)) {
          G.menuIdx = i;
          G.difficulty = ['beginner','dj','maestro'][i];
          G.save.difficulty = G.difficulty;
          saveSave(G.save);
          startNewRun();
          G.menuIdx = 0;
          beginTransition(STATE.ZONE_MAP);
          return;
        }
      }
      break;
    case STATE.ZONE_MAP: {
      // 업그레이드 버튼
      const upgR = getUpgradeButtonRect(logW, logH);
      if (hitTest(x, y, upgR)) { G.upgTreeIdx = 0; beginTransition(STATE.UPGRADE); return; }
      // 존 선택
      const unlocked = [];
      for (let i = 0; i < 7; i++) if (G.save.unlockedZones[i]) unlocked.push(i);
      for (let vi = 0; vi < unlocked.length; vi++) {
        const r = getZoneRect(logW, logH, vi, unlocked.length);
        if (hitTest(x, y, r)) { startStage(unlocked[vi], 0); return; }
      }
      break;
    }
    case STATE.PLAYING:
    case STATE.BOSS_FIGHT: {
      // 일시정지 버튼
      const pauseR = getPauseRect(logW);
      if (hitTest(x, y, pauseR)) {
        G.pauseReturnState = G.state;
        G.menuIdx = 0;
        sound.stopBGM();
        beginTransition(STATE.PAUSE);
        return;
      }
      // 비트 공격 (화면 하단 60% 탭)
      holdStartTime = G.time;
      isHolding = true;
      handleBeatAttack();
      break;
    }
    case STATE.PAUSE: {
      const resumeR = getPauseMenuRect(logW, logH, 0);
      const quitR = getPauseMenuRect(logW, logH, 1);
      if (hitTest(x, y, resumeR)) { G._transitioning = false; setState(G.pauseReturnState); sound.startBGM(G.currentZone, G.bpm); }
      else if (hitTest(x, y, quitR)) { tw.clearImmediate(); particles.clear(); sound.stopBGM(); setState(STATE.TITLE); G._transitioning = false; }
      break;
    }
    case STATE.CHIP_SELECT: {
      const cardW = Math.min(140, (logW - 60) / 3);
      const cardH = 110;
      const startX = logW/2 - (cardW * G.chipChoices.length + 16 * (G.chipChoices.length - 1)) / 2;
      for (let i = 0; i < G.chipChoices.length; i++) {
        const cx = startX + i * (cardW + 16);
        const cy = logH * 0.25;
        if (hitTest(x, y, { x: cx, y: cy, w: cardW, h: cardH })) { onChipSelected(i); return; }
      }
      break;
    }
    case STATE.NARRATIVE:
      advanceNarrative();
      break;
    case STATE.STAGE_CLEAR:
    case STATE.BOSS_DEFEAT:
    case STATE.STAGE_INTRO:
    case STATE.BOSS_INTRO:
      break;
    case STATE.UPGRADE: {
      // 트리 선택
      for (let t = 0; t < 3; t++) {
        const r = getUpgTreeRect(logW, logH, t);
        if (hitTest(x, y, r)) {
          G.upgTreeIdx = t;
          const trees = ['rhythm','power','flow'];
          if (purchaseUpgrade(G.save, trees[t])) sound.playUpgrade();
          return;
        }
      }
      // 뒤로가기
      const backR = getBackButtonRect(logW, logH);
      if (hitTest(x, y, backR)) { beginTransition(STATE.ZONE_MAP); }
      break;
    }
    case STATE.GAMEOVER:
    case STATE.VICTORY:
    case STATE.HIDDEN_ENDING:
      tw.clearImmediate();
      particles.clear();
      G._transitioning = false;
      setState(STATE.TITLE);
      break;
  }
}

// 리사이즈 이벤트
window.addEventListener('resize', resizeCanvas);

// Miss된 비트 자동 체크 (프레임당) — 엔듀어 통합
function updateMissedBeats() {
  if (G.state !== STATE.PLAYING && G.state !== STATE.BOSS_FIGHT) return;
  const beatTime = getCurrentBeatTime();
  const goodW = CONFIG.JUDGE[G.difficulty].good;
  const missed = checkMissedBeats(G.beats, beatTime, goodW);
  for (let i = 0; i < missed.length; i++) {
    // applyMissPenalty에 엔듀어/드롭더베이스 로직 통합됨
    G.judgeDisplay = { type: 'miss', alpha: 1, y: logH * 0.55 };
    tw.add({ target: G.judgeDisplay, prop: 'alpha', from: 1, to: 0, dur: 600 });
    applyMissPenalty();
    if (G.player.hp <= 0) { onGameOver(); return; }
  }
  // 더블 비트 두 번째 탭 대기 타이머 소진 → 자동 Miss 처리
  if (G.doublePending) {
    G.doubleTimer -= 16.67;
    if (G.doubleTimer <= 0) {
      G.doublePending = null;
      G.doubleTimer = 0;
      // 두 번째 탭 시간 초과: miss 판정
      G.judgeDisplay = { type: 'miss', alpha: 1, y: logH * 0.55 };
      tw.add({ target: G.judgeDisplay, prop: 'alpha', from: 1, to: 0, dur: 600 });
      sound.playJudge('miss');
      applyMissPenalty();
    }
  }
  G.ddaLevel = updateDDA(G.player, G.difficulty, G.ddaPerfectStreak, G.ddaMissStreak);
}

// 적 위치 업데이트 (표시용)
function updateEnemyPositions() {
  const aliveEnemies = G.enemies.filter(e => e.alive);
  for (let i = 0; i < aliveEnemies.length; i++) {
    const e = aliveEnemies[i];
    e.x = logW * 0.55 + i * 60;
    e.y = logH * 0.3;
    e.animFrame++;
    if (e.hitFlash > 0) e.hitFlash -= 16;
  }
  if (G.boss) {
    G.boss.x = logW * 0.65;
    G.boss.y = logH * 0.3;
    G.boss.animFrame++;
    if (G.boss.hitFlash > 0) G.boss.hitFlash -= 16;
  }
}

// 메인 게임 루프
let lastTime = 0;
let loadingProgress = 0;
let assetsLoaded = false;

function gameLoop(timestamp) {
  try {
    const rawDt = timestamp - lastTime;
    const dt = Math.min(rawDt, 33.33);
    lastTime = timestamp;
    G.time += dt;
    // Canvas 스케일
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, logW, logH);
    // 카메라 쉐이크
    if (G.camShakeTime > 0) {
      const intensity = G.camShakeTime * 0.015;
      G.camShakeX = (G.rng.next() - 0.5) * intensity;
      G.camShakeY = (G.rng.next() - 0.5) * intensity;
      ctx.translate(G.camShakeX, G.camShakeY);
    }
    // 부트/로딩
    if (G.state === STATE.BOOT) {
      drawLoadingScreen(ctx, logW, logH, loadingProgress, G.time);
      if (assetsLoaded) {
        loadingProgress = 1;
        beginTransition(STATE.TITLE);
      }
    }
    // 시스템 업데이트
    if (sys(SYS.TWEEN)) tw.update(dt);
    if (sys(SYS.PARTICLE)) particles.update(dt);
    if (sys(SYS.RHYTHM) || sys(SYS.COMBAT)) {
      updateMissedBeats();
      updateEnemyPositions();
      updateHoldBeats(dt);
      // 프로시저럴 BGM 스케줄링 (§5.2)
      sound.updateBGM(G.bpm);
      // 플레이어 포즈 타이머
      if (G.player.poseTimer > 0) {
        G.player.poseTimer -= dt;
        if (G.player.poseTimer <= 0) G.player.pose = 'idle';
      }
    }
    // 배경 스크롤
    G.bgScroll1 += dt * 0.02;
    G.bgScroll2 += dt * 0.05;
    // 렌더링
    if (sys(SYS.DRAW)) {
      switch (G.state) {
        case STATE.TITLE:
          drawTitle(ctx, logW, logH, G.time);
          break;
        case STATE.DIFFICULTY_SELECT:
          drawDifficultySelect(ctx, logW, logH, G.menuIdx, G.time);
          break;
        case STATE.ZONE_MAP:
          drawZoneMap(ctx, logW, logH, G.currentZone, G.save.unlockedZones, G.menuIdx, G.time);
          break;
        case STATE.STAGE_INTRO:
          drawStageIntro(ctx, logW, logH, G.currentZone, G.currentStage, false, G.time, G._introAlpha || 1);
          break;
        case STATE.BOSS_INTRO:
          drawStageIntro(ctx, logW, logH, G.currentZone, G.currentStage, true, G.time, G._introAlpha || 1);
          break;
        case STATE.PLAYING:
        case STATE.BOSS_FIGHT:
          drawPlayingScreen(ctx, logW, logH, dt);
          break;
        case STATE.STAGE_CLEAR:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawStageClear(ctx, logW, logH, G.score, G.crystalsThisRun, G.time);
          break;
        case STATE.BOSS_DEFEAT:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawStageClear(ctx, logW, logH, G.score, G.crystalsThisRun, G.time);
          break;
        case STATE.CHIP_SELECT:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawChipSelect(ctx, logW, logH, G.chipChoices, G.menuIdx, G.time);
          break;
        case STATE.ZONE_CLEAR:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawStageClear(ctx, logW, logH, G.score, G.crystalsThisRun, G.time);
          break;
        case STATE.NARRATIVE:
          drawNarrative(ctx, logW, logH, G.narrativeLines[G.narrativeIdx] || '', G._introAlpha || 1, G.time);
          break;
        case STATE.UPGRADE:
          drawUpgradeScreen(ctx, logW, logH, G.save, G.upgTreeIdx, G.time);
          break;
        case STATE.PAUSE:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawPauseScreen(ctx, logW, logH, G.time);
          break;
        case STATE.GAMEOVER:
          drawPlayingScreen(ctx, logW, logH, dt);
          drawGameOver(ctx, logW, logH, G.score, G.save.highScores[G.difficulty] || 0, G.maxCombo, G.crystalsThisRun, G.time);
          break;
        case STATE.VICTORY:
          drawVictory(ctx, logW, logH, 'normal', G.score, G.time);
          break;
        case STATE.HIDDEN_ENDING:
          drawVictory(ctx, logW, logH, 'hidden', G.score, G.time);
          break;
      }
      // 파티클 렌더링
      if (sys(SYS.PARTICLE)) {
        particles.forEach(function(p) {
          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          if (p.rot) ctx.rotate(p.rot);
          const s = p.size * (p.scale || 1);
          ctx.fillRect(-s/2, -s/2, s, s);
          ctx.restore();
        });
      }
      // 전환 페이드
      if (G._transAlpha > 0) {
        ctx.fillStyle = 'rgba(0,0,0,' + G._transAlpha + ')';
        ctx.fillRect(0, 0, logW, logH);
      }
    }
    // 카메라 리셋
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  } catch(e) {
    // 에러 로깅 (게임 중단 방지)
    console.error('GameLoop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// 게임 화면 (PLAYING/BOSS_FIGHT) 통합 렌더링
function drawPlayingScreen(ctx, w, h, dt) {
  // 배경
  drawBackground(ctx, w, h, G.currentZone, G.bgScroll1, G.bgScroll2, G.time);
  // 비트 레인 (하단)
  const laneH = Math.max(60, h * 0.12);
  const laneY = h - laneH - 10;
  drawBeatLane(ctx, 10, laneY, w - 20, laneH, G.beats, getCurrentBeatTime(), G.bpm, G.currentZone);
  // 플레이어 (좌측)
  const px = w * 0.2;
  const py = h * 0.45;
  G.player.x = px;
  G.player.y = py;
  const c = zoneColor(G.currentZone);
  drawPlayer(ctx, px, py, 64, G.player.pose, c[0], G.combo);
  // 적 / 보스
  if (G.boss && G.boss.alive) {
    const bossSize = G.boss.idx === 5 ? 200 : 150;
    drawBoss(ctx, G.boss.x, G.boss.y, bossSize, G.boss.idx, G.boss.phase, G.boss.hp, G.boss.maxHp, G.boss.animFrame);
    // 히트 이펙트
    if (G.boss.hitFlash > 0) drawHitEffect(ctx, G.boss.x, G.boss.y, 80, G.boss.hitFlash / 200);
  } else {
    for (let i = 0; i < G.enemies.length; i++) {
      const e = G.enemies[i];
      if (!e.alive) continue;
      drawEnemy(ctx, e.x, e.y, 48, e.type, e.hp, e.maxHp, e.animFrame, e.zone);
      if (e.hitFlash > 0) drawHitEffect(ctx, e.x, e.y, 40, e.hitFlash / 200);
    }
  }
  // 판정 표시
  drawJudgement(ctx, w * 0.4, G.judgeDisplay.y, G.judgeDisplay.type, G.judgeDisplay.alpha);
  // 콤보 카운터
  drawComboCounter(ctx, w * 0.4, h * 0.35, G.combo, Math.min(CONFIG.COMBO_MAX_MUL, 1 + G.combo * CONFIG.COMBO_PER), G.comboDisplay.scale);
  // HUD
  drawUI(ctx, w, h, G.player.hp, G.player.maxHp, G.score, G.combo, G.currentZone, G.currentStage, G.crystalsThisRun);
  // 비트 펄스 오버레이
  const beatTime = getCurrentBeatTime();
  const interval = getBeatInterval(G.bpm);
  const beatPhase = (beatTime % interval) / interval;
  if (beatPhase < 0.1) {
    ctx.fillStyle = c[2];
    ctx.globalAlpha = 0.05 * (1 - beatPhase / 0.1);
    ctx.fillRect(0, 0, w, h);
    ctx.globalAlpha = 1;
  }
  // DDA 표시
  if (G.ddaLevel > 0 && G.difficulty !== 'maestro') {
    ctx.fillStyle = '#00ff87';
    ctx.globalAlpha = 0.6;
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('DDA Lv' + G.ddaLevel, w - 10, h - 24);
    ctx.globalAlpha = 1;
  }
}

// 초기화 및 시작
function init() {
  resizeCanvas();
  initGameState();
  // 에셋 불요 — 즉시 로드 완료 (F1, F68 준수)
  loadingProgress = 1;
  assetsLoaded = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// 게임 시작
init();
</script>
