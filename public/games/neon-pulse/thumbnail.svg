<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050010"/>
      <stop offset="40%" stop-color="#1A0033"/>
      <stop offset="70%" stop-color="#0D001A"/>
      <stop offset="100%" stop-color="#000D1A"/>
    </linearGradient>
    <radialGradient id="tNeb1" cx="0.3" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#FF6EC7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6EC7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tNeb2" cx="0.7" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
    <radialGradient id="tCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </radialGradient>
    <linearGradient id="tVisor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="50%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="tEnemy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
    <linearGradient id="tTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="30%" stop-color="#00FFFF"/>
      <stop offset="60%" stop-color="#FF6EC7"/>
      <stop offset="100%" stop-color="#00FFFF"/>
    </linearGradient>
    <linearGradient id="tSubTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="tHorizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6EC7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6EC7" stop-opacity="0"/>
    </linearGradient>
    <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tGlowS" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tGlowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="tTextGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#tSky)"/>

  <!-- Nebula clouds -->
  <ellipse cx="120" cy="120" rx="130" ry="90" fill="url(#tNeb1)"/>
  <ellipse cx="300" cy="80" rx="120" ry="80" fill="url(#tNeb2)"/>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="20" cy="15" r="0.8" opacity="0.7"/><circle cx="55" cy="30" r="0.6" opacity="0.5"/>
    <circle cx="90" cy="12" r="1" opacity="0.8"/><circle cx="130" cy="40" r="0.5" opacity="0.4"/>
    <circle cx="170" cy="18" r="0.9" opacity="0.7"/><circle cx="210" cy="35" r="0.7" opacity="0.6"/>
    <circle cx="250" cy="10" r="0.8" opacity="0.7"/><circle cx="290" cy="28" r="0.6" opacity="0.5"/>
    <circle cx="330" cy="15" r="1" opacity="0.8"/><circle cx="370" cy="42" r="0.7" opacity="0.6"/>
    <circle cx="40" cy="55" r="0.7" opacity="0.5"/><circle cx="100" cy="65" r="0.5" opacity="0.4"/>
    <circle cx="160" cy="50" r="0.8" opacity="0.6"/><circle cx="220" cy="60" r="0.6" opacity="0.5"/>
    <circle cx="280" cy="55" r="0.9" opacity="0.7"/><circle cx="340" cy="70" r="0.5" opacity="0.4"/>
    <circle cx="385" cy="20" r="0.7" opacity="0.6"/><circle cx="15" cy="80" r="0.6" opacity="0.5"/>
    <circle cx="75" cy="90" r="0.8" opacity="0.6"/><circle cx="350" cy="85" r="0.7" opacity="0.5"/>
    <circle cx="195" cy="75" r="0.5" opacity="0.4"/><circle cx="310" cy="48" r="0.8" opacity="0.6"/>
  </g>
  <!-- Neon stars -->
  <g filter="url(#tGlowS)">
    <circle cx="50" cy="25" r="1.2" fill="#FF6EC7" opacity="0.5"/>
    <circle cx="180" cy="30" r="1" fill="#00FFFF" opacity="0.5"/>
    <circle cx="320" cy="22" r="1.1" fill="#7B68EE" opacity="0.5"/>
    <circle cx="260" cy="65" r="1" fill="#FFD740" opacity="0.4"/>
  </g>

  <!-- Distant city skyline -->
  <g id="tCity" opacity="0.3">
    <path d="M0 185 L0 170 L15 170 L15 160 L30 160 L30 165 L45 165 L45 150 L55 150 L55 140 L65 140 L65 155 L80 155 L80 145 L95 145 L95 135 L105 135 L105 150 L120 150 L120 160 L140 160 L140 148 L155 148 L155 138 L165 138 L165 148 L180 148 L180 155 L200 155 L200 140 L215 140 L215 130 L225 130 L225 145 L240 145 L240 160 L260 160 L260 148 L275 148 L275 138 L285 138 L285 150 L300 150 L300 162 L320 162 L320 150 L335 150 L335 140 L345 140 L345 155 L360 155 L360 165 L380 165 L380 155 L395 155 L395 170 L400 170 L400 185Z" fill="#0D001A" stroke="#7B68EE" stroke-width="0.3"/>
  </g>

  <!-- Neon signs on buildings -->
  <g filter="url(#tGlow)" opacity="0.5">
    <rect x="53" y="142" width="5" height="2.5" fill="#FF6EC7" rx="1"/>
    <rect x="153" y="140" width="6" height="2.5" fill="#00FFFF" rx="1"/>
    <rect x="213" y="132" width="5" height="2.5" fill="#FFD740" rx="1"/>
    <rect x="273" y="140" width="6" height="2.5" fill="#FF6EC7" rx="1"/>
    <rect x="333" y="142" width="5" height="2.5" fill="#00FFFF" rx="1"/>
  </g>

  <!-- Horizon glow -->
  <rect x="0" y="180" width="400" height="10" fill="url(#tHorizon)" opacity="0.4"/>

  <!-- Synthwave grid floor -->
  <g opacity="0.12">
    <line x1="200" y1="185" x2="0" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="50" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="100" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="150" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="200" y2="230" stroke="#FF6EC7" stroke-width="0.5"/>
    <line x1="200" y1="185" x2="250" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="300" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="350" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="200" y1="185" x2="400" y2="230" stroke="#FF6EC7" stroke-width="0.4"/>
    <line x1="0" y1="195" x2="400" y2="195" stroke="#FF6EC7" stroke-width="0.3"/>
    <line x1="0" y1="205" x2="400" y2="205" stroke="#FF6EC7" stroke-width="0.3"/>
    <line x1="0" y1="218" x2="400" y2="218" stroke="#FF6EC7" stroke-width="0.3"/>
  </g>

  <!-- Beat lane visualization -->
  <g id="tBeatLane">
    <rect x="30" y="192" width="340" height="22" rx="4" fill="#1A0033" opacity="0.6" stroke="#FF6EC7" stroke-width="0.5"/>
    <!-- Beat markers moving along lane -->
    <circle cx="80" cy="203" r="5" fill="#FF6EC7" opacity="0.7" filter="url(#tGlow)"/>
    <circle cx="130" cy="203" r="5" fill="#00FFFF" opacity="0.8" filter="url(#tGlow)"/>
    <circle cx="180" cy="203" r="5" fill="#FFD740" opacity="0.6" filter="url(#tGlow)"/>
    <circle cx="230" cy="203" r="5" fill="#FF6EC7" opacity="0.7" filter="url(#tGlow)"/>
    <circle cx="280" cy="203" r="5" fill="#7B68EE" opacity="0.6" filter="url(#tGlow)"/>
    <!-- Judgment line -->
    <line x1="310" y1="190" x2="310" y2="216" stroke="#FFFFFF" stroke-width="2" opacity="0.8" filter="url(#tGlow)"/>
    <!-- "PERFECT" text -->
    <text x="295" y="189" font-size="6" fill="#FFD740" font-family="monospace" font-weight="bold" opacity="0.8" filter="url(#tGlowS)">PERFECT!</text>
  </g>

  <!-- Player character (DJ Neon) -->
  <g id="tPlayer" transform="translate(290, 125) scale(0.55)" filter="url(#tShadow)">
    <!-- Aura -->
    <ellipse cx="64" cy="68" rx="35" ry="42" fill="#FF6EC7" opacity="0.15" filter="url(#tGlow)"/>
    <!-- Body -->
    <path d="M46 55 Q44 60 44 75 Q44 95 50 98 L73 98 Q79 95 79 75 Q79 60 77 55 Q72 48 64 46 Q56 48 46 55Z" fill="url(#tBodyGrad)"/>
    <!-- Jacket line -->
    <path d="M64 50 L64 96" stroke="#FF6EC7" stroke-width="0.8" opacity="0.5"/>
    <!-- Chest core -->
    <ellipse cx="64" cy="70" rx="6" ry="5" fill="url(#tCore)" filter="url(#tGlow)"/>
    <!-- Arms (attack pose) -->
    <path d="M44 58 Q35 55 28 60 Q24 65 30 68" fill="url(#tBodyGrad)" stroke="#FF6EC7" stroke-width="0.5"/>
    <path d="M79 58 Q90 50 96 55 Q100 60 94 65" fill="url(#tBodyGrad)" stroke="#FF6EC7" stroke-width="0.5"/>
    <circle cx="94" cy="62" r="4" fill="#00FFFF" filter="url(#tGlowStrong)" opacity="0.8"/>
    <!-- Head -->
    <ellipse cx="64" cy="38" rx="15" ry="13" fill="#3D2B79"/>
    <rect x="50" y="33" width="28" height="6" rx="3" fill="url(#tVisor)" filter="url(#tGlow)"/>
    <circle cx="56" cy="36" r="1.8" fill="#FFFFFF" filter="url(#tGlowS)"/>
    <circle cx="72" cy="36" r="1.8" fill="#FFFFFF" filter="url(#tGlowS)"/>
    <!-- Headphones -->
    <path d="M46 33 Q46 16 64 14 Q82 16 82 33" stroke="#00FFFF" stroke-width="2.5" fill="none"/>
    <rect x="40" y="28" width="9" height="12" rx="3.5" fill="#0066FF" stroke="#00FFFF" stroke-width="0.8"/>
    <rect x="79" y="28" width="9" height="12" rx="3.5" fill="#0066FF" stroke="#00FFFF" stroke-width="0.8"/>
    <!-- Legs -->
    <path d="M52 95 L49 112 Q48 115 51 115 L56 115" fill="url(#tBodyGrad)" stroke="#FF6EC7" stroke-width="0.4"/>
    <path d="M72 95 L75 112 Q76 115 73 115 L68 115" fill="url(#tBodyGrad)" stroke="#FF6EC7" stroke-width="0.4"/>
  </g>

  <!-- Combo counter -->
  <g id="tCombo" transform="translate(310, 105)">
    <text x="0" y="0" font-size="10" fill="#FFD740" font-family="monospace" font-weight="bold" opacity="0.8" filter="url(#tGlow)">x12</text>
    <text x="-8" y="-10" font-size="6" fill="#FFFFFF" font-family="monospace" opacity="0.5">COMBO</text>
  </g>

  <!-- Enemy (Bass Bot approaching) -->
  <g id="tEnemy" transform="translate(55, 115) scale(0.5)" filter="url(#tShadow)">
    <!-- Aura -->
    <ellipse cx="64" cy="64" rx="40" ry="40" fill="#FF4500" opacity="0.1" filter="url(#tGlow)"/>
    <!-- Speaker body -->
    <rect x="36" y="32" width="56" height="68" rx="7" fill="#222" stroke="#FF4500" stroke-width="1.2"/>
    <!-- Speaker cone -->
    <circle cx="64" cy="58" r="18" fill="#1A1A1A" stroke="#FF4500" stroke-width="0.8"/>
    <circle cx="64" cy="58" r="12" fill="#222" stroke="#FF2200" stroke-width="0.5"/>
    <circle cx="64" cy="58" r="5" fill="#FF2200" filter="url(#tGlow)" opacity="0.8"/>
    <circle cx="64" cy="58" r="2.5" fill="#FFFFFF" opacity="0.5"/>
    <!-- Angry eyes -->
    <rect x="42" y="36" width="44" height="7" rx="3.5" fill="#FF4500" opacity="0.8" filter="url(#tGlow)"/>
    <circle cx="50" cy="39.5" r="2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="78" cy="39.5" r="2" fill="#FFFFFF" opacity="0.8"/>
    <!-- Arms -->
    <path d="M36 50 Q26 55 22 65" stroke="#FF4500" stroke-width="1" fill="none"/>
    <path d="M92 50 Q102 55 106 65" stroke="#FF4500" stroke-width="1" fill="none"/>
    <!-- Sound waves -->
    <path d="M18 60 Q14 58 10 60" stroke="#FF4500" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M110 60 Q114 58 118 60" stroke="#FF4500" stroke-width="0.8" fill="none" opacity="0.4"/>
  </g>

  <!-- Second enemy (smaller, further) -->
  <g id="tEnemy2" transform="translate(120, 130) scale(0.32)" opacity="0.7">
    <rect x="36" y="32" width="56" height="68" rx="7" fill="#1A1A1A" stroke="#FF4500" stroke-width="1"/>
    <circle cx="64" cy="58" r="18" fill="#111" stroke="#FF4500" stroke-width="0.6"/>
    <circle cx="64" cy="58" r="5" fill="#FF2200" opacity="0.6" filter="url(#tGlow)"/>
    <rect x="42" y="36" width="44" height="6" rx="3" fill="#FF4500" opacity="0.6"/>
  </g>

  <!-- Hit effect / energy blast between player and enemy -->
  <g id="tBlast" transform="translate(175, 135)" filter="url(#tGlowStrong)">
    <circle cx="0" cy="0" r="12" fill="#00FFFF" opacity="0.3"/>
    <circle cx="0" cy="0" r="7" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.8"/>
    <!-- Spark lines -->
    <line x1="0" y1="-15" x2="0" y2="-8" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="8" x2="0" y2="15" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
    <line x1="-15" y1="0" x2="-8" y2="0" stroke="#FF6EC7" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="0" x2="15" y2="0" stroke="#FF6EC7" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="-10" x2="-5" y2="-5" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
    <line x1="5" y1="5" x2="10" y2="10" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Floating musical notes -->
  <g opacity="0.3" filter="url(#tGlowS)">
    <text x="30" y="95" font-size="10" fill="#FF6EC7">♪</text>
    <text x="155" y="100" font-size="8" fill="#00FFFF">♫</text>
    <text x="370" y="110" font-size="9" fill="#7B68EE">♩</text>
    <text x="240" y="90" font-size="7" fill="#FFD740">♬</text>
  </g>

  <!-- UI mockup elements -->
  <g id="tUI" opacity="0.5">
    <!-- HP hearts -->
    <g transform="translate(12,230) scale(0.35)">
      <path d="M12 20 C12 20 2 14 2 8 C2 4 5 2 8 2 C10 2 11.5 3 12 5 C12.5 3 14 2 16 2 C19 2 22 4 22 8 C22 14 12 20 12 20Z" fill="#FF1493" filter="url(#tGlowS)"/>
    </g>
    <g transform="translate(24,230) scale(0.35)">
      <path d="M12 20 C12 20 2 14 2 8 C2 4 5 2 8 2 C10 2 11.5 3 12 5 C12.5 3 14 2 16 2 C19 2 22 4 22 8 C22 14 12 20 12 20Z" fill="#FF1493" filter="url(#tGlowS)"/>
    </g>
    <g transform="translate(36,230) scale(0.35)">
      <path d="M12 20 C12 20 2 14 2 8 C2 4 5 2 8 2 C10 2 11.5 3 12 5 C12.5 3 14 2 16 2 C19 2 22 4 22 8 C22 14 12 20 12 20Z" fill="#FF1493" filter="url(#tGlowS)"/>
    </g>
    <!-- Score -->
    <text x="360" y="238" font-size="8" fill="#FFD740" font-family="monospace" text-anchor="end" opacity="0.7">★ 24,850</text>
  </g>

  <!-- Title text area (bottom) -->
  <g id="tTitleArea">
    <!-- Dark overlay for readability -->
    <rect x="0" y="248" width="400" height="52" fill="#050010" opacity="0.75"/>
    <line x1="0" y1="248" x2="400" y2="248" stroke="#FF6EC7" stroke-width="1" opacity="0.5" filter="url(#tGlowS)"/>

    <!-- Title: NEON PULSE -->
    <text x="200" y="275" font-size="28" fill="url(#tTitle)" font-family="monospace, sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="3" filter="url(#tTextGlow)">NEON PULSE</text>

    <!-- Subtitle -->
    <text x="200" y="292" font-size="9" fill="url(#tSubTitle)" font-family="monospace" text-anchor="middle" letter-spacing="2" opacity="0.8">RHYTHM ARCADE ROGUELITE</text>

    <!-- Decorative line under title -->
    <line x1="100" y1="296" x2="300" y2="296" stroke="#7B68EE" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Corner decorations -->
  <g opacity="0.3" filter="url(#tGlowS)">
    <path d="M0 0 L20 0 L20 3 L3 3 L3 20 L0 20Z" stroke="#00FFFF" stroke-width="0.5" fill="none"/>
    <path d="M400 0 L380 0 L380 3 L397 3 L397 20 L400 20Z" stroke="#00FFFF" stroke-width="0.5" fill="none"/>
    <path d="M0 300 L20 300 L20 297 L3 297 L3 280 L0 280Z" stroke="#FF6EC7" stroke-width="0.5" fill="none"/>
    <path d="M400 300 L380 300 L380 297 L397 297 L397 280 L400 280Z" stroke="#FF6EC7" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Scanline effect overlay -->
  <g opacity="0.03">
    <line x1="0" y1="2" x2="400" y2="2" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="6" x2="400" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="10" x2="400" y2="10" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="14" x2="400" y2="14" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="18" x2="400" y2="18" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="22" x2="400" y2="22" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="26" x2="400" y2="26" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="30" x2="400" y2="30" stroke="#FFFFFF" stroke-width="1"/>
  </g>
</svg>