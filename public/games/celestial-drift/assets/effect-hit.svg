<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="xCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFEE88" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF8822" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#FF4400" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="xOuter" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFAA44" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#FF6622" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#441100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="xRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#FFCC44" stop-opacity="0"/>
      <stop offset="75%" stop-color="#FF8844" stop-opacity="0.5"/>
      <stop offset="85%" stop-color="#FF6622" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CC2200" stop-opacity="0"/>
    </radialGradient>
    <filter id="xGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="xSoftGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Outermost shockwave -->
  <circle cx="64" cy="64" r="58" fill="url(#xOuter)" opacity="0.3"/>

  <!-- Layer 2: Shockwave ring -->
  <circle cx="64" cy="64" r="48" fill="url(#xRing)" opacity="0.5"/>

  <!-- Layer 3: Secondary ring -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#FF8844" stroke-width="2" opacity="0.4"/>
  <circle cx="64" cy="64" r="34" fill="none" stroke="#FFAA66" stroke-width="1" opacity="0.3"/>

  <!-- Layer 4: Inner glow -->
  <circle cx="64" cy="64" r="24" fill="url(#xCore)" filter="url(#xSoftGlow)"/>

  <!-- Layer 5: Core flash -->
  <circle cx="64" cy="64" r="10" fill="#FFFFFF" opacity="0.9" filter="url(#xGlow)"/>
  <circle cx="64" cy="64" r="5" fill="#FFFFFF" opacity="1"/>

  <!-- Radial debris rays -->
  <g opacity="0.6">
    <line x1="64" y1="64" x2="64" y2="8" stroke="#FFCC44" stroke-width="2" opacity="0.5"/>
    <line x1="64" y1="64" x2="110" y2="30" stroke="#FFAA33" stroke-width="1.5" opacity="0.4"/>
    <line x1="64" y1="64" x2="120" y2="64" stroke="#FF8822" stroke-width="1.8" opacity="0.45"/>
    <line x1="64" y1="64" x2="110" y2="98" stroke="#FFAA33" stroke-width="1.5" opacity="0.4"/>
    <line x1="64" y1="64" x2="64" y2="120" stroke="#FFCC44" stroke-width="2" opacity="0.5"/>
    <line x1="64" y1="64" x2="18" y2="98" stroke="#FFAA33" stroke-width="1.5" opacity="0.4"/>
    <line x1="64" y1="64" x2="8" y2="64" stroke="#FF8822" stroke-width="1.8" opacity="0.45"/>
    <line x1="64" y1="64" x2="18" y2="30" stroke="#FFAA33" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Secondary thinner rays -->
  <g opacity="0.35">
    <line x1="64" y1="64" x2="40" y2="10" stroke="#FFDD66" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="88" y2="10" stroke="#FFDD66" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="118" y2="46" stroke="#FFCC44" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="118" y2="82" stroke="#FFCC44" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="88" y2="118" stroke="#FFDD66" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="40" y2="118" stroke="#FFDD66" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="10" y2="82" stroke="#FFCC44" stroke-width="0.8"/>
    <line x1="64" y1="64" x2="10" y2="46" stroke="#FFCC44" stroke-width="0.8"/>
  </g>

  <!-- Debris particles -->
  <g filter="url(#xGlow)">
    <circle cx="38" cy="20" r="2.5" fill="#FFDD44" opacity="0.7"/>
    <circle cx="90" cy="22" r="2" fill="#FFCC33" opacity="0.6"/>
    <circle cx="105" cy="50" r="2.5" fill="#FF9933" opacity="0.7"/>
    <circle cx="100" cy="90" r="2" fill="#FFAA44" opacity="0.6"/>
    <circle cx="75" cy="108" r="2.5" fill="#FFDD44" opacity="0.7"/>
    <circle cx="30" cy="100" r="2" fill="#FFCC33" opacity="0.6"/>
    <circle cx="18" cy="55" r="2.5" fill="#FF9933" opacity="0.7"/>
    <circle cx="25" cy="35" r="2" fill="#FFAA44" opacity="0.6"/>
  </g>

  <!-- Micro sparks -->
  <circle cx="48" cy="14" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="96" cy="36" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="108" cy="72" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="82" cy="110" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="44" cy="112" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="14" cy="74" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="22" cy="44" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="50" cy="104" r="0.8" fill="#FFFFCC" opacity="0.6"/>

  <!-- Smoke wisps -->
  <g opacity="0.2">
    <path d="M50,50 Q42,38 48,28 Q54,18 46,10" stroke="#AAAAAA" stroke-width="1.5" fill="none"/>
    <path d="M78,50 Q86,38 80,28 Q74,18 82,10" stroke="#AAAAAA" stroke-width="1.5" fill="none"/>
    <path d="M50,78 Q42,90 48,100 Q54,110 46,118" stroke="#999999" stroke-width="1.2" fill="none"/>
    <path d="M78,78 Q86,90 80,100 Q74,110 82,118" stroke="#999999" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Inner radial sparks (jagged) -->
  <g opacity="0.5" fill="none" stroke="#FFDD44" stroke-width="1">
    <path d="M64,64 L58,40 L62,42 L64,30"/>
    <path d="M64,64 L82,46 L78,50 L92,38"/>
    <path d="M64,64 L88,58 L84,62 L98,60"/>
    <path d="M64,64 L86,80 L82,76 L96,88"/>
    <path d="M64,64 L70,88 L66,84 L68,98"/>
    <path d="M64,64 L46,84 L50,80 L36,92"/>
    <path d="M64,64 L40,68 L44,64 L30,66"/>
    <path d="M64,64 L42,48 L46,52 L32,40"/>
  </g>

  <!-- Shockwave distortion rings -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#FF9944" stroke-width="1.5" opacity="0.25" stroke-dasharray="4,6"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#FF7722" stroke-width="1" opacity="0.15" stroke-dasharray="3,8"/>

  <!-- Extra ember particles -->
  <g filter="url(#xGlow)" opacity="0.5">
    <circle cx="30" cy="30" r="1.5" fill="#FFAA44"/>
    <circle cx="98" cy="30" r="1.5" fill="#FFAA44"/>
    <circle cx="30" cy="98" r="1.5" fill="#FF8833"/>
    <circle cx="98" cy="98" r="1.5" fill="#FF8833"/>
    <circle cx="64" cy="16" r="1.8" fill="#FFCC44"/>
    <circle cx="64" cy="112" r="1.8" fill="#FF9933"/>
    <circle cx="16" cy="64" r="1.8" fill="#FFBB44"/>
    <circle cx="112" cy="64" r="1.8" fill="#FFBB44"/>
  </g>
</svg>