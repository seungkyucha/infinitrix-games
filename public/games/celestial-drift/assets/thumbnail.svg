<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020010"/>
      <stop offset="40%" stop-color="#0D0620"/>
      <stop offset="100%" stop-color="#0A0A2A"/>
    </linearGradient>
    <radialGradient id="tNeb1" cx="0.3" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#221155" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tNeb2" cx="0.75" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#440022" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tNeb3" cx="0.5" cy="0.6" r="0.35">
      <stop offset="0%" stop-color="#00CED1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#002233" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tShipHull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8EC8E8"/>
      <stop offset="50%" stop-color="#3A6B8C"/>
      <stop offset="100%" stop-color="#1A2F44"/>
    </linearGradient>
    <linearGradient id="tShipCockpit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFEE"/>
      <stop offset="100%" stop-color="#004466"/>
    </linearGradient>
    <radialGradient id="tEngineGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#0088CC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tEnemyHull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6644"/>
      <stop offset="100%" stop-color="#661111"/>
    </linearGradient>
    <radialGradient id="tBossCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF4400" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#440000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tBlackHole" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="40%" stop-color="#000005"/>
      <stop offset="70%" stop-color="#1A0A2A" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#FF4500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00CCFF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
    <linearGradient id="tSubtitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFEE88"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tNebBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <radialGradient id="tLaser" cx="0" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0088CC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#tSky)"/>

  <!-- Nebula clouds -->
  <ellipse cx="120" cy="150" rx="150" ry="100" fill="url(#tNeb1)" filter="url(#tNebBlur)"/>
  <ellipse cx="300" cy="105" rx="130" ry="80" fill="url(#tNeb2)" filter="url(#tNebBlur)"/>
  <ellipse cx="200" cy="180" rx="120" ry="70" fill="url(#tNeb3)" filter="url(#tNebBlur)"/>

  <!-- Stars layer (50+ stars) -->
  <g opacity="0.4">
    <circle cx="15" cy="12" r="0.5" fill="#CCCCDD"/><circle cx="45" cy="28" r="0.4" fill="#AAAACC"/>
    <circle cx="78" cy="15" r="0.6" fill="#DDDDEE"/><circle cx="110" cy="35" r="0.4" fill="#BBBBCC"/>
    <circle cx="145" cy="8" r="0.5" fill="#CCCCDD"/><circle cx="178" cy="42" r="0.4" fill="#AAAACC"/>
    <circle cx="212" cy="18" r="0.6" fill="#DDDDEE"/><circle cx="248" cy="32" r="0.4" fill="#BBBBCC"/>
    <circle cx="280" cy="12" r="0.5" fill="#CCCCDD"/><circle cx="315" cy="45" r="0.4" fill="#AAAACC"/>
    <circle cx="348" cy="22" r="0.6" fill="#DDDDEE"/><circle cx="378" cy="38" r="0.4" fill="#BBBBCC"/>
    <circle cx="30" cy="68" r="0.5" fill="#CCCCDD"/><circle cx="65" cy="85" r="0.4" fill="#AAAACC"/>
    <circle cx="98" cy="72" r="0.6" fill="#DDDDEE"/><circle cx="130" cy="92" r="0.4" fill="#BBBBCC"/>
    <circle cx="162" cy="78" r="0.5" fill="#CCCCDD"/><circle cx="195" cy="95" r="0.4" fill="#AAAACC"/>
    <circle cx="228" cy="68" r="0.6" fill="#DDDDEE"/><circle cx="262" cy="88" r="0.4" fill="#BBBBCC"/>
    <circle cx="295" cy="75" r="0.5" fill="#CCCCDD"/><circle cx="328" cy="98" r="0.4" fill="#AAAACC"/>
    <circle cx="360" cy="65" r="0.6" fill="#DDDDEE"/><circle cx="392" cy="82" r="0.4" fill="#BBBBCC"/>
  </g>
  <g opacity="0.7">
    <circle cx="55" cy="52" r="0.8" fill="#FFFFFF"/><circle cx="135" cy="58" r="1" fill="#FFFFFF"/>
    <circle cx="220" cy="50" r="0.8" fill="#FFFFFF"/><circle cx="310" cy="55" r="1" fill="#FFFFFF"/>
    <circle cx="380" cy="48" r="0.8" fill="#FFFFFF"/><circle cx="88" cy="105" r="1" fill="#FFFFFF"/>
    <circle cx="180" cy="115" r="0.8" fill="#FFFFFF"/><circle cx="260" cy="108" r="1" fill="#FFFFFF"/>
    <circle cx="350" cy="112" r="0.8" fill="#FFFFFF"/><circle cx="20" cy="140" r="1" fill="#FFFFFF"/>
  </g>
  <!-- Bright stars -->
  <g filter="url(#tGlow)">
    <circle cx="100" cy="40" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="250" cy="30" r="1.8" fill="#AADDFF" opacity="0.85"/>
    <circle cx="370" cy="50" r="1.5" fill="#FFDDAA" opacity="0.9"/>
    <circle cx="40" cy="100" r="1.2" fill="#DDCCFF" opacity="0.8"/>
    <circle cx="340" cy="95" r="1.5" fill="#FFFFFF" opacity="0.85"/>
  </g>

  <!-- Black hole in upper right (dramatic element) -->
  <g transform="translate(330,80)">
    <circle cx="0" cy="0" r="30" fill="url(#tBlackHole)"/>
    <!-- Accretion disk -->
    <ellipse cx="0" cy="0" rx="40" ry="10" fill="none" stroke="#FF6622" stroke-width="1.5" opacity="0.4" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="35" ry="8" fill="none" stroke="#FFAA44" stroke-width="0.8" opacity="0.3" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="30" ry="6" fill="none" stroke="#FFCC66" stroke-width="0.5" opacity="0.2" transform="rotate(-20)"/>
    <!-- Event horizon glow -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00CED1" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Boss enemy (right side, threatening) -->
  <g id="tBoss" transform="translate(310,155) scale(0.6)">
    <!-- Boss aura -->
    <circle cx="0" cy="0" r="55" fill="url(#tBossCore)" opacity="0.4"/>
    <!-- Boss body -->
    <path d="M0,-35 C-20,-30 -30,-10 -30,10 L-30,25 C-30,35 -18,42 0,42 C18,42 30,35 30,25 L30,10 C30,-10 20,-30 0,-35 Z" fill="url(#tEnemyHull)" stroke="#CC3333" stroke-width="1"/>
    <!-- Boss eye -->
    <ellipse cx="0" cy="-5" rx="14" ry="8" fill="#220000" stroke="#FF2200" stroke-width="1"/>
    <ellipse cx="0" cy="-5" rx="8" ry="5" fill="#FF0000"/>
    <circle cx="0" cy="-5" r="3" fill="#FFFFFF" opacity="0.8"/>
    <!-- Boss horns -->
    <path d="M-15,-32 L-25,-50 L-10,-35 Z" fill="#FF6633"/>
    <path d="M15,-32 L25,-50 L10,-35 Z" fill="#FF6633"/>
    <!-- Boss spikes -->
    <path d="M-30,15 L-48,10 L-30,20 Z" fill="#CC4422"/>
    <path d="M30,15 L48,10 L30,20 Z" fill="#CC4422"/>
    <!-- Boss energy vein -->
    <path d="M-10,-25 C-12,-10 -12,10 -10,30" stroke="#FF4400" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M10,-25 C12,-10 12,10 10,30" stroke="#FF4400" stroke-width="0.6" fill="none" opacity="0.5"/>
  </g>

  <!-- Enemy drones (small, scattered) -->
  <g opacity="0.7">
    <g transform="translate(270,120) scale(0.25)">
      <path d="M0,-20 L15,10 L0,5 L-15,10 Z" fill="#CC4444"/>
      <circle cx="0" cy="-5" r="3" fill="#FF6644"/>
    </g>
    <g transform="translate(350,170) scale(0.2)">
      <path d="M0,-20 L15,10 L0,5 L-15,10 Z" fill="#CC4444"/>
      <circle cx="0" cy="-5" r="3" fill="#FF6644"/>
    </g>
    <g transform="translate(290,190) scale(0.22)">
      <path d="M0,-20 L15,10 L0,5 L-15,10 Z" fill="#CC4444"/>
      <circle cx="0" cy="-5" r="3" fill="#FF6644"/>
    </g>
  </g>

  <!-- Player ship (left-center, hero pose) -->
  <g id="tPlayer" transform="translate(120,145) scale(0.45) rotate(-10)">
    <!-- Engine glow -->
    <ellipse cx="-12" cy="50" rx="6" ry="12" fill="url(#tEngineGlow)" filter="url(#tSoftGlow)" opacity="0.8"/>
    <ellipse cx="12" cy="50" rx="6" ry="12" fill="url(#tEngineGlow)" filter="url(#tSoftGlow)" opacity="0.8"/>
    <ellipse cx="-12" cy="48" rx="3" ry="7" fill="#00FFFF" opacity="0.9"/>
    <ellipse cx="12" cy="48" rx="3" ry="7" fill="#00FFFF" opacity="0.9"/>
    <!-- Wings -->
    <path d="M-10,-5 L-50,30 L-42,35 L-30,30 L-10,15 Z" fill="#3A6B8C" stroke="#4AA8CC" stroke-width="0.5"/>
    <path d="M10,-5 L50,30 L42,35 L30,30 L10,15 Z" fill="#3A6B8C" stroke="#4AA8CC" stroke-width="0.5"/>
    <circle cx="-48" cy="32" r="2" fill="#00FFCC" filter="url(#tGlow)"/>
    <circle cx="48" cy="32" r="2" fill="#00FFCC" filter="url(#tGlow)"/>
    <!-- Hull -->
    <path d="M0,-45 C-10,-40 -16,-15 -16,20 L-16,40 C-16,44 -8,46 0,46 C8,46 16,44 16,40 L16,20 C16,-15 10,-40 0,-45 Z" fill="url(#tShipHull)" stroke="#5AAFCC" stroke-width="0.7"/>
    <!-- Panel lines -->
    <path d="M-8,-20 L-8,35" stroke="#2A5A72" stroke-width="0.5" opacity="0.6"/>
    <path d="M8,-20 L8,35" stroke="#2A5A72" stroke-width="0.5" opacity="0.6"/>
    <!-- Cockpit -->
    <ellipse cx="0" cy="-25" rx="7" ry="10" fill="url(#tShipCockpit)" stroke="#00DDFF" stroke-width="0.6"/>
    <ellipse cx="0" cy="-27" rx="4" ry="6" fill="#FFFFFF" opacity="0.2"/>
    <!-- Cannon -->
    <circle cx="0" cy="-44" r="2" fill="#00FFFF" filter="url(#tGlow)"/>
    <!-- Antenna -->
    <line x1="-12" y1="-35" x2="-20" y2="-42" stroke="#5AAFCC" stroke-width="0.5"/>
    <circle cx="-21" cy="-43" r="1" fill="#00FFCC" filter="url(#tGlow)"/>
    <line x1="12" y1="-35" x2="20" y2="-42" stroke="#5AAFCC" stroke-width="0.5"/>
    <circle cx="21" cy="-43" r="1" fill="#00FFCC" filter="url(#tGlow)"/>
  </g>

  <!-- Laser beams from player -->
  <g filter="url(#tGlow)" opacity="0.8">
    <line x1="135" y1="130" x2="265" y2="120" stroke="#00FFFF" stroke-width="2"/>
    <line x1="135" y1="130" x2="265" y2="120" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="128" y1="132" x2="285" y2="155" stroke="#00FFFF" stroke-width="1.5"/>
    <line x1="128" y1="132" x2="285" y2="155" stroke="#FFFFFF" stroke-width="0.4"/>
  </g>

  <!-- Explosion near enemy -->
  <g transform="translate(268,122)" filter="url(#tGlow)" opacity="0.6">
    <circle cx="0" cy="0" r="8" fill="#FFCC44" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Floating asteroids -->
  <g opacity="0.3">
    <path d="M55,180 C50,175 52,168 58,165 C64,162 70,167 72,173 C74,179 68,185 62,186 C56,187 53,184 55,180 Z" fill="#4A3A2A" stroke="#3A2A1A" stroke-width="0.5"/>
    <path d="M35,130 C33,126 36,122 40,121 C44,120 47,124 46,128 C45,132 38,134 35,130 Z" fill="#3A2A1A"/>
    <path d="M180,200 C176,195 180,188 186,186 C192,184 198,190 196,196 C194,202 184,204 180,200 Z" fill="#4A3A2A" stroke="#3A2A1A" stroke-width="0.4"/>
    <circle cx="80" cy="210" r="5" fill="#3A2A1A" opacity="0.5"/>
    <circle cx="160" cy="85" r="3" fill="#4A3A2A" opacity="0.4"/>
    <circle cx="230" cy="200" r="4" fill="#3A2A1A" opacity="0.5"/>
  </g>

  <!-- Energy shield around player (faint) -->
  <ellipse cx="120" cy="145" rx="35" ry="38" fill="none" stroke="#00FFCC" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,3"/>

  <!-- Crystals (collectible) -->
  <g filter="url(#tGlow)" opacity="0.6">
    <polygon points="195,160 198,152 201,160 198,165" fill="#FF44FF" opacity="0.7"/>
    <polygon points="220,175 222,169 224,175 222,178" fill="#FF44FF" opacity="0.5"/>
    <polygon points="155,175 157,170 159,175 157,178" fill="#FF44FF" opacity="0.6"/>
  </g>

  <!-- HUD overlay elements -->
  <g opacity="0.3">
    <!-- HP bar -->
    <rect x="15" y="12" width="60" height="6" rx="3" fill="#111122" stroke="#335544" stroke-width="0.5"/>
    <rect x="16" y="13" width="45" height="4" rx="2" fill="#44FF44"/>
    <!-- Energy bar -->
    <rect x="15" y="22" width="60" height="5" rx="2.5" fill="#111122" stroke="#334455" stroke-width="0.5"/>
    <rect x="16" y="23" width="38" height="3" rx="1.5" fill="#4488FF"/>
    <!-- Mini score -->
    <text x="82" y="17" font-family="monospace" font-size="6" fill="#FFD700" opacity="0.8">★ 12,450</text>
  </g>

  <!-- Minimap corner -->
  <g opacity="0.2" transform="translate(365,15)">
    <rect x="0" y="0" width="25" height="25" rx="2" fill="#0A0A1A" stroke="#334455" stroke-width="0.5"/>
    <circle cx="8" cy="12" r="1.5" fill="#00FFCC"/>
    <circle cx="18" cy="8" r="1" fill="#FF4444"/>
    <circle cx="15" cy="18" r="1" fill="#FF4444"/>
  </g>

  <!-- Vignette effect -->
  <rect width="400" height="300" fill="none" stroke="#000000" stroke-width="40" opacity="0.3" rx="10"/>

  <!-- Title text area (bottom) -->
  <rect x="0" y="235" width="400" height="65" fill="#000000" opacity="0.6"/>
  <rect x="0" y="234" width="400" height="1.5" fill="url(#tTitle)" opacity="0.4"/>

  <!-- Game title -->
  <text x="200" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#tTitle)" filter="url(#tTextGlow)">CELESTIAL DRIFT</text>
  <text x="200" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF" opacity="0.5">CELESTIAL DRIFT</text>

  <!-- Subtitle -->
  <text x="200" y="288" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="url(#tSubtitle)" opacity="0.8">천체 표류 — 우주 서바이벌 액션 로그라이트</text>

  <!-- Decorative line under title -->
  <line x1="100" y1="274" x2="300" y2="274" stroke="#00CCFF" stroke-width="0.5" opacity="0.3"/>

  <!-- Additional stars for density -->
  <g opacity="0.35">
    <circle cx="8" cy="42" r="0.4" fill="#CCCCDD"/><circle cx="25" cy="58" r="0.5" fill="#AAAACC"/>
    <circle cx="52" cy="78" r="0.4" fill="#DDDDEE"/><circle cx="75" cy="48" r="0.5" fill="#BBBBCC"/>
    <circle cx="105" cy="68" r="0.4" fill="#CCCCDD"/><circle cx="140" cy="78" r="0.5" fill="#AAAACC"/>
    <circle cx="168" cy="48" r="0.4" fill="#DDDDEE"/><circle cx="195" cy="68" r="0.5" fill="#BBBBCC"/>
    <circle cx="230" cy="45" r="0.4" fill="#CCCCDD"/><circle cx="260" cy="78" r="0.5" fill="#AAAACC"/>
    <circle cx="290" cy="58" r="0.4" fill="#DDDDEE"/><circle cx="320" cy="42" r="0.5" fill="#BBBBCC"/>
    <circle cx="355" cy="75" r="0.4" fill="#CCCCDD"/><circle cx="385" cy="55" r="0.5" fill="#AAAACC"/>
    <circle cx="18" cy="125" r="0.4" fill="#DDDDEE"/><circle cx="50" cy="145" r="0.5" fill="#BBBBCC"/>
    <circle cx="82" cy="135" r="0.4" fill="#CCCCDD"/><circle cx="115" cy="155" r="0.5" fill="#AAAACC"/>
    <circle cx="148" cy="140" r="0.4" fill="#DDDDEE"/><circle cx="185" cy="158" r="0.5" fill="#BBBBCC"/>
    <circle cx="225" cy="135" r="0.4" fill="#CCCCDD"/><circle cx="255" cy="148" r="0.5" fill="#AAAACC"/>
    <circle cx="285" cy="138" r="0.4" fill="#DDDDEE"/><circle cx="335" cy="145" r="0.5" fill="#BBBBCC"/>
    <circle cx="365" cy="130" r="0.4" fill="#CCCCDD"/><circle cx="395" cy="150" r="0.5" fill="#AAAACC"/>
    <circle cx="12" cy="185" r="0.4" fill="#DDDDEE"/><circle cx="42" cy="205" r="0.5" fill="#BBBBCC"/>
    <circle cx="72" cy="195" r="0.4" fill="#CCCCDD"/><circle cx="102" cy="215" r="0.5" fill="#AAAACC"/>
    <circle cx="142" cy="200" r="0.4" fill="#DDDDEE"/><circle cx="172" cy="218" r="0.5" fill="#BBBBCC"/>
    <circle cx="208" cy="195" r="0.4" fill="#CCCCDD"/><circle cx="238" cy="210" r="0.5" fill="#AAAACC"/>
    <circle cx="268" cy="198" r="0.4" fill="#DDDDEE"/><circle cx="308" cy="215" r="0.5" fill="#BBBBCC"/>
    <circle cx="348" cy="195" r="0.4" fill="#CCCCDD"/><circle cx="388" cy="208" r="0.5" fill="#AAAACC"/>
  </g>

  <!-- Debris particles -->
  <g opacity="0.2">
    <circle cx="30" cy="170" r="1.5" fill="#554433"/>
    <circle cx="200" cy="100" r="1" fill="#443322"/>
    <circle cx="250" cy="170" r="1.5" fill="#554433"/>
    <circle cx="370" cy="150" r="1" fill="#443322"/>
    <circle cx="130" cy="200" r="1.2" fill="#554433"/>
    <circle cx="310" cy="210" r="1" fill="#443322"/>
  </g>

  <!-- Additional energy trails -->
  <g opacity="0.3" filter="url(#tGlow)">
    <path d="M140,145 Q155,140 170,148 Q185,156 200,150" stroke="#00CCFF" stroke-width="0.6" fill="none"/>
    <path d="M100,160 Q115,155 125,162" stroke="#00FFCC" stroke-width="0.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Resource icons scattered -->
  <g opacity="0.5">
    <!-- Energy orb -->
    <circle cx="175" cy="135" r="2.5" fill="#4488FF" filter="url(#tGlow)" opacity="0.6"/>
    <!-- Crystal -->
    <polygon points="145,188 147,183 149,188 147,191" fill="#FF44FF" opacity="0.5"/>
  </g>

  <!-- Scan lines effect (cinematic) -->
  <g opacity="0.03">
    <line x1="0" y1="5" x2="400" y2="5" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="15" x2="400" y2="15" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="25" x2="400" y2="25" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="35" x2="400" y2="35" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="45" x2="400" y2="45" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="400" y2="55" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="65" x2="400" y2="65" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="400" y2="75" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="85" x2="400" y2="85" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="95" x2="400" y2="95" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="105" x2="400" y2="105" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="115" x2="400" y2="115" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="125" x2="400" y2="125" stroke="#FFFFFF" stroke-width="0.5"/>
