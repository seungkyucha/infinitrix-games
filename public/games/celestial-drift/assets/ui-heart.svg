<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="hMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66FF88"/>
      <stop offset="40%" stop-color="#44DD55"/>
      <stop offset="100%" stop-color="#228833"/>
    </linearGradient>
    <linearGradient id="hShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AAFFCC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44DD55" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#88FFAA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#228833" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hCore" cx="0.45" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#44FF66" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlowF">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#115522" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <path d="M24,42 C24,42 4,30 4,18 C4,10 10,6 16,6 C20,6 23,8 24,12 C25,8 28,6 32,6 C38,6 44,10 44,18 C44,30 24,42 24,42 Z" fill="url(#hGlow)" opacity="0.4" transform="scale(1.05) translate(-1.2,-1)"/>

  <!-- Main shield/heart shape -->
  <g filter="url(#hShadow)">
    <path d="M24,40 C24,40 6,28 6,17 C6,11 11,7 16,7 C20,7 23,9 24,13 C25,9 28,7 32,7 C37,7 42,11 42,17 C42,28 24,40 24,40 Z" fill="url(#hMain)" stroke="#33BB55" stroke-width="0.8"/>
  </g>

  <!-- Inner highlight -->
  <path d="M24,36 C24,36 10,26 10,18 C10,13 14,10 18,10 C21,10 23,12 24,15 C25,12 27,10 30,10 C34,10 38,13 38,18 C38,26 24,36 24,36 Z" fill="url(#hCore)" opacity="0.6"/>

  <!-- Shine spot -->
  <ellipse cx="16" cy="14" rx="4" ry="3" fill="url(#hShine)" opacity="0.7" transform="rotate(-15,16,14)"/>
  <ellipse cx="15" cy="13" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.5" transform="rotate(-15,15,13)"/>

  <!-- Cross / plus detail (HP indicator style) -->
  <rect x="21" y="18" width="6" height="12" rx="1.5" fill="#AAFFCC" opacity="0.35"/>
  <rect x="18" y="21" width="12" height="6" rx="1.5" fill="#AAFFCC" opacity="0.35"/>

  <!-- Energy circuit lines -->
  <path d="M14,20 L10,24 L14,28" stroke="#66FFAA" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M34,20 L38,24 L34,28" stroke="#66FFAA" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Bottom glow point -->
  <circle cx="24" cy="36" r="1.5" fill="#88FFBB" filter="url(#hGlowF)" opacity="0.7"/>

  <!-- Decorative dots -->
  <circle cx="12" cy="16" r="0.8" fill="#CCFFDD" opacity="0.6"/>
  <circle cx="36" cy="16" r="0.8" fill="#CCFFDD" opacity="0.6"/>
  <circle cx="18" cy="30" r="0.6" fill="#AAFFCC" opacity="0.4"/>
  <circle cx="30" cy="30" r="0.6" fill="#AAFFCC" opacity="0.4"/>

  <!-- Rim light -->
  <path d="M16,7 C20,7 23,9 24,12" stroke="#CCFFEE" stroke-width="0.6" fill="none" opacity="0.5"/>
</svg>