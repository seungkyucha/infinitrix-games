<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="eHull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6644"/>
      <stop offset="50%" stop-color="#AA2222"/>
      <stop offset="100%" stop-color="#441111"/>
    </linearGradient>
    <radialGradient id="eCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFCC00"/>
      <stop offset="40%" stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eEye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <linearGradient id="eWing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC3333"/>
      <stop offset="100%" stop-color="#551111"/>
    </linearGradient>
    <linearGradient id="eSpike" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF8844"/>
      <stop offset="100%" stop-color="#882200"/>
    </linearGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eRedGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF2200" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Menacing aura -->
  <g id="aura">
    <ellipse cx="64" cy="64" rx="50" ry="50" fill="url(#eCore)" opacity="0.15"/>
    <ellipse cx="64" cy="64" rx="38" ry="38" fill="url(#eCore)" opacity="0.1"/>
  </g>

  <!-- Rear spikes -->
  <g id="spikes">
    <path d="M40,90 L30,118 L46,95 Z" fill="url(#eSpike)" stroke="#FF6633" stroke-width="0.5"/>
    <path d="M88,90 L98,118 L82,95 Z" fill="url(#eSpike)" stroke="#FF6633" stroke-width="0.5"/>
    <path d="M52,92 L48,112 L56,96 Z" fill="url(#eSpike)" stroke="#FF6633" stroke-width="0.4" opacity="0.8"/>
    <path d="M76,92 L80,112 L72,96 Z" fill="url(#eSpike)" stroke="#FF6633" stroke-width="0.4" opacity="0.8"/>
    <path d="M64,94 L64,120 L68,98 L60,98 Z" fill="url(#eSpike)" stroke="#FF8844" stroke-width="0.4"/>
  </g>

  <!-- Wings / mandibles -->
  <g id="mandibles">
    <!-- Left mandible -->
    <path d="M46,48 L8,56 L10,68 L20,72 L30,66 L44,58 Z" fill="url(#eWing)" stroke="#DD4444" stroke-width="0.6"/>
    <path d="M12,60 L18,58 L20,66 L14,65 Z" fill="#FF4444" opacity="0.5"/>
    <line x1="18" y1="62" x2="40" y2="52" stroke="#FF6644" stroke-width="0.3" opacity="0.4"/>
    <circle cx="10" cy="62" r="2.5" fill="#FF0000" filter="url(#eGlow)" opacity="0.8"/>
    <!-- Right mandible -->
    <path d="M82,48 L120,56 L118,68 L108,72 L98,66 L84,58 Z" fill="url(#eWing)" stroke="#DD4444" stroke-width="0.6"/>
    <path d="M116,60 L110,58 L108,66 L114,65 Z" fill="#FF4444" opacity="0.5"/>
    <line x1="110" y1="62" x2="88" y2="52" stroke="#FF6644" stroke-width="0.3" opacity="0.4"/>
    <circle cx="118" cy="62" r="2.5" fill="#FF0000" filter="url(#eGlow)" opacity="0.8"/>
  </g>

  <!-- Main body -->
  <g id="body">
    <path d="M64,18 C50,18 42,34 42,52 L42,80 C42,88 50,94 64,94 C78,94 86,88 86,80 L86,52 C86,34 78,18 64,18 Z" fill="url(#eHull)" stroke="#CC3333" stroke-width="0.8"/>
    <!-- Armor plates -->
    <path d="M48,40 L48,78 C48,84 54,88 64,88 C74,88 80,84 80,78 L80,40 C80,32 74,26 64,26 C54,26 48,32 48,40 Z" fill="none" stroke="#883322" stroke-width="0.7" opacity="0.6"/>
    <!-- Panel lines -->
    <path d="M54,32 L54,82" stroke="#662222" stroke-width="0.5" opacity="0.6"/>
    <path d="M74,32 L74,82" stroke="#662222" stroke-width="0.5" opacity="0.6"/>
    <path d="M46,55 L82,55" stroke="#662222" stroke-width="0.4" opacity="0.5"/>
    <!-- Vents -->
    <rect x="56" y="70" width="3" height="8" rx="1" fill="#331111" stroke="#FF4422" stroke-width="0.3"/>
    <rect x="62" y="70" width="3" height="8" rx="1" fill="#331111" stroke="#FF4422" stroke-width="0.3"/>
    <rect x="69" y="70" width="3" height="8" rx="1" fill="#331111" stroke="#FF4422" stroke-width="0.3"/>
  </g>

  <!-- Eye (soul point) - menacing single eye -->
  <g id="eye" filter="url(#eRedGlow)">
    <ellipse cx="64" cy="42" rx="12" ry="8" fill="#220000" stroke="#FF2200" stroke-width="0.8"/>
    <ellipse cx="64" cy="42" rx="8" ry="5" fill="url(#eEye)"/>
    <ellipse cx="64" cy="42" rx="4" ry="4" fill="#FF0000"/>
    <ellipse cx="64" cy="42" rx="2" ry="2" fill="#FFFFFF" opacity="0.9"/>
    <!-- Eye highlight -->
    <ellipse cx="60" cy="40" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Front horn -->
  <g id="horn">
    <path d="M64,18 L60,8 L64,4 L68,8 Z" fill="url(#eSpike)" stroke="#FF6633" stroke-width="0.5"/>
    <circle cx="64" cy="6" r="2" fill="#FF4400" filter="url(#eGlow)" opacity="0.7"/>
  </g>

  <!-- Side turrets -->
  <g id="turrets">
    <rect x="38" y="58" width="6" height="8" rx="1.5" fill="#883322" stroke="#CC4433" stroke-width="0.4"/>
    <circle cx="41" cy="58" r="2" fill="#FF6644" opacity="0.6"/>
    <rect x="84" y="58" width="6" height="8" rx="1.5" fill="#883322" stroke="#CC4433" stroke-width="0.4"/>
    <circle cx="87" cy="58" r="2" fill="#FF6644" opacity="0.6"/>
  </g>

  <!-- Energy veins -->
  <g id="veins" opacity="0.5">
    <path d="M56,30 C52,40 52,60 56,75" stroke="#FF4400" stroke-width="0.6" fill="none"/>
    <path d="M72,30 C76,40 76,60 72,75" stroke="#FF4400" stroke-width="0.6" fill="none"/>
    <path d="M64,26 L64,36" stroke="#FFCC00" stroke-width="0.5"/>
  </g>
</svg>