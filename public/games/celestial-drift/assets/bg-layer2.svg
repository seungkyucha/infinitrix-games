<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="rock1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3A2A"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <linearGradient id="rock2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A4A3A"/>
      <stop offset="100%" stop-color="#2A1A0A"/>
    </linearGradient>
    <linearGradient id="ice1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A7A9A" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="debrisGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E8A04C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#663300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portalGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0088AA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#003344" stop-opacity="0"/>
    </radialGradient>
    <filter id="fg-fog">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="fg-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Large asteroid cluster left -->
  <g id="asteroid-cluster-l" opacity="0.25">
    <path d="M-20,580 C-10,540 30,520 60,530 C90,540 110,560 100,590 C90,620 50,640 20,635 C-10,630 -30,610 -20,580 Z" fill="url(#rock1)" stroke="#3A2A1A" stroke-width="0.8"/>
    <path d="M10,550 C20,545 35,548 30,560" stroke="#5A4A3A" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M40,570 L55,585" stroke="#4A3A2A" stroke-width="0.4" opacity="0.4"/>
    <circle cx="45" cy="560" r="3" fill="#665544" opacity="0.4"/>
    <circle cx="25" cy="600" r="2" fill="#554433" opacity="0.3"/>
    <!-- Glowing crack -->
    <path d="M30,540 L45,565 L40,590 L55,610" stroke="#E8A04C" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M30,540 L45,565 L40,590 L55,610" stroke="#FFCC66" stroke-width="0.3" fill="none" opacity="0.6" filter="url(#fg-glow)"/>
  </g>

  <!-- Large asteroid right -->
  <g id="asteroid-cluster-r" opacity="0.25">
    <path d="M1120,500 C1140,470 1180,460 1210,480 C1240,500 1230,540 1200,560 C1170,580 1130,570 1110,540 C1100,520 1105,510 1120,500 Z" fill="url(#rock2)" stroke="#3A2A1A" stroke-width="0.8"/>
    <path d="M1140,490 C1155,485 1170,490 1165,505" stroke="#5A4A3A" stroke-width="0.5" fill="none" opacity="0.5"/>
    <circle cx="1160" cy="510" r="4" fill="#665544" opacity="0.3"/>
    <circle cx="1185" cy="530" r="2.5" fill="#554433" opacity="0.3"/>
    <path d="M1150,475 L1170,510 L1190,540" stroke="#E8A04C" stroke-width="0.6" fill="none" opacity="0.35"/>
  </g>

  <!-- Floating debris field (medium) -->
  <g id="debris" opacity="0.2">
    <path d="M200,320 L215,310 L230,320 L225,340 L205,335 Z" fill="#4A3A2A" stroke="#3A2A1A" stroke-width="0.5"/>
    <circle cx="210" cy="325" r="2" fill="url(#debrisGlow)"/>
    <path d="M320,450 L335,440 L348,455 L340,470 L322,465 Z" fill="#3A2A1A" stroke="#2A1A0A" stroke-width="0.4"/>
    <path d="M500,280 L510,270 L525,278 L520,295 L505,290 Z" fill="#4A3A2A" stroke="#3A2A1A" stroke-width="0.5"/>
    <path d="M680,380 L695,370 L710,380 L705,398 L685,395 Z" fill="#3A2A1A" stroke="#2A1A0A" stroke-width="0.4"/>
    <path d="M850,300 L868,290 L880,305 L872,320 L853,315 Z" fill="#4A3A2A" stroke="#3A2A1A" stroke-width="0.5"/>
    <path d="M1000,400 L1015,388 L1030,398 L1025,415 L1005,412 Z" fill="#3A2A1A" stroke="#2A1A0A" stroke-width="0.4"/>
  </g>

  <!-- Space station ruins -->
  <g id="station-ruin" opacity="0.15" transform="translate(600,200)">
    <!-- Main structure -->
    <rect x="-40" y="-15" width="80" height="30" rx="3" fill="#2A2A3A" stroke="#3A3A5A" stroke-width="0.6"/>
    <!-- Solar panels (broken) -->
    <rect x="-80" y="-8" width="35" height="16" fill="#1A2A3A" stroke="#2A3A5A" stroke-width="0.4"/>
    <line x1="-75" y1="-4" x2="-50" y2="-4" stroke="#3A4A6A" stroke-width="0.3" opacity="0.5"/>
    <line x1="-75" y1="0" x2="-50" y2="0" stroke="#3A4A6A" stroke-width="0.3" opacity="0.5"/>
    <line x1="-75" y1="4" x2="-50" y2="4" stroke="#3A4A6A" stroke-width="0.3" opacity="0.5"/>
    <rect x="50" y="-6" width="30" height="12" fill="#1A2A3A" stroke="#2A3A5A" stroke-width="0.4" transform="rotate(15,65,0)"/>
    <!-- Antenna -->
    <line x1="0" y1="-15" x2="0" y2="-35" stroke="#3A3A5A" stroke-width="0.5"/>
    <circle cx="0" cy="-37" r="2" fill="#2A2A3A" stroke="#5A5A7A" stroke-width="0.3"/>
    <!-- Warning light (blinking) -->
    <circle cx="0" cy="-37" r="1" fill="#FF4444" opacity="0.4" filter="url(#fg-glow)"/>
    <!-- Windows -->
    <rect x="-30" y="-8" width="5" height="5" rx="1" fill="#1A3A5A" opacity="0.5"/>
    <rect x="-18" y="-8" width="5" height="5" rx="1" fill="#1A3A5A" opacity="0.5"/>
    <rect x="15" y="-8" width="5" height="5" rx="1" fill="#1A3A5A" opacity="0.5"/>
    <rect x="27" y="-8" width="5" height="5" rx="1" fill="#1A3A5A" opacity="0.5"/>
  </g>

  <!-- Dimensional portal / rift -->
  <g id="portal" opacity="0.2" transform="translate(400,550)">
    <ellipse cx="0" cy="0" rx="35" ry="45" fill="url(#portalGlow)"/>
    <ellipse cx="0" cy="0" rx="20" ry="28" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="none" stroke="#00DDFF" stroke-width="0.5" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#00FFFF" opacity="0.15"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Ice crystal cluster -->
  <g id="ice-cluster" opacity="0.15">
    <polygon points="900,620 910,580 920,620" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.5" opacity="0.6"/>
    <polygon points="915,630 922,595 929,630" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
    <polygon points="890,635 895,608 900,635" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.3" opacity="0.4"/>
    <line x1="910" y1="585" x2="916" y2="592" stroke="#AADDFF" stroke-width="0.3" opacity="0.4"/>
    <!-- Ice glow -->
    <circle cx="910" cy="610" r="8" fill="#87CEEB" opacity="0.08" filter="url(#fg-glow)"/>
  </g>

  <!-- Floating energy wisps -->
  <g id="wisps" filter="url(#fg-glow)">
    <circle cx="150" cy="200" r="2" fill="#7B68EE" opacity="0.3"/>
    <circle cx="350" cy="650" r="1.5" fill="#00CED1" opacity="0.25"/>
    <circle cx="550" cy="400" r="2" fill="#FF69B4" opacity="0.2"/>
    <circle cx="750" cy="150" r="1.5" fill="#E8A04C" opacity="0.25"/>
    <circle cx="950" cy="550" r="2" fill="#87CEEB" opacity="0.3"/>
    <circle cx="1100" cy="300" r="1.5" fill="#7B68EE" opacity="0.2"/>
    <circle cx="250" cy="480" r="1.8" fill="#00FFCC" opacity="0.2"/>
    <circle cx="450" cy="130" r="1.5" fill="#FFD700" opacity="0.15"/>
    <circle cx="800" cy="700" r="2" fill="#FF69B4" opacity="0.2"/>
    <circle cx="1050" cy="180" r="1.8" fill="#00CED1" opacity="0.25"/>
  </g>

  <!-- Foreground fog layers -->
  <g opacity="0.05">
    <ellipse cx="300" cy="780" rx="400" ry="50" fill="#7B68EE" filter="url(#fg-fog)"/>
    <ellipse cx="800" cy="790" rx="350" ry="40" fill="#00CED1" filter="url(#fg-fog)"/>
    <ellipse cx="600" cy="10" rx="400" ry="30" fill="#FF69B4" filter="url(#fg-fog)"/>
  </g>

  <!-- Floating ship wreckage -->
  <g id="wreckage" opacity="0.12" transform="translate(780,480) rotate(25)">
    <path d="M-20,0 L-10,-8 L15,-5 L20,0 L15,6 L-10,8 Z" fill="#2A2A3A" stroke="#3A3A5A" stroke-width="0.5"/>
    <line x1="-8" y1="-3" x2="10" y2="-2" stroke="#4A4A6A" stroke-width="0.3" opacity="0.5"/>
    <!-- Sparking -->
    <circle cx="18" cy="2" r="1" fill="#FFAA44" opacity="0.5" filter="url(#fg-glow)"/>
  </g>

  <!-- Additional scattered small rocks -->
  <g opacity="0.15">
    <circle cx="70" cy="150" r="4" fill="#3A2A1A"/>
    <circle cx="160" cy="400" r="3" fill="#4A3A2A"/>
    <circle cx="280" cy="250" r="5" fill="#3A2A1A"/>
    <circle cx="440" cy="680" r="4" fill="#4A3A2A"/>
    <circle cx="560" cy="150" r="3.5" fill="#3A2A1A"/>
    <circle cx="720" cy="520" r="4" fill="#4A3A2A"/>
    <circle cx="870" cy="200" r="3" fill="#3A2A1A"/>
    <circle cx="990" cy="650" r="5" fill="#4A3A2A"/>
    <circle cx="1120" cy="150" r="3.5" fill="#3A2A1A"/>
    <circle cx="1050" cy="350" r="4" fill="#4A3A2A"/>
  </g>

  <!-- Dust particles -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="1" fill="#887766"/><circle cx="250" cy="350" r="0.8" fill="#887766"/>
    <circle cx="400" cy="200" r="1.2" fill="#887766"/><circle cx="550" cy="500" r="0.8" fill="#887766"/>
    <circle cx="700" cy="250" r="1" fill="#887766"/><circle cx="850" cy="450" r="1.2" fill="#887766"/>
    <circle cx="1000" cy="300" r="0.8" fill="#887766"/><circle cx="1150" cy="600" r="1" fill="#887766"/>
    <circle cx="180" cy="700" r="1.2" fill="#887766"/><circle cx="650" cy="700" r="0.8" fill="#887766"/>
  </g>

  <!-- Derelict satellite -->
  <g id="satellite" opacity="0.13" transform="translate(300,350) rotate(-35)">
    <rect x="-25" y="-5" width="50" height="10" rx="2" fill="#2A2A3A" stroke="#4A4A5A" stroke-width="0.5"/>
    <rect x="-50" y="-12" width="22" height="24" fill="#1A2A3A" stroke="#3A4A5A" stroke-width="0.4"/>
    <line x1="-45" y1="-8" x2="-32" y2="-8" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="-45" y1="-4" x2="-32" y2="-4" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="-45" y1="0" x2="-32" y2="0" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="-45" y1="4" x2="-32" y2="4" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="-45" y1="8" x2="-32" y2="8" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <rect x="28" y="-10" width="20" height="20" fill="#1A2A3A" stroke="#3A4A5A" stroke-width="0.4"/>
    <line x1="32" y1="-6" x2="44" y2="-6" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="32" y1="-2" x2="44" y2="-2" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="32" y1="2" x2="44" y2="2" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <line x1="32" y1="6" x2="44" y2="6" stroke="#3A5A6A" stroke-width="0.3" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#3A3A4A" stroke="#5A5A6A" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="1" fill="#FF4444" opacity="0.3" filter="url(#fg-glow)"/>
    <line x1="0" y1="-5" x2="0" y2="-20" stroke="#4A4A5A" stroke-width="0.4"/>
    <circle cx="0" cy="-22" r="2" fill="#3A3A4A" stroke="#5A5A6A" stroke-width="0.3"/>
  </g>

  <!-- Ruined space bridge -->
  <g id="bridge" opacity="0.1">
    <path d="M450,650 C480,620 520,610 560,615 C600,620 640,635 680,660" fill="none" stroke="#2A2A3A" stroke-width="3"/>
    <path d="M450,650 C480,625 520,615 560,620 C600,625 640,640 680,660" fill="none" stroke="#3A3A5A" stroke-width="1.5"/>
    <rect x="460" y="640" width="8" height="20" fill="#2A2A3A" opacity="0.8"/>
    <rect x="520" y="608" width="8" height="20" fill="#2A2A3A" opacity="0.8"/>
    <rect x="580" y="612" width="8" height="20" fill="#2A2A3A" opacity="0.8"/>
    <rect x="650" y="645" width="8" height="20" fill="#2A2A3A" opacity="0.8"/>
    <!-- Bridge lights (some broken) -->
    <circle cx="490" cy="632" r="1.5" fill="#00CCFF" opacity="0.2" filter="url(#fg-glow)"/>
    <circle cx="550" cy="612" r="1.5" fill="#00CCFF" opacity="0.15" filter="url(#fg-glow)"/>
    <circle cx="620" cy="625" r="1.5" fill="#FF4444" opacity="0.1" filter="url(#fg-glow)"/>
  </g>

  <!-- Additional crystal formations -->
  <g id="crystals-2" opacity="0.12">
    <polygon points="200,550 208,510 216,550" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.4"/>
    <polygon points="212,560 218,530 224,560" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.3" opacity="0.7"/>
    <polygon points="190,558 194,535 198,558" fill="url(#ice1)" stroke="#87CEEB" stroke-width="0.3" opacity="0.5"/>
    <circle cx="208" cy="530" r="5" fill="#87CEEB" opacity="0.06" filter="url(#fg-glow)"/>
  </g>

  <!-- Floating cargo containers -->
  <g id="cargo" opacity="0.12">
    <rect x="840" y="350" width="20" height="14" rx="1.5" fill="#2A3A3A" stroke="#4A5A5A" stroke-width="0.5" transform="rotate(12,850,357)"/>
    <line x1="845" y1="352" x2="845" y2="362" stroke="#3A4A4A" stroke-width="0.4" opacity="0.6" transform="rotate(12,850,357)"/>
    <line x1="855" y1="352" x2="855" y2="362" stroke="#3A4A4A" stroke-width="0.4" opacity="0.6" transform="rotate(12,850,357)"/>
    <rect x="1080" y="420" width="18" height="12" rx="1" fill="#3A2A2A" stroke="#5A4A4A" stroke-width="0.4" transform="rotate(-8,1089,426)"/>
    <line x1="1084" y1="422" x2="1084" y2="430" stroke="#4A3A3A" stroke-width="0.4" opacity="0.5" transform="rotate(-8,1089,426)"/>
  </g>

  <!-- Extra wisp trails -->
  <g id="wisp-trails" opacity="0.15">
    <path d="M100,300 Q120,290 140,305 Q160,320 180,310" stroke="#7B68EE" stroke-width="0.6" fill="none"/>
    <path d="M400,450 Q420,440 440,455 Q460,470 480,460" stroke="#00CED1" stroke-width="0.5" fill="none"/>
    <path d="M700,350 Q720,340 740,355 Q760,370 780,360" stroke="#FF69B4" stroke-width="0.5" fill="none"/>
    <path d="M950,250 Q970,240 990,255 Q1010,270 1030,260" stroke="#E8A04C" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Micro meteorites -->
  <g id="micro-mets" opacity="0.18">
    <circle cx="50" cy="50" r="1.5" fill="#554433"/><circle cx="180" cy="120" r="2" fill="#443322"/>
    <circle cx="310" cy="80" r="1.8" fill="#554433"/><circle cx="470" cy="50" r="1.5" fill="#443322"/>
    <circle cx="600" cy="90" r="2" fill="#554433"/><circle cx="750" cy="60" r="1.5" fill="#443322"/>
    <circle cx="890" cy="100" r="2" fill="#554433"/><circle cx="1020" cy="55" r="1.5" fill="#443322"/>
    <circle cx="1140" cy="80" r="2" fill="#554433"/><circle cx="130" cy="750" r="1.5" fill="#443322"/>
    <circle cx="380" cy="720" r="2" fill="#554433"/><circle cx="620" cy="760" r="1.5" fill="#443322"/>
    <circle cx="860" cy="740" r="2" fill="#554433"/><circle cx="1080" cy="720" r="1.5" fill="#443322"/>
  </g>
</svg>