<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="sMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEE66"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
    <linearGradient id="sShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFCC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEE88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CC8800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sCore" cx="0.45" cy="0.4" r="0.35">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="sGlowF">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#885500" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="24" cy="24" r="20" fill="url(#sGlow)" opacity="0.3"/>

  <!-- Crystal/gem body - hexagonal gem shape -->
  <g filter="url(#sShadow)">
    <!-- Star shape -->
    <polygon points="24,4 28,16 42,16 31,24 35,38 24,30 13,38 17,24 6,16 20,16" fill="url(#sMain)" stroke="#DDAA00" stroke-width="0.7"/>
  </g>

  <!-- Facet highlights -->
  <polygon points="24,8 27,16 24,20 21,16" fill="url(#sShine)" opacity="0.7"/>
  <polygon points="20,16 24,20 17,23 8,17" fill="#FFEEAA" opacity="0.2"/>
  <polygon points="28,16 40,17 31,23 24,20" fill="#FFEEAA" opacity="0.15"/>

  <!-- Core glow -->
  <circle cx="24" cy="22" r="6" fill="url(#sCore)" opacity="0.8"/>

  <!-- Sparkle rays -->
  <g filter="url(#sGlowF)" opacity="0.5">
    <line x1="24" y1="0" x2="24" y2="8" stroke="#FFFFCC" stroke-width="0.8"/>
    <line x1="24" y1="40" x2="24" y2="48" stroke="#FFFFCC" stroke-width="0.6"/>
    <line x1="0" y1="24" x2="8" y2="24" stroke="#FFFFCC" stroke-width="0.6"/>
    <line x1="40" y1="24" x2="48" y2="24" stroke="#FFFFCC" stroke-width="0.6"/>
    <line x1="6" y1="6" x2="12" y2="12" stroke="#FFFFCC" stroke-width="0.4"/>
    <line x1="36" y1="36" x2="42" y2="42" stroke="#FFFFCC" stroke-width="0.4"/>
    <line x1="42" y1="6" x2="36" y2="12" stroke="#FFFFCC" stroke-width="0.4"/>
    <line x1="6" y1="42" x2="12" y2="36" stroke="#FFFFCC" stroke-width="0.4"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="10" cy="8" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="38" cy="10" r="0.8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="8" cy="36" r="0.7" fill="#FFFFCC" opacity="0.5"/>
  <circle cx="40" cy="38" r="0.9" fill="#FFFFFF" opacity="0.6"/>

  <!-- Inner star highlight -->
  <polygon points="24,12 26,18 32,18 27,22 29,30 24,26 19,30 21,22 16,18 22,18" fill="#FFFFFF" opacity="0.15"/>

  <!-- Micro highlights on star tips -->
  <circle cx="24" cy="6" r="1.2" fill="#FFFFFF" filter="url(#sGlowF)" opacity="0.8"/>
  <circle cx="42" cy="16" r="1" fill="#FFFFCC" opacity="0.5"/>
  <circle cx="6" cy="16" r="1" fill="#FFFFCC" opacity="0.5"/>
  <circle cx="35" cy="38" r="1" fill="#FFFFCC" opacity="0.4"/>
  <circle cx="13" cy="38" r="1" fill="#FFFFCC" opacity="0.4"/>

  <!-- Energy ring -->
  <circle cx="24" cy="22" r="10" fill="none" stroke="#FFE066" stroke-width="0.4" opacity="0.3" stroke-dasharray="2,3"/>
</svg>