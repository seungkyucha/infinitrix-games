// 메인 업데이트 루프
function update(dt) {
  const sys = ACTIVE_SYSTEMS[G.state];
  if (!sys) return;

  // Tween 항상 업데이트
  tweenMgr.update(dt);
  G.gameTime += dt;

  // 입력 처리
  processInput(dt, sys.Input);

  // 물리
  if (sys.Physics) updatePhysics(dt);

  // 전투
  if (sys.Combat) updateCombat(dt);

  // 섹터
  if (sys.Sector) updateSectorLogic(dt);

  // 파티클 업데이트
  updateParticles(dt);
  updateScorePopups(dt);

  // 카메라 쉐이크 감쇠
  if (G.camShakeTimer > 0) {
    G.camShakeTimer -= dt;
    G.camShakeX = (G.rng.next()-0.5) * G.camShakeTimer * 20;
    G.camShakeY = (G.rng.next()-0.5) * G.camShakeTimer * 20;
  } else { G.camShakeX = 0; G.camShakeY = 0; }

  // 에너지 자연 회복
  if (G.ship.alive && (G.state==='EXPLORE'||G.state==='COMBAT'||G.state==='BOSS')) {
    G.ship.energy = Math.min(G.ship.maxEnergy, G.ship.energy + 8 * dt);
    G.ship.fireTimer = Math.max(0, G.ship.fireTimer - dt);
    G.ship.dashCd = Math.max(0, G.ship.dashCd - dt);
    if (G.ship.shieldCd > 0) G.ship.shieldCd -= dt;
    if (G.ship.skillCd > 0) G.ship.skillCd -= dt;
    if (G.ship.skillTimer > 0) { G.ship.skillTimer -= dt; if (G.ship.skillTimer <= 0) G.ship.skillActive = false; }
    if (G.ship.invulnTimer > 0) G.ship.invulnTimer -= dt;
  }

  // 콤보 타이머
  if (G.comboTimer > 0) { G.comboTimer -= dt; if(G.comboTimer<=0) G.combo=0; }

  // 자동 수리 (업그레이드)
  const upBonuses = calcUpgradeBonuses(save.upgrades);
  if (upBonuses.autoHeal > 0 && G.ship.alive) {
    G._autoHealTimer = (G._autoHealTimer||0) + dt;
    if (G._autoHealTimer >= 10) {
      G.ship.hp = Math.min(G.ship.maxHp, G.ship.hp + upBonuses.autoHeal);
      G._autoHealTimer = 0;
    }
  }
}

// 입력 처리
function processInput(dt, mode) {
  const inp = inputMgr;
  const w = logicalW, h = logicalH;

  // 공통: 일시정지 토글
  if (inp.justPressed['Escape'] || inp.justPressed['KeyP']) {
    if (G.state === 'PAUSE') { setState(G, G.prevState); return; }
    else if (G.state==='EXPLORE'||G.state==='COMBAT'||G.state==='BOSS') { setState(G, 'PAUSE'); return; }
  }
  // BGM 토글
  if (inp.justPressed['KeyM']) { soundMgr.toggleBgm(); }

  switch(G.state) {
    case 'TITLE':
      if (inp.justPressed['Space'] || inp.justPressed['Enter'] || inp.touch.taps.length > 0) {
        soundMgr.init();
        diffSelectMode = true;
        diffCursor = save.settings.difficulty;
        beginTransition(tweenMgr, G, 'SETTINGS', 0.5, null, null);
      }
      break;

    case 'SETTINGS':
      if (inp.justPressed['ArrowUp'] || inp.justPressed['KeyW']) diffCursor = (diffCursor+2)%3;
      if (inp.justPressed['ArrowDown'] || inp.justPressed['KeyS']) diffCursor = (diffCursor+1)%3;
      // 터치: 탭 위치로 난이도 선택
      inp.touch.taps.forEach(tap => {
        for(let i=0;i<3;i++){
          const dy=h*0.38+i*60;
          if(tap.y>=dy && tap.y<=dy+46) diffCursor=i;
        }
      });
      if (inp.justPressed['Space'] || inp.justPressed['Enter'] || (inp.touch.taps.length>0 && !inp.justPressed['Space'])) {
        save.settings.difficulty = diffCursor;
        saveSave(save);
        beginTransition(tweenMgr, G, 'HANGAR', 0.5);
      }
      if (inp.justPressed['Escape']) {
        beginTransition(tweenMgr, G, 'TITLE', 0.5);
      }
      break;

    case 'HANGAR':
      if (inp.justPressed['ArrowUp'] || inp.justPressed['KeyW']) G.menuCursor = Math.max(0, G.menuCursor-1);
      if (inp.justPressed['ArrowDown'] || inp.justPressed['KeyS']) G.menuCursor = Math.min(4, G.menuCursor+1);
      if (inp.justPressed['ArrowLeft'] || inp.justPressed['KeyA']) G.hangarTab = (G.hangarTab+2)%3;
      if (inp.justPressed['ArrowRight'] || inp.justPressed['KeyD']) G.hangarTab = (G.hangarTab+1)%3;
      // 터치: 탭으로 항목 선택
      inp.touch.taps.forEach(tap => {
        for(let i=0;i<5;i++){
          if(tap.y>=120+i*50 && tap.y<=160+i*50) { G.menuCursor=i; tryPurchaseUpgrade(); }
        }
        // 탭 전환
        for(let i=0;i<3;i++){
          if(tap.y>=80&&tap.y<=100&&tap.x>=w*0.05+i*w*0.25&&tap.x<=w*0.15+i*w*0.25) G.hangarTab=i;
        }
      });
      if (inp.justPressed['Space'] || inp.justPressed['Enter']) { tryPurchaseUpgrade(); }
      if (inp.justPressed['Escape']) {
        beginTransition(tweenMgr, G, 'SECTOR_SELECT', 0.5, () => { G.currentZone = 0; });
      }
      break;

    case 'SECTOR_SELECT':
      if (inp.justPressed['Space'] || inp.justPressed['Enter'] || inp.touch.taps.length > 0) {
        startNewRun();
      }
      if (inp.justPressed['Escape']) {
        beginTransition(tweenMgr, G, 'HANGAR', 0.5);
      }
      break;

    case 'NARRATIVE':
      if (inp.justPressed['Space'] || inp.justPressed['Enter'] || inp.touch.taps.length > 0) {
        G.narrativeIdx++;
        if (G.narrativeIdx >= G.narrativeLines.length) {
          setState(G, G._returnFromNarrative || 'EXPLORE');
          G._returnFromNarrative = null;
        }
      }
      break;

    case 'EXPLORE':
    case 'COMBAT':
    case 'BOSS':
      processGameInput(dt);
      break;

    case 'BOSS_INTRO':
      G.introTimer += dt;
      if (G.introTimer > 2.5 || inp.justPressed['Space'] || inp.touch.taps.length > 0) {
        setState(G, 'BOSS');
        soundMgr.playBgm('boss');
      }
      break;

    case 'BOSS_VICTORY':
      // 자동 전환 (tween에서 처리)
      break;

    case 'SECTOR_CLEAR':
      // 아티팩트 선택
      if (inp.justPressed['Digit1'] || inp.justPressed['Numpad1']) { selectArtifact(0); }
      if (inp.justPressed['Digit2'] || inp.justPressed['Numpad2']) { selectArtifact(1); }
      if (inp.justPressed['Digit3'] || inp.justPressed['Numpad3']) { selectArtifact(2); }
      if (inp.justPressed['ArrowLeft']||inp.justPressed['KeyA']) G.artifactSelected = Math.max(0,(G.artifactSelected||0)-1);
      if (inp.justPressed['ArrowRight']||inp.justPressed['KeyD']) G.artifactSelected = Math.min(G.artifactChoices.length-1,(G.artifactSelected||0)+1);
      if (inp.justPressed['Space']||inp.justPressed['Enter']) { selectArtifact(G.artifactSelected||0); }
      // 터치
      inp.touch.taps.forEach(tap => {
        if(G.artifactChoices.length){
          const cardW=Math.min(w*0.25,140);
          for(let i=0;i<G.artifactChoices.length;i++){
            const cx=w/2+(i-1)*(cardW+20);
            if(Math.abs(tap.x-cx)<cardW/2 && tap.y>h*0.35 && tap.y<h*0.75) selectArtifact(i);
          }
        }
      });
      break;

    case 'GAME_OVER':
      if (inp.justPressed['KeyR'] || inp.justPressed['Space'] || inp.touch.taps.length > 0) {
        beginTransition(tweenMgr, G, 'TITLE', 0.6, () => {
          resetToTitle();
        });
      }
      break;

    case 'VICTORY':
      if (inp.justPressed['KeyR'] || inp.justPressed['Space'] || inp.touch.taps.length > 0) {
        beginTransition(tweenMgr, G, 'TITLE', 0.6, () => {
          resetToTitle();
        });
      }
      break;

    case 'PAUSE':
      // handled above
      break;
  }
}

// 게임 중 입력 (EXPLORE/COMBAT/BOSS)
function processGameInput(dt) {
  const ship = G.ship;
  if (!ship.alive) return;
  const inp = inputMgr;

  // 이동 (키보드)
  let mx = 0, my = 0;
  if (inp.keys['KeyW'] || inp.keys['ArrowUp']) my = -1;
  if (inp.keys['KeyS'] || inp.keys['ArrowDown']) my = 1;
  if (inp.keys['KeyA'] || inp.keys['ArrowLeft']) mx = -1;
  if (inp.keys['KeyD'] || inp.keys['ArrowRight']) mx = 1;

  // 이동 (터치 조이스틱)
  if (inp.touch.joyActive) {
    const jdist = Math.sqrt(inp.touch.joyDX*inp.touch.joyDX + inp.touch.joyDY*inp.touch.joyDY);
    if (jdist > 5) {
      mx = inp.touch.joyDX / CFG.JOY_RADIUS;
      my = inp.touch.joyDY / CFG.JOY_RADIUS;
    }
  }

  // 정규화
  const mLen = Math.sqrt(mx*mx+my*my);
  if (mLen > 0) {
    mx /= Math.max(mLen,1); my /= Math.max(mLen,1);
    ship.angle = Math.atan2(my, mx);
  }

  // 대시 (Shift/X = 이동방향, 우클릭 = 마우스방향, 스와이프 = 스와이프방향)
  if (!ship.dashing) {
    let dashTrigger = inp.justPressed['ShiftLeft']||inp.justPressed['ShiftRight']||inp.justPressed['KeyX'];
    let dashDX = mx, dashDY = my, dashValid = mLen > 0;
    // 우클릭 대시: 마우스 방향으로
    if (inp.justPressed['dash'] && inp._mouseX !== undefined) {
      const mdx = (inp._mouseX||0) - logicalW/2, mdy = (inp._mouseY||0) - logicalH/2;
      const mdLen = Math.sqrt(mdx*mdx+mdy*mdy);
      if (mdLen > 5) { dashDX = mdx/mdLen; dashDY = mdy/mdLen; dashValid = true; }
      dashTrigger = true;
    } else if (inp.justPressed['dash']) { dashTrigger = true; }
    // 터치 스와이프 대시: 스와이프 방향
    if (inp.touch.swipe) {
      const sw = inp.touch.swipe;
      const swLen = Math.sqrt(sw.dx*sw.dx+sw.dy*sw.dy);
      if (swLen > 5) { dashDX = sw.dx/swLen; dashDY = sw.dy/swLen; dashValid = true; dashTrigger = true; }
    }
    if (dashTrigger && ship.dashCd <= 0 && dashValid) {
      ship.dashing = true;
      ship.dashTimer = CFG.DASH_DURATION;
      ship.dashDirX = dashDX; ship.dashDirY = dashDY;
      ship.invulnTimer = CFG.DASH_INVULN;
      ship.dashCd = DIFF_PRESETS[G.difficulty].dashCd * (1 + (G.artifactBonuses.dashCd||0));
      soundMgr.playSfx('dash');
    }
  }

  // 이동 적용
  if (ship.dashing) {
    ship.vx = ship.dashDirX * CFG.DASH_SPEED;
    ship.vy = ship.dashDirY * CFG.DASH_SPEED;
    ship.dashTimer -= dt;
    if (ship.dashTimer <= 0) ship.dashing = false;
  } else {
    const spd = ship.speed * (1 + (G.artifactBonuses.speed||0));
    // 존별 환경 효과
    const slowFactor = G.currentZone === 3 ? 0.7 : 1; // 빙결 감속
    ship.vx = mx * spd * slowFactor;
    ship.vy = my * spd * slowFactor;
  }

  // 무기 전환 (키보드 1/2/3 + 마우스 휠)
  if (inp.justPressed['Digit1']||inp.justPressed['Numpad1']) ship.weapon = 0;
  if (inp.justPressed['Digit2']||inp.justPressed['Numpad2']) ship.weapon = 1;
  if (inp.justPressed['Digit3']||inp.justPressed['Numpad3']) ship.weapon = 2;
  if (inp.justPressed['wheelUp']) ship.weapon = (ship.weapon + 2) % 3; // 이전 무기
  if (inp.justPressed['wheelDown']) ship.weapon = (ship.weapon + 1) % 3; // 다음 무기

  // 무기 발사 (키보드: Z / 마우스 클릭)
  let firing = inp.keys['KeyZ'] || inp._mouseDown;
  // 조준 각도
  let aimAngle = ship.angle;
  if (inp._mouseDown || inp._mouseX !== undefined) {
    const mx2 = (inp._mouseX||0) - logicalW/2 + G.camX + logicalW/2 - ship.x;
    const my2 = (inp._mouseY||0) - logicalH/2 + G.camY + logicalH/2 - ship.y;
    if (mx2*mx2+my2*my2 > 100) aimAngle = Math.atan2(my2, mx2);
  }

  // 스킬 발동 (Space키)
  if (inp.justPressed['Space']) activateSkill();

  // 터치 버튼 처리
  inp.touch.taps.forEach(tap => {
    const action = checkTouchButtons(tap.x, tap.y, logicalW, logicalH);
    if (action === 'atk') { firing = true; autoAim(); }
    if (action === 'skill') { activateSkill(); }
    if (action === 'shield') { toggleShield(); }
    if (action === 'weapon0') ship.weapon = 0;
    if (action === 'weapon1') ship.weapon = 1;
    if (action === 'weapon2') ship.weapon = 2;
  });
  // 터치 공격 버튼 지속 체크 (홀드)
  Object.values(inputMgr._touchIds).forEach(tid => {
    if (tid.type === 'tap') {
      const action = checkTouchButtons(tid.cx, tid.cy, logicalW, logicalH);
      if (action === 'atk') { firing = true; autoAim(); }
    }
  });

  if (firing) {
    const upgBonuses = calcUpgradeBonuses(save.upgrades);
    const bonuses = {
      projSpeed: G.artifactBonuses.projSpeed + (upgBonuses.projSpeed||0),
      dmg: G.artifactBonuses.dmg + upgBonuses.dmg + (G.boss && upgBonuses.bossDmg ? upgBonuses.bossDmg : 0),
      fireRate: upgBonuses.fireRate,
      pierce: upgBonuses.pierce + (G.artifactBonuses.split > 0 ? 1 : 0),
    };
    if (fireWeapon(projPool, ship, ship.weapon, aimAngle, bonuses, G.rng)) {
      const sfxNames = ['laser','missile','plasma'];
      soundMgr.playSfx(sfxNames[ship.weapon]);
    }
  }

  // 실드 토글 (키보드 E)
  if (inp.justPressed['KeyE']) toggleShield();

  function autoAim() {
    // 자동 조준: 가장 가까운 적
    let closest = null, closestDist = Infinity;
    const allEnemies = G.state==='BOSS'&&G.boss ? [G.boss] : G.sectorEnemies;
    allEnemies.forEach(e => {
      if(!e.alive) return;
      const d = Math.sqrt((e.x-ship.x)**2+(e.y-ship.y)**2);
      if(d<closestDist){closestDist=d;closest=e;}
    });
    if(closest) aimAngle = Math.atan2(closest.y-ship.y, closest.x-ship.x);
  }
  G.aimX = ship.x + Math.cos(aimAngle)*100;
  G.aimY = ship.y + Math.sin(aimAngle)*100;

  function toggleShield() {
    if (ship.shieldActive) { ship.shieldActive = false; }
    else if (ship.shieldCharges > 0 && ship.shieldCd <= 0) { ship.shieldActive = true; soundMgr.playSfx('shield'); }
  }

  // 아티팩트 액티브 스킬 발동
  function activateSkill() {
    if (ship.skillCd > 0 || G.artifacts.length === 0) return;
    ship.skillActive = true;
    ship.skillTimer = 3.0; // 3초간 지속
    ship.skillCd = 12.0;   // 12초 쿨다운
    soundMgr.playSfx('artifact');
    // 보유 아티팩트 기반 스킬 효과: 주변 적에게 범위 데미지 + 일시 강화
    const dmgBase = 30 + G.artifacts.length * 15;
    const range = 200 + G.artifacts.length * 30;
    // 범위 데미지 (폭발)
    const allTargets = G.state === 'BOSS' && G.boss ? [G.boss] : G.sectorEnemies;
    allTargets.forEach(e => {
      if (!e.alive) return;
      const dx = e.x - ship.x, dy = e.y - ship.y;
      if (Math.sqrt(dx*dx+dy*dy) < range) {
        e.hp -= dmgBase;
        // 히트 파티클
        for (let pi = 0; pi < 5; pi++) {
          particlePool.spawn({ x:e.x, y:e.y, vx:G.rng.range(-80,80), vy:G.rng.range(-80,80),
            life:0.5, maxLife:0.5, size:4, color:'#FFD700', type:'hit' });
        }
      }
    });
    // 스킬 발동 이펙트 (방사 파티클)
    for (let pi = 0; pi < 16; pi++) {
      const a = pi * Math.PI * 2 / 16;
      particlePool.spawn({ x:ship.x, y:ship.y, vx:Math.cos(a)*150, vy:Math.sin(a)*150,
        life:0.6, maxLife:0.6, size:5, color:'#FFD700', type:'skill' });
    }
    // 카메라 셰이크
    G.camShakeTimer = 0.3;
  }
}

// 물리 업데이트
function updatePhysics(dt) {
  const ship = G.ship;
  if (!ship.alive) return;

  // 함선 이동
  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;

  // 경계 제한
  const sd = G.sectorData;
  if(sd){
    ship.x = Math.max(20, Math.min(sd.width-20, ship.x));
    ship.y = Math.max(20, Math.min(sd.height-20, ship.y));
  }

  // 카메라 추적
  const targetCX = ship.x - logicalW/2;
  const targetCY = ship.y - logicalH/2;
  G.camX += (targetCX - G.camX) * 5 * dt;
  G.camY += (targetCY - G.camY) * 5 * dt;

  // 발사체 이동
  projPool.forEach((p, idx) => {
    if (!p.alive) return;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0 || p.x < G.camX-50 || p.x > G.camX+logicalW+50 || p.y < G.camY-50 || p.y > G.camY+logicalH+50) {
      p.alive = false; projPool.release(p);
    }
  });

  // 적 탄환 이동
  enemyBulletPool.forEach((b, idx) => {
    if (!b.alive) return;
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    if (b.life <= 0) { b.alive = false; enemyBulletPool.release(b); }
  });

  // 적 AI 이동
  G.sectorEnemies.forEach(e => {
    if (!e.alive) return;
    e.aiTimer += dt;
    // 간단한 AI: 플레이어를 향해 이동
    const dx = ship.x - e.x, dy = ship.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const slowFactor = 1 - (G.artifactBonuses.enemySlow||0);
    if (e.type === 'drone') {
      if (dist < 400) {
        e.vx = (dx/dist) * e.speed * slowFactor;
        e.vy = (dy/dist) * e.speed * slowFactor;
      } else {
        // 순찰
        const pa = e.aiTimer * 0.5;
        e.vx = Math.cos(pa) * e.speed * 0.3;
        e.vy = Math.sin(pa) * e.speed * 0.3;
      }
    } else if (e.type === 'cruiser') {
      if (dist < 500) {
        e.vx = (dx/dist) * e.speed * 0.5 * slowFactor;
        e.vy = (dy/dist) * e.speed * 0.5 * slowFactor;
        // 발사
        e.fireTimer -= dt;
        if (e.fireTimer <= 0) {
          e.fireTimer = 2;
          const eb = enemyBulletPool.get();
          eb.x=e.x; eb.y=e.y; eb.dmg=e.atk;
          const ba=Math.atan2(dy,dx);
          eb.vx=Math.cos(ba)*180; eb.vy=Math.sin(ba)*180; eb.alive=true; eb.life=3;
          eb.color = ZONES[e.zone]?ZONES[e.zone].enemy:'#FF4444';
        }
      }
    }
    // mine은 정지, 근접 시 폭발
    if (e.type === 'mine' && dist < 60) {
      applyDamageToShip(ship, e.atk, G.artifactBonuses, G.particles, G.rng);
      e.alive = false;
      spawnExplosion(G.particles, e.x, e.y, '#FF4444', G.rng, 10);
      soundMgr.playSfx('explosion');
    }
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.angle = Math.atan2(e.vy, e.vx);
  });

  // 보스 이동 (BOSS 상태)
  if (G.state === 'BOSS' && G.boss && G.boss.alive) {
    updateBossAI(G.boss, ship, dt);
  }

  // 환경 위험물
  if(G.sectorData) {
    G.sectorData.hazards.forEach(hz => {
      if(!hz.alive) return;
      hz.angle += hz.rotSpeed * dt;
      // 플레이어 충돌
      if(hitTest(ship.x,ship.y,ship.dashing?5:CFG.PLAYER_SIZE, hz.x,hz.y,hz.size) && ship.invulnTimer<=0){
        if(hz.type==='asteroid'){
          applyDamageToShip(ship, 10, G.artifactBonuses, G.particles, G.rng);
          ship.invulnTimer=0.5;
          soundMgr.playSfx('hit');
        }
      }
    });
    // 자원 수집
    const pickupR = 30 * (1 + (G.artifactBonuses.pickupRange||0));
    G.sectorData.resources.forEach(r => {
      if(r.collected) return;
      if(hitTest(ship.x,ship.y,pickupR, r.x,r.y,8)){
        r.collected = true;
        soundMgr.playSfx('pickup');
        if(r.type==='crystal') { G.crystals++; spawnScorePopup(G.scorePopups,r.x-G.camX,r.y-G.camY,'+💎','#FF44FF'); }
        else if(r.type==='energy') { ship.energy=Math.min(ship.maxEnergy,ship.energy+15); }
        else { G.dataFrags++; G.score+=10; }
      }
    });
  }
}

// 보스 AI
function updateBossAI(boss, ship, dt) {
  boss.pulseTimer += dt;
  boss.moveTimer += dt;
  boss.fireTimer -= dt;

  // 이동: 플레이어 주변을 공전
  const orbAngle = boss.moveTimer * 0.3;
  const orbDist = 250 + Math.sin(boss.moveTimer*0.5)*80;
  const targetX = ship.x + Math.cos(orbAngle)*orbDist;
  const targetY = ship.y + Math.sin(orbAngle)*orbDist;
  boss.x += (targetX - boss.x) * 1.5 * dt;
  boss.y += (targetY - boss.y) * 1.5 * dt;
  boss.angle = Math.atan2(ship.y-boss.y, ship.x-boss.x);

  // 공격 패턴
  if (boss.fireTimer <= 0) {
    boss.fireTimer = boss.phase >= 3 ? 0.8 : boss.phase >= 2 ? 1.2 : 1.8;
    // 발사
    const patterns = boss.phase >= 3 ? 5 : boss.phase >= 2 ? 3 : 2;
    for(let i=0;i<patterns;i++){
      const ba = boss.angle + (i-patterns/2)*0.3;
      const eb = enemyBulletPool.get();
      eb.x=boss.x; eb.y=boss.y; eb.dmg=boss.atk;
      eb.vx=Math.cos(ba)*200; eb.vy=Math.sin(ba)*200;
      eb.alive=true; eb.life=4; eb.size=6;
      eb.color=boss.color;
    }
  }

  // 페이즈 전환 (F5: 가드 플래그)
  if (!boss.phaseTransitioning) {
    const hpPct = boss.hp / boss.maxHp;
    const threshold = boss.maxPhase === 4 ? [0.75, 0.5, 0.25] : boss.maxPhase === 3 ? [0.66, 0.33] : [0.5];
    const nextPhase = boss.phase + 1;
    if (nextPhase <= boss.maxPhase && hpPct <= (threshold[boss.phase-1]||0)) {
      boss.phaseTransitioning = true;
      boss.phase = nextPhase;
      G.camShakeTimer = 1.0;
      soundMgr.playSfx('bossAlert');
      tweenMgr.delay(1.5, () => { boss.phaseTransitioning = false; });
    }
  }
}

// 전투 업데이트
function updateCombat(dt) {
  const ship = G.ship;
  const upgBonuses = calcUpgradeBonuses(save.upgrades);

  // 발사체 vs 적 충돌
  projPool.forEach(p => {
    if (!p.alive) return;
    const enemies = G.state==='BOSS' ? (G.boss && G.boss.alive ? [G.boss] : []) : G.sectorEnemies;
    enemies.forEach(e => {
      if(!e.alive || !p.alive) return;
      if(hitTest(p.x,p.y,6, e.x,e.y,e.size)){
        // 크리티컬 체크
        const isCrit = G.rng.chance(upgBonuses.crit);
        const dmg = p.dmg * (isCrit ? CFG.CRIT_DMG : 1);
        const killed = applyDamageToEnemy(e, dmg, isCrit, G.particles, G.rng);
        if(isCrit) spawnScorePopup(G.scorePopups, e.x-G.camX, e.y-G.camY-10, 'CRIT!', '#FF4444');

        if(killed){
          G.score += e.score||50;
          G.combo++;
          G.comboTimer = 3;
          spawnScorePopup(G.scorePopups, e.x-G.camX, e.y-G.camY, `+${e.score||50}`, '#FFD700');
          spawnExplosion(G.particles, e.x, e.y, e.color||'#FF4444', G.rng, 12);
          soundMgr.playSfx('explosion');
        } else {
          soundMgr.playSfx('hit');
        }

        p.pierce--;
        if(p.pierce < 0) { p.alive = false; projPool.release(p); }
      }
    });
  });

  // 적 탄환 vs 플레이어
  enemyBulletPool.forEach(b => {
    if(!b.alive || !ship.alive) return;
    if(ship.invulnTimer > 0) return;
    if(hitTest(b.x,b.y,b.size, ship.x,ship.y,CFG.PLAYER_SIZE)){
      const dead = applyDamageToShip(ship, b.dmg, G.artifactBonuses, G.particles, G.rng);
      b.alive = false; enemyBulletPool.release(b);
      soundMgr.playSfx('hit');
      ship.invulnTimer = 0.5;
      G.camShakeTimer = 0.2;
      // DDA 히트 카운트
      G.ddaHitCount++;
      G.ddaHitTimer = 5;
      if(G.ddaHitCount >= 3 && G.ddaHitTimer > 0 && DIFF_PRESETS[G.difficulty].dda && G.ddaLevel < 1) G.ddaLevel=1;
      if(dead) handlePlayerDeath();
    }
  });

  // 적 직접 접촉 데미지
  G.sectorEnemies.forEach(e => {
    if(!e.alive || !ship.alive || ship.invulnTimer>0) return;
    if(hitTest(ship.x,ship.y,CFG.PLAYER_SIZE, e.x,e.y,e.size)){
      const dead = applyDamageToShip(ship, e.atk*0.5, G.artifactBonuses, G.particles, G.rng);
      ship.invulnTimer = 0.8;
      G.camShakeTimer = 0.15;
      soundMgr.playSfx('hit');
      if(dead) handlePlayerDeath();
    }
  });

  // DDA 히트 타이머 감소
  if(G.ddaHitTimer > 0){G.ddaHitTimer-=dt; if(G.ddaHitTimer<=0) G.ddaHitCount=0;}

  // 보스 격파 체크 (F17: bossRewardGiven)
  if (G.state === 'BOSS' && G.boss && !G.boss.alive && !G.bossRewardGiven) {
    G.bossRewardGiven = true;
    const bossScore = CFG.SCORE_BOSS[G.currentZone] || 1000;
    G.score += bossScore;
    spawnScorePopup(G.scorePopups, logicalW/2, logicalH*0.3, `+${bossScore} BOSS!`, '#FFD700');
    save.bossesDefeated[G.currentZone] = true;
    spawnExplosion(G.particles, G.boss.x, G.boss.y, G.boss.color, G.rng, 30);
    soundMgr.playSfx('explosion');
    G.camShakeTimer = 1.5;
    setState(G, 'BOSS_VICTORY');
    soundMgr.stopBgm();
    soundMgr.playSfx('artifact');
    tweenMgr.delay(2.0, () => {
      onSectorCleared();
    });
  }

  // 웨이브 클리어 체크 (F5: 가드 플래그)
  if (G.state === 'COMBAT' && !G.waveClearing) {
    const allDead = G.sectorEnemies.every(e => !e.alive);
    if (allDead) {
      G.waveClearing = true;
      // 웨이브 힐 아티팩트
      if (G.artifactBonuses.waveHeal > 0) {
        G.ship.hp = Math.min(G.ship.maxHp, G.ship.hp + G.artifactBonuses.waveHeal);
      }
      G.wave++;
      if (G.wave >= G.maxWaves) {
        // 보스 전투 진입
        tweenMgr.delay(1.0, () => {
          G.boss = createBoss(G.currentZone, DIFF_PRESETS[G.difficulty]);
          G.boss.x = G.ship.x;
          G.boss.y = G.ship.y - 300;
          G.bossRewardGiven = false;
          G.introTimer = 0;
          setState(G, 'BOSS_INTRO');
          soundMgr.playSfx('bossAlert');
          G.waveClearing = false;
        });
      } else {
        // 다음 웨이브
        tweenMgr.delay(CFG.WAVE_REST, () => {
          G.sectorEnemies = generateWave(G.rng, G.currentZone, G.wave, DIFF_PRESETS[G.difficulty], G.ddaLevel);
          G.waveClearing = false;
          setState(G, 'COMBAT');
        });
      }
    }
  }
}

// 섹터 로직 업데이트
function updateSectorLogic(dt) {
  // EXPLORE → COMBAT 전환 (적 근접)
  if (G.state === 'EXPLORE' && G.sectorEnemies.length > 0 && !G.combatDone) {
    const hasAlive = G.sectorEnemies.some(e => e.alive);
    if (hasAlive) {
      const closest = G.sectorEnemies.reduce((min, e) => {
        if(!e.alive) return min;
        const d = Math.sqrt((e.x-G.ship.x)**2+(e.y-G.ship.y)**2);
        return d < min ? d : min;
      }, Infinity);
      if (closest < 350) {
        setState(G, 'COMBAT');
        soundMgr.playBgm('combat');
      }
    }
  }
}

// 섹터 클리어 처리
function onSectorCleared() {
  // 점수 보너스
  const timeBonus = Math.max(0, (60 - (G.gameTime % 60)) * 10) | 0;
  G.clearBonus = timeBonus;
  G.score += timeBonus;
  // 아티팩트 선택지 생성
  G.artifactChoices = generateArtifactChoices(G.rng, G.artifacts, G.artifactBonuses.luckUp||0);
  G.artifactSelected = 0;
  setState(G, 'SECTOR_CLEAR');
  soundMgr.playSfx('artifact');
}

// 아티팩트 선택
function selectArtifact(idx) {
  if (idx < 0 || idx >= G.artifactChoices.length) return;
  if (G.artifacts.length >= 5) return; // 최대 5개
  const art = G.artifactChoices[idx];
  G.artifacts.push(art);
  applyArtifact(G.artifactBonuses, art);
  soundMgr.playSfx('artifact');
  // 다음 섹터로 진행
  advanceToNextSector();
}

// 다음 섹터 진행
function advanceToNextSector() {
  G.currentSector++;
  if (G.currentSector >= 3) {
    // 존 클리어 → 다음 존
    G.currentSector = 0;
    G.currentZone++;
    if (G.currentZone >= 5) {
      // 히든 존 체크
      const allBoss = save.bossesDefeated.slice(0,5).every(Boolean);
      const hasKey = calcUpgradeBonuses(save.upgrades).dimKey;
      if (G.currentZone === 5 && (allBoss || hasKey)) {
        // 히든 존
      } else {
        // 승리!
        handleVictory(false);
        return;
      }
    }
    if (G.currentZone > 5) {
      handleVictory(true);
      return;
    }
  }
  // 새 섹터 생성
  projPool.releaseAll();
  enemyBulletPool.releaseAll();
  G.sectorData = generateSector(G.rng, G.currentZone, G.currentSector, DIFF_PRESETS[G.difficulty]);
  G.wave = 0;
  G.maxWaves = 3 + G.currentZone;
  G.sectorEnemies = generateWave(G.rng, G.currentZone, 0, DIFF_PRESETS[G.difficulty], G.ddaLevel);
  G.ship.x = G.sectorData.startX;
  G.ship.y = G.sectorData.startY;
  G.waveClearing = false;
  G.combatDone = false;
  G.boss = null;
  G.bossRewardGiven = false;
  // 내러티브
  const zn = ZONES[G.currentZone];
  G.narrativeLines = [
    `${zn.name} 섹터 ${G.currentSector+1} 진입...`,
    `새로운 시련이 기다리고 있습니다.`,
  ];
  G.narrativeIdx = 0;
  G._returnFromNarrative = 'EXPLORE';
  setState(G, 'NARRATIVE');
  soundMgr.playBgm('explore');
}

// 플레이어 사망
function handlePlayerDeath() {
  G.ship.alive = false;
  soundMgr.stopBgm();
  soundMgr.playSfx('explosion');
  G.camShakeTimer = 1.0;
  spawnExplosion(G.particles, G.ship.x, G.ship.y, '#00CED1', G.rng, 20);
  // 판정 먼저, 저장 나중에 (F8)
  const isNewHigh = G.score > save.highScore;
  if (isNewHigh) save.highScore = G.score;
  if (G.currentZone * 3 + G.currentSector > save.bestSector) save.bestSector = G.currentZone * 3 + G.currentSector;
  save.crystals += G.crystals;
  saveSave(save);
  G._isNewHigh = isNewHigh;
  tweenMgr.delay(1.5, () => {
    setState(G, 'GAME_OVER');
  });
}

// 승리 처리
function handleVictory(trueEnd) {
  G._trueEnd = trueEnd;
  if (trueEnd) save.endings.true = true;
  else save.endings.normal = true;
  const isNewHigh = G.score > save.highScore;
  if (isNewHigh) save.highScore = G.score;
  save.crystals += G.crystals;
  saveSave(save);
  G._isNewHigh = isNewHigh;
  soundMgr.stopBgm();
  setState(G, 'VICTORY');
}

// 타이틀로 리셋
function resetToTitle() {
  projPool.releaseAll();
  enemyBulletPool.releaseAll();
  tweenMgr.clearImmediate();
  save = loadSave();
  G = createGameState(save);
  G.state = 'TITLE';
  G.stars = initStars(G.rng, 150);
  G.titleAlpha = 1;
  soundMgr.playBgm('title');
}

// 업그레이드 구매
function tryPurchaseUpgrade() {
  const treeKeys = ['attack','defense','explore'];
  const key = treeKeys[G.hangarTab];
  const tree = UPGRADE_TREES[key];
  const idx = G.menuCursor;
  if (idx < 0 || idx >= tree.length) return;
  if (save.upgrades[key][idx] > 0) return; // 이미 구매
  if (idx > 0 && !save.upgrades[key][idx-1]) return; // 이전 레벨 미구매
  if (save.crystals < tree[idx].cost) return; // 비용 부족
  save.crystals -= tree[idx].cost;
  save.upgrades[key][idx] = 1;
  saveSave(save);
  soundMgr.playSfx('artifact');
}

// 파티클 업데이트
function updateParticles(dt) {
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    p.vx*=0.95; p.vy*=0.95;
    if(p.life<=0) G.particles.splice(i,1);
  }
  // 풀 제한
  while(G.particles.length > CFG.POOL_PARTICLE) G.particles.shift();
}

// 점수 팝업 업데이트
function updateScorePopups(dt) {
  for(let i=G.scorePopups.length-1;i>=0;i--){
    const p=G.scorePopups[i];
    p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0) G.scorePopups.splice(i,1);
  }
}

// 메인 드로우
function draw() {
  const w = logicalW, h = logicalH;
  ctx.clearRect(0, 0, w, h);

  switch(G.state) {
    case 'BOOT':
      drawLoading(ctx, 0.5, w, h);
      break;

    case 'TITLE':
      drawBackground(ctx, G.gameTime*20, 0, 0, G.stars, w, h, G.gameTime);
      drawTitle(ctx, w, h, G.titleAlpha, 0.5+0.5*Math.sin(G.gameTime*0.5), G.gameTime);
      break;

    case 'SETTINGS':
      drawBackground(ctx, G.gameTime*20, 0, 0, G.stars, w, h, G.gameTime);
      drawDifficultySelect(ctx, diffCursor, w, h, G.lang, G.gameTime);
      break;

    case 'HANGAR':
      drawHangar(ctx, save, G.hangarTab, G.menuCursor, w, h, G.lang, G.gameTime);
      break;

    case 'SECTOR_SELECT':
      drawBackground(ctx, G.gameTime*10, 0, G.currentZone, G.stars, w, h, G.gameTime);
      drawSectorSelect(ctx, G.currentZone, save.bossesDefeated, w, h, G.lang, G.gameTime);
      break;

    case 'NARRATIVE':
    case 'EXPLORE':
    case 'COMBAT':
    case 'BOSS_INTRO':
    case 'BOSS':
    case 'BOSS_VICTORY':
      drawGameWorld(ctx, w, h);
      break;

    case 'SECTOR_CLEAR':
      drawGameWorld(ctx, w, h);
      drawSectorClear(ctx, G.artifactChoices, G.artifactSelected, G.clearBonus, w, h, G.lang, G.gameTime);
      break;

    case 'GAME_OVER':
      drawBackground(ctx, G.camX+G.camShakeX, G.camY+G.camShakeY, G.currentZone, G.stars, w, h, G.gameTime);
      drawGameOver(ctx, G.score, save.highScore, G._isNewHigh, G.currentZone, w, h, G.gameTime);
      break;

    case 'VICTORY':
      drawVictory(ctx, G.score, G._trueEnd, w, h, G.gameTime);
      break;

    case 'PAUSE':
      drawGameWorld(ctx, w, h);
      drawPause(ctx, w, h, G.lang, G.gameTime);
      break;
  }

  // 전환 오버레이
  if (G.transAlpha > 0.01) {
    ctx.fillStyle = `rgba(10,10,26,${G.transAlpha})`;
    ctx.fillRect(0, 0, w, h);
  }
}

// 게임 월드 렌더링
function drawGameWorld(ctx, w, h) {
  ctx.save();
  // 카메라 변환
  const cx = G.camX + G.camShakeX;
  const cy = G.camY + G.camShakeY;
  // 배경 (화면 좌표)
  drawBackground(ctx, cx, cy, G.currentZone, G.stars, w, h, G.gameTime);

  // 월드 좌표 변환
  ctx.translate(-cx, -cy);

  // 환경 위험물
  if(G.sectorData){
    G.sectorData.hazards.forEach(hz => {
      if(!hz.alive) return;
      drawAsteroid(ctx, hz.x, hz.y, hz.size, hz.angle, G.gameTime);
    });
    // 자원
    G.sectorData.resources.forEach(r => {
      if(!r.collected) drawResource(ctx, r.x, r.y, r.type, G.gameTime);
    });
  }

  // 적
  G.sectorEnemies.forEach(e => {
    if(!e.alive) return;
    drawEnemy(ctx, e.x, e.y, e.size, e.type, e.hp, e.maxHp, e.zone, e.angle, G.gameTime);
  });

  // 적 탄환
  enemyBulletPool.forEach(b => {
    if(b.alive) drawEnemyBullet(ctx, b.x, b.y, b.size, b.color, G.gameTime);
  });

  // 발사체
  projPool.forEach(p => {
    if(p.alive) drawProjectile(ctx, p.x, p.y, p.type, p.angle, G.gameTime);
  });

  // 보스
  if(G.boss && G.boss.alive) drawBoss(ctx, G.boss.x, G.boss.y, G.boss, G.gameTime);

  // 플레이어 함선
  if(G.ship.alive){
    const thrust = (G.ship.vx*G.ship.vx+G.ship.vy*G.ship.vy > 100) ? 1 : 0;
    drawShip(ctx, G.ship.x, G.ship.y, CFG.PLAYER_SIZE, G.ship.angle, thrust, G.ship.shieldActive, G.ship.dashing, G.ship.invulnTimer, G.gameTime);
  }

  // 파티클 (월드 좌표)
  drawParticles(ctx, G.particles, G.gameTime);

  ctx.restore();

  // HUD (화면 좌표)
  if(G.state!=='NARRATIVE'){
    drawHUD(ctx, G.ship, G.score, G.wave, G.maxWaves, G.currentZone, G.currentSector, G.ship.weapon, G.crystals, G.artifacts, G.combo, w, h, G.gameTime);
  }

  // 미니맵
  if(G.sectorData && G.state!=='BOSS_INTRO'){
    drawMinimap(ctx, G.ship.x, G.ship.y, G.sectorEnemies, G.sectorData.hazards, G.sectorData.resources, G.currentZone, w, h, Math.min(120, w*0.15));
  }

  // 모바일 컨트롤
  if(inputMgr.isMobile && G.ship.alive){
    drawMobileControls(ctx, inputMgr.touch, G.ship.alive, w, h, G.gameTime);
  }

  // 점수 팝업 (화면 좌표)
  drawScorePopups(ctx, G.scorePopups, G.gameTime);

  // 내러티브 오버레이
  if(G.state==='NARRATIVE'){
    drawNarrative(ctx, G.narrativeLines, G.narrativeIdx, w, h, G.lang, G.gameTime);
  }

  // 보스 인트로
  if(G.state==='BOSS_INTRO' && G.boss){
    drawBossIntro(ctx, G.boss, G.introTimer, w, h, G.lang, G.gameTime);
  }

  // 포스트 이펙트 (존별 환경, 비네트 등)
  drawPostEffects(ctx, w, h);

  // 포탈 렌더링 (섹터 데이터에 포탈 위치가 있을 때)
  if (G.sectorData && G.state === 'EXPLORE') {
    ctx.save();
    ctx.translate(-(G.camX + G.camShakeX), -(G.camY + G.camShakeY));
    const portalActive = G.sectorEnemies.every(e => !e.alive);
    drawPortal(ctx, G.sectorData.portalX, G.sectorData.portalY, portalActive, G.gameTime);
    ctx.restore();
  }
}

// 메인 게임 루프 (requestAnimationFrame)
function gameLoop(now) {
  const rawDt = (now - lastTime) / 1000;
  const dt = Math.min(rawDt, CFG.DT_CAP); // 프레임 캡 (F4)
  lastTime = now;

  update(dt);
  draw();
  inputMgr.flush();

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════
// 추가 시각 효과: 존별 환경 이펙트
// ═══════════════════════════════════════════════════════════

// 소행성대 환경: 소행성 폭풍 파티클
function drawZoneEffect_Asteroid(ctx, w, h, camX, camY, gt) {
  for (let i = 0; i < 8; i++) {
    const px = ((i * 317 + gt * 40) % (w + 100)) - 50;
    const py = ((i * 211 + gt * 25) % (h + 100)) - 50;
    const sz = 2 + Math.sin(i * 1.7 + gt) * 1;
    ctx.fillStyle = `rgba(139,105,20,${0.3 + 0.1 * Math.sin(gt * 2 + i)})`;
    ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI * 2); ctx.fill();
  }
}

// 성운 환경: 전자기 교란 글리치
function drawZoneEffect_Nebula(ctx, w, h, camX, camY, gt) {
  if (Math.sin(gt * 3) > 0.85) {
    // 글리치 슬라이스
    const sliceY = (gt * 200) % h;
    const sliceH = 2 + Math.abs(Math.sin(gt * 20)) * 6;
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#7B68EE';
    ctx.fillRect(0, sliceY, w, sliceH);
    ctx.fillStyle = '#FF69B4';
    ctx.fillRect(3, sliceY + 1, w, sliceH - 1);
    ctx.restore();
  }
  // 가스 구름 파티클
  for (let i = 0; i < 5; i++) {
    const px = ((i * 419 - camX * 0.05) % w + w) % w;
    const py = ((i * 283 - camY * 0.03) % h + h) % h;
    const grd = ctx.createRadialGradient(px, py, 0, px, py, 30 + Math.sin(gt + i) * 10);
    grd.addColorStop(0, `rgba(123,104,238,${0.06 + 0.02 * Math.sin(gt * 1.5 + i)})`);
    grd.addColorStop(1, 'rgba(123,104,238,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(px, py, 40, 0, Math.PI * 2); ctx.fill();
  }
}

// 블랙홀 환경: 중력 왜곡 렌즈 효과
function drawZoneEffect_BlackHole(ctx, w, h, camX, camY, gt) {
  // 중심 왜곡 표현 (방사형 선)
  const cx = w / 2, cy = h / 2;
  ctx.save();
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < 12; i++) {
    const a = i * Math.PI / 6 + gt * 0.1;
    const len = 100 + 50 * Math.sin(gt + i);
    ctx.strokeStyle = '#00CED1';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * 30, cy + Math.sin(a) * 30);
    ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
    ctx.stroke();
  }
  ctx.restore();
}

// 빙결 환경: 서리 효과
function drawZoneEffect_Frozen(ctx, w, h, camX, camY, gt) {
  // 화면 가장자리 서리
  const frostW = 30 + 10 * Math.sin(gt * 0.5);
  const grad1 = ctx.createLinearGradient(0, 0, frostW, 0);
  grad1.addColorStop(0, 'rgba(135,206,235,0.15)');
  grad1.addColorStop(1, 'rgba(135,206,235,0)');
  ctx.fillStyle = grad1;
  ctx.fillRect(0, 0, frostW, h);
  const grad2 = ctx.createLinearGradient(w, 0, w - frostW, 0);
  grad2.addColorStop(0, 'rgba(135,206,235,0.15)');
  grad2.addColorStop(1, 'rgba(135,206,235,0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(w - frostW, 0, frostW, h);
  // 눈 파티클
  for (let i = 0; i < 12; i++) {
    const sx = ((i * 173 + gt * 15) % (w + 40)) - 20;
    const sy = ((i * 127 + gt * 30) % (h + 40)) - 20;
    ctx.fillStyle = `rgba(224,255,255,${0.3 + 0.2 * Math.sin(gt + i * 2)})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

// 공허 환경: 차원 균열 이펙트 (Cycle 29 drawDimensionalRift 계승)
function drawZoneEffect_Void(ctx, w, h, camX, camY, gt) {
  // 차원 균열 선
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 4; i++) {
    const startX = (i * 251 + Math.sin(gt * 0.3 + i) * 80) % w;
    const startY = (i * 179 + Math.cos(gt * 0.2 + i) * 60) % h;
    ctx.strokeStyle = i % 2 === 0 ? '#FF00FF' : '#C0C0C0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    for (let j = 1; j <= 5; j++) {
      const nx = startX + Math.cos(gt + i + j * 0.8) * j * 20;
      const ny = startY + Math.sin(gt * 1.3 + i + j * 0.6) * j * 15;
      ctx.lineTo(nx, ny);
    }
    ctx.stroke();
  }
  // 색상 채도 감소 효과 (오버레이)
  const desatAlpha = 0.03 + 0.02 * Math.sin(gt * 0.8);
  ctx.fillStyle = `rgba(128,128,128,${desatAlpha})`;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// 존별 환경 이펙트 디스패처
function drawZoneEnvironmentEffect(ctx, zone, w, h, camX, camY, gt) {
  switch (zone) {
    case 0: drawZoneEffect_Asteroid(ctx, w, h, camX, camY, gt); break;
    case 1: drawZoneEffect_Nebula(ctx, w, h, camX, camY, gt); break;
    case 2: drawZoneEffect_BlackHole(ctx, w, h, camX, camY, gt); break;
    case 3: drawZoneEffect_Frozen(ctx, w, h, camX, camY, gt); break;
    case 4: case 5: drawZoneEffect_Void(ctx, w, h, camX, camY, gt); break;
  }
}

// ═══════════════════════════════════════════════════════════
// 추가: 포탈 렌더링 (섹터 간 이동 포인트)
// ═══════════════════════════════════════════════════════════

function drawPortal(ctx, x, y, active, gt) {
  ctx.save();
  ctx.translate(x, y);
  // 외부 링 회전
  for (let ring = 0; ring < 3; ring++) {
    const r = 20 + ring * 8;
    const alpha = active ? 0.6 - ring * 0.15 : 0.2;
    ctx.strokeStyle = `rgba(0,206,209,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, gt * (1 + ring * 0.3), gt * (1 + ring * 0.3) + Math.PI * 1.5);
    ctx.stroke();
  }
  // 중심 소용돌이
  if (active) {
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
    grd.addColorStop(0, `rgba(0,206,209,${0.5 + 0.2 * Math.sin(gt * 3)})`);
    grd.addColorStop(0.6, 'rgba(123,104,238,0.3)');
    grd.addColorStop(1, 'rgba(0,206,209,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 추가: 화면 쉐이크 유틸리티 + 데미지 인디케이터
// ═══════════════════════════════════════════════════════════

// 방향 데미지 인디케이터 (피격 방향 표시)
function drawDamageIndicator(ctx, shipX, shipY, hitAngle, intensity, w, h) {
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(hitAngle);
  const grad = ctx.createLinearGradient(0, -h * 0.4, 0, -h * 0.5);
  grad.addColorStop(0, `rgba(255,0,0,${intensity * 0.5})`);
  grad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-30, -h * 0.4);
  ctx.lineTo(30, -h * 0.4);
  ctx.lineTo(5, -h * 0.5);
  ctx.lineTo(-5, -h * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// 화면 비네트 효과 (HP 낮을 때)
function drawVignette(ctx, hpRatio, w, h) {
  if (hpRatio > 0.4) return;
  const intensity = (0.4 - hpRatio) * 1.5;
  const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(80,0,0,${Math.min(intensity, 0.4)})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// 에너지 부족 경고 플래시
function drawEnergyWarning(ctx, energyRatio, w, h, gt) {
  if (energyRatio > 0.2) return;
  const flash = Math.sin(gt * 6) > 0.5;
  if (flash) {
    ctx.fillStyle = 'rgba(68,136,255,0.05)';
    ctx.fillRect(0, 0, w, h);
  }
}

// ═══════════════════════════════════════════════════════════
// drawGameWorld 업데이트: 존 환경 이펙트 + 비네트 추가
// ═══════════════════════════════════════════════════════════

// 원래 drawGameWorld를 확장하는 포스트 이펙트
function drawPostEffects(ctx, w, h) {
  // 존 환경 이펙트
  drawZoneEnvironmentEffect(ctx, G.currentZone, w, h, G.camX, G.camY, G.gameTime);
  // HP 비네트
  if (G.ship.alive) {
    drawVignette(ctx, G.ship.hp / G.ship.maxHp, w, h);
    drawEnergyWarning(ctx, G.ship.energy / G.ship.maxEnergy, w, h, G.gameTime);
  }
}

// 게임 시작 (100% Canvas 코드 드로잉, 에셋 없음)
function init() {
  drawLoading(ctx, 1.0, logicalW, logicalH);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();
</script>
