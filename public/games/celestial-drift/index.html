// SeededRNG — Math.random 완전 대체 (F18)
class SeededRNG {
  constructor(seed) { this.seed = seed % 2147483647; if (this.seed <= 0) this.seed += 2147483646; }
  next() { this.seed = (this.seed * 16807) % 2147483647; return (this.seed - 1) / 2147483646; }
  range(lo, hi) { return lo + this.next() * (hi - lo); }
  int(lo, hi) { return Math.floor(this.range(lo, hi + 1)); }
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  chance(p) { return this.next() < p; }
  shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=this.int(0,i);[a[i],a[j]]=[a[j],a[i]];} return a; }
}

// TweenManager — setTimeout 완전 대체 (F4, F13)
class TweenManager {
  constructor() { this._tweens = []; this._pendingAdd = []; this._updating = false; }
  add(obj, props, dur, easing, onComplete) {
    const tw = { obj, props:{}, dur, elapsed:0, easing: easing||'easeOut', onComplete, done:false };
    for (const k in props) tw.props[k] = { from: obj[k], to: props[k] };
    if (this._updating) this._pendingAdd.push(tw); else this._tweens.push(tw);
    return tw;
  }
  // 지연 실행 (setTimeout 대체)
  delay(dur, onComplete) { return this.add({_:0},{_:1},dur,'linear',onComplete); }
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      if (tw.done) { this._tweens.splice(i, 1); continue; }
      tw.elapsed += dt;
      const prog = Math.min(tw.elapsed / tw.dur, 1);
      const ep = this._ease(prog, tw.easing);
      for (const k in tw.props) {
        const p = tw.props[k];
        tw.obj[k] = p.from + (p.to - p.from) * ep;
      }
      if (prog >= 1) { tw.done = true; if (tw.onComplete) tw.onComplete(); }
    }
    this._updating = false;
    if (this._pendingAdd.length) { this._tweens.push(...this._pendingAdd); this._pendingAdd.length = 0; }
  }
  // clearImmediate: 즉시 정리 (F13)
  clearImmediate() { this._tweens.length = 0; this._pendingAdd.length = 0; }
  cancelAll() { this.clearImmediate(); }
  _ease(p, type) {
    switch(type) {
      case 'linear': return p;
      case 'easeIn': return p*p;
      case 'easeOut': return 1-(1-p)*(1-p);
      case 'easeInOut': return p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      case 'elasticOut': return p===0?0:p===1?1:Math.pow(2,-10*p)*Math.sin((p*10-0.75)*((2*Math.PI)/3))+1;
      default: return 1-(1-p)*(1-p);
    }
  }
}

// ObjectPool — GC 방지
class ObjectPool {
  constructor(factory, reset, size) {
    this._factory = factory; this._reset = reset;
    this._pool = []; this._active = [];
    for (let i = 0; i < size; i++) this._pool.push(factory());
  }
  get() {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._factory();
    this._reset(obj); this._active.push(obj); return obj;
  }
  release(obj) {
    const idx = this._active.indexOf(obj);
    if (idx >= 0) { this._active.splice(idx, 1); this._pool.push(obj); }
  }
  releaseAll() { while(this._active.length) { this._pool.push(this._active.pop()); } }
  forEach(fn) { for (let i = this._active.length - 1; i >= 0; i--) fn(this._active[i], i); }
  get active() { return this._active; }
  get count() { return this._active.length; }
}

// SoundManager — Web Audio API
class SoundManager {
  constructor() { this._ctx = null; this._bgmGain = null; this._sfxGain = null; this._bgmOn = true; this._sfxOn = true; this._currentBgm = null; }
  init() {
    if (this._ctx) return;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._bgmGain = this._ctx.createGain(); this._bgmGain.gain.value = 0.3; this._bgmGain.connect(this._ctx.destination);
      this._sfxGain = this._ctx.createGain(); this._sfxGain.gain.value = 0.4; this._sfxGain.connect(this._ctx.destination);
    } catch(e) { /* no audio support */ }
  }
  get ctx() { return this._ctx; }
  toggleBgm() { this._bgmOn=!this._bgmOn; if(this._bgmGain) this._bgmGain.gain.value=this._bgmOn?0.3:0; return this._bgmOn; }
  toggleSfx() { this._sfxOn=!this._sfxOn; if(this._sfxGain) this._sfxGain.gain.value=this._sfxOn?0.4:0; return this._sfxOn; }
  // BGM: 간단한 오실레이터 패드
  playBgm(type) {
    if (!this._ctx) return;
    this.stopBgm();
    const now = this._ctx.currentTime;
    const oscs = [];
    const freqs = type==='title'?[110,165,220]:type==='explore'?[130,196,262]:type==='combat'?[147,220,330]:type==='boss'?[82,123,165,247]:[220,330,440];
    freqs.forEach((f,i)=>{
      const o=this._ctx.createOscillator(); const g=this._ctx.createGain();
      o.type=i%2===0?'sine':'triangle'; o.frequency.value=f;
      g.gain.value=0.08/(i+1); o.connect(g); g.connect(this._bgmGain);
      o.start(now); oscs.push({o,g});
    });
    this._currentBgm = oscs;
  }
  stopBgm() { if(this._currentBgm){this._currentBgm.forEach(({o})=>{try{o.stop();}catch(e){}}); this._currentBgm=null;} }
  // SFX: 단발 효과음
  playSfx(type) {
    if (!this._ctx || !this._sfxOn) return;
    const now = this._ctx.currentTime;
    const o = this._ctx.createOscillator(); const g = this._ctx.createGain();
    o.connect(g); g.connect(this._sfxGain);
    switch(type) {
      case 'laser': o.type='sawtooth'; o.frequency.value=880; g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.08); o.start(now); o.stop(now+0.08); break;
      case 'missile': o.type='square'; o.frequency.value=120; g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2); o.start(now); o.stop(now+0.2); break;
      case 'plasma': o.type='triangle'; o.frequency.value=440; o.frequency.exponentialRampToValueAtTime(220,now+0.15); g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15); o.start(now); o.stop(now+0.15); break;
      case 'explosion': o.type='sawtooth'; o.frequency.value=80; g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3); o.start(now); o.stop(now+0.3); break;
      case 'hit': o.type='square'; o.frequency.value=200; g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.1); o.start(now); o.stop(now+0.1); break;
      case 'shield': o.type='sine'; o.frequency.value=1200; o.frequency.exponentialRampToValueAtTime(600,now+0.15); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15); o.start(now); o.stop(now+0.15); break;
      case 'dash': o.type='sine'; o.frequency.value=600; o.frequency.exponentialRampToValueAtTime(200,now+0.12); g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12); o.start(now); o.stop(now+0.12); break;
      case 'pickup': o.type='sine'; o.frequency.setValueAtTime(523,now); o.frequency.setValueAtTime(659,now+0.06); o.frequency.setValueAtTime(784,now+0.12); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2); o.start(now); o.stop(now+0.2); break;
      case 'bossAlert': o.type='square'; o.frequency.value=100; o.frequency.setValueAtTime(150,now+0.15); o.frequency.setValueAtTime(100,now+0.3); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5); o.start(now); o.stop(now+0.5); break;
      case 'artifact': o.type='sine'; o.frequency.setValueAtTime(880,now); o.frequency.setValueAtTime(1100,now+0.1); o.frequency.setValueAtTime(1320,now+0.2); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35); o.start(now); o.stop(now+0.35); break;
      default: o.type='sine'; o.frequency.value=440; g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.1); o.start(now); o.stop(now+0.1);
    }
  }
}

// InputManager — 키보드+터치 통합
class InputManager {
  constructor() {
    this.keys = {}; this.justPressed = {};
    this.touch = { active:false, joyActive:false, joyX:0, joyY:0, joyCX:0, joyCY:0, joyDX:0, joyDY:0, buttons:{atk:false,skill:false,shield:false}, taps:[], swipe:null };
    this._isMobile = false;
    this._touchIds = {};
  }
  init(canvas) {
    this._canvas = canvas;
    // 키보드
    window.addEventListener('keydown', e => { if(!this.keys[e.code]) this.justPressed[e.code]=true; this.keys[e.code]=true; e.preventDefault(); });
    window.addEventListener('keyup', e => { this.keys[e.code]=false; e.preventDefault(); });
    // 터치
    canvas.addEventListener('touchstart', e => this._onTouchStart(e), {passive:false});
    canvas.addEventListener('touchmove', e => this._onTouchMove(e), {passive:false});
    canvas.addEventListener('touchend', e => this._onTouchEnd(e), {passive:false});
    canvas.addEventListener('touchcancel', e => this._onTouchEnd(e), {passive:false});
    // 마우스 클릭 (게임 내)
    canvas.addEventListener('mousedown', e => { this._onMouseDown(e); });
    canvas.addEventListener('mouseup', e => { this._onMouseUp(e); });
    canvas.addEventListener('mousemove', e => { this._mouseX=e.clientX; this._mouseY=e.clientY; });
    // 마우스 휠: 무기 전환
    canvas.addEventListener('wheel', e => { e.preventDefault(); this.justPressed[e.deltaY<0?'wheelUp':'wheelDown']=true; }, {passive:false});
    // 우클릭 방지
    canvas.addEventListener('contextmenu', e => e.preventDefault());
  }
  _canvasPos(cx, cy) {
    const r = this._canvas.getBoundingClientRect();
    return { x: (cx - r.left) * (this._canvas.width / devicePixelRatio / r.width), y: (cy - r.top) * (this._canvas.height / devicePixelRatio / r.height) };
  }
  _onMouseDown(e) {
    const p = this._canvasPos(e.clientX, e.clientY);
    if (e.button === 0) this.touch.taps.push({x:p.x,y:p.y,time:performance.now()});
    if (e.button === 2) this.justPressed['dash'] = true;
    this._mouseDown = true;
    this._mouseBtn = e.button;
  }
  _onMouseUp(e) { this._mouseDown = false; }
  _onTouchStart(e) {
    e.preventDefault();
    this._isMobile = true;
    const cw = this._canvas.width / devicePixelRatio;
    for (const tc of e.changedTouches) {
      const p = this._canvasPos(tc.clientX, tc.clientY);
      this._touchIds[tc.identifier] = { sx:p.x, sy:p.y, cx:p.x, cy:p.y };
      // 좌측 절반 = 조이스틱
      if (p.x < cw * 0.4) {
        this.touch.joyActive = true;
        this.touch.joyCX = p.x; this.touch.joyCY = p.y;
        this.touch.joyDX = 0; this.touch.joyDY = 0;
        this._touchIds[tc.identifier].type = 'joy';
      } else {
        // 버튼 히트 체크 or 탭
        this._touchIds[tc.identifier].type = 'tap';
        this.touch.taps.push({x:p.x, y:p.y, time:performance.now()});
      }
    }
    this.touch.active = true;
  }
  _onTouchMove(e) {
    e.preventDefault();
    for (const tc of e.changedTouches) {
      const tid = this._touchIds[tc.identifier];
      if (!tid) continue;
      const p = this._canvasPos(tc.clientX, tc.clientY);
      tid.cx = p.x; tid.cy = p.y;
      if (tid.type === 'joy') {
        let dx = p.x - this.touch.joyCX, dy = p.y - this.touch.joyCY;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist > CFG.JOY_RADIUS) { dx = dx/dist*CFG.JOY_RADIUS; dy = dy/dist*CFG.JOY_RADIUS; }
        this.touch.joyDX = dx; this.touch.joyDY = dy;
      }
    }
  }
  _onTouchEnd(e) {
    e.preventDefault();
    for (const tc of e.changedTouches) {
      const tid = this._touchIds[tc.identifier];
      if (!tid) continue;
      if (tid.type === 'joy') {
        this.touch.joyActive = false; this.touch.joyDX = 0; this.touch.joyDY = 0;
      } else if (tid.type === 'tap') {
        // 스와이프 체크
        const dx = tid.cx - tid.sx, dy = tid.cy - tid.sy;
        if (Math.sqrt(dx*dx+dy*dy) > 40) {
          this.touch.swipe = { dx, dy };
        }
      }
      delete this._touchIds[tc.identifier];
    }
    if (Object.keys(this._touchIds).length === 0) this.touch.active = false;
  }
  // 프레임 끝 정리
  flush() { this.justPressed = {}; this.touch.taps = []; this.touch.swipe = null; this.touch.buttons = {atk:false,skill:false,shield:false}; }
  get isMobile() { return this._isMobile || ('ontouchstart' in window); }
}

// 적 생성 팩토리
function createEnemy(type, x, y, zone, rng, diffMul) {
  const zd = ZONES[zone];

    : type === 'cruiser' ? { hp:80, atk:12, speed:60, size:20, score:CFG.SCORE_CRUISER }

}

// ═══════════════════════════════════════════════════════════
// R4: DRAW — 모든 드로잉 함수 (순수 함수, gt 파라미터)
// ═══════════════════════════════════════════════════════════

// 3-레이어 별 필드 초기화
function initStars(rng, count) {
  const stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({ x:rng.range(0,2400), y:rng.range(0,1800), size:rng.range(0.5,2.5), layer:rng.int(0,2), bright:rng.range(0.3,1.0) });
  }
  return stars;
}

// 배경: 3레이어 parallax 별 필드 + 존별 색상
function drawBackground(ctx, camX, camY, zone, stars, w, h, gt) {
  const zd = ZONES[zone] || ZONES[0];
  // 배경색 그라데이션
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, zd.bg);
  grad.addColorStop(1, shiftColor(zd.bg, 0.05));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // 원경 성운 레이어 (parallax, Canvas 드로잉)
  const sx1 = (-camX * 0.1) % w;
  ctx.globalAlpha = 0.12;
  const nebGrad = ctx.createRadialGradient(w/2+sx1, h/2, 0, w/2+sx1, h/2, w*0.6);
  nebGrad.addColorStop(0, zd.pri); nebGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = nebGrad;
  ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 1;
  // 별
  const layerSpeeds = [0.05, 0.15, 0.3];
  stars.forEach(s => {
    const sx = ((s.x - camX * layerSpeeds[s.layer]) % (w+20) + w+20) % (w+20);
    const sy = ((s.y - camY * layerSpeeds[s.layer]) % (h+20) + h+20) % (h+20);
    const twinkle = 0.6 + 0.4 * Math.sin(gt * 2 + s.x);
    ctx.fillStyle = `rgba(255,255,255,${s.bright * twinkle})`;
    ctx.fillRect(sx, sy, s.size, s.size);
  });
  // 근경 더스트 레이어 (parallax, Canvas 드로잉)
  const sx2 = (-camX * 0.25) % w;
  ctx.globalAlpha = 0.08;
  const dustGrad = ctx.createRadialGradient(w*0.3+sx2, h*0.7, 0, w*0.3+sx2, h*0.7, w*0.4);
  dustGrad.addColorStop(0, zd.sec); dustGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = dustGrad;
  ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 1;
}

// 색상 밝기 조절 유틸
function shiftColor(hex, amount) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amount*255)|0},${Math.min(255,g+amount*255)|0},${Math.min(255,b+amount*255)|0})`;
}

// 함선 그리기 (SVG + 폴백)
function drawShip(ctx, x, y, size, angle, thrust, shieldOn, dashing, invuln, gt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  if (invuln > 0 && Math.floor(gt*15)%2===0) { ctx.globalAlpha=0.5; }
  if (dashing) {
    // 대시 잔상
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#00FFCC';
    for (let i=1;i<=3;i++) {
      ctx.fillRect(-size-i*8, -size*0.4, size*1.5, size*0.8);
    }
    ctx.globalAlpha = invuln>0&&Math.floor(gt*15)%2===0?0.5:1;
  }
  // 함선: Canvas 코드 드로잉
  ctx.fillStyle = '#00CED1';
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(-size*0.7, -size*0.6);
  ctx.lineTo(-size*0.4, 0);
  ctx.lineTo(-size*0.7, size*0.6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#00FFCC'; ctx.lineWidth = 1.5; ctx.stroke();
  // 엔진 글로우
  if (thrust > 0) {
    const flicker = 0.7+0.3*Math.sin(gt*30);
    ctx.fillStyle = `rgba(0,255,200,${0.5*flicker})`;
    ctx.beginPath(); ctx.moveTo(-size*0.5,0); ctx.lineTo(-size-thrust*8,-size*0.3*flicker); ctx.lineTo(-size-thrust*8,size*0.3*flicker); ctx.closePath(); ctx.fill();
  }
  // 실드 렌더링
  if (shieldOn) {
    ctx.strokeStyle = `rgba(0,255,204,${0.5+0.3*Math.sin(gt*5)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, size*1.5, 0, Math.PI*2); ctx.stroke();
    // 육각형 패턴
    for (let i=0;i<6;i++) {
      const a = i*Math.PI/3 + gt*0.5;
      ctx.beginPath(); ctx.arc(Math.cos(a)*size*1.2, Math.sin(a)*size*1.2, 3, 0, Math.PI*2);
      ctx.fillStyle = '#00FFCC'; ctx.fill();
    }
  }
  ctx.restore();
}

// 적 그리기
function drawEnemy(ctx, x, y, size, type, hp, maxHp, zone, angle, gt) {
  ctx.save();
  ctx.translate(x, y);
  {
    // 적: Canvas 코드 드로잉
    const zd = ZONES[zone]||ZONES[0];
    ctx.rotate(angle + gt * (type==='mine'?2:0.5));
    if (type === 'drone') {
      ctx.fillStyle = zd.enemy;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size*0.8, size*0.6);
      ctx.lineTo(-size*0.8, size*0.6);
      ctx.closePath();
      ctx.fill();
      // 눈
      ctx.fillStyle = '#FF0000';
      ctx.beginPath(); ctx.arc(0, -size*0.2, 3, 0, Math.PI*2); ctx.fill();
    } else if (type === 'cruiser') {
      ctx.fillStyle = zd.enemy;
      ctx.fillRect(-size, -size*0.5, size*2, size);
      ctx.fillStyle = shiftColor(zd.enemy, 0.2);
      ctx.fillRect(-size*0.3, -size*0.7, size*0.6, size*1.4);
      // 포대
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(size*0.6, -size*0.3, size*0.5, 4);
      ctx.fillRect(size*0.6, size*0.15, size*0.5, 4);
    } else {
      // mine
      ctx.fillStyle = zd.enemy;
      ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();
      // 스파이크
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4;
        ctx.strokeStyle='#FF4444'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size);
        ctx.lineTo(Math.cos(a)*(size+6),Math.sin(a)*(size+6)); ctx.stroke();
      }
      // 경고등
      const blink = Math.sin(gt*8)>0?'#FF0000':'#880000';
      ctx.fillStyle=blink; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    }
    ctx.rotate(-(angle + gt * (type==='mine'?2:0.5)));
  }
  // HP 바
  if (hp < maxHp) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-size, -size-8, size*2, 4);
    ctx.fillStyle = hp/maxHp > 0.5 ? '#44FF44' : hp/maxHp > 0.25 ? '#FFAA00' : '#FF4444';
    ctx.fillRect(-size, -size-8, size*2*(hp/maxHp), 4);
  }
  ctx.restore();
}

// 보스 그리기
function drawBoss(ctx, x, y, bossData, gt) {
  const { size, zone, phase, hp, maxHp, phaseTransitioning, angle } = bossData;
  const zd = ZONES[zone];
  ctx.save();
  ctx.translate(x, y);
  // 페이즈 전환 이펙트
  if (phaseTransitioning) {
    const pulse = Math.sin(gt*15)*10;
    ctx.shadowColor = zd.pri; ctx.shadowBlur = 20+pulse;
  }
  ctx.rotate(angle);
  // 존별 보스 형태
  switch(zone) {
    case 0: // Rock Titan — 거대 소행성
      drawBossRock(ctx, size, phase, zd, gt); break;
    case 1: // Storm Weaver — 가스 촉수
      drawBossStorm(ctx, size, phase, zd, gt); break;
    case 2: // Gravity Maw — 블랙홀
      drawBossGravity(ctx, size, phase, zd, gt); break;
    case 3: // Crystal Warden — 빙결
      drawBossCrystal(ctx, size, phase, zd, gt); break;
    case 4: // Null Entity — 기하학적
      drawBossNull(ctx, size, phase, zd, gt); break;
    case 5: // Void Sentinel — 대형
      drawBossVoid(ctx, size, phase, zd, gt); break;
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // HP 바 (보스 위)
  const barW = size*3, barH = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x-barW/2, y-size-20, barW, barH);
  ctx.fillStyle = hp/maxHp>0.66?zd.pri:hp/maxHp>0.33?'#FFAA00':'#FF4444';
  ctx.fillRect(x-barW/2, y-size-20, barW*(hp/maxHp), barH);
  ctx.strokeStyle = zd.sec; ctx.lineWidth=1;
  ctx.strokeRect(x-barW/2, y-size-20, barW, barH);
}

function drawBossRock(ctx, size, phase, zd, gt) {
  // 불규칙 다각형 소행성
  const verts = 8;
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  for(let i=0;i<verts;i++){
    const a=i*Math.PI*2/verts;
    const r=size*(0.8+0.2*Math.sin(i*3.7+phase));
    if(i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=zd.pri; ctx.lineWidth=2; ctx.stroke();
  // 코어 발광
  const glow = ctx.createRadialGradient(0,0,0,0,0,size*0.4);
  glow.addColorStop(0, `rgba(232,160,76,${0.5+0.3*Math.sin(gt*3)})`);
  glow.addColorStop(1, 'rgba(232,160,76,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,size*0.4,0,Math.PI*2); ctx.fill();
  // 균열
  if(phase>=2){
    ctx.strokeStyle='#FF4444'; ctx.lineWidth=2;
    for(let i=0;i<3;i++){
      const a=i*Math.PI*2/3+gt*0.2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*size*0.8,Math.sin(a)*size*0.8); ctx.stroke();
    }
  }
}

function drawBossStorm(ctx, size, phase, zd, gt) {
  // 가스 구름 + 촉수
  const glow = ctx.createRadialGradient(0,0,size*0.2,0,0,size);
  glow.addColorStop(0, zd.pri); glow.addColorStop(0.5, `rgba(123,104,238,0.4)`); glow.addColorStop(1, 'rgba(123,104,238,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();
  // 촉수
  const tentacles = 4 + phase;
  for(let i=0;i<tentacles;i++){
    const a=i*Math.PI*2/tentacles + gt*0.3;
    ctx.strokeStyle=zd.sec; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*size*0.3,Math.sin(a)*size*0.3);
    const cx1=Math.cos(a+0.3)*size*0.8, cy1=Math.sin(a+0.3)*size*0.8;
    const ex=Math.cos(a)*size*(1.2+0.2*Math.sin(gt*2+i)), ey=Math.sin(a)*size*(1.2+0.2*Math.sin(gt*2+i));
    ctx.quadraticCurveTo(cx1,cy1,ex,ey); ctx.stroke();
  }
  // 번개 (phase 2+)
  if(phase>=2){
    ctx.strokeStyle='#FFFFFF'; ctx.lineWidth=1.5; ctx.globalAlpha=0.7+0.3*Math.sin(gt*20);
    for(let i=0;i<2;i++){
      const a=gt*2+i*Math.PI;
      ctx.beginPath(); ctx.moveTo(0,0);
      let bx=0,by=0;
      for(let j=0;j<4;j++){
        bx+=Math.cos(a+Math.sin(gt*10+j)*0.5)*size*0.3;
        by+=Math.sin(a+Math.cos(gt*10+j)*0.5)*size*0.3;
        ctx.lineTo(bx,by);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

function drawBossGravity(ctx, size, phase, zd, gt) {
  // 이벤트 호라이즌
  const glow=ctx.createRadialGradient(0,0,0,0,0,size);
  glow.addColorStop(0,'#000'); glow.addColorStop(0.5,'#050510'); glow.addColorStop(0.8,zd.pri); glow.addColorStop(1,'rgba(0,206,209,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();
  // 강착원반
  ctx.strokeStyle=zd.sec; ctx.lineWidth=3;
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6+gt;
    const r=size*(0.6+0.3*Math.sin(a*2));
    ctx.beginPath(); ctx.arc(0,0,r,a,a+0.3); ctx.stroke();
  }
  // 중심 발광
  ctx.fillStyle=`rgba(0,206,209,${0.3+0.2*Math.sin(gt*4)})`;
  ctx.beginPath(); ctx.arc(0,0,size*0.15,0,Math.PI*2); ctx.fill();
}

function drawBossCrystal(ctx, size, phase, zd, gt) {
  // 육각형 결정
  ctx.fillStyle=zd.pri;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6; if(i===0) ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size); else ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);}
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=zd.sec; ctx.lineWidth=2; ctx.stroke();
  // 반사광
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(-size*0.2,-size*0.6); ctx.lineTo(size*0.1,-size*0.3); ctx.lineTo(-size*0.1,-size*0.1); ctx.closePath(); ctx.fill();
  // 레이저 눈 (phase 2+)
  if(phase>=2){
    ctx.fillStyle=`rgba(255,0,0,${0.5+0.5*Math.sin(gt*6)})`;
    ctx.beginPath(); ctx.arc(-size*0.15,-size*0.1,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(size*0.15,-size*0.1,4,0,Math.PI*2); ctx.fill();
  }
}

function drawBossNull(ctx, size, phase, zd, gt) {
  // 형태 변환: 삼각형 → 육각형
  const sides = phase <= 1 ? 3 : phase <= 2 ? 4 : 6;
  ctx.fillStyle = zd.pri;
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=i*Math.PI*2/sides+gt*0.2;
    const r=size*(0.9+0.1*Math.sin(gt*3+i));
    if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=zd.sec; ctx.lineWidth=2; ctx.stroke();
  // 차원 균열 내부
  ctx.fillStyle=`rgba(255,0,255,${0.2+0.1*Math.sin(gt*5)})`;
  ctx.beginPath(); ctx.arc(0,0,size*0.3,0,Math.PI*2); ctx.fill();
}

function drawBossVoid(ctx, size, phase, zd, gt) {
  // 대형 기하학적 형태 — 외부 링 + 코어
  // 외부 회전링
  for(let ring=0;ring<3;ring++){
    ctx.strokeStyle=`rgba(255,215,0,${0.3+ring*0.15})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(0,0,size*(0.6+ring*0.2),gt+ring,gt+ring+Math.PI*1.5);
    ctx.stroke();
  }
  // 중심 코어 — 오각형
  ctx.fillStyle=zd.pri;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2+gt*0.3;
    const r=size*0.5;
    if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2; ctx.stroke();
  // 눈
  ctx.fillStyle=`rgba(255,0,0,${0.5+0.5*Math.sin(gt*4)})`;
  ctx.beginPath(); ctx.arc(0,-size*0.1,6+Math.sin(gt*3)*2,0,Math.PI*2); ctx.fill();
  // 에너지 광선 (phase 3+)
  if(phase>=3){
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2+gt;
      ctx.strokeStyle=`rgba(255,0,255,${0.4+0.3*Math.sin(gt*8+i)})`;
      ctx.lineWidth=3; ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*size*2,Math.sin(a)*size*2);
      ctx.stroke();
    }
  }
}

// 발사체 그리기
function drawProjectile(ctx, x, y, type, angle, gt) {
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  const wep = WEAPONS[type];
  ctx.fillStyle = wep.color;
  if (type===0) { // 레이저 — 얇은 빔
    ctx.fillRect(0,-1.5,12,3);
    ctx.shadowColor=wep.color; ctx.shadowBlur=4;
    ctx.fillRect(0,-1,10,2);
    ctx.shadowBlur=0;
  } else if (type===1) { // 미사일
    ctx.fillRect(-4,-2,8,4);
    ctx.fillStyle='#FF8844';
    ctx.fillRect(-8,-1.5,5,3);
  } else { // 플라즈마
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(170,68,255,${0.4+0.3*Math.sin(gt*15)})`;
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// 적 발사체
function drawEnemyBullet(ctx, x, y, size, color, gt) {
  ctx.fillStyle = color || '#FF4444';
  ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(255,100,100,${0.3+0.2*Math.sin(gt*10)})`;
  ctx.beginPath(); ctx.arc(x,y,size*1.5,0,Math.PI*2); ctx.fill();
}

// 파티클 그리기
function drawParticles(ctx, particles, gt) {
  particles.forEach(p => {
    if (p.life <= 0) return;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// 점수 팝업 그리기
function drawScorePopups(ctx, popups, gt) {
  popups.forEach(p => {
    if (p.life <= 0) return;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color || '#FFD700';
    ctx.font = `bold ${12+p.size}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  });
}

// 자원 아이템 그리기
function drawResource(ctx, x, y, type, gt) {
  const pulse = 0.8+0.2*Math.sin(gt*4);
  if (type === 'crystal') {
    ctx.fillStyle = `rgba(255,68,255,${pulse})`;
    ctx.beginPath();
    ctx.moveTo(x,y-8); ctx.lineTo(x+6,y); ctx.lineTo(x,y+8); ctx.lineTo(x-6,y);
    ctx.closePath(); ctx.fill();
  } else if (type === 'energy') {
    // 에너지: 파란 원 + 글로우
    ctx.fillStyle = `rgba(68,136,255,${pulse})`;
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(68,136,255,${pulse*0.3})`;
    ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill();
  } else { // data
    ctx.fillStyle = `rgba(0,255,135,${pulse})`;
    ctx.fillRect(x-4, y-5, 8, 10);
    ctx.fillStyle = '#000';
    ctx.fillRect(x-2, y-3, 4, 2);
    ctx.fillRect(x-2, y+1, 4, 2);
  }
}

// 소행성 그리기
function drawAsteroid(ctx, x, y, size, angle, gt) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle = '#555566';
  ctx.beginPath();
  for(let i=0;i<7;i++){
    const a=i*Math.PI*2/7;
    const r=size*(0.7+0.3*Math.sin(i*2.3));
    if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#777788'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

// HUD 그리기
function drawHUD(ctx, ship, score, wave, maxWaves, zone, sector, weaponIdx, crystals, artifacts, combo, w, h, gt) {
  const pad = 10;
  // HP 바 — 하트 아이콘 (Canvas path)
  ctx.save();
  ctx.fillStyle = '#44FF44';
  ctx.beginPath();
  const hx = pad+12, hy = pad+10;
  ctx.moveTo(hx, hy+4);
  ctx.bezierCurveTo(hx, hy, hx-7, hy, hx-7, hy+4);
  ctx.bezierCurveTo(hx-7, hy+8, hx, hy+12, hx, hy+14);
  ctx.bezierCurveTo(hx, hy+12, hx+7, hy+8, hx+7, hy+4);
  ctx.bezierCurveTo(hx+7, hy, hx, hy, hx, hy+4);
  ctx.fill();
  ctx.restore();
  const hpW = 120, hpH = 12;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(pad+28, pad+6, hpW, hpH);
  const hpRatio = ship.hp / ship.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#44FF44' : hpRatio > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillRect(pad+28, pad+6, hpW*hpRatio, hpH);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.strokeRect(pad+28, pad+6, hpW, hpH);
  ctx.fillStyle='#FFF'; ctx.font='10px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(ship.hp)}/${ship.maxHp}`, pad+28+hpW/2, pad+15);

  // 에너지 바
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(pad+28, pad+24, hpW, 8);
  ctx.fillStyle = '#4488FF'; ctx.fillRect(pad+28, pad+24, hpW*(ship.energy/ship.maxEnergy), 8);

  // 실드 인디케이터
  ctx.fillStyle='#00FFCC'; ctx.font='11px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='left';
  ctx.fillText(`🛡${ship.shieldCharges}`, pad+28+hpW+8, pad+16);

  // 점수 — 별 아이콘 (Canvas path)
  ctx.save();
  ctx.fillStyle = '#FFD700';
  const starX = w-pad-140, starY = pad+10;
  ctx.beginPath();
  for (let si=0;si<5;si++) {
    const outerA = si*Math.PI*2/5 - Math.PI/2;
    const innerA = outerA + Math.PI/5;
    ctx.lineTo(starX+Math.cos(outerA)*8, starY+Math.sin(outerA)*8);
    ctx.lineTo(starX+Math.cos(innerA)*4, starY+Math.sin(innerA)*4);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='right';
  ctx.fillText(score.toLocaleString(), w-pad, pad+18);

  // 콤보
  if (combo > 1) {
    ctx.fillStyle = `rgba(255,215,0,${0.7+0.3*Math.sin(gt*5)})`;
    ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(`×${combo} COMBO`, w-pad, pad+36);
  }

  // 존/섹터/웨이브 정보
  ctx.fillStyle='#8080A0'; ctx.font='12px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='left';
  const zn = ZONES[zone];
  ctx.fillText(`${zn?zn.name:''} ${sector+1}-${wave+1}/${maxWaves}`, pad, h-pad-4);

  // 무기 인디케이터 (하단 좌측)
  for(let i=0;i<3;i++){
    const bx=pad+i*40, by=h-pad-30;
    ctx.fillStyle = i===weaponIdx ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(bx,by,36,22);
    ctx.fillStyle = WEAPONS[i].color; ctx.font='10px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.fillText(WEAPONS[i].name, bx+18, by+15);
    if(i===weaponIdx){ctx.strokeStyle='#FFF'; ctx.lineWidth=1; ctx.strokeRect(bx,by,36,22);}
  }

  // 대시 쿨다운
  if (ship.dashCd > 0) {
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='left';
    ctx.fillText(`DASH ${ship.dashCd.toFixed(1)}s`, pad+130, h-pad-14);
  }

  // 아티팩트 슬롯 (우측)
  for(let i=0;i<5;i++){
    const ax=w-pad-28, ay=60+i*30;
    ctx.fillStyle = i<artifacts.length ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(ax,ay,24,24);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.strokeRect(ax,ay,24,24);
    if (i<artifacts.length) {
      const art=artifacts[i];
      ctx.fillStyle=art.grade==='epic'?'#FF44FF':art.grade==='rare'?'#4488FF':'#AAAAAA';
      ctx.font='8px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText(art.id, ax+12, ay+15);
    }
  }

  // 크리스탈
  ctx.fillStyle='#FF44FF'; ctx.font='12px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='right';
  ctx.fillText(`💎${crystals}`, w-pad, h-pad-4);
}

// 모바일 컨트롤 그리기
function drawMobileControls(ctx, touchState, shipAlive, w, h, gt) {
  // 가상 조이스틱 (좌측 하단)
  const jx = 80, jy = h - 100;
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(jx, jy, CFG.JOY_RADIUS, 0, Math.PI*2); ctx.stroke();
  // 조이스틱 핸들
  const hx = jx + touchState.joyDX, hy = jy + touchState.joyDY;
  ctx.fillStyle = 'rgba(0,206,209,0.6)';
  ctx.beginPath(); ctx.arc(hx, hy, 20, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // 우측 버튼들 (공격/스킬/실드)
  const btnX = w - 70;
  const btns = [
    { y: h-70, label:'ATK', color:'rgba(255,68,68,0.45)', icon:'⚔' },
    { y: h-135, label:'SKL', color:'rgba(68,136,255,0.45)', icon:'✦' },
    { y: h-200, label:'SLD', color:'rgba(0,255,135,0.45)', icon:'🛡' },
  ];
  btns.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(btnX, b.y, CFG.BTN_SIZE/2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(btnX, b.y, CFG.BTN_SIZE/2, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#FFF'; ctx.font = '14px "Segoe UI",system-ui,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(b.icon, btnX, b.y+5);
  });

  // 무기 슬롯 (좌측 상단)
  for(let i=0;i<3;i++){
    const sx=10+i*52, sy=44;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(sx,sy,48,28);
    ctx.fillStyle = WEAPONS[i].color; ctx.font='10px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.fillText(WEAPONS[i].name, sx+24, sy+18);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.strokeRect(sx,sy,48,28);
  }
}

// 타이틀 화면
function drawTitle(ctx, w, h, alpha, glitchAmt, gt) {
  // 어두운 오버레이
  ctx.fillStyle = `rgba(10,10,26,${0.85})`;
  ctx.fillRect(0,0,w,h);

  // 시그니처 이펙트: 홀로그래픽 스캔라인
  for(let i=0;i<h;i+=3){
    ctx.fillStyle=`rgba(0,206,209,${0.015+0.01*Math.sin(gt*2+i*0.05)})`;
    ctx.fillRect(0,i,w,1);
  }

  // 글리치 이펙트
  const glitch = glitchAmt * Math.sin(gt*30);
  const titleY = h*0.32;

  // 게임 제목 — 대형 텍스트
  ctx.save();
  if (Math.abs(glitch)>0.3) {
    // 글리치 슬라이스
    ctx.fillStyle='rgba(255,0,100,0.3)';
    ctx.font=`bold ${Math.min(w*0.09,56)}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign='center';
    ctx.fillText('CELESTIAL DRIFT', w/2+glitch*5, titleY);
    ctx.fillStyle='rgba(0,255,200,0.3)';
    ctx.fillText('CELESTIAL DRIFT', w/2-glitch*5, titleY+2);
  }
  ctx.fillStyle='#E0E0F0';
  ctx.font=`bold ${Math.min(w*0.09,56)}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign='center';
  ctx.shadowColor='#00CED1'; ctx.shadowBlur=15+5*Math.sin(gt*2);
  ctx.fillText('CELESTIAL DRIFT', w/2, titleY);
  ctx.shadowBlur=0;
  ctx.restore();

  // 부제
  ctx.fillStyle='#7B68EE'; ctx.font=`${Math.min(w*0.04,22)}px 'Segoe UI',system-ui,sans-serif`; ctx.textAlign='center';
  ctx.fillText('천 체  표 류', w/2, titleY+40);

  // 함선 일러스트 (Canvas 드로잉)
  {
    const shipY = h*0.52;
    const bob = Math.sin(gt*1.5)*8;
    ctx.save();
    ctx.translate(w/2, shipY+bob);
    ctx.globalAlpha = 0.9;
    // 엔진 글로우
    ctx.fillStyle=`rgba(0,206,209,${0.3+0.2*Math.sin(gt*4)})`;
    ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.fill();
    // 함선 형태
    const sz = 28;
    ctx.fillStyle = '#00CED1';
    ctx.beginPath();
    ctx.moveTo(sz, 0); ctx.lineTo(-sz*0.7, -sz*0.6); ctx.lineTo(-sz*0.4, 0); ctx.lineTo(-sz*0.7, sz*0.6);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#00FFCC'; ctx.lineWidth = 2; ctx.stroke();
    // 엔진 불꽃
    const flicker = 0.7+0.3*Math.sin(gt*12);
    ctx.fillStyle = `rgba(0,255,200,${0.5*flicker})`;
    ctx.beginPath(); ctx.moveTo(-sz*0.5,0); ctx.lineTo(-sz*1.3,-sz*0.25*flicker); ctx.lineTo(-sz*1.3,sz*0.25*flicker); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // 시작 안내
  const blink = Math.sin(gt*3) > -0.3;
  if (blink) {
    ctx.fillStyle='#00CED1'; ctx.font=`${Math.min(w*0.035,18)}px 'Segoe UI',system-ui,sans-serif`;

  // 하단 정보
  ctx.fillStyle='#505070'; ctx.font=`11px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillText('InfiniTriX Cycle #30 — 우주 서바이벌 액션 로그라이트', w/2, h-20);
}

// 섹터 선택 맵
function drawSectorSelect(ctx, currentZone, bossesDefeated, w, h, lang, gt) {
  ctx.fillStyle='rgba(10,10,26,0.95)'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#E0E0F0'; ctx.font=`bold ${Math.min(w*0.05,28)}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText(L('sectorSelect',lang), w/2, 40);
  // 5존 + 히든 노드
  const zones = 6;
  for(let i=0;i<zones;i++){
    if(i===5 && !bossesDefeated.slice(0,5).every(Boolean)) continue; // 히든 잠김
    const nx=w*0.15+i*(w*0.7/(zones-1));
    const ny=h*0.5+Math.sin(i*0.8)*30;
    const zd=ZONES[i];
    const active=i<=currentZone;
    const cleared=bossesDefeated[i];
    // 연결선
    if(i>0){
      const px=w*0.15+(i-1)*(w*0.7/(zones-1));
      const py=h*0.5+Math.sin((i-1)*0.8)*30;
      ctx.strokeStyle=active?zd.pri:'#333';
      ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(nx,ny); ctx.stroke();
    }
    // 노드
    ctx.fillStyle = cleared ? '#44FF44' : active ? zd.pri : '#333';
    ctx.beginPath(); ctx.arc(nx,ny,18,0,Math.PI*2); ctx.fill();
    if(i===currentZone){
      ctx.strokeStyle='#FFF'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(nx,ny,22,0,Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle='#FFF'; ctx.font=`10px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillText(i+1, nx, ny+4);
    ctx.fillStyle='#8080A0'; ctx.font=`10px 'Segoe UI',system-ui,sans-serif`;

// 텍스트 줄바꿈 유틸
function wrapText(ctx, text, x, y, maxW, lineH) {
  const chars=text.split('');
  let line='';
  let ly=y;
  chars.forEach(c=>{
    const test=line+c;
    if(ctx.measureText(test).width>maxW){
      ctx.fillText(line,x,ly); ly+=lineH; line=c;
    } else { line=test; }
  });
  if(line) ctx.fillText(line,x,ly);
}

// ═══════════════════════════════════════════════════════════
// R5: COMBAT — 무기, 충돌, 데미지
// ═══════════════════════════════════════════════════════════

// 원형 충돌 감지 (F16: 단일 함수)
function hitTest(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return dx*dx + dy*dy < (ar + br) * (ar + br);
}

// 무기 발사
function fireWeapon(projPool, ship, weaponIdx, aimAngle, bonuses, rng) {
  const wep = WEAPONS[weaponIdx];
  const energyCost = wep.energy;
  if (ship.energy < energyCost) return false;
  if (ship.fireTimer > 0) return false;
  ship.energy -= energyCost;
  ship.fireTimer = wep.rate * (1 - (bonuses.fireRate||0));
  const p = projPool.get();
  p.x = ship.x + Math.cos(aimAngle) * 20;
  p.y = ship.y + Math.sin(aimAngle) * 20;
  p.vx = Math.cos(aimAngle) * wep.speed * (1 + (bonuses.projSpeed||0));
  p.vy = Math.sin(aimAngle) * wep.speed * (1 + (bonuses.projSpeed||0));
  p.dmg = wep.dmg * (1 + (bonuses.dmg||0));
  p.type = weaponIdx;
  p.pierce = wep.pierce + (bonuses.pierce||0);
  p.alive = true;
  p.life = 3;
  p.angle = aimAngle;
  return true;
}

// 데미지 적용 (판정 먼저 저장 나중에: F8)
function applyDamageToEnemy(enemy, dmg, isCrit, particles, rng) {
  enemy.hp -= dmg;
  // 히트 이펙트 파티클
  spawnHitParticles(particles, enemy.x, enemy.y, enemy.color || '#FF4444', rng, isCrit ? 8 : 4);
  if (enemy.hp <= 0) { enemy.alive = false; }
  return enemy.hp <= 0;
}

function applyDamageToShip(ship, dmg, bonuses, particles, rng) {
  // 차원 앵커 (dodge)
  if (bonuses.dodge > 0 && rng.chance(bonuses.dodge)) return false;
  // 실드 흡수
  if (ship.shieldActive && ship.shieldCharges > 0) {
    ship.shieldCharges--;
    if (ship.shieldCharges <= 0) {
      ship.shieldActive = false;
      ship.shieldCd = CFG.SHIELD_CD;
    }
    return false;
  }
  // 장갑 감소
  const finalDmg = dmg * (1 - Math.min(bonuses.armor||0, 0.5));
  ship.hp -= finalDmg;
  spawnHitParticles(particles, ship.x, ship.y, '#FF4444', rng, 5);
  // 불멸 체크
  if (ship.hp <= 0 && !ship.immortalUsed && bonuses.immortal) {
    ship.hp = 1; ship.immortalUsed = true;
  }
  return ship.hp <= 0;
}

// 파티클 스폰
function spawnHitParticles(particles, x, y, color, rng, count) {
  for(let i=0;i<count;i++){
    const a=rng.range(0,Math.PI*2), spd=rng.range(50,150);
    particles.push({
      x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:rng.range(0.3,0.8), maxLife:0.8, size:rng.range(2,5),
      color, type:'hit',
    });
  }
}

// 폭발 파티클
function spawnExplosion(particles, x, y, color, rng, count) {
  for(let i=0;i<count;i++){
    const a=rng.range(0,Math.PI*2), spd=rng.range(30,200);
    particles.push({
      x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:rng.range(0.5,1.2), maxLife:1.2, size:rng.range(3,8),
      color:i%2===0?color:'#FFFFFF', type:i<3?'hit':'normal',
    });
  }
}

// 점수 팝업 생성
function spawnScorePopup(popups, x, y, text, color) {

// ═══════════════════════════════════════════════════════════
// R6: SECTOR — 프로시저럴 생성, 환경 위험
// ═══════════════════════════════════════════════════════════

// 섹터 생성 (SeededRNG 기반)
function generateSector(rng, zone, sectorInZone, diffPreset) {
  const data = {
    width: 2000, height: 2000,
    enemies: [], hazards: [], resources: [],
    waves: 3 + zone, totalWaves: 3 + zone,
    startX: 1000, startY: 1700,
    portalX: 1000, portalY: 200,
  };
  // 환경 위험물 생성
  const hazardCount = 5 + zone * 3;
  for(let i=0;i<hazardCount;i++){
    const hx=rng.range(100,1900), hy=rng.range(100,1900);
    data.hazards.push({
      x:hx, y:hy, type:['asteroid','nebula','gravity','ice','void'][zone],
      size:rng.range(15,35), angle:rng.range(0,Math.PI*2), rotSpeed:rng.range(-1,1),
      alive:true,
    });
  }
  // 자원 생성
  const resCount = 8 + zone * 2;
  for(let i=0;i<resCount;i++){
    const types=['crystal','crystal','energy','energy','data'];
    data.resources.push({
      x:rng.range(100,1900), y:rng.range(100,1900),
      type:rng.pick(types), collected:false,
    });
  }
  return data;
}

// 적 웨이브 생성
function generateWave(rng, zone, waveIdx, diffPreset, ddaLevel) {
  const enemies = [];
  const baseCount = 3 + zone + waveIdx;
  let count = baseCount + (ddaLevel >= 2 ? CFG.DDA_L2_COUNT : 0);
  if (count < 2) count = 2;
  for(let i=0;i<count;i++){
    const types = zone < 2 ? ['drone','drone','mine'] : ['drone','cruiser','mine'];
    const type = rng.pick(types);
    const angle = rng.range(0, Math.PI*2);
    const dist = rng.range(300, 600);
    const ex = 1000 + Math.cos(angle)*dist;
    const ey = 1000 + Math.sin(angle)*dist;
    enemies.push(createEnemy(type, ex, ey, zone, rng, diffPreset));
  }
  // DDA 적용
  if (ddaLevel >= 1) { enemies.forEach(e => { e.atk *= CFG.DDA_L1_ATK; }); }
  if (ddaLevel >= 2) { enemies.forEach(e => { e.hp *= CFG.DDA_L2_HP; e.maxHp = e.hp; }); }
  if (ddaLevel >= 3) { enemies.forEach(e => { e.hp *= CFG.DDA_L3_HP; e.maxHp = e.hp; e.atk *= CFG.DDA_L3_ATK; }); }
  return enemies;
}

// ═══════════════════════════════════════════════════════════
// R7: ROGUE — 아티팩트, 업그레이드
// ═══════════════════════════════════════════════════════════

// 아티팩트 3택 생성
function generateArtifactChoices(rng, currentArtifacts, luckBonus) {
  const available = ARTIFACTS.filter(a => !currentArtifacts.find(ca => ca.id === a.id));
  if (available.length === 0) return [];
  const choices = [];
  const shuffled = rng.shuffle(available);
  for(let i=0;i<Math.min(3,shuffled.length);i++){
    let art = {...shuffled[i]};
    // 행운의 코인: 등급 상향 확률
    if (luckBonus > 0 && rng.chance(luckBonus)) {
      if (art.grade==='common') art.grade='rare';
      else if (art.grade==='rare') art.grade='epic';
    }
    choices.push(art);
  }
  return choices;
}

// 아티팩트 적용 (캡 검증 포함)
function applyArtifact(bonuses, artifact) {
  const stat = artifact.stat;
  const val = artifact.val;
  if (artifact.cap !== undefined) {
    bonuses[stat] = Math.min((bonuses[stat]||0) + val, artifact.cap);
  } else {
    bonuses[stat] = (bonuses[stat]||0) + val;
  }
}

// 업그레이드 보너스 계산
function calcUpgradeBonuses(upgrades) {
  const b = { dmg:0, fireRate:0, crit:0, pierce:0, bossDmg:0, maxHpAdd:0, shieldAdd:0, evasion:0, autoHeal:0, immortal:false, sensorRange:0, resScan:false, dashDist:0, scavenger:0, dimKey:false };
  if(upgrades.attack[0]) b.dmg+=0.1;
  if(upgrades.attack[1]) b.fireRate+=0.15;
  if(upgrades.attack[2]) b.crit+=CFG.CRIT_L3;
  if(upgrades.attack[3]) b.pierce+=1;
  if(upgrades.attack[4]) b.bossDmg+=0.25;
  if(upgrades.defense[0]) b.maxHpAdd+=15;
  if(upgrades.defense[1]) b.shieldAdd+=1;
  if(upgrades.defense[2]) b.evasion+=0.2;
  if(upgrades.defense[3]) b.autoHeal=3;
  if(upgrades.defense[4]) b.immortal=true;
  if(upgrades.explore[0]) b.sensorRange+=0.3;
  if(upgrades.explore[1]) b.resScan=true;
  if(upgrades.explore[2]) b.dashDist+=0.3;
  if(upgrades.explore[3]) b.scavenger+=0.4;
  if(upgrades.explore[4]) b.dimKey=true;
  return b;
}

// R8: STATE — 상태 머신, 전환, 가드 플래그
// ═══════════════════════════════════════════════════════════

// 상태 전환 (F6: beginTransition + STATE_PRIORITY)
function beginTransition(tweenMgr, stateObj, newState, duration, onMid, onComplete) {
  if (stateObj.transitioning) return false;
  // 우선순위 체크
  if (STATE_PRIORITY[newState] !== undefined && STATE_PRIORITY[stateObj.state] !== undefined) {
    if (newState === 'GAME_OVER' || newState === 'VICTORY') { /* 항상 허용 */ }
    else if (stateObj.state === 'GAME_OVER' && !RESTART_ALLOWED.includes(stateObj.state)) return false;
  }
  stateObj.transitioning = true;
  stateObj.transAlpha = 0;
  // 페이드 아웃
  tweenMgr.add(stateObj, {transAlpha:1}, duration*0.5, 'easeIn', () => {
    stateObj.prevState = stateObj.state;
    stateObj.state = newState;
    if (onMid) onMid();
    // 페이드 인
    tweenMgr.add(stateObj, {transAlpha:0}, duration*0.5, 'easeOut', () => {
      stateObj.transitioning = false;
      if (onComplete) onComplete();
    });
  });
  return true;
}

// 즉시 전환 (PAUSE 복귀 등)
function setState(stateObj, newState) {
  stateObj.prevState = stateObj.state;
  stateObj.state = newState;
}

// 새 런 시작
function startNewRun() {
