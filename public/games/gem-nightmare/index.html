  const topGrad = ctx.createLinearGradient(0, 0, 0, 50);
  topGrad.addColorStop(0, 'rgba(26,26,46,0.9)');
  topGrad.addColorStop(1, 'rgba(26,26,46,0)');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, w, 50);
  UI.text(ctx, getText('title'), w / 2, 25, { size: 16, color: '#FFD700', bold: true });
  UI.text(ctx, `★ ${gSaveData.totalStars}`, w - 50, 25, { size: 14, color: '#FFD700' });
}

function drawCrown(ctx, cx, cy, r) {
  ctx.moveTo(cx - r, cy + r * 0.5);
  ctx.lineTo(cx - r * 0.6, cy - r * 0.3);
  ctx.lineTo(cx - r * 0.2, cy + r * 0.1);
  ctx.lineTo(cx, cy - r * 0.6);
  ctx.lineTo(cx + r * 0.2, cy + r * 0.1);
  ctx.lineTo(cx + r * 0.6, cy - r * 0.3);
  ctx.lineTo(cx + r, cy + r * 0.5);
  ctx.closePath();
}

// --- 레벨 인트로 ---
function renderLevelIntro(ctx, w, h) {
  renderPlayScreen(ctx, w, h);
  // 오버레이
  ctx.fillStyle = `rgba(0,0,0,${0.6 - gClearAnimTimer / 3000})`;
  ctx.fillRect(0, 0, w, h);
  const lvl = gCurrentLevel;
  if (!lvl) return;
  const lang = gSaveData.settings.lang || 'ko';
  const worldName = lang === 'ko' ? WORLD_NAMES[lvl.world] : WORLD_NAMES_EN[lvl.world];
  UI.text(ctx, worldName, w / 2, h * 0.35, { size: Layout.fontSize(18, w, h, 12, 24), color: '#FFD700', bold: true });
  UI.text(ctx, `${getText('level')} ${lvl.id}`, w / 2, h * 0.45, { size: Layout.fontSize(28, w, h, 18, 36), color: '#fff', bold: true, glow: '#FFD700' });
  // 목표 표시
  renderGoalInfo(ctx, w / 2, h * 0.58, lvl.goal, 16);
}

// --- 게임 플레이 화면 ---
function renderPlayScreen(ctx, w, h) {
  // 배경
  if (gCurrentLevel) {
    const bgKey = WORLD_BG_KEYS[gCurrentLevel.world];
    if (assets.sprites[bgKey]) {
      ctx.globalAlpha = 0.3;
      ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
      ctx.globalAlpha = 1;
    }
  }

  // 보드 배경
  const pad = 4;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(gBoardX - pad, gBoardY - pad, gBoardW + pad * 2, gBoardH + pad * 2, 8);
    ctx.fill();
  } else {
    ctx.fillRect(gBoardX - pad, gBoardY - pad, gBoardW + pad * 2, gBoardH + pad * 2);
  }

  // 보드 셀 배경 (체스보드)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = gBoardX + c * gCellSize, y = gBoardY + r * gCellSize;
      const isDark = (r + c) % 2 === 0;
      ctx.fillStyle = gSaveData.settings.colorBlindMode ?
        (isDark ? '#1a1a2e' : '#222244') :
        (isDark ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.1)');
      ctx.fillRect(x, y, gCellSize, gCellSize);
    }
  }

  // 보석 + 장애물 렌더링
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (!cell) continue;
      const cx = cell.x + gCellSize / 2;
      const cy = cell.y + gCellSize / 2;
      const size = gCellSize - 4;

      // 젤리 (보석 아래)
      if (cell.jelly > 0) {
        const jellyKey = cell.jelly === 2 ? 'obstacleJelly-2' : 'obstacleJelly-1';
        drawAssetOrFallback(ctx, jellyKey, cell.x + 2, cell.y + 2, size, size,
          cell.jelly === 2 ? '#FF69B4' : '#FFB6C1');
      }

      // 보석
      if (cell.type && !cell.curtainHidden) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(cell.scale, cell.scale);
        ctx.globalAlpha = cell.alpha;
        drawGem(ctx, -size / 2, -size / 2, size, size, cell.type, cell.special);
        // 색맹 모드 마커
        if (gSaveData.settings.colorBlindMode && cell.type) {
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.font = `bold ${size * 0.4}px 'Segoe UI', system-ui, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.strokeText(GEM_SHAPES[cell.type] || '?', 0, 0);
          ctx.fillText(GEM_SHAPES[cell.type] || '?', 0, 0);
        }
        ctx.restore();
      }

      // 장애물 오버레이
      if (cell.obstacle === OBS.ICE) {
        const iceKey = `obstacleIce-${cell.obsLayer}`;
        ctx.globalAlpha = 0.7;
        drawAssetOrFallback(ctx, iceKey, cell.x + 2, cell.y + 2, size, size, '#ADD8E6');
        ctx.globalAlpha = 1;
      } else if (cell.obstacle === OBS.CHAIN) {
        drawAssetOrFallback(ctx, 'obstacleChain', cell.x + 2, cell.y + 2, size, size, '#888');
      } else if (cell.obstacle === OBS.WOOD) {
        const woodKey = `obstacleWood-${cell.obsLayer}`;
        drawAssetOrFallback(ctx, woodKey, cell.x + 2, cell.y + 2, size, size, '#8B4513');
      } else if (cell.obstacle === OBS.CURTAIN) {
        drawAssetOrFallback(ctx, 'obstacleCurtain', cell.x + 2, cell.y + 2, size, size, '#9370DB');
      } else if (cell.obstacle === OBS.POISON) {
        drawAssetOrFallback(ctx, 'obstaclePoison', cell.x + 2, cell.y + 2, size, size, '#800080');
      } else if (cell.obstacle === OBS.STONE) {
        drawAssetOrFallback(ctx, 'obstacleStone', cell.x + 2, cell.y + 2, size, size, '#696969');
      }

      // 선택 하이라이트
      if (gSelectedCell && gSelectedCell.r === r && gSelectedCell.c === c) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.strokeRect(cell.x + 1, cell.y + 1, gCellSize - 2, gCellSize - 2);
      }

      // 키보드 커서
      if (gState === STATE.PLAY && gCursorR === r && gCursorC === c) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.strokeRect(cell.x, cell.y, gCellSize, gCellSize);
        ctx.setLineDash([]);
      }
    }
  }

  // 힌트 하이라이트
  if (gHintCells && gState === STATE.PLAY) {
    const blink = Math.sin(Date.now() / 200) > 0;
    if (blink) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      for (const hc of gHintCells) {
        ctx.strokeRect(gBoardX + hc.c * gCellSize, gBoardY + hc.r * gCellSize, gCellSize, gCellSize);
      }
    }
  }

  // 부스터 활성 오버레이
  if (gState === STATE.BOOSTING) {
    ctx.fillStyle = 'rgba(255,215,0,0.1)';
    ctx.fillRect(gBoardX, gBoardY, gBoardW, gBoardH);
    UI.text(ctx, gActiveBooster === BOOSTER.HAMMER ? '🔨 ' + getText('boosterHammer') : '🌈 ' + getText('boosterColorBomb'),
      w / 2, gBoardY - 15, { size: 14, color: '#FFD700', bold: true });
  }

  // HUD 상단
  renderHUD(ctx, w, h);

  // 부스터 바
  renderBoosterBar(ctx, w, h);

  // 추가 턴 프롬프트
  if (gExtraTurnPrompt) renderExtraTurnPrompt(ctx, w, h);

  // 일시정지 버튼
  const ps = touchSafe(32);
  drawAssetOrFallback(ctx, 'uiPauseButton', w - ps - 10, 5, ps, ps, '#555');
  ctx.fillStyle = '#fff';
  ctx.fillRect(w - ps - 10 + ps * 0.3, 5 + ps * 0.25, ps * 0.12, ps * 0.5);
  ctx.fillRect(w - ps - 10 + ps * 0.55, 5 + ps * 0.25, ps * 0.12, ps * 0.5);
}

function renderHUD(ctx, w, h) {
  const lvl = gCurrentLevel;
  if (!lvl) return;
  const fontSize = Layout.fontSize(14, w, h, 10, 18);

  // 레벨 번호
  UI.text(ctx, `Lv.${lvl.id}`, 40, 20, { size: fontSize, color: '#FFD700', bold: true });

  // 점수
  UI.text(ctx, gScore.toLocaleString(), w / 2, 15, { size: fontSize + 2, color: '#fff', bold: true });
  UI.text(ctx, getText('score'), w / 2, 30, { size: fontSize - 2, color: '#8080a0' });

  // 남은 턴 (아이콘 에셋 사용)
  const movesIconSize = fontSize + 8;
  if (assets.sprites['uiMovesIcon']) {
    ctx.drawImage(assets.sprites['uiMovesIcon'], w / 2 - movesIconSize - 5, gBoardY - 25, movesIconSize, movesIconSize);
  }
  UI.text(ctx, `${gTurnsLeft}`, w / 2, gBoardY - 15, { size: fontSize + 4, color: gTurnsLeft <= 3 ? '#FF3B30' : '#007AFF', bold: true });
  UI.text(ctx, getText('moves'), w / 2, gBoardY - 3, { size: fontSize - 3, color: '#8080a0' });

  // 목표 (프레임 에셋 사용)
  const goalFrameW = Math.min(w * 0.4, 200);
  const goalFrameH = 30;
  if (assets.sprites['uiGoalFrame']) {
    ctx.globalAlpha = 0.6;
    ctx.drawImage(assets.sprites['uiGoalFrame'], 10, gBoardY - 25, goalFrameW, goalFrameH);
    ctx.globalAlpha = 1;
  }
  renderGoalInfo(ctx, 20, gBoardY - 10, lvl.goal, fontSize - 2);
}

function renderGoalInfo(ctx, x, y, goal, fontSize) {
  if (!goal) return;
  const textY = y;
  if (goal.type === 'score') {
    const adjTarget = gAdjustedGoalTargets.score || goal.target;
    UI.text(ctx, `★ ${adjTarget.toLocaleString()}`, x, textY, { size: fontSize, color: '#FFD700', align: 'left' });
    const prog = Math.min(gScore / adjTarget, 1);
    drawProgressBar(ctx, x, textY + 10, 80, 6, prog, '#FFD700');
  } else if (goal.targets) {
    let offsetX = 0;
    for (const t of goal.targets) {
      let target = t.count || t.target || 0;
      let current = 0;
      let label = '';
      if (t.gem) {
        target = gAdjustedGoalTargets[`collect_${t.gem}`] || target;
        current = gGoalProgress[`collect_${t.gem}`] || 0;
        label = t.gem === 'any' ? '💎' : GEM_SHAPES[t.gem] || t.gem;
      } else if (t.obs) {
        target = gAdjustedGoalTargets[`obs_${t.obs}`] || target;
        current = gGoalProgress[`obs_${t.obs}`] || 0;
        label = t.obs;
      } else if (t.type === 'score') {
        target = gAdjustedGoalTargets.score || target;
        current = gScore;
        label = '★';
      }
      const done = current >= target;
      ctx.fillStyle = done ? '#34C759' : '#e0e0f0';
      ctx.font = `${fontSize}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(`${label}: ${current}/${target}${done ? ' ✓' : ''}`, x + offsetX, textY);
      offsetX += 95;
    }
  }
}

function drawProgressBar(ctx, x, y, w, h, ratio, color) {
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w * MathUtil.clamp(ratio, 0, 1), h);
}

function renderBoosterBar(ctx, w, h) {
  if (gState === STATE.MINI_GAME || gState === STATE.MINI_INTRO || gState === STATE.MINI_RESULT) return;
  const barW = Math.min(w - 20, 280);
  const barX = (w - barW) / 2;
  const barY = gBoosterBarY;
  const barH = 50;

  // 부스터 바 배경 에셋
  if (assets.sprites['uiBoosterBar']) {
    ctx.drawImage(assets.sprites['uiBoosterBar'], barX - 5, barY - 3, barW + 10, barH + 6);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX - 5, barY - 3, barW + 10, barH + 6);
  }

  const slotW = barW / 4;
  const icons = ['🔨', '🔄', '⏳', '🌈'];
  const names = [getText('boosterHammer'), getText('boosterShuffle'), getText('boosterExtraTurns'), getText('boosterColorBomb')];
  const counts = [gSaveData.boosters.hammer, gSaveData.boosters.shuffle, gSaveData.boosters.extraTurns, gSaveData.boosters.colorBomb];
  const assetKeys = ['boosterHammer', 'boosterShuffle', 'boosterExtraTurns', 'boosterColorBomb'];

  for (let i = 0; i < 4; i++) {
    const sx = barX + i * slotW + slotW / 2;
    const sy = barY + barH / 2;
    const size = touchSafe(36);
    const isActive = gActiveBooster === i;
    const hasCount = counts[i] > 0;

    // 배경
    ctx.fillStyle = isActive ? 'rgba(255,215,0,0.3)' : (hasCount ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.3)');
    ctx.beginPath();
    ctx.arc(sx, sy, size / 2, 0, Math.PI * 2);
    ctx.fill();

    // 아이콘
    ctx.globalAlpha = hasCount ? 1 : 0.3;
    drawAssetOrFallback(ctx, assetKeys[i], sx - size / 2 + 4, sy - size / 2 + 4, size - 8, size - 8, '#FFD700');
    ctx.globalAlpha = 1;

    // 카운트
    UI.text(ctx, `${counts[i]}`, sx + size / 3, sy + size / 3, { size: 10, color: hasCount ? '#fff' : '#555', bold: true });
  }
}

function renderExtraTurnPrompt(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;
  // 패널
  const panelW = Math.min(300, w - 40), panelH = 150;
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.fillRect(cx - panelW / 2, cy - panelH / 2, panelW, panelH);
  ctx.strokeRect(cx - panelW / 2, cy - panelH / 2, panelW, panelH);
  UI.text(ctx, getText('useExtraTurns'), cx, cy - 30, { size: 18, color: '#FFD700', bold: true });
  // 버튼
  const btnW = 100, btnH = 40;
  drawFancyButton(ctx, getText('use'), cx - btnW - 10, cy + 20, btnW, btnH, '#34C759');
  drawFancyButton(ctx, getText('giveUp'), cx + 10, cy + 20, btnW, btnH, '#FF3B30');
}

// --- 클리어/실패 애니메이션 ---
function renderClearAnim(ctx, w, h) {
  const progress = MathUtil.clamp(gClearAnimTimer / 2500, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.3 * progress})`;
  ctx.fillRect(0, 0, w, h);
  if (gClearAnimTimer > 500) {
    const scale = MathUtil.clamp((gClearAnimTimer - 500) / 300, 0, 1.2);
    ctx.save();
    ctx.translate(w / 2, h * 0.35);
    ctx.scale(Math.min(scale, 1), Math.min(scale, 1));
    UI.text(ctx, getText('levelClear'), 0, 0, { size: 32, color: '#FFD700', bold: true, glow: '#FF8C00' });
    ctx.restore();
    // 별
    if (gClearAnimTimer > 800) {
      for (let i = 0; i < gResultStars; i++) {
        const delay = 800 + i * 200;
        if (gClearAnimTimer > delay) {
          const sx = w / 2 + (i - 1) * 40;
          const starScale = MathUtil.clamp((gClearAnimTimer - delay) / 200, 0, 1.3);
          UI.text(ctx, '★', sx, h * 0.45, { size: 30 * Math.min(starScale, 1), color: '#FFD700', glow: '#FF8C00' });
        }
      }
    }
  }
}

function renderFailAnim(ctx, w, h) {
  const progress = MathUtil.clamp(gFailAnimTimer / 1500, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.4 * progress})`;
  ctx.fillRect(0, 0, w, h);
  if (gFailAnimTimer > 200) {
    const shake = gFailAnimTimer < 600 ? UI.shake(5 * (1 - (gFailAnimTimer - 200) / 400)) : { x: 0, y: 0 };
    UI.text(ctx, getText('levelFail'), w / 2 + shake.x, h * 0.4 + shake.y, { size: 28, color: '#FF3B30', bold: true, glow: '#FF0000' });
  }
}

// --- 결과 화면 (강화) ---
function renderResult(ctx, w, h) {
  // 배경: 지역 테마 그라디언트
  const worldIdx = gCurrentLevel ? gCurrentLevel.world : 0;
  const bgGrads = [
    ['#1a2e1a','#0a1a0a'],['#1a1a3e','#0a0a2e'],['#1a2e2a','#0a1a15'],['#2e1a2e','#1a0a1a']
  ];
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, bgGrads[worldIdx][0]);
  grad.addColorStop(1, bgGrads[worldIdx][1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 배경 에셋 (투명도 낮게)
  if (gCurrentLevel) {
    const bgKey = WORLD_BG_KEYS[gCurrentLevel.world];
    if (assets.sprites[bgKey]) {
      ctx.globalAlpha = 0.15;
      ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
      ctx.globalAlpha = 1;
    }
  }

  const cx = w / 2;
  const lvl = gCurrentLevel;
  const isWin = gResultStars > 0;

  // 왕 캐릭터 (구출 이펙트 포함)
  const kingSize = Math.min(w * 0.2, 80);
  if (isWin && assets.sprites['effectKingRescue']) {
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 300) * 0.2;
    ctx.drawImage(assets.sprites['effectKingRescue'], cx - kingSize, h * 0.05, kingSize * 2, kingSize * 2);
    ctx.globalAlpha = 1;
  }
  drawKing(ctx, cx - kingSize / 2, h * 0.08, kingSize, kingSize, isWin ? 'happy' : 'scared');

  // 타이틀
  UI.text(ctx, isWin ? getText('levelClear') : getText('levelFail'), cx, h * 0.28, { size: 24, color: isWin ? '#FFD700' : '#FF3B30', bold: true, glow: isWin ? '#FF8C00' : '#FF0000' });

  // 레벨
  if (lvl) UI.text(ctx, `${getText('level')} ${lvl.id}`, cx, h * 0.35, { size: 16, color: '#8080a0' });

  // 별 (PNG 에셋 사용)
  const starSize = 32;
  for (let i = 0; i < 3; i++) {
    const sx = cx + (i - 1) * 40 - starSize / 2;
    const sy = h * 0.42 - starSize / 2;
    const filled = i < gResultStars;
    const starKey = filled ? 'uiStarFilled' : 'uiStarEmpty';
    if (assets.sprites[starKey]) {
      const pulse = filled ? (1 + Math.sin(Date.now() / 400 + i) * 0.1) : 1;
      ctx.save();
      ctx.translate(sx + starSize / 2, sy + starSize / 2);
      ctx.scale(pulse, pulse);
      ctx.drawImage(assets.sprites[starKey], -starSize / 2, -starSize / 2, starSize, starSize);
      ctx.restore();
    } else {
      UI.text(ctx, filled ? '★' : '☆', cx + (i - 1) * 40, h * 0.42, { size: 28, color: filled ? '#FFD700' : '#555' });
    }
  }

  // 점수 (카운트업 애니메이션)
  const displayScore = gResultScoreAnim || 0;
  UI.text(ctx, `${getText('score')}: ${displayScore.toLocaleString()}`, cx, h * 0.52, { size: 18, color: '#fff', bold: true });

  // 목표 달성 요약
  if (lvl && lvl.goal && lvl.goal.targets) {
    let offsetX = -((lvl.goal.targets.length - 1) * 50);
    for (const t of lvl.goal.targets) {
      let target = t.count || t.target || 0;
      let current = 0;
      let label = '';
      if (t.gem) { target = gAdjustedGoalTargets[`collect_${t.gem}`] || target; current = gGoalProgress[`collect_${t.gem}`] || 0; label = GEM_SHAPES[t.gem] || t.gem; }
      else if (t.obs) { target = gAdjustedGoalTargets[`obs_${t.obs}`] || target; current = gGoalProgress[`obs_${t.obs}`] || 0; label = t.obs; }
      const done = current >= target;
      UI.text(ctx, `${label} ${current}/${target} ${done ? '✓' : '✗'}`, cx + offsetX, h * 0.58, { size: 12, color: done ? '#34C759' : '#FF3B30' });
      offsetX += 100;
    }
  }

  // DDA 힌트 (실패 시)
  if (!isWin && (gSaveData.dda.failStreak || 0) > 0) {
    const lang = gSaveData.settings.lang || 'ko';
    const hint = lang === 'ko' ? '💡 다음에는 턴이 더 주어져요!' : '💡 Extra turns next time!';
    UI.text(ctx, hint, cx, h * 0.62, { size: 11, color: '#FFCC00' });
  }

  // 버튼 (UI 에셋 사용)
  const btnW = 120, btnH = 44;
  const retryHover = UI.hitTest(input.mouseX, input.mouseY, cx - btnW - 10, h * 0.7, btnW, btnH);
  const mapHover = UI.hitTest(input.mouseX, input.mouseY, cx + 10, h * 0.7, btnW, btnH);
  drawAssetButton(ctx, 'uiButtonRetry', getText('retry'), cx - btnW - 10, h * 0.7, btnW, btnH, '#FF8C00', retryHover);
  drawAssetButton(ctx, 'uiButtonMap', getText('backToMap'), cx + 10, h * 0.7, btnW, btnH, '#007AFF', mapHover);

  // 미니게임 진입 버튼
  if (isWin && gResultBonusLevel && lvl && lvl.miniAfter) {
    const miniHover = UI.hitTest(input.mouseX, input.mouseY, cx - 80, h * 0.8, 160, btnH);
    drawFancyButton(ctx, getText('kingsNightmare'), cx - 80, h * 0.8, 160, btnH, '#FF2D55', miniHover);
  }

  // 안내
  UI.text(ctx, 'R: Retry / ESC: Map', cx, h * 0.93, { size: 11, color: '#505070' });
}

// --- 일시정지 ---
function renderPaused(ctx, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);
  UI.text(ctx, getText('pause'), w / 2, h * 0.3, { size: 28, color: '#FFD700', bold: true });
  const btnW = 150, btnH = 44;
  const cx = w / 2;
  drawFancyButton(ctx, getText('resume'), cx - btnW / 2, h * 0.4, btnW, btnH, '#34C759');
  drawFancyButton(ctx, getText('backToMap'), cx - btnW / 2, h * 0.5, btnW, btnH, '#007AFF');

  // 색맹 모드 토글 (에셋 아이콘 사용)
  const cbSize = 32;

    ctx.globalAlpha = gSaveData.settings.colorBlindMode ? 1 : 0.4;

  }
  const cbText = `${getText('colorBlindMode')}: ${gSaveData.settings.colorBlindMode ? 'ON' : 'OFF'}`;
  UI.text(ctx, cbText, cx, h * 0.65 + 20, { size: 14, color: '#8080a0' });
  UI.text(ctx, 'A: Toggle', cx, h * 0.7 + 20, { size: 11, color: '#505070' });
}

// --- 미니게임 인트로 ---
function renderMiniIntro(ctx, w, h) {
  ctx.fillStyle = 'rgba(10,10,30,0.95)';
  ctx.fillRect(0, 0, w, h);

  const cx = w / 2;
  const lang = gSaveData.settings.lang || 'ko';

  // 왕 캐릭터
  const kingSize = Math.min(w * 0.25, 100);
  const kingScale = MathUtil.clamp(gClearAnimTimer / 500, 0, 1);
  ctx.save();
  ctx.translate(cx, h * 0.3);
  ctx.scale(kingScale, kingScale);
  drawKing(ctx, -kingSize / 2, -kingSize / 2, kingSize, kingSize, 'scared');
  ctx.restore();

  // 배너
  if (gClearAnimTimer > 500) {
    drawAssetOrFallback(ctx, 'uiMiniRescue', cx - 100, h * 0.45, 200, 60, '#FF3B30');
    UI.text(ctx, getText('kingsNightmare'), cx, h * 0.47 + 30, { size: 20, color: '#FFD700', bold: true, glow: '#FF3B30' });
  }

  // 스토리 텍스트
  if (gClearAnimTimer > 1000) {
    const stories = lang === 'ko' ? MINI_STORIES_KO : MINI_STORIES_EN;
    const story = stories[gMiniType - 1] || '';
    const lines = story.split('\n');
    lines.forEach((line, i) => {
      UI.text(ctx, line, cx, h * 0.6 + i * 22, { size: 14, color: '#e0e0f0' });
    });
  }

  // 시작 안내
  const blink = Math.sin(Date.now() / 300) > 0;
  if (gClearAnimTimer > 1500 && blink) {
    UI.text(ctx, getText('rescueStart') + ' (Tap/Space)', cx, h * 0.82, { size: 16, color: '#FFD700', bold: true });
  }
}

// --- 미니게임 렌더링 ---
function renderMiniGame(ctx, w, h) {
  const type = gMiniType;

  // 배경
  const bgKey = MINI_BG_KEYS[type - 1];
  if (assets.sprites[bgKey]) {
    ctx.drawImage(assets.sprites[bgKey], 0, 0, w, h);
  } else {
    const colors = ['#1a3a5a', '#5a1a1a', '#1a3a1a', '#2a1a4a'];
    ctx.fillStyle = colors[type - 1] || '#1a1a2e';
    ctx.fillRect(0, 0, w, h);
  }

  // 타이머 바 (UI 에셋 사용)
  const maxMiniTimer = 30000 + ((DDA.getMiniGameAdjustment(gMiniType) || {}).extraTime || 0);
  const timerRatio = gMiniTimer / maxMiniTimer;
  const timerW = w - 40;
  if (assets.sprites['uiTimerBar']) {
    ctx.globalAlpha = 0.7;
    ctx.drawImage(assets.sprites['uiTimerBar'], 20, 8, timerW, 20);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(20, 10, timerW, 16);
  }
  const timerColor = timerRatio > 0.5 ? '#34C759' : (timerRatio > 0.25 ? '#FFCC00' : '#FF3B30');
  ctx.fillStyle = timerColor;
  ctx.fillRect(22, 12, (timerW - 4) * timerRatio, 12);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 10, timerW, 16);
  UI.text(ctx, `${Math.ceil(gMiniTimer / 1000)}s`, w / 2, 18, { size: 11, color: '#fff', bold: true });

  // 미니게임별 상단 렌더링
  renderMiniGameTop(ctx, w, h, type);

  // 미니 보드 (하단)
  const miniCellSize = Math.min((w - 40) / MINI_COLS, (h * 0.4) / MINI_ROWS);
  const miniW = miniCellSize * MINI_COLS;
  const miniH = miniCellSize * MINI_ROWS;
  const miniX = (w - miniW) / 2;
  const miniY = h - miniH - 20;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(miniX - 4, miniY - 4, miniW + 8, miniH + 8);

  for (let r = 0; r < MINI_ROWS; r++) {
    for (let c = 0; c < MINI_COLS; c++) {
      const x = miniX + c * miniCellSize, y = miniY + r * miniCellSize;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.1)';
      ctx.fillRect(x, y, miniCellSize, miniCellSize);

      const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (!cell) continue;

      // 얼음 장애물
      if (cell.obstacle === OBS.ICE) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ADD8E6';
        ctx.fillRect(x + 2, y + 2, miniCellSize - 4, miniCellSize - 4);
        ctx.globalAlpha = 1;
      }

      if (cell.type) {
        drawGem(ctx, x + 4, y + 4, miniCellSize - 8, miniCellSize - 8, cell.type, SPECIAL.NONE);
        if (gSaveData.settings.colorBlindMode) {
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${miniCellSize * 0.35}px 'Segoe UI', system-ui, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(GEM_SHAPES[cell.type] || '?', x + miniCellSize / 2, y + miniCellSize / 2);
        }
      }

      // 선택 하이라이트
      if (gMiniSelected && gMiniSelected.r === r && gMiniSelected.c === c) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, miniCellSize - 2, miniCellSize - 2);
      }
    }
  }
}

function renderMiniGameTop(ctx, w, h, type) {
  const topH = h * 0.5;

  if (type === 1) {
    // 물 상승: 왕 + 물 레벨
    const ratio = gMiniData.kingHeight / gMiniData.targetHeight;
    const waterRatio = gMiniData.waterLevel / 30;
    // 물 에셋 또는 폴백
    if (assets.sprites['miniWater']) {
      ctx.globalAlpha = 0.6;
      const waterH = topH * waterRatio;
      ctx.drawImage(assets.sprites['miniWater'], 0, topH - waterH, w, waterH);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#4FC3F7';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(0, topH - topH * waterRatio, w, topH * waterRatio);
      ctx.globalAlpha = 1;
    }
    // 플랫폼 에셋
    const platY = topH - topH * ratio;
    if (assets.sprites['miniPlatform']) {
      ctx.drawImage(assets.sprites['miniPlatform'], w / 2 - 30, platY - 10, 60, 20);
    } else {
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(w / 2 - 30, platY - 5, 60, 10);
    }
    // 왕
    drawKing(ctx, w / 2 - 25, platY - 55, 50, 50, ratio > waterRatio ? 'idle' : 'scared');
    // 탈출구
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(w / 2 - 20, 35, 40, 10);
    UI.text(ctx, '🚪', w / 2, 30, { size: 20 });
  } else if (type === 2) {
    // 불길 회피: 3레인 러너
    const laneW = w / 3;
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.strokeRect(i * laneW, 30, laneW, topH - 30);
    }
    // 불길
    for (const fire of gMiniData.fires) {
      const fx = fire.lane * laneW + laneW / 2 - 15;
      const fy = 40 + fire.y * (topH - 70);
      drawAssetOrFallback(ctx, 'miniFire', fx, fy, 30, 40, '#FF4500');
    }
    // 왕 (달리기 스프라이트 시트 사용)
    const kx = gMiniData.kingLane * laneW + laneW / 2 - 20;
    if (gKingRunSprite && gKingRunSprite.image) {
      gKingRunSprite.draw(ctx, kx, topH - 60, 40, 40);
    } else {
      drawKing(ctx, kx, topH - 60, 40, 40, 'idle');
    }
    // HP (하트 에셋 사용)
    const maxHp = gMiniData.kingHp >= 4 ? 4 : 3;
    for (let i = 0; i < maxHp; i++) {
      const filled = i < gMiniData.kingHp;
      if (assets.sprites['uiHpHeart']) {
        ctx.globalAlpha = filled ? 1 : 0.3;
        ctx.drawImage(assets.sprites['uiHpHeart'], 15 + i * 28, topH - 25, 24, 20);
        ctx.globalAlpha = 1;
      } else {
        UI.text(ctx, filled ? '❤️' : '🖤', 20 + i * 25, topH - 15, { size: 16 });
      }
    }
  } else if (type === 3) {
    // 미로
    const mazeSize = Math.min(w - 20, topH - 50);
    const cellW = mazeSize / 5;
    const mx = (w - mazeSize) / 2;
    const my = 40;
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cx = mx + c * cellW, cy = my + r * cellW;
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(cx, cy, cellW, cellW);
        if (gMiniData.maze && gMiniData.maze[r] && gMiniData.maze[r][c]) {
          const cell = gMiniData.maze[r][c];
          const wallThickness = 4;
          // 벽 에셋 또는 폴백
          if (assets.sprites['miniWall']) {
            if (cell.walls.top) ctx.drawImage(assets.sprites['miniWall'], cx, cy - wallThickness / 2, cellW, wallThickness);
            if (cell.walls.right) ctx.drawImage(assets.sprites['miniWall'], cx + cellW - wallThickness / 2, cy, wallThickness, cellW);
            if (cell.walls.bottom) ctx.drawImage(assets.sprites['miniWall'], cx, cy + cellW - wallThickness / 2, cellW, wallThickness);
            if (cell.walls.left) ctx.drawImage(assets.sprites['miniWall'], cx - wallThickness / 2, cy, wallThickness, cellW);
          } else {
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            if (cell.walls.top) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + cellW, cy); ctx.stroke(); }
            if (cell.walls.right) { ctx.beginPath(); ctx.moveTo(cx + cellW, cy); ctx.lineTo(cx + cellW, cy + cellW); ctx.stroke(); }
            if (cell.walls.bottom) { ctx.beginPath(); ctx.moveTo(cx, cy + cellW); ctx.lineTo(cx + cellW, cy + cellW); ctx.stroke(); }
            if (cell.walls.left) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + cellW); ctx.stroke(); }
          }
        }
        // 왕 위치
        if (gMiniData.kingPos && gMiniData.kingPos.r === r && gMiniData.kingPos.c === c) {
          drawKing(ctx, cx + 2, cy + 2, cellW - 4, cellW - 4, 'idle');
        }
        // 출구
        if (r === 4 && c === 4) {
          UI.text(ctx, '🚪', cx + cellW / 2, cy + cellW / 2, { size: cellW * 0.5 });
        }
      }
    }
  } else if (type === 4) {
    // 드래곤 보스 (공격 시 애니메이션 시트 사용)
    const dragonW = Math.min(w * 0.6, 200);
    const dragonH = dragonW * 0.67;
    const dx = (w - dragonW) / 2;
    const isAttacking = gMiniData.attackTimer > (gMiniData.dragonHp > 10 ? 2500 : 1500);
    if (isAttacking && gDragonAttackSprite && gDragonAttackSprite.image) {
      gDragonAttackSprite.draw(ctx, dx, 40, dragonW, dragonH);
    } else {
      drawAssetOrFallback(ctx, 'miniDragon', dx, 40, dragonW, dragonH, '#800080');
    }
    // HP 바
    UI.hpBar(ctx, w * 0.15, topH - 30, w * 0.7, 16, gMiniData.dragonHp, gMiniData.maxHp, { fgColor: '#FF3B30' });
    UI.text(ctx, `HP: ${gMiniData.dragonHp}/${gMiniData.maxHp}`, w / 2, topH - 10, { size: 12, color: '#fff' });
  }
}

// --- 미니게임 결과 ---
function renderMiniResult(ctx, w, h) {
  ctx.fillStyle = 'rgba(10,10,30,0.95)';
  ctx.fillRect(0, 0, w, h);
  const cx = w / 2;

  // 왕 캐릭터 (구출 이펙트)
  const kingSize = Math.min(w * 0.2, 80);
  if (gMiniSuccess && assets.sprites['effectKingRescue']) {
    ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 300) * 0.2;
    ctx.drawImage(assets.sprites['effectKingRescue'], cx - kingSize, h * 0.1, kingSize * 2, kingSize * 2);
    ctx.globalAlpha = 1;
  }
  drawKing(ctx, cx - kingSize / 2, h * 0.15, kingSize, kingSize, gMiniSuccess ? 'happy' : 'scared');

  // 결과 텍스트
  UI.text(ctx, gMiniSuccess ? getText('rescueSuccess') : getText('rescueFail'), cx, h * 0.4, {
    size: 22, color: gMiniSuccess ? '#FFD700' : '#FF3B30', bold: true, glow: gMiniSuccess ? '#FF8C00' : '#FF0000'
  });

  // 별 (PNG 에셋 사용)
  if (gMiniSuccess) {
    const starSize = 30;
    for (let i = 0; i < 3; i++) {
      const sx = cx + (i - 1) * 40 - starSize / 2;
      const sy = h * 0.5 - starSize / 2;
      const filled = i < gMiniStars;
      const starKey = filled ? 'uiStarFilled' : 'uiStarEmpty';
      if (assets.sprites[starKey]) {
        ctx.drawImage(assets.sprites[starKey], sx, sy, starSize, starSize);
      } else {
        UI.text(ctx, filled ? '★' : '☆', cx + (i - 1) * 35, h * 0.5, { size: 28, color: filled ? '#FFD700' : '#555' });
      }
    }
    // 보상
    const rewards = [];
    if (gMiniStars >= 1) rewards.push('🔨 ×1');
    if (gMiniStars >= 2) rewards.push('🔄 ×1  ⏳ ×1');
    if (gMiniStars >= 3) rewards.push('🌈 ×1');
    UI.text(ctx, getText('reward') + ': ' + rewards.join('  '), cx, h * 0.6, { size: 14, color: '#e0e0f0' });
  }

  // 안내
  UI.text(ctx, 'Tap/Space → Map', cx, h * 0.8, { size: 14, color: '#8080a0' });
}

// ═══════════════════════════════════════════════════════════════════
// §17. 드로잉 헬퍼
// ═══════════════════════════════════════════════════════════════════

function drawGem(ctx, x, y, w, h, gemType, special) {
  if (special === SPECIAL.LINE_H) { drawAssetOrFallback(ctx, 'specialLineH', x, y, w, h, '#FFD700'); return; }
  if (special === SPECIAL.LINE_V) { drawAssetOrFallback(ctx, 'specialLineV', x, y, w, h, '#FFD700'); return; }
  if (special === SPECIAL.BOMB) { drawAssetOrFallback(ctx, 'specialBomb', x, y, w, h, '#FF8C00'); return; }
  if (special === SPECIAL.RAINBOW) { drawAssetOrFallback(ctx, 'specialRainbow', x, y, w, h, '#FF69B4'); return; }

  const assetMap = { ruby: 'gemRuby', sapphire: 'gemSapphire', emerald: 'gemEmerald', topaz: 'gemTopaz', amethyst: 'gemAmethyst', diamond: 'gemDiamond' };
  const key = assetMap[gemType];
  if (key) {
    drawAssetOrFallback(ctx, key, x, y, w, h, GEM_COLORS[gemType] || '#fff');
    // 스프라이트 시트 반짝임 오버레이 (에셋 로드 시에만)
    if (gGemSprites[gemType]) {
      ctx.globalAlpha = 0.7;
      gGemSprites[gemType].draw(ctx, x, y, w, h);
      ctx.globalAlpha = 1;
    }
  }
}

function drawGemSimple(ctx, x, y, size, gemType) {
  const color = GEM_COLORS[gemType] || '#fff';
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, size / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(x - size * 0.15, y - size * 0.15, size * 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawKing(ctx, x, y, w, h, pose) {
  const poseMap = { idle: 'kingIdle', scared: 'kingScared', happy: 'kingHappy' };
  const key = poseMap[pose] || 'kingIdle';
  if (assets.sprites[key]) {
    ctx.drawImage(assets.sprites[key], x, y, w, h);
  } else {
    // 캔버스 폴백: 간단한 왕 캐릭터
    ctx.fillStyle = '#4169E1';
    ctx.beginPath();
    ctx.arc(x + w / 2, y + h * 0.55, w * 0.35, 0, Math.PI * 2);
    ctx.fill();
    // 왕관
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    const crownY = y + h * 0.2;
    ctx.moveTo(x + w * 0.25, crownY + h * 0.15);
    ctx.lineTo(x + w * 0.3, crownY);
    ctx.lineTo(x + w * 0.4, crownY + h * 0.1);
    ctx.lineTo(x + w * 0.5, crownY - h * 0.05);
    ctx.lineTo(x + w * 0.6, crownY + h * 0.1);
    ctx.lineTo(x + w * 0.7, crownY);
    ctx.lineTo(x + w * 0.75, crownY + h * 0.15);
    ctx.closePath();
    ctx.fill();
    // 눈
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + w * 0.38, y + h * 0.5, w * 0.08, 0, Math.PI * 2);
    ctx.arc(x + w * 0.62, y + h * 0.5, w * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    const eyeOffset = pose === 'scared' ? 0.02 : 0;
    ctx.arc(x + w * 0.38, y + h * 0.5 + eyeOffset * h, w * 0.04, 0, Math.PI * 2);
    ctx.arc(x + w * 0.62, y + h * 0.5 + eyeOffset * h, w * 0.04, 0, Math.PI * 2);
    ctx.fill();
    // 입
    if (pose === 'happy') {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(x + w / 2, y + h * 0.6, w * 0.12, 0, Math.PI);
      ctx.stroke();
    } else if (pose === 'scared') {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(x + w / 2, y + h * 0.65, w * 0.06, w * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawAssetOrFallback(ctx, key, x, y, w, h, fallbackColor) {
  if (assets.sprites[key]) {
    ctx.drawImage(assets.sprites[key], x, y, w, h);
  } else {
    ctx.fillStyle = fallbackColor || '#555';
    const r = Math.min(w, h) * 0.15;
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(x + 2, y + 2, w - 4, h - 4, r);
      ctx.fill();
    } else {
      ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    }
  }
}

function drawFancyButton(ctx, text, x, y, w, h, color, hover) {
  ctx.save();
  ctx.fillStyle = hover ? color : color + 'cc';
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.fill();
  } else {
    ctx.fillRect(x, y, w, h);
  }
  // 상단 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h / 2, [8, 8, 0, 0]);
    ctx.fill();
  }
  // 테두리
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.stroke();
  } else {
    ctx.strokeRect(x, y, w, h);
  }
  // 텍스트
  ctx.fillStyle = '#fff';
  ctx.font = `bold 14px 'Segoe UI', system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowOffsetY = 1;
  ctx.shadowBlur = 2;
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.restore();
}

// --- UI 에셋 버튼 헬퍼 ---
function drawAssetButton(ctx, assetKey, text, x, y, w, h, fallbackColor, hover) {
  if (assets.sprites[assetKey]) {
    ctx.globalAlpha = hover ? 1 : 0.85;
    ctx.drawImage(assets.sprites[assetKey], x, y, w, h);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = `bold 14px 'Segoe UI', system-ui, -apple-system, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillText(text, x + w / 2, y + h / 2);
    ctx.shadowColor = 'transparent';
  } else {
    drawFancyButton(ctx, text, x, y, w, h, fallbackColor, hover);
  }
}

// ═══════════════════════════════════════════════════════════════════
// §18. 초기화
// ═══════════════════════════════════════════════════════════════════

async function init() {
  // 세이브 데이터 로드
  loadGame();

  // 레이아웃 계산
  recalcLayout(engine.W, engine.H);

  // manifest.json에서 에셋 로드
  try {
    const manifest = await fetch('assets/manifest.json').then(r => r.json()).catch(() => null);
    if (manifest && manifest.assets) {
      const assetMap = {};
      for (const [key, info] of Object.entries(manifest.assets)) {
        assetMap[key] = 'assets/' + info.file;
      }
      await assets.load(assetMap);
    }
  } catch (e) {
    console.warn('[AssetLoad] Failed:', e);
  }

  // 스프라이트 시트 초기화 (에셋 로드 성공 시)
  const sheetMap = { ruby: 'gemRubySheet', sapphire: 'gemSapphireSheet', emerald: 'gemEmeraldSheet',
    topaz: 'gemTopazSheet', amethyst: 'gemAmethystSheet', diamond: 'gemDiamondSheet' };
  for (const [gem, key] of Object.entries(sheetMap)) {
    if (assets.sprites[key]) {
      // 512x128 시트 → 4프레임, 각 128x128
      gGemSprites[gem] = new Sprite(assets.sprites[key], 128, 128, 4, 6);
    }
  }
  // 왕 달리기 스프라이트 (512x128 → 4프레임, 128x128)
  if (assets.sprites['kingRunSheet']) {
    gKingRunSprite = new Sprite(assets.sprites['kingRunSheet'], 128, 128, 4, 8);
  }
  // 드래곤 공격 스프라이트 (1024x256 → 4프레임, 256x256)
  if (assets.sprites['miniDragonAttackSheet']) {
    gDragonAttackSprite = new Sprite(assets.sprites['miniDragonAttackSheet'], 256, 256, 4, 8);
    gDragonAttackSprite.loop = true;
  }

  // 준비 완료
  _ready = true;
  gState = STATE.LOADING;
  directTransition(STATE.TITLE);

  engine.start();
}

init();

</script>
