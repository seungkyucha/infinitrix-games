// --- SeededRNG ---
class SeededRNG {
  constructor(seed) { this.seed = seed || Date.now(); }
  next() {
    this.seed = (this.seed * 16807 + 0) % 2147483647;
    return (this.seed - 1) / 2147483646;
  }
  randInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  pick(arr) { return arr[this.randInt(0, arr.length - 1)]; }
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = this.randInt(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}
let gRng = new SeededRNG(Date.now());

// --- safeGridAccess (F1 해결) ---
function safeGridAccess(grid, r, c, rows, cols) {
  if (!grid || !grid.length || r < 0 || r >= rows || c < 0 || c >= cols) return null;
  if (!grid[r]) return null;
  return grid[r][c] || null;
}

// --- safeSave/Load ---
function safeSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function safeLoad(key, def) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch(e) { return def; }
}

// --- touchSafe ---

function directTransition(newState) {
  const allowed = TRANSITION_TABLE[gState];
  if (!allowed || !allowed.includes(newState)) {
    console.warn(`[Trans] blocked: ${STATE_NAMES[gState]}→${STATE_NAMES[newState]}`);
    return false;
  }
  // ★ FIX-3: transitioning 가드를 제거하여 중첩 directTransition 허용
  // beginTransition(페이드)에서만 transitioning 가드 사용
  gPrevState = gState;
  gState = newState;
  enterState(newState);
  return true;
}

function beginTransition(newState, duration = 300) {
  const allowed = TRANSITION_TABLE[gState];
  if (!allowed || !allowed.includes(newState)) {
    console.warn(`[Trans] blocked fade: ${STATE_NAMES[gState]}→${STATE_NAMES[newState]}`);
    return false;
  }
  if (GUARDS.transitioning) return false;
  GUARDS.transitioning = true;
  gFadeObj = { a: 0 };
  tween.add(gFadeObj, { a: 1 }, duration / 2, 'easeIn', () => {
    gPrevState = gState;
    gState = newState;
    enterState(newState);
    gFadeObj = { a: 1 };
    tween.add(gFadeObj, { a: 0 }, duration / 2, 'easeOut', () => {
      GUARDS.transitioning = false;
    });
  });
  return true;
}

          x: gRng.next() * engine.W, y: gRng.next() * engine.H,
          vx: (gRng.next()-0.5)*30, vy: -20 - gRng.next()*40,
          type: gRng.pick(GEM_TYPES), size: 12 + gRng.next()*20, alpha: 0.3 + gRng.next()*0.5
        });
      }
      break;

    case STATE.MAP:
      gMapScrollVel = 0;
      gMapDragStart = null;
      gMapDragDist = 0;
      // 스크롤을 현재 레벨 위치로
      const curLvl = gSaveData.currentLevel;
      gMapScrollY = MathUtil.clamp((curLvl - 1) * 80 - engine.H / 2, 0, Math.max(0, 24 * 80 - engine.H));
      resetGuards();
      break;

    case STATE.LEVEL_INTRO:
      gClearAnimTimer = 0;
      break;

    case STATE.PLAY:
      gHintTimer = 0;
      gHintCells = null;
      gExtraTurnPrompt = false;
      resetGuards();
      break;

    case STATE.ANIMATING:
      break;

    case STATE.CASCADING:
      GUARDS.cascadeInProgress = true;
      break;

    case STATE.BOOSTING:
      GUARDS.boosterActive = true;
      break;

    case STATE.GOAL_CHECK:
      GUARDS.goalChecking = true;
      // ★ FIX-1: checkGoals()를 동기 호출하지 않음 — coreUpdate GOAL_CHECK case에서 처리
      // enterState 안에서 directTransition 중첩 호출 시 GUARDS.transitioning 데드락 방지
      break;

    case STATE.CLEAR_ANIM:
      GUARDS.clearAnimPlaying = true;
      gClearAnimTimer = 0;
      sound.sfx('score');
      playSfx('levelClear');
      break;

    case STATE.FAIL_ANIM:
      GUARDS.failAnimPlaying = true;
      gFailAnimTimer = 0;
      playSfx('levelFail');
      break;

    case STATE.RESULT:
      GUARDS.clearAnimPlaying = false;
      GUARDS.failAnimPlaying = false;
      gResultScoreAnim = 0;
      gResultTimer = 0;
      // 승리 시 축하 파티클
      if (gResultStars > 0) {
        for (let i = 0; i < 3; i++) {
          const px = engine.W * (0.2 + i * 0.3);
          particles.emit(px, engine.H * 0.3, 12, {
            color: GEM_COLORS[GEM_TYPES[i % 6]], speed: 140, life: 1.2, size: 6,
            texture: assets.sprites['particleFirework'] || null
          });
        }
      }
      break;

    case STATE.PAUSED:
      break;

    case STATE.MINI_INTRO:
      gClearAnimTimer = 0;
      GUARDS.miniGameActive = false;
      break;

    case STATE.MINI_GAME:
      GUARDS.miniGameActive = true;
      initMiniGame(gMiniType);
      break;

    case STATE.MINI_RESULT:
      GUARDS.miniGameActive = false;
      break;
  }
}

function playBgm(dt) {
  gBgmTimer += dt;
  const bpm = (gState === STATE.MINI_GAME) ? 140 : 100;
  const beatMs = 60000 / bpm;
  if (gBgmTimer < beatMs) return;
  gBgmTimer -= beatMs;
  if (!sound._ctx) return;
  const vol = (gSaveData.settings.bgmVolume || 0.3) * 0.15;
  const worldIdx = gCurrentLevel ? gCurrentLevel.world : 0;
  const scale = BGM_SCALES[worldIdx] || BGM_SCALES[0];
  const noteIdx = Math.floor(gRng.next() * scale.length);
  sound.tone(scale[noteIdx], 0.15, 'sine', vol);
  if (gRng.next() > 0.6) {
    sound.tone(scale[(noteIdx + 2) % scale.length] * 0.5, 0.2, 'triangle', vol * 0.5);
  }
}

// ═══════════════════════════════════════════════════════════════════
// §7. 보드 시스템 — 그리드 생성, 매치 검출, 캐스케이드, 스페셜
// ═══════════════════════════════════════════════════════════════════

// --- 셀 데이터 구조 ---
function createCell(type, r, c) {
  return {
    type, r, c,
    special: SPECIAL.NONE,
    obstacle: OBS.NONE,
    obsLayer: 0,
    jelly: 0,         // 젤리 겹수
    curtainHidden: false,
    // 렌더링/애니메이션
    x: 0, y: 0,       // 논리적 위치 (tween 대상)
    scale: 1, alpha: 1, angle: 0,
    selected: false,
    removing: false
  };
}

// --- 보드 생성 ---
function generateBoard(level) {
  gGrid = [];
  const types = GEM_TYPES;
  // 먼저 빈 그리드 생성
  for (let r = 0; r < ROWS; r++) {
    gGrid[r] = [];
    for (let c = 0; c < COLS; c++) {
      gGrid[r][c] = createCell(gRng.pick(types), r, c);
    }
  }
  // 장애물 배치
  placeObstacles(level);
  // 3매치 제거 (최대 1000패스)
  for (let pass = 0; pass < 1000; pass++) {
    let found = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = gGrid[r][c];
        if (!cell || cell.obstacle === OBS.STONE || cell.obstacle === OBS.POISON) continue;
        if (hasMatchAt(r, c)) {
          cell.type = gRng.pick(types);
          found = true;
        }
      }
    }
    if (!found) break;
  }
  // 유효 이동 검증 (50회 시도)
  for (let attempt = 0; attempt < 50; attempt++) {
    if (findValidMove()) break;
    // 보석만 셔플
    shuffleGems();
  }
  // 좌표 초기화
  updateCellPositions();
}

function placeObstacles(level) {
  if (!level.obstacles || !level.obstacles.length) return;
  const positions = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) positions.push({ r, c });
  }
  const shuffled = gRng.shuffle(positions);
  let posIdx = 0;
  for (const obs of level.obstacles) {
    const count = obs.count || 1;
    for (let i = 0; i < count && posIdx < shuffled.length; i++) {
      const { r, c } = shuffled[posIdx++];
      const cell = gGrid[r][c];
      if (obs.type === OBS.ICE) {
        cell.obstacle = OBS.ICE;
        cell.obsLayer = obs.layer || 1;
      } else if (obs.type === OBS.CHAIN) {
        cell.obstacle = OBS.CHAIN;
        cell.obsLayer = 1;
      } else if (obs.type === OBS.WOOD) {
        cell.obstacle = OBS.WOOD;
        cell.obsLayer = obs.layer || 2;
        cell.type = null; // 빈 칸
      } else if (obs.type === OBS.CURTAIN) {
        cell.obstacle = OBS.CURTAIN;
        cell.curtainHidden = true;
      } else if (obs.type === OBS.POISON) {
        cell.obstacle = OBS.POISON;
        cell.type = null;
      } else if (obs.type === OBS.STONE) {
        cell.obstacle = OBS.STONE;
        cell.type = null;
      } else if (obs.type === OBS.JELLY) {
        cell.jelly = obs.layer || 1;
      }
    }
  }
}

function updateCellPositions() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (cell) {
        cell.x = gBoardX + c * gCellSize;
        cell.y = gBoardY + r * gCellSize;
      }
    }
  }
}

function hasMatchAt(r, c) {
  const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
  if (!cell || !cell.type) return false;
  const t = cell.type;
  // 가로 체크
  let hCount = 1;
  if (c >= 2) {
    const c1 = safeGridAccess(gGrid, r, c-1, ROWS, COLS);
    const c2 = safeGridAccess(gGrid, r, c-2, ROWS, COLS);
    if (c1 && c2 && c1.type === t && c2.type === t) return true;
  }
  // 세로 체크
  if (r >= 2) {
    const r1 = safeGridAccess(gGrid, r-1, c, ROWS, COLS);
    const r2 = safeGridAccess(gGrid, r-2, c, ROWS, COLS);
    if (r1 && r2 && r1.type === t && r2.type === t) return true;
  }
  return false;
}

// --- 매치 검출 (우선순위: 5→T/L→4→3) ---
function findMatches() {
  const used = [];
  for (let r = 0; r < ROWS; r++) { used[r] = []; for (let c = 0; c < COLS; c++) used[r][c] = false; }
  const matches = [];

  // 가로 런 찾기
  const hRuns = [];
  for (let r = 0; r < ROWS; r++) {
    let start = 0;
    for (let c = 1; c <= COLS; c++) {
      const prev = safeGridAccess(gGrid, r, c-1, ROWS, COLS);
      const cur = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (c < COLS && cur && prev && cur.type && cur.type === prev.type &&
          prev.obstacle !== OBS.STONE && prev.obstacle !== OBS.POISON && prev.obstacle !== OBS.WOOD &&
          cur.obstacle !== OBS.STONE && cur.obstacle !== OBS.POISON && cur.obstacle !== OBS.WOOD) {
        continue;
      }
      if (c - start >= 3) {
        const cells = [];
        for (let cc = start; cc < c; cc++) cells.push({ r, c: cc });
        hRuns.push({ cells, type: prev.type, dir: 'h', len: c - start });
      }
      start = c;
    }
  }

  // 세로 런 찾기
  const vRuns = [];
  for (let c = 0; c < COLS; c++) {
    let start = 0;
    for (let r = 1; r <= ROWS; r++) {
      const prev = safeGridAccess(gGrid, r-1, c, ROWS, COLS);
      const cur = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (r < ROWS && cur && prev && cur.type && cur.type === prev.type &&
          prev.obstacle !== OBS.STONE && prev.obstacle !== OBS.POISON && prev.obstacle !== OBS.WOOD &&
          cur.obstacle !== OBS.STONE && cur.obstacle !== OBS.POISON && cur.obstacle !== OBS.WOOD) {
        continue;
      }
      if (r - start >= 3) {
        const cells = [];
        for (let rr = start; rr < r; rr++) cells.push({ r: rr, c });
        vRuns.push({ cells, type: prev.type, dir: 'v', len: r - start });
      }
      start = r;
    }
  }

  const allRuns = [...hRuns, ...vRuns].sort((a, b) => b.len - a.len);

  // 5매치 → T/L → 4매치 → 3매치 순으로 처리
  for (const run of allRuns) {
    // 이미 소비된 셀이 있는지 체크
    const availCells = run.cells.filter(({r,c}) => !used[r][c]);
    if (availCells.length < 3) continue;

    // T/L자 검출: 이 런과 교차하는 다른 런 찾기
    let isTL = false;
    if (run.len >= 3) {
      for (const other of allRuns) {
        if (other === run || other.dir === run.dir) continue;
        const intersection = run.cells.find(a => other.cells.some(b => a.r === b.r && a.c === b.c));
        if (intersection) {
          const otherAvail = other.cells.filter(({r,c}) => !used[r][c]);
          if (otherAvail.length >= 3 && availCells.length >= 3) {
            isTL = true;
            // T/L 매치
            const allCells = [...new Set([...availCells, ...otherAvail].map(c => `${c.r},${c.c}`))].map(s => {
              const [r,c] = s.split(',').map(Number);
              return {r,c};
            });
            allCells.forEach(({r,c}) => { used[r][c] = true; });
            matches.push({ cells: allCells, type: run.type, matchType: 'TL', center: intersection });
            break;
          }
        }
      }
    }

    if (!isTL) {
      const finalCells = run.cells.filter(({r,c}) => !used[r][c]);
      if (finalCells.length >= 3) {
        finalCells.forEach(({r,c}) => { used[r][c] = true; });
        let matchType = 'match3';
        if (finalCells.length >= 5) matchType = 'match5';
        else if (finalCells.length === 4) matchType = 'match4';
        matches.push({ cells: finalCells, type: run.type, matchType, dir: run.dir });
      }
    }
  }

  return matches;
}

// --- 유효 이동 찾기 (BFS) ---
function findValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (!cell || !cell.type || cell.obstacle === OBS.STONE || cell.obstacle === OBS.POISON || cell.obstacle === OBS.WOOD) continue;
      if (cell.obstacle === OBS.CHAIN) continue; // 체인 보석은 이동 불가
      // 상하좌우 스왑 시도
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        const other = safeGridAccess(gGrid, nr, nc, ROWS, COLS);
        if (!other || !other.type || other.obstacle === OBS.STONE || other.obstacle === OBS.POISON || other.obstacle === OBS.WOOD) continue;
        if (other.obstacle === OBS.CHAIN) continue;
        // 임시 스왑
        [gGrid[r][c].type, gGrid[nr][nc].type] = [gGrid[nr][nc].type, gGrid[r][c].type];
        const hasMatch = findMatches().length > 0;
        [gGrid[r][c].type, gGrid[nr][nc].type] = [gGrid[nr][nc].type, gGrid[r][c].type];
        if (hasMatch) return { r, c, nr, nc };
      }
    }
  }
  return null;
}

// --- 보석 셔플 ---
function shuffleGems() {
  const gems = [];
  const positions = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (cell && cell.type && cell.obstacle !== OBS.STONE && cell.obstacle !== OBS.POISON && cell.obstacle !== OBS.WOOD) {
        gems.push(cell.type);
        positions.push({ r, c });
      }
    }
  }
  const shuffled = gRng.shuffle(gems);
  for (let i = 0; i < positions.length; i++) {
    const { r, c } = positions[i];
    gGrid[r][c].type = shuffled[i];
  }
  // 3매치 제거
  for (let pass = 0; pass < 100; pass++) {
    let found = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = gGrid[r][c];
        if (cell && cell.type && cell.obstacle !== OBS.STONE && hasMatchAt(r, c)) {
          cell.type = gRng.pick(GEM_TYPES);
          found = true;
        }
      }
    }
    if (!found) break;
  }
}

// --- 스왑 처리 ---
function trySwap(r1, c1, r2, c2) {
  if (isInputBlocked()) return;
  const cell1 = safeGridAccess(gGrid, r1, c1, ROWS, COLS);
  const cell2 = safeGridAccess(gGrid, r2, c2, ROWS, COLS);
  if (!cell1 || !cell2) return;
  if (!cell1.type || !cell2.type) return;
  if (cell1.obstacle === OBS.CHAIN || cell2.obstacle === OBS.CHAIN) return;
  if (cell1.obstacle === OBS.STONE || cell2.obstacle === OBS.STONE) return;
  if (cell1.obstacle === OBS.WOOD || cell2.obstacle === OBS.WOOD) return;

  // 스페셜 조합 체크
  if (cell1.special !== SPECIAL.NONE && cell2.special !== SPECIAL.NONE) {
    GUARDS.swapLocked = true;
    playSfx('swap');
    executeSpecialCombo(cell1, cell2);
    return;
  }

  // 임시 스왑
  [gGrid[r1][c1].type, gGrid[r2][c2].type] = [gGrid[r2][c2].type, gGrid[r1][c1].type];
  [gGrid[r1][c1].special, gGrid[r2][c2].special] = [gGrid[r2][c2].special, gGrid[r1][c1].special];
  const hasMatch = findMatches().length > 0;

  if (!hasMatch && cell1.special === SPECIAL.RAINBOW) {
    // 무지개 + 아무 보석 = 해당 색 전부 제거
    [gGrid[r1][c1].type, gGrid[r2][c2].type] = [gGrid[r2][c2].type, gGrid[r1][c1].type];
    [gGrid[r1][c1].special, gGrid[r2][c2].special] = [gGrid[r2][c2].special, gGrid[r1][c1].special];
    GUARDS.swapLocked = true;
    playSfx('swap');
    executeRainbow(cell1, cell2.type);
    return;
  }
  if (!hasMatch && cell2.special === SPECIAL.RAINBOW) {
    [gGrid[r1][c1].type, gGrid[r2][c2].type] = [gGrid[r2][c2].type, gGrid[r1][c1].type];
    [gGrid[r1][c1].special, gGrid[r2][c2].special] = [gGrid[r2][c2].special, gGrid[r1][c1].special];
    GUARDS.swapLocked = true;
    playSfx('swap');
    executeRainbow(cell2, cell1.type);
    return;
  }

  if (!hasMatch) {
    // 스왑 복귀
    [gGrid[r1][c1].type, gGrid[r2][c2].type] = [gGrid[r2][c2].type, gGrid[r1][c1].type];
    [gGrid[r1][c1].special, gGrid[r2][c2].special] = [gGrid[r2][c2].special, gGrid[r1][c1].special];
    // 복귀 애니메이션
    GUARDS.swapLocked = true;
    const sx1 = cell1.x, sy1 = cell1.y, sx2 = cell2.x, sy2 = cell2.y;
    tween.add(cell1, { x: sx2, y: sy2 }, 150, 'easeOut');
    tween.add(cell2, { x: sx1, y: sy1 }, 150, 'easeOut', () => {
      cell1.x = sx1; cell1.y = sy1;
      cell2.x = sx2; cell2.y = sy2;
      GUARDS.swapLocked = false;
    });
    return;
  }

  // 유효 스왑!
  GUARDS.swapLocked = true;
  playSfx('swap');
  gSwapFrom = { r: r1, c: c1 }; gSwapTo = { r: r2, c: c2 };
  // 스왑 애니메이션
  const sx1 = gBoardX + c1 * gCellSize, sy1 = gBoardY + r1 * gCellSize;
  const sx2 = gBoardX + c2 * gCellSize, sy2 = gBoardY + r2 * gCellSize;
  cell1.x = sx2; cell1.y = sy2;
  cell2.x = sx1; cell2.y = sy1;
  tween.add(cell1, { x: sx1, y: sy1 }, 150, 'easeOut');
  tween.add(cell2, { x: sx2, y: sy2 }, 150, 'easeOut', () => {
    updateCellPositions();
    gComboCount = 0;
    directTransition(STATE.ANIMATING);
    processMatches();
  });
}

// --- 매치 처리 + 캐스케이드 ---
function processMatches() {
  const matches = findMatches();
  if (matches.length === 0) {
    finishCascade();
    return;
  }
  gComboCount++;
  if (gComboCount > 1) playSfx('cascade');

  let totalScore = 0;
  const comboMultiplier = 1 + (gComboCount - 1) * 0.2;

  for (const match of matches) {
    let baseScore = SCORE_TABLE.match3;
    if (match.matchType === 'match5') { baseScore = SCORE_TABLE.match5; playSfx('match5'); }
    else if (match.matchType === 'TL') { baseScore = SCORE_TABLE.matchTL; playSfx('match4'); }
    else if (match.matchType === 'match4') { baseScore = SCORE_TABLE.match4; playSfx('match4'); }
    else playSfx('match3');

    totalScore += Math.round(baseScore * comboMultiplier);

    // 스페셜 보석 생성 위치
    let specialPos = match.cells[Math.floor(match.cells.length / 2)];
    if (gSwapTo && match.cells.some(c => c.r === gSwapTo.r && c.c === gSwapTo.c)) {
      specialPos = gSwapTo;
    }

    // 스페셜 생성
    if (match.matchType === 'match5') {
      const cell = safeGridAccess(gGrid, specialPos.r, specialPos.c, ROWS, COLS);
      if (cell) cell.special = SPECIAL.RAINBOW;
    } else if (match.matchType === 'TL') {
      const cell = safeGridAccess(gGrid, specialPos.r, specialPos.c, ROWS, COLS);
      if (cell) cell.special = SPECIAL.BOMB;
    } else if (match.matchType === 'match4') {
      const cell = safeGridAccess(gGrid, specialPos.r, specialPos.c, ROWS, COLS);
      if (cell) {
        // 스왑 방향에 따라 가로/세로
        cell.special = (match.dir === 'h') ? SPECIAL.LINE_H : SPECIAL.LINE_V;
      }
    }

    // 셀 제거 + 장애물 영향 + 목표 진행
    for (const { r, c } of match.cells) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (!cell) continue;
      // 스페셜 보석 발동
      if (cell.special !== SPECIAL.NONE && !(r === specialPos.r && c === specialPos.c)) {
        activateSpecial(cell);
      }
      // 젤리 처리
      if (cell.jelly > 0) {
        cell.jelly--;
        totalScore += cell.jelly > 0 ? SCORE_TABLE.jelly1 : SCORE_TABLE.jelly2;
        updateGoalProgress('jelly', 1);
      }
      // 목표 진행 (보석 수집)
      updateGoalProgress('collect', 1, cell.type);
      // 인접 장애물 영향
      processAdjacentObstacles(r, c, totalScore);
      // 제거 (스페셜 생성 위치는 보존)
      if (r === specialPos.r && c === specialPos.c && match.matchType !== 'match3') {
        // 스페셜 보석 유지
      } else {
        cell.type = null;
        cell.special = SPECIAL.NONE;
      }
      // 파티클 (스파클 텍스처 사용)
      const px = gBoardX + c * gCellSize + gCellSize / 2;
      const py = gBoardY + r * gCellSize + gCellSize / 2;
      // 매치 이펙트 오버레이
      emitEffect('effectMatchSequence', gBoardX + c * gCellSize, gBoardY + r * gCellSize, gCellSize, gCellSize, 300);
      particles.emit(px, py, 5, { color: GEM_COLORS[match.type] || '#fff', speed: 80, life: 0.4, size: 4,
        texture: assets.sprites['particleSparkle'] || null });
    }
  }

  gScore += totalScore;
  gSwapFrom = null; gSwapTo = null;

  // 낙하 → 리필 → 재매칭
  tween.add({ t: 0 }, { t: 1 }, 200, 'easeOut', () => {
    doGravity();
  });
}

// --- 인접 장애물 처리 ---
function processAdjacentObstacles(r, c) {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    const adj = safeGridAccess(gGrid, nr, nc, ROWS, COLS);
    if (!adj) continue;
    if (adj.obstacle === OBS.ICE && adj.obsLayer > 0) {
      adj.obsLayer--;
      if (adj.obsLayer === 0) {
        adj.obstacle = OBS.NONE;
        updateGoalProgress('ice', 1);
      }
      playSfx('obsBreak');
    } else if (adj.obstacle === OBS.WOOD && adj.obsLayer > 0) {
      adj.obsLayer--;
      if (adj.obsLayer === 0) {
        adj.obstacle = OBS.NONE;
        adj.type = gRng.pick(GEM_TYPES);
        updateGoalProgress('wood', 1);
      }
      playSfx('obsBreak');
    } else if (adj.obstacle === OBS.CURTAIN && adj.curtainHidden) {
      adj.obstacle = OBS.NONE;
      adj.curtainHidden = false;
      updateGoalProgress('curtain', 1);
      emitEffect('effectCurtainReveal', gBoardX + nc * gCellSize - 2, gBoardY + nr * gCellSize - 2, gCellSize + 4, gCellSize + 4, 400);
      playSfx('curtainReveal');
    } else if (adj.obstacle === OBS.POISON) {
      adj.obstacle = OBS.NONE;
      adj.type = gRng.pick(GEM_TYPES);
      updateGoalProgress('poison', 1);
      playSfx('obsBreak');
    }
  }
}

// --- 낙하 ---
function doGravity() {
  let fell = false;
  for (let c = 0; c < COLS; c++) {
    for (let r = ROWS - 1; r >= 0; r--) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (!cell || cell.obstacle === OBS.STONE || cell.obstacle === OBS.WOOD) continue;
      if (cell.type !== null) continue;
      // 위에서 보석 찾기
      for (let above = r - 1; above >= 0; above--) {
        const upper = safeGridAccess(gGrid, above, c, ROWS, COLS);
        if (!upper) continue;
        if (upper.obstacle === OBS.STONE || upper.obstacle === OBS.WOOD) break;
        if (upper.type !== null) {
          cell.type = upper.type;
          cell.special = upper.special;
          upper.type = null;
          upper.special = SPECIAL.NONE;
          fell = true;
          break;
        }
      }
    }
  }
  // 빈 칸 리필
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (cell && cell.type === null && cell.obstacle !== OBS.STONE && cell.obstacle !== OBS.WOOD && cell.obstacle !== OBS.POISON) {
        cell.type = gRng.pick(GEM_TYPES);
        cell.special = SPECIAL.NONE;
        fell = true;
      }
    }
  }

  updateCellPositions();

  // 재매칭 체크
  tween.add({ t: 0 }, { t: 1 }, 250, 'easeOut', () => {
    const newMatches = findMatches();
    if (newMatches.length > 0) {
      processMatches();
    } else {
      finishCascade();
    }
  });
}

// --- 캐스케이드 종료 ---
function finishCascade() {
  GUARDS.swapLocked = false;
  GUARDS.cascadeInProgress = false;
  GUARDS.resolving = false;

  // 독 확산 (캐스케이드 완료 후에만)
  spreadPoison();

  // 턴 감소
  gTurnsLeft--;

  // 데드락 체크
  if (!findValidMove()) {
    shuffleGems();
    updateCellPositions();
  }

  // 목표 체크
  directTransition(STATE.GOAL_CHECK);
}

// --- 독 확산 (DDA 극단 레벨 주기 보정) ---
function spreadPoison() {
  // DDA 극단 레벨: 독 확산 주기 연장
  const hardAdj = gCurrentLevel ? DDA.getHardLevelAdjustment(gCurrentLevel.id) : null;
  if (hardAdj && hardAdj.poisonSpreadInterval > 1) {
    gPoisonSpreadCounter++;
    if (gPoisonSpreadCounter % hardAdj.poisonSpreadInterval !== 0) return;
  }
  const poisonCells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (cell && cell.obstacle === OBS.POISON) poisonCells.push({ r, c });
    }
  }
  if (poisonCells.length === 0) return;

  // 각 독에서 인접 빈 칸 1개로 확산
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const { r, c } of poisonCells) {
    const shuffledDirs = gRng.shuffle([...dirs]);
    for (const [dr, dc] of shuffledDirs) {
      const nr = r + dr, nc = c + dc;
      const adj = safeGridAccess(gGrid, nr, nc, ROWS, COLS);
      if (adj && adj.type && adj.obstacle === OBS.NONE && adj.obstacle !== OBS.STONE) {
        adj.obstacle = OBS.POISON;
        adj.type = null;
        playSfx('poisonSpread');
        emitEffect('effectPoisonSpread', gBoardX + nc * gCellSize - 2, gBoardY + nr * gCellSize - 2, gCellSize + 4, gCellSize + 4, 500);
        particles.emit(gBoardX + nc * gCellSize + gCellSize / 2, gBoardY + nr * gCellSize + gCellSize / 2, 3, { color: '#AF52DE', speed: 40, life: 0.6 });
        break;
      }
    }
  }
}

// --- 스페셜 보석 발동 ---
function activateSpecial(cell) {
  if (!cell || cell.special === SPECIAL.NONE) return;
  const spec = cell.special;
  cell.special = SPECIAL.NONE;
  const r = cell.r, c = cell.c;

  if (spec === SPECIAL.LINE_H) {
    // 레이저 이펙트 오버레이
    emitEffect('effectLineLaser', gBoardX, gBoardY + r * gCellSize, gBoardW, gCellSize, 500);
    for (let cc = 0; cc < COLS; cc++) {
      const target = safeGridAccess(gGrid, r, cc, ROWS, COLS);
      if (target && target.type && target.obstacle !== OBS.STONE) {
        processAdjacentObstacles(r, cc);
        if (target.jelly > 0) { target.jelly--; updateGoalProgress('jelly', 1); }
        if (target !== cell) { target.type = null; target.special = SPECIAL.NONE; }
        gScore += 30;
        particles.emit(gBoardX + cc * gCellSize + gCellSize / 2, gBoardY + r * gCellSize + gCellSize / 2, 3, {
          color: '#FFD700', speed: 60, life: 0.3, texture: assets.sprites['particleSparkle'] || null
        });
      }
    }
    playSfx('specialCombo');
  } else if (spec === SPECIAL.LINE_V) {
    // 세로 레이저 이펙트 오버레이
    emitEffect('effectLineLaser', gBoardX + c * gCellSize, gBoardY, gCellSize, gBoardH, 500);
    for (let rr = 0; rr < ROWS; rr++) {
      const target = safeGridAccess(gGrid, rr, c, ROWS, COLS);
      if (target && target.type && target.obstacle !== OBS.STONE) {
        processAdjacentObstacles(rr, c);
        if (target.jelly > 0) { target.jelly--; updateGoalProgress('jelly', 1); }
        if (target !== cell) { target.type = null; target.special = SPECIAL.NONE; }
        gScore += 30;
        particles.emit(gBoardX + c * gCellSize + gCellSize / 2, gBoardY + rr * gCellSize + gCellSize / 2, 3, {
          color: '#FFD700', speed: 60, life: 0.3, texture: assets.sprites['particleSparkle'] || null
        });
      }
    }
    playSfx('specialCombo');
  } else if (spec === SPECIAL.BOMB) {
    // 폭탄 충격파 이펙트
    const bx = gBoardX + c * gCellSize - gCellSize;
    const by = gBoardY + r * gCellSize - gCellSize;
    emitEffect('effectBombShockwave', bx, by, gCellSize * 3, gCellSize * 3, 600);
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        const target = safeGridAccess(gGrid, nr, nc, ROWS, COLS);
        if (target && target.obstacle !== OBS.STONE) {
          processAdjacentObstacles(nr, nc);
          if (target.jelly > 0) { target.jelly--; updateGoalProgress('jelly', 1); }
          if (target.type && target !== cell) { target.type = null; target.special = SPECIAL.NONE; }
          gScore += 20;
        }
      }
    }
    particles.emit(gBoardX + c * gCellSize + gCellSize / 2, gBoardY + r * gCellSize + gCellSize / 2, 15, {
      color: '#FF8C00', speed: 120, life: 0.5, size: 5, texture: assets.sprites['particleFirework'] || null
    });
    playSfx('specialCombo');
  }
}

// --- 무지개 보석 발동 ---
function executeRainbow(cell, targetType) {
  GUARDS.colorBombResolving = true;
  // 무지개 전파 이펙트
  emitEffect('effectRainbowWave', gBoardX + cell.c * gCellSize - gCellSize, gBoardY + cell.r * gCellSize - gCellSize, gCellSize * 3, gCellSize * 3, 600);
  cell.type = null;
  cell.special = SPECIAL.NONE;
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const target = safeGridAccess(gGrid, r, c, ROWS, COLS);
      if (target && target.type === targetType) {
        if (target.special !== SPECIAL.NONE) activateSpecial(target);
        target.type = null;
        target.special = SPECIAL.NONE;
        count++;
        particles.emit(gBoardX + c * gCellSize + gCellSize / 2, gBoardY + r * gCellSize + gCellSize / 2, 4, { color: GEM_COLORS[targetType], speed: 80, life: 0.4 });
        updateGoalProgress('collect', 1, targetType);
      }
    }
  }
  gScore += count * 100;
  playSfx('match5');
  tween.add({ t: 0 }, { t: 1 }, 400, 'easeOut', () => {
    GUARDS.colorBombResolving = false;
    gTurnsLeft--;
    doGravity();
  });
}

// --- 스페셜 조합 ---
function executeSpecialCombo(cell1, cell2) {
  const s1 = cell1.special, s2 = cell2.special;
  cell1.special = SPECIAL.NONE; cell2.special = SPECIAL.NONE;
  cell1.type = null; cell2.type = null;

  if ((s1 === SPECIAL.RAINBOW && s2 === SPECIAL.RAINBOW)) {
    // 전체 보드 파괴
    gScore += SPECIAL_COMBO_SCORE.rainbowRainbow;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = safeGridAccess(gGrid, r, c, ROWS, COLS);
        if (t && t.type && t.obstacle !== OBS.STONE) {
          t.type = null; t.special = SPECIAL.NONE;
          particles.emit(gBoardX + c * gCellSize + gCellSize / 2, gBoardY + r * gCellSize + gCellSize / 2, 3, { color: GEM_COLORS[gRng.pick(GEM_TYPES)], speed: 100, life: 0.5 });
        }
      }
    }
    playSfx('match5');
  } else if ((s1 === SPECIAL.BOMB && s2 === SPECIAL.BOMB)) {
    // 5×5 파괴
    gScore += SPECIAL_COMBO_SCORE.bombBomb;
    const cr = cell1.r, cc = cell1.c;
    for (let dr = -2; dr <= 2; dr++) {
      for (let dc = -2; dc <= 2; dc++) {
        const t = safeGridAccess(gGrid, cr+dr, cc+dc, ROWS, COLS);
        if (t && t.obstacle !== OBS.STONE) {
          processAdjacentObstacles(cr+dr, cc+dc);
          if (t.type) { t.type = null; t.special = SPECIAL.NONE; }
        }
      }
    }
    playSfx('specialCombo');
  } else if ((s1 === SPECIAL.LINE_H || s1 === SPECIAL.LINE_V) && (s2 === SPECIAL.LINE_H || s2 === SPECIAL.LINE_V)) {
    // 십자 파괴
    gScore += SPECIAL_COMBO_SCORE.lineLine;
    const cr = cell1.r, cc = cell1.c;
    for (let i = 0; i < COLS; i++) {
      const t = safeGridAccess(gGrid, cr, i, ROWS, COLS);
      if (t && t.obstacle !== OBS.STONE && t.type) { t.type = null; t.special = SPECIAL.NONE; }
    }
    for (let i = 0; i < ROWS; i++) {
      const t = safeGridAccess(gGrid, i, cc, ROWS, COLS);
      if (t && t.obstacle !== OBS.STONE && t.type) { t.type = null; t.special = SPECIAL.NONE; }
    }
    playSfx('specialCombo');
  } else {
    // 기타 조합 — 간소화 처리
    gScore += 400;
    activateSpecial({ ...cell1, special: s1, r: cell1.r, c: cell1.c });
    activateSpecial({ ...cell2, special: s2, r: cell2.r, c: cell2.c });
  }

  gTurnsLeft--;
  tween.add({ t: 0 }, { t: 1 }, 400, 'easeOut', () => {
    GUARDS.swapLocked = false;
    doGravity();
  });
}

// ═══════════════════════════════════════════════════════════════════
// §8. 목표 시스템
// ═══════════════════════════════════════════════════════════════════

function initGoalProgress(level) {
  gGoalProgress = {};
  gAdjustedGoalTargets = {};
  const goal = level.goal;
  // ddaOverride에서 goalReductionCap 반영
  const reductionCap = (level.ddaOverride && level.ddaOverride.goalReductionCap) || 1.0;
  const adjustGoal = (base) => {
    const adjusted = DDA.getAdjustedGoal(base);
    const minAllowed = Math.max(1, Math.ceil(base * (1 - reductionCap)));
    return Math.max(adjusted, minAllowed);
  };
  if (goal.type === 'score') {
    gGoalProgress.score = 0;
    gAdjustedGoalTargets.score = adjustGoal(goal.target);
  } else if (goal.type === 'collect') {
    for (const t of goal.targets) {
      gGoalProgress[`collect_${t.gem}`] = 0;
      gAdjustedGoalTargets[`collect_${t.gem}`] = adjustGoal(t.count);
    }
  } else if (goal.type === 'obstacle') {
    for (const t of goal.targets) {
      gGoalProgress[`obs_${t.obs}`] = 0;
      gAdjustedGoalTargets[`obs_${t.obs}`] = adjustGoal(t.count);
    }
  } else if (goal.type === 'jelly') {
    for (const t of goal.targets) {
      gGoalProgress[`obs_${t.obs}`] = 0;
      gAdjustedGoalTargets[`obs_${t.obs}`] = adjustGoal(t.count);
    }
  } else if (goal.type === 'mixed') {
    for (const t of goal.targets) {
      if (t.gem) { gGoalProgress[`collect_${t.gem}`] = 0; gAdjustedGoalTargets[`collect_${t.gem}`] = adjustGoal(t.count); }
      if (t.obs) { gGoalProgress[`obs_${t.obs}`] = 0; gAdjustedGoalTargets[`obs_${t.obs}`] = adjustGoal(t.count); }
      if (t.type === 'score') { gGoalProgress.score = 0; gAdjustedGoalTargets.score = adjustGoal(t.target); }
    }
  }
}

function updateGoalProgress(type, amount, subType) {
  if (type === 'collect' && subType) {
    const key = `collect_${subType}`;
    if (gGoalProgress[key] !== undefined) gGoalProgress[key] += amount;
    // 'any' 타입
    if (gGoalProgress['collect_any'] !== undefined) gGoalProgress['collect_any'] += amount;
  } else if (type === 'ice' || type === 'chain' || type === 'wood' || type === 'curtain' || type === 'poison' || type === 'jelly') {
    const key = `obs_${type}`;
    if (gGoalProgress[key] !== undefined) gGoalProgress[key] += amount;
  }
}

function checkGoals() {
  if (!gCurrentLevel) { directTransition(STATE.PLAY); return; }
  gGoalProgress.score = gScore;
  const goal = gCurrentLevel.goal;
  let allDone = true;

  // DDA 조정된 목표값 사용
  if (goal.type === 'score') {
    const target = gAdjustedGoalTargets.score || goal.target;
    if (gScore < target) allDone = false;
  } else if (goal.type === 'collect') {
    for (const t of goal.targets) {
      const target = gAdjustedGoalTargets[`collect_${t.gem}`] || t.count;
      if ((gGoalProgress[`collect_${t.gem}`] || 0) < target) allDone = false;
    }
  } else if (goal.type === 'obstacle' || goal.type === 'jelly') {
    for (const t of goal.targets) {
      const target = gAdjustedGoalTargets[`obs_${t.obs}`] || t.count;
      if ((gGoalProgress[`obs_${t.obs}`] || 0) < target) allDone = false;
    }
  } else if (goal.type === 'mixed') {
    for (const t of goal.targets) {
      if (t.gem) { const target = gAdjustedGoalTargets[`collect_${t.gem}`] || t.count; if ((gGoalProgress[`collect_${t.gem}`] || 0) < target) allDone = false; }
      if (t.obs) { const target = gAdjustedGoalTargets[`obs_${t.obs}`] || t.count; if ((gGoalProgress[`obs_${t.obs}`] || 0) < target) allDone = false; }
      if (t.type === 'score') { const target = gAdjustedGoalTargets.score || t.target; if (gScore < target) allDone = false; }
    }
  }

  GUARDS.goalChecking = false;

  if (allDone) {
    // 별 계산
    const turnsRatio = gTurnsLeft / gCurrentLevel.turns;
    gResultStars = 1;
    if (turnsRatio > 0.33) gResultStars = 2;
    if (turnsRatio > 0.66) gResultStars = 3;
    if (gCurrentLevel.star3 > 0 && gScore >= gCurrentLevel.star3) gResultStars = 3;
    gResultBonusLevel = !!gCurrentLevel.bonus;
    directTransition(STATE.CLEAR_ANIM);
  } else if (gTurnsLeft <= 0) {
    // 추가 턴 부스터 체크
    if (gSaveData.boosters.extraTurns > 0) {
      gExtraTurnPrompt = true;
      directTransition(STATE.PLAY);
    } else {
      directTransition(STATE.FAIL_ANIM);
    }
  } else {
    directTransition(STATE.PLAY);
  }
}

// ═══════════════════════════════════════════════════════════════════
// §9. 부스터 시스템
// ═══════════════════════════════════════════════════════════════════
let gActiveBooster = -1;

function activateBooster(idx) {
  if (isInputBlocked()) return;
  if (gState === STATE.MINI_GAME) return;
  if (gSaveData.boosters[BOOSTER_KEYS[idx]] <= 0) return;

  if (idx === BOOSTER.SHUFFLE) {
    gSaveData.boosters.shuffle--;
    saveGame();
    shuffleGems();
    updateCellPositions();
    playSfx('boosterActivate');
    return;
  }
  if (idx === BOOSTER.EXTRA_TURNS) {
    gSaveData.boosters.extraTurns--;
    saveGame();
    gTurnsLeft += 5;
    playSfx('boosterActivate');
    return;
  }

  gActiveBooster = idx;
  GUARDS.boosterActive = true;
  directTransition(STATE.BOOSTING);
  playSfx('boosterActivate');
}

function useBoosterOnCell(r, c) {
  const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
  if (!cell) { cancelBooster(); return; }

  if (gActiveBooster === BOOSTER.HAMMER) {
    if (cell.obstacle === OBS.STONE) {
      // 파괴 불가 — 부스터 미소모
      cancelBooster();
      return;
    }
    gSaveData.boosters.hammer--;
    saveGame();
    if (cell.obstacle === OBS.ICE && cell.obsLayer > 0) {
      cell.obsLayer--;
      if (cell.obsLayer === 0) { cell.obstacle = OBS.NONE; updateGoalProgress('ice', 1); }
    } else if (cell.obstacle === OBS.WOOD && cell.obsLayer > 0) {
      cell.obsLayer--;
      if (cell.obsLayer === 0) { cell.obstacle = OBS.NONE; cell.type = gRng.pick(GEM_TYPES); updateGoalProgress('wood', 1); }
    } else if (cell.obstacle === OBS.CURTAIN) {
      cell.obstacle = OBS.NONE; cell.curtainHidden = false;
      updateGoalProgress('curtain', 1);
    } else if (cell.obstacle === OBS.CHAIN) {
      cell.obstacle = OBS.NONE;
      updateGoalProgress('chain', 1);
    } else if (cell.obstacle === OBS.POISON) {
      cell.obstacle = OBS.NONE; cell.type = gRng.pick(GEM_TYPES);
      updateGoalProgress('poison', 1);
    } else if (cell.type) {
      if (cell.special !== SPECIAL.NONE) activateSpecial(cell);
      cell.type = null; cell.special = SPECIAL.NONE;
    }
    playSfx('obsBreak');
    particles.emit(gBoardX + c * gCellSize + gCellSize / 2, gBoardY + r * gCellSize + gCellSize / 2, 8, { color: '#FFD700', speed: 100, life: 0.5 });
  } else if (gActiveBooster === BOOSTER.COLOR_BOMB) {
    if (!cell.type) { cancelBooster(); return; }
    gSaveData.boosters.colorBomb--;
    saveGame();
    const targetType = cell.type;
    GUARDS.colorBombResolving = true;
    for (let rr = 0; rr < ROWS; rr++) {
      for (let cc = 0; cc < COLS; cc++) {
        const t = safeGridAccess(gGrid, rr, cc, ROWS, COLS);
        if (t && t.type === targetType) {
          if (t.special !== SPECIAL.NONE) activateSpecial(t);
          t.type = null; t.special = SPECIAL.NONE;
          particles.emit(gBoardX + cc * gCellSize + gCellSize / 2, gBoardY + rr * gCellSize + gCellSize / 2, 4, { color: GEM_COLORS[targetType], speed: 80, life: 0.4 });
        }
      }
    }
    playSfx('match5');
    GUARDS.colorBombResolving = false;
  }

  gActiveBooster = -1;
  GUARDS.boosterActive = false;

  tween.add({ t: 0 }, { t: 1 }, 300, 'easeOut', () => {
    doGravity();
  });
}

function cancelBooster() {
  gActiveBooster = -1;
  GUARDS.boosterActive = false;
  if (gState === STATE.BOOSTING) directTransition(STATE.PLAY);
}

// ═══════════════════════════════════════════════════════════════════
// §10. DDA (Dynamic Difficulty Adjustment)
// ═══════════════════════════════════════════════════════════════════
const DDA = {
  onLevelFail() {
    gSaveData.dda.failStreak = Math.min((gSaveData.dda.failStreak || 0) + 1, 3);
    saveGame();
  },
  onLevelClear() {
    gSaveData.dda.failStreak = Math.max((gSaveData.dda.failStreak || 0) - 1, 0);
    saveGame();
  },
  // === 기본 DDA (전 레벨) ===
  getAdjustedTurns(base) { return base + (gSaveData.dda.failStreak || 0) * 2; },
  getAdjustedGoal(base) { return Math.max(1, base - (gSaveData.dda.failStreak || 0) * 2); },
  shouldOfferFreeShuffle() { return (gSaveData.dda.failStreak || 0) >= 2; },
  shouldOfferFreeBooster() { return (gSaveData.dda.failStreak || 0) >= 3; },
  // === 극단 레벨 전용 DDA (Lv.17+) ===
  getHardLevelAdjustment(levelId) {
    const fs = gSaveData.dda.failStreak || 0;
    if (levelId < 17 || fs < 2) return null;
    return {
      obstacleReduction: Math.floor(fs * 0.2 * 100) / 100,
      poisonSpreadInterval: fs >= 3 ? 2 : 1,
      extraBooster: fs >= 3 ? 'hammer' : null
    };
  },
  // ★ 미니게임 DDA (신규)
  getMiniGameAdjustment(miniId) {
    const fs = gSaveData.dda.failStreak || 0;
    if (fs < 1) return null;
    return {
      extraTime: fs * 5000,
      reducedDifficulty: fs >= 2
    };
  }
};

// ═══════════════════════════════════════════════════════════════════
// §11. 미니게임 시스템 (4종)
// ═══════════════════════════════════════════════════════════════════

function initMiniGame(type) {
  gMiniTimer = 30000;
  gMiniSuccess = false;
  gMiniStars = 0;
  gMiniGrid = [];
  gMiniSelected = null;

  // DDA 미니게임 보정 적용
  const miniAdj = DDA.getMiniGameAdjustment(type);
  if (miniAdj) {
    gMiniTimer += miniAdj.extraTime;  // 연패당 +5초
  }

  // 4x4 미니 보드 생성
  for (let r = 0; r < MINI_ROWS; r++) {
    gMiniGrid[r] = [];
    for (let c = 0; c < MINI_COLS; c++) {
      gMiniGrid[r][c] = createCell(gRng.pick(MINI_GEM_TYPES), r, c);
    }
  }
  // 3매치 제거
  for (let pass = 0; pass < 100; pass++) {
    let found = false;
    for (let r = 0; r < MINI_ROWS; r++) {
      for (let c = 0; c < MINI_COLS; c++) {
        if (hasMiniMatchAt(r, c)) {
          gMiniGrid[r][c].type = gRng.pick(MINI_GEM_TYPES);
          found = true;
        }
      }
    }
    if (!found) break;
  }

  switch (type) {
    case 1: // 물 상승 탈출
      gMiniData = { waterLevel: 0, kingHeight: 0, targetHeight: 20, platformCount: 0,
        waterSpeedMult: (miniAdj && miniAdj.reducedDifficulty) ? 0.7 : 1.0 };
      break;
    case 2: // 불길 회피
      gMiniData = { kingLane: 1, kingHp: (miniAdj && miniAdj.reducedDifficulty) ? 4 : 3, fires: [], fireTimer: 0, distance: 0 };
      break;
    case 3: // 함정 미로
      gMiniData = { maze: generateMaze(5, 5), kingPos: { r: 0, c: 0 }, exitPos: { r: 4, c: 4 }, wallsDestroyed: 0 };
      break;
    case 4: // 드래곤 보스
      { const hp = (miniAdj && miniAdj.reducedDifficulty) ? 15 : 20;
        gMiniData = { dragonHp: hp, maxHp: hp, attackTimer: 0, attackInterval: 3000, phase: 1 }; }
      break;
  }
}

function hasMiniMatchAt(r, c) {
  const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
  if (!cell || !cell.type) return false;
  const t = cell.type;
  if (c >= 2) {
    const c1 = safeGridAccess(gMiniGrid, r, c-1, MINI_ROWS, MINI_COLS);
    const c2 = safeGridAccess(gMiniGrid, r, c-2, MINI_ROWS, MINI_COLS);
    if (c1 && c2 && c1.type === t && c2.type === t) return true;
  }
  if (r >= 2) {
    const r1 = safeGridAccess(gMiniGrid, r-1, c, MINI_ROWS, MINI_COLS);
    const r2 = safeGridAccess(gMiniGrid, r-2, c, MINI_ROWS, MINI_COLS);
    if (r1 && r2 && r1.type === t && r2.type === t) return true;
  }
  return false;
}

function findMiniMatches() {
  const matches = [];
  const used = [];
  for (let r = 0; r < MINI_ROWS; r++) { used[r] = []; for (let c = 0; c < MINI_COLS; c++) used[r][c] = false; }

  // 가로
  for (let r = 0; r < MINI_ROWS; r++) {
    let start = 0;
    for (let c = 1; c <= MINI_COLS; c++) {
      const prev = safeGridAccess(gMiniGrid, r, c-1, MINI_ROWS, MINI_COLS);
      const cur = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (c < MINI_COLS && cur && prev && cur.type && cur.type === prev.type) continue;
      if (c - start >= 3) {
        const cells = [];
        for (let cc = start; cc < c; cc++) { cells.push({r,c:cc}); used[r][cc] = true; }
        matches.push({ cells, type: prev.type, len: c - start });
      }
      start = c;
    }
  }
  // 세로
  for (let c = 0; c < MINI_COLS; c++) {
    let start = 0;
    for (let r = 1; r <= MINI_ROWS; r++) {
      const prev = safeGridAccess(gMiniGrid, r-1, c, MINI_ROWS, MINI_COLS);
      const cur = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (r < MINI_ROWS && cur && prev && cur.type && cur.type === prev.type) continue;
      if (r - start >= 3) {
        const cells = [];
        for (let rr = start; rr < r; rr++) { if (!used[rr][c]) cells.push({r:rr,c}); }
        if (cells.length >= 3) matches.push({ cells, type: prev.type, len: r - start });
      }
      start = r;
    }
  }
  return matches;
}

function processMiniMatches() {
  const matches = findMiniMatches();
  if (matches.length === 0) return 0;

  let totalMatched = 0;
  for (const match of matches) {
    for (const {r,c} of match.cells) {
      const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (cell) {
        cell.type = null;
        totalMatched++;
      }
    }
    // 미니게임별 효과
    applyMiniMatchEffect(match);
  }

  // 낙하 + 리필
  doMiniGravity();
  return totalMatched;
}

function doMiniGravity() {
  for (let c = 0; c < MINI_COLS; c++) {
    for (let r = MINI_ROWS - 1; r >= 0; r--) {
      const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (!cell || cell.type !== null) continue;
      for (let above = r - 1; above >= 0; above--) {
        const upper = safeGridAccess(gMiniGrid, above, c, MINI_ROWS, MINI_COLS);
        if (upper && upper.type !== null) {
          cell.type = upper.type;
          upper.type = null;
          break;
        }
      }
    }
  }
  // 리필
  for (let c = 0; c < MINI_COLS; c++) {
    for (let r = 0; r < MINI_ROWS; r++) {
      const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
      if (cell && cell.type === null) cell.type = gRng.pick(MINI_GEM_TYPES);
    }
  }
  // 연쇄 매칭
  const more = findMiniMatches();
  if (more.length > 0) {
    processMiniMatches();
  }
}

function applyMiniMatchEffect(match) {
  const type = gMiniType;
  if (type === 1) {
    // 물 탈출: 매칭 → 플랫폼 생성 → 왕 상승
    gMiniData.platformCount += match.cells.length;
    gMiniData.kingHeight = Math.min(gMiniData.kingHeight + match.cells.length, 30);
  } else if (type === 2) {
    // 불길 회피: 매칭 → 물 폭탄 → 불길 제거
    if (gMiniData.fires.length > 0) {
      gMiniData.fires.shift();
    }
  } else if (type === 3) {
    // 함정 미로: 매칭 → 벽 파괴
    const wallsToBreak = match.len >= 4 ? 2 : 1;
    destroyMazeWalls(wallsToBreak, match.type);
  } else if (type === 4) {
    // 드래곤: 매칭 → 데미지
    let dmg = 1;
    if (match.len === 4) dmg = 3;
    if (match.len >= 5) dmg = 5;
    gMiniData.dragonHp = Math.max(0, gMiniData.dragonHp - dmg);
    playSfx('obsBreak');
  }
}

function generateMaze(w, h) {
  // 간단한 미로 생성 (DFS)
  const maze = [];
  for (let r = 0; r < h; r++) {
    maze[r] = [];
    for (let c = 0; c < w; c++) {
      maze[r][c] = { walls: { top: true, right: true, bottom: true, left: true }, visited: false };
    }
  }
  const stack = [{ r: 0, c: 0 }];
  maze[0][0].visited = true;
  while (stack.length > 0) {
    const { r, c } = stack[stack.length - 1];
    const neighbors = [];
    if (r > 0 && !maze[r-1][c].visited) neighbors.push({ r: r-1, c, dir: 'top', opp: 'bottom' });
    if (r < h-1 && !maze[r+1][c].visited) neighbors.push({ r: r+1, c, dir: 'bottom', opp: 'top' });
    if (c > 0 && !maze[r][c-1].visited) neighbors.push({ r, c: c-1, dir: 'left', opp: 'right' });
    if (c < w-1 && !maze[r][c+1].visited) neighbors.push({ r, c: c+1, dir: 'right', opp: 'left' });
    if (neighbors.length === 0) { stack.pop(); continue; }
    const next = neighbors[gRng.randInt(0, neighbors.length - 1)];
    maze[r][c].walls[next.dir] = false;
    maze[next.r][next.c].walls[next.opp] = false;
    maze[next.r][next.c].visited = true;
    stack.push({ r: next.r, c: next.c });
  }
  // 랜덤 벽 추가 (난이도)
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      if (gRng.next() < 0.3) {
        const dirs = ['top','right','bottom','left'];
        const d = gRng.pick(dirs);
        maze[r][c].walls[d] = true;
      }
    }
  }
  return maze;
}

function destroyMazeWalls(count, gemType) {
  if (!gMiniData.maze) return;
  const dirMap = { ruby: 'left', sapphire: 'right', emerald: 'top', topaz: 'bottom' };
  const dir = dirMap[gemType] || 'top';
  const pos = gMiniData.kingPos;
  for (let i = 0; i < count; i++) {
    if (gMiniData.maze[pos.r] && gMiniData.maze[pos.r][pos.c]) {
      gMiniData.maze[pos.r][pos.c].walls[dir] = false;
      gMiniData.wallsDestroyed++;
    }
  }
  // BFS로 왕 자동 이동
  autoMoveKing();
}

function autoMoveKing() {
  if (!gMiniData.maze) return;
  const maze = gMiniData.maze;
  const start = gMiniData.kingPos;
  const end = gMiniData.exitPos;
  // BFS
  const visited = [];
  for (let r = 0; r < 5; r++) { visited[r] = []; for (let c = 0; c < 5; c++) visited[r][c] = false; }
  const queue = [{ r: start.r, c: start.c, path: [] }];
  visited[start.r][start.c] = true;
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.r === end.r && cur.c === end.c) {
      if (cur.path.length > 0) {
        gMiniData.kingPos = cur.path[0];
      }
      return;
    }
    const cell = maze[cur.r][cur.c];
    const dirs = [
      { dr: -1, dc: 0, wall: 'top' },
      { dr: 1, dc: 0, wall: 'bottom' },
      { dr: 0, dc: -1, wall: 'left' },
      { dr: 0, dc: 1, wall: 'right' }
    ];
    for (const d of dirs) {
      const nr = cur.r + d.dr, nc = cur.c + d.dc;
      if (nr < 0 || nr >= 5 || nc < 0 || nc >= 5) continue;
      if (visited[nr][nc]) continue;
      if (cell.walls[d.wall]) continue;
      visited[nr][nc] = true;
      queue.push({ r: nr, c: nc, path: [...cur.path, { r: nr, c: nc }] });
    }
  }
}

// --- 미니게임 업데이트 ---
function updateMiniGame(dt) {
  gMiniTimer -= dt;
  if (gMiniTimer <= 0) {
    gMiniTimer = 0;
    endMiniGame(false);
    return;
  }

  const type = gMiniType;

  if (type === 1) {
    // 물 상승 (DDA reducedDifficulty 시 느리게)
    gMiniData.waterLevel += dt / 1000 * (gMiniData.waterSpeedMult || 1.0);
    if (gMiniData.kingHeight >= gMiniData.targetHeight) {
      endMiniGame(true);
      return;
    }
    if (gMiniData.waterLevel >= gMiniData.kingHeight) {
      endMiniGame(false);
      return;
    }
  } else if (type === 2) {
    // 불길 회피
    gMiniData.fireTimer += dt;
    if (gMiniData.fireTimer > 1500) {
      gMiniData.fireTimer = 0;
      const lane = gRng.randInt(0, 2);
      gMiniData.fires.push({ lane, y: 0 });
    }
    // 불길 이동
    for (let i = gMiniData.fires.length - 1; i >= 0; i--) {
      gMiniData.fires[i].y += dt * 0.15;
      if (gMiniData.fires[i].y > 1) {
        // 피격 체크
        if (gMiniData.fires[i].lane === gMiniData.kingLane) {
          gMiniData.kingHp--;
          playSfx('obsBreak');
        }
        gMiniData.fires.splice(i, 1);
      }
    }
    if (gMiniData.kingHp <= 0) { endMiniGame(false); return; }
  } else if (type === 3) {
    // 미로: 자동 이동은 매칭 시에만
    if (gMiniData.kingPos.r === gMiniData.exitPos.r && gMiniData.kingPos.c === gMiniData.exitPos.c) {
      endMiniGame(true);
      return;
    }
  } else if (type === 4) {
    // 드래곤 보스
    gMiniData.attackTimer += dt;
    const interval = gMiniData.dragonHp > 10 ? 3000 : 2000;
    if (gMiniData.attackTimer >= interval) {
      gMiniData.attackTimer = 0;
      // 드래곤 반격: 보드에 얼음 추가
      const iceCount = gMiniData.dragonHp > 10 ? 1 : gRng.randInt(1, 2);
      for (let i = 0; i < iceCount; i++) {
        const r = gRng.randInt(0, MINI_ROWS - 1);
        const c = gRng.randInt(0, MINI_COLS - 1);
        const cell = safeGridAccess(gMiniGrid, r, c, MINI_ROWS, MINI_COLS);
        if (cell && cell.type && cell.obstacle === OBS.NONE) {
          cell.obstacle = OBS.ICE;
          cell.obsLayer = 1;
        }
      }
      playSfx('dragonRoar');
    }
    if (gMiniData.dragonHp <= 0) { endMiniGame(true); return; }
  }

  // 미니보드 입력 처리
  handleMiniInput();
}

function endMiniGame(success) {
  gMiniSuccess = success;
  if (success) {
    const timeUsed = 30000 - gMiniTimer;
    if (timeUsed <= 15000) gMiniStars = 3;
    else if (timeUsed <= 20000) gMiniStars = 2;
    else gMiniStars = 1;
    // 보상
    if (gMiniStars >= 1) gSaveData.boosters.hammer++;
    if (gMiniStars >= 2) { gSaveData.boosters.shuffle++; gSaveData.boosters.extraTurns++; }
    if (gMiniStars >= 3) gSaveData.boosters.colorBomb++;
    gSaveData.miniGameResults[`mini${gMiniType}`] = gMiniStars;
    playSfx('kingRescue');
  } else {
    gMiniStars = 0;
    playSfx('levelFail');
  }
  saveGame();
  GUARDS.miniGameActive = false;
  directTransition(STATE.MINI_RESULT);
}

let gMiniSelected = null;
function handleMiniInput() {
  if (!input.tapped) return;
  const tx = input.tapX, ty = input.tapY;
  // 미니보드 영역 계산
  const w = engine.W, h = engine.H;
  const miniCellSize = Math.min((w - 40) / MINI_COLS, (h * 0.4) / MINI_ROWS);
  const miniW = miniCellSize * MINI_COLS;
  const miniH = miniCellSize * MINI_ROWS;
  const miniX = (w - miniW) / 2;
  const miniY = h - miniH - 20;

  // 불길 회피: 왕 이동
  if (gMiniType === 2) {
    if (ty < miniY) {
      if (tx < w / 3) gMiniData.kingLane = Math.max(0, gMiniData.kingLane - 1);
      else if (tx > w * 2 / 3) gMiniData.kingLane = Math.min(2, gMiniData.kingLane + 1);
      return;
    }
  }

  // 미니보드 셀 클릭
  const col = Math.floor((tx - miniX) / miniCellSize);
  const row = Math.floor((ty - miniY) / miniCellSize);
  if (row < 0 || row >= MINI_ROWS || col < 0 || col >= MINI_COLS) return;

  const cell = safeGridAccess(gMiniGrid, row, col, MINI_ROWS, MINI_COLS);
  if (!cell || !cell.type) return;

  // 얼음 장애물 체크
  if (cell.obstacle === OBS.ICE) return;

  if (gMiniSelected) {
    const dr = row - gMiniSelected.r;
    const dc = col - gMiniSelected.c;
    if ((Math.abs(dr) + Math.abs(dc)) === 1) {
      // 스왑
      tryMiniSwap(gMiniSelected.r, gMiniSelected.c, row, col);
      gMiniSelected = null;
    } else {
      gMiniSelected = { r: row, c: col };
    }
  } else {
    gMiniSelected = { r: row, c: col };
  }
}

function tryMiniSwap(r1, c1, r2, c2) {
  const cell1 = safeGridAccess(gMiniGrid, r1, c1, MINI_ROWS, MINI_COLS);
  const cell2 = safeGridAccess(gMiniGrid, r2, c2, MINI_ROWS, MINI_COLS);
  if (!cell1 || !cell2 || !cell1.type || !cell2.type) return;
  if (cell1.obstacle === OBS.ICE || cell2.obstacle === OBS.ICE) return;

  [gMiniGrid[r1][c1].type, gMiniGrid[r2][c2].type] = [gMiniGrid[r2][c2].type, gMiniGrid[r1][c1].type];
  const matches = findMiniMatches();
  if (matches.length === 0) {
    [gMiniGrid[r1][c1].type, gMiniGrid[r2][c2].type] = [gMiniGrid[r2][c2].type, gMiniGrid[r1][c1].type];
    return;
  }
  playSfx('swap');
  processMiniMatches();
}

// ═══════════════════════════════════════════════════════════════════
// §12. 레이아웃 계산
// ═══════════════════════════════════════════════════════════════════

function recalcLayout(w, h) {
  const safe = Layout.safeArea(w, h);
  const hudTop = Math.max(50, h * 0.08);
  const hudBottom = Math.max(60, h * 0.1);
  const boardArea = { w: safe.w, h: safe.h - hudTop - hudBottom };
  const grid = Layout.grid(COLS, ROWS, boardArea.w, boardArea.h, 2);
  gCellSize = Math.max(grid.cellSize, 30);
  gBoardW = gCellSize * COLS;
  gBoardH = gCellSize * ROWS;
  gBoardX = (w - gBoardW) / 2;
  gBoardY = hudTop + (boardArea.h - gBoardH) / 2;
  gBoosterBarY = h - hudBottom;
  if (_ready && gGrid.length > 0) updateCellPositions();
}

// ═══════════════════════════════════════════════════════════════════
// §13. 세이브/로드
// ═══════════════════════════════════════════════════════════════════

function saveGame() {
  safeSave('gem-nightmare-save', gSaveData);
}

function loadGame() {
  const data = safeLoad('gem-nightmare-save', null);
  if (data) {
    gSaveData = { ...JSON.parse(JSON.stringify(DEFAULT_SAVE)), ...data };
    // 호환성 보정
    if (!gSaveData.boosters) gSaveData.boosters = { ...DEFAULT_SAVE.boosters };
    if (!gSaveData.settings) gSaveData.settings = { ...DEFAULT_SAVE.settings };
    if (!gSaveData.dda) gSaveData.dda = { failStreak: 0 };
  }
}

// ═══════════════════════════════════════════════════════════════════
// §14. 레벨 시작/종료
// ═══════════════════════════════════════════════════════════════════

function startLevel(levelIdx) {
  gCurrentLevelIdx = levelIdx;
  gCurrentLevel = LEVELS[levelIdx];
  if (!gCurrentLevel) return;
  gScore = 0;
  gComboCount = 0;
  // DDA 조정 턴 (ddaOverride.maxExtraTurns 반영)
  const ddaExtraTurns = (gSaveData.dda.failStreak || 0) * 2;
  const maxExtra = (gCurrentLevel.ddaOverride && gCurrentLevel.ddaOverride.maxExtraTurns) || 6;
  gTurnsLeft = gCurrentLevel.turns + Math.min(ddaExtraTurns, maxExtra);
  gSelectedCell = null;
  gCursorR = 0; gCursorC = 0;
  gExtraTurnPrompt = false;
  gPoisonSpreadCounter = 0;
  gResultScoreAnim = 0;
  gResultTimer = 0;
  gActiveEffects = [];
  resetGuards();
  initGoalProgress(gCurrentLevel);
  generateBoard(gCurrentLevel);

  // DDA 극단 레벨 보정 (Lv.17+): 장애물 감소
  const hardAdj = DDA.getHardLevelAdjustment(gCurrentLevel.id);
  if (hardAdj) {
    const reduction = hardAdj.obstacleReduction;
    if (reduction > 0) {
      let removable = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = safeGridAccess(gGrid, r, c, ROWS, COLS);
          if (cell && cell.obstacle !== OBS.NONE && cell.obstacle !== OBS.STONE && cell.obstacle !== OBS.JELLY) {
            removable.push({ r, c });
          }
        }
      }
      const toRemove = Math.floor(removable.length * reduction);
      const shuffled = gRng.shuffle(removable);
      for (let i = 0; i < toRemove && i < shuffled.length; i++) {
        const cell = gGrid[shuffled[i].r][shuffled[i].c];
        cell.obstacle = OBS.NONE;
        cell.obsLayer = 0;
        cell.curtainHidden = false;
        if (!cell.type) cell.type = gRng.pick(GEM_TYPES);
      }
    }
    // 무료 부스터 지급
    if (hardAdj.extraBooster) {
      gSaveData.boosters[hardAdj.extraBooster]++;
      saveGame();
    }
  }

  // DDA 무료 셔플 지급 (2연패 이상)
  if (DDA.shouldOfferFreeShuffle()) {
    gDdaFreeShuffleGranted = true;
    gSaveData.boosters.shuffle++;
    saveGame();
  } else {
    gDdaFreeShuffleGranted = false;
  }

  // DDA 무료 부스터 지급 (3연패)
  if (DDA.shouldOfferFreeBooster()) {
    gDdaFreeBoosterGranted = true;
    gSaveData.boosters.hammer++;
    saveGame();
  } else {
    gDdaFreeBoosterGranted = false;
  }

  gBgCacheDirty = true;
  beginTransition(STATE.LEVEL_INTRO, 400);
}

function onLevelClear() {
  DDA.onLevelClear();
  const lvl = gCurrentLevel;
  // 별 저장
  const prevStars = gSaveData.levelStars[lvl.id] || 0;
  if (gResultStars > prevStars) gSaveData.levelStars[lvl.id] = gResultStars;
  // 진행 갱신
  if (lvl.id >= gSaveData.currentLevel) gSaveData.currentLevel = lvl.id + 1;
  // 총 별 계산
  gSaveData.totalStars = Object.values(gSaveData.levelStars).reduce((a, b) => a + b, 0);
  // 최고 점수
  Save.setHighScore(GAME_ID, gScore);
  // 부스터 보상
  if (lvl.bonus) {
    if (lvl.id === 5) gSaveData.boosters.hammer++;
    if (lvl.id === 10) gSaveData.boosters.shuffle++;
    if (lvl.id === 15) gSaveData.boosters.extraTurns++;
    if (lvl.id === 20) gSaveData.boosters.colorBomb++;
  }
  saveGame();
}

function onLevelFail() {
  DDA.onLevelFail();
  saveGame();
}

// ═══════════════════════════════════════════════════════════════════
// §14.5. 이펙트 오버레이 시스템
// ═══════════════════════════════════════════════════════════════════

function emitEffect(key, x, y, w, h, duration) {
  gActiveEffects.push({ key, x, y, w, h, timer: 0, duration: duration || 400, alpha: 1 });
}

function updateEffects(dt) {
  for (let i = gActiveEffects.length - 1; i >= 0; i--) {
    const e = gActiveEffects[i];
    e.timer += dt;
    e.alpha = MathUtil.clamp(1 - e.timer / e.duration, 0, 1);
    if (e.timer >= e.duration) gActiveEffects.splice(i, 1);
  }
}

function renderEffects(ctx) {
  for (const e of gActiveEffects) {
    ctx.globalAlpha = e.alpha;
    drawAssetOrFallback(ctx, e.key, e.x, e.y, e.w, e.h, 'rgba(255,215,0,0.3)');
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════════
// §15. coreUpdate — 단일 진입점 (F2 해결)
// ═══════════════════════════════════════════════════════════════════

function coreUpdate(dt, ts) {
  // Tween과 Particle은 거의 모든 상태에서 업데이트
  const sys = ACTIVE_SYSTEMS[gState];
  if (sys && sys.tween) tween.update(dt);
  if (sys && sys.particle) particles.update(dt);
  if (sys && sys.sound && gState !== STATE.PAUSED) playBgm(dt);

  // 이펙트 오버레이 + 스프라이트 애니메이션 업데이트
  updateEffects(dt);
  for (const k in gGemSprites) { if (gGemSprites[k]) gGemSprites[k].update(dt); }
  if (gKingRunSprite) gKingRunSprite.update(dt);
  if (gDragonAttackSprite) gDragonAttackSprite.update(dt);

  try {
    switch (gState) {
      case STATE.LOADING: updateLoading(dt); break;
      case STATE.TITLE: updateTitle(dt); break;
      case STATE.MAP: updateMap(dt); break;
      case STATE.LEVEL_INTRO: updateLevelIntro(dt); break;
      case STATE.PLAY: updatePlay(dt); break;
      case STATE.ANIMATING: break; // tween 구동
      case STATE.CASCADING: break; // tween 구동
      case STATE.BOOSTING: updateBoosting(dt); break;
      case STATE.GOAL_CHECK: // ★ FIX-1: enterState가 아닌 coreUpdate에서 checkGoals 호출 (중첩 전환 방지)
        if (GUARDS.goalChecking) checkGoals();
        break;
      case STATE.CLEAR_ANIM: updateClearAnim(dt); break;
      case STATE.FAIL_ANIM: updateFailAnim(dt); break;
      case STATE.RESULT: updateResult(dt); break;
      case STATE.PAUSED: updatePaused(dt); break;
      case STATE.MINI_INTRO: updateMiniIntro(dt); break;
      case STATE.MINI_GAME: updateMiniGame(dt); break;
      case STATE.MINI_RESULT: updateMiniResult(dt); break;
    }
  } catch (e) {
    console.error('[coreUpdate]', e);
  } finally {
    input.flush(); // ★ F3 해결: finally에서 입력 플러시 보장
  }
}

// --- 상태별 update 함수 ---

function updateLoading(dt) {
  // 로딩 완료 시 타이틀로
  // (init에서 직접 전환)
}

function updateTitle(dt) {
  gTitleTimer += dt;
  // 배경 보석 애니메이션
  for (const g of gTitleGems) {
    g.x += g.vx * dt / 1000;
    g.y += g.vy * dt / 1000;
    g.vy += 20 * dt / 1000;
    if (g.y > engine.H + 30) { g.y = -30; g.vy = -20 - gRng.next() * 40; g.x = gRng.next() * engine.W; }
  }
  if (input.confirm()) {
    sound.init();
    sound.resume();
    playSfx('buttonTap');
    beginTransition(STATE.MAP, 400);
  }
}

function updateMap(dt) {
  // 관성 스크롤
  gMapScrollY += gMapScrollVel * dt / 1000;
  gMapScrollVel *= 0.92;
  const maxScroll = Math.max(0, 24 * 80 - engine.H + 100);
  gMapScrollY = MathUtil.clamp(gMapScrollY, 0, maxScroll);

  // 드래그 처리
  if (input.mouseDown) {
    if (gMapDragStart === null) {
      gMapDragStart = input.mouseY;
      gMapDragDist = 0;
    } else {
      const dy = gMapDragStart - input.mouseY;
      gMapScrollY += dy;
      gMapDragDist += Math.abs(dy);
      gMapDragStart = input.mouseY;
      gMapScrollVel = dy * 10;
    }
  } else {
    if (gMapDragStart !== null) {
      if (gMapDragDist < 15 && input.tapped) {
        // 노드 탭 감지
        handleMapTap(input.tapX, input.tapY);
      }
      gMapDragStart = null;
    } else if (input.tapped) {
      handleMapTap(input.tapX, input.tapY);
    }
  }

  // 키보드 맵 이동
  if (input.jp('ArrowUp')) gMapScrollY -= 60;
  if (input.jp('ArrowDown')) gMapScrollY += 60;
  if (input.jp('Escape')) beginTransition(STATE.TITLE, 300);

  // 키보드 레벨 선택 (Enter)
  if (input.jp('Enter') || input.jp('Space')) {
    const curLvl = gSaveData.currentLevel;
    if (curLvl <= 20) startLevel(curLvl - 1);
  }
}

function handleMapTap(tx, ty) {
  const w = engine.W;
  const nodeSize = touchSafe(48);
  for (let i = 0; i < 24; i++) {
    const pos = getMapNodePos(i, w);
    const ny = pos.y - gMapScrollY;
    if (tx >= pos.x - nodeSize / 2 && tx <= pos.x + nodeSize / 2 &&
        ty >= ny - nodeSize / 2 && ty <= ny + nodeSize / 2) {
      const nodeIdx = i;
      // 미니게임 노드: 5, 11, 17, 23
      const miniNodes = [5, 11, 17, 23];
      if (miniNodes.includes(nodeIdx)) {
        const miniIdx = miniNodes.indexOf(nodeIdx) + 1;
        const requiredLevel = miniIdx * 5;
        if (gSaveData.currentLevel > requiredLevel) {
          gMiniType = miniIdx;
          beginTransition(STATE.MINI_INTRO, 400);
        }
        return;
      }
      // 일반 레벨 노드
      const levelIdx = nodeIdx < 5 ? nodeIdx : nodeIdx < 11 ? nodeIdx - 1 : nodeIdx < 17 ? nodeIdx - 2 : nodeIdx - 3;
      if (levelIdx < 20 && levelIdx < gSaveData.currentLevel) {
        startLevel(levelIdx);
      } else if (levelIdx === gSaveData.currentLevel - 1) {
        startLevel(levelIdx);
      }
      return;
    }
  }
}

function getMapNodePos(idx, screenW) {
  const cx = screenW / 2;
  const amplitude = Math.min(screenW * 0.3, 120);
  const y = 80 + idx * 80;
  const x = cx + Math.sin(idx * 0.7) * amplitude;
  return { x, y };
}

function updateLevelIntro(dt) {
  gClearAnimTimer += dt;
  if (gClearAnimTimer > 1500 || input.confirm()) {
    directTransition(STATE.PLAY);
  }
}

function updatePlay(dt) {
  if (isInputBlocked() && !gExtraTurnPrompt) return;

  // 추가 턴 프롬프트
  if (gExtraTurnPrompt) {
    handleExtraTurnPrompt();
    return;
  }

  // 힌트 타이머
  gHintTimer += dt;
  if (gHintTimer > 5000 && !gHintCells) {
    const move = findValidMove();
    if (move) gHintCells = [{ r: move.r, c: move.c }, { r: move.nr, c: move.nc }];
  }

  // 일시정지
  if (input.jp('Escape') || input.jp('KeyP')) {
    directTransition(STATE.PAUSED);
    return;
  }

  // 색맹 모드 토글
  if (input.jp('KeyA')) {
    gSaveData.settings.colorBlindMode = !gSaveData.settings.colorBlindMode;
    saveGame();
  }

  // 부스터 키보드 (1~4)
  for (let i = 0; i < 4; i++) {
    if (input.jp(`Digit${i + 1}`)) activateBooster(i);
  }

  // 키보드 커서 이동
  if (input.jp('ArrowUp')) { gCursorR = Math.max(0, gCursorR - 1); gHintTimer = 0; gHintCells = null; }
  if (input.jp('ArrowDown')) { gCursorR = Math.min(ROWS - 1, gCursorR + 1); gHintTimer = 0; gHintCells = null; }
  if (input.jp('ArrowLeft')) { gCursorC = Math.max(0, gCursorC - 1); gHintTimer = 0; gHintCells = null; }
  if (input.jp('ArrowRight')) { gCursorC = Math.min(COLS - 1, gCursorC + 1); gHintTimer = 0; gHintCells = null; }

  // 키보드 선택/스왑
  if (input.jp('Space') || input.jp('Enter')) {
    if (gSelectedCell) {
      const dr = gCursorR - gSelectedCell.r;
      const dc = gCursorC - gSelectedCell.c;
      if ((Math.abs(dr) + Math.abs(dc)) === 1) {
        trySwap(gSelectedCell.r, gSelectedCell.c, gCursorR, gCursorC);
        gSelectedCell = null;
        gHintTimer = 0; gHintCells = null;
      } else {
        gSelectedCell = { r: gCursorR, c: gCursorC };
      }
    } else {
      gSelectedCell = { r: gCursorR, c: gCursorC };
    }
  }

  // 터치/마우스 입력
  if (input.tapped) {
    gHintTimer = 0; gHintCells = null;
    const tx = input.tapX, ty = input.tapY;

    // 부스터 바 체크
    const bw = Math.min(engine.W - 20, 280);
    const bx = (engine.W - bw) / 2;
    const bh = 50;
    const by = gBoosterBarY;
    if (ty >= by && ty <= by + bh) {
      const slotW = bw / 4;
      for (let i = 0; i < 4; i++) {
        if (tx >= bx + i * slotW && tx < bx + (i + 1) * slotW) {
          activateBooster(i);
          return;
        }
      }
    }

    // 일시정지 버튼
    const pauseSize = touchSafe(36);
    if (tx >= engine.W - pauseSize - 10 && tx <= engine.W - 10 && ty >= 5 && ty <= 5 + pauseSize) {
      directTransition(STATE.PAUSED);
      return;
    }

    // 보드 셀 클릭
    const col = Math.floor((tx - gBoardX) / gCellSize);
    const row = Math.floor((ty - gBoardY) / gCellSize);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      gCursorR = row; gCursorC = col;
      if (gSelectedCell) {
        const dr = row - gSelectedCell.r;
        const dc = col - gSelectedCell.c;
        if ((Math.abs(dr) + Math.abs(dc)) === 1) {
          trySwap(gSelectedCell.r, gSelectedCell.c, row, col);
          gSelectedCell = null;
        } else {
          gSelectedCell = { r: row, c: col };
        }
      } else {
        gSelectedCell = { r: row, c: col };
      }
    }
  }

  // 스와이프 감지 (터치)
  if (gSelectedCell && input.mouseDown && !input.tapped) {
    const dx = input.mouseX - (gBoardX + gSelectedCell.c * gCellSize + gCellSize / 2);
    const dy = input.mouseY - (gBoardY + gSelectedCell.r * gCellSize + gCellSize / 2);
    const dist = Math.hypot(dx, dy);
    if (dist > gCellSize * 0.4) {
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
      else dr = dy > 0 ? 1 : -1;
      const nr = gSelectedCell.r + dr, nc = gSelectedCell.c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        trySwap(gSelectedCell.r, gSelectedCell.c, nr, nc);
        gSelectedCell = null;
        gHintTimer = 0; gHintCells = null;
      }
    }
  }
}

function handleExtraTurnPrompt() {
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const btnW = 100, btnH = 40;
    const cx = w / 2;
    const cy = h / 2;
    // "사용" 버튼
    if (UI.hitTest(input.tapX, input.tapY, cx - btnW - 10, cy + 20, btnW, btnH)) {
      gSaveData.boosters.extraTurns--;
      gTurnsLeft += 5;
      gExtraTurnPrompt = false;
      saveGame();
      playSfx('boosterActivate');
    }
    // "포기" 버튼
    if (UI.hitTest(input.tapX, input.tapY, cx + 10, cy + 20, btnW, btnH)) {
      gExtraTurnPrompt = false;
      directTransition(STATE.FAIL_ANIM);
    }
  }
  if (input.jp('Enter') || input.jp('Space')) {
    gSaveData.boosters.extraTurns--;
    gTurnsLeft += 5;
    gExtraTurnPrompt = false;
    saveGame();
    playSfx('boosterActivate');
  }
  if (input.jp('Escape')) {
    gExtraTurnPrompt = false;
    directTransition(STATE.FAIL_ANIM);
  }
}

function updateBoosting(dt) {
  if (input.jp('Escape')) { cancelBooster(); return; }
  if (input.tapped) {
    const tx = input.tapX, ty = input.tapY;
    const col = Math.floor((tx - gBoardX) / gCellSize);
    const row = Math.floor((ty - gBoardY) / gCellSize);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      useBoosterOnCell(row, col);
    } else {
      cancelBooster();
    }
  }
}

function updateClearAnim(dt) {
  gClearAnimTimer += dt;
  if (gClearAnimTimer > 2500) {
    onLevelClear();
    directTransition(STATE.RESULT);
  }
  // 파티클 효과
  if (gClearAnimTimer > 500 && gClearAnimTimer < 2000) {
    if (Math.floor(gClearAnimTimer / 100) !== Math.floor((gClearAnimTimer - dt) / 100)) {
      const px = engine.W * 0.2 + gRng.next() * engine.W * 0.6;
      const py = engine.H * 0.2 + gRng.next() * engine.H * 0.3;
      particles.emit(px, py, 10, { color: GEM_COLORS[gRng.pick(GEM_TYPES)], speed: 120, life: 0.8, size: 5,
        texture: assets.sprites['particleFirework'] || null });
    }
  }
}

function updateFailAnim(dt) {
  gFailAnimTimer += dt;
  if (gFailAnimTimer > 1500) {
    onLevelFail();
    directTransition(STATE.RESULT);
  }
}

function updateResult(dt) {
  gResultTimer += dt;
  // 점수 카운트업 애니메이션 (1초 동안)
  if (gResultScoreAnim < gScore) {
    gResultScoreAnim = Math.min(gScore, Math.ceil(MathUtil.lerp(0, gScore, MathUtil.clamp(gResultTimer / 1000, 0, 1))));
  }
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const btnW = 120, btnH = 44;
    const cx = w / 2;

    // "재시도" 버튼
    if (UI.hitTest(input.tapX, input.tapY, cx - btnW - 10, h * 0.7, btnW, btnH)) {
      startLevel(gCurrentLevelIdx);
      return;
    }
    // "맵으로" 버튼
    if (UI.hitTest(input.tapX, input.tapY, cx + 10, h * 0.7, btnW, btnH)) {
      beginTransition(STATE.MAP, 400);
      return;
    }
    // "미니게임" 버튼 (보상 레벨)
    if (gResultBonusLevel && gCurrentLevel && gCurrentLevel.miniAfter) {
      if (UI.hitTest(input.tapX, input.tapY, cx - 80, h * 0.8, 160, btnH)) {
        gMiniType = gCurrentLevel.miniAfter;
        beginTransition(STATE.MINI_INTRO, 400);
        return;
      }
    }
  }

  if (input.jp('KeyR')) startLevel(gCurrentLevelIdx);
  if (input.jp('Escape')) beginTransition(STATE.MAP, 400);
}

function updatePaused(dt) {
  if (input.jp('Escape') || input.jp('KeyP') || input.confirm()) {
    if (gPrevState === STATE.MINI_GAME) {
      directTransition(STATE.MINI_GAME);
    } else {
      directTransition(STATE.PLAY);
    }
  }
  if (input.tapped) {
    const w = engine.W, h = engine.H;
    const btnW = 150, btnH = 44;
    const cx = w / 2;
    // "계속하기"
    if (UI.hitTest(input.tapX, input.tapY, cx - btnW / 2, h * 0.4, btnW, btnH)) {
      if (gPrevState === STATE.MINI_GAME) directTransition(STATE.MINI_GAME);
      else directTransition(STATE.PLAY);
    }
    // "맵으로"
    if (UI.hitTest(input.tapX, input.tapY, cx - btnW / 2, h * 0.5, btnW, btnH)) {
      resetGuards();
      beginTransition(STATE.MAP, 400);
    }
  }
}

function updateMiniIntro(dt) {
  gClearAnimTimer += dt;
  if (gClearAnimTimer > 2000 || input.confirm()) {
    directTransition(STATE.MINI_GAME);
  }
}

function updateMiniResult(dt) {
  if (input.confirm() || input.tapped) {
    beginTransition(STATE.MAP, 400);
  }
}

// ═══════════════════════════════════════════════════════════════════
// §16. coreRender — 렌더링
// ═══════════════════════════════════════════════════════════════════

function coreRender(ctx, w, h, dt) {
  // 배경 클리어
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  switch (gState) {
    case STATE.LOADING: renderLoading(ctx, w, h); break;
    case STATE.TITLE: renderTitle(ctx, w, h); break;
    case STATE.MAP: renderMap(ctx, w, h); break;
    case STATE.LEVEL_INTRO: renderLevelIntro(ctx, w, h); break;
    case STATE.PLAY:
    case STATE.ANIMATING:
    case STATE.CASCADING:
    case STATE.BOOSTING:
    case STATE.GOAL_CHECK:
      renderPlayScreen(ctx, w, h);
      break;
    case STATE.CLEAR_ANIM: renderPlayScreen(ctx, w, h); renderClearAnim(ctx, w, h); break;
    case STATE.FAIL_ANIM: renderPlayScreen(ctx, w, h); renderFailAnim(ctx, w, h); break;
    case STATE.RESULT: renderResult(ctx, w, h); break;
    case STATE.PAUSED: renderPlayScreen(ctx, w, h); renderPaused(ctx, w, h); break;
    case STATE.MINI_INTRO: renderMiniIntro(ctx, w, h); break;
    case STATE.MINI_GAME: renderMiniGame(ctx, w, h); break;
    case STATE.MINI_RESULT: renderMiniResult(ctx, w, h); break;
  }

  // 이펙트 오버레이 (파티클 앞)
  renderEffects(ctx);

  particles.render(ctx);

  // 페이드 오버레이
  if (gFadeObj.a > 0.01) {
    UI.fade(ctx, w, h, gFadeObj.a);
  }
}

// --- 로딩 화면 ---
function renderLoading(ctx, w, h) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);
  UI.text(ctx, 'Loading...', w / 2, h / 2, { size: 24, color: '#FFD700', bold: true });
}

// --- 타이틀 화면 ---
function renderTitle(ctx, w, h) {
  // 배경 그라디언트
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#1a1035');
  grad.addColorStop(1, '#0d0a1f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // 배경 보석
  for (const g of gTitleGems) {
    ctx.globalAlpha = g.alpha;
    drawGemSimple(ctx, g.x, g.y, g.size, g.type);
  }
  ctx.globalAlpha = 1;

  // 타이틀 텍스트
  const titleY = h * 0.3;
  const pulse = 1 + Math.sin(gTitleTimer / 500) * 0.03;
  ctx.save();
  ctx.translate(w / 2, titleY);
  ctx.scale(pulse, pulse);
  UI.text(ctx, getText('title'), 0, 0, { size: Layout.fontSize(36, w, h, 20, 48), color: '#FFD700', bold: true, glow: '#FF2D55' });
  ctx.restore();

  // 부제
  UI.text(ctx, "King's Nightmare — Match-3 Puzzle", w / 2, titleY + 50, { size: Layout.fontSize(14, w, h, 10, 20), color: '#8080a0' });

  // 왕 캐릭터
  const kingSize = Math.min(w * 0.3, 120);
  drawKing(ctx, w / 2 - kingSize / 2, h * 0.42, kingSize, kingSize, 'scared');

  // 시작 버튼 (UI 에셋 사용)
  const btnW = Math.min(200, w * 0.5), btnH = 50;
  const btnX = w / 2 - btnW / 2, btnY = h * 0.72;
  const isHover = UI.hitTest(input.mouseX, input.mouseY, btnX, btnY, btnW, btnH);
  if (assets.sprites['uiButtonPlay']) {
    ctx.globalAlpha = isHover ? 1 : 0.85;
    ctx.drawImage(assets.sprites['uiButtonPlay'], btnX, btnY, btnW, btnH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = `bold 16px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(getText('play'), btnX + btnW / 2, btnY + btnH / 2);
  } else {
    drawFancyButton(ctx, getText('play'), btnX, btnY, btnW, btnH, '#34C759', isHover);
  }

  // 최고 점수
  const hi = Save.getHighScore(GAME_ID);
  if (hi > 0) {
    UI.text(ctx, `Best: ${hi.toLocaleString()}`, w / 2, h * 0.85, { size: 14, color: '#8080a0' });
  }

  // 안내
  const blink = Math.sin(gTitleTimer / 400) > 0;
  if (blink) {
    UI.text(ctx, 'Space / Tap to Start', w / 2, h * 0.92, { size: 12, color: '#505070' });
  }
}

// --- 맵 화면 ---
function renderMap(ctx, w, h) {
  // 배경
  const bgKey = 'bgMap';
  if (assets.sprites[bgKey]) {
    const img = assets.sprites[bgKey];
    const scale = w / img.width;
    ctx.drawImage(img, 0, -gMapScrollY * scale, w, img.height * scale);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#C4E8C2');
    grad.addColorStop(0.5, '#E8F4FD');
    grad.addColorStop(1, '#1a1a4e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  // 경로선
  ctx.strokeStyle = 'rgba(255,215,0,0.4)';
  ctx.lineWidth = 3;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  for (let i = 0; i < 24; i++) {
    const pos = getMapNodePos(i, w);
    const ny = pos.y - gMapScrollY;
    if (i === 0) ctx.moveTo(pos.x, ny);
    else ctx.lineTo(pos.x, ny);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // 노드 그리기
  const miniNodes = [5, 11, 17, 23];
  const nodeSize = touchSafe(44);
  for (let i = 0; i < 24; i++) {
    const pos = getMapNodePos(i, w);
    const ny = pos.y - gMapScrollY;
    if (ny < -50 || ny > h + 50) continue;

    const isMini = miniNodes.includes(i);
    const levelIdx = isMini ? -1 : (i < 5 ? i : i < 11 ? i - 1 : i < 17 ? i - 2 : i - 3);
    const isUnlocked = isMini ?
      (gSaveData.currentLevel > miniNodes.indexOf(i) * 5 + 5) :
      (levelIdx < gSaveData.currentLevel);
    const isCurrent = !isMini && levelIdx === gSaveData.currentLevel - 1;
    const stars = !isMini && levelIdx >= 0 ? (gSaveData.levelStars[levelIdx + 1] || 0) : 0;
    const miniStars = isMini ? (gSaveData.miniGameResults[`mini${miniNodes.indexOf(i) + 1}`] || 0) : 0;

    const nSize = isMini ? nodeSize * 1.3 : nodeSize;

    // 노드 배경
    ctx.save();
    ctx.translate(pos.x, ny);
    if (isCurrent) {
      const pulse = 1 + Math.sin(Date.now() / 300) * 0.1;
      ctx.scale(pulse, pulse);
    }

    if (isMini) {
      // 미니게임 노드 (에셋 사용)
      if (assets.sprites['mapNodeMini']) {
        ctx.drawImage(assets.sprites['mapNodeMini'], -nSize / 2, -nSize / 2, nSize, nSize);
      } else {
        ctx.fillStyle = isUnlocked ? (miniStars > 0 ? '#FFD700' : '#FF3B30') : '#555';
        ctx.beginPath();
        drawCrown(ctx, 0, 0, nSize / 2);
        ctx.fill();
      }
      if (miniStars > 0) {
        UI.text(ctx, '✓', 0, 0, { size: nSize * 0.4, color: '#fff', bold: true });
      } else if (isUnlocked) {
        UI.text(ctx, '!', 0, 0, { size: nSize * 0.4, color: '#fff', bold: true });
      }
    } else if (!isUnlocked) {
      // 잠긴 노드 (에셋 사용)
      if (assets.sprites['mapNodeLocked']) {
        ctx.drawImage(assets.sprites['mapNodeLocked'], -nSize / 2, -nSize / 2, nSize, nSize);
      } else {
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(0, 0, nSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      UI.text(ctx, '🔒', 0, 0, { size: nSize * 0.35 });
    } else {
      // 보너스 레벨인지 확인
      const isBonus = levelIdx >= 0 && levelIdx < 20 && LEVELS[levelIdx] && LEVELS[levelIdx].bonus;
      // 언락/현재/완료 노드 (에셋 사용)
      const nodeKey = isBonus && assets.sprites['mapNodeBonus'] ? 'mapNodeBonus' : (isCurrent ? 'mapNodeCurrent' : (stars > 0 ? 'mapNodeComplete' : 'mapNodeCurrent'));
      if (assets.sprites[nodeKey]) {
        ctx.drawImage(assets.sprites[nodeKey], -nSize / 2, -nSize / 2, nSize, nSize);
      } else {
        ctx.fillStyle = isCurrent ? '#FFD700' : (stars > 0 ? '#34C759' : '#007AFF');
        ctx.beginPath();
        ctx.arc(0, 0, nSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      UI.text(ctx, `${levelIdx + 1}`, 0, -2, { size: nSize * 0.35, color: '#fff', bold: true });
      // 별 표시 (에셋 사용)
      if (stars > 0) {
        const miniStarSize = 14;
        for (let s = 0; s < 3; s++) {
          const sx = (s - 1) * 14 - miniStarSize / 2;
          const sy = nSize / 2 + 2;
          const filled = s < stars;
          const sKey = filled ? 'uiStarFilled' : 'uiStarEmpty';
          if (assets.sprites[sKey]) {
            ctx.drawImage(assets.sprites[sKey], sx, sy, miniStarSize, miniStarSize);
          } else {
            UI.text(ctx, filled ? '★' : '☆', (s - 1) * 12, nSize / 2 + 8, { size: 10, color: filled ? '#FFD700' : '#555' });
          }
        }
      }
    }
    ctx.restore();
  }

  // 상단 UI
