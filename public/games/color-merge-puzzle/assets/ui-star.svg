<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFA06B"/>
    </linearGradient>
    <radialGradient id="starShine" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starOuterGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <path d="M16 2 L19.5 11 L29 11.5 L21.5 17.5 L24 27 L16 22 L8 27 L10.5 17.5 L3 11.5 L12.5 11 Z" fill="#FFD93D" opacity="0.3" filter="url(#starOuterGlow)"/>
  <!-- 별 본체 -->
  <path d="M16 4 L19 12 L27.5 12.5 L21 17.5 L23 25.5 L16 21 L9 25.5 L11 17.5 L4.5 12.5 L13 12 Z" fill="url(#starGrad)" filter="url(#starGlow)"/>
  <!-- 광택 하이라이트 -->
  <path d="M16 4 L19 12 L27.5 12.5 L21 17.5 L23 25.5 L16 21 L9 25.5 L11 17.5 L4.5 12.5 L13 12 Z" fill="url(#starShine)"/>
  <!-- 중심 반짝임 -->
  <circle cx="14" cy="13" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="12.5" cy="11.5" r="0.7" fill="#ffffff" opacity="0.3"/>
  <!-- 작은 스파클 -->
  <g opacity="0.4" stroke="#FFD93D" stroke-width="0.8" stroke-linecap="round">
    <line x1="27" y1="5" x2="29" y2="3"/>
    <line x1="28" y1="6" x2="30" y2="6"/>
    <line x1="27" y1="7" x2="29" y2="9"/>
  </g>
</svg>