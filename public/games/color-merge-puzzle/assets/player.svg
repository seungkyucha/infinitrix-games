<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6cf7"/>
      <stop offset="50%" stop-color="#4D96FF"/>
      <stop offset="100%" stop-color="#6BCB77"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rainbowBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="16%" stop-color="#FFA06B"/>
      <stop offset="33%" stop-color="#FFD93D"/>
      <stop offset="50%" stop-color="#6BCB77"/>
      <stop offset="66%" stop-color="#4D96FF"/>
      <stop offset="83%" stop-color="#6B5BFF"/>
      <stop offset="100%" stop-color="#C56BFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- 외곽 무지개 테두리 -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="none" stroke="url(#rainbowBorder)" stroke-width="3" filter="url(#glow)"/>
  <!-- 블록 본체 -->
  <rect x="8" y="8" width="48" height="48" rx="12" ry="12" fill="url(#blockGrad)" filter="url(#softShadow)"/>
  <!-- 내부 광택 -->
  <rect x="8" y="8" width="48" height="48" rx="12" ry="12" fill="url(#innerGlow)"/>
  <!-- 커서 십자 마크 (퍼즐 플레이어 상징) -->
  <g filter="url(#glow)" opacity="0.9">
    <line x1="32" y1="20" x2="32" y2="44" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="32" x2="44" y2="32" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 대각선 장식 -->
    <line x1="22" y1="22" x2="26" y2="26" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="42" y1="22" x2="38" y2="26" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="22" y1="42" x2="26" y2="38" stroke="#6BCB77" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="42" y1="42" x2="38" y2="38" stroke="#C56BFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- 중앙 다이아몬드 -->
  <path d="M32 26 L38 32 L32 38 L26 32 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- 코너 장식 점들 -->
  <circle cx="16" cy="16" r="2" fill="#FF6B6B" opacity="0.8" filter="url(#glow)"/>
  <circle cx="48" cy="16" r="2" fill="#FFD93D" opacity="0.8" filter="url(#glow)"/>
  <circle cx="16" cy="48" r="2" fill="#4D96FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="48" cy="48" r="2" fill="#C56BFF" opacity="0.8" filter="url(#glow)"/>
</svg>