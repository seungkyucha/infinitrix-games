<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#cc3355"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heartOuter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 외곽 글로우 -->
  <path d="M16 28 C10 22, 2 17, 2 10 C2 5, 6 2, 10 2 C12.5 2, 14.5 3.5, 16 6 C17.5 3.5, 19.5 2, 22 2 C26 2, 30 5, 30 10 C30 17, 22 22, 16 28Z" fill="#FF6B6B" opacity="0.3" filter="url(#heartOuter)"/>
  <!-- 하트 본체 -->
  <path d="M16 26 C11 21, 4 16.5, 4 10.5 C4 6.5, 7 4, 10.5 4 C12.5 4, 14.5 5.2, 16 7.5 C17.5 5.2, 19.5 4, 21.5 4 C25 4, 28 6.5, 28 10.5 C28 16.5, 21 21, 16 26Z" fill="url(#heartGrad)" filter="url(#heartGlow)"/>
  <!-- 광택 하이라이트 -->
  <path d="M16 26 C11 21, 4 16.5, 4 10.5 C4 6.5, 7 4, 10.5 4 C12.5 4, 14.5 5.2, 16 7.5 C17.5 5.2, 19.5 4, 21.5 4 C25 4, 28 6.5, 28 10.5 C28 16.5, 21 21, 16 26Z" fill="url(#heartShine)"/>
  <!-- 작은 반짝임 -->
  <circle cx="10" cy="9" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="12" cy="7.5" r="0.8" fill="#ffffff" opacity="0.4"/>
</svg>