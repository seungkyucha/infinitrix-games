<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6B5BFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B5BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#C56BFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C56BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaC" cx="50%" cy="20%" r="25%">
      <stop offset="0%" stop-color="#4D96FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4D96FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigStarGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 우주 배경 그라디언트 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 성운 레이어 -->
  <rect width="800" height="600" fill="url(#nebulaA)"/>
  <rect width="800" height="600" fill="url(#nebulaB)"/>
  <rect width="800" height="600" fill="url(#nebulaC)"/>
  <!-- 작은 별들 -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="45" cy="32" r="0.8"/><circle cx="120" cy="78" r="0.6"/>
    <circle cx="230" cy="45" r="0.9"/><circle cx="310" cy="120" r="0.5"/>
    <circle cx="440" cy="55" r="0.7"/><circle cx="520" cy="90" r="0.6"/>
    <circle cx="650" cy="42" r="0.8"/><circle cx="730" cy="110" r="0.5"/>
    <circle cx="80" cy="180" r="0.6"/><circle cx="190" cy="220" r="0.7"/>
    <circle cx="350" cy="190" r="0.5"/><circle cx="480" cy="230" r="0.8"/>
    <circle cx="600" cy="180" r="0.6"/><circle cx="720" cy="250" r="0.7"/>
    <circle cx="55" cy="310" r="0.5"/><circle cx="160" cy="350" r="0.6"/>
    <circle cx="280" cy="320" r="0.8"/><circle cx="400" cy="380" r="0.5"/>
    <circle cx="530" cy="340" r="0.7"/><circle cx="670" cy="390" r="0.6"/>
    <circle cx="760" cy="420" r="0.5"/><circle cx="100" cy="450" r="0.7"/>
    <circle cx="250" cy="480" r="0.6"/><circle cx="370" cy="510" r="0.5"/>
    <circle cx="500" cy="470" r="0.8"/><circle cx="620" cy="520" r="0.6"/>
    <circle cx="740" cy="540" r="0.7"/><circle cx="30" cy="560" r="0.5"/>
  </g>
  <!-- 중간 밝기 별들 -->
  <g fill="#A0A0B0" opacity="0.4">
    <circle cx="95" cy="55" r="0.4"/><circle cx="205" cy="130" r="0.5"/>
    <circle cx="380" cy="85" r="0.4"/><circle cx="550" cy="160" r="0.3"/>
    <circle cx="690" cy="70" r="0.4"/><circle cx="145" cy="280" r="0.5"/>
    <circle cx="330" cy="260" r="0.3"/><circle cx="470" cy="300" r="0.4"/>
    <circle cx="610" cy="280" r="0.5"/><circle cx="770" cy="320" r="0.3"/>
    <circle cx="60" cy="420" r="0.4"/><circle cx="200" cy="400" r="0.3"/>
    <circle cx="420" cy="440" r="0.5"/><circle cx="580" cy="460" r="0.4"/>
    <circle cx="700" cy="490" r="0.3"/><circle cx="340" cy="550" r="0.4"/>
  </g>
  <!-- 빛나는 큰 별들 (무지개 색상) -->
  <g filter="url(#starGlow)">
    <circle cx="150" cy="100" r="2" fill="#FF6B6B" opacity="0.7"/>
    <circle cx="380" cy="60" r="2.5" fill="#FFD93D" opacity="0.6"/>
    <circle cx="600" cy="130" r="2" fill="#4D96FF" opacity="0.7"/>
    <circle cx="720" cy="200" r="1.8" fill="#6BCB77" opacity="0.6"/>
    <circle cx="250" cy="300" r="2.2" fill="#C56BFF" opacity="0.5"/>
    <circle cx="500" cy="400" r="1.8" fill="#FFA06B" opacity="0.6"/>
    <circle cx="100" cy="500" r="2" fill="#6B5BFF" opacity="0.5"/>
  </g>
  <!-- 특대 반짝 별 (십자형) -->
  <g filter="url(#bigStarGlow)" opacity="0.5">
    <g transform="translate(300,150)">
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1.5" fill="#ffffff"/>
    </g>
    <g transform="translate(650,350)">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1.2" fill="#ffffff"/>
    </g>
    <g transform="translate(50,250)">
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1" fill="#ffffff"/>
    </g>
  </g>
  <!-- 은하수 느낌 대각선 밴드 -->
  <g opacity="0.03">
    <ellipse cx="400" cy="300" rx="500" ry="40" transform="rotate(-25 400 300)" fill="#8080cc"/>
    <ellipse cx="400" cy="300" rx="450" ry="25" transform="rotate(-25 400 300)" fill="#aaaaee"/>
  </g>
</svg>