// -- Process input based on state (all input in update, not render — Cycle 23 lesson) --
function processInput(dt) {
  if (!sys(SYS.input)) return;
  const t = TEXT[G.lang];

  switch(G.state) {
    case STATE.TITLE:
      if (input.jp('Space') || input.tapped) {
        // Check if tapped language toggle
        if (input.tapped) {
          const lx = cW/2 - 30, ly = cH * 0.85 - 12, lw = 60, lh = 25;
          if (input.tapX >= lx && input.tapX <= lx + lw && input.tapY >= ly && input.tapY <= ly + lh) {
            G.lang = G.lang === 'ko' ? 'en' : 'ko';
            saveSave();
            break;
          }
        }
        beginTransition(STATE.DIFF_SELECT);
        sound.init();
        sound.playSfx('select');
      }
      break;

    case STATE.DIFF_SELECT:
      if (input.tapped) {
        const diffs = ['easy', 'normal', 'hard'];
        const cardW = Math.min(200, cW * 0.25);
        const cardH = Math.min(280, cH * 0.5);
        const gap = Math.min(30, cW * 0.03);
        const startX = cW/2 - (3 * cardW + 2 * gap) / 2;
        for (let i = 0; i < 3; i++) {
          const x = startX + i * (cardW + gap);
          const y = cH * 0.25;
          if (input.tapX >= x && input.tapX <= x + cardW && input.tapY >= y && input.tapY <= y + cardH) {
            if (diffs[i] === 'hard' && !G.dimsCleared[2]) break;
            G.diff = diffs[i];
            initRun();
            beginTransition(STATE.DIM_INTRO);
            sound.playSfx('select');
            break;
          }
        }
        // Upgrade buttons
        const trees = ['attack', 'defense', 'utility'];
        const panelW = (cardW * 3 + gap * 2) / 3 - 10;
        const uy = cH * 0.25 + cardH + 20;
        for (let i = 0; i < 3; i++) {
          const px = startX + i * (panelW + 10);
          if (input.tapX >= px && input.tapX <= px + panelW && input.tapY >= uy && input.tapY <= uy + 60) {
            purchaseUpgrade(trees[i]);
            break;
          }
        }
      }
      if (input.jp('Escape')) { beginTransition(STATE.TITLE); }
      break;

    case STATE.DIM_INTRO:
    case STATE.BOSS_INTRO:
    case STATE.HIDDEN_INTRO:
      G.introTimer += dt;
      if (G.introTimer > 3 || input.jp('Space') || input.tapped) {
        if (G.state === STATE.DIM_INTRO) {
          beginTransition(STATE.PLACEMENT);
        } else if (G.state === STATE.BOSS_INTRO || G.state === STATE.HIDDEN_INTRO) {
          beginBossFight();
        }
      }
      break;

    case STATE.PLACEMENT: {
      // Mouse/touch grid position
      const mx = input.mouseX, my = input.mouseY;
      const gc = Math.floor((mx - gridOffX) / cellSize);
      const gr = Math.floor((my - gridOffY) / cellSize);
      G.previewCol = gc; G.previewRow = gr;

      // Block slot selection (keys 1-5)
      for (let i = 0; i < 5; i++) {
        if (input.jp('Digit' + (i+1)) || input.jp('Numpad' + (i+1))) {
          if (i < G.blocks.length) { G.selectedBlock = i; G.rotation = 0; G.flipped = false; }
        }
      }
      // Rotate (R or right click or double tap)
      if (input.jp('KeyR') || input.rightClick || input.doubleTapped) {
        G.rotation = (G.rotation + 1) % 4;
        sound.playSfx('rotate');
      }
      // Flip (F or two-finger tap)
      if (input.jp('KeyF') || input.twoFingerTap) {
        G.flipped = !G.flipped;
        sound.playSfx('rotate');
      }
      // Place block (click/tap on grid)
      if (input.tapped && gc >= 0 && gc < GRID_COLS && gr >= 0 && gr < GRID_ROWS) {
        // Check if tap hit a touch button first
        let hitBtn = false;
        for (const btn of G.touchBtns) {
          if (input.tapX >= btn.x && input.tapX <= btn.x + btn.w && input.tapY >= btn.y && input.tapY <= btn.y + btn.h) {
            hitBtn = true;
            handleTouchButton(btn.id);
            break;
          }
        }
        if (!hitBtn) {
          const cells = getCurrentCells();
          const pathGrid = G.grid.map(row => row.map(v => v > 0 ? 1 : 0));
          if (cells.length > 0 && canPlace(pathGrid, cells, gc, gr)) {
            const elem = G.blocks[G.selectedBlock].elem;
            placeTetromino(G.grid, G.towers, cells, gc, gr, elem);
            G.blocks.splice(G.selectedBlock, 1);
            if (G.selectedBlock >= G.blocks.length) G.selectedBlock = Math.max(0, G.blocks.length - 1);
            G.rotation = 0; G.flipped = false;
            recalcPath();
            computeSynergy(G.towers, G.grid);
            sound.playSfx('place');
          }
        }
      }
      // Touch button hits outside grid area (non-grid taps only)
      if (input.tapped && (gc < 0 || gc >= GRID_COLS || gr < 0 || gr >= GRID_ROWS)) {
        for (const btn of G.touchBtns) {
          if (input.tapX >= btn.x && input.tapX <= btn.x + btn.w && input.tapY >= btn.y && input.tapY <= btn.y + btn.h) {
            handleTouchButton(btn.id);
            break;
          }
        }
      }
      // Start wave
      if (input.jp('Space')) { beginWave(); }
      // Pause
      if (input.jp('Escape')) { setStateDirect(STATE.PAUSE); G.prevState = STATE.PLACEMENT; }
      // Tower info on Q
      if (input.jp('KeyQ')) { /* toggle info panel - minimal for now */ }
      break;
    }

    case STATE.WAVE:
    case STATE.BOSS:
    case STATE.HIDDEN_BOSS:
      // Pause
      if (input.jp('Escape')) { setStateDirect(STATE.PAUSE); }
      // Touch pause button
      if (input.tapped) {
        for (const btn of G.touchBtns) {
          if (btn.id === 'pause' && input.tapX >= btn.x && input.tapX <= btn.x + btn.w && input.tapY >= btn.y && input.tapY <= btn.y + btn.h) {
            setStateDirect(STATE.PAUSE);
          }
        }
      }
      break;

    case STATE.WAVE_CLEAR:
      G.clearTimer += dt;
      if (G.clearTimer > 2) {
        G.dimStones += 10 + G.totalWave * 5;
        saveSave();
        beginTransition(STATE.ROGUE_SELECT);
      }
      break;

    case STATE.ROGUE_SELECT:
      if (input.tapped) {
        const cardW = Math.min(180, cW * 0.22);
        const cardH = Math.min(250, cH * 0.45);
        const gap = Math.min(20, cW * 0.02);
        const total = G.rogueCards.length;
        const startX = cW/2 - (total * cardW + (total - 1) * gap) / 2;
        for (let i = 0; i < total; i++) {
          const x = startX + i * (cardW + gap);
          const y = cH * 0.2;
          if (input.tapX >= x && input.tapX <= x + cardW && input.tapY >= y && input.tapY <= y + cardH) {
            G.selectedCard = i;
            applyCard(G.rogueCards[i]);
            // Back to placement
            beginTransition(STATE.PLACEMENT);
            break;
          }
        }
      }
      break;

    case STATE.BOSS_DEFEAT:
      G.clearTimer += dt;
      if (G.clearTimer > 2.5) {
        advanceDimension();
      }
      break;

    case STATE.DIM_CLEAR:
      G.clearTimer += dt;
      if (G.clearTimer > 2) {
        beginTransition(STATE.DIM_INTRO);
      }
      break;

    case STATE.GAMEOVER:
    case STATE.VICTORY:
      if (input.jp('KeyR') || input.tapped) {
        beginTransition(STATE.TITLE);
      }
      break;

    case STATE.TRUE_ENDING:
      G.endTimer += dt;
      if (G.endTimer > 5 && (input.jp('KeyR') || input.tapped)) {
        beginTransition(STATE.TITLE);
      }
      break;

    case STATE.PAUSE:
      if (input.jp('Escape') || input.jp('Space')) {
        setStateDirect(G.prevState);
      }
      if (input.tapped && G._pauseResume) {
        const r = G._pauseResume;
        if (input.tapX >= r.x && input.tapX <= r.x + r.w && input.tapY >= r.y && input.tapY <= r.y + r.h) {
          setStateDirect(G.prevState);
        }
        const t2 = G._pauseTitle;
        if (t2 && input.tapX >= t2.x && input.tapX <= t2.x + t2.w && input.tapY >= t2.y && input.tapY <= t2.y + t2.h) {
          setStateDirect(STATE.CONFIRM);
        }
      }
      break;

    case STATE.CONFIRM:
      if (input.tapped && G._confirmYes) {
        const y = G._confirmYes;
        if (input.tapX >= y.x && input.tapX <= y.x + y.w && input.tapY >= y.y && input.tapY <= y.y + y.h) {
          beginTransition(STATE.TITLE);
        }
        const n = G._confirmNo;
        if (input.tapX >= n.x && input.tapX <= n.x + n.w && input.tapY >= n.y && input.tapY <= n.y + n.h) {
          setStateDirect(STATE.PAUSE);
        }
      }
      if (input.jp('Escape')) { setStateDirect(STATE.PAUSE); }
      break;
  }
}

// -- Handle touch button press --
function handleTouchButton(id) {
  switch(id) {
    case 'rotate':
      G.rotation = (G.rotation + 1) % 4;
      sound.playSfx('rotate');
      break;
    case 'flip':
      G.flipped = !G.flipped;
      sound.playSfx('rotate');
      break;
    case 'startWave':
      beginWave();
      break;
    case 'pause':
      setStateDirect(STATE.PAUSE); G.prevState = STATE.PLACEMENT;
      break;
    case 'dismantle':
      // Dismantle tower at mouse position
      for (let i = G.towers.length - 1; i >= 0; i--) {
        const t = G.towers[i];
        const tx = gridOffX + t.col * cellSize + cellSize/2;
        const ty = gridOffY + t.row * cellSize + cellSize/2;
        if (dist(input.tapX, input.tapY, tx, ty) < cellSize) {
          G.grid[t.row][t.col] = 0;
          G.towers.splice(i, 1);
          G.dimStones += 5; // partial refund
          recalcPath();
          computeSynergy(G.towers, G.grid);
          break;
        }
      }
      break;
    case 'upgrade':
      // Upgrade tower at mouse position
      for (const t of G.towers) {
        const tx = gridOffX + t.col * cellSize + cellSize/2;
        const ty = gridOffY + t.row * cellSize + cellSize/2;
        if (dist(input.tapX, input.tapY, tx, ty) < cellSize && G.dimStones >= 15) {
          t.level++;
          t.dps *= 1.2;
          t.range *= 1.1;
          G.dimStones -= 15;
          sound.playSfx('upgrade');
          saveSave();
          break;
        }
      }
      break;
    default:
      if (id.startsWith('slot')) {
        const idx = parseInt(id.replace('slot', ''));
        if (idx < G.blocks.length) { G.selectedBlock = idx; G.rotation = 0; G.flipped = false; }
      }
      break;
  }
}

// ══════════════════════════════════════════════════════════════════
// ══ REGION 10: INIT & GAME LOOP ══
// ══════════════════════════════════════════════════════════════════

// -- Global instances --
const tween = new TweenManager();
const input = new InputManager();
const sound = new SoundManager();
const projPool = new ObjectPool(createProjectile, 200);
const partPool = new ObjectPool(createParticle, 500);

// -- Main update --
function update(dt) {
  // Tween always updates (all states)
  if (sys(SYS.tw)) tween.update(dt);

  // Play time
  if (G.state === STATE.WAVE || G.state === STATE.BOSS || G.state === STATE.PLACEMENT || G.state === STATE.HIDDEN_BOSS) {
    G.playTime += dt;
  }

  // Input processing (in update, not render — Cycle 23)
  processInput(dt);

  // Camera shake
  if (G.camShakeDur > 0) {
    G.camShakeDur -= dt * 1000;
    G.camShakeX = randRange(-4, 4) * (G.camShakeDur / 300);
    G.camShakeY = randRange(-4, 4) * (G.camShakeDur / 300);
  } else {
    G.camShakeX = 0; G.camShakeY = 0;
  }

  // Camera zoom lerp
  G.camZoom = lerp(G.camZoom, G.camTargetZoom, dt * 3);

  // Enemies
  if (sys(SYS.enemy)) updateEnemies(dt);

  // Towers
  if (sys(SYS.tower)) updateTowers(dt);

  // Boss
  if (sys(SYS.boss)) updateBoss(dt);

  // Projectiles
  if (sys(SYS.proj)) updateProjectiles(dt);

  // Particles
  if (sys(SYS.particle)) updateParticles(dt);

  // Background scroll
  bgScrollX += dt * 20;

  // Title particles
  if (G.state === STATE.TITLE) {
    G.titleAnim += dt;
    for (const p of G.bgParticles) {
      p.y -= p.speed * dt;
      if (p.y < -10) { p.y = cH + 10; p.x = Math.random() * cW; }
    }
  }
}

// -- Main render --
function render() {
  ctx.clearRect(0, 0, cW, cH);

  // Camera transform
  ctx.save();
  ctx.translate(G.camShakeX, G.camShakeY);
  if (G.camZoom !== 1) {
    ctx.translate(cW/2, cH/2);
    ctx.scale(G.camZoom, G.camZoom);
    ctx.translate(-cW/2, -cH/2);
  }

  switch(G.state) {
    case STATE.TITLE:
      drawTitle(ctx, cW, cH);
      break;

    case STATE.DIFF_SELECT:
      drawDiffSelect(ctx, cW, cH);
      break;

    case STATE.DIM_INTRO:
      drawDimIntro(ctx, cW, cH);
      break;

    case STATE.PLACEMENT:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, getCurrentCells(),
        G.blocks.length > 0 && canPlace(G.grid.map(r=>r.map(v=>v>0?1:0)), getCurrentCells(), G.previewCol, G.previewRow));
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawBlockSlots(ctx, gridOffX, gridOffY, cellSize);
      drawParticles(ctx);
      drawHUD(ctx, cW, cH);
      drawPlacementHints(ctx, cW, cH);
      drawTouchButtons(ctx);
      break;

    case STATE.WAVE:
    case STATE.HIDDEN_BOSS:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, null, false);
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawEnemies(ctx, G.enemies);
      drawProjectiles(ctx);
      drawParticles(ctx);
      drawHUD(ctx, cW, cH);
      drawTouchButtons(ctx);
      if (G.bossActive) drawBoss(ctx, G.boss);
      break;

    case STATE.BOSS_INTRO:
    case STATE.HIDDEN_INTRO:
      drawBossIntro(ctx, cW, cH);
      break;

    case STATE.BOSS:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, null, false);
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawEnemies(ctx, G.enemies);
      drawBoss(ctx, G.boss);
      drawProjectiles(ctx);
      drawParticles(ctx);
      drawHUD(ctx, cW, cH);
      drawTouchButtons(ctx);
      break;

    case STATE.WAVE_CLEAR:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, null, false);
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawWaveClear(ctx, cW, cH);
      break;

    case STATE.ROGUE_SELECT:
      drawRogueSelect(ctx, cW, cH);
      break;

    case STATE.BOSS_DEFEAT:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, null, false);
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawWaveClear(ctx, cW, cH); // Reuse clear overlay
      break;

    case STATE.DIM_CLEAR:
      drawBackground(ctx, cW, cH, G.dimension);
      drawWaveClear(ctx, cW, cH);
      break;

    case STATE.GAMEOVER:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGameOver(ctx, cW, cH);
      break;

    case STATE.VICTORY:
      drawVictory(ctx, cW, cH);
      break;

    case STATE.TRUE_ENDING:
      drawTrueEnding(ctx, cW, cH);
      break;

    case STATE.PAUSE:
      drawBackground(ctx, cW, cH, G.dimension);
      drawGrid(ctx, gridOffX, gridOffY, cellSize, G.grid, null, false);
      drawTowers(ctx, gridOffX, gridOffY, cellSize, G.towers);
      drawPause(ctx, cW, cH);
      break;

    case STATE.CONFIRM:
      drawBackground(ctx, cW, cH, G.dimension);
      drawConfirmModal(ctx, cW, cH);
      break;
  }

  ctx.restore();

  // Transition overlay (on top of everything, outside camera transform)
  drawTransition(ctx, cW, cH);
}

// -- Game loop (F4: no setTimeout, 60fps target) --
let lastTime = 0;
function gameLoop(timestamp) {
  const raw = timestamp - lastTime;
  const dt = Math.min(raw, 33.33) / 1000; // Cap at 2 frames, convert to seconds
  lastTime = timestamp;

  update(dt);
  render();
  input.flush();

  requestAnimationFrame(gameLoop);
}

// -- Initialization --
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  // Load saved data
  loadSave();

  // Setup (§4.1: pure Canvas, no external assets)
  resize();
  input.init(canvas);
  window.addEventListener('resize', resize);
  resize();
  initBgParticles();

  // Start
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();
</script>
