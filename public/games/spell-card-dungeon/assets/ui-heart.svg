<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="hGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5577"/>
      <stop offset="100%" stop-color="#cc2244"/>
    </linearGradient>
    <radialGradient id="hShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ff99aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff99aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="hOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="17" r="14" fill="url(#hOuter)" filter="url(#hGlow)"/>
  <!-- Heart shape -->
  <path d="M16 27 C10 22 3 17 3 11 C3 7 6 4 10 4 C12.5 4 14.5 5.5 16 8 C17.5 5.5 19.5 4 22 4 C26 4 29 7 29 11 C29 17 22 22 16 27Z"
    fill="url(#hGrad)" filter="url(#hGlow)"/>
  <!-- Shine highlight -->
  <path d="M11 10 Q12 7 14 8 Q12 11 11 13Z" fill="#ff99aa" opacity="0.7"/>
  <!-- Arcane trim -->
  <path d="M16 27 C10 22 3 17 3 11 C3 7 6 4 10 4 C12.5 4 14.5 5.5 16 8 C17.5 5.5 19.5 4 22 4 C26 4 29 7 29 11 C29 17 22 22 16 27Z"
    fill="none" stroke="#ff88aa" stroke-width="0.5" opacity="0.6"/>
  <!-- Center rune mark -->
  <path d="M14 14 L16 11 L18 14 L16 13Z" fill="#ffccdd" opacity="0.5"/>
</svg>