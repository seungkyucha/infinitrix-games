<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="tRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c3cf7"/>
      <stop offset="100%" stop-color="#2a1560"/>
    </linearGradient>
    <radialGradient id="tOrbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e0ff"/>
      <stop offset="70%" stop-color="#b8a0e8"/>
      <stop offset="100%" stop-color="#6c5caa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tCard1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </linearGradient>
    <linearGradient id="tCard2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00bbff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </linearGradient>
    <linearGradient id="tCard3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <radialGradient id="tFireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tEnemyEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tText">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tPillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="50%" stop-color="#3a3055"/>
      <stop offset="100%" stop-color="#201838"/>
    </linearGradient>
    <radialGradient id="tTorch" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="tFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0a0810"/>
    </linearGradient>
    <linearGradient id="tEnemyBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1a1a"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#tBg)"/>
  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="30" cy="25" r="1" fill="#fff"/>
    <circle cx="80" cy="45" r="0.7" fill="#c8c0ff"/>
    <circle cx="150" cy="20" r="0.8" fill="#fff"/>
    <circle cx="250" cy="35" r="1.1" fill="#ffddaa"/>
    <circle cx="370" cy="15" r="0.9" fill="#c8c0ff"/>
    <circle cx="320" cy="50" r="0.6" fill="#fff"/>
    <circle cx="50" cy="70" r="0.5" fill="#fff"/>
    <circle cx="180" cy="60" r="0.7" fill="#ffddaa"/>
  </g>
  <!-- Moon -->
  <circle cx="340" cy="55" r="25" fill="url(#tMoon)" filter="url(#tGlow)" opacity="0.7"/>
  <!-- Dungeon pillars -->
  <rect x="10" y="60" width="22" height="200" fill="url(#tPillar)" opacity="0.7"/>
  <rect x="368" y="60" width="22" height="200" fill="url(#tPillar)" opacity="0.7"/>
  <!-- Torches -->
  <circle cx="50" cy="100" r="12" fill="url(#tTorch)" filter="url(#tGlow)"/>
  <path d="M47 105 Q49 95 50 98 Q51 93 53 105Z" fill="#ff8800" opacity="0.7"/>
  <circle cx="350" cy="100" r="12" fill="url(#tTorch)" filter="url(#tGlow)"/>
  <path d="M347 105 Q349 95 350 98 Q351 93 353 105Z" fill="#ff8800" opacity="0.7"/>
  <!-- Floor -->
  <rect y="210" width="400" height="90" fill="url(#tFloor)" opacity="0.8"/>
  <g stroke="#2a2040" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
  </g>
  <!-- Rune circle on floor -->
  <g opacity="0.3" filter="url(#tGlow)">
    <ellipse cx="200" cy="220" rx="60" ry="15" fill="none" stroke="#6c3cf7" stroke-width="1" stroke-dasharray="3 2"/>
    <ellipse cx="200" cy="220" rx="40" ry="10" fill="none" stroke="#9b59b6" stroke-width="0.5"/>
  </g>
  <!-- Enemy (right side - dark knight) -->
  <g transform="translate(290, 110)">
    <!-- Dark aura -->
    <circle cx="20" cy="30" r="30" fill="url(#tEnemyEye)" opacity="0.2" filter="url(#tStrong)"/>
    <!-- Body -->
    <path d="M12 25 Q10 35 8 55 L32 55 Q30 35 28 25 Q24 23 20 22 Q16 23 12 25Z" fill="url(#tEnemyBody)"/>
    <!-- Helmet -->
    <path d="M12 24 Q12 14 20 10 Q28 14 28 24 Q24 22 20 21 Q16 22 12 24Z" fill="#333" stroke="#660000" stroke-width="0.5"/>
    <path d="M14 18 L26 18 L24 20 L16 20Z" fill="#0a0505"/>
    <ellipse cx="17" cy="19" rx="1.5" ry="0.8" fill="#ff3333" filter="url(#tGlow)"/>
    <ellipse cx="23" cy="19" rx="1.5" ry="0.8" fill="#ff3333" filter="url(#tGlow)"/>
    <!-- Horns -->
    <path d="M12 16 Q8 10 6 4 Q10 8 14 14Z" fill="#5a3a1a"/>
    <path d="M28 16 Q32 10 34 4 Q30 8 26 14Z" fill="#5a3a1a"/>
    <!-- Sword -->
    <g transform="rotate(-25, 36, 24)">
      <rect x="35" y="22" width="1.5" height="16" fill="#666"/>
      <path d="M33.5 22 L35.7 10 L37.9 22Z" fill="#888"/>
      <line x1="35.7" y1="12" x2="35.7" y2="20" stroke="#ff3333" stroke-width="0.4" opacity="0.5"/>
    </g>
  </g>
  <!-- Player wizard (left-center) -->
  <g transform="translate(110, 100)">
    <!-- Arcane aura -->
    <circle cx="20" cy="30" r="28" fill="url(#tOrbGlow)" opacity="0.3" filter="url(#tStrong)"/>
    <!-- Robe -->
    <path d="M12 25 Q10 35 8 60 L32 60 Q30 35 28 25 Q24 23 20 22 Q16 23 12 25Z" fill="url(#tRobe)"/>
    <rect x="14" y="36" width="12" height="2.5" rx="1" fill="#ffd700" opacity="0.7"/>
    <!-- Hood -->
    <path d="M12 24 Q12 12 20 8 Q28 12 28 24 Q24 22 20 21 Q16 22 12 24Z" fill="#5b2c8e"/>
    <path d="M14 22 Q15 14 20 11 Q25 14 26 22 Q23 20 20 19 Q17 20 14 22Z" fill="#1a0a2e" opacity="0.7"/>
    <!-- Face -->
    <ellipse cx="20" cy="18" rx="4.5" ry="4" fill="#d4a574"/>
    <ellipse cx="18" cy="17.5" rx="1" ry="1.2" fill="#00d4ff" filter="url(#tGlow)"/>
    <ellipse cx="22" cy="17.5" rx="1" ry="1.2" fill="#00d4ff" filter="url(#tGlow)"/>
    <!-- Staff -->
    <rect x="34" y="8" width="2" height="48" rx="0.8" fill="#c9a84c" transform="rotate(8, 35, 30)"/>
    <circle cx="35.5" cy="6" r="3" fill="#ff6bff" filter="url(#tStrong)" transform="rotate(8, 35.5, 6)"/>
    <circle cx="35" cy="5" r="0.8" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Flying cards (the battle) -->
  <g transform="translate(190, 80)">
    <!-- Card 1 - Fire -->
    <g transform="rotate(-15, 0, 30)">
      <rect x="-14" y="5" width="28" height="40" rx="3" fill="#1a1a3e" stroke="#ff6600" stroke-width="1"/>
      <rect x="-10" y="10" width="20" height="14" rx="1" fill="url(#tCard1)" opacity="0.5"/>
      <path d="M-2 15 L0 10 L2 15 Q4 20 0 22 Q-4 20 -2 15Z" fill="#ff8800" filter="url(#tGlow)"/>
      <circle cx="0" cy="14" r="6" fill="url(#tFireGlow)" filter="url(#tGlow)"/>
      <rect x="-8" y="28" width="16" height="2" rx="1" fill="#666" opacity="0.5"/>
      <rect x="-6" y="33" width="12" height="1.5" rx="0.5" fill="#555" opacity="0.4"/>
      <!-- Cost -->
      <circle cx="-9" y="10" r="4" fill="#1a1a3e" stroke="#ffd700" stroke-width="0.5"/>
    </g>
    <!-- Card 2 - Ice (behind, slightly right) -->
    <g transform="translate(30, -5) rotate(5, 0, 30)">
      <rect x="-14" y="5" width="28" height="40" rx="3" fill="#1a1a3e" stroke="#00bbff" stroke-width="1"/>
      <rect x="-10" y="10" width="20" height="14" rx="1" fill="url(#tCard2)" opacity="0.5"/>
      <path d="M0 12 L3 18 L-3 18Z M0 22 L3 16 L-3 16Z" fill="#66ddff" opacity="0.7" filter="url(#tGlow)"/>
      <rect x="-8" y="28" width="16" height="2" rx="1" fill="#666" opacity="0.5"/>
    </g>
    <!-- Card 3 - Lightning (behind, slightly left) -->
    <g transform="translate(-25, -10) rotate(-30, 0, 30)">
      <rect x="-14" y="5" width="28" height="40" rx="3" fill="#1a1a3e" stroke="#ffd700" stroke-width="1"/>
      <rect x="-10" y="10" width="20" height="14" rx="1" fill="url(#tCard3)" opacity="0.5"/>
      <path d="M2 10 L-3 18 L1 18 L-2 24 L5 15 L1 15Z" fill="#ffee00" filter="url(#tGlow)"/>
      <rect x="-8" y="28" width="16" height="2" rx="1" fill="#666" opacity="0.5"/>
    </g>
  </g>
  <!-- Magic projectile flying from wizard to enemy -->
  <g filter="url(#tStrong)">
    <ellipse cx="230" cy="140" rx="8" ry="4" fill="#00d4ff" opacity="0.6" transform="rotate(-10, 230, 140)"/>
    <circle cx="228" cy="140" r="3" fill="#fff" opacity="0.5"/>
    <!-- Trail -->
    <path d="M160 145 Q190 138 225 140" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
    <path d="M170 147 Q195 140 222 141" fill="none" stroke="#6c3cf7" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Mana bar UI (top-left) -->
  <g opacity="0.7">
    <rect x="15" y="10" width="80" height="8" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <rect x="16" y="11" width="55" height="6" rx="3" fill="url(#tCard2)"/>
    <rect x="15" y="22" width="80" height="8" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <rect x="16" y="23" width="70" height="6" rx="3" fill="#cc2244"/>
  </g>
  <!-- Bottom dark overlay for title -->
  <rect y="245" width="400" height="55" fill="#050510" opacity="0.85"/>
  <line x1="40" y1="250" x2="360" y2="250" stroke="#6c3cf7" stroke-width="1" opacity="0.5" filter="url(#tGlow)"/>
  <!-- Title text -->
  <text x="200" y="280" text-anchor="middle" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" filter="url(#tText)" font-family="serif">
    SPELL CARD DUNGEON
  </text>
  <text x="200" y="295" text-anchor="middle" font-size="10" fill="#9b88cc" opacity="0.7" font-family="sans-serif">
    Roguelike Deckbuilder
  </text>
  <!-- Decorative corner runes -->
  <g opacity="0.4" filter="url(#tGlow)">
    <path d="M5 5 L15 5 L5 15Z" fill="none" stroke="#6c3cf7" stroke-width="0.8"/>
    <path d="M395 5 L385 5 L395 15Z" fill="none" stroke="#6c3cf7" stroke-width="0.8"/>
    <path d="M5 295 L15 295 L5 285Z" fill="none" stroke="#6c3cf7" stroke-width="0.8"/>
    <path d="M395 295 L385 295 L395 285Z" fill="none" stroke="#6c3cf7" stroke-width="0.8"/>
  </g>
</svg>