<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ebody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1a1a"/>
      <stop offset="50%" stop-color="#2d0a0a"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </linearGradient>
    <radialGradient id="eyeRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="60%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="50%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="eglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="estrong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hornGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a1a1a"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
  </defs>
  <!-- Dark aura -->
  <g filter="url(#estrong)" opacity="0.4">
    <ellipse cx="32" cy="32" rx="24" ry="26" fill="url(#coreGlow)"/>
  </g>
  <!-- Body - dark knight/demon silhouette -->
  <g>
    <!-- Torso armor -->
    <path d="M24 26 Q22 34 20 48 L44 48 Q42 34 40 26 Q36 24 32 23 Q28 24 24 26Z" fill="url(#ebody)"/>
    <!-- Chest plate -->
    <path d="M26 28 L32 26 L38 28 L36 38 L28 38Z" fill="url(#armorGrad)" stroke="#660000" stroke-width="0.5"/>
    <!-- Chest emblem -->
    <path d="M30 31 L32 29 L34 31 L33 31 L33 34 L31 34 L31 31Z" fill="#ff3333" filter="url(#eglow)"/>
  </g>
  <!-- Shoulder pads -->
  <g>
    <path d="M18 28 Q16 24 20 22 Q24 22 26 26 L24 30Z" fill="url(#armorGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="21" cy="25" r="1.5" fill="#ff3333" filter="url(#eglow)"/>
    <path d="M46 28 Q48 24 44 22 Q40 22 38 26 L40 30Z" fill="url(#armorGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="43" cy="25" r="1.5" fill="#ff3333" filter="url(#eglow)"/>
  </g>
  <!-- Head / Helmet -->
  <g>
    <path d="M24 24 Q24 14 32 10 Q40 14 40 24 Q36 22 32 21 Q28 22 24 24Z" fill="url(#armorGrad)" stroke="#660000" stroke-width="0.5"/>
    <!-- Visor slit -->
    <path d="M26 18 L38 18 L36 20 L28 20Z" fill="#0a0505"/>
    <!-- Eyes in visor -->
    <ellipse cx="29" cy="19" rx="2" ry="1" fill="url(#eyeRed)" filter="url(#eglow)"/>
    <ellipse cx="35" cy="19" rx="2" ry="1" fill="url(#eyeRed)" filter="url(#eglow)"/>
    <!-- Horns -->
    <path d="M24 16 Q20 10 18 4 Q22 8 26 14Z" fill="url(#hornGrad)"/>
    <path d="M40 16 Q44 10 46 4 Q42 8 38 14Z" fill="url(#hornGrad)"/>
  </g>
  <!-- Sword -->
  <g transform="rotate(-20, 48, 30)">
    <rect x="47" y="28" width="2" height="20" rx="0.5" fill="#555" stroke="#333" stroke-width="0.3"/>
    <path d="M45 28 L48 12 L51 28Z" fill="#888" stroke="#666" stroke-width="0.3"/>
    <line x1="48" y1="14" x2="48" y2="26" stroke="#ff3333" stroke-width="0.5" opacity="0.6" filter="url(#eglow)"/>
    <rect x="44" y="28" width="8" height="2.5" rx="1" fill="#8b4513"/>
  </g>
  <!-- Ground shadow -->
  <ellipse cx="32" cy="52" rx="16" ry="4" fill="#1a0505" opacity="0.5"/>
  <!-- Legs -->
  <path d="M26 48 L24 56 L28 56 L30 48Z" fill="url(#ebody)"/>
  <path d="M34 48 L36 56 L40 56 L38 48Z" fill="url(#ebody)"/>
  <!-- Boot accents -->
  <path d="M23 54 L29 54 L28 57 L22 57Z" fill="url(#armorGrad)"/>
  <path d="M35 54 L41 54 L42 57 L36 57Z" fill="url(#armorGrad)"/>
</svg>