<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#ff3300" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6c3cf7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arcaneRing" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#9b59b6" stop-opacity="0"/>
      <stop offset="85%" stop-color="#9b59b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer arcane shockwave -->
  <circle cx="48" cy="48" r="42" fill="url(#arcaneRing)" filter="url(#hitStrong)"/>
  <!-- Outer blast ring -->
  <circle cx="48" cy="48" r="36" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.4" filter="url(#hitGlow)"/>
  <circle cx="48" cy="48" r="28" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.3" filter="url(#hitGlow)"/>
  <!-- Outer glow -->
  <circle cx="48" cy="48" r="40" fill="url(#hitOuter)" filter="url(#hitStrong)"/>
  <!-- Main blast -->
  <circle cx="48" cy="48" r="22" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <!-- Radial spikes -->
  <g filter="url(#hitGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="8" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="48" x2="18" y2="18" stroke="#ff8800" stroke-width="1.5"/>
    <line x1="48" y1="48" x2="78" y2="18" stroke="#ff8800" stroke-width="1.5"/>
    <line x1="48" y1="48" x2="18" y2="78" stroke="#ff8800" stroke-width="1.5"/>
    <line x1="48" y1="48" x2="78" y2="78" stroke="#ff8800" stroke-width="1.5"/>
  </g>
  <!-- Secondary spikes (thinner) -->
  <g filter="url(#hitGlow)" opacity="0.4">
    <line x1="48" y1="48" x2="28" y2="12" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="68" y2="12" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="12" y2="32" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="84" y2="32" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="12" y2="64" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="84" y2="64" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="28" y2="84" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="48" y1="48" x2="68" y2="84" stroke="#6c3cf7" stroke-width="1"/>
  </g>
  <!-- Sparks / debris -->
  <g filter="url(#hitGlow)">
    <circle cx="30" cy="22" r="2" fill="#ffd700" opacity="0.8"/>
    <circle cx="66" cy="26" r="1.5" fill="#ff8800" opacity="0.7"/>
    <circle cx="24" cy="60" r="1.8" fill="#ffd700" opacity="0.6"/>
    <circle cx="72" cy="64" r="1.3" fill="#ff8800" opacity="0.7"/>
    <circle cx="38" cy="14" r="1" fill="#fff" opacity="0.9"/>
    <circle cx="62" cy="78" r="1.2" fill="#fff" opacity="0.8"/>
    <circle cx="16" cy="44" r="1" fill="#6c3cf7" opacity="0.6"/>
    <circle cx="80" cy="48" r="0.8" fill="#6c3cf7" opacity="0.5"/>
  </g>
  <!-- Core white flash -->
  <circle cx="48" cy="48" r="8" fill="#fff" opacity="0.7" filter="url(#hitGlow)"/>
</svg>