<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#cc7700"/>
    </linearGradient>
    <radialGradient id="gemShine" cx="40%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff8dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="gemGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="url(#gemOuter)" filter="url(#gemGlow)"/>
  <!-- Gem / Gold coin body -->
  <circle cx="16" cy="16" r="11" fill="url(#gemGrad)" filter="url(#gemGlow)"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#cc8800" stroke-width="0.8"/>
  <!-- Mana symbol (diamond) -->
  <path d="M16 8 L21 16 L16 24 L11 16Z" fill="none" stroke="#cc7700" stroke-width="1"/>
  <path d="M16 10 L19.5 16 L16 22 L12.5 16Z" fill="#ffcc00" opacity="0.5"/>
  <!-- Shine -->
  <path d="M12 11 Q14 9 16 10 Q14 12 12 14Z" fill="#fff8dc" opacity="0.6"/>
  <!-- Sparkle dots -->
  <circle cx="10" cy="8" r="0.8" fill="#ffd700" opacity="0.7" filter="url(#gemGlow)"/>
  <circle cx="22" cy="9" r="0.6" fill="#ffd700" opacity="0.5" filter="url(#gemGlow)"/>
  <circle cx="23" cy="22" r="0.5" fill="#ffd700" opacity="0.6" filter="url(#gemGlow)"/>
</svg>