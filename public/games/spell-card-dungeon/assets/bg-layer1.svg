<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e0ff"/>
      <stop offset="70%" stop-color="#b8a0e8"/>
      <stop offset="100%" stop-color="#6c5caa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5caa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5caa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#3a1a5e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3a1a5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="70%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#1a2a4e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a2a4e" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="mtGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </linearGradient>
    <linearGradient id="mtGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#150d2a"/>
      <stop offset="100%" stop-color="#0a0614"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- Nebula clouds -->
  <rect width="800" height="600" fill="url(#nebula1)"/>
  <rect width="800" height="600" fill="url(#nebula2)"/>
  <!-- Moon -->
  <circle cx="650" cy="120" r="80" fill="url(#moonHalo)"/>
  <circle cx="650" cy="120" r="35" fill="url(#moon)" filter="url(#starGlow)"/>
  <!-- Craters on moon -->
  <circle cx="640" cy="112" r="5" fill="#c0b0e0" opacity="0.3"/>
  <circle cx="658" cy="128" r="3" fill="#c0b0e0" opacity="0.2"/>
  <circle cx="648" cy="105" r="2" fill="#c0b0e0" opacity="0.25"/>
  <!-- Stars layer -->
  <g filter="url(#starGlow)">
    <circle cx="100" cy="80" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="200" cy="40" r="1" fill="#c8c0ff" opacity="0.8"/>
    <circle cx="350" cy="60" r="1.2" fill="#fff" opacity="0.7"/>
    <circle cx="450" cy="30" r="0.8" fill="#ffddaa" opacity="0.9"/>
    <circle cx="550" cy="90" r="1" fill="#c8c0ff" opacity="0.6"/>
    <circle cx="720" cy="50" r="1.3" fill="#fff" opacity="0.8"/>
    <circle cx="50" cy="150" r="0.8" fill="#ffddaa" opacity="0.7"/>
    <circle cx="300" cy="130" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="500" cy="150" r="0.7" fill="#c8c0ff" opacity="0.8"/>
    <circle cx="150" cy="200" r="0.9" fill="#fff" opacity="0.6"/>
    <circle cx="750" cy="180" r="1.1" fill="#ffddaa" opacity="0.7"/>
    <circle cx="400" cy="100" r="1.4" fill="#fff" opacity="0.9"/>
    <circle cx="80" cy="30" r="0.6" fill="#fff" opacity="0.5"/>
    <circle cx="250" cy="170" r="0.7" fill="#c8c0ff" opacity="0.6"/>
    <circle cx="600" cy="160" r="0.9" fill="#fff" opacity="0.4"/>
    <circle cx="680" cy="200" r="0.8" fill="#ffddaa" opacity="0.5"/>
    <circle cx="380" cy="190" r="1.0" fill="#fff" opacity="0.7"/>
    <circle cx="520" cy="45" r="0.5" fill="#fff" opacity="0.8"/>
    <circle cx="170" cy="110" r="1.2" fill="#c8c0ff" opacity="0.5"/>
    <circle cx="420" cy="175" r="0.6" fill="#ffddaa" opacity="0.6"/>
  </g>
  <!-- Distant mountains silhouette (far) -->
  <path d="M0 500 L0 420 Q50 380 100 400 Q150 350 200 380 Q250 330 300 360 Q350 310 400 340 Q450 300 500 330 Q550 310 600 350 Q650 320 700 360 Q750 340 800 380 L800 500Z" fill="url(#mtGrad2)"/>
  <!-- Distant mountains silhouette (mid) -->
  <path d="M0 500 L0 440 Q60 400 120 420 Q180 380 240 410 Q300 370 360 395 Q420 360 480 390 Q540 370 600 400 Q660 380 720 410 Q760 390 800 420 L800 500Z" fill="url(#mtGrad1)"/>
  <!-- Arcane aurora streak -->
  <path d="M100 250 Q200 230 350 260 Q500 240 650 270 Q750 250 800 260" fill="none" stroke="#6c3cf7" stroke-width="1.5" opacity="0.15" filter="url(#starGlow)"/>
  <path d="M0 280 Q150 260 300 290 Q450 270 600 295 Q700 280 800 290" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.1" filter="url(#starGlow)"/>
  <!-- Distant dungeon tower silhouettes -->
  <g opacity="0.3">
    <rect x="350" y="340" width="15" height="80" fill="#0d0818"/>
    <path d="M345 340 L357.5 310 L370 340Z" fill="#0d0818"/>
    <rect x="540" y="360" width="12" height="60" fill="#0d0818"/>
    <path d="M536 360 L546 335 L556 360Z" fill="#0d0818"/>
    <rect x="180" y="380" width="10" height="40" fill="#0d0818"/>
    <path d="M177 380 L185 362 L193 380Z" fill="#0d0818"/>
  </g>
</svg>