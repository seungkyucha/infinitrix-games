<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0d0a18"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="40%" stop-color="#3a3055"/>
      <stop offset="60%" stop-color="#3a3055"/>
      <stop offset="100%" stop-color="#201838"/>
    </linearGradient>
    <radialGradient id="torch1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="runeGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
    <filter id="fglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0a0810"/>
    </linearGradient>
    <linearGradient id="archGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2545"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
  </defs>
  <!-- Dungeon wall background -->
  <rect y="0" width="800" height="400" fill="url(#wallGrad)" opacity="0.7"/>
  <!-- Stone floor -->
  <rect y="400" width="800" height="200" fill="url(#floorGrad)" opacity="0.8"/>
  <!-- Floor tile lines -->
  <g stroke="#2a2040" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="510" x2="800" y2="510"/>
    <line x1="0" y1="580" x2="800" y2="580"/>
    <line x1="100" y1="400" x2="50" y2="600"/>
    <line x1="250" y1="400" x2="200" y2="600"/>
    <line x1="400" y1="400" x2="400" y2="600"/>
    <line x1="550" y1="400" x2="600" y2="600"/>
    <line x1="700" y1="400" x2="750" y2="600"/>
  </g>
  <!-- Left pillar -->
  <g>
    <rect x="30" y="100" width="40" height="350" fill="url(#pillarGrad)" opacity="0.8"/>
    <rect x="25" y="90" width="50" height="20" rx="2" fill="#2a2545" opacity="0.8"/>
    <rect x="25" y="440" width="50" height="15" rx="2" fill="#2a2545" opacity="0.8"/>
    <!-- Rune on pillar -->
    <path d="M45 200 L50 180 L55 200 L50 195Z" fill="#6c3cf7" opacity="0.6" filter="url(#fglow)"/>
    <path d="M42 250 L50 240 L58 250 M45 250 L50 260 L55 250" fill="none" stroke="#6c3cf7" stroke-width="1" opacity="0.4" filter="url(#fglow)"/>
  </g>
  <!-- Right pillar -->
  <g>
    <rect x="730" y="100" width="40" height="350" fill="url(#pillarGrad)" opacity="0.8"/>
    <rect x="725" y="90" width="50" height="20" rx="2" fill="#2a2545" opacity="0.8"/>
    <rect x="725" y="440" width="50" height="15" rx="2" fill="#2a2545" opacity="0.8"/>
    <path d="M745 200 L750 180 L755 200 L750 195Z" fill="#6c3cf7" opacity="0.6" filter="url(#fglow)"/>
    <path d="M742 250 L750 240 L758 250 M745 250 L750 260 L755 250" fill="none" stroke="#6c3cf7" stroke-width="1" opacity="0.4" filter="url(#fglow)"/>
  </g>
  <!-- Center arch -->
  <g opacity="0.6">
    <path d="M250 380 L250 180 Q400 80 550 180 L550 380" fill="none" stroke="url(#archGrad)" stroke-width="8"/>
    <path d="M258 380 L258 185 Q400 90 542 185 L542 380" fill="none" stroke="#2a2545" stroke-width="2"/>
    <!-- Keystone -->
    <path d="M388 105 L400 88 L412 105Z" fill="#3a3055"/>
    <circle cx="400" cy="102" r="4" fill="#6c3cf7" opacity="0.6" filter="url(#fglow)"/>
  </g>
  <!-- Torches -->
  <g>
    <!-- Left torch -->
    <rect x="118" y="200" width="4" height="30" fill="#5a4a3a"/>
    <circle cx="120" cy="195" r="20" fill="url(#torch1)" filter="url(#fglow)"/>
    <path d="M116 200 Q118 185 120 190 Q122 182 124 200Z" fill="#ff8800" opacity="0.8" filter="url(#fglow)"/>
    <path d="M117 198 Q119 188 120 192 Q121 186 123 198Z" fill="#ffcc00" opacity="0.6"/>
    <!-- Right torch -->
    <rect x="678" y="200" width="4" height="30" fill="#5a4a3a"/>
    <circle cx="680" cy="195" r="20" fill="url(#torch1)" filter="url(#fglow)"/>
    <path d="M676 200 Q678 185 680 190 Q682 182 684 200Z" fill="#ff8800" opacity="0.8" filter="url(#fglow)"/>
    <path d="M677 198 Q679 188 680 192 Q681 186 683 198Z" fill="#ffcc00" opacity="0.6"/>
  </g>
  <!-- Rune circle on floor -->
  <g transform="translate(400,480)" opacity="0.3" filter="url(#fglow)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#6c3cf7" stroke-width="1.5" stroke-dasharray="4 3"/>
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="none" stroke="#9b59b6" stroke-width="0.8" stroke-dasharray="2 2"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="url(#runeGlow1)"/>
    <!-- Rune symbols -->
    <path d="M-20 -5 L-15 -12 L-10 -5 M-17 -5 L-15 2 L-13 -5" fill="none" stroke="#9b59b6" stroke-width="0.8"/>
    <path d="M10 -5 L15 -12 L20 -5 M13 -5 L15 2 L17 -5" fill="none" stroke="#9b59b6" stroke-width="0.8"/>
    <circle cx="0" cy="-2" r="3" fill="none" stroke="#6c3cf7" stroke-width="0.6"/>
  </g>
  <!-- Floating dust particles -->
  <g opacity="0.3">
    <circle cx="150" cy="300" r="1" fill="#c8c0ff"/>
    <circle cx="350" cy="250" r="0.8" fill="#c8c0ff"/>
    <circle cx="500" cy="320" r="1.2" fill="#c8c0ff"/>
    <circle cx="650" cy="280" r="0.7" fill="#c8c0ff"/>
    <circle cx="250" cy="350" r="0.9" fill="#c8c0ff"/>
    <circle cx="580" cy="370" r="0.6" fill="#c8c0ff"/>
    <circle cx="420" cy="340" r="1" fill="#e0d8ff"/>
    <circle cx="300" cy="150" r="0.8" fill="#e0d8ff"/>
  </g>
  <!-- Chains hanging -->
  <g stroke="#3a3055" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M160 90 Q162 120 158 150 Q164 170 160 200"/>
    <path d="M640 90 Q638 115 642 145 Q636 170 640 195"/>
  </g>
</svg>