// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, dpr = 1;
let bgCache = null; // offscreen canvas for background

// Resize canvas to fill window with DPR support
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildBgCache();
}

// Build offscreen background cache (F10)
function buildBgCache() {
  bgCache = document.createElement('canvas');
  bgCache.width = W * dpr;
  bgCache.height = H * dpr;
  const bctx = bgCache.getContext('2d');
  bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Layer 0: deep dungeon gradient
  const grad = bctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0e1a');
  grad.addColorStop(0.5, '#0f1225');
  grad.addColorStop(1, '#0a0e1a');
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, W, H);
  // Grid pattern
  bctx.strokeStyle = 'rgba(30,40,70,0.3)';
  bctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, H); bctx.stroke(); }
  for (let y = 0; y < H; y += 40) { bctx.beginPath(); bctx.moveTo(0, y); bctx.lineTo(W, y); bctx.stroke(); }
  // Layer 1: dungeon stone texture (code-drawn)
  bctx.globalAlpha = 0.08;
  bctx.fillStyle = '#1a2040';
  for (let bx = 0; bx < W; bx += 60) {
    for (let by = 0; by < H; by += 30) {
      const off = (Math.floor(by / 30) % 2) * 30;
      bctx.fillRect(bx + off, by, 58, 28);
    }
  }
  bctx.globalAlpha = 1;
  // Layer 2: rune circle (dungeon atmosphere)
  bctx.globalAlpha = 0.04;
  bctx.strokeStyle = '#a855f7';
  bctx.lineWidth = 1;
  const cx0 = W / 2, cy0 = H * 0.35;
  for (let r = 60; r < 200; r += 40) {
    bctx.beginPath(); bctx.arc(cx0, cy0, r, 0, Math.PI * 2); bctx.stroke();
  }
  bctx.globalAlpha = 1;
  // Torch glow spots
  bctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 5; i++) {
    const tx = (W / 6) * (i + 1);
    const ty = H * 0.15 + Math.sin(i * 2.1) * 30;
    const tg = bctx.createRadialGradient(tx, ty, 0, tx, ty, 60);
    tg.addColorStop(0, 'rgba(255,150,50,0.15)');
    tg.addColorStop(1, 'rgba(255,80,0,0)');
    bctx.fillStyle = tg;
    bctx.fillRect(tx - 60, ty - 60, 120, 120);
  }
  bctx.globalCompositeOperation = 'source-over';
}

// TweenManager with clearImmediate (F6)
class TweenManager {
  constructor() { this._tweens = []; this._toAdd = []; this._updating = false; }
  add(obj, props, dur, ease, onComplete) {
    const tw = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeOut', onComplete };
    for (const k in props) { tw.props[k] = { from: obj[k], to: props[k] }; }
    if (this._updating) this._toAdd.push(tw);
    else this._tweens.push(tw);
    return tw;
  }
  clearImmediate() { this._tweens.length = 0; this._toAdd.length = 0; }
  update(dt) {
    this._updating = true;
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const tw = this._tweens[i];
      tw.elapsed += dt;
      let t = Math.min(tw.elapsed / tw.dur, 1);
      if (tw.ease === 'easeOut') t = 1 - Math.pow(1 - t, 3);
      else if (tw.ease === 'easeIn') t = t * t * t;
      else if (tw.ease === 'easeInOut') t = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      for (const k in tw.props) { tw.obj[k] = tw.props[k].from + (tw.props[k].to - tw.props[k].from) * t; }
      if (tw.elapsed >= tw.dur) {
        for (const k in tw.props) tw.obj[k] = tw.props[k].to;
        this._tweens.splice(i, 1);
        if (tw.onComplete) tw.onComplete();
      }
    }
    this._updating = false;
    if (this._toAdd.length) { this._tweens.push(...this._toAdd); this._toAdd.length = 0; }
  }
}

// Particle system
class ParticleManager {
  constructor() { this.particles = []; }
  emit(x, y, count, color, opts) {
    const o = opts || {};
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y, vx: (Math.random() - 0.5) * (o.speed || 120),
        vy: (Math.random() - 0.5) * (o.speed || 120) - (o.rise || 0),
        life: o.life || 0.6, maxLife: o.life || 0.6,
        size: o.size || (2 + Math.random() * 3),
        color: color, shape: o.shape || 'circle'
      });
    }
  }
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
  }
  render(c) {
    for (const p of this.particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      c.globalAlpha = alpha;
      c.fillStyle = p.color;
      if (p.shape === 'star') {
        drawStar(c, p.x, p.y, 5, p.size, p.size * 0.5);
      } else {
        c.beginPath(); c.arc(p.x, p.y, p.size, 0, Math.PI * 2); c.fill();
      }
    }
    c.globalAlpha = 1;
  }
}

// Sound manager (Web Audio API) — F2: no setTimeout, use native scheduling
class SoundManager {
  constructor() {
    this.ctx = null; this.masterVol = null; this.bgmGain = null;
    this.bgmOscs = []; this.bgmPlaying = false; this.muted = false;
  }
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterVol = this.ctx.createGain();
      this.masterVol.gain.value = 1;
      this.masterVol.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = 0.15;
      this.bgmGain.connect(this.masterVol);
    } catch(e) { console.warn('Web Audio unavailable'); }
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  // Play a tone
  playTone(freq, dur, type, vol, delay) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol || 0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain);
    gain.connect(this.masterVol);
    osc.start(t);
    osc.stop(t + dur);
  }
  // Play noise burst
  playNoise(dur, vol, delay) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + (delay || 0);
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(vol || 0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(gain);
    gain.connect(this.masterVol);
    src.start(t);
    src.stop(t + dur);
  }
  // SFX: card draw
  sfxDraw() { this.playNoise(0.1, 0.12); }
  // SFX: card play by element
  sfxCardPlay(elem) {
    const freqs = {fire:330,ice:520,lightning:660,arcane:440,neutral:400};
    const types = {fire:'sine',ice:'sawtooth',lightning:'square',arcane:'triangle',neutral:'sine'};
    this.playTone(freqs[elem]||400, 0.2, types[elem]||'sine', 0.2);
  }
  // SFX: enemy hit
  sfxHit() { this.playNoise(0.15, 0.2); this.playTone(120, 0.15, 'sine', 0.25); }
  // SFX: enemy death
  sfxDeath() { this.playTone(400, 0.3, 'sawtooth', 0.2); this.playTone(200, 0.3, 'sawtooth', 0.15, 0.1); }
  // SFX: player hit
  sfxPlayerHit() { this.playTone(80, 0.2, 'sine', 0.3); }
  // SFX: boss appear
  sfxBoss() {
    this.playTone(100, 0.8, 'sawtooth', 0.3);
    this.playTone(150, 0.6, 'sawtooth', 0.25, 0.2);
    this.playTone(200, 0.4, 'sawtooth', 0.2, 0.4);
  }
  // SFX: gold
  sfxGold() {
    this.playTone(800, 0.1, 'sine', 0.15);
    this.playTone(1000, 0.1, 'sine', 0.12, 0.08);
    this.playTone(1200, 0.1, 'sine', 0.1, 0.16);
  }
  // SFX: reward/levelup
  sfxReward() {
    this.playTone(400, 0.1, 'triangle', 0.2);
    this.playTone(500, 0.1, 'triangle', 0.18, 0.1);
    this.playTone(600, 0.15, 'triangle', 0.15, 0.2);
    this.playTone(800, 0.2, 'triangle', 0.12, 0.3);
  }
  // BGM: dungeon ambient drone
  startBGM(isBoss) {
    this.stopBGM();
    if (!this.ctx || this.muted) return;
    this.bgmPlaying = true;
    this.bgmGain.gain.value = isBoss ? 0.2 : 0.15;
    const baseFreq = isBoss ? 65 : 55;
    // Drone
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sine'; osc1.frequency.value = baseFreq;
    osc1.connect(this.bgmGain); osc1.start();
    this.bgmOscs.push(osc1);
    // Fifth
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'triangle'; osc2.frequency.value = baseFreq * 1.5;
    const g2 = this.ctx.createGain(); g2.gain.value = 0.3;
    osc2.connect(g2); g2.connect(this.bgmGain); osc2.start();
    this.bgmOscs.push(osc2);
    // LFO for atmosphere
    const lfo = this.ctx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = isBoss ? 2 : 0.5;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 5;
    lfo.connect(lfoGain); lfoGain.connect(osc1.frequency);
    lfo.start(); this.bgmOscs.push(lfo);
  }
  stopBGM() {
    for (const o of this.bgmOscs) { try { o.stop(); } catch(e){} }
    this.bgmOscs = []; this.bgmPlaying = false;
  }
}

// Enforce min touch target size (F20/F24)
function touchSafe(w, h) { return { w: Math.max(CONFIG.MIN_TOUCH, w), h: Math.max(CONFIG.MIN_TOUCH, h) }; }

// Modify HP through single path (F16)
function modifyHP(amount) { playerHP = Math.max(0, Math.min(maxHP, playerHP + amount)); }

// Modify mana through single path (F16)
function modifyMana(amount) { playerMana = Math.max(0, Math.min(maxMana, playerMana + amount)); }

// Modify gold through single path (F16)
function addGold(amount) { gold = Math.max(0, gold + amount); if (gold >= 200) unlockAchievement('A08'); }

// Shuffle array in place
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

// Random int in range [min, max]
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// Random element from array
function randPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Check point in rect
function inRect(px, py, rx, ry, rw, rh) { return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh; }

// Draw star shape
function drawStar(c, cx, cy, spikes, outer, inner) {
  let rot = -Math.PI / 2;
  const step = Math.PI / spikes;
  c.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    c.lineTo(cx + Math.cos(rot) * r, cy + Math.sin(rot) * r);
    rot += step;
  }
  c.closePath(); c.fill();
}

// Add floating text popup
function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1.2, maxLife: 1.2 });
}

// Screen shake
function triggerShake(intensity) { shake.intensity = intensity; }

// Load best score from localStorage
function loadBestScore() {
  try { bestScore = parseInt(localStorage.getItem('spellCardDungeon_best') || '0', 10); } catch(e) { bestScore = 0; }
}

// Save best score
function saveBestScore(score) {
  try { localStorage.setItem('spellCardDungeon_best', String(score)); } catch(e) {}
}

// Load achievements
function loadAchievements() {
  try { achievements = JSON.parse(localStorage.getItem('spellCardDungeon_ach') || '{}'); } catch(e) { achievements = {}; }
}

// Save achievements
function saveAchievements() {
  try { localStorage.setItem('spellCardDungeon_ach', JSON.stringify(achievements)); } catch(e) {}
}

// Unlock achievement
function unlockAchievement(id) {
  if (!achievements[id]) {
    achievements[id] = true;
    saveAchievements();
    addFloatingText(W / 2, H / 4, '업적 달성: ' + ACH_DATA[id].name, '#ffd700');
    pm.emit(W / 2, H / 4, 20, '#ffd700', { speed: 80, life: 1.0, shape: 'star', size: 4 });
    snd.sfxReward();
  }
}

// Calculate final score
function calcScore() {
  let s = currentFloor * 100 + runStats.kills * 10 + runStats.bossKills * 500;
  s += playerHP * 2 + gold;
  if (currentFloor >= 10 && enemies.length === 0) s += 1000; // clear bonus
  const achCount = Object.keys(achievements).filter(k => achievements[k]).length;
  s += achCount * 200;
  return s;
}

// --- Card System ---
// Create a card instance from data
function createCard(id, upgraded) {
  const d = CARD_DATA[id];
  if (!d) return null;
  return { ...d, upgraded: upgraded || false };
}

// Initialize deck from starting cards
function initDeck() {
  deck = STARTING_DECK.map(id => createCard(id));
}

// Start battle: create draw pile from deck
function initDrawPile() {
  drawPile = deck.map(c => ({ ...c }));
  shuffle(drawPile);
  discardPile = [];
  exhaustPile = [];
  hand = [];
  powers = [];
}

// Draw N cards from draw pile into hand
function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (drawPile.length === 0) reshuffleDeck();
    if (drawPile.length === 0) break;
    const card = drawPile.pop();
    hand.push(card);
    snd.sfxDraw();
  }
}

// Reshuffle discard into draw pile
function reshuffleDeck() {
  drawPile = [...discardPile];
  discardPile = [];
  shuffle(drawPile);
}

// Check if card can be played
function canPlayCard(card, mana) {
  if (card.unlimitedMana) return true;
  return card.cost <= mana;
}

// Get card effective values (considering upgrades, relics, powers)
function getCardValues(card, relicList, powerList) {
  let dmg = card.upgraded ? (card.upgDmg || card.damage || 0) : (card.damage || 0);
  let blk = card.upgraded ? (card.upgBlock || card.block || 0) : (card.block || 0);
  let burn = card.upgraded ? (card.upgBurn || card.burn || 0) : (card.burn || 0);
  let slow = card.upgraded ? (card.upgSlow || card.slow || 0) : (card.slow || 0);
  let weak = card.upgraded ? (card.upgWeak || card.weak || 0) : (card.weak || 0);
  let dr = card.upgraded ? (card.upgDraw || card.draw || 0) : (card.draw || 0);
  let heal = card.upgraded ? (card.upgHeal || card.heal || 0) : (card.heal || 0);
  // Relic: fire bonus
  if (relicList.find(r => r.id === 'R02') && card.element === 'fire') dmg += 3;
  // Power: elemental harmony bonus
  const harmony = powerList.find(p => p.id === 'C20');
  if (harmony && card.element !== 'neutral' && card.type === 'attack') {
    dmg += harmony.upgraded ? (harmony.upgElemBonus || 5) : (harmony.elemBonus || 3);
  }
  return { dmg, blk, burn, slow, weak, dr, heal };
}

// Play a card on a target
function playCard(cardIdx, targetIdx) {
  if (GUARDS.isAnimating) return;
  const card = hand[cardIdx];
  if (!card || !canPlayCard(card, playerMana)) return;

  GUARDS.isAnimating = true;
  // Deduct mana (unless unlimited)
  if (!card.unlimitedMana) modifyMana(-card.cost);
  // If Time Stop, set unlimited mana for this turn
  if (card.unlimitedMana) { playerMana = 99; }

  const vals = getCardValues(card, relics, powers);
  snd.sfxCardPlay(card.element);

  // Runic circle effect
  runeCircle = { active: true, x: W / 2, y: H * 0.4, radius: 0, alpha: 1, element: card.element };
  tw.add(runeCircle, { radius: 60, alpha: 0 }, 0.6, 'easeOut', () => { runeCircle.active = false; });

  // Particle effect for card play
  pm.emit(W / 2, H * 0.45, 15, ELEM_COLORS[card.element] || '#94a3b8', { speed: 100, life: 0.5, size: 3 });

  // Apply effects based on card type
  if (card.type === 'attack') {
    applyAttackCard(card, vals, targetIdx);
  } else if (card.type === 'skill') {
    applySkillCard(card, vals, targetIdx);
  } else if (card.type === 'power') {
    powers.push({ ...card });
  }

  // Draw extra cards if applicable
  if (vals.dr > 0) drawCards(vals.dr);

  // Heal
  if (vals.heal > 0) { modifyHP(vals.heal); pm.emit(W / 2, H * 0.7, 10, '#10b981', { speed: 60, life: 0.6 }); }

  // Mana gain
  if (card.manaGain) modifyMana(card.manaGain);

  // Relic: lightning draw
  if (relics.find(r => r.id === 'R04') && card.element === 'lightning') drawCards(1);

  // Remove card from hand
  hand.splice(cardIdx, 1);

  // Exhaust or discard
  if (card.exhaust) exhaustPile.push(card);
  else discardPile.push(card);

  // Check enemy deaths
  checkEnemyDeaths();

  // Unlock animation after short delay via tween
  const animObj = { t: 0 };
  tw.add(animObj, { t: 1 }, 0.35, 'easeOut', () => {
    GUARDS.isAnimating = false;
    if (enemies.length === 0) onBattleWon();
  });
}

// Apply attack card damage to enemy(ies)
function applyAttackCard(card, vals, targetIdx) {
  const targets = card.aoe ? enemies : [enemies[targetIdx] || enemies[0]];
  let baseDmg = vals.dmg;

  for (let i = 0; i < targets.length; i++) {
    const e = targets[i];
    if (!e || e.hp <= 0) continue;
    let chainDmg = baseDmg;
    if (card.chain) chainDmg = Math.max(0, baseDmg - i * (card.upgraded ? (card.upgChainDecay || 1) : (card.chainDecay || 2)));
    const hits = card.hits || 1;
    for (let h = 0; h < hits; h++) {
      applyDamageToEnemy(e, chainDmg, card.element, relics);
    }
    if (vals.burn > 0) applyStatus(e, 'burn', vals.burn);
    if (vals.slow > 0) applyStatus(e, 'slow', vals.slow);
    if (vals.weak > 0) applyStatus(e, 'weak', vals.weak);
  }
}

// Apply skill card effects
function applySkillCard(card, vals, targetIdx) {
  if (vals.blk > 0) { playerBlock += vals.blk; }
  if (vals.weak > 0 && enemies[targetIdx]) applyStatus(enemies[targetIdx], 'weak', vals.weak);
  if (card.retBurn) {
    // Will apply burn on attacker (handled in enemyAttack)
  }
}

// Apply damage to an enemy (pure function style — F3)
function applyDamageToEnemy(enemy, baseDmg, element, relicList) {
  // Element multiplier
  const mult = (ELEM_MULT[element] && ELEM_MULT[element][enemy.type]) || 1.0;
  // Strength bonus
  let strBonus = 0; // player strength (from powers etc)
  // Vulnerable check
  const vulnMult = (enemy.statuses && enemy.statuses.vulnerable > 0) ? 1.5 : 1.0;
  const weakMod = getPlayerAtkMod(); // C2: player weak debuff reduces damage
  const finalDmg = Math.floor((baseDmg + strBonus) * mult * vulnMult * weakMod);
  // Apply to enemy block first
  let remaining = finalDmg;
  if (enemy.block > 0) {
    const absorbed = Math.min(enemy.block, remaining);
    enemy.block -= absorbed;
    remaining -= absorbed;
  }
  if (remaining > 0) {
    enemy.hp -= remaining;
    // Hit effect
    const ex = enemy.renderX || W * 0.6;
    const ey = enemy.renderY || H * 0.3;
    pm.emit(ex, ey, 8, ELEM_COLORS[element] || '#fff', { speed: 80, life: 0.4 });
    // Hit flash rendered via particles
    addFloatingText(ex + randInt(-20, 20), ey - 20, '-' + remaining, '#ef4444');
    snd.sfxHit();
    triggerShake(3);
  }
}

// Apply status effect to a target (enemy)
function applyStatus(target, status, stacks) {
  if (!target.statuses) target.statuses = {};
  target.statuses[status] = (target.statuses[status] || 0) + stacks;
}

// Apply status effect to the player (C2 fix)
function applyPlayerStatus(status, stacks) {
  playerStatuses[status] = (playerStatuses[status] || 0) + stacks;
}

// Tick down player statuses at start of player turn
function tickPlayerStatuses() {
  for (const key of Object.keys(playerStatuses)) {
    if (playerStatuses[key] > 0) playerStatuses[key]--;
    if (playerStatuses[key] <= 0) delete playerStatuses[key];
  }
}

// Get player damage modifier from debuffs (weak = deal less, slow = fewer cards)
function getPlayerAtkMod() {
  let mod = 1.0;
  if (playerStatuses.weak > 0) mod *= 0.75; // Deal 25% less damage when weakened
  return mod;
}

// Check and remove dead enemies
function checkEnemyDeaths() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].hp <= 0) {
      const e = enemies[i];
      pm.emit(e.renderX || W * 0.6, e.renderY || H * 0.3, 30, e.color || '#fff', { speed: 100, life: 1.0 });
      snd.sfxDeath();
      runStats.kills++;
      if (e.isBoss) { runStats.bossKills++; triggerShake(8); }
      enemies.splice(i, 1);
    }
  }
}

// On battle won
function onBattleWon() {
  if (GUARDS.isTransitioning) return;
  GUARDS.isTransitioning = true;
  // Achievement: first win
  unlockAchievement('A01');
  // Relic: heal on win
  if (relics.find(r => r.id === 'R05')) { modifyHP(3); addFloatingText(W * 0.2, H * 0.5, '+3 HP', '#10b981'); }
  // Check boss-specific achievements
  if (isBossBattle && runStats.damageTakenThisBoss === 0) unlockAchievement('A03');

  // Generate reward
  rewardGold = isBossBattle ? randInt(50, 75) : randInt(15, 25);
  if (enemies.length === 0 && isBossBattle) rewardGold = randInt(50, 75);
  addGold(rewardGold);
  snd.sfxGold();

  // Generate card rewards (3 random cards)
  generateRewardCards();

  const o = { t: 0 };
  tw.add(o, { t: 1 }, 0.5, 'easeOut', () => {
    GUARDS.isTransitioning = false;
    beginTransition('REWARD');
  });
}

// Generate 3 reward cards
function generateRewardCards() {
  rewardCards = [];
  const pool = Object.keys(CARD_DATA).filter(id => !['C01','C02','C03'].includes(id));
  shuffle(pool);
  for (let i = 0; i < Math.min(3, pool.length); i++) {
    rewardCards.push(createCard(pool[i]));
  }
}

// --- Battle System ---
// Start a new battle
function startBattle(enemyList, isBoss) {
  isBossBattle = isBoss;
  bossEnraged = false;
  battleTurn = 'player';
  turnNum = 0;
  playerBlock = 0;
  playerStatuses = {}; // Reset player debuffs on new battle
  runStats.damageTakenThisBoss = isBoss ? 0 : runStats.damageTakenThisBoss;
  enemies = enemyList.map((e, i) => ({
    ...e, renderX: 0, renderY: 0, block: 0,
    statuses: {}, actionIdx: 0, turnsAlive: 0
  }));
  initDrawPile();
  // Relic: start block
  if (relics.find(r => r.id === 'R03')) playerBlock += 5;
  // Apply power: frost shield at battle start
  startPlayerTurn();
  snd.startBGM(isBoss);
}

// Start player turn
function startPlayerTurn() {
  battleTurn = 'player';
  turnNum++;
  playerBlock = 0; // Block resets each turn
  modifyMana(maxMana - playerMana); // Refill mana
  // Power: frost shield
  const frost = powers.find(p => p.id === 'C17');
  if (frost) { playerBlock += frost.upgraded ? (frost.upgTurnBlock || 5) : (frost.turnBlock || 3); }
  // C2: Slow debuff reduces draw by 1
  const slowPenalty = (playerStatuses.slow > 0) ? 1 : 0;
  // Relic: extra draw
  const extraDraw = relics.find(r => r.id === 'R08') ? 1 : 0;
  drawCards(Math.max(1, CONFIG.DRAW_PER_TURN + extraDraw - slowPenalty));
  // C2: Tick down player statuses at start of turn
  tickPlayerStatuses();
  // Process enemy burn damage at player turn start
  for (const e of enemies) {
    if (e.statuses && e.statuses.burn > 0) {
      e.hp -= e.statuses.burn;
      addFloatingText(e.renderX || W * 0.6, (e.renderY || H * 0.3) - 15, '-' + e.statuses.burn + ' 🔥', '#ef4444');
      e.statuses.burn--;
    }
  }
  checkEnemyDeaths();
  if (enemies.length === 0) onBattleWon();
}

// End player turn
function endPlayerTurn() {
  if (GUARDS.isAnimating || battleTurn !== 'player') return;
  // Power: fire storm
  const fireStorm = powers.find(p => p.id === 'C16');
  if (fireStorm) {
    const dmg = fireStorm.upgraded ? (fireStorm.upgTurnDmg || 6) : (fireStorm.turnDmg || 4);
    for (const e of enemies) {
      e.hp -= dmg;
      addFloatingText(e.renderX || W * 0.6, (e.renderY || H * 0.3) - 10, '-' + dmg + ' 🔥', '#ef4444');
    }
    checkEnemyDeaths();
    if (enemies.length === 0) { onBattleWon(); return; }
  }
  // Discard remaining hand
  discardPile.push(...hand);
  hand = [];
  // Start enemy turn
  battleTurn = 'enemy';
  enemyActionIdx = 0;
  processNextEnemyAction();
}

// Process enemy actions one by one
function processNextEnemyAction() {
  if (enemyActionIdx >= enemies.length) {
    // All enemies done, start next player turn
    startPlayerTurn();
    return;
  }
  const e = enemies[enemyActionIdx];
  if (!e || e.hp <= 0) { enemyActionIdx++; processNextEnemyAction(); return; }

  GUARDS.isAnimating = true;
  const pattern = e.pattern || ['attack'];
  const action = pattern[e.actionIdx % pattern.length];
  e.actionIdx++;
  e.turnsAlive++;

  executeEnemyAction(e, action);

  const o = { t: 0 };
  tw.add(o, { t: 1 }, 0.5, 'easeOut', () => {
    GUARDS.isAnimating = false;
    // Check player death
    if (playerHP <= 0) { onPlayerDeath(); return; }
    // Imp flee
    if (e.special === 'flee' && e.turnsAlive >= 3 && action === 'flee') {
      enemies.splice(enemies.indexOf(e), 1);
      if (enemies.length === 0) { onBattleWon(); return; }
    }
    enemyActionIdx++;
    processNextEnemyAction();
  });
}

// Execute a single enemy action (F3 — pure function style)
function executeEnemyAction(enemy, action) {
  const atkMod = getEnemyAtkMod(enemy);
  const baseAtk = Math.floor(enemy.atk * atkMod);

  switch (action) {
    case 'attack': {
      dealDamageToPlayer(baseAtk);
      pm.emit(W * 0.25, H * 0.5, 8, enemy.color || '#f00', { speed: 60, life: 0.3 });
      break;
    }
    case 'heavy': {
      dealDamageToPlayer(Math.floor(baseAtk * 1.5));
      triggerShake(5);
      break;
    }
    case 'defend': {
      const def = enemy.special === 'highDef' ? 12 : 6;
      enemy.block += def;
      addFloatingText(enemy.renderX || W * 0.6, (enemy.renderY || H * 0.3) - 10, '+' + def + ' 🛡', '#06b6d4');
      break;
    }
    case 'buff': {
      applyStatus(enemy, 'strength', enemy.special === 'allyBuff' ? 3 : 2);
      addFloatingText(enemy.renderX || W * 0.6, (enemy.renderY || H * 0.3) - 10, '+강화', '#f59e0b');
      break;
    }
    case 'debuff': {
      applyPlayerStatus('weak', 2);
      addFloatingText(W * 0.25, H * 0.5, '약화 2턴', '#a855f7');
      break;
    }
    case 'summon': {
      if (enemies.length < 4) {
        const minion = createEnemy('skeleton', false);
        minion.renderX = W * 0.55 + enemies.length * 70;
        minion.renderY = H * 0.28;
        enemies.push(minion);
        addFloatingText(minion.renderX, minion.renderY - 20, '소환!', '#a855f7');
      }
      break;
    }
    case 'magic': {
      dealDamageToPlayer(12);
      pm.emit(W * 0.25, H * 0.5, 12, '#a855f7', { speed: 80, life: 0.5, shape: 'star' });
      break;
    }
    case 'crush': {
      dealDamageToPlayer(Math.floor(baseAtk * 0.8));
      applyPlayerStatus('vulnerable', 2);
      addFloatingText(W * 0.25, H * 0.5, '취약 2턴', '#dc2626');
      break;
    }
    case 'fire': {
      dealDamageToPlayer(15);
      pm.emit(W * 0.25, H * 0.5, 15, '#ef4444', { speed: 90, life: 0.5 });
      break;
    }
    case 'ice': {
      dealDamageToPlayer(10);
      applyPlayerStatus('slow', 3);
      addFloatingText(W * 0.25, H * 0.5, '둔화 3턴', '#38bdf8');
      break;
    }
    case 'lightning': {
      for (let i = 0; i < 3; i++) dealDamageToPlayer(Math.floor(baseAtk * 0.65));
      pm.emit(W * 0.25, H * 0.5, 10, '#facc15', { speed: 120, life: 0.3 });
      break;
    }
    case 'arcane': {
      dealDamageToPlayer(20);
      pm.emit(W * 0.25, H * 0.5, 15, '#a855f7', { speed: 100, life: 0.6, shape: 'star' });
      break;
    }
    case 'flee': break;
  }

  // Boss enrage check
  if (enemy.isBoss && enemy.enrage && !bossEnraged && enemy.hp <= enemy.maxHp * enemy.enrageThresh) {
    bossEnraged = true;
    applyStatus(enemy, 'strength', enemy.enrageStr || 3);
    addFloatingText(enemy.renderX || W * 0.6, (enemy.renderY || H * 0.3) - 30, '분노!', '#ef4444');
    triggerShake(6);
  }

  // Archmage storm every 4 turns
  if (enemy.stormInterval && enemy.actionIdx % enemy.stormInterval === 0 && enemy.actionIdx > 0) {
    dealDamageToPlayer(enemy.stormDmg || 20);
    addFloatingText(W / 2, H * 0.3, '원소 폭풍!', '#a855f7');
    triggerShake(8);
    pm.emit(W / 2, H * 0.4, 30, '#a855f7', { speed: 150, life: 1.0, shape: 'star', size: 5 });
  }
}

// Get enemy attack modifier (slow/weak)
function getEnemyAtkMod(enemy) {
  let mod = 1.0;
  if (enemy.statuses) {
    if (enemy.statuses.slow > 0) { mod *= 0.75; enemy.statuses.slow--; }
    if (enemy.statuses.weak > 0) { mod *= 0.75; enemy.statuses.weak--; }
    if (enemy.statuses.strength > 0) { mod += enemy.statuses.strength * 0.1; }
  }
  return mod;
}

// Deal damage to player (applies block)
function dealDamageToPlayer(dmg) {
  // C2: Vulnerable increases damage taken by 50%
  const vulnMod = (playerStatuses.vulnerable > 0) ? 1.5 : 1.0;
  let remaining = Math.floor(dmg * vulnMod);
  if (playerBlock > 0) {
    const absorbed = Math.min(playerBlock, remaining);
    playerBlock -= absorbed;
    remaining -= absorbed;
    if (absorbed > 0) addFloatingText(W * 0.25, H * 0.55, '방어 ' + absorbed, '#06b6d4');
  }
  if (remaining > 0) {
    modifyHP(-remaining);
    runStats.damageTakenThisBoss += remaining;
    addFloatingText(W * 0.25, H * 0.6, '-' + remaining, '#ef4444');
    snd.sfxPlayerHit();
    triggerShake(4);
  }
}

// Player death handler
function onPlayerDeath() {
  if (state === 'GAMEOVER') return;
  snd.stopBGM();
  triggerShake(10);
  beginTransition('GAMEOVER');
}

// Create an enemy instance from type
function createEnemy(type, isElite) {
  const d = ENEMY_DATA[type];
  if (!d) return null;
  const hp = isElite ? Math.floor(d.hp * CONFIG.ELITE_HP_MULT) : d.hp;
  const atk = isElite ? Math.floor(d.atk * CONFIG.ELITE_ATK_MULT) : d.atk;
  return {
    type, name: d.name + (isElite ? ' (엘리트)' : ''), hp, maxHp: hp, atk,
    pattern: d.pattern, color: d.color, special: d.special,
    isElite, isBoss: false, block: 0, statuses: {}, actionIdx: 0, turnsAlive: 0,
    renderX: 0, renderY: 0
  };
}

// Create a boss instance
function createBoss(bossKey) {
  const d = BOSS_DATA[bossKey];
  return {
    type: bossKey, name: d.name, hp: d.hp, maxHp: d.hp, atk: d.atk,
    pattern: d.pattern, color: d.color, special: null,
    isBoss: true, isElite: false, block: 0, statuses: {},
    actionIdx: 0, turnsAlive: 0, enrage: d.enrage, enrageThresh: d.enrageThresh,
    enrageStr: d.enrageStr, summon: d.summon, stormInterval: d.stormInterval, stormDmg: d.stormDmg,
    renderX: 0, renderY: 0
  };
}

// --- Map System ---
// Generate dungeon map
function generateMap() {
  dungeonMap = MAP_TEMPLATES.map((floor, fi) => ({
    floor: fi + 1,
    nodes: floor.nodes.map((n, ni) => ({
      ...n, visited: false, available: fi === 0,
      x: 0, y: 0, idx: ni
    }))
  }));
  selectedNode = -1;
}

// Advance to next floor after selecting node
function advanceFloor(nodeIdx) {
  const floor = dungeonMap[currentFloor - 1];
  if (!floor || !floor.nodes[nodeIdx]) return;
  const node = floor.nodes[nodeIdx];
  if (!node.available || node.visited) return;

  node.visited = true;

  // Handle node type
  switch (node.t) {
    case 'battle': {
      const pool = FLOOR_ENEMIES[currentFloor] || ['slime'];
      const count = currentFloor >= 7 ? randInt(2, 3) : randInt(1, 2);
      const isEliteChance = currentFloor >= 7 ? (currentFloor >= 9 ? 0.7 : 0.3) : 0;
      const enemyList = [];
      for (let i = 0; i < count; i++) {
        const type = randPick(pool);
        const isElite = Math.random() < isEliteChance;
        enemyList.push(createEnemy(type, isElite));
      }
      beginTransition('BATTLE');
      const wait = { t: 0 };
      tw.add(wait, { t: 1 }, CONFIG.TRANSITION_DUR, 'easeOut', () => { startBattle(enemyList, false); });
      break;
    }
    case 'boss': {
      const boss = createBoss(node.boss);
      GUARDS.isBossIntro = true;
      beginTransition('BOSS_INTRO');
      const wait = { t: 0 };
      tw.add(wait, { t: 1 }, CONFIG.TRANSITION_DUR, 'easeOut', () => {
        enemies = [boss];
        snd.sfxBoss();
      });
      break;
    }
    case 'shop': {
      runStats.shopVisits++;
      generateShopItems();
      beginTransition('SHOP');
      break;
    }
    case 'rest': {
      restChoice = null;
      beginTransition('REST');
      break;
    }
    case 'event': {
      const eventKeys = Object.keys(EVENT_DATA);
      currentEvent = { ...EVENT_DATA[randPick(eventKeys)] };
      beginTransition('EVENT');
      break;
    }
  }
}

// Move to next floor
function goToNextFloor() {
  currentFloor++;
  if (currentFloor > 10) {
    // Game cleared!
    onGameCleared();
    return;
  }
  // Make next floor nodes available
  if (dungeonMap[currentFloor - 1]) {
    for (const node of dungeonMap[currentFloor - 1].nodes) node.available = true;
  }
  beginTransition('MAP');
}

// Game cleared
function onGameCleared() {
  snd.stopBGM();
  unlockAchievement('A02');
  if (deck.length <= 15) unlockAchievement('A04');
  if (deck.length >= 30) unlockAchievement('A05');
  if (runStats.shopVisits === 0) unlockAchievement('A09');
  const elapsed = (Date.now() - runStartTime) / 1000;
  if (elapsed <= 300) unlockAchievement('A10');
  beginTransition('RESULT');
}

// --- Shop System ---
function generateShopItems() {
  const pool = Object.keys(CARD_DATA).filter(id => !['C01','C02','C03'].includes(id));
  shuffle(pool);
  shopItems = [];
  // 2 common, 1 uncommon, 1 rare card + remove + upgrade + potion
  const commons = pool.filter(id => CARD_DATA[id].rarity === 'common').slice(0, 2);
  const uncommons = pool.filter(id => CARD_DATA[id].rarity === 'uncommon').slice(0, 1);
  const rares = pool.filter(id => CARD_DATA[id].rarity === 'rare').slice(0, 1);
  for (const id of commons) shopItems.push({ type: 'card', card: createCard(id), price: SHOP_PRICES.common });
  for (const id of uncommons) shopItems.push({ type: 'card', card: createCard(id), price: SHOP_PRICES.uncommon });
  for (const id of rares) shopItems.push({ type: 'card', card: createCard(id), price: SHOP_PRICES.rare });
  shopItems.push({ type: 'remove', price: SHOP_PRICES.remove });
  shopItems.push({ type: 'upgrade', price: relics.find(r => r.id === 'R06') ? 0 : SHOP_PRICES.upgrade });
  shopItems.push({ type: 'potion', price: SHOP_PRICES.potion });
}

// Buy shop item
function buyShopItem(idx) {
  const item = shopItems[idx];
  if (!item || item.sold) return;
  if (gold < item.price) return;
  addGold(-item.price);
  item.sold = true;
  snd.sfxGold();
  if (item.type === 'card') { deck.push(item.card); addFloatingText(W / 2, H / 2, '카드 획득!', '#10b981'); }
  else if (item.type === 'remove' && deck.length > 5) {
    // Remove weakest card (first C01 or C02)
    const removeIdx = deck.findIndex(c => c.id === 'C01') >= 0 ? deck.findIndex(c => c.id === 'C01') : 0;
    deck.splice(removeIdx, 1);
    addFloatingText(W / 2, H / 2, '카드 제거!', '#ef4444');
  }
  else if (item.type === 'upgrade') {
    // Upgrade random non-upgraded card
    const upgradeable = deck.filter(c => !c.upgraded);
    if (upgradeable.length > 0) {
      const c = randPick(upgradeable);
      c.upgraded = true;
      addFloatingText(W / 2, H / 2, c.name + ' 업그레이드!', '#f59e0b');
    }
  }
  else if (item.type === 'potion') { modifyHP(20); addFloatingText(W / 2, H / 2, '+20 HP', '#10b981'); }
}

// --- State Transition System (F23) ---
function beginTransition(targetState) {
  if (GUARDS.isTransitioning && STATE_PRIORITY[targetState] <= STATE_PRIORITY[state]) return;
  GUARDS.isTransitioning = true;
  pendingState = targetState;
  tw.add(transOverlay, { alpha: 1 }, CONFIG.TRANSITION_DUR * 0.5, 'easeIn', () => {
    state = pendingState;
    tw.add(transOverlay, { alpha: 0 }, CONFIG.TRANSITION_DUR * 0.5, 'easeOut', () => {
      GUARDS.isTransitioning = false;
      pendingState = null;
    });
  });
}

// ═══════════════════════════════════════
// SECTION 8: UPDATE FUNCTIONS (F26 — state changes only here)
// ═══════════════════════════════════════

function update(dt) {
  gameTime += dt;
  titleGlitch += dt;
  titlePulse += dt;

  // Update systems based on state matrix (F4)
  if (state !== 'PAUSED') tw.update(dt);
  if (['TITLE','MAP','BATTLE','BOSS_INTRO','REWARD','RESULT','GAMEOVER'].includes(state)) pm.update(dt);

  // Shake decay
  if (shake.intensity > 0.1) {
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
    shake.intensity *= CONFIG.SHAKE_DECAY;
  } else { shake.x = 0; shake.y = 0; shake.intensity = 0; }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].life -= dt;
    floatingTexts[i].y -= 30 * dt;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

// ═══════════════════════════════════════
// SECTION 9: RENDER FUNCTIONS (F26 — pure output)
// ═══════════════════════════════════════

function render() {
  ctx.save();
  ctx.translate(shake.x, shake.y);

  // Draw cached background
  if (bgCache) ctx.drawImage(bgCache, 0, 0, W, H);
  else { ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H); }

  switch (state) {
    case 'TITLE': renderTitle(); break;
    case 'MAP': renderMap(); break;
    case 'BATTLE': renderBattle(); break;
    case 'BOSS_INTRO': renderBossIntro(); break;
    case 'REWARD': renderReward(); break;
    case 'SHOP': renderShop(); break;
    case 'REST': renderRest(); break;
    case 'EVENT': renderEvent(); break;
    case 'RESULT': renderResult(); break;
    case 'GAMEOVER': renderGameover(); break;
    case 'PAUSED': renderBattle(); renderPaused(); break;
  }

  // Runic circle effect (signature visual)
  if (runeCircle.active) renderRuneCircle();

  // Particles on top
  pm.render(ctx);

  // Floating texts
  renderFloatingTexts();

  // Transition overlay
  if (transOverlay.alpha > 0.01) {
    ctx.fillStyle = `rgba(10,14,26,${transOverlay.alpha})`;
    ctx.fillRect(-20, -20, W + 40, H + 40);
  }

  ctx.restore();
}

// --- Title Screen ---
function renderTitle() {
  // Scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  // Animated rune particles in background
  const t = gameTime;
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 8; i++) {
    const rx = W * 0.5 + Math.cos(t * 0.3 + i * 0.8) * W * 0.3;
    const ry = H * 0.4 + Math.sin(t * 0.4 + i * 1.1) * H * 0.2;
    ctx.fillStyle = ELEM_COLORS[['fire','ice','lightning','arcane'][i % 4]];
    drawStar(ctx, rx, ry, 6, 8 + Math.sin(t + i) * 3, 4);
  }
  ctx.globalAlpha = 1;

  // Player sprite or fallback wizard
  const px = W * 0.5, py = H * 0.32;
  drawWizard(ctx, px, py, 1.2);

  // Title with glitch effect
  const titleY = H * 0.18;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glitch offset
  const glitchX = Math.sin(titleGlitch * 8) > 0.95 ? randInt(-3, 3) : 0;
  const glitchY = Math.sin(titleGlitch * 12) > 0.97 ? randInt(-2, 2) : 0;

  // Glow
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 20 + Math.sin(titlePulse * 2) * 10;
  ctx.font = `bold ${Math.min(36, W * 0.06)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText('스펠 카드 던전', W / 2 + glitchX, titleY + glitchY);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = `${Math.min(14, W * 0.025)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText('로그라이크 덱빌딩 RPG', W / 2, titleY + 35);

  // Start button
  const btnW = 200, btnH = 50;
  const btnX = W / 2 - btnW / 2, btnY = H * 0.55;
  const pulse = Math.sin(gameTime * 3) * 0.1 + 0.9;
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 10 * pulse;
  roundRect(ctx, btnX, btnY, btnW, btnH, 6);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(168,85,247,0.1)';
  roundRect(ctx, btnX, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.font = `${Math.min(18, W * 0.03)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText('게임 시작', W / 2, btnY + btnH / 2);

  // Achievement button
  const achBtnY = btnY + 70;
  ctx.strokeStyle = '#4a5568';
  ctx.lineWidth = 1;
  roundRect(ctx, btnX, achBtnY, btnW, 40, 4);
  ctx.stroke();
  ctx.font = `${Math.min(14, W * 0.025)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText('업적: ' + Object.keys(achievements).filter(k => achievements[k]).length + '/10', W / 2, achBtnY + 20);

  // Best score
  ctx.font = `${Math.min(12, W * 0.02)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#505070';
  ctx.fillText('최고 점수: ' + bestScore, W / 2, H * 0.88);

  // Controls hint
  ctx.fillStyle = '#505070';
  ctx.fillText('SPACE / 탭으로 시작', W / 2, H * 0.93);
}

// --- Map Screen ---
function renderMap() {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Header HUD
  renderHUD();

  // Floor title
  ctx.font = `bold ${Math.min(18, W * 0.03)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText('던전 ' + currentFloor + '층', W / 2, 70);

  // Render map nodes
  const mapStartY = 100;
  const floorH = Math.min(50, (H - 180) / 10);

  for (let fi = 0; fi < dungeonMap.length; fi++) {
    const floor = dungeonMap[fi];
    const fy = mapStartY + fi * floorH;
    const nodeCount = floor.nodes.length;

    // Floor label
    ctx.font = `${Math.min(11, W * 0.018)}px 'Share Tech Mono', monospace`;
    ctx.fillStyle = fi + 1 === currentFloor ? '#a855f7' : '#505070';
    ctx.textAlign = 'right';
    ctx.fillText((fi + 1) + 'F', W * 0.12, fy);
    ctx.textAlign = 'center';

    for (let ni = 0; ni < nodeCount; ni++) {
      const node = floor.nodes[ni];
      const nx = W * 0.25 + (ni / Math.max(1, nodeCount - 1)) * W * 0.5;
      node.x = nodeCount === 1 ? W / 2 : nx;
      node.y = fy;

      // Node icon
      const nodeSize = 20;
      const ts = touchSafe(nodeSize * 2, nodeSize * 2);

      // Color based on type
      let nodeColor = '#4a5568';
      let icon = '⚔';
      if (node.t === 'boss') { nodeColor = '#ef4444'; icon = '👑'; }
      else if (node.t === 'shop') { nodeColor = '#eab308'; icon = '🏪'; }
      else if (node.t === 'rest') { nodeColor = '#10b981'; icon = '💤'; }
      else if (node.t === 'event') { nodeColor = '#a855f7'; icon = '?'; }
      else if (node.t === 'battle') { nodeColor = '#64748b'; icon = '⚔'; }

      if (node.visited) { nodeColor = '#2a2a3a'; }
      else if (node.available) { nodeColor = node.t === 'boss' ? '#ef4444' : '#a855f7'; }

      // Glow for available nodes
      if (node.available && !node.visited) {
        ctx.shadowColor = nodeColor;
        ctx.shadowBlur = 8 + Math.sin(gameTime * 3) * 4;
      }

      ctx.fillStyle = node.visited ? '#1a1a2a' : 'rgba(26,31,46,0.8)';
      ctx.strokeStyle = nodeColor;
      ctx.lineWidth = node.available && !node.visited ? 2 : 1;
      ctx.beginPath(); ctx.arc(node.x, node.y, nodeSize, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      // Icon
      ctx.font = `${Math.min(14, W * 0.023)}px 'Share Tech Mono', monospace`;
      ctx.fillStyle = node.visited ? '#505070' : '#e2e8f0';
      ctx.fillText(icon, node.x, node.y);
    }

    // Connection lines between floors
    if (fi > 0) {
      const prevFloor = dungeonMap[fi - 1];
      ctx.strokeStyle = 'rgba(80,80,112,0.3)';
      ctx.lineWidth = 1;
      for (const pn of prevFloor.nodes) {
        for (const cn of floor.nodes) {
          ctx.beginPath();
          ctx.moveTo(pn.x, pn.y + 12);
          ctx.lineTo(cn.x, cn.y - 12);
          ctx.stroke();
        }
      }
    }
  }

  // Bottom bar
  const bbY = H - 50;
  ctx.font = `${Math.min(12, W * 0.02)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText('노드를 클릭하여 이동 | D: 덱 보기', W / 2, bbY);
}

// --- Battle Screen ---
function renderBattle() {
  // HUD top
  renderHUD();

  // Enemy area
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    const ex = W * 0.45 + i * Math.min(100, W * 0.15);
    const ey = H * 0.25;
    e.renderX = ex; e.renderY = ey;

    // Enemy body
    if (e.isBoss) {
      drawBoss(ctx, ex, ey, e);
    } else {
      drawEnemy(ctx, ex, ey, e);
    }

    // HP bar
    const barW = e.isBoss ? 80 : 50;
    const barH = 6;
    const bx = ex - barW / 2, by = ey + (e.isBoss ? 45 : 30);
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(bx, by, barW, barH);
    const hpRatio = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#22c55e' : hpRatio > 0.25 ? '#eab308' : '#ef4444';
    ctx.fillRect(bx, by, barW * hpRatio, barH);
    ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, barW, barH);

    // HP text
    ctx.font = `${Math.min(10, W * 0.017)}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(Math.max(0, e.hp) + '/' + e.maxHp, ex, by + barH + 2);

    // Block indicator
    if (e.block > 0) {
      ctx.fillStyle = '#06b6d4';
      ctx.fillText('🛡' + e.block, ex, by + barH + 14);
    }

    // Intent icon
    if (battleTurn === 'player') {
      const intent = getEnemyIntent(e);
      ctx.font = `${Math.min(12, W * 0.02)}px 'Share Tech Mono', monospace`;
      ctx.textBaseline = 'bottom';
      ctx.fillStyle = intent.color;
      ctx.fillText(intent.text, ex, ey - (e.isBoss ? 50 : 35));
      ctx.textBaseline = 'middle';
    }

    // Status effects
    renderStatuses(ctx, ex, by + barH + 26, e.statuses);

    // Name
    ctx.font = `${Math.min(10, W * 0.016)}px 'Share Tech Mono', monospace`;
    ctx.fillStyle = e.isElite ? '#f59e0b' : '#8080a0';
    ctx.fillText(e.name, ex, ey - (e.isBoss ? 58 : 42));
  }

  // Hand area
  renderHand();

  // Turn end button
  if (battleTurn === 'player') {
    const btnW2 = 120, btnH2 = 48;
    const bx2 = W / 2 - btnW2 / 2, by2 = H - 55;
    ctx.fillStyle = hoveredBtn === 'endTurn' ? 'rgba(16,185,129,0.2)' : 'rgba(16,185,129,0.1)';
    roundRect(ctx, bx2, by2, btnW2, btnH2, 4);
    ctx.fill();
    ctx.strokeStyle = '#10b981'; ctx.lineWidth = 1.5;
    roundRect(ctx, bx2, by2, btnW2, btnH2, 4);
    ctx.stroke();
    ctx.font = `${Math.min(14, W * 0.023)}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText('턴 종료 [E]', W / 2, by2 + btnH2 / 2);
  } else {
    // Enemy turn indicator
    ctx.font = `${Math.min(16, W * 0.027)}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ef4444';
    ctx.fillText('적 턴...', W / 2, H - 35);
  }

  // Draw/discard pile info
  ctx.font = `${Math.min(11, W * 0.018)}px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#8080a0';
  ctx.fillText('드로우: ' + drawPile.length, 10, H - 15);
  ctx.textAlign = 'right';
  ctx.fillText('버림: ' + discardPile.length, W - 10, H - 15);
}

// Render hand cards
function renderHand() {
  const cardW = Math.min(CONFIG.CARD_W, (W - 40) / Math.max(hand.length, 1) - 5);
  const cardH = CONFIG.CARD_H;
  const totalW = hand.length * (cardW + 5) - 5;
  const startX = (W - totalW) / 2;
  const baseY = H - cardH - 65;

  for (let i = 0; i < hand.length; i++) {
    const card = hand[i];
    const cx = startX + i * (cardW + 5);
    const cy = i === hoveredCard ? baseY - 20 : baseY;
    const canPlay = canPlayCard(card, playerMana);

    drawCard(ctx, cx, cy, cardW, cardH, card, canPlay, i === hoveredCard);
  }
}

// Draw a single card
function drawCard(c, x, y, w, h, card, canPlay, isHovered) {
  c.save();
  // Card background
  c.fillStyle = isHovered ? '#252a3e' : '#1a1f2e';
  roundRect(c, x, y, w, h, 6);
  c.fill();

  // Border (rarity)
  c.strokeStyle = canPlay ? (RARITY_COLORS[card.rarity] || '#4a5568') : '#2a2a3a';
  c.lineWidth = isHovered ? 2.5 : 1.5;
  if (isHovered && canPlay) {
    c.shadowColor = RARITY_COLORS[card.rarity] || '#4a5568';
    c.shadowBlur = 8;
  }
  roundRect(c, x, y, w, h, 6);
  c.stroke();
  c.shadowBlur = 0;

  // Mana cost (top-left blue circle)
  const costR = Math.min(12, w * 0.14);
  c.fillStyle = '#2563eb';
  c.beginPath(); c.arc(x + costR + 4, y + costR + 4, costR, 0, Math.PI * 2); c.fill();
  c.font = `bold ${Math.min(12, w * 0.14)}px 'Share Tech Mono', monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#fff';
  c.fillText(String(card.cost), x + costR + 4, y + costR + 5);

  // Element icon (center)
  const iconY = y + h * 0.38;
  c.fillStyle = ELEM_COLORS[card.element] || '#94a3b8';
  drawElementIcon(c, x + w / 2, iconY, card.element, Math.min(14, w * 0.16));

  // Card name
  c.font = `bold ${Math.min(10, w * 0.11)}px 'Share Tech Mono', monospace`;
  c.textAlign = 'center';
  c.fillStyle = canPlay ? '#e2e8f0' : '#505070';
  c.fillText(card.name, x + w / 2, y + h * 0.62);

  // Upgraded indicator
  if (card.upgraded) {
    c.fillStyle = '#10b981';
    c.fillText('+', x + w - 10, y + 10);
  }

  // Description (small)
  c.font = `${Math.min(8, w * 0.09)}px 'Share Tech Mono', monospace`;
  c.fillStyle = '#8080a0';
  const desc = card.upgraded ? getUpgradedDesc(card) : card.desc;
  c.fillText(desc, x + w / 2, y + h * 0.75);

  // Type bar at bottom
  c.fillStyle = TYPE_COLORS[card.type] || '#4a5568';
  roundRectBottom(c, x + 2, y + h - 8, w - 4, 6, 4);
  c.fill();

  c.restore();
}

// Get upgraded description text
function getUpgradedDesc(card) {
  if (card.upgDmg) return card.upgDmg + ' 데미지' + (card.upgBurn ? ' + 화상' + card.upgBurn : '') + (card.aoe ? ' (전체)' : '');
  if (card.upgBlock) return card.upgBlock + ' 방어도';
  return card.desc;
}

// Draw element icon
function drawElementIcon(c, x, y, elem, size) {
  c.fillStyle = ELEM_COLORS[elem] || '#94a3b8';
  switch (elem) {
    case 'fire': // Triangle flame
      c.beginPath();
      c.moveTo(x, y - size); c.lineTo(x - size * 0.7, y + size * 0.5); c.lineTo(x + size * 0.7, y + size * 0.5);
      c.closePath(); c.fill();
      break;
    case 'ice': // Hexagon
      c.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        c.lineTo(x + Math.cos(a) * size, y + Math.sin(a) * size);
      }
      c.closePath(); c.fill();
      break;
    case 'lightning': // Zigzag bolt
      c.lineWidth = 2; c.strokeStyle = ELEM_COLORS.lightning;
      c.beginPath();
      c.moveTo(x - 2, y - size); c.lineTo(x + 4, y - 2); c.lineTo(x - 2, y + 2); c.lineTo(x + 4, y + size);
      c.stroke();
      break;
    case 'arcane': // Star
      drawStar(c, x, y, 5, size, size * 0.45);
      break;
    default: // Circle
      c.beginPath(); c.arc(x, y, size * 0.7, 0, Math.PI * 2); c.fill();
  }
}

// Draw enemy sprite (F3 — no global refs)
function drawEnemy(c, x, y, enemy) {
  // Canvas drawing by enemy type
  const s = 22;
  switch (enemy.type) {
    case 'slime':
      c.fillStyle = '#22c55e';
      c.beginPath(); c.ellipse(x, y + 5, s, s * 0.7, 0, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(x - 6, y, 4, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 6, y, 4, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#000';
      c.beginPath(); c.arc(x - 5, y + 1, 2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 7, y + 1, 2, 0, Math.PI * 2); c.fill();
      break;
    case 'skeleton':
      c.fillStyle = '#e2e8f0';
      c.beginPath(); c.arc(x, y - 5, 12, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#000';
      c.beginPath(); c.arc(x - 4, y - 6, 3, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 4, y - 6, 3, 0, Math.PI * 2); c.fill();
      c.fillRect(x - 1, y - 2, 2, 5);
      c.fillStyle = '#e2e8f0';
      c.fillRect(x - 8, y + 5, 16, 3); c.fillRect(x - 1, y + 2, 2, 12);
      break;
    case 'goblinMage':
      c.fillStyle = '#a855f7';
      c.beginPath(); c.moveTo(x, y - 18); c.lineTo(x - 12, y - 2); c.lineTo(x + 12, y - 2); c.closePath(); c.fill();
      c.fillStyle = '#7c3aed';
      c.fillRect(x - 10, y - 2, 20, 18);
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(x - 3, y + 3, 2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 3, y + 3, 2, 0, Math.PI * 2); c.fill();
      c.strokeStyle = '#f59e0b'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(x + 14, y - 5); c.lineTo(x + 14, y + 15); c.stroke();
      break;
    case 'darkKnight':
      c.fillStyle = '#64748b';
      c.fillRect(x - 12, y - 15, 24, 30);
      c.fillStyle = '#475569';
      c.fillRect(x - 14, y - 18, 28, 8);
      c.fillStyle = '#ef4444';
      c.beginPath(); c.arc(x - 4, y - 12, 2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 4, y - 12, 2, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#94a3b8';
      c.fillRect(x + 15, y - 10, 3, 25);
      break;
    case 'banshee':
      c.globalAlpha = 0.6;
      c.fillStyle = '#c4b5fd';
      c.beginPath(); c.ellipse(x, y, 14, 20, 0, 0, Math.PI * 2); c.fill();
      c.globalAlpha = 0.8;
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(x - 4, y - 5, 3, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 4, y - 5, 3, 0, Math.PI * 2); c.fill();
      c.globalAlpha = 1;
      break;
    case 'golem':
      c.fillStyle = '#92400e';
      c.fillRect(x - 15, y - 15, 30, 30);
      c.fillRect(x - 18, y - 5, 6, 20);
      c.fillRect(x + 12, y - 5, 6, 20);
      c.fillStyle = '#facc15';
      c.beginPath(); c.arc(x, y - 2, 5, 0, Math.PI * 2); c.fill();
      break;
    case 'imp':
      c.fillStyle = '#dc2626';
      c.beginPath(); c.arc(x, y, 10, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#000';
      c.beginPath(); c.arc(x - 3, y - 2, 2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 3, y - 2, 2, 0, Math.PI * 2); c.fill();
      // Wings
      c.fillStyle = '#991b1b';
      c.beginPath(); c.moveTo(x - 10, y - 5); c.lineTo(x - 18, y - 12); c.lineTo(x - 8, y); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(x + 10, y - 5); c.lineTo(x + 18, y - 12); c.lineTo(x + 8, y); c.closePath(); c.fill();
      // Tail
      c.strokeStyle = '#dc2626'; c.lineWidth = 2;
      c.beginPath(); c.moveTo(x, y + 10); c.quadraticCurveTo(x + 15, y + 15, x + 10, y + 5); c.stroke();
      break;
  }
}

// Draw boss (larger, more detailed)
function drawBoss(c, x, y, boss) {
  const scale = 1.8;
  c.save();
  // Aura glow
  c.shadowColor = boss.color;
  c.shadowBlur = 15 + Math.sin(gameTime * 2) * 5;

  switch (boss.type) {
    case 'guardian': // Giant stone golem
      c.fillStyle = '#78716c';
      c.fillRect(x - 25 * scale, y - 20 * scale, 50 * scale, 40 * scale);
      // Rune markings
      c.strokeStyle = '#facc15'; c.lineWidth = 2;
      c.beginPath(); c.arc(x, y, 12, 0, Math.PI * 2); c.stroke();
      c.fillStyle = '#facc15';
      c.beginPath(); c.arc(x, y, 6, 0, Math.PI * 2); c.fill();
      // Arms
      c.fillStyle = '#78716c';
      c.fillRect(x - 30 * scale, y - 5, 8, 35);
      c.fillRect(x + 22 * scale, y - 5, 8, 35);
      break;
    case 'lich': // Dark floating lich
      c.fillStyle = '#1e1b4b';
      c.beginPath(); c.moveTo(x, y - 35); c.lineTo(x - 25, y + 25); c.lineTo(x + 25, y + 25); c.closePath(); c.fill();
      c.fillStyle = '#e2e8f0';
      c.beginPath(); c.arc(x, y - 20, 12, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#a855f7';
      c.beginPath(); c.arc(x - 4, y - 22, 3, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 4, y - 22, 3, 0, Math.PI * 2); c.fill();
      // Floating magic circle
      c.strokeStyle = '#a855f7'; c.lineWidth = 1.5;
      c.beginPath(); c.ellipse(x, y + 5, 30, 10, 0, 0, Math.PI * 2); c.stroke();
      break;
    case 'archmage': // Grand mage with elemental aura
      c.fillStyle = '#7c3aed';
      c.fillRect(x - 18, y - 10, 36, 40);
      // Hat
      c.beginPath(); c.moveTo(x, y - 40); c.lineTo(x - 20, y - 10); c.lineTo(x + 20, y - 10); c.closePath(); c.fill();
      // 4 elemental orbs
      const orbs = ['fire','ice','lightning','arcane'];
      for (let i = 0; i < 4; i++) {
        const a = (gameTime * 1.5) + (Math.PI / 2) * i;
        const ox = x + Math.cos(a) * 35;
        const oy = y + Math.sin(a) * 20;
        c.fillStyle = ELEM_COLORS[orbs[i]];
        c.beginPath(); c.arc(ox, oy, 6, 0, Math.PI * 2); c.fill();
      }
      // Face
      c.fillStyle = '#e2e8f0';
      c.beginPath(); c.arc(x, y - 18, 10, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#7c3aed';
      c.beginPath(); c.arc(x - 3, y - 19, 2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + 3, y - 19, 2, 0, Math.PI * 2); c.fill();
      break;
  }
  c.shadowBlur = 0;
  c.restore();
}

// Draw wizard (player representation on title)
function drawWizard(c, x, y, scale) {
  const s = scale || 1;
  // Canvas wizard drawing
  c.fillStyle = '#7c3aed';
  c.beginPath(); c.moveTo(x, y - 25 * s); c.lineTo(x - 15 * s, y); c.lineTo(x + 15 * s, y); c.closePath(); c.fill();
  c.fillStyle = '#a855f7';
  c.fillRect(x - 12 * s, y, 24 * s, 25 * s);
  c.fillStyle = '#e2e8f0';
  c.beginPath(); c.arc(x, y - 5 * s, 8 * s, 0, Math.PI * 2); c.fill();
}

// Render HUD (top bar)
function renderHUD() {
  const hudY = 8;
  const fs = Math.min(12, W * 0.02);
  ctx.font = `${fs}px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  // HP bar
  const hpBarW = Math.min(120, W * 0.18);
  const hpX = 10;
  ctx.fillStyle = '#dc2626';
  ctx.fillText('♥', hpX, hudY);
  const hpLabelX = hpX + 20;
  ctx.fillStyle = '#1a1a2a'; ctx.fillRect(hpLabelX, hudY + 2, hpBarW, 12);
  const hpRatio = Math.max(0, playerHP / maxHP);
  ctx.fillStyle = hpRatio > 0.5 ? '#dc2626' : hpRatio > 0.25 ? '#eab308' : '#ef4444';
  ctx.fillRect(hpLabelX, hudY + 2, hpBarW * hpRatio, 12);
  ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 1; ctx.strokeRect(hpLabelX, hudY + 2, hpBarW, 12);
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(playerHP + '/' + maxHP, hpLabelX + hpBarW + 5, hudY);

  // Mana orbs
  const manaX = hpLabelX + hpBarW + 50;
  for (let i = 0; i < maxMana; i++) {
    ctx.fillStyle = i < playerMana ? '#2563eb' : '#1e293b';
    ctx.beginPath(); ctx.arc(manaX + i * 18, hudY + 8, 7, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Block
  if (playerBlock > 0) {
    ctx.fillStyle = '#06b6d4';
    ctx.fillText('🛡' + playerBlock, manaX + maxMana * 18 + 10, hudY);
  }

  // C2: Player debuff icons
  let debuffX = manaX + maxMana * 18 + (playerBlock > 0 ? 55 : 10);
  renderStatuses(ctx, debuffX, hudY, playerStatuses);

  // Right side: gold, floor, relics
  ctx.textAlign = 'right';
  ctx.fillStyle = '#eab308';
  ctx.fillText('💰' + gold, W - 10, hudY);
  ctx.fillStyle = '#8080a0';
  ctx.fillText(currentFloor + 'F', W - 80, hudY);

  // Relics
  for (let i = 0; i < relics.length; i++) {
    ctx.fillStyle = '#f59e0b';
    ctx.fillText('◆', W - 100 - i * 18, hudY);
  }
  ctx.textAlign = 'center';

  // Pause button (top-right)
  const pbSize = touchSafe(30, 30);
  ctx.fillStyle = '#4a5568';
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillText('⏸', W - 10, hudY + 18);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
}

// Render enemy intent
function getEnemyIntent(enemy) {
  const pattern = enemy.pattern || ['attack'];
  const action = pattern[enemy.actionIdx % pattern.length];
  const atkMod = getEnemyAtkMod(enemy);
  const baseAtk = Math.floor(enemy.atk * atkMod);
  switch (action) {
    case 'attack': return { text: '⚔' + baseAtk, color: '#ef4444' };
    case 'heavy': return { text: '⚔' + Math.floor(baseAtk * 1.5), color: '#dc2626' };
    case 'defend': return { text: '🛡' + (enemy.special === 'highDef' ? 12 : 6), color: '#06b6d4' };
    case 'buff': return { text: '↑강화', color: '#f59e0b' };
    case 'debuff': return { text: '↓약화', color: '#a855f7' };
    case 'summon': return { text: '소환', color: '#a855f7' };
    case 'magic': return { text: '✦12', color: '#a855f7' };
    case 'crush': return { text: '⚔' + Math.floor(baseAtk * 0.8) + '+취약', color: '#dc2626' };
    case 'fire': return { text: '🔥15', color: '#ef4444' };
    case 'ice': return { text: '❄10+둔화', color: '#38bdf8' };
    case 'lightning': return { text: '⚡' + Math.floor(baseAtk * 0.65) + '×3', color: '#facc15' };
    case 'arcane': return { text: '✦20', color: '#a855f7' };
    case 'flee': return { text: '도주?', color: '#eab308' };
    default: return { text: '?', color: '#8080a0' };
  }
}

// Render status effect icons
function renderStatuses(c, x, y, statuses) {
  if (!statuses) return;
  let ox = -20;
  const fs = Math.min(9, W * 0.015);
  c.font = `${fs}px 'Share Tech Mono', monospace`;
  for (const [key, val] of Object.entries(statuses)) {
    if (val <= 0) continue;
    let icon = '', color = '#fff';
    switch (key) {
      case 'burn': icon = '🔥'; color = '#ef4444'; break;
      case 'slow': icon = '❄'; color = '#38bdf8'; break;
      case 'weak': icon = '↓'; color = '#a855f7'; break;
      case 'strength': icon = '↑'; color = '#f59e0b'; break;
      case 'vulnerable': icon = '💢'; color = '#dc2626'; break;
    }
    c.fillStyle = color;
    c.fillText(icon + val, x + ox, y);
    ox += 25;
  }
}

// --- Boss Intro Screen ---
function renderBossIntro() {
  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.7);
  vg.addColorStop(0, 'rgba(10,14,26,0)');
  vg.addColorStop(1, 'rgba(10,14,26,0.8)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Boss name
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 20;
  ctx.font = `bold ${Math.min(28, W * 0.045)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#ef4444';
  const bossName = enemies[0] ? enemies[0].name : '???';
  ctx.fillText(bossName, W / 2, H * 0.4);
  ctx.shadowBlur = 0;

  ctx.font = `${Math.min(14, W * 0.023)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#8080a0';
  ctx.fillText(currentFloor + '층 보스', W / 2, H * 0.5);

  // Draw boss preview
  if (enemies[0]) drawBoss(ctx, W / 2, H * 0.65, enemies[0]);

  // Blink: tap to continue
  if (Math.sin(gameTime * 4) > 0) {
    ctx.font = `${Math.min(12, W * 0.02)}px 'Share Tech Mono', monospace`;
    ctx.fillStyle = '#505070';
    ctx.fillText('SPACE / 탭으로 전투 시작', W / 2, H * 0.85);
  }
}

// --- Reward Screen ---
function renderReward() {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.min(22, W * 0.035)}px 'Share Tech Mono', monospace`;

  ctx.fillText('전투 승리!', W / 2, H * 0.1);

  ctx.fillStyle = '#eab308';
  ctx.fillText('+' + rewardGold + ' 골드', W / 2, H * 0.17);

  }

  // Skip button
  const skipBtnW = 150, skipBtnH = 44;
  const skipX = W / 2 - skipBtnW / 2, skipY = H * 0.78;
  ctx.fillStyle = 'rgba(100,116,139,0.15)';
  roundRect(ctx, skipX, skipY, skipBtnW, skipBtnH, 4); ctx.fill();
  ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1;
  roundRect(ctx, skipX, skipY, skipBtnW, skipBtnH, 4); ctx.stroke();

// --- Runic Circle Effect (signature visual) ---
function renderRuneCircle() {
  const rc = runeCircle;
  ctx.save();
  ctx.globalAlpha = rc.alpha;
  ctx.strokeStyle = ELEM_COLORS[rc.element] || '#a855f7';
  ctx.lineWidth = 2;
  ctx.shadowColor = ELEM_COLORS[rc.element] || '#a855f7';
  ctx.shadowBlur = 15;

  // Outer circle
  ctx.beginPath(); ctx.arc(rc.x, rc.y, rc.radius, 0, Math.PI * 2); ctx.stroke();

  // Inner circle
  ctx.beginPath(); ctx.arc(rc.x, rc.y, rc.radius * 0.6, 0, Math.PI * 2); ctx.stroke();

  // Rune symbols (rotating triangles)
  const runeCount = 6;
  for (let i = 0; i < runeCount; i++) {
    const angle = (Math.PI * 2 / runeCount) * i + gameTime * 2;
    const rx = rc.x + Math.cos(angle) * rc.radius * 0.8;
    const ry = rc.y + Math.sin(angle) * rc.radius * 0.8;
    ctx.fillStyle = ELEM_COLORS[rc.element] || '#a855f7';
    drawStar(ctx, rx, ry, 3, 5, 2.5);
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

// Render floating damage/heal texts
function renderFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = Math.max(0, ft.life / ft.maxLife);
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.min(14, W * 0.023)}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

// Rounded rect helper
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
  c.closePath();
}

// Rounded rect bottom only
function roundRectBottom(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x, y);
  c.lineTo(x + w, y);
  c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
  c.closePath();
}

// ═══════════════════════════════════════
// SECTION 10: INPUT HANDLING
// ═══════════════════════════════════════

// Detect input mode
function setInputMode(mode) { inputMode = mode; }

// Handle click/tap at position
function handleClick(x, y) {
  snd.resume();

  switch (state) {
    case 'TITLE': handleTitleClick(x, y); break;
    case 'MAP': handleMapClick(x, y); break;
    case 'BATTLE': handleBattleClick(x, y); break;
    case 'BOSS_INTRO': handleBossIntroClick(); break;
    case 'REWARD': handleRewardClick(x, y); break;
    case 'SHOP': handleShopClick(x, y); break;
    case 'REST': handleRestClick(x, y); break;
    case 'EVENT': handleEventClick(x, y); break;
    case 'RESULT': case 'GAMEOVER': handleRestartClick(x, y); break;
    case 'PAUSED': state = 'BATTLE'; break;
  }
}

function handleTitleClick(x, y) {
  const btnW = 200, btnH = 50;
  const btnX = W / 2 - btnW / 2, btnY = H * 0.55;
  if (inRect(x, y, btnX, btnY, btnW, btnH)) {
    startNewGame();
  }
}

function handleMapClick(x, y) {
  if (GUARDS.isTransitioning) return;
  const floor = dungeonMap[currentFloor - 1];
  if (!floor) return;
  for (let i = 0; i < floor.nodes.length; i++) {
    const n = floor.nodes[i];
    if (n.available && !n.visited) {
      const dist = Math.hypot(x - n.x, y - n.y);
      if (dist < 24) { advanceFloor(i); return; }
    }
  }
}

function handleBattleClick(x, y) {
  if (GUARDS.isAnimating || GUARDS.isTransitioning) return;
  if (battleTurn !== 'player') return;

  // Pause button
  if (x > W - 40 && y < 40) { state = 'PAUSED'; return; }

  // End turn button
  const btnW2 = 120, btnH2 = 48;
  const bx2 = W / 2 - btnW2 / 2, by2 = H - 55;
  if (inRect(x, y, bx2, by2, btnW2, btnH2)) { endPlayerTurn(); return; }

  // Card selection
  const cardW = Math.min(CONFIG.CARD_W, (W - 40) / Math.max(hand.length, 1) - 5);
  const cardH = CONFIG.CARD_H;
  const totalW = hand.length * (cardW + 5) - 5;
  const startX = (W - totalW) / 2;
  const baseY = H - cardH - 65;

  for (let i = 0; i < hand.length; i++) {
    const cx = startX + i * (cardW + 5);
    if (inRect(x, y, cx, baseY - 20, cardW, cardH + 20)) {
      if (canPlayCard(hand[i], playerMana)) {
        // For targeted attacks, pick first alive enemy
        const targetIdx = enemies.length > 0 ? 0 : -1;
        // Check if click is on a specific enemy
        for (let ei = 0; ei < enemies.length; ei++) {
          const e = enemies[ei];
          if (Math.hypot(x - e.renderX, y - e.renderY) < 40) { playCard(i, ei); return; }
        }
        playCard(i, targetIdx);
      }
      return;
    }
  }
}

function handleBossIntroClick() {
  if (!GUARDS.isBossIntro) return;
  GUARDS.isBossIntro = false;
  const bossEnemy = enemies[0];
  if (bossEnemy) startBattle([bossEnemy], true);
  else beginTransition('MAP');
}

function handleRewardClick(x, y) {
  if (GUARDS.isTransitioning) return;
  // Card selection
  const cardW = Math.min(CONFIG.CARD_W + 20, (W - 80) / 3 - 10);
  const cardH = CONFIG.CARD_H + 15;
  const totalW2 = rewardCards.length * (cardW + 15) - 15;
  const sx = (W - totalW2) / 2;

  for (let i = 0; i < rewardCards.length; i++) {
    const cx = sx + i * (cardW + 15);
    const cy = H * 0.3;
    if (inRect(x, y, cx, cy, cardW, cardH)) {
      deck.push(rewardCards[i]);
      addFloatingText(W / 2, H * 0.5, rewardCards[i].name + ' 획득!', '#10b981');
      snd.sfxReward();
      goToNextFloor();
      return;
    }
  }

  // Skip button
  const skipBtnW = 150, skipBtnH = 44;
  const skipX = W / 2 - skipBtnW / 2, skipY = H * 0.78;
  if (inRect(x, y, skipX, skipY, skipBtnW, skipBtnH)) {
    goToNextFloor();
  }
}

function handleShopClick(x, y) {
  if (GUARDS.isTransitioning) return;
  const itemW = Math.min(110, (W - 40) / shopItems.length - 8);
  const itemH = 130;
  const totalW3 = shopItems.length * (itemW + 8) - 8;
  const sx2 = (W - totalW3) / 2;

  for (let i = 0; i < shopItems.length; i++) {
    const ix = sx2 + i * (itemW + 8);
    const iy = H * 0.2;
    if (inRect(x, y, ix, iy, itemW, itemH)) { buyShopItem(i); return; }
  }

  // Leave button
  const lvBtnW = 120, lvBtnH = 44;
  const lvX = W / 2 - lvBtnW / 2, lvY = H * 0.75;
  if (inRect(x, y, lvX, lvY, lvBtnW, lvBtnH)) { goToNextFloor(); }
}

function handleRestClick(x, y) {
  if (GUARDS.isTransitioning) return;
  const optW = Math.min(200, W * 0.35), optH = 80;
  const optAX = W / 2 - optW - 15, optBX = W / 2 + 15;
  const optY = H * 0.35;

  if (inRect(x, y, optAX, optY, optW, optH)) {
    // Heal 30%
    modifyHP(Math.floor(maxHP * 0.3));
    addFloatingText(W / 2, H * 0.5, '+' + Math.floor(maxHP * 0.3) + ' HP', '#10b981');
    pm.emit(W / 2, H * 0.5, 15, '#10b981', { speed: 60, life: 0.8 });
    goToNextFloor();
  } else if (inRect(x, y, optBX, optY, optW, optH)) {
    // Upgrade random card
    const upgradeable = deck.filter(c => !c.upgraded);
    if (upgradeable.length > 0) {
      const c = randPick(upgradeable);
      c.upgraded = true;
      addFloatingText(W / 2, H * 0.5, c.name + ' 업그레이드!', '#f59e0b');
    }
    goToNextFloor();
  }
}

function handleEventClick(x, y) {
  if (!currentEvent || GUARDS.isTransitioning) return;
  const optW = Math.min(220, W * 0.38), optH = 60;
  const optAX = W / 2 - optW - 10, optBX = W / 2 + 10;
  const optY = H * 0.4;

  if (inRect(x, y, optAX, optY, optW, optH)) {
    applyEventEffect(currentEvent.effectA);
    goToNextFloor();
  } else if (inRect(x, y, optBX, optY, optW, optH)) {
    applyEventEffect(currentEvent.effectB);
    goToNextFloor();
  }
}

// Apply event effect
function applyEventEffect(effect) {
  if (!effect) return;
  if (effect.hp) modifyHP(effect.hp);
  if (effect.gold) addGold(effect.gold);
  if (effect.fullHeal) { modifyHP(maxHP); addFloatingText(W / 2, H * 0.5, 'HP 전체 회복!', '#10b981'); }
  if (effect.rareCard) {
    const rares = Object.keys(CARD_DATA).filter(id => CARD_DATA[id].rarity === 'rare');
    if (rares.length > 0) deck.push(createCard(randPick(rares)));
    addFloatingText(W / 2, H * 0.45, '희귀 카드 획득!', '#f59e0b');
  }
  if (effect.relic) {
    const available = Object.keys(RELIC_DATA).filter(id => !relics.find(r => r.id === id));
    if (available.length > 0) {
      const r = RELIC_DATA[randPick(available)];
      relics.push(r);
      addFloatingText(W / 2, H * 0.45, '유물: ' + r.name, '#f59e0b');
      if (r.effect === 'maxMana') maxMana++;
      if (relics.length >= 3) unlockAchievement('A07');
    }
  }
  if (effect.removeCard && deck.length > 5) {
    const idx = deck.findIndex(c => c.id === 'C01');
    if (idx >= 0) deck.splice(idx, 1);
    addFloatingText(W / 2, H * 0.5, '카드 제거!', '#ef4444');
  }
  if (effect.upgradeRandom) {
    const u = deck.filter(c => !c.upgraded);
    if (u.length > 0) { const c = randPick(u); c.upgraded = true; addFloatingText(W / 2, H * 0.5, c.name + ' 강화!', '#f59e0b'); }
  }
}

function handleRestartClick(x, y) {
  const btnW = 180, btnH = 48;
  const bx = W / 2 - btnW / 2;
  const by = state === 'RESULT' ? H * 0.85 : H * 0.7;
  if (inRect(x, y, bx, by, btnW, btnH)) startNewGame();
}

// Handle hover (mouse only)
function handleHover(x, y) {
  hoveredCard = -1;
  hoveredBtn = null;

  if (state === 'BATTLE' && battleTurn === 'player') {
    const cardW = Math.min(CONFIG.CARD_W, (W - 40) / Math.max(hand.length, 1) - 5);
    const cardH = CONFIG.CARD_H;
    const totalW = hand.length * (cardW + 5) - 5;
    const startX = (W - totalW) / 2;
    const baseY = H - cardH - 65;
    for (let i = 0; i < hand.length; i++) {
      const cx = startX + i * (cardW + 5);
      if (inRect(x, y, cx, baseY - 20, cardW, cardH + 20)) { hoveredCard = i; break; }
    }
    // End turn button hover
    const btnW2 = 120, btnH2 = 48;
    const bx2 = W / 2 - btnW2 / 2, by2 = H - 55;
    if (inRect(x, y, bx2, by2, btnW2, btnH2)) hoveredBtn = 'endTurn';
  }

  if (state === 'REWARD') {
    const cardW = Math.min(CONFIG.CARD_W + 20, (W - 80) / 3 - 10);
    const cardH = CONFIG.CARD_H + 15;
    const totalW2 = rewardCards.length * (cardW + 15) - 15;
    const sx = (W - totalW2) / 2;
    for (let i = 0; i < rewardCards.length; i++) {
      if (inRect(x, y, sx + i * (cardW + 15), H * 0.3, cardW, cardH)) { hoveredCard = i; break; }
    }
  }
}

// --- Mouse Events ---
canvas.addEventListener('mousemove', (e) => {
  setInputMode('mouse');
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  handleHover(mouseX, mouseY);
});

canvas.addEventListener('mousedown', (e) => {
  setInputMode('mouse');
  mouseDown = true;
});

canvas.addEventListener('mouseup', (e) => {
  setInputMode('mouse');
  mouseDown = false;
  const rect = canvas.getBoundingClientRect();
  handleClick(e.clientX - rect.left, e.clientY - rect.top);
});

// --- Touch Events ---
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  setInputMode('touch');
  touchActive = true;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseX = t.clientX - rect.left;
  mouseY = t.clientY - rect.top;
  touchStartX = mouseX; // M1: record swipe start
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches[0]) {
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    mouseX = t.clientX - rect.left;
    mouseY = t.clientY - rect.top;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  touchActive = false;
  handleClick(mouseX, mouseY);
}, { passive: false });

// --- Keyboard Events ---
window.addEventListener('keydown', (e) => {
  // Prevent browser default for game keys (Space scroll, Arrow scroll, etc.)
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
  setInputMode('keyboard');
  keysDown[e.key] = true;

  switch (state) {
    case 'TITLE':
      if (e.key === ' ' || e.key === 'Enter') startNewGame();
      break;
    case 'MAP':
      if (e.key === 'd' || e.key === 'D') { /* TODO: deck view toggle */ }
      break;
    case 'BATTLE':
      if (battleTurn === 'player' && !GUARDS.isAnimating) {
        // Number keys 1-5 to play card
        const num = parseInt(e.key);
        if (num >= 1 && num <= hand.length) {
          if (canPlayCard(hand[num - 1], playerMana)) {
            playCard(num - 1, 0);
          }
        }
        if (e.key === 'e' || e.key === 'E') endPlayerTurn();
      }
      if (e.key === 'Escape') { state = state === 'PAUSED' ? 'BATTLE' : 'PAUSED'; }
      break;
    case 'BOSS_INTRO':
      if (e.key === ' ' || e.key === 'Enter') handleBossIntroClick();
      break;
    case 'REWARD':
      if (e.key === ' ' || e.key === 'Enter') goToNextFloor();
      break;
    case 'RESULT': case 'GAMEOVER':
      if (e.key === 'r' || e.key === 'R' || e.key === ' ') startNewGame();
      break;
    case 'PAUSED':
      if (e.key === 'Escape') state = 'BATTLE';
      break;
  }
});

window.addEventListener('keyup', (e) => { keysDown[e.key] = false; });

// Resize handler
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════
// SECTION 11: GAME LOOP (F12)
// ═══════════════════════════════════════

function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;
    update(dt);
    render();
  } catch(e) {
    console.error('GameLoop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════
// SECTION 12: INITIALIZATION
// ═══════════════════════════════════════

// Loading screen
function renderLoading() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = "16px 'Share Tech Mono', monospace";
  ctx.fillStyle = '#a855f7';
  ctx.fillText('로딩 중...', W / 2, H / 2);
}

function init() {
  resizeCanvas();
  snd.init();
  initGame();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
