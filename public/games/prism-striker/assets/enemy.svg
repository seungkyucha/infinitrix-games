<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 어둠 그라디언트 -->
    <radialGradient id="darkCore" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3a1a5a"/>
      <stop offset="60%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
    <!-- 보라 연기 -->
    <radialGradient id="smokePurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4a1a8a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0a3a" stop-opacity="0"/>
    </radialGradient>
    <!-- 눈 발광 -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#cc0044" stop-opacity="0"/>
    </radialGradient>
    <!-- 글로우 필터 -->
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eSoftGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 그림자 필터 -->
    <filter id="eShadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- 어둠의 아우라 -->
    <radialGradient id="darkAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#3a1a5a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 에너지 그라디언트 -->
    <linearGradient id="darkEnergy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a0a3a" stop-opacity="0"/>
    </linearGradient>
    <!-- 클로 그라디언트 -->
    <linearGradient id="clawGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4af7"/>
      <stop offset="100%" stop-color="#3a1a5a"/>
    </linearGradient>
  </defs>

  <!-- 어둠의 아우라 -->
  <circle cx="64" cy="58" r="55" fill="url(#darkAura)"/>

  <!-- 하체 연기 (흩어짐) -->
  <g id="smokeTrail" opacity="0.7">
    <ellipse cx="64" cy="108" rx="30" ry="12" fill="url(#smokePurple)"/>
    <ellipse cx="52" cy="100" rx="18" ry="10" fill="url(#smokePurple)" opacity="0.5"/>
    <ellipse cx="76" cy="100" rx="18" ry="10" fill="url(#smokePurple)" opacity="0.5"/>
    <path d="M44 95 C40 105, 35 115, 30 120 C35 118, 40 112, 44 95Z" fill="#4a1a8a" opacity="0.4"/>
    <path d="M84 95 C88 105, 93 115, 98 120 C93 118, 88 112, 84 95Z" fill="#4a1a8a" opacity="0.4"/>
    <path d="M54 98 C50 108, 48 118, 45 125 C50 120, 52 110, 54 98Z" fill="#3a1a5a" opacity="0.3"/>
    <path d="M74 98 C78 108, 80 118, 83 125 C78 120, 76 110, 74 98Z" fill="#3a1a5a" opacity="0.3"/>
    <!-- 소용돌이 연기 -->
    <path d="M58 102 C55 108, 60 112, 64 108 C68 104, 72 108, 70 114" stroke="#6c3cf7" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- 어둠 파티클 -->
    <circle cx="38" cy="110" r="2" fill="#6c3cf7" opacity="0.3"/>
    <circle cx="90" cy="108" r="1.5" fill="#4a1a8a" opacity="0.4"/>
    <circle cx="48" cy="115" r="1" fill="#6c3cf7" opacity="0.2"/>
    <circle cx="80" cy="118" r="1.5" fill="#3a1a5a" opacity="0.3"/>
  </g>

  <!-- 몸통 (유령형) -->
  <g id="body">
    <path d="M40 45 C38 55, 36 75, 40 90 C44 98, 52 100, 64 98 C76 100, 84 98, 88 90 C92 75, 90 55, 88 45 C84 30, 44 30, 40 45Z" fill="url(#darkCore)"/>
    <!-- 내부 어둠 층 -->
    <path d="M44 48 C42 56, 40 72, 44 86 C48 92, 56 94, 64 93 C72 94, 80 92, 84 86 C88 72, 86 56, 84 48 C80 36, 48 36, 44 48Z" fill="#2a1a4a" opacity="0.5"/>
    <!-- 갈라진 균열 (빛이 새어나옴) -->
    <path d="M58 55 L56 70 L60 68 L57 80" stroke="#6c3cf7" stroke-width="0.8" fill="none" opacity="0.6" filter="url(#eGlow)"/>
    <path d="M70 52 L72 65 L68 63 L71 75" stroke="#6c3cf7" stroke-width="0.8" fill="none" opacity="0.6" filter="url(#eGlow)"/>
    <!-- 어둠의 룬 -->
    <path d="M60 82 L64 78 L68 82 L64 86Z" fill="#6c3cf7" opacity="0.4" filter="url(#eGlow)"/>
    <!-- 비늘/갑피 질감 -->
    <path d="M50 55 Q54 52 58 55" stroke="#4a2a6a" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M60 50 Q64 47 68 50" stroke="#4a2a6a" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M70 55 Q74 52 78 55" stroke="#4a2a6a" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M48 65 Q52 62 56 65" stroke="#4a2a6a" stroke-width="0.6" fill="none" opacity="0.3"/>
    <path d="M72 65 Q76 62 80 65" stroke="#4a2a6a" stroke-width="0.6" fill="none" opacity="0.3"/>
  </g>

  <!-- 팔/클로 -->
  <g id="arms">
    <!-- 왼팔 -->
    <path d="M40 50 C32 55, 24 62, 20 72 C18 76, 22 78, 26 74 L28 70" fill="url(#clawGrad)" opacity="0.8"/>
    <path d="M20 72 L14 68 M20 72 L16 74 M20 72 L18 78" stroke="#8a4af7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- 오른팔 -->
    <path d="M88 50 C96 55, 104 62, 108 72 C110 76, 106 78, 102 74 L100 70" fill="url(#clawGrad)" opacity="0.8"/>
    <path d="M108 72 L114 68 M108 72 L112 74 M108 72 L110 78" stroke="#8a4af7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- 클로 발광 -->
    <circle cx="17" cy="71" r="3" fill="#6c3cf7" opacity="0.3" filter="url(#eGlow)"/>
    <circle cx="111" cy="71" r="3" fill="#6c3cf7" opacity="0.3" filter="url(#eGlow)"/>
  </g>

  <!-- 머리 -->
  <g id="head">
    <!-- 두건/후드 -->
    <path d="M44 25 C42 20, 50 10, 64 8 C78 10, 86 20, 84 25 C86 35, 86 45, 82 48 L64 50 L46 48 C42 45, 42 35, 44 25Z" fill="#1a0a3a"/>
    <path d="M46 26 C44 22, 52 13, 64 11 C76 13, 84 22, 82 26 C84 34, 84 42, 80 45 L64 47 L48 45 C44 42, 44 34, 46 26Z" fill="#2a1a4a" opacity="0.7"/>
    <!-- 뿔 -->
    <path d="M48 20 C46 14, 42 6, 38 2 C40 8, 44 14, 48 20Z" fill="#3a1a5a"/>
    <path d="M80 20 C82 14, 86 6, 90 2 C88 8, 84 14, 80 20Z" fill="#3a1a5a"/>
    <path d="M48 20 C46 14, 43 8, 40 4" stroke="#6c3cf7" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M80 20 C82 14, 85 8, 88 4" stroke="#6c3cf7" stroke-width="0.5" fill="none" opacity="0.5"/>

    <!-- 눈 -->
    <g filter="url(#eGlow)">
      <ellipse cx="54" cy="34" rx="6" ry="4" fill="url(#eyeGlow)"/>
      <ellipse cx="74" cy="34" rx="6" ry="4" fill="url(#eyeGlow)"/>
      <!-- 동공 -->
      <ellipse cx="56" cy="34" rx="2" ry="3" fill="#ff0044"/>
      <ellipse cx="76" cy="34" rx="2" ry="3" fill="#ff0044"/>
      <!-- 하이라이트 -->
      <circle cx="53" cy="32" r="1" fill="#ffffff" opacity="0.9"/>
      <circle cx="73" cy="32" r="1" fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- 입 (이빨 있는 그린) -->
    <path d="M56 42 C60 44, 68 44, 72 42" stroke="#ff3366" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M58 42 L60 45 L62 42" fill="#ff3366" opacity="0.4"/>
    <path d="M66 42 L68 45 L70 42" fill="#ff3366" opacity="0.4"/>
  </g>

  <!-- 떠다니는 어둠 파편 -->
  <g id="darkShards" opacity="0.5">
    <path d="M28 38 L30 32 L34 36Z" fill="#6c3cf7" opacity="0.4"/>
    <path d="M96 35 L100 30 L98 38Z" fill="#6c3cf7" opacity="0.4"/>
    <path d="M32 80 L36 76 L34 82Z" fill="#4a1a8a" opacity="0.3"/>
    <path d="M94 78 L98 74 L96 82Z" fill="#4a1a8a" opacity="0.3"/>
    <circle cx="24" cy="50" r="1.5" fill="#6c3cf7" opacity="0.3"/>
    <circle cx="104" cy="48" r="1" fill="#6c3cf7" opacity="0.3"/>
    <circle cx="34" cy="92" r="1" fill="#4a1a8a" opacity="0.2"/>
    <circle cx="94" cy="90" r="1.2" fill="#4a1a8a" opacity="0.2"/>
  </g>

  <!-- 바닥 그림자 -->
  <ellipse cx="64" cy="122" rx="28" ry="4" fill="#0a0a2e" opacity="0.5" filter="url(#eShadow)"/>
</svg>