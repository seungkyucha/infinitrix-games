<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- 하늘 그라디언트 -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020118"/>
      <stop offset="30%" stop-color="#0a0a2e"/>
      <stop offset="60%" stop-color="#0d1040"/>
      <stop offset="100%" stop-color="#1a1055"/>
    </linearGradient>
    <!-- 성운 1 -->
    <radialGradient id="nebula1" cx="0.3" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#3366ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 성운 2 -->
    <radialGradient id="nebula2" cx="0.7" cy="0.4" r="0.35">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#6c3cf7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 성운 3 -->
    <radialGradient id="nebula3" cx="0.5" cy="0.6" r="0.3">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#3366ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 성운 4 -->
    <radialGradient id="nebula4" cx="0.15" cy="0.7" r="0.25">
      <stop offset="0%" stop-color="#33ff99" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 성운 5 -->
    <radialGradient id="nebula5" cx="0.85" cy="0.2" r="0.3">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 크리스탈 산 그라디언트 -->
    <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a5a"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </linearGradient>
    <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a6a"/>
      <stop offset="100%" stop-color="#0d0d3a"/>
    </linearGradient>
    <!-- 빛줄기 -->
    <linearGradient id="lightBeam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <!-- 안개 -->
    <linearGradient id="fogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c3cf7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3a2a6a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a4a" stop-opacity="0"/>
    </linearGradient>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 하늘 배경 -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <!-- 성운 5개 -->
  <ellipse cx="360" cy="240" rx="300" ry="200" fill="url(#nebula1)"/>
  <ellipse cx="840" cy="320" rx="280" ry="180" fill="url(#nebula2)"/>
  <ellipse cx="600" cy="480" rx="250" ry="160" fill="url(#nebula3)"/>
  <ellipse cx="180" cy="560" rx="200" ry="140" fill="url(#nebula4)"/>
  <ellipse cx="1020" cy="160" rx="220" ry="150" fill="url(#nebula5)"/>

  <!-- 별 80+ 개 -->
  <g fill="#ffffff">
    <circle cx="50" cy="30" r="1.2" opacity="0.9"/><circle cx="120" cy="80" r="0.8" opacity="0.6"/>
    <circle cx="200" cy="50" r="1" opacity="0.7"/><circle cx="280" cy="120" r="0.6" opacity="0.5"/>
    <circle cx="340" cy="40" r="1.3" opacity="0.8"/><circle cx="400" cy="90" r="0.7" opacity="0.6"/>
    <circle cx="460" cy="60" r="1.1" opacity="0.9"/><circle cx="530" cy="30" r="0.9" opacity="0.7"/>
    <circle cx="590" cy="110" r="0.6" opacity="0.5"/><circle cx="650" cy="50" r="1.2" opacity="0.8"/>
    <circle cx="720" cy="80" r="0.8" opacity="0.6"/><circle cx="780" cy="40" r="1" opacity="0.9"/>
    <circle cx="850" cy="100" r="0.7" opacity="0.5"/><circle cx="920" cy="60" r="1.1" opacity="0.8"/>
    <circle cx="980" cy="30" r="0.9" opacity="0.7"/><circle cx="1050" cy="90" r="0.6" opacity="0.6"/>
    <circle cx="1120" cy="50" r="1.3" opacity="0.9"/><circle cx="1170" cy="120" r="0.8" opacity="0.5"/>
    <circle cx="80" cy="160" r="0.7" opacity="0.6"/><circle cx="150" cy="200" r="1" opacity="0.7"/>
    <circle cx="230" cy="180" r="0.6" opacity="0.5"/><circle cx="310" cy="220" r="1.2" opacity="0.8"/>
    <circle cx="370" cy="170" r="0.8" opacity="0.6"/><circle cx="440" cy="250" r="0.7" opacity="0.5"/>
    <circle cx="510" cy="190" r="1.1" opacity="0.9"/><circle cx="580" cy="230" r="0.6" opacity="0.4"/>
    <circle cx="660" cy="180" r="0.9" opacity="0.7"/><circle cx="730" cy="210" r="1" opacity="0.8"/>
    <circle cx="800" cy="170" r="0.7" opacity="0.6"/><circle cx="870" cy="240" r="0.8" opacity="0.5"/>
    <circle cx="940" cy="190" r="1.2" opacity="0.9"/><circle cx="1010" cy="220" r="0.6" opacity="0.4"/>
    <circle cx="1080" cy="180" r="0.9" opacity="0.7"/><circle cx="1150" cy="230" r="1.1" opacity="0.8"/>
    <circle cx="60" cy="290" r="0.8" opacity="0.5"/><circle cx="140" cy="320" r="0.6" opacity="0.4"/>
    <circle cx="220" cy="300" r="1" opacity="0.7"/><circle cx="300" cy="350" r="0.7" opacity="0.5"/>
    <circle cx="380" cy="280" r="0.9" opacity="0.6"/><circle cx="450" cy="330" r="1.1" opacity="0.8"/>
    <circle cx="520" cy="290" r="0.6" opacity="0.4"/><circle cx="600" cy="350" r="0.8" opacity="0.5"/>
    <circle cx="680" cy="300" r="1" opacity="0.7"/><circle cx="750" cy="340" r="0.7" opacity="0.6"/>
    <circle cx="830" cy="310" r="0.9" opacity="0.5"/><circle cx="900" cy="360" r="0.6" opacity="0.4"/>
    <circle cx="970" cy="280" r="1.2" opacity="0.8"/><circle cx="1040" cy="340" r="0.8" opacity="0.6"/>
    <circle cx="1110" cy="300" r="0.7" opacity="0.5"/><circle cx="1180" cy="350" r="1" opacity="0.7"/>
    <circle cx="90" cy="400" r="0.6" opacity="0.3"/><circle cx="170" cy="420" r="0.8" opacity="0.4"/>
    <circle cx="250" cy="380" r="0.7" opacity="0.5"/><circle cx="330" cy="440" r="0.9" opacity="0.6"/>
    <circle cx="410" cy="400" r="0.6" opacity="0.3"/><circle cx="490" cy="430" r="1" opacity="0.5"/>
    <circle cx="560" cy="410" r="0.7" opacity="0.4"/><circle cx="640" cy="440" r="0.8" opacity="0.5"/>
    <circle cx="710" cy="390" r="0.6" opacity="0.3"/><circle cx="790" cy="430" r="0.9" opacity="0.5"/>
    <circle cx="860" cy="400" r="0.7" opacity="0.4"/><circle cx="930" cy="450" r="0.8" opacity="0.3"/>
    <circle cx="1000" cy="410" r="0.6" opacity="0.4"/><circle cx="1060" cy="440" r="1" opacity="0.5"/>
    <circle cx="1130" cy="400" r="0.7" opacity="0.3"/><circle cx="35" cy="130" r="0.9" opacity="0.7"/>
    <circle cx="165" cy="140" r="1.1" opacity="0.8"/><circle cx="265" cy="70" r="0.6" opacity="0.5"/>
    <circle cx="485" cy="140" r="0.8" opacity="0.6"/><circle cx="635" cy="140" r="1" opacity="0.7"/>
    <circle cx="705" cy="130" r="0.7" opacity="0.5"/><circle cx="835" cy="160" r="0.9" opacity="0.6"/>
    <circle cx="1005" cy="140" r="0.6" opacity="0.4"/><circle cx="1095" cy="130" r="1.2" opacity="0.8"/>
    <circle cx="115" cy="250" r="0.7" opacity="0.5"/><circle cx="355" cy="260" r="0.9" opacity="0.6"/>
    <circle cx="555" cy="260" r="0.6" opacity="0.4"/><circle cx="695" cy="260" r="0.8" opacity="0.5"/>
  </g>

  <!-- 밝은 별 (글로우) -->
  <g filter="url(#starGlow)">
    <circle cx="200" cy="100" r="2" fill="#00d4ff" opacity="0.8"/>
    <circle cx="600" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="900" cy="140" r="2" fill="#ffd700" opacity="0.7"/>
    <circle cx="1100" cy="60" r="1.8" fill="#33ff99" opacity="0.6"/>
    <circle cx="400" cy="200" r="2.2" fill="#ff3366" opacity="0.5"/>
    <circle cx="750" cy="160" r="1.8" fill="#6c3cf7" opacity="0.6"/>
  </g>

  <!-- 별자리 선 -->
  <g stroke="#4488cc" stroke-width="0.3" opacity="0.15" fill="none">
    <path d="M200 100 L280 120 L340 40 L460 60"/>
    <path d="M600 80 L650 50 L720 80 L780 40"/>
    <path d="M900 140 L940 190 L1010 220"/>
  </g>

  <!-- 유성 -->
  <g opacity="0.4">
    <line x1="300" y1="60" x2="340" y2="90" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="302" y1="62" x2="320" y2="76" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="850" y1="40" x2="880" y2="65" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- 빛줄기 (크리스탈 동굴 상부) -->
  <g opacity="0.15">
    <polygon points="300,0 320,500 280,500" fill="url(#lightBeam)"/>
    <polygon points="600,0 615,450 585,450" fill="url(#lightBeam)"/>
    <polygon points="900,0 912,480 888,480" fill="url(#lightBeam)"/>
  </g>

  <!-- 먼 크리스탈 산맥 -->
  <g>
    <!-- 제일 먼 산맥 -->
    <path d="M0 600 L80 480 L140 520 L220 440 L300 490 L380 420 L460 470 L540 400 L620 460 L700 410 L780 450 L860 380 L940 430 L1020 390 L1100 440 L1200 420 L1200 800 L0 800Z" fill="url(#mtnGrad1)" opacity="0.5"/>
    <!-- 산맥 위 크리스탈 포인트 -->
    <path d="M220 440 L225 410 L230 440" fill="#3366ff" opacity="0.2"/>
    <path d="M540 400 L546 365 L552 400" fill="#00d4ff" opacity="0.2"/>
    <path d="M860 380 L866 345 L872 380" fill="#6c3cf7" opacity="0.2"/>
    <path d="M380 420 L384 395 L388 420" fill="#33ff99" opacity="0.15"/>
    <path d="M1020 390 L1025 360 L1030 390" fill="#ff3366" opacity="0.15"/>

    <!-- 더 가까운 산맥 -->
    <path d="M0 650 L100 560 L180 600 L260 530 L360 570 L440 510 L520 550 L600 490 L680 540 L760 500 L840 530 L920 480 L1000 520 L1080 470 L1200 510 L1200 800 L0 800Z" fill="url(#mtnGrad2)" opacity="0.6"/>
    <!-- 크리스탈 포인트 -->
    <path d="M260 530 L266 495 L272 530" fill="#00d4ff" opacity="0.25"/>
    <path d="M600 490 L607 450 L614 490" fill="#3366ff" opacity="0.3"/>
    <path d="M920 480 L927 440 L934 480" fill="#ffd700" opacity="0.2"/>
    <path d="M440 510 L445 480 L450 510" fill="#6c3cf7" opacity="0.2"/>
  </g>

  <!-- 먼 크리스탈 탑 실루엣 -->
  <g opacity="0.3">
    <path d="M480 490 L490 350 L495 340 L500 350 L510 490" fill="#1a1a5a"/>
    <path d="M493 340 L495 320 L497 340" fill="#00d4ff" opacity="0.4"/>
    <circle cx="495" cy="330" r="4" fill="#00d4ff" opacity="0.3" filter="url(#bgGlow)"/>

    <path d="M740 500 L748 380 L752 370 L756 380 L764 500" fill="#1a1a5a"/>
    <path d="M750 370 L752 355 L754 370" fill="#6c3cf7" opacity="0.4"/>
    <circle cx="752" cy="362" r="3" fill="#6c3cf7" opacity="0.3" filter="url(#bgGlow)"/>
  </g>

  <!-- 안개 층 5개 -->
  <rect x="0" y="350" width="1200" height="120" fill="url(#fogGrad)" opacity="0.3"/>
  <rect x="0" y="450" width="1200" height="100" fill="url(#fogGrad)" opacity="0.25"/>
  <rect x="0" y="520" width="1200" height="80" fill="url(#fogGrad)" opacity="0.2"/>
  <ellipse cx="300" cy="480" rx="200" ry="40" fill="#3a2a6a" opacity="0.08"/>
  <ellipse cx="900" cy="500" rx="180" ry="35" fill="#2a1a5a" opacity="0.08"/>

  <!-- 먼 크리스탈 발광 점 -->
  <g filter="url(#bgGlow)" opacity="0.4">
    <circle cx="150" cy="550" r="3" fill="#00d4ff"/>
    <circle cx="350" cy="520" r="2.5" fill="#33ff99"/>
    <circle cx="550" cy="480" r="3" fill="#ff3366"/>
    <circle cx="750" cy="510" r="2.5" fill="#ffd700"/>
    <circle cx="950" cy="530" r="3" fill="#6c3cf7"/>
    <circle cx="1100" cy="500" r="2" fill="#00d4ff"/>
  </g>

  <!-- 구역간 연결 다리 (먼 실루엣) -->
  <path d="M400 530 C450 520, 520 520, 560 530" stroke="#1a1a5a" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M800 510 C830 505, 860 505, 890 510" stroke="#1a1a5a" stroke-width="2" fill="none" opacity="0.25"/>
</svg>