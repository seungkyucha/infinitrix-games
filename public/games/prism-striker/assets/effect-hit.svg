<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="hitCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#3366ff"/>
      <stop offset="80%" stop-color="#6c3cf7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="85%" stop-color="#00d4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#6c3cf7" stop-opacity="0"/>
      <stop offset="80%" stop-color="#6c3cf7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hitRing3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="50%" stop-color="#ff3366" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ff3366" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hitSoft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="shardFrag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </linearGradient>
  </defs>

  <!-- 외곽 충격파 링 5 -->
  <circle cx="64" cy="64" r="60" fill="url(#hitRing3)" opacity="0.3"/>
  <!-- 외곽 충격파 링 4 -->
  <circle cx="64" cy="64" r="52" fill="url(#hitRing2)" opacity="0.4"/>
  <!-- 외곽 충격파 링 3 -->
  <circle cx="64" cy="64" r="44" fill="url(#hitRing1)" opacity="0.5"/>
  <!-- 중간 충격파 링 2 -->
  <circle cx="64" cy="64" r="34" fill="url(#hitRing2)" opacity="0.6"/>
  <!-- 내부 링 1 -->
  <circle cx="64" cy="64" r="24" fill="url(#hitRing1)" opacity="0.7"/>

  <!-- 코어 폭발 -->
  <circle cx="64" cy="64" r="16" fill="url(#hitCore)" filter="url(#hitGlow)"/>
  <circle cx="64" cy="64" r="8" fill="#ffffff" opacity="0.9" filter="url(#hitGlow)"/>
  <circle cx="64" cy="64" r="4" fill="#ffffff"/>

  <!-- 방사형 광선 (무지개) -->
  <g opacity="0.6" filter="url(#hitGlow)">
    <line x1="64" y1="64" x2="64" y2="8" stroke="#ff3366" stroke-width="2" opacity="0.7"/>
    <line x1="64" y1="64" x2="108" y2="20" stroke="#ffd700" stroke-width="1.8" opacity="0.6"/>
    <line x1="64" y1="64" x2="120" y2="64" stroke="#33ff99" stroke-width="2" opacity="0.7"/>
    <line x1="64" y1="64" x2="108" y2="108" stroke="#00d4ff" stroke-width="1.8" opacity="0.6"/>
    <line x1="64" y1="64" x2="64" y2="120" stroke="#3366ff" stroke-width="2" opacity="0.7"/>
    <line x1="64" y1="64" x2="20" y2="108" stroke="#6c3cf7" stroke-width="1.8" opacity="0.6"/>
    <line x1="64" y1="64" x2="8" y2="64" stroke="#ff3366" stroke-width="2" opacity="0.7"/>
    <line x1="64" y1="64" x2="20" y2="20" stroke="#ffd700" stroke-width="1.8" opacity="0.6"/>
  </g>

  <!-- 대각선 보조 광선 -->
  <g opacity="0.3">
    <line x1="64" y1="64" x2="90" y2="14" stroke="#00d4ff" stroke-width="1"/>
    <line x1="64" y1="64" x2="114" y2="42" stroke="#33ff99" stroke-width="1"/>
    <line x1="64" y1="64" x2="114" y2="86" stroke="#ffd700" stroke-width="1"/>
    <line x1="64" y1="64" x2="90" y2="114" stroke="#ff3366" stroke-width="1"/>
    <line x1="64" y1="64" x2="38" y2="114" stroke="#6c3cf7" stroke-width="1"/>
    <line x1="64" y1="64" x2="14" y2="86" stroke="#3366ff" stroke-width="1"/>
    <line x1="64" y1="64" x2="14" y2="42" stroke="#00d4ff" stroke-width="1"/>
    <line x1="64" y1="64" x2="38" y2="14" stroke="#33ff99" stroke-width="1"/>
  </g>

  <!-- 크리스탈 파편 (사방으로 날아감) -->
  <g opacity="0.7">
    <path d="M78 28 L82 24 L84 30Z" fill="url(#shardFrag)" transform="rotate(15 81 27)"/>
    <path d="M96 52 L100 48 L102 54Z" fill="url(#shardFrag)" transform="rotate(40 99 51)"/>
    <path d="M92 88 L96 84 L98 90Z" fill="url(#shardFrag)" transform="rotate(70 95 87)"/>
    <path d="M50 96 L54 100 L48 100Z" fill="url(#shardFrag)" transform="rotate(110 51 99)"/>
    <path d="M28 82 L24 78 L30 80Z" fill="url(#shardFrag)" transform="rotate(150 27 80)"/>
    <path d="M24 48 L20 44 L26 46Z" fill="url(#shardFrag)" transform="rotate(200 23 46)"/>
    <path d="M38 24 L34 20 L40 22Z" fill="url(#shardFrag)" transform="rotate(250 37 22)"/>
    <path d="M74 100 L78 104 L72 102Z" fill="url(#shardFrag)" transform="rotate(300 75 102)"/>
  </g>

  <!-- 빛 파티클 -->
  <g filter="url(#hitGlow)">
    <circle cx="76" cy="20" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="104" cy="40" r="1.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="108" cy="80" r="2" fill="#33ff99" opacity="0.6"/>
    <circle cx="76" cy="108" r="1.5" fill="#ffd700" opacity="0.7"/>
    <circle cx="40" cy="108" r="2" fill="#6c3cf7" opacity="0.6"/>
    <circle cx="18" cy="80" r="1.5" fill="#ff3366" opacity="0.7"/>
    <circle cx="20" cy="40" r="2" fill="#3366ff" opacity="0.6"/>
    <circle cx="48" cy="18" r="1.5" fill="#ffd700" opacity="0.7"/>
    <!-- 추가 파티클 -->
    <circle cx="86" cy="34" r="1" fill="#ffffff" opacity="0.5"/>
    <circle cx="100" cy="64" r="1.2" fill="#00ffff" opacity="0.5"/>
    <circle cx="86" cy="94" r="1" fill="#33ff99" opacity="0.4"/>
    <circle cx="42" cy="94" r="1.2" fill="#6c3cf7" opacity="0.4"/>
    <circle cx="28" cy="64" r="1" fill="#ff3366" opacity="0.5"/>
    <circle cx="42" cy="34" r="1.2" fill="#00d4ff" opacity="0.5"/>
  </g>

  <!-- 소멸 연기 (보라색) -->
  <g opacity="0.2" filter="url(#hitSoft)">
    <circle cx="50" cy="50" r="12" fill="#6c3cf7"/>
    <circle cx="78" cy="50" r="10" fill="#4a1a8a"/>
    <circle cx="78" cy="78" r="12" fill="#6c3cf7"/>
    <circle cx="50" cy="78" r="10" fill="#4a1a8a"/>
  </g>
</svg>