<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 갑옷 그라디언트 -->
    <linearGradient id="armorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0d8f0"/>
      <stop offset="40%" stop-color="#8ba8c8"/>
      <stop offset="100%" stop-color="#4a6a8a"/>
    </linearGradient>
    <!-- 프리즘 코어 그라디언트 -->
    <radialGradient id="prismCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#3366ff"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </radialGradient>
    <!-- 투구 그라디언트 -->
    <linearGradient id="helmGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#d4e4f4"/>
      <stop offset="50%" stop-color="#9ab8d4"/>
      <stop offset="100%" stop-color="#5a7a9a"/>
    </linearGradient>
    <!-- 날개 발광 -->
    <radialGradient id="wingGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#3366ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6c3cf7" stop-opacity="0"/>
    </radialGradient>
    <!-- 무지개 광선 그라디언트 -->
    <linearGradient id="rainbowBeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="25%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#33ff99"/>
      <stop offset="75%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </linearGradient>
    <!-- 글로우 필터 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 림라이트 -->
    <linearGradient id="rimLight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- 프리즘 조각 그라디언트 -->
    <linearGradient id="prismShard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#33ff99"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <!-- 금장식 그라디언트 -->
    <linearGradient id="goldTrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
  </defs>

  <!-- 빛 날개 (뒤쪽) -->
  <g id="wings" filter="url(#softGlow)" opacity="0.8">
    <!-- 왼쪽 날개 -->
    <path d="M38 48 C25 30, 10 35, 15 50 C18 42, 28 38, 38 48Z" fill="url(#wingGlow)" opacity="0.7"/>
    <path d="M38 52 C20 40, 5 48, 12 58 C16 50, 30 45, 38 52Z" fill="url(#wingGlow)" opacity="0.5"/>
    <path d="M40 46 C30 25, 18 28, 20 45 C24 35, 32 32, 40 46Z" fill="#00d4ff" opacity="0.3"/>
    <!-- 오른쪽 날개 -->
    <path d="M90 48 C103 30, 118 35, 113 50 C110 42, 100 38, 90 48Z" fill="url(#wingGlow)" opacity="0.7"/>
    <path d="M90 52 C108 40, 123 48, 116 58 C112 50, 98 45, 90 52Z" fill="url(#wingGlow)" opacity="0.5"/>
    <path d="M88 46 C98 25, 110 28, 108 45 C104 35, 96 32, 88 46Z" fill="#00d4ff" opacity="0.3"/>
    <!-- 날개 빛 입자 -->
    <circle cx="18" cy="42" r="1.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="25" cy="35" r="1" fill="#33ff99" opacity="0.7"/>
    <circle cx="110" cy="42" r="1.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="103" cy="35" r="1" fill="#33ff99" opacity="0.7"/>
  </g>

  <!-- 망토 -->
  <g id="cape">
    <path d="M46 60 C44 80, 38 100, 40 115 L64 108 L88 115 C90 100, 84 80, 82 60Z" fill="#1a1a4a" opacity="0.8"/>
    <path d="M48 62 C46 78, 42 95, 44 110 L64 104 L84 110 C86 95, 82 78, 80 62Z" fill="#2a2a5a" opacity="0.6"/>
    <!-- 망토 프리즘 장식 -->
    <path d="M60 85 L64 78 L68 85 L64 88Z" fill="url(#prismCore)" opacity="0.5" filter="url(#glow)"/>
  </g>

  <!-- 다리 -->
  <g id="legs">
    <path d="M52 95 L48 118 L54 120 L58 98Z" fill="url(#armorGrad)"/>
    <path d="M76 95 L80 118 L74 120 L70 98Z" fill="url(#armorGrad)"/>
    <!-- 무릎 보호대 -->
    <ellipse cx="53" cy="105" rx="5" ry="3" fill="url(#goldTrim)"/>
    <ellipse cx="75" cy="105" rx="5" ry="3" fill="url(#goldTrim)"/>
    <!-- 부츠 -->
    <path d="M46 116 L48 118 L56 120 L56 118 C56 116, 50 114, 46 116Z" fill="#4a5a7a"/>
    <path d="M82 116 L80 118 L72 120 L72 118 C72 116, 78 114, 82 116Z" fill="#4a5a7a"/>
  </g>

  <!-- 몸통 (갑옷) -->
  <g id="body">
    <!-- 흉갑 -->
    <path d="M46 52 C44 55, 44 75, 48 95 L64 98 L80 95 C84 75, 84 55, 82 52 L64 48Z" fill="url(#armorGrad)"/>
    <!-- 흉갑 중앙선 -->
    <line x1="64" y1="52" x2="64" y2="92" stroke="#a0c0e0" stroke-width="0.8" opacity="0.5"/>
    <!-- 가슴 프리즘 코어 -->
    <path d="M58 62 L64 55 L70 62 L64 72Z" fill="url(#prismCore)" filter="url(#glow)"/>
    <path d="M60 62 L64 57 L68 62 L64 70Z" fill="#ffffff" opacity="0.3"/>
    <!-- 골드 벨트 -->
    <path d="M48 88 C50 86, 78 86, 80 88 C78 90, 50 90, 48 88Z" fill="url(#goldTrim)"/>
    <!-- 벨트 보석 -->
    <circle cx="64" cy="88" r="2.5" fill="#ff3366" filter="url(#glow)"/>
    <!-- 어깨 방어구 -->
    <path d="M42 52 C40 48, 42 42, 48 44 L52 50 C50 54, 44 56, 42 52Z" fill="url(#armorGrad)"/>
    <path d="M86 52 C88 48, 86 42, 80 44 L76 50 C78 54, 84 56, 86 52Z" fill="url(#armorGrad)"/>
    <!-- 어깨 골드 트림 -->
    <path d="M43 50 C42 46, 44 43, 48 44" stroke="url(#goldTrim)" stroke-width="1.5" fill="none"/>
    <path d="M85 50 C86 46, 84 43, 80 44" stroke="url(#goldTrim)" stroke-width="1.5" fill="none"/>
    <!-- 리벳 장식 -->
    <circle cx="46" cy="48" r="1" fill="#ffd700"/>
    <circle cx="82" cy="48" r="1" fill="#ffd700"/>
    <circle cx="56" cy="56" r="0.8" fill="#c0d8f0" opacity="0.7"/>
    <circle cx="72" cy="56" r="0.8" fill="#c0d8f0" opacity="0.7"/>
    <!-- 림라이트 -->
    <path d="M46 52 C44 55, 44 75, 48 95 L54 96" fill="url(#rimLight)" opacity="0.3"/>
  </g>

  <!-- 팔 -->
  <g id="arms">
    <!-- 왼팔 (방패 쪽) -->
    <path d="M42 55 C36 60, 32 72, 34 82 L38 84 C40 74, 42 64, 46 58Z" fill="url(#armorGrad)"/>
    <path d="M33 76 L28 72 L30 80 L36 84 L38 78Z" fill="#5a7a9a"/>
    <!-- 왼팔 장갑 -->
    <path d="M30 78 C28 76, 26 78, 28 82 L34 85 L36 82Z" fill="#4a6a8a"/>
    <!-- 오른팔 (프리즘 든 팔) -->
    <path d="M86 55 C92 60, 96 72, 94 82 L90 84 C88 74, 86 64, 82 58Z" fill="url(#armorGrad)"/>
    <!-- 오른팔 장갑 -->
    <path d="M92 80 C94 78, 96 80, 96 84 L90 86 L88 82Z" fill="#4a6a8a"/>
  </g>

  <!-- 손에 든 프리즘 조각 -->
  <g id="heldPrism" filter="url(#softGlow)">
    <path d="M92 78 L98 68 L104 78 L98 88Z" fill="url(#prismShard)" opacity="0.9"/>
    <path d="M94 78 L98 70 L102 78" fill="#ffffff" opacity="0.4"/>
    <path d="M98 68 L104 78 L98 88" fill="#00d4ff" opacity="0.3"/>
    <!-- 프리즘에서 나오는 작은 무지개 -->
    <line x1="104" y1="73" x2="112" y2="70" stroke="#ff3366" stroke-width="1" opacity="0.6"/>
    <line x1="104" y1="76" x2="113" y2="76" stroke="#33ff99" stroke-width="1" opacity="0.6"/>
    <line x1="104" y1="79" x2="112" y2="82" stroke="#3366ff" stroke-width="1" opacity="0.6"/>
    <!-- 빛 파티클 -->
    <circle cx="110" cy="69" r="1" fill="#ff3366" opacity="0.7"/>
    <circle cx="114" cy="76" r="0.8" fill="#33ff99" opacity="0.6"/>
    <circle cx="110" cy="83" r="1" fill="#3366ff" opacity="0.7"/>
  </g>

  <!-- 머리 (투구) -->
  <g id="head">
    <!-- 투구 본체 -->
    <path d="M50 22 C48 28, 48 38, 50 44 L64 48 L78 44 C80 38, 80 28, 78 22 C74 16, 54 16, 50 22Z" fill="url(#helmGrad)"/>
    <!-- 투구 바이저 -->
    <path d="M52 30 C54 28, 74 28, 76 30 L74 40 C72 42, 56 42, 54 40Z" fill="#1a1a3a" opacity="0.9"/>
    <!-- 눈 (시안 발광) -->
    <ellipse cx="58" cy="35" rx="3" ry="2" fill="#00d4ff" filter="url(#glow)"/>
    <ellipse cx="70" cy="35" rx="3" ry="2" fill="#00d4ff" filter="url(#glow)"/>
    <ellipse cx="58" cy="35" rx="1.5" ry="1" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="70" cy="35" rx="1.5" ry="1" fill="#ffffff" opacity="0.8"/>
    <!-- 투구 프리즘 장식 (이마) -->
    <path d="M60 20 L64 12 L68 20Z" fill="url(#prismCore)" filter="url(#glow)"/>
    <path d="M62 19 L64 14 L66 19Z" fill="#ffffff" opacity="0.5"/>
    <!-- 투구 크레스트 -->
    <path d="M64 12 C62 8, 60 6, 64 4 C68 6, 66 8, 64 12Z" fill="url(#goldTrim)"/>
    <!-- 투구 골드 트림 -->
    <path d="M50 22 C54 16, 74 16, 78 22" stroke="url(#goldTrim)" stroke-width="1.5" fill="none"/>
    <path d="M52 30 C54 28, 74 28, 76 30" stroke="#ffd700" stroke-width="0.8" fill="none" opacity="0.6"/>
    <!-- 투구 리벳 -->
    <circle cx="52" cy="26" r="1" fill="#ffd700" opacity="0.8"/>
    <circle cx="76" cy="26" r="1" fill="#ffd700" opacity="0.8"/>
    <!-- 볼 가드 -->
    <path d="M50 32 C48 34, 48 38, 50 40" stroke="#8ba8c8" stroke-width="2" fill="none"/>
    <path d="M78 32 C80 34, 80 38, 78 40" stroke="#8ba8c8" stroke-width="2" fill="none"/>
  </g>

  <!-- 발광 오라 (전신) -->
  <circle cx="64" cy="64" r="50" fill="url(#prismCore)" opacity="0.05"/>
  <circle cx="64" cy="62" r="35" fill="#00d4ff" opacity="0.03"/>
</svg>