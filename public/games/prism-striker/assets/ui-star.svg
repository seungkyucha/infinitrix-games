<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- 프리즘 파편 그라디언트 -->
    <linearGradient id="shardMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#3366ff"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </linearGradient>
    <linearGradient id="shardGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <radialGradient id="shardGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3366ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="facetA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="facetB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ccff"/>
      <stop offset="100%" stop-color="#2244aa"/>
    </linearGradient>
    <linearGradient id="facetC" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#6c3cf7"/>
    </linearGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#3366ff" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="shardRim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 아우라 -->
  <circle cx="24" cy="24" r="20" fill="url(#shardGlow)"/>

  <!-- 궤도 링 -->
  <g opacity="0.3">
    <ellipse cx="24" cy="24" rx="18" ry="6" fill="none" stroke="url(#shardGold)" stroke-width="0.6" transform="rotate(-20 24 24)"/>
    <ellipse cx="24" cy="24" rx="16" ry="5" fill="none" stroke="#00d4ff" stroke-width="0.4" transform="rotate(25 24 24)"/>
  </g>

  <!-- 메인 프리즘 파편 (다면체 다이아몬드) -->
  <g filter="url(#sShadow)">
    <!-- 상부 크라운 -->
    <path d="M24 6 L14 18 L24 22Z" fill="url(#facetA)"/>
    <path d="M24 6 L34 18 L24 22Z" fill="url(#facetB)"/>
    <path d="M14 18 L8 20 L24 22Z" fill="#2288cc" opacity="0.7"/>
    <path d="M34 18 L40 20 L24 22Z" fill="#3355aa" opacity="0.7"/>

    <!-- 하부 파빌리온 -->
    <path d="M8 20 L24 42 L24 22Z" fill="url(#facetC)"/>
    <path d="M40 20 L24 42 L24 22Z" fill="#5533cc" opacity="0.8"/>
    <path d="M14 18 L8 20 L24 42 L14 28Z" fill="#3366cc" opacity="0.4"/>
    <path d="M34 18 L40 20 L24 42 L34 28Z" fill="#4422aa" opacity="0.4"/>

    <!-- 패싯 엣지 -->
    <path d="M24 6 L14 18 M24 6 L34 18 M14 18 L24 22 M34 18 L24 22 M8 20 L24 22 M40 20 L24 22 M8 20 L24 42 M40 20 L24 42" stroke="#aaddff" stroke-width="0.4" fill="none" opacity="0.5"/>

    <!-- 하이라이트 -->
    <path d="M18 12 C20 10, 22 10, 24 12 C22 14, 20 14, 18 12Z" fill="#ffffff" opacity="0.6"/>
    <circle cx="19" cy="12" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="21" cy="10" r="0.8" fill="#ffffff" opacity="0.9"/>

    <!-- 내부 빛 반사 -->
    <path d="M28 18 C30 16, 32 17, 34 18" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M20 26 L22 24 L24 28" stroke="#aaeeff" stroke-width="0.3" fill="none" opacity="0.3"/>
  </g>

  <!-- 골드 테두리 프레임 (상부) -->
  <path d="M24 5 L12 18 L8 20" stroke="url(#shardGold)" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M24 5 L36 18 L40 20" stroke="url(#shardGold)" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- 반짝임 -->
  <g filter="url(#sGlow)">
    <path d="M24 2 L25 5 L24 8 L23 5Z" fill="#ffffff" opacity="0.8"/>
    <path d="M6 16 L8 17 L6 18 L4 17Z" fill="#00d4ff" opacity="0.6"/>
    <path d="M42 16 L44 17 L42 18 L40 17Z" fill="#00d4ff" opacity="0.6"/>
    <path d="M24 44 L25 42 L24 40 L23 42Z" fill="#6c3cf7" opacity="0.5"/>
    <circle cx="10" cy="10" r="0.8" fill="#ffffff" opacity="0.5"/>
    <circle cx="38" cy="12" r="0.6" fill="#ffffff" opacity="0.4"/>
    <circle cx="16" cy="36" r="0.7" fill="#00d4ff" opacity="0.3"/>
    <circle cx="32" cy="38" r="0.5" fill="#3366ff" opacity="0.3"/>
  </g>

  <!-- 무지개 반사 -->
  <g opacity="0.4">
    <line x1="16" y1="14" x2="12" y2="12" stroke="#ff3366" stroke-width="0.5"/>
    <line x1="15" y1="16" x2="10" y2="15" stroke="#33ff99" stroke-width="0.5"/>
    <line x1="15" y1="18" x2="10" y2="18" stroke="#ffd700" stroke-width="0.5"/>
  </g>

  <!-- 궤도 보석 -->
  <circle cx="8" cy="28" r="1.5" fill="#ffd700" opacity="0.6" filter="url(#sGlow)"/>
  <circle cx="40" cy="28" r="1.2" fill="#00d4ff" opacity="0.5" filter="url(#sGlow)"/>
  <circle cx="16" cy="40" r="1" fill="#33ff99" opacity="0.4"/>
  <circle cx="32" cy="42" r="0.8" fill="#ff3366" opacity="0.4"/>
</svg>