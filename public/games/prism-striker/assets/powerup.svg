<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 프리즘 그라디언트 -->
    <linearGradient id="puPrism" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#33ff99"/>
      <stop offset="80%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff3366"/>
    </linearGradient>
    <radialGradient id="puCore" cx="0.5" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#3366ff"/>
    </radialGradient>
    <radialGradient id="puAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#6c3cf7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="puFacet1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="puFacet2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88ff88"/>
      <stop offset="100%" stop-color="#228866"/>
    </linearGradient>
    <linearGradient id="puFacet3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffdd66"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <filter id="puGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="puSoftGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 헥사곤 프레임 그라디언트 -->
    <linearGradient id="puFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc8800" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- 에너지 파동 (외곽 링) -->
  <g opacity="0.3">
    <circle cx="32" cy="32" r="30" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4 3"/>
    <circle cx="32" cy="32" r="27" fill="none" stroke="#33ff99" stroke-width="0.4" stroke-dasharray="3 4"/>
    <circle cx="32" cy="32" r="24" fill="none" stroke="#ffd700" stroke-width="0.3" stroke-dasharray="2 5"/>
  </g>

  <!-- 아우라 -->
  <circle cx="32" cy="32" r="28" fill="url(#puAura)" filter="url(#puSoftGlow)"/>

  <!-- 헥사곤 프레임 -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="none" stroke="url(#puFrame)" stroke-width="1.2" opacity="0.6"/>
  <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>

  <!-- 궤도 보석 (회전 느낌) -->
  <g filter="url(#puGlow)">
    <circle cx="32" cy="6" r="2" fill="#ff3366"/>
    <circle cx="54" cy="18" r="1.8" fill="#ffd700"/>
    <circle cx="54" cy="46" r="1.5" fill="#33ff99"/>
    <circle cx="32" cy="58" r="1.8" fill="#3366ff"/>
    <circle cx="10" cy="46" r="1.5" fill="#6c3cf7"/>
    <circle cx="10" cy="18" r="2" fill="#00d4ff"/>
  </g>

  <!-- 메인 프리즘 (중앙 다면체) -->
  <g filter="url(#puGlow)">
    <!-- 상부 -->
    <path d="M32 14 L22 26 L32 30Z" fill="url(#puFacet1)"/>
    <path d="M32 14 L42 26 L32 30Z" fill="url(#puFacet2)"/>
    <!-- 하부 -->
    <path d="M22 26 L32 50 L32 30Z" fill="url(#puFacet3)"/>
    <path d="M42 26 L32 50 L32 30Z" fill="#cc6600" opacity="0.7"/>
    <!-- 좌우 면 -->
    <path d="M22 26 L18 32 L32 50Z" fill="#006688" opacity="0.5"/>
    <path d="M42 26 L46 32 L32 50Z" fill="#446600" opacity="0.5"/>

    <!-- 엣지 -->
    <path d="M32 14 L22 26 L18 32 M32 14 L42 26 L46 32 M22 26 L32 30 L42 26 M18 32 L32 50 L46 32" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- 코어 빛 -->
    <circle cx="32" cy="30" r="5" fill="url(#puCore)" opacity="0.8"/>
    <circle cx="32" cy="28" r="2" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- 무지개 광선 방출 -->
  <g opacity="0.5">
    <line x1="32" y1="14" x2="32" y2="4" stroke="#ff3366" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="26" x2="50" y2="20" stroke="#ffd700" stroke-width="1.2" opacity="0.5"/>
    <line x1="46" y1="32" x2="56" y2="32" stroke="#33ff99" stroke-width="1.2" opacity="0.5"/>
    <line x1="42" y1="38" x2="50" y2="44" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="26" x2="14" y2="20" stroke="#3366ff" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="32" x2="8" y2="32" stroke="#6c3cf7" stroke-width="1.2" opacity="0.5"/>
    <line x1="22" y1="38" x2="14" y2="44" stroke="#ff3366" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- 에너지 위스프 -->
  <g opacity="0.4">
    <path d="M20 14 C18 10, 22 8, 24 12" stroke="#00d4ff" stroke-width="0.8" fill="none"/>
    <path d="M44 14 C46 10, 42 8, 40 12" stroke="#33ff99" stroke-width="0.8" fill="none"/>
    <path d="M18 48 C14 50, 16 54, 20 52" stroke="#6c3cf7" stroke-width="0.8" fill="none"/>
    <path d="M46 48 C50 50, 48 54, 44 52" stroke="#ffd700" stroke-width="0.8" fill="none"/>
  </g>

  <!-- 반짝임 파티클 -->
  <g filter="url(#puGlow)">
    <path d="M32 10 L33 12 L32 14 L31 12Z" fill="#ffffff" opacity="0.8"/>
    <path d="M16 24 L17 25 L16 26 L15 25Z" fill="#ffffff" opacity="0.6"/>
    <path d="M48 24 L49 25 L48 26 L47 25Z" fill="#ffffff" opacity="0.6"/>
    <circle cx="24" cy="48" r="0.8" fill="#ffd700" opacity="0.5"/>
    <circle cx="40" cy="48" r="0.6" fill="#00d4ff" opacity="0.5"/>
  </g>

  <!-- 코너 액센트 도트 -->
  <circle cx="4" cy="4" r="1" fill="#00d4ff" opacity="0.3"/>
  <circle cx="60" cy="4" r="1" fill="#ff3366" opacity="0.3"/>
  <circle cx="4" cy="60" r="1" fill="#33ff99" opacity="0.3"/>
  <circle cx="60" cy="60" r="1" fill="#ffd700" opacity="0.3"/>

  <!-- ⚡ 유니코드 에너지 심볼 -->
  <text x="32" y="35" font-size="6" fill="#ffd700" opacity="0.3" text-anchor="middle" font-family="sans-serif">⚡</text>
</svg>