<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gruntGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6688"/>
      <stop offset="100%" stop-color="#cc1144"/>
    </linearGradient>
    <radialGradient id="gruntCore" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff3366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chargerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </linearGradient>
    <linearGradient id="rangedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc66ff"/>
      <stop offset="100%" stop-color="#7722cc"/>
    </linearGradient>
    <linearGradient id="splitterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ff88"/>
      <stop offset="100%" stop-color="#118833"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdd44"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <filter id="enemyGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlowF">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Grunt (diamond) - center -->
  <g transform="translate(32,16)" filter="url(#enemyGlow)">
    <path d="M0 -10 L8 0 L0 10 L-8 0 Z" fill="url(#gruntGrad)" stroke="#ff6688" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="3" fill="url(#gruntCore)"/>
    <path d="M-4 -2 L4 -2" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <circle cx="-2" cy="-3" r="1" fill="#ffffff" opacity="0.7"/>
    <circle cx="2" cy="-3" r="1" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- Charger (arrow) - left -->
  <g transform="translate(14,40)" filter="url(#enemyGlow)">
    <path d="M0 -10 L7 2 L4 0 L4 8 L-4 8 L-4 0 L-7 2 Z" fill="url(#chargerGrad)" stroke="#ffaa55" stroke-width="0.5"/>
    <path d="M0 -6 L0 4" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="-4" r="1.5" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Ranged (inverted triangle) - right -->
  <g transform="translate(50,40)" filter="url(#enemyGlow)">
    <path d="M-8 -6 L8 -6 L0 8 Z" fill="url(#rangedGrad)" stroke="#cc66ff" stroke-width="0.5"/>
    <circle cx="0" cy="-2" r="2.5" fill="#aa44ff" opacity="0.7"/>
    <circle cx="0" cy="-2" r="1" fill="#ffffff" opacity="0.8"/>
    <path d="M-3 2 L0 6 L3 2" stroke="#cc66ff" stroke-width="0.5" opacity="0.5" fill="none"/>
  </g>
  <!-- Splitter (hexagon) - bottom left -->
  <g transform="translate(24,56)" filter="url(#enemyGlow)">
    <path d="M0 -7 L6 -3.5 L6 3.5 L0 7 L-6 3.5 L-6 -3.5 Z" fill="url(#splitterGrad)" stroke="#66ff88" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff" opacity="0.5"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
  </g>
  <!-- Tank (square) - bottom right -->
  <g transform="translate(46,56)" filter="url(#enemyGlow)">
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="url(#tankGrad)" stroke="#ffdd44" stroke-width="0.5"/>
    <rect x="-5" y="-5" width="10" height="10" rx="1" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffcc00" opacity="0.6"/>
    <circle cx="0" cy="0" r="1" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>