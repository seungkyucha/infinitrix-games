<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00ffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="engineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0066ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0044aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#004466"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Engine exhaust glow -->
  <g filter="url(#strongGlow)">
    <ellipse cx="32" cy="54" rx="10" ry="5" fill="url(#engineGlow)"/>
    <ellipse cx="32" cy="52" rx="5" ry="8" fill="#00ffff" opacity="0.3"/>
  </g>
  <!-- Main body - triangular ship -->
  <g filter="url(#glow)">
    <path d="M32 6 L42 36 Q40 40 38 42 L32 38 L26 42 Q24 40 22 36 Z" fill="url(#bodyGrad)" stroke="#00cccc" stroke-width="0.5"/>
  </g>
  <!-- Left wing -->
  <g filter="url(#glow)">
    <path d="M22 36 L6 50 Q8 48 12 46 L18 44 L24 42 Z" fill="url(#wingGrad)" stroke="#00aacc" stroke-width="0.3"/>
    <path d="M10 48 L6 50 L12 46 Z" fill="#00ffff" opacity="0.4"/>
  </g>
  <!-- Right wing -->
  <g filter="url(#glow)">
    <path d="M42 36 L58 50 Q56 48 52 46 L46 44 L40 42 Z" fill="url(#wingGrad)" stroke="#00aacc" stroke-width="0.3"/>
    <path d="M54 48 L58 50 L52 46 Z" fill="#00ffff" opacity="0.4"/>
  </g>
  <!-- Wing accent lines -->
  <line x1="20" y1="38" x2="10" y2="47" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
  <line x1="44" y1="38" x2="54" y2="47" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
  <!-- Cockpit -->
  <g filter="url(#strongGlow)">
    <ellipse cx="32" cy="22" rx="5" ry="8" fill="url(#coreGlow)"/>
    <ellipse cx="32" cy="20" rx="3" ry="5" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- Engine cores -->
  <g filter="url(#glow)">
    <circle cx="26" cy="44" r="2.5" fill="#00ffff" opacity="0.9"/>
    <circle cx="38" cy="44" r="2.5" fill="#00ffff" opacity="0.9"/>
    <circle cx="32" cy="46" r="3" fill="#66ffff" opacity="0.7"/>
  </g>
  <!-- Body detail lines -->
  <path d="M30 14 L30 32" stroke="#00ffff" stroke-width="0.4" opacity="0.5"/>
  <path d="M34 14 L34 32" stroke="#00ffff" stroke-width="0.4" opacity="0.5"/>
  <path d="M28 28 L36 28" stroke="#00ffff" stroke-width="0.3" opacity="0.4"/>
  <!-- Nose tip glow -->
  <circle cx="32" cy="6" r="1.5" fill="#ffffff" filter="url(#glow)"/>
</svg>