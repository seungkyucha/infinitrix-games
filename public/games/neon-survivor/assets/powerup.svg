<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="puGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0088cc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ddff"/>
      <stop offset="50%" stop-color="#00bbee"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66eeff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <radialGradient id="shieldShine" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="puGlowF">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow aura -->
  <circle cx="24" cy="24" r="20" fill="url(#puGlow)"/>
  <!-- Rotating ring -->
  <g filter="url(#puGlowF)">
    <circle cx="24" cy="24" r="18" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.4" stroke-dasharray="4 8"/>
    <circle cx="24" cy="24" r="21" fill="none" stroke="#0088cc" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 12"/>
  </g>
  <!-- Shield body -->
  <g filter="url(#innerGlow)">
    <path d="M24 6 C32 6 40 10 40 18 C40 30 24 42 24 42 C24 42 8 30 8 18 C8 10 16 6 24 6 Z" fill="url(#shieldGrad)" stroke="#44ddff" stroke-width="0.8"/>
  </g>
  <!-- Shield inner face -->
  <path d="M24 10 C30 10 35 13 35 19 C35 28 24 37 24 37 C24 37 13 28 13 19 C13 13 18 10 24 10 Z" fill="url(#shieldInner)" opacity="0.3"/>
  <!-- Cross / plus emblem -->
  <g filter="url(#innerGlow)">
    <rect x="21" y="14" width="6" height="18" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="15" y="20" width="18" height="6" rx="1.5" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- Shine -->
  <ellipse cx="18" cy="14" rx="5" ry="4" fill="url(#shieldShine)"/>
  <!-- Sparkle particles -->
  <g opacity="0.6">
    <circle cx="8" cy="8" r="1" fill="#ffffff"/>
    <circle cx="40" cy="10" r="0.8" fill="#ffffff"/>
    <circle cx="6" cy="36" r="0.7" fill="#00ffff"/>
    <circle cx="42" cy="34" r="0.9" fill="#00ffff"/>
  </g>
</svg>