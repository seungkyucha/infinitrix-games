<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffff66"/>
      <stop offset="40%" stop-color="#ffee44"/>
      <stop offset="100%" stop-color="#ccaa00"/>
    </linearGradient>
    <radialGradient id="gemShine" cx="40%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee44" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#ffcc00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <filter id="xpGlow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="12" fill="url(#gemGlow)"/>
  <!-- XP Gem diamond shape -->
  <g filter="url(#xpGlow)">
    <path d="M16 3 L26 14 L16 29 L6 14 Z" fill="url(#gemGrad)" stroke="#ffdd44" stroke-width="0.5"/>
    <!-- Facets -->
    <path d="M16 3 L12 14 L16 11 L20 14 Z" fill="#ffff88" opacity="0.4"/>
    <path d="M6 14 L12 14 L16 29 Z" fill="#ccaa00" opacity="0.3"/>
    <path d="M26 14 L20 14 L16 29 Z" fill="#bb9900" opacity="0.35"/>
    <path d="M12 14 L20 14 L16 11 Z" fill="#ffee44" opacity="0.2"/>
  </g>
  <!-- Shine -->
  <ellipse cx="13" cy="10" rx="3" ry="2" fill="url(#gemShine)"/>
  <!-- Sparkle accents -->
  <g opacity="0.7">
    <line x1="4" y1="6" x2="6" y2="8" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="6" y1="6" x2="4" y2="8" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="26" y1="22" x2="28" y2="24" stroke="#ffffff" stroke-width="0.4"/>
    <line x1="28" y1="22" x2="26" y2="24" stroke="#ffffff" stroke-width="0.4"/>
  </g>
</svg>