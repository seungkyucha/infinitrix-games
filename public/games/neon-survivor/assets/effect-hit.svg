<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffddaa" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ff8844" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#ff3366" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shockwave" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ff3366" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ff3366" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#ff6688" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerBlast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8833" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6644" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#ff3366" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <filter id="hitGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer shockwave ring -->
  <circle cx="48" cy="48" r="44" fill="url(#outerBlast)"/>
  <circle cx="48" cy="48" r="38" fill="url(#shockwave)"/>
  <!-- Light rays -->
  <g filter="url(#rayGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="4" stroke="#ff8855" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="79" y2="12" stroke="#ff6644" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="92" y2="33" stroke="#ff8855" stroke-width="1.8" opacity="0.55"/>
    <line x1="48" y1="48" x2="92" y2="63" stroke="#ff6644" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="79" y2="84" stroke="#ff8855" stroke-width="1.8" opacity="0.55"/>
    <line x1="48" y1="48" x2="48" y2="92" stroke="#ff6644" stroke-width="2" opacity="0.6"/>
    <line x1="48" y1="48" x2="17" y2="84" stroke="#ff8855" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="4" y2="63" stroke="#ff6644" stroke-width="1.8" opacity="0.55"/>
    <line x1="48" y1="48" x2="4" y2="33" stroke="#ff8855" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="48" x2="17" y2="12" stroke="#ff6644" stroke-width="1.8" opacity="0.55"/>
  </g>
  <!-- Secondary spikes -->
  <g filter="url(#rayGlow)" opacity="0.4">
    <line x1="48" y1="48" x2="64" y2="8" stroke="#ffaa66" stroke-width="1"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#ffaa66" stroke-width="1"/>
    <line x1="48" y1="48" x2="64" y2="88" stroke="#ffaa66" stroke-width="1"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#ffaa66" stroke-width="1"/>
    <line x1="48" y1="48" x2="32" y2="8" stroke="#ffaa66" stroke-width="1"/>
    <line x1="48" y1="48" x2="32" y2="88" stroke="#ffaa66" stroke-width="1"/>
  </g>
  <!-- Core flash -->
  <g filter="url(#hitGlow)">
    <circle cx="48" cy="48" r="16" fill="url(#hitCore)"/>
    <circle cx="48" cy="48" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="48" cy="48" r="4" fill="#ffffff"/>
  </g>
  <!-- Debris particles -->
  <g opacity="0.6">
    <circle cx="30" cy="20" r="2" fill="#ff8844"/>
    <circle cx="70" cy="25" r="1.5" fill="#ffaa55"/>
    <circle cx="75" cy="65" r="2" fill="#ff6633"/>
    <circle cx="22" cy="72" r="1.8" fill="#ffaa55"/>
    <circle cx="60" cy="78" r="1.5" fill="#ff8844"/>
    <circle cx="20" cy="40" r="1.2" fill="#ffcc66"/>
    <circle cx="78" cy="48" r="1.5" fill="#ff6633"/>
    <circle cx="38" cy="80" r="1" fill="#ffaa55"/>
  </g>
</svg>