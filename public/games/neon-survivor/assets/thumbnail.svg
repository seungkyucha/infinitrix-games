<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="tBg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0d0d2a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="tNebula" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#1a0044" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tPlayerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <radialGradient id="tPlayerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tTitleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="tSubGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#33ff66"/>
    </linearGradient>
    <filter id="tGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tSoftGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tTextGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tEnemyGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#tBg)"/>
  <rect width="400" height="300" fill="url(#tNebula)"/>
  <!-- Grid lines -->
  <g opacity="0.15">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#0d3b4e" stroke-width="0.7"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#0d3b4e" stroke-width="0.7"/>
    <line x1="250" y1="0" x2="250" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="300" stroke="#0d3b4e" stroke-width="0.5"/>
  </g>
  <!-- Stars -->
  <g opacity="0.5">
    <circle cx="30" cy="20" r="0.8" fill="#ffffff"/>
    <circle cx="85" cy="45" r="0.5" fill="#ccddff"/>
    <circle cx="150" cy="30" r="0.7" fill="#ffffff"/>
    <circle cx="250" cy="15" r="0.6" fill="#aabbff"/>
    <circle cx="320" cy="40" r="0.8" fill="#ffffff"/>
    <circle cx="370" cy="25" r="0.5" fill="#ccddff"/>
    <circle cx="60" cy="90" r="0.6" fill="#ffffff"/>
    <circle cx="340" cy="80" r="0.7" fill="#ffffff"/>
    <circle cx="180" cy="70" r="0.5" fill="#ccddff"/>
    <circle cx="280" cy="60" r="0.8" fill="#ffffff"/>
  </g>
  <!-- Enemy swarm - surrounding the player -->
  <!-- Grunt enemies (diamonds) -->
  <g filter="url(#tEnemyGlow)">
    <path d="M80 100 L86 108 L80 116 L74 108 Z" fill="#ff3366" opacity="0.8"/>
    <path d="M120 70 L126 78 L120 86 L114 78 Z" fill="#ff3366" opacity="0.7"/>
    <path d="M310 90 L316 98 L310 106 L304 98 Z" fill="#ff3366" opacity="0.8"/>
    <path d="M340 130 L346 138 L340 146 L334 138 Z" fill="#ff3366" opacity="0.7"/>
    <path d="M60 160 L66 168 L60 176 L54 168 Z" fill="#ff3366" opacity="0.6"/>
    <path d="M280 170 L286 178 L280 186 L274 178 Z" fill="#ff3366" opacity="0.7"/>
  </g>
  <!-- Charger enemies (arrows) -->
  <g filter="url(#tEnemyGlow)">
    <path d="M100 150 L107 157 L104 155 L104 162 L96 162 L96 155 L93 157 Z" fill="#ff8833" opacity="0.8"/>
    <path d="M320 110 L327 117 L324 115 L324 122 L316 122 L316 115 L313 117 Z" fill="#ff8833" opacity="0.7"/>
  </g>
  <!-- Ranged enemies (inverted triangles) -->
  <g filter="url(#tEnemyGlow)">
    <path d="M140 170 L152 170 L146 182 Z" fill="#aa44ff" opacity="0.7"/>
    <path d="M260 90 L272 90 L266 102 Z" fill="#aa44ff" opacity="0.8"/>
  </g>
  <!-- Tank enemy (square) -->
  <g filter="url(#tEnemyGlow)">
    <rect x="330" y="160" width="16" height="16" rx="2" fill="#ffcc00" opacity="0.7"/>
    <rect x="333" y="163" width="10" height="10" rx="1" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.4"/>
  </g>
  <!-- Splitter enemy (hexagon) -->
  <g filter="url(#tEnemyGlow)">
    <path d="M70 130 L76 126 L82 130 L82 137 L76 141 L70 137 Z" fill="#33ff66" opacity="0.7"/>
  </g>
  <!-- Player ship - center -->
  <g transform="translate(200, 135)">
    <!-- Player glow aura -->
    <circle cx="0" cy="0" r="30" fill="url(#tPlayerGlow)" filter="url(#tGlow)"/>
    <!-- Engine glow -->
    <ellipse cx="0" cy="16" rx="8" ry="5" fill="#00ffff" opacity="0.4" filter="url(#tSoftGlow)"/>
    <!-- Ship body -->
    <g filter="url(#tGlow)">
      <path d="M0 -20 L12 8 L0 4 L-12 8 Z" fill="url(#tPlayerGrad)" stroke="#00cccc" stroke-width="0.5"/>
    </g>
    <!-- Wings -->
    <path d="M-12 8 L-22 18 L-12 16 Z" fill="#0077aa"/>
    <path d="M12 8 L22 18 L12 16 Z" fill="#0077aa"/>
    <!-- Cockpit -->
    <ellipse cx="0" cy="-6" rx="3" ry="5" fill="#ffffff" opacity="0.7" filter="url(#tSoftGlow)"/>
    <!-- Engine -->
    <circle cx="0" cy="12" r="2" fill="#00ffff" filter="url(#tSoftGlow)"/>
  </g>
  <!-- Bullets from player -->
  <g filter="url(#tSoftGlow)">
    <circle cx="200" cy="100" r="3" fill="#00ffff" opacity="0.9"/>
    <circle cx="185" cy="108" r="2.5" fill="#00ffff" opacity="0.7"/>
    <circle cx="215" cy="108" r="2.5" fill="#00ffff" opacity="0.7"/>
    <circle cx="200" cy="85" r="2" fill="#00ffff" opacity="0.5"/>
    <!-- Orbit shield projectiles -->
    <circle cx="175" cy="130" r="4" fill="#44aaff" opacity="0.8"/>
    <circle cx="228" cy="140" r="4" fill="#44aaff" opacity="0.8"/>
  </g>
  <!-- Explosion effect on an enemy -->
  <g transform="translate(310, 90)" filter="url(#tGlow)">
    <circle cx="0" cy="0" r="12" fill="#ff3366" opacity="0.2"/>
    <circle cx="0" cy="0" r="6" fill="#ff8844" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.6"/>
    <line x1="0" y1="0" x2="10" y2="-8" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-8" y2="10" stroke="#ff6644" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="8" y2="8" stroke="#ffaa55" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- XP gems scattered -->
  <g filter="url(#tSoftGlow)">
    <path d="M250 150 L253 155 L250 160 L247 155 Z" fill="#ffee44" opacity="0.8"/>
    <path d="M160 140 L162 144 L160 148 L158 144 Z" fill="#ffee44" opacity="0.7"/>
    <path d="M230 110 L232 114 L230 118 L228 114 Z" fill="#ffee44" opacity="0.6"/>
    <path d="M170 115 L172 119 L170 123 L168 119 Z" fill="#ffee44" opacity="0.7"/>
    <path d="M290 140 L292 144 L290 148 L288 144 Z" fill="#ffee44" opacity="0.6"/>
  </g>
  <!-- UI elements - wave counter top left -->
  <g opacity="0.7">
    <rect x="10" y="8" width="80" height="20" rx="3" fill="#0a0a1a" opacity="0.7" stroke="#00ffff" stroke-width="0.5"/>
  </g>
  <!-- HP bar bottom -->
  <g opacity="0.6">
    <rect x="150" y="195" width="100" height="6" rx="3" fill="#1a1a2e"/>
    <rect x="150" y="195" width="75" height="6" rx="3" fill="#33ff33"/>
  </g>
  <!-- XP bar -->
  <g opacity="0.5">
    <rect x="120" y="203" width="160" height="3" rx="1.5" fill="#1a1a2e"/>
    <rect x="120" y="203" width="96" height="3" rx="1.5" fill="#ffee44"/>
  </g>
  <!-- Dark overlay at bottom for title -->
  <rect x="0" y="220" width="400" height="80" fill="#050510" opacity="0.85"/>
  <rect x="0" y="218" width="400" height="3" fill="#00ffff" opacity="0.15"/>
  <!-- Title text -->
  <g filter="url(#tTextGlow)">
    <text x="200" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#tTitleGrad)" letter-spacing="4">NEON SURVIVOR</text>
  </g>
  <!-- Subtitle -->
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="url(#tSubGrad)" letter-spacing="6" opacity="0.8">SURVIVE THE SWARM</text>
  <!-- Border frame -->
  <rect x="2" y="2" width="396" height="296" rx="4" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2"/>
  <rect x="4" y="4" width="392" height="292" rx="3" fill="none" stroke="#00ffff" stroke-width="0.3" opacity="0.1"/>
</svg>