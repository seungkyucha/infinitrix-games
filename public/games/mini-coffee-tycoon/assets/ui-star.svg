<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE484"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="coinBloom">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 글로우 -->
  <circle cx="16" cy="16" r="15" fill="url(#coinGlow)"/>
  <!-- 코인 외곽 (두께감) -->
  <ellipse cx="16" cy="17" rx="12" ry="12" fill="url(#coinEdge)" opacity="0.6"/>
  <!-- 코인 본체 -->
  <circle cx="16" cy="16" r="12" fill="url(#coinGrad)" filter="url(#coinBloom)" stroke="#B8860B" stroke-width="1"/>
  <!-- 내부 원 테두리 -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#B8860B" stroke-width="0.8" opacity="0.5"/>
  <!-- ₩ 마크 (커피 골드) -->
  <g transform="translate(16,16)">
    <path d="M-4 -5 L-4 5 M4 -5 L4 5 M-6 -1 L6 -1 M-6 2 L6 2" stroke="#8B6914" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  </g>
  <!-- 하이라이트 -->
  <circle cx="16" cy="16" r="12" fill="url(#coinShine)"/>
  <!-- 반짝임 -->
  <path d="M6 6 L7 4 L8 6 L10 7 L8 8 L7 10 L6 8 L4 7 Z" fill="#FFFFFF" opacity="0.8"/>
</svg>