<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="burstCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFE484" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE484" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E67E22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B8A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="burstGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- 외곽 링 -->
  <circle cx="48" cy="48" r="42" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3" filter="url(#softBlur)"/>
  <circle cx="48" cy="48" r="34" fill="none" stroke="#FFE484" stroke-width="1.5" opacity="0.4" filter="url(#softBlur)"/>
  <!-- 중앙 버스트 -->
  <circle cx="48" cy="48" r="25" fill="url(#burstCenter)" filter="url(#burstGlow)"/>
  <!-- 방사형 광선 -->
  <g filter="url(#burstGlow)" opacity="0.7">
    <line x1="48" y1="48" x2="48" y2="8" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="48" y2="88" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="8" y2="48" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="88" y2="48" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="20" stroke="#FFE484" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="20" stroke="#FFE484" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="20" y2="76" stroke="#FFE484" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="76" y2="76" stroke="#FFE484" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- 별/스파클 파티클 -->
  <g filter="url(#burstGlow)">
    <path d="M18 22 L19 19 L20 22 L23 23 L20 24 L19 27 L18 24 L15 23 Z" fill="#FFD700"/>
    <path d="M72 18 L73 15 L74 18 L77 19 L74 20 L73 23 L72 20 L69 19 Z" fill="#FFE484"/>
    <path d="M14 52 L15 49 L16 52 L19 53 L16 54 L15 57 L14 54 L11 53 Z" fill="#FFD700"/>
    <path d="M78 55 L79 52 L80 55 L83 56 L80 57 L79 60 L78 57 L75 56 Z" fill="#FFE484"/>
    <path d="M30 74 L31 71 L32 74 L35 75 L32 76 L31 79 L30 76 L27 75 Z" fill="#FFD700"/>
    <path d="M64 72 L65 69 L66 72 L69 73 L66 74 L65 77 L64 74 L61 73 Z" fill="#FFE484"/>
  </g>
  <!-- 하트 파티클 (서빙 성공 이펙트) -->
  <g opacity="0.6">
    <path d="M25 35 C25 33 27 31 29 31 C31 31 33 33 33 35 C33 39 29 41 29 41 C29 41 25 39 25 35 Z" fill="url(#heartBurst)" filter="url(#burstGlow)"/>
    <path d="M60 30 C60 28 62 26 64 26 C66 26 68 28 68 30 C68 34 64 36 64 36 C64 36 60 34 60 30 Z" fill="url(#heartBurst)" filter="url(#burstGlow)"/>
    <path d="M42 70 C42 68 44 66 46 66 C48 66 50 68 50 70 C50 74 46 76 46 76 C46 76 42 74 42 70 Z" fill="url(#heartBurst)" filter="url(#burstGlow)"/>
  </g>
  <!-- 코인 파티클 -->
  <g opacity="0.5">
    <circle cx="20" cy="60" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="75" cy="40" r="3.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  </g>
</svg>