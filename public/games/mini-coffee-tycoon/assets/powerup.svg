<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="cupGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFEFE"/>
      <stop offset="100%" stop-color="#E8DDD0"/>
    </linearGradient>
    <linearGradient id="coffeeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6F4E37"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8956A"/>
    </linearGradient>
    <radialGradient id="steamGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE484" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="powerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="steamBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <!-- 파워업 오라 -->
  <circle cx="24" cy="24" r="22" fill="url(#auraGlow)"/>
  <!-- 반짝이는 별들 -->
  <g filter="url(#powerGlow)" opacity="0.8">
    <path d="M8 12 L9 10 L10 12 L12 13 L10 14 L9 16 L8 14 L6 13 Z" fill="#FFD700"/>
    <path d="M38 10 L39 8 L40 10 L42 11 L40 12 L39 14 L38 12 L36 11 Z" fill="#FFE484"/>
    <path d="M10 34 L11 32 L12 34 L14 35 L12 36 L11 38 L10 36 L8 35 Z" fill="#FFD700"/>
    <path d="M36 32 L37 30 L38 32 L40 33 L38 34 L37 36 L36 34 L34 33 Z" fill="#FFE484"/>
  </g>
  <!-- 커피컵 몸통 -->
  <path d="M14 18 L16 42 L32 42 L34 18 Z" fill="url(#cupGrad)" stroke="#D4A574" stroke-width="1"/>
  <!-- 커피컵 슬리브 -->
  <path d="M15 26 L15.5 34 L32.5 34 L33 26 Z" fill="url(#sleeveGrad)" opacity="0.9"/>
  <!-- 커피 액면 -->
  <ellipse cx="24" cy="18" rx="10" ry="3" fill="url(#coffeeGrad)"/>
  <!-- 커피 표면 하이라이트 -->
  <ellipse cx="22" cy="17" rx="4" ry="1.5" fill="#8B6914" opacity="0.5"/>
  <!-- 컵 뚜껑 -->
  <path d="M12 18 Q12 14 24 14 Q36 14 36 18" fill="#FDFEFE" stroke="#D4A574" stroke-width="1"/>
  <rect x="20" y="12" width="8" height="4" rx="2" fill="#E8DDD0" stroke="#D4A574" stroke-width="0.8"/>
  <!-- 핸들 -->
  <path d="M34 22 Q40 22 40 28 Q40 34 34 34" fill="none" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 증기 (황금빛 파워업) -->
  <g filter="url(#steamBlur)">
    <path d="M20 12 Q18 6 21 2" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M24 11 Q26 5 23 0" stroke="#FFE484" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M28 12 Q30 6 27 2" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  </g>
  <!-- 황금 증기 글로우 -->
  <ellipse cx="24" cy="6" rx="10" ry="6" fill="url(#steamGlow)" filter="url(#powerGlow)"/>
</svg>