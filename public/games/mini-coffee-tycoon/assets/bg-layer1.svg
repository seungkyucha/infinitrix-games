<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B8E4F0"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE484"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFE484" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFE484" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FBC8F"/>
      <stop offset="100%" stop-color="#6B8E6B"/>
    </linearGradient>
    <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CAF7C"/>
      <stop offset="100%" stop-color="#5A7D5A"/>
    </linearGradient>
    <linearGradient id="bldgGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4C4B0"/>
      <stop offset="100%" stop-color="#C4B4A0"/>
    </linearGradient>
    <linearGradient id="bldgGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BFB0A0"/>
      <stop offset="100%" stop-color="#A89888"/>
    </linearGradient>
    <filter id="cloudSoft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- 하늘 -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- 태양 -->
  <circle cx="650" cy="100" r="80" fill="url(#sunGlow)"/>
  <circle cx="650" cy="100" r="35" fill="url(#sunGrad)" opacity="0.9"/>
  <!-- 구름들 -->
  <g opacity="0.7">
    <ellipse cx="150" cy="80" rx="60" ry="20" fill="#FFFFFF" filter="url(#cloudSoft)"/>
    <ellipse cx="130" cy="75" rx="40" ry="18" fill="#FFFFFF" filter="url(#cloudSoft)"/>
    <ellipse cx="170" cy="78" rx="45" ry="16" fill="#FFFFFF" filter="url(#cloudSoft)"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="400" cy="120" rx="70" ry="22" fill="#FFFFFF" filter="url(#cloudSoft)"/>
    <ellipse cx="380" cy="115" rx="50" ry="18" fill="#FFFFFF" filter="url(#cloudSoft)"/>
    <ellipse cx="430" cy="118" rx="45" ry="15" fill="#FFFFFF" filter="url(#cloudSoft)"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="700" cy="160" rx="55" ry="18" fill="#FFFFFF" filter="url(#cloudSoft)"/>
    <ellipse cx="680" cy="155" rx="35" ry="14" fill="#FFFFFF" filter="url(#cloudSoft)"/>
  </g>
  <!-- 원경 언덕 -->
  <path d="M0 400 Q100 320 200 360 Q350 280 500 340 Q650 300 800 350 L800 600 L0 600 Z" fill="url(#hillGrad1)" opacity="0.6"/>
  <path d="M0 430 Q150 370 300 400 Q450 350 600 390 Q750 360 800 380 L800 600 L0 600 Z" fill="url(#hillGrad2)" opacity="0.5"/>
  <!-- 원경 빌딩 실루엣 -->
  <g opacity="0.3">
    <!-- 빌딩 1 -->
    <rect x="80" y="350" width="40" height="80" fill="url(#bldgGrad1)"/>
    <rect x="84" y="355" width="8" height="10" rx="1" fill="#FFE484" opacity="0.5"/>
    <rect x="96" y="355" width="8" height="10" rx="1" fill="#FFE484" opacity="0.3"/>
    <rect x="108" y="355" width="8" height="10" rx="1" fill="#FFE484" opacity="0.5"/>
    <rect x="84" y="370" width="8" height="10" rx="1" fill="#FFE484" opacity="0.4"/>
    <rect x="96" y="370" width="8" height="10" rx="1" fill="#FFE484" opacity="0.5"/>
    <!-- 빌딩 2 (높은) -->
    <rect x="140" y="310" width="35" height="120" fill="url(#bldgGrad2)"/>
    <rect x="144" y="315" width="6" height="8" rx="1" fill="#FFE484" opacity="0.4"/>
    <rect x="154" y="315" width="6" height="8" rx="1" fill="#FFE484" opacity="0.5"/>
    <rect x="164" y="315" width="6" height="8" rx="1" fill="#FFE484" opacity="0.3"/>
    <!-- 빌딩 3 -->
    <rect x="550" y="330" width="50" height="100" fill="url(#bldgGrad1)"/>
    <polygon points="550,330 575,310 600,330" fill="#C4B4A0"/>
    <!-- 빌딩 4 -->
    <rect x="620" y="345" width="30" height="85" fill="url(#bldgGrad2)"/>
    <rect x="660" y="360" width="45" height="70" fill="url(#bldgGrad1)"/>
  </g>
  <!-- 원경 나무들 -->
  <g opacity="0.4">
    <circle cx="300" cy="400" r="20" fill="#6B8E6B"/>
    <circle cx="310" cy="395" r="18" fill="#7CAF7C"/>
    <rect x="303" y="400" width="5" height="15" fill="#8B6914"/>
    <circle cx="480" cy="380" r="22" fill="#6B8E6B"/>
    <circle cx="492" cy="375" r="18" fill="#7CAF7C"/>
    <rect x="484" y="380" width="5" height="15" fill="#8B6914"/>
  </g>
</svg>