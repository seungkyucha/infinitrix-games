<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="50%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartBloom">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 글로우 배경 -->
  <circle cx="16" cy="16" r="14" fill="url(#heartGlow)"/>
  <!-- 하트 본체 -->
  <path d="M16 28 C8 22 2 16 2 10 C2 6 5 3 9 3 C12 3 14 5 16 8 C18 5 20 3 23 3 C27 3 30 6 30 10 C30 16 24 22 16 28 Z" fill="url(#heartGrad)" filter="url(#heartBloom)"/>
  <!-- 하이라이트 -->
  <path d="M16 28 C8 22 2 16 2 10 C2 6 5 3 9 3 C12 3 14 5 16 8 C18 5 20 3 23 3 C27 3 30 6 30 10 C30 16 24 22 16 28 Z" fill="url(#heartShine)"/>
  <!-- 스마일 (만족도 아이콘) -->
  <circle cx="12" cy="13" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="20" cy="13" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  <path d="M12 17 Q16 20 20 17" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>