<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="apronGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8C5A"/>
      <stop offset="100%" stop-color="#3D6B3C"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEEDD"/>
      <stop offset="100%" stop-color="#F5D6B8"/>
    </linearGradient>
    <radialGradient id="cheekGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB6A3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFB6A3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F10"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 바리스타 캐릭터 -->
  <g id="barista">
    <!-- 몸통 -->
    <rect x="20" y="30" width="24" height="26" rx="5" ry="5" fill="url(#apronGrad)"/>
    <!-- 앞치마 끈 -->
    <path d="M28 30 Q32 26 36 30" fill="none" stroke="#4A7C49" stroke-width="1.5"/>
    <!-- 앞치마 포켓 -->
    <rect x="27" y="42" width="10" height="7" rx="2" fill="#4A7C49" opacity="0.7"/>
    <!-- 팔 왼쪽 -->
    <path d="M20 34 Q14 38 16 46 Q17 48 19 46 Q18 40 22 36" fill="url(#bodyGrad)" stroke="#E8C4A0" stroke-width="0.5"/>
    <!-- 팔 오른쪽 (컵 들고 있음) -->
    <path d="M44 34 Q50 38 48 46 Q47 48 45 46 Q46 40 42 36" fill="url(#bodyGrad)" stroke="#E8C4A0" stroke-width="0.5"/>
    <!-- 커피컵 (오른손) -->
    <g transform="translate(46, 43)">
      <path d="M-4 0 L-3 -8 L5 -8 L6 0 Z" fill="#FDFEFE" stroke="#D4A574" stroke-width="0.8"/>
      <ellipse cx="1" cy="-8" rx="4.5" ry="1.5" fill="#6F4E37"/>
      <path d="M6 -6 Q10 -5 10 -2 Q10 1 6 0" fill="none" stroke="#D4A574" stroke-width="1"/>
      <!-- 증기 -->
      <path d="M0 -10 Q-1 -13 1 -15 Q3 -17 2 -14 Q0 -12 1 -10" fill="none" stroke="#D4A574" stroke-width="0.5" opacity="0.5"/>
    </g>
    <!-- 머리 -->
    <circle cx="32" cy="20" r="12" fill="url(#bodyGrad)"/>
    <!-- 볼 터치 -->
    <circle cx="25" cy="22" r="3" fill="url(#cheekGlow)"/>
    <circle cx="39" cy="22" r="3" fill="url(#cheekGlow)"/>
    <!-- 눈 -->
    <ellipse cx="28" cy="18" rx="1.8" ry="2.2" fill="#3C2415"/>
    <ellipse cx="36" cy="18" rx="1.8" ry="2.2" fill="#3C2415"/>
    <!-- 눈 하이라이트 -->
    <circle cx="28.8" cy="17" r="0.7" fill="#FFFFFF"/>
    <circle cx="36.8" cy="17" r="0.7" fill="#FFFFFF"/>
    <!-- 미소 -->
    <path d="M29 23 Q32 27 35 23" fill="none" stroke="#3C2415" stroke-width="1" stroke-linecap="round"/>
    <!-- 바리스타 모자 -->
    <path d="M20 14 Q20 6 32 5 Q44 6 44 14 L42 14 Q42 9 32 8 Q22 9 22 14 Z" fill="url(#hatGrad)"/>
    <rect x="19" y="13" width="26" height="3" rx="1" fill="#8B6914"/>
    <!-- 모자 로고 (커피콩 모양) -->
    <ellipse cx="32" cy="10" rx="2.5" ry="1.5" fill="#FFD700" transform="rotate(-20,32,10)" filter="url(#softGlow)"/>
    <!-- 신발 -->
    <ellipse cx="26" cy="57" rx="5" ry="2.5" fill="#3C2415"/>
    <ellipse cx="38" cy="57" rx="5" ry="2.5" fill="#3C2415"/>
  </g>
</svg>