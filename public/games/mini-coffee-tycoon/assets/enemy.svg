<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="angryBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="angrySkinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD5C2"/>
      <stop offset="100%" stop-color="#F5C1A8"/>
    </linearGradient>
    <radialGradient id="angryAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#E74C3C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="angerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 화난 고객 (급한 타입) -->
  <g id="angry-customer">
    <!-- 분노 오라 -->
    <ellipse cx="32" cy="32" rx="28" ry="28" fill="url(#angryAura)"/>
    <!-- 몸통 -->
    <rect x="20" y="30" width="24" height="26" rx="6" ry="6" fill="url(#angryBodyGrad)"/>
    <!-- 셔츠 칼라 -->
    <path d="M26 30 L32 36 L38 30" fill="none" stroke="#A93226" stroke-width="1.5"/>
    <!-- 팔 왼쪽 (주먹) -->
    <path d="M20 34 Q12 36 14 44 Q15 46 17 44 L20 38" fill="url(#angrySkinGrad)" stroke="#E8B090" stroke-width="0.5"/>
    <circle cx="14" cy="44" r="3" fill="url(#angrySkinGrad)" stroke="#E8B090" stroke-width="0.5"/>
    <!-- 팔 오른쪽 (시계 보기) -->
    <path d="M44 34 Q52 36 50 44 Q49 46 47 44 L44 38" fill="url(#angrySkinGrad)" stroke="#E8B090" stroke-width="0.5"/>
    <!-- 손목시계 -->
    <rect x="48" y="40" width="5" height="4" rx="1" fill="#2C3E50" stroke="#FFD700" stroke-width="0.5"/>
    <circle cx="50.5" cy="42" r="1.2" fill="#3498DB"/>
    <!-- 머리 -->
    <circle cx="32" cy="20" r="12" fill="url(#angrySkinGrad)"/>
    <!-- 찡그린 눈썹 -->
    <path d="M23 14 L29 16" stroke="#3C2415" stroke-width="2" stroke-linecap="round"/>
    <path d="M41 14 L35 16" stroke="#3C2415" stroke-width="2" stroke-linecap="round"/>
    <!-- 화난 눈 -->
    <ellipse cx="27" cy="18" rx="2" ry="2.5" fill="#3C2415"/>
    <ellipse cx="37" cy="18" rx="2" ry="2.5" fill="#3C2415"/>
    <circle cx="27.7" cy="17.3" r="0.6" fill="#FFFFFF"/>
    <circle cx="37.7" cy="17.3" r="0.6" fill="#FFFFFF"/>
    <!-- 찡그린 입 -->
    <path d="M28 25 Q32 22 36 25" fill="none" stroke="#3C2415" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 💢 화남 마크 -->
    <g transform="translate(44, 8)" filter="url(#angerGlow)">
      <path d="M0 0 L4 2 L2 0 L4 -2 Z" fill="#E74C3C"/>
      <path d="M1 -3 L3 -1 L5 -3" fill="none" stroke="#E74C3C" stroke-width="1"/>
    </g>
    <!-- 머리카락 -->
    <path d="M20 16 Q22 8 28 7 Q32 6 36 7 Q42 8 44 16" fill="#5D4037" stroke="none"/>
    <path d="M22 14 Q26 10 32 9 Q38 10 42 14" fill="#5D4037"/>
    <!-- 신발 -->
    <ellipse cx="26" cy="57" rx="5" ry="2.5" fill="#2C3E50"/>
    <ellipse cx="38" cy="57" rx="5" ry="2.5" fill="#2C3E50"/>
  </g>
</svg>