// ========== TWEEN MANAGER (clearImmediate API, Cycle 5 확정) ==========
class TweenManager {
  constructor() { this._tweens = []; }
  // 새 tween 추가
  add(obj, props, dur, ease, onComplete) {
    const t = { obj, props: {}, dur, elapsed: 0, ease: ease || 'easeOutQuad', onComplete };
    for (const k in props) { t.props[k] = { from: obj[k], to: props[k] }; }
    this._tweens.push(t);
    return t;
  }
  // 즉시 전체 제거 (cancelAll+add 경쟁 조건 방지)
  clearImmediate() { this._tweens.length = 0; }
  // 매 프레임 업데이트
  update(dt) {
    for (let i = this._tweens.length - 1; i >= 0; i--) {
      const t = this._tweens[i];
      t.elapsed += dt;
      const p = Math.min(t.elapsed / t.dur, 1);
      const ep = this._ease(p, t.ease);
      for (const k in t.props) {
        const pr = t.props[k];
        t.obj[k] = pr.from + (pr.to - pr.from) * ep;
      }
      if (p >= 1) {
        this._tweens.splice(i, 1);
        if (t.onComplete) t.onComplete();
      }
    }
  }
  // 이징 함수 8종
  _ease(t, name) {
    switch (name) {
      case 'linear': return t;
      case 'easeInQuad': return t * t;
      case 'easeOutQuad': return t * (2 - t);
      case 'easeInOutQuad': return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      case 'easeOutCubic': return (--t) * t * t + 1;
      case 'easeOutBack': { const s = 1.70158; return (t -= 1) * t * ((s + 1) * t + s) + 1; }
      case 'easeOutElastic': {
        if (t === 0 || t === 1) return t;
        return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
      }
      case 'easeOutBounce': {
        if (t < 1/2.75) return 7.5625*t*t;
        if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
        if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
        return 7.5625*(t-=2.625/2.75)*t+0.984375;
      }
      default: return t * (2 - t);
    }
  }
}

// ========== OBJECT POOL (역순 순회+splice, Cycle 2 확정) ==========
class ObjectPool {
  constructor(factory, max) { this._pool = []; this._active = []; this._factory = factory; this._max = max; }
  // 풀에서 객체 획득
  acquire() {
    const obj = this._pool.length > 0 ? this._pool.pop() : this._factory();
    this._active.push(obj);
    return obj;
  }
  // 객체 반환
  release(obj) {
    for (let i = this._active.length - 1; i >= 0; i--) {
      if (this._active[i] === obj) { this._active.splice(i, 1); break; }
    }
    if (this._pool.length < this._max) this._pool.push(obj);
  }
  // 활성 객체 목록
  get active() { return this._active; }
  // 전체 반환
  releaseAll() {
    while (this._active.length > 0) {
      const obj = this._active.pop();
      if (this._pool.length < this._max) this._pool.push(obj);
    }
  }
}

// ========== EVENT MANAGER (listen/destroy, Cycle 3 확정) ==========
class EventManagerClass {
  constructor() { this._listeners = []; }
  // 이벤트 리스너 등록 + 추적
  listen(el, evt, fn, opts) {
    el.addEventListener(evt, fn, opts);
    this._listeners.push({ el, evt, fn, opts });
  }
  // 모든 리스너 제거
  destroy() {
    for (const l of this._listeners) l.el.removeEventListener(l.evt, l.fn, l.opts);
    this._listeners.length = 0;
  }
}

// ========== PARTICLE SYSTEM ==========
class ParticleSystemClass {
  constructor() {
    this._pool = new ObjectPool(() => ({
      x:0,y:0,vx:0,vy:0,life:0,maxLife:1,size:4,color:'#fff',
      type:'circle',text:'',alpha:1,gravity:0,scale:1
    }), 200);
  }
  // 파티클 생성
  emit(x, y, count, opts) {
    for (let i = 0; i < count; i++) {
      const p = this._pool.acquire();
      p.x = x; p.y = y;
      p.vx = (opts.vx || 0) + (Math.random() - 0.5) * (opts.spread || 60);
      p.vy = (opts.vy || -40) + (Math.random() - 0.5) * (opts.spread || 60);
      p.life = opts.life || 0.8;
      p.maxLife = p.life;
      p.size = opts.size || 4;
      p.color = opts.color || '#FFD700';
      p.type = opts.type || 'circle';
      p.text = opts.text || '';
      p.alpha = 1;
      p.gravity = opts.gravity !== undefined ? opts.gravity : 80;
      p.scale = opts.scale || 1;
    }
  }
  // 텍스트 파티클
  emitText(x, y, text, color, size, life) {
    const p = this._pool.acquire();
    p.x = x; p.y = y; p.vx = 0; p.vy = -50;
    p.life = life || 1.0; p.maxLife = p.life;
    p.size = size || 16; p.color = color || '#FFD700';
    p.type = 'text'; p.text = text; p.alpha = 1;
    p.gravity = 0; p.scale = 1;
  }
  // 매 프레임 업데이트
  update(dt) {
    const active = this._pool.active;
    for (let i = active.length - 1; i >= 0; i--) {
      const p = active[i];
      p.life -= dt;
      if (p.life <= 0) { this._pool.release(p); continue; }
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha = Math.max(0, p.life / p.maxLife);
    }
  }
  // 파티클 렌더링
  draw(ctx) {
    for (const p of this._pool.active) {
      ctx.globalAlpha = p.alpha;
      if (p.type === 'text') {
        ctx.font = `bold ${p.size}px "Segoe UI",sans-serif`;
        ctx.fillStyle = p.color;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      } else if (p.type === 'heart') {
        drawHeart(ctx, p.x, p.y, p.size, p.color);
      } else if (p.type === 'star') {
        drawStar(ctx, p.x, p.y, p.size, 5, p.color);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
  // 전체 제거
  clear() { this._pool.releaseAll(); }
}

// ========== AUDIO MANAGER (Web Audio API 절차적 생성, §9) ==========
class AudioManagerClass {
  constructor() {
    this._ctx = null; this._enabled = true; this._bgmInterval = null;
    this._bgmNodes = [];
  }
  // 오디오 컨텍스트 초기화 (사용자 인터랙션 후)
  init() {
    try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this._enabled = false; }
  }
  // 단일 톤 재생
  _tone(freq, dur, type, vol, freqEnd) {
    if (!this._enabled || !this._ctx) return;
    try {
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, this._ctx.currentTime);
      if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, this._ctx.currentTime + dur);
      gain.gain.setValueAtTime(vol || 0.15, this._ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + dur);
      osc.connect(gain); gain.connect(this._ctx.destination);
      osc.start(); osc.stop(this._ctx.currentTime + dur);
    } catch(e) {}
  }
  // 문 벨 "딩동"
  doorBell() { this._tone(800, 0.08, 'sine', 0.12); this._tone(600, 0.12, 'sine', 0.10, 500); }
  // 재료 추가 톡
  ingredientTap() { this._tone(400, 0.05, 'triangle', 0.1); }
  // 음료 완성 차임
  brewComplete() { this._tone(523, 0.1, 'sine', 0.12); this._tone(659, 0.1, 'sine', 0.10); this._tone(784, 0.15, 'sine', 0.10); }
  // 완벽 서빙 팡파레
  perfectServe() {
    this._tone(523, 0.15, 'sine', 0.1);
    this._tone(659, 0.15, 'sine', 0.1);
    this._tone(784, 0.2, 'sine', 0.12);
  }
  // 고객 이탈
  customerLeave() { this._tone(200, 0.2, 'sine', 0.1, 100); }
  // 골드 획득
  goldEarn() { this._tone(1000, 0.1, 'square', 0.08, 1200); }
  // 업그레이드
  upgrade() { this._tone(400, 0.3, 'sine', 0.1, 800); }
  // Day 종료 종소리
  dayEnd() { this._tone(600, 0.5, 'sine', 0.12); }
  // 버튼 클릭
  click() { this._tone(600, 0.03, 'triangle', 0.06); }
  // 에러
  error() { this._tone(150, 0.15, 'sawtooth', 0.08); }
}

// ========== 순수 함수 (§10, 전역 참조 0건) ==========

// 고객 타입 가중치 반환 (day 기반)
function getCustomerWeights(day, config) {
  if (day <= 5)  return { normal: 80, rushed: 15, vip: 0, regular: 5 };
  if (day <= 15) return { normal: 50, rushed: 25, vip: 15, regular: 10 };
  return { normal: 30, rushed: 30, vip: 25, regular: 15 };
}

// 가중치 기반 고객 타입 선택
function pickCustomerType(day, rng, config) {
  const w = getCustomerWeights(day, config);
  const total = w.normal + w.rushed + w.vip + w.regular;
  let r = rng * total;
  if ((r -= w.normal) < 0) return 'normal';
  if ((r -= w.rushed) < 0) return 'rushed';
  if ((r -= w.vip) < 0) return 'vip';
  return 'regular';
}

// 사용 가능한 메뉴 목록 반환
function getAvailableMenus(menuLevel) {
  return MENUS.filter(m => m.unlockLv <= menuLevel);
}

// 메뉴 레시피 반환
function getRecipe(menuId, config) {
  const m = MENUS.find(menu => menu.id === menuId);
  return m ? { steps: [...m.steps], price: m.price, name: m.name } : null;
}

// 제조 정확도 판정
function checkBrewAccuracy(inputSteps, recipeSteps) {
  if (inputSteps.length !== recipeSteps.length) return 'fail';
  let mistakes = 0;
  for (let i = 0; i < recipeSteps.length; i++) {
    if (inputSteps[i] !== recipeSteps[i]) mistakes++;
  }
  if (mistakes === 0) return 'perfect';
  if (mistakes === 1) return 'good';
  return 'fail';
}

// 서빙 수익 계산
function calcServingRevenue(menuPrice, accuracy, tipMultiplier, config) {
  let tipRate = config.TIP_NONE;
  if (accuracy === 'perfect') tipRate = config.TIP_PERFECT;
  else if (accuracy === 'good') tipRate = config.TIP_GOOD;
  return Math.floor(menuPrice * (1 + tipRate) * tipMultiplier);
}

// 만족도 업데이트
function updateSatisfaction(current, eventType, config) {
  let delta = 0;
  if (eventType === 'serve') delta = config.SATISFACTION_SERVE_BONUS;
  else if (eventType === 'perfect') delta = config.SATISFACTION_PERFECT_BONUS;
  else if (eventType === 'leave') delta = config.SATISFACTION_LEAVE_PENALTY;
  else if (eventType === 'overflow') delta = config.QUEUE_OVERFLOW_PENALTY;
  return Math.max(0, Math.min(100, current + delta));
}

// 만족도 효과 반환
function getSatisfactionEffect(satisfaction, config) {
  let mult = 1.0;
  if (satisfaction >= config.SATISFACTION_WORD_OF_MOUTH) mult = config.WORD_OF_MOUTH_MULT;
  else if (satisfaction <= config.SATISFACTION_BAD_REVIEW) mult = config.BAD_REVIEW_MULT;
  return { spawnMultiplier: mult };
}

// 바리스타 속도 반환
function getBaristaSpeed(level, config) {
  return config.BARISTA_SPEEDS[level] || 4;
}

// 일일 정산 계산
function calcDayResult(dayRevenues, dayExpenses) {
  const revenue = dayRevenues.reduce((s, v) => s + v, 0);
  const expense = dayExpenses.reduce((s, v) => s + v, 0);
  return { revenue, expense, profit: revenue - expense };
}

// 구매 가능 여부
function canAfford(gold, price) {
  return gold >= price;
}

// 업그레이드 적용 (새 shopData 반환)
function applyUpgrade(shopData, upgradeType, config) {
  const sd = { ...shopData };
  const prices = config.UPGRADE_PRICES[upgradeType];
  if (!prices) return sd;
  const currentLv = sd.upgrades[upgradeType] || 0;
  if (currentLv >= prices.length) return sd;
  const cost = prices[currentLv];
  if (sd.gold < cost) return sd;
  sd.gold -= cost;
  sd.upgrades = { ...sd.upgrades };
  sd.upgrades[upgradeType] = currentLv + 1;
  return sd;
}

// 최종 점수 계산 (§7)
function calcFinalScore(scoreData, config) {
  const score = scoreData.totalGold
    + (scoreData.perfectServes * 50)
    + (scoreData.shopsOpened * 2000)
    + Math.floor(scoreData.avgSatisfaction * 100)
    - (scoreData.customersLost * 30);
  let grade = 'C';
  if (score >= config.GRADE_S) grade = 'S';
  else if (score >= config.GRADE_A) grade = 'A';
  else if (score >= config.GRADE_B) grade = 'B';
  return { score, grade };
}

// 직렬화
function serializeState(shopData) {
  try { return JSON.stringify(shopData); } catch(e) { return null; }
}

// 역직렬화
function deserializeState(json) {
  try { return JSON.parse(json); } catch(e) { return null; }
}

// 스폰 간격 계산
function getSpawnInterval(day, satisfaction, config) {
  const base = Math.max(config.CUSTOMER_MIN_INTERVAL,
    config.CUSTOMER_BASE_INTERVAL - day * config.CUSTOMER_INTERVAL_DECAY);
  const effect = getSatisfactionEffect(satisfaction, config);
  return base / effect.spawnMultiplier;
}

// 아이들 수익 계산 (§8)
function calcIdleIncome(shopCount, interiorLv, config) {
  let income = 0;
  if (shopCount >= 2) income += config.SHOP2_IDLE_BASE * (1 + interiorLv * config.IDLE_INTERIOR_MULT);
  if (shopCount >= 3) income += config.SHOP3_IDLE_BASE * (1 + interiorLv * config.IDLE_INTERIOR_MULT);
  return Math.floor(income);
}

// ========== 도형 헬퍼 ==========

// 하트 그리기
function drawHeart(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  const s = size * 0.5;
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.1);
  ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

// 별 그리기
function drawStar(ctx, x, y, r, points, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI / points) - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.4;
    if (i === 0) ctx.moveTo(x + Math.cos(a) * rad, y + Math.sin(a) * rad);
    else ctx.lineTo(x + Math.cos(a) * rad, y + Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fill();
}

// 둥근 사각형
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 재료 아이콘 그리기 (3중 구분: 색상+도형+글자)
function drawIngredient(ctx, ing, x, y, size) {
  const s = size * 0.45;
  ctx.fillStyle = ing.color;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  switch (ing.shape) {
    case 'circle':
      ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); break;
    case 'diamond':
      ctx.beginPath(); ctx.moveTo(x, y - s); ctx.lineTo(x + s, y); ctx.lineTo(x, y + s); ctx.lineTo(x - s, y); ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 'triangle':
      ctx.beginPath(); ctx.moveTo(x, y - s); ctx.lineTo(x + s, y + s * 0.7); ctx.lineTo(x - s, y + s * 0.7); ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 'square':
      ctx.fillRect(x - s, y - s, s * 2, s * 2); ctx.strokeRect(x - s, y - s, s * 2, s * 2); break;
    case 'hex':
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 - Math.PI / 6;
        if (i === 0) ctx.moveTo(x + Math.cos(a) * s, y + Math.sin(a) * s);
        else ctx.lineTo(x + Math.cos(a) * s, y + Math.sin(a) * s);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 'star':
      drawStar(ctx, x, y, s, 5, ing.color); ctx.strokeStyle = '#333'; break;
  }
  ctx.fillStyle = '#333';
  ctx.font = `bold ${size * 0.35}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ing.label, x, y + 1);
}

// 커피컵 그리기
function drawCup(ctx, x, y, w, h, fillLevel, liquidColor) {
  // 컵 몸체 (사다리꼴)
  ctx.fillStyle = '#FFFFFF';
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - w * 0.4, y - h * 0.4);
  ctx.lineTo(x + w * 0.4, y - h * 0.4);
  ctx.lineTo(x + w * 0.35, y + h * 0.4);
  ctx.lineTo(x - w * 0.35, y + h * 0.4);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 액체
  if (fillLevel > 0) {
    const lh = h * 0.7 * Math.min(fillLevel, 1);
    ctx.fillStyle = liquidColor || '#6F4E37';
    ctx.beginPath();
    const by = y + h * 0.35;
    const ty = by - lh;
    const bw = w * 0.33;
    const tw = w * 0.33 + (w * 0.07) * (lh / (h * 0.7));
    ctx.moveTo(x - bw, by);
    ctx.lineTo(x + bw, by);
    ctx.lineTo(x + tw, ty);
    ctx.lineTo(x - tw, ty);
    ctx.closePath();
    ctx.fill();
  }
  // 손잡이
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + w * 0.45, y, h * 0.2, -Math.PI * 0.3, Math.PI * 0.3);
  ctx.stroke();
}

// 고객 캐릭터 그리기
function drawCustomer(ctx, x, y, typeColor, happy, scale) {
  const sc = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(sc, sc);
  // 몸통
  ctx.fillStyle = typeColor;
  roundRect(ctx, -12, -5, 24, 30, 6);
  ctx.fill();
  // 머리
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(0, -16, 11, 0, Math.PI * 2);
  ctx.fill();
  // 눈
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-4, -18, 2, 0, Math.PI * 2);
  ctx.arc(4, -18, 2, 0, Math.PI * 2);
  ctx.fill();
  // 입
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (happy) {
    ctx.arc(0, -13, 4, 0, Math.PI);
  } else {
    ctx.arc(0, -10, 4, Math.PI, 0);
  }
  ctx.stroke();
  ctx.restore();
}

// 주문 말풍선 그리기
function drawOrderBubble(ctx, x, y, recipe, progress) {
  const steps = recipe.steps;
  const bw = 30 + steps.length * 28;
  const bh = 36;
  // 말풍선 배경
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  roundRect(ctx, x - bw / 2, y - bh - 8, bw, bh, 8);
  ctx.fill(); ctx.stroke();
  // 꼬리
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.moveTo(x - 5, y - 8);
  ctx.lineTo(x + 5, y - 8);
  ctx.lineTo(x, y);
  ctx.closePath();
  ctx.fill();
  // 재료 아이콘
  const startX = x - (steps.length - 1) * 14;
  for (let i = 0; i < steps.length; i++) {
    const ing = INGREDIENTS.find(ig => ig.id === steps[i]);
    if (!ing) continue;
    const ix = startX + i * 28;
    const iy = y - bh / 2 - 8;
    if (i < progress) {
      ctx.globalAlpha = 0.3;
      drawIngredient(ctx, ing, ix, iy, 22);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#27AE60';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ix - 5, iy); ctx.lineTo(ix - 1, iy + 4); ctx.lineTo(ix + 6, iy - 4);
      ctx.stroke();
    } else {
      drawIngredient(ctx, ing, ix, iy, 22);
    }
  }
}

// ========== localStorage (try-catch, §7) ==========
const SAVE_KEY = 'mini-coffee-tycoon-save';
const BEST_KEY = 'mini-coffee-tycoon-best';

function saveGame(sd) {
  try { localStorage.setItem(SAVE_KEY, serializeState(sd)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? deserializeState(raw) : null;
  } catch(e) { return null; }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function saveBest(score) {
  try {
    const prev = parseInt(localStorage.getItem(BEST_KEY)) || 0;
    if (score > prev) localStorage.setItem(BEST_KEY, String(score));
  } catch(e) {}
}

function getBest() {
  try { return parseInt(localStorage.getItem(BEST_KEY)) || 0; } catch(e) { return 0; }
}

// ========== TransitionGuard (§5.2) ==========
function beginTransition(targetState) {
  if (isTransitioning) return;
  if (STATE_PRIORITY[targetState] < STATE_PRIORITY[state] && state !== 'PAUSED') return;
  isTransitioning = true;
  overlay.alpha = 0;
  tw.add(overlay, { alpha: 1 }, 0.3, 'easeOutQuad', () => {
    enterState(targetState);
    tw.add(overlay, { alpha: 0 }, 0.3, 'easeOutQuad', () => {
      isTransitioning = false;
    });
  });
}

// ========== enterState (§5.2, Cycle 5 확정) ==========
function enterState(newState) {
  const prev = state;
  state = newState;

  switch (newState) {
    case 'LOADING':
      break;

    case 'TITLE':
      tw.clearImmediate();
      particles.clear();
      titleAnim = { t: 0, cupY: 0, steamAlpha: 0 };
      break;

    case 'PLAYING':
      tw.clearImmediate();
      if (prev === 'UPGRADE' || prev === 'TITLE') {
        startDay(shopData);
      }
      break;

    case 'DAY_END':
      tw.clearImmediate();
      audio.dayEnd();
      // 바리스타 일급 계산
      if (shopData.baristaHired) {
        const bLv = shopData.upgrades.barista;
        const wage = CONFIG.BARISTA_DAILY_WAGE[Math.min(bLv, 2)];
        shopData.dayExpenses.push(wage);
      }
      // 아이들 수익
      const idleIncome = calcIdleIncome(shopData.shopCount, shopData.upgrades.interior, CONFIG);
      if (idleIncome > 0) {
        shopData.dayRevenues.push(idleIncome);
        shopData.gold += idleIncome;
        shopData.totalGold += idleIncome;
      }
      dayResult = calcDayResult(shopData.dayRevenues, shopData.dayExpenses);
      shopData.gold = Math.max(0, shopData.gold - dayResult.expense);
      shopData.satisfactionHistory.push(shopData.satisfaction);
      if (shopData.satisfaction <= 0) shopData.zeroSatisfactionDays++;
      else shopData.zeroSatisfactionDays = 0;
      saveGame(shopData);
      // 정산 애니메이션
      dayResultAnim = { alpha: 0, slideY: 30 };
      tw.add(dayResultAnim, { alpha: 1, slideY: 0 }, 0.6, 'easeOutBack', () => {
        // 2초 지연 후 전환 (tween onComplete 방식)
        const delayObj = { t: 0 };
        tw.add(delayObj, { t: 1 }, 2.0, 'linear', () => {
          if (state !== 'DAY_END') return;
          // 승리/게임오버 판정 먼저
          if (shopData.day >= 30) {
            beginTransition('VICTORY');
          } else if (shopData.zeroSatisfactionDays >= 3) {
            beginTransition('VICTORY');
          } else {
            beginTransition('UPGRADE');
          }
        });
      });
      break;

    case 'UPGRADE':
      tw.clearImmediate();
      upgradeCategory = 0;
      customerPool.releaseAll();
      brewState = { active: false, customerRef: null, inputSteps: [], recipe: null };
      baristaState = { busy: false, timer: 0, targetCustomer: null, x: 0, y: 0 };
      break;

    case 'PAUSED':
      break;

    case 'VICTORY':
      tw.clearImmediate();
      scoreData = createScoreData(shopData);
      const result = calcFinalScore(scoreData, CONFIG);
      scoreData.finalScore = result.score;
      scoreData.grade = result.grade;
      // 판정 먼저, 저장 나중에 (Cycle 2 B4)
      saveBest(result.score);
      clearSave();
      // 축하 파티클
      for (let i = 0; i < 30; i++) {
        const px = W * 0.2 + Math.random() * W * 0.6;
        particles.emit(px, H * 0.3, 1, {
          vy: -120 - Math.random() * 80, spread: 100, life: 1.5 + Math.random(),
          color: ['#FFD700','#FF6B6B','#6BCB77','#4D96FF','#FF6B6B'][Math.floor(Math.random()*5)],
          size: 3 + Math.random() * 4, type: 'star', gravity: 60
        });
      }
      break;
  }
}

// ========== 고객 관리 ==========
function getMaxSeats(seatLevel) {
  return CONFIG.SEAT_COUNTS[Math.min(seatLevel, CONFIG.SEAT_COUNTS.length - 1)];
}

function getSeatPositions(maxSeats, shopAreaX, shopAreaY, shopAreaW, shopAreaH) {
  const positions = [];
  const counterY = shopAreaY + shopAreaH * 0.55;
  for (let i = 0; i < maxSeats; i++) {
    positions.push({
      x: shopAreaX + shopAreaW * 0.12 + (i % 4) * (shopAreaW * 0.2),
      y: counterY + 30 + Math.floor(i / 4) * 40
    });
  }
  return positions;
}

function spawnCustomerIfNeeded(sd, dt) {
  sd.spawnTimer -= dt;
  if (sd.spawnTimer > 0) return;

  const maxSeats = getMaxSeats(sd.upgrades.seat);
  const occupied = customerPool.active.filter(c => c.state !== 'leaving').length;

  if (occupied >= maxSeats) {
    sd.spawnTimer = 1;
    // 대기열 초과
    if (Math.random() < 0.3) {
      sd.satisfaction = updateSatisfaction(sd.satisfaction, 'overflow', CONFIG);
    }
    return;
  }

  const interval = getSpawnInterval(sd.day, sd.satisfaction, CONFIG);
  sd.spawnTimer = interval;

  const type = pickCustomerType(sd.day, Math.random(), CONFIG);
  const typeData = CUSTOMER_TYPES[type];
  const menus = getAvailableMenus(sd.upgrades.menu);
  const premiumMenus = menus.filter(m => m.price >= 25);
  const basicMenus = menus.filter(m => m.price < 25);
  let selectedMenu;
  if (type === 'vip' && premiumMenus.length > 0) {
    selectedMenu = premiumMenus[Math.floor(Math.random() * premiumMenus.length)];
  } else {
    selectedMenu = menus[Math.floor(Math.random() * menus.length)];
  }

  const shopArea = getShopArea();
  const seatPositions = getSeatPositions(maxSeats, shopArea.x, shopArea.y, shopArea.w, shopArea.h);
  // 빈 좌석 찾기
  const occupiedSeats = new Set(customerPool.active.filter(c => c.seatIndex >= 0).map(c => c.seatIndex));
  let freeSeatIdx = -1;
  for (let i = 0; i < maxSeats; i++) {
    if (!occupiedSeats.has(i)) { freeSeatIdx = i; break; }
  }
  if (freeSeatIdx < 0) return;

  const c = customerPool.acquire();
  c.type = type;
  c.x = shopArea.x - 30;
  c.y = seatPositions[freeSeatIdx].y;
  c.targetX = seatPositions[freeSeatIdx].x;
  c.seatIndex = freeSeatIdx;
  c.patience = typeData.patience;
  c.maxPatience = typeData.patience;
  c.menuId = selectedMenu.id;
  c.recipe = getRecipe(selectedMenu.id, CONFIG);
  c.state = 'entering';
  c.served = false;
  c.happy = true;
  c.alpha = 1;
  c.scale = 1;

  audio.doorBell();
}

function updateCustomers(sd, dt) {
  const active = customerPool.active;
  for (let i = active.length - 1; i >= 0; i--) {
    const c = active[i];

    switch (c.state) {
      case 'entering':
        c.x += (c.targetX - c.x) * 0.08;
        if (Math.abs(c.x - c.targetX) < 2) {
          c.x = c.targetX;
          c.state = 'waiting';
        }
        break;

      case 'waiting':
        c.patience -= dt;
        if (c.patience <= 0) {
          c.state = 'leaving';
          c.happy = false;
          sd.satisfaction = updateSatisfaction(sd.satisfaction, 'leave', CONFIG);
          sd.customersLost++;
          audio.customerLeave();
          particles.emitText(c.x, c.y - 40, '💢', '#E74C3C', 20, 0.8);
          // 제조 중이던 고객이면 제조 취소
          if (brewState.customerRef === c) {
            brewState = { active: false, customerRef: null, inputSteps: [], recipe: null };
          }
        }
        break;

      case 'served':
        c.patience = 99;
        // 기쁨 표현 후 떠남
        const serveDelay = { t: 0 };
        c.state = 'happy_wait';
        tw.add(serveDelay, { t: 1 }, 0.8, 'linear', () => {
          if (c.state === 'happy_wait') c.state = 'leaving';
        });
        break;

      case 'happy_wait':
        break;

      case 'leaving':
        const shopArea = getShopArea();
        c.x += (shopArea.x + shopArea.w + 50 - c.x) * 0.06;
        c.alpha -= dt * 2;
        if (c.alpha <= 0 || c.x > shopArea.x + shopArea.w + 40) {
          customerPool.release(c);
        }
        break;
    }
  }
}

// ========== 바리스타 AI (§6.3) ==========
function updateBaristaAI(sd, dt) {
  if (!sd.baristaHired) return;
  const baristaLv = Math.min(sd.upgrades.barista, 2);
  const baristaSpeed = getBaristaSpeed(baristaLv, CONFIG);
  const maxMenuAccess = CONFIG.BARISTA_MENU_ACCESS[baristaLv];

  if (baristaState.busy) {
    baristaState.timer -= dt * CONFIG.MACHINE_SPEED_MULT[Math.min(sd.upgrades.machine, 3)];
    if (baristaState.timer <= 0) {
      baristaState.busy = false;
      const tc = baristaState.targetCustomer;
      if (tc && tc.state === 'waiting') {
        // 바리스타 서빙 (팁 25%, Lv3이면 35%)
        let tipRate = CONFIG.TIP_GOOD;
        if (baristaLv >= 2) tipRate += CONFIG.BARISTA_TIP_BONUS_LV3;
        const typeData = CUSTOMER_TYPES[tc.type];
        const revenue = calcServingRevenue(tc.recipe.price, 'good', typeData.tipMult, CONFIG);
        sd.gold += revenue;
        sd.totalGold += revenue;
        sd.totalServed++;
        sd.dayRevenues.push(revenue);
        sd.satisfaction = updateSatisfaction(sd.satisfaction, 'serve', CONFIG);
        tc.state = 'served';
        tc.served = true;
        tc.happy = true;
        audio.goldEarn();
        particles.emitText(tc.x, tc.y - 50, `+₩${revenue}`, '#FFD700', 14, 1.0);
        particles.emit(tc.x, tc.y - 20, 3, { vy: -40, spread: 30, life: 0.6, color: '#FF69B4', type: 'heart', size: 6, gravity: 20 });
      }
      baristaState.targetCustomer = null;
    }
    return;
  }

  // 가장 오래 기다린 고객 찾기
  const waiting = customerPool.active
    .filter(c => c.state === 'waiting' && !c.served && c !== brewState.customerRef)
    .filter(c => {
      const menuIdx = MENUS.findIndex(m => m.id === c.menuId);
      return menuIdx < maxMenuAccess;
    })
    .sort((a, b) => a.patience - b.patience);

  if (waiting.length > 0) {
    baristaState.busy = true;
    baristaState.timer = baristaSpeed;
    baristaState.targetCustomer = waiting[0];
  }
}

// ========== 제조 시스템 ==========
function selectCustomerForBrew(customer) {
  if (brewState.active) return;
  if (customer.state !== 'waiting' || customer.served) return;
  if (baristaState.targetCustomer === customer) return;
  brewState.active = true;
  brewState.customerRef = customer;
  brewState.inputSteps = [];
  brewState.recipe = customer.recipe;
  audio.click();
}

function addIngredient(ingredientId, sd) {
  if (!brewState.active || !brewState.recipe) return;
  if (brewState.inputSteps.length >= brewState.recipe.steps.length) return;
  brewState.inputSteps.push(ingredientId);
  audio.ingredientTap();

  // 자동 완성 체크 (모든 단계 입력 완료)
  if (brewState.inputSteps.length >= brewState.recipe.steps.length) {
    completeBrew(sd);
  }
}

function completeBrew(sd) {
  if (!brewState.active || !brewState.recipe) return;
  const c = brewState.customerRef;
  if (!c || c.state !== 'waiting') {
    brewState = { active: false, customerRef: null, inputSteps: [], recipe: null };
    return;
  }

  const accuracy = checkBrewAccuracy(brewState.inputSteps, brewState.recipe.steps);
  const typeData = CUSTOMER_TYPES[c.type];
  const machineMultForAccuracy = CONFIG.MACHINE_SPEED_MULT[Math.min(sd.upgrades.machine, 3)];
  const revenue = calcServingRevenue(brewState.recipe.price, accuracy, typeData.tipMult, CONFIG);

  sd.gold += revenue;
  sd.totalGold += revenue;
  sd.totalServed++;
  sd.dayRevenues.push(revenue);

  if (accuracy === 'perfect') {
    sd.satisfaction = updateSatisfaction(sd.satisfaction, 'perfect', CONFIG);
    sd.perfectServes++;
    audio.perfectServe();
    particles.emitText(c.x, c.y - 60, '★ PERFECT!', '#FFD700', 18, 1.2);
    particles.emit(c.x, c.y - 30, 8, { vy: -60, spread: 80, life: 0.8, color: '#FFD700', type: 'star', size: 5, gravity: 40 });
  } else if (accuracy === 'good') {
    sd.satisfaction = updateSatisfaction(sd.satisfaction, 'serve', CONFIG);
    audio.brewComplete();
    particles.emitText(c.x, c.y - 60, 'GOOD!', '#27AE60', 16, 1.0);
  } else {
    audio.error();
    particles.emitText(c.x, c.y - 60, 'MISS...', '#E74C3C', 14, 0.8);
  }

  particles.emitText(c.x, c.y - 45, `+₩${revenue}`, '#FFD700', 14, 1.0);
  audio.goldEarn();
  particles.emit(c.x, c.y - 20, 3, { vy: -40, spread: 30, life: 0.6, color: '#FF69B4', type: 'heart', size: 6, gravity: 20 });

  c.state = 'served';
  c.served = true;
  c.happy = accuracy !== 'fail';
  brewState = { active: false, customerRef: null, inputSteps: [], recipe: null };
}

// ========== 레이아웃 계산 ==========
function getShopArea() {
  const margin = Math.min(W * 0.03, 16);
  const hudH = Math.min(H * 0.08, 48);
  const brewH = Math.min(H * 0.25, 160);
  return {
    x: margin,
    y: hudH + 8,
    w: W - margin * 2,
    h: H - hudH - brewH - 24,
    hudH: hudH,
    brewY: H - brewH - 4,
    brewH: brewH
  };
}

function getIngredientSlotRects() {
  const area = getShopArea();
  const slotSize = Math.min(56, (area.w - 80) / 6 - 4, area.brewH * 0.4);
  const totalW = 6 * (slotSize + 6);
  const startX = (W - totalW) / 2;
  const y = area.brewY + area.brewH * 0.55;
  const rects = [];
  for (let i = 0; i < 6; i++) {
    rects.push({
      x: startX + i * (slotSize + 6),
      y: y - slotSize / 2,
      w: slotSize,
      h: slotSize,
      ing: INGREDIENTS[i]
    });
  }
  return rects;
}

function getServeButtonRect() {
  const area = getShopArea();
  const bw = Math.min(120, W * 0.25);
  const bh = Math.min(36, area.brewH * 0.2);
  return { x: W / 2 - bw / 2, y: area.brewY + area.brewH * 0.82 - bh / 2, w: bw, h: bh };
}

function getNextDayButtonRect() {
  return { x: W / 2 - 80, y: H * 0.78, w: 160, h: 44 };
}

// ========== 업그레이드 UI ==========
function getUpgradeItems(category, sd) {
  const items = [];
  switch (category) {
    case 'menu': {
      const lv = sd.upgrades.menu;
      const prices = CONFIG.UPGRADE_PRICES.menu;
      if (lv < prices.length) {
        items.push({ key: 'menu', name: `메뉴 확장 Lv${lv + 1}`, desc: `${lv + 2}종 메뉴 해금`, cost: prices[lv], affordable: sd.gold >= prices[lv] });
      } else {
        items.push({ key: 'menu', name: '메뉴 MAX', desc: '6종 메뉴 해금 완료', cost: 0, affordable: false, maxed: true });
      }
      break;
    }
    case 'seat': {
      const lv = sd.upgrades.seat;
      const prices = CONFIG.UPGRADE_PRICES.seat;
      if (lv < prices.length) {
        items.push({ key: 'seat', name: `좌석 확장 Lv${lv + 1}`, desc: `좌석 ${CONFIG.SEAT_COUNTS[Math.min(lv + 1, 3)]}개`, cost: prices[lv], affordable: sd.gold >= prices[lv] });
      } else {
        items.push({ key: 'seat', name: '좌석 MAX', desc: '좌석 8개 완료', cost: 0, affordable: false, maxed: true });
      }
      break;
    }
    case 'machine': {
      const lv = sd.upgrades.machine;
      const prices = CONFIG.UPGRADE_PRICES.machine;
      if (lv < prices.length) {
        items.push({ key: 'machine', name: `머신 업그레이드 Lv${lv + 1}`, desc: `제조 속도 +${(lv + 1) * 20}%`, cost: prices[lv], affordable: sd.gold >= prices[lv] });
      } else {
        items.push({ key: 'machine', name: '머신 MAX', desc: '최대 속도 달성', cost: 0, affordable: false, maxed: true });
      }
      break;
    }
    case 'barista': {
      const lv = sd.upgrades.barista;
      if (!sd.baristaHired) {
        items.push({ key: 'barista', name: '바리스타 고용', desc: '기본 메뉴 자동 제조', cost: CONFIG.UPGRADE_PRICES.barista[0], affordable: sd.gold >= CONFIG.UPGRADE_PRICES.barista[0], hireAction: true });
      } else {
        const prices = CONFIG.UPGRADE_PRICES.barista;
        if (lv < prices.length) {
          items.push({ key: 'barista', name: `바리스타 Lv${lv + 1}`, desc: `메뉴 ${CONFIG.BARISTA_MENU_ACCESS[Math.min(lv + 1, 2)]}종 자동, 속도 ${CONFIG.BARISTA_SPEEDS[Math.min(lv + 1, 2)]}초`, cost: prices[lv], affordable: sd.gold >= prices[lv] });
        } else {
          items.push({ key: 'barista', name: '바리스타 MAX', desc: '마스터 바리스타', cost: 0, affordable: false, maxed: true });
        }
      }
      break;
    }
    case 'interior': {
      const lv = sd.upgrades.interior;
      const prices = CONFIG.UPGRADE_PRICES.interior;
      const names = ['노점', '카페', '프리미엄', '프랜차이즈'];
      if (lv < prices.length) {
        items.push({ key: 'interior', name: `인테리어 → ${names[Math.min(lv + 1, 3)]}`, desc: '분위기 업그레이드', cost: prices[lv], affordable: sd.gold >= prices[lv] });
      } else {
        items.push({ key: 'interior', name: '인테리어 MAX', desc: '프랜차이즈 완료', cost: 0, affordable: false, maxed: true });
      }
      break;
    }
    case 'shop': {
      if (sd.shopCount < 2 && sd.day >= 15) {
        items.push({ key: 'shop2', name: '2호점 오픈', desc: `아이들 수익 ${CONFIG.SHOP2_IDLE_BASE}₩/일`, cost: CONFIG.UPGRADE_PRICES.shop2[0], affordable: sd.gold >= CONFIG.UPGRADE_PRICES.shop2[0] });
      } else if (sd.shopCount === 2 && sd.day >= 25) {
        items.push({ key: 'shop3', name: '3호점 오픈', desc: `아이들 수익 ${CONFIG.SHOP3_IDLE_BASE}₩/일`, cost: CONFIG.UPGRADE_PRICES.shop3[0], affordable: sd.gold >= CONFIG.UPGRADE_PRICES.shop3[0] });
      } else if (sd.shopCount >= 3) {
        items.push({ key: 'shop', name: '매장 확장 완료', desc: '3호점 운영 중', cost: 0, affordable: false, maxed: true });
      } else {
        const reqDay = sd.shopCount < 2 ? 15 : 25;
        items.push({ key: 'shop', name: `매장 확장 (Day ${reqDay}+)`, desc: '아직 해금되지 않음', cost: 0, affordable: false, locked: true });
      }
      break;
    }

  return items;
}

function purchaseUpgrade(itemKey, sd) {
  if (itemKey === 'shop2') {
    if (sd.gold >= CONFIG.UPGRADE_PRICES.shop2[0]) {
      sd.gold -= CONFIG.UPGRADE_PRICES.shop2[0];
      sd.shopCount = 2;
      sd.upgrades.shop2 = 1;
      audio.upgrade();
      particles.emit(W / 2, H / 2, 20, { vy: -80, spread: 120, life: 1.2, color: '#FFD700', type: 'star', size: 5, gravity: 50 });
      return true;
    }
  } else if (itemKey === 'shop3') {
    if (sd.gold >= CONFIG.UPGRADE_PRICES.shop3[0]) {
      sd.gold -= CONFIG.UPGRADE_PRICES.shop3[0];
      sd.shopCount = 3;
      sd.upgrades.shop3 = 1;
      audio.upgrade();
      particles.emit(W / 2, H / 2, 30, { vy: -100, spread: 150, life: 1.5, color: '#FFD700', type: 'star', size: 6, gravity: 50 });
      return true;
    }
  } else if (itemKey === 'barista' && !sd.baristaHired) {
    if (sd.gold >= CONFIG.UPGRADE_PRICES.barista[0]) {
      sd.gold -= CONFIG.UPGRADE_PRICES.barista[0];
      sd.baristaHired = true;
      sd.upgrades.barista = 1;
      audio.upgrade();
      particles.emit(W / 2, H / 2, 15, { vy: -60, spread: 80, life: 1.0, color: '#4A7C59', type: 'star', size: 4, gravity: 40 });
      return true;
    }
  } else {
    const prices = CONFIG.UPGRADE_PRICES[itemKey];
    if (!prices) return false;
    const lv = sd.upgrades[itemKey] || 0;
    if (lv >= prices.length) return false;
    if (sd.gold < prices[lv]) return false;
    sd.gold -= prices[lv];
    sd.upgrades[itemKey] = lv + 1;
    audio.upgrade();
    particles.emit(W / 2, H / 2, 12, { vy: -60, spread: 80, life: 0.8, color: '#3498DB', type: 'star', size: 4, gravity: 40 });
    return true;
  }
  return false;
}

// ========== 렌더링 ==========

// 인테리어 레벨에 따른 배경 렌더링
function drawShopBackground(ctx, area, interiorLv) {
  const { x, y, w, h } = area;
  // 벽
  const wallColors = ['#FFF8F0', '#FAF0E6', '#FDF5E6', '#F5E6CC'];
  ctx.fillStyle = wallColors[Math.min(interiorLv, 3)];
  ctx.fillRect(x, y, w, h * 0.6);

  // 바닥
  const floorY = y + h * 0.6;
  const floorH = h * 0.4;
  if (interiorLv <= 1) {
    ctx.fillStyle = interiorLv === 0 ? '#D4A574' : '#C4956A';
    ctx.fillRect(x, floorY, w, floorH);
    // 나무 무늬 (Lv1+ 타일패턴)
    if (interiorLv >= 1) {
      ctx.strokeStyle = 'rgba(139,105,20,0.15)';
      ctx.lineWidth = 1;
      for (let fx = x; fx < x + w; fx += 40) {
        ctx.beginPath(); ctx.moveTo(fx, floorY); ctx.lineTo(fx, floorY + floorH); ctx.stroke();
      }
    }
  } else if (interiorLv === 2) {
    // 체커보드
    const tileSize = 25;
    for (let ty = floorY; ty < floorY + floorH; ty += tileSize) {
      for (let tx = x; tx < x + w; tx += tileSize) {
        const ci = (Math.floor((tx - x) / tileSize) + Math.floor((ty - floorY) / tileSize)) % 2;
        ctx.fillStyle = ci === 0 ? '#D4A574' : '#E8D5B7';
        ctx.fillRect(tx, ty, tileSize, tileSize);
      }
    }
  } else {
    // 대리석 패턴 (Lv3+)
    const grad = ctx.createLinearGradient(x, floorY, x + w, floorY + floorH);
    grad.addColorStop(0, '#E8DCC8');
    grad.addColorStop(0.3, '#F0E6D4');
    grad.addColorStop(0.7, '#E0D4C0');
    grad.addColorStop(1, '#E8DCC8');
    ctx.fillStyle = grad;
    ctx.fillRect(x, floorY, w, floorH);
    ctx.strokeStyle = 'rgba(180,160,130,0.2)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(x + Math.random() * w, floorY);
      ctx.quadraticCurveTo(x + Math.random() * w, floorY + floorH * 0.5, x + Math.random() * w, floorY + floorH);
      ctx.stroke();
    }
  }

  // 벽 장식 (Lv 2+)
  if (interiorLv >= 1) {
    // 식물
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath();
    ctx.arc(x + w * 0.9, y + h * 0.15, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(x + w * 0.9 - 3, y + h * 0.15 + 10, 6, 15);
    ctx.fillStyle = '#795548';
    ctx.fillRect(x + w * 0.9 - 8, y + h * 0.15 + 23, 16, 8);
  }
  if (interiorLv >= 2) {
    // 벽 액자
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + w * 0.3, y + 12, 40, 30);
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(x + w * 0.3 + 3, y + 15, 34, 24);
    // 조명
    ctx.fillStyle = '#FFF3C4';
    ctx.beginPath();
    ctx.moveTo(x + w * 0.5 - 15, y + 2);
    ctx.lineTo(x + w * 0.5 + 15, y + 2);
    ctx.lineTo(x + w * 0.5 + 10, y + 18);
    ctx.lineTo(x + w * 0.5 - 10, y + 18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFC107';
    ctx.fillRect(x + w * 0.5 - 1, y, 2, 4);
  }
  if (interiorLv >= 3) {
    // 샹들리에
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x + w * 0.5, y + 10, 4, 0, Math.PI * 2);
    ctx.fill();
    for (let ci = 0; ci < 5; ci++) {
      const ca = (ci / 5) * Math.PI + Math.PI * 0.1;
      ctx.strokeStyle = '#DAA520';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.5, y + 10);
      ctx.lineTo(x + w * 0.5 + Math.cos(ca) * 20, y + 10 + Math.sin(ca) * 12);
      ctx.stroke();
      ctx.fillStyle = '#FFFACD';
      ctx.beginPath();
      ctx.arc(x + w * 0.5 + Math.cos(ca) * 22, y + 10 + Math.sin(ca) * 14, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 카운터
  const counterY = y + h * 0.5;
  const counterH = h * 0.07;
  ctx.fillStyle = '#8B6914';
  roundRect(ctx, x + w * 0.05, counterY, w * 0.7, counterH, 3);
  ctx.fill();
  ctx.fillStyle = '#A0801E';
  ctx.fillRect(x + w * 0.05, counterY, w * 0.7, counterH * 0.4);

  // 에스프레소 머신
  const mx = x + w * 0.82;
  const my = counterY - 50;
  ctx.fillStyle = '#C0C0C0';
  roundRect(ctx, mx - 25, my, 50, 50, 5);
  ctx.fill();
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx - 25, my, 50, 50);
  // 다이얼
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(mx - 8, my + 15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + 10, my + 15, 5, 0, Math.PI * 2); ctx.fill();
  // 물받이
  ctx.fillStyle = '#888';
  ctx.fillRect(mx - 15, my + 38, 30, 8);
  // 브랜드
  ctx.fillStyle = '#666';
  ctx.font = `bold ${8}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('COFFEE', mx, my + 30);

  return { counterY, machineX: mx, machineY: my };
}

// 좌석 그리기
function drawSeats(ctx, seatPositions, area) {
  for (let i = 0; i < seatPositions.length; i++) {
    const sp = seatPositions[i];
    ctx.fillStyle = '#8B7355';
    roundRect(ctx, sp.x - 12, sp.y - 6, 24, 16, 4);
    ctx.fill();
    // 다리
    ctx.fillStyle = '#6B5B45';
    ctx.fillRect(sp.x - 10, sp.y + 10, 4, 8);
    ctx.fillRect(sp.x + 6, sp.y + 10, 4, 8);
  }
}

// HUD 렌더링
function drawHUD(ctx, sd) {
  const area = getShopArea();
  const hudH = area.hudH;
  const pad = 8;

  // HUD 배경
  ctx.fillStyle = 'rgba(44,44,44,0.9)';
  roundRect(ctx, 4, 4, W - 8, hudH - 4, 8);
  ctx.fill();

  ctx.textBaseline = 'middle';
  const cy = hudH / 2 + 2;

  // Day
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${Math.min(16, hudH * 0.35)}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`Day ${sd.day}/30`, pad + 6, cy);

  // Gold
  ctx.fillStyle = '#FFD700';
  drawStar(ctx, pad + 110, cy, 8, 5, '#FFD700');
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(15, hudH * 0.33)}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`₩${sd.gold}`, pad + 122, cy);

  // 만족도
  const satX = W * 0.45;
  const satW = Math.min(100, W * 0.15);
  drawHeart(ctx, satX - 12, cy - 3, 10, sd.satisfaction > 50 ? '#27AE60' : sd.satisfaction > 25 ? '#F39C12' : '#E74C3C');
  ctx.fillStyle = '#555';
  roundRect(ctx, satX, cy - 5, satW, 10, 5);
  ctx.fill();
  const satFill = Math.max(0, sd.satisfaction / 100);
  ctx.fillStyle = sd.satisfaction > 50 ? '#27AE60' : sd.satisfaction > 25 ? '#F39C12' : '#E74C3C';
  if (satFill > 0) {
    roundRect(ctx, satX, cy - 5, satW * satFill, 10, 5);
    ctx.fill();
  }
  ctx.fillStyle = '#FFF';
  ctx.font = `${Math.min(11, hudH * 0.24)}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(sd.satisfaction)}%`, satX + satW / 2, cy);

  // Day 타이머
  const timeX = W * 0.72;
  const timeW = Math.min(120, W * 0.2);
  const timeFill = Math.max(0, sd.dayTimer / CONFIG.DAY_DURATION);
  ctx.fillStyle = '#333';
  roundRect(ctx, timeX, cy - 5, timeW, 10, 5);
  ctx.fill();
  const timeColor = timeFill > 0.3 ? '#3498DB' : '#E74C3C';
  ctx.fillStyle = timeColor;
  if (timeFill > 0) {
    roundRect(ctx, timeX, cy - 5, timeW * timeFill, 10, 5);
    ctx.fill();
  }
  ctx.fillStyle = '#FFF';
  ctx.font = `${Math.min(11, hudH * 0.24)}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(sd.dayTimer)}s`, timeX + timeW / 2, cy);

  // 매장 아이콘 (2호점+)
  if (sd.shopCount >= 2) {
    const sx = W - 60;
    ctx.fillStyle = '#D4A574';
    ctx.fillRect(sx, cy - 10, 14, 12);
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.moveTo(sx - 3, cy - 10);
    ctx.lineTo(sx + 7, cy - 18);
    ctx.lineTo(sx + 17, cy - 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `${9}px "Segoe UI",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`×${sd.shopCount}`, sx + 7, cy + 10);
  }
}

// 제조 UI 렌더링
function drawBrewPanel(ctx, sd) {
  const area = getShopArea();
  const { brewY, brewH } = area;

  // 패널 배경
  ctx.fillStyle = 'rgba(44,44,44,0.92)';
  roundRect(ctx, 4, brewY, W - 8, brewH - 4, 10);
  ctx.fill();

  // 현재 제조 상태
  if (brewState.active && brewState.recipe) {
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${Math.min(14, brewH * 0.1)}px "Segoe UI",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`제조 중: ${brewState.recipe.name}`, W / 2, brewY + brewH * 0.15);

    // 진행 표시
    const steps = brewState.recipe.steps;
    const pw = Math.min(260, W * 0.6);
    const startPX = W / 2 - pw / 2;
    const stepW = pw / steps.length;
    for (let i = 0; i < steps.length; i++) {
      const ing = INGREDIENTS.find(ig => ig.id === steps[i]);
      const px = startPX + i * stepW + stepW / 2;
      const py = brewY + brewH * 0.32;
      if (i < brewState.inputSteps.length) {
        const inputIng = INGREDIENTS.find(ig => ig.id === brewState.inputSteps[i]);
        ctx.globalAlpha = 0.5;
        if (inputIng) drawIngredient(ctx, inputIng, px, py, 26);
        ctx.globalAlpha = 1;
        if (brewState.inputSteps[i] === steps[i]) {
          ctx.strokeStyle = '#27AE60';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(px, py, 14, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.strokeStyle = '#E74C3C';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(px - 8, py - 8); ctx.lineTo(px + 8, py + 8);
          ctx.moveTo(px + 8, py - 8); ctx.lineTo(px - 8, py + 8);
          ctx.stroke();
        }
      } else {
        if (ing) drawIngredient(ctx, ing, px, py, 26);
        if (i === brewState.inputSteps.length) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.arc(px, py, 15, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    }
  } else {
    ctx.fillStyle = '#8080a0';
    ctx.font = `${Math.min(13, brewH * 0.09)}px "Segoe UI",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('고객을 클릭하여 주문을 받으세요', W / 2, brewY + brewH * 0.25);
  }

  // 재료 슬롯
  const slots = getIngredientSlotRects();
  for (const slot of slots) {
    const isActive = brewState.active;
    ctx.fillStyle = isActive ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)';
    roundRect(ctx, slot.x, slot.y, slot.w, slot.h, 8);
    ctx.fill();
    if (isActive) {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      roundRect(ctx, slot.x, slot.y, slot.w, slot.h, 8);
      ctx.stroke();
    }
    drawIngredient(ctx, slot.ing, slot.x + slot.w / 2, slot.y + slot.h / 2, slot.w * 0.6);
    // 키 힌트
    if (inputMode === 'keyboard') {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${Math.min(10, slot.w * 0.2)}px "Segoe UI",sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(`${slots.indexOf(slot) + 1}`, slot.x + slot.w / 2, slot.y + slot.h - 4);
    }
  }
}

// 시작 화면 렌더링
function drawTitle(ctx, dt) {
  titleAnim.t += dt;

  // 배경 그라디언트
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#2C1810');
  grad.addColorStop(0.5, '#4A2C17');
  grad.addColorStop(1, '#1A0E08');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 배경 커피빈 패턴
  ctx.fillStyle = 'rgba(111,78,55,0.15)';
  for (let i = 0; i < 20; i++) {
    const bx = ((i * 137 + titleAnim.t * 5) % (W + 40)) - 20;
    const by = ((i * 89 + 50) % H);
    ctx.beginPath();
    ctx.ellipse(bx, by, 8, 5, (i * 0.5) % Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  // 증기 효과 (시그니처 이펙트)
  ctx.globalAlpha = 0.3 + Math.sin(titleAnim.t * 2) * 0.15;
  for (let s = 0; s < 5; s++) {
    const sx = W / 2 - 15 + s * 8;
    const sy = H * 0.48 + Math.sin(titleAnim.t * 1.5 + s) * 8;
    const sr = 4 + Math.sin(titleAnim.t * 2 + s * 0.7) * 2;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(sx, sy - titleAnim.t * 3 % 60, sr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 커피컵 (큰)
  const cupX = W / 2;
  const cupY = H * 0.42;
  drawCup(ctx, cupX, cupY, 60, 50, 0.7, '#6F4E37');

  // 타이틀
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = `bold ${Math.min(36, W * 0.07)}px "Segoe UI",sans-serif`;
  ctx.fillText('미니 커피숍 타이쿤', W / 2 + 2, H * 0.22 + 2);

  // 메인 제목 (따뜻한 골드 그라디언트)
  const titleGrad = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  titleGrad.addColorStop(0, '#FFD700');
  titleGrad.addColorStop(0.5, '#FFF3C4');
  titleGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = titleGrad;
  ctx.font = `bold ${Math.min(36, W * 0.07)}px "Segoe UI",sans-serif`;
  ctx.fillText('미니 커피숍 타이쿤', W / 2, H * 0.22);

  // 부제
  ctx.fillStyle = '#D4A574';
  ctx.font = `${Math.min(14, W * 0.03)}px "Segoe UI",sans-serif`;
  ctx.fillText('작은 노점에서 도시 최고의 커피 체인으로!', W / 2, H * 0.30);

  // 시작 버튼
  const btnW = Math.min(200, W * 0.45);
  const btnH = 44;
  const btnX = W / 2 - btnW / 2;
  const btnY = H * 0.62;
  const pulse = 1 + Math.sin(titleAnim.t * 3) * 0.03;

  ctx.save();
  ctx.translate(W / 2, btnY + btnH / 2);
  ctx.scale(pulse, pulse);
  ctx.translate(-W / 2, -(btnY + btnH / 2));

  ctx.fillStyle = '#8B6914';
  roundRect(ctx, btnX, btnY, btnW, btnH, 10);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(18, W * 0.04)}px "Segoe UI",sans-serif`;
  ctx.fillText('새 게임', W / 2, btnY + btnH / 2);
  ctx.restore();

  // 이어하기 버튼
  const savedData = loadGame();
  if (savedData) {
    const btn2Y = btnY + 56;
    ctx.fillStyle = 'rgba(139,105,20,0.5)';
    roundRect(ctx, btnX, btn2Y, btnW, btnH, 10);
    ctx.fill();
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 1;
    roundRect(ctx, btnX, btn2Y, btnW, btnH, 10);
    ctx.stroke();
    ctx.fillStyle = '#D4A574';
    ctx.font = `bold ${Math.min(16, W * 0.035)}px "Segoe UI",sans-serif`;
    ctx.fillText(`이어하기 (Day ${savedData.day})`, W / 2, btn2Y + btnH / 2);
  }

  // 조작법
  ctx.fillStyle = '#8080a0';
  ctx.font = `${Math.min(12, W * 0.025)}px "Segoe UI",sans-serif`;
  ctx.fillText('마우스/터치: 재료 선택 | 1~6: 재료 단축키 | P: 일시정지', W / 2, H * 0.92);

  // 최고 점수
  const best = getBest();
  if (best > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `${Math.min(13, W * 0.028)}px "Segoe UI",sans-serif`;
    ctx.fillText(`최고 점수: ${best}`, W / 2, H * 0.86);
  }
}

// 일일 정산 화면
function drawDayEnd(ctx, sd, dr) {
  // 어두운 오버레이
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = dayResultAnim.alpha;
  ctx.save();
  ctx.translate(0, dayResultAnim.slideY);

  const panelW = Math.min(340, W * 0.8);
  const panelH = Math.min(300, H * 0.55);
  const px = W / 2 - panelW / 2;
  const py = H / 2 - panelH / 2;

  // 패널
  ctx.fillStyle = '#2C2C2C';
  roundRect(ctx, px, py, panelW, panelH, 16);
  ctx.fill();
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 2;
  roundRect(ctx, px, py, panelW, panelH, 16);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 타이틀
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(22, panelW * 0.065)}px "Segoe UI",sans-serif`;
  ctx.fillText(`Day ${sd.day} 정산`, W / 2, py + 35);

  // 구분선
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px + 20, py + 55); ctx.lineTo(px + panelW - 20, py + 55); ctx.stroke();

  // 매출
  const lineH = Math.min(32, panelH * 0.1);
  let cy = py + 75;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#CCC';
  ctx.font = `${Math.min(15, panelW * 0.045)}px "Segoe UI",sans-serif`;
  ctx.fillText('매출', px + 30, cy);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#27AE60';
  ctx.fillText(`+₩${dr.revenue}`, px + panelW - 30, cy);

  cy += lineH;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#CCC';
  ctx.fillText('지출', px + 30, cy);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#E74C3C';
  ctx.fillText(`-₩${dr.expense}`, px + panelW - 30, cy);

  // 아이들 수익
  if (sd.shopCount >= 2) {
    cy += lineH;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#AAA';
    const idle = calcIdleIncome(sd.shopCount, sd.upgrades.interior, CONFIG);
    ctx.fillText(`(매장 ${sd.shopCount}호점 아이들 수익 포함)`, px + 30, cy);
  }

  cy += lineH + 8;
  ctx.strokeStyle = '#555';
  ctx.beginPath(); ctx.moveTo(px + 20, cy - 8); ctx.lineTo(px + panelW - 20, cy - 8); ctx.stroke();

  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFF';
  ctx.font = `bold ${Math.min(18, panelW * 0.055)}px "Segoe UI",sans-serif`;
  ctx.fillText('순이익', px + 30, cy);
  ctx.textAlign = 'right';
  ctx.fillStyle = dr.profit >= 0 ? '#FFD700' : '#E74C3C';
  ctx.fillText(`${dr.profit >= 0 ? '+' : ''}₩${dr.profit}`, px + panelW - 30, cy);

  cy += lineH + 5;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#AAA';
  ctx.font = `${Math.min(13, panelW * 0.04)}px "Segoe UI",sans-serif`;
  ctx.fillText(`보유 골드: ₩${sd.gold}`, px + 30, cy);

  cy += lineH * 0.8;
  ctx.fillText(`만족도: ${Math.floor(sd.satisfaction)}%`, px + 30, cy);

  // 안내
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8080a0';
  ctx.font = `${Math.min(12, panelW * 0.035)}px "Segoe UI",sans-serif`;
  ctx.fillText('잠시 후 업그레이드 화면으로...', W / 2, py + panelH - 20);

  ctx.restore();
  ctx.globalAlpha = 1;
}

// 업그레이드 화면
function drawUpgrade(ctx, sd) {
  // 배경
  ctx.fillStyle = '#1A0E08';
  ctx.fillRect(0, 0, W, H);

  const panelW = Math.min(420, W * 0.9);
  const panelH = Math.min(450, H * 0.85);
  const px = W / 2 - panelW / 2;
  const py = H / 2 - panelH / 2;

  // 패널 배경
  ctx.fillStyle = '#2C2C2C';
  roundRect(ctx, px, py, panelW, panelH, 16);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 타이틀
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(20, panelW * 0.05)}px "Segoe UI",sans-serif`;
  ctx.fillText(`Day ${sd.day} 업그레이드`, W / 2, py + 30);

  // 골드 표시
  ctx.fillStyle = '#FFF';
  ctx.font = `bold ${Math.min(16, panelW * 0.04)}px "Segoe UI",sans-serif`;
  ctx.fillText(`보유: ₩${sd.gold}`, W / 2, py + 55);

  // 카테고리 탭
  const tabW = Math.min(60, (panelW - 20) / UPGRADE_CATEGORIES.length - 4);
  const tabY = py + 75;
  const tabLabels = ['메뉴', '좌석', '머신', '바리스타', '인테리어', '매장'];
  const totalTabW = UPGRADE_CATEGORIES.length * (tabW + 4);
  const tabStartX = W / 2 - totalTabW / 2;

  for (let i = 0; i < UPGRADE_CATEGORIES.length; i++) {
    const tx = tabStartX + i * (tabW + 4);
    ctx.fillStyle = i === upgradeCategory ? '#8B6914' : '#444';
    roundRect(ctx, tx, tabY, tabW, 26, 6);
    ctx.fill();
    ctx.fillStyle = i === upgradeCategory ? '#FFF' : '#AAA';
    ctx.font = `${Math.min(11, tabW * 0.2)}px "Segoe UI",sans-serif`;
    ctx.fillText(tabLabels[i], tx + tabW / 2, tabY + 13);
  }

  // 업그레이드 항목
  const cat = UPGRADE_CATEGORIES[upgradeCategory];
  const items = getUpgradeItems(cat, sd);
  const itemY = tabY + 45;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const iy = itemY + i * 70;
    const iw = panelW - 40;
    const ix = px + 20;

    // 카드 배경
    ctx.fillStyle = item.maxed ? 'rgba(100,100,100,0.3)' : item.locked ? 'rgba(60,60,60,0.3)' : item.affordable ? 'rgba(139,105,20,0.2)' : 'rgba(60,60,60,0.2)';
    roundRect(ctx, ix, iy, iw, 58, 8);
    ctx.fill();

    if (item.affordable && !item.maxed && !item.locked) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1;
      roundRect(ctx, ix, iy, iw, 58, 8);
      ctx.stroke();
    }

    // 이름
    ctx.textAlign = 'left';
    ctx.fillStyle = item.maxed || item.locked ? '#888' : '#FFF';
    ctx.font = `bold ${Math.min(15, iw * 0.04)}px "Segoe UI",sans-serif`;
    ctx.fillText(item.name, ix + 12, iy + 22);

    // 설명
    ctx.fillStyle = '#AAA';
    ctx.font = `${Math.min(12, iw * 0.03)}px "Segoe UI",sans-serif`;
    ctx.fillText(item.desc, ix + 12, iy + 42);

    // 가격
    if (item.cost > 0 && !item.maxed && !item.locked) {
      ctx.textAlign = 'right';
      ctx.fillStyle = item.affordable ? '#FFD700' : '#E74C3C';
      ctx.font = `bold ${Math.min(16, iw * 0.04)}px "Segoe UI",sans-serif`;
      ctx.fillText(`₩${item.cost}`, ix + iw - 12, iy + 30);
    }
    if (item.maxed) {
      ctx.textAlign = 'right';
      ctx.fillStyle = '#27AE60';
      ctx.font = `bold ${Math.min(13, iw * 0.035)}px "Segoe UI",sans-serif`;
      ctx.fillText('MAX', ix + iw - 12, iy + 30);
    }
  }

  // 다음 날 버튼
  const nbr = getNextDayButtonRect();
  ctx.fillStyle = '#8B6914';
  roundRect(ctx, nbr.x, nbr.y, nbr.w, nbr.h, 10);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = `bold ${Math.min(16, nbr.w * 0.1)}px "Segoe UI",sans-serif`;
  ctx.textAlign = 'center';
  const nextLabel = sd.day >= 30 ? '최종 결과 보기' : `Day ${sd.day + 1} 시작`;
  ctx.fillText(nextLabel, nbr.x + nbr.w / 2, nbr.y + nbr.h / 2);

  // Tab 힌트
  if (inputMode === 'keyboard') {
    ctx.fillStyle = '#505070';
    ctx.font = `${10}px "Segoe UI",sans-serif`;
    ctx.fillText('Tab: 카테고리 전환 | Enter: 구매 | Space: 다음 날', W / 2, H * 0.95);
  }
}

// 승리/결과 화면
function drawVictory(ctx, sd, sc) {
  ctx.fillStyle = '#1A0E08';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 등급
  const gradeColors = { S: '#FFD700', A: '#27AE60', B: '#3498DB', C: '#AAA' };
  ctx.fillStyle = gradeColors[sc.grade] || '#FFF';
  ctx.font = `bold ${Math.min(64, W * 0.12)}px "Segoe UI",sans-serif`;
  ctx.fillText(sc.grade, W / 2, H * 0.15);

  // 타이틀
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(24, W * 0.05)}px "Segoe UI",sans-serif`;
  ctx.fillText(sd.shopCount >= 3 ? '커피 제국 완성!' : 'Day 30 완료!', W / 2, H * 0.26);

  // 점수
  ctx.fillStyle = '#FFF';
  ctx.font = `bold ${Math.min(28, W * 0.055)}px "Segoe UI",sans-serif`;
  ctx.fillText(`${sc.finalScore} 점`, W / 2, H * 0.35);

  // 통계
  const stats = [
    [`총 수익: ₩${sc.totalGold}`, '#FFD700'],
    [`서빙 횟수: ${sc.totalServed}`, '#FFF'],
    [`완벽 제조: ${sc.perfectServes}`, '#27AE60'],
    [`이탈 고객: ${sc.customersLost}`, '#E74C3C'],
    [`매장 수: ${sc.shopsOpened}`, '#3498DB'],
    [`평균 만족도: ${Math.floor(sc.avgSatisfaction)}%`, '#F1C40F']
  ];

  const startY = H * 0.44;
  for (let i = 0; i < stats.length; i++) {
    ctx.fillStyle = stats[i][1];
    ctx.font = `${Math.min(14, W * 0.03)}px "Segoe UI",sans-serif`;
    ctx.fillText(stats[i][0], W / 2, startY + i * 26);
  }

  // 최고 점수
  const best = getBest();
  if (sc.finalScore >= best) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${Math.min(16, W * 0.035)}px "Segoe UI",sans-serif`;
    ctx.fillText('새 최고 점수!', W / 2, H * 0.8);
  }

  // 재시작 안내
  ctx.fillStyle = '#8080a0';
  ctx.font = `${Math.min(14, W * 0.03)}px "Segoe UI",sans-serif`;
  ctx.fillText('R키 또는 탭하여 새 게임', W / 2, H * 0.9);
}

// 바리스타 NPC 렌더링
function drawBarista(ctx, sd, area) {
  if (!sd.baristaHired) return;
  const bx = area.x + area.w * 0.75;
  const counterY = area.y + area.h * 0.5;
  const by = counterY - 30;

  // 몸통 (앞치마)
  ctx.fillStyle = '#4A7C59';
  roundRect(ctx, bx - 10, by - 2, 20, 28, 5);
  ctx.fill();
  // 머리
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(bx, by - 14, 10, 0, Math.PI * 2);
  ctx.fill();
  // 모자
  ctx.fillStyle = '#2E7D32';
  ctx.fillRect(bx - 10, by - 24, 20, 6);
  // 눈
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(bx - 3, by - 15, 1.5, 0, Math.PI * 2);
  ctx.arc(bx + 3, by - 15, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // 제조중 표시
  if (baristaState.busy) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `${9}px "Segoe UI",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('제조중...', bx, by - 30);
    // 진행 바
    const prog = 1 - (baristaState.timer / getBaristaSpeed(Math.min(sd.upgrades.barista, 2), CONFIG));
    ctx.fillStyle = '#333';
    ctx.fillRect(bx - 15, by - 38, 30, 4);
    ctx.fillStyle = '#27AE60';
    ctx.fillRect(bx - 15, by - 38, 30 * Math.max(0, prog), 4);
  }
}

// ========== 메인 렌더링 ==========
function render() {
  ctx.clearRect(0, 0, W, H);

  // 스크린 쉐이크 적용
  if (shake.timer > 0) {
    ctx.save();
    ctx.translate(shake.x, shake.y);
  }

  switch (state) {
    case 'LOADING':
      ctx.fillStyle = '#1A0E08';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#D4A574';
      ctx.font = `${16}px "Segoe UI",sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('로딩 중...', W / 2, H / 2);
      break;

    case 'TITLE':
      drawTitle(ctx, 0.016);
      break;

    case 'PLAYING': {
      const area = getShopArea();
      const shopInfo = drawShopBackground(ctx, area, shopData.upgrades.interior);
      const maxSeats = getMaxSeats(shopData.upgrades.seat);
      const seatPositions = getSeatPositions(maxSeats, area.x, area.y, area.w, area.h);
      drawSeats(ctx, seatPositions, area);

      // 고객 렌더링
      for (const c of customerPool.active) {
        const typeData = CUSTOMER_TYPES[c.type];
        ctx.globalAlpha = Math.max(0, c.alpha);
        drawCustomer(ctx, c.x, c.y, typeData.color, c.happy, c.scale);

        // 주문 말풍선 (대기 중인 고객)
        if (c.state === 'waiting') {
          const progress = brewState.customerRef === c ? brewState.inputSteps.length : 0;
          drawOrderBubble(ctx, c.x, c.y - 30, c.recipe, progress);

          // 인내심 바
          const patFill = c.patience / c.maxPatience;
          ctx.fillStyle = '#333';
          ctx.fillRect(c.x - 15, c.y + 28, 30, 4);
          ctx.fillStyle = patFill > 0.5 ? '#27AE60' : patFill > 0.25 ? '#F39C12' : '#E74C3C';
          ctx.fillRect(c.x - 15, c.y + 28, 30 * Math.max(0, patFill), 4);

          // 선택 표시
          if (brewState.customerRef === c) {
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(c.x - 18, c.y - 30, 36, 65);
            ctx.setLineDash([]);
          }
        }

        // 기쁨 표현
        if (c.state === 'happy_wait') {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 14px "Segoe UI",sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('♥', c.x, c.y - 35 + Math.sin(performance.now() * 0.005) * 3);
        }

        ctx.globalAlpha = 1;
      }

      // 바리스타 NPC
      drawBarista(ctx, shopData, area);

      // 증기 이펙트 (에스프레소 머신)
      // (파티클로 처리됨)

      drawHUD(ctx, shopData);
      drawBrewPanel(ctx, shopData);
      break;
    }

    case 'DAY_END':
      // 게임 화면 배경 (얼린 상태)
      {
        const area = getShopArea();
        drawShopBackground(ctx, area, shopData.upgrades.interior);
        drawHUD(ctx, shopData);
        drawBrewPanel(ctx, shopData);
      }
      drawDayEnd(ctx, shopData, dayResult);
      break;

    case 'UPGRADE':
      drawUpgrade(ctx, shopData);
      break;

    case 'PAUSED':
      // 게임 화면 배경
      {
        const area = getShopArea();
        drawShopBackground(ctx, area, shopData.upgrades.interior);
        drawHUD(ctx, shopData);
        drawBrewPanel(ctx, shopData);
      }
      drawPaused(ctx);
      break;

    case 'VICTORY':
      drawVictory(ctx, shopData, scoreData);
      break;
  }

  // 파티클은 대부분 상태에서 렌더
  if (state !== 'LOADING') {
    particles.draw(ctx);
  }

  // 전환 오버레이
  if (overlay.alpha > 0.01) {
    ctx.fillStyle = `rgba(26,14,8,${overlay.alpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (shake.timer > 0) {
    ctx.restore();
  }
}

// ========== 게임 루프 (§5.4) ==========
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // 1. 항상 업데이트 (§5.3 매트릭스)
  tw.update(dt);

  // 파티클: TITLE, PLAYING, DAY_END, UPGRADE, VICTORY에서 업데이트
  if (state !== 'LOADING' && state !== 'PAUSED') {
    particles.update(dt);
  }

  // 스크린 쉐이크
  if (shake.timer > 0) {
    shake.timer -= dt;
    shake.x = (Math.random() - 0.5) * shake.intensity;
    shake.y = (Math.random() - 0.5) * shake.intensity;
    shake.intensity *= 0.92;
  } else {
    shake.x = 0; shake.y = 0;
  }

  // 2. 상태별 업데이트 (§5.3 매트릭스)
  switch (state) {
    case 'PLAYING':
      shopData.dayTimer -= dt;

      // Day 종료 체크 (가드 플래그)
      if (shopData.dayTimer <= 0 && !isTransitioning) {
        shopData.dayTimer = 0;
        beginTransition('DAY_END');
        break;
      }

      // 고객 스폰
      spawnCustomerIfNeeded(shopData, dt);

      // 고객 업데이트
      updateCustomers(shopData, dt);

      // 바리스타 AI
      updateBaristaAI(shopData, dt);

      // 증기 파티클
      steamTimer -= dt;
      if (steamTimer <= 0) {
        steamTimer = 0.3;
        const area = getShopArea();
        const mx = area.x + area.w * 0.82;
        const my = area.y + area.h * 0.5 - 55;
        particles.emit(mx, my, 1, {
          vy: -20, spread: 8, life: 0.6,
          color: 'rgba(200,200,200,0.4)', size: 2, gravity: -10
        });
      }

      // Day 타이머 경고 플래시
      if (shopData.dayTimer <= 5 && shopData.dayTimer > 0) {
        dayTimerFlash += dt;
      }
      break;

    case 'DAY_END':
      // tween만 처리 (매트릭스)
      break;

    case 'UPGRADE':
      // 입력만 처리 (매트릭스)
      break;
  }

  // 3. 렌더링 (모든 상태)
  render();

  requestAnimationFrame(gameLoop);
}

// ========== 입력 처리 ==========
function handleClick(mx, my) {
  if (isTransitioning) return;

  switch (state) {
    case 'TITLE': {
      audio.init();
      const btnW = Math.min(200, W * 0.45);
      const btnH = 44;
      const btnX = W / 2 - btnW / 2;
      const btnY = H * 0.62;

      // 새 게임
      if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
        audio.click();
        shopData = createShopData();
        beginTransition('PLAYING');
        return;
      }
      // 이어하기
      const saved = loadGame();
      if (saved) {
        const btn2Y = btnY + 56;
        if (mx >= btnX && mx <= btnX + btnW && my >= btn2Y && my <= btn2Y + btnH) {
          audio.click();
          shopData = saved;
          if (!shopData.satisfactionHistory) shopData.satisfactionHistory = [shopData.satisfaction];
          if (shopData.zeroSatisfactionDays === undefined) shopData.zeroSatisfactionDays = 0;
          if (shopData.baristaHired === undefined) shopData.baristaHired = shopData.upgrades.barista > 0;
          beginTransition('UPGRADE');
          return;
        }
      }
      break;
    }

    case 'PLAYING': {
      // 고객 클릭 (주문 선택)
      for (const c of customerPool.active) {
        if (c.state === 'waiting' && !c.served) {
          const dx = mx - c.x;
          const dy = my - c.y;
          if (dx * dx + dy * dy < 900) {
            selectCustomerForBrew(c);
            return;
          }
        }
      }

      // 재료 슬롯 클릭
      const slots = getIngredientSlotRects();
      for (const slot of slots) {
        if (mx >= slot.x && mx <= slot.x + slot.w && my >= slot.y && my <= slot.y + slot.h) {
          addIngredient(slot.ing.id, shopData);
          return;
        }
      }
      break;
    }

    case 'UPGRADE': {
      // 카테고리 탭
      const panelW = Math.min(420, W * 0.9);
      const tabW = Math.min(60, (panelW - 20) / UPGRADE_CATEGORIES.length - 4);
      const tabY = H / 2 - Math.min(450, H * 0.85) / 2 + 75;
      const totalTabW = UPGRADE_CATEGORIES.length * (tabW + 4);
      const tabStartX = W / 2 - totalTabW / 2;

      for (let i = 0; i < UPGRADE_CATEGORIES.length; i++) {
        const tx = tabStartX + i * (tabW + 4);
        if (mx >= tx && mx <= tx + tabW && my >= tabY && my <= tabY + 26) {
          upgradeCategory = i;
          audio.click();
          return;
        }
      }

      // 업그레이드 항목 클릭
      const cat = UPGRADE_CATEGORIES[upgradeCategory];
      const items = getUpgradeItems(cat, shopData);
      const py = H / 2 - Math.min(450, H * 0.85) / 2;
      const itemY = tabY + 45;
      const px = W / 2 - panelW / 2;

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const iy = itemY + i * 70;
        const iw = panelW - 40;
        const ix = px + 20;

        if (mx >= ix && mx <= ix + iw && my >= iy && my <= iy + 58) {
          if (item.affordable && !item.maxed && !item.locked) {
            if (item.hireAction) {
              purchaseUpgrade('barista', shopData);
            } else {
              purchaseUpgrade(item.key, shopData);
            }
            return;
          } else if (!item.affordable && !item.maxed && !item.locked) {
            audio.error();
          }
          return;
        }
      }

      // 다음 날 버튼
      const nbr = getNextDayButtonRect();
      if (mx >= nbr.x && mx <= nbr.x + nbr.w && my >= nbr.y && my <= nbr.y + nbr.h) {
        audio.click();
        shopData.day++;
        saveGame(shopData);
        if (shopData.day > 30) {
          beginTransition('VICTORY');
        } else {
          beginTransition('PLAYING');
        }
        return;
      }
      break;
    }

    case 'PAUSED':
      enterState('PLAYING');
      state = prevStateBeforePause === 'PLAYING' ? 'PLAYING' : prevStateBeforePause;
      break;

    case 'VICTORY':
      shopData = createShopData();
      beginTransition('TITLE');
      break;
  }
}

// 키보드
function onKeyDown(e) {
  // Prevent browser default for game keys
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyP','KeyR','KeyE','KeyQ','Escape','Enter','Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
    e.preventDefault();
  }
  inputMode = 'keyboard';
  if (isTransitioning) return;

  switch (state) {
    case 'TITLE':
      if (e.code === 'Space') {
        e.preventDefault();
        audio.init();
        shopData = createShopData();
        beginTransition('PLAYING');
      }
      break;

    case 'PLAYING':
      if (e.code === 'KeyP' || e.code === 'Escape') {
        e.preventDefault();
        prevStateBeforePause = 'PLAYING';
        enterState('PAUSED');
        return;
      }
      // 1~6 재료 슬롯
      const num = parseInt(e.key);
      if (num >= 1 && num <= 6) {
        e.preventDefault();
        addIngredient(INGREDIENTS[num - 1].id, shopData);
      }
      if (e.code === 'Space') {
        e.preventDefault();
        if (brewState.active && brewState.inputSteps.length >= (brewState.recipe ? brewState.recipe.steps.length : 999)) {
          completeBrew(shopData);
        }
      }
      break;

    case 'UPGRADE':
      if (e.code === 'Tab') {
        e.preventDefault();
        upgradeCategory = (upgradeCategory + 1) % UPGRADE_CATEGORIES.length;
        audio.click();
      }
      if (e.code === 'Enter') {
        e.preventDefault();
        const cat = UPGRADE_CATEGORIES[upgradeCategory];
        const items = getUpgradeItems(cat, shopData);
        if (items.length > 0 && items[0].affordable && !items[0].maxed && !items[0].locked) {
          if (items[0].hireAction) purchaseUpgrade('barista', shopData);
          else purchaseUpgrade(items[0].key, shopData);
        }
      }
      if (e.code === 'Space') {
        e.preventDefault();
        audio.click();
        shopData.day++;
        saveGame(shopData);
        if (shopData.day > 30) {
          beginTransition('VICTORY');
        } else {
          beginTransition('PLAYING');
        }
      }
      break;

    case 'PAUSED':
      if (e.code === 'KeyP' || e.code === 'Escape') {
        e.preventDefault();
        enterState(prevStateBeforePause);
      }
      break;

    case 'VICTORY':
      if (e.code === 'KeyR' || e.code === 'Space') {
        e.preventDefault();
        shopData = createShopData();
        beginTransition('TITLE');
      }
      break;
  }
}

// 마우스
function onMouseDown(e) {
  inputMode = 'mouse';
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left);
  const my = (e.clientY - rect.top);
  handleClick(mx, my);
}

// 터치
function onTouchStart(e) {
  e.preventDefault();
  inputMode = 'touch';
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.touches[0].clientX - rect.left);
    const my = (e.touches[0].clientY - rect.top);
    handleClick(mx, my);
  }
}

function onTouchEnd(e) {
  e.preventDefault();
}

function onTouchMove(e) {
  e.preventDefault();
}

// ========== 초기화 ==========
function init() {
  // 이벤트 등록 (EventManager로 추적)
  events.listen(window, 'resize', resize);
  events.listen(window, 'keydown', onKeyDown);
  events.listen(canvas, 'mousedown', onMouseDown);
  events.listen(canvas, 'touchstart', onTouchStart, { passive: false });
  events.listen(canvas, 'touchend', onTouchEnd, { passive: false });
  events.listen(canvas, 'touchmove', onTouchMove, { passive: false });

  // 컨텍스트 메뉴 방지
  events.listen(canvas, 'contextmenu', (e) => e.preventDefault());

  // LOADING → TITLE (tween으로 전환)
  enterState('LOADING');
  const loadDelay = { t: 0 };
  tw.add(loadDelay, { t: 1 }, 0.5, 'linear', () => {
    enterState('TITLE');
  });

  // 게임 루프 시작
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// 시작
init();
</script>
